<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Corpus map — ProteinTraitsMech</title>
<style>
  :root{--pastel-a:#B7E4DC;--pastel-b:#FCE3B0;--accent:#2E8B84;--ink:#1a1a1a;--muted:#555;--line:rgba(0,0,0,.12);--card:#fff;--stage-bg:#f8f9fa}
  /* Dark palette shared with index/browse; OS default, superseded by theme-toggle.js (data-theme). */
  @media (prefers-color-scheme:dark){
    :root:not([data-theme="light"]){--pastel-a:#14231f;--pastel-b:#0f1615;--accent:#48c2b8;--ink:#e8efec;--muted:#9bb0aa;--line:#253230;--card:#17201e;--stage-bg:#17201e}
  }
  :root[data-theme="dark"]{--pastel-a:#14231f;--pastel-b:#0f1615;--accent:#48c2b8;--ink:#e8efec;--muted:#9bb0aa;--line:#253230;--card:#17201e;--stage-bg:#17201e}
  :root[data-theme="light"]{--pastel-a:#B7E4DC;--pastel-b:#FCE3B0;--accent:#2E8B84;--ink:#1a1a1a;--muted:#555;--line:rgba(0,0,0,.12);--card:#fff;--stage-bg:#f8f9fa}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--pastel-b)}
  header.site{background:linear-gradient(135deg,var(--pastel-a),var(--pastel-b));padding:20px 24px;border-bottom:1px solid var(--line)}
  header.site h1{margin:0 0 .15em;font-size:1.5rem}
  header.site p{margin:0;color:var(--muted);font-size:.9rem}
  header.site a{color:var(--accent)}
  .wrap{max-width:1160px;margin:0 auto;padding:18px 24px}
  .controls{display:flex;flex-wrap:wrap;align-items:flex-end;gap:16px;margin:.2rem 0 1rem}
  .stats{display:flex;gap:18px;font-size:.8rem;color:var(--muted)}
  .stat b{color:var(--accent);font-size:1.05rem;font-variant-numeric:tabular-nums;margin-left:.3em}
  .controls label{display:flex;flex-direction:column;gap:.25rem;font-size:.78rem;color:var(--muted)}
  .controls select,.controls input{font:inherit;font-size:.9rem;padding:.4em .55em;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--ink);min-width:200px}
  .controls select:focus,.controls input:focus{outline:none;border-color:var(--accent)}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 .8rem}
  .legend button{display:inline-flex;align-items:center;gap:.45em;font-size:.82rem;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:.32em .7em .32em .55em;color:var(--ink);cursor:pointer;transition:all .15s}
  .legend button:hover{border-color:var(--accent)}
  .legend button.off{opacity:.4;text-decoration:line-through}
  .legend .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  .legend .cnt{color:var(--muted);font-variant-numeric:tabular-nums}
  #stage{position:relative;background:var(--stage-bg);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.08)}
  canvas{display:block;width:100%;height:auto;cursor:crosshair}
  #tip{position:absolute;pointer-events:none;background:rgba(0,0,0,.9);color:#fff;font-size:.78rem;line-height:1.4;padding:.5em .6em;border-radius:6px;opacity:0;transition:opacity .15s;transform:translate(-50%,-118%);white-space:nowrap;max-width:320px;overflow:hidden;text-overflow:ellipsis;z-index:5}
  #tip b{color:#ffd700;font-weight:600}
  #tip .t-sub{color:#cfcfcf}
  .hint{color:var(--muted);font-size:.82rem;margin-top:.6rem}
  .dataview{margin-top:1rem;display:flex;flex-wrap:wrap;align-items:center;gap:.6rem}
  .dlbtn{display:inline-block;background:var(--accent);color:#fff;padding:.45em 1em;border-radius:999px;font-size:.85rem;font-weight:600;text-decoration:none;cursor:pointer}
  .dlbtn:hover{filter:brightness(.93)}
  .dlbtn[aria-disabled="true"]{opacity:.55;pointer-events:none}
  :root[data-theme="dark"] .dlbtn{color:#0f1615}
  @media (prefers-color-scheme:dark){:root:not([data-theme="light"]) .dlbtn{color:#0f1615}}
  .dataview .hint{margin-top:0}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}}
</style>
</head>
<body>
  <header class="site">
    <h1>Corpus map</h1>
    <p>2-D map of every record's text embedding, colored by trait axis ·
       <a href="index.html">home</a> · <a href="browse.html">browse</a></p>
  </header>
  <main class="wrap">
    <div class="controls">
      <div class="stats">
        <span class="stat">Total<b id="s-total">…</b></span>
        <span class="stat">Visible<b id="s-visible">…</b></span>
      </div>
      <label>Filter category
        <select id="cat-filter"><option value="">All categories</option></select>
      </label>
      <label>Search
        <input type="search" id="search" placeholder="identifier / CURIE…" autocomplete="off">
      </label>
      <label>Embedding
        <select id="emb-mode">
          <option value="corpus_map.json">Full record</option>
          <option value="corpus_map_definitions.json">Definition only</option>
        </select>
      </label>
    </div>
    <div class="legend" id="legend"></div>
    <div id="stage"><canvas id="cv" width="1120" height="660"></canvas><div id="tip"></div></div>
    <p class="hint" id="hint">Loading corpus map…</p>
    <div class="dataview">
      <a id="csv-dl" class="dlbtn" download="corpus_map.csv" aria-disabled="true">Download data (CSV)</a>
      <span class="hint" id="dl-note">Data-table fallback for this dense scatter — the CSV lists every plotted point (identifier / CURIE, trait axis, trait category, x, y).</span>
    </div>
  </main>
  <script>
  // Axis palette (matches the landing stat-card hues).
  const COLORS = {STRUCTURE:"#16a34a",SEQUENCE:"#2563eb",SEQUENCE_STRUCTURE:"#a855f7",FUNCTION:"#d97706",EVOLUTION:"#0d9488",OTHER:"#888"};
  const METHOD_LABEL = {pacmap:"PaCMAP",umap:"UMAP",pca:"PCA",tsne:"t-SNE"};
  const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
  const W=cv.width, H=cv.height, PAD=14;
  const tip=document.getElementById("tip");
  let DATA=null;
  const activeAxes=new Set();      // axis names currently shown (legend toggles)
  let catFilter="", query="";      // dropdown + search
  let VF=new Uint8Array(0);        // per-point: passes all filters

  const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const fmt=n=>n.toLocaleString();
  function px(p){return [PAD + p[0]*(W-2*PAD), PAD + (1-p[1])*(H-2*PAD)];}

  // Load (or reload) a corpus map file — "corpus_map.json" (full-record embedding)
  // or "corpus_map_definitions.json" (definition-only embedding).
  function loadMap(file){
    document.getElementById("hint").textContent="Loading corpus map…";
    fetch("data/"+file).then(r=>{if(!r.ok) throw 0; return r.json();}).then(d=>{
      DATA=d; VF=new Uint8Array(d.points.length);
      activeAxes.clear(); d.axes.forEach(a=>activeAxes.add(a));
      catFilter=""; query=""; const srch=document.getElementById("search"); if(srch) srch.value="";
      document.getElementById("s-total").textContent=fmt(d.points.length);
      const catCount={}; for(const p of d.points){const c=d.cats[p[4]]; catCount[c]=(catCount[c]||0)+1;}
      const sel=document.getElementById("cat-filter");
      sel.innerHTML='<option value="">All categories</option>';
      d.cats.slice().sort().forEach(c=>{
        const o=document.createElement("option");
        o.value=c; o.textContent=`${c} (${fmt(catCount[c])})`;
        sel.appendChild(o);
      });
      buildLegend();
      const coverage=(d.n_total && d.n_shown<d.n_total)
        ? `${fmt(d.n_shown)} of ${fmt(d.n_total)} records (stratified sample)`
        : `${fmt(d.n_shown)} records`;
      const ml=METHOD_LABEL[d.method]||(d.method||"").toUpperCase();
      const embLabel=file.includes("definition") ? " · definition-only embedding" : "";
      document.getElementById("hint").textContent=
        `${coverage} · ${ml} projection${embLabel}`
        + (d.explained ? ` (PC1 ${(d.explained[0]*100).toFixed(1)}%, PC2 ${(d.explained[1]*100).toFixed(1)}% variance)` : "")
        + " · hover to identify, click to open · toggle axes in the legend.";
      update(); buildCsv();
    }).catch(()=>{document.getElementById("hint").textContent=
      file.includes("definition")
        ? "Definition-only map not built yet (embed_records --text-mode definition → embed-map --emb-dir data/embeddings/definition --out corpus_map_definitions.json)."
        : "Corpus map not built yet (run `just embed-map`).";});
  }
  // Wire the controls once; loadMap rebuilds the data each switch.
  document.getElementById("cat-filter").addEventListener("change",e=>{catFilter=e.target.value; update();});
  {let t; document.getElementById("search").addEventListener("input",e=>{clearTimeout(t); t=setTimeout(()=>{query=e.target.value.trim().toLowerCase(); update();},120);});}
  document.getElementById("emb-mode").addEventListener("change",e=>loadMap(e.target.value));
  loadMap("corpus_map.json");

  // Accessible data-table fallback for this dense canvas scatter: a CSV built from
  // the SAME points the plot renders (identifier, axis, category, x, y).
  function buildCsv(){
    const q=v=>{const s=String(v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
    const lines=["identifier,trait_axis,trait_category,x,y"];
    for(const p of DATA.points){ lines.push([p[3], DATA.axes[p[2]], DATA.cats[p[4]], p[0], p[1]].map(q).join(",")); }
    const blob=new Blob([lines.join("\n")],{type:"text/csv"});
    const dl=document.getElementById("csv-dl");
    dl.href=URL.createObjectURL(blob);
    dl.removeAttribute("aria-disabled");
  }

  function axisCount(ax){let n=0; for(const p of DATA.points) if(DATA.axes[p[2]]===ax) n++; return n;}
  function buildLegend(){
    const leg=document.getElementById("legend"); leg.innerHTML="";
    DATA.axes.forEach(ax=>{
      const b=document.createElement("button");
      b.innerHTML=`<span class="sw" style="background:${COLORS[ax]||"#888"}"></span>${ax} <span class="cnt">${fmt(axisCount(ax))}</span>`;
      b.addEventListener("click",()=>{
        if(activeAxes.has(ax)) activeAxes.delete(ax); else activeAxes.add(ax);
        b.classList.toggle("off",!activeAxes.has(ax));
        update();
      });
      leg.appendChild(b);
    });
  }

  // Recompute the visible mask, redraw, refresh the counts.
  function update(){
    const pts=DATA.points; let vis=0;
    for(let i=0;i<pts.length;i++){
      const p=pts[i];
      const ok = activeAxes.has(DATA.axes[p[2]])
        && (!catFilter || DATA.cats[p[4]]===catFilter)
        && (!query || p[3].toLowerCase().includes(query));
      VF[i]=ok?1:0; if(ok) vis++;
    }
    document.getElementById("s-visible").textContent=fmt(vis);
    draw();
  }

  function draw(){
    const pts=DATA.points;
    ctx.clearRect(0,0,W,H);
    // Dim the filtered-out points faintly for context, then the visible ones on top.
    ctx.globalAlpha=.06; ctx.fillStyle="#999";
    for(let i=0;i<pts.length;i++){ if(VF[i]) continue; const [x,y]=px(pts[i]); ctx.fillRect(x,y,1.3,1.3); }
    ctx.globalAlpha=.6;
    for(let i=0;i<pts.length;i++){ if(!VF[i]) continue; const p=pts[i]; const [x,y]=px(p); ctx.fillStyle=COLORS[DATA.axes[p[2]]]||"#888"; ctx.fillRect(x,y,1.6,1.6); }
    ctx.globalAlpha=1;
  }

  // Nearest VISIBLE point (linear scan, throttled to one per frame).
  function nearest(mx,my){
    const pts=DATA.points; let best=null, bd=80;
    for(let i=0;i<pts.length;i++){ if(!VF[i]) continue; const [x,y]=px(pts[i]); const dd=(x-mx)**2+(y-my)**2; if(dd<bd){bd=dd; best=pts[i];} }
    return best;
  }
  let pending=null, rafQueued=false;
  cv.addEventListener("mousemove",e=>{
    if(!DATA) return; pending={x:e.clientX,y:e.clientY};
    if(rafQueued) return; rafQueued=true;
    requestAnimationFrame(()=>{
      rafQueued=false; const ev=pending;
      const r=cv.getBoundingClientRect(), sx=cv.width/r.width, sy=cv.height/r.height;
      const mx=(ev.x-r.left)*sx, my=(ev.y-r.top)*sy;
      const p=nearest(mx,my);
      if(p){
        tip.innerHTML=`<b>${esc(p[3])}</b><br><span class="t-sub">${esc(DATA.axes[p[2]])} · ${esc(DATA.cats[p[4]])}</span>`;
        tip.style.left=(mx/sx)+"px"; tip.style.top=(my/sy)+"px"; tip.style.opacity=1;
      } else tip.style.opacity=0;
    });
  });
  cv.addEventListener("mouseleave",()=>tip.style.opacity=0);
  cv.addEventListener("click",e=>{
    if(!DATA) return;
    const r=cv.getBoundingClientRect(), sx=cv.width/r.width, sy=cv.height/r.height;
    const p=nearest((e.clientX-r.left)*sx,(e.clientY-r.top)*sy);
    if(p) location.href="browse.html#record="+encodeURIComponent(p[3]);
  });
  </script>
  <script src="theme-toggle.js"></script>
</body>
</html>
