title: ProteinTraitsMech
description: Knowledge base of protein sequence and structure traits — one YAML per trait, LinkML-validated, evidence-backed.
theme: jekyll-theme-cayman
show_downloads: false
plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true

# Exclude the vendored raw data + non-docs directories from Jekyll's build.
# (Pages only builds from /docs anyway, but this keeps the safe list explicit.)
exclude:
  - data/raw/
  - "*.tsv"
  - "*.tsv.gz"
  - "*.dat"

include:
  - schema.md
  - example.md
