<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse — ProteinTraitsMech</title>
  <link rel="stylesheet" href="browse.css" />
</head>
<body>
  <header class="page-header">
    <div class="page-header-inner">
      <a href="./" class="brand">ProteinTraitsMech</a>
      <span class="tag" id="record-count">…</span>
      <nav>
        <a href="./">Home</a>
        <a href="schema.html">Schema</a>
        <a href="example.html">P25888 example</a>
        <a href="https://github.com/CultureBotAI/proteintraitsmech" target="_blank" rel="noopener">GitHub</a>
        <a href="https://culturebotai.github.io/" target="_blank" rel="noopener">CultureBotAI</a>
      </nav>
    </div>
  </header>

  <main class="app">
    <aside class="sidebar" id="facets">
      <div class="search-box">
        <input type="search" id="q" placeholder="Search label, identifier, definition, chemical…" aria-label="Search" />
      </div>
      <div class="facet-info">
        <span class="facet-info-icon" tabindex="0" role="img" aria-label="About these counts"
          title="Facet counts reflect the current filtered subset — the records matching your other active filters, not the whole corpus. Values with no matches in the subset are hidden. Clear filters to see the full corpus.">ⓘ</span>
        <span class="facet-info-text">Counts reflect the current filtered subset; empty values are hidden.</span>
      </div>
      <div class="facet-scroll" id="facet-scroll"></div>
    </aside>

    <section class="results" id="results">
      <div class="loading">Loading records…</div>
    </section>
  </main>

  <footer class="page-footer">
    <p>
      Client-side facets over
      <a href="data/facets.json"><code>axis-sharded records.json</code></a>
      · schema at
      <a href="https://github.com/CultureBotAI/proteintraitsmech/blob/main/src/proteintraitsmech/schema/proteintraitsmech.yaml" target="_blank" rel="noopener"><code>proteintraitsmech.yaml</code></a>
      · CC0-1.0
    </p>
  </footer>

  <script src="browse.js"></script>
</body>
</html>
