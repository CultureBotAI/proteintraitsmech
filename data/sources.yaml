# ProteinTraitsMech — data source registry
#
# One authoritative list of every external resource we seed from, are
# considering, or have rejected. Maintained via the `data-sources` skill; keep
# it in sync with the seeders (scripts/seed_*.py), the README seeds table, and
# the deep-research rounds under research/.
#
# status:  seeded    — records from it are in data/traits/
#          candidate — recommended, not yet seeded
#          deferred  — worth doing, lower priority
#          rejected  — evaluated and declined (see note)
# license: record it precisely enough to judge CC0-redistribution compatibility.
#          Flag NonCommercial / NoDerivatives / login-walled sources.

sources:
  # ---------------------------------------------------------------- seeded ---
  - key: linkml_lsf
    name: LinkML LocalStructuralFeature valueset
    prefix: proteintraitsmech
    status: seeded
    description: LinkML Structured-value valueset of local structural features (secondary structure, sites, cavity, disulfide, …).
    homepage: https://linkml.io/valuesets/elements/LocalStructuralFeature/
    download: https://github.com/linkml/valuesets
    license: MIT / CC0
    hierarchy: false
    trait_categories: [STRUCT_SECONDARY, STRUCT_ACTIVE_SITE, STRUCT_BINDING_SITE, STRUCT_CAVITY, STRUCT_DISULFIDE, STRUCT_METAL_SITE, STRUCT_DYNAMICS, STRUCT_INTERFACE]
    added_round: 1
    seeder: seed_localstructuralfeature.py

  - key: prosite
    name: PROSITE (patterns / profiles / ProRules)
    prefix: PROSITE
    status: seeded
    description: Protein families, domains and functional sites as sequence patterns (regex), MATRIX profiles, and ProRules.
    homepage: https://prosite.expasy.org/
    download: ftp://ftp.expasy.org/databases/prosite/
    license: CC BY-NC-ND 4.0 (SIB) — commercial users pay a fee
    license_url: https://prosite.expasy.org/prosite_license.html
    hierarchy: partial (patterns ↔ ProRules)
    trait_categories: [SEQ_MOTIF, SEQ_MODIFIED_RESIDUE, SEQ_GLYCOSYLATION_SITE, SEQ_CROSSLINK_SITE, STRUCT_DOMAIN]
    added_round: 1
    seeder: seed_prosite.py
    notes: NonCommercial + NoDerivatives — flagged; downstream CC0 redistribution of derived records should be reviewed.

  - key: ted
    name: TED (The Encyclopedia of Domains)
    prefix: TED
    status: seeded
    description: AlphaFold-derived structural domains; novel-fold and highly-symmetric-fold catalogues. CATH-derived classification.
    homepage: https://ted.cathdb.info/
    download: https://zenodo.org/records/13908086
    license: CC-BY 4.0
    license_url: https://doi.org/10.5281/zenodo.13908086
    hierarchy: true (CATH-style)
    trait_categories: [STRUCT_FOLD]
    added_round: 1
    seeder: seed_ted.py

  - key: uniprotkb
    name: UniProtKB (FT + CC + GO)
    prefix: UniProtKB
    status: seeded
    description: Per-accession feature table, comment blocks and GO annotations demultiplexed into sequence/structure/function traits (demo seed).
    homepage: https://www.uniprot.org/
    download: https://rest.uniprot.org/uniprotkb/
    license: CC-BY 4.0
    license_url: https://www.uniprot.org/help/license
    hierarchy: false
    trait_categories: [SEQ_MODIFIED_RESIDUE, SEQ_SIGNAL_PEPTIDE, STRUCT_DOMAIN, STRUCT_ACTIVE_SITE, FUNC_ENZYMATIC_ACTIVITY, FUNC_LOCALIZATION]
    added_round: 1
    seeder: seed_uniprot.py
    notes: TRANSMEM/INTRAMEM deliberately skipped (per-protein spans redundant with the general transmembrane trait).

  - key: psi_mod
    name: PSI-MOD
    prefix: MOD
    status: seeded
    description: HUPO-PSI protein-modification controlled vocabulary (OBO).
    homepage: https://github.com/HUPO-PSI/psi-mod-CV
    download: https://raw.githubusercontent.com/HUPO-PSI/psi-mod-CV/master/PSI-MOD.obo
    license: CC-BY 4.0
    hierarchy: true (OBO is_a)
    trait_categories: [SEQ_MODIFIED_RESIDUE, SEQ_GLYCOSYLATION_SITE, SEQ_LIPIDATION_SITE, SEQ_CROSSLINK_SITE, SEQ_PTM_SITE]
    added_round: 1
    seeder: seed_psi_mod.py

  - key: ecod
    name: ECOD (Evolutionary Classification Of protein Domains)
    prefix: ECOD
    status: seeded
    description: A/X/H/T/F structural-domain hierarchy over PDB (and AFDB).
    homepage: http://prodata.swmed.edu/ecod/
    download: http://prodata.swmed.edu/ecod/distributions/ecod.latest.domains.txt
    license: free / academic (not explicitly stated — verify)
    hierarchy: true (A/X/H/T/F)
    trait_categories: [STRUCT_ARCHITECTURE, STRUCT_HOMOLOGOUS_SUPERFAMILY, STRUCT_TOPOLOGY, STRUCT_FOLD]
    added_round: 1
    seeder: seed_ecod.py

  - key: mcsa
    name: M-CSA (Mechanism & Catalytic Site Atlas)
    prefix: MCSA
    status: seeded
    description: Curated enzyme active sites and catalytic mechanisms.
    homepage: https://www.ebi.ac.uk/thornton-srv/m-csa/
    download: https://www.ebi.ac.uk/thornton-srv/m-csa/api/
    license: CC-BY 4.0
    hierarchy: false
    trait_categories: [STRUCT_ACTIVE_SITE]
    added_round: 1
    seeder: seed_mcsa.py

  - key: disprot
    name: DisProt
    prefix: DisProt
    status: seeded
    description: Manually-curated intrinsically disordered regions with IDPO terms.
    homepage: https://disprot.org/
    download: https://disprot.org/api/
    license: CC-BY 4.0
    hierarchy: false
    trait_categories: [SEQ_DISORDER]
    added_round: 1
    seeder: seed_disprot.py

  - key: psi_mi
    name: PSI-MI (interaction type branch)
    prefix: MI
    status: seeded
    description: HUPO-PSI molecular-interaction CV; only the interaction-type branch (MI:0190).
    homepage: https://github.com/HUPO-PSI/psi-mi-CV
    download: https://raw.githubusercontent.com/HUPO-PSI/psi-mi-CV/master/psi-mi.obo
    license: CC-BY 4.0
    hierarchy: true (OBO is_a)
    trait_categories: [FUNC_INTERACTION_PARTNER]
    added_round: 1
    seeder: seed_obo.py (psimi)

  - key: pato
    name: PATO (physicochemical quality whitelist)
    prefix: PATO
    status: seeded
    description: Phenotype And Trait Ontology; curated whitelist of protein-relevant qualities (stability, flexibility, solubility, hydrophobicity, charge).
    homepage: https://github.com/pato-ontology/pato
    download: https://raw.githubusercontent.com/pato-ontology/pato/master/pato.obo
    license: CC-BY 4.0
    hierarchy: true (OBO is_a)
    trait_categories: [STRUCT_STABILITY, STRUCT_DYNAMICS, STRUCT_SURFACE]
    added_round: 1
    seeder: seed_obo.py (pato)

  - key: metpo
    name: METPO (Microbial Ecophysiological Trait & Phenotype Ontology)
    prefix: METPO
    status: seeded
    description: Ecophysiological traits — growth preferences/tolerances and metabolism/enzyme tests (branch-scoped).
    homepage: https://github.com/berkeleybop/metpo
    download: https://raw.githubusercontent.com/berkeleybop/metpo/main/metpo.obo
    license: CC-BY 4.0
    hierarchy: true (OBO is_a)
    trait_categories: [FUNC_ENVIRONMENTAL_RESPONSE, FUNC_ENZYMATIC_ACTIVITY]
    added_round: 1
    seeder: seed_obo.py (metpo)

  - key: curated_stability
    name: Curated structural-stability taxonomy
    prefix: proteintraitsmech
    status: seeded
    description: Condition-specific structural stability (thermal, oxidative, saline, pH, osmotic, pressure, desiccation, chemical, proteolytic, mechanical) × {base, increased, decreased}, parented to PATO stability.
    homepage: https://github.com/CultureBotAI/proteintraitsmech
    download: internal (scripts/seed_stability.py)
    license: CC0-1.0
    hierarchy: true (PATO-parented)
    trait_categories: [STRUCT_STABILITY]
    added_round: 1
    seeder: seed_stability.py

  # ------------------------------------------------------------- candidate ---
  - key: interpro
    name: InterPro
    prefix: InterPro
    status: candidate
    description: Integrative classification of protein families, domains and sites combining Pfam, PROSITE, SMART, PRINTS, PANTHER, PIRSF, SFLD, CDD, HAMAP, NCBIfam, CATH-Gene3D and SUPERFAMILY (~85k entries). Type-specific parent/child hierarchy; GO/PDBe/AlphaFold mappings.
    homepage: https://www.ebi.ac.uk/interpro/
    download: https://ftp.ebi.ac.uk/pub/databases/interpro/current_release/  # entry.list (2.8M) + ParentChildTreeFile.txt (645K) + interpro.xml.gz (40M)
    license: public domain
    license_url: https://www.ebi.ac.uk/licencing/
    hierarchy: true (type-specific; ParentChildTreeFile.txt)
    trait_categories: [STRUCT_DOMAIN, STRUCT_HOMOLOGOUS_SUPERFAMILY, SEQ_MOTIF, MIXED_STRUCTURAL_REPEAT, STRUCT_ACTIVE_SITE, STRUCT_BINDING_SITE, SEQ_MODIFIED_RESIDUE]
    added_round: 2
    priority: 1
    notes: Top pick. Seed ENTRIES (not the 52G+ match files). Scale/redundancy vs existing PROSITE/domain records needs a scoping decision (which entry types; dedup).

  - key: cath_gene3d
    name: CATH-Gene3D
    prefix: CATH
    status: candidate
    description: Canonical Class/Architecture/Topology/Homologous-superfamily hierarchy + FunFams; parents the TED folds.
    homepage: https://www.cathdb.info/
    download: https://www.cathdb.info/download
    license: CC-BY 4.0
    hierarchy: true (C/A/T/H + FunFams)
    trait_categories: [STRUCT_CLASS, STRUCT_ARCHITECTURE, STRUCT_TOPOLOGY, STRUCT_HOMOLOGOUS_SUPERFAMILY, STRUCT_DOMAIN]
    added_round: 2
    priority: 3

  - key: repeatsdb
    name: RepeatsDB
    prefix: RepeatsDB
    status: candidate
    description: Structured tandem-repeat protein classification (Class > Topology > Fold > Clan > Family) over PDB and AlphaFoldDB.
    homepage: https://repeatsdb.org/
    download: https://repeatsdb.org/  # web services / dataset export
    license: CC-BY (paper OA)
    hierarchy: true (5-level)
    trait_categories: [MIXED_STRUCTURAL_REPEAT, STRUCT_FOLD]
    added_round: 2
    priority: 2
    notes: Fills the currently-empty MIXED_STRUCTURAL_REPEAT bucket.

  - key: merops
    name: MEROPS
    prefix: MEROPS
    status: candidate
    description: Peptidase (and inhibitor) classification — clan (structure) → family (sequence) → species.
    homepage: https://www.ebi.ac.uk/merops/
    download: https://ftp.ebi.ac.uk/pub/databases/merops/
    license: LGPL (data) / EBI terms
    license_url: https://www.ebi.ac.uk/licencing/
    hierarchy: true (clan → family → species)
    trait_categories: [FUNC_ENZYMATIC_ACTIVITY, STRUCT_ACTIVE_SITE]
    added_round: 2

  - key: scop2
    name: SCOP2 / SCOPe
    prefix: SCOP
    status: candidate
    description: Structural classification of proteins (class / fold / superfamily / family).
    homepage: https://scop.berkeley.edu/
    download: https://zenodo.org/  # SCOPe parseable files + MySQL dump (Berkeley host blocks bots — use Zenodo)
    license: CC-BY
    hierarchy: true (class/fold/superfamily/family)
    trait_categories: [STRUCT_CLASS, STRUCT_FOLD, STRUCT_HOMOLOGOUS_SUPERFAMILY, STRUCT_DOMAIN]
    added_round: 2
    seeder: seed_scope.py (exists; blocked on Berkeley host — repoint to Zenodo)

  - key: mobidb
    name: MobiDB
    prefix: MobiDB
    status: candidate
    description: Consensus intrinsic-disorder annotations for all UniProt, with ECO evidence and IDPO/GO terms propagated from DisProt.
    homepage: https://mobidb.org/
    download: https://mobidb.org/  # bulk TSV / FASTA / JSON
    license: CC-BY
    hierarchy: false
    trait_categories: [SEQ_DISORDER]
    added_round: 2
    notes: Consensus complement to DisProt's manual set.

  - key: biolip2
    name: BioLiP2
    prefix: BioLiP
    status: candidate
    description: Biologically-relevant ligand–protein binding sites from the PDB.
    homepage: https://zhanggroup.org/BioLiP/
    download: https://zhanggroup.org/BioLiP/download.html
    license: free
    hierarchy: false
    trait_categories: [STRUCT_BINDING_SITE]
    added_round: 2
    notes: Fills the sparse STRUCT_BINDING_SITE bucket.

  - key: metalpdb
    name: MetalPDB
    prefix: MetalPDB
    status: candidate
    description: Metal sites in macromolecular structures as Minimal Functional Site templates, grouped by metal.
    homepage: https://metalpdb.cerm.unifi.it/
    download: https://metalpdb.cerm.unifi.it/  # FTP by metal + flat file
    license: free (CERM)
    hierarchy: partial (grouped by metal / equistructural sites)
    trait_categories: [STRUCT_METAL_SITE]
    added_round: 2
    notes: Fills the sparse STRUCT_METAL_SITE bucket.

  - key: sfld
    name: SFLD (Structure-Function Linkage Database)
    prefix: SFLD
    status: candidate
    description: Enzyme superfamily → subgroup → family hierarchy linking sequence-structure features to chemical capability.
    homepage: http://sfld.rbvi.ucsf.edu/
    download: http://sfld.rbvi.ucsf.edu/archive/  # TSV, MSAs, SSNs
    license: free (UCSF)
    hierarchy: true (superfamily/subgroup/family)
    trait_categories: [FUNC_ENZYMATIC_ACTIVITY]
    added_round: 2
    notes: Static since 2019 but downloadable.

  - key: dbptm
    name: dbPTM
    prefix: dbPTM
    status: candidate
    description: Comprehensive PTM sites (~2.24M experimentally validated) aggregated from 48 databases.
    homepage: https://biomics.lab.nycu.edu.tw/dbPTM/
    download: https://biomics.lab.nycu.edu.tw/dbPTM/download.php
    license: free (academic)
    hierarchy: false (by PTM type)
    trait_categories: [SEQ_MODIFIED_RESIDUE, SEQ_GLYCOSYLATION_SITE, SEQ_CROSSLINK_SITE]
    added_round: 2
    notes: Very large — subset by modification type.

  - key: cazy
    name: CAZy / dbCAN-seq
    prefix: CAZy
    status: candidate
    description: Carbohydrate-active enzyme families (GH, GT, PL, CE, AA, CBM). Bulk data via dbCAN-seq (CAZy itself has no bulk download).
    homepage: http://www.cazy.org/
    download: https://bcb.unl.edu/dbCAN_seq/  # dbCAN-seq bulk
    license: dbCAN-seq CC-BY (non-commercial re-use)
    hierarchy: true (family classes)
    trait_categories: [FUNC_ENZYMATIC_ACTIVITY]
    added_round: 2

  # -------------------------------------------------------------- deferred ---
  - key: ncbifam
    name: NCBIfam (ex-TIGRFAMs)
    prefix: NCBIfam
    status: deferred
    description: ~17k prokaryotic HMMs for family/domain classification.
    homepage: https://www.ncbi.nlm.nih.gov/genome/annotation_prok/
    download: https://ftp.ncbi.nlm.nih.gov/hmm/current/
    license: US Government public domain
    hierarchy: partial
    trait_categories: [STRUCT_DOMAIN, SEQ_MOTIF]
    added_round: 1
    notes: Also an InterPro member DB.

  - key: cdd
    name: CDD (Conserved Domain Database)
    prefix: CDD
    status: deferred
    description: ~68k conserved-domain models with hierarchy.
    homepage: https://www.ncbi.nlm.nih.gov/cdd
    download: https://ftp.ncbi.nlm.nih.gov/pub/mmdb/cdd/
    license: US Government public domain
    hierarchy: true
    trait_categories: [STRUCT_DOMAIN]
    added_round: 1
    notes: Also an InterPro member DB.

  - key: ideal
    name: IDEAL
    prefix: IDEAL
    status: deferred
    description: ~950 intrinsically disordered proteins with ProS binding motifs.
    homepage: https://www.ideal-db.org/
    download: https://www.ideal-db.org/
    license: CC-BY 4.0
    hierarchy: false
    trait_categories: [SEQ_DISORDER]
    added_round: 1
    notes: Small; complements DisProt.

  # -------------------------------------------------------------- rejected ---
  - key: pro
    name: PRO (Protein Ontology)
    prefix: PR
    status: rejected
    description: Ontology of protein entities (families, complexes, isoforms, modified forms).
    homepage: https://proconsortium.org/
    download: http://purl.obolibrary.org/obo/pr.obo
    license: CC-BY 4.0
    hierarchy: true
    trait_categories: []
    added_round: 1
    notes: Rejected — entity ontology, not a trait source; >1 GB reasoned; endpoints flaky.

  - key: elm
    name: ELM (Eukaryotic Linear Motif)
    prefix: ELM
    status: rejected
    description: Manually-curated short linear motif (SLiM) classes (~356).
    homepage: http://elm.eu.org/
    download: http://elm.eu.org/downloads.html
    license: NonCommercial (ELM Software License Agreement)
    hierarchy: true (motif classes)
    trait_categories: [SEQ_MOTIF]
    added_round: 2
    notes: Rejected for ingestion — non-commercial licence incompatible with CC0 redistribution. Link/reference only.
