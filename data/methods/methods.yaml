# ProteinTraitsMech — detection-method catalogue
#
# "How is a trait detected / predicted / computed on a real protein?" Method is
# largely a function of either the DATA SOURCE (how that source's signatures are
# scanned) or the TRAIT CATEGORY (the common-parent feature — e.g. every
# SEQ_DISORDER trait is found by disorder predictors, regardless of source).
# So this catalogue is keyed both ways; the browser resolves a record's methods
# as by_source[src] + by_category[cat] (source first).
#
# Each method is grounded: `edam` = EDAM operation (what it does), `tool` =
# bio.tools id or URL (which software), `ref` = PMID/DOI, `eco` = Evidence &
# Conclusion Ontology code (evidence kind), `recipe` = a runnable command
# template ({input}/{db}/{output} placeholders). This KB *describes* methods —
# it does not run them; recipes are documentation, not a workflow engine.
# See research/methods-recipes-tools-round1.md.

meta:
  edam: http://edamontology.org/
  biotools: https://bio.tools/
  eco: https://www.evidenceontology.org/
  note: >-
    method_type values map to ECO: SEQUENCE_PATTERN/HMM_PROFILE/PROFILE_MATRIX →
    ECO:0000203 (sequence-analysis evidence); ML_PREDICTOR → ECO:0007653
    (computational combinatorial evidence); STRUCTURAL_ALGORITHM → ECO:0000041
    (similarity/structure evidence); HOMOLOGY_TRANSFER → ECO:0000250;
    EXPERIMENTAL → ECO:0000269.

# ---------------------------------------------------------------- by SOURCE ---
by_source:
  PROSITE:
    - name: ps_scan / ScanProsite
      method_type: SEQUENCE_PATTERN
      edam: EDAM:operation_0361        # sequence annotation
      tool: biotools:ps_scan
      ref: PMID:16845026
      eco: ECO:0000203
      recipe: "ps_scan.pl -d prosite.dat {input.fasta}   # or web ScanProsite"
  Pfam:
    - name: hmmsearch / hmmscan (Pfam-A)
      method_type: HMM_PROFILE
      edam: EDAM:operation_0347        # sequence database search (HMM)
      tool: biotools:hmmer
      ref: PMID:22039361
      eco: ECO:0000203
      recipe: "hmmsearch --cut_ga Pfam-A.hmm {input.fasta}"
  InterPro:
    - name: InterProScan
      method_type: HMM_PROFILE
      edam: EDAM:operation_0361
      tool: biotools:interproscan
      ref: PMID:24451626
      eco: ECO:0000203
      recipe: "interproscan.sh -i {input.fasta} -appl Pfam,PROSITE,SMART,Gene3D -f TSV"
  NCBIfam:
    - name: hmmsearch (NCBIfam) / AMRFinderPlus
      method_type: HMM_PROFILE
      edam: EDAM:operation_0347
      tool: biotools:amrfinderplus
      ref: PMID:34135355
      eco: ECO:0000203
      recipe: "hmmsearch hmm_PGAP.HMM {input.fasta}   # or amrfinder -p {input.fasta}"
  CDD:
    - name: RPS-BLAST / CD-Search
      method_type: PROFILE_MATRIX
      edam: EDAM:operation_0347
      tool: biotools:cd-search
      ref: PMID:25414356
      eco: ECO:0000203
      recipe: "rpsblast -query {input.fasta} -db Cdd -evalue 0.01 -outfmt 6"
  ELM:
    - name: SLiMSearch / ELM regex scan
      method_type: SEQUENCE_PATTERN
      edam: EDAM:operation_0239        # sequence motif recognition
      tool: biotools:slimsearch
      ref: PMID:26908899
      eco: ECO:0000203
      recipe: "grep -oP '<Regex>' {input.fasta}   # or ELM/SLiMSearch web with disorder+conservation filters"
  MEROPS:
    - name: MEROPS Batch BLAST / hmmscan
      method_type: HMM_PROFILE
      edam: EDAM:operation_0347
      tool: https://www.ebi.ac.uk/merops/
      ref: PMID:29145643
      eco: ECO:0000203
      recipe: "hmmscan merops_scan.lib {input.fasta}   # or MEROPS Batch BLAST"
  CATH:
    - name: Gene3D (CATH-assign, HMMER)
      method_type: HMM_PROFILE
      edam: EDAM:operation_0303        # fold recognition / structure prediction
      tool: biotools:gene3d
      ref: PMID:33021670
      eco: ECO:0000203
      recipe: "cath-genomescan.pl -i {input.fasta} -l cath-funfam-hmm3.lib"
  SCOPe:
    - name: SUPERFAMILY (SCOP HMMs)
      method_type: HMM_PROFILE
      edam: EDAM:operation_0303
      tool: biotools:superfamily
      ref: PMID:21062764
      eco: ECO:0000203
      recipe: "hmmscan supfam.hmm {input.fasta}"
  TED:
    - name: Merizo / Chainsaw (domain chopping) + Foldseek
      method_type: STRUCTURAL_ALGORITHM
      edam: EDAM:operation_3899        # protein-domain assignment / structure comparison
      tool: biotools:foldseek
      ref: PMID:38538027
      eco: ECO:0000041
      recipe: "merizo predict {input.pdb}; foldseek easy-search {input.pdb} tedDB res tmp"
  RepeatsDB:
    - name: ReUPred / structural repeat detection
      method_type: STRUCTURAL_ALGORITHM
      edam: EDAM:operation_2488        # protein secondary/structure feature
      tool: https://repeatsdb.org/
      ref: PMID:36629399
      eco: ECO:0000041
      recipe: "# ReUPred on {input.pdb}; or map via RepeatsDB annotations"
  TCDB:
    - name: BLAST vs TCDB (TCDB-BLAST)
      method_type: HOMOLOGY_TRANSFER
      edam: EDAM:operation_0346        # sequence similarity search
      tool: https://tcdb.org/
      ref: PMID:33170213
      eco: ECO:0000250
      recipe: "blastp -query {input.fasta} -db tcdb -evalue 1e-5   # TCDB-BLAST"
  COG:
    - name: eggNOG-mapper / COGclassifier / RPS-BLAST(COG)
      method_type: HOMOLOGY_TRANSFER
      edam: EDAM:operation_0324        # phylogenetic/ortholog inference
      tool: biotools:eggnog-mapper
      ref: PMID:34597405
      eco: ECO:0000250
      recipe: "emapper.py -i {input.fasta} -o out   # COG in the annotations"
  ExPASy ENZYME:
    - name: EC-number prediction (DeepEC / CLEAN) or InterPro2GO transfer
      method_type: ML_PREDICTOR
      edam: EDAM:operation_3778        # text/EC annotation; enzyme prediction
      tool: biotools:deepec
      ref: PMID:36219571
      eco: ECO:0007653
      recipe: "CLEAN --fasta {input.fasta}   # predict EC; or transfer from InterPro/UniRule"
  Rhea:
    - name: reaction assignment via EC / UniProt annotation
      method_type: HOMOLOGY_TRANSFER
      edam: EDAM:operation_3803
      tool: https://www.rhea-db.org/
      ref: PMID:34755880
      eco: ECO:0000250
      recipe: "# Rhea follows from the assigned EC / UniProt catalytic-activity annotation"
  CARD/ARO:
    - name: RGI (Resistance Gene Identifier)
      method_type: HOMOLOGY_TRANSFER
      edam: EDAM:operation_3482        # antimicrobial resistance prediction
      tool: biotools:rgi
      ref: PMID:36263822
      eco: ECO:0000250
      recipe: "rgi main -i {input.fasta} -t protein -o rgi_out"
  M-CSA:
    - name: catalytic-site transfer (homology to M-CSA templates)
      method_type: HOMOLOGY_TRANSFER
      edam: EDAM:operation_0420        # catalytic residue prediction
      tool: https://www.ebi.ac.uk/thornton-srv/m-csa/
      ref: PMID:29140459
      eco: ECO:0000250
      recipe: "# transfer catalytic residues from the aligned M-CSA reference structure"
  DisProt:
    - name: (curated experimental; see SEQ_DISORDER predictors)
      method_type: EXPERIMENTAL
      edam: EDAM:operation_0472
      tool: https://disprot.org/
      ref: PMID:34850135
      eco: ECO:0000269
      recipe: "# DisProt regions are curated from experiment; predict with by_category SEQ_DISORDER tools"

# -------------------------------------------------------------- by CATEGORY ---
