  a_label: Src homology 3 domain of SH3 and multiple ankyrin repeat domains protein
    1. Shank1, also called SSTRIP (Somatostatin receptor-interacting protein), is
    a brain-specific protein that plays a role in the construction of postsynaptic
    density (PSD) and the maturation of dendritic spines. Mice deficient in Shank1
    show altered PSD composition, thinner PSDs, smaller dendritic spines, and weaker
    basal synaptic transmission, although synaptic plasticity is normal. They show
    increased anxiety and impaired fear memory, but also show better spatial learning.
    Shank proteins carry scaffolding functions through multiple sites of protein-protein
    interaction in its domain architecture, including ankyrin (ANK) repeats, a long
    proline rich region, as well as SH3, PDZ, and SAM domains. The SH3 domain of Shank
    binds GRIP, a scaffold protein that binds AMPA receptors and Eph receptors/ligands.
    SH3 domains are protein interaction domains that bind to proline-rich ligands
    with moderate affinity and selectivity, preferentially to PxxP motifs. They play
    versatile and diverse roles in the cell including the regulation of enzymes, changing
    the subcellular localization of signaling pathway components, and mediating the
    formation of multiprotein complex assemblies.
  b_label: Shank1, SH3 domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
