  a_label: Dot/Icm type IV secretion system effector MavE. The Icm/Dot protein translocation
    apparatus is a type IVb secretion system, highly related to bacterial conjugative
    DNA transfer systems, and is important in establishing a replication vacuole.
    A complex of Icm/Dot proteins spans the bacterial envelope, allowing the transfer
    of proteins from the bacterial cytoplasm across membranes located in the target
    host eukaryotic cell. Icm/Dot-translocated substrates (IDTS) control construction
    of the replication compartment and have been shown to directly regulate membrane
    traffic associated with the movement of vesicles along steps in the early secretory
    system. Although the function of Legionella MavE is unknown, it has been shown
    to be an Icm/Dot-translocated substrate and is assumed to play a role in this
    type IV secretion system.
