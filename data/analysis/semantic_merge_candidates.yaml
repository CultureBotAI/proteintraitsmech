  a_label: Bromodomain, repeat I in Rsc1/2_like subfamily, specific to fungi. Rsc1
    and Rsc2 are components of the RSC complex (remodeling the structure of chromatin),
    are essential for transcriptional control, and have a specific domain architecture
    including two bromodomains. The RSC complex has also been linked to homologous
    recombination and nonhomologous end-joining repair of DNA double strand breaks.
    Bromodomains are 110 amino acid long domains, that are found in many chromatin
    associated proteins. Bromodomains can interact specifically with acetylated lysine.
  b_label: Chromatin structure-remodeling complex subunit RSC1/2, bromodomain
