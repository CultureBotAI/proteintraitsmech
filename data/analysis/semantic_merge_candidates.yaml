  a_label: first protein kinase C conserved region 1 (C1 domain) found in diacylglycerol
    kinase eta (DAG kinase eta) and similar proteins. Diacylglycerol (DAG) kinase
    (EC 2.7.1.107) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic
    acid. DAG kinase eta, also called diglyceride kinase eta (DGK-eta), plays a key
    role in promoting cell growth. It is classified as a type II DAG kinase (DGK),
    containing pleckstrin homology (PH) and sterile alpha motifs (SAM) domains, in
    addition to C1 and catalytic domains that are present in all DGKs. The SAM domain
    mediates oligomerization of type II DGKs. The diacylglycerol kinase eta gene,
    DGKH, is a replicated risk gene of bipolar disorder (BPD). DAG kinase eta contains
    two copies of the C1 domain. This model corresponds to the first one. The C1 domain
    is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural
    similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding
    sites.
  b_label: Diacylglycerol kinase eta, second protein kinase C conserved region 1
