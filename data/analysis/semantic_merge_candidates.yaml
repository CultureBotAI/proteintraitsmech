  a_label: Snx41 /Atg20, PX domain
  b_label: The phosphoinositide binding Phox Homology domain of fungal Sorting Nexins
    41 and 42. The PX domain is a phosphoinositide (PI) binding module present in
    many proteins with diverse functions. Sorting nexins (SNXs) make up the largest
    group among PX domain containing proteins. They are involved in regulating membrane
    traffic and protein sorting in the endosomal system. The PX domain of SNXs binds
    PIs and targets the protein to PI-enriched membranes. SNXs differ from each other
    in PI-binding specificity and affinity, and the presence of other protein-protein
    interaction domains, which help determine subcellular localization and specific
    function in the endocytic pathway. Some SNXs are localized in early endosome structures
    such as clathrin-coated pits, while others are located in late structures of the
    endocytic pathway. SNX41 and SNX42 (also called Atg20p) form dimers with SNX4,
    and are required in protein recycling from the sorting endosome (post-Golgi endosome)
    back to the late Golgi in yeast.
