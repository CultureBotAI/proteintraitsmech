  a_label: 'FYVE-related domain found in Rab effector Noc2 and similar proteins. Rab
    effector Noc2, also termed No C2 domains protein, or rabphilin-3A-like protein
    (RPH3AL), is a Rab3 effector that mediates the regulation of secretory vesicle
    exocytosis in neurons and certain endocrine cells. It also functions as a Rab27
    effector and is involved in isoproterenol (IPR)-stimulated amylase release from
    acinar cells. Noc2 contains an N-terminal Rab3A effector domain which harbors
