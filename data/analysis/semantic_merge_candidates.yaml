  a_label: Frizzled 2, cysteine-rich domain
  b_label: Cysteine-rich Wnt-binding domain (CRD) of the frizzled 9 (Fz9) receptor.
    The cysteine-rich domain (CRD) is an essential extracellular portion of the frizzled
    9 (Fz9) receptor, and is required for binding Wnt proteins, which play fundamental
    roles in many aspects of early development, such as cell and tissue polarity,
    neural synapse formation, and the regulation of proliferation. Fz proteins serve
    as Wnt receptors for multiple signal transduction pathways, including both beta-catenin
    dependent and -independent cellular signaling, as well as the planar cell polarity
    pathway and Ca(2+) modulating signaling pathway. CRD containing Fzs have been
    found in diverse species from amoebas to mammals. 10 different frizzled proteins
    are found in vertebrata. Fz9 may play a signaling role in lymphoid development
    and maturation, particularly at points where B cells undergo self-renewal prior
    to further differentiation.
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: InterPro
  b_source: CDD
- a: InterPro:IPR042130
  b: CDD:cd07284
  similarity: 0.952
  a_label: SNX7, PX domain
  b_label: The phosphoinositide binding Phox Homology domain of Sorting Nexin 7. The
    PX domain is a phosphoinositide (PI) binding module present in many proteins with
    diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain
    containing proteins. They are involved in regulating membrane traffic and protein
    sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the
    protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity
    and affinity, and the presence of other protein-protein interaction domains, which
    help determine subcellular localization and specific function in the endocytic
    pathway. Some SNXs are localized in early endosome structures such as clathrin-coated
    pits, while others are located in late structures of the endocytic pathway. SNX7
    harbors a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature,
    C-terminal to the PX domain, similar to the sorting nexins SNX1-2, SNX4-6, SNX8,
    SNX30, and SNX32. Both domains have been shown to determine the specific membrane-targeting
    of SNX1. The specific function of SNX7 has yet to be elucidated.
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: InterPro
  b_source: CDD
- a: InterPro:IPR044106
  b: CDD:cd06860
