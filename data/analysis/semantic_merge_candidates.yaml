  a_label: hydroxyacylglutathione hydrolase, MBL-fold metallo-hydrolase domain. hydroxyacylglutathione
    hydrolase (EC 3.1.2.6, also known as, glyoxalase II; S-2-hydroxylacylglutathione
    hydrolase; hydroxyacylglutathione hydrolase; acetoacetylglutathione hydrolase).
    In the second step of the glycoxlase system this enzyme hydrolyzes S-d-lactoylglutathione
    to d-lactate and regenerates glutathione in the process. It has broad substrate
    specificity for glutathione thiol esters, hydrolyzing a number of these species
    to their corresponding carboxylic acids and reduced glutathione. It appears to
    hydrolyze 2-hydroxy thiol esters with greatest efficiency. It belongs to the MBL-fold
    metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes
    which carry out a variety of biological functions.
  b_label: Hydroxyacylglutathione hydrolase, MBL domain
