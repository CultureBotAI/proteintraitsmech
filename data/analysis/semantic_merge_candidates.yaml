    VbhT toxin of the mammalian pathogen Bartonella schoenbuchensis is responsible
    for the disruptive adenylation of host proteins. VbhT also induces FIC-domain-mediated
    growth arrest in bacteria; it is inhibited by this antitoxin which binds to block
