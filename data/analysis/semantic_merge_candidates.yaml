  a_label: Phenylalanyl-tRNA synthetase (PheRS) beta chain core domain. PheRS belongs
    to class II aminoacyl-tRNA synthetases (aaRS) based upon its structure. While
    class II aaRSs generally aminoacylate the 3'-OH ribose of the appropriate tRNA,  PheRS
    is an exception in that it attaches the amino acid at the 2'-OH group, like class
    I aaRSs. PheRS is an alpha-2/ beta-2 tetramer. While the alpha chain contains
    a catalytic core domain, the beta chain has a non-catalytic core domain.
  b_label: Phenylalanyl tRNA synthetase beta chain, core domain
