    Cys2HisCys5HisCys2His. This subfamily includes the ePHD finger of A. thaliana
    histone-lysine N-methyltransferase arabidopsis trithorax-like proteins ATX3 (also
    termed protein SET domain group 14, or trithorax-homolog protein 3), ATX4 (also
    termed protein SET domain group 16, or trithorax-homolog protein 4) and ATX5 (also
    termed protein SET domain group 29, or trithorax-homolog protein 5), which belong
    to the histone-lysine methyltransferase family. These proteins show distinct phylogenetic
    origins from the family of ATX1 and ATX2. They are multi-domain proteins that
    consist of an N-terminal PWWP domain, a canonical PHD finger, this non-canonical
    extended PHD finger, and a C-terminal SET domain.
