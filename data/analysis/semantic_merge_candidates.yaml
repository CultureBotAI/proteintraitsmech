  a_label: PRY/SPRY domain of tripartite motif-binding protein 38 (TRIM38), also known
    as Ring finger protein 15 (RNF15). This domain, consisting of the distinct N-terminal
    PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM38,
    which is also known as RING finger protein 15 (RNF15) or RORET. TRIM38 domains
    are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. TRIM38
    has been shown to act as a suppressor in TOLL-like receptor (TLR)-mediated interferon
    (IFN)-beta induction by promoting degradation of TRAF6 and NAP1 through the ubiquitin-proteasome
    system. Another study has shown that TRIM38 may act as a novel negative regulator
    for TLR3-mediated IFN-beta signaling by targeting TRIF for degradation. TRIM38
    has been identified as a critical negative regulator in TNFalpha- and IL-1beta-triggered
    activation of NF-kappaB and MAP Kinases (MAPKs); it causes degradation of two
    essential cellular components, TGFbeta-associated kinase 1 (TAK1)-associating
    chaperones 2 and 3 (TAB2/3). The degradation is promoted through a lysosomal-dependent
    pathway, which requires the C-terminal PRY-SPRY of TRIM38. Enterovirus 71 infection
    induces degradation of TRIM38, suggesting that TRIM38 may play a role in viral
    infections.
