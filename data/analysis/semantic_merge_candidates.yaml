  a_label: One of two cysteine-rich domains of the corin protein, a type II transmembrane
    serine protease . The cysteine-rich domain (CRD) is an essential component of
    corin, a type II transmembrane serine protease which functions as the convertase
    of the pro-atrial natriuretic peptide (pro-ANP) in the heart. Corin contains two
    CRDs in its extracellular region, which play an important role in recognition
    of the physiological substrate, pro-ANP. This model characterizes the first (N-terminal)
    CRD.
