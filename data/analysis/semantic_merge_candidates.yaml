  a_label: Src homology 3 domain of Alpha1,6-fucosyltransferase (Fut8). Fut8 catalyzes
    the alpha1,6-linkage of a fucose residue from a donor substrate to N-linked oligosaccharides
    on glycoproteins in a process called core fucosylation, which is crucial for growth
    factor receptor-mediated biological functions. Fut8-deficient mice show severe
    growth retardation, early death, and a pulmonary emphysema-like phenotype. Fut8
    is also implicated to play roles in aging and cancer metastasis. It contains an
    N-terminal coiled-coil domain, a catalytic domain, and a C-terminal SH3 domain.
    The SH3 domain of Fut8 is located in the lumen and its role in glycosyl transfer
    is unclear. SH3 domains are protein interaction domains that bind to proline-rich
    ligands with moderate affinity and selectivity, preferentially to PxxP motifs.
    They play versatile and diverse roles in the cell including the regulation of
    enzymes, changing the subcellular localization of signaling pathway components,
    and mediating the formation of multiprotein complex assemblies.
