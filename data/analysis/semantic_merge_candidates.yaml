  a_label: Ectodomain of Ephrins. Ephrins and their receptors EphR play an important
    role in cell communication in normal physiology, as well as in disease pathogenesis.
    Binding of the ephrin (Eph) ligand to EphR requires cell-cell contact, since both
    molecules are anchored to the plasma membrane. The resulting downstream signals
    occur bidirectionally in both EphR-expressing cells (forward signaling, depending
    on Eph kinase activity) and ephrin-expressing cells (reverse signaling). Eph signaling
    controls cell morphology, adhesion, migration and invasion. Ephrins can be subdivided
    into 2 groups, A and B, depending on their respective receptors EphA or EphB.
    The nine human EphA receptors bind to five GPI-linked ephrin-A ligands and the
    five EphB receptors bind to three transmembrane ephrin-B ligands. Interactions
    are promiscuous within each class, and some Eph receptors can also bind to ephrins
    of the other class. All ephrins contain a highly conserved ectodomain for receptor
    binding, which is characterized by this domain hierarchy.
  b_label: Ephrin-B ectodomain
