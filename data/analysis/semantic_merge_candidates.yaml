  a_label: N-terminal domain of cobyric acid synthase. Cobyric acid synthase (CobQ,
    CbiP) N-terminal domain. CobQ plays a role in the cobalamin (vitamin B12) biosynthesis
    pathway. CobQ catalyzes the ATP-dependent amidation of adenosyl-cobyrinic acid
    a,c-diamide at carboxylates positions b, d, e, and g to produce cobyric acid using
    glutamine or ammonia as the nitrogen source. The C-terminal glutaminase domain
    catalyzes the hydrolysis of glutamine to glutamate and ammonia. Ammonia is translocated
    via an intramolecular tunnel to the N-terminal domain for the synthesis of cobyric
    acid.
  b_label: Cobyric acid synthase, N-terminal domain
