  a_label: C-terminal Src Homology 3 domain of Nebulette and LIM-nebulette (or Lasp2).
    Nebulette is a cardiac-specific protein that localizes to the Z-disc. It interacts
    with tropomyosin and is important in stabilizing actin thin filaments in cardiac
    muscles. Polymorphisms in the nebulette gene are associated with dilated cardiomyopathy,
    with some mutations resulting in severe heart failure. Nebulette is a 107kD protein
    that contains an N-terminal acidic region, multiple nebulin repeats, and a C-terminal
    SH3 domain. LIM-nebulette, also called Lasp2 (LIM and SH3 domain protein 2), is
    an alternatively spliced variant of nebulette. Although it shares a gene with
    nebulette, Lasp2 is not transcribed from a muscle-specific promoter, giving rise
    to its multiple tissue expression pattern with highest amounts in the brain. It
    can crosslink actin filaments and it affects cell spreading. Lasp2 is a 34kD protein
    containing an N-terminal LIM domain, three nebulin repeats, and a C-terminal SH3
    domain. SH3 domains are protein interaction domains that bind to proline-rich
    ligands with moderate affinity and selectivity, preferentially to PxxP motifs.
    They play versatile and diverse roles in the cell including the regulation of
    enzymes, changing the subcellular localization of signaling pathway components,
    and mediating the formation of multiprotein complex assemblies.
  b_label: Nebulette, SH3 domain
