  a_label: Cargo binding domain of myosin 5a. Class V myosins are well studied unconventional
    myosins, represented by three paralogs (Myo5a,b,c) in vertebrates.  Their C-terminal
    cargo binding domains (CBDs) are important for the binding of a diverse set of
    cargos, including membrane vesicles, organelles, proteins and mRNA. They interact
    with several adaptor proteins, in case of Myo5a-CBD, melanophilin (MLPH), Rab
    interacting lysosomal protein-like 2 (RILPL2), and granuphilin. Mutations in human
    Myo5a (many of which map to the cargo binding domain) lead to Griscelli syndrome,
    a severe neurological disease.
