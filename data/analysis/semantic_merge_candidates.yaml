  a_label: RNA recognition motif (RRM) found in RAD52 motif-containing protein 1 (RDM1)
    and similar proteins. This subfamily corresponds to the RRM of RDM1, also termed
    RAD52 homolog B, a novel factor involved in the cellular response to the anti-cancer
    drug cisplatin in vertebrates. RDM1 contains a small RD motif that shares with
    the recombination and repair protein RAD52, and an RNA recognition motif (RRM),
    also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). The RD
    motif is responsible for the acidic pH-dependent DNA-binding properties of RDM1.
    It interacts with ss- and dsDNA, and may act as a DNA-damage recognition factor
    by recognizing the distortions of the double helix caused by cisplatin-DNA adducts
    in vitro. In addition, due to the presence of RRM, RDM1 can bind to RNA as well
    as DNA.
  b_label: RDM1, RNA recognition motif
