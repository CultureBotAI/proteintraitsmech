  a_label: The Sema domain, a protein interacting module, of semaphorin 5C (sema5C).
    In Drosophila, Sema5C was identified as an early development gene, which is expressed
    in stage 2 embryos with a striped pattern emerging at later stages. Sema5c may
    play a role in odor-guided behavior and in tumorigenesis. Sema5C belongs to class
    5 semaphorin family of proteins, which are transmembrane glycoproteins characterized
    by unique thrombospondin specific repeats in the extracellular region of the protein.
    Semaphorins are regulatory molecules involved in the development of the nervous
    system and in axonal guidance. They also play important roles in other biological
    processes, such as angiogenesis, immune regulation, respiration systems and cancer.
    The Sema domain is located at the N-terminus and contains four disulfide bonds
    formed by eight conserved cysteine residues. It serves as a receptor-recognition
    and -binding module.
