  a_label: SAM domain of ASZ1 subfamily. SAM (sterile alpha motif) domain of ASZ1
    (Ankyrin, SAM, leucine Zipper) also known as GASZ (Germ cell-specific Ankyrin,
    SAM, leucine Zipper) subfamily is a potential protein-protein interaction domain.
    Proteins of this group are involved in the repression of transposable elements
    during spermatogenesis, oogenesis, and preimplantation embryogenesis. They support
    synthesis of PIWI-interacting RNA via association with some PIWI proteins, such
    as MILI and MIWI. This association is required for initiation and maintenance
    of retrotransposon repression during the meiosis. In mice lacking ASZ1, DNA damage
    and delayed germ cell maturation was observed due to retrotransposons releasing
    from their repressed state.
  b_label: ASZ1, SAM domain
