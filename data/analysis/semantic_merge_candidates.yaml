    ARID-HMG1), HMGB10 (or ARID-HMG2), HMGB11, and HMGB15. They have been termed ARID-HMG
    proteins, due to containing two DNA-binding domains, an N-terminal AT-rich DNA-interacting
    domain (ARID, also known as BRIGHT), and a C-terminal high mobility group (HMG)-box
    domain. They are widely expressed in Arabidopsis and localize primarily to the
    nucleus. HMGB9/ARID-HMG1 binds specifically to A/T-rich DNA. HMGB15 is a transcription
    factor predominantly expressed in mature pollen grains and pollen tubes. It may
    work in the form of a homodimer, or interact with HMGB9, HMGB10 and HMGB11 to
    form heteromultimers in plant cells. HMGB15 is required for pollen tube growth
    in Arabidopsis and is involved in transcriptional regulation through the interaction
    with AGL66 and AGL104.
