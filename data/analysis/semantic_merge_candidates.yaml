  a_label: RING finger, HC subclass, found in ankyrin repeat and IBR domain-containing
    protein 1 (ANKIB1) and similar proteins. ANKIB1 is an RBR-type E3 ubiquitin-protein
    ligase that may function as part of an E3 complex, which accepts ubiquitin from
    specific E2 ubiquitin-conjugating enzymes and then transfers it to substrates.
    It contains an N-terminal ankyrin repeat domain and an RBR domain that was previously
    known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double
    RING finger linked)] domain. Based on current understanding of the structural
