  a_label: 'First Src homology 3 domain of VAV2 protein. VAV2 is widely expressed
    and functions as a guanine nucleotide exchange factor (GEF) for RhoA, RhoB and
    RhoG and also activates Rac1 and Cdc42. It is implicated in many cellular and
    physiological functions including blood pressure control, eye development, neurite
    outgrowth and branching, EGFR endocytosis and degradation, and cell cluster morphology,
    among others. It has been reported to associate with Nek3. VAV proteins contain
    several domains that enable their function: N-terminal calponin homology (CH),
    acidic, RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), C1
    (zinc finger), SH2, and two SH3 domains. The SH3 domain of VAV is involved in
    the localization of proteins to specific sites within the cell, by interacting
    with proline-rich sequences within target proteins. SH3 domains are protein interaction
    domains that bind to proline-rich ligands with moderate affinity and selectivity,
    preferentially to PxxP motifs. They play versatile and diverse roles in the cell
    including the regulation of enzymes, changing the subcellular localization of
    signaling pathway components, and mediating the formation of multiprotein complex
    assemblies.'
  b_label: VAV2 protein, first SH3 domain
