  a_label: RNA recognition motif 2 (RRM2) found in vertebrate myelin expression factor
    2 (MEF-2). This subgroup corresponds to the RRM2 of MEF-2, also termed MyEF-2
    or MST156, a sequence-specific single-stranded DNA (ssDNA) binding protein that
    binds specifically to ssDNA derived from the proximal (MB1) element of the myelin
    basic protein (MBP) promoter and represses transcription of the MBP gene. MEF-2
    contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains)
    or RNPs (ribonucleoprotein domains), which may be responsible for its ssDNA binding
    activity.
  b_label: MEF-2, RNA recognition motif 3
