  a_label: catalytic core domain of discriminating glutamyl-tRNA synthetase. Discriminating
    Glutamyl-tRNA synthetase (GluRS) catalytic core domain . The discriminating form
    of GluRS is only found in bacteria and cellular organelles. GluRS is a monomer
    that attaches Glu to the appropriate tRNA.  Like other class I tRNA synthetases,
    GluRS aminoacylates the 2'-OH of the nucleotide at the 3' end of the tRNA. The
    core domain is based on the Rossman fold and is responsible for the ATP-dependent
    formation of the enzyme bound aminoacyl-adenylate. It contains the characteristic
    class I HIGH and KMSKS motifs, which are involved in ATP binding.
  b_label: Glutamyl-tRNA synthetase
