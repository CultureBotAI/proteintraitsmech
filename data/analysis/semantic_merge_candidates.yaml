  a_label: N-terminal Src homology 2 (SH2) domain found in Spt6. N-terminal SH2 domain
    in Spt6. Spt6 is an essential transcription elongation factor and histone chaperone
    that binds the C-terminal repeat domain (CTD) of RNA polymerase II. Spt6 contains
    a tandem SH2 domain with a novel structure and CTD-binding mode. The tandem SH2
    domain binds to a serine 2-phosphorylated CTD peptide in vitro, whereas its N-terminal
    SH2 subdomain does not. CTD binding requires a positively charged crevice in the
    C-terminal SH2 subdomain, which lacks the canonical phospho-binding pocket of
    SH2 domains. The tandem SH2 domain is apparently required for transcription elongation
    in vivo as its deletion in cells is lethal in the presence of 6-azauracil.  In
    general SH2 domains are involved in signal transduction.  They typically bind
    pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding
    pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated
    sites.
