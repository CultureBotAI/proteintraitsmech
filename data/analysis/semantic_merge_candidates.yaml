  a_label: Imelysin-like domain in iron-regulated protein A. This family includes
    putative iron-regulated protein A (IrpA) mainly from Bacteriodes, proteobacteria
    and cyanobacteria, with domain similar to insulin-cleaving membrane protease (imelysin,
    ICMP) protein. It has been shown to be essential for growth under iron-deficient
    conditions in the cyanobacteria Synechococcus sp. The conserved GxHxxE motif is
    similar to other known imelysin-like proteins that are regulated by iron, such
    as ICMP, IrpA and EfeO. Imelysin is a membrane protein with the active site outside
    the cell envelope. The tertiary structure shows a fold consisting of two domains,
