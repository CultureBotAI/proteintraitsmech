  a_label: PHD finger 2 found in nuclear SET domain-containing protein 2 (NSD2). NSD2,
    also termed histone-lysine N-methyltransferase NSD2, or multiple myeloma SET domain-containing
    protein (MMSET), or protein trithorax-5 Wolf-Hirschhorn syndrome candidate 1 protein
    (WHSC1), is overexpressed frequently in the t(4;14) translocation in 15% to 20%
    of multiple myeloma. It plays important roles in cancer cell proliferation, survival,
    and tumor growth, by mediating constitutive NF-kappaB signaling via the cytokine
    autocrine loop. It also enhances androgen receptor (AR)-mediated transcription.
    The principal chromatin-regulatory activity of NSD2 is dimethylation of histone
    H3 at lysine 36 (H3K36me2). NSD2 contains a catalytic suppressor of variegation,
    enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-prolin
    motif (PWWP) domains, a high mobility group (HMG) box, five PHD (plant homeodomain)
    zinc fingers, and an NSD-specific Cys-His rich domain (Cys5HisCysHis). The SET
    domain is responsible for histone methyltransferase activity. The PWWP, HMG, and
    PHD fingers mediate chromatin interaction and recognition of histone marks. This
    model corresponds to the second PHD finger.
  b_label: Nuclear SET domain-containing protein 2, third PHD finger
