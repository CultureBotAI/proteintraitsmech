  a_label: 'Polymerase and Histidinol Phosphatase domain of alpha-subunit of bacterial
    polymerase III. PolIIIAs that contain an N-terminal PHP domain have been classified
    into four basic groups based on genome composition, phylogenetic, and domain structural
    analysis: polC, dnaE1, dnaE2, and dnaE3. The PHP (also called histidinol phosphatase-2/HIS2)
    domain is associated with several types of DNA polymerases, such as PolIIIA and
    family X DNA polymerases, stand alone histidinol phosphate phosphatases (HisPPases),
    and a number of uncharacterized protein families. DNA polymerase III holoenzyme
    is one of the five eubacterial DNA polymerases that is responsible for the replication
    of the DNA duplex. The alpha subunit of DNA polymerase III core enzyme catalyzes
    the reaction for polymerizing both DNA strands. The PolIIIA PHP domain has four
    conserved sequence motifs and contains an invariant histidine that is involved
    in metal ion coordination, and like other PHP structures, exhibits a distorted
    (beta/alpha) 7 barrel and coordinates up to 3 metals. Initially, it was proposed
    that PHP region might be involved in pyrophosphate hydrolysis, but such activity
    has not been found. It has been shown that the PHP domain of PolIIIA has a trinuclear
    metal complex and is capable of proofreading activity.'
