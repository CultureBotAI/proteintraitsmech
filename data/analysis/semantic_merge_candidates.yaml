  a_label: cytoplasmic tRNA 2-thiolation protein 1 and similar proteins. This subfamily
    includes human cytoplasmic tRNA 2-thiolation protein 1, also called cytosolic
    thiouridylase subunit 1 (CTU1), ATP-binding domain-containing protein 3 (ATPBD3),
    cancer-associated gene protein, or cytoplasmic tRNA adenylyltransferase 1. CTU1
    plays a central role in 2-thiolation of mcm(5)S(2)U at tRNA wobble positions of
    tRNA(Lys), tRNA(Glu) and tRNA(Gln). It directly binds tRNAs and probably acts
    by catalyzing adenylation of tRNAs, an intermediate required for 2-thiolation.
    The CTU1-like subfamily belongs to the nucleotide alpha hydrolase (AANH) superfamily
    that includes N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha
    fold which binds to the adenosine group.
