  a_label: Src Homology 3 domain of Brain-specific Angiogenesis Inhibitor 1-Associated
    Protein 2-Like 1, also called Insulin Receptor Tyrosine Kinase Substrate (IRTKS).
    BAIAP2L1 or IRTKS is widely expressed, serves as a substrate for the insulin receptor,
    and binds the small GTPase Rac. It plays a role in regulating the actin cytoskeleton
    and colocalizes with F-actin, cortactin, VASP, and vinculin. BAIAP2L1 expression
    leads to the formation of short actin bundles, distinct from filopodia-like protrusions
    induced by the expression of the related protein IRSp53. IRTKS mediates the recruitment
    of effector proteins Tir and EspFu, which regulate host cell actin reorganization,
    to bacterial attachment sites. It contains an N-terminal IMD or Inverse-Bin/Amphiphysin/Rvs
    (I-BAR) domain, an SH3 domain, and a WASP homology 2 (WH2) actin-binding motif
    at the C-terminus. The SH3 domain of IRTKS has been shown to bind the proline-rich
    C-terminus of EspFu. SH3 domains are protein interaction domains that bind to
    proline-rich ligands with moderate affinity and selectivity, preferentially to
    PxxP motifs. They play versatile and diverse roles in the cell including the regulation
    of enzymes, changing the subcellular localization of signaling pathway components,
    and mediating the formation of multiprotein complex assemblies.
  b_label: IRTKS, SH3 domain
