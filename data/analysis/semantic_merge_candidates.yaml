    motif protein 46) plays a novel role in the regulation of embryonic stem cell
    (ESC) differentiation by regulating the degradation of beta-catenin mRNA. It also
    regulates trophectoderm specification by stabilizing Cdx2 mRNA in early mouse
    embryos. RBM46 contains three RNA recognition motifs (RRMs) and a C-terminal double-stranded
    RNA binding motif (DSRM) that is not sequence specific, but highly specific for
