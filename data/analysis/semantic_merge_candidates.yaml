  a_label: This alignment model represents the N-terminal rieske domain of the oxygenase
    alpha subunit of aminopyrrolnitrin oxygenase (PrnD).  PrnD is a novel Rieske N-oxygenase
    that catalyzes the final step in the pyrrolnitrin biosynthetic pathway, the oxidation
    of the amino group in aminopyrrolnitrin to a nitro group, forming the antibiotic
    pyrrolnitrin. The biosynthesis of pyrrolnitrin is one of the best examples of
    enzyme-catalyzed arylamine oxidation. Although arylamine oxygenases are widely
    distributed within the microbial world and used in a variety of metabolic reactions,
    PrnD represents one of only two known examples of arylamine oxygenases or N-oxygenases
    involved in arylnitro group formation, the other being AurF involved in aureothin
    biosynthesis.
