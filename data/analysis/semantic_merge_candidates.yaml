  a_label: PRY/SPRY domain in tripartite motif-binding protein 58 (TRIM58), also known
    as BIA2. This domain, consisting of the distinct N-terminal PRY subdomain followed
    by the SPRY subdomain, is found at the C-terminus of TRIM58, also known as BIA2.
    TRIM58 domains are composed of RING/B-box/coiled-coil core and also known as RBCC
    proteins.It is implicated by genome-wide association studies (GWAS) to regulate
    erythrocyte traits, including cell size and number. Trim58 facilitates erythroblast
    enucleation by inducing proteolytic degradation of the microtubule motor dynein.
  b_label: E3 ubiquitin-protein ligase TRIM58, PRY/SPRY domain
