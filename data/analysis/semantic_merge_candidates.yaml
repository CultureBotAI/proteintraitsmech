  a_label: central coiled-coil domain of McIdas (or multicilin). McIdas (also called
    Idas or multicilin), together with geminin coiled-coil domain-containing protein
    1 (GemC1) and geminin, controls both the cell cycle and differentiation decisions
    in cells. Idas binds to geminin and is implicated in DNA replication control.
