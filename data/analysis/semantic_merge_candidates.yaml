  a_label: Src homology 2 domain found in Signal-transducing adaptor protein 1 (STAP1).
    STAP1 is a signal-transducing adaptor protein. It is composed of a Pleckstrin
    homology (PH) and SH2 domains along with several tyrosine phosphorylation sites.
    STAP-1 is an ortholog of BRDG1 (BCR downstream signaling 1). STAP1 protein functions
    as a docking protein acting downstream of Tec tyrosine kinase in B cell antigen
    receptor signaling. The protein is phosphorylated by Tec and participates in a
    positive feedback loop, increasing Tec activity. STAP1 has been shown to interact
    with C19orf2, an unconventional prefoldin RPB5 interactor. In general SH2 domains
    are involved in signal transduction. They typically bind pTyr-containing ligands
    via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins
    with SH2 domains to localize to tyrosine phosphorylated sites.
