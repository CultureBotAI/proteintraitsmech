  a_label: second RING finger, HC subclass, found in Arabidopsis thaliana ORTHRUS
    and similar proteins. This subfamily includes Arabidopsis thaliana ORTHRUS 1-5.
    They are E3 ubiquitin-protein ligases that may participate in CpG methylation-dependent
    transcriptional regulation and/or epigenetic transcriptional silencing. ORTHRUS
    1 mediates ubiquitination with the E2 ubiquitin-conjugating enzymes UBC11, UBC8
    and UBC8 homologs (e.g. UBC10, UBC11, UBC28 and UBC29) but not with UBC27, UBC30,
