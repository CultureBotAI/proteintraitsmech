  a_label: Src Homology 3 domain of the p40phox subunit of NADPH oxidase. p40phox,
    also called Neutrophil cytosol factor 4 (NCF-4), is a cytosolic subunit of the
    phagocytic NADPH oxidase complex (also called Nox2 or gp91phox) which plays a
    crucial role in the cellular response to bacterial infection. NADPH oxidase catalyzes
    the transfer of electrons from NADPH to oxygen during phagocytosis forming superoxide
    and reactive oxygen species. p40phox positively regulates NADPH oxidase in both
    phosphatidylinositol-3-phosphate (PI3P)-dependent and PI3P-independent manner.
    It contains an N-terminal PX domain, a central SH3 domain, and a C-terminal PB1
    domain that interacts with p67phox. The SH3 domain of p40phox binds to canonical
    polyproline and noncanonical motifs at the C-terminus of p47phox. SH3 domains
    are protein interaction domains that bind to proline-rich ligands with moderate
    affinity and selectivity, preferentially to PxxP motifs. They play versatile and
