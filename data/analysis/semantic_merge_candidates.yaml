  a_label: C-terminal Src Homology 3 domain of LIM and SH3 domain protein 1. Lasp1
    is a cytoplasmic protein that binds focal adhesion proteins and is involved in
    cell signaling, migration, and proliferation. It is overexpressed in several cancer
    cells including breast, ovarian, bladder, and liver. In cancer cells, it can be
    found in the nucleus; its degree of nuclear localization correlates with tumor
    size and poor prognosis. Lasp1 is a 36kD protein containing an N-terminal LIM
    domain, two nebulin repeats, and a C-terminal SH3 domain. SH3 domains are protein
    interaction domains that bind to proline-rich ligands with moderate affinity and
    selectivity, preferentially to PxxP motifs. They play versatile and diverse roles
    in the cell including the regulation of enzymes, changing the subcellular localization
    of signaling pathway components, and mediating the formation of multiprotein complex
    assemblies.
  b_label: Lasp1, SH3 domain
