  a_label: Tumor necrosis factor receptor superfamily member ectodysplasin A receptor
    (EDAR). Ectodysplasin A receptor (EDAR, also known as DL, ED3, ED5, ED1R, EDA3,
    HRM1, EDA1R, ECTD10A, ECTD10B, EDA-A1R) binds the soluble ligand ectodysplasin
    A and can activate the nuclear factor-kappaB, JNK, and caspase-independent cell
    death pathways. It is required for the development of hair, teeth, and other ectodermal
    derivatives. Mutations in this gene result in autosomal dominant and recessive
    forms of hypohidrotic ectodermal dysplasia. Patients present defects in the development
