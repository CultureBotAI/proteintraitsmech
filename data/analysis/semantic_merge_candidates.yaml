  a_label: The Sema domain, a protein interacting module, of Plexin A2. Plexin A2
    serves as a receptor for class 6 semaphorins. Interactions between Plexin A2,
    A4 and semaphorins 6A and 6B control the lamina-restricted projection of hippocampal
    mossy fibers. Sema6B also repels the growth of mossy fibers in a Plexin A4 dependent
    manner. Plexin A2 does not suppress Sema6B function. In addition, studies have
    shown that Plexin A2 may be related to anxiety and other psychiatric disorders.
    The Sema domain is located at the N-terminus and contains four disulfide bonds
    formed by eight conserved cysteine residues. It serves as a ligand-recognition
    and -binding module.
  b_label: Plexin-A2, sema domain
