  a_label: cwf21 domain found in serine/arginine repetitive matrix protein 2. Serine/arginine
    repetitive matrix protein 2 (SRRM2) is also called 300 kDa nuclear matrix antigen,
    serine/arginine-rich splicing factor-related nuclear matrix protein of 300 kDa,
    SR-related nuclear matrix protein of 300 kDa, Ser/Arg-related nuclear matrix protein
    of 300 kDa, splicing coactivator subunit SRm300, or Tax-responsive enhancer element-binding
    protein 803 (TaxREB803). It is required for pre-mRNA splicing as component of
    the spliceosome. It contains a cwf21 domain at the N-terminus. The cwf21 domain
    is involved in mRNA splicing; it binds directly to the spliceosomal protein Prp8.
