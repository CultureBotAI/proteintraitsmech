  a_label: Tudor domain found in Tudor domain-containing protein 3 (TDRD3) and similar
    proteins. TDRD3 is a scaffolding protein that specifically recognizes and binds
    dimethylarginine-containing proteins. In the nucleus, it acts as a coactivator;
    it recognizes and binds asymmetric dimethylation on the core histone tails associated
    with transcriptional activation (H3R17me2a and H4R3me2a) and recruits proteins
    at these arginine-methylated loci. In the cytoplasm, it may play a role in the
    assembly and/or disassembly of mRNA stress granules and in the regulation of translation
    of target mRNAs by binding Arg/Gly-rich motifs (GAR) in dimethylarginine-containing
    proteins. TDRD3 contains one Tudor domain. The Tudor domain binds to proteins
    with dimethylated arginine or lysine residues, and may also bind methylated histone
    tails to facilitate protein-protein interactions.
