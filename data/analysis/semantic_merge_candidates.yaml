  a_label: F-box domain found in F-box only protein 8 (FBXO8) and similar proteins.
    FBXO8, also called FBX8, or F-box/SEC7 protein FBS, is a novel component of F-box
    proteins which contains an F-box domain and a putative Sec7 domain. FBX8 was originally
    identified as a Skp1-binding protein. It is involved in the ubiquitin-dependent
    proteolytic pathway. It acts as a metastasis suppressor that functions through
    mTOR signaling pathway. FBXO8 may promote the activation of ADP-ribosylation factor
    (ARF) through replacement of GDP with GTP. The F-box domain has a role in mediating
    protein-protein interactions in a variety of contexts, such as polyubiquitination,
    transcription elongation, centromere binding and translational repression.
