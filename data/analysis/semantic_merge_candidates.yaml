    It may be involved in testis-specific nuclear post-transcriptional processes such
    as heterogeneous nuclear RNA (hnRNA) packaging, alternative splicing, or nuclear/cytoplasmic
    transport of mRNAs. ADAD1 contains a double-stranded RNA binding motif (DSRM)
    and a C-terminal adenosine-deaminase (editase) domain. DSRM is not sequence specific,
    but highly specific for dsRNAs of various origin and structure.
