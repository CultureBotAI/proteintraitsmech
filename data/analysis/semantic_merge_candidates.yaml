  a_label: Tudor domain found in Tudor domain-containing protein 11 (TDRD11) and similar
    proteins. TDRD11, also called Staphylococcal nuclease domain-containing protein
    1 (SND1), 100 kDa coactivator, EBNA2 coactivator p100, or p100 co-activator, is
    a multifunctional protein that is reportedly associated with different types of
    RNA molecules, including mRNA, miRNA, pre-miRNA, and dsRNA. It has been implicated
    in a number of biological processes in eukaryotic cells, including the cell cycle,
    DNA damage repair, proliferation, and apoptosis. TDRD11 is overexpressed in multiple
    cancers and functions as an oncogene. It contains multiple Staphylococcal nuclease
    (SN) domains and a C-terminal Tudor domain. The Tudor domain binds to proteins
    with dimethylated arginine or lysine residues, and may also bind methylated histone
    tails to facilitate protein-protein interactions.
