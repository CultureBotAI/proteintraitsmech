  a_label: Catalytic domain of the Protein Serine/Threonine Kinase, Never In Mitosis
    gene A (NIMA)-related kinase 9. STKs catalyze the transfer of the gamma-phosphoryl
    group from ATP to serine/threonine residues on protein substrates. Nek9, also
    called Nercc1, is primarily a cytoplasmic protein but can also localize in the
    nucleus. It is involved in modulating chromosome alignment and splitting during
    mitosis. It interacts with the gamma-tubulin ring complex and the Ran GTPase,
    and is implicated in microtubule organization. Nek9 associates with FACT (FAcilitates
    Chromatin Transcription) and modulates interphase progression. It also interacts
    with Nek6, and Nek7, during mitosis, resulting in their activation. Nek9 is one
    in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control.
    The Nek family is part of a larger superfamily that includes the catalytic domains
    of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase,
    choline kinase, and phosphoinositide 3-kinase.
  b_label: Serine/threonine-protein kinase Nek9, catalytic domain
