  a_label: Src Homology 3 domain of beta-Pak Interactive eXchange factor. Beta-PIX,
    also called Rho guanine nucleotide exchange factor 7 (ARHGEF7) or Cool (Cloned
    out of Library)-1, activates small GTPases by exchanging bound GDP for free GTP.
    It acts as a GEF for both Cdc42 and Rac 1, and plays important roles in regulating
    neuroendocrine exocytosis, focal adhesion maturation, cell migration, synaptic
    vesicle localization, and insulin secretion. PIX proteins contain an N-terminal
    SH3 domain followed by RhoGEF (also called Dbl-homologous or DH) and Pleckstrin
    Homology (PH) domains, and a C-terminal leucine-zipper domain for dimerization.
    The SH3 domain of PIX binds to an atypical PxxxPR motif in p21-activated kinases
    (PAKs) with high affinity. The binding of PAKs to PIX facilitate the localization
    of PAKs to focal complexes and also localizes PAKs to PIX targets Cdc43 and Rac,
    leading to the activation of PAKs. SH3 domains are protein interaction domains
    that bind to proline-rich ligands with moderate affinity and selectivity, preferentially
    to PxxP motifs. They play versatile and diverse roles in the cell including the
