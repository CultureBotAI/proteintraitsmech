  a_label: RNA recognition motif 1 (RRM1) found in yeast nucleolar protein 13 (Nop13p)
    and similar proteins. This subfamily corresponds to the RRM1 of Nop13p encoded
    by YNL175c from Saccharomyces cerevisiae. It shares high sequence similarity with
    nucleolar protein 12 (Nop12p). Both, Nop12p and Nop13p, are not essential for
    growth. However, unlike Nop12p that is localized to the nucleolus, Nop13p localizes
    primarily to the nucleolus but is also present in the nucleoplasm to a lesser
    extent. Nop13p contains two RNA recognition motifs (RRMs), also termed RBDs (RNA
    binding domains) or RNPs (ribonucleoprotein domains).
  b_label: Nop12, RNA recognition motif 1
