  b: InterPro:IPR042721
  similarity: 0.943
  a_label: Putative Transposase B from transposon Tn554, C-terminal catalytic domain.
    This family includes putative Transposase B from transposon Tn554. It belongs
    to a DNA breaking-rejoining enzyme superfamily. The catalytic domain containing
    six conserved active site residues. The recombination reaction involves cleavage
    of a single strand of a DNA duplex by nucleophilic attack of a conserved tyrosine
    to give a 3' phosphotyrosyl protein-DNA adduct. In the second rejoining step,
    a terminal 5' hydroxyl attacks the covalent adduct to release the enzyme and generate
    duplex DNA. Many DNA breaking-rejoining enzymes also have N-terminal domains,
    which show little sequence or structure similarity.
  b_label: Transposase A from transposon Tn554, C-terminal catalytic domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01387
  b: InterPro:IPR036057
  similarity: 0.943
  a_label: class XV mammal-like myosin, motor domain. The class XV myosins are monomeric.
    In vertebrates, myosin XV appears to be expressed in sensory tissue and play a
    role in hearing. The catalytic (head) domain has ATPase activity and belongs to
    the larger group of P-loop NTPases. C-terminal to the head domain are 2 MyTH4
    domain, a FERM domain, and a SH3 domain. Myosins are actin-dependent molecular
    motors that play important roles in muscle contraction, cell motility, and organelle
    transport. The head domain is a molecular motor, which utilizes ATP hydrolysis
    to generate directed movement toward the plus end along actin filaments. A cyclical
    interaction between myosin and actin provides the driving force. Rates of ATP
    hydrolysis and consequently the speed of movement along actin filaments vary widely,
    from about 0.04 micrometer per second for myosin I to 4.5 micrometer per second
    for myosin II in skeletal muscle. Myosin II moves in discrete steps about 5-10
    nm long and generates 1-5 piconewtons of force. Upon ATP binding, the myosin head
    dissociates from an actin filament. ATP hydrolysis causes the head to pivot and
    associate with a new actin subunit. The release of Pi causes the head to pivot
    and move the filament (power stroke). Release of ADP completes the cycle. CyMoBase
    classifications were used to confirm and identify the myosins in this hierarchy.
  b_label: Class XV myosin, motor domain
