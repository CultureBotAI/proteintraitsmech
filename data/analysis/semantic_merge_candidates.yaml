  a_label: Alpha crystallin domain (ACD) found in mammalian small heat shock protein
    (sHsp) HspB7, also known as cardiovascular small heat shock protein (cvHsp), and
    similar proteins. sHsps are molecular chaperones that suppress protein aggregation
    and protect against cell stress, and are generally active as large oligomers consisting
    of multiple subunits. HspB7 is a 25-kDa protein, preferentially expressed in heart
    and skeletal muscle. It binds the cytoskeleton protein alpha-filamin (also known
    as actin-binding protein 280). The expression of HspB7 is increased during rat
    muscle aging.  Its expression is also modulated in obesity implicating this protein
    in this and related metabolic disorders. As the human gene encoding HspB7 is mapped
    to chromosome 1p36.23-p34.3 it is a positional candidate for several dystrophies
    and myopathies.
  b_label: Heat shock protein beta-7, ACD domain
