  a_label: Src homology 3 domains of Rab3-interacting molecules (RIMs) binding proteins.
    RIMs binding proteins (RBPs, RIM-BPs) associate with calcium channels present
    in photoreceptors, neurons, and hair cells; they interact simultaneously with
    specific calcium channel subunits, and active zone proteins, RIM1 and RIM2. RIMs
    are part of the matrix at the presynaptic active zone and are associated with
    synaptic vesicles through their interaction with the small GTPase Rab3. RIM-BPs
    play a role in regulating synaptic transmission by serving as adaptors and linking
    calcium channels with the synaptic vesicle release machinery. RIM-BPs contain
    three SH3 domains and two to three fibronectin III repeats. Invertebrates contain
    one, while vertebrates contain at least two RIM-BPs, RIM-BP1 and RIM-BP2. RIM-BP1
    is also called peripheral-type benzodiazapine receptor associated protein 1 (PRAX-1).
    Mammals contain a third protein, RIM-BP3. RIM-BP1 and RIM-BP2 are predominantly
    expressed in the brain where they display overlapping but distinct expression
    patterns, while RIM-BP3 is almost exclusively expressed in the testis and is essential
    in spermiogenesis. The SH3 domains of RIM-BPs bind to the PxxP motifs of RIM1,
    RIM2, and L-type (alpha1D) and N-type (alpha1B) calcium channel subunits. SH3
    domains are protein interaction domains that bind to proline-rich ligands with
    moderate affinity and selectivity. They play versatile and diverse roles in the
    cell including the regulation of enzymes, changing the subcellular localization
    of signaling pathway components, and mediating the formation of multiprotein complex
    assemblies.
  b_label: RIMS-binding protein, second SH3 domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
