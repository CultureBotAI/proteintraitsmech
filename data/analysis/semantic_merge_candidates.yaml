  a_label: DotG/IcmE is a homolog of VirB10 which forms part of core complex in Type
    IV secretion system. This family contains DotG/IcmE (VirB10 homolog) and a component
    of the type IV secretion system (T4SS), and similar proteins. The Dot/Icm system
    is a T4SS found in the pathogens Legionella and Coxiella and the conjugative apparatus
    of IncI plasmids; T4SS is employed by pathogenic bacteria to export virulence
    DNAs and/or proteins directly from the bacterial cytoplasm into the host cell.
    Similar to T4SS VirB/D components, the Legionella Dot/Icm secretion apparatus
    contains a critical five-protein sub-assembly that forms the membrane-spanning
    'core-complex' (CC), around which all other components assemble. This transmembrane
    connection is mediated by protein dimer pairs consisting of two inner membrane
    proteins, DotF and DotG, each independently associating with DotH/DotC/DotD in
    the outer membrane.
