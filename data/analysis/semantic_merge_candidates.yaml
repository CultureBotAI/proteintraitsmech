  similarity: 0.941
  a_label: Second or C-terminal Src homology 3 domain of NADPH oxidase (Nox) Organizing
    protein 1. Nox Organizing protein 1 (NoxO1) is a critical regulator of enzyme
    kinetics of the nonphagocytic NADPH oxidase Nox1, which catalyzes the transfer
    of electrons from NADPH to molecular oxygen to form superoxide. Nox1 is expressed
    in colon, stomach, uterus, prostate, and vascular smooth muscle cells. NoxO1 is
    involved in targeting activator subunits (such as NoxA1) to Nox1. It is co-localized
    with Nox1 in the membranes of resting cells and directs the subcellular localization
    of Nox1. NoxO1 contains an N-terminal Phox homology (PX) domain, tandem SH3 domains
    (N-SH3 and C-SH3), and a C-terminal proline-rich region (PRR). This model characterizes
    the second SH3 domain (or C-SH3) of NoxO1. The tandem SH3 domains of NoxO1 interact
    with the PRR of p22phox, which also complexes with Nox1. SH3 domains are protein
    interaction domains that bind to proline-rich ligands with moderate affinity and
    selectivity, preferentially to PxxP motifs. They play versatile and diverse roles
    in the cell including the regulation of enzymes, changing the subcellular localization
    of signaling pathway components, and mediating the formation of multiprotein complex
    assemblies.
  b_label: NADPH oxidase organiser 1, second SH3 domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
