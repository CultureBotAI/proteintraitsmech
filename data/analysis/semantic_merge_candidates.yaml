  a_label: The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of Slit-Robo
    GTPase Activating Protein 3. F-BAR domains are dimerization modules that bind
    and bend membranes and are found in proteins involved in membrane dynamics and
    actin reorganization. Slit-Robo GTPase Activating Proteins (srGAPs) are Rho GAPs
    that interact with Robo1, the transmembrane receptor of Slit proteins. Slit proteins
    are secreted proteins that control axon guidance and the migration of neurons
    and leukocytes. Vertebrates contain three isoforms of srGAPs. srGAP3, also called
    MEGAP (MEntal disorder associated GTPase-Activating Protein), is a Rho GAP with
    activity towards Rac1 and Cdc42. It impacts cell migration by regulating actin
    and microtubule cytoskeletal dynamics. The association between srGAP3 haploinsufficiency
    and mental retardation is under debate. srGAP3 contains an N-terminal F-BAR domain,
    a Rho GAP domain, and a C-terminal SH3 domain. F-BAR domains form banana-shaped
    dimers with a positively-charged concave surface that binds to negatively-charged
    lipid membranes. They can induce membrane deformation in the form of long tubules.
  b_label: Slit-Robo GTPase Activating Protein 3, F-BAR domain
