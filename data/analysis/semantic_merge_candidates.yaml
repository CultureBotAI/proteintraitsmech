  a_label: double-stranded RNA binding motif of Saccharomyces cerevisiae mitochondrial
    54S ribosomal protein L3 (MRPL3) and similar proteins. MRPL3 (also called mitochondrial
    large ribosomal subunit protein mL44) is a component of the mitochondrial ribosome
