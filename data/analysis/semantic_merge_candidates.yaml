  a_label: RING finger, H2 subclass, found in RING finger protein 149 (RNF149) and
    similar proteins. RNF149, also known as DNA polymerase-transactivated protein
    2, is an E3 ubiquitin-protein ligase that interacts with wild-type v-Raf murine
    sarcoma viral oncogene homolog B1 (BRAF), a RING domain-containing E3 ubiquitin
    ligase involved in control of gene transcription, translation, cytoskeletal organization,
    cell adhesion, and epithelial development. RNF149 induces the ubiquitination of
    wild-type BRAF and promotes its proteasome-dependent degradation. Mutated RNF149
