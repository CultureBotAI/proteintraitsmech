  a_label: XPF-like nuclease domain of Fanconi anemia group M protein (FANCM). FANCM
    (EC 3.6.4.13), also called Fanconi anemia-associated polypeptide of 250 kDa (FAAP250),
    or protein Hef ortholog, or ATP-dependent RNA helicase FANCM, is a DNA-dependent
    ATPase component of the Fanconi anemia (FA) core complex. It is required for the
    normal activation of the FA pathway, leading to monoubiquitination of the FANCI-FANCD2
    complex in response to DNA damage, cellular resistance to DNA cross-linking drugs,
    and prevention of chromosomal breakage. In complex with CENPS and CENPX, it binds
    double-stranded DNA (dsDNA), fork-structured DNA (fsDNA) and Holliday junction
    substrates. In complex with FAAP24, it efficiently binds to single-strand DNA
    (ssDNA), splayed-arm DNA, and 3'-flap substrates. In vitro, on its own, FANCM
    strongly binds ssDNA oligomers and weakly fsDNA, but does not bind to dsDNA.
  b_label: Fanconi anemia group M protein, XPF-like nuclease domain
