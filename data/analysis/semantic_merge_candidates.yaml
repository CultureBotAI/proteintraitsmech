  a_label: Ubiquitin specific peptidase 1
  b_label: Peptidase C19 contains ubiquitinyl hydrolases. They are intracellular peptidases
    that remove ubiquitin molecules from polyubiquinated peptides by cleavage of isopeptide
    bonds. They hydrolyse bonds involving the carboxyl group of the C-terminal Gly
    residue of ubiquitin The purpose of the de-ubiquitination is thought to be editing
    of the ubiquitin conjugates, which could rescue them from degradation, as well
    as recycling of the ubiquitin. The ubiquitin/proteasome system is responsible
    for most protein turnover in the mammalian cell, and with over 50 members, family
    C19 is one of the largest families of peptidases in the human genome.
