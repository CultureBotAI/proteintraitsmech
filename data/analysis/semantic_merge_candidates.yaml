  a_label: RNA recognition motif 2 (RRM2) found in putative RNA binding motif protein
    15B (RBM15B) from vertebrate. This subgroup corresponds to the RRM2 of RBM15B,
    also termed one twenty-two 3 (OTT3), a paralog of RNA binding motif protein 15
    (RBM15), also known as One-twenty two protein 1 (OTT1). Like RBM15, RBM15B has
