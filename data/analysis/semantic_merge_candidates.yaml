  a_label: TRX-GRX-like family, Alkyl hydroperoxide reductase F subunit (AhpF) N-terminal
    domain (NTD) subfamily, C-terminal TRX-fold subdomain; AhpF is a homodimeric flavoenzyme
    which catalyzes the NADH-dependent reduction of the peroxiredoxin AhpC, which
    then reduces hydrogen peroxide and organic hydroperoxides. AhpF contains an NTD
    containing two contiguous TRX-fold subdomains similar to Pyrococcus furiosus protein
    disulfide oxidoreductase (PfPDO). It also contains a catalytic core similar to
    TRX reductase containing FAD and NADH binding domains with an active site disulfide.
    The proposed mechanism of action of AhpF is similar to a TRX/TRX reductase system.
    The flow of reducing equivalents goes from NADH -> catalytic core of AhpF -> NTD
    of AhpF -> AhpC -> peroxide substrates. The catalytic CXXC motif of the NTD of
    AhpF is contained in its C-terminal TRX subdomain.
  b_label: AhpF, N-terminal domain, C-terminal TRX-fold subdomain
