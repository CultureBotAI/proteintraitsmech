  a_label: RNA recognition motif 1 (RRM1) found in vertebrate RNA-binding protein
    4 (RBM4). This subgroup corresponds to the RRM1 of RBM4, a ubiquitously expressed
    splicing factor that has two isoforms, RBM4A (also known as Lark homolog) and
    RBM4B (also known as RBM30), which are very similar in structure and sequence.
    RBM4 may function as a translational regulator of stress-associated mRNAs and
    also plays a role in micro-RNA-mediated gene regulation. RBM4 contains two N-terminal
    RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs
    (ribonucleoprotein domains), a CCHC-type zinc finger, and three alanine-rich regions
    within their C-terminal regions. The C-terminal region may be crucial for nuclear
    localization and protein-protein interaction. The RRMs, in combination with the
    C-terminal region, are responsible for the splicing function of RBM4.
  b_label: RBM4, RNA recognition motif 1
