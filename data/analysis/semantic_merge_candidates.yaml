  a_label: Glutamine binding domain of ABC-type transporter; the type 2 periplasmic
    binding protein fold. This periplasmic substrate-binding component serves as an
    initial receptor in the ABC transport of glutamine in bacteria and eukaryota.
    GlnH belongs to the type 2 periplasmic-binding fold protein (PBP2) superfamily,
    whose members are involved in chemotaxis and uptake of nutrients and other small
    molecules from the extracellular space as a primary receptor. PBP2 typically comprises
    of two globular subdomains connected by a flexible hinge and bind their ligand
    in the cleft between these domains in a manner resembling a Venus flytrap. After
    binding their specific ligand with high affinity, they can interact with a cognate
    membrane transport complex comprised of two integral membrane domains and two
    receptor cytoplasmically-located ATPase domains. This interaction triggers the
    ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis.
  b_label: Glutamine-binding periplasmic protein GlnH, type 2 periplasmic binding
    protein fold
