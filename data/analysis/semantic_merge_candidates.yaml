  a_label: Cytochrome c oxidase subunit VIb. Cytochrome c oxidase (CcO), the terminal
    oxidase in the respiratory chains of eukaryotes and most bacteria, is a multi-chain
    transmembrane protein located in the inner membrane of mitochondria and the cell
    membrane of prokaryotes. It catalyzes the reduction of O2 and simultaneously pumps
    protons across the membrane. The number of subunits varies from three to five
    in bacteria and up to 13 in mammalian mitochondria. Subunits I, II, and III of
    mammalian CcO are encoded within the mitochondrial genome and the remaining 10
    subunits are encoded within the nuclear genome. Found only in eukaryotes, subunit
    VIb is one of three mammalian subunits that lacks a transmembrane region. It is
    located on the cytosolic side of the membrane and helps form the dimer interface
    with the corresponding subunit on the other monomer complex.
  b_label: Cytochrome c oxidase subunit 2, C-terminal
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01210
  b: InterPro:IPR033928
  similarity: 0.956
  a_label: 'Epidermal growth factor receptor kinase substrate (EPS8)-like Phosphotyrosine-binding
    (PTB) domain. EPS8 is a regulator of Rac signaling. It consists of a PTB and an
    SH3 domain. PTB domains have a common PH-like fold and are found in various eukaryotic
    signaling molecules. This domain was initially shown to binds peptides with a
    NPXY motif with differing requirements for phosphorylation of the tyrosine, although
    more recent studies have found that some types of PTB domains can bind to peptides
    lack tyrosine residues altogether. In contrast to SH2 domains, which recognize
    phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity
    is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are
    classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent
    IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part
    of the Dab-like subgroup.'
  b_label: Epidermal growth factor receptor kinase substrate, phosphotyrosine-binding
    domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01215
  b: InterPro:IPR048561
  similarity: 0.956
  a_label: 'Disabled (Dab) Phosphotyrosine-binding domain. Dab is a cystosolic adaptor
    protein, which binds to the cytoplasmic tails of lipoprotein receptors, such as
    ApoER2 and VLDLR, via its PTB domain. The dab PTB domain has a preference for
    unphosphorylated tyrosine within an NPxY motif. Additionally, the Dab PTB domain,
    which is structurally similar to PH domains, binds to phosphatidlyinositol phosphate
    4,5 bisphosphate in a manner characteristic of phosphoinositide binding PH domains.
    PTB domains have a common PH-like fold and are found in various eukaryotic signaling
    molecules. This domain was initially shown to binds peptides with a NPXY motif
    with differing requirements for phosphorylation of the tyrosine, although more
    recent studies have found that some types of PTB domains can bind to peptides
    lack tyrosine residues altogether. In contrast to SH2 domains, which recognize
    phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity
    is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are
    classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent
    IRS-like, and phosphotyrosine-independent Dab-like PTB domains. This cd is part
    of the Dab-like subgroup.'
  b_label: Disabled, phosphotyrosine-binding domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd02418
  b: InterPro:IPR039563
  similarity: 0.956
  a_label: A sub-family of peptidase family C39. Peptidase family C39 mostly contains
    bacteriocin-processing endopeptidases from bacteria. The cysteine peptidases in
    family C39 cleave the "double-glycine" leader peptides from the precursors of
    various bacteriocins (mostly non-lantibiotic). The cleavage is mediated by the
    transporter as part of the secretion process. Bacteriocins are antibiotic proteins
    secreted by some species of bacteria that inhibit the growth of other bacterial
    species. The bacteriocin is synthesized as a precursor with an N-terminal leader
    peptide, and processing involves removal of the leader peptide by cleavage at
    a Gly-Gly bond, followed by translocation of the mature bacteriocin across the
    cytoplasmic membrane. Most endopeptidases of family C39 are N-terminal domains
    in larger proteins (ABC transporters) that serve both functions. The proposed
    protease active site is conserved in this sub-family.
  b_label: Peptidase C39 single domain protein
