  a_label: B-box-type 2 zinc finger  found in tripartite motif-containing protein
    66 (TRIM66) and similar proteins. TRIM66, also termed transcriptional intermediary
    factor 1 delta (TIF1delta), is a novel heterochromatin protein 1 (HP1)-interacting
    member of the transcriptional intermediary factor 1 (TIF1) family expressed by
    elongating spermatids. Like other TIF1 proteins, TRIM66 displays a potent trichostatin
    A (TSA)-sensitive repression function; TSA is a specific inhibitor of histone
    deacetylases. Moreover, TRIM66 plays an important role in heterochromatin-mediated
    gene silencing during postmeiotic phases of spermatogenesis. It functions as a
    negative regulator of postmeiotic genes acting through HP1 isotype gamma (HP1gamma)
    complex formation and centromere association. TRIM66 belongs to an unclassified
    TRIM (tripartite motif) family of proteins that do not have RING fingers and thus
    lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC
    motif. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding
    consensus motif.
