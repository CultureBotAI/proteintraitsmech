    may be involved in the initiation of hepatocyte growth. It inhibits the aggregation
    of alpha-synuclein, which has implications for Parkinson's disease. ABTB2 functions
    as an adaptor protein for the E3 ubiquitin ligase scaffold protein Cullin-3. It
    directly binds to eukaryotic elongation factor 1A1 (eEF1A1) to promote eEF1A1
    ubiquitylation and degradation and prevent translation. It is also involved in
    the growth suppressive effect of the phosphatase and tensin homolog (PTEN). This
    subfamily also includes BTB/POZ domain-containing protein 11 (BTBD11), also called
    ankyrin repeat and BTB/POZ domain-containing protein BTBD11. It is a BTB-domain-containing
    Kelch-like protein with unknown function.
  b_label: Ankyrin repeat and BTB/POZ domain-containing protein 2, BTB/POZ domain
