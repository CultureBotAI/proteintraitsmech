  b: InterPro:IPR033791
  similarity: 0.977
  a_label: Pesticin Translocation And Receptor Binding Domain. Pesticin (Pst) is a
    anti-bacterial toxin produced by Yersinia pestis that acts through uptake by the
    target related bacteria and the hydrolysis of peptidoglycan in the periplasm.
    Pst contains an N-terminal translocation domain, an intermediate receptor binding
    domain, and a phage-lysozyme like C-terminal activity domain. The N-terminal domain
    is further divided into the TonB box (which binds TonB) , the T (translocation
    domain) and the R (receptor binding domain). Bacteriocins such as pesticin are
    produced by gram-negative bacteria to attack related bacteria stains. Pst is transported
    to the periplasm via FyuA, an outer-membrane receptor of Y. pestis and E. coli,
    where it hydrolyzes peptidoglycan via the cleavage of N-acetylmuramic acid and
    C4 of N-acetylglucosamine. Disruption of the peptidoglycan layer renders the bacteria
    vulnerable to lysis via osmotic pressure.
  b_label: Pesticin, translocation and receptor binding domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
