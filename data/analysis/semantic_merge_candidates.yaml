  a_label: second Tudor domain found in Tudor domain-containing protein 12 (TDRD12)
    and similar proteins. TDRD12, also called ES cell-associated transcript 8 protein
    (ECAT8), is a putative ATP-dependent DEAD-like RNA helicase that is essential
    for germ cell development and maintenance. It acts as a unique piRNA biogenesis
    factor essential for secondary PIWI interacting RNA (piRNA) biogenesis. TDRD12
    contains two Tudor domains, one at the N-terminus and the other at the C-terminal
    end. The model corresponds to the second/C-terminal one. The Tudor domain binds
    to proteins with dimethylated arginine or lysine residues, and may also bind methylated
    histone tails to facilitate protein-protein interactions.
  b_label: Tudor domain-containing protein 12, first Tudor domain
