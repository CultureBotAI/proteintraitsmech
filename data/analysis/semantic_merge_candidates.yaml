  a_label: AraC/XylS family transcriptional regulators similar to HpaA, N-terminal
    cupin domain. Members of this family contain an N-terminal cupin domain and a
    C-terminal AraC/XylS family helix-turn-helix (HTH) DNA-binding domain, similar
    to Escherichia coli 4-hydroxyphenylacetate catabolism regulatory protein HpaA
    (also known as 4HPA). HpaA is encoded by the hpaA gene which is located upstream
    of hpaBC. It is activated by 4-HPA, 3-HPA and phenylacetate, and represents a
    member of the AraC/XylS family of regulators that recognizes aromatic effectors.
    Proteins in this family belong to the cupin superfamily with a conserved "jelly
    roll-like" beta-barrel fold capable of homodimerization.
  b_label: HpaA-like, N-terminal cupin domain
