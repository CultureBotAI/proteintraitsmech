    (HLH)-containing transcription factors. COE family proteins are all transcription
    factors and play an important role in variety of developmental processes. Mouse
    EBF is involved in the regulation of the early stages of B-cell differentiation,
    Drosophila collier is a regulator of the head patterning, and a related protein
    in Xenopus is involved in primary neurogenesis. All COE family members have a
    well conserved DNA binding domain that contains an atypical Zn finger motif. The
    function of the IPT domain is unknown.
