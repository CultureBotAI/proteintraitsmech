  a_label: A sub-family of peptidase family C39. Peptidase family C39 mostly contains
    bacteriocin-processing endopeptidases from bacteria. The cysteine peptidases in
    family C39 cleave the "double-glycine" leader peptides from the precursors of
    various bacteriocins (mostly non-lantibiotic). The cleavage is mediated by the
    transporter as part of the secretion process. Bacteriocins are antibiotic proteins
    secreted by some species of bacteria that inhibit the growth of other bacterial
    species. The bacteriocin is synthesized as a precursor with an N-terminal leader
    peptide, and processing involves removal of the leader peptide by cleavage at
    a Gly-Gly bond, followed by translocation of the mature bacteriocin across the
    cytoplasmic membrane. Most endopeptidases of family C39 are N-terminal domains
    in larger proteins (ABC transporters) that serve both functions. The proposed
    protease active site is conserved in this sub-family, which contains Colicin V
    perocessing peptidase.
  b_label: Peptidase C39-like
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd03233
  b: InterPro:IPR034003
  similarity: 0.942
  a_label: First domain of the pleiotropic drug resistance-like subfamily G of ATP-binding
    cassette transporters. The pleiotropic drug resistance (PDR) is a well-described
    phenomenon occurring in fungi and shares several similarities with processes in
    bacteria and higher eukaryotes. This PDR subfamily represents domain I of its
    (ABC-IM)2 organization. ABC transporters are a large family of proteins involved
    in the transport of a wide variety of different compounds including sugars, ions,
    peptides, and more complex organic molecules. The nucleotide-binding domain shows
    the highest similarity between all members of the family. ABC transporters are
    a subset of nucleotide hydrolases that contain a signature motif, Q-loop, and
    H-loop/switch region, in addition to, the Walker A motif/P-loop and Walker B motif
    commonly found in a number of ATP- and GTP-binding and hydrolyzing proteins.
  b_label: ATP-binding cassette transporter, PDR-like subfamily G, domain 2
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd04242
  b: InterPro:IPR041739
  similarity: 0.942
  a_label: 'AAK_G5K_ProB: Glutamate-5-kinase (G5K) catalyzes glutamate-dependent ATP
    cleavage; G5K transfers the terminal phosphoryl group of ATP to the gamma-carboxyl
    group of glutamate, in the first and controlling step of proline (and, in mammals,
    ornithine) biosynthesis. G5K is subject to feedback allosteric inhibition by proline
    or ornithine. In microorganisms and plants, proline plays an important role as
    an osmoprotectant and, in mammals, ornithine biosynthesis is crucial for proper
    ammonia detoxification, since a G5K mutation has been shown to cause human hyperammonaemia.
    Microbial G5K generally consists of two domains: a catalytic G5K domain and one
    PUA (pseudo uridine synthases and archaeosine-specific transglycosylases) domain,
    and some lack the PUA domain. G5K requires free Mg for activity, it is tetrameric,
    and it aggregates to higher forms in a proline-dependent way. G5K lacking the
    PUA domain remains tetrameric, active, and proline-inhibitable, but the Mg requirement
    and the proline-triggered aggregation are greatly diminished and abolished, respectively,
    and more proline is needed for inhibition. Although plant and animal G5Ks are
    part of a bifunctional polypeptide, delta 1-pyrroline-5-carboxylate synthetase
    (P5CS), composed of an N-terminal G5K (ProB) and a C-terminal glutamyl 5- phosphate
    reductase (G5PR; ProA); bacterial and yeast G5Ks are monofunctional single-polypeptide
    enzymes. In this CD, all three domain architectures are present: G5K, G5K+PUA,
    and G5K+G5PR.'
  b_label: Glutamate-5-kinase domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd04412
  b: InterPro:IPR037993
  similarity: 0.942
  a_label: 'Nucleoside diphosphate kinase 7 domain B (NDPk7B): The nm23-H7 class of
    nucleoside diphosphate kinase (NDPk7) consists of an N-terminal DM10 domain and
    two functional catalytic NDPk modules, NDPk7A and NDPk7B. The function of the
    DM10 domain, which also occurs in multiple copies in other proteins, is unknown.
    NDPk7 is predominantly expressed in testes, although appreciable amount are also
    found in liver, heart, brain, ovary, small intestine and spleen. The nm23-H7 gene
    is located in or near the hereditary prostrate cancer susceptibility locus. Nm23-H7
    may be involved in the development of colon and gastric carcinoma, the latter
    possibly in a type-specific manner.'
  b_label: NDPK7, second NDPk domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd05087
  b: InterPro:IPR042817
  similarity: 0.942
  a_label: Catalytic domain of the Protein Tyrosine Kinases, Apoptosis-associated
    tyrosine kinase 1. PTKs catalyze the transfer of the gamma-phosphoryl group from
    ATP to tyrosine (tyr) residues in protein substrates. Aatyk1 (or simply Aatyk)
    is also called lemur tyrosine kinase 1 (Lmtk1). It is a cytoplasmic (or nonreceptor)
    kinase containing a long C-terminal region. The expression of Aatyk1  is upregulated
    during growth arrest and apoptosis in myeloid cells. Aatyk1 has been implicated
    in neural differentiation, and is a regulator of the Na-K-2Cl cotransporter, a
    membrane protein involved in cell proliferation and survival, epithelial transport,
    and blood pressure control. The Aatyk1 subfamily is part of a larger superfamily
    that includes the catalytic domains of other kinases such as protein serine/threonine
    kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide
    3-kinase.
  b_label: Serine/threonine-protein kinase LMTK1, catalytic domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd05815
  b: InterPro:IPR034840
  similarity: 0.942
  a_label: Disproportionating enzyme 2 (DPE2), N-terminal CBM20 (carbohydrate-binding
    module, family 20) domain, repeat 1. DPE2 is a transglucosidase that is essential
    for the cytosolic metabolism of maltose in plant leaves at night. Maltose is an
    intermediate on the pathway from starch to sucrose and DPE2 is thought to metabolize
    the maltose that is exported from the chloroplast. DPE2 has two N-terminal CBM20
    starch binding domains as well as a C-terminal amylomaltase (4-alpha-glucanotransferase)
    catalytic domain. DPE1, the plastid version of this enzyme, has a transglucosidase
    domain that is similar to that of DPE2 but lacks the N-terminal carbohydrate-binding
    domains. The CBM20 domain is found in a large number of starch degrading enzymes
    including alpha-amylase, beta-amylase, glucoamylase, and CGTase (cyclodextrin
    glucanotransferase). CBM20 is also present in proteins that have a regulatory
    role in starch metabolism in plants (e.g. alpha-amylase) or glycogen metabolism
    in mammals (e.g. laforin). CBM20 folds as an antiparallel beta-barrel structure
    with two starch binding sites. These two sites are thought to differ functionally
    with site 1 acting as the initial starch recognition site and site 2 involved
    in the specific recognition of appropriate regions of starch.
  b_label: DPE2, CBM20 domain 1
