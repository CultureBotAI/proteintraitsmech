  a_label: third Tudor domain found in Tudor domain-containing protein 6 (TDRD6) and
    similar proteins. TDRD6, also called antigen NY-CO-45 or cancer/testis antigen
    41.2 (CT41.2), is a testis-specific expressed protein that was localized to the
    chromatoid bodies in germ cells, and is involved in spermiogenesis, chromatoid
    body formation, and for proper precursor and mature miRNA expression. Mutations
    in TDRD6 may be associated with human male infertility and early embryonic lethality.
