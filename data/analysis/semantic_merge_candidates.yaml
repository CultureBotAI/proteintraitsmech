  similarity: 0.958
  a_label: Src Homology 3 domain of Src Kinase-Associated Phosphoprotein 1. SKAP1,
    also called SKAP55 (Src kinase-associated protein of 55kDa), is an immune cell-specific
    adaptor protein that plays an important role in T-cell adhesion, migration, and
    integrin clustering. It is expressed exclusively in T-lymphocytes, mast cells,
    and macrophages. Binding partners include ADAP (adhesion and degranulation-promoting
    adaptor protein), Fyn, Riam, RapL, and RasGRP. It contains a pleckstrin homology
    (PH) domain, a C-terminal SH3 domain, and several tyrosine phosphorylation sites.
    The SH3 domain of SKAP1 is necessary for its ability to regulate T-cell conjugation
    with antigen-presenting cells and the formation of LFA-1 clusters. SKAP1 binds
    primarily to a proline-rich region of ADAP through its SH3 domain; its degradation
    is regulated by ADAP. A secondary interaction occurs via the ADAP SH3 domain and
    the RKxxYxxY motif in SKAP1. SH3 domains are protein interaction domains that
    bind to proline-rich ligands with moderate affinity and selectivity, preferentially
    to PxxP motifs. They play versatile and diverse roles in the cell including the
    regulation of enzymes, changing the subcellular localization of signaling pathway
    components, and mediating the formation of multiprotein complex assemblies.
  b_label: Src kinase-associated phosphoprotein 1, SH3 domain
