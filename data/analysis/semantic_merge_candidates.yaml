  a_label: RING finger, H2 subclass, found in RING finger protein 126 (RNF126) and
    similar proteins. RNF126 is a Bag6-dependent E3 ubiquitin ligase that is involved
    in the mislocalized protein (MLP) pathway of quality control. It regulates the
    retrograde sorting of the cation-independent mannose 6-phosphate receptor (CI-MPR).
    Moreover, RNF126 promotes cancer cell proliferation by targeting the tumor suppressor
    p21 for ubiquitin-mediated degradation, and could be a novel therapeutic target
    in breast and prostate cancers. It is also able to ubiquitylate cytidine deaminase
    (AID), a poorly soluble protein that is essential for antibody diversification.
    In addition, RNF126 and the related protein, RNF115 associate with the epidermal
    growth factor receptor (EGFR) and promote ubiquitylation of EGFR, suggesting they
    play a role in the ubiquitin-dependent sorting and downregulation of membrane
    receptors. RNF126 contains an N-terminal BCA2 Zinc-finger domain (BZF), the AKT-phosphorylation
    sites, and the C-terminal C3H2C3-type RING-H2 finger.
  b_label: RNF126, RING finger, H2 subclass
