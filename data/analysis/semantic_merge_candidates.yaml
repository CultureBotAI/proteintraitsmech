  a_label: Src Homology 3 domain of Rho GTPase-activating protein 9 and similar proteins.
    Rho GTPase-activating proteins (RhoGAPs or ARHGAPs) bind to Rho proteins and enhance
    the hydrolysis rates of bound GTP. ARHGAP9 functions as a GAP for Rac and Cdc42,
    but not for RhoA. It negatively regulates cell migration and adhesion. It also
    acts as a docking protein for the MAP kinases Erk2 and p38alpha, and may facilitate
    cross-talk between the Rho GTPase and MAPK pathways to control actin remodeling.
    It contains SH3, WW, Pleckstin homology (PH), and RhoGAP domains. SH3 domains
    bind to proline-rich ligands with moderate affinity and selectivity, preferentially
    to PxxP motifs; they play a role in the regulation of enzymes by intramolecular
    interactions, changing the subcellular localization of signal pathway components
    and mediate multiprotein complex assemblies.
