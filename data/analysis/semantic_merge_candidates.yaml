  a_label: Tudor domain found in mitochondrial A-kinase anchor protein 1 (AKAP1) and
    similar proteins. AKAP1, also called A-kinase anchor protein 149 kDa (AKAP 149),
    dual specificity A-kinase-anchoring protein 1 (D-AKAP-1), protein kinase A-anchoring
    protein 1 (PRKA1), or Spermatid A-kinase anchor protein 84 (S-AKAP84), is found
    in mitochondria and in the endoplasmic reticulum-nuclear envelope, where it anchors
    protein kinases, phosphatases, and a phosphodiesterase. It regulates multiple
    cellular processes governing mitochondrial homeostasis and cell viability. AKAP1
    binds to type I and II regulatory subunits of protein kinase A and anchors them
    to the cytoplasmic face of the mitochondrial outer membrane. It contains a C-terminal
    Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or
    lysine residues, and may also bind methylated histone tails to facilitate protein-protein
    interactions.
