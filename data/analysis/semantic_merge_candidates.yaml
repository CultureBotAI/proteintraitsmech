    DUF1911 and DUF1910 domains. The PoNe domain co-occurs with a variety of N-terminal
    domains such as filamentous hemagglutinin, nuclease, HINT, DUFs, PAAR, RHS repeat,
    or LXG domains. Some members of this family also co-occur with the FIX (Found
