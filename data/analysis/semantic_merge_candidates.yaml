    organisms. Domain I  is suggested to act in D-glycero-D-manno-heptose 1-phosphate
    biosynthesis, while domain II (this family) adds ADP to yield ADP-D-glycero-D-manno-heptose
    .
  b_label: RfaE bifunctional protein, domain II
