  a_label: 'Adenylation domain of putative bacterial ATP-dependent DNA ligases. Bacterial
    DNA ligases are divided into two broad classes: NAD-dependent and ATP-dependent.
    All bacterial species have a NAD-dependent DNA ligase (LigA). Some bacterial genomes
    contain multiple genes for DNA ligases that are predicted to use ATP as their
    cofactor, including Mycobacterium tuberculosis LigB, LigC, and LigD. This group
    is composed of predicted bacterial ATP-dependent DNA ligases. ATP-dependent polynucleotide
    ligases catalyze phosphodiester bond formation using nicked nucleic acid substrates
    with the high energy nucleotide of ATP as a cofactor in a three-step reaction
    mechanism. The adenylation and C-terminal oligonucleotide/oligosaccharide binding
    (OB)-fold domains comprise a catalytic core unit that is common to most members
    of the ATP-dependent DNA ligase family, including this group. The adenylation
    domain binds ATP and contains many of the active site residues.'
  b_label: LigC-like, adenylation domain
  axis: STRUCTURE
