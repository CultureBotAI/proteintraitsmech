    cDNA library screening. BAZ2A is also known as Tip5 (Transcription termination
    factor I-interacting protein 5) and hWALp3. The proteins may play roles in transcriptional
    regulation. Human Tip5 is part of a complex termed NoRC (nucleolar remodeling
    complex), which induces nucleosome sliding and may play a role in the regulation
    of the rDNA locus. Bromodomains are 110 amino acid long domains, that are found
    in many chromatin associated proteins. Bromodomains can interact specifically
    with acetylated lysine.
