  a_label: PHD finger 3 found in Lysine-specific demethylase 5A (KDM5A). KDM5A, also
    termed Histone demethylase JARID1A, or Jumonji/ARID domain-containing protein
    1A, or Retinoblastoma-binding protein 2 (RBBP-2 or RBP2), was originally identified
    as a retinoblastoma protein (Rb)-binding partner and its inactivation may be important
    for Rb to promote differentiation. It is involved in transcription through interacting
    with TBP, p107, nuclear receptors, Myc, Sin3/HDAC, Mad1, RBP-J, CLOCK and BMAL1.
    KDM5A functions as a trimethylated histone H3 lysine 4 (H3K4me3) demethylase that
    belongs to the JARID subfamily within the JmjC proteins. It also displays DNA-binding
    activities that can recognize the specific DNA sequence CCGCCC. KDM5A contains
    the catalytic JmjC domain, JmjN, the BRIGHT domain, which is an AT-rich interacting
    domain (ARID), and a Cys5HisCys2 zinc finger, as well as three plant homeodomain
    (PHD) fingers. This model corresponds to the third PHD finger.
