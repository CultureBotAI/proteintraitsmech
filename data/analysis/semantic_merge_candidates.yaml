  a_label: OCRE domain found in Zinc-finger and OCRE domain-containing Protein 1 (ZOP1)
    and similar proteins found in plant. ZOP1 is a novel plant-specific nucleic acid-binding
    protein required for both RNA-directed DNA methylation (RdDM) and pre-mRNA splicing.
    It promotes RNA polymerase IV (Pol IV)-dependent siRNA accumulation, DNA methylation,
    and transcriptional silencing. As a pre-mRNA splicing factor, ZOP1 associates
    with several typical splicing proteins as well as with RNA polymerase II (RNAP
    II and Pol II). It also shows both RdDM-dependent and -independent roles in transcriptional
    silencing. ZOP1 contains an N-terminal C2H2-type ZnF domain and an OCtamer REpeat
    (OCRE) domain that is usually related to RNA processing.
  b_label: ZOP1, OCRE domain
  axis: STRUCTURE
