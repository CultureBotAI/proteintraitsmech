  a_label: class XIX myosin, motor domain. Monomeric myosin-XIX (Myo19) functions
    as an actin-based motor for mitochondrial movement in vertebrate cells.  It contains
    a variable number of IQ domains. Human myo19 contains a motor domain, three IQ
    motifs, and a short tail. The catalytic (head) domain has ATPase activity and
    belongs to the larger group of P-loop NTPases. Myosins are actin-dependent molecular
    motors that play important roles in muscle contraction, cell motility, and organelle
    transport. The head domain is a molecular motor, which utilizes ATP hydrolysis
    to generate directed movement toward the plus end along actin filaments. A cyclical
    interaction between myosin and actin provides the driving force. Rates of ATP
    hydrolysis and consequently the speed of movement along actin filaments vary widely,
    from about 0.04 micrometer per second for myosin I to 4.5 micrometer per second
    for myosin II in skeletal muscle. Myosin II moves in discrete steps about 5-10
    nm long and generates 1-5 piconewtons of force. Upon ATP binding, the myosin head
    dissociates from an actin filament. ATP hydrolysis causes the head to pivot and
    associate with a new actin subunit. The release of Pi causes the head to pivot
    and move the filament (power stroke). Release of ADP completes the cycle. CyMoBase
    classifications were used to confirm and identify the myosins in this hierarchy.
  b_label: Class XIX myosin, motor domain
