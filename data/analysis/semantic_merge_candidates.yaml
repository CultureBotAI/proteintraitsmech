  a_label: Trans-Isoprenyl Diphosphate Synthases, head-to-head. These trans-Isoprenyl
    Diphosphate Synthases (Trans_IPPS) catalyze a head-to-head (HH) (1'-1) condensation
    reaction. This CD includes squalene and phytoene synthases which catalyze the
    1'-1 condensation of two 15-carbon (farnesyl) and 20-carbon (geranylgeranyl) isoprenyl
    diphosphates, respectively. The catalytic site consists of a large central cavity
    formed by mostly antiparallel alpha helices with two aspartate-rich regions (DXXXD)
    located on opposite walls. These residues mediate binding of prenyl phosphates.
    A two-step reaction has been proposed for squalene synthase (farnesyl-diphosphate
    farnesyltransferase) in which, two molecules of FPP react to form a stable cyclopropylcarbinyl
    diphosphate intermediate, and then the intermediate undergoes heterolysis, isomerization,
    and reduction with NADPH to form squalene, a precursor of cholestrol. The carotenoid
    biosynthesis enzyme, phytoene synthase (CrtB), catalyzes the condensation reaction
    of two molecules of geranylgeranyl diphosphate to produce phytoene, a precursor
    of beta-carotene. These enzymes produce the triterpene and tetraterpene precursors
    for many diverse sterol and carotenoid end products and are widely distributed
    among eukareya, bacteria, and archaea.
  b_label: Trans-isoprenyl diphosphate synthases, head-to-head
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01719
  b: InterPro:IPR034102
  similarity: 0.942
  a_label: Sm protein G. The eukaryotic Sm proteins (B/B', D1, D2, D3, E, F and G)
    assemble into a hetero-heptameric ring around the Sm site of the 2,2,7-trimethyl
    guanosine (m3G) capped U1, U2, U4 and U5 snRNAs (Sm snRNAs) forming the core of
    the snRNP particle. The snRNP particle, in turn, assembles with other components
    onto the pre-mRNA to form the spliceosome which is responsible for the excision
    of introns and the ligation of exons. Members of this family share a highly conserved
    Sm fold containing an N-terminal helix followed by a strongly bent five-stranded
    antiparallel beta-sheet. Sm subunit G binds subunits E and F to form a trimer
    which then assembles onto snRNA along with the D1/D2 and D3/B heterodimers forming
    a seven-membered ring structure.
  b_label: Small nuclear ribonucleoprotein D1
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01720
  b: InterPro:IPR034102
  similarity: 0.942
  a_label: Sm protein D2. The eukaryotic Sm proteins (B/B', D1, D2, D3, E, F and G)
    assemble into a hetero-heptameric ring around the Sm site of the 2,2,7-trimethyl
    guanosine (m3G) capped U1, U2, U4 and U5 snRNAs (Sm snRNAs) forming the core of
    the snRNP particle. The snRNP particle, in turn, assembles with other components
    onto the pre-mRNA to form the spliceosome which is responsible for the excision
    of introns and the ligation of exons. Members of this family share a highly conserved
    Sm fold containing an N-terminal helix followed by a strongly bent five-stranded
    antiparallel beta-sheet. Sm subunit D2 heterodimerizes with subunit D1 and three
    such heterodimers form a hexameric ring structure with alternating D1 and D2 subunits.
    The D1 - D2 heterodimer also assembles into a heptameric ring containing D2, D3,
    E, F, and G subunits.
  b_label: Small nuclear ribonucleoprotein D1
