  a_label: CID (CTD-Interacting Domain) of Regulation of nuclear pre-mRNA domain-containing
    protein 1B. Regulation of nuclear pre-mRNA domain-containing protein 1B (RPRD1B)
    is also called Cell cycle-related and expression-elevated protein in tumor (CREPT).
    RPRD1B is a CID (CTD-Interacting Domain) containing protein that co-purifies with
    RNA polymerase (Pol) II (RNAP II) and three other RNAP II-associated proteins,
    RPAP2, GRINL1A and RECQL5, but not with the Mediator complex. CID binds tightly
    to the carboxy-terminal domain (CTD) of RNAP II. During transcription, RNAP II
    synthesizes eukaryotic messenger RNA. Transcription is coupled to RNA processing
    through the CTD, which consists of up to 52 repeats of the sequence Tyr1-Ser2-Pro3-Thr4-Ser5-Pro6-Ser7.
    RPRD1B form homodimers and heterodimers with RPRD1A through their coiled-coil
    domains. Both RPRD1A and RPRD1B associate directly with RPAP2 phosphatase and
    serve as CTD scaffolds to coordinate the dephosphorylation of phospho-S5 by RPAP2.
    RPRD1B is highly expressed during tumorigenesis and in endometrial cancer, has
    been shown to promote tumor growth by accelerating the cell cycle. CID contains
    eight alpha-helices in a right-handed superhelical arrangement, which closely
    resembles that of the VHS domains and ARM (Armadillo) repeat proteins, except
    for its two amino-terminal helices.
  b_label: RPRD1B, CID domain
