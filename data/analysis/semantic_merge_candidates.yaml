  a_label: B-box-type 2 zinc finger  found in tripartite motif-containing protein
    42 (TRIM42) and similar proteins. TRIM42 belongs to the C-III subclass of TRIM
    (tripartite motif) family of proteins that are defined by their N-terminal RBCC
    (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding
    domains, a RING finger, Bbox1 and Bbox2, and a coiled coil domain. It also has
    a novel cysteine-rich motif N-terminal to the RBCC domain, as well as a COS (carboxyl-terminal
    subgroup one signature) box and a fibronectin type-III (FN3) domain positioned
    C-terminal to the RBCC domain. The type 2 B-box (Bbox2) zinc finger is characterized
    by a CHC3H2 zinc-binding consensus motif. TRIM42 can interact with TRIM27, a known
    cancer-associated protein. Its precise biological function remains unclear.
