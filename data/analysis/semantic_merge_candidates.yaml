  a_label: Vacuolar protein sorting-associated protein 5, PX domain
  b_label: The phosphoinositide binding Phox Homology domain of Sorting Nexins 5 and
    6. The PX domain is a phosphoinositide (PI) binding module present in many proteins
    with diverse functions. Sorting nexins (SNXs) make up the largest group among
    PX domain containing proteins. They are involved in regulating membrane traffic
    and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and
    targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding
    specificity and affinity, and the presence of other protein-protein interaction
    domains, which help determine subcellular localization and specific function in
    the endocytic pathway. Members of this subfamily include SNX5, SNX6, and similar
    proteins. They contain a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane
    curvature, C-terminal to the PX domain, similar to other sorting nexins including
    SNX1-2. The PX-BAR structural unit helps determine the specific membrane-targeting
    of some SNXs. SNX5 and SNX6 may be components of the retromer complex, a membrane
    coat multimeric complex required for endosomal retrieval of lysosomal hydrolase
    receptors to the Golgi, acting as a mammalian equivalent of yeast Vsp17p.
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: InterPro
  b_source: CDD
- a: InterPro:IPR041776
  b: CDD:cd07465
  similarity: 0.957
  a_label: Frizzled 8, cysteine-rich domain
  b_label: Cysteine-rich Wnt-binding domain (CRD) of the frizzled 1 (Fz1) receptor.
    The cysteine-rich domain (CRD) is an essential extracellular portion of the frizzled
    1 (Fz1) receptor, and is required for binding Wnt proteins, which play fundamental
    roles in many aspects of early development, such as cell and tissue polarity,
    neural synapse formation, and the regulation of proliferation. Fz proteins serve
    as Wnt receptors for multiple signal transduction pathways, including both beta-catenin
    dependent and -independent cellular signaling, as well as the planar cell polarity
    pathway and Ca(2+) modulating signaling pathway. CRD containing Fzs have been
    found in diverse species from amoebas to mammals. 10 different frizzled proteins
    are found in vertebrata.
