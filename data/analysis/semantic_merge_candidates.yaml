  a_label: RNA recognition motif 4 (RRM4) found in RNA-binding protein 45 (RBM45)
    and similar proteins. This subfamily corresponds to the RRM4 of RBM45, also termed
    developmentally-regulated RNA-binding protein 1 (DRB1), a new member of RNA recognition
    motif (RRM)-type neural RNA-binding proteins, which expresses under spatiotemporal
    control. It is encoded by gene drb1 that is expressed in neurons, not in glial
    cells. RBM45 predominantly localizes in cytoplasm of cultured cells and specifically
    binds to poly(C) RNA. It could play an important role during neurogenesis. RBM45
    carries four RRMs, also known as RBDs (RNA binding domains) or RNPs (ribonucleoprotein
    domains).
