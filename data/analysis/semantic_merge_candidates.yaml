  a_label: electron transfer flavoprotein (ETF) beta. The electron transfer flavoprotein
    (ETF) serves as a specific electron acceptor for various mitochondrial dehydrogenases.
    ETF transfers electrons to the main respiratory chain via ETF-ubiquinone oxidoreductase.
    ETF is a heterodimer, consisting of an alpha and a beta subunit, which binds one
    molecule of FAD per dimer. A similar system also exists in some bacteria. The
    homologous pair of proteins (FixA/FixB) are essential for nitrogen fixation. The
    beta subunit is distantly related to and forms a heterodimer with the alpha subunit.
  b_label: Electron transfer flavoprotein, beta subunit, N-terminal
