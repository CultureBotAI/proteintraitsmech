    stem (ES) cells and interacts with the proto-oncogene product Myc, maintaining
    the pluripotency of the ES cells. TRIM6, together with E2 Ubiquitin conjugase
    (UbE2K) and K48-linked poly-Ub chains, is critical for the IkappaB kinase epsilon
    (IKKepsilon) branch of type I interferon (IFN-I) signaling pathway and subsequent
    establishment of a protective antiviral response.
