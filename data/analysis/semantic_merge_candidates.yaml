    RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains.
    The third SH3 domain (SH3C) of ITSN2 has been shown to bind the K15 protein of
    Kaposi's sarcoma-associated herpesvirus. SH3 domains are protein interaction domains
    that bind to proline-rich ligands with moderate affinity and selectivity, preferentially
    to PxxP motifs. They play versatile and diverse roles in the cell including the
    regulation of enzymes, changing the subcellular localization of signaling pathway
    components, and mediating the formation of multiprotein complex assemblies.
