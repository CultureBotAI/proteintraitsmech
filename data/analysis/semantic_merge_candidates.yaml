    eukaryotic RNA-binding proteins family. Their corresponding Mei2-like genes appear
    to have arisen early in eukaryote evolution, been lost from some lineages such
    as Saccharomyces cerevisiae and metazoans, and diversified in the plant lineage.
    The plant Mei2-like genes may function in cell fate specification during development,
    rather than as stimulators of meiosis. Members in this family contain three RNA
    recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein
    domains). The C-terminal RRM (RRM3) is unique to Mei2-like proteins and it is
