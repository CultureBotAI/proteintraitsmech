  a_label: Formyltetrahydrofolate deformylase (Formyl-FH4 hydrolase), C-terminal hydrolase
    domain. Formyl-FH4 Hydrolase catalyzes the hydrolysis of 10-formyltetrahydrofolate
    (formyl-FH4) to FH4 and formate. Formate is the substrate of phosphoribosylglycinamide
    transformylase for step three of de novo purine nucleotide synthesis. Formyl-FH4
    hydrolase has been proposed to regulate the balance of FH4 and C1-FH4 in the cell.  The
    enzyme uses methionine and glycine to sense the pools of C1-FH4 and FH4, respectively.
    This domain belongs to the formyltransferase (FMT) domain superfamily. Members
    of this family have an N-terminal ACT domain, which is  commonly involved in specifically
    bind an amino acid or other small ligand leading to regulation of the enzyme.
    The N-terminal of this protein family may be responsible for the binding of the
    regulators methionine and glycine.
  b_label: Formyltetrahydrofolate deformylase, C-terminal hydrolase domain
