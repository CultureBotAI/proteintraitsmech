  a_label: Extended PHD finger found in protein Jade-2 and similar proteins. The extended
    plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His.
    This model includes the ePHD finger of Jade-2. Jade-2, also termed PHD finger
    protein 15 (PHF15), is a plant homeodomain (PHD) zinc finger protein that is closely
    related to Jade-1, which functions as an essential regulator of multiple cell
    signaling pathways. Like Jade-1, Jade-2 is required for ING4 and ING5 to associate
    with histone acetyltransferase (HAT) HBO1 and Eaf6 to form a HBO1 complex that
    has a histone H4-specific acetyltransferase activity, a reduced activity toward
    histone H3, and is responsible for the bulk of histone H4 acetylation in vivo.
    Jade-2 contains a canonical PHD finger followed by this non-canonical ePHD finger,
    both of which are zinc-binding motifs.
