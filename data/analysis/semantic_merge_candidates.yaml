  a_label: N-terminal Src homology 3 domain of Growth factor receptor-bound protein
    2. GRB2 is a critical signaling molecule that regulates the Ras pathway by linking
    tyrosine kinases to the Ras guanine nucleotide releasing protein Sos (son of sevenless),
    which converts Ras to the active GTP-bound state. It is ubiquitously expressed
    in all tissues throughout development and is important in cell cycle progression,
    motility, morphogenesis, and angiogenesis. In lymphocytes, GRB2 is associated
    with antigen receptor signaling components. GRB2 contains an N-terminal SH3 domain,
    a central SH2 domain, and a C-terminal SH3 domain. Its N-terminal SH3 domain binds
    to Sos and Sos-derived proline-rich peptides. SH3 domains are protein interaction
    domains that bind to proline-rich ligands with moderate affinity and selectivity,
    preferentially to PxxP motifs. They play versatile and diverse roles in the cell
    including the regulation of enzymes, changing the subcellular localization of
    signaling pathway components, and mediating the formation of multiprotein complex
    assemblies.
  b_label: GRB2, N-terminal SH3 domain
