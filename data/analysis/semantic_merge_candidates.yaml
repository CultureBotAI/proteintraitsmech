  a_label: 'C-type lectin-like domain (CTLD) of the type found in CEL-1 from Cucumaria
    echinata and Echinoidin from Anthocidaris crassispina. CLECT_CEL-1_like: C-type
    lectin-like domain (CTLD) of the type found in CEL-1 from Cucumaria echinata and
    Echinoidin from Anthocidaris crassispina.  CTLD refers to a domain homologous
    to the carbohydrate-recognition domains (CRDs) of the C-type lectins.  The CEL-1
    CTLD binds three calcium ions and has a high specificity for N-acteylgalactosamine
    (GalNAc).  CEL-1 exhibits strong cytotoxicity which is inhibited by GalNAc.  This
    protein may play a role as a toxin defending against predation.  Echinoidin is
    found in the coelomic fluid of the sea urchin and is specific for GalBeta1-3GalNAc.  Echinoidin
    has a cell adhesive activity towards human cancer cells which is not mediated
    through the CTLD.  Both CEL-1 and Echinoidin are multimeric proteins comprised
    of multiple dimers linked by disulfide bonds.'
  b_label: CEL-1-like C-type lectin-like domain
