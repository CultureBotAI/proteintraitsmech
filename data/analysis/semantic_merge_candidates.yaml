  a_label: Third Src Homology 3 domain of SH3 domain containing ring finger 1 (SH3RF1),
    SH3RF3, and similar domains. SH3RF1 (or POSH) and SH3RF3 (or POSH2) are scaffold
    proteins that function as E3 ubiquitin-protein ligases. They contain an N-terminal
    RING finger domain and four SH3 domains. This model represents the third SH3 domain,
    located in the middle of SH3RF1 and SH3RF3, and similar domains. SH3RF1 plays
    a role in calcium homeostasis through the control of the ubiquitin domain protein
    Herp. It may also have a role in regulating death receptor mediated and JNK mediated
    apoptosis. SH3RF3 interacts with p21-activated kinase 2 (PAK2) and GTP-loaded
    Rac1. It may play a role in regulating JNK mediated apoptosis in certain conditions.
    SH3 domains are protein interaction domains that bind to proline-rich ligands
    with moderate affinity and selectivity, preferentially to PxxP motifs. They play
    versatile and diverse roles in the cell including the regulation of enzymes, changing
    the subcellular localization of signaling pathway components, and mediating the
    formation of multiprotein complex assemblies.
  b_label: SH3RF1/SH3RF3, fourth SH3 domain
