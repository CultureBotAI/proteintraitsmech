    4 (SCAF4) and similar proteins. The CD corresponds to the RRM of SCAF4 (also termed
    splicing factor, arginine/serine-rich 15 or SFR15, or CTD-binding SR-like protein
    RA4) that belongs to a new class of SCAFs (SR-like CTD-associated factors). Although
    its biological function remains unclear, SCAF4 shows high sequence similarity
    to SCAF8 that interacts specifically with a highly serine-phosphorylated form
    of the carboxy-terminal domain (CTD) of the largest subunit of RNA polymerase
    II (pol II) and may play a direct role in coupling with both, transcription and
