  a_label: Ret finger protein-like (RFPL), includes RFP1, 2, 3, 4. This domain, consisting
    of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found
    at the C-terminus of RFPL protein family, which includes RFPL1, RFPL2, RFPL3 and
    RFPL4. In humans, RFPL transcripts can be detected at the onset of neurogenesis
    in differentiating human embryonic stem cells, and in the developing human neocortex.
    The human RFPL1, 2, 3 genes have a role in neocortex development. RFPL1 is a primate-specific
    target gene of Pax6, a key transcription factor for pancreas, eye and neocortex
    development; human RFPL1 decreases cell number through its RFPL-defining motif
    (RDM) and SPRY domains. The RFPL4 (also known as RFPL4A) gene encodes a putative
    E3 ubiquitin-protein ligase expressed in adult germ cells and interacts with oocyte
    proteins of the ubiquitin-proteasome degradation pathway.
