  a_label: C-terminal, alpha helical domain of Stringent starvation protein A. Glutathione
    S-transferase (GST) C-terminal domain family, Stringent starvation protein A (SspA)
    subfamily; SspA is a RNA polymerase (RNAP)-associated protein required for the
    lytic development of phage P1 and for stationary phase-induced acid tolerance
    of E. coli. It is implicated in survival during nutrient starvation. SspA adopts
    the GST fold with an N-terminal thioredoxin-fold domain and a C-terminal alpha
    helical domain, but it does not bind glutathione (GSH) and lacks GST activity.
    SspA is highly conserved among gram-negative bacteria. Related proteins found
    in Neisseria (called RegF), Francisella and Vibrio regulate the expression of
    virulence factors necessary for pathogenesis.
  b_label: Stringent starvation protein A, N-terminal
