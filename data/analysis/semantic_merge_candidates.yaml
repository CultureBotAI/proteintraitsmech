  similarity: 0.947
  a_label: Snx41 /Atg20, PX domain
  b_label: The phosphoinositide binding Phox Homology domain of Sorting Nexins 1 and
    2. The PX domain is a phosphoinositide (PI) binding module present in many proteins
    with diverse functions. Sorting nexins (SNXs) make up the largest group among
    PX domain containing proteins. They are involved in regulating membrane traffic
    and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and
    targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding
    specificity and affinity, and the presence of other protein-protein interaction
    domains, which help determine subcellular localization and specific function in
    the endocytic pathway. This subfamily consists of SNX1, SNX2, and similar proteins.
    They harbor a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature,
    C-terminal to the PX domain. Both domains have been shown to determine the specific
    membrane-targeting of SNX1. SNX1 and SNX2 are components of the retromer complex,
    a membrane coat multimeric complex required for endosomal retrieval of lysosomal
    hydrolase receptors to the Golgi. The retromer consists of a cargo-recognition
    subcomplex and a subcomplex formed by a dimer of sorting nexins (SNX1 and/or SNX2),
    which ensures effcient cargo sorting by facilitating proper membrane localization
    of the cargo-recognition subcomplex.
