  a_label: Cysteine-rich domain of the secreted frizzled-related protein 2 (SFRP2),
    a regulator of Wnt activity. The cysteine-rich-domain (CRD) is an essential part
    of the secreted frizzled related protein 2 (SFRP2), which regulates the activity
    of Wnt  proteins, key players in a number of fundamental cellular processes such
    as embryogenesis and postnatal development. SFRPs antagonize the activation of
    Wnt signaling by binding to CRD domains of frizzled (Fz) proteins, thereby preventing
    Wnt proteins from binding to these receptors. SFRPs and Fz proteins both contain
    CRD domains, but SFRPs lack the seven-pass transmembrane domain which is an integral
    part of Fzs. As a Wnt antagonist, SFRP2 regulates Nkx2.2  expression in the ventral
    spinal cord and anteroposterior axis elongation. SFRP2 also has a Wnt-independent
    function as an enhancer of procollagen cleavage by the TLD proteinases. SFRP2
    binds both procollagen and TLD, thus facilitating the enzymatic reaction by bringing
    together the proteinase and its substrate.
  b_label: SFRP2, cysteine-rich domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd07906
  b: InterPro:IPR044119
  similarity: 0.945
  a_label: 'Adenylation domain of Mycobacterium tuberculosis LigD and LigC-like ATP-dependent
    DNA ligases. Bacterial DNA ligases are divided into two broad classes: NAD-dependent
    and ATP-dependent. All bacterial species have a NAD-dependent DNA ligase (LigA).
    Some bacterial genomes contain multiple genes for DNA ligases that are predicted
    to use ATP as their cofactor, including Mycobacterium tuberculosis LigB, LigC,
    and LigD. This group is composed of ATP-dependent DNA ligases similar to Mycobacterium
    tuberculosis LigC. ATP-dependent polynucleotide ligases catalyze phosphodiester
    bond formation using nicked nucleic acid substrates with the high energy nucleotide
    of ATP as a cofactor in a three step reaction mechanism. DNA ligases play a vital
    role in the diverse processes of DNA replication, recombination and repair. Members
    of this group contain adenylation and C-terminal oligonucleotide/oligosaccharide
    binding (OB)-fold domains, comprising a catalytic core unit that is common to
    all members of the ATP-dependent DNA ligase family. The adenylation domain binds
    ATP and contains many of the active-site residues. The common catalytic core unit
    comprises six conserved sequence motifs (I, III, IIIa, IV, V and VI) that define
    this family of related nucleotidyltransferases. LigD consists of a central ATP-dependent
    DNA ligase catalytic core unit fused to a C-terminal polymerase domain and an
    N-terminal 3''-phosphoesterase (PE) module. LigD catalyzes the end-healing and
    end-sealing steps during non-homologous end joining.'
  b_label: LigC-like, adenylation domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd08316
  b: InterPro:IPR033998
  similarity: 0.945
  a_label: Death domain of FAS or TNF receptor superfamily member 6. Death Domain
    (DD) found in the FS7-associated cell surface antigen (FAS). FAS, also known as
    TNFRSF6 (TNF receptor superfamily member 6), APT1, CD95, FAS1, or APO-1, together
    with FADD (Fas-associating via Death Domain) and caspase 8, is an integral part
    of the death inducing signalling complex (DISC), which plays an important role
    in the induction of apoptosis and is activated by binding of the ligand FasL to
    FAS. FAS also plays a critical role in self-tolerance by eliminating cell types
    (autoreactive T and B cells) that contribute to autoimmunity. DDs are protein-protein
    interaction domains found in a variety of domain architectures. Their common feature
    is that they form homodimers by self-association or heterodimers by associating
    with other members of the DD superfamily including CARD (Caspase activation and
    recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors
    in signaling pathways and can recruit other proteins into signaling complexes.
  b_label: Fas receptor, death domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd08794
  b: InterPro:IPR035533
  similarity: 0.945
  a_label: Death domain of Interleukin 1 Receptor Associated Kinase-1. Death Domain
    (DD) of Interleukin-1 Receptor-Associated Kinase 1 (IRAK1). IRAKs are essential
    components of innate immunity and inflammation in mammals and other vertebrates.
    They are involved in signal transduction pathways involving IL-1 and IL-18 receptors,
    Toll-like receptors, nuclear factor-kappaB (NF-kB), and mitogen-activated protein
    kinases (MAPKs). IRAKs contain an N-terminal DD domain and a C-terminal kinase
    domain. IRAK1 is an active kinase and also plays adaptor functions. It binds to
    the MyD88-IRAK4 complex via its DD, which facilitates its phosphorylation by IRAK4,
    activating it for further auto-phosphorylation. Hyper-phosphorylated IRAK1 forms
    a cytosolic complex with TRAF6, leading to the activation of NF-kB and MAPK pathways.
    IRAK1 is involved in autoimmunity and may be associated with lupus pathogenesis.
    DDs are protein-protein interaction domains found in a variety of domain architectures.
    Their common feature is that they form homodimers by self-association or heterodimers
    by associating with other members of the DD superfamily including CARD (Caspase
    activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They
    serve as adaptors in signaling pathways and can recruit other proteins into signaling
    complexes.
  b_label: Interleukin-1 receptor-associated kinase 1, death domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd09578
  b: InterPro:IPR047531
  similarity: 0.945
  a_label: SAM domain of Scm proteins of Polycomb group. SAM (sterile alpha motif)
    domain of Scm (Sex comb on midleg) subfamily of Polycomb group is a protein-protein
    interaction domain. Proteins of this subfamily are transcriptional repressors
    associated with PRC1 complex. This group includes invertebrate Scm protein and
    chordate Scm homolog 1 and Scm-like 1, 2, 3 proteins.  Most have a SAM domain,
    two MBT repeats, and a DUF3588 domain, except Scm-like 4 proteins which do not
    have MBT repeats. Originally the Scm protein was described in Drosophila as a
    regulator required for proper spatial expression of homeotic genes. It plays a
    major role during early embryogenesis. SAM domains of Scm proteins can interact
    with each other, forming homooligomers, as well as with SAM domains of other proteins,
    in particular with SAM domains of Ph (polyhomeotic) proteins, forming heterooligomers.
    Homooligomers are similar to the ones formed by SAM Pointed domains of the TEL
    proteins. Such SAM/SAM oligomers apparently play a role in transcriptional repression
    through polymerization along the chromosome. Mammalian Scmh1 protein is known
    be indispensible member of PRC1 complex; it plays a regulatory role for the complex
    during meiotic prophase of male sperm cells, and is particularly involved in regulation
    of chromatin modification at the XY chromatin domain of the pachytene spermatocytes.
