  a_label: C-terminal domain of intraflagellar transport protein 52 (IFT52) and similar
    proteins. IFT52 is involved in ciliogenesis as part of a complex involved in intraflagellar
    transport (IFT), the bi-directional movement of particles required for the assembly,
    maintenance, and functioning of primary cilia. It is required for the anterograde
