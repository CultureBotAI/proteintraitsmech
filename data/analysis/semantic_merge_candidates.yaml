  a_label: 'ZipA C-terminal domain. ZipA, a membrane-anchored protein, is one of at
    least nine essential gene products necessary for assembly of the septal ring which
    mediates cell division in E.coli. ZipA and FtsA directly bind FtsZ, a homolog
    of eukaryotic tubulins, at the prospective division site, followed by the sequential
