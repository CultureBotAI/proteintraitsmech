  a_label: 'C-terminal (or second) Src homology 3 domain of VAV2 protein. VAV2 is
    widely expressed and functions as a guanine nucleotide exchange factor (GEF) for
    RhoA, RhoB and RhoG and also activates Rac1 and Cdc42. It is implicated in many
    cellular and physiological functions including blood pressure control, eye development,
    neurite outgrowth and branching, EGFR endocytosis and degradation, and cell cluster
