    domain. YfmP regulates the multidrug efflux protein, YfmO, and indirectly regulates
    the expression of the Bacillus subtilis copZA operon encoding a metallochaperone,
    CopZ, and a CPx-type ATPase efflux protein, CopA. These proteins belong to the
    MerR superfamily of transcription regulators that promote expression of several
    stress regulon genes by reconfiguring the spacer between the -35 and -10 promoter
    elements. Their conserved N-terminal domains contain predicted winged HTH motifs
    that mediate DNA binding, while the dissimilar C-terminal domains bind specific
    coactivator molecules.
