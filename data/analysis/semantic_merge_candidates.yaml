  a_label: Mitochondrial Fission Protein Fis1, cytosolic domain. Fis1, along with
    Dnm1 and Mdv1, is an essential protein in mediating mitochondrial fission. Dnm1
    and Fis1 are highly conserved, with a common mechanism in disparate species. In
    mutants of these proteins, mitochondrial fission is impaired, resulting in networks
    of undivided mitochondria. The Fis1 N-terminus is cytosolic and tethered to the
    mitochondrial outer membrane via a C-terminal transmembrane domain. Fis1 appears
    to act via the recruitment of division complexes to the mitochondrial outer membrane,
    via interactions with Mdv1 or Caf4. Fis1 has tandem Tetratricopeptide repeat (TPR)
    motifs which are known to mediate protein-protein interactions.
  b_label: Mitochondria fission protein Fis1, cytosolic domain
