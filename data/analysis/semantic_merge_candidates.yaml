  a_label: Bacterial N-Utilization Substance G (NusG) N-terminal (NGN) domain, subgroup
    1. The N-Utilization Substance G (NusG) protein is involved in transcription elongation
    and termination in bacteria. NusG is essential in Escherichia coli and associates
    with RNA polymerase elongation and Rho-termination. Homologs of the NusG gene
    exist in all bacteria. The NusG N-terminal domain (NGN) is similar in all NusG
    homologs, but its C-terminal domain and the linker that separates these two domains
    are different. The domain organization of NusG suggests that the common properties
    of NusG and its homologs are due to their similar NGN domains.
