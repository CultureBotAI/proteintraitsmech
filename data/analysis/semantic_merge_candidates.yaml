  a_label: RNA recognition motif 1 (RRM1) found in SMART/HDAC1-associated repressor
    protein (SHARP) and similar proteins. This subfamily corresponds to the RRM1 of
    SHARP, also termed Msx2-interacting protein (MINT), or SPEN homolog, an estrogen-inducible
    transcriptional repressor that interacts directly with the nuclear receptor corepressor
    SMRT, histone deacetylases (HDACs) and components of the NuRD complex. SHARP recruits
    HDAC activity and binds to the steroid receptor RNA coactivator SRA through four
    conserved N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding
    domains) or RNPs (ribonucleoprotein domains), further suppressing SRA-potentiated
    steroid receptor transcription activity. Thus, SHARP has the capacity to modulate
    both liganded and nonliganded nuclear receptors. SHARP also has been identified
    as a component of transcriptional repression complexes in Notch/RBP-Jkappa signaling
    pathways. In addition to the N-terminal RRMs, SHARP possesses a C-terminal SPOC
    domain (Spen paralog and ortholog C-terminal domain), which is highly conserved
    among Spen proteins.
