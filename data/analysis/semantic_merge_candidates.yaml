  a_label: Guanine nucleotide exchange factor for Ras-like GTPases; N-terminal domain
    (RasGef_N), also called REM domain (Ras exchanger motif). This domain is common
    in nucleotide exchange factors for Ras-like small GTPases and is typically found
    immediately N-terminal to the RasGef (Cdc25-like) domain. REM contacts the GTPase
    and is assumed to participate in the catalytic activity of the exchange factor.
    Proteins with the REM domain include Sos1 and Sos2, which relay signals from tyrosine-kinase
    mediated signalling to Ras, RasGRP1-4, RasGRF1,2, CNrasGEF, and RAP-specific nucleotide
    exchange factors, to name a few.
