  a_label: 'Bat coronavirus HKU9 RNA-dependent RNA polymerase, also known as non-structural
    protein 12, and similar proteins from betacoronaviruses in the D lineage: responsible
    for replication and transcription of the viral RNA genome. This group contains
    the RNA-dependent RNA polymerase (RdRp) of bat coronavirus HKU9 and similar proteins
    from betacoronaviruses in the nobecovirus subgenera (D lineage). CoVs utilize
    a multi-subunit replication/transcription machinery. A set of non-structural proteins
    (Nsps) generated as cleavage products of the ORF1a and ORF1ab viral polyproteins
    assemble to facilitate viral replication and transcription. A key component, the
    RNA-dependent RNA polymerase (RdRp, also known as Nsp12), catalyzes the synthesis
    of viral RNA and thus plays a central role in the replication and transcription
    cycle of CoV, possibly interacting with its co-factors, Nsp7 and Nsp8. RdRp is
    therefore considered a primary target for nucleotide analog antiviral inhibitors
    such as remdesivir. Nsp12 contains a RdRp domain as well as a large N-terminal
    extension that adopts a nidovirus RdRp-associated nucleotidyltransferase (NiRAN)
    architecture. The RdRp domain displays a right hand with three functional subdomains,
    called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs
    (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these
    motifs have been implicated in RdRp fidelity such as processes of correct incorporation
    and reorganization of nucleotides.'
  b_label: RNA-dependent RNA polymerase, bat coronavirus HKU9-like
  axis: STRUCTURE
  category: STRUCT_DOMAIN
