  a_label: Cargo binding domain of myosin 5C. Class V myosins are well studied unconventional
    myosins, represented by three paralogs (Myo5a,b,c) in vertebrates.  Their C-terminal
    cargo binding domains (CBDs) are important for the binding of a diverse set of
    cargos, including membrane vesicles, organelles, proteins and mRNA. The MyoV-CBDs
    directly interact with several adaptor proteins.MyoVb and myoVc areprimarily expressed
    in epithelial cells, and have been implicated as motors involved in recycling
    endosomes.
  b_label: Myosin 5c, cargo-binding domain
