  a_label: 'Src Homology 3 domain of Membrane Protein, Palmitoylated 7 (or MAGUK p55
    subfamily member 7). MPP7 is a scaffolding protein that binds to DLG1 and promotes
    tight junction formation and epithelial cell polarity. Mutations in the MPP7 gene
    may be associated with the pathogenesis of diabetes and extreme bone mineral density.
    It is one of seven vertebrate homologs of the Drosophila Stardust protein, which
    is required in establishing cell polarity, and it contains two L27 domains followed
    by the core of three domains characteristic of MAGUK (membrane-associated guanylate
    kinase) proteins: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK
    proteins is enzymatically inactive; instead, the domain mediates protein-protein
    interactions and associates intramolecularly with the SH3 domain. SH3 domains
    are protein interaction domains that bind to proline-rich ligands with moderate
    affinity and selectivity, preferentially to PxxP motifs. They play versatile and
    diverse roles in the cell including the regulation of enzymes, changing the subcellular
    localization of signaling pathway components, and mediating the formation of multiprotein
    complex assemblies.'
  b_label: MPP7, SH3 domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
