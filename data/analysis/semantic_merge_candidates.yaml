    elongation and termination. NusG contains a NGN domain at its N-terminus and Kyrpides
    Ouzounis and Woese (KOW) repeats at its C-terminus in bacteria and archaea. The
    eukaryotic ortholog, Spt5, is a large protein comprising an acidic N-terminus,
    an NGN domain, and multiple KOW motifs at its C-terminus. Spt5 forms an Spt4-Spt5
    complex that is an essential RNA polymerase II elongation factor. The bacterial
    infected plants contain bacterial DNA, such as NGN sequences, that can be used
