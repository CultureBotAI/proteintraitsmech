  a_label: RNA recognition motif 1 (RRM1) found in yeast meiotic activator RIM4 and
    similar proteins. This subfamily corresponds to the RRM1 of RIM4, also termed
    regulator of IME2 protein 4, a putative RNA binding protein that is expressed
    at elevated levels early in meiosis. It functions as a meiotic activator required
    for both the IME1- and IME2-dependent pathways of meiotic gene expression, as
    well as early events of meiosis, such as meiotic division and recombination, in
    Saccharomyces cerevisiae. RIM4 contains two RNA recognition motifs (RRMs), also
    termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The family
    also includes a putative RNA-binding protein termed multicopy suppressor of sporulation
    protein Msa1. It is a putative RNA-binding protein encoded by a novel gene, msa1,
    from the fission yeast Schizosaccharomyces pombe. Msa1 may be involved in the
    inhibition of sexual differentiation by controlling the expression of Ste11-regulated
    genes, possibly through the pheromone-signaling pathway. Like RIM4, Msa1 also
    contains two RRMs, both of which are essential for the function of Msa1.
