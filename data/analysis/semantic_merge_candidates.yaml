  a_label: eIF3G domain found in eukaryotic translation initiation factor 3 subunit
    G (eIF-3G) and similar proteins. eIF-3G, also termed eIF-3 subunit 4, or eIF-3-delta,
    or eIF3-p42, or eIF3-p44, is the RNA-binding subunit of eIF3. eIF3 is a large
