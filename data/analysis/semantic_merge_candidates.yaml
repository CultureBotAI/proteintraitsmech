  a_label: first type I K homology (KH) RNA-binding domain found in far upstream element-binding
    protein 2 (FUBP2) and similar proteins. FUBP2, also called FUSE-binding protein
    2, or KH type-splicing regulatory protein (KSRP), or p75, is a single-strand nucleic
    acid binding protein implicated in a variety of cellular processes, including
    splicing in the nucleus, mRNA decay, maturation of miRNA, and transcriptional
    control of proto-oncogenes such as c-myc. It regulates the stability and/or translatability
    of many mRNA species, encoding immune-relevant proteins, either by binding to
    AU-rich elements (AREs) of mRNA 3'UTR or by facilitating miRNA biogenesis to target
    mRNA. FUBP2 contains four K-homology (KH) RNA-binding domains. The model corresponds
    to the first one.
