  a_label: Tumor necrosis factor receptor superfamily member 4 (TNFRSF4), also known
    as  CD134 or OXO40. TNFRSF4 (also known as OX40, ACT35, CD134, IMD16, TXGP1L)
    activates NF-kappaB through its interaction with adaptor proteins TRAF2 and TRAF5.
    It also promotes the expression of apoptosis inhibitors BCL2 and BCL2lL1/BCL2-XL,
    and thus suppresses apoptosis. It is primarily expressed on activated CD4+ and
    CD8+ T cells, where it is transiently expressed and upregulated on the most recently
    antigen-activated T cells within inflammatory lesions. This makes it an attractive
    target to modulate immune responses, i.e. TNFRSF4 (OX40) blocking agents to inhibit
    adverse inflammation or agonists to enhance immune responses. An artificially
    created biologic fusion protein, OX40-immunoglobulin (OX40-Ig), prevents OX40
    from reaching the T-cell receptors, thus reducing the T-cell response. Some single
    nucleotide polymorphisms (SNPs) of its natural ligand OX40 ligand (OX40L, CD252),
    which is also found on activated T cells, have been associated with systemic lupus
    erythematosus.
  b_label: Tumour necrosis factor receptor 4, N-terminal
