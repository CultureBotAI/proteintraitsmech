  a_label: PRY/SPRY domain in tripartite motif-containing protein 34 (TRIM34), also
    known as RING finger protein 21 (RNF21) or interferon-responsive finger protein
    (IFP1). This domain, consisting of the distinct N-terminal PRY subdomain followed
    by the SPRY subdomain, is found at the C-terminus of TRIM34, also known as RING
    finger protein 21 (RNF21) or interferon-responsive finger protein (IFP1). TRIM34
    domain is composed of RING/B-box/coiled-coil core and also known as RBCC protein.
    The TRIM21 cDNA possesses at least three kinds of isoforms, due to alternative
    splicing, of which only the long and medium forms contain the SPRY domain. It
    is an interferon-induced protein, predominantly expressed in the testis, kidney,
    and ovary. The SPRY domain provides the capsid recognition motif that dictates
    specificity to retroviral restriction. While the PRY-SPRY domain provides specificity
    and the capsid recognition motif to retroviral restriction, TRIM34 binds HIV-1
    capsid but does not restrict HIV-1 infection.
