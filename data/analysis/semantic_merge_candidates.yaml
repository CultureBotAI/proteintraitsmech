  a_label: Uroporphyrin-III C-methyltransferase (also known as S-Adenosyl-L-methionine:uroporphyrinogen
    III methyltransferase, SUMT). SUMT is an enzyme of the cobalamin and siroheme
    biosynthetic pathway. It catalyzes the first of three steps leading to the formation
    of siroheme from uroporphyrinogen III; it transfers two methyl groups from S-adenosyl-L-methionine
    to the C-2 and C-7 atoms of uroporphyrinogen III to yield precorrin-2 via the
    intermediate formation of precorrin-1. Precorrin-2 is also a precursor for the
    biosynthesis of vitamin B12, coenzyme F430, siroheme and heme d1. This family
    includes proteins in which the SUMT domain is fused to other functional domains,
    such as to a uroporphyrinogen-III synthase domain to form bifunctional uroporphyrinogen-III
    methylase/uroporphyrinogen-III synthase, or to a dual function dehydrogenase-chelatase
    domain, as in the case of the multifunctional S-adenosyl-L-methionine (SAM)-dependent
    bismethyltransferase/dehydrogenase/ferrochelatase CysG, which catalyzes all three
    steps that transform uroporphyrinogen III into siroheme.
  b_label: Uroporphyrin-III C-methyltransferase
