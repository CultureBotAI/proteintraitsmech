  a_label: Putative Transposase A from transposon Tn554, C-terminal catalytic domain.
    This family includes putative Transposase A from transposon Tn554. It belongs
    to a DNA breaking-rejoining enzyme superfamily. The catalytic domain contains
    six conserved active site residues. The recombination reaction involves cleavage
    of a single strand of a DNA duplex by nucleophilic attack of a conserved tyrosine
    to give a 3' phosphotyrosyl protein-DNA adduct. In the second rejoining step,
    a terminal 5' hydroxyl attacks the covalent adduct to release the enzyme and generate
    duplex DNA. Many DNA breaking-rejoining enzymes also have N-terminal domains,
    which show little sequence or structure similarity.
  b_label: Transposase A from transposon Tn554, C-terminal catalytic domain
