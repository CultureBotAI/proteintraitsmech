  a_label: Catalytic domain of the Serine/Threonine Kinase, Myosin Light Chain Kinase
    2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine
    residues on protein substrates. MLCK2 (or MYLK2) phosphorylates myosin regulatory
    light chain and controls the contraction of skeletal muscles. MLCK2 contains a
    single kinase domain near the C-terminus followed by a regulatory segment containing
    an autoinhibitory Ca2+/calmodulin binding site. The MLCK2 subfamily is part of
    a larger superfamily that includes the catalytic domains of other protein STKs,
    protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline
    kinase, and phosphoinositide 3-kinase.
