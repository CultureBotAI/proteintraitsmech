    protein (BRAP2) found in vertebrates. It may be involved in ethanol and salt-induced
    transcriptional activation of the NHA1 promoter and heat shock protein genes (HSP12
    and HSP26), and participate in ethanol-induced turnover of the low-affinity hexose
    transporter Hxt3p. ETP1 contains an N-terminal RNA recognition motif (RRM), also
    termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by
    a C3HC4-type ring finger domain and a UBP-type zinc finger.
