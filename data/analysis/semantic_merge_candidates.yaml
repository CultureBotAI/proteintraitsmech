    zinc-coordinating residues. The cysteines and histidines in the RING-H2 finger
    are arranged as a modified C3H3C2-type, rather than the canonical C3H2C3-type.
    Sea3 is the yeast counterpart of WDR59. It is not included in this subfamily.
