  a_label: Src homology 3 domain of DBL's Big Sister (DBS), a guanine nucleotide exchange
    factor. DBS, also called MCF2L (MCF2-transforming sequence-like protein) or OST,
    is a Rho GTPase guanine nucleotide exchange factor (RhoGEF), facilitating the
    exchange of GDP and GTP. It was originally isolated from a cDNA screen for sequences
    that cause malignant growth. It plays roles in regulating clathrin-mediated endocytosis
    and cell migration through its activation of Rac1 and Cdc42. Depending on cell
    type, DBS can also activate RhoA and RhoG. DBS contains a Sec14-like domain, spectrin-like
    repeats, a RhoGEF [or Dbl homology (DH)] domain, a Pleckstrin homology (PH) domain,
    and an SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich
    ligands with moderate affinity and selectivity, preferentially to PxxP motifs.
    They play versatile and diverse roles in the cell including the regulation of
    enzymes, changing the subcellular localization of signaling pathway components,
    and mediating the formation of multiprotein complex assemblies.
  b_label: DBS, SH3 domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd11892
  b: InterPro:IPR035555
  similarity: 0.941
  a_label: Src Homology 3 domain of Melanoma Inhibitory Activity 2 protein. MIA2 is
    expressed specifically in hepatocytes and its expression is controlled by hepatocyte
    nuclear factor 1 binding sites in the MIA2 promoter. It inhibits the growth and
    invasion of hepatocellular carcinomas (HCC) and may act as a tumor suppressor.
    A mutation in MIA2 in mice resulted in reduced cholesterol and triglycerides.
    Since MIA2 localizes to ER exit sites, it may function as an ER-to-Golgi trafficking
    protein that regulates lipid metabolism. MIA2 contains an N-terminal SH3-like
    domain, similar to MIA. It is a member of the recently identified family that
    also includes MIA, MIAL, and MIA3 (also called TANGO). MIA is a single domain
    protein that adopts a SH3 domain-like fold; it contains an additional antiparallel
    beta sheet and two disulfide bonds compared to classical SH3 domains. Unlike classical
    SH3 domains, MIA does not bind proline-rich ligands.
  b_label: MIA2, SH3 domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
