  a_label: second cysteine-rich (Cys-2) domain of Dickkopf-related protein 1. Dickkopf-1
    (Dkk1) is a secreted protein which directly binds to LRP5/6 (low-density lipoprotein
    receptor related protein 5 and 6), and is an inhibitor of Wnt/beta-catenin signaling.
    Elevated expression of Dkk-1 may serve as a negative regulator for modulating
    the wnt/#-catenin signal pathway. Dkk1 is expressed in various human cancers.
    It has been studied extensively in mouse models of multiple myeloma that results
    in osteolytic bone lesions. Studies show that Dkk1 levels in bone marrow plasma
    and serum inhibit the differentiation of osteoblast precursors. Dkk1 belongs to
    the Dickkopf (Dkk) family that comprises a discrete class of secreted Wnt inhibitors.
    The Wnt gene family is a large class of secreted proteins that are expressed in
    a variety of tissues and organs, and are required for many developmental processes,
    including segmentation, endoderm development, limb polarity, neural crest differentiation,
    kidney morphogenesis, sex determination and brain development. Dkks 1-4 each possesses
    an N-terminal signal peptide and contains two conserved cysteine-rich domains
    (Cys-1 and Cys-2) separated by a linker region. Each domain possesses 10 conserved
    cysteine residues. The Cys-2 domain is closely similar to those in the colipase
    family; it has been suggested that the Cys-2 domain of Dkks may enable interaction
    with lipids in order to regulate Wnt function. This model corresponds to the Cys-2
    domain of Dkk1.
  b_label: Dickkopf-related protein 1, second cysteine-rich domain
