    protein superfamily. PSP is involved in serine metabolism; serine is synthesized
    from phosphoglycerate through sequential reactions catalyzed by 3-phosphoglycerate
    dehydrogenase (SerA), 3-phosphoserine aminotransferase (SerC), and SerB. Members
