  a_label: RNA recognition motif 3 (RRM3) found in putative RNA-binding protein 15B
    (RBM15B) from vertebrate. This subgroup corresponds to the RRM3 of RBM15B, also
    termed one twenty-two 3 (OTT3), a paralog of RNA binding motif protein 15 (RBM15),
    also known as One-twenty two protein 1 (OTT1). Like RBM15, RBM15B has post-transcriptional
    regulatory activity. It is a nuclear protein sharing with RBM15 the association
    with the splicing factor compartment and the nuclear envelope as well as the binding
    to mRNA export factors NXF1 and Aly/REF. RBM15B belongs to the Spen (split end)
    protein family, which shares a domain architecture comprising of three N-terminal
    RNA recognition motifs (RRMs), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein
    domain), and a C-terminal SPOC (Spen paralog and ortholog C-terminal) domain.
  b_label: RBM15B, RNA recognition motif 1
