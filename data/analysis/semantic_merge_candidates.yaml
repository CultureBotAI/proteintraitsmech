    activation of the p85 subunit of phosphoinositide 3-kinase (PI3K), protein kinase
    C-theta (PKC-theta), and phospholipase C-gamma1 (PLC-gamma1) and negatively regulates
    T-cell receptor-induced transcription factor nuclear factor kappaB (NF-kappaB)
    activation. In addition, Cbl-b may target multiple signaling molecules involved
    in transforming growth factor (TGF)-beta-mediated transactivation pathways. Cbl-b
    contains a tyrosine-kinase-binding domain (TKB, also known as the phosphotyrosine
    binding PTB domain, is composed of a four helix-bundle, a Ca2+ binding EF-hand
    and a highly variant SH2 domain), a proline rich domain, a nuclear localization
    signal, a C3HC4-type RING-HC finger and an ubiquitin-associated (UBA) domain.
