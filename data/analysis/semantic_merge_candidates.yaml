  a_label: Trimeric dUTP diphosphatases. Trimeric dUTP diphosphatases, or dUTPases,
    are the most common family of dUTPase, found in bacteria, eukaryotes, and archaea.
    They catalyze the hydrolysis of the dUTP-Mg complex (dUTP-Mg) into dUMP and pyrophosphate.
    This reaction is crucial for the preservation of chromosomal integrity as it removes
    dUTP and therefore reduces the cellular dUTP/dTTP ratio, and prevents dUTP from
    being incorporated into DNA.  It also provides dUMP as the precursor for dTTP
    synthesis via the thymidylate synthase pathway. dUTPases are homotrimeric, except
    some monomeric viral dUTPases, which have been shown to mimic a trimer. Active
