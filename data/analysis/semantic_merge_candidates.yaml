  a_label: First C-terminal Src homology 3 domain of Fungal Actin-binding protein
    1. Abp1 is an adaptor protein that functions in receptor-mediated endocytosis
    and vesicle trafficking. It contains an N-terminal actin-binding module, the actin-depolymerizing
    factor (ADF) homology domain, a central proline-rich region, and a C-terminal
    SH3 domain (many yeast Abp1 proteins contain two C-terminal SH3 domains). Yeast
    Abp1 also contains two acidic domains that bind directly to the Arp2/3 complex,
    which is required to initiate actin polymerization. The SH3 domain of yeast Abp1
    binds and localizes the kinases, Ark1p and Prk1p, which facilitate actin patch
    disassembly following vesicle internalization. It also mediates the localization
    to the actin patch of the synaptojanin-like protein, Sjl2p, which plays a key
    role in endocytosis. SH3 domains are protein interaction domains that bind to
    proline-rich ligands with moderate affinity and selectivity, preferentially to
    PxxP motifs. They play versatile and diverse roles in the cell including the regulation
    of enzymes, changing the subcellular localization of signaling pathway components,
    and mediating the formation of multiprotein complex assemblies.
  b_label: Fungal actin-binding protein 1, first SH3 domain
