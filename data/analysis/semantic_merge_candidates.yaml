  a_label: Methionyl-tRNA formyltransferase, N-terminal hydrolase domain. Methionyl-tRNA
    formyltransferase (Met-tRNA-FMT), N-terminal formyltransferase domain.  Met-tRNA-FMT
    transfers a formyl group from N-10 formyltetrahydrofolate to the amino terminal
    end of a methionyl-aminoacyl-tRNA acyl moiety, yielding formyl-Met-tRNA. Formyl-Met-tRNA
    plays essential role in protein translation initiation by forming complex with
    IF2. The formyl group plays a dual role in the initiator identity of N-formylmethionyl-tRNA
    by promoting its recognition by IF2 and by impairing its binding to EFTU-GTP.  The
    N-terminal domain contains a Rossmann fold and it is the catalytic domain of the
    enzyme.
