  a_label: Catalytic domain of the Serine/Threonine protein kinase, Tau-Tubulin Kinase
    2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine
    residues on protein substrates. TTBK is a neuron-specific kinase that phosphorylates
    the microtubule-associated protein tau and promotes its aggregation. Higher vertebrates
    contain two TTBK proteins, TTBK1 and TTBK2, both of which have been implicated
    in neurodegeneration. Mutations in TTBK2 is associated with the development of
    spinocerebellar ataxia type 11, belonging to a group of neurodegenerative disorders
    characterized by progressive incoordination, dysarthria and impairment of eye
    movements. Brain tissues of SCA11 patients show the presence of neurofibrillary
    tangles and tau deposition in the brain, similar to Alzheimer's disease (AD) patients.
    The TTBK2 subfamily is part of a larger superfamily that includes the catalytic
    domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside
    phosphotransferase, choline kinase, and phosphoinositide 3-kinase.
  b_label: Tau-tubulin kinase 1, catalytic domain
