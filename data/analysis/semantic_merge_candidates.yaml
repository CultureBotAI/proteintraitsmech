  a_label: 'Family with sequence similarity 43, member A (FAM43A) Phosphotyrosine-binding
    (PTB) domain. The function of FAM43A is currently unknown. Human FAM43A is located
    on chromosome 3 at location 3q29. It encodes a 3182 base pair mRNA which possesses
    one Pleckstrin homology-like domain. The mRNA translates into LOC131583, a hydrophilic
    protein that is predicted to localize in the nucleus. The FAM43A gene is conserved
    through a broad range of vertebrates. It is highly conserved from chimpanzees
    to zebrafish. PTB domains have a common PH-like fold and are found in various
    eukaryotic signaling molecules. This domain was initially shown to binds peptides
    with a NPXY motif with differing requirements for phosphorylation of the tyrosine,
    although more recent studies have found that some types of PTB domains can bind
    to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which
    recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding
    specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB
    domains are classified into three groups: phosphotyrosine-dependent Shc-like,
    phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB
    domains.'
  b_label: FAM43A/B, phosphotyrosine-binding domain
