  a_label: PHD finger found in Arabidopsis thaliana histone-lysine N-methyltransferase
    arabidopsis trithorax-like protein ATX3, ATX4, ATX5, and similar proteins. The
    family includes A. thaliana ATX3 (also termed protein SET domain group 14, or
    trithorax-homolog protein 3), ATX4 (also termed protein SET domain group 16, or
    trithorax-homolog protein 4) and ATX5 (also termed protein SET domain group 29,
