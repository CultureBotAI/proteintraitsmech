  a_label: dual specificity phosphatase domain of dual specificity protein phosphatase
    8. Dual specificity protein phosphatase 8 (DUSP8), also called DUSP hVH-5 or M3/6,
    functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase
    (EC 3.1.3.48). Like other MKPs, it deactivates its MAPK substrates by dephosphorylating
    the threonine and tyrosine residues in the conserved Thr-Xaa-Tyr motif residing
    in their activation sites. It belongs to the class III subfamily and is a JNK/p38-selective
    cytoplasmic MKP. DUSP8 controls basal and acute stress-induced ERK1/2 signaling
    in adult cardiac myocytes, which impacts contractility, ventricular remodeling,
    and disease susceptibility. It also plays a role in decreasing ureteric branching
    morphogenesis by inhibiting p38MAPK. DUSP8 contains an N-terminal Cdc25/rhodanese-like
    domain, which is responsible for MAPK-binding, and a C-terminal catalytic dual
    specificity phosphatase domain.
  b_label: Dual specificity protein phosphatase 8, dual specificity phosphatase domain
