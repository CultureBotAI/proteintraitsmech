  a_label: 'Drosophila melanogaster CG11883 and related proteins, N-terminal metallophosphatase
    domain. CG11883 is an uncharacterized Drosophila melanogaster UshA-like protein
    with two domains, an N-terminal metallophosphatase domain and  a C-terminal nucleotidase
    domain.  The N-terminal metallophosphatase domain belongs to a large superfamily
    of distantly related metallophosphatases (MPPs) that includes: Mre11/SbcD-like
    exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases,
    purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases,
    and acid sphingomyelinases (ASMases).  MPPs are functionally diverse, but all
    share a conserved domain with an active site consisting of two metal ions (usually
    manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine,
    aspartate, and asparagine residues. The conserved domain is a double beta-sheet
    sandwich with a di-metal active site made up of residues located at the C-terminal
    side of the sheets. This domain is thought to allow for productive metal coordination.'
  b_label: CG11883-like, N-terminal metallophosphatase domain
