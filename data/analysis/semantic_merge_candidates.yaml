  a_label: Death domain of Tumor necrosis factor-Related Apoptosis-Inducing Ligand
    Receptors. Death Domain (DD) found in Tumor necrosis factor-Related Apoptosis-Inducing
    Ligand (TRAIL) Receptors. In mammals, this family includes TRAILR1 (also called
    DR4 or TNFRSF10A) and TRAILR2 (also called DR5, TNFRSF10B, or KILLER). They function
    as receptors for the cytokine TRAIL and are involved in apoptosis signaling pathways.
    TRAIL preferentially induces apoptosis in cancer cells while exhibiting little
    toxicity in normal cells. DDs are protein-protein interaction domains found in
    a variety of domain architectures. Their common feature is that they form homodimers
    by self-association or heterodimers by associating with other members of the DD
    superfamily including CARD (Caspase activation and recruitment domain), DED (Death
    Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and
    can recruit other proteins into signaling complexes.
