  a_label: C-terminal Src homology 3 domain of GRB2-related adaptor protein. GRAP
    is a GRB-2 like adaptor protein that is highly expressed in lymphoid tissues.
    It acts as a negative regulator of T cell receptor (TCR)-induced lymphocyte proliferation
    by downregulating the signaling to the Ras/ERK pathway. It has been identified
    as a regulator of TGFbeta signaling in diabetic kidney tubules and may have a
    role in the pathogenesis of the disease. GRAP contains an N-terminal SH3 domain,
    a central SH2 domain, and a C-terminal SH3 domain. The C-terminal SH3 domains
    (SH3c) of the related proteins, GRB2 and GRAP2, have been shown to bind to classical
    PxxP motif ligands, as well as to non-classical motifs. GRB2 SH3c binds Gab2 (Grb2-associated
    binder 2) through epitopes containing RxxK motifs, while the SH3c of GRAP2 binds
    to the phosphatase-like protein HD-PTP via a RxxxxK motif. SH3 domains are protein
    interaction domains that typically bind to proline-rich ligands with moderate
    affinity and selectivity, preferentially to PxxP motifs. They play versatile and
    diverse roles in the cell including the regulation of enzymes, changing the subcellular
    localization of signaling pathway components, and mediating the formation of multiprotein
    complex assemblies.
  b_label: GRAP, N-terminal SH3 domain
