  a_label: first protein kinase C conserved region 1 (C1 domain) found in diacylglycerol
    kinase delta (DAG kinase delta) and similar proteins. Diacylglycerol (DAG) kinase
    (EC 2.7.1.107) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic
    acid. DAG kinase delta, also called 130 kDa diacylglycerol kinase, or diglyceride
    kinase delta (DGK-delta), is a residential lipid kinase in the endoplasmic reticulum.
    It promotes lipogenesis and is involved in triglyceride biosynthesis. It is classified
    as a type II DAG kinase (DGK), containing pleckstrin homology (PH) and sterile
    alpha motifs (SAM) domains, in addition to C1 and catalytic domains that are present
    in all DGKs. The SAM domain mediates oligomerization of type II DGKs. DAG kinase
    delta contains two copies of the C1 domain. This model corresponds to the first
    one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA
    nor possess structural similarity to conventional zinc finger domains; it contains
    two separate Zn(2+)-binding sites.
