    of ribose of the appropriate tRNA. This domain is primarily responsible for ATP-dependent
    formation of the enzyme bound aminoacyl-adenylate. Class II assignment is based
    upon its structure and the presence of three characteristic sequence motifs in
    the core domain. This subfamily contains the core domain of ProRS from archaea,
    the cytoplasm of eukaryotes and some bacteria.
