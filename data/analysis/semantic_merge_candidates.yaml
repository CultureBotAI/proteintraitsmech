  a_label: Sterile alpha motif (SAM)/Pointed domain of friend leukemia integration
    1 transcription activator. SAM Pointed domain of FLI-1 (Friend Leukemia Integration)
    subfamily of ETS transcriptional regulators is a putative protein-protein interaction
    domain. The FLI-1 protein participates in regulation of cellular differentiation,
    proliferation, and survival. The Fli-1 gene was initially described in Friend
    virus-induced erythroleukemias as a site for virus integration. It is highly expressed
    in hematopoietic tissues and at lower level in lungs, heart, and ovaries. Fli-1
    is a proto-oncogene implicated in Ewing's sarcoma and erythroleukemia. Members
    of this subfamily are potential targets for cancer therapy.
  b_label: Friend leukemia integration 1 transcription factor, pointed domain
