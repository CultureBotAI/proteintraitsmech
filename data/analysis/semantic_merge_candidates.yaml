  similarity: 0.959
  a_label: RNA recognition motif 2 (RRM2) found in fungal Mei2-like proteins. This
    subgroup corresponds to the RRM2 of fungal Mei2-like proteins.The Mei2 protein
    is an essential component of the switch from mitotic to meiotic growth in the
    fission yeast Schizosaccharomyces pombe. It is an RNA-binding protein that contains
    three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or
    RNPs (ribonucleoprotein domains). In the nucleus, S. pombe Mei2 stimulates meiosis
    upon binding a specific non-coding RNA through its C-terminal RRM motif.
  b_label: Fungal Mei2-like, RNA recognition motif 3
