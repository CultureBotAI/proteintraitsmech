  a_label: Src homology 3 domain of JNK-interacting protein 2. JNK-interacting protein
    2 (JIP2) is also called Mitogen-activated protein kinase 8-interacting protein
    2 (MAPK8IP2) or Islet-brain-2 (IB2). It is widely expressed in the brain, where
    it forms complexes with fibroblast growth factor homologous factors (FHFs), which
    facilitates activation of the p38delta MAPK. JIP2 is enriched in postsynaptic
    densities and may play a role in motor and cognitive function. In addition to
    a JNK binding domain, JIP2 also contains SH3 and Phosphotyrosine-binding (PTB)
    domains. The SH3 domain of the related protein JIP1 homodimerizes at the interface
    usually involved in proline-rich ligand recognition, despite the lack of this
    motif in the domain itself. SH3 domains are protein interaction domains that bind
    to proline-rich ligands with moderate affinity and selectivity, preferentially
    to PxxP motifs. They play versatile and diverse roles in the cell including the
    regulation of enzymes, changing the subcellular localization of signaling pathway
    components, and mediating the formation of multiprotein complex assemblies.
  b_label: JIP2, SH3 domain
