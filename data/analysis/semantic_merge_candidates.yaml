  a_label: second Tudor domain found in Drosophila melanogaster protein vreteno and
    similar proteins. Vreteno is a gonad-specific protein essential for germline development
    to repress transposable elements and preventing their mobilization, which is essential
    for germline integrity. It acts via the piRNA metabolic process in both germline
