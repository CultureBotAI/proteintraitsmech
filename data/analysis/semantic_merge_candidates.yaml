  a_label: RNA recognition motif 3 (RRM3) found in yeast multiple RNA-binding domain-containing
    protein 1 (MRD1) and similar proteins. This subgroup corresponds to the RRM3 of
    MRD1 which is encoded by a novel yeast gene MRD1 (multiple RNA-binding domain).
    It is well-conserved in yeast and its homologs exist in all eukaryotes. MRD1 is
    present in the nucleolus and the nucleoplasm. It interacts with the 35 S precursor
