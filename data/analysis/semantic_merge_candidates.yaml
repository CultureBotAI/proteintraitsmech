  a_label: C-terminal domain of Cytochrome c Oxidase subunit II. Cytochrome c Oxidase
    (CcO), the terminal oxidase in the respiratory chains of eukaryotes and most bacteria,
    is a multi-chain transmembrane protein located in the inner membrane of mitochondria
    and the cell membrane of prokaryotes.  It catalyzes the reduction of O2 and simultaneously
    pumps protons across the membrane. The number of subunits varies from three to
    five in bacteria and up to 13 in mammalian mitochondria. Only subunits I and II
    are essential for function. Subunits I, II, and III of mammalian CcO are encoded
    within the mitochondrial genome and the remaining 10 subunits are encoded within
    the nuclear genome. Subunit II contains a copper-copper binuclear site called
    CuA, which is believed to be involved in electron transfer from cytochrome c to
    the binuclear center (active site) in subunit I.
  b_label: Cytochrome c oxidase subunit 2, C-terminal
