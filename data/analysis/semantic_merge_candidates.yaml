  a_label: RNA recognition motif 1 and 2 in poly [ADP-ribose] polymerase 10 (PARP-10)
    and similar proteins. This subgroup corresponds to the RRM1 and RRM2 of PARP-10,
    a novel oncoprotein c-Myc-interacting protein with poly(ADP-ribose) polymerase
    activity. It is localized to the nuclear and cytoplasmic compartments. In addition
    to the PARP activity, PARP-10 is also involved in the control of cell proliferation
    by inhibiting c-Myc- and E1A-mediated cotransformation of primary cells. PARP-10
