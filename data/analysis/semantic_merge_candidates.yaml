  a_label: OCRE domain found in Suppressor of ABI3-5 (SUA) and similar proteins. SUA
    is an RNA-binding protein located in the nucleus and expressed in all plant tissues.
    It functions as a splicing factor that influences seed maturation by controlling
    alternative splicing of ABI3. The suppression of the cryptic ABI3 intron indicates
    a role of SUA in mRNA processing. SUA also interacts with the prespliceosomal
    component U2AF65, the larger subunit of the conserved pre-mRNA splicing factor
