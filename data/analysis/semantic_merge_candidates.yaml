  a_label: Sm protein D3. The eukaryotic Sm proteins (B/B', D1, D2, D3, E, F and G)
    assemble into a hetero-heptameric ring around the Sm site of the 2,2,7-trimethyl
    guanosine (m3G) capped U1, U2, U4 and U5 snRNAs (Sm snRNAs) forming the core of
    the snRNP particle. The snRNP particle, in turn, assembles with other components
    onto the pre-mRNA to form the spliceosome which is responsible for the excision
    of introns and the ligation of exons. Members of this family share a highly conserved
    Sm fold containing an N-terminal helix followed by a strongly bent five-stranded
    antiparallel beta-sheet. Sm subunit D3 heterodimerizes with subunit B and three
    such heterodimers form a hexameric ring structure with alternating B and D3 subunits.
    The D3 - B heterodimer also assembles into a heptameric ring containing D1, D2,
    E, F, and G subunits.
