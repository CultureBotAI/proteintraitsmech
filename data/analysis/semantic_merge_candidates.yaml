  a_label: Threonyl-tRNA synthetase (ThrRS) class II core catalytic domain. ThrRS
    is a homodimer. It is responsible for the attachment of threonine to the 3' OH
    group of ribose of the appropriate tRNA. This domain is primarily responsible
    for ATP-dependent formation of the enzyme bound aminoacyl-adenylate. Class II
    assignment is based upon its structure and the presence of three characteristic
    sequence motifs in the core domain.
  b_label: Threonine-tRNA ligase catalytic core domain
