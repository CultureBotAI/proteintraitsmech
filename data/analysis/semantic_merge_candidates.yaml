    The carboxyl transferase domain carries out the following reaction; transcarboxylation
    from biotin to an acceptor molecule. There are two recognised types of carboxyl
    transferase. One of them uses acyl-CoA and the other uses 2-oxoacid as the acceptor
    molecule of carbon dioxide. All of the members in this family utilise acyl-CoA
    as the acceptor molecule, this includes acetyl-CoA carboxylase (ACC), propionyl-CoA
    carboxylase (PCC), and 3-methylcrotonyl-CoA carboxylase (MCC).
