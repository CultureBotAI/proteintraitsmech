  b: InterPro:IPR033999
  similarity: 0.941
  a_label: Tumor necrosis factor receptor superfamily member 6 (TNFRSF6), also known
    as fas cell surface death receptor (Fas). TNFRSF6 (also known as fas cell surface
    death receptor (FasR) or Fas, APT1, CD95, FAS1, APO-1, FASTM, ALPS1A) contains
    a death domain and plays a central role in the physiological regulation of programmed
    cell death. It has been implicated in the pathogenesis of various malignancies
    and diseases of the immune system. The receptor interactions with the Fas ligand
    (FasL), allowing the formation of a death-inducing signaling complex that includes
    Fas-associated death domain protein (FADD), caspase 8, and caspase 10; autoproteolytic
    processing of the caspases in the complex triggers a downstream caspase cascade,
    leading to apoptosis. This receptor has also been shown to activate NF-kappaB,
    MAPK3/ERK1, and MAPK8/JNK, and is involved in transducing the proliferating signals
    in normal diploid fibroblast and T cells. Of the several alternatively spliced
    transcript variants, some are candidates for nonsense-mediated mRNA decay (NMD).
    Isoforms lacking the transmembrane domain may negatively regulate the apoptosis
    mediated by the full length isoform.
  b_label: Fas receptor, N-terminal
  axis: STRUCTURE
  category: STRUCT_DOMAIN
