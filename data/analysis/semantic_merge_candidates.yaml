- a: InterPro:IPR035703
  b: CDD:cd07286
  similarity: 0.942
  a_label: SNX18, PX domain
  b_label: The phosphoinositide binding Phox Homology domain of Sorting Nexin 18.
    The PX domain is a phosphoinositide (PI) binding module present in many proteins
    with diverse functions. Sorting nexins (SNXs) make up the largest group among
    PX domain containing proteins. They are involved in regulating membrane traffic
    and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and
    targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding
    specificity and affinity, and the presence of other protein-protein interaction
    domains, which help determine subcellular localization and specific function in
    the endocytic pathway. SNX18, like SNX9, contains an N-terminal Src Homology 3
    (SH3) domain, a PX domain, and a C-terminal Bin/Amphiphysin/Rvs (BAR) domain,
    which detects membrane curvature. The PX-BAR structural unit helps determine specific
    membrane localization. SNX18 is localized to peripheral endosomal structures,
    and acts in a trafficking pathway that is clathrin-independent but relies on AP-1
    and PACS1.
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: InterPro
  b_source: CDD
- a: InterPro:IPR035740
  b: CDD:cd11988
  similarity: 0.942
  a_label: Intersectin-2, fourth SH3 domain
  b_label: First Src homology 3 domain (or SH3A) of Intersectin-2. Intersectin-2 (ITSN2)
    is an adaptor protein that functions in exo- and endocytosis, actin cytoskeletal
    reorganization, and signal transduction. It plays a role in clathrin-coated pit
    (CCP) formation. It binds to many proteins through its multidomain structure and
    facilitate the assembly of multimeric complexes. ITSN2 also functions as a specific
    GEF for Cdc42 activation in epithelial morphogenesis, and is required in mitotic
    spindle orientation. It exists in alternatively spliced short and long isoforms.
    The short isoform contains two Eps15 homology domains (EH1 and EH2), a coiled-coil
    region and five SH3 domains (SH3A-E), while the long isoform, in addition, contains
    RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains.
    The first SH3 domain (or SH3A) of ITSN2 is expected to bind many protein partners,
    similar to ITSN1 which has been shown to bind Sos1, dynamin1/2, CIN85, c-Cbl,
    PI3K-C2, SHIP2, N-WASP, and CdGAP, among others. SH3 domains are protein interaction
    domains that bind to proline-rich ligands with moderate affinity and selectivity,
    preferentially to PxxP motifs. They play versatile and diverse roles in the cell
    including the regulation of enzymes, changing the subcellular localization of
    signaling pathway components, and mediating the formation of multiprotein complex
    assemblies.
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: InterPro
  b_source: CDD
