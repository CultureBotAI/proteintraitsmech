  a_label: Src homology 2 domain found in Signal-transducing adaptor protein (STAP)
    family. STAP1 and STAP2 are signal-transducing adaptor proteins. They are composed
    of a Pleckstrin homology (PH) and SH2 domains along with several tyrosine phosphorylation
    sites. STAP-1 is an ortholog of BRDG1 (BCR downstream signaling 1). STAP1 protein
    functions as a docking protein acting downstream of Tec tyrosine kinase in B cell
    antigen receptor signaling. The protein is phosphorylated by Tec and participates
    in a positive feedback loop, increasing Tec activity. STAP1 has been shown to
