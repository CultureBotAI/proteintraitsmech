    or JmjC domain-containing histone demethylation protein 3A (JHDM3A), catalyzes
    the demethylation of di- and trimethylated H3K9 and H3K36. It is involved in carcinogenesis
    and functions as a transcription regulator that may either stimulate or repress
    gene transcription. It associates with nuclear receptor corepressor complex or
    histone deacetylases. Moreover, JMJD2A forms complexes with both the androgen
