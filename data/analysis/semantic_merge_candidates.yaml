  a_label: RNA recognition motif (RRM) found in vertebrate serine/arginine-rich splicing
    factor 7 (SRSF7). This subgroup corresponds to the RRM of SRSF7, also termed splicing
    factor 9G8, is a splicing regulatory serine/arginine (SR) protein that plays a
    crucial role in both constitutive splicing and alternative splicing of many pre-mRNAs.
