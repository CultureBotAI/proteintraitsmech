  a_label: Catalytic domain of the Serine/Threonine protein kinase, Tau-Tubulin Kinase.
    STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine
    residues on protein substrates. TTBK is a neuron-specific kinase that phosphorylates
    the microtubule-associated protein tau and promotes its aggregation. Higher vertebrates
    contain two TTBK proteins, TTBK1 and TTBK2, both of which have been implicated
    in neurodegeneration. TTBK1 has been linked to Alzheimer's disease (AD) while
    TTBK2 is associated with spinocerebellar ataxia type 11 (SCA11). Both AD and SCA11
    patients show the presence of neurofibrillary tangles in the brain. The Drosophila
    TTBK homolog, Asator, is an essential protein that localizes to the mitotic spindle
    during mitosis and may be involved in regulating microtubule dynamics and function.
    The TTBK subfamily is part of a larger superfamily that includes the catalytic
    domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside
    phosphotransferase, choline kinase, and phosphoinositide 3-kinase.
  b_label: Tau-tubulin kinase 1, catalytic domain
