    acid. DAG kinase zeta, also called diglyceride kinase zeta (DGK-zeta), displays
    a strong preference for 1,2-diacylglycerols over 1,3-diacylglycerols, but lacks
    substrate specificity among molecular species of long chain diacylglycerols. It
    is classified as a type IV DAG kinase (DGK), containing myristoylated alanine-rich
    protein kinase C substrate (MARCKS), PDZ-binding, and ankyrin domains, in addition
    to C1 and catalytic domains that are present in all DGKs. The MARCKS domain regulates
    the nuclear localizations of type IV DGKs while the PDZ-binding and ankyrin domains
    regulate interactions with several proteins. DAG kinase zeta contains two copies
    of the C1 domain. This model corresponds to the second one. The C1 domain is a
    cysteine-rich zinc binding domain that does not bind DNA nor possess structural
    similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding
