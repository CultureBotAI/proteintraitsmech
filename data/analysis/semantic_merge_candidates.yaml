  a_label: RNA recognition motif 1 in U2 small nuclear ribonucleoprotein B" (U2B")
    and similar proteins. This subgroup corresponds to the RRM1 of U2B" (also termed
    U2 snRNP B") a unique protein that comprises the U2 snRNP. It was initially identified
    as binding to stem-loop IV (SLIV) at the 3' end of U2 snRNA. Additional research
    indicates U2B" binds to U1 snRNA stem-loop II (SLII) as well and shows no preference
    for SLIV or SLII on the basis of binding affinity. U2B" does not require an auxiliary
    protein for binding to RNA. In addition, the nuclear transport of U2B" is independent
    of U2 snRNA binding. U2B" contains two RNA recognition motifs (RRMs), also termed
    RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). It also contains
    a nuclear localization signal (NLS) in the central domain. However, nuclear import
    of U2B'' does not depend on this NLS. The N-terminal RRM is sufficient to direct
    U2B" to the nucleus.
