  a_label: N-Utilization Substance G (NusG) N-terminal domain in the NusG Specialized
    Paralog (SP). The N-Utilization Substance G (NusG) protein is involved in transcription
    elongation and termination. NusG is essential in Escherichia coli and is associated
    with RNA polymerase elongation and Rho-termination in bacteria. Paralogs of eubacterial
    NusG, NusG SP (Specialized Paralog of NusG), are more diverse and often found
    as the first ORF in operons encoding secreted proteins and LPS biosynthesis genes.
    NusG SP family members are operon-specific transcriptional antitermination factors.
    The NusG N-terminal (NGN) domain is quite similar in all NusG orthologs, but its
    C-terminal domains and the linker that separate these two domains are different.
    The domain organization of NusG and its orthologs suggest that the common properties
    of NusG and its orthologs and paralogs are due to their similar NGN domains.
  b_label: NusG, N-terminal
