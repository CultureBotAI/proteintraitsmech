  a_label: N-terminal head domain found in coiled-coil domain-containing protein 61
    and similar proteins. Coiled-coil domain-containing protein 61 (CCDC61), also
    known as variable flagellar number 3 (VFL3), is a centrosomal protein required
    for spindle assembly and precise chromosome alignments in mitosis. It is the human
    ortholog of proteins required for anchoring distinct sets of cytoskeletal fibers
    to centrioles in unicellular eukaryotes. CCDC61 monomers are comprised of an N-terminal
    globular head domain, a centrally located coiled-coil, and a C-terminal region.
    These monomers homodimerize through two homodimerization domains, the N-terminal
    globular head domains and long extended alpha-helical coiled-coil regions. These
    CCDC61 homodimers assembles into linear filaments. This model corresponds to the
    N-terminal head domain of CCDC61, which is structurally related to other XRCC4-superfamily
    members, XRCC4, XLF, SAS6, and PAXX.
