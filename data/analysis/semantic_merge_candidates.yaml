    is predominantly present in the nuclear and can shuttle between nucleus and cytoplasm.
    It cooperates with the export protein, Tap/NXF1, helps mRNA export to the cytoplasm,
    and enhances the expression of unspliced mRNA. SRSF7 inhibits tau E10 inclusion
    through directly interacting with the proximal downstream intron of E10, a clustering
    region for frontotemporal dementia with Parkinsonism (FTDP) mutations. SRSF7 contains
    a single N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding
    domain) or RNP (ribonucleoprotein domain), followed by a CCHC-type zinc knuckle
    motif in its median region, and a C-terminal RS domain rich in serine-arginine
    dipeptides. The RRM domain is involved in RNA binding, and the RS domain has been
    implicated in protein shuttling and protein-protein interactions.
