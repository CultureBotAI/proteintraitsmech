    and for progression of spliceosome assembly. It binds specifically to the U2 snRNP
    and is an intrinsic component of prespliceosomes and spliceosomes. Yeast ist3
    contains an atypical RNA recognition motif (RRM), also termed RBD (RNA binding
    domain) or RNP (ribonucleoprotein domain). In the yeast pre-mRNA retention and
    splicing complex, the atypical RRM of ist3 functions as a scaffold that organizes
    the other two constituents, Bud13p (bud site selection 13) and Pml1p (pre-mRNA
    leakage 1). Fission yeast Schizosaccharomyces pombe gene cwf29 encoding ist3,
    also termed cell cycle control protein cwf29, is an RNA-binding protein complexed
    with cdc5 protein 29. It also contains one RRM. The biological function of RBMX2
    remains unclear. It shows high sequence similarity to yeast ist3 protein and harbors
