  a_label: 'C-type lectin-like domain (CTLD) of the type found in human collectins
    including lung surfactant proteins A and D, mannose- or mannan binding lectin
    (MBL), and CL-L1 (collectin liver 1). CLECT_collectin_like: C-type lectin-like
    domain (CTLD) of the type found in human collectins including lung surfactant
    proteins A and D, mannose- or mannan binding lectin (MBL), and CL-L1 (collectin
    liver 1).  CTLD refers to a domain homologous to the carbohydrate-recognition
    domains (CRDs) of the C-type lectins. The CTLDs of these collectins bind carbohydrates
    on surfaces (e.g. pathogens, allergens, necrotic, or apoptotic cells) and mediate
    functions associated with killing and phagocytosis.  MBPs recognize high mannose
    oligosaccharides in a calcium dependent manner, bind to a broad range of pathogens,
    and trigger cell killing by activating the complement pathway.  MBP also acts
    directly as an opsonin.  SP-A and SP-D in addition to functioning as host defense
    components, are components of pulmonary surfactant which play a role in surfactant
    homeostasis.  Pulmonary surfactant is a phospholipid-protein complex which reduces
    the surface tension within the lungs.  SP-A binds the major surfactant lipid:
    dipalmitoylphosphatidylcholine (DPPC).  SP-D binds two minor components of surfactant
    that contain sugar moieties: glucosylceramide and phosphatidylinositol (PI).  MBP
    and SP-A, -D monomers are homotrimers with an N-terminal collagen region and three
    CTLDs.  Multiple homotrimeric units associate to form supramolecular complexes.  MBL
    deficiency results in an increased susceptibility to a large number of different
    infections and to inflammatory disease, such as rheumatoid arthritis.'
  b_label: Collectin, C-type lectin-like domain
