  a_label: Fifth (C-terminal) Src homology 3 domain of Tyrosine kinase substrate with
    five SH3 domains. Tks5, also called SH3 and PX domain-containing protein 2A (SH3PXD2A)
    or Five SH (FISH), is a scaffolding protein and Src substrate that is localized
    in podosomes, which are electron-dense structures found in Src-transformed fibroblasts,
    osteoclasts, macrophages, and some invasive cancer cells. It binds and regulates
    some members of the ADAMs family of transmembrane metalloproteases, which function
    as sheddases and mediators of cell and matrix interactions. It is required for
    podosome formation, degradation of the extracellular matrix, and cancer cell invasion.
    Tks5 contains an N-terminal Phox homology (PX) domain and five SH3 domains. This
    model characterizes the fifth (C-terminal) SH3 domain of Tks5. SH3 domains are
    protein interaction domains that bind to proline-rich ligands with moderate affinity
    and selectivity, preferentially to PxxP motifs. They play versatile and diverse
    roles in the cell including the regulation of enzymes, changing the subcellular
    localization of signaling pathway components, and mediating the formation of multiprotein
    complex assemblies.
  b_label: SH3PXD2A, SH3 domain 3
  axis: STRUCTURE
  category: STRUCT_DOMAIN
