  a_label: Nucleoside Triphosphate Pyrophosphohydrolase EC 3.6.1.8) MazG-like domain
    found in a group of uncharacterized proteins from bacteria and archaea. This family
    corresponds to a group of uncharacterized hypothetical proteins from bacteria,
    showing a high sequence similarity to the dimeric 2-deoxyuridine 5'-triphosphate
    nucleotidohydrolase (dUTP pyrophosphatase or dUTPase) and NTP-PPase MazG proteins.
    However, unlike typical tandem-domain MazG proteins, members in this family consist
    of a single MazG-like domain.
  b_label: MSMEG_1276-like, nucleoside triphosphate pyrophosphohydrolase domain
