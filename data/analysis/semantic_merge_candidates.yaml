  a_label: DEAH-box helicase domain of FANCM. Fanconi anemia group M (FANCM) protein
    is a DNA-dependent ATPase component of the Fanconi anemia (FA) core complex. It
    is required for the normal activation of the FA pathway, leading to monoubiquitination
    of the FANCI-FANCD2 complex in response to DNA damage, cellular resistance to
    DNA cross-linking drugs, and prevention of chromosomal breakage. In complex with
    CENPS and CENPX, it binds double-stranded DNA (dsDNA), fork-structured DNA (fsDNA),
    and Holliday junction substrates. Its ATP-dependent DNA branch migration activity
    can process branched DNA structures such as a movable replication fork. This activity
    is strongly stimulated in the presence of CENPS and CENPX. In complex with FAAP24,
    it efficiently binds to single-strand DNA (ssDNA), splayed-arm DNA, and 3'-flap
    substrates. In vitro, on its own, it strongly binds ssDNA oligomers and weakly
    fsDNA, but does not bind to dsDNA. FANCM is a member of the DEAD-like helicase
    superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA
    unwinding. This domain contains the ATP-binding region.
  b_label: FANCM, DEAH-box helicase domain
