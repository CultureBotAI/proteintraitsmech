  a_label: Src homology 2 (SH2) domain found in Ras and Rab interactor (RIN)-family.
    The RIN (AKA Ras interaction/interference) family is composed of RIN1, RIN2 and
    RIN3. These proteins have multifunctional domains including SH2 and proline-rich
    (PR) domains in the N-terminal region, and RIN-family homology (RH), VPS9 and
    Ras-association (RA) domains in the C-terminal region. RIN proteins function as
    Rab5-GEFs, and RIN3 specifically functions as a Rab31-GEF. In general SH2 domains
    are involved in signal transduction. They typically bind pTyr-containing ligands
    via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins
    with SH2 domains to localize to tyrosine phosphorylated sites.
