  a_label: PHD finger found in protein Jade-3 and similar proteins. Jade-3, also termed
    PHD finger protein 16 (PHF16), is a plant homeodomain (PHD) zinc finger protein
    that is closely related to Jade-1, which functions as an essential regulator of
    multiple cell signaling pathways. Like Jade-1, Jade-3 is required for ING4 and
    ING5 to associate with histone acetyl transferase (HAT) HBO1 and Eaf6 to form
