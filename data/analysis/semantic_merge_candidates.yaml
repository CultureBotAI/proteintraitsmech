  a_label: Src Homology 3 domain of Amphiphysin I. Amphiphysins function primarily
    in endocytosis and other membrane remodeling events. They exist in several isoforms
    and mammals possess two amphiphysin proteins from distinct genes. Amphiphysin
    I proteins, enriched in the brain and nervous system, contain domains that bind
    clathrin, Adaptor Protein complex 2 (AP2), dynamin, and synaptojanin. They function
    in synaptic vesicle endocytosis. Human autoantibodies to amphiphysin I hinder
    GABAergic signaling and contribute to the pathogenesis of paraneoplastic stiff-person
    syndrome. Amphiphysins contain an N-terminal BAR domain with an additional N-terminal
    amphipathic helix (an N-BAR), a variable central domain, and a C-terminal SH3
    domain. The SH3 domain of amphiphysins bind proline-rich motifs present in binding
    partners such as dynamin, synaptojanin, and nsP3. It also belongs to a subset
    of SH3 domains that bind ubiquitin in a site that overlaps with the peptide binding
    site. SH3 domains are protein interaction domains that bind to proline-rich ligands
    with moderate affinity and selectivity, preferentially to PxxP motifs. They play
    versatile and diverse roles in the cell including the regulation of enzymes, changing
    the subcellular localization of signaling pathway components, and mediating the
    formation of multiprotein complex assemblies.
