  a_label: RNA recognition motif (RRM) found in vertebrate RNA-binding protein 11
    (RBM11). This subfamily corresponds to the RRM or RBM11, a novel tissue-specific
    splicing regulator that is selectively expressed in brain, cerebellum and testis,
