    A0 (hnRNP A0) and similar proteins. This subfamily corresponds to the RRM1 of
    hnRNP A0 which is a low abundance hnRNP protein that has been implicated in mRNA
    stability in mammalian cells. It has been identified as the substrate for MAPKAP-K2
