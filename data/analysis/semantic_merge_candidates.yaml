  a_label: Catalytic domain of the Serine/Threonine Kinase, Never In Mitosis gene
    A (NIMA)-related kinase 10. STKs catalyze the transfer of the gamma-phosphoryl
    group from ATP to serine/threonine residues on protein substrates. No function
    has yet been ascribed to Nek10. The gene encoding Nek10 is a putative causative
    gene for breast cancer; it is located within a breast cancer susceptibility loci
    on chromosome 3p24. Nek10 is one in a family of 11 different Neks (Nek1-11) that
    are involved in cell cycle control. The Nek family is part of a larger superfamily
    that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO
    kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide
    3-kinase.
  b_label: Serine/threonine-protein kinase Nek10, catalytic domain
