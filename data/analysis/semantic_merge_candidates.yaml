  a_label: B-box-type 1 zinc finger found in tripartite motif-containing protein 66
    (TRIM66) and similar proteins. TRIM66, also termed transcriptional intermediary
    factor 1 delta (TIF1delta), is a novel heterochromatin protein 1 (HP1)-interacting
    member of the transcriptional intermediary factor 1 (TIF1) family, and is expressed
    by elongating spermatids. Like other TIF1 proteins, TRIM66 displays a potent trichostatin
