    ubiquitin-protein ligase that also contains KPC1 subunit and regulates the ubiquitin-dependent
    degradation of the cyclin-dependent kinase (CDK) inhibitor p27 at G1 phase. KPC2
    contains a ubiquitin-like (UBL) domain and two ubiquitin-associated (UBA) domains.
