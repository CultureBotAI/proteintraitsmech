  a_label: Bacterial N-Utilization Substance G (NusG) N-terminal (NGN) domain, subgroup
    2. The N-Utilization Substance G (NusG) protein is involved in transcription elongation
    and termination. NusG is essential in Escherichia coli and associates with RNA
    polymerase elongation and Rho-termination. Paralogs of eubacterial NusG, NusG
    SP (Specialized Paralog of NusG), are more diverse and often found as the first
    ORF in operons encoding secreted proteins and LPS biosynthesis genes. NusG SP
    family members are operon-specific transcriptional antitermination factors. The
    NusG N-terminal domain (NGN) is quite similar in all NusG orthologs, but its C-terminal
    domain and the linker that separates these two domains are different. The domain
    organization of NusG and its orthologs suggests that the common properties of
    NusG and its orthologs and paralogs are due to their similar NGN domains.
