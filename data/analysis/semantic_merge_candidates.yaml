  a_label: RING finger, H2 subclass, found in defective in mitotic arrest proteins
    (Dmap) and similar proteins. This subfamily includes Schizosaccharomyces pombe
    protein Dma1 (SpDma1p), Saccharomyces cerevisiae proteins Dma1 (ScDma1p) and Dma2
    (ScDma2p), and their homologs from fungi. SpDma1p was originally isolated as a
    multicopy suppressor of the temperature-sensitive growth phenotype caused by cdc16
    mutations. It functions to prevent mitotic exit and cytokinesis during spindle
    checkpoint arrest by inhibiting septation initiation network (SIN) signaling.
    ScDma1p and ScDma2p, also known as checkpoint forkhead associated with RING domains-containing
    protein 1 and 2 respectively, seem to be functionally redundant. They are involved
    in proper septin ring positioning and cytokinesis. The simultaneous lack of Dma1
    and Dma2 leads to spindle mispositioning and defects in the spindle position checkpoint.
    All members of this family contain a forkhead-associated (FHA) domain and a C3H2C3-type
    RING-H2 finger, the latter suggesting they may possess E3 ubiquitin-ligase activities.
