  a_label: N-terminal domain of Acyl-CoA dehydrogenase (ACAD) 10 and 11, and similar
    proteins. This subfamily is composed of the N-terminal domains of vertebrate ACAD10
    and ACAD11, and similar uncharacterized bacterial and eukaryotic proteins. ACADs
    are a family of flavoproteins that are involved in the beta-oxidation of fatty
    acyl-CoA derivatives. ACAD deficiency can cause metabolic disorders including
    muscle fatigue, hypoglycemia, and hepatic lipidosis. There are at least 11 distinct
    ACADs, some of which show distinct substrate specificities to either straight-chain
    or branched-chain fatty acids. ACAD10 is widely expressed in human tissues and
    highly expressed in liver, kidney, pancreas, and spleen. ACAD10 and ACAD11 are
    both significantly expressed in human brain tissues. They contain a long N-terminal
    domain with similarity to phosphotransferases with a Protein Kinase fold, which
    is absent in other ACADs. They may exhibit multiple functions in acyl-CoA oxidation
    pathways. ACAD11 utilizes substrates with carbon chain lengths of 20 to 26, with
    optimal activity towards C22CoA. ACAD10 may be associated with an increased risk
    in type II diabetes. The ACAD10/11-like subfamily is part of a larger superfamily
    that includes the catalytic domains of other kinases, such as the typical serine/threonine/tyrosine
    protein kinases (PKs), RIO kinases, actin-fragmin kinase (AFK), and phosphoinositide
    3-kinase (PI3K).
  b_label: Acyl-CoA dehydrogenase family member 10/11, N-terminal
