  a_label: CUE domain found in the C-terminal of toll-interacting protein (Tollip)
    and similar proteins. Tollip is a new component of the IL-1RI pathway which contains
    an N-terminal C2 domain and a C-terminal CUE domain. Tollip binds to the cytoplasmic
    TIR domain of IL-1Rs after IL-1 stimulation. It is sufficient for recruitment
    of IRAK to IL-1Rs and negatively regulates IL-1-induced signaling by inhibiting
    IRAK phosphorylation. In addition, Tollip directly interacts with toll-like receptors
    TLR2 and TLR4, and plays an inhibitory role in TLR-mediated cell activation through
    suppressing phosphorylation and kinase activity of IRAK. Moreover, Tollip can
    associate with GAT domains of Tom1 and its related proteins Tom1L1 and Tom1L2,
    and facilitate the recruitment of clathrin onto endosomes.
  b_label: Toll-interacting protein, CUE domain
