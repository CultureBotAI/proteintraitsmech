  similarity: 0.949
  a_label: ubiquitin-like (Ubl) domain found in ubiquitin-like proteins UBL4A and
    similar proteins. UBL4A, also termed GdX, is a ubiquitously expressed ubiquitin-like
    (Ubl) protein that forms a complex with partner proteins and participates in the
    protein processing through endoplasmic reticulum (ER), acting as a chaperone.
    As a key component of the BCL2-associated athanogene 6 (BAG6) chaperone complex,
    UBL4A plays a role in mediating DNA damage signaling and cell death. UBL4A also
    regulates insulin-induced Akt plasma membrane translocation through promotion
    of Arp2/3-dependent actin branching. Moreover, UBL4A specifically stabilizes the
    TC45/STAT3 association and promotes dephosphorylation of STAT3 to repress tumorigenesis.
    UBL4B is testis-specific, and encoded by an X-derived retrogene Ubl4b, which is
    specifically expressed in post-meiotic germ cells in mammals. As a germ cell-specific
    cytoplasmic protein, UBL4B is not present in somatic cells. Moreover, UBL4B is
    present in elongated spermatids, but not in spermatocytes and round spermatids,
    suggesting its function is restricted to late spermiogenesis. The function of
    UBL4A may be compensated by either UBL4B or other Ubl proteins in normal conditions.
    Both UBL4A and UBL4B contain a conserved Ubl domain with a beta-grasp Ubl fold,
    a common structure involved in protein-protein interactions.
  b_label: UBL4A-like, ubiquitin-like domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd02675
  b: InterPro:IPR034252
  similarity: 0.949
  a_label: Ectodomain of Ephrins. Ephrins and their receptors EphR play an important
    role in cell communication in normal physiology, as well as in disease pathogenesis.
    Binding of the ephrin (Eph) ligand to EphR requires cell-cell contact, since both
    molecules are anchored to the plasma membrane. The resulting downstream signals
    occur bidirectionally in both EphR-expressing cells (forward signaling, depending
    on Eph kinase activity) and ephrin-expressing cells (reverse signaling). Eph signaling
    controls cell morphology, adhesion, migration and invasion. Ephrins can be subdivided
    into 2 groups, A and B, depending on their respective receptors EphA or EphB.
    The nine human EphA receptors bind to five GPI-linked ephrin-A ligands and the
    five EphB receptors bind to three transmembrane ephrin-B ligands. Interactions
    are promiscuous within each class, and some Eph receptors can also bind to ephrins
    of the other class. All ephrins contain a highly conserved ectodomain for receptor
    binding, which is characterized by this domain hierarchy.
  b_label: Ephrin-A ectodomain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd02696
  b: InterPro:IPR002508
  similarity: 0.949
  a_label: 'N-acetylmuramoyl-L-alanine amidase or MurNAc-LAA (also known as peptidoglycan
    aminohydrolase, NAMLA amidase, NAMLAA, Amidase 3, and peptidoglycan amidase; EC
    3.5.1.28) is an autolysin that hydrolyzes the amide bond between N-acetylmuramoyl
    and L-amino acids in certain cell wall glycopeptides. These proteins are Zn-dependent
    peptidases with highly conserved residues involved in cation co-ordination. MurNAc-LAA
    in this family is one of several peptidoglycan hydrolases (PGHs) found in bacterial
    and bacteriophage or prophage genomes that are involved in the degradation of
    the peptidoglycan. In Escherichia coli, there are five MurNAc-LAAs present: AmiA,
    AmiB, AmiC and AmiD that are periplasmic, and AmpD that is cytoplasmic. Three
    of these (AmiA, AmiB and AmiC) belong to this family, the other two (AmiD and
    AmpD) do not. E. coli AmiA, AmiB and AmiC play an important role in cleaving the
    septum to release daughter cells after cell division. In general, bacterial MurNAc-LAAs
    are members of the bacterial autolytic system and carry a signal peptide in their
    N-termini that allows their transport across the cytoplasmic membrane. However,
    the bacteriophage MurNAc-LAAs are endolysins since these phage-encoded enzymes
    break down bacterial peptidoglycan at the terminal stage of the phage reproduction
    cycle. As opposed to autolysins, almost all endolysins have no signal peptides
    and their translocation through the cytoplasmic membrane is thought to proceed
    with the help of phage-encoded holin proteins. The amidase catalytic module is
    fused to another functional module (cell wall binding module or CWBM) either at
    the N- or C-terminus, which is responsible for high affinity binding of the protein
    to the cell wall.'
  b_label: N-acetylmuramoyl-L-alanine amidase, catalytic domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
