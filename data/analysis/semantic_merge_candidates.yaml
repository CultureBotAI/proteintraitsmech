  a_label: Src homology 3 domain of Abl Interactor 1. Abi1, also called e3B1, is a
    central regulator of actin cytoskeletal reorganization through interactions with
    many protein complexes. It is part of WAVE, a nucleation-promoting factor complex,
    that links Rac 1 activation to actin polymerization causing lamellipodia protrusion
    at the plasma membrane. Abi1 interact with formins to promote protrusions at the
    leading edge of motile cells. It also is a target of alpha4 integrin, regulating
    membrane protrusions at sites of integrin engagement. Abi proteins are adaptor
    proteins serving as binding partners and substrates of Abl tyrosine kinases. They
    are involved in regulating actin cytoskeletal reorganization and play important
    roles in membrane-ruffling, endocytosis, cell motility, and cell migration. Abi
    proteins contain a homeobox homology domain, a proline-rich region, and a SH3
    domain. The SH3 domain of Abi binds to a PxxP motif in Abl. SH3 domains are protein
    interaction domains that bind to proline-rich ligands with moderate affinity and
    selectivity, preferentially to PxxP motifs. They play versatile and diverse roles
    in the cell including the regulation of enzymes, changing the subcellular localization
    of signaling pathway components, and mediating the formation of multiprotein complex
    assemblies.
  b_label: Abl Interactor 1, SH3 domain
