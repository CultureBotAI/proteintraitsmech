  a_label: 'Caa3-Type Cytochrome Oxidase subunit 4 interacts with cyt c subunits I/III.
    Cytochrome c oxidase, a haem copper oxidase superfamily member, is the final step
    in the electron-transport chain, linking O2 reduction to transmembrane pumping
    in mitochondria and aerobic prokaryotes. Cytochrome c oxidase (aka Complex IV)
    catalyzes the reduction of O2 to 2H2O, and acts downstream of Complexes I-III:
    NADH-Q oxidoreductase, succinate-Q reductase, and Q-cytochrome c oxidoreductase.
    In Thermus thermophilus caa3-oxidase is comprised of subunit (SU) I/III, a fusion
    of classical SU I and SUIII, and IIc as well SU IV, which is composed of 2 connected
    transmembrane helices that interface with SU I/III.'
