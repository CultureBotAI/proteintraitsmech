  a_label: RNA recognition motif 3 (RRM3) found in vertebrate Hu-antigen D (HuD).
    This subgroup corresponds to the RRM3 of HuD, also termed ELAV-like protein 4
    (ELAV-4), or paraneoplastic encephalomyelitis antigen HuD, one of the neuronal
    members of the Hu family. The neuronal Hu proteins play important roles in neuronal
    differentiation, plasticity and memory. HuD has been implicated in various aspects
    of neuronal function, such as the commitment and differentiation of neuronal precursors
    as well as synaptic remodeling in mature neurons. HuD also functions as an important
    regulator of mRNA expression in neurons by interacting with AU-rich RNA element
    (ARE) and stabilizing multiple transcripts. Moreover, HuD regulates the nuclear
    processing/stability of N-myc pre-mRNA in neuroblastoma cells. And it also regulates
    the neurite elongation and morphological differentiation. HuD specifically bound
    poly(A) RNA. Like other Hu proteins, HuD contains three RNA recognition motifs
    (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains).
    RRM1 and RRM2 may cooperate in binding to an ARE. RRM3 may help to maintain the
    stability of the RNA-protein complex, and might also bind to poly(A) tails or
    be involved in protein-protein interactions.
  b_label: HuD, RNA recognition motif 3
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
