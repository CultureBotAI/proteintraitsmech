  a_label: Glutamate synthase (GltS) FMN-binding domain.  GltS is a complex iron-sulfur
    flavoprotein that catalyzes the reductive synthesis of L-glutamate from 2-oxoglutarate
    and L-glutamine via intramolecular channelling of ammonia, a reaction in the plant,
    yeast and bacterial pathway for ammonia assimilation. It is a multifunctional
    enzyme that functions through three distinct active centers, carrying out  L-glutamine
    hydrolysis, conversion of 2-oxoglutarate into L-glutamate, and electron uptake
    from an electron donor.
  b_label: Glutamate synthase, alpha subunit, C-terminal
