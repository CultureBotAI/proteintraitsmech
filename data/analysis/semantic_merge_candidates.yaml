  a_label: 'PTS_IIA, PTS system, lactose/cellobiose specific IIA subunit. The bacterial
    phosphoenolpyruvate: sugar phosphotransferase system (PTS) is a multi-protein
    system involved in the regulation of a variety of metabolic and transcriptional
    processes. This family is one of four structurally and functionally distinct group
    IIA PTS system cytoplasmic enzymes, necessary for the uptake of carbohydrates
    across the cytoplasmic membrane and their phosphorylation. This family of proteins
    normally function as a homotrimer, stabilized by a centrally located metal ion.
    Separation into subunits is thought to occur after phosphorylation.'
  b_label: Phosphotransferase system, EIIB component, type 2/3
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01403
  b: InterPro:IPR034210
  similarity: 0.946
  a_label: Cytochrome C oxidase chain VIIb. Cytochrome c oxidase (CcO), the terminal
    oxidase in the respiratory chains of eukaryotes and most bacteria, is a multi-chain
    transmembrane protein located in the inner membrane of mitochondria and the cell
    membrane of prokaryotes. It catalyzes the reduction of O2 and simultaneously pumps
    protons across the membrane.  The number of subunits varies from three to five
    in bacteria and up to 13 in mammalian mitochondria. Subunits I, II, and III of
    mammalian CcO are encoded within the mitochondrial genome and the remaining 10
    subunits are encoded within the nuclear genome. The VIIb subunit is found only
    in eukaryotes and its specific function remains unclear. A rare polymorphism of
    the CcO VIIb gene may be associated with the high risk of nasopharyngeal carcinoma
    in a Cantonese family.
  b_label: Cytochrome c oxidase subunit 2, C-terminal
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01675
  b: InterPro:IPR013509
  similarity: 0.946
  a_label: Class III ribonucleotide reductase. Ribonucleotide reductase (RNR) catalyzes
    the reductive synthesis of deoxyribonucleotides from their corresponding ribonucleotides.
    It provides the precursors necessary for DNA synthesis. RNRs are separated into
    three classes based on their metallocofactor usage. Class I RNRs, found in eukaryotes,
    bacteria, and bacteriophage, use a diiron-tyrosyl radical. Class II RNRs, found
    in bacteria, bacteriophage, algae and archaea, use coenzyme B12 (adenosylcobalamin,
    AdoCbl). Class III RNRs, found in strict or facultative anaerobic bacteria, bacteriophage,
    and archaea, use an FeS cluster and S-adenosylmethionine to generate a glycyl
    radical. Many organisms have more than one class of RNR present in their genomes.
    All three RNRs have a ten-stranded alpha-beta barrel domain that is structurally
    similar to the domain of PFL (pyruvate formate lyase). The class III enzyme from
    phage T4 consists of two subunits, this model covers the larger subunit which
    contains the active and allosteric sites.
  b_label: Ribonucleotide reductase large subunit, N-terminal
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01718
  b: InterPro:IPR034102
  similarity: 0.946
  a_label: Sm protein E. The eukaryotic Sm proteins (B/B', D1, D2, D3, E, F and G)
    assemble into a hetero-heptameric ring around the Sm site of the 2,2,7-trimethyl
    guanosine (m3G) capped U1, U2, U4 and U5 snRNAs (Sm snRNAs) forming the core of
    the snRNP particle. The snRNP particle, in turn, assembles with other components
    onto the pre-mRNA to form the spliceosome which is responsible for the excision
    of introns and the ligation of exons. Members of this family share a highly conserved
    Sm fold containing an N-terminal helix followed by a strongly bent five-stranded
    antiparallel beta-sheet. Sm subunit E binds subunits F and G to form a trimer
    which then assembles onto snRNA along with the D1/D2 and D3/B heterodimers forming
    a seven-membered ring structure.
  b_label: Small nuclear ribonucleoprotein D1
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd02974
  b: InterPro:IPR044141
  similarity: 0.946
  a_label: Alkyl hydroperoxide reductase F subunit (AhpF) N-terminal domain (NTD)
    family, N-terminal TRX-fold subdomain; AhpF is a homodimeric flavoenzyme which
    catalyzes the NADH-dependent reduction of the peroxiredoxin AhpC, which in turn
    catalyzes the reduction of hydrogen peroxide and organic hydroperoxides. AhpF
    contains an NTD forming two contiguous TRX-fold subdomain similar to Pyrococcus
    furiosus protein disulfide oxidoreductase (PfPDO). It also contains a catalytic
    core similar to TRX reductase containing FAD and NADH binding domains with an
    active site disulfide. The proposed mechanism of action of AhpF is similar to
    a TRX/TRX reductase system. The flow of reducing equivalents goes from NADH ->
    catalytic core of AhpF -> NTD of AhpF -> AhpC -> peroxide substrates. The N-terminal
    TRX-fold subdomain of AhpF NTD is redox inactive, but is proposed to contain an
    important residue that aids in the catalytic function of the redox-active CXXC
    motif contained in the C-terminal TRX-fold subdomain.
  b_label: AhpF, N-terminal domain, C-terminal TRX-fold subdomain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd03232
  b: InterPro:IPR034003
  similarity: 0.946
  a_label: Second domain of the pleiotropic drug resistance-like (PDR) subfamily G
    of ATP-binding cassette transporters. The pleiotropic drug resistance (PDR) is
    a well-described phenomenon occurring in fungi and shares several similarities
    with processes in bacteria and higher eukaryotes. This PDR subfamily represents
    domain I of its (ABC-IM)2 organization. ABC transporters are a large family of
    proteins involved in the transport of a wide variety of different compounds including
    sugars, ions, peptides, and more complex organic molecules. The nucleotide binding
    domain shows the highest similarity between all members of the family. ABC transporters
    are a subset of nucleotide hydrolases that contain a signature motif, Q-loop,
    and H-loop/switch region, in addition to, the Walker A motif/P-loop and Walker
