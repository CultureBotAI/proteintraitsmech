  a_label: glycine transporter, B0AT3; solute-binding domain. B0AT3 (also called Xtrp2,
    XT2) transports glycine. Human B0AT3 is encoded by the SLC6A18 gene. B0AT3 is
    expressed in the kidney. Mutations in the SLC6A18 gene may contribute to the autosomal
    recessive disorder iminoglycinuria and its related disorder hyperglycinuria. SLC6A18
    or its neighboring genes are associated with increased susceptibility to myocardial
    infarction. This subgroup belongs to the solute carrier 6 (SLC6) transporter family.
