  a_label: N-terminal catalytic domain of putative alginate O-acetyltranferase and
    similar proteins. The alginate biosynthesis protein AlgX appears to be directly
    involved in the O-acetylation of alginate, an exopolysaccharide that is associated
    with the formation of persistent biofilms, such as those by mucoid strains of
    Pseudomonas aeruginosa that affect patients suffering from cystic fibrosis. Its
    N-terminal catalytic domain resembles SGNH hydrolases, though with a permuted
    topology. The active site matches that of the SGNH hydrolases, is well conserved,
    and has been verified experimentally. This wider family includes AlgX, AlgJ, AlgV,
    and a number of uncharacterized families, some of which may have been mis-annotated
