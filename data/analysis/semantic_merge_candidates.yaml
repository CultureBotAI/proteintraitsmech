    MEX3B/RKHD3/RNF195, MEX3C/ RKHD2/RNF194, and MEX3D/RKHD1/RNF193/TINO. They are
    homologous of Caenorhabditis elegans MEX-3 protein, a translational regulator
    that specifies the posterior blastomere identity in the early embryo and contributes
    to the maintenance of the germline totipotency. Mex-3 proteins are RNA-binding
    phosphoproteins involved in post-transcriptional regulatory mechanisms. They are
    characterized by containing two K-homology (KH) RNA-binding domains and a C-terminal
