  a_label: Methionyl-tRNA formyltransferase, N-terminal hydrolase domain. Methionyl-tRNA
    formyltransferase (Met-tRNA-FMT), N-terminal formyltransferase domain.  Met-tRNA-FMT
    transfers a formyl group from N-10 formyltetrahydrofolate to the amino terminal
    end of a methionyl-aminoacyl-tRNA acyl moiety, yielding formyl-Met-tRNA. Formyl-Met-tRNA
