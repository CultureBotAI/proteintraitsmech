  a_label: Cytochrome oxidase c subunit VIII.  Cytochrome c oxidase (CcO), the terminal
    oxidase in the respiratory chains of eukaryotes and most bacteria, is a multi-chain
    transmembrane protein located in the inner membrane of mitochondria and the cell
    membrane of prokaryotes. It catalyzes the reduction of O2 and simultaneously pumps
    protons across the membrane. The number of subunits varies from three to five
    in bacteria and up to 13 in mammalian mitochondria. Subunits I, II, and III of
    mammalian CcO are encoded within the mitochondrial genome and the remaining 10
    subunits are encoded within the nuclear genome. Found only in eukaryotes, subunit
    VIII is the smallest of the nuclear-encoded subunits. It exists in muscle-specific
    and non-muscle-specific isoforms that are differently expressed in different species,
    suggesting species-specific regulation of energy metabolism.
  b_label: Cytochrome c oxidase subunit 2, C-terminal
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd00984
  b: InterPro:IPR007694
  similarity: 0.955
  a_label: C-terminal domain of DnaB helicase. DnaB helicase C-terminal domain. The
    hexameric helicase DnaB unwinds the DNA duplex at the  chromosome replication
    fork. Although the mechanism by which DnaB both couples ATP hydrolysis to translocation
    along DNA and denatures the duplex is unknown, a change in the quaternary structure
    of the protein involving dimerization of the N-terminal domain has been observed
    and may occur during the enzymatic cycle. This C-terminal domain contains an ATP-binding
    site and is therefore probably the site of ATP hydrolysis.
  b_label: DNA helicase, DnaB-like, C-terminal
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd01029
  b: InterPro:IPR034151
  similarity: 0.955
  a_label: 'TOPRIM_primases: The topoisomerase-primase (TOPRIM) nucleotidyl transferase/hydrolase
    domain found in the active site regions of bacterial DnaG-type primases and their
    homologs. Primases synthesize RNA primers for the initiation of DNA replication.
    DnaG type primases are often closely associated with DNA helicases in primosome
    assemblies.  The TOPRIM domain has two conserved motifs, one of which centers
    at a conserved glutamate and the other one at two conserved aspartates (DxD).
    This glutamate and two aspartates, cluster together to form a highly acid surface
    patch. The conserved glutamate may act as a general base in nucleotide polymerization
    by primases. The DXD motif may co-ordinate Mg2+, a cofactor required for full
    catalytic function. The prototypical bacterial primase. Escherichia coli DnaG
    is a single subunit enzyme.'
  b_label: Bacterial DnaG primase, TOPRIM domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd02421
  b: InterPro:IPR039563
  similarity: 0.955
  a_label: A sub-family of peptidase family C39. Peptidase family C39 mostly contains
    bacteriocin-processing endopeptidases from bacteria. The cysteine peptidases in
    family C39 cleave the "double-glycine" leader peptides from the precursors of
    various bacteriocins (mostly non-lantibiotic). The cleavage is mediated by the
    transporter as part of the secretion process. Bacteriocins are antibiotic proteins
    secreted by some species of bacteria that inhibit the growth of other bacterial
    species. The bacteriocin is synthesized as a precursor with an N-terminal leader
    peptide, and processing involves removal of the leader peptide by cleavage at
    a Gly-Gly bond, followed by translocation of the mature bacteriocin across the
    cytoplasmic membrane. Most endopeptidases of family C39 are N-terminal domains
    in larger proteins (ABC transporters) that serve both functions. The proposed
    protease active site is not conserved in this sub-family.
  b_label: Peptidase C39 single domain protein
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd04661
  b: InterPro:IPR033650
  similarity: 0.955
  a_label: Mitochondrial ribosomal protein L46. Mitochondrial ribosomal protein L46
    (MRP L46) is a component of the large subunit (39S) of the mammalian mitochondrial
    ribosome and a member of the NUDIX hydrolase superfamily. MRPs are thought to
    be involved in the maintenance of the mitochondrial DNA. In general, members of
    the NUDIX hydrolase superfamily require a divalent cation, such as Mg2+ or Mn2+,
    for activity and contain the NUDIX motif, a highly conserved 23-residue block
    (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and
    catalytic site. MRP L46 appears to contain a modified NUDIX motif.
  b_label: Large ribosomal subunit protein mL46, NUDIX domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd05016
  b: InterPro:IPR035476
  similarity: 0.955
  a_label: Phosphoglucose isomerase (PGI) contains two SIS (Sugar ISomerase) domains.
    This classification is based on the alignment of the second SIS domain. PGI is
    a multifunctional enzyme which as an intracellular dimer catalyzes the reversible
    isomerization of glucose 6-phosphate to fructose 6-phosphate. As an extracellular
    protein, PGI also has functions equivalent to neuroleukin (NLK), autocrine motility
    factor (AMF), and maturation factor (MF). Evidence suggests that PGI, NLK, AMF,
    and MF are closely related or identical. NLK is a neurotrophic growth factor that
    promotes regeneration and survival of neurons. The dimeric form of NLK has isomerase
    function, whereas its monomeric form carries out neurotrophic activity. AMF is
    a cytokine that stimulates cell migration and metastasis. MF mediates the differentiation
    of human myeloid leukemic HL-60 cells to terminal monocytic cells.
  b_label: Phosphoglucose isomerase, SIS domain 1
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd06866
  b: InterPro:IPR035704
  similarity: 0.955
  a_label: The phosphoinositide binding Phox Homology domain of Sorting Nexin 8 and
    yeast Mvp1p. The PX domain is a phosphoinositide (PI) binding module present in
    many proteins with diverse functions. Sorting nexins (SNXs) make up the largest
    group among PX domain containing proteins. They are involved in regulating membrane
    traffic and protein sorting in the endosomal system. The PX domain of SNXs binds
    PIs and targets the protein to PI-enriched membranes. SNXs differ from each other
    in PI-binding specificity and affinity, and the presence of other protein-protein
    interaction domains, which help determine subcellular localization and specific
    function in the endocytic pathway. Some SNXs are localized in early endosome structures
    such as clathrin-coated pits, while others are located in late structures of the
    endocytic pathway. SNX8 and the yeast counterpart Mvp1p are involved in sorting
    and delivery of late-Golgi proteins, such as carboxypeptidase Y, to vacuoles.
  b_label: SNX8/Mvp1, PX domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
