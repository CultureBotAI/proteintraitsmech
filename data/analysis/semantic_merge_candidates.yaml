  a_label: RNA recognition motif 1 (RRM1) found in vertebrate RNA-binding protein
    26 (RBM26). This subgroup corresponds to the RRM1 of RBM26, also known as cutaneous
    T-cell lymphoma (CTCL) tumor antigen se70-2, which represents a cutaneous lymphoma
    (CL)-associated antigen. It contains two RNA recognition motifs (RRMs), also known
    as RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The RRMs may
    play some functional roles in RNA-binding or protein-protein interactions.
  b_label: RBM26, RNA recognition motif 1
