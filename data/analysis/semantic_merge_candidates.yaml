  a_label: PRY/SPRY domain in tripartite motif-binding protein 6 (TRIM6), also known
    as RING finger protein 89 (RNF89). This domain, consisting of the distinct N-terminal
    PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM6,
    also known as RING finger protein 89 (RNF89). TRIM6 domain is composed of RING/B-box/coiled-coil
