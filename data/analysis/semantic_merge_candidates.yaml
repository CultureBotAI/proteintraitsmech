  a_label: Src homology 3 domain of Sam And SH3 Domain Containing Protein 3. SASH3,
    also called SLY/SLY1 (SH3-domain containing protein expressed in lymphocytes),
    is expressed exclusively in lymhocytes and is essential in the full activation
    of adaptive immunity. It is involved in the signaling of T cell receptors. It
    was the first described member of the SLY family of proteins, which are adaptor
    proteins containing a central conserved region with a bipartite nuclear localization
    signal (NLS) as well as SAM (sterile alpha motif) and SH3 domains. SH3 domains
    are protein interaction domains that bind to proline-rich ligands with moderate
    affinity and selectivity, preferentially to PxxP motifs. They play versatile and
    diverse roles in the cell including the regulation of enzymes, changing the subcellular
    localization of signaling pathway components, and mediating the formation of multiprotein
    complex assemblies.
  b_label: SAM and SH3 domain-containing protein 3, SH3 domain
