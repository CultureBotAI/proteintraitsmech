  a_label: RNA recognition motif (RRM) found in La-related protein 4 (LARP4), La-related
    protein 5 (LARP5 or LARP4B) and similar proteins. This subfamily corresponds to
    the RRM of LARP4 and LARP5. LARP4 is a cytoplasmic factor that can bind poly(A)
    RNA and interact with poly(A) binding protein (PABP). It may play a role in promoting
    translation by stabilizing mRNA. LARP5 is a cytosolic protein that co-sediments
    with polysomes and accumulates upon stress induction in cellular stress granules.
    It can interact with the cytosolic poly(A) binding protein 1 (PABPC1) and the
    receptor for activated C Kinase (RACK1), a component of the 40S ribosomal subunit.
    LARP5 may function as a stimulatory factor of translation through bridging mRNA
    factors of the 3' end with initiating ribosomes. Both, LARP4 and LARP5, are structurally
    related to the La autoantigen. Like other La-related proteins (LARPs) family members,
    LARP4 and LARP5 contain a La motif (LAM) and an RNA recognition motif (RRM), also
    termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain).
