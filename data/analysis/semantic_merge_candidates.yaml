    functions as a dual effector of Rab4 and Rab14 and is involved in efficient recycling
    of transferrin (Tfn). It is a downstream effector of Etk, a downstream tyrosine
    kinase of PI3-kinase that is involved in regulation of vesicle trafficking. RUFY1
    contains an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil
    domains in-between; this model represents the RUN domain.
  b_label: RUN and FYVE domain-containing protein 1, RUN domain
