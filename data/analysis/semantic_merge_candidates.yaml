  a_label: Cysteine-rich domain of tyrosine kinase-like orphan receptor 2. The cysteine-rich
    domain (CRD) is an essential part of the tyrosine kinase-like orphan receptor
    (Ror2), a conserved family of tyrosine kinases that function in various processes,
    including neuronal and skeletal development, cell polarity, and cell movement.
    Ror proteins are receptors of Wnt proteins, which are key players in a number
    of fundamental cellular processes in embryogenesis and postnatal development.
    In different cellular contexts, Ror proteins can either activate or repress transcription
    of Wnt target genes, and can modulate Wnt signaling by sequestering Wnt ligands.
    In addition, a number of Wnt-independent functions have been proposed for both
    Ror1 and Ror2.
