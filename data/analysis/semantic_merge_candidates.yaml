  a_label: Cargo binding domain of myosin 5 and similar proteins. Class V myosins
    are well studied unconventional myosins, represented by three paralogs (Myo5 a,b,c)
    in vertebrates and two (myo2 and myo4) in fungi and related to plant class XI
    myosins. Their C-terminal cargo binding domains is important for the binding of
    a diverse set of cargos, including membrane vesicles, organelles, proteins and
    mRNA. MyoV-CBDs interact with several adaptor proteins that in turn interact with
    the cargo.
