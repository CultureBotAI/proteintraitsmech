  b: InterPro:IPR035535
  similarity: 0.959
  a_label: Src homology 3 domain of Type I fungal Myosins. Type I myosins (myosin-I)
    are actin-dependent motors in endocytic actin structures and actin patches. They
    play roles in membrane traffic in endocytic and secretory pathways, cell motility,
    and mechanosensing. Saccharomyces cerevisiae has two myosins-I, Myo3 and Myo5,
    which are involved in endocytosis and the polarization of the actin cytoskeleton.
    Myosin-I contains an N-terminal actin-activated ATPase, a phospholipid-binding
    TH1 (tail homology 1) domain, and a C-terminal extension which includes an F-actin-binding
    TH2 domain, an SH3 domain, and an acidic peptide that participates in activating
    the Arp2/3complex. The SH3 domain of myosin-I is required for myosin-I-induced
    actin polymerization. SH3 domains are protein interaction domains that bind to
    proline-rich ligands with moderate affinity and selectivity, preferentially to
    PxxP motifs. They play versatile and diverse roles in the cell including the regulation
    of enzymes, changing the subcellular localization of signaling pathway components,
    and mediating the formation of multiprotein complex assemblies.
  b_label: Fungal myosin-I, SH3 domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
- a: CDD:cd11949
  b: InterPro:IPR035643
  similarity: 0.959
  a_label: C-terminal Src homology 3 domain of Growth factor receptor-bound protein
    2. GRB2 is a critical signaling molecule that regulates the Ras pathway by linking
    tyrosine kinases to the Ras guanine nucleotide releasing protein Sos (son of sevenless),
    which converts Ras to the active GTP-bound state. It is ubiquitously expressed
    in all tissues throughout development and is important in cell cycle progression,
    motility, morphogenesis, and angiogenesis. In lymphocytes, GRB2 is associated
    with antigen receptor signaling components. GRB2 contains an N-terminal SH3 domain,
    a central SH2 domain, and a C-terminal SH3 domain. The C-terminal SH3 domain of
    GRB2 binds to Gab2 (Grb2-associated binder 2) through epitopes containing RxxK
    motifs, as well as to the proline-rich C-terminus of FGRF2. SH3 domains are protein
    interaction domains that typically bind to proline-rich ligands with moderate
    affinity and selectivity, preferentially to PxxP motifs. They play versatile and
    diverse roles in the cell including the regulation of enzymes, changing the subcellular
    localization of signaling pathway components, and mediating the formation of multiprotein
    complex assemblies.
  b_label: GRB2, C-terminal SH3 domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: CDD
  b_source: InterPro
