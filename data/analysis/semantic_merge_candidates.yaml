  a_label: CUE domain found in the N-terminal of TGF-beta-activated kinase 1 and MAP3K7-binding
    proteins TAB2, TAB3 and similar proteins. TAB2, also called mitogen-activated
    protein kinase kinase kinase 7-interacting protein 2, TAK1-binding protein 2,
    or TGF-beta-activated kinase 1-binding protein 2, is an adaptor protein that regulates
    activation of TAK1, a MAP kinase kinase kinase (MAPKKK), through linking TAK1
    to TRAF6 in the Interleukin-1 (IL-1) induced NF-kappaB activation pathway. TAB3,
    also called mitogen-activated protein kinase kinase kinase 7-interacting protein
    3, NF-kappa-B-activating protein 1, TAK1-binding protein 3, or TGF-beta-activated
    kinase 1-binding protein 3, is a TAB2-like TAK1-binding protein that activates
    NF-kappaB similar to TAB2. It activates TAK1 and regulates its association with
    TRAF2 and TRAF6. Moreover, TAB3 interacts with TRAF6 and TRAF2 in an IL-1- and
    a TNF-dependent manner, respectively. In summary, TAB2 and TAB3 function redundantly
    as mediators of TAK1 activation in IL-1 and TNF signal transduction. Both of them
    contain an N-terminal CUE domain, a coiled-coil (CC) region, a TAK1-binding domain
    and a C-terminal Npl4 zinc finger (NZF) ubiquitin-binding domain (UBD).
  b_label: TAB2/3, CUE domain
