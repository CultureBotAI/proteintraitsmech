  a_label: RNA binding domain of Saccharomyces cerevisiae RNase MRP protein 1 (RMP1)
    and similar proteins. RMP1, also called RNA-processing protein RMP1, or RNase
    MRP 23.6 kDa subunit, functions as part of ribonuclease MRP (RNase MRP), which
