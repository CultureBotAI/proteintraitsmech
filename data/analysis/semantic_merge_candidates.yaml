  a_label: C-terminal alcohol dehydrogenase domain of the acetaldehyde dehydrogenase-alcohol
    dehydrogenase bifunctional two-domain protein (AAD). This alcohol dehydrogenase
    domain is located on the C-terminal of a bifunctional two-domain protein. The
    N-terminal of the protein contains an acetaldehyde-CoA dehydrogenase domain. This
    protein is involved in pyruvate metabolism whereby pyruvate is converted to acetyl-CoA
    and formate by pyruvate formate-lysase (PFL). Under anaerobic condition, acetyl-CoA
    is reduced to acetaldehyde and ethanol by this two-domain protein. Acetyl-CoA
    is first converted into an enzyme-bound thiohemiacetal by the N-terminal acetaldehyde
    dehydrogenase domain. The enzyme-bound thiohemiacetal is subsequently reduced
    by the C-terminal NAD+-dependent alcohol dehydrogenase domain. In E. coli, this
    protein is called AdhE and has been shown to have pyruvate formate-lyase (PFL)
    deactivase activity, which leads to the inactivation of PFL, a key enzyme in anaerobic
    metabolism. In Escherichia coli and Entamoeba histolytica, this enzyme forms homopolymeric
    peptides composed of more than 20 protomers associated in a helical rod-like structure.
  b_label: Bifunctional aldehyde-alcohol dehydrogenase, C-terminal domain
