  a_label: Ras-associating (RA) domain found in N-terminal Ras-association domain
    family 8 (RASSF8). RASSF8, also termed carcinoma-associated protein HOJ-1, is
    a member of the N-terminus RASSF7-10 protein family. RASSF7-10 has an RA-domain
    at the N-terminus and lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent
    to the RA domain that is found in members of the RASSF1-6 family. The RA domain
    of N-terminal RASSF proteins family has the beta-grasp ubiquitin-like fold with
    low sequence similarity to ubiquitin. RASSF8 has been described as a potential
    tumor suppressor. RASSF8 might have a role in the regulation of cell-cell adhesion
    and cell growth.
