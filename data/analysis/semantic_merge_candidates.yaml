  a_label: Flavivirus envelope glycoprotein M. Flaviviruses are small enveloped viruses
    with a membrane-anchored envelope comprised of 3 proteins called C, M and E. The
    envelope glycoprotein M is translated as a precursor, called prM. The precursor
    portion of the protein is the signal peptide for the protein's entry into the
    membrane. prM is cleaved to form M by the proprotein convertase furin in a late-stage
    cleavage event. Associated with this cleavage is a change in the infectivity and
    fusion activity of the virus.
