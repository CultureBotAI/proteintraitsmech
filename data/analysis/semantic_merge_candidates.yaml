  a_label: 'PTS_IIA, PTS system, lactose/cellobiose specific IIA subunit. The bacterial
    phosphoenolpyruvate: sugar phosphotransferase system (PTS) is a multi-protein
    system involved in the regulation of a variety of metabolic and transcriptional
    processes. This family is one of four structurally and functionally distinct group
    IIA PTS system cytoplasmic enzymes, necessary for the uptake of carbohydrates
    across the cytoplasmic membrane and their phosphorylation. This family of proteins
    normally function as a homotrimer, stabilized by a centrally located metal ion.
    Separation into subunits is thought to occur after phosphorylation.'
