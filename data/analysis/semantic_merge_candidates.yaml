  a_label: RNA recognition motif 2 (RRM2) found in vertebrate Hu-antigen B (HuB).
    This subgroup corresponds to the RRM2 of HuB, also termed ELAV-like protein 2
    (ELAV-2), or ELAV-like neuronal protein 1, or nervous system-specific RNA-binding
    protein Hel-N1 (Hel-N1), one of the neuronal members of the Hu family. The neuronal
    Hu proteins play important roles in neuronal differentiation, plasticity and memory.
    HuB is also expressed in gonads. It is up-regulated during neuronal differentiation
    of embryonic carcinoma P19 cells. Like other Hu proteins, HuB contains three RNA
    recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein
    domains). RRM1 and RRM2 may cooperate in binding to an AU-rich RNA element (ARE).
    RRM3 may help to maintain the stability of the RNA-protein complex, and might
    also bind to poly(A) tails or be involved in protein-protein interactions.
