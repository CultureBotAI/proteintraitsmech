  a_label: PWWP domain found in bromodomain and PHD finger-containing protein 1 (BRPF1).
    BRPF1, also called peregrin, or protein Br140, is a multi-domain protein that
    binds histones, mediates monocytic leukemic zinc-finger protein (MOZ)-dependent
    histone acetylation, and is required for Hox gene expression and segmental identity.
    It is a close partner of the MOZ histone acetyltransferase (HAT) complex and a
    novel Trithorax group (TrxG) member with a central role during development. BRPF1
    is primarily a nuclear protein that has a broad tissue distribution and is abundant
    in testes and spermatogonia. It may be involved in chromatin remodeling. It contains
    a plant homeodomain (PHD) zinc finger followed by a non-canonical extended PHD
    (ePHD) finger, C2HC5HC2H, a bromodomain, and a proline-tryptophan-tryptophan-proline
    (PWWP) domain. The PHD finger binds to methylated lysine 4 of histone H3 (K4H3),
    the bromodomain interacts with acetylated lysines on N-terminal tails of histones
    and other proteins, and the PWWP domain shows histone-binding and chromatin association
    properties.
