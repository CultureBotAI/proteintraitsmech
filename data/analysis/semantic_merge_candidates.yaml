  a_label: Class III ribonucleotide reductase. Ribonucleotide reductase (RNR) catalyzes
    the reductive synthesis of deoxyribonucleotides from their corresponding ribonucleotides.
    It provides the precursors necessary for DNA synthesis. RNRs are separated into
    three classes based on their metallocofactor usage. Class I RNRs, found in eukaryotes,
    bacteria, and bacteriophage, use a diiron-tyrosyl radical. Class II RNRs, found
    in bacteria, bacteriophage, algae and archaea, use coenzyme B12 (adenosylcobalamin,
    AdoCbl). Class III RNRs, found in strict or facultative anaerobic bacteria, bacteriophage,
    and archaea, use an FeS cluster and S-adenosylmethionine to generate a glycyl
    radical. Many organisms have more than one class of RNR present in their genomes.
    All three RNRs have a ten-stranded alpha-beta barrel domain that is structurally
    similar to the domain of PFL (pyruvate formate lyase). The class III enzyme from
    phage T4 consists of two subunits, this model covers the larger subunit which
    contains the active and allosteric sites.
  b_label: Ribonucleotide reductase large subunit, C-terminal
  axis: STRUCTURE
  category: STRUCT_DOMAIN
