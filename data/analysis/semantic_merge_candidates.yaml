  a_label: 'Anillin Pleckstrin homology (PH) domain. Anillin (Rhotekin/RTKN; also
    called PLEKHK/Pleckstrin homology domain-containing family K) is an actin binding
    protein involved in cytokinesis. It interacts with GTP-bound Rho proteins and
    results in the inhibition of their GTPase activity. Dysregulation of the Rho signal
    transduction pathway has been implicated in many forms of cancer. Anillin proteins
    have a N-terminal HRI domain/ACC (anti-parallel coiled-coil) finger domain or
    Rho-binding domain binds small GTPases from the Rho family. The C-terminal PH
    domain helps target anillin to ectopic septin containing foci. PH domains have
    diverse functions, but in general are involved in targeting proteins to the appropriate
    cellular location or in the interaction with a binding partner. They share little
    sequence conservation, but all have a common fold, which is electrostatically
    polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs)
    with high affinity and specificity. PH domains are distinguished from other PIP-binding
    domains by their specific high-affinity binding to PIPs with two vicinal phosphate
    groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting
    some PH domain proteins to the plasma membrane. A few display strong specificity
    in lipid binding. Any specificity is usually determined by loop regions or insertions
    in the N-terminus of the domain, which are not conserved across all PH domains.
    PH domains are found in cellular signaling proteins such as serine/threonine kinase,
    tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as
    well as cytoskeletal associated molecules and in lipid associated enzymes.'
  b_label: Anillin, PH domain
