  a_label: PKA-binding (AKB) domain of A Kinase Anchor Protein 10. AKAPs coordinate
    the specificity of PKA signaling by facilitating the localization of the kinase
    to subcellular sites through their binding to regulatory (R) subunits of PKA.
    AKAP-10, also called PRKA10 or Dual-specific AKAP 2 (D-AKAP2), is a multisubunit
    protein containing two regulator of G protein signaling (RGS)-like domains and
    a PKA-binding (AKB) domain. The AKB domain of AKAP10 can bind to the dimerization/docking
    (D/D) domains of both RI and RII regulatory subunits of PKA. This model also includes
    a C-terminal PDZ-binding motif that binds to PDZK1 and NHERF-1, allowing AKAP10
    to link indirectly to membrane proteins. Mutations in AKAP10 can alter its binding
    to R subunits, which may alter the targeting of PKA; some AKAP10 mutations are
    associated with abnormalities including hypertension, increased risk of severe
    arrhythmias during kidney transplantation, and familial breast cancer.
  b_label: A-kinase anchor protein 10, PKA-binding (AKB) domain
