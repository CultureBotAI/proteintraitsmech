    Ski-like protein, also known as SKIL, Ski-related oncogene (Sno), or Ski-related
    protein, is the ski proto-oncogene homolog. It may have regulatory roles in cell
    division or differentiation in response to extracellular signals. The Dachshund-homology
    domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed
    alpha/beta structure containing a helix-turn-helix motif, similar to features
    found in the forkhead/winged-helix family of DNA binding proteins. It contains
    a conserved CLPQ motif and can bind co-factors. Its structure suggests that it
    may also bind DNA.
