  a_label: Lysin Motif is a small domain involved in binding peptidoglycan. LysM,
    a small globular domain with approximately 40 amino acids, is a widespread protein
    module involved in binding peptidoglycan in bacteria and chitin in eukaryotes.
    The domain was originally identified in enzymes that degrade bacterial cell walls,
    but proteins involved in many other biological functions also contain this domain.
    It has been reported that the LysM domain functions as a signal for specific plant-bacteria
    recognition in bacterial pathogenesis. Many of these enzymes are modular and are
    composed of catalytic units linked to one or several repeats of LysM domains.
    LysM domains are found in bacteria and eukaryotes.
  b_label: LysM domain
