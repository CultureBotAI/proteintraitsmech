  a_label: GIPC-homology 2 (GH2) domain found in the GIPC family. The GIPC family
    includes PDZ domain-containing proteins, GIPC1 (also called GAIP C-terminus-interacting
    protein, RGS-GAIP-interacting protein, RGS19-interacting protein 1, RGS19IP1,
    synectin, tax interaction protein 2, or TIP-2), GIPC2, and GIPC3, which may act
