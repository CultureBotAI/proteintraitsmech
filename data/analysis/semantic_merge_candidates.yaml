    family. They show distinct phylogenetic origins from the ATX1 and ATX2 family.
    They are multi-domain containing proteins that consist of an N-terminal PWWP domain,
    a canonical Cys4HisCys3 plant homeodomain (PHD) finger, a non-canonical extended
    PHD (ePHD) finger, Cys2HisCys5HisCys2His, and a C-terminal SET domain; this model
