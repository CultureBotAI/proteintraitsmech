  a_label: First C-terminal Src homology 3 domain of SH3 and cysteine-rich domain-containing
    protein 3 (Stac3). Stac proteins are putative adaptor proteins that contain a
    cysteine-rich C1 domain and one or two SH3 domains at the C-terminus. There are
    three mammalian members (Stac1, Stac2, and Stac3) of this family. Stac1 and Stac3
