  a_label: 'AAK_NAGK-fArgBP: N-Acetyl-L-glutamate kinase (NAGK) of the fungal arginine-biosynthetic
    pathway (fArgBP). The nuclear-encoded, mitochondrial polyprotein precursor with
    an N-terminal NAGK (ArgB) domain (this CD), a central DUF619 domain, and a C-terminal
    reductase domain (ArgC, N-Acetylglutamate Phosphate Reductase, NAGPR). The precursor
    is cleaved in the mitochondria into two distinct enzymes (NAGK-DUF619 and NAGPR).
    Native molecular weights of these proteins indicate that the kinase is an octamer
    whereas the reductase is a dimer. This CD also includes some gamma-proteobacteria
    (Xanthomonas and Xylella) NAG kinases with an N-terminal NAGK (ArgB) domain (this
    CD) and a C-terminal DUF619 domain. The DUF619 domain is described as a putative
    distant homolog of the acetyltransferase, ArgA, predicted to function in NAG synthase
    association in fungi. Eukaryotic sequences have an N-terminal mitochondrial transit
    peptide. Members of this NAG kinase domain CD belong to the Amino Acid Kinase
    Superfamily (AAK).'
  b_label: N-Acetyl-L-glutamate kinase, fungal-type
