    of tumor-infiltrating lymphocytes. It can be expressed by activated T cells, but
    to a larger extent on CD8 than on CD4 T cells. In addition, CD137 expression is
    found on dendritic cells, follicular dendritic cells, natural killer cells, granulocytes
    and cells of blood vessel walls at sites of inflammation. It transduces signals
    that lead to the activation of NF-kappaB, mediated by the TRAF adaptor proteins.
    CD137 contributes to the clonal expansion, survival, and development of T cells.
    It can also induce proliferation in peripheral monocytes, enhance T cell apoptosis
    induced by TCR/CD3 triggered activation, and regulate CD28 co-stimulation to promote
    Th1 cell responses. CD137 is modulated by SAHA treatment in breast cancer cells,
    suggesting that the combination of SAHA with this receptor could be a new therapeutic
    approach for the treatment of tumors.
  b_label: Tumour necrosis factor receptor 9, N-terminal
