  a_label: Catalytic domain of the Serine/Threonine Kinase, NIM1. STKs catalyze the
    transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on
    protein substrates. NIM1 is a widely-expressed kinase belonging to the AMP-activated
    protein kinase (AMPK) subfamily. Although present in most tissues, NIM1 kinase
    activity is only observed in the brain and testis. NIM1 is capable of autophosphorylating
    and activating itself, but may be present in other tissues in the inactive form.
    The physiological function of NIM1 has yet to be elucidated. The NIM1 subfamily
    is part of a larger superfamily that includes the catalytic domains of other STKs,
    protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline
    kinase, and phosphoinositide 3-kinase.
  b_label: Serine/threonine kinase NIM1, catalytic domain
