  a_label: CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related
    1 proteins) domain of peptidase inhibitor 15. Peptidase inhibitor 15 (PI15) is
    also called 25 kDa trypsin inhibitor (p25TI), cysteine-rich secretory protein
    8 (CRISP-8), or SugarCrisp. It is a serine protease inhibitor which displays weak
    inhibitory activity against trypsin and may play a role in facial patterning during
    embryonic development. The PI15 gene is a candidate gene for abdominal aortic
    internal elastic lamina ruptures in the rat. PI15 may also participate in the
    regulation of drug resistance in ovarian cancer and serve as a potential target
    in targeted therapies. The wider family of CAP domain containing proteins includes
    plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins
    (CRISPs), and allergen 5 from vespid venom, among others.
