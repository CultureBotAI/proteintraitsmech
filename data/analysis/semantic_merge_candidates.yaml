  a_label: Src Homology 3 domain of fungal BOI-like proteins. This subfamily includes
    the Saccharomyces cerevisiae proteins BOI1 and BOI2, and similar proteins. They
    contain an N-terminal SH3 domain, a Sterile alpha motif (SAM), and a Pleckstrin
    homology (PH) domain at the C-terminus. BOI1 and BOI2 interact with the SH3 domain
    of Bem1p, a protein involved in bud formation. They promote polarized cell growth
    and participates in the NoCut signaling pathway, which is involved in the control
    of cytokinesis. SH3 domains bind to proline-rich ligands with moderate affinity
