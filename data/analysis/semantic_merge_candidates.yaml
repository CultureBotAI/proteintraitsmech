  a_label: Catalytic domain of the Serine/Threonine Kinase, Large Tumor Suppressor
    1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine
    residues on protein substrates. LATS1 functions as a tumor suppressor and is implicated
    in cell cycle regulation. Inactivation of LATS1 in mice results in the development
    of various tumors, including sarcomas and ovarian cancer. Promoter methylation,
    loss of heterozygosity, and missense mutations targeting the LATS1 gene have also
    been found in human sarcomas and ovarian cancers. In addition, decreased expression
    of LATS1 is associated with an aggressive phenotype and poor prognosis. LATS1
    induces G2 arrest and promotes cytokinesis. It may be a component of the mitotic
    exit network in higher eukaryotes. The LATS1 subfamily is part of a larger superfamily
    that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO
    kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide
    3-kinase.
  b_label: Serine/threonine-protein kinase LATS1, catalytic domain
