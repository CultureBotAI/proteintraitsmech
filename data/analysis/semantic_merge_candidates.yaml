    proteins. Cytochrome c-type biogenesis protein CcmH is a membrane-anchored thiol-oxidoreductase
    that is essential in the maturation of c-type cytochromes. CcmH consists of an
    N-terminal catalytic domain with the active site CXXC motif and a C-terminal domain
    of unknown function which is predicted to contain TPR-like repeats. Other members
    of this family include NrfF, CycL, and Ccl2.
