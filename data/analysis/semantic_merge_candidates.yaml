  a_label: The cupredoxin domain of Caa3 type Cytochrome c oxidase subunit II. Cytochrome
    c oxidase (CcO), the terminal oxidase in the respiratory chains of most bacteria,
    is a multi-chain transmembrane protein located in the inner membrane the cell
    membrane of prokaryotes. It catalyzes the reduction of O2 and simultaneously pumps
    protons across the membrane. Caa3 type of CcO Subunit II contains a copper-copper
    binuclear site called CuA, which is believed to be involved in electron transfer
    from cytochrome c to the cytochromes a, a3 and CuB active site in subunit I.
  b_label: Caa3-type Cytochrome c oxidase subunit II, cupredoxin domain
