- a: InterPro:IPR037868
  b: CDD:cd07291
  similarity: 0.946
  a_label: Vacuolar protein sorting-associated protein 5, PX domain
  b_label: The phosphoinositide binding Phox Homology domain of Sorting Nexin 5. The
    PX domain is a phosphoinositide (PI) binding module present in many proteins with
    diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain
    containing proteins. They are involved in regulating membrane traffic and protein
    sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the
    protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity
    and affinity, and the presence of other protein-protein interaction domains, which
    help determine subcellular localization and specific function in the endocytic
    pathway. SNX5, abundantly expressed in macrophages, regulates macropinocytosis,
    a process that enables cells to internalize large amounts of external solutes.
    It may also be a component of the retromer complex, a membrane coat multimeric
    complex required for endosomal retrieval of lysosomal hydrolase receptors to the
    Golgi, acting as a mammalian equivalent of yeast Vsp17p. It also binds the Fanconi
    anaemia complementation group A protein (FANCA). SNX5 harbors a Bin/Amphiphysin/Rvs
    (BAR) domain, which detects membrane curvature, C-terminal to the PX domain, similar
    to other sorting nexins including SNX1-2. The PX-BAR structural unit helps determine
    the specific membrane-targeting of some SNXs. The PX domain of SNX5 binds phosphatidylinositol-3-phosphate
    (PI3P) and PI(3,4)P2. SNX5 is localized to a subdomain of early endosome and is
    recruited to the plasma membrane following EGF stimulation and elevation of PI(3,4)P2
    levels.
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: InterPro
  b_source: CDD
- a: InterPro:IPR037868
  b: CDD:cd06860
  similarity: 0.946
  a_label: Vacuolar protein sorting-associated protein 5, PX domain
  b_label: The phosphoinositide binding Phox Homology domain of Sorting Nexins 7 and
    30. The PX domain is a phosphoinositide (PI) binding module present in many proteins
    with diverse functions. Sorting nexins (SNXs) make up the largest group among
    PX domain containing proteins. They are involved in regulating membrane traffic
    and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and
    targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding
    specificity and affinity, and the presence of other protein-protein interaction
    domains, which help determine subcellular localization and specific function in
    the endocytic pathway. Some SNXs are localized in early endosome structures such
    as clathrin-coated pits, while others are located in late structures of the endocytic
    pathway. This subfamily consists of SNX7, SNX30, and similar proteins. They harbor
    a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature, C-terminal
    to the PX domain, similar to the sorting nexins SNX1-2, SNX4-6, SNX8, and SNX32.
    Both domains have been shown to determine the specific membrane-targeting of SNX1.
    The specific function of the sorting nexins in this subfamily has yet to be elucidated.
  axis: STRUCTURE
  category: STRUCT_DOMAIN
  a_source: InterPro
  b_source: CDD
- a: InterPro:IPR037868
  b: CDD:cd07281
  similarity: 0.946
  a_label: Vacuolar protein sorting-associated protein 5, PX domain
  b_label: The phosphoinositide binding Phox Homology domain of Sorting Nexin 1. The
    PX domain is a phosphoinositide (PI) binding module present in many proteins with
    diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain
    containing proteins. They are involved in regulating membrane traffic and protein
    sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the
    protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity
    and affinity, and the presence of other protein-protein interaction domains, which
    help determine subcellular localization and specific function in the endocytic
    pathway. SNX1 is both membrane associated and a cytosolic protein that exists
    as a tetramer in protein complexes. It can associate reversibly with membranes
    of the endosomal compartment, thereby coating these vesicles. SNX1 is a component
    of the retromer complex, a membrane coat multimeric complex required for endosomal
    retrieval of lysosomal hydrolase receptors to the Golgi. The retromer consists
    of a cargo-recognition subcomplex and a subcomplex formed by a dimer of sorting
    nexins (SNX1 and/or SNX2), which ensures efficient cargo sorting by facilitating
    proper membrane localization of the cargo-recognition subcomplex. SNX1 contains
    a Bin/Amphiphysin/Rvs (BAR) domain C-terminal to the PX domain. The PX domain
    of SNX1 specifically binds phosphatidylinositol-3-phosphate (PI3P) and PI(3,5)P2,
    while the BAR domain detects membrane curvature. Both domains help determine the
    specific membrane-targeting of SNX1, which is localized to a microdomain in early
    endosomes where it regulates cation-independent mannose-6-phosphate receptor retrieval
    to the trans Golgi network.
