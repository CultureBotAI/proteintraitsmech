  a_label: coiled-coil domain found in the geminin family. The geminin family includes
    geminin, geminin coiled-coil domain-containing protein 1 (GemC1), and McIdas.
    Together, geminin, GemC1, and McIdas (also called Idas or multicilin), controls
    both the cell cycle and differentiation decisions in cells. They were initially
    identified as cell cycle regulators associated with the chromosome cycle. Geminin
    is required to ensure once-per-cell-cycle genome replication, while McIdas and
    GemC1 bind to geminin and are implicated in DNA replication control. Geminin binds
    to Cdt1, a key component and crucial regulator of pre-replicative complexes (pre-RC),
    in a timely manner to inhibit DNA replication. Geminin family members also function
    as early regulators of multiciliogenesis. GemC1 and McIdas specify the multiciliate
    cell fate by forming complexes with the E2F4/5 transcription factors, resulting
    in centriole amplification and cilia formation. Geminin family proteins contain
    a homologous central coiled-coil domain that mediates homo- and heterodimerization;
    this ability is likely to be important for modulating their function in cycling
    and differentiating cells. This model represents the central coiled-coil domain
    of the geminin family.
  b_label: Geminin coiled-coil domain-containing protein 1, central coiled-coil domain
  axis: STRUCTURE
