    assembly factor and plays an important role in ribosome biogenesis. It positively
    regulates dimethylation of two adjacent adenosines in the loop of a conserved
    hairpin near the 3'-end of 18S rRNA. PNO1 contains two K-homology (KH) RNA-binding
    domains. The model corresponds to the first one. The KH1 domain is a divergent
    KH domain that lacks the RNA-binding GXXG motif.
