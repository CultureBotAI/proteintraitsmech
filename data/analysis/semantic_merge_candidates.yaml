  a_label: Src homology 3 domain of CAS (Crk-Associated Substrate) scaffolding protein
    family member 4. CASS4, also called HEPL (HEF1-EFS-p130Cas-like), localizes to
    focal adhesions and plays a role in regulating FAK activity, focal adhesion integrity,
    and cell spreading. It is most abundant in blood cells and lung tissue, and is
    also found in high levels in leukemia and ovarian cell lines. CAS proteins function
    as molecular scaffolds to regulate protein complexes that are involved in many
    cellular processes. They share a common domain structure that includes an N-terminal
    SH3 domain, an unstructured substrate domain that contains many YxxP motifs, a
    serine-rich four-helix bundle, and a FAT-like C-terminal domain. The SH3 domain
    of CAS proteins binds to diverse partners including FAK, FRNK, Pyk2, PTP-PEST,
    DOCK180, among others. SH3 domains are protein interaction domains that bind to
    proline-rich ligands with moderate affinity and selectivity, preferentially to
    PxxP motifs. They play versatile and diverse roles in the cell including the regulation
    of enzymes, changing the subcellular localization of signaling pathway components,
    and mediating the formation of multiprotein complex assemblies.
