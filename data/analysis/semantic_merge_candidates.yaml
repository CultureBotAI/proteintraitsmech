  a_label: Pumilio-family RNA binding domain. Puf repeats (also labelled PUM-HD or
    Pumilio homology domain) mediate sequence specific RNA binding in fly Pumilio,
    worm FBF-1 and FBF-2, and many other proteins such as vertebrate Pumilio. These
    proteins function as translational repressors in early embryonic development by
    binding to sequences in the 3' UTR of target mRNAs, such as the nanos response
    element (NRE) in fly Hunchback mRNA, or the point mutation element (PME) in worm
    fem-3 mRNA. Other proteins that contain Puf domains are also plausible RNA binding
    proteins. Yeast PUF1 (JSN1), for instance, appears to contain a single RNA-recognition
    motif (RRM) domain. Puf repeat proteins have been observed to function asymmetrically
    and may be responsible for creating protein gradients involved in the specification
    of cell fate and differentiation. Puf domains usually occur as a tandem repeat
    of 8 domains. This model encompasses all 8 tandem repeats. Some proteins may have
    fewer (canonical) repeats.
  b_label: Pumilio, RNA binding domain
  axis: STRUCTURE
  category: STRUCT_DOMAIN
