  a_label: First Src homology 3 domain (or SH3A) of Intersectin-2. Intersectin-2 (ITSN2)
    is an adaptor protein that functions in exo- and endocytosis, actin cytoskeletal
    reorganization, and signal transduction. It plays a role in clathrin-coated pit
    (CCP) formation. It binds to many proteins through its multidomain structure and
    facilitate the assembly of multimeric complexes. ITSN2 also functions as a specific
    GEF for Cdc42 activation in epithelial morphogenesis, and is required in mitotic
    spindle orientation. It exists in alternatively spliced short and long isoforms.
    The short isoform contains two Eps15 homology domains (EH1 and EH2), a coiled-coil
    region and five SH3 domains (SH3A-E), while the long isoform, in addition, contains
    RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains.
    The first SH3 domain (or SH3A) of ITSN2 is expected to bind many protein partners,
    similar to ITSN1 which has been shown to bind Sos1, dynamin1/2, CIN85, c-Cbl,
    PI3K-C2, SHIP2, N-WASP, and CdGAP, among others. SH3 domains are protein interaction
    domains that bind to proline-rich ligands with moderate affinity and selectivity,
    preferentially to PxxP motifs. They play versatile and diverse roles in the cell
    including the regulation of enzymes, changing the subcellular localization of
    signaling pathway components, and mediating the formation of multiprotein complex
    assemblies.
  b_label: Intersectin-2, first SH3 domain
