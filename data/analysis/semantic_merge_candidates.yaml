  a_label: Src homology 3 domain of Growth Arrest Specific protein 7. GAS7 is mainly
    expressed in the brain and is required for neurite outgrowth. It may also play
    a role in the protection and migration of embryonic stem cells. Treatment-related
    acute myeloid leukemia (AML) has been reported resulting from mixed-lineage leukemia
