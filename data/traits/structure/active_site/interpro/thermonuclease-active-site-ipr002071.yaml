identifier: InterPro:IPR002071
label: Thermonuclease active site
definition: >-
  Staphylococcus aureus secretes a thermostable nuclease ( ), known as thermonuclease (TNase), which is a calcium-dependent enzyme that catalyzes the hydrolysis of both DNA and RNA at the 5' position of the phosphodiester bond yielding 3'-mononucleotides and dinucleotides. This signature contains the three residues, two arginines and a glutamate, that form the active site. The sequence of the TNase of S. aureus is evolutionary related to other TNase's of other Staphylococcus spp as well as to several other proteins.
