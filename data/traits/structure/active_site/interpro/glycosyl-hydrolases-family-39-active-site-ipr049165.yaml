identifier: InterPro:IPR049165
label: "Glycosyl hydrolases family 39, active site"
definition: >-
  This entry represents the active site of glycosyl hydrolases from the family 39, including mammalian lysosomal alpha-L-iduronidase and beta-xylosidase (gene xynB) from Thermoanaerobacter saccharolyticum. This region is located in the N-terminal section and contains a glutamic acid residue which probably acts as the proton donor in the catalytic mechanism.
