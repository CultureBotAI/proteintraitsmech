identifier: InterPro:IPR031158
label: "Glycosyl hydrolases family 10, active site"
definition: >-
  The microbial degradation of cellulose and xylans requires several types of enzymes such as endoglucanases ( ), cellobiohydrolases ( ) (exoglucanases), or xylanases ( ). Fungi and bacteria produces a spectrum of cellulolytic enzymes (cellulases) and xylanases which, on the basis of sequence similarities, can be classified into families. One of these families is known as the cellulase family F or as the glycosyl hydrolases family 10. This entry represents one of the conserved regions in these enzymes, which is centred on a conserved glutamic acid residue that has been shown, in the exoglucanase from Cellulomonas fimi, to be directly involved in glycosidic bond cleavage by acting as a nucleophile.
