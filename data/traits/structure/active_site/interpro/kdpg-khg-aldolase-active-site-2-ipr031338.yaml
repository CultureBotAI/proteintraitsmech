identifier: InterPro:IPR031338
label: "KDPG/KHG aldolase, active site 2"
definition: >-
  4-Hydroxy-2-oxoglutarate aldolase ( ) (KHG-aldolase) catalyzes the interconversion of 4-hydroxy-2-oxoglutarate into pyruvate and glyoxylate. Phospho-2-dehydro-3-deoxygluconate aldolase ( ) (KDPG-aldolase) catalyzes the interconversion of 6-phospho-2-dehydro-3-deoxy-D-gluconate into pyruvate and glyceraldehyde 3-phosphate. These two enzymes are structurally and functionally related. They are both homotrimeric proteins of approximately 220 amino-acid residues. They are class I aldolases whose catalytic mechanism involves the formation of a Schiff-base intermediate between the substrate and the ε-amino group of a lysine residue. In both enzymes, an arginine is required for catalytic activity. This site contains the lysine involved in the Schiff-base formation.
