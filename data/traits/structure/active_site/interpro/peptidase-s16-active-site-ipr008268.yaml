identifier: InterPro:IPR008268
label: Peptidase S16, active site
definition: >-
  Proteolytic enzymes that exploit serine in their catalytic activity are ubiquitous, being found in viruses, bacteria and eukaryotes. They include a wide range of peptidase activity, including exopeptidase, endopeptidase, oligopeptidase and omega-peptidase activity. Many families of serine protease have been identified, these being grouped into clans on the basis of structural similarity and other functional evidence. Structures are known for members of the clans and the structures indicate that some appear to be totally unrelated, suggesting different evolutionary origins for the serine peptidases. Not withstanding their different evolutionary origins, there are similarities in the reaction mechanisms of several peptidases. Chymotrypsin, subtilisin and carboxypeptidase C have a catalytic triad of serine, aspartate and histidine in common: serine acts as a nucleophile, aspartate as an electrophile, and histidine as a base. The geometric orientations of the catalytic residues are similar between families, despite different protein folds. The linear arrangements of the catalytic residues commonly reflect clan relationships. For example the catalytic triad in the chymotrypsin clan (PA) is ordered HDS, but is ordered DHS in the subtilisin clan (SB) and SDH in the carboxypeptidase clan (SC). This signature defines the active site of the serine peptidases belonging to the MEROPS peptidase family S16 (lon protease family, clan SF). These proteases which are dependent on the hydrolysis of ATP for their activity and have a serine in their active site, they include: Bacterial ATP-dependent proteases. The prototype of those bacterial enzymes is the Escherichia coli La protease ( ) (gene lon). La is capable of hydrolysing large proteins; it degrades short-lived regulatory (such as…
