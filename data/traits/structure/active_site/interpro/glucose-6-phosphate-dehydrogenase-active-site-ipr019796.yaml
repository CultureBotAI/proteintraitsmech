identifier: InterPro:IPR019796
label: "Glucose-6-phosphate dehydrogenase, active site"
definition: >-
  Glucose-6-phosphate dehydrogenase (G6PD) catalyses the first step in the pentose pathway, the reduction of glucose-6-phosphate to gluconolactone 6-phosphate. A lysine residue has been identified as a reactive nucleophile associated with the activity of the enzyme. The sequence around this lysine is totally conserved from bacterial to mammalian G6PD's and is used as the pattern to identify the proteins associated with this entry.
