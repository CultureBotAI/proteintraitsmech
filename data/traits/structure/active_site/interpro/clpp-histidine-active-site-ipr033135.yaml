identifier: InterPro:IPR033135
label: "ClpP, histidine active site"
definition: >-
  The endopeptidase Clp from Escherichia coli cleaves peptides in various proteins in a process that requires ATP hydrolysis. Clp is a dimeric protein which consists of a proteolytic subunit (gene clpP) and either of two related ATP-binding regulatory subunits (genes clpA and clpX). ClpP is a serine protease which has a chymotrypsin-like activity. Its catalytic activity seems to be provided by a charge relay system similar to that of the trypsin family of serine proteases, but which evolved by independent convergent evolution. Proteases highly similar to ClpP have been found to be encoded in the genome of the chloroplast of plants and seem to be also present in other eukaryotes. This entry represents a conserved region containing a histidine that is involved in the catalytic triad.
