identifier: InterPro:IPR033126
label: "Glycosyl hydrolases family 9, Asp/Glu active sites"
definition: >-
  The microbial degradation of cellulose and xylans requires several types of enzymes such as endoglucanases, cellobiohydrolases (exoglucanases), or xylanases. Fungi and bacteria produces a spectrum of cellulolytic enzymes (cellulases) and xylanases which, on the basis of sequence similarities, can be classified into families. One of these families is known as the cellulase family E or as the glycosyl hydrolases family 9. Two of the most conserved regions in these enzymes are centred on conserved residues which have been shown, in the endoglucanase D from Cellulomonas thermocellum, to be important for the catalytic activity. The first region contains an active site histidine and the second region contains two catalytically important residues: an aspartate and a glutamate. This entry represents the second region.
