identifier: InterPro:IPR008265
label: Lipase, GDSL, active site
definition: >-
  A variety of lipolytic enzymes with serine as part of the active site have been identified. Protein sequences which contain this active site signature include; Aeromonas hydrophila lipase, Vibrio mimicus arylesterase, Vibrio parahaemolyticus thermolabile haemolysin, rabbit phospholipase (AdRab-B), and Brassica napus anther-specific proline-rich protein. A serine has been identified as part of the active site in the A. hydrophila, V. mimicus and Escherichia coli enzymes.
