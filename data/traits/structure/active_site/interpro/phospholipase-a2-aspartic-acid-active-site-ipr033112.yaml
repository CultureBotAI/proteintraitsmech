label: "Phospholipase A2, aspartic acid active site"
definition: >-
  This entry represents the PLA2 active site aspartic acid and also contains three cysteines involved in disulfide bonds. Phospholipase A2 ( ) (PLA2 or PLA2G1B) is a small lipolytic enzyme that releases fatty acids from the second carbon group of glycerol. It is involved in a number of physiologically important cellular processes, such as the liberation of arachidonic acid from membrane phospholipids. It plays a pivotal role in the biosynthesis of prostaglandin and other mediators of inflammation. PLA2 has four to seven disulphide bonds and binds a calcium ion that is essential for activity. Within the active enzyme, the alpha amino group is involved in a conserved hydrogen-bonding network linking the N-terminal region to the active site. The side chains of two conserved residues, His and Asp, participate in the catalytic network. Many PLA2's are widely distributed in snakes, lizards, bees, and mammals. In mammals, there are at least four forms: pancreatic, membrane-associated, as well as two less well characterised forms. The venom of most snakes contains multiple forms of PLA2. Some of them are presynaptic neurotoxins, which inhibit neuromuscular transmission by blocking acetylcholine release from the nerve termini. Some of the proteins in this family are allergens. Allergies are hypersensitivity reactions of the immune system to specific substances called allergens (such as pollen, stings, drugs, or food) that, in most people, result in no symptoms. A nomenclature system has been established for antigens (allergens) that cause IgE-mediated atopic allergies in humans [WHO/IUIS Allergen Nomenclature Subcommittee King T.P., Hoffmann D., Loewenstein H., Marsh D.G., Platts-Mills T.A.E., Thomas W. Bull. World Health Organ. 72:797-806(1994)]. This nomenclature system is defi…
