identifier: InterPro:IPR008270
label: "Lysozyme GH25-like, active site"
definition: >-
  It has been shown that a number of cell-wall lytic enzymes ( ) are evolutionarily related and can be classified into a single family: Lysozymes (lysin) from Streptococcus pneumoniae bacteriophages of the Cp family. Lysozyme (endolysin) from Lactococcus delbrueckii phage mv1. Autolytic lysozyme from Clostridium acetobutylicum. Lysozyme M1 from Streptomyces globisporus. N,O-diacetylmuramidase (lysozyme ch) from the fungus Chalaropsis. These proteins belong to the Chalaropsis (Ch)-type lyzozymes or glycosyl hydrolases family 25 ( ) [E1]. The Ch-type lysozyme family GH25 exhibits both beta-1,4-N-acetylmuramidase and beta-1,4-N,6-O-diacetylmuramidase activities, and its evolutionary spread is diverse, comprising bacterial, viral (mainly phage) and eukaryotic representatives. The Ch-type lysozyme domain is structurally unrelated to the other lysozyme folds. It has a β/α-barrel fold and is composed of eight β-strands and six α-helices, with the strands forming the staves of the barrel and the helices located around it. A conserved active-site DxE motif may be implicated in catalysis, which could proceed through an oxazoline intermediate. The aspartate residue has been proposed to be the catalytic acid/base, initially protonating the leaving group to facilitate its departure (general acid assistance) and subsequently acting as a general base to activate the hydrolytic water molecule. The glutamate residue acts to stabilise or deprotonate the oxazoline N atom. A third residue, Asp6 of the profile, could also be involved in catalysis with the Glu of the DxE motif if the hydrolysis occurs via a net inversion of the anomeric configuration, with Asp6 acting as the general base, helping to activate the nucleophilic water molecule, and the Glu of the DxE motif acting as the general a…
