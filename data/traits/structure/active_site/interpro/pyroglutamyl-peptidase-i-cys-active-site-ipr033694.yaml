identifier: InterPro:IPR033694
label: "Pyroglutamyl peptidase I, Cys active site"
definition: >-
  Pyroglutamyl peptidase I ( ) (also known as PGP-1, pyrrolidone-carboxylate peptidase, PYRase) is the enzyme that selectively removes pyroglutamate (pGlu) from the N terminus of proteins and peptides. PGP-I is widely found in bacteria, plants and animals. In bacteria and archebacteria PYRase (gene pcp) is a protein of 22-24kDa. It is a cysteine protease with a Cys-His-Glu catalytic triad. This entry represents the cysteine active site.
