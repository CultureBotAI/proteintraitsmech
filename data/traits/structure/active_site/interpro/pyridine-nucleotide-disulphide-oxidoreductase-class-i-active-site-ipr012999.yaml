identifier: InterPro:IPR012999
label: Pyridine nucleotide-disulphide oxidoreductase, class I, active site
definition: >-
  The pyridine nucleotide-disulphide oxidoreductases are FAD flavoproteins which contain a pair of redox-active cysteines involved in the transfer of reducing equivalents from the FAD cofactor to the substrate. On the basis of sequence and structural similarities these enzymes can be classified into two categories. The first category groups together the following enzymes: Glutathione reductase ( ) (GR). Higher eukaryotes thioredoxin reductase ( ). Trypanothione reductase ( ). Lipoamide dehydrogenase ( ), the E3 component of alpha-ketoacid dehydrogenase complexes. Mercuric reductase ( ). The sequence around the two cysteines involved in the redox-active disulphide bond is conserved and can be used as a signature pattern. Note: In positions 6 and 7 of the pattern all known sequences have Asn-(Val/ Ile) with the exception of GR from plant chloroplasts and from cyanobacteria which have Ile-Arg.
