identifier: InterPro:IPR022415
label: ATP:guanido phosphotransferase active site
definition: >-
  This entry represents the conserved region surrounding a cysteine residue in the C-terminal catalytic domain that is implicated in the catalytic activity of these enzymes. C-terminal catalytic domain of ATP:guanido phosphotransferase, which is comprised of a duplication where the common core consists of two β-α-β2-α repeats. The substrate binding site is located in the cleft between N and C-terminal domains, but most of the catalytic residues are found in the larger C-terminal domain. ATP:guanido phosphotransferases are a family of structurally and functionally related enzymes that reversibly catalyse the transfer of phosphate between ATP and various phosphogens. The enzymes belonging to this family include: Glycocyamine kinase, which catalyses the transfer of phosphate from ATP to guanidoacetate. Arginine kinase, which catalyses the transfer of phosphate from ATP to arginine. Taurocyamine kinase, an annelid-specific enzyme that catalyses the transfer of phosphate from ATP to taurocyamine. One member is Smc74, a cercaria-specific enzyme from Schistosoma mansoni. Lombricine kinase, an annelid-specific enzyme that catalyses the transfer of phosphate from ATP to lombricine. Creatine kinase (CK), which catalyses the reversible transfer of high energy phosphate from ATP to creatine, generating phosphocreatine and ADP. Creatine kinase plays an important role in energy metabolism of vertebrates. There are at least four different, but very closely related, forms of CK. Two isozymes, M (muscle) and B (brain), are cytosolic, while the other two are mitochondrial. In sea urchins there is a flagellar isozyme, which consists of the triplication of a CK-domain. A cysteine residue is implicated in the catalytic activity of these enzymes and the region around this…
