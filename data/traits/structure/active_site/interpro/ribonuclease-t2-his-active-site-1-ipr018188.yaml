identifier: InterPro:IPR018188
label: Ribonuclease T2, His active site 1
definition: >-
  The fungal ribonucleases T2 from Aspergillus oryzae, M from Aspergillus saitoi and Rh from Rhizopeus niveus are structurally and functionally related 30 Kd glycoproteins that cleave the 3'-5' internucleotide linkage of RNA via a nucleotide 2',3'-cyclic phosphate intermediates. Two histidines residues have been shown to be involved in the catalytic mechanism of RNase T2 and Rh. These residues and the region around them are highly conserved.
