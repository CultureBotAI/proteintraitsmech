identifier: InterPro:IPR030475
label: "Ribonucleotide reductase small subunit, acitve site"
definition: >-
  Ribonucleotide reductase ( ) catalyses the reductive synthesis of deoxyribonucleotides from their corresponding ribonucleotides. It provides the precursors necessary for DNA synthesis. Ribonucleotide reductase is an oligomeric enzyme composed of a large subunit (700 to 1000 residues) and a small subunit (300 to 400 residues). The small chain binds two iron atoms (three Glu, one Asp, and two His are involved in metal binding) and contains an active site tyrosine radical. The regions of the sequence that contain the metal-binding residues and the active site tyrosine are conserved in ribonucleotide reductase small chain from prokaryotes, eukaryotes and viruses. This entry represents a conserved region that contains the active site residue as well as a glutamate and a histidine involved in the binding of iron.
