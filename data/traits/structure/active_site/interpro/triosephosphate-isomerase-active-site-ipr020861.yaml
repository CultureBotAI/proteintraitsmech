identifier: InterPro:IPR020861
label: Triosephosphate isomerase, active site
definition: >-
  Triosephosphate isomerase ( ) (TIM) is the glycolytic enzyme that catalyses the reversible interconversion of glyceraldehyde 3-phosphate and dihydroxyacetone phosphate. TIM plays an important role in several metabolic pathways and is essential for efficient energy production, highly conserved in prokaryotes and eukaryotes. In pathogenic organisms, this enzyme plays a crucial role obtaining energy for infection and survival. TIM is a dimer of identical subunits, each of which is made up of about 250 amino-acid residues. A glutamic acid residue is involved in the catalytic mechanism. The tertiary structure of TIM has eight β/α motifs folded into a barrel structure. The TIM barrel fold occurs ubiquitously and is found in numerous other enzymes that can be involved in energy metabolism, macromolecule metabolism, or small molecule metabolism. The sequence around the active site residue is perfectly conserved in all known TIM's. Deficiencies in TIM are associated with haemolytic anaemia coupled with a progressive, severe neurological disorder. This entry represents a triosephosphate isomerase conserved site.
