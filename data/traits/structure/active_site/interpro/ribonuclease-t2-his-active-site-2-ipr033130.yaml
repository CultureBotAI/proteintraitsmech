identifier: InterPro:IPR033130
label: "Ribonuclease T2, His active site 2"
definition: >-
  The fungal ribonucleases T2 from Aspergillus oryzae, M from Aspergillus saitoi and Rh from Rhizopeus niveus are structurally and functionally related 30 Kd glycoproteins that cleave the 3'-5' internucleotide linkage of RNA via a nucleotide 2',3'-cyclic phosphate intermediates ( ). A number of other RNAses have been found to be evolutionary related to these fungal enzymes: Self-incompatibility in flowering plants is often controlled by a single gene (S-gene) that has several alleles. This gene prevents fertilization by self-pollen or by pollen bearing either of the two S- alleles expressed in the style. The self-incompatibility glycoprotein from several higher plants of the solanaceae family has been shown to be a ribonuclease. Phosphate-starvation induced RNAses LE and LX from tomato. These two enzymes are probably involved in a phosphate-starvation rescue system. Escherichia coli periplasmic RNAse I (EC 3.1.27.6) (gene rna). Aeromonas hydrophila periplasmic RNAse. Haemophilus influenzae hypothetical protein HI0526. Two histidines residues have been shown to be involved in the catalytic mechanism of RNase T2 and Rh. These residues and the region around them are highly conserved.
