identifier: InterPro:IPR018177
label: L-lactate dehydrogenase, active site
definition: >-
  NAD-dependent L-lactate dehydrogenases from bacteria and eukaryotes functions as the final step in anaerobic glycolysis. Although lactate dehydrogenases have in some cases been mistaken for malate dehydrogenases due to the similarity of these two substrates and the apparent ease with which evolution can toggle these activities, critical residues have been identified which can discriminate between the two activities. This entry represents the active site of L-lactate dehydrogenase, and includes a conserved histidine which is essential to the catalytic mechanism.
