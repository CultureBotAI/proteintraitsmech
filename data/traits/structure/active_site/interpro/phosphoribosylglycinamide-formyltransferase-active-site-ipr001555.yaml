identifier: InterPro:IPR001555
label: "Phosphoribosylglycinamide formyltransferase, active site"
definition: >-
  Phosphoribosylglycinamide formyltransferase ( ) (GART) catalyses the third step in de novo purine biosynthesis, the transfer of a formyl group to 5'-phosphoribosylglycinamide. In higher eukaryotes, GART is part of a multifunctional enzyme polypeptide that catalyses three of the steps of purine biosynthesis. In bacteria, plants and yeast, GART is a monofunctional protein of about 200 amino-acid residues. In the Escherichia coli enzyme, an aspartic acid residue has been shown to be involved in the catalytic mechanism. The region around this active site residue is well conserved in GART from prokaryotic and eukaryotic sources. Mammalian formyltetrahydrofolate dehydrogenase ( ) is a cytosolic enzyme responsible for the NADP-dependent decarboxylative reduction of 10-formyltetrahydrofolate into tetrahydrofolate. It is a protein of about 900 amino acids consisting of three domains; the N-terminal domain (200 residues) is structurally related to GARTs. E. coli methionyl-tRNA formyltransferase ( ) (gene fmt) is the enzyme responsible for modifying the free amino group of the aminoacyl moiety of methionyl-tRMA(fMet). The central part of fmt seems to be evolutionary related to GART's active site region. This signature contains the Asp active site residue.
