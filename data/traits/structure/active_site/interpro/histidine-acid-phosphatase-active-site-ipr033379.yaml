identifier: InterPro:IPR033379
label: "Histidine acid phosphatase active site"
definition: >-
  Histidine acid phosphatases are a heterogeneous group of proteins that hydrolyse phosphate esters, optimally at low pH. It has been shown that a number of acid phosphatases, from both prokaryotes and eukaryotes, share two regions of sequence similarity, each centred around a conserved histidine residue. These two histidines seem to be involved in the enzymes' catalytic mechanism. The first histidine is located in the N-terminal section and forms a phosphohistidine intermediate while the second is located in the C-terminal section and possibly acts as proton donor.
