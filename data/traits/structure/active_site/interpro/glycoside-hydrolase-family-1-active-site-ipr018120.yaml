identifier: InterPro:IPR018120
label: "Glycoside hydrolase family 1, active site"
definition: >-
  Glycoside hydrolase family 1 comprises enzymes with a number of known activities; beta-glucosidase ( ); beta-galactosidase ( ); 6-phospho-beta-galactosidase ( ); 6-phospho-beta-glucosidase ( ); lactase-phlorizin hydrolase ( )/( ); beta-mannosidase ( ); myrosinase ( ). This entry represents a conserved region found in these enzymes. It is centred on a conserved glutamic acid residue which has been shown in the beta-glucosidase from Agrobacterium, to be directly involved in glycosidic bond cleavage by acting as a nucleophile.
definition_source: InterPro
