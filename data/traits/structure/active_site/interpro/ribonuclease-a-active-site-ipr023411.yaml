identifier: InterPro:IPR023411
label: "Ribonuclease A, active site"
definition: >-
  Pancreatic ribonucleases (RNaseA) are pyrimidine-specific endonucleases found in high quantity in the pancreas of certain mammals and of some reptiles. Specifically, the enzymes are involved in endonucleolytic cleavage of 3'-phosphomononucleotides and 3'-phosphooligonucleotides ending in C-P or U-P with 2',3'-cyclic phosphate intermediates. Ribonuclease can unwind the DNA helix by complexing with single-stranded DNA; the complex arises by an extended multi-site cation-anion interaction between lysine and arginine residues of the enzyme and phosphate groups of the nucleotides. Other proteins belonging to the pancreatic RNAse family include: bovine seminal vesicle and brain ribonucleases; kidney non-secretory ribonucleases; liver-type ribonucleases; angiogenin, which induces vascularisation of normal and malignant tissues; eosinophil cationic protein, a cytotoxin and helminthotoxin with ribonuclease activity; and frog liver ribonuclease and frog sialic acid-binding lectin. The sequence of pancreatic RNases contains four conserved disulphide bonds and three amino acid residues involved in the catalytic activity. Pancreatic ribonucleases ( ) are pyrimidine-specific endonucleases present in high quantity in the pancreas of a number of mammalian taxa and of a few reptiles. As shown in the following schematic representation of the sequence of pancreatic RNases there are four conserved disulphide bonds and three amino acid residues involved in the catalytic activity. +---------------------------+ | +------------------|------+ | | | | xxxxx#xxxxxxCxxxxxxC#xxxxxxxCxxCxxxCxxxxxCxxxxxCxxxxxxCxxx#xxx | **** | | | | +---+ | +----------------------------+ 'C': conserved cysteine involved in a disulphide bond. '#': active site residue. '*': position of the pattern. A number of other p…
