label: "N-acetyl-gamma-glutamyl-phosphate reductase, active site"
definition: >-
  N -Acetylglutamate (NAG) fulfils distinct biological roles in lower and higher organisms. In prokaryotes, lower eukaryotes and plants it is the first intermediate in the biosynthesis of arginine, whereas in ureotelic (excreting nitrogen mostly in the form of urea) vertebrates, it is an essential allosteric cofactor for carbamyl phosphate synthetase I (CPSI), the first enzyme of the urea cycle. The pathway that leads from glutamate to arginine in lower organisms employs eight steps, starting with the acetylation of glutamate to form NAG. In these species, NAG can be produced by two enzymatic reactions: one catalysed by NAG synthase (NAGS) and the other by ornithine acetyltransferase (OAT). In ureotelic species, NAG is produced exclusively by NAGS. In lower organisms, NAGS is feedback-inhibited by L-arginine, whereas mammalian NAGS activity is significantly enhanced by this amino acid. The NAGS genes of bacteria, fungi and mammals are more diverse than other arginine-biosynthesis and urea-cycle genes. The evolutionary relationship between the distinctly different roles of NAG and its metabolism in lower and higher organisms remains to be determined. The pathway from glutamate to arginine is: NAGS; N-acetylglutamate synthase ( ) (glutamate to N-acetylglutamate) NAGK; N-acetylglutamate kinase ( ) (N-acetylglutamate to N-acetylglutamate-5P) N-acetyl-gamma-glutamyl-phosphate reductase ( ) (N-acetylglutamate-5P to N-acetylglumate semialdehyde) Acetylornithine aminotransferase ( ) (N-acetylglumate semialdehyde to N-acetylornithine) Acetylornithine deacetylase ( ) (N-acetylornithine to ornithine) Arginase ( ) (ornithine to arginine) N-acetyl-gamma-glutamyl-phosphate reductase ( ) (AGPR) is the enzyme that catalyzes the third step in the biosynthesis of arginine from glutamate,…
