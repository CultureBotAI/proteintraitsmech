identifier: InterPro:IPR033128
label: "Adenylosuccinate synthase, active site"
definition: >-
  Adenylosuccinate synthetase ( ) plays an important role in purine biosynthesis by catalysing the GTP-dependent conversion of IMP and aspartic acid to AMP. Adenylosuccinate synthetase has been characterised from various sources ranging from Escherichia coli (gene purA) to vertebrate tissues. In vertebrates, two isozymes are present, one involved in purine biosynthesis and the other in the purine nucleotide cycle. This entry represents a conserved region containing a lysine residue known to be essential for the enzyme's activity.
