identifier: InterPro:IPR019757
label: Peptidase S26A, signal peptidase I, lysine active site
definition: >-
  Signal peptidases (SPases) (also known as leader peptidases) remove the signal peptides from secretory proteins. In prokaryotes three types of SPases are known: type I (gene lepB) which is responsible for the processing of the majority of exported pre-proteins; type II (gene lsp) which only process lipoproteins, and a third type involved in the processing of pili subunits. SPase I (EC 3.4.21.89) is an integral membrane protein that is anchored in the cytoplasmic membrane by one (in Bacillus subtilis) or two (in Escherichia coli) N-terminal transmembrane domains with the main part of the protein protuding in the periplasmic space. Two residues have been shown to be essential for the catalytic activity of SPase I: a serine and an lysine. SPase I is evolutionary related to the yeast mitochondrial inner membrane protease subunit 1 and 2 (genes IMP1 and IMP2) which catalyse the removal of signal peptides required for the targeting of proteins from the mitochondrial matrix, across the inner membrane, into the inter-membrane space. In eukaryotes the removal of signal peptides is effected by an oligomeric enzymatic complex composed of at least five subunits: the signal peptidase complex (SPC). The SPC is located in the endoplasmic reticulum membrane. Two components of mammalian SPC, the 18 Kd (SPC18) and the 21 Kd (SPC21) subunits as well as the yeast SEC11 subunit have been shown to share regions of sequence similarity with prokaryotic SPases I and yeast IMP1/IMP2. This entry represents the putative active site lysine located in S26 peptidases (SPase I and IMP1/2). This active site lysine is not conserved in the SPC subunits.
