identifier: InterPro:IPR006650
label: Adenosine/AMP deaminase active site
definition: >-
  Adenosine deaminase ( ) catalyzes the hydrolytic deamination of adenosine into inosine and AMP deaminase ( ) catalyzes the hydrolytic deamination of AMP into IMP. It has been shown that these two enzymes share three regions of sequence similarities; these regions are centred on residues which are proposed to play an important role in the catalytic mechanism of these two enzymes. This entry presents one of these regions, it contains two conserved aspartic acid residues that are potential active site residues.
