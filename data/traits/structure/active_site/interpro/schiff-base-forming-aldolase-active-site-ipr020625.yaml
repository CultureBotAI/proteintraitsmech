identifier: InterPro:IPR020625
label: "Schiff base-forming aldolase, active site"
definition: >-
  This entry represents an active site found in members of a structural superfamily of Schiff base-forming aldolases that catalyse reactions in different biological pathways. This superfamily includes members such as dihydrodipicolinate synthase (DHDPS), N-acetylneuraminate lyase (NAL) and 2-keto-3-deoxygluconate aldolase (KDG aldolase). One of the Escherichia coli proteins containing this site, dapA ( ), was first identified as dihydrodipicolinate synthase (DHDPS). Later, it has been identified as 4-hydroxy-tetrahydrodipicolinate synthases ( ).
