identifier: InterPro:IPR030458
label: "Glycosyl hydrolases family 31, active site"
definition: >-
  Glycoside hydrolase family 31 comprises enzymes with several known activities; alpha-glucosidase ( ), alpha-galactosidase ( ); glucoamylase ( ), sucrase-isomaltase ( ); isomaltase ( ); alpha-xylosidase ( ); alpha-glucan lyase ( ). The region around this active residue is highly conserved and is represented in this entry.
