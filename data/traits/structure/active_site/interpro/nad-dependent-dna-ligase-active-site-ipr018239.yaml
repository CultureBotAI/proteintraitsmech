identifier: InterPro:IPR018239
label: "NAD-dependent DNA ligase, active site"
definition: >-
  DNA ligase (polydeoxyribonucleotide synthase) is the enzyme that joins two DNA fragments by catalyzing the formation of an internucleotide ester bond between phosphate and deoxyribose. It is active during DNA replication, DNA repair and DNA recombination. There are two forms of DNA ligase: one requires ATP, the other NAD. Bacterial DNA ligases are NAD-dependent. They are proteins of about 75 to 85 Kd whose sequence is well conserved. They also show similarity to yicF, an Escherichia coli hypothetical protein of 63 Kd.
