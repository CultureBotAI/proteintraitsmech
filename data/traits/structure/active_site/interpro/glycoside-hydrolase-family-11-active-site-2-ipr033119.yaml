identifier: InterPro:IPR033119
label: "Glycoside hydrolase family 11, active site 2"
definition: >-
  The microbial degradation of cellulose and xylans requires several types of enzymes such as endoglucanases ( ), cellobiohydrolases ( ) (exoglucanases), or xylanases ( ). Fungi and bacteria produces a spectrum of cellulolytic enzymes (cellulases) and xylanases which, on the basis of sequence similarities, can be classified into families. One of these families is known as the cellulase family G or as the glycosyl hydrolases family 11. The GH11 domain folds into a jelly-roll shape likened to a partially closed right hand. Several anti-parallel β-strands bend almost 90deg to produce a substrate-binding groove characteristic of the GH11 domain active sites. Two catalytic Glu residues face each other from opposite sides of the groove. The hydrolysis reaction is believed to follow a double- displacement mechanism, with one Glu residue acting as a general acid/base catalyst and the other as a nucleophile. This entry represents a second conserved region found in these enzymes that is centred on glutamic acid residues. The other conserved region is represented in . In Bacillus pumilis xylanase, this site is necessary for catalytic activity.
