identifier: InterPro:IPR000180
label: "Membrane dipeptidase, active site"
definition: >-
  This signature defines the active site of peptidases belong to the MEROPS peptidase family M19 (membrane dipeptidase family, clan MJ). The protein fold of the peptidase domain for members of this family resembles that of Klebsiella urease, the type example for clan MJ. Renal dipeptidase (rDP) ( ), also known as microsomal dipeptidase, is a zinc-dependent membrane dipeptidase that hydrolyses a wide range of dipeptides. It is involved in renal metabolism of glutathione and its conjugates. It is a homodimeric disulphide-linked glycoprotein attached to the renal brush border microvilli membrane by a GPI-anchor. This active site signature contains the glutamate residue that has been shown to be important for the catalytic activity of rDP. rDP seems to be evolutionary related to hypothetical proteins in the PQQ biosynthesis operons of Acinetobacter calcoaceticus and Klebsiella pneumoniae.
