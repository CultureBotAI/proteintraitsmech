identifier: InterPro:IPR020878
label: Ribulose bisphosphate carboxylase, large chain, active site
definition: >-
  This entry represents the active site which includes both the active site residue and the metal ligand, and which is specific to RuBisCO large chains. Ribulose bisphosphate carboxylase (RuBisCO) catalyses the initial step in Calvin's reductive pentose phosphate cycle in plants as well as purple and green bacteria. It catalyzes the primary CO2 fixation step. RuBisCO consists of a large catalytic unit and a small subunit of undetermined function. In plants, the large subunit is coded by the chloroplastic genome while the small subunit is encoded in the nuclear genome. Rubisco is activated by carbamylation of an active site lysine, stabilized by a divalent cation, which then catalyzes the proton abstraction from the substrate ribulose 1,5 bisphosphate (RuBP) and leads to the formation of two molecules of 3-phosphoglycerate.
