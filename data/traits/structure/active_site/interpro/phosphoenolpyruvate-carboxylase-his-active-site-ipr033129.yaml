identifier: InterPro:IPR033129
label: "Phosphoenolpyruvate carboxylase, His active site"
definition: >-
  Phosphoenolpyruvate carboxylase (PEPcase) catalyses the irreversible β-carboxylation of phosphoenolpyruvate by bicarbonate to yield oxaloacetate and phosphate. The enzyme is found in all plants and in a variety of microorganisms. A histidine and a lysine have been implicated in the catalytic mechanism of this enzyme; the regions around these active site residues are highly conserved in PEPcase from various plants, bacteria and cyanobacteria.
