identifier: InterPro:IPR000138
label: Hydroxymethylglutaryl-CoA lyase, active site
definition: >-
  Synonym(s): 3-hydroxy-3-methylglutaryl-coenzyme A synthase, HMG-CoA lyase. HMG-CoA lyase catalyses the transformation of HMG-CoA into acetyl-CoA and acetoacetate. In vertebrates it is a mitochondrial enzyme that is involved in ketogenesis and in leucine catabolism. In some bacteria, such as Pseudomonas mevalonii, it is involved in mevalonate catabolism (gene mvaB). This signature contains the cysteine that has been shown, in mvaB, to be required for the activity of the enzyme.
