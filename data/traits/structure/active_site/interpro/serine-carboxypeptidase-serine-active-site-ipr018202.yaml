identifier: InterPro:IPR018202
label: Serine carboxypeptidase, serine active site
definition: >-
  All known carboxypeptidases are either metallo carboxypeptidases or serine carboxypeptidases ( and ). The catalytic activity of the serine carboxypeptidases, like that of the trypsin family serine proteases, is provided by a charge relay system involving an aspartic acid residue hydrogen-bonded to a histidine, which is itself hydrogen-bonded to a serine. Proteins known to be serine carboxypeptidases include: Barley and wheat serine carboxypeptidases I, II, and III. Yeast carboxypeptidase Y (YSCY) (gene PRC1), a vacuolar protease involved in degrading small peptides. Yeast KEX1 protease, involved in killer toxin and alpha-factor precursor processing. Fission yeast sxa2, a probable carboxypeptidase involved in degrading or processing mating pheromones. Penicillium janthinellum carboxypeptidase S1. Aspergullus niger carboxypeptidase pepF. Aspergullus satoi carboxypeptidase cpdS. Vertebrate protective protein / cathepsin A, a lysosomal protein which is not only a carboxypeptidase but also essential for the activity of both beta-galactosidase and neuraminidase. Mosquito vitellogenic carboxypeptidase (VCP). Naegleria fowleri virulence-related protein Nf314. Yeast hypothetical protein YBR139w. Caenorhabditis elegans hypothetical proteins C08H9.1, F13D12.6, F32A5.3, F41C3.5 and K10B2.2. In higher plants and fungi serine carboxypeptidases are found in the cell vacuoles. In animal cells serine carboxypeptidases are found lysosomes. The sequences surrounding the active site histidine residue are highly conserved in all these serine carboxypeptidases.
