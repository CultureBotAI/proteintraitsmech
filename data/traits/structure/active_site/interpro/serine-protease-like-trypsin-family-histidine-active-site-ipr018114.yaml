identifier: InterPro:IPR018114
label: Serine protease-like, trypsin family, histidine active site
definition: >-
  This entry represents the histidine active site of serine proteases belonging to the MEROPS peptidase family S1 (chymotrypsin family, clan PA(S)). The catalytic activity of the serine proteases from the chymotrypsin family is provided by a charge relay system involving an aspartic acid residue hydrogen-bonded to a histidine, which itself is hydrogen-bonded to a serine. The sequences in the vicinity of the active site histidine residues are well conserved in this family of proteases. The chymotrypsin family is almost totally confined to animals, although trypsin-like enzymes are found in actinomycetes of the genera Streptomyces and Saccharopolyspora, and in the fungus Fusarium oxysporum. The enzymes are inherently secreted, being synthesised with a signal peptide that targets them to the secretory pathway. Animal enzymes are either secreted directly, packaged into vesicles for regulated secretion, or are retained in leukocyte granules.
