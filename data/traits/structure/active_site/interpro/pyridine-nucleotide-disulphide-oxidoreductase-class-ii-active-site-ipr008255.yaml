identifier: InterPro:IPR008255
label: Pyridine nucleotide-disulphide oxidoreductase, class-II, active site
definition: >-
  Pyridine nucleotide-disulphide oxidoreductases (PNDRs) are a family of FAD-dependent flavoproteins that catalyse the reduction of thiol residues in other proteins using NAD(P)H as the reducing equivalent source. They use the isoalloxazine ring of FAD to shuttle reducing equivalents from NAD(P)H to a Cys residue that is usually a part of a redox-active disulphide bridge. In a second step, the reduced disulphide reduces the substrate. They are characterised by a redox-active disulfide bridge and are typically categorised into two main classes (Class I and II) based on sequence and structural similarities. Class II includes: prokaryotic and eukaryotic thioredoxin reductases; bacterial alkyl hydroperoxide reductases; bacterial NADH:dehydrogenases; a probable oxidoreductase encoded in the Clostridium pasteurianum rubredoxin operon; and yeast hypothetical protein YHR106w. This entry represents the PNDR class II active site.
