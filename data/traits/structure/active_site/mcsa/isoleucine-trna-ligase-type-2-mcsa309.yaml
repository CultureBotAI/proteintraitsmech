identifier: MCSA:309
label: isoleucine-tRNA ligase (type 2)
definition: >-
  Isoleucine-tRNA ligase (also known as Isoleucyl-tRNA synthetase) is an alpha monomer that belongs to class Ia tRNA synthetases. It activates not only the cognate substrate L-isoleucine but also the structurally similar L-valine in the first, amino-acylation step. In a second, "editing" step, the synthetase itself rapidly hydrolyses only the valylated products. For this two-step substrate selection, a "double-sieve" mechanism has been proposed to explain the high substrate fidelity and low copy error of the tRNA synthetase. Escherichia coli isoleucyl-tRNA synthetasehas been shown to contain two enzyme-bound zinc atoms per polypeptide chain. The N-terminal zinc ion may play a structural role. Although the two zinc domains are always conserved, the zinc ligands are not, so that there can be both zinc atoms, no zinc atoms or only one of the two. The C-terminal zinc ion is essential (for function in vivo). It plays an important roles in aminoacylation of tRNA(Ile) [PMID:7488160, PMID:8672449].
