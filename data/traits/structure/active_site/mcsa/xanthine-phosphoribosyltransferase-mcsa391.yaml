identifier: MCSA:391
label: xanthine phosphoribosyltransferase
definition: >-
  Xanthine-guanine phosphoribosyltransferase catalyses the conversion of guanine, xanthine and, to a lesser extent, hypoxanthine to GMP, XMP and IMP, respectively. E. coli has three PRTases, which are components of the purine salvage pathway. The EC number reaction is shown in the opposite direction to that thought to happen in vitro.
