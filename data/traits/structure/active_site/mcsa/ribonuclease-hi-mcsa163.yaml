identifier: MCSA:163
label: "ribonuclease HI"
definition: >-
  <p>Members of the RNase H family hydrolyze the P-O3' bond of the RNA strand of an RNA-DNA hybrid duplex in the presence of divalent cations such as Mg(II) and Mn(II). RNase HI is found in <i>Escherichia coli</i> and is structurally homologous to the RNase H domain of HIV-1 reverse transcriptase, a target for anti-HIV therapy.</p> <p>Two alternative mechanisms have been proposed for this enzyme. One is a two-metal-ion mechanism where one of the two metal ions activates the attacking hydroxide ion and the other is a general acid-base mechanism where an amino acid residue fulfils this role. Computational studies seem to favour the two metal ion proposal, however NMR and kinetic studies suggest only one metal binds to this protein and that the protein is inactivated by subsequent metal binding events.</p>
