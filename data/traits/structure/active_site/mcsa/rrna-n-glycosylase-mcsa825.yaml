identifier: MCSA:825
label: rRNA N-glycosylase
definition: >-
  Abrin-A from the seeds of <i>Abrus precatorius</i> is a type II ribosome-inactivating protein (RIP) alongside the homologue Ricin. Like Ricin, it catalyses the endohydrolysis of the N-glycosidic bond at one specific adenosine A4324 on the 28S rRNA. This inhibition of protein biosynthesis is anti-carcinogenic. Abrin-A is composed of two chains which are linked by a disulphide bond. Type I RIPs such as α-Momorcharin however have a single chain, still retaining rRNA-glycosylase activity and share identical catalytic residues to Abrin-A and also excise adenines from a highly conserved loop rRNA.
