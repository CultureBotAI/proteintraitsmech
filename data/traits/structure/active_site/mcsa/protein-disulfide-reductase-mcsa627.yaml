identifier: MCSA:627
label: "protein-disulfide reductase"
definition: >-
  <p>Disulfide bond (Dsb) proteins are required to form disulphide bonds which enable the folding of secreted proteins within the periplasm of <i>Escherichia coli</i>. DsbA catalyses the oxidation of a pair of cysteine sulfhydryl groups, forming disulphide bonds. Electrons generated from the oxidation are transferred from DsbA to DsbB then into the electron transport chain. DsbC, DsbD, DsbE and DsbG repair improperly formed disulfides.</p> <p>The N terminal region of the thioloxidoreductase enzyme DsbD from <i>E. coli</i> is able to reduce the disulphide bond in DsbC and thus participates in the pathway whereby electrons from NADPH are used to break incorrectly formed disulphides in proteins in the periplasm. It displays a unique Ig fold, but still shows homology with the thioloxidoreductase family.</p>
