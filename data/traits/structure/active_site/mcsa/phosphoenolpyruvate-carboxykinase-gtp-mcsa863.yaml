identifier: MCSA:863
label: "phosphoenolpyruvate carboxykinase (GTP)"
definition: >-
  GTP-utilising phosphoenolpyruvate carboxykinase (PEPCK) catalyses the first committed (rate-limiting) step in hepatic gluconeogenesis, namely the reversible decarboxylation of oxaloacetate to phosphoenolpyruvate (PEP) and carbon dioxide using GTP as a source of phosphate.
