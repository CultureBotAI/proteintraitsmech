identifier: MCSA:499
label: 3,2-trans-enoyl-CoA isomerase (peroxisomal)
definition: >-
  Delta3-delta2-enoyl CoA isomerase (enoyl-CoA isomerase) is a peroxisomal enzyme from the yeast Saccharomyces cerevisiae. It catalyses the conversion of 3-cis-enoyl-CoA or 3-trans-enoyl-CoA into 2-trans-enoyl-CoA. This is involved in an auxiliary pathway of fatty acid degradation, and the product is subsequently metabolised further by other enzymes of the pathway. A yeast strain without the isomerase gene is unable to grow on unsaturated fatty acids, suggesting that this is the only enoyl-CoA isomerase in yeast. Enoyl-CoA isomerases use fatty acyl substrates with side-chains ranging from C6 to C16. The reaction used as example uses a C12 compund as substrate
