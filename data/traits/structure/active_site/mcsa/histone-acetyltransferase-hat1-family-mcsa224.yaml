identifier: MCSA:224
label: "histone acetyltransferase (HAT1 family)"
definition: >-
  Hat1, isolated from <i>Saccharomyces cerevisiae</i>, is a type B histone acetyltransferase. It catalyses the sequential acetylation of Lys12 and then Lys5 of newly synthesised histone H4 using acetyl-CoA as the source of the acetyl group. Hat1 associates with the accessory protein Hat2 before binding and acetylating H4. The complex is thought to also bind histone H3. The complex is then imported into the nucleus where the histones are deposited onto DNA with the aid of Hif1. Hat1 is unable to acetylate DNA-associated histones.
