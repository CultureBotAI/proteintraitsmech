identifier: MCSA:558
label: "non-specific acid phosphatases (class A)"
definition: >-
  <p>Non-specific acid phosphatases (NSAPs) are bacterial enzymes that catalyse the dephosphorylation of orthophosphoric monoesters to alcohol and phosphate, in addition to being able to catalyse transphosphorylation. They show broad specificity, being able to phosphorylate a wide range of hydroxy compounds, including p-nitrophenyl phosphate, carbamoyl phosphate, pyrophosphate, glucose-6-phosphate, and ATP.</p> <p>During active catalysis, an activated phospho-enzyme (via the nucleophilic His residue) intermediate is formed that is able to transfer its phosphate group to water, glucose or inosine. Nonspecific acid phosphatases share a conserved active site with mammalian glucose-6-phosphatases (G6Pase). </p> <p>They may be divided into three classes (A, B, C) based on sequence similarity.The <i>Escherichia blattae</i> enzyme (EB-NSAP) is a class A NSAP.</p>
