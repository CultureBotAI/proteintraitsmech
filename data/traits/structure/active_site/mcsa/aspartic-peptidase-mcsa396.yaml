nd extracellular matrix proteins. Its inhibition plays a key role in fighting fungal deceases. It shows preferential cleavage at the carboxyl of hydrophobic amino acids, but fails to cleave 15-Leu-|-Tyr-16, 16-Tyr-|-Leu-17 and 24-Phe-|-Phe-25 of insulin B chain. Activates trypsinogen. Saccharopepsin, EC:3.4.23.25, implicated in the post-translational regulation of S.cerevisiae vacuolar proteinases. Acts on YSCB, on YSCY and on itself. Catalysis the hydrolysis of proteins with broad specificity for peptide bonds. Cleaves -Leu-Leu-|-Val-Tyr- bond in a synthetic substrate. Does not act on esters of Tyr or Arg. Plasmepsin-2, EC:3.4.23.39, which catalyses the hydrolysis of the bonds linking certain hydrophobic residues in hemoglobin or globin. Also cleaves small molecules substrates such as Ala-Leu-Glu-Arg-Thr-Phe-|-Phe(NO2)-Ser-Phe-Pro-Thr.
