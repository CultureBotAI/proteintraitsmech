identifier: MCSA:643
label: "acetate kinase"
definition: >-
  Acetate kinase is a key enzyme for many methanogenic bacteria as it is able to catalyse the interconversion of acetate and acetyl phosphate using the removal of a phosphate from ATP. Structural analysis of the enzyme from <i>Methanosarcina thermophila</i>, an Archaea, shows that it is a member of the sugar kinase superfamily which includes hexokinase, and geochemical studies suggest that it is most likely to be the urkinase- the ancestor of all of the members of the superfamily.
