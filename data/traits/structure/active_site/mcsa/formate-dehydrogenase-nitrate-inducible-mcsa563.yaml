identifier: MCSA:563
label: formate dehydrogenase (nitrate-inducible)
definition: >-
  <p>Formate dehydrogenase-N (Fdn-N) isolated from Escherichia coli catalyses the oxidation of formate to carbon dioxide and a proton, coupled to the reduction of menaquinone to menaquinol. Fdn-N is involved in nitrate respiration and forms a redox loop with dissimilatory nitrate reductase (Nar). Together they pump protons across the membrane by reducing menaquinone at Fdn-N (taking up protons from the cytoplasm) and oxidising menaquinol at Nar, (releasing protons into the periplasm). They also generate a membrane potential by moving electrons from Fdn-N to Nar. </p> <p>Fdn-N contains an active site for formate oxidation (alpha subunit) and an active site for menaquinone reduction (gamma subunit). They are linked by a redox chain containing two haem groups (gamma), five [4Fe-4S] clusters (FeS-0 in alpha and FeS-1 to FeS-4 in beta) and a molybdenum(VI) ion coordinated to two molybdopterin-guanine dinucleotides, the selenate group from Se-Cys196(alpha) and a hydroxide ion (alpha).</p>
definition_source: M-CSA (Thornton lab, EBI; fetched via REST API)
