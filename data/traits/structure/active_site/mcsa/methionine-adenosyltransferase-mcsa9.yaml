identifier: MCSA:9
label: "methionine adenosyltransferase"
definition: >-
  In biological systems, methyl groups are transferred from a small number of donors to a large number of acceptors. S-adenosylmethionine (AdoMet) is the most widespread of these donors, and is synthesised solely by the action of AdoMet synthase. <br/><br/> The catalytic site of this enzyme, found in a cleft between two subunits, conducts an unusual reaction pathway where a triphosphate chain is cleaved from ATP as AdoMet is formed and the triphosphate is hydrolysed to diphosphate and phosphate before the product is released. There are three similar domains arranged around a pseudo-threefold symmetry axis.
