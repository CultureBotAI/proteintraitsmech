identifier: MCSA:981
label: ferredoxin:CoB-CoM heterodisulfide reductase
definition: >-
  Methyl-coenzyme M (methyl-S-CoM) and coenzyme B (HS-CoB) form the heterodisulfide CoM-S-S-CoB which can be reduced back to HS-CoB and HS-CoM by the HdrABC enzyme complex. The reaction takes place in the HdrB subunit of the HdrABC-MvhAGD complex, which is of interest because it catalyses an iron-sulfur cluster-assisted disulfide reduction mechanism. HdrB adopts an aspartate racemase-like fold with two similar noncubane [4Fe-4S] clusters composed of highly distorted [3Fe-3S] and [2Fe-2S] subclusters. The subunit contains a duplicated CCG motif which is predicted to be a binding motif for iron-sulfur clusters.
