identifier: MCSA:561
label: cellulase (GH45)
definition: >-
  Endoglucanase V (EGV) from <i>Humicola insolens</i> is a cellulase, catalysing the hydrolysis of the beta-(1,4) glycosidic bond of cellulose. Although the active site resembles lysozyme, with six hexose binding sites and similarly placed acidic residues, the enzymes are structurally different and produce products with different stereochemistries. It is a member of the glycoside hydrolase family 45.
