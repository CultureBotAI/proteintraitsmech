identifier: MCSA:38
label: "GTP cyclohydrolase I"
definition: >-
  GTP cyclohydrolase I catalyses the complex reaction which converts GTP to dihydroneopterin triphosphate. This is the first step of a pathway, which in plants and micro-organisms leads to tetrahydrofolate production, and in animals leads to tetrahydrobiopterin production. Tetrahydrobiopterin is biologically important as it serves as a cofactor in the production of catecholamines and nitric oxide. Genetic defects in GTP cyclohydrolase can therefore lead to severe neurological disorders. Enzymes involved in the formation of tetrahydrofolate are also important anti-infection drug targets. <br/><br/> Allosteric enzyme. Activity is modulated by K+, divalent cations, UTP, and tetrahydrobiopterin. Tetrahydrobiopterin is an inhibitor of this enzyme.
