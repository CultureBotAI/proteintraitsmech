identifier: MCSA:184
label: "pectate lyase L (polysaccharide lyase 9 family)"
definition: >-
  Endo-acting pectate lyase L (Pel9A) is from the bacteria <i>Erwini chrysanthemi</i>. It catalyses the eliminative cleavage of pectate to give oligosaccharides with 4-deoxy-alpha-D-gluc-4-enuronosyl groups at their non-reducing ends. This particular bacteria causes soft rot diseases. It secretes enzymes such as Pel9A which break down pectin, a key component of cell walls.
