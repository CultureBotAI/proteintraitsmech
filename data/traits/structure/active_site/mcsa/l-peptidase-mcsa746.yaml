definitions:
  - kind: MECHANISTIC
    text: >-
      The leader protease of foot-and-mouth disease virus FMDV Lpro is a papain-like protease where, as well as cleaving itself from the nascent viral polyprotein, disables host cell protein synthesis by specific proteolysis of a cellular protein: the eukaryotic initiation factor 4G (eIF4G). Its sole role in viral maturation is to free itself from the polyprotein by cleavage between its own C-terminus and the N-terminus of VP4 at the sequence ArgLys LeuLys-|-GlyAlaGlySer. Later it plays the role of lysing the host cell protein eukaryotic initiation factor eIF4G at the sequence AlaAsnLeuGly-|-ArgThrThrLeu and other eIF4G sequences. As a result, the domain of eIF4G which binds the cap-binding protein eIF4E is separated from the domain of eIF4G which binds eIF3, so that the infected cell is unable to recruit its own capped mRNA to the 40S ribosome. Substrate specificity is achieved with four acidic residues 163-166, not seen in other papain-like proteases.
    source: "M-CSA"
    method: SOURCED
