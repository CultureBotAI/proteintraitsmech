identifier: MCSA:181
label: "phosphonoacetaldehyde hydrolase"
definition: >-
  Phoshonoacetaldehyde hydrolase (phosphonatase) from <i>Bacillus cereus</i> catalyses the hydrolytic P-C bond cleavage of phosphonoacetaldehyde (Pald) to form orthophosphate and acetaldehyde. It is a process involved in metabolism in bacteria.
