identifier: MCSA:873
label: orotate phosphoribosyltransferase
definition: >-
  Orotate phosphoribosyltransferase (OPRTase) is involved in the biosynthesis of pyrimidine nucleotides. In the pyrimidine synthesis pathway, OPRT catalyses the reversible phosphoribosyl transfer from 5'-phospho-alpha-D-ribose 1'-diphosphate (PRPP) to orotic acid (OA), forming pyrophosphate and orotidine 5'-monophosphate (OMP). The mechanism of PRTases has been the subject of much debate over the years. However, stereochemical results argue against mechanisms which invoke a covalent enzyme-phosphoribosyl intermediate. Kinetic studies argue against a direct SN2-type displacement. Thus, a two-step, SN1-type mechanisms with oxocarbonium-like transition states or intermediates has been proposed as the most likely mechanism. However, there is still much debate as to the exact roles of the residues involved.
