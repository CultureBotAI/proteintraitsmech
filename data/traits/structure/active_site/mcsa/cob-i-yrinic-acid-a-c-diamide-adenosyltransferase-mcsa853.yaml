identifier: MCSA:853
label: "cob(I)yrinic acid a,c-diamide adenosyltransferase"
definition: >-
  The corrinoid adenosylation pathway comprises three steps: (i) reduction of Co(III) to Co(II) by a one-electron transfer. (ii) Co(II) is reduced to Co(I) in a second single-electron transfe, and (iii) the Co(I) conducts a nucleophilic attack on the adenosyl moiety of ATP to leave the cobalt atom in a Co(III) state. The enzyme responsible for the adenosylation reaction is the product of the gene cobO in the aerobic bacterium <i>Pseudomonas denitrificans</i> and of the gene cobA in the anaerobic bacterium <i>Salmonella typhimurium</i>. This entry represents the cobA gene product, which shows a preference for ATP and Mn(II), although it is able to transfer a variety of nucleosides to the cobalt, including CTP, UTP and GTP, in decreasing order of preference and to use Mg(ii) instead of Mn(II).
