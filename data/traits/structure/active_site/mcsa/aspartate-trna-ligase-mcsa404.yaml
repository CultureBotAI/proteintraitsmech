identifier: MCSA:404
label: "aspartate---tRNA ligase"
definition: >-
  Catalyzes the attachment of aspartmate to tRNA(Asp) in a two-step reaction: aspartate is first activated by ATP to form Asp-AMP and then transferred to the acceptor end of tRNA(Asp). Is specific for tRNA(Asp) since it aspartylates tRNA(Asn) 3 orders of magnitude less efficiently than tRNA(Asp). <br/><br/> Aspartyl tRNA synthetase is an alpha2 dimer that belongs to class IIb. Structural analysis combined with mutagenesis and enzymology data on the yeast enzyme point to a tRNA binding process that starts by a recognition event between the tRNA anticodon loop and the synthetase anticodon binding module.
