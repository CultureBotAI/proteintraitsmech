identifier: MCSA:613
label: "deoxyribose-phosphate aldolase"
definition: >-
  The class I aldolase Deoxyribose-5-phosphate aldolase from <i>Escherichia coli</i> is able to catalyse the formation of DRP from acetaldehyde and glyceraldehyde-3-phosphate. As such is it a rare form of class I aldolase as it is able to catalyse the condensation between two aldehydes rather than an aldehyde and a ketone.
