identifier: MCSA:43
label: purple acid phosphatase
definition: >-
  Purple acid phosphatases (PAPs) are metalloenzymes found in animals, plants and fungi. They possess a binuclear metal centre to catalyse the hydrolysis of phosphate esters (e.g. of sugars or proteins) and anhydrides (e.g. ATP) under acidic conditions. The distinctive purple colour of these enzymes is due to a metal to ligand charge transfer from a tyrosine phenolate to a chromophoric Fe(III). The cornerstone of the active site of PAP is the presence of two metal ions; Fe(III) is always present in the chromophoric site, while the second site can be occupied by a redox active Fe(II/III) in mammals or a Zn(II) or Mn(II) in plants. Crystal structures of human, pig, rat, and plant PAPs have been determined and show that the amino acid ligands of the metal ions are completely conserved across plant and animal PAPs, but there are some differences in the identities of the residues that line the active site.
