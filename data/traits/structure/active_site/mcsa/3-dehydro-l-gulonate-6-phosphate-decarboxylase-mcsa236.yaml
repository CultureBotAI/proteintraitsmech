identifier: MCSA:236
label: 3-dehydro-L-gulonate-6-phosphate decarboxylase
definition: >-
  <p>3-keto-L-gulonate 6-phosphate decarboxylase (KGPDC), isolated from <i>Escherichia coli</i>, catalyses the decarboxylation of 3-keto-L-gulonate 6-phosphate to L-xylulose 5-phosphate and carbon dioxide. KGPDB is a member of the orotidine 5'-monophosphate decarboxylase suprafamily, in that it shares a common active site architecture but not substrate specificity or mechanism. KGPDC is promiscuous and can also catalyse a low level of the D-arabino-hex-3-ulose 6-phosphate synthase (HPS) reaction: D-ribulose 5-phosphate and formaldehyde to D-arabino-hex-3-ulose 6-phosphate.</p> <p>KGPDC exists as a homodimer with two active sites. Residues from both subunits can be found in each active site.</p>
