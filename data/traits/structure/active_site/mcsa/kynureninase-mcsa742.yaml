identifier: MCSA:742
label: kynureninase
definition: >-
  Kynureninase is a pyridoxal-5'-phosphate (PLP)-dependent enzyme sourced from <i>Pseudomonas fluorescens</i> that catalyses the hydrolytic cleavage of L-kynurenine to anthranilic acid and L-alanine. This reaction is a key step in the catabolism of L-tryptophan. In fungi and vertebrates, kynurenine is first hydroxylated to 3-hydroxykynurenine - the preferred substrate of kynureninase in those organisms, resulting in 3-hydroxyanthranilate and L-alanine. Kynureninase also plays a role in the biosynthesis of NAD-(P)+. The product of kynureninase is subsequently converted by 3-hydroxyanthranilate-3,4-dioxygenase to quinolinic acid - a precursor of NAD-(P)+. Quinolinic acid is a neurotoxin due to it's agonist effects on N-methyl-D-aspartate receptor. Excessive levels of quinolinic acid have been implicated in a wide range of neurological disorders such as epilepsy, stroke and AIDS related dementia. Therefore, inhibitors of kynureninase are of interest as potential drugs for the treatment of these CNS disorders.
