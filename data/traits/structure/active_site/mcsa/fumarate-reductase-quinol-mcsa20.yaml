identifier: MCSA:20
label: "fumarate reductase (quinol)"
definition: >-
  Fumarate respiration is the most commonly occurring type of anaerobic respiration with fumarate acting as a terminal electron acceptor. The physiological reductant is unknown, but evidence indicates that flavocytochrome c participates in electron transfer from formate to fumarate and possibly also to trimethylamine oxide (TMAO). <br/><br/> In Shewanella species, fumarate reductase is a soluble periplasmic, tetaheme, FAD-containing enzyme called flavocytochrome c3 (Fcc3). <br/><br/> Fumarate reductases, which catalyse the interconversion of fumarate and succinate are known to be membrane bound in bacteria although soluble versions also exist in yeast, procyclic <i>Trypanosoma brucei</i> and several Shewanella species. The active site is located in the centre of the protein, at the interface between the three catalytic domains. Catalysis in the soluble fumarate reductase is essentially unidirectional (from fumarte to succinate).
