identifier: MCSA:734
label: "protein disulfide oxidoreductase"
definition: >-
  DsbB isolated from <i>Escherichia coli</i> is able to create disulfide bonds <i>de novo</i>. It forms a complex with DsbA and overall there is a net formation of a disulfide bridge in DsbA and a quinone cofactor is reduced in DsbB. The quinone can either be ubiquinone (under aerobic conditions) or menaquinone (under anaerobic conditions). DsbA is a periplasmic dithiol oxidase and it is the primary disulfide bond donor in the periplasm. The disulfide bond to be produced in DsbA is between Cys30 and Cys33. Two disulfide bonds exist in DsbB in the resting state, Cys41-Cys44 and Cys104-Cys130; they are involved in the catalytic pathway.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
