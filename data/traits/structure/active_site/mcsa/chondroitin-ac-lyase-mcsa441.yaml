identifier: MCSA:441
label: chondroitin AC lyase
definition: >-
  Glycosaminoglycans (GAGs) are highly negatively charged polysaccharides, formed from disaccharide repeating units. For a number of bacterial species, including <i>Flavobacterium heparinum</i> synthesise GAG lyases, these enzymes are used to degrade and utilise glycosaminoglycans as a source of carbon in the bacterium's natural environment. <br/><br/> This enzyme from <i>Flavobacterium heparinum</i> is highly activated to chondroitin 4-sulfate and chondroitin 6-sulfate. These GAGs are major components of the extracellular matrix. The enzyme consists of two domains, a C-terminal domain containing a 4-beta-sheet sandwich, and an N-terminal domain containing the active site which is made up of alpha-helices. Although calcium is known to be activating, it is not yet clear if it is actively involved in the catalytic mechanism or in substrate binding/recognition.
