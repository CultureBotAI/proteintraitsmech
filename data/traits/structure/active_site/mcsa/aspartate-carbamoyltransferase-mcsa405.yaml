identifier: MCSA:405
label: aspartate carbamoyltransferase
definition: >-
  Aspartate carbamoyltransferase catalyses the formation of N-carbamoyl-L-aspartate and inorganic phosphate from carbamoyl phosphate and L-aspartate. In many prokaryotes such as E. coli this reaction is the committed step in pyrimidine biosynthesis. The E. coli protein exits as a heterododecamer (2C3:3R2) of six catalytic PyrB chains organized as two trimers (C3), and six regulatory PyrI chains organized as three dimers (R2). The PyrI chain is involved in the allosteric regulation of the catalytic reaction and binds one zinc ion. E. coli aspartate transcarbamoylase is feedback inhibited by CTP and by UTP in the presence of CTP.
