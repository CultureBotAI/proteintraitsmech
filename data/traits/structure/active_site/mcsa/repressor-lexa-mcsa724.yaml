identifier: MCSA:724
label: repressor LexA
definition: >-
  LexA repressor (LexA) from <i>Escherichia coli</i> hydrolyses the specific peptide bond between Alanine and Glycine residues. It is of the peptidase S24 family. It can take two conformations; cleavable and non cleavable. In the non cleavable conformer, the Ala 84 - Gly 85 peptide bond lies about 20 angstroms away from the active site. In the cleavable conformer, part of the protein, the Ala 84 - Gly 85 peptide bond lies directly adjacent to the active site. In this case, LexA will cleave itself and become denatured. This function allows LexA to control the SOS response of E. coli to conditions that damage DNA or inhibit DNA replication.
