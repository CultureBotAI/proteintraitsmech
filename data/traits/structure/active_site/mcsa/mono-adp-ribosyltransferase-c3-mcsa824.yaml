identifier: MCSA:824
label: mono-ADP-ribosyltransferase C3
definition: >-
  <i>Clostridium boltulinum</i> C3 exoenzyme catalyses the transfer of the ADP-ribose moiety of NAD onto asparagine 41 of the small GTP-binding protein Rho. This ADP-ribosylation inactivates Rho, blocking Rho activity in regulating the cytoskeleton and leading to cytoskeleton depolymerisation. The protein synthesis inhibitors (inactivate the eukaryotic elongation factor 2 eEF2) diptheria toxin from <i>Corynebacterium diphtheriae</i> and exotoxin A (ETA) from <i>Pseudomonas aeruginosa</i> are also ADP-ribosyltransferases, contain a conserved Glu and thought to proceed through the same catalytic mechanism.
