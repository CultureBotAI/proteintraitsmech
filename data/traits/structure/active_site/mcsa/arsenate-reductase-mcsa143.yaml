identifier: MCSA:143
label: arsenate reductase
definition: >-
  Arsenate reductase (ArsC) from Staphylococcus aureus catalyses the reduction of arsenate to arsenite. It participates in the arsenic detoxification system of the gram-positive bacterium. ArsC also catalyses dephosphorylation in addition to reduction, although at a reduced efficiency. Arsenate reductase has a PTPase-I fold typical for low molecular weight tyrosine phosphatases which includes the catalytic P-loop and the similarity is corresponds to the similarity between arsenate and phosphate ions. The structural similarity of this fold has resulted in arsenate reductase displaying phosphatase activity in vitro as well as being able to reduce arsenate.
