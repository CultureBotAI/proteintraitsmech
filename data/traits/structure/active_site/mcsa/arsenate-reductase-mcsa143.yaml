identifier: MCSA:143
label: "arsenate reductase"
definition: >-
  <p>Arsenate reductase (ArsC) from <i>Staphylococcus aureus</i> catalyses the reduction of arsenate to arsenite. It participates in the arsenic detoxification system of the gram-positive bacterium. ArsC also catalyses dephosphorylation in addition to reduction, although at a reduced efficiency.<p/><p> Arsenate reductase has a PTPase-I fold typical for low molecular weight tyrosine phosphatases which includes the catalytic P-loop and the similarity is corresponds to the similarity between arsenate and phosphate ions. The structural similarity of this fold has resulted in arsenate reductase displaying phosphatase activity in vitro as well as being able to reduce arsenate.<p/>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
