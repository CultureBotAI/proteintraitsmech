identifier: MCSA:677
label: "pyridoxal 5'-phosphate synthase"
definition: >-
  <i>Escherichia coli</i> pyridoxine 5'-phosphate oxidase is the enzyme catalysing the final step in the synthesis of pyridoxal 5'-phosphate, a vital cofactor in many metabolic processes including amino acid metabolism. This means that the synthetic pathway is of great importance to the survival of the bacteria. The enzyme is also present in higher organisms, and the <i>Escherichia coli</i> form is expected to show significant sequence and structural homology to the mammalian form. Of particular interest is the second binding site of PLP which protects the product of the reaction from release into the cell so it can be transferred directly onto the enzymes that require it.
