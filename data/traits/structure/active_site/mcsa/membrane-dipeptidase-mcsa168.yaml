identifier: MCSA:168
label: "membrane dipeptidase"
definition: >-
  Renal Dipeptidase (hrDP), sourced from <i>Homo sapiens</i>, is a membrane-bound glyco-protein involved in hydrolysis of dipeptides. Hydrophobic dipeptides are cleaved preferentially, including prolyl amino acids. In the renal cortex, it is bound to the microvillar membranes in the brush-border region of proximal tubules. hrDP is involved in the hydrolytic metabolism of penem and carbapenem beta-lactam antibiotics. It also plays important roles in the renal metabolism of glutathione.
