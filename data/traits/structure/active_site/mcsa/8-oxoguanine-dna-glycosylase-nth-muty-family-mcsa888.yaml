identifier: MCSA:888
label: "8-oxoguanine DNA-glycosylase (Nth/MutY family)"
definition: >-
  The spectrum of DNA damage caused by reactive oxygen species includes a wide variety of modifications of purine and pyrimidine bases. Among these modified bases, 7,8-dihydro-8-oxoguanine (8-oxoG) is an important mutagenic lesion. Base excision repair is a critical mechanism for preventing mutations by removing the oxidative lesion from the DNA. <i>Escherichia coli</i> Nth protein (endonuclease III) has an 8-oxoG DNA glycosylase/AP lyase activity which removes 8-oxoG preferentially from 8-oxoG/G mispairs. <i>Homo sapiens</i> hNTH1 protein, a homologue of <i>Escherichia coli</i> Nth protein, has similar DNA glycosylase/AP lyase activity that removes 8-oxoG from 8-oxoG/G mispairs [PMID:11328882].
