identifier: MCSA:967
label: "NADPH-dependent 7-cyano-7-deazaguanine reductase"
definition: >-
  First discovered from the biosynthetic pathway of queuosine, QueF nitrile reductase is part of the tRNA biosynthetic pathway in the cytosol of bacteria. The role of QueF in this pathway is to catalyse the NADPH-dependent reduction of 7-cyano-7-deazaguanine (preQ<sub>0</sub>) to 7-aminomethyl-7-deazaguanine (preQ<sub>1</sub>) by a unique four-electron reduction of nitrile to amine. This pathway is crucial for the pathogenicity of bacteria and has the potential to be used in industrial catalysis of organic compounds.
