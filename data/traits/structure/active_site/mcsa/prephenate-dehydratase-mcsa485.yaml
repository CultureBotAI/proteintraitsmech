identifier: MCSA:485
label: prephenate dehydratase
definition: >-
  Prephenate dehydratase (EC:4.2.1.51, PDT) catalyses the decarboxylation of prephenate to phenylpyruvate. In microorganisms it is part of the terminal pathway of phenylalanine biosynthesis. In some bacteria, e.g. <i>E. coli</i> PDT is part of the multi-functional P-protein that also catalyses the transformation of chorismate into prephenate (chorismate mutase), while in other bacteria it is a monofunctional enzyme.
