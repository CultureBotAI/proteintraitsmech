identifier: MCSA:433
label: neopullulanase
definition: >-
  Neopullulanase is a member of the glycoside hydrolase family 13 (GH13) and is one of the family enzymes with a unique substrate specificity that hydrolyses pullulan to produce panose, maltose and glucose in a final molar ratio of 3:1:1. This enzyme hydrolyses alpha-1,4 and alpha-1,6-glucosidic linkages, and catalyses transglycosylation reactions to form both alpha-1,4 and alpha-1,6-glucosidic bonds. <br/><br/> Neopullulanase (EC 3.2.1.135) is a special glycoside hydrolase that is able to catalyse several biochemical reactions, such as the hydrolysis of both alpha-1,4- and alpha-1,6-glucosidic linkages and their formation by transglycosylation. Neopullulanase is, in fact, nearly indistinguishable from the two closely related enzyme specificities, maltogenic amylase (EC 3.2.1.133) and cyclomaltodextrinase (EC 3.2.1.54). The three groups of enzymes contain ∼130 residues at the N terminus that are absent in the smaller alpha-amylases. <br/><br/> They are known to bind Ca, but it is remote from the active site and not involved in the mechanism.
