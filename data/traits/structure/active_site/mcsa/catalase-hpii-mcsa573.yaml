identifier: MCSA:573
label: "catalase (HPII)"
definition: >-
  Catalase is a heme containing enzyme which catalyses the breakdown of hydrogen peroxide to water and molecular oxygen. It also has a peroxidase activity where the reduction of hydrogen peroxide is accompanied by the oxidation of another compound. Catalase is present in all aerobic cells. Its main function is to protect cells from the toxic effects of hydrogen peroxide. In eukaryotic organisms and in some prokaryotes catalase is a molecule composed of four identical subunits. Each of the subunits binds one protoheme IX group. Catalase HPII from <i>Escherichia Coli</i> is the largest known catalase. A unique covalent bond between the Cb of the essential Tyr415 and the Nd of His392 has been noted.
