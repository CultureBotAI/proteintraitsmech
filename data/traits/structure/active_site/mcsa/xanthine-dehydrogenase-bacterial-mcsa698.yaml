identifier: MCSA:698
label: "xanthine dehydrogenase (bacterial)"
definition: >-
  <i>Rhodobacter capsulatus</i> xanthine dehydrogenase (RcXDH), a cytoplasmic enzyme, catalyses the hydroxylation of a wide variety of purine, pyrimidine, pterin, and aldehyde substrates. Oxidation of the substrate occurs in the molybdenum centre, and the reduced enzyme is reoxidised by the oxidant substrate, NAD+ or molecular oxygen, through FAD. The cofactors of this enzyme are located on different polypeptides. The FAD and the two different [2Fe-2S] iron-sulphur clusters are found on the XDHA subunit, while the molybdenum cofactor (Moco), with a bicyclic pterin and monocyclic pyran coordinated to it, is bound to the XDHB subunit.
