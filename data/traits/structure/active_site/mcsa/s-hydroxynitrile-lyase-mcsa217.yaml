identifier: MCSA:217
label: (S)-hydroxynitrile lyase
definition: >-
  Hydroxynitrile lyases (HNLs) are important members of the alpha/beta-hydrolase superfamily, and they catalyze the cleavage of cyanohydrins into aldehyde (or ketone) and hydrocyanic acid (HCN). The release of HCN not only protects plant systems from herbivores and microbial attack, but also provides a nitrogen source for the biosynthesis of asparagine. <br/><br/> The enzyme from <i>Hevea brasiliensis</i> tolerates aliphatic (including alpha,beta-unsaturated), aromatic and heterocyclic aldehydes, whereas the enzyme from <i>Manihot esculenta</i> catalyses the addition of hydrogen cyanide to aliphatic, aromatic, heteroaromatic aldehydes and methyl ketones. Both are specific to the S enantiomer. The overall reaction catalysed is very reversible and of importance to synthetic organic chemists.
