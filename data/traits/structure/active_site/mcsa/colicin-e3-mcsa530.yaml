identifier: MCSA:530
label: colicin-E3
definition: >-
  Colicin E3 kills <i>Escherichia coli</i> cells by binding to a surface receptor, entering the cell and inactivating protein biosynthetic machinery by ribonucleolytic cleavage of the ribosomal subunit 16S rRNA. The mechanism shows homology to ribonuclease T1.
