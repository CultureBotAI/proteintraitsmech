identifier: MCSA:472
label: "serine/threonine-protein phosphatase 5"
definition: >-
  Serine/threonine protein phosphatase 5 (PP5) from <i>Homo sapiens</i> hydrolyses a phosphoprotein substrate into a protein and a phosphate group. It is implicated in wide ranging cellular processes, including apoptosis, differentiation, DNA damage response, cell survival, regulation of ion channels or circadian rhythms, in response to steroid and thyroid hormones, calcium, fatty acids, TGF-beta as well as oxidative and genotoxic stresses. It is a member of the PPP gene family of protein phosphatases that is widely expressed in mammalian tissues.
