identifier: MCSA:910
label: scytalone dehydratase
definition: >-
  Scytalone dehydratase (SD) catalySes the dehydrations of scytalone and vermelone in the fungal melanin biosynthetic pathway. It was first identified in a phytopathogenic fungus, <I>Magnaporthe grisea</I> (Rice blast fungus), which causes rice blast disease. Scytalone dehydratase is a molecular target of inhibitor design efforts aimed at protecting rice plants from fungal disease [PMID:9922139, PMID:14716498].
