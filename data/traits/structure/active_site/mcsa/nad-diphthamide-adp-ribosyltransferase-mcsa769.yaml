identifier: MCSA:769
label: "NAD+---diphthamide ADP-ribosyltransferase"
definition: >-
  Exotoxin A (ETA) from <i>Pseudomonas aeruginosa</i> is an NAD+-diphthamide ADP-ribosyltransferase from the enzyme family of mono-ADP-ribosyltransferases. It catalyses the ADP-ribosylation of eukaryotic elongation factor 2 (eEF2). Inactivation of eEF2 then results in cessation of protein synthesis and eventual cellular death.
