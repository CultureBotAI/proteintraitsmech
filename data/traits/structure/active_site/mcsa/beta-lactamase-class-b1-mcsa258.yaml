identifier: MCSA:258
label: beta-lactamase (Class B1)
definition: >-
  The L1 metallo-beta-lactamase from Stenotrophomonas maltophilia is unique among beta-lactamases in that it is tetrameric. S. maltophilia has emerged as a significant hospital-derived pathogen of immunocompromised hosts such as cancer, cystic fibrosis and transplant patients. L1 is localised to the periplasm and hydrolyses carbapenem drugs, conferring antibiotic resistance. <br/><br/> L1 is a Class B1 metallo-beta-lactamases as it binds two Zn(II) ions for the hydrolytic reaction, but its Zn2 binding site is different to most B1 type enzymes (it is also known as an L1 type 3 beta-lactamse).
