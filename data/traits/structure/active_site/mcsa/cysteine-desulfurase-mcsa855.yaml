identifier: MCSA:855
label: "cysteine desulfurase"
definition: >-
  <p>The NifS-like protein belongs to the alpha family of pyridoxal-5' phosphate dependent enzymes also known as the aminotransferase class V. They act to remove the sulphur from L-Cysteine in a stereo conserved mechanism, forming L-Alanine and an enzyme-sulphanyl-cysteine component which loses the additional sulphur to acceptor proteins (the mechanism for this last step is not covered in this entry). The sulphur can be used to make compounds such as Iron-Sulphur clusters, biotin and tRNA thio-nucleotides. </p> <p>The <i>Escheria Coli</i> protein is also able to catalyse selenocysteine deselenation in which L-selenocysteine is converted to selenium in the form of hydrogen selenium and L-alanine. Selenocysteine lyase has the ability to discriminate between selenium and sulfur, whereas many sulphur enzymes cannot. There are few examples of selenium-containing substrates.</p>
