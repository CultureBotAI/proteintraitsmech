identifier: MCSA:736
label: mannose-6-phosphate isomerase
definition: >-
  Several aerobic crenarcheaons, including Pyrobaculum aerophilum, contain an isomerase that converts both glucose-6-phosphate and mannose-6-phosphate (G6P and M6P, which are C2 epimers) into fructose-6-phosphate. Most organisms contain only highly specific phosphoglucose and phosphomannose isomerases (PGIs and PMIs), which only accept either glucose or mannose as a substrate. These dual specificity isomerases share very low sequence identity with 'conventional' PGIs or PMIs, but structure is conserved, especially at the active site, supporting a common mechanism. They belong to the larger PGI superfamily.
