identifier: MCSA:811
label: UDP-N-acetylglucosamine pyrophosphorylase
definition: >-
  The bifunctional enzyme GlmU is able to catalyse two steps in the pathway of bacterial cell wall synthesis: The C-terminal domain converts glucosamine-1-phosphate to N-acetyl glucosamine-1-phosphate using Acetyl CoA as the donor The N-terminal domain (this entry) utilises UTP to activate the N-acetyl glucosamine-1-phosphate forming UDP-acetyl-glucosamine and pyrophosphate. Interest in the processes catalysed by this enzyme stems from its potential as an antibiotic target.
