identifier: MCSA:750
label: "4-hydroxybutanoyl-CoA dehydratase"
definition: >-
  4-hydroxybutyryl-CoA dehydratase (4-BUDH) catalyses the dehydration of 4-hydroxybutanoyl-CoA to crotonyl-CoA, as well as the isomerisation of vinylacetyl-CoA to crotonyl-CoA. The reaction is mechanistically the most demanding step in the fermentation of gamma-aminobutyrate to ammonia, acetate and butyrate by <i>Clostridium aminobutyricum</i>.
