identifier: MCSA:152
label: "holo-[acyl-carrier-protein] synthase"
definition: >-
  Holo-(acyl carrier protein) synthase (AcpS) from <i>Bacillus subtilis</i> is a member of the phosphopantetheinyl transferase superfamily. AcpS post-translationally modifies ACP to its holo form in order to activate it. AcpS catalyses the transfer of the 4'-phosphopantetheinyl (P-pant) moiety of coenzyme A to a serine residue on the ACP. This gives the activated ACP enzyme and Adenosine 3'5'-bisphosphate as products. This process is important as ACP enzymes play important roles in a number of biosynthetic pathways, such as the synthesis of fatty acids, vitamins, AcpS is essential in the initiation of the biosynthesis of fatty acids, polyketide antibiotics and non-ribosomal peptides.
