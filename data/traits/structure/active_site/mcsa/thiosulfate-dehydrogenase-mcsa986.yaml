identifier: MCSA:986
label: "Thiosulfate dehydrogenase"
definition: >-
  Thiosulphate dehydrogenase (TsdA) catalyses the oxidation of two thiosulphate molecules to form tetrathionate and is predicted to use an unusual cysteine-ligated heme as the catalytic cofactor. Thiosulfate and polythionates serve as energy-yielding or electron-donating substrates in the metabolism of a wide range of chemolithotrophic and photolithotrophic bacteria, as well as some heterotrophs. This reaction is interesting because of its potential applications in bioleaching and metal solubilisation.
