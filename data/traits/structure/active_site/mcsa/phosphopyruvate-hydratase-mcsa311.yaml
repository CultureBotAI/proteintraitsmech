identifier: MCSA:311
label: "phosphopyruvate hydratase"
definition: >-
  <p>Yeast enolase (2-phospho-D-glycerate hydrolase) is a metalloenzyme which catalyses the reversible dehydration of D-2-phos-phoglycerate (PGA) to phosphoenolpyruvate (PEP). The enzyme has an absolute requirement for the presence of a divalent cation, as is characteristic of the enolase family. </p> <p>Mitochondrial targeting of tRK1 in yeast is achieved by the successive actions of enolase 2 and the precursor of the mitochondrial lysyl-tRNA synthetase (preMSK). At the mitochondrial outer membrane, preMSK takes over enolase to start the import process properly; A fraction of the canonical tRNA L-form tRK1 pool is deviated from the cytosolic translation process by the enolase 2, which favours the tRNA conformational change leading to the formation of the F-form.</p>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
