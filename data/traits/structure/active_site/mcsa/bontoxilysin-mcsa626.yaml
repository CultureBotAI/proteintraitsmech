definitions:
  - kind: MECHANISTIC
    text: >-
      Botulinum neurotoxin acts by inhibiting neurotransmitter release. It binds to peripheral neuronal synapses, is internalised and moves by retrograde transport up the axon into the spinal cord where it can move between postsynaptic and presynaptic neurons. It disrupts neurotransmitter release by acting as a zinc endopeptidase that cleaves the 76-Gln-|-Phe-77 bond of synaptobrevin-2(Sb2), one of three SNARE proteins involved in neuronal synaptic vesicle fusion. There are in total 7 serotypes of botulinum neurotoxin. All seven serotypes possess an identical Zn2+-binding motif, HEXXH, but are unique either in substrate selection or in their cleavage site. Their catalytic domains share high degree of sequence homology and holotoxin structures of serotype A and serotype B have been reported to be structurally similar. Botulinum belongs to the same class of neurotoxin with tetanus neurotoxin and they share significant sequence homology. They possess similar structural and functional domains and have a similar mechanism of toxicity. However, Botulinum neurotoxins acts at the neuromuscular junction causing flaccid paralysis by inhibiting the release of acetylcholine into the synapse, while tetanus toxin acts at the central nervous system causing spastic paralysis. In addition botulinum neurotoxin is the protein also known as Botox which is widely used in the cosmetics industry for the reduction of facial wrinkles through relaxation of the muscles.
    source: "M-CSA"
    method: SOURCED
