identifier: MCSA:893
label: "medium-chain acyl-CoA dehydrogenase"
definition: >-
  <p>Medium-chain specific acyl-CoA dehydrogenases (MCADs) are mitochondrial beta-oxidation enzymes, which catalyze the alpha,beta dehydrogenation of the corresponding medium chain acyl-CoA by FAD, which becomes reduced. The reduced form of MCAD is reoxidized in the oxidative half-reaction by electron-transferring flavoprotein (ETF), from which the electrons are transferred to the mitochondrial respiratory chain coupled with ATP synthesis.</p> <p>The enzyme from pig liver can accept substrates with acyl chain lengths of 4 to 16 carbon atoms, but is most active with C8 to C12 compounds [PMID:13295224]. The human enzyme also accepts substrates with chain lengths of between 4 and 16 [PMID:25416781]. The enzyme from rat does not accept C16 at all and is most active with C6-C8 compounds [PMID:3968063].</p>
