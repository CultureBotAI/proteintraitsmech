identifier: MCSA:172
label: "isoaspartyl dipeptidase"
definition: >-
  Isoaspartyl dipeptidase (IAD) from <i>Escherichia coli</i> is a member of the amidohydrolase superfamily. It catalyses the hydrolysis of dipeptides containing a peptide bond to the beta-carboxylate group of aspartic acid. The apparent physiological role of IAD is to prevent the accumulation of beta-aspartyl dipeptides after proteolysis of these proteins. IAD shows little activity towards the hydrolysis of tripeptides or gamma-glutamyl dipeptides.
