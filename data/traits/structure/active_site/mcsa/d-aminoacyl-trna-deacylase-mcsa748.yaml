identifier: MCSA:748
label: D-aminoacyl-tRNA deacylase
definition: >-
  YihZ, a D-Tyr-tRNA(Tyr) deacylase from <i>Haemophilus influenzae</i> is an 'editing enzyme'. It removes D-tyrosine and other D-amino acids from charged tRNAs, thereby preventing incorrect incorporation of D-amino acids in proteins. This is important, as the presence of D-amino acids can impair correct folding of proteins. Any incorrectly charged tRNA must be removed, and YihZ catalyses the hydrolysis of the ester link between D-Tyr and tRNA. This enzyme exhibits broad specificity towards D-amino acids, but it is inactive toward L-aminoacylated tRNAs and N-blocked D-aminoacylated tRNAs.
