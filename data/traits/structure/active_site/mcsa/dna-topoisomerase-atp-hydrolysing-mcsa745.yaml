identifier: MCSA:745
label: "DNA topoisomerase (ATP-hydrolysing)"
definition: >-
  <i>E. coli</i> DNA gyrase is a member of the family of type II topoisomerases, which change the topology of DNA by cleaving both the phosphodiester backbones of the double-stranded DNA, transporting another double-stranded segement through the enzyme bridged gap, and then religating the DNA. Therefore, <i>E. coli</i> DNA gyrase catalyses the relaxation of negatively supercoiled DNA, and is uniquely also able to introduce negative supercoils into DNA at the expense of ATP hydrolysis. By introducing a transient break into the DNA substrate, pasing another piece of DNA though the gap and releasing it, the enzyme relieves topological contraints caused by replication and transcription complexes moving along the DNA. The enzyme consists of 2 GyrA and 2 GyrB subunits. The catalytic domain is found on the GyrA subunit, whilst the ATP hydrolysis site is found on GyrB.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
