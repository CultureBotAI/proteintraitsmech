identifier: MCSA:244
label: S-methyl-5'-thioadenosine phosphorylase
definition: >-
  S-methyl-5'-thioadenosine phosphorylase (MTAP) catalyses the reversible phosphorylation of S-methyl-5'-thioadenosine (MTA) to adenine and 5-methylthioribose-1-phosphate. It is involved in the breakdown of MTA, a major by-product of polyamine biosynthesis. It is responsible for the first step in the methionine salvage pathway after MTA has been generated from S-adenosylmethionine. It has broad substrate specificity with 6-aminopurine nucleosides as preferred substrates. Despite being also an MTA phosphorylase, the MTAP in thermophilic <i> Sulfolobus solfataricus </i> only has 14% sequence homology to human MTAP.
