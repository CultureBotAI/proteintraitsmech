identifier: MCSA:373
label: "Vanadium-dependent bromoperoxidase (organic sulfide oxidation)"
definition: >-
  V-BPO, isolated from Ascophyllum nodosum, is a vanadium-dependent haloperoxidase. It catalyses the oxidation of halides by hydrogen peroxide to form hypohalides, which can go on to react with organic substrates in halogenation reactions. In this entry, we show one of the side reactions of the vanadium-dependent haloperoxidases: the oxidation or organic sulfides. V-BPO has the ability to oxidise bromide and, to a lesser extent, chloride and iodide as well as chlorinate organic hydrocarbons. V-BPO contains a vanadium(V) ion with a trigonal bipyramidal coordination sphere. It is coordinated to His486 and a hydroxide in the axial positions, and two oxygen atoms and a hydroxide in the equatorial positions. <br/><br/> Catalyzes the halogenation of organic substrates in the presence of hydrogen peroxide. This entry represents the enzyme's reaction with organic sulfides.
