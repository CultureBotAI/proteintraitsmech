identifier: MCSA:123
label: "adenylyl-sulfate reductase"
definition: >-
  Adenylylsulfate (adenosine 5'-phosphosulfate) reductase (APS reductase) from <i>Archaeoglobus fulgidus</i> catalyses the reversible reduction of APS to sulfite and AMP. This pathway provides sulfate which serves as a terminal electron acceptor of an anaerobic respiratory electron transfer chain. Electrons are also provided for anoxygenic photosynthesis and denitrification.
