identifier: MCSA:953
label: "cathepsin X"
definition: >-
  Cathepsin X is a widespread, abundantly expressed papain-like mammalian lysosomal cysteine protease. It exhibits carboxy-monopeptidase as well as carboxy-dipeptidase activity and shares a similar activity profile with cathepsin B. Atypically, the mature enzyme is primarily a carboxypeptidase and has extremely poor endopeptidase activity. Cathepsin X is synthesised as an inactive zymogen, but the propeptide lacks the ERFNIN motif characteristic of lysosomal cysteine peptidases. A novel disulfide bridge can be formed between the proregion and the enzyme active site (Cys10p and Cys31) which leads to inactivation of the zymogen by the formation of a reversible covalent bond with the active site residue [PMID:10656802]. Cathepsin X deficiency leads to accelerated cell senescence [PMID:21616554] and it also regulates the immune response to <i>Helicobacter pylori</i> infection [PMID:16025436, PMID:19446361].
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
