identifier: MCSA:203
label: lysozyme (glycosyl hydrolase 22 family)
definition: >-
  Lysozymes have primarily a bacteriolytic function, it hydrolyses specific bonds between NAG and NAM in peptidoglycan, which forms the bacterial cell wall. Lysosymes in tissues and body fluids are associated with the monocyte- macrophage system and enhance the activity of immunoagents. Historically there has been much debate about the mechanism of the enzyme, but recent evidence overwhelmingly supports the presence of a covalently bound intermediate. This discredits the Phillips mechanism which proposed an oxycarbenium intermediate.
