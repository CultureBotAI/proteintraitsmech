identifier: MCSA:593
label: "glycerol-3-phosphate dehydrogenase (NAD+)"
definition: >-
  Glycerol-3-phosphate dehydrogenase catalyses the interconversion of glycerol-3-phosphate (G3P) and Dihydroxyacetone-3-phosphate (DHAP), which is vital in the mitochondrial NAD/NADH shuttle. The dehydrogenase isolated from <i>Leishmania mexicana</i> (trypanosome) displays little sequence homology with the human system, thus may be a target for drug design.
