identifier: MCSA:201
label: propionyl-CoA carboxylase
definition: >-
  Propionyl-CoA carboxylase (PCC) from Streptomyces coelicolor catalyses the carboxylation of proprionyl-CoA (and, less efficiently, butyryl-CoA) to provide methylmalonyl-CoA (or ethylmalonyl-CoA). This carboxylation reaction provides key extender units for the biosynthesis of fatty acids and polyketide natural products. PCC has three units, pccA, pccB and pccE. The alpha subunit (pccA) contains the BCCP (biotin carboxyl carrier protein) and BC (biotin carboxylase) domains. The beta subunit (pccB) contains the carboxyltransferase (CT) function, which transfers the carboxyl group from biotin to propionyl-CoA [PMID:15518551]. BC catalyses carboxylation of the biotin attached to the biotin carboxyl carrier protein (BCCP) in the first half reaction which requires ATP Mg(II) and bicarbonate [PMID:2673009]. CT catalyses the second half reaction, the carboxyl transfer from biotin to propanoyl-CoA [PMID:2673009, PMID:15518551]. pccE may act to associate pccA and pccB. The pccB unit shows sequence and structure homology with other carboxyltransferases from other organisms. They are all dimers or hexamers, with the monomers comprising two domains; two active sites run between each pair of adjacent monomers, with catalytic residues being contributed from the C-terminal domain from one monomer and the N-terminal domain from the next monomer.
