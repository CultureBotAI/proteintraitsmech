identifier: MCSA:94
label: "1-alkyl-2-acetylglycerophosphocholine esterase"
definition: >-
  2-acetyl-1-alkylglycerophosphocholine esterase, also known as known as platelet-activating factor acetylhydrolase (PAF-AH). <br/><br/> Mammalian brain contains significant levels of platelet activating-factor (PAF), these act as a synapse messenger and transcription inducer of the early response genes c-fos and c-jun. The platelet-activating factor PAF is a potent lipid first messenger active in general cell activation, fertilisation, inflammatory and allergic reactions, asthma, HIV pathogenesis, carcinogenesis, and apoptosis. PAF has also been implicated as a messenger in long-term potentiation, a cellular model of memory formation. <br/><br/> Inactivation of this factor is carried out by PAF-AH, a subfamily of phospholipases A2 that remove the sn-2 acetyl group. Mammalian brain contains at least three intracellular isoforms, 1b being the best characterised. From experimentation it can be assumed that PAF-AH maintains the PAF concentration within a certain range during brain development. <br/><br/> The protein is an unusual G-protein like (alpha1/alpha2)beta trimer. PAF-AH is a heterotrimer composed of 26-,26-, and 45-Kda polypeptides. The alpha (26KDa) is the catalytic subunit. The active site is made up of a trypsin-like triad of Ser 47, His 195 and Asp 192. The other subunit is not essential for the catalytic activity. The catalytic subunit contains a single alpha/beta domain with a central, parallel, 6-stranded beta sheet. This fold is very like that found in GTPase. Experimental data has demonstrated that the catalytic subunit of brain PAF acetylhydrolase is a novel type of serine esterase.
