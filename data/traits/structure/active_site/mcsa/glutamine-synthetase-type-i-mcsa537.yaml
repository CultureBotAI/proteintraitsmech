identifier: MCSA:537
label: "glutamine synthetase (type I)"
definition: >-
  Glutamine synthetase catalyses the condensation reaction of ammonium and glutamate to form glutamine, using ATP. This is observed in the early stages of infection by <i>Mycobacterium tuberculosis</i> as an extracellular component in the synthesis of poly(L-glutamine-L-glutamate) chains requires for cell wall formation. Therefore this enzyme is an important drug target for halting tuberculosis infection.
