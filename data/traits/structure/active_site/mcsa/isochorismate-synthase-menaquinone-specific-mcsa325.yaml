identifier: MCSA:325
label: "isochorismate synthase (menaquinone-specific)"
definition: >-
  <p>Isochorismate synthase (MenF) catalyses the conversion of chorismate to isochorismate, the first step in the biosynthesis of both the respiratory chain component menaquinone (MK, vitamin K2) and phylloquinone (vitamin K1). This entry represents the isoform in bacteria that is mainly channelled into menaquinone synthesis.</p>
