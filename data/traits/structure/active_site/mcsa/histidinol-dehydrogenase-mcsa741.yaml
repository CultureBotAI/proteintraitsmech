identifier: MCSA:741
label: histidinol dehydrogenase
definition: >-
  L-histidinol dehydrogenase, sourced from <i>Escherichia coli</i>, catalyses the last two steps of histidine biosynthesis: NAD dependent oxidation of L-histidinol to L-histinaldehyde and then to L-histidine. L-histidinol dehydrogenase is a homodimeric zinc metalloenzyme with one binding site per monomer. Each monomer contains four domains- the intertwined dimer possibly results from domain swapping. Two domains display a similar incomplete Rossmann fold, suggesting an ancient event of gene duplication.
