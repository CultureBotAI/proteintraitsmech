identifier: MCSA:60
label: glucosamine-6-phosphate deaminase
definition: >-
  The allosteric hexameric enzyme from Escherichia coli catalyses the regulatory step of N-acetyl glucosamine catabolism, which consists of the isomerisation and deamination of glucosamine 6-phosphate (GlcN6P) to form fructose 6-phosphate (Fru6P) and ammonia.The enzyme is a hexamer of identical subunits arranged as a dimer of trimers and the allosteric sites appear located in the clefts between the subunits forming the trimers. Glucosamine-6-phosphate isomerase is activated by N-acetyl-D-glucosamine 6-phosphate. Mechanistically, it belongs to the group of aldoseketose isomerases, but its reaction also accomplishes a simultaneous amination/deamination. The allosteric transition from T to R is generated upon binding of GlcNAc6P at the allosteric site or binding of active-site ligands (GlcN6P, Fru6P, GlcN-ol-6P). An important local conformational change relating allosteric control to catalysis is centred on residue Glu148. Glu148 participates in a proton-relay system that serves to polarise His143. This histidine is essential for the catalytic ring opening of the GlcN6P substrate. The His143 is primarily activated by its interaction with Glu148. The second residue in the His-Glu-Asx triangle appears to be either an Asp or Asn. Interestingly enough, in the work on Escherichia coli, Asn in this position severely disrupts the enzyme's activity.
