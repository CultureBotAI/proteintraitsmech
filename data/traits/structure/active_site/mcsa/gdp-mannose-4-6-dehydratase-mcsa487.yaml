identifier: MCSA:487
label: "GDP-mannose 4,6-dehydratase"
definition: >-
  GDP-mannose 4,6-dehydratase (GMD) catalyses the conversion of GDP-mannose to GDP-4-dehydro-6deoxy-D-mannose in the first and regulatory step in the de novo biosynthesis of GDP-fucose. Fucose is distributed widely in the glycoconjugates of species ranging from bacteria to humans. Once synthesised it is incorporated into glycoconjugates by specific fucosyltransferases that use GDP-fucose as the fucose donor. Important glycoconjugates include the cell wall polysaccharides of bacteria that confer pathogenicity, components of mammal antigens and perhaps the best known example, the human blood group antigens. Defects in GMD activity provide insight into the diverse roles that fucose plays in biology and hence the importance of the enzyme. For example in plants, defects in GMD result in altered shoot development whilst in humans defects have been linked to immune disorders. <br/><br/> Kinetic analysis of the protein gives evidence to suggest that the role of NADP<sup>+</sup> does not support either of the two currently proposed mechanisms. The exact overall mechanism remains unclear.
