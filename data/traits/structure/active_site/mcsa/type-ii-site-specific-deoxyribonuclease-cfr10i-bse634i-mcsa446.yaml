identifier: MCSA:446
label: "type II site-specific deoxyribonuclease, Cfr10I/Bse634I"
definition: >-
  Type II restriction endonucleases (EC:3.1.21.4) are components of prokaryotic DNA restriction-modification mechanisms that protect the organism against invading foreign DNA. These site-specific deoxyribonucleases catalyse the endonucleolytic cleavage of DNA to give specific double-stranded fragments with terminal 5'-phosphates. <br/><br/> This entry represents Cfr10I and Bse634I restriction endonucleases (IPR012415). They exhibit a conserved tetrameric architecture with two dimers arranged back-to-back with their putative DNA-binding clefts facing opposite directions. These clefts are formed between two monomers that interact, mainly via hydrophobic interactions supported by a few hydrogen bonds, to form a U-shaped dimer. Each monomer is folded to form a compact alpha-beta structure, whose core is made up of a five-stranded mixed beta-sheet. The monomer may be split into separate N-terminal and C-terminal subdomains at a hinge located in helix alpha3. Both Cfr10I and Bse634I recognise the double-stranded sequence RCCGGY and cleave after the purine R [PMID: 8568865].
