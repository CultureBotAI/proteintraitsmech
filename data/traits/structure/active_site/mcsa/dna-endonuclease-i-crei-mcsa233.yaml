identifier: MCSA:233
label: "DNA endonuclease I-CreI"
definition: >-
  <p>This is an endonuclease that is involved in group I intron homing. It recognises and cleavers a 19-24 bp palindromic DNA site. It is known to bind three Mg(II) ions per homodimer, it is also active with Mn(II), gives lower cleavage activity with Ni(II) and Zn(II) and no activity with Ca(II). I-CreI exists as a homodimer and the active sites of the enzyme overlap. Mg1 binds to one subunit, Mg3 binds to the other and Mg2 is bound to both. Mg2 is involved in the hydrolysis of both strands of DNA while Mg1 is involved in the hydrolysis of one strand and Mg3 the other.</p> <p>Homing endonucleases do not have stringently-defined recognition sequences in the way that other restriction enzymes do. That is, single base changes do not abolish cleavage but reduce its efficiency to variable extents. The precise boundary of required bases is generally not known. The recognition sequence of one site known to be recognised and cleaved is CTGGGTTCAAAACGTCGTGAGACAGTTTGG (-10/-14).</p>
