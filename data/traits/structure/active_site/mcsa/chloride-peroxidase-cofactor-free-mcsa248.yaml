identifier: MCSA:248
label: "chloride peroxidase (cofactor free)"
definition: >-
  <p>Chloroperoxidase is a member of the non-haem type haloperoxidases. Haloperoxidases catalyse the halogenation of organic compounds in the presence of halide ions and peroxides such as hydrogen peroxide. They are named after the most electronegative halide they are able to oxidise. The enzyme also oxidises bromide and iodide.</p> <p>This entry represents the so-called cofactor free haloperoxidases that possess a Ser-His-Asp catalytic triad and require a short aliphatic acid (e.g. ethanoic acid) for activity. They belong to the alpha/beta hydrolase superfamily.</p>
