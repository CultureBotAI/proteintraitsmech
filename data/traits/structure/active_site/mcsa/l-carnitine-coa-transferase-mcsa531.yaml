identifier: MCSA:531
label: "L-carnitine CoA-transferase"
definition: >-
  The enzymes required for the metabolism of L-carnitine in <i>Escherichia coli</i> is encoded by the cai operon. CaiB, a class III CoA transferase, alongside formyl-CoA transferase. CaiB catalyses the reversible transfer of the CoA group from crotonobetainyl-CoA to L-carnitine.
