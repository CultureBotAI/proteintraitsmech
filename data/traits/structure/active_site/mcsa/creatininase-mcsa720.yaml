identifier: MCSA:720
label: creatininase
definition: >-
  Creatininase (creatinine amidohydrolase) from <i>Pseudomonas putida</i> catalyses the conversion of creatinine to creatine. It is a member of the urease-related amidohydrolase superfamily. The enzyme enables the bacteria to use creatinine as a source of carbon and nitrogen. The biological molecule is trimer of dimers. The active site of each monomer contains a binuclear metal centre located at the bottom of a cleft. In the native form of the enzyme both metal sites are occupied by Zn<sup>2+</sup> ions.
