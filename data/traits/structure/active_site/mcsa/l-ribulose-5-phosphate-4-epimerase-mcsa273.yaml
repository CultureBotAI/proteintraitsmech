identifier: MCSA:273
label: "L-ribulose-5-phosphate 4-epimerase"
definition: >-
  <p>L-ribulose-5-phosphate-4-epimerase catalyses the interconversion of L-ribulose 5-phosphate(L-Ru5P) and D-xylulose 5-phosphate(D-Xu5P). It belongs to a superfamily of epimerases/aldolases that catalyse carbon-carbon bond cleavage reactions via a metal stabilised enolate intermediate. The conversion from L-Ru5P to D-Xu5P allows bacteria to utilise arabinose as an energy source by converting it into an intermediate in the pentose phosphate pathway(D-Xu5P).</p>
