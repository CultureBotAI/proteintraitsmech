identifier: MCSA:71
label: "uridine nucleosidase (family I)"
definition: >-
  <p>Uracil-DNA glycosylase (UDG) are monofunctional glycosylases and initiate the base excision repair (BER) pathway for uracil by hydrolysing the N-C'1 glycosylic bond between a target uracil and an abasic site. The human BER cycle is important for restoring the chemical integrity of DNA.</p> <p> The uracil-DNA glycosylase superfamily consists of 6 smaller families, based on sequence alignments. Both human and <i> E.coli </i> UDG come under Family I and are also called UNGs. </p> <p>The enzyme mechanism has been hotly debated. Classically, an acid/base mechanism has been employed (mechanism proposal 2), but new evidence suggests a steric distortion of the DNA substrate catalyses the reaction in a mechanism similar to SN1 dissociation (mechanism proposal 1).</p>
