identifier: MCSA:341
label: 3,2-trans-enoyl-CoA isomerase (mitochondrial)
definition: >-
  Delta3-delta2-enoyl CoA isomerase (enoyl-CoA isomerase) is a mitochondrial enzyme, in this case from human, catalyses the conversion of 3-cis-enoyl-CoA or 3-trans-enoyl-CoA into 2-trans-enoyl-CoA. This is involved in an auxiliary pathway of fatty acid degradation, and the product is subsequently metabolised further by other enzymes of the pathway. <br/><br/> Enoyl-CoA isomerases use fatty acyl substrates with side-chains ranging from C6 to C16. The reaction used as example uses a C12 compund as substrate
