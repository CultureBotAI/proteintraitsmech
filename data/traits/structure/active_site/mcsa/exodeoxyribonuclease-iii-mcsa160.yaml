identifier: MCSA:160
label: "exodeoxyribonuclease III"
definition: >-
  Exonuclease III from <i>Escherichia coli</i> is a multifunctional enzyme which is able to cleave DNA in order to facilitate the removal of a particular base to create an AP site. This process occurs during replication, allowing incorrectly placed base pairs to be removed and replaced by the correct one. The efficiency of this process is essential to protect <i>Escherichia coli</i> from the damaging effects of mutations, and enables the fidelity of DNA polymerase activity to be increased by over 1000 times.
