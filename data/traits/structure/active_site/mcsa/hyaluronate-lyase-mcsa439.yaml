identifier: MCSA:439
label: hyaluronate lyase
definition: >-
  Bacterial hyaluronan lyases (Hyal) belong to the polysaccharide lyase 8 family and degrade hyaluronan. Hyaluronan is an important component of the extracellular matrix, and involved in microbial spread. Hyal inhibitors may serve as tools to study the role of the enzyme, its substrates and products in the course of bacterial infections. Moreover, such enzyme inhibitors are potential candidates for antibacterial combination therapy. Hyal catalyse the degradation of hyaluronan by a beta-elimination reaction. Also acts on chondroitin. Ultimately, they break the polysaccharide down to its constituent parts, more systematically known as 3-(4-deoxy-alpha-L-threo-hex-4-enopyranosyluronic acid)-2-acetamido-2-deoxy-D-glucose.
