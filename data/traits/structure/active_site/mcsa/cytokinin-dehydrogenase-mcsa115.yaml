identifier: MCSA:115
label: "cytokinin dehydrogenase"
definition: >-
  Cytokinin dehydrogenase (CKX) from <i>Zea mays</i> catalyses the irreversible oxidation of cytokinins, a type of plant hormone which promotes cell division and differentiation. CKX catalyses the conversion of N6-(delta2-isopentenyl)-adenine into adenine. Increased enzyme activity causes drastic abnormalities in the growth and development of the plant.
