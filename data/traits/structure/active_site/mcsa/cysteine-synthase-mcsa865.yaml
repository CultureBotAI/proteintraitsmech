identifier: MCSA:865
label: "cysteine synthase"
definition: >-
  <p>O-Acetylserine sulfhydrylase (cystenie synthase, OASS) is a pyridoxal 5′-phosphate (PLP)-dependent enzyme that catalyses the conversion of O-acetylserine and bisulfide to L-cysteine and acetate in bacteria and higher plants. Enteric bacteria have two isozymes of OASS, A and B, produced under aerobic and anaerobic growth conditions, respectively, with different substrate specificity. This entry represents CysK (the A isoenzyme), which can use sulphide instead of thiosulphate, to produce cysteine instead of cysteine thiosulphonate.</p>
