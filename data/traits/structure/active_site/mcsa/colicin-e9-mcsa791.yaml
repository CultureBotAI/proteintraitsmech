identifier: MCSA:791
label: colicin-E9
definition: >-
  Colicin E9 from <i>Escherichia coli</i> is a non-specific endonuclease. This extracellular toxin is secreted by strains of <i>Escherichia coli</i> to kill competing bacteria. It kills the cell by enzymatic cleavage of nucleic acids once it has entered the cell. Since colicin E9 is non-specific, it can hydrolyse both single and double stranded DNA.
