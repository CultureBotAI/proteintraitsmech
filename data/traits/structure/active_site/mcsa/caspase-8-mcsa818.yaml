identifier: MCSA:818
label: caspase-8
definition: >-
  Caspase-8 from <i>Homo sapiens</i> is a cysteine dependent, aspartate specific protease. When activated, it will cleave peptide bonds of other downstream caspases in order to activate them. Caspase-8 must be activated in order to become a protease. It is involved in the process of apoptosis (programmed cell death) which is a central role in the development and homeostasis of an organism.
