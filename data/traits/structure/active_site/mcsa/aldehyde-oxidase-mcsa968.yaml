identifier: MCSA:968
label: aldehyde oxidase
definition: >-
  Aldehyde oxidase is a member of the xanthine oxidase family. It is a complex molybdoenzyme containing a Mo cofactor (Moco), flavin adenine nucleotide (FAD) and two Fe<sub>2</sub>S<sub>2</sub> clusters. The enzyme has broad substrate specificity and catalyses a wide range of reactions. This includes the oxidation of aldehydes and several <i>N</i>-heterocycles, as well as the reduction of some substrates. In the human liver, the enzyme plays an essential role in the detoxification of xenobiotics and contributes to the hepatic clearance of many other drugs.
definition_source: M-CSA (Thornton lab, EBI; fetched via REST API)
