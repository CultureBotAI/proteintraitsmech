identifier: MCSA:403
label: astacin
definition: >-
  Astacin, a digestive zinc-endopeptidase from the crayfish <i>Astacus astacus</i>, is the prototype for the 'astacin family', which includes mammalian metallo-endopeptidases and developmentally regulated proteins of human, fruit fly, frog and sea urchin, and also for the 'metzincin superfamily'. <br/><br/> This protease prefers to cleave in front of small aliphatic residues (P1'). The presence of Lys or Arg in the P1 and P2 position yields high-turnover substrates. In the P3 position the enzyme prefers Pro > Val > Leu > Ala > Gly.
