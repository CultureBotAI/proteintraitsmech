identifier: MCSA:374
label: Vanadium-dependent bromoperoxidase (organic molecule bromination)
definition: >-
  V-BPO, isolated from Ascophyllum nodosum, is a vanadium-dependent haloperoxidase. <br/><br/> It catalyses the oxidation of halides by hydrogen peroxide to form hypohalides, which can go on to react with organic substrates in halogenation reactions. In this entry, we show one of the side reactions of the vanadium-dependent haloperoxidases: bromination of phenols, the reaction produces 4-bromophenol in higher yields than the 2,4-dibromophenol. The enzyme is known to halogenate many other organic substrates including phenols, indoles, terpenes, and pyrroles. <br/><br/> V-BPO has the ability to oxidise bromide and, to a lesser extent, chloride and iodide. <br/><br/> V-BPO contains a vanadium(V) ion with a trigonal bipyramidal coordination sphere. It is coordinated to His486 and a hydroxide in the axial positions, and two oxygen atoms and a hydroxide in the equatorial positions.
