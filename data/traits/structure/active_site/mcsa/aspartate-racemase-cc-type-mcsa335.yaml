identifier: MCSA:335
label: "aspartate racemase (CC-type)"
definition: >-
  Although L-enantiomers of amino acids are predominant in living organisms, D-enantiomers are distributed widely in bacteria, archaea and mammalian tissue. D-aspartate (D-Asp) is one of the most abundant D-enantiomers.<br/>Aspartate racemase (AspR) is a pyridoxal 5'-phosphate (PLP)-independent amino acid racemase that catalyses the interconversion of L-Asp and D-Asp.
