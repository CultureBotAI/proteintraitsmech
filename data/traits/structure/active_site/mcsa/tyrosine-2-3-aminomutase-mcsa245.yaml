identifier: MCSA:245
label: tyrosine 2,3-aminomutase
definition: >-
  Tyrosine 2,3-aminomutase catalyses the MIO-dependent deamination of L-tyrosine to form the corresponding alpha,beta-unsaturated acid (S)-beta-tyrosine. This reaction forms part of the biosynthesis of the enediyne antitumour antibiotic C-1027. The MIO (3,5-dihydro-5-methylidene-4H-imidazol-4-one) cofactor is formed autocatalytically by cyclization and dehydration of the three amino-acid residues alanine, serine and glycine.
