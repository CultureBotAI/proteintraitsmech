identifier: MCSA:368
label: "UDP-galactopyranose mutase"
definition: >-
  <p>UDP-galactopyranose mutase catalyses the ring contraction of a non-reducing sugar via a redox-reaction, transforming UDP-D-galactopyranose to UDP-D-galacto-1,4-furanose. This product (UDP-Galf) is the precursor of the D-galactofuranose (Galf) residues found in bacterial and parasitic cell walls, including those of many pathogens such as <i>Mycobacterium tuberculosis</i> and <i>Trypanosoma cruzi</i>. The mutase enzyme is essential for the viability of mycobacteria and is not found in humans, making it a potential therapeutic target. A novel mechanism involving reduced FAD acting as a nucleophile has been proposed.</p>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
