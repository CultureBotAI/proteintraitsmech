identifier: MCSA:2
label: "beta-lactamase (Class A)"
definition: >-
  The Class A Beta lactamase acts to hydrolyse the endocyclic amide bond of beta-lactam substrates in a two step mechanism: acylation (covalent attachment of the beta-lactam to an active site serine, Ser70), followed by deacylation. The TEM-type are the most prevalent beta-lactamases in enterobacteria and confer resistance to penicillins and cephalosporins in these species. <br/><br/> TEM-3 and TEM-4 are capable of hydrolyzing cefotaxime and ceftazidime. TEM-5 is capable of hydrolysing ceftazidime. TEM-6 is capable of hydrolysing ceftazidime and aztreonam. TEM-8/CAZ-2, TEM-16/CAZ-7 and TEM-24/CAZ-6 are markedly active against ceftazidime. IRT-4 shows resistance to beta-lactamase inhibitors.
