identifier: MCSA:500
label: alcohol dehydrogenase (class II)
definition: >-
  This entry represents the rodent class-II subfamily of the zinc-containing alcohol dehydrogenase family (ADH2). Most of the proteins in this subfamily are from mammals. They are involved in the reduction of benzoquinones [PMID:10514444]. Rodent ADH2s are inefficient in alcohol oxidation with roughly three orders of magnitude lower activity than the "classical" ADHs. They show a preference for aromatic alcohols (such as benzyl alcohols).
