identifier: MCSA:432
label: "endo-1,4-beta-xylanase (glycosyl hydrolase 11 family)"
definition: >-
  <p>These enzymes all belong to glycosyl hydrolase 11 (cellulase G) family (GH11). They are typically small (~20 kDa) with a conserved jelly-roll fold, that catalyse the hydrolysis of beta-1,4-xylan linkages using general acid/base catalysis with retention of the anomeric configuration via a covalent glycosyl-enzyme intermediate.</p> <p>Xylan is a major plant cell wall hemicellulose made up of 1,4-beta-linked and 1,3-beta-linked D-xylopyranose residues. These enzymes catalyse the endohydrolysis of the main- chain 1,4-beta-glycosidic bonds connecting the xylose subunits yielding various xylooligosaccharides and xylose.</p> <p>These enzymes are excellent targets for protein engineering experiments as xylanolytic activity is useful in biotechnological applications such as the bleaching of hardwood kraft pulp for paper manufacture as use of this protein is effective in reducing the amount of environmentally toxic chlorine and chlorine-containing chemicals used. It is also used in the processing of feed for livestock.</p>
