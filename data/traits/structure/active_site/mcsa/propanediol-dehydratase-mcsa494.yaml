identifier: MCSA:494
label: "propanediol dehydratase"
definition: >-
  Propanediol dehydratsase, a diol dehydratse (DDH), catalyses the conversion of 1,2-propanediol, glycerol, and 1,2-ethanediol to the corresponding aldehydes via a coenzyme B12 (adenosylcobalamin)-dependent radical mechanism. <br/><br/> It is also dependent on a metal ion, there is still some debate as to whether this is potassium or calcium. QM/MM studies have suggested that Ca(II) is more likely.
