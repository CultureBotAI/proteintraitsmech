identifier: MCSA:180
label: fumarylacetoacetase
definition: >-
  Fumarylacetoacetate hydrolase (FAH) catalyses hydrolytic cleavage of a carbon-carbon bond in fumarylacetoacetate to give fumarate and acetoacetate - this step occurs as the final step in Phe and Tyr degradation. FAH functions as a metalloenzyme. Herditary tyrosinemia type I is a fatal disease caused by loss of FAH activity. This enzyme also catalyses reactions required by soil bacteria to degrade aromatic hydrocarbons, and so understanding of this enzyme may have possible applications in bioengineering efforts to bioremediate toxic hydrocarbon wastes.
