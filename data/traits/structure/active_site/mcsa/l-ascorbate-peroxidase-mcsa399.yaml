identifier: MCSA:399
label: "L-ascorbate peroxidase"
definition: >-
  L-ascorbate peroxidase (AP) is a heme peroxidase. This group of enzyme catalyse the reduction of hydrogen peroxide (H<sub>2</sub>O<sub>2</sub>) to water and the concurrent oxidisation of a range of substrates, in this case ascorbic acid. <br/></br> Ascorbic acid is a strong antioxidant that is effective in scavenging superoxide (O<sup>2-</sup>'), hydroxyl (OH') radicals and singlet oxygen. It can also remove H<sub>2</sub>O<sub>2</sub> in the following reaction. <br/><br/> AP is the main enzyme responsible for hydrogen peroxide removal in the chloroplasts and cytosol of higher plants.
