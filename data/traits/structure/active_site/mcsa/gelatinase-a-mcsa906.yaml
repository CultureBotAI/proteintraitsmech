identifier: MCSA:906
label: "gelatinase A"
definition: >-
  Matrix metalloprotease 2 (MMP 2), sourced from <i>Homo sapiens</i> cleaves gelatin type I and collagen types IV, V, VII and X. It specifically cleaves the collagen-like sequence Pro-Gln-Gly-|-Ile-Ala-Gly-Gln. MMP 2 belongs to a family of matrix metalloproteases (MMPs), zinc and calcium dependent enzymes responsible for the metabolism of extracellular matrix proteins. This includes normal tissue-remodelling processes such as wound healing, pregnancy and angiogenesis. Under physiological conditions, in addition to the regulated proteolysis of precursors to active form, the enzymes are also controlled by endogenous inhibitors (TIMPs).
