identifier: MCSA:379
label: Xaa-Pro aminopeptidase
definition: >-
  Aminopeptidase P cleaves an Xaa-Pro bond at the N-terminal of a polypeptide (even a dipeptide or tripeptide), where Xaa can be any amino acid. This substrate specificity is important as many biologically active peptides have Xaa-Pro at the N-terminus. <br/><br/> This protein is part of the peptidase M24B family.
