identifier: MCSA:354
label: cholesterol oxidase (GMC type)
definition: >-
  Cholesterol oxidase, a monomeric flavoenzyme unique to bacteria, catalyses the oxidation and isomerisation of cholesterol to cholest-4-en-3-one. This is the first step in cholesterol catabolism used by a wide range of soil bacteria which can use cholesterol as sole carbon source. Two forms of the cholesterol oxidase are known which share no sequence homology. One contains a FAD cofactor covalently linked through a histidine residue (PDB:1i19) while the other, represented in this entry, contains a non-covalently bound FAD cofactor. This enzyme is part of a wider family the Cholesterol-Methane-Glucose oxidoreductases or GMC oxidoreductases. The enzyme may be used as a potent insecticidal agent, active against boll weevil larvae and other insects. The enzyme acts by lysing the cells of the mid-gut epithelium resulting in larval death.
