identifier: MCSA:104
label: quinoprotein glucose dehydrogenase
definition: >-
  The soluble quinoprotein glucose dehydrogenase (s-GDH, EC 1.1.99.17) from <i>Acinetobacter calcoaceticus</i> is a classical quinoprotein which requires the cofactor pyrroloquinoline quinone (PQQ) to oxidise glucose to gluconolactone with the concomitant reduction of ubiquinone. <br/><br/> The reaction mechanism of PQQ-dependent enzymes has remained controversial due to the absence of comprehensive structural data. Three alternative proposals have been suggested: the addition-elimination reaction in which the glucose becomes covalently attached to the PQQ, the hydride transfer to the C5 of the PQQ, and the hydride transfer to the C4 of the PQQ [PMID:10508152, PMID:12686124].
