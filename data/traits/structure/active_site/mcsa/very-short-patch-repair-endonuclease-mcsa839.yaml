identifier: MCSA:839
label: "very short patch repair endonuclease"
definition: >-
  Very short patch repair protein (VSR) is an endonuclease from <i>Escherichia coli</i> and is a sequence specific mismatch endonuclease. It is responsible for the repair of T:G mismatches arising from the deamination of 5-methylcytosine. E. coli has three discovered systems for mismatched base pair recognition, all with different mechanisms. VSR initiates repair by hydrolysing the phosphate 5' of the mismatched T.
