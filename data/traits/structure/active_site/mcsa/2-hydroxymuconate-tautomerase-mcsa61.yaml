identifier: MCSA:61
label: 2-hydroxymuconate tautomerase
definition: >-
  2-hydroxymuconate tautomerase is also known as 4-oxalocrotonate tautomerase (4-OT). Converts 2-hydroxymuconate to the alpha-beta-unsaturated ketone, 2-oxo-3-hexenedioate [PMID:1339435]. This enzyme forms part of a bacterial metabolic pathway that oxidatively catabolises toluene, o-xylene, 3-ethyltoluene, and 1,2,4-trimethylbenzene into intermediates of the citric acid cycle. 4-OT has only 62 residues in each chain, making it one of the smallest enzyme subunits known [PMID:12051677]. In solution, however, the enzyme forms a hexamer of six identical subunits, so the active site may be formed by amino acid residues from several subunits [PMID:8547259]. The rate of catalysis approaches the diffusion-controlled limit. The gene for the enzyme is carried by the TOL plasmid in Pseudomonas putrida, and is involved in the catabolism of aromatic carbon sources. This entry represents a group of 4-oxalocrotonate tautomerases found in Pseudomonas [PMID:1339435] and other species of bacteria and archaea.
