identifier: MCSA:447
label: "glutamate carboxypeptidase"
definition: >-
  Glutamate carboxypeptidase (also known as carboxypeptidase G2, CPDG2, CPG2 or folate hydrolase G2) belongs to the peptidase M20A family. <br/><br/> G2 is a periplasmic enzyme that is synthesized with a signal peptide and is a dimeric zinc-dependent exopeptidase, with two domains, a catalytic domain, which provides the ligands for the two zinc ions in the active site, and a dimerization domain. It is known to cleave the C-terminal glutamate moiety from a wide range of N-acyl groups, including peptidyl, aminoacyl, benzoyl, benzyloxycarbonyl, folyl (shown in the reference reaction), and pteroyl groups to release benzoic acid, phenol, and aniline mustards. It is used clinically to treat methotrexate toxicity by hydrolysing methotrexate to inactive and non-toxic metabolites. It is also proposed for use in antibody-directed enzyme prodrug therapy against tumor cells. <br/><br/>
