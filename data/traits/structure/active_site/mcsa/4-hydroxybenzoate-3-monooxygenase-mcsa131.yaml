identifier: MCSA:131
label: "4-hydroxybenzoate 3-monooxygenase"
definition: >-
  <p>4-hydroxybenzoate 3-monooxygenase is a flavoprotein that catalyses the incorporation of an atom of dioxygen into p-hydroxybenzoate (p-OHB) to form 3,4-dihydroxybenzoate (3,4DOHB). 3,4DOHB subsequently enters the beta-ketioadipate pathway of aromatic degradation, using molecular oxygen and NADPH.</p> <p>The reaction occurs in two parts: reduction of the flavin adenine dinucleotide (FAD) in the enzyme by reduced nicotinamide adenine dinucleotide phosphate (NADPH) in response to binding p-hydroxybenzoate to the enzyme and oxidation of reduced FAD with oxygen to form a hydroperoxide, which then oxygenates p-hydroxybenzoate.</p>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
