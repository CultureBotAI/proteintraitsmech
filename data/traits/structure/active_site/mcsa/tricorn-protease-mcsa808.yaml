identifier: MCSA:808
label: "tricorn protease"
definition: >-
  The tricorn protease is the core of a proteolytic system identified in the model organism <i>Thermoplasma acidophilum</i>. This complex functions to degrade the 7-9 residue peptides that are produced by the proteasome-mediated degradation of cellular proteins. The basic functional unit of the tricorn protease is a homohexamer of the 121 kDa subunit; however electron microscopy studies indicate that 20 copies of this 720 kDa hexamer can assemble further in vivo to form a giant 14.6 MDa icosahedral capsid.
