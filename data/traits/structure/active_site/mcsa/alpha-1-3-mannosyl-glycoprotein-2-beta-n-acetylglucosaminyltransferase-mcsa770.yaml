identifier: MCSA:770
label: "alpha-1,3-mannosyl-glycoprotein 2-beta-N-acetylglucosaminyltransferase"
definition: >-
  N-acetylglucosaminyltransferase I (GnT I) is an inverting glycosyl transferase from <i>Oryctolagus cuniculus</i> catalyses the attachment of N-acetyl glucosamine (GlcNAc) onto an oligomannose core, from UPD-N-acetyl glucosamine. It plays a critical role in mammalian development, involved in the transformation of oligomannose attached structures to complex N-glycans.
