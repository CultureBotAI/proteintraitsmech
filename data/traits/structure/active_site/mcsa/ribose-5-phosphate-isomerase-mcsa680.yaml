identifier: MCSA:680
label: "ribose-5-phosphate isomerase"
definition: >-
  Ribose-5-phosphate isomerase is able to catalyse the interconversion of Ribose-5-phosphate and Ribulose-5-phosphate, an isomerisation reaction involving the open chain forms of the two sugars, important in the pentose phosphate pathway. In <i>Escherichia coli</i> there are two forms of the enzyme, which although they catalyse the same reaction, have entirely different mechanisms and catalytic residues. The less common <i>Escherichia coli</i> RpiB is described here.
