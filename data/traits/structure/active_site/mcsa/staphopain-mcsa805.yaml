identifier: MCSA:805
label: staphopain
definition: >-
  Staphopain B is a possible virulence factor from Staphylococcus aureus, and is a member of the papain superfamily of cysteine proteases. It is able to degrade elastin, fibrogen, fibronectin and kininogen. Exhibits a strong preference for substrates where arginine is preceded by a hydrophobic amino acid. Promotes detachment of primary human keratinocytes. Along with other extracellular proteases is involved in colonization and infection of human tissues Staphostatin B is a specific inhibitor of staphopain B encoded in the same operon. Inhibition of staphopains is a target for treatment of antibiotic-resistant S. aureus infections. It is a produced as an inactive proenzyme, which is comprised of the active part of the enzyme, the mature form, and a covalently bonded inhibitory pro-region. Activation of the enzyme requires cleavage of the N terminal inhibitory pro-region (staphostatin B)
