identifier: MCSA:477
label: picornain 3C
definition: >-
  The human rhinovirus 3C is a cysteine protease that is essential for the processing of the viral precursor polyprotein and release of RNA replication proteins. In UniProtKB P04936, the protease 3C portion of the chain is responsible for the cleavage of the sites: 330 - 331992 - 9931409 - 14101486 - 14871507 - 15081690 - 1691 The 3C portion of the enzyme is related by amino acid sequence to the trypsin-like serine proteases, and is a member of a novel group of cysteine proteases with a serine protease-like fold.
