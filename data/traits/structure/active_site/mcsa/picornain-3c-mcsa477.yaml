identifier: MCSA:477
label: "picornain 3C"
definition: >-
  The human rhinovirus 3C is a cysteine protease that is essential for the processing of the viral precursor polyprotein and release of RNA replication proteins. In UniProtKB P04936, the protease 3C portion of the chain is responsible for the cleavage of the sites: <ul><li>330 - 331</li><li>992 - 993</li><li>1409 - 1410</li><li>1486 - 1487</li><li>1507 - 1508</li><li>1690 - 1691</li></ul> The 3C portion of the enzyme is related by amino acid sequence to the trypsin-like serine proteases, and is a member of a novel group of cysteine proteases with a serine protease-like fold.
