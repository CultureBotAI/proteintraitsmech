identifier: MCSA:351
label: "aldose 1-epimerase"
definition: >-
  <p>Aldose 1-epimerase, also known as galactose mutarotase, catalyses the interconversion of beta-D-galactose and alpha-D-galactose, as well as other sugars such as glucose. It is required for normal galactose metabolism, and catalyses the first step of the Leloir pathway. The net result of the pathway is the conversion of beta-D-galactose into alpha-D-glucose-1-phosphate. The enzyme shows an approximately four-fold preference for galactose over gulcose. </p> <p>Mutations of enzymes involved in this pathway are often associated with galactosemia. This hereditary disease presents early onset of cataracts, typically within the first two years of life and in severe cases it can result in liver, kidney and brain damage.</p>
