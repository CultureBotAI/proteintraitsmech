identifier: MCSA:83
label: phospholipase A2 (group IB)
definition: >-
  PLA2 catalyses the hydroylsis of the 2-acyl ester of 1,2-diacylphosphatides. Two forms of PLA2 are known: the small secretory PLA2s which are amphipathic molecules usually found associated with lipid membranes, and the larger cytosolic forms. This annotation is for the small secretory form. Secretory PLA2s form part of the neurotoxic component of many snake and bee venoms due to its ability to block acetylcholine release. Secretory PLA2s have been divided into 3 main groups: I, II, and III. Class I (present in some snake venoms and in mammalian exocrine pancrease) and II (present in some snake venoms and also broadly distributed among a variety of mammalian cell types) are closely related to each other. The class III enzymes (including venom enzymes from the honeybee and the Gila monster) appear to form a separate divergent group though their active site and mechanism is similar. The key catalytic histidine and aspartate are in very similar orientations however the residues making up the rest of the hydrogen bond network are not conserved spatially.
