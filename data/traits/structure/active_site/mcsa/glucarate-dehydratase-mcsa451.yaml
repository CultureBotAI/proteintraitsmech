identifier: MCSA:451
label: glucarate dehydratase
definition: >-
  Delta-Glucarate dehyratase catalyses the dehydration of both D-glucarate and L-idarate to form 5-keto-4-deoxy-d-glucarate. Enzymes are also known to perform the glucarate to idarate and idarate to glucarate epimerization reactions The enzyme belongs to the mechanistically diverse enolase superfamily, specifically the glucarate dehydratase subgroup (SFLD nomenclature). Enolase enzymes catalyse reactions involving the removal of an alpha proton adjacent to a carboxylate anion.
