identifier: MCSA:524
label: histone acetyltransferase (GCN5 family)
definition: >-
  p300/CBP-associating factor (PCAF) from <i>Homo sapiens</i> is a histone acetyltransferase. It catalyses the transfer of an acetyl group from acetyl-coenzyme A to the epsilon-amino group of specific lysine residues within histone amino termini. The acetylation of histone plays a crucial role in the transcriptional activation of specific target genes, and in transcriptional regulation. Eukaryotic GCN5 acetyltransferases influence diverse biological processes by acetylating histones and non-histone proteins and regulating chromatin and gene-specific transcription as part of multiprotein complexes.
