identifier: MCSA:369
label: UDP-N-acetylglucosamine enolpyruvyl transferase
definition: >-
  UDP-N-acetylglucosamine 1-carboxyvinyltransferase or UDP-N-acetylglucosamine enolpyruvyl transferase (EPT) is a key enzyme in the biosynthesis of peptidoglycan, a major component of the bacterial cell wall. The enzyme is involved in the first step of peptidoglycan biosynthesis, it catalyses the the enolpyruvyl transfer from phosphoenolpyruvate (PEP) to a second substrate. Historically, the pathway of peptidogycan biosynthesis has been an important target for antibacterial agents, such as the beta-lactams. EPT is of particular interest because it is inhibited by the naturally occurring antibiotic fosfomycin.
