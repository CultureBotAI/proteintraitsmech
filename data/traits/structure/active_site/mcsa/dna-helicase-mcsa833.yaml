identifier: MCSA:833
label: "DNA helicase"
definition: >-
  PcrA DNA helicase is a 3'-5' DNA helicase. It is a single-stranded DNA (ssDNA)-dependent ATPase that uses the free energy of ATP hydrolysis to unwind duplex DNA. PcrA is known to be essential in some species, such as <i>Bacillus subtilis</i> and <i>Staphylococcus aureus</i>, with roles in DNA repair and rolling circle replication. This annotation covers the ATPase activity of PcrA. <p> The conformational changes brought about through ATP binding, hydrolysis and subsequent release allow PcrA to bind to DNA and unwind the helix. In particular a Glutamine residue that binds to the gamma phosphate of ATP is part of the motif III switch which bridges the ATPase domain and the DNA binding domain. So the binding of the gamma phosphate and its cleavage from the ATP in the ATPase domain can result in conformational changes in the DNA binding domain which enables PcrA to bind to DNA.<p/>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
