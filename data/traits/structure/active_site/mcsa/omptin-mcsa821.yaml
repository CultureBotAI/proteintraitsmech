identifier: MCSA:821
label: omptin
definition: >-
  Outer membrane protease (OmpT) of <i>Escherichia coli</i> is from a family of homologous outer membrane proteases called omptins. They are implicated in the virulence of several pathogenic, gram negative bacteria, and OmpT is associated with urinary tract disease. OmpT preferentially cleaves substrates between two consecutive basic amino acids, and is dependent on the presence of lipopolysaccharide.
