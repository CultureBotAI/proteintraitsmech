identifier: MCSA:470
label: (3R)-hydroxyacyl-CoA dehydrogenase
definition: >-
  Mammalian peroxisomal multifunctional enzyme type 2 (MFE-2) is important in the beta-oxidation of very-long-chain and alpha-methyl-branched fatty acids as well as the synthesis of bile acids. It has three units: a dehydrogenase unit, an sterol carrier protein (SCP) -like unit and a central hydratase unit. This entry represents the dehydrogenase unit oxidises the C3 hydroxyl group of (3R)-hydroxyacyl-CoA molecules to obtain the corresponding (3R)-ketoacyl-CoA. It belongs to the short chain alcohol dehydrogenase/reductase (SDR) superfamily.
