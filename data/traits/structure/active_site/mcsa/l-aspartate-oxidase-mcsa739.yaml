identifier: MCSA:739
label: "L-aspartate oxidase"
definition: >-
  L-aspartate oxidase (LASPO) is a flavo enzyme from <i>Escherichia coli</i>. It is unusual as it can use both oxygen and fumarate as electron acceptors for FAD oxidation, which means it is both aerobic and anaerobic. LASPO is an FAD dependent enzyme which catalyses the oxidation of L-aspartate into iminoaspartate. This is the first step in the bacterial synthesis of NAD+, and is a useful target for drug design, as this pathway is not present in mammals.
