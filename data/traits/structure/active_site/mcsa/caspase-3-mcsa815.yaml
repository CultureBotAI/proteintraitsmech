identifier: MCSA:815
label: caspase-3
definition: >-
  Caspase-3 from <i>Homo sapiens</i> is a member of a family of intracellular cysteine proteases that cleave substrates specifically at an aspartic acid residue. Caspases share a high degree of homology, not only within caspases from the same species but also across various species. Caspases control the proteolytic cascade central to the initiation and regulation of apoptosis. Caspase-3 is known as the executioner protease. The inactive form of caspase-3 is procaspase-3. This is activated when the procaspase is cleaved at an aspartate residue in the subunit linker, followed by one or more cleavages that remove the pro-domain.
