identifier: MCSA:554
label: "nucleoside deoxyribosyltransferase"
definition: >-
  Nucleoside 2'-deoxyribosyltransferase catalyses cleavage of the 2'-deoxyribosyl-nucleoside glycosidic bond through the formation of a covalent deoxyribosyl-enzyme intermediate. The enzyme is found in various <i>Lactobacilli</i> species where it participates in nucleoside recycling. There is considerable interest for nucleoside 2'-deoxyribosyltransferase to be used as an industrial biocatalyst in creating natural and non-natural nucleosides.
