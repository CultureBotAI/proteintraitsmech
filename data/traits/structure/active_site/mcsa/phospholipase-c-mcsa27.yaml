identifier: MCSA:27
label: phospholipase C
definition: >-
  Phospholipase C (PLC) from Bacillus cereus is a monomeric protein with a degree of similarly to mammalian PLCs and can mimic the action of mammalian PLCs for example by stimulating prostaglandin synthesis. The active site contains three Zn(II) ions which activate the cleavage of membrane phospholipids, liberating the polar head group and diacylglycerol. Although phosphatidylcholine is the preferred substrate, phosphatidylserine and phosphatidylethanolamine are also accepted.
