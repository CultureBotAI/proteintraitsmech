identifier: MCSA:384
label: Methionine--tRNA ligase
definition: >-
  Methionine-tRNA ligase is an alpha 2 dimer which is required not only for elongation of protein synthesis but also for the initiation of all mRNA translation through initiator tRNA(fMet) aminoacylation. This entry represents type 2a methionine-tRNA synthetase from eubacteria which links one zinc ion.
