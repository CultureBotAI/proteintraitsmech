identifier: MCSA:214
label: amidophosphoribosyltransferase
definition: >-
  Glutamine phosphoribosylpyrophosphate amido transferase (GPATase) catalyses the transfer of the glutamine amide nitrogen to phosphoribosylpyrophosphate to generate phosphoribosylamine, pyrophosphate and glutamate. The enzyme is a member of a family of proteins which utilise the amide nitrogen of glutamate for the biosynthesis of amino acids, nucleotides, amino sugars and coenzymes. The coupling of phosphoribosyl transferase and glutaminase actities in an enzyme is not frequently seen but required for <i> de novo </i> purine synthesis.
