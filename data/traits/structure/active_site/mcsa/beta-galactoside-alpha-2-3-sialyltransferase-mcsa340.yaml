identifier: MCSA:340
label: beta-galactoside alpha-2,3-sialyltransferase
definition: >-
  Glycosyltransferase enzymes perform the sialyation of glycojonguates, molecules which have vital roles in cell recognition, adhesion and immunogenicity. The subset of sialyl-transferases (ST) catalyse the transfer of the sialic acid moiety from a cytidine-5'-monophosphate-N-acyl neuraminic acid donor to various acceptor glyco-conjuates terminating in either galactose, N-acetyl-galactosamine or another sialic acid. The enzyme annotated here, ST3Gal-I, catalyses the displacement reaction between CMP-N-acetylneuraminate and beta-D-Galactosyl-1,3-N-acetyl-alpha-D-galactosaminyl and is a member of the glycosyl transferase family 29. Bacterial sialytransferase enzymes contain a DXD domain which binds two divalent cations that are essential for catalysis. No such domain is present in the mammalian homologues, and the activity of these enzymes is found not to be dependent upon the presence of metal cofactors [PMID:19820709]. While the glycosyltransferase-catalysed reactions had been assumed to be uni-directional, the narrow difference in favourability for glycoside formation has been exploited to synthesise rare NDP-sugar products [PMID:16946071].
