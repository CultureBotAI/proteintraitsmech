identifier: MCSA:541
label: "5-formyltetrahydrofolate cyclo-ligase"
definition: >-
  Tetrahydrofolates (THFs) are cofactors that donate or accept single carbon units in metabolic processes. 5,10-methenyltetrahydrofolate synthetase (MTHFS) is the only known enzyme to use 5-formylTHF. MTHFS catalyses tbe conversion of 5-formyTHF to 5,10-methenylTHF coupled to the hydrolysis of ATP to ADP in the presence of magnesium.<br/>In solution, MTHFS exists 50% dimeric form, 50% in monomeric form.
