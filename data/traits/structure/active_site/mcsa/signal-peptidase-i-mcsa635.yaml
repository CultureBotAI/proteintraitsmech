identifier: MCSA:635
label: signal peptidase I
definition: >-
  <i>Escherichia coli</i> type I signal peptidase is a membrane-bound serine endopeptidase that cleaves the amino-terminal signal sequence from secretory proteins and some membrane proteins. Evolutionarily the enzyme belongs to the protease clan SF and the protease family S26.
