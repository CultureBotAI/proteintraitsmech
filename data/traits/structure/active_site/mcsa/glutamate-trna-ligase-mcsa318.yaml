identifier: MCSA:318
label: "glutamate-tRNA ligase"
definition: >-
  Glutamyl tRNA synthase is able to catalyse the attachment of the amino acid glutamate to its corresponding tRNA molecule, utilising ATP in the process. It is a member of the class I tRNA synthases, and among this group is one of the three known to be unable to catalyse the activation of the amino acid by reaction with ATP unless the tRNA that the amino acid is subsequently transferred to is also present. The enzyme described here, from <i>Thermus thermophilus</i>, displays homology with the other class I tRNA synthases, such as Glutamine tRNA synthase, and is assumed to share a common evolutionary origin with these enzymes, as well as a conserved mechanism by which the reaction occurs.
