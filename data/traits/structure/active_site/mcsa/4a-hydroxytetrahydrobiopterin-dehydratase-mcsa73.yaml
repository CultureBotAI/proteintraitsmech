identifier: MCSA:73
label: "4a-hydroxytetrahydrobiopterin dehydratase"
definition: >-
  4a-Hydroxy-tetrahydrobiopterin dehydratase/DCoH is a bifunctional protein. In the cytoplasm it is an enzyme required for the regeneration of tetrahydrobiopterin, an essential cofactor for phenylalanine hydroxylase. In the nucleus it functions as a transcriptional coactivator by forming a 2:2 heterotetramer with the hepatic nuclear factor HNF1alpha (HNF1). <br/><br/> The enzymatic catalytic form is a tetramer whereas the mode of binding to the nuclear factor is as a heterotetramer. The enzyme catalyses the dehydration of 4a-carbinolamine biopterin cofactor, a substrate used by the aromatic acid hydroxylases and NO synthase. Mutations of DcoHin humans have been associated with elevated levels of phenylalanine and the excretion of large amounts of 7-substituted pterins.
