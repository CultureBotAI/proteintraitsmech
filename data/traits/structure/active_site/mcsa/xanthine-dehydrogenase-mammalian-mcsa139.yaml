identifier: MCSA:139
label: xanthine dehydrogenase (mammalian)
definition: >-
  Mammalian xanthine oxidoreductase catalyses the hydroxylation of hypoxanthine and xanthine, the last two stages in the biosynthesis pathway of urate. The enzyme is first formed as xanthine dehydrogenase (XDH), and exists mostly in this form within the cell but it can be readily converted to the oxidase form xanthine oxidase (XO) by oxidation of sulfhydryl residues or by proteolysis. The active form of the enzyme is a homodimer of a three chain subunits, where both units contain one molybdenum centre, one flavin (FAD) centre and two Fe-S clusters. The oxidation of xanthine to uric acid takes place at the molybdenum centre and results in a two electron reduction of the metal from Mo(VI) to Mo(IV). The enzyme is subsequently reoxidised by molecular oxygen in a reaction that occurs at the FAD cofactor. Xanthine dehydrogenase (EC 1.17.1.4) and xanthine oxidase (EC 1.17.3.2 - M-CSA ID:987) are two variants of the same gene product. The former prefers NAD+ as the oxidising substrate whereas the latter uses dioxygen exclusively.
