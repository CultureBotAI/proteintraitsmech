identifier: MCSA:261
label: aristolochene synthase
definition: >-
  Aristolochene synthase is a fungal cyclase that catalyses the divalent metal dependent cyclisation of farnesyl diphosphate to the eremophilane sesquiterpene hydrocarbon aristolochene. Based on structural comparison, aristolochene is considered the likely parent hydrocarbon of several eremophilene toxins and bioregulators produced by a variety of filamentous fungi. It is also part of the gene cluster that mediates the biosynthesis of PR-toxin, a bicyclic sesquiterpene belonging to the eremophilane class and acting as a mycotoxin.
