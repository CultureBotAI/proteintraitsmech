identifier: MCSA:402
label: "dihydrodipicolinate reductase"
definition: >-
  Dihydrodipicolinate reductase catalyses the conversion of 4-hydroxy-tetrahydrodipicolinate (HTPA) to tetrahydrodipicolinate. It can use both NADH and NADPH as a reductant, with NADH being twice as effective as NADPH <br/><br/> The enzyme is a component of the biosynthetic pathway that leads to diaminopimelate and lysine in bacteria and higher plants. Because these pathways are unique to microorganisms and plants, they may represent attractive targets for new antimicrobial or herbicidal compounds.
