identifier: MCSA:695
label: "purine-nucleoside phosphorylase"
definition: >-
  Purine metabolism in the parasite Plasmodium has been identified as a promising target for antimalarial therapies due to slight alterations around the active site when compared to mammalian purine nucleoside phosphorylase (PNP). PNP is part of a salvage pathway for the biosynthesis of purines, which are essential to parasite survival due to location of the organism, erthrocytes and <i> Plasmodium </i> itself not being able to produce purines <i> de novo </i>.
