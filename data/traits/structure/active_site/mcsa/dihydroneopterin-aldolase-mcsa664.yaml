identifier: MCSA:664
label: "dihydroneopterin aldolase"
definition: >-
  7,8 dihydroneopterin from <i>Staphylococcus aureus</i> is able to catalyse the conversion of 7,8 dihydroneopterin to 6 hydroxymethyl 7,8 dihydroneopterin, an aldol cleavage reaction which also produces glycoaldehyde, a key step in the synthesis of folate, which can in turn be used for the synthesis of purines. The enzyme is an attractive target for antibiotics, as the it is found in MRSA, thus structural information can be used to design inhibitors of the enzyme.
