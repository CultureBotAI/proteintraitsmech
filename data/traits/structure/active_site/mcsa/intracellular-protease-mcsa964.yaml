identifier: MCSA:964
label: "intracellular protease"
definition: >-
  The intracellular protease from <i>Pyrococcus horikoshii</i> (PH1704) and PfpI from <i>Pyrococcus furiosus</i> are members of a class of intracellular proteases that have no sequence homology to any other known protease family. They have significant similarity with deglycases that catalyse the deglycation of the Maillard adducts formed between amino groups of proteins and reactive carbonyl groups of glyoxals. The protein is a member of the DJ-1 family, mutations of which appear to have a significant role in the cause of recessively transmitted early-onset Parkinson disease (PD), and oxidative damage to DJ-1 has been associated with the pathogenesis of late-onset sporadic PD. However, the precise role of DJ-1 proteins have yet to be fully elucidated.
