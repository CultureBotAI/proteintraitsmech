identifier: MCSA:672
label: protocatechuate 4,5-dioxygenase
definition: >-
  The LigAB enzyme from <i>Sphingomonas paucimobilis</i> SYK-6 is a protocatechuate 4,5-dioxygenase, catalyses the ring-opening of protocatechuate (PCA) by oxidation to cleave the C4-C5 bond adjacent to the vicinal hydroxyl group. It belongs to the family of class III extradiol-type catecholic dioxygenase which is characterised by a ferrous iron in the active site. It has been identified as a key enzyme in the lignin-degradation pathway of <i>Sphingomonas paucimobilis</i> SYK-6.
