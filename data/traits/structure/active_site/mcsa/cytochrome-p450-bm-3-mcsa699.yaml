identifier: MCSA:699
label: "cytochrome P450 (BM-3)"
definition: >-
  Cytochromes P450, a gene superfamily of heme proteins found in all eukaryotes, most prokaryotes, and Archaea, catalyse the mono-oxygenation of a wide variety of organic molecules. P450 reactions of biological significance include steroid bio-genesis, drug metabolism, procarcinogen activation, xenobiotic detoxification, and fatty acid metabolism. P450BM-3 consists of heme (BMP) and FMN/FAD containing reductase domains linked together by a single polypeptide.
