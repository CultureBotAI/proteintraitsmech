identifier: MCSA:840
label: "alpha-2,3-sialyltransferase"
definition: >-
  Sialyltransferase (CstII) from <i>Campylobacter jejuni</i> catalyses the transfer of the sialic acid moiety from cytidine-5'-monophospho-N-acetyl-neuramic acid (CMP-NeuAc) to the terminal positions of glycoconjugates. The products play critical roles in recognition and adherence. <i>Campylobacter jejuni</i> has been shown to express variable cell surface carbohydrate mimics of human gangliosides that are associated with virulence.
