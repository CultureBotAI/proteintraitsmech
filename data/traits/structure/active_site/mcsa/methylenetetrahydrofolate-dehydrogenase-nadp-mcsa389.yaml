identifier: MCSA:389
label: methylenetetrahydrofolate dehydrogenase (NADP+)
definition: >-
  Enzymes involved in tetrahydrofolate metabolism are of particular pharmaceutical interest, as their function is crucial for amino acid and DNA biosynthesis. In eukaryotes, the enzyme that performs this reaction occurs as a trifunctional enzyme that also has methylenetetrahydrofolate dehydrogenase (NADP+) (EC 1.5.1.5) and formate-tetrahydrofolate ligase (EC 6.3.4.3) activity. In some prokaryotes, it occurs as a bifunctional enzyme that also has dehydrogenase (EC 1.5.1.5) activity or formiminotetrahydrofolate cyclodeaminase (EC 4.3.1.4) activity. This particular entry represents the dehydrogenase activity. Although the human protein represented here is actually trifunctional, the representative PDB structure only contains the dehydrogenase (D) and cyclohydrolase (C) domains, which have an overlapping active site (as determined by chemical modification and kinetic studies).
