identifier: MCSA:955
label: "tuberculosinol synthase"
definition: >-
  This enzyme is responsible for the conversion of tuberculosinyl diphosphate to tuberculosinol and the R and S iso-tuberculosinols. Tuberculosinols are one class of virulence factor in <i>Mycobacterium tuberculosis</i>. The active site for both of these functions is the same, but the R- and S-iso-tuberculosinol formation involves the addition of water at the C13 atom, rather than the C15, and involve an allylic rearrangement.
