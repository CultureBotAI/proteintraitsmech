identifier: MCSA:460
label: thioglucosidase
definition: >-
  Myronase is the enzyme responsible for the hydrolysis of a variety of plant anionic-1-thio-beta-glucosides, called glucosinolates. <i>Sinapsis alba</i> myrosinase is a 499 amino acid S-glucosidase which hydrolyses an S-glycosidic bond, and is closely related to the O-glucosidases. Upon hydrolysis, configuration at the anomeric centre is retained. Myrosinases are thought to be involved in defence systems developed by plants <br/><br/> The protein fold into a (beta/alpha)8 barrel structure, forming a dimer which is stabilised by a Zn ion, and is heavily glycosylated. It is a member of the glycoside hydrolase family 1 (GH1).
