identifier: MCSA:876
label: "UDP-N-acetylmuramate---L-alanine ligase"
definition: >-
  <p>UDP-N-acetylmuramate-alanine ligase (MurC) is an essential, cytoplasmic peptidoglycan biosynthetic enzyme that catalyses the ATP-dependent ligation of L-alanine (Ala) and UDP-N-acetylmuramic acid (UNAM) to form UDP-N-acetylmuramyl-L-alanine (UNAM-Ala). This reaction is part of the biosynthesis of cell walls in bacteria. MurC is a nonribosomal peptide ligase which utilises ATP to form an amide bond between L-alanine and UNAM. Mechanistic studies on the <i>Escherichia coli</i> enzyme demonstrated that the enzyme-catalysed reaction proceeds through an acyl phosphate UNAM intermediate prior to L-alanine addition.</p>
