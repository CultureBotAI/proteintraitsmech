identifier: MCSA:26
label: phosphatidylinositol diacylglycerol-lyase
definition: >-
  <p>Phosphatidylinositol-specific phospholipase C (PI-PLC) is a ubiquitous enzyme involved in a vast range of cellular signalling cascades. Prokaryotic PLCs act as virulence factors in some bacteria, catalysing the hydrolysis of the sn-3 phosphodiester bond of phosphatidylinositol (PI) producing diacylglycerol (DAG) and inositol 1-phosphate (I(1)P).</p> <p>For the bacterial enzyme, the main product is the cyclic intermediate, myo-inositol 1,2-cyclic phosphate, which is rapidly hydrolysed to I(1)P by the eukaryotic PI-PLCs whereas the mammalian enzyme undergoes complete catalysis. </p> <p>PI-PLC from <i>Bacillus cereus</i>, and the nearly identical enzyme from <i>B. thuringiensis</i> have been used as model systems for the study of IP-PLCs as a whole. Bacterial PI-PLCs are metal-ion-independent. This is in contrast to mammalian PI-PLCs which are Ca(II) dependent. The R69D mutant of <i>B. thuringiensis</i> PI-PLC is calcium dependent and has been used to investigate the role of calcium in catalysis by PI-PLCs [PMID:16042375].</p>
