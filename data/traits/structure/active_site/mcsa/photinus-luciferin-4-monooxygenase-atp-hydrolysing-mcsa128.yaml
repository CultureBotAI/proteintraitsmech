identifier: MCSA:128
label: "Photinus-luciferin 4-monooxygenase (ATP-hydrolysing)"
definition: >-
  Luciferases (EC:1.13.12.7) are the enzymes that catalyse the reactions that produce light in bioluminescence. <i>Photinus pyralis</i> luciferase produces green light with a wavelength of 562 nm, but the colour for firefly bioluminescence can vary between yellow-green to red. Luciferase is commonly used as a reporter in biological research.
