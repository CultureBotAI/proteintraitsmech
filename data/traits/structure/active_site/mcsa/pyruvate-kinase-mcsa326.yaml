identifier: MCSA:326
label: pyruvate kinase
definition: >-
  Pyruvate kinase catalyses the final step of glycolysis and is allosterically regulated by fructose-1,6-bisphosphate. It requires two equivalents divalent cation, one of which binds to the enzyme as a complex with the nucleotide substrate, as well as activation by K+. As opposed to mammalian pyruvate kinase, the bacterial enzyme works in a K+ independent manner. The enzyme is also known to catalyse a variety of side reactions, including the decarboxylation of oxalacetate, the enolisation of pyruvate, ATP-dependent phosphorylation of alpha-hydroxy or alpha-thio carboxylates, ATP- and bicarbonate-dependent phosphorylations of fluoride and of hydroxylamine and to also function as an ATP- and bicarbonate-dependent ATPase. These side activities reflect the capacity of the active site to labilise the gamma-phosphate of ATP or to stabilise the enolate of pyruvate [PMID:9308890]. There are four isozymes of pyruvate kinase in mammals (L, R, M1, M2) encoded by two different genes: PKLR and PKM. The L and R isozymes are generated from the PKLR by differential splicing of RNA; the M1 and M2 forms are produced from the PKM gene by differential splicing. L type is major isozyme in the liver, R is found in red cells, M1 is the main form in muscle, heart and brain, and M2 is found in early fetal tissues as well as in most cancer cells. This entry represents the PKM gene products.
