identifier: MCSA:946
label: "3,6-anhydro-alpha-L-galactonate cycloisomerase"
definition: >-
  The catabolic fate of the major monomeric sugar of red macroalgae, 3,6-anhydro-L-galactose (AHG), is poorly understood. AHG is not catabolised by ordinary fermentative microorganisms, and it hampers the utilisation of red macroalgae as renewable biomass for biofuel and chemical production. However, characterisation of two enzymes in <i>Vibrio sp.</i>, a marine bacterium capable of catabolising AHG as a sole carbon source, revealed two key metabolic intermediates of AHG, 3,6-anhydrogalactonate (AHGA) and 2-keto-3-deoxy-galactonate. This entry represents the isomerase that converts 3,6-anhydro-alpha-L-galactonate to 2-dehydro-3-deoxy-D-galactonate.
