identifier: MCSA:284
label: thiocyanate hydrolase
definition: >-
  Thiocyanate hydrolase is a cobalt-containing metalloenzyme with a cysteine-sulphinic acid ligand that hydrolyses thiocyanate to carbonyl sulphide and ammonia. The enzyme from <i>Thiobacillus thioparus</i> catalyses the first step in the degradation of thiocyanate. Structural studies show all three chains to surround the active site, with positive side chains projecting towards the metal centre from each of them, stabilising the negatively charged substrate and product [PMID:17222425].
