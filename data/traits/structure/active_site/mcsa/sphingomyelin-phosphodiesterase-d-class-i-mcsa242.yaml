identifier: MCSA:242
label: sphingomyelin phosphodiesterase D (Class I)
definition: >-
  <p>Sphingomyelinase D (SMase D), isolated from <i>Loxosceles laeta</i>, catalyses the hydrolysis of sphingomyelin to ceramide 1-phosphate (C1P) and choline, and the hydrolysis of lysophosphatidyl choline to lysophosphatidic acid (LPA) and choline. This enzyme belongs to class I of the SMase D enzymes. SMase D is a component of Loxosceles spider venom and and is the principle toxin causing dermonecrosis, acute renal failure, platelet aggregation and systemic intravascular haemolysis. SMase D activity is not found anywhere else in the animal kingdom but some pathogenic bacteria, such as <i>Corynebacterium pseudotuberculosis</i>, produce a similar enzyme as an exotoxin. This enzyme belongs to the arthropod phospholipase D family, Class I subfamily.</p> <p>In addition to hydrolysing sphingomyelin, the enzyme can hydrolyse lysophosphatidyl choline to lysophosphatidic acid and choline.</p>
