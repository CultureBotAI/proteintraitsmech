identifier: MCSA:270
label: ribulose-phosphate 3-epimerase (cytoplasmic)
definition: >-
  <p>Ribulose-phosphate 3-epimerase (EC:5.1.3.1) (also known as RPE, pentose-5-phosphate 3-epimerase or PPE) is the enzyme that converts D-ribulose 5-phosphate (Ru5P) into D-xylulose 5-phosphate in Calvin's reductive pentose phosphate cycle. RPE has been found in a wide range of bacteria, archaebacteria, fungi and plants. All the proteins have from 209 to 241 amino acid residues and have a TIM barrel structure.</p> <p>This enzyme participates in both the oxidative and reductive pentose phosphate pathways and is thus an amphibolic enzyme [PMID:12547196]. There is some discussion as to whether this enzyme is zinc dependent or not. No zinc dependence has been reported [PMID:12547196]. The zinc independent (in which a water molecule is bound in place of a zinc ion to the two histidine residues that are seen as the zinc binding ligands as well as the two catalytic aspartate residues) mechanism has issues relating to how the intermediate formed is stabilised, and it has been suggested that the three strictly conserved methionines (Met40, Met71 and Met144) act as a transient 'electrostatic cushion' [PMID:10191144]. However, the alternative in which the zinc ion stabilises the oxyanion formed is more attractive [PMID:12547196] with the methionine residues aiding in this process and ensuring a hydrophobic and thus proton free environment. The actual mechanisms (with respect to the bonds formed and cleaved) are identical between the two proposals, the only difference lies in how the intermediate is stabilised [PMID:10191144, PMID:12547196, PMID:15333955].</p>
