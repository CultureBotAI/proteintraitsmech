identifier: MCSA:135
label: "peptidylglycine monooxygenase"
definition: >-
  peptidylglycine monooxygenase is a copper protein that acts on the terminal glycine residue of peptidylglycines. Peptidylglycines with a neutral amino acid residue in the penultimate position are the best substrates for the enzyme. In <i>Rattus norvegicus</i> this is functionality is part of a bifunctional enzyme. The monooxygenase part produces an unstable peptidyl(2-hydroxyglycine) as its product, which is then transported and dismutated to glyoxylate and the corresponding desglycine peptide amide by the lyase part. The C-terminal amidation of peptides such as neuropeptides is essential for full biological activity and involved in the final step of biosynthesis of alpha-melanotropin and related biologically active peptides.
