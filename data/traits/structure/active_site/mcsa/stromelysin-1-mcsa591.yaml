identifier: MCSA:591
label: stromelysin 1
definition: >-
  Human stromelysin-1 (matrix metalloproteinase 3, MMP-3) is one of the most attractive targets in drug discovery today because of its broad physiological specificity.This extracellular endopeptidase of vertebrate tissues degrades various proteoglycan components of the extracellular matrix as well as fibronectin and laminin. Stromelysin also plays a unique role among the MMPs because of its involvement in activation of other MMP proenzymes.
