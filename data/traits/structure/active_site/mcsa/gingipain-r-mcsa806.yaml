identifier: MCSA:806
label: "gingipain R"
definition: >-
  Gingipains are key virulence factors of <i>Porphyromonas gingivalis</i>. They are cysteine proteinases with a high specificity for Arg-Xaa or Lys-Xaa. These proteins are single polypeptides with two domains that show homology to the caspases. Gingipain R is implicated in tissue inflammation associated with periodontal diseases. Elucidation of a chemical mechanism for the active site of gingipain R may be useful in design of drugs in the fight against peridontal diseases.
