identifier: MCSA:488
label: "L-rhamnose isomerase"
definition: >-
  This enzyme interconverts L-rhamnose and L-rhamnulose. In some species, including <i>Escherichia coli</i>, this is the first step in rhamnose catabolism. <br/><br/> The enzyme contains two divalent metal ions located at different metal-binding sites within the active site. The enzyme binds the closed ring form of the substrate and catalyses ring opening to generate a form of open-chain conformation that is coordinated to one of the metal sites.
