identifier: MCSA:178
label: H+-transporting two-sector ATPase (F-type, mitochondrial)
definition: >-
  Mitochondrial membrane ATP synthase (F1F0 ATP synthase or Complex V) produces ATP from ADP in the presence of a proton gradient across the membrane which is generated by electron transport complexes of the respiratory chain. F-type ATPases consist of two structural domains, F1, containing the extramembraneous catalytic core, and F0, containing the membrane proton channel, linked together by a central stalk and a peripheral stalk. Subunits alpha and beta form the catalytic core in F1. F-type-ATPase utilises the proton motive force generated by photosynthesis and oxidative phosphorylation to synthesise ATP. It also catalyses the hydrolysis of ATP. During catalysis, ATP synthesis in the catalytic domain of F1 is coupled via a rotary mechanism of the central stalk subunits to proton translocation. Rotation of the central stalk against the surrounding alpha3beta3 subunits leads to hydrolysis of ATP in three separate catalytic sites on the beta subunits.
definition_source: M-CSA (Thornton lab, EBI; fetched via REST API)
