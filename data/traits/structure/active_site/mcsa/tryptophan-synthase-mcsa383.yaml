identifier: MCSA:383
label: tryptophan synthase
definition: >-
  Tryptophan synthase is able to catalyse the last two steps in the synthesis of tryptophan in bacteria, plants and fungi (but not in animals, where it is an essential component of the diet). It consists of two catalytically active subunits and was the first enzyme for which a product formed at one site was demonstrated to be intramolecularly transferred to another site. The alpha subunit catalyses the cleavage of indolyl-glycerol-3-phosphate to give indole and 3-phosphoglyceraldehyde. Indole is then transferred to the beta subunit where it combines with L-serine to form tryptophan. This reaction is PLP-dependent. Inhibitors of the alpha subunit are easy to design, meaning this enzyme represents a useful target for herbicides.
