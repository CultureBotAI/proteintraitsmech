identifier: MCSA:365
label: Phosphofructokinase I
definition: >-
  Phosphofructokinase (PFK) is a key enzyme in glycolysis. It transfers a phosphate group to fructose and in doing so controls entry into the pathway. PFK is highly regulated and is cooperative for fructose and shows allosteric inhibition by phosphoenolpyruvate and activation by ADP. The enzyme changes from the R state to the T state by a rotation around the 'p' axis of the molecule, resulting in a change in the subunit-subunit interactions that are communicated to the active site. The ATP binding site remains fixed during the transition from R to T state except for the residue arg 72 that is important for bridging the substrate phosphates during catalysis. In the T state this Arg residue forms a salt bridge with glu241. The T state is also characterised by a large change in the substrate binding site, the movement of the '6-F' loop leads to the collapse of this binding site.
