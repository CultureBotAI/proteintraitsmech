identifier: MCSA:90
label: adenosylhomocysteinase
definition: >-
  Adenosylhomocysteinase (AdoHcyase) catalyses the reversible hydrolysis of S-adenosylhomocysteine (AdoHcy). AdoHcyase is a tetrameric enzyme with 431 amino acid residues in each identical subunit. The subunit is composed of the catalytic domain, the NAD<sup>+</sup>-binding domain, and the small C-terminal domain. Both catalytic and NAD<sup>+</sup>-binding domains are folded into an ellipsoid with a typical alpha / beta twisted open sheet structure. The catalytic domain is quite mobile, whereas the NAD<sup>+</sup>-binding domain and the small C-terminal domain are less mobile. The high mobility of the catalytic domain is due to the unique architecture of the tetramer.
