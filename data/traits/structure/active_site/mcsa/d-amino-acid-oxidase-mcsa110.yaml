identifier: MCSA:110
label: D-amino-acid oxidase
definition: >-
  D amino acid oxidase (DAAO) acts to oxidise D amino acids to their imino counterparts, using FAD as a cofactor. The imino acid then undergoes hydrolysis outside of the enzyme's active site. This reaction has been found to play an important role in the degradation of certain neurotransmitters such as D-serine in mammals, but the enzyme is also found in other eukaryotes and its function has not been fully characterised. It shows mechanistic correlation with other enzymes able to oxidise amino groups. Yeast and mammalian DAAOs share features such as the basic catalytic mechanism. However, they differ in important aspects such as catalytic efficiency, substrate specificity, aggregation state, stability, kinetic mechanism, and mode and effectiveness of FAD binding. Thus, DAAO from the yeast Rhodotorula gracilis (RgDAAO) has a kcat value ≈20,000 minute−1 compared to 600 minute−1 for pig kidney DAAO (pkDAAO) with D-alanine as substrate.
