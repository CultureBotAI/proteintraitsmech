identifier: MCSA:956
label: "L-serine ammonia-lyase"
definition: >-
  serine racemase (SRR) catalyses the PLP-dependent synthesis of D-serine from L-serine (and <i>vice versa</i>. SRR also has dehydratase activity towards both L-serine and D-serine, resulting in pyruvate and ammonia. It is allosterically activated by ATP, by magnesium, and possibly also by other divalent metal cations. The magnesium ion present in the crystal structure is thought to be essential for the structural integrity of the enzymes, and not directly involved in catalysis [PMID:20564571].
