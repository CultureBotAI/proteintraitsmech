identifier: MCSA:551
label: phenol 2-monooxygenase
definition: >-
  Phenol 2-monooxygenase, also known as phenol hydroxylase (PHHY) belongs to a class of flavin enzymes commonly referred to as the aromatic hydroxylases. It catalyses the conversion of simple phenols to their o-diol derivatives. The enzyme is a homodimer where each monomer of 76kDa contains noncovalently bound flavin adenine dinucleotide (FAD) The enzyme can hydroxylate simple, amino, methyl, hydroxy and halogen phenols, although it does not show any activity towards phenols carrying carboxyl groups on the benzene nucleus or its side chain.<br/>Next to carbohydrates, phenolic compounds are the second most abundant group of natural products, many are also being produced by industry, with many of these being resistant to degradation. The reaction catalysed by phenol hydroxylase are of particular interest for industrial waste detoxification.
