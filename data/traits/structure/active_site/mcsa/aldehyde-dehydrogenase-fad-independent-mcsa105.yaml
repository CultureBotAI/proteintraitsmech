identifier: MCSA:105
label: "aldehyde dehydrogenase (FAD-independent)"
definition: >-
  The sulfate-reducing bacteria <i>Desulfovibrio gigas</i> synthesises a xanthine oxidase-related molybdenum-iron protein aldehyde oxidoreductase (Mop) which catalyses the oxidation of aldehydes to carboxylic acids. Mop contains two separate [2Fe-2S] clusters, and an Mo ion held by a pterin derivative called molybdopterin cytosine dinucleotide (together called the molybedenum cofactor, Mo-co).
