identifier: MCSA:250
label: "chloride peroxidase (heme dependent)"
definition: >-
  The heme-dependent chloroperoxidase (CPO) is a ~250 residue heme-containing glycoprotein that is secreted by various fungi. It was first identified in <i>Caldariomyces fumago</i> where it catalyses the hydrogen peroxide-dependent chlorination of cyclopentanedione during the biosynthesis of the antibiotic caldarioymcin. As with many of the peroxidases, it also catalyses the iodination and bromination of a wide range of substrates, dehydrogenation reactions, catalyse-type reactions (facilitating the decomposition of hydrogen peroxide to oxygen and water) and P450-like oxygen insertion reactions. The capability of chloroperoxidase to perform these diverse reactions makes it one of the most versatile of all known heme proteins.
