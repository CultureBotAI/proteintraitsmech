identifier: MCSA:464
label: alcohol dehydrogenase (class III)
definition: >-
  Class III alcohol dehydrogenases (ADH3) tend to show poor activity for ethanol among their various substrate alcohols. They catalyze the oxidation and reduction of a wide variety of substrates that include S-(hydroxymethyl)glutathione (HMGSH, leading to it being previously assigned to EC:1.1.1.284, HMGSH dehydrogenase), S-nitrosoglutathione, and long chain primary alcohols and aldehydes [PMID:1872853]. ADH3 oxidizes HMGSH to S-formylglutathione, which is then hydrolyzed to glutathione and formate by a hydrolase [PMID:9059641, PMID:7484406]. S-(hydroxymethyl)glutathione can form spontaneously from formaldehyde and glutathione, and constitutes a cellular strategy for sequestering and metabolizing highly toxic formaldehyde [PMID:12484756]. It has been noted that the the active site is located in the cleft between the coenzyme-binding and catalytic domains. It appears that the two domains can bind in different orientations, which can effect the catalytic residues (PMID:12196016 and PMID:12484756), although the mechanism appears to remain the same - with the different orientation of the two domains allowing the different histidines to bind to the NAD(H) ribose ring.
