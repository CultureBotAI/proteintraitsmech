identifier: MCSA:144
label: "arsenite oxidase"
definition: >-
  Arsenite oxidase oxidises arsenite (As(III)O<sub>3</sub><sup>3-</sup>)to the less toxic arsenate (As(V)O<sub>4</sub><sup>3-</sup>). The electrons produced are transferred towards the soluble periplasmic electron carriers cytochrome c and/or amicyanin. Arsenite oxidase is a heterodimeric enzyme containing a large and a small subunit. The large catalytic subunit harbours the molybdopterin cofactor (comprising two molybdopterin guanosine dinucleotide cofactors bound to molybdenum), and a [3Fe-4S] cluster; the small subunit belongs to the structural class of the Rieske proteins and contains a Rieske-type [2Fe-2S] clusters.
