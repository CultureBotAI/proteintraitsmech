identifier: MCSA:461
label: "enoyl-CoA hydratase"
definition: >-
  Mammalian peroxisomal multifunctional enzyme type 2 (MFE-2) is important in the beta-oxidation of very-long-chain and alpha-methyl-branched fatty acids as well as the synthesis of bile acids. It has three units: a dehydrogenase unit, an sterol carrier protein (SCP)-like unit and a central hydratase unit. <br/><br/> This entry represents the hydratase function, which reversibly catalyses the addition of water to the beta-carbon of trans-2-enoyl-CoAs with (R) specificity (the opposite to MFE-1).
