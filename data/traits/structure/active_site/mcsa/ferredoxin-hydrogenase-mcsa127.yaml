identifier: MCSA:127
label: "ferredoxin hydrogenase"
definition: >-
  The iron-only hydrogenase from <i>Desulphovibrio desulphuricans</i> is able to catalyse the heterolytic fission of molecular hydrogen to release protons and electrons. It is part of a family of iron-only hydrogenases which all have two iron centres at the active site, in contrast to the better known Ni-Fe hydrogenases with which they share no sequence or structural homology. The mechanism by which the hydrogenases work is of great interest to biologists and engineers alike as it offers the possibility of using hydrogen as a fuel more effectively.
