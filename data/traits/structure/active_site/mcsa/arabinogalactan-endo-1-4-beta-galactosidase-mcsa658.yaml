identifier: MCSA:658
label: "arabinogalactan endo-1,4-beta-galactosidase"
definition: >-
  <p><i>Asperfillus aculeatus</i> beta-1,4-Galactanase (AAGAL) is an enzyme involved in pectin degradation. It belongs to the glycoside hydrolase family 53 (GH-53) in clan GH-A. It catalyses the endohydrolysis of beta-1,4-linked galactan and type I arabinogalactan to galactose and galactose oligomers. </p> <p>Galactan and arabinogalactan are components of pectin which attaches to the C4 position of rhamnose. They forms the side-chains of the 'hairy' region of pectin. Degradation and modification of the galatan and arabinogalactan side chain has many industrial applications, so AAGAL has potential industrial uses.</p>
