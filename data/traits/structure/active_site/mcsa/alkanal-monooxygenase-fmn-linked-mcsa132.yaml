identifier: MCSA:132
label: "alkanal monooxygenase (FMN-linked)"
definition: >-
  In the bioluminescence reaction catalysed by bacterial luciferase, a flavin-dependent monooxygenase, reduced riboflavin 5' -phosphate (FMNH2) and a long-chain aliphatic aldehyde are oxidised by molecular oxygen to produce FMN, water, aliphatic carboxylic acid, and visible light with an overall quantum yield of about 0.12. It is intriguing that bacterial luciferase is unique among all known flavin-dependent monooxygenases in catalysing a light-emitting reaction. <i>Vibrio harveyi</i> luciferase is an alpha-beta heterodimer, the proposed earlier to be at a cleft in the alpha subunit.
