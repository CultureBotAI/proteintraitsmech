identifier: MCSA:218
label: "triacylglycerol lipase (pancreatic)"
definition: >-
  Pancreatic lipase from <i>Equus caballus</i> catalyses the conversion of triacylglycerol to 2-monoacylglycerol and free fatty acids. This occurs in the intestine and plays a key role in dietary fat digestion. This is important as it is converting an insoluble substrate into soluble products.
