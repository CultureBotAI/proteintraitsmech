identifier: MCSA:6
label: "glutathione-disulfide reductase"
definition: >-
  The pyrimidine nucleotide-disulphide oxidoreductases are a family of proteins which transfer electrons from NAD(P)H via FAD to a redox-active disulphide bond in the enzyme active site, which then reduces the substrate. <br/><br/> The structure of the ubiquitous enzyme glutathione reductase (EC 1.6.4.2), which helps protect cells from oxidative stress, is similar to trypanothione reductase (EC 1.6.4.8), lipoamide dehydrogenase (EC 1.8.1.4), higher eukaryotic thioredoxin reductase (EC 1.6.4.5) and mercuric reductase (1.16.1.1).
