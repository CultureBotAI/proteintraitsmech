identifier: MCSA:949
label: "alpha-D-ribose 1-methylphosphonate 5-phosphate C-P-lyase"
definition: >-
  This radical SAM (AdoMet) enzyme is part of the C-P lyase complex, which is responsible for processing phophonates into usable phosphate. The enzyme from the bacterium <i>Escherichia coli</i> can act on additional alpha-D-ribose phosphonate substrates with different substituents attached to the phosphonate phosphorus (e.g. alpha-D-ribose-1- (N-(phosphonomethyl)glycine)-5-phosphate and alpha-D-ribose-1-(2-N- acetamidomethylphosphonate)-5-phosphate).
