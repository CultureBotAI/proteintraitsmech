identifier: MCSA:498
label: "glutathione synthase (eukaryotic)"
definition: >-
  Glutathione synthase is a homodimeric enzyme that catalyses the conversion of gamma-L-glutamyl-L-cysteine and glycine to phosphate and glutathione in the presence of ATP. This is the second step in glutathione biosynthesis and in humans, defects in this enzyme are inherited in an autosomal recessive way and are the cause of severe metabolic acidosis, 5-oxoprolinuria, and increased rate of haemolysis and defective function of the central nervous system. <br/><br/> This entry represents the eukaryotic glutathione synthase, which includes human, yeast, plant and trypanosoma proteins.
