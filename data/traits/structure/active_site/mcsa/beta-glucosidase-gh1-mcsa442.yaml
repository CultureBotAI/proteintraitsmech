identifier: MCSA:442
label: "beta-glucosidase (GH1)"
definition: >-
  beta-glucosidases are an important group of enzymes that are responsible for cleaving a range of biologically significant compounds. Many show a strict specificity for their substrates although others, like the cyanogenic beta-glucosidase from white clover (CBG) are less stringent, cleaving xylosides and arabinosides as well as glucosides. In general, they hydrolyse terminal, non-reducing beta-D-glucosyl residues with release of beta-D-glucose. <br/><br/> Member of the Glycoside Hydrolase Family 1 (GH1). GH1 comprises enzymes with a number of known activities; beta-glucosidase (EC:3.2.1.21); beta-galactosidase (EC:3.2.1.23); 6-phospho-beta-galactosidase (EC:3.2.1.85); 6-phospho-beta-glucosidase (EC:3.2.1.86); lactase-phlorizin hydrolase (EC:3.2.1.62), (EC:3.2.1.108); beta-mannosidase(EC:3.2.1.25); myrosinase (EC:3.2.1.147). However, we consider myrosinase to be a different entry due to the fact that is lacking in one of the catalytic glutamates (the general acid/base) and cleaves a C-S bond, rather than the C-O bond of this entry (i.e. has a different reactive centre)
