identifier: MCSA:458
label: "methenyltetrahydrofolate cyclohydrolase"
definition: >-
  Enzymes involved in tetrahydrofolate metabolism are of particular pharmaceutical interest, as their function is crucial for amino acid and DNA biosynthesis. <br/><br/> In eukaryotes, the enzyme that performs this reaction occurs as a trifunctional enzyme that has two active sites: the bifunctional enzyme methylenetetrahydrofolate dehydrogenase – cyclohydrolase catalyses two sequential reactions involved in the interconversion of substituted tetrahydrofolates. The interconversion of 5,10-methylene-H4folate with 5,10-methenyl-H4folate is accomplished through the NADP+-dependent dehydrogenase activity, whereas 5,10-methenyl-H4folate and 10-formyl-H4folate are interconverted by the cyclohydrolase activity. The second domain represents the formate-tetrahydrofolate ligase (EC 6.3.4.3) activity. <br/><br/> Although the human protein represented here is actually trifunctional, the representative PDB structure only contains the dehydrogenase (D) and cyclohydrolase (C) domains, which have an overlapping active site (as determined by chemical modification and kinetic studies). This entry represents the bifunctional activity.
