identifier: MCSA:950
label: DDT-dehydrochlorinase
definition: >-
  This glutathione reductase is known to perform the conjugation of reduced glutathione to a wide number of exogenous and endogenous hydrophobic electrophiles [PMID:22082028, PMID:20417639]. Has DDT dehydrochlorinase activity [PMID:20417639] and may also be involved in detoxification [PMID:22082028]. Docking and NMR studies have shown that the DDT molecule binds in the H-site.
