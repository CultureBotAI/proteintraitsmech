identifier: MCSA:465
label: "cocaine esterase"
definition: >-
  Cocaine esterase (CocE) is from a <i>Rhodococcus</i> strain that lives in the soil of the cocaine producing plant <i>Erythroxylum coca</i>, which is able to use cocaine as its sole carbon and nitrogen source for growth. <br/><br/> CocE hydrolyses cocaine to benzoate and ecgonine methyl ester. Also efficiently hydrolyses cocaethylene, a more potent cocaine metabolite that has been observed in patients who concurrently abuse cocaine and alcohol. Is able to prevent cocaine-induced convulsions and lethality in rat. Hence, CocE is of interest as a cocaine antagonist in acute overdose cases. <br/><br/> CocE belongs to the alpha/beta hydrolase fold superfamily, specifically the CocE/Serine esterase Family. The amino acid sequence of cocaine esterase has a region of similarity with the active serine consensus of X-prolyl dipeptidyl aminopeptidases, suggesting that the cocaine esterase is a serine esterase.
