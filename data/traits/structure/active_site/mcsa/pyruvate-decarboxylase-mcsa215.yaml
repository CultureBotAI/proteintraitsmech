identifier: MCSA:215
label: pyruvate decarboxylase
definition: >-
  pyruvate decarboxylase isoenzyme 1 (PDC1) is the major isoform of pyruvate decarboxylase and is implicated in the nonoxidative conversion of pyruvate to acetaldehyde and carbon dioxide during alcoholic fermentation. PDC1 is a thiamine diphosphate-dependent enzyme. It also requires Mg<sup>2+</sup> for activity, however the magnesium is involved in anchoring the cofactor rather than directly involved in catalysis.
