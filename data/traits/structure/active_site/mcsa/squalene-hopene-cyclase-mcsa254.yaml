identifier: MCSA:254
label: "squalene-hopene cyclase"
definition: >-
  <p>Squalene-hopene cyclase (SHC) from <i>Alicyclobacillus acidocaldarius</i> catalyses the cyclisation of linear triterpene squalene. There are two possible products; hop-22(29)-ene or hopan-22-ol (aka diplopterol) which are formed in a roughly 90:10 ratio. SHC is a membrane protein with characteristics similar to those of prostaglandin-H2 synthase, the only other reported protein of this type. Enzymes like SHC are the targets for the development of anticholesteremic and antifungal drugs.</p>
