identifier: MCSA:234
label: GMP synthase (glutamine-hydrolysing)
definition: >-
  <p>The Class I glutamine amidotransferase an example of a single enzymatic reaction being catalysed by two modules, each responsible for a distinct component of the reaction. It catalyses the amination of the nucleotide precursor xanthosine 5'-monophosphate to form GMP in the de novo purine biosynthesis pathway. The amidotransferase domain is found in related enzymes of the purine, pyrimidine, tryptophan, arginine, histidine and folic acid pathways. This domain includes a conserved Cys-His-Glu triad, responsible for the abstraction of the amide nitrogen from glutamine. </p> <p>Despite the apparent catalytic readiness of the GMP synthetase active site, the Class I aminotransferase domain is actually a very poor glutaminase in the absence of the substrates XMP and ATP, which is consistent with the biological role of this enzyme, in which the hydrolysis of glutamine is tightly couple with the formation of GMP. The synthetase domain catalyses the addition of ammonia to an acceptor substrate. They are designed to work in concert to ensure efficient coupling of catalytic functions, it is suggested that a flexible hinge exists to bring the two sites together for concerted ammonia transfer. </p>
