identifier: MCSA:158
label: cerebroside-sulfatase
definition: >-
  <p>Sulphatases are an evolutionarily highly conserved gene family. They hydrolyse sulphate ester bonds in a wide variety of structurally different compounds ranging from complex glucosaminoglucans and glycolipids to sulphated hydroxysteroids and amino acids. Among the sulphatase family, lysosomal arylsulphatase A (ASA) has been most extensively studied.</p> <p>The major physiological substrate of human ASA is a sphingolipid sulphate ester, cerebroside 3-sulphate, a major constituent of the myelin sheet. In vivo, the 3-sulphate group can be hydrolysed by ASA only if cerebroside 3-sulphate is complexed with the small activator protein saposin B solubilising the hydrophobic substrate.</p>
