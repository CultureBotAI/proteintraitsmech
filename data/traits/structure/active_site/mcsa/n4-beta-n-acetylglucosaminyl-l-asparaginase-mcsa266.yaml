identifier: MCSA:266
label: N4-(beta-N-acetylglucosaminyl)-L-asparaginase
definition: >-
  Aspartylglucosylaminidase hydrolyses the bonds connecting N-linked oligosaccharides to free (not peptide bonded) asparagine residues. This is an important lysosomal function. Aspartylglucosylaminidase is synthesised as a precursor protein which is activated by proteolytic cleavage between Asp 182 and Thr 183 to generate the required N-terminal threonine residue. The cleavage generates the alpha and beta subunits of the (alpha)2(beta)2 heterotetramer. The cleavage event is thought to be autocatalytic, and many of the residues involved in the normal glucosylaminidase are believed to be involved in the autocatalytic reaction. The Thr 183 side chain, for example, functions as a nucleophile in both [PMID:14616088].
