identifier: MCSA:358
label: "lysine 2,3-aminomutase"
definition: >-
  Lysine 2,3-aminomutase (LAM) is a member of the Radical SAM superfamily and is involved in the metabolism of lysine. The superfamily is characterised by the presence of a CxxxCxxC motif which binds a [4Fe-4S] cluster, leaving one of the iron ions unsatisfied. It is often found in anaerobic bacteria that utilise (S)-lysine for growth as a source of nitrogen and/or carbon. Biosynthetically, the (S)-beta-lysine produced is incorporated into antibiotics that contain beta-aminoacyl substituents. Whilst most LAM enzymes produce the (S)-beta-lysine, some produce the R form, such as the <i>Escherichia coli</i> gene yjeK which encodes for a variant of the classical LAM. Whilst zinc is required for enzyme activity,the Zn ion is structural, rather than a cofactor and is required for maintaining the oligomeric state of the biological unit.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
