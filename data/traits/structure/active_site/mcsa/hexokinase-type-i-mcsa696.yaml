identifier: MCSA:696
label: hexokinase (type I)
definition: >-
  Hexokinase catalyses the first step of glycolysis, the phosphorylation of glucose by ATP to produce glucose 6-phosphate (G6P). There are four isozymes of hexokinase in vertebrates where in brain tissue and the red blood cell, type I hexokinase regulates glucose metabolism. As well as phosphorylating glucose, it's substrates also include mannose and fructose. Yeast Hexokinase is smaller than their vertebrate counterparts but also have isozymes (3). Yeast hexokinase PII has significant structural identity to the mammalian form of the enzyme and also shares the same catalytic residues, therefore thought to have a similar mechanism.
