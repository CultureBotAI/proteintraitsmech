identifier: MCSA:562
label: "formate dehydrogenase"
definition: >-
  Formate Dehydrogenase H (FDH-H) from <i>Escherichi coli</i> is a 79kDa polypeptide component of the anaerobic formate hydrogen lyase complex. The enzyme catalyses the oxidation of formate (produced from pyruvate during anaerobic growth) to carbon dioxide, in the absence of exogenous electron acceptors, with the concomitant release of two electrons and two protons.
