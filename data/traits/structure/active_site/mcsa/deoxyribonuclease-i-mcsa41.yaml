identifier: MCSA:41
label: deoxyribonuclease I
definition: >-
  DNase I is a vertebrate enzyme that cleaves double stranded DNA to 5'-phosphodinucleotide and 5'-phospho-oligonucletide end-products. DNase I requires calcium and magnesium for full activity. It is a glycoprotein that causes single-stranded nicks on double-stranded DNA. DNase I shares structural homology to the Human Apurinic/Apyrimidinic endonuclease and Exonuclease III. These three enzymes also share similar mechanisms of DNA cleavage. The overall reaction has been created using poly dAMP to show the chemical reaction.
