identifier: MCSA:249
label: "adenosylmethionine--8-amino-7-oxononanoate transaminase"
definition: >-
  Adenosylmethionine--8-amino-7-oxononanoate transaminase (BioA) is a PLP-dependent enzyme that functions in biotin synthesis. It utilises S-adenosyl-L-methionine (SAM) to transaminate the biotin precurson 7-keto-8-aminopelargonic acid and form the next intermediate in the pathway, 7, 8-diaminopelargonic acid. It is the only animotransferase known to utilise SAM as an amino donor. S-adenosylhomocysteine can also act as donor. SAM is a costly metabolite, however, due to the fact that the aminotransferase-catalyzed reactions are most efficient when the pK<sub>a</sub> of the substrate and the enzyme are separated, SAM may be the only substrate available with an appropriate pK<sub>a</sub> [PMID:12379100].
