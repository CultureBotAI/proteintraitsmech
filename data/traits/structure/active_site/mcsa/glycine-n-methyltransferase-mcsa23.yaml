identifier: MCSA:23
label: glycine N-methyltransferase
definition: >-
  <p>Glycine N-methyltransferase (GNMT) isolated from <i>Rattus norvegicus</i> catalyses the transfer of a methyl group from S-adenosyl-methionine (SAM) to glycine to produce N-methylglycine (sarcosine) and S-adenosyl homocysteine (SAH). Unlike most SAM-dependent methyltransferases, GNMT is not strongly inhibited by SAH. This, coupled with no evidence of a physiological role for sarcosine, has led to the suggestion that GNMT plays a key role in modulating the SAM/SAH ratio in tissues where it is an important cofactor, and so controls methyltransferase activity.</p> <p>GNMT exists as a dimer of dimers. Each subunit contains a molecular basket structure and a flexible N-terminal U-loop that can block the entrance to the basket of the partner subunit of the dimer. The U-loop competes with SAM for binding at the active site and so can regulate catalytic activity. GNMT binds first to SAM, which causes a conformational change, and then to glycine.</p>
