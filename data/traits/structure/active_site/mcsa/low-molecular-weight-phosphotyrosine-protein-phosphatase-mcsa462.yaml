identifier: MCSA:462
label: low molecular weight phosphotyrosine protein phosphatase
definition: >-
  Acts on tyrosine phosphorylated proteins, low-MW aryl phosphates and natural and synthetic acyl phosphates. <br/><br/> It is part of the PTPase superfamily. Has high homology to the Saccharomyces cerevisiae protein. Has conserved catalytic components, in particular the CXXXXXRS/T 'P loop'. The mechanism is therefore thought to be the same as that of the rest of the superfamily.
