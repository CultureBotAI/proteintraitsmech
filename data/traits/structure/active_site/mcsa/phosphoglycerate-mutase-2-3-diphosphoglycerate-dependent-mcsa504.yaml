identifier: MCSA:504
label: "phosphoglycerate mutase (2,3-diphosphoglycerate-dependent)"
definition: >-
  Phosphoglycerate mutase (EC:5.4.2.11) from vertebrates, platyhelminths, mollusks, annelids, crustaceans, insects, algae, fungi, yeast and some bacteria (particularly Gram-negative) interconverts 2-phosphoglycerate and 3-phosphoglycerate <i>via</i> a transiently phosphorylated active site histidine. This histidine is phosphorylated by a 2,3-diphosphoglyerate cofactor. The enzyme has no requirement for metal ions and also catalyses, slowly, the reactions of EC 5.4.2.4, bisphosphoglycerate mutase.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
