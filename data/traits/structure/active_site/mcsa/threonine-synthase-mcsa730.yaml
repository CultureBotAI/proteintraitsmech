identifier: MCSA:730
label: "threonine synthase"
definition: >-
  Threonine synthase (TS) from <i>Saccharomyces cerevisiae</i> catalyses the conversion of O-phospho-L-homoserine (OPHS) into threonine and phosphate. This is the final step in threonine biosynthesis. The enzyme requires a pyridoxal 5'-phosphate (PLP) cofactor which binds at the interface of all three of the protein's domains.
