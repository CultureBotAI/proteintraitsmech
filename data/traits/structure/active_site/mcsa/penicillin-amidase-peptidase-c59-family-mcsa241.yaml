identifier: MCSA:241
label: "penicillin amidase (peptidase C59 family)"
definition: >-
  Penicillin V acylase (PVA), isolated from <i>Bacillus sphaericus</i>, catalyses the hydrolysis of penicillin V to 6-aminopenicillanic acid (6-APA) and phenoxyacetic acid. This reaction is commercially important because 6-APA is used in the synthesis of semi-synthetic penicillins. The enzyme undergoes post-translational autocatalytic self-cleavage to produce the mature enzyme. A tripeptide of Met-Leu-Gly is removed to expose the catalytic N-terminal cysteine residue. PVA belongs to the N-terminal nucleophile (Ntn) superfamily.
