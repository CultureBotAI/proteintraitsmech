identifier: MCSA:755
label: lysophospholipase
definition: >-
  <i>Escherichia coli</i> thioesterase I (TAP) is a multifunctional enzyme possessing the activities of thioesterase, esterase, arylesterase, protease and lysophospholipase. This enzyme is also known as protease I and lysophospholipase L1, and is responsible for the degradation of thioester, amide and ester bonds. In particular, TAP catalyses the hydrolytic cleavage/deacylation of fatty acyl-CoA thioesters from fatty acyl-acyl carrier proteins, especially those with long acyl groups. TAP has stereoselectivity for amino acid derivative substrates, and hence is useful for the kinetic resolution of racemic mixtures of industrial chemicals.
