identifier: MCSA:721
label: "2-dehydropantoate 2-reductase"
definition: >-
  Ketopantoate reductase (KPR), isolated from <i>Escherichia coli</i>, catalyses the reduction of ketopantoate by NADPH to form pantoate and NADP+. This is the second reaction in the pathway for the biosynthesis of pantothenate (vitamin B5). KPR is a member of the 6-phosphogluconate dehydrogenase superfamily. The reaction proceeds by a sequential ordered bi:bi kinetic mechanism, with NADPH binding first, followed by a conformational change and the binding of ketopantoate. After the reaction NADP+ dissociates first, followed by pantoate.
