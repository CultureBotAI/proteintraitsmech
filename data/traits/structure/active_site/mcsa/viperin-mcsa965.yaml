identifier: MCSA:965
label: Viperin
definition: >-
  Viperin (Virus Inhibitory Protein, ER-associated, Iterferon-inducible) is a member of the radical S-adenosyl-l-methionine (SAM) superfamily of enzymes, which typically employ a 4Fe-4S cluster to reductively cleave SAM to initiate chemistry. It has been shown that expression of viperin causes an increase in the fluidity of lipid membranes so as to impede the budding of nascent viral particles from the membrane which inhibits the propagation of the infection. It is now known that viperin catalyses the reductive addition of a 5'-deoxyadenosyl radical to UDP-glucose <i>in vitro</i>.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
