identifier: MCSA:292
label: "beta-ketoacyl-[acyl carrier protein] synthase I"
definition: >-
  Beta-ketoacyl-acyl carrier protein synthase (KAS) I catalyses the Claisen condensation between acyl-ACP and malonyl-ACP to produce free acyl carrier protein (ACP), 3-oxoacyl ACP, and carbon dioxide. KAS I fuctions, together with KAS II and KAS III, to synthesise C16 and C18 fatty acids in plant plastids: KAS III is specific for the first step of the elongation and uses a CoA-activated primer substrate, while KAS I extends C4 to C16 in six rounds of elongation using an ACP substrate. KAS II then carries out an additional step to yield C18. In <i>Escherichia coli</i>, KAS I is essential for the construction of the unsaturated fatty acids characterising <i>Escherichia coli</i> membrane lipids.
