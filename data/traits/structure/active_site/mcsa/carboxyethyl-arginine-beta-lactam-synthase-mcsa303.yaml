identifier: MCSA:303
label: "(carboxyethyl)arginine beta-lactam-synthase"
definition: >-
  Asparagine synthetase B catalyses the ATP-dependent conversion of aspartate to asparagine [PMID: 11551215]. This enzyme is a homodimer, with each monomer composed of a glutaminase domain and a synthetase domain. It forms part of the pathway for the biosythesis of the beta-lactamase inhibitor clavulanate in <i>Streptomyces clavuligerus</i>. This entry represents the reaction occuring in the synthetase domain in which the L-N2-(2-carboxyethyl)arginine is first converted into an acyl-AMP by reaction with ATP and loss of diphosphate, and that the beta-lactam ring is then formed by the intramolecular attack of the beta-nitrogen on the activated carboxy group [PMID:9689037].
