identifier: MCSA:973
label: DszC protein
definition: >-
  Dibenzothiophene (DBT) monooxygenase DszC is the key initiating enzyme in the 4S metabolic pathway, particularly found in the metabolism of many bacterial species, including Rhodococcus erythropolis, etc. DszC is responsible for the catalysis of the sequential sulphoxidation reaction of DBT to DBT sulfoxide (DBTO), then DBT sulfone (DBTO<sub>2</sub>). <br> Due to the detrimental effects of sulfur organic compounds found in crude oil, biodesulfurization involving DszC has gained great research interest as an alternative for the currently used hydrodesulfurization technique to produce cleaner fossil fuels at lower cost together with less CO<sub>2</sub> emissions.
