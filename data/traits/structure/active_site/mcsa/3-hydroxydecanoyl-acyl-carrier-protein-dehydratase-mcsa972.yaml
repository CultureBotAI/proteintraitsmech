identifier: MCSA:972
label: "3-hydroxydecanoyl-[acyl-carrier-protein] dehydratase"
definition: >-
  The mammalian fatty acid synthase (mFAS) is a multidomain protein with seven different active sites working together for the <i>de novo</i> synthesis of lipids, specifically palmitic acid. The dehydratase (DH) domain of mFAS catalyses the dehydration of the β-hydroxyacyl (HAC) to an α,β-unsaturated acyl intermediate.
