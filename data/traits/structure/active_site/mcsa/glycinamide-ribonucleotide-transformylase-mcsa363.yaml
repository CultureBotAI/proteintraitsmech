identifier: MCSA:363
label: "glycinamide ribonucleotide transformylase"
definition: >-
  <p>Glycinamide ribonucleotide transformylase (GRT) catalyses the first two steps of purine biosynthesis: the transfer of formyl from 10-formyltetrahydrofolate to the amino group of glycinamide ribonucleotidem, forming glycinamide ribonucleotide and tetrahydrofolate. </p> <p>The enzyme’s role in DNA nucleotide biosynthesis makes it an interesting target for anti-neoplastic agents and for developing novel antifolate drugs to be used in cancer chemotherapy. Due to its biological and pharmacological significance, it has been the subject of intensive studies. </p>
