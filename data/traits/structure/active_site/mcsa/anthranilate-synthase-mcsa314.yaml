identifier: MCSA:314
label: "anthranilate synthase"
definition: >-
  Anthranilate synthase catalyses the initial reaction in tryptophan biosynthesis in microorganisms and plants. This enzyme is one of a family of glutamine amidotransferases, enzymes that utilise the amide of glutamine in the biosynthesis of amino acids, nucleotides, coenzymes, and an amino sugar. Glutamine amidotransferases thus exert major role in utilisation of assimilated nitrogen. Anthranilate synthase is the most thoroughly characterised glutamine amidotransferase. <br/><br/> The enzyme from <i>Serratia marcescens</i> is a heterotetramer of anthranilate synthase (TrpE) and glutamine amidotransferase (TrpG) subunits both of which are required for function.
