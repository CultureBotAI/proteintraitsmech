identifier: MCSA:831
label: "glucan 1,3-beta-glucosidase"
definition: >-
  Fungal exo-beta-(1,3)-glucanases, such as that from the human pathogen Candida albicans, belong to the glycosyl hydrolase family 5 that also includes many bacterial cellulases. The <i>Candida albicans</i> enzyme is involved in the metabolism of cell wall glucan. It catalyses the hydrolytic removal of glucose residues from the non-reducing end of beta-1,3-glucan and (to a lesser extent) beta-1,6-glucan, the two main structural components of the <i>Candida albicans</i> cell wall. The enzyme also has glucosyl transferase activity in which a molecule other than water can accept the removed glucose residue. This may be important in shaping the cell wall during morphogenesis.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
