identifier: MCSA:564
label: ribonuclease V
definition: >-
  Angiogenin is a ribonuclease which induces neovascularisation. It binds specifically to endothelial cells in culture and elicits second-messenger responses. It also binds heparin and can serve as a substratum for endothelial cell adhesion. Its amino acid sequence is 33% identical to that of bovine pancreatic ribonuclease RNase A and it has the same general catalytic properties as RNase A, however, it differs markedly both in magnitude and in specificity with RNase A. Angiogenin was first isolated from culture medium conditioned by adenocarcinoma cells, and has since been shown to be critical for the establishment and/or metastatic spread of a wide variety of human tumours in athymic mice, most likely by supporting the growth of tumour vasculature. Moreover, clinical studies have revealed increased Angiogenin expression to be associated with progression of several human cancers. These findings identify Angiogenin as a promising target for new anticancer drugs.
