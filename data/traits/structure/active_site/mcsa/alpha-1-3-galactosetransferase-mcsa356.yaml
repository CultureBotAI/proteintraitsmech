identifier: MCSA:356
label: "alpha-1,3-galactosetransferase"
definition: >-
  <p>alpha-1,3-galactosetransferase catalyses the transfer of galactose from UDP-alpha-D-galactose into an alpha-1,3 linkage with beta-galactosyl groups in glycoconjugates. It belongs to the family of metal-dependent retaining glycosyltransferase. It is involved in the post translational modification glycosylation of proteins, occurring within the Golgi appararatus.</p> <p>The enzyme is found in many mammals, including most primates and New World monkeys but is not active in Old World primates. In this group, which also includes humans, the enzyme is inactivated by a frame shift mutation. Therefore, the product, alpha-galactose epitope, is the target of a large fraction of natural antibodies. Many mammals used for xenotranlation of organs express the alpha-galactose epitope product, and without inhibition of alpha-1, 3-galactosetransferase in the donor animal, the presence of antibodies specific to this epitope signal in the recipient human for an immune response towards the organ, resulting in rejection.</p>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
