identifier: MCSA:997
label: lanthanide-dependent methanol dehydrogenase
definition: >-
  Lanthanide-dependent methanol dehydrogenase is a widespread enzyme used by methylotrophic bacteria to oxidise methanol for carbon and energy. The enzyme requires early lanthanide (Ln) metals in the 3+ oxidation state for catalytic activity. Across the series (La-Lu), catalytic activity of Ln-MDH decreases; Eu-MDH shows significantly lower catalytic activity than Ce-MDH, and Yb-MDH shows no catalytic activity. This is attributed to the lanthanide contraction effect whereby the ionic radius of Ln ions decreases as atomic number increases. In turn metal-ligand bond lengths decreases and Lewis acidity increases. Despite this, however, we observe a decrease in activity across the series. Nearly all strains of Methylobacterium have at least two types of MDHs, such as MxaFI, a Ca2+-dependent MDH, and XoxF, an Ln-dependent MDH. In contrast to Ca2+-dependent MDH (EC 1.1.2.7), Ln-dependent MDH shows little activity with Ca2+.
