identifier: MCSA:430
label: 8-amino-7-oxononanoate synthase
definition: >-
  8-Amino-7-oxononanoate synthase (AONS) is a pyridoxal 5′-phosphate-dependent enzyme that catalyzes the decarboxylative condensation of L-alanine with pimeloyl-CoA in a stereospecific manner to form 8(S)-amino-7-oxononanoate, coenzyme A, and carbon dioxide in the first committed step of biotin biosynthesis. AONS also performs the carboxylation of acetyl-CoA to give malonyl-CoA, which is the first step in fatty acid biosynthesis. Biotin is an essential enzyme cofactor for carboxylase and transcarboxlase reactions. Fatty acid synthesis is essential for the growth and development of most organisms. Plants, microorganisms, and some fungi bio-synthesize their own biotin, whilst animals require trace amounts in their diet, thus, inhibition of the enzymes involved in the biotin biosynthesis pathway can cause irreparable damage to plants but can be non-toxic to mammals; for this reason, such enzymes can be useful targets for the rational design of inhibitors in the hopes of finding new herbicides and antibiotics.
