identifier: MCSA:768
label: Renilla-luciferin 2-monooxygenase
definition: >-
  Oblein, a protein from the bio-luminescent hydroid, <i>Obleia longissima</i>, is a calcium-regulated photoprotein. The addition of calcium regulates, but is not necessary for bio-luminescence and there is no requirement for an additional substrate (e.g. molecular oxygen). Calcium-regulated photoproteins are found in and are responsible for the light emission of a variety of bio-luminescent marine organisms, mostly coelenterates. Obelin consists of a single polypeptide chain to which the substrate, 2-hydroxy-coelenterazine is tightly, but not covalently bound. Calcium binding results in blue bio-luminescence via oxidative carboxylation of the substrate to the excited state coelenteramide product through several intermediates.
