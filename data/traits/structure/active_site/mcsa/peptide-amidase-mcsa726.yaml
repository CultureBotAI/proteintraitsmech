identifier: MCSA:726
label: "peptide amidase"
definition: >-
  Peptide amidase (PAM) from <i>Strenotrophomonas maltophilia</i> (a gram-negative bacterium) catalyses the hydrolysis of the C-terminal amide bond in peptide amides. It is very regio-selective, and those terminal bonds in amino acid side chains are not hydrolysed. PAM belongs to the amidase signature (AS) family, most of which display hydrolase activity. The natural function of periplasmatic PAM is not known.
