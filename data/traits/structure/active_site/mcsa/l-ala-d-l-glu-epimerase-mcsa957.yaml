identifier: MCSA:957
label: "L-Ala-D/L-Glu epimerase"
definition: >-
  L-Ala-D/L-Glu epimerase, first characterised from the bacteria <i>Escherichia coli</i> and <i>Bacillus subtilis</i>, catalyses the epimerisation of L-Ala-D-Glu to L-Ala-L-Glu and is involved in the recycling of the murein peptide, of which L-Ala-D-Glu is a component. <i>In vitro</i> the enzyme from <i>Escherichia coli</i> has been shown to epimerise several L-Ala-L-X dipeptides with broader specificity than the enzyme from <i>Bacillus subtilis</i>.
