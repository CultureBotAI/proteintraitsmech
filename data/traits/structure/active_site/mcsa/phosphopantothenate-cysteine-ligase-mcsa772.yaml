identifier: MCSA:772
label: phosphopantothenate-cysteine ligase
definition: >-
  Phosphopantothenoylcysteine (PPC) synthase is a CTP-dependent enzyme joining L-cysteine to 4'-phosphopantothenate via a peptide bond. This reaction is part of the coenzyme A biosynthesis pathway. In <i>E. coli</i>, PPC synthase activity is performed by the CoaB domain of the bifunctional Dfp protein, with the next step of decarboxylation performed by the CoaC domain. Both domains have catalytic activity on their own.
