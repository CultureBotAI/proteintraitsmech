identifier: MCSA:758
label: "hydroperoxide dehydratase"
definition: >-
  Coral allene oxide synthase (cAOS) is a fusion protein with 8R-lipoxygenase (LOX) from <i>Plexura homomalia</i>. cAOS is a hemoprotein with sequence homology to catalase, and is involved in the catalysis of the production of an unstable epoxide (an allene oxide) from the fatty acid hydroperoxide generated by the lipoxygenase activity (8R-HPETE). Despite the sequence homology to catalase, cAOS does not exhibit catalase activity as is does not catalyse the dismutation of hydrogen peroxide to water.
