identifier: MCSA:382
label: P-(S)-hydroxymandelonitrile lyase
definition: >-
  Hydroxynitrile lyases (HNLs) constitute a diverse family of enzymes that catalyse the stereospecific cleavage of a wide range of cyanohydrins into aldehydes or ketones and hydrogen cyanide from injured tissues. It is also involved in the catabolism of the cyanogenic glycoside dhurrin. The release of HCN is a common defense of food plants against herbivores. The HNL of Sorghum bicolor (SbHNL) has no similarity to other HNLs except in function. This protein is a member of the Alpha/Beta hydrolase fold superfamily.
