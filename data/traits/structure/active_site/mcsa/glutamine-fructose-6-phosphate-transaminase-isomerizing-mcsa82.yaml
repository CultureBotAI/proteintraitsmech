identifier: MCSA:82
label: "glutamine-fructose-6-phosphate transaminase (isomerizing)"
definition: >-
  Glucosamine-fructose-6-phosphate aminotransferase (isomerizing) also known as Glucosamine-6-phosphate synthase (GlmS), catalyses the first reaction in hexamine biosynthesis. It belongs to an F-type group of glutamine-dependent amidotransferase family of enzymes, which utilise the glutamine amide nitrogen in the biosynthesis of phosphoribosylamine, glutamate or asparagine. <br/><br/> The hexosamine biosynthetic pathway starts from D fructose-6-phosphate (Fru6P)2 which is produced from glucose via the glycolysis pathway. The Fru6P is converted into D -glucosamine-6-phosphate (GlcN6P) by the rate-limiting enzyme glucosamine-6-phosphate synthase (GlcN6P synthase). This is the sole biosynthetic route to GlcN6P known to date. <br/><br/> The reaction is practically irreversible and the reaction takes place over two structural domains, an N-terminal glutaminase domain, which hydrolyses glutamine to glutamate and ammonia (residues 1-240), and a C-terminal isomerase domain (residues 241-608), which catalyses the ketose-aldose isomerisation and utilises the nitrogen for synthesis of GlcN-6P. <br/><br/> The isomerase domain is responsible for two activities of GlmS, the conversion of Fru-6P into GlcN-6P in the presence of glutamine (the synthase activity), and the isomerisation of Fru-6P into Glc-6P (the phosphoglucose isomerase - like activity) in the absence of glutamine. <br/><br/> The product of the reaction with fructose 6-phosphate, glucosamine 6-phosphate, undergoes transformation leading towards formation of uridine diphospho-N-acetylglucosamine - which is a precursor to all amino sugar-containing macromolecules. Much interest has been shown in this enzyme that is believed to have important implications in antibacterial/antifungal therapy and diabetes treatment.
