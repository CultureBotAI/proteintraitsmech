identifier: MCSA:443
label: "[NiFeSe] hydrogenase"
definition: >-
  [NiFeSe] hydrogenases are metalloenzymes that catalyze the reaction H<sub>2</sub> ↔ 2H<sup>+</sup> + 2e-. They are generally heterodimeric, contain three iron–sulfur clusters in their small subunit and a nickel–iron-containing active site in their large subunit that includes a selenocysteine (SeCys) ligand.
