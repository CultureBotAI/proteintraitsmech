identifier: MCSA:639
label: "phosphopantothenoylcysteine decarboxylase"
definition: >-
  The <i>Arabidopsis thaliana</i> flavoprotein AtHAL3a catalyses the oxidative decarboxylation of 4'-phosphopantothenoylcysteine to 4'-phosphopantetheine, a step in coenzyme A biosynthesis. It belongs to the family of homo-oligomeric flavin-containing cysteine decarboxylases (HFCD) family.
