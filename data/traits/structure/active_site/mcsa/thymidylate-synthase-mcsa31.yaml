identifier: MCSA:31
label: thymidylate synthase
definition: >-
  Thymidylate synthase (TS) is an essential enzyme for the de novo synthesis of thymidine 5'-monophosphate (dTMP) via the addition of a methyl group to 2'-deoxyuridine 5'monophosphate (dUMP) from folate. TS is a highly conserved enzyme. dTMP is a nucleotide required for DNA synthesis, and therefore, it is an important drug target, especially for anticancer and antineoplastic drugs. TS also plays a role in regulating tissue folate levels. TS is a bisubstrate enzyme in which the cofactor, CH2 H4 folate, serves as both the one-carbon donor to the substrate dUMP and, subsequently, as the reductant. A one-carbon unit and hydride are transferred from different sites on the cofactor, and large contributions to the catalytic power of TS are achieved through the dynamic alignment and realignment of reactants at these chemical steps.
