identifier: MCSA:753
label: "imidazole glycerol phosphate synthase"
definition: >-
  The HisF subunit of <i>Thermotoga maritima</i> imidazole glycerol phosphate (ImGP) synthase catalyses the reaction of N'-((5'-phosphoribulosyl)formimino)-5-aminoimidazole-4-carboxamide-ribonucleotide (PRFAR) with ammonia to form an imine, loss of 5-aminoimidazole-4-carboxamide ribotide (AICAR), and the subsequent cyclisation to form ImGP. This reaction is the second half of the fifth step in histidine biosynthesis. ImGP and AICAR are used in histidine and purine biosynthesis respectively. Ammonia is delivered to the active site directly from an associated subunit, HisH, which hydrolyses glutamine to glutamate.
