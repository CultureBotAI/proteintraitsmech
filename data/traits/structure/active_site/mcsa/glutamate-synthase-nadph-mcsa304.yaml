identifier: MCSA:304
label: glutamate synthase (NADPH)
definition: >-
  <p>Binds FMN, FAD, 2 [4Fe-4S] clusters and 1 [3Fe-4S] cluster. The protein is composed of two subunits, alpha and beta. The alpha subunit is composed of two domains, one hydrolysing L-glutamine to ammonia and L-glutamate, the other combining the produced ammonia with 2-oxoglutarate to produce a second molecule of L-glutamate (cf. EC 1.4.1.4, glutamate dehydrogenase [NADP+]). The ammonia is channelled through a 31 Å channel in the active protein. This entry represents the alpha subunit reaction.</p> <p>Glutamine hydrolysis is absent (or negligible) in the absence of the other substrates. The enzyme also catalyses the oxidation of NADPH, the ammonia-dependent synthesis of glutamate from 2-oxoglutarate and ammonia and the oxidation of L-glutamate in the presence of iodonitrotetrazolium salts, the latter two of which only occur at high pH. There is still much to be determined with respect to the mechanism of this enzyme [PMID:18421771] as well as how the cross-control of the synthase and glutaminase activities occurs with such precision. This enzyme utilises three iron-sulfur clusters (two Fe4S4 and one Fe3S4) as well as FMN and FAD as cofactors.</p>
