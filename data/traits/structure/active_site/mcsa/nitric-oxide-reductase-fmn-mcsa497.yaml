identifier: MCSA:497
label: "nitric-oxide reductase (FMN)"
definition: >-
  <i>Moorella thermoacetica</i> is a strictly anaerobic bacterium that utilises dissimilatory nitrate reduction for growth. It contains an A-type flavoprotein (FprA) that catalyses the reduction of nitric oxide to nitrogen dioxide, using FMN and a non-heme, non-sulphur diiron site.
