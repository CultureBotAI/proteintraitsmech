identifier: MCSA:969
label: "Phytoene desaturase (lycopene-forming)"
definition: >-
  CRTI-type phytoene desaturase is an enzyme present in bacteria and fungi. The main role of the enzyme is the conversion of <i>cis</i>-phytoene, a 40-carbon molecule with a single <i>cis</i> bond, into all-<i>trans</i> lycopene. This reaction is a part of carotenoid synthesis. The CRTI gene encoding the enzyme is researched because of its importance in fortifying foods with provitamin A, for example Golden Rice, used to combat vitamin A malnutrition.
