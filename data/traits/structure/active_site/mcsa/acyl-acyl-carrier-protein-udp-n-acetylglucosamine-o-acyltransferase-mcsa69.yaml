identifier: MCSA:69
label: "acyl-[acyl-carrier-protein]-UDP-N-acetylglucosamine O-acyltransferase"
definition: >-
  UDP-N-acetylglucosamine (UDP-GlcNAc) acyltransferase catalyzes the first step in the biosynthesis of lipid A, the hydrophobic anchor of lipopolysaccharide in Gram-negative bacteria. This enzyme, the product of the lpxA gene, transfers an R-3-hydroxyacyl chain fromR-3-hydroxyacyl-acyl carrier protein (ACP) to the glucosamine 3-OH of UDP-GlcNAc. The acylation of UDP-GlcNAc is characterized by an unfavorable equilibrium constant (0.01). Therefore, the second reaction of lipid A biosynthesis, in which the LpxA product UDP-3-O-(R-3-hydroxyacyl)-GlcNAc is deacetylated, is the first irreversible step of the pathway. Lipid A is required for growth of <i>E. coli</i> and most other Gram-negative bacteria. Lipid A is also necessary for maintaining the integrity of the outer membrane as a barrier to toxic chemicals. Furthermore, lipid A is a potent activator of innate immunity in animal systems. The study of the enzymes involved in lipid A biosynthesis should therefore prove useful for the development of new anti-infective drugs.
