identifier: MCSA:987
label: "xanthine oxidase"
definition: >-
  Xanthine oxidase (XO) is a homodimer enzyme that gives its name to the xanthine oxidase structural family. XO catalyses the conversion of xanthine (XAN) to uric acid (URC) using a molybdenum cofactor (Moco). This is the last step of purine nucleotide catabolism in humans as well as primates, birds, reptiles and insects. <br> </br> Xanthine oxidase comes from the same gene product as xanthine dehydrogenase (XDH) (EC 1.17.1.4 - M-CSA ID:139). XO and XDH share the same basic mechanism but differ in regeneration of the cofactor. Unlike XDH, XO does not use NAD<sup>+</sup> as an oxidising substrate and instead uses O<sub>2</sub>. <br> The enzyme is of interest due to its relationship with certain diseases. For example, gout and uric acid stone formation are caused by intense activity of xanthine oxidase. Also, xanthinuria is a rare genetic disorder associated with low xanthine oxidase activity.
