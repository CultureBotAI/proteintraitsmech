identifier: MCSA:574
label: "beta-ketoacyl-acyl-carrier-protein synthase II"
definition: >-
  <p>In the biosynthesis of fatty acids, the beta-ketoacyl-acyl carrier protein (ACP) synthases catalyse chain elongation by the addition of two-carbon units derived from malonyl-ACP to an acyl group bound to ACP.</p> <p>In Escherichia coli , the chain elongation step of fatty acid biosynthesis is carried out by at least three different enzymes, KAS I, II and III. Both KAS I and KAS II catalyse the condensation of a wide range of saturated acyl-ACPs. KAS I, however, may be responsible for a condensation reaction that cannot be catalysed by KAS II, namely elongation of C10:1, whereas KAS II is responsible for the elongation of palmoleitic acid C16:1 to cis -vaccenic acid C18:1. In E.coli, cis vaccenic acid synthesis increases upon a temperature downshift, and KAS II is believed to play a key role in this thermal regulation of fatty acid biosynthesis. KAS II is a homodimer and also known as FabF, name of gene coding for it.</p>.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
