identifier: MCSA:209
label: "adenosine kinase"
definition: >-
  <i>Toxoplasma gondii</i> adenosine kinase catalyses the transfer of phosphoryl group from ATP to adenosine to yield AMP and ADP. It belongs to the family of carbohydrate kinases. Like all parasitic protozoans, <i>Toxoplasma gondii</i> cannot synthesise purine bases <i>de novo</i>, so enzymes of the <i>Toxoplasma gondii</i> purine salvage pathway are required for parasite survival. Adenosine Kinase is one of the most important enzymes involved in this pathway. Therefore it represents an attractive target for drugs which attack this highly dangerous parasite.
