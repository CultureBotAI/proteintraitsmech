identifier: MCSA:219
label: transketolase
definition: >-
  <p>Transketolase (EC:2.2.1.1) (TK) catalyses the reversible transfer of a two-carbon ketol unit from xylulose 5-phosphate to an aldose receptor, such as ribose 5-phosphate, to form sedoheptulose 7-phosphate and glyceraldehyde 3- phosphate. This enzyme, together with transaldolase, provides a link between the glycolytic and pentose-phosphate pathways. TK requires thiamine pyrophosphate and a divalent metal cation as a cofactor.</p> <p>Catalytic activity has been noted with a wide variety of divalent metal ions coordinating the diphosphate group of the cofactor [PMID:9924800] and whilst there is still some debate as to the exact nature of the native metal cation (most of the work on the determination of the mechanism has utilised the magnesium cation), Esakova et al. have determined that the enzyme is more stable in the presence of Ca(II), making this the more likely native metal cation [PMID:16125202] .</p>
