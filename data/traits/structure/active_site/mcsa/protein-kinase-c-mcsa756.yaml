identifier: MCSA:756
label: "protein kinase C"
definition: >-
  Atypical protein kinase C iota (aPKC iota) from <i>Homo sapiens</i> catalyses the phosphorylation of a protein by hydrolysing ATP to ADP. aPKC iota can phosphorylate a number of different proteins, including interleukin receptor-associated kinase. aPKCs play critical roles in signalling pathways that control cell growth, differentiation and survival. Therefore they constitute targets for the development of novel therapeutics against cancer, for aPKC iota, specifically colon cancer and chronic myelogenous leukemia.
