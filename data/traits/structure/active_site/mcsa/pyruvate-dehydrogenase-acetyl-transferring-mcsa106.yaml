identifier: MCSA:106
label: "pyruvate dehydrogenase (acetyl-transferring)"
definition: >-
  Pyruvate decarboxylase (E1) catalyzes the first two reactions of the four involved in oxidative decarboxylation of pyruvate by the pyruvate dehydrogenase (PDH) multienzyme complex. It requires thiamin diphosphate to bring about the decarboxylation of pyruvate, which is followed by the reductive acetylation of a lipoyl group covalently bound to the N(6) amino group of a lysine residue in the second catalytic component, a dihydrolipoyl acetyltransferase (E2). <br/><br/> The lipoamide is covalently bound to dihydrolipoamide acetyltransferase (the second catalytic component of the Pyruvate Dehydrogenase Complex) forming (dihydrolipoyllysine-residue acetyltransferase) lipoyllysine [PMID:12795594]. The enzyme consists of two catalytic sites, each providing TDP (thiamine diphosphate) and magnesium as cofactors and each formed on the interface between the aplha and beta subunits [PMID:12651851].
