identifier: MCSA:223
label: "pyruvate carboxylase"
definition: >-
  Pyruvate carboxylase, isolated from <i>Rhizobium etli</i>, is a biotin-dependent enzyme. It catalyses the carboxylation of pyruvate to oxaloacetate using bicarbonate and coupled to the hydrolysis of ATP to ADP and phosphate. This reaction occurs in two major steps: the carboxylation of biotin by ATP and bicarbonate in the biotin carboxylase (BC) domain, and the carboxylation of pyruvate in the carboxyltransferase (CT) domain. The biotin is bound to the biotin carboxyl carrier protein (BCCP) domain, which moves between the BC domain of one subunit and the CT domain of a neighbouring subunit.
