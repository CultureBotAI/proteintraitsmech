identifier: MCSA:235
label: "arginine-tRNA ligase"
definition: >-
  <p>Arginyl-tRNA synthetase (ArgRS), isolated from <i>Saccharomyces cerevisiae</i>, catalyses the esterification of arginine to the 3'-terminal adenosine of a tRNA molecule. The reaction proceeds <i>via</i> an aminoacyl-adenylate intermediate and is ATP dependent. </p> <p>Although the tRNA molecule is not directly involved in the formation of the arginyl-adenylate intermediate, the tRNA must be bound to the enzyme before the reaction can occur. This may be due to conformational changes induced in the enzyme upon binding tRNA, as suggested for other aminoacyl-tRNA synthetases. ArgRS is a class 1a aminoacyl-tRNA synthease based on its structure, or class 1C when considering its requirement of tRNA.</p>
