identifier: MCSA:129
label: taurine dioxygenase
definition: >-
  Taurine:alpha-ketoglutarate dioxygenase (TauD) hydroxylates C1 of taurine (2-aminoethane-1-sulfonic acid) and other organosulfates, leading to elimination of sulfite and thereby initiating the acquisition of sulphur from compounds that contain the element in a form that would otherwise be biologically inert. <i>Escherichia coli</i> expresses TauD only in the absence of sulfate. The reaction requires molecular dioxygen and 2-oxoglutarate as a cosubstrate.
