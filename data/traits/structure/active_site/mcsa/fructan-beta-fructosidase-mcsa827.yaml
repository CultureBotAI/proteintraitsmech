identifier: MCSA:827
label: fructan beta-fructosidase
definition: >-
  Exo-inulase from <i>Aspergillus awamori</i> (a fungus) is a member of the glycoside hydrolase family 32. It catalyses the hydrolysis of terminal, non-reducing 2,1- and 2,6-linked beta-D-fructofuranose residues in fructans. Fructans are used as food storage for some plant species, and exo-inulase is involved in their breakdown into fructose.
