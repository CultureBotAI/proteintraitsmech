identifier: MCSA:816
label: caspase-9
definition: >-
  Caspase-9 from <i>Homo sapiens</i> is a cysteine dependent aspartate specific protease. When activated, it will cleave the Caspase-3 peptide bond between Asp 175 and Ser 176. On existence as a monomer, Caspase-9 is inactive, but on dimerizing which is a result of the release of cytochrome c from the mitochondria cleaving procaspase-9 it becomes active, or it can be activated by making a complex with APAF1. It is involved in the process of apoptosis (programmed cell death) which is a central role in the development and homeostasis of an organism and Caspase-9 is linked to the normal development of the central nervous system.
