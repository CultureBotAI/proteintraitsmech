definitions:
  - kind: MECHANISTIC
    text: >-
      Ubiquitination is mediated by three enzymes, E1 (PDB:3cmm), E2 (PDB:1ayz) and E3 (PDB:1c4z). The first, E1, is essential for ubiquitin activation and transferring the substrate onto the second cascade enzyme, E2, which responsible for mediating repeated ubiquitination at the eventual substrate, which is brought into proximity of E2 by the active site of E3, the enzyme which also regulates substrate specificity. This entry represents the second of the three reactions occurring in this cascade: ubiquitin:[E1 ubiquitin-activating enzyme] ligase (AMP-forming). The E2 ubiquitin-conjugating enzyme acquires the activated ubquitin from the E1 ubiquitin-activating enzyme (EC 6.2.1.45) and binds it via a transthioesterification reaction to itself. In the human enzyme the catalytic centre is located at Cys-87 where ubiquitin is bound via its C-terminal glycine in a thioester linkage.
    source: "M-CSA"
    method: SOURCED
