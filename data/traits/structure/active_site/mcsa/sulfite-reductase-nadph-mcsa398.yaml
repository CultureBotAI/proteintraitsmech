identifier: MCSA:398
label: sulfite reductase (NADPH)
definition: >-
  The E. coli enzyme sulphite reductase, SiR, is a multimeric hemoflavoprotein that catalyses the six-electron reduction of sulphite (SO<sub>3</sub><sup>-</sup>) to sulphide (HS<sup>-</sup>) and of nitrite (NO<sub>2</sub><sup>-</sup>) to ammonia (NH<sub>4</sub><sup>+</sup>) using electrons from NADPH. The complex consists of two types of subunit: the flavoprotein SiRFP and the hemoprotein SiRHP. Recent studies have suggested that the complex contains 8 subunits of SiRFP and 8 of SiRHP, rather than 8 of SiRFP and 4 of SiRHP as previously assumed. Electrons are transferred from NADPH to FAD in SiRFP and then to FMN in SiRFP. Next they are transferred to a 4Fe4S centre in SiRHP, which is linked to a sirohaem via a common cysteine ligand. Electrons are ultimately transferred to the substrate that is coordinated to the sirohaem iron. This entry deals only with the SiRHP component of the complex.
