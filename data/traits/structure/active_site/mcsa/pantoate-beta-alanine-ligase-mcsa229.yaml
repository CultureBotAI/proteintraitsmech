identifier: MCSA:229
label: pantoate-beta-alanine ligase
definition: >-
  Pantothenate synthetase (PS), isolated from Mycobacterium tuberculosis, catalyses the ATP-dependent condensation between pantoate and beta-alanine to form pantothenate. This is the last step in the biosynthesis of pantothenate, which is required for CoA synthesis. The reaction proceeds by a Bi Uni Uni Bi Ping Pong kinetic mechanism. PS is a potential drug target for the treatment of tuberculosis.<br/>
