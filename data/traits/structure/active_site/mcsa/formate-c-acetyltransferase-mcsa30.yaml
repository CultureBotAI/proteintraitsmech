identifier: MCSA:30
label: formate C-acetyltransferase
definition: >-
  Pyruvate formate-lyase catlayses the CoA-dependent, reversible cleavage of pyruvate into acetyal-CoA and formation. This enzyme is required for anaerobic glucose fermentation, utilised by various species of microorganism. The resting state of this enzyme has a glycyl radical, this radical is created by the action of a radical SAM superfamily activating protein (PFL-AE) and is quenched in an oxygenated atmosphere leading to enzyme inactivation.
