definitions:
  - kind: MECHANISTIC
    text: >-
      Carbon monoxide dehydrogenase (CODH), a member of the xanthine oxidase family based on its overall amino acid sequence and three-dimensional structure, catalyses the reversible oxidation of carbon monoxide to carbon dioxide with the loss of two electrons to a variety of electron acceptors can be used by these enzymes including ferredoxin, methyl viologen and benzyl viologen. The CO2 that is produced is assimilated by the Calvin-Benson-Basham cycle, while the electrons are transferred to a quinone via the FAD site, and continue through the electron transfer chain to a dioxygen terminal acceptor. Under aerobic conditions carbon monoxide can be used as sole carbon and energy source by the carboxidotrophic bacteria, a taxonomically diverse group of obligate or facultative chemolithoautotrophic species. The aerobic enzymes (this entry) categorised so far are molybdenum-containing iron-sulphur proteins whilst the anerobic dehydrogenases are mostly nickel-containing iron-sulphur enzymes. CODH is a dimer of heterotrimers, where each heterotrimer consists of a small iron-sulphur subunit, a medium FAD-containing flavoprotein subunit and a large molybdopterin-containign subunit which contains the active site [PMID:10430865, PMID:12475995]. The large subunit is divided into two domains. The N-terminal domain is composed of mainly of a five-and four-stranded mixed beta-sheet and interacts with the small and medium subunits. The C-terminal domain contains a region which interacts with its counterpart in the overall dimer, providing the main dimer contact, and a beta-sheet surrounded by alpha helices. The active site located in the large subunit and contains a novel dinuclear heterometal [CuSMo(=O)OH] cluster.
    source: "M-CSA"
