identifier: MCSA:4
label: "nitrite reductase (copper type)"
definition: >-
  This family of enzymes is found in both denitrifying bacteria and fungi which reside in soil and aquatic ecosystems. <br/><br/> Denitrification, the reduction of dissolved nitrate and nitrite to gaseous NO, N<sub>2</sub>0 and N<sub>2</sub> is an important process in the recycling of nitrogen in the biosphere, and is a key step in the nitrogen cycle resulting in the loss of terrestrial nitrogen to the atmosphere. <br/><br/> It is chiefly carried out by denitrifying bacteria, which contain nitrate and nitrite reductases. The copper-containing family of enzymes is found in both denitrifying bacteria and fungi which reside in soil and aquatic ecosystems and uses copper ions as cofactors rather than the more common haem cd1 <br/><br/> The enzymes in question catalyse the reduction of nitrite (NO<sub>2</sub><sup>-</sup>) to NO + H<sub>2</sub>O. They contain two copper centres, a Type I centre which receives electrons from pseudoazurin (a copper containing protein), and a type II centre which is the site of nitrite reduction.
