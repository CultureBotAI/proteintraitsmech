identifier: MCSA:979
label: "nitrite dismutase"
definition: >-
  This enzyme is one of the nitrophorins originating from the blood feeding insect <i>Rhodnius prolixus</i>. Heme protein nitrophorins can catalyse the conversion of nitrite to nitric oxide (NO) with concomitant nitrate production at neutral pH. NO induces vasodilation and reduces platelet aggregation, increasing the insect's blood supply.
