identifier: MCSA:757
label: "cAMP-dependent protein kinase"
definition: >-
  Cyclic adenosine 3',5'-monophosphate (cAMP) dependent protein kinase, otherwise known as protein kinase A (PKA) from <i> Bos taurus </i> catalyses the transfer of the gamma phosphate from ATP to a protein. This enzyme can phosphorylate a number of different proteins, one of which being the 70-kDa heat-shock protein (Hsp70). This results in the deactivation of Hsp70. Due to their key role in cellular signalling, defects in protein kinases are often associated with cancer and other diseases. This has resulted in PKA being one of the most studied protein kinases. <p> Atypical protein kinase C iota (aPKC iota) has 21% similarity with PKA, sharing the same catalytic residues and thought to proceed through the same reaction mechanism. aPKC iota can phosphorylate a number of different proteins, including interleukin receptor-associated kinase. aPKCs play critical roles in signalling pathways that control cell growth, differentiation and survival. Therefore they constitute targets for the development of novel therapeutics against cancer, for aPKC iota, specifically colon cancer and chronic myelogenous leukemia. <p/>
