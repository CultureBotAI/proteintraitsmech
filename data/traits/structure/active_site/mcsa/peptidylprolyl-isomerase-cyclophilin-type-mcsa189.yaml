identifier: MCSA:189
label: "peptidylprolyl isomerase (cyclophilin-type)"
definition: >-
  The cyclophilin family of enzymes catalyses the cis-trans isomerisation of peptide bonds preceding proline residues. This activity accelerates protein folding in vitro and may underlie some of the many roles of cyclophilins, which include signalling, mitochondrial function, chaperone activity, RNA splicing, stress response, gene expression and regulation of kinase activity. The biological activities of cyclophilin A (CypA) in humans include binding the HIV-1 CA protein in the virions and facilitating viral replication; the basis for this is unclear and isomerase activity is not required for HIV-1 infectivity.<br/>
