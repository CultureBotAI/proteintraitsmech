identifier: MCSA:357
label: "thiaminase (class 1)"
definition: >-
  <p>Thiaminase metabolises thiamine into two constituent parts, the pyrimidine unit, with the addition of a nucleophile, and hemineurine. In fern plants thiaminase is thought to provide protection from insect infestation, while in microorganisms and fish, in which the enzyme has also been found there is, as of yet no defined physiological role.</p> <p>Two classes of thiaminase exist, class 1 (EC:2.5.1.2) and class 2 (EC:3.5.99.2). The two classes share no sequence homology, although their catalytic mechanisms are thought to be very similar, utilising the same active site residues. One difference is their substrate specificity: class 1 thiaminases will catalyse the incorporation of several nucleophiles into the departing pyridimium moiety, while class 2 thiaminases will only utilise water as a nucleophile. The substrate divergence is thought to stem from the lack of homology in protein sequence.</p>
