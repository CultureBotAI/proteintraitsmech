identifier: MCSA:740
label: arylesterase
definition: >-
  This variant of serum paraoxonase (PON1) was obtained by directed evolution. Members of the PON family have been identified, and PON1 is present in <i>Homo sapiens</i>, <i>Oryctolagns cuniculus</i>, <i>Mus musculus</i> and <i>Rattus rattus</i>. It catalyses the hydrolysis and thereby inactivation of various organophosphates, including the nerve agents sarin and soman. Recently, PON1 has been found to play an important role in drug metabolism and in the prevention of atherosclerosis.
