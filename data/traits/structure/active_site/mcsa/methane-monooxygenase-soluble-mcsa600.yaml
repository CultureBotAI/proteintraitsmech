identifier: MCSA:600
label: "methane monooxygenase (soluble)"
definition: >-
  <p>Methyl monooxygenase (MMO) catalyses the conversion of methane to methanol coupled with reduction of oxygen and oxidation of NADH. The soluble type found in <i>Methylosinus trichosporium</i> consists of four components (A to D): protein A (represented by this entry), comprises three chains, in an alpha-2, beta-2, gamma-2 configuration, is a nonheme iron protein containing an unusual mu-hydroxo bridge structure at its active site and interacts with both oxygen and methane.</p> <p>Methanotrophic bacteria play an essential part in cycling carbon in the biosphere by consuming methane produced in anaerobic sediments and by limiting its flux to the atmosphere where it acts as a greenhouse gas. They have been used as a basis for biomimetic catalysts to convert methane in to the easily transportable liquid form of methanol for use as a fuel.</p>
