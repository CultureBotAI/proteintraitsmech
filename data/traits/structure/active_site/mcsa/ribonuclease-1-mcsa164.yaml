identifier: MCSA:164
label: ribonuclease 1
definition: >-
  Ribonuclease-A (RNase-A) from <i>Bos taurus</i> catalyses the depolymerisation of RNA. It does this by breaking down the 3'-5' phosphodiester linkages of single stranded RNA. It is specific for pyrimidine bases at the 3' position of the phosphodiester bond that is cleaved, and a purine at the 5' end. RNase-A also shows a preference for polynucleotide substrates over oligonucleotides.
