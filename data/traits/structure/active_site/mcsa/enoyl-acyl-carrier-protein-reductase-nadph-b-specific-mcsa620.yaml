identifier: MCSA:620
label: "enoyl-[acyl-carrier-protein] reductase (NADPH, B-specific)"
definition: >-
  2-enoyl thioester reductases catalyse the reduction of trans-2-enoyl acyl carrier protein/coenzyme A to acyl carrier protein/coenzyme A. Yeast enzymes, such as Etr1p and Mrf1p, are responsible for the NADPH dependent reaction in mitochondrial fatty acid synthesis, and are indispensible for respiratory function in yeast. They belong to the medium chain dehydrogenases/reductases (MDR) superfamily and are structurally distinguishable from the prokaryotic 2-enoyl thioester which belong to the short chain dehydrogenases/reductases (SDR) superfamily. The <i>Candida tropicalis</i> genes ETR1 and ETR2 both encode enzymatically active 2-enoyl thioester reductases, which can form both homodimers and heterodimers.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
