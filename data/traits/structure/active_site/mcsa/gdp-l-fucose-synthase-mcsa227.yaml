identifier: MCSA:227
label: GDP-L-fucose synthase
definition: >-
  GDP-4-keto-6-deoxy-D-mannose epimerase/reductase (GMER) is a bifunctional enzyme, catalysing the last two steps, epimerisation and reduction, in the biosynthesis of GDP-L-fucose, the substrate of fucosyl transferases. In bacteria, fucose is a component of the capsular polysaccharides and lipopolysaccharides which function as antigenic determinants. In humans, fucose is a Lewis system antigen. It is a ligand to selectin and is involved in leukocytes and tumour cell adhesion to the endothelium. Human deficient in the biosynthesis of GDP fucose suffer from immune disorder adhesion deficiency type II, which can lead to serious symptoms, for instance, immunodeficiency and psychomotor retardation
