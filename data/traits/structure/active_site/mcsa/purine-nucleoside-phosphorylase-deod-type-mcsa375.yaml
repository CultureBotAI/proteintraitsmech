identifier: MCSA:375
label: "Purine nucleoside phosphorylase DeoD-type"
definition: >-
  <p>Purine nucleoside phosphorylase is involved in purine metabolism, metabolising adenosine into adenine and guanosine into guanine, for example. Also works on inosine. These pathways allow the cell to produce nucleotide monophosphates when they cannot synthesise them de novo.</p> <p>The enzyme catalyses the reversible phosphorolytic cleavage of the glycosidic bond of purine nucleosides with the overall reaction: beta-purine nucleoside + orthophosphate <-> purine base + alpha-D-pentose-1-phosphate </p>
