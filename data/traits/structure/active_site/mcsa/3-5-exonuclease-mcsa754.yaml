identifier: MCSA:754
label: "3'-5' exonuclease"
definition: >-
  Escherichia coli replicative DNA polymerase III, a member of family C of DNA polymerases, serves as the main DNA polymerase for E. coli. The polymerase activity is catalysed by the alpha subunit, with the epsilon subunit catalysing the 3'-5' exonuclease proofreading activity. The N-terminal domain of the epsilon subunit is the archetypal member of the DnaQ superfamily of 3'-5' exonucleases.<br/>
