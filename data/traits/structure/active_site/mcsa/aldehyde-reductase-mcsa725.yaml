identifier: MCSA:725
label: "aldehyde reductase"
definition: >-
  <p>This entry represents the aldo-keto reductase family which includes a number of related monomeric NAD(P)H-dependent oxidoreductases, such as aldehyde reductase, aldose reductase, prostaglandin F synthase, xylose reductase, rho crystallin, etc. [PMID:2498333].</p> <p>Aldehyde Reductase, sourced from <i>Homo sapiens</i>, catalyses the NADPH-dependent reduction of a wide range of carbonyl compounds such as sugars, aldehyde metabolites, corticosteroid hormones and xenobiotic aldehydes. Interest in this enzyme stems from it's ability to reduce glucose and galactose, causing diabetic and galactosemic complications affecting the lens, retina, nerves and kidneys.</p>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
