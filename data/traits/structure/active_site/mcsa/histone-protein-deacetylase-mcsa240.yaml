identifier: MCSA:240
label: "histone/protein deacetylase"
definition: >-
  hST2, isolated from <i>Saccharomyces cerevisiae</i>, is a class III histone deacetylase (HDAC), though it also deacetylates other proteins. It belongs to the sirtuin (Sir2) family and catalyses the deacetylation of lysine residues from proteins using NAD+ as a co-substrate. The reaction produces a deacetylated lysine, nicotinamide and 2'-O-acetyl ADP-ribose. hST2 play roles in gene silencing and mediating life span extension. hST2 is of interest because its homologues in humans are potential drug targets for diseases associated with ageing, such as type-II diabetes, and Alzheimer's and Parkinson's diseases.
