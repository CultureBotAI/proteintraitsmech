identifier: MCSA:829
label: endo-alpha-sialidase
definition: >-
  <i>E. coli</i> K1, a major cause of neonatal sepsis and meningitis, surrounds itself in a capsule of poly alpha2,8-sialic acid (polySia), a sugar polymer that also acts as an important modulator of neuronal plasticity in the adult human host; hence, the mammalian immune system does not attack the bacterium. The bacteriophage K1F can hydrolyse this bacterial capsule using an endosialidase, which is a mushroom-shaped homotrimer. This enzyme may find use in the diagnosis or therapy of polySia-bearing tumours, and in the treatment of meningitis caused by polySia-encapsulated bacteria.
