identifier: MCSA:585
label: "zinc D-Ala-D-Ala carboxypeptidase"
definition: >-
  The zinc D-Ala-D-Ala carboxypeptidase belongs to the peptidase M15 family and hydrolyses the C-terminal peptide bond of the peptides of general structure R-DAla-D-Xaa, it is secreted by <i>Streptomyces albus</i> G. The lytic activity of the enzyme and its extracellular location suggest that it might be used by <i>Streptomyces</i> for fighting competitors in its ecological niche, since the enzyme does not hydrolyse the <i>Streptomyces</i> peptidoglycan.
