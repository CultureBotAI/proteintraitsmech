identifier: MCSA:614
label: "3-deoxy-8-phosphooctulonate synthase"
definition: >-
  3-deoxy-d-manno-s-octulosonate-8-phosphate synthase from <i>Escherichia coli</i> (KDO8P) is responsible for the synthesis of the named product from Phosphenol Pyruvate (PEP) and arabinose-5-phosphate (A5P). It thus plays a role in the synthesis of complex lipids for the gram negative bacterial cell wall, so is a possible target for antibiotics. It displays homology with many PEP utilising enzymes, particularly the metal dependent enzyme DAHP synthase which works by a similar mechanism where a single amino acid change of non-metallo KDO8P changes it to metallo-KDO8P.
