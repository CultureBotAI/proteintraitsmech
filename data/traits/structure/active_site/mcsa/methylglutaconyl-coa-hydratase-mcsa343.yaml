identifier: MCSA:343
label: "methylglutaconyl-CoA hydratase"
definition: >-
  AU binding protein/enoyl-coA hydratase (AUH) is from <i>Homo sapiens</i>. It binds to AUUU repeats in RNA and also weakly catalyses the hydration of 2-trans-enoyl-coenzyme A (enoyl-coA). The hydration of enoyl-coA is necessary for the break-down of fatty acids. [PMID:12655555]. This entry represents the 3-hydroxy-3-methylglutaconyl- CoA dehydratase activity. It is a member of the crotonase superfamily.
