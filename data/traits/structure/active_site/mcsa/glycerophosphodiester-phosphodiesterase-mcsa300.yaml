identifier: MCSA:300
label: glycerophosphodiester phosphodiesterase
definition: >-
  Glycerophosphoryl diester phosphodiesterases display broad specificity for glycerophosphodiesters; glycerophosphocholine, glycerophosphoethanolamine, glycerophosphoglycerol, and bis(glycerophosphoglycerol) all of which are are hydrolysed by this enzyme. Although this enzyme will function with Ca(II) ions, it more active with Mg(II) ions.
