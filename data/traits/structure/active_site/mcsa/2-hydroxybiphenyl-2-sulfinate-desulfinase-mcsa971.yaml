identifier: MCSA:971
label: "2'-hydroxybiphenyl-2-sulfinate desulfinase"
definition: >-
  Part of a bacerial 4S pathway that removes covalently bound sulfur from dibenzothiophene (DBT) without breaking carbon-carbon bonds. This enzymatic system employs four different enzymes (DszA, DszB, DszC, and DszD) to work sequentially in order to oxidize the C−S bond and remove the oxidized sulfur as HSO<sub>3</sub><sup>-</sup>. Bacteria use the oxidized sulfur for their anabolic needs such as producing sulfur-containing amino acids. DszB naturally metabolizes 2′-hydroxybiphenyl-2-sulfinate (HBPS) into biphenyl-2-ol without using cofactors. This reaction might be useful in the future for the processing of crude oil in a more environmentally friendly and lucrative way.
