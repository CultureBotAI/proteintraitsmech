identifier: MCSA:660
label: superoxide reductase
definition: >-
  Neelareductase, or superoxide reductase, from the thermophilic Archaea <i>Pyrococcus furiosus</i>, is able to catalyse the conversion of the superoxide radical O*- into the less toxic product hydrogen peroxide. It shares this ability with a number of homologous proteins from anaerobic bacteria and archaea where the removal of the superoxide radical, a product of anaerobic respiration in these organisms, is essential for their survival. It is part of a family of mononuclear non-haem iron containing proteins, which all have the iron coordinated with a pentacoordinate 4 His Cys motif and a variable 6th ligand.
