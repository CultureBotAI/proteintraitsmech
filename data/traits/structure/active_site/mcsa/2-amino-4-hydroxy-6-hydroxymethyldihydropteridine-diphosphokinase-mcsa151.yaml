identifier: MCSA:151
label: "2-amino-4-hydroxy-6-hydroxymethyldihydropteridine diphosphokinase"
definition: >-
  <p>6-Hydroxymethyl-7,8-dihydropterin pyrophosphokinase (HPPK) catalyses the transfer of pyrophosphate from ATP to 6-hydroxymethyl-7,8-dihydropterin(HP), the first reaction in the folate biosynthesis. </p> <p>Folate cofactors are essential for life - they are required for the biosynthesis of purine and pyrimidine bases and certain amino acids. Mammals obtain folate from their diets by an active transport system. In contrast, many microorganisms lack the active transport system and must synthesise folate <i>de novo</i>. Therefore, enzymes in the folate biosynthesis pathway, including HPPK, are target for developing antimicrobial agents.</p>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
