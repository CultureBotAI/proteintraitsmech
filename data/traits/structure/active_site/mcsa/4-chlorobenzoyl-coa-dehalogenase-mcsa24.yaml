identifier: MCSA:24
label: 4-chlorobenzoyl-CoA dehalogenase
definition: >-
  Chlorobenzoate dehalogenase catalyses the hydrolysis of chlorobenzoyl-CoA to hydroxybenzoyl-CoA. This reaction is used by bacteria as part of a three enzyme pathway for the utilisation of chlorinated organic compounds as a carbons source. The chlorobenzoate dehalogenase step is the second in the pathway and is structurally related to the crotonase-like superfamily of enzymes found in the beta-oxidation cycle. Since chlorinated organic compounds are thought to have only been present in the biosphere in significant amounts for the latter half of this century due to industrial production. The potential for bacteria to evolve new degradation pathways within decades of exposure to a new compound offers the possibility of bioremediation of environmentally hazardous and toxic substances.
