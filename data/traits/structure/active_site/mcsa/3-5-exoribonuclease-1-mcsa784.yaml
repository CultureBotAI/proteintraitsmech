identifier: MCSA:784
label: "3'-5' exoribonuclease 1"
definition: >-
  3'-5' exoribonuclease (3'hExo) from <i>Homo sapiens</i> is a DEDDh family member. It contains the invariant DEDD working with H sequence of residues. 3'hExo targets human histone mRNAs and degrades them in a 3' to 5' direction in a sequence specific manner.
