identifier: MCSA:819
label: "chitinase C"
definition: >-
  Chitinase C (ChiC) from <i>Streptomyces griseus</i> HUT6037 catalysis the hydrolysis of N-acetyl-beta-D-glucosaminide 1,4-beta-linkages in chitin yielding alpha-anomeric products. It is a member of family 19 of glycoside hydrolases. Bacteria that break down chitin can use it as a source of carbon.
