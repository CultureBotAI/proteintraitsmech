identifier: MCSA:723
label: subtilisin
definition: >-
  Subtilisin is an extracellular enzyme secreted by <i>Bacillus amyloliquefaciens</i> and belongs to the alpha/beta subtilase family. It is a serine-class endoprotease, hydrolysing peptide bonds with broad specificity and a preference for a large uncharged residue in the P1 binding site.
