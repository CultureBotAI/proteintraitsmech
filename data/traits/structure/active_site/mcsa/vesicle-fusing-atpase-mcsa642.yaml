identifier: MCSA:642
label: "vesicle-fusing ATPase"
definition: >-
  N-ethylmaleimide sensitive factor is responsible for the destabilisation and disassembly of the proteins in the SNARE complex thus has a key role in vesicular trafficking inside the cell. The structure described in this pdb code is of the ATP binding domain which contains the active site necessary for ATP hydrolysis: conformational changes that occur as a result of the hydrolysis lead to the breaking up of the SNARE complex. The ATP binding domain of the protein shares homology with other Rossmann fold containing proteins, particularly with <i>E. coli</i> DNA polymerase III.
