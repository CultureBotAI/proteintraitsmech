identifier: MCSA:533
label: G-protein alpha subunit, group I (GTPase)
definition: >-
  The alpha subunits of heterotrimeric G proteins are members of the Ras superfamily of GTP hydrolases and function in signal transduction. They are activated by replacement of bound GDP by GTP, a process promoted by activated 7-transmembrane receptors, and by subsequent dissociation of the alpha subunit from the beta and gamma subunits. The G-alpha subunit remains active until its GTPase activity converts the bound GTP back to GDP. The alpha subunit of the G protein Gi1 is expressed in many different tissues and is activated by the alpha-2 adrenergic and M-2 muscarinic cholinergic receptors, amongst others. Its downstream effectors include particular isoforms of adenylate cyclase; types V and VI are particularly sensitive to inhibition by G-alpha-i1. The mechanism of enzymatic GTP hydrolysis (and similar phosphoryl transfer reactions) has been subject to significant debate and still remains to be firmly established. More recent models have proposed a dissociative-like process, in which the transition state shows significant cleavage of the gamma-beta phosphoanhydride bond and relatively little bond formation between the gamma phosphate and the nucleophilic water molecule. (See, for example, the reference pubmed ID 15236956 for a recent discussion).
