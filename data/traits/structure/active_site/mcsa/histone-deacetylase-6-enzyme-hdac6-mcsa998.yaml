identifier: MCSA:998
label: "histone deacetylase 6 enzyme (HDAC6)"
definition: >-
  Histone deacetylase 6 enzyme (HDAC6) is a metalloenzyme, part of the HDAC family. The HDAC family includes 18 isoforms which are grouped into four classes (I, II, III, and IV). HDACs in class III use an NAD<sup>+</sup> cofactor, whilst the others are metalloenzymes which use a Zn(II) metal ion centre. HDAC6 is in class II and is involved in the maintenance of a cell's shape and its polarity during cell division and migration, intracellular transport and angiogenesis. <br> </br> HDACs catalyse the removal of the acyl group from a lysine amino acid of the substrate of nuclear and cytosol proteins. In general, protein acylation and deacylation processes are a key part of cell cycle regulation. <br> </br> HDAC6 has a heterodimeric structure with two different catalytic domains, CD1 and CD2. The domains present a similar structure but show differing substrate specificities and their roles remain unclear. HDAC6 is of interest for its role in the fight against cancer and various other pathologies.
