identifier: MCSA:469
label: protein-tyrosine-phosphatase non-receptor type 1
definition: >-
  Protein tyrosine phosphatases catalyse the removal of phosphoryl groups from tyrosine residues in proteins. They play important roles in the control of biological processes such as cell cycles and signal transduction pathways. The human tyrosine-protein phosphatase PTPN1 acts as a regulator of endoplasmic reticulum unfolded protein response. Mediates dephosphorylation of EIF2AK3/PERK; inactivating the protein kinase activity of EIF2AK3/PERK. It may also play an important role in CKII- and p60c-src-induced signal transduction cascades, regulate the EFNA5-EPHA3 signaling pathway which modulates cell reorganisation and cell-cell repulsion, and may also regulate the hepatocyte growth factor receptor signaling pathway through dephosphorylation of MET.
