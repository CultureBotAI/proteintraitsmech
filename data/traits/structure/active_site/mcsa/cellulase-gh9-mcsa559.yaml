identifier: MCSA:559
label: "cellulase (GH9)"
definition: >-
  Cellulase E4 from <i>Thermomonospora</i> is both exo- and endo- cellulases, catalysing the hydrolysis of cellulose. It contains both a family 9 catalytic domain, exhibiting an (alpha/apha)<sub>6</sub> barrel fold and a family III cellulose binding domain, having an antiparallel beta-sandwich fold.
