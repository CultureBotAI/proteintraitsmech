identifier: MCSA:714
label: "ubiquinol oxidase (H+-transporting)"
definition: >-
  The cytochrome bo3 ubiquinol oxidase from <i>E. coli</i> is a terminal enzyme in the respiratory chain, oxidising the membrane-soluble ubiquinol-8 and reducing molecular dioxygen, and pumping four protons across the membrane to generate a proton gradient that is used to drive ATP synthesis. Ubiquinol oxidase is homologous to cytochrome c oxidase; both have four subunits, the same redox mechanism, the same electron transfer pathway and conserved proton pumping channels.
