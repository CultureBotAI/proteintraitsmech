identifier: MCSA:251
label: "methylated-DNA--[protein]-cysteine S-methyltransferase"
definition: >-
  Human O6-alkylguanine-DNA alkyltransferase (AGT) acts to repair cytotoxic lesions in DNA by transfering the O6-alkyl groups to an active site cysteine. This mechanism for preserving genomic integrity limits the effectiveness of certain alkylating anticancer reagents, and therefore AGT is an active anticancer drug target. This enzyme catalyses only one turnover and therefore is not strictly catalytic.
