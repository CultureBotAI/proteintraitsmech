identifier: MCSA:299
label: pantetheine-phosphate adenylyltransferase
definition: >-
  <p>Phosphopantetheine adenylyltransferase (PPAT), isolated from Escherichia coli, catalyses the magnesium-dependent adenylyl transfer from ATP to 4'-phosphopantetheine (Ppant or PhP) to form dephospho-CoA (dPCoA). This reaction is the penultimate step in the synthesis of CoA. PPAT belongs to the nucleotidyltransferase alpha/beta phosphodiesterase superfamily, whose members catalyse the transfer of a nucleotide monophosphate to a substrate by stabilising the transition state of the reaction.</p> <p>PPAT is a hexamer consisting of two trimers. While each subunit possesses an active site, it appears that only the subunits of one trimer will catalyse the reaction at a given time. The reaction proceeds via a random bi-bi mechanism in that the order of the binding of ATP and Ppant is not fixed, nor is the release of dPCoA and pyrophosphate. CoA can regulate the activity of PPAT by binding to the PPAT.PPi complex, thus preventing the binding of a new Ppant substrate molecule.</p>
