identifier: MCSA:120
label: "methylenetetrahydrofolate reductase [NAD(P)H]"
definition: >-
  <p><i>E. coli</i> methylenetetrahydrofolate reductase (MTHFR) catalyses the NADH-dependent reduction of 5,10-methylenetetrahydrofolate (CH<sub>2</sub>-H4folate) to 5 methyltetrahydrofolate (CH<sub>3</sub>-H4folate) using the cofactor flavin adenine dinucleotide (FAD) as an intermediate hydride acceptor and donor. MTHFR is the only route of CH<sub>3</sub>-H4folate which is used by methionine synthase to convert homocysteine to methionine.</p> <p><i>E. coli</i> MTHFR is a homotetramer that dissociates into dimers on dilution. Its catalytic domain is a (beta-alpha)8 barrel. Bacterial MTHFR enzymes are simpler than mammalian MTHFR in that the catatlytic domain constitutes the entire sequence, with no regulatory sequence present.</p>
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
