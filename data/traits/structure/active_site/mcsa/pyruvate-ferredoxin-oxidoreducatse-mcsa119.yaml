identifier: MCSA:119
label: pyruvate:ferredoxin oxidoreducatse
definition: >-
  Pyruvate:ferrodoxin/flavodoxin reductases (PFORs) catalyse the oxidative decarboxylation of pyruvate to acetyl-CoA in anaerobic organisms. PFORs can occur in both obligately and facultatively anaerobic bacteria and also some eukaryotic microorganisms. PFORs are single-chain enzymes containing a thiamin pyrophosphate cofactor for the cleavage of carbon-carbon bonds next to a carbonyl group, and iron-sulphur clusters for electron transfer. Ferredoxin I and ferredoxin II, which are single 4Fe-4S cluster ferredoxins are the most effective electron carriers for PFORs in <i>Desulfovibrio africanus</i>.
definition_source: M-CSA (Thornton lab, EBI; fetched via REST API)
