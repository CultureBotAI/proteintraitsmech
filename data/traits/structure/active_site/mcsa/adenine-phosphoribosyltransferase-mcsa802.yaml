identifier: MCSA:802
label: "adenine phosphoribosyltransferase"
definition: >-
  Adenine phosphoribosyltransferase (APRTase) catalyses the reversible Mg2+ dependent reaction of adenine with 5-phospho-alpha-D-ribosyl-1-pyrophosphate (PRPP) to produce AMP and pyrophosphate. This reaction is important in adenine salvage and recycling, and the enzyme is present in species ranging from bacteria to mammals. In humans, APRTase has the sole metabolic function of recycling adenine formed in the polyamine pathway, and the effects of APRTase deficiency are relatively mild. Some protozoan parasite, including <i>Giardia lamblia</i>, are deficient in de novo purine synthesis and so purine uptake from the host and the APRTase reaction are especially important in these organisms.
