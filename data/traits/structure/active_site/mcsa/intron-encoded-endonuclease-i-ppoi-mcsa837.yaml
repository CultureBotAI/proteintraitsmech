identifier: MCSA:837
label: "intron-encoded endonuclease I-PpoI"
definition: >-
  I-PpoI is a homing endonuclease of the His-Cys family. It is encoded by the nuclear 26S rRNA gene of <i>Physarum polycephalum</i> and cleaves a 16bp homing site to generate four-base 3' overhangs. It requires divalent metal cations, but a wide range are accommodated.
