identifier: MCSA:397
label: alpha-amylase
definition: >-
  <p>Alpha-amylase catalyses the hydrolysis of internal alpha-glucosidic linkages in starch and other related oligo- and polysaccharides. These enzymes are widespread among the higher plants, animals and micro-organisms. </p> <p>Cereal alpha-amylases play an important role in the production of beer and other alcoholic beverages. </p> <p>In humans, alpha-amylase is present in salivary and pancreatic secretions. Human pancreatic alpha-amylase (HPA) is a 496 amino acid single polypeptide chain which binds to essential calcium and chloride ions, and is responsible for the hydrolysis of the partially digested starch (smaller oligosaccharides) reaching the gut, into glucose. Inhibition of HPA provides an effective target for the treatment of diabetes.</p>
