identifier: MCSA:653
label: "diphosphate---fructose-6-phosphate 1-phosphotransferase"
definition: >-
  The Lyme disease causing Spirochete <i>Borrelia burgdorferi</i> uses pyrophosphate (PPi) rather than ATP as the source of phosphate for the phosphorylation of Fructose-6-phosphate to Fructose-1,6-bisphosphate in glycolysis. This strategy, common to many anaerobic bacteria, allows ATP to be conserved for other processes such as maintaining a proton gradient. The enzyme catalysing this process shares around 23% sequence identity to the <i>E. coli</i> PFK and many structural features differ between the two enzymes. However, the active sites do share a similar structure with conservation of key residues, so the mechanism of the reaction is almost certainly the same for each.
