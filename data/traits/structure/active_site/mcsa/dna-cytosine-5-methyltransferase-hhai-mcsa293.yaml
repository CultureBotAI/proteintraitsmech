identifier: MCSA:293
label: DNA (cytosine-5-)-methyltransferase (HhaI)
definition: >-
  Methyl transferase (MTase) M. Hhal is an m5C-MTase that forms part of a type II restriction-modification system from <i>Haemophilus haemolyticus</i>. The enzyme recognises the specific tetranucleotide sequence, 5-GCGC-3. DNA methylation is found in diverse organisms ranging from bacteria to mammals and plants. Cytosine-5-methyltransferases (m5CMTases) are involved in a variety of biological processes in prokaryotes and eukaryotes by catalysing the transfer of a methyl group from S-adenosyl- L-methionine (AdoMet) to the C5 position of cytosine. MTases exist as a component of restriction and modification systems in bacteria.
