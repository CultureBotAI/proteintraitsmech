identifier: MCSA:313
label: DNA-3-methyladenine glycosylase II
definition: >-
  A variety of environmental toxins can react with DNA and chemically alkylate the bases. This blocks the replicative polymerases and interferes with binding of regulatory proteins to DNA resulting in widespread cellular responses including activation of cell cycle checkpoints and programmed cell death. There are a number of repair strategies - direct reversal, nucleotide excision repair and base excision repair. Most single base modifications are corrected using base excision repair. Firstly a lesion specific DNA glycosylase removes the damaged base by hydrolysis of the deoxyribose glycosidic bond of alkylated DNA. The abasic site is then excised and filled by DNA polymerase. AlkA lacks an obvious residue that could fulfill the role of a general acid to protonate the leaving group and later activate a water molecule. It is thought that AlkA's positively charged, alkylated substrates might not require this type of assistance. The lack of a general acid in AlkA's active site provides a means of catalytic selectivity. Positively charged bases, which do not require protonation and have a weakened glycosylic bond, can be removed effectively, and in turn it may function as a general base to activate a nearby water molecule. Unmodified bases require protonation by a general acid prior to hydrolysis and therefore are poor substrates. [PMID:10675345]
