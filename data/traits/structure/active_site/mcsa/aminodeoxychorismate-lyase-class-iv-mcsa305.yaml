identifier: MCSA:305
label: "aminodeoxychorismate lyase (class IV)"
definition: >-
  4-Amino-4-Deoxychorismate Lyase (ADCL), sourced from <i>Escherichia coli</i> is a member of the fold-type IV of PLP dependent enzymes. It converts 4-amino-4-deoxychorismate (ADC) to p-aminobenzoate and pyruvate during the process of tetrahydrofolate biosynthesis. P-aminobenzoate is a precursor of folic acid. ADCL is a homodimer and shows the re-face specific hydrogen transfer typical of a member of the fold-type IV family.
