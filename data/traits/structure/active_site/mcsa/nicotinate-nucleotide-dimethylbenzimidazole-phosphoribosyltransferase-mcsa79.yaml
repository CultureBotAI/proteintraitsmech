identifier: MCSA:79
label: "nicotinate-nucleotide-dimethylbenzimidazole phosphoribosyltransferase"
definition: >-
  Nicotinate mononucleotide:5,6- dimethylbenzimidazole (DMB) phosphoribosyltransferase (CobT) is crucial in the synthesis of alpha-ribose-5'-phosphate, a precursor to the lower ligand of colbamin. The biosynthesis of colbamin requires more than 25 committed enzymes, and the biosynthetic pathway has received much interest because of its complexity. Colbamin synthesis is also of interest in evolutionary biology because of its utilisation by early forms of bacteria and Archaea. <br/><br/> The enzyme has also been shown to act on benzimidazole, and the clostridial enzyme acts on adenine to form 7-alpha-D-ribosyladenine 5'-phosphate.
