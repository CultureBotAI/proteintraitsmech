identifier: MCSA:191
label: "protein disulfide-isomerase (eukaryotic)"
definition: >-
  Protein disulfide isomerase (PDI) from humans is a 57 kDa protein present in the endoplasmic reticulum of eukaryotes. It is involved in disulfide bond formation, breakage, and rearrangement during the folding of proteins translocated into the endoplasmic reticulum. PDI contains two active sites with the amino acid sequence -Cys-Gly-His-Cys-, each of which is cycled between the dithiol and the disulfide forms as in the related redox protein thioredoxin. In addition, PDI is the beta subunit of prolyl-4-hydroxylase, which has an alpha2beta2 quaternary structure, and it is one subunit of the heterodimeric triglyceride transfer protein complex.
