identifier: MCSA:508
label: "H+-transporting two-sector ATPase (V-type)"
definition: >-
  <p>The homing endonuclease from <i>S. cerevisiae</i>, PI-SceI is able to catalyse the specific cleavage of double stranded DNA in order to allow the incorporation of a mobile intron into the allele. This enables non-mendelian propagation of certain introns without harming the target allele, as the introns are spliced out before functional mRNA is produced. It belongs to a large family of endonucleases all with the sequence LADLIDADG, and contains two active sites to allow simultaneous cleavage of both strands of DNA. The homing endonucleases in general are highly specific, and PI-SceI thus recognises a 31 base pair DNA sequence as its substrate, the longest specific sequence for a DNA binding protein yet discovered. This entry covers the active site which cleaves the top strand, running 5' to 3'.</p>
