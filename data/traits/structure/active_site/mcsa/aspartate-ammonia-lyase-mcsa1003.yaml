identifier: MCSA:1003
label: "Aspartate Ammonia Lyase"
definition: >-
  Aspartate Ammonia Lyase is one of the three ammonia lyases that belong to aspartate/fumarase superfamily. It catalyses the reversible reaction of L-aspartate to make ammonia and fumarate and is important in microbial nitrogen metabolism. It is also an industrial precursor for the synthesis of food additives and artificial sweeteners.
