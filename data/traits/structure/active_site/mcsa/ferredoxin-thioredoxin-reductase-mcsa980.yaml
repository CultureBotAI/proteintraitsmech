identifier: MCSA:980
label: ferredoxin:thioredoxin reductase
definition: >-
  Ferredoxin:thioredoxin reductase (FTR) transfers the light-generated redox signal received by the chloroplast [Fe<sub>2</sub>S<sub>2</sub>]<sup>2+,+</sup> ferredoxin (Fdx) to thioredoxins (Trxs), as part of a redox regulatory system controlling the activity of a wide range of oxygenic photosynthesis enzymes in response to light. The active site consists of a [Fe<sub>4</sub>S<sub>4</sub>] cluster and an an adjacent redox-active disulphide. FTR converts two light-generated one-electron signals to one two-electron thiol signal which is then transmitted via dithiol/disulphide interchange reactions to specific enzymes which are critical to the regulation of the Calvin cycle. <br> </br> Phylogenetic analyses of genomic sequences revealed that the catalytic subunit of FTR originated in microaerophilic bacteria where it may have functioned in regulating CO<sub>2</sub> fixation. Also, FTR may have been acquired by later-evolving species via horizontal gene transfer. FTR-like enzymes, for example FDR, with structural and functional diversity have evolved to meet ecological needs.
