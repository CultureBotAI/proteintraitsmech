identifier: MCSA:576
label: "D-lactate dehydrogenase"
definition: >-
  D -Lactate dehydrogenase from Lactobacillus bulgaricus, a homodimer with 332 amino acid, acts at the last step of the glycolytic pathway under anaerobic conditions, allowing re-oxidation of NAD, which is necessary for glycolysis. The enzyme catalyses the NAD-dependent conversion of pyruvate into the D -isomer of lactic acid. The reaction is reversible: pyruvate reduction (the forward reaction) shows a maximum rate at pH 7.5 and D-lactate oxidation (the inverse reaction) at pH 8.0. The reaction leading to the other enantiomer, L-lactic acid, is catalysed by another enzyme, L-lactate dehydrogenase (L-LDH). While L-LDH has a wide occurrence in nature, D-LDH is found only in invertebrates, lower fungi and prokaryotic organisms. Lactic bacteria possess either one or both enzymes. In <i>Lactobacillus bulgaricus</i>, commonly used in the dairy industry for the production of yoghurt, more than 90% of the pyruvate is converted into D-lactate.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
