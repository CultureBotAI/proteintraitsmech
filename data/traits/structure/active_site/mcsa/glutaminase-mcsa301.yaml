identifier: MCSA:301
label: glutaminase
definition: >-
  Glutaminases (EC:3.5.1.2) deaminate glutamine to glutamate. In <i>Bacillus subtilis</i>, glutaminase is encoded by glnA, which is part of an operon, glnA-glnT (formerly ybgJ-ybgH), where glnT encodes a glutamine transporter. The glnA-glnT operon is regulated by the 2-component system GlnK-GlnL in response to glutamine [PMID:15995196].
