identifier: MCSA:307
label: "E1 ubiquitin-activating enzyme"
definition: >-
  <p>Ubiquitination is mediated by three enzymes, E1 (PDB:3cmm), E2 (PDB:1ayz) and E3 (PDB:1c4z). The first, E1, is essential for ubiquitin activation and transferring the substrate onto the second cascade enzyme, E2, which responsible for mediating repeated ubiquitination at the eventual substrate, which is brought into proximity of E2 by the active site of E3, the enzyme which also regulates substrate specificity. This cascade regulates the ubiquitination of specific proteins, generating post-translational modifications that activate a number of possible cellular responses, depending upon the site and type of ubiquitin marker.</p> <p> This entry represents the first of the three reactions occurring in this cascade: ubiquitin:[E1 ubiquitin-activating enzyme] ligase (AMP-forming). E1 catalyses the ATP-dependent activation of ubiquitin through the formation of a thioester bond between the C-terminal glycine of ubiquitin and the sulfhydryl side group of a cysteine residue in the E1 protein. Several E1 type enzymes have been identified to catalyse substrate-specific transfer reactions for ubiquitin-like proteins, although a number of these enzymes will also catalyse the transfer of ubiquitin and other ubiquitin-like proteins.</p>
