identifier: MCSA:765
label: "3-dehydro-L-gulonate 2-dehydrogenase"
definition: >-
  2,3-Diketo-L-gulonate reductase (yiaK) is from <i>Escherichia coli</i>. It is the first gene in a nine-gene sequence operon, which is believed to be required for the utilisation of rare sugars for growth. YiaK catalyses the reduction of 2,3-diketo-L-gulonate (DKG) in the presence of NADH to give 3-keto-L-gulonate.
