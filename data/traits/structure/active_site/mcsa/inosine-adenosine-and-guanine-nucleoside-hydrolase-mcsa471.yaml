identifier: MCSA:471
label: "inosine, adenosine, and guanine nucleoside hydrolase"
definition: >-
  Nucleoside hydrolases (NH's) are members of the purine salvage pathway that tend to scavenge purines from their environment. <br/><br/> The NH of of parasite, Trypanosoma vivax, catalyses the cleavage (hydrolysis) of the N-glycosidic bond between the anomeric carbon of ribose and the purine base in (specifically) inosine, adenosine, and guanine (an IAG-NH). This specificity is via an aromatic face-to-face stacking intercation, rather than general acid catalysis. <br/><br/> IAG-NH's represent potential targets for antiobiotic development and cancer therapy.
