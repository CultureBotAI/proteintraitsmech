identifier: MCSA:646
label: "phosphoribosylaminoimidazolecarboxamide formyltransferase"
definition: >-
  The enzyme AITC is bifunctional being involved in the production of IMP, the final product of the <i>de novo</i> purine synthesis pathway.. The catalytic centre described here catalyses the first step in AIRC activity, the formylation of AICAR to form 5-formyl AICAR which can then be cyclised by the second catalytic centre. The enzyme shows a high degree of sequence conservation among organisms from E.coli to man, but does not show homology to other formyl transferases, suggesting that the bifunctionality has evolved from one gene rather than two.
