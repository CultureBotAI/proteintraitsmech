identifier: MCSA:194
label: phosphomannomutase/ phosphoglucomutase
definition: >-
  Phosphomannomutase or phosphoglucomutase (PMM/PGM) from <i>Pseudomonas aeruginosa</i> can catalyse the same reaction in two different substrates. It catalyses the transfer of a phosphoryl group from the 6 position to the 1 position in either mannose 6-P or glucose 6-P. PMM/PGM activity is required for the biosynthesis of lipopolysaccharides in <i>Pseudomonas aeruginosa</i>.
