identifier: MCSA:246
label: receptor protein-tyrosine kinase
definition: >-
  <p>Phosphorylated insulin receptor tyrosine kinase from <i>Homo sapiens</i> catalyses the phosphorylation of Tyr on intracellular proteins that are related to the STATK pathway. The phosphoryl group is transferred from ATP to form ADP. On carrying out this function, the enzyme activates the signalling cascade inside the cell. Insulin receptor tyrosine kinase is thought to have a restricted range of protein substrates, with a consensus YMXM phosphorylation motif having been defined [PMID:17085043].</p> <p>There are two alternative mechanisms suggested for this enzyme, and there is still some debate as to whether this enzyme works via the associative (S<sub>N</sub>2-type) mechanism or the dissociative (S<sub>N</sub>1-type) mechanism. However, experimental and QM/MM studies, as well as crystallographic evidence, seems to support the dissociative mechanism [PMID:17085043, PMID:16023488, PMID:19334696 and Pichierri et al.].</p>
