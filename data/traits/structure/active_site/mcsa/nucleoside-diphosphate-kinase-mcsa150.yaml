identifier: MCSA:150
label: nucleoside-diphosphate kinase
definition: >-
  <p>Nucleoside diphosphate kinase (NDP kinase) is responsible for phosphorylating non-adenine nucleoside diphosphates. The phosphate donor is usually ATP, but the diphosphate nucleotide substrate is non-specific for either base or ribose / deoxyribose.</p> <p>The mechanism of nucleotide binding is different from that of most other phoshokinases and nucleotide binding proteins which use a parallel beta-sheet, NDP using an anti-parallel beta-sheet. NDPK from <i>Dictyostelium discoideum</i> is used as a model because it is particularly easy to crystallise.</p>
