identifier: MCSA:101
label: "bis(5'-adenosyl)-triphosphatase"
definition: >-
  The FHIT protein is a diadenosine P1, P3-triphosphate (ApppA) hydrolase that cleaves diadenosine P1, P3-triphosphate to yield AMP and ADP which is found in animals and fungi. In humans the FHIT gene is found at 3p14.2 and is thought to act as a tumour suppressor gene involved in many human cancers. It belongs to one branch of the Histidine triad (HIT) superfamily of nucleotide-binding proteins which have a conserved His-X-His-X-His-X-X (where X is a hydrophobic amino acid) motif. This was originally thought to be a zinc-ion binding site but is now believed to be the alpha-phosphate binding site [PMID:9323207]. The other branch of this superfamily consists of the HINT (histidine triad nucleotide-binding) proteins, the proposed ancestor of FHIT, galactose-1-phosphate uridylyltransferase, and other nucleotide binding proteins [PMID:9323207]. <br/><br/> Dinocleoside polyphoshate hydrolases require millimolar Mn(II) Mg(II) or Ca(II) for optimum activity and are inhibited by Ni(II) Zn(II) and Cd(II).
