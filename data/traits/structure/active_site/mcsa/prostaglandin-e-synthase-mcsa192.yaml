identifier: MCSA:192
label: prostaglandin-E synthase
definition: >-
  Microsomal Prostaglandin E Synthase Type 2 (mPGES-2), sourced from Macaca fascicularis catalyses the isomerization reaction of PGH2 (Prostaglandin H2) to PGE2 (Prostaglandin E2). PGH2 is formed from arachidonic acid. It is an unstable intermediate and so is converted into PGE2. PGE2 exerts control over various biological activities such as relaxation/ contraction of smooth muscle, excretion of Na+, body temperature and the physiological sleep/ wake cycle. The enzyme is active in the absence of an R-SH reagent, but the catalytic activity is increased by the presence of an R-SH reagent, suggesting that a water molecule and the SH group of an R-SH bind the same site and participate in the same catalytic role. An R-SH or water molecule bound between O-eta of Tyr107 and C9 of PGH2 is polarised by forming a H-bond with Tyr107, and consequently, the SH group of R-SH or water is deprotonated at neutral pH.
