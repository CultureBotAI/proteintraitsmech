identifier: MCSA:195
label: "glutamate-1-semialdehyde 2,1-aminomutase"
definition: >-
  <p>Tetrapyrroles are large macrocyclic compounds derived from a common biosynthetic pathway. The end-product, uroporphyrinogen III, is used to synthesise a number of important molecules, including vitamin B12, haem, sirohaem, chlorophyll, coenzyme F430 and phytochromobilin.</p> <p>This entry represents glutamate-1-semialdehyde (GSA) aminotransferase (EC:5.4.3.8), which catalyses a transamination reaction to produce 5-aminoaevulinic acid during the first stage of tetrapyrrole biosynthesis by the C5 pathway. It is a class III aminotransferase.</p>
