identifier: MCSA:419
label: 3-amino-5-hydroxybenzoate synthase
definition: >-
  Catalyzes the dehydration and aromatization of 5-amino- 5-deoxy-3-dehydroshikimate (aminoDHS) to 3-amino-5-hydroxybenzoate (AHBA), a compound that then serves as the starter unit for the assembly of a polyketide during the biosynthesis of rifamycin B and other ansamycin antibiotics. Cannot utilize 5-deoxy-5-amino-3- dehydroquinate (aminoDHQ), 5-deoxy-5-aminoshikimate (aminoSA), quinate, 3-dehydroquinate, or 3-dehydroshikimate (DHS) as substrate. <br/><br/> In a complex with RifL, RifK may have a second function in the AHBA pathway, acting as a transaminase introducing the nitrogen into the first pathway intermediate, UDP-3-keto-D-glucose, to give UDP-kanosamine. Appears to use glutamine as the nitrogen donor; NH<sub>4</sub><sup>+</sup> or asparagine are 30% less effective as nitrogen donors and neither glutamate nor aspartate show activity.
