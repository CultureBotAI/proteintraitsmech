identifier: MCSA:673
label: cellobiose dehydrogenase (acceptor)
definition: >-
  Fungal cellobiose dehydrogenase (CDH) participates in the rotting of wood by catalysing a key step in the breakdown of cellulose (and lignin), namely the oxidation of cellobiose (a reaction product in cellulose hydrolysis) to cellobiono-1,5-lactone. This is used to provide a carbon source for the micro-organism. CDH is the only known extracellular flavocytochrome, a small and heterogeneous group of redox-active proteins that carry both haem and flavin prosthetic groups. Applications of CDH include degradation of various environmental pollutants. It shows sequence and structural homology with glucose and cholesterol oxidase, two other known enzymes catalysing similar processes, so the mechanism is likely to be the same between the three. FAD is used as a cofactor for the reaction, being reduced by the substrate and subsequently reoxidised by a cytochromal haem group contained in the non-active site containing domain (PDB:1d7b)
