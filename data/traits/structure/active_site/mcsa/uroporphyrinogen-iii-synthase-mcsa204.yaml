identifier: MCSA:204
label: uroporphyrinogen-III synthase
definition: >-
  uroporphyrinogen III synthase (URO3S) catalyses the conversion of hydroxymethylbilane (HMB) to uroporphyrinogen III, a reaction involving ring closure and intramolecular rearrangement in which the inversion of the final pyrrole unit (ring D) of the linear tetrapyrrole molecule is linked to the first pyrrole unit (ring A). Uroporphyrinogen III represents a branch point for the pathways leading to formation of a wide variety of porphyrins, including heme, chlorophyll and corrins. Porphyrins act as cofactors for a multitude of enzymes that perform a variety of processes within the cell such as methionine synthesis (vitamin B12) or oxygen transport (heme). Deficiencies of URO3S <i>in vivo</i> are associated with congenital erythropoietic porphyria.
