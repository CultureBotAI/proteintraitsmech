identifier: MCSA:486
label: polynucleotide 5'-phosphatase
definition: >-
  RNA triphosphatase is an essential mRNA processing enzyme that catalyses the first step in cap formation. Capping entails three enzymatic reactions in which the 5' triphosphate end of pre-mRNA is hydrolysed to a 5' diphosphate by RNA triphosphatase, then capped with GMP by RNA guanylyltransferase, and methylated by RNA methyltransferase. Each of the capping activities is essential for cell growth. <br/><br/> Yeast RNA triphosphatase forms a heteromeric complex with the yeast RNA guanylyltransferase . The binding serves two purposes, firstly, the interaction stimulates guanylyltransferase activity by enhancing the affinity of RNA guanylyltransferase for GTP. Secondly the tethering facilitates the recruitment of the triphosphatase to the RNA polymerase II elongation complex. <br/><br/> The structure reveals a novel active site fold, a topologically closed trisphosphate tunnel formed from an eight stranded beta barrel.
