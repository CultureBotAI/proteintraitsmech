identifier: MCSA:212
label: nitrogenase
definition: >-
  <p>The nitrogenase complex from <i>Azotobacter vinelandii</i> catalyses the reduction of atmospheric nitrogen to ammonia, coupled to the hydrolysis of ATP and the oxidation of ferrodoxin. It is composed of two enzyme components: the Fe protein and the MoFe protein. The Fe protein catalyses the hydrolysis of ATP and consequently transfers electron to the MoFe protein. The MoFe protein contains the FeMo-cofactor which is composed of molybdenum, a [7Fe-9S] cluster, and homocitrate, and the P-cluster which is composed of a [8Fe-7S] cluster. The reducing electrons ultimately come from an external electron donor such as ferredoxin, through the Fe protein to the FeMo-cofactor [PMID:17614310, PMID:14551236]. The complex is formed as a heterotetramer of the FeMo protein, with one homodimer of Fe protein associated with each of the two alpha-beta subunits. The FeMo protein contains the FeMo-cofactor which contains a Fe7MoS9-homocitrate cofactor (FeMo-co) which is thought to contain a nitrogen atom, and the P-cluster containing an [8Fe-7S] cluster. The Fe protein contains a [4Fe-4S] cubane cluster.</p> <p>Nitrogenase is very biologically important because it reduces inert dinitrogen into a form which organisms can use in synthesis. Only a small subset of organisms can catalyse this reaction while all organisms require reduced nitrogen. This reaction is of industrial interest because enzymatic nitrogen fixation occurs under very mild conditions, while the industrial Haber-Bosch process must be run at high temperatures and pressures. </p> <p>It should be noted that the mechanism of this enzyme is still very unclear and that the exact atoms in the FeMo-cofactor involved are unknown. However, it is known that the Fe2, S2B, Fe6, S3b, Fe7, S5A, Fe3 and S2A make up the reactive face of the cofactor [PMID:17614310].</p>
