identifier: MCSA:618
label: "saccharopine dehydrogenase (NADP+, L-glutamate-forming)"
definition: >-
  Two lysine biosynthesis pathway: ubiquitous diaminopimelate pathway found in plants, bacteria and lower fungi. And the alpha-aminoadipate pathway (AAA pathway) found in higher fungi and cyanobacteria. The AAA pathway synthesises lysine from alpha-ketoglutarate and it is a member of the glutamate family of amino acid biosynthetic pathways. A number of fungi using this lysine synthesis pathway are human and plant pathogens. Selective inhibition of the essential biosynthetic pathway of lysine can be a possible means of controlling these pathogens. Saccharopine reductase catalyses the penultimate step in the AAA pathway in which glutamate and alpha-aminoadipic-delta-semialdehyde are reversibly converted to saccharophine, using, in preference, NADPH as cofactor. But it can also utilise NADH though with low catalytic efficiency.
