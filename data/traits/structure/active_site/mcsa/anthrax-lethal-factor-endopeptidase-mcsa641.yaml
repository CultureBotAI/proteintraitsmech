identifier: MCSA:641
label: "anthrax lethal factor endopeptidase"
definition: >-
  Lethal Factor is critical in anthrax pathogenesis, by acting as a specific protease cleaving members of the MAPKK (mitogen-activated protein kinase kinase) family at their amino termini with its commonly cleaving at the sequence BBBBxHxH, where B denotes a basic amino acid Arg or Lys and H denotes a hydrophobic amino acid. This results in signalling pathway inhibition. The catalytic domain of this enzyme is distantly related to the zinc metalloprotease family.<br/>The implications of finding targets for inhibition of anthrax lethal factor are obvious and so the catalytic details of this enzyme should be highly important especially due to its use in biological warfare and when inhaled is fatal.
