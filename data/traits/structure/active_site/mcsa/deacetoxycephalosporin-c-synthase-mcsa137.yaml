identifier: MCSA:137
label: deacetoxycephalosporin-C synthase
definition: >-
  Deacetoxycephalosporin C synthase (DAOCS) from <i>Streptomyces clavuligerus</i> is able to catalyse the synthesis of sporins from penicillin using 2-oxoglutarate (2OG) as a co-substrate. This reaction is potentially very useful to industry because it enables processing of penicillin to other beta-lactam ring containing compounds which may not trigger antibiotic resistance systems in prokaryotes that evolved with penicillin itself as the selective agent. As with the other members of the family of 2OG utilising enzymes, DAOCS shows a beta barrel catalytic core and has its iron centre ligated to two histidines and an aspartate residue at the active site. It also displays roughly the same catalytic cycle, albeit for a specific reaction, as seen for the other members of the family, such as anthocyanidin synthase.
