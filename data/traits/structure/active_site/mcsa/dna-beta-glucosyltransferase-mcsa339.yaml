identifier: MCSA:339
label: DNA beta-glucosyltransferase
definition: >-
  DNA beta-glucosyltransferase (BGT) is an enzyme encoded by a number of bacteriophage belonging to the T-even group. It catalyses the transfer of glucose from uridine diphosphoglucose (UDP-glucose) to 5-hydroxymethylcytosine (5-HMC) bases in double stranded DNA. Such glucosylation protects the infecting viral DNA from host restrictive enzymes. It may, in addition, be involved in phage specific gene expression by influencing transcription. Glucosylation also occurs in Trypanosoma bruceii where it is thought to be involved in regulating the expression of variant surface glycoproteins used by the parasite for protection against immune recognition. BGT is one of two enzymes involved in the glucosylation. In contrast to its counterpart which catalyses the formation of alpha-, it forms beta-glycosidic linkages While a divalent cation is required for optimal catalytic activity, crystallographic data suggests that the metal and substrate do not occupy the active site at the same time, and therefore, casts doubt on whether the metal is necessary for a non-reaction function, such as product displacement.
