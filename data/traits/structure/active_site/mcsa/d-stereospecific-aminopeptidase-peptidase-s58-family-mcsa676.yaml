identifier: MCSA:676
label: D-stereospecific aminopeptidase (peptidase S58 family)
definition: >-
  The L-aminopeptidase D-Ala-esterase/amidase from <i>Ochrobactrum anthropi</i> (DmpA) is an aminopeptidase which catalyses the release of N-terminal residues from peptides substrates. It also shows D-amidasic and D-esterasic activities on D-alanine derivatives. DmpA and other β-aminopeptidases are able to to cleave synthetic β-peptides, which consist of backbone-elongated β-amino acid residues that are not processed by common proteolytic enzymes. β-peptides are considered promising building blocks for the design of novel peptidomimetics,small protein-like chains to mimic peptides which are useful for drug design, thus these enzymes that cleave and release them are useful for production of peptidominetics.
