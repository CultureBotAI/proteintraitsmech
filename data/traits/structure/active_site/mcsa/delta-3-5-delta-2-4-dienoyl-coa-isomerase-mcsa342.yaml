identifier: MCSA:342
label: delta(3,5)-delta(2,4)-dienoyl-CoA isomerase
definition: >-
  <p>Fatty acids are metabolised by sequential removal of two-carbon units by oxidation at the beta-carbon. Only saturated fatty acids or unsaturated fatty acids with double bonds extending from even-numbered carbon atoms can enter the main beta-oxidation pathway, so double bonds at odd-numbered carbon atoms in unsaturated fatty acids has to be converted to even-numbered double bonds to enter beta-oxidation. Dienoyl-CoA isomerase catalyses the conversion of 3-trans,5-cis dienoyl-CoA into 2-trans,4-trans dienoyl-CoA.</p> <p>The enzyme is present in mitochondria and peroxisomes. It uses fatty acyl substrates with side-chains ranging at least from C8 to C20. The reaction used as example uses a C8 compund as substrate. This enzyme also exhibits delta(3,5,7)-delta(2,4,6)-trienoyl-CoA isomerase activity [PMID:11278886].</p>
