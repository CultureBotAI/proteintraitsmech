identifier: MCSA:983
label: 2-hydroxychromene-2-carboxylate isomerase
definition: >-
  Catalyzes the reversible glutathione-dependent isomerization of 2-hydroxychromene-2-carboxylate (HCCA) to trans-O-hydroxybenzylidenepyruvate (THBPA). HCCA isomerases are present in most aerobic organisms including microorganisms, plants, and animals. The group kappa GSH transferases (k-GSTs) are a close relative of the largest group of proteins in nature; the GST group. k-GSTs are dimers with a main catalytic domain, which is the N-terminal domain containing the thioredoxin domain, and the C-terminal domain which is mostly alfa-helical and unlike its GST relatives, inserted into the N-terminal domain. HCCA is a part of the naphthalene catabolic pathway of <i>Pseudomonas putida</i>.
