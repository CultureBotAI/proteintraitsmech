identifier: MCSA:133
label: "camphor 5-monooxygenase"
definition: >-
  Camphor 5-monooxygenase is involved in the pathway of (R)-camphor degradation, which is part of terpene metabolism. It is a B-class cytochrome P450, one of the cytochrome P450 superfamily of proteins.
