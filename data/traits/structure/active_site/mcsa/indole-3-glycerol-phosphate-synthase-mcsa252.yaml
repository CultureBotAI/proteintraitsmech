identifier: MCSA:252
label: "indole-3-glycerol-phosphate synthase"
definition: >-
  Indole-3-glycerol phosphate synthase (EC:4.1.1.48) (IGPS) catalyses the fourth step in the biosynthesis of tryptophan, the ring closure of 1-(2-carboxy-phenylamino)-1-deoxyribulose into indol-3-glycerol-phosphate. In some bacteria, IGPS is a single chain enzyme. In others, such as <i>Escherichia coli</i>, it is the N-terminal domain of a bifunctional enzyme that also catalyses N-(5'-phosphoribosyl)anthranilate isomerase (EC:5.3.1.24) (PRAI) activity. In fungi, IGPS is the central domain of a trifunctional enzyme that contains a PRAI C-terminal domain and a glutamine amidotransferase (EC:2.4.2) (GATase) N-terminal domain.
