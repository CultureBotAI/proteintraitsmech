identifier: MCSA:571
label: "glycerate dehydrogenase"
definition: >-
  D-Glycerate dehydrogenase (GDH) catalyses the NADH-dependent reduction of hydroxypyruvate to D-glycerate. In the species <i>Hyphomicrobium methylovorum</i>, GDH operates in a specialised serine pathway in which formaldehyde is assimilated into cellular material. This enables methyltrophic bacteria to utilise one carbon compounds as sole sources of carbon and energy.
