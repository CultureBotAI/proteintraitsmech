definitions:
  - kind: MECHANISTIC
    text: >-
      Sterile α-motif/histidine-aspartate domain-containing protein (SAMHD1) is a homo-tetrameric GTP/dGTP-activated dNTPase which ​catalyses the conversion of dNTP into 2'-deoxynucleoside and triphosphate. The enzyme interconverts between an inactive monomeric or dimeric form and a dGTP/GTP-induced active tetrameric form. SAMHD1 is ubiquitously expressed in various human organs. SAMHD1 plays an important role in human innate immunity, autoimmunity and cell cycle control. It blocks retroviral infections (including HIV) and transposition of endogenous retroelements as well as preventing infections from certain DNA viruses.
    source: "M-CSA"
    method: SOURCED
