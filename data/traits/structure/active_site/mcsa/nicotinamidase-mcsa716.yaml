identifier: MCSA:716
label: nicotinamidase
definition: >-
  Pyrazinamide (PZA) is a prodrug used in the treatment of tuberculosis. PZA is converted to the active pyrazinoic acid by the bacterial PZAase enzyme; mutations in PZAase can therefore confer PZA resistance to <i>M. tuberculosis</i>. The gene product of <i>Pyrococcus horikoshii</i> 999 (PH999) shows PZAase and nicotinamidase activity, and extensive sequence homology to M. tuberculosis PZAase.
