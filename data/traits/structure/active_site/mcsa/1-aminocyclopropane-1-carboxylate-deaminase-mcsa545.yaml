identifier: MCSA:545
label: 1-aminocyclopropane-1-carboxylate deaminase
definition: >-
  1-aminocyclopropane-1-carboxylate (ACC) deaminase is a pyridoxal phosphate-dependent enzyme which catalyses a cyclopropane ring-opening reaction, the irreversible conversion of ACC to ammonia and alpha-ketobutyrate. In plants, the latter is a precursor of the ripening hormone ethylene. Some plant growth-promoting rhizobacteria can produce 1-aminocyclopropane-1-carboxylate deaminase to enhance plant growth. ACC deaminase is unique amongst PLP-dependent enzymes, since the ring cleavage catalysed by ACC deaminase cannot proceed through an α-carbanionic intermediate due to the lack of an abstractable alpha-hydrogen atom from the substrate ACC.
