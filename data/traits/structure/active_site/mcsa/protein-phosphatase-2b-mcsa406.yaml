identifier: MCSA:406
label: protein phosphatase 2B
definition: >-
  Protein phosphatase 2B (also known as calcineurin) is a Ca(II)- and calmodulin-stimulated protein serine/threonine phosphatase. Many of the substrates contain a PxIxIT motif. This catalytic subunit (represented by UniProtKB Q08209) may have a role in the calmodulin activation of calcineurin. UniProtKB P63098 represents the regulatory subunit of calcineurin and confers calcium sensitivity. <br/><br/> This protein plays an important role in numerous calcium-dependent biological processes, including neurodevelopment and memory, immune response, cardiac hypertrophy, signal transduction, and muscle development.
