identifier: MCSA:944
label: Lactoperoxidase
definition: >-
  Antimicrobial agent which utilizes hydrogen peroxide and thiocyanate (SCN) to generate the antimicrobial substance hypothiocyanous acid (HOSCN). Hypo(pseudo)halides, such as HOSCN, are powerful oxidants with antimicrobial activity, thus this reaction is thought to help protect the udder from infection and promote growth in newborn calves. Inhibits growth of the following bacterial species: <i>E. coli</ i>, <i>K. pneumoniae</i>, <i>P. aeruginosa</i>, <i>S. sonnei</i>, <i>S. saphrophyticus</i>, <i>S. epidermidis</i>, and <i>S. dysenteriae</i>.
