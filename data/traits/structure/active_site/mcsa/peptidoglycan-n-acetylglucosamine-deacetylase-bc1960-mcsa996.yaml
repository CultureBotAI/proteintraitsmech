identifier: MCSA:996
label: "Peptidoglycan-N-acetylglucosamine deacetylase Bc1960"
definition: >-
  Peptidoglycan N-acetylglucosamine (GlcNAc) deacetylase Bc1960 is a <i>Bacillus cereus</i> enzyme with backbone modifications is the Cα hydroxylation of a proline in the active site. Bc1960 is a polysaccharide deacetylase (PDA) that catalyzes the reaction of turning peptidoglycan-N-acetyl-D-glucosamine to peptidoglycan-D-glucosamine. Modification of peptidoglycan by N-deacetylation is an important factor in virulence of Helicobacter pylori, Listeria monocytogenes and Streptococcus suis.
