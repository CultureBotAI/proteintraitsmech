identifier: MCSA:509
label: "pectate lyase"
definition: >-
  Pectate lyase from <i>Azospirillum irakense</i> (PelA) catalyses the degradation of pectin. Pectate lyases (also known as pectate transeliminases) are secreted microbial enzymes that degrade pectin, and are therefore important in plant pathogenesis.
