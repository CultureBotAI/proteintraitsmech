identifier: MCSA:732
label: dCTP deaminase
definition: >-
  Deoxycytidine triphosphate deaminase (dCTP deaminase) from <i>E. coli</i> catalyses the deamination of dCTP producing ammonia and dUTP. The dUTP can be hydrolysed by dUTPase producing dUMP which is a precursor of dTTP. dCTP deaminase is inhibited by dTTP and by inorganic phosphate. Deamination of dCTP by dCTP deaminase provides about 80% of the dUMP used for dTMP synthesis in <i>E. coli</i>. The substrate of dCTP deaminase is the dCTP.Mg2+ complex but the magnesium does not have a catalytic role and no other metal ions are involved in catalysis.
