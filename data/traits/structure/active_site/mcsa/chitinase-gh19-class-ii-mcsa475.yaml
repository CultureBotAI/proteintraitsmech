identifier: MCSA:475
label: "chitinase (GH19, Class II)"
definition: >-
  Chitinase binds to chitin and randomly cleaves glycosidic linkages in chitin and chitodextrins in a non-processive mode, generating chitooligosaccharides and free ends on which exo-chitinases and exo-chitodextrinases can act. Chitin is a bio-polymer composed of 1,4-beta linked N-acetylglucosamine units, a major component of fungal cell walls and insect exoskeletons. Activity is greatly stimulated in the presence of EC 1.14.99.53, lytic chitin monoxygenase, which attacks the crystalline structure of chitin and makes the polymer more accessible to the chitinase. It is used by the seeds to retard fungal growth by interfering with the cell wall. <br/><br/> The enzyme, collected from barely seeds, is a type b member of the class II group, which is a member of Glycoside Hydrolase Family 19.
