identifier: MCSA:265
label: "5-epi-aristolochene synthase"
definition: >-
  5-epi-aristolochene synthase from tobacco belongs to the family of terpene cyclases and is a member of the I Isoprenoid Synthase Type I superfamily. 5-epi-aristolochene synthase from tobacco (<i>Nicotiana tabacum</i>) converts farnesyl diphosphate into 5-epi-Aristolochene and diphosphate in a magnesium dependent manner. 5-epi-aristolochene is a precursor of the antifungal phytoalexin capsidiol. Based on structural studies of the tobacco enzyme it is believed the terpene is formed via two intermediates, germacrene and a eudesmane carbocation.
