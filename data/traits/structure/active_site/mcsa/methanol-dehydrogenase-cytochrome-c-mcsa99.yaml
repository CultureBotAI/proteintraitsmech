identifier: MCSA:99
label: methanol dehydrogenase (cytochrome c)
definition: >-
  Methanol dehydrogenase (MEDH) is a periplasmic quinoprotein. It catalyses the oxidation of methanol and other small alcohols to the corresponding aldehyde with the release of two protons and two electrons. The enzyme uses the pyrroloquinolinequinone (PQQ) cofactor. <br/><br/> MEDH is an H2L2 heterotetramer, made of two heavy (H) chains and two light (L) chains. Each H subunit contains one molecule of the prosthetic group PQQ, which is non-covalently bound to the polypeptide chain, as well as one calcium ion which is catalytically essential. There is no interaction between the L chains which fold around the surface of the H chains.
