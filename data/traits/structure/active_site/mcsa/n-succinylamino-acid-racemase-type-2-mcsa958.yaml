identifier: MCSA:958
label: "N-succinylamino acid racemase (type 2)"
definition: >-
  Enzymes in the N-succinylamino acid racemase 2 (NSAR2) family catalyse the racemisation of N-succinyl arginine/lysine. Enzymes in this family are highly similar to enzymes in the dipeptide epimerase family. The experimentally characterised enzyme from <i>Bacillus cereus</i> has been shown to catalyse the epimerisation of certain dipeptides, but at a substantially lower rate than the racemisation of N-succinyl arginine/lysine. Although the reaction catalysed by this family is similar to that catalysed by the NSAR family (differing only in the preference of N-succinyl arginine/lysine for NSAR2 versus N-succinyl hydrophobic amino acids for NSAR), phylogenetic analysis suggests that these two families have independent evolutionary origins within the enolase superfamily. Not surprisingly, the amino acids responsible for substrate recognition appear to differ between the two families.
