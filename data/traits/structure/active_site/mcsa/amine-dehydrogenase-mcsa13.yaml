identifier: MCSA:13
label: "amine dehydrogenase"
definition: >-
  Methylamine dehydrogenase is a heterotetrameric, periplasmic quinoprotein found in several forms of constitutive and facultative methylotrophic bacteria. The enzyme catalyses the oxidative deamination of primary amines to their corresponding aldehydes with the release of two electrons and two protons. The enzyme is induced when the methylotrophic bacteria are grown on media containing methylamine as the sole carbon, and therefore energy, source. <br/><br/> The electron acceptor, Amicyanin, binds first to MADH to be reduced and then dissociates from MADH to react with cytochrome c-551i or cytochrome aa3 via the same binding site to be regenerated. Electrons can reach the terminal oxidase via different routes, and it cannot be concluded that one specific interaction is preferred.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
