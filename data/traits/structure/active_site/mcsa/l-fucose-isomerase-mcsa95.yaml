identifier: MCSA:95
label: "L-fucose isomerase"
definition: >-
  L-fuctose isomerase, also known as arabinose isomerase (EC 5.3.1.3) uses both L-fucose and arabinose as substrates, converting the aldo-hexoses to ketoses to prepare them for aldol cleavage within the L-fucose metabolism pathway. <br/><br/> The enzyme binds the closed form of the sugar and catalyses ring opening to generate a form of open-chain conformation that facilitates the isomerisation reaction, which proceeds <i>via</i> an ene-diol mechanism
