identifier: MCSA:548
label: "endo-1,4-beta-xylanase (glycosyl hydrolase 10)"
definition: >-
  <p>The Glycosyl hydrolases form a ubiquitous group of enzymes involved in carbohydrate metabolism. This enzyme, from <i>Cellulomonas fimi</i>, belongs to the glucoside hydrolases family (cellulase F) 10.</p> <p>The class can be sub divided according to the stereoselective reaction outcomes, with hydrolysis occurring with net retention or inversion of the anomeric configuration. This enzyme hydrolyses the beta-glycosidic bond with retention of the anomeric configuration, i.e. it is a retaining glycosidase. </p> <p>The enzyme has been reported to preferentially cleave a cellobiose unit rather than glucose from the non-reducing end of cellulose, and has been identified as biotechnologically important because of its reaction specificity between xylan and cellulose. It also hydrolyses xylan and, to a lesser extent, carboxymethylcellulose and also a range of soluble aryl xylosides, xylobiosides, glucosides and cellobiosides. </p>
