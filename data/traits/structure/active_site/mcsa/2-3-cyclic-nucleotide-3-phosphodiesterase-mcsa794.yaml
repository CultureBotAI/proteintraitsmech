identifier: MCSA:794
label: "2',3'-cyclic-nucleotide 3'-phosphodiesterase"
definition: >-
  During the tRNA splicing reaction in eukaryotes, an ADP ribose cyclic phosphate is formed. Hydrolysis of this to regenerate the monoester ADP ribose-1-phosphate is therefore a necessary part of the overall process. The enzyme cyclic phosphodiesterase is able to catalyse this reaction in the organism <i>Arabidopsis thaliania</i>. It displays a unique fold, but has some sequence identity with the equivalent enzymes in both wheat and zebrafish, specifically in the presence of the sequence motif H-X-T-S-X-H in the active site. Mechanistic and active site features in this family of enzymes are also found to be similar to other RNA processing proteins such as RNAase A.
