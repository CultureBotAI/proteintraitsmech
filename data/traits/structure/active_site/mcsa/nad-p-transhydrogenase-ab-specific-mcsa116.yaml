identifier: MCSA:116
label: "NAD(P)+ transhydrogenase (AB-specific)"
definition: >-
  Transhydrogenase, isolated from <i>Rhodospirillum rubrum</i>, is a transmembrane protein that catalyses the hydride transfer from NADH to NADP+. The driving force for this reaction is the movement of a proton down a proton electrochemical gradient, with one proton transfer per hydride transfer, from the periplasm to the cytoplasm. Domain I (located in the PDB file) binds NADH and contains the catalytic residues for the reaction. Domain II facilitates proton translocation and domain III binds NADP+. Proton transfer through domain II propagates a conformational change from domain II through domain III to domain I. These conformational changes are required to align the substrates correctly and so couples proton translocation to hydride transfer.
definition_source: "M-CSA (Thornton lab, EBI; fetched via REST API)"
