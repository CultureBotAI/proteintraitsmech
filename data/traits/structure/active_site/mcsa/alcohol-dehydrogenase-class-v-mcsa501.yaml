identifier: MCSA:501
label: "alcohol dehydrogenase (class V)"
definition: >-
  To date, all known attempts to isolate and characterize mammalian class V alcohol dehydrogenase, a member of the large zinc-dependent ADH protein family, at the protein level have failed. Suggesting that the class V ADH protein is not stable in a non-cellular environment (unlike most other ADH proteins). Members of this protein family are all involved in the general metabolism of alcohols and aldehydes.
