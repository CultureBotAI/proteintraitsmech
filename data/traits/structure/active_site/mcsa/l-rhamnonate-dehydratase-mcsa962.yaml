identifier: MCSA:962
label: "L-rhamnonate dehydratase"
definition: >-
  L-rhamnonate dehydratase is a member of the enolase superfamily that catalyses the <i>syn</i> dehydration of L-rhamnonate. It belongs to the mandelate racemase/muconate lactonising enzyme family, specifically the RhamD subfamily.
