identifier: MCSA:735
label: "cytochrome-c oxidase (BA3 type)"
definition: >-
  Cytochrome c oxidase (COX) is a multi-unit, membrane-bound enzyme, reducing molecular oxygen to water, coupling this to the creation of a proton and charge gradient across the membrane that is essential to respiratory pathways in mitochondria and aerobic bacteria. The exact catalytic mechanisms are not definitely known, and different COXs may or may not work via subtly different mechanisms, or via different combinations of several possible pathways. The ba3-type COX from<i>Thermus thermophilus</i> is a two subunit oxidase and expressed under limited oxygen supply; it shows similarity to archaeal oxidases (SoxB type) rather than most other eubacterial oxidases (SoxM type). Compared to other COXs it has reduced proton pumping efficiency.
