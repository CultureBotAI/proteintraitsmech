identifier: MCSA:565
label: "tRNA-intron lyase"
definition: >-
  RNA endonuclease from the archaea <i>Methanocaldococcus jannaschii</i> is able to catalyse the splicing of introns from tRNA, a process needed only in archaea and eukarya, bacterial tRNA introns being self-splicing. The enzyme thus is a homologue of the eukaryotic enzymes which perform, a fact that serves to reinforce the closer relationship proposed between archaea and eukarya. There are differences however in the exact orientation of residues at the active site and the substrate recognition by the enzymes, suggesting that the enzymes evolved from a common ancestor with slightly different function.
