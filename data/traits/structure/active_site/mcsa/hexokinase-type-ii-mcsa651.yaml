identifier: MCSA:651
label: "hexokinase (type II)"
definition: >-
  Yeast Hexokinase PII is one of the two isoenzymes present in <i>Saccharomyces cerevisiae</i> which are able to catalyse the phosphorylation of glucose to glucose-6-phosphate. This is the first step in glycolysis, so is of vital importance as it creates an intermediate which can be passed into many other pathways such as glycogen synthesis and the pentose phosphate pathway. 80% sequence identity is observed between the isoenzymes, and both show significant structural identity to the mammalian form of the enzyme, allowing them to be placed together in the same homologous family.
