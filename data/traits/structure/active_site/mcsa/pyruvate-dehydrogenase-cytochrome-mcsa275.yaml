identifier: MCSA:275
label: "pyruvate dehydrogenase (cytochrome)"
definition: >-
  Catalyses the formation of acetate and carbon dioxide from pyruvate with the concomittant reduction of ubiquinone. This protein requires thiamine phosphate and FAD for activity. The bacterial enzyme is located on the inner surface of the cytoplasmic membrane and coupled to the respiratory chain via ubiquinone. It does not accept menaquinone as an acceptor. In <i>Escherichia coli </i> this is the primary complex responsible for aerobic growth, pyruvate oxidase (MACiE:274) acts as a backup system.
