identifier: MCSA:15
label: beta-lactamase (Class B1)
definition: >-
  Beta-lactamase is a key enzyme in antibiotic resistance, catalysing the cleavage of the essential beta-lactam ring structure in penicillin and cephalosporinase type antibiotics. Substrate specificity varies considerably within the beta-lactamases, with some enzymes preferring penicillins and some cephalosporins. Alongside the class B beta-lactamases, described here, there also exist three other classes of beta-lactam cleaving enzymes (A,C and D). These groups of enzymes use a serine nucleophilic mechanism, while class B uses a mono/dimetallic zinc mechanism. This entry describes the dimetallic mechanism. There is considerable variety in substrate specificity between the classes, although class C enzymes tend to have a high cephalosporinase activity
