identifier: MCSA:138
label: superoxide dismutase
definition: >-
  Copper-zinc superoxide dimutase (CuZnSOD) catalyses the disproportionation of superoxide into dioxygen and hydrogen peroxide. In higher organisms, superoxide anions are produced as an occasional byproduct during the one-electron reduction of dioxygen in respiration and photosynthesis. Superoxides are also produced by macrophages as a part of the immune response. Excess amounts of superoxides can inactivate enzymes with iron-sulphur clusters and can lead to the formation of highly oxidising species that can damage cellular constituents. Therefore, organisms must have ways to regulate the concentration of superoxide concentrations. Many Gram-negative bacterial pathogens also possess CuZnSOD to counteract the phagocyte superoxide burst from their hosts.
