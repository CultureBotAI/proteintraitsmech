identifier: MCSA:606
label: enoyl-[acyl-carrier-protein] reductase (NADH)
definition: >-
  <p>Enoyl ACP reductase catalyses the last step in fatty acid biosynthesis. Therefore it is a potential target for antibacterial agent development. It catalyses the NAD(P)H-dependent reduction of enoyl acyl carrier protein. </p> <p>The bacterial form of the enzyme is different from the human form as it exists as a free globular protein rather than a part of a multienzyme complex. EACPR's show homology, and similarity to hydroxysteroid dehydrogenase, and also beta-keto reductase, suggesting divergent evolution has played a role in the development of the pathway of lipid biosynthesis.</p>
