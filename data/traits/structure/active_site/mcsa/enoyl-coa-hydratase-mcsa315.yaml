identifier: MCSA:315
label: enoyl-CoA hydratase
definition: >-
  Enoyl-CoA hydratase catalyses the hydration of trans-2-enoyl-CoA thiolesters to the corresponding 3(S)-hydroxyacyl-CoA compounds, the second step in the fatty acid beta-oxidation pathway. The enzymes degrade fatty acids of variable tail length from C4 up to at least C16, but the rate of the reaction decreases with increasing tail length. Enoyl-CoA hydratase is a member of the corotonase superfamily of enzymes. Despite the thermodynamic preference for the aromatic conjugated unsaturated substrate, the enzyme has been shown to catalyse the dehydration of 3-hydroxy-3-phenylpropanoyl-CoA to cinnamoyl-CoA.
