identifier: MCSA:945
label: nicotinate-nucleotide pyrophosphorylase (carboxylating) (type II)
definition: >-
  This is a type II Quinolinic acid phosphoribosyltransferase (QAPRTase). This protein is required for the de novo biosynthesis of NAD in both prokaryotes and eukaryotes. The enzyme catalyses the reaction between quinolinic acid (QA) and 5-phosphoribosyl-1-pyrophosphate (PRPP), to yield nicotinic acid mononucleotide (NAMN), pyrophosphate and CO2, the latter resulting from decarboxylation at position 2 of the quinolinate ring. QAPRTase has been grouped with nine other enzymes, (phosphoribosyltransferases, PRTases) that catalyse chemically similar phosphoribosyl transfer reactions using the substrate PRPP. The PRTases are involved in de novo and salvage reactions of nucleotide synthesis, as well as in histidine and tryptophan biosynthesis. Type II enzymes lack the type I PRPP-binding motif and have TIM barrel-like structure [PMID:9016724].
