identifier: MCSA:221
label: benzoin aldolase
definition: >-
  Thiamine diphosphate dependent benzaldehyde lyase (BAL) from Pseudomonas fluorescens catalyses the cleavage of (R)-benzoin producing two molecules of benzaldehyde. This allows the bacterium to grow on (R)-benzoin as its only carbon and energy source. The reverse reaction is catalysed by benzoylformate decarboxylase (BFD). The X-ray structure of BAL was compared to that of BFD and pyruvate decarboxylase (PDC) in order to determine which residues are likely to have catalytic roles and should be analysed by point mutations. BAL looses its catalytic activity upon treatment with EDTA but activity can be restored by addition of 1millimolar MgCl2, MnSO4 or CaSO4.
