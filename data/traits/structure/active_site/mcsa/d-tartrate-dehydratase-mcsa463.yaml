identifier: MCSA:463
label: "D(-)-tartrate dehydratase"
definition: >-
  D-tartrate dehydratase (TarD), isolated from <i>Bradyrhizobium japonicum</i>, catalyses the dehydration of D-tartrate to oxaloacetate and water. TarD is a member of the mandelate racemase subgroup of the enolase superfamily.
