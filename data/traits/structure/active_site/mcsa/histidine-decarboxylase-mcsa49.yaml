identifier: MCSA:49
label: "histidine decarboxylase"
definition: >-
  Histidine decarboxylasses from <i>Lactobacillus 30a</i> is the best-studied of a class of enzyme which utilise the covalently bound cofactor, pyruvate. Models of the active site with and without the bound substrate analogue, histidine methyl ester (HisOMe), or the product, histamine, have been produced. Comparison of native and ligand-bound structures reveals no widespread differences in conformation but does reveal motion of a few key residues. <br/><br/> The native enzyme is an (alpha-beta)<sub>6</sub> "hexamer". Two trimers bind bottom-to-bottom across a crystallographic dyad, forming a dumbell-shaped hexamer with cavities at either end.
