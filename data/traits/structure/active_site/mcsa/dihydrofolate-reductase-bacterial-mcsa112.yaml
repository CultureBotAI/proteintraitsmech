identifier: MCSA:112
label: dihydrofolate reductase (bacterial)
definition: >-
  Dihydrofolate reductase catalyses the reduction of 7,8-dihydrofolate (DHF) to 5,6,7,8-tetrahydrofolate (THF) by stereospecific hydride transfer from a NADPH cofactor to the C6 atom of the pterin ring with concomitant protonation at N(5). DHFR plays a central role cell maintenance of THF reserves, which are essential for purine and thimidylate synthesis and hence for cell growth and proliferation. As DHFR is the sole source of THF, the enzyme is the Achilles heel of rapidly proliferating cells and, therefore, has been a major focus in the development of anticancer and antibacterial reagents. <br/><br/> Much interest has been generated in this enzyme due to its potential as a target for antibacterial and anticancer drugs. It is ubiquitous throughout evolution, but always most important in cells which are dividing rapidly, hence its value as a drug target against infections and cancer.
