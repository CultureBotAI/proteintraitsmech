identifier: MCSA:454
label: high molecular weight acid phosphatase
definition: >-
  High molecular weight acid phosphatases (HAPs) form a subclass of phosphomonoesterases which are found in locations as diverse as wheat germ, mammalian prostate tissue, and as extracellular or periplasmic enzymes in fungi and bacteria. These proteins act as non-specific tyrosine phosphatase that dephosphorylate a diverse number of substrates under acidic conditions (pH 4-6) including alkyl, aryl, and acyl orthophosphate monoesters and phosphorylated proteins. They have also been shown to have lipid phosphatase activity. In mammals they have been shown to inactivate lysophosphatidic acid in seminal plasma. In the fungus Aspergillus ficuum the homologous phytase is essential in metabolising phytate, the major phosphorous storage form in plant seeds. The HAPs have a distinct mechanism from other acid phosphatases; they retain the configuration of the substrate phosphorous atom while the purple acid phosphatases reverse it, and use a phospho-histidine intermediate. Evidently nature has 'discovered' multiple ways of catalysing this important reaction.
