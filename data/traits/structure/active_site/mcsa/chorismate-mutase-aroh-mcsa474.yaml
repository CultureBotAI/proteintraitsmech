identifier: MCSA:474
label: "chorismate mutase (AroH)"
definition: >-
  Chorismate mutase (CM; EC:5.4.99.5) catalyses the rearrangement of chorismate to prephenat, the reaction at the branch point of the biosynthetic pathway leading to the three aromatic amino acids, phenylalanine, tryptophan and tyrosine (chorismic acid is the last common intermediate, and CM leads to the L-phenylalanine/L-tyrosine branch). It is part of the shikimate pathway, which is present only in bacteria, fungi and plants. <br/><br/> This entry represents a family of monofunctional (non-fused) chorismate mutases from Gram-positive bacteria (Firmicutes) and cyanobacteria. They are monofunctional, homotrimeric, non-allosteric enzymes and are not regulated by the end-product aromatic amino acids (unlike those CMs of the AroQ-type).
