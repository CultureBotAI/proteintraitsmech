identifier: MCSA:87
label: urease
definition: >-
  <p>Ureases hydrolyse urea into ammonia and carbamate. Ureases have been isolated from a wide range of bacteria, fungi and higher plants where it allows the organism to use urea as a nitrogen source. Ureases uses an almost unique bi-nickel catalytic centre which is liganded by a carbamylated lysine.</p> <p>The mechanism of this enzyme has been subject to debate since the early 1920s and the precise steps in catalysis remain unclear [PMID:20471401].</p>
