identifier: MCSA:5
label: carboxypeptidase D
definition: >-
  Carboxypeptidase D is a serine protease which specifically removes basic or hydrophobic residues from the C-terminus of the substrate protein. Carboxypeptidase D is a member of the alpha beta hydrolase family and contains a Ser-His-Asp catalytic triad typical of the family. In humans, mutations arising in this enzyme result in genetic disorders such as galactosialidosis, a disease associated with incorrect protein degradation in the lysosome. Carboxypeptidase D from yeast and wheat have had their structures determined, The wheat catalytic triad is made up of residues from both subunits of the homodimer whilst yeast carboxypeptidase D is a monomer, however, both have similar active site geometries.
