identifier: MCSA:29
label: glutamin-(asparagin-)ase
definition: >-
  Glutaminase-asparaginase catalyses the hydrolysis of D and L isomers of glutamine and asparagine. <br/><br/> Glutaminase-asparaginase belongs to a family of related amidohydrolases, in a less specific class that catalyses the hydrolysis of glutamine to glutamic acid and asparagine to aspartic acid with similar efficiency. They are mechanistically similar to trypsin.
