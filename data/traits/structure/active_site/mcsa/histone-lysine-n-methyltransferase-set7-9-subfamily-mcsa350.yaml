identifier: MCSA:350
label: histone-lysine N-methyltransferase (SET7/9 subfamily)
definition: >-
  <p>Human methyltransferase SET7/9 catalyses the transfer of a methyl group from the cosubstrate ADOmet to a Lysine residue in Histone H3. Such methylation is used in the regulation of transcription of DNA: it inactivates the DNA towards transcription by creating a silenced chromatin domain. The enzyme displays homology to other SET containing proteins both in humans and in other eukaryotes such as fission yeast (S. cereviseae), with high levels of sequence and structural similarity between the proteins. As a result the SET catalytic domain conserved between the proteins is considered to have the same mechanism in all the methyltransferases.</p> <p>Several studies have been done on this enzyme, however the method of deprotonation of the histone-lysine is still unclear [PMID:21266482]. Although the mechanism seems to be the same among different proteins, there is a variability in the active site and in presence of zinc finger containing domains. The latter seems to be involved in substrate recognition and binding [PMID:12372304]. Tyr335, Tyr245, and His297 residues are highly conserved [PMID:12372305]. The histidine residues are believed to assist the tyrosine residues with their catalytic function [PMID:12514135]. Tyr305, present only in SET7/9 proteins, appears to assume the role of Tyr335 when this residue is mutated [PMID:20675860]. SET7/9 proteins only perform monomethylation of histone-lysine, whereas other proteins can perform further di- and trimethylations [PMID:12887903]. The rearrangement of water molecules in the active site is proposed to promote this further methylation [8]. The geometry optimisation of SET7/9 complex with SAM substrate showed the formation of CH...O hydrogen bonds AdoMet methyl and His293 main chain carbonyl and Tyr335 hydroxyl [PMID:21454678]. The unusually high pH optimum [PMID:12887903, PMID:12372305] suggests partial deprotonation of the target lysine and hydroxyl group of the tyrosine. Nonetheless, pKa calculations [PMID:18391193] contradict the presence of tyrosine hydroxyl anion.</p>
