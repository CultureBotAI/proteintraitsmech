identifier: MCSA:445
label: arginase
definition: >-
  Arginase (L-arginine amidinohydrolase, E.C. 3.5.3.1) is a metal ion dependent enzyme that catalyzes the hydrolysis of L-arginine to L-ornithine and urea. The enzyme is widely distributed throughout the evolutionary spectrum in organisms as diverse as bacteria, yeast, plants and animals <br/><br/> Arginase catalyses the divalent cation-dependent hydrolysis of L-arginine to form the non-proteinogenic amino acid L-ornithine and urea. <br/><br/> Arginase is a manganese-dependent enzyme that catalyzes the hydrolysis of L-arginine to L-ornithine and urea. In ureotelic animals arginase is the final enzyme of the urea cycle, but in many species it has a wider role controlling the use of arginine for other metabolic purposes, including the production of creatine, polyamines, proline and nitric oxide. Arginase activity is regulated by various small molecules, including the product L-ornithine.
