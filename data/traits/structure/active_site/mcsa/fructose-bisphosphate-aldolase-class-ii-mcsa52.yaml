identifier: MCSA:52
label: "fructose-bisphosphate aldolase (Class II)"
definition: >-
  Fructose-1,6-bisphosphate aldolase (FBP-aldolase, EC 4.1.2.13) participates in two major metabolic pathways. In gluconeogenesis, they catalyse the aldol condensation of a ketose, dihydroxyacetone phosphate (DHAP) and an aldose, glyceraldehyde 3-phosphate (G3P) to form the acylic form of fructose 1,6-bisphosphate (FBP). In glycolysis, they catalyse the reverse cleavage reaction. In each pathway, the enzyme-catalysed reaction represents a distinctive stage, a switch between six and three carbon units. The aldol condensation is a key reaction in synthetic chemistry that aldolases catalyse with exquisite control of the stereochemistry. <br/><br/> Aldolases have been divided into two groups, class I and class II, depending primarily on the reaction mechanism. This annotation refers to class II aldolases, which are alpha/beta(8) barrel structures. The class II enzymes are not found in mammals, and have an absolute requirement for a divalent cation, usually Zn(II), and are activated by monovalent cations.
