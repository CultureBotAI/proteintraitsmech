identifier: MCSA:478
label: chitinase (GH18, Class II)
definition: >-
  Chitinase binds to chitin and randomly cleaves glycosidic linkages in chitin and chitodextrins in a non-processive mode, generating chitooligosaccharides and free ends on which exo-chitinases and exo-chitodextrinases can act. Chitin is a bio-polymer composed of 1,4-beta linked N-acetylglucosamine units, a major component of fungal cell walls and insect exoskeletons. <br/><br/> The bacterial chitinase enzyme is an 18-family member, and is used by bacteria to catalyse the degradation of chitin to form products which are then used as a source of energy.
