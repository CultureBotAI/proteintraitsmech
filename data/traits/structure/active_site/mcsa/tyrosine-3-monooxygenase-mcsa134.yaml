identifier: MCSA:134
label: "tyrosine 3-monooxygenase"
definition: >-
  Tyrosine hydroxylase, sourced from <i>Rattus norvegicus</i> belongs to a family of tetrameric, biopterin-dependent aromatic amino acid hydroxylases found in metazoans. It catalyses the hydroxylation of the aromatic group of tyrosine. Tyrosine hydroxylase is found in the central nervous system and the adrenal gland where it's role is to catalyse the production of dihydroxyphenylalanine (DOPA) - the rate limiting step in the biosynthesis of catecholamine neurotransmitters.
