identifier: MCSA:820
label: Ulp1 peptidase
definition: >-
  NEDP1 is a 211 residue cysteine-type peptidase of the Ulp family expressed in homo sapiens. It is a deneddylase enzyme involved in the processing of preNEDD8 to its mature form and the deconjugation of NEDD8 from modified substrates (eg. cullin). NEDP1 discrimates between NEDD8 and homologous ubiquitin, involving highly precise molecular recognition due to a single residue change in the C-terminus of NEDD8.
