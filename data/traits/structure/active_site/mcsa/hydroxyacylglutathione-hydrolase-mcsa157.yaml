identifier: MCSA:157
label: "hydroxyacylglutathione hydrolase"
definition: >-
  <p>Glyoxalase II participates in the cellular detoxification of cytotoxic and mutagenic 2-oxoaldehydes. Glyoxalase I converts methylglyoxal (a cytotoxic byproduct of many cellular reactions) and glutathione into S-D-lactoylglutathione (SLG) which is also cytotoxic; the role of glyoxalase II is to hydrolyse SLG into D-lactic acid and glutathione.</p> <p>The substrate of this reaction is the product of Lactoylglutathione lyase, an enzyme which catalyses the initial steps in detoxifying methyl-glyoxyl. This enzyme regnerates the glutathione cofactor utilised by lactoylglutathione lyase.</p>
