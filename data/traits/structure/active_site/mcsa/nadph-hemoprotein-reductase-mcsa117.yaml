identifier: MCSA:117
label: "NADPH-hemoprotein reductase"
definition: >-
  Rat NADPH-cytochrome P450 oxidoreductase (CYPOR) catalyses the transfer of electrons from NADPH to a range of cytochrome P450 proteins. Other electron acceptors include heme oxygenase, cytochrome b5 and fatty-acid elongase. It is a 78kDa protein and is attached to the cytoplasmic side of the endoplasmic reticulum and the outer membrane of the nuclear envelope by a hydrophobic N-terminal membrane anchor. <br/><br/> The FAD and FMN containing domains are linked by a flexible peptide hinge and it is thought that CYPOR evolved after a fusion of genes encoding for a FMN-containing flavodoxin and a FAD- binding ferredoxin-NADP reductase.
