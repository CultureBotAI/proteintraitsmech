identifier: MCSA:96
label: creatinase
definition: >-
  Creatinase or creatine amidinohydrolase (EC:3.5.3.3) catalyses the conversion of creatine and water to sarcosine and urea. This is a key step in the metabolic breakdown of creatinine by micro-organisms. Creatinase is also found in higher animals but its metabolic role is as yet not known. The enzyme works as a homodimer, and is induced by choline chloride. Each monomer of creatinase has two clearly defined domains, a small N-terminal domain, and a large C-terminal domain. The C-terminal domain is a member of the MEROPS peptidase family M24 (clan MG), which share a common structural-fold, the "pita-bread" fold. The active site is located between the N- and C-terminal domains.
