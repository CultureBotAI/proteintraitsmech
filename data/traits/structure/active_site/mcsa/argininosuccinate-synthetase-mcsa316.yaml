identifier: MCSA:316
label: "argininosuccinate synthetase"
definition: >-
  Argininosuccinate synthase (EC:6.3.4.5) (AS) is a urea cycle enzyme that catalyzes the penultimate (seventh) step in arginine biosynthesis: the condensation of glutamate and citrulline to form agininosuccinate, AMP and diphosphate. <br/><br/> In humans, a defect in the AS gene causes citrullinemia, a genetic disease characterised by severe vomiting spells and mental retardation [PMID:19006241]. <br/><br/> AS is a homotetrameric enzyme of chains of about 400 amino-acid residues. An arginine seems to be important for the enzyme's catalytic mechanism. The sequences of AS from various prokaryotes, archaebacteria and eukaryotes show significant similarity. <br/><br/> Although there are two sub-types of argininosuccinate synthase, they appear to have the same mechanism and so are both represented by this entry.
