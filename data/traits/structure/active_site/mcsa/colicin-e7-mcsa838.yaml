identifier: MCSA:838
label: Colicin-E7
definition: >-
  The ColE7 endonuclease from <i>Escherichia coli</i> binds nucleic acids and hydrolyses a phosphodiester bond. It contains the His-metal finger motif and may function with a range of metals, although the physiological metal is thought to be Zn(II).
