identifier: MCSA:830
label: "ubiquitinyl hydrolase 1 (peptidase C30 type)"
definition: >-
  The SARS coronavirus main protease dimer (Mpro) is the key enzyme in the processing of the viral polyproteins and thus an attractive target for the discovery of drugs against SARS. The SARS CoV main protease is a cysteine proteinase with a chymostrypsin-like fold. The enzyme cleaves the two overlapping translation products of the SARS coronavirus replicase gene. Hence, inhibition of Mpro leads to prevention of the proteolytic processing of coronavirus replicase polyproteins, stopping the production of of infectious virus particles. The dimer is the enzymatically active species and the conformational state of Mpro is highly pH-sensitive due to the pH-dependence of the protonation state of two histidine residues in the substrate binding site.
