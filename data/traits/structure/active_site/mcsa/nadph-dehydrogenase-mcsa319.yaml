identifier: MCSA:319
label: "NADPH dehydrogenase"
definition: >-
  NADPH dehydrogenase, or old yellow enzyme (OYE), isolated from <i>Candida albicans</i>, is a NADPH oxidoreductase. Its FMN cofactor (in plants the cofactor is FAD) is reduced by NADPH, and in turn goes on to reduce the substrate. The exact physiological substrate(s) of OYE are yet to be confirmed, though it is known to act on molecular oxygen, alpha,beta-unsaturated ketones and aldehydes, and quinones. OYE is thought to be involved in general detoxification within the cell.
