identifier: MCSA:353
label: UDP-N-acetylenolpyruvylglucosamine reductase (MurB)
definition: >-
  UDP-N-acetylenolpyruvylglucosamine reductase (MurB) reduces both E and Z isomers of enolbutyryl-UDP-GlcBAc analogs of the C3 enolpyruvate substate to UDP-methyl-N-acetylmuramic acid in the presence of NADPH. The overall product of this metabolic pathway, petidoglycan, is a biopolymer unique to Gram-positive and Gram-negative bacteria for which is essential for maintaining osmotic cell wall integrity. The absence of a homologue in eukaryotic cells makes MurB an attractive target for small molecule inhibitors with the potential to have broad antibacterial activity. The ability of MurB to catalyse the stereo-selective reduction of both E and Z isomers of the substrate is thought to result from the active site architecture restricting free rotation around the C2-C3 bond, and slowing the rate relative to reprotonation. Structural data show the functional groups thought to be involved in the hydride transfer to C3 and protonation at C2 of the enol-ether substrate are arranged anti relative to the enol-double bond. From this information, the stereochemical outcome was predicted to yield a 2R,3R-dideuterio product. This product was later identified using chemical synthetic analysis and comparative NMR.
