identifier: MCSA:572
label: catalase (manganese dependent)
definition: >-
  The catalases are important antioxidant defence enzymes found in a broad range of microorganisms in microaerophilic environments. Manganese catalase, isolated from Lactobacillus plantarum, is a nonheme catalase containing a binuclear manganese cluster, and is responsible for catalysing the disproportionation of hydrogen peroxide into water and dioxygen. The enzyme is a hexamer of identical subunits organised around a catalytic core of close-packed four-helix bundle domains. Manganese catalase catalyses the disproportionation of toxic hydrogen peroxide into dioxygen and water. The overall reaction consists of two distinct half reactions involving alternate reduction and oxidation of the peroxide substrate. An m(1,3)-bridging glutamate anchors the two ions in the binuclear cluster, and each Mn is further coordinated by one histidine and one glutamate bound to opposite sides of the cluster. The Mn core is completed by two solvent derived oxygen bridges, which are structurally distinct.
