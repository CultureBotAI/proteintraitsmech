identifier: MCSA:966
label: dGTPase
definition: >-
  Deoxyguanosinetriphosphate triphosphohydrolase (dGTPase) is a triphosphohydrolase that has a preference for dGTP over other dNTPs, they hydrolase dGTP to form deoxyguanosine and triphosphate. <i>Escherichia coli</i> dGTPase (Dgt) has been shown to have a strong single-stranded DNA-binding (ssDNA) activity [PMID:25694425] which is thought to act as an allosteric regulator.
