identifier: MCSA:401
label: "bile salt-activated lipase"
definition: >-
  Bile salt-activated lipase (BAL) is one of two lipases secreted from the vertebrate pancreas into the intestine for the digestion of fat. It also catalyses vitamin absorption. It acts in concert with pancreatic lipase and colipase for the complete digestion of dietary triglycerides. <br/><br/> In a few mammals, BAL is also present in the milk to facilitate fat absorption in infants. Because of its wide range of substrate reactivities, BAL has been documented with several different names, including pancreatic carboxylester lipase, pancreatic cholesterol esterase, triacylglycerol lipase and lysophospholipase. There is evidence to support the importance of BAL for the absorption of cholesterol, vitamin A and triacylglycerol. The hydrolytic activity of BAL on naturally occurring lipids requires the presence of bile salt.
