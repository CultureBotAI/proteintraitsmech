identifier: MCSA:449
label: cystathionine beta-lyase
definition: >-
  Cystathionine beta-lyase is a member of the gamma family of PLP dependent enzymes, and cleaves C(beta)-S bonds in a variety of substrates. The enzyme is important in plant and microbial biosynthesis of methionine, catalysing the cleavage of L-cystathionine to L-homocysteine, pyruvate and ammonia. <br/><br/> The enzyme cleaves a carbon-sulfur bond, releasing L-homocysteine and an unstable enamine product that tautomerises to an imine form, which undergoes a hydrolytic deamination to form pyruvate and ammonia. The latter reaction can occur spontaneously. The enzyme from some sources also acts on L-cystine, forming pyruvate, ammonia and cysteine persulfide, and a number of related compounds.
