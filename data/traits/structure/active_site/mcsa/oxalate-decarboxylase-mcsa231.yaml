identifier: MCSA:231
label: "oxalate decarboxylase"
definition: >-
  <p>Oxalate decarboxylase (OxdC), isolated from <i>Bacillus subtilus</i>, catalyses the conversion of oxalate into formate and carbon dioxide. OxdC is part of the bicupin (contain two copies of the cupin domain) subset of the cupin superfamily. The enzymes requires Mn(II) and dioxygen as cofactors. The enzyme contains two manganese binding sites but it is currently thought that only the N-terminal site I possesses catalytic activity and that the C-terminal site II is structural. However, the matter is the subject of ongoing debate. Further, this enzyme contains an unusual cofactor in the form of molecular oxygen, which is thought to act as an activator to the Mn(II) centre by increasing its redox potential.</p>
