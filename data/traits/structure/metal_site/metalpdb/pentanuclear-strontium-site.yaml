identifier: proteintraitsmech:METALPDB_SR_PENTANUCLEAR
label: "pentanuclear strontium site"
definition: >-
  A structural metal-binding site in which strontium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear strontium site (5 metal ions per site). Across the MetalPDB release this class aggregates 25 metal-site occurrences in 17 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are KX(1)N (5); Gln (3); DX(173)A (2). Typical coordination geometry: irregular, trigonal prism, square-face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
