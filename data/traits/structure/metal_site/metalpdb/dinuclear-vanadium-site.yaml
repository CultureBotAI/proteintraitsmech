identifier: proteintraitsmech:METALPDB_V_DINUCLEAR
label: "dinuclear vanadium site"
definition: >-
  A structural metal-binding site in which vanadium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear vanadium site (2 metal ions per site). Across the MetalPDB release this class aggregates 91 metal-site occurrences in 60 PDB structures (31+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (21); His (3); Cys (3). Typical coordination geometry: trigonal bipyramid, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
