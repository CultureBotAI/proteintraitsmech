identifier: proteintraitsmech:METALPDB_RH_MONONUCLEAR
label: "mononuclear rhodium site"
definition: >-
  A structural metal-binding site in which rhodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear rhodium site (1 metal ion per site). Across the MetalPDB release this class aggregates 46 metal-site occurrences in 20 PDB structures (6+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (6); His (4); Glu (1). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
