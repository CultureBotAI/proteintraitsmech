identifier: proteintraitsmech:METALPDB_SR_HEXANUCLEAR
label: "hexanuclear strontium site"
definition: >-
  A structural metal-binding site in which strontium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear strontium site (6 metal ions per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 3 PDB structures (0+ distinct UniProt proteins). Typical coordination geometry: octahedron, square antiprism with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
