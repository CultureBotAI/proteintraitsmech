identifier: proteintraitsmech:METALPDB_MG_TETRANUCLEAR
label: "tetranuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear magnesium site (4 metal ions per site). Across the MetalPDB release this class aggregates 958 metal-site occurrences in 324 PDB structures (83+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (35); Asp (27); Ala (12). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
