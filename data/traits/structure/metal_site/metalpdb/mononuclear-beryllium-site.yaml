identifier: proteintraitsmech:METALPDB_BE_MONONUCLEAR
label: "mononuclear beryllium site"
definition: >-
  A structural metal-binding site in which beryllium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear beryllium site (1 metal ion per site). Across the MetalPDB release this class aggregates 61 metal-site occurrences in 17 PDB structures (19+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (8); Ser (5); Thr (2). Typical coordination geometry: irregular, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
