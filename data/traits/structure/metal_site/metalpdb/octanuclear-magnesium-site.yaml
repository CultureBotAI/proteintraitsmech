identifier: proteintraitsmech:METALPDB_MG_OCTANUCLEAR
label: "octanuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear magnesium site (8 metal ions per site). Across the MetalPDB release this class aggregates 29 metal-site occurrences in 16 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Arg (2); Lys (1); Thr (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
