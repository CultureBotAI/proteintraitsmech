identifier: proteintraitsmech:METALPDB_MO_OCTANUCLEAR
label: "octanuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear molybdenum site (8 metal ions per site). Across the MetalPDB release this class aggregates 122 metal-site occurrences in 57 PDB structures (8+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (114); Glu (8); Ser (2). Typical coordination geometry: octahedron, pentagonal bipyramid with a vacancy. Recurring cofactor context: Mix(,Fe,Mo,)-Het(,S,C,), Mix(,Fe,Mo,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
