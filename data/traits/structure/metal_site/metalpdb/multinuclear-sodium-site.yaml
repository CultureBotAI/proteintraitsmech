identifier: proteintraitsmech:METALPDB_NA_MULTINUCLEAR
label: "multinuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear sodium site (multiple metal ions per site). Across the MetalPDB release this class aggregates 13 metal-site occurrences in 5 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (35); Arg (19); Glu (17). Typical coordination geometry: trigonal plane with a vacancy, irregular.
