identifier: proteintraitsmech:METALPDB_RB_MONONUCLEAR
label: "mononuclear rubidium site"
definition: >-
  A structural metal-binding site in which rubidium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear rubidium site (1 metal ion per site). Across the MetalPDB release this class aggregates 159 metal-site occurrences in 45 PDB structures (24+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Thr (6); LX(2)VX(2)L (6); LX(0)KX(1)AX(18)D (5). Typical coordination geometry: irregular, square pyramid with a vacancy.
