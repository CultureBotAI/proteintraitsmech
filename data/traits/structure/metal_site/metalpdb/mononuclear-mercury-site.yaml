identifier: proteintraitsmech:METALPDB_HG_MONONUCLEAR
label: "mononuclear mercury site"
definition: >-
  A structural metal-binding site in which mercury is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear mercury site (1 metal ion per site). Across the MetalPDB release this class aggregates 1812 metal-site occurrences in 620 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (704); QX(68)C (102); His (57). Typical coordination geometry: irregular, linear.
definition_source: "MetalPDB (CERM, University of Florence)"
