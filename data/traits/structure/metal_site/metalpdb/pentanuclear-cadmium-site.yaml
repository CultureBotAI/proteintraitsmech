identifier: proteintraitsmech:METALPDB_CD_PENTANUCLEAR
label: "pentanuclear cadmium site"
definition: >-
  A structural metal-binding site in which cadmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear cadmium site (5 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 4 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (4); DX(155)EX(102)D (1); DX(261)D (1). Typical coordination geometry: square plane with a vacancy, pentagonal bipyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
