identifier: proteintraitsmech:METALPDB_BA_TRINUCLEAR
label: "trinuclear barium site"
definition: >-
  A structural metal-binding site in which barium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear barium site (3 metal ions per site). Across the MetalPDB release this class aggregates 23 metal-site occurrences in 18 PDB structures (6+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are E, G (2); Asp (2); DX(1)D (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
