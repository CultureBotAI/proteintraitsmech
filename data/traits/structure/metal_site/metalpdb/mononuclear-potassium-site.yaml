identifier: proteintraitsmech:METALPDB_K_MONONUCLEAR
label: "mononuclear potassium site"
definition: >-
  A structural metal-binding site in which potassium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear potassium site (1 metal ion per site). Across the MetalPDB release this class aggregates 6494 metal-site occurrences in 2234 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (95); FX(2)SX(2)VX(39)S (90); Glu (82). Typical coordination geometry: irregular, square pyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
