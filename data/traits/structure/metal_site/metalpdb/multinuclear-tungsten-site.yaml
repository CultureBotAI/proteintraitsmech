identifier: proteintraitsmech:METALPDB_W_MULTINUCLEAR
label: "multinuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear tungsten site (multiple metal ions per site). Across the MetalPDB release this class aggregates 87 metal-site occurrences in 18 PDB structures (21+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Arg (5); Lys (4); Glu (3). Typical coordination geometry: octahedron, irregular.
