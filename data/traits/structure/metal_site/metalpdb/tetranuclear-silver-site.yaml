identifier: proteintraitsmech:METALPDB_AG_TETRANUCLEAR
label: "tetranuclear silver site"
definition: >-
  A structural metal-binding site in which silver is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear silver site (4 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 3 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(2)C (5); Cys (4); C, TX(0)C (2). Typical coordination geometry: trigonal bipyramid with a vacancy, irregular. Recurring cofactor context: Mix(,Fe,Ag,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
