identifier: proteintraitsmech:METALPDB_W_MONONUCLEAR
label: "mononuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear tungsten site (1 metal ion per site). Across the MetalPDB release this class aggregates 151 metal-site occurrences in 58 PDB structures (60+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (20); Cys (14); DX(64)E (5). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
