identifier: proteintraitsmech:METALPDB_V_TRINUCLEAR
label: "trinuclear vanadium site"
definition: >-
  A structural metal-binding site in which vanadium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear vanadium site (3 metal ions per site). Across the MetalPDB release this class aggregates 10 metal-site occurrences in 6 PDB structures (6+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Thr (3); His (1); Glu (1). Typical coordination geometry: trigonal bipyramid, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
