identifier: proteintraitsmech:METALPDB_AU_PENTANUCLEAR
label: "pentanuclear gold site"
definition: >-
  A structural metal-binding site in which gold is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear gold site (5 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are HX(11)C (1); Cys (1). Typical coordination geometry: linear.
definition_source: "MetalPDB (CERM, University of Florence)"
