identifier: proteintraitsmech:METALPDB_DY_MONONUCLEAR
label: "mononuclear dysprosium site"
definition: >-
  A structural metal-binding site in which dysprosium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear dysprosium site (1 metal ion per site). Across the MetalPDB release this class aggregates 22 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (12); Asp (8); E, E (1). Typical coordination geometry: irregular, tetrahedron with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
