identifier: proteintraitsmech:METALPDB_BA_DINUCLEAR
label: "dinuclear barium site"
definition: >-
  A structural metal-binding site in which barium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear barium site (2 metal ions per site). Across the MetalPDB release this class aggregates 81 metal-site occurrences in 44 PDB structures (15+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are SX(1)SX(98)D (5); Asp (4); Tyr (2). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
