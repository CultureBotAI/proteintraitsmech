identifier: proteintraitsmech:METALPDB_NI_TRINUCLEAR
label: "trinuclear nickel site"
definition: >-
  A structural metal-binding site in which nickel is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear nickel site (3 metal ions per site). Across the MetalPDB release this class aggregates 17 metal-site occurrences in 13 PDB structures (8+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (5); EX(35)EX(27)DX(41)D (2); EX(2)H (2). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
