identifier: proteintraitsmech:METALPDB_CU_HEXANUCLEAR
label: "hexanuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear copper site (6 metal ions per site). Across the MetalPDB release this class aggregates 24 metal-site occurrences in 5 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are HX(11)CX(3)E (19); CX(85)CX(1)C (16); C, E (10). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
