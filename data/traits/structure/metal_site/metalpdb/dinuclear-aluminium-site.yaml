identifier: proteintraitsmech:METALPDB_AL_DINUCLEAR
label: "dinuclear aluminium site"
definition: >-
  A structural metal-binding site in which aluminium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear aluminium site (2 metal ions per site). Across the MetalPDB release this class aggregates 332 metal-site occurrences in 165 PDB structures (94+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (45); EX(35)EX(27)DX(47)D (4); His (3). Typical coordination geometry: octahedron, square pyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
