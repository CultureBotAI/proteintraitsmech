identifier: proteintraitsmech:METALPDB_TA_HEXANUCLEAR
label: "hexanuclear tantalum site"
definition: >-
  A structural metal-binding site in which tantalum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear tantalum site (6 metal ions per site). Across the MetalPDB release this class aggregates 90 metal-site occurrences in 19 PDB structures (22+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (7); Asp (5); Lys (1). Typical coordination geometry: square plane, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
