identifier: proteintraitsmech:METALPDB_FE_MONONUCLEAR
label: "mononuclear iron site"
definition: >-
  A structural metal-binding site in which iron is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear iron site (1 metal ion per site). Across the MetalPDB release this class aggregates 17481 metal-site occurrences in 6829 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (4740); Cys (2791); Tyr (557). Typical coordination geometry: octahedron, square pyramid. Recurring cofactor context: Fe-Heme.
definition_source: "MetalPDB (CERM, University of Florence)"
