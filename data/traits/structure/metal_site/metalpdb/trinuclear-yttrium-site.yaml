identifier: proteintraitsmech:METALPDB_Y_TRINUCLEAR
label: "trinuclear yttrium site"
definition: >-
  A structural metal-binding site in which yttrium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear yttrium site (3 metal ions per site). Across the MetalPDB release this class aggregates 13 metal-site occurrences in 11 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Pro (9); D, D (2); Arg (2). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
