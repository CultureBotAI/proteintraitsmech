identifier: proteintraitsmech:METALPDB_CA_MONONUCLEAR
label: "mononuclear calcium site"
definition: >-
  A structural metal-binding site in which calcium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear calcium site (1 metal ion per site). Across the MetalPDB release this class aggregates 26532 metal-site occurrences in 9650 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (993); Glu (883); EX(1)NX(2)VX(4)E (522). Typical coordination geometry: irregular, pentagonal bipyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
