identifier: proteintraitsmech:METALPDB_W_TETRANUCLEAR
label: "tetranuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear tungsten site (4 metal ions per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 2 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Ser (2). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
