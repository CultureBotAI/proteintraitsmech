identifier: proteintraitsmech:METALPDB_V_TETRANUCLEAR
label: "tetranuclear vanadium site"
definition: >-
  A structural metal-binding site in which vanadium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear vanadium site (4 metal ions per site). Across the MetalPDB release this class aggregates 9 metal-site occurrences in 6 PDB structures (6+ distinct UniProt proteins). Typical coordination geometry: tetrahedron, trigonal bipyramid.
