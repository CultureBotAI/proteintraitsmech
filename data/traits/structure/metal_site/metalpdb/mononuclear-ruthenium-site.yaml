identifier: proteintraitsmech:METALPDB_RU_MONONUCLEAR
label: "mononuclear ruthenium site"
definition: >-
  A structural metal-binding site in which ruthenium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear ruthenium site (1 metal ion per site). Across the MetalPDB release this class aggregates 263 metal-site occurrences in 156 PDB structures (41+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (53); Asp (14); EX(2)E (7). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
