identifier: proteintraitsmech:METALPDB_CU_HEPTANUCLEAR
label: "heptanuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear copper site (7 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(1)CX(14)C (2); CX(12)C (2); CX(2)CX(21)C (2). Typical coordination geometry: trigonal plane, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
