identifier: proteintraitsmech:METALPDB_CD_DINUCLEAR
label: "dinuclear cadmium site"
definition: >-
  A structural metal-binding site in which cadmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear cadmium site (2 metal ions per site). Across the MetalPDB release this class aggregates 562 metal-site occurrences in 314 PDB structures (145+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (144); Asp (80); His (76). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
