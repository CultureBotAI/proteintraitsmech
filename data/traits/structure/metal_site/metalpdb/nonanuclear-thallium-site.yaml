identifier: proteintraitsmech:METALPDB_TL_NONANUCLEAR
label: "nonanuclear thallium site"
definition: >-
  A structural metal-binding site in which thallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a nonanuclear thallium site (9 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (0+ distinct UniProt proteins). Typical coordination geometry: irregular.
