identifier: proteintraitsmech:METALPDB_GD_DINUCLEAR
label: "dinuclear gadolinium site"
definition: >-
  A structural metal-binding site in which gadolinium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear gadolinium site (2 metal ions per site). Across the MetalPDB release this class aggregates 11 metal-site occurrences in 11 PDB structures (10+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (4); Asp (3); DX(3)E (2). Typical coordination geometry: irregular, square plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
