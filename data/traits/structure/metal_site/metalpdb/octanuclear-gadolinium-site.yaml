identifier: proteintraitsmech:METALPDB_GD_OCTANUCLEAR
label: "octanuclear gadolinium site"
definition: >-
  A structural metal-binding site in which gadolinium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear gadolinium site (8 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (4); DX(42)D (1). Typical coordination geometry: irregular, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
