identifier: proteintraitsmech:METALPDB_CU_DINUCLEAR
label: "dinuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear copper site (2 metal ions per site). Across the MetalPDB release this class aggregates 761 metal-site occurrences in 347 PDB structures (112+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are HX(1)HX(14)HX(56)H (171); HX(49)HX(0)H (70); HX(34)CX(3)CX(6)M (66). Typical coordination geometry: irregular, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
