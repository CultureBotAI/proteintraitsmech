identifier: proteintraitsmech:METALPDB_AL_TRINUCLEAR
label: "trinuclear aluminium site"
definition: >-
  A structural metal-binding site in which aluminium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear aluminium site (3 metal ions per site). Across the MetalPDB release this class aggregates 61 metal-site occurrences in 26 PDB structures (18+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (8); Ser (3). Typical coordination geometry: octahedron, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
