identifier: proteintraitsmech:METALPDB_CA_MULTINUCLEAR
label: "multinuclear calcium site"
definition: >-
  A structural metal-binding site in which calcium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear calcium site (multiple metal ions per site). Across the MetalPDB release this class aggregates 7 metal-site occurrences in 4 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are GX(1)GX(1)DX(13)AX(1)TX(2)D (12); GX(1)DX(1)DX(13)AX(1)TX(2)D (4); GX(1)GX(1)DX(13)MX(1)TX(2)D (4). Typical coordination geometry: octahedron, face monocapped, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
