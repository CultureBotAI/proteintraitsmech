identifier: proteintraitsmech:METALPDB_CU_PENTANUCLEAR
label: "pentanuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear copper site (5 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 2 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(2)C (12); C, C, C (4); HX(296)H (1). Typical coordination geometry: tetrahedron, trigonal plane.
definition_source: "MetalPDB (CERM, University of Florence)"
