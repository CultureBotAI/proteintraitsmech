identifier: proteintraitsmech:METALPDB_MN_TRINUCLEAR
label: "trinuclear manganese site"
definition: >-
  A structural metal-binding site in which manganese is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear manganese site (3 metal ions per site). Across the MetalPDB release this class aggregates 303 metal-site occurrences in 164 PDB structures (75+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(119)HX(80)E (30); EX(69)E (30); EX(60)EX(6)E (30). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
