identifier: proteintraitsmech:METALPDB_SC_DINUCLEAR
label: "dinuclear scandium site"
definition: >-
  A structural metal-binding site in which scandium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear scandium site (2 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (1). Typical coordination geometry: octahedron.
