identifier: proteintraitsmech:METALPDB_FE_OCTANUCLEAR
label: "octanuclear iron site"
definition: >-
  A structural metal-binding site in which iron is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear iron site (8 metal ions per site). Across the MetalPDB release this class aggregates 218 metal-site occurrences in 52 PDB structures (12+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (882); CX(34)S (42); CX(117)S (6). Typical coordination geometry: tetrahedron, tetrahedron with a vacancy. Recurring cofactor context: Pur(,Fe,)-Hom(,S,), Mix(,Fe,Mo,)-Het(,S,C,).
definition_source: "MetalPDB (CERM, University of Florence)"
