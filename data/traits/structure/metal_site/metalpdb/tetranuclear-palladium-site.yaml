identifier: proteintraitsmech:METALPDB_PD_TETRANUCLEAR
label: "tetranuclear palladium site"
definition: >-
  A structural metal-binding site in which palladium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear palladium site (4 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(2)CX(3)R (2); Glu (2); EX(6)R (1). Typical coordination geometry: trigonal plane with a vacancy, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
