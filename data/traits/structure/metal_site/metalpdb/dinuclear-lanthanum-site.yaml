identifier: proteintraitsmech:METALPDB_LA_DINUCLEAR
label: "dinuclear lanthanum site"
definition: >-
  A structural metal-binding site in which lanthanum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear lanthanum site (2 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (1); EX(3)D (1); K, E (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
