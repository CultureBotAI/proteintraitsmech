identifier: proteintraitsmech:METALPDB_TB_DINUCLEAR
label: "dinuclear terbium site"
definition: >-
  A structural metal-binding site in which terbium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear terbium site (2 metal ions per site). Across the MetalPDB release this class aggregates 7 metal-site occurrences in 3 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(0)HX(81)DX(62)H (4); Glu (2). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
