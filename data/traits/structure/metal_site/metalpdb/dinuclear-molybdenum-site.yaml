identifier: proteintraitsmech:METALPDB_MO_DINUCLEAR
label: "dinuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear molybdenum site (2 metal ions per site). Across the MetalPDB release this class aggregates 39 metal-site occurrences in 22 PDB structures (12+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gln (6); His (5); Asp (4). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
