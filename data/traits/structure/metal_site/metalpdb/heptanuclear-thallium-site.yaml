identifier: proteintraitsmech:METALPDB_TL_HEPTANUCLEAR
label: "heptanuclear thallium site"
definition: >-
  A structural metal-binding site in which thallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear thallium site (7 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (0+ distinct UniProt proteins). Typical coordination geometry: irregular, trigonal prism, square-face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
