identifier: proteintraitsmech:METALPDB_YB_TRINUCLEAR
label: "trinuclear ytterbium site"
definition: >-
  A structural metal-binding site in which ytterbium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear ytterbium site (3 metal ions per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 2 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (4); His (1); DX(1)DX(83)H (1). Typical coordination geometry: irregular, linear.
definition_source: "MetalPDB (CERM, University of Florence)"
