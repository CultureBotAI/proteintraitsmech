identifier: proteintraitsmech:METALPDB_MO_MONONUCLEAR
label: "mononuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear molybdenum site (1 metal ion per site). Across the MetalPDB release this class aggregates 348 metal-site occurrences in 167 PDB structures (56+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (73); Ser (55); Asp (26). Typical coordination geometry: irregular, trigonal prism.
definition_source: "MetalPDB (CERM, University of Florence)"
