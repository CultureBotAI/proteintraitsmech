identifier: proteintraitsmech:METALPDB_V_HEPTANUCLEAR
label: "heptanuclear vanadium site"
definition: >-
  A structural metal-binding site in which vanadium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear vanadium site (7 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Arg (2); Ser (1). Typical coordination geometry: irregular, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
