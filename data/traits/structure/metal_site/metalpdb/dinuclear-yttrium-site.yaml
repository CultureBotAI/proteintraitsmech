identifier: proteintraitsmech:METALPDB_Y_DINUCLEAR
label: "dinuclear yttrium site"
definition: >-
  A structural metal-binding site in which yttrium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear yttrium site (2 metal ions per site). Across the MetalPDB release this class aggregates 18 metal-site occurrences in 16 PDB structures (9+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (9); Asp (7); DX(1)D (2). Typical coordination geometry: irregular, square plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
