identifier: proteintraitsmech:METALPDB_RE_TRINUCLEAR
label: "trinuclear rhenium site"
definition: >-
  A structural metal-binding site in which rhenium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear rhenium site (3 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Leu (2).
definition_source: "MetalPDB (CERM, University of Florence)"
