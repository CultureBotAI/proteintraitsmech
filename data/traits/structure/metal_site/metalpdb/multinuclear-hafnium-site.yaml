identifier: proteintraitsmech:METALPDB_HF_MULTINUCLEAR
label: "multinuclear hafnium site"
definition: >-
  A structural metal-binding site in which hafnium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear hafnium site (multiple metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: irregular.
