identifier: proteintraitsmech:METALPDB_CO_DINUCLEAR
label: "dinuclear cobalt site"
definition: >-
  A structural metal-binding site in which cobalt is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear cobalt site (2 metal ions per site). Across the MetalPDB release this class aggregates 411 metal-site occurrences in 236 PDB structures (71+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are HX(28)H (97); DX(62)HX(32)EX(30)E (55); DX(10)DX(126)E (55). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
