identifier: proteintraitsmech:METALPDB_NA_OCTANUCLEAR
label: "octanuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear sodium site (8 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 5 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (4); Gln (2); NX(2)S (2). Typical coordination geometry: tetrahedron with a vacancy, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
