identifier: proteintraitsmech:METALPDB_BA_PENTANUCLEAR
label: "pentanuclear barium site"
definition: >-
  A structural metal-binding site in which barium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear barium site (5 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are SX(21)E (2); Ser (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
