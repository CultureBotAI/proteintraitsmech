identifier: proteintraitsmech:METALPDB_LA_TRINUCLEAR
label: "trinuclear lanthanum site"
definition: >-
  A structural metal-binding site in which lanthanum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear lanthanum site (3 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are IX(1)DX(23)N (2); Asp (1); DX(52)DX(0)YX(0)D (1). Typical coordination geometry: irregular, pentagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
