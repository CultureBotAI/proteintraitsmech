identifier: proteintraitsmech:METALPDB_V_DECANUCLEAR
label: "decanuclear vanadium site"
definition: >-
  A structural metal-binding site in which vanadium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a decanuclear vanadium site (10 metal ions per site). Across the MetalPDB release this class aggregates 14 metal-site occurrences in 5 PDB structures (5+ distinct UniProt proteins). Typical coordination geometry: octahedron, pentagonal bipyramid with a vacancy.
