identifier: proteintraitsmech:METALPDB_LU_DINUCLEAR
label: "dinuclear lutetium site"
definition: >-
  A structural metal-binding site in which lutetium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear lutetium site (2 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 3 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(28)D (2); NX(12)D (1); DX(127)D (1). Typical coordination geometry: irregular, octahedron, face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
