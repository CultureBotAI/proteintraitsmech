identifier: proteintraitsmech:METALPDB_CU_MULTINUCLEAR
label: "multinuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear copper site (multiple metal ions per site). Across the MetalPDB release this class aggregates 9 metal-site occurrences in 7 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(3)C (54); CX(62)C (7); CX(25)CX(56)C (6). Typical coordination geometry: square plane with a vacancy, linear.
definition_source: "MetalPDB (CERM, University of Florence)"
