identifier: proteintraitsmech:METALPDB_TA_MONONUCLEAR
label: "mononuclear tantalum site"
definition: >-
  A structural metal-binding site in which tantalum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear tantalum site (1 metal ion per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (1).
