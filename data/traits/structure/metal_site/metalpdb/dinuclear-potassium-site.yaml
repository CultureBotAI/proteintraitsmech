identifier: proteintraitsmech:METALPDB_K_DINUCLEAR
label: "dinuclear potassium site"
definition: >-
  A structural metal-binding site in which potassium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear potassium site (2 metal ions per site). Across the MetalPDB release this class aggregates 1042 metal-site occurrences in 487 PDB structures (105+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(1)DX(1)HX(18)SX(0)L (218); DX(1)DX(1)HX(18)SX(0)V (85); TX(20)K (41). Typical coordination geometry: irregular, pentagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
