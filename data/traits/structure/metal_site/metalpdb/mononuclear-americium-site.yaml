identifier: proteintraitsmech:METALPDB_AM_MONONUCLEAR
label: "mononuclear americium site"
definition: >-
  A structural metal-binding site in which americium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear americium site (1 metal ion per site). Across the MetalPDB release this class aggregates 6 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: irregular, trigonal prism, square-face bicapped.
definition_source: "MetalPDB (CERM, University of Florence)"
