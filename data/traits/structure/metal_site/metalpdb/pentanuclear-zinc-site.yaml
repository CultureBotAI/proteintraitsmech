identifier: proteintraitsmech:METALPDB_ZN_PENTANUCLEAR
label: "pentanuclear zinc site"
definition: >-
  A structural metal-binding site in which zinc is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear zinc site (5 metal ions per site). Across the MetalPDB release this class aggregates 19 metal-site occurrences in 12 PDB structures (10+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (8); CX(85)CX(1)C (6); His (5). Typical coordination geometry: irregular, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
