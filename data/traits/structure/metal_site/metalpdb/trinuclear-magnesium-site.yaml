identifier: proteintraitsmech:METALPDB_MG_TRINUCLEAR
label: "trinuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear magnesium site (3 metal ions per site). Across the MetalPDB release this class aggregates 3866 metal-site occurrences in 1026 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (391); DX(3)D (318); Glu (133). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
