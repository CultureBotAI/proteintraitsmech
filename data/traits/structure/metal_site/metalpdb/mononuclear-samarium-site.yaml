identifier: proteintraitsmech:METALPDB_SM_MONONUCLEAR
label: "mononuclear samarium site"
definition: >-
  A structural metal-binding site in which samarium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear samarium site (1 metal ion per site). Across the MetalPDB release this class aggregates 126 metal-site occurrences in 37 PDB structures (32+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (12); EX(2)E (9); DX(108)D (8). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
