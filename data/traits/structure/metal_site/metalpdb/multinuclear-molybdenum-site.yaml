identifier: proteintraitsmech:METALPDB_MO_MULTINUCLEAR
label: "multinuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear molybdenum site (multiple metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 5 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
