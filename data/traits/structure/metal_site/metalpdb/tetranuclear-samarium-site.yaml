identifier: proteintraitsmech:METALPDB_SM_TETRANUCLEAR
label: "tetranuclear samarium site"
definition: >-
  A structural metal-binding site in which samarium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear samarium site (4 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (2); EX(20)D (1); EX(18)DX(1)D (1). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
