identifier: proteintraitsmech:METALPDB_W_TRINUCLEAR
label: "trinuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear tungsten site (3 metal ions per site). Across the MetalPDB release this class aggregates 14 metal-site occurrences in 6 PDB structures (6+ distinct UniProt proteins). Typical coordination geometry: tetrahedron, irregular.
