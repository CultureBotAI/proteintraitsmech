identifier: proteintraitsmech:METALPDB_CS_MONONUCLEAR
label: "mononuclear caesium site"
definition: >-
  A structural metal-binding site in which caesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear caesium site (1 metal ion per site). Across the MetalPDB release this class aggregates 591 metal-site occurrences in 114 PDB structures (72+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Ser (17); Asp (13); Ala (11). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
