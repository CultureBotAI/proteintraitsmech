identifier: proteintraitsmech:METALPDB_BE_TRINUCLEAR
label: "trinuclear beryllium site"
definition: >-
  A structural metal-binding site in which beryllium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear beryllium site (3 metal ions per site). Across the MetalPDB release this class aggregates 49 metal-site occurrences in 6 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (21); His (4); Thr (3). Typical coordination geometry: irregular, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
