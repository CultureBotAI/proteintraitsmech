identifier: proteintraitsmech:METALPDB_SM_DINUCLEAR
label: "dinuclear samarium site"
definition: >-
  A structural metal-binding site in which samarium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear samarium site (2 metal ions per site). Across the MetalPDB release this class aggregates 19 metal-site occurrences in 14 PDB structures (9+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(1)EX(253)E (5); EX(255)E (5); Glu (3). Typical coordination geometry: irregular, pentagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
