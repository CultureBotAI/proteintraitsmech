identifier: proteintraitsmech:METALPDB_IR_DINUCLEAR
label: "dinuclear iridium site"
definition: >-
  A structural metal-binding site in which iridium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear iridium site (2 metal ions per site). Across the MetalPDB release this class aggregates 28 metal-site occurrences in 23 PDB structures (6+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (5); QX(0)HX(28)K (1); QX(0)H (1). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
