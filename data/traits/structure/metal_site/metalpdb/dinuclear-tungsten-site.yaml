identifier: proteintraitsmech:METALPDB_W_DINUCLEAR
label: "dinuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear tungsten site (2 metal ions per site). Across the MetalPDB release this class aggregates 52 metal-site occurrences in 20 PDB structures (15+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (20); Asp (18); His (5). Typical coordination geometry: irregular, pentagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
