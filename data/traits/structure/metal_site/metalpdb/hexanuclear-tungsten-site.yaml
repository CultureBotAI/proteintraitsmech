identifier: proteintraitsmech:METALPDB_W_HEXANUCLEAR
label: "hexanuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear tungsten site (6 metal ions per site). Across the MetalPDB release this class aggregates 17 metal-site occurrences in 6 PDB structures (6+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (5); Arg (1). Typical coordination geometry: octahedron, octahedron, face monocapped.
definition_source: "MetalPDB (CERM, University of Florence)"
