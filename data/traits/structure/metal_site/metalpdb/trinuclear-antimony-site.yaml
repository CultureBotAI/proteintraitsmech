identifier: proteintraitsmech:METALPDB_SB_TRINUCLEAR
label: "trinuclear antimony site"
definition: >-
  A structural metal-binding site in which antimony is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear antimony site (3 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(34)HX(271)S (1); CX(280)H (1); CX(58)CX(249)C (1). Typical coordination geometry: trigonal bipyramid, irregular.
