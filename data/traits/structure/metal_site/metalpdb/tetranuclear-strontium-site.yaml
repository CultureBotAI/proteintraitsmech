identifier: proteintraitsmech:METALPDB_SR_TETRANUCLEAR
label: "tetranuclear strontium site"
definition: >-
  A structural metal-binding site in which strontium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear strontium site (4 metal ions per site). Across the MetalPDB release this class aggregates 62 metal-site occurrences in 29 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Arg (9); Gln (8); KX(1)N (1). Typical coordination geometry: irregular, linear.
definition_source: "MetalPDB (CERM, University of Florence)"
