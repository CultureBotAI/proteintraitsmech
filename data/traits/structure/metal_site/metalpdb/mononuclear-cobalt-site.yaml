identifier: proteintraitsmech:METALPDB_CO_MONONUCLEAR
label: "mononuclear cobalt site"
definition: >-
  A structural metal-binding site in which cobalt is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear cobalt site (1 metal ion per site). Across the MetalPDB release this class aggregates 2729 metal-site occurrences in 999 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (312); CX(3)S (51); Asp (41). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
