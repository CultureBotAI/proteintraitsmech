identifier: proteintraitsmech:METALPDB_IR_MONONUCLEAR
label: "mononuclear iridium site"
definition: >-
  A structural metal-binding site in which iridium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear iridium site (1 metal ion per site). Across the MetalPDB release this class aggregates 363 metal-site occurrences in 52 PDB structures (15+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (13); Lys (4); Met (2). Typical coordination geometry: octahedron, trigonal prism.
definition_source: "MetalPDB (CERM, University of Florence)"
