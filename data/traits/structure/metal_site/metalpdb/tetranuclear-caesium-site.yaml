identifier: proteintraitsmech:METALPDB_CS_TETRANUCLEAR
label: "tetranuclear caesium site"
definition: >-
  A structural metal-binding site in which caesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear caesium site (4 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (0+ distinct UniProt proteins). Typical coordination geometry: irregular.
