identifier: proteintraitsmech:METALPDB_ER_MONONUCLEAR
label: "mononuclear erbium site"
definition: >-
  A structural metal-binding site in which erbium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear erbium site (1 metal ion per site). Across the MetalPDB release this class aggregates 18 metal-site occurrences in 3 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (6); Asp (6); DX(1)EX(166)D (2). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
