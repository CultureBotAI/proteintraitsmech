identifier: proteintraitsmech:METALPDB_MG_PENTANUCLEAR
label: "pentanuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear magnesium site (5 metal ions per site). Across the MetalPDB release this class aggregates 392 metal-site occurrences in 172 PDB structures (37+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gln (24); Asp (11); Glu (9). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
