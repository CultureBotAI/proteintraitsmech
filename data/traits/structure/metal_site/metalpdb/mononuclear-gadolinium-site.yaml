identifier: proteintraitsmech:METALPDB_GD_MONONUCLEAR
label: "mononuclear gadolinium site"
definition: >-
  A structural metal-binding site in which gadolinium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear gadolinium site (1 metal ion per site). Across the MetalPDB release this class aggregates 210 metal-site occurrences in 66 PDB structures (36+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (32); TX(1)E (21); Asp (11). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
