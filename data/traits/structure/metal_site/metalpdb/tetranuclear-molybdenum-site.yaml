identifier: proteintraitsmech:METALPDB_MO_TETRANUCLEAR
label: "tetranuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear molybdenum site (4 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 4 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: trigonal bipyramid with a vacancy, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
