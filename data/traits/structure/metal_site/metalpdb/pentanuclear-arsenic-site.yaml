identifier: proteintraitsmech:METALPDB_AS_PENTANUCLEAR
label: "pentanuclear arsenic site"
definition: >-
  A structural metal-binding site in which arsenic is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear arsenic site (5 metal ions per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 3 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (1). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
