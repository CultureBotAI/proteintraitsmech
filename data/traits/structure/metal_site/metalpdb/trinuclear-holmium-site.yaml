identifier: proteintraitsmech:METALPDB_HO_TRINUCLEAR
label: "trinuclear holmium site"
definition: >-
  A structural metal-binding site in which holmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear holmium site (3 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(14)QX(1)D (1); DX(16)D (1); Glu (1). Typical coordination geometry: irregular.
