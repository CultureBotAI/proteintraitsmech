identifier: proteintraitsmech:METALPDB_IR_TRINUCLEAR
label: "trinuclear iridium site"
definition: >-
  A structural metal-binding site in which iridium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear iridium site (3 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 4 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (9); Thr (3); HX(123)H (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
