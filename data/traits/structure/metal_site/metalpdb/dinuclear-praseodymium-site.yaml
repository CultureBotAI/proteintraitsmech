identifier: proteintraitsmech:METALPDB_PR_DINUCLEAR
label: "dinuclear praseodymium site"
definition: >-
  A structural metal-binding site in which praseodymium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear praseodymium site (2 metal ions per site). Across the MetalPDB release this class aggregates 9 metal-site occurrences in 9 PDB structures (7+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (4); EX(3)D (2); Asp (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
