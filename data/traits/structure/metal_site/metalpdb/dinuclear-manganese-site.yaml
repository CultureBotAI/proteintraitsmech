identifier: proteintraitsmech:METALPDB_MN_DINUCLEAR
label: "dinuclear manganese site"
definition: >-
  A structural metal-binding site in which manganese is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear manganese site (2 metal ions per site). Across the MetalPDB release this class aggregates 3215 metal-site occurrences in 1451 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(1)DX(8)DX(4)H (376); DX(1)HX(105)DX(1)D (200); HX(22)DX(3)DX(103)D (188). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
