identifier: proteintraitsmech:METALPDB_MO_NONANUCLEAR
label: "nonanuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a nonanuclear molybdenum site (9 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: trigonal plane with a vacancy, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
