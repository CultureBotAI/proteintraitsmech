identifier: proteintraitsmech:METALPDB_RU_TRINUCLEAR
label: "trinuclear ruthenium site"
definition: >-
  A structural metal-binding site in which ruthenium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear ruthenium site (3 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 3 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (2); HX(15)E (1). Typical coordination geometry: linear, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
