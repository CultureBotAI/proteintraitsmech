identifier: proteintraitsmech:METALPDB_FE_HEXANUCLEAR
label: "hexanuclear iron site"
definition: >-
  A structural metal-binding site in which iron is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear iron site (6 metal ions per site). Across the MetalPDB release this class aggregates 46 metal-site occurrences in 22 PDB structures (7+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (182); CX(17)C (4); HX(18)H (4). Typical coordination geometry: tetrahedron, irregular. Recurring cofactor context: Pur(,Fe,)-Hom(,S,), Pur(,Fe,)-Het(,C,H,O,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
