identifier: proteintraitsmech:METALPDB_MG_DECANUCLEAR
label: "decanuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a decanuclear magnesium site (10 metal ions per site). Across the MetalPDB release this class aggregates 11 metal-site occurrences in 9 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gln (2); Lys (1); Glu (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
