identifier: proteintraitsmech:METALPDB_GA_MONONUCLEAR
label: "mononuclear gallium site"
definition: >-
  A structural metal-binding site in which gallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear gallium site (1 metal ion per site). Across the MetalPDB release this class aggregates 15 metal-site occurrences in 10 PDB structures (9+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(2)CX(15)CX(0)C (2); Tyr (2); HX(42)Y (2). Typical coordination geometry: octahedron, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
