identifier: proteintraitsmech:METALPDB_K_TETRANUCLEAR
label: "tetranuclear potassium site"
definition: >-
  A structural metal-binding site in which potassium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear potassium site (4 metal ions per site). Across the MetalPDB release this class aggregates 171 metal-site occurrences in 126 PDB structures (30+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Thr (52); VX(0)G (21); EX(171)EX(0)M (20). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
