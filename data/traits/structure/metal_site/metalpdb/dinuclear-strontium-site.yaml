identifier: proteintraitsmech:METALPDB_SR_DINUCLEAR
label: "dinuclear strontium site"
definition: >-
  A structural metal-binding site in which strontium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear strontium site (2 metal ions per site). Across the MetalPDB release this class aggregates 379 metal-site occurrences in 63 PDB structures (19+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (42); Gln (22); YX(2)IX(1)P (10). Typical coordination geometry: irregular, square pyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
