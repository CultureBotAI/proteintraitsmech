identifier: proteintraitsmech:METALPDB_AL_MONONUCLEAR
label: "mononuclear aluminium site"
definition: >-
  A structural metal-binding site in which aluminium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear aluminium site (1 metal ion per site). Across the MetalPDB release this class aggregates 29 metal-site occurrences in 17 PDB structures (16+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gly (5); His (3); EX(35)EX(27)DX(47)D (2). Typical coordination geometry: octahedron, square pyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
