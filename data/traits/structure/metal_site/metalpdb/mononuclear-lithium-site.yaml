identifier: proteintraitsmech:METALPDB_LI_MONONUCLEAR
label: "mononuclear lithium site"
definition: >-
  A structural metal-binding site in which lithium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear lithium site (1 metal ion per site). Across the MetalPDB release this class aggregates 120 metal-site occurrences in 70 PDB structures (47+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(2)I (12); LX(2)TX(0)QX(44)QX(28)E (10); SX(2)DX(18)H (6). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
