identifier: proteintraitsmech:METALPDB_CD_MONONUCLEAR
label: "mononuclear cadmium site"
definition: >-
  A structural metal-binding site in which cadmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear cadmium site (1 metal ion per site). Across the MetalPDB release this class aggregates 4109 metal-site occurrences in 868 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (708); Asp (570); His (466). Typical coordination geometry: irregular, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
