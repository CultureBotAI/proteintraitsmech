identifier: proteintraitsmech:METALPDB_MG_MULTINUCLEAR
label: "multinuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear magnesium site (multiple metal ions per site). Across the MetalPDB release this class aggregates 64 metal-site occurrences in 22 PDB structures (7+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Arg (9); Asp (2); Lys (2). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
