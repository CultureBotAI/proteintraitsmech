identifier: proteintraitsmech:METALPDB_TL_TETRANUCLEAR
label: "tetranuclear thallium site"
definition: >-
  A structural metal-binding site in which thallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear thallium site (4 metal ions per site). Across the MetalPDB release this class aggregates 7 metal-site occurrences in 7 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gly (2); Thr (2); TX(108)T, TX(108)T (2). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
