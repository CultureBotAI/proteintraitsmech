identifier: proteintraitsmech:METALPDB_AG_DINUCLEAR
label: "dinuclear silver site"
definition: >-
  A structural metal-binding site in which silver is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear silver site (2 metal ions per site). Across the MetalPDB release this class aggregates 13 metal-site occurrences in 5 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (8); VX(77)C (4); HX(0)H (2). Typical coordination geometry: square plane with a vacancy, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
