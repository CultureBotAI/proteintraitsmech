label: "octanuclear lithium site"
definition: >-
  A structural metal-binding site in which lithium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear lithium site (8 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (0+ distinct UniProt proteins). Typical coordination geometry: tetrahedron.
