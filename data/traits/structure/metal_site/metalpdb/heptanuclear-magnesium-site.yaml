identifier: proteintraitsmech:METALPDB_MG_HEPTANUCLEAR
label: "heptanuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear magnesium site (7 metal ions per site). Across the MetalPDB release this class aggregates 73 metal-site occurrences in 44 PDB structures (9+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are D, D (2); DX(27)D (2); Asp (2). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
