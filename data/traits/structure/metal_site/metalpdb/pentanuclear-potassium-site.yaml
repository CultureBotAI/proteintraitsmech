identifier: proteintraitsmech:METALPDB_K_PENTANUCLEAR
label: "pentanuclear potassium site"
definition: >-
  A structural metal-binding site in which potassium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear potassium site (5 metal ions per site). Across the MetalPDB release this class aggregates 127 metal-site occurrences in 100 PDB structures (18+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Thr (21); QX(89)IX(2)CX(1)VX(2)L (16); Tyr (9). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
