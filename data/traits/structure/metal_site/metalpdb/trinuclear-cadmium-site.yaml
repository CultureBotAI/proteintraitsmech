identifier: proteintraitsmech:METALPDB_CD_TRINUCLEAR
label: "trinuclear cadmium site"
definition: >-
  A structural metal-binding site in which cadmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear cadmium site (3 metal ions per site). Across the MetalPDB release this class aggregates 88 metal-site occurrences in 67 PDB structures (43+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (28); Asp (23); Cys (7). Typical coordination geometry: irregular, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
