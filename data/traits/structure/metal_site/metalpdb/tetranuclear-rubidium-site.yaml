identifier: proteintraitsmech:METALPDB_RB_TETRANUCLEAR
label: "tetranuclear rubidium site"
definition: >-
  A structural metal-binding site in which rubidium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear rubidium site (4 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are TX(0)V (1); Thr (1). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
