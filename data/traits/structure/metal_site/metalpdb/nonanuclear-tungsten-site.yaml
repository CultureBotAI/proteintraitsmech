identifier: proteintraitsmech:METALPDB_W_NONANUCLEAR
label: "nonanuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a nonanuclear tungsten site (9 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gly (1); Ala (1). Typical coordination geometry: trigonal plane with a vacancy, square plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
