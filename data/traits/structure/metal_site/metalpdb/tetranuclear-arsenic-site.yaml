identifier: proteintraitsmech:METALPDB_AS_TETRANUCLEAR
label: "tetranuclear arsenic site"
definition: >-
  A structural metal-binding site in which arsenic is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear arsenic site (4 metal ions per site). Across the MetalPDB release this class aggregates 36 metal-site occurrences in 24 PDB structures (16+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(39)D (2); Cys (1). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
