identifier: proteintraitsmech:METALPDB_FE_HEPTANUCLEAR
label: "heptanuclear iron site"
definition: >-
  A structural metal-binding site in which iron is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear iron site (7 metal ions per site). Across the MetalPDB release this class aggregates 8 metal-site occurrences in 4 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (52); CX(34)S (2). Typical coordination geometry: tetrahedron, trigonal bipyramid with a vacancy. Recurring cofactor context: Pur(,Fe,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
