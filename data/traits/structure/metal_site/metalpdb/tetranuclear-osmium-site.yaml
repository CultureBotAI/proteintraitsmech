identifier: proteintraitsmech:METALPDB_OS_TETRANUCLEAR
label: "tetranuclear osmium site"
definition: >-
  A structural metal-binding site in which osmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear osmium site (4 metal ions per site). Across the MetalPDB release this class aggregates 48 metal-site occurrences in 8 PDB structures (3+ distinct UniProt proteins). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
