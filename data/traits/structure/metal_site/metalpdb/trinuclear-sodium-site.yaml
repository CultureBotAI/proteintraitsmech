identifier: proteintraitsmech:METALPDB_NA_TRINUCLEAR
label: "trinuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear sodium site (3 metal ions per site). Across the MetalPDB release this class aggregates 553 metal-site occurrences in 244 PDB structures (90+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (22); Thr (15); Glu (12). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
