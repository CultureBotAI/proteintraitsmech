identifier: proteintraitsmech:METALPDB_OS_HEPTANUCLEAR
label: "heptanuclear osmium site"
definition: >-
  A structural metal-binding site in which osmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear osmium site (7 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
