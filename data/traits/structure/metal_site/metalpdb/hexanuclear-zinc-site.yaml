identifier: proteintraitsmech:METALPDB_ZN_HEXANUCLEAR
label: "hexanuclear zinc site"
definition: >-
  A structural metal-binding site in which zinc is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear zinc site (6 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 4 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are HX(1)H, H (7); H, HX(1)H (3); Asp (2). Typical coordination geometry: tetrahedron with a vacancy, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
