identifier: proteintraitsmech:METALPDB_PB_TETRANUCLEAR
label: "tetranuclear lead site"
definition: >-
  A structural metal-binding site in which lead is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear lead site (4 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (1).
definition_source: "MetalPDB (CERM, University of Florence)"
