identifier: proteintraitsmech:METALPDB_TL_MONONUCLEAR
label: "mononuclear thallium site"
definition: >-
  A structural metal-binding site in which thallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear thallium site (1 metal ion per site). Across the MetalPDB release this class aggregates 164 metal-site occurrences in 38 PDB structures (10+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(24)E (13); LX(0)KX(1)AX(18)D (13); Ser (9). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
