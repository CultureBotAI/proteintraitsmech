identifier: proteintraitsmech:METALPDB_NA_DECANUCLEAR
label: "decanuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a decanuclear sodium site (10 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: irregular.
