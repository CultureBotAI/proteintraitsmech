identifier: proteintraitsmech:METALPDB_MN_MONONUCLEAR
label: "mononuclear manganese site"
definition: >-
  A structural metal-binding site in which manganese is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear manganese site (1 metal ion per site). Across the MetalPDB release this class aggregates 7326 metal-site occurrences in 2058 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (304); His (182); DX(1)D (154). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
