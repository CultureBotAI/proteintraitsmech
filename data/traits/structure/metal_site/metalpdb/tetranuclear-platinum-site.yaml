identifier: proteintraitsmech:METALPDB_PT_TETRANUCLEAR
label: "tetranuclear platinum site"
definition: >-
  A structural metal-binding site in which platinum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear platinum site (4 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 3 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (10); Met (2). Typical coordination geometry: square plane with a vacancy, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
