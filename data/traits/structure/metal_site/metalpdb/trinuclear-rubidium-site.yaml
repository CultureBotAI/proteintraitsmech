identifier: proteintraitsmech:METALPDB_RB_TRINUCLEAR
label: "trinuclear rubidium site"
definition: >-
  A structural metal-binding site in which rubidium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear rubidium site (3 metal ions per site). Across the MetalPDB release this class aggregates 15 metal-site occurrences in 9 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Thr (5); NX(18)TX(1)I (4); CX(168)EX(0)L (3). Typical coordination geometry: irregular, trigonal prism with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
