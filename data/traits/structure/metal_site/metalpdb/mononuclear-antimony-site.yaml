identifier: proteintraitsmech:METALPDB_SB_MONONUCLEAR
label: "mononuclear antimony site"
definition: >-
  A structural metal-binding site in which antimony is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear antimony site (1 metal ion per site). Across the MetalPDB release this class aggregates 19 metal-site occurrences in 10 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(4)CX(277)T (2). Typical coordination geometry: tetrahedron, tetrahedron with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
