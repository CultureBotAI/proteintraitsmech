identifier: proteintraitsmech:METALPDB_PD_MONONUCLEAR
label: "mononuclear palladium site"
definition: >-
  A structural metal-binding site in which palladium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear palladium site (1 metal ion per site). Across the MetalPDB release this class aggregates 41 metal-site occurrences in 16 PDB structures (9+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (13); SX(0)Q (3); Glu (3). Typical coordination geometry: irregular, square plane.
definition_source: "MetalPDB (CERM, University of Florence)"
