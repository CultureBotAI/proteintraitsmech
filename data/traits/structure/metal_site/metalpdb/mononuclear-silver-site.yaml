identifier: proteintraitsmech:METALPDB_AG_MONONUCLEAR
label: "mononuclear silver site"
definition: >-
  A structural metal-binding site in which silver is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear silver site (1 metal ion per site). Across the MetalPDB release this class aggregates 101 metal-site occurrences in 30 PDB structures (19+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are H, M (11); M, H (9); Cys (9). Typical coordination geometry: linear, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
