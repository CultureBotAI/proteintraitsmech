identifier: proteintraitsmech:METALPDB_NI_HEXANUCLEAR
label: "hexanuclear nickel site"
definition: >-
  A structural metal-binding site in which nickel is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear nickel site (6 metal ions per site). Across the MetalPDB release this class aggregates 21 metal-site occurrences in 7 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(0)GX(0)C (19); H, H (4); CX(85)CX(1)C (2). Typical coordination geometry: square plane, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
