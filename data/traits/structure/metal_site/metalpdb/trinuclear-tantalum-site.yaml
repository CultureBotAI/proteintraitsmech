identifier: proteintraitsmech:METALPDB_TA_TRINUCLEAR
label: "trinuclear tantalum site"
definition: >-
  A structural metal-binding site in which tantalum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear tantalum site (3 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (1). Typical coordination geometry: square plane, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
