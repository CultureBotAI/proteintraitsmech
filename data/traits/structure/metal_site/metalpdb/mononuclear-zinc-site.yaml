identifier: proteintraitsmech:METALPDB_ZN_MONONUCLEAR
label: "mononuclear zinc site"
definition: >-
  A structural metal-binding site in which zinc is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear zinc site (1 metal ion per site). Across the MetalPDB release this class aggregates 35197 metal-site occurrences in 13025 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (1770); Glu (938); HX(1)HX(22)H (905). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
