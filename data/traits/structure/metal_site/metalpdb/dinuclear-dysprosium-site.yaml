identifier: proteintraitsmech:METALPDB_DY_DINUCLEAR
label: "dinuclear dysprosium site"
definition: >-
  A structural metal-binding site in which dysprosium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear dysprosium site (2 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are E, E (2); EX(2)E, E, E (1); E, EX(2)E, E (1). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
