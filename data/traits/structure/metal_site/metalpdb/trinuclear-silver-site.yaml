identifier: proteintraitsmech:METALPDB_AG_TRINUCLEAR
label: "trinuclear silver site"
definition: >-
  A structural metal-binding site in which silver is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear silver site (3 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (0+ distinct UniProt proteins). Typical coordination geometry: linear.
definition_source: "MetalPDB (CERM, University of Florence)"
