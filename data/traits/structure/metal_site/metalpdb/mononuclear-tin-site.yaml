identifier: proteintraitsmech:METALPDB_SN_MONONUCLEAR
label: "mononuclear tin site"
definition: >-
  A structural metal-binding site in which tin is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear tin site (1 metal ion per site). Across the MetalPDB release this class aggregates 18 metal-site occurrences in 10 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (8); Asp (7); CX(2)DX(59)C (2). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
