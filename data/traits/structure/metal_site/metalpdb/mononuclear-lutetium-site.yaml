identifier: proteintraitsmech:METALPDB_LU_MONONUCLEAR
label: "mononuclear lutetium site"
definition: >-
  A structural metal-binding site in which lutetium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear lutetium site (1 metal ion per site). Across the MetalPDB release this class aggregates 45 metal-site occurrences in 14 PDB structures (11+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (5); DX(0)E (4); EX(28)D (4). Typical coordination geometry: irregular, trigonal prism, square-face tricapped.
definition_source: "MetalPDB (CERM, University of Florence)"
