identifier: proteintraitsmech:METALPDB_MG_HEXANUCLEAR
label: "hexanuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear magnesium site (6 metal ions per site). Across the MetalPDB release this class aggregates 188 metal-site occurrences in 108 PDB structures (30+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (6); D, D (6); Arg (5). Typical coordination geometry: irregular, octahedron.
