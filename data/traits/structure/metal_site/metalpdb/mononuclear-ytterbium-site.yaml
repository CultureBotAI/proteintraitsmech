identifier: proteintraitsmech:METALPDB_YB_MONONUCLEAR
label: "mononuclear ytterbium site"
definition: >-
  A structural metal-binding site in which ytterbium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear ytterbium site (1 metal ion per site). Across the MetalPDB release this class aggregates 213 metal-site occurrences in 92 PDB structures (15+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (108); Glu (16); DX(1)DX(83)H (7). Typical coordination geometry: irregular, trigonal prism, square-face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
