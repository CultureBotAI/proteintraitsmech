identifier: proteintraitsmech:METALPDB_AS_TRINUCLEAR
label: "trinuclear arsenic site"
definition: >-
  A structural metal-binding site in which arsenic is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear arsenic site (3 metal ions per site). Across the MetalPDB release this class aggregates 104 metal-site occurrences in 56 PDB structures (42+ distinct UniProt proteins). Typical coordination geometry: tetrahedron, irregular.
