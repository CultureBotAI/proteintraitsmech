identifier: proteintraitsmech:METALPDB_RH_DINUCLEAR
label: "dinuclear rhodium site"
definition: >-
  A structural metal-binding site in which rhodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear rhodium site (2 metal ions per site). Across the MetalPDB release this class aggregates 7 metal-site occurrences in 5 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (6); Arg (2); RX(0)H (2). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
