identifier: proteintraitsmech:METALPDB_NI_PENTANUCLEAR
label: "pentanuclear nickel site"
definition: >-
  A structural metal-binding site in which nickel is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear nickel site (5 metal ions per site). Across the MetalPDB release this class aggregates 54 metal-site occurrences in 26 PDB structures (8+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (46); HX(35)CX(216)CX(36)K (4); Glu (2). Typical coordination geometry: irregular, square plane. Recurring cofactor context: Mix(,Fe,Ni,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
