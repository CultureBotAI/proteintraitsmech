identifier: proteintraitsmech:METALPDB_CU_TRINUCLEAR
label: "trinuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear copper site (3 metal ions per site). Across the MetalPDB release this class aggregates 453 metal-site occurrences in 241 PDB structures (64+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(1)EX(1)CX(3)H (119); HX(34)CX(3)CX(6)M (119); H, H (79). Typical coordination geometry: irregular, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
