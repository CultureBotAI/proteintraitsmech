identifier: proteintraitsmech:METALPDB_TI_MONONUCLEAR
label: "mononuclear titanium site"
definition: >-
  A structural metal-binding site in which titanium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear titanium site (1 metal ion per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are YX(90)Y (2). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
