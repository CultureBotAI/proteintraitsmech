identifier: proteintraitsmech:METALPDB_PB_MONONUCLEAR
label: "mononuclear lead site"
definition: >-
  A structural metal-binding site in which lead is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear lead site (1 metal ion per site). Across the MetalPDB release this class aggregates 181 metal-site occurrences in 58 PDB structures (46+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (28); Asp (17); Cys (6). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
