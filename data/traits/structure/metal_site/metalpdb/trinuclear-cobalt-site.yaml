identifier: proteintraitsmech:METALPDB_CO_TRINUCLEAR
label: "trinuclear cobalt site"
definition: >-
  A structural metal-binding site in which cobalt is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear cobalt site (3 metal ions per site). Across the MetalPDB release this class aggregates 23 metal-site occurrences in 15 PDB structures (10+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(3)D (6); His (4); DX(3)HX(80)H (4). Typical coordination geometry: octahedron, trigonal bipyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
