identifier: proteintraitsmech:METALPDB_CA_TRINUCLEAR
label: "trinuclear calcium site"
definition: >-
  A structural metal-binding site in which calcium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear calcium site (3 metal ions per site). Across the MetalPDB release this class aggregates 1024 metal-site occurrences in 479 PDB structures (193+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(28)D (148); EX(1)NX(5)EX(11)NX(0)D (147); DX(3)EX(22)DX(4)EX(0)D (136). Typical coordination geometry: irregular, pentagonal bipyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
