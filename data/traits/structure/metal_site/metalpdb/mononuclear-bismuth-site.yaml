identifier: proteintraitsmech:METALPDB_BI_MONONUCLEAR
label: "mononuclear bismuth site"
definition: >-
  A structural metal-binding site in which bismuth is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear bismuth site (1 metal ion per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Tyr (1). Typical coordination geometry: pentagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
