identifier: proteintraitsmech:METALPDB_RU_DINUCLEAR
label: "dinuclear ruthenium site"
definition: >-
  A structural metal-binding site in which ruthenium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear ruthenium site (2 metal ions per site). Across the MetalPDB release this class aggregates 16 metal-site occurrences in 13 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (12); CX(3)C (1); EX(2)C (1). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
