identifier: proteintraitsmech:METALPDB_CU_TETRANUCLEAR
label: "tetranuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear copper site (4 metal ions per site). Across the MetalPDB release this class aggregates 57 metal-site occurrences in 21 PDB structures (10+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (35); HX(48)H (33); HX(302)H (22). Typical coordination geometry: trigonal plane, square plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
