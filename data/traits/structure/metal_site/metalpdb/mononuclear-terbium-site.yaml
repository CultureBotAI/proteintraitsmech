identifier: proteintraitsmech:METALPDB_TB_MONONUCLEAR
label: "mononuclear terbium site"
definition: >-
  A structural metal-binding site in which terbium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear terbium site (1 metal ion per site). Across the MetalPDB release this class aggregates 105 metal-site occurrences in 24 PDB structures (19+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (18); Glu (15); H, DX(3)E (6). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
