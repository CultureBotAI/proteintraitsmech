identifier: proteintraitsmech:METALPDB_AU_TRINUCLEAR
label: "trinuclear gold site"
definition: >-
  A structural metal-binding site in which gold is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear gold site (3 metal ions per site). Across the MetalPDB release this class aggregates 10 metal-site occurrences in 6 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (9); His (6); MX(50)H (4). Typical coordination geometry: linear, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
