identifier: proteintraitsmech:METALPDB_RB_DINUCLEAR
label: "dinuclear rubidium site"
definition: >-
  A structural metal-binding site in which rubidium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear rubidium site (2 metal ions per site). Across the MetalPDB release this class aggregates 22 metal-site occurrences in 17 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are VX(0)AX(1)VX(453)EX(24)D (5); Val (4); TX(2)SX(0)NX(27)D (4). Typical coordination geometry: irregular, trigonal prism with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
