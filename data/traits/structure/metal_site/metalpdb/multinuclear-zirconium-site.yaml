identifier: proteintraitsmech:METALPDB_ZR_MULTINUCLEAR
label: "multinuclear zirconium site"
definition: >-
  A structural metal-binding site in which zirconium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear zirconium site (multiple metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: trigonal prism, square-face monocapped with a vacancy, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
