identifier: proteintraitsmech:METALPDB_CS_PENTANUCLEAR
label: "pentanuclear caesium site"
definition: >-
  A structural metal-binding site in which caesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear caesium site (5 metal ions per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 3 PDB structures (2+ distinct UniProt proteins). Typical coordination geometry: trigonal plane with a vacancy, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
