identifier: proteintraitsmech:METALPDB_U_TETRANUCLEAR
label: "tetranuclear uranium site"
definition: >-
  A structural metal-binding site in which uranium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear uranium site (4 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(112)D (4); EX(4)YX(26)D (3); Asp (2). Typical coordination geometry: irregular, square plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
