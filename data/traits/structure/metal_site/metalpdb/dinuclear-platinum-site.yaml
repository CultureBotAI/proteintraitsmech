identifier: proteintraitsmech:METALPDB_PT_DINUCLEAR
label: "dinuclear platinum site"
definition: >-
  A structural metal-binding site in which platinum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear platinum site (2 metal ions per site). Across the MetalPDB release this class aggregates 94 metal-site occurrences in 67 PDB structures (18+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (67); RX(0)H (26); Met (10). Typical coordination geometry: square plane, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
