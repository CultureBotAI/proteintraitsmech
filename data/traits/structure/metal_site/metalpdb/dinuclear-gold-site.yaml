identifier: proteintraitsmech:METALPDB_AU_DINUCLEAR
label: "dinuclear gold site"
definition: >-
  A structural metal-binding site in which gold is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear gold site (2 metal ions per site). Across the MetalPDB release this class aggregates 41 metal-site occurrences in 30 PDB structures (13+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (26); His (13); HX(11)C (4). Typical coordination geometry: linear, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
