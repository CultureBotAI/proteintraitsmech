identifier: proteintraitsmech:METALPDB_HG_DINUCLEAR
label: "dinuclear mercury site"
definition: >-
  A structural metal-binding site in which mercury is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear mercury site (2 metal ions per site). Across the MetalPDB release this class aggregates 202 metal-site occurrences in 121 PDB structures (49+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (202); Thr (11); CX(3)C (10). Typical coordination geometry: irregular, linear.
definition_source: "MetalPDB (CERM, University of Florence)"
