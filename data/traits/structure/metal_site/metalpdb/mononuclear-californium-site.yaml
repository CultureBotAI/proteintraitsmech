identifier: proteintraitsmech:METALPDB_CF_MONONUCLEAR
label: "mononuclear californium site"
definition: >-
  A structural metal-binding site in which californium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear californium site (1 metal ion per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: square pyramid with a vacancy, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
