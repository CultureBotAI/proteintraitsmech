identifier: proteintraitsmech:METALPDB_GA_DINUCLEAR
label: "dinuclear gallium site"
definition: >-
  A structural metal-binding site in which gallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear gallium site (2 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(29)C (1); CX(4)C (1). Typical coordination geometry: tetrahedron.
