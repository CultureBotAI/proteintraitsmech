identifier: proteintraitsmech:METALPDB_LI_HEXANUCLEAR
label: "hexanuclear lithium site"
definition: >-
  A structural metal-binding site in which lithium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear lithium site (6 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(37)E (1); Asp (1). Typical coordination geometry: irregular.
