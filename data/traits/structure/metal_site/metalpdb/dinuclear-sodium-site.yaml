identifier: proteintraitsmech:METALPDB_NA_DINUCLEAR
label: "dinuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear sodium site (2 metal ions per site). Across the MetalPDB release this class aggregates 1522 metal-site occurrences in 672 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (102); VX(2)W (51); Glu (48). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
