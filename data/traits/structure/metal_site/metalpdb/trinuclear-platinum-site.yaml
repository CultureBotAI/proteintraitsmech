identifier: proteintraitsmech:METALPDB_PT_TRINUCLEAR
label: "trinuclear platinum site"
definition: >-
  A structural metal-binding site in which platinum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear platinum site (3 metal ions per site). Across the MetalPDB release this class aggregates 17 metal-site occurrences in 15 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (16); Cys (4); Met (3). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
