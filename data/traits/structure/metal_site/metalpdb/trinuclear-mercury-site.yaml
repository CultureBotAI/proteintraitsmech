identifier: proteintraitsmech:METALPDB_HG_TRINUCLEAR
label: "trinuclear mercury site"
definition: >-
  A structural metal-binding site in which mercury is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear mercury site (3 metal ions per site). Across the MetalPDB release this class aggregates 45 metal-site occurrences in 35 PDB structures (13+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (57); Met (9); CX(3)C (3). Typical coordination geometry: linear, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
