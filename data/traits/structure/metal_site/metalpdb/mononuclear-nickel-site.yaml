identifier: proteintraitsmech:METALPDB_NI_MONONUCLEAR
label: "mononuclear nickel site"
definition: >-
  A structural metal-binding site in which nickel is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear nickel site (1 metal ion per site). Across the MetalPDB release this class aggregates 3293 metal-site occurrences in 1609 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (518); HX(1)EX(85)H (473); HX(1)HX(58)HX(21)D (268). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
