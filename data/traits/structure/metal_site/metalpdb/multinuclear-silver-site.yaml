identifier: proteintraitsmech:METALPDB_AG_MULTINUCLEAR
label: "multinuclear silver site"
definition: >-
  A structural metal-binding site in which silver is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear silver site (multiple metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 5 PDB structures (0+ distinct UniProt proteins). Typical coordination geometry: irregular, tetrahedron with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
