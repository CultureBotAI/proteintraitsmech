identifier: proteintraitsmech:METALPDB_TL_TRINUCLEAR
label: "trinuclear thallium site"
definition: >-
  A structural metal-binding site in which thallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear thallium site (3 metal ions per site). Across the MetalPDB release this class aggregates 20 metal-site occurrences in 7 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (14); YX(32)E (12); EX(20)DX(2)DX(158)E (3). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
