identifier: proteintraitsmech:METALPDB_MO_HEPTANUCLEAR
label: "heptanuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear molybdenum site (7 metal ions per site). Across the MetalPDB release this class aggregates 15 metal-site occurrences in 4 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Lys (1). Typical coordination geometry: octahedron, trigonal prism, square-face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
