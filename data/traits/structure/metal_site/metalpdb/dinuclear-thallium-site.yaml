identifier: proteintraitsmech:METALPDB_TL_DINUCLEAR
label: "dinuclear thallium site"
definition: >-
  A structural metal-binding site in which thallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear thallium site (2 metal ions per site). Across the MetalPDB release this class aggregates 67 metal-site occurrences in 25 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are TX(20)K (18); CX(24)E (14); Glu (14). Typical coordination geometry: irregular, square plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
