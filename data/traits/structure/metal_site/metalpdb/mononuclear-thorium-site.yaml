identifier: proteintraitsmech:METALPDB_TH_MONONUCLEAR
label: "mononuclear thorium site"
definition: >-
  A structural metal-binding site in which thorium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear thorium site (1 metal ion per site). Across the MetalPDB release this class aggregates 9 metal-site occurrences in 3 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: irregular.
