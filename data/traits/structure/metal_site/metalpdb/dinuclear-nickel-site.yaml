identifier: proteintraitsmech:METALPDB_NI_DINUCLEAR
label: "dinuclear nickel site"
definition: >-
  A structural metal-binding site in which nickel is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear nickel site (2 metal ions per site). Across the MetalPDB release this class aggregates 413 metal-site occurrences in 239 PDB structures (70+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are HX(1)HX(223)D (51); HX(25)H (46); Asp (41). Typical coordination geometry: irregular, octahedron. Recurring cofactor context: Mix(,Fe,Ni,)-Het(,C,H,N,O), Mix(,Fe,Ni,)-Het(,C,O,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
