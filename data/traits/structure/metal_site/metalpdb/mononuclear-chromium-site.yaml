identifier: proteintraitsmech:METALPDB_CR_MONONUCLEAR
label: "mononuclear chromium site"
definition: >-
  A structural metal-binding site in which chromium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear chromium site (1 metal ion per site). Across the MetalPDB release this class aggregates 24 metal-site occurrences in 11 PDB structures (8+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(1)D (5); HX(3)E (2); His (1). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
