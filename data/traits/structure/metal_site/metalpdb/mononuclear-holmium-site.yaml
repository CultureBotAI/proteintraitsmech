identifier: proteintraitsmech:METALPDB_HO_MONONUCLEAR
label: "mononuclear holmium site"
definition: >-
  A structural metal-binding site in which holmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear holmium site (1 metal ion per site). Across the MetalPDB release this class aggregates 26 metal-site occurrences in 10 PDB structures (7+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (3); Glu (3); DX(14)QX(1)D (3). Typical coordination geometry: irregular, square pyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
