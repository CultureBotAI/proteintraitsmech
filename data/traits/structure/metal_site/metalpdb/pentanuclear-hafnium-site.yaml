identifier: proteintraitsmech:METALPDB_HF_PENTANUCLEAR
label: "pentanuclear hafnium site"
definition: >-
  A structural metal-binding site in which hafnium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear hafnium site (5 metal ions per site). Across the MetalPDB release this class aggregates 8 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Tyr (16). Typical coordination geometry: pentagonal bipyramid, hexagonal bipyramid with a vacancy.
