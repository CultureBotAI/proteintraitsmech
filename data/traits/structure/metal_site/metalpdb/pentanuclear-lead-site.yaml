identifier: proteintraitsmech:METALPDB_PB_PENTANUCLEAR
label: "pentanuclear lead site"
definition: >-
  A structural metal-binding site in which lead is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear lead site (5 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(2)E (1); DX(2)E (1); Asp (1). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
