identifier: proteintraitsmech:METALPDB_MO_PENTANUCLEAR
label: "pentanuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear molybdenum site (5 metal ions per site). Across the MetalPDB release this class aggregates 14 metal-site occurrences in 8 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (1). Typical coordination geometry: octahedron, pentagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
