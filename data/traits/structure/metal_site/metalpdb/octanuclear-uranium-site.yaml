identifier: proteintraitsmech:METALPDB_U_OCTANUCLEAR
label: "octanuclear uranium site"
definition: >-
  A structural metal-binding site in which uranium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear uranium site (8 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (1); Asp (1). Typical coordination geometry: pentagonal bipyramid, octahedron, face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
