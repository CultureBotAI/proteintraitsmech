identifier: proteintraitsmech:METALPDB_TL_HEXANUCLEAR
label: "hexanuclear thallium site"
definition: >-
  A structural metal-binding site in which thallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear thallium site (6 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 4 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (7); NX(32)EX(0)E (4); DX(45)L (2). Typical coordination geometry: irregular, tetrahedron with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
