identifier: proteintraitsmech:METALPDB_NA_TETRANUCLEAR
label: "tetranuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear sodium site (4 metal ions per site). Across the MetalPDB release this class aggregates 156 metal-site occurrences in 103 PDB structures (29+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(0)S (14); Thr (12); Asp (11). Typical coordination geometry: irregular, tetrahedron with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
