identifier: proteintraitsmech:METALPDB_MN_TETRANUCLEAR
label: "tetranuclear manganese site"
definition: >-
  A structural metal-binding site in which manganese is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear manganese site (4 metal ions per site). Across the MetalPDB release this class aggregates 77 metal-site occurrences in 41 PDB structures (18+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (26); QX(13)E (24); EX(1)N (24). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
