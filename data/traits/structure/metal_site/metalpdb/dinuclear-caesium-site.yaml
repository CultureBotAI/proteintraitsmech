identifier: proteintraitsmech:METALPDB_CS_DINUCLEAR
label: "dinuclear caesium site"
definition: >-
  A structural metal-binding site in which caesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear caesium site (2 metal ions per site). Across the MetalPDB release this class aggregates 26 metal-site occurrences in 15 PDB structures (10+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (2); I, RX(1)G (1); IX(0)RX(1)G, I (1). Typical coordination geometry: irregular, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
