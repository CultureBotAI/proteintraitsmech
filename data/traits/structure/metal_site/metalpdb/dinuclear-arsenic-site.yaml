identifier: proteintraitsmech:METALPDB_AS_DINUCLEAR
label: "dinuclear arsenic site"
definition: >-
  A structural metal-binding site in which arsenic is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear arsenic site (2 metal ions per site). Across the MetalPDB release this class aggregates 97 metal-site occurrences in 68 PDB structures (48+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (8); CX(0)C (1). Typical coordination geometry: tetrahedron, tetrahedron with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
