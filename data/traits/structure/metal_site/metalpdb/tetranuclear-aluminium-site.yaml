identifier: proteintraitsmech:METALPDB_AL_TETRANUCLEAR
label: "tetranuclear aluminium site"
definition: >-
  A structural metal-binding site in which aluminium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear aluminium site (4 metal ions per site). Across the MetalPDB release this class aggregates 9 metal-site occurrences in 4 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Ser (4). Typical coordination geometry: trigonal bipyramid with a vacancy, trigonal bipyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
