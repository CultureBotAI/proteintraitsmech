identifier: proteintraitsmech:METALPDB_CD_TETRANUCLEAR
label: "tetranuclear cadmium site"
definition: >-
  A structural metal-binding site in which cadmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear cadmium site (4 metal ions per site). Across the MetalPDB release this class aggregates 44 metal-site occurrences in 30 PDB structures (19+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (20); Cys (13); CX(1)CX(0)CX(12)C (10). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
