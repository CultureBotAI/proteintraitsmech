identifier: proteintraitsmech:METALPDB_LI_DINUCLEAR
label: "dinuclear lithium site"
definition: >-
  A structural metal-binding site in which lithium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear lithium site (2 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 5 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Ser (1); EX(140)L (1); Glu (1). Typical coordination geometry: irregular, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
