identifier: proteintraitsmech:METALPDB_U_DINUCLEAR
label: "dinuclear uranium site"
definition: >-
  A structural metal-binding site in which uranium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear uranium site (2 metal ions per site). Across the MetalPDB release this class aggregates 55 metal-site occurrences in 28 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (26); EX(1)E (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
