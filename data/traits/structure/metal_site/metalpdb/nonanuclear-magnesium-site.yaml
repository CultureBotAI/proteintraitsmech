identifier: proteintraitsmech:METALPDB_MG_NONANUCLEAR
label: "nonanuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a nonanuclear magnesium site (9 metal ions per site). Across the MetalPDB release this class aggregates 17 metal-site occurrences in 10 PDB structures (3+ distinct UniProt proteins). Typical coordination geometry: irregular, trigonal plane with a vacancy.
