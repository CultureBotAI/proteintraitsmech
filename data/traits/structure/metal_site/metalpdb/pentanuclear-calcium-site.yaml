identifier: proteintraitsmech:METALPDB_CA_PENTANUCLEAR
label: "pentanuclear calcium site"
definition: >-
  A structural metal-binding site in which calcium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear calcium site (5 metal ions per site). Across the MetalPDB release this class aggregates 100 metal-site occurrences in 58 PDB structures (20+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(173)A (39); DX(18)EX(154)A (14); DX(1)DX(6)DX(1)DX(2)N (8). Typical coordination geometry: irregular, pentagonal bipyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
