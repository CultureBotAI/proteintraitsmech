identifier: proteintraitsmech:METALPDB_MO_TRINUCLEAR
label: "trinuclear molybdenum site"
definition: >-
  A structural metal-binding site in which molybdenum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear molybdenum site (3 metal ions per site). Across the MetalPDB release this class aggregates 7 metal-site occurrences in 4 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (6); Ser (1). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
