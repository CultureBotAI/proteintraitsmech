identifier: proteintraitsmech:METALPDB_TL_PENTANUCLEAR
label: "pentanuclear thallium site"
definition: >-
  A structural metal-binding site in which thallium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear thallium site (5 metal ions per site). Across the MetalPDB release this class aggregates 6 metal-site occurrences in 4 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (6); EX(0)E (3); DX(45)LX(2)S (1). Typical coordination geometry: irregular, octahedron, face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
