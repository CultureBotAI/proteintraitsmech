identifier: proteintraitsmech:METALPDB_YB_TETRANUCLEAR
label: "tetranuclear ytterbium site"
definition: >-
  A structural metal-binding site in which ytterbium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear ytterbium site (4 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (1); Glu (1).
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
