identifier: proteintraitsmech:METALPDB_MN_PENTANUCLEAR
label: "pentanuclear manganese site"
definition: >-
  A structural metal-binding site in which manganese is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear manganese site (5 metal ions per site). Across the MetalPDB release this class aggregates 81 metal-site occurrences in 45 PDB structures (10+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(162)E (77); E, E (73); EX(142)HX(9)D (69). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
