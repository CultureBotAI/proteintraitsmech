identifier: proteintraitsmech:METALPDB_FE_TRINUCLEAR
label: "trinuclear iron site"
definition: >-
  A structural metal-binding site in which iron is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear iron site (3 metal ions per site). Across the MetalPDB release this class aggregates 731 metal-site occurrences in 346 PDB structures (106+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (1388); EX(76)EX(2)EX(0)E (75); EX(32)EX(2)H (47). Typical coordination geometry: tetrahedron, octahedron. Recurring cofactor context: Pur(,Fe,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
