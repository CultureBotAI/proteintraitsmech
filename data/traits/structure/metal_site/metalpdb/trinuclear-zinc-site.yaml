identifier: proteintraitsmech:METALPDB_ZN_TRINUCLEAR
label: "trinuclear zinc site"
definition: >-
  A structural metal-binding site in which zinc is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear zinc site (3 metal ions per site). Across the MetalPDB release this class aggregates 670 metal-site occurrences in 381 PDB structures (167+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(1)CX(3)CX(4)C (91); CX(36)CX(5)CX(3)C (74); CX(12)CX(29)CX(3)C (74). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
