identifier: proteintraitsmech:METALPDB_SR_HEPTANUCLEAR
label: "heptanuclear strontium site"
definition: >-
  A structural metal-binding site in which strontium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear strontium site (7 metal ions per site). Across the MetalPDB release this class aggregates 6 metal-site occurrences in 6 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gln (3). Typical coordination geometry: irregular, pentagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
