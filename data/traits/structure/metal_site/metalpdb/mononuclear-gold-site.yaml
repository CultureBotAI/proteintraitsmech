identifier: proteintraitsmech:METALPDB_AU_MONONUCLEAR
label: "mononuclear gold site"
definition: >-
  A structural metal-binding site in which gold is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear gold site (1 metal ion per site). Across the MetalPDB release this class aggregates 316 metal-site occurrences in 88 PDB structures (62+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (70); His (34); Glu (7). Typical coordination geometry: linear, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
