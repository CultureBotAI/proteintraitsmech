identifier: proteintraitsmech:METALPDB_FE_TETRANUCLEAR
label: "tetranuclear iron site"
definition: >-
  A structural metal-binding site in which iron is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear iron site (4 metal ions per site). Across the MetalPDB release this class aggregates 3027 metal-site occurrences in 940 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (10551); His (335); Glu (46). Typical coordination geometry: tetrahedron, trigonal bipyramid with a vacancy. Recurring cofactor context: Pur(,Fe,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
