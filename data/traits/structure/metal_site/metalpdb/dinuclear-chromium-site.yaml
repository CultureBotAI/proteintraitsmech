identifier: proteintraitsmech:METALPDB_CR_DINUCLEAR
label: "dinuclear chromium site"
definition: >-
  A structural metal-binding site in which chromium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear chromium site (2 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (0+ distinct UniProt proteins). Typical coordination geometry: irregular, octahedron, face monocapped with a vacancy.
