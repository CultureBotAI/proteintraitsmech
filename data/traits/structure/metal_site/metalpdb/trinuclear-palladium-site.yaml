identifier: proteintraitsmech:METALPDB_PD_TRINUCLEAR
label: "trinuclear palladium site"
definition: >-
  A structural metal-binding site in which palladium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear palladium site (3 metal ions per site). Across the MetalPDB release this class aggregates 6 metal-site occurrences in 6 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (8); DX(9)C (2); HX(11)C (2). Typical coordination geometry: irregular, square plane.
definition_source: "MetalPDB (CERM, University of Florence)"
