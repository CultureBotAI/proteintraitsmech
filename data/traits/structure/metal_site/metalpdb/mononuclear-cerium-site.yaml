identifier: proteintraitsmech:METALPDB_CE_MONONUCLEAR
label: "mononuclear cerium site"
definition: >-
  A structural metal-binding site in which cerium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear cerium site (1 metal ion per site). Across the MetalPDB release this class aggregates 7 metal-site occurrences in 4 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(83)NX(42)DX(1)D (2); DX(1)DX(1)TX(4)E (1); DX(1)DX(1)NX(1)TX(4)E (1). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
