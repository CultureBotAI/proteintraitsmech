identifier: proteintraitsmech:METALPDB_EU_MONONUCLEAR
label: "mononuclear europium site"
definition: >-
  A structural metal-binding site in which europium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear europium site (1 metal ion per site). Across the MetalPDB release this class aggregates 61 metal-site occurrences in 25 PDB structures (16+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (6); Glu (6); DX(1)D (2). Typical coordination geometry: irregular, trigonal prism, square-face tricapped.
definition_source: "MetalPDB (CERM, University of Florence)"
