identifier: proteintraitsmech:METALPDB_CD_HEXANUCLEAR
label: "hexanuclear cadmium site"
definition: >-
  A structural metal-binding site in which cadmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear cadmium site (6 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (1).
