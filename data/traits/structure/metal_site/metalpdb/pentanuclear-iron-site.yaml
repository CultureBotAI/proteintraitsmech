identifier: proteintraitsmech:METALPDB_FE_PENTANUCLEAR
label: "pentanuclear iron site"
definition: >-
  A structural metal-binding site in which iron is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear iron site (5 metal ions per site). Across the MetalPDB release this class aggregates 213 metal-site occurrences in 117 PDB structures (33+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (775); HX(33)C (28); HX(35)C (16). Typical coordination geometry: tetrahedron, irregular. Recurring cofactor context: Pur(,Fe,)-Hom(,S,), Mix(,Fe,Ni,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
