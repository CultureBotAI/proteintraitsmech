identifier: proteintraitsmech:METALPDB_HO_DINUCLEAR
label: "dinuclear holmium site"
definition: >-
  A structural metal-binding site in which holmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear holmium site (2 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 3 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(1)E (2); Asp (2); DX(3)EX(22)DX(4)EX(0)D (2). Typical coordination geometry: irregular, square antiprism with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
