identifier: proteintraitsmech:METALPDB_LA_MONONUCLEAR
label: "mononuclear lanthanum site"
definition: >-
  A structural metal-binding site in which lanthanum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear lanthanum site (1 metal ion per site). Across the MetalPDB release this class aggregates 17 metal-site occurrences in 11 PDB structures (9+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Thr (3); NX(30)DX(46)E (2); DX(5)D (1). Typical coordination geometry: irregular, pentagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
