identifier: proteintraitsmech:METALPDB_K_HEPTANUCLEAR
label: "heptanuclear potassium site"
definition: >-
  A structural metal-binding site in which potassium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear potassium site (7 metal ions per site). Across the MetalPDB release this class aggregates 9 metal-site occurrences in 8 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are EX(114)DX(0)T (2); D, D (2); DX(0)D, AX(66)VX(54)M (1). Typical coordination geometry: irregular, square antiprism.
