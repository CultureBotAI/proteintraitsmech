identifier: proteintraitsmech:METALPDB_ZN_MULTINUCLEAR
label: "multinuclear zinc site"
definition: >-
  A structural metal-binding site in which zinc is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a multinuclear zinc site (multiple metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (0+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are H, H (12). Typical coordination geometry: trigonal bipyramid with a vacancy, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
