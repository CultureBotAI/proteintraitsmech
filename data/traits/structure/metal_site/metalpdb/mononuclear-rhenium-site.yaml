identifier: proteintraitsmech:METALPDB_RE_MONONUCLEAR
label: "mononuclear rhenium site"
definition: >-
  A structural metal-binding site in which rhenium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear rhenium site (1 metal ion per site). Across the MetalPDB release this class aggregates 74 metal-site occurrences in 23 PDB structures (7+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (35); CX(4)WX(0)C (1); H, V (1). Typical coordination geometry: octahedron, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
