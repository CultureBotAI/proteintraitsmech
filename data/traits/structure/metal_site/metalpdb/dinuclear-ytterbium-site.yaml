identifier: proteintraitsmech:METALPDB_YB_DINUCLEAR
label: "dinuclear ytterbium site"
definition: >-
  A structural metal-binding site in which ytterbium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear ytterbium site (2 metal ions per site). Across the MetalPDB release this class aggregates 8 metal-site occurrences in 7 PDB structures (4+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (5); DX(3)EX(22)DX(4)EX(0)D (2); EX(1)NX(5)EX(11)NX(0)D (2). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
