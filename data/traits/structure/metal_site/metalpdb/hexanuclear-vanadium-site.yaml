identifier: proteintraitsmech:METALPDB_V_HEXANUCLEAR
label: "hexanuclear vanadium site"
definition: >-
  A structural metal-binding site in which vanadium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear vanadium site (6 metal ions per site). Across the MetalPDB release this class aggregates 13 metal-site occurrences in 3 PDB structures (3+ distinct UniProt proteins). Typical coordination geometry: irregular, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
