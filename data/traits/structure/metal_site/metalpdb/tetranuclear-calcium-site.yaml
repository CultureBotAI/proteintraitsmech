identifier: proteintraitsmech:METALPDB_CA_TETRANUCLEAR
label: "tetranuclear calcium site"
definition: >-
  A structural metal-binding site in which calcium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear calcium site (4 metal ions per site). Across the MetalPDB release this class aggregates 98 metal-site occurrences in 58 PDB structures (30+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(0)NX(76)EX(0)QX(0)D (34); EX(1)DX(9)Q (33); EX(34)DX(29)E (9). Typical coordination geometry: irregular, pentagonal bipyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
