identifier: proteintraitsmech:METALPDB_PB_TRINUCLEAR
label: "trinuclear lead site"
definition: >-
  A structural metal-binding site in which lead is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear lead site (3 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (1); DX(1)DX(1)NX(1)TX(4)E (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
