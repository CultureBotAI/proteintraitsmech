identifier: proteintraitsmech:METALPDB_PR_MONONUCLEAR
label: "mononuclear praseodymium site"
definition: >-
  A structural metal-binding site in which praseodymium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear praseodymium site (1 metal ion per site). Across the MetalPDB release this class aggregates 56 metal-site occurrences in 27 PDB structures (20+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (9); Asp (7); GX(1)DX(9)E (2). Typical coordination geometry: irregular, trigonal prism, square-face bicapped.
definition_source: "MetalPDB (CERM, University of Florence)"
