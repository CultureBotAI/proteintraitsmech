identifier: proteintraitsmech:METALPDB_AU_TETRANUCLEAR
label: "tetranuclear gold site"
definition: >-
  A structural metal-binding site in which gold is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear gold site (4 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 4 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (6); CX(3)C (3). Typical coordination geometry: square plane with a vacancy, linear.
definition_source: "MetalPDB (CERM, University of Florence)"
