identifier: proteintraitsmech:METALPDB_V_MONONUCLEAR
label: "mononuclear vanadium site"
definition: >-
  A structural metal-binding site in which vanadium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear vanadium site (1 metal ion per site). Across the MetalPDB release this class aggregates 150 metal-site occurrences in 88 PDB structures (46+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (48); Cys (30); Tyr (7). Typical coordination geometry: trigonal bipyramid, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
