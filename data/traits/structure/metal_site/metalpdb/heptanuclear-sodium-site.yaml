identifier: proteintraitsmech:METALPDB_NA_HEPTANUCLEAR
label: "heptanuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear sodium site (7 metal ions per site). Across the MetalPDB release this class aggregates 17 metal-site occurrences in 14 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gln (3); Glu (3); Cys (2). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
