identifier: proteintraitsmech:METALPDB_BA_TETRANUCLEAR
label: "tetranuclear barium site"
definition: >-
  A structural metal-binding site in which barium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear barium site (4 metal ions per site). Across the MetalPDB release this class aggregates 18 metal-site occurrences in 12 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are TX(0)V (5); SX(21)E (5); Ser (4). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
