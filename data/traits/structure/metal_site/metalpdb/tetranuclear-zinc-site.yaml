identifier: proteintraitsmech:METALPDB_ZN_TETRANUCLEAR
label: "tetranuclear zinc site"
definition: >-
  A structural metal-binding site in which zinc is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear zinc site (4 metal ions per site). Across the MetalPDB release this class aggregates 88 metal-site occurrences in 65 PDB structures (42+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (26); His (20); Asp (17). Typical coordination geometry: irregular, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
