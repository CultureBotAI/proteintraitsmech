identifier: proteintraitsmech:METALPDB_CO_PENTANUCLEAR
label: "pentanuclear cobalt site"
definition: >-
  A structural metal-binding site in which cobalt is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear cobalt site (5 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(0)DX(41)AX(68)IX(61)C (2); DX(38)DX(135)D (2); DX(22)D (2). Typical coordination geometry: octahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
