identifier: proteintraitsmech:METALPDB_BE_DINUCLEAR
label: "dinuclear beryllium site"
definition: >-
  A structural metal-binding site in which beryllium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear beryllium site (2 metal ions per site). Across the MetalPDB release this class aggregates 476 metal-site occurrences in 190 PDB structures (124+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (141); Ser (11); Arg (10). Typical coordination geometry: tetrahedron, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
