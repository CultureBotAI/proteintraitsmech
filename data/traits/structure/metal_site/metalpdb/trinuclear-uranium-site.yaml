identifier: proteintraitsmech:METALPDB_U_TRINUCLEAR
label: "trinuclear uranium site"
definition: >-
  A structural metal-binding site in which uranium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear uranium site (3 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (2).
