identifier: proteintraitsmech:METALPDB_GD_HEPTANUCLEAR
label: "heptanuclear gadolinium site"
definition: >-
  A structural metal-binding site in which gadolinium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear gadolinium site (7 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 5 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (14); DX(42)D (3); DX(166)D (3). Typical coordination geometry: irregular, trigonal prism, square-face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
