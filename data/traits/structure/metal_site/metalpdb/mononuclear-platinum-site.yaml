identifier: proteintraitsmech:METALPDB_PT_MONONUCLEAR
label: "mononuclear platinum site"
definition: >-
  A structural metal-binding site in which platinum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear platinum site (1 metal ion per site). Across the MetalPDB release this class aggregates 649 metal-site occurrences in 216 PDB structures (98+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Met (105); His (88); Lys (29). Typical coordination geometry: square plane, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
