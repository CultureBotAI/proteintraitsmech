identifier: proteintraitsmech:METALPDB_MG_MONONUCLEAR
label: "mononuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear magnesium site (1 metal ion per site). Across the MetalPDB release this class aggregates 129020 metal-site occurrences in 12106 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (4757); Asp (1955); Thr (1726). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
