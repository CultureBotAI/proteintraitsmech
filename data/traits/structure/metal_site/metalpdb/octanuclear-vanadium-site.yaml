identifier: proteintraitsmech:METALPDB_V_OCTANUCLEAR
label: "octanuclear vanadium site"
definition: >-
  A structural metal-binding site in which vanadium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear vanadium site (8 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (2). Typical coordination geometry: octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
