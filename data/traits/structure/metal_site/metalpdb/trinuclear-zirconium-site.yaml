identifier: proteintraitsmech:METALPDB_ZR_TRINUCLEAR
label: "trinuclear zirconium site"
definition: >-
  A structural metal-binding site in which zirconium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear zirconium site (3 metal ions per site). Across the MetalPDB release this class aggregates 9 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Tyr (18). Typical coordination geometry: pentagonal bipyramid, hexagonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
