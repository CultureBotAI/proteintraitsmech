identifier: proteintraitsmech:METALPDB_K_HEXANUCLEAR
label: "hexanuclear potassium site"
definition: >-
  A structural metal-binding site in which potassium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear potassium site (6 metal ions per site). Across the MetalPDB release this class aggregates 31 metal-site occurrences in 29 PDB structures (5+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Thr (5); Tyr (4); VX(0)G (3). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
