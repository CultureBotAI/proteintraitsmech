identifier: proteintraitsmech:METALPDB_ZN_DINUCLEAR
label: "dinuclear zinc site"
definition: >-
  A structural metal-binding site in which zinc is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear zinc site (2 metal ions per site). Across the MetalPDB release this class aggregates 4355 metal-site occurrences in 2031 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are HX(35)HX(0)DX(116)D (247); His (209); HX(7)HX(8)HX(2)D (198). Typical coordination geometry: irregular, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
