identifier: proteintraitsmech:METALPDB_NA_PENTANUCLEAR
label: "pentanuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a pentanuclear sodium site (5 metal ions per site). Across the MetalPDB release this class aggregates 93 metal-site occurrences in 66 PDB structures (19+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gln (28); Arg (22); Glu (5). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
