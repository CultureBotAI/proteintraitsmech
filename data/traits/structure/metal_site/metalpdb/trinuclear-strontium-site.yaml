identifier: proteintraitsmech:METALPDB_SR_TRINUCLEAR
label: "trinuclear strontium site"
definition: >-
  A structural metal-binding site in which strontium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear strontium site (3 metal ions per site). Across the MetalPDB release this class aggregates 202 metal-site occurrences in 39 PDB structures (6+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (19); Arg (12); Gln (6). Typical coordination geometry: irregular, trigonal prism, square-face monocapped with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
