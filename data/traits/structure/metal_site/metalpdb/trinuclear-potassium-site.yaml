identifier: proteintraitsmech:METALPDB_K_TRINUCLEAR
label: "trinuclear potassium site"
definition: >-
  A structural metal-binding site in which potassium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear potassium site (3 metal ions per site). Across the MetalPDB release this class aggregates 308 metal-site occurrences in 161 PDB structures (46+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Lys (21); KX(38)T (15); Thr (13). Typical coordination geometry: irregular, square antiprism.
definition_source: "MetalPDB (CERM, University of Florence)"
