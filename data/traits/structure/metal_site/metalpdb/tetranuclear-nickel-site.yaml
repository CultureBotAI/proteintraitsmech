identifier: proteintraitsmech:METALPDB_NI_TETRANUCLEAR
label: "tetranuclear nickel site"
definition: >-
  A structural metal-binding site in which nickel is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear nickel site (4 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 4 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (1); EX(0)EX(2)D (1); EX(3)EX(56)E (1). Typical coordination geometry: octahedron, square plane. Recurring cofactor context: Mix(,Fe,Ni,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
