identifier: proteintraitsmech:METALPDB_AS_MONONUCLEAR
label: "mononuclear arsenic site"
definition: >-
  A structural metal-binding site in which arsenic is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear arsenic site (1 metal ion per site). Across the MetalPDB release this class aggregates 1535 metal-site occurrences in 541 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (277); Ser (6); CX(49)C (6). Typical coordination geometry: tetrahedron with a vacancy, tetrahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
