identifier: proteintraitsmech:METALPDB_W_HEPTANUCLEAR
label: "heptanuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear tungsten site (7 metal ions per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 3 PDB structures (2+ distinct UniProt proteins). Typical coordination geometry: square pyramid with a vacancy, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
