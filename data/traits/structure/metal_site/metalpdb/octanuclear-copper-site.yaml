identifier: proteintraitsmech:METALPDB_CU_OCTANUCLEAR
label: "octanuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear copper site (8 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(1)CX(14)C (1); CX(4)CX(11)C (1); CX(3)CX(5)C (1). Typical coordination geometry: trigonal plane, square plane with a vacancy.
