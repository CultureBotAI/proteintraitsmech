identifier: proteintraitsmech:METALPDB_IN_MONONUCLEAR
label: "mononuclear indium site"
definition: >-
  A structural metal-binding site in which indium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear indium site (1 metal ion per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 2 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Tyr (2); His (1). Typical coordination geometry: square pyramid, pentagonal bipyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
