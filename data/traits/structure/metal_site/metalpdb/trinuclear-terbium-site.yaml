identifier: proteintraitsmech:METALPDB_TB_TRINUCLEAR
label: "trinuclear terbium site"
definition: >-
  A structural metal-binding site in which terbium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear terbium site (3 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asn (1). Typical coordination geometry: irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
