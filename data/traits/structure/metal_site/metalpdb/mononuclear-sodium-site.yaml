identifier: proteintraitsmech:METALPDB_NA_MONONUCLEAR
label: "mononuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear sodium site (1 metal ion per site). Across the MetalPDB release this class aggregates 20984 metal-site occurrences in 7693 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (659); Glu (490); K, MX(2)N (352). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
