identifier: proteintraitsmech:METALPDB_SR_OCTANUCLEAR
label: "octanuclear strontium site"
definition: >-
  A structural metal-binding site in which strontium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a octanuclear strontium site (8 metal ions per site). Across the MetalPDB release this class aggregates 3 metal-site occurrences in 3 PDB structures (2+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Gln (1); Asn (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
