identifier: proteintraitsmech:METALPDB_AG_HEPTANUCLEAR
label: "heptanuclear silver site"
definition: >-
  A structural metal-binding site in which silver is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a heptanuclear silver site (7 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(16)CX(3)CX(5)C (2); CX(1)CX(14)C (2); CX(1)CX(11)C (2). Typical coordination geometry: trigonal plane, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
