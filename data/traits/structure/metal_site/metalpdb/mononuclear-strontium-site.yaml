identifier: proteintraitsmech:METALPDB_SR_MONONUCLEAR
label: "mononuclear strontium site"
definition: >-
  A structural metal-binding site in which strontium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear strontium site (1 metal ion per site). Across the MetalPDB release this class aggregates 3020 metal-site occurrences in 142 PDB structures (72+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (145); Glu (21); Gly (20). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
