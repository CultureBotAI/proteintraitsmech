identifier: proteintraitsmech:METALPDB_PT_HEXANUCLEAR
label: "hexanuclear platinum site"
definition: >-
  A structural metal-binding site in which platinum is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear platinum site (6 metal ions per site). Across the MetalPDB release this class aggregates 2 metal-site occurrences in 2 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (10). Typical coordination geometry: irregular, trigonal bipyramid with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
