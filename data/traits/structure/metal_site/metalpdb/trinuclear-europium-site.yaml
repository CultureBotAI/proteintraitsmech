identifier: proteintraitsmech:METALPDB_EU_TRINUCLEAR
label: "trinuclear europium site"
definition: >-
  A structural metal-binding site in which europium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear europium site (3 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Pro (4). Typical coordination geometry: square antiprism, trigonal prism, square-face bicapped.
definition_source: "MetalPDB (CERM, University of Florence)"
trait_axis: STRUCTURE
trait_category: STRUCT_METAL_SITE
term_kind: CLASS
mapping_status: SEEDED
