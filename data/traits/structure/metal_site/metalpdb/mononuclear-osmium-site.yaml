identifier: proteintraitsmech:METALPDB_OS_MONONUCLEAR
label: "mononuclear osmium site"
definition: >-
  A structural metal-binding site in which osmium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear osmium site (1 metal ion per site). Across the MetalPDB release this class aggregates 2915 metal-site occurrences in 38 PDB structures (35+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (16); HX(5)HX(33)H (4); HX(1)HX(3)HX(33)H (4). Typical coordination geometry: octahedron, octahedron, face monocapped.
definition_source: "MetalPDB (CERM, University of Florence)"
