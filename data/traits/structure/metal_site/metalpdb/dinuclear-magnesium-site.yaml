identifier: proteintraitsmech:METALPDB_MG_DINUCLEAR
label: "dinuclear magnesium site"
definition: >-
  A structural metal-binding site in which magnesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear magnesium site (2 metal ions per site). Across the MetalPDB release this class aggregates 15365 metal-site occurrences in 3124 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (1557); DX(1)D (304); Thr (207). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
