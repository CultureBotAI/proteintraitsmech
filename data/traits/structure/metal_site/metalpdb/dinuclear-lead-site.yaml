identifier: proteintraitsmech:METALPDB_PB_DINUCLEAR
label: "dinuclear lead site"
definition: >-
  A structural metal-binding site in which lead is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear lead site (2 metal ions per site). Across the MetalPDB release this class aggregates 20 metal-site occurrences in 10 PDB structures (9+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (12); Glu (7); DX(1)S (1). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
