identifier: proteintraitsmech:METALPDB_Y_MONONUCLEAR
label: "mononuclear yttrium site"
definition: >-
  A structural metal-binding site in which yttrium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear yttrium site (1 metal ion per site). Across the MetalPDB release this class aggregates 168 metal-site occurrences in 54 PDB structures (37+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Glu (33); Asp (30); E, E, E, E (12). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
