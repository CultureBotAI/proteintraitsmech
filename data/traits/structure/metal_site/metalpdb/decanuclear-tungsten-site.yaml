identifier: proteintraitsmech:METALPDB_W_DECANUCLEAR
label: "decanuclear tungsten site"
definition: >-
  A structural metal-binding site in which tungsten is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a decanuclear tungsten site (10 metal ions per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: trigonal plane with a vacancy, tetrahedron.
