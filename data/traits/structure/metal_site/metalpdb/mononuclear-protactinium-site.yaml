identifier: proteintraitsmech:METALPDB_PA_MONONUCLEAR
label: "mononuclear protactinium site"
definition: >-
  A structural metal-binding site in which protactinium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear protactinium site (1 metal ion per site). Across the MetalPDB release this class aggregates 1 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: tetrahedron.
