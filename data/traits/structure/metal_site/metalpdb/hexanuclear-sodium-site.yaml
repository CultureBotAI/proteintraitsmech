identifier: proteintraitsmech:METALPDB_NA_HEXANUCLEAR
label: "hexanuclear sodium site"
definition: >-
  A structural metal-binding site in which sodium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear sodium site (6 metal ions per site). Across the MetalPDB release this class aggregates 61 metal-site occurrences in 51 PDB structures (9+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (11); Glu (8); AX(0)D (6). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
