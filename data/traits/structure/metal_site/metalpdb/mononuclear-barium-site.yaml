identifier: proteintraitsmech:METALPDB_BA_MONONUCLEAR
label: "mononuclear barium site"
definition: >-
  A structural metal-binding site in which barium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear barium site (1 metal ion per site). Across the MetalPDB release this class aggregates 705 metal-site occurrences in 171 PDB structures (50+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (31); DX(0)L (13); Glu (10). Typical coordination geometry: irregular, trigonal plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
