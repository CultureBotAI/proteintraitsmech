identifier: proteintraitsmech:METALPDB_HG_TETRANUCLEAR
label: "tetranuclear mercury site"
definition: >-
  A structural metal-binding site in which mercury is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear mercury site (4 metal ions per site). Across the MetalPDB release this class aggregates 5 metal-site occurrences in 3 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Cys (2); Leu (2); CX(12)L (2). Typical coordination geometry: trigonal plane with a vacancy, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
