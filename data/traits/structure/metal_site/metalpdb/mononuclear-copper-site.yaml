identifier: proteintraitsmech:METALPDB_CU_MONONUCLEAR
label: "mononuclear copper site"
definition: >-
  A structural metal-binding site in which copper is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear copper site (1 metal ion per site). Across the MetalPDB release this class aggregates 3526 metal-site occurrences in 1307 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are His (256); HX(40)CX(8)HX(4)M (200); GX(0)HX(65)CX(4)H (157). Typical coordination geometry: tetrahedron, trigonal plane.
definition_source: "MetalPDB (CERM, University of Florence)"
