identifier: proteintraitsmech:METALPDB_CO_TETRANUCLEAR
label: "tetranuclear cobalt site"
definition: >-
  A structural metal-binding site in which cobalt is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a tetranuclear cobalt site (4 metal ions per site). Across the MetalPDB release this class aggregates 11 metal-site occurrences in 10 PDB structures (7+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (5); Glu (4); EX(34)EX(2)H (3). Typical coordination geometry: irregular, square pyramid.
definition_source: "MetalPDB (CERM, University of Florence)"
