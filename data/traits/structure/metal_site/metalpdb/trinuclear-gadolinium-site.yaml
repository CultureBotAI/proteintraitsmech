identifier: proteintraitsmech:METALPDB_GD_TRINUCLEAR
label: "trinuclear gadolinium site"
definition: >-
  A structural metal-binding site in which gadolinium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear gadolinium site (3 metal ions per site). Across the MetalPDB release this class aggregates 4 metal-site occurrences in 3 PDB structures (3+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(1)DX(193)D (2); Gly (2); Asp (2). Typical coordination geometry: irregular, tetrahedron with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
