identifier: proteintraitsmech:METALPDB_CM_MONONUCLEAR
label: "mononuclear curium site"
definition: >-
  A structural metal-binding site in which curium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear curium site (1 metal ion per site). Across the MetalPDB release this class aggregates 6 metal-site occurrences in 1 PDB structures (1+ distinct UniProt proteins). Typical coordination geometry: trigonal prism, square-face bicapped, irregular.
definition_source: "MetalPDB (CERM, University of Florence)"
