identifier: proteintraitsmech:METALPDB_CS_TRINUCLEAR
label: "trinuclear caesium site"
definition: >-
  A structural metal-binding site in which caesium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a trinuclear caesium site (3 metal ions per site). Across the MetalPDB release this class aggregates 25 metal-site occurrences in 16 PDB structures (8+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Thr (7); TX(0)V (3); Gly (2). Typical coordination geometry: irregular, linear.
definition_source: "MetalPDB (CERM, University of Florence)"
