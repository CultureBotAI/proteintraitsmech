identifier: proteintraitsmech:METALPDB_U_MONONUCLEAR
label: "mononuclear uranium site"
definition: >-
  A structural metal-binding site in which uranium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a mononuclear uranium site (1 metal ion per site). Across the MetalPDB release this class aggregates 305 metal-site occurrences in 58 PDB structures (22+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Asp (82); DX(47)D (31); Glu (26). Typical coordination geometry: irregular, square plane with a vacancy.
definition_source: "MetalPDB (CERM, University of Florence)"
