identifier: proteintraitsmech:METALPDB_FE_DINUCLEAR
label: "dinuclear iron site"
definition: >-
  A structural metal-binding site in which iron is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear iron site (2 metal ions per site). Across the MetalPDB release this class aggregates 3528 metal-site occurrences in 1467 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are CX(4)C (482); EX(32)EX(2)HX(72)E (238); CX(19)C (202). Typical coordination geometry: tetrahedron, irregular. Recurring cofactor context: Pur(,Fe,)-Hom(,S,).
definition_source: "MetalPDB (CERM, University of Florence)"
