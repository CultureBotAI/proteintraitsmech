identifier: proteintraitsmech:METALPDB_CA_HEXANUCLEAR
label: "hexanuclear calcium site"
definition: >-
  A structural metal-binding site in which calcium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a hexanuclear calcium site (6 metal ions per site). Across the MetalPDB release this class aggregates 39 metal-site occurrences in 35 PDB structures (10+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are Ala (25); AX(0)N (17); Glu (8). Typical coordination geometry: irregular, trigonal prism, square-face bicapped.
definition_source: "MetalPDB (CERM, University of Florence)"
