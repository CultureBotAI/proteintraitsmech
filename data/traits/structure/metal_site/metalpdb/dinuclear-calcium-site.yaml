identifier: proteintraitsmech:METALPDB_CA_DINUCLEAR
label: "dinuclear calcium site"
definition: >-
  A structural metal-binding site in which calcium is coordinated by protein side-chain, backbone and/or exogenous ligands, classified by MetalPDB as a dinuclear calcium site (2 metal ions per site). Across the MetalPDB release this class aggregates 3521 metal-site occurrences in 1886 PDB structures (200+ distinct UniProt proteins). The most frequent endogenous coordination signatures (MetalPDB ligands_pattern) are DX(1)YX(1)NX(4)D (359); Asp (221); DX(38)EX(7)DX(1)EX(2)E (196). Typical coordination geometry: irregular, octahedron.
definition_source: "MetalPDB (CERM, University of Florence)"
