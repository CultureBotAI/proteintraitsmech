identifier: InterPro:IPR015881
label: "Aromatic-ring-hydroxylating dioxygenase ARHD, Rieske 2Fe-2S-binding site"
definition: >-
  This entry represents the Rieske type 2Fe-2S binding site found at the N-terminal in the alpha-subunit of ARHD proteins and related non-heme iron oxygenases. The Rieske-type [2Fe-2S] cluster is coordinated to its protein by two cysteine residues and two histidine residues. Aromatic-ring-hydroxylating dioxygenases (ARHD) are multicomponent 1,2-dioxygenase complexes that convert closed-ring structures to non-aromatic cis-diols. The complex has both hydroxylase and electron transfer components. The hydroxylase component is composed of two subunits: an alpha-subunit of about 50 kDa and a beta-subunit of about 20 kDa. The electron transfer component is either composed of two subunits: a ferredoxin and a ferredoxin reductase or by a single bifunctional ferredoxin/reductase subunit. Sequence analysis of hydroxylase subunits of ring hydroxylating systems (including toluene, benzene, and napthalene 1,2-dioxygenases) suggests they are derived from a common ancestor. The alpha-subunit binds both a Rieske-like 2Fe-2S cluster and an iron atom: conserved Cys and His residues in the N-terminal region may provide 2Fe-2S ligands, while conserved His and Tyr residues may coordinate the iron. The beta subunit may be responsible for the substrate specificity of the dioxygenase system.
