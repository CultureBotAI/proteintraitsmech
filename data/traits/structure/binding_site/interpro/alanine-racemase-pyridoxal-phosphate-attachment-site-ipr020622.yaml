label: "Alanine racemase, pyridoxal-phosphate attachment site"
definition: >-
  Alanine racemase catalyses the pyridoxal-dependent conversion of L-alanine into D-alanine, a key component of bacterial peptidoglycan. In bacteria such as Escherichia coli and Salmonella typhimurium, there are two alanine racemase isoforms synthesised by the genes alr and dadX, where the first is a biosynthetic form required for cell wall formation and the second functions in L-alanine catabolism. In other bacteria there is only one gene encoding catabolic alanine racemase. All these enzymes are in a dynamic equilibrium between monomeric and dimeric form, but only the dimer is catalytically active, regardless of whether the organism has one or two alanine racemase genes. In Pseudomonas putida, a broad-specificity amino acid racemase is structurally and functionally related to alanine racemase. The 3D-structure of the dimeric alanine racemase from Bacillus stearothermophilus has been determined to a resolution of 1.9 A. Each monomer comprises two domains, with an eight-stranded α/β barrel at the N terminus, and a C-terminal β-strand domain. In the dimer, the mouth of the α/β barrel of one monomer faces the second domain of the other monomer. The pyridoxal 5'-phosphate (PLP) cofactor lies in and above the barrel mouth and is covalently linked via an aldimine linkage to Lys39. Several other residues are involved in anchoring the PLP, for example, Arg219 forms a hydrogen bond with the pyridine nitrogen of the cofactor, which is assumed to influence electron delocalisation in PLP-alanine intermediates; Arg136 donates a hydrogen bond to the phenolic oxygen of PLP, and may be involved in substrate binding and stabilisation of intermediates; and Tyr265' is postulated to be a 2 proton donor to the carbanion intermediate. This pattern signature contains the lysine residue of ala…
