identifier: InterPro:IPR018247
label: "EF-Hand 1, calcium-binding site"
definition: >-
  This entry represents the complete EF-hand loop as well as the first residue which follows the loop and which seem to always be hydrophobic. Interestingly, positions 1 (X), 3 (Y) and 12 (-Z) are the most conserved. The 6th residue in an EF-hand loop is, in most cases a Gly, but the number of exceptions to this 'rule' has gradually increased, therefore, this signature pattern includes all the different residues which have been shown to exist in this position in functional Ca-binding sites. The pattern is known, in some cases, to miss one of the EF-hand regions in some proteins with multiple EF-hand domains. Many calcium-binding proteins belong to the same evolutionary family and share a type of calcium-binding domain known as the EF-hand. This type of domain consists of a twelve residue loop flanked on both sides by a twelve residue α-helical domain. In an EF-hand loop the calcium ion is coordinated in a pentagonal bipyramidal configuration. The six residues involved in the binding are in positions 1, 3, 5, 7, 9 and 12; these residues are denoted by X, Y, Z, -Y, -X and -Z. The invariant Glu or Asp at position 12 provides two oxygens for liganding Ca (bidentate ligand). Ca2 binding induces a conformational change in the EF-hand motif, leading to the activation or inactivation of target proteins. EF-hands tend to occur in pairs or higher copy numbers.
