identifier: InterPro:IPR019824
label: Leghaemoglobin, iron-binding site
definition: >-
  This entry represents a conserved site found in leghaemoglobins from leguminous and non-leguminous plants, and also non-symbiotic haemoglobins from other plants. It is centred on a histidine that acts as the haem iron distal ligand. Leghaemoglobins were first identified in the root nodules of leguminous plants, where they are crucial for supplying sufficient oxygen to root nodule bacteria for nitrogen fixation to occur. Although leghaemoglobin and myoglobin both share a common fold, and both regulate the facilitated diffusion of oxygen, leghemoglobins regulate oxygen affinity through a mechanism different from that of myoglobin using a novel combination of haem pocket amino acids that lower the oxygen affinity. In non-leguminous plants, leghaemoglobins play a role in the respiratory metabolism of root cells. The structure of leghaemoglobins is similar to that of haemoglobins and myoglobins, although there is little sequence conservation. The proteins are largely α-helical, eight helices providing the scaffold for a well-defined haem-binding pocket. By contrast with the tetrameric mammalian globin assembly, the plant form is monomeric. Non-symbiotic haemoglobins (NsHb) play important roles in a variety of cellular processes. A class I NsHb from cotton plants can be induced in plant roots as a defence mechanism against pathogen invasion, possibly by modulating nitric oxide (NO) levels. Several NsHbs appear to play a role NO scavenging in plants, indicating that the primordial function of haemoglobins may well be to protect against nitrosative stress and to modulate NO signalling functions. Globins are haem-containing proteins involved in binding and/or transporting oxygen. They belong to a very large and well studied family that is widely distributed in many organisms. G…
