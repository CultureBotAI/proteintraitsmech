identifier: InterPro:IPR020578
label: "Aminotransferase class-V, pyridoxal-phosphate binding site"
definition: >-
  This entry represents a conserved region surrounding the lysine residue that binds the pyridoxal-phosphate. Aminotransferases share certain mechanistic features with other pyridoxal- phosphate dependent enzymes, such as the covalent binding of the pyridoxal- phosphate group to a lysine residue. On the basis of sequence similarity, these various enzymes can be grouped into subfamilies. This entry represents the class V aminotransferases and the related, though functionally distinct, cysteine desulfurases.
