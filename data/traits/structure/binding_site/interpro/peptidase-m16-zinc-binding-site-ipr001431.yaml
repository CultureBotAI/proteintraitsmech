label: "Peptidase M16, zinc-binding site"
definition: >-
  Over 70 metallopeptidase families have been identified to date. In these enzymes a divalent cation, which is usually zinc but may be cobalt, manganese or copper, activates the water molecule. The metal ion is held in place by amino acid ligands, usually three in number. In some families of co-catalytic metallopeptidases, two metal ions are observed in crystal structures ligated by five amino acids, with one amino acid ligating both metal ions. The known metal ligands are His, Glu, Asp or Lys. At least one other residue is required for catalysis, which may play an electrophilic role. Many metalloproteases contain an HEXXH motif, which has been shown in crystallographic studies to form part of the metal-binding site. The HEXXH motif is relatively common but can be more stringently defined for metalloproteases as 'abXHEbbHbc', where 'a' is most often valine or threonine and forms part of the S1' subsite in thermolysin and neprilysin, 'b' is an uncharged residue, and 'c' a hydrophobic residue. Proline is never found in this site, possibly because it would break the helical structure adopted by this motif in metalloproteases. A number of proteases dependent on divalent cations for their activity have been shown to belong to one family, on the basis of sequence similarity. These enzymes are listed below: Insulinase ( ) (also known as insulysin or insulin-degrading enzyme or IDE), a cytoplasmic enzyme which seems to be involved in the cellular processing of insulin, glucagon and other small polypeptides. Escherichia coli protease III ( ) (pitrilysin) (gene ptr), a periplasmic enzyme that degrades small peptides. Mitochondrial processing peptidase ( ) (MPP). This enzyme removes the transit peptide from the precursor form of proteins imported from the cytoplasm across the mitoc…
