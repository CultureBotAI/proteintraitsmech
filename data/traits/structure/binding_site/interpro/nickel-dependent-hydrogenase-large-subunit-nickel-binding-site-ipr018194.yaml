identifier: InterPro:IPR018194
label: "Nickel-dependent hydrogenase, large subunit, nickel binding site"
definition: >-
  Hydrogenases are enzymes that catalyse the reversible oxidation of hydrogen and are important in anaerobic metabolism. There are various types of metal-containing hydrogenases and can be broadly divided into three groups: Fe ('iron only') hydrogenases; Ni-Fe hydrogenases; and Ni-Fe-Se hydrogenases. The [NiFe] and [NiFeSe] hydrogenases are heterodimer that consist of a small subunit (S) that contains a signal peptide and a large subunit (L). All the known large subunits seem to be evolutionary related; they contain two Cys-x-x-Cys motifs; one at their N-terminal end; the other at their C-terminal end. These four cysteines are involved in the binding of nickel. In the [NiFeSe] hydrogenases the first cysteine of the C-terminal motif is a selenocysteine which has experimentally been shown to be a nickel ligand.
