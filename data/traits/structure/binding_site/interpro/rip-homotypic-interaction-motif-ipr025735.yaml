identifier: InterPro:IPR025735
label: "RIP homotypic interaction motif"
definition: >-
  This entry represents the RHIM (RIP homotypic interaction motif) binding site found in receptor-interacting serine/threonine-protein kinases or cell death proteins, including human Z-DNA-binding protein 1 (ZBP1, also known as DAI) is involved in virus recognition. This motif is necessary for the recruitment of RIP and RIP3. Both RIP kinases contribute to DAI-induced NF-kappaB activation. RIP3 undergoes auto phosphorylation on binding to DAI. RHIM is also located at the C terminus of TIR-domain-containing adapter-inducing IFN-beta (TRIF). It is essential for TRIF-induced apoptosis, and has been shown to contribute to TRIF-induced NF-kappaB activation.
