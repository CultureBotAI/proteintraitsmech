identifier: InterPro:IPR027467
label: "Molybdopterin oxidoreductase, molybdopterin cofactor binding site"
definition: >-
  The molybdopterin oxidoreductase 4Fe-4S domain is found in a number of reductase/dehydrogenase families, which include the periplasmic nitrate reductase precursor and the formate dehydrogenase alpha chain. This entry represents the molybdopterin cofactor binding site within the domain.
