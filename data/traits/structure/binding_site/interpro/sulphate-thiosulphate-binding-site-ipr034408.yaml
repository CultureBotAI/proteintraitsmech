identifier: InterPro:IPR034408
label: Sulphate/thiosulphate-binding site
definition: >-
  Sulphate-binding protein (gene sbp or sbpA) and thiosulphate-binding protein (gene cysP) are two structurally related periplasmic bacterial proteins which specifically bind sulphate and thiosulphate and are involved in the transport systems for these nutrients. There are two conserved regions in the protein, one located in the N-terminal region and the other in the central part of these proteins. The second region includes two adjacent amino acids (Ser-Gly) that, in sbp, are known to be essential for sulphate binding. This entry represents the second conserved region that includes two adjacent amino acids (Ser-Gly) known to be essential for sulfate binding.
