identifier: InterPro:IPR027430
label: "Visual pigments (opsins) retinal binding site"
definition: >-
  Visual pigments are the light-absorbing molecules that mediate vision. They consist of an apoprotein, opsin, covalently linked to the chromophore cis-retinal. Vision is effected through the absorption of a photon by cis-retinal which is isomerised to trans-retinal. This isomerisation leads to a change of conformation of the protein. Opsins are integral membrane proteins with seven transmembrane regions that belong to family 1 of G-protein coupled receptors. In vertebrates four different pigments are generally found. Rod cells, which mediate vision in dim light, contain the pigment rhodopsin. Cone cells, which function in bright light, are responsible for colour vision and contain three or more colour pigments (for example, in mammals: red, blue and green). By contrast with vertebrate rhodopsin, which is found in rod cells, insect photoreceptors are found in the ommatidia that comprise the compound eyes. Each Drosophila eye has 800 ommatidia, each of which contains 8 photoreceptor cells (designated R1-R8): R1-R6 are outer cells, while R7 and R8 are inner cells. Opsins RH3 and RH4 are sensitive to UV light. In Drosophila, the eye is composed of 800 facets or ommatidia. Each ommatidium contains eight photoreceptor cells (R1-R8): the R1 to R6 cells are outer cells, R7 and R8 inner cells. Each of the three types of cells (R1-R6, R7 and R8) expresses a specific opsin. Proteins evolutionary related to opsins include: Squid retinochrome, also known as retinal photoisomerase, which converts various isomers of retinal into 11-cis retinal. Mammalian opsin 3 (Encephalopsin) that may play a role in encephalic photoreception. Mammalian opsin 4 (Melanopsin) that may mediate regulation of circadian rhythms and acute suppression of pineal melatonin. Mammalian retinal pigment epithelium…
