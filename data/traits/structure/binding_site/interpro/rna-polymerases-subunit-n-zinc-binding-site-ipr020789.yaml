identifier: InterPro:IPR020789
label: "RNA polymerases, subunit N, zinc binding site"
definition: >-
  In eukaryotes, there are three different forms of DNA-dependent RNA polymerases ( ) transcribing different sets of genes. Each class of RNA polymerase is an assemblage of ten to twelve different polypeptides. In archaebacteria, there is generally a single form of RNA polymerase which also consists of an oligomeric assemblage of 10 to 13 polypeptides. Archaebacterial subunit N (gene rpoN) is a small protein of about 8kDa, it is evolutionary related to a 8.3kDa component shared by all three forms of eukaryotic RNA polymerases (gene RPB10 in yeast and POLR2J in mammals) as well as to African swine fever virus (ASFV) protein CP80R. This signature spans the conserved region, which is located at the N-terminal extremity of these polymerase subunits; this region contains two cysteines that binds a zinc ion.
