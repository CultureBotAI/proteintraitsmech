identifier: InterPro:IPR001882
label: "Biotin-binding site"
definition: >-
  Biotin, which plays a catalytic role in some carboxyl transfer reactions, is covalently attached, via an amide bond, to a lysine residue in enzymes requiring this coenzyme. Sequence data reveal that the region around the biocytin (biotin-lysine) residue is well conserved and is evolutionary related to that around the lipoyl-binding lysine residue of 2-oxo acid dehydrogenase acyltransferases.
