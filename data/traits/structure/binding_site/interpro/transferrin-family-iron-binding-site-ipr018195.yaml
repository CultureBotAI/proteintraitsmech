identifier: InterPro:IPR018195
label: Transferrin family, iron binding site
definition: >-
  Transferrins are a family of eukaryotic iron-binding glycoproteins that share the common function of controlling the level of free iron in biological fluids. The transferrin family currently includes: Blood serotransferrin (siderophilin). Milk lactotransferrin (lactoferrin). Egg white ovotransferrin (conalbumin). Membrane-associated melanotransferrin. Inhibitor of carbonic anhydrase. Transferrins are proteins of 650 to 700 residues which have evolved from the duplication of a domain of around 340 residues. Each of the duplicated domains binds one atom of iron. Each iron atom is bound by four conserved residues: an aspartic acid, two tyrosines, and a histidine. All of the cysteines in both domains are involved in intradomain disulphide bonds.
