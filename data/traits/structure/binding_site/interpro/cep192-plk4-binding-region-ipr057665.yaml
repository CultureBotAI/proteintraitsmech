identifier: InterPro:IPR057665
label: "CEP192, PLK4 binding region"
definition: >-
  This region is found in human Centrosomal protein 192 kDa (CEP192) and homologues. This region bind the cryptic polo box (CPB) of Polo-like kinase 4 (Plk4) in opposite orientations and in a mutually exclusive manner to Centrosomal protein 152 kDa (152). Plk4 is a key regulator of centriole duplication, an event critical for the maintenance of genomic integrity. Its localization at subcentrosomal structures is regulated by CEP152 and CEP192.
