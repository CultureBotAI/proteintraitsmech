identifier: InterPro:IPR001505
label: Copper centre Cu(A)
definition: >-
  The Cu(A) centre contains a mixed valence binuclear copper binding site formed of about 50 amino acids containing two cysteines and histidines and one glutamate and methionine. The Cu(A) centre has been identified in subunit II of cytochrome c oxidase and nitrous oxide reductase. Cytochrome c oxidase is an oligomeric enzymatic complex which is a component of the respiratory chain and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. The enzyme complex consists of 3-4 subunits (prokaryotes) to up to 13 polypeptides (mammals). Subunit II (see , ) transfers the electrons from cytochrome c to the catalytic subunit I. It provides the substrate-binding site and contains a Cu(A) centre that is probably the primary acceptor in cytochrome c oxidase. Nitrous oxide reductase (gene nosZ) of Pseudomonas is part of the bacterial respiratory system which is activated under anaerobic conditions in the presence of nitrate or nitrous oxide. NosZ is a periplasmic homodimer that contains a dinuclear copper centre, probably located in a 3-dimensional fold similar to the cupredoxin-like fold that has been suggested for the copper-binding site of subunit II.
