identifier: InterPro:IPR023418
label: "Transthyretin, thyroxine binding site"
definition: >-
  Transthyretin (prealbumin) is a thyroid hormone-binding protein that seems to transport thyroxine (T4) from the bloodstream to the brain. It is a protein of about 130 amino acids that assembles as a homotetramer and forms an internal channel that binds thyroxine. In humans, transthyretin is mainly synthesised in the brain choroid plexus; variants of the protein are associated with distinct forms of amyloidosis. The sequence of transthyretin is highly conserved in vertebrates. A number of uncharacterised proteins also belong to this family: Escherichia coli hypothetical protein YedX. Bacillus subtilis hypothetical protein YunM. Caenorhabditis elegans hypothetical protein R09H10.3. Caenorhabditis elegans hypothetical protein ZK697.8. The signature pattern in this entry is located in the N-terminal extremity and starts with a lysine known to be involved in binding thyroxine binding.
