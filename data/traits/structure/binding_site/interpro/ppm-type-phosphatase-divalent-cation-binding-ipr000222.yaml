identifier: InterPro:IPR000222
label: "PPM-type phosphatase, divalent cation binding"
definition: >-
  Protein phosphatases remove phosphate groups from various proteins that are the key components of a number of signalling pathways in eukaryotes and prokaryotes. Protein phosphatases that dephosphorylate Ser and Thr residues are classified into the phosphoprotein (PPP) and the protein phosphatase Mg(2+)- or Mn(2+)-dependent (PPM) families. The core structure of PPMs is the 300-residue PPM-type phosphatase domain that catalyzes the dephosphorylation of phosphoserine- and phosphothreonine-containing protein. The PPM-type phosphatase domain is found as a module in diverse structural contexts and is modulated by targeting and regulatory subunits. The PP2C-type phosphatase domain consists of 10 segments of β-strands and 5 segments of α-helix and comprises a pair of detached subdomains. The first is a small β-sandwich with strand β1 packed against strands β2 and β3; the second is a larger β-sandwich in which a four-stranded β-sheet packs against a three-stranded β-sheet with flanking α-helices. This entry represents a conserved aspartate residue involved in divalent cation binding.
