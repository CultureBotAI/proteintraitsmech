identifier: InterPro:IPR001216
label: "Cysteine synthase/cystathionine beta-synthase, pyridoxal-phosphate attachment site"
definition: >-
  Cysteine synthase ( ) (CSase) is the enzyme responsible for the formation of cysteine from O-acetyl-serine and hydrogen sulphide with the concomitant release of acetic acid. In bacteria such as Escherichia coli, two such forms of the enzyme are known (genes cysK and cysM). In plants there are also two forms, one located in the cytoplasm and the other in chloroplasts. Cystathionine beta-synthase ( ) catalyses the first irreversible step in homocysteine transulphuration, the conjugation of homocysteine and serine forming cystathionine. Like Csase it is a pyridoxal-phosphate dependent enzyme. Both enzymes are evolutionary related. The pyridoxal-phosphate attaches to the lysine residue found in the N-terminal section of these enzymes; the sequence around the lysine residue is highly conserved.
