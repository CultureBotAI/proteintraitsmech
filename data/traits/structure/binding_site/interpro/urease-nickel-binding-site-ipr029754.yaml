identifier: InterPro:IPR029754
label: "Urease nickel binding site"
definition: >-
  Urease (urea amidohydrolase, ) is a nickel-binding enzyme that catalyses the hydrolysis of urea to carbon dioxide and ammonia. Historically, it was the first enzyme to be crystallized (in 1926). It is mainly found in plant seeds, microorganisms and invertebrates. In plants, urease is a hexamer of identical chains. In bacteria, it consists of either two or three different subunits (alpha, beta and gamma). Urease binds two nickel ions per subunit; four histidine, an aspartate and a carbamated-lysine serve as ligands to these metals; an additional histidine is involved in the catalytic mechanism. The urease domain forms an (α/β)(8) barrel structure with structural similarity to other metal-dependent hydrolases, such as adenosine and AMP deaminase and phosphotriesterase. This entry represents a conserved region that contains two histidines that bind one of the nickel ions.
