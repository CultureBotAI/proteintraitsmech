identifier: InterPro:IPR020855
label: Ureohydrolase, manganese-binding site
definition: >-
  This entry represents a conserved region that contain charged residues which are involved in the binding of the two manganese ions in the active site. It is located in a loop segment of the central β-sheet. The ureohydrolase superfamily includes arginase, agmatinase, formiminoglutamase and proclavaminate amidinohydrolase. These enzymes share a 3-layer α-β-α structure, and play important roles in arginine/agmatine metabolism, the urea cycle, histidine degradation, and other pathways. Arginase, which catalyses the conversion of arginine to urea and ornithine, is one of the five members of the urea cycle enzymes that convert ammonia to urea as the principal product of nitrogen excretion. There are several arginase isozymes that differ in catalytic, molecular and immunological properties. Deficiency in the liver isozyme leads to argininemia, which is usually associated with hyperammonemia. Agmatinase hydrolyses agmatine to putrescine, the precursor for the biosynthesis of higher polyamines, spermidine and spermine. In addition, agmatine may play an important regulatory role in mammals.
