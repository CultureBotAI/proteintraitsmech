identifier: InterPro:IPR015887
label: DNA glycosylase/AP lyase, zinc finger domain, DNA-binding site
definition: >-
  This entry represents the DNA-binding site found in the C-terminal zinc finger domain of DNA glycosylase/AP lyase enzymes. These enzymes are involved in base excision repair of DNA damaged by oxidation or by mutagenic agents. These enzymes are primarily from bacteria, and have both DNA glycosylase activity ( ) and AP lyase activity ( ). Examples include formamidopyrimidine-DNA glycosylases (Fpg; MutM) and endonuclease VIII (Nei). These enzymes contain a zinc finger domain that is important for DNA-binding. Formamidopyrimidine-DNA glycosylases (Fpg, MutM) is a trifunctional DNA base excision repair enzyme that removes a wide range of oxidation-damaged bases (N-glycosylase activity; ) and cleaves both the 3'- and 5'-phosphodiester bonds of the resulting apurinic/apyrimidinic site (AP lyase activity; ). Fpg has a preference for oxidised purines, excising oxidised purine bases such as 7,8-dihydro-8-oxoguanine (8-oxoG). ITs AP (apurinic/apyrimidinic) lyase activity introduces nicks in the DNA strand, cleaving the DNA backbone by beta-delta elimination to generate a single-strand break at the site of the removed base with both 3'- and 5'-phosphates. Fpg is a monomer composed of 2 domains connected by a flexible hinge. The two DNA-binding motifs (a zinc finger and the helix-two-turns-helix motifs) suggest that the oxidised base is flipped out from double-stranded DNA in the binding mode and excised by a catalytic mechanism similar to that of bifunctional base excision repair enzymes. Fpg binds one ion of zinc at the C terminus, which contains four conserved and essential cysteines. Endonuclease VIII (Nei) has the same enzyme activities as Fpg above ( , ), but with a preference for oxidised pyrimidines, such as thymine glycol, 5,6-dihydrouracil and 5,6-dihydrothymine. Zinc fin…
