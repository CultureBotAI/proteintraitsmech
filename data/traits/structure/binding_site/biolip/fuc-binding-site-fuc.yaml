identifier: proteintraitsmech:BIOLIP_FUC
label: "FUC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-L-fucopyranose (FUC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 228 binding-site occurrences across 195 PDB structures; ligand InChIKey SHZGCJCMOBCMKK-SXUWKVJYSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
