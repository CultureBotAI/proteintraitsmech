label: "SLB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-acetyl-beta-neuraminic acid (SLB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 20 binding-site occurrences across 18 PDB structures; ligand InChIKey SQVRNKJHWKZAKO-PFQGKNLYSA-N.
