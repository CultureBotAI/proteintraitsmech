label: "BES-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-(3-AMINO-2-HYDROXY-4-PHENYL-BUTYRYLAMINO)-4-METHYL-PENTANOIC ACID (BES) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 6 binding-site occurrences across 5 PDB structures; ligand InChIKey VGGGPCQERPFHOB-RDBSUJKOSA-N.
