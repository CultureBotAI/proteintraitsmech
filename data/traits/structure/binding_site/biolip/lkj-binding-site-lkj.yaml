identifier: proteintraitsmech:BIOLIP_LKJ
label: "LKJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R)-{[(2'-[(biphenyl-3-ylmethyl)carbamoyl]-6'-{[(2R)-2-(pyrrolidin-1-ylmethyl)pyrrolidin-1-yl]carbonyl}-6-{[(2R)-2-(1H-pyrrol-1-ylmethyl)pyrrolidin-1-yl]carbonyl}-4,4'-bipyridin-2-yl)carbonyl]amino}(cyclohexyl)ethanoic acid (LKJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey OURBCKKEKMWLAJ-JYIFATIISA-N.
