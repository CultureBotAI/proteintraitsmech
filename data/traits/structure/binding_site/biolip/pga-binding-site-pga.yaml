identifier: proteintraitsmech:BIOLIP_PGA
label: "PGA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-PHOSPHOGLYCOLIC ACID (PGA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 17 binding-site occurrences across 17 PDB structures; ligand InChIKey ASCFNMCAHFUBCO-UHFFFAOYSA-N.
