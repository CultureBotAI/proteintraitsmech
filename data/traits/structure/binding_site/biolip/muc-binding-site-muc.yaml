label: "MUC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(2S)-5-oxo-2,5-dihydrofuran-2-yl]acetic acid (MUC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey HPEKPJGPWNSAAV-SCSAIBSYSA-N.
