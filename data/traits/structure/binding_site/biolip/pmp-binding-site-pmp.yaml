identifier: proteintraitsmech:BIOLIP_PMP
label: "PMP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4'-DEOXY-4'-AMINOPYRIDOXAL-5'-PHOSPHATE (PMP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 47 binding-site occurrences across 39 PDB structures; ligand InChIKey ZMJGSOSNSPKHNH-UHFFFAOYSA-N.
