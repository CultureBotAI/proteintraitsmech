label: "BTN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand BIOTIN (BTN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 40 binding-site occurrences across 37 PDB structures; ligand InChIKey YBJHBAHKTGYVGT-ZKWXMUAHSA-N.
