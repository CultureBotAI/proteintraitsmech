label: "TLA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand L(+)-TARTARIC ACID (TLA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey FEWJPZIEWOKRBE-JCYAYHJZSA-N.
