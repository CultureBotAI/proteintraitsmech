label: "YGP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 5'-O-[(R)-[(3,6-dimethyl-2-oxo-1,2-dihydropyridin-4-yl)oxy](hydroxy)phosphoryl]guanosine (YGP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey SHYVQHDJQQBUQP-UBEDBUPSSA-N.
