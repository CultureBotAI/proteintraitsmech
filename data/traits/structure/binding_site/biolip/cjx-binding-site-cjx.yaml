definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3S,4S,5R,6R)-2-(aminomethyl)-6-[(1R,2S,3S,4R,6S)-4,6-bis(azanyl)-3-[(2S,3R,4S,5S,6R)-6-(hydroxymethyl)-3,4,5-tris(oxidanyl)oxan-2-yl]oxy-2-oxidanyl-cyclohexyl]oxy-oxane-3,4,5-triol (CJX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey NZCOZAMBHLSNDW-HNDNCJINSA-N.
