definition: >-
  A structure-derived ligand-binding site at which the ligand TYROSINE (TYR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 39 binding-site occurrences across 32 PDB structures; ligand InChIKey OUYCCCASQSFEME-QMMMGPOBSA-N.
