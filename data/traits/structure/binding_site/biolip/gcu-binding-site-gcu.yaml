  A structure-derived ligand-binding site at which the ligand alpha-D-glucopyranuronic acid (GCU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 15 binding-site occurrences across 12 PDB structures; ligand InChIKey AEMOLEFTQBMNLQ-WAXACMCWSA-N.
