definition: >-
  A structure-derived ligand-binding site at which the ligand [[(2R,3S,4R,5R)-5-(6-aminopurin-9-yl)-3,4-bis(oxidanyl)oxolan-2-yl]methoxy-oxidanyl-phosphoryl] [(2S,3S,4S,5S,6R)-6-[(1S)-1,2-bis(oxidanyl)ethyl]-3,4,5-tris(oxidanyl)oxan-2-yl] hydrogen phosphate (AYU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey KMSFWBYFWSKGGR-DTBZDYEHSA-N.
