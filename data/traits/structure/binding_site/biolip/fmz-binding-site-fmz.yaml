identifier: proteintraitsmech:BIOLIP_FMZ
label: "FMZ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,4S)-5,5-dimethyl-2-[(1R)-2-oxo-1-({(2R)-2-[(2-oxoimidazolidin-1-yl)amino]-2-phenylacetyl}amino)ethyl]-1,3-thiazolidine-4-carboxylic acid (FMZ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey RSQZNYWGVGFVHY-HGTKMLMNSA-N.
