label: "MUB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-acetyl-alpha-muramic acid (MUB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 6 binding-site occurrences across 5 PDB structures; ligand InChIKey MNLRQHMNZILYPY-MDMHTWEWSA-N.
