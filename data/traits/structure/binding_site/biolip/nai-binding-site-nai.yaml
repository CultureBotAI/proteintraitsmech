identifier: proteintraitsmech:BIOLIP_NAI
label: "NAI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,4-DIHYDRONICOTINAMIDE ADENINE DINUCLEOTIDE (NAI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 107 binding-site occurrences across 98 PDB structures; ligand InChIKey BOPGDPNILDQYTO-NNYOXOHSSA-N.
