definition: >-
  A structure-derived ligand-binding site at which the ligand OXYGEN ATOM (O) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 28 binding-site occurrences across 22 PDB structures; ligand InChIKey XLYOFNOQVPJJNP-UHFFFAOYSA-N.
