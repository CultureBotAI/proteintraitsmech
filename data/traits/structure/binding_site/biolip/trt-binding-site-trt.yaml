label: "TRT-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand FRAGMENT OF TRITON X-100 (TRT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 20 binding-site occurrences across 9 PDB structures; ligand InChIKey HEUDUECKTWTQQR-UHFFFAOYSA-N.
