identifier: proteintraitsmech:BIOLIP_AC1
label: "AC1-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4,6-dideoxy-4-{[(1S,4R,5S,6S)-4,5,6-trihydroxy-3-(hydroxymethyl)cyclohex-2-en-1-yl]amino}-alpha-D-glucopyranose (AC1) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 37 binding-site occurrences across 26 PDB structures; ligand InChIKey RBZIIHWPZWOIDU-ZCGMLSCUSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
