identifier: proteintraitsmech:BIOLIP_HCY
label: "HCY-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (11alpha,14beta)-11,17,21-trihydroxypregn-4-ene-3,20-dione (HCY) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 8 binding-site occurrences across 7 PDB structures; ligand InChIKey JYGXADMDTFJGBT-VWUMJDOOSA-N.
