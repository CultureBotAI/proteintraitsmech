label: "PM7-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (5aS,12aS,13aS)-12,12-dimethyl-2,3,11,12,12a,13-hexahydro-1H,5H,6H-5a,13a-(epiminomethano)indolizino[7,6-b]carbazol-14-one (PM7) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey LBTZXCFDJFHPMI-DQLDELGASA-N.
