  A structure-derived ligand-binding site at which the ligand (5~{S},6~{R},7~{E},9~{E},11~{Z},14~{Z})-6-[(2~{R})-2-azanyl-3-(2-hydroxy-2-oxoethylamino)-3-oxidanylidene-propyl]sulfanyl-5-oxidanyl-icosa-7,9,11,14-tetraenoic acid (LTD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey YEESKJGWJFYOOK-IJHYULJSSA-N.
