identifier: proteintraitsmech:BIOLIP_EIC
label: "EIC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand LINOLEIC ACID (EIC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 26 binding-site occurrences across 19 PDB structures; ligand InChIKey OYHQOLUKZRVURQ-HZJYTTRNSA-N.
