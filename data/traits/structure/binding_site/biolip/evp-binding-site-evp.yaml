identifier: proteintraitsmech:BIOLIP_EVP
label: "EVP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (5S,5aR,8aR,9R)-9-(4-hydroxy-3,5-dimethoxyphenyl)-8-oxo-5,5a,6,8,8a,9-hexahydrofuro[3',4':6,7]naphtho[2,3-d][1,3]dioxol -5-yl 4,6-O-[(1R)-ethylidene]-beta-D-glucopyranoside (EVP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey VJJPUSNTGOMMGY-MRVIYFEKSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
