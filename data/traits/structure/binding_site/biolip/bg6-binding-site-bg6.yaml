  A structure-derived ligand-binding site at which the ligand 6-O-phosphono-beta-D-glucopyranose (BG6) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 12 PDB structures; ligand InChIKey NBSCHQHZLSJFNQ-VFUOTHLCSA-N.
