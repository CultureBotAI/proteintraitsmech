label: "SEP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHOSPHOSERINE (SEP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 11 PDB structures; ligand InChIKey BZQFBWGGLXLEPQ-REOHCLBHSA-N.
