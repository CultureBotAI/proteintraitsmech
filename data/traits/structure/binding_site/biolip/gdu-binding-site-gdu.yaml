label: "GDU-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand GALACTOSE-URIDINE-5'-DIPHOSPHATE (GDU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 10 PDB structures; ligand InChIKey HSCJRCZFDFQWRP-ABVWGUQPSA-N.
