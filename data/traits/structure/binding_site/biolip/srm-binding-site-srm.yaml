definition: >-
  A structure-derived ligand-binding site at which the ligand SIROHEME (SRM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 28 binding-site occurrences across 15 PDB structures; ligand InChIKey DLKSSIHHLYNIKN-MWBYXLBFSA-L.
