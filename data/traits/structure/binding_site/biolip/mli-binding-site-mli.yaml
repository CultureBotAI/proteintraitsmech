definition: >-
  A structure-derived ligand-binding site at which the ligand MALONATE ION (MLI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 16 binding-site occurrences across 11 PDB structures; ligand InChIKey OFOBLEOULBTSOW-UHFFFAOYSA-L.
