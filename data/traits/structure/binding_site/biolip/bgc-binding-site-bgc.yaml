identifier: proteintraitsmech:BIOLIP_BGC
label: "BGC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-glucopyranose (BGC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 733 binding-site occurrences across 352 PDB structures; ligand InChIKey WQZGKKKJIJFFOK-VFUOTHLCSA-N.
