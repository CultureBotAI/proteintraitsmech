label: "CHL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand CHLOROPHYLL B (CHL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 647 binding-site occurrences across 53 PDB structures; ligand InChIKey MWVCRINOIIOUAU-UYSPMESUSA-M.
