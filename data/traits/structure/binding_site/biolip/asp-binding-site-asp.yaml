identifier: proteintraitsmech:BIOLIP_ASP
label: "ASP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ASPARTIC ACID (ASP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 48 binding-site occurrences across 45 PDB structures; ligand InChIKey CKLJMWTZIZZHCS-REOHCLBHSA-N.
