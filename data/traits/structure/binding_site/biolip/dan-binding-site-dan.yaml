label: "DAN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-DEOXY-2,3-DEHYDRO-N-ACETYL-NEURAMINIC ACID (DAN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 7 binding-site occurrences across 7 PDB structures; ligand InChIKey JINJZWSZQKHCIP-UFGQHTETSA-N.
