  A structure-derived ligand-binding site at which the ligand PYROPHOSPHATE (PPV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 14 binding-site occurrences across 13 PDB structures; ligand InChIKey XPPKVPWEQAFLFU-UHFFFAOYSA-N.
