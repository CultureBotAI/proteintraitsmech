identifier: proteintraitsmech:BIOLIP_GDD
label: "GDD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand GUANOSINE-5'-DIPHOSPHATE-ALPHA-D-MANNOSE (GDD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 11 PDB structures; ligand InChIKey MVMSCBBUIHUTGJ-GDJBGNAASA-N.
