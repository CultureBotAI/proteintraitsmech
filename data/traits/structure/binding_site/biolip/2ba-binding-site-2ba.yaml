identifier: proteintraitsmech:BIOLIP_2BA
label: "2BA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3R,3aS,5R,7aR,9R,10R,10aS,12R,14aR)-2,9-bis(6-amino-9H-purin-9-yl)octahydro-2H,7H-difuro[3,2-d:3',2'-j][1,3,7,9,2,8 ]tetraoxadiphosphacyclododecine-3,5,10,12-tetrol 5,12-dioxide (2BA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 25 binding-site occurrences across 19 PDB structures; ligand InChIKey PDXMFTWFFKBFIN-XPWFQUROSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
