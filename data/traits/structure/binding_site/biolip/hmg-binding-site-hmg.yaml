definition: >-
  A structure-derived ligand-binding site at which the ligand 3-HYDROXY-3-METHYLGLUTARYL-COENZYME A (HMG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 6 binding-site occurrences across 5 PDB structures; ligand InChIKey CABVTRNMFUVUDM-VRHQGPGLSA-I.
