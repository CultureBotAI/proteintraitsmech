label: "ECH-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta,beta-caroten-4-one (ECH) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 9 binding-site occurrences across 8 PDB structures; ligand InChIKey QXNWZXMBUKUYMD-QQGJMDNJSA-N.
