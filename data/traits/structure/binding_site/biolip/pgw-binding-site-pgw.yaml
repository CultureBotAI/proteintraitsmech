identifier: proteintraitsmech:BIOLIP_PGW
label: "PGW-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1R)-2-{[(S)-{[(2S)-2,3-dihydroxypropyl]oxy}(hydroxy)phosphoryl]oxy}-1-[(hexadecanoyloxy)methyl]ethyl (9Z)-octadec-9-enoate (PGW) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 87 binding-site occurrences across 27 PDB structures; ligand InChIKey PAZGBAOHGQRCBP-HGWHEPCSSA-N.
