identifier: proteintraitsmech:BIOLIP_AHR
label: "AHR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-L-arabinofuranose (AHR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 32 binding-site occurrences across 19 PDB structures; ligand InChIKey HMFHBZSHGGEWLO-QMKXCQHVSA-N.
