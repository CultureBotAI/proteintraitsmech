definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-3-[(2S,4E)-4-[[(1R,2S,4aR,6S,8R,8aS)-2-[(E)-but-2-en-2-yl]-6,8-dimethyl-1,2,4a,5,6,7,8,8a-octahydronaphthalen-1-yl]-oxidanyl-methylidene]-3,5-bis(oxidanylidene)pyrrolidin-2-yl]-2-methyl-2-oxidanyl-propanoic acid (WK1) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey AVZATKWNGXCSDN-RQCLIRHHSA-N.
