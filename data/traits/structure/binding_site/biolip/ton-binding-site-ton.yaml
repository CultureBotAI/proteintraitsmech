identifier: proteintraitsmech:BIOLIP_TON
label: "TON-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-{2-[4-(1,1,3,3-TETRAMETHYLBUTYL)PHENOXY]ETHOXY}ETHANOL (TON) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey LBCZOTMMGHGTPH-UHFFFAOYSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
