identifier: proteintraitsmech:BIOLIP_GGS
label: "GGS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand phosphonooxy-[(10E)-3,7,11,15-tetramethylhexadeca-2,6,10,14-tetraenyl]sulfanyl-phosphinic acid (GGS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey BUSOKXFDTDWPOS-OGGZDJOISA-N.
