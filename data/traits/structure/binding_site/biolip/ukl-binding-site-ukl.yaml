  A structure-derived ligand-binding site at which the ligand [(2R,3S,4R,5R)-5-(6-amino-9H-purin-9-yl)-4-hydroxy-3-(phosphonooxy)oxolan-2-yl]methyl (3R)-3-hydroxy-2,2-dimethyl-4-oxo-4-{[3-oxo-3-({2-[(2-oxohexadecyl)sulfanyl]ethyl}amino)propyl]amino}butyl dihydrogen diphosphate (non-preferred name) (UKL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey IAOAEHHNNYJGNY-WOQKIVQTSA-N.
