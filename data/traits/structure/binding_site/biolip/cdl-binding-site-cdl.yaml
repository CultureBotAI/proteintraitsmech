label: "CDL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand CARDIOLIPIN (CDL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 25 binding-site occurrences across 10 PDB structures; ligand InChIKey XVTUQDWPJJBEHJ-KZCWQMDCSA-L.
