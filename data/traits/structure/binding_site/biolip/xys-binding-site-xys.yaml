label: "XYS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-D-xylopyranose (XYS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 54 binding-site occurrences across 39 PDB structures; ligand InChIKey SRBFZHDQGSBBOR-LECHCGJUSA-N.
