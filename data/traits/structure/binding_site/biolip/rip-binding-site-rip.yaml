identifier: proteintraitsmech:BIOLIP_RIP
label: "RIP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-ribopyranose (RIP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 8 binding-site occurrences across 8 PDB structures; ligand InChIKey SRBFZHDQGSBBOR-TXICZTDVSA-N.
