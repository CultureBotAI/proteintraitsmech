label: "HQG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [[(2~{R},3~{S},4~{R},5~{R})-5-(6-aminopurin-9-yl)-3,4-bis(oxidanyl)oxolan-2-yl]methoxy-oxidanyl-phosphoryl] [(2~{R},3~{S},4~{R},5~{R})-3,4-bis(oxidanyl)-5-phosphonooxy-oxolan-2-yl]methyl hydrogen phosphate (HQG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 4 PDB structures; ligand InChIKey CUNFRFHBHMFVPH-KEOHHSTQSA-N.
