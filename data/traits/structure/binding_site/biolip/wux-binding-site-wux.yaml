definition: >-
  A structure-derived ligand-binding site at which the ligand 2-[(3~{R},4~{S},5~{S},8~{S},9~{S},10~{S},11~{R},13~{S},14~{S},16~{S})-16-acetyloxy-4,8,10,14-tetramethyl-3,11-bis(oxidanyl)-1,2,3,4,5,6,7,9,11,12,13,15,16,17-tetradecahydrocyclopenta[a]phenanthren-17-yl]-5-cyclopentyl-pentanoic acid (WUX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey HKTRXHLPFUKYDU-VDIKIJNFSA-N.
