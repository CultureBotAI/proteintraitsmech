identifier: proteintraitsmech:BIOLIP_WPI
label: "WPI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,4-bis[(4E)-5-(3,4,5-trimethoxyphenyl)pent-4-en-1-yl]-1,4-diazepane (WPI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey JXXCDAKRSXICGM-AOEKMSOUSA-N.
