label: "SPO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand SPHEROIDENE (SPO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 23 binding-site occurrences across 7 PDB structures; ligand InChIKey FJOCMTHZSURUFA-KXCOHNEYSA-N.
