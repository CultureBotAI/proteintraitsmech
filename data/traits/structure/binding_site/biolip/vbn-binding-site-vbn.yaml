identifier: proteintraitsmech:BIOLIP_VBN
label: "VBN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (4S,5R)-N-{3-[(2,3-dihydroxybenzoyl)amino]propyl}-2-(2,3-dihydroxyphenyl)-N-[3-({[(4S,5R)-2-(2,3-dihydroxyphenyl)-5-met hyl-4,5-dihydro-1,3-oxazol-4-yl]carbonyl}amino)propyl]-5-methyl-4,5-dihydro-1,3-oxazole-4-carboxamide (VBN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey LLMKLMMXMOTPRU-QCOILQKOSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
