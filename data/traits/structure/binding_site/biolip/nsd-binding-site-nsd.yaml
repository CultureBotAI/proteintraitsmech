label: "NSD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-(3-aminopropyl)propane-1,3-diamine (NSD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey OTBHHUPVCYLGQO-UHFFFAOYSA-N.
