identifier: proteintraitsmech:BIOLIP_TPP
label: "TPP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand THIAMINE DIPHOSPHATE (TPP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 163 binding-site occurrences across 98 PDB structures; ligand InChIKey AYEKOFBPNLCAJY-UHFFFAOYSA-O.
