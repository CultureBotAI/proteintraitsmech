identifier: proteintraitsmech:BIOLIP_ECL
label: "ECL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-[(2R)-2-[(4-chlorobenzyl)oxy]-2-(2,4-dichlorophenyl)ethyl]-1H-imidazole (ECL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey LEZWWPYKPKIXLL-SFHVURJKSA-N.
