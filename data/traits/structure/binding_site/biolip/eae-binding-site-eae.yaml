definition: >-
  A structure-derived ligand-binding site at which the ligand (1~{Z})-1-(3-ethyl-5-methoxy-1,3-benzothiazol-2-ylidene)propan-2-one (EAE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey BGVLELSCIHASRV-QPEQYQDCSA-N.
