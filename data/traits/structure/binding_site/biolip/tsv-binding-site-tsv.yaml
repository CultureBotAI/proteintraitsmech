identifier: proteintraitsmech:BIOLIP_TSV
label: "TSV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,6S,12Z,13aS,14aR,16aS)-6-[(tert-butoxycarbonyl)amino]-14a-[(cyclopropylsulfonyl)carbamoyl]-5,16-dioxo-1,2,3,5,6,7,8 ,9,10,11,13a,14,14a,15,16,16a-hexadecahydrocyclopropa[e]pyrrolo[1,2-a][1,4]diazacyclopentadecin-2-yl 4-fluoro-2H-isoindole-2-carboxylate (TSV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey YUWURHBDLJOUAP-JSZLBQEHSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
