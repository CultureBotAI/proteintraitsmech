label: "CDP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand CYTIDINE-5'-DIPHOSPHATE (CDP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 29 binding-site occurrences across 24 PDB structures; ligand InChIKey ZWIADYZPOWUWEW-XVFCMESISA-N.
