  A structure-derived ligand-binding site at which the ligand (4S,4aS,6aR,8R,9R,11E,12aR,14aS,17E,18aR,18bR)-9-ethyl-4,8,19-trihydroxy-11,12a,13,18a-tetramethyl-2,3,4,4a,6a,7,8,9,10,12a,13,14,18a,18b-tetradecahydro-14a,17-(metheno)cyclobuta[b]naphtho[2,1-j][1]azacyclotetradecine-16,18(1H,15H)-dione (9LC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey FPGYXUMODXYNNS-BKXSIXICSA-N.
