label: "I3C-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 5-amino-2,4,6-triiodobenzene-1,3-dicarboxylic acid (I3C) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 32 binding-site occurrences across 16 PDB structures; ligand InChIKey JEZJSNULLBSYHV-UHFFFAOYSA-N.
