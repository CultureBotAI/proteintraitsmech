identifier: proteintraitsmech:BIOLIP_HEA
label: "HEA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand HEME-A (HEA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 30 binding-site occurrences across 15 PDB structures; ligand InChIKey ZGGYGTCPXNDTRV-PRYGPKJJSA-L.
