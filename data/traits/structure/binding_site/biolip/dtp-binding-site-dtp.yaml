identifier: proteintraitsmech:BIOLIP_DTP
label: "DTP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2'-DEOXYADENOSINE 5'-TRIPHOSPHATE (DTP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 41 binding-site occurrences across 29 PDB structures; ligand InChIKey SUYVUBYJARFZHO-RRKCRQDMSA-N.
