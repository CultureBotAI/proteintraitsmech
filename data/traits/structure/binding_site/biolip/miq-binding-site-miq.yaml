  A structure-derived ligand-binding site at which the ligand 2-[(3S)-2,6-dioxopiperidin-3-yl]-5-(morpholin-4-yl)-1H-isoindole-1,3(2H)-dione (MIQ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey CCCSRHUSXCBFJZ-ZDUSSCGKSA-N.
