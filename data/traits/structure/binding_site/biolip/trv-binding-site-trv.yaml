label: "TRV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 6-O-octanoyl-beta-D-fructofuranose (TRV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 2 PDB structures; ligand InChIKey UJGLCJCSHGMKFA-RUZUBIRVSA-N.
