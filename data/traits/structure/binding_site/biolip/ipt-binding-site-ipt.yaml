identifier: proteintraitsmech:BIOLIP_IPT
label: "IPT-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-methylethyl 1-thio-beta-D-galactopyranoside (IPT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 10 binding-site occurrences across 6 PDB structures; ligand InChIKey BPHPUYQFMNQIOC-NXRLNHOXSA-N.
