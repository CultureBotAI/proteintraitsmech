label: "B7N-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1R)-2-{[(S)-hydroxy{[(1S,2R,3R,4S,5S,6R)-2,3,4,5,6-pentahydroxycyclohexyl]oxy}phosphoryl]oxy}-1-[(octadecanoyloxy)methyl]ethyl (9Z)-octadec-9-enoate (B7N) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey YOBFISPJJWPPTK-BAAZTTAESA-N.
