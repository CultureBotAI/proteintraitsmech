identifier: proteintraitsmech:BIOLIP_BBI
label: "BBI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2-butyl-1-benzofuran-3-yl){4-[2-(diethylamino)ethoxy]-3,5-diiodophenyl}methanone (BBI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey IYIKLHRQXLHMJQ-UHFFFAOYSA-N.
