definition: >-
  A structure-derived ligand-binding site at which the ligand S-ADENOSYL-L-HOMOCYSTEINE (SAH) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 420 binding-site occurrences across 400 PDB structures; ligand InChIKey ZJUKTBDSGOFHSH-WFMPWKQPSA-N.
