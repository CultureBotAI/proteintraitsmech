identifier: proteintraitsmech:BIOLIP_PUS
label: "PUS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (E)-O-(carbamoylamino)-N-({3-hydroxy-2-methyl-5-[(phosphonooxy)methyl]pyridin-4-yl}methylidene)-L-serine (PUS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey LKTMSPZJJUSLRR-FUOCOAHQSA-N.
