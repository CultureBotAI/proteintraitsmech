label: "VEI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2~{R},3~{S},4~{S},5~{R},6~{R})-2-(hydroxymethyl)-6-[[(3~{S},5~{R},8~{R},9~{R},10~{R},12~{R},13~{R},14~{R},17~{S})-17-[(2~{S})-2-[(2~{S},3~{R},4~{S},5~{S},6~{R})-6-(hydroxymethyl)-3,4,5-tris(oxidanyl)oxan-2-yl]oxy-6-methyl-hept-5-en-2-yl]-4,4,8,10,14-pentamethyl-12-oxidanyl-2,3,5,6,7,9,11,12,13,15,16,17-dodecahydro-1~{H}-cyclopenta[a]phenanthren-3-yl]oxy]oxane-3,4,5-triol (VEI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SWIROVJVGRGSPO-JBVRGBGGSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
