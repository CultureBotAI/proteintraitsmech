definition: >-
  A structure-derived ligand-binding site at which the ligand [(2S)-2-[(2S)-butan-2-yl]-4-(5-chloro-1,3-benzoxazol-2-yl)-1,4-diazepan-1-yl][5-methyl-2-(2H-1,2,3-triazol-2-yl)phenyl]methanone (JHC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey CRLKYMWQHWKXAE-FDDCHVKYSA-N.
