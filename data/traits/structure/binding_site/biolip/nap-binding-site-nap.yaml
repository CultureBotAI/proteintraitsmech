identifier: proteintraitsmech:BIOLIP_NAP
label: "NAP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand NADP NICOTINAMIDE-ADENINE-DINUCLEOTIDE PHOSPHATE (NAP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 496 binding-site occurrences across 471 PDB structures; ligand InChIKey XJLXINKUBYWONI-NNYOXOHSSA-N.
