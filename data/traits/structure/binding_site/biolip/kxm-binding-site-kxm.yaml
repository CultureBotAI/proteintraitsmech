definition: >-
  A structure-derived ligand-binding site at which the ligand [(2R,3S,4R,5R)-5-(6-amino-9H-purin-9-yl)-3,4-dihydroxytetrahydrofuran-2-yl]methyl (2R,3R,4R)-5-[(4aR)-7,8-dimethyl-2,4-dioxo-5-(2-phenylethyl)-3,4,4a,5-tetrahydrobenzo[g]pteridin-10(2H)-yl]-2,3,4-trihydroxypentyl dihydrogen diphosphate (non-preferred name) (KXM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey IGCDLEVMDDLVJB-TUIVOLRASA-N.
