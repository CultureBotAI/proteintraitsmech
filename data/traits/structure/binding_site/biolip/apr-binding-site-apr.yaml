identifier: proteintraitsmech:BIOLIP_APR
label: "APR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ADENOSINE-5-DIPHOSPHORIBOSE (APR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 50 binding-site occurrences across 43 PDB structures; ligand InChIKey SRNWOUGRCWSEMX-KEOHHSTQSA-N.
