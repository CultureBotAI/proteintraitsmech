identifier: proteintraitsmech:BIOLIP_MAN
label: "MAN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-D-mannopyranose (MAN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 844 binding-site occurrences across 455 PDB structures; ligand InChIKey WQZGKKKJIJFFOK-PQMKYFCFSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
