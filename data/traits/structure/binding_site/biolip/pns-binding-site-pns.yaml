identifier: proteintraitsmech:BIOLIP_PNS
label: "PNS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4'-PHOSPHOPANTETHEINE (PNS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 44 binding-site occurrences across 40 PDB structures; ligand InChIKey JDMUPRLRUUMCTL-VIFPVBQESA-N.
