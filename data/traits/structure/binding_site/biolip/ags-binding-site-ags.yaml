identifier: proteintraitsmech:BIOLIP_AGS
label: "AGS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHOSPHOTHIOPHOSPHORIC ACID-ADENYLATE ESTER (AGS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 230 binding-site occurrences across 144 PDB structures; ligand InChIKey NLTUCYMLOPLUHL-KQYNXXCUSA-N.
