identifier: proteintraitsmech:BIOLIP_QRP
label: "QRP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (3S,8aS)-3-(1H-indol-3-ylmethyl)hexahydropyrrolo[1,2-a]pyrazine-1,4-dione (QRP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey RYFZBPVMVYTEKZ-KBPBESRZSA-N.
