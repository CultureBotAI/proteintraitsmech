identifier: proteintraitsmech:BIOLIP_PEPTIDE
label: "peptide-binding site"
definition: >-
  A structure-derived ligand-binding site at which a peptide is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4217 binding-site occurrences across 3302 PDB structures.
