identifier: proteintraitsmech:BIOLIP_AMP
label: "AMP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ADENOSINE MONOPHOSPHATE (AMP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 322 binding-site occurrences across 289 PDB structures; ligand InChIKey UDMBCSSLTHHNCD-KQYNXXCUSA-N.
