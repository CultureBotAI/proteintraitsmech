label: "JH3-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl (2E,6E)-9-[(2R)-3,3-dimethyloxiran-2-yl]-3,7-dimethylnona-2,6-dienoate (JH3) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey QVJMXSGZTCGLHZ-HONBPKQLSA-N.
