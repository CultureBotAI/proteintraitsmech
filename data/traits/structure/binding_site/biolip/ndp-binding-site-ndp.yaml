identifier: proteintraitsmech:BIOLIP_NDP
label: "NDP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand NADPH DIHYDRO-NICOTINAMIDE-ADENINE-DINUCLEOTIDE PHOSPHATE (NDP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 268 binding-site occurrences across 250 PDB structures; ligand InChIKey ACFIXJIJDZMPPO-NNYOXOHSSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
