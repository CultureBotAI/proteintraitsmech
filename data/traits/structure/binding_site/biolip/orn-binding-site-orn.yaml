identifier: proteintraitsmech:BIOLIP_ORN
label: "ORN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand L-ornithine (ORN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 15 binding-site occurrences across 13 PDB structures; ligand InChIKey AHLPHDHHMVZTML-BYPYZUCNSA-N.
