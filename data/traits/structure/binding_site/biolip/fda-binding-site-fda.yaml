identifier: proteintraitsmech:BIOLIP_FDA
label: "FDA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand DIHYDROFLAVINE-ADENINE DINUCLEOTIDE (FDA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 43 binding-site occurrences across 33 PDB structures; ligand InChIKey YPZRHBJKEMOYQH-UYBVJOGSSA-N.
