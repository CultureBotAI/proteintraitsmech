identifier: proteintraitsmech:BIOLIP_NXL
label: "NXL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,5R)-1-formyl-5-[(sulfooxy)amino]piperidine-2-carboxamide (NXL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 17 binding-site occurrences across 15 PDB structures; ligand InChIKey WJDGWXPPFHLLNL-RITPCOANSA-N.
