identifier: proteintraitsmech:BIOLIP_VDG
label: "VDG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-2-[[(2S,3S,4S)-5-aminocarbonyloxy-2-azanyl-3,4-bis(oxidanyl)pentanoyl]amino]-2-[(2R,3S,4R,5R)-5-[5-(hydroxymethyl)-2,4-bis(oxidanylidene)pyrimidin-1-yl]-3,4-bis(oxidanyl)oxolan-2-yl]ethanoic acid (VDG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey YFZNSPMAOIVQRP-YVKGXWRCSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
