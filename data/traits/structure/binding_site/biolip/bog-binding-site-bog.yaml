  A structure-derived ligand-binding site at which the ligand octyl beta-D-glucopyranoside (BOG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 3 PDB structures; ligand InChIKey HEGSGKPQLMEBJL-RKQHYHRCSA-N.
