identifier: proteintraitsmech:BIOLIP_MER
label: "MER-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (4R,5S)-3-{[(3S,5S)-5-(dimethylcarbamoyl)pyrrolidin-3-yl]sulfanyl}-5-[(2S,3R)-3-hydroxy-1-oxobutan-2-yl]-4-methyl-4,5-d ihydro-1H-pyrrole-2-carboxylic acid (MER) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey DYQHXZPAIVAJRU-HTXLXMOSSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
