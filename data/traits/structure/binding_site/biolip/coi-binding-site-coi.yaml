label: "COI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-OXO-4-METHYLPENTANOIC ACID (COI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 5 PDB structures; ligand InChIKey BKAJNAXTPSGJCU-UHFFFAOYSA-N.
