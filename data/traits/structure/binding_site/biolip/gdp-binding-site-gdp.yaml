label: "GDP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand GUANOSINE-5'-DIPHOSPHATE (GDP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 384 binding-site occurrences across 346 PDB structures; ligand InChIKey QGWNDRXFNXRZMB-UUOKFMHZSA-N.
