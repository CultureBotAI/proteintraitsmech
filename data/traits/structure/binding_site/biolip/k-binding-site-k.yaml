identifier: proteintraitsmech:BIOLIP_K
label: "K-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand POTASSIUM ION (K) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 80 binding-site occurrences across 42 PDB structures; ligand InChIKey NPYPAHLBTDXSSS-UHFFFAOYSA-N.
