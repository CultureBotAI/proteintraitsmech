label: "MBG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl beta-D-galactopyranoside (MBG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey HOVAGTYPODGVJG-VOQCIKJUSA-N.
