definition: >-
  A structure-derived ligand-binding site at which the ligand (5R)-2,4-dideoxy-1-C-{(2S,3R,4S)-3-hydroxy-4-[(2R,3S,4E,6E,9R,10S,11R,12E,14Z)-10-hydroxy-3,15-dimethoxy-7,9,11,13-tetramethyl-16-oxo-1-oxacyclohexadeca-4,6,12,14-tetraen-2-yl]pentan-2-yl}-4-methyl-5-propan-2-yl-alpha-D-threo-pentopyranose (WEV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 2 PDB structures; ligand InChIKey XDHNQDDQEHDUTM-XJKSCTEHSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
