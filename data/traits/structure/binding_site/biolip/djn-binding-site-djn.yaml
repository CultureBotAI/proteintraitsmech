identifier: proteintraitsmech:BIOLIP_DJN
label: "DJN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-[(3S,4R,5S,6R)-4,5-dihydroxy-6-(hydroxymethyl)piperidin-3-yl]acetamide (DJN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey GBRAQQUMMCVTAV-OSMVPFSASA-N.
