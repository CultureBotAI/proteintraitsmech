identifier: proteintraitsmech:BIOLIP_FOF
label: "FOF-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2E,6E)-3,7,11-trimethyldodeca-2,6,10-trien-1-ol (FOF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey CRDAMVZIKSXKFV-YFVJMOTDSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
