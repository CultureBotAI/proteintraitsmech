label: "PXS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-propane-1,2-diyl dihexadecanoate (PXS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey UWTZRBLIYNMYTC-XIFFEERXSA-N.
