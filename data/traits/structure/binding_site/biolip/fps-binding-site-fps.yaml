identifier: proteintraitsmech:BIOLIP_FPS
label: "FPS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand S-[(2E,6E)-3,7,11-TRIMETHYLDODECA-2,6,10-TRIENYL] TRIHYDROGEN THIODIPHOSPHATE (FPS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 10 PDB structures; ligand InChIKey MYMLCRQRXFRQGP-YFVJMOTDSA-N.
