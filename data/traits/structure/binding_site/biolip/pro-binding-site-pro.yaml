identifier: proteintraitsmech:BIOLIP_PRO
label: "PRO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PROLINE (PRO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 40 binding-site occurrences across 37 PDB structures; ligand InChIKey ONIBWKKTOPOVIA-BYPYZUCNSA-N.
