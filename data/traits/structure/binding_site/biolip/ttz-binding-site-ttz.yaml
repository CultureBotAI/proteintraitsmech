label: "TTZ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-[(3aS,4R,5S,6S,6aS)-4,5,6-trihydroxy-4-(hydroxymethyl)-4,5,6,6a-tetrahydro-3aH-cyclopenta[d][1,3]thiazol-2-yl]-alpha- D-glucopyranosylamine (TTZ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey UISBBVOCYJQFAA-UXTOMXPUSA-N.
