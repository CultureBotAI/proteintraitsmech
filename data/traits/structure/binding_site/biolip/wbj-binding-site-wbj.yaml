label: "WBJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2E)-2-[({3-hydroxy-2-methyl-5-[(phosphonooxy)methyl]pyridin-4-yl}methyl)imino]but-3-enoic acid (WBJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 2 PDB structures; ligand InChIKey ILCWREDNKMRIGC-GXDHUFHOSA-N.
