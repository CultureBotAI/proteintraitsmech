label: "TXI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R)-N-(4-chloro-3-oxobutyl)-2,4-dihydroxy-3,3-dimethylbutanamide (TXI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey ZTVXVQKLPAOIJF-QMMMGPOBSA-N.
