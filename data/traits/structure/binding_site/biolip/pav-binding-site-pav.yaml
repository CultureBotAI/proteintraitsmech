identifier: proteintraitsmech:BIOLIP_PAV
label: "PAV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,4S)-2-methyl-2,3,3,4-tetrahydroxytetrahydrofuran (PAV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 6 binding-site occurrences across 6 PDB structures; ligand InChIKey BVIYGXUQVXBHQS-IUYQGCFVSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
