identifier: proteintraitsmech:BIOLIP_RCC
label: "RCC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 3-{(2Z,3S,4S)-5-[(Z)-(4-ethenyl-3-methyl-5-oxo-1,5-dihydro-2H-pyrrol-2-ylidene)methyl]-2-[(5R)-2-[(3-ethyl-5-formyl-4-methyl-1H-pyrrol-2-yl)methyl]-5-(methoxycarbonyl)-3-methyl-4-oxo-4,5-dihydrocyclopenta[b]pyrrol-6(1H)-ylidene]-4-methyl-3,4-dihydro-2H-pyrrol-3-yl}propanoic acid (RCC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey ZDEZVOKVUGXDCZ-FATBKOMMSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
