identifier: proteintraitsmech:BIOLIP_GAL
label: "GAL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-galactopyranose (GAL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 299 binding-site occurrences across 250 PDB structures; ligand InChIKey WQZGKKKJIJFFOK-FPRJBGLDSA-N.
