identifier: proteintraitsmech:BIOLIP_UDP
label: "UDP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand URIDINE-5'-DIPHOSPHATE (UDP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 177 binding-site occurrences across 167 PDB structures; ligand InChIKey XCCTYIAWTASOJW-XVFCMESISA-N.
