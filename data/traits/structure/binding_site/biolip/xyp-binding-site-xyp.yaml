identifier: proteintraitsmech:BIOLIP_XYP
label: "XYP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-xylopyranose (XYP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 143 binding-site occurrences across 73 PDB structures; ligand InChIKey SRBFZHDQGSBBOR-KKQCNMDGSA-N.
