identifier: proteintraitsmech:BIOLIP_ANP
label: "ANP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHOSPHOAMINOPHOSPHONIC ACID-ADENYLATE ESTER (ANP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 461 binding-site occurrences across 366 PDB structures; ligand InChIKey PVKSNHVPLWYQGJ-KQYNXXCUSA-N.
