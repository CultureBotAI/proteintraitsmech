identifier: proteintraitsmech:BIOLIP_GTP
label: "GTP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand GUANOSINE-5'-TRIPHOSPHATE (GTP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 210 binding-site occurrences across 171 PDB structures; ligand InChIKey XKMLYUALXHKNFT-UUOKFMHZSA-N.
