definition: >-
  A structure-derived ligand-binding site at which the ligand (3E)-3-{(1S,4S,4aS,5R,8aS)-1-[(2E,4R,7S,8E,10S)-1,7-dihydroxy-10-{(2R,3S,5R)-5-[(1S)-1-methoxyethyl]-3-methyloxolan-2-yl}-4-methylundeca-2,8-dien-2-yl]-4,5-dimethyloctahydro-3H-2-benzopyran-3-ylidene}oxolane-2,4-dione (KUJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey RLWRBBXSBCBSGG-HASGRZBRSA-N.
