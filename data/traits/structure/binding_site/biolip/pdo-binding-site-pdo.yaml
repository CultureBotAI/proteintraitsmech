identifier: proteintraitsmech:BIOLIP_PDO
label: "PDO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,3-PROPANDIOL (PDO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 22 binding-site occurrences across 16 PDB structures; ligand InChIKey YPFDHNVEDLHUCE-UHFFFAOYSA-N.
