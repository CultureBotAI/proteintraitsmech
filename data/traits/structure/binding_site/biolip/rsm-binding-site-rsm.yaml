label: "RSM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-2-(acetylamino)-N-methyl-4-[(R)-methylsulfinyl]butanamide (RSM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey HOKSMYPIXLKSMM-JKYUHCHBSA-N.
