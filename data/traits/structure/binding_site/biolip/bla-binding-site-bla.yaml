label: "BLA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand BILIVERDINE IX ALPHA (BLA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 30 binding-site occurrences across 25 PDB structures; ligand InChIKey GWZYPXHJIZCRAJ-SRVCBVSDSA-N.
