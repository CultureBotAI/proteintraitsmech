definition: >-
  A structure-derived ligand-binding site at which the ligand COENZYME A (COA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 321 binding-site occurrences across 261 PDB structures; ligand InChIKey RGJOEKWQDUBAIZ-IBOSZNHHSA-N.
