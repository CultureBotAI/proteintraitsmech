label: "BHO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand BENZHYDROXAMIC ACID (BHO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey VDEUYMSGMPQMIK-UHFFFAOYSA-N.
