definition: >-
  A structure-derived ligand-binding site at which the ligand (2~{R},4~{R},5~{S},6~{S})-6-[(1~{R})-1,2-bis(oxidanyl)ethyl]-2-[[(2~{R},3~{S},4~{S},5~{R},6~{S})-5-[[(3~{R})-3-dodecanoyloxytetradecanoyl]amino]-6-[[(2~{R},3~{R},4~{R},5~{S},6~{S})-3-oxidanyl-5-[[(3~{R})-3-oxidanyltetradecanoyl]amino]-4-[(3~{R})-3-oxidanyltetradecanoyl]oxy-6-phosphonooxy-oxan-2-yl]methoxy]-3-phosphonooxy-4-[(3~{S})-3-tetradecanoyloxytetradecanoyl]oxy-oxan-2-yl]methoxy]-4,5-bis(oxidanyl)oxane-2-carboxylic acid (CTQ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey AZXYYZACAOTCLK-SRFXZGGDSA-N.
