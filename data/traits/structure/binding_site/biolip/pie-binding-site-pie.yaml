  A structure-derived ligand-binding site at which the ligand 1,2-DIACYL-SN-GLYCERO-3-PHOSPHOINOSITOL (PIE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 4 PDB structures; ligand InChIKey PDLAMJKMOKWLAJ-OJERQSHOSA-M.
