definition: >-
  A structure-derived ligand-binding site at which the ligand ACETATE ION (ACT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 71 binding-site occurrences across 57 PDB structures; ligand InChIKey QTBSBXVTEAMEQO-UHFFFAOYSA-M.
