identifier: proteintraitsmech:BIOLIP_RIB
label: "RIB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-D-ribofuranose (RIB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 10 binding-site occurrences across 9 PDB structures; ligand InChIKey HMFHBZSHGGEWLO-AIHAYLRMSA-N.
