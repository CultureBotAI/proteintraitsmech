identifier: proteintraitsmech:BIOLIP_LDZ
label: "LDZ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-[(benzyloxy)carbonyl]-L-leucyl-N-[(2S)-4-methyl-1-oxopentan-2-yl]-L-leucinamide (LDZ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 2 PDB structures; ligand InChIKey TZYWCYJVHRLUCT-VABKMULXSA-N.
