identifier: proteintraitsmech:BIOLIP_INS
label: "INS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,2,3,4,5,6-HEXAHYDROXY-CYCLOHEXANE (INS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 12 binding-site occurrences across 11 PDB structures; ligand InChIKey CDAISMWEOUEBRE-GPIVLXJGSA-N.
