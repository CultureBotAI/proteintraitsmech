label: "LRY-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-acetylmannosamine-6-phosphate (LRY) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey QDSLHWJDSQGPEE-WCTZXXKLSA-N.
