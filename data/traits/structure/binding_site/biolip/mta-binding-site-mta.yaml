label: "MTA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 5'-DEOXY-5'-METHYLTHIOADENOSINE (MTA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 26 binding-site occurrences across 26 PDB structures; ligand InChIKey WUUGFSXJNOTRMR-IOSLPCCCSA-N.
