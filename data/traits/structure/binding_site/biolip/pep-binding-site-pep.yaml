  A structure-derived ligand-binding site at which the ligand PHOSPHOENOLPYRUVATE (PEP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 22 binding-site occurrences across 20 PDB structures; ligand InChIKey DTBNBXWJWCWCIK-UHFFFAOYSA-N.
