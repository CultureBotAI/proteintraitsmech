identifier: proteintraitsmech:BIOLIP_RNA
label: "RNA-binding site"
definition: >-
  A structure-derived ligand-binding site at which an RNA molecule is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 9528 binding-site occurrences across 2043 PDB structures.
definition_source: "BioLiP2 (Yang/Zhang group)"
