  A structure-derived ligand-binding site at which the ligand 4-carbamimidamidobenzoic acid (GBS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SXTSBZBQQRIYCU-UHFFFAOYSA-N.
