  A structure-derived ligand-binding site at which the ligand DINUCLEAR COPPER ION (CUA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 17 binding-site occurrences across 16 PDB structures; ligand InChIKey ALKZAGKDWUSJED-UHFFFAOYSA-N.
