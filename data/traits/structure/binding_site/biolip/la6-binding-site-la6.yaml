identifier: proteintraitsmech:BIOLIP_LA6
label: "LA6-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2E)-2-fluoro-3,7-dimethylocta-2,6-dien-1-yl trihydrogen diphosphate (LA6) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey BYJNSLXDWGDGAC-MDZDMXLPSA-N.
