label: "ZCT-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2,2'-[(1R,1'R,3S,3'S)-6,6',9,9'-tetrahydroxy-1,1'-dimethyl-5,5',10,10'-tetraoxo-3,3',4,4',5,5',10,10'-octahydro-1H,1'H-8,8'-bibenzo[g]isochromene-3,3'-diyl]diacetic acid (ZCT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey VTIKDEXOEJDMJP-WYUUTHIRSA-N.
