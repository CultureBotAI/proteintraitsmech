label: "TXE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [[(2R,3S,4R,5R)-5-[(3R)-3-aminocarbonyl-3,4-dihydro-2H-pyridin-1-yl]-3,4-bis(oxidanyl)oxolan-2-yl]methoxy-oxidanidyl-ph osphoryl] [(2R,3S,4R,5R)-5-(6-aminopurin-9-yl)-3,4-bis(oxidanyl)oxolan-2-yl]methyl phosphate (TXE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey FDIVXUDDFSHSAE-MTKBYBFRSA-L.
definition_source: "BioLiP2 (Yang/Zhang group)"
