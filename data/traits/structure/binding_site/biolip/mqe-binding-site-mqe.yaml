  A structure-derived ligand-binding site at which the ligand 2-methyl-3-[(2E,6E,10E,14E,18E,22E,26E,30E,34E,38E)-3,7,11,15,19,23,27,31,35,39,43-undecamethyltetratetraconta-2,6,10,1 4,18,22,26,30,34,38,42-undecaen-1-yl]naphthalene-1,4-dione (MQE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 8 binding-site occurrences across 3 PDB structures; ligand InChIKey YYDMANIEKFAEJC-RYZSZPJESA-N.
