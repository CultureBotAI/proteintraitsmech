label: "GCD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4-deoxy-alpha-L-threo-hex-4-enopyranuronic acid (GCD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 10 binding-site occurrences across 9 PDB structures; ligand InChIKey IAKKJSVSFCTLRY-YKKSOZKNSA-N.
