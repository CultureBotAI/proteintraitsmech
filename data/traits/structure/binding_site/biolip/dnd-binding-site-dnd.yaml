identifier: proteintraitsmech:BIOLIP_DND
label: "DND-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand NICOTINIC ACID ADENINE DINUCLEOTIDE (DND) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 18 binding-site occurrences across 11 PDB structures; ligand InChIKey SENPVEZBRZQVST-HISDBWNOSA-O.
