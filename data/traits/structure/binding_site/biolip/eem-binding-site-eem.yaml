identifier: proteintraitsmech:BIOLIP_EEM
label: "EEM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(3S)-3-amino-4-hydroxy-4-oxo-butyl]-[[(2S,3S,4R,5R)-5-(6-aminopurin-9-yl)-3,4-dihydroxy-oxolan-2-yl]methyl]-methyl-selanium (EEM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey GGJFWMOVUFBSIN-FCKMPRQPSA-O.
