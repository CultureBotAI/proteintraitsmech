identifier: proteintraitsmech:BIOLIP_OTI
label: "OTI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 3-[(8~{a}~{S})-7-[[5-ethoxycarbonyl-4-(3-fluoranyl-2-methyl-phenyl)-2-(1,3-thiazol-2-yl)-1,4-dihydropyrimidin-6-yl]methyl]-3-oxidanylidene-5,6,8,8~{a}-tetrahydro-1~{H}-imidazo[1,5-a]pyrazin-2-yl]-2,2-dimethyl-propanoic acid (OTI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey YLJBFYZGSKMBEZ-XNUZUHMRSA-N.
