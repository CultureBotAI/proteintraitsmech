identifier: proteintraitsmech:BIOLIP_FUB
label: "FUB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-L-arabinofuranose (FUB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 47 binding-site occurrences across 7 PDB structures; ligand InChIKey HMFHBZSHGGEWLO-KLVWXMOXSA-N.
