label: "BNV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (12S)-12-methyltetradecanoic acid (BNV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey XKLJLHAPJBUBNL-AWEZNQCLSA-N.
