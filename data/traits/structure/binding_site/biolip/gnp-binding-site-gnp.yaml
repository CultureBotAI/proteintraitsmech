label: "GNP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHOSPHOAMINOPHOSPHONIC ACID-GUANYLATE ESTER (GNP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 96 binding-site occurrences across 90 PDB structures; ligand InChIKey UQABYHGXWYXDTK-UUOKFMHZSA-N.
