label: "PQQ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PYRROLOQUINOLINE QUINONE (PQQ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 23 binding-site occurrences across 22 PDB structures; ligand InChIKey MMXZSJMASHPLLR-UHFFFAOYSA-N.
