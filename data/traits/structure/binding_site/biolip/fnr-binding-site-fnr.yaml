label: "FNR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-DEOXY-1-(7,8-DIMETHYL-2,4-DIOXO-3,4-DIHYDRO-2H-BENZO[G]PTERIDIN-1-ID-10(5H)-YL)-5-O-PHOSPHONATO-D-RIBITOL (FNR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 11 PDB structures; ligand InChIKey YTNIXZGTHTVJBW-SCRDCRAPSA-N.
