definition: >-
  A structure-derived ligand-binding site at which the ligand (2Z)-2-{[4-(3-cyclopropyl-5,6-dihydro[1,2,4]triazolo[4,3-a]pyrazine-7(8H)-carbonyl)phenyl]methylidene}-3-oxo-2,3-dihydro-1-benzofuran-7-carboxamide (KYM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey JJCAYWVTBMMQMQ-UNOMPAQXSA-N.
