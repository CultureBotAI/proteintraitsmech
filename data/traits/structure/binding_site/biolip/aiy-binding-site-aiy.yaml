  A structure-derived ligand-binding site at which the ligand (9bR)-2,6-diethanoyl-8,9b-dimethyl-3,7,9-tris(oxidanyl)dibenzofuran-1-one (AIY) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey WEYVVCKOOFYHRW-SFHVURJKSA-N.
