label: "AYE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand prop-2-en-1-amine (AYE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 23 binding-site occurrences across 23 PDB structures; ligand InChIKey VVJKKWFAADXIJK-UHFFFAOYSA-N.
