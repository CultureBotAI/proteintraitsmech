definition: >-
  A structure-derived ligand-binding site at which the ligand [[(2~{R},3~{S},4~{R},5~{R})-5-[4-[(1~{S},3~{a}~{S},3~{b}~{S},5~{a}~{R},8~{S},9~{a}~{R},9~{b}~{S},11~{a}~{S})-1-(~{tert}-butylcarbamoyl)-9~{a},11~{a}-dimethyl-7-oxidanylidene-1,2,3,3~{a},3~{b},4,5,5~{a},6,8,9,9~{b},10,11-tetradecahydroindeno[5,4-f]quinolin-8-yl]-3-aminocarbonyl-4~{H}-pyridin-1-yl]-3,4-bis(oxidanyl)oxolan-2-yl]methoxy-oxidanyl-phosphoryl] [(2~{R},3~{R},4~{R},5~{R})-5-(6-aminopurin-9-yl)-3-oxidanyl-4-phosphonooxy-oxolan-2-yl]methyl hydrogen phosphate (NDX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SBPCUEDRMWGINQ-DAPYLVMHSA-N.
