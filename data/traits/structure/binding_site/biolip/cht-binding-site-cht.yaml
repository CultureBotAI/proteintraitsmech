definition: >-
  A structure-derived ligand-binding site at which the ligand CHOLINE ION (CHT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 38 binding-site occurrences across 15 PDB structures; ligand InChIKey OEYIOHPDSNJKLS-UHFFFAOYSA-N.
