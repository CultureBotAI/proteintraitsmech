label: "NNM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (3R)-3,31-dimethyl-7,11,15,19,23,27-hexamethylidenedotriacont-31-en-1-yl dihydrogen phosphate (NNM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey CTKMEBTWSXRRSJ-RRHRGVEJSA-N.
