label: "H3X-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl (3'~{a}~{R},4'~{S},5'~{S},5~{a}~{S},6~{S},7~{S},9~{a}~{R})-1,1,3'~{a},4',5~{a},7,7'-heptamethyl-3,6'-bis(oxidanylidene)spiro[4,5,7,8,9,9~{a}-hexahydrobenzo[c]oxepine-6,2'-4,5-dihydro-3~{H}-1-benzofuran]-5'-carboxylate (H3X) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey GUSKPTPZRRTGAQ-IGZQQFENSA-N.
