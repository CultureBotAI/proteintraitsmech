identifier: proteintraitsmech:BIOLIP_ICS
label: "ICS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand iron-sulfur-molybdenum cluster with interstitial carbon (ICS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 5 PDB structures; ligand InChIKey DDQFAOMIVKLFON-UHFFFAOYSA-N.
