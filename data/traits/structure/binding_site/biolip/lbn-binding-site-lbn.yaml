identifier: proteintraitsmech:BIOLIP_LBN
label: "LBN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-palmitoyl-2-oleoyl-sn-glycero-3-phosphocholine (LBN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 50 binding-site occurrences across 21 PDB structures; ligand InChIKey WTJKGGKOPKCXLL-VYOBOKEXSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
