label: "QPI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand naphthalene-1,3-diol (QPI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey XOOMNEFVDUTJPP-UHFFFAOYSA-N.
