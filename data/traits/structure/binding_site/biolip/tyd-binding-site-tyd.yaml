  A structure-derived ligand-binding site at which the ligand THYMIDINE-5'-DIPHOSPHATE (TYD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 38 binding-site occurrences across 33 PDB structures; ligand InChIKey UJLXYODCHAELLY-XLPZGREQSA-N.
