label: "A86-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (3S,3'S,5R,5'R,6S,6'R,8'R)-3,5'-dihydroxy-8-oxo-6',7'-didehydro-5,5',6,6',7,8-hexahydro-5,6-epoxy-beta,beta-caroten-3'- yl acetate (A86) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 242 binding-site occurrences across 15 PDB structures; ligand InChIKey SJWWTRQNNRNTPU-XJUZQKKNSA-N.
