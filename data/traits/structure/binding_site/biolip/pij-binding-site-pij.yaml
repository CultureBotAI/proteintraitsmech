identifier: proteintraitsmech:BIOLIP_PIJ
label: "PIJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(2S)-1-hexadecanoyloxy-3-[hydroxy-[(2S,3R,5S,6R)-2,3,4,5,6-pentahydroxycyclohexyl]oxy-phosphoryl]oxy-propan-2-yl] heptadecanoate (PIJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey QVAGJHIIXLLVCI-XTAHIRAYSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
