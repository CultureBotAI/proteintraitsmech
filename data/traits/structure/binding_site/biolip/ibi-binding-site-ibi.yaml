label: "IBI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-{trans-4-[4-(cyclopropylmethyl)piperazin-1-yl]cyclohexyl}-4-{[(7R)-7-ethyl-5-methyl-8-(1-methylethyl)-6-oxo-5,6,7,8-tetrahydropteridin-2-yl]amino}-3-methoxybenzamide (IBI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SXNJFOWDRLKDSF-STROYTFGSA-N.
