label: "ACP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHOSPHOMETHYLPHOSPHONIC ACID ADENYLATE ESTER (ACP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 59 binding-site occurrences across 55 PDB structures; ligand InChIKey UFZTZBNSLXELAL-IOSLPCCCSA-N.
