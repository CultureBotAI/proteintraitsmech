definition: >-
  A structure-derived ligand-binding site at which the ligand 6-oxo-2-[(2-oxo-2-phenylethyl)sulfanyl]-1,6-dihydropyrimidine-5-carboxylic acid (FIG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey NAHGGWKCMVAKPT-UHFFFAOYSA-N.
