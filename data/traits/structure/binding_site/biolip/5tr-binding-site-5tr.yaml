label: "5TR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(2~{E},6~{E},10~{E},14~{E},18~{Z},22~{E},26~{Z},30~{E},34~{E},38~{E})-3,7,11,15,19,23,27,31,35,39,43-undecamethyltetratetraconta-2,6,10,14,18,22,26,30,34,38,42-undecaenyl] dihydrogen phosphate (5TR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey UFPHFKCTOZIAFY-ZUPWODLNSA-N.
