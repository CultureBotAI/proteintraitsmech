identifier: proteintraitsmech:BIOLIP_VAK
label: "VAK-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl (1R,2R,4S)-2-ethyl-2,4,5,7-tetrahydroxy-6,11-dioxo-1,2,3,4,6,11-hexahydrotetracene-1-carboxylate (VAK) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey RACGRCLGVYXIAO-YOKWENHESA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
