label: "BGI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-{[(2S,3S,4S)-2-amino-4-hydroxy-4-(5-hydroxypyridin-2-yl)-3-methylbutanoyl]amino}[(2R,3S,4R,5R)-5-(2,4-dioxo-3,4-dihydropyrimidin-1(2H)-yl)-3,4-dihydroxyoxolan-2-yl]acetic acid (non-preferred name) (BGI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey WWJFFVUVFNBJTN-VHDFTHOZSA-N.
