label: "AMG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl alpha-D-galactopyranoside (AMG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 6 binding-site occurrences across 5 PDB structures; ligand InChIKey HOVAGTYPODGVJG-PZRMXXKTSA-N.
