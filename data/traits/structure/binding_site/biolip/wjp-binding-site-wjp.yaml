identifier: proteintraitsmech:BIOLIP_WJP
label: "WJP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl (3R,6Z,10E,14E)-3,7,11,15,19-pentamethylicosa-6,10,14,18-tetraen-1-yl dihydrogen diphosphate (WJP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey GDOCHZBDTMOKKR-FEJNUDJDSA-N.
