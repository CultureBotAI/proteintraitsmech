identifier: proteintraitsmech:BIOLIP_IHP
label: "IHP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand INOSITOL HEXAKISPHOSPHATE (IHP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 79 binding-site occurrences across 71 PDB structures; ligand InChIKey IMQLKJBTEOYOSI-GPIVLXJGSA-N.
