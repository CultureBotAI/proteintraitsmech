definition: >-
  A structure-derived ligand-binding site at which the ligand N-glycolyl-alpha-neuraminic acid (NGC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 5 PDB structures; ligand InChIKey FDJKUWYYUZCUJX-VTERZIIISA-N.
