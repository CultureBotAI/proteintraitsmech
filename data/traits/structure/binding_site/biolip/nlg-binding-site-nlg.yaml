label: "NLG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-ACETYL-L-GLUTAMATE (NLG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 11 binding-site occurrences across 11 PDB structures; ligand InChIKey RFMMMVDNIPUKGG-YFKPBYRVSA-N.
