identifier: proteintraitsmech:BIOLIP_FLI
label: "FLI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (3R,4S,6S,8S,10R,12R,14R,16S,17E,19E,21E,23E,25E,28R)-3-hexyl-4,6,8,10,12,14,16-heptahydroxy-17,28-dimethyloxacyclooctacosa-17,19,21,23,25-pentaen-2-one (FLI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey FODXYXCKUOAJAV-XHDOTJGXSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
