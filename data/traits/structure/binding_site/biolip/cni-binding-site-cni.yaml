label: "CNI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 7-nitro-2,3-dioxo-2,3-dihydroquinoxaline-6-carbonitrile (CNI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey IAWXTSMHXFRLQR-UHFFFAOYSA-N.
