identifier: proteintraitsmech:BIOLIP_URI
label: "URI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand URIDINE (URI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 10 binding-site occurrences across 10 PDB structures; ligand InChIKey DRTQHJPVMGBUCF-XVFCMESISA-N.
