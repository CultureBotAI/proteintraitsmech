identifier: proteintraitsmech:BIOLIP_PTR
label: "PTR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand O-PHOSPHOTYROSINE (PTR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey DCWXELXMIBXGTH-QMMMGPOBSA-N.
