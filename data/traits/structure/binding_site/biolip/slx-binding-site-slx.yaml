label: "SLX-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (13aS)-3,10-dimethoxy-5,8,13,13a-tetrahydro-6H-isoquino[3,2-a]isoquinoline-2,9-diol (SLX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey KNWVMRVOBAFFMH-HNNXBMFYSA-N.
