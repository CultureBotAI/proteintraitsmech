  A structure-derived ligand-binding site at which the ligand 5-bromo-4-chloro-1H-indol-3-yl alpha-D-mannopyranoside (XMM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 3 PDB structures; ligand InChIKey OPIFSICVWOWJMJ-HAAGFXOZSA-N.
