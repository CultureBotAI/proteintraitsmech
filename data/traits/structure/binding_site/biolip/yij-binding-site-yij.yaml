label: "YIJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1R)-1-[(5aR,7aR,9R,11aS,11bS,12R,13aR)-9,12-dihydroxy-2,11a-dimethyl-1,2,3,4,7a,8,9,10,11,11a,12,13-dodecahydro-7H-9,11b-epoxy-13a,5a-prop[1]enophenanthro[2,1-f][1,4]oxazepin-14-yl]ethyl benzoate (YIJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey BQDUFJGPBNLKPK-UDTYFQFOSA-N.
