label: "TYE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4-[(2S)-2-amino-3-hydroxypropyl]phenol (TYE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 4 PDB structures; ligand InChIKey DBLDQZASZZMNSL-QMMMGPOBSA-N.
