label: "AKG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-OXOGLUTARIC ACID (AKG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 108 binding-site occurrences across 104 PDB structures; ligand InChIKey KPGXRSRHYNQIFN-UHFFFAOYSA-N.
