identifier: proteintraitsmech:BIOLIP_FGD
label: "FGD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-(4-{[(2-amino-4-oxo-1,4-dihydroquinazolin-6-yl)methyl]amino}benzene-1-carbonyl)-D-glutamic acid (FGD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey UQFCLENKCDVITL-MRXNPFEDSA-N.
