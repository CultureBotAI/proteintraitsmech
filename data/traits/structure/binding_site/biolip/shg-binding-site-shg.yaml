label: "SHG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-deoxy-2-fluoro-beta-D-glucopyranose (SHG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey ZCXUVYAZINUVJD-QZABAPFNSA-N.
