identifier: proteintraitsmech:BIOLIP_RBV
label: "RBV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-(beta-D-ribofuranosyl)-1H-1,2,4-triazole-3-carboxamide (RBV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey IWUCXVSUMQZMFG-AFCXAGJDSA-N.
