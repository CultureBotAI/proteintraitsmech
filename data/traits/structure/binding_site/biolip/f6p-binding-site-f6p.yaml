label: "F6P-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 6-O-phosphono-beta-D-fructofuranose (F6P) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 21 binding-site occurrences across 16 PDB structures; ligand InChIKey BGWGXPAPYGQALX-ARQDHWQXSA-N.
