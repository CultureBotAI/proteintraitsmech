label: "GIF-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand D-galacto-isofagomine (GIF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey QPYJXFZUIJOGNX-PBXRRBTRSA-N.
