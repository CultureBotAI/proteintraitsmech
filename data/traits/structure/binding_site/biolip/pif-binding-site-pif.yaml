identifier: proteintraitsmech:BIOLIP_PIF
label: "PIF-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R)-3-{[(S)-hydroxy{[(1R,2R,3R,4R,5S,6R)-2,3,5,6-tetrahydroxy-4-(phosphonooxy)cyclohexyl]oxy}phosphoryl]oxy}propane-1,2-diyl dioctanoate (PIF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey SNIQYSSXZJPPEL-LKTRINTESA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
