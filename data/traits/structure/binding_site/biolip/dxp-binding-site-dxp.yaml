identifier: proteintraitsmech:BIOLIP_DXP
label: "DXP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-DEOXY-D-XYLULOSE-5-PHOSPHATE (DXP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey AJPADPZSRRUGHI-RFZPGFLSSA-N.
