label: "HEM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PROTOPORPHYRIN IX CONTAINING FE (HEM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1072 binding-site occurrences across 824 PDB structures; ligand InChIKey KABFMIBPWCXCRK-RGGAHWMASA-L.
