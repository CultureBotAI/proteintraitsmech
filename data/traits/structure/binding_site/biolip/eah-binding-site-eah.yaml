identifier: proteintraitsmech:BIOLIP_EAH
label: "EAH-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (5S,7E,9E,11Z,14Z)-5-hydroxyicosa-7,9,11,14-tetraenoic acid (EAH) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey DVGDBDLZYCUGNU-LBIUVHPXSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
