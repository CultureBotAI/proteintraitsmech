identifier: proteintraitsmech:BIOLIP_GCS
label: "GCS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-amino-2-deoxy-beta-D-glucopyranose (GCS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 31 binding-site occurrences across 14 PDB structures; ligand InChIKey MSWZFWKMSRAUBD-QZABAPFNSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
