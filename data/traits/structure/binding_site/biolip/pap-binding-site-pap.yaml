label: "PAP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 3'-PHOSPHATE-ADENOSINE-5'-DIPHOSPHATE (PAP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 7 binding-site occurrences across 6 PDB structures; ligand InChIKey GBBWIZKLHXYJOA-KQYNXXCUSA-N.
