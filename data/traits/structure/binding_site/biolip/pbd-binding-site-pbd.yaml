identifier: proteintraitsmech:BIOLIP_PBD
label: "PBD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-(3,4-dimethoxyphenyl)-3-[3-(1H-imidazol-1-yl)propyl]thiourea (PBD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey FZQXMGLQANXZRP-UHFFFAOYSA-N.
