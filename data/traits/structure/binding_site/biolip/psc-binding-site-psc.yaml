identifier: proteintraitsmech:BIOLIP_PSC
label: "PSC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (7R,17E,20E)-4-HYDROXY-N,N,N-TRIMETHYL-9-OXO-7-[(PALMITOYLOXY)METHYL]-3,5,8-TRIOXA-4-PHOSPHAHEXACOSA-17,20-DIEN-1-AMINIUM 4-OXIDE (PSC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey JLPULHDHAOZNQI-AUSZDXHESA-O.
