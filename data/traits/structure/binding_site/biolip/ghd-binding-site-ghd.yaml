identifier: proteintraitsmech:BIOLIP_GHD
label: "GHD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2~{R},4~{S},5~{S},6~{S})-5-acetamido-4-oxidanyl-6-[(1~{R},2~{R})-1,2,3-tris(oxidanyl)propyl]-2-[[(2~{R},3~{R},4~{S},5~{R},6~{S})-3,4,5-tris(oxidanyl)-6-[(2~{R},3~{S},4~{R},5~{R})-1,2,4,5-tetrakis(oxidanyl)-6-oxidanylidene-hexan-3-yl]oxy-oxan-2-yl]methoxy]oxane-2-carboxylic acid (GHD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey VMWYCXKMRSTDSP-DKHYMJAUSA-N.
