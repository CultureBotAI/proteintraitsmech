identifier: proteintraitsmech:BIOLIP_PIO
label: "PIO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(2R)-2-octanoyloxy-3-[oxidanyl-[(1R,2R,3S,4R,5R,6S)-2,3,6-tris(oxidanyl)-4,5-diphosphonooxy-cyclohexyl]oxy-phosphoryl]oxy-propyl] octanoate (PIO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 32 binding-site occurrences across 25 PDB structures; ligand InChIKey XLNCEHRXXWQMPK-MJUMVPIBSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
trait_axis: STRUCTURE
trait_category: STRUCT_BINDING_SITE
term_kind: CLASS
mapping_status: SEEDED
