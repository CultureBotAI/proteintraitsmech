definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-2-[(9,10-dibromooctadecanoyl)oxy]-3-{[(S)-hydroxy{[(1S,2R,3R,4S,5S,6R)-2,3,4,5,6-pentahydroxycyclohexyl]oxy}phosphoryl]oxy}propyl (9R,10S)-9,10-dibromooctadecanoate (VPN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey CXUUJLFCERQNTC-GLNOFRAPSA-N.
