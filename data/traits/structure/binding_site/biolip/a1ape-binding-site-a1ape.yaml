identifier: proteintraitsmech:BIOLIP_A1APE
label: "A1APE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3R,4R,5R)-3,4-diacetamido-5-({3-hydroxy-2-methyl-5-[(phosphonooxy)methyl]pyridin-4-yl}methoxy)oxan-2-yl [(2R,3S,4R,5R)-5-(2,4-dioxo-3,4-dihydropyrimidin-1(2H)-yl)-3,4-dihydroxyoxolan-2-yl]methyl dihydrogen diphosphate (non-preferred name) (A1APE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey ZBCWDGZSCCDTDU-LIKBFOATSA-N.
