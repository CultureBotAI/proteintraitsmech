definition: >-
  A structure-derived ligand-binding site at which the ligand CALCIUM ION (CA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 6176 binding-site occurrences across 3154 PDB structures; ligand InChIKey BHPQYMZQTOCNFJ-UHFFFAOYSA-N.
