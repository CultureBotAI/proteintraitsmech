identifier: proteintraitsmech:BIOLIP_POP
label: "POP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PYROPHOSPHATE 2- (POP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 76 binding-site occurrences across 71 PDB structures; ligand InChIKey XPPKVPWEQAFLFU-UHFFFAOYSA-L.
