definition: >-
  A structure-derived ligand-binding site at which the ligand COBALT (II) ION (CO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 242 binding-site occurrences across 170 PDB structures; ligand InChIKey XLJKHNWPARRRJB-UHFFFAOYSA-N.
