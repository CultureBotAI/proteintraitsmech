  A structure-derived ligand-binding site at which the ligand (2E,6E)-12-fluoro-11-(fluoromethyl)-3,7-dimethyldodeca-2,6,10-trien-1-yl trihydrogen diphosphate (FDF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey PVNRGYDHHSWPHV-HJAIQHMZSA-N.
