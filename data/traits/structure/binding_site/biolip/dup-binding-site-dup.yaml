identifier: proteintraitsmech:BIOLIP_DUP
label: "DUP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2'-DEOXYURIDINE 5'-ALPHA,BETA-IMIDO-TRIPHOSPHATE (DUP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 23 binding-site occurrences across 13 PDB structures; ligand InChIKey XZLLMTSKYYYJLH-SHYZEUOFSA-N.
