label: "LMN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand Lauryl Maltose Neopentyl Glycol (LMN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 32 binding-site occurrences across 19 PDB structures; ligand InChIKey MADJBYLAYPCCOO-XYPZXBMFSA-N.
