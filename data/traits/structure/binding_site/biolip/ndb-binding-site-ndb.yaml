label: "NDB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-(2-hydroxyethyl)-N,N-dimethyl-3-sulfopropan-1-aminium (NDB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey CNXPCGBLGHKAIL-UHFFFAOYSA-O.
