identifier: proteintraitsmech:BIOLIP_AGL
label: "AGL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4-amino-4,6-dideoxy-alpha-D-glucopyranose (AGL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey RJKBJEZZABBYBA-DVKNGEFBSA-N.
