identifier: proteintraitsmech:BIOLIP_IOD
label: "IOD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand IODIDE ION (IOD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 14 binding-site occurrences across 10 PDB structures; ligand InChIKey XMBWDFGMSWQBCA-UHFFFAOYSA-M.
