identifier: proteintraitsmech:BIOLIP_TCE
label: "TCE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 3,3',3''-phosphanetriyltripropanoic acid (TCE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 10 binding-site occurrences across 10 PDB structures; ligand InChIKey PZBFGYYEXUXCOF-UHFFFAOYSA-N.
