label: "ZEP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N,N-diethyl-4-{2-[(2-fluorophenyl)methyl]-1,3-thiazol-4-yl}benzene-1-sulfonamide (ZEP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey PZNJPNGENGJLBG-UHFFFAOYSA-N.
