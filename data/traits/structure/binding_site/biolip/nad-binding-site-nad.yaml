identifier: proteintraitsmech:BIOLIP_NAD
label: "NAD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand NICOTINAMIDE-ADENINE-DINUCLEOTIDE (NAD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 735 binding-site occurrences across 665 PDB structures; ligand InChIKey BAWFJGJZGIEFAR-NNYOXOHSSA-N.
