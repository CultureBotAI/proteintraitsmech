identifier: proteintraitsmech:BIOLIP_S1P
label: "S1P-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,3R,4E)-2-amino-3-hydroxyoctadec-4-en-1-yl dihydrogen phosphate (S1P) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 8 binding-site occurrences across 6 PDB structures; ligand InChIKey DUYSYHSSBDVJSM-KRWOKUGFSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
