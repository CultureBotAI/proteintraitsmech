identifier: proteintraitsmech:BIOLIP_PVI
label: "PVI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (4R,5R)-3-amino-4,5-dihydroxy-cyclohexene-1-carboxylic acid (PVI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey WPZSUTUAATWRPU-KVQBGUIXSA-N.
