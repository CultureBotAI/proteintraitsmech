label: "EVA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,3R,4S,5R)-3,4,5-trihydroxy-6-oxopiperidine-2-carboxylic acid (EVA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey YEWOHTVJCCDCCS-NTAGLIMJSA-N.
