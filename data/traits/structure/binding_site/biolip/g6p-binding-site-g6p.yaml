label: "G6P-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 6-O-phosphono-alpha-D-glucopyranose (G6P) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 26 binding-site occurrences across 24 PDB structures; ligand InChIKey NBSCHQHZLSJFNQ-DVKNGEFBSA-N.
