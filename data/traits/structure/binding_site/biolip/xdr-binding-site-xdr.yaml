definition: >-
  A structure-derived ligand-binding site at which the ligand hexyl (5S,6R,8R)-6-hydroxy-5-methyl-13-oxo-5,6,7,8-tetrahydro-13H-5,8-epoxy-4b,8a,14-triazadibenzo[b,h]cycloocta[1,2,3,4-jkl]c yclopenta[e]-as-indacene-6-carboxylate (XDR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey ZDVKBGNYCWCWDZ-MWOZDUBJSA-N.
