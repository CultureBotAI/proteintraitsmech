identifier: proteintraitsmech:BIOLIP_LMD
label: "LMD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand tetradecyl 4-O-alpha-D-glucopyranosyl-beta-D-glucopyranoside (LMD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey UKPROSIGWJBJGA-IWODYCRQSA-N.
