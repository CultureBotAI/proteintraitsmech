label: "C2E-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 9,9'-[(2R,3R,3aS,5S,7aR,9R,10R,10aS,12S,14aR)-3,5,10,12-tetrahydroxy-5,12-dioxidooctahydro-2H,7H-difuro[3,2-d:3',2'-j][1,3,7,9,2,8]tetraoxadiphosphacyclododecine-2,9-diyl]bis(2-amino-1,9-dihydro-6H-purin-6-one) (C2E) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 100 binding-site occurrences across 56 PDB structures; ligand InChIKey PKFDLKSEZWEFGL-MHARETSRSA-N.
