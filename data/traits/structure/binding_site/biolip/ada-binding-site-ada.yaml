identifier: proteintraitsmech:BIOLIP_ADA
label: "ADA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-D-galactopyranuronic acid (ADA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 33 binding-site occurrences across 16 PDB structures; ligand InChIKey AEMOLEFTQBMNLQ-BKBMJHBISA-N.
