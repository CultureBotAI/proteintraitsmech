identifier: proteintraitsmech:BIOLIP_FYP
label: "FYP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ethyl 8-fluoro-5-methyl-6-oxo-5,6-dihydro-4H-imidazo[1,5-a][1,4]benzodiazepine-3-carboxylate (FYP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey OFBIFZUFASYYRE-UHFFFAOYSA-N.
