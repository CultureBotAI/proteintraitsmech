identifier: proteintraitsmech:BIOLIP_IMP
label: "IMP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand INOSINIC ACID (IMP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 44 binding-site occurrences across 43 PDB structures; ligand InChIKey GRSZFWQUAKGDAV-KQYNXXCUSA-N.
