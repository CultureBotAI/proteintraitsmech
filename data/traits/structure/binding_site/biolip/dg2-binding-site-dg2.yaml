label: "DG2-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R)-2,3-diphosphoglyceric acid (DG2) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey XOHUEYCVLUUEJJ-UWTATZPHSA-N.
