label: "JNT-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [[(2~{R},3~{S},4~{R},5~{R})-5-(6-aminopurin-9-yl)-3,4-bis(oxidanyl)oxolan-2-yl]methoxy-oxidanyl-phosphoryl] [(2~{R},3~{S},4~{S})-2,3,4,5-tetrakis(oxidanyl)pentyl] hydrogen phosphate (JNT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey QKJRZYRQRSLXSV-AOOZFPJJSA-N.
