identifier: proteintraitsmech:BIOLIP_CMV
label: "CMV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,4S)-2-[(1R)-1-({(2R)-2-[(4-ethyl-2,3-dioxopiperazin-1-yl)amino]-2-phenylacetyl}amino)-2-oxoethyl]-5,5-dimethyl-1,3-thiazolidine-4-carboxylic acid (CMV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey FLMJTSOTBGMFLJ-XLMAVXFVSA-N.
