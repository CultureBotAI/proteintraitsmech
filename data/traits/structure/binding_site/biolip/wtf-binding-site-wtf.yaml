label: "WTF-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [2-(ethylsulfonyl)phenyl][(2S)-4-(6-fluoro-1,3-benzothiazol-2-yl)-2-methylpiperazin-1-yl]methanone (WTF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey UKQOLPNYRVPCBM-AWEZNQCLSA-N.
