label: "PYR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PYRUVIC ACID (PYR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 64 binding-site occurrences across 53 PDB structures; ligand InChIKey LCTONWCANYUPML-UHFFFAOYSA-N.
