definition: >-
  A structure-derived ligand-binding site at which the ligand (8S,11S,14S)-14-{[(2S)-4-amino-2-{[2-(4-tert-butylphenyl)-4-methylpyrimidine-5-carbonyl]amino}butanoyl](methyl)amino}-3,18-bis(2-aminoethoxy)-N-[(2Z)-2-iminoethyl]-11-methyl-10,13-dioxo-9,12-diazatricyclo[13.3.1.1~2,6~]icosa-1(19),2(20),3,5,15,17-hexaene-8-carboxamide (CZD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SJYWASAPFZIDQL-UAKBWTGGSA-N.
