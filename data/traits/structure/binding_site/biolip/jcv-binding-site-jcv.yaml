definition: >-
  A structure-derived ligand-binding site at which the ligand [(2~{S},7~{R},11~{R},15~{S},19~{S},22~{S},26~{S},30~{R},34~{R},39~{S},43~{R},47~{R},51~{S},55~{S},58~{S},62~{S},66~{R},70~{R})-39-[[(2~{R},3~{R},4~{S},5~{S},6~{R})-6-(hydroxymethyl)-3,4,5-tris(oxidanyl)oxan-2-yl]oxymethyl]-7,11,15,19,22,26,30,34,43,47,51,55,58,62,66,70-hexadecamethyl-1,4,37,40-tetraoxacyclodoheptacont-2-yl]methyl [(2~{R},3~{S},5~{R},6~{R})-2,3,4,5,6-pentakis(oxidanyl)cyclohexyl] hydrogen phosphate (JCV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 11 binding-site occurrences across 1 PDB structure; ligand InChIKey JZJZIEMIUITWCY-BEAKYOBHSA-N.
