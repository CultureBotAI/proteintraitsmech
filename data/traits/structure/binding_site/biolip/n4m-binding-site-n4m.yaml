definition: >-
  A structure-derived ligand-binding site at which the ligand 1-[4-({(1R)-1-[(6S,7S)-2-amino-7-methyl-4-oxo-1,4,5,6,7,8-hexahydropteridin-6-yl]ethyl}amino)phenyl]-1-deoxy-5-O-{5-O-[(R)-{[(1R)-1,3-dicarboxypropyl]oxy}(hydroxy)phosphoryl]-alpha-D-ribofuranosyl}-D-xylitol (N4M) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SCBIBGUJSMHIAI-FQVOATFZSA-N.
