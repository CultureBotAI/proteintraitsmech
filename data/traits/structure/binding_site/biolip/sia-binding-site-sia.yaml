identifier: proteintraitsmech:BIOLIP_SIA
label: "SIA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-acetyl-alpha-neuraminic acid (SIA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 126 binding-site occurrences across 108 PDB structures; ligand InChIKey SQVRNKJHWKZAKO-YRMXFSIDSA-N.
