label: "CN5-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (5S,11R)-5,8,11-trihydroxy-5,11-dioxido-17-oxo-4,6,10,12,16-pentaoxa-5,11-diphosphaoctadec-1-yl pentadecanoate (CN5) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey UKWPDXFRXMWSMQ-VWLOTQADSA-N.
