label: "NI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand NICKEL (II) ION (NI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 38 binding-site occurrences across 30 PDB structures; ligand InChIKey VEQPNABPJHWNSG-UHFFFAOYSA-N.
