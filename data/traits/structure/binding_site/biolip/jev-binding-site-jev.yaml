identifier: proteintraitsmech:BIOLIP_JEV
label: "JEV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-{2-[(8S)-1,6,7,8-tetrahydro-2H-indeno[5,4-b]furan-8-yl]ethyl}propanamide (JEV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey YLXDSYKOBKBWJQ-LBPRGKRZSA-N.
