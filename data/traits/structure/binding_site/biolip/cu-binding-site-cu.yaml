identifier: proteintraitsmech:BIOLIP_CU
label: "CU-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand COPPER (II) ION (CU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 598 binding-site occurrences across 354 PDB structures; ligand InChIKey JPVYNHNXODAKFH-UHFFFAOYSA-N.
