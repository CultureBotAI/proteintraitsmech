identifier: proteintraitsmech:BIOLIP_TLL
label: "TLL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-[4-({[(6S)-2-amino-5-methyl-4-oxo-1,4,5,6,7,8-hexahydropteridin-6-yl]methyl}amino)benzoyl]-L-gamma-glutamyl-L-glutamic acid (TLL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey VNEFZDDORGCJSD-JYJNAYRXSA-N.
