label: "CD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand CADMIUM ION (CD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 45 binding-site occurrences across 24 PDB structures; ligand InChIKey WLZRMCYVCSSEQC-UHFFFAOYSA-N.
