  A structure-derived ligand-binding site at which the ligand [methyl 9-acetyl-14-ethyl-20-hydroxy-4,8,13,18-tetramethyl-3-{3-oxo-3-[(3,7,11,15-tetramethylhexadec-2-en-1-yl)oxy]propyl}-3,4,20,21-tetradehydrophorbine-21-carboxylatato(2-)-kappa~4~N~23~,N~24~,N~25~,N~26~]zinc (2GO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey WIUVDOQKCIQUQM-HCIDKWDRSA-L.
