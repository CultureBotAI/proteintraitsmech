identifier: proteintraitsmech:BIOLIP_NSG
label: "NSG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,3aR,5R,6R,7R,7aR)-5-(hydroxymethyl)-2-methyl-2,3a,5,6,7,7a-hexahydro-1H-pyrano[3,2-d][1,3]thiazole-6,7-diol (NSG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey XWPUWEBFKDEDIF-JMHNFOGYSA-N.
