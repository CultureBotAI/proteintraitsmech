identifier: proteintraitsmech:BIOLIP_T5K
label: "T5K-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [[(2R,3S,5R)-5-[5-methyl-2,4-bis(oxidanylidene)pyrimidin-1-yl]-3-oxidanyl-oxolan-2-yl]methoxy-oxidanyl-phosphoryl] [(2R,3R,4S,5R,6R)-6-methyl-5-[(E)-[2-methyl-3-oxidanyl-5-(phosphonooxymethyl)pyridin-4-yl]methylideneamino]-3,4-bis(oxidanyl)oxan-2-yl] hydrogen phosphate (T5K) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey LEIRFGMKEVPNBT-QBLVGKJYSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
