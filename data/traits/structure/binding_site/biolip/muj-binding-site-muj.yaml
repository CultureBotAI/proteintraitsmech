definition: >-
  A structure-derived ligand-binding site at which the ligand 5-{3-methoxy-4-[(4-methoxybenzyl)oxy]benzyl}pyrimidine-2,4-diamine (MUJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey MYQAUKPBNJWPIE-UHFFFAOYSA-N.
