label: "IWJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (3~{E},5~{E},7~{E},9~{E},11~{E},13~{E},15~{E},17~{E})-1-[(1~{S},4~{S})-2,2-dimethyl-6-methylidene-1,4-bis(oxidanyl)cyclohexyl]-3,7,12,16-tetramethyl-18-[(1~{R},4~{R})-2,6,6-trimethyl-4-oxidanyl-cyclohex-2-en-1-yl]octadeca-3,5,7,9,11,13,15,17-octaen-2-one (IWJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 10 binding-site occurrences across 3 PDB structures; ligand InChIKey WOJYJHBMWRNRJG-ITGJSFTBSA-N.
