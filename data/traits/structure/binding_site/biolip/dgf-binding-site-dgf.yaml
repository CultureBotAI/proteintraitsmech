definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,5R)-2-[(2S,3R)-3-hydroxy-1-oxobutan-2-yl]-5-[(2R)-tetrahydrofuran-2-yl]-2,5-dihydro-1,3-thiazole-4-carboxylic acid (DGF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey FHQOUTNMKXYVEY-MKSGQPMJSA-N.
