definition: >-
  A structure-derived ligand-binding site at which the ligand 1-[(2~{R},3~{S})-2-[[1,3-benzodioxol-5-ylmethyl(methyl)amino]methyl]-3-methyl-6-oxidanylidene-5-[(2~{S})-1-oxidanylpropan-2-yl]-3,4-dihydro-2~{H}-1,5-benzoxazocin-8-yl]-3-(4-methoxyphenyl)urea (F8Z) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey NGRSXEMLDRQNMH-LPBFERMMSA-N.
