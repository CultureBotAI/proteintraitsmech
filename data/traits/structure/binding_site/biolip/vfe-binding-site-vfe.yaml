label: "VFE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-[2-(2-chlorophenyl)sulfanylethanoyl-[[4-(1,2,4-triazol-1-yl)phenyl]methyl]amino]-N-methyl-ethanamide (VFE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey NVGPCILMXWWONB-UHFFFAOYSA-N.
