identifier: proteintraitsmech:BIOLIP_GGM
label: "GGM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 3'-O-(N-methylanthraniloyl)-beta:gamma-imidoguanosine-5'-triphosphate (GGM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey ZGTKZICAFACDSP-XNIJJKJLSA-N.
