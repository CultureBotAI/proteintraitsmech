label: "TCL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand TRICLOSAN (TCL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 19 binding-site occurrences across 13 PDB structures; ligand InChIKey XEFQLINVKFYRCS-UHFFFAOYSA-N.
