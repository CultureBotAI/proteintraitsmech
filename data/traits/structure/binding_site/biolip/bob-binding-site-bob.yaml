label: "BOB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (S)-2-amino-5-((R)-1-(carboxymethylamino)-3-((3S,4R)-1,4-dihydroxynonan-3-ylthio)-1-oxopropan-2-ylamino)-5-oxopentanoic acid (BOB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey CLEVVMDJDMEQKG-XQLPTFJDSA-N.
