identifier: proteintraitsmech:BIOLIP_ELU
label: "ELU-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand phosphono [(3~{R},6~{E},10~{E})-3,7,11,15-tetramethylhexadeca-6,10,14-trienyl] hydrogen phosphate (ELU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey SJMIVFIDXGVUHA-WKWVIOPWSA-N.
