label: "MXR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,3R,4S)-4-{[(3S,5R)-5-(dimethylcarbamoyl)pyrrolidin-3-yl]sulfanyl}-2-[(2S,3R)-3-hydroxy-1-oxobutan-2-yl]-3-methyl-3,4-dihydro-2H-pyrrole-5-carboxylic acid (MXR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey UUIYVKJXUXGPKB-DKLFCYGSSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
