identifier: proteintraitsmech:BIOLIP_DGJ
label: "DGJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3S,4R,5S)-2-(hydroxymethyl)piperidine-3,4,5-triol (DGJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 3 PDB structures; ligand InChIKey LXBIFEVIBLOUGU-DPYQTVNSSA-N.
