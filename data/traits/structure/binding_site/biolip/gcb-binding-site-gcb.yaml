identifier: proteintraitsmech:BIOLIP_GCB
label: "GCB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,3S,4S,5R)-3,4,5-trihydroxy-6-oxo-oxane-2-carboxylic acid (GCB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey YLKFQNUGXOLRNI-QDQPNEQZSA-N.
