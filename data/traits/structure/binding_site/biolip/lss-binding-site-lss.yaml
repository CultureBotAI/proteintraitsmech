identifier: proteintraitsmech:BIOLIP_LSS
label: "LSS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 5'-O-(L-leucylsulfamoyl)adenosine (LSS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 4 PDB structures; ligand InChIKey XFEDFDTWJLGMBO-LEJQEAHTSA-N.
