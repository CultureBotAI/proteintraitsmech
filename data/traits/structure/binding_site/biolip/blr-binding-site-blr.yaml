definition: >-
  A structure-derived ligand-binding site at which the ligand 3-[5-[(Z)-(4-ethenyl-3-methyl-5-oxidanylidene-pyrrol-2-ylidene)methyl]-2-[[5-[(Z)-(3-ethenyl-4-methyl-5-oxidanylidene-pyrrol-2-ylidene)methyl]-3-(3-hydroxy-3-oxopropyl)-4-methyl-1H-pyrrol-2-yl]methyl]-4-methyl-1H-pyrrol-3-yl]propanoic acid (BLR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 5 PDB structures; ligand InChIKey BPYKTIZUTYGOLE-IFADSCNNSA-N.
