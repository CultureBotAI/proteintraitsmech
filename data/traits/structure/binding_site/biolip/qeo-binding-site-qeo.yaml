label: "QEO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-amino-5-({[(1S,4S,5R)-4,5-dihydroxycyclopent-2-en-1-yl]amino}methyl)-7-beta-D-ribofuranosyl-3,7-dihydro-4H-pyrrolo[2,3-d]pyrimidin-4-one (QEO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey QQXQGKSPIMGUIZ-AEZJAUAXSA-N.
