identifier: proteintraitsmech:BIOLIP_GLA
label: "GLA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-D-galactopyranose (GLA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 86 binding-site occurrences across 56 PDB structures; ligand InChIKey WQZGKKKJIJFFOK-PHYPRBDBSA-N.
