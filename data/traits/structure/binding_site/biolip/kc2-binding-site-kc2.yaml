definition: >-
  A structure-derived ligand-binding site at which the ligand Chlorophyll c2 (KC2) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 131 binding-site occurrences across 14 PDB structures; ligand InChIKey QDRBYWCRXZZVLY-QIEHNWLWSA-L.
