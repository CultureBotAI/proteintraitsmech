identifier: proteintraitsmech:BIOLIP_MGS
label: "MGS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl 4,6-dideoxy-4-{[(2R)-2,4-dihydroxybutanoyl]amino}-2-O-methyl-alpha-D-mannopyranoside (MGS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey NGGZJRAGGXAXNO-DZXYHILESA-N.
