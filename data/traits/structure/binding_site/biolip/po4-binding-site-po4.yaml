definition: >-
  A structure-derived ligand-binding site at which the ligand PHOSPHATE ION (PO4) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 487 binding-site occurrences across 369 PDB structures; ligand InChIKey NBIIXXVUZAFLBC-UHFFFAOYSA-K.
