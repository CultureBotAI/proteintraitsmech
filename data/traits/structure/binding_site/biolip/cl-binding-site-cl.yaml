identifier: proteintraitsmech:BIOLIP_CL
label: "CL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand CHLORIDE ION (CL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 101 binding-site occurrences across 73 PDB structures; ligand InChIKey VEXZGXHMUGYJMC-UHFFFAOYSA-M.
