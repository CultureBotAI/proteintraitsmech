identifier: proteintraitsmech:BIOLIP_PGU
label: "PGU-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-({3-hydroxy-2-methyl-5-[(phosphonooxy)methyl]pyridin-4-yl}methyl)-L-glutamic acid (PGU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 3 PDB structures; ligand InChIKey JMRKOGDJNHPMHS-JTQLQIEISA-N.
