identifier: proteintraitsmech:BIOLIP_MMA
label: "MMA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl alpha-D-mannopyranoside (MMA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 14 binding-site occurrences across 10 PDB structures; ligand InChIKey HOVAGTYPODGVJG-VEIUFWFVSA-N.
