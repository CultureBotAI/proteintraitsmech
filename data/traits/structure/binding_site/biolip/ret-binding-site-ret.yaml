identifier: proteintraitsmech:BIOLIP_RET
label: "RET-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand RETINAL (RET) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 67 binding-site occurrences across 65 PDB structures; ligand InChIKey NCYCYZXNIZJOKI-OVSJKPMPSA-N.
