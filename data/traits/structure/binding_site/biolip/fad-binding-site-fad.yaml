identifier: proteintraitsmech:BIOLIP_FAD
label: "FAD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand FLAVIN-ADENINE DINUCLEOTIDE (FAD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 980 binding-site occurrences across 843 PDB structures; ligand InChIKey VWWQXMAJTJZDQX-UYBVJOGSSA-N.
