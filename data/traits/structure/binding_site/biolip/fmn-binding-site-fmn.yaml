identifier: proteintraitsmech:BIOLIP_FMN
label: "FMN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand FLAVIN MONONUCLEOTIDE (FMN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 553 binding-site occurrences across 447 PDB structures; ligand InChIKey FVTCRASFADXXNN-SCRDCRAPSA-N.
