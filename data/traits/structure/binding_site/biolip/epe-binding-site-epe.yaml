identifier: proteintraitsmech:BIOLIP_EPE
label: "EPE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4-(2-HYDROXYETHYL)-1-PIPERAZINE ETHANESULFONIC ACID (EPE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 18 binding-site occurrences across 15 PDB structures; ligand InChIKey JKMHFZQWWAIEOD-UHFFFAOYSA-N.
