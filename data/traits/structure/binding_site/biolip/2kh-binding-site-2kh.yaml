label: "2KH-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 5'-O-[(S)-hydroxy{[(S)-hydroxy(phosphonooxy)phosphoryl]amino}phosphoryl]uridine (2KH) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 11 binding-site occurrences across 10 PDB structures; ligand InChIKey OZIBFYOFLVBDIY-XVFCMESISA-N.
