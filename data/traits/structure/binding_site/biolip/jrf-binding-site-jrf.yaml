identifier: proteintraitsmech:BIOLIP_JRF
label: "JRF-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-Hydroxy-3-(trifluoromethyl)pyrido[1,2-a]benzimidazole-4-carbonitrile (JRF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey NSMPADIWUYJQKF-UHFFFAOYSA-N.
