identifier: proteintraitsmech:BIOLIP_QIC
label: "QIC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1S,3R,4S,5R)-1,3,4,5-tetrahydroxycyclohexanecarboxylic acid (QIC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 1 PDB structure; ligand InChIKey AAWZDTNXLSGCEK-WYWMIBKRSA-N.
