identifier: proteintraitsmech:BIOLIP_ZMP
label: "ZMP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand S-[2-({N-[(2S)-2-hydroxy-3,3-dimethyl-4-(phosphonooxy)butanoyl]-beta-alanyl}amino)ethyl] tetradecanethioate (ZMP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 7 PDB structures; ligand InChIKey HDTINWYIVVMRIN-HSZRJFAPSA-N.
