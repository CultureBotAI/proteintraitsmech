identifier: proteintraitsmech:BIOLIP_FED
label: "FED-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(2R,3S,4R,5R)-5-(6-amino-9H-purin-9-yl)-3,4-dihydroxytetrahydrofuran-2-yl]methyl (2R,3S,4S)-2,3,4-trihydroxy-5-[(4aR)-4a-hydroxy-7,8-dimethyl-2,4-dioxo-3,4,4a,5-tetrahydrobenzo[g]pteridin-10(2H)-yl]pentyl dihydrogen diphosphate (non-preferred name) (FED) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey WTOYVZYXGAOYIM-QUWWARRSSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
