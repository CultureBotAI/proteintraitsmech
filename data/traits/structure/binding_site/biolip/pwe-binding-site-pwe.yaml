identifier: proteintraitsmech:BIOLIP_PWE
label: "PWE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R)-1-(butanoyloxy)-3-{[(R)-hydroxy{[(1S,2S,3S,4S,5S,6R)-2,3,4,6-tetrahydroxy-5-(phosphonooxy)cyclohexyl]oxy}phosphoryl]oxy}propan-2-yl hexadecanoate (PWE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey NJKPWDMBQIOYJP-IKLUZTLWSA-N.
