identifier: proteintraitsmech:BIOLIP_TOF
label: "TOF-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,6-dimethylpyrimido[5,4-e][1,2,4]triazine-5,7(1H,6H)-dione (TOF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SLGRAIAQIAUZAQ-UHFFFAOYSA-N.
