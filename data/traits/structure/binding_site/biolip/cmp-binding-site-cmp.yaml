label: "CMP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ADENOSINE-3',5'-CYCLIC-MONOPHOSPHATE (CMP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 43 binding-site occurrences across 34 PDB structures; ligand InChIKey IVOMOUWHDPKRLL-KQYNXXCUSA-N.
