identifier: proteintraitsmech:BIOLIP_BDP
label: "BDP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-glucopyranuronic acid (BDP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 40 binding-site occurrences across 31 PDB structures; ligand InChIKey AEMOLEFTQBMNLQ-QIUUJYRFSA-N.
