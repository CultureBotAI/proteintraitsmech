identifier: proteintraitsmech:BIOLIP_MET
label: "MET-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand METHIONINE (MET) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 51 binding-site occurrences across 46 PDB structures; ligand InChIKey FFEARJCKVFRZRR-BYPYZUCNSA-N.
