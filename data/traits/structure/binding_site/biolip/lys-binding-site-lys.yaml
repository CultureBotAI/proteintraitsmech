identifier: proteintraitsmech:BIOLIP_LYS
label: "LYS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand LYSINE (LYS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 75 binding-site occurrences across 58 PDB structures; ligand InChIKey KDXKERNSBIXSRK-YFKPBYRVSA-O.
