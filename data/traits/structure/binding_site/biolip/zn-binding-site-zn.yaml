identifier: proteintraitsmech:BIOLIP_ZN
label: "ZN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ZINC ION (ZN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 8255 binding-site occurrences across 5040 PDB structures; ligand InChIKey PTFCDOFLOPIGGS-UHFFFAOYSA-N.
