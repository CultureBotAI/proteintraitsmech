label: "EJ4-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (4bS,8R,8aS,14bR)-7-(cyclopropylmethyl)-5,6,7,8,14,14b-hexahydro-4,8-methano[1]benzofuro[2,3-a]pyrido[4,3-b]carbazole-1,8a(9H)-diol (EJ4) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey WIYUZYBFCWCCQJ-IFKAHUTRSA-N.
