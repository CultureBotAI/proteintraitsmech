identifier: proteintraitsmech:BIOLIP_ILV
label: "ILV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,5S)-5-(hydroxymethyl)-1-methyl-2-(propan-2-yl)-1,2,4,5,6,8-hexahydro-3H-[1,4]diazonino[7,6,5-cd]indol-3-one (ILV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey LUZOFMGZMUZSSK-LRDDRELGSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
