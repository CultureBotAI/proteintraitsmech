identifier: proteintraitsmech:BIOLIP_HEC
label: "HEC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand HEME C (HEC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 716 binding-site occurrences across 241 PDB structures; ligand InChIKey HXQIYSLZKNYNMH-LJNAALQVSA-N.
