identifier: proteintraitsmech:BIOLIP_DLZ
label: "DLZ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-deoxy-1-(6,7-dimethyl-2,4-dioxo-3,4-dihydropteridin-8(2H)-yl)-D-ribitol (DLZ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 5 PDB structures; ligand InChIKey SXDXRJZUAJBNFL-XKSSXDPKSA-N.
