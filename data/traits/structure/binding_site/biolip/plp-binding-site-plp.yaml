identifier: proteintraitsmech:BIOLIP_PLP
label: "PLP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PYRIDOXAL-5'-PHOSPHATE (PLP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 446 binding-site occurrences across 374 PDB structures; ligand InChIKey NGVDGCNFYWLIFO-UHFFFAOYSA-N.
