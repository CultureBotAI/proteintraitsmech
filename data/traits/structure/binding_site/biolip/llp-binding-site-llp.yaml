identifier: proteintraitsmech:BIOLIP_LLP
label: "LLP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-2-amino-6-[[3-hydroxy-2-methyl-5-(phosphonooxymethyl)pyridin-4-yl]methylideneamino]hexanoic acid (LLP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 2 PDB structures; ligand InChIKey YQSOQJORMNSDJL-QFULYMJESA-N.
