definition: >-
  A structure-derived ligand-binding site at which the ligand [(1S,3R,3aR,6aS)-3-(2-azanyl-6-oxidanylidene-1H-purin-9-yl)-5,5-bis(oxidanyl)-1,3,3a,4,6,6a-hexahydrocyclopenta[c]furan-1-yl]methyl [(2R,3S,4R,5R)-5-[2,4-bis(oxidanylidene)pyrimidin-1-yl]-2-(hydroxymethyl)-4-oxidanyl-oxolan-3-yl] hydrogen phosphate (FGO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey UMWHQRFZYGKEGD-MIHJLMQYSA-N.
