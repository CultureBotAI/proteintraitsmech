identifier: proteintraitsmech:BIOLIP_DSK
label: "DSK-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3S,4S)-1-[(2S,3S,4R,5R,6S)-2,3,4,5,6,7-hexahydroxyheptyl]-3,4-dihydroxy-2-(hydroxymethyl)tetrahydrothiophenium (non-preferred name) (DSK) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey JWOANRNVWBCYDC-RRTSSKPOSA-N.
