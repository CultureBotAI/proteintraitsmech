definition: >-
  A structure-derived ligand-binding site at which the ligand S-[2-[3-[[(2R)-4-[[[(2R,3S,4R,5R)-5-(6-aminopurin-9-yl)-4-oxidanyl-3-phosphonooxy-oxolan-2-yl]methoxy-oxidanyl-phosphoryl]oxy-oxidanyl-phosphoryl]oxy-3,3-dimethyl-2-oxidanyl-butanoyl]amino]propanoylamino]ethyl] 3-[(3aS,4S,7aS)-7a-methyl-1,5-bis(oxidanylidene)-2,3,3a,4,6,7-hexahydroinden-4-yl]propanethioate (UCA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey IWNWMTZIJPUDPV-MDQHZGBLSA-N.
