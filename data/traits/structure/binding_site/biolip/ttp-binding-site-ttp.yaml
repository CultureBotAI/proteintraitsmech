identifier: proteintraitsmech:BIOLIP_TTP
label: "TTP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand THYMIDINE-5'-TRIPHOSPHATE (TTP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 35 binding-site occurrences across 27 PDB structures; ligand InChIKey NHVNXKFIZYSCEB-XLPZGREQSA-N.
