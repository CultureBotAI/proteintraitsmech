label: "MCN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PTERIN CYTOSINE DINUCLEOTIDE (MCN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 16 binding-site occurrences across 9 PDB structures; ligand InChIKey RBWYFPNWTRZKKZ-LOIMWUFNSA-N.
