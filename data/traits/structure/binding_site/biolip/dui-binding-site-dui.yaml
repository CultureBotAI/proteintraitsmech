label: "DUI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4-amino-2-[(3R)-2,6-dioxopiperidin-3-yl]-1H-isoindole-1,3(2H)-dione (DUI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey UVSMNLNDYGZFPF-MRVPVSSYSA-N.
