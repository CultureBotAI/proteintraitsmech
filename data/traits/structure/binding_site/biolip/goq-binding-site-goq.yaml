identifier: proteintraitsmech:BIOLIP_GOQ
label: "GOQ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 8-methoxy-6-nitro-naphtho[1,2-e][1,3]benzodioxole-5-carboxylic acid (GOQ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey BBFQZRXNYIEMAW-UHFFFAOYSA-N.
