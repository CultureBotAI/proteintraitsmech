identifier: proteintraitsmech:BIOLIP_WIR
label: "WIR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1R,2S)-1-({4-[(5-tert-butyl-1-methyl-1H-pyrazol-3-yl)amino]-1H-pyrazolo[3,4-d]pyrimidin-6-yl}amino)-2,3-dihydro-1H-inden-2-ol (WIR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey OTFLFRAEUDDJKT-MAUKXSAKSA-N.
