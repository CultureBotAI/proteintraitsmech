  A structure-derived ligand-binding site at which the ligand [[(2R,3S,4R,5R)-5-(6-aminopurin-9-yl)-4-oxidanyl-3-phosphonooxy-oxolan-2-yl]methoxy-oxidanyl-phosphoryl] [(3R)-2,2-dimethyl-4-[[3-(4-methylsulfonylbutylamino)-3-oxidanylidene-propyl]amino]-3-oxidanyl-4-oxidanylidene-butyl] hydrogen phosphate (CA6) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey RMJJETDNMMDBND-NDZSKPAWSA-N.
