label: "YS7-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1R,2S,3S,4R,6S)-4,6-diamino-3-{[3-deoxy-4-C-methyl-3-(methylamino)-beta-L-arabinopyranosyl]oxy}-2-hydroxycyclohexyl 2-amino-2,3,4,6-tetradeoxy-6-[({3-hydroxy-2-methyl-5-[(phosphonooxy)methyl]pyridin-4-yl}methyl)amino]-alpha-D-erythro-hexopyranoside (YS7) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey RIDGEVUBNCTQEZ-IXQBVWJDSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
