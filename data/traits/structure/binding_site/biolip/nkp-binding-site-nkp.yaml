identifier: proteintraitsmech:BIOLIP_NKP
label: "NKP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R)-2-hydroxy-3-(phosphonooxy)propyl (9E)-octadec-9-enoate (NKP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey WRGQSWVCFNIUNZ-SQUSKLHYSA-N.
