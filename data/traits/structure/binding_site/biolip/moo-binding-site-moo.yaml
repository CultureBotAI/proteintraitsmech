label: "MOO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand MOLYBDATE ION (MOO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 21 binding-site occurrences across 15 PDB structures; ligand InChIKey MEFBJEMVZONFCJ-UHFFFAOYSA-N.
