  A structure-derived ligand-binding site at which the ligand 4-(dipropylsulfamoyl)benzoic acid (RTO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey DBABZHXKTCFAPX-UHFFFAOYSA-N.
