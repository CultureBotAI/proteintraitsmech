label: "GDS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand OXIDIZED GLUTATHIONE DISULFIDE (GDS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 15 binding-site occurrences across 13 PDB structures; ligand InChIKey YPZRWBKMTBYPTK-BJDJZHNGSA-N.
