definition: >-
  A structure-derived ligand-binding site at which the ligand (7S,10S,13S)-N-cyclopentyl-10-[2-(morpholin-4-yl)ethyl]-9,12-dioxo-13-(2-oxopyrrolidin-1-yl)-2-oxa-8,11-diazabicyclo[13.3.1]nonadeca-1(19),15,17-triene-7-carboxamide (YRE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 1 PDB structure; ligand InChIKey UGEFECOTMZPOER-KCHLEUMXSA-N.
