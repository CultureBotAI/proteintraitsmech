definition: >-
  A structure-derived ligand-binding site at which the ligand (3R,4E,7E,10R,11S,12R,13S,16R,17R,24aS)-11,17-dihydroxy-10,12,16-trimethyl-3-[(2R)-1-phenylbutan-2-yl]-6,9,10,11,12,13,14,15,16,17,22,23,24,24a-tetradecahydro-3H-13,17-epoxypyrido[2,1-c][1,4]oxazacyclohenicosine-1,18,19(21H)-trione (60Z) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey GXUHHYCGCXNPBU-YNPSNRGGSA-N.
