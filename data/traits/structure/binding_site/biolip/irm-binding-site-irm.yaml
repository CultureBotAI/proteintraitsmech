identifier: proteintraitsmech:BIOLIP_IRM
label: "IRM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,2-Dihydro-psi,psi-caroten-1-ol (IRM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 8 binding-site occurrences across 2 PDB structures; ligand InChIKey CNYVJTJLUKKCGM-RGGGOQHISA-N.
