label: "DCP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2'-DEOXYCYTIDINE-5'-TRIPHOSPHATE (DCP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 15 binding-site occurrences across 15 PDB structures; ligand InChIKey RGWHQCVHVJXOKC-SHYZEUOFSA-N.
