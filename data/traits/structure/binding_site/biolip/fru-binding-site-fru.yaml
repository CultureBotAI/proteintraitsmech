label: "FRU-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-fructofuranose (FRU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 132 binding-site occurrences across 89 PDB structures; ligand InChIKey RFSUNEUAIZKAJO-ARQDHWQXSA-N.
