identifier: proteintraitsmech:BIOLIP_GSP
label: "GSP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 5'-GUANOSINE-DIPHOSPHATE-MONOTHIOPHOSPHATE (GSP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 25 binding-site occurrences across 18 PDB structures; ligand InChIKey XOFLBQFBSOEHOG-UUOKFMHZSA-N.
