label: "OXY-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand OXYGEN MOLECULE (OXY) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 65 binding-site occurrences across 58 PDB structures; ligand InChIKey MYMOFIZGZYHOMD-UHFFFAOYSA-N.
