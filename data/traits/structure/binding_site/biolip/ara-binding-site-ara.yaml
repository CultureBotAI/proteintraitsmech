identifier: proteintraitsmech:BIOLIP_ARA
label: "ARA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-L-arabinopyranose (ARA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 12 binding-site occurrences across 7 PDB structures; ligand InChIKey SRBFZHDQGSBBOR-QMKXCQHVSA-N.
