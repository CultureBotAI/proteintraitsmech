label: "COM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-THIOETHANESULFONIC ACID (COM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 28 binding-site occurrences across 19 PDB structures; ligand InChIKey ZNEWHQLOPFWXOF-UHFFFAOYSA-N.
