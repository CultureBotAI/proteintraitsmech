identifier: proteintraitsmech:BIOLIP_AP5
label: "AP5-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand BIS(ADENOSINE)-5'-PENTAPHOSPHATE (AP5) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 18 binding-site occurrences across 18 PDB structures; ligand InChIKey OIMACDRJUANHTJ-XPWFQUROSA-N.
