definition: >-
  A structure-derived ligand-binding site at which the ligand [[(2~{R},3~{S},4~{R},5~{R})-5-[2,4-bis(oxidanylidene)pyrimidin-1-yl]-3,4-bis(oxidanyl)oxolan-2-yl]methoxy-oxidanyl-phosphoryl] [(2~{R},3~{R},4~{R},5~{R},6~{S})-6-methyl-3,4,5-tris(oxidanyl)oxan-2-yl] hydrogen phosphate (AWU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey DRDCJEIZVLVWNC-SLBWPEPYSA-N.
