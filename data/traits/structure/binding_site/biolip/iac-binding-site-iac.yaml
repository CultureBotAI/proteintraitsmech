identifier: proteintraitsmech:BIOLIP_IAC
label: "IAC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1H-INDOL-3-YLACETIC ACID (IAC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 11 PDB structures; ligand InChIKey SEOVTRFCIGRIMH-UHFFFAOYSA-N.
