definition: >-
  A structure-derived ligand-binding site at which the ligand (4S,7Z)-7-(2-amino-1,3-thiazol-4-yl)-1-[({4-[(2R)-2,3-dihydroxypropyl]-3-(4,5-dihydroxypyridin-2-yl)-5-oxo-4,5-dihydro- 1H-1,2,4-triazol-1-yl}sulfonyl)amino]-4-formyl-10,10-dimethyl-1,6-dioxo-9-oxa-2,5,8-triazaundec-7-en-11-oate (UE1) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey CVHWOSQJHWFYSJ-DXKYJFGHSA-M.
