label: "WVN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,3,3-trimethyl-2-[(1E,3E,5E,7E,9E,11E,13E,15E,17E)-3,7,12,16-tetramethyl-18-[(1R)-2,6,6-trimethylcyclohex-2-en-1-yl]octadeca-1,3,5,7,9,11,13,15,17-nonaenyl]cyclohexene (WVN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 30 binding-site occurrences across 2 PDB structures; ligand InChIKey ANVAOWXLWRTKGA-NTXLUARGSA-N.
