label: "FEC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,3,5,8-TETRAMETHYL-PORPHINE-2,4,6,7-TETRAPROPIONIC ACID FERROUS COMPLEX (FEC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey FEDZMOFKVKOYTI-RGGAHWMASA-L.
