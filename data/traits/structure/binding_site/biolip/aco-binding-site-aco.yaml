label: "ACO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ACETYL COENZYME *A (ACO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 128 binding-site occurrences across 116 PDB structures; ligand InChIKey ZSLZBFCDCINBPY-ZSJPKINUSA-N.
