label: "UD1-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand URIDINE-DIPHOSPHATE-N-ACETYLGLUCOSAMINE (UD1) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 35 binding-site occurrences across 35 PDB structures; ligand InChIKey LFTYTUAZOPRMMI-CFRASDGPSA-N.
