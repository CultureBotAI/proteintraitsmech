identifier: proteintraitsmech:BIOLIP_SQL
label: "SQL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (6E,10E,14E,18E)-2,6,10,15,19,23-hexamethyltetracosa-2,6,10,14,18,22-hexaene (SQL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey YYGNTYWPHWGJRM-AAJYLUCBSA-N.
