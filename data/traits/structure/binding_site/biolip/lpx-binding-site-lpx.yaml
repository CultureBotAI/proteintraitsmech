identifier: proteintraitsmech:BIOLIP_LPX
label: "LPX-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-3-{[(R)-(2-aminoethoxy)(hydroxy)phosphoryl]oxy}-2-hydroxypropyl hexadecanoate (LPX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey YVYMBNSKXOXSKW-FQEVSTJZSA-N.
