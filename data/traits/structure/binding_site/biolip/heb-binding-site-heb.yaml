identifier: proteintraitsmech:BIOLIP_HEB
label: "HEB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand HEME B/C (HEB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 34 binding-site occurrences across 22 PDB structures; ligand InChIKey NEGHHAJBRZGUAY-RGGAHWMASA-L.
