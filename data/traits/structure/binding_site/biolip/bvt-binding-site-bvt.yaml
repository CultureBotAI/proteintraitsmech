definition: >-
  A structure-derived ligand-binding site at which the ligand 3-[[(2~{S},3~{a}~{R},5~{R},6~{R},6~{a}~{R})-5-[[[[(2~{R},3~{S},4~{R},5~{R})-5-(6-aminopurin-9-yl)-3,4-bis(oxidanyl)oxolan-2-yl]methoxy-oxidanyl-phosphoryl]oxy-oxidanyl-phosphoryl]oxymethyl]-2-[[(5~{S})-6-[[(2~{S})-3-(1~{H}-indol-3-yl)-1-oxidanylidene-1-(propan-2-ylamino)propan-2-yl]amino]-6-oxidanylidene-5-(phenylmethoxycarbonylamino)hexyl]amino]-6-oxidanyl-3~{a},5,6,6~{a}-tetrahydrofuro[2,3-d][1,3]oxathiol-2-yl]amino]propanoic acid (BVT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey YXTVLLWQDXVSFE-WDVUSYHVSA-N.
