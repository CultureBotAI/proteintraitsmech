label: "PT5-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(2R)-1-octadecanoyloxy-3-[oxidanyl-[(1R,2R,3S,4R,5R,6S)-2,3,6-tris(oxidanyl)-4,5-diphosphonooxy-cyclohexyl]oxy-phospho ryl]oxy-propan-2-yl] (8Z)-icosa-5,8,11,14-tetraenoate (PT5) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 12 binding-site occurrences across 9 PDB structures; ligand InChIKey CNWINRVXAYPOMW-HJBQCNPJSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
