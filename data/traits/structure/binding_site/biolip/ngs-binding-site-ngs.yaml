identifier: proteintraitsmech:BIOLIP_NGS
label: "NGS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-acetamido-2-deoxy-6-O-sulfo-beta-D-glucopyranose (NGS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 7 binding-site occurrences across 6 PDB structures; ligand InChIKey WJFVEEAIYIOATH-FMDGEEDCSA-N.
