identifier: proteintraitsmech:BIOLIP_ICB
label: "ICB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1H-indole-2-carboxylic acid (ICB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey HCUARRIEZVDMPT-UHFFFAOYSA-N.
