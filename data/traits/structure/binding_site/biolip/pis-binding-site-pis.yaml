  A structure-derived ligand-binding site at which the ligand TRIHYDROGEN THIODIPHOSPHATE (PIS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 6 binding-site occurrences across 6 PDB structures; ligand InChIKey HWTUHTNZLQJJEV-UHFFFAOYSA-M.
