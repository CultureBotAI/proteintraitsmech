label: "OCA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand OCTANOIC ACID (CAPRYLIC ACID) (OCA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 14 binding-site occurrences across 12 PDB structures; ligand InChIKey WWZKQHOCKIZLMA-UHFFFAOYSA-N.
