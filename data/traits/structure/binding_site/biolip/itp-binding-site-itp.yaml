identifier: proteintraitsmech:BIOLIP_ITP
label: "ITP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHOSPHORIC ACID MONO-(2,3,4,6-TETRAHYDROXY-5-PHOSPHONOOXY-CYCLOHEXYL) ESTER (ITP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey PUVHMWJJTITUGO-FICORBCRSA-N.
