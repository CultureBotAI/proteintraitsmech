definition: >-
  A structure-derived ligand-binding site at which the ligand (1R,2R)-2-[(2S,4E,6E,8R,9S,11R,13S,15S,16S)-7-cyano-8,16-dihydroxy-9,11,13,15-tetramethyl-18-oxooxacyclooctadeca-4,6-dien-2-yl]cyclopentanecarboxylic acid (2CR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey OJCKRNPLOZHAOU-RSXXJMTFSA-N.
