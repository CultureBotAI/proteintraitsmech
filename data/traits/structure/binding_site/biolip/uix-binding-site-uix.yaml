identifier: proteintraitsmech:BIOLIP_UIX
label: "UIX-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(1~{S},5~{R})-3,3,5-trimethyl-5-oxidanyl-4-[(3~{E},5~{E},7~{E},9~{E},11~{E},13~{E},15~{E},17~{E})-3,7,12,16-tetramethyl-18-[(1~{S},4~{S},6~{R})-2,2,6-trimethyl-4-oxidanyl-7-oxabicyclo[4.1.0]heptan-1-yl]octadeca-1,3,5,7,9,11,13,15,17-nonaenylidene]cyclohexyl] ethanoate (UIX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 31 binding-site occurrences across 3 PDB structures; ligand InChIKey PVNVIBOWBAPFOE-GYMZYDTCSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
