label: "4BW-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-amino-9-[(2R,3R,3aS,5R,7aR,9R,10R,10aS,12R,14aR)-9-(6-amino-9H-purin-9-yl)-3,5,10,12-tetrahydroxy-5,12-dioxidooctahydro-2H,7H-difuro[3,2-d:3',2'-j][1,3,7,9,2,8]tetraoxadiphosphacyclododecin-2-yl]-1,9-dihydro-6H-purin-6-one (4BW) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 8 binding-site occurrences across 7 PDB structures; ligand InChIKey RFCBNSCSPXMEBK-INFSMZHSSA-N.
