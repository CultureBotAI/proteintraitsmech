label: "PIN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PIPERAZINE-N,N'-BIS(2-ETHANESULFONIC ACID) (PIN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 11 binding-site occurrences across 9 PDB structures; ligand InChIKey IHPYMWDTONKSCO-UHFFFAOYSA-N.
