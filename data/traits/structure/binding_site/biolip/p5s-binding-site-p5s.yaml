label: "P5S-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand O-[(R)-{[(2R)-2,3-bis(octadecanoyloxy)propyl]oxy}(hydroxy)phosphoryl]-L-serine (P5S) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 43 binding-site occurrences across 24 PDB structures; ligand InChIKey TZCPCKNHXULUIY-RGULYWFUSA-N.
