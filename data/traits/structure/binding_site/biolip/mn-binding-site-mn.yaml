  A structure-derived ligand-binding site at which the ligand MANGANESE (II) ION (MN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1156 binding-site occurrences across 811 PDB structures; ligand InChIKey WAEMQWOKJMHJLA-UHFFFAOYSA-N.
