definition: >-
  A structure-derived ligand-binding site at which the ligand ADENINE (ADE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 52 binding-site occurrences across 51 PDB structures; ligand InChIKey GFFGJBXGBJISGV-UHFFFAOYSA-N.
