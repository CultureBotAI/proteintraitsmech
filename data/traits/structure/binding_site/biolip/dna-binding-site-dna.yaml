identifier: proteintraitsmech:BIOLIP_DNA
label: "DNA-binding site"
definition: >-
  A structure-derived ligand-binding site at which a DNA molecule is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4231 binding-site occurrences across 2046 PDB structures.
definition_source: "BioLiP2 (Yang/Zhang group)"
