definition: >-
  A structure-derived ligand-binding site at which the ligand FE (III) ION (FE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 754 binding-site occurrences across 553 PDB structures; ligand InChIKey VTLYFUHAOXGGBS-UHFFFAOYSA-N.
