identifier: proteintraitsmech:BIOLIP_8CT
label: "8CT-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (6'R,11cis,11'cis,13cis,15cis)-4',5'-didehydro-5',6'-dihydro-beta,beta-carotene (8CT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 71 binding-site occurrences across 6 PDB structures; ligand InChIKey ANVAOWXLWRTKGA-GZSHKXEASA-N.
