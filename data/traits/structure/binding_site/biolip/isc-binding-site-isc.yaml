identifier: proteintraitsmech:BIOLIP_ISC
label: "ISC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (5S,6S)-5-[(1-carboxyethenyl)oxy]-6-hydroxycyclohexa-1,3-diene-1-carboxylic acid (ISC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey NTGWPRCCOQCMGE-YUMQZZPRSA-N.
