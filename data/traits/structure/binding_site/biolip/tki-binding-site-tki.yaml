label: "TKI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-[(4,6-diethyl-1,3,5-triazin-2-yl)-methyl-amino]ethanoic acid (TKI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey DXBUHNIKXJEPIB-UHFFFAOYSA-N.
