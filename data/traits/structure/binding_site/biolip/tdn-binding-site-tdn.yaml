label: "TDN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-[(2E)-3-[(4-azanyl-2-methyl-pyrimidin-5-yl)methyl]-4-methyl-2-(1-oxidanylpropylidene)-1,3-thiazol-5-yl]ethyl phosphono hydrogen phosphate (TDN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey MLWWWBMKISFTSY-NTCAYCPXSA-N.
