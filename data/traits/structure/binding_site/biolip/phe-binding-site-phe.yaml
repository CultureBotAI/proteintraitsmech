label: "PHE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHENYLALANINE (PHE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 40 binding-site occurrences across 32 PDB structures; ligand InChIKey COLNVLDHVKWLRT-QMMMGPOBSA-N.
