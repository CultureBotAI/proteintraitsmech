identifier: proteintraitsmech:BIOLIP_MPG
label: "MPG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand [(Z)-octadec-9-enyl] (2R)-2,3-bis(oxidanyl)propanoate (MPG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 62 binding-site occurrences across 13 PDB structures; ligand InChIKey JPJYKWFFJCWMPK-GDCKJWNLSA-N.
