identifier: proteintraitsmech:BIOLIP_FBP
label: "FBP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,6-di-O-phosphono-beta-D-fructofuranose (FBP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 27 binding-site occurrences across 23 PDB structures; ligand InChIKey RNBGYGVWRKECFJ-ARQDHWQXSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
