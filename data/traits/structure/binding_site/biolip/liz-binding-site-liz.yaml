identifier: proteintraitsmech:BIOLIP_LIZ
label: "LIZ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-{(1S,2S)-2-[bis(carboxymethyl)amino]cyclohexyl}-N-{(2R)-2-[bis(carboxymethyl)amino]-3-[4-({[2-hydroxy-1,1-bis(hydroxymethyl)ethyl]carbamothioyl}amino)phenyl]propyl}glycine (LIZ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey ZDJITWBUQUCYMP-VJBWXMMDSA-N.
