  A structure-derived ligand-binding site at which the ligand (1R,2S,3S,4R,5R,9S,11S,12S,14R)-7-amino-2,4,12-trihydroxy-2-(hydroxymethyl)-10,13,15-trioxa-6,8-diazapentacyclo[7.4.1.1~3,12~.0~5,11~.0~5,14~]pentadec-7-en-8-ium (non-preferred name) (WMK) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey STNXQECXKDMLJK-LQRXLWILSA-N.
