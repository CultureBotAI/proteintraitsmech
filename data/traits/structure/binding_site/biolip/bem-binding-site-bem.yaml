identifier: proteintraitsmech:BIOLIP_BEM
label: "BEM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-mannopyranuronic acid (BEM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 33 binding-site occurrences across 15 PDB structures; ligand InChIKey AEMOLEFTQBMNLQ-SYJWYVCOSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
