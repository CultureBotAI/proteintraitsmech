label: "BR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand BROMIDE ION (BR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 17 binding-site occurrences across 6 PDB structures; ligand InChIKey CPELXLSAUQHCOX-UHFFFAOYSA-M.
