  A structure-derived ligand-binding site at which the ligand 2-amino-6-[(1Z)-1,2-dihydroxyprop-1-en-1-yl]-7,8-dihydropteridin-4(3H)-one (ZSP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey FYDGMRRMOMSOLR-UTCJRWHESA-N.
