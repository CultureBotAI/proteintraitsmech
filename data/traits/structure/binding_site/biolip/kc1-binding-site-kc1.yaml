definition: >-
  A structure-derived ligand-binding site at which the ligand Chlorophyll c1 (KC1) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 149 binding-site occurrences across 14 PDB structures; ligand InChIKey DGNIJJSSARBJSH-QIEHNWLWSA-L.
