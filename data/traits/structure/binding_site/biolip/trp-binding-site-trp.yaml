identifier: proteintraitsmech:BIOLIP_TRP
label: "TRP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand TRYPTOPHAN (TRP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 70 binding-site occurrences across 57 PDB structures; ligand InChIKey QIVBCDIJIAJPQS-VIFPVBQESA-N.
