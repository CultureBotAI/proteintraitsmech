identifier: proteintraitsmech:BIOLIP_CTP
label: "CTP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand CYTIDINE-5'-TRIPHOSPHATE (CTP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 55 binding-site occurrences across 43 PDB structures; ligand InChIKey PCDQPRRSZKQHHS-XVFCMESISA-N.
