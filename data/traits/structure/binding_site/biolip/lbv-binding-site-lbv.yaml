identifier: proteintraitsmech:BIOLIP_LBV
label: "LBV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 3-[2-[(Z)-[3-(2-carboxyethyl)-5-[(Z)-(4-ethenyl-3-methyl-5-oxidanylidene-pyrrol-2-ylidene)methyl]-4-methyl-pyrrol-1-ium -2-ylidene]methyl]-5-[(Z)-[(3E)-3-ethylidene-4-methyl-5-oxidanylidene-pyrrolidin-2-ylidene]methyl]-4-methyl-1H-pyrrol-3- yl]propanoic acid (LBV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 7 binding-site occurrences across 7 PDB structures; ligand InChIKey DKMLMZVDTGOEGU-ISEYCTJISA-O.
definition_source: "BioLiP2 (Yang/Zhang group)"
