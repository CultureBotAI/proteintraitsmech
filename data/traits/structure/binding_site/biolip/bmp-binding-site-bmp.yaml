  A structure-derived ligand-binding site at which the ligand 6-HYDROXYURIDINE-5'-PHOSPHATE (BMP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 12 binding-site occurrences across 6 PDB structures; ligand InChIKey UDOBICLZEKUKCV-YXZULKJRSA-N.
