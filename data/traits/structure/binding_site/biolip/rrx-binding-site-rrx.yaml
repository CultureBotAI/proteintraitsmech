label: "RRX-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (3R)-beta,beta-caroten-3-ol (RRX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 14 binding-site occurrences across 9 PDB structures; ligand InChIKey DMASLKHVQRHNES-FKKUPVFPSA-N.
