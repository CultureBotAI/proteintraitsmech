identifier: proteintraitsmech:BIOLIP_PCD
label: "PCD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (MOLYBDOPTERIN-CYTOSINE DINUCLEOTIDE-S,S)-DIOXO-AQUA-MOLYBDENUM(V) (PCD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 4 PDB structures; ligand InChIKey YEBYDVFRFUQMER-MQPNXHJTSA-L.
