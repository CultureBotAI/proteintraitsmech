definition: >-
  A structure-derived ligand-binding site at which the ligand [(2R,3S,4R,5R)-5-[4-aminocarbonyl-5-[(E)-[[(2R,3R,4S,5R)-3,4-bis(oxidanyl)-5-(phosphonooxymethyl)oxolan-2-yl]amino]methylideneamino]imidazol-1-yl]-3,4-bis(oxidanyl)oxolan-2-yl]methyl dihydrogen phosphate (GUO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey QOUSHGMTBIIAHR-KEOHHSTQSA-N.
