definition: >-
  A structure-derived ligand-binding site at which the ligand 4-(5-{[(2-aminophenyl)methyl]carbamoyl}thiophen-2-yl)-1-benzothiophene-2-carboxamide (OND) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey UQZFCZAYARDQIK-UHFFFAOYSA-N.
