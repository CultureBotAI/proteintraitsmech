identifier: proteintraitsmech:BIOLIP_WSF
label: "WSF-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R)-3-{[(S)-hydroxy(3-methylbutoxy)phosphoryl]oxy}-2-(octanoyloxy)propyl decanoate (WSF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey IMPGTAQAVHSDIP-XMMPIXPASA-N.
