label: "SFJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3R,4R,5R,6R)-5-acetamido-2,3-difluoro-4-hydroxy-6-[(1R,2R)-1,2,3-trihydroxypropyl]tetrahydro-2H-pyran-2-carboxylic acid (SFJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey HMALKZAXODOYOP-DAXAGCIGSA-N.
