identifier: proteintraitsmech:BIOLIP_MGD
label: "MGD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-AMINO-5,6-DIMERCAPTO-7-METHYL-3,7,8A,9-TETRAHYDRO-8-OXA-1,3,9,10-TETRAAZA-ANTHRACEN-4-ONE GUANOSINE DINUCLEOTIDE (MGD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 52 binding-site occurrences across 25 PDB structures; ligand InChIKey VQAGYJCYOLHZDH-ILXWUORBSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
