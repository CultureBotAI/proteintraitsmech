identifier: proteintraitsmech:BIOLIP_PIZ
label: "PIZ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-3-{[(R)-{[(1S,2S,3R,4S,5S,6S)-2,6-dihydroxy-3,4,5-tris(phosphonooxy)cyclohexyl]oxy}(hydroxy)phosphoryl]oxy}propane -1,2-diyl dihexadecanoate (PIZ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey ZSZXYWFCIKKZBT-XMZWCAJNSA-N.
