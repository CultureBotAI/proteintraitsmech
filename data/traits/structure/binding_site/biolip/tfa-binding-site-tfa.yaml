label: "TFA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand trifluoroacetic acid (TFA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 14 binding-site occurrences across 14 PDB structures; ligand InChIKey DTQVDTLACAAQTR-UHFFFAOYSA-N.
