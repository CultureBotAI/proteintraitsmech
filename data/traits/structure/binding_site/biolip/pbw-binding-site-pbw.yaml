label: "PBW-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1~{S},4~{S},5~{R})-6-(hydroxymethyl)cyclohexane-1,2,3,4,5-pentol (PBW) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey QFYQIWDMMSKNFF-VQPJZGIOSA-N.
