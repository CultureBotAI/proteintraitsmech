identifier: proteintraitsmech:BIOLIP_UTP
label: "UTP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand URIDINE 5'-TRIPHOSPHATE (UTP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 33 binding-site occurrences across 25 PDB structures; ligand InChIKey PGAVKCOVUIYSFO-XVFCMESISA-N.
