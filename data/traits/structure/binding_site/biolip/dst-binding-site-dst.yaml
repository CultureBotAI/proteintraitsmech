identifier: proteintraitsmech:BIOLIP_DST
label: "DST-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand DIMETHYLALLYL S-THIOLODIPHOSPHATE (DST) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 16 binding-site occurrences across 15 PDB structures; ligand InChIKey ZWFWSISPSBLNGO-UHFFFAOYSA-N.
