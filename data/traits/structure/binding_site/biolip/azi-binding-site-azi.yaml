identifier: proteintraitsmech:BIOLIP_AZI
label: "AZI-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand AZIDE ION (AZI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 54 binding-site occurrences across 39 PDB structures; ligand InChIKey IVRMZWNICZWHMI-UHFFFAOYSA-N.
