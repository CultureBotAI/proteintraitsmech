definition: >-
  A structure-derived ligand-binding site at which the ligand (1R,2R,3S,4R,5R,6S)-4-{[(S)-[(2S)-2,3-dihydroxypropoxy](hydroxy)phosphoryl]oxy}-3,5,6-trihydroxycyclohexane-1,2-diyl bis[dihydrogen (phosphate)] (KYG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey VQSJAWPFQCXIOB-BYMOGYCESA-N.
