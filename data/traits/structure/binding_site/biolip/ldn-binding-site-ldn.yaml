identifier: proteintraitsmech:BIOLIP_LDN
label: "LDN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 4-[6-(4-piperazin-1-ylphenyl)pyrazolo[1,5-a]pyrimidin-3-yl]quinoline (LDN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 2 PDB structures; ligand InChIKey CDOVNWNANFFLFJ-UHFFFAOYSA-N.
