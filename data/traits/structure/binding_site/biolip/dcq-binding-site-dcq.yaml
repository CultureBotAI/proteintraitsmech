identifier: proteintraitsmech:BIOLIP_DCQ
label: "DCQ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-decyl-5,6-dimethoxy-3-methylcyclohexa-2,5-diene-1,4-dione (DCQ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 7 binding-site occurrences across 4 PDB structures; ligand InChIKey VMEGFMNVSYVVOM-UHFFFAOYSA-N.
