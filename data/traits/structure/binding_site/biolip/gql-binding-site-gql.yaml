identifier: proteintraitsmech:BIOLIP_GQL
label: "GQL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (E)-[4-(3,5-difluorophenyl)-3H-pyrrolo[2,3-b]pyridin-3-ylidene](3-methoxyphenyl)methanol (GQL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey HQMUBYFTZASKLP-ZZEZOPTASA-N.
