identifier: proteintraitsmech:BIOLIP_IDS
label: "IDS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-O-sulfo-alpha-L-idopyranuronic acid (IDS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 15 binding-site occurrences across 9 PDB structures; ligand InChIKey COJBCAMFZDFGFK-VCSGLWQLSA-N.
