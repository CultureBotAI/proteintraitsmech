definition: >-
  A structure-derived ligand-binding site at which the ligand 2-[2,4-bis(oxidanyl)phenyl]-3,5,7-tris(oxidanyl)chromen-4-one (MRI) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey YXOLAZRVSSWPPT-UHFFFAOYSA-N.
