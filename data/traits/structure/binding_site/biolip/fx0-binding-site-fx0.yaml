definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,4R)-4-[(3R,5S,6R,7R,8R,9S,10S,12S,13R,14S,17R)-6-ethyl-10,13-dimethyl-3,7,12-tris(oxidanyl)-2,3,4,5,6,7,8,9,11,12,14,15,16,17-tetradecahydro-1H-cyclopenta[a]phenanthren-17-yl]-2-methyl-pentanoic acid (FX0) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey NPBCMXATLRCCLF-IRRLEISYSA-N.
