label: "GLP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-amino-2-deoxy-6-O-phosphono-alpha-D-glucopyranose (GLP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 7 binding-site occurrences across 6 PDB structures; ligand InChIKey XHMJOUIAFHJHBW-UKFBFLRUSA-N.
