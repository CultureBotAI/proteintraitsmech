identifier: proteintraitsmech:BIOLIP_CTM
label: "CTM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-3-(4-{[2-(4-chlorophenyl)-1,3-thiazol-4-yl]methoxy}-2-methylphenyl)-2-ethoxypropanoic acid (CTM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey OTUKSARQRIIQDU-FQEVSTJZSA-N.
