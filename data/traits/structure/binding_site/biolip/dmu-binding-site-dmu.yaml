definition: >-
  A structure-derived ligand-binding site at which the ligand DECYL-BETA-D-MALTOPYRANOSIDE (DMU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 54 binding-site occurrences across 28 PDB structures; ligand InChIKey WOQQAWHSKSSAGF-WXFJLFHKSA-N.
