identifier: proteintraitsmech:BIOLIP_PEB
label: "PEB-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHYCOERYTHROBILIN (PEB) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 224 binding-site occurrences across 19 PDB structures; ligand InChIKey NKCBCVIFPXGHAV-WAVSMFBNSA-N.
