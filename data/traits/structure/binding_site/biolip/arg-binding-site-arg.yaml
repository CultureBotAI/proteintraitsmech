definition: >-
  A structure-derived ligand-binding site at which the ligand ARGININE (ARG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 75 binding-site occurrences across 67 PDB structures; ligand InChIKey ODKSFYDXXFIFQN-BYPYZUCNSA-O.
