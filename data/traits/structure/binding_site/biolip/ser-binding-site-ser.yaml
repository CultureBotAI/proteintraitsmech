  A structure-derived ligand-binding site at which the ligand SERINE (SER) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 34 binding-site occurrences across 29 PDB structures; ligand InChIKey MTCFGRXMJLQNBG-REOHCLBHSA-N.
