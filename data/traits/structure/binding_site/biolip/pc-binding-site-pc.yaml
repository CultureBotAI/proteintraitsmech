label: "PC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand PHOSPHOCHOLINE (PC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 22 binding-site occurrences across 15 PDB structures; ligand InChIKey YHHSONZFOIEMCP-UHFFFAOYSA-O.
