identifier: proteintraitsmech:BIOLIP_RRM
label: "RRM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2E,4S,5S,6E,8E)-10-{(2R,3S,6S,8R,9S)-9-butyl-8-[(1E,3E)-4-carboxy-3-methylbuta-1,3-dien-1-yl]-3-methyl-1,7-dioxaspiro[5.5]undec-2-yl}-5-hydroxy-4,8-dimethyldeca-2,6,8-trienoic acid (RRM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey YEZCSKCHOPBNCC-OXNFKLAGSA-N.
