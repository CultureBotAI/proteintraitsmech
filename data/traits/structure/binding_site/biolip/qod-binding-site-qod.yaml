identifier: proteintraitsmech:BIOLIP_QOD
label: "QOD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (3R)-N-[(2S,3R)-1-(alpha-D-galactopyranosyloxy)-3-hydroxy-15-methylhexadecan-2-yl]-3-hydroxyheptadecanamide (QOD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey OXDHWVALGDXDDK-OGMOURDSSA-N.
