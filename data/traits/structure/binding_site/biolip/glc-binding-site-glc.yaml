label: "GLC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-D-glucopyranose (GLC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1013 binding-site occurrences across 461 PDB structures; ligand InChIKey WQZGKKKJIJFFOK-DVKNGEFBSA-N.
