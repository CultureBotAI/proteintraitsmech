identifier: proteintraitsmech:BIOLIP_UPG
label: "UPG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand URIDINE-5'-DIPHOSPHATE-GLUCOSE (UPG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 51 binding-site occurrences across 50 PDB structures; ligand InChIKey HSCJRCZFDFQWRP-JZMIEXBBSA-N.
