definition: >-
  A structure-derived ligand-binding site at which the ligand (3alpha,7alpha)-3,7,15-trihydroxy-12,13-epoxytrichothec-9-en-8-one (B2S) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey LINOMUASTDIRTM-BGQOOYBISA-N.
