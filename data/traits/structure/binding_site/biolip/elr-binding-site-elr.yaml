identifier: proteintraitsmech:BIOLIP_ELR
label: "ELR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand phosphono [(3~{S},6~{E},10~{E})-3,7,11,15-tetramethylhexadeca-6,10,14-trienyl] hydrogen phosphate (ELR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SJMIVFIDXGVUHA-UJMPLXFMSA-N.
