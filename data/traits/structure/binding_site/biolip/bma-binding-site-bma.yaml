identifier: proteintraitsmech:BIOLIP_BMA
label: "BMA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-mannopyranose (BMA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 234 binding-site occurrences across 163 PDB structures; ligand InChIKey WQZGKKKJIJFFOK-RWOPYEJCSA-N.
