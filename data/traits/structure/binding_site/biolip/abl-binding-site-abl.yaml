identifier: proteintraitsmech:BIOLIP_ABL
label: "ABL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3R,4R,5R)-4,5-dihydroxy-2-(hydroxymethyl)-6-oxopiperidin-3-yl beta-D-glucopyranoside (ABL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey WXSNJJDPPISYEF-ZNLUKOTNSA-N.
