label: "AMV-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl 2-acetamido-3-O-[(1R)-1-carboxyethyl]-2-deoxy-beta-D-glucopyranoside (AMV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey UXEQYDNCHCKBIL-PKKPQKKZSA-N.
