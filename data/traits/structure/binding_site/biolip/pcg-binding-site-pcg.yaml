definition: >-
  A structure-derived ligand-binding site at which the ligand CYCLIC GUANOSINE MONOPHOSPHATE (PCG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 15 binding-site occurrences across 12 PDB structures; ligand InChIKey ZOOGRGPOEVQQDX-UUOKFMHZSA-N.
