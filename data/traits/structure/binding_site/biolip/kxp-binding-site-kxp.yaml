label: "KXP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-1-{[(R)-hydroxy{[(1R,2R,3S,4R,5R,6S)-2,3,6-trihydroxy-4,5-bis(phosphonooxy)cyclohexyl]oxy}phosphoryl]oxy}-3-(octadecanoyloxy)propan-2-yl icosa-5,8,11,14-tetraenoate (KXP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 9 binding-site occurrences across 2 PDB structures; ligand InChIKey CNWINRVXAYPOMW-AUBJPSKUSA-N.
