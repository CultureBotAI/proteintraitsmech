identifier: proteintraitsmech:BIOLIP_EAX
label: "EAX-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3R)-2,3,4-trihydroxybutanoic acid (EAX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey JPIJQSOTBSSVTP-PWNYCUMCSA-N.
