label: "CLA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand CHLOROPHYLL A (CLA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 7354 binding-site occurrences across 151 PDB structures; ligand InChIKey ATNHDLDRLWWWCB-AENOIHSZSA-M.
