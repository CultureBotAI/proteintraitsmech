identifier: proteintraitsmech:BIOLIP_MG
label: "MG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand MAGNESIUM ION (MG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4072 binding-site occurrences across 3115 PDB structures; ligand InChIKey JLVVSXFLKOJNIY-UHFFFAOYSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
