label: "UQ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand Coenzyme Q10, (2Z,6E,10Z,14E,18E,22E,26Z)-isomer (UQ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey ACTIUHUUMQJHFO-RECDIHICSA-N.
