label: "HIR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyliridium(III) mesoporphyrin (HIR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SMNGZJSFEBZLGV-HXFTUNQESA-L.
