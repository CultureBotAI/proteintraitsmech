label: "COD-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand DEPHOSPHO COENZYME A (COD) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 4 PDB structures; ligand InChIKey KDTSHFARGAKYJN-IBOSZNHHSA-N.
