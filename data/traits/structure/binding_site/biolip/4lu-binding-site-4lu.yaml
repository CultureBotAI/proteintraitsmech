label: "4LU-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-deoxy-5-O-phosphono-1-(3,3,4,5-tetramethyl-9,11-dioxo-2,3,8,9,10,11-hexahydro-7H-quinolino[1,8-fg]pteridin-12-ium-7-y l)-D-ribitol (4LU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 7 binding-site occurrences across 7 PDB structures; ligand InChIKey KOUJZPGFPGLHCZ-IYOUNJFTSA-O.
