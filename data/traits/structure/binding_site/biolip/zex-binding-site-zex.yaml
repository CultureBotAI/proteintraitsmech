identifier: proteintraitsmech:BIOLIP_ZEX
label: "ZEX-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1R,2S)-4-{(1E,3E,5E,7E,9E,11E,13E,15E,17E)-18-[(4S)-4-hydroxy-2,6,6-trimethylcyclohex-1-en-1-yl]-3,7,12,16-tetramethyloctadeca-1,3,5,7,9,11,13,15,17-nonaen-1-yl}-2,5,5-trimethylcyclohex-3-en-1-ol (ZEX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 23 binding-site occurrences across 3 PDB structures; ligand InChIKey YRMDXLDAZBQLBK-WIHRHFSMSA-N.
