definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-1-{[(S)-hydroxy{[(1s,2R,3R,4R,5S,6S)-2,3,4,5,6-pentahydroxycyclohexyl]oxy}phosphoryl]oxy}-3-(octadecanoyloxy)propan-2-yl (5E,8E,11E,14E)-icosa-5,8,11,14-tetraenoate (EIJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey KRTOMQDUKGRFDJ-ROVRCULJSA-N.
