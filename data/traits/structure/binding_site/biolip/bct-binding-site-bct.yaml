identifier: proteintraitsmech:BIOLIP_BCT
label: "BCT-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand BICARBONATE ION (BCT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 74 binding-site occurrences across 60 PDB structures; ligand InChIKey BVKZGUZCCUSVTD-UHFFFAOYSA-M.
