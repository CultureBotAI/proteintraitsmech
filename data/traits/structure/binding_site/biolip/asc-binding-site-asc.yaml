label: "ASC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ASCORBIC ACID (ASC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 8 binding-site occurrences across 7 PDB structures; ligand InChIKey CIWBSHSKHKDKBQ-JLAZNSOCSA-N.
