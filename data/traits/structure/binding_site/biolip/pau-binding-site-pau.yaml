definition: >-
  A structure-derived ligand-binding site at which the ligand PANTOTHENOIC ACID (PAU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 10 binding-site occurrences across 7 PDB structures; ligand InChIKey GHOKWGTUZJEAQD-ZETCQYMHSA-N.
