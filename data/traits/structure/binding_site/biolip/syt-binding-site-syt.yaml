definition: >-
  A structure-derived ligand-binding site at which the ligand (5S,12bS)-5-methyl-6,7,12b,13-tetrahydro-2H,4H,10H-[1,3]dioxolo[4,5-g][1,3]dioxolo[7,8]isoquinolino[3,2-a]isoquinolin-5-ium (SYT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey GBUUKFRQPCPYPW-KKSFZXQISA-N.
