identifier: proteintraitsmech:BIOLIP_DOW
label: "DOW-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1R,2R,3S,4R,6S)-4,6-diamino-2,3-dihydroxycyclohexyl 2-amino-2,6-dideoxy-6-[({3-hydroxy-2-methyl-5-[(phosphonooxy)methyl]pyridin-4-yl}methyl)amino]-alpha-D-glucopyranoside (DOW) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey YAANPRCSTYUZOJ-GMRNZWOESA-N.
