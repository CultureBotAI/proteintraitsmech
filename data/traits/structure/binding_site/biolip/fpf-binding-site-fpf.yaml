identifier: proteintraitsmech:BIOLIP_FPF
label: "FPF-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2Z,6E)-2-fluoro-3,7,11-trimethyldodeca-2,6,10-trien-1-yl trihydrogen diphosphate (FPF) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 4 PDB structures; ligand InChIKey DXHJZCKJWKWTCH-WISUYLHISA-N.
