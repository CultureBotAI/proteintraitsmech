identifier: proteintraitsmech:BIOLIP_AVJ
label: "AVJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N,N,N-trimethyl-histidine (AVJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 5 PDB structures; ligand InChIKey GPPYTCRVKHULJH-QMMMGPOBSA-O.
