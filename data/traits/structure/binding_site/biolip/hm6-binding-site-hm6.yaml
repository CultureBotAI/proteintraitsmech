definition: >-
  A structure-derived ligand-binding site at which the ligand 4-(4-(hydroxymethyl)-1h-1,2,3-triazol-1-yl)pyridine-2,6-dicarboxylic acid (HM6) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey JVQVNGYGRNAVBP-UHFFFAOYSA-N.
