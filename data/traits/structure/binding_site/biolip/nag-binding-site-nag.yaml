identifier: proteintraitsmech:BIOLIP_NAG
label: "NAG-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2-acetamido-2-deoxy-beta-D-glucopyranose (NAG) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 9 PDB structures; ligand InChIKey OVRNDRQMDRJTHS-FMDGEEDCSA-N.
