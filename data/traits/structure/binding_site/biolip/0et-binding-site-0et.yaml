definition: >-
  A structure-derived ligand-binding site at which the ligand [[(2R,3S,4R,5R)-5-(6-aminopurin-9-yl)-4-oxidanyl-3-phosphonooxy-oxolan-2-yl]methoxy-oxidanyl-phosphoryl] [(3R)-2,2-dimethyl-3-oxidanyl-4-oxidanylidene-4-[[3-oxidanylidene-3-[2-[(2R)-2-oxidanylundecyl]sulfanylethylamino]propyl]amino]butyl] hydrogen phosphate (0ET) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 1 PDB structure; ligand InChIKey LVZITIAGAKKXBV-XBRBJHMKSA-N.
