identifier: proteintraitsmech:BIOLIP_CLR
label: "CLR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand CHOLESTEROL (CLR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 413 binding-site occurrences across 207 PDB structures; ligand InChIKey HVYWMOMLDIMFJA-DPAQBDIFSA-N.
