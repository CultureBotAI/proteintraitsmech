identifier: proteintraitsmech:BIOLIP_IMJ
label: "IMJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2E)-N-[(1,2-dimethyl-1H-indol-3-yl)methyl]-N-methyl-3-(7-oxo-5,6,7,8-tetrahydro-1,8-naphthyridin-3-yl)prop-2-enamide (IMJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey PVNPCRMKZHRPEV-DHZHZOJOSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
