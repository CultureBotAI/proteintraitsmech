identifier: proteintraitsmech:BIOLIP_LOC
label: "LOC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-[(7S)-1,2,3,10-tetramethoxy-9-oxo-6,7-dihydro-5H-benzo[d]heptalen-7-yl]ethanamide (LOC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey IAKHMKGGTNLKSZ-INIZCTEOSA-N.
