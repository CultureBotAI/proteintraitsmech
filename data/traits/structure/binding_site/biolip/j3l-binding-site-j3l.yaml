label: "J3L-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-3-methyl-2-[[(2S,4R)-1-methyl-4-[(2E,4E)-octa-2,4-dienoyl]-3,5-bis(oxidanylidene)pyrrolidin-2-yl]methyl]-2-oxidanyl-butanoic acid (J3L) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey QTGRXFMVJJTPSQ-IGSUIHLESA-N.
