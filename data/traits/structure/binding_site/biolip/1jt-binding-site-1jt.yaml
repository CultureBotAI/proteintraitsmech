  A structure-derived ligand-binding site at which the ligand 1-(4-methoxy-3-methylbenzyl)-5,6,7,8-tetrahydro-1H-naphtho[2,3-d]imidazole (1JT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey BBFOREFQNPCWBB-UHFFFAOYSA-N.
