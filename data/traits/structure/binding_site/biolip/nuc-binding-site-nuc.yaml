definition: >-
  A structure-derived ligand-binding site at which the ligand (2E)-3-[(7S)-7-amino-8-oxo-6,7,8,9-tetrahydro-5H-pyrido[2,3-b]azepin-3-yl]-N-methyl-N-[(3-methyl-1-benzofuran-2-yl)methyl]prop-2-enamide (NUC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey ZWQNEFFHBSGFHV-HKMNZKMDSA-N.
