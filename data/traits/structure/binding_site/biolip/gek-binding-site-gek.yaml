identifier: proteintraitsmech:BIOLIP_GEK
label: "GEK-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-4-[{[(2S,3S,4R,5R)-5-(6-amino-9H-purin-9-yl)-3,4-dihydroxytetrahydrofuran-2-yl]methyl}(carboxylatomethyl)sulfonio] -2-ammoniobutanoate (GEK) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey VFFTYSZNZJBRBG-HEOPWLPUSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
