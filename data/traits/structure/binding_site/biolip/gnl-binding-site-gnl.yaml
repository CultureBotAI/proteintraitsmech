identifier: proteintraitsmech:BIOLIP_GNL
label: "GNL-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (3aR,5R,6R,7R,7aR)-5-(hydroxymethyl)-2-methyl-5,6,7,7a-tetrahydro-3aH-pyrano[3,2-d][1,3]thiazole-6,7-diol (GNL) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 4 PDB structures; ligand InChIKey DRHXTSWSUAJOJZ-JAJWTYFOSA-N.
