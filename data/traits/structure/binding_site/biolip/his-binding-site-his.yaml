identifier: proteintraitsmech:BIOLIP_HIS
label: "HIS-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand HISTIDINE (HIS) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 47 binding-site occurrences across 36 PDB structures; ligand InChIKey HNDVDQJCIGZPNO-YFKPBYRVSA-O.
