label: "MFU-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand methyl alpha-L-fucopyranoside (MFU) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 33 binding-site occurrences across 9 PDB structures; ligand InChIKey OHWCAVRRXKJCRB-CXNFULCWSA-N.
