identifier: proteintraitsmech:BIOLIP_GTR
label: "GTR-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand beta-D-galactopyranuronic acid (GTR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 11 binding-site occurrences across 9 PDB structures; ligand InChIKey AEMOLEFTQBMNLQ-DTEWXJGMSA-N.
