identifier: proteintraitsmech:BIOLIP_PRP
label: "PRP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1-O-pyrophosphono-5-O-phosphono-alpha-D-ribofuranose (PRP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 18 binding-site occurrences across 17 PDB structures; ligand InChIKey PQGCEDQWHSBAJP-TXICZTDVSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
