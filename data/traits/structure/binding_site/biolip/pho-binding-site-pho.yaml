definition: >-
  A structure-derived ligand-binding site at which the ligand PHEOPHYTIN A (PHO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 49 binding-site occurrences across 19 PDB structures; ligand InChIKey CQIKWXUXPNUNDV-RCBXBCQGSA-N.
