identifier: proteintraitsmech:BIOLIP_ATP
label: "ATP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ADENOSINE-5'-TRIPHOSPHATE (ATP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1041 binding-site occurrences across 735 PDB structures; ligand InChIKey ZKHQWZAMYRWXGA-KQYNXXCUSA-N.
