definition: >-
  A structure-derived ligand-binding site at which the ligand (2S)-3-{[(3R,7S,11S,15S)-3,7,11,15,19-pentamethylicosyl]oxy}-2-{[(2R,6S,10S,14R)-2,6,10,14,18-pentamethylnonadecyl]oxy}propyl dihydrogen phosphate (RHR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 1 PDB structure; ligand InChIKey LOOIOWMHQRRBDQ-UYUJORPFSA-N.
