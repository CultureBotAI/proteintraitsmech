identifier: proteintraitsmech:BIOLIP_FON
label: "FON-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand N-{[4-({[(6R)-2-amino-5-formyl-4-oxo-1,4,5,6,7,8-hexahydropteridin-6-yl]methyl}amino)phenyl]carbonyl}-L-glutamic acid (FON) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 13 binding-site occurrences across 11 PDB structures; ligand InChIKey VVIAGPKUTFNRDU-OLZOCXBDSA-N.
