definition: >-
  A structure-derived ligand-binding site at which the ligand 5-[(2-methyl-5-{[3-(trifluoromethyl)phenyl]carbamoyl}phenyl)amino]pyridine-3-carboxamide (IHZ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SAAYRHKJHDIDPH-UHFFFAOYSA-N.
