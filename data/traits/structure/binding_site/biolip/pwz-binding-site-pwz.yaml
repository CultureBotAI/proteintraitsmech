identifier: proteintraitsmech:BIOLIP_PWZ
label: "PWZ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (5E)-7-{(1R,4S,5S,6R)-5-[(1E,3S)-3-hydroxyoct-1-en-1-yl]-2-oxabicyclo[2.2.1]hept-6-yl}hept-5-enoic acid (PWZ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 1 PDB structure; ligand InChIKey DJKDIKIDYDXHDD-JVCJGEKZSA-N.
