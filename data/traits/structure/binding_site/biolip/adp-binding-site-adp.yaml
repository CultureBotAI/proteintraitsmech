identifier: proteintraitsmech:BIOLIP_ADP
label: "ADP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ADENOSINE-5'-DIPHOSPHATE (ADP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1226 binding-site occurrences across 954 PDB structures; ligand InChIKey XTWYTFMLZFPYCI-KQYNXXCUSA-N.
