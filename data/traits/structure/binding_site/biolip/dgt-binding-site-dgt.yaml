identifier: proteintraitsmech:BIOLIP_DGT
label: "DGT-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2'-DEOXYGUANOSINE-5'-TRIPHOSPHATE (DGT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 31 binding-site occurrences across 16 PDB structures; ligand InChIKey HAAZLUGHYHWQIW-KVQBGUIXSA-N.
