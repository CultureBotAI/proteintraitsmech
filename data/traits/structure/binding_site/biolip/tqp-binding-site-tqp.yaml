identifier: proteintraitsmech:BIOLIP_TQP
label: "TQP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3R,4S,5S,6R)-3,5-dihydroxy-4-{[(1E)-{3-hydroxy-2-methyl-5-[(phosphonooxy)methyl]pyridin-4-yl}methylidene]amino}-6-methyltetrahydro-2H-pyran-2-yl [(2R,3S,5R)-3-hydroxy-5-(5-methyl-2,4-dioxo-3,4-dihydropyrimidin-1(2H)-yl)tetrahydrofuran-2-yl]methyl dihydrogen diphosphate (TQP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 5 binding-site occurrences across 3 PDB structures; ligand InChIKey UJDWKFAFGYHSFM-HMSDFHDVSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
