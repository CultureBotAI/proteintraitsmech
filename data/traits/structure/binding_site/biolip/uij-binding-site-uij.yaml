label: "UIJ-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3R,4R,5S)-2-(hydroxymethyl)-1-(6-{[(4P)-4-(5-methyl-1,2,4-oxadiazol-3-yl)-2-nitrophenyl]amino}hexyl)piperidine-3,4,5-triol (UIJ) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey SXCQSQXLSZADIS-IYWMVGAKSA-N.
