identifier: proteintraitsmech:BIOLIP_OJC
label: "OJC-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2R,3R,3aS,5S,6R,7S,8R,11R,13S,15aR)-2-(6-amino-9H-purin-9-yl)-3,6,7,11,13-pentahydroxyoctahydro-2H,5H,11H,13H-5,8-epoxy-11lambda~5~,13lambda~5~-furo[2,3-g][1,3,5,9,2,4]tetraoxadiphosphacyclotetradecine-11,13-dione (OJC) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 4 binding-site occurrences across 3 PDB structures; ligand InChIKey NDSLKXAJVDJCEG-ZQSHOCFMSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
