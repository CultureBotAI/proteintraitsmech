identifier: proteintraitsmech:BIOLIP_EST
label: "EST-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand ESTRADIOL (EST) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 6 binding-site occurrences across 6 PDB structures; ligand InChIKey VOXZDWNPVJITMN-ZBRFXRBCSA-N.
