definition: >-
  A structure-derived ligand-binding site at which the ligand (8~{S},9~{R},10~{S},11~{S},13~{S},14~{S},16~{S},17~{R})-9-chloranyl-10,13,16-trimethyl-11,17-bis(oxidanyl)-17-(2-oxidanylethanoyl)-6,7,8,11,12,14,15,16-octahydrocyclopenta[a]phenanthren-3-one (GXR) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey NBMKJKDGKREAPL-DVTGEIKXSA-N.
