identifier: proteintraitsmech:BIOLIP_RAM
label: "RAM-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand alpha-L-rhamnopyranose (RAM) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 20 binding-site occurrences across 16 PDB structures; ligand InChIKey SHZGCJCMOBCMKK-HGVZOGFYSA-N.
