label: "KJX-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2S,4aS,4bS,7R,8S,8aS,9R,10aR)-7-[(2R,3R)-7-hydroxy-3,7-dimethyloctan-2-yl]-4a,7,8-trimethyltetradecahydrophenanthrene-2,9-diol (KJX) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey BQMSKLCEWBSPPY-IKVTXIKFSA-N.
