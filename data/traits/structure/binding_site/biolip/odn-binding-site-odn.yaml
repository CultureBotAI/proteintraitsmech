identifier: proteintraitsmech:BIOLIP_ODN
label: "ODN-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1beta,6beta,7beta,8alpha,9beta,10alpha,13alpha,14R,16beta)-1,6,7,14-tetrahydroxy-7,20-epoxykauran-15-one (ODN) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey RWELMBQGCLVKOE-ZJOCIWLNSA-N.
