identifier: proteintraitsmech:BIOLIP_UMP
label: "UMP-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 2'-DEOXYURIDINE 5'-MONOPHOSPHATE (UMP) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 56 binding-site occurrences across 32 PDB structures; ligand InChIKey JSRLJPSBLDHEIO-SHYZEUOFSA-N.
