label: "WTA-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 5'-O-[(S)-ethoxy(hydroxy)phosphoryl]adenosine (WTA) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 3 binding-site occurrences across 3 PDB structures; ligand InChIKey MXYRBUKSSSUFQO-WOUKDFQISA-N.
