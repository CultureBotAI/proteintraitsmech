label: "LLE-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2~{R})-3,3-dimethyl-2-oxidanyl-~{N}-[3-oxidanylidene-3-[2-[(1~{R},4~{Z},6~{Z},8~{Z})-1,5,7,9-tetrakis(oxidanyl)-3,11-bis(oxidanylidene)dodeca-4,6,8-trienyl]sulfanylethylamino]propyl]-4-[tris(oxidanyl)-$l^{5}-phosphanyl]oxy-butanamide (LLE) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey FQZZDEAQTCCCMT-XOXVVNQZSA-N.
