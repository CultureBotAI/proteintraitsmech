identifier: proteintraitsmech:BIOLIP_I7P
label: "I7P-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (1r,2R,3S,4s,5R,6S)-2,3,4,5,6-pentakis(phosphonooxy)cyclohexyl trihydrogen diphosphate (I7P) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 2 binding-site occurrences across 2 PDB structures; ligand InChIKey UPHPWXPNZIOZJL-KXXVROSKSA-N.
definition_source: "BioLiP2 (Yang/Zhang group)"
