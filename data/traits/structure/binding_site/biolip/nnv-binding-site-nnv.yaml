definition: >-
  A structure-derived ligand-binding site at which the ligand (1R,5aS,6R)-1,2,5,5a,6,7-hexahydrophenazine-1,6-dicarboxylic acid (NNV) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey FXTPBWZKMDQSSJ-XLDPMVHQSA-N.
