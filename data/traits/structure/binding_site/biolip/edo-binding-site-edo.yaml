identifier: proteintraitsmech:BIOLIP_EDO
label: "EDO-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand 1,2-ETHANEDIOL (EDO) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 24 binding-site occurrences across 13 PDB structures; ligand InChIKey LYCAIKOWRPUZTN-UHFFFAOYSA-N.
