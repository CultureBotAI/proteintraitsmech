label: "FFT-binding site"
definition: >-
  A structure-derived ligand-binding site at which the ligand (2Z,6Z)-3,7,11-trimethyldodeca-2,6,10-trien-1-yl dihydrogen phosphate (FFT) is bound to a receptor protein chain, defined from 3D protein–ligand complexes. BioLiP2 catalogues this binding site over 1 binding-site occurrence across 1 PDB structure; ligand InChIKey ALEWCKXBHSDCCT-FBXUGWQNSA-N.
