identifier: InterPro:IPR027309
label: "P2X purinoreceptor extracellular domain superfamily"
definition: >-
  P2X purinoceptors are cell membrane ion channels, gated by adenosine 5'-triphosphate (ATP) and other nucleotides. P2X purinoceptor adopts a chalice-shaped, homotrimetric architecture consisting of a large hydrophilic and glycosylated extracellular domain, a transmembrane domain composed of 6 α-helices and short intracellular amino and carboxy termini. This superfamily represents the extracellular domain which is characterised by a transthyretin-like β-sandwich motif. This domain contains binding sites for ATP, competitive antagonists and modulatory metal ions.
