identifier: InterPro:IPR036898
label: "RNA polymerase Rpb7-like, N-terminal domain superfamily"
definition: >-
  The eukaryotic RNA polymerase subunits RPB4 and RPB7 form a heterodimer that reversibly associates with the RNA polymerase II core, being involved in initiation complex formation. Archaeal cells contain a single RNAP made up of about 12 subunits, displaying considerable homology to the eukaryotic RNAPII subunits. The RPB4 and RPB7 homologues are called subunits F and E, respectively, and have been shown to form a stable heterodimer. While the RPB7 homologue is reasonably well conserved, the similarity between the eukaryotic RPB4 and the archaeal F subunit is barely detectable. This entry represents the N-terminal, heterodimerisation domain superfamily of RPB7 and homologues. This domain has a β-α-β(2) fold arranged in two layers (α/β) with antiparallel β-sheet.
