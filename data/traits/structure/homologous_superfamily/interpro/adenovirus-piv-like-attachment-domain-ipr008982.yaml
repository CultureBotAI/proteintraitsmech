identifier: InterPro:IPR008982
label: "Adenovirus pIV-like, attachment domain"
definition: >-
  The viral attachment protein domain forms part of the fibre proteins in adenoviruses, and the sigma 1 protein in reoviruses. Both proteins are trimers that contain fibrous tails and globular heads (reovirus), or knobs (adenovirus), which are structurally very similar. Both domain cores consist of eight anti-parallel β-sheets, forming either a β sandwich (fibre knob), or a β-barrel (sigma 1 head), with a long loop containing an α helix. The remaining loops tend to be longer in the fibre knob. Functionally both the fibre knob and the sigma 1 head are involved in binding selectively to cell surface receptors. The reoviruses bind JAM (junction adhesion molecule), while the adenoviruses use the CAR (Coxsackievirus and adenovirus) receptor, with the exception of subgroup B adenoviruses.
