identifier: InterPro:IPR024090
label: Proline dehydrogenase PutA, domain I
definition: >-
  The PutA flavoprotein from Escherichia coli plays multiple roles in proline catabolism by functioning as a membrane-associated bi-functional enzyme and a transcriptional repressor of proline utilisation genes. This entry represents domain I of PutA.
