identifier: InterPro:IPR036444
label: Phospholipase A2 domain superfamily
definition: >-
  Proteins containing this domain superfamily include eukaryotic and prokaryotic phospholipase A2 enzymes (PLA2; ), small lipolytic enzymes that releases fatty acids from the second carbon group of glycerol, usually in a metal-dependent reaction, to generate lysophospholipid (LysoPL) and a free fatty acid (FA). The resulting products are either dietary or used in synthetic pathways for leukotrienes and prostaglandins. Often, arachidonic acid is released as a free fatty acid and acts as second messenger in signaling networks. These enzymes enable the of fatty acids and lysophospholipid by hydrolysing the 2-ester bond of 1,2-diacyl-3-sn-phosphoglycerides. In eukaryotes, PLA2 plays a pivotal role in the biosynthesis of prostaglandin and other mediators of inflammation. These enzymes are either secreted or cytosolic; the latter are either Ca dependent or Ca independent. Secreted PLA2s have also been found to specifically bind to a variety of soluble and membrane proteins in mammals, including receptors. As a toxin, PLA2 is a potent presynaptic neurotoxin which blocks nerve terminals by binding to the nerve membrane and hydrolyzing stable membrane lipids. The products of the hydrolysis (LysoPL and FA) cannot form bilayers leading to a change in membrane conformation and ultimately to a block in the release of neurotransmitters.
