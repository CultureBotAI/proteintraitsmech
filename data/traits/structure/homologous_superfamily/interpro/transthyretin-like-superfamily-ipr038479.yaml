identifier: InterPro:IPR038479
label: "Transthyretin-like superfamily"
definition: >-
  A series of nematode-specific transthyretin-like proteins have being identified, including transthyretin-like protein TTR-52. TTR-52 mediates recognition of apoptotic cells by the phagocyte receptor CED-1. The function of the others remains unknown.
