identifier: InterPro:IPR016162
label: "Aldehyde dehydrogenase, N-terminal"
definition: >-
  This superfamily represents a structural domain found at the N-terminal of aldehyde dehydrogenases. These proteins contain two similar domains, each with a 3-layer α/β/α structure, which probably arose from a duplication; this entry covers the N-terminal a/b/a domain. These enzymes binds NAD differently from other NAD(P)-dependent oxidoreductases.
