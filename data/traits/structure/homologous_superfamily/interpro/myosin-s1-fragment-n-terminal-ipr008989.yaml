identifier: InterPro:IPR008989
label: Myosin S1 fragment, N-terminal
definition: >-
  Myosin is a molecular motor that undergoes ATP-driven conformational changes during force production and motility. The S1 fragment myosin head consists of both the globular motor domain, containing the ATP-and actin-binding sites, and the lever arm, which amplifies small conformational changes in the motor domain into larger motions by which myosin moves actin. The motor domain contains four major subdomains linked by three single-stranded joints: the N-terminal subdomain, the upper 50kDa subdomain, the lower 50kDa subdomain, and the C-terminal converter subdomain. The N-terminal subdomain has an SH3-like partly opened β barrel topology, with the last strand being interrupted by a 3-10 helical turn. The N-terminal and upper 50kDa subdomains together form the nucleotide-binding pocket. The binding of specific nucleotides alters the structural state of the myosin head during the contractile cycle.
