identifier: InterPro:IPR053735
label: "Type III TA system endoribonuclease"
definition: >-
  This superfamily of proteins includes endoribonucleases that function as toxic components within type III toxin-antitoxin (TA) systems. These proteins typically cleave specific RNA sequences, leading to growth inhibition in a bacteriostatic manner without causing cell lysis. The endoribonuclease activity is neutralized by cognate RNA antitoxins, which are characterized by multiple nearly identical nucleotide repeats that can fold into structures such as pseudoknots to bind and inhibit the toxin. These TA systems are implicated in plasmid maintenance through a plasmid addiction mechanism and can confer resistance to bacteriophages by causing abortive infections. The toxins are capable of self-regulation in complex with their antitoxins and can negatively regulate their own operon expression.
