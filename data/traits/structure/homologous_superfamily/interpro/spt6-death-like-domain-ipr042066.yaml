identifier: InterPro:IPR042066
label: "Spt6, Death-like domain"
definition: >-
  This superfamily represents the death-like domain (DLD) of Spt6 (Suppressor of Ty 6, originally discovered in Saccharomyces cerevisiae), a gene that influences general transcription through manipulation of chromatin structure at upstream promoter elements. This DLD domain maintains the characteristic overall topology of death domains, as it consists of a six-helix bundle with three stacked antiparallel helices and an additional helix inserted between the final two helices of the bundle. The Spt6 DLD prominent location and the observation that it displays the most highly conserved region of the Spt6 surface suggest that it mediates important intermolecular interactions.
