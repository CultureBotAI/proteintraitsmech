label: "Chorismate mutase, AroQ class superfamily, eukaryotic"
definition: >-
  Chorismate mutase (CM) is a regulatory enzyme ( ) required for biosynthesis of the aromatic amino acids phenylalanine and tyrosine. CM catalyzes the Claisen rearrangement of chorismate to prephenate, which can subsequently be converted to precursors of either L-Phe or L-Tyr. In bifunctional enzymes the CM domain can be fused to a prephenate dehydratase (P-protein for Phe biosynthesis), to a prephenate dehydrogenase (T-protein, for Tyr biosynthesis), or to 3-deoxy-D-arabino-heptulosonate 7-phosphate (DAHP) synthase ( ). Besides these prokaryotic bifunctional enzymes, monofunctional CMs occur in prokaryotes as well as in fungi, plants and nematode worms. The type I or AroH class of CM is represented by Bacillus subtilis aroH, a monofunctional, nonallosteric, homotrimeric enzyme characterised by its pseudo-α/β-barrel 3D structure. Each monomer folds into a 5-stranded mixed β-sheet packed against an α-helix and a 3-10 helix. The core is formed by a closed barrel of mixed β-sheets surrounded by helices. The interfaces between adjacent subunits form three equivalent clefts that harbor the active sites. The type II or AroQ class of CM has a completely different all-helical 3D structure, represented by the CM domain of the bifunctional Escherichia coli P-protein. This type is named after the Enterobacter agglomerans monofunctional CM encoded by the aroQ gene. All CM domains from bifunctional enzymes as well as most monofunctional CMs belong to this class, including archaeal CM. Eukaryotic CM from plants and fungi form a separate subclass of AroQ, represented by the Baker's yeast allosteric CM. These enzymes show only partial sequence similarity to the prokaryotic CMs due to insertions of regulatory domains, but the helix-bundle topology and catalytic residues are conserved and…
