identifier: InterPro:IPR027455
label: "Spermine/spermidine acetyltransferase, N-terminal"
definition: >-
  Spermine/spermidine acetyltransferase acetylates both spermidine and spermine at primary propyl amine moieties, with spermine being the preferred substrate. This superfamily represents an helix-hairpin domain found at the N terminus of spermine/spermidine acetyltransferase.
