identifier: InterPro:IPR036584
label: "Flagellar protein FliS superfamily"
definition: >-
  The fliD operon of several bacteria consists of three flagellar genes, fliD, fliS, and fliT, and is transcribed in this order. In Bacillus subtilis the operon encoding the flagellar proteins FliD, FliS, and FliT is sigma D-dependent. FliS is a flagellin-specific T3S chaperone that binds in 1:1 stoichiometry to the C-terminal region of flagellin and facilitates its export, preventing polymerization in the cytoplasm. The fliS gene is necessary for flagellation. In Aeromonas, deletion of this gene (called flaJ) resulted in the complete loss of motility, flagellin expression, and adherence. Structurally, FliS can form closed, open and helix-swapped bundles.
