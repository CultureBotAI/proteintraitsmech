identifier: InterPro:IPR011047
label: "Quinoprotein alcohol dehydrogenase-like superfamily"
definition: >-
  Quinoprotein alcohol dehydrogenases are a family of proteins found in methylotrophic or autotrophic bacteria. These quinoproteins use pyrroloquinoline quinone as their prosthetic group. There are three types of alcohol dehydrogenases: type I includes methanol dehydrogenase and ethanol dehydrogenase; type II includes soluble quinohaemoprotein with a C-terminal containing haem C; and type III includes quinoprotein alcohol dehydrogenase with a C-terminal cytochrome C domain. These quinoproteins contain an 8-bladed β-propeller motif, which is present in the N-terminal domain of quinoprotein alcohol dehydrogenase, ethanol dehydrogenase, and the heavy chain (alpha subunit) of methanol dehydrogenase ( ). This entry represents quinoprotein alcohol dehydrogenases as well as some other proteins that share a similar structure, including WD repeat-containing protein and echinoderm microtubule-associated protein-like proteins.
