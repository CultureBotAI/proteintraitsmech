label: "BVU_3817-like, C-terminal domain superfamily"
definition: >-
  This superfamily represents a domain that is found at the C-terminal of BVU_3817 from Phocaeicola vulgatus ( ) and similar proteins mostly from Bacteroidetes. This domain shows an α/β structure and is usually found associated with . Its function is unknown.
