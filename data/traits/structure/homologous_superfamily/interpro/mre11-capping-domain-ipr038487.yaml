identifier: InterPro:IPR038487
label: "Mre11, capping domain"
definition: >-
  This superfamily represents the Mre11 capping domain. The MRN complex is a multi-subunit nuclease that is composed of Mre11, Rad50 and Nbs1/Xrs2, and is involved in checkpoint signalling, double-strand break (DSB) repair, DNA replication, maintenance of telomere integrity and meiosis, promoting genomic stability. Mre11 has an intrinsic DNA-binding activity that is stimulated by Rad50 on its own or in combination with Nbs1. This protein dimerises via phosphodiesterase domains flanked by an α/β capping domain, which creates a U-shaped particle with a broad DNA/Rad50 binding cleft.
