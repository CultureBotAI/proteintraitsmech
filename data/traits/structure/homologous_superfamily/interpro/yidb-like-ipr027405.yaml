identifier: InterPro:IPR027405
label: YidB-like
definition: >-
  YidB is a bacterial uncharacterised protein found in a number of pathogenic species. The yidB gene of Shigella flexneri and Escherichia coli is located between yidA and gyrB genes which are involved in DNA processing, therefore it might be have functions associated with DNA. The structure of YidB from Shigella flexneri shows distant structural similarity to eukaryotic homeodomain proteins.
