identifier: InterPro:IPR009014
label: "Transketolase C-terminal/Pyruvate-ferredoxin oxidoreductase domain II"
definition: >-
  Transketolase C-terminal-like domains can be found in a number of different enzymes, including the C-terminal domain of the pyruvate dehydrogenase E1 component, the C-terminal domain of branched-chain alpha-keto acid dehydrogenases, and domain II of pyruvate-ferredoxin oxidoreductase (PFOR). Structural studies reveal this domain to comprise of three α/β/α layers. The mixed β-sheet consists of five strands in the order 13245, where strand 1 is antiparallel to the others. This domain has been proposed as a regulatory molecule binding site in transketolase.
