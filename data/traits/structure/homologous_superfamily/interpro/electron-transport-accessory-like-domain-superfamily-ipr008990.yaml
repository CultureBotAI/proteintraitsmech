identifier: InterPro:IPR008990
label: "Electron transport accessory-like domain superfamily"
definition: >-
  The electron transport accessory proteins adopt the β topology of an SH3 domain, with a partly opened β barrel and a 3-10 helical turn interrupting the last strand. Other proteins displaying this topology include R67 dihydrofolate reductase, which catalyses the hydration of nitriles to amides, photosystem I accessory proteins (PsaE), which participate in cyclic electron transport and modulate the interaction of photosystem I with ferrodoxin, the alpha chain of ferrodoxin thioredoxin reductase (FTR), which is involved in the regulation of the activity of chloroplast enzymes, and the beta chain of nitrile hydratase, which confers trimethoprim-resistance to R67-expressing bacteria.
