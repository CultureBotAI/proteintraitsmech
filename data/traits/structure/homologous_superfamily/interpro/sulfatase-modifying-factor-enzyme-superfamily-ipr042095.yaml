label: "Sulfatase-modifying factor enzyme superfamily"
definition: >-
  This superfamily represents a domain found in sulfatase-modifying factors (SUMFs) and Chlamydia serine/threonine-protein kinase pkn1. It is also found in iron(II)-dependent oxidoreductase from Mycobacterium.
