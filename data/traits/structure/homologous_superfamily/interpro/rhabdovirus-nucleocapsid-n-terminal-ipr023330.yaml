identifier: InterPro:IPR023330
label: "Rhabdovirus nucleocapsid, N-terminal"
definition: >-
  All negative-strand RNA viruses contain a ribonucleoprotein (RNP) complex that consists of the viral genome RNA completely enwrapped by the nucleoprotein (N). The crystal structure of the N protein in complex with a single-strand RNA has been determined for two members of the rhabdovirus family, VSV and RABV. The regions in contact with RNA were mapped to a cavity formed between two structural lobes of the nucleoprotein: the N-terminal arm and the extended loop in the C-terminal lobe. This superfamily represents the N-terminal domain.
