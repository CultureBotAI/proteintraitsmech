identifier: InterPro:IPR027461
label: "LD-carboxypeptidase A, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of the LD-carboxypeptidase A. Muramoyl-tetrapeptide carboxypeptidase or LD-carboxypeptidase A hydrolyses a peptide bond between a di-basic amino acid and the C-terminal D-alanine in the tetrapeptide moiety in peptidoglycan. This cleaves the bond between an L- and a D-amino acid. The function of this activity is in murein recycling. Proteins containing this domain also include the microcin c7 self-immunity protein and microcin immunity protein MccF.
