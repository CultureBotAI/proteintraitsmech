identifier: InterPro:IPR053717
label: "Mercury resistance MerB lyase"
definition: >-
  This superfamily of proteins is involved in the detoxification process of organomercurials by breaking the carbon-mercury bond. The enzymatic action results in the release of Hg(2+), which is then further detoxified. The members of this superfamily share a common function in mercury resistance mechanisms across various bacterial species, providing protection against the toxic effects of mercury compounds by converting them into less harmful forms.
