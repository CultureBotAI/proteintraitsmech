identifier: InterPro:IPR016069
label: "Translin, C-terminal"
definition: >-
  Translins are DNA-binding proteins that specifically recognise consensus sequences at the breakpoint junctions in chromosomal translocations, mostly involving immunoglobulin (Ig)/T-cell receptor gene segments. They seem to recognise single-sranded DNA ends generated by staggered breaks occuring at recombination hot spots. Translin folds into an α-α superhelix, consisting of two curved layers of α/α topology. This structure can be divided into two α-bundle subdomains. This entry represents the C-terminal α bundle subdomain.
