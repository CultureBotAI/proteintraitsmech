identifier: InterPro:IPR016153
label: "Heat shock protein Hsp33, N-terminal"
definition: >-
  This superfamily represents the N-terminal, 3-layer β/α/β domain from the heat shock protein Hsp33. Hsp33 is a molecular chaperone, distinguished from all other known chaperones by its mode of functional regulation. Its activity is redox regulated. Hsp33 is a cytoplasmically localised protein with highly reactive cysteines that respond quickly to changes in the redox environment. Oxidizing conditions like H 2 O 2 cause disulphide bonds to form in Hsp33, a process that leads to the activation of its chaperone function.
