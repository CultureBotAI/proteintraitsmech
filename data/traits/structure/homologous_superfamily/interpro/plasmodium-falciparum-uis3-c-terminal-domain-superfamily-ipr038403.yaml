identifier: InterPro:IPR038403
label: "Plasmodium falciparum UIS3, C-terminal domain superfamily"
definition: >-
  UIS3 is a membrane protein essential for sporozoite development in infected hepatocytes. This superfamily corresponds to the 130-229 region of the Plasmodium falciparum UIS3 protein which is compact and has an all α-helical structure. PfUIS3(130-229) interacts with lipids, phospholipid lysosomes, the human liver fatty acid-binding protein and with the lipid phosphatidylethanolamine. The interaction with liver fatty acid-binding protein provides the parasite with a method to import essential fatty acids/lipids during rapid growth phases of sporozoites.
