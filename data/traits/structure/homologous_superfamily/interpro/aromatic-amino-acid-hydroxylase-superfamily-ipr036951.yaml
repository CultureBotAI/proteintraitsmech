identifier: InterPro:IPR036951
label: "Aromatic amino acid hydroxylase superfamily"
definition: >-
  Phenylalanine, tyrosine and tryptophan hydroxylases constitute a superfamily of tetrahydrobiopterin-dependent aromatic amino acid hydroxylases, all of which are rate-limiting catalysts for important metabolic pathways. The proteins are structurally and functionally related, each containing iron, and catalysing ring hydroxylation of aromatic amino acids, using tetra-hydrobiopterin (BH4) as a substrate. All are regulated by phosphorylation at serines in their N-termini. It has been suggested that the proteins each contain a conserved C-terminal catalytic (C) domain and an unrelated N-terminal regulatory (R) domain. It is possible that the R domains arose from genes that were recruited from different sources to combine with the common gene for the catalytic core. Thus, by combining with the same C domain, the proteins acquired the unique regulatory properties of the separate R domains. A variety of enzymes belong to this superfamily that includes, phenylalanine-4-hydroxylase from Chromobacterium violaceum where it is copper-dependent; it is iron-dependent in Pseudomonas aeruginosa, phenylalanine-4-hydroxylase catalyzes the conversion of phenylalanine to tyrosine. In humans, deficiencies are the cause of phenylketonuria, the most common inborn error of amino acid metabolism, tryptophan 5-hydroxylase catalyzes the rate-limiting step in serotonin biosynthesis: the conversion of tryptophan to 3-hydroxy-anthranilate and tyrosine 3-hydroxylase catalyzes the rate limiting step in catecholamine biosynthesis: the conversion of tyrosine to 3,4-dihydroxy-L-phenylalanine.
