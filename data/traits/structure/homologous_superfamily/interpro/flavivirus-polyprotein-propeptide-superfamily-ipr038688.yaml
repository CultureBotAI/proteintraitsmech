identifier: InterPro:IPR038688
label: "Flavivirus polyprotein propeptide superfamily"
definition: >-
  The Flaviviruses are small enveloped animal viruses containing a single positive strand genomic RNA. The genome encodes one large ORF, a polyprotein which undergos proteolytic cleavage of the precursor membrane protein (prM), turning inert virus into infectious particles. This entry consists of a propeptide region of approximately 90 amino acids in length.
