identifier: InterPro:IPR042540
label: "Viral matrix protein, N-terminal domain"
definition: >-
  The matrix protein plays a crucial role in virus assembly, and interacts with the RNP complex as well as with the viral membrane. It is found in Morbillivirus, Paramyxovirus, Pneumovirus. Viral matrix proteins are built of two domains that have similar β-sandwich folds, N-terminal and C-terminal respectively, suggesting a gene duplication during evolution. This superfamily represents the N-terminal domain of the viral matrix protein.
