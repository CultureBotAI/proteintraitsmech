identifier: InterPro:IPR038609
label: "HDA1 complex subunit 2/3 superfamily"
definition: >-
  Hda2/3 associate with Hda1 to generate the activity of the Hda1 histone deacetylase complex. Hda1 interacts with itself and with the Hda2-Hda3 subcomplex to form a probable tetramer and these interactions are necessary for catalytic activity. The Hda1 histone deacetylase complex is responsible for the deacetylation of lysine residues on the N-terminal part of the core histones (H2A, H2B, H3 and H4). Histone deacetylation gives a tag for epigenetic repression and plays an important role in transcriptional regulation, cell cycle progression and developmental events. Hda2 and Hda3 have a conserved coiled-coil domain towards their C terminus.
