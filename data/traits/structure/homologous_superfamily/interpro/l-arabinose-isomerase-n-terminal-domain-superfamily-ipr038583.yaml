identifier: InterPro:IPR038583
label: "L-arabinose isomerase, N-terminal domain superfamily"
definition: >-
  This entry includes L-arabinose isomerases, AraA, ( ). These enzymes catalyse the reaction: L-arabinose => L-ribulose. This reaction is the first step in the pathway of L-arabinose utilisation as a carbon source after entering the cell L-arabinose is converted into L-ribulose by the L-arabinose isomerases enzyme.
