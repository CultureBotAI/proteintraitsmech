identifier: InterPro:IPR028345
label: "Aminoglycoside 3-N-acetyltransferase-like"
definition: >-
  This α/β/α domain is found in aminoglycoside 3-N-acetyltransferases, an enzyme that can use a range of antibiotics with 2-deoxystreptamine rings as acceptor for its acetyltransferase activity, inactivating them. It confers resistance to gentamicin, kanamycin, tobramycin, neomycin and apramycin amongst others. This domain is also found in uncharacterised UPF0340 proteins, including TTHA0583 ( ) from Thermus thermophilus.
