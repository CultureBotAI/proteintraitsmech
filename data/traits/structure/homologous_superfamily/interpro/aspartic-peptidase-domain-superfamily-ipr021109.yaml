identifier: InterPro:IPR021109
label: "Aspartic peptidase domain superfamily"
definition: >-
  This domain superfamily is found in aspartic peptidases, including pepsin A and other peptidase A1 family members, the yeast DNA-damage inducible protein 1 (Ddi1) (MEROPS peptidase subfamily A28A), animal retroviral-like aspartic protease (SASPase; MEROPS peptidase subfamily A28B) and Caulobacter PerP peptidase (MEROPS peptidase family A32). The tertiary structure shows a retropepsin-like fold and the peptidase is active as a homodimer. Aspartic peptidases, also known as aspartyl proteases ([ec:3.4.23.-]), are widely distributed proteolytic enzymes known to exist in vertebrates, fungi, plants, protozoa, bacteria, archaea, retroviruses and some plant viruses. All known aspartic peptidases are endopeptidases. A water molecule, activated by two aspartic acid residues, acts as the nucleophile in catalysis. Aspartic peptidases can be grouped into five clans, each of which shows a unique structural fold. Peptidases in clan AA are either bilobed (family A1 or the pepsin family) or are a homodimer (all other families in the clan, including retropepsin from HIV-1/AIDS). Each lobe consists of a single domain with a closed β-barrel and each lobe contributes one Asp to form the active site. Most peptidases in the clan are inhibited by the naturally occurring small-molecule inhibitor pepstatin. Clan AC contains the single family A8: the signal peptidase 2 family. Members of the family are found in all bacteria. Signal peptidase 2 processes the premurein precursor, removing the signal peptide. The peptidase has four transmembrane domains and the active site is on the periplasmic side of the cell membrane. Cleavage occurs on the amino side of a cysteine where the thiol group has been substituted by a diacylglyceryl group. Site-directed mutagenesis has identified two essential asparti…
