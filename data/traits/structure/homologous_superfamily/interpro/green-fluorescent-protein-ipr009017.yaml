identifier: InterPro:IPR009017
label: "Green fluorescent protein"
definition: >-
  The green fluorescent-like protein family consists of fluorescent proteins and non-fluorescent chromoproteins, derived from several species of Cnidarians, as well as certain diazotrophic bacteria. These proteins range in their absorption wavelength maximum, and are often classified by their colour: green, yellow, red and purple-blue. These colour differences arise from changes in the structure of the chromophore, which is generated internally by auto-catalysis. The chromophore comprises Ser65-Tyr66-Gly67 in Aequorea victoria (Jellyfish), which forms a five-member ring after its modification. In the bioluminescent organism A. victoria, GFP acts to transform the blue light emitted from aequorin into green light. However, most organisms with GFP-like molecules are not bioluminescent, and in some cases are not even fluorescent. These proteins all display a β-can structure, which surrounds the chromophore and acts to shield it against quenching agents.
