identifier: InterPro:IPR044891
label: "Histone chaperone Rtt106, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal domain of Rtt106 from Saccharomyces cerevisiae. Rtt106 is a histone chaperone that contributes to the deposition of newly synthesized acetylated Histone 3 Lysine 56 (H3K56ac) carrying H3-H4 complex on replicating DNA. The N-terminal domain of Rtt106 homodimerizes and interacts with H3-H4 independently of acetylation.
