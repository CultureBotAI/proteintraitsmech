identifier: InterPro:IPR038326
label: "Interferon lambda superfamily"
definition: >-
  This entry represents the Interferon (IFN)-lambda proteins which belong to the new type III IFN group. In contrast to type I or type II IFNs, the response to type III IFN is cell-type specific. Only epithelial-like cells and some immune cells respond to IFN-lambda. In human,four distinct proteins called IFN-lambda1 (interleukin-29, IL-29), IFN-lambda2 (IL-28A), IFN_lambda3 (IL-28B) and IFNL4 have been identified. IFN-lambda proteins activate IFN-stimulated gene factor 3 (ISGF3), and are capable of inducing antiviral protection and MHC class I antigen expression.
