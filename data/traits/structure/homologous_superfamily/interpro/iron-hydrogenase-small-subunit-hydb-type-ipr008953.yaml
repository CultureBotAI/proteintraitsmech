identifier: InterPro:IPR008953
label: "Iron hydrogenase, small subunit HydB-type"
definition: >-
  Many microorganisms, such as methanogenic, acetogenic, nitrogen-fixing, photosynthetic, or sulphate-reducing bacteria, metabolise hydrogen. Hydrogen activation is mediated by a family of enzymes, termed hydrogenases, which either provide these organisms with reducing power from hydrogen oxidation, or act as electron sinks. There are two hydrogenases families that differ functionally from each other: NiFe hydrogenases tend to be more involved in hydrogen oxidation, while Iron-only FeFe (Fe only) hydrogenases in hydrogen production. The localisation of iron hydrogenases can be cytoplasmic or periplasmic. Periplasmic iron hydrogenases in Desulfovibrio consists of a large subunit (HydA) and a small subunit (HydB).
