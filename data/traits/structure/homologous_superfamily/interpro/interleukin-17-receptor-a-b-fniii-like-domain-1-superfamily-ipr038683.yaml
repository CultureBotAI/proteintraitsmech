identifier: InterPro:IPR038683
label: "Interleukin-17 receptor A/B, FnIII-like domain 1 superfamily"
definition: >-
  The five IL-17 receptors (IL17RA-IL17RE) exhibit considerable sequence divergence between one another, but all appear to contain extracellular domains composed of fibronectin type-III (FnIII) domains, and cytoplasmic SEF/IL-17R (SEFIR) domains that show loose homology to Toll/IL-1R (TLR) domains. This is the first of two fibronectin-type domains on interleukin-17 receptor proteins A and B located at the N-terminal. These two fibronectin-type domains are linked and together bind two molecules of IL-17 at one of its receptor-binding interfaces. This allows the other interface to bind to another receptor, thus allowing the IL-17 family of homodimeric cytokines to coordinate two different receptors.
