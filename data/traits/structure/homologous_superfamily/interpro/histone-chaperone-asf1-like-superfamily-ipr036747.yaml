identifier: InterPro:IPR036747
label: "Histone chaperone ASF1-like superfamily"
definition: >-
  This family includes the yeast and human ASF1 protein. These proteins have histone chaperone activity. ASF1 participates in both the replication-dependent and replication-independent pathways. The structure three-dimensional has been determined as a compact immunoglobulin-like β-sandwich fold topped by three helical linkers.
