identifier: InterPro:IPR008954
label: "Moesin tail domain superfamily"
definition: >-
  The ezrin-radixin-moesin (ERM) protein family link actin filaments of cell surface structures to the plasma membrane, using a C-terminal F-actin binding segment and an N-terminal FERM domain, a common membrane binding module. ERM proteins are highly related members of the larger protein 4.1 superfamily. The sole Drosophila ERM protein, Moesin, functions in maintaining epithelial integrity by regulating cell-signalling events that affect actin organisation and polarity. This superfamily represents the actin-binding tail domain of ERM proteins.
