identifier: InterPro:IPR011324
label: "Cytotoxic necrotizing factor-like, catalytic"
definition: >-
  This entry represents the catalytic domain from several bacterial cytotoxic necrotizing factor proteins and the related dermonecrotic toxin (DNT) from Bordetella species. Cytotoxic necrotizing factor 1 (CNF1) is a toxin which in Escherichia coli forms a 4-layer α/β/β/α structure containing mixed β-sheets. CNF1 is expressed in strains of E. coli causing uropathogenic and neonatal meningitis. It alters the host cell actin cytoskeleton and promotes bacterial invasion of the blood-brain barrier endothelial cells. CNF1 belongs to a unique group of large cytotoxins that cause constitutive activation of Rho guanosine triphosphatases (GTPases), which are key regulators of the actin cytoskeleton. Bordetella dermonecrotic toxin (DNT) stimulates the assembly of actin stress fibres and focal adhesions by deamidating or polyaminating Gln63 of the small GTPase Rho. DNT is an A-B toxin composed of an N-terminal receptor-binding (B) domain and a C-terminal enzymatically active (A) domain. A similar structural motif can be found in several hypothetical proteins, including YfiH from Shigella flexneri, YlmD from Bacillus stearothermophilus, NMB0706 from Neisseria meningitidis serogroup B and CC0490 from Caulobacter crescentus.
