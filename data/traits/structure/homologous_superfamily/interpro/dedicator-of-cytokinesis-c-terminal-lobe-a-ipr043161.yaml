identifier: InterPro:IPR043161
label: "Dedicator of cytokinesis, C-terminal, lobe A"
definition: >-
  DOCK (dedicator of cytokinesis) proteins are potential guanine nucleotide exchange factors that activate some small GTPases, such as Rac, by exchanging bound GDP for free GTP. DOCK proteins are required during several cellular processes, such as cell motility and phagocytosis. Nucleotide exchange is catalysed by a conserved catalytic DHR2 domain situated within the C-terminal region which consists of three lobes. This entry represents lobe A of DHR2 which adopts a tetratricopeptide repeat-like fold of six antiparallel α-helices.
