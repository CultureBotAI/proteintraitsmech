identifier: InterPro:IPR038382
label: "Ste5, Fus3-binding domain superfamily"
definition: >-
  The Saccharomyces cerevisiae pheromone response pathway involves a cascade of 3 MAP kinases Ste11, Ste7, and Fus3. Ste5 is the prototypical scaffold protein involved in the coordination of the yeast mating mitogen-activated protein kinase (MAPK) response by binding to all three components of the MAPK cascade (Ste11, Ste7 and Fus3) and serving as a required co-activator of the mating-specific MAPK, Fus3. This entry represents the C-terminal Fus3-binding domain of Ste5, also known as the minimal scaffold domain. It acts as a co-catalyst, binding Fus3 and promoting its phosphorylation by Ste7. In the absence of this domain, Fus3 is an extremely poor substrate for Ste7. The requirement for both Ste7 and this domain in Fus3 activation ensures that Fus3 is selectively activated by the mating pathway and not by other pathways that also utilise Ste7.
