identifier: InterPro:IPR036059
label: "Metalloprotease TldD/PmbA superfamily"
definition: >-
  This entry represents a group of metalloproteases including TdlD and PmbA (also known as TldE). The tertiary structure of the Escherichia coli TldD/TldE complex has been solved, and shows that the TldD subunit is the active peptidase, binding a single zinc ion at an HEXXXH motif in which the glutamic acid is a substrate-binding residue and the two histidines are zinc ligands. The third zinc ligand is a cysteine, C-terminal to the HEXXXH motif. TldE by itself has no catalytic activity, does not bind zinc, and does not carry the HEXXXH motif. TldD and TldE were originally identified as regulators of DNA gyrase. Later, they are shown to be metalloproteases involved in CcdA degradation. The structure of TldE/TldD consists of two different α+β domains. The first one is a duplication of an α-β(3)-α motif with two layers (α/β) with an antiparallel β-sheet. While the second one has a complex fold with a β-barrel.
