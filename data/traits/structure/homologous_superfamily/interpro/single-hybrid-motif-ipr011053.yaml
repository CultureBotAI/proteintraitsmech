identifier: InterPro:IPR011053
label: "Single hybrid motif"
definition: >-
  The single hybrid motif has a β-barrel sandwich hybrid fold, consisting of a sandwich of half-barrel shaped β-sheets. This motif is found in biotinyl/lipoyl-carrier proteins and domains, where the biotin and lipoic acid moieties act as covalently attached coenzyme cofactors in enzymes that catalyse metabolic reactions. For example, this motif can be found in the biotinyl domain of Escherichia coli acetyl-CoA carboxylase, protein H of the glycine cleavage system in Pisum sativum (Garden pea), the ipoyl domain of dihydrolipoamide acetyltransferase, which is a component of the pyruvate dehydrogenase complex, the lipoyl domain of the 2-oxoglutarate dehydrogenase complex, and the lipoyl domain f the mitochondrial branched-chain alpha-ketoacid dehydrogenase.
