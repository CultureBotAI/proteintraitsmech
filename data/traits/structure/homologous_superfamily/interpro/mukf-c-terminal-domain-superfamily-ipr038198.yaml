identifier: InterPro:IPR038198
label: "MukF, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of MukF. MukF is involved in chromosome condensation, segregation and cell cycle progression. MukE along with MukF interact with MukB in vivo forming a complex, which is required for chromosome condensation and segregation in Escherichia coli. The Muk complex appears to be similar to the SMC-ScpA-ScpB complex in other prokaryotes where MukB is the homologue of SMC. The C-terminal domain of MukF is thought to bind to MukE and MukB. This domain comprises three α helices and two β strands, arranged into a winged-helix motif.
