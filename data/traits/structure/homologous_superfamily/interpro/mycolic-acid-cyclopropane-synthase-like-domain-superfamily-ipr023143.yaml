identifier: InterPro:IPR023143
label: "Mycolic acid cyclopropane synthase-like domain superfamily"
definition: >-
  Some bacteria synthesise betaine from glycine by a three-step methylation process. The first enzyme, glycine/sarcosine N-methyltransferase, leads to the formation of either sarcosine or N,N-dimethylglycine, which is further methylated to yield betaine (N,N,N-trimethylglycine) by the action of sarcosine/dimethylglycine N-methyltransferase. Both of these enzymes can catalyse the formation of N,N-dimethylglycine from sarcosine. This superfamily represents a helix hairpin domain found in several putative sarcosine-dimethylglycine methyltransferases.
