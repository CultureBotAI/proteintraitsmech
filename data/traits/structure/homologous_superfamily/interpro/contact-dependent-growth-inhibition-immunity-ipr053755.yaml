identifier: InterPro:IPR053755
label: "Contact-dependent growth inhibition immunity"
definition: >-
  This superfamily of proteins encompasses immunity components within toxin-immunity modules, specifically functioning in contact-dependent growth inhibition (CDI) systems. These systems are utilized by bacteria to interact with and suppress the proliferation of closely related bacteria through direct contact. Members of this superfamily confer protection to bacterial cells by neutralizing the ribonuclease activity of cognate toxin proteins that target the 16S rRNA. However, they do not provide immunity against non-cognate toxins with similar ribonuclease activity from different bacterial strains.
