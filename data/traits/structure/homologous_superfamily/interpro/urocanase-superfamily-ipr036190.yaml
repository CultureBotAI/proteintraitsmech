identifier: InterPro:IPR036190
label: "Urocanase superfamily"
definition: >-
  Urocanase (also known as imidazolonepropionate hydrolase or urocanate hydratase) is the enzyme that catalyses the second step in the degradation of histidine, the hydration of urocanate into imidazolonepropionate: urocanate + H 2 O = 4,5-dihydro-4-oxo-5-imidazolepropanoate Urocanase is found in some bacteria (gene hutU), in the liver of many vertebrates, and has also been found in the plant Trifolium repens (white clover). Urocanase is a protein of about 60 Kd, it binds tightly to NAD + and uses it as an electrophil cofactor. A conserved cysteine has been found to be important for the catalytic mechanism and could be involved in the binding of the NAD + . This enzyme is a symmetric homodimer with tightly bound NAD+ cofactors. Each subunit consists of a typical NAD-binding domain inserted into a larger core domain that forms the dimer interface. This entry also includes S-methyl thiourocanate hydratase which cannot use urocanate or thiourocanate as substrate and catalyses the conversion of S-methyl thiourocanate, to S-methyl-thiohydantoin-5-propanoate.
