identifier: InterPro:IPR042216
label: "MitoNEET, CDGSH iron-sulfur domain"
definition: >-
  CDGSH iron-sulfur domains (CISDs) are classified into seven major types and are widely distributed throughout the three domains of life. This superfamily represents the C-terminal domain found in the human CISD protein mitoNEET, also designated CSD1, an iron-containing integral protein of the outer mitochondrial membrane (OMM). MitoNEET contains two domains: a β-cap region and a cluster-binding domain, containing the CDGSH motif, that coordinates two acid-labile 2Fe-2S clusters (one bound to each protomer). The CDGSH iron-sulphur domain is oriented towards the cytoplasm and is tethered to the mitochondrial membrane by a more N-terminal domain found in higher vertebrates. The whole protein regulates oxidative capacity and might be involved in electron transfer.
