identifier: InterPro:IPR037226
label: "CAC2185-like superfamily"
definition: >-
  This protein has no known function. It is found in various hypothetical and putative bacterial proteins. Structurally, it consists of two non-similar domains, each one composed of three layers (α/β/α). The first domain has parallel sheet of four strands, while the second domain has parallel sheet of five strands and antiparallel meander sheet of three strands.
