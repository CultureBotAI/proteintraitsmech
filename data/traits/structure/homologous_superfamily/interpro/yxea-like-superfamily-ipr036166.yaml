identifier: InterPro:IPR036166
label: "YxeA-like superfamily"
definition: >-
  This entry represents a superfamily of small (about 115 amino acids) uncharacterised proteins with N-terminal signal sequences, found predominantly in Gram-positive organisms. Most genomes that have any members of this family have at least two members. This entry includes YxeA from Bacillus subtilis, which is transcriptionally regulated by YxdJ.
