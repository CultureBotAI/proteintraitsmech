identifier: InterPro:IPR011071
label: "Polysaccharide lyase family 8-like, C-terminal"
definition: >-
  Proteins containing this C-terminal domain consist of a group of secreted bacterial lyase enzymes capable of acting on a variety of substrates. One such enzyme is hyaluronate lyase, a Streptococcal surface enzyme that degrades hyaluronan and chondroitin, thereby helping to spread the bacteria throughout host tissues. Hyaluronate lyase ( ) is a four-domain enzyme containing an N-terminal carbohydrate-binding domain, a spacer domain, a catalytic domain, and a C-terminal domain that modulates access to the catalytic cleft of the enzyme. The C-terminal domain has a β sandwich fold consisting of 10 strands in two sheets. Other bacterial enzymes that display this structure include the C-terminal domain of chondroitin AC lyase ( ), the C-terminal domain of chondroitin ABC lyase ( ), and the C-terminal domain of xanthan lyase ( ). This entry represents the C-terminal domain of hyaluronate lyase, chondroitin AC lyase, chondroitin ABC lyase and xanthan lyase.
