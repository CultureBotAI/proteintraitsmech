identifier: InterPro:IPR038099
label: "BldD-like, C-terminal domain superfamily"
definition: >-
  The Streptomyces transcription factor BldD represses the transcription of ~170 sporulation genes during vegetative growth. It binds and is regulated by the second messenger 3',5'-cyclic diguanylic acid (c-di-GMP). This entry represents the C-terminal domain of BldD from Streptomyces venezuelae ( ) and similar proteins found in Actinobacteria. This domain shows two β-α-α repeats and a short C-terminal helix. It is responsible for the binding of the protein to the second messenger 3',5'-cyclic diguanylic acid (c-di-GMP).
