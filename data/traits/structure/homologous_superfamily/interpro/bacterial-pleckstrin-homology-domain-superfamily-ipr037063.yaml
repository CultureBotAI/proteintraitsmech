label: "Bacterial Pleckstrin homology domain superfamily"
definition: >-
  This domain superfamily can be found in many bacterial hypothetical proteins. The structures of , PDB:3hsa, and , PDB:3dcx, show similarities to the PH or pleckstrin homology domain. First evidence of PH-like domains in bacteria suggests role in cell envelope stress response.
