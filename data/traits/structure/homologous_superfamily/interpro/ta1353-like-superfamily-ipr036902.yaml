identifier: InterPro:IPR036902
label: "Ta1353-like superfamily"
definition: >-
  The structure of a member of this superfamily from the hyperthermophilic archaeon Pyrobaculum aerophilum contains a modified histidine residue which is interpreted as stable phosphorylation. In vitro binding studies confirmed that adenosine and AMP but not ADP or ATP bind to the protein. The core structure of this domain is composed of β-α-β(2)-α-β-α-β fold arranged in three layers (α/β/α) with antiparallel β-sheet of five strands.
