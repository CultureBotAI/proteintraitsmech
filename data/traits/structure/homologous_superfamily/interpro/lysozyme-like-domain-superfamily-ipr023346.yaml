identifier: InterPro:IPR023346
label: "Lysozyme-like domain superfamily"
definition: >-
  This entry represents a lysozyme-like domain superfamily found in glycosyl hydrolases and transglycosylases. Biosynthetic peptidoglycan transglycosylases are peptidoglycan polymerases that catalyse glycan chain elongation from lipid-linked precursors.
