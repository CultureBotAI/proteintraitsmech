identifier: InterPro:IPR011052
label: "Proteinase/amylase inhibitor domain superfamily"
definition: >-
  This superfamily includes inhibitors of proteinases and amylases, such as trypsin inhibitors ( ), carboxypeptidase A inhibitors ( ), and alpha-amylase inhibitors (AAI). The proteins display a knottins-like (small inhibitors, toxins, lectins) disulphide-bound fold, containing a β-hairpin with two adjacent disulphides.
