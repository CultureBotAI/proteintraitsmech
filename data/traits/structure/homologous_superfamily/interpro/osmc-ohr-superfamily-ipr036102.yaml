identifier: InterPro:IPR036102
label: "OsmC/Ohr superfamily"
definition: >-
  This superfamily of peroxiredoxins includes osmotically inducible protein C (OsmC), a stress-induced protein found in Escherichia coli. This superfamily also contains organic hydroperoxide resistance protein (Ohr), that has a novel pattern of oxidative stress regulation. The transcription of the osmC gene of E. coli is regulated as a function of the phase of growth and is induced during the late exponential phase when the growth rate slows before entry into stationary phase. The transcription is initiated by two overlapping promoters, osmCp1 and osmCp2. Ohr from Xanthomonas campestris pv. phaseoli is highly induced by organic hydroperoxides, weakly induced by H2O2, and not induced at all by a superoxide generator. OHR may be a new type of organic hydroperoxide detoxification protein. The structure of OsmC present a swapped dimer of β(3)-α-β(2)-α(2)-β subunits fold with mixed β-sheet and buried helix.
