identifier: InterPro:IPR036528
label: Cloacin immunity protein superfamily
definition: >-
  The cloacin immunity protein complexes with cloacin in equimolar quantities and inhibits it by binding with high affinity to the cloacin C-terminal catalytic domain. The immunity protein is relatively small, containing 85 amino acids. An extra ribosome binding site has been found to precede the immunity gene on the polycistronic Clo DF13 mRNA, which perhaps accounts for the fact that, in cloacinogenic cells, more immunity protein than cloacin is synthesised. Comparison of the complete amino acid sequence of the Clo DF13 immunity protein with that of the Col E3 and Col E6 immunity proteins reveals extensive similarities in primary structure, although Col E3 and Clo DF13 immunity proteins are exchangeable only to a low extent in vivo and in vitro. The cloacin structure has a β(2)-α-β(2) fold with antiparallel β-sheet.
