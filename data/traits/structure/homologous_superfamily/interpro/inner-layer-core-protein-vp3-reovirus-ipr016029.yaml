identifier: InterPro:IPR016029
label: "Inner layer core protein VP3, Reovirus"
definition: >-
  This entry represents the inner layer core protein VP3 from various Reoviruses, including Orbiviruses and Phytoreviruses, Reoviruses have dsRNA genomes of 10-12 linear segments. VP3 proteins and their homologues are found in the Orbiviruses Epizootic hemorrhagic disease virus and Bluetongue virus (BTV), while the homologous VP2 protein is found in Broadhaven virus (BRD). VP3 proteins are also found in Phytoreviruses such as Rice dwarf virus (RDV). The inner layer protein VP3 is part of the virus core and makes a 'subcore' shell made up of 120 copies of the 100K protein. VP3 particles can also bind RNA and are fundamental in the early stages of viral core formation. VP3 is a large protein without apparent domain divisions, but has a number of all-alpha regions and one all-beta region near the C-terminal.
