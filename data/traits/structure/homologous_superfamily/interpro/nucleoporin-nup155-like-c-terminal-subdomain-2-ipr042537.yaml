identifier: InterPro:IPR042537
label: "Nucleoporin, Nup155-like, C-terminal, subdomain 2"
definition: >-
  Nucleoporins are the main components of the nuclear pore complex (NPC) in eukaryotic cells, and mediate bidirectional nucleocytoplasmic transport, especially of mRNA and proteins. RNA undergoing nuclear export first encounters the basket of the nuclear pore and many nucleoporins are accessible on the basket side of the pore. The S. Cerevisiae Nup-170, equivalent to the human Nup-155, contains two structural domains: an N-terminal β-propeller and a C-terminal α-helical domain. This superfamily represents the subdomain 2 of the C-terminal region found in nucleoporins Nup-155.
