identifier: InterPro:IPR036882
label: "Alba-like domain superfamily"
definition: >-
  This entry represents the β-α-β-α-β-β fold found in Alba proteins, which are archaeal and eukaryotic DNA- or RNA-binding proteins involved in RNA metabolism and have the function of a chromosomal protein in some archaea. This fold is similar to the folds of DNase I and the C-terminal domain of the translation initiation factor IF3. This fold can also be found in eukaryotic RNase P/RNase MRP components Pop6 and Pop7.
