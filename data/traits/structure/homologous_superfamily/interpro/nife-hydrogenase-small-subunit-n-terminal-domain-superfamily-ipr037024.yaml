identifier: InterPro:IPR037024
label: "[NiFe]-hydrogenase, small subunit, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal domain superfamily of periplasmic [NiFe] hydrogenase small subunit, hydrogenase-1 small chain and uptake hydrogenase small subunit. Hydrogenases catalyse the reversible oxidation of molecular hydrogen and play a vital role in anaerobic metabolism. Metal-containing hydrogenases are subdivided into three classes: Fe ('iron only') hydrogenases; Ni-Fe hydrogenases; and Ni-Fe-Se hydrogenases. Hydrogen oxidation is coupled to the reduction of electron acceptors (such as oxygen, nitrate, sulphate, carbon dioxide and fumarate), whereas proton reduction (hydrogen evolution) is essential in pyruvate fermentation or in the disposal of excess electrons. The Ni-Fe hydrogenases, when isolated, are found to catalyse both hydrogen evolution and uptake, with low-potential multihaem cytochromes, such as cytochrome c3, acting as either electron donors or acceptors, depending on their oxidation state. Both periplasmic (soluble) and membrane-bound hydrogenases are known. The Ni-Fe hydrogenases are heterodimeric proteins consisting of small (S) and large (L) subunits. The small subunit contains three iron-sulphur clusters (two [4Fe-4S] and one [3Fe-4S]); the large subunit contains a nickel ion. Small subunits of membrane-bound Ni-Fe hydrogenases contain a C-terminal domain of about 40 residues that is absent in periplasmic forms.
