identifier: InterPro:IPR038143
label: "NigD-like, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal β-sandwich domain of NigD1 (BT_4005) from Bacteroides thetaiotaomicron and related proteins. NigD1 is a protein encoded adjacent to genes required for biosynthesis and regulation of lipopolysaccharides (LPS) and phospholipids. This protein was shown to be involved in controlling outer membrane vesicles (OMV) production and act as a molecular switch for OMV biogenesis. NigD1 controls, via currently unknown mechanisms, the amount of LPS, proteins, and lipids allocated to OMVs.
