identifier: InterPro:IPR035069
label: "Antitoxin HicB/UPF0150"
definition: >-
  This entry includes Antitoxin HicB from Escherichia coli and similar proteins. It also includes Shufflon-specific DNA recombinase found in bacteria. HicB is an antitoxin component of a type II toxin-antitoxin (TA) system. It functions as an mRNA interferase antitoxin. Its overexpression prevents HicA-mediated cessation of cell growth and inhibition of cell proliferation. This entry also includes uncharacterised members of the UPF0150 family such as TTHA0281. TTHA0281 is a hypothetical protein from Thermus thermophilus HB8. The TTHA0281 monomer adopts an α-β-β-β-α fold and forms a homotetramer. Based on the properties and functions of structural homologues of the TTHA0281 monomer, such as the HicB protein from the HicAB cassette toxin antitoxin system, the TTHA0281 protein is speculated to be involved in RNA metabolism, including RNA binding and cleavage. TTHA1013 is annotated as a hypothetical protein from Thermus thermophilus HB8. The overall fold of this protein consists of one α-helix and four β-strands.
