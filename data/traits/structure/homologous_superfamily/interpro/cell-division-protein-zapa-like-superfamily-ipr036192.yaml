identifier: InterPro:IPR036192
label: "Cell division protein ZapA-like superfamily"
definition: >-
  This entry represents a structural domain found in the cell division protein ZapA, as well as in related proteins. This domain has a core structure consisting of two layers alpha/beta, and has a long C-terminal helix that forms dimeric parallel and tetrameric antiparallel coiled coils. ZapA interacts with FtsZ, where FtsZ is part of a mid-cell cytokinetic structure termed the Z-ring that recruits a hierarchy of fission related proteins early in the bacterial cell cycle. ZapA drives the polymerisation and filament bundling of FtsZ, thereby contributing to the spatio-temporal tuning of the Z-ring. The ZapA structure has a β(2)-α(2) fold with two layers (alpha/beta). It has a long C-terminal helix which forms dimeric parallel and tetrameric antiparallel coiled coils.
