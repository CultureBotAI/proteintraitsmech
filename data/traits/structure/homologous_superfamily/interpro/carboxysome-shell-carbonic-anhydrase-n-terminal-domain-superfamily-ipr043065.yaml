identifier: InterPro:IPR043065
label: "Carboxysome shell carbonic anhydrase, N-terminal domain superfamily"
definition: >-
  Carboxysome Shell Carbonic Anhydrase (Csos3) is a bacterial carbonic anhydrase localised in the carboxysome, where it converts bicarbonate ions to carbon dioxide for use in carbon fixation. The superfamily represents one of the three domains of Csos3, the N-terminal domain, composed primarily of four α-helices.
