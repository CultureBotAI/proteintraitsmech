identifier: InterPro:IPR034804
label: Fumarate reductase/succinate dehydrogenase, transmembrane subunit
definition: >-
  Fumarate reductase couples the reduction of fumarate to succinate to the oxidation of quinol to quinone, in a reaction opposite to that catalysed by the related complex II of the respiratory chain (succinate dehydrogenase). Succinate dehydrogenase (SQR) and fumarate reductase (QFR) share a common subunit arrangement, composed of a flavoprotein catalytic subunit (subunit A), an iron-sulfur protein (subunit B) and one or two hydrophobic transmembrane subunits (subunits C and D). This homologous superfamily includes the membrane components of both fumarate reductase and succinate dehydrogenase.
