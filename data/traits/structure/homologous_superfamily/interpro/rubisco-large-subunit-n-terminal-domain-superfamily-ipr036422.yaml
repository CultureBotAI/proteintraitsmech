identifier: InterPro:IPR036422
label: "RuBisCO large subunit, N-terminal domain superfamily"
definition: >-
  Ribulose bisphosphate carboxylase (RuBisCO) catalyses the initial step in Calvin's reductive pentose phosphate cycle in plants as well as purple and green bacteria. It catalyzes the primary CO2 fixation step. Rubisco is activated by carbamylation of an active site lysine, stabilized by a divalent cation, which then catalyzes the proton abstraction from the substrate ribulose 1,5 bisphosphate (RuBP) and leads to the formation of two molecules of 3-phosphoglycerate.
