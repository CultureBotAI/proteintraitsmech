identifier: InterPro:IPR027473
label: "L-asparaginase, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain of the L-asparaginase. Each monomer of L-asparaginase is arranged into two easily identifiable domains, the larger N-terminal domain and the smaller C-terminal domain, connected by a linker consisting of approximately 20 residues. Asparaginase is found in various plant, animal and bacterial cells, catalyses the deamination of asparagine to yield aspartic acid and an ammonium ion, resulting in a depletion of free circulatory asparagine in plasma. This domain is also found in the related enzymes L-glutaminase-asparaginase from bacteria ( ), archaeal GatD subunit of Glu-tRNA amidotransferase (Glu-AdT) and mammalian lysophospholipase ( ), which is believed to play a major role in the hydrolytic degradation of lysophosphatidylcholine.
