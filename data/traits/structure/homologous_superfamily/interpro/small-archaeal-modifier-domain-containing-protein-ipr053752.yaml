identifier: InterPro:IPR053752
label: "Small archaeal modifier domain-containing protein"
definition: >-
  This superfamily of proteins is involved in post-translational modification of substrate proteins through a process known as sampylation. Members of this superfamily function by covalently attaching to lysine residues on target proteins via an isopeptide bond formed with the C-terminal glycine carboxylate of the modifier protein. This modification can signal for proteolytic degradation by proteasomes. Additionally, these proteins can form polymeric chains with themselves, akin to ubiquitin and other ubiquitin-like proteins, and also act as sulfur carriers in the process of tRNA thiolation.
