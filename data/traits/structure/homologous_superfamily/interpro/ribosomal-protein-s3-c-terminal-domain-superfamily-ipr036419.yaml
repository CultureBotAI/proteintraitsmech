identifier: InterPro:IPR036419
label: "Ribosomal protein S3, C-terminal domain superfamily"
definition: >-
  Ribosomal protein S3 is one of the proteins from the small ribosomal subunit. In Escherichia coli, S3 is known to be involved in the binding of initiator Met-tRNA. This family of ribosomal proteins includes S3 from bacteria, algae and plant chloroplast, cyanelle, archaebacteria, plant mitochondria, vertebrates, insects, Caenorhabditis elegans and yeast. This entry is the C-terminal domain. This domain has two layers (α/β) with antiparallel β-sheets.
