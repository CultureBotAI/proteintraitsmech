identifier: InterPro:IPR014722
label: "Large ribosomal subunit protein uL2, domain 2"
definition: >-
  This domain superfamily can be found in the large ribosomal subunit protein uL2, previously known as ribosomal protein L2, where it represents domain 2 and it is also found in other ribosomal proteins and in elongation factor P and translation initiation factor 5A, where it constitutes the N-terminal domain.
