identifier: InterPro:IPR011331
label: "Large ribosomal subunit protein eL37/eL43"
definition: >-
  This superfamily represents the core domain of the large ribosomal subunit protein eL37/eL43 from archaea and eukaryotes, which where previously known as ribosomal proteins L37ae and L37e. Members of this group share a common rubredoxin-like metal-binding fold containing two CX(n)C motifs (where n is usually two).
