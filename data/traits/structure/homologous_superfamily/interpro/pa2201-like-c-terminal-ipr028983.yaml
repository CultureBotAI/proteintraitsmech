identifier: InterPro:IPR028983
label: "PA2201-like, C-terminal"
definition: >-
  This superfamily represents a seven-helical bundle domain that can be found in the C-terminal of the uncharacterised protein PA2201 from Pseudomonas aeruginosa ( ). PoNe immunity proteins (PoNi) are members of this superfamily. PoNi antagonise the DNAse toxin PoNe (Polymorphic Nuclease effector). PoNi proteins may directly interact with PoNe.
