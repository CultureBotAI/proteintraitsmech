identifier: InterPro:IPR037029
label: "Alliinase, N-terminal domain superfamily"
definition: >-
  Allicin is a thiosulphinate that gives rise to dithiines, allyl sulphides and ajoenes, the three groups of active compounds in Allium species. Allicin is synthesised from sulphoxide cysteine derivatives by alliinase, whose C-S lyase activity cleaves C(beta)-S(gamma) bonds. It is thought that this enzyme forms part of a primitive plant defence system. This entry represents the N-terminal domain, which is involved in substrate binding. The N-terminal domain of tryptophan aminotransferase-related proteins from plants is also found in this entry. This tryptophan aminotransferase is thought to be involved in auxin (IAA) biosynthesis, where it is required for auxin production to initiate multiple change in growth in response to environmental and developmental cues.
