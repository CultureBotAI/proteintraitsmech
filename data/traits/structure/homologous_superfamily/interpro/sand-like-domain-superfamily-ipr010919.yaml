identifier: InterPro:IPR010919
label: "SAND-like domain superfamily"
definition: >-
  The SAND domain (named after Sp100, AIRE-1, NucP41/75, DEAF-1) is a conserved ~80 residue region found in a number of nuclear proteins, many of which function in chromatin-dependent transcriptional control. These include proteins linked to various human diseases, such as the Sp100 (Speckled protein 100kDa), NUDR (Nuclear DEAF-1 related), GMEB (Glucocorticoid Modulatory Element Binding) proteins and AIRE-1 (Autoimmune regulator 1) proteins. Proteins containing the SAND domain have a modular structure; the SAND domain can be associated with a number of other modules, including the bromodomain, the PHD finger and the MYND finger. Because no SAND domain has been found in yeast, it is thought that the SAND domain could be restricted to animal phyla. Many SAND domain-containing proteins, including NUDR, DEAF-1 (Deformed epidermal autoregulatory factor-1) and GMEB, have been shown to bind DNA sequences specifically. The SAND domain has been proposed to mediate the DNA binding activity of these proteins. Structurally, the SAND domain consists of a novel α/β fold, which has a core of three short helices packed against a barrel-like β-sheet; it is structurally similar to the SH3-like fold. Other proteins display domains that are structurally similar to the SAND domain. One such example is the SMAD4-binding domain of the oncoprotein Ski, which is stabilised by a bound zinc atom, and resembles a SAND domain, in which the corresponding I loop is responsible for DNA binding. Ski is able to disrupt the formation of a functional complex between the Co- and R-SMADs, leading to the repression of TGF-beta, Activin and BMP responses, resulting in the repression of TGF-signalling.
