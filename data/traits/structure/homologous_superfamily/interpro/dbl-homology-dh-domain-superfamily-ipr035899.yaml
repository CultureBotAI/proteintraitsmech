identifier: InterPro:IPR035899
label: "Dbl homology (DH) domain superfamily"
definition: >-
  The DH domain is composed of 11 α helices that are folded into a flattened, elongated α-helix bundle in which two of the three conserved regions, conserved region 1 (CR1) and conserved region 3 (CR3), are exposed near the centre of one surface. CR1 and CR3, together with a part of alpha-6 and the DH/PH junction site, constitute the Rho GTPase interacting pocket.
