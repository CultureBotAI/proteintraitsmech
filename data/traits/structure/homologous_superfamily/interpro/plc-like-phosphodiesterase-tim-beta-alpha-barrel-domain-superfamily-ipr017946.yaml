identifier: InterPro:IPR017946
label: "PLC-like phosphodiesterase, TIM beta/alpha-barrel domain superfamily"
definition: >-
  This superfamily represents a structural domain consisting of a TIM β/α-barrel. These domains are found in several phospholipase C (PLC) like phosphodiesterases, including: Mammalian phospholipase C isozyme D1. Bacterial phosphatidylinositol-specific phospholipase C. Glycerophosphodiester phosphodiesterases, such as GlpQ from Escherichia coli and UgpQ from Agrobacterium tumefaciens. Phospholipase C (PLC) isozymes are directly activated by heterotrimeric G proteins and Ras-like GTPases to hydrolyse phosphatidylinositol 4,5-bisphosphate into the second messengers diacylglycerol and inositol 1,4,5-trisphosphate. PLC enzymes often play central roles in various signalling cascades.
