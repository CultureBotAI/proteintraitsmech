identifier: InterPro:IPR027393
label: Virus scaffolding protein, C-terminal
definition: >-
  This superfamily represents the coat protein-binding C-terminal domain of the scaffolding protein from P22-like viruses. Bacteriophage scaffolding protein is required for successful condensation of DNA within the capsid. The scaffolding protein is lost from the structure during packaging.
