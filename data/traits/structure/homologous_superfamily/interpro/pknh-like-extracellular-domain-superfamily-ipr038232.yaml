identifier: InterPro:IPR038232
label: "PknH-like extracellular domain superfamily"
definition: >-
  This superfamily represents the C-terminal extracellular sensor domain of a group of protein kinases found mainly in Mycobacteria, such as PknH. The PknH sensor domain contains six α helices and seven anti-parallel β strands. It is also found in isolation in numerous proteins, for example the lipoproteins lpqQ, lppH and lpqA from Mycobacterium tuberculosis. It contains two completely conserved C residues that are likely to form a disulphide bond. A second pair of cysteines are less well conserved and probably form a second disulphide bond.
