identifier: InterPro:IPR042281
label: "GpdQ, beta-strand dimerisation domain"
definition: >-
  Glycerophosphodiesterase (GDPD) from Enterobacter aerogenes, GpdQ, is a promiscuous binuclear metallohydrolase that belongs to a diverse family of metallo-phosphoesterases. It plays a role in catalysing the hydrolysis of mono-, di- and triester substrates, including some organophosphate pesticides and products of the degradation of nerve agents. This superfamily represents the dimerisation domain of GpdQ, consisting of a pair of two-stranded antiparallel β-sheets and a short β-strand in the loop between the sheets, joining the β-sandwiches from each subunit. A disjointed single β-sandwich is formed across the length of the dimer. The fold of this domain consists of a pair of two-stranded β-sheets from each chain, longer than the β-sheets from the α/β sandwich domain, with a shorter third strand from each chain not directly contributing to the dimer interface.
