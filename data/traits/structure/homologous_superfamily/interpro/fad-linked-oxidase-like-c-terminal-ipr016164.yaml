identifier: InterPro:IPR016164
label: "FAD-linked oxidase-like, C-terminal"
definition: >-
  This superfamily represents a structural domain found at the C-terminal of several FAD-linked oxidases. This domain consists of two structural subdomains: subdomain 1 is a 2-layer a/b or 3-layer a/b/a sandwich, and subdomain 2 is either an orthogonal α-bundle or a second 2-layer a/b sandwich. It can be found in the following proteins: Vanillyl-alcohol family, which includes the flavoprotein vanillyl-alcohol oxidase ( ) as well as the flavoprotein subunit of p-cresol methylhydroxylase ( ) (the other subunit being a short chain cytochrome c), both of these enzymes contain covalently bound FAD. D-lactate dehydrogenases ( , -cytochrome), a peripheral membrane respiratory enzyme involved in electron transfer for the energization of active transport of a variety of sugars and amino acids in bacteria. Cholesterol oxidases ( ), a monomeric flavoenzyme that catalyses the oxidation and isomerisation of cholesterol to cholest-4-en-3-one. Cytokinin dehydrogenase 1 ( ), which has a major role in the control of plant cytokinin hormone levels by catalysing their irreversible oxidation.
