identifier: InterPro:IPR036775
label: DNA polymerase, Y-family, little finger domain superfamily
definition: >-
  This entry represents the little finger domain superfamily found in Y-family (lesion bypass) DNA polymerases. Y-family polymerases were originally known as UmuC/DinB/Rev1/Rad30 after each branch of the family. These enzymes are characterised by their low-fidelity synthesis on undamaged DNA templates and by their ability to traverse replication-blocking lesions. By contrast, high-fidelity polymerases (such as DNA polymerase III) are sensitive to distortions in the DNA template. As a result, Y-family polymerases can extend primer strands across DNA strand lesions that would otherwise stall replicative polymerases. To minimize mutations through their low fidelity synthesis, these enzymes are regulated, and are thought to interact with processivity factors, β-clamp or proliferating cell nuclear antigen (PCNA), which are also essential for the function of replicative DNA polymerases. Organisms can contain more than one Y-family polymerase, each with a unique DNA damage bypass and fidelity profile. For example, humans posses four Y-family polymerases: DNA polymerases kappa, iota, eta and Rev1. Y-family polymerases show no homology to DNA polymerases from the A-, B-, C-, D- or X-families.
