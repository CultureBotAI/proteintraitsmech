identifier: InterPro:IPR024793
label: "Thrombin inhibitor hirudin"
definition: >-
  Hirudin (MEROPS identifier I14.001) is a potent thrombin inhibitor secreted by the salivary glands of the Hirudinaria manillensis (buffalo leech) and Hirudo medicinalis (medicinal leech). It forms a stable non-covalent complex with alpha-thrombin, thereby abolishing its ability to cleave fibrinogen. The structure of hirudin has been solved by NMR, and the structure of a recombinant hirudin-thrombin complex has been determined by X-ray crystallography to 2.3A. Hirudin consists of an N-terminal globular domain and an extended C-terminal domain. Residues 1-3 form a parallel β-strand with residues 214-217 of thrombin, the nitrogen atom of residue 1 making a hydrogen bond with the Ser195 O gamma atom of the catalytic site. The C-terminal domain makes numerous electrostatic interactions with an anion-binding exosite of thrombin, while the last five residues are in a helical loop that forms many hydrophobic contacts.
