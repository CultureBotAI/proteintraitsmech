identifier: InterPro:IPR044934
label: "Peptidase C10, streptopain superfmaily"
definition: >-
  This entry represents streptopain (or SpeB), a highly conserved secreted cysteine protease that is found in the majority of S. pyogenes strains. Production, secretion, and activation of SpeB is highly regulated, and its proteolytic activity has been linked to immunomodulating activities during infection. The substrates for the enzyme have been extensively investigated, and during infection, SpeB demonstrates a broad substrate tolerance and, in an attempt to circumvent the immune system, degrades a multitude of proteins, such as interleukins, immunoglobulins, integrins and antimicrobial peptides. SpeB belongs to clan CA (of the MEROPS database) and therefore exhibits a papain-like fold This entry also includes Thiol protease/hemagglutinin PrtT from bacteria Porphyromonas gingivalis.
