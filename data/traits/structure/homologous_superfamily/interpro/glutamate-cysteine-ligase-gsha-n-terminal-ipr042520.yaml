identifier: InterPro:IPR042520
label: "Glutamate--cysteine ligase GshA, N-terminal"
definition: >-
  This superfamily represents the N-terminal domain found in a rare family of glutamate--cysteine ligases, demonstrated first in Thiobacillus ferrooxidans and present in a few other Proteobacteria. It is the first of two enzymes for glutathione biosynthesis. It is also called gamma-glutamylcysteine synthetase. Structurally, this domain consists of 3 α helices and 9 β strands.
