identifier: InterPro:IPR016171
label: "Vanillyl-alcohol oxidase, C-terminal subdomain 2"
definition: >-
  The C-terminal domain of certain FAD-linked oxidases consist of two structural subdomains: subdomain 1 is a 2-layer a/b or 3-layer a/b/a sandwich, and subdomain 2 is either an orthogonal α-bundle or a second 2-layer a/b sandwich. This superfamily represents the second (C-terminal) subdomain with an orthogonal α-bundle fold. This subdomain is found in members of the vanillyl-alcohol family, which includes the flavoprotein vanillyl-alcohol oxidase ( ) as well as the flavoprotein subunit of p-cresol methylhydroxylase ( ) (the other subunit being a short chain cytochrome c), both of these enzymes contain covalently bound FAD.
