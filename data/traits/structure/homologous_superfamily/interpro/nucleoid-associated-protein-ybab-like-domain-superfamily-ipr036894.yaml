identifier: InterPro:IPR036894
label: "Nucleoid-associated protein YbaB-like domain superfamily"
definition: >-
  This entry represents a domain superfamily of DNA-binding proteins. It is restricted to bacteria and plants. Members of this family form homodimers which bind DNA via a tweezer-like structure. The conformation of the DNA is changed when bound to these proteins. In bacteria, these proteins may play a role in DNA replication-recovery following DNA damage. The plant form contains an additional N-terminal region that may serve as a transit peptide and shows a close relationship to the cyanobacterial member, suggesting that it is a chloroplast protein. The crystal structure YbaB from Haemophilus influenzae revealed a tight dimer with a three-layer structure (β/α/β).
