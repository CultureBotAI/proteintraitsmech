identifier: InterPro:IPR037172
label: "Flavivirus capsid protein C superfamily"
definition: >-
  The capsid protein C plays a role in virus budding by binding to the cell membrane and gathering the viral RNA into a nucleocapsid that forms the core of a mature virus particle. This superfamily represents the Flavivirus capsid protein C. Its core structure is composed of five helices with right-handed superhelix and swapped dimer with the two long C-terminal helices.
