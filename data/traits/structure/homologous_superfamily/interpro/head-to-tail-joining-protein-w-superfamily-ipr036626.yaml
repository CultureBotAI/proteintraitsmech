identifier: InterPro:IPR036626
label: "Head-to-tail joining protein W superfamily"
definition: >-
  GpW is a 68 residue protein known to be present in phage particles. Extracts of phage-infected cells lacking GpW contain DNA-filled heads, and active tails, but no infectious virions. GpW is required for the addition of GpFII to the head, which is, in turn, required for the attachment of tails. Since GpFII and tails are known to be attached at the connector, GpW is also likely to assemble at this site. The addition of GpW to filled heads increases the DNase resistance of the packaged DNA, suggesting that GpW either forms a plug at the connector to prevent ejection of the DNA, or binds directly to the DNA. The large number of positively charged residues in GpW (its calculated pI is 10.8) is consistent with a role in DNA interaction. The structure of GpW has an α-β(2)-α fold with antiparallel hairpin.
