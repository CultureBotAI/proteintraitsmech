identifier: InterPro:IPR027479
label: "S-Me-THD, N-terminal domain superfamily"
definition: >-
  This 3-layer(aba) sandwich domain is found at the N terminus of S-methyl thiohydantoin desulfurase from Variovorax sp. (S-Me-THD) and similar sequences mainly found in bacteria and fungi. S-Me-THD catalyses the hydrolysis of S-methyl-thiohydantoin-5-propanoate into hydantoin-5-propanoate and methanethiol, the third step in S-methyl ergothioneine degradation.
definition_source: InterPro
