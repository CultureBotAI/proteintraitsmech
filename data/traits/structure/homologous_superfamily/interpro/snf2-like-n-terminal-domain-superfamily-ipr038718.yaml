identifier: InterPro:IPR038718
label: "SNF2-like, N-terminal domain superfamily"
definition: >-
  This domain is found in proteins involved in a variety of processes including transcription regulation (e.g., SNF2, STH1, brahma, MOT1), DNA repair (e.g., ERCC6, RAD16, RAD5), DNA recombination (e.g., RAD54) and chromatin unwinding (e.g., ISWI), as well as several other proteins with limited functional information (e.g., lodestar, ETL1). SNF2 functions as the ATPase component of the SNF2/SWI multisubunit complex, which utilises energy derived from ATP hydrolysis to disrupt histone-DNA interactions, resulting in increased accessibility of DNA to transcription factors. Proteins containing this domain appear to be distantly related to the DEAD/DEAH box helicases.
