identifier: InterPro:IPR036402
label: "Elongation factor Ts, dimerisation domain superfamily"
definition: >-
  This superfamily describes a β(2)-α(n)-β two layers (α-β) fold domain of EF-Tu (EF1A). In E. coli and mitochondrial Ts there are two subdomains of this fold. Elongation factor EF1B (also known as EF-Ts or EF-1beta/gamma/delta) is a nucleotide exchange factor that is required to regenerate EF1A from its inactive form (EF1A-GDP) to its active form (EF1A-GTP). EF1A is then ready to interact with a new aminoacyl-tRNA to begin the cycle again. EF1B is more complex in eukaryotes than in bacteria, and can consist of three subunits: EF1B-alpha (or EF-1beta), EF1B-gamma (or EF-1gamma) and EF1B-beta (or EF-1delta).
