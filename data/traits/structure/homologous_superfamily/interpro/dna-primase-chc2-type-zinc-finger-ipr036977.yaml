identifier: InterPro:IPR036977
label: "DNA Primase, CHC2-type zinc finger"
definition: >-
  DNA primase ( ) is a nucleotidyltransferase which synthesizes the oligoribonucleotide primers required for DNA replication on the lagging strand of the replication fork. It can also prime the leading strand and has been implicated in cell division. Primases comprise three domains: a zinc-binding domain (N-terminal) that is responsible for template recognition, a polymerase domain (catalytic core), and a domain that interacts with the replicative helicase, DnaB (C-terminal). This superfamily describes the zinc-binding domain of DNA primase, which belongs to the zinc ribbon type.
