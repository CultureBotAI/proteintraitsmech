identifier: InterPro:IPR046430
label: mRNA-capping enzyme catalytic subunit, RNA triphosphatase domain superfamily
definition: >-
  mRNA-capping enzyme catalytic subunit from Vaccinia virus (MCEL, also known as mRNA-capping enzyme D1 subunit) catalyses three enzymatic reactions: the 5' triphosphate end of the pre-mRNA is hydrolysed to a diphosphate by RNA 5' triphosphatase; the diphosphate RNA end is capped with GMP by RNA guanylyltransferase and the GpppN cap is methylated by RNA (guanine-N7) methyltransferase. It consists of an N-terminal RNA triphosphatase (TPase)-guanylyltransferase (GTase) module and a C-terminal guanine-N7-methyltransferase (MTase) module. The N-terminal module comprises a TPase domain at the very N-terminal, followed by the GTase at the C-terminal, which consists of the nucleotidyltransferase (NTPase) and OB fold domains. This superfamily represents the TPase domain from poxviral mRNA-capping enzyme catalytic subunit, which adopts and α/β barrel structure. The central core consists of an anti-parallel eight-stranded β-barrel which forms closed hydrophilic tunnel.
