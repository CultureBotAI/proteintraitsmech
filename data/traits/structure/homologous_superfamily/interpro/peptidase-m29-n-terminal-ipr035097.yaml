identifier: InterPro:IPR035097
label: "Peptidase M29, N-terminal"
definition: >-
  This superfamily represents a domain found in a group of metallopeptidases that belong to MEROPS peptidase family M29 (aminopeptidase T family, clan M-), and that includes AmpS and AmpT. Staphylococcus aureus aminopeptidase S (AmpS) has been named for its predicted, but experimentally untested, aminopeptidase activity. The enzyme is homologous to biochemically characterised aminopeptidases. It is a dimeric protein with a very unusual, elongated shape and a large internal cavity. Aminopeptidase T (AmpT) from Thermus thermophilus is a homologue of AmpS. AmpT, like AmpS, can be divided into an N-terminal domain and a C-terminal domain, with a flexible hinge between them. This entry represent the N-terminal domain.
