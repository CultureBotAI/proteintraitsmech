identifier: InterPro:IPR036585
label: "Attractin superfamily"
definition: >-
  This superfamily consists of attractin water-borne pheromones. Mate attraction in Aplysia involves a long-distance water-borne signal in the form of the attractin peptide that is released during egg laying. These peptides contain 6 conserved cysteines and are folded into 2 antiparallel helices. The second helix contains the IEECKTS sequence conserved in Aplysia attractins.
