identifier: InterPro:IPR036244
label: "TipA-like multidrug resistance regulator, antibiotic-recognition domain"
definition: >-
  TipAL is a bacterial transcriptional regulator of the MerR family. The tipA gene can be expressed as a long form, TipAL, and a short form, TipAS, which constitutes the C-terminal part of TipAL. TipAS forms the antibiotic-recognition domain. This domain, which has an α-helical globin-like fold, is also found at the C terminus of other MerR family transcription factors, including Mta, a central regulator of multidrug resistance in Bacillus subtilis, and SkgA from Caulobacter crescentus.
