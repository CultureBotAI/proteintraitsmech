identifier: InterPro:IPR036347
label: "Erythronolide synthase, docking domain superfamily"
definition: >-
  Docking domains are found in prokaryotic erythronolide synthase. They adopt a structure consisting of a bundle of four α-helices, and mediate homodimerisation of the protein, stabilising the resulting complex.
