identifier: InterPro:IPR038639
label: "AlgX, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal domain of the alginate biosynthesis protein AlgX. This domain is a bacterial carbohydrate-binding module (CBM) frequently found at the C terminus of enzymes. The combination is not unusual as the CBMs function to bring the relevant polysaccharide into close proximity to the active site. Structurally, this domain consists of 8 β sheets, arranged into a jelly-roll β sandwich.
