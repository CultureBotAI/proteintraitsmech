identifier: InterPro:IPR042080
label: "RNA 2'-phosphotransferase, N-terminal domain"
definition: >-
  The structure of the 2'-phosphotransferase contains two globular domains (N and C-domains), which form a cleft in the centre. The N-domain has the winged helix motif, a subfamily of the helix-turn-helix family, which is shared by many DNA-binding proteins. The C-terminal domain superimposes well on the NAD-binding fold of bacterial (diphtheria) toxins, which catalyze the transfer of ADP ribose from NAD to target proteins, indicating that the mode of NAD binding by the 2'-phosphotransferase could be similar to that of the bacterial toxins. This superfamily represents the N-terminal domain found in RNA 2'-phosphotransferase.
