identifier: InterPro:IPR038687
label: "Apoptosis regulator, M-T4 superfamily"
definition: >-
  Apoptosis, or programmed cell death (PCD), is a common and evolutionarily conserved property of all metazoans. In many biological processes, apoptosis is required to eliminate supernumerary or dangerous (such as pre-cancerous) cells and to promote normal development. Dysregulation of apoptosis can, therefore, contribute to the development of many major diseases including cancer, autoimmunity and neurodegenerative disorders. In most cases, proteins of the caspase family execute the genetic programme that leads to cell death. This entry represents an endoplasmic reticulum-localized apoptosis regulator, M-T4 type. M-T4 has both an N-terminal signal sequence and a C-terminal -RDEL sequence, suggesting that M-T4 resides in the endoplasmic reticulum. M-T4 is an intracellular virulence factor in myxoma virus that functions from within the endoplasmic reticulum and is necessary for the productive infection of lymphocytes. The C-terminal RDEL motif of the myxoma virus M-T4 protein may not be solely responsible for retention of M-T4 in the ER. M-T4 may have a dual function in protecting infected lymphocytes from apoptosis and in modulating the inflammatory response to virus infection. Some members of this entry belong to the pox viruses.
