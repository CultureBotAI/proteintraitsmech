identifier: InterPro:IPR036561
label: "Mitochondrial glycoprotein superfamily"
definition: >-
  This mitochondrial matrix protein superfamily contains members of the MAM33 superfamily which bind to the globular 'heads' of C1Q.b. It is thought to be involved in mitochondrial oxidative phosphorylation and in nucleus-mitochondrion interactions. Its structure consists of an β(7)-α(2) fold with N- and C-terminal extensions forming a coiled coil subdomain.
