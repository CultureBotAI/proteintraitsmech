identifier: InterPro:IPR036672
label: "TCL1/MTCP1 superfamily"
definition: >-
  Two related oncogenes, TCL-1 and MTCP-1 , are overexpressed in T cell prolymphocytic leukemias as a result of chromosomal rearrangements that involve the translocation of one T cell receptor gene to either chromosome 14q32 or Xq28. TCL-1 is an all-beta protein consisting of an eight-stranded antiparallel β barrel with a novel topology. The barrel consists of two four-stranded β-meander motifs, related by a two fold axis and connected by a long loop. The structure of MTCP-1 is very similar, diverging only in regions that are either flexible and/or involved in crystal packing.
