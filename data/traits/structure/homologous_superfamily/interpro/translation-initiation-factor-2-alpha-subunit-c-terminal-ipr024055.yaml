identifier: InterPro:IPR024055
label: "Translation initiation factor 2, alpha subunit, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain of the translation initiation factor 2 alpha subunit. It adopts an α-β fold, containing five β strands, two α helices, and one loosely associated C-terminal α helix.
