identifier: InterPro:IPR009013
label: "Attachment protein shaft domain superfamily"
definition: >-
  The attachment proteins in adenoviruses and reoviruses display structural similarity, indicating similar cell-surface receptor binding strategies, even though these viruses differ from one another in design, capsid composition and genome composition. The dsDNA adenoviruses are responsible for diseases such as pneumonia, cystitis, conjunctivitis and diarrhoea, all of which can be fatal to patients who are immunocompromised, while the dsRNA reoviruses are responsible for mild respiratory or gastrointestinal infections.
