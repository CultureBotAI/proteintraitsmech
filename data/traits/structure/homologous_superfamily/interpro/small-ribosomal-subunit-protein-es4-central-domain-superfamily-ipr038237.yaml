identifier: InterPro:IPR038237
label: "Small ribosomal subunit protein eS4, central domain superfamily"
definition: >-
  A number of eukaryotic and archaeal ribosomal proteins can be grouped on the basis of sequence similarities. One of these families includes Small ribosomal subunit protein eS4 from yeast (also known as S7/YS6); archaeal eS4; and mammalian and plant cytoplasmic eS4. Two highly similar isoforms of mammalian eS4 exist, one coded by a gene on chromosome Y, and the other on chromosome X. These proteins have 233 to 264 amino acids. This entry represents the central domain of these proteins.
