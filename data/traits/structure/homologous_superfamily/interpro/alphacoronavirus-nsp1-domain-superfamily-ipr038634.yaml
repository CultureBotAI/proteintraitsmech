identifier: InterPro:IPR038634
label: "Alphacoronavirus nsp1 domain superfamily"
definition: >-
  This entry represents the N-terminal region of the alphacoronovirus polyprotein, which contains non-structural protein 1 (Nsp1). Nsp1 from alphacoronavirus transmissible gastroenteritis virus (TGEV) folds into a six-stranded β-barrel fold with a long α helix on the rim of the barrel. This fold is shared with betacoronavirus SARS-CoV nsp1.
