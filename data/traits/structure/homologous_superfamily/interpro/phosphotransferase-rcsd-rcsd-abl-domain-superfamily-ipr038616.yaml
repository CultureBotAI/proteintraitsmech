identifier: InterPro:IPR038616
label: "Phosphotransferase RcsD, RcsD-ABL domain superfamily"
definition: >-
  This domain is part of the RcsD phosphotransferase. RcsD is a phosphotransfer intermediate between the sensor kinase RcsC and the response regulator RcsB. This domain recognises and interacts with the DNA-binding domain of RcsB.
