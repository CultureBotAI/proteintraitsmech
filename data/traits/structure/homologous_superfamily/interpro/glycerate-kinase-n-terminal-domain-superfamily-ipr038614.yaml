identifier: InterPro:IPR038614
label: "Glycerate kinase, N-terminal domain superfamily"
definition: >-
  Two groups of glycerate kinases are known, which share no significant sequence similarity. One of the groups includes glycerate kinases from eukaryotes and archaea, in addition to several bacterial species. TM1585 from Thermotoga maritima, a putative glycerate kinase, belongs to this group. The TM1585 monomer is comprised of two dissimilar α-β domains: an N-terminal, Rossmann-like domain (residues 23-249) and a C-terminal domain that adopts a new fold. The N-terminal domain has a central, six-stranded, parallel β-sheet and an all-helical subdomain. The active site is likely to be in the cleft between the N- and C-terminal domains.
