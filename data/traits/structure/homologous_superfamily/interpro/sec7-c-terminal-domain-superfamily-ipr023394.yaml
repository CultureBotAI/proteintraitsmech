identifier: InterPro:IPR023394
label: "Sec7, C-terminal domain superfamily"
definition: >-
  The Sec7 domain was named after the first protein found to contain such a region. It has been shown to be linked with guanine nucleotide exchange function. The 3D structure of the domain displays several α-helices. It was found to be associated with other domains involved in guanine nucleotide exchange (e.g., CDC25, Dbl) in mammalian factors. This superfamily represents the α orthogonal structural domain which is found at the C terminus of the Sec7 domain ( ).
