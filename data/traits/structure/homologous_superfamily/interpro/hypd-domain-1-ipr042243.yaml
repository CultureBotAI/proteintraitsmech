identifier: InterPro:IPR042243
label: "HypD, domain 1"
definition: >-
  HypD is involved in the hyp operon which is needed for the activity of the three hydrogenase isoenzymes in Escherichia coli. HypD is one of the genes needed for formation of these enzymes. This protein has been found in Gram-negative and Gram-positive bacteria and Archaea. HypD contains many possible metal binding residues, which may bind to nickel. Transposon insertions into HypD resulted in Rhizobium leguminosarum mutants that lacked any hydrogenase activity in symbiosis with peas. This superfamily represents the Hydrogenase formation protein HypD domain 1. This domain, known as α/β domain 1 which together with α/β domain 2, make up a cleft to allow for the assembly of the Fe-S cluster binding domain.
