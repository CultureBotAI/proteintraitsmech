identifier: InterPro:IPR038507
label: "YcnI-like superfamily"
definition: >-
  YcnI (also known as CutI) is a copper-responsive gene of Bacillus subtilis. It is homologous to an uncharacterised protein from Nocardia farcinica, which shares a conserved three-dimensional structure with cohesins and the reeler domain. Some proteins with this domain have C-terminal domains that bind copper .
