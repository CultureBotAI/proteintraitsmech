identifier: InterPro:IPR036363
label: "Thiol-activated cytolysin, alpha-beta domain superfamily"
definition: >-
  Thiol-activated cytolysins are toxins produced by a variety of Gram-positive bacteria and are characterised by their ability to lyse cholesterol-containing membranes, their reversible inactivation by oxidation and their capacity to bind to cholesterol. All these proteins contain a single cysteine residue, located in their C-terminal section, which has been shown to be essential for the binding to cholesterol.
