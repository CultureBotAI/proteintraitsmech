identifier: InterPro:IPR036892
label: "L27 domain superfamily"
definition: >-
  The L27 domain is a ~50-amino acid module, initially identified in the Lin-2 and Lin-7 proteins, that exists in a large family of animal scaffold proteins. The L27 domain is a specific protein-protein interaction module capable of forming heteromeric complexes that can integrate multiple scaffold proteins into supramolecular assemblies required for establishment and maintenance of cell polarity. The L27 domain can be found as a single occurrence or as a duplication in association with other domains such as PDZ, SH3, the guanylate kinase domain or the serine/threonine protein kinase domain. The main features of the L27 domain are conserved negatively charged residues and a conserved aromatic amino acid. Study of individual L27 domains revealed largely unfolded domains that require the formation of obligate heterodimers to achieve well-folded structures. Each L27 domain is composed of three helices. The two L27 domains heterodimerize by building a compact structure consisting of a four-helix bundle formed by the first two helices of each L27 domain and one coiled-coil formed by the third helix of each domain.
