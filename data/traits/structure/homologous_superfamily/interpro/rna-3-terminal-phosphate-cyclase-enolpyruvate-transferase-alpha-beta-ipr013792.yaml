identifier: InterPro:IPR013792
label: "RNA 3'-terminal phosphate cyclase/enolpyruvate transferase, alpha/beta"
definition: >-
  This superfamily represents an α/β domain consisting of alternating β-strands and α helices in two layer. This domain is found in RNA 3'-terminal phosphate cyclase (RPTC), where it occurs as a duplication of three repeats of this fold packed together around a pseudo three-fold axis. RNA cyclases are a family of RNA-modifying enzymes that catalyse the ATP-dependent conversion of the 3'-phosphate to the 2',3'-cyclic phosphodiester at the end of RNA. These cyclases contain an insert α/β domain with a thioredoxin topology ( ). This domain is also found in enolpyruvate transferase, where it occurs as a duplication of six repeats of this fold organised into two RPTC-like domains. Enolpyruvate transferase is the first enzyme in bacterial peptidoglycan biosynthesis, catalysing the transfer of enolpyruvate from phosphoenolpyruvate to UDP-N-acetyl-glucosamine.
