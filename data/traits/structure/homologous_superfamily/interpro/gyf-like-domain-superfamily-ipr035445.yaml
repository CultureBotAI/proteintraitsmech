identifier: InterPro:IPR035445
label: "GYF-like domain superfamily"
definition: >-
  The glycine-tyrosine-phenylalanine (GYF) domain is an around 60-amino acid domain which contains a conserved GP[YF]xxxx[MV]xxWxxx[GN]YF motif. It was identified in the human intracellular protein termed CD2 binding protein 2 (CD2BP2), which binds to a site containing two tandem PPPGHR segments within the cytoplasmic region of CD2. Binding experiments and mutational analyses have demonstrated the critical importance of the GYF tripeptide in ligand binding. A GYF domain is also found in several other eukaryotic proteins of unknown function. It has been proposed that the GYF domain found in these proteins could also be involved in proline-rich sequence recognition. Resolution of the structure of the CD2BP2 GYF domain by NMR spectroscopy revealed a compact domain with a β-β-α-β-β topology, where the single α-helix is tilted away from the twisted, anti-parallel β-sheet. The conserved residues of the GYF domain create a contiguous patch of predominantly hydrophobic nature which forms an integral part of the ligand-binding site. There is limited homology within the C-terminal 20-30 amino acids of various GYF domains, supporting the idea that this part of the domain is structurally but not functionally important. This entry also matches Arabidopsis histone methyltransferases ATXR3/SDG2 and ATXR7/SDG25, which contain two partial GYF domains towards the N terminus. Histone methyltransferase ATXR7 is involved in regulation of flowering time. It is specifically required for the trimethylation of 'Lys-4' of histone H3 (H3K4me3) at the FLC locus, it prevents the trimethylation on 'Lys-27' (H3K27me3) at the same locus. ATXR3 is also required for H3K4 trimethylation and is crucial for both sporophyte and gametophyte development in plants.
