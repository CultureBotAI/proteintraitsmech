identifier: InterPro:IPR043002
label: "Spike glycoprotein, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal domain of the betacoronavirus spike glycoprotein, which mainly functions as a receptor binding domain. The spike protein on coronavirus envelopes recognises receptors through the activities of a receptor-binding subunit S1 before it fuses viral and host membranes through the activities of a membrane-fusion subunit S2. S1 contains two independent domains, an N-terminal domain (NTD) and a C domain, both of which can function as viral receptor-binding domains. The NTD is a 13-stranded β-sandwich with two antiparallel β-sheets stacked against each other through hydrophobic interactions and has an overall galectin fold.
