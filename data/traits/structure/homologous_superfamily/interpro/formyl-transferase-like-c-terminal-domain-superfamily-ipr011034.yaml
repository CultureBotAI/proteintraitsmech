identifier: InterPro:IPR011034
label: "Formyl transferase-like, C-terminal domain superfamily"
definition: >-
  Methionyl-tRNA formyltransferase (FMT) ( ) transfers a formyl group onto the amino terminus of the acyl moiety of the methionyl aminoacyl-tRNA. The formyl group appears to play a dual role in the initiator identity of N-formylmethionyl-tRNA by promoting its recognition by IF2 and by impairing its binding to EFTU-GTP. This family also includes formyltetrahydrofolate dehydrogenases, which produce formate from formyl-tetrahydrofolate. These enzymes contain an N-terminal domain in common with other formyl transferase enzymes ( ). The C-terminal domain has an open β-barrel fold. The C-terminal domain of FMT structurally resembles methylpurine-DNA glycosylases (MPG). Human 3-methyladenine DNA glycosylase (AAG) catalyses the first step of base excision repair by cleaving damaged bases from DNA, excising a chemically diverse selection of substrate bases damaged by alkylation or deamination.
