identifier: InterPro:IPR014784
label: "Copper type II, ascorbate-dependent monooxygenase-like, C-terminal"
definition: >-
  Copper type II, ascorbate-dependent monooxygenases are a class of enzymes that requires copper as a cofactor and which uses ascorbate as an electron donor. This family contains two related enzymes, dopamine-beta-monooxygenase ( ) and peptidyl-glycine alpha-amidating monooxygenase ( ). There are a few regions of sequence similarities between these two enzymes, two of these regions contain clusters of conserved histidine residues which are most probably involved in binding copper. This superfamily represents the C-terminal domain of the enzyme which has a PNGase F-like fold.
