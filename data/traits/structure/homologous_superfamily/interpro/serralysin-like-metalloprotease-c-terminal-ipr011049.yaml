identifier: InterPro:IPR011049
label: "Serralysin-like metalloprotease, C-terminal"
definition: >-
  This entry represents the C-terminal domain of serralysins. The serralysin precursor does not possess a signal peptide, instead the C-terminal domain is required for secretion. This domain is a 21-strand β sandwich known as a "parallel β roll" with the β strands arranged in a right-handed spiral. There are tandem repeats of a GGXGXDX(L/I/FV)X motif, each of which binds a calcium ion. Serralysin is a bacterial Zn-endopeptidase that acts as a virulence factor to cause tissue damage and anaphylactic response. Many Zn-endopeptidases contain the metal binding motif HexxHxxGxxH; in addition to these coordinated histidine residues, serralysin contains a coordinated tyrosine residue that is unique to the astacin-like Zn enzymes. The Zn-endopeptidases containing the histidine motif are structurally similar to one another, containing an N-terminal catalytic domain that belongs to the zincin family, and a C-terminal β-helix metal-binding domain. These peptidase include the astacin family, snake venom Zn-endopeptidases, the extracellular metalloproteases from Serratia sp., Pseudomonas sp. and Erwinia sp., and the matrixins.
