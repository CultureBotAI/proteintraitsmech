identifier: InterPro:IPR038306
label: "CagS superfamily"
definition: >-
  This superfamily represents CAG pathogenicity island protein 13 (CagS) from Helicobacter pylori. The gene lies just downstream of the cluster whose protein-products resemble those of the Vibrio proteins that form the structural core of T4SS. The exact function of CagS is not known. This superfamily consists of four α-helices.
