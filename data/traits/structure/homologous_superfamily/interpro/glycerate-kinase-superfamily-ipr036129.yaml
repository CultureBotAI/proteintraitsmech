identifier: InterPro:IPR036129
label: "Glycerate kinase superfamily"
definition: >-
  This superfamily includes glycerate kinase 2 ( ), which catalyses the phosphorylation of (R)-glycerate to 3-phospho-(R)-glycerate in the presence of ATP. There are two glycerate kinases in E. coli, known as GKI and GKII and GKII is encoded by glxK. The structure of the glycerate kinase consists of two different α/β domains. The first domain has a Flavodoxin-like fold ( ): three layers (α/β/α) with parallel β-sheet of five strand. The second domain is similar to the Restriction endonuclease-like fold ( ): three layers (α/β/α) with mixed β-sheet of five strands, and is inserted into the first one.
