identifier: InterPro:IPR038218
label: "YuzD-like superfamily"
definition: >-
  This superfamily includes Bacillus subtilis yuzD and SA0789 from Staphylococcus aureus. Their function is not clear. SA0789 has a thioredoxin-like fold, its core consisting of three layers α/β/α (PDBe:1xg8).
