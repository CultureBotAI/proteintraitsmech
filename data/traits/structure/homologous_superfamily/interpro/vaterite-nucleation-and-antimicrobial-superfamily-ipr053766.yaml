identifier: InterPro:IPR053766
label: "Vaterite Nucleation and Antimicrobial Superfamily"
definition: >-
  This superfamily of proteins is involved in the biomineralization process, specifically in the nucleation and stabilization of vaterite, a crystalline form of calcium carbonate. Members of this superfamily possess antimicrobial properties, effective against certain bacterial pathogens including Pseudomonas aeruginosa and Proteus vulgaris.
