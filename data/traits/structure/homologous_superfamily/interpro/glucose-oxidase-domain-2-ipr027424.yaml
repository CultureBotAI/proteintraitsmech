label: "Glucose Oxidase, domain 2"
definition: >-
  This superfamily represents a structurally irregular domain of glucose oxidase. It is a subdomain of the FAD ADP-binding domain represented by . The FAD-binding domain forms the α-β fold typical of dinucleotide binding proteins.
