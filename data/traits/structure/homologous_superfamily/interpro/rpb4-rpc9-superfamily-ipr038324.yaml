identifier: InterPro:IPR038324
label: "Rpb4/RPC9 superfamily"
definition: >-
  A major role in the regulation of eukaryotic protein-coding genes is played by the gene-specific transcriptional regulators, which recruit the RNA polymerase II holoenzyme to the specific promoter. The Rpb4 and Rpb7 subunits of yeast RNA polymerase II form a heterodimeric complex essential for promoter-directed transcription initiation. The Rpb4-Rpb7 complex is not required for stable recruitment of polymerase to active preinitiation complexes, suggesting that Rpb4-Rpb7 mediates an essential step subsequent to promoter binding. This superfamily includes DNA-directed RNA polymerase II subunit Rpb4 and DNA-directed RNA polymerase III subunit RPC9.
