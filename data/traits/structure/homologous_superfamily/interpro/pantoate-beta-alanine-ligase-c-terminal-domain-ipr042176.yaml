identifier: InterPro:IPR042176
label: "Pantoate-beta-alanine ligase, C-terminal domain"
definition: >-
  This superfamily represents the C-terminal domain of a pantoate-beta-alanine ligase (also known as pantoate-beta-alanine synthase) which catalyses the formation of pantothenate from pantoate and alanine in the pantothenate biosynthesis pathway. Its C-terminal domain partially covers the active site cavity in the N-terminal domain and it has been proposed that a hinged movement of this domains is responsible for the opening and closing of the active site.
