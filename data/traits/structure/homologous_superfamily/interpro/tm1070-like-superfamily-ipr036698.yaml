identifier: InterPro:IPR036698
label: "TM1070-like superfamily"
definition: >-
  This superfamily consists of several hypothetical bacterial proteins of around 125 resides in length, including the hypothetical protein TM1070 from Thermotoga maritima, which has a β-sandwich structure with a jelly-roll fold. The function of these proteins is unknown.
