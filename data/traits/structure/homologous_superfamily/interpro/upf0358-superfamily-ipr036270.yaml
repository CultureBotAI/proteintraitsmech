identifier: InterPro:IPR036270
label: "UPF0358 superfamily"
definition: >-
  This entry consists of several hypothetical bacterial proteins of around 90 residues in length. The function of the UPF035 family is unknown; however they form α helical bundles and are thought to be involved in control of cell shape.
