identifier: InterPro:IPR036829
label: "Hypothetical protein TM0875"
definition: >-
  The domain forms an unusual α/β fold where a six-stranded antiparallel β-sheet is wrapped around a central α-helix, flanked by an additional α-helix and a small sub-domain consisting of a single β-strand and a two-stranded antiparallel β-sheet. It shows weak structural similarities to phosphoribosylformylglycinamidine synthases and some thioesterase superfamily members, but its function is unknown.
