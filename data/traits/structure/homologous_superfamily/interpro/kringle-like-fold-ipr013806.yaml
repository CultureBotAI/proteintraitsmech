identifier: InterPro:IPR013806
label: "Kringle-like fold"
definition: >-
  This entry represents proteins displaying a Kringle-like structure, which consists of a nearly all-beta, disulphide-rich fold. Proteins displaying this fold include both Kringle modules as well as fibronectin type II modules, the latter displaying a shorter two-disulphide version of the Kringle module. Kringle modules occur in blood clotting and fibrinolytic proteins, such as plasminogen, prothrombin, meizothrombin, and urokinase-type plasminogen activator, as well as in apolipoprotein and hepatocyte growth factor. Kringle domains are believed to play a role in binding mediators (e.g., membranes, other proteins or phospholipids), and in the regulation of proteolytic activity. Fibronectin type II modules occur in fibronectin, as well as in gelatinase A (MMP-2), gelatinase B (MMP-9), and the collagen-binding domain of PDC-109. Fibronectin is a multi-domain glycoprotein, found in a soluble form in plasma, and in an insoluble form in loose connective tissue and basement membranes, that binds cell surfaces and various compounds including collagen, fibrin, heparin, DNA, and actin. Fibronectins are involved in a number of important functions e.g., wound healing; cell adhesion; blood coagulation; cell differentiation and migration; maintenance of the cellular cytoskeleton; and tumour metastasis. Gelatinases A and B are members of the matrix metalloproteinase family that act as neutral proteinases in the breakdown and remodelling of the extracellular matrix. These gelatinases play important roles in the pathogenesis of inflammation, infection and in neoplastic diseases. In gelatinase A, the three fibronectin-like modules are inserted within a catalytic domain, these modules acting to target the enzyme to matrix macromolecules.
