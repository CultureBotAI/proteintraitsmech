identifier: InterPro:IPR018193
label: "Glycerate kinase, flavodoxin-like fold"
definition: >-
  Proteins in this entry include glycerate kinase 2 ( ), which catalyses the phosphorylation of (R)-glycerate to 3-phospho-(R)-glycerate in the presence of ATP. These proteins consist of two different α/β domains: domain 1 has a flavodoxin-like fold, while domain 2 has a restriction enzyme-like fold (domain 2 is inserted into domain 1). This superfamily represents domain 1 with a flavodoxin-like fold.
