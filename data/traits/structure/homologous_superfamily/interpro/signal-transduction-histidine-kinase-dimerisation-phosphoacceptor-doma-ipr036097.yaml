identifier: InterPro:IPR036097
label: "Signal transduction histidine kinase, dimerisation/phosphoacceptor domain superfamily"
definition: >-
  This entry represents the dimerisation and phosphoacceptor domain superfamily found in some histidine kinases. Signal transducing histidine kinases are the key elements in two-component signal transduction systems, which control complex processes such as the initiation of development in microorganisms. Examples of histidine kinases are EnvZ, which plays a central role in osmoregulation. Histidine kinases usually have an N-terminal ligand-binding domain and a C-terminal kinase domain, but other domains may also be present. The kinase domain is responsible for the autophosphorylation of the histidine with ATP, the phosphotransfer from the kinase to an aspartate of the response regulator, and the phosphotransfer from aspartyl phosphate back to ADP or to water. The homodimeric domain includes the site of histidine autophosphorylation and phosphate transfer reactions. The structure of the homodimeric domain comprises a closed, four-helical bundle with a left-handed twist, formed by two identical α-hairpin subunits.
