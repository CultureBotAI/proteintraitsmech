identifier: InterPro:IPR024076
label: "Rotavirus NSP2, C-terminal"
definition: >-
  Rotavirus non-structural protein 2 (NSP2) is a basic protein which possesses RNA-binding activity and is essential for genome replication. It may also be important for viral RNA packaging. This superfamily represents the C-terminal domain of the Rotavirus NSP2.
