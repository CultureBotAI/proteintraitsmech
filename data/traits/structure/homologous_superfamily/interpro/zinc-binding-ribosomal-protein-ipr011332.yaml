identifier: InterPro:IPR011332
label: "Zinc-binding ribosomal protein"
definition: >-
  This superfamily represents a rubredoxin-like metal-binding fold found in bL32, bL33, eL37, eL43, eL40, eL42 and other ribosomal proteins. This domain contains two CX(n)C motifs (where n is usually two).
