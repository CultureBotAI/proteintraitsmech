identifier: InterPro:IPR038465
label: "APS reductase, beta subunit, C-terminal domain superfamily"
definition: >-
  During dissimilatory sulphate reduction and sulphur oxidation, adenylylsulphate (APS) reductase catalyses reversibly the two-electron reduction of APS to sulphite and AMP. Found in several bacterial lineages and in Archaeoglobales, APS reductase is a heterodimer composed of an alpha subunit containing a noncovalently bound FAD, and a beta subunit containing two [4Fe-4S] clusters. This entry describes the C-terminal domain of the beta subunit of APS reductase. The C-terminal segment of the beta-subunit wraps around the alpha-subunit to form a functional unit, with the C-terminal loop inserted into the active-site channel of the alpha-subunit from another alpha-beta-heterodimer.
