identifier: InterPro:IPR011059
label: "Metal-dependent hydrolase, composite domain superfamily"
definition: >-
  The composite domain of metal-dependent hydrolases has a pseudo-barrel fold that is interrupted by the catalytic β/α barrel domain. This domain is found in a variety of bacterial and fungal enzymes, including: cytosine deaminase, an enzyme that is important in the pyrimidine salvage pathway; the alpha-subunit of urease, a virulence factor of gastric pathogens such as Helicobacter pylori (Campylobacter pylori); D- and L-hydantoinases (dihydropyrimidinase), which catalyse the production of D- and L-amino acids, respectively; isoaspartyl dipeptidase from Escherichia coli, which functions in protein degradation; N-acetylglucosamine-6-phosphate deacetylase, which is an enzyme from the biosynthetic pathway to amino-sugar-nucleotides; and N-acyl-D-amino acid amidohydrolase (D-aminoacylase), involved in the synthesis of D-amino acids.
