identifier: InterPro:IPR037256
label: "ASC domain superfamily"
definition: >-
  Association with the SNF1 complex (ASC) domain is found in the Sip1/Sip2/Gal83/AMPKbeta subunits of the SNF1/AMP-activated protein kinase (AMPK) complex. SNF1/AMPK are heterotrimeric enzymes composed of a catalytic alpha-subunit, a regulatory gamma-subunit and a regulatory/targeting beta-subunit. Saccharomyces cerevisiae encodes three beta-subunit genes, Sip1, Sip2 and Gal83. The beta-subunits function as target selective adaptors that recruit the catalytic kinase and regulator Snf4/gamma-subunits. The ASC domain is required for interaction with Snf4. The SNF1 kinase complex is required for transcriptional, metabolic, and developmental adaptations in response to glucose limitation. As glucose levels decrease, Snf1 is activated and promotes the use of alternative carbon sources. Structurally, this domain comprises three short helices and 3-stranded meander β-sheet which makes extensive intermolecular interactions.
