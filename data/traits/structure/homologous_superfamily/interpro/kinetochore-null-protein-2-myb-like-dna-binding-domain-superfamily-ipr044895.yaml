identifier: InterPro:IPR044895
label: "Kinetochore null protein 2, Myb-like DNA-binding domain superfamily"
definition: >-
  This superfamily represents the Myb-like DNA-binding domain of Knl2 (kinetochore null protein 2) from C. elegans, a Myb DNA-binding domain-containing protein required for CENP-A loading and kinetochore assembly. It has an all-helical structure.
