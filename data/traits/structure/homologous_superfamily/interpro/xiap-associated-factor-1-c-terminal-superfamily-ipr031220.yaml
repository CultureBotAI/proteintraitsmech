identifier: InterPro:IPR031220
label: "XIAP-associated factor 1, C-terminal superfamily"
definition: >-
  XAF1 (X-linked inhibitor of apoptosis (XIAP)-associated factor 1) is a proapoptotic protein that antagonises the caspase-inhibitory activity of XIAP. It is a tumor suppressor that is frequently inactivated in many human cancers. It forms a positive feedback loop with p53 and acts as a molecular switch in p53-mediated cell-fate decisions favoring apoptosis over cell-cycle arrest. This entry represents the C-terminal domain which is functionally identified as XIAP(RING)-binding domain of XAF1.
