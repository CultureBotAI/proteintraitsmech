identifier: InterPro:IPR042251
label: "Ethanolamine ammonia-lyase light chain, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain of several bacterial ethanolamine ammonia-lyase light chain (EutC) sequences. Ethanolamine ammonia-lyase is a bacterial enzyme that catalyses the adenosylcobalamin-dependent conversion of certain vicinal amino alcohols to oxo compounds and ammonia.
