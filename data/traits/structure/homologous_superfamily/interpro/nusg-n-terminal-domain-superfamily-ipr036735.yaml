identifier: InterPro:IPR036735
label: "NusG, N-terminal domain superfamily"
definition: >-
  This is the N-terminal domain superfamily of transcription termination/antitermination protein NusG, which is involved in transcription elongation, termination and antitermination. It also occurs at the N-terminal of transcription antitermination protein RfaH and in the transcription elongation factor Spt5. This domain has a ferredoxin-like fold, which consists of an α+β sandwich with antiparallel β-sheet.
