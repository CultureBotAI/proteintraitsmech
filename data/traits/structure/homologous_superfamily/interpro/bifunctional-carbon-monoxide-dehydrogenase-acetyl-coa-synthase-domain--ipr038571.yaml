identifier: InterPro:IPR038571
label: "Bifunctional carbon monoxide dehydrogenase/acetyl-coa synthase, domain 3 superfamily"
definition: >-
  The carbon monoxide dehydrogenase alpha subunit ( ) catalyses the interconversion of CO and CO2 and the synthesis of acteyl-coA from the methylated corrinoid/iron sulphur protein, CO and CoA. Nomenclature follows the description for Methanosarcina thermophila. The complex is also found in Archaeoglobus fulgidus, not considered a methanogen, but is otherwise generally associated with methanogenesis.
