identifier: InterPro:IPR027266
label: Aminomethyltransferase superfamily
definition: >-
  This entry represents an α/β domain found in GTP-binding protein TrmE (N-terminal domain), domain 1 of glycine cleavage T-protein (also known as aminomethyltransferase), iron-sulfur cluster assembly factor IBA57 and related proteins. TrmE is a guanine nucleotide-binding protein conserved between bacteria and eukaryotes. It is involved in the modification of uridine bases at the first anticodon (wobble) position of tRNAs. The N-terminal portion of the protein is necessary for mediating dimer formation within the protein.
