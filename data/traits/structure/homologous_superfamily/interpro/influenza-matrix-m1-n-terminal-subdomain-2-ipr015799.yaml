identifier: InterPro:IPR015799
label: "Influenza matrix M1, N-terminal subdomain 2"
definition: >-
  This entry represents the second subdomain of the N-terminal domain of M1. Matrix protein (M1) of Influenza virus is a bifunctional membrane/RNA-binding protein that mediates the encapsidation of RNA-nucleoprotein cores into the membrane envelope. It is therefore required that M1 binds both membrane and RNA simultaneously. M1 is comprised of two domains connected by a linker sequence. The N-terminal domain has a multi-helical structure that can be divided into two subdomains: subdomain 1 forms an up-down helical bundle and subdomain 2 forms an orthogonal bundle. The C-terminal domain also contains α-helical structure.
