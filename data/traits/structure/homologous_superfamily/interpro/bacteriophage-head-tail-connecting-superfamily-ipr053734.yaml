identifier: InterPro:IPR053734
label: "Bacteriophage Head-Tail Connecting Superfamily"
definition: >-
  This superfamily of proteins is involved in the assembly of viral particles, specifically in the process of connecting the head and tail components of bacteriophages. The proteins function at the final stage of morphogenesis, ensuring the proper attachment of the DNA-containing head to the pre-assembled tail structure. They interact with various other proteins that are part of the virion assembly pathway, including those that close the capsid and the tail terminator protein.
