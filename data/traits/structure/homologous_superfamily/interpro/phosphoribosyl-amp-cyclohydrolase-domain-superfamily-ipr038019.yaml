identifier: InterPro:IPR038019
label: "Phosphoribosyl-AMP cyclohydrolase domain superfamily"
definition: >-
  The phosphoribosyl-AMP cyclohydrolase catalyses the third step in the histidine (his) biosynthetic pathway: 5-phosphoribosyl-AMP H 2 O = 5-(5-phospho-D-ribosylaminoformimino)-1-(5-phospho-ribosyl) imidazole-4-carboxamide It requires Zn 2 ions for activity. Methanobacterium phosphoribosyl-AMP cyclohydrolase HisI is a dimer; each monomer is composed of four β-hairpins.
