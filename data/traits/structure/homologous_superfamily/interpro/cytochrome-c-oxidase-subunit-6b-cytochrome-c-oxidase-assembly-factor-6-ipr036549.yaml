identifier: InterPro:IPR036549
label: "Cytochrome c oxidase subunit 6B/Cytochrome c oxidase assembly factor 6-like superfamily"
definition: >-
  This superfamily includes the cytochrome c oxidase subunit 6B (CX6), Cytochrome c oxidase assembly factor 6 (COA6) and their respective homologues. Cytochrome c oxidase ( ) is an oligomeric enzymatic complex that is a component of the respiratory chain complex and is involved in the transfer of electrons from cytochrome c to oxygen. In eukaryotes this enzyme complex is located in the mitochondrial inner membrane; in aerobic prokaryotes it is found in the plasma membrane. In eukaryotes, in addition to the three large subunits, I, II and III, that form the catalytic centre of the enzyme complex, there are a variable number of small polypeptide subunits. One of these subunits is the potentially haem-binding subunit, VIb, which is encoded in the nucleus. Subunit VIb is one of three mammalian subunits that lacks a transmembrane region. It is located on the cytosolic side of the membrane and helps form the dimer interface with the corresponding subunit on the other monomer complex.
