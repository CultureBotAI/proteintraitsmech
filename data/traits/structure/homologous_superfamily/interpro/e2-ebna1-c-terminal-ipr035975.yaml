identifier: InterPro:IPR035975
label: "E2/EBNA1, C-terminal"
definition: >-
  This superfamily represents a ferredoxin-like fold found in the C terminus of the Papillomavirus E2 protein and the the Epstein-Barr virus (strain GD1) nuclear antigen 1 (EBNA1). This region is the DNA-binding and dimerisation domain found in EBNA1. E2 is an early regulatory protein found in the dsDNA papillomaviruses. The viral genome is a 7.9-kb circular DNA that codes for at least eight early and two late (capsid) proteins. The products of the early genes E6 and E7 are oncoproteins that destabilise the cellular tumour suppressors p53 and pRB. The product of the E1 gene is a helicase necessary for viral DNA replication. The products of the E2 gene play key roles in the regulation of viral gene transcription and DNA replication. During early stages of viral infection, the E2 protein represses the transcription of the oncogenes E6 and E7, reintroduction of E2 into cervical cancer cell-lines leads to repression of E6/E7 transcription, stabilisation of the tumour suppressor p53, and cell-cycle arrest at the G1 phase of the cell cycle. E2 can also induce apoptosis by a p53-independent mechanism.
