identifier: InterPro:IPR038468
label: "Transport accessory protein MmpS, C-terminal"
definition: >-
  This superfamily represents the C-terminal soluble domain characterised in MmpS4 from Mycobacterium tuberculosis, but is also present in other transport accessory proteins, including MmpS1-5 from Mycobacterium tuberculosis. MmpS1-S5 and IamA are part of an export system required for biosynthesis and secretion of siderophores and are essential for virulence of Mycobacterium tuberculosis. MmpS4 possesses an N-terminal transmembrane (TM) helix and a C-terminal soluble domain.
