identifier: InterPro:IPR046375
label: "IKBKB, scaffold dimerization domain superfamily"
definition: >-
  This superfamily represents the C-terminal scaffold dimerization domain (SDD) found in inhibitor of nuclear factor kappa-B kinase subunit beta (IKBKB). IKBKB is one of the core component of IKB kinases (IKK), which is an enzyme that quickly becomes active in response to diverse stresses. The SDD consists primarily of two long α-helices. This domain can also be found in inhibitor of nuclear factor kappa-B kinase subunit alpha (IKKA).
