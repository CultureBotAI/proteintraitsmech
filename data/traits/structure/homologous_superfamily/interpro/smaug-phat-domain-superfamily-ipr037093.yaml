identifier: InterPro:IPR037093
label: "Smaug, PHAT domain superfamily"
definition: >-
  The PHAT (pseudo-HEAT analogous topology) domain assumes a structure consisting of a layer of three parallel helices packed against a layer of two antiparallel helices, into a cylindrical shaped five-helix bundle. It is found in the RNA-binding protein Smaug in insects, where it is essential for high-affinity RNA binding. Smaug is a translation regulator that binds to the 3'-UTR of specific mRNAs such as nanos (nos) and prevents their translation. The mammalian homologue Smaug 1 is thought to play a role in RNA granule formation and translation regulation in neurons. Another mammalian homologue Smaug 2 acts as a transcriptional repressor.
