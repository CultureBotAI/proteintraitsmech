identifier: InterPro:IPR038626
label: "Rof-like superfamily"
definition: >-
  This superfamily consists of several bacterial modulator of Rho-dependent transcription termination (ROF) proteins. ROF binds transcription termination factor Rho and inhibits Rho-dependent termination in vivo. ROF (also known as YaeO) contains an N-terminal helix and a seven-stranded β sandwich.
