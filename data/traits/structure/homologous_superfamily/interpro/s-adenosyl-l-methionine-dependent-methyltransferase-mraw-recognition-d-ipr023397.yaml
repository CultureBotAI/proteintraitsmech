identifier: InterPro:IPR023397
label: "S-adenosyl-L-methionine-dependent methyltransferase, MraW, recognition domain superfamily"
definition: >-
  This domain superfamily is found inserted into bacterial SAM-dependent methyltransferases and is thought to be involved in methyl acceptor selectivity. In contrast with recognition domains found in other methyltransferases, it is inserted into the centre of the protein sequence and has an α orthogonal structure rather than a simple loop or single α-helix.
