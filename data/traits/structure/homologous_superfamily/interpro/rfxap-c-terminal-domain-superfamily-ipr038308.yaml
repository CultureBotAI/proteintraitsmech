identifier: InterPro:IPR038308
label: "RFXAP, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of RFXAP (regulatory factor X-associated protein) that binds to RFXANK, the ankyrin-repeat regulatory factor X protein. RFXAP is part of the RFX complex, mutants of either RFXAP or RFXANK protein fail to bind to each other. RFX5 binds only to the RFXANK-RFXAP scaffold and not to either protein alone, and neither the scaffold nor RFX5 alone can bind DNA. The binding of the RFXANK-RFXAP scaffold to RFX5 leads to a conformational change in the latter that exposes the DNA-binding domain of RFX5. The DNA-binding domain of RFX5 anchors the RFX complex to MHC class II X and S promoter boxes.
