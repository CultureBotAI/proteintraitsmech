identifier: InterPro:IPR038220
label: "Phenol hydroxylase, C-terminal TRX-fold domain superfamily"
definition: >-
  Phenol hydroxylase is a homodimer which hydroxylates phenol to catechol, or similar products. The enzyme is comprised of three domains. The first two domains form the active site. The third domain, this domain, is involved in forming the dimerisation interface. The domain adopts a thioredoxin-like fold (TRX-fold). Proteins containing this domain also include 3-hydroxybenzoate 4-monooxygenase from Comamonas testosteroni.
