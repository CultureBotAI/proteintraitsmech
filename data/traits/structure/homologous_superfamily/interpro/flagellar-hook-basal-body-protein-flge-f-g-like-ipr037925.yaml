identifier: InterPro:IPR037925
label: "Flagellar hook-basal body protein, FlgE/F/G-like"
definition: >-
  This superfamily represents three closely related flagellar proteins usually denoted FlgE, FlgF and FlgG. The basal body, found in FlgF and FlgG, constitutes a major portion of the flagellar apparatus of proteobacteria and spirochete. It consists of four rings (L,P,S, and M) mounted on a central rod. The flagellar hook, found in FlgE, is a short, curved, extracellular structure located between the basal body and the filament of the protein. The rod and hook are directly connected to each other. Their subunit proteins have similar folds, but differences in the domain orientations result in the distinct mechanical functions of the flagellar rod and hook.
