identifier: InterPro:IPR043090
label: "Low molecular weight S layer protein, N-terminal, subdomain"
definition: >-
  Clostridial species have a layer of surface proteins surrounding their membrane. This layer is comprised of a high molecular weight protein and a low molecular weight protein. This superfamily represents a subdomain of the N-terminal domain of the Low molecular weight S layer protein (LMW SLP). Structurally, it consists of 2 α helices and 5 β strands and adopts a 2-layer sandwich architecture. Within this domain, one of the β strands is composed of C-terminal residues, while the rest of the protein is contributed to by a contiguous polypeptide chain at the N terminus.
