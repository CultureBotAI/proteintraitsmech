identifier: InterPro:IPR036623
label: "Hemimethylated DNA-binding domain superfamily"
definition: >-
  Heat shock protein HspQ, also known as YccV, is an Escherichia coli hemimethylated DNA binding protein which has been shown to regulate dnaA gene expression. This entry represents a YccV-like hemimethylated DNA binding domain superfamily that is found in HspQ and also in longer eukaryotic proteins.
