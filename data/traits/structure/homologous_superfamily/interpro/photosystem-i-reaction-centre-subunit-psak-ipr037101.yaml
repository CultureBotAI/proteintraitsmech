identifier: InterPro:IPR037101
label: "Photosystem I reaction centre subunit PsaK"
definition: >-
  Photosystems I and II occur together in the same sets of organisms. Photosystem I uses light energy to transfer electrons from plastocyanin to ferredoxin, while photosystem II uses light energy to split water and releases molecular oxygen. This entry represents Photosystem I reaction centre subunit PsaK from Cyanobacteria and Rhodophyta (red algae).
