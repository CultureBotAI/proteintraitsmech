identifier: InterPro:IPR041931
label: "Bacterial DNA polymerase III alpha subunit, thumb domain"
definition: >-
  DNA polymerase III is a complex, multichain enzyme responsible for most of the replicative synthesis in bacteria. This DNA polymerase also exhibits 3' to 5' exonuclease activity. The alpha chain is the DNA polymerase. This superfamily represents the thumb domain found in DNA polymerase III alpha subunit. The thumb domain is involved in positioning the duplex DNA and in translocation and in processivity of the polymerase - holding the template strand in place so that binding doesn't need to occur with each dNTP added to the strand. It is composed of 4 compact α helices between two small β strands.
