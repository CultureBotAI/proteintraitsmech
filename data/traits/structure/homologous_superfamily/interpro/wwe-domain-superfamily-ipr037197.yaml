identifier: InterPro:IPR037197
label: "WWE domain superfamily"
definition: >-
  The WWE domain is named after three of its conserved residues and is predicted to mediate specific protein-protein interactions in ubiquitin and ADP ribose conjugation systems. This domain is found as a tandem repeat at the N-terminal of Deltex, a cytosolic effector of Notch signalling thought to bind the N-terminal of the Notch receptor. It is also found as an interaction module in protein ubiquination and ADP ribosylation proteins. Structurally, the WWE domain has a β(2)-α-β(4) fold with antiparallel folded β-sheet (half-barrel).
