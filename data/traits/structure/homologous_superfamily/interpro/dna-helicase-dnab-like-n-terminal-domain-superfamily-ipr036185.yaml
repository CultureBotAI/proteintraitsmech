identifier: InterPro:IPR036185
label: DNA helicase, DnaB-like, N-terminal domain superfamily
definition: >-
  The hexameric helicase DnaB unwinds the DNA duplex at the Escherichia coli chromosome replication fork. Although the mechanism by which DnaB both couples ATP hydrolysis to translocation along DNA and denatures the duplex is unknown, a change in the quaternary structure of the protein involving dimerization of the N-terminal domain has been observed and may occur during the enzymatic cycle. This N-terminal domain is required both for interaction with other proteins in the primosome and for DnaB helicase activity. This domain has a multi-helical structure that forms an orthogonal bundle. It is also found in Replicative DNA helicase DnaC involved in the initiation and elongation during chromosome replication.
