identifier: InterPro:IPR036434
label: "1, 4-beta cellobiohydrolase superfamily"
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. The 1,4-beta cellobiohydrolase superfamily plays a central role in the recycling of plant biomass. The biological conversion of cellulose to glucose generally requires three types of hydrolytic enzymes: Endoglucanases, which cut internal beta-1,4-glucosidic bonds; exocellobiohydrolases that cut the dissaccharide cellobiose from the non-reducing end of the cellulose polymer chain; and beta-1,4-glucosidases, which hydrolyze the cellobiose and other short cello-oligosaccharides to glucose.
