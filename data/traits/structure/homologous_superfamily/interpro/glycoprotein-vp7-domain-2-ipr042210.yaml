identifier: InterPro:IPR042210
label: "Glycoprotein VP7, domain 2"
definition: >-
  Glycoprotein VP7, also known as outer shell glycoprotein, is a serotype-specific antigen, and is the major neutralisation antigen. It is found in the dsRNA rotaviruses. This superfamily represents the domain 2 found in glycoprotein VP7, it consists of 8 β strands arranged into a jelly-roll β sandwich.
