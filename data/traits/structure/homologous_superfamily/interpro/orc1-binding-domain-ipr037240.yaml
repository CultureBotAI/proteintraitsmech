identifier: InterPro:IPR037240
label: "ORC1-binding domain"
definition: >-
  This entry represents the ORC1-binding domain of Sir1. It has a complex fold, composed of an α-hairpin, meander β-sheet and a five-stranded barrel of unusual topology. Sir1 interacts with the BAH domain of the Orc1 subunit of the origin recognition complex (ORC) resulting in the establishment of silent chromatin at HMR and HML in S.cerevisiae. The amino acids from the ORC interaction region of Sir1 are presented on a conserved, convex surface that forms a complementary interface with the Orc1 BAH domain, critical for transcriptional silencing.
