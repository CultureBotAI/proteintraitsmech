identifier: InterPro:IPR038608
label: "Csm1/Pcs1, C-terminal domain superfamily"
definition: >-
  Saccharomyces cerevisiae Csm1 is part of the monopolin complex. Csm1 forms a complex with Mde4 and promotes monoorientation during meiosis. It plays a mitotic role in DNA replication and is required for condensin recruitment to the replication fork barrier site and rDNA repeat segregation. This entry also contains the Schizosaccharomyces pombe homologue to Csm1, Pcs1. Pcs1 forms a complex with Mde4 and acts in the central kinetochore domain to clamp microtubule binding sites together. The two complexes (Csm1/Lrs4 and Pcs1/Mde4) contribute to the prevention of merotelic attachment.
