identifier: InterPro:IPR036254
label: "Rab geranylgeranyltransferase, alpha subunit, insert-domain superfamily"
definition: >-
  Rab geranylgeranyltransferase (RabGGT) catalyses the transfer of geranylgeranyl groups to the C-terminal cysteine residues of Rab proteins, Ras-related small GTPases that function in intracellular vesicular transport. RabGGT is only able to prenylate Rab when it is complexed to the Rab escort protein (REP), after which REP remains bound to the prenylated Rab and delivers it to its target membrane. RabGGT is a member of the protein prenyltransferase family, all of which are heterodimers consisting of alpha and beta subunits. RabGGT is distinct from other members of the prenyltransferase family because of the presence of an Ig-like insert domain in the alpha subunit that is folded into an eight-stranded sandwich between two helices in the helical domain.
