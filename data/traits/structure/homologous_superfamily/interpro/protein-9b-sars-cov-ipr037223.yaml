identifier: InterPro:IPR037223
label: "Protein 9b, SARS-CoV"
definition: >-
  This is a superfamily of proteins found in severe acute respiratory syndrome coronavirus (SARS-CoV), and SARS-like viruses. Protein 9b is also known as ORF-9b and accessory protein 9b. The protein has a novel fold which forms a dimeric tent-like β structure with an amphipathic surface, and a central hydrophobic cavity that binds lipid molecules. This cavity is likely to be involved in membrane attachment. SARS-CoV ORF-9b targets mitochondrial antiviral signalling proteins (MAVS), suppressing innate immunity.
