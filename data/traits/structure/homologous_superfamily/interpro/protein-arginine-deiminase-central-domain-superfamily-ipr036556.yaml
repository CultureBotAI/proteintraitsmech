identifier: InterPro:IPR036556
label: "Protein-arginine deiminase, central domain superfamily"
definition: >-
  Peptidylarginine deiminase (PAD) enzymes catalyse the conversion of protein-bound arginine to citrulline. There are five types of PADs known in humans, PAD1-PAD4 and PAD6. PAD6 does not bind Ca2+ and is inactive in vitro assays against standard PADs substrate. This entry represents the central non-catalytic domain of protein-arginine deiminase. This domain has an immunoglobulin-like fold.
