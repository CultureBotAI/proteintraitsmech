identifier: InterPro:IPR043001
label: "Inositol-pentakisphosphate 2-kinase, N-terminal lobe"
definition: >-
  This superfamily represents the N-terminal lobe found in inositol-pentakisphosphate 2-kinases (also known as inositol 1,3,4,5,6-pentakisphosphate 2-kinase, Ins(1,3,4,5,6)P5 2-kinase, InsP5 2-kinase, and IP5 2-K). This enzyme phosphorylates Ins(1,3,4,5,6)P5 to form Ins(1,2,3,4,5,6)P6 (also known as InsP6 or phytate). InsP6 is involved in many processes such as mRNA export, nonhomologous end-joining, endocytosis and ion channel regulation. The IP5 2-K fold consists of two lobes connected by a hinge, referred to as N-terminal lobe and C-terminal lobe. The N-terminal lobe has an α/β fold, the core of this lobe being formed by an antiparallel and twisted main β-sheet comprised of five β-strands. The C-terminal lobe is almost twice the size of the N-terminal lobe and also has an α/β fold. The β-strands form an antiparallel twisted β-sheet. The α-helices in this lobe are distributed in three noncontinuous regions that emerge from the β-sheet and comprise almost half of the protein, they are involved in the inositide binding (CIP-lobe).
