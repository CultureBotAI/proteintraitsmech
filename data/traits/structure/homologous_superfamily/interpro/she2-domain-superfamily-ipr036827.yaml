identifier: InterPro:IPR036827
label: "She2 domain superfamily"
definition: >-
  This entry represents the main structural domain of She2. She2 is a RNA binding protein which binds to RNA via a helical hairpin. The protein is required for the actin dependent transport of ASH1 mRNA in yeast, a form of mRNP translocation. She2 contains a globular domain consisting of a bundle of five α-helices.
