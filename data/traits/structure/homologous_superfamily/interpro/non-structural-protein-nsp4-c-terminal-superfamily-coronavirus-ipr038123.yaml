identifier: InterPro:IPR038123
label: "Non-structural protein NSP4, C-terminal superfamily, coronavirus"
definition: >-
  This superfamily represents the C-terminal domain of the coronavirus nonstructural protein NSP4. NSP4 is a membrane-spanning protein which is thought to anchor the viral replication-transcription complex (RTC) to modified endoplasmic reticulum membranes. Together with NSP3, NSP4 may play critical functions during viral RNA synthesis and double membrane vesicle formation. It has been shown that in betacoronavirus, the coexpression of NSP3 and NSP4 results in a membrane rearrangement to induce double-membrane vesicles (DMVs) and convoluted membranes (CMs), playing a critical role in SARS-CoV replication. There are two well conserved amino acid residues (H120 and F121) in NSP4 among betacoronavirus, which were demonstrated to be essential for membrane rearrangements during interaction with NSP3. This suggests that the specific details of the interaction between these two proteins varies among different coronavirus. This predominantly α-helical domain may be involved in protein-protein interactions.
