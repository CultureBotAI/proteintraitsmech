identifier: InterPro:IPR042239
label: "Nop, C-terminal domain"
definition: >-
  The Nop domain is present in various pre-RNA processing ribonucleoproteins (RNP): Eukaryotic Prp31, part of a tri-snRNP complex. It is involved in pre-mRNA splicing. Eukaryotic Nucleolar proteins 56 and 58 (Nop56 and Nop58), components of box C/D small nucleolar ribonucleoprotein (snoRNP) particles. Archaeal Nop5, an homologue of Nop56/Nop58. The Nop domain is a RNP binding module, exhibiting RNA and protein binding surfaces. It is oval-shaped and exclusively α-helical. This entry represents the C-terminal part of the Nop domain.
