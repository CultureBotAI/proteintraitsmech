identifier: InterPro:IPR036255
label: "YgfB-like superfamily"
definition: >-
  This group of proteins includes the Escherichia coli proteins YgfB and YecA, and similar proteins mainly found in gammaproteobacteria. The function of these proteins is unknown. The crystal structure is known for the member from Haemophilus influenzae YgfB ( ), which folds into seven α-helices arranged into two domains: a four-helix bundle and a three-helix up-down bundle.
