identifier: InterPro:IPR049348
label: "Antitoxin TsiV3 superfamily"
definition: >-
  Antitoxin TsiV3, also known as TsaB, is a immunity protein from Vibrio cholerae that inhibits the activity of toxin VgrG3, a protein found in the spike of the type VI secretion system (T6SS) syringe- like complex. TsiV3 folds into a three-helical bundle and adopts a dimeric assembly to bind the deep active-site groove of the catalytic domain in the C-terminal region of VgrG3, modifying the conformation and preventing substrate binding (PDBe: ).
