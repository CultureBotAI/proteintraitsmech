identifier: InterPro:IPR042116
label: "GTP-binding protein TypA/BipA, C-terminal"
definition: >-
  The translational GTPase BipA (also known as TypA or YihK) regulates the expression of virulence and pathogenicity factors in several eubacteria. BipA-dependent expression of virulence factors occurs under starvation conditions, such as encountered during infection of a host. BipA is composed of five domains. Domain I consists of a central six-stranded β-sheet surrounded by five α-helices, which is characteristic for the G domain found in translational GTPases. Domain II has the distinctive OB-fold of oligonucleotide/oligosaccharide binding domains. Domains III and V both have the same double-split β-α-β fold. The C-terminal domain of BipA spatially occupies a position between domains III and V and consists of a unique mixed α+β fold composed of eight β-sheets and two α-helices. This superfamily represents the C-terminal domain found in GTP-binding protein TypA/BipA.
