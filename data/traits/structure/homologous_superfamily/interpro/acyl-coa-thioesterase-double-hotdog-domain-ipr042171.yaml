identifier: InterPro:IPR042171
label: "Acyl-CoA thioesterase, double hotdog domain"
definition: >-
  This superfamily includes TE4 thioesterases that contain a hotdog domain. Studies on TesB from Y. pestis provide insights into the TE4 thioesterase family. It is organised in an octameric arrangement of hotdog domains (a tetramer of double-hotdog protomers) which is not present in any other thioesterase family.
