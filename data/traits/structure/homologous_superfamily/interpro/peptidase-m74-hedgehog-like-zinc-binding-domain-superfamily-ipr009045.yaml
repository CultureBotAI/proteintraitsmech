identifier: InterPro:IPR009045
label: "Peptidase M74/Hedgehog-like, zinc-binding domain superfamily"
definition: >-
  This entry represents the zinc-binding domain superfamily in peptidases belonging to MEROPS peptidase family M74 (murein endopeptidase MepA), Protein hedgehog, D-D dipeptidase and related proteins. The structure of the N-terminal signalling domain of hedgehog proteins has been solved and reveals a tetrahedrally coordinated zinc ion that is structurally homologous to the zinc-binding motif in bacterial D-alanyl-D-alanine carboxypeptidases (DD-peptidases).
