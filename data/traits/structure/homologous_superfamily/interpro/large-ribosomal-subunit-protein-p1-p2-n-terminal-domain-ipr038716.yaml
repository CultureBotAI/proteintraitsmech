identifier: InterPro:IPR038716
label: "Large ribosomal subunit protein P1/P2, N-terminal domain"
definition: >-
  This domain is found in the eukaryotic 60S ribosomal proteins P1 and P2, as well as in archaebacterial P1 (also known as 50S ribosomal protein L12). It is involved in dimerization. These proteins play an important role in the elongation step of protein synthesis.
