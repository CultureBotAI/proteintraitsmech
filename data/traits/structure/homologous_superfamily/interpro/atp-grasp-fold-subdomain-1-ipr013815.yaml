identifier: InterPro:IPR013815
label: "ATP-grasp fold, subdomain 1"
definition: >-
  This entry represents subdomain 1 found at the N-terminal end of the ATP-grasp domain. The ATP-grasp fold is one of several distinct ATP-binding folds, and is found in enzymes that catalyse the formation of amide bonds, catalysing the ATP-dependent ligation of a carboxylate-containing molecule to an amino or thiol group-containing molecule. This fold is found in many different enzyme families, including various peptide synthetases, biotin carboxylase, synapsin, succinyl-CoA synthetase, pyruvate phosphate dikinase, and glutathione synthetase, amongst others. These enzymes contribute predominantly to macromolecular synthesis, using ATP-hydrolysis to activate their substrates.
