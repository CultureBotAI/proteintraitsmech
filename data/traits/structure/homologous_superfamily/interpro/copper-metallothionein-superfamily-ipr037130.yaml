identifier: InterPro:IPR037130
label: "Copper metallothionein superfamily"
definition: >-
  Metallothioneins are characterised by an abundance of cysteine residues and a lack of generic secondary structure motifs. This protein functions in primary metal storage, transport and detoxification. For the first 40 residues in the protein the polypeptide wraps around the metal by forming two large parallel loops separated by a deep cleft containing the metal cluster. This entry includes copper metallothioneins Cup1-1 and Cup1-2 from budding yeasts. They bind copper and mediate resistance to high concentrations of copper and cadmium.
