identifier: InterPro:IPR043099
label: "Thiamine-binding lipoprotein, domain I"
definition: >-
  Thiamine-binding lipoprotein (Cypl) and related proteins are specific to Mycoplasma species. Cypl, also known as p37, whose gene is part of an operon encoding two additional proteins, which are highly similar to components of the periplasmic binding-protein-dependent transport systems of Gram-negative bacteria. It has been suggested that p37 is part of a homologous, high-affinity transport system in Mycoplasma hyorhinis, a Gram-positive bacterium. Its structure indicates that it is a thiamine pyrophosphate-binding protein. The monomer is a mixed α/β fold split into two globular domains (domains I and II) connected by two linker regions and the C-terminal helix. This entry represents domain I, which consists of a six-stranded β-sheet flanked by seven helices.
