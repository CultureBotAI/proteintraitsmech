identifier: InterPro:IPR038307
label: "StbB superfamily"
definition: >-
  This entry represents the plasmid stability protein (StbB) which is conserved in the Enterobacteriales. It is a putative plasmid stability protein in that it is expressed from the operon involved in stability, but its actual function has not yet been characterised but it may be involved in the control of plasmid partition.
