identifier: InterPro:IPR036771
label: "F0F1 ATP synthase delta/epsilon subunit, N-terminal"
definition: >-
  This superfamily represents the N-terminal β-sandwich domain of F1F0-ATP synthase subunits delta (in mitochondrial ATPase) and epsilon (in bacteria or chloroplast ATPase). The interaction site of subunit C of the F0 complex with the delta or epsilon subunit of the F1 complex may be important for connecting the rotor of F1 (gamma subunit) to the rotor of F0 (C subunit). In bacterial species, the delta subunit is the equivalent of the oligomycin sensitive subunit (OSCP, ) in metazoans. The C-terminal domain of the epsilon subunit appears to act as an inhibitor of ATPase activity.
