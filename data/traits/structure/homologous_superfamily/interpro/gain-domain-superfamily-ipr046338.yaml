identifier: InterPro:IPR046338
label: "GAIN domain superfamily"
definition: >-
  This superfamily represents the GAIN domain which contains the GPS motif ( ). The GAIN domain is conserved in all cell-adhesion GPCRs and all PKD1-related proteins and is the functional unit for autoproteolysis. The ancient GPS motif exists in primitive ancestor organisms and it needs to be within the context of the GAIN domain to mediate autoproteolysis. The structure of the GAIN domain from aGPCR latrophilin 1 revealed that it contains an N-terminal subdomain A composed of six-α-helices, and a C-terminal subdomain B that consists of a twisted β-sandwich of 13 β-strands and 2 small α-helices, of which the last 5 β-strands constitute the GPS motif.
