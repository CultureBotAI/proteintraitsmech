identifier: InterPro:IPR038569
label: "Bacteriophage T4, IpI C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal region of the internal protein I (IpI) from bacteriophage T4. This protein is a nuclease inhibitor which is injected by T4 to protect its DNA from gmrS/gmrD CT of pathogenic Escherichia coli into the infected host. The structure of this protein consists of two small β-sheets flanked by N and C termini by α-helices. The protein has a gmrS/gmrD hydrophobic binding site.
