identifier: InterPro:IPR036490
label: "Thoeris protein ThsB, TIR-like domain superfamily"
definition: >-
  This is the TIR-like domain of ThsB proteins, which adopts a Rossmann-like fold. ThsB is responsible for recognizing phage infection. Thoeris is a bacterial antiphage defense system, which consists of two genes, thsA and thsB, via NAD+ degradation. ThsA has robust NAD+ cleavage activity and a two-domain architecture containing an N-terminal NAD-binding domain (denoted as sirtuin-like or Macro) and C-terminal SLOG-like domain. In some instances, such as in B. amyloliquefaciens, ThsA has an N-terminal transmembrane domain. ThsB (also referred to as TIR1 and TIR2) is structurally similar to TIR domain proteins but without enzymatic activity.
