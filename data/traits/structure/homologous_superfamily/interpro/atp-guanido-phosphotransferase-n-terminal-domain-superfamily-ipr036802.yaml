identifier: InterPro:IPR036802
label: "ATP:guanido phosphotransferase, N-terminal domain superfamily"
definition: >-
  This domain found in N terminus of ATP:guanido phosphotransferases contains an all-α fold consisting of an irregular array of 6 short helices. ATP:guanido phosphotransferases are a family of structurally and functionally related enzymes that reversibly catalyse the transfer of phosphate between ATP and various phosphogens. The enzymes belonging to this family include: Glycocyamine kinase ( ), which catalyses the transfer of phosphate from ATP to guanidoacetate. Arginine kinase ( ), which catalyses the transfer of phosphate from ATP to arginine. Taurocyamine kinase ( ), an annelid-specific enzyme that catalyses the transfer of phosphate from ATP to taurocyamine. One member is Smc74, a cercaria-specific enzyme from Schistosoma mansoni. Lombricine kinase ( ), an annelid-specific enzyme that catalyses the transfer of phosphate from ATP to lombricine. Creatine kinase ( ) (CK), which catalyses the reversible transfer of high energy phosphate from ATP to creatine, generating phosphocreatine and ADP. Creatine kinase plays an important role in energy metabolism of vertebrates. There are at least four different, but very closely related, forms of CK. Two isozymes, M (muscle) and B (brain), are cytosolic, while the other two are mitochondrial. In sea urchins there is a flagellar isozyme, which consists of the triplication of a CK-domain. A cysteine residue is implicated in the catalytic activity of these enzymes and the region around this active site residue is highly conserved.
