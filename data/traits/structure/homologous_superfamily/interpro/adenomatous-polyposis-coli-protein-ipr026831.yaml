identifier: InterPro:IPR026831
label: "Adenomatous polyposis coli protein"
definition: >-
  The tumour suppressor protein adenomatous polyposis coli (APC) has a nuclear export activity as well as many different intracellular functions. The region close to the N terminus, termed APC-(129-250), consists of three α-helices forming two separate antiparallel coiled coils. This entry represents a domain towards the N terminus that covers part of this region.
