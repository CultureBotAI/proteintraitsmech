identifier: InterPro:IPR053753
label: "Ribonuclease N1/T1-like"
definition: >-
  This superfamily of proteins is involved in the catalysis of RNA molecules. Members of this superfamily are characterized by their enzymatic activity, which includes the cleavage of phosphodiester bonds within RNA, yielding 3'-nucleoside monophosphates. The enzymatic process proceeds through the formation of 2',3'-cyclophosphate intermediates. These proteins play a crucial role in RNA metabolism, including the degradation of RNA polymers into smaller units, which can be a part of various cellular processes such as the regulation of gene expression, RNA turnover, and the defense mechanism against RNA viruses.
