identifier: InterPro:IPR043056
label: "LuxQ periplasmic domain, N-terminal subdomain"
definition: >-
  LuxQ is a sensor histidine kinase involved in quorum sensing in the marine bacterium Vibrio harveyi. Quorum sensing is a process of bacterial cell-cell communication driven by secreted signaling molecules called autoinducers such as AI-2. The receptor for this autoinducer is LuxPQ, formed as a result of the association between LuxQ and LuxP, a periplasmic binding protein, through the cited periplasmic domain of LuxQ. This superfamily shares the N-terminal structure of the periplasmic domain in LuxQ.
