identifier: InterPro:IPR037234
label: ImmE5 superfamily
definition: >-
  Colicins, which are produced by bacteria carrying the corresponding Col plasmids, kill sensitive Escherichia coli cells using different mechanisms. Colicin E5 is a tRNase toxin. The immunity protein ImmE5 is a specific inhibitor of colicin E5 that is expressed to protect the host cells. It binds to E5 C-terminal ribonuclease domain (CRD) to prevent cell death. The structure of ImmE5 is composed of an α-β(2)-α-β fold arranged in two layers (α/β) with antiparallel β-sheet.
