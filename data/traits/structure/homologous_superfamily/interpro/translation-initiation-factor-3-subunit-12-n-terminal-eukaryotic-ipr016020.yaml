identifier: InterPro:IPR016020
label: Translation initiation factor 3, subunit 12, N-terminal, eukaryotic
definition: >-
  This superfamily represents the N-terminal domain found in several eukaryotic translation initiation factor 3 subunit 12 (eIF-3 p25; also known as subunit K) proteins. Eukaryotic initiation factor 3 (eIF3) is a multi-subunit complex that is required for binding of mRNA to 40S ribosomal subunits, stabilisation of ternary complex binding to 40S subunits, and dissociation of 40S and 60S subunits.
