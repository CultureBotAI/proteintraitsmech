identifier: InterPro:IPR043014
label: "Nibrin, second BRCT domain superfamily"
definition: >-
  This entry represents the second BRCT domain of Nibrin (or Nbs1), a component of the MRN (Mre11-Rad50-Nbs1) complex that is involved in the DNA damage response. This domain (BRCT2) is identified through nuclear magnetic resonance (NMR) spectroscopy structure determination. It is downstream from BRCT1 domain and has no significant amino acid sequence homology to other BRCT domains. However, it has the α/β topology characteristic of BRCT domains in other proteins, but differs markedly in having a disordered long loop inserted between α β strand and an α helix. BRCT2 is essential for an MDC1-dependent relocalisation of Nbs1 to DNA damage sites. Structurally, BRCT2 is composed of 4 parallel β-strands and 5 α-helices.
