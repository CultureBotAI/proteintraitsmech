identifier: InterPro:IPR010982
label: Lambda repressor-like, DNA-binding domain superfamily
definition: >-
  Bacteriophage lambda C1 repressor controls the expression of viral genes as part of the lysogeny/lytic growth switch. C1 is essential for maintaining lysogeny, where the phage replicates non-disruptively along with the host. If the host cell is threatened, then lytic growth is induced. The Lambda C1 repressor consists of two domains connected by a linker: an N-terminal DNA-binding domain that also mediates interactions with RNA polymerase and a C-terminal dimerisation domain. The DNA-binding domain consists of four helices in a closed folded leaf motif. Several different phage repressors from different helix-turn-helix families contain DNA-binding domains that adopt a similar topology. These include the Lambda Cro repressor, bacteriophage 434 C1 and Cro repressors, P22 C2 repressor, and bacteriophage Mu Ner protein. The DNA-binding domain of Bacillus subtilis spore inhibition repressor SinR is identical to that of phage repressors. SinR represses sporulation, which only occurs in response to adverse conditions. This provides a possible evolutionary link between the two adaptive responses of bacterial sporulation and prophage induction. Other DNA-binding domains also display similar structural folds to that of Lambda C1. These include bacterial regulators such as the purine repressor (PurR), the lactose repressor (LacR) and the fructose repressor (FruR), each of which has an N-terminal DNA-binding domain that exhibits a fold similar to that of lambda C1, except that they lack the first helix. POU-specific domains found in transcription factors such as Oct-1, Pit-1 and hepatocyte nuclear factor 1a (LFB1/HNF1) display four-helical fold DNA-binding domains similar to that of Lambda C1. The N-terminal domain of cyanase has an α-helix bundle motif similar to lambda C1, but i…
