identifier: InterPro:IPR036247
label: "Neurotoxin 3 superfamily"
definition: >-
  This entry occurs within the Anemonia sulcata toxin III (ATX III) neurotoxin family. ATX III is a neurotoxin that is produced by sea anemone; it adopts a compact structure containing four reverse turns and two other chain reversals, but no regular α-helix or β-sheet. A hydrophobic patch found on the surface of the peptide may constitute part of the sodium channel binding surface.
