identifier: InterPro:IPR037155
label: "Staphopain proregion superfamily"
definition: >-
  This domain superfamily corresponds to the proregion of the cysteine protease staphopain (MEROPS identifier C47.003). Like many papain type peptidases, staphopain is synthesised as an inactive precursor and cleavage of the proregion is required for activation. This proregion has a half-barrel or barrel-sandwich hybrid fold. The proregion blocks the active site cleft of the mature enzyme on one side of the nucleophilic cysteine.
