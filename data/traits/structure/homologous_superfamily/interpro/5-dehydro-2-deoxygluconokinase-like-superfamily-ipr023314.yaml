identifier: InterPro:IPR023314
label: "5-Dehydro-2-deoxygluconokinase-like superfamily"
definition: >-
  This superfamily represents a β-sheet structural domain found at the N terminus of 5-dehydro-2-deoxygluconokinases, which catalyse the fifth step in degradation from myo-inositol or closely related compounds.
