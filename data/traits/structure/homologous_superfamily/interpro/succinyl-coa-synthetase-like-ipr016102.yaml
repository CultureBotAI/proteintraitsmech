identifier: InterPro:IPR016102
label: "Succinyl-CoA synthetase-like"
definition: >-
  This superfamily represents a structural domain consisting of 3-layers, α/β/α. This domain is found in both the alpha and beta chains of succinate--CoA ligase (also known as succinyl-CoA synthase; (GDP-forming) and (ADP-forming)). This domain can also be found in ATP citrate synthase ( ), malate-CoA ligase ( ) and acetate-CoA ligase (or acetyl-CoA synthase) ( ), as well as bacterial Fdr. Some members of the domain utilise ATP others use GTP.
