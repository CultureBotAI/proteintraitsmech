identifier: InterPro:IPR038388
label: "RcsC, C-terminal domain superfamily"
definition: >-
  This domain is found in the C terminus of the signal transduction response regulator (phospho-relay) kinase RcsC, between the ATP-binding region ( ) and the receiver region. This domain forms a discrete α/β/loop structure. The Rcs signalling pathway controls a variety of physiological functions like capsule synthesis, cell division or motility in prokaryotes. The Rcs regulation cascade, involving a multi-step phosphorelay between the two membrane-bound hybrid sensor kinases RcsC and RcsD and the global regulator RcsB, is, up to now, one of the most complicated regulatory systems in bacteria.
