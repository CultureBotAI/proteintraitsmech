identifier: InterPro:IPR016088
label: "Chalcone isomerase, 3-layer sandwich"
definition: >-
  Chalcone isomerase ( ; also known as chalcone-flavanone isomerase or fatty-acid-binding protein) is a plant enzyme responsible for the isomerisation of chalcone to naringenin, a key step in the biosynthesis of flavonoids. The Petunia hybrida (Petunia) genome contains two genes coding for very similar enzymes, ChiA and ChiB, but only the first seems to encode a functional chalcone isomerase. This entry represents a 3-layer β/β/α sandwich subdomain found in chalcone isomerases.
