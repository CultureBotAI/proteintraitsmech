identifier: InterPro:IPR037158
label: "Threonine synthase, N-terminal domain superfamily"
definition: >-
  This domain superfamily is found at the N terminus of many threonine synthase enzymes. Threonine synthases catalyses the gamma-elimination of phosphate from L-phosphohomoserine and the beta-addition of water to produce L-threonine.
