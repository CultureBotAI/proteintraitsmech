identifier: InterPro:IPR042274
label: "Regulatory protein YycH/YycI , domain 2"
definition: >-
  This entry represents domain 2 found in YycH and YycI proteins which share the same structural fold. Both YycH and YycI are always found in pair on the chromosome, downstream of the essential histidine kinase YycG. Additionally, both proteins share a function in regulating the YycG kinase with which they appear to form a ternary complex. Lastly, the two proteins always contain an N-terminal transmembrane helix and are localized to the periplasmic space as shown by PhoA fusion studies. YycI and YycH proteins interact to control the activity of the YycG kinase. Both YycI and YycH proteins are localized outside the cytoplasm and attached to the membrane by an N-terminal transmembrane sequence. Bacterial two-hybrid data showed that the YycH, YycI, and the kinase YycG form a ternary complex. The data suggest that YycH and YycI control the activity of YycG in the periplasm and that this control is crucial in regulating important cellular processes.
