identifier: InterPro:IPR037176
label: "Osmotin/thaumatin-like superfamily"
definition: >-
  Thaumatin is an intensely sweet-tasting protein, 100 000 times sweeter than sucrose on a molar basis found in berries from Thaumatococcus daniellii, a tropical flowering plant known as Katemfe. When attacked by viroids, single-stranded unencapsulated RNA molecules that do not code for protein, thaumatin is induced. Thaumatin consists of about 200 residues and contains 8 disulphide bonds. Like other PR proteins, thaumatin is predicted to have a mainly β structure, with a high content of β-turns and little helix. Osmotin belongs to the PR-5 protein family whose members are homologous to thaumatin. Osmotin and other PR-5 proteins were shown to have antifungal activity in vitro against a broad range of fungi, including several plant pathogens.
