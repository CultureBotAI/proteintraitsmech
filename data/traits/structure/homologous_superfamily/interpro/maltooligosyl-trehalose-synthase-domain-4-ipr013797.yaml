identifier: InterPro:IPR013797
label: "Maltooligosyl trehalose synthase, domain 4"
definition: >-
  Maltooligosyl trehalose synthase ( ) is one of two enzymes in the coupled trehalose biosynthesis system in the archaea Sulfolobus acidocaldarius. This enzyme catalyses the conversion of maltopentaose to maltotriosyltrehalose, which is further hydrolysed by maltooligosyl trehalose trehalohydrolase to produce trehalose and maltotriose.
