identifier: InterPro:IPR009027
label: "Large ribosomal subunit protein bL9/RNase H1, N-terminal"
definition: >-
  The N-terminal domain of the large ribosomal subunit protein bL9 (previously known as ribosomal protein L9) is a regulatory RNA-binding module that binds to 23rRNA. bL9 is composed of two domains and functions as a structural protein in the large subunit of the ribosome. The N-terminal domain of eukaryotic RNase HI, which is lacking in retroviral and prokaryotic enzymes, shows a striking structural similarity to the bL9 N-terminal domain, and may also function as a regulatory RNA-binding module. Eukaryotic RNases HI possess either one or two copies of the small N-terminal domain, in addition to the well-conserved catalytic RNase H domain. RNase HI belongs to the family of ribonuclease H enzymes that recognise RNA:DNA hybrids and degrade the RNA component.
