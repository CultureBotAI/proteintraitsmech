identifier: InterPro:IPR011066
label: Mechanosensitive ion channel MscS, C-terminal domain superfamily
definition: >-
  MscS is a mechanosensitive channel present in the membrane of bacteria, archaea and eukaryote thsat responds both to stretching of the cell membrane and to membrane depolarisation. MscS folds as a homo-heptamer with a cylindrical shape, and can be divided into transmembrane and extra membrane regions: an N-terminal periplasmic region, a transmembrane region, and a C-terminal cytoplasmic region (middle and C-terminal domains). The MscS family of channels shows diversity in size and sequence between its members; most of the diversity occurs in the size of the transmembrane region, which ranges from three to eleven transmembrane helices, although the three C-terminal helices are conserved. This superfamily represents the C-terminal domain of MscS, which has an α/β structure and, together with the middle domain, creates a framework that connects to the cytoplasm through distinct openings.
