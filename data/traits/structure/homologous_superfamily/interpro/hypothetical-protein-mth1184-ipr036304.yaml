identifier: InterPro:IPR036304
label: "Hypothetical protein MTH1184"
definition: >-
  Members of this superfamily consist of a β-sheet region followed by an α-helix and an unstructured C terminus. The β-sheet region contains a CXCX...XCXC sequence with Cys residues located in two proximal loops and pointing towards each other. This precise function of this set of archaeal proteins is, as yet, unknown.
