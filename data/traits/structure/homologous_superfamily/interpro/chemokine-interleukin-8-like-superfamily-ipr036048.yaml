identifier: InterPro:IPR036048
label: Chemokine interleukin-8-like superfamily
definition: >-
  Many low-molecular weight factors secreted by cells including fibroblasts, macrophages and endothelial cells, in response to a variety of stimuli such as growth factors, interferons, viral transformation and bacterial products, are structurally related. Most members of this family of proteins seem to have mitogenic, chemotactic or inflammatory activities. These small cytokines are also called intercrines or chemokines. They are cationic proteins of 70 to 100 amino acid residues that share four conserved cysteine residues involved in two disulphide bonds, as shown in the following schematic representation: +------------------------------------+ | | xxxxxxxxxxxxxxxxxxxxxxCxCxxxxxxxxxxxxxxxxxxxxxxxCxxxxxxxxxxxxCxxxxx | | +-------------------------+ 'C': conserved cysteine involved in a disulphide bond. Chemokines can be sorted into main groups based on the spacing of the two amino-terminal cysteines. In the first group (see ), the two cysteines are separated by a single residue (C-x-C), while in the second group (see ), they are adjacent (C-C).
