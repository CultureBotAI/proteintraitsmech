identifier: InterPro:IPR038534
label: "Rtr1/RPAP2 domain superfamily"
definition: >-
  This superfamily includes a domain found in the human RPAP2 (RNAP II associated polypeptide) protein and in the yeast Rtr1 protein. It has been suggested that this group of proteins are regulators of core RNA polymerase II function.
