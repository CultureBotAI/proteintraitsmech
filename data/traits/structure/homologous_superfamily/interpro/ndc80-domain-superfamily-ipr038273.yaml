identifier: InterPro:IPR038273
label: "Ndc80 domain superfamily"
definition: >-
  This entry represents a domain found in the kinetochore protein Ndc80. Ndc80 acts as a component of the NMS (Ndc80-MIND-Spc7) super complex which has a role in kinetochore function during late meiotic prophase and throughout the mitotic cell cycle. It has been shown that Ndc80 from yeast is part of a complex called the Ndc80p complex. The four Ndc80 complex subunits associate as two rod-like heterodimers (Ndc80:Nuf2 and Spc24:Spc25). This complex is thought to bind to the microtubules of the spindle.
