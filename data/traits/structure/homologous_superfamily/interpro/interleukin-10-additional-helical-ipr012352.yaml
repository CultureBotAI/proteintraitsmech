identifier: InterPro:IPR012352
label: "Interleukin-10, additional helical"
definition: >-
  Human interleukin-10 (IL-10) is a pleiotropic cytokine that inhibits cell-mediated immune responses, primarily by blocking the synthesis of pro-inflammatory cytokines and by inhibiting the expression of cell surface markers involved in antigen presentation and costimulation. In addition, IL-10 acts to enhance humoral immunity. Viral IL-10 homologues act and bind through cellular IL-10 receptors in order to mimic the immunosuppressive properties of cellular IL-10. The structures of both cellular and viral IL-10 cytokines involve the formation of an intertwined dimer, consisting of 3-4 helices from one chain, and two helices from the other chain. This entry represents the extra two helices found in IL-10 cytokines.
