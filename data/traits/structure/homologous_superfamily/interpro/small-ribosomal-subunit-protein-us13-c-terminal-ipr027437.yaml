identifier: InterPro:IPR027437
label: "Small ribosomal subunit protein uS13, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain in proteins of the ribosomal protein family uS13 (previously known as S13). Ribosomal protein uS13 is one of the proteins from the small ribosomal subunit. In Escherichia coli, uS13 is known to be involved in binding fMet-tRNA and, hence, in the initiation of translation. It is a basic protein of 115 to 177 amino-acid residues that contains three helices and a β-hairpin in the core of the protein, forming a helix-two turns-helix (H2TH) motif, and a non-globular C-terminal extension. This family of ribosomal proteins is present in prokaryotes, eukaryotes and archaea.
