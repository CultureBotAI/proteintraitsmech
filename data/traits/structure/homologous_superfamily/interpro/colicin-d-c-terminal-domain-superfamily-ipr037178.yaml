identifier: InterPro:IPR037178
label: Colicin D, C-terminal domain superfamily
definition: >-
  Colicin D is a bacteriocin that kills target cells by cleaving tRNA(Arg). This entry represents a domain found in the C terminus of colicin D, which is responsible for its catalytic activity. The domain is also found in some S-type pyocins, which are also bacteriocins. Structurally, the C-terminal domain of colicin D is composed of an α(2)-β(4)-α fold arranged in two layers (α/β) with antiparallel β sheet.
