identifier: InterPro:IPR024050
label: "AICAR transformylase, insert domain superfamily"
definition: >-
  This domain is found in the enzyme 5-aminoimidazole-4-carboxamide ribonucleotide formyltransferase (AICARFT). AICARFT can be part of a bifunctional enzyme catalysing the last two steps in de novo purine biosynthesis and having also an IMP (Inosine monophosphate) cyclohydrolase (IMPCHase) functional domain. The bifunctional enzyme forms an intertwined dimer where each monomer is composed of two separate functional domains. This superfamily represents a small alpha domain inserted into the AICARFT formyltransferase domain.
