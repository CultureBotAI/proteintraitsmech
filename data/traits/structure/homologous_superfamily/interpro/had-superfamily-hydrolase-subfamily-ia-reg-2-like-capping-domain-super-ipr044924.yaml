identifier: InterPro:IPR044924
label: "HAD-superfamily hydrolase, subfamily IA, REG-2-like, capping domain superfamily"
definition: >-
  This family of proteins includes uncharacterised sequences from eukaryotes, cyanobacteria and Leptospira as well as the DREG-2 protein from Drosophila melanogaster (Fruit fly) which has been identified as a rhythmically (diurnally) regulated gene. This family is a member of the Haloacid Dehalogenase (HAD) superfamily of aspartate-nucleophile hydrolases. The superfamily is defined by the presence of three short catalytic motifs. The subfamilies are defined based on the location and the observed or predicted fold of a so-called, capping domain,, or the absence of such a domain. This family is a member of subfamily 1A in which the cap domain consists of a predicted α helical bundle found in between the first and second catalytic motifs. A distinctive feature of this family is a conserved tandem pair of tryptophan residues in the cap domain. The most divergent sequences included within the scope of this entry are from plants and have "FW" at this position instead. Most likely, these sequences, like the vast majority of HAD sequences, represent phosphatase enzymes. This superfamily represents the inserted capping domain between the first and second catalytic domains.
