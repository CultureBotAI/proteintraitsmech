identifier: InterPro:IPR038209
label: "CKK domain superfamily"
definition: >-
  The CKK domain occurs at the C-terminal in CAMSAP proteins. The structure of the CKK domain is a β-barrel with an associated α-helical hairpin. Characteristically, the CKK domain has a single invariant tryptophan residue within the core of the predicted β-barrel. Residues that interact with this Trp to form part of this core are highly conserved too.
