identifier: InterPro:IPR024064
label: "FdhE-like superfamily"
definition: >-
  This superfamily represents a domain found in formate dehydrogenase accessory protein FdhE and homologues. It consists of an N-terminal five-helical bundle, a tandem repeat of two rubredoxin-like domains and a C-terminal helix packed together.
