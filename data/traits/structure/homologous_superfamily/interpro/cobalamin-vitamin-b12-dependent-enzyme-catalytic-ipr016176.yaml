identifier: InterPro:IPR016176
label: "Cobalamin (vitamin B12)-dependent enzyme, catalytic"
definition: >-
  This superfamily represents a structural domain with a TIM β/α barrel fold found in cobalamin (vitamin B12)-dependent enzymes, including: N-terminal coenzyme A-binding domain of both the alpha and beta subunits of methylmalonyl-CoA mutase ( ) (only the alpha subunit is active). The large subunit of glutamate mutase ( ). The alpha subunit of diol dehydratase ( ). The large subunit of glycerol dehydratase ( ). The alpha subunit of D-lysine 5,6-aminomutase ( ).
