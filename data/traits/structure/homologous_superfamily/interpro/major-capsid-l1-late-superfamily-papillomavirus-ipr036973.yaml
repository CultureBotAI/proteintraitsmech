identifier: InterPro:IPR036973
label: "Major capsid L1 (late) superfamily, Papillomavirus"
definition: >-
  This entry represents the major late capsid protein L1 from Papillomaviruses, such as Human papillomavirus (HPV). Papillomaviruses are members of the papovavirus superfamily. More than 70 different types of papillomavirus have been discovered in humans, some of which have been shown to cause genital carcinomas and cutaneous warts. The viruses contain a circular dsDNA genome surrounded by an icosahedral capsid (non-enveloped). Two proteins are involved in capsid formation: a major (L1) and a minor (L2) protein, in the approximate proportion 95:5%. L1 forms a pentameric assembly unit of the viral shell in a manner that closely resembles VP1 from polyomaviruses. Intermolecular disulphide bonding holds the L1 capsid proteins together. L1 capsid proteins can bind via its nuclear localisation signal (NLS) to karyopherins Kapbeta(2) and Kapbeta(3) and inhibit the Kapbeta(2) and Kapbeta(3) nuclear import pathways during the productive phase of the viral life cycle. Surface loops on L1 pentamers contain sites of sequence variation between HPV types.
