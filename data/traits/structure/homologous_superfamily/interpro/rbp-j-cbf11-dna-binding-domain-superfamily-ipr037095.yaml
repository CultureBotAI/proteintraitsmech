identifier: InterPro:IPR037095
label: RBP-J/Cbf11, DNA binding domain superfamily
definition: >-
  This domain superfamily is found in RBP-J from human and Cbf11 from fission yeast. These proteins function as transcription factors. This domain adopts a β sandwich structure, with nine strands in two β-sheets, in a Greek-key topology, and allow for DNA binding.
