identifier: InterPro:IPR036063
label: "Smr domain superfamily"
definition: >-
  This entry represents the Smr domain superfamily. The structure of the Smr domain has a β-α-β-α-β(2) fold. It is divided into two layers and the strand 4 is antiparallel to the rest. The Smr domain is an around 90-residue domain found in: The C-terminal region of the MutS2 proteins from bacteria and plants, such as Endonuclease MutS2 from Bacillus thuringiensis. The small MutS related (Smr) proteins from bacteria and eukaryotes, including Ribosome rescue factor SmrB from Escherichia coli. Other Smr domain-containing animal and fungal proteins, including human NEDD4-binding protein 2, which has 5'-polynucleotide kinase and nicking endonuclease activity. These proteins could be involved in mismatch repair (MMR) or/and chromosome crossing-over and segregation. It has been proposed that the Smr domain acts as a nicking endonuclease.
