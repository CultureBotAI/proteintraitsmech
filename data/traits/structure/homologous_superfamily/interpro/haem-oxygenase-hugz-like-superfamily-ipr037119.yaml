identifier: InterPro:IPR037119
label: "Haem oxygenase HugZ-like superfamily"
definition: >-
  This entry represents a domain superfamily that can be found in a group of putative haem-iron utilisation proteins, such as HugZ, a class of heme oxygenase that belongs to the PPOX family and lacks homology to the HmuO family. This enzyme releases iron during the conversion of heme to biliverdin.
