identifier: InterPro:IPR029072
label: YebC-like
definition: >-
  This domain is found in uncharacterised proteins, including E. coli protein YebC ( ), a probable transcriptional regulator, and Aq1575 from Aquifex aeolicus. This protein reveals a monomer consisting of three domains arranged along a pseudo threefold symmetry axis.
