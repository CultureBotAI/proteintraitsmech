identifier: InterPro:IPR041884
label: "PilM protein, C-terminal domain"
definition: >-
  This superfamily represents the C-terminal domain of the bacterial protein PilM. PilM is an inner membrane protein that has been predicted to function as a component of the pilin transport apparatus and thin-pilus basal body.
