identifier: InterPro:IPR042566
label: "L1 transposable element, C-terminal domain"
definition: >-
  This superfamily represents a conserved component in the protein ORF1 of the long interspersed nuclear element 1 (LINE-1 or L1) retrotransposon. This domain is designated C-terminal and its sole function is to assist RNA binding to the central RRM domain.
