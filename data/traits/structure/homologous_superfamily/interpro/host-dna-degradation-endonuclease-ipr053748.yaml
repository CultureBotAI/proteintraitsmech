identifier: InterPro:IPR053748
label: "Host DNA Degradation Endonuclease"
definition: >-
  This superfamily of proteins includes enzymes that are involved in the degradation of host DNA, which is a process that facilitates the recycling of nucleotides for the synthesis of viral DNA. Members of this superfamily exhibit sequence-specific endonuclease activity, cleaving the bottom strand of double-stranded DNA at specific motifs. The cleavage typically occurs adjacent to recognized DNA sequences, allowing these enzymes to make precise cuts in the DNA. The specificity of these enzymes is such that they do not cleave their own viral DNA, which is modified to prevent self-digestion. This modification usually involves the presence of modified bases, such as 5-hydroxymethylcytosine, in place of the typical cytosine found in host DNA.
