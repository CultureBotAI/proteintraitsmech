identifier: InterPro:IPR036271
label: "Tetracyclin repressor-like, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal domain found in a number of different TetR transcription regulator proteins. TetR regulates the expression of the membrane-associated tetracycline resistance protein, TetA, which exports the tetracycline antibiotic out of the cell before it can attach to the ribosomes and inhibit protein synthesis. TetR blocks transcription from the genes encoding both TetA and TetR in the absence of antibiotic. The C-terminal domain is multi-helical and is interlocked in the homodimer with the helix-turn-helix (HTH) DNA-binding domain. Other members of the TetR family of transcriptional regulators carry this C-terminal domain. These include: QacR from Staphylococcus aureus, a multidrug binding protein that represses transcription of the qacA multidrug transporter gene Ethr, a repressor from Mycobacterium tuberculosis implicated in ethionamide drug resistance CprB, a gamma-butyrolactone autoregulator/receptor from Streptomyces coelicolor that acts as a DNA-binding protein YcdC, a hypothetical transcriptional regulator from Escherichia coli YsiA, YfiR, and YxaF, hypothetical transcriptional regulators from Bacillus subtilis YbiH, a hypothetical transcriptional regulator from Salmonella typhimurium
