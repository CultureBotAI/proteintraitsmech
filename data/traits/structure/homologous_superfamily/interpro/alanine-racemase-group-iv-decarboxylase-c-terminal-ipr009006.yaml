identifier: InterPro:IPR009006
label: Alanine racemase/group IV decarboxylase, C-terminal
definition: >-
  This superfamily represents a β-barrel domain found at the C-terminal of alanine racemase ( ) and in group IV pyridoxal-5'-phosphate (PLP)-dependent decarboxylases, such as eukaryotic ornithine decarboxylase ( ), arginine decarboxylase ( ) and diaminopimelate decarboxylase ( ). These enzymes belong to the same structural family. Alanine racemase plays a role in providing the D-alanine required for cell wall biosynthesis by isomerising L-alanine to D-alanine. Proteins containing this domain are found in both prokaryotic and eukaryotic proteins. The molecular structure of alanine racemase from Bacillus stearothermophilus (Geobacillus stearothermophilus) was determined by X-ray crystallography to a resolution of 1.9 A. The alanine racemase monomer is composed of two domains, an eight-stranded α/β barrel at the N-terminal and a C-terminal domain essentially composed of β-strands. The pyridoxal 5'-phosphate (PLP) cofactor lies in and above the mouth of the α/β barrel and is covalently linked via an aldimine linkage to a lysine residue, which is at the C terminus of the first β-strand of the α/β barrel. Eukaryotic ornithine decarboxylase (ODC) acts as a homodimer to produce putrescine (1,4-diaminobutane) from ornithine, where putrescine is the precursor of other polyamines in animals, plants, and bacteria. Arginine decarboxylase is also involved in putrescine biosynthesis. This is the first committed step in polyamine biosynthesis. Alanine racemase is a structurally homologous enzyme. Both proteins share a common α/β barrel that binds the cofactor via a Schiff base on the C-terminal end of the barrel. Diaminopimelate decarboxylase (DapDC) catalyses the final step of lysine biosynthesis in bacteria.
