identifier: InterPro:IPR036191
label: "RRF superfamily"
definition: >-
  The ribosome recycling factor or ribosome release factor (RRF) dissociates ribosomes from mRNA after termination of translation, and is essential for bacterial growth. Thus ribosomes are 'recycled' and ready for another round of protein synthesis. Structurally, it is an L-shaped molecule.
