identifier: InterPro:IPR011070
label: "Globular protein, non-globular alpha/beta subunit"
definition: >-
  Certain globular proteins from different functional families contain non-globular α+β subunits. These proteins do not form a true superfamily, but share a similar topology in their non-globular subunits. Proteins that display this structure include phycoerythrin alpha subunits ( ), which are light-harvesting biliproteins found in cryptomonads, the chaperone-binding domain of the virulence effector SptP from Salmonella typhimurium, which acts to modulate host cellular responses, and the ubiquinol-cytochrome c reductase 8kDa protein ( ), an integral membrane protein complex essential to cellular respiration.
