identifier: InterPro:IPR042569
label: "Ribosome-associated complex head domain superfamily"
definition: >-
  The ribosome-associated complex (RAC) head domain is involved in ribosome binding. It can be found at the C terminus of the yeast Zuotin (Zuo1) protein. Zuo1 is a component of RAC, a stable ribosome-associated heterodimer that functions as a chaperone at the ribosome. Structurally this superfamily represents a unique α-helical domain.
