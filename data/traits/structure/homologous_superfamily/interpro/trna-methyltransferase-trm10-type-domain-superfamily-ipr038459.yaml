identifier: InterPro:IPR038459
label: "tRNA methyltransferase TRM10-type domain superfamily"
definition: >-
  This entry represents a domain found in TRM10-type methyltransferases, which belong to class IV SAM-dependent methyltransferases (SPOUT family). These enzymes function as homodimers and exclusively methylate RNA substrates. The SPOUT fold comprises a five-stranded β-sheet flanked by two layers of α-helices, organised into two α/β subdomains: an N-terminal Rossmann-like fold and a C-terminal region containing a characteristic topological trefoil knot where SAM binding occurs. The active site is located at the dimer interface and is formed by residues from both monomers. TRM10-type methyltransferases, which include tRNA (guanine(9)-N1)-methyltransferase, tRNA (adenine(9)-N1)-methyltransferase and related enzymes, are widely distributed in eukaryotes and archaea but are absent from bacteria. Transfer RNA molecules contain numerous modified nucleosides, particularly within the anticodon region, which are introduced by various tRNA-modifying enzymes prior to the formation of mature tRNA. Among these modifications, N1-methylguanine (m1G) at position 37 is catalysed by tRNA (guanine-N1)-methyltransferase , which transfers a methyl group from S-adenosyl-L-methionine (SAM) to guanosine, yielding S-adenosyl-L-homocysteine and m1G37-containing tRNA. This modification occurs in tRNAs that decode CUN (leucine), CCN (proline) and CGG (arginine) codons. The presence of m1G37 enhances cellular growth rate and polypeptide synthesis efficiency while preventing ribosomal frameshifting. Studies have demonstrated that the conformation of the anticodon loop may be a major determinant for m1G37 formation in vivo.
