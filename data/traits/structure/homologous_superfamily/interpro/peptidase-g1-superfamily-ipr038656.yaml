label: "Peptidase G1 superfamily"
definition: >-
  The peptidases in superfamily G1 form a subset of what were formerly termed 'pepstatin-insensitive carboxyl proteinases'. After its discovery in about 1970, the pentapeptide pepstatin soon came to be thought of as a very general inhibitor of the endopeptidases that are active at acidic pH. But more recently several acid-acting endopeptidases from bacteria and fungi had been found to be resistant to pepstatin. The unusual active sites of the 'pepstatin-insensitive carboxyl peptidases' proved difficult to characterise, but it has now been established that the enzymes from bacteria are acid-acting serine peptidases in superfamily S53 (clan SB), whereas the fungal enzymes are in superfamily G1 (formerly A4). The importance of glutamate ('E') and glutamine ('Q') residues in the active sites of the superfamily G1 enzymes led to the superfamily name, Eqolisin. This group of glutamate/glutamine peptidases belong to MEROPS peptidase superfamily G1 (eqolisin superfamily, clan GA). An example of this group is scytalidoglutamic peptidase. The proteins are thermostable, pepstatin insensitive and are active at low pH ranges. The enzyme has a unique heterodimeric structure, with a 39-residue light chain and a 173-residue heavy chain bound to each other non-covalently. The tertiary structure of the active site of scytalidoglutamic peptidase (MEROPS G01.001) with a bound tripeptide product has been interpreted as showing that Glu136 is the primary catalytic residue. The most likely mechanism is suggested to be nucleophilic attack by a water molecule activated by the Glu136 side chain on the si-face of the scissile peptide bond carbon atom to form the tetrahedral intermediate. Electrophilic assistance, and oxyanion stabilisation, are provided by the side-chain amide of Gln53. Both scyta…
