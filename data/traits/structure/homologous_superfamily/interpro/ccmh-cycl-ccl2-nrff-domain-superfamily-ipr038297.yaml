identifier: InterPro:IPR038297
label: "CcmH/CycL/Ccl2/NrfF domain superfamily"
definition: >-
  This superfamily represents a domain found in NrfF, CcmH and Ccl2. CcmH is part of the CcmFH complex, which is the system I holocytochrome c synthetase. NrfF is not required for the biogenesis of c-type cytochromes.
