identifier: InterPro:IPR023696
label: "Ureohydrolase domain superfamily"
definition: >-
  This entry represents hydrolases that cleave carbon-nitrogen bonds other than peptide bonds ([ec:3.5.-.-]). It includes mainly members of the ureohydrolase superfamily. It also represents the histone deacetylase family ( ) and other related hydrolases. The ureohydrolase superfamily includes arginase ( ), agmatinase ( ), formimidoylglutamase (also known as formiminoglutamase; ) and proclavaminate amidinohydrolase ( ). These enzymes share a 3-layer α-β-α structure, and play important roles in arginine/agmatine metabolism, the urea cycle, histidine degradation, and other pathways. Arginase, which catalyses the conversion of arginine to urea and ornithine, is one of the five members of the urea cycle enzymes that convert ammonia to urea as the principal product of nitrogen excretion. There are several arginase isozymes that differ in catalytic, molecular and immunological properties. Deficiency in the liver isozyme leads to argininemia, which is usually associated with hyperammonemia. Agmatinase hydrolyses agmatine to putrescine, the precursor for the biosynthesis of higher polyamines, spermidine and spermine. In addition, agmatine may play an important regulatory role in mammals.
