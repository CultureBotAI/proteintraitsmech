identifier: InterPro:IPR037243
label: "Viral leader polypeptide zinc finger"
definition: >-
  This is the N-terminal domain of a family of virion proteins which contains a zinc finger domain. Its structure consists of a small β-hairpin with CxH motif and a short helix with CxxC motif. This protein was recently shown to inhibit cellular nucleocytoplasmic transport.
