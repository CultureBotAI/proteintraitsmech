identifier: InterPro:IPR042531
label: "Phospholipase C-beta, C-terminal domain superfamily"
definition: >-
  The distal α helical C-terminal domain (CTD) of phospholipase C beta (PLC-beta) has key roles in membrane targeting and in optimising the orientation of the catalytic core at the membrane for maximal rates of lipid hydrolysis. Structurally, it consists of a helical bundle with three antiparallel segments.
