identifier: InterPro:IPR038523
label: "AmiS/UreI transporter superfamily"
definition: >-
  Helicobacter pylori is a Gram-negative, ureolytic bacteria that can colonise the human stomach. It does not survive in a medium with a pH less than 4.0 unless urea is present, preferring a neutral pH. Gastric juice urea is able to rapidly access intrabacterial urease when the periplasmic pH falls below approximately 6.2 owing to pH-gating of a urea channel, UreI. UreI is a six-transmembrane segment protein that is homologous to the amiS genes of the amidase gene cluster and to UreI of Helicobacter hepaticus and Streptococcus salivarius. UreI in H. pylori and H. hepaticus can transport urea only at acidic pH, whereas that of S. salivarius is open at both neutral and acidic pH. The amiS gene encodes an 18kDa protein with a high content of hydrophobic residues. It has six transmembrane helices. AmiB and AmiS resemble two components of an ABC transporter system. This superfamily includes UreI and proton gated urea channel as well as putative amide transporters AmiS.
