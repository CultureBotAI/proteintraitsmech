identifier: InterPro:IPR038602
label: "Mite allergen, group-7 superfamily"
definition: >-
  This entry contains proteins that cause an allergic reaction in humans. Common symptoms of mite allergy are bronchial asthma, allergic rhinitis and conjunctivitis. The structure of the dust mite allergen Der f 7 from Dermatophagoides farinae is an elongated and curved molecule consisting of two anti-parallel β-sheets (one 4-stranded and the other 5-stranded) that wrap around a long C-terminal helix. Its homologue Der p 7 from Dermatophagoides pteronyssinus has a similar structure, but it differs slightly in the beta1-beta2 loop region, which is proximal to the IgE epitope and responsible of the thermal stability.
