identifier: InterPro:IPR042532
label: "Exocyst complex component EXOC3/Sec6, C-terminal domain"
definition: >-
  Sec6 is a component of the multiprotein exocyst complex. Sec6 interacts with Sec8, Sec10 and Exo70. These exocyst proteins localise to regions of active exocytosis-at the growing ends of interphase cells and in the medial region of cells undergoing cytokinesis-in an F-actin-dependent and exocytosis-independent manner. This superfamily represents the C-terminal domain found in EXOC3/Sec6. Structurally, this domain consists of multiple helical bundles.
