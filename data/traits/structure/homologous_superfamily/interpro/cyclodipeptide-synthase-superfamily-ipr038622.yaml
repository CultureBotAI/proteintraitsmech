identifier: InterPro:IPR038622
label: Cyclodipeptide synthase superfamily
definition: >-
  Cyclodipeptide synthase (CDPS) is a tRNA-dependent peptide bond-forming enzyme that uses aminoacyl-tRNAs (aa-tRNAs) as substrates to synthesise the two peptide bonds of various cyclodipeptides, which are the precursors of many natural products with biological activities. This entry includes the cyclodityrosine synthase from Mycobacterium tuberculosis (an essential gene), the cyclo(L-Phe-L-Leu) synthase from Streptomyces noursei and cyclodileucine synthase YvmC from Bacillus licheniformis. Many cyclodipeptide synthases are found next to a cytochrome P450 that further modifies the product.
