identifier: InterPro:IPR037190
label: "LIS1, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Lissencephaly-1 (LIS1). LIS1 is required for nuclear migration in fungi, cell cycle progression in mammals, and the formation of a folded cerebral cortex in humans. They appear to regulate the mechanical behaviour of cytoplasmic dynein, the primary minus-end-directed microtubule motor. Proteins containing this domain include: Platelet-activating factor acetylhydrolase IB subunit alpha, also known as Lissencephaly-1 protein. Nuclear distribution protein PAC1 from budding yeasts. Fungal nuclear distribution protein nudF. Mutations in the LIS1 gene cause Lissencephaly-1, a classical lissencephaly characterised by agyria or pachygyria and disorganization of the clear neuronal lamination of normal six-layered cortex.
