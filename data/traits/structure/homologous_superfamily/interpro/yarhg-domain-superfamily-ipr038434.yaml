identifier: InterPro:IPR038434
label: "YARHG domain superfamily"
definition: >-
  This presumed extracellular domain is about 70 amino acids in length. It is named YARHG after a conserved motif in the sequence. This domain is associated with peptidases and bacterial kinase proteins. Its molecular function is unknown.
