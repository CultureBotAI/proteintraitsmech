identifier: InterPro:IPR036881
label: "Glycoside hydrolase family 3 C-terminal domain superfamily"
definition: >-
  Glycoside hydrolase family 3 comprises enzymes with a number of known activities; beta-glucosidase ( ); beta-xylosidase ( ); N-acetyl beta-glucosaminidase ( ); glucan beta-1,3-glucosidase ( ); cellodextrinase( ); exo-1,3-1,4-glucanase ( ). These enzymes are two-domain globular proteins that are N-glycosylated at three sites. This entry represents the C-terminal domain superfamily, involved in catalysis and may be involved in binding beta-glucan. Its structure has a flavodoxin-like fold, which consists of three layers (α/β/α) with parallel β-sheet of five strand.
