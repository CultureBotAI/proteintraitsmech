identifier: InterPro:IPR037923
label: "Transcription regulator HTH-like"
definition: >-
  Numerous bacterial transcription regulatory proteins bind DNA via a helix-turn-helix (HTH) motif. This entry defines the ligand-binding and dimerisation domain of HTH-type transcriptional regulators.
