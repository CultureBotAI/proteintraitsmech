identifier: InterPro:IPR036515
label: "Transposase IS200-like superfamily"
definition: >-
  Transposases are needed for efficient transposition of the insertion sequence or transposon DNA. This entry represents a domain superfamily found in transposases for IS200 from Escherichia coli. The structure of this domain has a ferredoxin-like fold, which consists of an α-β sandwich with antiparallel β-sheet.
