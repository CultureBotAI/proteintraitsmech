identifier: InterPro:IPR044941
label: "Ethanolamine ammonia-lyase heavy chain, N-terminal domain"
definition: >-
  This superfamily represents the N-terminal domain found in several bacterial ethanolamine ammonia-lyase heavy chain (EutB) (also known as ethanolamine ammonia lyase large subunit and ethanolamine ammonia-lyase alpha subunit) proteins. Ethanolamine ammonia-lyase is a bacterial enzyme that catalyses the adenosylcobalamin-dependent conversion of certain vicinal amino alcohols to oxo compounds and ammonia. The enzyme consists of EutB and EutC (beta-subunit) subunits which form a trimer composed of the (α-β)2 dimer.
