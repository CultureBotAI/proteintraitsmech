identifier: InterPro:IPR043003
label: "FANCL, UBC-like domain 3 superfamily"
definition: >-
  This superfamily represents the third of three UBC-like domains found in the FANCL protein, which is the catalytic E3 ubiquitin ligase subunit of the FA complex (Fanconi anaemia). Structurally, it consists of 3 α helices and 4 β strands. FancL is the ubiquitin ligase protein that mediates ubiquitination of FancD2, a key step in the DNA damage pathway. FancL belongs to the multisubunit Fanconi anemia (FA) complex, which is composed of subunits: FancA, FancB, FancC, FancE, FancF, FancG, FancL/PHF9 and FancM. The WD repeats are required for interaction of FancL with other subunits of the FA complex. In humans defects in FancL are a cause of Fanconi anemia (FA) , and the FA complex is not found in FA patients. FA is a genetically heterogeneous, autosomal recessive disorder characterised by progressive pancytopenia, a diverse assortment of congenital malformations, and a predisposition to the development of malignancies. At the cellular level it is associated with hypersensitivity to DNA-damaging agents, chromosomal instability (increased chromosome breakage), and defective DNA repair.
