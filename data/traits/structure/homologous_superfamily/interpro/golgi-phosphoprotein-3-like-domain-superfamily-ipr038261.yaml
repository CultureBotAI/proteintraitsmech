identifier: InterPro:IPR038261
label: "Golgi phosphoprotein 3-like domain superfamily"
definition: >-
  This superfamily represents a domain found in several eukaryotic GPP34 like proteins. GPP34 (also known as golgi phosphoprotein 3) localises to the Golgi complex and is conserved from Saccharomyces cerevisiae to humans. The cytosolically exposed location of GPP34 predicts a role for a novel coat protein in Golgi trafficking. The budding yeast GPP34 homologue, also known as Vps74, is a phosphatidylinositol-4-phosphate-binding protein that links Golgi membranes to the cytoskeleton and may participate in the tensile force required for vesicle budding from the Golgi.
