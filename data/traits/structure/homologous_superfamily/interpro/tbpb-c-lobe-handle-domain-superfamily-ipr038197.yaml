identifier: InterPro:IPR038197
label: "TbpB, C-lobe handle domain superfamily"
definition: >-
  Bacterial lipoproteins represent a large group of specialised membrane proteins that perform a variety of functions including maintenance and stabilisation of the cell envelope, protein targeting and transit to the outer membrane, membrane biogenesis, and cell adherence. Pathogenic Gram-negative bacteria within the Neisseriaceae and Pasteurellaceae families rely on a specialised uptake system, characterised by an essential surface receptor complex that acquires iron from host transferrin (Tf) and transports the iron across the outer membrane. They have an iron uptake system composed of surface-exposed lipoprotein, Tf-binding protein B (TbpB), and an integral outer-membrane protein, Tf-binding protein A (TbpA), that together function to extract iron from the host iron-binding glycoprotein (Tf). TbpB is a bilobed (N and C lobe) lipid-anchored protein with each lobe consisting of an eight-stranded β barrel flanked by a 'handle' domain made up of four (N lobe) or eight (C lobe) β strands. TbpB extends from the outer membrane surface by virtue of an N-terminal peptide region that is anchored to the outer membrane by fatty acyl chains on the N-terminal cysteine and is involved in the initial capture of iron-loaded Tf. This domain superfamily is found in the handle domain of the C lobe (domain C) of TbpB proteins. It consists of a squashed six-stranded β sheet flanked by two antiparallel β strands and has no supporting α helix as in the N lobe.
