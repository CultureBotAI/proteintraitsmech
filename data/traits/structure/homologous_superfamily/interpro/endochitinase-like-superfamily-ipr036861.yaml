identifier: InterPro:IPR036861
label: "Endochitinase-like superfamily"
definition: >-
  A number of plant and fungal proteins that bind N-acetylglucosamine (e.g. solanaceous lectins of tomato and potato, plant endochitinases, the wound-induced proteins: hevein, win1 and win2, and the Kluyveromyces lactis killer toxin alpha subunit) contain this domain. The domain may occur in one or more copies and is thought to be involved in recognition or binding of chitin subunits. In chitinases, as well as in the potato wound-induced proteins, the 43-residue domain directly follows the signal sequence and is therefore at the N terminus of the mature protein; in the killer toxin alpha subunit it is located in the central section of the protein.
