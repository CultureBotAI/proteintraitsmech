identifier: InterPro:IPR036349
label: "Integrin beta tail domain superfamily"
definition: >-
  Integrins are the major metazoan receptors for cell adhesion to extracellular matrix proteins and, in vertebrates, also play important roles in certain cell-cell adhesions, make transmembrane connections to the cytoskeleton, and activate many intracellular signalling pathways. An integrin receptor is a heterodimer composed of alpha and beta subunits. Each subunit crosses the membrane once, with most of the polypeptide residing in the extracellular space, and has two short cytoplasmic domains. Some members of this family have EGF repeats at the C terminus and also have a VWA domain inserted within the integrin domain at the N-terminal. Most integrins recognise relatively short peptide motifs and, in general, require an acidic amino acid to be present. Ligand specificity depends upon both the alpha and beta subunits. There are at least 18 types of alpha and 8 types of beta subunits recognised in humans. Each alpha subunit tends to associate only with one type of beta subunit, but there are exceptions to this rule. Each association of alpha and beta subunits has its binding specificity and signalling properties. Many integrins require activation on the cell surface before they can bind ligands. Integrins frequently intercommunicate, and binding at one integrin receptor activates or inhibits another. This entry represents the tail domain of the integrin beta subunit. It forms a four-stranded β-sheet that contains parallel and antiparallel strands and faces an α helix found at the N terminus of this domain. Interactions between the α-helix and the β-sheet are mostly hydrophobic and involve a disulphide bond. The rear of the β sheet is covered with a long A-B loop.
