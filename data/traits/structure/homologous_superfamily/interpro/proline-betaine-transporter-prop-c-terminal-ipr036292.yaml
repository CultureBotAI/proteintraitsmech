identifier: InterPro:IPR036292
label: "Proline/betaine transporter ProP, C-terminal"
definition: >-
  The osmosensory transporter coiled coil is a C-terminal domain found in various bacterial osmoprotective transporters, such as ProP (proline/betaine transporter), proline permease 2, and the citrate proton symporters. It adopts an antiparallel coiled-coil structure and is essential for osmosensory and osmoprotectant transporter function. ProP is a proton symporter that senses osmotic shifts and responds by importing osmolytes such as proline, glycine betaine, stachydrine, pipecolic acid, ectoine and taurine, functioning as both an osmosensor and an osmoregulator that participates early in the bacterial osmoregulatory response. Similarly, OusA is involved in the uptake and accumulation of various osmoprotectants, including glycine betaine, proline, ectoine and pipecolic acid, and may also be a contributory factor in infection progression within the host.
