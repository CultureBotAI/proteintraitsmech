identifier: InterPro:IPR038601
label: "MttB-like superfamily"
definition: >-
  This superfamily consists of several trimethylamine methyltransferase (MTTB) proteins. This enzyme, which catalyses the transfer of a methyl group from trimethylamine to a trimethylamine-specific corrinoid protein (MttC), is involved in methanogenesis from trimethylamine. This superfamily also includes MtgB, a glycine betaine methyltransferase.
