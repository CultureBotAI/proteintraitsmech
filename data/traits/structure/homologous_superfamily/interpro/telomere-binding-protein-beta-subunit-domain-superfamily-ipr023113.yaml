identifier: InterPro:IPR023113
label: "Telomere-binding protein, beta subunit domain superfamily"
definition: >-
  Telomeres are specialised protein-DNA complexes that compose the ends of eukaryotic chromosomes. Telomeres protect chromosome termini from degradation and recombination and act together with telomerase to ensure complete genome replication. TEBP beta forms a complex with TEBP alpha and this complex is able to recognise and bind ssDNA to form a sequence-specific, telomeric nucleoprotein complex that caps the very 3' ends of chromosomes. This superfamily represents a domain found in a family that consists of several telomere-binding protein beta subunits, which represents the OB-binding fold.
