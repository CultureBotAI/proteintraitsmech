identifier: InterPro:IPR035073
label: "At2g17340, three-helix bundle domain"
definition: >-
  This superfamily represents a three-helix bundle domain found at the N-terminal end of the damage-control phosphatase At2g17340 from Arabidopsis thaliana. It is a metal-dependent phosphatase with probable damage-control functions. The C-terminal portion of several eukaryotic pantothenate kinases also contains this domain.
