identifier: InterPro:IPR044928
label: "Secreted effector protein SifA, C-terminal domain superfamily"
definition: >-
  Salmonella typhimurium SifA is an effector protein that alters host cell physiology and promotes bacterial survival in host tissues. This protein is a member of the WxxxE family of bacterial TTSS effectors that mimic activated small GTPases and it is required for endosomal tubulation and formation of Salmonella-induced filaments (Sifs), which are filamentous structures containing lysosomal membrane glycoproteins within epithelial cells. Sif formation is concomitant with intracellular bacterial replication. This superfamily represents the C-terminal WxxxE-containing domain which is organised in two three-helix bundles that form a V-shaped structure. The WxxxE conserved sequence important for both the folding and the secretion of the SifA effector. This domain also includes a six-residue prenylation motif which influences the membrane association and targeting properties of SifA.
