identifier: InterPro:IPR029013
label: "HP0062-like domain superfamily"
definition: >-
  The HP0062 gene codes for a hypothetical small acidic protein in Helicobacter pylori ( ). The HP0062 monomer has a helix-hairpin-helix structure. In the dimer, two monomers are held together by hydrophobic interactions in an antiparallel arrangement, forming a four helix bundle.
