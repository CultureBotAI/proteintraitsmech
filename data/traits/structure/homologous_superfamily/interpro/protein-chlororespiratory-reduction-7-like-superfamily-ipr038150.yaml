identifier: InterPro:IPR038150
label: "Protein CHLORORESPIRATORY REDUCTION 7-like superfamily"
definition: >-
  This entry includes protein from cyanobacteria, blue-green algae and plants, including CRR7 (Chlororespiratory reduction 7) protein from Arabidopsis. CRR7 is part of the chloroplastic NAD(P)H dehydrogenase complex (NDH Complex) involved in respiration, photosystem I (PSI) cyclic electron transport and CO2 uptake. It is likely to be involved in the final step of the formation of the NDH Complex, in which its intermediate is inserted into thylakoids.
