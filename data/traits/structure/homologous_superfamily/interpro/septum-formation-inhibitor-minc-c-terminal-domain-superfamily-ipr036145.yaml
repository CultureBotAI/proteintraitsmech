identifier: InterPro:IPR036145
label: "Septum formation inhibitor MinC, C-terminal domain superfamily"
definition: >-
  In Escherichia coli, three Min proteins (MinC, MinD and MinE) negatively regulate FtsZ assembly at the cell poles in order to ensure the Z-ring only assembles at cell midpoint. MinC inhibits formation of the Z-ring by preventing FtsZ assembly. MinD binds to MinC near the cell poles, sequestering MinC away from the cell midpoint so the Z-ring can form there. MinC is an oligomer, probably a dimer, that consists of two domains: the N-terminal domain is responsible for FtsZ inhibition, while the C-terminal domain is responsible for binding to MinD and to a component of the division septum. The MinC C-terminal domain has a single-stranded right-handed β-helix fold made of parallel β-strands and short turns, involved in dimer formation.
