identifier: InterPro:IPR008977
label: "PHM/PNGase F domain superfamily"
definition: >-
  Peptidyl-glycine alpha-amidating monooxygenase (PAM) is involved in the amidation of of bioactive peptides. It has two enzymatically active domains with catalytic activities -peptidylglycine alpha-hydroxylating monooxygenase (PHM) and peptidyl-alpha-hydroxyglycine alpha-amidating lyase (PAL), each of which binds one copper atom.
