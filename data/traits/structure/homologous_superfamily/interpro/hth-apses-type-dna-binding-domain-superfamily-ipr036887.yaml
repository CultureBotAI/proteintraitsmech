label: "HTH APSES-type DNA-binding domain superfamily"
definition: >-
  The APSES domain, named after five founding members (ASM-1, Phd1, StuA, EFG1 and Sok2), is a sequence-specific DNA-binding domain of approximately 110 residues found in a family of fungal transcription factors and other DNA-binding proteins. This domain is often found in association with ankyrin repeats (see ) and a heterodimerisation domain. Structurally, the APSES domain adopts a winged helix-turn-helix (HTH) fold, consisting of a six-stranded β-sheet packed against two pairs of α-helices. The αA/αB helical pair corresponds to the canonical HTH motif responsible for DNA recognition. APSES domain-containing proteins are widespread among fungi and are involved in diverse cellular processes, including cell cycle regulation, morphogenesis and development. Representative members include: Saccharomyces cerevisiae Mlu1 box-binding protein MBP1 ( ), which together with Swi6 forms the MBF (Mlu1-binding factor) transcription factor complex that binds to Mlu1 cell-cycle box (MCB) elements in the promoters of DNA synthesis genes. Schizosaccharomyces pombe cell division cycle-related proteins Res1/Sct1 ( ) and Res2/Pct1 ( ), which are functional homologues of MBP1. S. pombe starts control protein Cdc10 ( ). Aspergillus nidulans developmental regulator StuA ( ), which controls the transformation of undifferentiated hyphal elements into complex multicellular structures. S. cerevisiae transcription factor Phd1 ( ). S. cerevisiae protein Sok2 ( ), a repressor of the transition from unicellular growth to pseudohyphal development. Candida albicans enhanced filamentous growth protein Efg1 ( ). Neurospora crassa ascospore maturation protein Asm-1 ( ), which functions in spore maturation. S. pombe bouquet formation protein Bqt4 ( ), a nuclear membrane protein that connects telomeres to th…
