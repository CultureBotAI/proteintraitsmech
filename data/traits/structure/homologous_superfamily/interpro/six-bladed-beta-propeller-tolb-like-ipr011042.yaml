identifier: InterPro:IPR011042
label: "Six-bladed beta-propeller, TolB-like"
definition: >-
  This superfamily represents a six-bladed β-propeller domain consisting of six 4-stranded β-sheet motifs. This domain can be found in TolB proteins (C-terminal), in soluble quinoprotein glucose dehydrogenase, in calcium-dependent phosphotriesterases, in the low-density lipoprotein (LDL) receptor YWTD domain, in nidogen, and in the serine/threonine-protein kinase (PknD) NHL repeat domain. TolB is a periplasmic protein from Escherichia coli that is part of the Tol-dependent translocation system involving group A and E colicins that is used to penetrate and kill cells. TolB has two domains: an α-helical N-terminal domain that shares structural similarity with the C-terminal domain of transfer RNA ligases and a β-propeller C-terminal domain that shares structural similarity with numerous members of the prolyl oligopeptidase family and, to a lesser extent, with class B metallo-beta-lactamases (although it does not necessarily occur at the C-terminal in these proteins). The C-terminal domain of TolB may mediate protein-protein interactions with colicins.
