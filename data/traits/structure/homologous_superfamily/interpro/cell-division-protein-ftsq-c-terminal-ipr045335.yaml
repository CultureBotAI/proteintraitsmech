identifier: InterPro:IPR045335
label: "Cell division protein FtsQ, C-terminal"
definition: >-
  FtsQ is an essential cell division protein. It may link together the upstream cell division proteins, which are predominantly cytoplasmic, with the downstream cell division proteins, which are predominantly periplasmic. FtsQ may control the correct divisome assembly. FtsQ has a short N-terminal cytoplasmic domain and a larger C-terminal periplasmic domain. This entry represents the C-terminal region of FtsQ.
