identifier: InterPro:IPR038087
label: "DNA-directed RNA polymerase subunit delta, N-terminal domain superfamily"
definition: >-
  This entry includes DNA-directed RNA polymerase subunit delta from Bacillus subtilis. The delta protein is a dispensable subunit of Bacillus subtilis RNA polymerase (RNAP) that has major effects on the biochemical properties of the purified enzyme. In the presence of delta, RNAP displays an increased specificity of transcription, a decreased affinity for nucleic acids, and an increased efficiency of RNA synthesis because of enhanced recycling. The delta protein, contains two distinct regions, an ordered N-terminal domain and a glutamate and aspartate residue-rich C-terminal region, unordered and flexible. It participates in both the initiation and recycling phases of transcription and also in the adaptation to changes in the environment. This superfamily represents the N-terminal domain of the delta subunit that adopts a DNA/RNA-binding three-helical bundle fold and was shown to interact with RNAP.
