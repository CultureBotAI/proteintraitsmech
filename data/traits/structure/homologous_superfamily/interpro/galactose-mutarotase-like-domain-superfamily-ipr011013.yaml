identifier: InterPro:IPR011013
label: "Galactose mutarotase-like domain superfamily"
definition: >-
  Proteins with this domain belong to the galactose mutarotase-like structural superfamily. The domain has a distorted supersandwich structure consisting of 18 strands in two sheets, and probably functions to bind carbohydrates in enzymes that act on sugars. Domains with this structure occur in several protein families, including galactose mutarotase ( ); domain 5 of beta-galactosidase ( ); domain 2 of Isomaltosyltransferase ( ); the central domain of hyaluronate lyase-like enzymes, such as chondroitinase AC ( ), xanthan lyase ( ), chrondroitin ABC lyase I, and hyaluronate lyase ( ) itself; the N-terminal domain of lactobacillus maltose phosphorylase ( ), 6-glucosyltransferase ( ) and bacterial glucoamylase ( ); the C-terminal domain of eukaryotic alpha-mannosidase ( ) and archaeon 4-alpha-glucanotransferase ( ).
