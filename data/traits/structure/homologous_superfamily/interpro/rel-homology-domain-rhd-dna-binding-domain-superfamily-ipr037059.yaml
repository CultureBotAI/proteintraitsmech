identifier: InterPro:IPR037059
label: "Rel homology domain (RHD), DNA-binding domain superfamily"
definition: >-
  The Rel homology domain (RHD) is found in a family of eukaryotic transcription factors, which includes NF-kappaB, Dorsal, Relish, NFAT, among others. The RHD is composed of two structural domains: the N-terminal DNA binding domain that is similar to that found in P53, the C-terminal domain has an immunoglobulin-like fold (See ) that functions as a dimerisation domain. This entry represents the N-terminal DNA binding domain superfamily.
