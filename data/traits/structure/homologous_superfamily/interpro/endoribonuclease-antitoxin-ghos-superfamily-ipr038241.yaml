label: "Endoribonuclease antitoxin GhoS superfamily"
definition: >-
  GhoS is part of the GhoT-GhoS type V toxin-antitoxin (TA) system. GhoT is inhibited by antitoxin GhoS, which specifically cleaves its mRNA.
