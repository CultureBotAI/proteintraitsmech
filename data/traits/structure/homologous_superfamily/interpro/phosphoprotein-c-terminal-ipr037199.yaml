identifier: InterPro:IPR037199
label: "Phosphoprotein, C-terminal"
definition: >-
  This superfamily includes the C-terminal domain of the M1 phosphoprotein non-structural RNA polymerase alpha subunit ( ) from various strains of Rabies virus. The M1 phosphoprotein is thought to be a component of the active polymerase, and may be involved in template binding. Structurally, this domain consists of six helices and one β-hairpin.
