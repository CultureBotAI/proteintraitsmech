identifier: InterPro:IPR036401
label: "Small ribosomal subunit protein eS17 superfamily"
definition: >-
  These proteins have a DNA/RNA-binding 3-helical bundle fold, which consists of three helices with a close or partly open bundle and right-handed twist going up-and down. A number of eukaryotic and archaebacterial ribosomal proteins can be grouped in this family of ribosomal proteins, eS17 (RPS17). They include, vertebrate, Drosophila and Neurospora crassa (crp-3) eS17's as well as yeast eS17a (RP51A) and eS17b (RP51B) and archaebacterial eS17.
