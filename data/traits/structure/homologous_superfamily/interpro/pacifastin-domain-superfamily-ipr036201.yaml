identifier: InterPro:IPR036201
label: Pacifastin domain superfamily
definition: >-
  This entry represents the pacifastin domain superfamily. Proteins containing this domain are proteinase inhibitors belonging to MEROPS inhibitor family I19 (clan IW) and sharing a pacifastin domain of ~35 residues, which contains a characteristic pattern of six conserved cysteine residues (C-x(9,12)-C-N-x-C-x-C-x(2,3)-G-x(3,6)-C-T-x(3)- C). The pacifastin domain consists of a twisted β-sheet composed of three antiparallel strands and stabilised by an identical pattern (C1-C4, C2-C6, C3-C5) of disulfide bridges. This entry also contains the multidomain organization of SCO-spondin. The SCO-spondin protein is a special feature of the chordate phylum. This protein is expressed in the central nervous system (CNS) from the time a dorsal neural tube appears in the course of phylogenetical evolution.
