identifier: InterPro:IPR036148
label: MmgE/PrpD superfamily
definition: >-
  MmgE/PrpD superfamily members include 2-methylcitrate dehydratase (PrpD; ) and citrate/2-methylcitrate dehydratase MmgE. PrpD is required for propionate catabolism, catalysing the third step of the 2-methylcitric acid cycle. This enzyme consists of two domains: a large domain with an all-helical fold and a smaller domain that folds into an alpha beta domain. Cis-aconitic acid decarboxylase (CAD) shares high identity with proteins of the MmgE/PrpD family. CAD is essential for itaconic acid production in Aspergillus terreus.
