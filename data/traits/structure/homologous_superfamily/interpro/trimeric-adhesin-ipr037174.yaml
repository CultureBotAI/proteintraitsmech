identifier: InterPro:IPR037174
label: "Trimeric adhesin"
definition: >-
  The trimeric autotransporter adhesins superfamily includes Neisseriahia/hsf homologue (NhhA) and the H. influenzae Hia autotransporter. The structure of trimeric adhesin consists of a trimer which contains two different β-prism-like domains connected by a linker subdomain of less regular structure.
