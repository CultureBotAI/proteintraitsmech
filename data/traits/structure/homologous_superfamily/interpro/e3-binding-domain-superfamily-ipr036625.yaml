identifier: InterPro:IPR036625
label: "E3-binding domain superfamily"
definition: >-
  A small domain of the E2 subunit of 2-oxo-acid dehydrogenases that is responsible for the binding of the E3 subunit. Proteins containing this domain include the branched-chain alpha-keto acid dehydrogenase complex of bacteria, which catalyses the overall conversion of alpha-keto acids to acyl-CoA and carbon dioxide; and the E3 binding protein of eukaryotic pyruvate dehydrogenase. The structure of the E3-binding domain has three helices with a close bundle fold and right-handed twist going up-and-down. This structure arrangement is also found at the C-terminal of Nucleoid-associated protein Lsr2 and Protein Ku, in which it is a DNA-binding domain.
