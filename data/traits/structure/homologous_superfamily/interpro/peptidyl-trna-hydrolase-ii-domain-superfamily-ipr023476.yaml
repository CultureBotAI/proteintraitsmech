identifier: InterPro:IPR023476
label: "Peptidyl-tRNA hydrolase II domain superfamily"
definition: >-
  Peptidyl-tRNA hydrolases are enzymes that release tRNAs from peptidyl-tRNA during translation. This superfamily represents the structural domain found in these t-RNA hydrolases and which form dimers.
