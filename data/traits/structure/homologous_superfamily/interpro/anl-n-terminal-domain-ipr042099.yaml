label: "ANL, N-terminal domain"
definition: >-
  This superfamily comprises structural domains found at the N-terminal and middle positions of various ligases from the ANL superfamily. The name ANL derives from three of the subfamilies - Acyl-CoA synthetases, the adenylation domains of the modular non-ribosomal peptide synthetases (NRPSs), and the luciferase enzymes. Members of this superfamily include luciferase, long-chain fatty acid Co-A ligase, acetyl-CoA synthetase and various other closely related synthetases, as well as a plant auxin-responsive promoter family. These enzymes are involved in catalysing the initial adenylation of a carboxylate to form an acyl-AMP intermediate, followed by a second partial reaction, most commonly the formation of a thioester. These adenylating enzymes utilise a 140-degree rotation of the C-terminal domain to adopt two distinct conformations that are used for the adenylation and thiolation reactions. Thus, by using two different conformations of the C-terminal domain, these enzymes perform two distinct steps of catalysis. Luciferases are composed of a large N-terminal domain and a smaller C-terminal domain, which form a cleft. The active site of these enzymes is located at the interface between these two domains, with most active site residues located in the N-terminal domain and two lysine residues in the C-terminal domain. The N-terminal domain is involved in catalysis, and the C-terminal domain is essential for luciferase activation during the catalytic reaction. The overall structure of the N-terminal domain has been characterised in a fatty acyl-CoA ligase in M. tuberculosis, FA and fatty acyl-AMP ligase FAAL28. The N-terminal domain of FA consists of three subdomains: subdomains A and B form α+β topology, which pack together to form a five-layered α-β-α-β-α tertiary structur…
