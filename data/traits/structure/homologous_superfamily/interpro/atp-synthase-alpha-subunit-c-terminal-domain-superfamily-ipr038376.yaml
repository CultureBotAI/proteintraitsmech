identifier: InterPro:IPR038376
label: "ATP synthase, alpha subunit, C-terminal domain superfamily"
definition: >-
  In F-ATPases, there are three copies each of the alpha and beta subunits that form the catalytic core of the F1 complex, while the remaining F1 subunits (gamma, delta, epsilon) form part of the stalks. There is a substrate-binding site on each of the alpha and beta subunits, those on the beta subunits being catalytic, while those on the alpha subunits are regulatory. The alpha and beta subunits form a cylinder that is attached to the central stalk. The alpha/beta subunits undergo a sequence of conformational changes leading to the formation of ATP from ADP, which are induced by the rotation of the gamma subunit, itself is driven by the movement of protons through the F0 complex C subunit. In V- and A-ATPases, the alpha/A and beta/B subunits of the V1 or A1 complex are homologous to the alpha and beta subunits in the F1 complex of F-ATPases, except that the alpha subunit is catalytic and the beta subunit is regulatory. The structure of the alpha and beta subunits is almost identical. Each subunit consists of a N-terminal β-barrel, a central domain containing the nucleotide-binding site and a C-terminal α bundle domain of 7 and 6 helices, respectively, in the alpha and beta subunits. This entry represents the C-terminal domain of the alpha subunit.
