identifier: InterPro:IPR041948
label: "RNA ligase 1/2, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of RNA ligase 1 and 2 (Rnl1/2). The C-terminal domain consists of a four-helix bundle. It is thought to be critical for binding the Rnl2 to adenylylated nicked duplex. This is known as step 2 of the ligation pathway.
