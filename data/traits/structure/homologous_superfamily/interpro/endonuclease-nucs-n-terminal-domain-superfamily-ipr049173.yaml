identifier: InterPro:IPR049173
label: "Endonuclease NucS, N-terminal domain superfamily"
definition: >-
  This superfamily represents the N-terminal domain of endonuclease NucS, which adopts a β-barrel structure. This domain is involved in dimerisation achieved via domain swapping. The dimer formation it likely critical for the folding and stabilisation of the NucS structure. NucS cleaves both 3' and 5' ssDNA extremities of branched DNA structures and it binds to ssDNA.
