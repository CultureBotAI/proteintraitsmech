identifier: InterPro:IPR035957
label: "Crustacean CHH/MIH/GIH neurohormone superfamily"
definition: >-
  Hyperglycemic hormone, which controls blood sugar levels, is an abundant peptide in the sinus glands of isopods and decapods. The peptide is a potent secretagogue, releasing digestive enzymes from the hepatopancreas. It may act as a stress hormone. The peptide contains around 70 amino acid residues, and includes six cysteine residues involved in disulphide bond formation. The sequences show a high degree of similarity to the American lobster molt-inhibiting hormone, which also shows hyperglycemic hormone activity. Sequence analysis reveals at least 2 discrete sequence families, characterised by distinctive N- and C-terminal signatures: broadly, the families represent separate groups of the crustacean hyperglycemic-like hormones and the molt-inhibiting-like hormones. The positions of five of the six cysteine residues are conserved between these families, the first Cys being displaced by one residue position.
