label: "ArgJ-like domain superfamily"
definition: >-
  This superfamily represents a structural domain found in ArgJ, a bifunctional protein that catalyses the first ( ) and fifth ( ) steps in arginine biosynthesis. The domain also occurs in a number of proteins annotated as DmpA serine peptidases.
