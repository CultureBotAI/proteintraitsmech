identifier: InterPro:IPR008919
label: Retrovirus capsid, N-terminal
definition: >-
  The Gag polyprotein from retroviruses is processed by viral protease to produce the major structural proteins, including the capsid protein. The newly formed capsid protein rearranges to form the capsid core particle that surrounds the viral genome of the mature virus. The capsid is composed of two domains, the N-terminal domain (NTD), which contributes to viral core formation, and the C-terminal domain (CTD), which is required for capsid dimerisation, Gag oligomerization and viral formation. The NTD is composed of a five-helix bundle.
