identifier: InterPro:IPR036415
label: "Lamin tail domain superfamily"
definition: >-
  Intermediate filaments (IF) are primordial components of the cytoskeleton and the nuclear envelope. They generally form filamentous structures 8 to 14 nm wide. IF proteins are members of a very large multigene family of proteins which has been subdivided in five major subgroups, type I: acidic cytokeratins, type II: basic cytokeratins, type III: vimentin, desmin, glial fibrillary acidic protein (GFAP), peripherin, and plasticin, type IV: neurofilaments L, H and M, alpha-internexin and nestin, and type V: nuclear lamins A, B1, B2 and C. The lamins are components of the nuclear lamina, a fibrous layer on the nucleoplasmic side of the inner nuclear membrane that may provide a framework for the nuclear envelope and may interact with chromatin. All IF proteins are structurally similar in that they consist of a central rod domain arranged in coiled-coil α-helices, with at least two short characteristic interruptions; a N-terminal non-helical domain (head) of variable length; and a C-terminal domain (tail) which is also non-helical, and which shows extreme length variation between different IF proteins. The C-terminal domain has been characterised for the lamins. The lamin-tail domain (LTD), which has an immunoglobulin (Ig) fold, is found in nuclear lamins and several bacterial proteins where it occurs with membrane associated hydrolases of the metallo-beta-lactamase, synaptojanin, and calcineurin-like phosphoesterase superfamilies.
