identifier: InterPro:IPR036922
label: "Rieske [2Fe-2S] iron-sulphur domain superfamily"
definition: >-
  Iron-sulphur clusters are grouped into three main categories based on their atomic content: [2Fe-2S], [3Fe-4S], [4Fe-4S] (see ), and other hybrid or mixed metal types. The Rieske-type [2Fe-2S] cluster is coordinated to its protein by two cysteine residues and two histidine residues. Rieske-type iron-sulphur clusters are common to electron transfer chains of mitochondria and chloroplast and to non-heme iron oxygenase systems: The Rieske protein of the Ubiquinol-cytochrome c reductase ( ) (also known as the bc1 complex or complex III), a complex of the electron transport chains of mitochondria and of some aerobic prokaryotes; it catalyses the oxidoreduction of ubiquinol and cytochrome c. The Rieske protein of chloroplastic plastoquinone-plastocyanin reductase ( ) (also known as the b6f complex). It is functionally similar to the bc1 complex and catalyses the oxidoreduction of plastoquinol and cytochrome f. Bacterial naphthalene 1,2-dioxygenase subunit alpha, a component of the naphthalene dioxygenase (NDO) multicomponent enzyme system which catalyses the incorporation of both atoms of molecular oxygen into naphthalene to form cis-naphthalene dihydrodiol. Bacterial 3-phenylpropionate dioxygenase ferredoxin subunit. Bacterial toluene monooxygenase. Bacterial biphenyl dioxygenase.
