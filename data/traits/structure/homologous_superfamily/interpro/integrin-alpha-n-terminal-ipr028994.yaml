identifier: InterPro:IPR028994
label: "Integrin alpha, N-terminal"
definition: >-
  This superfamily represents a region containing the β-propeller folds found at the N terminus of integrin alpha. Integrins are the major metazoan receptors for cell adhesion to extracellular matrix proteins and, in vertebrates, also play important roles in certain cell-cell adhesions, make transmembrane connections to the cytoskeleton and activate many intracellular signalling pathways. The integrin receptors are composed of alpha and beta subunit heterodimers. Each subunit crosses the membrane once, with most of the polypeptide residing in the extracellular space, and has two short cytoplasmic domains. Within the N-terminal domain of alpha subunits, seven sequence repeats, each of approximately 60 amino acids, have been found.
