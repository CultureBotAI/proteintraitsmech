identifier: InterPro:IPR036728
label: "Pheromone/general odorant binding protein superfamily"
definition: >-
  The olfactory receptors of terrestrial animals exist in an aqueous environment, yet detect odorants that are primarily hydrophobic. The aqueous solubility of hydrophobic odorants is thought to be greatly enhanced via odorant binding proteins which exist in the extracellular fluid surrounding the odorant receptors. This superfamily is composed of pheromone binding proteins (PBP) from arthropods, which associate with pheromone-sensitive neurons and general-odorant binding proteins (GOBP), including the pheromone-binding protein Gp-9, general odorant-binding proteins and long and short forms of salivary protein D7 from mosquitoes. Members of this superfamily have an EF Hand-like fold, which has a core of four helices and an array of two opened hairpins. The N-terminal extension of these domains, containing a few short helices, forms a flexible lid for the binding cavity.
