label: "Riboflavin synthase-like beta-barrel"
definition: >-
  This superfamily represents a structural domain with a closed β-barrel fold with greek-key topology. Domains with this structure can be found in the following proteins: Riboflavin synthase, which contains two homologous domains of this structure. The FAD-binding (N-terminal) domain of ferredoxin reductase (flavodoxin reductase), where the FAD-binding domain is coupled with a NADP-binding domain of the α/β class. The FAD-binding domain of NADPH-cytochrome p450 reductase; however, this domain has an additional α-helical domain inserted into it. Riboflavin synthase ( ) catalyses the final step in the biosynthesis of vitamin B2, namely the dismutation of two molecules of 6,7-dimethyl-8-ribityllumazine to yield riboflavin and 4-(1-D-ribitylamino)-5-amino-2,6-dihydroxypyrimidine (which is recycled). Flavins can act as primary and secondary emitters in bacterial luminescence. Lumazine proteins are involved in the bioluminescence of certain marine bacteria. These proteins are catalytically inactive, but they resemble riboflavin synthase. Lumazine is non-covalently bound to the fluorophore 6,7-dimethyl-8-ribityllumazine, which is the substrate of riboflavin synthase. Ferredoxin reductase is a FAD-containing oxidoreductase that transports electrons between flavodoxin or ferredoxin and NADPH. In Escherichia coli, ferredoxin reductase together with flavodoxin is involved in the reductive activation of three enzymes: cobalamin-dependent methionine synthase, pyruvate formate lyase and anaerobic ribonucleotide reductase. An additional function for the oxidoreductase appears to be to protect the bacteria against oxygen radicals. The β-barrel domain found in ferredoxin reductase is similar to that found in: NAD(P)H:flavin oxidoreductase, the core domain of nitrate reductase, cytochrome…
