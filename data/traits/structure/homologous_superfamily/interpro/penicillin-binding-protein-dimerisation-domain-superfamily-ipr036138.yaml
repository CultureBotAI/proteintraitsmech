identifier: InterPro:IPR036138
label: "Penicillin-binding protein, dimerisation domain superfamily"
definition: >-
  This entry represents the N terminus domain of Class B High Molecular Weight Penicillin-Binding Proteins. Its function has not been precisely defined, but is strongly implicated in PBP polymerisation. The domain forms a largely disordered "sugar tongs" structure.
