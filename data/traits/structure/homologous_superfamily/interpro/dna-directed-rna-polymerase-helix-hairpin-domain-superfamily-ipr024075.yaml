identifier: InterPro:IPR024075
label: "DNA-directed RNA polymerase, helix hairpin domain superfamily"
definition: >-
  The single subunit DNA-directed RNA polymerase (RNAP) that is encoded by bacteriophage T7 is the prototype of a class of relatively simple RNAPs that includes the RNAPs of the related phages T3 and SP6, as well as the mitochondrial and chloroplastic RNAPs. This superfamily represents a helix hairpin structural domain found in this type of RNA polymerases.
