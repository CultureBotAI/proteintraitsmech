identifier: InterPro:IPR053740
label: "Type III Secretion System Pilotin"
definition: >-
  This superfamily of proteins is involved in the assembly and operation of the type III secretion system (T3SS), a complex bacterial apparatus that facilitates the injection of effector proteins into eukaryotic host cells. Members of this superfamily function as pilot proteins, essential for the correct placement and stabilization of secretin components within the bacterial outer membrane. These proteins are crucial for the formation of the T3SS's injectisome structure, playing a key role in bacterial pathogenicity and host interaction. They exhibit a beta-sandwich fold and may interact with membranes through a region rich in basic residues.
