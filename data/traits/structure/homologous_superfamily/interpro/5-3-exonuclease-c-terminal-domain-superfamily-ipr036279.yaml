identifier: InterPro:IPR036279
label: "5'-3' exonuclease, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal domain of 5' to 3' exonucleases. The 5'-3' exonucleases are conserved in organisms as diverse as bacteriophage and mammals. It adopts a SAM fold consisting of 4-5 helices packed into a bundle of two orthogonally packed α-hairpins. This domain is involved in interactions with DNA and proteins. 5' to 3' exonucleases that contain this domain include: Bacteriophage T4 RNase H, which has sequence similarity to the RAD2 family of eukaryotic proteins. 5' to 3' exonuclease domain of DNA polymerase Taq, which is homologous to Escherichia coli DNA polymerase I (pol I). Bacteriophage T5 5'-exonuclease, which are structure-specific endonucleases. Flap endonuclease-1 (Fen-1 nuclease), a structure specific nuclease that is an essential enzyme for eukaryotic DNA replication and repair.
