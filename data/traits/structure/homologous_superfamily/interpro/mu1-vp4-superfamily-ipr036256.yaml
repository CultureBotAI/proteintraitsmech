identifier: InterPro:IPR036256
label: Mu1/VP4 superfamily
definition: >-
  This entry includes outer capsid proteins Mu1 and VP4. Mu1 is an outer capsid protein that acts as a reoviral penetration agent. Non-enveloped animal reoviruses must enter host cells by membrane penetration that does not involve membrane fusion, as they lack a viral membrane. Reoviruses are activated by proteolytic cleavage in the intestinal lumen, leading to infectious subviral particles. The core of the virus is coated by a layer of mu1 and sigma3 proteins. Proteases strip off sigma3 exposing mu1, which provides the membrane penetration machinery that perforates the membrane. In addition, N-terminal myristoylation of polypeptide Mu1 are required for site-specific cleavage to Mu1C in transfected cells. Mu1 forms a trimer, where the three mu1 molecules are coiled around one another with a right-handed twist. The mu1 chain fold consists of four distinct domains, three intertwined, predominantly α helical domains and a jelly-roll β-sandwich.
