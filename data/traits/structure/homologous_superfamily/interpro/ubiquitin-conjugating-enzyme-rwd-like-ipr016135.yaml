identifier: InterPro:IPR016135
label: "Ubiquitin-conjugating enzyme/RWD-like"
definition: >-
  This superfamily represents a structural domain with an α-β(4)-α(3) core fold. Domains of this structure are found in: Ubiquitin conjugating enzyme E2, as well as related proteins such as ubiquitin carrier protein 4 and ubiquitin-protein ligase W. The UEV domain in tumour susceptibility gene 101 and vacuolar protein sorting-associated protein. RWD domain, found in RING finger and WD repeat-containing proteins, such as EIF-2 kinase 4 (GCN2-like protein). UFC1-like domain found in Ufm1-conjugating enzyme 1.
