identifier: InterPro:IPR016193
label: "Cytidine deaminase-like"
definition: >-
  This superfamily represents a structural domain with a core fold consisting of α-β(2)-(α-β)2 that folds into three layers (α/β/α); some members may contain an extra C-terminal strand. This domain is found in several types of proteins, including: Cytidine deaminase ( ), including both mono-domain enzymes and two-domain enzymes that arose through a duplication and which contain extra helices in the N-terminal domain. Deoxycytidylate (dCMP) deaminase ( ). Guranine deaminase GuaD ( ). Cytosine deaminase ( ). AICAR transformylase domain ( ) of the bifunctional purine biosynthesis enzyme ATIC; this protein consists of two domains of this fold with extra secondary structures within and in between the two core motifs. Hypothetical protein TM1506 from Thermotoga maritima also contains a domain of this structure.
