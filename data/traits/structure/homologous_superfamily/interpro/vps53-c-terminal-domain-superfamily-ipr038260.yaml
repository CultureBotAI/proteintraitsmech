identifier: InterPro:IPR038260
label: "Vps53, C-terminal domain superfamily"
definition: >-
  This superfamily represents the C-terminal domain of vacuolar protein sorting-associated protein 53 (Vps53), which is part of the of the GARP (Golgi-associated retrograde protein) complex involved in retrograde transport from early and late endosomes to late Golgi. Budding yeast Vps53 is involved in retrograde transport from early and late endosomes to late Golgi by linking the vesicle through the t-SNARE Tgl1 to the Golgi, leading to the membrane fusion between late Golgi and endosomal vesicles.
