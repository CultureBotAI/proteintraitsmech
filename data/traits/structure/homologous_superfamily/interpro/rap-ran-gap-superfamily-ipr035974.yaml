identifier: InterPro:IPR035974
label: "Rap/Ran-GAP superfamily"
definition: >-
  Structural domains comprising this superfamily share the structure of two shown to be homologous GTPase activating proteins for Rap and Ran. Both are Ras-like guanine-nucleotide-binding proteins (GNBPs) involved in a variety of signal-transduction processes and their activity is regulated by GEFs and GAPs. Rap small G proteins have been implicated in various cellular processes such as exocytosis, cAMP signalling, cell adhesion and cell proliferation. Rap proteins acts as molecular switches, with an active GTP-bound form and an inactive GDP-bound form. The inactive GDP bound form is promoted by GTPase-activating proteins (GAPs). GAP proteins specific for Rap contain a conserved region of around 200 amino-acid residues, the RapGAP domain. This domain can accelerate the GTP hydrolysis activity of Rap by five orders of magnitude. Ran, also known as GTP-binding nuclear protein, is on the other hand essential for the translocation of RNA and proteins through the nuclear pore complex and has been implicated in the control of DNA synthesis and cell cycle progression.
