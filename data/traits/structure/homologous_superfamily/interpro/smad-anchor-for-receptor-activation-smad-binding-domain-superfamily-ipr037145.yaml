identifier: InterPro:IPR037145
label: "Smad anchor for receptor activation, Smad-binding domain superfamily"
definition: >-
  Smad proteins mediate transforming growth factor-beta (TGF-beta) signaling from the transmembrane serine-threonine receptor kinases to the nucleus. SARA (Smad anchor for receptor activation) recruits Smad2 to the TGF-beta receptors for phosphorylation. This entry represents the Smad-binding domain (SBD) superfamily of SARA. This domain consists of a rigid coil, an α helix, and a β strand, and interacts with Smad2.
