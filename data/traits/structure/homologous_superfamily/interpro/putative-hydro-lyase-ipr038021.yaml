identifier: InterPro:IPR038021
label: "Putative hydro-lyase"
definition: >-
  This superfamily represents a domain found in various putative hydro-lyases. It is also found as an N-terminal domain in mitochondrial D-glutamate cyclase. The structure of this domain has a complex fold, consisting of two α+β subdomains, one is inserted in the other.
