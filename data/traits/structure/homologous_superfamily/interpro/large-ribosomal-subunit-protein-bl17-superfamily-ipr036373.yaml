identifier: InterPro:IPR036373
label: "Large ribosomal subunit protein bL17 superfamily"
definition: >-
  Large ribosomal subunit protein bL17 (also known as L17) is one of the proteins from the large ribosomal subunit. Bacterial L17 is a protein of 120 to 130 amino-acid residues while yeast YmL8 is twice as large (238 residues). The N-terminal half of YmL8 is collinear with the sequence of L17 from Escherichia coli.
