identifier: InterPro:IPR029046
label: "Lipoprotein localisation LolA/LolB/LppX"
definition: >-
  LppX is a lipoprotein required for the translocation of complex lipids to the outer membrane of Mycobacterium tuberculosis. Its structure consists of a U-shaped β-half-barrel with a large hydrophobic cavity. LppX shares a similar fold with the periplasmic molecular chaperone LolA and the outer membrane lipoprotein LolB, which are involved in the localisation of lipoproteins to the outer membrane of Gram-negative bacteria.
