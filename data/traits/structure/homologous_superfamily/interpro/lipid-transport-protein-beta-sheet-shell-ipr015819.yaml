identifier: InterPro:IPR015819
label: "Lipid transport protein, beta-sheet shell"
definition: >-
  This superfamily represents β-sheet shell domains found in lipid transport proteins such as vitellinogen. Vitellinogen precursors provide the major egg yolk proteins that are a source of nutrients during early development of oviparous vertebrates and invertebrates. Vitellinogen precursors are multi-domain apolipoproteins that are cleaved into distinct yolk proteins. Different vitellinogen precursors exist, which are composed of variable combinations of yolk protein components; however, the cleavage sites are conserved. In vertebrates, a complete vitellinogen is composed of an N-terminal signal peptide for export, followed by four regions that can be cleaved into yolk proteins: lipovitellin-1, phosvitin, lipovitellin-2, and a von Willebrand factor type D domain (YGP40). Domains with a β-sheet shell topology can be found within both lipovitellin-1 and lipoviteliin-2 peptide products.
