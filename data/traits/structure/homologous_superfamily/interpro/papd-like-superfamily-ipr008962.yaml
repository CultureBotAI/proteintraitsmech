identifier: InterPro:IPR008962
label: "PapD-like superfamily"
definition: >-
  The PapD-like superfamily of periplasmic chaperones directs the assembly of more than 30 diverse adhesive surface organelles that enable many pathogenic bacteria to attach to host tissues, a critical early step in disease development. PapD, the prototypical chaperone, is required for the assembly of P pili. These pili contain the adhesin PapG, which mediates the attachment of uropathogenic Escherichia coli to Gal(alpha)Gal receptors on kidney cells and is essential for the initiation of pyelonephritis. PapD-like chaperones consist of two Ig-like domains oriented toward each other, forming L-shaped molecules. In the chaperone-subunit complex, the G1 β-strand of the chaperone completes an atypical Ig fold in the subunit by occupying a groove and running parallel to the subunit's C-terminal F strand. This donor strand complementation interaction both stabilises pilus subunits and caps their interactive surfaces, preventing premature oligomerisation in the periplasm. During pilus biogenesis, the highly conserved N-terminal extension of one subunit is proposed to displace the chaperone G1 β-strand from a neighbouring subunit in a mechanism known as donor strand exchange. This entry represents the immunoglobulin (Ig)-like β-sandwich domain found in PapD, as well as in other periplasmic chaperone proteins, including FimC and SfaE from E. coli, and Caf1m from Yersinia pestis. In addition, major sperm proteins (MSP) and related proteins (such as WR4 and SSP-19) contain an Ig-like domain with a structural fold similar to that of PapD. Major sperm proteins are key components in the molecular interactions underlying sperm motility, and many isoforms are present in Caenorhabditis elegans.
