identifier: InterPro:IPR038473
label: "VirC2, C-terminal domain superfamily"
definition: >-
  VirC2 is known to be involved in virulence in Agrobacterium species but its exact function is unclear. This entry represents the C-terminal domain of VirC2. This is a domain with a ribbon-helix-helix core topology consisting of four helices in an open array of two hairpins.
