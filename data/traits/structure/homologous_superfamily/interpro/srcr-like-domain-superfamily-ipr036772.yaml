identifier: InterPro:IPR036772
label: "SRCR-like domain superfamily"
definition: >-
  The scavenger receptor cysteine-rich (SRCR) domain is an ancient and highly conserved domain of about 110 residues which is found in diverse secreted and cell-surface proteins, like the type I scavenger receptor, the speract receptor, CD5/Ly-1, CD6, or complement factor I. Tandem repeats of SRCR domains are common in the membrane bound proteins. Most SRCR domains have six to eight cysteines that participate in intradomain disulfide bonds. SRCR domains have been subdivided into two groups, A and B, primarily on the differences in the spacing pattern between the cysteine residues. Besides type I scavenger receptor, this domain can also be found in the N-terminal of hepsin. The core structure of SRCR has a β-x-α-β-loop-β fold.
