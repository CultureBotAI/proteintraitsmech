identifier: InterPro:IPR038689
label: "Thermostable direct haemolysin superfamily"
definition: >-
  Thermostable direct haemolysin (TDH) is considered an important virulence factor in Vibrio parahaemolyticus gastroenteritis and is a dimer composed of two identical subunit molecules of approximately 21kDa. The tetrameric form contains a central pore permitting entry and exit of water molecules. A number of biological properties have been attributed to TDH including haemolytic activity, enterotoxicity, cytotoxicity and cardiotoxicity. Structurally, this superfamily consists of 10 β strands, 1 α helix and 1 3(10)-helix.
