identifier: InterPro:IPR042268
label: "Outer membrane protein assembly factor BamC, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain of outer membrane protein (OMP) assembly factor BamC, a component of the essential five-protein β-barrel assembly machinery (BAM) in E. coli. This BAM complex is responsible for recognition and assembly of outer membrane β-barrel proteins, although BamC is not essential for its functionality. BamC, together with the other two non-essential protein assembly factors BamE and BamB, express a rather unspecific influence on the stability of the complex and the kinetic folding of selected OMP proteins. BamC has evolved through the gene duplication of two conserved domains known to mediate protein interactions in structurally related complexes.
