identifier: InterPro:IPR036111
label: "Malate/L-sulfolactate/L-lactate dehydrogenase-like superfamily"
definition: >-
  The malate dehydrogenase (MDH) of some extremophilies is more similar to the L-lactate dehydrogenases (L-LDH; ) from various sources than to other MDHs. This superfamily consists of bacterial and archaeal malate/L-sulfolactate/L-lactate dehydrogenases and related proteins. The archaebacterial malate dehydrogenase ( , ) deviates from the eubacterial and eukaryotic enzymes having a low selectivity for the coenzyme (NAD(H) or NADP(H)) and catalysing the reduction of oxalacetate to malate more efficiently than the reverse reaction. The structure of these dehydrogenases consists of three layers (α/β/α) composed of mixed sheet of seven strands, with strands 1, 6 and 7 antiparallel to the rest.
