identifier: InterPro:IPR036137
label: "Focal adhesion kinase, targeting (FAT) domain superfamily"
definition: >-
  Focal adhesion kinase (FAK) is a tyrosine kinase found in focal adhesions, intracellular signalling complexes that are formed following engagement of the extracellular matrix by integrins. The C-terminal "focal adhesion targeting" (FAT) region is necessary and sufficient for localizing FAK to focal adhesions. The crystal structure of FAT shows it forms a four-helix bundle that resembles those found in two other proteins involved in cell adhesion, alpha-catenin and vinculin. The binding of FAT to the focal adhesion protein, paxillin, requires the integrity of the helical bundle, whereas binding to another focal adhesion protein, talin, does not.
