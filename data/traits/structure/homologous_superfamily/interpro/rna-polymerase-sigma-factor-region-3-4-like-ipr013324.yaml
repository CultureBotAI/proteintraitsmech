identifier: InterPro:IPR013324
label: "RNA polymerase sigma factor, region 3/4-like"
definition: >-
  This entry represents regions 3 and 4 (or sigma3 and sigma4 domains) found in several sigma factors, often in conjunction with the sigma2 domain ( ). Both regions 3 and 4 are present in Sigma70, Sigma28 (FliA), and SigA, while region4 is also found in SigmaF and RpoE. Regions 3 and 4 have a nucleotide-binding 3-helical core structure, consisting of a closed or partly open bundle with a right-handed twist. Some other nucleotide-binding proteins are thought to contain domains with a similar topology. The bacterial core RNA polymerase complex, which consists of five subunits, is sufficient for transcription elongation and termination but is unable to initiate transcription. Transcription initiation from promoter elements requires a sixth, dissociable subunit called a sigma factor, which reversibly associates with the core RNA polymerase complex to form a holoenzyme. RNA polymerase recruits alternative sigma factors as a means of switching on specific regulons. Most bacteria express a multiplicity of sigma factors. Two of these factors, sigma-70 (gene rpoD), generally known as the major or primary sigma factor, and sigma-54 (gene rpoN or ntrA) direct the transcription of a wide variety of genes. The other sigma factors, known as alternative sigma factors, are required for the transcription of specific subsets of genes. With regard to sequence similarity, sigma factors can be grouped into two classes, the sigma-54 and sigma-70 families. Sequence alignments of the sigma70 family members reveal four conserved regions that can be further divided into subregions eg. sub-region 2.2, which may be involved in the binding of the sigma factor to the core RNA polymerase; and sub-region 4.2, which seems to harbor a DNA-binding 'helix-turn-helix' motif involved in binding the conserved…
