identifier: InterPro:IPR038211
label: "Ant venom allergen, Sol i 2/4 superfamily"
definition: >-
  Fire ant venom from Solenopsis invicta (Red imported fire ant), is an extremely potent allergy-inducing agent containing four major allergens, Sol i 1 to Sol i 4. This superfamily contains the allergens Sol i 2 and Sol i 4. Sol i 2 causes IgE antibody production in about one-third of individuals stung by fire ants. This allergen is a disulphide-linked homodimer.
