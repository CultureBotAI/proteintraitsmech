identifier: InterPro:IPR014714
label: "Glutamate mutase E subunit, C-terminal domain superfamily"
definition: >-
  Glutamate mutase (methylaspartate mutase) catalyses the reversible interconversion of L-glutamate and L-threo-3-methylaspartate, the first step in the pathway of glutamate fermentation. Catalysis is initiated using the cobalamin cofactor. The E subunit is the catalytic subunit (MutE). This superfamily represents the C-terminal domain.
