identifier: InterPro:IPR043105
label: "Tenuivirus NS3"
definition: >-
  Plant viruses encode specific proteins known as movement proteins (MPs) to control their spread through plasmodesmata (PD) in walls between cells as well as from leaf to leaf via vascular-dependent transport. During this movement process, the virally encoded MPs interact with viral genomes for transport from the viral replication sites to the PDs in the walls of infected cells along the cytoskeleton and/or endoplasmic reticulum (ER) network. The virus is then thought to move through the PDs in the form of MP-associated ribonucleoprotein complexes or as virions. The NS3 protein appears to function as an RNA silencing suppressor. This superfamily includes ssRNA negative-strand crop plant tenuivirus NS3.
