identifier: InterPro:IPR036203
label: "Poliovirus core protein 3a, soluble domain"
definition: >-
  The 3A protein is found in positive-strand RNA viruses. It is a critical component of the poliovirus replication complex, and is also an inhibitor of host cell ER to Golgi transport. This superfamily represents the soluble domain of poliovirus core protein 3a.
