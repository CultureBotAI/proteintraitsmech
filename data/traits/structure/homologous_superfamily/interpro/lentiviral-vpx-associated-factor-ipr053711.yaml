identifier: InterPro:IPR053711
label: "Lentiviral Vpx-associated factor"
definition: >-
  This superfamily of proteins is involved in the viral infection process of non-dividing cells. They facilitate the nuclear translocation of the viral pre-integration complex, which is essential for the integration of viral DNA into the host genome. Additionally, these proteins interact with the host's ubiquitin-proteasome system by binding to a specific E3 ligase complex, altering its substrate specificity. This interaction leads to the targeted degradation of host proteins that are otherwise involved in the innate immune response against the virus. The depletion of such host proteins enables viral replication, particularly in myeloid cells, by preventing the hydrolysis of deoxynucleoside triphosphates, which are necessary substrates for viral reverse transcription.
