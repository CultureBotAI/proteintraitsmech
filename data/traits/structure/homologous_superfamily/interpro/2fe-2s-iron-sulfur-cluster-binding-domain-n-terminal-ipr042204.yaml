identifier: InterPro:IPR042204
label: "2Fe-2S iron-sulfur cluster binding domain, N-terminal"
definition: >-
  This superfamily includes proteins from the 2Fe-2S ferredoxin family, that have a general core structure consisting of β(2)-α-β(2) with a β-grasp type fold. The domain is around one hundred amino acids with four conserved cysteine residues to which the 2Fe-2S cluster is ligated. This superfamily represents the N-terminal domain found in sarcosine oxidase proteins, alpha subunit.
