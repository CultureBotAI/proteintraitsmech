identifier: InterPro:IPR035934
label: "Phage tail protein-like superfamily"
definition: >-
  This entry represents bacteriophage lambda, GpU, a minor tail protein. GpU plays an essential role in tail assembly by capping the rapidly polymerizing tail once it has reached its requisite length and serving as the interaction surface for the completion protein. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. This entry also includes some uncharacterised proteins from bacteria, such as Gp37 and putative cytoplasmic protein STM4215.
