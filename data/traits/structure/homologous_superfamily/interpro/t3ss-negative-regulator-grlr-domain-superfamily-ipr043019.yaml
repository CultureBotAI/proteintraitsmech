identifier: InterPro:IPR043019
label: "T3SS negative regulator GrlR domain superfamily"
definition: >-
  This superfamily represents a domain found in GrlRs, a family of negative regulators of T3SS also involved in lipid binding. Structurally, GrlR consists of a typical β-barrel fold with eight β-strands containing an internal hydrophobic cavity and a plug-like loop on one side of the barrel. Strong hydrophobic interactions between the two β-barrels maintain its dimeric architecture. A unique surface-exposed EDED (Glu-Asp-Glu-Asp) motif is identified to be critical for GrlA-GrlR interaction and for the repressive activity of GrlR. The locus of enterocyte effacement (LEE) is essential for virulence of enterohaemorrhagic Escherichia coli (EHEC) and enteropathogenic E. coli (EPEC). It is comprised of 41 proteins which encode for T3SS proteins in addition to three associated regulators: Ler, GrlA and GrlR. GrlA positively regulates the expression of ler, the first gene in the LEE1 operon, which in turn regulates the expression of various downstream genes involved in T3SS biogenesis. GrlR binds directly to GrlA and functions as an anti-regulator.
