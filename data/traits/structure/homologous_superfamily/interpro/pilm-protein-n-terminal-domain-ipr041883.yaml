identifier: InterPro:IPR041883
label: "PilM protein, N-terminal domain"
definition: >-
  This superfamily represents the N-terminal domain of the bacterial protein PilM. PilM is an inner membrane protein that has been predicted to function as a component of the pilin transport apparatus and thin-pilus basal body.
