identifier: InterPro:IPR036661
label: Luciferase-like domain superfamily
definition: >-
  Bacterial luciferase is a flavin monooxygenase that catalyses the oxidation of long-chain aldehydes and releases energy in the form of visible light, and which uses flavin as a substrate rather than a cofactor. Bacterial luciferase is an alpha/beta (LuxA/LuxB) heterodimer, where each individual subunit folds into a single TIM (β/α)8-barrel domain. There are structural similarities between bacterial luciferase and nonfluorescent flavoproteins (LuxF, FP390), alkanesulphonate monooxygenase (SsuD), and coenzyme F420-dependent terahydromethanopterin reductase, which make up clearly related families with somewhat different folds.
