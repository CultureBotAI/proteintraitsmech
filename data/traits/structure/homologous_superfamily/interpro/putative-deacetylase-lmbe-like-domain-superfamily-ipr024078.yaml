identifier: InterPro:IPR024078
label: "Putative deacetylase LmbE-like domain superfamily"
definition: >-
  This superfamily represents a domain which consists of a 3-layer (α/β/α) sandwich, and it is found in the enzymes 1D-myo-inositol 2-acetamido-2-deoxy-alpha-D-glucopyranoside deacetylase and N-acetylglucosaminyl-phosphatidylinositol de-N-acetylase, as well as in uncharacterised putative deacetylases.
definition_source: InterPro
trait_axis: STRUCTURE
trait_category: STRUCT_HOMOLOGOUS_SUPERFAMILY
term_kind: CLASS
