identifier: InterPro:IPR053754
label: "Oligomannose-binding and Chitinase-activity Domain-containing Protein"
definition: >-
  This superfamily of proteins encompasses carbohydrate-binding entities that recognize and interact with specific oligosaccharides, such as oligomannosides. Members of this superfamily are characterized by their ability to bind to a specific tetrasaccharide core found in N-linked oligomannosides with high affinity. They exhibit hemagglutinating activity, which can be inhibited by certain polysaccharides like yeast mannan. Additionally, these proteins possess a unique enzymatic function, with one of the binding sites demonstrating weak beta-1,4-glycosidase activity, capable of cleaving chitin oligomers. This catalytic activity is distinct and limited to certain oligosaccharides, and does not extend to all substrates. The dual functionality of binding and catalysis within the same protein is a notable feature of this superfamily.
