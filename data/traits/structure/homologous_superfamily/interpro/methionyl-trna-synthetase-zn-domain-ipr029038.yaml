identifier: InterPro:IPR029038
label: "Methionyl-tRNA synthetase, Zn-domain"
definition: >-
  All methionyl-tRNA synthetases (MetRS) display a highly conserved catalytic core with a Rossmann fold, the two halves of which are linked by a connective peptide (CP). In E. coli MetRS, a tightly bound zinc ion was shown to play a role in the folding of the CP region. This entry represents the CP region.
