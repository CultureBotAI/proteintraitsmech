identifier: InterPro:IPR044859
label: "Allene oxide cyclase/Dirigent protein"
definition: >-
  This superfamily consists of several plant specific allene oxide cyclase proteins ( ). The allene oxide cyclase (AOC)-catalysed step in jasmonate (JA) biosynthesis is important in the wound response of tomato. The superfamily also contains Dirigent proteins. Dirigent proteins impart stereoselectivity on the phenoxy radical-coupling reaction, yielding optically active lignans from two molecules of coniferyl alcohol in the biosynthesis of lignans, flavonolignans, and alkaloids and thus plays a central role in plant secondary metabolism. Dirigent proteins and allene oxide cyclases exert stereochemical control on a cyclization reaction. Both share common structural features.
