identifier: InterPro:IPR042258
label: "2-keto-3-deoxy-galactonokinase, N-terminal"
definition: >-
  2-keto-3-deoxy-galactonokinase is a bacterial transferase which catalyses the penultimate reaction in the Ley-Doudoroff pathway, where d-galactose is metabolized into pyruvate and d-glyceraldehyde 3-phosphate. This reaction involves the phosphorylation of 2-oxo-3-deoxygalactonate to 2-oxo-3-deoxygalactonate 6-phosphate using ATP as a phosphoryl-group donor. This superfamily represents the N-terminal domain of 2-keto-3-deoxy-galactonokinase. The structure characterisation of this enzyme reveals a putative substrate-binding site, shown to be generated mostly by the N-terminal domain.
