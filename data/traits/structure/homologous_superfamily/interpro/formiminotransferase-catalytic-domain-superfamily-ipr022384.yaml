identifier: InterPro:IPR022384
label: "Formiminotransferase catalytic domain superfamily"
definition: >-
  This entry represents the formiminotransferase (FT) domain of formiminotransferase-cyclodeaminase (FTCD), which forms a homodimer, with each protomer being comprised of two subdomains. Each subdomain has the structure consisting of an α/β sandwich with antiparallel β-sheet in the form (β-α-β)x2. Tetrahydrofolate (THF)-dependent glutamate formiminotransferase is involved in the histidine utilization pathway. This enzyme interconverts L-glutamate and N-formimino-L-glutamate. The enzyme is bifunctional as it also catalyzes the cyclodeaminase reaction on N-formimino-THF, converting it to 5,10-methenyl-THF and releasing ammonia; part of the process of regenerating THF. This model covers enzymes from metazoa as well as Gram-positive bacteria and archaea. In humans, deficiency of this enzyme results in a disease phenotype. The crystal structure of the enzyme has been studied in the context of the catalytic mechanism. This superfamily represents both individual subdomains of the formiminotransferase catalytic domain.
