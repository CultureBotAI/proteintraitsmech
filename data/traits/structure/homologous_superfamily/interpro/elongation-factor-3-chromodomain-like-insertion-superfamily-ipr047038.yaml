identifier: InterPro:IPR047038
label: "Elongation Factor 3, chromodomain-like insertion superfamily"
definition: >-
  This entry includes members of the EF3 (Elongation Factor 3) family, which contain the ABC transporter domains and belong to the family of ABC (ATP-binding cassette) proteins. Yef3 (elongation factor 3A) and Hef3 (elongation factor 3B) are included in this entry. The ribosomal elongation cycle requires two elongation factors: elongation factor 1 alpha (EF-1 alpha), which mediates the binding of an aminoacyl-tRNA to the ribosomal A site, and elongation factor 2 (EF-2), which catalyses the translocation reaction. In yeasts and other higher fungi, a third elongation factor, EF-3 is essential. EF-3 (also known as Yef3 in budding yeast) is required for the binding of the aminoacyl-tRNA-eEF1A-GTP ternary complex to the ribosomal A-site. EF-3 consists of an N-terminal HEAT repeat domain, followed by a four-helix bundle and two ABC-type ATPase domains, with a chromodomain inserted in ABC2. The binding of EF-3 to ribosome may allow tRNA release. Hef3 is a weakly expressed functional homologue of YEF3. This entry represents the chromodomain-like insertion in the ABC2 domain of eEF3, which is critical to eEF3 function.
