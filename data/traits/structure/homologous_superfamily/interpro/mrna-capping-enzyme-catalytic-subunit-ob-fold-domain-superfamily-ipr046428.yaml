identifier: InterPro:IPR046428
label: "mRNA-capping enzyme catalytic subunit, OB fold domain superfamily"
definition: >-
  mRNA-capping enzyme catalytic subunit from Vaccinia virus (MCEL, also known as mRNA-capping enzyme D1 subunit) catalyses three enzymatic reactions: the 5' triphosphate end of the pre-mRNA is hydrolysed to a diphosphate by RNA 5' triphosphatase; the diphosphate RNA end is capped with GMP by RNA guanylyltransferase and the GpppN cap is methylated by RNA (guanine-N7) methyltransferase. It consists of an N-terminal RNA triphosphatase (TPase)-guanylyltransferase (GTase) module and a C-terminal guanine-N7-methyltransferase (MTase) module. The N-terminal module comprises a TPase domain at the very N-terminal, followed by the GTase at the C-terminal, which consists of the nucleotidyltransferase (NTPase) and OB fold domains. This superfamily represents the OB fold of poxviral mRNA-capping enzyme catalytic subunit which is at the C-terminal of the guanylyltransferase (GTase) module.
