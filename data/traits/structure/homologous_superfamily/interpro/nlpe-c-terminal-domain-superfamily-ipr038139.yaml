identifier: InterPro:IPR038139
label: "NlpE, C-terminal domain superfamily"
definition: >-
  This superfamily represents a domain is found at the C terminus of the NlpE protein. NlpE is a bacterial outer membrane lipoprotein that is necessary for signalling by the Cpx pathway. This pathway responds to cell envelope disturbances and increases the expression of periplasmic protein folding and degradation factors. While the molecular function of the NlpE protein is unknown, it may be involved in detecting bacterial adhesion to abiotic surfaces. In Escherichia coli and Salmonella typhi, NlpE is also known to confer copper tolerance in copper-sensitive strains of Escherichia coli, and may be involved in copper efflux and delivery of copper to copper-dependent enzymes. NlpE consists of two β-barrel domains. The N-terminal domain resembles the bacterial lipocalin Blc, and the C-terminal domain has an oligonucleotide/oligosaccharide-binding (OB) fold.
