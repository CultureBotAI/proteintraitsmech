identifier: InterPro:IPR036394
label: "Ribosomal protein uL22 superfamily"
definition: >-
  Large ribosomal subunit protein uL22 (also known as L22 in bacteria and previously known as L17 in eukaryotes) is a core protein of the large ribosomal subunit. It is the only ribosomal protein that interacts with all six domains of 23S rRNA, and is one of the proteins important for directing the proper folding and stabilizing the conformation of 23S rRNA. uL22 is the largest protein contributor to the surface of the polypeptide exit channel, the tunnel through which the polypeptide product passes. uL22 is also one of six proteins located at the putative translocon binding site on the exterior surface of the ribosome.
