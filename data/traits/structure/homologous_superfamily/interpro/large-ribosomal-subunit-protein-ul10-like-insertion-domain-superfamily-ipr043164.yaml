label: "Large ribosomal subunit protein uL10-like, insertion domain superfamily"
definition: >-
  This superfamily comprises the insertion domain found in archaeal and eukaryotic large ribosomal subunit protein uL10 (previously known as P0 homologue (L10E) and in ribosome assembly factor MRT4, a nuclear paralogue of these proteins. The RNA-binding domain and the adjacent domain are thought to exist in archaeal L10 and eukaryotic P0 proteins only. This domain contains three-stranded and two-stranded antiparallel β-sheets, located at approximately right angles to each other, and two α-helices between them. It is located on the outer side of the ribosome body between the C-terminal domain of L6, the N-terminal domain of L11, and the H42-H44 region of 23S rRNA. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a gl…
