identifier: InterPro:IPR004106
label: "Peptidase S9, N-terminal domain superfamily"
definition: >-
  This superfamily represents the β-propeller domain found at the N-terminal of prolyl oligopeptidases, including acylamino-acid-releasing enzyme (also known as acylaminoacyl peptidase). The prolyl oligopeptidase family consist of a number of evolutionary related peptidases whose catalytic activity seems to be provided by a charge relay system similar to that of the trypsin family of serine proteases, but which evolved by independent convergent evolution. The N-terminal domain of prolyl oligopeptidases form an unusual 7-bladed β-propeller.
