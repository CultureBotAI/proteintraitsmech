identifier: InterPro:IPR037113
label: "Histone acetyl transferase 1, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal domain superfamily of the structure of histone acetyl transferase HAT1. It is often found in association with the C-terminal part of . It seems to be motifs C and D of the structure. Histone acetyltransferases (HATs) catalyse the transfer of an acetyl group from acetyl-CoA to the lysine E-amino groups on the N-terminal tails of histones. HATs are involved in transcription since histones tend to be hyper-acetylated in actively transcribed regions of chromatin, whereas in transcriptionally silent regions histones are hypo-acetylated.
