identifier: InterPro:IPR024069
label: "AF2212-like domain superfamily"
definition: >-
  This domain superfamily is found in protein AF2212 (also known as putative antitoxin VapB21) from the archaean Archaeoglobus fulgidus, and other uncharacterised proteins belonging to the UPF0165 family. The structure of AF2212 has been solved ( ) but not published. The AF2212-like domain is irregular with few secondary structures.
