identifier: InterPro:IPR023148
label: "tRNA (guanine-N(1)-)-methyltransferase, C-terminal domain superfamily"
definition: >-
  In transfer RNA many different modified nucleosides are found, especially in the anticodon region. tRNA (guanine (N1))-methyltransferase TrmD is one of several nucleases operating together with the tRNA-modifying enzymes before the formation of the mature tRNA. It catalyses the reaction: S-adenosyl-L-methionine + guanine37 in tRNA ->S-adenosyl-L-homocysteine + tRNA containing N1-methylguanine It methylates guanosine(G) to N1-methylguanine (1-methylguanosine (m1G)) at position 37 of tRNAs that read CUN (leucine), CCN(proline), and CGG (arginine) codons. The presence of m1G improves the cellular growth rate and the polypeptide steptime and also prevents the tRNA from shifting the reading frame. This entry represents the C-terminal structural domain.
