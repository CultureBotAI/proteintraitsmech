identifier: InterPro:IPR038539
label: "Anti-lipopolysaccharide factor/Scygonadin superfamily"
definition: >-
  Anti-lipopolysaccharide factor binds to bacterial LPS and may specifically inhibit the LPS-mediated activation of the hemolymph coagulation. It has a strong antibacterial effect, especially on the growth of Gram-negative bacteria. This entry also includes the antibacterial protein Scygonadin, which has antibacterial activity against the Gram-positive bacterium Micrococcus luteus.
