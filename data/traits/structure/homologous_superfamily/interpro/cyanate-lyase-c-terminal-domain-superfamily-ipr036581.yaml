identifier: InterPro:IPR036581
label: Cyanate lyase, C-terminal domain superfamily
definition: >-
  Some bacteria can overcome the toxicity of environmental cyanate by hydrolysis of cyanate. This reaction is catalyzed by cyanate lyase (also known as cyanase). Cyanate lyase is found in bacteria and plants and catalyzes the reaction of cyanate with bicarbonate to produce ammonia and carbon dioxide. The cyanate lyase monomer is composed of two domains. The N-terminal domain shows structural similarity to the DNA-binding α-helix bundle motif. The C-terminal domain has an 'open fold' with no structural homology to other proteins. The dimer structure reveals the C-terminal domains to be intertwined, and the decamer is formed by a pentamer of these dimers. The active site of the enzyme is located between dimers and is comprised of residues from four adjacent subunits of the homodecamer.
