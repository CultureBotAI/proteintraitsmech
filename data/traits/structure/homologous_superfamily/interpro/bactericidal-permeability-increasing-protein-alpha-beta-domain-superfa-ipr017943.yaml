identifier: InterPro:IPR017943
label: "Bactericidal permeability-increasing protein, alpha/beta domain superfamily"
definition: >-
  This superfamily represents a structural domain with a core structure consisting of two layers, alpha/beta. These homologous structural domains can show little sequence identity with each other. A number of mammalian lipid-binding serum glycoproteins contain one or more such structural domains, including: Bactericidal permeability-increasing protein (BPI) Lipopolysaccharide-binding protein (LBP) Cholesteryl ester transfer protein (CETP) Phospholipid transfer protein (PLTP) Palate, lung and nasal epithelium carcinoma-associated protein (PLUNC) Bactericidal permeability-increasing protein (BPI) is a potent antimicrobial protein of 456 residues that binds to and neutralises lipopolysaccharides from the outer membrane of Gram-negative bacteria. BPI contains two domains that adopt the same structural fold, even though they have little sequence similarity.
