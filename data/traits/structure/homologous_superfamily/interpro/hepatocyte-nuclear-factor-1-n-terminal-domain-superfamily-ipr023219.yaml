identifier: InterPro:IPR023219
label: "Hepatocyte nuclear factor 1, N-terminal domain superfamily"
definition: >-
  The N-terminal dimerisation domain of the transcriptional activator hepatocyte nuclear factor 1 is essential for DNA binding and association of the transcriptional coactivator, DCoH (dimerization cofactor of HNF-1). This domain forms a unique four-helical bundle which is largely conserved when dimerisation occurs.
