identifier: InterPro:IPR008948
label: L-Aspartase-like
definition: >-
  The enzyme L-aspartate ammonia-lyase (aspartase) catalyses the reversible deamination of the amino acid L-aspartic acid via a carbanion mechanism, producing fumaric acid and an ammonium ion. Aspartases from different organisms show high sequence homology, which also extends to functionally related enzymes such as class II fumarases, argininosuccinate lyases, and adenylosuccinate lyases. The high-resolution structure of aspartase shows that each monomer is composed of three domains arranged in an elongated S-shape. The central domain, which comprises five helices, forms the contacts between subunits in the functionally active tetramer. The active sites are located in clefts between subunits, where structural and mutagenesis studies have identified several key functional groups. A separate regulatory site has also been identified. The substrate, aspartic acid, can additionally act as an activator by binding at this regulatory site together with a required divalent metal ion.
