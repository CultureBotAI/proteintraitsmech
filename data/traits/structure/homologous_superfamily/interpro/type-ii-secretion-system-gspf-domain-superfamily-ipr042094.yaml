identifier: InterPro:IPR042094
label: "Type II secretion system GspF domain superfamily"
definition: >-
  This superfamily consists of bacterial proteins involved in a general secretion pathway (GSP) for the export of proteins (also called the type II pathway). These are proteins of about 400 amino acids that are highly hydrophobic and which are thought to be integral protein of the inner membrane. This domain consists of a bundle of six anti-parallel helices and has a novel fold. Proteins with this domain form a platform for the type II secretion machinery, as well as the type IV pili and the archaeal flagellae.
