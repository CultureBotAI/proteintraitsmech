identifier: InterPro:IPR037001
label: "Ammonia/particulate methane monooxygenase, subunit A superfamily"
definition: >-
  Ammonia monooxygenase and the particulate methane monooxygenase are both integral membrane proteins, occurring in ammonia oxidisers and methanotrophs respectively, which are thought to be evolutionarily related. These enzymes have a relatively wide substrate specificity and can catalyse the oxidation of a range of substrates including ammonia, methane, halogenated hydrocarbons and aromatic molecules. These enzymes are composed of 3 subunits - A ( ), B ( , ) and C ( ) - and contain various metal centres, including copper. Particulate methane monooxygenase from Methylococcus capsulatus str. Bath is an ABC homotrimer, which contains mononuclear and dinuclear copper metal centres, and a third metal centre containing a metal ion whose identity in vivo is not certain. The A subunit from Methylococcus capsulatus str. Bath resides primarily within the membrane and consists of 7 transmembrane helices and a β-hairpin which interacts with the soluble region of the B subunit. A conserved glutamate residue is thought to contribute to a metal centre.
