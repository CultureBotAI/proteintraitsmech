identifier: InterPro:IPR042298
label: "Proto-chlorophyllide reductase, C-terminal"
definition: >-
  This domain superfamily is found in bacteria and plant chloroplast proteins. It often appears at the C-terminal of nitrogenase component 1 type oxidoreductases and sometimes independently in bacterial proteins such as the proto-chlorophyllide reductase subunit B of the cyanobacterium Synechocystis.
