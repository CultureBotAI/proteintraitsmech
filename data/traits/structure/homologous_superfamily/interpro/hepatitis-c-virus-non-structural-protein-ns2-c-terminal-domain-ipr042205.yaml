identifier: InterPro:IPR042205
label: "Hepatitis C virus non-structural protein NS2, C-terminal domain"
definition: >-
  This superfamily represents the C-terminal domain of hepatitis C virus non-structural protein NS2. The viral genome is translated into a single polyprotein of about 3000 amino acids. Generation of the mature non-structural proteins relies on the activity of viral proteases. Non-structural protein 2 (NS2) is an zinc-dependent autocatalytic endopeptidase which cleaves at the NS2/NS3 junction. The action of NS3 proteinase, which resides in the N-terminal one-third of the NS3 protein, then yields all remaining non-structural proteins. NS2 belongs to MEROPS peptidase family C18 (hepatitis C virus endopeptidase 2, clan CM). The fold consists of two subdomains connected by an extended linker: an N-terminal helical domain and a C-terminal β sheet. Peptidases are active as a homodimer and the two active sites are formed at the dimer interface by His and Glu from one monomer and Cys from the other. The dimer resembles a 'butterfly' with two-fold symmetry along the vertical axis. The N-terminal subdomain of one molecule interacts with the C-terminal subdomain of the other molecule and vice versa.
