identifier: InterPro:IPR038042
label: "Gp37-like domain superfamily"
definition: >-
  The structure of Gp37 consists of a unit of helices and β sheets that crystallises into a beautiful asymmetrical dodecameric barrel-structure, of two six-membered rings one on top of the other. It is expressed in bacteria but is of viral origin, as it is found in phage BcepMu and is probably a pathogenesis factor.
