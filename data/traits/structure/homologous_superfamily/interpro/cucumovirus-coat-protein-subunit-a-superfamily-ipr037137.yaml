identifier: InterPro:IPR037137
label: Cucumovirus coat protein, subunit A superfamily
definition: >-
  Cucumoviruses are tripartite RNA plant viruses believed to share a close evolutionary relationship with Brome mosaic virus (BMV). The cucumoviruses include: Cucumber mosaic virus, Peanut stunt virus (PSV) and Tomato aspermy virus (TAV). The viral coat proteins show a high degree of sequence similarity. The core structure of cucumber mosaic virus (CMV) and chlorotic mottle virus (CCMV), both members of the Bromoviridae family, are highly homologous. In CCMV, the structures of the A, B, and C subunits are nearly identical except in their N termini. In contrast, the structures of two loops in subunit A of CMV differ from those in B and C. This entry represents the structural domain superfamily of subunit A of the cucumber mosaic virus and other cucumovirusus.
