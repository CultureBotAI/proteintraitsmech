identifier: InterPro:IPR024083
label: "Fumarase/histidase, N-terminal"
definition: >-
  This entry represents an N-terminal structural domain which forms an α-helical orthogonal bundle found in fumarate lyase (fumarase) and related proteins, as well as in histidine ammonia-lyase (or histidase). One member of the fumarate lyase family is L-aspartate ammonia-lyase (aspartase), which catalyses the reversible deamination of the amino acid L-aspartic acid, using a carbanion mechanism to produce fumaric acid and ammonium ion. Aspartases from different organisms show high sequence homology, and this homology extends to functionally related enzymes such as the class II fumarases, the argininosuccinate and adenylosuccinate lyases. The high-resolution structure of aspartase reveals a monomer that is composed of three domains oriented in an elongated S-shape.
