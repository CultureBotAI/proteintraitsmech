identifier: InterPro:IPR038592
label: "CheD-like superfamily"
definition: >-
  CheD deamidates glutamine residues to glutamate on methyl-accepting chemotaxis receptors (MCPs). CheD-mediated MCP deamidation is required for productive communication of the conformational signals of the chemoreceptors to the cheA kinase. CheC is a CheY-P phosphatase (CheY controls flagellar rotation and is activated by phosphorylation). The activity of CheC is enhanced by its interaction with CheD, forming a CheC-CheD heterodimer. It is suggested that CheC exerts its effect on MCP methylation in Bacillus subtilis by controlling the binding of CheD to the MCPs.
