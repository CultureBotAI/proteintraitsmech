identifier: InterPro:IPR036239
label: "Prenyltransferase-like superfamily"
definition: >-
  This superfamily is characterised by a barrel fold consisting of a cylindrical β-sheet comprising anti-parallel β-strands arranged around a central solvent-filled core. This fold can be found in: Aromatic prenyltransferases NovQ from Streptomyces niveus and CloQ from Streptomyces roseochromogenes. They catalyse the transfer of a dimethylallyl group to 4-hydroxyphenylpyruvate to produce the ring A structure in the novobiocin and clorobiocin biosynthesis pathways, respectively. Flaviolin linalyltransferase from Streptomyces cinnamonensis. It is involved in the biosynthesis of furanonaphthoquinone I (FNQ I). It catalyses C- and O-prenylations of different phenolic substrates. 5,10-dihydrophenazine-1-carboxylate 9-dimethylallyltransferase from Streptomyces anulatus. It is involved in the biosynthesis of prenylated phenazines. It catalyses the transfer of a dimethylallyl moiety to C-9 of 5,10-dihydrophenazine 1-carboxylate (dihydro-PCA). It is specific for both dimethylallyl diphosphate and dihydro-PCA.
