identifier: InterPro:IPR037164
label: "Satellite virus coat domain superfamily"
definition: >-
  This entry represents a coat domain superfamily found in several satellite viruses, including satellite panicum mosaic virus, satellite tobacco mosaic virus, and satellite tobacco necrosis virus. The coat domain of satellite viruses consist of a β-sandwich jelly-roll fold, with usually eight strands making up the two sheets, although some members can have an extra 1-2 strands. The characteristic interaction between the domains of this fold allows the formation of five-fold and pseudo six-fold assemblies. Although the satellite virus coat proteins share the same jelly-roll fold, they differ in the arrangement of their secondary structural elements and in the interactions of adjacent subunits.
