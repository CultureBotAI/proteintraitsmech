identifier: InterPro:IPR038629
label: "Type II heat-labile enterotoxin, B subunit superfamily"
definition: >-
  This entry represents the B subunits from the type II heat-labile enterotoxin. It forms a pentameric ring, which interacts with one A subunit. Thus, the structural arrangement of type I and type II heat-labile enterotoxins are very similar. The structure of the B subunit is a β barrel with an OB fold.
