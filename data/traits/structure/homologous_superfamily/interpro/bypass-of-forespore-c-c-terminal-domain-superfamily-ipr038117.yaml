identifier: InterPro:IPR038117
label: "Bypass of forespore C, C-terminal domain superfamily"
definition: >-
  BofC (bypass of forespore C) protein acts negatively on inter-compartmental signalling of pro-sigma(K) processing in the sigma(K)-checkpoint of Bacillus subtilis. This is achieved through its interaction with SpoIV inhibiting autoproteolysis of the latter which leads to a delay in proteolytic cleavage of pro-sigma(K). BofC is a monomer made up of two domains, an N-terminal and a C-terminal domain.
