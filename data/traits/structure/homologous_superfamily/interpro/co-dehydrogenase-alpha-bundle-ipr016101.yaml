identifier: InterPro:IPR016101
label: "CO dehydrogenase, alpha-bundle"
definition: >-
  This superfamily represents an α-bundle domain with an up-and-down topology found in Ni-containing carbon monoxide dehydrogenases (CODH) ( ). These enzymes reversibly oxidise CO to CO(2), and play key roles in the energy-yielding pathways of various autotrophic anaerobes, allowing these organisms to grow with CO as the sole carbon source. The active sites of these enzymes contain Ni-iron-sulphur (NiFeS) clusters. This family also includes the CODH subunit of bifunctional CODH/acetyl-CoA synthetase (CODH/ACS), which contains two Ni-containing active sites to catalyse the formation of acetyl-CoA from CO(2)-derived CO.
