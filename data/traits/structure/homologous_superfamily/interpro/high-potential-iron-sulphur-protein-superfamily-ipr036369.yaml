identifier: InterPro:IPR036369
label: "High potential iron-sulphur protein superfamily"
definition: >-
  High potential iron-sulphur proteins (HiPIP) are a specific class of high-redox potential 4Fe-4S ferredoxins that functions in anaerobic electron transport and which occurs commonly in purple photosynthetic bacteria and in other bacteria, such as Paracoccus denitrificans and Thiobacillus ferrooxidans. HiPIPs seem to react by oxidation of [4Fe-4S]2+ to [4Fe-4S]3+ The HiPIPs are small proteins which show significant variation in their sequences, their sizes (from 63 to 85 amino acids), and in their oxidation- reduction potentials. As shown in the following schematic representation the iron-sulphur cluster is bound by four conserved cysteine residues. [4Fe-4S cluster] | | | | xxxxxxxxxxxxxxxxxxxCxCxxxxxxxCxxxxxCxxxx 'C': conserved cysteine involved in the binding of the iron-sulphur cluster.
