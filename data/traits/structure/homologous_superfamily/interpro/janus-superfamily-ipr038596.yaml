identifier: InterPro:IPR038596
label: "Janus superfamily"
definition: >-
  This superfamily is comprised of the 14kDa phosphohistidine phosphatase from mammals and Janus-A/Janus-B proteins from Drosophila melanogaster. Janus-A and Janus-B regulate somatic sex differentiation and have been found to be testes specific. 14kDa phosphohistidine phosphatase is a histidine phosphatase that may play a role of reversible histidine phosphorylation in neuronal functions. The 14kDa phosphohistidine phosphatase is of a novel topology, and the structure reveals a positively charged active site defined by conserved residues that provide a suitable environment for binding phosphohistidine-containing substrates.
