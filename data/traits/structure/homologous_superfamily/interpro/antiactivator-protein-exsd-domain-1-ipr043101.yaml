identifier: InterPro:IPR043101
label: "Antiactivator protein ExsD, domain 1"
definition: >-
  The antiactivator protein ExsD represses the transcriptional activator ExsA. ExsA activates expression of type III secretion system genes. ExsD inhibits the DNA-binding and self-association properties of ExsA. Repression of ExsA by ExsD is relieved by the secretion chaperone ExsC. This superfamily represents the domain 1 of ExsD, located at the N terminus of the protein, which is exclusively helical.
