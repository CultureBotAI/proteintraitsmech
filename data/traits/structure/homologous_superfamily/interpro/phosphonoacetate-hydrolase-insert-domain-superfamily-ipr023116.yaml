identifier: InterPro:IPR023116
label: "Phosphonoacetate hydrolase, insert domain superfamily"
definition: >-
  Phosphonates are organic compounds with a direct C-P bond that is far less labile than the C-O-P bonds of phosphate attachment sites. Phosphonoacetate hydrolase specifically cleaves the C-P bond in phosphonoacetate. This superfamily represents a short α/β 2 layer sandwich domain inserted towards the C terminus of the catalytic domain.
