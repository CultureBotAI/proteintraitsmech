identifier: InterPro:IPR016091
label: Superantigen toxin, C-terminal
definition: >-
  This entry represents superantigen toxins from Staphylococcus aureus and Streptococcus pyogenes, which share a common core structure consisting of β(2)-α-β(2). S. aureus toxins with this fold include: enterotoxins A (SEA), B (SEB), C2 (SEC2), C3 (SEC3) and H (SEH), heat shock syndrome toxin-1, and superantigen-like proteins SET1 and SET3. S. pyogenes toxins with this fold include: pyrogenic exotoxins A1 and Spe-J, and in superantigen proteins Spe-C, Spe-H, Smez-2 and SSA.
