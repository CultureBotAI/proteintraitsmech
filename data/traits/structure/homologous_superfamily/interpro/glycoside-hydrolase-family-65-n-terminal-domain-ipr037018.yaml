label: "Glycoside hydrolase family 65, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain superfamily of the glycoside hydrolase families 65 and 94. The family of glycosyl hydrolases ( ) containing this domain includes vacuolar acid trehalase and maltose phosphorylase. Maltose phosphorylase (MP) is a dimeric enzyme that catalyses the conversion of maltose and inorganic phosphate into beta-D-glucose-1-phosphate and glucose. This domain is believed to be essential for catalytic activity although its precise function remains unknown. Members of this family include: trehalose a-1,1-glucosidase hydroxylysine exo-a-1,2-glucosidase kojibiose a-1,2-glucosidase branched-dextran exo-1,2-a-glucosidase maltose phosphorylase trehalose phosphorylase trehalose 6-phosphate phosphorylase kojibiose phosphorylase nigeriose phosphorylase a-1,3-glucosyl-L-rhamnose phosphorylase a-glucosyl-glycerol phosphorylase a-1,3-glucan phosphorylase [ec:2.4.1.-] a-glucan phosphorylase The family of glycosyl hydrolases 94 ( ) is formerly known as the glycosyltransferase family GT36. It contains microbial enzymes that phosphorolyze β-glycosidic linkages and produce α-d-glucose 1-phosphate (α-Glc1P) or α-N-acetyl-d-glucosamine 1-phosphate [ . ]. Members of this family include: cellobiose phosphorylase laminaribiose phosphorylase cellodextrin phosphorylase chitobiose phosphorylase cellobionic acid phosphorylase b-1,2-glucan phosphorylase solabiose phosphorylase b-1,3-glucosyl-glucuronic acid phosphorylase [ec:2.4.1.-] b-1,4-glucosyl-galactose phosphorylase [ec:2.4.1.-] acholetin phosphorylase [ec:2.4.1.-] b-1,4-mixed linkage glucan phosphorylase O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification syst…
