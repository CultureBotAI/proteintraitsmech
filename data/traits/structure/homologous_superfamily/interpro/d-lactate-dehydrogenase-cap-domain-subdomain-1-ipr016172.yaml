identifier: InterPro:IPR016172
label: "D-lactate dehydrogenase, cap domain, subdomain 1"
definition: >-
  The D-lactate dehydrogenase (d-LDH) structure is composed of three discontinuous domains: the FAD-binding domain (residues 1-268 and 520-571), the cap domain (residues 269-310, 388-425, and 450-519), and the membrane-binding domain (residues 311-387 and 426-449, of which residues 329-376 are in the disordered region) [[cite10944213]]. The cap domain of certain FAD-linked oxidases consist of two structural subdomains: subdomain 1 is a 2-layer a/b or 3-layer a/b/a sandwich, and subdomain 2 is either an orthogonal α-bundle or a second 2-layer a/b sandwich. This entry represents the first (N-terminal) subdomain with a 2-layer α/β sandwich fold. This subdomain is found in D-lactate dehydrogenases ( , -cytochrome), a peripheral membrane respiratory enzyme involved in electron transfer for the energization of active transport of a variety of sugars and amino acids in bacteria. It is also found in certain cholesterol oxidases ( ), monomeric flavoenzymes that catalyses the oxidation and isomerisation of cholesterol to cholest-4-en-3-one.
