identifier: InterPro:IPR038024
label: "SPy1572-like superfamily"
definition: >-
  This superfamily represents a domain from an uncharacterised protein SPy1572 and homologues found in Streptococcus. The structure of this domain is an antiparallel hairpin that forms an open bundle homodimer.
