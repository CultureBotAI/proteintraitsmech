identifier: InterPro:IPR042272
label: "ATP12, ATP synthase F1-assembly protein, N-terminal"
definition: >-
  This superfamily represents the N-terminal "wrist" domain of ATP12 ATPases which are required for the assembly of mitochondrial ATP synthase in all eukaryotes. The eukaryotic proteins include yeast Atp12 and mammalian homologue ATPAF2 (ATP synthase mitochondrial F1 complex assembly factor 2), which are required for assembly of the mitochondrial F1-ATPase.
