identifier: InterPro:IPR046449
label: "Protease Do-like, PDZ domain superfamily"
definition: >-
  This entry contains the second PDZ domain from serine protease Do-like proteins such as DEGP2/9. This domain is involved in cage assembly. This entry also includes DegP homologue from Plasmodium falciparum, a serine protease that also acts as a protein chaperone. It plays a role in the parasite development in host erythrocytes possibly by protecting it against thermal and oxidative stresses.
