identifier: InterPro:IPR036082
label: "NSP3 superfamily"
definition: >-
  This superfamily consists of rotaviral non-structural RNA binding protein 34 (NS34 or NSP3). The NSP3 protein has been shown to bind viral RNA. The NSP3 protein consists of 3 conserved functional domains; a basic region which binds ssRNA, a region containing heptapeptide repeats mediating oligomerisation and a leucine zipper motif. NSP3 may play a central role in replication and assembly of genomic RNA structures. Rotaviruses have a dsRNA genome and are a major cause cause of acute gastroenteritis in the young of many species. The NPS3 homodimer fold has two domains, one all-alpha and the other α+β. It is asymmetric with each domain intertwining with its counterpart.
