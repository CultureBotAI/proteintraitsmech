identifier: InterPro:IPR036371
label: "Thiamin pyrophosphokinase, thiamin-binding domain superfamily"
definition: >-
  Thiamin pyrophosphokinase (TPK, ) catalyzes the transfer of a pyrophosphate group from ATP to vitamin B1 (thiamin) to form the coenzyme thiamin pyrophosphate (TPP). Thus, TPK is important for the formation of a coenzyme required for central metabolic functions. The structure of thiamin pyrophosphokinase suggest that the enzyme may operate by a mechanism of pyrophosphoryl transfer similar to those described for pyrophosphokinases functioning in nucleotide biosynthesis. TPK is a homodimer, and each subunit consists of two domains. One domain resembles a Rossman fold, while the other domain forms a β-sheet flattened sandwich structure containing a jelly-roll topology. The active site is located in a cleft at the dimer interface and is formed from residues from domains of both subunits. The thiamin binding site is primarily defined by the sandwich domain of one subunit and by a loop from the α-β domain of the other subunit. This superfamily describes the jelly-roll sandwich domain.
