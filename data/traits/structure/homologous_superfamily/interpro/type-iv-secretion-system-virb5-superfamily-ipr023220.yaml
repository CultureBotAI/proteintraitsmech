identifier: InterPro:IPR023220
label: "Type IV secretion system VirB5 superfamily"
definition: >-
  VirB5 proteins are an essential component of most type IV secretion systems. VirB5/TraC is a single domain protein consisting of a three helix bundle and a loose globular appendage. Structural and functional studies indicate that VirB5 proteins participate in protein-protein interactions important for pilus assembly and function.
