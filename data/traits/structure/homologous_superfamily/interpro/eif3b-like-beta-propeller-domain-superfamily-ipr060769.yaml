identifier: InterPro:IPR060769
label: "EIF3B-like, beta-propeller domain superfamily"
definition: >-
  This superfamily includes the β-propeller domain found in human Eukaryotic translation initiation factor 3 subunit B (EIF3B), worm Intraflagellar transport protein osm-1, yeast Elongator complex protein 1 (IKI3), bacterial Dipeptidyl-peptidase 5 and similar proteins mainly found in eukaryotes and bacteria. EIF3B is an RNA-binding component of the eukaryotic translation initiation factor 3 (eIF-3) complex, which is required for several steps in the initiation of protein synthesis. Osm-1 is a component of the intraflagellar transport (IFT) complex B required for transport of proteins in the motile cilium. IKI3 is a component of the elongator complex which is required for multiple tRNA modifications.
