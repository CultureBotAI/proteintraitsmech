identifier: InterPro:IPR036540
label: "Poxvirus chemokine inhibitor superfamily"
definition: >-
  This superfamily of poxvirus secreted proteins (also known as T1 and A41) interact with members of both the CC and CXC superfamilies of chemokines. It has been suggested that these secreted proteins modulate leukocyte influx into virus-infected tissues. The structure of the Vaccinia virus protein A41 (also known as chemokine inhibitor vCCI), a virulence factor that is representative of this group, has been solved. It consists of a β-sandwich topology.
