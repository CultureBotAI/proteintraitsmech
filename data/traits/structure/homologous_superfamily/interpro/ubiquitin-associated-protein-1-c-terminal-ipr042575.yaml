identifier: InterPro:IPR042575
label: "Ubiquitin-associated protein 1, C-terminal"
definition: >-
  UBAP1 (ubiquitin associated protein 1) is a ubiquitin-binding ESCRT-I subunit (endosomal sorting complexes required for transport). The C-terminal region of UBAP1 is described as a solenoid of overlapping UBAs (SOUBA) which interacts with ubiquitin. UBAP1-containing ESCRT-I is essential for degradation of antiviral cell-surface proteins.
