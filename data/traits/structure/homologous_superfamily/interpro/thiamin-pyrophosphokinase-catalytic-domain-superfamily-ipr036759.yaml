identifier: InterPro:IPR036759
label: Thiamin pyrophosphokinase, catalytic domain superfamily
definition: >-
  Thiamin pyrophosphokinase (TPK, ) catalyzes the transfer of a pyrophosphate group from ATP to vitamin B1 (thiamin) to form the coenzyme thiamin pyrophosphate (TPP). Thus, TPK is important for the formation of a coenzyme required for central metabolic functions. The structure of the thiamin pyrophosphokinase catalytic domain is composed of three layers (α/β/α) with parallel β-sheet of six strands. This structure suggests that the enzyme may operate by a mechanism of pyrophosphoryl transfer similar to those described for pyrophosphokinases functioning in nucleotide biosynthesis.
