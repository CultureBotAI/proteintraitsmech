label: "PX domain superfamily"
definition: >-
  The PX (phox) domain occurs in a variety of eukaryotic proteins and has been implicated in highly diverse functions, including cell signalling, vesicular trafficking, protein sorting and lipid modification. PX domains are important phosphoinositide-binding modules that exhibit varying lipid-binding specificities. The PX domain is approximately 120 residues in length and folds into a three-stranded β-sheet followed by three α-helices and a proline-rich region. This region immediately precedes a membrane-interaction loop and spans approximately eight hydrophobic and polar residues. The PX domain of neutrophil cytosol factor 1 (p47phox) binds to the SH3 domain within the same protein. Phosphorylation of p47(phox), a cytoplasmic activator of the microbicidal phagocyte oxidase (phox), triggers interaction of p47(phox) with phosphoinositides. This phosphorylation-driven conformational change enables the PX domain to bind phosphoinositides, an interaction that plays a crucial role in the recruitment of p47(phox) from the cytoplasm to membranes and subsequent activation of the phagocyte oxidase. The lipid-binding activity of this protein is normally suppressed by intramolecular interaction between the PX domain and the C-terminal Src homology 3 (SH3) domain. The PX domain is conserved from yeast to humans. Multiple alignment of representative PX domain sequences from eukaryotic proteins reveals relatively little sequence conservation, although the overall structure appears to be highly conserved. While phosphatidylinositol-3-phosphate (PtdIns(3)P) is the primary target of PX domains, binding to phosphatidic acid, phosphatidylinositol-3,4-bisphosphate (PtdIns(3,4)P2), phosphatidylinositol-3,5-bisphosphate (PtdIns(3,5)P2), phosphatidylinositol-4,5-bisphosphate (PtdIns(4,5)P2) an…
