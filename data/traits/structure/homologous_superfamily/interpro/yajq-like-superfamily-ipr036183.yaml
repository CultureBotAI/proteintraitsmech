identifier: InterPro:IPR036183
label: "YajQ-like superfamily"
definition: >-
  This entry represents the UPF0234 family of uncharacterised proteins, which includes YajQ. In Pseudomonas syringae, YajQ functions as a host protein involved in the temporal control of bacteriophage Phi6 gene transcription. It has been shown to bind to the phage's major structural core protein P1, most likely activating transcription by acting indirectly on the RNA polymerase. YajQ may remain bound to the phage particles throughout the infection period. Earlier, YajQ was characterised as a putative nucleic acid-binding protein based on the similarity of its (ferredoxin-like) three-dimensional topology with that of RNP-like RNA-binding domains.
