identifier: InterPro:IPR042486
label: "Arabinosyltransferase, C-terminal, subdomain 2"
definition: >-
  Arabinosyltransferase is involved in arabinogalactan (AG) biosynthesis pathway in mycobacteria. AG is a component of the macromolecular assembly of the mycolyl-AG-peptidoglycan complex of the cell wall. This enzyme has important clinical applications as it is believed to be the target of the antimycobacterial drug Ethambutol. This superfamily represents the subdomain 2 of the C-terminal of arabinosyltransferase. Structurally, this domain is composed of 3 α helices and 10 β strands, arranged into a jelly-roll β sandwich.
