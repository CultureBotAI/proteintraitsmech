identifier: InterPro:IPR029000
label: "Cyclophilin-like domain superfamily"
definition: >-
  This superfamily represents a β-barrel domain that constitutes the core of cyclophilin-type peptidyl-prolyl cis-trans isomerases ( ) and can also be found in the C-terminal of some bacterial uncharacterised proteins, such as PH0987 from Pyrococcus horikoshii ( ) and from Bacillus cereus.
