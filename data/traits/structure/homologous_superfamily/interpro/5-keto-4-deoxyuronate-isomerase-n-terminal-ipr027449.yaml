identifier: InterPro:IPR027449
label: "5-keto-4-deoxyuronate isomerase, N-terminal"
definition: >-
  The enzyme 5-keto-4-deoxyuronate isomerase (KduI), also known as 4-deoxy-L-threo-5-hexosulose-uronate ketol-isomerase 2, is part the bacterial metabolic pathway that uses pectin as a carbon source. It catalyses the interconversion of 5-keto-4-deoxyuronate and 2,5-diketo-3-dexoygluconate. KduI is a metalloprotein structurally homologous to members of the cupin superfamily. The KduI subunit consists of two similar halves comprised of 12 β-strands. This superfamily represents the N-terminal domain.
