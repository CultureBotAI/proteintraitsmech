identifier: InterPro:IPR027485
label: "AMMECR1, N-terminal"
definition: >-
  This entry represents an N-terminal subdomain of the AMMECR1 domain ( ). It consists of a 2-layer sandwich structure. Defects in Nuclear protein AMMECR1 (AMMECR1) are involved association of Alport syndrome, midface hypoplasia, intellectual disability and elliptocytosis in humans.
