identifier: InterPro:IPR037033
label: "DNA-directed RNA polymerase, subunit 2, hybrid-binding domain superfamily"
definition: >-
  RNA polymerases ( ) catalyse the DNA dependent polymerisation of RNA. Prokaryotes contain a single RNA polymerase compared to three in eukaryotes (not including mitochondrial and chloroplast polymerases). This entry represents the hybrid-binding and the wall domain superfamily. The hybrid-binding domain binds the nascent RNA strand/template DNA strand in the Pol II transcription elongation complex. This domain contains the important structural motifs, switch 3 and the flap loop and binds an active site metal ion. It is also involved in binding to Rpb1 and Rpb3. Many of the bacterial members contain large insertions within this domain, which are known as dispensable region 2 (DRII).
