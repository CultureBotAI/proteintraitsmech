identifier: InterPro:IPR038546
label: "Hen1, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal domain of the bacterial Hen1 protein, which is a 3' terminal RNA ribose 2'-O-methyltransferase that is involved in bacterial RNA repair. Hen1 forms a heterotetramer with Pnkp. The heterotetramer has been shown to repair transfer RNAs cleaved by ribotoxins in vitro. The N-terminal domain of Hen1 contributes to the ligase activity of the heterotetramer.
