identifier: InterPro:IPR036466
label: "Pollen allergen ole e 6 superfamily"
definition: >-
  This superfamily represents pollen allergens, such as ole-e-6, a small acidic protein from Olea europaea (Common olive) which mediates olive allergy. Members of this family have an α-helical hairpin structure cross-linked by three disulphides, followed by a long, unstructured C-terminal tail.
