identifier: InterPro:IPR025543
label: Dodecin-like
definition: >-
  Dodecin flavoprotein is a small dodecameric flavin-binding protein from Halobacterium salinarium that contains two flavins stacked in a single binding pocket between two tryptophan residues to form an aromatic tetrade. This entry represents Dodecin and structurally related proteins, including the functionally uncharacterised proteins YdgH and YjfN.
