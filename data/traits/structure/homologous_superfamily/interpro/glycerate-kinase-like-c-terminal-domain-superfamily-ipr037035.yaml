identifier: InterPro:IPR037035
label: "Glycerate kinase-like, C-terminal domain superfamily"
definition: >-
  Two groups of glycerate kinases are known. The first group consists of glycerate kinases from bacterial species, primarily of the Firmicutes group and the gamma subdivision of Proteobacteria. The second group includes TM1585 and glycerate kinases from eukaryotes and archaea in addition to several bacterial species. This entry represents the C-terminal domain of TM1585 and related glycerate kinases.
