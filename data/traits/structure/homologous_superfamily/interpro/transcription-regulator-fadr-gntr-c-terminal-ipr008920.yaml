identifier: InterPro:IPR008920
label: "Transcription regulator FadR/GntR, C-terminal"
definition: >-
  This superfamily represents the C-terminal ligand binding domain of many members of the Gluconate operon transcriptional repressor (GntR) family. This domain probably binds to a range of effector molecules that regulate the transcription of genes through the action of the N-terminal DNA-binding domain. It is a α helical domain that is also found in the known structure of Fatty acid metabolism regulator (FadR) where it binds to acyl-coA.
