identifier: InterPro:IPR043171
label: "Ap4A phosphorylase 1/2-like"
definition: >-
  ATP adenylyltransferases are found in bacteria and lower eukaryotes which catalyse the interconversion of Ap4A to ATP and ADP. While these enzymes are thought to act primarily to break down Ap4A, there is evidence to suggest that in some circumstances they may also act in a biosynthetic role. Some variability in substrate range is apparent e.g the cyanobacterial enzyme can also utilise Ap3A as a substrate, while the Saccharomyces enzymes apparently cannot. This entry represents ATP adenyltytransferases, such as Ap4A phosphorylases 1/2 and related proteins, which adopt an α/β fold.
