identifier: InterPro:IPR038415
label: "Minor type IV pilin, PilX-like superfamily"
definition: >-
  PilX is a protein from Neissaria meningitidis which is crucial for the formation of bacterial aggregates and adhesion to human cells. The structure of PilX is similar to all pilins as it has the common α/β roll fold. PilX subunits have surface-exposed motifs which are thought to stabilise bacterial aggregates against pilus retraction. It also illustrates how a minor pilus component can modulate the virulence properties of pili which have a simple composition and structure.
