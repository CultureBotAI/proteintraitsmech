identifier: InterPro:IPR038365
label: "EcoRII, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal catalytic domain of the type II restriction endonuclease EcoRII, which has a restriction endonuclease-like fold with a central five-stranded mixed β-sheet surrounded on both sides by α-helices. EcoRII cleaves DNA specifically at single 5' CCWGG sites.
