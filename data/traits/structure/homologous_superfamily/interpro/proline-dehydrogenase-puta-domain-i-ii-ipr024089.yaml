identifier: InterPro:IPR024089
label: "Proline dehydrogenase PutA, domain I/II"
definition: >-
  The PutA flavoprotein from Escherichia coli plays multiple roles in proline catabolism by functioning as a membrane-associated bi-functional enzyme and a transcriptional repressor of proline utilisation genes. This entry spans domain I and II of PutA.
