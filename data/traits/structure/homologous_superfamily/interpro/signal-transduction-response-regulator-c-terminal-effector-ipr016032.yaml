identifier: InterPro:IPR016032
label: Signal transduction response regulator, C-terminal effector
definition: >-
  This entry represents a structural domain usually found at the C-terminal of bipartite response regulators. These proteins are known to bind to DNA and RNA polymerases, and their N-terminal receiver domain belongs to the CheY family. The C-terminal effector domain consists of a 3-helical bundle in an up-an-down arrangement with a right-handed twist. This domain occurs in: PhoB-like proteins, which includes PhoB, OmpR, and DrrB; these proteins contain a 4-stranded meander β-sheet in the N-terminal extension. GerE-like proteins from the LuxR/UhpA family of proteins, which includes GerE, TraR (quorum-sensing), NarL (nitrate/nitrite response regulator), and RcsB transcriptional regulator; these proteins contain an additional fourth helix in the C-terminal extension. Spo0A proteins, which are elaborated with additional helices. Two-component signal transduction systems enable bacteria to sense, respond, and adapt to a wide range of environments, stressors, and growth conditions. Some bacteria can contain up to as many as 200 two-component systems that need tight regulation to prevent unwanted cross-talk. These pathways have been adapted to response to a wide variety of stimuli, including nutrients, cellular redox state, changes in osmolarity, quorum signals, antibiotics, and more. Two-component systems are comprised of a sensor histidine kinase (HK) and its cognate response regulator (RR). The HK catalyses its own auto-phosphorylation followed by the transfer of the phosphoryl group to the receiver domain on RR; phosphorylation of the RR usually activates an attached output domain, which can then effect changes in cellular physiology, often by regulating gene expression. Some HK are bifunctional, catalysing both the phosphorylation and dephosphorylation of their cognate RR.…
