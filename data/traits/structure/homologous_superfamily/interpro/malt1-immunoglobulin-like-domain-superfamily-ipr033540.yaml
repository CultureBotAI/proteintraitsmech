identifier: InterPro:IPR033540
label: "MALT1, immunoglobulin-like domain superfamily"
definition: >-
  MALT1 (MEROPS identifier C14.026) is a paracaspase that cleaves its substrates on the C-terminal side of an arginine residue. It is a key regulator of antigen-induced NF-kappaB activation in the adaptive immune response. Upon antigen stimulation MALT1 acts as a scaffold for a protein complex formed with CARMA1 (also known as CARD11) and Bcl10, the CBM complex. The CBM complex links AgR (antigen receptor) triggering to NF-kappaB activation. This entry represents the C-terminal immunoglobulin-like domain of MALT1, which has been suggested to recruit key factors to promote NF-kB activation. It is also proposed to undergo Lys63-linked ubiquitylation via TRAF6 in potentially nine different lysines to recruit the IKK complex.
