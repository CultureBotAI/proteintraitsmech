identifier: InterPro:IPR038511
label: "TAP42/TAP46-like superfamily"
definition: >-
  The TOR signalling pathway activates a cell-growth program in response to nutrients. TIP41 interacts with TAP42 and negatively regulates the TOR signalling pathway. TAP42 is found in yeast and mammals, its homologue in plants is TAP46. TAP46 plays an essential role in plant growth and development as a component of the TOR signalling pathway.
