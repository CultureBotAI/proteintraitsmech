identifier: InterPro:IPR043062
label: "Pneumovirus matrix, N-terminal"
definition: >-
  The matrix proteins of Pneumovirus are transcriptional processivity and antitermination factor, and play a crucial role in viral assembly. This superfamily represents the N-terminal domain found in Pneumovirus matrix protein. Structurally, it consists of 8 β strands and 3 α helices. Within Pneumovirus matrix protein, this domain is believed to mediate species-specific interactions.
