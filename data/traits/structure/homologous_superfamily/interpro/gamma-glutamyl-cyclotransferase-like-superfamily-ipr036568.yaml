identifier: InterPro:IPR036568
label: "Gamma-glutamyl cyclotransferase-like superfamily"
definition: >-
  Gamma-glutamyl cyclotransferase (GGCT) catalyzes the formation of pyroglutamic acid (5-oxoproline) from dipeptides containing gamma-glutamyl, and is a dimeric protein. In Homo sapiens, the protein is encoded by the gene C7orf24. The enzyme participates in the gamma-glutamyl cycle, which plays a pre-eminent role in glutathione homoeostasis. The synthesis and metabolism of glutathione (L-gamma-glutamyl-L-cysteinylglycine) ties the gamma-glutamyl cycle to numerous cellular processes; glutathione acts as a ubiquitous reducing agent in reductive mechanisms involved in protein and DNA synthesis, transport processes, enzyme activity, and metabolism. Structurally, GGCT is comprised of 7 β strands and 2 α helices, and it folds into a five-stranded, antiparallel β-barrel.
