identifier: InterPro:IPR023799
label: "Ribosome-binding factor A domain superfamily"
definition: >-
  The structural domain of RbfA has an α-β fold containing three helices and three β-strands: α1-β1-β2-α2-α3-β3. The structure has type-II KH-domain fold topology, related to conserved KH sequence family proteins whose β-α-α-β subunits are characterised by a helix-turn-helix motif with sequence signature GxxG at the turn. In RbfA, this β-α-α-β subunit is characterised by a helix-kink-helix motif in which the GxxG sequence is replaced by a conserved AxG sequence. Ribosome-binding factor A (gene rbfA) is a bacterial protein that associates with free 30S ribosomal subunits. It does not associate with 30S subunits that are part of 70S ribosomes or polysomes. It is essential for efficient processing of 16S rRNA. Ribosome-binding factor A is a protein of from 13 to 15 Kd which is found in most bacteria. A putative chloroplastic form seems to exist in plants. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong…
