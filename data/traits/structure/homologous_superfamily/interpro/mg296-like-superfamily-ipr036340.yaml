identifier: InterPro:IPR036340
label: "MG296-like superfamily"
definition: >-
  MG296 is an uncharacterised protein of 129 residues expressed in bacteria. It consists of three identical chains of five α helices. Two copies of each chain associate into a complex of six units of possible biological significance but of unknown function.
