label: "MTH777-like superfamily"
definition: >-
  The structure of the Methanothermobacter thermautotrophicus (Methanobacterium thermoformicicum) protein MT0777 has been determined ( ) and consists of a 3-layer(α-β-α) sandwich. No evidence for the function of this protein or its homologues is available yet.
