identifier: InterPro:IPR038532
label: "NADH dehydrogenase ubiquinone Fe-S protein 4-like superfamily"
definition: >-
  This entry includes NADH dehydrogenase [ubiquinone] iron-sulfur protein 4 (NDUS4), an accessory subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I), initially identified in Neurospora crassa as a 21kDa protein. It is believed that members of this family are not involved in catalysis. This entry also includes uncharacterised bacterial sequences.
