identifier: InterPro:IPR053743
label: "CRISPR system Cmr7 complex component"
definition: >-
  This superfamily of proteins is involved in the CRISPR adaptive immune system, which provides a defense mechanism against mobile genetic elements such as viruses, transposable elements, and conjugative plasmids. Members of this superfamily are associated with the processing of CRISPR RNA (crRNA) and the subsequent targeting and degradation of complementary RNA sequences. The CRISPR RNA-guided CMR complex, to which these proteins belong, is responsible for cleaving target RNA within specific dinucleotide contexts, producing defined ends. The activity of this complex is dependent on certain structural features of the crRNA and the target RNA, and is also ATP-stimulated. Additionally, the complex has been observed to cleave the guide crRNA under some conditions.
