identifier: InterPro:IPR038151
label: "Small outer capsid protein superfamily"
definition: >-
  Small outer capsid protein stabilises T4 capsids after the majority of the capsid assembly stages, and helps to stabilise T4 against high temperatures and pH extremes by binding the capsid surface at interfaces between Gp23 hexameric capsomers. This superfamily consists of 2 α helices and 6 β strands.
