identifier: InterPro:IPR036679
label: "FlgN-like superfamily"
definition: >-
  Flagella synthesis protein FlgN is an export chaperone involved in flagellar synthesis. FlgN consists of a 4 long helices bundle, where the last helix is shorter than the three others. FlgN is required for the export of the hook-filament junction proteins, FlgK and FlgL. It is required for both swimming and swarming motility in B. subtilis.
