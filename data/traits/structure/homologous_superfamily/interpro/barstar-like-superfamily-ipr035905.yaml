identifier: InterPro:IPR035905
label: "Barstar-like superfamily"
definition: >-
  Barstar is an intracellular inhibitor of barnase, an extracellular ribonuclease of Bacillus amyloliquefaciens. Barstar binds tightly to the barnase active site and sterically blocks it thus inhibiting its potentially lethal RNase activity inside the cell. Barstar also binds and inhibits a ribonuclease called RNase Sa (produced by Streptomyces aureofaciens) which belongs to the same enzyme family as does barnase. The structure of the barstar consists of two layers of parallel β-sheet of three strands. Barstar inhibits barnase by statically blocking the active site with a helix and adjacent loop segment.
