identifier: InterPro:IPR043107
label: "Fimbrillin-like, C-terminal"
definition: >-
  This superfamily represents the C-terminal domain found in fimbrillin proteins. Proteins in this family are typically between 348 and 360 amino acids in length. Analysis of structural comparisons shows this family to be part of the FimbA superfamily of adhesin components or fimbrillins.
