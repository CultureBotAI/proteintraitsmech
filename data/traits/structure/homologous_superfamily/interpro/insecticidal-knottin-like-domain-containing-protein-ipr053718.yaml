identifier: InterPro:IPR053718
label: "Insecticidal knottin-like domain-containing protein"
definition: >-
  This superfamily of proteins includes members that exhibit insecticidal properties. They are characterized by their ability to inhibit insect voltage-gated sodium channels, leading to partial blockade of the channel pore. This action results in flaccid paralysis and eventual death when administered to certain insect larvae. Some members of this superfamily are also known to be orally active against various insect pests when fused with other molecules such as snowdrop lectin. Structurally, these proteins are defined by a 'disulfide through disulfide knot', a feature that classifies them as knottins.
