identifier: InterPro:IPR036667
label: "Phosphotransferase system, sorbose subfamily IIB component superfamily"
definition: >-
  Bacterial phosphoenolpyruvate: sugar phosphotransferase system (PTS) transporters transport and concomitantly phosphorylate their sugar substrates, and typically consist of multiple subunits or protein domains. The Man family is unique in several respects among PTS permease families: It is the only PTS family in which members possess a IID protein. It is the only PTS family in which the IIB constituent is phosphorylated on a histidyl rather than a cysteyl residue. Its permease members exhibit broad specificity for a range of sugars, rather than being specific for just one or a few sugars. The mannose permease of Escherichia coli, for example, can transport and phosphorylate glucose, mannose, fructose, glucosamine, N-acetylglucosamine, and other sugars. Other members of this can transport sorbose, fructose and N-acetylglucosamine. The active site histidine receives a phosphate group from the IIA subunit and transfers it to the substrate. This entry represents the IIB components of this family of PTS transporters. The structure of this component has three layers (α/β/α) with parallel β-sheet of six strands.
