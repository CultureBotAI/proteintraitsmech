identifier: InterPro:IPR036197
label: "NarG-like superfamily"
definition: >-
  The superfamily includes the molybdo-bis(molybdopterin guanine dinucleotide) (Mo-bisMGD) cofactor-binding subunit NarG from nitrate reductase subunit. It also includes the homologous subunits from other oxidorectuases such as the coenzymeB--coenzymeM heterodisulphide reductase subunit E. Structurally NarG is composed of four α-β subdomains that are organised around the catalytic centre of the enzyme complex. Subdomains II and III are organised around the Mo-bisMGD cofactor.
