identifier: InterPro:IPR053722
label: "Curli assembly CsgC/AgfC domain-containing protein"
definition: >-
  This superfamily of proteins is involved in the formation of extracellular fibrous structures known as thin aggregative fimbriae, which are important for cell adhesion and biofilm formation. The proteins facilitate the assembly of a major structural subunit, promoting the formation of these fibers through a process that may include both extracellular nucleation-precipitation and intracellular pathways. The assembly is a coordinated effort that may require additional proteins for efficient fiber formation and stabilization in the extracellular environment.
