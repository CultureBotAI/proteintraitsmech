identifier: InterPro:IPR036824
label: "Nucleoplasmin core domain superfamily"
definition: >-
  This entry represents the core structural domain superfamily for the nucleoplasmin (Np) family of histone chaperone proteins. This core domain is formed by an 8-stranded β barrel. The three branches of the Np family, including nucleophosmin (NO38/B23), nucleoplasmin (Np), and nucleoplasmin-like proteins (NLP), bind core histones and assemble nucleosomes in vitro assays. Even though they have different histone preferences, it has been suggested that Np family members may share a general mechanism for binding histones.
