identifier: InterPro:IPR038208
label: "Sigma factor-binding protein Crl superfamily"
definition: >-
  This superfamily contains the bacterial Sigma factor-binding protein Crl. This is a transcriptional regulator of the csgA curlin subunit gene for curli fibres that are found on the surface of certain bacteria. These proteins bind to the sigma-S subunit of RNA polymerase, activating expression of sigma-S-regulated genes. They also stimulate RNA polymerase holoenzyme formation and may bind to several other sigma factors, such as sigma-70 and sigma-32.
