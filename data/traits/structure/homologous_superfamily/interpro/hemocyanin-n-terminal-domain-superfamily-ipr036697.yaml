identifier: InterPro:IPR036697
label: "Hemocyanin, N-terminal domain superfamily"
definition: >-
  This entry represents the N-terminal domain of hemocyanin and hexamerin. This domain is composed of six helices arranged in a bundle fold where one central helix is surrounded by 5 others. Crustacean and cheliceratan hemocyanins (oxygen-transport proteins) and insect hexamerins (storage proteins) are homologous gene products, although the latter do not bind oxygen. Haemocyanins are found in the haemolymph of many invertebrates. They are divided into 2 main groups, arthropodan and molluscan. These have structurally similar oxygen-binding centres, which are similar to the oxygen-binding centre of tyrosinases, but their quaternary structures are arranged differently. The arthropodan proteins exist as hexamers comprising 3 heterogeneous subunits (a, b and c) and possess 1 oxygen-binding centre per subunit; and the molluscan proteins exist as cylindrical oligomers of 10 to 20 subunits and possess 7 or 8 oxygen-binding centres per subunit. Although the proteins have similar amino acid compositions, the only real similarity in their primary sequences is in the region corresponding to the second copper-binding domain, which also shows similarity to the copper-binding domain of tyrosinases.
