identifier: InterPro:IPR036414
label: "YaeB, N-terminal domain superfamily"
definition: >-
  TrmO (also known as TsaA or YaeB) is a RNA methyltransferase responsible for N6-methylation of N6-threonylcarbamoyladenosine in tRNAs. It has a unique single-sheeted β-barrel structure and represent a new category of AdoMet-dependent methyltransferases. The crystal structure of Haemophilus influenzae YaeB has been solved. In addition to the N-terminal β-barrel methyltransferase domain it has a C-terminal domain containing the conserved sequence motif DPRxxY. This superfamily describes the N-terminal domain.
