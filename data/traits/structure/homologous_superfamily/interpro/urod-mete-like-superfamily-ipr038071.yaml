identifier: InterPro:IPR038071
label: "UROD/MetE-like superfamily"
definition: >-
  Uroporphyrinogen decarboxylase (URO-D), the fifth enzyme of the haem biosynthetic pathway, catalyses the sequential decarboxylation of the four acetyl side chains of uroporphyrinogen to yield coproporphyrinogen. URO-D deficiency is responsible for the human genetic diseases familial porphyria cutanea tarda (fPCT) and hepatoerythropoietic porphyria (HEP). The sequence of URO-D has been well conserved throughout evolution. The best conserved region is located in the N-terminal section; it contains a perfectly conserved hexapeptide. There are two arginine residues in this hexapeptide which could be involved in the binding, via salt bridges, to the carboxyl groups of the propionate side chains of the substrate. Methionine synthases catalyse the the final step of methionine biosynthesis. Two apparently unrelated families of proteins catalyse this step: cobalamin-dependent methionine synthase, which catalyses the transfer of a methyl group from N5-methyltetrahydrofolate to L-homocysteine and requires cobalamin as a cofactor (MetH; 5-methyltetrahydrofolate:L-homocysteine S-methyltransferase; ) and cobalamin-independent methionine synthase, which catalyses the transfer of a methyl group from methyltetrahydrofolate to L-homocysteine without using an intermediate methyl carrier (MetE; 5-methyltetrahydropteroyltri-L-glutamate:L-homocysteine S-methyltransferase; ). These enzymes display no detectable sequence homology between them, but both require zinc for activation and binding to L-homocysteine. Organisms that cannot obtain cobalamin (vitamin B12) encode only the cobalamin-independent enzyme. Escherichia coli and many other bacteria express both enzymes. Mammals utilise only cobalamin-dependent methionine synthase, while plants and yeasts utilise only the cobalamin-independent…
