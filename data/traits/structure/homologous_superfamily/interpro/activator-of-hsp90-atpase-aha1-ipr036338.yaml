identifier: InterPro:IPR036338
label: "Activator of Hsp90 ATPase, Aha1"
definition: >-
  Aha1 is a co-chaperone that binds to the chaperone Hsp90 stimulating its ATPase activity. Aha1 adopts a secondary structure consisting of an N-terminal α-helix leading into a four-stranded meandering antiparallel β-sheet, followed by a C-terminal α-helix. The two α helices are packed together, with the β-sheet curving around them. The N-terminal domain of Aha1 interacts with Hsp90 and stimulates its ATPase activity.
