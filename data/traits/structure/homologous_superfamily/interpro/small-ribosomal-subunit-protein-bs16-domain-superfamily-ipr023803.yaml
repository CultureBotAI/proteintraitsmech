label: "Small ribosomal subunit protein bS16 domain superfamily"
definition: >-
  This superfamily represents the structural domain of ribosomal bS16 proteins, consisting of an α-β 2 layer sandwich. Ribosomal protein S16 (also known as bS16) is one of the proteins from the small ribosomal subunit. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Eubacterial S16. Algal and plant chloroplast S16. Cyanelle S16. Neurospora crassa mitochondrial S24 (cyt-21). S16 proteins have about 100 amino-acid residues. There are two paralogues in Arabidopsis thaliana, RPS16-1 (chloroplastic) and RPS16-2 (targeted to the chloroplast and the mitochondrion). Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like pr…
