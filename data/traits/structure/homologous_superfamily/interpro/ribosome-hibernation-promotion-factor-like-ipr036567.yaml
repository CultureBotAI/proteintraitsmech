identifier: InterPro:IPR036567
label: "Ribosome hibernation promotion factor-like"
definition: >-
  This superfamily consists of ribosome hibernation promoting factors (RHFs). RHF promotes and stabilizes dimerization of 70S ribosomes by the ribosome modulation factor (RMF), leading to the formation of inactive 100S ribosomes during the stationary phase.
