label: "Large ribosomal subunit protein bL28/bL31-like superfamily"
definition: >-
  This superfamily includes ribosomal proteins with CxxC motifs, including bL28 and bL31 from the large subunit. In early ribosomal structures, L28p had been misinterpreted as L31p. In the ribosomal protein bL28 family there are sequences containing two CxxC pairs. Threading these sequences into this fold brings the four cysteines in a similar site to the zinc-binding site of glucocorticoid receptor-like zinc fingers. In the ribosomal protein bL31, there are also members with two CxxC pairs. However, these do not form a putative zinc-binding site in this fold. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like projections that extend into the rRNA core to stabi…
