identifier: InterPro:IPR029050
label: "Immunoprotective extracellular, immunoglobulin-like domain superfamily"
definition: >-
  This superfamily represents an immunoglobulin-like domain found in immunogenic proteins MPB63/MPT63 and in a group of related proteins that fall into the antigen MPT63/MPB63 (immunoprotective extracellular protein) superfamily, such as uncharacterised lipoprotein YjhA ( ).
