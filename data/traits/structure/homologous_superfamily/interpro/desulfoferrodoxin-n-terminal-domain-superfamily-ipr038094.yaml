identifier: InterPro:IPR038094
label: "Desulfoferrodoxin, N-terminal domain superfamily"
definition: >-
  Desulfoferrodoxin (class I) is a homodimeric protein, with each protomer comprised of two domains, the N-terminal desulforedoxin (DSRD) domain and C-terminal superoxide reductase-like (SORL) domain. Each domain has a distinct iron centre: the DSRD iron centre I, Fe(S-Cys)4; and the SORL iron centre II, Fe[His4Cys(Glu)]. This entry represents the N-terminal desulforedoxin (DSRD) domain superfamilly. It has a similar fold to the rubredoxin metal binding domain.
