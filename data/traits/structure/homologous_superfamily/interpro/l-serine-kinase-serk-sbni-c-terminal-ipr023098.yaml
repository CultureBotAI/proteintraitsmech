identifier: InterPro:IPR023098
label: "L-serine kinase SerK/SbnI, C-terminal"
definition: >-
  This superfamily represents a structural α-β domain found in the C-terminal region of free serine kinase (SerK) from Thermococcus kodakarensis and SbnI from Staphylococcus aureus. SerK converts ADP and l-serine (Ser) into AMP and O-phospho-l-serine (Sep), which is a precursor of l-cysteine.
