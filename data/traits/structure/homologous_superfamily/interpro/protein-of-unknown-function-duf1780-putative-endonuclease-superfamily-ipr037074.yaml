identifier: InterPro:IPR037074
label: "Protein of unknown function DUF1780, putative endonuclease superfamily"
definition: >-
  This is a superfamily of uncharacterised proteins. The structure of a hypothetical protein from Pseudomonas aeruginosa has shown it to adopt an α/β fold, placing it in the Endonuclease superfamily/clan of restriction endonucleases.
