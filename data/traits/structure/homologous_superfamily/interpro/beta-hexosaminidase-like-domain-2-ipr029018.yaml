identifier: InterPro:IPR029018
label: "Beta-hexosaminidase-like, domain 2"
definition: >-
  This entry represents the domain 2 of bacterial beta-hexosaminidases. This domain can also be found in the N-terminal of alpha-glucuronidases, hyaluronoglucosaminidases and eukaryotic beta-hexosaminidases.
