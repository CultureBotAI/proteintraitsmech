identifier: InterPro:IPR036108
label: "Tetrapyrrole biosynthesis, uroporphyrinogen III synthase superfamily"
definition: >-
  This entry represents uroporphyrinogen III synthase ( ) which functions during the second stage of tetrapyrrole biosynthesis. This enzyme catalyses the inversion of the final pyrrole unit (ring D) of the linear tetrapyrrole molecule, linking it to the first pyrrole unit (ring A), thereby generating a large macrocyclic structure called uroporphyrinogen III. The enzyme folds into two α/β domains connected by a β-ladder, the active site being located between the two domains. Congenital erythropoietic porphyria (CEP) is an autosomal recessive inborn error of metabolism that results from the markedly deficient activity of uroporphyrinogen III synthase. Tetrapyrroles are large macrocyclic compounds derived from a common biosynthetic pathway. The end-product, uroporphyrinogen III, is used to synthesise a number of important molecules, including vitamin B12, haem, sirohaem, chlorophyll, coenzyme F430 and phytochromobilin. The first stage in tetrapyrrole synthesis is the synthesis of 5-aminoaevulinic acid ALA via two possible routes: (1) condensation of succinyl CoA and glycine (C4 pathway) using ALA synthase ( ), or (2) decarboxylation of glutamate (C5 pathway) via three different enzymes, glutamyl-tRNA synthetase ( ) to charge a tRNA with glutamate, glutamyl-tRNA reductase ( ) to reduce glutamyl-tRNA to glutamate-1-semialdehyde (GSA), and GSA aminotransferase ( ) to catalyse a transamination reaction to produce ALA. The second stage is to convert ALA to uroporphyrinogen III, the first macrocyclic tetrapyrrolic structure in the pathway. This is achieved by the action of three enzymes in one common pathway: porphobilinogen (PBG) synthase (or ALA dehydratase, ) to condense two ALA molecules to generate porphobilinogen; hydroxymethylbilane synthase (or PBG deaminase, ) to polymer…
