identifier: InterPro:IPR038482
label: "Periplasmic metal-binding protein Tp34-type superfamily"
definition: >-
  This entry represents metal-binding periplasmic proteins. Tp34 has been classified together with other proteins in a group of uncharacterised proteins probably involved in high affinity Fe2+ transport. However, the structural and functional aspects of this group of proteins remain undetermined. Tp34 may bind zinc and the iron-sequestering lactoferrin and may have a role in metal ion homeostasis.
