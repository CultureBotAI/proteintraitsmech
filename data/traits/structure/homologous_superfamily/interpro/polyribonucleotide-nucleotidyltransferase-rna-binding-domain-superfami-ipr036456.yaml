identifier: InterPro:IPR036456
label: "Polyribonucleotide nucleotidyltransferase, RNA-binding domain superfamily"
definition: >-
  This superfamily represents an RNA-binding domain found in bacterial and organelle PNPases, but not in exosomes. It usually occurs in combination with PH domain 1 ( ) and PH domain 2 ( ), both of which are found in PNPases and exosomes. The core structure of the RNA-binding domain consists of a DNA/RNA-binding 3-helical bundle.
