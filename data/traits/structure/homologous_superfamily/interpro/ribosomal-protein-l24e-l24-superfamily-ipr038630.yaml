identifier: InterPro:IPR038630
label: "Ribosomal protein L24e/L24 superfamily"
definition: >-
  Ribosomal protein eL24/L24 is a ribosomal protein found in eukaryotes (L24) and in archaea (eL24, distinct from archaeal L24). eL24/L24 is located on the surface of the large subunit, adjacent to proteins L14 and L3, and near the translation factor binding site. eL24/L24 appears to play a role in the kinetics of peptide synthesis, and may be involved in interactions between the large and small subunits, either directly or through other factors. In mouse, a deletion mutation in L24 has been identified as the cause for the belly spot and tail (Bst) mutation that results in disrupted pigmentation, somitogenesis and retinal cell fate determination. L24 may be an important protein in eukaryotic reproduction: in shrimp, L24 expression is elevated in the ovary, suggesting a role in oogenesis, and in Arabidopsis, L24 has been proposed to have a specific function in gynoecium development. The crystal structure of the eL24 protein from Halobacterium marismortui (Haloarcula marismortui) has been determined. The protein is composed of a single structural domain which forms an α/β zinc-binding fold.
