label: "CheY-like superfamily"
definition: >-
  CheY is a member of the response regulator family in bacterial two-component signalling systems, where CheY receives the signal from the sensor partner, usually a histidine protein kinase. Signal transduction involves phosphotransfer, whereby the histidine kinase phosphorylates a conserved aspartate in the response regulator to activate responses to environmental signals. CheY is a single-domain protein that folds into a compact globular unit with a flavodoxin-like fold consisting of a three-layer α/β/α sandwich with a 21345 β topology, where the phosphorylation region lies in a cavity. Other members of the response regulator family contain a CheY-like receiver domain, which is often found N-terminal to a DNA-binding effector domain. Examples include NarL (nitrate/nitrite response regulator), NtrC (nitrogen regulatory protein C), Spo0A and Spo0F (sporulation response) from Bacillus, PhoA and PhoB cyclin-dependent kinases from Aspergillus, among others. AmiR, the positive regulator of the amidase operon in Pseudomonas, is an unusual member of the bacterial response regulator family; AmiR is able to bind RNA and uses ligand-regulated activation rather than phospho-activation. It has a CheY-like fold at its N-terminal but contains two subdomains in a C-terminal extension, one forming a coiled-coil and the other a long α-helix. As such, AmiR may represent a new family of RNA-binding response regulators. CheY-like domains can be found in other protein families as well. Examples include the receiver domain of the ethylene receptor (ETR1) from Arabidopsis, which is involved in ethylene detection and signal transduction; the N-terminal 'wing' domain of ornithine decarboxylase from Lactobacilli, which catalyses the conversion of ornithine to putrescine at the beginning of the p…
