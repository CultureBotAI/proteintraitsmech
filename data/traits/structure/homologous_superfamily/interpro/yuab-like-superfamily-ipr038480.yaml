identifier: InterPro:IPR038480
label: "YuaB-like superfamily"
definition: >-
  BslA (YuaB) is a protein from Bacillus subtilis acting as a hydrophobin, which forms surface layers around biofilms and participates in biofilm assembly. BslA consists of an Ig-type fold with the addition of an unusual, extremely hydrophobic 'cap' region. The cap structure is essential for its activity and for the ability of bacteria to form hydrophobic, non-wetting biofilms. A number of domains in various proteins from Bacilli and other bacterial lineages appear related to BslA, but do not conserve the hydrophobic cap.
