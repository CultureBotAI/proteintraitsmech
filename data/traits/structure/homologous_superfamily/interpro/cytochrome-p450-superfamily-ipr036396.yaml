identifier: InterPro:IPR036396
label: "Cytochrome P450 superfamily"
definition: >-
  The cytochrome P450 (CYP) superfamily is a diverse group of heme-thiolate proteins found in all domains of life, including Archaea. Despite their low sequence similarity, members of this superfamily share an overall common fold and topology. The conserved P450 structural core is formed by a four-helical bundle composed of three parallel α-helices and one antiparallel α-helix. The prosthetic heme group is confined between two distal and proximal α-helices and bound to the adjacent Cys-heme-ligand loop containing the P450 signature amino acid sequence FxxGx(H/R)xCxG. Cytochrome P450 has a multihelical structure. Cytochrome P450 enzymes are a superfamily of haem-containing mono-oxygenases that are found in all kingdoms of life, and which show extraordinary diversity in their reaction chemistry. In mammals, these proteins are found primarily in microsomes of hepatocytes and other cell types, where they oxidise steroids, fatty acids and xenobiotics, and are important for the detoxification and clearance of various compounds, as well as for hormone synthesis and breakdown, cholesterol synthesis and vitamin D metabolism. In plants, these proteins are important for the biosynthesis of several compounds such as hormones, defensive compounds and fatty acids. In bacteria, they are important for several metabolic processes, such as the biosynthesis of antibiotic erythromycin in Saccharopolyspora erythraea (Streptomyces erythraeus). Cytochrome P450 enzymes use haem to oxidise their substrates, using protons derived from NADH or NADPH to split the oxygen so a single atom can be added to a substrate. They also require electrons, which they receive from a variety of redox partners. In certain cases, cytochrome P450 can be fused to its redox partner to produce a bi-functional protein,…
