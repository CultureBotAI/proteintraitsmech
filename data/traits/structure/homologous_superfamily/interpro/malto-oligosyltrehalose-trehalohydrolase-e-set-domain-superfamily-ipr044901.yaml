identifier: InterPro:IPR044901
label: "Malto-oligosyltrehalose trehalohydrolase, E-set domain superfamily"
definition: >-
  This superfamily represents the E-set ("early" set) domain of the trehalose biosynthetic enzyme malto-oligosyltrehalose trehalohydrolase, formally known as 4-alpha-D-{(1->4)-alpha-D-glucano}trehalose trehalohydrolase ( ), which adopts an immunoglobulin-like fold. It is the TreZ protein of the TreYZ pathway for trehalose biosynthesis, and alternative to the OtsAB system.
