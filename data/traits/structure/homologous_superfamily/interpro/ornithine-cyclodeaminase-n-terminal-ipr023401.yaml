identifier: InterPro:IPR023401
label: "Ornithine cyclodeaminase, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the ornithine cyclodeanimase family. This is an α/β two layer sandwich domain. Members of this family includes ornithine cyclodeanimase, alanine dehydrogenase from Archaeoglobus and human cytosolic 3,5,39-triiodo-L-thyronine-binding protein, also called mu-crystallin or CRYM. The function of this domain in ornithine cyclodeaminases, in combination with the C terminus, is responsible for substrate binding. This is a dimerisation domain of alanine dehydrogenase and CRYM.
