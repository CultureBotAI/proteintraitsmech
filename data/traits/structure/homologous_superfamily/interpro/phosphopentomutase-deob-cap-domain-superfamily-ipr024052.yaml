identifier: InterPro:IPR024052
label: "Phosphopentomutase DeoB cap domain superfamily"
definition: >-
  Phosphopentomutase is involved in the purine and pyrimidine salvage pathway of nucleotide synthesis. It catalyses a phosphotransfer on ribose and deoxyribose, converting D-ribose 1-phosphate to D-ribose 5-phosphate, and 2-deoxy-D-ribose 1-phosphate to 2-deoxy-D-ribose 5-phosphate. Phosphopentomutase is composed of a core domain and a cap domain. This superfamily represents the cap domain.
definition_source: InterPro
