identifier: InterPro:IPR038194
label: "DUF3861 domain superfamily"
definition: >-
  This entry represents a domain superfamily of proteins of unknown function which are found predominantly in the proteobacteria. The structurally characterised member of this domain superfamily ( ) adopts a novel fold consisting of a long N-terminal β-hairpin followed by three α helices. This structure shows some resemblance to three-helical bundle folds such as the serum albumin-like fold.
