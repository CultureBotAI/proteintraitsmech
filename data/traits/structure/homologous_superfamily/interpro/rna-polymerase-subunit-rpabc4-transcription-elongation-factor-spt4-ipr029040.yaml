identifier: InterPro:IPR029040
label: "RNA polymerase subunit RPABC4/transcription elongation factor Spt4"
definition: >-
  This superfamily represents a domain which consists of a metal (zinc or iron)-bound fold. Its sequence contains two CX(n)C motifs. It is found in transcription elongation factor Spt4, and in RNA polymerase archaeal subunit P and eukaryotic subunit RPABC4.
