identifier: InterPro:IPR036291
label: "NAD(P)-binding domain superfamily"
definition: >-
  This entry represents NAD- and NADP-binding domains superfamily with a core Rossmann-type fold, which consists of three layers (α/β/α) with parallel β-sheet of 6 strands. Many different enzymes contain an NAD/NADP-binding domain, including: C-terminal domain of alcohol dehydrogenases Tyrosine-dependent oxidoreductases (also known as short-chain dehydrogenases) N-terminal domain of glyceraldehyde-3-phosphate dehydrogenase NAD-binding domain of formate/glycerate dehydrogenases N-terminal domain of sirohaem synthase N-terminal domain of lactate dehydrogenase N-terminal domain of 6-phosphogluconate dehydrogenase (the β-sheet is extended to 8 strands) C-terminal domain of amino acid dehydrogenases (an extra N-terminal helix displaces the C-terminal helix NAD-binding domain of certain potassium channels C-terminal domain of the transcriptional repressor Rex Ornithine cyclodeaminase CoA-binding N-terminal domain of the alpha chain of succinyl-CoA synthetase
definition_source: InterPro
trait_axis: STRUCTURE
trait_category: STRUCT_HOMOLOGOUS_SUPERFAMILY
term_kind: CLASS
