label: "STAT1, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal domain of STAT1, which selectively binds the TAZ2 domain of CRB (CREB-binding protein). This group of eukaryotic proteins is approximately 20 amino acids in length, and is found in association with , , , . By binding to CRB, it becomes a transcriptional activator and can initiate transcription of certain genes.
