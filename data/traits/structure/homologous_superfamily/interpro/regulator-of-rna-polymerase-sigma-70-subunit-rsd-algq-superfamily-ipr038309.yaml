identifier: InterPro:IPR038309
label: "Regulator of RNA polymerase sigma(70) subunit, Rsd/AlgQ superfamily"
definition: >-
  This superfamily includes bacterial transcriptional regulators (Rsd) that are thought to act through an interaction with the conserved region 4 of the sigma(70) subunit of RNA polymerase. The Pseudomonas aeruginosa homologue, AlgQ, positively regulates virulence gene expression and is associated with the mucoid phenotype observed in P. aeruginosa isolates from cystic fibrosis patients. Rsd structure consists of four α helices packed in an up-and-down bundle.
