identifier: InterPro:IPR016095
label: "Large ribosomal subunit protein uL1, 3-layer alpha/beta-sandwich domain"
definition: >-
  Ribosomal protein uL1 is the largest protein from the large ribosomal subunit. The uL1 protein contains two domains: 2-layer α/β domain and a 3-layer α/β domain (interrupts the first domain). This entry represents the 3-layer domain. It has been shown that the 2-layer α/β-sandwich domain is for RNA binding. The 3-layer α/β domain is to stabilise the uL1-rRNA complex. The 3-layer domain of ribosomal protein TthL1 hinders binding of intact protein with RNA due to interdomain flexibility. As a result, the rate of complex formation with mRNA increases for the isolated domain I as compared with that for intact TthL1.
