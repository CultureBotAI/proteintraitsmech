identifier: InterPro:IPR036945
label: "Diacylglycerol kinase (DAGK) superfamily"
definition: >-
  Prokaryotic diacylglycerol kinase (DAGK) and undecaprenol kinase (UDPK) constitute a family of multispan membrane enzymes that are very small, lack relationships to any other family of proteins and exhibit an unusual structure. Escherichia coli DAGK plays an important role in recycling diacylglycerol produced as a by-product of biosynthesis of molecules located in the periplasmic space. UDPK seems to play an analogous role in Gram-positive bacteria, where it is essential for biofilm formation by the oral pathogen Streptococcus mutans. In Bacillus subtilis, UDPK is an essential kinase in the diacylglycerol cycle involved in lipoteichoic acid production and seems to be indispensable for the maintenance of spore stability and viability. Diacylglycerol kinase ( ) (DAGK) is an enzyme that catalyses the formation of phosphatidic acid from diacylglycerol and ATP, an important step in phospholipid biosynthesis. In bacteria DAGK is a very small (13 to 15 kD) membrane protein which seems to contain three transmembrane domains.
