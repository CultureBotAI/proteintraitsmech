identifier: InterPro:IPR016187
label: "C-type lectin fold"
definition: >-
  Lectins occur in plants, animals, bacteria and viruses. Initially described for their carbohydrate-binding activity, they are now recognised as a more diverse group of proteins, some of which are involved in protein-protein, protein-lipid or protein-nucleic acid interactions. There are at least twelve structural families of lectins, of which C-type (Ca+-dependent) lectins is one. C-type lectins can be further divided into seven subgroups based on additional non-lectin domains and gene structure: (I) hyalectans, (II) asialoglycoprotein receptors, (III) collectins, (IV) selectins, (V) NK group transmembrane receptors, (VI) macrophage mannose receptors, and (VII) simple (single domain) lectins. This entry represents a structural domain found in C-type lectins, as well as in other proteins, including: The N-terminal domain of aerolysin and the N-terminal domain of the S2/S3 subunit of pertussis toxin. The C-terminal domain of invasin and intimin. Link domain, which includes the Link module of TSG-6 (a hyaladherin with important roles in inflammation and ovulation) and the hyaluronan binding domain of CD44 (which contains extra N-terminal β-strand and C-terminal β-hairpin). Endostatin and the endostatin domain of collagen alpha 1 (XV), these domains being decorated with many insertions in the common fold. The noncollagenous (NC1) domain of collagen IV, which consists of a duplication of the C-type lectin domain, with segment swapping within and between individual domains. Sulphatase-modifying factors (C-alpha-formyglycine-generating enzyme), where the fold is decorated with many additional structures. The C-terminal domain of the major tropism determinant (Mtd), where the fold is decorated with many additional structures, and has an overall similarity to the sulphatase modi…
