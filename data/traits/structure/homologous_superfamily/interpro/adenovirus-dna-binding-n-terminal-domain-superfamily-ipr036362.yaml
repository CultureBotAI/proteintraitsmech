label: "Adenovirus DNA-binding, N-terminal domain superfamily"
definition: >-
  This entry represents the N terminus of the C-terminal domain of the Adenovirus DNA-binding protein, a multi functional protein involved in DNA replication and transcription control. Its structure has four helices with a partly open bundle.
