identifier: InterPro:IPR038113
label: "MITD1, C-terminal phospholipase D-like domain superfamily"
definition: >-
  The C-terminal domain of the MIT domain-containing proteins contains an unanticipated phospholipase d fold (PLD fold) that binds avidly to phosphoinositide-containing membranes. MITD1 is a ESCRT-III binding protein involved in cytokinesis.
