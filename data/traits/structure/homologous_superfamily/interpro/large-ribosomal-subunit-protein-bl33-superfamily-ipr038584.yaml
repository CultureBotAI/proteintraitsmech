label: "Large ribosomal subunit protein bL33 superfamily"
definition: >-
  Ribosomal protein bL33 is one of the proteins from the large ribosomal subunit. In Escherichia coli, bL33 has been shown to be on the surface of 50S subunit. L33 belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups: Eubacterial bL33. Algal and plant chloroplast bL33c. Cyanelle bL33. Animal bL33m. Fungal bL33m (also known as MRPL39). bL33 is a small protein of 49 to 66 amino-acid residues. bL33 and eL42 (found in archaea and eukaryotes, ) have been reported to be homologues with high similarities in sequence and structure, having evolved from an ancestral uL33. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated in the P site as peptidyl-tRNA, is then transferred to aminoacyl-tRNA, and the new peptidyl-tRNA, extended by one residue, is translocated to the P site with the aid of the elongation factor G (EF-G) and GTP as the deacylated tRNA is released from the ribosome through one or more exit sites. About 2/3 of the mass of the ribosome consists of RNA and 1/3 consists of protein. The proteins are named in accordance with the subunit of the ribosome which they belong to: the small (S1 to S31) and the large (L1 to L44). Usually they decorate the rRNA cores of the subunits. Many ribosomal proteins, particularly those of the large subunit, are composed of a globular, surfaced-exposed domain with long finger-like project…
