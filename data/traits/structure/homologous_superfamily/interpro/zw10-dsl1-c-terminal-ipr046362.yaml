identifier: InterPro:IPR046362
label: "Zw10/DSL1, C-terminal"
definition: >-
  Zeste white 10 (ZW10) was initially identified as a mitotic checkpoint protein involved in chromosome segregation as part of the RZZ (Rod-Zwilch-Zw10) complex, and then implicated in targeting cytoplasmic dynein and dynactin to mitotic kinetochores, but it is also important in non-dividing cells. These include cytoplasmic dynein targeting to Golgi and other membranes, and SNARE-mediated ER-Golgi trafficking in the context of Zw10-Rint1-Nag complex which are DSL11, Tip20, and Sec39 orthologues, respectively. Yeast DSL1, is a peripheral membrane protein required for transport between the Golgi and the endoplasmic reticulum, part of the Dsl1p complex (Dsl1Tip20-Sec20-Sec39). These proteins are members of the CATCHR (complexes associated with tethering containing helical rods) family which includes subunits of evolutionarily related complex, such as conserved oligomeric Golgi (COG), Golgi-associated retrograde protein (GARP) and exocyst.
