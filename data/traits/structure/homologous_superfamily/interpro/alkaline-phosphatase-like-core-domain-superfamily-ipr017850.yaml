identifier: InterPro:IPR017850
label: "Alkaline-phosphatase-like, core domain superfamily"
definition: >-
  This superfamily represents a structural domain with a core 3-layer α/β/α structure, which can sometimes contain additional subdomains (also covered by this entry). These domains form the core domain of alkaline phosphatases. This structural domain is found in: Alkaline phosphatase ( ); most use zinc and magnesium as cofactors. Arylsulphatase (has an additional C-terminal α+β subdomain) ( ). Phosphoglycerate mutase (catalytic domain) ( ). Phosphonoacetate hydrolase (contains an α+β subdomain inserted near C terminus) ( ); uses zinc as a cofactor. Phosphoenolmutase ( ).
