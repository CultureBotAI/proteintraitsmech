label: "Clp, N-terminal domain superfamily"
definition: >-
  ClpA is an ATP-dependent chaperone and part of the ClpAP protease that participates in regulatory protein degradation and the dissolution and degradation of protein aggregates. ClpA recognises sequences in specific proteins, which it then unfolds in an ATP-dependent manner and transports into the degradation chamber of the associated ClpP protein. A small adaptor-like protein, ClpS, modulates the activity of ClpA and is an important regulatory factor for this protein. It protects ClpA from autodegradation and appears to redirect its activity away from soluble proteins and toward aggregated proteins. Molecular chaperones recognise unfolded or misfolded proteins by binding to hydrophobic surface patches not normally exposed in the native proteins. Members of the Clp/Hsp100 family of chaperones are present in eubacteria and within organelles of all eukaryotes, promoting disaggregation and disassembly of protein complexes and participating in energy-dependent protein degradation. The ClpA, ClpB, and ClpC subfamilies of the Clp/Hsp100 ATPases contain a conserved N-terminal domain of ~150 amino acids, which in turn consists of two repeats of ~75 residues. Although the Clp repeat (R) domain, also known as the N domain, contains two approximate sequence repeats, it behaves as a single cooperatively folded unit. The Clp R domain is thought to provide a means for regulating the specificity of and to enlarge the substrate pool available to Clp/Hsp100 chaperone or protease complexes. These roles can be assisted through the binding of an adaptor protein. Adaptor proteins bind to the Clp R domain, modulate the target specificity of the Clp/Hsp100 complex to a particular substrate of interest, and may also regulate the activity of the complex. The Clp R domain structure consists of t…
