identifier: InterPro:IPR042463
label: "Haem NO binding associated domain superfamily"
definition: >-
  This superfamily represents the Haem NO binding associated domain (HNOBA). This domain occurs between the HNOB and the cyclase domains in the animal SGCs and is also detected in bacteria. The HNOB domain is predicted to function as a haem-dependent sensor for gaseous ligands, and transduce diverse downstream signals in both bacteria and animals. The HNOBA domain functionally interacts with the HNOB domain, and possibly binds a ligand, either in cooperation, or independently of the latter domain.
