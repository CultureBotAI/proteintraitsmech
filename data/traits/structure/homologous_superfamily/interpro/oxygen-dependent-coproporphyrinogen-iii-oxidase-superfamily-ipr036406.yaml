identifier: InterPro:IPR036406
label: "Oxygen-dependent coproporphyrinogen III oxidase superfamily"
definition: >-
  Coprogen oxidase (i.e. coproporphyrin III oxidase or coproporphyrinogenase) catalyses the oxidative decarboxylation of coproporphyrinogen III to proto-porhyrinogen IX in the haem and chlorophyll biosynthetic pathways. The protein is a homodimer containing two internally bound iron atoms per molecule of native protein. The enzyme is active in the presence of molecular oxygen that acts as an electron acceptor. The enzyme is widely distributed having been found in a variety of eukaryotic and prokaryotic sources. The coprogen oxidase has an α-β(6)-α(2)-β-α(n) structure. It is composed of three layers (α/β/α) with antiparallel sheets.
