identifier: InterPro:IPR036796
label: "Large ribosomal subunit protein uL11, N-terminal domain superfamily"
definition: >-
  Structurally, the ribosomal protein uL11 N-terminal domain has a β-α(2)-β(2) fold arranged into two layers (α/β) with antiparallel β-sheet. Ribosomal protein uL11 (also known as L12 in mammals and yeast) is one of the proteins from the large ribosomal subunit. In Escherichia coli, uL11 is known to bind directly to the 23S rRNA and plays a significant role during initiation, elongation, and termination of protein synthesis. It belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups bacteria, plant chloroplast, red algal chloroplast, cyanelle and archaeabacterial uL11; and mammalian, plant and yeast L12 (YL15). uL11 is a protein of 140 to 165 amino-acid residues and consists of a 23S rRNA binding C-terminal domain and an N-terminal domain that directly contacts protein synthesis factors. These two domains are joined by a flexible linker that allows inter-domain movement during protein synthesis. While the C-terminal domain of uL11 binds RNA tightly, the N-terminal domain makes only limited contacts with RNA and is proposed to function as a switch that reversibly associates with an adjacent region of RNA. In E. coli, the C-terminal half of uL11 has been shown to be in an extended and loosely folded conformation and is likely to be buried within the ribosomal structure. Ribosomes are the particles that catalyse mRNA-directed protein synthesis in all organisms. The codons of the mRNA are exposed on the ribosome to allow tRNA binding. This leads to the incorporation of amino acids into the growing polypeptide chain in accordance with the genetic information. Incoming amino acid monomers enter the ribosomal A site in the form of aminoacyl-tRNAs complexed with elongation factor Tu (EF-Tu) and GTP. The growing polypeptide chain, situated i…
