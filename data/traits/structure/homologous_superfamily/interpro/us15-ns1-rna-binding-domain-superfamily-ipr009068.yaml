identifier: InterPro:IPR009068
label: "uS15/NS1, RNA-binding domain superfamily"
definition: >-
  The RNA-binding domains of the small ribosomal subunit protein uS15, also known as ribosomal protein S15, and the influenza virus non-structural protein NS1 share the same structural fold, consisting of three helices in an irregular array. uS15 is one of 21 proteins in the small, bacterial 30S ribosomal subunit, and is required for assembly of the subunit through its binding to 16S rRNA. The multifunctional glutamyl-prolyl-tRNA synthase (EPRS) contains three tandem repeats linking two catalytic domains, all three of which contribute to RNA-binding; the second repeated element bears structural resemblance to the uS15/NS1 RNA-binding domain.
