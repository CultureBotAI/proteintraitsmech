identifier: InterPro:IPR000415
label: Nitroreductase-like
definition: >-
  This domain superfamily is characteristic of nitroreductase enzymes and related oxidoreductases. Members of this family utilise FMN as a cofactor and are often found to be homodimers. Possible characteristics include Oxygen-insensitive NAD(P)H nitroreductase (FMN-dependent nitroreductase) (Dihydropteridine reductase) ( ) and NADH dehydrogenase ( ). A number of the proteins are described as oxidoreductases. They are primarily found in bacterial lineages, though a number of eukaryotic homologues have been identified: Caenorhabditis elegans , Drosophila melanogaster (Fruit fly) , Mus musculus (Mouse) and Homo sapiens (Human) . This protein is not found in photosynthetic eukaryotes. The sequences containing this entry in photosynthetic organisms are possible false positives.
