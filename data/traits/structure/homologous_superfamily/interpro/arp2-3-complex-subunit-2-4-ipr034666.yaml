identifier: InterPro:IPR034666
label: "Arp2/3 complex subunit 2/4"
definition: >-
  Arp2/3 binds to pre-existing actin filaments and nucleates new daughter filaments, and thus becomes incorporated into the dynamic actin network at the leading edge of motile cells and other actin-based protrusive structures. In order to nucleate filaments, Arp2/3 must bind to a member of the N-WASp/SCAR family protein. Arp2 and Arp3 are thought to be brought together after activation, forming an actin-like nucleus for actin monomers to bind and create a new actin filament. In the absence of an activating protein, Arp2/3 shows very little nucleation activity. Recent research has focused on the binding and hydrolysis of ATP by Arp2 and Arp3, and crystal structures of the Arp2/3 complex have been solved. The human complex consists of Arp2/3 complex composed of ARP2, ARP3, ARPC1B/p41-ARC, ARPC2/p34-ARC, ARPC3/p21-ARC, ARPC4/p20-ARC and ARPC5/p16-ARC. This superfamily represents the ARPC2/4 subunits.
