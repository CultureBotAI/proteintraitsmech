identifier: InterPro:IPR016100
label: "Prismane, alpha-bundle"
definition: >-
  Prismane (hybrid-cluster) proteins are present in a wide range of bacteria and archaea, and are characterised by their two Fe/S centres: a [4Fe-4S] cubane cluster, and a hybrid [4Fe-2S-2O] cluster. Prismane proteins (hybrid cluster proteins) contain four domains: two spectrin repeat-like 3-helical bundle domains, and two α/β domains with Rossmann-fold topology. This entry represents an α-bundle domain with an up-and-down topology found in prismane.
