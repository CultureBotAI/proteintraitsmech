identifier: InterPro:IPR036708
label: "BipD-like superfamily"
definition: >-
  IpaD from Shigella flexneri and BipD from Burkholderia pseudomallei are two proteins that sit at the tip of the needle of type III secretion system and are essential for virulence. Their structures are highly homologous. They consist of a bundle of antiparallel α-helical segments with two small β-sheet regions.
