identifier: InterPro:IPR038204
label: "Antibacterial factor-related peptide superfamily"
definition: >-
  This superfamily of antimicrobial peptides is found in nematodes. It includes ABF-1 and ABF-2 proteins from C. elegans. Recombinant ABF-2 has been shown to possess potent microbicidal activity against Gram-positive and Gram-negative bacteria, and yeasts.
