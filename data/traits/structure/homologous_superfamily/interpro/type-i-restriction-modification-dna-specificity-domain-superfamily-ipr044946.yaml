identifier: InterPro:IPR044946
label: "Type I restriction modification DNA specificity domain superfamily"
definition: >-
  This domain superfamily is also known as the target recognition domain (TRD). Restriction-modification (R-M) systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one heteromeric enzyme complex composed of one DNA specificity subunit (this entry), two modification (M) subunits and two restriction (R) subunits.
