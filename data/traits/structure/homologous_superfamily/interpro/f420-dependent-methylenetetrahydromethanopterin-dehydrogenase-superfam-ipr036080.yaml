identifier: InterPro:IPR036080
label: "F420-dependent methylenetetrahydromethanopterin dehydrogenase superfamily"
definition: >-
  This archaeal enzyme superfamily is involved in formation of methane from carbon dioxide . The enzyme requires coenzyme F420. The structure of this enzyme has a three layers (α/β/α) fold with parallel β-sheet of six strands.
