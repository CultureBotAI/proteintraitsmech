identifier: InterPro:IPR014721
label: "Small ribosomal subunit protein uS5 domain 2-type fold, subgroup"
definition: >-
  Domain 2 of the small ribosomal subunit protein uS5, previously known as ribosomal protein S5, has a left-handed β-α-β fold that is found in numerous RNA/DNA-binding proteins, as well as in kinases from the GHMP kinase family. Proteins containing this β-α-β fold domain include: Translational machinery components (ribosomal proteins S5 and S9, and domain IV of elongation factors EF-G and eEF-2). Ribonuclease P protein (RNase P). DNA modification proteins (DNA mismatch repair proteins MutL and PMS2, DNA gyrase B, DNA topoisomerase II, IV-B and VI-B). GHMP kinases that transfer a phosphoryl group from ATP to an acceptor (galactokinase ( ), homoserine kinase ( ), and mevalonate kinase ( )). Caenorhabditis elegans early switch protein Xol-1 (a divergent member of the GHMP kinase family that has lost the ATP-binding site).
