identifier: InterPro:IPR036367
label: Adenovirus DNA-binding, C-terminal domain superfamily
definition: >-
  The adenovirus early E2A DNA-binding protein (Ad DBP) is a multifunctional protein required, amongst other things, for DNA replication and transcription control. It binds to single- and double-stranded DNA, as well as to RNA, in a sequence-independent manner. AdDBP consists of two distinct domains. The C-terminal domain is highly conserved and possesses all the DNA binding properties.
