identifier: InterPro:IPR036558
label: "YqbG-like superfamily"
definition: >-
  YqbG, an uncharacterised protein from Bacillus, is the representative of this superfamily. YqbG exists as a monomer, consisting of four α-helices with a right-handed twist, arranged in a left-handed superhelix.
