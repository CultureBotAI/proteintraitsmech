identifier: InterPro:IPR038527
label: "HupH, C-terminal domain superfamily"
definition: >-
  This entry represents the C-terminal conserved domain found in bacterial hydrogenase expression proteins (HupH), which are necessary for hydrogenase synthesis. The precise function of HupH is unknown.
