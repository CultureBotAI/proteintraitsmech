identifier: InterPro:IPR009089
label: XRCC4, N-terminal domain superfamily
definition: >-
  XRCC4 is essential for non-homologous DNA end joining (NHDJ) in eukaryotes, which is required for double-strand break repair, and V(D)J recombination in immunoglobulin and T-cell receptor genes. XRCC4 forms a complex with DNA ligase IV, and acts as a regulatory element required for the stability and activity of the ligase. XRCC4 forms an elongated dumb-bell-like tetramer consisting of a C-terminal stalk that interacts with DNA ligase IV and an N-terminal globular head. The N-terminal head domain consists of a β sandwich and a helix-turn-helix (HTH) motif, which may be involved in DNA binding.
