identifier: InterPro:IPR023471
label: "Cytochrome c oxidase assembly protein CtaG/Cox11, domain superfamily"
definition: >-
  Cytochrome c oxidase assembly protein is essential for the assembly of functional cytochrome oxidase protein. In eukaryotes it is an integral protein of the mitochondrial inner membrane. Cox11 is essential for the insertion of Cu(I) ions to form the CuB site. This is essential for the stability of other structures in subunit I, for example haems a and a3, and the magnesium/manganese centre. Cox11 is probably only required in sub-stoichiometric amounts relative to the structural units. The C-terminal region of the protein is known to form a dimer. Each monomer coordinates one Cu(I) ion via three conserved cysteine residues (111, 208 and 210) in Saccharomyces cerevisiae ( ). Met 224 is also thought to play a role in copper transfer or stabilising the copper site. The copper binding motif is composed of two highly conserved cysteines and is located on one side of a β-barrel structure.
