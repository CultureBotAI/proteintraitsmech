identifier: InterPro:IPR038157
label: "Ferrous iron transporter, core domain"
definition: >-
  This entry represents the core domain of the ferrous iron (Fe2+) transport protein FeoA found in bacteria. This domain also occurs at the C-terminal in the diphtheria toxin repressor (DtxR). DtxR is an iron-binding repressor that contains two domains separated by a short linker. The C-terminal domain adopts a fold similar to eukaryotic Src homology 3 domains, but its functional role is unknown. The transporter Feo is composed of three proteins: FeoA a small, soluble SH3-domain protein probably located in the cytosol; FeoB, a large protein with a cytosolic N-terminal G-protein domain and a C-terminal integral inner-membrane domain containing two 'Gate' motifs which likely functions as the Fe2+ permease; and FeoC, a small protein apparently functioning as an [Fe-S]-dependent transcriptional repressor. Feo allows the bacterial cell to acquire iron from its environment.
