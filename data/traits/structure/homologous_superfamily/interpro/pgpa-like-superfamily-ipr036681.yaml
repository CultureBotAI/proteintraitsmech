identifier: InterPro:IPR036681
label: "PgpA-like superfamily"
definition: >-
  This domain consists of a bundle of six α-helices where one central helix is surrounded by five others. It is found in uncharacterised proteins, including YutG from Bacillus subtilis ( ), putative phosphatidylglycerophosphatases and bacterial phosphatidylglycerophosphatase PgpA.
