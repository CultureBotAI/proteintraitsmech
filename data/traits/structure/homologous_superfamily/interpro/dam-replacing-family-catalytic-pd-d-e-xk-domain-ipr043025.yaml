identifier: InterPro:IPR043025
label: "Dam replacing family, catalytic PD-(D/E)XK domain"
definition: >-
  Dam-replacing protein (DRP) is a restriction endonuclease that is flanked by pseudo-transposable small repeat elements. The replacement of Dam-methylase by DRP allows phase variation through slippage-like mechanisms in several pathogenic isolates of Neisseria meningitidis. This superfamily represents the Dam-replacing catalytic domain. It has the typical PD-(D/E)XK-fold, found in various nucleases (CL0236).
