identifier: InterPro:IPR053747
label: "Fluorescence Recovery Regulator"
definition: >-
  This superfamily of proteins is involved in the photoprotection mechanism of photosynthetic organisms. Members of this superfamily interact with a specific form of the orange carotenoid protein, facilitating its conversion to a different state. This interaction is crucial for the regulation of a process known as non-photochemical quenching, where excess light energy is dissipated as heat to prevent damage to the photosynthetic apparatus. The proteins in this superfamily play a role in restoring fluorescence in the light-harvesting complexes after this energy dissipation event, by affecting the binding of the carotenoid protein to the phycobilisome core, which is a part of the photosynthetic machinery.
