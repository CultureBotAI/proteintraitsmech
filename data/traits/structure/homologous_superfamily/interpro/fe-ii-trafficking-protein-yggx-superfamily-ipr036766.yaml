identifier: InterPro:IPR036766
label: "Fe(II) trafficking protein YggX superfamily"
definition: >-
  The protein superfamily represented by this entry, YggX, serves to protect Fe-S clusters from oxidative damage. The effect is two-fold: proteins that rely on Fe-S clusters do not become inactivated, and the release of free iron and hydrogen peroxide--a DNA damaging agent--is prevented. These observations are consistent with the hypothesis that YggX chelates free iron, and recent experiments show that YggX can indeed bind Fe(II) in vitro and in vivo. Furthermore, YggX has a positive effect on the action of at least one Fe(II)-responsive protein. The combined actions of YggX is reminiscent of iron trafficking proteins, and YggX is therefore proposed to play a role in Fe(II) trafficking. In Escherichia coli, YggX was shown to be under the transcriptional control of the redox-sensing SoxRS system. Structurally, YggX has a β(2)-α(3) fold and contains a zinc-less 'zinc finger'-like fold.
