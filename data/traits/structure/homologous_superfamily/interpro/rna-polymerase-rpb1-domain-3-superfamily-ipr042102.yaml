identifier: InterPro:IPR042102
label: "RNA polymerase Rpb1, domain 3 superfamily"
definition: >-
  This superfamily represents the domain 3 found in RNA polymerase Ppb1, an enzyme which catalyses RNA synthesis. This domain is a pore domain, thought to be a channel through which nucleotides enter the active site and/or through which the 3' end of RNA is extruded. The latter is based on the fact that the 3' end of RNA is located very close to this domain.
