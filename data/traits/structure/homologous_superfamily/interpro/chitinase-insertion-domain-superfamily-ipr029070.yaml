identifier: InterPro:IPR029070
label: "Chitinase insertion domain superfamily"
definition: >-
  This superfamily represents the chitinase insertion domain (CID) that is found in chitinases or chitinase-like proteins. It is composed of five or six anti-parallel β-strands and one α-helix and it inserts between the seventh α-helix and seventh β-strand of the TIM barrel. The CID domain forms a wall alongside the TIM barrel substrate-binding cleft of chitinase which increases the depth of the cleft. Family 18 chitinases (also known as glycosyl hydrolase 18 family) can be classified into three subfamilies: A, B, and C. The CID domain can be found in the subfamily A, but is absent in the subfamily B.
