identifier: InterPro:IPR023224
label: "Salmonella invasion protein A, C-terminal actin-binding domain superfamily"
definition: >-
  This superfamily represents the actin-binding domain of Salmonella invasion protein A, which forms a heart-shaped helical structure that appears to be unrelated to that of other actin-binding domains. Disordered regions are present on both sides of the structural domain, forming nonglobular arms. SipA polymerises actin by stapling filaments with these nonglobular arms. Salmonella invasion protein A (SipA) is a virulence factor that is translocated into host cells by a type III secretion system. In the host cell it binds to actin, stimulates actin polymerisation and counteracts F-actin destabilising proteins. This contributes towards cytoskeletal rearrangements that allow the entry of the pathogen into the host cell.
