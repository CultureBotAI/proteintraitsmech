identifier: InterPro:IPR036915
label: "Cyclin-like superfamily"
definition: >-
  This cyclin-like domain superfamily is found in cyclins, but it is also found as the core domain in transcription factor IIB (TFIIB) and in the retinoblastoma tumour suppressor. It consists of a duplication of a fold consisting of 5 helices, one of them surrounded by the others.
