identifier: InterPro:IPR036073
label: "Desulfoferrodoxin, ferrous iron-binding domain superfamily"
definition: >-
  This domain superfamily has an immunoglobulin-like β-sandwich fold, composed of seven strands in two sheets. Desulfoferrodoxins contains two types of iron: an Fe-S4 site very similar to that found in desulfoferrodoxin from Desulfovibrio gigas, and an octahedral coordinated high-spin ferrous site most probably with nitrogen/oxygen-containing ligands. Due to this rather unusual combination of active centres, this novel protein is named desulfoferrodoxin.
