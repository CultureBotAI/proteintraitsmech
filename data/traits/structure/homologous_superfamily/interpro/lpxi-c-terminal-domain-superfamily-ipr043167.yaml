identifier: InterPro:IPR043167
label: "LpxI, C-terminal domain superfamily"
definition: >-
  Enzymes in lipid metabolism acquire and deliver hydrophobic substrates and products from within lipid bilayers. LpxI is an isozyme of a constitutive enzyme in lipid A biosynthesis. It is made up of 2 domains. This entry represents the C-terminal catalytic domain which comprises a five stranded β-sheet bracketed by one α-helix on one side and three on the other. This domain has structural homology, although no sequence homology, to a superfamily that includes cytosine deaminase and various other proteins that do not share conservation of active sites or mechanisms.
