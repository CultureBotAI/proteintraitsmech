label: "Thioredoxin-like superfamily"
definition: >-
  This entry represents the Thioredoxin-like superfamily which brings together a diverse group of proteins that play crucial roles in various cellular processes, particularly in redox reactions. This superfamily is characterised by two key features: A conserved Cys-X-X-Cys (CXXC) motif at the active site, located at the N-terminal of an α-helix. A distinctive structural fold known as the "thioredoxin fold," consisting of a central four-stranded mixed β-sheet, surrounded by α-helices, with a strand order: 2134 in which strand 3 is antiparallel to the others. In a redox reaction, the side chains of the two cysteines in this active site motif can switch from the free thiol (SH) form to a disulphide bond (S-S) and/or back and hence donate or accept electrons. The preference for electron donation or acceptance, along with the cellular redox context, determines the biological function of each protein. Several biological processes regulate the activity of target proteins through changes in the redox state of thiol groups (S2 to SH2), where a hydrogen donor is linked to an intermediary disulphide protein. Such processes include the ferredoxin/thioredoxin system, the NADP/thioredoxin system, and the glutathione/glutaredoxin system. Several of these disulphide proteins share a common structure, consisting of a three-layer α/β/α core. Proteins that contain domains with a thioredoxin-like fold include: Arsenate reductase (ArsC) Calsequestrin (contains three tandem repeats of this fold) Circadian oscillation regulator KaiB Disulphide bond isomerase DsbC and DsbG (C-terminal domain) Disulphide bond facilitator DsbA (contains an α-helical insertion) Endoplasmic reticulum protein ERP29 (N-terminal domain) Glutathione S-transferase (GST) (N-terminal domain) Mitochondrial ribosomal protei…
