identifier: InterPro:IPR036657
label: DNA-binding protein Tfx superfamily, archaea
definition: >-
  This entry represents a superfamily of Tfx DNA-binding proteins, which is restricted to the archaea. TfX has a 2-layer α/β topology. Homology among the members is strongest in the helix-turn-helix-containing N-terminal region. Tfx from Methanothermobacter thermautotrophicus (Methanobacterium thermoformicicum) is associated with the operon for molybdenum formyl-methanofuran dehydrogenase and binds a DNA sequence near its promoter.
