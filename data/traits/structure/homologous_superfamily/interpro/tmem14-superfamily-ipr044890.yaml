identifier: InterPro:IPR044890
label: "TMEM14 superfamily"
definition: >-
  This entry includes a group of transmembrane proteins, including protein FATTY ACID EXPORT 1 (FAX1) from Arabidopsis and TMEM14 from animals. FAX1 mediates the export of free fatty acid from the plastids and is required for biogenesis of the outer pollen cell wall, in particular for the assembly of exine and pollen coat and for the release of ketone wax components. The Zebrafish TMEM14 is required for normal heme biosynthesis. The structure of human TMEM14 showed a three helical bundle.
