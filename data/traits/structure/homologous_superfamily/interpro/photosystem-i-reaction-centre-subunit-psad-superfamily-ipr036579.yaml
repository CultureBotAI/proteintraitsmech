identifier: InterPro:IPR036579
label: "Photosystem I, reaction centre subunit PsaD superfamily"
definition: >-
  PsaD is a small, extrinsic polypeptide located on the stromal side (cytoplasmic side in cyanobacteria) of the photosystem I reaction centre complex. It is required for native assembly of PSI reaction clusters and is implicated in the electrostatic binding of ferredoxin within the reaction centre. PsaD forms a dimer in solution which is bound by PsaE however PsaD is monomeric in its native complexed PSI environment. Structurally, PsaD has a β-β(2)-β-α-β(2) fold with antiparallel sheet packed against helix, has β-hairpin on the same side and has an irregular C-terminal tail.
