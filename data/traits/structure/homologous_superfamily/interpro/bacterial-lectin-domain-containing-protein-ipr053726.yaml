identifier: InterPro:IPR053726
label: "Bacterial Lectin Domain-Containing Protein"
definition: >-
  This superfamily of proteins includes bacterial lectins that exhibit specificity for high mannose N-glycans, recognizing the branched structures within these glycans. They do not interact with other types of N-glycans or monosaccharides. Members of this superfamily are involved in cell differentiation and may have roles in agglutinating erythrocytes and inhibiting viral replication, such as that of HIV, by binding to viral envelope glycoproteins. Some members also display mitogenic activity on lymphocytes and do not require metal ions for their activity.
