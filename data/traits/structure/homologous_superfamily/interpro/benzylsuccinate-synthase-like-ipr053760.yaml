identifier: InterPro:IPR053760
label: "Benzylsuccinate Synthase-like"
definition: >-
  This superfamily of proteins is involved in the enzymatic addition of fumarate to aromatic hydrocarbons, a key step in anaerobic toluene degradation. Members of this superfamily function as part of a multi-subunit enzyme complex, catalyzing the initial reaction in the anaerobic breakdown of toluene to benzylsuccinate. The enzymatic activity is regulated by specific activating enzymes and is sensitive to oxygen, which can rapidly inactivate the enzyme. This indicates a role in anaerobic metabolic processes, particularly in environments where oxygen is scarce or absent.
