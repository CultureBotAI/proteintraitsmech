identifier: InterPro:IPR053719
label: "Lipogenesis and Microtubule Stabilization Superfamily"
definition: >-
  This superfamily of proteins is involved in the regulation of lipid metabolism, particularly lipogenesis. Members of this superfamily are known to up-regulate enzyme activity associated with the biosynthesis of various lipids, including triacylglycerol, diacylglycerol, and phospholipid. They are also implicated in the stabilization of microtubules. Some members may function as transcriptional coactivators and modulate the activity of specific transcription factors. The superfamily plays a significant role in liver lipid metabolism and in the mammary gland during lactation, where it is important for the production of medium-chain fatty acids.
