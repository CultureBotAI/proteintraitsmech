identifier: InterPro:IPR036890
label: "Histidine kinase/HSP90-like ATPase superfamily"
definition: >-
  This domain superfamily is found in several ATP-binding proteins, including: DNA mismatch repair protein MutL, Chaperone protein HtpG, DNA gyrase subunit B, Anti-sigma F factor, histidine kinase, topoisomerases, heat shock protein HSP90, phytochrome-like ATPases and DNA mismatch repair proteins. The fold of this domain consists of two layers, α/β, which contains an 8-stranded mixed β-sheet. DNA mismatch repair protein MutL is an essential component of the methyl-directed mismatch repair (MMR) system, which corrects replication errors and maintains genomic integrity. MutL functions in the Dam-dependent MMR pathway, where the methylation status of GATC sequences is used to distinguish the parental strand from the newly synthesised strand containing the replication error. MutL acts as a molecular matchmaker, facilitating the ATP-dependent assembly of stable complexes between DNA-binding proteins involved in the repair process without itself remaining part of the final effector complex. Following mismatch recognition by MutS, MutL is recruited to the site of damage, where it coordinates downstream repair events, including activation of the endonuclease MutH and recruitment of the UvrD helicase and exonucleases required for excision of the error-containing strand. The ATPase activity of MutL, mediated by its N-terminal GHKL domain, is essential for these functions, driving the conformational changes necessary for proper coordination of the repair machinery.
