identifier: InterPro:IPR011041
label: "Soluble quinoprotein glucose/sorbosone dehydrogenase, beta-propeller domain superfamily"
definition: >-
  This superfamily represents the β-propeller domain found in dehydrogenases from all cellular organisms. Quinoproteins form a class of dehydrogenases distinct from the NAD(P)- and flavin-dependent enzymes, using one of four different quinone cofactors for the oxidation of a variety of compounds. Soluble glucose dehydrogenase (s-GDH) from the bacterium Acinetobacter calcoaceticus is a quinoprotein that requires the cofactor pyrroloquinoline quinone (PQQ) to catalyse the oxidation of glucose to gluconolactone. s-GDH has six 4-stranded β-sheets in a β-propeller fold.
