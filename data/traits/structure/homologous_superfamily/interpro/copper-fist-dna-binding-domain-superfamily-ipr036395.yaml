identifier: InterPro:IPR036395
label: "Copper fist DNA-binding domain superfamily"
definition: >-
  Some fungal transcription factors contain an N-terminal domain, the copper fist, which seems to be involved in copper-dependent DNA-binding. These proteins activate the transcription of the metallothionein gene in response to copper. Metallothionein maintains copper levels in yeast. The copper fist domain, which is similar in structure to metallothionein itself, undergoes a large conformational change on copper-binding that allows DNA-binding. The domain contains a conserved array of zinc-binding residues (Cys-X2-Cys-X8-Cys-X-His) and forms a three-stranded antiparallel β-sheet with two short helical segments that project from one end of the β-sheet. Conserved residues form a basic patch that may be important for DNA binding.
