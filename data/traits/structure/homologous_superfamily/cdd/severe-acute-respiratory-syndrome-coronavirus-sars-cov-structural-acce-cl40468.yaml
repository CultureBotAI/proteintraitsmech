identifier: CDD:cl40468
label: "Severe Acute Respiratory Syndrome coronavirus (SARS-CoV) structural accessory protein ORF7a and similar proteins from related betacoronaviruses in the subgenera Sarbecovirus (B lineage). This group contains the structural accessory protein ORF7a, also called NS7a, of Severe Acute Respiratory Syndrome Coronaviruses (SARS-CoVs) from betacoronavirus subgenera Sarbecovirus (lineage B). ORF7a/NS7a from betacoronavirus in the subgenera Sarbecovirus (B lineage) are not related to NS7a proteins from other coronavirus lineages. There are five essential genes in CoVs that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and the ORF1ab (a large polyprotein known as replicase/protease); all required to produce a structurally complete viral particle. In addition, SARS-CoV contains a number of open reading frames that code for a total of eight accessory proteins, namely ORFs 3a, 3b, 6, 7a, 7b, 8a, 8b, and 9b. These ORFs are specific for SARS-CoV and do not show significant homology to accessory proteins of other coronaviruses. Structurally, ORF7a possesses a distinctive immunoglobulin (Ig)-like domain which is related to extracellular metazoan Ig domains that are involved in adhesion, such as ICAM; it also contains a 15-aa signal peptide sequence at its N terminus, an 81-aa luminal domain, a 21-aa transmembrane domain, and a short C-terminal tail. Coexpression of SARS-CoV ORF7a with S, M, N, and E proteins resulted in production of virus-like particles (VLPs) carrying ORF7a protein, indicating that ORF7a is a viral structural protein. Expression studies of ORF7a have shown that biological functions include induction of apoptosis through a caspase-dependent pathway, activation of the p38 mitogen-activated protein kinase signaling pathway, inhibition of host protein translation, and suppression of cell growth progression. These results collectively suggested that ORF7a protein may be involved in virus-host interactions."
