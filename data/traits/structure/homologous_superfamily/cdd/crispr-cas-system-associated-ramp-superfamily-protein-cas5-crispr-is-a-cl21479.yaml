label: "CRISPR/Cas system-associated RAMP superfamily protein Cas5. CRISPR is a term for Clustered, Regularly Interspaced Short Palindromic Repeats. A number of protein families appear only in association with these repeats and are designated Cas (CRISPR-Associated) proteins. This small Cas family is represented by CT1134 of Chlorobium tepidum."
definition: >-
  CRISPR/Cas system-associated RAMP superfamily protein Cas5. CRISPR is a term for Clustered, Regularly Interspaced Short Palindromic Repeats. A number of protein families appear only in association with these repeats and are designated Cas (CRISPR-Associated) proteins. This small Cas family is represented by CT1134 of Chlorobium tepidum. — an NCBI CDD domain superfamily (cl21479); members share this curated model.
