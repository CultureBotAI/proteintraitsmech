identifier: CDD:cl15774
label: "Hemerythrin family. Iteration of the HHE family found it to be related to Hemerythrin. It also demonstrated that what has been described as a single domain in fact consists of two cation binding domains. Members of this family occur all across nature and are involved in a variety of processes. For instance, in Nereis diversicolor Swiss:P80255 binds Cadmium so as to protect the organizm from toxicity. However Hemerythrin is classically described as Oxygen-binding through two attached Fe2+ ions. And the bacterial Swiss:Q7WX96 is a regulator of response to NO, which suggests yet another set-up for its metal ligands. In Staphylococcus aureus P72360 has been noted to be important when the organizm switches to living in environments with low oxygen concentrations; perhaps this protein acts as an oxygen store or scavenger. This domain can bind oxygen (Matilla et.al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043)"
definition: >-
  Hemerythrin family. Iteration of the HHE family found it to be related to Hemerythrin. It also demonstrated that what has been described as a single domain in fact consists of two cation binding domains. Members of this family occur all across nature and are involved in a variety of processes. For instance, in Nereis diversicolor Swiss:P80255 binds Cadmium so as to protect the organizm from toxicity. However Hemerythrin is classically described as Oxygen-binding through two attached Fe2+ ions. And the bacterial Swiss:Q7WX96 is a regulator of response to NO, which suggests yet another set-up for its metal ligands. In Staphylococcus aureus P72360 has been noted to be important when the organizm switches to living in environments with low oxygen concentrations; perhaps this protein acts as an oxygen store or scavenger. This domain can bind oxygen (Matilla et.al., FEMS Microbiology Reviews, fuab043, 45, 2021, 1. https://doi.org/10.1093/femsre/fuab043) — an NCBI CDD domain superfamily (cl15774); members share this curated model.
