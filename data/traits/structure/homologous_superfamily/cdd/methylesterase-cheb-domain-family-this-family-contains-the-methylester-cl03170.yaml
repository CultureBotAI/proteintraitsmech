identifier: CDD:cl03170
label: "methylesterase CheB domain family. This family contains the methylesterase CheB (EC 3.1.1.61; also known as CheB methylesterase, chemotaxis-specific methylesterase, methyl-accepting chemotaxis protein methyl-esterase, or protein methyl-esterase) domain, a phosphorylation-activated response regulator involved in reversible modification of bacterial chemotaxis receptors, fused with a CheR domain as well as other domains. Signaling output of the chemotaxis receptors is modulated by CheB and methyltransferase CheR by controlling the level of receptor methylation. cheB and cheR are typically found in the same operon. However, CheB and CheR are fused in multi-domain proteins in this subgroup. The CheR protein/domain includes an all-alpha N-terminal domain and an S-adenosylmethionine-dependent methyltransferase C-terminal domain. Reversible methylation of transmembrane chemoreceptors plays an important role in ligand-dependent signaling and cellular adaptation in bacterial chemotaxis. Phosphorylated CheB catalyzes deamidation of specific glutamine residues in the cytoplasmic region of the chemoreceptors and demethylation of specific methyl glutamate residues introduced into the chemoreceptors by CheR."
definition: >-
  methylesterase CheB domain family. This family contains the methylesterase CheB (EC 3.1.1.61; also known as CheB methylesterase, chemotaxis-specific methylesterase, methyl-accepting chemotaxis protein methyl-esterase, or protein methyl-esterase) domain, a phosphorylation-activated response regulator involved in reversible modification of bacterial chemotaxis receptors, fused with a CheR domain as well as other domains. Signaling output of the chemotaxis receptors is modulated by CheB and methyltransferase CheR by controlling the level of receptor methylation. cheB and cheR are typically found in the same operon. However, CheB and CheR are fused in multi-domain proteins in this subgroup. The CheR protein/domain includes an all-alpha N-terminal domain and an S-adenosylmethionine-dependent methyltransferase C-terminal domain. Reversible methylation of transmembrane chemoreceptors plays an important role in ligand-dependent signaling and cellular adaptation in bacterial chemotaxis. Phosphorylated CheB catalyzes deamidation of specific glutamine residues in the cytoplasmic region of the chemoreceptors and demethylation of specific methyl glutamate residues introduced into the chemoreceptors by CheR. — an NCBI CDD domain superfamily (cl03170); members share this curated model.
