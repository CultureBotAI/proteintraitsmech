identifier: CDD:cl41750
label: "regulatory coiled-coil domain found in the kinesin-like KIF21 family. KIF21A, also called kinesin-like protein KIF2 or renal carcinoma antigen NY-REN-62, is a microtubule-binding motor protein involved in neuronal axonal transport. It works as a microtubule stabilizer that regulates axonal morphology, suppressing cortical microtubule dynamics in neurons. Mutations in KIF21A cause congenital fibrosis of the extraocular muscles type 1 (CFEOM1). In vitro, it has a plus-end directed motor activity. This model corresponds to the regulatory coiled-coil domain of KIF21A, which folds into an intramolecular antiparallel coiled-coil monomer in solution, but crystallizes into a dimeric domain-swapped antiparallel coiled-coil."
definition: >-
  regulatory coiled-coil domain found in the kinesin-like KIF21 family. KIF21A, also called kinesin-like protein KIF2 or renal carcinoma antigen NY-REN-62, is a microtubule-binding motor protein involved in neuronal axonal transport. It works as a microtubule stabilizer that regulates axonal morphology, suppressing cortical microtubule dynamics in neurons. Mutations in KIF21A cause congenital fibrosis of the extraocular muscles type 1 (CFEOM1). In vitro, it has a plus-end directed motor activity. This model corresponds to the regulatory coiled-coil domain of KIF21A, which folds into an intramolecular antiparallel coiled-coil monomer in solution, but crystallizes into a dimeric domain-swapped antiparallel coiled-coil. — an NCBI CDD domain superfamily (cl41750); members share this curated model.
