identifier: CDD:cl07008
label: "C-terminal domain of Arabidopsis thaliana At5g63150 and similar proteins. This domain of unknown function is found at the C terminal end of Mitochondrial small ribosomal subunit protein mS38, also known as Mitochondrial mRNA-processing protein COX24 in yeast which is involved in the splicing of the COX1 mRNA. COX24 is a component of the mitochondrial ribosome (mitoribosome), responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. The mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. This domain is also found in COX24 mammalian homolog Aurora kinase A-interacting protein. This entry also includes uncharacterized proteins from bacteria."
definition: >-
  C-terminal domain of Arabidopsis thaliana At5g63150 and similar proteins. This domain of unknown function is found at the C terminal end of Mitochondrial small ribosomal subunit protein mS38, also known as Mitochondrial mRNA-processing protein COX24 in yeast which is involved in the splicing of the COX1 mRNA. COX24 is a component of the mitochondrial ribosome (mitoribosome), responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. The mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. This domain is also found in COX24 mammalian homolog Aurora kinase A-interacting protein. This entry also includes uncharacterized proteins from bacteria. — an NCBI CDD domain superfamily (cl07008); members share this curated model.
