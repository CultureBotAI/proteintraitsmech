identifier: CDD:cl49624
label: "Arabinose-binding domain (ABD), beta-trefoil fold, found in the ABFB family. OTOGL is a mucin glycoprotein that is a component of the tectorial membrane. It acts as a gel-forming mucin that forms high-molecular-weight complexes and is glycosylated through mucin-type O-glycosylation. Mutations in the OTOGL gene may cause hearing loss. OTOGL contains an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD of the related protein, alpha-L-arabinofuranosidase, binds two arabinose molecules in the beta and gamma subdomains."
definition: >-
  Arabinose-binding domain (ABD), beta-trefoil fold, found in the ABFB family. OTOGL is a mucin glycoprotein that is a component of the tectorial membrane. It acts as a gel-forming mucin that forms high-molecular-weight complexes and is glycosylated through mucin-type O-glycosylation. Mutations in the OTOGL gene may cause hearing loss. OTOGL contains an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD of the related protein, alpha-L-arabinofuranosidase, binds two arabinose molecules in the beta and gamma subdomains. — an NCBI CDD domain superfamily (cl49624); members share this curated model.
