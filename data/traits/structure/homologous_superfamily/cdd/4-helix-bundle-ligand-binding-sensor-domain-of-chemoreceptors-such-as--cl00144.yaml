identifier: CDD:cl00144
label: "4-helix bundle ligand binding sensor domain of chemoreceptors such as Tar or Tsr. The periplasmic ligand binding sensor domain of NarX is a histidine kinase receptor that responds to nitrate and nitrite to effect regulation of anaerobic respiration in various bacteria and similar proteins. It forms a homodimer and binds to ligands such as nitrate via the dimerization interface, a feature that appears to be conserved in this domain superfamily. NarX-NarL sensor-response regulator pair controls Escherichia coli gene expression in response to nitrate and nitrite. NarX has been shown to exhibit a clear kinetic preference for NarL over NarP, the sensor response partner of NarQ."
definition: >-
  4-helix bundle ligand binding sensor domain of chemoreceptors such as Tar or Tsr. The periplasmic ligand binding sensor domain of NarX is a histidine kinase receptor that responds to nitrate and nitrite to effect regulation of anaerobic respiration in various bacteria and similar proteins. It forms a homodimer and binds to ligands such as nitrate via the dimerization interface, a feature that appears to be conserved in this domain superfamily. NarX-NarL sensor-response regulator pair controls Escherichia coli gene expression in response to nitrate and nitrite. NarX has been shown to exhibit a clear kinetic preference for NarL over NarP, the sensor response partner of NarQ. — an NCBI CDD domain superfamily (cl00144); members share this curated model.
