identifier: CDD:cl23908
label: "Head domain of virus receptor-binding proteins (RBP). Caudo_bapla_RBP is a family of proteins expressed from ORF18 of the Lactococcus P2-like phage. This is one of three protein species, shoulders, neck, and head, that form the phage tail base-plate. In the overall structure this head domain exists as six trimers, and is necessary for specific recognition of the receptors at the host cell surface. Siphoviridae are the P2-like Caudovirales of Lactococcus. This family now includes DUF1914. Family Baseplate, pfam16774, is the ORF15 or shoulder component of the base-plate complex."
definition: >-
  Head domain of virus receptor-binding proteins (RBP). Caudo_bapla_RBP is a family of proteins expressed from ORF18 of the Lactococcus P2-like phage. This is one of three protein species, shoulders, neck, and head, that form the phage tail base-plate. In the overall structure this head domain exists as six trimers, and is necessary for specific recognition of the receptors at the host cell surface. Siphoviridae are the P2-like Caudovirales of Lactococcus. This family now includes DUF1914. Family Baseplate, pfam16774, is the ORF15 or shoulder component of the base-plate complex. — an NCBI CDD domain superfamily (cl23908); members share this curated model.
