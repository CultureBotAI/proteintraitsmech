identifier: CDD:cl22409
label: "Bacterial immunoglobulin-like hydrophobin BslA and similar proteins. This family includes members such as BslA (previously called YuaB). Secreted BslA from Bacillus subtillis has been shown to form surface layers around the biofilm self-assembling at interfaces of B. subtilis biofilms, forming an elastic film. structural analysis revealed that BslA consists of an Ig-type fold with the addition of an unusual, extremely hydrophobic cap region. The hydrophobic cap exhibits physiochemical properties similar to the hydrophobic surface found in fungal hydrophobins; thus, BslA is defined as member of a class of bacterially produced hydrophobins."
definition: >-
  Bacterial immunoglobulin-like hydrophobin BslA and similar proteins. This family includes members such as BslA (previously called YuaB). Secreted BslA from Bacillus subtillis has been shown to form surface layers around the biofilm self-assembling at interfaces of B. subtilis biofilms, forming an elastic film. structural analysis revealed that BslA consists of an Ig-type fold with the addition of an unusual, extremely hydrophobic cap region. The hydrophobic cap exhibits physiochemical properties similar to the hydrophobic surface found in fungal hydrophobins; thus, BslA is defined as member of a class of bacterially produced hydrophobins. — an NCBI CDD domain superfamily (cl22409); members share this curated model.
