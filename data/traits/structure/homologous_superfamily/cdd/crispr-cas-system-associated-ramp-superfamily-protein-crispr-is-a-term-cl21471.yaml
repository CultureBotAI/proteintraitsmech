identifier: CDD:cl21471
label: "CRISPR/Cas system-associated RAMP superfamily protein. CRISPR is a term for Clustered Regularly Interspaced Short Palindromic Repeats. A number of protein families appear only in association with these repeats and are designated Cas (CRISPR associated) proteins. This highly divergent family, found in at least ten different archaeal and bacterial species, is represented by TM1793 from Thermotoga maritima."
definition: >-
  CRISPR/Cas system-associated RAMP superfamily protein. CRISPR is a term for Clustered Regularly Interspaced Short Palindromic Repeats. A number of protein families appear only in association with these repeats and are designated Cas (CRISPR associated) proteins. This highly divergent family, found in at least ten different archaeal and bacterial species, is represented by TM1793 from Thermotoga maritima. — an NCBI CDD domain superfamily (cl21471); members share this curated model.
