identifier: CDD:cl30941
label: "CheC/CheX/FliY (CXY) family phosphatases. This family contains class III CheC proteins, present chiefly in the archaeal class Halobacteria. Sequence analysis shows that class III CheC proteins are structurally and functionally similar to class I CheCs, and not to CheX, despite the fact that both class III CheCs and CheX lack the first of the two phosphatase active sites of class I CheCs, and retain the second active site. Mutation analysis shows that the second active site is more important for function that the first one, suggesting that class III proteins arose by loss of the unnecessary first active site through mutational shift. All chemotactic archaea have a CheC homologue."
definition: >-
  CheC/CheX/FliY (CXY) family phosphatases. This family contains class III CheC proteins, present chiefly in the archaeal class Halobacteria. Sequence analysis shows that class III CheC proteins are structurally and functionally similar to class I CheCs, and not to CheX, despite the fact that both class III CheCs and CheX lack the first of the two phosphatase active sites of class I CheCs, and retain the second active site. Mutation analysis shows that the second active site is more important for function that the first one, suggesting that class III proteins arose by loss of the unnecessary first active site through mutational shift. All chemotactic archaea have a CheC homologue. — an NCBI CDD domain superfamily (cl30941); members share this curated model.
