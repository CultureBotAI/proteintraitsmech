identifier: CDD:cl41772
label: "ADP-ribosylation factor-like protein 6-interacting protein 1, Reticulophagy regulator 3, and  similar proteins. Reticulophagy regulator 3 (RETR3 or RETREG3), also called FAM134C (family with sequence similarity 134, member C), mediates NRF1-enhanced neurite outgrowth. It interacts with ATG8 family modifier proteins MAP1LC3A, MAP1LC3B, GABARAP, and GABARAPL1. RETREG3/FAM134C contains an N-terminal reticulon-homology domain (RHD) that shows sequence similarity to ADP-ribosylation factor-like 6 binding factor 1 (Arl6IP1 or Arl6ip-1), an endoplasmic reticulum protein that has an important role in cell conduction and material transport. The RHD may function in inducing membrane curvature."
definition: >-
  ADP-ribosylation factor-like protein 6-interacting protein 1, Reticulophagy regulator 3, and similar proteins. Reticulophagy regulator 3 (RETR3 or RETREG3), also called FAM134C (family with sequence similarity 134, member C), mediates NRF1-enhanced neurite outgrowth. It interacts with ATG8 family modifier proteins MAP1LC3A, MAP1LC3B, GABARAP, and GABARAPL1. RETREG3/FAM134C contains an N-terminal reticulon-homology domain (RHD) that shows sequence similarity to ADP-ribosylation factor-like 6 binding factor 1 (Arl6IP1 or Arl6ip-1), an endoplasmic reticulum protein that has an important role in cell conduction and material transport. The RHD may function in inducing membrane curvature. — an NCBI CDD domain superfamily (cl41772); members share this curated model.
