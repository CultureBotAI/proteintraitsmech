label: "CHROMO (CHRromatin Organization Modifier) domains and chromo shadow domains. This is a novel knotted tudor domain which is required for binding to RNA. The know influences the loop conformation of the helical turn Ht2 - residues 61-6 3- that is located at the side opposite the knot in the tudor domain-chromodomain; stabilization of Ht2 is essential for RNA binding."
