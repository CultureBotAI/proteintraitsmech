label: "N-terminal catalytic domain of rhamnogalacturonan lyase, a family 4 polysaccharide lyase. Rhamnogalacturonate lyase (EC:4.2.2.-) degrades the rhamnogalacturonan I (RG-I) backbone of pectin. This family contains mainly members from plants, but also contains the plant pathogen Erwinia chrysanthemi."
