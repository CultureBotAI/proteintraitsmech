identifier: CDD:cl45902
label: "SPOC (Spen paralog and ortholog C-terminal) domain superfamily. Drosophila melanogaster protein partner of Sans-fille (PPS), also called protein partner of Snf, is a homolog of human DIDO. It mediates diverse chromatin activities, including the regulation of stemness genes in embryonic stem cells and splicing. PPS associates with spliceosomal RNAs including the U1 snRNP protein Sans-fille (Snf) to mediate sex determination gene Sex-lethal (Sxl) splicing autoregulation. Alternative splicing of the Sxl pre-mRNA determines gender during development in Drosophila, producing protein-encoding mRNAs in females but yielding inactive and truncated mRNAs in males. PPS contains a plant homeodomain (PHD) finger, Brahma and Kismet (BRK), a transcription elongation factor S-II subunit M (TFSIIM) domain, and a SPOC domain. This model corresponds to the SPOC domain that is involved in developmental signaling and has also been proposed to be a phosphorylation binding module."
definition: >-
  SPOC (Spen paralog and ortholog C-terminal) domain superfamily. Drosophila melanogaster protein partner of Sans-fille (PPS), also called protein partner of Snf, is a homolog of human DIDO. It mediates diverse chromatin activities, including the regulation of stemness genes in embryonic stem cells and splicing. PPS associates with spliceosomal RNAs including the U1 snRNP protein Sans-fille (Snf) to mediate sex determination gene Sex-lethal (Sxl) splicing autoregulation. Alternative splicing of the Sxl pre-mRNA determines gender during development in Drosophila, producing protein-encoding mRNAs in females but yielding inactive and truncated mRNAs in males. PPS contains a plant homeodomain (PHD) finger, Brahma and Kismet (BRK), a transcription elongation factor S-II subunit M (TFSIIM) domain, and a SPOC domain. This model corresponds to the SPOC domain that is involved in developmental signaling and has also been proposed to be a phosphorylation binding module. — an NCBI CDD domain superfamily (cl45902); members share this curated model.
