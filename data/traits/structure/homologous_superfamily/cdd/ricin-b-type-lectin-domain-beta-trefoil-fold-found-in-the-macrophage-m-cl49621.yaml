label: "ricin B-type lectin domain, beta-trefoil fold, found in the macrophage mannose receptor (MRC) family. The subfamily corresponds to a group of uncharacterized ricin B-type lectin beta-trefoil domain-containing proteins from Gnathostomata. They show high sequence similarity with macrophage mannose receptor (MRC) family proteins."
