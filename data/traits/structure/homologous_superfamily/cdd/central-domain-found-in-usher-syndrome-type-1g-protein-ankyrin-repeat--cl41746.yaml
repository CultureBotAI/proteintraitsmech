identifier: CDD:cl41746
label: "central domain found in usher syndrome type-1G protein, ankyrin repeat and SAM domain-containing protein 4B, and similar proteins. Usher syndrome type-1G protein (USH1G), also called scaffold protein containing ankyrin repeats and SAM domain (Sans), is an anchoring/scaffolding protein that is part of the functional network formed by USH1C, USH1G, CDH23 and MYO7A, that mediates mechanotransduction in cochlear hair cells. It is required for normal development and maintenance of cochlear hair cell bundles, as well as for normal hearing. USH1G consists of four N-terminal ANK repeats, a central region, and a sterile alpha motif (SAM) followed by a C-terminal type I PDZ binding motif (PBM). This model corresponds to the central region (CEN) of USH1G, which contains the conserved regions CEN1 and CEN2. CEN is directly responsible for binding to the MYO7A MyTH4-FERM tandem."
definition: >-
  central domain found in usher syndrome type-1G protein, ankyrin repeat and SAM domain-containing protein 4B, and similar proteins. Usher syndrome type-1G protein (USH1G), also called scaffold protein containing ankyrin repeats and SAM domain (Sans), is an anchoring/scaffolding protein that is part of the functional network formed by USH1C, USH1G, CDH23 and MYO7A, that mediates mechanotransduction in cochlear hair cells. It is required for normal development and maintenance of cochlear hair cell bundles, as well as for normal hearing. USH1G consists of four N-terminal ANK repeats, a central region, and a sterile alpha motif (SAM) followed by a C-terminal type I PDZ binding motif (PBM). This model corresponds to the central region (CEN) of USH1G, which contains the conserved regions CEN1 and CEN2. CEN is directly responsible for binding to the MYO7A MyTH4-FERM tandem. — an NCBI CDD domain superfamily (cl41746); members share this curated model.
