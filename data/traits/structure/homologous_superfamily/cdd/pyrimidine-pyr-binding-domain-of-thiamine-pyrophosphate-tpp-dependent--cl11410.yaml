identifier: CDD:cl11410
label: "Pyrimidine (PYR) binding domain of thiamine pyrophosphate (TPP)-dependent enzymes. Bacterial enzyme splits fructose-6-P and/or xylulose-5-P with the aid of inorganic phosphate into either acetyl-P and erythrose-4-P and/or acetyl-P and glyeraldehyde-3-P EC:4.1.2.9, EC:4.1.2.22. This family is distantly related to transketolases e.g. pfam02779."
definition: >-
  Pyrimidine (PYR) binding domain of thiamine pyrophosphate (TPP)-dependent enzymes. Bacterial enzyme splits fructose-6-P and/or xylulose-5-P with the aid of inorganic phosphate into either acetyl-P and erythrose-4-P and/or acetyl-P and glyeraldehyde-3-P EC:4.1.2.9, EC:4.1.2.22. This family is distantly related to transketolases e.g. pfam02779. — an NCBI CDD domain superfamily (cl11410); members share this curated model.
