identifier: CDD:cl17506
label: "IgD-like repeat domain of mycobacterial L,D-transpeptidases. Immunoglobulin-like domain found in actinobacterial L,D-transpeptidases, including Mycobacterium tuberculosis LdtMt2, which is a non-classical transpeptidase that generates 3->3 transpeptide linkages. LdtMt2 is associated with virulence and resistance to amoxicillin. This domain may occur in a tandem-repeat arrangement and is found N-terminal to the catalytic L,D-transpeptidase domain; this model represents the  repeat adjacent to the catalytic domain."
definition: >-
  IgD-like repeat domain of mycobacterial L,D-transpeptidases. Immunoglobulin-like domain found in actinobacterial L,D-transpeptidases, including Mycobacterium tuberculosis LdtMt2, which is a non-classical transpeptidase that generates 3->3 transpeptide linkages. LdtMt2 is associated with virulence and resistance to amoxicillin. This domain may occur in a tandem-repeat arrangement and is found N-terminal to the catalytic L,D-transpeptidase domain; this model represents the repeat adjacent to the catalytic domain. — an NCBI CDD domain superfamily (cl17506); members share this curated model.
