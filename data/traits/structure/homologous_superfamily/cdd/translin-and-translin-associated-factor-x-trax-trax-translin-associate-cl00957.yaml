identifier: CDD:cl00957
label: "Translin and translin-associated factor-X (TRAX). TRAX (translin-associated factor-X) is a paralog of its binding partner protein Translin and together they form oligomeric complexes known as C3PO proteins (for component 3 promoter of  RNA-induced silencing complex or RISC). TRAX complexed with Translin is possibly involved in dendritic RNA processing and in DNA double-strand break repair as an interacting partner with C1D, an activator of the DNA-dependent protein kinase involved in the repair of DNA-double strand breaks. It has been shown that Trax subunit, but not Translin, possesses a Glu-Glu-Asp catalytic center with the capacity to digest RNA; this catalytic activity is required for passenger-strand removal and RISC activation in RNAi. In Archaeoglobus fulgidus, Trax-like-subunits assemble into an octameric structure, highly similar to human C3PO; its complex with duplex RNA reveals that the octamer entirely encapsulates a single 13-base-pair RNA duplex inside a large inner cavity. Translin and Trax participate in a variety of nucleic acid metabolism pathways in addition to RNAi and have been implicated in a wide range of biological activities, including mRNA processing, cell growth regulation, spermatogenesis, neuronal development/function, genome stability regulation and carcinogenesis; however, their precise role in some of the processes remains unclear."
