identifier: CDD:cl41727
label: "H1 domain found in potassium channel tetramerization domain-containing proteins. Potassium channel tetramerization domain-containing protein 16 (KCTD16) is a BTB/POZ domain-containing protein that is an auxiliary subunit of gamma-aminobutyric acid type B (GABA-) receptors associated with mood disorders. It interacts with amyloid beta precursor protein (APP), a type I transmembrane protein involved in a variety of cellular processes such as cell adhesion and axon guidance. KCTD16 generates largely non-desensitizing receptor responses. It consists of an N-terminal BTB domain followed by a region called the H1 domain. The BTB domain mediates interaction with the receptor. The C-terminal H1 domain, which possesses a beta-propeller-like fold, engages in interactions with G-protein beta-gamma subunits. In the related protein KCTD12, the H1 domain is also responsible for desensitization. This model corresponds to the H1 domain of KCTD16, which may not be involved in desensitization."
definition: >-
  H1 domain found in potassium channel tetramerization domain-containing proteins. Potassium channel tetramerization domain-containing protein 16 (KCTD16) is a BTB/POZ domain-containing protein that is an auxiliary subunit of gamma-aminobutyric acid type B (GABA-) receptors associated with mood disorders. It interacts with amyloid beta precursor protein (APP), a type I transmembrane protein involved in a variety of cellular processes such as cell adhesion and axon guidance. KCTD16 generates largely non-desensitizing receptor responses. It consists of an N-terminal BTB domain followed by a region called the H1 domain. The BTB domain mediates interaction with the receptor. The C-terminal H1 domain, which possesses a beta-propeller-like fold, engages in interactions with G-protein beta-gamma subunits. In the related protein KCTD12, the H1 domain is also responsible for desensitization. This model corresponds to the H1 domain of KCTD16, which may not be involved in desensitization. — an NCBI CDD domain superfamily (cl41727); members share this curated model.
