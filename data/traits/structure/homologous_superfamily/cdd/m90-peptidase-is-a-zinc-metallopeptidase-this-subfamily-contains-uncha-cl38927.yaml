identifier: CDD:cl38927
label: "M90 peptidase is a zinc-metallopeptidase. This subfamily contains uncharacterized M90 peptidase-like domains, similar to the Mlc Titration Factor A (MtfA) peptidase from Escherichia coli, also known as the YeeI gene product, which is involved in the control of the glucose-phosphotransferase sensory and regulatory system by inactivation of the repressor Mlc (making large colonies). E. coli MtfA has been shown to have aminopeptidase activity with the presence of a single zinc ion in the active site ligated by two histidines in an HEXXH motif. MtfA is related to the catalytic domain of the anthrax lethal factor and the Mop protein involved in the virulence of Vibrio cholerae; although sequence similarity is low, conservation is observed in the overall structure as well as in the residues around the active site."
definition: >-
  M90 peptidase is a zinc-metallopeptidase. This subfamily contains uncharacterized M90 peptidase-like domains, similar to the Mlc Titration Factor A (MtfA) peptidase from Escherichia coli, also known as the YeeI gene product, which is involved in the control of the glucose-phosphotransferase sensory and regulatory system by inactivation of the repressor Mlc (making large colonies). E. coli MtfA has been shown to have aminopeptidase activity with the presence of a single zinc ion in the active site ligated by two histidines in an HEXXH motif. MtfA is related to the catalytic domain of the anthrax lethal factor and the Mop protein involved in the virulence of Vibrio cholerae; although sequence similarity is low, conservation is observed in the overall structure as well as in the residues around the active site. — an NCBI CDD domain superfamily (cl38927); members share this curated model.
