identifier: CDD:cl07433
label: "Serine rich Four helix bundle domain of CAS (Crk-Associated Substrate) scaffolding proteins; a protein interaction module. BCAR1, also called p130cas or CASS1, is the founding member of the CAS family of scaffolding proteins and was originally identified through its ability to associate with Crk. The name BCAR1 was designated because the human gene was identified in a screen for genes that promote resistance to tamoxifen. It is widely expressed and its deletion is lethal in mice. It plays a role in regulating cell motility, survival, proliferation, transformation, cancer progression, and bacterial pathogenesis. CAS proteins function as molecular scaffolds to regulate protein complexes that are involved in many cellular processes. They share a common domain structure containing protein interaction modules that enable their scaffolding function, including an N-terminal SH3 domain, an unstructured substrate domain that contains many YxxP motifs, a serine-rich four-helix bundle, and a FAT-like C-terminal domain. CAS proteins associate with the 14-3-3 family; this interaction is regulated by integrin-mediated cell adhesion. The serine rich four helix bundle domain of BCAR1 has been shown to bind 14-3-3 in a phosphorylation-dependent manner. This domain is structurally similar to other helical bundles found in cell adhesion components such as alpha-catenin, vinculin, and FAK, and may bind other proteins in addition to the 14-3-3 family."
