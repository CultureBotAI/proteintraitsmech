label: "Carbohydrate Binding Module 6 (CBM6) and CBM35_like superfamily. CBM_26 is a family of bacterial carbohydrate-binding modules frequently found at the C-terminus of enzymes. The combination is not unusual as the CBMs function to bring the relevant polysaccharide into close proximity to the active site."
definition: >-
  Carbohydrate Binding Module 6 (CBM6) and CBM35_like superfamily. CBM_26 is a family of bacterial carbohydrate-binding modules frequently found at the C-terminus of enzymes. The combination is not unusual as the CBMs function to bring the relevant polysaccharide into close proximity to the active site. — an NCBI CDD domain superfamily (cl14880); members share this curated model.
