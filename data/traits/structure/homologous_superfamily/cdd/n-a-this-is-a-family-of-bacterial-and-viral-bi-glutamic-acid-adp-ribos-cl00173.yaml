label: "N/A. This is a family of bacterial and viral bi-glutamic acid ADP-ribosyltransferases, where, in Swiss:Q93Q17, E403 is the catalytic residue and E401 contributes to the transfer of ADP-ribose to the target protein. In clostridial species it is actin that is being ADP-ribosylated; this result is lethal and dermonecrotic in infected mammals."
