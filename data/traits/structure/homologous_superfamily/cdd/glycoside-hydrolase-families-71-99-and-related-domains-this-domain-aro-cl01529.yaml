identifier: CDD:cl01529
label: "Glycoside hydrolase families 71, 99, and related domains. This domain, around 350 residues, is mainly found in some uncharacterized proteins from bacteroides to human. Some proteins in this family, annotated as endo-alpha-mannosidases cleave mannoside linkages internally within an N-linked glycan chain, short circuiting the classical N-glycan biosynthetic pathway. This domain reveals a (beta-alpha)(8) barrel fold in which the catalytic centre is present in a long substrate-binding groove, consistent with cleavage within the N-glycan chain, providing a foundation upon which to develop new enzyme inhibitors targeting the hijacking of N-glycan synthesis in viral disease and cancer."
definition: >-
  Glycoside hydrolase families 71, 99, and related domains. This domain, around 350 residues, is mainly found in some uncharacterized proteins from bacteroides to human. Some proteins in this family, annotated as endo-alpha-mannosidases cleave mannoside linkages internally within an N-linked glycan chain, short circuiting the classical N-glycan biosynthetic pathway. This domain reveals a (beta-alpha)(8) barrel fold in which the catalytic centre is present in a long substrate-binding groove, consistent with cleavage within the N-glycan chain, providing a foundation upon which to develop new enzyme inhibitors targeting the hijacking of N-glycan synthesis in viral disease and cancer. — an NCBI CDD domain superfamily (cl01529); members share this curated model.
