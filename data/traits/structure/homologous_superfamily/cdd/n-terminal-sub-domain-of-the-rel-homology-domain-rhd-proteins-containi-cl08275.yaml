identifier: CDD:cl08275
label: "N-terminal sub-domain of the Rel homology domain (RHD). Proteins containing the Rel homology domain (RHD) are eukaryotic transcription factors. The RHD is composed of two structural domains. This is the N-terminal DNA-binding domain that is similar to that found in P53. The C-terminal domain has an immunoglobulin-like fold (See pfam16179) that functions as a dimerization domain."
definition: >-
  N-terminal sub-domain of the Rel homology domain (RHD). Proteins containing the Rel homology domain (RHD) are eukaryotic transcription factors. The RHD is composed of two structural domains. This is the N-terminal DNA-binding domain that is similar to that found in P53. The C-terminal domain has an immunoglobulin-like fold (See pfam16179) that functions as a dimerization domain. — an NCBI CDD domain superfamily (cl08275); members share this curated model.
