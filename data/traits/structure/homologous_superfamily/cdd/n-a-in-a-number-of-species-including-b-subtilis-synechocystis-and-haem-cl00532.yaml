identifier: CDD:cl00532
label: "N/A. In a number of species, including B.subtilis, Synechocystis, and Haemophilus influenzae, urease subunits beta and gamma are encoded as separate polypeptides. In Helicobacter pylori UreA and in the fission yeast Schizosaccharomyces pombe, beta subunit-like sequence follows gamma subunit-like sequence in a single chain; the fission yeast protein contains additional C-terminal regions. Nomenclature for the various subunits of urease in Helicobacter differs from nomenclature in most other species. [Central intermediary metabolism, Nitrogen metabolism]"
definition: >-
  N/A. In a number of species, including B.subtilis, Synechocystis, and Haemophilus influenzae, urease subunits beta and gamma are encoded as separate polypeptides. In Helicobacter pylori UreA and in the fission yeast Schizosaccharomyces pombe, beta subunit-like sequence follows gamma subunit-like sequence in a single chain; the fission yeast protein contains additional C-terminal regions. Nomenclature for the various subunits of urease in Helicobacter differs from nomenclature in most other species. [Central intermediary metabolism, Nitrogen metabolism] — an NCBI CDD domain superfamily (cl00532); members share this curated model.
