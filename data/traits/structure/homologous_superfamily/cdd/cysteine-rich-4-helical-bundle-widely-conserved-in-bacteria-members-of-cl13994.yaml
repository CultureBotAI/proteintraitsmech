identifier: CDD:cl13994
label: "Cysteine-rich 4 helical bundle widely conserved in bacteria. Members of this family average about 150 amino acids in length, beginning with a twin-arginine translocation signal sequence, then a His-rich spacer region, followed by a ~105-residue region in which thirteen positions are nearly invariant Cys residues. CDD (Conserved Domain Database) assigns members of this family to clan cl13994, the DUF326 superfamily, based on homology to PA2107 from Pseudomonas aeruginosa. PA2107 is a cysteine-rich four helical bundle protein, with solved structure PDB:3KAW."
definition: >-
  Cysteine-rich 4 helical bundle widely conserved in bacteria. Members of this family average about 150 amino acids in length, beginning with a twin-arginine translocation signal sequence, then a His-rich spacer region, followed by a ~105-residue region in which thirteen positions are nearly invariant Cys residues. CDD (Conserved Domain Database) assigns members of this family to clan cl13994, the DUF326 superfamily, based on homology to PA2107 from Pseudomonas aeruginosa. PA2107 is a cysteine-rich four helical bundle protein, with solved structure PDB:3KAW. — an NCBI CDD domain superfamily (cl13994); members share this curated model.
