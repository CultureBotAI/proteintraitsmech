identifier: CDD:cl40448
label: "NURR (N-terminal unit for RNA recognition) domain. hnRNPR is a highly conserved RNA-binding protein that belongs to the heterogeneous nuclear ribonucleoprotein (hnRNP) family. hnRNP plays an important role in processing of precursor mRNA in the nucleus. hnRNPR acts as a general positive regulator of MHC class I expression. The model corresponds to NURR domain of hnRNPR."
definition: >-
  NURR (N-terminal unit for RNA recognition) domain. hnRNPR is a highly conserved RNA-binding protein that belongs to the heterogeneous nuclear ribonucleoprotein (hnRNP) family. hnRNP plays an important role in processing of precursor mRNA in the nucleus. hnRNPR acts as a general positive regulator of MHC class I expression. The model corresponds to NURR domain of hnRNPR. — an NCBI CDD domain superfamily (cl40448); members share this curated model.
