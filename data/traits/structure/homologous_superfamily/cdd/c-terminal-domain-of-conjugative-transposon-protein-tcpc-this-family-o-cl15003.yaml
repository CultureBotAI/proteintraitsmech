identifier: CDD:cl15003
label: "C-terminal domain of conjugative transposon protein TcpC. This family of proteins are annotated as conjugative transposon protein TcpC. The transfer clostridial plasmid (tcp) locus is part of some conjugative antibiotic resistance and virulence plasmids. TcpC was one of five genes whose products had low-level sequence identity to Tn916 proteins, having similarity to ORF13 homologs from Tn916, Tn5397, and CW459tet. This family of proteins is found in bacteria. Proteins in this family are typically between 302 and 351 amino acids in length."
definition: >-
  C-terminal domain of conjugative transposon protein TcpC. This family of proteins are annotated as conjugative transposon protein TcpC. The transfer clostridial plasmid (tcp) locus is part of some conjugative antibiotic resistance and virulence plasmids. TcpC was one of five genes whose products had low-level sequence identity to Tn916 proteins, having similarity to ORF13 homologs from Tn916, Tn5397, and CW459tet. This family of proteins is found in bacteria. Proteins in this family are typically between 302 and 351 amino acids in length. — an NCBI CDD domain superfamily (cl15003); members share this curated model.
