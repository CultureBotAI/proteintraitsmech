label: "Ancestral coatomer element 1 (ACE1) of COPII coat complex assembly protein Sec16. Sec16 is a multi-domain vesicle coat protein. The C-terminal region is the part that binds to Sec23, a COPII vesicle coat protein. This association is part of the transport vesicle coat structure."
definition: >-
  Ancestral coatomer element 1 (ACE1) of COPII coat complex assembly protein Sec16. Sec16 is a multi-domain vesicle coat protein. The C-terminal region is the part that binds to Sec23, a COPII vesicle coat protein. This association is part of the transport vesicle coat structure. — an NCBI CDD domain superfamily (cl14807); members share this curated model.
