label: "DNA-binding domain found in DNA repair protein complementing XP-A cells (XPA), yeast DNA repair protein RAD14 and similar proteins. ZNT9, also known as solute carrier family 30 member 9 (SLC30A9), may act as a zinc transporter involved in intracellular zinc homeostasis and may also play a role as nuclear receptor coactivator."
definition: >-
