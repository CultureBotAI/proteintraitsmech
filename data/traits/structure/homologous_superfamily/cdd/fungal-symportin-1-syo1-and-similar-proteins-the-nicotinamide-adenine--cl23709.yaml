identifier: CDD:cl23709
label: "Fungal symportin 1 (syo1) and similar proteins. The nicotinamide adenine dinucleotidase SARM1 (sterile alpha and TIR motif containing 1) is involved in TLR (Toll-like receptor) signaling. It is responsible for targeted localization of the whole protein to post-synaptic regions of axons and plays a role in axon degeneration and therefore in several neurodegenerative conditions. Its NADase activity depletes the key cellular metabolite, NAD+, in response to nerve injury. SARM1 forms a homo-octamer, which avoids premature activation via a packed conformation that prevents dimerization and activation of the catalytic domains. The inactive conformation is stabilized by binding of the substrate NAD+ in an allosteric location distinct from the catalytic sites. This model characterizes the armadillo (ARM) repeat-containing N-terminal domain of SARM1."
definition: >-
  Fungal symportin 1 (syo1) and similar proteins. The nicotinamide adenine dinucleotidase SARM1 (sterile alpha and TIR motif containing 1) is involved in TLR (Toll-like receptor) signaling. It is responsible for targeted localization of the whole protein to post-synaptic regions of axons and plays a role in axon degeneration and therefore in several neurodegenerative conditions. Its NADase activity depletes the key cellular metabolite, NAD+, in response to nerve injury. SARM1 forms a homo-octamer, which avoids premature activation via a packed conformation that prevents dimerization and activation of the catalytic domains. The inactive conformation is stabilized by binding of the substrate NAD+ in an allosteric location distinct from the catalytic sites. This model characterizes the armadillo (ARM) repeat-containing N-terminal domain of SARM1. — an NCBI CDD domain superfamily (cl23709); members share this curated model.
