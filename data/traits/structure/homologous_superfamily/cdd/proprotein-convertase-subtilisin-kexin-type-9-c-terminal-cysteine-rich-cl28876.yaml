identifier: CDD:cl28876
label: "proprotein convertase subtilisin/kexin type 9, C-terminal cysteine-rich domain (CRD). This entry represents a subdomain found in the C-terminal cysteine/histidine-rich domain (CRD) of PCSK9 (also known as neural apoptosis-regulated convertase, NARC-1). PCSK9 has been shown to regulate circulating LDL-R levels by controlling LDL-R degradation. Furthermore, numerous mutations in the PCSK9 gene have been identified and associated with hypercholesterolemia (gain of function) or hypocholesterolemia (loss of function). The fully folded CRD, shows structural similarity to the resistin homotrimer, a small cytokine associated with obesity and diabetes. The C-terminal domain from PCSK9 consists of three, three-stranded beta-subdomains arranged in a pseudothreefold, and each of the subdomains in the CRD of PCSK9 consists of three structurally conserved disulfide bonds."
definition: >-
  proprotein convertase subtilisin/kexin type 9, C-terminal cysteine-rich domain (CRD). This entry represents a subdomain found in the C-terminal cysteine/histidine-rich domain (CRD) of PCSK9 (also known as neural apoptosis-regulated convertase, NARC-1). PCSK9 has been shown to regulate circulating LDL-R levels by controlling LDL-R degradation. Furthermore, numerous mutations in the PCSK9 gene have been identified and associated with hypercholesterolemia (gain of function) or hypocholesterolemia (loss of function). The fully folded CRD, shows structural similarity to the resistin homotrimer, a small cytokine associated with obesity and diabetes. The C-terminal domain from PCSK9 consists of three, three-stranded beta-subdomains arranged in a pseudothreefold, and each of the subdomains in the CRD of PCSK9 consists of three structurally conserved disulfide bonds. — an NCBI CDD domain superfamily (cl28876); members share this curated model.
