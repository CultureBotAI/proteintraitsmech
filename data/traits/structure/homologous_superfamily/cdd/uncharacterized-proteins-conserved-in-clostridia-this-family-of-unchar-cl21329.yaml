identifier: CDD:cl21329
label: "Uncharacterized proteins conserved in Clostridia. This family of uncharacterized proteins from Clostridia and Bacilli classes has an unusual structure of three beta propeller repeats that do not form a barrel, as in well known 6-, 7- etc beta propeller barrels, but instead are stacked in a three-layer beta-sheet sandwich. The function of all the proteins from this family is unknown."
definition: >-
  Uncharacterized proteins conserved in Clostridia. This family of uncharacterized proteins from Clostridia and Bacilli classes has an unusual structure of three beta propeller repeats that do not form a barrel, as in well known 6-, 7- etc beta propeller barrels, but instead are stacked in a three-layer beta-sheet sandwich. The function of all the proteins from this family is unknown. — an NCBI CDD domain superfamily (cl21329); members share this curated model.
