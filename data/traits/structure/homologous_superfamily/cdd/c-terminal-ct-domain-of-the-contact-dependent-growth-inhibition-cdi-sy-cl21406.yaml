identifier: CDD:cl21406
label: "C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system protein CdiA (CdiA-CT) of Escherichia coli 563, and similar proteins. This entry represents the C-terminal RNase toxin domain found in bacterial polymorphic toxin systems. The toxin possesses an all alpha-helical fold and conserved aspartate and glutamate residues, and K[DE] and [DN]HxxE motifs. In bacterial polymorphic toxin systems, the toxin is exported by the type 2, type 5 or type 7 secretion system. This C-terminal domain cleaves within tRNA anticodon loops, tRNase activity that is stimulated by CysK which stabilizes this domain and allows its binding to the tRNA substrate."
definition: >-
  C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system protein CdiA (CdiA-CT) of Escherichia coli 563, and similar proteins. This entry represents the C-terminal RNase toxin domain found in bacterial polymorphic toxin systems. The toxin possesses an all alpha-helical fold and conserved aspartate and glutamate residues, and K[DE] and [DN]HxxE motifs. In bacterial polymorphic toxin systems, the toxin is exported by the type 2, type 5 or type 7 secretion system. This C-terminal domain cleaves within tRNA anticodon loops, tRNase activity that is stimulated by CysK which stabilizes this domain and allows its binding to the tRNA substrate. — an NCBI CDD domain superfamily (cl21406); members share this curated model.
