label: "N/A. MIT_C is the C-terminal domain of MIT-containing proteins, pfam04212. It contains an unanticipated phospholipase d fold (PLD fold) that binds avidly to phosphoinositide-containing membranes. It is conserved in eukaryotes, though not fungi and plants, and some bacteria."
