identifier: CDD:cl02614
label: "SPRY domain. This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of Stonustoxin alpha proteins. Stonustoxin (SNTX) is a multifunctional lethal protein isolated from venom elaborated by the stonefish. It comprises two subunits, termed alpha and beta. SNTX elicits an array of biological responses, particularly a potent hypotension and respiratory difficulties."
definition: >-
