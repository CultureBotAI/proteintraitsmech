identifier: CDD:cl18968
label: "Ribonuclease H2-B is a subunit of the eukaryotic RNase H complex which cleaves RNA-DNA hybrids. RNases H are enzymes that specifically hydrolyse RNA when annealed to a complementary DNA and are present in all living organizms. In yeast RNase H2 is composed of a complex of three proteins (Rnh2Ap, Ydr279p and Ylr154p), this family represents the homologs of Ydr279p. It is not known whether non yeast proteins in this family fulfil the same function."
definition: >-
  Ribonuclease H2-B is a subunit of the eukaryotic RNase H complex which cleaves RNA-DNA hybrids. RNases H are enzymes that specifically hydrolyse RNA when annealed to a complementary DNA and are present in all living organizms. In yeast RNase H2 is composed of a complex of three proteins (Rnh2Ap, Ydr279p and Ylr154p), this family represents the homologs of Ydr279p. It is not known whether non yeast proteins in this family fulfil the same function. — an NCBI CDD domain superfamily (cl18968); members share this curated model.
