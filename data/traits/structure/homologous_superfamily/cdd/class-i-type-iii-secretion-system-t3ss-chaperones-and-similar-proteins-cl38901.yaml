identifier: CDD:cl38901
label: "class I type III secretion system (T3SS) chaperones and similar proteins. TtfA (trehalose monomycolate transport factor A) plays a role in the transport of trehalose monomycolate across the inner membrane, potentially by forming a complex with the atypical lipid transporter MmpL3. Trehalose monomycolate is a component of the mycobacterial envelope. The core domain of TtfA shows strong structural similarity to class I type III secretion system (T3SS) chaperones, and TtfA may play other roles besides assisting in mycolate transport, given its phylogenetic distribution."
definition: >-
  class I type III secretion system (T3SS) chaperones and similar proteins. TtfA (trehalose monomycolate transport factor A) plays a role in the transport of trehalose monomycolate across the inner membrane, potentially by forming a complex with the atypical lipid transporter MmpL3. Trehalose monomycolate is a component of the mycobacterial envelope. The core domain of TtfA shows strong structural similarity to class I type III secretion system (T3SS) chaperones, and TtfA may play other roles besides assisting in mycolate transport, given its phylogenetic distribution. — an NCBI CDD domain superfamily (cl38901); members share this curated model.
