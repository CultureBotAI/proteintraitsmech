identifier: CDD:cl41768
label: "N-terminal winged helix DNA-binding domain found in SMARCB1, PHF10 and similar proteins. SMARCB1, also termed BRG1-associated factor 47 (BAF47), or integrase interactor 1 protein (INI1), or SNF5, or SNF5L1, is a core component of the BAF (hSWI/SNF) complex, an ATP-dependent chromatin-remodeling complex that plays important roles in cell proliferation and differentiation, in cellular antiviral activities and inhibition of tumor formation. The model corresponds to the N-terminal winged helix DNA binding domain of SMARCB1, which is structurally related to the SKI/SNO/DAC domain that is found in a number of metazoan chromatin-associated proteins."
definition: >-
  N-terminal winged helix DNA-binding domain found in SMARCB1, PHF10 and similar proteins. SMARCB1, also termed BRG1-associated factor 47 (BAF47), or integrase interactor 1 protein (INI1), or SNF5, or SNF5L1, is a core component of the BAF (hSWI/SNF) complex, an ATP-dependent chromatin-remodeling complex that plays important roles in cell proliferation and differentiation, in cellular antiviral activities and inhibition of tumor formation. The model corresponds to the N-terminal winged helix DNA binding domain of SMARCB1, which is structurally related to the SKI/SNO/DAC domain that is found in a number of metazoan chromatin-associated proteins. — an NCBI CDD domain superfamily (cl41768); members share this curated model.
