identifier: CDD:cl28928
label: "virulence protein VirB8. This family includes the conjugal transfer protein family TrbF, a family of proteins known to be involved in conjugal transfer. The TrbF protein is thought to compose part of the pilus required for transfer. This domain is similar to the type IV secretion system (T4ASS) component VirB8 and possibly has a similar fold to the nuclear transport factor-2 (NTF-2)-like superfamily."
definition: >-
  virulence protein VirB8. This family includes the conjugal transfer protein family TrbF, a family of proteins known to be involved in conjugal transfer. The TrbF protein is thought to compose part of the pilus required for transfer. This domain is similar to the type IV secretion system (T4ASS) component VirB8 and possibly has a similar fold to the nuclear transport factor-2 (NTF-2)-like superfamily. — an NCBI CDD domain superfamily (cl28928); members share this curated model.
