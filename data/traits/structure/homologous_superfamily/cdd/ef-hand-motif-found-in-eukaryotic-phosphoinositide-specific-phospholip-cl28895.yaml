identifier: CDD:cl28895
label: "EF-hand motif found in eukaryotic phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11) isozymes. PRIP-2, also termed phospholipase C-L2, or phospholipase C-epsilon-2 (PLC-epsilon-2), or inactive phospholipase C-like protein 2 (PLC-L2), is a novel inositol 1,4,5-trisphosphate (InsP3) binding protein that exhibits a relatively ubiquitous expression. It functions as a novel negative regulator of B-cell receptor (BCR) signaling and immune responses. PRIP-2 has a primary structure and domain architecture, incorporating a pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core domain with highly conserved X- and Y-regions split by a linker sequence, and a C-terminal C2 domain, similar to phosphoinositide-specific phospholipases C (PI-PLC, EC 3.1.4.11)-delta isoforms. Due to replacement of critical catalytic residues, PRIP-2 does not have PLC enzymatic activity."
definition: >-
  EF-hand motif found in eukaryotic phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11) isozymes. PRIP-2, also termed phospholipase C-L2, or phospholipase C-epsilon-2 (PLC-epsilon-2), or inactive phospholipase C-like protein 2 (PLC-L2), is a novel inositol 1,4,5-trisphosphate (InsP3) binding protein that exhibits a relatively ubiquitous expression. It functions as a novel negative regulator of B-cell receptor (BCR) signaling and immune responses. PRIP-2 has a primary structure and domain architecture, incorporating a pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core domain with highly conserved X- and Y-regions split by a linker sequence, and a C-terminal C2 domain, similar to phosphoinositide-specific phospholipases C (PI-PLC, EC 3.1.4.11)-delta isoforms. Due to replacement of critical catalytic residues, PRIP-2 does not have PLC enzymatic activity. — an NCBI CDD domain superfamily (cl28895); members share this curated model.
