identifier: CDD:cl19028
label: "CRISPR/Cas system-associated protein Csm6. This entry represents a conserved region of about 150 amino acids found in at least five archaeal and three bacterial species. These species all contain CRISPRs (Clustered Regularly Interspaced Short Palindromic Repeats). In six of eight species, the protein is encoded the vicinity of a CRISPR/Cas locus."
definition: >-
  CRISPR/Cas system-associated protein Csm6. This entry represents a conserved region of about 150 amino acids found in at least five archaeal and three bacterial species. These species all contain CRISPRs (Clustered Regularly Interspaced Short Palindromic Repeats). In six of eight species, the protein is encoded the vicinity of a CRISPR/Cas locus. — an NCBI CDD domain superfamily (cl19028); members share this curated model.
