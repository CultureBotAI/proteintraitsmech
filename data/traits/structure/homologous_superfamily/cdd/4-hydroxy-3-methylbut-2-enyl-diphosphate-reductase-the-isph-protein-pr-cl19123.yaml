identifier: CDD:cl19123
label: "4-hydroxy-3-methylbut-2-enyl diphosphate reductase. The IspH protein (previously designated LytB) has now been recognized as the last enzyme in the biosynthesis of isopentenyl diphosphate (IPP) and dimethylallyl diphosphate (DMAPP). Escherichia coli LytB protein had been found to regulate the activity of RelA (guanosine 3',5'-bispyrophosphate synthetase I), which in turn controls the level of a regulatory metabolite. It is involved in penicillin tolerance and the stringent response. [Biosynthesis of cofactors, prosthetic groups, and carriers, Other]"
definition: >-
  4-hydroxy-3-methylbut-2-enyl diphosphate reductase. The IspH protein (previously designated LytB) has now been recognized as the last enzyme in the biosynthesis of isopentenyl diphosphate (IPP) and dimethylallyl diphosphate (DMAPP). Escherichia coli LytB protein had been found to regulate the activity of RelA (guanosine 3',5'-bispyrophosphate synthetase I), which in turn controls the level of a regulatory metabolite. It is involved in penicillin tolerance and the stringent response. [Biosynthesis of cofactors, prosthetic groups, and carriers, Other] — an NCBI CDD domain superfamily (cl19123); members share this curated model.
