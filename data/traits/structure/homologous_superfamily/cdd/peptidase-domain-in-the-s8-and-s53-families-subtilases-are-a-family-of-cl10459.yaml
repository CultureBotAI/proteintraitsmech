identifier: CDD:cl10459
label: "Peptidase domain in the S8 and S53 families. Subtilases are a family of serine proteases. They appear to have independently and convergently evolved an Asp/Ser/His catalytic triad, like that found in the trypsin serine proteases (see pfam00089). Structure is an alpha/beta fold containing a 7-stranded parallel beta sheet, order 2314567."
definition: >-
  Peptidase domain in the S8 and S53 families. Subtilases are a family of serine proteases. They appear to have independently and convergently evolved an Asp/Ser/His catalytic triad, like that found in the trypsin serine proteases (see pfam00089). Structure is an alpha/beta fold containing a 7-stranded parallel beta sheet, order 2314567. — an NCBI CDD domain superfamily (cl10459); members share this curated model.
