identifier: CDD:cl39406
label: "RING finger-like zinc-binding domain 0 of parkin. This is a RING zinc finger domain found in parkin proteins. Parkin consists of a ubiquitin-like (Ubl) domain and a 60-amino acid linker followed by this domain RING0 and three additional zinc finger domains characteriztic of the RBR family. RING0 binds two coordinated zinc atoms at each extremity of the domain with a hairpin. Deletion of RING0 massively derepressed parkin activity supporting the role of RING0 in autoinhibition, point mutations in RING0 (Phe146 to Ala) or RING2 (Phe463 to Ala) both increased parkin activity. The REP (repressor element of parkin) and RING0 domains play a preeminent role in repressing parkin ligase activity through their interactions with RING1 and RING2, respectively."
definition: >-
  RING finger-like zinc-binding domain 0 of parkin. This is a RING zinc finger domain found in parkin proteins. Parkin consists of a ubiquitin-like (Ubl) domain and a 60-amino acid linker followed by this domain RING0 and three additional zinc finger domains characteriztic of the RBR family. RING0 binds two coordinated zinc atoms at each extremity of the domain with a hairpin. Deletion of RING0 massively derepressed parkin activity supporting the role of RING0 in autoinhibition, point mutations in RING0 (Phe146 to Ala) or RING2 (Phe463 to Ala) both increased parkin activity. The REP (repressor element of parkin) and RING0 domains play a preeminent role in repressing parkin ligase activity through their interactions with RING1 and RING2, respectively. — an NCBI CDD domain superfamily (cl39406); members share this curated model.
