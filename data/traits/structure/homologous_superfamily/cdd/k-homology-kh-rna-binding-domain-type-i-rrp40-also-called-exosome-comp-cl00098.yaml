identifier: CDD:cl00098
label: "K homology (KH) RNA-binding domain, type I. Rrp40, also called exosome component 3 (EXOSC3), or ribosomal RNA-processing protein 40, is a non-catalytic component of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Mutations of EXOSC3 gene are associated with neurological diseases. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  K homology (KH) RNA-binding domain, type I. Rrp40, also called exosome component 3 (EXOSC3), or ribosomal RNA-processing protein 40, is a non-catalytic component of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Mutations of EXOSC3 gene are associated with neurological diseases. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD domain superfamily (cl00098); members share this curated model.
