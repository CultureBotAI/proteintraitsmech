identifier: CDD:cl41786
label: "C-mannosyltransferase Dpy19. Dpy19 proteins are C-mannosyltransferases that mediate C-mannosylation of tryptophan residues on target proteins. C-mannosylation is the attachment of alpha-mannose to the indole C2 carbon of the first tryptophan residue in the consensus amino acid sequence Trp-Xaa-Xaa-Trp/Cys through a C-C bond. This reaction takes place in the endoplasmic reticulum (ER) lumen. Dpy19 is a transmembrane domain family whose name is derived from the Caenorhabditis elegans Dumpy mutant. In humans Dpy19L3 (also called protein Dpy-19 homolog 3) is a C-mannosyltransferase of R-spondin."
definition: >-
  C-mannosyltransferase Dpy19. Dpy19 proteins are C-mannosyltransferases that mediate C-mannosylation of tryptophan residues on target proteins. C-mannosylation is the attachment of alpha-mannose to the indole C2 carbon of the first tryptophan residue in the consensus amino acid sequence Trp-Xaa-Xaa-Trp/Cys through a C-C bond. This reaction takes place in the endoplasmic reticulum (ER) lumen. Dpy19 is a transmembrane domain family whose name is derived from the Caenorhabditis elegans Dumpy mutant. In humans Dpy19L3 (also called protein Dpy-19 homolog 3) is a C-mannosyltransferase of R-spondin. — an NCBI CDD domain superfamily (cl41786); members share this curated model.
