identifier: CDD:cl22415
label: "Exocrine gland-secreting peptide 1 (ESP1) and similar pheromones. ESP is a family of largely rodent exocrine gland-secreting peptides that are produced by the male extraorbital lacrimal gland to be secreted into the tear fluid. Other mice including females detect these peptides through receptors in the vomeronasal organ, and the receptors report information on mouse-strain, sex and species. The peptides are short, all carrying an N-terminal signal-peptide to indicate they are for secretion which accounts for much of the common conservation."
definition: >-
  Exocrine gland-secreting peptide 1 (ESP1) and similar pheromones. ESP is a family of largely rodent exocrine gland-secreting peptides that are produced by the male extraorbital lacrimal gland to be secreted into the tear fluid. Other mice including females detect these peptides through receptors in the vomeronasal organ, and the receptors report information on mouse-strain, sex and species. The peptides are short, all carrying an N-terminal signal-peptide to indicate they are for secretion which accounts for much of the common conservation. — an NCBI CDD domain superfamily (cl22415); members share this curated model.
