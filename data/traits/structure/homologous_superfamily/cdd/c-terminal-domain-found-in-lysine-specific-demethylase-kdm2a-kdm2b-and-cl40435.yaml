identifier: CDD:cl40435
label: "C-terminal domain found in lysine-specific demethylase KDM2A, KDM2B, and similar proteins. Lysine-specific demethylase 2B (KDM2B) is also called Ndy1, CXXC-type zinc finger protein 2, F-box and leucine-rich (LRR) repeat protein 10 (FBXL10), F-box protein FBL10, JmjC domain-containing histone demethylation protein 1B (Jhdm1b), Jumonji domain-containing EMSY-interactor methyltransferase motif protein (protein JEMMA), or [Histone-H3]-lysine-36 demethylase 1B. It is a ubiquitously expressed histone H3 lysine 4 (H3K4me2) or histone H3 lysine 36 (H3K36me2) demethylase that functions as a regulator of chemokine expression, cellular morphology, and the metabolome of fibroblasts. It regulates the differentiation of Mesenchymal Stem Cells (MSCs) and has been implicated in cell cycle regulation by de-repressing cyclin-dependent kinase inhibitor 2B (CDKN2B or p15INK4B). It also plays a role in recruiting polycomb repressive complex 1 (PRC1) to CpG islands (CGIs) of developmental genes and regulates lysine 119 monoubiquitylation on H2A (H2AK119ub1) in embryonic stem cells (ESCs). KDM2B also acts as an oncogene that plays a critical role in leukemia development and maintenance. It consists of two Jumonji domains (JmjN and JmjC), a CXXC zinc-finger domain, a plant homeodomain (PHD) finger, an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain. This model corresponds to a small conserved region in KDM2B between the JmjC domain and the CXXC zinc-finger domain, which has been called the C-terminal domain by literature."
definition: >-
  C-terminal domain found in lysine-specific demethylase KDM2A, KDM2B, and similar proteins. Lysine-specific demethylase 2B (KDM2B) is also called Ndy1, CXXC-type zinc finger protein 2, F-box and leucine-rich (LRR) repeat protein 10 (FBXL10), F-box protein FBL10, JmjC domain-containing histone demethylation protein 1B (Jhdm1b), Jumonji domain-containing EMSY-interactor methyltransferase motif protein (protein JEMMA), or [Histone-H3]-lysine-36 demethylase 1B. It is a ubiquitously expressed histone H3 lysine 4 (H3K4me2) or histone H3 lysine 36 (H3K36me2) demethylase that functions as a regulator of chemokine expression, cellular morphology, and the metabolome of fibroblasts. It regulates the differentiation of Mesenchymal Stem Cells (MSCs) and has been implicated in cell cycle regulation by de-repressing cyclin-dependent kinase inhibitor 2B (CDKN2B or p15INK4B). It also plays a role in recruiting polycomb repressive complex 1 (PRC1) to CpG islands (CGIs) of developmental genes and regulates lysine 119 monoubiquitylation on H2A (H2AK119ub1) in embryonic stem cells (ESCs). KDM2B also acts as an oncogene that plays a critical role in leukemia development and maintenance. It consists of two Jumonji domains (JmjN and JmjC), a CXXC zinc-finger domain, a plant homeodomain (PHD) finger, an F-box domain, followed by an antagonist of mitotic exit network protein 1 (AMN1) domain. This model corresponds to a small conserved region in KDM2B between the JmjC domain and the CXXC zinc-finger domain, which has been called the C-terminal domain by literature. — an NCBI CDD domain superfamily (cl40435); members share this curated model.
