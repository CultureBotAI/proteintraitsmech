identifier: CDD:cl17163
label: "Antirepressor CarS. This is an SH3 domain found in antirepressor proteins such as CarS from Myxococcus xanthus. CarS antirepressor recognizes and neutralizes its cognate repressors to turn on a photo-inducible promoter. CarS physically interacts with the MerR-type winged-helix DNA-binding domain of these repressors leading to activation of carB operon. Structural studies of CarS from M. Xanthus reveals a beta-barrel fold akin to that in SH3 domains. However, it diverges from the typical SH3 domain fold in the lengths and conformations of the connecting loops. Functional analysis reveal that SH3 domain-like fold in the antirepressor CasS, mimics operator DNA in sequestering the repressor DNA recognition helix to activate transcription."
definition: >-
  Antirepressor CarS. This is an SH3 domain found in antirepressor proteins such as CarS from Myxococcus xanthus. CarS antirepressor recognizes and neutralizes its cognate repressors to turn on a photo-inducible promoter. CarS physically interacts with the MerR-type winged-helix DNA-binding domain of these repressors leading to activation of carB operon. Structural studies of CarS from M. Xanthus reveals a beta-barrel fold akin to that in SH3 domains. However, it diverges from the typical SH3 domain fold in the lengths and conformations of the connecting loops. Functional analysis reveal that SH3 domain-like fold in the antirepressor CasS, mimics operator DNA in sequestering the repressor DNA recognition helix to activate transcription. — an NCBI CDD domain superfamily (cl17163); members share this curated model.
