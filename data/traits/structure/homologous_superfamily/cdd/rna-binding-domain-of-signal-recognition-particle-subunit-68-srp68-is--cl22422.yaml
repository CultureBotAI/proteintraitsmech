identifier: CDD:cl22422
label: "RNA-binding domain of signal recognition particle subunit 68. SRP68 is a family that is part of the SRP or signal recognition particle complex. This complex, consisting of six proteins and a 7SL-RNA is necessary for guiding the emerging proteins designed for the membrane towards the translocation pore. SRP68 forms a stable heterodimer with SRP72, a protein with a TPR repeat. Specific RNA-binding of SRP68 is mediated by the N-terminal domain of approximately 200 residues of this family."
definition: >-
  RNA-binding domain of signal recognition particle subunit 68. SRP68 is a family that is part of the SRP or signal recognition particle complex. This complex, consisting of six proteins and a 7SL-RNA is necessary for guiding the emerging proteins designed for the membrane towards the translocation pore. SRP68 forms a stable heterodimer with SRP72, a protein with a TPR repeat. Specific RNA-binding of SRP68 is mediated by the N-terminal domain of approximately 200 residues of this family. — an NCBI CDD domain superfamily (cl22422); members share this curated model.
