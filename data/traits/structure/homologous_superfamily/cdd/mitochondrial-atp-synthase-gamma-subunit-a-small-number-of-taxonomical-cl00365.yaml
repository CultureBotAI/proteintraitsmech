identifier: CDD:cl00365
label: "mitochondrial ATP synthase gamma subunit. A small number of taxonomically diverse prokaryotic species, including Methanosarcina barkeri, have what appears to be a second ATP synthase, in addition to the normal F1F0 ATPase in bacteria and A1A0 ATPase in archaea. These enzymes use ion gradients to synthesize ATP, and in principle may run in either direction. This model represents the F1 gamma subunit of this apparent second ATP synthase."
definition: >-
  mitochondrial ATP synthase gamma subunit. A small number of taxonomically diverse prokaryotic species, including Methanosarcina barkeri, have what appears to be a second ATP synthase, in addition to the normal F1F0 ATPase in bacteria and A1A0 ATPase in archaea. These enzymes use ion gradients to synthesize ATP, and in principle may run in either direction. This model represents the F1 gamma subunit of this apparent second ATP synthase. — an NCBI CDD domain superfamily (cl00365); members share this curated model.
