identifier: CDD:cl16912
label: "Medium chain reductase/dehydrogenase (MDR)/zinc-dependent alcohol dehydrogenase-like family. Members of this family are putative quinone oxidoreductases that belong to the broader superfamily (modeled by Pfam pfam00107) of zinc-dependent alcohol (of medium chain length) dehydrogenases and quinone oxiooreductases. The alignment shows no motif of conserved Cys residues as are found in zinc-binding members of the superfamily, and members are likely to be quinone oxidoreductases instead. A member of this family in Homo sapiens, PIG3, is induced by p53 but is otherwise uncharacterized. [Unknown function, Enzymes of unknown specificity]"
definition: >-
  Medium chain reductase/dehydrogenase (MDR)/zinc-dependent alcohol dehydrogenase-like family. Members of this family are putative quinone oxidoreductases that belong to the broader superfamily (modeled by Pfam pfam00107) of zinc-dependent alcohol (of medium chain length) dehydrogenases and quinone oxiooreductases. The alignment shows no motif of conserved Cys residues as are found in zinc-binding members of the superfamily, and members are likely to be quinone oxidoreductases instead. A member of this family in Homo sapiens, PIG3, is induced by p53 but is otherwise uncharacterized. [Unknown function, Enzymes of unknown specificity] — an NCBI CDD domain superfamily (cl16912); members share this curated model.
