identifier: CDD:cl29847
label: "CobN subunit of cobaltochelatase, bchH and chlH subunits of magnesium chelatases, and similar proteins. This family contains a domain common to the cobN protein and to magnesium protoporphyrin chelatase. CobN is implicated in the conversion of hydrogenobyrinic acid a,c-diamide to cobyrinic acid. Magnesium protoporphyrin chelatase is involved in chlorophyll biosynthesis."
definition: >-
  CobN subunit of cobaltochelatase, bchH and chlH subunits of magnesium chelatases, and similar proteins. This family contains a domain common to the cobN protein and to magnesium protoporphyrin chelatase. CobN is implicated in the conversion of hydrogenobyrinic acid a,c-diamide to cobyrinic acid. Magnesium protoporphyrin chelatase is involved in chlorophyll biosynthesis. — an NCBI CDD domain superfamily (cl29847); members share this curated model.
