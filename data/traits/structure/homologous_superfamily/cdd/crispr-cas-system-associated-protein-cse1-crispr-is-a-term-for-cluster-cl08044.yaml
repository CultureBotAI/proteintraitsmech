identifier: CDD:cl08044
label: "CRISPR/Cas system-associated protein Cse1. CRISPR is a term for Clustered, Regularly Interspaced Short Palidromic Repeats. A number of protein families appear only in association with these repeats and are designated Cas (CRISPR-Associated) proteins. This model family, represented by CT1972 from Chlorobium tepidum, is found in Ecoli subtype CRISPR/Cas regions of many bacteria, most of which are mesophiles, and not in Archaea. It is designated Cse1."
definition: >-
  CRISPR/Cas system-associated protein Cse1. CRISPR is a term for Clustered, Regularly Interspaced Short Palidromic Repeats. A number of protein families appear only in association with these repeats and are designated Cas (CRISPR-Associated) proteins. This model family, represented by CT1972 from Chlorobium tepidum, is found in Ecoli subtype CRISPR/Cas regions of many bacteria, most of which are mesophiles, and not in Archaea. It is designated Cse1. — an NCBI CDD domain superfamily (cl08044); members share this curated model.
