identifier: CDD:cl16939
label: "histone chaperone RTT106, regulator of Ty1 transposition protein 106; N-terminal homodimerization domain. This is the N-terminal domain of Rtt106 in Saccharomyces cerevisiae. Rtt106 is a histone chaperone that contributes to the deposition of newly synthesized acetylated Histone 3 Lysine 56 (H3K56ac) carrying H3-H4 complex on replicating DNA. The N-terminal domain of Rtt106 homodimerizes and interacts with H3-H4 independently of acetylation."
definition: >-
  histone chaperone RTT106, regulator of Ty1 transposition protein 106; N-terminal homodimerization domain. This is the N-terminal domain of Rtt106 in Saccharomyces cerevisiae. Rtt106 is a histone chaperone that contributes to the deposition of newly synthesized acetylated Histone 3 Lysine 56 (H3K56ac) carrying H3-H4 complex on replicating DNA. The N-terminal domain of Rtt106 homodimerizes and interacts with H3-H4 independently of acetylation. — an NCBI CDD domain superfamily (cl16939); members share this curated model.
