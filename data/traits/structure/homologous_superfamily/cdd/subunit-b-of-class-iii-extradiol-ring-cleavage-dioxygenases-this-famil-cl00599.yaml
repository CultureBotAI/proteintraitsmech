identifier: CDD:cl00599
label: "Subunit B of Class III Extradiol ring-cleavage dioxygenases. This family contains members from all branches of life. The molecular function of this protein is unknown, but Memo (mediator of ErbB2-driven cell motility) a human protein is included in this family. It has been suggested that Memo controls cell migration by relaying extracellular chemotactic signals to the microtubule cytoskeleton."
definition: >-
  Subunit B of Class III Extradiol ring-cleavage dioxygenases. This family contains members from all branches of life. The molecular function of this protein is unknown, but Memo (mediator of ErbB2-driven cell motility) a human protein is included in this family. It has been suggested that Memo controls cell migration by relaying extracellular chemotactic signals to the microtubule cytoskeleton. — an NCBI CDD domain superfamily (cl00599); members share this curated model.
