identifier: CDD:cl08356
label: "Gamma subunit of transcription initiation factor IIA, C-terminal domain. Accurate transcription in vivo requires at least six general transcription initiation factors, in addition to RNA polymerase II. Transcription initiation factor IIA (TFIIA) is a multimeric protein which facilitates the binding of TFIID to the TATA box. The C-terminal domain of the gamma subunit is a 12 stranded beta-barrel."
definition: >-
  Gamma subunit of transcription initiation factor IIA, C-terminal domain. Accurate transcription in vivo requires at least six general transcription initiation factors, in addition to RNA polymerase II. Transcription initiation factor IIA (TFIIA) is a multimeric protein which facilitates the binding of TFIID to the TATA box. The C-terminal domain of the gamma subunit is a 12 stranded beta-barrel. — an NCBI CDD domain superfamily (cl08356); members share this curated model.
