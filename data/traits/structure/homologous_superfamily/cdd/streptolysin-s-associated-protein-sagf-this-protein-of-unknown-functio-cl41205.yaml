identifier: CDD:cl41205
label: "streptolysin S-associated protein SagF. This protein of unknown function SagF is encoded by the extended locus that includes the key proteins of streptolysin S biosynthesis. Because it is encoded just upstream of genes for ABC transporter permease and ATPase components of an ABC transporter, one group calls the protein a probable ABC transporter substrate-binding protein, designated ScfC (subcutaneous fitness C). However, the protein lacks any readily detected homology to any other ABC transporter substrate-binding protein. Additional members of the family are found in other loci producing RiPP class peptide natural products related to streptolysin S, such clostridiolysin S."
definition: >-
  streptolysin S-associated protein SagF. This protein of unknown function SagF is encoded by the extended locus that includes the key proteins of streptolysin S biosynthesis. Because it is encoded just upstream of genes for ABC transporter permease and ATPase components of an ABC transporter, one group calls the protein a probable ABC transporter substrate-binding protein, designated ScfC (subcutaneous fitness C). However, the protein lacks any readily detected homology to any other ABC transporter substrate-binding protein. Additional members of the family are found in other loci producing RiPP class peptide natural products related to streptolysin S, such clostridiolysin S. — an NCBI CDD domain superfamily (cl41205); members share this curated model.
