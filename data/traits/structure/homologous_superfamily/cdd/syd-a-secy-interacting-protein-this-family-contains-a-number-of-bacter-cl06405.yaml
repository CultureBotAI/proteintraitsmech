identifier: CDD:cl06405
label: "Syd, a SecY-interacting protein. This family contains a number of bacterial Syd proteins approximately 180 residues long. It has been suggested that Syd is loosely associated with the cytoplasmic surface of the cytoplasmic membrane, and that interaction with SecY may be involved in this membrane association. Operon analysis showed that Syd protein may function as immunity protein in bacterial toxin systems."
definition: >-
  Syd, a SecY-interacting protein. This family contains a number of bacterial Syd proteins approximately 180 residues long. It has been suggested that Syd is loosely associated with the cytoplasmic surface of the cytoplasmic membrane, and that interaction with SecY may be involved in this membrane association. Operon analysis showed that Syd protein may function as immunity protein in bacterial toxin systems. — an NCBI CDD domain superfamily (cl06405); members share this curated model.
