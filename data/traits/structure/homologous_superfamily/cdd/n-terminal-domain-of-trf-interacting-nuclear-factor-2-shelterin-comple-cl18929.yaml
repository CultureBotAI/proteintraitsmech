label: "N-terminal domain of TRF-interacting nuclear factor 2; shelterin complex protein of telomeres. This is the N-terminus of TERF1-interacting nuclear factor 2. It is required for the formation of the shelterin complex. The shelterin complex is involved in the protection and maintenance of telomeres."
