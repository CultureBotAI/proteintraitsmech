identifier: CDD:cl46503
label: "MIU-linker domain found in unconventional myosin-VI. Myosins are actin-based motor molecules with ATPase activity. Unconventional myosins function in intracellular movements. Myosin-VI, also called unconventional myosin-6 (MYO6), is a reverse-direction motor protein that moves towards the minus-end of actin filaments. It is required for the structural integrity of the Golgi apparatus via the p53-dependent pro-survival pathway. It appears to be involved in a very early step of clathrin-mediated endocytosis in polarized epithelial cells. It modulates RNA polymerase II-dependent transcription. As part of the DISP complex, Myosin-VI may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. Myosin-VI is encoded by the MYO6 gene, the human homologue of the gene responsible for deafness in Snell's waltzer mice. It is mutated in autosomal dominant nonsyndromic hearing loss. This model corresponds to a conserved region of myosin-VI, which consist of three helices: MIU (Motif Interacting with Ubiquitin), a common linker helix (linker-alpha1) and an isoform-specific helix (linker-alpha2)."
definition: >-
  MIU-linker domain found in unconventional myosin-VI. Myosins are actin-based motor molecules with ATPase activity. Unconventional myosins function in intracellular movements. Myosin-VI, also called unconventional myosin-6 (MYO6), is a reverse-direction motor protein that moves towards the minus-end of actin filaments. It is required for the structural integrity of the Golgi apparatus via the p53-dependent pro-survival pathway. It appears to be involved in a very early step of clathrin-mediated endocytosis in polarized epithelial cells. It modulates RNA polymerase II-dependent transcription. As part of the DISP complex, Myosin-VI may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. Myosin-VI is encoded by the MYO6 gene, the human homologue of the gene responsible for deafness in Snell's waltzer mice. It is mutated in autosomal dominant nonsyndromic hearing loss. This model corresponds to a conserved region of myosin-VI, which consist of three helices: MIU (Motif Interacting with Ubiquitin), a common linker helix (linker-alpha1) and an isoform-specific helix (linker-alpha2). — an NCBI CDD domain superfamily (cl46503); members share this curated model.
