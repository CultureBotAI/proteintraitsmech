identifier: CDD:cl16938
label: "Thermoproteales single-stranded DNA-binding (SSB) domain. This domain is found in the N-terminal of ThermoDBP, a single stranded DNA binding protein found in Thermoproteus tenax. ThermoDBP binds specifically to ssDNA with low sequence specificity. This domain is responsible for ssDNA binding. Conserved motif 'LIYWIRSDR' is located at the C-terminal end of the domain and is thought to participate in ssDNA binding."
definition: >-
  Thermoproteales single-stranded DNA-binding (SSB) domain. This domain is found in the N-terminal of ThermoDBP, a single stranded DNA binding protein found in Thermoproteus tenax. ThermoDBP binds specifically to ssDNA with low sequence specificity. This domain is responsible for ssDNA binding. Conserved motif 'LIYWIRSDR' is located at the C-terminal end of the domain and is thought to participate in ssDNA binding. — an NCBI CDD domain superfamily (cl16938); members share this curated model.
