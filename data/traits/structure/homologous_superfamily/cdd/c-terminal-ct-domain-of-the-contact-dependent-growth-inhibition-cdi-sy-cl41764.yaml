identifier: CDD:cl41764
label: "C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) of Escherichia coli and Klebsiella pneumoniae CdiA, and similar proteins. This family includes the C-terminal (CT) domain of bacterial CdiA, an effector protein involved in contact-dependent growth inhibition (CDI), a mechanism of inter-bacterial competition. The large CdiA effector protein carries a C-terminal toxin domain (CdiA-CT) which is delivered to neighboring bacteria to inhibit target-cell growth. Many of the domains in this family are associated with RHS repeats N-terminal to the domain. The exact biochemical function of this CdiA-CT is as yet unknown. CDI(+) bacteria also produce a CDI immunity protein (CdiI) to specifically neutralize the CdiA-CT toxins to prevent auto-inhibition. This CdiA-CT binds its cognate CdiI with high affinity."
definition: >-
