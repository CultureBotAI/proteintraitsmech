identifier: CDD:cl10870
label: "NEDD4 family-interacting protein. The NEDD4 (neural precursor cell expressed, developmentally down-regulated protein 4)-family interacting proteins (NDFIPs) are adaptor proteins that recruit NEDD4 E3 ligases to specific substrate proteins, which leads to the ubiquitylation and subsequent degradation of these proteins. They also act as activators of the E3 ligase activity by releasing NEDD4 ligase from its auto-inhibitory conformation. NDFIP2 may play a role in protein trafficking."
definition: >-
  NEDD4 family-interacting protein. The NEDD4 (neural precursor cell expressed, developmentally down-regulated protein 4)-family interacting proteins (NDFIPs) are adaptor proteins that recruit NEDD4 E3 ligases to specific substrate proteins, which leads to the ubiquitylation and subsequent degradation of these proteins. They also act as activators of the E3 ligase activity by releasing NEDD4 ligase from its auto-inhibitory conformation. NDFIP2 may play a role in protein trafficking. — an NCBI CDD domain superfamily (cl10870); members share this curated model.
