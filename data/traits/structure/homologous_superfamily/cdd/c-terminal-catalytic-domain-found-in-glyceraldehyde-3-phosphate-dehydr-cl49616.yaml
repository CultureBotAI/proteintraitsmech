identifier: CDD:cl49616
label: "C-terminal catalytic domain found in glyceraldehyde-3-phosphate dehydrogenase (GAPDH) superfamily of proteins. Archaeal NADP-dependent malonyl-CoA reductase (MCR; EC 1.2.1.75) catalyzes the reduction of malonyl-CoA to malonate semialdehyde, a key step in the 3-hydroxypropanoate and the 3-hydroxypropanoate/4-hydroxybutyrate cycles. It can also use succinyl-CoA and succinate semialdehyde as substrates but at a lower rate than malonyl-CoA. Sequence comparison suggests that the archaeal malonyl-CoA reductase gene (mcr) has evolved from the duplication of a common ancestral aspartate beta-semialdehyde dehydrogenase (ASADH) gene (asd). MCR contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain and are members of the GAPDH superfamily of proteins."
definition: >-
  C-terminal catalytic domain found in glyceraldehyde-3-phosphate dehydrogenase (GAPDH) superfamily of proteins. Archaeal NADP-dependent malonyl-CoA reductase (MCR; EC 1.2.1.75) catalyzes the reduction of malonyl-CoA to malonate semialdehyde, a key step in the 3-hydroxypropanoate and the 3-hydroxypropanoate/4-hydroxybutyrate cycles. It can also use succinyl-CoA and succinate semialdehyde as substrates but at a lower rate than malonyl-CoA. Sequence comparison suggests that the archaeal malonyl-CoA reductase gene (mcr) has evolved from the duplication of a common ancestral aspartate beta-semialdehyde dehydrogenase (ASADH) gene (asd). MCR contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain and are members of the GAPDH superfamily of proteins. — an NCBI CDD domain superfamily (cl49616); members share this curated model.
