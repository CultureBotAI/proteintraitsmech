identifier: CDD:cl36576
label: "Coiled-coil domain of the potato virux X resistance protein and similar proteins. This entry represents the N-terminal domain found in many plant resistance proteins. This domain has been predicted to be a coiled-coil, however the structure shows that it adopts a four helical bundle fold."
definition: >-
  Coiled-coil domain of the potato virux X resistance protein and similar proteins. This entry represents the N-terminal domain found in many plant resistance proteins. This domain has been predicted to be a coiled-coil, however the structure shows that it adopts a four helical bundle fold. — an NCBI CDD domain superfamily (cl36576); members share this curated model.
