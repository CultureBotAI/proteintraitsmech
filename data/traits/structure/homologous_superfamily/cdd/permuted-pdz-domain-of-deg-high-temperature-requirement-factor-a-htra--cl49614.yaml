identifier: CDD:cl49614
label: "permuted PDZ domain of Deg/high-temperature requirement factor A (HtrA) family of housekeeping serine proteases and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of Magnetospirillum magneticum MamE (also known as magnetochrome MamE and magnetosome serine protease MamE), and related domains. MamE is a serine protease required to produce magnetite crystals in the magnetotactic bacterium M. magneticum. It is involved in localization of some proteins (at least MamA, MamC, MamF, MamI and MamJ) to the magnetosome, and likely cleaves at least itself, MamO and MamP. MamE-PDZ1 may bind MamB. Its autoproteolysis is stimulated by exogenous substrates or peptides that bind to its PDZ domains. Peptide binding to either the first or the second PDZ domain of MamE can activate proteolysis; activation through PDZ2 is much weaker. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E,  alpha-helix 2 and beta-strand F. This MamE-like PDZ domain 1 is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus."
definition: >-
  permuted PDZ domain of Deg/high-temperature requirement factor A (HtrA) family of housekeeping serine proteases and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of Magnetospirillum magneticum MamE (also known as magnetochrome MamE and magnetosome serine protease MamE), and related domains. MamE is a serine protease required to produce magnetite crystals in the magnetotactic bacterium M. magneticum. It is involved in localization of some proteins (at least MamA, MamC, MamF, MamI and MamJ) to the magnetosome, and likely cleaves at least itself, MamO and MamP. MamE-PDZ1 may bind MamB. Its autoproteolysis is stimulated by exogenous substrates or peptides that bind to its PDZ domains. Peptide binding to either the first or the second PDZ domain of MamE can activate proteolysis; activation through PDZ2 is much weaker. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This MamE-like PDZ domain 1 is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus. — an NCBI CDD domain superfamily (cl49614); members share this curated model.
