identifier: CDD:cl21497
label: "proline-alanine-alanine-arginine (PAAR) repeat superfamily. This domain is found at the N-terminal of bacterial toxin systems, including Tse7 (type IV secretion exported 7) from Pseudomonas aeruginosa, a type VI secretion exported toxin with DNase activity that induces growth arrest and ultimately DNA degradation within target cell. The structure of this domain has a PAAR-like organization necessary for interaction with T6SS VgrG tip and correct toxin delivery."
definition: >-
  proline-alanine-alanine-arginine (PAAR) repeat superfamily. This domain is found at the N-terminal of bacterial toxin systems, including Tse7 (type IV secretion exported 7) from Pseudomonas aeruginosa, a type VI secretion exported toxin with DNase activity that induces growth arrest and ultimately DNA degradation within target cell. The structure of this domain has a PAAR-like organization necessary for interaction with T6SS VgrG tip and correct toxin delivery. — an NCBI CDD domain superfamily (cl21497); members share this curated model.
