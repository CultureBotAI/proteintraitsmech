identifier: CDD:cl41741
label: "PUA RNA binding domain. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of the thermotogae subfamily of pseudouridine synthases TruB are modules that assist in the binding and positioning (guide and/or substrate) of RNA to the pseudouridine synthase complex. Pseudouridine synthases are enzymes that are responsible for post-translational modifications of RNAs by specifically isomerizing uracil residues. The pseudouridine synthase TruB (also called tRNA pseudouridylate synthase B or Psi55 synthase) is responsible for synthesis of pseudouridine from uracil-55 in the psi GC loop of elongator tRNAs."
definition: >-
  PUA RNA binding domain. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of the thermotogae subfamily of pseudouridine synthases TruB are modules that assist in the binding and positioning (guide and/or substrate) of RNA to the pseudouridine synthase complex. Pseudouridine synthases are enzymes that are responsible for post-translational modifications of RNAs by specifically isomerizing uracil residues. The pseudouridine synthase TruB (also called tRNA pseudouridylate synthase B or Psi55 synthase) is responsible for synthesis of pseudouridine from uracil-55 in the psi GC loop of elongator tRNAs. — an NCBI CDD domain superfamily (cl41741); members share this curated model.
