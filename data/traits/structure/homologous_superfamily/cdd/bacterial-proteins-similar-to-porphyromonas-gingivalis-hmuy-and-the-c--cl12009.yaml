identifier: CDD:cl12009
label: "Bacterial proteins similar to Porphyromonas gingivalis HmuY and the C-terminal domain of PARMER_03218. HmuY is a novel heme-binding protein that recruits heme from host carriers and delivers it to its cognate outer-membrane transporter, the TonB-dependent receptor HmuR. This family of proteins is found in bacteria. Proteins in this family are typically between 214 and 278 amino acids in length."
definition: >-
  Bacterial proteins similar to Porphyromonas gingivalis HmuY and the C-terminal domain of PARMER_03218. HmuY is a novel heme-binding protein that recruits heme from host carriers and delivers it to its cognate outer-membrane transporter, the TonB-dependent receptor HmuR. This family of proteins is found in bacteria. Proteins in this family are typically between 214 and 278 amino acids in length. — an NCBI CDD domain superfamily (cl12009); members share this curated model.
