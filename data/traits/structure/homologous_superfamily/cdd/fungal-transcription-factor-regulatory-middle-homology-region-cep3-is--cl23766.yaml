identifier: CDD:cl23766
label: "fungal transcription factor regulatory middle homology region. Cep3 is one of the major components of the CBF3. It dimerizes and in so doing forms a large central channel that is large enough to accommodate duplex B-form DNA. The dimerization region is followed by a linker to the zinc-finger domain at the C-terminus. The CBF3 complex is an essential core component of the budding yeast kinetochore and is required for the centromeric localization of all other kinetochore proteins. Cep3 is the only component with DNA-binding properties."
definition: >-
  fungal transcription factor regulatory middle homology region. Cep3 is one of the major components of the CBF3. It dimerizes and in so doing forms a large central channel that is large enough to accommodate duplex B-form DNA. The dimerization region is followed by a linker to the zinc-finger domain at the C-terminus. The CBF3 complex is an essential core component of the budding yeast kinetochore and is required for the centromeric localization of all other kinetochore proteins. Cep3 is the only component with DNA-binding properties. — an NCBI CDD domain superfamily (cl23766); members share this curated model.
