identifier: CDD:cl16901
label: "Uncharacterized protein conserved in Bacteroidetes. A small family of bacterial proteins, found in several Bacteroides species. Structure determination (NMR and Xray) shows an immunoglobulin beta-barrel fold. Multiple homologs have been found in human gut metagenomics data sets. Structural experimentation shows it to share features with two well-established protein architectures in the SCOP database, ie, C2 (calcium/lipid-binding domain) of the Pfam PF00168 and PLAT/LH2 (lipase/lipooxigenase domain) of the Pfam PF01477. The C2 and PLAT/LH2 domains bind Ca2+ in their functions of targeting proteins to cell-membranes; this domain is also shown to bind Ca2+ as well as to be a novel fold."
definition: >-
  Uncharacterized protein conserved in Bacteroidetes. A small family of bacterial proteins, found in several Bacteroides species. Structure determination (NMR and Xray) shows an immunoglobulin beta-barrel fold. Multiple homologs have been found in human gut metagenomics data sets. Structural experimentation shows it to share features with two well-established protein architectures in the SCOP database, ie, C2 (calcium/lipid-binding domain) of the Pfam PF00168 and PLAT/LH2 (lipase/lipooxigenase domain) of the Pfam PF01477. The C2 and PLAT/LH2 domains bind Ca2+ in their functions of targeting proteins to cell-membranes; this domain is also shown to bind Ca2+ as well as to be a novel fold. — an NCBI CDD domain superfamily (cl16901); members share this curated model.
