identifier: CDD:cl14785
label: "Carboxy-terminal domain of Formyltransferase and similar domains. This families are based on the phylogenomic analysis of JA Eisen (1999, Ph.D. Thesis, Stanford University). All proteins in this family for which the function is known are involved in the base excision repair of alkylation damage to DNA. The exact specificty of the type of alkylation damage repaired by each of these varies somewhat between species. Substrates include 3-methyl adenine, 7-methyl-guanaine, and 3-methyl-guanine. [DNA metabolism, DNA replication, recombination, and repair]"
definition: >-
  Carboxy-terminal domain of Formyltransferase and similar domains. This families are based on the phylogenomic analysis of JA Eisen (1999, Ph.D. Thesis, Stanford University). All proteins in this family for which the function is known are involved in the base excision repair of alkylation damage to DNA. The exact specificty of the type of alkylation damage repaired by each of these varies somewhat between species. Substrates include 3-methyl adenine, 7-methyl-guanaine, and 3-methyl-guanine. [DNA metabolism, DNA replication, recombination, and repair] — an NCBI CDD domain superfamily (cl14785); members share this curated model.
