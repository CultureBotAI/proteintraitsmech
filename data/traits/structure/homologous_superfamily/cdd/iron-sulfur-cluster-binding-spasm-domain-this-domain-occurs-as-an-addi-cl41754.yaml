identifier: CDD:cl41754
label: "Iron-sulfur cluster-binding SPASM domain. This domain occurs as an additional C-terminal iron-sulfur cluster binding domain in many radical SAM domain, pfam04055 proteins. The domain occurs in a number of proteins that modify a protein to become an active enzyme, or a peptide to become a ribosomal natural product. The domain is named SPASM because it occurs in the maturases of Subilitosin, PQQ, Anaerobic Sulfatases, and Mycofactocin."
definition: >-
  Iron-sulfur cluster-binding SPASM domain. This domain occurs as an additional C-terminal iron-sulfur cluster binding domain in many radical SAM domain, pfam04055 proteins. The domain occurs in a number of proteins that modify a protein to become an active enzyme, or a peptide to become a ribosomal natural product. The domain is named SPASM because it occurs in the maturases of Subilitosin, PQQ, Anaerobic Sulfatases, and Mycofactocin. — an NCBI CDD domain superfamily (cl41754); members share this curated model.
