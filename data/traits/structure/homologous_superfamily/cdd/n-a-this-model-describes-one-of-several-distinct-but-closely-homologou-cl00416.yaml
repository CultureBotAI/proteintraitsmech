identifier: CDD:cl00416
label: "N/A. This model describes one of several distinct but closely homologous classes of citrate synthase, the protein that brings carbon (from acetyl-CoA) into the TCA cycle. This form, class I, is known to be hexameric and allosterically inhibited by NADH in Escherichia coli, Acinetobacter anitratum, Azotobacter vinelandii, Pseudomonas aeruginosa, etc. In most species with a class I citrate synthase, a dimeric class II isozyme is found. The class II enzyme may act primarily on propionyl-CoA to make 2-methylcitrate or be bifunctional, may be found among propionate utilization enzymes, and may be constitutive or induced by propionate. Some members of this model group as class I enzymes, and may be hexameric, but have shown regulatory properties more like class II enzymes. [Energy metabolism, TCA cycle]"
definition: >-
  N/A. This model describes one of several distinct but closely homologous classes of citrate synthase, the protein that brings carbon (from acetyl-CoA) into the TCA cycle. This form, class I, is known to be hexameric and allosterically inhibited by NADH in Escherichia coli, Acinetobacter anitratum, Azotobacter vinelandii, Pseudomonas aeruginosa, etc. In most species with a class I citrate synthase, a dimeric class II isozyme is found. The class II enzyme may act primarily on propionyl-CoA to make 2-methylcitrate or be bifunctional, may be found among propionate utilization enzymes, and may be constitutive or induced by propionate. Some members of this model group as class I enzymes, and may be hexameric, but have shown regulatory properties more like class II enzymes. [Energy metabolism, TCA cycle] — an NCBI CDD domain superfamily (cl00416); members share this curated model.
