identifier: CDD:cl15465
label: "CRISPR/Cas system-associated protein CsaX. This family comprises a minor CRISPR-associated protein family. It occurs only in the context of the (strictly archaeal) Apern subtype of CRISPR/Cas system, and is further restricted to the Sulfolobales, including Metallosphaera sedula DSM 5348 and multiple species of the genus Sulfolobus."
definition: >-
  CRISPR/Cas system-associated protein CsaX. This family comprises a minor CRISPR-associated protein family. It occurs only in the context of the (strictly archaeal) Apern subtype of CRISPR/Cas system, and is further restricted to the Sulfolobales, including Metallosphaera sedula DSM 5348 and multiple species of the genus Sulfolobus. — an NCBI CDD domain superfamily (cl15465); members share this curated model.
