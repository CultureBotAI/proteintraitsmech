label: "Hsm3 is a  yeast Proteasome chaperone of the 19S regulatory particle and related proteins. Hsm3 is a proteasome-dedicated chaperone that forms a base precursor, Hsm3-Rpt1-Rpt2-Rpn1. Hsm3 consists of 23 alpha-helices forming 11 repeats similar to the HEAT repeats. This entry includes the first 5 repeats at the N-terminal."
definition: >-
  Hsm3 is a yeast Proteasome chaperone of the 19S regulatory particle and related proteins. Hsm3 is a proteasome-dedicated chaperone that forms a base precursor, Hsm3-Rpt1-Rpt2-Rpn1. Hsm3 consists of 23 alpha-helices forming 11 repeats similar to the HEAT repeats. This entry includes the first 5 repeats at the N-terminal. — an NCBI CDD domain superfamily (cl40605); members share this curated model.
