definition: >-
  N-terminal domain of the protein encoded by the Drosophila tweety gene and related proteins, a family of chloride ion channels. The tweety (tty) gene has not been characterized at the protein level. However, it is thought to form a membrane protein with five potential membrane-spanning regions. A number of potential functions have been suggested in. — an NCBI CDD domain superfamily (cl12141); members share this curated model.
