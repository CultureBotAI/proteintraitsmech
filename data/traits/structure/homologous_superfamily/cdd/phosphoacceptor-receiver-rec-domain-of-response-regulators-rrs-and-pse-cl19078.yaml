identifier: CDD:cl19078
label: "phosphoacceptor receiver (REC) domain of response regulators (RRs) and pseudo response regulators (PRRs). This domain is found at the N terminus of a subset of sigma54-dependent transcriptional activators that are involved in regulation of flagellar motility e.g. FleQ in Pseudomonas aeruginosa. It is clearly related to pfam00072, but lacks the conserved aspartate residue that undergoes phosphorylation in the classic two-component system response regulator (pfam00072)."
definition: >-
  phosphoacceptor receiver (REC) domain of response regulators (RRs) and pseudo response regulators (PRRs). This domain is found at the N terminus of a subset of sigma54-dependent transcriptional activators that are involved in regulation of flagellar motility e.g. FleQ in Pseudomonas aeruginosa. It is clearly related to pfam00072, but lacks the conserved aspartate residue that undergoes phosphorylation in the classic two-component system response regulator (pfam00072). — an NCBI CDD domain superfamily (cl19078); members share this curated model.
