identifier: CDD:cl17160
label: "Burkholderia Lethal Factor 1. This family includes members such as BLF1 (Burkholderia lethal factor 1) also known as BPSL1549. BLF1 is a potent toxin from Burkholderia pseudomallei causing melioidosis. BLF1 interacts with the human translation factor eIF4A causing deamidation of Gln339 to Glu. Thereby, reducing endogenous host cell protein synthesis and triggering increased stress granule formation, which is associated with translational blocks. Structural analysis of BLF1 revealed an alpha/beta fold comprising a sandwich of two mixed beta-sheets surrounded by loops and alpha-helices, where the beta-sheet core of the catalytic pocket is structurally similar to that of the deamidase domain of CNF1 pfam05785."
definition: >-
  Burkholderia Lethal Factor 1. This family includes members such as BLF1 (Burkholderia lethal factor 1) also known as BPSL1549. BLF1 is a potent toxin from Burkholderia pseudomallei causing melioidosis. BLF1 interacts with the human translation factor eIF4A causing deamidation of Gln339 to Glu. Thereby, reducing endogenous host cell protein synthesis and triggering increased stress granule formation, which is associated with translational blocks. Structural analysis of BLF1 revealed an alpha/beta fold comprising a sandwich of two mixed beta-sheets surrounded by loops and alpha-helices, where the beta-sheet core of the catalytic pocket is structurally similar to that of the deamidase domain of CNF1 pfam05785. — an NCBI CDD domain superfamily (cl17160); members share this curated model.
