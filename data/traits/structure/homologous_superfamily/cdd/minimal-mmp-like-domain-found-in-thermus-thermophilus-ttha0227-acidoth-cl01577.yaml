identifier: CDD:cl01577
label: "Minimal MMP-like domain found in Thermus thermophilus TTHA0227, Acidothermus cellulolyticus ACEL2062 and similar proteins. This family of proteins has a conserved HEXXH motif, suggesting they are putative peptidases of zincin fold. The structure of this family is a minimal version of the metalloprotease fold (PDB:3E11)."
definition: >-
  Minimal MMP-like domain found in Thermus thermophilus TTHA0227, Acidothermus cellulolyticus ACEL2062 and similar proteins. This family of proteins has a conserved HEXXH motif, suggesting they are putative peptidases of zincin fold. The structure of this family is a minimal version of the metalloprotease fold (PDB:3E11). — an NCBI CDD domain superfamily (cl01577); members share this curated model.
