identifier: CDD:cl28912
label: "extracellular domain (ECD) of Cys-loop neurotransmitter-gated ion channels (also known as ligand-gated ion channel (LGIC)). This family contains extracellular domain (ECD) of the rho subunit 3 of type-A gamma-aminobutyric acid receptor (GABAAR), encoded by the GABRR3 gene which maps to a different chromosome to that of GABRR1 and GABRR2. While close proximity of the rho1 and rho2 subunit genes suggests that they emerged via a local duplication event, GABRR3 may have arisen by duplication of a GABRR1/GABRR2 progenitor. This subunit homo-oligomerizes to form GABAA-rho receptors (formerly classified as GABA-rho or GABAc receptor), but does not co-assemble with any of the classical GABAAR subunits. In humans, some individuals contain a variant that is predicted to inactivate this gene product."
definition: >-
  extracellular domain (ECD) of Cys-loop neurotransmitter-gated ion channels (also known as ligand-gated ion channel (LGIC)). This family contains extracellular domain (ECD) of the rho subunit 3 of type-A gamma-aminobutyric acid receptor (GABAAR), encoded by the GABRR3 gene which maps to a different chromosome to that of GABRR1 and GABRR2. While close proximity of the rho1 and rho2 subunit genes suggests that they emerged via a local duplication event, GABRR3 may have arisen by duplication of a GABRR1/GABRR2 progenitor. This subunit homo-oligomerizes to form GABAA-rho receptors (formerly classified as GABA-rho or GABAc receptor), but does not co-assemble with any of the classical GABAAR subunits. In humans, some individuals contain a variant that is predicted to inactivate this gene product. — an NCBI CDD domain superfamily (cl28912); members share this curated model.
