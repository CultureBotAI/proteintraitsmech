identifier: CDD:cl09930
label: "Replication protein A, class 2b aminoacyl-tRNA synthetases, and related proteins with oligonucleotide/oligosaccharide (OB) fold. POT1PC is the ssDNA-binding domain on a family of fungal telomere protection protein 1 proteins. POT1PC is able to accommodate heterogeneous ssDNA ligands. Pot1 proteins are the proteins responsible for binding to and protecting the 3' single-stranded DNA (ssDNA) overhang at most eukaryotic telomeres."
definition: >-
  Replication protein A, class 2b aminoacyl-tRNA synthetases, and related proteins with oligonucleotide/oligosaccharide (OB) fold. POT1PC is the ssDNA-binding domain on a family of fungal telomere protection protein 1 proteins. POT1PC is able to accommodate heterogeneous ssDNA ligands. Pot1 proteins are the proteins responsible for binding to and protecting the 3' single-stranded DNA (ssDNA) overhang at most eukaryotic telomeres. — an NCBI CDD domain superfamily (cl09930); members share this curated model.
