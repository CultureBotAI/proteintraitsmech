identifier: CDD:cl17100
label: "DIP1984 family protein and similar proteins. Members of this family, including the Corynebacterium diphtheriae protein  DIP1984, which has a solved crystal structure, are uncharacterized with respect to function. Some members of this family previously have been annotated, incorrectly, as septolysin. This model was constructed to overrule and correct such errors. Note that septolysin O, and other members of the family of cholesterol-dependent cytolysins such as listeriolysin O (WP_003722731.1), are unrelated."
definition: >-
  DIP1984 family protein and similar proteins. Members of this family, including the Corynebacterium diphtheriae protein DIP1984, which has a solved crystal structure, are uncharacterized with respect to function. Some members of this family previously have been annotated, incorrectly, as septolysin. This model was constructed to overrule and correct such errors. Note that septolysin O, and other members of the family of cholesterol-dependent cytolysins such as listeriolysin O (WP_003722731.1), are unrelated. — an NCBI CDD domain superfamily (cl17100); members share this curated model.
