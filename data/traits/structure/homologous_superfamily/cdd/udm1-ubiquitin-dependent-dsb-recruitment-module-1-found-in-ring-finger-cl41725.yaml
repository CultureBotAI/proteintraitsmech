identifier: CDD:cl41725
label: "UDM1 (ubiquitin-dependent DSB recruitment module 1) found in RING finger proteins RNF168, RNF169 and similar proteins. RING finger protein 168 (RNF168) is an E3 ubiquitin-protein ligase that promotes noncanonical K27 ubiquitination to signal DNA damage. Together with RNF8, RNF168 functions as a DNA damage response (DDR) factor that promotes a series of ubiquitylation events on substrates such as H2A and H2AX. With H2AK13/15 ubiquitylation, it facilitates recruitment of repair factors p53-binding protein 1 (53BP1) or the RAP80-BRCA1 complex to sites of double-strand breaks (DSBs), and inhibits homologous recombination (HR) in cells deficient in the tumor suppressor BRCA1. RNF168 also promotes H2A neddylation, which antagonizes ubiquitylation of H2A and regulates DNA damage repair. In addition, RNF168 forms a functional complex with RAD6A or RAD6B during the DNA damage response. This model corresponds to the UDM1 (ubiquitin-dependent double-strand break [DSB] recruitment module 1) domain of RNF168, which comprises LRM1 (LR motif 1), UMI (ubiquitin-interacting motif [UIM]- and MIU-related UBD) and MIU1 (motif interacting with ubiquitin 1). Mutations of Ub-interacting residues in UDM1 have little effect on the accumulation of RNF168 to DSB sites, suggesting that it may not be the main site of binding ubiquitylated and polyubiquitylated targets."
definition: >-
  UDM1 (ubiquitin-dependent DSB recruitment module 1) found in RING finger proteins RNF168, RNF169 and similar proteins. RING finger protein 168 (RNF168) is an E3 ubiquitin-protein ligase that promotes noncanonical K27 ubiquitination to signal DNA damage. Together with RNF8, RNF168 functions as a DNA damage response (DDR) factor that promotes a series of ubiquitylation events on substrates such as H2A and H2AX. With H2AK13/15 ubiquitylation, it facilitates recruitment of repair factors p53-binding protein 1 (53BP1) or the RAP80-BRCA1 complex to sites of double-strand breaks (DSBs), and inhibits homologous recombination (HR) in cells deficient in the tumor suppressor BRCA1. RNF168 also promotes H2A neddylation, which antagonizes ubiquitylation of H2A and regulates DNA damage repair. In addition, RNF168 forms a functional complex with RAD6A or RAD6B during the DNA damage response. This model corresponds to the UDM1 (ubiquitin-dependent double-strand break [DSB] recruitment module 1) domain of RNF168, which comprises LRM1 (LR motif 1), UMI (ubiquitin-interacting motif [UIM]- and MIU-related UBD) and MIU1 (motif interacting with ubiquitin 1). Mutations of Ub-interacting residues in UDM1 have little effect on the accumulation of RNF168 to DSB sites, suggesting that it may not be the main site of binding ubiquitylated and polyubiquitylated targets. — an NCBI CDD domain superfamily (cl41725); members share this curated model.
