label: "RNase domain (also known as the kinase extension nuclease domain) of Ire1 and RNase L. This domain is a endoribonuclease. Specifically it cleaves an intron from Hac1 mRNA in humans, which causes it to be much more efficiently translated."
definition: >-
  RNase domain (also known as the kinase extension nuclease domain) of Ire1 and RNase L. This domain is a endoribonuclease. Specifically it cleaves an intron from Hac1 mRNA in humans, which causes it to be much more efficiently translated. — an NCBI CDD domain superfamily (cl15368); members share this curated model.
