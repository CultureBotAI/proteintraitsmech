identifier: CDD:cl40438
label: "C-terminal coiled-coil domain found in the laminin subunit beta (LAMB) family. LAMB3 is also called epiligrin subunit beta, kalinin B1 chain, kalinin subunit beta, laminin B1k chain, laminin-5 subunit beta, or nicein subunit beta. It is a major component of the basement membrane in most adult tissues. Mutations in LAMB3 are associated with Herlitz junctional epidermolysis bullosa (H-JEB), a severe autosomal recessive disorder characterized by blister formation within the dermal-epidermal basement membrane. LAMB3 is a component of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma). Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration, and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. This model corresponds to the C-terminal coiled-coil domain of LAMB3, which may be involved in the integrin binding activity."
definition: >-
  C-terminal coiled-coil domain found in the laminin subunit beta (LAMB) family. LAMB3 is also called epiligrin subunit beta, kalinin B1 chain, kalinin subunit beta, laminin B1k chain, laminin-5 subunit beta, or nicein subunit beta. It is a major component of the basement membrane in most adult tissues. Mutations in LAMB3 are associated with Herlitz junctional epidermolysis bullosa (H-JEB), a severe autosomal recessive disorder characterized by blister formation within the dermal-epidermal basement membrane. LAMB3 is a component of laminin, a complex glycoprotein consisting of three different polypeptide chains (alpha, beta, gamma). Binding to cells via a high affinity receptor, laminin is thought to mediate the attachment, migration, and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. This model corresponds to the C-terminal coiled-coil domain of LAMB3, which may be involved in the integrin binding activity. — an NCBI CDD domain superfamily (cl40438); members share this curated model.
