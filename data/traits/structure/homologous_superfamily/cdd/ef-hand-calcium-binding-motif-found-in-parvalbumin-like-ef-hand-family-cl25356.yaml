identifier: CDD:cl25356
label: "EF-hand, calcium binding motif, found in parvalbumin-like EF-hand family. Beta-parvalbumin, also termed Oncomodulin-1 (OM), is a small calcium-binding protein that is expressed in hepatomas, as well as in the blastocyst and the cytotrophoblasts of the placenta. It is also found to be expressed in the cochlear outer hair cells of the organ of Corti and frequently expressed in neoplasms. Mammalian beta-parvalbumin is secreted by activated macrophages and neutrophils. It may function as a tissue-specific Ca2+-dependent regulatory protein, and may also serve as a specialized cytosolic Ca2+ buffer. Beta-parvalbumin acts as a potent growth-promoting signal between the innate immune system and neurons in vivo. It has high and specific affinity for its receptor on retinal ganglion cells (RGC) and functions as the principal mediator of optic nerve regeneration. It exerts its effects in a cyclic adenosine monophosphate (cAMP)-dependent manner and can further elevate intracellular cAMP levels. Moreover, beta-parvalbumin is associated with efferent function and outer hair cell electromotility, and can identify different hair cell types in the mammalian inner ear. Beta-parvalbumin is characterized by the presence of three consecutive EF-hand motifs (helix-loop-helix) called AB, CD, and EF, but only CD and EF can chelate metal ions, such as Ca2+ and Mg2+. The EF site displays a high-affinity for Ca2+/Mg2+, and the CD site is a low-affinity Ca2+-specific site. In addition, beta-parvalbumin is distinguished from other parvalbumins by its unusually low isoelectric point (pI = 3.1) and sequence eccentricities (e.g., Y57-L58-D59 instead of F57-I58-E59)."
definition: >-
  EF-hand, calcium binding motif, found in parvalbumin-like EF-hand family. Beta-parvalbumin, also termed Oncomodulin-1 (OM), is a small calcium-binding protein that is expressed in hepatomas, as well as in the blastocyst and the cytotrophoblasts of the placenta. It is also found to be expressed in the cochlear outer hair cells of the organ of Corti and frequently expressed in neoplasms. Mammalian beta-parvalbumin is secreted by activated macrophages and neutrophils. It may function as a tissue-specific Ca2+-dependent regulatory protein, and may also serve as a specialized cytosolic Ca2+ buffer. Beta-parvalbumin acts as a potent growth-promoting signal between the innate immune system and neurons in vivo. It has high and specific affinity for its receptor on retinal ganglion cells (RGC) and functions as the principal mediator of optic nerve regeneration. It exerts its effects in a cyclic adenosine monophosphate (cAMP)-dependent manner and can further elevate intracellular cAMP levels. Moreover, beta-parvalbumin is associated with efferent function and outer hair cell electromotility, and can identify different hair cell types in the mammalian inner ear. Beta-parvalbumin is characterized by the presence of three consecutive EF-hand motifs (helix-loop-helix) called AB, CD, and EF, but only CD and EF can chelate metal ions, such as Ca2+ and Mg2+. The EF site displays a high-affinity for Ca2+/Mg2+, and the CD site is a low-affinity Ca2+-specific site. In addition, beta-parvalbumin is distinguished from other parvalbumins by its unusually low isoelectric point (pI = 3.1) and sequence eccentricities (e.g., Y57-L58-D59 instead of F57-I58-E59). — an NCBI CDD domain superfamily (cl25356); members share this curated model.
