label: "N/A. This protein acts as an export-specific cytosolic chaperone. It binds the mature region of pre-proteins destined for secretion, prevents aggregation, and delivers them to SecA. This protein is tetrameric in E. coli. The archaeal Methanococcus jannaschii homolog MJ0357 has been shown () to share many properties, including chaperone-like activity, and scores between trusted and noise. [Protein fate, Protein and peptide secretion and trafficking]"
definition: >-
  N/A. This protein acts as an export-specific cytosolic chaperone. It binds the mature region of pre-proteins destined for secretion, prevents aggregation, and delivers them to SecA. This protein is tetrameric in E. coli. The archaeal Methanococcus jannaschii homolog MJ0357 has been shown () to share many properties, including chaperone-like activity, and scores between trusted and noise. [Protein fate, Protein and peptide secretion and trafficking] — an NCBI CDD domain superfamily (cl00251); members share this curated model.
