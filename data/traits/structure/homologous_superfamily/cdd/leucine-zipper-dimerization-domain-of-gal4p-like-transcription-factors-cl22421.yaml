identifier: CDD:cl22421
label: "Leucine zipper Dimerization domain of Gal4p-like transcription factors. Sip4p binds to carbon source-responsive element (CSRE) motifs and activates transcription of target genes under conditions of glucose deprivation. Its function is modulated through phosphorylation by SNF1 protein kinase, a protein essential for expression of glucose-repressed genes in response to glucose deprivation. Sip4p is a member of the Gal4p family of transcriptional activators which contain an N-terminal DNA-binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner."
definition: >-
