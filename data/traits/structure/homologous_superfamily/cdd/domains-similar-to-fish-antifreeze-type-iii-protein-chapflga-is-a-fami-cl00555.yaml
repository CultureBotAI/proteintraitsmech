identifier: CDD:cl00555
label: "Domains similar to fish antifreeze type III protein. ChapFlgA is a family similar to the SAF family, and includes chaperones for flagellar basal-body proteins and pilus-assembly proteins, FlgA, RcpB and CpaB. ChapFlgA is necessary for the formation of the P-ring of the flagellum, FlgI, which sits in the peptidoglycan layer of the outer membrane of the bacterium. FlgA plays an auxiliary role in P-ring assembly."
definition: >-
  Domains similar to fish antifreeze type III protein. ChapFlgA is a family similar to the SAF family, and includes chaperones for flagellar basal-body proteins and pilus-assembly proteins, FlgA, RcpB and CpaB. ChapFlgA is necessary for the formation of the P-ring of the flagellum, FlgI, which sits in the peptidoglycan layer of the outer membrane of the bacterium. FlgA plays an auxiliary role in P-ring assembly. — an NCBI CDD domain superfamily (cl00555); members share this curated model.
