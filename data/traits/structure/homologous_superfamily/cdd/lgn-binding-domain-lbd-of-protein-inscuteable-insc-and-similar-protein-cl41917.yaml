identifier: CDD:cl41917
label: "LGN-binding domain (LBD) of protein Inscuteable (INSC) and similar proteins. This entry represents the C-terminal region of protein Inscuteable (Insc) containing four putative armadillo repeats and the conserved extreme C-terminal tetrapeptide Glu-Ser-Phe-Val which is in agreement with the class I PDZ-binding motif X-Ser/Thr-X-/ (X and /are unspecified and hydrophobic residues, respectively). Insc functions as an adaptor protein that binds simultaneously with Partner of Insc (Pins, consisting of alpha subunit (Ga) of heterotrimeric G proteins and its guanine nucleotide dissociation inhibitor) and Par3 (PDZ-containing proteins) to regulate their apical localization in neuroblasts, which is required for the correct execution of the asymmetric division."
definition: >-
