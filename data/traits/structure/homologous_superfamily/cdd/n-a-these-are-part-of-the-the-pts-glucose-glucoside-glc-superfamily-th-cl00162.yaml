label: "N/A. These are part of the The PTS Glucose-Glucoside (Glc) SuperFamily. The Glc family includes permeases specific for glucose, N-acetylglucosamine and a large variety of a- and b-glucosides. However, not all b-glucoside PTS permeases are in this class, as the cellobiose (Cel) b-glucoside PTS permease is in the Lac family (TC #4.A.3). The IIA, IIB and IIC domains of all of the permeases listed below are demonstrably homologous. These permeases show limited sequence similarity with members of the Fru family (TC #4.A.2). Several of the PTS permeases in the Glc family lack their own IIA domains and instead use the glucose IIA protein (IIAglc or Crr). Most of these permeases have the B and C domains linked together in a single polypeptide chain, and a cysteyl residue in the IIB domain is phosphorylated by direct phosphoryl transfer from IIAglc(his~P). Those permeases which lack a IIA domain include the maltose (Mal), arbutin-salicin-cellobiose (ASC), trehalose (Tre), putative glucoside (Glv) and sucrose (Scr) permeases of E. coli . Most, but not all Scr permeases of other bacteria also lack a IIA domain. The three-dimensional structures of the IIA and IIB domains of the E. coli glucose permease have been elucidated. IIAglchas a complex b-sandwich structure while IIBglc is a split ab-sandwich with a topology unrelated to the split ab-sandwich structure of HPr. [Transport and binding proteins, Carbohydrates, organic alcohols, and acids, Signal transduction, PTS]"
definition: >-
  N/A. These are part of the The PTS Glucose-Glucoside (Glc) SuperFamily. The Glc family includes permeases specific for glucose, N-acetylglucosamine and a large variety of a- and b-glucosides. However, not all b-glucoside PTS permeases are in this class, as the cellobiose (Cel) b-glucoside PTS permease is in the Lac family (TC #4.A.3). The IIA, IIB and IIC domains of all of the permeases listed below are demonstrably homologous. These permeases show limited sequence similarity with members of the Fru family (TC #4.A.2). Several of the PTS permeases in the Glc family lack their own IIA domains and instead use the glucose IIA protein (IIAglc or Crr). Most of these permeases have the B and C domains linked together in a single polypeptide chain, and a cysteyl residue in the IIB domain is phosphorylated by direct phosphoryl transfer from IIAglc(his~P). Those permeases which lack a IIA domain include the maltose (Mal), arbutin-salicin-cellobiose (ASC), trehalose (Tre), putative glucoside (Glv) and sucrose (Scr) permeases of E. coli . Most, but not all Scr permeases of other bacteria also lack a IIA domain. The three-dimensional structures of the IIA and IIB domains of the E. coli glucose permease have been elucidated. IIAglchas a complex b-sandwich structure while IIBglc is a split ab-sandwich with a topology unrelated to the split ab-sandwich structure of HPr. [Transport and binding proteins, Carbohydrates, organic alcohols, and acids, Signal transduction, PTS] — an NCBI CDD domain superfamily (cl00162); members share this curated model.
