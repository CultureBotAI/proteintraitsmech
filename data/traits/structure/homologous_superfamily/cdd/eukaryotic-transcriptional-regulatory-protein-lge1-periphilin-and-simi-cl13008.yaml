identifier: CDD:cl13008
label: "Eukaryotic transcriptional regulatory protein Lge1, periphilin, and similar proteins. This fungal transcriptional regulatory protein Lge1 is involved in the ubiquitination of histones H2A and H2B, a step that is vital in the regulation of the transcriptional activity of RNA polymerase II. In Saccharomyces cerevisiae, Lge1 (also called large cells protein 1), together with its interacting partner ubiquitin ligase Bre1, recruits Rad6, forming a complex that is required for H2B monoubiquitination, a process that regulates transcription, DNA replication, and DNA damage response and repair, ensuring the structural integrity of the genome. In S. pombe the equivalent protein to LGE1 appears to be small histone ubiquitination factor 1 (Shf1)."
definition: >-
  Eukaryotic transcriptional regulatory protein Lge1, periphilin, and similar proteins. This fungal transcriptional regulatory protein Lge1 is involved in the ubiquitination of histones H2A and H2B, a step that is vital in the regulation of the transcriptional activity of RNA polymerase II. In Saccharomyces cerevisiae, Lge1 (also called large cells protein 1), together with its interacting partner ubiquitin ligase Bre1, recruits Rad6, forming a complex that is required for H2B monoubiquitination, a process that regulates transcription, DNA replication, and DNA damage response and repair, ensuring the structural integrity of the genome. In S. pombe the equivalent protein to LGE1 appears to be small histone ubiquitination factor 1 (Shf1). — an NCBI CDD domain superfamily (cl13008); members share this curated model.
