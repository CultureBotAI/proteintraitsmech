identifier: CDD:cl45911
label: "beta-defensin domain found in gallinacin-11 (Gal-11) and gallinacin-13 (Gal-13). Gal-13, also called beta-defensin 13, has bactericidal activity against Escherichia coli, Listeria monocytogenes, Salmonella typhimurium and Streptococcus pyogenes but not against Staphylococcus aureus. Gal-13 contains only one beta-defensin domain."
definition: >-
  beta-defensin domain found in gallinacin-11 (Gal-11) and gallinacin-13 (Gal-13). Gal-13, also called beta-defensin 13, has bactericidal activity against Escherichia coli, Listeria monocytogenes, Salmonella typhimurium and Streptococcus pyogenes but not against Staphylococcus aureus. Gal-13 contains only one beta-defensin domain. — an NCBI CDD domain superfamily (cl45911); members share this curated model.
