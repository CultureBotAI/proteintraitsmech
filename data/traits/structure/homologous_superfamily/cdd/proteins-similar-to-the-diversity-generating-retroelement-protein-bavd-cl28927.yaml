identifier: CDD:cl28927
label: "proteins similar to the diversity-generating retroelement protein bAvd. A family of functionally uncharacterized bacterial proteins, some of which are encoded by an atypically large intervening sequence present within some 23S rRNA genes. The distantly related bAvd protein, which also forms a homopentamer of four-helix bundles, has been suggested to interact with nucleic acids and a reverse transcriptase."
definition: >-
  proteins similar to the diversity-generating retroelement protein bAvd. A family of functionally uncharacterized bacterial proteins, some of which are encoded by an atypically large intervening sequence present within some 23S rRNA genes. The distantly related bAvd protein, which also forms a homopentamer of four-helix bundles, has been suggested to interact with nucleic acids and a reverse transcriptase. — an NCBI CDD domain superfamily (cl28927); members share this curated model.
