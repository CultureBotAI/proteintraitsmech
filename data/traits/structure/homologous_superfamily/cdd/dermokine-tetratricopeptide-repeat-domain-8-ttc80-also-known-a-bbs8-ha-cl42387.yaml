identifier: CDD:cl42387
label: "dermokine. Tetratricopeptide repeat domain 8 (TTC80), also known a BBS8, has been directly linked to Bardet-Biedl syndrome, an autosomal recessive ciliopathy characterized by retinal degeneration, renal failure, obesity, diabetes, male infertility, polydactyly and cognitive impairment. Mutations in BBS8 cause early vision loss. In addition to C-terminal tetratricopeptide repeats, TTC8 also contains an N-terminal domain of unknown function."
definition: >-
  dermokine. Tetratricopeptide repeat domain 8 (TTC80), also known a BBS8, has been directly linked to Bardet-Biedl syndrome, an autosomal recessive ciliopathy characterized by retinal degeneration, renal failure, obesity, diabetes, male infertility, polydactyly and cognitive impairment. Mutations in BBS8 cause early vision loss. In addition to C-terminal tetratricopeptide repeats, TTC8 also contains an N-terminal domain of unknown function. — an NCBI CDD domain superfamily (cl42387); members share this curated model.
