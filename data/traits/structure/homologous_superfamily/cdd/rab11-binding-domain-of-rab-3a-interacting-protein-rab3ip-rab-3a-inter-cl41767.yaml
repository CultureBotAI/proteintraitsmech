identifier: CDD:cl41767
label: "Rab11 binding domain of Rab-3A-interacting protein (RAB3IP), Rab-3A-interacting-like protein 1 (RAB3IL1) and similar proteins. RAB3IL1, also called guanine nucleotide exchange factor for Rab-3A (GRAB), or Rab3A-interacting-like protein 1, or Rabin3-like 1, acts as a guanine nucleotide exchange factor (GEF) which promotes the exchange of GDP to GTP, converting inactive GDP-bound Rab proteins into their active GTP-bound form. As a dual Rab-binding protein, RAB3IL1 could potentially link Rab3 and Rab11 and/or Rab8 and Rab11-mediated intracellular trafficking processes. It may activate RAB3A, a GTPase that regulates synaptic vesicle exocytosis. It may also activate RAB8A and RAB8B. In addition, RAB3IL1 interacts with InsP6K1 and plays a role for InsP7 in vesicle exocytosis. The model corresponds to the Rab11a/Rab11b-binding region of RAB3IL1 lies within its carboxy-terminus, a region distinct from its GEF domain and Rab3a-binding region."
definition: >-
  Rab11 binding domain of Rab-3A-interacting protein (RAB3IP), Rab-3A-interacting-like protein 1 (RAB3IL1) and similar proteins. RAB3IL1, also called guanine nucleotide exchange factor for Rab-3A (GRAB), or Rab3A-interacting-like protein 1, or Rabin3-like 1, acts as a guanine nucleotide exchange factor (GEF) which promotes the exchange of GDP to GTP, converting inactive GDP-bound Rab proteins into their active GTP-bound form. As a dual Rab-binding protein, RAB3IL1 could potentially link Rab3 and Rab11 and/or Rab8 and Rab11-mediated intracellular trafficking processes. It may activate RAB3A, a GTPase that regulates synaptic vesicle exocytosis. It may also activate RAB8A and RAB8B. In addition, RAB3IL1 interacts with InsP6K1 and plays a role for InsP7 in vesicle exocytosis. The model corresponds to the Rab11a/Rab11b-binding region of RAB3IL1 lies within its carboxy-terminus, a region distinct from its GEF domain and Rab3a-binding region. — an NCBI CDD domain superfamily (cl41767); members share this curated model.
