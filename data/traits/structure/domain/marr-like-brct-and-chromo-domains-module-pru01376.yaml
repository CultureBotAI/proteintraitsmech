identifier: PROSITE:PRU01376
label: "MarR-like, BRCT and chromo domains module"
definition: >-
  The N-terminus of the BAF155/SMARCC1 and BAF170/SMARCC2 subunits contain a putative DNA-binding MarR-like domain, a chromo domain and a BRCT domain that are interconnected to each other to form a distinct module. This N-terminal module could participate in an interaction involving both protein and nucleic acid components.
