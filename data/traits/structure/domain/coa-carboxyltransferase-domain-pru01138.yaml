identifier: PROSITE:PRU01138
label: "CoA carboxyltransferase domain"
definition: >-
  The N- and C-terminal regions of the carboxyltransferase domain share similar polypeptide backbone folds, with a central beta-beta-alpha superhelix. The CoA molecule is mostly associated with the N subdomain.
