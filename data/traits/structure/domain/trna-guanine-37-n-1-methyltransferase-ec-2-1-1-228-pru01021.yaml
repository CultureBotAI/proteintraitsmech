identifier: PROSITE:PRU01021
label: tRNA (guanine(37)-N(1))-methyltransferase (EC 2.1.1.228)
definition: >-
  tRNA (guanine(37)-N(1))-methyltransferase (EC 2.1.1.228) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to guanine(37) in tRNA to form N(1)-methylguanine(37) in tRNA and S-adenosyl-L- homocysteine.
