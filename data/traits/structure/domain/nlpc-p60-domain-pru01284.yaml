label: "NlpC/P60 domain"
definition: >-
  The NlpC/P60 domain consists of ~110-140 residues and is a primitive papain-like peptidase in the CA clan of cysteine peptidase with a Cys/His/His catalytic triad and a conserved catalytic core.
