identifier: PROSITE:PRU01255
label: Zinc finger UBZ3-type
definition: >-
  The ubiquitin-binding zinc finger (UBZ) is a type of zinc- coordinating beta-beta-alpha fold domain found mainly in proteins involved in DNA repair and transcriptional regulation. UBZ domains coordinate a zinc ion with cysteine or histidine residues; depending on their amino acid sequence, UBZ domains are classified into several families. Type 3 UBZs are CCHH-type zinc fingers found only in the Y-family translesion polymerase eta.
