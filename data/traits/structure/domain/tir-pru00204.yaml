identifier: PROSITE:PRU00204
label: TIR
definition: >-
  The TIR domain has been defined as a scaffold that promotes assembly of signaling complexes via protein-protein interactions. However, the scaffolding function may be a a recent adaptation. The primordial function of the TIR domain is a self-association-dependent nicotinamide dinucleotide (NAD(+))-cleaving enzyme (NADase) activity that cleaves NAD(+) into nicotinamide (Nam) and ADP-ribose (ADPR), cyclic ADPR (cADPR) or variant cADPR (v-cADPR), with catalytic cleavage executed by a conserved glutamic acid.
definition_source: "Prosite Release 2026_02 of 10-Jun-2026 (ProRule)"
