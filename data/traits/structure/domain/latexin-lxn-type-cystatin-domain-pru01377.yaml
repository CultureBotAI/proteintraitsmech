identifier: PROSITE:PRU01377
label: "Latexin (LXN)-type cystatin domain"
definition: >-
  The LXN-type cystatin domains are packed against each other through the helices and linked by a connecting segment encompassing a third alpha- helix. The two domains are arranged so that there is a cleft in this part of the structure that can accommodate a peptide chain.
