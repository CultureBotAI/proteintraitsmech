identifier: PROSITE:PRU01058
label: Circularly permuted (CP)-type guanine nucleotide-binding (G) domain
definition: >-
  The TRAFAC (named after translation factors) class includes an atypical family characterized by a circularly permuted (CP) order of the GTPase motifs within the G domain: the normal G1-G2-G3-G4-G5 orientation of the G domain has been rearranged to G4(N/T-K-x-D)-G5(T/G-C/S-A)-G1(Walker A, P-loop)-G2(T)-G3(Walker B).
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
