identifier: PROSITE:PRU01194
label: Synaptotagmin-like mitochondrial lipid-binding proteins (SMP) domain
definition: >-
  The SMP domain is able to homo- or heterodimerize, harbors lipids in a hydrophobic cavity and mediates lipid transfer between two adjacent bilayers independently of membrane fusion and fission reactions.
