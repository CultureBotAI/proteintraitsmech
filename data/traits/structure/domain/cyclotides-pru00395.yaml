identifier: PROSITE:PRU00395
label: Cyclotides
definition: >-
  Cyclotides (cyclo peptides) are plant peptides of ~30 amino acids with a head-to-tail cyclic backbone and six cysteine residues involved in three disulfide bonds. They are most likely present as defense molecules.
