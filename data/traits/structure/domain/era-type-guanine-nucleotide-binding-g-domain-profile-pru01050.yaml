identifier: PROSITE:PRU01050
label: "Era-type guanine nucleotide-binding (G) domain profile"
definition: >-
  Era is a small G-protein widely conserved in eubacteria and eukaryotes. It is essential for bacterial cell viability and is required for the maturation of 16S rRNA and assembly of the 30S ribosomal subunit.
