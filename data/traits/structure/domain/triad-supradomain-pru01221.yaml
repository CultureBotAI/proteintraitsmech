identifier: PROSITE:PRU01221
label: TRIAD supradomain
definition: >-
  The cysteine and histidine rich TRIAD domain architecture is highly conserved and found only in eukaryotes. The three fingers that define the TRIAD supradomain always appear in the same order RING1-IBR-RING2. All characterized proteins containing the TRIAD supradomain have been found to possess E3 ligase activity.
