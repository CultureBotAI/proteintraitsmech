identifier: PROSITE:PRU01366
label: Parvovirus (PV) NS1 nuclease (NS1-Nuc) domain profile
definition: >-
  The PV NS1-Nuc domain plays an important role in the "rolling hairpin" replication of the single-stranded parvoviral DNA genome, recognizing origin of replication sequences in double-stranded DNA, and cleaving (i.e., nicking) single-stranded DNA at a nearby site known as the terminal resolution site (trs). Since the DNA encountered by NS1 is double- stranded, it is assumed that binding of NS1 to its target sequences in dsDNA induces strand separation nearby, allowing for the endonuclease activity of NS1 to cleave at the trs site.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
