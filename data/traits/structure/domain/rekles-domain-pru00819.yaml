identifier: PROSITE:PRU00819
label: "REKLES domain"
definition: >-
  REKLES consists of two subdomains: a modestly conserved N-terminal REKLESalpha and a highly conserved C-terminal REKLESbeta. REKLESalpha and -beta are required, respectively, for nuclear entry and export of Bright during its nucleoplasmic shuttling. In addition to its function in nuclear export, the REKLESbeta subdomain regulates the binding of Bright to nuclear matrix association (or attachment) regions (MARs), its self- and paralogous (Bdp) association and stoichiometry, and its retention within the nuclear matrix.
