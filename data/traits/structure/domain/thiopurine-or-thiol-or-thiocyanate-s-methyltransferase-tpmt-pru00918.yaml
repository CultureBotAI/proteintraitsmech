identifier: PROSITE:PRU00918
label: Thiopurine or thiol or thiocyanate S-methyltransferase (TPMT).
definition: >-
  Thiol S-methyltransferase (EC 2.1.1.9) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to a thiol to form a thioether and S-adenosyl-L-homocysteine. Thiocyanate S-methyltransferase (EC 2.1.1.n4) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to thiocyanate to form methyl thiocyanate and S-adenosyl-L-homocysteine. Thiopurine S-methyltransferase (EC 2.1.1.67) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to a thiopurine to form methyl a thiopurine S-methylether and S-adenosyl-L-homocysteine.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
