identifier: PROSITE:PRU00777
label: S-layer homology (SLH) domain
definition: >-
  S-layers are paracrystalline mono-layered assemblies of (glyco)proteins which coat the surface of bacteria. Several S-layer proteins and some other cell wall proteins contain one or more copies of a domain of about 50-60 residues, which has been called SLH (for S-layer homology).
