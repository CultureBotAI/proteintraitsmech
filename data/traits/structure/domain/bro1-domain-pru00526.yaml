identifier: PROSITE:PRU00526
label: "BRO1 domain"
definition: >-
  The BRO1 domain of fungal and mammalian proteins is involved in protein targeting to the lysosome or vacuole by binding multivesicular body components (ESCRT-III proteins) like Snf7 and can thus function to target BRO1 domain-containing proteins to endosomes.
