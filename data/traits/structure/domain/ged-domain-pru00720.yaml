identifier: PROSITE:PRU00720
label: GED domain
definition: >-
  Dynamin superfamily members are large GTPases, conserved through evolution mainly described as mechanochemical enzymes involved in membrane scission events. All members display a common architecture: a large GTPase domain followed by a 'middle domain' of ill-defined function and a downstream coiled-coil GTPase effector domain (GED) that functions in higher order assembly and as a GTPase activating protein (GAP) for dynamin's GTPase activity.
