identifier: PROSITE:PRU00445
label: Big-1 (Bacterial Ig-like domain 1) domain
definition: >-
  The bacterial immunoglobulin-like (Ig) domain 1 or Big-1 domain is a domain of ~95 amino acids present in bacterial adhesion molecules of the intimin/invasin family, involved in pathogenicity.
