identifier: PROSITE:PRU01191
label: GRAS domain
definition: >-
  The GRAS domain is typically composed of ~380 amino acids and contains five highly conserved motifs, found in the following order: leucine heptad repeat I (LRI), the VHIID motif, leucine heptad repeat II (LRII), the PFYRE motif and the SAW motif.
