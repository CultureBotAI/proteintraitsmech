identifier: PROSITE:PRU00475
label: "WAC domain"
definition: >-
  The DNA-binding region of Acf1 includes the WAC domain, which is necessary for the efficient binding of ACF complex to DNA. It seems probable that the WAC domain will be involved in DNA binding in other related factors.
