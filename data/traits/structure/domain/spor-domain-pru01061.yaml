label: "SPOR domain"
definition: >-
  SPOR domain proteins are widespread in bacteria, many of these proteins are involved in sporulation and cell division, and SPOR domains are sufficient for septal localization, probaly because SPOR domains bind to septal peptidoglycan (PG).
