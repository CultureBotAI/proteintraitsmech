identifier: PROSITE:PRU00859
label: "Flavivirus NS2B domain"
definition: >-
  The NS3pro has a classical serine protease catalytic triad (His, Asp, and Ser). The enzymatic activity of NS3pro is enhanced by interacting with the central 40 amino acid of NS2B which acts as an essential cofactor.
