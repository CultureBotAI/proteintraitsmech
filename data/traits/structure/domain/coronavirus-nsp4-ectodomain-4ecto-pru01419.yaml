identifier: PROSITE:PRU01419
label: "Coronavirus Nsp4 ectodomain (4Ecto)"
definition: >-
  Nsp4 contains six transmembranes with its ectodomain (4Ecto) localized in the intermembrane space and its carboxy-terminal domain (CTD) in the DMV lumen, forming two layers of concentric stacking hexamers constituting the lower base of the pore complex. The 3Ecto domain attaches to the upper surface of the 4Ecto domain, which is mediated by a combination of hydrophobic and hydrophilic interactions.
