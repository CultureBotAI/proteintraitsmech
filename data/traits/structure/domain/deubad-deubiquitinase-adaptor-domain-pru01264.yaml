identifier: PROSITE:PRU01264
label: DEUBAD (DEUBiquitinase ADaptor) domain
definition: >-
  The DEUBAD domain stabilizes different conformations of the UCH37- like domain (ULD) to modulate the activity of the ubiquitin (Ub) C-terminal hydrolase (UCH) family of deubiquitinases (DUBs).
