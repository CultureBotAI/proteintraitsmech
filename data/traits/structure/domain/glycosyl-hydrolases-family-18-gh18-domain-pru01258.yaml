identifier: PROSITE:PRU01258
label: "Glycosyl hydrolases family 18 (GH18) domain"
definition: >-
  The GH18 family contains hydrolytic enzymes with chitinase or endo- N-acetyl-beta-D-glucosaminidase (ENGase) activity as well as chitinase like lectins (chi-lectins/proteins (CLPs). Chitinases (EC 3.2.1.14) are hydrolytic enzymes that cleave the beta-1,4-bond releasing oligomeric, dimeric (chitobiose) or monomeric (N-actetylglucosamine, GlcNAc) products. ENGases (EC 3.2.1.96) hydrolyze the beta-1,4 linkage in the chitobiose core of N- linked glycans from glycoproteins leaving one GlcNAc residue on the substrate. CLPs do not display chitinase activity but some of them have been reported to have specific functions and carbohydrate binding property.
definition_source: "Prosite Release 2026_02 of 10-Jun-2026 (ProRule)"
