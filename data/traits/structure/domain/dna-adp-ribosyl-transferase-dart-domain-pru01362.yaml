identifier: PROSITE:PRU01362
label: "DNA ADP-ribosyl transferase (DarT) domain"
definition: >-
  The bacterial DNA ADP-ribosyl transferase (DarT) protein is a toxin that has been shown to transfer ADP-ribose from NAD(+) onto thymidine bases present in single-stranded DNA (ssDNA) specifically at the four-base motif TNTC, and to have no activity on RNA or protein targets.
