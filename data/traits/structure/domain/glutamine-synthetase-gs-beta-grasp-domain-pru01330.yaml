identifier: PROSITE:PRU01330
label: Glutamine synthetase (GS) beta-grasp domain
definition: >-
  Glutamine synthetases (GSs) contain a homology region that consists of a regulatory N-terminal beta-grasp domain and a catalytic C-terminal domain, with the N-terminal domain of one subunit and the C-terminal domain of the neighboring subunit forming an active site.
