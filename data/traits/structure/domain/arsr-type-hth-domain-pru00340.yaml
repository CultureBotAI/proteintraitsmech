identifier: PROSITE:PRU00340
label: ArsR-type HTH domain
definition: >-
  The arsR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain present in transcription regulators of the arsR/smtB family, involved in stress-response to heavy metal ions. In this domain two distinct sites for metal-binding have been identified, one in helix alpha 3 and another in helix alpha 5, and other sites occur.
