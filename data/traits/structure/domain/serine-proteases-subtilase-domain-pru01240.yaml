identifier: PROSITE:PRU01240
label: "Serine proteases, subtilase domain"
definition: >-
  Subtilases are an extensive family of serine proteases which occur in Archaea, Bacteria, fungi, yeasts, and higher eukaryotes. Their catalytic activity is provided by a charge relay system similar to that of the trypsin family of serine proteases but which evolved by independent convergent evolution.
