identifier: PROSITE:PRU00748
label: "Xylose isomerase family"
definition: >-
  Xylose isomerase (EC 5.3.1.5) is an enzyme found in microorganisms and plants which catalyzes the interconversion of the aldo sugars D-xylose or D-glucose to the keto sugars D-xylulose and D-fructose. The catalytic activity requires magnesium, cobalt or manganese.
