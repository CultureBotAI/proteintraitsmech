identifier: PROSITE:PRU00627
label: PWI domain
definition: >-
  The PWI domain, named after a highly conserved PWI tri-peptide located within its N-terminal region, is a ~80 amino acid RNA/DNA-binding domain that has an equal preference for single- and double-stranded nucleic acids and is likely to have multiple important functions in pre-mRNA processing.
