identifier: PROSITE:PRU01224
label: Pestivirus N-terminal protease (Npro) domain
definition: >-
  The pestivirus N-terminal protease Npro is a cysteine autoprotease that cleaves between its own C-terminus and the N-terminus of the core protein. Following the first cleavage reaction, Npro does not possess any proteolytic trans-activity but acts as a viral immediate effector to modulate the host cell's antiviral defenses.
