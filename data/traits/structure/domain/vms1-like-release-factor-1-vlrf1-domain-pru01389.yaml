identifier: PROSITE:PRU01389
label: "Vms1-like release factor 1 (VLRF1) domain"
definition: >-
  The ANKZF1/Vms1 Vms1-like release factor 1 (VLRF1) domain, which acts as a peptidyl-tRNA hydrolase, has a catalytic loop bearing a conserved glutamine. In addition to the glutamine in the active site, the VLRF1 domain also contains conserved vicinal arginines in the alpha-helix immediately following the active-site loop. The cleavage mechanism involves remodelling and cleavage of the ribose-phosphate backbone of the tRNA by a tyrosine and the GSQ motif.
