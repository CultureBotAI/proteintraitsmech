identifier: PROSITE:PRU00258
label: "Carrier protein (CP) domain and phosphopantetheine attachment site"
definition: >-
  Phosphopantetheine (or pantetheine 4' phosphate) is the prosthetic group of carrier proteins (CP) in some multienzyme complexes where it serves as a 'swinging arm' for the attachment of activated fatty acid and amino-acid groups.
