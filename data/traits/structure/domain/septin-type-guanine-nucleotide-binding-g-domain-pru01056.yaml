label: "Septin-type guanine nucleotide-binding (G) domain"
definition: >-
  Septins are a family of eukaryotic cytoskeletal proteins conserved from yeasts to humans. The septin family belongs to the guanosine- triphosphate (GTP)ase superclass of P-loop nucleoside triphosphate (NTP)ases.
