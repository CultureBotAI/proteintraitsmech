identifier: PROSITE:PRU00940
label: UbiE family SAM-binding methyltransferase
definition: >-
  2-methoxy-6-polyprenyl-1,4-benzoquinol methylase (EC 2.1.1.201) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to 2-methoxy-6-all-trans-polyprenyl-1,4 benzoquinol to form 6-methoxy-3-methyl- 2-all-trans polyprenyl-1,4-benzoquinol and S-adenosyl-L-homocysteine.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
