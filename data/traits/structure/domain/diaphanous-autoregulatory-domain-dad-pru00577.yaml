identifier: PROSITE:PRU00577
label: Diaphanous autoregulatory domain (DAD)
definition: >-
  The DAD domain is a ~32 amino acid autoinhibitory domain in diaphanous-related formins (DRF), which inhibits the activity of the DRF catalytical formin homology 2 (FH2) domain to nucleate and elongate nonbranched actin filaments.
