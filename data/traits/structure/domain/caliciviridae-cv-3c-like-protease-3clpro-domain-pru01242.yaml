identifier: PROSITE:PRU01242
label: Caliciviridae (CV) 3C-like protease (3CLpro) domain
definition: >-
  The generation of mature Caliciviridae proteins requires that proteolytic clevages be effected at specific sites of the large polyprotein translated from the viral genomic RNA. This polyprotein processing is carried out by a 3C-like cysteine protease (3CLpro). The CV 3CLpro domain is predicted to contain a catalytic triad constituted of His, Asp and Cys residues, where the Cys likely represents the nucleophilic residue and Asp the acidic residue.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
