identifier: PROSITE:PRU00930
label: Phosphatidylethanolamine N-methyltransferase
definition: >-
  Phosphatidylethanolamine N-methyltransferase (EC 2.1.1.17) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to phosphatidylethanolamine to form phosphatidyl-N-methylethanolamine and S- adenosyl-L-homocysteine.
