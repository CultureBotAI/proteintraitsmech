identifier: PROSITE:PRU01256
label: Zinc finger UBZ4-type
definition: >-
  The ubiquitin-binding zinc finger (UBZ) is a type of zinc- coordinating beta-beta-alpha fold domain found mainly in proteins involved in DNA repair and transcriptional regulation. UBZ domains coordinate a zinc ion with cysteine or histidine residues; depending on their amino acid sequence, UBZ domains are classified into several families. Type 4 UBZs are CCHC-type zinc fingers found in Y-family translesion polymerase kappa, Werner helicase- interacting protein 1 (WRNIP1), and Rad18.
