identifier: PROSITE:PRU00599
label: ADF-H domain
definition: >-
  The actin-depolymerizing factor homology (ADF-H) domain is an ~150- amino acid motif present in three phylogenetically distinct classes of eukaryotic actin-binding proteins that all appear to use the ADF-H domain for their interactions with actin.
