identifier: PROSITE:PRU01150
label: Coiled coil-helix-coiled coil-helix (CHCH) domain
definition: >-
  Twin CX(9)C proteins are eukaryotic proteins that adopt a coiled coil-helix-coiled coil helix (CHCH) fold stabilized by two disulfide bonds, which are formed by the four cysteines in the twin CX(9)C motifs (i.e., two pairs of cysteines each spaced by nine residues).
