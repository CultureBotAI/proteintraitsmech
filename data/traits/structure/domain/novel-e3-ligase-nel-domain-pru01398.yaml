identifier: PROSITE:PRU01398
label: Novel E3 ligase (NEL) domain
definition: >-
  The ~300 residue NEL domain bears a cysteine residue that mediates transfer of ubiquitin to substrates through the formation of a thioester intermediate, analogous to the structurally unrelated HECT domain in eukaryotes.
