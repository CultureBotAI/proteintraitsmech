identifier: PROSITE:PRU00888
label: Methionine S-methyltransferase (EC 2.1.1.12)
definition: >-
  Methionine S-methyltransferase (EC 2.1.1.12) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to L-methionine to form S-methyl-L-methionine and S-adenosyl-L-homocysteine.
