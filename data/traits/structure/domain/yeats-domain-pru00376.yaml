identifier: PROSITE:PRU00376
label: YEATS domain
definition: >-
  The YEATS domain (Yaf9, ENL, AF9, Taf14, and Sas5) is a reader module that selectively recognizes histone lysine acylation, including acetylation, propionylation, butyrylation, crotonylation, 2-hydroxyisobutyrylation, and succinylation.
