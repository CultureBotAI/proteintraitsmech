identifier: PROSITE:PRU01356
label: CFEM) domain
definition: >-
  Common in Fungal Extracellular Membrane (CFEM) proteins, characterized by a distinctive pattern of eight cysteine residues of conserved interspacing, are widespread among fungi. The CFEM domain adopts a helical-basket fold that consists of six alpha-helices, and is uniquely stabilized by four disulfide bonds formed by its eight signature cysteines.
