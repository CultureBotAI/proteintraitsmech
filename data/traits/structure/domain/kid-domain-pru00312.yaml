label: "KID domain"
definition: >-
  Ser-133 phosphorylation of CREB within the KID domain promotes target gene activation via complex formation with the KIX domain of the CBP and P300 coactivators, whereas concurrent phosphorylation of the CREB KID domain at Ser-142 inhibits transcriptional induction.
