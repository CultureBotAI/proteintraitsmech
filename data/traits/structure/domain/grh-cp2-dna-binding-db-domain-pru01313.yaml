identifier: PROSITE:PRU01313
label: "Grh/CP2 DNA-binding (DB) domain"
definition: >-
  Grh/CP2 transcription factors (TFs) are highly conserved in multicellular organisms as key regulators of epithelial differentiation, organ development and skin barrier formation. Members of this TF family are widely found in diverse taxa, ranging from fungi to animals. All Grh/CP2 family members share a common domain architecture characterized by an intrinsically unstructured N-terminal transactivation domain (TAD), a conserved DNA-binding domain (DBD), also termed CP2 binding domain, and a C- terminal dimerization domain (DD).
