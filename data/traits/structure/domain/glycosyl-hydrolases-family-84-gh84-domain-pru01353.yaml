identifier: PROSITE:PRU01353
label: Glycosyl hydrolases family 84 (GH84) domain
definition: >-
  Family 84 glycoside hydrolases (GH84) cleave the glycosidic linkage of N-acetylglucosaminides by a two-step catalytic mechanism that involves a pair of aspartate residues as catalytic residues, D1 as the polarizing residue and Asp175 as the general acid/base catalyst.
