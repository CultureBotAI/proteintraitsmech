identifier: PROSITE:PRU00528
label: PASTA domain
definition: >-
  The PASTA domain (for penicillin-binding protein and serine/threonine kinase associated domain) is an extracellular module of ~70 residues that is found in the C-termini of eukaryotic-like serine/threonine kinases (PSTKs) and high molecular weight penicilin-binding proteins (PBPs).
