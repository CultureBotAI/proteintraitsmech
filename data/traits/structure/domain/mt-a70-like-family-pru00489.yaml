identifier: PROSITE:PRU00489
label: MT-A70-like family
definition: >-
  The MT-A70-like family comprises four subfamilies with varying degrees of interrelatedness. One subfamily is a small group of bacterial DNA: m6A MTases. The other three are paralogous eukaryotic lineages, two of which have not been associated with MTase activity but include proteins that regulate mRNA levels via unknown mechanisms apparently not involving methylation.
