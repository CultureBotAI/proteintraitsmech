identifier: PROSITE:PRU01222
label: "Picornavirales 3C/3C-like protease domain"
definition: >-
  The 3C (for the family Picornaviridae) or 3C-like (3CL) protease (for other families) plays a central role in the cleavage of the viral precursor polyprotein. In addition to its key role in processing the polyprotein, 3C/3C-like protease is able to cleave a number of host proteins to remodel the cellular environment for virus reproduction.
