label: C2 DOCK-type domain
definition: >-
  The ~200 residue DOCK-type C2 domain is located toward the N- terminus and interacts with phosphatidylinositol 3,4,5-trisphosphate [PtdIns(3,4,5)P3] to mediate signalling and membrane localization.
