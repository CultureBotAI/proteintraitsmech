identifier: PROSITE:PRU00585
label: "GS domain"
definition: >-
  The GS domain is a short (~30 residues), highly conserved regulatory sequence which is found N-terminal to the kinase domain on the cytoplasmic side of members of the type I TGF-beta receptor (TbetaR-I) family. At least three, and perhaps four to five of the serines and threonines in the GS domain, must be phosphorylated to fully activate TbetaR-1.
