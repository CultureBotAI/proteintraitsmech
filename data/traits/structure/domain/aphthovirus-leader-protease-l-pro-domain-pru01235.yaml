identifier: PROSITE:PRU01235
label: "Aphthovirus leader protease (L(pro)) domain"
definition: >-
  Aphthovirus L(pro) is a papain-like proteinase that self-cleaves from the nascent viral polyprotein precursor during infection and plays an important role in viral pathogenesis. L(pro) is known to contribute to virus propagation by suppressing host antiviral activity. L(pro) has an antagonistic effect on host antiviral responses via at least three mechanisms.
