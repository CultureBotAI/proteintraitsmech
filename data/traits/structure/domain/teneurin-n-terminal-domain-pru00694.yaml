identifier: PROSITE:PRU00694
label: "Teneurin N-terminal domain"
definition: >-
  The N-terminal intracellular domain of vertebrate teneurins contains two EF-hand-like calcium-binding motifs and two polyproline regions involved in protein-protein interactions, followed by a single-span transmembrane domain.
