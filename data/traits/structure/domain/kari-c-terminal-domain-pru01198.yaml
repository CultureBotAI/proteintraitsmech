identifier: PROSITE:PRU01198
label: KARI C-terminal domain
definition: >-
  Ketol-acid reductoisomerase (KARI; EC 1.1.1.86), also known as acetohydroxy acid isomeroreductase (AHIR or AHAIR), catalyzes the conversion of acetohydroxy acids into dihydroxy valerates in the second step of the biosynthetic pathway for the essential branched-chain amino acids valine, leucine, and isoleucine. KARIs are composed of two types of domains, an N- terminal Rossmann fold domain and one or two C-terminal knotted domains.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
