identifier: PROSITE:PRU00576
label: EB1-like C-terminal (EB1-C)
definition: >-
  Microtubule-associated proteins of the EB1 (end-binding protein 1) family have a bipartite composition: the N-terminal CH domain mediates microtubule plus end localization and a C-terminal cargo binding domain (EB1-C) that captures cell polarity determinants.
