identifier: PROSITE:PRU00614
label: "DOC domain"
definition: >-
  The DOC domain is found in the APC10 subunit of a multi-subunit E3 protein ubiquitin ligase as well as in several hypothetical proteins that may mediate ubiquitination reactions, because they contain combinations of either RING finger, cullin or HECT domains.
