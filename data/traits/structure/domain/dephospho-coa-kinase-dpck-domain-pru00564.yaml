label: Dephospho-CoA kinase (DPCK) domain
definition: >-
  Dephospho-coenzyme A kinase (DPCK) (EC 2.7.1.24) catalyzes the final step in coenzyme A (CoA) biosynthesis, the phosphorylation of the 3'-hydroxyl group of ribose using ATP as a phosphate donor.
