identifier: PROSITE:PRU01071
label: Filoviruses VP35 interferon inhibitory domain profile
definition: >-
  VP35 contains an N-terminal coiled-coil domain required for its oligomerization and a C-terminal interferon (IFN) inhibitory domain (IID). The VP35 IID can bind dsRNA and VP35-mediated IFN antagonism correlates with dsRNA-binding activity.
