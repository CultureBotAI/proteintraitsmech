identifier: PROSITE:PRU00705
label: High potential iron-sulfur proteins family
definition: >-
  High potential iron-sulfur proteins (HiPIP) are a specific class of high-redox potential 4Fe-4S ferredoxins that functions in anaerobic electron transport and which occurs commonly in purple photosynthetic bacteria and in other bacteria, such as Paracoccus denitrificans and Thiobacillus ferrooxidans.
