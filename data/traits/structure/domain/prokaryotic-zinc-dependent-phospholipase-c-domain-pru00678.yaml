identifier: PROSITE:PRU00678
label: "Prokaryotic zinc-dependent phospholipase C domain"
definition: >-
  Phospholipase C (EC 3.1.4.3) has a ~245 amino-acids domain with the active site (PLC) in a cleft which is also occupied by 3 zinc ions. There are nine conserved residues known to be involved in binding the zinc ions: 5 His, 2 Asp, 1 Glu and 1 Trp.
