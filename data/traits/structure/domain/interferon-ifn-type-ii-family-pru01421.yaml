identifier: PROSITE:PRU01421
label: "Interferon (IFN) type-II family"
definition: >-
  Tetrapods possess only a single copy of type II IFN gene, called IFN-gamma, which is mainly involved in immune regulation. In general, teleost fish are reported to have the composition of two type II IFN genes, including IFN-gamma and IFN-gamma-related (IFN-gammarel), except that two IFN-gamma genes were identified in channel catfish (named as IFN-gamma2a and IFN- gamma2b) and in ginbuna crucian carp (IFN-gamma1 and IFN-gamma2), and two IFN-gammarel genes were also reported in ginbuna crucian carp (IFN-gammarel1 and IFN-gammarel2). Three members of type II IFN family, named as IFN-gamma- like, IFN-gamma and IFN-gammarel, were identified in the osteoglossiform fish, arapaima. IFN-gamma does possess some antiviral activity but is mainly an immunomodulatory cytokine acting on leukocytes.
definition_source: "Prosite Release 2026_02 of 10-Jun-2026 (ProRule)"
