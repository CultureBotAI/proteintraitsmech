identifier: PROSITE:PRU01296
label: "Coronavirus (CoV) Nsp9 ssRNA-binding domain"
definition: >-
  Nsp9 is able to bind single-stranded (ss)DNA or ssRNA, although binding of ssRNA is expected to be the native function. The CoV Nsp9 ssRNA- binding domain is a seemingly obligate homodimer but CoV Nsp9 ssRNA-binding domains have diverse forms of dimerization that promote their biological function.
