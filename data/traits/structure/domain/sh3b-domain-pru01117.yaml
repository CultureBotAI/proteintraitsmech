identifier: PROSITE:PRU01117
label: "SH3b domain"
definition: >-
  The SH3b domain might have two possible functions: (1) promoting survival of a pathogen within the invaded cell by modulating pathways controlled by SH3 domains; or (2) promoting invasion by binding to receptors on eukaryotic cells.
