identifier: PROSITE:PRU00580
label: "VWFD domain profile"
definition: >-
  Von Willebrand factor (VWF) is a large, multimeric blood glycoprotein synthesized in endothelial cells and megakaryocytes, that is required for normal hemostasis. The type D domain (VWFD) is not only required for blood clotting factor VIII binding but also for normal multimerization of VWF.
