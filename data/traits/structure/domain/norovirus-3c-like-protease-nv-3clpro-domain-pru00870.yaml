identifier: PROSITE:PRU00870
label: "Norovirus 3C-like protease (NV 3CLpro) domain"
definition: >-
  NV 3CLpros belong to the chymotrypsin-like protease family, in that they appear to have chymotrypsin-like folds. Whether the 3CLpro domain has a catalytic dyad of composed of histidine and cysteine or tryad of histidine, glutamate and cysteine remains controversial.
