identifier: PROSITE:PRU01060
label: Peptidase family M60 domain
definition: >-
  The peptidase family M60 domain belongs to the zincin superfamily of zinc-requiring metalloproteases (clan MA, subclan MA(E)). The peptidase family M60 domain contains the metal-binding consensus motif HExxH. The peptidase family M60 domain targets complex host glycoproteins, such as mucins.
