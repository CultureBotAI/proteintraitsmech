identifier: PROSITE:PRU01269
label: Betacoronavirus spike (S) glycoprotein S1 subunit C-terminal (CTD) domain
definition: >-
  The receptor binding domain (RBD) of betaCoV that directly engages the receptor is commonly located in the C-terminal half of S1 [C-terminal domain (CTD)] such as in SARS-CoV, SARS-CoV-2, MERS-CoV,and BatCoV HKU4, though in rare cases such as with mouse hepatitis virus (MHV), the RBD region was identified in the S1 N-terminal domain (NTD).
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
