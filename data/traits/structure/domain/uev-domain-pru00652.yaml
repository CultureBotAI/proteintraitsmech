identifier: PROSITE:PRU00652
label: "UEV domain"
definition: >-
  The N-terminal ubiquitin E2 variant (UEV) domain is ~145 amino acid residues in length and shows significant sequence similarity to E2 ubiquitin ligases but is unable to catalyze ubiquitin transfer as it lacks the active site cysteine that forms the transient thioester bond with the C-terminus of ubiquitin (Ub). Nevertheless, at least some UEVs have retained the ability to bind Ub, and appear to act either as cofactors in ubiquitylation reactions, or as ubiquitin sensors.
definition_source: "Prosite Release 2026_02 of 10-Jun-2026 (ProRule)"
