identifier: PROSITE:PRU01045
label: CHAD domain
definition: >-
  The CHAD (conserved histidine alpha-helical domain) is an uncharacterized domain, with a characteristic pattern of conserved histidines and other charged residues. The conserved charged residues could form a strongly polar surface that could participate, either in metal chelation, or act as phosphoacceptors.
