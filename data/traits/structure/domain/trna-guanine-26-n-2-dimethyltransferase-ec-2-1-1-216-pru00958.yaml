identifier: PROSITE:PRU00958
label: tRNA (guanine(26)-N(2))-dimethyltransferase (EC 2.1.1.216)
definition: >-
  tRNA (guanine(26)-N(2))-dimethyltransferase (EC 2.1.1.216) is an enzyme that transfers a methyl group from 2 S-adenosyl-L-methionine (SAM) to guanine(26) in tRNA to form N(2)-dimethylguanine(26) in tRNA and 2 S- adenosyl-L-homocysteine.
