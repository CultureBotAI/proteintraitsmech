identifier: PROSITE:PRU01073
label: DNA-binding recombinase domain
definition: >-
  The large serine recombinases (LSRs) are DNA-rearranging enzymes that are members of the serine recombinase or resolvase/invertase superfamily. The LSRs are composed of three primary structural domains: an amino-terminal catalytic domain, a DNA-binding "recombinase" domain, and a DNA-binding zinc ribbon domain.
