identifier: PROSITE:PRU00073
label: "Z-binding domain"
definition: >-
  The Z-binding domain (ZBD), also referred to as Zalpha or Zbeta is a 78-amino-acid protein fold that specifically binds to Z-DNA as well as to Z- RNA but not to B-DNA. ZBDs might play an important role of in innate antiviral immune responses.
