identifier: PROSITE:PRU00956
label: RNA methyltransferase TRMH
definition: >-
  tRNA guanosine-2'-O-methyltransferase (EC 2.1.1.34) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to tRNA to form tRNA containing 2'-O-methylguanosine and S-adenosyl-L-homocysteine. 16S rRNA (guanine(527)-N(7))-methyltransferase (EC 2.1.1.170) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to guanosine(527) in 16S rRNA to form N(7)-methylguanosine(527) in 16S rRNA and S-adenosyl-L-homocysteine. tRNA (cytidine(32)/uridine(32)-2'-O)-methyltransferase (EC 2.1.1.200) is an enzyme that transfers a methyl group from S-adenosyl-L methionine (SAM) to (1)cytidine(32) in tRNA to form 2'-O-methylcytidine(32) in tRNA and S- adenosyl-L-homocysteine. tRNA (cytidine(34)-2'-O)-methyltransferase (EC 2.1.1.207) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to (1)cytidine(34) in tRNA to form 2'-O-methylcytidine(34) in tRNA and S adenosyl-L-homocysteine.
