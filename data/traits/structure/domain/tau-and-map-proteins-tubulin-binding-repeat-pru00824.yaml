identifier: PROSITE:PRU00824
label: Tau and MAP proteins tubulin-binding repeat
definition: >-
  The C-terminal region of a subset of Microtubule Associated Proteins (MAPs) contain three or four tandem repeats of a conserved domain of about thirty amino acid residues which is implicated in tubulin- binding and which seems to have a stiffening effect on microtubules.
