identifier: PROSITE:PRU01163
label: "Vicinal oxygen chelate (VOC) domain"
definition: >-
  The vicinal oxygen chelate (VOC) family of enzymes catalyzes a highly diverse set of chemistries that derives from one common mechanistic trait: bidentate coordination to a divalent metal center by a substrate or intermediate or transition state through vicinal oxygen atoms.
