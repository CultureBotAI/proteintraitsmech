identifier: PROSITE:PRU01282
label: "ArsC family"
definition: >-
  ArsC is an ~150-residue arsenate reductase that uses reduced glutathione (GSH) to convert arsenate to arsenite with a redox active cysteine residue in the active site. The arsC family also comprises the Spx proteins which are GRAM-positive bacterial transcription factors that regulate the transcription of multiple genes in response to disulfide stress.
