identifier: PROSITE:PRU01406
label: "DAHPS class-I core TIM-barrel domain"
definition: >-
  Although there is no significant sequence similarity between the class-II DAHPSs and the class-I DAHPSs and KDOPSs, they share a characteristic (beta/alpha)8 TIM-barrel fold in which the eight parallel beta-strands are each followed by alpha-helices, and similar active site architecture.
