identifier: PROSITE:PRU01203
label: Rho RNA-binding (RNA-BD) domain
definition: >-
  Rho protomers have an RNA-binding region at the N-terminus linked by a connector loop to a C-terminal ATPase domain. The RNA binding region comprises a variable N-terminal helix bundle (NHBD) domain and a core RNA- binding domain which forms the primary RNA binding site.
