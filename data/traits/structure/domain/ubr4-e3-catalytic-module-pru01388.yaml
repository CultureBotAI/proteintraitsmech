identifier: PROSITE:PRU01388
label: UBR4 E3 catalytic module
definition: >-
  The UBR4 E3 catalytic module that carries out ubiquitin (Ub) transfer consists of a 'hemiRING' zinc finger, a helical-rich UBR zinc-finger interacting (UZI) subdomain, and an N-terminal region that can serve as an affinity factor for the E2 conjugating enzyme (E2).
