identifier: PROSITE:PRU00915
label: Phosphoethanolamine N-methyltransferase (EC 2.1.1.103)
definition: >-
  Phosphoethanolamine N-methyltransferase (EC 2.1.1.103) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to ethanolamine phosphate to form N-methylethanolamine phosphate and S-adenosyl- L-homocysteine.
