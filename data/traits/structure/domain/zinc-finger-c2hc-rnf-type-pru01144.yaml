identifier: PROSITE:PRU01144
label: "Zinc finger C2HC RNF-type"
definition: >-
  The closely related proteins RNF125/TRAC-1, RNF114 (also known as Zpf313), RNF138 (or NARF) and RNF166 contain, apart from the RING domain, a C2HC (Cys2-His-Cys)- and two C2H2 (Cys2-His2)-type zinc fingers, as well as an ubiquitin interacting motif (UIM).
