identifier: PROSITE:PRU00631
label: KilA-N domain
definition: >-
  The amino-terminal module of the poxvirus D6R/NIR proteins defines a novel conserved DNA-binding domain (the KilA-N domain) that is found in a wide range of proteins of large bacterial and eukaryotic DNA viruses. The KilA-N domain has been suggested to be homologous to the fungal DNA-binding APSES domain.
