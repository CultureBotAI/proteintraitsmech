identifier: PROSITE:PRU00616
label: IS408/IS1162 transposase-type HTH domain
definition: >-
  The IS408 transposase-type HTH domain is a putative DNA-binding, helix-turn-helix (HTH) domain of about 80-85 amino acids, present in transposases of IS408/IS1162-like prokaryotic insertion sequences.
