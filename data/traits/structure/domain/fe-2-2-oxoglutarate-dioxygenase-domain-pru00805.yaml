identifier: PROSITE:PRU00805
label: Fe(2+) 2-oxoglutarate dioxygenase domain
definition: >-
  Enzymes with the Fe(2+) and 2-oxoglutarate (2OG)-dependent dioxygenase domain typically catalyse the oxidation of an organic substrate using a dioxygen molecule, mostly by using ferrous iron as the active site cofactor and 2OG as a cosubstrate which is decarboxylated to succinate and CO2.
