identifier: PROSITE:PRU01234
label: "Tre2/Bub2/Cdc16 (TBC), lysin motif (LysM), domain catalytic (TLDc) domain"
definition: >-
  The TLDc domain is present in several proteins that share a protective function against oxidative stress (OS). The TLDc domain alone is able to confer oxidative resistance properties to all the TLDc members.
