label: DPH-type metal-binding (MB) domain
definition: >-
  The DHP-type or CSL-type MB domain contains a Cys-X-Cys...Cys-X2-Cys motif which tetrahedrically coordinates either Fe or Zn, but Zn is much more tightly bound.
