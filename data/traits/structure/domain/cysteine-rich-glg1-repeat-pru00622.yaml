identifier: PROSITE:PRU00622
label: Cysteine-rich GLG1 repeat
definition: >-
  The cysteine-rich GLG1 repeat from Golgi apparatus protein 1 (GLG1) is a ~60-amino acid module that contains 4 Cys residues, which can form intrachain disulfide bridges.
