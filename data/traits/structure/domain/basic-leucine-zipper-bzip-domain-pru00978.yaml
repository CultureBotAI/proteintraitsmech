label: "Basic-leucine zipper (bZIP) domain"
definition: >-
  The bZIP superfamily of eukaryotic DNA-binding transcription factors groups together proteins that contain a basic region mediating sequence- specific DNA-binding followed by a leucine zipper required for dimerization.
