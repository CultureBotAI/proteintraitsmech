identifier: InterPro:IPR055051
label: "Short NACHT-associated C-terminal domain 1"
definition: >-
  The SNaCT domains are a rapidly evolving, monophyletic assemblage of domains found C-terminal to the NACHT module in several bacterial NACHT conflict systems. They contain a well-conserved aspartate near the N terminus of the domain. SNaCT domains are thought to occlude the NTP-binding region, potentially until they interact with phage-encoded bNACHT inhibitors.
