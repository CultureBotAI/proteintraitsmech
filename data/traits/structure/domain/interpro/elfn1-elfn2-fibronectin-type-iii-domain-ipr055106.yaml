identifier: InterPro:IPR055106
label: "ELFN1/ELFN2, fibronectin type-III domain"
definition: >-
  This domain is found in human ELFN1 and ELFN2 proteins and its homologues. The postsynaptic ELFN1 regulates target-specific presynaptic properties which influences the timing of recruitment of inhibitory neuron subtypes. Both ELFN1 and ELFN2 inhibit the phosphatase activity of protein phosphatase 1 (PP1) complexes. This domain is predicted to adopt a Ig-like β-sandwich with significant similarity to fibronectin type III domains.
