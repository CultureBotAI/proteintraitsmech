identifier: InterPro:IPR021623
label: "Lamina-associated polypeptide 2 alpha, C-terminal"
definition: >-
  LAPs are components of the nuclear lamina which supports the nuclear envelope. LAP2alpha is a non-membrane-associated member of the LAP family which is unique. This entry represents the C-terminal domain of LAP2alpha which consists of residues 459-693 and constitutes a dimeric structure with an antiparallel coiled coil. LAP2alpha is involved in cell-cycle regulation and chromatin organisation and preferentially binds to lamin A/C.
