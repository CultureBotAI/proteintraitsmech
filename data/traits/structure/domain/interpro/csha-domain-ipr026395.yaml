identifier: InterPro:IPR026395
label: "CshA domain"
definition: >-
  This entry represents a domain that is found in a variety of bacterial cell surface proteins. Many proteins with this domain have a C-terminal LPXTG anchor. The best studied protein containing this domain is the CshA adhesin protein from Streptococcus gordonii that contains 17 tandem copies of the domain. The S. gordonii fibrillar adhesin CshA plays an important role in host colonization. The structure of the CshA domain shows a variant of the immunoglobulin fold lacking the typical A and B strands.
