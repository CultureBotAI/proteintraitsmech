identifier: InterPro:IPR026947
label: "Ubinuclein middle domain"
definition: >-
  Ubinuclein 1 and 2 (UBN1, UBN2) are members of a histone chaperone complex involved in the formation of a certain type of facultative heterochromatin, called senescence-associated heterochromatin foci (SAHF). The domain described here is conserved in many eukaryotes such as human, rat, drosophila, and zebra-fish.
