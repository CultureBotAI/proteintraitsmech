identifier: InterPro:IPR059391
label: "Domain of unknown function DUF8347"
definition: >-
  This domain is found in uncharacterised proteins mainly from Gram negative bacteria. It is predicted to fold into an α-β-β architecture featuring two sandwiched β-sheets and α-helices packed on one side. This domain contains several negatively charged residues which are located on the domain surface and highly conserved.
