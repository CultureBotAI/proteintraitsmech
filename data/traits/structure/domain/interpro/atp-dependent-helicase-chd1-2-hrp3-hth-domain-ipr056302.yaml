identifier: InterPro:IPR056302
label: "ATP-dependent helicase CHD1-2/hrp3, HTH domain"
definition: >-
  This domain is found in ATP-dependent helicase hrp3 (Hrp3) from Schizosaccharomyces pombe and Chromodomain-helicase-DNA-binding protein 1 and 2 (CHD1-2) from eukaryotes. Hrp3 is involved in heterochromatin silencing. It is predicted to adopt an HTH structure and is often found C-terminal to .
