identifier: InterPro:IPR041987
label: "HERC2, zinc finger, ZZ-type"
definition: >-
  This entry represents the ZZ type zinc finger found in HERC2 and related proteins. HERC2 is an E3 ubiquitin-protein ligase that regulates ubiquitin-dependent retention of repair proteins on damaged chromosomes. The ZZ motif coordinates two zinc ions and most likely participates in ligand binding or molecular scaffolding.
