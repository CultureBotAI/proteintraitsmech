identifier: InterPro:IPR046942
label: "Methylcytosine dioxygenase TET1-3, oxygenase domain"
definition: >-
  The pattern of DNA methylation at cytosine bases in the genome is tightly linked to gene expression. TET proteins, including TET1/2/3, convert 5-methylcytosine to 5-hydroxymethylcytosine. They can also convert 5-methylcytosine to 5-formylcytosine and 5-carboxylcytosine. They play roles in epigenetic regulation. Human TET2 mutations have been linked to various leukaemias. TET2 and TET3 interact with O-GlcNAc transferase (OGT) and promotes OGT-mediated GlcNAcylation. The double epigenetic modifications on both DNA and histones by TET2 and OGT coordinate together for the regulation of gene transcription. This entry represents the oxygenase domain of TET proteins.
