label: Magnesium chelatase, subunit H, N-terminal
definition: >-
  This functionally uncharacterised domain, found N-terminal to , occurs in magnesium chelatase subunit H, which is involved in chlorophyll biosynthesis. It is found in bacteria, green plants and archaea. It is around 160 amino acids in length.
