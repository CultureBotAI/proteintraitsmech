identifier: InterPro:IPR039431
label: "Vta1/callose synthase, N-terminal"
definition: >-
  This domain can be found in the N-terminal of the Vta1 protein, which is a class E vacuolar protein sorting (VPS) protein required for the formation of the multivesicular body (MVB). Proteins containing this domain also include Vta1 homologues, such as SBP1 from humans and LIP5 from Arabidopsis thaliana. This domain can also be found in plant callose synthase, which is involved in callose synthesis at the forming cell plate during cytokinesis.
