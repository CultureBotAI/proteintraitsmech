identifier: InterPro:IPR035826
label: "TRIM34, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of E3 ubiquitin-protein ligase TRIM34, also known as RING finger protein 21 (RNF21) or interferon-responsive finger protein (IFP1). TRIM proteins are defined by the presence of the tripartite motif RING/B-box/coiled-coil region and also known as RBCC proteins. The TRIM34 cDNA possesses at least three kinds of isoforms, due to alternative splicing, of which only the long and medium forms contain the SPRY domain. It is an interferon-induced protein, predominantly expressed in the testis, kidney, and ovary. TRIM34 functions as an antiviral protein and contributes to the defense against retroviral infections. The SPRY domain provides the capsid recognition motif that dictates specificity to retroviral restriction. While the PRY-SPRY domain provides specificity and the capsid recognition motif to retroviral restriction, TRIM34 binds HIV-1 capsid but does not restrict HIV-1 infection.
