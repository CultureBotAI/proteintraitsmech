identifier: InterPro:IPR049432
label: "Virion DNA-directed RNA polymerase domain"
definition: >-
  This domain is found in Virion DNA-directed RNA polymerase from Bacteriophage N4 (vRNAP, ), responsible for the transcription of the early region of the double-stranded linear DNA genome of the lytic coliphage. This domain adopts a mostly α-helical structure.
