identifier: InterPro:IPR057569
label: "C2 domain, nematode"
definition: >-
  This entry represents a specific C2 domain found in uncharacterised nematode proteins, including C05B5.4 and R10E12.2 from Caenorhabditis elegans. C2 domains are protein modules that can bind calcium and phospholipids.
