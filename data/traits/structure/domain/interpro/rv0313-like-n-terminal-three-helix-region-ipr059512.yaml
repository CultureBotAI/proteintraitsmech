identifier: InterPro:IPR059512
label: "Rv0313-like, N-terminal three-helix region"
definition: >-
  This entry represents the N-terminal three-helix region of Rv0313, an uncharacterised protein of 128 amino acids found in Mycobacterium tuberculosis. According to the AlphaFold structure prediction, this region consists of three helical elements. The function of this protein remains to be determined.
