identifier: InterPro:IPR007516
label: "Coenzyme F420 hydrogenase/dehydrogenase beta subunit, N-terminal"
definition: >-
  Coenzyme F420 hydrogenase ( ) reduces the low-potential two-electron acceptor coenzyme F420. This entry contains the N termini of F420 hydrogenase and dehydrogenase beta subunits. The N terminus of Methanobacterium formicicum formate dehydrogenase beta chain ( , ) is also represented in this entry. This region is often found in association with the 4Fe-4S binding domain ( ), and the C terminus .
