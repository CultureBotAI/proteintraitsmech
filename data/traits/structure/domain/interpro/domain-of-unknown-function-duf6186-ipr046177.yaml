label: "Domain of unknown function DUF6186"
definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0001215) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide). It includes a member from the conglobatin biosynthetic gene cluster from Streptomyces conglobatus. This family appears to be predominantly found in Actinobacteria.
