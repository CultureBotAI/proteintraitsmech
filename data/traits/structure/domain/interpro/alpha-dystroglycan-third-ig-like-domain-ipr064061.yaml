identifier: InterPro:IPR064061
label: "Alpha-Dystroglycan, third Ig-like domain"
definition: >-
  This is the third Ig-like domain found in alpha-Dystroglycan. Dystroglycan is one of the dystrophin-associated glycoproteins, which is encoded by a 5.5 kb transcript in human. The protein product is cleaved into two non-covalently associated subunits, alpha (N-terminal) and beta (C-terminal). In skeletal muscle the dystroglycan complex works as a transmembrane linkage between the extracellular matrix and the cytoskeleton.
