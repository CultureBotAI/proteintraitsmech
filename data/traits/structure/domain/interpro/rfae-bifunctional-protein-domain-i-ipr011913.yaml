identifier: InterPro:IPR011913
label: "RfaE bifunctional protein, domain I"
definition: >-
  RfaE is a protein involved in the biosynthesis of ADP-L-glycero-D-manno-heptose, a precursor for LPS inner core biosynthesis. RfaE is a bifunctional protein in Escherichia coli, and separate proteins in some other genome. The longer, N-terminal domain I (this family) is suggested to act in D-glycero-D-manno-heptose 1-phosphate biosynthesis, while domain II ( ) adds ADP to yield ADP-D-glycero-D-manno-heptose.
