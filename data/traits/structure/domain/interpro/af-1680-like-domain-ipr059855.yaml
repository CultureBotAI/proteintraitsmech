identifier: InterPro:IPR059855
label: "AF_1680-like domain"
definition: >-
  This entry represents a domain found standalone in the AF_1680 protein and in uncharacterised proteins found in Archaea. AF_1680 is found in Archaeoglobus fulgidus and related archaeal species. The function of this domain remains to be determined.
