identifier: InterPro:IPR061713
label: "Domain of unknown function DUF8652"
definition: >-
  This entry represents a domain of approximately 100 residues that adopts an NTF2-like fold. This domain is often found in tandem repeats within proteins. Members are found in diverse eukaryotes including Stramenopiles and Haptophyta, as well as in some Cyanobacteriota. The function of this domain remains to be determined.
