identifier: InterPro:IPR029400
label: "TERF1-interacting nuclear factor 2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of TERF1-interacting nuclear factor 2 (TINF2). It is a component of the shelterin complex (telosome), which is involved in the protection and maintenance of telomeres. TINF2 plays a role in shelterin complex assembly. In humans, one of its isoforms may have an additional role in tethering telomeres to the nuclear matrix.
