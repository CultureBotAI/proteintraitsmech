identifier: InterPro:IPR044150
label: "Histone deacetylase 11"
definition: >-
  This entry represents a domain found in class IV histone deacetylases ( ), also known as histone deacetylase 11 (HDAC11). This class includes animal HDAC11, plant HDA2 and related bacterial deacetylases. Enzymes in this subfamily participate in regulation of a number of different processes through protein modification (deacetylation). HDAC11 and HDAC6 interact with each other in the cytoplasm and nuclei of APCs (antigen presenting cells) and are recruited to the IL-10 gene promoter to regulate its transcriptional activity. In mammals, HDAC11 proteins are known to be involved in progression of various tumours. HDAC11 plays an essential role in regulating OX40 ligand (OX40L) expression in Hodgkin lymphoma (HL); selective inhibition of HDAC11 expression significantly up-regulates OX40L and induces apoptosis in HL cell lines. Thus, inhibition of HDAC11 could be a therapeutic drug option for antitumor immune response in HL patients.
