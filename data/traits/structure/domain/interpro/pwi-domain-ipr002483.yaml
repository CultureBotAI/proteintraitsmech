identifier: InterPro:IPR002483
label: "PWI domain"
definition: >-
  The PWI domain, named after a highly conserved PWI tri-peptide located within its N-terminal region, is a ~80 amino acid module, which is found either at the N terminus or at the C terminus of eukaryotic proteins involved in pre-mRNA processing. It is generally found in association with other domains such as RRM and RS. The PWI domain is a RNA/DNA-binding domain that has an equal preference for single- and double-stranded nucleic acids and is likely to have multiple important functions in pre-mRNA processing. Proteins containing this domain include the SR-related nuclear matrix protein of 160kDa (SRm160) splicing and 3'-end cleavage-stimulatory factor, and the mammalian splicing factor PRP3. This domain is also present in Rmn1 from S.pombe, a component of a MTREC submodule, which promotes degradation of meiotic mRNAs and regulatory ncRNAs, and is the major nuclear exosome targeting complex for cryptic unstable transcripts (CUTs) and unspliced pre-mRNAs. Rmn1 homologues from human RBM26/27 may be involved in turnover of nuclear polyadenylated RNA and are important for PAXT-mediated nuclear RNA decay. The PWI domain is a soluble, globular and independently folded domain which consists of a four-helix bundle, with structured N- and C-terminal elements.
