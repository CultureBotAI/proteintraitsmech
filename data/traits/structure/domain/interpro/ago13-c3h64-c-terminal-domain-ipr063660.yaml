identifier: InterPro:IPR063660
label: "AGO13/C3H64, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in Protein argonaute 13 (AGO13), zinc finger CCCH domain-containing protein 64 (C3H64) and related proteins from plants. The domain is approximately 130-140 amino acids in length and is found at the C-terminal region of various proteins including argonaute proteins, ubiquitin-like domain-containing proteins and alanine-tRNA ligases. In argonaute 13 from rice (Oryza sativa), this domain occurs at the C-terminal following the well-characterised Piwi domain. The domain shows conservation across plant species, particularly within the Poaceae family. The specific function of this domain remains to be determined.
