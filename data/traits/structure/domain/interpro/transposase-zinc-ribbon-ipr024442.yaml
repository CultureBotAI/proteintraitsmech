identifier: InterPro:IPR024442
label: "Transposase, zinc-ribbon"
definition: >-
  This zinc binding domain is found in a range of transposase proteins such as ISSPO8, ISSOD11, ISRSSP2 etc. It may be a zinc-binding β-ribbon domain that could bind DNA.
