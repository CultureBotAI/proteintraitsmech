label: "RNA polymerase II assembly factor Rtp1, C-terminal domain 2"
definition: >-
  This domain is found towards the C terminus of required for the nuclear transport of RNA pol II protein (Rtp1). Rtp1 is required for the nuclear localisation of RNA polymerase II. This domain is found in association with . This domain is also found in transport and Golgi organisation protein 6 (Tango6).
