identifier: InterPro:IPR033837
label: "Ubiquitinyl hydrolase-L5"
definition: >-
  The ubiquitin C-terminal hydrolase (UCH; ubiquitinyl hydrolase; ubiquitin thiolesterase; MEROPS family C12) family of deubiquitinating enzymes (DUBs) consists of several members including: UCH-L1, UCH-L3, UCH-L5 (UCH37) and BRCA1-associated protein-1 (BAP1), all containing a conserved catalytic domain with cysteine peptidase activity.
