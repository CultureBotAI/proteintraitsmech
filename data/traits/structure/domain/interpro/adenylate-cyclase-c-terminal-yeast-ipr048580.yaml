identifier: InterPro:IPR048580
label: "Adenylate cyclase, C-terminal, yeast"
definition: >-
  Yeast adenylate cyclase (CYAA/CYR1) is required for cAMP production and cAMP-dependent protein kinase signalling. It is a scaffold protein for Ras2-Ira interaction. This entry represents the C-terminal domain which contains a second Ras binding site (the first resides in the LRR region) which is involved in a GTP-independent weak interaction between Ras and a complex of adenylate cyclase and Srv2 protein. These two Ras binding sites are required for normal Ras2 downregulation.
