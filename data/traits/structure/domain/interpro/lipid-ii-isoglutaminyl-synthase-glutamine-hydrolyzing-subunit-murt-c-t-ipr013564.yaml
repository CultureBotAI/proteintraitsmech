identifier: InterPro:IPR013564
label: "Lipid II isoglutaminyl synthase (glutamine-hydrolyzing) subunit MurT, C-terminal"
definition: >-
  This entry represents the C-terminal domain of MurT ligase mostly from bacteria. MurT is part of the bi-enzymatic complex MurT-GatD involved in the amidation of the α-carboxyl group of the D-isoglutamate residue in Lipid II in the peptidoglycan layer to produce D-isoglutamine. This domain contains an aspartate at position 349, the third residue in the catalytic triad GatD-C94, GatD-H189, MurT-D349. This C-terminal domain is built around a central six-stranded, predominantly parallel β-sheet between four α-helices on one side and two α-helices on the other. The MurT-GatD heterodimer adopts a boomerang-shaped conformation, with GatD packing against the C-terminal domain of MurT.
