identifier: InterPro:IPR049900
label: "Polyketide synthase, dehydratase domain"
definition: >-
  This entry represents the dehydratase domain (DH) found in polyketide synthases and related fatty acid synthases. This domain is associated with , representing the N-terminal and , representing the C-terminal. Structural analysis shows these DH domains are double hotdogs in which the active site contains a histidine from the N-terminal hotdog and an aspartate from the C-terminal hotdog. Studies have uncovered that a substrate tunnel formed between the DH domains may be essential for loading substrates and unloading products. Polyketide synthases (PKSs) are large, multifunctional enzyme complexes that catalyse the biosynthesis of diverse secondary metabolites known as polyketides. These enzymes operate in an assembly line-like manner, utilising multiple domains such as acyltransferase (AT) , and acyl carrier protein (ACP) to perform stepwise condensation of simple carboxylic acid units. PKSs can be classified into three main types: type I (modular), type II (iterative), and type III, each with distinct structural and functional characteristics. The modular type I PKSs, in particular, contain additional domains like ketoreductase (KR) , dehydratase (DH) , and enoylreductase (ER) that modify the growing polyketide chain.
