identifier: InterPro:IPR060060
label: "AF_0155, Rossmann-like domain"
definition: >-
  This entry represents a domain that covers most of the length of the sequence in AF_0155, an uncharacterised protein from Archaeoglobus fulgidus. This domain adopts a Rossmann-like fold, which is typically associated with nucleotide binding and is commonly found in dehydrogenases and other enzymes that utilise NAD or NADP cofactors. The specific function of this domain remains to be determined. This domain is also found at the C-terminal of putative 4Fe-4S ferredoxin bacterial proteins. AF_0155 is a 140 amino acid protein (gene AF_0155) from the hyperthermophilic, sulphate-reducing archaeon Archaeoglobus fulgidus. The protein is annotated as arCOG00296 and is found in archaeal species.
