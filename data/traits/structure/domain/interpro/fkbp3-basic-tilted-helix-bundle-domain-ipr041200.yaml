identifier: InterPro:IPR041200
label: "FKBP3, basic tilted helix bundle domain"
definition: >-
  This domain is found on the N-terminal region of peptidyl-prolyl cis-trans isomerase FKBP3 and in the core region of E3 ubiquitin ligase HectD1. It adopts a compact 5-helix bundle, hence termed BTHB (Basic Tilted Helix Bundle) domain. In FKBP3, it has been suggested to have a role in regulating the association state of nucleosomes by interacting with nucleolin. Moreover, this basic domain in FKBP35 forms alternative complexes with other chromatin-related proteins, such as the HDAC1, HDAC2, and the transcriptional regulator YY1, the DNA binding activity of which is enhanced on binding FKBP3. Structural analysis of this fold suggests that the DNA binding properties of FKBP3 and HectD1 are presented by the conserved basic region.
