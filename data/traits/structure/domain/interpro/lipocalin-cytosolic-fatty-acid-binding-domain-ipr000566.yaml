identifier: InterPro:IPR000566
label: "Lipocalin/cytosolic fatty-acid binding domain"
definition: >-
  This entry represents the lipocalin/cytosolic fatty-acid binding domain of a group of proteins that belong to the calycin superfamily. Proteins which transport small hydrophobic molecules such as steroids, bilins, retinoids, and lipids share limited regions of sequence homology and a common tertiary structure architecture. This is an eight stranded antiparallel β-barrel with a repeated + 1 topology enclosing a internal ligand binding site. The name 'lipocalin' has been proposed for this protein family, but cytosolic fatty-acid binding proteins are also included. The sequences of most members of the family, the core or kernal lipocalins, are characterised by three short conserved stretches of residues, while others, the outlier lipocalin group, share only one or two of these. Proteins known to belong to this family include alpha-1-microglobulin (protein HC); alpha-1-acid glycoprotein (orosomucoid); aphrodisin; apolipoprotein D; beta-lactoglobulin; complement component C8 gamma chain; crustacyanin; epididymal-retinoic acid binding protein (E-RABP); insectacyanin; odorant-binding protein (OBP); human pregnancy-associated endometrial alpha-2 globulin; probasin (PB), a rat prostatic protein; prostaglandin D synthase ( ); purpurin; Von Ebner's gland protein (VEGP); and lizard epididymal secretory protein IV (LESP IV).
