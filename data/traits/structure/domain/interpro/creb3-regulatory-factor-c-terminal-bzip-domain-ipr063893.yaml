identifier: InterPro:IPR063893
label: "CREB3 regulatory factor, C-terminal bZIP domain"
definition: >-
  This is the C-terminal region of human CREB3 regulatory factor (CREBRF), a negative regulator of the endoplasmic reticulum stress response or unfolded protein response. Members of this entry contain a basic region adjacent to a leucine zipper.
