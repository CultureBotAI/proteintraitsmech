identifier: InterPro:IPR030573
label: "Myotubularin-related protein 10, protein tyrosine phosphatase domain"
definition: >-
  The family of myotubularin (MTM) phosphoinositide phosphatases includes catalytically inactive members, or pseudophosphatases, which contain inactivating substitutions in the phosphatase domain. Myotubularin-related protein 10 (MTMR10) is a probable pseudophosphatase. This entry represents the inactive Protein Tyrosine Phosphatase (PTP) domain of MTMR10.
