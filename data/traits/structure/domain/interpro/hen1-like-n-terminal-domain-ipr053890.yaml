identifier: InterPro:IPR053890
label: "Hen1-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Hen1 from Capnocytophaga gingivalis and related proteins. This protein is a component of the bacterial RNA repair complex composed of three proteins: Pnkp1, Rnl and Hen1. This complex neutralises the damage inflicted by ribotoxins which is essential for cell survival. The Pnkp-Hen1 RNA repair complex carries out methylation of the 2'-OH group that is responsible for the RNA cleavage and thus the repaired RNA resists future RNA damage by the same ribotoxin. The N-terminal domain of Hen1 activates the ligase activity of Pnkp by locking the insertion domain of Pnkp into a conformation that allows access to the ligase pocket.
