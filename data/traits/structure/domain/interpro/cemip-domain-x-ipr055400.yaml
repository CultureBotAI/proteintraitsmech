identifier: InterPro:IPR055400
label: "CEMIP, domain X"
definition: >-
  This entry represents Domain X of CEMIP, CEMIP2 and closely related sequences. This domain is located after the β-helix domain. Proteins in this entry are involved in the metabolism of hyaluronic acid (HA) and mediate the depolymerization of high-molecular-weight HA into intermediate-sized fragments, a process crucial for various physiological functions, including the regulation of angiogenesis, heart development, and cell migration. This domain has been called domain X in, its function is still unknown.
