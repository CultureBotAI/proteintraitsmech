identifier: InterPro:IPR058421
label: "Protein of unknown function DUF8108, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of a family of uncharacterised proteins in archaea. Proteins in this family are typically around 100 to 300 amino acids in length. Many of these proteins are predicted to be integral membrane proteins, as suggested by the presence of multiple transmembrane helices in the central domain . This domain is predicted to be a zinc ribbon domain.
