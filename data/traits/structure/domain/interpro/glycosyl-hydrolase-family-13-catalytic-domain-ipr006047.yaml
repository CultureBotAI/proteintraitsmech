identifier: InterPro:IPR006047
label: Glycosyl hydrolase family 13, catalytic domain
definition: >-
  Enzymes containing this domain, such as alpha-amylase, belong to family 13 ( ) of the glycosyl hydrolases. The maltogenic alpha-amylase is an enzyme that catalyses the hydrolysis of (1-4)-alpha-D-glucosidic linkages in polysaccharides so as to remove successive alpha-maltose residues from the non-reducing ends of the chains in the conversion of starch to maltose. Other enzymes include neopullulanase, which hydrolyses pullulan to panose, and cyclomaltodextrinase, which hydrolyses cyclodextrins. This entry represents the catalytic domain found in several protein members of this family. It has a structure consisting of an 8-stranded α/β barrel that contains the active site, interrupted by a ~70 amino acid calcium-binding domain protruding between β-strand 3 and α-helix 3, and a carboxyl-terminal β-barrel domain. Family GH13 is the major glycoside hydrolase family acting on substrates containing α-glucoside linkages. GH13 contains hydrolases, transglycosidases, and isomerases; noticeably, animal amino acid transporters, which have no glycosidase activity, are also GH13 members. The enzymes are found in a very wide range of organisms from all kingdoms. The GH13 enzymes have a wide range of different preferred substrates and products. For example, the α-amylases prefer polysaccharides of the α-1,4-glucan type, such as amylose and amylopectin, but are also able to attack the supramolecular structures represented by starch granules and glycogen particles. Among thousands of sequences and ~30 different enzyme specificities many are closely related to each other; GH13 therefore has officially been subdivided into almost 40 subfamilies. In general, the GH13 members are multidomain proteins with catalytic (β/α)8-barrel (i.e. TIM-barrel) domain (called domain A) having a small doma…
