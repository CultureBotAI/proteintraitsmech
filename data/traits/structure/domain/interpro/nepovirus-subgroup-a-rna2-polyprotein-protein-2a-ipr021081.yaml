label: "Nepovirus subgroup A, RNA2 polyprotein, Protein 2A"
definition: >-
  This entry includes the N-terminal region of the RNA2 polyprotein, termed Protein 2A, which is implicated in the replication RNA2. This domain is normally found in association with , and . RNA2 from the subgroup A of these viruses encode the polyprotein P2, which includes Protein 2A, the cell-to-cell movement protein and the coat protein. Nepoviruses are plant viruses that, together with comoviruses and picornaviruses, are classified in the picornavirus superfamily of plus strand single-stranded RNA viruses. Its genome consist of two single-stranded RNAs, both required for infection.
