identifier: InterPro:IPR011079
label: "Alanine racemase, C-terminal"
definition: >-
  Alanine racemase ( ) plays a role in providing the D-alanine required for cell wall biosynthesis by isomerising L-alanine to D-alanine. The molecular structure of alanine racemase from Bacillus stearothermophilus (Geobacillus stearothermophilus) was determined by X-ray crystallography to a resolution of 1.9 A. The alanine racemase monomer is composed of two domains, an eight-stranded α/β barrel at the N terminus, and a C-terminal domain essentially composed of β-strand. This entry represents the C-terminal domain.
