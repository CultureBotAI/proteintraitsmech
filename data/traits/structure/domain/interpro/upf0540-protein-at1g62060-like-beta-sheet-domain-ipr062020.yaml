identifier: InterPro:IPR062020
label: "UPF0540 protein At1g62060-like, beta-sheet domain"
definition: >-
  This entry represents a β-sheet domain in UPF0540 proteins found in Arabidopsis thaliana. Family members are approximately 148-153 amino acid residues in length and contain N-terminal signal peptides. The proteins include At1g62000 ([swissprot:Q39168)], At1g62060 ( ), At1g62080 ( ), and At1g62220 ( ), which are clustered on chromosome 1. The proteins are predicted to localise to the apoplast and contain disordered regions at their C-terminal. The function of this protein domain remains to be determined.
