identifier: InterPro:IPR059878
label: "MJ1433, N-terminal helical domain"
definition: >-
  This entry represents the N-terminal helical domain of the uncharacterized protein MJ1433 from Methanocaldococcus jannaschii and related archaeal species. This protein contains two predicted transmembrane helices. This N-terminal helical domain is distinct from the helical domain at the C-terminal which is predicted to be cytoplasmic. The function of this protein and its N-terminal domain remains to be determined. This domain is also found in bacteria.
