identifier: InterPro:IPR034839
label: "Glycerophosphocholine phosphodiesterase GPCPD1, CBM20 domain"
definition: >-
  Glycerophosphocholine phosphodiesterase GPCPD1, also known as Prei4 or GDE5, selectively hydrolyzes glycerophosphocholine. It has an inhibitory role in skeletal muscle differentiation that is independent of its phosphodiesterase activity. This entry represents its N-terminal CBM20 (carbohydrate-binding module, family 20) domain.
