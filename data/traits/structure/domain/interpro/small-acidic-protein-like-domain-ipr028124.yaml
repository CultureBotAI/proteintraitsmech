identifier: InterPro:IPR028124
label: "Small acidic protein-like domain"
definition: >-
  This domain is found in eukaryotes, and is approximately 70 amino acids in length. It contains a single completely conserved residue G that may be functionally important. It is found in some uncharacterised proteins, including some described as small acidic protein.
