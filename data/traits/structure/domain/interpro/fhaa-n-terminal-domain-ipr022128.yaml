identifier: InterPro:IPR022128
label: "FhaA, N-terminal domain"
definition: >-
  This domain can be found at the N terminus of FHA domain-containing protein Fha from Mycobacterium tuberculosis. The FHA (Fork Head Associated) domain is a phosphopeptide-specific binding domain that enables the protein to specifically bind to sequences containing phosphothreonine. FhaA is one of the major substrates of Ser/Thr protein kinases (STPK) and plays a role in the regulation of cell growth and peptidoglycan synthesis by binding to MviN. It may inhibit the late stages of peptidoglycan synthesis.
