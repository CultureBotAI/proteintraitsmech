identifier: InterPro:IPR056242
label: "TASOR, PIN domain"
definition: >-
  This is a domain found in TASOR proteins, a key component of the HUSH complex, a vertebrate-specific multiprotein complex that mediates epigenetic repression of both exogenous and endogenous genetic elements. The HUSH complex regulates H3K9me3 deposition by promoting recruitment of SETDB1 and also recruits MORC2 to compact chromatin. TASOR is crucial in early embryonic development and contains a catalytically-inactive PARP domain, necessary for epigenetic regulation of target elements. This entry represents a PIN domain found towards the C terminus of TASOR and TASOR2 and shares detectable similarity to the PIN domain of SMG5.
