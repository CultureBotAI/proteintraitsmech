identifier: InterPro:IPR003736
label: "Phenylacetic acid degradation-related domain"
definition: >-
  This domain is found in the PAAI protein from Escherichia coli that may be involved in phenylacetic acid degradation and in a few others that may be transcription regulators. Most proteins containing this domain consist almost entirely of a single copy of this domain. A protein from Caenorhabditis elegans consists of two tandem copies of the domain. The domain is also found as the N-terminal region of an apparent initiation factor eIF-2B alpha subunit of Aquifex aeolicus.
