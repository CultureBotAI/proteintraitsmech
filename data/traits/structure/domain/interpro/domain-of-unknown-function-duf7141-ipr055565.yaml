identifier: InterPro:IPR055565
label: "Domain of unknown function DUF7141"
definition: >-
  This domain is found in uncharacterised proteins mainly from Fungi. These proteins are likely involved in chromatin remodelling. The domain represented by this entry is predicted to fold into a globular structure with significant similarity to chromo domain (Pfam:PF00385).
