identifier: InterPro:IPR040917
label: "RalF, C-terminal Sec-7 capping domain"
definition: >-
  This is the C-terminal domain of RalF protein present in Legionella pneumophilia. RalF is secreted into host cytosol via the Dot/Icm type IV transporter where it acts to recruit ADP-ribosylation factor (Arf) to pathogen-containing phagosomes in the establishment of a replicative organelle. This domain forms a cap over the active site in the Sec7 domain and so is referred to as the Sec7-capping domain.
