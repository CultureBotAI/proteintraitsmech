identifier: InterPro:IPR008197
label: WAP-type 'four-disulfide core' domain
definition: >-
  The four-disulfide core (4-DSC) or WAP domain comprises eight cysteine residues involved in disulfide bonds in a conserved arrangement. The four disulphide core containing Whey Acidic Proteins (WAP) are the major whey proteins in the milk of many mammals and are considered to be the prototypic members of the family. However the WAP domain is not exclusive to WAP proteins, but it is found in many other proteins, a number of which have been shown to exhibit antiproteinase function. One or more of the WAP domains occur in the WDNM1 protein, which is involved in the metastatic potential of adenocarcinomas in rats; Kallmann syndrome protein; caltrin-like protein II from guinea pig, which inhibits calcium transport into spermatozoa; elafin, a serine elastase inhibitor which belongs to MEROPS inhibitor family I17; and papilin, a metalloendopeptidase inhibitor which belongs to MEROPS inhibitor family I2 and is effective against procollagen N-proteinase.
