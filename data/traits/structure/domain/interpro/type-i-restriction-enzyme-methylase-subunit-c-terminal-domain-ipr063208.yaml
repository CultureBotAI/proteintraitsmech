identifier: InterPro:IPR063208
label: "Type I restriction enzyme methylase subunit, C-terminal domain"
definition: >-
  This entry represents a small C-terminal helical domain of the methylase (M) subunit of type I restriction-modification systems. It follows the N-terminal HsdM_N domain ( ) and the central N6_Mtase catalytic domain ( ). The M subunit combines with the specificity (S) subunit to form a methyltrans- ferase with M(2)S(1) stoichiometry that methylates adenine residues in specific DNA sequences. In the presence of the restriction (R) subunit, the complex can also act as an endonuclease. The family is found in Pseudomonadota, including Enterobacterales and Pseudomonadales. The specific function of this C-terminal domain remains to be determined.
