identifier: InterPro:IPR028643
label: "Inhibitor of growth protein 1, PHD-type zinc finger"
definition: >-
  Members of the ING (inhibitor of growth protein) family of tumour suppressors regulate cell cycle progression, apoptosis, and DNA repair as important cofactors of p53. Inhibitor of growth protein 1 (ING1) is the best characterised member of this family of five genes (ING1-5) with conserved plant homeodomains (PHDs). ING1 interacts with proliferating cell nuclear antigen (PCNA) and PCNA-interacting protein p15 (PAF). p53 and ING1 have been shown to functionally cooperate in the activation of apoptosis. ING1 could also induce apoptosis by translocation from the nucleus to the mitochondria where interaction with BAX stabilises this protein, promoting its pro-apoptotic function. ING1 functions in DNA demethylation and has a role in the early steps of multiple DNA repair pathways. This entry represents the C-terminal plant homeodomain (PHD)-type zinc-finger domain of ING1.
