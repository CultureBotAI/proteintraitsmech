identifier: InterPro:IPR004215
label: "Prokaryotic glutathione synthetase, N-terminal"
definition: >-
  Prokaryotic glutathione synthetase (glutathione synthase) catalyses the conversion of gamma-L-glutamyl-L-cysteine and glycine to orthophosphate and glutathione in the presence of ATP. This is the second step in glutathione biosynthesis. The enzyme is inhibited by 7,8-dihydrofolate, methotrexate and trimethoprim. This domain is the N terminus of the enzyme.
