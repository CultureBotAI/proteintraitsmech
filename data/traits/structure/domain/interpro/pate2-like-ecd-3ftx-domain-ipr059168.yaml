identifier: InterPro:IPR059168
label: "PATE2-like, ECD 3FTx domain"
definition: >-
  This entry represents the extracellular domain (ECD) in Prostate and testis expressed protein 2 (PATE2). PATE2 is a member of the prostate and testis expression (PATE)-like family of proteins that likely play important roles in reproductive and neuronal physiology. This domain belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This domain is also found in PATE13. PATE proteins are secreted, small, cysteine-rich proteins selectively expressed in male reproductive tissues involved in sperm-oolemma fusion and penetration (prostate, testis, epididymis, seminal vesicle), but not sperm-zona binding. These proteins include 10 cysteine residues conforms to a consensus cysteine pattern found in a well-conserved large family of three-fingered proteins (TFPs), characterised by a distinct disulfide bonding pattern between 8 and 10 cysteine residues. Critical roles of the PATE (Pate)-like proteins in activities related not only to fertility and reproduction but also to neuronal activity. Neurons and sperm share many common "neuron specific" receptors. Nicotinic acetylcholine receptors (nACHR) subunits alpha7, 9, 3, 5 and beta 4 have all been demonstrated to be present in human sperm and the alpha-7 subunit likely exists as a homomer in the posterior post-acrosomal and neck regions of sperm. Human acrosome reaction initiated by acetylcholine involves the alpha-7 nAChR. Common functionality of nAChR in both reproductive and neuronal tissues thus reconciles the neuro-modulatory activity of the PATE (Pate)-like proteins.
