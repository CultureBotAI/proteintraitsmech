identifier: InterPro:IPR054218
label: "Domain of unknown function DUF6938"
definition: >-
  This domain is found C-terminal in a family of uncharacterised proteins mainly from bacteria. This domain has a significant sequence similarity to the C-terminal domains of a number of proteins members of UDP-Glycosyltransferase/glycogen phosphorylase superfamily. It is predicted to adopt the same α/β structure.
