identifier: InterPro:IPR035008
label: "hnRNP-L, RNA recognition motif 2"
definition: >-
  This entry represents the RNA recognition motif 2 (RRM2) of hnRNP-L. hnRNP-L is a subunit of the KMT3a (also known as HYPB or hSet2) complex required for histone H3 Lys-36 trimethylation activity and which is found only in higher eukaryotes. It plays both nuclear and cytoplasmic roles in pre-mRNA processing, mRNA export of intronless genes, internal ribosomal entry site-mediated translation, and chromatin modification. hnRNP-L is an RNA-binding protein with four RNA recognition motifs (RRMs).
