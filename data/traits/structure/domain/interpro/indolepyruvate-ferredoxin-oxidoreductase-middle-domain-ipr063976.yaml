identifier: InterPro:IPR063976
label: "Indolepyruvate ferredoxin oxidoreductase, middle domain"
definition: >-
  This entry represents a middle domain found in indolepyruvate ferredoxin oxidoreductases and related pyruvate ferredoxin/flavodoxin oxidoreductases particularly from proteobacteria, including Indolepyruvate oxidoreductase subunit IorA from Methanothermobacter marburgensis. This domain follows an N-terminal domain and precedes TPP_enzyme_C ( ), and/or POR ( ) and DUF6537 ( ) domains. These enzymes catalyse the oxidative decarboxylation of 2-oxoacids coupled to ferredoxin or flavodoxin reduction. They are predicted to have structural similarity to XFP_C ( ).
