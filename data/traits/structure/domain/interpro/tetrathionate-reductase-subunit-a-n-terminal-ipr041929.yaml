identifier: InterPro:IPR041929
label: "Tetrathionate reductase subunit A, N-terminal"
definition: >-
  This entry represents the N-terminal domain found in tetrathionate reductase subunit A (TtrA) and other related proteins. The Salmonella enterica tetrathionate reductase catalyses the reduction of trithionate but not sulfur or thiosulfate. TtrA belongs to the molybdopterin-binding superfamily of proteins.
