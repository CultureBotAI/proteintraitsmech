identifier: InterPro:IPR048325
label: "ZSWIM3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of ZSWIM3, a ZSWIM-type zinc finger domain containing protein whose function is not yet known. This domain appears to be related to the WRKY-like DNA-binding domains.
