identifier: InterPro:IPR029190
label: "Ribosomal RNA-processing protein 14/surfeit locus protein 6, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the ribosomal RNA-processing protein 14 (Rrp14), which shares protein sequence similarity with surfeit locus protein 6 (SURF6). In mammals, SURF6 is a component of the nucleolar matrix and has a strong binding capacity for nucleic acids. SURF6 is always found in the nucleolus regardless of the phase of the cell cycle suggesting that it is a structural protein constitutively present in nucleolar substructures. A role in rRNA processing has been proposed for this protein.
