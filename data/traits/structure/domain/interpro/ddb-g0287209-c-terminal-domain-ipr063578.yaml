identifier: InterPro:IPR063578
label: "DDB_G0287209, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of transmembrane domain-containing protein DDB_G0287209 from Dictyostelium discoideum. This domain is found in the social amoeba and similar proteins, and contains multiple transmembrane helical regions. The full-length protein is predicted to be a multi-pass membrane protein localised to cellular membranes. The protein contains coiled-coil regions and low complexity regions. The specific function of this domain remains to be determined.
