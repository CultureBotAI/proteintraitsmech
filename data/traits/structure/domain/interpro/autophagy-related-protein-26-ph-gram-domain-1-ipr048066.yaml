identifier: InterPro:IPR048066
label: "Autophagy-related protein 26, PH-GRAM domain 1"
definition: >-
  This entry represents the first PH-GRAM domain present in Sterol 3-beta-glucosyltransferase from Saccharomyces cerevisiae (also known as Autophagy-related protein 26, ATG26) and similar fungal proteins. ATG26 (also called UGT51/UDP-glycosyltransferase 51), a member of the glycosyltransferase 28 family, is responsible for the biosynthesis of sterol glucoside. It is necessary for the degradation of medium peroxisomes. ATG26 contains 2 GRAM domains. They share little sequence conservation, but all have a common fold. GRAM domains are similar to Pleckstrin homology (PH) domains. GRAM and PH domains are often involved in targeting proteins to the plasma membrane, some of them display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N terminus of the domain. GRAM and PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes.
