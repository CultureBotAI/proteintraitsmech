label: "Domain of unknown function DUF2241"
definition: >-
  This entry represents a domain of unknown function frequently found at the N-terminal end of a group of proteins mainly from bacteria and fungi. Its structure is similar to the ACT domain which suggests that it might bind to amino acids and regulate other protein activity.
