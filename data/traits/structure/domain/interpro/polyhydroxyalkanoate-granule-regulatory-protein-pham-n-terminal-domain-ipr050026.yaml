identifier: InterPro:IPR050026
label: "Polyhydroxyalkanoate granule regulatory protein PhaM, N-terminal domain"
definition: >-
  This entry represents PhaM and related proteins from betaproteobacteria. PhaM was identified in Ralstonia eutropha (also known as Cupriavidus necator) as a multifunctional protein, found as part of poly(3-hydroxybutyrate) granules, a type of polyhydroxyalkanoate (PHA) storage granule, able to bind the PHA synthase PhaC, but also shown to have DNA-binding activity. This domain occurs in PhaM, near the N terminus, and in additional homologs, some no longer than the domain itself.
