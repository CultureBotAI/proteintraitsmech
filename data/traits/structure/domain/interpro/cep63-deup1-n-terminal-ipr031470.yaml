identifier: InterPro:IPR031470
label: "CEP63/Deup1, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the human centrosomal protein 63 kDa (Cep63), its paralogue Deuterosome assembly protein 1 (Deup1). CEP63 and Deup1 are both involved in centriole amplification. While CEP63 mediates mother-centriole-dependent centriole duplication, Deup1 mediates de novo centriole amplification in multiciliated cells.
