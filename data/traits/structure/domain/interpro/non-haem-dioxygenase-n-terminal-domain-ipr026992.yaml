identifier: InterPro:IPR026992
label: "Non-haem dioxygenase, N-terminal domain"
definition: >-
  This is the highly conserved N-terminal region of proteins with 2-oxoglutarate/Fe(II)-dependent dioxygenase activity. It is also found in Isopenicillin N synthase, 1-aminocyclopropane-1-carboxylate oxidase, Gibberellin oxidases and dioxygenases and other related proteins.
