identifier: InterPro:IPR062098
label: "Flightin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of flightin, a myofibrillar protein found in Drosophila stretch-activated muscles. The full-length flightin protein is involved in the regulation of flight muscle contraction, possibly by modulating actin-myosin interaction. The protein is found only in indirect flight muscles and is expressed in late pupal and adult stages. Flightin localises to the A band of striated muscle myosin thick filaments and functions as a structural constituent of muscle with elasticity properties. The N-terminal domain contains disordered regions and acidic residues. The full-length protein undergoes post-translational modifications, possibly by phosphorylation. The specific function of this N-terminal domain remains to be determined. This entry also includes the N-terminal in Paramyosin from Drosophila.
