identifier: InterPro:IPR056300
label: "Alpha-amylase SusG-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in the starch utilisation system protein G (SusG) from bacteria. SusG forms part of the SusDEFG lipoprotein complex tethered to the outer surface of the cell and is involved in starch hydrolysis and subsequent utilisation of the resulting sugars as an energy source. SusG has been shown to have enzymatic starch-hydrolysing activity. This entry also represents the C-terminal domain of other oligo-1,6-glucosidases, such as the trehalose-6-phosphate hydrolase TreA, Palatinase (PalQ) and Oligo-1,6-glucosidase 1 (MalL) from bacteria. The function of this domain is unknown.
