identifier: InterPro:IPR058974
label: "BanI/HgiCI, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in P subtype restriction enzyme BanI, Type II restriction enzyme HgiCI and similar bacterial proteins. P subtype restriction enzyme BanI and Type II restriction enzyme HgiCl recognise the double-stranded sequence 5'-GGYRCC-3' and cleave after G-1. They contain an N-terminal represented by and a C-terminal represented by .
