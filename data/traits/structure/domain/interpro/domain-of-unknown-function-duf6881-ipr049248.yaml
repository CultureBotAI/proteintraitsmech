identifier: InterPro:IPR049248
label: "Domain of unknown function DUF6881"
definition: >-
  This entry represents a domain found in small bacterial proteins of unknown function. Its predicted structure shows a 6 stranded β-sheet with a C-terminal helix packed on one side. In a few proteins this domain is associated with InterPro: , a presumed immunity protein, which could suggest this domain may have a toxin function or be involved in a toxin/antitoxin system or in phage defence.
