identifier: InterPro:IPR058035
label: "BigA/YdbA-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal 8-stranded β-barrel domain found in the BigA family of bacterial virulence proteins and related proteins such as YdbA from Escherichia coli. This domain is located N-terminal to the repetitive region in BigA proteins and is part of the passenger domain that is transported through the C-terminal autotransporter barrel. While the BigA protein has been implicated in bacterial virulence, the specific function of this N-terminal domain remains to be determined. BigA is an autotransporter protein characterised by a C-terminal outer membrane barrel ( ) that facilitates the transport of its passenger domain across the membrane. The N-terminal region contains a variable passenger domain, which is translocated through the barrel. After export, the passenger domain may undergo auto-catalytic cleavage, cleavage by an external protease, or remain uncleaved, depending on the specific protein.
