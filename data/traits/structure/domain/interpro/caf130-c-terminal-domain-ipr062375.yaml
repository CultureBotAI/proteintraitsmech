identifier: InterPro:IPR062375
label: "CAF130, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of protein CAF130, a component of the CCR4-NOT core complex found in fungi. CAF130 acts as a component of the CCR4-NOT core complex, which functions as a general transcription factor in the nucleus and as the major mRNA deadenylase involved in mRNA turnover in the cytoplasm. Within the CCR4-NOT complex, CAF130 interacts with NOT1. The specific function of this C-terminal domain remains to be determined.
