identifier: InterPro:IPR032679
label: "Sin1, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Sin1 (stress-activated map kinase interacting 1). Sin1 homologue from mammals, MAPKAP1, is part of the Target Of Rapamycin Complex 2 (TORC2) complex that plays an essential role in signal transduction.
