identifier: InterPro:IPR044113
label: "DDX41, DEAD-box helicase domain"
definition: >-
  DDX41 interacts with several spliceosomal proteins and may recognise the bacterial second messengers cyclic di-GMP and cyclic di-AMP, resulting in the induction of genes involved in the innate immune response. DDX41 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. Mutations of the DDX41 gene cause myeloproliferative/lymphoproliferative neoplasms, familial (MPLPF). This entry represents the DEAD-box domain of DDX41. It contains the ATP-binding region.
