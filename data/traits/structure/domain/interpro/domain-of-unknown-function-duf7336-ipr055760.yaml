identifier: InterPro:IPR055760
label: "Domain of unknown function DUF7336"
definition: >-
  This entry represents a family of uncharacterised domains found in a variety of phage and bacterial genomes. Structure prediction suggests the domain is composed of a small β sheet of three strands and an α helix. There is some evidence from prediction that these domains might form a dimeric arrangement.
