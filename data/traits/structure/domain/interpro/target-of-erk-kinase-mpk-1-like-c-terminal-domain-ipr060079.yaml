identifier: InterPro:IPR060079
label: "Target of ERK kinase mpk-1-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the target of ERK kinase mpk-1 (TOE-2) from Caenorhabditis elegans and its homologues from mammals DEP domain-containing protein 7 (DEPD7) and similar animal proteins. In TOE-2, this domain is required for localisation to the cell cortex and cleavage during cell division. The domain contains putative MAPK docking sites and intervening sequences. TOE-2 is involved in promoting asymmetric cell division and fate assignment in the Q neuroblast lineage, functioning as a downstream target of MAP kinase mpk-1. The full-length protein contains a DEP domain and localises to multiple cellular compartments, including cytoplasm, nucleus, centrosomes and the midbody. TOE-2 is a downstream target of MAP kinase mpk-1.
