identifier: InterPro:IPR048794
label: "Structural protein 2, C-terminal domain"
definition: >-
  This entry represents the third domain, also known as P-domain, of structural protein 2 (PORF2) of the hepatitis E virus. This domain adopts a β-barrel structure ( ). The high basic amino acid content of this protein has lead to the suggestion of a role in viral genomic RNA encapsidation.
