identifier: InterPro:IPR061938
label: "Cyclic 2,3-diphosphoglycerate synthetase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of cyclic 2,3-diphosphoglycerate synthetase (cDPGS, ). The full-length enzyme catalyses the formation of cyclic 2,3-diphosphoglycerate by formation of an intramolecular phosphoanhydride bond. The function of this domain remains to be determined.
