identifier: InterPro:IPR057170
label: "Domain of unknown function DUF7848"
definition: >-
  This entry represents a likely zinc binding domain that according to structural modelling may form homodimers. The domain is primarily found in actinobacteria as well as a small range of bacteriophage. The function of this domain is unknown.
