identifier: InterPro:IPR055744
label: "Domain of unknown function DUF7320"
definition: >-
  This entry represents an uncharacterised protein found in T4-like bacteriophages. It is found between the cd and pseT genes in the T4 phage genome. The function of this protein is unknown. Structure prediction suggests these proteins have a compact fold composed of five β strands and an α helix.
