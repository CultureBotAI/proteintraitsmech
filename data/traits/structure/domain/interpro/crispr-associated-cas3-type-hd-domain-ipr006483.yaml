identifier: InterPro:IPR006483
label: "CRISPR-associated Cas3-type, HD domain"
definition: >-
  This entry represents the HD domain, which is found in a number of Cas proteins that tend to be found near CRISPR repeats. These domains can be found either separately or as the N-terminal region of Cas3, the helicase-containing CRISPR-associated protein. CRISPR loci appear to be mobile elements with a wide host range. The Cas3-type HD domain has nuclease activity against ssDNA and ssRNA. The CRISPR-Cas system is a prokaryotic defence mechanism against foreign genetic elements. The key elements of this defence system are the Cas proteins and the CRISPR RNA.
