identifier: InterPro:IPR007296
label: "Rv2567-like, DUF403"
definition: >-
  This domain is found at the C-terminal of the uncharacterised protein Rv2567 from Mycobacterium tuberculosis and similar bacterial sequences. It is predicted to be α-helical and contains a conserved ER motif. In many members of this group this domain covers the whole length of the protein.
