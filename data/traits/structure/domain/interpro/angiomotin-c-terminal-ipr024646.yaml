identifier: InterPro:IPR024646
label: "Angiomotin, C-terminal"
definition: >-
  This domain represents the C-terminal region of angiomotin. Angiomotin regulates the action of angiogenesis-inhibitor angiostatin. The C-terminal region of angiomotin appears to be involved in directing the protein chemotactically.
