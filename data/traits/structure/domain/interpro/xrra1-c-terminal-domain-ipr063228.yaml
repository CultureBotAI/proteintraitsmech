identifier: InterPro:IPR063228
label: "XRRA1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of X-ray radiation resistance-associated protein 1 (XRRA1). XRRA1 may be involved in the cellular response to X-ray radiation and is localised to both the cytoplasm and nucleus. The protein is expressed predominantly in testis and is induced by X-ray irradiation. The C-terminal domain spans approximately 110 amino acids and contains a predicted coiled-coil region. This domain is found in vertebrates and the function of this specific domain remains to be determined.
