identifier: InterPro:IPR054719
label: "Tubulin-like protein TubZ-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TubZ from Bacillus thuringiensis and similar proteins from firmicutes. The structure of TubZ consists of an N-terminal GTPase domain and a C-terminal domain. TubZ is part of the polymerising cytomotive filament, a complex that drives newly replicated plasmids to opposite ends of the dividing cell.
