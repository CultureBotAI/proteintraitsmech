identifier: InterPro:IPR037437
label: "Sorting nexin-13, PX domain"
definition: >-
  SNX13, also called RGS-PX1 or sorting nexin-13, contains an N-terminal PXA domain, a regulator of G protein signaling (RGS) domain, a PX domain, and a C-terminal PXC domain. It specifically binds to the stimulatory subunit of the heterotrimeric G protein G(alpha)s, serving as its GTPase activating protein, through the RGS domain. It is involved in development and regulation of endocytosis dynamics. It influences the lysosomal targeting of the epidermal growth factor receptor, suggesting a role both in cell signaling and receptor trafficking. This entry represents the PX domain of SNX13. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions.
