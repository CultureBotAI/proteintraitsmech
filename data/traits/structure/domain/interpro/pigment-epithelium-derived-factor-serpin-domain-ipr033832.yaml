identifier: InterPro:IPR033832
label: Pigment epithelium derived factor, serpin domain
definition: >-
  Pigment epithelium-derived factor (PEDF) is a non-inhibitory member of the Serpin superfamily (MEROPS family I4; MEROPS identifier I04.979). It exhibits neurotrophic, neuroprotective and antiangiogenic properties and is widely expressed in the developing and adult nervous systems. This subgroup corresponds to clade F1 of the serpin superfamily.
