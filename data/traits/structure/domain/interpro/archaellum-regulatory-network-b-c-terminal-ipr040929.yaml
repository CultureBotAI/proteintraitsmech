identifier: InterPro:IPR040929
label: "Archaellum regulatory network B, C-terminal"
definition: >-
  This is the C-terminal domain found in archeal proteins that carry a von Willebrand factor type A domain such as ArnB from Sulfolobus acidocaldarius. ArnB is involved in negative regulation of the archaellum (former: archaeal flagellum), and the C-terminal domain is phosphorylated by ArnC and ArnD on serine and threonine residues affecting docking of ArnA.
