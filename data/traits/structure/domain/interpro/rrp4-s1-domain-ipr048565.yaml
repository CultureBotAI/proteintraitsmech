identifier: InterPro:IPR048565
label: "RRP4, S1 domain"
definition: >-
  Exosome complex component RRP4 is a non-catalytic component of the RNA exosome complex which has 3'->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. It consists of an N-terminal β-sandwich hybrid domain ( ), a central S1 domain and a C-terminal KH domain ( ). This entry represents the S1 RNA binding domain, which has an OB fold. The exosome plays a central role in 3' to 5' RNA processing and degradation in eukaryotes and archaea. Its functions include the removal of incorrectly processed RNA and the maintenance of proper levels of mRNA, rRNA and a number of small RNA species. In Saccharomyces cerevisiae, the exosome includes nine core components, six of which are homologous to bacterial RNase PH. These form a hexameric ring structure. The other three subunits (RrP4, Rrp40, and Csl4) contain an S1 RNA binding domain and are part of the 'S1 pore structure'.
