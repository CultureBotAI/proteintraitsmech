identifier: InterPro:IPR057028
label: "Rho GTPase-activating protein 29/45, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal end of Rho GTPase-activating protein 29 (RHG29) and 45 (RHG45, also known as HMHA1). These proteins are GTPase activators for the Rho-type GTPases. HMHA1 may be able to negatively regulate the actin cytoskeleton as well as cell spreading.
