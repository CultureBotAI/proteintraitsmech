identifier: InterPro:IPR062158
label: "Uncharacterised protein BU584, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of uncharacterised protein BU584 (also known as yba3), found in Gamma- and Alphaproteobacteria. The function of this domain remains to be determined. Structure prediction suggests this domain is similar to the EspG domain .
