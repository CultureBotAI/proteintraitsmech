identifier: InterPro:IPR059109
label: "Apolipoprotein N-acyltransferase, integral membrane domain, campylobacterales"
definition: >-
  This entry represents the N-terminal integral membrane domain of the Lnt proteins predominately found in Campylobacterales. This domain contains seven transmembrane α helices. Apolipoprotein N-acyltransferase (Lnt) proteins predominately found in Campylobacterales are responsible for catalysing the phospholipid-dependent N-acylation of the N-terminal cysteine of apolipoproteins. This enzymatic activity represents the final step in the maturation of lipoproteins, a crucial process for their proper function. The proteins in this family contain a CN hydrolase domain at the C-terminal, specifically the Apolipoprotein N-acyltransferase subfamily. This function is essential for the structural and functional integrity of lipoproteins, which play a vital role in lipid transport and metabolism.
