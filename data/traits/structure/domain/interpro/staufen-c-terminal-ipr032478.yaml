identifier: InterPro:IPR032478
label: "Staufen, C-terminal"
definition: >-
  This is the C-terminal domain of Staufen proteins. It consists of an N-terminal Staufen-swapping motif (SSM) comprising two α-helices, connected by a linker region to a dsRNA-binding-like domain ('RBD'). The 'RBD' has the fold of a functional dsRNA-binding domain, but lacks the residues required to bind RNA. This domain is responsible for dimerisation, the SSM from one molecule interacts with the 'RBD' of another.
