identifier: InterPro:IPR063399
label: "YDR249C, N-terminal domain"
definition: >-
  This entry represents a small N-terminal domain of approximately 33 residues found in uncharacterised proteins from fungi. The domain shows similarity to F-box domain-containing proteins based on sequence analysis. YDR249C is an uncharacterised protein from Saccharomyces cerevisiae with no experimentally determined function. The specific function of this N-terminal domain remains to be determined.
