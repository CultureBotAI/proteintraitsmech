identifier: InterPro:IPR007741
label: "Ribosomal protein/NADH dehydrogenase domain"
definition: >-
  Proteins containing this domain are located in the mitochondrion and include large ribosomal subunit protein mL43 (known as MRPL51) and mL61 (MRP49), and small ribosomal subunit protein mS25 (S25). This domain is also found in mitochondrial NADH-ubiquinone oxidoreductase B8 subunit (CI-B8) . It is not known whether all members of this family form part of the NADH-ubiquinone oxidoreductase and whether they are also all ribosomal proteins.
