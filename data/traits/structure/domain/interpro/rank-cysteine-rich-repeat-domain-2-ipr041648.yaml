identifier: InterPro:IPR041648
label: "Rank, cysteine-rich repeat domain 2"
definition: >-
  This domain is found in the receptor activator of the NF-KB (RANK) present in Mus musculus. RANK and its cognate ligand RANKL play a role in bone remodelling, immune function and mammary gland development in conjunction with various cytokines and hormones. The binding of RANKL to RANK causes trimerisation of the receptor, which activates the signalling pathway and results in osteoclastogenesis from progenitor cells and the activation of mature osteoclasts receptor activator of the NF-KB. This domain is the second of four cysteine rich pseudo-repeat domains (CRDs) and so is known as CRD2. RANK moves via a hinge region between CRD2 and CRD3 to make close contact with RANKL.
