identifier: InterPro:IPR033913
label: "MTH1175 domain"
definition: >-
  This entry represents a domain found in MTH1175. MTH1175 is an uncharacterised conserved protein belonging to a family of iron-molybdenum cluster-binding proteins that includes NifX, NifB, and NifY, all of which are involved in the synthesis of an iron-molybdenum cofactor (FeMo-co) that binds the active site of the dinitrogenase enzyme. This domain is a predicted small-molecule-binding domain (SMBD) with an α/β fold that is present either as a stand-alone domain (e.g. NifX and NifY) or fused to another conserved domain (e.g., NifB); however, its function is still undetermined. The SCOP database suggests that this domain is most similar to structures within the ribonuclease H superfamily. This conserved domain is represented in two of the three major divisions of life (bacteria and archaea).
