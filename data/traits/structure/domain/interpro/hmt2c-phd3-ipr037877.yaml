identifier: InterPro:IPR037877
label: "HMT2C, PHD3"
definition: >-
  Histone-lysine N-methyltransferases 2C (KMT2C, also known as MLL3 or homologous to ALR protein) methylates 'Lys-4' of histone H3 (H3 'Lys-4' methylation represents a specific tag for epigenetic transcriptional activation). It is a component of the MLL2/3 complex, which is essential for p53 transactivation of small heterodimer partner (SHP). KMT2C functions as a circadian factor contributing to genome-scale circadian transcription. KMT2C is also a part of activating signal cointegrator-2 (ASC-2)-containing complex (ASCOM) that contains the transcriptional coactivator nuclear receptor coactivator 6 (NCOA6), KMT2C and its paralog MLL4. The ASCOM complex is critical for nuclear receptor (NR) activation of bile acid transporter genes and is down regulated in cholestasis. KMT2C contains several plant homeodomain (PHD) fingers, two extended PHD (ePHD) fingers, a high mobility group (HMG)-1 box, a SET domain and two FY (phenylalanine tyrosine)-rich domains. This entry represents the third PHD finger of KMT2C proteins.
