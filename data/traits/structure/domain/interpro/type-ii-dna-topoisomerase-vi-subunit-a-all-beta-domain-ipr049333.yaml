identifier: InterPro:IPR049333
label: "Type II DNA topoisomerase VI subunit A, all-beta domain"
definition: >-
  In all organisms, type II DNA topoisomerases are essential for untangling chromosomal DNA. The archaeal type II protein is termed DNA topoisomerase VI. This entry represents an all-β domain found in these proteins.
