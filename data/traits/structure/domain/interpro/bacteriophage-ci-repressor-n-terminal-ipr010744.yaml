identifier: InterPro:IPR010744
label: "Bacteriophage CI repressor, N-terminal"
definition: >-
  The bacteriophage lambda cI repressor is a part of a phage molecular switch which transforms the phage from lysogenic to lytic growth. The CI repressor from Enterobacteria phage phi80 is known to function as a transcriptional switch, determining whether transcription is lytic or lysogenic. It contains two domains connected by a flexible "hinge" region with a cleavage site. This entry represents the N-terminal domain of the CI repressor, which is involved in DNA binding.
