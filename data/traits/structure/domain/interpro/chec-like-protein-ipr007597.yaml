identifier: InterPro:IPR007597
label: "CheC-like protein"
definition: >-
  The precise function of these proteins is unclear, but some of them are involved in flagella motor switch. The region represented in this entry is found in the CheC, CheX, CheA and FliY proteins. In some cases, this region is repeated in multiple copies.
