identifier: InterPro:IPR054771
label: "Minor fimbrium tip subunit MfA4, C-terminal"
definition: >-
  This domain is found at the C-terminal of Minor fimbrium tip subunit MfA4 from Porphyromonas gingivalis and similar sequences mainly found in bacteroidales. MfA4 is involved in biofilm formation, adhesion onto host cells and onto other bacteria that are part of the oral microbiome. This domain adopts a transthyretin-like fold that contains seven core β-strands arranged in two β-sheets.
