identifier: InterPro:IPR041602
label: "Quercetin 2,3-dioxygenase, C-terminal cupin domain"
definition: >-
  This entry represents the C-terminal domain of quercetin 2,3-dioxygenase (also known as quercetinase), such as the YhhW protein from E. coli. This is one of the two cupin domains that make up the protein. Proteins containing this domain also include the Pirin-like protein, YhaK, from E. coli.
