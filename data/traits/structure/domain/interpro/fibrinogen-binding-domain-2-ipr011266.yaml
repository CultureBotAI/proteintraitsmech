identifier: InterPro:IPR011266
label: Fibrinogen-binding domain 2
definition: >-
  This entry represents the fibrinogen-binding domain from bacterial proteins such as fibrinogen-binding adhesion SdrG and clumping factor A. In both SdrG and clumping factor A, there are two fibrinogen-binding domains with similar core β-sandwich topologies, but with different modulations in their structure. This entry represents the second domain, while represents the first domain.
