identifier: InterPro:IPR047941
label: "ArhGAP19, RhoGAP domain"
definition: >-
  This entry represents the RhoGAP (Rho-like GTPase-activator) domain of Rho GTPase-activating protein 19 (ArhGAP19) and similar proteins mainly found in vertebrates. In mice, a possible role of ArhGAP19 has been described in the regulation of the uterine endometrial epithelium and implantation. Small GTPases cluster into distinct families, and all act as molecular switches, active in their GTP-bound form but inactive when GDP-bound. The Rho family of GTPases activates effectors involved in a wide variety of developmental processes, including regulation of cytoskeleton formation, cell proliferation and the JNK signalling pathway. GTPases generally have a low intrinsic GTPase hydrolytic activity but there are family-specific groups of GAPs that enhance the rate of GTP hydrolysis by several orders of magnitude.
