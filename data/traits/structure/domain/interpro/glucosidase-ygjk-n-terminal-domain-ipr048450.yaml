identifier: InterPro:IPR048450
label: "Glucosidase YgjK, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Glucosidase YgjK from Escherichia coli and similar bacterial enzymes from the glycoside hydrolase family 63 (GH63). YgjK is organised into N- and A- domains and a linker that connects them. This entry includes the N-domain and the linker region. The N-domain is composed of 18 antiparallel β-strands divided into two β-sheets and is classified as a super-β-sandwich. The linker is composed of two α-helices and produces a significant curvature between the two domains.
