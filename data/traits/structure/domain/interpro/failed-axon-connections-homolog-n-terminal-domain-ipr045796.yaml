identifier: InterPro:IPR045796
label: "Failed axon connections homolog, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the Failed axon connections homolog (FAXC) from animals. It is likely that this region anchors this protein to the plasma membrane. FACX is thought to play a role in axonal development, being involved in cell-cell interactions.
