identifier: InterPro:IPR041930
label: "Acetylene hydratase"
definition: >-
  This entry represents a domain found in acetylene hydratase (Ahy) and other related proteins. The acetylene hydratase of Pelobacter acetylenicus is a tungsten iron-sulfur protein involved in the fermentation of acetylene to ethanol and acetate. Proteins containing this domain belong to the molybdopterin-binding superfamily of proteins.
