identifier: InterPro:IPR013108
label: "Amidohydrolase 3"
definition: >-
  This entry represents a subset of amidohydrolase domains that participate in different functions including cytosine degradation, atrazine degradation and other metabolic processes. The structure of the domain from Escherichia coli has been studied, and like other amidohydrolases, it forms a classical α-β TIM-barrel fold. The active site is located in the mouth of the enzyme barrel and contains a bound iron ion that coordinates a hydroxyl nucleophile. Substrate binding involves a significant conformational change that sequesters the reaction complex from solvent. Amidohydrolases are a diverse superfamily of enzymes which catalyse the hydrolysis of amide or amine bonds in a large number of different substrates including urea, cytosine, AMP, formylmethanofuran, etc. Also included in this superfamily are the phopshotriesterase enzymes, which hydrolyse P-O bonds. Members participate in a large number of processes including nucleotide metabolism, detoxification and neuronal development. They use a variety of divalent metal cofactors for catalysis: for example adenosine deaminase binds a single zinc ion, phopsphotriesterase binds two, while urease binds nickel. It has been postulated that since some of these proteins, such as those some of those involved in neuronal devlopment, appear to have lost their metal-binding centres, their function may simply be to bind, but not hydrolyse, their target molecules.
