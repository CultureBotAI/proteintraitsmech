identifier: InterPro:IPR012728
label: "Pls/PosA non-ribosomal peptide synthetases, C-terminal"
definition: >-
  This domain is found exclusively in non-ribosomal peptide synthetases and always as the final domain in the polypeptide. This domain is roughly 700 amino acids in size and is found in polypeptides roughly twice that size. This domains is found in PosA, a δ-poly-L-ornithine synthetase that produces δ-poly-L-ornithine and Pls, a ε-poly-L-lysine synthase that produces ε-Poly-L-lysine.
definition_source: InterPro
trait_axis: STRUCTURE
trait_category: STRUCT_DOMAIN
term_kind: CLASS
mapping_status: SEEDED
