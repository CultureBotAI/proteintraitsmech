identifier: InterPro:IPR007393
label: "YlxR domain"
definition: >-
  This entry represents a domain found in YlxR from Bacillus subtilis, its homologue SP0554 from Streptococcus pneumoniae ( ) and in other bacterial proteins. YlxR regulate metabolic gene expression. SP0554 revealed an α+β fold with a large positively charged patch on one side of the protein, that could have evolved from a glucocorticoid receptor-like zinc finger domain.
