identifier: InterPro:IPR004860
label: Homing endonuclease, LAGLIDADG domain
definition: >-
  Homing endonucleases (HEnases) form a large and highly diverse class of proteins encoded by introns and inteins that confer mobility to their host genetic elements. LAGLIDADG HEnases are structured into two tandemly repeated homing endonuclease-like domains. This entry represents the homing endonuclease LAGLIDADG domain.
