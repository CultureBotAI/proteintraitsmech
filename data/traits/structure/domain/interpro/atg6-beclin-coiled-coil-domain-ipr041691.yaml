identifier: InterPro:IPR041691
label: "Atg6/beclin, coiled-coil domain"
definition: >-
  In yeast, 15 Apg proteins coordinate the formation of autophagosomes. Autophagy is a bulk degradation process induced by starvation in eukaryotic cells. Apg6, also known as Atg6 or Vps30p, has two distinct functions in the autophagic process, either associated with the membrane or in a retrieval step of the carboxypeptidase Y sorting pathway. Beclin 1, the mammalian homologue of yeast Atg6/Vps30, is a tumour suppressor that coordinately regulates the autophagy and membrane trafficking involved in several physiological and pathological processes.
