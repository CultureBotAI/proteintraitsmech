identifier: InterPro:IPR063128
label: "CoxE-like, N-terminal helical bundle domain"
definition: >-
  This entry represents an N-terminal domain of approximately 75 residues found in bacterial CoxE proteins. This domain is always located N-terminal to a von Willebrand factor type A domain ( ). CoxE is an accessory protein associated with carbon monoxide dehydrogenase systems, which catalyse the oxidation of carbon monoxide to carbon dioxide. The entry is predominantly found in Alphaproteobacteria and Actinomycetota. The specific function of this N-terminal domain remains to be determined.
