identifier: InterPro:IPR060357
label: "Epiregulin, C-terminal helix"
definition: >-
  This entry represents the C-terminal helix of epiregulin. Epiregulin is a ligand of the epidermal growth factor receptor (EGFR) and ERBB4, and stimulates their tyrosine phosphorylation. The mature epiregulin protein contains an EGF-like domain that is essential for receptor binding. Structural studies have shown that the C-terminal helix contributes to receptor binding affinity. The full- length proepiregulin is synthesised as a membrane-bound precursor that is processed to release the mature secreted form.
