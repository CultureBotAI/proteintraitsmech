identifier: InterPro:IPR041623
label: "NOG1, N-terminal helical domain"
definition: >-
  This domain is found at the N terminus of NOG1 GTPase proteins. In Saccharomyces cerevisiae, the NOG1 gene has been shown to be essential for cell viability, suggesting that NOG1 may play an important role in nucleolar functions. In particular, NOG1 is believed to be functionally linked to ribosome biogenesis, which occurs in the nucleolus. In eukaryotes, NOG1 mutants were found to disrupt the biogenesis of the 60S ribosomal subunit.
