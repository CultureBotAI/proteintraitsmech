identifier: InterPro:IPR047339
label: "RUN domain-containing protein 3B, RUN domain"
definition: >-
  This entry represents the RUN domain of RUNDC3B and similar proteins from vertebrates. RUN domain-containing protein 3B (RUNDC3B), also called Rap2-interacting protein 9 (RPIP-9), contains a RUN domain in its N-terminal region that mediates interaction with Rap2, an important component of the Mitogen-Activated Protein Kinase (MAPK) cascade, which regulates cellular proliferation and differentiation. It also contains characteristic binding sites for MAPK intermediates.
