identifier: InterPro:IPR011608
label: PRD domain
definition: >-
  Transcriptional antiterminators and activators containing phosphoenolpyruvate: sugar phosphotransferase system (PTS) regulation domains (PRDs) form a class of bacterial regulatory proteins whose activity is modulated by phosphorylation. These regulators stimulate the expression of genes and operons involved in carbohydrate metabolism. PRD-containing proteins are involved in the regulation of catabolic operons in Gram-positive and Gram-negative bacteria and are often characterised by a short N-terminal effector domain that binds to either RNA (CAT-RBD for antiterminators, ) or DNA (for activators), and a duplicated PRD module which is phosphorylated on conserved histidines by the sugar phosphotransferase system (PTS) in response to the availability of carbon source. The phosphorylations are thought to modify the stability of the dimeric proteins and thereby the RNA- or DNA-binding activity of the effector domain.
