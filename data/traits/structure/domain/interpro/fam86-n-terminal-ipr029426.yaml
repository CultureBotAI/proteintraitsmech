identifier: InterPro:IPR029426
label: "FAM86, N-terminal"
definition: >-
  This conserved domain can be found at the N terminus of EEF2KMT (also known as FAM86A), FAM86B and related proteins. EEF2KMT (also known as Efm3 in budding yeasts) catalyzes the trimethylation of eukaryotic elongation factor 2 (EEF2) on 'Lys-525'.
