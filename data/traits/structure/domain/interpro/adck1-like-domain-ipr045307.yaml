identifier: InterPro:IPR045307
label: "ADCK1-like domain"
definition: >-
  This entry represents a domain found in AarF domain containing kinase 1 (ADCK1) and related proteins. Drosophila ADCK1 plays an important role in maintaining mitochondrial morphologies and functions in the muscle. Proteins containing this domain also include Mcp2, which is a component of MIOREX complexes, large expressome-like assemblies of ribosomes with factors involved in all the steps of post-transcriptional gene expression. It is also involved in mitochondrial lipid homeostasis.
