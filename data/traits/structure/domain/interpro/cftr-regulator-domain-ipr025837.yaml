identifier: InterPro:IPR025837
label: "CFTR regulator domain"
definition: >-
  Cystic fibrosis transmembrane conductance regulator (CFTR) that belongs to the ATP-binding cassette (ABC) transporter superfamily. It is a member of the ABC-C subfamily, which also contains the SUR receptors and the multidrug- resistance associated proteins (MRP). The CFTR protein encodes a chloride ion channel, which is controlled by phosphorylation. It has a major role in electrolyte and fluid secretion. CFTR is important in the determination of fluid flow, ion concentration and transepithelial salt transport. Dysfunction of the CFTR channel causes the life-threatening disease, cystic fibrosis, in which trans-epithelial ion transport is disrupted. This entry represents the CFTR regulator domain.
