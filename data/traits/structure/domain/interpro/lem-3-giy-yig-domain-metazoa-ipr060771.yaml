identifier: InterPro:IPR060771
label: "LEM-3, GIY-YIG domain, metazoa"
definition: >-
  This domain is found at the C-terminal of ANKL1/LEM-3 from human and its homologues from metazoa. Ankyrin repeat and LEM domain-containing protein 1 (ANKL1, also known as LEM-domain containing protein 3) is an endonuclease that probably plays a role in the DNA damage response and DNA repair. LEM-3 processes chromatin bridges that arise from incomplete DNA replication, unresolved recombination intermediates, or the perturbation of chromosome structure. It localises to the midbody and this localisation depends on factors needed for midbody assembly. LEM-3 is composed of three domains: an ankyrin repeat domain at the N-terminal, followed by a LEM domain and a C-terminal GIY-YIG nuclease. Unlike their bacterial relatives, the metazoan proteins contain an N-terminal ankyrin repeats domain, some of them also have an additional LEM domain between the ankyrin repeats domain and the C-terminal GIY-YIG domain.
