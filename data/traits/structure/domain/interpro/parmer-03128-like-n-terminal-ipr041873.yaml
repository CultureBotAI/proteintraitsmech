identifier: InterPro:IPR041873
label: "PARMER_03128-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of PARMER_03128, an uncharacterised protein from Parabacteroides merdae. Proteins containing this domain also include related proteins from Bacteroidetes. Structurally, they resemble domains found in streptococcal surface proteins such as SpaP.
