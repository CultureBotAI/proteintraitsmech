identifier: InterPro:IPR008493
label: "Hikeshi-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of human Hikeshi and its orthologues OPI10 from other eukaryotes. Hikeshi acts as a specific nuclear import carrier for HSP70 proteins following heat-shock stress; it acts by mediating the nucleoporin-dependent translocation of ATP-bound HSP70 proteins into the nucleus. The N-terminal domain shows a jelly-roll/β-sandwich fold with two layers of β-sheets consisting of three and five and five antiparallel β-strands.
