identifier: InterPro:IPR056617
label: "Microtubule-associated protein 1B/S, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Microtubule-associated protein 1B (MAP1B) which, when phosphorylated is required for proper microtubule dynamics and plays a role in the cytoskeletal changes that accompany neuronal differentiation and neurite extension. According to the structure predictions and comparisons, this domain may adopt a P-loop fold closely similar to that found in small GTPases, such as Arf6. This domain is also found in the Microtubule-associated protein 1S (MAP1S) which mediates aggregation of mitochondria resulting in cell death and genomic destruction. MAP1S also plays a role in anchoring the microtubule organising centre to the centrosomes. This domain isn't present in MAP1A.
