label: "Domain of unknown function DUF7153"
definition: >-
  This domain is found in Caenorhabditis elegans uncharacterised protein C01C4.2 and related proteins. It is predicted to adopt an α+β barrel with some similarity to the dimeric α+β barrel structures, in particular REDY-like protein Hapk ( ).
