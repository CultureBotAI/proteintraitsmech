identifier: InterPro:IPR054521
label: "Heme-regulated eIF-2-alpha kinase, helical domain"
definition: >-
  This domain is found at the N-terminal of Heme-regulated eIF-2-alpha kinase (HRI1/HRI2). This enzyme phosphorylates the alpha subunit of eukaryotic translation initiation factor 2 (EIF2S1/eIF-2-alpha) in response to various stress conditions. HRI is a key activator of the integrated stress response (ISR) required for adaptation to various stress, such as heme deficiency, oxidative stress and osmotic shock. This domain is predicted to fold into an α-helical structure consisting of three α-helices.
