identifier: InterPro:IPR048512
label: "Dicer, platform domain"
definition: >-
  This entry represents the platform domain in Dicer proteins from animals, which sits on the top of the L-shaped Dicer structure and shows a phosphate pocket. Dicer endoribonuclease plays a central role in short dsRNA-mediated post-transcriptional gene silencing. It cleaves naturally occurring long dsRNAs and short hairpin pre-microRNAs (miRNA) into fragments of twenty-one to twenty-three nucleotides with 3' overhang of two nucleotides, producing respectively short interfering RNAs (siRNA) and mature microRNAs. Dicer shows two N-terminal helicase domains ( ), a dimerisation domain ( ), a platform domain ( ), a PAZ domain ( ), two RNase III a/b domains ( ) and a dsRNA-binding domain in its C-terminal region ( ).
