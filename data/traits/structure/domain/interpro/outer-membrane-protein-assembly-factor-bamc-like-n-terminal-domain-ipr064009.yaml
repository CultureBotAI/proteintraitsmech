identifier: InterPro:IPR064009
label: "Outer membrane protein assembly factor BamC-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of BamC and related sequences. BamC is part of the outer membrane protein assembly Bam complex (composed of the outer membrane protein BamA, and four lipoproteins BamB, BamC, BamD and BamE), which is involved in assembly and insertion of β-barrel proteins into the outer membrane. E. coli BamC is a nonessential member of the Bam complex that stabilises the interaction between the essential proteins BamA and BamD. This entry also includes NMB0928 from Neisseria meningitidis whose function is unknown.
