identifier: InterPro:IPR033532
label: "Arabinose metabolism transcriptional repressor, ligand-binding domain"
definition: >-
  This entry represents the ligand-binding domain of AraR, which is a member of the LacI-GalR family of bacterial transcription regulators. It is involved in L-arabinose-inducible expression of the araABDLMNPQ-abfA metabolic operon and of the araE/araR genes that are organized as a divergent transcriptional unit in Bacillus subtilis.
