identifier: InterPro:IPR037896
label: "SNX13, RGS domain"
definition: >-
  This entry represents the RGS domain of SNX13 (Sorting Nexin13). RGS domain is a small α-helical structure that acts as GAPs for Galpha subunits of heterotrimeric G-proteins, and thus plays critical roles in attenuating G-protein coupled receptor (GPCR) signaling. Nexin13 binds and promotes GTPase activity of the trimeric G-protein subunit Galphas, and attenuate Galphas-mediated signaling. Snx13-null mice were embryonic lethal around midgestation which supports an essential role for SNX13 in mouse development and regulation of endocytosis dynamics.
