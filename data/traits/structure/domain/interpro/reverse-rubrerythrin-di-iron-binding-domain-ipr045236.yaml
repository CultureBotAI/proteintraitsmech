identifier: InterPro:IPR045236
label: "Reverse rubrerythrin, di-iron-binding domain"
definition: >-
  Rubrerythrin (Rr) is a fusion protein containing an N-terminal diiron-binding domain and a C-terminal domain homologous to rubredoxin. This protein has been related to the response to oxidative stress. This entry represents the rubrerythrin-like domain, which is a nonheme iron binding domain found in many air-sensitive bacteria and archaea. It is a singular domain (no C terminus rubredoxin domain) and is phylogenetically distinct from rubrerythrin domains of rubrerythrin-rubredoxin proteins. This domain can be found in Rbr3A/B from Clostridium acetobutylicum. They function as the terminal component of an NADH peroxidase and NADH oxidase.
