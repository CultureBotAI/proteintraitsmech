identifier: InterPro:IPR025254
label: "CCDC113/CCDC96, coiled-coil"
definition: >-
  This entry represents the coiled-coil region of coiled-coil domain-containing protein 113 (CCDC113, also known as cilia- and flagella-associated protein 263, CFAP263) and coiled-coil domain-containing protein 96 (CCDC96, also known as cilia- and flagella-associated protein 184, CFAP184). These proteins form a complex and regulate ciliary beating that connects radial spoke 3 (RS3) to the inner dynein arm (IDA) and the nexin-dynein regulatory complex (N-DRC). The complex is positioned parallel to N-DRC and forms a connection between the arch at the base of RS3, the IDA tail and N-DRC.
