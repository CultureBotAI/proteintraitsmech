identifier: InterPro:IPR048681
label: "Intron-encoded endonuclease 1, DNA-binding domain"
definition: >-
  This entry represents a domain found at the C-terminal end of in Intron-encoded endonuclease 1 (I-TevI) from Bacteriophage T4 ( ). I-TevI is a site-specific endonuclease that belongs to the GIY-YIG family that shows a catalytic domain ( ) and a DNA-binding domain (this entry), which is organised into three DNA recognition subdomains: a Zn finger, an elongated subdomain that includes a minor groove-binding α-helix and a helix-turn-helix subdomain.
