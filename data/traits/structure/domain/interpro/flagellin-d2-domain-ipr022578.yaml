label: "Flagellin, D2 domain"
definition: >-
  This entry represents the variable D2 domain found in uncharacterised proteins from Betaproteobacteria, including Flagellin from Burkholderia pseudomallei (FliC, ), an important subunit vaccine candidate for the serious infectious disease melioidosis. FliC assembles to form the flagellar filament that supports bacterial motility. This domain is found in association with , .
