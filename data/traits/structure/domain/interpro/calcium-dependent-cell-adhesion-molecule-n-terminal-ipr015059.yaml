identifier: InterPro:IPR015059
label: "Calcium-dependent cell adhesion molecule, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the calcium-dependent cell adhesion molecule 1 (CAD-1) from Dictyostelium. CAD-1 mediates calcium-dependent cell-cell adhesion during the early stage of development. This domain is also found in Spherulin-3A protein from Physarum polycephalum.
