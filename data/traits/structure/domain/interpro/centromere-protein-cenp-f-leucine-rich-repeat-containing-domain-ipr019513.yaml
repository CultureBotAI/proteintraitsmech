identifier: InterPro:IPR019513
label: "Centromere protein Cenp-F, leucine-rich repeat-containing domain"
definition: >-
  Cenp-F, a centromeric kinetochore, microtubule-binding protein consisting of two 1,600-amino acid-long coils, is essential for the full functioning of the mitotic checkpoint pathway. There are several leucine-rich repeats along the sequence of LEK1 that are considered to be zippers, though they do not appear to be binding DNA directly in this instance.
