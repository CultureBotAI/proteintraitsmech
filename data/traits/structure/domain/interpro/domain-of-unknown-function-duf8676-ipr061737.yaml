identifier: InterPro:IPR061737
label: "Domain of unknown function DUF8676"
definition: >-
  This entry represents an N-terminal domain of approximately 75 residues found in cyanobacteria, including Prochlorococcus, Synechococcus and Cyanobium species. This domain is consistently found at the N terminus of proteins containing an Rce1-like domain ( ). The function of this domain remains to be determined.
