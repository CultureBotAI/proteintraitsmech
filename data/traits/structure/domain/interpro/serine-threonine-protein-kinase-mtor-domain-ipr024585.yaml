identifier: InterPro:IPR024585
label: "Serine/threonine-protein kinase mTOR domain"
definition: >-
  This entry represents a domain found in serine/threonine-protein kinase mTOR (target of rapamycin), a central regulator of cellular metabolism, growth and survival in response to hormones, growth factors, nutrients, energy and stress signals. In Saccharomyces cerevisiae, the TOR proteins, TOR1 and TOR2, regulate growth in a rapamycin-sensitive manner. This domain consists of HEAT repeats.
