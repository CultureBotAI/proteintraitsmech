identifier: InterPro:IPR013658
label: "SMP-30/Gluconolactonase/LRE-like region"
definition: >-
  This entry describes a region that is found in proteins expressed by a variety of eukaryotic and prokaryotic species. These proteins include various enzymes, such as senescence marker protein 30 (SMP-30, also known as regucalcin ), gluconolactonase ( ) and luciferin-regenerating enzyme (LRE, ). SMP-30 is a gluconolactonase with low activity towards other sugar lactones, including gulonolactone and galactonolactone. It is known to hydrolyse diisopropyl phosphorofluoridate in the liver, and has been noted as having sequence similarity, in the region described in this family, with PON1 ( ) and LRE.
