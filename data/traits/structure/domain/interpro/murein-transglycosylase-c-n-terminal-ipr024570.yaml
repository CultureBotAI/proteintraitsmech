identifier: InterPro:IPR024570
label: "Murein transglycosylase-C, N-terminal"
definition: >-
  Membrane-bound lytic murein transglycosylase C (also known as murein hydrolase C), is a murein-degrading enzyme that may play a role in the recycling of muropeptides during cell elongation and/or cell division. This entry represents the N-terminal domain, whose function is currently not known.
