identifier: InterPro:IPR019257
label: "Histidine-specific methyltransferase, SAM-dependent methyltransferase domain"
definition: >-
  This entry represents a domain with homology to SAM-dependent methyltransferase domain in 4-dimethylallyltryptophan N-methyltransferase (EasF), Histidine N-alpha-methyltransferase and related proteins. The mycobacterial members of this family are expressed from part of the ergothioneine biosynthetic gene cluster. EGTD is the histidine methyltransferase that transfers three methyl groups to the alpha-amino moiety of histidine, in the first stage of the production of this histidine betaine derivative that carries a thiol group attached to the C2 atom of an imidazole ring.
