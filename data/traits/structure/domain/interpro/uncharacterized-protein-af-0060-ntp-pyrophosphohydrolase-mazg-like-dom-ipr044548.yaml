identifier: InterPro:IPR044548
label: "Uncharacterized protein AF_0060, NTP Pyrophosphohydrolase MazG-like domain"
definition: >-
  This domain is found in an uncharacterised protein from Archaeoglobus fulgidus (AF_0060) and its homologues from bacteria. The biological function of this protein remains unclear, however, AF_0060 shows high sequence similarity to the dimeric 2-deoxyuridine 5'-triphosphate nucleotidohydrolase (dUTP pyrophosphatase or dUTPase) and NTP-PPase MazG proteins. Members in this entry consist of a single MazG-like domain that contains a well conserved divalent ion-binding motif EXX[E/D].
