identifier: InterPro:IPR035060
label: Serine/threonine kinase 25, catalytic domain
definition: >-
  STK25 is also called Ste20/oxidant stress response kinase 1 (SOK1) or yeast Sps1/Ste20-related kinase 1 (YSK1). It is localized in the Golgi apparatus through its interaction with the Golgi matrix protein GM130. It may be involved in the regulation of cell migration and polarization. STK25 binds and phosphorylates CCM3 (cerebral cavernous malformation 3), also called PCD10 (programmed cell death 10), and may play a role in apoptosis. Human STK25 is a candidate gene responsible for pseudopseudohypoparathyroidism (PPHP), a disease that shares features with the Albright hereditary osteodystrophy (AHO) phenotype.
