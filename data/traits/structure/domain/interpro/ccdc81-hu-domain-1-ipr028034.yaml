identifier: InterPro:IPR028034
label: "CCDC81, HU domain 1"
definition: >-
  This is the first of two HU domains found in the CCDC81-like proteins. CCDC81 has been experimentally linked to the centrosome; eukaryotic CCDC81 HU domains are predicted to function in protein-protein interactions in centrosome organization and potentially contribute to cargo-binding in conjunction with Dynein-VII. A striking lineage-specific expansion of the domain is observed in birds, where the HU domains could function in recognition of non-self molecules.
