identifier: InterPro:IPR061939
label: "Mitochondrial 15S rRNA processing factor CCM1, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of the mitochondrial 15S rRNA processing factor (CCM1) found in yeast. CCM1 regulates the maturation of the mitochondrial small ribosomal subunit by controlling 5'-end processing of the 15S rRNA. It binds to the 5'-precursor region of the 15S rRNA at the site later occupied by mS47 in the mature mitochondrial small subunit (mtSSU). Through structure- and sequence-specific RNA recognition, CCM1 interacts with a single-stranded segment of the precursor, specifically recognising nucleotides -6 to -1. The replacement of CCM1 by mS47 is linked to the irreversible removal of the 15S rRNA precursor and is accompanied by conformational changes in mitoribosomal proteins uS5m and mS26. These structural rearrangements mark the completion of 5'-end rRNA processing by protecting the mature 5'-end and stabilising mS47. The 5'-precursor removal, together with the dissociation of CCM1, may be catalysed by the 5'-3' exoribonuclease Pet127. This domain adopts a TPR-like fold.
