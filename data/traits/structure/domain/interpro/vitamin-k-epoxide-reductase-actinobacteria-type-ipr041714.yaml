identifier: InterPro:IPR041714
label: "Vitamin K epoxide reductase, Actinobacteria-type"
definition: >-
  Proteins containing this domain include vitamin K epoxide reductase (VKOR) mostly present in actinobacteria. VKOR (also named VKORC1) is an integral membrane protein that catalyzes the reduction of vitamin K 2,3-epoxide and vitamin K to vitamin K hydroquinone, an essential co-factor subsequently used in the γ-carboxylation of glutamic acid residues in blood coagulation enzymes. All homologues of VKOR contain an active site CXXC motif, which is switched between reduced and disulfide-bonded states during the reaction cycle. In some bacterial homologues, the VKOR domain is fused with domains of the thioredoxin family of oxidoreductases which may function as redox partners in initiating the reduction cascade. It has been reported that the member from Mycobacterium tuberculosis may represent a target for antibiotics and a model for genetic studies of human VKOR.
