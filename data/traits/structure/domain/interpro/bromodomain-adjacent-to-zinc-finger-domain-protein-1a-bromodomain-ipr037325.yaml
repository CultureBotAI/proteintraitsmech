identifier: InterPro:IPR037325
label: Bromodomain adjacent to zinc finger domain protein 1A, bromodomain
definition: >-
  Bromo adjacent to zinc finger 1A (also known as ACF1) is the regulatory subunit of the ACF-1 and ACF-5 ISWI chromatin remodeling complexes, which form ordered nucleosome arrays on chromatin and regulates spacing of nucleosomes using ATP to generate evenly spaced nucleosomes along the chromatin. Bromodomains are 110 amino acid long domains, that are found in many chromatin associated proteins. Bromodomains can interact specifically with acetylated lysine.
