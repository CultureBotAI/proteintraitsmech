identifier: InterPro:IPR040665
label: "Tyrosine kinase receptor A, transmembrane domain"
definition: >-
  Tyrosine kinase receptor A (also known as Neurotrophic tyrosine kinase receptor type 1 and High affinity nerve growth factor receptor), consists of 796 amino acids and can be divided in the extracellular ligand-binding domain, the trans-membrane domain (TMD), and the intracellular tyrosine kinase domain. This domain is the TMD of TrkA which has shown to be involved in the interaction with amyloid precursor protein (APP).
