identifier: InterPro:IPR037339
label: "Cytidine monophosphate-N-acetylneuraminic acid hydroxylase, Rieske domain"
definition: >-
  This entry represents the N-terminal Rieske domain of cytidine monophosphate-N-acetylneuraminic acid (CMP Neu5Ac). The Rieske domain is a [2Fe-2S] cluster binding domain involved in electron transfer. CMP Neu5Ac hydroxylase is the key enzyme for the synthesis of N-glycolylneuraminic acid (NeuGc) from N-acetylneuraminic acid (Neu5Ac), NeuGc and Neu5Ac are members of a family of cell surface sugars called sialic acids. All mammals except humans have both NeuGc variants on their cell surfaces. In humans, the gene encoding CMP Neu5Ac hydroxylase has a mutation within its coding region that abolishes NeuGc production.
