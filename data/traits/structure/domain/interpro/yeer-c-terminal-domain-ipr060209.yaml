identifier: InterPro:IPR060209
label: "YeeR, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YeeR proteins found in Escherichia and related bacteria. The function of this C-terminal cytoplasmic domain remains to be determined. This domain is also found in other positions in uncharacterised bacterial proteins. YeeR is 510 amino acids and contains six transmembrane helices. YeeR is an inner membrane protein found in E. coli chromosome at locus b2001.
