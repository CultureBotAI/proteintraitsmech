identifier: InterPro:IPR001670
label: "Alcohol dehydrogenase, iron-type/glycerol dehydrogenase GldA"
definition: >-
  Alcohol dehydrogenase ( ) (ADH) catalyses the reversible oxidation of ethanol to acetaldehyde with the concomitant reduction of NAD. Currently three, structurally and catalytically, different types of alcohol dehydrogenases are known: Zinc-containing 'long-chain' alcohol dehydrogenases. Insect-type, or 'short-chain' alcohol dehydrogenases. Iron-containing alcohol dehydrogenases. Iron-containing ADH's have been found in yeast (gene ADH4), as well as in Zymomonas mobilis (gene adhB). These two iron-containing ADH's are closely related to the following enzymes: Escherichia coli lactaldehyde reductase (also known as propanediol oxidoreductase) ( ) (gene fucO), an enzyme involved in the metabolism of fucose and which also seems to contain ferrous ion(s). Clostridium acetobutylicum NADPH- and NADH-dependent butanol dehydrogenases ( ) (genes adh1, bdhA and bdhB), an enzyme which has activity using butanol and ethanol as substrates. E. coli aldehyde-alcohol dehydrogenase (AdhE), an iron-dependent enzyme which harbor three different activities: alcohol dehydrogenase, acetaldehyde dehydrogenase (acetylating) ( ) and pyruvate-formate-lyase deactivase. Bacterial glycerol dehydrogenase ( ) (gene gldA or dhaD). Clostridium kluyveri NAD-dependent 4-hydroxybutyrate dehydrogenase (4hbd) ( ). Citrobacter freundii and Klebsiella pneumoniae 1,3-propanediol dehydrogenase ( ) (gene dhaT). Bacillus methanolicus NAD-dependent methanol dehydrogenase ( ). E. coli and Salmonella typhimurium ethanolamine utilization protein eutG. E. coli hypothetical protein yiaY.
