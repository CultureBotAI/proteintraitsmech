identifier: InterPro:IPR063930
label: "F26C11.3 domain"
definition: >-
  This entry represents a domain from F26C11.3, an uncharacterised secreted protein from Caenorhabditis elegans. The full-length protein contains a C-terminal sushi domain. The protein is predicted to be secreted and localises to the extracellular region. The specific function of this middle domain remains to be determined.
