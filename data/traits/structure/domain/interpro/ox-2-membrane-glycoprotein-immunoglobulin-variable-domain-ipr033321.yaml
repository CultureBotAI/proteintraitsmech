identifier: InterPro:IPR033321
label: "OX-2 membrane glycoprotein, immunoglobulin variable domain"
definition: >-
  OX2/CD200 is a broadly distributed cell surface glycoprotein that interacts with a receptor (CD200R) predominantly expressed on myeloid lineage cells. It is involved in regulation of macrophage function. Interaction of CD200 with its receptor acts to suppress inflammatory responses. CD200 has been shown to play important roles in controlling autoimmunity, inflammation, the development and spread of cancer, hypersensitivity, and spontaneous fetal loss. This entry also includes viral OX2 (vOX2). Viral OX2 is encoded by herpesvirurses and has significant homology with cellular OX2. Viral OX2 encodes a glycosylated cell surface protein which has been shown to target myeloid-lineage cells. This entry represents the first immunoglobulin (Ig) variable (V) domain of CD200 and similar sequences from vertebrates and some viral species.
