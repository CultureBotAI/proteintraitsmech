identifier: InterPro:IPR044396
label: "SF1 helicase, ronidovirus"
definition: >-
  This entry represents an uncharacterised domain located between the Cys/His zinc-binding domain (ZBD) and the first helicase domain found in helicases from Gill-associated virus (GAV) and related viruses from ronidovirus family. It is thought to be a linker domain. They are related to the SF1 family of nidoviral replication helicases, similar to the Severe Acute Respiratory Syndrome coronavirus (SARS) non-structural protein 13 (SARS-NSP13) helicase (not included in this entry), which share a similar domain organisation. The location and orientation of this uncharacterised domain represented in this ronidovirus group resembles that of the 1B domain in SARS-NSP13 helicase.
