identifier: InterPro:IPR004218
label: "Prokaryotic glutathione synthetase, ATP-binding"
definition: >-
  Prokaryotic glutathione synthetase (glutathione synthase) catalyses the conversion of gamma-L-glutamyl-L-cysteine and glycine to orthophosphate and glutathione in the presence of ATP. This is the second step in glutathione biosynthesis. The enzyme is inhibited by 7,8-dihydrofolate, methotrexate and trimethoprim. This is the ATP-binding domain of the enzyme.
