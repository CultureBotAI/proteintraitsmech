identifier: InterPro:IPR045702
label: "Domain of unknown function DUF6060"
definition: >-
  This entry represents a domain found in members of a biosynthetic gene cluster (BGC). This BGC (BGC0001035) is described by MIBiG as an example of the following biosynthetic classes, NRP (non-ribosomal peptide), polyketide and other (Aminocoumarin). This family includes a protein from the pneumocandin B0 biosynthetic gene cluster from Glarea lozoyensis ATCC 20868 and appear to be predominantly found in fungi. According to structure predictions and comparisons, this domain may have a structure related to the fold seen in aerolisin pore-forming toxins.
