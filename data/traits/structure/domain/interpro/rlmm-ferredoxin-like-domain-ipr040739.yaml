identifier: InterPro:IPR040739
label: "RlmM ferredoxin-like domain"
definition: >-
  This domain is found in Ribosomal methyltransferase RlmM (YdgE) present in E. coli. RlmM catalyzes the S-adenosyl methionine (AdoMet)-dependent 2'O methylation of C2498 in 23S ribosomal RNA. The domain is ferredoxin-like and forms part of the THUMP domain which binds RNA. THUMP domains typically have low sequence similarity.
