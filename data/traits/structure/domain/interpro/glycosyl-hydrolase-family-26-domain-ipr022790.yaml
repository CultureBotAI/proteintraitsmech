identifier: InterPro:IPR022790
label: "Glycosyl hydrolase family 26 domain"
definition: >-
  This entry represents a domain found in the glycosyl hydrolase family 26 members. Glycoside hydrolases (GHs) play a critical role in both eukaryotes and prokaryotes, where they fulfill numerous important functions such as substrate acquisition and the remote remodelling of cell walls and the glycan decorations of glycoproteins. GH family 26 consists mainly of endo-beta-1,4- mannanases (mannanases) ( ), although some members of this family display beta- 1,3-xylanase activity. Proteins containing this domain also include the enzyme endogluconase H ( ), which catalyses the endohydrolysis of 1,4-beta-glucosidic linkages in cellulose, lichenin and cereal beta-D-glucans. The family 26 GHs are members of clan GH-A. The GH26 catalytic domain exhibits the architecture of the classical (β/α)8-barrel folding motif characteristic of a clan-GH-A member. Two Glu residues located respectively on strands β4 and β7 act as the catalytic acid/base and nucleophile in a double-displacement mechanism.
