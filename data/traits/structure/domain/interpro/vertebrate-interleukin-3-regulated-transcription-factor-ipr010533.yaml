label: "Vertebrate interleukin-3 regulated transcription factor"
definition: >-
  This entry includes vertebrate transcription factors, some of which are regulated by IL-3/adenovirus E4 promoter binding protein. Others were found to strongly repress transcription in a DNA-binding-site-dependent manner.
