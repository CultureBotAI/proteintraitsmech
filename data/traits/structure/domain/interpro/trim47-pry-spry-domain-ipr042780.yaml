identifier: InterPro:IPR042780
label: "TRIM47, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of TRIM47 (also known as GOA). TRIM47 domains are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. It is highly expressed in kidney tubular cells, but lowly expressed in most tissue. It is overexpressed in astrocytoma tumor cells and plays an important role in the process of dedifferentiation that is associated with astrocytoma tumorigenesis; astrocytoma, also known as cerebral astrocytoma, is a malignant glioma that arises from astrocytes. Genome wide studies on white matter lesions have identified a novel locus on chromosome 17q25 harboring several genes such as TRIM47 and TRIM65 which pinpoints to possible novel mechanisms leading to these lesions.
