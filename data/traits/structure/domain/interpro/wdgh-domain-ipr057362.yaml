identifier: InterPro:IPR057362
label: "WDGH domain"
definition: >-
  This domain is found in uncharacterised proteins from phages and bacteriophages. It is predicted to adopt an unique α/β structure composed of a central mixed four-stranded β-sheet and α-helices packed on one side of it. Members of this entry contain a highly conserved WDGH sequence motif after which it was named.
