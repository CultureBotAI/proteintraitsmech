identifier: InterPro:IPR059728
label: AF_2379
definition: >-
  This entry represents the AF_2379 small uncharacterised proteins found in sulphate-reducing bacteria and archaea. The family is predominantly found in Thermodesulfobacteriota, particularly in Desulfobacteraceae, Desulfosarcinaceae, and Desulfococcaceae, with some members in Archaeoglobaceae. The function of this protein family remains to be determined.
