identifier: InterPro:IPR063398
label: "Probable serine/threonine-protein kinase I/L, C-terminal helical hairpin"
definition: >-
  This entry represents a C-terminal helical hairpin domain found in cyanobacterial ADCK family Probable serine/threonine-protein kinase I/L (SpkI/L). It follows the ABC1 kinase domain ( ) and the UbiB helical domain ( ). In Synechocystis sp. PCC 6803, the protein Sll1770 (SpkI) plays a role in maintaining photosynthetic efficiency during salt stress acclimation. Deletion of sll1770 results in decreased PSII activity and slower growth under high salt conditions. The protein has also been associated with cyanoglobule lipid droplets, which are stress- responsive metabolic compartments. The specific function of this domain remains to be determined.
