identifier: InterPro:IPR049468
label: "Restriction endonuclease type II-like domain"
definition: >-
  This entry represents a domain found in a group of prokaryotic proteins. This domain resembles the core structure found in most type II restriction endonucleases, which consists of a 3-layer α/β/α topology with mixed β-sheets.
