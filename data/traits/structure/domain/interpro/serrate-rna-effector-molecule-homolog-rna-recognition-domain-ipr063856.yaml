identifier: InterPro:IPR063856
label: "Serrate RNA effector molecule homolog, RNA-recognition domain"
definition: >-
  This RNA-recognition domain (RRM) is found in human Serrate RNA effector molecule homolog (SRRT), which acts as a mediator between the cap-binding complex (CBC) and the primary microRNAs (miRNAs) processing machinery during cell proliferation. It plays a role in RNA-mediated gene silencing (RNAi) by miRNAs. SRRT is necessary and sufficient to promote neural stem cell self-renewal.
