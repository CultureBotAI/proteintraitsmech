identifier: InterPro:IPR058430
label: "Domain of unknown function DUF8117"
definition: >-
  This entry represents a domain of unknown function with structural similarity to ribosomal protein L29 (L29p) as identified by ECOD classification. The domain is primarily found in nematode proteins, particularly in Caenorhabditis species. The specific function of this domain has not yet been experimentally determined.
