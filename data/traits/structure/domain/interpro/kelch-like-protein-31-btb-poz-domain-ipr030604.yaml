identifier: InterPro:IPR030604
label: "Kelch-like protein 31, BTB/POZ domain"
definition: >-
  The KLHL (Kelch-like) proteins generally have a BTB/POZ domain, a BACK domain, and five to six Kelch motifs. They constitute a subgroup at the intersection between the BTB/POZ domain and Kelch domain superfamilies. The BTB/POZ domain facilitates protein binding, while the Kelch domain (repeats) form β-propellers. The Kelch superfamily of proteins can be subdivided into five groups: (1) N-propeller, C-dimer proteins, (2) N-propeller proteins, (3) propeller proteins, (4) N-dimer, C-propeller proteins, and (5) C-propeller proteins. KLHL family members belong to the N-dimer, C-propeller subclass of Kelch repeat proteins. In addition to BTB/POZ and Kelch domains, the KLHL family members contain a BACK domain, first described as a 130-residue region of conservation observed amongst BTB-Kelch proteins. Many of the Kelch-like proteins have been identified as adaptors for the recruitment of substrates to Cul3-based E3 ubiquitin ligases. Kelch-like protein 31 (KLHL31) is also called BTB and kelch domain-containing protein 6 (BKLHD6), Kelch repeat and BTB domain-containing protein 1 (KBTBD1). It is a transcriptional repressor in the MAPK/JNK signaling pathway to regulate cellular functions. Its overexpression inhibits the transcriptional activities of both the TPA-response element (TRE) and serum response element (SRE). It is linked to skeletal myogenesis and its expression is regulated by myogenic signals and Myf-5. This entry represents the BTB/POZ domain of KLHL31, a common protein-protein interaction module of about 100 amino acids.
