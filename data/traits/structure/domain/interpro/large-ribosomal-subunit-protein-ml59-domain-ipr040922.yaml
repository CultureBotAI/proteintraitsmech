identifier: InterPro:IPR040922
label: "Large ribosomal subunit protein mL59 domain"
definition: >-
  This domain can be found in mitochondrial large ribosomal subunit protein mL59 (also known as MRPL25) from Saccharomyces cerevisiae. mL59 is known to partially stabilize a change in the rRNA path prior to helix 82-ES1 ultimately leading to the stabilization of the phosphate backbone of the tRNA acceptor stem. It is worth noting that the domain is encoded in the nucleus and imported from the cytoplasm.
