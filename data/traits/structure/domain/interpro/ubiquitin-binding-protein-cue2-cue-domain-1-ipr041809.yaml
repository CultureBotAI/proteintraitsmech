identifier: InterPro:IPR041809
label: "Ubiquitin-binding protein CUE2, CUE domain 1"
definition: >-
  CUE2 contains two tandem CUE domains at the N terminus that may be involved in the intramolecular monoubiquitination. This entry represents the first CUE domain. CUE2 is a mRNA endonuclease involved in the No-Go Decay (NGD) pathway, which catalyses mRNA cleavage and degradation in response to ribosome collisions. It acts downstream of the ribosome collision sensor HEL2. This protein specifically recognises and binds RPS7/eS7 polyubiquitinated by MOT2/NOT4 and HEL2, promoting CUE2 recruitment to stalled ribosomes, where it mediates mRNA cleavage upstream of the colliding ribosome. It also mediates mRNA cleavage within colliding ribosomes; once recruited to colliding ribosomes downstream of the RQT (ribosome quality control trigger) complex, following disassembly of stalled ribosomes and cleaves mRNAs partially released from the colliding ribosome.
