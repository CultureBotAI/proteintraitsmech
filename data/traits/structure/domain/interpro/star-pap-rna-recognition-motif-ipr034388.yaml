identifier: InterPro:IPR034388
label: "Star-PAP, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of Star-PAP (Speckle targeted PIPKIalpha regulated poly (A) polymerase), which is a nuclear non-canonical PAP (Poly(A) polymerase) regulated by lipid second messenger phosphatidyl-inositol-4,5-bisphosphate (PI4,5P2). As its name suggests, Star-PAP interacts and is regulated by the enzyme phosphatidyl-inositol-4-phosphate-5-kinase type I alpha (PIPKIalpha) that synthesises nuclear PI4,5P2. Star-PAP polyadenylates select subset of mRNAs in the cell involved in oxidative stress response, apoptosis and cancer. Although it belongs to the well-characterised poly(A) polymerase protein superfamily, Star-PAP is highly divergent from both the poly(A) polymerase (PAP) and the terminal uridylyl transferase (TUTase), identified within the editing complexes of trypanosomes.
