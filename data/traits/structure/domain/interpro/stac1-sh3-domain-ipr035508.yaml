identifier: InterPro:IPR035508
label: "STAC1, SH3 domain"
definition: >-
  Stac proteins are putative adaptor proteins that contain a cysteine-rich C1 domain and one or two SH3 domains at the C terminus. There are three mammalian members: Stac1, Stac2, and Stac3. Stac1 and Stac3 contain two SH3 domains while Stac2 contains a single SH3 domain at the C terminus. They regulate voltage-gated calcium channel (CaV) trafficking and function. This entry represents the first C-terminal Src homology 3 (SH3) domain of SH3 and cysteine-rich domain-containing protein (Stac or Stac1). Stac1 has been found to be expressed differently in mature dorsal root ganglia (DRG) neurons.
