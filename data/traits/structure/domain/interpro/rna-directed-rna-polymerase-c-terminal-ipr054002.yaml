identifier: InterPro:IPR054002
label: "RNA-directed RNA polymerase, C-terminal"
definition: >-
  This domain is found at the C-terminal of RNA-directed RNA polymerase (RdRP). This protein adopts a closed cage-like structure consisting of a central polymerase domain sandwiched between N-terminal and C-terminal bracelet domains. This domain adopts a predominantly α-helical configuration.
