identifier: InterPro:IPR019535
label: Little elongation complex subunit 2 , C-terminal
definition: >-
  This entry represents the C-terminal of little elongation complex subunit 2 (ICE2, also known as NARG2). ICE2 is a component of the little elongation complex (LEC), a complex required to regulate small nuclear RNA (snRNA) gene transcription by RNA polymerase II and III. This C-terminal domain belongs to the PD-(D/E)XK nuclease superfamily.
