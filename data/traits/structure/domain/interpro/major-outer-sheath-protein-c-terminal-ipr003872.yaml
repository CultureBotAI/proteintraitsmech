identifier: InterPro:IPR003872
label: "Major outer sheath protein, C-terminal"
definition: >-
  This entry represents the C-terminal region of major outer sheath proteins from spirochaetales. Major outer sheath proteins are present on the bacterial cell surface. In Treponema denticola the major outer sheath protein (Msp) binds immobilized laminin and fibronectin, supporting the hypothesis that Msp mediates the extracellular matrix binding activity of T. denticola.
