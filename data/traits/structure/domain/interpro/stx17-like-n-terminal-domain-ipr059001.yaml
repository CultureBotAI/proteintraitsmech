identifier: InterPro:IPR059001
label: "STX17-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of human Syntaxin-17 (STX17), a SNARE protein (soluble N-ethylmaleimide-sensitive factor-attachment protein receptor) of the autophagosome that is involved in autophagy through the direct control of autophagosome membrane fusion with the lysosome membrane. This domain is predicted to form an α-helical bundle.
