identifier: InterPro:IPR049765
label: "Rabankyrin-5, BTB/POZ domain"
definition: >-
  This entry represents the BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in human Rabankyrin-5 (ANFY1) and similar animal proteins. This domain is a common protein-protein interaction motif of about 100 amino acids and usually found associated to . Rabankyrin-5, also called ankyrin repeat and FYVE domain-containing protein 1 (ANKFY1), or ankyrin repeats hooked to a zinc finger motif (ANKHZN), a Rab5 effector that regulates and coordinates different endocytic mechanisms. It is ubiquitously expressed in a spatiotemporal-specific manner and is located on endosomes. ANFY1 contains an N-terminal coiled-coil region and a BTB/POZ domain, followed by a BACK domain, several ankyrin (ANK) repeats in the middle, and a C-terminal FYVE domain.
