label: "Disks large homolog 1-4, PDZ-associated domain"
definition: >-
  This domain is found between the second and third PDZ domains ( ) of Disks large homolog 1-4 (DLG1-4) and similar sequences from vertebrates. Members of this group are involved in synaptic plasticity associated with NMDA receptor signalling.
