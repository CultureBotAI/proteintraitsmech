identifier: InterPro:IPR061728
label: "Domain of unknown function DUF8667"
definition: >-
  This entry represents a family of small uncharacterised proteins of approximately 67 residues. Some family members are annotated as containing NIF11 or DUF1292 domains, although the functional significance of this is unclear as the family is restricted to marine picocyanobacteria (Prochlorococcus, Synechococcus, and Cyanobium species in Synechococcales), which are not nitrogen-fixing organisms. The function of this family remains to be determined.
