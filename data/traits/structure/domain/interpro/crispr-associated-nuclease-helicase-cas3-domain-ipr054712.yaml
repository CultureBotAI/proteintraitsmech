identifier: InterPro:IPR054712
label: "CRISPR-associated nuclease/helicase Cas3 domain"
definition: >-
  This entry represents a domain of CRISPR-associated nuclease/helicase Cas3 subtype I-F/YPEST from Pseudomonas aeruginosa (Cas3) and similar prokaryotic sequences. Cas3 is a DNA-degradation enzyme that forms part of the CRISPR-Cas bacterial immune system. Cas3 contains a Cas2 domain, an HD nuclease domain ( ), RecA1, RecA2, a long linker region, and a C-terminal domain (this entry). This domain contains two α-helices and two six-stranded β-blades.
