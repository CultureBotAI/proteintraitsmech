identifier: InterPro:IPR057713
label: "Domain of unknown function DUF7953"
definition: >-
  The domain described by this entry is located towards the N-terminal in putative transmembrane and uncharacterised proteins found in plants. It is predicted to adopt a C2 fold. C2 domains are membrane-binding modules that share a common overall fold: a single compact greek-key motif organised as an eight-stranded anti-parallel β-sandwich consisting of a pair of four-stranded β-sheets.
