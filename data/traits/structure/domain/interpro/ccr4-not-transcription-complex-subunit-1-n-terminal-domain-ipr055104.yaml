identifier: InterPro:IPR055104
label: "CCR4-NOT transcription complex subunit 1, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of human CCR4-NOT transcription complex subunit 1 (CNOT1) and similar sequences from animals. CNOT1 is a scaffolding component of the CCR4-NOT complex which is one of the major cellular mRNA deadenylases and is linked to various cellular processes including bulk mRNA degradation, miRNA-mediated repression, translational repression during translational initiation and general transcription regulation. This domain adopts a structure of a HEAT-repeat.
