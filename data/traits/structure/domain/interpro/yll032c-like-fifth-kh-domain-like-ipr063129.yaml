identifier: InterPro:IPR063129
label: "YLL032C-like, fifth KH domain-like"
definition: >-
  This entry represents the fifth KH domain of the yeast YLL032C protein. YLL032C is predicted to bind approximately 80 different mRNAs in yeast cells, often those with a specific sequence motif (A/U)AUACC(C/U). Among the targets of Yll032C is MIH1, encoding a protein tyrosine phosphatase that in mitosis dephosphorylates and activates the master regulator of cell division, the cyclin-dependent kinase Cdk. The Yll032C protein contains tandem KH domains, which are found in other RNA-binding proteins and are evolutionarily conserved. This domain is also found in the K homology domain-containing protein 4 (KHD4) which is an RNA-binding protein that recognizes the sequence AUACCC via its tandem KH domains 3 and 4, probably in order to promote mRNA instability. This protein plays an essential role in filamentous growth and virulence.
