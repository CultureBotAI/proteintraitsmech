identifier: InterPro:IPR045972
label: "Domain of unknown function DUF5928"
definition: >-
  This presumed domain is functionally uncharacterised. This domain is found predominantly in Rhodobacterales, and is approximately 260 amino acids in length. It is found to the C terminus of PF02485 and therefore is likely to have a role in carbohydrate modification.
