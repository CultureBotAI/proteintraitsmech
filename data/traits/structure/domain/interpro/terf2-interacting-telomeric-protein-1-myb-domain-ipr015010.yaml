identifier: InterPro:IPR015010
label: "TERF2-interacting telomeric protein 1, Myb domain"
definition: >-
  TERF2-interacting telomeric protein 1 (TERF2IP) is the homologous of Rap1 from yeast (not included in this entry). These proteins are involved in the regulation of telomere length, clustering and has a specific role in telomere position effect (TPE). TERF2IP is required for repression of homology-directed repair (HDR). This domain adopts a canonical three-helix bundle tertiary structure, with the second and third helices forming a helix-turn-helix variant motif. The function is unclear but it may either interact with DNA via an adaptor protein or it may be only involved in protein-protein interactions.
