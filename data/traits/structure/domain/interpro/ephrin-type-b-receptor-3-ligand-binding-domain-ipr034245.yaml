identifier: InterPro:IPR034245
label: "Ephrin type-B receptor 3, ligand binding domain"
definition: >-
  This entry represents the ligand-binding domain found in ephrin type-B receptor 3 (EphB3). EphB3 plays a role in cell positioning in the gastrointestinal tract by being preferentially expressed in Paneth cells. It also has been implicated in early colorectal cancer and early stage squamous cell lung cancer. Class EphB receptors bind to transmembrane ephrin-B ligands. There are six vertebrate EhpB receptors (EphB1-6), which display promiscuous interactions with three ephrin-B ligands. Ephrin receptors (EphRs) comprise the largest subfamily of receptor tyrosine kinases (RTKs). EphRs contain a ligand binding domain and two fibronectin repeats extracellularly, a transmembrane segment, and a cytoplasmic tyrosine kinase domain. Binding of the ephrin ligand to EphR requires cell-cell contact since both are anchored to the plasma membrane. The resulting downstream signals occur bidirectionally in both EphR-expressing cells (forward signaling) and ephrin-expressing cells (reverse signaling).
