identifier: InterPro:IPR053938
label: "PTM1-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of fungal proteins, such as PTM1 from S.cerevisiae and its closely homologues from S.pombe. They have been identified as orthologues of TMEM87A/B from human. Structure predictions suggest that these proteins has the same domain architecture as GOST (GOLD seven-transmembrane helix) proteins consisting of a GOLD domain atop of a membrane-spanning seven-transmembrane helix domain this domain. This domain represents the GOLD domain. Members of this entry localise to the Golgi and early endosomes; the function is unknown.
