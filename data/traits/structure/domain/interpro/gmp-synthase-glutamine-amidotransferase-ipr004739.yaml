identifier: InterPro:IPR004739
label: "GMP synthase, glutamine amidotransferase"
definition: >-
  This entry represents the N-terminal domain of bacterial GMP synthase [glutamine-hydrolyzing] and similar sequences found in all cellular organisms. This domain covers the whole protein length in some archaeal members of this group. GMP synthase catalyses the synthesis of GMP from XMP. ATP + xanthosine 5'-phosphate + L-glutamine + H(2)O = AMP + diphosphate + GMP + L-glutamate GMP synthetase is a glutamine amidotransferase from the de novo purine biosynthetic pathway. It belongs to the triad family of amidotransferases having a conserved Cys-His-Glu catalytic triad in the glutaminase active site. Glutamine amidotransferase (GATase) activity catalyses the transfer of ammonia from the amide side chain of glutamine to an acceptor substrate.
