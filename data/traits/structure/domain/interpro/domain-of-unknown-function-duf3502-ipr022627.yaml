label: "Domain of unknown function DUF3502"
definition: >-
  This domain is about 140 amino acids in length and is functionally uncharacterised. It can be found at the C terminus of the SP_0092 protein from Streptococcus pneumoniae serotype 4. SP_0092 is a carbohydrate ABC transporter substrate-binding protein.
