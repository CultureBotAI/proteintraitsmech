identifier: InterPro:IPR040882
label: "Cas12a, nuclease domain"
definition: >-
  This is a nuclease (NUC) domain found in Cas12a, an RNA-guided endonuclease of a type V CRISPR-Cas system. Structural and functional analysis indicate that this domain is involved in DNA cleavage.
