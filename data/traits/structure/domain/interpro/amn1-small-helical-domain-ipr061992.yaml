identifier: InterPro:IPR061992
label: "AMN1, small helical domain"
definition: >-
  This entry represents a small helical domain found in the central region of AMN1 proteins from ascomycetes, spanning approximately 90 amino acids. This domin is located between the disordered N-terminal region and the leucine- rich repeat domain. AMN1 is an antagonist of the mitotic exit network, acting as a negative regulator required for multiple cell cycle checkpoints. The protein acts in daughter cells to inhibit the mitotic exit pathway once the mitotic exit network has executed its function. AMN1 localises to both the cytoplasm and nucleus and interacts with TEM1 to interfere with TEM1-CDC5 association. The specific function of this domain remains to be determined.
