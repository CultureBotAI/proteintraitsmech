identifier: InterPro:IPR048464
label: "MalF, N-terminal region, transmembrane helices"
definition: >-
  MalF (Maltose/maltodextrin transport system permease protein MalF) is a component of the maltose uptake system found in proteobacteria, an ATP-binding cassette (ABC) transporter. This protein is composed of eight transmembrane (TM) helices and folds in a way its concave surface faces the similar assembly of MalG to enclose the maltose. This entry represents the first TM helices of this structure, which are located N-terminal to the large periplasmic loop (P2, ).
