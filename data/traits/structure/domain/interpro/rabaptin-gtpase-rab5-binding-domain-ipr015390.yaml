identifier: InterPro:IPR015390
label: "Rabaptin, GTPase-Rab5 binding domain"
definition: >-
  This domain is predominantly found in Rabaptin and allows for binding to the GTPase Rab5. This interaction is necessary and sufficient for Rab5-dependent recruitment of Rabaptin5 to early endosomal membranes.
