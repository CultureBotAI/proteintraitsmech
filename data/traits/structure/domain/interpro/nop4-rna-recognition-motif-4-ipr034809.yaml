identifier: InterPro:IPR034809
label: "Nop4, RNA recognition motif 4"
definition: >-
  This entry represents the RNA recognition motif 4 (RRM4) of Nop4 from Saccharomyces cerevisiae. Nop4 is an essential nucleolar protein involved in processing and maturation of 27S pre-rRNA and biogenesis of 60S ribosomal subunits. Nop4 has four RNA recognition motifs (RRMs).
