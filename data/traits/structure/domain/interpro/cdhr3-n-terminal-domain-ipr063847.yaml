identifier: InterPro:IPR063847
label: "CDHR3, N-terminal domain"
definition: >-
  This entry represents the first extracellular domain found in cadherin-related family member 3 (CDHR3) in vertebrates. This domain is located at the N-terminal, upstream of the other cadherin domains ( ). CDHR3 acts as the receptor for human rhinovirus C. This N-terminal domain directly binds the rhinovirus C capsid proteins VP1, VP2 and VP3; mutagenesis of residues within this domain abolishes virus binding. Genetic variants in CDHR3 are associated with susceptibility to early childhood asthma with severe exacerbations.
