identifier: InterPro:IPR014720
label: "Double-stranded RNA-binding domain"
definition: >-
  In contrast to other RNA-binding domains, the about 65 amino acids long dsRBD domain has been found in several proteins that specifically recognise double-stranded RNAs. The dsRBD domain is also known as DSRM (Double-Stranded RNA-binding Motif). dsRBD proteins are mainly involved in posttranscriptional gene regulation, for example, by preventing the expression of proteins or by mediating RNAs localisation. This domain is also found in RNA editing proteins. Interaction of the dsRBD with RNA is unlikely to involve the recognition of specific sequences. Nevertheless, multiple dsRBDs may be able to act in combination to recognise the secondary structure of specific RNAs (i.e. Staufen). NMR analysis of the third dsRBD of Drosophila Staufen has revealed an α-β-β-β-α structure. This domain is found in Ribonuclease 3 and related proteins.
