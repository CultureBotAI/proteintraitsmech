identifier: InterPro:IPR060022
label: "Large ribosomal subunit protein uL15, C-terminal domain"
definition: >-
  This entry represents the C-terminal in large ribosomal subunit protein uL15 found in epsilonproteobacteria. uL15 is a component of the 50S ribosomal subunit and binds to 23S rRNA. The protein is approximately 133 amino acids and belongs to the universal ribosomal protein uL15 family. It contains an N-terminal disordered region (residues 1-62) that may be involved in RNA binding or ribosome assembly. The protein plays a structural role in ribosome function and is essential for protein synthesis.
