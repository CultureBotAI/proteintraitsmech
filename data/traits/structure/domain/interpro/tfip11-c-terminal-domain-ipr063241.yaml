identifier: InterPro:IPR063241
label: "TFIP11, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 65 residues found in TFIP11 (tuftelin-interacting protein 11) and related GCFC domain-containing proteins in eukaryotes. This domain follows the GCFC domain ( ). The full-length TFIP11 protein is a splicing factor involved in spliceosome disassembly, with DHX15 interaction mediated by the N-terminal region. The specific function of this C-terminal domain remains to be determined.
