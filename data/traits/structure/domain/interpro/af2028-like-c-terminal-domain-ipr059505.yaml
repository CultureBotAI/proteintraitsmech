identifier: InterPro:IPR059505
label: "AF2028-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of AF2028-like proteins found in methanogenic and hyperthermophilic archaea. The proteins are predicted to be membrane-associated, containing multiple transmembrane helices. The function of this domain remains to be determined.
