identifier: InterPro:IPR030829
label: "Quinoprotein relay system zinc metallohydrolase 2"
definition: >-
  This entry represent a domain found in a group of putative Zn metallohydrolases, which share homology with the sulfate metabolism associated protein SoxH, Bacillus cereus beta-lactamase II (see PDB:1bc2), and, more distantly, hydroxyacylglutathione hydrolase (glyoxalase II). Proteins containing this domain occur in genomes with both PQQ biosynthesis and a PQQ-dependent (quinoprotein) dehydrogenase that has a motif of two consecutive Cys residues ( ). The Cys-Cys motif is associated with electron transfer by specialised cytochromes such as c551. All these genomes also include a fusion protein ( ) whose domains resemble SoxY and SoxZ from thiosulfate oxidation. A conserved Cys in this fusion protein aligns to the Cys residue in SoxY that carries sulfur cycle intermediates. In many genomes, the genes for PQQ biosynthesis enzymes, PQQ-dependent enzymes, their associated cytochromes, and protein in this entry are clustered. Note that one to three closely related Zn metallohydrolases may occur; this entry represents a specific clade among them. Some proteins in this entry have a short additional N-terminal domain with four conserved Cys residues.
