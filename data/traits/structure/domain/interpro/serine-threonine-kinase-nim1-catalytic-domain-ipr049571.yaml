identifier: InterPro:IPR049571
label: "Serine/threonine kinase NIM1, catalytic domain"
definition: >-
  This entry represents the serine/threonine kinase (STK) domain present in the NIM1K family. STKs catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. NIM1K ( ) is a widely-expressed kinase belonging to the AMP-activated protein kinase (AMPK) subfamily. Although present in most tissues, NIM1K kinase activity is only observed in the brain and testis. NIM1K is capable of autophosphorylating and activating itself, but may be present in other tissues in the inactive form. The physiological function of NIM1K has yet to be elucidated.
