identifier: InterPro:IPR026800
label: "Dedicator of cytokinesis protein 3, DHR2 domain"
definition: >-
  DOCK3, also called modifier of cell adhesion (MOCA), is an atypical guanine nucleotide exchange factor (GEF) that lacks the conventional Dbl homology (DH) domain. DOCK3 is a specific GEF for Rac. It regulates N-cadherin dependent cell-cell adhesion, cell polarity, and neuronal morphology. It promotes axonal growth by stimulating actin polymerization and microtubule assembly. DOCK3 is linked to Alzheimer disease due to its interaction with presenilin proteins and ability to stimulate Tau/MAPT phosphorylation. This entry represents the DHR-2 domain of DOCK3, which contains the catalytic GEF activity for Rac. DOCK family members are evolutionarily conserved guanine nucleotide exchange factors (GEFs) for Rho-family GTPases. DOCK proteins are required during several cellular processes, such as cell motility and phagocytosis. The N-terminal SH3 domain of the DOCK proteins functions as an inhibitor of GEF, which can be relieved upon its binding to the ELMO1-3 adaptor proteins, after their binding to active RhoG at the plasma membrane. DOCK family proteins are categorised into four subfamilies based on their sequence homology: DOCK-A subfamily (DOCK1/180, 2, 5), DOCK-B subfamily (DOCK3, 4), DOCK-C subfamily (DOCK6, 7, 8), DOCK-D subfamily (DOCK9, 10, 11). All DOCKs contain two homology domains: the DHR-1 (Dock homology region-1), also called CZH1 (CED-5, Dock180, and MBC-zizimin homology 1), and DHR-2 (also called CZH2 or Docker).
