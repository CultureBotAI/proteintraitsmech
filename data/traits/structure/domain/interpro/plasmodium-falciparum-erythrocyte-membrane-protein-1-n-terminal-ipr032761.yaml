identifier: InterPro:IPR032761
label: "Plasmodium falciparum erythrocyte membrane protein 1, N-terminal"
definition: >-
  This entry represents a domain found in the most variable part of the variant surface antigen family member from Plasmodium falciparum, the erythrocyte membrane protein-1 (PfEMP1). PfEMP1 is an important target for protective immunity and is implicated in the pathology of malaria through its ability to adhere to host endothelial receptors.
