identifier: InterPro:IPR060087
label: "BEGAIN-like, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain from human brain-enriched guanylate kinase-associated protein (BEGAIN). This domain is involved in protein-protein interactions and may contribute to the structural organisation of the postsynaptic density (PSD). The coiled-coil domain is found in vertebrates and is likely involved in mediating protein interactions within synaptic complexes. This domain is also found in mouse Tight junction-associated protein 1 (Tjap1), which pays a role in regulating the structure of the Golgi apparatus. Brain-enriched guanylate kinase-associated protein (BEGAIN) interacts with postsynaptic density protein PSD-95/SAP90 and may be involved in the organization of the components of synaptic junctions. BEGAIN interacts with DLG4 and DLGAP1 to form a ternary complex and is localised to cytoplasm and membrane as a peripheral membrane protein. The protein is brain-enriched and may sustain the structure of the postsynaptic density. Tight junction-associated protein 1 (also known as Pilt) is a family of eukaryotic tight junction-proteins. Pilt is a component of TJs (Tight junctions) rather than AJs (Adhesin junctions). TJs function as a barrier preventing solutes and water from passing freely through the paracellular pathway. TJs consist of transmembrane proteins (claudin, occludin, and JAM) plus many peripheral membrane proteins and cell polarity molecules. Pilt is a novel peripheral membrane protein which is incorporated into TJs after TJ strands are formed, thereby the name Pilt for 'protein incorporated later into TJs'. Pilt binds to the guanylate-kinase region of hDlg/SAP97 (disk large homologue/synapse-associated protein 97).
