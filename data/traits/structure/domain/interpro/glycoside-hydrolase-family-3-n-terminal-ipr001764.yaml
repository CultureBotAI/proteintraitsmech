identifier: InterPro:IPR001764
label: Glycoside hydrolase, family 3, N-terminal
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 3 comprises enzymes with a number of known activities; beta-glucosidase ( ); beta-xylosidase ( ); N-acetyl beta-glucosaminidase ( ); glucan beta-1,3-glucosidase ( ); cellodextrinase ( ); exo-1,3-1,4-glucanase ( ). These enzymes are two-domain globular proteins that are N-glycosylated at three sites. This domain is often N-terminal to the glycoside hydrolase family 3, C-terminal domain .
