identifier: InterPro:IPR057600
label: "TORTIFOLIA1/SINE1-2, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal of TORTIFOLIA1/SPIRAL2, SPIRAL2-like (SP2L) and related sequences such as SINE1/2, which function during stomatal dynamics induced by light-dark transitions and abscisic acid (ABA), that requires F-actin reorganisation. TORTIFOLIA1/SPIRAL2 and SPIRAL2-like (SP2L) from Arabidopsis regulate the orientation of cortical microtubules and the direction of organ growth. TORTIFOLIA1-like protein 1 (also known as SPIRAL2) may regulate katanin-based microtubule (MT) severing. During virus infection, it may stabilise MT crossovers to support the formation and intercellular spread of the viral RNA complexes.
