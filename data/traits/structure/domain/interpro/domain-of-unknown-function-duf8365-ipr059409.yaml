identifier: InterPro:IPR059409
label: "Domain of unknown function DUF8365"
definition: >-
  This domain is found in uncharacterised fungal proteins. It is predicted to fold into a two layer α/β structure composed of an antiparallel β-sheet and three α-helices packed on one side. It contains several highly conserved cysteine residues predicted to form disulfide bonds.
