identifier: InterPro:IPR056892
label: "AtTam37, zinc finger domain"
definition: >-
  This domain is found in the AtTam37 (also known as Anu7, ) from Arabidopsis thaliana and related proteins. AtTam37 is an essential component of the chloroplast import motor. It serves as a molecular chaperone within the AtYcf2-FtsHi complex. The domain represented by this entry contains four highly conserved pairs of cysteine residues which are involved in the coordination of two zinc ions.
