identifier: InterPro:IPR020602
label: "GTP cyclohydrolase I domain"
definition: >-
  GTP cyclohydrolase I ( ) catalyses the biosynthesis of formic acid and dihydroneopterin triphosphate from GTP. This reaction is the first step in the biosynthesis of tetrahydrofolate in prokaryotes, of tetrahydrobiopterin in vertebrates, and of pteridine-containing pigments in insects. The comparison of the sequence of the enzyme from bacterial and eukaryotic sources shows that the structure of this enzyme has been extremely well conserved throughout evolution. This entry represents a common fold found in GTP cyclohydrolase I.
