identifier: InterPro:IPR049125
label: "Fanconi-associated nuclease 1-like, winged-helix domain"
definition: >-
  This entry represents the WH domain of FAN1 and similar proteins mainly from eukaryotes and proteobacteria. Fanconi-associated nuclease 1 (FAN1) is a DNA structure-specific nuclease involved in the processing of DNA interstrand crosslinks (ICLs). It maintains genomic stability and prevents tissue decline in several organs. This protein possesses preferential endonuclease activity toward 5' flap structures. FAN1 is present in most eukaryotes and some bacterial sequences. It consists of four characterised domains: UBZ, SAP, TPR and VRR nuclease ( ). However, monocellular eukaryote and bacterial homologues lack the UBZ domain. The N-terminal helical domain of FAN1 can be subdivided in a winged-helix (WH) DNA-binding domain, represented in this entry, and a SAP domain (bacterial and eukaryotic ).
