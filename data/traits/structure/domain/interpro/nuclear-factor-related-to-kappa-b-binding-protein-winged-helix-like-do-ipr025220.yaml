identifier: InterPro:IPR025220
label: "Nuclear factor related to kappa-B-binding protein, winged helix-like domain"
definition: >-
  This winged helix-like domain is found in nuclear factor related to kappa-B-binding (NFRKB) protein. This winged helix-like domain is however not involved in DNA binding but is instead thought to be involved in protein-protein interactions. NFRKB is a putative regulatory component of the chromatin remodelling INO80 complex which is involved in transcriptional regulation, DNA replication and probably DNA repair.
