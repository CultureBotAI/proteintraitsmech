identifier: InterPro:IPR057244
label: "GAIN, subdomain B"
definition: >-
  This entry represents the entire subdomain B of GAIN. The ~320-residue GAIN domain is an ancient domain that exists in primitive ancestor organisms, and is conserved in all aGPCRs and all PKD1-related proteins. Functionally, the GAIN domain is both necessary and sufficient for autoproteolysis, suggesting an autoproteolytic mechanism whereby the overall GAIN domain fine-tunes the chemical environment. In contrast to most other autoproteolytic domains that cause the release of the cleaved mature protein, autoproteolysis of the GAIN domain does not lead to the dissociation of the cleaved extracellular sequences containing the GAIN domain from the membrane-embedded regions of the protein. The GAIN domain forms a tightly associated heterodimer upon proteolysis. Cleavage at the GAIN domain is not a feature that all GAIN domain-containing receptors possess and the GAIN domain likely has other functions (such as interacting with ligands or transmembrane helices) in addition to the autoproteolysis function. The conservation of the primary sequence of the GAIN domain decreases from the C terminus to the N terminus, and the GPS motif is the most conserved region of the domain. The N-terminal subdomain A of the GAIN domain is composed of a variable number of α-helices (6, 5 or 3), while the C-terminal subdomain B consists of a twisted β-sandwich including 13 β-strands and 2 small α-helices. The autocatalytic scissile bond in the GPS of the GAIN domain is positioned at a sharply kinked loop between the last two β-strands of the GAIN domain and lies close to the core of the protein away from the surface. Autoproteolysis cleaves the C-terminal β-strand from the rest of the domain. The C-terminal β-strand of the GAIN domain corresponds to the "Stachel peptide" (also called "tethered a…
