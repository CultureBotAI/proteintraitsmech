identifier: InterPro:IPR057659
label: "CEP152, CEP63 binding coiled coil"
definition: >-
  This coiled-coil domain is found in the human centrosomal protein 152 kDa (CEP152) and homologues. It interacts with the coiled-coil region of the centrosomal protein 63 kDa (CEP63). Both proteins cooperatively form a heterotetrameric α-helical bundle. This complex functions in conjunction with its neighbouring hydrophobic motifs and self-assemble into a higher-order cylindrical architecture capable of recruiting downstream components, including Plk4, a key regulator for centriole duplication.
