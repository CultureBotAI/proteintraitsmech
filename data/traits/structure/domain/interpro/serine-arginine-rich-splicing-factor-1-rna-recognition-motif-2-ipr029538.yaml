identifier: InterPro:IPR029538
label: "Serine/arginine-rich splicing factor 1, RNA recognition motif 2"
definition: >-
  Serine/arginine-rich (SR) proteins constitute a conserved family of RNA-binding proteins with roles in both constitutive and alternative splicing. Typically, SR proteins contain an N-terminal RNA-binding domain and a C-terminal RS domain that acts to promote protein-protein interactions. This entry represents the second RNA recognition motif (RRM2) of serine/arginine-rich splicing factor 1 (SRSF1 or SF2/ASF). SF2/ASF regulates constitutive and alternative splicing. It has also been shown to regulate diverse aspects of gene regulation, including mRNA stability, translation, and transcription. SF2/ASF is upregulated in several human tumours, including lung, colon, kidney, liver, pancreas and breast tumours.
