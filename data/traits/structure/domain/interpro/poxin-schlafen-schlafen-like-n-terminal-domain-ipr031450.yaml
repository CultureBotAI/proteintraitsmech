identifier: InterPro:IPR031450
label: "Poxin-Schlafen/Schlafen-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of Schlafen and Schlafen-like proteins such B3 protein from Orthopoxvirus and poxin-Schlafen from Cowpox virus. It is a nuclease responsible for viral evasion of host cGAS-STING innate immunity.
