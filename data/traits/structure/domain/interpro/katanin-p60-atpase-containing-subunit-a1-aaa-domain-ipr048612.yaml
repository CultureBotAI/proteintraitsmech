identifier: InterPro:IPR048612
label: "Katanin p60 ATPase-containing subunit A1, AAA domain"
definition: >-
  This entry represents the AAA domain of human Katanin p60 ATPase-containing subunit A1 (KATNA1) and similar sequences from animals. Katanin p60 ATPase-containing subunit A1 (KTNA1) is the catalytic subunit of the Katanin complex which is severs microtubules in an ATP-dependent manner, and is implicated in multiple aspects of microtubule dynamics. In addition to the p60 catalytic ATPase subunit, Katanin contains an accessory subunit (p80 or p80-like). The microtubule-severing activity of the ATPase is essential for female meiotic spindle assembly, and male gamete production; and the katanin complex severing microtubules is under tight regulation during the transition from the meiotic to mitotic stage to allow proper embryogenesis. This group of proteins belongs to the RecA-like NTPase family.
