identifier: InterPro:IPR061416
label: "Serine-rich glycoprotein adhesin, prefix domain"
definition: >-
  This entry represents a Limosilactobacillus-restricted N-terminal non-repetitive sequence region shared by proteins with extensive serine-rich repeat regions, all likely to function as adhesins. This region contains a variant form of the KxYKxGKxW motif ( ) followed by a region related to serine-rich glycoprotein adhesins of the Streptococci.
