identifier: InterPro:IPR058903
label: "YLPM1-like, spectrin repeat"
definition: >-
  This entry represents a spectrin repeat found in human YLP motif-containing protein 1 (YLPM1) and similar animal sequences. YLPM1 plays a role in the reduction of telomerase activity during differentiation of embryonic stem cells by binding to the core promoter of TERT and controlling its down-regulation.
