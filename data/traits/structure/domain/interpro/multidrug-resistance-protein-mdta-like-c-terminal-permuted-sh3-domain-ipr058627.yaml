identifier: InterPro:IPR058627
label: "Multidrug resistance protein MdtA-like, C-terminal permuted SH3 domain"
definition: >-
  This domain is found in a group of bacterial periplasmic membrane fusion proteins (MFPs) that are components of the RND tripartite drug efflux pumps, including Multidrug resistance protein MdtA and Macrolide export protein MacA. MFPs bridge the outer membrane factor and an inner membrane transporter. The most characterised MFP, Multidrug efflux pump subunit AcrA, connects the outer membrane factor TolC and the resistance-nodulation-division-type efflux transporter AcrB, which is a major multidrug efflux pump in Escherichia coli. Another member MexA, a Pseudomonas aeruginosa homologue of AcrA, is a component of the tripartite multidrug efflux system MexAB-OprM which is a major factor for antibiotic resistance by exporting a large variety of antimicrobial compounds. The domain represented by this entry folds into an open barrel with a circularly permuted topology of SH3-like barrels. This domain is involved in interactions with efflux pump membrane transporter.
