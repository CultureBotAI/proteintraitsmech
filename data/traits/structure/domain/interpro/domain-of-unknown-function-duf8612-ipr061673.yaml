identifier: InterPro:IPR061673
label: "Domain of unknown function DUF8612"
definition: >-
  This domain is found in uncharacterised prokaryotic proteins. In most of these proteins this domain is flanked by a P-loop ATPase-like domain from the N-termini and by Restriction endonuclease-like domain at the C-termini. The domain represented by this entry has significant to known winged helix domains.
