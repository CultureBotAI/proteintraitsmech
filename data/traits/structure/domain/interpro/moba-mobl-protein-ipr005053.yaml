identifier: InterPro:IPR005053
label: "MobA/MobL protein"
definition: >-
  This entry represents a domain found at the N terminus of MobA in Escherichia coli, and MobL in Thiobacillus ferrooxidans (Acidithiobacillus ferrooxidans), as well as in conjugal transfer protein TraA. MobA and MobL are mobilisation proteins, which are essential for specific plasmid transfer.
