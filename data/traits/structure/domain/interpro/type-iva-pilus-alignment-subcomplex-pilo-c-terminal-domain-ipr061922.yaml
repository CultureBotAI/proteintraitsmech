identifier: InterPro:IPR061922
label: "Type IVa pilus alignment subcomplex PilO, C-terminal domain"
definition: >-
  This entry represents the C-terminal periplasmic domain of PilO, a component of the type IVa pilus (T4P) alignment subcomplex. PilO is an inner membrane protein found in bacteria with type IV pili, which mediate motility, adhesion, DNA uptake, and biofilm formation. PilO contains a cytoplasmic N-terminal region, a single transmembrane segment, a coiled-coil domain, and this C-terminal globular domain with a ferredoxin-like fold. The C-terminal domain forms the lower periplasmic ring in the type IVa pilus machine basal body. PilO forms heterodimers with the structurally similar PilN protein, and this heterodimerisation is essential for type IV pilus function. The periplasmic domains of PilN and PilO together form a cage-like structure that spans from the inner membrane through the periplasm, linking the cytoplasmic motor proteins to the outer membrane secretin complex via the lipoprotein PilP. This alignment subcomplex is proposed to sense pilus retraction signals and transmit conformational changes from the periplasm to the cytoplasmic ATPases, thereby regulating the transition between pilus extension and retraction.
