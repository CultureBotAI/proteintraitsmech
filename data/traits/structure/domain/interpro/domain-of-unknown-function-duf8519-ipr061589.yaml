identifier: InterPro:IPR061589
label: "Domain of unknown function DUF8519"
definition: >-
  This entry represents a domain of unknown function found in spirochaetes. The domain is approximately 100-130 residues in length and is found C-terminal to a heptaprenyl diphosphate synthase domain ( ). The family shows distant sequence similarity to the CbiQ domain ( ), a protein involved in cobalt transport. The function of this domain remains to be determined.
