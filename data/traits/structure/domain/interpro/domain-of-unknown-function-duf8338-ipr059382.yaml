identifier: InterPro:IPR059382
label: "Domain of unknown function DUF8338"
definition: >-
  This domain is found in a group of uncharacterised proteins mainly from Alveolata lineage. It contains several highly conserved cysteine residues that are predicted to form disulfide bonds. In many proteins this domain is followed by a helix which is predicted as a transmembrane.
