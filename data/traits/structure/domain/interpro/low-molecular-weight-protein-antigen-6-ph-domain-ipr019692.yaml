identifier: InterPro:IPR019692
label: "Low molecular weight protein antigen 6, PH domain"
definition: >-
  This entry represents a domain found in prokaryotic proteins, mainly from Actinomycetales, including Low molecular weight protein antigen 6 from Mycobacterium tuberculosis (CFP-6,). The domain, previously known as DUF2581, has a bacterial type PH domain structure.
