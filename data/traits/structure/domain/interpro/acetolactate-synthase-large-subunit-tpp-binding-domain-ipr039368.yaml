identifier: InterPro:IPR039368
label: "Acetolactate synthase large subunit, TPP binding domain"
definition: >-
  This entry represents the thiamine pyrophosphate (TPP) binding domain found in the acetohydroxyacid synthase (AHAS) subfamily members. AHAS catalyzes the condensation of two molecules of pyruvate to give the acetohydroxyacid, 2-acetolactate. 2-Acetolactate is the precursor of the branched chain amino acids, valine and leucine. AHAS also catalyzes the condensation of pyruvate and 2-ketobutyrate to form 2-aceto-2-hydroxybutyrate in isoleucine biosynthesis. In addition to requiring TPP and a divalent metal ion as cofactors, AHAS requires FAD.
