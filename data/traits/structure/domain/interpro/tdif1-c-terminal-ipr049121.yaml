identifier: InterPro:IPR049121
label: TdIF1, C-terminal
definition: >-
  This domain is found in deoxynucleotidyltransferase terminal- interacting protein 1 from humans (TdIF1) ( ) and similar proteins conserved from nematodes to mammals. TdIF1 is part of a histone deacetylase complex that is upregulated during mitosis and is associated with cyclin A. It is organised into two domains. This entry represents the C-terminal domain, which adopts a structure related to the SKI/SNO/DAC domain ( ) ( ) and is involved in the interaction with both DNA and nucleosomes.
