identifier: InterPro:IPR045819
label: "Tetratricopeptide repeat protein 7, N-terminal"
definition: >-
  This is the N-terminal domain of TTC7, a protein that forms the regulatory subunit of the PI4KIIIalpha complex (also known as PI4KA). This complex is composed of PI4KIIIalpha, TTC7 and FAM126A and catalyses the first step in plasma membrane phosphoinositide synthesis. This TTC7 N-terminal domain contains basic residues suitable for interaction with the acidic inner leaflet of the plasma membrane and is required for localising the active site near its substrate. TTC7 acts as a bridge between PI4KA and EFR3B-FAM126A, via direct interactions. ERF3B is not part of the complex but contributes to its recruitment to the membrane.
