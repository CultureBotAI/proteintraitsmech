identifier: InterPro:IPR049127
label: "TECR-like, N-terminal domain"
definition: >-
  This entry represents the ubiquitin-like domain found at the N-terminal of Very-long-chain enoyl-CoA reductase (also known as TECR or synaptic glycoprotein SC2) from animals. TECR is a synaptic glycoprotein that catalyses the fourth reaction in the synthesis of very long-chain fatty acids (VLCFA). This domain is also found in the trans-2,3-enoyl-CoA reductase-like (TECRL) protein, also known as steroid 5-alpha-reductase 2-like 2 protein (SRD5A2L2). TECRL is associated with life-threatening inherited arrhythmias displaying features of both long QT syndrome (LQTS) and catecholaminergic polymorphic ventricular tachycardia (CPVT).
