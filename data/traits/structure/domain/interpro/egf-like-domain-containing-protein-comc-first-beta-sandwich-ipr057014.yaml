identifier: InterPro:IPR057014
label: "EGF-like domain-containing protein ComC, first beta-sandwich"
definition: >-
  This entry represents the first β-sandwich domain found in EGF-like domain containing protein ComC from amoebas. This protein regulates aggregation, inhibiting lagC and activating lagD expression. The function of this domain is unknown.
