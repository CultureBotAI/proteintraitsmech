identifier: InterPro:IPR059816
label: "Rv1265-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of uncharacterised proteins from actinomycetes, including Rv1265 from M. tuberculosis, MT1303 from M. tuberculosis CDC 1551, and Mb1296 from M. bovis. The Rv1265 protein from M. tuberculosis H37Rv has been detected by mass spectrometry, confirming its expression. Subcellular localisation studies suggest association with the peptidoglycan-based cell wall and plasma membrane. The function of these proteins and this N-terminal domain remains to be determined.
