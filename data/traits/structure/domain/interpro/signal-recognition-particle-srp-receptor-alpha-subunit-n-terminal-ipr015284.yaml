identifier: InterPro:IPR015284
label: Signal recognition particle (SRP) receptor alpha subunit, N-terminal
definition: >-
  This domain (SRX domain) is found in the signal recognition particle receptor (SR) subunit alpha, also known as Srp101 in budding yeast, which consist of a central six-stranded anti-parallel β-sheet sandwiched by helix alpha1 on one side and helices alpha2-alpha4 on the other. The SRX domain of SRalpha can bind SRbeta, and the affinity of GDP bound SRbeta for SRX is several orders of magnitude lower compared to the GTP bound state. Srp101 is a homologue of the human SRalpha (signal recognition particle receptor alpha subunit), which is part of the SR complex involved in targeting the nascent secretory proteins to the endoplasmic reticulum membrane system. Similar to human SRslpha, Srp101 also forms SR complex with the SRbeta subunit, Srp102.
