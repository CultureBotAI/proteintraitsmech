identifier: InterPro:IPR018574
label: Structure-specific endonuclease subunit Slx4, HTH domain
definition: >-
  The Slx4 protein is a heteromeric structure-specific endonuclease found from fungi to mammals. Slx4 is a regulatory subunit of the SLX1-SLX4 structure-specific endonuclease that resolves DNA secondary structures generated during DNA repair and recombination. The SLX1-SLX4 complex has a preference for 5'-flap structures, and promotes symmetrical cleavage of static and migrating Holliday junctions (HJs).
