identifier: InterPro:IPR049804
label: "Choice-of-anchor L domain"
definition: >-
  This entry represents the choice-of-anchor L domain primarily identified in Flavobacteriales. It spans about 220 amino acid residues and constitutes an extracellular domain frequently accompanied by a C-terminal T9SS type B sorting domain ( ).
