identifier: InterPro:IPR003342
label: "ArnT-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in glycosyltransferase family 39 members, including Undecaprenyl phosphate-alpha-4-amino-4-deoxy-L-arabinose arabinosyl transferase (ArnT), Protein O-mannosyl-transferase 2 (pomt2) and Dolichyl-phosphate-mannose--protein mannosyltransferase proteins. This domain contains an all-helical fold. Dolichyl-phosphate-mannose-protein mannosyltransferase proteins belong to the glycosyltransferase family 39 ( ) and are responsible for O-linked glycosylation of proteins. They catalyse the reaction: Dolichyl phosphate D-mannose + protein ->dolichyl phosphate + O-D-mannosyl-protein. The transfer of mannose to seryl and threonyl residues of secretory proteins is catalysed by a family of protein mannosyltransferases in Saccharomyces cerevisiae coded for by seven genes (PMT1-7). Protein O-glycosylation is essential for cell wall rigidity and cell integrity and this protein modification is vital for S. cerevisiae. Undecaprenyl phosphate-alpha-4-amino-4-deoxy-L-arabinose arabinosyl transferase proteins belong to the glycosyltransferase family 83 ( ). They catalyse the reaction: 4-amino-4-deoxy-alpha-L-arabinopyranosyl di-trans,octa-cis-undecaprenyl phosphate + lipid IV(A) = lipid II(A) + di-trans,octa-cis-undecaprenyl phosphate. The biosynthesis of disaccharides, oligosaccharides and polysaccharides involves the action of hundreds of different glycosyltransferases. These enzymes catalyse the transfer of sugar moieties from activated donor molecules to specific acceptor molecules, forming glycosidic bonds. A classification of glycosyltransferases using nucleotide diphospho-sugar, nucleotide monophospho-sugar and sugar phosphates ([ec:2.4.1.-]) and related proteins into distinct sequence-based families has been described. This classificati…
