identifier: InterPro:IPR034105
label: Sm-like protein Lsm3
definition: >-
  This entry represents Sm-like protein Lsm3. It can be found in the nuclear Lsm2-8 complex or in the cytoplasmic Lsm1-7 complex. The Lsm2-8 complex associates with multiple snRNP complexes containing the U6 snRNA (U4/U6 snRNP, U4/U6.U5 snRNP, and free U6 snRNP). It binds and stabilizes the 3'-terminal poly(U) tract of U6 snRNA and facilitates the assembly of U4-U6 di-snRNP and U4-U6-U5 tri-snRNP. The Lsm1-7 complex associates with deadenylated mRNA and promotes decapping in the 5'-3' mRNA decay pathway. The Sm and the Lsm proteins, characterised by the Sm-domain, have RNA-related functions. The Sm heptamer ring associates with four (U1, U2, U4, U5) snRNPs, while Lsm2-8 heptamer is part of the U6 snRNP. Another Lsm heptameric complex, Lsm1-7, which differs from Lsm2-8 by one Lsm protein, functions in mRNA decapping, a crucial step in the mRNA degradation pathway.
