identifier: InterPro:IPR062950
label: "Cellobiose phosphorylase-like, insertion domain 1"
definition: >-
  This entry represents an insertion domain (Dom 1) found within the catalytic domain of glycoside hydrolase family 149 (GH149) beta-(1-3) glucan phosphorylases, annotated as Cellobiose phosphorylase proteins. The domain is approximately 60 residues in length and is inserted near the N-terminal of the (alpha/alpha)6 catalytic domain. enzymes catalyse the reversible phosphorolysis of beta-(1-3)-gluco-oligosaccharides and are found in microalgae of class Euglenophyceae and gram-negative bacteria. Structural analysis shows no significant similarity to any known protein domains. GH149 contains a second insertion domain (Dom 2) located C-terminal to this domain. The function of this domain remains to be determined.
