identifier: InterPro:IPR056577
label: Gp84-like
definition: >-
  This entry represents a domain found in phage proteins, including the Gp84 protein from Mycobacteriophage L5 ( ). An AlphaFold model of a member ( ) has a compact fold of one α-helix followed by a three stranded β-sheet. The function of these proteins is unknown.
