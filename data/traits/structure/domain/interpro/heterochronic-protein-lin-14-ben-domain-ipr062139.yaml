identifier: InterPro:IPR062139
label: "Heterochronic protein LIN-14, BEN domain"
definition: >-
  This entry represents the BEN domain of heterochronic protein LIN-14 from nematodes. LIN-14 is a transcription factor that controls stage-specific cell fate determination during larval development in Caenorhabditis elegans. The BEN domain mediates sequence-specific DNA binding to the consensus sequence 5'-[CT]GGA[AG]-3' in target gene promoters. Despite lacking sequence similarity to canonical BEN domains in conventional searches, the domain exhibits structural homology to BEN domains such as those in human BEND3 and Drosophila insensitive. LIN-14 regulates developmental timing by repressing genes including ins-33 and nlp-45.
