identifier: InterPro:IPR006667
label: SLC41A/MgtE, integral membrane domain
definition: >-
  This entry represents the integral membrane region of SLC41 transporter proteins. SLC41 family of divalent cation transporters includes SLC41A1/2/3 from eukaryotes and MgtE from prokaryotes. MgtE is the prokaryote homologue of SLC41A1 magnesium transporter which adopts a homodimeric architecture with five transmembrane domains in the C terminus and cytosolic N terminus domains. Bacterial family members have one copy of this region while archaeal and eukaryotic sequences have two.
