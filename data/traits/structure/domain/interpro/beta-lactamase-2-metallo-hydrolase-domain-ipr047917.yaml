identifier: InterPro:IPR047917
label: "Beta-lactamase 2, metallo-hydrolase domain"
definition: >-
  This entry represents the MBL-fold metallo-hydrolase domain of Beta-lactamase 2 from Bacillus cereus (also known as BcII) and similar sequences. MBLs (class B of the Ambler beta-lactamase classification) have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. BcII is a chromosome-encoded B1 MBL. B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile.
