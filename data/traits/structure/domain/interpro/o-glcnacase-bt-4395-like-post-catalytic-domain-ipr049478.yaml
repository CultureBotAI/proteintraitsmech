identifier: InterPro:IPR049478
label: "O-GlcNAcase BT_4395-like, post-catalytic domain"
definition: >-
  This is a helical domain found after the catalytic domain of a goup of bacterial enzymes from the Glycoside hydrolase family 84, including O-GlcNAcase BT_4395 from Bacteroides thetaiotaomicron, which can hydrolyse the glycosidic link of O-GlcNAcylated proteins.
