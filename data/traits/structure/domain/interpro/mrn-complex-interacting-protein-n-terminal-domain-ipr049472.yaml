identifier: InterPro:IPR049472
label: "MRN complex-interacting protein, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of human MRN complex-interacting protein (MRNIP) and similar proteins from eukaryotes. MRNIP plays a role in preventing the accumulation of damaged DNA in cells. It associates with the MRE11-RAD50-NBS1 (MRN) damage-sensing complex and is rapidly recruited to sites of DNA damage. Phosphorylation of a serine promotes nuclear localisation of MRNIP.
