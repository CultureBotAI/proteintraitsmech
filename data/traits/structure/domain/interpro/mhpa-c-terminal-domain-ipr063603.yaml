identifier: InterPro:IPR063603
label: "MhpA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of 3-(3-hydroxy-phenyl)propionate/3-hydroxycinnamic acid hydroxylase from Escherichia coli (MhpA) and similar proteins found predominantly in Actinomycetes and Proteobacteria. The domain is approximately 120-165 amino acids in length. MhpA ( ) catalyses the insertion of one atom of molecular oxygen into position 2 of the phenyl ring of 3-(3-hydroxyphenyl)propionate (3-HPP) and hydroxycinnamic acid (3HCI). The specific function of this domain remains to be determined.
