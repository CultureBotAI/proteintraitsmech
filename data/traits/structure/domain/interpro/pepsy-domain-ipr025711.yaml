identifier: InterPro:IPR025711
label: "PepSY domain"
definition: >-
  This domain is likely to have a protease inhibitory function. The name is derived from peptidase (M4) and YpeB of Bacillus subtilis. This domain is found in the propeptide of members of the MEROPS peptidase family M4 (clan MA(E)), which contains the thermostable thermolysins ( ), and related thermolabile neutral proteases (bacillolysins) ( ) from various species of Bacillus. It is also in many non-peptidase proteins, including Bacillus subtilis YpeB protein -a regulator of SleB spore cortex lytic enzyme -and a large number of eubacterial and archaeal cell wall-associated and secreted proteins which are mostly annotated as 'hypothetical protein'.
