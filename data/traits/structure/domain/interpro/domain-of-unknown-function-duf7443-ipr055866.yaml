identifier: InterPro:IPR055866
label: "Domain of unknown function DUF7443"
definition: >-
  This entry represents an uncharacterised protein family found in bacteriophages. The function of this family is currently unknown. Members of this family are typically around 90-100 amino acids in length. The family includes proteins from various phage species infecting bacteria such as Salmonella, Klebsiella, and Proteus. Some members of this family contain disordered regions, particularly in their C-terminal portions. Conserved basic and acidic residues are present in many family members, which may be functionally important. This entry represents the globular N-terminal domain of these proteins.
