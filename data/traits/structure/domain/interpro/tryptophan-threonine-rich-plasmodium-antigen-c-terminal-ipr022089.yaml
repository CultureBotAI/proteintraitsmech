identifier: InterPro:IPR022089
label: "Tryptophan/threonine-rich plasmodium antigen, C-terminal"
definition: >-
  This domain is found in the C-terminal region of the surface antigen of malarial Plasmodium species. This antigen is currently being targeted for use as part of a subunit vaccine against Plasmodium falciparum, the main species involved in causing human malaria.
