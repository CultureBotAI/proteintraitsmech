identifier: InterPro:IPR034990
label: "hnRNPM, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of hnRNP M. Heterogeneous nuclear ribonucleoproteins (hnRNPs) bind directly to nascent RNA polymerase II transcripts and play an important role in both transcript-specific packaging and alternative splicing of pre-mRNAs. hnRNP M proteins are an abundant group of hnRNPs that have been shown to bind avidly to poly(G) and poly(U) RNA homopolymers. hnRNP M family members are able to induce exon skipping and promote exon inclusion, suggesting that the proteins may broadly contribute to the fidelity of splice site recognition and alternative splicing regulation.
