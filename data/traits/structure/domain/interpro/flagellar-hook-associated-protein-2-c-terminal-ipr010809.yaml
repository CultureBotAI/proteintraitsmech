identifier: InterPro:IPR010809
label: "Flagellar hook-associated protein 2, C-terminal"
definition: >-
  The flagellar hook-associated protein 2 (HAP2 or FliD) forms the distal end of the flagella, and plays a role in mucin specific adhesion of the bacteria. This alignment covers the C-terminal region of the flagellar hook-associated protein 2.
