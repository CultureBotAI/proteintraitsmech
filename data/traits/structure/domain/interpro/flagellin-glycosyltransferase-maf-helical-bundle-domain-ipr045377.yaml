identifier: InterPro:IPR045377
label: "Flagellin glycosyltransferase Maf, helical bundle domain"
definition: >-
  This entry represents the helical bundle domain found in flagellin glycosyltransferase Maf. Maf plays a role the glycosylation and formation of the bacterial flagellum. The X-ray structure analysis revealed that the central domain of Maf exhibits similarity to sialyltransferases .
