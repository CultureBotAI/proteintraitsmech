identifier: InterPro:IPR059711
label: "TP_0021, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of TP_0021 proteins. This domain adopts a helix-extended loop-helix (HeH) fold structure. The specific function of this domain remains to be determined. This domain can be found in predicted Helicase XPB/Ssl2 N-terminal domain-containing protein.
