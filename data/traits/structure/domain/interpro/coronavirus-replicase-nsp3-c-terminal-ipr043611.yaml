identifier: InterPro:IPR043611
label: "Coronavirus replicase NSP3, C-terminal"
definition: >-
  Non-structural protein NSP3 is a multi-domain protein, the largest product of coronavirus ORF1a which encodes the poyprotein 1a/1ab (pp1a/1ab). NSP3 is released from pp1a/1ab by the papain-like protease domain(s), which is (are) part of NSP3 itself. NSP3 plays many roles in the viral life cycle. It can act as a scaffold protein to interact with itself and to bind other viral Nsps or host proteins. In particular, Nsp3 is essential for the formation of the the replication/ transcription complex (RTC). The RTC associates with host ER membranes producing convoluted membranes and double-membrane vesicles. It is also involved in post-translational modifications of host proteins to antagonise its innate immune response. NSP3 comprises up to 16 different domains and regions, their organisation differs between coronaviruses (CoV). However, eight domains and two transmembrane regions are conserved in all known CoVs: the ubiquitin-like domain 1 (Ubl1), the Glu-rich acidic domain (hypervariable region), a macrodomain (X domain), the ubiquitin-like domain 2 (Ubl2), the papain-like protease 2 (PL2pro, depending on the CoV there are one or two PLpro), the NSP3 ectodomain (3Ecto, also called "zinc-finger domain"), as well as the domains Y1, Y2 and Y3 of unknown functions. The Y1 domain is conserved in all viruses of the order Nidovirales, while Y2 and Y3 are conserved in all coronaviruses. The three domains from the Y region (Y1 to Y3) are located at the cytosolic side of the ER. The level of their conservation is close to that for the enzymatic domains of Nsp3 and exceeds nonenzymatic ones. From the consistently high conservation of Y1, Y2, and Y3, it has been hypothesize that Y1 to Y3 may form a single functional unit with a conserved enzymatic function. This entry represents the C-…
