identifier: InterPro:IPR063571
label: "At3g27390, N-terminal"
definition: >-
  This entry represents the N-terminal domain of a group of uncharacterised sequences from plants, including At3g27390 from A. thaliana. According to structure predictions, this domain may adopt a helical structure consisting of six helices, five relatively long (around 45 aa) and a shorter one (around 20 aa).
