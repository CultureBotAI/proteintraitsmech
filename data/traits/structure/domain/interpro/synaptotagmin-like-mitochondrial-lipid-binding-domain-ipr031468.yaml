identifier: InterPro:IPR031468
label: "Synaptotagmin-like mitochondrial-lipid-binding domain"
definition: >-
  Membrane contacts sites (MCSs), regions where two organelles come in close proximity to one another, act as molecular hubs for the exchange of small molecules (e.g. lipids) and signals (e.g. calcium ions). Synaptotagmin-like Mitochondrial lipid-binding Proteins (SMP) domains are exclusively found at MCSs between different organelles such as endoplasmic reticulum (ER)- Mitochondrion, ER-Plasma membrane (PM) and Nucleus-Vacuole junctions. The SMP domain is able to homo- or heterodimerize, harbors lipids in a hydrophobic cavity and mediates lipid transfer between the two adjacent bilayers independently of membrane fusion and fission reactions. SMP proteins are widespread amongst eukaryotic species with a particular enrichment in plants and features suggestive of species-specific functional variations. SMP domain- containing proteins have been classified into four broad groups: C2 domain synaptotagmin-like, PH domain-containing HT-008, PDZK8 and mitochondrial protein families. The SMP domain consists of 6 β-strands and 3 helices arranged to form a barrel whose interior is lined almost exclusively by hydrophobic residues. The resulting elongated barrel-shaped cylindrical structure harbors a lateral opening and a central hydrophobic cavity where phospholipids can bind. It dimerizes in an anti-parallel fashion to form a cylinder traversed by a deep hydrophobic groove. The SMP domain belongs to the TULIP (for TUbular LIPid-binding) protein superfamily of lipid transfer proteins.
