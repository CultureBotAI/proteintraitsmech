identifier: InterPro:IPR056365
label: "NAD-specific glutamate dehydrogenase, second domain"
definition: >-
  This domain is found in yeast NAD-specific glutamate dehydrogenase (GDH2, also known as DHE2) and similar fungal proteins. GDH2 is involved in the degradation of glutamate to ammonia and alpha-ketoglutarate. This domain is found after that is predicted to adopt an α/β globular structure with some similarity to the ACT domains of the bacterial large glutamate dehydrogenase and it is probably distantly related to these and other ACT-like domains.
