identifier: InterPro:IPR040985
label: "Nup54, C-terminal interacting domain"
definition: >-
  The mammalian nuclear pore complex (NPC) conducts nucleocytoplasmic transport and contains multiple copies of nucleoporins (nups). This is the C-terminal interacting domain found on Nup54. Nup45 is a splice variant of Nup58 with an identical α-helical region. Nup54 along with Nup62 and Nup58 are essential for nuclear transport. The C-terminal part of the α-helical region of Nup54 interacts with a C-terminal part of the α-helical region of Nup58. Interestingly, this region appears in two distinct conformations: a single helix and a helix-loop-helix, termed 'straight' and 'bent'. Whereas the straight conformer consists of a 34 residues long α helix (residues 460-493), the bent conformer is composed of two α helices, each 13 residues long, connected by a central loop (N helix, residues 460-472; C helix, residues 477-489).
