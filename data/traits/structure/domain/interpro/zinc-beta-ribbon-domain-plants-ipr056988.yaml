label: "Zinc beta-ribbon domain, plants"
definition: >-
  This domain is found in a group of uncharacterised proteins from plants. It is predicted to adopt a zinc β-ribbon fold and contains a pair of highly conserved CxxC sequence motifs. This domain is frequently found in combination with .
