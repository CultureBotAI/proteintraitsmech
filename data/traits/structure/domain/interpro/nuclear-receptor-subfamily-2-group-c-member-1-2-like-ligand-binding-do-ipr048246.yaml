identifier: InterPro:IPR048246
label: "Nuclear receptor subfamily 2 group C member 1/2-like, ligand binding domain"
definition: >-
  This entry represents the C-terminal ligand binding domain (LBD) of human Nuclear receptor subfamily 2 group C members 1 and 2 (NR2C1/2, also known as TR2 and TR4 for testicular receptor 2 and 4) and similar animal sequences. NR2C1 and 2 interact with specific DNA sites upstream of the target gene and modulate the rate of transcriptional initiation. They are orphan nuclear receptors whose physiological ligand is as yet unidentified. NR2C1 is abundantly expressed in the androgen-sensitive prostate. NR2C2 transcripts are expressed in many tissues, including central nervous system, adrenal gland, spleen, thyroid gland, and prostate. It has been shown that human NR2C1 binds to a wide spectrum of natural hormone response elements (HREs) with distinct affinities suggesting that it may cross-talk with other gene expression regulation systems. The genes responding to these proteins include genes that are regulated by retinoic acid receptor, vitamin D receptor, and peroxisome proliferator-activated receptor. NR2C1/2 binds to HREs as dimers. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, TR2-like receptors have a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a flexible hinge and a C-terminal ligand binding domain (LBD). This domain is composed of two C4-type zinc fingers. Each zinc finger contains a group of four Cys residues which coordinates a single zinc atom.
