identifier: InterPro:IPR049195
label: "NAD(+)--protein-arginine ADP-ribosyltransferase Tre1-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of NAD(+)--protein-arginine ADP-ribosyltransferase Tre1 from Pseudomonas putida, the toxic component of a contact-dependent interbacterial competition system (also called effector-immunity systems). This protein acts by ADP-ribosylating a number of target proteins in target cells. This domain is also found associated with or toxin domains such as in other proteobacterial proteins and centrally located in the uncharacterised protein slr0273 from Synechocystis sp and similar bacterial sequences. It is a likely integral membrane domain that contains a glycine-zipper motif.
