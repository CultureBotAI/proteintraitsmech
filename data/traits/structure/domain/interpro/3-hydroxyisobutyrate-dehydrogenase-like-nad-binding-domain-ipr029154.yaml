identifier: InterPro:IPR029154
label: "3-hydroxyisobutyrate dehydrogenase-like, NAD-binding domain"
definition: >-
  3-Hydroxyisobutyrate is a central metabolite in the valine catabolic pathway, and is reversibly oxidised to methylmalonate semi-aldehyde by a specific dehydrogenase belonging to the 3-hydroxyacid dehydrogenase family. This entry represents the NAD-binding domain of 3-hydroxyisobutyrate dehydrogenase related sequences, such as 6-phosphogluconate dehydrogenase, that adopts a Rossmann fold.
