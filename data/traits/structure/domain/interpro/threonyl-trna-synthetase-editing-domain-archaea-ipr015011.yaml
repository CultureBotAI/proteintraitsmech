identifier: InterPro:IPR015011
label: "Threonyl-tRNA synthetase, editing domain, archaea"
definition: >-
  Archaea-specific editing domain of threonyl-tRNA synthetase, with marked structural similarity to D-amino acids deacylases found in eubacteria and eukaryotes. This domain can bind D-amino acids, and ensures high fidelity during translation. It is especially responsible for removing incorrectly attached serine from tRNA-Thr. The domain forms a fold that can be defined as two layers of β-sheets (a three-stranded sheet and a five-stranded sheet), with two α-helices located adjacent to the five-stranded sheet.
