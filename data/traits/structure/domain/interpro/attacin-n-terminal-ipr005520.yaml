identifier: InterPro:IPR005520
label: "Attacin, N-terminal"
definition: >-
  This domain is found in attacin and sarcotoxin, but not diptericin (which shares similarity to the C-terminal region of attacin). All these proteins are insect antibacterial proteins which are induced by the fat body and subsequently secreted into the hemolymph where they act synergistically to kill the invading microorganism.
