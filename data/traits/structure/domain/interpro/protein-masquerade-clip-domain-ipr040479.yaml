identifier: InterPro:IPR040479
label: "Protein masquerade, clip-domain"
definition: >-
  The clip domain is a structural/regulatory unit in many arthropod serine proteases. The clip domain superfamily also includes serine protease homologs (SPHs). This entry describes clip domains in the SPHs (CLIP subfamily A), which belong to group-3. SPHs usually carry between 1 to 5 clip domains. One of the most prominent family members is masquerade (mas). Deletion in drosophila models lead to defects in somatic muscle attachment and in the formation of the nervous system during embryogenesis.
