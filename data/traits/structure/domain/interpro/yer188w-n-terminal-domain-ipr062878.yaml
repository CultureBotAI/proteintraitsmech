identifier: InterPro:IPR062878
label: "YER188W, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the uncharacterised protein YER188W from Saccharomyces cerevisiae. YER188W is induced under anaerobic growth conditions. The function of this domain remains to be determined.
