identifier: InterPro:IPR034168
label: "Peptidyl-prolyl cis-trans isomerase E, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of peptidyl-prolyl cis-trans isomerase E (PPIE, also known as Cyp33). PPIE is a nuclear RNA-binding cyclophilin with an N-terminal RNA recognition motif (RRM), and a C-terminal PPIase domain. Cyp33 possesses RNA-binding activity and preferentially binds to polyribonucleotide polyA and polyU, but hardly to polyG and polyC. It binds specifically to mRNA, which can stimulate its PPIase activity. Moreover, Cyp33 interacts with the third plant homeodomain (PHD3) zinc finger cassette of the mixed lineage leukemia (MLL) proto-oncoprotein and a poly-A RNA sequence through its RRM domain. It further mediates downregulation of the expression of MLL target genes HOXC8, HOXA9, CDKN1B, and C-MYC, in a proline isomerase-dependent manner. Cyp33 also possesses a PPIase activity that catalyzes cis-trans isomerization of the peptide bond preceding a proline, which has been implicated in the stimulation of folding and conformational changes in folded and unfolded proteins. The PPIase activity can be inhibited by the immunosuppressive drug cyclosporin A.
