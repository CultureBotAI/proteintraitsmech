identifier: InterPro:IPR046890
label: "YEATS-Like-Associating Three TM"
definition: >-
  This is a conserved, three transmembrane helix-containing domain found fused to certain prokaryotic YEATS domain. Genome context displacement patterns predict an effector role for this domain, as a membrane-perforating, cell-suicide response-enacting domain.
