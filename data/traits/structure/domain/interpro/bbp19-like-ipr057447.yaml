identifier: InterPro:IPR057447
label: Bbp19-like
definition: >-
  This entry represents a domain found in uncharacterised phage proteins that is composed of three α helices. There is some evidence from structure predictions that this proteins may homodimerise. These dimers are predicted to form a ring of eight dimers. This entry includes the Bbp19 protein (also known as Endopeptidase, ) from Bordetella BPP-1 phage.
