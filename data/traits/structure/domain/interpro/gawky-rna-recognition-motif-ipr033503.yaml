identifier: InterPro:IPR033503
label: Gawky, RNA recognition motif
definition: >-
  Protein Gawky (also known as GW182) plays a role in RNA-mediated gene silencing by micro-RNAs (miRNAs). It is a component of cytoplasmic mRNA processing bodies required for early Drosophila development. GW182 interacts with AGO1, and this interaction is essential for silencing by miRNAs. It recruits the CCR4-NOT deadenylase complex through the interaction with PABPC1. This entry represents the C-terminal RNA recognition motif (RRM) of GW182.
