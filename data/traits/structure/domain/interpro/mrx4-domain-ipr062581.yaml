identifier: InterPro:IPR062581
label: "MRX4 domain"
definition: >-
  This entry represents a domain found towards the C-terminal end of MIOREX complex component 4 (MRX4). MRX4 is a component of MIOREX complexes, large expressome-like assemblies of ribosomes with factors involved in all the steps of post-transcriptional gene expression. The protein associates with the mitochondrial ribosome and is localised to mitochondrial membranes. MRX4 contains a mitochondrial transit peptide and a transmembrane helix. The protein is induced during the M phase of the cell cycle. This domain is found in fungi and is part of the mitochondrial gene expression machinery.
