identifier: InterPro:IPR032817
label: "Mon2, C-terminal"
definition: >-
  Mon2 proteins are found from fungi to plants, to human and is a scaffold protein involved in multiple aspects of endo membrane trafficking. The C-terminal region is essential for Mon2 activity. This domain contains a TPR-like fold.
