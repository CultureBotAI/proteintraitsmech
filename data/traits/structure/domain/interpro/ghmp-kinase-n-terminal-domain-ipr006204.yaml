identifier: InterPro:IPR006204
label: GHMP kinase N-terminal domain
definition: >-
  The galacto- ( ), homoserine ( ), mevalonate ( ) and phosphomevalonate ( ) kinases contain, in their N-terminal section, a conserved domain with a Gly/Ser-rich region which is involved in the binding of ATP. This group of kinases has been called 'GHMP' (from the first letter of their substrates).
