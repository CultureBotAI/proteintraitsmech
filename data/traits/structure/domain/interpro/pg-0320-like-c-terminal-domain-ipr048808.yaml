identifier: InterPro:IPR048808
label: "PG_0320-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of PG_0320 from Porphyromonas gingivalis ( ) and similar bacterial sequences. This domain is usually found associated with DUF1573. It is functionally uncharacterised.
