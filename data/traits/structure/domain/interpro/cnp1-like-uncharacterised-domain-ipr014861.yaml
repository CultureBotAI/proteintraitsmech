identifier: InterPro:IPR014861
label: "CNP1-like, uncharacterised domain"
definition: >-
  This entry represents an uncharacterised domain in Cryptic neisserial protein 1 (CNP1) from Neisseria gonorrhoeae and similar bacterial proteins. The function of this protein remains to be characterised. CNP1 (cryptic neisserial protein) has been expressed in E. coli and shown to be localised periplasmicly. This domain contains an α/β fold.
