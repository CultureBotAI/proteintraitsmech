identifier: InterPro:IPR025715
label: "RNA annealing protein YRA2, C-terminal"
definition: >-
  This LDXXLDAYM region (where X is any amino acid) is duplicated in the C-terminal of the chromatin target of PRMT1 protein (also known as Fop), which are chromatin-associated proteins that co-localise with facultative heterochromatin and are critical for oestrogen-dependent gene activation. The region also occurs in other proteins, including RNA annealing protein YRA2, THO complex subunit 4 and RNA and export factor-binding protein 2.
