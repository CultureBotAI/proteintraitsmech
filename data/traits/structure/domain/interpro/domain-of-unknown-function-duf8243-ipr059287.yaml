identifier: InterPro:IPR059287
label: "Domain of unknown function DUF8243"
definition: >-
  This domain is found in uncharacterised proteins. It contains two pairs of highly conserved cysteine residues that may coordinate a metal ion. This domain is predicted to fold into a structure that is probably distantly related to domains with beta-tent fold (CL0080). The zinc ribbon in this domain is grafted into alpha/beta core.
