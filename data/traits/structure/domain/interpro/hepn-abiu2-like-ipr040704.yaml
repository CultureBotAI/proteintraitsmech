identifier: InterPro:IPR040704
label: "HEPN, AbiU2-like"
definition: >-
  Abortive infection (Abi) systems are anti-bacteriophage systems that limit the spread of infection. The primary components of 6 Abi systems define distinct groups of HEPN domains, namely the AbiA-C-terminal domain (AbiA-CTD), AbiD (including AbiD1), AbiF, AbiJ, AbiU2 and AbiV. This entry represents the AbiU2-like HEPN domain.
