identifier: InterPro:IPR041474
label: "HTH-type transcriptional repressor NicS, C-terminal"
definition: >-
  This domain can be found at the C terminus of NicS, a HTH-type transcriptional repressor for the nicAB operon, encoding the upper aerobic nicotinate degradation pathway. The C-terminal domain can be found in a number of different TetR transcription regulator proteins. It is multi-helical and is interlocked in the homodimer with the helix-turn-helix (HTH) DNA-binding domain.
