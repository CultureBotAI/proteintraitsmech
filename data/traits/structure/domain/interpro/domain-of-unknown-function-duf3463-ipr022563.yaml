label: "Domain of unknown function DUF3463"
definition: >-
  This functionally uncharacterised domain is found in bacteria and archaea, which is about 140 amino acids in length and is found C-terminal to . It contains two conserved sequence motifs: CTPWG and PCYL. This domain is associated with hopanoid biosynthesis associated radical SAM proteins.
