identifier: InterPro:IPR059503
label: "Rv1289-like domain"
definition: >-
  This entry represents a domain found in the uncharacterised protein Rv1289 from Mycobacterium tuberculosis and similar sequences from bacteria. The domain is approximately 210 amino acids in length. Its function remains to be determined.
