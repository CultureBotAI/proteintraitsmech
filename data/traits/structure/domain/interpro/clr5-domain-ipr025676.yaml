identifier: InterPro:IPR025676
label: "Clr5 domain"
definition: >-
  This domain is found at the N terminus of the Clr5 protein, which has been shown to be involved in silencing in fission yeast. This domain has been found to often be associated with proteins that contain ankyrin repeats and large regions of disordered sequence.
