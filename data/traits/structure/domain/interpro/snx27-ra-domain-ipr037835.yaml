identifier: InterPro:IPR037835
label: "SNX27, RA domain"
definition: >-
  Sorting nexin-27 (SNX27) belongs to the sorting nexin family, which contains a conserved PX (phox homology) domain that may be responsible for binding to specific phosphoinositides. SNX27 also possesses an PDZ (DHR) domain, a Ras-associating domain and a FERM-like domain with an atypical tertiary structure. SNX27 is a core component of the SNX27-retromer, a multiprotein complex composed of SNX27, the WASH complex and the retromer complex. It specifically binds and directs sorting of a subset of transmembrane proteins containing a PDZ-binding motif at the C terminus. Its PDZ domain mediates binding to the retromer complex via direct interaction with VPS26 (VPS26A or VPS26B), while its PX domain mediates binding to phosphatidylinositol 3-phosphate (PtdIns(3P)) and localization to early endosome membranes. This entry represents the RAS-associated (RA) domain of SNX27.
