identifier: InterPro:IPR060202
label: MJ0207/MJ1342
definition: >-
  This entry represents MJ0207 and MJ1342 uncharacterised proteins found predominantly in thermophilic archaea and some bacteria. This entry is found in Thermofilaceae, Methanocaldococcaceae, Desulfurococcaceae, and Ignicoccus, with some bacterial members. The proteins are approximately 114-151 amino acids in length. The function of this protein remains to be determined. MJ0207 contains a similar fold to the NO signalling/Golgi transport ligand-binding domain superfamily ( ).
