identifier: InterPro:IPR049235
label: "Domain of unknown function DUF6832"
definition: >-
  This domain is functionally uncharacterised, predominantly found in eukaryotic sequences mostly from Alveolates (phylum Apicomplexa). There are several highly conserved motifs: FGFNSFWS, FKxxxYD, PRxxY and YRC. Predictions of its structure suggest it folds into seven α-helices.
