identifier: InterPro:IPR035049
label: "EAT-2, SH2 domain"
definition: >-
  This entry represents the SH2 domain of EAT-2 (EWS-Fli1-activated transcript-2) and ERT (EAT-2-related transducer). The X-linked lymphoproliferative syndrome (XLP) gene encodes SAP (also called SH2D1A/DSHP) a protein that consists of a 5-residue N-terminal, a single SH2 domain, and a short 25-residue C-terminal tail. XLP is characterised by an extreme sensitivity to the Epstein-Barr virus. Both T and natural killer (NK) cell dysfunctions have been seen in XLP patients. SAP binds the cytoplasmic tail of Signaling lymphocytic activation molecule (SLAM), 2B4, Ly-9, and CD84.
