identifier: InterPro:IPR054718
label: "YhfS-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein YhfS from E.coli and similar bacterial sequences. This is an α/β domain commonly found in PLP-dependent enzymes.
