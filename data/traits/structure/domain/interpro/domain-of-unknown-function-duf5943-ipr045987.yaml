identifier: InterPro:IPR045987
label: "Domain of unknown function DUF5943"
definition: >-
  This presumed domain is functionally uncharacterised. It is found in proteobacteria and sporadically in archaea, and is approximately 100 amino acids in length. There are two conserved sequence motifs: NNH and RLS. This domain is often found to the N terminus of the 4-vinyl reductase (4VR) domain.
