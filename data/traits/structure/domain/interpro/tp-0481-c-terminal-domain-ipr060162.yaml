identifier: InterPro:IPR060162
label: "TP_0481, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TP_0481 proteins found in Treponema and related spirochaetes. The full-length protein is 477 amino acids and contains a single transmembrane helix at positions 107-129. TP_0481 is a membrane protein found in Treponema pallidum, the causative agent of syphilis. The function of this C-terminal domain remains to be determined. This domain also covers a middle region in proteins belonging to .
