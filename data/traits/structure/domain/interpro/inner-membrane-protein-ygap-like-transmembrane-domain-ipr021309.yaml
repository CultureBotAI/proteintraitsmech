identifier: InterPro:IPR021309
label: "Inner membrane protein YgaP-like, transmembrane domain"
definition: >-
  This entry represents a domain found in proteins from bacteria and archaea, including Inner membrane protein YgaP from Escherichia coli, a membrane protein with a rhodanese domain ( ) that may have sulfurtransferase activity. YgaP adopts a dimeric assembly. This entry represents the transmembrane domain. It consist of two slightly tilted α-helices.
