identifier: InterPro:IPR031772
label: "Tail knob protein gp9, N-terminal"
definition: >-
  This is the N-terminal domain of Tail knob protein gp9 from Bacillus phage phi29 and similar proteins from tailed bacteriophages and prokaryotic prophages. This protein blocks the end of the tube before DNA ejection while forming a channel perforating the host membrane in the process by adopting a hexameric tube structure with six flexible hydrophobic loops.
