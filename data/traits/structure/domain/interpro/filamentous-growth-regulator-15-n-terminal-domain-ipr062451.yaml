identifier: InterPro:IPR062451
label: "Filamentous growth regulator 15. N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of filamentous growth regulator proteins found in fungi. The domain is approximately 140 amino acids in length and is found N-terminal to C2H2 zinc finger domains. FGR15 is a probable transcription factor involved in the regulation of filamentous growth in Candida albicans. The protein is localised to the nucleus and is induced by caspofungin treatment. Disruption of FGR15 affects filamentous growth and leads to hypersensitivity to caspofungin. The specific function of this domain remains to be determined.
