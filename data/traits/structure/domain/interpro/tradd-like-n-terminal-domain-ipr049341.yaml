identifier: InterPro:IPR049341
label: "TRADD-like N-terminal domain"
definition: >-
  This is the RRM fold domain prototyped by the version at the N-terminal of the TRADD protein. The TRADD-N domain is widely present in bacterial conflict systems and in a spectacular diversity of counter-invader systems in metazoa, especially in aggregating marine invertebrates. The domain is predicted to function as a signalling bridge linking invader sensing and effector deployment in multidomain proteins. Metazoans have two broad families of TRADD-N domains, the NCOA6 and the TRADD/DEDD-2 families respectively that are named after the prototypic vertebrate proteins in which they are found.
