identifier: InterPro:IPR054409
label: "Amylopullulanase, X25 domain"
definition: >-
  X25 is a domain inserted in X45 domain of Bacillus acidopullulyticus pullulanase. This type of insertion is common in proteins containing X45-X25 pair. X25 domain itself is also found in tandem copies, such as in the highly modular amylopullulanase from Geobacillus stearothermophilus. It is likely that this domain is a carbohydrate-binding domain which targets mixed alpha-1,6/alpha-1,4 linked D-glucan polysaccharides such as pullulan.
