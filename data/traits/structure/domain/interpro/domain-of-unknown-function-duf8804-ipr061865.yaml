label: "Domain of unknown function DUF8804"
definition: >-
  This entry represents a C-terminal domain of approximately 100 residues found exclusively in Trichomonas (Parabasalia). This domain is found C-terminal to a KilA-N domain ( ). These proteins are present in numerous copies within the Trichomonas genome, suggesting lineage-specific gene family expansion. The function of this domain remains to be determined.
