identifier: InterPro:IPR034464
label: "PARP-10, RNA recognition motif 1 and 2"
definition: >-
  This entry represents the RNA recognition motif 1 and 2 (RRM1 and 2) of PARP-10, a novel oncoprotein c-Myc-interacting protein with poly(ADP-ribose) polymerase activity. It is localized to the nuclear and cytoplasmic compartments. In addition to the PARP activity, PARP-10 is also involved in the control of cell proliferation by inhibiting c-Myc- and E1A-mediated cotransformation of primary cells. It contains two N-terminal RNA recognition motifs (RRMs), two overlapping C-terminal domains composed of a glycine-rich region and a region with homology to catalytic domains of PARP enzymes (PARP domain). In addition, PARP-10 contains two ubiquitin-interacting motifs (UIM).
