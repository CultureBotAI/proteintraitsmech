identifier: InterPro:IPR008640
label: "Trimeric autotransporter adhesin YadA-like, head domain"
definition: >-
  This entry represents the head domain of YadA. This domain is composed almost solely of β-sheets making a novel nine coiled left-handed parallel β-roll (LPBR), surrounded by a partly disordered (N)-terminal random coil and a C-terminal neck region, which consists of a random coil and a short helix at the start of the stalk domain. The Yersinia adhesin A (YadA) is a trimeric autotransporter adhesin of enteric yersiniae. It consists of three major domains: a head mediating adherence to host cells, a stalk involved in serum resistance, and an anchor that forms a membrane pore and is responsible for the autotransport function.
