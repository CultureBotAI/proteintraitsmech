identifier: InterPro:IPR063657
label: "CXorf58/MFI domain"
definition: >-
  This entry represents a conserved domain found in CXorf58 proteins and at the N-terminal of MFI (Melanoma-derived leucine zipper extranuclear factor) proteins in mammals. CXorf58 is an uncharacterised protein of approximately 330-370 amino acids that shows tissue-specific expression in testis. The human protein ( ) is located on chromosome X and contains disordered regions at the C-terminal end. MFI proteins are also uncharacterised and share sequence similarity with CXorf58 proteins, suggesting they may be related family members. The proteins have been detected by proteomics and CXorf58 shows interaction with GDE1 (glycerophosphodiester phosphodiesterase 1). The function of this domain remains to be determined.
