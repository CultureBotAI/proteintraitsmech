identifier: InterPro:IPR017888
label: "CYC/TB1, R domain"
definition: >-
  Members of the TCP family of transcription factors have so far only been found in plants, where they are implicated in processes related to cell proliferation. It appears that TCP domain (see ) protein have been recruited during evolution to control cell division and growth in various developmental processes. The TCP proteins fall into two subfamilies, one including CYC and TB1 and the other including the PCFs. Most members of the CYC/TB1 subfamily have an R domain, predicted to form a coiled coil that may mediate protein-protein interactions. The R domain is rich in polar residues (arginine, lysine and glutamic acid) and is predicted to form a hydrophilic α-helix. Some proteins known to contain an R domain are listed below: Antirrhinum majus (Garden snapdragon) cycloidea (CYC). It is involved in the control of floral symmetry, a character that has changed many times during plant evolution Zea mays (Maize) teosinte branched 1 (TB1). It controls the developmental of apical dominance that contributed to the evolution of modern day maize from its wild ancestor teosinte Arabidopsis thaliana (Mouse-ear cress) TCP2 and TCP3, which correlate with actively dividing regions of the floral meristem
