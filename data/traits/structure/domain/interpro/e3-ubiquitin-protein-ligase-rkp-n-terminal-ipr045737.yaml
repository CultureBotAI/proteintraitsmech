identifier: InterPro:IPR045737
label: "E3 ubiquitin-protein ligase RKP, N-terminal"
definition: >-
  This domain represents the N-terminal region of the E3 ubiquitin-protein ligase RKP and other B30.2/SPRY domain-containing proteins from plants. RKP is an E3 ubiquitin-protein ligase that promotes the ubiquitination and proteasomal degradation of KRP1 and KRP2.
