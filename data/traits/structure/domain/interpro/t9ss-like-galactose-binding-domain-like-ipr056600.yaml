identifier: InterPro:IPR056600
label: "T9SS-like, galactose binding domain-like"
definition: >-
  This entry represents a galactose binding domain-like that is found up to six times in a variety of bacterial cell surface proteins that usually have a C-terminal type 9 secretion signal domain. The domain contains four conserved cysteines. AlphaFold models suggest that the first and third form one disulphide bond and the second and fourth form a second disulphide bond.
