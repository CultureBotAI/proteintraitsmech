identifier: InterPro:IPR063747
label: "F36G3.1, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain found in uncharacterised protein the uncharacterised protein F36G3.1 from Caenorhabditis elegans and similar sequences found in nematodes. The protein contains disordered regions at the N-terminal followed by this coiled-coil region and a small C-terminal domain. Coiled-coil domains typically mediate protein-protein interactions through their characteristic helical structure. The function of this specific coiled-coil domain remains to be determined.
