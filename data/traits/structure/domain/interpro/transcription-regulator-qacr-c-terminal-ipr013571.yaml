identifier: InterPro:IPR013571
label: Transcription regulator QacR, C-terminal
definition: >-
  This entry represents the C-terminal domain found in the multidrug-binding transcription regulator QacR ( ) from Staphylococcus aureus, which is a member of the TetR (tetracycline-resistance) transcriptional regulator family of proteins. QacR is able to bind various environmental agents, which include a number of cationic lipophilic compounds, and thus regulate the transcription of QacA ( ), a multidrug efflux pump. The C-terminal region of QacR contains a multifaceted, expansive drug-binding pocket, which is composed of several separate, but linked, binding sites. The C-terminal domains of QacR and TetR share a multi-helical, interlocking structure.
