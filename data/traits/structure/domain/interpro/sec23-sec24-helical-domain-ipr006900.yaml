identifier: InterPro:IPR006900
label: "Sec23/Sec24, helical domain"
definition: >-
  COPII (coat protein complex II)-coated vesicles carry proteins from the endoplasmic reticulum (ER) to the Golgi complex. COPII-coated vesicles form on the ER by the stepwise recruitment of three cytosolic components: Sar1-GTP to initiate coat formation, Sec23/24 heterodimer to select SNARE and cargo molecules, and Sec13/31 to induce coat polymerisation and membrane deformation. Sec23 p and Sec24p are structurally related, folding into five distinct domains: a β-barrel, a zinc-finger ( ), an α/β trunk domain ( ), an all-helical region, and a C-terminal gelsolin-like domain ( ). This entry describes the all-helical domain, which forms an approximately 105-residue segment with the C-terminal 30 residues. The linker between alpha-M and alpha-N contacts Sar1.
