identifier: InterPro:IPR021361
label: "Thoeris anti-defense 2-like domain"
definition: >-
  This entry represents Thoeris anti-defense 2 from Bacillus phage SP01 (Tad2) and similar sequences from tailed bacteriophages and bacterial prophagues. Tad2 is an anti-defence protein that counteracts the host Thoeris antiviral defence system. It sequesters the immune signalling molecules produced by Thoeris TIR-domain proteins in response to phage infection.
