identifier: InterPro:IPR047085
label: "Semaphorin 4F, Sema domain"
definition: >-
  Semaphorin-4F (Sem4F), which belongs to the class 4 transmembrane semaphorin family of proteins, plays a role in heterotypic cell-cell contacts, controls cell proliferation and suppresses tumorigenesis. In neurofibromatosis type 1 (NF1) patients, reduced Sem4F level disrupts Schwann cell/axonal interactions. Experiments using a yeast two-hybrid system show that the extreme C-terminal of Sema4F interacts with the PDZ domains of postsynaptic density protein SAP90/PSD-95, indicating possible functional involvement of Sem4F at glutamatergic synapses. A role for Sem4F in the injury response of intramedullary axotomized motoneuron has also been suggested. This entry represents the Sema domain found at the N-terminal of Sem4F and similar proteins from mammals. It contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module.
