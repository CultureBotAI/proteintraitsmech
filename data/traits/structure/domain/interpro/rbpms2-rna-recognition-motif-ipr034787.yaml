identifier: InterPro:IPR034787
label: "RBPMS2, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of RBPMS2, a paralogue of RNA-binding protein with multiple splicing (RBP-MS). RBPMS2 binds to and regulates mRNA expression of NOGGIN, the major inhibitor of the bone morphogenetic protein (BMP) pathway. It plays a role in the development and plasticity of digestive smooth muscle cells (SMCs). Like RBP-MS, RBP-MS2 contains an RNA recognition motif (RRM). A particular sequence motif (D-x-K-x-R-E-L-Y-L-L-F: residues 39-51) located in its RRM domain has been shown to be essential for its homodimerization, which is important for its function in the RBPMS2-dependent SMC dedifferentiation process.
