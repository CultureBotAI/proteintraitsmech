identifier: InterPro:IPR013216
label: "Methyltransferase type 11"
definition: >-
  This entry represents a methyltransferase domain found in a large variety of SAM-dependent methyltransferases including, but not limited to: Arsenite methyltransferase ( ) which converts arsenical compounds to their methylated forms Biotin synthesis protein bioC, which is involved in the early stages of biotin biosynthesis Arginine N-methyltransferase 1, an arginine-methylating enzyme which acts on residues present in a glycine and argine-rich domain and can methylate histones Hexaprenyldihydroxybenzoate methyltransferase ( ), a mitochondrial enzyme involved in ubiquinone biosynthesis A probable cobalt-precorrin-6Y C(15)-methyltransferase thought to be involved in adenosylcobalamin biosynthesis Sterol 24-C-methyltransferase ( ), shown to participate in ergosterol biosynthesis 3-demethylubiquinone-9 3-methyltransferase ( ) involved in ubiquinone biosynthesis Structural studies show that this domain forms the Rossman-like α-β fold typical of SAM-dependent methyltransferases. Methyltransferases (EC [ec:2.1.1.-]) constitute an important class of enzymes present in every life form. They transfer a methyl group most frequently from S-adenosyl L-methionine (SAM or AdoMet) to a nucleophilic acceptor such as oxygen leading to S-adenosyl-L-homocysteine (AdoHcy) and a methylated molecule. All these enzymes have in common a conserved region of about 130 amino acid residues that allow them to bind SAM. The substrates that are methylated by these enzymes cover virtually every kind of biomolecules ranging from small molecules, to lipids, proteins and nucleic acids. Methyltransferase are therefore involved in many essential cellular processes including biosynthesis, signal transduction, protein repair, chromatin regulation and gene silencing. More than 230 families of methyltransferas…
