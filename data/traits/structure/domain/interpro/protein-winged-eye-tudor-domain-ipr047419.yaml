identifier: InterPro:IPR047419
label: "Protein winged eye, Tudor domain"
definition: >-
  This entry represents the Tudor domain of WGE from Drosophila and similar sequences predominantly found in arthropods. This domain may be implicated in the interactions with methylated histone. Protein winged eye (WGE) acts in the determination of disk-specific identity, downstream of Hox genes. It is a factor that induces eye-to-wing transdetermination upon overexpression in eye imaginal discs. It induces various histone modifications and enhances the methylation of Lys9 on histone H3 (H3K9). This protein is homologous to human BAHCC1. These proteins consist of Tudor and BAH domains.
