identifier: InterPro:IPR025064
label: "Domain of unknown function DUF4005"
definition: >-
  This domain is found towards the C terminus of a number of plant IQ domain-containing proteins. These proteins may be involved in cooperative interactions with calmodulins or calmodulin-like proteins, and may associate with nucleic acids and regulate gene expression at the transcriptional or post-transcriptional level.
