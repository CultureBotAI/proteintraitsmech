identifier: InterPro:IPR012518
label: Ocellatin
definition: >-
  This family consists of the ocellatin family of antimicrobial peptides. Ocellatins are produced from the electrical-stimulated skin secretions of the South American frog, Leptodactylus ocellatus (Argus frog). The family consists of three structurally related peptides, ocellatin 1, ocellatin 2 and ocellatin 3. These peptides present haemolytic activity against human erythrocytes and are also active against Escherichia coli. This domain is found associated with the domain , which contains a signal peptide.
