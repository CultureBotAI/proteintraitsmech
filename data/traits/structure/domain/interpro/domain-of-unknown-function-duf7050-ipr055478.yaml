identifier: InterPro:IPR055478
label: "Domain of unknown function DUF7050"
definition: >-
  This domain is found N-terminal in a group of uncharacterised proteins mainly from plants. It shares a significant sequence similarity with the N-terminal domain of bHLH-MYC and R2R3-MYB transcription factors (Pfam:PF14215) and it is predicted to adopt similar structure.
