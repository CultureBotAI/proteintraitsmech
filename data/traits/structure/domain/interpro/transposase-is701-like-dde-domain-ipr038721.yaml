identifier: InterPro:IPR038721
label: "Transposase IS701-like, DDE domain"
definition: >-
  This domain is a member of the DDE endonuclease superfamily, which contain three carboxylate residues that are believed to be responsible for coordinating metal ions needed for catalysis. The catalytic activity of this enzyme involves DNA cleavage at a specific site followed by a strand transfer reaction. This domain can be found in the transposase for insertion sequence IS701 from Microchaete diplosiphon.
