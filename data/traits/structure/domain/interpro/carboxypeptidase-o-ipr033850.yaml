identifier: InterPro:IPR033850
label: "Carboxypeptidase O"
definition: >-
  Peptidase M14 carboxypeptidase (CP) O (CPO, also known as metallocarboxypeptidase C; MEROPS identifier M14.021; EC 3.4.17.) belongs to the carboxypeptidase A/B subfamily of the M14 family of metallocarboxypeptidases (MCPs). The M14 family are zinc-binding CPs which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. CPO releases acidic C-terminal residues. It is active at neutral pH and is membrane attached via a glycosylphosphatidinylinositol membrane anchor at the C terminus.
