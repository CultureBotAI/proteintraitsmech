identifier: InterPro:IPR037707
label: Phosphatidylinositol 3-kinase C2-gamma, catalytic domain
definition: >-
  This entry represents the catalytic domain in PI3-kinase C2-gamma. It generates phosphatidylinositol 3-phosphate (PtdIns3P) and phosphatidylinositol 3,4-bisphosphate (PtdIns(3,4)P2). PI3K-C2gamma is expressed in the liver, breast, and prostate. Phosphatidylinositol 3-kinase (PI3-kinases) can be divided into three main classes (I, II, and III), defined by their substrate specificity, regulation, and domain structure. Class I PI3-kinases are the only enzymes capable of converting PtdIns(4,5)P2 to the critical second messenger PtdIns(3,4,5)P3. Class I enzymes are heterodimers and exist in multiple isoforms consisting of one catalytic subunit (p110alpha, beta, gamma or delta) and one of several regulatory subunits (p85alpha, beta or gamma). They are further classified into class IA (alpha, beta and delta) and IB (gamma). Class IA enzymes contain an N-terminal p85 binding domain, a Ras binding domain, a lipid binding C2 domain, a PI3-kinase homology domain of unknown function, and a C-terminal ATP-binding catalytic domain. They associate with a regulatory subunit of the p85 family and are activated by tyrosine kinase receptors.
