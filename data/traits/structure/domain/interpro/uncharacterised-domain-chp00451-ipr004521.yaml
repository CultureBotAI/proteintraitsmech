identifier: InterPro:IPR004521
label: "Uncharacterised domain CHP00451"
definition: >-
  This uncharacterised domain is found a number of enzymes and uncharacterised proteins, often at the C terminus. It is found in some but not all members of a family of related tRNA-guanine transglycosylases (tgt), which exchange a guanine base for some modified base without breaking the phosphodiester backbone of the tRNA. It is also found in rRNA pseudouridine synthase, another enzyme of RNA base modification not otherwise homologous to tgt. It is found, again at the C terminus, in two putative glutamate 5-kinases. It is also found in a family of small, uncharacterised archaeal proteins consisting mostly of this domain.
