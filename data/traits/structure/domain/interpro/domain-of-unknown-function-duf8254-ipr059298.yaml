identifier: InterPro:IPR059298
label: "Domain of unknown function DUF8254"
definition: >-
  This domain is found in uncharacterised eukaryotic proteins. It share similarity with known CHORD domains and it is predicted to adopt similar structure. In some proteins it is found in combination with AAA+ domains . It contains several cysteine and histidine residues which are highly conserved and likely involved in metal coordination.
