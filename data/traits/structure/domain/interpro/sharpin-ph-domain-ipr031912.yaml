identifier: InterPro:IPR031912
label: "Sharpin, PH domain"
definition: >-
  This PH domain is found at the N terminus of sharpin and is involved in dimerisation. Sharpin is part of the LUBAC complex, a large multi-protein E3 ubiquitin ligase complex that catalyses the formation of linear ubiquitin chains and regulates immune and apoptopic signalling pathways.
