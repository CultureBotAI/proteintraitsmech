identifier: InterPro:IPR030100
label: "SWI/SNF complex subunit BRG1, ATP-binding"
definition: >-
  BRG1 (also know as SMARCA4 or BAF190A) is a core enzymatic subunit of the SWI/SNF complex, an ATP-dependent chromatin remodelling complex that regulates gene expression through regulating nucleosome remodelling. In humans BRG1 shares 73% sequence identity with hBRM (human Brahma) and has similar ATPase function in the SWI/SNF complex. BRG1 contains a conserved ATPase domain and a C-terminal bromodomain that may anchor the entire SWI/SNF complex to promoter nucleosomes. BRG1 may function as tumour suppressor. This entry represents the ATP-binding region of BRG1.
