identifier: InterPro:IPR037909
label: "SNX19, PX domain"
definition: >-
  Sorting nexins (SNXs) or phox homology (PX) domain-containing proteins are central regulators of cell trafficking and signalling. SNX19, like SNX13, SNX14, and SNX25, possesses two unique PX-associated domains, but lacks the G protein-coupled receptor signaling (RGS) domain present in the others. It plays a critical role in cartilage formation (chondrogenesis) and may be a protective factor against the progression of cartilage degradation in osteoarthritis. SNX19 is related to several diseases, including thyroid tumors and coronary heart disease. This entry represents the PX domain of SNX19.
