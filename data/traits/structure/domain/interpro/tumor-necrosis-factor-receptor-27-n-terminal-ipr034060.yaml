identifier: InterPro:IPR034060
label: "Tumor necrosis factor receptor 27, N-terminal"
definition: >-
  This entry represents the N-terminal domain of TNFRSF27/XEDAR. TNF-receptors are modular proteins. The N-terminal extracellular part contains a cysteine-rich region responsible for ligand-binding. This region is composed of small modules of about 40 residues containing 6 conserved cysteines; the number and type of modules can vary in different members of the family. TNFRSF27 (also known as ectodysplasin-A2 receptor (EDA2R), X-linked ectodermal dysplasia receptor (XEDAR), EDAA2R, and EDA-A2R) is a member of the TNFR superfamily that is recognised by ectodysplasin-A2 (EDA-A2), which is generated by alternative splicing of the EDA receptor (EDAR) ligand EDA-A1. It is highly expressed during embryonic development and binds to ectodysplasin-A2 (EDA-A2), playing a crucial role in the p53-signalling pathway. EDA2R is a direct p53 target that is frequently down-regulated in colorectal cancer tissues due to its epigenetic alterations or through the p53 gene mutations. Mutations in the EDA-A2/XEDAR signalling give rise to ectodermal dysplasia, characterised by loss of hair, sweat glands, and teeth. A non-synonymous SNP on EDA2R, along with genetic variants in human androgen receptor is associated with androgenetic alopecia (AGA).
