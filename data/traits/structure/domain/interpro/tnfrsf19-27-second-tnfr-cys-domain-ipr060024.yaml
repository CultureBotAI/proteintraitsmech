identifier: InterPro:IPR060024
label: "TNFRSF19/27, second TNFR Cys domain"
definition: >-
  This entry represents the second TNFR-Cys domain found in tumor necrosis factor receptor superfamily member 19/27 (TNFRSF19/27) and related proteins. This domain is located between the N-terminal extracellular TNFR-Cys repeat region and the large C-terminal cytoplasmic disordered region. TNFRSF19 is a single-pass type I membrane protein that can mediate activation of JNK and NF-kappa-B pathways and promote caspase-independent cell death. The protein interacts with TRAF proteins and is highly expressed in prostate tissue. While the full-length protein functions are characterised, the specific role of this domain remains to be determined. TNFRSF27 (also known as ectodysplasin-A2 receptor (EDA2R), X-linked ectodermal dysplasia receptor (XEDAR), EDAA2R, and EDA-A2R) is a member of the TNFR superfamily that is recognised by ectodysplasin-A2 (EDA-A2), which is generated by alternative splicing of the EDA receptor (EDAR) ligand EDA-A1. It is highly expressed during embryonic development and binds to ectodysplasin-A2 (EDA-A2), playing a crucial role in the p53-signalling pathway. EDA2R is a direct p53 target that is frequently down-regulated in colorectal cancer tissues due to its epigenetic alterations or through the p53 gene mutations.
