identifier: InterPro:IPR040989
label: "Major vault protein repeat domain 3"
definition: >-
  This domain is found in the major vault protein. The major vault protein is the major polypeptide component of a large cellular ribonuclear protein complex found in the cytoplasm of eukaryotic cells (known as vaults). Several roles for vaults have been proposed. Vault proteins have been associated with development of multi-drug resistance. They have also being implicated in the regulation of several cellular processes including transport mechanisms, signal transmission and immune responses.
