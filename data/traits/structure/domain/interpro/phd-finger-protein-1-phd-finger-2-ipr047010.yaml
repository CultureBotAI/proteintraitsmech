identifier: InterPro:IPR047010
label: "PHD finger protein 1, PHD finger 2"
definition: >-
  This entry represents the second PHD finger of PHF1. PHD finger protein 1 (PHF1) is a polycomb group (PcG) protein that plays a role in H3K27 methylation and Hox gene silencing. The Tudor domain of human PHF1 recognises both H3K36me3 and H3tK27me3. The interaction between PHF1 and H3K36me3 stabilises the nucleosome in a conformation in which the nucleosomal DNA is more accessible to DNA-binding regulatory proteins. PHF1 is also involved in the response to DNA double-strand breaks and acts as a positive regulator of the p53 pathway.
