identifier: InterPro:IPR004621
label: Methylenetetrahydrofolate reductase, catalytic domain, eukaryotes
definition: >-
  This entry represents the catalytic domain of methylenetetrahydrofolate reductases from eukaryotes. The enzyme activities methylenetetrahydrofolate reductase ( ) and 5,10-methylenetetrahydrofolate reductase (FADH) ( ) differ in that the former (assigned in many eukaryotes) is defined to use NADP+ as an acceptor, while the latter (assigned in many bacteria) is flexible with respect to the acceptor. Both convert 5-methyltetrahydrofolate to 5,10-methylenetetrahydrofolate. From a larger set of proteins assigned as one or the other, this family describes the subset of proteins found in eukaryotes, and currently designated methylenetetrahydrofolate reductase( ). This protein is an FAD-containing flavoprotein.
