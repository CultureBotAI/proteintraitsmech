identifier: InterPro:IPR049317
label: "Cyclin-D1-binding protein 1-like, N-terminal"
definition: >-
  This entry represents the N-terminal region of human Cyclin-D1-binding protein 1 (GCIP), which contains an helix-loop-helix domain, and its homologues in eukaryotes. GCIP, or Grap2 and cyclin-D-interacting protein (also Human homologue of murine maternal Id-like molecule (HHM)), is found in eukaryotes, and in the protein , residues 149-190 constitute a helix-loop-helix domain, residues 190-240 an acidic region, and 240-261 a leucine zipper domain. GCIP interacts with full-length Grap2 protein and with the COOH-terminal unique and SH3 domains (designated QC domain) of Grap2. It is potentially involved in the regulation of cell differentiation and proliferation through Grap2 and cyclin D-mediated signalling pathways. In mice, it is involved in G1/S-phase progression of hepatocytes, which in older animals is associated with the development of liver tumours. In vitro, it acts as an inhibitory HLH protein, for example, blocking transcription of the HNF-4 promoter. In its function as a cyclin D1-binding protein it is able to reduce CDK4-mediated phosphorylation of the retinoblastoma protein and to inhibit E2F-mediated transcriptional activity. GCIP has also been shown to have interact physically with Rad (Ras associated with diabetes), Rad being important in regulating cellular senescence. GCIP adopts a V-shaped conformation, with N and C-terminal five-helix bundles.
