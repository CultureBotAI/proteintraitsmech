identifier: InterPro:IPR047516
label: "Forkhead box protein M1, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXM1 and similar sequences mainly found in vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein M1 (FOXM1) is a forkhead transcription factor that regulates expression of cell cycle genes essential for DNA replication and mitosis during organ repair and cancer progression. It is also involved in DNA break repair, participating in the DNA damage checkpoint response. It is regulated by the mitotic kinase Polo-like kinase 1 (Plk1). It binds promoter regions with a preference for tandem repeats of a consensus 'TAAACA' recognition sequence. FOXM1 promotes transcription of PHB2.
