identifier: InterPro:IPR031780
label: "RIPOR1-3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of proteins of RIPO1-3 (also known as FAM65A, B and C). RIPOR2 (also known as PL48, FAM65B, C6orf32) is associated with cytotrophoblast and lineage-specific HL-60 cell differentiation. The N-terminal part of RIPOR2 was found to induce the formation of filopodia. RIPOR1 is a downstream effector protein for Rho-type small GTPases that plays a role in cell polarity and directional migration. It acts as an adapter protein, linking active Rho proteins to STK24 and STK26 kinases, and hence positively regulates Golgi reorientation in polarised cell migration upon Rho activation [ . It is involved in the subcellular relocation of STK26 from the Golgi to cytoplasm punctae in a Rho- and PDCD10-dependent manner upon serum stimulation.
