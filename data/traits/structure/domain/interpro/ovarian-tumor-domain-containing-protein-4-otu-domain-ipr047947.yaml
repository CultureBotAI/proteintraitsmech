identifier: InterPro:IPR047947
label: "Ovarian tumor domain-containing protein 4, OTU domain"
definition: >-
  This entry represents the OTU (ovarian tumor) domain of Deubiquitinating enzyme OTU4 from Arabidopsis thaliana, also called OTU domain-containing protein 4 and similar sequences from streptophytes. OTU4 is a deubiquitinase (DUB) or ubiquitin thiolesterase ( ) that catalyses the thiol-dependent hydrolysis of ester, thioester, amide, peptide and isopeptide bonds formed by the C-terminal Gly of ubiquitin, a small regulatory protein that can be conjugated to a large range of target proteins. Protein ubiquitination is a post-translational modification of mostly Lys residues that regulates many cellular processes, including protein degradation, intracellular trafficking, cell signalling, autophagy, transcription, translation, and the DNA damage response. OTU4 may play an important regulatory role at the level of protein turnover by preventing degradation. This protein belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad.
