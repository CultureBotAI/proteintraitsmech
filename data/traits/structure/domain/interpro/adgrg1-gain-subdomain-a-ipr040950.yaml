identifier: InterPro:IPR040950
label: "ADGRG1, GAIN subdomain A"
definition: >-
  ADGRG1/GPR56 is a a cell-surface G protein-coupled receptor (GPCR) which belongs to the adhesion G protein-coupled receptor (aGPCR) family, a large family of chimeric proteins that have both adhesion and signaling functions and play critical roles in diverse neurobiological processes including brain development, synaptogenesis, and myelination. This entry represents GPCR-Autoproteolysis-INducing (GAIN) subdomain A, including PLL-GAIN linker (F161-D175) region.
