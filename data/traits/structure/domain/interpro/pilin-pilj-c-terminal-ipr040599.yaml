identifier: InterPro:IPR040599
label: "Pilin PilJ, C-terminal"
definition: >-
  This is the C-terminal domain of PilJ, a Type IV pilin found in Gram-positive Clostridium difficile. Incorporation of PilJ into pili exposes the C-terminal domain of PilJ to create a novel interaction surface. This C-terminal domain is not observed in other Type IV pilin proteins.
