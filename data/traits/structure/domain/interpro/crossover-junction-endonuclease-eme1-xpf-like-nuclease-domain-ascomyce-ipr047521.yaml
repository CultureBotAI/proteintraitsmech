identifier: InterPro:IPR047521
label: "Crossover junction endonuclease EME1, XPF-like nuclease domain, ascomycetes"
definition: >-
  This entry represents the XPF-like nuclease domain of crossover junction endonuclease EME1 and similar proteins from ascomycetes. This domain lacks the catalytic motif. Crossover junction endonuclease EME1, also known as Mms4 in fission yeast, is a putative transcriptional (co)activator that protects cells from endogenous and environmental DNA damage. It interacts with MUS81 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. Typical substrates include 3'-flap structures, D-loops, replication forks with regressed leading strands and nicked Holliday junctions.
