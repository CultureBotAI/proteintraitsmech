identifier: InterPro:IPR037907
label: "Vps17, PX domain"
definition: >-
  Vps17 belongs to the sorting nexin family, which contains a conserved PX domain. Vps17 is a component of the membrane-associated retromer complex (consists of Vps29, Vps26, Vps35, Vps5 and Vps17), which is essential in endosome-to-Golgi retrograde transport. It forms a retromer subcomplex with Vps5 that may assemble onto the membrane to promote vesicle formation. Similar to Vps5 and SNX1, Vps17 harbours a Bin/Amphiphysin/Rvs (BAR) domain, which detects membrane curvature, C-terminal to the PX domain. The PX-BAR structural unit helps determine specific membrane localization. This entry represents the PX domain of Vps17.
