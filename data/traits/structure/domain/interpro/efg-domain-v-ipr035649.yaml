identifier: InterPro:IPR035649
label: "EFG, domain V"
definition: >-
  Elongation factor G (EFG) is folded into five domains, with domains I and II forming the N-terminal block, domains IV and V forming the C-terminal block, and domain III providing the covalently-linked flexible connection between the two. This entry consists of domains similar to the C-terminal domain (domain V) of the bacterial translational elongation factor (EF) EF-G. Included in this group is the C terminus of mitochondrial elongation factor G1 (mtEFG1) and G2 (mtEFG2) proteins.
