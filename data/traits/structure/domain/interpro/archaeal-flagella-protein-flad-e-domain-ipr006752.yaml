identifier: InterPro:IPR006752
label: Archaeal flagella protein FlaD/E domain
definition: >-
  Archaeal flagella are unique motility structures, and the absence of bacterial structural motility genes in the complete genome sequences of flagellated archaeal species has always suggested that archaeal flagellar biogenesis is likely mediated by novel components. FlaD and FlaE, are present in the cell as membrane-associated proteins but are not major components of isolated flagellar filaments. Interestingly, flaD was found to encode two proteins, each translated from a separate ribosome binding site. This entry represents a domain found in the N-teminal region of flaE but towards the C-terminal region of flaD.
