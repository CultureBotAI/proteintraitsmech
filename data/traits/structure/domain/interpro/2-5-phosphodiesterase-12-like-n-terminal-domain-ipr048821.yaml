identifier: InterPro:IPR048821
label: "2',5'-phosphodiesterase 12-like, N-terminal domain"
definition: >-
  This domain is found in 2',5'-phosphodiesterase 12 from humans (PDE12) and similar animal proteins. Pde12 cleaves 2',5'- phosphodiester bond linking adenosines of oligoadenylates. It plays a role as a negative regulator of the 2-5A system that is one of the major pathways for antiviral and antitumour functions induced by interferons (IFNs). PDE12 is organised into two clear domains: an N-terminal domain (this entry) and a C-terminal domain ( ). This domain is primarily composed of extended loop regions around a core composed of a six β-strand meander that forms a two-layer β-sandwich, showing an immunoglobulin-like fold.
