identifier: InterPro:IPR055500
label: "Domain of unknown function DUF7072"
definition: >-
  This domain is found in a group of uncharacterised proteins mainly from Fungi. It shares a weak sequence similarity to the C-terminal domain of the Escherichia Coli ProQ RNA binding protein (Pfam:PF17516) and it is predicted to adopt a similar structure with SH3-like topology.
