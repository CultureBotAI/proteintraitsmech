identifier: InterPro:IPR007726
label: "SS18, N-terminal"
definition: >-
  This entry represents the N-terminal domain of SS18 and related proteins. SSXT (also known as SS18) appears to function synergistically with RBM14 as a transcriptional coactivator. The SSXT protein is involved in synovial sarcoma in humans. A SYT-SSX fusion gene resulting from the chromosomal translocation t(X;18) (p11;q11) is characteristic of synovial sarcomas. This translocation fuses the SSXT (SYT) gene from chromosome 18 to either of two homologous genes at Xp11, SSX1 or SSX2. The SS18 family also includes SS18-like proteins 1 and 2, and GRF1-interacting factors from plants. SS18-like protein 1 is a transcriptional activator which is required for calcium-dependent dendritic growth and branching in cortical neurons.
