identifier: InterPro:IPR062521
label: "TP0260, N-terminal SH3 domain"
definition: >-
  This entry represents the first domain of TP0260 family proteins from Spirochaetota. This domain adopts an SH3-like fold and is approximately 65-70 residues in length. It is located N-terminal to a second SH3 domain ( ). The TP0260 family proteins typically contain four domains in total. The specific function of this domain remains to be determined.
