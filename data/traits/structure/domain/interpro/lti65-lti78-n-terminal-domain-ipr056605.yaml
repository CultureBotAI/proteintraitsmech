identifier: InterPro:IPR056605
label: "LTI65/LTI78, N-terminal domain"
definition: >-
  This entry represents a disordered region found at the N-terminal of LTI65/LTI78 ( ) from Arabidopsis thaliana and similar sequences from plants. This domain is enriched in V/K/H/E/D amino acids. LTI78 and LTI65 are involved in responses to abiotic stress.
