identifier: InterPro:IPR053854
label: "Domain of unknown function DUF7018"
definition: >-
  This entry represents a domain of unknown function predominantly found in protein sequences from Bacillus. Many members of this group show this domain at the N-terminal and DUF3994 ( ) at the C-terminal. According to structure predictions, this domain consists of α-helices, suggesting it is the membrane spanning region of these sequences.
