identifier: InterPro:IPR035251
label: "ShlB, POTRA domain"
definition: >-
  This entry represents the second POTRA domain (for polypeptide-transport-associated domain) found in the ShlB family proteins. ShlB is important in the secretion and activation of the haemolysin ShlA.
