identifier: InterPro:IPR059018
label: "URB1, central HEAT repeat domain"
definition: >-
  This domain is found in URB1 and related proteins. This domain contains a HEAT repeat. Nucleolar pre-ribosomal-associated protein 1 (Npa1 or URB1) is required for ribosome biogenesis and operates in the same functional environment as Rsa3p and Dbp6p during early maturation of 60S ribosomal subunits. The protein partners of URB1 include eight putative helicases as well as the novel Npa2p factor. URB1 can also associate with a subset of H/ACA and C/D small nucleolar RNPs (snoRNPs) involved in the chemical modification of residues in the vicinity of the peptidyl transferase centre.
