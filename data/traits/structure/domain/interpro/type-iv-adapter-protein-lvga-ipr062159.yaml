identifier: InterPro:IPR062159
label: "Type IV adapter protein LvgA"
definition: >-
  This entry represents the type IV adapter protein LvgA from Legionella pneumophila. LvgA is approximately 208 amino acids in length and is a component of the Dot/Icm type IVB secretion system (T4BSS), which injects bacterial effector proteins into eukaryotic host cells. The protein is part of the type IV coupling complex (T4CC), composed of the DotLMNYZ core and the IcmSW-LvgA adapter subunits. LvgA is a critical subunit for binding a subset of effector proteins and recognises more than one type of binding motif. The protein interacts with DotL, IcmS, IcmW and various effector proteins including VpdB, SetA, PieA and SidH. LvgA may be a critical factor that confers host specificity. The protein is localised to the cytoplasm.
