identifier: InterPro:IPR029120
label: "Novel toxin 14"
definition: >-
  This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an α+β fold that is usually exported by the Photorhabdus virulence cassette (PVC)-type export system.
