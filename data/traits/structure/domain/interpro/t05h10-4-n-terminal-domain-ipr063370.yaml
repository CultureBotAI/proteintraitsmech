identifier: InterPro:IPR063370
label: "T05H10.4, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in the uncharacterised protein T05H10.4 from Caenorhabditis elegans and related nematode proteins. The protein is expressed in embryonic and other tissues but its function remains unknown. The specific function of this domain remains to be determined.
