identifier: InterPro:IPR033096
label: "Zinc finger protein 638, RNA recognition motif 1/2"
definition: >-
  Zinc finger protein 638 (ZNF638, also known as NP220) is a transcription factor that binds to cytidine clusters in double-stranded DNA. It interacts with splicing regulators and influences alternative splicing and may control adipogenesis through regulation of the relative amounts of differentiation-specific isoforms. ZNF638 also mediates transcriptional repression of unintegrated viral DNA by specifically binding to the cytidine clusters of retroviral DNA and mediating the recruitment of chromatin silencers, such as the HUSH complex, SETDB1 and the histone deacetylases HDAC1 and HDAC4. This entry represents the two RNA recognition motifs (RRM) of ZNF638.
