identifier: InterPro:IPR060658
label: "pH-response transcription factor PacC/RIM101, C-terminal"
definition: >-
  This entry represents the C-terminal region of pH-response transcription factor pacC/RIM101. PacC is a transcription factor that mediates regulation of both acid- and alkaline-expressed genes in response to ambient pH. At alkaline ambient pH, PacC activates transcription of alkaline-expressed genes and represses acid-expressed genes. The protein contains three C2H2-type zinc finger domains for DNA binding and recognises the consensus sequence GCCARG. PacC is activated by C-terminal proteolytic cleavage at neutral to alkaline pH. The protein is found in fungi and is required for virulence in some pathogenic species. The specific function of this region remains to be determined. It contains helical segments and disordered regions.
