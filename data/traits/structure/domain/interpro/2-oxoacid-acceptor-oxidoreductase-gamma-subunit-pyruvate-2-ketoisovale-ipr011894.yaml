identifier: InterPro:IPR011894
label: "2-oxoacid:acceptor oxidoreductase, gamma subunit, pyruvate/2-ketoisovalerate"
definition: >-
  A number of anaerobic and microaerophilic species lack pyruvate dehydrogenase and have instead a four subunit, oxygen-sensitive pyruvate oxidoreductase, with either ferredoxins or flavodoxins (Helicobacter pylori (Campylobacter pylori)) used as the acceptor. Several related four-subunit enzymes may exist in the same species. This entry describes the gamma subunit. In Pyrococcus furiosus, enzymes active on pyruvate and 2-ketoisovalerate share a common gamma subunit.
