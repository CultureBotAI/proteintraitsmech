identifier: InterPro:IPR063247
label: "BcsE, degenerate REC domain"
definition: >-
  This entry represents the REC domain (phosphorylation-incompetent receiver domain) found at the middle of BcsE from Salmonella typhimurium and related sequences. BcsE is required for cellulose biosynthesis. The degenerate REC and GGDEF domains bind an intercalated dimeric c-di-GMP per protomer.
