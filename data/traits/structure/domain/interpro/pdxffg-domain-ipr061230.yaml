identifier: InterPro:IPR061230
label: "PDxFFG domain"
definition: >-
  This model represents the conserved N-terminal domain of family of large proteins with signal peptides, found in Mycoplasmatota. A short conserved N-terminal domain and a large conserved C-terminal domain are separated by poorly conserved regions of variable length in members of this group. This domain is named for its best conserved motif, PDxFFG.
