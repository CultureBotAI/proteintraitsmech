identifier: InterPro:IPR013264
label: "DNA primase DNAG, catalytic core, N-terminal"
definition: >-
  DNA primase (DNAG) is a a nucleotidyltransferase which synthesises the oligoribonucleotide primers required for DNA replication on the lagging strand of the replication fork. It can also prime the leading strand and has been implicated in cell division. Primases comprise three domains: a zinc-binding domain at the N-terminal , a polymerase domain (catalytic core), and a domain that interacts with the replicative helicase . The catalytic core consists of an alpha+beta domain at the N-terminal (this entry) and a TOPRIM domain at the C-terminal.
