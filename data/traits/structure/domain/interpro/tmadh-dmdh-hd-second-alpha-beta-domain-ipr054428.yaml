identifier: InterPro:IPR054428
label: "TMADH/DMDH/HD, second alpha/beta domain"
definition: >-
  This domain is found in a group of diverse dehydrogenases from the old yellow enzyme (OYE) superfamily, such as histamine dehydrogenase (HD) from Nocardioides simplex, dimethylamine dehydrogenases (DMDH), trimethylamine dehydrogenase (TMADH) from Methylophilus methylotrophus (sp. W(3)A(1)), in which it has been described as a small, second α/β domain. Members of this group are mainly found in proteobacteria and some actinobacterial species. TMADH is an iron-sulfur flavoprotein that catalyses the oxidative demethylation of trimethylamine to form dimethylamine and formaldehyde. The protein forms a symmetrical dimer with each subunit containing one 4Fe-4S cluster and one FMN cofactor. It contains a unique flavin, in the form of a 6-S-cysteinyl FMN which is bent by ~25 degrees along the N5-N10 axis of the flavin isoalloxazine ring. The closely related histamine dehydrogenase catalyses oxidative deamination of histamine.
