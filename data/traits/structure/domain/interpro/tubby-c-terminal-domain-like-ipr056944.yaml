identifier: InterPro:IPR056944
label: "Tubby, C-terminal domain-like"
definition: >-
  This entry represents a bacterial protein domain that is structurally similar to the C-terminal domain of the tubby protein. It consists of 12 β-strands organised into a barrel with a central C-terminal α-helix. It shows distant sequence similarity to both the Tubby C-terminal domain and the LURP 1 family. This domain is found in a group of uncharacterised proteins from bacillales, often covering most of the length of the protein sequence.
