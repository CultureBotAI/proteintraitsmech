identifier: InterPro:IPR032510
label: "Domain of unknown function DUF4972"
definition: >-
  This entry represents a domain of unknown function (DUF4972) in uncharacterised proteins around 490 residues in length from various Bacteroides species. This domain is usually found at the N-terminal and it can be found repeated twice in some proteins. This domain contains a similar fold to AF1782-like which is composed of three helices arranged in a close bundle fold with a left-handed twist going up and down and a mirror topology to the spectrin-like fold.
