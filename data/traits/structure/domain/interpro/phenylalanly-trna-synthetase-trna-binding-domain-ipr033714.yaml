identifier: InterPro:IPR033714
label: "Phenylalanly tRNA synthetase, tRNA-binding-domain"
definition: >-
  This entry represents the tRNA-binding-domain of prokaryotic phenylalanyl tRNA synthetase (PheRS) beta chain. PheRSs belong structurally to class II aminoacyl tRNA synthetases (aaRSs), but because they aminoacylate the 2'OH of the terminal ribose of tRNA, they belong functionally to class I aaRSs. PheRS adopts the alpha2beta2 tetrameric structure in prokaryotic and eukaryotic cytoplasmic enzymes, with both subunits required for aminoacylation of the tRNA. All four subunits in the tetramer interact with each other and with both bound tRNA substrates. This domain has general tRNA binding properties and is believed to direct tRNAphe to the active site of the enzyme.
