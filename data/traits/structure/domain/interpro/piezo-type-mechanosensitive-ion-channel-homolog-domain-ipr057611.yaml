identifier: InterPro:IPR057611
label: "Piezo-type, mechanosensitive ion channel homolog domain"
definition: >-
  This domain is found in Piezo-type mechanosensitive ion channel homolog from Arabidopsis thaliana (PIEZO) and related plant proteins. PIEZO is a pore-forming subunit of a mechanosensitive non-specific cation channel, that conducts both sodium and potassium ions. This domain is predicted to adopt an all-α structure.This entry is specific to plants.
