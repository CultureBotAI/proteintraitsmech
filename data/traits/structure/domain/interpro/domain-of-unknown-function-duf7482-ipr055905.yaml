label: "Domain of unknown function DUF7482"
definition: >-
  This entry includes a group of uncharacterised sequences from bacteria and archaea, which, according to structure predictions, they may have a novel repeat fold. They may consist of 5-6 antiparallel β-strands decorated with short α-helices.
