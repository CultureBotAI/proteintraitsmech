label: "Domain of unknown function DUF7716"
definition: >-
  This domain is found in uncharacterised bacterial proteins either standalone or in combination with other domains. It is predicted to adopt a globular structure consisting of an antiparallel three-stranded β-sheet and α-helices packed on one side of it.
