identifier: InterPro:IPR060131
label: "STB2/6, C-terminal helix"
definition: >-
  This entry represents the C-terminal helical segment of STB2 protein and its paralogue from fungi, particularly Saccharomyces cerevisiae. STB2 is a Sin3 binding proteins that interact with the Sin3 transcriptional co-repressor complex. STB2 contains multiple serine phosphorylation sites. The specific function of this C-terminal region remains to be determined.
