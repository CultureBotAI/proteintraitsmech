identifier: InterPro:IPR056524
label: "Kinesin-like protein KIF6/9, C-terminal"
definition: >-
  This entry represents a region found at the C-terminal of Kinesin-like protein KIF6 and 9 from animals and KIF1 from Chlamydomonas reinhardtii. KIF9 is essential for normal male fertility and for progressive motility of spermatozoa. This region, which is predicted to form two long α-helices, is often found associated with .
