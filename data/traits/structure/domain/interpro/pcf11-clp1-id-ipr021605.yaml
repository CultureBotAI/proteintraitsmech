identifier: InterPro:IPR021605
label: Pcf11, Clp1-ID
definition: >-
  This entry represents the Clp1-interacting domain of Pcf11 (Clp1-ID), found towards the C-terminal end of these proteins. Pcf11 is a subunit and essential component of cleavage and polyadenylation factor IA (CF IA), involved in pre-mRNA 3' end processing and in transcription termination. It has been reported that Pcf11-mediated termination is essential for vertebrate development and its own levels are maintained by an auto-regulatory mechanism involving premature termination of its transcript. Human Pcf11, also referred to as pre-mRNA cleavage complex 2 protein Pcf11, has been shown to enhance degradation of RNAP II-associated nascent RNA and transcriptional termination. Pcf11 binds to Clp1, another subunit of CFIA whose interaction is responsible for maintaining a tight coupling between the Clp1 nucleotide binding subunit and the other components of the polyadenylation machinery.
