identifier: InterPro:IPR054536
label: "HphA, C-terminal domain"
definition: >-
  HphA (heme scavenger) is a secreted hemophore that binds and acquires heme from hemoglobin. It consists of two domains: N-terminal heme binding domain and C-terminal β-barrel (this entry) that is related to domains members of the Outer membrane β-barrel superfamily.
