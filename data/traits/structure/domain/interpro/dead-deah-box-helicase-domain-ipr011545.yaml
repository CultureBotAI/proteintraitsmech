identifier: InterPro:IPR011545
label: "DEAD/DEAH-box helicase domain"
definition: >-
  This entry represents the DNA-binding domain at the N-terminal in DEAD/DEAH box helicase and related proteins. This domain also contains motif III (S-A-T) which was proposed to participate in linking ATPase and helicase activities. DEAD-box and DEAH-box RNA helicases are essential enzymes involved in the unwinding of nucleic acids, playing critical roles in RNA metabolism. The DEAD-box helicases, exemplified by the translation initiation factor eIF4A, are RNA-dependent ATPases that act as RNA helicases in conjunction with eIF4B. These proteins participate in a wide range of processes including nuclear transcription, pre-mRNA splicing, ribosome biogenesis, nucleocytoplasmic transport, translation, RNA decay and organellar gene expression. In contrast, DEAH-box helicases are primarily involved in pre-mRNA splicing and function as ATP-dependent RNA helicases.
