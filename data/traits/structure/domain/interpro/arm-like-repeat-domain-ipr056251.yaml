identifier: InterPro:IPR056251
label: "Arm-like repeat domain"
definition: >-
  This entry represents a region of α-solenoid repeats found in a group of fungal proteins. This domain is sometimes found at the N-terminal end of the proteins followed by a NACHT domain .
