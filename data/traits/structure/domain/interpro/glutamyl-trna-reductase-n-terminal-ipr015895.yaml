identifier: InterPro:IPR015895
label: "Glutamyl-tRNA reductase, N-terminal"
definition: >-
  This entry represents the N-terminal domain of glutamyl-tRNA reductase ( ), which reduces glutamyl-tRNA to glutamate-1-semialdehyde during the first stage of tetrapyrrole biosynthesis by the C5 pathway. The enzyme requires NADPH as a cofactor. This N-terminal domain is the catalytic domain.
