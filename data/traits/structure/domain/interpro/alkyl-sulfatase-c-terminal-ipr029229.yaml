identifier: InterPro:IPR029229
label: "Alkyl sulfatase, C-terminal"
definition: >-
  This domain is found at the C terminus of alkyl sulfatases. Together with the N-terminal catalytic domain, this domain forms a hydrophobic chute and may recruit hydrophobic substrates.
