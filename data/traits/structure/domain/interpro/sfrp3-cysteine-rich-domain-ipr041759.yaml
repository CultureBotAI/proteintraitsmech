identifier: InterPro:IPR041759
label: "SFRP3, cysteine-rich domain"
definition: >-
  The cysteine-rich domain (CRD) is an essential part of the secreted frizzled-related protein 3 (SFRP3, alias FRZB), which regulates chondrocyte maturation and long bone development and is an antagonist of Wnt8 signalling. It is also involved in the control of planar cell polarity. In general, SFRPs antagonize the activation of Wnt signaling by binding to the CRD domains of frizzled (Fz) proteins, thereby preventing Wnt proteins from binding to these receptors. SFRPs are also known to have functions unrelated to Wnt, as enhancers of procollagen cleavage by the TLD proteinases. SFRPs and Fz proteins both contain CRD domains, but SFRPs lack the seven-pass transmembrane domain which is an integral part of Fzs.
