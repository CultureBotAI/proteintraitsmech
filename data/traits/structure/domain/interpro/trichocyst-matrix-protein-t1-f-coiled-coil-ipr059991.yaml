identifier: InterPro:IPR059991
label: "Trichocyst matrix protein T1-F, coiled-coil"
definition: >-
  This entry represents a coiled-coil domain found in trichocyst matrix proteins from Paramecium species. The domain contains two coiled-coil regions with small helices and is found in structural proteins that crystallise inside the trichocyst matrix. Trichocysts are architecturally complex secretory storage granules docked at the plasma membrane. These proteins belong to the TMP family and are processed post-translationally to produce two components from the precursor peptide. The specific function of this domain within the trichocyst matrix structure remains to be determined.
