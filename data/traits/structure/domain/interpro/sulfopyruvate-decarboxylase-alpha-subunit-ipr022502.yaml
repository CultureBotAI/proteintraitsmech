identifier: InterPro:IPR022502
label: "Sulfopyruvate decarboxylase, alpha subunit"
definition: >-
  This entry represents the alpha subunit, or the N-terminal region, of sulfopyruvate decarboxylase, an enzyme of coenzyme M biosynthesis. Coenzyme M is found almost exclusively in the methanogenic archaea. However, the enzyme also occurs in Roseovarius nubinhibens ISM in a degradative pathway, where the resulting sulfoacetaldehyde is desulfonated to acetyl phosphate, then converted to acetyl-CoA.
