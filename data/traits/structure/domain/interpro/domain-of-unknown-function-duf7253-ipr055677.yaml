identifier: InterPro:IPR055677
label: "Domain of unknown function DUF7253"
definition: >-
  This entry represents a domain of unknown function, which is found in phage proteins, predominantly from Arthrobacter and Gordonia phages. The domain is approximately 110 amino acids in length. It shows similarity to the Phage_barrel superfamily. These proteins are often components of the phage neck complex.
