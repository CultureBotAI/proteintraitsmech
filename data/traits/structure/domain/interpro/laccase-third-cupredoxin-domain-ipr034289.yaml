identifier: InterPro:IPR034289
label: "Laccase, third cupredoxin domain"
definition: >-
  Laccase is a blue multicopper oxidase (MCO) which catalyzes the oxidation of a variety aromatic - notably phenolic and inorganic substances coupled to the reduction of molecular oxygen to water. Laccase has been implicated in a wide spectrum of biological activities and, in particular, plays a key role in morphogenesis, development and lignin metabolism. Plants usually express multiple laccase genes, but their precise physiological/biochemical roles remain largely unclear. In cotton (Gossypium spp.), laccases may be involved in fibre development.
