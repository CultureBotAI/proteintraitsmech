identifier: InterPro:IPR024655
label: "Asl1-like, glycosyl hydrolase catalytic domain"
definition: >-
  This entry represents the glycosyl hydrolase catalytic core in the cell wall protein Asl1 from S. pombe, Small cysteine-rich protein 5 Verticillium dahliae (SCP5) and other uncharacterised fungi and bacteria. SCP5 was identified as a putative secreted effector that affects plant immune responses.
