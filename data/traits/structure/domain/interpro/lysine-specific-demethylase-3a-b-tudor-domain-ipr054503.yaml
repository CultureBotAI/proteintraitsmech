identifier: InterPro:IPR054503
label: "Lysine-specific demethylase 3A/B, tudor domain"
definition: >-
  This domain is found in Lysine-specific demethylase 3B (KDM3B, also known as JmjC domain-containing histone demethylation protein 2B or JHDM2B), Lysine-specific demethylase 3A (KDM3A, also known as JmjC domain-containing histone demethylation protein 2A or JHDM2A) and related proteins. KDM3B is a histone demethylase that specifically demethylates lysine at position 9 of histone H3. This enzyme plays a central role in histone code. This domain is predicted to adopt an open β-barrel with an SH3-like topology. It has significant sequence and structural similarity to RDM15 tudor domain that is known to specifically recognise the monomethylation (H3K4me1) mark of lysine at position 4 of histone H3.
