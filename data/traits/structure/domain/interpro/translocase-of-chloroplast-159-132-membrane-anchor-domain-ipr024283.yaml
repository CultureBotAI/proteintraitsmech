identifier: InterPro:IPR024283
label: "Translocase of chloroplast 159/132, membrane anchor domain"
definition: >-
  This is the membrane-anchor domain of translocase of chloroplast 159, TOC159/132. This domain is present in plants at the C terminus of the GTPase, AIG1, and anchors the GTPase region to the outer membrane of the chloroplast. The domain may carry a very C-terminal sequence motif that resembles a transit peptide.
