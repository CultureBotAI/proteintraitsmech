identifier: InterPro:IPR062237
label: "KHD4, KH domain"
definition: >-
  This KH domain is found in the K homology domain-containing protein 4 (KHD4) from Mycosarcoma maydis. KHD4 is an RNA-binding protein that recognizes the sequence AUACCC via its tandem KH domains 3 and 4, probably in order to promote mRNA instability. This protein plays an essential role in filamentous growth and virulence.
