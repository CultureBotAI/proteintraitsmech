identifier: InterPro:IPR060501
label: "ENDOD1 C-terminal coiled-coil domain"
definition: >-
  This entry represents the C-terminal coiled-coil domain of the ENDOD1 (endonuclease domain-containing 1) protein family. This C-terminal domain forms a coiled-coil structure that may be important for protein-protein interactions or structural stability. The specific function of this C-terminal coiled coil domain within the overall ENDOD1 protein architecture remains to be determined. ENDOD1 may act as a DNase and a RNase. It plays a role in the modulation of innate immune signalling through the cGAS-STING pathway by interacting with RNF26. It acts as a tumour suppressor in prostate cancer. ENDOD1 is expressed in various tissues including brain, kidney, lung, and spleen.
