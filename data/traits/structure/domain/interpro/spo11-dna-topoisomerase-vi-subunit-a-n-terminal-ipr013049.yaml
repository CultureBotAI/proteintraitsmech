label: Spo11/DNA topoisomerase VI, subunit A, N-terminal
definition: >-
  This entry represents the N-terminal domain found in Spo11, a meiotic recombination protein found in eukaryotes, and in subunit A of topoisomerase VI, a type IIB topoisomerase found predominantly in archaea. These two types of proteins share structural homology.
