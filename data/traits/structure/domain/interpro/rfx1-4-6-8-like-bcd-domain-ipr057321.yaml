identifier: InterPro:IPR057321
label: "RFX1-4/6/8-like, BCD domain"
definition: >-
  This domain is found in site specific DNA binding proteins that are members of the RFX family of transcription factors, including human RFX (1-4/6/8). Members of this family are found in animals and fungi, and initially were identified as regulatory factors that bind to a conserved cis-regulatory element called the X-box motif. Members of the RFX family contain a highly conserved HTH DNA-binding domain ( ) followed by another conserved domain (BCD) composed of the so-called B, C and D regions which are involved mainly in dimerisation. This entry represents the BCD domain which is predicted to fold into array of α-helices.
