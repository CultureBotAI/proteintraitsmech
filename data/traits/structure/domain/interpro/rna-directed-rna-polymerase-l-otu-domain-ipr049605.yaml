identifier: InterPro:IPR049605
label: "RNA-directed RNA polymerase L, OTU domain"
definition: >-
  This entry represents the N-terminal OTU (ovarian tumor) domain present in RNA-directed RNA polymerase L proteins mainly found in orthonairovirus. This protein, also known as protein L, large structural protein, replicase, transcriptase, or ubiquitin thioesterase, displays RNA-directed RNA polymerase ( ), deubiquitinase (DUB)/ubiquitin thiolesterase ( ), and deISGylating activities. It is a viral homologue of the ovarian tumor protease (vOTU), which has been implicated in the down-regulation of type I interferon immune response by removing post-translational modifying proteins ubiquitin (Ub) and the Ub-like interferon-simulated gene 15 (ISG15) from host cellular proteins. The attachment of Ub and ISG15 to cellular proteins mediates important innate antiviral responses, and their removal inhibits these antiviral pathways. Members of this group of proteins belong to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad.
