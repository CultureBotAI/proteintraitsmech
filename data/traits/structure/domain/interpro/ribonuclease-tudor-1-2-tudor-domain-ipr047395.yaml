identifier: InterPro:IPR047395
label: "Ribonuclease Tudor 1/2, Tudor domain"
definition: >-
  The entry represents the Tudor domain found in plant ribonucleases, including Tudor1 (also called Tudor-SN protein 1) and Tudor2 (also called Tudor-SN protein 2 or 100 kDa coactivator-like protein) proteins from Arabidopsis thaliana. They are cytoprotective ribonucleases (RNases) required for resistance to abiotic stresses, acting as positive regulators of mRNA decapping during stress.
