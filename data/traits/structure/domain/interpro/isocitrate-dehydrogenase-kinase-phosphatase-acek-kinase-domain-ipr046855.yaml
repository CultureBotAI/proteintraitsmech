identifier: InterPro:IPR046855
label: Isocitrate dehydrogenase kinase/phosphatase (AceK), kinase domain
definition: >-
  This the C-terminal protein kinase domain of bacterial isocitrate dehydrogenase kinase/phosphatase (AceK) proteins ( ). It has a classic bi-lobe protein kinase fold with the ATP-binding cleft located at the interface between the two lobes. The N-terminal lobe comprises a twisted antiparallel β-sheet of five strands and two α-helices. The C-terminal lobe is larger and mainly α-helical, with some stretches of antiparallel β-strands.
