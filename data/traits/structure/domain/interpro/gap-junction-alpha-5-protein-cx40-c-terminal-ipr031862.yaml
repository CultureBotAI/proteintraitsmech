identifier: InterPro:IPR031862
label: "Gap junction alpha-5 protein (Cx40), C-terminal"
definition: >-
  This entry represents the C-terminal domain of connexin 40 (Cx40). It interacts with the C-terminal and cytoplasmic loop domains of connexin 43 and with the cytoplasmic loop of another connexin 40. Connexin 40 is a gap junction protein that has been linked to lone atrial fibrillation. Gap junctions is composed of two hemichannels, each constituted by the oligomerisation of six connexins (Cx). This junction allows direct exchange of ions and small molecules between apposing cells.
