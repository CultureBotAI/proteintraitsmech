identifier: InterPro:IPR048592
label: Switch activating protein 1, N-terminal domain
definition: >-
  This entry represents the N-terminal DNA-binding domain of Sap1 and closely related proteins from Schizosaccharomyces. Sap1 is known to bind to sequences required for mating-type switching. It binds to DNA origins during cell growth cycles, preferentially to a DNA sequence of 5'-(A/T) n (C/G)(A/T)9-10(G/C)(A/T)n -3' (n>1).
