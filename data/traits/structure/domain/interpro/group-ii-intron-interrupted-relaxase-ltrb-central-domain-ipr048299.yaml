identifier: InterPro:IPR048299
label: "Group II intron-interrupted relaxase LtrB, central domain"
definition: >-
  This entry represents the central domain of Group II intron-interrupted relaxase LtrB from Lactococcus lactis and similar sequences from Lactobacillales. LtrB mediates initiation of the conjugal transfer of the plasmid pRS01 possibly by introducing a single-stranded nick at the potential origin of transfer, to initiate single strand transfer from donor to recipient.
