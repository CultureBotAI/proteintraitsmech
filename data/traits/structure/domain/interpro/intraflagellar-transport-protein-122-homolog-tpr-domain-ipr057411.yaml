identifier: InterPro:IPR057411
label: "Intraflagellar transport protein 122 homolog, TPR domain"
definition: >-
  This entry represents the TPR repeat domain that follows the two β-propeller domains in human Intraflagellar transport protein 122 homolog and similar proteins mainly found in animals. Intraflagellar transport protein 122 homolog (IFT122) is one of the core components (together with WDR19/IFT144 and IFT140) of the IFT-A complex which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors (GPCRs), being involved in cilia function and/or assembly. IFT-A polymerises interacts with IFT-B, and uses an array of β-propeller and TPR domains to create 'carriages' of the IFT train that engage TULP adaptor proteins.
