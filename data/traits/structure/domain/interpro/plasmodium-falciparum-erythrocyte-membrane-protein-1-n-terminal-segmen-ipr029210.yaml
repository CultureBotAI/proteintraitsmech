identifier: InterPro:IPR029210
label: "Plasmodium falciparum erythrocyte membrane protein-1, N-terminal segment"
definition: >-
  NTS, the N-terminal segment, is the most variable part of the variant surface antigen family of Plasmodium falciparum, the erythrocyte membrane protein-1 (PfEMP1) proteins. PfEMP1 is an important target for protective immunity and is implicated in the pathology of malaria through its ability to adhere to host endothelial receptors. A structural and functional study of the N-terminal domain of PfEMP1 from the VarO variant comprising the N-terminal segment (NTS) and the first DBL domain, shows this region is directly implicated in rosetting. NTS, previously thought to be a structurally independent component of PfEMP1, forms an integral part of the DBL1 domain that is found to be the important heparin-binding site. This domain is closely associated with PFEMP DBL domain ( ), and Duffy-antigen binding ( ).
