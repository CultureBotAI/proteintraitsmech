identifier: InterPro:IPR015366
label: Peptidase S53, activation domain
definition: >-
  This domain is found at the N terminus of peptidases belonging to MEROPS peptidase family S53 (sedolisin, clan SB). The domain adopts a ferredoxin-like fold, with an α+β sandwich. Cleavage of the domain results in activation of the peptidase.
