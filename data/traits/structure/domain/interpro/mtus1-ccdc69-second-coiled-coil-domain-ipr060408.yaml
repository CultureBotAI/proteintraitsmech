identifier: InterPro:IPR060408
label: "MTUS1/CCDC69, second coiled-coil domain"
definition: >-
  This entry represents the second coiled-coil domain found in the MTUS1/CCDC69 and related proteins. This domain is present in microtubule-associated tumour suppressor 1 (MTUS1) and coiled-coil domain- containing protein 69 (CCDC69). Both proteins contain extensive coiled-coil regions that mediate protein-protein interactions and structural organisation. The function of this second coiled-coil domain remains to be determined. MTUS1 functions as a tumour suppressor that may inhibit cell proliferation and forms homodimers. MTUS1 localises to multiple cellular compartments, including mitochondria, Golgi apparatus, cell membrane and nucleus. CCDC69 acts as a scaffold to regulate the recruitment and assembly of spindle midzone components. CCDC69 is required for the localisation of AURKB and PLK1 to the spindle midzone. During cell division, CCDC69 localises along overlapping interpolar microtubules in early anaphase, concentrates at the spindle midzone centre during late anaphase, and accumulates at the midbody during telophase. CCDC69 contains an N-terminal myristoylation site for membrane association.
