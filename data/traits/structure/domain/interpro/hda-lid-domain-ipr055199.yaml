identifier: InterPro:IPR055199
label: "Hda, lid domain"
definition: >-
  This entry represents the lid domain found at the C-terminal of the Regulatory inactivation of DnaA Hda protein from Shewanella amazonensis, the essential component of RIDA (regulatory inactivation of DnaA), and related proteins predominantly from proteobacteria. This domain is a short four-helical bundle that contains the sensor II motif.
