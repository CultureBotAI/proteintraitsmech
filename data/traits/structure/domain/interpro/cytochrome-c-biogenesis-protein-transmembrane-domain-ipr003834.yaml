identifier: InterPro:IPR003834
label: Cytochrome C biogenesis protein, transmembrane domain
definition: >-
  This entry represents the transmembrane domain of Cytochrome C biogenesis proteins also known as disulphide interchange proteins, such as DsbD from E. coli and DipZ from Mycobacterium. These proteins posses a protein disulphide isomerase like domain that is not found within the aligned region of this family. DsbA and DsbC, periplasmic proteins of E. coli, are two key players involved in disulphide bond formation. DsbD generates a reducing source in the periplasm, which is required for maintaining proper redox conditions. DipZ is essential for maintaining cytochrome c apoproteins in the correct conformations for the covalent attachment of haem groups to the appropriate pairs of cysteine residues.
