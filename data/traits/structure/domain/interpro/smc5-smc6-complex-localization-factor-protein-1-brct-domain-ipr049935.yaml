identifier: InterPro:IPR049935
label: "SMC5-SMC6 complex localization factor protein 1, BRCT domain"
definition: >-
  SLF1, also termed Smc5/6 localization factor 1, or ankyrin repeat domain-containing protein 32 (ANKRD32), or BRCT domain-containing protein 1 (BRCTD1), plays a role in the DNA damage response (DDR) pathway by regulating post replication repair of UV-damaged DNA and genomic stability maintenance. It is a component of the SLF1-SLF2 complex that acts as a link between RAD18 and the SMC5-SMC6 complex at replication-coupled interstrand cross-links (ICL) and DNA double-strand break (DSB) sites on chromatin during DNA repair in response to stalled replication forks. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is missing in this group.
