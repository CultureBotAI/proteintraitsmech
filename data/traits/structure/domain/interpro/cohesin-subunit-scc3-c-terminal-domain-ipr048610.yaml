identifier: InterPro:IPR048610
label: "Cohesin subunit SCC3, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of Cohesin subunit SCC3 from Saccharomyces cerevisiae and similar proteins from yeasts. SCC3 is a component of cohesin complex, a complex required for the cohesion of sister chromatids after DNA replication. This domain is is composed of a continuously twisted tandem array of antiparallel α-helices resembling tandem HEAT repeats. It binds to two small sections within Scc1, the other component of the complex.
