identifier: InterPro:IPR059259
label: "HetR, N-terminal domain"
definition: >-
  This is the N-terminal domain found in Heterocyst differentiation control protein (HetR). HetR serine peptidases are associated with heterocystous cyanobacteria and belong to MEROPS peptidase family S48 (clan S-). HetR is a DNA-binding serine-type protease required for heterocyst differentiation in heterocystous cyanobacteria under conditions of nitrogen deprivation. Mutation of HetR from of Anabaena sp. (strain PCC 7120) by site-specific mutagenesis of Ser-152 showed that this residue was one of the peptidase active site residues. It was suggested that peptidase activity might be needed for repression of HetR overproduction under conditions of nitrogen deprivation. Modification of Cys-48 prevented disulphide-bond formation and homodimerisation of HetR and DNA-binding. The homodimer of HetR binds the promoter regions of hetR, hepA, and patS, suggesting a direct control of the expression of these genes by HetR. The pentapeptide RGSGR, which is present at the C terminus of PatS, blocks heterocyst formation, inhibits the DNA binding of HetR and prevents hetR up-regulation.
