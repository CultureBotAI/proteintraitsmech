identifier: InterPro:IPR056176
label: "COPA/B, TPR domain"
definition: >-
  This entry represents the TPR domain found in Coatomer subunits alpha and beta (COPA1-3, COPB2 and COB21-3), from eukaryotes. The domain adopts an α-solenoid fold. Coatomer complexes function in the sorting and trafficking of proteins between subcellular organelles. Coat protein I (COPI)-coated vesicles mediate retrograde transport from the Golgi to the endoplasmic reticulum (ER), as well as transport within the Golgi. The Coatomer protein complex subunit beta 2 (COPB2) is involved in the formation of the COPI coatomer protein complex. COPB2 is a vital oncogene in many cancer types that regulates multiple biological behaviours of tumour cells, including proliferation, survival, tumourigenesis, invasion, and metastasis. COPA constitutes part of COPI, playing a role in the retrograde transport of cargo proteins between the Golgi and the ER and the movement of vesicles within the Golgi.
