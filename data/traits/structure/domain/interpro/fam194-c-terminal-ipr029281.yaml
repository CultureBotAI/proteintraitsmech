identifier: InterPro:IPR029281
label: "FAM194, C-terminal"
definition: >-
  This domain can be found in a group of uncharacterised proteins, including FAM194A, FAM194B and C3orf20. They are approximately 210 amino acids in length and have a conserved YPSG sequence motif. The function of this domain is unknown.
