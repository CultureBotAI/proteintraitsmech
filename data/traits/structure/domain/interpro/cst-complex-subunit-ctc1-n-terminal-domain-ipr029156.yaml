identifier: InterPro:IPR029156
label: CST complex subunit CTC1, N-terminal domain
definition: >-
  This entry represets the N-terminal domain of CTC1. CTC1 is one of the three components of the CST complex that assists Shelterin to protect the ends of telomeres from attack by DNA-repair mechanisms. Mutations in human CTC1 have been recognised as contributing to cerebroretinal microangiopathy.
