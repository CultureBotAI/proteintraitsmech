identifier: InterPro:IPR045497
label: "Domain of unknown function DUF6438"
definition: >-
  This domain of unknown function is found in uncharacterised proteins from bacteria and archaea. This domain is about 75 amino acids in length and it contains the conserved motif CxxxGxCP. Towards the C terminus there are two conserved residues, a glycine and an aspartate. Some proteins containing this domain also have an ankyrin repeat-containing region.
