identifier: InterPro:IPR022590
label: "Peroxisome proliferator-activated receptor gamma, N-terminal"
definition: >-
  This domain is found in eukaryotes, and is typically between 42 and 65 amino acids in length. It is found N-terminal to and . There are two completely conserved residues (D and Y) that may be functionally important. Peroxisome proliferator-activated receptors (PPAR) are nuclear hormone receptors that control the expression of genes involved in lipid homeostasis in mammals.
