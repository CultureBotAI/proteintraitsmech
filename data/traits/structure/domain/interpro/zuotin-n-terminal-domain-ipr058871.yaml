identifier: InterPro:IPR058871
label: "Zuotin, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of yeast Zuotin and similar proteins from fungi. Zuotin is a component of the ribosome-associated complex (RAC), which is a heterodimer of the Hsp70/DnaK-type chaperone SSZ1 and the Hsp40/DnaJ-type chaperone ZUO1. The RAC chaperone complex plays a role in regulating accurate translation termination and in folding or maintaining nascent polypeptides in a folding-competent state. The ATPase activity of the ribosome-associated pool of Hsp70-type chaperones SSB1/SSB2, which bind to the nascent polypeptide chain, is stimulated by the RAC chaperone complex. Zuotin acts as a J-protein for SSB1/SSB2 only when it is associated with SSZ1. This domain is responsible for Zuotin's interaction with SSZ1. It contains a conserved LP-motif that binds to the SSZ1 C-terminal SBD β-lid domain in the same way as canonical Hsp70s bind to their substrates.
