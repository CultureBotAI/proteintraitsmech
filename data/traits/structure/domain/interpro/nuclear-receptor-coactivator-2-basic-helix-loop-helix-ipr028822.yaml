identifier: InterPro:IPR028822
label: Nuclear receptor coactivator 2, basic helix-loop-helix
definition: >-
  Nuclear receptor coactivator 2 (NCOA2, also known as Tif2) belongs to the SRC/p160 nuclear receptor coactivator family, which contains proteins that are ligand-dependent transcription factors. These receptors can function as molecular switches. NCOA2 is a transcriptional coactivator for steroid receptors and nuclear receptors. It functions as a coactivator of the steroid binding domain (AF-2) but not of the modulating N-terminal domain (AF-1). Together with NCOA1, it is required to control energy balance between white and brown adipose tissues. This entry represents the N-terminal basic helix-loop-helix (bHLH) domain of NCOA2.
