identifier: InterPro:IPR002104
label: Integrase, catalytic domain
definition: >-
  Members of this entry cleave DNA substrates by a series of staggered cuts, during which the protein becomes covalently linked to the DNA through a catalytic tyrosine residue at the carboxy end of the alignment. This entry includes phage integrases, Tyrosine recombinases from bacteria and archaea such as XerA/C/D/S. The catalytic site residues in CRE recombinase ( ) are Arg-173, His-289, Arg-292 and Tyr-324.
