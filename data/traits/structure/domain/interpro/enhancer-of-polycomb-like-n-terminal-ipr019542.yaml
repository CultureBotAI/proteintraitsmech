identifier: InterPro:IPR019542
label: "Enhancer of polycomb-like, N-terminal"
definition: >-
  This domain is found at the N-terminal of EPL1 (Enhancer of polycomb-like) proteins. The EPL1 protein is a member of a histone acetyltransferase complex which is involved in transcriptional activation of selected genes. It is also present at the N terminus of Jade family proteins.
