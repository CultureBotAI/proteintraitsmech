identifier: InterPro:IPR046879
label: "KANL3/Tex30, alpha/beta hydrolase-like domain"
definition: >-
  This entry represents an α/β hydrolase-fold domain of the animal KAT8 regulatory NSL complex subunit 3 (KANSL3 or NSL3, also known as testis development protein PRTD) and the testis-expressed sequence 30 proteins. KAT8 regulatory NSL complex subunit 3 is part of the NSL complex that is involved in acetylation of nucleosomal histone H4 on several lysine residues and therefore may be involved in the regulation of transcription. The function of the testis-expressed sequence 30 protein is not known. This entry also includes uncharacterised bacterial proteins.
