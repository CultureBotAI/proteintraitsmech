identifier: InterPro:IPR023117
label: "PA1123-like domain"
definition: >-
  This domain contains three α helices and six β strands. It is found in a protein that is produced from gene PA1123 of Pseudomonas. The protein PA1123 appears to be present in the biofilm layer and may be a lipoprotein.
