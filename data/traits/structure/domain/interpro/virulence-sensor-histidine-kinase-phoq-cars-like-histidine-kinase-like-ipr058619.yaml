identifier: InterPro:IPR058619
label: "Virulence sensor histidine kinase PhoQ/CarS-like, histidine kinase-like ATPase domain"
definition: >-
  This entry represents the histidine kinase-like ATPase (HATPase) domain of Virulence sensor histidine kinase PhoQ from Salmonella typhimurium, Sensor protein kinase CarS from Pseudomonas aeruginosa and similar protein members of two-component sensor histidine kinases from gammaproteobacteria. PhoQ is the histidine kinase (HK) of the PhoP-PhoQ two-component regulatory system (TCS), which responds to the levels of Mg2+ and Ca2+, controls virulence, mediates the adaptation to Mg2+-limiting environments, and regulates numerous cellular activities. Most proteins in this group contain a histidine kinase dimerisation and phosphoacceptor domain (HisKA); some have an accessory HAMP sensor domain, and some have an intracellular membrane-interaction PhoQ sensor domain ( ).
