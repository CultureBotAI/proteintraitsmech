identifier: InterPro:IPR059702
label: "ESX-1 scaffolding and assembly protein SaeC, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the SaeC protein family, which functions as a scaffolding and assembly factor for the ESX-1 (ESAT-6 secretion system 1) type VII secretion system (T7SS) in mycobacteria. SaeC is involved in the assembly and polar localisation of the ESX-1 secretory apparatus, which exports virulence factors including EsxA and EsxB. SaeC localises to discrete spots at or near the cell pole, typically at the old or non-septal pole, where it colocalises with other ESX-1 components including EspE and EccCb1. Interestingly, SaeC can localise to the cell pole even in the absence of the ESX-1 locus, suggesting it may act as an early assembly platform. The protein appears to function as part of a probable operon with saeA and saeB, and disruption of this operon blocks polar localisation of the ESX-1 apparatus. In addition to its role in protein secretion, SaeC is required for DNA conjugation in recipient strains of Mycolicibacterium smegmatis. Deletion of saeC results in greatly reduced secretion of ESX-1 substrates and loss of DNA conjugation capability in recipient strains. The protein is approximately 385 amino acids in length and contains conserved cysteine residues that may be important for its function.
