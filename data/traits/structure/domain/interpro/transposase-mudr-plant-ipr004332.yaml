identifier: InterPro:IPR004332
label: "Transposase, MuDR, plant"
definition: >-
  The plant MuDR transposase domain is present in plant (and some fungal) proteins that are presumed to be the transposases for Mutator transposable elements. The function of these proteins is unknown.
