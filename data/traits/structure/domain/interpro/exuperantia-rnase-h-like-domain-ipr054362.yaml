identifier: InterPro:IPR054362
label: "Exuperantia RNAse H-like domain"
definition: >-
  This entry represents the RNAse H-like domain found at the N-terminal of exuperantia (Exu) from Drosophila and similar sequences from insects. Exu is a RNA-binding pseudonuclease associated with bicoid mRNA and required for its localisation. The catalytic site is degenerate and inactive, and as such, this domain mediates dimerisation and RNA binding.
