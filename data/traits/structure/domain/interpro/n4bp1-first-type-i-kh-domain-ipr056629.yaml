identifier: InterPro:IPR056629
label: "N4BP1, first type I KH-domain"
definition: >-
  This domain is found in the N4BP1 family which includes NEDD4-binding protein 1, KHNYN, NYNRIN and other related proteins. Members of this family contain two type I K homology (KH) domains. This entry represents the first KH domain. N4BP1 is a potent suppressor of cytokine production that acts as a regulator of innate immune signalling and inflammation. It acts as a restriction factor against some viruses, such as HIV-1. N4BP1 restricts HIV-1 replication by binding to HIV-1 mRNAs and mediating their degradation via its ribonuclease activity.
