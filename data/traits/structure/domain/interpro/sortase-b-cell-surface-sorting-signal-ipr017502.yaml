identifier: InterPro:IPR017502
label: "Sortase B cell surface sorting signal"
definition: >-
  Two different classes of sorting signal, both analogous to the sortase A signal LPXTG, can be recognised by the sortase, SrtB. These are given as NXZTN and NPKXZ. Proteins sorted by this class of sortase are less common than the sortase A and LPXTG system. This entry describes a number of cell surface proteins regions from Gram-positive bacteria, having a C-terminal region that appears to be sortase B (SrtB) sorting signals.
