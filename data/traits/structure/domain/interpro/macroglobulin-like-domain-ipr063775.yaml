identifier: InterPro:IPR063775
label: "Macroglobulin-like domain"
definition: >-
  This entry represents a macroglobulin-like domain of approximately 90 residues found in Actinomycetota and Chloroflexota. This domain adopts an immunoglobulin-like fold and can occur as tandem repeats. The function of this domain remains to be determined.
