identifier: InterPro:IPR049251
label: "Domain of unknown function DUF6884"
definition: >-
  This entry represents a domain of unknown function that is found either as a standalone protein or in combination with other domains. Members of this family possess a highly conserved LSAXXG motif that may constitute an active site. This domain may be distantly related to oxidative stress response YaaA proteins.
