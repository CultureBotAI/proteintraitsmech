identifier: InterPro:IPR060586
label: "CRLF3, N-terminal coiled-coil domain"
definition: >-
  This entry represents the N-terminal coiled-coil domain of cytokine receptor-like factor 3 (CRLF3) animal proteins. CRLF3 proteins may play a role in the negative regulation of cell cycle progression. The proteins are localised to the cytoplasm and contain a fibronectin type-III domain in addition to this N-terminal domain. The specific function of this coiled-coil domain remains to be determined.
