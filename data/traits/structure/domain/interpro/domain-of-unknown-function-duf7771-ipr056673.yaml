label: "Domain of unknown function DUF7771"
definition: >-
  This domain is found in uncharacterised plant proteins. It is predicted to fold into a β-sandwich with structural similarity to Transthyretin-like domains in particular to SPH (Self-Incompatibility Protein Homologue) proteins.
