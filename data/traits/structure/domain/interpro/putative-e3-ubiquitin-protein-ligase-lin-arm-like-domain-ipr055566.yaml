identifier: InterPro:IPR055566
label: "Putative E3 ubiquitin-protein ligase LIN, ARM-like domain"
definition: >-
  This entry represents a domain found in a group of plant proteins, including the putative E3 ubiquitin-protein ligase LIN from Medicago truncatula. This domain may adopt an ARM-repeat fold. E3 ubiquitin-protein ligase LIN is involved in the rhizobial infection process. This protein plays an important role in the early steps of bacterial symbiont thread formation in roots, and in growth, differentiation and maintenance of nodules.
