label: "Telomerase reverse transcriptase, CTE domain"
definition: >-
  This is the CTE (C-terminal element) domain of Telomerase reverse transcriptase from Tetrahymena thermophila (TERT), the catalytic component of the telomerase. This domain adopts a predominantly α-helical structure.
