label: "Anti-bacteriophage protein B, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of anti-bacteriophage protein B (AbpB), found in bacteria. AbpB is a probable helicase that provides resistance to bacteriophage infection.
