identifier: InterPro:IPR009465
label: "Spondin, N-terminal"
definition: >-
  This conserved region is found in the N-terminal half of several Spondin proteins, also called FS domain. It is found in F-spondins (spondin-1), mindins (spondin-2). Its homology to a common Ca2+- and lipid-binding C2 domain suggests that the F-spondin FS domain is responsible for part of the membrane targeting of F-spondin in its regulation of axon development. Spondins are multi-domain extracellular matrix (ECM) protein as well as contact-repellent molecules that directs axon outgrowth and cell migration during development. Spondins are involved in patterning axonal growth trajectory through either inhibiting or promoting adhesion of embryonic nerve cells.
