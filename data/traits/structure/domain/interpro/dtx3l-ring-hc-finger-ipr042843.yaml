identifier: InterPro:IPR042843
label: "DTX3L, RING-HC finger"
definition: >-
  DTX3L is a RING-domain E3 ubiquitin-protein ligase that regulates endosomal sorting of the G protein-coupled receptor CXCR4 from endosomes to lysosomes. It also regulates subcellular localization of its partner protein, B aggressive lymphoma (BAL), by a dynamic nucleocytoplasmic trafficking mechanism. DTX3L has a unique N terminus, but lacks the highly basic N-terminal motif and the central proline-rich motif present in other Deltex (DTX) family members, such as DTX1, DTX2, and DTX4. Moreover, its C-terminal region is highly homologous to DTX3. It includes a C3HC4-type RING-HC finger, and a DTC domain. DTX3L can associate with DTX1 through its unique N terminus and further enhance self-ubiquitination.
