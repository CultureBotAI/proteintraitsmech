identifier: InterPro:IPR032295
label: "Domain of unknown function DUF4842"
definition: >-
  This domain is found at the C terminus of large number of uncharacterised proteins with broad phylogenetic distribution, which includes human gut Bacteroides, gammaproteobacteria (Vibrio and Shewanella) and also spirochetes from Leptospira genus. Solved structure of Bacteroides ovatus protein BACOVA_00967 (PDB entry 3oqq) shows a large β barrel with an immunoglobulin-like fold and significant structural similarity to collagen-binding domain of adhesin from S. aureus (1amx), but with several additional long loops and secondary structure elements. The function of this domain is unknown.
