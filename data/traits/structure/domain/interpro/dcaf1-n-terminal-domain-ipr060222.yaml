identifier: InterPro:IPR060222
label: "DCAF1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of human DDB1- and CUL4-associated factor 1 (DCAF1) and similar animal proteins. This domain precedes these characterised regions and contains disordered regions. Its specific function remains to be determined. DCAF1 is a component of the CUL4-RBX1-DDB1-DCAF1 E3 ubiquitin-protein ligase complex, where it may function as the substrate recognition module. The protein contains multiple functional regions including WD40 repeats, DWD boxes required for DDB1 interaction, and a LisH domain .
