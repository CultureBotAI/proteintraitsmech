identifier: InterPro:IPR040751
label: "S-layer protein SbsC, C-terminal domain"
definition: >-
  This domain is found in the crystalline bacterial cell-surface layer (S-layer) protein SbsC present in Geobacillus stearothermophilus. S-layers are a common feature of archaeal cell envelopes. SbsC is an oblique lattice forming protein. This domain, termed Domain 9, is located at the C-terminal region of SbsC. The C-terminal region comprises the self-assembly domain responsible for the formation of the crystalline array.
