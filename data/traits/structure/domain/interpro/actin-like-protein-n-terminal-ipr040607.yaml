identifier: InterPro:IPR040607
label: "Actin-like protein, N-terminal"
definition: >-
  This is the N-terminal domain found in archaeal actin homologue Ta0583 found in thermophilic archaeon Thermoplasma acidophilum. Structural analysis indicate that the fold of Ta0583 contains the core structure of actin indicating that it belongs to the actin/Hsp70 superfamily of ATPases. Furthermore, Ta0583 co-crystallised with ADP shows that the nucleotide binds at the interface between the subdomains of Ta0583 in a manner similar to that of actin. It has been suggested that Ta0583 might function in the cellular organisation of T. acidophilum. Other family members include ParM, another actin-like protein found in Staphylococcus aureus. Crystal structure coordinates revealed that this protein is most structurally related to the chromosomally encoded Actin-like proteins (Alp) Ta0583 from the archaea Thermoplasma acidophilum. Furthermore, biophysical analyses have suggested that ParM filaments undergo a treadmilling-like mechanism of motion in vitro similar to that of F-actin. The recruitment of ParM to the segrosome complex, was shown to be required for the conversion of static ParM filaments to a dynamic form proficient for active segregation and facilitated by the C terminus of ParR.
