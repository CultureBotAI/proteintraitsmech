identifier: InterPro:IPR058488
label: "Domain of unknown function DUF8175"
definition: >-
  This entry represents an NTF2 superfamily domain found in a family of uncharacterised proteins from the Actinomycetota phylum, specifically within the Actinomycetes class. The family is predominantly found in Streptomycetaceae and Nocardiaceae families, with a notable presence in Streptomyces species. Proteins in this family are typically around 250-300 amino acids in length. Many members contain predicted transmembrane helices, suggesting they may be integral membrane proteins.
