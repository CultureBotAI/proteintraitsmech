identifier: InterPro:IPR026341
label: "T9SS type B sorting domain"
definition: >-
  This entry describes a C-terminal domain greatly expanded in proteins from Bacteriodetes, where Type IX secretions systems (T9SS) occur. This domain, known as Type B, is recognized as sorting signal by T9SS, whose targets are normally cleaved by a transpeptidase and then attached to a component of the outer membrane, but a few are released in soluble form. Species in this lineage include several, such as Cytophaga hutchinsonii and Flavobacterium johnsoniae, that exhibit a poorly understood rapid gliding phenotype. Several members of this protein family are found in operons with other genes whose loss leads to a loss of motility.
