identifier: InterPro:IPR030565
label: "Kelch-like protein 25, BTB/POZ domain"
definition: >-
  Kelch-like protein 25 (KLHL25, also known as ENC-2) serves as a substrate-specific adapter in the Cul3-dependent ubiquitin ligase complex that targets hypophosphorylated 4E-BP1 (4E-binding protein 1) for degradation. 4E-BPs regulate the activity of eIF4E, a mRNA 5' cap-binding protein and a major target for translational control. The KLHL (Kelch-like) proteins generally have a BTB/POZ domain, a BACK domain, and five to six Kelch motifs. They constitute a subgroup at the intersection between the BTB/POZ domain and Kelch domain superfamilies. The BTB/POZ domain facilitates protein binding, while the Kelch domain (repeats) form β-propellers. The Kelch superfamily of proteins can be subdivided into five groups: (1) N-propeller, C-dimer proteins, (2) N-propeller proteins, (3) propeller proteins, (4) N-dimer, C-propeller proteins, and (5) C-propeller proteins. KLHL family members belong to the N-dimer, C-propeller subclass of Kelch repeat proteins. In addition to BTB/POZ and Kelch domains, the KLHL family members contain a BACK domain, first described as a 130-residue region of conservation observed amongst BTB-Kelch proteins. Many of the Kelch-like proteins have been identified as adaptors for the recruitment of substrates to Cul3-based E3 ubiquitin ligases. This entry represents the BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KLHL25.
