identifier: InterPro:IPR005160
label: Ku70/Ku80 C-terminal arm
definition: >-
  The Ku heterodimer (composed of Ku70 and Ku80 ) contributes to genomic integrity through its ability to bind DNA double-strand breaks and facilitate repair by the non-homologous end-joining pathway. This is the C-terminal arm. This α helical region embraces the β-barrel domain of the opposite subunit.
