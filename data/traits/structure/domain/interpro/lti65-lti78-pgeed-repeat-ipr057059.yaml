identifier: InterPro:IPR057059
label: "LTI65/LTI78, PGEED repeat"
definition: >-
  This entry represents a disordered region found in LTI78/LTI65 from Arabidopsis thaliana and related plant proteins. This region consists of repeats containing the conserved PGEED sequence and is located C-terminal of the CAP160 repeat ( ). LTI78 and LTI65 are involved in responses to abiotic stress.
