identifier: InterPro:IPR034353
label: "ABT1/ESF2, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of a novel nuclear protein termed ABT1 and its homologous counterpart, pre-rRNA-processing protein Esf2 (eighteen S factor 2), from yeast. ABT1 associates with the TATA-binding protein (TBP) and enhances basal transcription activity of class II promoters. Meanwhile, ABT1 could be a transcription cofactor that can bind to DNA in a sequence-independent manner.
