identifier: InterPro:IPR006164
label: "Ku70/Ku80, DNA-binding domain"
definition: >-
  The Ku heterodimer (composed of Ku70 and Ku80) contributes to genomic integrity through its ability to bind DNA double-strand breaks and facilitate repair by the non-homologous end-joining pathway. This is the central DNA-binding β-barrel domain. This domain is found in both the Ku70 and Ku80 proteins that form a DNA binding heterodimer.
