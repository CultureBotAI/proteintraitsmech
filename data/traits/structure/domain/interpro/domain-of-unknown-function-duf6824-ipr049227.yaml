label: "Domain of unknown function DUF6824"
definition: >-
  This domain is functionally uncharacterised, found mainly in diatoms (phylum Bacillariophyta). There are highly conserved motifs: DxxxGR/KG, HxGN and GRFL; and three highly conserved residues: W, K and R at the C-terminal.
