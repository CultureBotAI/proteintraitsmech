identifier: InterPro:IPR029155
label: "SIPAR domain"
definition: >-
  This domain is found in SIPAR (STAT3-Interacting Protein As a Repressor). SIPAR inhibits STAT3 activity by accelerating its dephosphorylation. STAT3 is a member of the STAT family (signal transducers and activators of transcription) that plays an esential role in cell growth and differentiation.
