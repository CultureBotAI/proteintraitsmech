label: "Domain of unknown function DUF7959"
definition: >-
  This entry represents a presumed ferredoxin-like fold domain found at the C terminus of a range of animal proteins that contain LolA-like domains suggesting these proteins may act as lipoprotein chaperones. The function of this domain is uncertain.
