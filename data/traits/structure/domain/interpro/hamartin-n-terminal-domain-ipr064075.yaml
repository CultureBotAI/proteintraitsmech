identifier: InterPro:IPR064075
label: "Hamartin, N-terminal domain"
definition: >-
  This entry includes hamartin, also known as Tuberous sclerosis 1 protein (TSC1), the non-catalytic component of the TSC-TBC complex, a multiprotein complex that acts as a negative regulator of the canonical mTORC1 complex. This complex acts as a GTPase-activating protein (GAP) for the small GTPase RHEB, a direct activator of the protein kinase activity of m TORC1. It also acts as a tumour suppressor. The hamartin protein interacts with the tuberin protein (TSC2) . Tuberous sclerosis complex (TSC) is an autosomal dominant disorder and is characterised by the presence of hamartomas in many organs, such as the brain, skin, heart, lungs, and kidneys. It is caused by a mutation in either TSC1 or TSC2 tumour suppressor gene. TSC1 contains an N-terminal HEAT repeats domain followed by coiled-coil regions. This domain interacts with membrane phosphatidylinositol phosphates (PIPs).
