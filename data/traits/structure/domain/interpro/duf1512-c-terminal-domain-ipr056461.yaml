identifier: InterPro:IPR056461
label: "DUF1512, C-terminal domain"
definition: >-
  This entry includes archaeal proteins of around 370 residues in length. This entry corresponds to the C-terminal domain. The function of this group of proteins is unknown. This domain shows structural similarity to peptidyl tRNA hydrolase enzymes.
