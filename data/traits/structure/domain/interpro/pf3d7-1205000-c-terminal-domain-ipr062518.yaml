identifier: InterPro:IPR062518
label: "PF3D7_1205000, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein PF3D7_1205000 from Plasmodium falciparum. The protein is 781 amino acids. The protein is localised to membranes and is a multi-pass membrane protein. A peptide fragment (residues 263-292) has been identified as a possible candidate malaria epitope showing response in sera. The function of this domain remains to be determined.
