identifier: InterPro:IPR032575
label: "Lipocalin-like domain (DUF4923)"
definition: >-
  Proteins containing this domain are a group of uncharacterised proteins around 200 residues in length and mainly found in Bacteroidales. Their function is unknown. This domain is distantly related to lipocalins.
