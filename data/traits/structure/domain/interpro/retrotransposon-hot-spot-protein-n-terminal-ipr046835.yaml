identifier: InterPro:IPR046835
label: "Retrotransposon hot spot protein, N-terminal"
definition: >-
  Members of this entry are retrotransposon hot spot (RHS) proteins. They are associated with polymorphic subtelomeric regions in Trypanosoma. These proteins contain a conserved box 1 with a P-loop motif and a retrotransposon insertion site at the C-terminal ( ). This domain represents the N-terminal region of the conserved box 1 from RHSPs.
