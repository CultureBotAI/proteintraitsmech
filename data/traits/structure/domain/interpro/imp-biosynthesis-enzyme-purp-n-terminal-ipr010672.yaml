identifier: InterPro:IPR010672
label: "IMP biosynthesis enzyme PurP, N-terminal"
definition: >-
  This entry represents the N-terminal domain of PurP. Its function is not known, though it is almost always found in association with . The last two steps of de novo purine biosynthesis are: conversion of 5-aminoimidazole-4-carboxamide-1-beta-D-ribofuranosyl 5'-monophosphate (AICAR) to 5-formaminoimidazole-4-carboxamide-1-beta-D-ribofuranosyl 5'-monophosphate (FAICAR) conversion of FAICAR to inosine5'-monophopsphate (IMP) In bacteria and eukaryotes, these steps are catalysed by the well-characterised bifunctional enzyme PurH. Archaea do not appear to posses PurH, however, and perform these reactions by a different mecahnism. In archaea, step i) is catalysed by the well-conserved PurP protein, while step ii) is catalysed by the PurO enzyme in some (though not all) species.
