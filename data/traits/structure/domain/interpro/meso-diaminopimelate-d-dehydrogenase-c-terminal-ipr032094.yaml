identifier: InterPro:IPR032094
label: "Meso-diaminopimelate D-dehydrogenase, C-terminal"
definition: >-
  This entry represents the C-terminal domain of diaminopimelic acid dehydrogenase. Diaminopimelate dehydrogenase is a NADPH-dependent enzyme that catalyses the oxidative deamination of meso-2,6-diaminopimelate, which is the direct precursor of L-lysine in bacterial lysine biosynthesis.
