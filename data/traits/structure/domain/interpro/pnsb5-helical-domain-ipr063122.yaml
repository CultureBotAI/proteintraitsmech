identifier: InterPro:IPR063122
label: "PnsB5, helical domain"
definition: >-
  This entry represents a helical domain found in the central region of PnsB5 (photosynthetic NDH subunit of subcomplex B 5), also known as NDH18. PnsB5 is a nucleus-encoded subunit of the chloroplast NAD(P)H dehydrogenase-like (NDH) complex found in plants. The full-length protein is a multi-pass membrane protein localised to the chloroplast membrane and is a component of NDH subcomplex B, along with PnsB1, PnsB2, PnsB3 and PnsB4. This helical domain consists of two transmembrane helices. The function of this domain remains to be determined.
