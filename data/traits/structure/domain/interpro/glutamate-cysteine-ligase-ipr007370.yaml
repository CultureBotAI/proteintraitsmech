identifier: InterPro:IPR007370
label: "Glutamate--cysteine ligase"
definition: >-
  This is a group of bacterial glutamate-cysteine ligases that carry out the first step of the glutathione biosynthesis pathway according to the following equation: ATP + L-glutamate + L-cysteine = ADP + phosphate + L-glutamyl-L-cysteine (L-aminohexanoate can replace glutamate).
