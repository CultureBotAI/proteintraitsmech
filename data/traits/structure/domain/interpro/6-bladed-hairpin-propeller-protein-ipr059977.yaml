identifier: InterPro:IPR059977
label: "6-bladed hairpin-propeller protein"
definition: >-
  This entry represents a small family of proteins found in pseudomonadota bacteria and phage proteins. The proteins have a repetitive sequence that folds into a 6-bladed propeller composed of β-hairpin motifs.
