identifier: InterPro:IPR063322
label: "Tyrosinase inhibitor domain"
definition: >-
  This entry represents a domain found stand alone in tyrosinase inhibitors in insects. The prototype member from Musca domestica is a 38-residue secreted protein that acts as a potent reversible, competitive inhibitor of tyrosinase (phenol oxidase) in the nanomolar range. The protein contains a disulfide through disulfide knot structure (knottin) with three disulfide bonds. It is found in hemolymph and contains L-DOPA (3',4'-dihydroxyphenylalanine) as a post- translational modification. Activity increases throughout pupariation and is highest in final instar pupae. This domain is also found in U-Asilidin(1)-Dg12, a neurotoxin that may modulate ions channels (other than those tested).
