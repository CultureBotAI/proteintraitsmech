label: "Fumarylacetoacetase N-terminal domain"
definition: >-
  This is domain is found in the N-terminal region of fumarylacetoacetate (FAA) hydrolase ( ). It is found, among others, in Pseudogulbenkiania ferrooxidans and Cupriavidus gilardii.
