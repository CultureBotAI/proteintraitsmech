identifier: InterPro:IPR047488
label: U2-associated protein SR140, cwf21 domain
definition: >-
  This entry represents the cwf21 domain of SR140 and similar animal proteins. This domain is involved in mRNA splicing. It binds directly to the spliceosomal protein Prp8. SR140, also called U2 snRNP-associated SURP motif-containing protein, U2SURP, or 140 kDa Ser/Arg-rich domain protein, is a putative splicing factor mainly found in higher eukaryotes. Although it was initially identified as a 17S U2 snRNP-associated protein, the molecular and physiological function of SR140 remains unclear.
