identifier: InterPro:IPR054727
label: "Protein bicaudal C homolog 1, KH-like domain"
definition: >-
  This domain is found in human protein bicaudal C homolog 1 (Bicc1) and its homologues. Bicc1 is an RNA-binding protein composed of three KH and two KH-like domains that are linked by an intervening sequence to a C-terminal SAM domain. Bicc1 acts as a negative regulator of Wnt signalling. It is also involved in regulating gene expression during embryonic development. Bicc1 binds the 3' UTRs of the target mRNAs via KH domains, whereas self-polymerisation of its SAM domain mediates recruitment to large cytoplasmic foci for translational silencing. This entry represents the Bicc1 KH-like domains.
