identifier: InterPro:IPR057136
label: "At2g35280-like, TPR domain"
definition: >-
  This entry represents the predicted tetratrico peptide repeat (TPR) domain found in F-box proteins At2g35280, At5g50450 and At1g67340 from Arabidopsis thaliana and similar plant proteins. This entry is found associated with in some members of this family.
