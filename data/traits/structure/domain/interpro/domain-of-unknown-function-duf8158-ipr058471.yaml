identifier: InterPro:IPR058471
label: "Domain of unknown function DUF8158"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in Halobacteria. The proteins containing this domain are primarily found in various genera within the Halobacteriales order, including Halorubrum, Haloarculaceae, and Haloferacaceae. The domain is approximately 109 amino acids in length. The domain is composed of four α helices.
