identifier: InterPro:IPR047888
label: "ARHGAP20, Ras-associating domain"
definition: >-
  This entry represents the Ras-associating (RA) domain of ARHGAP20. ARHGAP20 (also known as RARhoGAP/Rho GTPase-activating protein 20) is thought to function in rearrangements of the cytoskeleton and cell signalling events that occur during spermatogenesis. ARHGAP20 was also shown to be activated by Rap1 and to induce inactivation of Rho, resulting in the neurite outgrowth. Recent findings show that ARHGAP20, even although it is located in the middle of the MDR on 11q22-23, is expressed at higher levels in chronic lymphocytic leukemia patients with 11q22-23 and/or 13q14 deletions and its expression pattern suggests a functional link between cases with 11q22-23 and 13q14 deletions. ARHGAP20 contains a PH domain, a Ras-associating domain, a Rho-GAP domain, and ANXL repeats. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarised.
