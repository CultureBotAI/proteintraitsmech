identifier: InterPro:IPR063099
label: "Bacteriophage P22 Gp10, beta-sandwich"
definition: >-
  This entry represents a β-sandwich domain found at the C-terminal of bacteriophage P22 gp10 protein. The gp10 protein forms the the hexameric tail hub which is the P22 tail building block. The gp10 protein consists of two domains, the N-terminal of which is a β-propeller ( ).
