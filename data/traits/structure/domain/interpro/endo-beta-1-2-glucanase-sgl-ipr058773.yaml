identifier: InterPro:IPR058773
label: "Endo-beta-1,2-glucanase SGL"
definition: >-
  This entry represents the endo-beta-1,2-glucanase (SGL) from Talaromyces funiculosus, a soil fungus, and related proteins. TfSGL specifically hydrolyses linear and cyclic beta-1,2-glucans to sophorose (Glc-beta-1,2-Glc) as a main product. TfSGL is an inverting enzyme and belongs to GH162 family. This enzyme adopts an α-helical structure with (α/α)6 toroid fold which is related to the members of Six-hairpin glycosidase superfamily.
