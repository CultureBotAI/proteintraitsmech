identifier: InterPro:IPR005576
label: "RNA polymerase Rpb7-like , N-terminal"
definition: >-
  Rpb7 is a subunit of eukaryotic RNA polymerase (RNAP) II that is homologous to Rpa43 of RNAP I, Rpc8/Rpc25 of RNP III, and RpoE of archaeal RNAP. Rpb7 binds to Rpb4 to form a heterodimer. This complex is thought to interact with the nascent RNA strand during RNA polymerase II elongation and plays a part in transcription, mRNA transport and DNA repair. In RNA polymerase I, Rpa43 is at least one of the subunits contacted by the transcription factor TIF-IA. The N terminus of Rpb7 and homologues has a SHS2 domain that is involved in protein-protein interaction.
