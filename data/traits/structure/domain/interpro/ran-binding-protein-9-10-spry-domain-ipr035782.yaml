label: "Ran binding protein 9/10, SPRY domain"
definition: >-
  This SPRY domain is found in Ran binding protein M (RanBPM, also known as RanBP9) and RanBP10. RanBPM and RanBP10 are non-canonical members of the Ran binding protein family that lack the Ran binding domain and do not associate with Ran GTPase in vivo. RanBPM is a scaffolding protein important for a variety of cellular processes. RanBP10 has been shown to function as a cytosolic guanine exchange factor and microtubule regulator. Both of these proteins contain a SPRY domain, which has been implicated in mediating protein-protein interactions with a variety of targets, including the DEAD-box containing ATP-dependent RNA helicase (DDX-4). This entry also includes GID complex subunit 1 (glucose-induced degradation-deficient) , also known as the CTLH (C-terminal to LisH) complex in humans. RanBPM is a crucial component of the GID complex. The SPRY domain is a ~140-amino-acid protein interaction module involved in many important signalling pathways like RNA processing, regulation of histone H3 methylation, innate immunity, or embryonic development. It can be divided into 11 subfamilies based on amino acid sequence similarity or the presence of additional protein domains. Functionally, SPRY domains mediate critical interactions in diverse pathways: SSB-2 binds Par-4 to regulate apoptosis, RanBPM/SSB-1 interact with c-Met for signalling modulation, and SPSB proteins target iNOS for ubiquitination in immune regulation. The B30.2 domain was first identified as a protein domain encoded by an exon (named B30-2) in the Homo sapiens class I major histocompatibility complex region, whereas the SPRY domain was first identified in a Dictyostelium discoideum kinase splA and mammalian calcium-release channels ryanodine receptors. B30.2 domain consists of PRY and SPRY subdomains. The SPRY…
