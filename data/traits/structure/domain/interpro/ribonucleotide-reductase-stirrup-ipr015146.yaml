identifier: InterPro:IPR015146
label: "Ribonucleotide reductase, stirrup"
definition: >-
  The Stirrup domain, found in the prokaryotic protein ribonucleotide reductase, has a molecular mass of 9kDa and is folded into an α/β structure. It allows for binding of the reductase to DNA via electrostatic interactions, since it has a predominance of positive charges distributed on its surface.
