identifier: InterPro:IPR011115
label: SecA DEAD-like, N-terminal
definition: >-
  SecA protein binds to the plasma membrane where it interacts with proOmpA to support translocation of proOmpA through the membrane. SecA protein achieves this translocation, in association with SecY protein, in an ATP-dependent manner. This domain represents the N-terminal ATP-dependent helicase domain.
