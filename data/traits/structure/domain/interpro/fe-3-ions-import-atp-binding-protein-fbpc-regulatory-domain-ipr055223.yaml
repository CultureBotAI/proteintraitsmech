identifier: InterPro:IPR055223
label: "Fe(3+) ions import ATP-binding protein FbpC, regulatory domain"
definition: >-
  This entry represents the regulatory domain (RD) of Fe(3+) ions import ATP-binding protein FbpC, the nucleotide-binding domain of the iron-uptake ABC transporter FbpABC from Neisseria gonorrhoeae. This domain adopts two OB-folds per monomer. Members of this group are mainly found in Neisseria species.
