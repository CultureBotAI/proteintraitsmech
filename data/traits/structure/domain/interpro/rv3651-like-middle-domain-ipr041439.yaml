identifier: InterPro:IPR041439
label: "Rv3651-like, middle domain"
definition: >-
  This domain is found in Triple sensor-domain protein Rv3651 from Mycobacterium tuberculosis and similar proteins from actinobacteria. Rv3651 adopts a three-domain configuration. This entry represents the middle domain, a PAS domain that shows a central antiparallel β-sheet of five β-strands.
