identifier: InterPro:IPR039925
label: "RNF37, RING-Ubox"
definition: >-
  RNF37 is an E3 ubiquitin-protein ligase found exclusively in the nucleus as part of a nuclear dot-like structure. It interacts with the molecular chaperone VCP/p97 protein. RNF37 contains a U-box domain followed by a potential nuclear location signal (NLS), and a C-terminal C3HC4-type RING-HC finger. The U-box domain is a modified RING finger domain that lacks the hallmark metal-chelating cysteines and histidines of the latter, but is likely to adopt a RING finger-like conformation. The presence of the U-box, but not of the RING finger, is required for the E3 activity. The U-box domain can directly interact with several E2 enzymes, including UbcM2, UbcM3, UbcM4, UbcH5, and UbcH8, suggesting a similar function as the RING finger in the ubiquitination pathway.
