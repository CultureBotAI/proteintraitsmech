identifier: InterPro:IPR003536
label: Translocated intimin receptor, central domain
definition: >-
  Secretion of virulence factors in Gram-negative bacteria involves transportation of the protein across two membranes to reach the cell exterior. There have been four secretion systems described in animal enteropathogens, such as Salmonella and Yersinia, with further sequence similarities in plant pathogens like Ralstonia and Erwinia. The type III secretion system is of great interest, as it is used to transport virulence factors from the pathogen directly into the host cell and is only triggered when the bacterium comes into close contact with the host. The protein subunits of the system are very similar to those of bacterial flagellar biosynthesis. However, while the latter forms a ring structure to allow secretion of flagellin and is an integral part of the flagellum itself, type III subunits in the outer membrane translocate secreted proteins through a channel-like structure. Exotoxins secreted by the type III system do not possess a secretion signal, and are considered unique for this reason. Enteropathogenic and entero-haemorrhagic Escherichia coli secrete the bacterial adhesion mediation molecule intimin, which targets the translocated intimin receptor (Tir). Tir is secreted by the bacteria and is embedded in the target cell's plasma membrane. This facilitates bacterial cell attachment to the host.
