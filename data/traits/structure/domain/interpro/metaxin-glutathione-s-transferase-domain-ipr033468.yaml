identifier: InterPro:IPR033468
label: "Metaxin, glutathione S-transferase domain"
definition: >-
  This entry represents a conserved glutathione S-transferase (GST) domain present in metaxins and failed axon connections (FAX). Metaxin is a mitochondrial outer membrane protein, which is involved in transport of proteins into the mitochondrion. FAX may play a role in axonal development.
