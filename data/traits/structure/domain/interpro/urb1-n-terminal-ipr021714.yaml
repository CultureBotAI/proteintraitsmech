identifier: InterPro:IPR021714
label: "URB1, N-terminal"
definition: >-
  This entry represents a domain found at the N-terminal of URB1 and related proteins. Nucleolar pre-ribosomal-associated protein 1 (Npa1 or URB1) is required for ribosome biogenesis and operates in the same functional environment as Rsa3p and Dbp6p during early maturation of 60S ribosomal subunits. The protein partners of URB1 include eight putative helicases as well as the novel Npa2p factor. URB1 can also associate with a subset of H/ACA and C/D small nucleolar RNPs (snoRNPs) involved in the chemical modification of residues in the vicinity of the peptidyl transferase centre.
