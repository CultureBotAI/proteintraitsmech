identifier: InterPro:IPR047915
label: "Tau-Tubulin Kinase 2, catalytic domain"
definition: >-
  Tau-Tubulin Kinases (TTBKs) are neuron-specific kinases that phosphorylate the microtubule-associated protein tau and promotes its aggregation. Higher vertebrates contain two TTBK proteins, TTBK1 and TTBK2, both of which have been implicated in neurodegeneration. Mutations in TTBK2 is associated with the development of spinocerebellar ataxia type 11, belonging to a group of neurodegenerative disorders characterised by progressive incoordination, dysarthria and impairment of eye movements. Brain tissues of SCA11 patients show the presence of neurofibrillary tangles and tau deposition in the brain, similar to Alzheimer's disease (AD) patients. This entry represents the kinase domain of TTBK2.
