identifier: InterPro:IPR063909
label: "PAB, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the PAB (protein IN CHLOROPLAST ATPASE BIOGENESIS). PAB is a chloroplast stromal protein that functions as an assembly chaperone involved in the assembly of the F1 ATP synthase in chloroplast thylakoid membranes. The protein functions downstream of the CPN60 chaperones to promote assembly of the catalytically active core of the chloroplast ATP synthase and assists the assembly of the ATP synthase gamma subunit into the active F1 core. PAB interacts with ATPC1 and is critical for the biogenesis of the chloroplast ATP synthase. The domain represented by this entry is predicted to adopt a structure which share similarity with domains members of SUKH superfamily.
