identifier: InterPro:IPR040555
label: "Cas9, PI domain"
definition: >-
  This domain is found in Cas9 proteins from some bacteria, such as Staphylococcus aureus. Cas9 cleaves double-stranded DNA targets with a protospacer adjacent motif (PAM) and complementarity to the guide RNA. When this domain is combined with the C-terminal domain it is called the Pam-interacting (PI) domain. The Cas9 orthologs from different microbes have highly divergent sequences but their PI domains share a conserved core fold and recognize distinct PAM sequences.
