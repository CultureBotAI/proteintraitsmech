identifier: InterPro:IPR022713
label: "Proteinase inhibitor I67, bromein"
definition: >-
  Bromelain inhibitor VI is a double-chain inhibitor consisting of an 11-residue and a 41-residue chain. This protein is the 41-residue heavy chain which is joined to the 11-residue chain by disulphide bonds. The inhibitor acts to inhibit the cysteine proteinase bromelain.
