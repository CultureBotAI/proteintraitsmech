identifier: InterPro:IPR006638
label: Elp3/MiaA/NifB-like, radical SAM core domain
definition: >-
  This domain is found in FeMo cofactor biosynthesis protein NifB, PqqA peptide cyclase, Oxygen-independent coproporphyrinogen III oxidase (HemN), biotin synthase (BioB), Lipoyl synthase (LipA), Ribosomal protein S12 methylthiotransferase RimO, GTP 3',8-cyclase (MoaA) and tRNA-2-methylthio-N(6)-dimethylallyladenosine synthase (MiaB), and similar proteins found in cellular organisms. This group includes a representative in the eukaryotic elongator subunit, Elp-3. Some members of this entry are methyltransferases.
