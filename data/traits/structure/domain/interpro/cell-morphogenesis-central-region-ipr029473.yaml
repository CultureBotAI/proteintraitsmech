identifier: InterPro:IPR029473
label: "Cell morphogenesis central region"
definition: >-
  This entry represents the central region of proteins that are involved in cell morphogenesis. Among these are furry proteins from flies, proteins PAG1 from budding yeasts and Mor2 from fission yeasts.
