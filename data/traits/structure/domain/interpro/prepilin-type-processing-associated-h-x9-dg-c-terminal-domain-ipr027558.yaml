identifier: InterPro:IPR027558
label: "Prepilin-type processing-associated H-X9-DG C-terminal domain"
definition: >-
  This entry describes a region of approximately 16 residues found typically about 30 residues away from the C terminus of large numbers of proteins in the Planctomycetes, Lentisphaerae, and Verrucomicrobia, on proteins with a prepilin-type N-terminal cleavage/methylation site (see ). The motif H-X(9)-D-G is nearly invariant. Single genomes may encode over 200 such proteins.
