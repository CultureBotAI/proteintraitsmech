identifier: InterPro:IPR005025
label: NADPH-dependent FMN reductase-like domain
definition: >-
  This domain in found in several flavoproteins such as FMN-dependent NADPH-azoreductase, which catalyses the reductive cleavage of azo bond in aromatic azo compounds to the corresponding amines, and NAD(P)H:quinone oxidoreductase, which reduces quinones to the hydroquinone state to prevent interaction of the semiquinone with O2 and production of superoxide. In Arabidopsis NADPH:quinone oxidoreductase is involved in detoxification pathways. NAD(P)H:quinone oxidoreductase prefers NADH over NADPH, while FMN-dependent NADPH-azoreductase requires NADPH, but not NADH, as an electron donor for its activity.
