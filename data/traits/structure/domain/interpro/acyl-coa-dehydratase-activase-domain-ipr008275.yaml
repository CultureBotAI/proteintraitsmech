identifier: InterPro:IPR008275
label: "Acyl-CoA dehydratase activase domain"
definition: >-
  This domain is found in a set of closely related prokaryotic [4Fe-4S]-containing ATPases, including activators of (R)-2-hydroxyglutaryl-CoA dehydratase, (R)-phenyllactate dehydratase, lactoyl-CoA dehydratase, and benzoyl-CoA reductase, as well as the uncharacterised protein YjiL of E. coli. Characterised members of this family provide a key reactive electron that their cognate enzyme requires for activity, and can use for multiple reaction cycles until the electron is lost and needs to be replaced.
