identifier: InterPro:IPR060187
label: "TOE-2, middle domain"
definition: >-
  This entry represents a middle domain of the target of ERK kinase mpk-1 (TOE-2) from nematode species. The function of this domain remains to be determined. TOE-2 is involved in promoting asymmetric cell division and fate assignment in the Q neuroblast lineage, functioning as a downstream target of MAP kinase mpk-1. The full-length protein contains a DEP domain and localises to multiple cellular compartments, including cytoplasm, nucleus, centrosomes and the midbody. TOE-2 is a downstream target of MAP kinase mpk-1.
