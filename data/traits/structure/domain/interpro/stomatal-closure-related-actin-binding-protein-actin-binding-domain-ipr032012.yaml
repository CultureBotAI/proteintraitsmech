identifier: InterPro:IPR032012
label: "Stomatal closure-related actin-binding protein, actin-binding domain"
definition: >-
  This entry represents the actin-binding domain (ABD) of plant-specific actin-binding proteins or SCABs. SCAB proteins bind, bundle and stabilise actin filaments and regulate stomatal movement. The Ig-PH fusion domain is at the C terminus. The ABD is structurally independent from the first coiled-coil, CC1, domain which is also involved in binding; the CC1 is likely to function as a dimerisation module,
definition_source: InterPro
trait_axis: STRUCTURE
trait_category: STRUCT_DOMAIN
term_kind: CLASS
