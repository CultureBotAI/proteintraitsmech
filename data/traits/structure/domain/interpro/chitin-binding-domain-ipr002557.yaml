identifier: InterPro:IPR002557
label: "Chitin binding domain"
definition: >-
  This entry represents a chitin binding domain. It is found in the Peritrophin-A chitin binding proteins, particularly the peritrophic matrix proteins of insects and animal chitinases and related proteins. Copies of the domain are also found in some baculoviruses. It is an extracellular domain characterised by a six-cysteine motif and several aromatic residues. Chitin-binding activity has been confirmed in a protein that contains just two of these domains.
