identifier: InterPro:IPR060391
label: "D-cycloserine synthetase DcsG, N-terminal PreATP-grasp domain"
definition: >-
  This entry represents the N-terminal PreATP-grasp domain of DcsG, a D-cycloserine synthetase from Streptomyces lavendulae. This domain spans approximately 80 residues and precedes the C-terminal ATP-grasp domain. Mutagenesis studies suggest that the N-terminal domain is essential for enzyme activity, probably in substrate binding or positioning. DcsG catalyses the synthesis of D-cycloserine from O-ureido-D- serine (D-OUS). D-cycloserine is a cyclic structural analogue of D-alanine used as an antitubercular antibiotic. The enzyme can also react with D-homocysteine and beta-aminooxy-D-alanine as substrates. DcsG is composed of two domains: N-terminal PreATP-grasp domain and C-terminal ATP-grasp domain . The enzyme functions as a monomer and requires two Mg(2+) ions and ATP for catalytic activity. While the ATP-binding and metal-binding sites are located in the C-terminal ATP-grasp domain, the N-terminal domain likely contributes to the overall structural integrity and substrate specificity of the enzyme.
