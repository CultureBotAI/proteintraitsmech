identifier: InterPro:IPR049546
label: "WD repeat-containing protein 54, beta-propeller"
definition: >-
  This entry represents the β-propeller domain WD repeat-containing protein 54 (WDR54) from human and similar eukaryotic sequences. WDR54 has a regulatory effect on ERK signaling pathway activity in response to EGF stimulation, when is cross-linked to form dimers and trimers. It colocalizes with the EGF receptor in a WDR54-specific vesicle where it sustains the internalisation and controls the degradation of the EGF receptor after EGF stimulation.
