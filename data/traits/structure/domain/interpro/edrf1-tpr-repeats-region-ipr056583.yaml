identifier: InterPro:IPR056583
label: "EDRF1, TPR repeats region"
definition: >-
  This region of tetratricopeptide-like repeats (TPR) is found at the C-terminal end of human Erythroid differentiation-related factor 1 (EDRF1) and similar eukaryotic proteins. EDRF1 is a transcription factor involved in erythroid differentiation and in transcriptional activation of the globin gene.
