identifier: InterPro:IPR010468
label: Hormone-sensitive lipase, N-terminal
definition: >-
  This domain is found in several mammalian hormone-sensitive lipase (HSL) proteins. Hormone-sensitive lipase, a key enzyme in fatty acid mobilisation, overall energy homeostasis, and possibly steroidogenesis, is acutely controlled via reversible phosphorylation by catecholamines and insulin.
