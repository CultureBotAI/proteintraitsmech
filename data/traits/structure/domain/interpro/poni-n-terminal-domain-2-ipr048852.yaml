identifier: InterPro:IPR048852
label: "PoNi, N-terminal domain 2"
definition: >-
  This entry represents the N-terminal helical bundle domain from the Pseudomonas aeruginosa PA2201 protein . This protein also contains a C-terminal domain. The PoNe immunity proteins (PoNi) which antagonise the DNAse toxin PoNe (Polymorphic Nuclease effector). PoNi proteins may directly interact with PoNe.
