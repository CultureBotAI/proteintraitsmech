identifier: InterPro:IPR056996
label: "SLA1-like, PH domain-like"
definition: >-
  This domain is found in Actin cytoskeleton-regulatory complex protein SLA1 from Saccharomyces cerevisiae and similar proteins from ascomycetes. SLA1 is a component of the PAN1 actin cytoskeleton-regulatory complex required for the internalisation of endosomes during actin-coupled endocytosis. This domain is predicted to adopt a PH domain-like fold.
