identifier: InterPro:IPR047983
label: "Differentially expressed in FDCP 8, C conserved region 1"
definition: >-
  Differentially expressed in FDCP 8 (DEF-8) positively regulates lysosome peripheral distribution and ruffled border formation in osteoclasts. It is involved in bone resorption. DEF-8 contains a protein kinase C conserved region 1 (C1) domain followed by a RUBICON domain. This entry represents the C1 domain of DEF-8 from mammals and its homologues. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2)-binding sites.
