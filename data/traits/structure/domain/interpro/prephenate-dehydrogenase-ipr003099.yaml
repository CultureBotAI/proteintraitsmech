identifier: InterPro:IPR003099
label: "Prephenate dehydrogenase"
definition: >-
  This entry represents prephenate dehydrogenase (PDHG) , an enzyme involved in tyrosine biosynthesis and related proteins. Three enzymes catalyse the conversion of chorismate to hydroxyphenylpyruvate or pyruvate in the aromatic amino acid biosynthesis pathway. In this pathway, chorismate is a branch point intermediate that is converted to tryptophan, phenylalanine (Phe), and tyrosine (Tyr). In bacteria the enzymes, chorismate mutase (CM), prephenate dehydratase (PDT), and prephenate dehydrogenase (PDHG) are either present as distinct proteins or fusions combining two activities. In the archaea Archaeoglobus fulgidus a single protein (AroQ) contains all three enzymatic domains. This entry also matches 3-phosphoshikimate 1-carboxyvinyltransferase .
