identifier: InterPro:IPR037347
label: "MJ0144, FMN-binding domain"
definition: >-
  This entry represents the FMN-binding domain found in Archeal protein MJ0144. Proteins containing this domain are part of the NAD(P)H-dependent flavin oxidoreductase (oxidored) FMN-binding family that reduce a range of alternative electron acceptors. Most of them use FAD/FMN as a cofactor and NAD(P)H as electron donor. Some members contain 4Fe-4S cluster to transfer electron from FAD to FMN. The specific function of this group is unknown.
