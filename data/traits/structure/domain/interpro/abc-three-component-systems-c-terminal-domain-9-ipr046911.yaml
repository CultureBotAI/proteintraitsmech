identifier: InterPro:IPR046911
label: "ABC-three component systems, C-terminal domain 9"
definition: >-
  C-terminal domains (CTDs) of ABC-3C systems, contain distinct patterns of charged and polar residues and are not yet unifiable with known domains. These domains are found at the C-terminal of the effector component of the systems, which are upstream of the Middle Component and ABC ATPase components on the genome. Due to the typically large size of these CTDs relative to the actual effector and MC domains, the CTDs are predicted to serves as the platform on which the remaining two components assemble. Therewith, conformational changes transmitted by the ABC ATPase-mediated detection of invasive elements like DNA viruses would result in an unfurling and activation of the CTD-associated effector.
