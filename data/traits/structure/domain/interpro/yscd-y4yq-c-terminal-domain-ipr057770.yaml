identifier: InterPro:IPR057770
label: "YscD/Y4YQ, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Yop proteins translocation protein D from Yersinia enterocolitica (YscD) and similar proteins from proteobacteria, including the uncharacterised protein Y4YQ from Sinorhizobium fredii. This domain closely resembles the C-terminal domain of type II secretion system proteins B and C from bacteria. Its function is unknown. YscD is a single-pass inner membrane protein required for the export process of the Yop proteins. It is an essential component of the type III secretion system. YscD contains an N-terminal cytoplasmic domain ( ), a transmembrane linker and a large periplasmic region formed by the three BON domains ( ), ( ) and ( ). YscD forms part of the inner membrane component of the bacterial type III secretion injectosome apparatus. Y4YQ has been observed to be highly expressed in Rhizobium sp. upon treatment with daidzein, a known inductor of nod genes expression for symbiosis initiation.
