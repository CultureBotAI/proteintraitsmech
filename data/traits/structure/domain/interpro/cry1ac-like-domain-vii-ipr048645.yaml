identifier: InterPro:IPR048645
label: "Cry1Ac-like, domain VII"
definition: >-
  This entry includes insecticidal protein Cry1Ac from Bacillus thuringiensis and related sequences, which contains a proteolytically labile protoxin segment (in the C-terminal region) and a three-domain toxic core at the N terminus (domains I-III). The protoxin segment consists of domains IV-VII. This entry represents domain VII, which is a β-roll that closely resembles carbohydrate-binding modules.
