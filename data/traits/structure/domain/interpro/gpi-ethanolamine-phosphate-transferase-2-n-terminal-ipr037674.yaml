identifier: InterPro:IPR037674
label: "GPI ethanolamine phosphate transferase 2, N-terminal"
definition: >-
  Many eukaryotic cell surface proteins are anchored to the membrane via glycosylphosphatidylinositol (GPI). GPI ethanolamine phosphate transferase 2 (also known as PIG-G) is an ethanolamine phosphate transferase involved in GPI-anchor biosynthesis. It catalyses the transfer of ethanolamine phosphate to the GPI second mannose. This entry represents the N-terminal domain.
