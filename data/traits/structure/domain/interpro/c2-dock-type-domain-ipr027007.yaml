label: "C2 DOCK-type domain"
definition: >-
  Rho guanosine triphosphatases (GTPases) are critical regulators of cell motility, polarity, adhesion, cytoskeletal organisation, proliferation, gene expression, and apoptosis. Conversion of these biomolecular switches to the activated GTP-bound state is controlled by two families of guanine nucleotide exchanges factors (GEFs). DH-PH proteins are a large group of Rho GEFs comprising a catalytic Dbl homology (DH) domain with an adjacent pleckstrin homology (PH) domain within the context of functionally diverse signalling modules. The evolutionarily distinct and smaller family of DOCK (dedicator of cytokinesis) or CDM (CED-5, DOCK1180, Myoblast city) proteins activate either Rac or Cdc42 to control cell migration, morphogenesis, and phagocytosis. DOCK proteins share the DOCK-type C2 domain (also termed the DOCK-homology region (DHR)-1 or CDM-zizimin homology 1 (CZH1) domain and the DHR-2 domain (also termed the CZH2 or DOCKER domain),. The ~200 residue DOCK-type C2 domain is located toward the N terminus. It adopts a C2-like architecture and interacts with phosphatidylinositol 3,4,5-trisphosphate to mediate signalling and membrane localization. The central core of the DOCK-type C2 domain domain adopts an antiparallel β-sandwich with the "type II" C2 domain fold (a circular permutation of the more common "type I" topology), in which two 4-stranded sheets with strand order 6-5-2-3 and 7-8-1-4 create convex- and concave-exposed faces, respectively. Some DOCK proteins are listed below: Mammalian Mammalian dedicator of cytokinesis 180 (DOCK180 or DOCK1), important for cell migration. Mammalian DOCK2, important for lymphocyte development, homong, activation, adhesion, polarization and migration processes. Mammalian DOCK3 (also known as MOCA), is expressed predominantly in neuro…
