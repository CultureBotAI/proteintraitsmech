identifier: InterPro:IPR049364
label: "Tubulin-like protein TubZ, C-terminal domain"
definition: >-
  Tubulin-like protein TubZ ( ) is a tubulin-like, filament forming GTPase, the motor component of the type III plasmid partition system which ensures correct segregation of the pXO1 plasmid. This entry represents the C-terminal GTPase-activating domain of TubZ ( ).
