identifier: InterPro:IPR005539
label: "ELK domain"
definition: >-
  Homeobox genes, which encode homeodomain (HD) transcription factors, are known to be key regulators of both plant and animal development. In plants homeobox genes are divided into several groups by sequences, one of which is the KNOX (for knotted1-type homeobox) family. Proteins of this family share other conserved domains, the KNOX domain and ELK domain, which is immediately upstream of the HD. The ELK domain spans ~21 amino acids and was dubbed for a highly conserved series of Glu, Leu, and Lys amino acids. It could function as a nuclear localization signal. The ELK domain also is considered to act as a protein-protein interaction domain, but the precise role of this domain has not been determined. The ELK domain contains repeating hydrophobic residues and has been predicted to form an amphipathic helix.
