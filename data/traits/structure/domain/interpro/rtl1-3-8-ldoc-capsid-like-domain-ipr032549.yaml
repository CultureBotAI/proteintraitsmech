identifier: InterPro:IPR032549
label: "RTL1/3-8/LDOC, capsid-like domain"
definition: >-
  This domain is found in some members of the Mart (mammalian retrotransposon-derived) family, including LDOC1/Mart7, LDOC1L/Mart6, RTL1/Mart1, RTL3-8. LDOC1 is a MZF-1-interacting protein, inhibits NF-kappaB activation and relates with cancer and some other diseases. LDOC1 is a small protein and this entry covers almost its full length. In RTL proteins, it represents the N-terminal capsid-like domain. RTL1 plays an essential role in capillaries endothelial cells for the maintenance of feto-maternal interface and for development of the placenta. RTL3 plays a role in postnatal myogenesis, may be involved in the regulation of satellite cells self-renewal.
