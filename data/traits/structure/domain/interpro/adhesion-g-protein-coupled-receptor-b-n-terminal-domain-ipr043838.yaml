identifier: InterPro:IPR043838
label: "Adhesion G protein-coupled receptor B, N-terminal domain"
definition: >-
  This entry represents a region found at the N-terminal of various adhesion G-protein coupled receptor B proteins (AGRB), also known as Brain-specific angiogenesis inhibitors (BAIs), involved in cell adhesion and probably in cell-cell interactions. AGRBs are most abundantly expressed in brain tissue playing an important role in synapses, however, they are also found in other tissues such as heart, thymus and skeletal muscle. The The N-terminal domain of these receptors has an inhibitory effect on the constitutive signalling activity and is required to be removed to increase its activity
