identifier: InterPro:IPR054322
label: "Flagellar calcium-binding protein, EF-hand domain"
definition: >-
  This entry represents a EF-hand domain found in Flagellar calcium-binding protein from Trypanosoma cruzi (FCABP) and similar sequences mainly found in lower eukaryotes. This protein contains two EF-hand domains, the first of which is represented by this entry. FCABP may contribute to the rapid motility of the trypanosomes, playing a role either in flagellar structure or in calcium metabolism. It is targeted to the flagella where it regulates flagellar function and assembly.
