identifier: InterPro:IPR004021
label: HIN-200/IF120x
definition: >-
  This domain is found in one or two copies per protein, and is found associated with the PAAD/DAPIN domain . The HIN domain recognises and interacts with the phosphate backbone of dsDNA in a sequence-independent manner.
