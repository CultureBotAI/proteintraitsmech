identifier: InterPro:IPR060552
label: "EXO84A-C, helical domain"
definition: >-
  This entry represents a helical domain found in plant EXO84 proteins, including Arabidopsis EXO84A, EXO84B, and EXO84C, which are components of the exocyst complex. EXO84 proteins are involved in exocytosis, vesicle docking, and cell plate formation during cytokinesis. This domain is located in the middle region of EXO84 proteins and adopts a helical structure. The helical structure likely contributes to protein-protein interactions.
