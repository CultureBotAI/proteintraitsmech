identifier: InterPro:IPR019278
label: "DICT domain"
definition: >-
  This domain is found associated with the catalytic domains of DIguanylate Cyclases and phosphodiesterases and Two-component systems (histidine kinase). It has therefore been termed the DICT domain. Secondary structure prediction suggests it assumes an α+β fold with a 4-stranded β-sheet. Based on the domain architectures in which it is found, the domain has been predicted to be involved in sensory function (including a role in light response, since it is found in photosynthetic bacteria and halophilic archaea). However, this has not been experimentally confirmed, and the domain also appears to occur in proteins for which there is no evidence of sensory function.
