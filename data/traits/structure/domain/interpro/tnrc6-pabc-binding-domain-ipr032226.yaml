identifier: InterPro:IPR032226
label: "TNRC6, PABC binding domain"
definition: >-
  This entry represents a natively unstructured region found in TNRC6 protein that carries the binding motif for the interaction with PABC (polyadenylate-binding protein 1). TNRC6 are trinucleotide repeat-containing gene 6 proteins required for miRNA-mediated gene silencing that are localised to the P bodies (processing bodies). P bodies are cytoplasmic mRNP aggregates that are involved in general mRNA translation repression and decay, including nonsense-mediated decay. The interaction motif that binds to PABC is SINWPPEFHPGVPWKGLQ. This region lies between a Q-rich region and the RRM, or RNA-recognition motif.
