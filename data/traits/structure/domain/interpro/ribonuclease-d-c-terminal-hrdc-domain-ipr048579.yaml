identifier: InterPro:IPR048579
label: "Ribonuclease D, C-terminal HRDC domain"
definition: >-
  Ribonuclease D is a bacterial 3'-5' exonuclease that acts on tRNA. It contributes to the 3' maturation of several stable RNAs. It consists of a catalytic domain ( ) and two α-helical domains at the C-terminal that closely resemble the HRDC domain seen in RecQ-family helicases. This entry represents the second HRDC domain from RNAse D. The first one is included in .
