label: "SPRY domain"
definition: >-
  The SPRY domain is a ~140-amino-acid protein interaction module involved in many important signalling pathways like RNA processing, regulation of histone H3 methylation, innate immunity, or embryonic development. It can be divided into 11 subfamilies based on amino acid sequence similarity or the presence of additional protein domains. Functionally, SPRY domains mediate critical interactions in diverse pathways: SSB-2 binds Par-4 to regulate apoptosis, RanBPM/SSB-1 interact with c-Met for signalling modulation, and SPSB proteins target iNOS for ubiquitination in immune regulation. The B30.2 domain was first identified as a protein domain encoded by an exon (named B30-2) in the Homo sapiens class I major histocompatibility complex region, whereas the SPRY domain was first identified in a Dictyostelium discoideum kinase splA and mammalian calcium-release channels ryanodine receptors. B30.2 domain consists of PRY and SPRY subdomains. The SPRY domains (after SPla and the RYanodine Receptor) are shorter at the N terminus than the B30.2 domains. The ~200-residue B30.2/SPRY (for B30.2 and/or SPRY) domain is present in a large number of proteins with diverse individual functions in different biological processes. The B30.2/SPRY domain in these proteins is likely to function through protein-protein interaction. The N-terminal ~60 residues of B30.2/SPRY domains are poorly conserved and, as a consequence, a new domain name PRY was coined for a group of similar sequence segments N-terminal to the SPRY domains. The B30.2/SPRY domain contains three highly conserved motifs (LDP, WEVE and LDYE). The B30.2/SPRY domain adopts a highly distorted, compact β-sandwich fold with two additional short β-helices at the N terminus. The β-sandwich of the B30.2/SPRY domain consists of two layers o…
