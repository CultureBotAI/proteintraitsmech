identifier: InterPro:IPR055445
label: "ARMC5-like, ARM-repeats domain"
definition: >-
  This entry represents the ARM-repeats domain of ARMC5 from animal, a protein involved in fetal development, T-cell function and adrenal gland growth homeostasis. It negatively regulates adrenal cells survival. It plays a role in steroidogenesis, modulates steroidogenic enzymes expression and cortisol production. This domain is also found in human ARMC3 and a group of uncharacterised proteins mainly from vertebrates and arthropods.
