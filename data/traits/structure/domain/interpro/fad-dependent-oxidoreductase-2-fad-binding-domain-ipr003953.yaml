identifier: InterPro:IPR003953
label: "FAD-dependent oxidoreductase 2, FAD-binding domain"
definition: >-
  This domain is found in proteins that bind FAD, mainly in FAD-dependent oxidoreductase family 2 proteins, such as the flavoprotein subunits from succinate and fumarate dehydrogenase, and aspartate oxidase.
