identifier: InterPro:IPR041620
label: "CdiA, C-terminal tRNase domain"
definition: >-
  This entry represents the C-terminal tRNase domain of CdiA a type II toxin/immunity protein complex which can be found in B. pseudomallei isolate E479. The C-terminal tRNase domain has an α/β-fold characteristic of PD(D/E)XK nucleases. The PD(D/E)XK superfamily includes most restriction endonucleases and other enzymes involved in DNA recombination and repair.
