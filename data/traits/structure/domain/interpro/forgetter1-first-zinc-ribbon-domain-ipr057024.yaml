identifier: InterPro:IPR057024
label: "FORGETTER1, first zinc ribbon domain"
definition: >-
  This domain is found in the Arabidopsis FORGETTER1 (FGT1) and related plant proteins. The domain represented by this entry is predicted to adopt a zinc ribbon fold and it is the first of the predicted pair of two. FGT1 mediates stress-induced chromatin memory by modulating nucleosome occupancy. This protein interacts with chromatin remodelers of the SWI/SNF and ISWI families, which also display reduced heat stress memory. It is the orthologue of metazoan Strawberry notch, a highly conserved co-activator of the developmental regulator Notch.
