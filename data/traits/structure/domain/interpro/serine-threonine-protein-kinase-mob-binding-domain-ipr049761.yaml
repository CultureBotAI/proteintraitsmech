identifier: InterPro:IPR049761
label: "Serine/threonine-protein kinase , Mob-binding domain"
definition: >-
  This entry represents the Mob-binding domain found in human Serine/threonine-protein kinase LATS1 (also known as large tumor suppressor homolog 1, ) and similar proteins mainly from vertebrates. LATS1, also called WARTS protein kinase, is a serine/threonine-protein kinase that functions as a tumour suppressor and is implicated in cell cycle regulation. Inactivation of LATS1 in mice results in the development of various tumours, including sarcomas and ovarian cancer. Promoter methylation, loss of heterozygosity, and missense mutations targeting the LATS1 gene have also been found in human sarcomas and ovarian cancers. In addition, decreased expression of LATS1 is associated with an aggressive phenotype and poor prognosis. LATS1 induces G2 arrest and promotes cytokinesis. It may be a component of the mitotic exit network in higher eukaryotes. This protein belongs to the NDR/LATS family of kinases that bind to highly conserved Mob (Mps One binder) coactivators, forming regulatory complexes that control a diverse set of in vivo effector proteins, and are essential and evolutionarily conserved components of "Hippo" signalling pathways. Mob association creates a novel binding pocket that participates in the formation of the active state of NDR/LATS kinases. Members of this group contain a regulatory domain located N-terminal to the serine/threonine kinase domain (called the N-terminal regulatory (NTR) domain) and an insert within the catalytic domain ( ) that contains an auto-inhibitory sequence.
