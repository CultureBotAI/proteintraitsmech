identifier: InterPro:IPR048534
label: "Lysosomal alpha-mannosidase-like, central domain"
definition: >-
  This domain is found in Lysosomal alpha-mannosidase from Rattus norvegicus (Man2a1) and similar proteins from animals and plants. Man2a1 catalyses the first committed step in the biosynthesis of complex N-glycans. It controls the conversion of high mannose to complex N-glycans, the final hydrolytic step in the N-glycan maturation pathway. Man2a1 belongs to the glycoside hydrolase family 38 (GH38).
