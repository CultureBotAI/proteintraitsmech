identifier: InterPro:IPR057848
label: "WDR72-like, alpha-solenoid domain"
definition: >-
  This entry represents an α-solenoid domain found in WDR72. This entry also includes WDR7, whose function is currently unknown. WD repeat-containing protein 72 (WDR72) plays a major role in the formation of tooth enamel, particularly during the maturation phase of amelogenesis, where it is essential for normal enamel matrix formation and the clearance of enamel proteins. WDR72 may also be involved in the localisation of the calcium transporter SLC24A4 to the ameloblast cell membrane. These proteins share a distinct domain architecture comprising one or two β-propellers followed by an α-solenoid domain , an evolutionarily conserved structure common among proteins that form membrane coat complexes, dating back to the early eukaryotic endomembrane system.
