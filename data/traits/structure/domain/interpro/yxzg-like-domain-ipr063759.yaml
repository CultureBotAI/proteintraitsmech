identifier: InterPro:IPR063759
label: "YxzG-like domain"
definition: >-
  This entry includes uncharacterised protein YxzG from Bacillus subtilis of approximately 150 amino acids. The function of these proteins remains to be determined. The structure prediction of this protein shows it to form three β-propeller blades.
