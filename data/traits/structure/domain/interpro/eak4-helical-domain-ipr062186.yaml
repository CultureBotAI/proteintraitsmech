identifier: InterPro:IPR062186
label: "EAK4, helical domain"
definition: >-
  This entry represents the EAK4 helical domain found in membrane- associated proteins in nematodes. This all-helical domain is found in proteins that are N-myristoylated and localised to the cytoplasmic side of the cell membrane via lipid anchoring. Proteins containing this domain function in the insulin-like signalling pathway, negatively regulating dauer larva formation downstream of the insulin-like receptor DAF-2. The specific function of this domain remains to be determined.
