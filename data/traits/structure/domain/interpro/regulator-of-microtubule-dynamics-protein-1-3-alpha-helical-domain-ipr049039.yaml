identifier: InterPro:IPR049039
label: "Regulator of microtubule dynamics protein 1-3, alpha-helical domain"
definition: >-
  This entry represents α-helical repeats that form the C-terminal region of Regulator of microtubule dynamics proteins 1-3 (RMD1-3) and similar proteins from animals and bacteria. These are microtubule-binding proteins. RMD3 is involved in cellular calcium homeostasis regulation, and it may participate in differentiation and apoptosis of keratinocytes. RMD1 from C. elegans functions in chromosome segregation.
