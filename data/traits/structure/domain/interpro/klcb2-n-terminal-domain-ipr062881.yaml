identifier: InterPro:IPR062881
label: "KlcB2, N-terminal domain"
definition: >-
  This is a domain found at the very N-terminal of KlcB2 from E.coli ( ). It may adopt a fold consisting of three β-strands and two α-helices with some disordered regions. This protein is involved in transcriptional regulation.
