identifier: InterPro:IPR031331
label: "Neutral/alkaline non-lysosomal ceramidase, C-terminal"
definition: >-
  Ceramidases play a key role in sphingolipid metabolism by converting the apoptosis-associated lipid ceramide to Sph, a precursor for the proliferative factor S1P. Three families of CDases (acid, neutral, and alkaline) have been identified that are distinguished by their pH optima, subcellular localisation, primary structure, mechanism, and function. This entry represents the C-terminal domain of a group of neutral/alkaline ceramidases found in both bacteria and eukaryotes. The EC classification is . The enzyme hydrolyses ceramide to generate sphingosine and fatty acid. The enzyme plays a regulatory role in a variety of physiological events in eukaryotes and also functions as an exotoxin in particular bacteria. This C-terminal tail of the enzyme is highly conserved across all species and may play a role in the interaction of the enzyme with the plasma membranes. The tail is also vital for the stabilisation of the enzyme as a whole.
