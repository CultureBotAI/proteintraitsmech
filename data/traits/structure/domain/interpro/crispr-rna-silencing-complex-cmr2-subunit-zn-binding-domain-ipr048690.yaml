identifier: InterPro:IPR048690
label: "CRISPR RNA silencing complex Cmr2 subunit, Zn-binding domain"
definition: >-
  The prokaryotic CRISPR RNA-Cas protein (Cmr) complex provides protection against mobile genetic elements by cleaving foreign RNA. Its largest subunit is Cmr2. This protein shows a N-terminal HD (histidine-aspartate) domain, two RRM domains resembling adenylate cyclase and two α-helical domains. This entry represents the conserved Zn binding subdomain included in the first RMM domain (D1 domain) of Cmr2. This region shows two α-helices.
