identifier: InterPro:IPR063301
label: "SpoVK-like AAA ATPase, N-terminal"
definition: >-
  This entry represents the N-terminal domain of SpoVK-like AAA+ ATPases. It precedes an AAA ATPase domain ( ) and in some proteins an AAA lid domain ( ). These proteins are widespread in bacteria, particularly in Cyanobacteriota where they have been implicated in stress responses, including responses to blue light, low inorganic carbon and acidic conditions. In Synechococcus elongatus, the protein encoded by Synpcc7942_0417 has been shown to affect circadian clock function and KaiC protein localisation. The family is found in Cyanobacteriota, Pseudomonadota, Planctomycetota and Actinomycetota. The specific function of this N-terminal domain remains to be determined.
