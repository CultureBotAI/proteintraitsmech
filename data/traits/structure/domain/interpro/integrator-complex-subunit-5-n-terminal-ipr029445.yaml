identifier: InterPro:IPR029445
label: "Integrator complex subunit 5, N-terminal"
definition: >-
  This entry represents the N-terminal of the integrator complex subunit 5 (INTS5). The integrator complex is involved in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing.
