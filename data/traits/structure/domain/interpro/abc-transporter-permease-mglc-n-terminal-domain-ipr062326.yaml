identifier: InterPro:IPR062326
label: "ABC transporter permease MglC, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain found in bacterial MglC ABC transporter permease proteins. The domain is approximately 220-230 residues in length. MglC is the transmembrane permease component of the MglABC transporter complex, which is involved in the import of galactose and methyl galactoside across the membrane. The domain is located upstream of the main transmembrane permease domain ( ). The specific function of this domain remains to be determined.
