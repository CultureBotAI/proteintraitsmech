identifier: InterPro:IPR040588
label: "Argonaute, N domain"
definition: >-
  This is the N domain often found in the N-terminal region of Argonaute (AGO) present in Kluyveromyces polyspora. AGO forms part of the RNA-induced silencing complex that mediates the gene silencing pathway, RNA interference. The N domain blocks the nucleic acid-binding channel and prevents propagation of guide-target pairing beyond position 16.
