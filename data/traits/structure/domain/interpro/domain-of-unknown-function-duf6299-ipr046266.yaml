definition: >-
  This entry represents a member of a biosynthetic gene cluster (BGC). This BGC (BGC0000376) is described by MIBiG as an example of the following biosynthetic class, NRP (non-ribosomal peptide), in particular JBIR-34 biosynthetic gene cluster from Streptomyces sp. Sp080513GE-23. This family appears to be predominantly found in actinobacteria.
