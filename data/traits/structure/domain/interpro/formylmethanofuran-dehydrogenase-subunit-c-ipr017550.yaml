identifier: InterPro:IPR017550
label: "Formylmethanofuran dehydrogenase subunit C"
definition: >-
  This entry represents the C subunit of formylmethanofuran dehydrogenase ( ), which is involved in methane biosynthesis from carbon dioxide. This oxygen-labile enzyme catalyses the reversible oxidation of carbon dioxide and methanofuran (MFR) to N-formylmethanofuran (CHO-MFR). There is a tungsten-containing (Fwd) form of this enzyme and a molybdenum-containing (Fmd) form; this entry includes both forms. Formylmethanofuran dehydrogenase is composed of 5-7 subunits, of which subunit C (FwdC or FmdC) is one. The enzymes in this entry are largely from archaeal species. Nomenclature in some bacteria may reflect inclusion of the formyltransferase described by as part of the complex.
