identifier: InterPro:IPR055103
label: "PDXDC1/PDXD2, second domain"
definition: >-
  This entry represents the second domain found in the central region of Pyridoxal-dependent decarboxylase domain-containing protein 1 (PDXDC1) and at the C-terminal of PDXD2. PDXDC1 has been associated with the modulation of prepulse inhibition of acoustic startle, perhaps through the metabolism of catecholamine neurotransmitters. The function of this domain is unknown.
