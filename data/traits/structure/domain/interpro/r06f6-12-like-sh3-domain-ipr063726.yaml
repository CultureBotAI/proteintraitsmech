identifier: InterPro:IPR063726
label: "R06F6.12-like, SH3 domain"
definition: >-
  This entry represents an SH3 domain found in R06F6.12-like proteins from nematodes, including R06F6.12 from Caenorhabditis elegans , which is expressed in germ line and other cell types and shows protein interactions with mpz-1 (EBI-2002318,EBI-2915667) and pxf-1 (EBI-2002318,EBI-2918010), according to IncAct database. The specific function of this domain remains to be determined.
