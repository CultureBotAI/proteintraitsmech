identifier: InterPro:IPR060192
label: "AAPxQ domain"
definition: >-
  This domain is found in Magnesium-chelatase subunit ChlD and related proteins. This domain contains a highly conserved AAPxQ sequence motif after which it was named. ChlD is a crucial component of the magnesium chelatase enzyme complex, which catalyses the insertion of magnesium into protoporphyrin IX - a critical step in chlorophyll biosynthesis. The magnesium-chelatase consists of three subunits: CHLI, CHLD and CHLH. biosynthesis. ChlD acts as a bridge between the motor (ChlI) and catalytic (ChlH) subunits, facilitating transmission of ATP hydrolysis energy to the active site for magnesium chelation.
