identifier: InterPro:IPR030094
label: "AT-rich interactive domain-containing protein 1A, ARID/BRIGHT DNA binding domain"
definition: >-
  AT-rich interactive domain-containing protein 1A (ARID1A or BAF250a) is part of the SWI/SNF-like ATP-dependent chromatin remodelling complex that regulates gene expression through regulating nucleosome remodelling. In humans there are two BAF250 isoforms, BAF250a/ARID1A and BAF250b/ARID1B. Both BAF250a and BAF250b bind DNA non-specifically. They are thought to be E3 ubiquitin ligases that target histone H2B. BAF250a plays key roles in maintaining embryonic stem cell pluripotency and in cardiac development and function. The BAF250a gene is a tumour suppressor gene that is frequently mutated in ovarian clear cell carcinoma. This entry represents the ARID/BRIGHT DNA binding domain of ARI1A. It binds DNA in a non-sequence-specific manner similar to ARID1B.
