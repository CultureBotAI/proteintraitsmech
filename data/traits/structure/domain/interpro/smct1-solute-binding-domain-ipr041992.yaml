identifier: InterPro:IPR041992
label: "SMCT1, solute-binding domain"
definition: >-
  This entry represents the solute-binding domain of SMCT1. SMCT1 is a high-affinity transporter of various monocarboxylates including lactate and pyruvate, short-chain fatty acids, ketone bodies, nicotinate and its structural analogs, pyroglutamate, benzoate and its derivatives, and iodide. The expression of human SMCT1 is under the control of the C/EBP transcription factor. Its tumour-suppressive role is related to uptake of butyrate, propionate, and pyruvate, these latter are inhibitors of histone deacetylases. SMCT1 may contribute to the intestinal/colonic and oral absorption of monocarboxylate drugs. SMCT1 also mediates iodide transport from thyrocyte into the colloid lumen in thyroid gland and through transporting l-lactate and ketone bodies helps maintain the energy status and the function of neurons. In the kidney its expression is limited to the S3 segment of the proximal convoluted tubule (in contrast to the low-affinity monocarboxylate transporter SMCT2, belonging to a different family, which is expressed along the entire length of the tubule). In the retina, SMCT1 and SMCT2 may play a differential role in monocarboxylate transport in a cell type-specific manner, SMCT1 is expressed predominantly in retinal neurons and in retinal pigmented epithelial (RPE) cells.
