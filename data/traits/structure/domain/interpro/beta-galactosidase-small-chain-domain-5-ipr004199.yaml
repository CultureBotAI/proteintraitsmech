identifier: InterPro:IPR004199
label: Beta galactosidase small chain/ domain 5
definition: >-
  This domain comprises the small chain of dimeric beta-galactosidases . This domain is also found in single chain beta-galactosidase, which is comprised of five domains, where it represents domain 5. It contains an N-terminal loop that swings towards the active site upon the deep binding of a ligand to produce a closed conformation.
