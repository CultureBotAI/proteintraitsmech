label: "Zf-FLZ domain"
definition: >-
  Zinc fingers are a ubiquitous class of protein domain with considerable variation in structure and function. The FCS-type zinc finger is a highly diverged group of C2-C2 zinc finger, named after the conserved phenylalanine and serine residues associated with the third cysteine. The FCS-type zinc finger is a structurally diverse family which accommodate both nucleic-protein and protein-protein interaction zinc fingers. The FCS-Like Zinc finger (FLZ) domain is a plant specific domain. FLZ domain containing proteins are bryophytic in origin and this protein family is expanded in higher plants. Although the molecular functions of the FLZ protein family members in general are not well understood, many of the members are attributed to plant growth and development, stress mitigation, sugar signaling and senescence. The FLZ-type zinc finger is likely to be involved in protein-protein interaction. The FLZ-type zinc finger is predicted to form an α-β-α secondary structure composed of an N-terminal short α-helix, a β-hairpin followed by a longer C-terminal α-helix. Four highly conserved cysteine residues in the FLZ-type zinc finger are believed to bind zinc in a tetrahedral coordination. Some proteins known to contain a FLZ-type zinc finger are listed below: Arabidopsis thaliana MEDIATOR OF ABA-REGULATED DORMANCY 1 (MARD1) or FLZ9, involved in abcissic acid (ABA)-mediated seed dormancy and induced during senescence. Arabidopsis thaliana INCREASED RESISTANCE TO MYZUS PERSICAE (IRM1) or FLZ4, constitutive over expression of IRM1 results in mechanical barriers that make it difficult for M. persicae to reach the phloem and subsequently reduces its population size. Wheat salt related hypothetical protein (TaSRHP), over expression of TaSHRP results in enhanced resistance to salt and dr…
