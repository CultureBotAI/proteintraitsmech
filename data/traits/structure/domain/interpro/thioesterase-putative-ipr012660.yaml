identifier: InterPro:IPR012660
label: "Thioesterase, putative"
definition: >-
  This entry consists of a broadly distributed uncharacterised domain found often as a standalone protein. The member from is described from crystallography work as a putative thioesterase. About half of the members of this family are fused to an N-terminal acetyltransferase domain ( ). The function of these proteins are unknown.
