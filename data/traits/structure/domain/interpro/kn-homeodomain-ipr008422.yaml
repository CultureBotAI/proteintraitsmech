label: "KN homeodomain"
definition: >-
  This entry represents a homeodomain (HD) present in transcription factors conserved from fungi to human and plants. Genes encoding these proteins were first identified as TALE homeobox proteins in eukaryotes, (including KNOX and MEIS genes). They have been classified.
