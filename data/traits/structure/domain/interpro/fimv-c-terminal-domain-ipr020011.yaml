identifier: InterPro:IPR020011
label: "FimV, C-terminal domain"
definition: >-
  This domain is found at the C-terminal in FimV from Pseudomonas aeruginosa, and of TspA of Neisseria meningitidis. FimV is an inner membrane protein that plays a role in twitching motility, type IV pilus assembly, and type II secretion in bacteria like Pseudomonas aeruginosa. Disruption of FimV blocks twitching motility from type IV pili, which suggests a role in peptidoglycan layer remodelling required by type IV fimbrial systems. The C-terminal of FimV proteins is represented by . In between is a highly variable, often repeat-filled region rich in the negatively charged amino acids Asp and Glu.
