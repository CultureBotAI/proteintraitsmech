identifier: InterPro:IPR019485
label: "V(D)J recombination-activating protein 1, Zinc finger"
definition: >-
  The development of B and T cells depends on the rearrangement of variable (V), diversity (D), and joining (J) gene segments to produce mature Ig and T cell receptor coding regions. This rearrangement process, known as V(D)J recombination is initiated by the complex, multi-domain proteins RAG1 and RAG2. The RAG proteins catalyze DNA cleavage in the first phase of the reaction using a recombination signal sequence (RSS) that flanks V, D and J segments. RAG1 contains a zinc-binding dimerization domain immediately N-terminal to the catalytic core region, which in turn contains a putative DNA-binding domain at its N terminus. The dimerization domain consists of a zinc C3HC4 RING finger and a C2H2 zinc RAG1-type finger. The C2H2 RAG1-type zinc finger contains the hallmarks of a classical zinc finger structure with a two stranded β-sheet and an α-helix.
