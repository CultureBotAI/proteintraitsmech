identifier: InterPro:IPR005123
label: "Oxoglutarate/iron-dependent dioxygenase domain"
definition: >-
  Enzymes with the Fe(2+) and 2-oxoglutarate (2OG)-dependent dioxygenase domain typically catalyse the oxidation of an organic substrate using a dioxygen molecule, mostly by using ferrous iron as the active site cofactor and 2OG as a co-substrate which is decarboxylated to succinate and CO2. Iron 2OG dioxygenase domain proteins are widespread among eukaryotes and bacteria. In metazoans, prolyl hydroxylases containing the domain act as oxygen sensors and catalyse the hydroxylation of conserved prolyl residues in hypoxia-inducible transcription factor (HIF) alpha. In plants, Fe(II) 2OG dioxygenase domain enzymes catalyse the formation of plant hormones, such as ethylene, gibberellins, anthocyanidins and pigments such as flavones. In bacteria and fungi Fe(II) 2OG dioxygenase domain enzymes participate in the biosynthesis of antibiotics such as penicillin and cephalosporin. The eukaryotic and bacterial protein AlkB that also shows this structural domain is involved in DNA-repair. The iron 2OG dioxygenase domain has a conserved β-barrel structure, which forms a double-stranded β-helix core fold that forms the predominant class of the cupin superfamily ('cupa' means a small barrel in Latin). Two histidines and an aspartate residue catalytically bind a metal ion, in general iron but in some cases another metal, directly involved in catalysis. A conserved arginine or lysine residue further near the C-terminal part acts as the basic residue that interacts with the acidic substrate.
