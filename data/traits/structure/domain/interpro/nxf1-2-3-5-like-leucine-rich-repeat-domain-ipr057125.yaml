identifier: InterPro:IPR057125
label: "NXF1/2/3/5-like, leucine-rich repeat domain"
definition: >-
  This entry represents the leucine-rich repeats (LRR) domain found in nuclear RNA export factor 1, 2, 3 and 5 (NXF1, NXF2, NXF3 and NXF5, respectively) from animals and their yeast orthologues mRNA export factor 67 (MEX67). These proteins are involved in the nuclear export of mRNA from the nucleus to the cytoplasm. NXFs are used by type D retroviruses to export their unspliced genomic RNA to the cytoplasm through this LRR domain, which binds to constitutive transport element of retroviral RNAs. Additionally, cellular mRNA transport is affected when this domain is mutated. In the case of MEX67, this domain is found within a region of the protein that allows MEX67 to act as an accessory factor in Rae1p-dependent mRNA export and is devoid of RNA-binding.
