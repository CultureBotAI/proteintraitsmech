identifier: InterPro:IPR058772
label: "ADGRG2, N-terminal domain"
definition: >-
  This domain is found in the homologues of ADGRG2 (adhesion G protein-coupled receptor G2). The domain represented by this entry precedes the GAIN and the transmembrane domains. It is predicted to adopt a globular α/β structure consisting of four-stranded antiparallel β-sheet packed on one side with two α-helices resembling ferredoxin-like topology. ADGRG2 is an adhesion G-protein coupled receptor (aGPCR) for steroid hormones, such as dehydroepiandrosterone (DHEA; also named 3beta-hydroxyandrost-5-en-17-one) and androstenedione that plays an important regulatory role in male fertility. Upon ligand binding, it goes trough a conformation change that triggers signalling via guanine nucleotide-binding proteins (G proteins) and modulates the activity of downstream effectors, such as adenylate cyclase. It is known to play important roles for maintaining chloride/acid-base homeostasis through coupling to the cystic fibrosis transmembrane conductance regulator. ADGRG2 is a multidomain protein.
