label: "Tag1-like, fourth Ig-like domain"
definition: >-
  This entry describes the fourth Ig-like domain in putative Tag1 and related fungal proteins. The proteins represented by this entry have more than three Ig-like domains. This domain shows homology to LEA-2 domains. This domain can be found associated with .
