identifier: InterPro:IPR058659
label: "Mok11-13/Ags1-like, CBM domain"
definition: >-
  This domain is found in the family of fungal cell wall alpha-1,3-glucan synthase enzymes such as Mok11, Mok12, Mok13 and Ags1. The domain represented by this entry has detectable similarity to the starch specific domains of SusE/SusF outer membrane proteins and it is predicted to adopt a similar structure. Mok11, Mok12, Mok13 and Ags1 are involved in the biosynthesis of alpha-1,3-glucan, a key structural polysaccharide in fungal cell walls. They play critical roles in maintaining cell integrity, morphology, and virulence. Mok12 and Mok13 are involved in the synthesis of the greater part of α-glucan in the spores envelope, a polymer that is mainly digested with mutanase.
