identifier: InterPro:IPR037787
label: "OCRL1, PH domain"
definition: >-
  OCRL1 hydrolyzes phosphatidylinositol 4,5-bisphosphate (PtIns(4,5)P2) and the signaling molecule phosphatidylinositol 1,4,5-trisphosphate (PtIns(1,4,5)P3), and thereby modulates cellular signaling events. OCRL1 resides on vesicular structures throughout the endosomal system and the Golgi complex, and is also present at the plasma membrane in membrane ruffles and at late-stage endocytic clathrin-coated pits. It binds clathrin, clathrin adaptors, several GTPases, and the endocytic proteins APPL1 and Ses1/2. Mutations in the OCRL1 gene cause Lowe Syndrome, leading to cataracts, mental retardation and renal failure. Mutations in OCRL can also give rise to a milder pathology, Dent disease 2, which is characterised by renal Fanconi syndrome in the absence of extrarenal pathologies. OCRL1 shares ~45% sequence identity with INPP5B (not included in this entry) and has the same domain organization. However, a loop in the Rho GAP domain contains a second clathrin box which is absent in INPP5B. INPP5B shares most interacting partners with OCRL, except for clathrin and the endocytic clathrin adaptor AP-2. This entry represents the PH domain of OCRL1. The PH domain connects to the 5-phosphatase domain, which has a Dnase I-like fold.
