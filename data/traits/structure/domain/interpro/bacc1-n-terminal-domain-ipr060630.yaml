identifier: InterPro:IPR060630
label: "BACC1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of BPTF-associated chromatin complex component 1 (BACC1, also known as BAP18) and similar animal proteins. ACC1 protein is a component of the MLL1/MLL and NURF chromatin complexes involved in chromatin organisation. This region precedes the SANT domain and is found in chromatin remodelling proteins. The specific function of this domain remains to be determined.
