identifier: InterPro:IPR002602
label: "Domain of unknown function DB"
definition: >-
  This domain has no known function being found in several Caenorhabditis elegans proteins. The domain contains 12 conserved cysteines that probably form six disulphide bridges. This domain is found associated with Ig and Fibronectin, type III domains.
