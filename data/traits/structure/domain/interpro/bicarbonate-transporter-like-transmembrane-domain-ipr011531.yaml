identifier: InterPro:IPR011531
label: "Bicarbonate transporter-like, transmembrane domain"
definition: >-
  Bicarbonate (HCO 3 - ) transport mechanisms are the principal regulators of pH in animal cells. Such transport also plays a vital role in acid-base movements in the stomach, pancreas, intestine, kidney, reproductive organs and the central nervous system. Functional studies have suggested four different HCO 3 - transport modes. Anion exchanger proteins exchange HCO 3 - for Cl - in a reversible, electroneutral manner. Na + /HCO 3 - co-transport proteins mediate the coupled movement of Na + and HCO 3 - across plasma membranes, often in an electrogenic manner. Na + driven Cl - /HCO 3 - exchange and K + /HCO 3 - exchange activities have also been detected in certain cell types, although the molecular identities of the proteins responsible remain to be determined. Sequence analysis of the two families of HCO 3 - transporters that have been cloned to date (the anion exchangers and Na + /HCO 3 - co-transporters) reveals that they are homologous. This is not entirely unexpected, given that they both transport HCO 3 - and are inhibited by a class of pharmacological agents called disulphonic stilbenes. They share around ~25-30% sequence identity, which is distributed along their entire sequence length, and have similar predicted membrane topologies, suggesting they have ~10 transmembrane (TM) domains. This entry represents transmembrane segments of bicarbonate transporters and related proteins. In animals, this domain is found at the C terminus of many bicarbonate and similar multifunctional transporters. The crystal structure of Band 3 anion transport protein, the founding member of the solute carrier 4 (SLC4) family of bicarbonate transporters, has been solved. This protein functions both as a transporter that mediates electroneutral anion exchange across the cell membrane and…
