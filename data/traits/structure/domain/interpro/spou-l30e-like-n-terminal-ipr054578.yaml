identifier: InterPro:IPR054578
label: "SpoU L30e-like, N-terminal"
definition: >-
  This domain is found in a group of rRNA methyltransferases that belong to SpoU family, including 23S rRNA (uridine(2479)-2'-O)-methyltransferase from Streptomyces viridochromogenes. They are composed of two domains: N-terminal, represented by this entry, and the RNA-binding domain and C-terminal domain responsible for AdoMet-binding, catalysis and dimerisation ( ).
