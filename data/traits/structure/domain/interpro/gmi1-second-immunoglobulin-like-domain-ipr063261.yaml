identifier: InterPro:IPR063261
label: "GMI1, second immunoglobulin-like domain"
definition: >-
  This entry represents the second immunoglobulin-like domain of GMI1 (Gamma-irradiation and mitomycin C induced 1) proteins found in plants. The full-length GMI1 protein is a structural maintenance of chromosomes flexible hinge domain-containing protein involved in somatic homologous recombination and DNA double-strand break repair. GMI1 functions downstream of ATM and contributes to DNA repair pathways. The protein is highly expressed in closed buds and open flowers, and is induced by DNA-damaging agents such as mitomycin C, bleocin and gamma-irradiation. GMI1 contains coiled-coil regions and localises to the nucleus. Plants deficient in GMI1 show reduced somatic homologous recombination rates after DNA damage treatment. The specific function of this immunoglobulin-like domain remains to be determined.
