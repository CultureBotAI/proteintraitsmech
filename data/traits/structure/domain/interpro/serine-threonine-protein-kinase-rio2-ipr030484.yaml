identifier: InterPro:IPR030484
label: "Serine/threonine-protein kinase Rio2"
definition: >-
  This entry represents the catalytic domain of protein Rio2 from archaea to human. Rio2 is a conserved serine protein kinase capable of in vitro autophosphorylation, albeit with low activity. In budding yeast, the kinase activity of Rio2 is necessary for the final processing step of maturing the 18S ribosomal rRNA.
