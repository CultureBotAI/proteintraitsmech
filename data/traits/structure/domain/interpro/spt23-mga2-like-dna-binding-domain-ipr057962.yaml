identifier: InterPro:IPR057962
label: "SPT23/MGA2-like, DNA-binding domain"
definition: >-
  This entry represents the DNA-binding domain found in yeast SPT23 and MGA2 transcription factors. The specific function of this DNA-binding domain remains to be fully characterised. SPT23 and MGA2 are involved in the regulation of OLE1 gene expression, which encodes a fatty acid desaturase essential for unsaturated fatty acid synthesis. SPT23 and MGA2 are activated through regulated ubiquitin/proteasome-dependent processing (RUP), releasing the N-terminal fragments that translocate to the nucleus to regulate transcription.
