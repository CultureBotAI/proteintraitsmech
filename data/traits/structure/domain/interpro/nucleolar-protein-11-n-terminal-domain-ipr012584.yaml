identifier: InterPro:IPR012584
label: "Nucleolar protein 11, N-terminal domain"
definition: >-
  This entry covers a section of the β-propeller found at the N terminus of NOL11. NOL11 is a nucleolar protein and a component of the human ribosomal small subunit (SSU) processome. It is required for the early stages of ribosome biogenesis in humans. It interacts with the C-terminal region of the known t-UTP/UTPA subcomplex member, hUTP4/Cirhin, the protein mutated in North American Indian childhood cirrhosis (NAIC). In Xenopus, it is required for optimal rDNA transcription and craniofacial development.
