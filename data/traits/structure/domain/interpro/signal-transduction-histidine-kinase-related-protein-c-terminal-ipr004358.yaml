identifier: InterPro:IPR004358
label: "Signal transduction histidine kinase-related protein, C-terminal"
definition: >-
  This domain is present in many sensor proteins that respond to extra-cytoplasmic stimuli in bacteria, but is also found in many proteins of metazoan origin. Sensors are usually linked to a 2-component regulatory system consisting of the sensor and a cytoplasmic regulator protein. The cytoplasmic C-terminal portions of the sensor proteins show marked sequence similarity and are responsible for kinase activity. Some sensor proteins are cytoplasmic and may respond to several external stimuli. Sensors also show similarity to some regulatory proteins. The structure of CheA, a signal-transducing histidine kinase is known. The catalytic domain consists of several α-helices packed over one face of a large anti-parallel β-sheet forming a loop which closes over the bound ATP. Hydrolysis of ATP is coupled to Mg2 release and conformational changes in the ATP-binding cavity. Signal transducing histidine kinases are the key elements in two-component signal transduction systems, which control complex processes such as the initiation of development in microorganisms. Examples of histidine kinases are EnvZ, which plays a central role in osmoregulation, and CheA, which plays a central role in the chemotaxis system. Histidine kinases usually have an N-terminal ligand-binding domain and a C-terminal kinase domain, but other domains may also be present. The kinase domain is responsible for the autophosphorylation of the histidine with ATP, the phosphotransfer from the kinase to an aspartate of the response regulator, and (with bifunctional enzymes) the phosphotransfer from aspartyl phosphate back to ADP or to water. The kinase core has a unique fold, distinct from that of the Ser/Thr/Tyr kinase superfamily. Two-component signal transduction systems enable bacteria to sense, respond, and ad…
