identifier: InterPro:IPR055446
label: "ATP-dependent RecD2 DNA helicase, OB-fold domain"
definition: >-
  This entry represents a domain which is found N-terminal in ATP-dependent RecD2 DNA helicase (also known as YrrC) and related bacterial proteins. RecD2 may favour replication restart by preventing RecA from binding to blocked replication forks, avoiding unnecessary recombination during replication restart. It fuctions as a negative modulator of the RecA-ssDNA filament, may dissasemble RecA threads and is able to act as both a positive and negative regulator of strand exchange. This domain is predicted to adopt a β-barrel with an OB-fold topology.
