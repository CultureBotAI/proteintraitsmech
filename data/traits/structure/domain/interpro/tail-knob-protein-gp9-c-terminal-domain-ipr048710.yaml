identifier: InterPro:IPR048710
label: "Tail knob protein gp9, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Tail knob protein gp9 from Bacillus phage phi29 and similar proteins from tailed bacteriophages. This protein blocks the end of the tube before DNA ejection while forming a channel perforating the host membrane in the process by adopting a hexameric tube structure with six flexible hydrophobic loops. This entry represents the region of the protein that forms the central part of the tube. It is organised into an α/β subdomain, a long loop that protrudes from the inner wall covering about two-thirds of the tube, and a β-domain in which the β-strands are almost parallel with the tube axis.
