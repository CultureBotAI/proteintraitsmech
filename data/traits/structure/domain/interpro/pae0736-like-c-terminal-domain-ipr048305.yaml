identifier: InterPro:IPR048305
label: "PAE0736-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the highly thermostable protein PAE0736 from Pyrobaculum aerophilum ( ) and similar disulphide-rich uncharacterised proteins from thermophilic archaea. PAE0736, which contains three disulphide bonds, may play a role in the formation or maintenance of intracellular protein disulfide bonds in disulfide-rich organisms. This domain harbours one of these disulphide bonds and shows an all-β structure. However, its specific function is still unknown.
