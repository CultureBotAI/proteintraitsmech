identifier: InterPro:IPR054552
label: "SPT2 homolog, N-terminal"
definition: >-
  This entry represents an N-terminal conserved region found in the SPT2 homologues from animals. SPT2 is a histone chaperone that stabilises pre-existing histone tetramers and regulates replication-independent histone exchange on chromatin.
