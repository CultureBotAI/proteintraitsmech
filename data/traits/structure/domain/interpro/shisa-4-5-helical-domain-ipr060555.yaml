identifier: InterPro:IPR060555
label: "Shisa-4/5, helical domain"
definition: >-
  This entry represents an helical domain found in Shisa-4/5 and related proteins mainly found in vertebrates. Members are single-pass type I transmembrane proteins localised to the endoplasmic reticulum and nuclear membranes. Shisa-5 proteins can induce apoptosis in a caspase-dependent manner and play a role in p53-dependent apoptotic pathways. The proteins contain a single transmembrane helical domain and a proline-rich cytoplasmic region that is required for endoplasmic reticulum localisation. Shisa-5 is induced in response to cellular stress in a p53-dependent manner and interacts with PDCD6.
