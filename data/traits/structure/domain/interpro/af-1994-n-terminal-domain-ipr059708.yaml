identifier: InterPro:IPR059708
label: "AF_1994, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the AF_1994 proteins found in bacteria. The domain is found in diverse bacterial lineages including Flavobacteriaceae, Clostridiaceae, and Chitinophagaceae. The full-length proteins are approximately 236 amino acids and contain predicted signal peptides, indicating they are likely secreted or membrane-associated proteins. The proteins contain two structurally similar domains, with this entry representing the N-terminal domain. The function of this domain remains to be determined.
