identifier: InterPro:IPR022437
label: "Rickettsia palindromic element RPE3"
definition: >-
  This entry represents family 3 of Rickettsia palindromic elements (RPE3). These elements spread within a genome as selfish genetic elements, inserting into genes creating additional coding regions that do not disrupt the reading frame (ORF), but are expressed as part of the proteins encoded by them. Members of this entry are found in Rickettsial species.
