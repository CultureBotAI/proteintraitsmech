identifier: InterPro:IPR062138
label: "KlcB, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of KlcB proteins from E.coli. These proteins are involved in transcriptional regulation and contains a DNA-binding domain ( ) and regions with similarity to KorA and TrbA proteins. The protein is part of the kilC operon and its expression is negatively regulated by KorA and KorC. This domain may adopt a SH3-like fold, with a 20 residues insertion that forms two additional β-strands.
