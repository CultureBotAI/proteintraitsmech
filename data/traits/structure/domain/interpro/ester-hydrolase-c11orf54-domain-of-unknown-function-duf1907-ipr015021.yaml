identifier: InterPro:IPR015021
label: "Ester hydrolase C11orf54, Domain of unknown function DUF1907"
definition: >-
  This entry represents a domain found in Ester hydrolase C11orf54 (also known as PTD012) and similar proteins predominantly found in animals and fungi. The structure of this domain displays an α-β-β-α four layer topology, with an HxHxxxxxxxxxH motif that coordinates a zinc ion, and an acetate anion at a site that likely supports the enzymatic activity of an ester hydrolase.
