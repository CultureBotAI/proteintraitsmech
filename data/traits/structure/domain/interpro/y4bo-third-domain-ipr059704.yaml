identifier: InterPro:IPR059704
label: "Y4bO, third domain"
definition: >-
  This entry represents the third domain of Y4bO, an uncharacterised protein from Sinorhizobium fredii. The protein is 606 amino acids in length and is encoded on the symbiotic plasmid pNGR234a. This domain is found in various bacterial species, predominantly in Pseudomonadati and Bacillati. The function of this domain remains to be determined.
