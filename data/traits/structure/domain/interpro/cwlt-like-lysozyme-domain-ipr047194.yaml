identifier: InterPro:IPR047194
label: "CwlT-like, lysozyme domain"
definition: >-
  This domain is also present in poorly characterised proteins, namely the pneumococcal vaccine antigen A and YocA from B. subtilis. CwlT is a bifunctional cell wall hydrolase containing an N-terminal lysozyme domain and a C-terminal NlpC/P60 endopeptidase domain, and has been implicated in the spread of transposons. This entry represents the N-terminal domain which acts as a N-acetylmuramidase that cleaves the bond between N-acetylmuramic acid and N-acetyl-D-glucosamine (MurNAc-GlcNAc) in peptidoglycan. It has structural similarities with lytic transglycosylases and lysozyme G. CwlT is required for ICEBs1 conjugation for which the muramidase activity is essential.
