identifier: InterPro:IPR020448
label: "Maltose fermentation regulatory protein, DNA-binding domain"
definition: >-
  This entry represents a subset of the Zn2Cys6 DNA-binding domains found in maltose fermentation regulatory proteins such MAL13, MAL33 and MAL63. These proteins regulate the transcription of structural maltase (MAL1S, MAL3S or MAL6S) and maltose permease (AGT1, MAL3T or MAL6T) genes. This entry also includes Respiratory transcription factor ZNF1 that regulates respiratory growth and plays a critical role in stress adaptation during non-fermentative growth. The N-terminal region of a number of fungal transcriptional regulatory proteins contains a Cys-rich motif that is involved in zinc-dependent binding of DNA. The region forms a binuclear Zn cluster, in which two Zn atoms are bound by six Cys residues. A wide range of proteins are known to contain this domain. These include the proteins involved in arginine, proline, pyrimidine, quinate, maltose and galactose metabolism, amide and GABA catabolism, leucine biosynthesis, amongst others. The structure of Zn2Cys6 DNA-binding domain from different proteins has been determined in free and DNA bound state ( ) revealing details of the molecular basis of DNA recognition.
