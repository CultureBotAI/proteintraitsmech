identifier: InterPro:IPR054474
label: "Diacylglycerol kinase eta/delta/kappa, helical domain"
definition: >-
  This domain is found in diacylglycerol kinase isoenzymes eta (DGKH), delta (DGKD), and kappa (DGKK). These enzymes play important roles in lipid signaling by converting diacylglycerol to phosphatidic acid. DGKD is a multidomain protein composed of seven globular domains. The domain represented by this entry locates toward the C-terminal and precedes the C-terminal SAM domain ( ). It is predicted to adopt an α-helical structure arranged in a four helical bundle.
