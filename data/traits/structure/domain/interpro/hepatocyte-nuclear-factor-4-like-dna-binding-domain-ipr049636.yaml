identifier: InterPro:IPR049636
label: "Hepatocyte nuclear factor 4-like, DNA-binding domain"
definition: >-
  This entry represents the DNA-binding domain of HNF4 and its homologues. More than 280 nuclear receptors are found in C. elegans, most of which are originated from an explosive burst of duplications of HNF4. HNF4 is a member of the nuclear receptor superfamily and plays a key role in establishing and maintenance of hepatocyte differentiation in the liver. It is a transcriptional regulator that controls the expression of hepatic genes during the transition of endodermal cells to hepatic progenitor cells, facilitating the recruitment of RNA pol II to the promoters of target genes. Additionally, it plays an essential role in circadian rhythm maintenance and period regulation in the liver and colon cells. It is also expressed in gut, kidney, and pancreatic beta cells. HNF4 was originally classified as an orphan receptor, but later it is found that HNF4 binds with very high affinity to a variety of fatty acids. However, unlike other nuclear receptors, the ligands do not act as a molecular switch for HNF4. They seem to constantly bind to the receptor, which is constitutively active as a transcription activator. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, HNF4 has a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a flexible hinge and a C-terminal ligand binding domain (LBD).
