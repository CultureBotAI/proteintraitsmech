identifier: InterPro:IPR014906
label: "Pre-mRNA processing factor 4 (PRP4)-like"
definition: >-
  This small domain is found on PRP4 ribonuleoproteins. PRP4 is a U4/U6 small nuclear ribonucleoprotein that is involved in pre-mRNA processing. It is also found in pre-mRNA-splicing factor 18.
