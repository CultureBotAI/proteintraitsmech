identifier: InterPro:IPR025826
label: "Cob(I)alamin adenosyltransferase N-terminal domain"
definition: >-
  This domain is found in bacterial sequences, and is approximately 20 amino acids in length. It is found in cob(I)alamin adenosyltransferase, which adenosylates Co(I) in an ATP-dependent manner in the conversion of aquacobalamin to its coenzyme form. This is the third step in this process, after two steps involved in the reduction of Co(III) to Co(I).
