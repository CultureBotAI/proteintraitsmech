identifier: InterPro:IPR058049
label: "Cargo protein 1, compact domain"
definition: >-
  This entry represents the compact domain of cargo protein 1 (C1) found in crassviruses. This protein is unique in that different portions of it are found in both the capsid and the tail of the virion. This domain is bound to the portal protein wing domain inside the capsid, with 12 such segments interdigitating with wing loops (SH3-like domains) of the portal. Additionally, 12 copies of an α-helical segment of the same protein are located at the inner surface of the first and second rings of the tail barrel. A transmembrane helix is predicted in the N-terminal region, which may insert into the host cell membrane. The presence of cargo protein 1 in both the capsid and tail suggests a mechanism for protein ejection prior to complete ejection of genomic DNA, likely involving partial unfolding of the protein as it is extruded through the tail. Cargo protein 1 is believed to be ejected in the N to C direction, with the N-terminal part located in the tail exiting first, followed by the C-terminal domain located in the capsid. This protein likely contributes to the formation of a transmembrane channel for DNA ejection. The protein is broadly conserved among crassviruses, although members of the epsilon group lack a detectable homologue.
