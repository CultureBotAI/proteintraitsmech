identifier: InterPro:IPR047040
label: Flagellar biosynthesis protein FlhF, GTPase domain
definition: >-
  This entry represents the GTPase domain found at the C-terminal of flagellar biosynthetic protein FlhF. The assembly of flagella is a multi-step process and relies on a complex type III export machinery located in the cytoplasmic membrane. The FlhF protein is a essential for the placement and assembly of polar flagella and has been classified as a signal-recognition particle (SRP)-type GTPase. It is similar to the 54 kd subunit (SRP54) of the SRP that mediates the transport to or across the plasma membrane in bacteria and the endoplasmic reticulum in eukaryotes. SRP recognises N-terminal signal sequences of newly synthesized polypeptides at the ribosome. The SRP-polypeptide complex is then targeted to the membrane by an interaction between SRP and its cognate receptor (SR). FlhF activities and the net effect of FlhF on flagellation phenotypes appear to be different among polar flagellates.
