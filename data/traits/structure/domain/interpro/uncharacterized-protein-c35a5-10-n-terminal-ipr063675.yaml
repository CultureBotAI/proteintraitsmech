identifier: InterPro:IPR063675
label: "Uncharacterized protein C35A5.10, N-terminal"
definition: >-
  This entry represents a presumed domain found at the N-terminal of the Uncharacterized protein C35A5.10 from Caenorhabditis elegans. The protein contains two WR1 domains and cysteine repeat regions. The protein has a predicted signal peptide suggesting it may be secreted. Expression has been detected in embryo and other cell types. The function of this protein remains to be determined.
