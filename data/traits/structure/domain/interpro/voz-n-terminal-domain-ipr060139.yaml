identifier: InterPro:IPR060139
label: "VOZ, N-terminal domain"
definition: >-
  This entry represents the N-terminal helical domain found in VOZ transcription factors. This domain is located N-terminal to the main VOZ DNA-binding domain in plant transcription factors VOZ1 and VOZ2 from Arabidopsis thaliana. VOZ proteins are vascular plant transcription factors that regulate flowering downstream of phytochrome B signalling. The specific function of this N-terminal domain remains to be determined.
