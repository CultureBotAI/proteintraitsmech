identifier: InterPro:IPR003645
label: "Follistatin-like, N-terminal"
definition: >-
  This EGF-like domain resembles the follistatin-N-terminal domain, and is distinct from the kazal-like sequence. Follistatin binds to activin and is a specific inhibitor of the biosynthesis and secretion of pituitary follicle stimulating hormone. This domain is also found in SPARC, a protein involved in the regulation of cell growth through interactions with the extracellular matrix and cytokines, and the heparan sulfate basal lamina glycoprotein Agrin.
