identifier: InterPro:IPR059683
label: "AF_0843, wHTH domain"
definition: >-
  This entry represents a winged-helix domain in the AF_0843 family of uncharacterised proteins found in Archaea. This domain is found across diverse methanogenic and hyperthermophilic archaeal lineages including Archaeoglobus, Methanosarcinaceae, Methanotrichaceae, and Methanothrix. The function of this protein family remains to be determined, but based on its structure prediction, it may be involved in binding DNA or protein-protein interaction.
