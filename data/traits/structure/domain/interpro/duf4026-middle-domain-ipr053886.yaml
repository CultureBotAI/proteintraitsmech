identifier: InterPro:IPR053886
label: "DUF4026, middle domain"
definition: >-
  This entry represents a domain found in uncharacterised bacterial proteins. It is usually associated with and that flank this domain from N- and C-terminal ends, respectively. This domain is distantly related to SUFU-like domains.
