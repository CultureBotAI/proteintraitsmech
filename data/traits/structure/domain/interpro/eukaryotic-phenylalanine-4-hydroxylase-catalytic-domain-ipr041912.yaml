identifier: InterPro:IPR041912
label: "Eukaryotic phenylalanine-4-hydroxylase, catalytic domain"
definition: >-
  Eukaryotic phenylalanine-4-hydroxylase (eu_PheOH) is a member of the biopterin-dependent aromatic amino acid hydroxylase family of non-heme, iron(II)-dependent enzymes that also includes prokaryotic phenylalanine-4-hydroxylase (pro_PheOH), eukaryotic tyrosine hydroxylase (TyrOH) and eukaryotic tryptophan hydroxylase (TrpOH). The three enzymes have a three-domain structure, with an N-terminal regulatory domain (humanPheOH residues 1-142), a central catalytic domain (hPheOH residues 143-410), and a C-terminal tetramerization domain (hPheOH residues 411-452). PheOH catalyzes the first and rate-limiting step in the metabolism of the amino acid L-phenylalanine (L-Phe), the hydroxylation of L-Phe to L-tyrosine (L-Tyr). It uses (6R)-L-erythro-5,6,7,8-tetrahydrobiopterin (BH4) as the physiological electron donor. The catalytic activity of the tetrameric enzyme is tightly regulated by the binding of L-Phe and BH4 as well as by phosphorylation. Mutations in the human enzyme are linked to a severe variant of phenylketonuria.
