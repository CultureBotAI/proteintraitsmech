identifier: InterPro:IPR033728
label: "Threonine-tRNA ligase catalytic core domain"
definition: >-
  Threonyl-tRNA synthetase (ThrRS) is responsible for the attachment of threonine to the 3' OH group of ribose of the appropriate tRNA. ThrRS is a homodimer. This core domain is primarily responsible for ATP-dependent formation of the enzyme bound aminoacyl-adenylate. ThrRS has been assigned to class II based upon its structure and the presence of three characteristic sequence motifs in the core domain.
