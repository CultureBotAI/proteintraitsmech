identifier: InterPro:IPR062675
label: "SOV1, N-terminal domain"
definition: >-
  This entry represents the N-terminal TPR domain found in mitochondrial protein SOV1 and related proteins. SOV1 is a mitochondrial protein involved in translation activator activity and mitochondrial ribosome assembly. SOV1 localises to mitochondria and plays a role in mitochondrial translation. The specific function of this domain remains to be determined.
