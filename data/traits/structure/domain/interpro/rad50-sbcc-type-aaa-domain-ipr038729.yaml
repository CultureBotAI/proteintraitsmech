identifier: InterPro:IPR038729
label: "Rad50/SbcC-type AAA domain"
definition: >-
  This entry represents the AAA domain found in some DNA repair proteins, such as Rad50, SbcC, RecF, RecN and structural maintenance of chromosomes proteins 5 and 6 (Smc5-Smc6). The proteins in this superfamily are characterised by the structural conservation of a central ATPase domain of about 250 amino acids called the AAA module. Typically, the AAA domain can be divided into two structural subdomains, an N-terminal P-loop NTPase α-β-α subdomain that is connected to a smaller C-terminal all-α subdomain. The α-β-α subdomain adopts a Rossman fold and contains several motifs involved in ATP binding and hydrolysis, including classical motifs Walker A and Walker B. The all-α subdomain, is much less conserved across AAA proteins. The AAA+ superfamily of ATPases is found in all kingdoms of living organisms where they participate in diverse cellular processes including membrane fusion, proteolysis and DNA replication. Although the terms AAA+ and AAA are often used loosely and interchangeably, the classical AAA family members are distinguished by their possession of the SRH region in the AAA module. Many AAA+ proteins are involved in similar processes to those of AAA proteins (facilitation of protein folding and unfolding, assembly or disassembly of proteins complexes, protein transport and degradation), but others function in replication, recombination, repair and transcription. For a review see.
