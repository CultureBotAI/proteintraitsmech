identifier: InterPro:IPR009721
label: "O-acyltransferase WSD1-like, C-terminal"
definition: >-
  This entry represents the C terminus (approximately 170 residues) of wax ester synthase/diacylglycerol acyltransferases (WS/DGATs), predominantly from bacteria and plants, including O-acyltransferase WSD1 which is involved in cuticular wax biosynthesis. They catalyse the condensation of a fatty alcohol and a fatty acyl-Coenzyme A (acyl-CoA) and they can also catalyse the transesterification of acyl-CoAs with diacylglycerols. These are bifunctional enzymes that share low overall sequence similarity but all WS/DGATs share a conserved HHXXXDG motif, which is also found in other acyltransferases.
