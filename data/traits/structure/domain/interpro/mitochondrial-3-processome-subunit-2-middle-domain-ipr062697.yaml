identifier: InterPro:IPR062697
label: "Mitochondrial 3' processome subunit 2, middle domain"
definition: >-
  This entry represents the middle domain of mitochondrial 3' processome subunit 2 (MPSS2), found in kinetoplastid parasites of the family Trypanosomatidae. MPSS2 is a component of the mitochondrial 3' processome (MPsome) complex, which also includes terminal uridylyltransferase KRET1, 3'-5' exonuclease DSS1, MPSS1 and MPSS3. The MPsome is involved in the maturation of guide RNA (gRNA) precursors in the mitochondrion. MPSS2 interacts directly with DSS1 within the complex. The specific function of this middle domain remains to be determined. It contains a TPR-like fold.
