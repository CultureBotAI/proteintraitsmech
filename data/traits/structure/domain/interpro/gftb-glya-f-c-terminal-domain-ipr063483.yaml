identifier: InterPro:IPR063483
label: "GftB/GlyA-F, C-terminal domain"
definition: >-
  GtfB is required for polymorphic O-glycosylation of serine-rich repeat proteins. GtfB, together with GtfA, forms a two-protein enzyme complex that catalyses the first step of PsrP glycosylation and provides the primary binding site for the acceptor. GtfB stabilises the glycosylation activity of GtfA and forms a heterotetramer complex with GtfA. GtfB is a peripheral membrane protein localised to the cell membrane and is part of the accessory SecA2/SecY2 protein translocation system. This entry represents the glycosyltransferase domain found at the C-terminal of GftB. This domain is also found in glycosyltransferases GlyA/B/D/E/F from Streptococcus pneumoniae, which catalyse the third step in glycosylation of PsrP. In Glycosyltransferase GlyD, this domain appears twice, one after the other.
