label: "Domain of unknown function DUF7782"
definition: >-
  This is a presumed domain found at the C-terminal of a group of uncharacterised sequences from Nocardia sp. According to structure predictions, this domain may adopt a winged helix fold with an insertion consisting of a long β-hairpin and a short β-strand.
