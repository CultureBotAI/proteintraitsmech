identifier: InterPro:IPR054598
label: "Single-stranded-DNA-specific exonuclease RecJ, C-terminal domain, thermales"
definition: >-
  This entry represents the C-terminal domain present in a set of RecJ proteins from thermales, such as RecJ from Thermus thermophilus, a single-stranded-DNA-specific exonuclease acting in a 5' to 3' direction that has no detectable activity on ssRNA.
