identifier: InterPro:IPR001936
label: Ras GTPase-activating domain
definition: >-
  This entry represents a conserved domain in the RasGAPs (Ras GTPase-activating proteins). This domain is also known as the RasGAP domain. Ras proteins are membrane-associated molecular switches that bind GTP and GDP and slowly hydrolyze GTP to GDP. This intrinsic GTPase activity of Ras is regulated by a family of proteins collectively known as 'GAP' or GTPase-activating proteins. RasGAP proteins are usually quite large (from 765 residues for sar1 to 3079 residues for IRA2) but share only a limited (about 250 residues) region of sequence similarity, referred to as the 'catalytic domain' or RasGAP domain. The most conserved region within this domain contains a 15 residue motif which seems to be characteristic of this family of proteins.
