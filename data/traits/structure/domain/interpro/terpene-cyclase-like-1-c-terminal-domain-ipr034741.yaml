identifier: InterPro:IPR034741
label: "Terpene cyclase-like 1, C-terminal domain"
definition: >-
  Enzymes in this subgroup generally have two domains, with the C-terminal domain represented by this entry and the N-terminal domain ( ) being a member of the terpene cyclase-like 1 N-terminal subgroup in the isoprenoid synthase class II superfamily. Examples of proteins that belong to this entry are: (E)-beta-farnesene synthase from Zea mays, which catalyses the production of beta-farnesene and alpha-bergamotene in equal amounts from farnesyl diphosphate and is involved in indirect defence by producing volatile signals attracting natural enemies of herbivores. Bifunctional levopimaradiene synthase, chloroplastic from Ginkgo biloba, which catalyses the initial cyclisation step in the biosynthesis of ginkgolides, a structurally unique family of diterpenoids that are highly specific platelet-activating-factor receptor antagonists and also two sequential cyclisations of geranylgeranyl diphosphate (GGPP) to levopimaradiene. Germacrene A synthase from Lavandula viridis, which is involved in the biosynthesis of volatile compounds widely used in aromatherapy and folk medicine, and present in culinary herbs. It has been suggested that this gene family be designated tps (for terpene synthase). Sequence comparisons reveal similarities between the monoterpene (C10) synthases, sesquiterpene (C15) synthases and the diterpene (C20) synthases. It has been split into six subgroups on the basis of phylogeny, called Tpsa-Tpsg.
