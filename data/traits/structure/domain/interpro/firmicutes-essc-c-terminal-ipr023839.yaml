identifier: InterPro:IPR023839
label: "Firmicutes EssC, C-terminal"
definition: >-
  This entry describes the C-terminal domain of the type VII secretion protein EssC from Firmicutes. EssC contains the FtsK domains and is typically between 107 and 121 amino acids in length. It is required for secretion of EsxA and EsxB. It is related to the FtsK/SpoIIIE proteins ( ), which are DNA transporters responsible for translocating missegregated chromosomes after the completion of cell division.
