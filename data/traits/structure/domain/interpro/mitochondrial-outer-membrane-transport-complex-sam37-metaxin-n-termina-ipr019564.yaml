identifier: InterPro:IPR019564
label: "Mitochondrial outer membrane transport complex Sam37/metaxin, N-terminal domain"
definition: >-
  Sam37 (also known as TOM37) is a component of the mitochondrial outer membrane sorting assembly machinery (SAM or TOB) complex, which is required for the sorting of proteins with complicated topology, such as β-barrel proteins, to the mitochondrial outer membrane after import by the TOM complex. It has homology with Metaxin-1, also part of the outer mitochondrial membrane β-barrel protein transport complex.
