identifier: InterPro:IPR062388
label: "SPS-sensor component PTR3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of PTR3, the SPS-sensor component found in yeasts. PTR3 mediates amino acid-inducible regulation of peptide transport and is also known as peptide transport protein 3. PTR3 proteins are found in ascomycetes. The protein functions in sensing and regulation but the specific role of this N-terminal domain remains to be determined.
