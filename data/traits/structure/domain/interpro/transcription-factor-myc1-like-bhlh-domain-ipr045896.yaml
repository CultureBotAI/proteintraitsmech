identifier: InterPro:IPR045896
label: "Transcription factor MYC1-like, bHLH domain"
definition: >-
  This entry represents the basic helix-loop-helix (bHLH) domain found in a group of plant transcription factors. This entry includes MYC1 and bHLH91 from Arabidopsis thaliana and EAT1 from Oryza sativa. MYC1 (also known as BHLH12) is an important regulator of trichome and root hair initiation. bHLH91 is involved in pollen development. This protein is important for the normal transcriptome of the developing Arabidopsis anther, possibly by forming a feed-forward loop with DYT1. EAT1 participates in the regulation of tapetum programmed cell death (PCD) and degradation during male reproductive development in rice.
