identifier: InterPro:IPR007707
label: "Transforming acidic coiled-coil-containing protein, C-terminal"
definition: >-
  This entry represents a C-terminal domain found in the the proteins TACC 1, 2 and 3 (TACC1-3). TACC1 is found concentrated in the centrosomes of eukaryotes which may play a conserved role in organising centrosomal microtubules. The human TACC proteins have been linked to cancer and TACC2 has been identified as a possible tumour suppressor (AZU-1). TACC 3 from Xenopus laevis, also known as maskin, associates XMAP215 and promotes efficient microtubule elongation during mitosis. Maskin is also found to bind CPEB and elF-4E. Interestingly, the functional homologue (Alp7) in Schizosaccharomyces pombe (not included in this entry) has been shown to be required for organisation of bipolar spindles.
