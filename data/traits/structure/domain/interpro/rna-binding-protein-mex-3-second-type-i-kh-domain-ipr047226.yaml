identifier: InterPro:IPR047226
label: RNA-binding protein MEX-3, second type I KH domain
definition: >-
  This entry represents the second type I KH domain of MEX3 proteins. The MEX-3 protein family includes four members, MEX3A/RKHD4, MEX3B/RKHD3/RNF195, MEX3C/ RKHD2/RNF194, and MEX3D/RKHD1/RNF193/TINO. They are homologous of Caenorhabditis elegans MEX-3 protein, a translational regulator that specifies the posterior blastomere identity in the early embryo and contributes to the maintenance of the germline totipotency. MEX-3 proteins are RNA-binding phosphoproteins involved in post-transcriptional regulatory mechanisms. It has been shown that these proteins are deregulated in several cancers and affects apoptosis regulation, antigen processing, and presentation, which, therefore, contribute to the immune evasion of tumour cells. They are characterised by containing two K-homology (KH) RNA-binding domains and a C-terminal RING finger. They bind RNA through their KH domains and shuttle between the nucleus and the cytoplasm via the CRM1-dependent export pathway.
