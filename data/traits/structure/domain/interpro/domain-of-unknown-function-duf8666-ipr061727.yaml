label: "Domain of unknown function DUF8666"
definition: >-
  This entry represents a small helical hairpin domain of approximately 48 residues. The family is restricted to marine picocyanobacteria, including Prochlorococcus, Synechococcus, and Cyanobium species (Synechococcales). The function of this domain remains to be determined.
