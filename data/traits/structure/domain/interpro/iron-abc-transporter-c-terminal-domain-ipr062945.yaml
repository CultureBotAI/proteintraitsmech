identifier: InterPro:IPR062945
label: "Iron ABC transporter, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 70 residues found in iron ABC transporter ATP-binding proteins in Bacteroidota. This domain is located C-terminal to the ABC transporter ATPase domain ( ). These proteins are components of ABC transporters involved in iron and siderophore uptake. The specific function of this C-terminal domain remains to be determined.
