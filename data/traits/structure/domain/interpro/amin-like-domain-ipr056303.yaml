identifier: InterPro:IPR056303
label: "AMIN-like domain"
definition: >-
  This domain is found in a group of extracellular likely lipoproteins that adopt a structure similar to the AMIN domain. However, there are some topological differences between the two domains. Members of this entry are predominantly found in actinomycetes.
