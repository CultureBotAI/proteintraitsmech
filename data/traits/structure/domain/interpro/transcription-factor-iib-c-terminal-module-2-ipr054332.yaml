identifier: InterPro:IPR054332
label: "Transcription factor IIB, C-terminal module 2"
definition: >-
  In the pathogenic trypanosome, Trypanosoma brucei, transcription factor IIB (tTFIIB) is essential for spliced leader (SL) RNA gene transcription and cell viability, but has a highly divergent primary sequence in comparison to TFIIB in other eukaryotes. Structure analysis of the C-terminal region of trypanosome TFIIB, reveals 2, closely packed helical modules followed by a C-terminal extension of 32 aa. The trypanosome-specific region comprises the second helical module and the C-terminal extension. Both helical modules contain the canonical 5-helix cyclin fold characteristic of TFIIB proteins. This domain is mostly found in Trypanosomatidae. The first helical module is represented in .
