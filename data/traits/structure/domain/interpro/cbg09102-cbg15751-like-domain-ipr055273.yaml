identifier: InterPro:IPR055273
label: "CBG09102/CBG15751-like domain"
definition: >-
  This entry represents a domain found in a group of uncharacterised sequences from nematodes, including CBG09102 and CBG15751 from Caenorhabditis briggsae. This domain may adopt a β-sandwich fold consisting of thirteen β-strands.
