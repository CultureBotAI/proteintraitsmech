identifier: InterPro:IPR057693
label: "Domain of unknown function DUF7933"
definition: >-
  This domain of unknown function is found in multiple copies in a number of bacterial proteins. It is closely related to domains represented by DUF11 ( ). Some members, similarly to DUF11, contains a conserved N-terminal lysine and a C-terminal asparagine with central aspartate/glutamate residues suggesting that they may contain an isopeptide bond.
