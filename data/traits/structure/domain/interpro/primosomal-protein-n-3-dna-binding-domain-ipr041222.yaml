identifier: InterPro:IPR041222
label: "Primosomal protein N', 3' DNA-binding domain"
definition: >-
  This domain represents the N-terminal DNA-binding domain found in the PriA protein. This domain has been shown to bind the 3' end of the leading-strand arm of replication fork structures. Primosomal protein N', also known as ATP-dependent helicase PriA, is a component of the primosome, which is involved in replication, repair, and recombination. PriA serves as a sensor/stabiliser for an arrested replication fork, which is lethal in bacteria if left unrepaired and eventually promotes restart of DNA replication through the assembly of a primosome. It also serves as a checkpoint protein that prevents the replicase from advancing in a strand displacement reaction on forks that do not contain a functional replicative helicase. This protein shows a modular arrangement in which its central helicase core is surrounded by several DNA-binding elements, including a 3'DNA-binding domain at the N-terminal. This domain is usually followed by a circularly permuted winged helix (WH) domain . At the C-terminal, there is a Cys-rich region (CRR) domain , which is embedded within the C-terminal helicase lobe , followed by the C-terminal domain (CTD) .
