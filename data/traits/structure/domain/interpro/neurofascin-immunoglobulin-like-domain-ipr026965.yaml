identifier: InterPro:IPR026965
label: "Neurofascin, immunoglobulin-like domain"
definition: >-
  Neurofascin (NFASC) is a cell adhesion, ankyrin-binding protein which may be involved in neurite extension, axonal guidance, synaptogenesis, myelination and neuron-glial cell interactions. This protein belongs to the L1 subfamily of cell adhesion molecules (CAMs) and is comprised of an extracellular region having six Ig-like domains and five fibronectin type III domains, a transmembrane region, and a cytoplasmic domain. NFASC has many alternatively spliced isoforms having different temporal expression patterns during development. NF participates in axon subcellular targeting and synapse formation, however little is known of the functions of the different isoforms. This entry represents the first immunoglobulin-like (Ig-like) domain.
