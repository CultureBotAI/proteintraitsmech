identifier: InterPro:IPR058458
label: "Domain of unknown function DUF8145"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins are predominantly found in the Halobacteria class, specifically within the Haloferacaceae and Haloarculaceae families. The domain is approximately 68-86 amino acids in length. Reviewed UniProt entry Q18K22 from Haloquadratum walsbyi is included in this family. The domain is characterised by a conserved CPxCG motif, suggesting a potential zinc finger-like structure, although its exact function remains unknown.
