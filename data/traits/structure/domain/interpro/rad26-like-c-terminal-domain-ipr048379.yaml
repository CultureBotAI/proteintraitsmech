identifier: InterPro:IPR048379
label: "Rad26-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Rad26 from Myceliophthora thermophila ( ), a functional subunit of the Rad3-Rad26 complex that is responsible for bringing the kinase to sites of DNA damage. This domain consists of the last three helices in the structure. Together with the flexible C-terminal kinase-docking motif it plays a role in the binding of Rad3.
