identifier: InterPro:IPR005139
label: "Peptide chain release factor"
definition: >-
  This domain is found in bacterial, mitochondrial and chloroplastic peptide chain release factors. In bacteria, termination of protein synthesis depends on the type I release factors, RF1 and RF2. Both contain this domain.
