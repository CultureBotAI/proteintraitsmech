identifier: InterPro:IPR060114
label: "CRISPR-associated protein MJ1674, second domain"
definition: >-
  This entry represents the second domain of the CRISPR-associated protein MJ1674. The specific function of this second domain remains to be determined. This domain is also present in related CRISPR-associated bacterial proteins. This domain contains an all α-helical fold. The full-length protein is 634 amino acids with a molecular weight of approximately 71.5 kDa and contains four domains. MJ1674 is part of the CRISPR (clustered regularly interspaced short palindromic repeat) adaptive immune system that provides protection against mobile genetic elements. The protein is encoded in a type III-A CRISPR locus and is involved in antiviral defence. MJ1674 is found in Methanocaldococcus jannaschii and related archaeal species.
