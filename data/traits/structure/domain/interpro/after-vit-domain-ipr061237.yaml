identifier: InterPro:IPR061237
label: "After-VIT domain"
definition: >-
  The after-VIT domain is a bacterial surface protein C-terminal domain found on some proteins that have both the Vault protein Inter-alpha-Trypsin (VIT) domain and a von Willebrand factor type A domain. Some of after-VIT domain-containing proteins may have a known C-terminal sorting signal, such as LPXTG or PEP-CTERM, instead of the after-VIT domain. The after-VIT domain appears to be homologous to the myxo_SS_tail domain, some of whose member proteins are involved in adventurous gliding motility in Myxococcus xanthus, and it is similarly located.
