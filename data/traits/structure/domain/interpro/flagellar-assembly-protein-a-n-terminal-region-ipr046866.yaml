identifier: InterPro:IPR046866
label: "Flagellar Assembly Protein A , N-terminal region"
definition: >-
  This entry represents an N-terminal region of the FapA protein and its homologues. This region is found in multiple copies in some proteins such as . Members of this family include FapA (flagellar assembly protein A, ) from Vibrio vulnificus. The synthesis of flagella allows bacteria to respond to chemotaxis by facilitating motility. Studies examining the role of FapA show that the loss or delocalization of FapA results in a complete failure of the flagellar biosynthesis and motility in response to glucose mediated chemotaxis. The polar localization of FapA is required for flagellar synthesis, and dephosphorylated EIIAGlc (Glucose-permease IIA component) inhibited the polar localization of FapA through direct interaction.
