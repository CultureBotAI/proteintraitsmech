identifier: InterPro:IPR003741
label: "LUD domain"
definition: >-
  This entry represents a domain found in lactate utilization proteins B (LutB) and C (LutC), as well as several uncharacterised proteins. LutB and LutC are encoded by the conserved LutABC operon in bacteria. They are involved in lactate utilization and is implicated in the oxidative conversion of L-lactate into pyruvate. Proteins containing this domain also include DVU3032 from Desulfovibrio. From the results of the genetic and biochemical experiments, DVU3032 has been predicted as a lactate dehydrogenase.
