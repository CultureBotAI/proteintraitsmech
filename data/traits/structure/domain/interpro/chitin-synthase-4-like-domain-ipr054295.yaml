identifier: InterPro:IPR054295
label: "Chitin synthase 4-like domain"
definition: >-
  This entry represents a domain found in a group of fungal proteins, including Chitin synthase 4 from Gibberella zeae (CHS4). CHS4 plays a role in the polymerisation of chitin, a structural polymer of the cell wall and septum, and shows additive effects in septum formation with the chitin synthases CHS1/2/3A/5/6/7. This domain is predicted to adopt a globular structure with similarity to Cytochrome b5-like heme/steroid binding domain ( ). However, it lacks heme coordinating residues and is probably not involved in heme binding.
