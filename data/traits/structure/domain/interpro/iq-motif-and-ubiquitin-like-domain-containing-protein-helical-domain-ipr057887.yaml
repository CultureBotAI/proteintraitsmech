identifier: InterPro:IPR057887
label: "IQ motif and ubiquitin-like domain-containing protein, helical domain"
definition: >-
  This domain is found in IQUB and similar proteins mainly found in vertebrates. This domain is predicted to adopt a predominantly α-structure. IQ motif and ubiquitin-like domain-containing protein (IQUB) is an adapter protein that anchors the radial spoke 1 (RS1) complex to the A microtubule of outer doublet microtubules in axonemes. The triple radial spokes (RS1, RS2 and RS3) are required to modulate the beating of the sperm flagellum. IQUB may also play a role in inhibiting signalling via MAPK1/ERK2 and MAPK3/ERK1. It may play roles in cilia formation and/or maintenance. Defects in this protein may lead to spermatogenic failure with radial spoke defects. The ubiquitin domain in IQUB is represented by .
