identifier: InterPro:IPR060290
label: "BOS1/GOSR2/MEM11, N-terminal domain"
definition: >-
  This entry represents the N-terminal in BOS1/GOSR2/MEM11 proteins. BOS1/GOSR2/MEM11 proteins are involved in intracellular protein transport, specifically facilitating the movement of proteins between the endoplasmic reticulum (ER) and the Golgi complex, as well as within the Golgi apparatus itself. These proteins function as SNAREs (Soluble NSF Attachment Protein Receptors), which are essential for the targeting and fusion of transport vesicles. BOS1 proteins are primarily responsible for the transport between the ER and the Golgi, while GOSR2 proteins are involved in the transport from the cis/medial-Golgi to the trans-Golgi network. These proteins form part of SNARE complexes, which are crucial for vesicle docking and fusion, ensuring the proper delivery of proteins to their target destinations within the cell.
