identifier: InterPro:IPR044331
label: "Nonstructural protein 15, N-terminal, deltacoronavirus"
definition: >-
  The unique coronavirus transcription/replication machinery comprised of multiple virus-encoded non structural proteins (NSP) plays a vital role during initial and intermediate phases of the viral life cycle. NSP15 forms a hexamer made of dimers of trimers which is suggested to be a functional unit, responsible for the endoribonuclease activity. The NSP15 monomer consists of three domains: N-terminal, middle and C-terminal. The catalytic function of NSP15 resides in the C-terminal NendoU domain. The active site carries six key residues conserved among SARS-CoV-2, SARS-CoV and MERS-CoV, suggesting that its activity is important for sustained replication in the host. This entry represents the N-terminal oligomerization domain of NSP15 from deltacoronaviruses. This domain stabilises the hexamer and is critical for its formation. It is composed of three-stranded antiparallel β-sheet and two α-helices. In Porcine deltacoronavirus (PDCoV), the N-terminal domain seems to differ from the NSP15 of alpha and betacoronavirus. PDCoV NSP15 has been shown to exist as a dimer and a monomer in solution and that it inhibits type I interferon production independently of its endoribonuclease activity.
