identifier: InterPro:IPR036012
label: "TBC1D8B, PH-GRAM domain 1"
definition: >-
  TBC1D8B may act as a GTPase-activating protein for Rab family protein(s). TBC1D8B contains an N-terminal PH-GRAM domain and a C-terminal Rab-GTPase-TBC (Tre-2, BUB2p, and Cdc16p) domain. This entry represents the first repeat of the PH-GRAM domain. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold.
