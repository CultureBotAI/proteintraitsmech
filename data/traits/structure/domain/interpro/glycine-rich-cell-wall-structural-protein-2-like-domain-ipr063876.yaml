identifier: InterPro:IPR063876
label: "Glycine-rich cell wall structural protein 2-like domain"
definition: >-
  This entry represents a domain that covers most of the protein sequence in Glycine-rich cell wall structural protein 2 and 1 found in rice. These proteins are 185 amino acids in length and contain extensive glycine-rich repeats throughout their sequence. The proteins are secreted to the cell wall and are responsible for plasticity of the cell wall. The mature protein contains a disordered region at the C-terminal end.
