identifier: InterPro:IPR047106
label: "Nuclear factor interleukin-3-regulated protein-like , bZIP domain"
definition: >-
  This entry represents the Basic leucine zipper (bZIP) domain of NFIL3. The bZIP structural motif contains a basic region and a leucine zipper, composed of α-helices with leucine residues 7 amino acids apart, which stabilise dimerisation with a parallel leucine zipper domain. Dimerisation of leucine zippers creates a pair of the adjacent basic regions that bind DNA and undergo conformational change. Dimerisation occurs in a specific and predictable manner resulting in hundreds of dimers having unique effects on transcription. Nuclear factor interleukin-3-regulated protein (NFIL3, also known as E4BP4) was first identified as a transcriptional repressor capable of binding an activating transcription factor (ATF) DNA consensus sequence site in the adenovirus E4 promoter. Later, it was independently identified as a transactivator of the IL3 promoter in human T cells. E4BP4 is involved in a several biological processes, including transcriptional control of the circadian clock, neuron growth and survival, osteoblast function, and regulation of ovulation. It is essential for the development of NK cells and CD8alpha(+) conventional dendritic cells, and is also involved in macrophage activation, polarisation of CD4(+) T cell responses and B cell class switching to IgE. This group of proteins also includes the orthologue of human NFIL3 in Caenorhabditis elegans transcription factor atf-2.
