identifier: InterPro:IPR047676
label: "FxLYD domain"
definition: >-
  This entry represents the uncharacterised FxLYD domain, named for the strongest (but not invariant) motif, which spans about 75 amino acids usually in the C-terminal region of the these group of proteins. This domain is found mainly in bacteria but also in some archaeal species. In some proteins, this domain is found in two tandem copies.
