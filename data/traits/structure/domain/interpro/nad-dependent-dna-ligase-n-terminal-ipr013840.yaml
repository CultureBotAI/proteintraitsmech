identifier: InterPro:IPR013840
label: "NAD-dependent DNA ligase, N-terminal"
definition: >-
  DNA ligase (polydeoxyribonucleotide synthase) is the enzyme that joins two DNA fragments by catalyzing the formation of an internucleotide ester bond between phosphate and deoxyribose. It is active during DNA replication, DNA repair and DNA recombination. There are two forms of DNA ligase: one requires ATP ( ), the other NAD ( ). This entry represents the N-terminal region of NAD-dependent bacterial DNA ligases. They are proteins of about 75 to 85 Kd whose sequence is well conserved. They also show similarity to yicF, an Escherichia coli hypothetical protein of 63 Kd. The region described by this model covers the adenylation, OB-fold and zinc-finger domains of these enzymes.
