identifier: InterPro:IPR062800
label: "Little elongation complex subunit 1, TPR-like domain"
definition: >-
  This entry represents the first TPR-like domain of little elongation complex subunit 1 (Ice1). The specific function of this domain remains to be determined. The full-length Ice1 protein is a component of the little elongation complex (LEC), which is required to regulate small nuclear RNA gene transcription by RNA polymerase II and III. Ice1 acts as a scaffold protein that promotes LEC complex formation and recruitment and RNA polymerase II occupancy at snRNA genes in subnuclear bodies. The complete protein is located in the nucleus and belongs to the ICE1 family.
