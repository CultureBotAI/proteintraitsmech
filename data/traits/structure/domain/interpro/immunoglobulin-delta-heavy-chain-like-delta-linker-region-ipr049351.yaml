identifier: InterPro:IPR049351
label: "Immunoglobulin delta heavy chain-like, delta linker region"
definition: >-
  This entry represents the linker region of human Immunoglobulin delta heavy chain (IgD) and similar sequences from primates. This region is the longest hinge sequence of any immunoglobulin, which connects the Fab and Fc fragments. It has up to seven O-linked oligosaccharide sites, and is thought to be related to the flexible T-shape of IgD.
