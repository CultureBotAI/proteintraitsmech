identifier: InterPro:IPR058530
label: "Baseplate J-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in the P2 bacteriophage J protein, which lies at the edge of the baseplate, in the Baseplate protein gp47 from Escherichia phage Mu and similar sequences from tailed bacteriophages. This group also includes a number of bacterial homologues, which are thought to have been horizontally transferred, such as from Pseudomonas aeruginosa.
