identifier: InterPro:IPR058850
label: "Botulinum-like neurotoxin Wo, peptidase domain"
definition: >-
  This entry represents the peptidase domain in BoNT/Wo. This domain is responsible for the zinc-dependent proteolytic activity of the toxin, specifically cleaving the VAMP2 protein between Trp89 and Trp90. The domain contains the conserved HExxH zinc-binding motif characteristic of the M27 metalloproteases family, but features a wider, more open and negatively charged catalytic pocket compared to other botulinum neurotoxins. It also contains a unique β-hairpin motif (residues 31-60) and an unusually interrupted α-helix (residues 309-350) with an extended loop. The crystal structure revealed an additional calcium ion near the active site that may be involved in substrate binding. Botulinum-like toxin Wo (BoNT/Wo), discovered in Weissella oryzae outside the typical Clostridium genus, is a neurotoxin structurally similar to classic botulinum neurotoxins but with unique features. Like canonical BoNTs, it forms a complex with a protective partner protein (NTNH), which stabilises and shields the toxin in harsh environments such as the digestive tract. Functionally, BoNT/Wo acts as a zinc metalloprotease that cleaves vesicle-associated membrane protein (VAMP), disrupting SNARE-mediated vesicle fusion and thus potentially blocking neurotransmitter release-an action reminiscent of traditional botulinum and tetanus neurotoxins. BoNT/Wo differs from other botulinum neurotoxins in that it lacks the conserved receptor binding sites typically found in these toxins. The natural targets and receptors of BoNT/Wo remain to be identified, though it has been suggested that BoNT/Wo might target insects or worms rather than mammals. The protein was isolated from Weissella oryzae, a gram-positive bacterium found in fermented rice grains.
