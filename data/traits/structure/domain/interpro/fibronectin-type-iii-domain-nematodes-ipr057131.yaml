identifier: InterPro:IPR057131
label: "Fibronectin type-III domain, nematodes"
definition: >-
  This entry represents a fibronectin type-III domain found primarily in nematode proteins. The proteins contain several conserved cysteine residues that may either form disulphide bridges or possibly a zinc binding site. Many members of this family also contain a predicted transmembrane region following the FN3 domains, suggesting they may be membrane-anchored proteins.
