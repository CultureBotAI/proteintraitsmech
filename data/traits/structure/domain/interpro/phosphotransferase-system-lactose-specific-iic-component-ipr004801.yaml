identifier: InterPro:IPR004801
label: Phosphotransferase system, lactose-specific IIC component
definition: >-
  This family of proteins models the IIC domain of the phosphotransferase system (PTS) for lactose. The IIC domain catalyzes the transfer of a phosphoryl group from the IIB domain to lactose. When the IIC component and IIB components are in the same polypeptide chain they are designated IIBC.
