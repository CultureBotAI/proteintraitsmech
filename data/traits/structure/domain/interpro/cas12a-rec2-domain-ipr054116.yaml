identifier: InterPro:IPR054116
label: "Cas12a, REC2 domain"
definition: >-
  This entry represents the REC2 domain found in Cpf1, also known as CRISPR-associated endonuclease Cas12a. Cpf1 is an RNA-guided endonuclease of a type V CRISPR-Cas system that has been harnessed for genome editing. The REC2 domain is a part of the REC lobe of the bilobed architecture of Cpf1, which consists of both REC1 and REC2 domains. The REC2 domain comprises 10 α-helices and 2 β-strands that form a small antiparallel β-sheet. The crRNA-target DNA heteroduplex is accommodated within the positively charged, central channel formed by the REC1, REC2, and RuvC domains, and is recognised by the protein in a sequence-independent manner.
