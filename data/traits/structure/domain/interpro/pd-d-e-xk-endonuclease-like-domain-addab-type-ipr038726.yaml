identifier: InterPro:IPR038726
label: "PD-(D/E)XK endonuclease-like domain, AddAB-type"
definition: >-
  This entry represent a PD-(D/E)XK endonuclease-like domain. PD-(D/E)XK nucleases constitute a large and highly diverse superfamily of enzymes that display little sequence similarity. However, they share a common core fold and a few critical active site residues. This domain can be found at the C terminus of nuclease/helicase AddA, AddB, and RecB. There are two classes of helicase-nuclease complex involved in the initiation step for recombinational repair. AddAB-type enzymes (also called RexAB) are found mainly in Gram-positive bacteria, whereas heterotrimeric RecBCD-type enzymes are found mainly in Gram-negative bacteria. The RecBCD holoenzyme has a single nuclease domain found in RecB.
