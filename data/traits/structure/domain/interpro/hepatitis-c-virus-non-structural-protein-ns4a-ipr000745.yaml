identifier: InterPro:IPR000745
label: Hepatitis C virus, Non-structural protein NS4a
definition: >-
  NS4a (non-structural protein) forms an integral part of the NS3 serine protease in Hepatitis C virus, as it is required in a number of cases as a cofactor of cleavage. It has also been reported that NS4a interacts with NS4b and NS3 to form a multi-subunit replicase complex.
