identifier: InterPro:IPR062233
label: "Periplasmic alpha-amylase MalS, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of periplasmic alpha-amylase MalS and related proteins. It precedes the catalytic alpha-amylase domains ( ). MalS degrades maltooligosaccharides in the periplasm to shorter chains that can be transported across the cytoplasmic membrane by the MalFGK complex. Expression is under the regulatory control of MalT. The domain structure of MalS is distinctive within glycoside hydrolase family 13. The family is found in Enterobacterales, including Enterobacteriaceae and Yersiniaceae. The specific function of this N-terminal domain remains to be determined but may act as a carbohydrate binding domain.
