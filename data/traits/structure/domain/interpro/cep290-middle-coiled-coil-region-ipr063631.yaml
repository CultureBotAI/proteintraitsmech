identifier: InterPro:IPR063631
label: "Cep290, middle coiled-coil region"
definition: >-
  This entry represents a middle region of coiled-coils in Centrosomal protein of 290kDa (Cep290). Cep290 is part of the tectonic-like complex which is required for tissue-specific ciliogenesis and may regulate ciliary membrane composition. It activates ATF4-mediated transcription. It is required for the correct localisation of ciliary and phototransduction proteins in retinal photoreceptor cells and may play a role in ciliary transport processes.
