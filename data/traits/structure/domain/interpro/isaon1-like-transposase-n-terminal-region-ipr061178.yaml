identifier: InterPro:IPR061178
label: "ISAon1-like transposase, N-terminal region"
definition: >-
  ISAon1 is a variant form of ISL3 family transposase that lacks the two CXXC motifs in the N-terminal region found in typical ISL3 family transposases. ISAon1 family transposases are proposed to require a +1 frameshift to produce the functional form of the transposase, about 440 amino acids in length. This entry represents the N-terminal region of about 120 amino acids, which likely would be made as transposase-related short protein when the frameshift does not occur. Based on the behaviour of other transposases with programmed frameshifts, the short protein, once made, is likely to bind DNA and act as a suppressor of its own transcription. This domain is also found covering the whole length of the protein in a group of short uncharacterised sequences from firmicutes.
