identifier: InterPro:IPR058519
label: "Domain of unknown function DUF8206"
definition: >-
  This domain is found in uncharacterised eukaryotic proteins. It contains a number of highly conserved cysteine and histidine residues that may be involved in metal coordination. Some proteins contain two copies of this domain. It probably adopt a novel fold judging by its predicted structure.
