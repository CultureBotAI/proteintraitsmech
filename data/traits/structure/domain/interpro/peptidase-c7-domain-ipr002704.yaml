identifier: InterPro:IPR002704
label: Peptidase C7 domain
definition: >-
  This entry represents a peptidase C7 domain, which is found in HAV papain-like proteases p48 and p29. Hypoviruses are positive-strand RNA mycoviruses that attenuate virulence of their pathogenic fungal hosts [E1]. They employ a gene expression strategy that involves the autocatalytic processing of the N-terminal portion of encoded polyproteins by papain-like protease domains. The prototypic hypovirus CHV-1/EP713, responsible for virulence attenuation (hypovirulence) of the chestnut blight fungus Cryphonectria parasitica, encodes two contiguous open reading frames (ORFs) designated ORF A and ORF B, which contain N-terminal proteases p29 and p48, respectively. Protease p29 functions as a suppressor of the RNA silencing defense response, while p48 is required for viral RNA replication.
