identifier: InterPro:IPR027391
label: "rRNA small subunit methyltransferase F, RNA-binding PUA-like domain"
definition: >-
  This entry represents the second of two C-terminal domains found on bacterial methyltransferase RsmF that modifies the 16S ribosomal RNA. It has some structural similarity to the RNA-binding PUA domains suggesting that it is involved in RNA recognition. It lies downstream of the catalytic centre of this methyltransferase.
