identifier: InterPro:IPR062990
label: "LIC10012-like, third domain"
definition: >-
  This entry represents a group of uncharacterised proteins from Leptospira, including LIC10012 from Leptospira interrogans. Members of this family of putative surface-exposed proteins are found broadly throughout the genus Leptospira, and appear to have a VWA (von Willebrand factor type A) domain ( ), associated with at the N-terminal, and an OB fold-like domain at the C-terminal ( ). This entry represents a small α/β domain adjacent to the vWA domain.
