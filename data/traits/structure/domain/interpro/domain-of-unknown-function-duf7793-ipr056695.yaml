label: "Domain of unknown function DUF7793"
definition: >-
  This domain is found in uncharacterised bacterial proteins. A member from Arthrobacter sp. FB24 forms a swapped dimer ( ) in which one monomer exchanges a three-stranded β-sheet and an α-helix with the other monomer. The structure of this domain shares detectable similarity to SpoIIAA-like domains.
