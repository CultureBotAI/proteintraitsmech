identifier: InterPro:IPR063915
label: "Senescence-associated protein OSA15-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the OSA15/AAF senescence-associated protein family found in land plants. This domain is found in combination with a coiled-coil domain ( ). The full-length protein localises to the chloroplast and is upregulated during leaf senescence. In Arabidopsis thaliana, AAF is involved in modulating redox homeostasis to regulate leaf senescence, and its function is dependent on EIN2, a central factor of ethylene signalling. The specific function of this domain remains to be determined.
