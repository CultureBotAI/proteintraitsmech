identifier: InterPro:IPR013575
label: "Initiation factor 2 associated domain, bacterial"
definition: >-
  This entry represents a small conserved domain found towards the N terminus of bacterial translation initiation factor IF-2 family proteins. The domain is also found in the eukaryotic translation initiation factor 4 gamma in yeast and in a hypothetical Euglenozoa protein of unknown function.
