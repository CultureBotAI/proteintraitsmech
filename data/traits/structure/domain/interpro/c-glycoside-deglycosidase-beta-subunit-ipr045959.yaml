identifier: InterPro:IPR045959
label: "C-glycoside deglycosidase beta subunit"
definition: >-
  This is the structural domain of C-glycoside deglycosidase beta subunit (CGDB, also known as CarC), a carbon-carbon bond-cleaving enzyme which participates in the metabolism of C-glycosides. It acts on the C6-glycosylated compounds 3''-dehydroisovitexin (3''-oxo-isovitexin) and 3''-dehydroisoorientin (3''-oxo-homoorientin). In some members, this domain is found in combination with other domains.
