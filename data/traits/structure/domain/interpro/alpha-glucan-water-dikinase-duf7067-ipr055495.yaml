identifier: InterPro:IPR055495
label: "Alpha-glucan water dikinase, DUF7067"
definition: >-
  This domain is found in in Alpha-glucan water dikinase (GWD1 and GWD2) from Arabidopsis thaliana and in two-tandem copies in GWD1 from Citrus reticulata and Solanum tuberosum. It is predicted to adopt a globular structure consisting of a three helical bundle. GWD1 is involved in the incorporation of phosphate into starch-like alpha-glucan, mostly at the C-6 position of glucose units. This enzyme acts as regulator of starch mobilization by controlling the phosphate content of starch. The function of the domain represented in this entry is unknown.
