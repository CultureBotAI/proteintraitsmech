identifier: InterPro:IPR017565
label: "Formate-dependent nitrite reductase complex, subunit NrfF"
definition: >-
  The genes NrfE, NrfF, and NrfG are required for the formate-dependent nitrite reduction pathway, which involves at least two C-type cytochrome proteins, NrfA and NrfB. The NrfE, NrfF, and NrfG genes (haem lyase complex) are involved in the maturation of a special C-type cytochrome, apocytochrome C (apoNrfA), to cytochrome C (NrfA) by transferring a haem to the unusual haem binding motif of the Cys-Trp-Ser-Cys-Lys sequence in apoNrfA protein.
