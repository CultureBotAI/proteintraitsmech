identifier: InterPro:IPR003823
label: "CP12 domain"
definition: >-
  This entry represents an uncharacterised domain found in calvin cycle protein CP12 and other proteins. This domain is sometimes found in association cystathionine-beta-synthase domains. CP12 is a chloroplast protein that regulates the Calvin cycle responsible for CO2 assimilation. Oxidized CP12 forms a supramolecular complex with two key Calvin cycle enzymes, GAPDH (glyceraldehyde-3-phosphate dehydrogenase) and PRK (phosphoribulokinase), down-regulating their activity. It also interacts with other enzymes such as aldolase and malate dehydrogenase.
