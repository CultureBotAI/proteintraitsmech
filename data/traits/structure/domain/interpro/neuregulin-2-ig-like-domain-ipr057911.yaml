identifier: InterPro:IPR057911
label: "Neuregulin 2, Ig-like domain"
definition: >-
  This entry represents the Ig-like domain in NRG2 and related proteins, mainly found in mammals. Neuregulin 2 (NRG2) belongs to the neuregulin family and plays important roles in cell communication. It serves as a direct ligand for ERBB3 and ERBB4 tyrosine kinase receptors. NRG2 recruits ERBB1 and ERBB2 coreceptors, leading to ligand-stimulated tyrosine phosphorylation and activation of the ERBB receptors. Neuregulins (NRG) are a sub-family of EGF-like molecules that have been shown to play multiple essential roles in vertebrate embryogenesis including: cardiac development, Schwann cell and oligodendrocyte differentiation, some aspects of neuronal development, as well as the formation of neuromuscular synapses. Included in the family are heregulin; neu differentiation factor; acetylcholine receptor synthesis stimulator; glial growth factor; and sensory and motor-neuron derived factor. Multiple family members are generated by alternate splicing or by use of several cell type-specific transcription initiation sites. In general, they bind to and activate the erbB family of receptor tyrosine kinases (erbB2 (HER2), erbB3 (HER3), and erbB4 (HER4)), functioning both as heterodimers and homodimers.
