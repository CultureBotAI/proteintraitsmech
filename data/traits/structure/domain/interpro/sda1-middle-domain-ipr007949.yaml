identifier: InterPro:IPR007949
label: "SDA1, middle domain"
definition: >-
  This domain is found in several SDA1 protein homologues. SDA1 is a Saccharomyces cerevisiae protein which is involved in the control of the actin cytoskeleton. The protein is essential for cell viability and is localised in the nucleus.
