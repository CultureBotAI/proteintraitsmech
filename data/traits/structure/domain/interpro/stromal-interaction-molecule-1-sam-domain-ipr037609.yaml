identifier: InterPro:IPR037609
label: "Stromal interaction molecule 1, SAM domain"
definition: >-
  Stromal interaction molecule 1 (STM1) is a single-pass transmembrane protein that spans the ER membrane, with its N-terminal region (STIM1-N, approximately 22kDa) located in the ER lumen. Upon store depletion, it serves as a Ca2+ sensor that activates Orai1, a CRAC (calcium-release-activated calcium) channel in the plasma membrane. CRAC channel is a store-operated calcium (SOC) influx channel that is important in Ca2+ signalling and many other cellular processes. This entry represents the SAM domain of STIM1. SAM domain is a putative protein-protein interaction domain.
