identifier: InterPro:IPR032098
label: "Acyltransferase, C-terminal domain"
definition: >-
  This domain is found at the C terminus of several lysophospholipid acyltransferases, including 1-acyl-sn-glycerol-3-phosphate acyltransferase (also known as lysophosphatidic acid acyltransferase), acyl-CoA:lysophosphatidylglycerol acyltransferase 1, and lysocardiolipin acyltransferase 1, which has both lysophosphatidylinositol and lysophosphatidylglycerol acyltransferase activities.
