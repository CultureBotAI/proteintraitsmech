identifier: InterPro:IPR049176
label: "Conserved oligomeric Golgi complex subunit 5, N-terminal"
definition: >-
  This entry represents the domain found at the N-terminal of Conserved oligomeric Golgi complex subunit 5 (COG5) and includes the LLR motif which is important to interact with COG7. The COG complex, the peripheral membrane oligomeric protein complex involved in intra-Golgi protein trafficking, consists of eight subunits arranged in two lobes bridged by Cog1. Cog5 is in the smaller B lobe, bound in with Cog6-8, and is itself bound to Cog1 as well as, strongly, to Cog7. Disruption of COG5-COG7 interface does not impair lobe B but causes aberrant cell surface glycosylation with major deficits in the trafficking of Golgi glycosyltransferases.
