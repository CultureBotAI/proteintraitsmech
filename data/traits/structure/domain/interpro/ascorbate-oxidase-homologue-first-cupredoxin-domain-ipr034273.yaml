identifier: InterPro:IPR034273
label: Ascorbate oxidase homologue, first cupredoxin domain
definition: >-
  The proteins in this subfamily share homology to ascorbate oxidase and other members of the blue copper oxidase family. Expression of protein NTP303 from Nicotiana tabacum is detected during germination and pollen tube growth. Ascorbate oxidase is a member of the multicopper oxidase (MCO) family that couples oxidation of substrates with reduction of dioxygen to water. MCOs are capable of oxidizing a vast range of substrates, varying from aromatic compounds to inorganic compounds such as metals. Although the members of this family have diverse functions, majority of them have three cupredoxin domain repeats. The copper ions are bound in several sites: Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper centre and transferring them to the active site trinuclear copper centre. The cupredoxin domain 1 of 3-domain MCOs contains part the trinuclear copper binding site, which is located at the interface of domains 1 and 3. This subfamily does not harbour trinuclear copper binding histidines.
