identifier: InterPro:IPR030060
label: "Brain-specific angiogenesis inhibitor 1-associated protein 2-like protein 1, I-BAR domain"
definition: >-
  Brain-specific angiogenesis inhibitor 1-associated protein 2-like protein 1 (Baiap2l1, also known as IRTKS or insulin receptor tyrosine kinase substrate) is an I-BAR (Bin/amphipysin/Rvs) domain containing protein. I-BAR domain is a type of the BAR domain, which forms an anti-parallel all-helical dimer, with a curved (banana-like) shape, that promotes membrane tubulation. The BAR domain containing proteins can be classified into three types: BAR, F-BAR and I-BAR. BAR and F-BAR proteins generate positive membrane curvature, while I-BAR proteins induce negative curvature. Baiap2l1 binds small GTPase Rac rather than Cdc42. It serves as an adaptor of the insulin receptor (IR), modulates IR-IRS1-PI3K-AKT signalling via regulating the phosphorylation of IR. It has been linked to the formation of actin-rich membrane protrusions, called pedestals, during the infection process of enterohemorrhagic Escherichia coli in vertebrates. This entry represents the N-terminal I-BAR domain, also known as IRSp53/MIM homology Domain (IMD), of Baiap2l1. This domain binds and bundles actin filaments, binds membranes, and interacts with the small GTPase Rac.
