identifier: InterPro:IPR009285
label: "Poxvirus A26L-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of A26L from Vaccinia virus, also known as Envelop protein OPG153, and similar sequences from poxvirus. A26L is an envelop protein that mediates acid-dependent endocytosis into host cells. It plays an important role in endocytic entry of the virus by acting as an acid-sensitive membrane fusion suppressor. Low pH in host endosomes triggers conformational changes to allow de-repression of viral fusion complex activity and membrane fusion within vesicles. The first 75 aa of this domain are important for acid-sensing or acid sensitivity and the rest is required for fusion suppression.
