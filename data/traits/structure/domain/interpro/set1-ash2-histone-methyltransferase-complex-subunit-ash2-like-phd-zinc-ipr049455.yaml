identifier: InterPro:IPR049455
label: "Set1/Ash2 histone methyltransferase complex subunit ASH2-like, PHD zinc finger"
definition: >-
  This entry represents the PHD zinc finger domain of human ASH2 and similar animal sequences. This domain does not have histone tail-binding activity. Set1/Ash2 histone methyltransferase complex subunit ASH2 from humans (ASH2L, named after 'Absent, small, homeotic disks-2-like') is a component of the Set1/Ash2 histone methyltransferase (HMT) complex and has an important role in regulating the methylation of histone H3 on lysine 4. It consists of an atypical PHD finger at the N-terminal, represented in this entry, followed by a winged-helix ( ) and a C-terminal SPRY domain ( ).
