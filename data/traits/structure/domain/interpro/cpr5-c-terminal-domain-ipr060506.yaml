identifier: InterPro:IPR060506
label: "CPR5, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of protein CPR5 (constitutive expression of pathogenesis-related genes 5), a negative regulator of plant programmed cell death and effector-triggered immunity. The domain spans approximately 72 residues and follows the transmembrane regions of the protein. While the full-length CPR5 protein regulates programmed cell death and immunity, the specific function of this C-terminal domain remains to be determined. CPR5 is part of the nuclear pore complex (NPC) and plays a role in gating. It is involved in plant growth and immunity. It plays a role in the control of programmed cell death (PCD), acting as a negative regulator of the senescence and chlorotic lesions induced by biotic (e.g., pathogens) and abiotic (e.g., sugars, darkness) agents. CPR5 also promotes cell division and endoduplication through CPR5-CKI (CYCLIN-DEPENDENT KINASE INHIBITOR) signalling pathway.
