identifier: InterPro:IPR025402
label: "DNA mimic protein DMP19, C-terminal"
definition: >-
  This entry represents the C-terminal domain in DMP19 from Neisseria meningitidis (NMB0541) and similar proteins. This domain is also found in other bacterial uncharacterised proteins. DMP19 is a DNA mimic protein able to prevent the transcription factor NHTF from binding to a recognition box, playing a role in gene regulation in the bacterial nitrogen response. It is an acidic protein with an all-α structure. The protein adopts a dimeric configuration, and its surface-charge distribution reveals a dsDNA-like topology.
