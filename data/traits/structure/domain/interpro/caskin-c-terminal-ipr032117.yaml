identifier: InterPro:IPR032117
label: "Caskin, C-terminal"
definition: >-
  This domain is found at the C terminus of Caskin proteins. Caskins are CASK-binding synaptic scaffolding proteins. Part of this domain is predicted to be in coiled-coil conformation. Its function is not known.
