identifier: InterPro:IPR056557
label: "NELF-A, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Negative elongation factor A (NELF-A) and related eukaryotic proteins. This domain adopts a novel helical fold, comprising five α-helices, with significant structural similarity to the HIV integrase-binding domain present in the human PSIP1 protein. The NELF-A N-terminal domain is involved in interaction with the NELF-C subunit, forming a stable heterodimer interface. Two invariant tryptophan residues in this domain insert into hydrophobic pockets on NELF-C, mediating this interaction. NELF-A is a subunit of the Negative Elongation Factor (NELF) complex, which plays a key role in regulating transcription elongation by RNA Polymerase II. The NELF complex induces promoter-proximal pausing of Pol II, a rate-limiting step in transcription regulation that allows integration of additional signals before productive elongation.
