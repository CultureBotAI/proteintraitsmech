identifier: InterPro:IPR034359
label: "MTHFSD, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif found in the methenyltetrahydrofolate synthase domain-containing protein (MTHFSD), a putative RNA-binding protein found in various vertebrate species. It contains an N-terminal 5-formyltetrahydrofolate cyclo-ligase domain and a C-terminal RNA recognition motif (RRM). The biological role of MTHFSD remains unclear.
