identifier: InterPro:IPR046887
label: "Ribosomal RNA small subunit methyltransferase E, PUA-like domain"
definition: >-
  Methyltransferases (Mtases) are responsible for the transfer of methyl groups between two molecules. The transfer of the methyl group from the ubiquitous S-adenosyl-L-methionine (AdoMet) to either nitrogen, oxygen or carbon atoms is frequently employed in diverse organisms. The reaction is catalysed by Mtases and modifies DNA, RNA, proteins or small molecules, such as catechol, for regulatory purposes. Proteins in this entry belong to the RsmE family of Mtases, this is supported by crystal structural studies, which show a close structural homology to other known methyltransferases. This group of proteins includes Ribosomal RNA small subunit methyltransferase E (RsmE) from Escherichia coli, which specifically methylates the uridine in position 1498 of 16S rRNA in the fully assembled 30S ribosomal subunit. This enzyme has two distinct but structurally related domains: the N-terminal PUA domain and the conserved MTase domain at the C-terminal end. This protein adopts a dimeric configuration that is functionally critical for substrate binding and catalysis. This entry represents the N-terminal PUA (pseudouridine synthases and archaeosine-specific transglycosylases)-like RNA recognition and binding domain found in RsmE. This domain is mainly responsible for recognition of one substrate molecule (the ribosomal RNA fragment and ribosomal protein complex).
