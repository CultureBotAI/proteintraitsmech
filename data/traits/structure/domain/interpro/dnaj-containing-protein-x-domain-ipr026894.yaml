identifier: InterPro:IPR026894
label: "DNAJ-containing protein, X-domain"
definition: >-
  In certain plant and yeast proteins, the DnaJ-1 proteins have a three-domain structure. The x-domain lies between the N-terminal DnaJ and the C-terminal Z domains. This domain found in Plasmodium falciparum RESA (ring-infected erythrocyte surface antigen) has been shown to bind to spectrin and stablize the tetramer.
