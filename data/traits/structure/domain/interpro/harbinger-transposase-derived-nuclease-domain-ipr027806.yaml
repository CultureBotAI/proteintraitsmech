identifier: InterPro:IPR027806
label: "Harbinger transposase-derived nuclease domain"
definition: >-
  This domain is found in proteins that are related to and are probably endonucleases of the DDE superfamily. Proteins containing this domain include the putative nuclease HARBI1. HARBI1 is a transposase-derived protein that may have nuclease activity potential. It does not have transposase activity.
