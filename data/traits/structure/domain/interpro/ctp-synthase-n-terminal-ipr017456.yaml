identifier: InterPro:IPR017456
label: "CTP synthase, N-terminal"
definition: >-
  CTP synthase is involved in pyrimidine ribonucleotide/ribonucleoside metabolism, catalysing the synthesis of CTP from UTP by amination of the pyrimidine ring at the 4-position. The enzyme exists as a dimer which consists of an N-terminal synthetase domain and C-terminal glutaminase domain that aggregates as a tetramer. This gene has been found roughly 500 bp upstream of enolase in both beta (Nitrosomonas europaea) and gamma (Escherichia coli) subdivisions of Proteobacterium. This entry represents the N-terminal synthetase domain of CTP synthase.
