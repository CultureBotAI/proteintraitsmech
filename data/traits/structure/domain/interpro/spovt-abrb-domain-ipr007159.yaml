identifier: InterPro:IPR007159
label: "SpoVT-AbrB domain"
definition: >-
  The SpoVT-AbrB domain is a DNA-binding domain found in a large protein superfamily, which includes: Bacterial antibiotic resistance protein B (AbrB), a transition-state regulator. Bacterial SpoVT, a late sporulation factor that modulates forespore-specific sigma G-dependent transcription. Bacterial PrlF, an antitoxin component of a toxin-antitoxin (TA) module. Bacterial transcription factors (antitoxins) of plasmid maintenance systems (VapB, MvpT, VppA ,VagC, PemI, MazE, ChpS). Bacterial transcriptional regulator MraZ, involved in the expression of the division and cell wall (dcw) cluster. It contains two copies of the SpoVT-AbrB domain. Bacterial endoribonuclease SymE. Sulfolobus solfataricus repressor-like proteins SSo7c3 and SSo7c4. ORF4 from Saline Natrinema sp. J7-1 virus 1 ( ), which is responsible for Lysis-Lysogeny Switch and mediates superinfection immunity by repression of genomic DNA replication of the superinfecting viruses. The SpoVT-AbrB domain contains four β strands and one α helix and can be described as a pair of β hairpins linked by the α helix.
