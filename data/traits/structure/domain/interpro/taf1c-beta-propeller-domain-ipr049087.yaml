identifier: InterPro:IPR049087
label: "TAF1C, beta-propeller domain"
definition: >-
  This is the β-propeller domain of TAF1C from mammals, the orthologue of yeast Rrn6. TAF1C is a component of the transcription factor SL1/TIF-IB complex which is involved in the assembly of the PIC (preinitiation complex) during RNA polymerase I-dependent transcription.
