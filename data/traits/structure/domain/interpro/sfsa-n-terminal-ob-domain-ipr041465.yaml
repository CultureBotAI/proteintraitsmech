label: "SfsA, N-terminal OB domain"
definition: >-
  This entry represents the N-terminal OB fold found in sugar fermentation stimulation protein (SfsA), which is probably a regulatory factor involved in maltose metabolism. SfsA has been shown to bind DNA.
