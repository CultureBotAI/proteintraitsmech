identifier: InterPro:IPR041286
label: "MBG domain, YGX type"
definition: >-
  This domain is found in a variety of bacterial extracellular proteins. This domain is related to the MBG domain ( ), but it replaces the characteristic YDG motif close the N terminus with a YGX motif.
