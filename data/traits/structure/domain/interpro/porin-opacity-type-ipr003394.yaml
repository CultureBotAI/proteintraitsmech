identifier: InterPro:IPR003394
label: Porin, opacity type
definition: >-
  Pathogenic Neisseria spp. possess a repertoire of phase-variable opacity proteins that mediate various pathogen/host cell interactions. These proteins are integral membrane proteins related to other porins and the Haemophilus influenzae OpA protein.
