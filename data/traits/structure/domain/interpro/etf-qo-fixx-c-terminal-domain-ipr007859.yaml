identifier: InterPro:IPR007859
label: ETF-QO/FixX, C-terminal domain
definition: >-
  This domain is found at the C-terminal of Electron-transfer flavoprotein-ubiquinone oxidoreductase (ETF-QO), which accepts electrons from a electron-transfer flavoprotein that is located in the mitochondrial matrix and reduces ubiquinone in the mitochondrial membrane. The two redox centres in the protein, FAD and a [4Fe4S] cluster, are present in a 64kDa monomer. This entry also includes some ferredoxin-like proteins, such as FixX from bacteria.
