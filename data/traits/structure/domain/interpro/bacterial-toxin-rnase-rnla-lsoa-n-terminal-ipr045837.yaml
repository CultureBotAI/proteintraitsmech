identifier: InterPro:IPR045837
label: "Bacterial toxin, RNase RnlA/LsoA, N-terminal"
definition: >-
  Toxin/antitoxin (TA) systems are highly conserved among bacteria and archaea. They play a role in plasmid maintenance, biofilm formation, persister cell formation, general stress response, and phage defense and consist of a stable toxin and an unstable antitoxin. Toxins RnlA (RNase LS) and LsoA are type II TA systems that play a role in phage defence. RnlA and LsoA have endoribonuclease activity, activated after bacteriophage T4 infection. RnlA is the stable toxin that causes inhibition of cell growth and rapidly degrades T4 late mRNAs to prevent their expression, and this is neutralised by the activity of the unstable antitoxin RnlB. The crystal structure of RnlA revealed that it consist of an N-terminal domain (NTD), an N-Repeated Domain (NRD) and a Dmd-Binding Domain (DBD), being this structure unique and different from all known toxin structures. This entry represents the N-terminal domain composed of four-stranded twisted antiparallel β-sheet and two α-helices.
