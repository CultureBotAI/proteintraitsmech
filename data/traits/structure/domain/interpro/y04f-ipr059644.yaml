identifier: InterPro:IPR059644
label: Y04F
definition: >-
  This entry represents a small protein family from bacteriophage that includes the uncharacterized 7.0 kDa protein in Gp55-nrdG intergenic region y04F. The predicted structure of this domain shows similarity to the Tudor domain. Structure prediction suggests this protein may form homodimers.
