identifier: InterPro:IPR012856
label: "D-aminopeptidase, domain B"
definition: >-
  D-aminopeptidase ( ) is a dimeric enzyme with each monomer being composed of three domains. Domain B is organised to form a β barrel made up of eight antiparallel β strands. It is connected to domain A, the catalytic domain, by an eight-residue sequence, and also interacts with both domains A and C via non-covalent bonds. Domain B probably functions in maintaining domain C in a good position to interact with the catalytic domain.
