identifier: InterPro:IPR004026
label: "Ada DNA repair, metal-binding"
definition: >-
  The Escherichia coli Ada protein repairs O6-methylguanine residues and methyl phosphotriesters in DNA by direct transfer of the methyl group to a cysteine residue. This domain contains four conserved cysteines that form a zinc binding site. One of these cysteines is a methyl group acceptor. The methylated domain can then specifically bind to the ada box on a DNA duplex. The zinc binding site is located in the N-terminal region and consists of four β strands.
