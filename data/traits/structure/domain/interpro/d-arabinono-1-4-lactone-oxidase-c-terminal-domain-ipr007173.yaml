identifier: InterPro:IPR007173
label: "D-arabinono-1,4-lactone oxidase, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of the fungal protein D-arabinono-1,4-lactone oxidase , which is involved in the final step of the biosynthesis pathway of D-erythroascorbic acid, an important antioxidant and one of the virulence factors. L-gulonolactone oxidase transforms L-gulono-1,4-lactone to L-xylo-hexulonolactone, which spontaneously isomerizes to L-ascorbate. This enzyme can be found in a range of organisms from chordates and plants to Mycobacteria. Alditol oxidase from Streptomyces coelicolor also belong to this family. It performs selective oxidation of the terminal primary hydroxyl group of several alditols.
