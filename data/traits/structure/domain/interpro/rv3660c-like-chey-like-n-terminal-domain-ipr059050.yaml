identifier: InterPro:IPR059050
label: "Rv3660c-like, CheY-like N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of the uncharacterised protein Rv3660c. This domain is predicted to adopt a CheY-like response regulator fold. Rv3660c from Mycobacterium tuberculosis (Septum site determining protein, Ssd) plays a role in septum formation. Members of this protein family belong to the MinD/ParA family of P-loop NTPases, and in particular show homology to the CpaE family of pilus assembly proteins.
