identifier: InterPro:IPR024535
label: "Rhamnogalacturonase A/B/Epimerase-like, pectate lyase domain"
definition: >-
  This domain posses a β-helical structure like pectate lyase, found in a varied group of proteins including D-mannuronate C5-epimerases and glycosyl hydrolases from GH family 28. This domain is also found in Non-secreted LysM effector LysM15 and LysM19 from Penicillium expansum, which might be involved in manipulation of host defenses for successful infection.
