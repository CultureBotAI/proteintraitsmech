identifier: InterPro:IPR021821
label: "Histidine kinase VxrA, sensor domain"
definition: >-
  This entry represents bacterial periplasmic sensor domains of histidine kinase VxrA and related proteins. VxrA is a component in two-component systems (TCSs) that sense fluctuating environmental conditions and elicit the appropriate cellular response. VxrA has a periplasmic sensor domain that is flanked by transmembrane helices and followed by a DHp (dimerization and histidine phosphotransfer) domain and a CA (catalytic ATP-binding) domain. The sensor domain has a complex α/β fold with unique topology.
