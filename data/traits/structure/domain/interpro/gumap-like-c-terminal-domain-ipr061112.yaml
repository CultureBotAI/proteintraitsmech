identifier: InterPro:IPR061112
label: "GUMAP-like, C-terminal domain"
definition: >-
  GUMAP (Giant Ureaplasma Membrane-Anchored Protein) is a very large protein found in several species of the genus Ureaplasma, a lineage that resembles Gram-positive bacteria by ancestry but that lacks a peptidoglycan cell wall. GUMAP proteins average about 5000 amino acids in length. Near the C-terminal, these proteins have a strongly hydrophobic segment followed immediately by a cluster of basic residues, as is characteristic of proteins with a C-terminal membrane anchor. This entry represents about 750 amino acids of the C-terminal region of GUMAP proteins.
