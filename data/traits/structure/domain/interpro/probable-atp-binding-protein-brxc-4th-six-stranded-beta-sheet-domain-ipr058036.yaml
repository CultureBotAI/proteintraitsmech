identifier: InterPro:IPR058036
label: "Probable ATP-binding protein BrxC, 4th six-stranded beta-sheet domain"
definition: >-
  This entry represents the 4th domain of the BrxC protein from the BREX (bacteriophage exclusion) system. This α/β domain contains a distinctive six-stranded β-sheet with α-helices. It is predicted to be the 4th of 8 domains in the full-length BrxC protein. BrxC is a P-loop-containing, probable ATPase associated with type 1 BREX (bacteriophage exclusion) systems, which provide immunity against bacteriophage infections by methylating specific DNA sites to distinguish self from non-self. Although phage adsorption is permitted, BREX systems block phage DNA replication. BrxC, a probable ATP-binding protein, operates within a six-protein complex (BrxA-BrxB-BrxC-PglX-PglZ-BrxL) that confers resistance to a range of bacteriophages.
