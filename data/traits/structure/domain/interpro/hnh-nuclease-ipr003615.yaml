identifier: InterPro:IPR003615
label: "HNH nuclease"
definition: >-
  This domain is found in HNH family of nucleases that includes yeast intron 1 protein, human DNA annealing helicase and endonuclease ZRANB3, bacterial CRISPR-associated endonuclease Cas9, colicins, pyocins and endonuclease HphI. Members in this group are found in all domains of life.
