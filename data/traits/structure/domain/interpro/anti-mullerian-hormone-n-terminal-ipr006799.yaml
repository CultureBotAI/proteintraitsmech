identifier: InterPro:IPR006799
label: Anti-Mullerian hormone, N-terminal
definition: >-
  Anti-Mullerian hormone, AMH is a signalling molecule involved in male and female sexual differentiation. Defects in synthesis or action of AMH cause persistent Mullerian duct syndrome (PMDS), a rare form of male pseudohermaphroditism. This family represents the N-terminal part of the protein, which is not thought to be essential for activity. AMH contains a TGF-beta domain ( ), at the C terminus.
