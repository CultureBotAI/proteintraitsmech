identifier: InterPro:IPR002761
label: "Diphthamide synthase domain"
definition: >-
  Diphthamide_syn, diphthamide synthase, catalyses the last amidation step of diphthamide biosynthesis using ammonium and ATP. Diphthamide synthase is evolutionarily conserved in eukaryotes. Diphthamide is a post-translationally modified histidine residue found on archaeal and eukaryotic translation elongation factor 2 (eEF-2). This domain has a strongly conserved motif SXGXDS at the N terminus.
