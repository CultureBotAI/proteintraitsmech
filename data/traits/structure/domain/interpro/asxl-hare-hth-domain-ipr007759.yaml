label: "ASXL, HARE-HTH domain"
definition: >-
  This domain, known as the HARE-HTH domain, adopts the winged helix-turn-helix fold and is predicted to bind DNA. It can be found at the N terminus of the ASXL protein. It can also be found in several other eukaryotic chromatin proteins (such as HB1 in plants), diverse restriction endonucleases and DNA glycosylases, the RNA polymerase delta subunit of Gram-positive bacteria and certain bacterial proteins that combine features of the RNA polymerase alpha-subunit and sigma factors. The genetic interaction of the HARE-HTH containing ASXL with the methyl cytosine hydroxylating Tet2 protein is suggestive of a role for the domain in discriminating sequences with DNA modifications such as hmC. Bacterial versions include fusions to diverse restriction endonucleases, and a DNA glycosylase where it may play a similar role in detecting modified DNA. Certain bacterial version of the HARE-HTH domain show fusions to the helix-hairpin-helix domain of the RNA polymerase alpha subunit and the HTH domains found in regions 3 and 4 of the sigma factors. These versions are predicted to function as a novel inhibitor of the binding of RNA polymerase to transcription start sites, similar to the Bacillus delta protein. This domain consists of four α-helices (helices I-II-III-IV) and an antiparallel β-sheet composed of three short β-strands at the top of a "twisted tripod" formed by helices II, III, and IV. The Asx-like (Asxl) proteins includes Asxl1-3. They are putative Polycomb group (PcG) proteins, which act by forming multiprotein complexes that are required to maintain the transcriptionally repressive state of homeotic genes throughout development. Asxl1 is involved in transcriptional regulation mediated by ligand-bound retinoic acid receptors (RARs) and peroxisome proliferator-activated re…
