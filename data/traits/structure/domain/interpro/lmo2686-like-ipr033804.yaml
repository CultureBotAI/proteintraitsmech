label: Lmo2686-like
definition: >-
  This domain is conserved in bacilli proteins that form an unusual hexameric arrangement via circular domain-swapping of a β-hairpin-beta unit. The Lmo2686 protein is found in Listeria monocytogenes and the structure has been solved ( ).
