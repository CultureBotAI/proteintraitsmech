identifier: InterPro:IPR048585
label: "C-X-C motif chemokine 16 domain"
definition: >-
  This entry represents the CXC chemokine-like domain found near the N-terminal of the CXCL16 protein, which acts as a scavenger receptor on macrophages and specifically binds to OxLDL (oxidized low density lipoprotein).
