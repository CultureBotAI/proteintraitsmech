identifier: InterPro:IPR032686
label: "2-oxoacid:ferredoxin oxidoreductase subunit beta, C-terminal"
definition: >-
  This domain is found at the C-terminal in 2-oxoacid:ferredoxin oxidoreductase subunit beta from bacteria and archaea. It is approximately 70 amino acids in length. The domain is found in association with . There are two completely conserved residues (A and G) that may be functionally important. Pyruvate ferredoxin oxidoreductase (PFO) is involved in carbon dioxide fixation via a reductive TCA cycle. It forms a heterodimer (alpha/beta). The beta subunit has binding motifs for Fe-S clusters and thiamine pyrophosphate.
