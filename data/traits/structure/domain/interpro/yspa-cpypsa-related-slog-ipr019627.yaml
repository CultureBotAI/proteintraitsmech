identifier: InterPro:IPR019627
label: "YspA, cpYpsA-related SLOG"
definition: >-
  These proteins are related to the SLOG superfamily and show associations with NAD utilisation and ADP-ribosylation domains including NUDIX, NADAR and MACRO. They are predicted to function as sensors of nucleotides, nucleotide-derived ligands, or nucleic acids, which are potentially processed/modified by associating effectors. Also associates in a distinct system with a phosphoribosyltransferase (PRTase) domain.
