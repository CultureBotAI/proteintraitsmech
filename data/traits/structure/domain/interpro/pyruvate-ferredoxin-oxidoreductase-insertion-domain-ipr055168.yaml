identifier: InterPro:IPR055168
label: "Pyruvate-ferredoxin oxidoreductase, insertion domain"
definition: >-
  This entry represents the insertion domain of Pyruvate-flavodoxin oxidoreductase from Desulfocurvibacter africanus (Por) and similar bacterial sequences. Por catalyses the ferredoxin-dependent oxidative decarboxylation of pyruvate required for the transfer of electrons from pyruvate to ferredoxin. This domain adopts a four helical bundle fold.
