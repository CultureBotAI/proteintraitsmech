identifier: InterPro:IPR048777
label: "Ciliogenesis-associated TTC17-interacting protein, N-terminal domain"
definition: >-
  This is the N-terminal domain of Ciliogenesis-associated TTC17-interacting protein from humans (CATIP) and similar animal sequences. CATIP plays a role in primary ciliogenesis by modulating actin polymerisation. According to structure predictions, this domain folds into a structure mainly consisting of β-sheets.
