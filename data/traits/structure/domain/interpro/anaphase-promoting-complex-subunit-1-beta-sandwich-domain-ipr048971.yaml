identifier: InterPro:IPR048971
label: "Anaphase-promoting complex subunit 1, beta-sandwich domain"
definition: >-
  This domain is found close to the C-terminal of the Apc1 (anaphase-promoting complex subunit 1) protein which is a component of the anaphase promoting complex/cyclosome (APC/C), a cell cycle-regulated E3 ubiquitin ligase that controls progression through mitosis and the G1 phase of the cell cycle.
