identifier: InterPro:IPR063054
label: "Apicomplexa microprotein 11-like"
definition: >-
  This entry includes the uncharacterised protein from Babesia bovis, a microprotein that may contribute to immune evasion or play a role in variant erythrocyte surface antigen protein biology. This entry is also found at the C-terminal of uncharacterised sequences and is predicted to be disordered.
