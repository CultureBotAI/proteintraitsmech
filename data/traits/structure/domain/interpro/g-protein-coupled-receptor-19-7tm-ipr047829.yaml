identifier: InterPro:IPR047829
label: "G protein-coupled receptor 19, 7TM"
definition: >-
  This entry represents the seven transmembrane segments of G-protein coupled receptor 19 (GPR19). GPR19 is an orphan receptor expressed predominantly in neuronal cells during mouse embryogenesis. Its mRNA is found frequently over-expressed in patients with small cell lung cancer. GPR19 is a member of the class A family of GPCRs, which represents a widespread protein family that includes the light-sensitive rhodopsin as well as receptors for biogenic amines, lipids, nucleotides, odorants, peptide hormones, and a variety of other ligands. A general feature of GPCR signalling is agonist-induced conformational changes in the receptors, leading to activation of the heterotrimeric G proteins, which consist of the guanine nucleotide-binding G-alpha subunit and the dimeric G-beta-gamma subunits. The activated G proteins then bind to and activate numerous downstream effector proteins, which generate second messengers that mediate a broad range of cellular and physiological processes.
