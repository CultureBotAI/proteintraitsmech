identifier: InterPro:IPR002192
label: Pyruvate phosphate dikinase, AMP/ATP-binding
definition: >-
  This enzyme catalyses the reversible conversion of ATP to AMP, pyrophosphate and phosphoenolpyruvate (PEP). This domain is present at the N terminus of some PEP-utilizing enzymes, and has been shown to be the AMP/ATP-binding domain. This domain is also found in Rifampicin phosphotransferase that catalyses the phosphorylation of rifampicin, also known as rifampin, leading to its inactivation.
