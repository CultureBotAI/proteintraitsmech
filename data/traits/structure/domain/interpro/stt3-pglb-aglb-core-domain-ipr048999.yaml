identifier: InterPro:IPR048999
label: "STT3/PglB/AglB, core domain"
definition: >-
  This entry represents the C-terminal core domain found in the oligosaccharyl transferase STT3 subunit and related proteins, such as bacterial PglB and archaeal AlgB. STT3 is part of the oligosccharyltransferase (OTase) complex and required for its activity, which transfers a lipid-linked core-oligosaccharide to selected asparagine residues in the ER. In the archaea, STT3 occurs alone, rather than in an OTase complex, and is required for N-glycosylation of asparagines. This is a globular domain adopts a mixed α/β fold and contains the highly conserved WWDYG motif, in which the aspartate residue is thought to function as a catalytic residue.
