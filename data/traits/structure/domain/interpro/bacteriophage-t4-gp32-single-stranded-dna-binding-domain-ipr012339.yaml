identifier: InterPro:IPR012339
label: "Bacteriophage T4, Gp32, single-stranded DNA-binding domain"
definition: >-
  This entry represents the Bacteriophage T4, Gp32, single-stranded DNA-binding domain. The characteristics of the protein distribution suggest prophage matches in addition to the phage matches. Single-stranded DNA-binding protein (also known as Gp32 or SSB) is essential for bacteriophage T4 DNA replication, recombination and repair, acting to stimulate replisome processing and accuracy through its binding to ssDNA as the replication fork advances. The crystal structure of Gp32 shows an ssDNA binding cleft comprised of regions from three structural subdomains, through which ssDNA can slide freely. The structure of Gp32 is similar to other phage ssDNA-binding proteins such as Gp2.5 from bacteriophage T4, and gene V protein, both of which have a nucleic acid-binding OB-type fold. However, Gp32 contains a zinc-finger subdomain at residues 63-111 that is not found in the other two phage proteins. This protein stimulates the activities of viral DNA polymerase and DnaB-like SF4 replicative helicase, probably via its interaction with the helicase assembly factor, and together with DnaB-like SF4 replicative helicase and the helicase assembly factor, promotes pairing of two homologous DNA molecules containing complementary single-stranded regions and mediates homologous DNA strand exchange.
