identifier: InterPro:IPR013401
label: "Type III secretion regulator, YopN/LcrE/InvE/MxiC"
definition: >-
  This protein is found in type III secretion operons and, in Yersinia, is localized to the cell surface and is involved in the Low-Calcium Response (LCR), possibly by sensing the calcium concentration. In Salmonella, the gene is known as InvE and is believed to perform an essential role in the secretion process and interacts with the proteins SipBCD and SicA. Negative regulation of type III secretion in Yersinia pestis is mediated in part by a multiprotein complex that has been proposed to act as a physical impediment to type III secretion by blocking the entrance to the secretion apparatus prior to contact with mammalian cells. This complex is composed of YopN, its heterodimeric secretion chaperone SycN-YscB, and TyeA.
