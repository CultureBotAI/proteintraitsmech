identifier: InterPro:IPR042735
label: "FCHO1, F-BAR domain"
definition: >-
  F-BAR domain only protein 1 (FCHo1) belongs to the F-BAR family, whose members have been implicated in cell membrane processes such as membrane invagination, tubulation and endocytosis. FCHo1 functions in an early step of clathrin-mediated endocytosis. It has a membrane binding/bending activity and the ability to recruit proteins essential to the formation of functional clathrin-coated pits. It contains an N-terminal F-BAR domain and a C-terminal domain of unknown function named SAFF which is also present in FCHo2 and endophilin interacting protein 1.
