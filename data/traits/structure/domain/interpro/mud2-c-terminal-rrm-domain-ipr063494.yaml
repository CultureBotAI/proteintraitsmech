identifier: InterPro:IPR063494
label: "MUD2, C-terminal RRM domain"
definition: >-
  This entry represents the C-terminal RNA recognition motif (RRM) domain found in MUD2 splicing factors and related proteins. MUD2 is a splicing factor that contacts pre-mRNA directly and is a component of the pre-mRNA-U1 snRNP complex during early spliceosome assembly. The protein interacts with MSL5 and PRP40 to form the commitment complex 2, a precursor of mature spliceosomes. This family is mainly found in fungi.
