identifier: InterPro:IPR045943
label: "Domain of unknown function DUF6363"
definition: >-
  This presumed domain is functionally uncharacterised. This domain is found at the C-terminal of patatin-like proteins from bacteria. There is a conserved tyrosine residue and a conserved FxxxPP sequence motif.
