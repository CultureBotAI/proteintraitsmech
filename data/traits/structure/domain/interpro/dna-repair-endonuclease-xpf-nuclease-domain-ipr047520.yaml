identifier: InterPro:IPR047520
label: "DNA repair endonuclease XPF, nuclease domain"
definition: >-
  This entry represents the nuclease domain of XPF and similar proteins found in eukaryotes. This domain has the GDX(n)ERKX(3)D motif, which is required for metal-dependent endonuclease activity but not for DNA junction binding. This entry includes XPF from animals and its fungal orthologues Rad1 from budding yeasts and Rad16 from fission yeasts. Human XPF is a catalytic component of a structure-specific DNA repair endonuclease responsible for the 5-prime incision during DNA repair. It is involved in homologous recombination that assists in removing interstrand cross-link. This protein is associated with several types of the Xeroderma pigmentosum disorder, XFE progeroid syndrome and a form of Fanconi anemia. Budding yeast Rad1 and Rad10 form an endonuclease that specifically degrades single-stranded DNA. The plant homologue DNA repair endonuclease UVH1 from Arabidopsis thaliana, alternatively known as RAD1, is also included in this entry.
