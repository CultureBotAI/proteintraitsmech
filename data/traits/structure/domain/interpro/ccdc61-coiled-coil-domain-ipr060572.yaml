identifier: InterPro:IPR060572
label: "CCDC61, coiled-coil domain"
definition: >-
  This entry represents the coiled-coil domain of CCDC61 (coiled-coil domain-containing protein 61) found predominantly in animals. CCDC6 functions in centriole cohesion, microtubule anchoring at centrosome subdistal appendages, and spindle assembly during mitosis. This domain is located downstream of the N-terminal head domain and is involved in microtubule-binding.
