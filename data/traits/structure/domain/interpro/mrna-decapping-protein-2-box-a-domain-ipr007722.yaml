identifier: InterPro:IPR007722
label: "mRNA decapping protein 2, Box A domain"
definition: >-
  This presumed domain is always found to the N-terminal side of the NUDIX hydrolase domain . This domain appears to be specific to mRNA decapping protein 2 (DCP2) and its close homologues. This region has been termed Box A.
