identifier: InterPro:IPR009810
label: "Late nodulin domain"
definition: >-
  This entry represents a domain found in a group of plant proteins, including late nodulin sequences which are homologous to the Pisum sativum (Garden pea) ENOD3 protein. ENOD3 is expressed in the late stages of root nodule formation and contains two pairs of cysteine residues toward the proteins C terminus which may be involved in metal-binding.
