identifier: InterPro:IPR042825
label: "PLK2, catalytic domain"
definition: >-
  PLK2, also called Snk (serum-inducible kinase), functions in G1 progression, S-phase arrest, and centriole duplication. Its gene is responsive to both growth factors and cellular stress, is a transcriptional target of p53, and activates a G2-M checkpoint. STKs (serine/threonine-protein kinases) catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PLKs (polo-like kinases) play important roles in cell cycle progression and in DNA damage responses. They regulate mitotic entry, mitotic exit, and cytokinesis. In general PLKs contain an N-terminal catalytic kinase domain and a C-terminal regulatory polo box domain (PBD), which is comprised by two bipartite polo-box motifs (or polo boxes) and is involved in protein interactions. There are five mammalian PLKs (PLK1-5) from distinct genes.
