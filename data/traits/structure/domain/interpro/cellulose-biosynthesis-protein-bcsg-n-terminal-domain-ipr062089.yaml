identifier: InterPro:IPR062089
label: "Cellulose biosynthesis protein BcsG, N-terminal domain"
definition: >-
  This is the N-terminal domain of Cellulose biosynthesis protein BcsG. This domain plays a role in the assembly of the mature bacterial cellulose synthase. Cellulose biosynthesis protein BcsG, also known as YhjU, is a component of bacterial cellulose synthase complex that plays a role in biofilm formation in bacteria. It is a Zn-dependent phosphoethanolamine transferase that catalyses transfer of phosphoethanolamine residues from membrane phosphatidylethanolamine to the glucosyl residues in the nascent cellulose chain.
