identifier: InterPro:IPR001034
label: "DeoR-type HTH domain"
definition: >-
  The deoR-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain ofvabout 50-60 amino acids present in transcription regulators of the deoR family, involved in sugar catabolism. This family of prokaryotic regulators is named after the Escherichia coli protein DeoR, a repressor of the deo operon, which encodes nucleotide and deoxyribonucleotide catabolic enzymes. DeoR also negatively regulates the expression of nupG and tsx, a nucleoside-specific transport protein and a channel-forming protein, respectively. DeoR-like transcription repressors occur in diverse bacteria as regulators of sugar and nucleoside metabolic systems. The effector molecules for deoR-like regulators are generally phosphorylated intermediates of the relevant metabolic pathway. The DNA-binding deoR-type HTH domain occurs usually in the N-terminal part. The C-terminal part can contain an effector-binding domain and/or an oligomerisation domain. DeoR occurs as an octamer, whilst glpR and agaR are tetramers. Several operators may be bound simultaneously, which could facilitate DNA looping. It is worth noting that the DeoR in this entry is represented by the protein, UniProt , from E. coli. Not the DeoR, UniProt , from Bacillus subtilis. Despite sharing the same name, these two proteins do not share protein sequence similarity.
