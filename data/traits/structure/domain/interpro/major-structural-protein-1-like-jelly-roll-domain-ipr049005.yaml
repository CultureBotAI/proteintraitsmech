label: "Major structural protein 1-like, jelly-roll domain"
definition: >-
  This entry represents a β-barrel domain found towards the N-terminal of receptor binding protein (RBP) from Lactococcus phages. This domain forms the head domain, involved in carbohydrate recognition.
