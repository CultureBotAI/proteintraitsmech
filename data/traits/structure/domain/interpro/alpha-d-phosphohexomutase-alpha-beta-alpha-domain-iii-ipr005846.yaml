identifier: InterPro:IPR005846
label: "Alpha-D-phosphohexomutase, alpha/beta/alpha domain III"
definition: >-
  This entry represents domain III found in alpha-D-phosphohexomutase enzymes. This domain has a 3-layer α/β/α topology. The alpha-D-phosphohexomutase superfamily is composed of four related enzymes, each of which catalyses a phosphoryl transfer on their sugar substrates: phosphoglucomutase (PGM), phosphoglucomutase/phosphomannomutase (PGM/PMM), phosphoglucosamine mutase (PNGM), and phosphoacetylglucosamine mutase (PAGM). PGM ( ) converts D-glucose 1-phosphate into D-glucose 6-phosphate, and participates in both the breakdown and synthesis of glucose. PGM/PMM ( ; ) are primarily bacterial enzymes that use either glucose or mannose as substrate, participating in the biosynthesis of a variety of carbohydrates such as lipopolysaccharides and alginate. Both PNGM ( ) and PAGM ( ) are involved in the biosynthesis of UDP-N-acetylglucosamine.
