identifier: InterPro:IPR062728
label: "YLR049C, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein YLR049C, found in Saccharomycetaceae. YLR049C is a phosphoprotein of unknown function. This domain may adopt a globular all-helical fold whose function is unknown.
