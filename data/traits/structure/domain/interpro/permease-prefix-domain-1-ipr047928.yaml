identifier: InterPro:IPR047928
label: "Permease prefix domain 1"
definition: >-
  The permease prefix domain 1 is found as the N-terminal domain of bacterial putative permeases resembling ABC transporter permeases, and also of bacterial hypothetical proteins of unknown function, including YwdD from Bacillus subtilis. In some permease families, this prefix domain is variably present, and may be replaced by a different, seemingly unrelated prefix domain.
