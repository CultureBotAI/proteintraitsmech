identifier: InterPro:IPR060697
label: "Epigen, C-terminal transmembrane region"
definition: >-
  This entry represents the C-terminal transmembrane region of epigen, a growth factor protein that promotes the growth of epithelial cells. The specific function of this C-terminal domain remains to be determined. Epigen is a member of the epidermal growth factor superfamily and functions as a ligand for ErbB receptors. The protein contains an N-terminal signal peptide, an EGF-like domain , and a C-terminal region that includes a transmembrane domain and cytoplasmic tail. Epigen binds to the epidermal growth factor receptor (EGFR) and stimulates the phosphorylation of EGFR and mitogen-activated protein kinases. The protein is found in vertebrates, including humans, mice and chickens.
