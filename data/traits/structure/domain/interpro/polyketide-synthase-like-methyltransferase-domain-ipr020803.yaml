identifier: InterPro:IPR020803
label: "Polyketide synthase-like, methyltransferase domain"
definition: >-
  Methyl transfer from the ubiquitous donor S-adenosyl-L-methionine (SAM) to either nitrogen, oxygen or carbon atoms is frequently employed in diverse organisms ranging from bacteria to plants and mammals. The reaction is catalyzed by methyltransferases (Mtases) and modifies DNA, RNA, proteins and small molecules, such as catechol for regulatory purposes. The various aspects of the role of DNA methylation in prokaryotic restriction-modification systems and in a number of cellular processes in eukaryotes including gene regulation and differentiation is well documented. This entry represents a methyltransferase domain found in polyketide synthases such as Polyketide synthase ThaQ from Burkholderia thailandensis and is found covering the whole length of the protein in some methyltransferases involved in the biosynthesis of antiobiotics and antifungal agents.
