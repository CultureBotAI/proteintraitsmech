identifier: InterPro:IPR041342
label: "Carbohydrate binding module family 35"
definition: >-
  This entry represents carbohydrate-binding module family 35 . This domain is found in several prokaryotic proteins, including Cthe_3141 from Acetivibrio thermocellus 9 ( ). It has specificity for delta4,5-anhydrogalacturonic acid (d4,5-GalA), a signature molecule for plant cell wall degradation. Its crystal structure shows a jelly roll/β-sandwich fold with 2 antiparallel sheets made of 4 and 5 antiparallel β-strands. It is also found at the end of a family of putative glycosyl hydrolases.
