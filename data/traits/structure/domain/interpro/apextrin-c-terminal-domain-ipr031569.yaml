identifier: InterPro:IPR031569
label: "Apextrin, C-terminal domain"
definition: >-
  The apextrin C-terminal domain (ApeC) was first identified from two apextrin-like proteins (ALP) of the amphioxus Branchiostoma japonicum. Amphioxus ALP1 and ALP2 are important anti-bacterial effectors. The apeC domain of the ALP1/2 mediates the bacterial recognition by binding to bacterial muramyl dipeptide (MDP). Further analysis shows that the apeC domain is present in various proteins from cnidarians, molluscs, arthropods, hemichordates, echinoderms and amphioxus. The apeC domain is also found to form different domain combinations with other domains.
