identifier: InterPro:IPR062575
label: "MAL13P1.147, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in MAL13P1.147 and other uncharacterised proteins found in Plasmodium species. These proteins contain coiled-coil regions and disordered segments with biased amino acid compositions.
