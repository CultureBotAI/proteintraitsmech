identifier: InterPro:IPR057339
label: "Target of rapamycin complex 2 subunit MAPKAP1-like, Ras-binding domain"
definition: >-
  This entry represents the Ras-binding domain (RBD) found in human Target of rapamycin complex 2 subunit MAPKAP1 (SIN1) and similar proteins mainly found in vertebrates and nematodes. SIN1 is an essential component of mTOR complex 2 (mTORC2), which helps regulate cell survival and proliferation through phosphorylation of AGC kinase family members and transduces signals from growth factors to pathways involved in proliferation, cytoskeletal organization, lipogenesis and anabolic output. The domain adopts a ubiquitin-like fold and is found between the CRIM and PH domains.
