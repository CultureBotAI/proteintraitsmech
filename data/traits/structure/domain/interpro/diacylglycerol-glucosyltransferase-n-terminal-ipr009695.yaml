identifier: InterPro:IPR009695
label: "Diacylglycerol glucosyltransferase, N-terminal"
definition: >-
  This entry represents a conserved region of approximately 180 residues found towards the N terminus of a number of glycosyltransferases, such as plant chloroplastic monogalactosyldiacylglycerol synthases and bacterial diacylglycerol glucosyltransferases.
