identifier: InterPro:IPR048895
label: "MJ0694-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the uncharacterised NOP5 family protein MJ0694 from Methanocaldococcus jannaschii and similar archaeal sequences. MJ0694 is an homologue of Nop56/58, which are pre-RNA processing ribonucleoproteins (RNP). This domain is very well conserved and mediates a stable interaction with fibrillarin, playing a role in both RNP assembly and methyltransferase activity.
