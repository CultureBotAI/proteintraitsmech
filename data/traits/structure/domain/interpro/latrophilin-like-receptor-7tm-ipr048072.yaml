identifier: InterPro:IPR048072
label: "Latrophilin-like receptor, 7TM"
definition: >-
  This entry represents the 7 transmembrane (7tm) domain of latrophilin-like proteins from invertebrates. This entry includes latrophilin-like proteins found in invertebrates such as insects and worms, including Lat-1/2 from C. elegans, which are homologues from vertebrate latrophilins. Lat-1 plays a role in the establishment of anterior-posterior polarity in tissues during embryogenesis. It is required for the alignment of the mitotic spindles and division planes. It may also have a role in cell death events. It is required for normal defection and oocyte fertilization, being involved in sperm function. Latrophilins (also called lectomedins or latrotoxin receptors) belong to Group I adhesion GPCRs, which also include ETL (EGF-TM7-latrophilin-related protein). These receptors are members of the adhesion family (subclass B2) that belongs to the class B GPCRs. Three subtypes of vertebrate latrophilins have been identified: LPH1 (latrophilin-1), LPH2, and LPH3. All adhesion GPCRs possess large N-terminal extracellular domains containing multiple structural motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, coupled to a seven-transmembrane domain. In addition, almost all adhesion receptors, contain an evolutionarily conserved GPCR-autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif.
