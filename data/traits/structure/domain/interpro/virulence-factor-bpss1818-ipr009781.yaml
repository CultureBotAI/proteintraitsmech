identifier: InterPro:IPR009781
label: "Virulence factor BPSS1818"
definition: >-
  This entry represents BPSS1818, a virulence factor required for full Burkholderia pseudomallei pathogenesis in vivo. BPSS1818 is involved in indirect modulation of mammalian host cell tubulin, probably in concert with other bacterial components.
