identifier: InterPro:IPR060520
label: "C3H7.08c, C-terminal domain"
definition: >-
  This entry represents an uncharacterised domain in C3H7.08c and its homologues found in fungi. C3H7.08c is an uncharacterised single-pass membrane protein in Schizosaccharomyces pombe. The protein contains a transmembrane helix. The protein has been associated with mitochondrial proton-transporting ATP synthase complex assembly based on GO annotations. The domain is found predominantly in fungal species, particularly within the Ascomycota.
