identifier: InterPro:IPR033979
label: "MINDY deubiquitinase domain"
definition: >-
  This domain represents the catalytic domain of a group of deubiquitinating (DUB) enzymes known as the MINDY family (MIU-containing novel DUB). Ubiquitin (Ub) is released one molecule at a time from the distal end of proteins with Lys48-linked polyubiquitin chains. Long polyubiquitin chains are preferred. The catalytic Cys and His residues have been identified by site-directed mutagenesis, as has the Gln that participates in formation of the oxyanion hole during catalysis. Despite the structural similarity to papain-like cysteine peptidases, a residue corresponding to the Asn that orientates the imidazolium ring of the catalytic His has not been identified. Members of the MINDY family of DUBs contain an MIU (motif interacting with Ub) motif, which is a helical motif that binds mono-Ub.
