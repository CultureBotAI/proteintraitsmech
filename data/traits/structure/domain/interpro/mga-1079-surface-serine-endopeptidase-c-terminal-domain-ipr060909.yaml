identifier: InterPro:IPR060909
label: "MGA_1079 surface serine endopeptidase, C-terminal domain"
definition: >-
  MGA_1079 from Mycoplasma gallisepticum str. R, the founding member of this family, was identified as one of two putative peptidases in the strain, with a trypsin-like peptidase motif in the 900 amino acid C-terminal homology domain it shares exclusively with other members of the Mycoplasmoidales. Full-length members of the proteins average about 2000 amino acids in length, with lipoprotein-type signal peptides indicating a cell surface location, followed by a region highly variable in length, averaging about 1000 amino acids, with little conservation between species. In species such as Mycoplasmopsis canis or Mycoplasmopsis meleagridis, three or more paralogs may be found. MGA_1079 mutants showed greatly reduced ability to maintain infection in chicken respiratory tract, suggesting that members of this family are virulence factors.
