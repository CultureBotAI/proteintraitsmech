identifier: InterPro:IPR007322
label: "RNA-dependent RNA polymerase, bunyaviral"
definition: >-
  The bunyaviruses are enveloped viruses with a genome consisting of 3 ssRNA segments (called L, M and S). The nucleocapsid protein is encoded by the small (S) genomic RNA. The L segment codes for an RNA polymerase. This family contains the RNA dependent RNA polymerase on the L segment.
