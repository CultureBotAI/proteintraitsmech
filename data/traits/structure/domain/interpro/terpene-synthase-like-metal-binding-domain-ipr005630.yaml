identifier: InterPro:IPR005630
label: "Terpene synthase-like, metal-binding domain"
definition: >-
  Sequences containing this domain belong to the terpene synthase family. It has been suggested that this gene family be designated tps (for terpene synthase). Sequence comparisons reveal similarities between the monoterpene (C 10 ) synthases, sesquiterpene (C 15 ) synthases and the diterpene (C 20 ) synthases. It has been split into six subgroups on the basis of phylogeny, called Tpsa-Tpsf. Tpsa includes vetispiradiene synthase , 5-epi- aristolochene synthase, and (+)-delta-cadinene synthase . Tpsb includes (-)-limonene synthase, . Tpsc includes copalyl diphosphate synthase (kaurene synthase A), . Tpsd includes taxadiene synthase, , pinene synthase, and myrcene synthase, . Tpse includes ent-kaurene synthase B . Tpsf includes linalool synthase . In the fungus Phaeosphaeria sp. (strain L487) the synthesis of ent-kaurene from geranylgeranyl diphosphate is promoted by a single bifunctional protein. This domain is involved in the cyclization of linear terpenes.
