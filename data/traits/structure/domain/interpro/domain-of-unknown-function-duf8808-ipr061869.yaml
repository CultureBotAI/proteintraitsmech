identifier: InterPro:IPR061869
label: "Domain of unknown function DUF8808"
definition: >-
  This entry represents a domain of approximately 220 residues found in bacteria, predominantly Proteobacteria. This domain is typically located N-terminal to HNH nuclease domains ( ). Some proteins containing this domain also possess methyltransferase domains, suggesting a role in restriction-modification systems. The function of this domain remains to be determined.
