identifier: InterPro:IPR048761
label: "Helicase SMUBP-2/HCS1, 1B domain"
definition: >-
  Proteins in this entry belong to the DNA2/NAM7 helicase family and includes SMUBP-2 (also known as IGHMBP2) from mammals and HCS1 (also known as DNA polymerase alpha-associated DNA helicase A) from yeasts. This entry represents the 1B domain consisting of a short α-helix and a β-barrel. This domain forms the RNA-binding channel together with 1A, 2A and 1C domains. Domains 1B and 1C directly interact with the 3'-end of RNA.
