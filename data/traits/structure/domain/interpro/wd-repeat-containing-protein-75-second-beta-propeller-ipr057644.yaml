identifier: InterPro:IPR057644
label: "WD repeat-containing protein 75, second beta-propeller"
definition: >-
  This entry represents the second β-propeller found in WD repeat-containing protein 75 (WDR75) from animals. The function of this domain is unknown. This domain is also found in U3 small nucleolar RNA-associated protein 13 and 17 (UTP13 and UTP17), which are WDR75 orthologs from yeast. WDR75 is an essential factor in the early stages of ribosome assembly. It is a component of the small subunit (SSU) processome, which is the first precursor of the eukaryotic small ribosomal subunit. WDR75 has a crucial positive role in ribosome biogenesis and its malfunction activates p53, leading to cellular senescence. WDR75 is required for pre-rRNA transcription, supporting the maintenance of physiological levels of RPA194, a key subunit of RNA polymerase I. Its depletion leads to reduced rRNA synthesis and destabilization of RPA194, but not RPA135, another RNA Pol I component
