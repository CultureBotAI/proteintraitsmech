identifier: InterPro:IPR048399
label: "DUF4438, C-terminal"
definition: >-
  This is the C-terminal domain of M_1086 from Thermotoga maritima ( ) and related bacterial proteins with unknown function. This domain consists of a partly open β-barrel and a three-stranded antiparallel β-sheet packed on on the barrel wall ( ).
