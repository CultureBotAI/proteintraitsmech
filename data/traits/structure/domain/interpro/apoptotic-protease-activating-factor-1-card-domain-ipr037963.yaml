identifier: InterPro:IPR037963
label: "Apoptotic Protease-Activating Factor 1, CARD domain"
definition: >-
  Apoptotic protease activating factor-1 (Apaf-1) is a component protein of the apoptosome. During apoptosis, cytochrome c is released from mitochondria to the cytosol and binds Apaf-1. Binding of cytochrome c to Apaf-1 allows the recruitment and activation of caspase-9 within the apoptosome. This entry represents the CARD domain of Apaf-1. CARDs are death domains (DDs) found associated with caspases. They are known to be important in the signaling pathways for apoptosis, inflammation, and host-defense mechanisms.
