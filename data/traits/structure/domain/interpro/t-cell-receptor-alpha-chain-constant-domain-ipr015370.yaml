identifier: InterPro:IPR015370
label: "T-cell receptor alpha chain, constant domain"
definition: >-
  This entry represents the constant domain of the alpha chain of alpha/beta T-cell antigen receptors (TCRs). TCRs mediate antigen recognition by T lymphocytes, and are composed of alpha and beta, or gamma and delta, polypeptide chains with variable (V) and constant (C) regions. alpha/beta TCRs recognise antigen as peptide fragments presented by major histocompatibility complex (MHC) molecules. The antigen binding site is formed by the variable domains of the alpha and beta chains, located at the N terminus of each chain. alpha/beta TCRs recognise antigens differently from gamma/delta TCRs.
