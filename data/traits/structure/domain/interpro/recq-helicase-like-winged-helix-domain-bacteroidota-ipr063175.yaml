identifier: InterPro:IPR063175
label: "RecQ helicase-like, winged-helix domain, Bacteroidota"
definition: >-
  This entry represents a winged helix-turn-helix domain found in RecQ-like ATP-dependent DNA helicases from Bacteroidota. The domain is located between the C-terminal helicase domain ( ) and the RecQ zinc-binding domain ( ). RecQ helicases are involved in maintaining genome stability through their roles in DNA repair and recombination. The domain is found primarily in Flavobacteriaceae, Cytophagales and Bacteroidales within the Bacteroidota phylum. The function of this domain remains to be determined.
