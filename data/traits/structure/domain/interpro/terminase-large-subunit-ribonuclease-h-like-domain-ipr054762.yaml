identifier: InterPro:IPR054762
label: "Terminase, large subunit, ribonuclease H-like domain"
definition: >-
  This entry represents the C-terminal ribonuclease (RNase) H-like domain in the terminase, large subunit from Escherichia phage T7 (Gp19), which functions as an ATP-powered molecular motor essential for the translocation of viral DNA into empty capsids. It also acts as an endonuclease, cleaving the viral genome at a specific and precise double-stranded DNA sequence to initiate and conclude the packaging process. Members of this group are found in tailed bacteriophages and bacterial prophages.
