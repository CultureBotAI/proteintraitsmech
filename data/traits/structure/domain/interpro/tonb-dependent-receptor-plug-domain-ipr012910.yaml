identifier: InterPro:IPR012910
label: "TonB-dependent receptor, plug domain"
definition: >-
  This entry represents the plug domain, which has been shown to be an independently folding subunit of the TonB-dependent receptors. It acts as the channel gate, blocking the pore until the channel is bound by a ligand. At this point it undergoes conformational changes and opens the channel. In Escherichia coli the TonB protein interacts with outer membrane receptor proteins that carry out high-affinity binding and energy-dependent uptake of specific substrates into the periplasmic space. These substrates are either poorly permeable through the porin channels or are encountered at very low concentrations. In the absence of TonB, these receptors bind their substrates but do not carry out active transport. TonB-dependent regulatory systems consist of six components: a specialised outer membrane-localized TonB-dependent receptor (TonB-dependent transducer) that interacts with its energizing TonB-ExbBD protein complex, a cytoplasmic membrane-localized anti-sigma factor and an extracytoplasmic function (ECF)-subfamily sigma factor. The TonB complex senses signals from outside the bacterial cell and transmits them via two membranes into the cytoplasm, leading to transcriptional activation of target genes. The proteins that are currently known or presumed to interact with TonB include BtuB, CirA, FatA, FcuT, FecA, FhuA, FhuE, FepA, FptA, HemR, IrgA, IutA, PfeA, PupA and Tbp1. The TonB protein also interacts with some colicins. Most of these proteins contain a short conserved region at their N terminus.
