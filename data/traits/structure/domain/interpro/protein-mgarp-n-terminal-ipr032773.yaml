identifier: InterPro:IPR032773
label: "Protein MGARP, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the protein MGARP (also known as HUMMR). HUMMR interacts with Miro, an mitochondrial membrane protein. It biases mitochondrial movement in the anterograde direction in response to hypoxia.
