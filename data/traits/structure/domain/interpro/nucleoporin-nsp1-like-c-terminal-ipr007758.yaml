identifier: InterPro:IPR007758
label: "Nucleoporin, NSP1-like, C-terminal"
definition: >-
  The NSP1-like protein appears to be an essential component of the nuclear pore complex, for example preribosome nuclear export requires the Nup82p-Nup159p-Nsp1p complex. The C-terminal of Nsp1 is involved in binding Nup82, probably via coiled-coil formation. The family is related to the rotavirus nonstructural protein NSP1 which is the least conserved protein in the rotavirus genome. Its function in the replication process is not fully understood.
