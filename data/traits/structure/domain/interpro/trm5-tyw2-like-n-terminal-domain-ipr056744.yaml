identifier: InterPro:IPR056744
label: "TRM5/TYW2-like, N-terminal domain"
definition: >-
  This is the N-terminal domain of of TRM5/TYW2 proteins, SAM-dependent methyltransferases that are involved in tRNA methylation and related sequences found in archaea and eukaryotes. This domain consists of six β-strands and three α-helices.
