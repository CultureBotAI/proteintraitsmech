identifier: InterPro:IPR034853
label: "Neutrophil cytosol factor P40, PB1 domain"
definition: >-
  The PB1 domain is essential part of the p40 adaptor protein, also known as neutrophil cytosol factor 4 (Ncf-4), which plays an important role in activating phagocyte NADPH oxidase during phagocytosis. During activation of the phagocyte NADPH oxidase, the cytoplasmic Phox complex, consisting of p47(phox), p67(phox) and p40(phox), translocates and associates with the membrane-spanning flavocytochrome b(558). p40(phox) and p47(phox) cooperate in executing the carrier function directing the cytoplasmic ternary Phox complex to phagosomes. p40(phox) and p67(phox) subunits form a complex via association of their PB1 domains. The PB1 domain of p40 represents a type I PB1 domain which interacts with the PB1 domain of oxidase activator p67 which belong to type II PB1 domain. The interaction between two PB1 domain depends on the type of PB1. There are three types of PB1 domains: type I which contains an OPCA motif, acidic aminoacid cluster, type II which contains a basic cluster, and type I/II which contains both an OPCA motif and a basic cluster. The PB1 domain of p40 represents a type I PB1 domain which interacts with the PB1 domain of oxidase activator p67 which belong to type II PB1 domain. A canonical PB1-PB1 interaction involves heterodimerization of two PB1 domain. Interactions of PB1 domains with other protein domains have been described as noncanonical PB1-interactions.
