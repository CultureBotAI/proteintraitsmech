identifier: InterPro:IPR055864
label: "Domain of unknown function DUF7441"
definition: >-
  This entry represents a conserved domain found predominantly in bacteriophage proteins. The domain is characterised by a highly conserved YDRH motif, which likely plays an important role in the domain's function or structure. This group includes proteins from various phages that infect cyanobacteria, particularly Synechococcus and Prochlorococcus species. The proteins contain a central small domain composed of a three stranded β-sheet with an α-helix inserted between the second and third strands.
