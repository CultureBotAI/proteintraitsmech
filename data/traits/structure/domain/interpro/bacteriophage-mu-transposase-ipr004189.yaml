identifier: InterPro:IPR004189
label: "Bacteriophage Mu, transposase"
definition: >-
  This transposase is essential for integration, replication-transposition and excision of Bacteriophage Mu DNA. Transposition requires transposase and a transposition enhancer, and the DNA can be transposed into multiple sites in bacterial genomes. The crystal structure of the core domain of Mu transposase, MuA, has been determined. The first of two subdomains contains the active site and, despite very limited sequence homology, exhibits a striking similarity to the core domain of Human immunodeficiency virus 1 integrase. The enzymatic activity of MuA is known to be activated by formation of a DNA-bound tetramer of the protein.
