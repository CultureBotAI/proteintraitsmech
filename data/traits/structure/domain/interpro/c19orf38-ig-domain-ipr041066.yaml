identifier: InterPro:IPR041066
label: "C19orf38, Ig domain"
definition: >-
  This entry represents an Ig domain found in the uncharacterised human protein C19orf38, which is found across mammals. Family members have one predicted transmembrane region which is not included in this entry. The C19orf38 protein is also known as HIDE1 after Highly expressed in Immature DEndritic cell transcript 1 protein.
