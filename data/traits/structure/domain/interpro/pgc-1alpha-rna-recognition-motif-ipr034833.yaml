identifier: InterPro:IPR034833
label: "PGC-1alpha, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of peroxisome proliferator-activated receptor gamma coactivator 1-alpha (PGC-1alpha). PGC-1alpha is the founding member of the PGC-1 family. It is a transcriptional coactivator involved in a wide range of biological processes, such as adipocyte differentiation, mitochondrial biogenesis and respiratory function. It interacts with receptors and transcription factors, such as estrogen-related receptor alpha and NRF-1. Interestingly, PGC-1alpha and beta have an essential but complementary function in mitochondrial biogenesis and brown fat differentiation.
