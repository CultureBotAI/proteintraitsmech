identifier: InterPro:IPR048699
label: "SidC, lipid-binding domain"
definition: >-
  This entry represents the lipid-binding domain, which shows a four α-helix bundle with one end sealed by a C-terminal short β-hairpin and a highly positively charged pocket at the other end formed by two loops connecting the α-helices. This pocket is thought to be the binding site, responsible for the stimulation of the E3 ligase activity of the SNL domain. SidC is one of the effectors delivered by Legionella pneumophila into the host cell. Like its paralogue SdcA, SidC anchors on the Legionella-containing vacuole (LCV) to facilitate the recruitment of endoplasmic reticulum (ER) proteins. This protein is organised into four domains that are packed into an arch-like shape: the N- terminal SNL domain ( ), the INS domain (which is inserted within the SNL domain), the P4C domain, and a C-terminal domain.
