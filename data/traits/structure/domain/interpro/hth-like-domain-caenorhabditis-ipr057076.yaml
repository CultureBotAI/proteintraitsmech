identifier: InterPro:IPR057076
label: "HTH-like domain, caenorhabditis"
definition: >-
  This presumed domain is found towards the N-terminal end of a group of uncharacterised proteins from Caenorhabditis. It shares significant sequence similarity to the HTH 3-helical bundle domains and it is predicted to adopt a similar structure.
