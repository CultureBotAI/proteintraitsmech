identifier: InterPro:IPR059182
label: "Kinesin heavy chain, C-terminal domain"
definition: >-
  This entry represents the C-terminal coiled coil in Drosophila kinesin heavy chain and Homo sapiens kinesin heavy chain. This entry also includes kinesin heavy chain isoform 5A (KIF5A, NKHC1) and kinesin heavy chain isoform 5C (KIF5C, NKHC2). This domain corresponds to the cargo binding region, which is responsible for binding of the atypical tropomyosin, aTm1, a cargo adaptor that plays a stabilising role in the interaction of Khc with RNA. Khc comprises an N-terminal motor domain, followed by a long coiled-coil stalk that mediates homodimerisation, and an unstructured tail with regulatory function. The stalk includes the kinesin light chain (Klc) binding region and an alternative cargo binding region. KIF5A is a microtubule-dependent motor required for slow axonal transport of neurofilament proteins (NFH, NFM and NFL). It can induce formation of neurite-like membrane protrusions in non-neuronal cells in a ZFYVE27-dependent manner. KIF5C is involved in synaptic transmission and mediates dendritic trafficking of mRNAs.
