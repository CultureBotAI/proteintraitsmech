identifier: InterPro:IPR048381
label: "NAD-specific glutamate dehydrogenase, C-terminal"
definition: >-
  Glutamate dehydrogenases (GDHs) are a broadly distributed group of enzymes that catalyse the reversible oxidative deamination of glutamate to ketoglutarate and ammonia. The structure of GDH from Mycobacterium smegmatis revealed that it has a long N- and C-terminal segments flanking the catalytic core, comprising several domains. The flexible N-terminal domain comprises ACT-like and PAS-type domains which could act as metabolic sensors for allosteric regulation. This entry represents the helical C-terminal domain.
