identifier: InterPro:IPR063130
label: "NPLP1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of neuropeptide-like protein 1 (NPLP1) mainly found in insects. NPLP1 is a neuropeptide precursor that contains multiple bioactive peptides released through proteolytic processing. The C-terminal domain spans approximately 190 amino acids and contains several neuropeptide sequences. One peptide within this region, NPLP1-4, acts as a ligand for the receptor guanylate cyclase Gyc76C and modulates innate immune responses to salt stress in Drosophila.
