identifier: InterPro:IPR035556
label: "FCHSD2, SH3 domain 2"
definition: >-
  F-BAR and double SH3 domains protein 2 (FCHSD2), also known as carom, contains an N-terminal F-BAR domain and two SH3 domains at the C terminus. It may mediate receptor endocytosis and transport. This entry represents the second SH3 domain of FCHSD2.
