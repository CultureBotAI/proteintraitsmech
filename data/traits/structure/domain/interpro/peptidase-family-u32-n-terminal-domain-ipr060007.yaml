identifier: InterPro:IPR060007
label: "Peptidase family U32, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of a group of prokaryotic peptidases. This is a group of peptidases belonging to MEROPS peptidase family U32 (clan U-). They are classified as collagenases as they are present in bacterial collagenases, involved in bacterial infection. For example, Porphyromonas gingivalis PrtC (Bacteroides gingivalis), is an enzyme that degrades type I collagen and that seems to require a metal cofactor, or Helicobacter pylori HP0169, another Peptidase U32 protein is required for colonisation of mouse gut. Novel functions of peptidase U32 proteins have been found, suggesting that these peptidases are involved in diverse cellular processes. The conservation of a CX6CX15CX3/4C motif in several U32 proteases indicates that these proteins bind [Fe-S] clusters. RlhA, a member of the U32 protease family involved in the C-hydroxylation of a cytidine on E. coli 23S rRNA is a Fe-S protein related to iron metabolism. TrhP (tRNA hydroxylation protein P), a member of this family, is involved in prephenate-dependent formation of 5-hydroxyuridine (ho5U) modification at position 34 in tRNAs, the first step in 5-methoxyuridine (mo5U) biosynthesis, which is important for tRNA hydroxylation ensuring the efficient decoding during protein synthesis. UbiU-UbiV are involved in ubiquinone biosynthesis in which the 4Fe-4S clusters bind to each protein have a role in electron transfer chains in hydroxylation reactions.
