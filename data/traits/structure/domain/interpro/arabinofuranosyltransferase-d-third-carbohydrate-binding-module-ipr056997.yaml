identifier: InterPro:IPR056997
label: "Arabinofuranosyltransferase D, third carbohydrate binding module"
definition: >-
  This is the third carbohydrate binding module (CBM) found in Arabinofuranosyltransferase D from Mycolicibacterium smegmatis (AftD, also known as Alpha-(1->3)-arabinofuranosyltransferase) and similar proteins from actinomycetes. The membrane embedded portion of AftD contains a typical GT-C glycosyltransferase domain ( ); the periplasmic portion is made up of five distinct domains: a domain of mixed α/β folds, three CBMs and one structural β-sandwich domain. This domain shows a β-sandwich fold.
