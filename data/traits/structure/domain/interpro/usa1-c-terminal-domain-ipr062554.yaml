identifier: InterPro:IPR062554
label: "USA1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of USA1 and related proteins found in yeasts. USA1 is a scaffold protein of the endoplasmic reticulum-associated degradation (ERAD) pathway involved in the ubiquitin-dependent degradation of misfolded ER proteins. USA1 functions as a scaffold within the HRD1 complex, recruiting DER1 and regulating HRD1 activity in both ERAD-L and ERAD-M pathways.
