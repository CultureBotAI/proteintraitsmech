label: "Munc13 homology 1"
definition: >-
  This entry represents the Munc13 homology domain 1. Munc13 proteins constitute a family of three highly homologous molecules (Munc13-1, Munc13-2 and Munc13-3) with homology to Caenorhabditis elegans Unc-13. Munc13 proteins contain a phorbol ester-binding C1 domain and two C2 domains, which are Ca2+/phospholipid binding domains. Sequence analyses have uncovered two regions called Munc13 homology domains 1 (MHD1) and 2 (MHD2) that are arranged between two flanking C2 domains. MHD1 and MHD2 domains are present in a wide variety of proteins from Arabidopsis thaliana, C. elegans, Drosophila melanogaster (Fruit fly), Mus musculus (Mouse), Rattus norvegicus (Rat) and Homo sapiens (Human), some of which may function in a Munc13-like manner to regulate membrane trafficking. The MHD1 and MHD2 domains are predicted to be α-helical. Some proteins known to contain MHD1 and MHD2 domains are listed below: Mammalian Munc13-1. It is specifically targeted to presynaptic active zones and has a central priming function in synaptic vesicle exocytosis from glutaminergic synapses. Mammalian Munc13-2. It plays a role in vesicle maturation during exocytosis as a target of the diacylglycerol second messenger pathway. Mammalian Munc13-3. It probably plays a role in vesicle maturation during exocytosis as a target of the diacylglycerol second messenger pathway. Mammalian Munc13-4. It is predominantly expressed in lung where it is localized to goblet cells of the bronchial epithelium and to alveolar type II cells, both of which are cell types with secretory function. C. elegans Unc-13. It may form part of a signal transduction pathway, transducing the signal from diacylglycerol to effector functions. Mammalian BAI1-associated protein 3 (BAP3), which exhibits the typical Munc13-like domain structur…
