identifier: InterPro:IPR034261
label: "CNOT4, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of NOT4 (also known as CNOT4), which is a component of the CCR4-NOT complex, a global negative regulator of RNA polymerase II transcription. NOT4 functions as an ubiquitin-protein ligase (E3). It contains an N-terminal C4C4 type RING finger motif, followed by a RNA recognition motif (RRM). The RING fingers may interact with a subset of ubiquitin-conjugating enzymes (E2s), including UbcH5B, and mediate protein-protein interactions.
