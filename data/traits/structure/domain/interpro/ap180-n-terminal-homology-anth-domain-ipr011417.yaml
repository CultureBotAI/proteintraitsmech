identifier: InterPro:IPR011417
label: "AP180 N-terminal homology (ANTH) domain"
definition: >-
  The AP180 N-terminal homology (ANTH) domain is a membrane binding domain found in endocytotic accessory proteins, such as AP180. AP180 has been implicated in the formation of clathrin-coated pits. The ANTH domain is involved in phosphatidylinositol 4,5-bisphosphate (also known as PIP2) binding. The ANTH domain containing proteins appear to be universal elements in nucleation of clathrin coats.
