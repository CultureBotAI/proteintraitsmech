identifier: InterPro:IPR047571
label: "OCA domain"
definition: >-
  The OCA domain spans ~23 amino acids and is found near the N terminus of the POU2AF family of coactivators. It comprises the minimal non-globular region that has been shown to bind to the binary complex of class II POU domain-containing transcription factors (TFs) and a DNA octamer motif. The structure of the ternary complex of OCA domain bound to POU domain/octamer DNA has been determined, in which the OCA adopts mainly an extended conformation and a short α-helix near the C terminus. The disordered part of OCA interacts with the major DNA grove while residues from the ordered helical part make contacts with the POU domain. The OCA domain is also found in another family of cofactors, the nuclear factor (NF)-kappaB inhibitor zeta (IkappaBzeta) proteins, NF-kappaB regulators which function not only as repressors but also as activators of a selective subset of NF-kappaB target genes.
