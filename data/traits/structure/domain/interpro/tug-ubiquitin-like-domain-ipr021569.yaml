identifier: InterPro:IPR021569
label: "TUG ubiquitin-like domain"
definition: >-
  This entry represents the N-terminal ubiquitin-like domain of the TUG protein. This domain in the similar protein, UBL1, appears to participate in protein-protein interactions. The region does have a area of negative electrostatic potential and increased backbone motility which leads to suggestions of a potential protein-protein interaction site. This domain is also found at the N terminus of yeast Ubx4. Proteins containing this domain include Ubx4 from budding yeast and TUG (also known as tether containing UBX domain for GLUT4) from mice. Ubx4 is involved in Cdc48-dependent protein degradation through the ubiquitin/proteasome pathway.
