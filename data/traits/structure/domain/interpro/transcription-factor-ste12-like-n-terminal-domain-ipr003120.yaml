identifier: InterPro:IPR003120
label: "Transcription factor Ste12-like, N-terminal domain"
definition: >-
  This entry include a group of fungal transcription factors, including Ste12, Cph1, SteA and MST12. In S. cerevisiae, Ste12 mediates transcriptional induction of cell type-specific genes in response to pheromones. Aspergillus nidulans SteA, an homodomain-containing protein, is required for sexual reproduction. MST12 from Magnaporthe oryzae (rice blast fungus) may regulate genes involved in infectious hyphae growth and in the expression of the cell surface sensor MSB2. This entry represents the N-terminal domain that in some members is associated with a C2H2 zinf finger, such as MST12.
