identifier: InterPro:IPR000045
label: Prepilin type IV endopeptidase, peptidase domain
definition: >-
  This entry represents the peptidase domain from the prepilin type IV endopeptidases. It can be found on its own such as peptidase HopD in Salmonella typhimurium , or in the case of the bifunctional enzymes such as Prepilin leader peptidase/N-methyltransferase in Vibrio cholerae , next to a methylation domain . This group of aspartic endopeptidases belong to MEROPS peptidase family A24 (type IV prepilin peptidase family). The family is divided into two subfamilies: subfamily A24A includes the type IV prepilin peptidase from bacteria and subfamily A24B includes the preflagellin peptidase from archaea. Peptidases in the family are also known as "GXGD membrane proteases" because of the common motif that includes one of the two active site residues. Bacteria produce a number of protein precursors that undergo post-translational methylation and proteolysis prior to secretion as active proteins. Type IV prepilin leader peptidases are enzymes that mediate this type of post-translational modification. Type IV pilin is a protein found on the surface of Pseudomonas aeruginosa, Neisseria gonorrhoeae and other Gram-negative pathogens. Pilin subunits attach the infecting organism to the surface of host epithelial cells. They are synthesised as prepilin subunits, which differ from mature pilin by virtue of containing a 6-8 residue leader peptide consisting of charged amino acids. Mature type IV pilins also contain a methylated N-terminal phenylalanine residue. The bifunctional enzyme prepilin peptidase (PilD) from Pseudomonas aeruginosa is a key determinant in both type-IV pilus biogenesis and extracellular protein secretion, in its roles as a leader peptidase and methyl transferase (MTase). It is responsible for endopeptidic cleavage of the unique leader peptides that characterise t…
