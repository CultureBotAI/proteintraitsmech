identifier: InterPro:IPR028036
label: "Distal membrane-arm assembly complex protein 1-like domain"
definition: >-
  This entry represents a domain found in a group of animal and fungal proteins, including human Distal membrane-arm assembly complex protein 1 (DMAC1, also known as C9orf123) and its orthologue in Schizosaccharomyces pombe Tam6. DMAC1 is required for the assembly of the mitochondrial NADH:ubiquinone oxidoreductase complex (complex I). It is involved in the assembly of the distal region of complex I. Tam6, also known as Dmo2, is required for the stability and maturation of Cox2p, the second subunit of the COX complex. This domain, previously known as DUF4536, is predicted to fold into an α-helical configuration.
