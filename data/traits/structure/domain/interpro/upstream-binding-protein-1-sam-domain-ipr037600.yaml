identifier: InterPro:IPR037600
label: Upstream-binding protein 1, SAM domain
definition: >-
  Ubp1 (also known as LBP-1) is involved in transcriptional regulation from early development to terminal differentiation. It regulates alpha-globin in erythroid cells and P450scc (the cholesterol side-chain cleavage enzyme, cytochrome) in human placenta. Human Ubp1 is known to be induced by HIV type I infection in lymphocytes; it represses HIV transcription by preventing the binding of TFIID to the virus promoter. Ubp1 might also be part of a network controlling blood pressure.
