identifier: InterPro:IPR062610
label: "VID28/GID5, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of VID28/GID5, a component of the GID (glucose-induced degradation) E3 ubiquitin ligase complex. VID28 is found in fungi, particularly within the Saccharomycetaceae family. The GID complex mediates proteasome-dependent catabolite degradation of gluconeogenic enzymes such as fructose-1,6- bisphosphatase when yeast cells are shifted to glucose-containing medium. Within the GID complex, VID28 interacts directly with RMD5/GID2 and FYV10/GID9, and recruits the substrate receptor VID24/ GID4 to form the active E3 ligase complex.
