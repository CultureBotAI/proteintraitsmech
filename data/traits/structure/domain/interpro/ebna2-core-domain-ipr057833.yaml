identifier: InterPro:IPR057833
label: "EBNA2, core domain"
definition: >-
  This entry represents the core transactivation domain in EBNA2. This region contains several functional elements, including a second dimerisation motif (Dim2), a CBF1/RBP-Jk adapter binding region, a poly-proline region, and a C-terminal acidic transactivation domain (C-TAD). EBNA2 does not bind directly to DNA but is recruited to promoters through interactions with cellular DNA-binding proteins such as RBP-Jk/CBF1 and PU.1. The C-TAD (aa 448-471) can recruit components of the basic transcriptional machinery and chromatin modifiers like p300/CBP and PCAF. Through these interactions, EBNA2 activates the expression of viral (LMP1, LMP2A/B) and cellular genes (CD21, CD23, c-myc) to drive B-cell proliferation. The C-TAD is intrinsically unstructured but forms an amphipathic α-helix when bound to interaction partners. Epstein-Barr virus nuclear antigen 2 (EBNA2) is a key viral transcriptional regulator essential for B-cell transformation by EBV. EBNA2 plays a crucial role in activating resting B-cells in the host and stimulating their proliferation. It achieves this by upregulating the expression of viral genes, including EBNA1-6, LMP1, LMP2A, and LMP2B, as well as several host genes such as CD21, CD23, and MYC. EBNA2 functions as an adaptor molecule that activates transcription by binding to cellular sequence-specific DNA-binding proteins, including host factors CBF1, SMARCB1, and SPI1. When positioned near promoter regions, its acidic activation domain recruits core and associated transcription factors, such as TFIIB, TAF40, TFIIH components ERCC2 and ERCC3, and CBP, to initiate transcription. Additionally, EBNA2 can influence the activity of cell cycle regulators, slowing progression at the G2/M phase. It is also implicated in inducing chromosomal instability by disrupti…
