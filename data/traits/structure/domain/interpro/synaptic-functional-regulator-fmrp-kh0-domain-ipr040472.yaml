identifier: InterPro:IPR040472
label: "Synaptic functional regulator FMRP, KH0 domain"
definition: >-
  This entry corresponds to the KH0 domain from the FMRP protein. This is a divergent KH domain that was discovered through solving the structure of an N-terminal fragment of the FMRP protein. KH0 does not have the canonical G-X-X-G motif between helices A and B. It has been suggested that this domain may be involved in RNA binding.
