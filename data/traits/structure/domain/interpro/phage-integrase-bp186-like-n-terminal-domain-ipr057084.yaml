identifier: InterPro:IPR057084
label: "Phage integrase BP186-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of phage integrases, including the member from Escherichia phage P2. This protein is necessary for integration of the phage into the host genome by site-specific recombination.
