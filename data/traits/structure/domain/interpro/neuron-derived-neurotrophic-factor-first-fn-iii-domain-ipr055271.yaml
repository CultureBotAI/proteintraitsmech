identifier: InterPro:IPR055271
label: "Neuron-derived neurotrophic factor, first Fn(III) domain"
definition: >-
  This domain is found centrally located in animal Neuron-derived neurotrophic factor (NDNF), which contains a fibronectin type III domain and one of the predicted N-linked glycosylation sites. NDNF is a glycosylated and disulfide-bonded secreted protein expressed in brain and spinal cord that promotes migration and neurite growth. It also promotes endothelial cell survival, vessel formation and plays an important role in the process of revascularisation.
