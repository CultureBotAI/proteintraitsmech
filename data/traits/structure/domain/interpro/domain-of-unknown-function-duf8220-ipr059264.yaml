label: "Domain of unknown function DUF8220"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to fold into an unique α/β structure composed on a four-stranded mixed β-sheet (order 2143) and α-helices that pack on one face of the sheet, spanning edge to edge.
