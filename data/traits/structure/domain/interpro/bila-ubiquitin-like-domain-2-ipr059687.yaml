identifier: InterPro:IPR059687
label: "BilA, ubiquitin-like domain 2"
definition: >-
  This entry represents the C-terminal ubiquitin-like domain of BilA found in bacterial ISG15-like antiviral defense systems. This domain is the second of two ubiquitin-like domains in BilA and contains the critical C-terminal glycine (Gly163) required for conjugation to bacteriophage proteins. The domain forms covalent isopeptide bonds with lysine residues in phage tail proteins, particularly the central tail fibre, thereby interfering with phage tail assembly and reducing phage infectivity. This conjugation system provides bacterial resistance against multiple phages including SECphi27, SECphi4, and T5.
