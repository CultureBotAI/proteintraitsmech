identifier: InterPro:IPR055399
label: "Bacillithiol biosynthesis BshC, C-terminal coiled-coil domain"
definition: >-
  This entry represents the C-terminal coiled-coil domain of the bacillithiol biosynthesis protein BshC from Bacillus subtilis, which has been described as a cysteine-adding enzyme. This domain, found associated with , shows a four-helix bundle and is responsible for the dimerisation of the protein.
