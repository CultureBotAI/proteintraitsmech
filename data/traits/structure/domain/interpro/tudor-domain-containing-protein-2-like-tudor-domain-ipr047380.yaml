identifier: InterPro:IPR047380
label: "Tudor domain-containing protein 2-like, tudor domain"
definition: >-
  This entry represents the Tudor domain of TDRD2/PAPI, which binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. TDRD2, also called Tudor and KH domain-containing protein (TDRKH), is a mitochondria-anchored RNA-binding protein that is required for spermatogenesis and participates in the primary piwi-interacting RNA (piRNA) biogenesis pathway. It specifically recruits MIWI, but not MILI, to engage the piRNA pathway. It is required during spermatogenesis to repress transposable elements and prevent their mobilization, which is essential for germline integrity. This entry also includes the TDRD2 homologue from Drosophila melanogaster (dTDRKH), which is also called partner of PIWIs protein, or PAPI, and is involved in Zucchini-mediated piRNA 3'-end maturation. These proteins contain two KH domains and one Tudor domain.
