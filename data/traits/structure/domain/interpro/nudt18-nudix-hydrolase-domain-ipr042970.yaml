identifier: InterPro:IPR042970
label: NUDT18, NUDIX hydrolase domain
definition: >-
  This entry represents the NUDIX domain found in NUDT18, an 8-oxo-dGDP phosphatase that mediates the hydrolysis of oxidized nucleoside diphosphate derivatives. In general, Nudix hydrolases catalyse the hydrolysis of nucleoside diphosphates linked to other moieties, X, and contain the sequence motif or Nudix box, GX(5)EX(7)REUXEEXGU.
