identifier: InterPro:IPR046532
label: "Domain of unknown function DUF6597"
definition: >-
  This presumed domain is found at the N-terminal of bacterial transcription factor proteins, including the uncharacterised HTH-type transcriptional regulator in mcrB 3'region from Streptomyces lavendulae, suggesting that this may be a regulatory domain that binds to some as yet unknown ligand.
