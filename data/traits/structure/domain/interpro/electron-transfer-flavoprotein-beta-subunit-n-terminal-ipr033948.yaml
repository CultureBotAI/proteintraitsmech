identifier: InterPro:IPR033948
label: "Electron transfer flavoprotein, beta subunit, N-terminal"
definition: >-
  This entry refers to an N-terminal domain found predominantly in the beta subunit of ETF. The electron transfer flavoprotein (ETF) serves as a specific electron acceptor for various mitochondrial dehydrogenases. ETF transfers electrons to the main respiratory chain via ETF-ubiquinone oxidoreductase. ETF is an heterodimer that consists of an alpha and a beta subunit which binds one molecule of FAD per dimer. A similar system also exists in some bacteria. The homologous pair of proteins (FixA/FixB) are essential for nitrogen fixation. The beta subunit protein is distantly related to and forms a heterodimer with the alpha subunit.
