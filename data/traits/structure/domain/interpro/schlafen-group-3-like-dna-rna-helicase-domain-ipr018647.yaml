identifier: InterPro:IPR018647
label: "Schlafen group 3-like, DNA/RNA helicase domain"
definition: >-
  This domain, found in group 3 of Schlafen proteins from mammals, including Schlafen 5, 8, 9, 11 and 13, represents the helicase domain. Schlafen proteins are involved in the control of cell proliferation, induction of immune responses, and in the regulation of viral replication. These proteins inhibit DNA replication and promote cell death in response to DNA damage. They play a role in genome surveillance to kill cells with defective replication. This domain is also found in various prokaryotic proteins fused to a DNA helicase, GIY-YIG or PD-(D/E)XK catalytic domain or HsdR-N(terminal) domain, which are similar to AAA DNA helicase, Type III restriction enzyme ATPase, RecD and RuvB helicase.
