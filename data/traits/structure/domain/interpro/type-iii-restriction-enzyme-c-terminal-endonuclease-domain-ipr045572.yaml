label: "Type III restriction enzyme, C-terminal endonuclease domain"
definition: >-
  This entry represents the C-terminal endonuclease domain found in a variety of class III restriction endonuclease proteins including Type III restriction-modification system EcoPI/EcoP15I Res subunit from E. coli and Type III restriction-modification enzyme BceSI Res subunit from Bacillus cereus.
