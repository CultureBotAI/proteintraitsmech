label: "Aminoglycoside phosphotransferase, bacteria"
definition: >-
  This entry includes enzymes found in the rumen bacterium Fibrobacter succinogenes subsp succinogenes S85. They are homologous to the aminoglycoside phosphotransferase enzyme family associated with resistance to aminoglycoside antibiotics.
