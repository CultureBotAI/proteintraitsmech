identifier: InterPro:IPR061247
label: "AAWKG-containing, N-terminal domain"
definition: >-
  This domain is found in a group of proteins primarily from Streptomyces. A region outside of this domain contains 9-residue repeats that resemble the 18-residue repeats found by in the C-terminal region of eukaryotic T-complex protein 10. This group of proteins is named for the family's most prominent motif, AAWKG, to head off any possible confusion with Tcp10. Members of this family are unrelated to eukaryotic Tcp10, although some members contain a repetitive region similar to a C-terminal repeat region of Tcp10. This group of proteins is uncharacterised.
definition_source: InterPro
