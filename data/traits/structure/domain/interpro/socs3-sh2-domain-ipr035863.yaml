identifier: InterPro:IPR035863
label: "SOCS3, SH2 domain"
definition: >-
  This entry represents the SH2 domain of SOCS3. Cytokine signaling mediated by the JAK-STAT pathway plays essential roles in differentiation, maturation, proliferation and apoptosis of a various types of cells. Suppressor of cytokine signaling (SOCS) proteins are negative feedback regulators of the JAK-STAT signaling pathway. SOCS1 and SOCS3 are potent inhibitors of JAKs and can play pivotal roles in inflammation, as well as in the development and progression of cancers. All SOCS share a central SH2 domain and a C-terminal SOCS box, but only SOCS1 and SOCS3 possess a kinase inhibitory region immediately upstream of the central SH2. SOCS3 interacts with gp130, a common cytokine receptor for interleukin (IL)-6, leukemia inhibitory factor (LIF) and other members of the IL-6 family of cytokines. SOCS3 has been reported also to interact with the leptin receptor, erythropoietin receptor, insulin receptor, IL-12beta receptor and granulocyte-colony stimulating factor receptor.
