identifier: InterPro:IPR056115
label: "Domain of unknown function DUF7698"
definition: >-
  This entry represents a domain from uncharacterised proteins found mainly in Firmicutes. It is predicted to adopt a globular structure consisting of a curved β-sheet and α-helices packed on one side of it. It contains a number of conserved aromatic hydrophobic residues, some of which are predicted to be solvent-exposed.
