identifier: InterPro:IPR042950
label: "KBTBD4, BACK domain"
definition: >-
  This entry represents the BACK domain found in KBTBD4. The function of Kelch repeat and BTB domain-containing protein 4 (KBTBD4) is not clear. It belongs to a large family of cullin-RING ubiquitin ligase adaptors that facilitate the ubiquitination of target substrates.
