identifier: InterPro:IPR057733
label: "UBE2O-like, SH3-B domain"
definition: >-
  This domain is found in the human E3-independent E2 ubiquitin-conjugating enzyme (UBE2O) and related eukaryotic proteins. The domain represented by this entry folds into an open β-barrel with typical SH3 topology. It precedes the ubiquitin-binding SH3-C domain ( ). UBE2O is involved in the monoubiquitination of diverse targets to mediate important processes such as targeting proteins for quality control, regulation of nuclear trafficking of chromatin-associated proteins and clearing ribosomes during erythropoiesis. UBE2O is a multidomain protein composed of several SH3-like domains ( , , , ), UBC domain ( ) and a CR3 helix. The CR3 helix is a conserved region that is part of a non-canonical extension to the typical E2 fold. It forms the curved edge of the hook, together with the UBC domain, which is critical for UBE20 function. This entry also includes the probable ubiquitin-conjugating enzyme E2 23/24 from Arabidopsis thaliana (UBC23/24) and similar plant proteins. UBC23 accepts the ubiquitin from the E1 complex and catalyses its covalent attachment to other proteins. UBC24 is a E2 ubiquitin-protein ligase that mediates E1-dependent protein ubiquitination.
