identifier: InterPro:IPR012811
label: "Trehalose synthase/probable maltokinase, C-terminal domain"
definition: >-
  Three pathways exist for the biosynthesis of trehalose, an osmoprotectant that in some species is also a precursor of certain cell wall glycolipids. Trehalose synthase, TreS, can interconvert maltose and trehalose, but while the equilibrium favours trehalose, physiological concentrations of trehalose may be much greater than that of maltose, and TreS may act largely in its degradation. This entry describes a domain found only as a C-terminal fusion to TreS proteins. The most closely related proteins outside this family, Pep2 of Streptomyces coelicolor and Mak1 of Actinoplanes missouriensis, have known maltokinase activity. We suggest this domain acts as a maltokinase and helps drive conversion of trehalose to maltose.
