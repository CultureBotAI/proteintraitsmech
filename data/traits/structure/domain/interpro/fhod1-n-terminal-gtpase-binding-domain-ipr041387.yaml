identifier: InterPro:IPR041387
label: "FHOD1, N-terminal GTPase-binding domain"
definition: >-
  This is the N-terminal GTPase-binding domain (GBD) of the formin homology domain-containing proteins (FHOD). This GBD is recruited by Rac and Ras GTPases in cells and plays an essential role for FHOD1-mediated actin remodelling and transcriptional activation, localizes to specific GTPases in cells, and binds to GTPases in vitro. It exhibits structural similarity to the ubiquitin superfold as found, for example, in the Ras-binding domains of c-Raf1 or PI3 kinase, but contains an unusual loop that inserts into the first FH3 repeat.
