identifier: InterPro:IPR037306
label: "TNF receptor-associated factor 1, MATH domain"
definition: >-
  TNF receptor-associated factor 1 (TRAF1) plays a role in the regulation of cell survival and apoptosis. TRAF1 is unique among TRAF proteins in that it lacks a RING domain found in the N-terminal regions of other TRAFs. The heterotrimer formed by TRAF1 and TRAF2 is part of a E3 ubiquitin-protein ligase complex that promotes ubiquitination of target proteins, such as MAP3K14. TRAF1 is unique among the TRAFs in that it lacks a RING domain, which is critical for the activation of nuclear factor-kappaB and Jun NH2-terminal kinase. Studies on TRAF1-deficient mice suggest that TRAF1 has a negative regulatory role in TNFR-mediated signaling events. TRAF1 contains one zinc finger and one TRAF domain. The TRAF domain can be divided into a more divergent N-terminal α helical region (TRAF-N), and a highly conserved C-terminal MATH subdomain (TRAF-C) with an eight-stranded β-sandwich structure. TRAF-N mediates trimerization while TRAF-C interacts with receptors.
