label: "Hydroxyacylglutathione hydrolase, C-terminal domain"
definition: >-
  This domain is found at the C terminus of hydroxyacylglutathione hydrolase enzymes. Substrate binding occurs at the interface between this domain and the catalytic domain ( ).
