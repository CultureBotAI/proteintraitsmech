identifier: InterPro:IPR002492
label: "Transposase, Tc1-like"
definition: >-
  Transposase proteins are necessary for efficient DNA transposition. This helix-turn-helix (HTH) domain is found in the amino-terminal region of Tc1, Tc1A, Tc1B and Tc2B transposases of Caenorhabditis elegans. The region encompasses the specific DNA binding and second DNA recognition domains as well as an amino-terminal region of the catalytic domain of Tc3 as described in. Tc3 is a member of the Tc1/mariner family of transposable elements.
