identifier: InterPro:IPR046712
label: "Domain of unknown function DUF6785"
definition: >-
  This presumed domain is functionally uncharacterised and it is found in bacteria. There are highly conserved sequence motifs: FSxWFF and ExxxFP. There are eleven conserved tryptophan residues, which may suggest to play an important role.
