identifier: InterPro:IPR037903
label: "MONaKA, PX domain"
definition: >-
  MONaKA (Modulator of Na,K-ATPase), also known as PXK, binds the plasma membrane ion transporter, Na,K-ATPase, and modulates its enzymatic and ion pump activities. It modulates brain Na,K-ATPase and may be involved in regulating electrical excitability and synaptic transmission. MONaKA contains an N-terminal PX domain and a C-terminal kinase domain that lacks several residues necessary for intrinsic catalytic activity. This entry represents the PX domain of MONaKA. In general, the PX domain interacts with PIs and plays a role in targeting proteins to PI-enriched membranes.
