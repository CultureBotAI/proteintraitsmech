identifier: InterPro:IPR026057
label: "Trichome birefringence-like, C-terminal domain"
definition: >-
  This entry represents a group of plant proteins from the PC-Esterase family including Arabidopsis thaliana PMR5 and a group of plant freezing resistance/cold acclimatization proteins typified by Arabidopsis thaliana ESKIMO1 (also known as XOAT1). The PC-Esterase family has features that are both similar and different from the canonical GDSL/SGNH superfamily. The members of this family are predicted to have Acyl esterase activity and predicted to modify cell-surface biopolymers such as glycans and glycoproteins. The plant family with PMR5, XOAT1, TBL3 etc have an N-terminal C rich potential sugar binding domain followed by the PC-Esterase domain. In Arabidopsis, XOAT1 catalyzes the 2-O-acetylation of xylan, followed by nonenzymatic acetyl migration to the O-3 position, resulting in products that are monoacetylated at both O-2 and O-3 positions. Its role is essential for the production of functional xylem vessels. It functions as a negative regulator of cold acclimation, and mutations in the ESK1 gene provides strong freezing tolerance.
