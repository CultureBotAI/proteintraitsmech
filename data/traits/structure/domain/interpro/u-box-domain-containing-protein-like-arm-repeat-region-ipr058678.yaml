identifier: InterPro:IPR058678
label: "U-box domain-containing protein-like, ARM repeat region"
definition: >-
  This entry represents the ARM (Armadillo) repeat region found in plant U-box domain-containing E3 ubiquitin ligases (PUB proteins) and related sequences. These proteins contain multiple ARM-like repeats that are thought to be involved in protein-protein interactions. The ARM repeats are located C-terminal to the U-box domain. Plant U-box proteins play important roles in various cellular processes including stress responses and hormone signalling pathways. The family includes proteins such as PUB12, PUB22, PUB23, PUB24 and PUB25.
