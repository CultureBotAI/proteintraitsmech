identifier: InterPro:IPR061584
label: "Domain of unknown function DUF8514"
definition: >-
  This entry represents a small helical bundle domain of approximately 60-80 residues found in spirochaetes, including Treponema and Spirochaeta species. This domain is found in multi-domain proteins and is typically located between an N-terminal domain and a C-terminal domain. The function of this domain remains to be determined.
