label: "Domain of unknown function DUF8665"
definition: >-
  This entry represents a family of small uncharacterised proteins of approximately 58 residues. The family is restricted to marine picocyanobacteria, including Prochlorococcus, Synechococcus, and Cyanobium species (Synechococcales). The function of this family remains to be determined.
