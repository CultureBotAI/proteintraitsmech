identifier: InterPro:IPR055458
label: "IFT52, GIFT domain"
definition: >-
  This domain is found in various eukaryotic and prokaryotic intra-flagellar transport proteins involved in gliding motility, as well as in several hypothetical proteins. Intraflagellar transport protein 52 homolog (IFT52) from human is included in this entry, which is essential for anterograde complex integrity and for the biosynthesis and maintenance of cilia. This domain has been described as the GIFT domain in IFT52 whose function is not yet clear.
