identifier: InterPro:IPR007191
label: "Exocyst complex component Sec8, N-terminal"
definition: >-
  Sec8 is a component of the exocyst complex, composed of Sec3, Sec5, Sec6, Sec8, Sec10, Sec15, Exo70 and Exo84, which mediates the tethering of post-Golgi secretory vesicles to the plasma membrane. The exocyst promotes the assembly of SNARE complex for membrane fusion and it is also involved in many cellular processes such as cell polarization, primary ciliogenesis, cytokinesis, pathogen invasion, tumorigenesis and metastasis. Subunits of the exocyst have a rod structure which is a shared feature for the Complex Associated with Tethering Containing Helical Rods (CATCHRs) proteins, such as those of the Conserved Oligomeric Golgi complex (COG) and Golgi-Associated Retrograde Protein complex (GARP), consisting of a N-terminal long coiled-coil followed by a region of anti-parallel short helical bundle units. This entry represents the conserved coiled-coil region at the N-terminal of Sec8 proteins, which interacts with Sec6 and form an antiparallel zipper. This zipper then interacts with that formed between Sec3-Sec5, to assemble in a four-helical bundle.
