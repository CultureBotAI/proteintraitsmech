identifier: InterPro:IPR047289
label: "Aprataxin, forkhead associated domain"
definition: >-
  This entry represents the forkhead associated (FHA) domain found at the N-terminal end of Aprataxin. The FHA domain is a small phosphopeptide recognition module. Aprataxin ( / ) is a DNA-binding protein involved in single-strand DNA break repair, double-strand DNA break repair, and base excision repair. It catalyses the release of adenylate groups covalently linked to 5'-phosphate termini, resulting in the production of 5'-phosphate termini that can be efficiently rejoined. It can also hydrolyse adenosine 5'-monophosphoramidate (AMP-NH(2)) and diadenosine tetraphosphate (AppppA), but with lower catalytic activity. Likewise, it catalyses the release of 3'-linked guanosine (DNAppG) and inosine (DNAppI) from DNA but has higher specific activity with 5'-linked adenosine (AppDNA). Mutations in the gene APTX have been associated with ataxia-ocular apraxia and with coenzyme 10 deficiency.
