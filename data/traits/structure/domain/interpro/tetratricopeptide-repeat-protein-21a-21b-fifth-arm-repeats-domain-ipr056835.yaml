identifier: InterPro:IPR056835
label: "Tetratricopeptide repeat protein 21A/21B, fifth ARM repeats domain"
definition: >-
  This is the fifth ARM-repeats domain found towards the C-terminal end of Tetratricopeptide repeat protein 21A (TTC21A) and 21B (TTC21B)from human and its homologues. TTC21A/B are intraflagellar transport (IFT)-associated proteins required for spermatogenesis. TTC21A is involved in sperm flagellar formation and intraflagellar transport. TTC21B is a component of the IFT complex A (IFT-A), which is required for retrograde ciliary transport. Intraflagellar transport (IFT) is required for cilium assembly and trafficking within cilia. Several diseases results from mutations in the TTC21B gene including nephronophthisis 12, short-rib thoracic dysplasia 4 with or without polydactyly, and Joubert syndrome 11.
