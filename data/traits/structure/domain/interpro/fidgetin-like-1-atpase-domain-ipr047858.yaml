identifier: InterPro:IPR047858
label: "Fidgetin-like 1, ATPase domain"
definition: >-
  This entry represents the ATPase domain of Fidgetin-Like 1 (FIGNL1). FIGNL1 is an ATP-dependent microtubule severing protein that plays a key role in meiotic spindle organisation. This domain correspond to the meiotic clade of AAA ATPases that includes four families: Vps4, spastin, katanin and fidgetin. These ATPases regulate diverse cellular processes, including neuronal development, cell division, and ciliogenesis. Meiotic clade AAA ATPases function as hexamers that can cycle between the active assembly and inactive monomers/dimers in a regulated process, and they appear to disassemble their polymeric substrates by translocating subunits through the central pore of their hexameric ring.
