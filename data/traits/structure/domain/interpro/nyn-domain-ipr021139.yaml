identifier: InterPro:IPR021139
label: "NYN domain"
definition: >-
  This NYN domain is found in Meiosis regulator and mRNA stability factor 1 (MARF1, also known as limkain-b1) and some bacterial sequences. The NYN domains are found in the eukaryotic proteins typified by the Nedd4-binding protein 1 and the bacterial YacP-like proteins. The NYN (for Nedd4-BP1, YacP-like Nuclease) domain shares a common protein fold with two other previously characterised groups of nucleases, namely the PIN (PilT N-terminal) and FLAP/5' --> 3' exonuclease superfamilies. These proteins share a common set of 4 acidic conserved residues that are predicted to constitute their active site. Based on the conservation of the acidic residues and structural elements it has been suggested that PIN and NYN domains are likely to bind only a single metal ion, unlike the FLAP/5' --> 3' exonuclease superfamily, which binds two metal ions. Based on conserved gene neighbourhoods the bacterial members are likely to be components of the processome/degradosome that process tRNAs or ribosomal RNAs.
