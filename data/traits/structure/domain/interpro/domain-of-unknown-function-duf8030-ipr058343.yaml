identifier: InterPro:IPR058343
label: "Domain of unknown function DUF8030"
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. These proteins contain a 100 residue long domain that forms a 6 stranded β sheet with helices packed on each side. This family has matches to halophage proteins.
