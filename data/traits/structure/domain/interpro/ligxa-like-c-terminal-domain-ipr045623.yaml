identifier: InterPro:IPR045623
label: "LigXa-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of a Rieske domain-containing oxygenase enzyme. This entry includes the 5,5'-dehydrodivanillate O-demethylase oxygenase subunit from Sphingobium, part of a three-component monooxygenase involved in the catabolism of 5,5'-dehydrodivanillate (DDVA), an intermediate in the biodegradation of lignin.
