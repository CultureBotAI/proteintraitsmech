identifier: InterPro:IPR048795
label: "PWWP domain-containing DNA repair factor 3A/3B/4, C-terminal"
definition: >-
  This entry represents the C-terminal α-helical domain from PWWP domain-containing DNA repair factor 3A/B/4 and similar animal proteins. PWWP domain-containing DNA repair factor 3A (also known as EXPAND1 or MUM1) is a nucleosome-binding protein that contributes to the maintenance of chromatin state. Through its interaction with 53BP1, it serves as an accessory factor in the DNA damage response pathway to promote chromatin change in response to DNA damage. MUM1 promotes cell survival following DNA damage, suggesting that it may facilitate DNA repair by regulating the organisation of chromatin structure.
