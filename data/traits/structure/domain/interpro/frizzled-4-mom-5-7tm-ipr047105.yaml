label: "Frizzled-4/Mom-5, 7TM"
definition: >-
  This entry represents the C-terminal transmembrane domain of Frizzled-4 from arthropods and Mom-5 from nematodes. Frizzleds are seven transmembrane-spanning proteins that constitute an unconventional class of G protein-coupled receptors. They have important regulatory roles during embryonic development. Frizzleds expose their large N terminus on the extracellular side. The N-terminal, extracellular cysteine-rich domain (CRD) has been implicated as the Wnt binding domain and its structure has been solved. The cysteine-rich domain of Frizzled (Fz) is shared with other receptor tyrosine kinases that have roles in development including the muscle-specific receptor tyrosine kinase (MuSK), the neuronal specific kinase (NSK2), and ROR1 and ROR2. The cytoplasmic side of many Fz proteins has been shown to interact with the PDZ domains of PSD-95 family members and is thought to have a role in the assembly of signalling complexes. The conserved cytoplasmic motif of Fz, Lys-Thr-X-X-X-Trp, is required for activation of the beta-catenin pathway, and for membrane localisation and phosphorylation of Dsh. In Drosophila melanogaster, the frizzled locus is involved in planar cell polarity, which is the coordination of the cytoskeleton of epidermal cells to produce a parallel array of cuticular hairs and bristles. In the wild-type wing, all hairs point towards the distal tip, whereas in Fz mutants, the orientation of individual hairs with respect both to their neighbours and to the organism as a whole is altered. In the developing wing, Fz function is required for cells to respond to the extracellular polarity signal as well as the proximal-distal transmission of an intracellular polarity signal. In Caenorhabditis elegans, protein mom-5 is the equivalent of frizzled. Three main signalling…
