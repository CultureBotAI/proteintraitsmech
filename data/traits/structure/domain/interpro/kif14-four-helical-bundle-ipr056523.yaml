identifier: InterPro:IPR056523
label: "KIF14, four-helical bundle"
definition: >-
  This is a four helical bundle domain (4HB) found in Kinesin-like protein KIF14, a microtubule motor protein that binds to microtubules with high affinity through each tubulin heterodimer and has an ATPase activity. It plays a role in many processes like cell division, cytokinesis and also in cell proliferation and apoptosis.
