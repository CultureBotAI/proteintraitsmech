identifier: InterPro:IPR063665
label: "CCDC148-like, coiled-coil"
definition: >-
  This entry represents a coiled-coil domain found in CCDC148/112 proteins in vertebrates. CCDC148/112 proteins are coiled-coil domain-containing proteins that contain multiple coiled-coil regions. The full-length of CCDC148 proteins undergo alternative splicing and show tissue enhancement in testis. The specific function of this coiled-coil domain remains to be determined.
