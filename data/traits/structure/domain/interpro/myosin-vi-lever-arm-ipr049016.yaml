identifier: InterPro:IPR049016
label: "Myosin VI, lever arm"
definition: >-
  This entry represents the lever arm from the unconventional myosin 6 proteins, the only class of myosin that has been shown to move toward the minus-end of actin filaments. This domain comprises an insert (Insert2) that binds the structural calmodulin (CaM) followed by the IQ motif and a proximal tail domain described as the lever arm extension. The lever arm amplifies the conformational changes in the motor into a movement on the order of nanometres known as the powerstroke.
