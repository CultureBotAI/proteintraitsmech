identifier: InterPro:IPR031756
label: Beta-1,3-glucan-binding protein, N-terminal
definition: >-
  This domain, also known as the recognition domain, is found at the N terminus of beta-1,3-glucan-binding proteins. It has an immunoglobulin-like β-sandwich fold composed of two antiparallel β-sheets containing three and five β-strands. Beta 1,3-glucan recognition proteins (GRP, also called Gram-negative bacteria binding proteins or GNBPs) have specific affinity for beta 1,3-glucan, a component on the surface of fungi and bacteria. Beta-GRP (beta-1,3-glucan recognition protein) is one of several pattern recognition receptors (PRRs), also referred to as biosensor proteins, that complexes with pathogen-associated beta-1,3-glucans and then transduces signals necessary for activation of an appropriate innate immune response. They are present in insects and lack all catalytic residues.
