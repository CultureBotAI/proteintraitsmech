identifier: InterPro:IPR062360
label: "LIN-5, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of LIN-5 proteins, found in nematodes. The domain is approximately 150 amino acids in length and is located at the N-terminal region of these spindle apparatus proteins. LIN-5 (Spindle apparatus protein lin-5) is essential for spindle positioning, chromosome movement, and cytokinesis. It localises to the spindle apparatus, centrosomes, and kinetochores in a cell cycle- dependent manner and interacts with GPR-1/GPR-2 complex to regulate G protein signalling and spindle function. The specific function of this domain remains to be determined.
