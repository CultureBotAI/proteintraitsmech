identifier: InterPro:IPR032104
label: Spaetzle
definition: >-
  Spaetzle is a nerve growth factor-like ligands for the Toll receptor and is required in the pathway that establishes the dorsal-ventral pattern of the embryo. It forms a cystine knot structure.
