identifier: InterPro:IPR049388
label: "Fibrillin, first EGF domain"
definition: >-
  Fibrillins are the primary constituents of the microfibrills in the extracellular matrix of many elastic and non-elastic connective tissues. They consist of an N-terminal fibrillin unique domain (FUN) ( ) and several calcium-binding epidermal growth factor-like (cbEGF-like) domains. This entry represents the first EGF-like domain which together with FUN, contributes to the binding to cbEGFs. Members of this group are mainly found in mammals, fish and birds.
