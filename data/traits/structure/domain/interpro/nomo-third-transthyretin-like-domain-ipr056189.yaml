identifier: InterPro:IPR056189
label: "NOMO, third transthyretin-like domain"
definition: >-
  This domain is found in NOMO family of proteins which has a weak sequence similarity to transthyretin-like domains and it is predicted to adopt similar structure that consists of seven-stranded β-sandwich. NOMO are predicted to contain a tandem of twelve transthyretin-like domains and this domain is the third in the tandem. NOMO family of proteins includes NOMO1, NOMO2, NOMO3. These proteins are components of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes. They play an important role in the protein topogenesis and cells lacking these components show reduced multipass protein stability. NOMO proteins are multidomain proteins.
