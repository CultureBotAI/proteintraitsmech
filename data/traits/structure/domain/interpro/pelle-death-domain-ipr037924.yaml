identifier: InterPro:IPR037924
label: "Pelle, death domain"
definition: >-
  This entry represents the death domain (DD) of the protein kinase Pelle from Drosophila melanogaster and similar proteins. In Drosophila, interaction between the DDs of Tube and Pelle is an important component of the Toll pathway, which functions in establishing dorsoventral polarity in embryos and in mediating innate immune responses to pathogens. Tube and Pelle transmit the signal from the Toll receptor to the Dorsal/Cactus complex. Pelle also functions in photoreceptor axon targeting. DDs (Death domains) are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes.
