identifier: InterPro:IPR048819
label: "Xaa-Pro dipeptidase, N-terminal domain"
definition: >-
  This domain is found in Xaa-Pro dipeptidase from Escherichia coli (PepQ), a metalloprotease that catalyse the cleavage of Xaa-Pro dipeptides. This protein is organised into N-terminal (this entry) and C-terminal (usually ) domains and adopts a dimeric configuration. This domain shows an α-β structure with four helices, one pair flanking each side of the six-stranded mixed β-sheet.
