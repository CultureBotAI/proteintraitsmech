identifier: InterPro:IPR043605
label: "DUF883, C-terminal domain"
definition: >-
  This entry represents the C-terminal presumed transmembrane helix found in a group of bacterial proteins, including ElaB, YgaM and YqjD from Escherichia coli. The helix contains a glycine zipper motif suggestive of dimerisation. YqjD is an inner membrane and ribosome binding protein expressed during the stationary growth phase. It is possible that YqjD inactivates ribosomes by localizing a part of the ribosome to the membrane during the stationary phase. Its expression is regulated by stress response sigma factor RpoS. The two paralogues of YqjD, ElaB and YgaM, are expressed and bind to ribosomes in a similar manner to YqjD. These proteins may have important cellular roles during the stress response. ElaB has been shown to protect cells against oxidative and heat shock stress.
