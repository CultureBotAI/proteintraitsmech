identifier: InterPro:IPR041717
label: "FwdD/FmdC, molybdopterin dinucleotide-binding domain"
definition: >-
  This entry represents the C terminus of subunit C of molybdenum formylmethanofuran dehydrogenase (FmdC) and subunit D of tungsten formylmethanofuran dehydrogenase (FwdD), and other related proteins from Archaea. Formylmethanofuran dehydrogenase catalyzes the first step in methane formation from CO2 in methanogenic archaea and some eubacteria. This domain is of the conserved molybdopterin-binding C-terminal (MopB_CT) region present in many, but not all, MopB homologues.
