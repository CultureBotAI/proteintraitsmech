identifier: InterPro:IPR014239
label: Sporulation protein YpeB, PepSY1 and PepSY2 domains
definition: >-
  Proteins in this entry include the sporulation protein YpeB from Bacillus subtilis. YpeB and the spore-cortex-lytic enzyme SleB are required for normal germination. These proteins are restricted to endospore-forming species in the Firmicutes lineage of bacteria, and have been found in all such species to date except Clostridium perfringens. This protein is essential in stabilising SleB enzyme in Bacillus spores and may regulate its activity during spore germination. It consists of three tandemly repeated PepSY domains at the C-terminal, being the first two (PepSY1 and PepSY2) represented in this entry and the last one in .
