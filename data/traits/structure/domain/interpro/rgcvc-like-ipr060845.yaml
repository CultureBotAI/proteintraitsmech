identifier: InterPro:IPR060845
label: RGCVC-like
definition: >-
  This entry represents small proteins, averaging just over 60 amino acids in length, has conspicuous motifs CxxCxH, HD, and RGCVC. The last motif, for which this entry is named, is distinctive. This entry appears in GC-rich bacteria. The function is unknown.
