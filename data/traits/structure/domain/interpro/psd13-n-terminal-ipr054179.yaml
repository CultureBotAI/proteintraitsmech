identifier: InterPro:IPR054179
label: "PSD13, N-terminal"
definition: >-
  This entry represents the N-terminal domain of PSD13 from human and its orthologues from yeast, RPN9, consisting of helical repeats. These proteins are a component of the 26S proteasome, a multiprotein complex involved in the ATP-dependent degradation of ubiquitinated proteins. This domain mediates interaction with the ubiquitin receptor Rpn10 (also known as PSMD4 in human).
