identifier: InterPro:IPR063763
label: "CLU5d, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of CLU5d (pathogenicity cluster 5 protein d), a secreted fungal protein. CLU5d is required for appressorial penetration of intact host epidermal cells and for pathogenicity in the maize anthracnose fungus Colletotrichum graminicola. Proteins containing this domain are found in Dikarya fungi including Ascomycota and Basidiomycota but also in some actinomycetes. This domain is typically found in combination with the CLU5d C-terminal domain ( ). The specific function of this N-terminal domain remains to be determined.
