identifier: InterPro:IPR056737
label: "Attractin/MKLN-like, beta-propeller domain"
definition: >-
  This entry represents the β-propeller domain (made up of Kelch repeats) found in attractin (ATRN), muskelin (MKLN), among others. ATRN is involved in the initial immune cell clustering during inflammatory response and may regulate chemotactic activity of chemokines. It may play a role in melanocortin signalling pathways that regulate energy homeostasis and hair colour. It was thought to have dipeptidase activity but it was shown later to lack that activity. Muskelin is a component of the CTLH E3 ubiquitin-protein ligase complex that selectively accepts ubiquitin from UBE2H and mediates ubiquitination and subsequent proteasomal degradation of the transcription factor HBP1. It also acts as a mediator of cell spreading and cytoskeletal responses to the extracellular matrix component THBS1. This domain can be found in a number of other proteins, such as KLH25, a substrate-specific adapter of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex involved in various processes, such as translation homeostasis and lipid synthesis.
