label: "AF-10/AF-17, PHD finger"
definition: >-
  This entry represents the PHD finger from AF10, its homologues and AF17. This entry includes AF10 (ALL1-Fused gene from chromosome 10 protein) from mammals, its homologue from C. elegans, zinc finger protein ZPF-1 and AF-17 (also termed ALL1-fused gene from chromosome 17 protein). AF-10/AF-17 have been identified in hematological malignancies as translocation partners of the mixed-lineage leukemia gene (MLL) which functions in acute myeloid leukemia (ALL); chromosomal translocations of MLL1 generate oncogenic chimeric proteins, containing the non-catalytic N-terminal portion of MLL1 fused with many partners. AF-10 plays a key role in the survival of uncommitted hematopoietic cells. The MLL-AF10 fusion oncoprotein recruits DOT1L (disruptor of telomeric-silencing 1-like) to the homeobox A. The aberrant recruitment of DOT1L, a histone methyltransferase that methylates H3 lysine residues (H3K79), by MLL fusions and the resulting H3K79 methylation are thought to affect gene expression by altering chromatin accessibility. AF10 and DOT1L interact through their coiled coil domains. AF-10 also functions as a follistatin-related gene (FLRG)-interacting protein. The interaction with FLRG enhances AF10-dependent transcription. It also interacts with the synovial sarcoma associated protein SYT protein and may play a role in synovial sarcomas and acute leukemias. AF-17 is a putative transcription factor that may play a role in multiple signalling pathways. It is involved in chromatin-mediated gene regulation mechanisms. It functions as a component of the multi-subunit Dot1 complex (Dotcom) and plays a role in the Wnt/Wingless signalling pathway. It also seems to be a downstream target of the beta-catenin/T-cell factor pathway, and participates in G2-M progression. Moreover, it may f…
