label: "Calcium homeostasis endoplasmic reticulum protein, DUF7819"
definition: >-
  This domain is found towards the C-terminal end of human Calcium homeostasis endoplasmic reticulum protein (CHERP), which is involved in calcium homeostasis, growth and proliferation. This domain is usually found associated with . Its specific function is unknown. It shows highly conserved GWE and GLYE/DxY/F motifs.
