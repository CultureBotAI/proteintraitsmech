identifier: InterPro:IPR063637
label: "CABIN1, middle domain"
definition: >-
  This entry represents the middle TPR-containing region of calcineurin-binding protein 1 (CABIN1) in plants. CABIN1 is a component of the HIRA complex, which also includes UBN1, UBN2, ASF1A and HIRA. The HIRA complex is involved in replication-independent chromatin assembly and deposition of histone H3.3. CABIN1 proteins contain multiple TPR repeats and an HIR3_bundle domain ( ).
