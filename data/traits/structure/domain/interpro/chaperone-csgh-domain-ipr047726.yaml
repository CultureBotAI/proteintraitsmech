identifier: InterPro:IPR047726
label: "Chaperone CsgH domain"
definition: >-
  This entry represents a domain found in CsgH homologues. The designation CsgH was given to a broad set of homologues, found outside the Enterobacteriales, of the curli amyloid fibre formation periplasmic chaperone CsgC from species such as Escherichia coli and Salmonella. The homologous CsgH and CsgC proteins adopt the same fold with a typical Ig-like topology of the β-sandwich.
