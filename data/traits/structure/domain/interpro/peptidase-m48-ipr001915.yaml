identifier: InterPro:IPR001915
label: Peptidase M48
definition: >-
  This entry represents the largely extracellular catalytic region of CAAX prenyl protease homologues such as Human FACE-1 protease. These are metallopeptidases, with the characteristic HExxH motif giving the two histidine-zinc-ligands and an adjacent glutamate on the next helix being the third. The whole molecule folds to form a deep groove/cleft into which the substrate can fit. This group of metallopeptidases belong to MEROPS peptidase family M48. Proteins with this domain are mostly described as probable protease htpX homologue ( ) or CAAX prenyl protease 1, which proteolytically removes the C-terminal three residues of farnesylated proteins. They are integral membrane proteins associated with the endoplasmic reticulum and Golgi, binding one zinc ion per subunit.
