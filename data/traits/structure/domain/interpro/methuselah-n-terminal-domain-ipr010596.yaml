identifier: InterPro:IPR010596
label: "Methuselah, N-terminal domain"
definition: >-
  Drosophila Methuselah (Mth) mutants have a 35% increase in average lifespan and increased resistance to several forms of stress, including heat, starvation, and oxidative damage. The protein affected by this mutation is related to G protein-coupled receptors of the secretin receptor family. Mth, like secretin receptor family members, has a large N-terminal ectodomain, which may constitute the ligand binding site. This entry represents the N-terminal domain of the Methuselah protein.
