identifier: InterPro:IPR058808
label: "ADGRA2/3, GAIN domain"
definition: >-
  This predicted GAIN domain is found in human Adhesion G protein-coupled receptor A2/3 (ADGRA2/3) and similar animal proteins. ADGRA2 is an endothelial receptor which functions together with RECK to enable brain endothelial cells to selectively respond to Wnt7 signals. ADGRA3 is an orphan receptor that may have a role in planar cell polarity pathway.
