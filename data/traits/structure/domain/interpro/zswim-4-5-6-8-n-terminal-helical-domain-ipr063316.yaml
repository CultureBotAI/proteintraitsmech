identifier: InterPro:IPR063316
label: "ZSWIM 4/5/6/8, N-terminal helical domain"
definition: >-
  This entry represents a small N-terminal helical domain of approximately 50 residues found in zinc finger SWIM domain-containing proteins ZSWIM4, ZSWIM5, ZSWIM6, and ZSWIM8. This domain is located N-terminal to the SWIM zinc finger domain. ZSWIM8 is a substrate recognition component of an SCF-like E3 ubiquitin-protein ligase complex that promotes target-directed microRNA degradation (TDMD). ZSWIM6 is involved in nervous system development. Mutations in ZSWIM6 cause neurodevelopmental disorder with movement abnormalities (NEDMAGA). This family is found in metazoans. The function of this domain remains to be determined.
