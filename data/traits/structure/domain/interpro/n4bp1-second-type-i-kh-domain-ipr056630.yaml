identifier: InterPro:IPR056630
label: "N4BP1, second type I KH-domain"
definition: >-
  This domain is found in the N4BP1 family which includes NEDD4-binding protein 1, KHNYN, NYNRIN and other related proteins. Members of this family contain two type I K homology (KH) domains. This entry represents the second KH domain. Besides the typical for the KH domains secondary structures and topology, this domain contains a C-terminal extension consisting of three α-helices that define a small helical bundle domain. N4BP1 is a potent suppressor of cytokine production that acts as a regulator of innate immune signalling and inflammation. It acts as a restriction factor against some viruses, such as HIV-1. N4BP1 restricts HIV-1 replication by binding to HIV-1 mRNAs and mediating their degradation via its ribonuclease activity.
