identifier: InterPro:IPR056306
label: "CFAP74, second Ig-like domain"
definition: >-
  This entry represents the second Ig-like domain of CFAP74, a protein that is part of the central apparatus of the cilium axoneme and may play a role in cilium movement. It may play an important role in sperm architecture and function. Members of this entry are specific to animals.
