identifier: InterPro:IPR030607
label: "Kelch-like protein 40, BTB/POZ domain"
definition: >-
  Kelch-like protein 40 (KLHL40, also known as Kbtbd5) belongs to the KLHL family. Mutations in the KLHL40 gene cause severe autosomal-recessive nemaline myopathy, which is a congenital myopathy that can result in lethal muscle dysfunction. Kbtbd5 may serve as an adapter in the Cul3-dependent ubiquitin ligase complex during myogenic differentiation. The KLHL (Kelch-like) proteins generally have a BTB/POZ domain, a BACK domain, and five to six Kelch motifs. They constitute a subgroup at the intersection between the BTB/POZ domain and Kelch domain superfamilies. The BTB/POZ domain facilitates protein binding, while the Kelch domain (repeats) form β-propellers. The Kelch superfamily of proteins can be subdivided into five groups: (1) N-propeller, C-dimer proteins, (2) N-propeller proteins, (3) propeller proteins, (4) N-dimer, C-propeller proteins, and (5) C-propeller proteins. KLHL family members belong to the N-dimer, C-propeller subclass of Kelch repeat proteins. In addition to BTB/POZ and Kelch domains, the KLHL family members contain a BACK domain, first described as a 130-residue region of conservation observed amongst BTB-Kelch proteins. Many of the Kelch-like proteins have been identified as adaptors for the recruitment of substrates to Cul3-based E3 ubiquitin ligases. This entry represents the BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain of KLHL40.
