identifier: InterPro:IPR060459
label: "Rv2311, SH3-like barrel domain"
definition: >-
  This entry represents an SH3-like barrel domain found in uncharacterised proteins from Mycobacterium species, including Rv2311 from M. tuberculosis and orthologues in M. bovis. These proteins show structural similarity to P-loop containing nucleotide triphosphate hydrolases and contain domains similar to RecD-like proteins. The SH3-like barrel fold may facilitate protein-protein interactions or contribute to nucleotide binding activity. The specific function of this domain is unknown.
