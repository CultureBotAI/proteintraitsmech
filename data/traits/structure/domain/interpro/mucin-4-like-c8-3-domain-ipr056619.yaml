identifier: InterPro:IPR056619
label: "Mucin-4-like, C8-3 domain"
definition: >-
  This domain is found in human Mucin-4 (MUC4) and related proteins, including SUSD2 and MESH. It is usually found next to VWD domain ( ). Despite lack of sequence similarity, it is predicted to adopt similar structure to the C8-3 domain of MUC2, consisting of three α-helical bundle. This domain contains two highly conserved cysteine residues and these may engage in disulfide bond formation. MUC4 is a membrane-bound mucin which belongs to a family of highly glycosylated proteins that constitute the major component of the mucus.
