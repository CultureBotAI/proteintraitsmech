identifier: InterPro:IPR057562
label: "Tli3-like domain"
definition: >-
  This entry represents a domain found in the type VI secretion system (T6SS) Tli3 immunity protein from adherent-invasive Escherichia coli and related proteobacterial proteins. Some members have a lipoprotein lipid attachment site. Tli3 is an outer membrane lipoprotein and a cognate immunity protein of T6SS Tle3 phospholipase effector. Tli3 and Tle3 form a stable complex in which a loop of Tli3 inserts deeply in the Tle3 substrate-binding pocket and thus inhibiting its function. Tli3 folds into an all-β structure composed of three stacked β-sheets, two of which are resembling a β-sandwich while the third packs on its edge.
