identifier: InterPro:IPR056746
label: "Surface presentation of antigen domain"
definition: >-
  Surface presentation of antigens protein (SPAN), also know as invasion protein invJ, is a Salmonella secretory pathway protein involved in presentation of determinants required for mammalian host cell invasion. This entry represents a C-terminal domain found in these proteins. This domain is predicted to be composed of a 4-stranded β sheet followed by an α helix.
