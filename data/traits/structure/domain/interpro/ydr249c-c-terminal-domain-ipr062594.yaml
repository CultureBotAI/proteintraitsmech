label: "YDR249C, C-terminal domain"
definition: >-
  This entry represents the TPR C-terminal domain found in uncharacterised proteins from fungi. YDR249C is an uncharacterised protein from Saccharomyces cerevisiae with no experimentally determined function. The specific function of this N-terminal domain remains to be determined.
