identifier: InterPro:IPR054485
label: "Fluoroacetyl-CoA-specific thioesterase-like domain"
definition: >-
  This entry includes fluoroacetyl-CoA-specific thioesterases (FlK), which catalyses the hydrolysis of fluoroacetyl-coenzyme A and provides an effective self-defence mechanism, preventing any fluoroacetyl-coenzyme A formed from being further metabolized to 4-hydroxy-trans-aconitate, an inhibitor of TCA cycle. This entry represents a HotDog domain that in FIK covers the full length, while in some other members of this entry, this domain can be found in association with other domains, such as .
