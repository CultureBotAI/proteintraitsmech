identifier: InterPro:IPR055357
label: "At1g61320/AtMIF1, LRR domain"
definition: >-
  This entry represents the leucine-rich repeats (LRR) mainly found in plant proteins, such as At1g61320 and At1g61330 from Arabidopsis thaliana, which are F-box/LRR-repeat containing proteins involved in the ubiquitin-proteasome pathway. They function as components of SCF (SKP1-CUL1-F-box protein) E3 ubiquitin ligase complexes. They have a F-box domain at the N-terminal ( ). AtMIF1 (also known as F-box protein AT3G62230) from Arabidopsis, physically interacts with MYB domain protein 5 (MYB5), which results in MYB5 degradation representing a new regulatory pathway, 26S proteasome-AtMIF1-MYB5 that regulates oil content of seeds, increasing their oil content without affecting plant growth.
