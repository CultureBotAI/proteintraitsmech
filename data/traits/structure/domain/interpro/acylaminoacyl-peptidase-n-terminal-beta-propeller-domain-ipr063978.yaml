identifier: InterPro:IPR063978
label: "Acylaminoacyl-peptidase, N-terminal beta-propeller domain"
definition: >-
  This is the N-terminal β-propeller domain of the putative Acylaminoacyl-peptidase ApeH-3 from Saccharolobus solfataricus , a stress-regulated protein that catalyses the removal of acetylated amino acid residues from the N-terminal of oligopeptides. This entry also includes bacteria-related proteins that also contain a β-propeller domain, including the uncharacterised peptidase YuxL. In some bacterial proteins, this domain and cover the entire β-propeller.
