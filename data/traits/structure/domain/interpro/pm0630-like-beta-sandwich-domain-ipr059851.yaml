identifier: InterPro:IPR059851
label: "PM0630-like, beta-sandwich domain"
definition: >-
  This entry represents a small β-sandwich domain that comprises most of the PM0630 protein. PM0630 is an uncharacterised protein found in Pasteurella multocida. The protein contains a signal peptide suggesting it is secreted. PM0630 is encoded by the gene PM0630 on the P. multocida chromosome. The function of this protein remains to be determined.
