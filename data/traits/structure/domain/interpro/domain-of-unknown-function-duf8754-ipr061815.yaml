label: "Domain of unknown function DUF8754"
definition: >-
  This entry represents a C-terminal domain of approximately 200 residues found in proteins annotated as quinate 5-dehydrogenase. Structure prediction suggests a Rossmann-like fold. This family is found in bacteria, predominantly Bacillota (especially Clostridia) and Pseudomonadota. The function of this domain remains to be determined.
