identifier: InterPro:IPR013117
label: "Intimin, C-terminal"
definition: >-
  This domain is found at the C terminus of intimin. Its structure has been solved and shown to have a C-lectin type of structure. Intimin is a bacterial adhesion molecule involved in intimate attachment of enteropathogenic and enterohemorrhagic Escherichia coli to mammalian host cells. Intimin targets the translocated intimin receptor (Tir), which is exported by the bacteria and integrated into the host cell plasma membrane.
