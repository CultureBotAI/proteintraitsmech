identifier: InterPro:IPR001567
label: "Peptidase M3A/M3B catalytic domain"
definition: >-
  This group of metallopeptidases belong to MEROPS peptidase family M3 (clan MA(E)), subfamilies M3A and M3B. The protein fold of the peptidase domain for members of this family resembles that of thermolysin, the type example for clan MA. The Thimet oligopeptidase family, is a large family of archaeal, bacterial and eukaryotic oligopeptidases that cleave medium sized peptides. The group contains: Mitochondrial intermediate peptidase ( ) Neurolysin, mitochondrial precursor, ( ) Thimet oligopeptidase ( ) Dipeptidyl carboxypeptidase ( ) Oligopeptidase A ( ) Oligoendopeptidase F
