identifier: InterPro:IPR011564
label: "Telomeric single stranded DNA binding POT1/Cdc13"
definition: >-
  This domain binds single stranded telomeric DNA and adopts an OB fold. It includes the proteins POT1 and Cdc13 which have been shown to regulate telomere length, replication and capping. POT1 is one component of the shelterin complex that protects telomere-ends from attack by DNA-repair mechanisms.
