identifier: InterPro:IPR007889
label: "DNA binding HTH domain, Psq-type"
definition: >-
  The psq-type HTH domain is a DNA-binding, helix-turn-helix (HTH) domain of about 50 amino acids present in eukaryotic proteins of the Pipsqueak family. This family is named after the Drosophila pipsqueak protein, containing a DNA-binding domain that consists of four tandem repeats of the psq motif. Proteins of the Pipsqueak family occur in vertebrates, insects, nematodes, and fungi.
