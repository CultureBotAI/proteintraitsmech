identifier: InterPro:IPR062819
label: YoqE
definition: >-
  This entry represents YoqE from the SPbeta prophage of Bacillus subtilis. The protein is found in proteins across diverse bacterial groups including Bacillales, Eubacteriales, and Burkholderiales. The function of this protein remains to be determined. This entry can also cover the N-terminal in some uncharacterised bacterial proteins.
