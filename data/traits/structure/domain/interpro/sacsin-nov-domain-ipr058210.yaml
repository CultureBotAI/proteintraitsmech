identifier: InterPro:IPR058210
label: "Sacsin/Nov domain"
definition: >-
  This domain is found three times in human Sacsin (SACS) and similar proteins mainly found in eukaryotes. SACS is a co-chaperone which acts as a regulator of the Hsp70 chaperone machinery and may be involved in the processing of other ataxia-linked proteins. This domain is also found once in Protein NO VEIN from Arabidopsis thaliana (Nov), which is required for cell fate determination during embryogenesis and mediates auxin-dependent coordinated cell-fate specification and patterning in embryos, shoots and roots.
