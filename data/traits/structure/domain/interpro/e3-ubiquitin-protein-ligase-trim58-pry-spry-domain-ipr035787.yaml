identifier: InterPro:IPR035787
label: "E3 ubiquitin-protein ligase TRIM58, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of Trim58, also known as BIA2. TRIM proteins are defined by the presence of the tripartite motif RING/B-box/coiled-coil region, and are also known as RBCC proteins. Trim58 has been implicated by genome-wide association studies (GWAS) in the regulation of erythrocyte traits, including cell size and number. Trim58 facilitates erythroblast enucleation by inducing proteolytic degradation of the microtubule motor dynein.
