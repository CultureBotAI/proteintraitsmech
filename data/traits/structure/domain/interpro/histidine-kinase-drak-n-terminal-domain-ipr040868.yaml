identifier: InterPro:IPR040868
label: "Histidine kinase DraK, N-terminal domain"
definition: >-
  This is the N-terminal domain found in DraK Histidine Kinase (HK) present in Streptomyces coelicolor (SCO3062). Activation of the DraK HK leads to autophosphorylation of its kinase domain in the cytoplasm and subsequent transphosphorylation of DraR promoting blue-pigmented polyketide actinorhodin (ACT) production. The N-terminal domain is known as the sensor (or input) domain and undergoes a conformational change resulting in phosphorylation of a conserved histidine in its cytoplasmic kinase domain.
