identifier: InterPro:IPR060052
label: "Synaptosomal-associated protein 47, PH-like domain"
definition: >-
  This entry represents the second PH-like domain found in synaptosomal-associated protein 47 (SNAP-47). SNAP47 is a SNARE protein that may play a role in intracellular membrane fusion and is involved in synaptic vesicle priming and exocytosis. The protein associates with the BLOC-1 complex and forms complexes with VAMP2 and STX1A. SNAP47 is ubiquitously expressed with highest levels in brain tissue, particularly in the glomerular layer of the olfactory bulb, cortex, striatum, hippocampus, and colliculi. The protein is localised to the endomembrane system and perinuclear region of the cytoplasm. The specific function of this PH-like domain remains to be determined.
