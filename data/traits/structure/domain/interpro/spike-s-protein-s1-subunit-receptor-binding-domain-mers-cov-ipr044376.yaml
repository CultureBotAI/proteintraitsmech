identifier: InterPro:IPR044376
label: "Spike (S) protein S1 subunit, receptor-binding domain, MERS-CoV"
definition: >-
  The CoV Spike (S) protein is an envelope glycoprotein that plays the most important role in viral attachment, fusion, and entry into host cells, and serves as a major target for the development of neutralizing antibodies, inhibitors of viral entry, and vaccines. It is synthesised as a precursor protein that is cleaved into an N-terminal S1 subunit (~700 amino acids) and a C-terminal S2 subunit (~600 amino acids) that mediates attachment and membrane fusion, respectively. Three S1/S2 heterodimers assemble to form a trimer spike protruding from the viral envelope. The S1 subunit contains a receptor-binding domain (RBD), while the S2 subunit contains a hydrophobic fusion peptide and two heptad repeat regions. S1 contains two structurally independent domains, the N-terminal domain (NTD) and the C-terminal domain (C-domain). Depending on the virus, either the NTD or the C-domain can serve as the receptor-binding domain (RBD). Most CoVs, including SARS-CoV-2, SARS-CoV, and MERS-CoV use the C-domain to bind their receptors. However, CoV such as mouse hepatitis virus (MHV) uses the NTD to bind its receptor, mouse carcinoembryonic antigen related cell adhesion molecule 1a (mCEACAM1a). The S1 NTD contributes to the Spike trimer interface. This entry represents the RDB domain of Spike protein S1 subunit from MERS-CoV. MERS-CoV causes severe pulmonary disease in humans. It binds to its receptor, human dipeptidyl peptidase 4 (DPP4), also called CD26, through the RBD of its S1 subunit and then fuses viral and host membranes through its S2 subunit. The RBD consists of a core subdomain and a unique strand-dominated external receptor binding motif (RBM) that recognises blades IV and V of the CD26 β-propeller.
