identifier: InterPro:IPR056442
label: "Glucosamine inositolphosphorylceramide transferase 1, N-terminal"
definition: >-
  This is the N-terminal domain of Glucosamine inositolphosphorylceramide transferase 1 from Arabidopsis thaliana (GINT1), a member of the Glycosyltransferase Family 64 that is involved in glycosylinositolphosphorylceramide and sphingolipid glycosylation. This domain is predicted to adopt a five-bladed β-propeller fold.
