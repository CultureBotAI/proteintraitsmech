identifier: InterPro:IPR060215
label: "MJ1155-like, helical domain"
definition: >-
  This entry represents a helical domain covering the whole length of MJ1155 and related small membrane protein found in archaea and bacteria. This domain is found in diverse lineages including Archaeoglobaceae, Methanocaldococcaceae in archaea and various bacterial groups such as Bacillaceae and Oceanospirillales. The proteins contain multiple transmembrane helices, indicating they are integral membrane proteins. Some members belong to the AzlC family involved in branched-chain amino acid transport. This domain also covers the C-terminal in Uncharacterized protein AF_1755 from Archaeoglobus fulgidus.
