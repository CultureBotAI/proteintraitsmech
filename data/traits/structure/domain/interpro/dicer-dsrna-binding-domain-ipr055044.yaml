identifier: InterPro:IPR055044
label: "Dicer, dsRNA-binding domain"
definition: >-
  This domain is found at the C-terminal end of Protein Dicer from Schizosaccharomyces pombe (Dcr1) and similar sequences from Schizosaccharomyces species. Dcr1 processes double-stranded RNA (dsRNA) precursors endonucleolytically. This domain adopts an extended dsRNA binding domain fold that embeds a zinc-binding motif ( ).
