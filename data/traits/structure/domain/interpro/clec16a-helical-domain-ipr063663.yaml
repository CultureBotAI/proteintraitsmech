identifier: InterPro:IPR063663
label: "CLEC16A, helical domain"
definition: >-
  This is a central α-solenoid domain of C-type lectin entry 16, member A (CLEC16A), which is the orthologue of Drosophila Ema and GOP-1 in C. elegans. CLEC16A is an evolutionarily conserved endosomal membrane protein required for trafficking of fluid-phase and receptor-mediated endocytic cargos. It is required for mitophagy, autophagy and endosome maturation. This protein has been identified as a susceptibility gene for autoimmune diseases like type 1 diabetes, multiple sclerosis and adrenal dysfunction.
