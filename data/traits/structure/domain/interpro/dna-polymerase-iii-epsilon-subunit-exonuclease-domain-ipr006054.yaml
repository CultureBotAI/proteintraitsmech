identifier: InterPro:IPR006054
label: "DNA polymerase III epsilon subunit, exonuclease domain"
definition: >-
  All proteins in this entry for which functions are known are components of the DNA polymerase III complex (epsilon subunit). There is, however, an outgroup that includes paralogs in some gammaproteobacteria and the N-terminal region of DinG from some low GC Gram-positive bacteria.
