identifier: InterPro:IPR043266
label: "Ring-hydroxylating dioxygenase, alpha subunit NdoB-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the large subunit (NdoB) of naphthalene 1,2-dioxygenase (NDO) and related aromatic ring hydroxylating dioxygenases. The ring-hydroxylating oxygenase components are oligomers, either (alpha)n or (alpha)n(beta)n. The alpha subunits are the catalytic components and have an N-terminal domain, which binds a Rieske-like 2Fe-2S cluster, and a C-terminal domain which binds the non-heme Fe2. The Fe2 is co-ordinated by conserved His and Asp residues. This entry also includes BphA1 from Rhodococcus jostii, DntAc from Burkholderia sp., and HcaE from Escherichia coli.
