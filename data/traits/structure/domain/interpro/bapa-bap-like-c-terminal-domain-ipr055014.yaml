identifier: InterPro:IPR055014
label: "BapA/Bap-like, C-terminal domain"
definition: >-
  This entry represents a conserved C-terminal region shared by a number of large adhesins of Gram-negative genera mainly from gammaproteobacteria. Most members of this entry have repeat domains N-terminal to the region described here, including bacterial Ig-like domains. Notable members of the family include biofilm-associated protein BapA of Salmonella ( ,) and biofilm-associated Ig-like repeat protein Bap from Acinetobacter baumannii ( ,).
