identifier: InterPro:IPR015117
label: Ig protease IdeS
definition: >-
  IdeS from Streptococcus pyogenes, also known as Mac-1, is an endopeptidase with specificity for IgG. The bacterial protein Mac-1 adopts an α/β fold, with 14 β strands and 9 α helices . The N-terminal domain is made up predominantly of α helices, whereas the C-terminal domain consists predominantly of β sheets. Mac 1 blocks polymorphonuclear opsonophagocytosis, inhibits the production of reactive oxygen species and contains IgG endopeptidase activity.
