identifier: InterPro:IPR054525
label: "DEAD box helicase Hera, RNA-binding domain"
definition: >-
  This entry represents the RNA binding domain found at the C-terminal end of DEAD box helicase Hera from Thermus thermophilus and similar proteins from Deinococci. This domain, which is located C-terminal to the dimerisation domain ( ), is responsible for binding of Hera to 23S rRNA. It consists of a central four-stranded β-sheet, flanked by an α-helix, and a long loop connecting β-strands 3 and 4 that replaces helix α2 present in the canonical RNA recognition motif (RRM).
