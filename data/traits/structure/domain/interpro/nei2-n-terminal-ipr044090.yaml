identifier: InterPro:IPR044090
label: Nei2, N-terminal
definition: >-
  This entry represents the N-terminal domain of the actinomycetal protein Nei2, which is a homologue of Endonuclease 8 (also known as Nei) from E. coli. Nei is a bacterial enzyme with DNA N-glycosylase and abasic site lyase (AP1 lyase) activities, participates in base excision repair of oxidatively generated DNA damage. Nei removes oxidatively damaged pyrimidines from substrate DNA and serves as a back-up for endonuclease III. Similar to Nei, Mycobacterium tuberculosis Nei2 (MtuNei2) is functionally active in vivo and recognises both guanine and cytosine oxidation products.
