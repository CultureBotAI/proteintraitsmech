identifier: InterPro:IPR015392
label: "TehB/YeaR-like domain"
definition: >-
  This domain, previously known as DUF1971, is found at the N-terminal end of the probable S-adenosyl-L-methionine-dependent methyltransferase TehB from Haemophilus influenzae and similar bacterial Tellurite resistance proteins and covering almost the whole length of the sequence in YeaR from Escherichia coli and other uncharacterised proteins. TehB plays a role in both resistance to oxidative damage and haem uptake/utilisation, and is important for virulence of this organism in an animal model of invasive disease. It also protects H.influenzae from tellurite exposure in vitro. In Escherichia coli, TehB is thought to utilise a methyltransferase activity in the detoxification of tellurite. In these proteins, this domain is found associated to . Proteins in this entry are found in bacteria.
