identifier: InterPro:IPR054756
label: "Tubulin-like protein TubZ, C-terminal domain, clostridia-type"
definition: >-
  This domain is found at the C-terminal end of Tubulin-like protein TubZ from Clostridium botulinum C phage and similar sequences found in tailed bacteriophages and prophages from Clostridium species. TubZ is a tubulin-like, filament forming GTPase. This protein adopts a tubulin/FtsZ protein family fold organised into two domains, a canonical N-terminal GTP-binding domain, and a C-terminal GTPase domain (this entry).
