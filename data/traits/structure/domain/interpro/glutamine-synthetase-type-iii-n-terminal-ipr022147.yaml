identifier: InterPro:IPR022147
label: "Glutamine synthetase type III N-terminal"
definition: >-
  This domain is found in the N terminus of glutamine synthetase type III in bacteria and eukaryotes, and is approximately 160 amino acids in length. It is found in association with . Glutamine synthetase type III is one of the enzymes responsible for generation of glutamine through conversion glutamate to glutamine by the incorporation of ammonia (NH3).
