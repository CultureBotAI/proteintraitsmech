identifier: InterPro:IPR057978
label: "Dynein axonemal assembly factor 5, TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found towards the N-terminal end of human Dynein axonemal assembly factor 5 (DNAAF5) and similar eukaryotic proteins. DAAF5 is a cytoplasmic protein involved in the delivery of the dynein machinery to the motile cilium. It is required for the assembly of the axonemal dynein inner and outer arms, two structures attached to the peripheral outer doublet A microtubule of the axoneme, that play a crucial role in cilium motility.
