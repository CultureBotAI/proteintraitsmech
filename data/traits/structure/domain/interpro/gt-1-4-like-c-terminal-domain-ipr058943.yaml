identifier: InterPro:IPR058943
label: "GT-1/4-like, C-terminal domain"
definition: >-
  This domain is found twice at the C-terminal end of Trihelix transcription factor GT-1 and GT-4 from Arabidopsis thaliana and similar plant proteins. GT-1 binds specifically to the core DNA sequence 5'-GGTTAA-3' and may act as a molecular switch in response to light signals. This domain is predicted to adopt an ubiquitin-like fold.
