identifier: InterPro:IPR032708
label: "Microcin J25-processing protein McjB, C-terminal"
definition: >-
  This entry represents a domain found in the C-terminal region of the microcin J25-processing protein McjB from Escherichia coli. This domain is related to the transglutaminase-like domain . Microcin J25 (MccJ25) is a lasso peptide secreted by Escherichia coli which exerts a potent antibacterial activity by blocking RNA polymerase. McjB is involved in microcin maturation, which implies cleavage of McjA and head-tail linkage of the 21-residue pro-MccJ25.
