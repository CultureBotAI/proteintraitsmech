identifier: InterPro:IPR029273
label: "Cdc42 effector-like"
definition: >-
  The Rho-type GTPase Cdc42 regulates cell morphology and signal transduction in eukaryotic cells. The Cdc42 effector (CEP) or binder of Rho GTPase (BORG) proteins are involved in the organisation of the actin cytoskeleton. They may function as negative regulators of Rho GTPase signaling. This entry consists of Cdc42 effector proteins, including CEP1-5 from humans.
