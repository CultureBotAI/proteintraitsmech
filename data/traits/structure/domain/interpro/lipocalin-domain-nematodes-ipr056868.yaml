identifier: InterPro:IPR056868
label: "Lipocalin domain, nematodes"
definition: >-
  This entry represents a lipocalin domain usually found in nematode uncharacterised proteins. Lipocalins are transporters for small hydrophobic molecules, such as lipids, steroid hormones, bilins, and retinoids. The structure is an eight-stranded β-barrel. In some proteins this domain is attached to Cullin-like domains suggesting a possible role in scaffolding E3 ligase complexes. This family appears to be most similar to .
