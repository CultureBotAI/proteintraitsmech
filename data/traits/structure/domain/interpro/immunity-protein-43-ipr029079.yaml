identifier: InterPro:IPR029079
label: "Immunity protein 43"
definition: >-
  This entry represents a predicted immunity domain with an α+β fold with conserved tryptophan, proline, aspartate, serine and arginine residues. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-AHH family of HNH/Endonuclease VII fold nucleases. The gene for this toxin is also found in heterogeneous polyimmunity loci.
