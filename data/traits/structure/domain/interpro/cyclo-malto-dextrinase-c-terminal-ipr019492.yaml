identifier: InterPro:IPR019492
label: "Cyclo-malto-dextrinase, C-terminal"
definition: >-
  This domain is at the very C terminus of cyclo-malto-dextrinase proteins and consists of 8 β strands, is largely globular and appears to help stabilise the active sites created by upstream domains, , and . Cyclo-malto-dextrinases hydrolyse cyclodextrans to maltose and glucose and catalyse trans-glycosylation of oligosaccharides to the C3-, C4- or C6-hydroxyl groups of various acceptor sugar molecules.
