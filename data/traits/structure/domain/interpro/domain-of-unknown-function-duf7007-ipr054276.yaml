identifier: InterPro:IPR054276
label: "Domain of unknown function DUF7007"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to adopt a globular structure consisting of segregated α-helices and a five-stranded antiparallel β-sheet. This domain contains two highly conserved sequence motifs TxxHGG and YEED that may be of a functional importance.
