identifier: InterPro:IPR040862
label: "Hemagglutinin I"
definition: >-
  This domain can be found in hemagglutinin I (HA1) from Physarum polycephalum. Although the physiological function of the secreted HA1 remains to be established, HA1 recognizes cell wall polysaccharides of E. coli. The β-sandwich fold of HA1, composed of two up and down β-sheets, is conserved among other legume lectin-like proteins. The up and down β-sheet region is a minimal carbohydrate recognition domain.
