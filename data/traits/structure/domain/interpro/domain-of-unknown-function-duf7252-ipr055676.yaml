identifier: InterPro:IPR055676
label: "Domain of unknown function DUF7252"
definition: >-
  This entry represents a domain of unknown function found in bacteriophage proteins. The domain is around 115-125 residues long composed of a four stranded β sheet with helices packed on one side. There is evidence for a confident dimer from structure prediction. In addition the dimer shows a strong electrostatic polarity possibly suggesting a nucleic acid binding function.
