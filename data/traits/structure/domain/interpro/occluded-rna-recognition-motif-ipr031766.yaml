identifier: InterPro:IPR031766
label: "Occluded RNA-recognition motif"
definition: >-
  This is an unusual, frequently C-terminal, RNA-recognition motif found in fungi. In yeast it is the fourth RRM domain on the essential splicing factor Prp24. Structurally, it has a non-canonical RRM fold with the expected β-α-β-β-α-β RRM-fold is flanked by N- and C-terminal α-helices. These two additional flanking α-helices occlude the β-sheet face. The electropositive surface thereby presented is an alternative RNA-binding surface that allows both binding and unwinding of the U6 small nuclear RNA's internal stem loop, at least in vitro. Prp24 is an RNA-binding protein with four well conserved RNA recognition motifs (RRMs). It facilitates U6 RNA base-pairing with U4 RNA during spliceosome assembly. Prp24 specifically binds free U6 RNA primarily with RRM 1 and 2 and facilitates pairing of U6 RNA bases with U4 RNA bases.
