identifier: InterPro:IPR004568
label: "Phosphopantetheine-protein transferase domain"
definition: >-
  This domain is active in transferring the phophopantetheine prosthetic group to its attachment site on enzymes and carrier proteins. Many members of the family containing this domain are small proteins that act on the acyl carrier protein involved in fatty acid biosynthesis. Some members are domains of larger proteins involved in specialised pathways for the synthesis of unusual molecules including polyketides, atypical fatty acids, and antibiotics.
