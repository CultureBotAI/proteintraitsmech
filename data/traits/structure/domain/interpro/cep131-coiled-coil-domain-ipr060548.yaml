identifier: InterPro:IPR060548
label: "CEP131, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain found in Centrosomal protein of 131 kDa (CEP131) mainly from animals. CEP131 proteins are required for cilium formation, intraciliary transport, and transition zone assembly. The coiled-coil structure likely mediates protein-protein interactions.
