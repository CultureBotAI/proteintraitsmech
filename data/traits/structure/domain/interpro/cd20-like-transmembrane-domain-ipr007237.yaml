identifier: InterPro:IPR007237
label: "CD20-like, transmembrane domain"
definition: >-
  This entry represents the multipass transmembrane domain of B-lymphocyte antigen CD20 and other members of the membrane-spanning 4-domains subfamily A (MS4A), and closely related TMEM176 proteins. It also includes sarcospan and some uncharacterised proteins.
