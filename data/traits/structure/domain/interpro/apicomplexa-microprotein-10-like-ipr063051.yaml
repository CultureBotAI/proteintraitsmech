identifier: InterPro:IPR063051
label: "Apicomplexa microprotein 10-like"
definition: >-
  This entry includes the uncharacterised microprotein encoded by a small open reading frame (smORF) from the parasite Babesia bovis. This entry also represents a very short region found at the N-terminal of uncharacterised proteins from apicomplexa.
