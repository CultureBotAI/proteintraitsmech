identifier: InterPro:IPR047603
label: "FxsC, N-terminal domain"
definition: >-
  This entry represents the TIR-like domain found at the N-terminal of FxsC proteins from actinomycetes, which occur in the context of FxSxx-COOH class RiPP precursors (FxsA) and their radical SAM/SPASM domain maturases (FxsB). Most but not all members have an additional C-terminal domain (see ).
