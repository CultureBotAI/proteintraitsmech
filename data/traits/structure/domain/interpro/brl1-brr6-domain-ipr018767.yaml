identifier: InterPro:IPR018767
label: "Brl1/Brr6 domain"
definition: >-
  In Saccharomyces cerevisiae, Brr6 and Brl1 are interacting proteins that localise to the nuclear envelope and regulate lipid homeostasis. Mutation studies have implicated the proteins in nuclear pore complex biogenesis and mRNA nuclear export, although it may be that these observed effects are due to defects in maintaining the biophysical properties of the nuclear envelope.
