identifier: InterPro:IPR029491
label: "Helicase Helix-turn-helix domain"
definition: >-
  This presumed domain is found at the C terminus of a large number of helicases, including human Bifunctional 3'-5' exonuclease/ATP-dependent helicase WRN, a multifunctional enzyme that has magnesium and ATP-dependent 3'-5' DNA-helicase activity on partially duplex substrates and also has 3'->5' exonuclease activity towards double-stranded (ds)DNA with a 5'-overhang. Its depletion leads to chromosomal breaks and genome instability.
