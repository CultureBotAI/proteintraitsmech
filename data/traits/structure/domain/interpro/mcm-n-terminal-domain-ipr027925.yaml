identifier: InterPro:IPR027925
label: "MCM, N-terminal domain"
definition: >-
  This entry represents the N-terminal region of MCM proteins. This region is composed of three structural domains. Firstly a four helical bundle, secondly a zinc binding motif and thirdly an OB-like fold. MCM proteins are DNA-dependent ATPases required for the initiation of eukaryotic DNA replication. In eukaryotes there is a family of six proteins, MCM2 to MCM7. They were first identified in yeast where most of them have a direct role in the initiation of chromosomal DNA replication by interacting directly with autonomously replicating sequences (ARS). They were thus called minichromosome maintenance proteins, MCM proteins.
