identifier: InterPro:IPR001754
label: Orotidine 5'-phosphate decarboxylase domain
definition: >-
  Orotidine 5'-phosphate decarboxylase (OMPdecase) catalyses the last step in the de novo biosynthesis of pyrimidines, the decarboxylation of OMP into UMP. In higher eukaryotes OMPdecase is part, with orotate phosphoribosyltransferase, of a bifunctional enzyme, while the prokaryotic and fungal OMPdecases are monofunctional protein. Some parts of the sequence of OMPdecase are well conserved across species. The best conserved region is located in the N-terminal half of OMPdecases and is centred around a lysine residue which is essential for the catalytic function of the enzyme. This entry also includes enzymes such as 3-hexulose-6-phosphate synthase and 3-keto-L-gulonate-6-phosphate decarboxylase .
