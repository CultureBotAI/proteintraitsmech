identifier: InterPro:IPR045295
label: SDHAF1, LYR domain
definition: >-
  SDHAF1, also called LYRM8, is a LYR complex-II specific assembly factor that plays an essential role in the assembly of succinate dehydrogenase (SDH), an enzyme complex (also referred to as respiratory complex II) that is a component of both the tricarboxylic acid (TCA) cycle and the mitochondrial electron transport chain, and which couples the oxidation of succinate to fumarate with the reduction of ubiquinone (coenzyme Q) to ubiquinol. It promotes maturation of the iron-sulfur protein subunit SDHB of the SDH catalytic dimer, protecting it from the deleterious effects of oxidants. SDHAF1 may act together with SDHAF3. It is mutated in SDH-defective infantile leukoencephalopathy. SDHAF1 belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N terminus.
