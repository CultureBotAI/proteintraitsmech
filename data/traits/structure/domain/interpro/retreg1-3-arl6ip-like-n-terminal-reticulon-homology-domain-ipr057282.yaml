identifier: InterPro:IPR057282
label: "RETREG1-3/ARL6IP-like, N-terminal reticulon-homology domain"
definition: >-
  This entry represents the N-terminal reticulon-homology domain (RHD) of Reticulophagy regulator 1-3 (RETREG1-3), ARL-6 -interacting protein 1 (ARL6IP) and similar animal sequences. These proteins are regulators involved in endoplasmic reticulum tubulation that have been associated with diverse neurological diseases.
