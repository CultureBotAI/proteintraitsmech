identifier: InterPro:IPR010550
label: 2'-deoxycytidine 5'-triphosphate deaminase, N-terminal domain
definition: >-
  This entry includes several bacterial 2'-deoxycytidine 5'-triphosphate deaminase proteins ( ) (DCD) from a set of mainly alphaproteobacteria, which consist of two dUTPase-like domains ( ). This entry represents the N-terminal catalytic domain, which contains the active site residues Arg115 and Glu138, important for its activity.
