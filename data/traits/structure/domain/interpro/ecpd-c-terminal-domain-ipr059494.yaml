identifier: InterPro:IPR059494
label: "EcpD, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Fimbria adhesin EcpD from Escherichia coli and related sequences mainly found in Enterobacteriales. EcpD functions as a tip pilus adhesin in the E. coli common pilus (ECP) system. EcpD is required for assembly of EcpA into fibres and plays a role in early-stage biofilm development and host cell recognition. EcpD forms polymers and interacts with EcpA. The specific function of this domain remains to be determined.
