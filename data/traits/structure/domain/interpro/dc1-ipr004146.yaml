identifier: InterPro:IPR004146
label: DC1
definition: >-
  This entry represents a domain found predominantly in plant proteins, including Probable nucleoredoxin 1 (NRX1) and Protein VACUOLELESS GAMETOPHYTES (VLG) from Arabidopsis thaliana. This region is found at the C- terminal end of NRX1, which is likely to be a thiol-disulfide oxidoreductase required for pollen tube growth and pollen function in the pistil [ , . VLG is essential for development of both female (megagametogenesis) and male (microgametogenesis) gametophytes by promoting the formation of large vacuoles early in development, maybe via the regulation of vesicular fusion. This domain, which is rich in cysteines and histidines, is termed DC1 for divergent C1 domain as it has a pattern of conservation that is similar to that found in ( ). It probably binds to two zinc ions and bind to molecules such as diacylglycerol.
