identifier: InterPro:IPR057442
label: "At4g14310, 8-bladed propeller"
definition: >-
  This domain is found in the KIN14B-interacting protein At4g14310 from Arabidopsis thaliana and related proteins. This domain is predicted to fold into an eight-bladed β-propeller. At4g14310 may be implicated in division plane orientation during plant cell division, a process critical for proper embryonic development and tissue patterning in Arabidopsis. It may function similarly to known division regulators like TANGLED1 (TAN1) and AUXIN-INDUCED-IN-ROOT-CULTURES9 (AIR9), which stabilise cortical microtubule arrays to guide division plane positioning.
