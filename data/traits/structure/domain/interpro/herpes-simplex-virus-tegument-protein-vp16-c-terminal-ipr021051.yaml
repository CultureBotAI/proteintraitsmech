identifier: InterPro:IPR021051
label: "Herpes simplex virus, Tegument protein VP16, C-terminal"
definition: >-
  This domain is found in the C-terminal region of the HSV virion protein 16 (VP16 or Alpha-TIF) from Herpes Simplex virus. It appears in association with and is about 30 amino acids in length. It is the carboxyl subdomain of the acidic transcriptional activation domain. VP16 is a transcription promoter, an essential activator of viral immediate early (IE) promoters (alpha genes) during the lytic phase of viral infection. The protein associates with cellular transcription factors and DNA binding proteins to to enhance transcription rates. Such proteins include TATA binding protein, CBP, TBP-binding protein, etc. The C-terminal residues of the protein are responsible for transcriptional activation. Within the C-terminal region there are two activation regions that can independently and cooperatively activate transcription.
