identifier: InterPro:IPR046847
label: "Antitoxin Xre-like, helix-turn-helix domain"
definition: >-
  This entry represents the N-terminal domain of the antitoxin component Xre of a type II toxin-antitoxin (TA) system, which is the helix-turn-helix (HTH) DNA binding domain, structurally similar to the Cro repressor, therefore, also referred to as HTH/Cro-like DNA-binding domain. This domain is also found in other antitoxin components, associated with a C-terminal toxin-binding domain.
