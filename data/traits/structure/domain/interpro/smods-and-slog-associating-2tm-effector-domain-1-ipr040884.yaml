identifier: InterPro:IPR040884
label: "SMODS and SLOG-associating 2TM effector domain 1"
definition: >-
  The SLATT domain contains two transmembrane helices. SLATT domains are generally predicted to function as pore-forming effectors in a class of conflict systems which are reliant on the production of second messenger nucleotide or nucleotide derivatives. SLATT domains are predicted to initiate cell suicide responses upon their activation. This SLATT domainy is often C-terminally fused to the SLATT_3 ( ), and is typically operonically linked to either inactive TIR domains or SLOG domains which could act as regulators of the SLATT channels. In relatively rare instances, it is genomically linked as a standalone domain to the RelA/SpoT nucleotide synthetase and the predicted NA37/YejK sensor domain.
