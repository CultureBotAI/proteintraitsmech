identifier: InterPro:IPR045426
label: "ADYC domain"
definition: >-
  This domain is named ADYC after the most conserved motif. Proteins containing this domain are found in proteobacteria and cyanobacteria. These proteins have 7 conserved cysteines and one conserved histidine which might indicate a zinc-binding function.
