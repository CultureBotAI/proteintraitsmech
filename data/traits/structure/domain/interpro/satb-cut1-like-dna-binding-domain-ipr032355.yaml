identifier: InterPro:IPR032355
label: SATB, CUT1-like DNA-binding domain
definition: >-
  The CUTL domain is part of the N-terminal region of SATB proteins, special AT-rich sequence-binding proteins that are global chromatin organisers and gene expression regulators essential for T-cell development and breast cancer tumour growth and metastasis. This domain carries a DNA-binding region.
