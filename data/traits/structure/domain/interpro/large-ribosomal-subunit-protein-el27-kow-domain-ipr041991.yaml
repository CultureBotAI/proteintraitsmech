identifier: InterPro:IPR041991
label: "Large ribosomal subunit protein eL27, KOW domain"
definition: >-
  Large ribosomal subunit protein eL27 (RPL27e) has a KOW motif at its N terminus. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4.
