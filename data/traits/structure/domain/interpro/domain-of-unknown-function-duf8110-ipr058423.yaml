identifier: InterPro:IPR058423
label: "Domain of unknown function DUF8110"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in archaea. The proteins in this family are predominantly found in halophilic archaea, particularly within the Halobacteria class. The proteins are generally short, with lengths ranging from 89 to 123 amino acids. The reviewed protein from Halogeometricum borinquense (UniProtKB:E4NSC8) is included in this family.
