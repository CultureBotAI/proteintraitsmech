identifier: InterPro:IPR063177
label: "Actin filament-associated protein 1, C-terminal domain"
definition: >-
  This entry represents a C-terminal α-helical hairpin domain of approximately 90 residues found in actin filament-associated protein 1 (AFAP1) and its homologues. The domain is located C-terminal to two PH domains ( ). AFAP family members include AFAP1 (AFAP-110), AFAP1L1, and AFAP1L2 (XB130), which function as adaptor proteins in signal transduction. AFAP1 interacts with Src kinase and is involved in converting mechanical force into biochemical signalling. AFAP1L1 interacts with cortactin and localises to invadosomes. This entry is found exclusively in vertebrates.
