identifier: InterPro:IPR018934
label: "RIO-type domain"
definition: >-
  This entry represents the atypical serine/threonine kinase domain found in the RIO family members and similar proteins. RIO protein family are classified as atypical serine/threonine kinases and includes Rio1, Rio2 and Rio3, highly conserved from archaea to human. They exhibit little sequence similarity with eukaryotic protein kinases, and hence, are classified as atypical protein kinases. This domain is also found at the C-terminal of EKC/KEOPS complex subunit BUD32 from Fungi and Kae1/Bud32 from archaea. Rio1-3 have a distinct role in cytoplasmic maturation of the pre-40S pre-rRNA. Yeast Rio1 and Rio2 proteins are essential proteins that associate to ribosomal pre-40S particles and are involved in D-site cleavage in vivo. They are also required for proper cell cycle progression and chromosome maintenance, and are necessary for survival of the cells. These proteins are involved in the processing of 20 S pre-rRNA via late 18 S rRNA processing.
