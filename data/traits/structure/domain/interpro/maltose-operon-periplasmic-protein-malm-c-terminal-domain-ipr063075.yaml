identifier: InterPro:IPR063075
label: "Maltose operon periplasmic protein MalM, C-terminal domain"
definition: >-
  This entry represents the C-terminal three-helix bundle domain of approximately 45 residues found in the maltose operon periplasmic protein MalM. This domain follows the MalM domain ( ). MalM is encoded by the last gene of the malK-lamB operon and is localised to the periplasm. The gene is highly conserved between Escherichia coli and Salmonella typhimurium, suggesting an important physiological role. The precise function of MalM, and of this C-terminal domain, remains to be determined. This entry is found exclusively in Gammaproteobacteria, predominantly in Enterobacteriaceae and Vibrionaceae.
