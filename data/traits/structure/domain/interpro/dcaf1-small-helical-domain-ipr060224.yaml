identifier: InterPro:IPR060224
label: "DCAF1, small helical domain"
definition: >-
  This entry represents a small helical domain found in human DDB1- and CUL4-associated factor 1 (DCAF1) and similar proteins from animals and plants, including DCAF-1 from Caenorhabditis elegans, a component of the CUL4-RBX1-DDB1-DCAF1 E3 ubiquitin-protein ligase complex that functions as a substrate recognition module. DCAF1 is a component of the CUL4-RBX1-DDB1-DCAF1 E3 ubiquitin-protein ligase complex, where it may function as the substrate recognition module. The protein contains multiple functional regions including WD40 repeats, DWD boxes required for DDB1 interaction, and a LisH domain .
