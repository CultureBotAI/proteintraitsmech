identifier: InterPro:IPR048619
label: "Carboxysome Shell Carbonic Anhydrase, N-terminal"
definition: >-
  Carboxysome Shell Carbonic Anhydrase (CsoSCA) is a bacterial carbonic anhydrase localised in the carboxysome, where it converts bicarbonate ions to carbon dioxide for use in carbon fixation. It contains three domains: an N-terminal domain composed primarily of four α-helices; a catalytic domain containing a tightly bound zinc ion and a C-terminal domain with weak structural similarity to the catalytic domain. This entry represents the N-terminal domain.
