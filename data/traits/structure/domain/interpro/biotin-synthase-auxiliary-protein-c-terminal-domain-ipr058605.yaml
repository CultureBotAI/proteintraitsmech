identifier: InterPro:IPR058605
label: "Biotin synthase auxiliary protein, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Biotin synthase auxiliary protein from Mycobacterium tuberculosis (BsaP) and similar proteins from actinomycetes. BsaP is required for the activity of the biotin synthase BioB. These proteins play a crucial auxiliary role in the biotin biosynthesis pathway, which is vital for the synthesis of biotin, a cofactor necessary for various carboxylation reactions in cells.
