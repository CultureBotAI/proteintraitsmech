identifier: InterPro:IPR062872
label: "Spindle defective protein 3, middle domain"
definition: >-
  This entry represents a middle domain of spindle defective protein 3 (SPD-3) found in nematodes. SPD-3 is a multi-pass mitochondrial outer membrane protein required for mitotic spindle alignment and asymmetric cell division. The protein is also essential for motor-driven chromosome movement and homologous chromosome pairing during meiosis.
