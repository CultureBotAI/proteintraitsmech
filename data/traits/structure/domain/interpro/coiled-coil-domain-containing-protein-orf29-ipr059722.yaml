identifier: InterPro:IPR059722
label: "Coiled-coil domain-containing protein ORF29"
definition: >-
  This entry represents ORF29 found in bacteriophages. The prototype is from Helicobacter pylori bacteriophage KHP30, a 271 amino acid protein with a molecular weight of 30.3 kDa. The protein contains a predicted coiled-coil domain and has been identified by mass spectrometry in phage particles, indicating it is a structural component. The protein has a disordered N-terminal region with mixed basic and acidic residues. The specific function of this coiled-coil containing protein remains to be determined. This entry also includes related uncharacterised bacterial proteins mainly from Campylobacterales.
