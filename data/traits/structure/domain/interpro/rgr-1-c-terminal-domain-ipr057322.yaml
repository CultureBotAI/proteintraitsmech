identifier: InterPro:IPR057322
label: "Rgr-1, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Mediator of RNA polymerase II transcription subunit 14 from Caenorhabditis elegans (Rgr-1) and similar nematode proteins. Rgr-1 is a component of the Mediator complex, a coactivator involved in the regulated transcription of nearly all RNA polymerase II-dependent genes. This domain is predicted to show an α-β configuration.
