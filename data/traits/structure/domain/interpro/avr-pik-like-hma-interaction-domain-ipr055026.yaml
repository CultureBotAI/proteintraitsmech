identifier: InterPro:IPR055026
label: "AVR-Pik-like, HMA interaction domain"
definition: >-
  This entry represents the HMA interaction domain of AVR-Pik { ), an effector protein from the rice blast fungus Pyricularia oryzae which binds and stabilizes rice HMA-domain containing NLR proteins to co-opt their function to suppress immunity. AVR-Pik adopts a six-stranded β-sandwich structure.
