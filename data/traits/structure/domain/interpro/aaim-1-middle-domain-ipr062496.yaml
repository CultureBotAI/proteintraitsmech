identifier: InterPro:IPR062496
label: "AAIM-1, middle domain"
definition: >-
  This entry represents a middle domain that follows the N-terminal of AAIM-1 (Antibacterial and aids invasion by microsporidia 1) proteins. AAIM-1 is a secreted factor that plays dual roles in host-pathogen interactions: promoting resistance to bacterial pathogens whilst facilitating infection by microsporidian pathogens. AAIM-1 is expressed in the pharynx and intestine and secreted into the intestinal lumen where it inhibits bacterial colonisation but aids proper orientation of microsporidian spore proteins during cell invasion. The protein contains multiple predicted glycosylation sites and appears to be found primarily in nematodes. The specific function of this domain remains to be determined.
