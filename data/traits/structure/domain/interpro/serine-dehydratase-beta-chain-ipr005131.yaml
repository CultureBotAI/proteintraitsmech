identifier: InterPro:IPR005131
label: "Serine dehydratase beta chain"
definition: >-
  L-serine dehydratase is found as a heterodimer of alpha and beta chain or as a fusion of the two chains in a single protein. This enzyme catalyses the deamination of serine to form pyruvate and is part of the gluconeogenesis pathway. Members of this entry adopt an α/β fold.
