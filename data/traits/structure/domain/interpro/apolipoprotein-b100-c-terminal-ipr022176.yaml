identifier: InterPro:IPR022176
label: "Apolipoprotein B100 C-terminal"
definition: >-
  This domain is found in the C terminus of some apolipoprotein B100 (ApoB100) proteins. It is approximately 60 amino acids in length and contains two conserved sequence motifs: QLS and LIDL. ApoB100 has an essential role in the assembly and secretion of triglyceride-rich lipoproteins and lipids transport.
