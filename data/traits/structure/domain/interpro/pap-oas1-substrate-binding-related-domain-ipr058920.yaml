identifier: InterPro:IPR058920
label: "PAP/OAS1 substrate-binding-related domain"
definition: >-
  This entry represents a domain in uncharacterised proteins from plants that shows similarity to the the PAP/OAS1 substrate-binding main. This domain is usually found adjacent to . The PAP/OAS1 proteins bind ATP and interact with RNA. The OAS1 substrate-binding domain enables catalytic 2-5A synthesis (ATP coordination) and non-catalytic RNA stabilisation. It shares structural homology with PAP, as the α N4 helix in OAS1, critical for donor ATP coordination, is intrinsically present in PAP and other nucleotidyl transferases.
