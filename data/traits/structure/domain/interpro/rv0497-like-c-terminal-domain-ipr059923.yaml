identifier: InterPro:IPR059923
label: "Rv0497-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in Rv0497-like proteins from Mycobacterium species. These uncharacterised multi-pass membrane proteins are approximately 310-355 amino acids in size and contain three C-terminal transmembrane helices. The domain encompasses the transmembrane region and includes helical segments separated by short loops. These proteins are found in Mycobacterium tuberculosis (Rv0497), M. bovis (Mb0508), M. leprae (ML2433), and related species within the Mycobacteriaceae family. The proteins localise to the cell membrane and contain extensive disordered regions in their N-terminal portions. The function of this C-terminal domain remains to be determined.
