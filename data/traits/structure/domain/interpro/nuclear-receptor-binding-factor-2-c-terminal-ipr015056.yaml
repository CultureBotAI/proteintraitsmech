identifier: InterPro:IPR015056
label: "Nuclear receptor-binding factor 2, C-terminal"
definition: >-
  Nuclear receptor-binding factor 2 (NRBF2) plays an essential role in autophagy, the cellular pathway that degrades long-lived proteins and other cytoplasmic contents through lysosomes. NRBF2 binds Atg14L - a Beclin-binding protein - directly via the MIT domain and enhances Atg14L-linked Vps34 kinase (a class III phosphatidylinositol-3 kinase) activity and autophagy induction. This entry represents the C-terminal domain of NRBF2.
