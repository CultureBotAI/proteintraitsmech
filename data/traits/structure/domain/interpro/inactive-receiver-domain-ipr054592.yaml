identifier: InterPro:IPR054592
label: "Inactive Receiver domain"
definition: >-
  This entry represents the inactive Receiver domain (iREC). iREC is predicted to dimerize with active counterparts as part of signal transduction relays in a subset of TOTE (TPR, OB, TBP, Effector) biological conflict systems.
