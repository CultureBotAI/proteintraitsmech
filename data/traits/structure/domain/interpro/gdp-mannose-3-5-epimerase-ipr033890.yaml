identifier: InterPro:IPR033890
label: "GDP-mannose 3,5-epimerase"
definition: >-
  This subgroup of NDP-sugar epimerase/dehydratases are extended short-chain dehydrogenase/reductases (SDRs); they have the characteristic active site tetrad, and an NAD-binding motif: TGXXGXX[AG], which is a close match to the canonical NAD-binding motif. Members include Arabidopsis thaliana GDP-mannose-3',5'-epimerase which catalyzes the epimerization of GDP-alpha-D-mannose to form GDP-beta-L-galactose. It also catalyses an epimerization reaction that releases GDP-L-gulose, an intermediate that could be dedicated for the de novo biosynthesis of vitamin C in plants. Extended SDRs are distinct from classical SDRs. In addition to the Rossmann fold (α/β folding pattern with a central β-sheet) core region typical of all SDRs, extended SDRs have a less conserved C-terminal extension of approximately 100 amino acids.
