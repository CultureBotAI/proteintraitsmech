identifier: InterPro:IPR044541
label: "FAF1, UBA-like domain"
definition: >-
  FAS-associated factor 1 (FAF1) is a multidomain protein involved in various biological processes, including regulation of apoptosis and NFkappaB activity, and ubiquitination and proteasomal degradation. It has been linked to cancer, asbestos-induced mesotheliomas, and Parkinson's disease. FAF1 contains multiple ubiquitin-related domains, including ubiquitin-associated (UBA), ubiquitin-like 1 and 2 (UBL1, UBL2), and ubiquitin regulatory X (UBX) domains. FAF1 interacts with polyubiquitinated proteins via its N-terminal UBA domain and with valosin containing protein (VCP) via its C-terminal UBX domain. This entry represents the UBA-like domain found in FAF1.
