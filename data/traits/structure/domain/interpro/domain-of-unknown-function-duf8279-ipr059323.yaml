identifier: InterPro:IPR059323
label: "Domain of unknown function DUF8279"
definition: >-
  This domain is found in uncharacterised proteins mainly from Alveolata species. It has a remote similarity to various Poly(ADP-ribose) polymerases PARPs and two of the residues involved in catalysis (His and Tyr) are conserved. The Af2 predicted models of many the members are not of a good quality.
