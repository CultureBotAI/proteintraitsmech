identifier: InterPro:IPR031442
label: "Protein NPAT, C-terminal domain"
definition: >-
  Protein NPAT is required for progression through the G1 and S phases of the cell cycle, and for S phase entry. It regulates histone gene expression as well as nonhistone targets that influence competency for cell cycle progression. This entry represents the C-terminal domain of NPAT.
