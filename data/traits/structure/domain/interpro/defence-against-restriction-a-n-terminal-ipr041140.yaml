identifier: InterPro:IPR041140
label: "Defence against restriction A, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the phage P1 DarA protein, which is a internal capsid protein probably ejected along with the viral DNA and prevents degradation of viral DNA by the host type I restriction-modification antiviral defense system. This α and β fold domain contains a conserved aspartate, and an asparagine residue followed by a basic residue in a Nx+ motif. This domain can also be found in the phage P1 hdf protein, a solo version of the domain. The hdf protein is also a component of the phage P1 head. The domain might be involved in a counter-restriction activity.
