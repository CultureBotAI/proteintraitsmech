identifier: InterPro:IPR063073
label: "Mitochondrial helicase Irc3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of mitochondrial ATP- dependent helicases related to Irc3 (Increased Recombination Centers 3) from Schizosaccharomyces pombe. These proteins contain an N-terminal restriction endonuclease domain ( ), DEAD box helicase domain ( ), helicase C-terminal domain ( ), UPF0547 domain ( ), and this C-terminal domain. The proteins are predicted to function as ATP-dependent helicases involved in mitochondrial genome maintenance. This domain is predominantly found in fungi, both Ascomycota and Basidiomycota. The specific function of this C-terminal domain remains to be determined.
