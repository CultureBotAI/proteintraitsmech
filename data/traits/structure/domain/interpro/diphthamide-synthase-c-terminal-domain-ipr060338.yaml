definition: >-
  This entry represents the C-terminal domain of Diphthamide synthase. Diphthamide synthase catalyses the last amidation step of diphthamide biosynthesis using ammonium and ATP. Diphthamide synthase catalyses the last amidation step of diphthamide biosynthesis using ammonium and ATP. Diphthamide synthase is evolutionarily conserved in eukaryotes. Diphthamide is a post-translationally modified histidine residue found on archaeal and eukaryotic translation elongation factor 2 (eEF-2). In some members of this entry, e.g. , this domain is associated with . The enzyme classification is .
