identifier: InterPro:IPR062499
label: "HipHop, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of HipHop (HP1-HOAP-interacting protein), a telomere protection protein found in arthropods. HipHop is a component of the HipHop-HOAP telomere-capping complex that recruits the MTV complex to form the terminin complex. This complex binds to chromosome ends in a sequence-independent manner and prevents telomere fusion. HipHop localises to telomeres and interacts with cav/HOAP and Su(var)205/HP1 proteins. The protein is essential for telomere protection and chromosome stability.
