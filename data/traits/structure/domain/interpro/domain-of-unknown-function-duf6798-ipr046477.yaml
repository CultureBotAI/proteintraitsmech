identifier: InterPro:IPR046477
label: "Domain of unknown function DUF6798"
definition: >-
  This presumed domain is functionally uncharacterised. This domain family is mainly found in bacteria and archaea, and is approximately 60 amino acids in length. There is a conserved WxxR sequence motif and a conserved Lys residue. Members of this entry may be transmembrane proteins.
