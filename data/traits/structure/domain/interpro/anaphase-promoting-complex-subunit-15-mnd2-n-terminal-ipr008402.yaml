identifier: InterPro:IPR008402
label: Anaphase-promoting complex subunit 15/mnd2, N-terminal
definition: >-
  This entry represents a conserved region found at the N-terminal of budding yeast Mnd2 and its homologue, anaphase-promoting complex subunit 15 (Apc15), from fission yeasts. They are part of the anaphase promoting complex/cyclosome (APC/C). The anaphase-promoting complex (APC) or cyclosome is a multi-subunit E3 protein ubiquitin ligase that regulates important events in mitosis, such as the initiation of anaphase and exit from telophase. The APC, in conjunction with other enzymes, assembles multi-ubiquitin chains on a variety of regulatory proteins, thereby targeting them for proteolysis by the 26S proteasome.
