identifier: InterPro:IPR034729
label: "Zinc finger CCHC HIVEP-type"
definition: >-
  The entry includes the HIVEP-type CCHC zinc finger. The HIVEP family of zinc finger (Znf) proteins regulates a diverse array of developmental and biological processes through direct DNA binding, as well as interaction with other transcription factors and components of signal transduction pathways. Three vertebrate paralogous genes have been identified, HIVEP (also called ZAS or Shn)-1, -2 and -3, as well as the closely related Drosophila gene, Schnurri. HIVEP and the Drosophila Schnurri proteins contain two pairs of C2H2 Znf and, with the exception of the HIVEP2 family, a conserved CCHC-type Znf. In addition, Drosophila Schnurri contains a conserved carboxyl-terminal Znf triplet that is not found in the vertebrate members. Sequence conservation between vertebrate HIVEP and the Drosophila Schnurri proteins is generally low with the exception of the two pairs of C2H2 Znf, which are highly conserved.
