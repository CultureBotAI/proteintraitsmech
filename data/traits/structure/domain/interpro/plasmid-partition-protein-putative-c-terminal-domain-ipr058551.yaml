identifier: InterPro:IPR058551
label: "Plasmid partition protein, putative, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of conserved hypothetical proteins from Borrelia burgdorferi, the Lyme disease spirochaete, and similar sequences from Borreliella and Borrelia species. Some members are putative plasmid partition proteins.
