identifier: InterPro:IPR017580
label: 2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline decarboxylase, type 1
definition: >-
  Previously thought to only proceed spontaneously, the decarboxylation of 2-oxo-4-hydroxy-4-carboxy--5-ureidoimidazoline (OHCU) has been recently been shown to be catalysed by this OHCU decarboxylase in Mus musculus (Mouse). Homologues of this enzyme are found adjacent to and fused with uricase in a number of prokaryotes and are represented in this entry.
