identifier: InterPro:IPR032693
label: "YtkA-like domain"
definition: >-
  This entry represents a domain found in protein YtkA from Bacillus subtilis. This domain can also be found in the C-terminal of the copper transport protein YcnJ. YcnJ is involved in uptake of extracellular oxidized copper under copper-limiting conditions.
