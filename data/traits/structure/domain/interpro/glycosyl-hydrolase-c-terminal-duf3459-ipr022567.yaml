identifier: InterPro:IPR022567
label: "Glycosyl hydrolase, C-terminal (DUF3459)"
definition: >-
  This entry represents a conserved domain found at the C-terminal of Malto-oligosyltrehalose trehalohydrolase fom Deinococcus radiodurans and related proteins members of the glycosyl hydrolase 13 family. Malto-oligosyltrehalose trehalohydrolase cleaves the α-1,4-linkage adjacent to the α-1,1-glycosidic bond to release free trehalose. In Mycobacterium, this enzyme is involved in the biosynthesis of trehalose but not in that of capsular glucan and glycogen. This domain consists of two antiparallel β-sheets packed in a β-sandwich.
