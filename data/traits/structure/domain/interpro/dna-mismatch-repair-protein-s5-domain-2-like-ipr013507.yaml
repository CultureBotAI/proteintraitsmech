identifier: InterPro:IPR013507
label: "DNA mismatch repair protein, S5 domain 2-like"
definition: >-
  This domain is found in MutL and homologues and is characterised by a ribosomal protein S5 domain 2-like fold. The dimeric MutL protein has a key function in communicating mismatch recognition by MutS to downstream repair processes. Mismatch repair contributes to the overall fidelity of DNA replication by targeting mispaired bases that arise through replication errors during homologous recombination and as a result of DNA damage. It involves the correction of mismatched base pairs that have been missed by the proofreading element of the DNA polymerase complex.
