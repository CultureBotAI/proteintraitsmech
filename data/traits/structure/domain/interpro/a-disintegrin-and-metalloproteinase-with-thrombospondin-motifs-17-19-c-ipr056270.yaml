identifier: InterPro:IPR056270
label: "A disintegrin and metalloproteinase with thrombospondin motifs 17/19, C-terminal helical domain"
definition: >-
  This domain is found C-terminal in some members of ADAMTS family (ADAMTS - A Disintegrin And Metalloproteinase domain, with ThromboSpondin type-1 modules) such as human ADAMTS17 and ADAMTS19. Members of the ADAMTS family of zinc-dependent proteases play important roles in a variety of normal and pathological conditions, including arthritis and cancer. This domain contains conserved cysteine residues that may be involved in disulphide bridge formation. It is predicted to adopt a globular structure consisting of four α-helices.
