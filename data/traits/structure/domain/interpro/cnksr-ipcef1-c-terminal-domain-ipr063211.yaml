identifier: InterPro:IPR063211
label: "CNKSR/IPCEF1, C-terminal domain"
definition: >-
  This entry represents a small C-terminal domain of approximately 55 residues found in connector enhancer of kinase suppressor of Ras (CNKSR1, CNKSR2) and interactor protein for cytohesin exchange factors 1 (IPCEF1). This domain is located C-terminal to the PH domain ( ). In IPCEF1, this region is required for interaction with cytohesin-2 (CYTH2). CNKSR proteins function as adapter proteins in Ras signalling pathways, interacting with RAF1 and other Ras effectors. IPCEF1 enhances guanine-nucleotide exchange by cytohesin-2 on ARF6. A CNK3/IPCEF1 fusion protein is required for HGF-dependent ARF6 activation and cell migration. This family is found in metazoans.
