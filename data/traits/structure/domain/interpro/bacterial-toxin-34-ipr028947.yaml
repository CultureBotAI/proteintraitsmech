identifier: InterPro:IPR028947
label: "Bacterial toxin 34"
definition: >-
  This entry represents a predicted RNase toxin domain found in bacterial polymorphic toxin systems. The toxin possesses an all-α helical fold and conserved lysine and cysteine residues, and GNxxD and WxCxH motifs. In bacterial polymorphic toxin systems, the toxin is exported by the type 2 or type 6 secretion system. Proteins containing this domain include protein RhsA from E. coli. RhsA is part of the RHS elements, which are proteins of non-essential function believed to play an important role in the natural ecology of the cell.
