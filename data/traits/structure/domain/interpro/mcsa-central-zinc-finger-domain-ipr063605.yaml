identifier: InterPro:IPR063605
label: "McsA, central zinc-finger domain"
definition: >-
  This entry represents a zinc finger domain found centrally in McsA, a metal-binding protein from Bacillota bacteria characterised by multiple CXXC zinc-finger motifs distributed throughout the central region. McsA contains four CXXC metal-binding motifs that coordinate copper, zinc, cobalt and cadmium ions, with functional roles in metal stress tolerance. The protein also contains a C-terminal UVR domain ( ). McsA interacts with the protein-arginine kinase McsB and is part of the ctsR-mcsB-clpC operon regulated by the CtsR heat shock repressor. The full-length protein is involved in competence protein delocalisation and is itself phosphorylated by McsB on arginine residues.
