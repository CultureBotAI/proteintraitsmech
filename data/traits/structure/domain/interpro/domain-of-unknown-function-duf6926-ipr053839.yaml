identifier: InterPro:IPR053839
label: "Domain of unknown function DUF6926"
definition: >-
  This domain of unknown function is found in bacterial proteins. It is probably distantly related to dodecin. It is predicted to adopt a simple fold consisting of a core of 3 β-strands, forming a curved β-sheet, and two short α-helices.
