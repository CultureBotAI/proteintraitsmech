identifier: InterPro:IPR057298
label: "RNA-dependent RNA polymerase 6-like, RNA-binding domain"
definition: >-
  This entry represents the RNA-binding domain (RBD) found at the N-terminal of RNA-dependent RNA polymerase 6 (RPR6) from Arabidopsis and related sequences from plants. RDR6 is involved in post-transcriptional gene silencing (PTGS) and natural virus resistance. It possesses ssRNA and ssDNA-dependent polymerase activity. RDR6 is required for the production of trans-acting siRNA and other siRNA.
