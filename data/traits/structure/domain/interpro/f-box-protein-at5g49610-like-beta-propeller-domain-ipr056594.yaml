identifier: InterPro:IPR056594
label: "F-box protein AT5G49610-like, beta-propeller domain"
definition: >-
  This entry includes a group of plant proteins containing an F-box domain at the N-terminal, followed by a β-propeller-like domain. The F-box motif is a key component of the SCF (SKP1-cullin-F-box) complex, which functions as an E3 ligase. Members of this family are likely to play a role in the ubiquitination pathway, where they are responsible for targeting specific substrates for proteasomal degradation. The F-box domain facilitates the recognition and binding of substrate proteins, while the FBD (F-box associated domain) may contribute to the specificity and functionality of the SCF complex. This entry also includes uncharacterised single domain plant proteins.
