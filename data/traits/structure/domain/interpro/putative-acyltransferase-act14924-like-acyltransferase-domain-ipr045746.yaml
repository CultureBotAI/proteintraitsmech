identifier: InterPro:IPR045746
label: "Putative acyltransferase ACT14924-like, acyltransferase domain"
definition: >-
  This entry represents the acyltransferase domain found in a group of putative phospholipid/glycerol acyltransferases such as the Pectobacterium carotovorum subsp. carotovorum PC1 locus ACT14924. Proteins containing this domain belong to the lysophospholipid acyltransferase (LPLAT) superfamily.
