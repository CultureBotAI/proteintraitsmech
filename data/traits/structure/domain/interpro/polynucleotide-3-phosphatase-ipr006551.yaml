identifier: InterPro:IPR006551
label: "Polynucleotide 3'-phosphatase"
definition: >-
  These proteins catalyse the dephosphorylation of DNA 3'-phosphates. It is believed that this activity is important for the repair of single-strand breaks in DNA caused by radiation or oxidative damage. This region is often, but not always linked to a DNA 5'-kinase domain. As is common in this superfamily, DNA 3-phosphatase is magnesium dependent. A difference between this enzyme and other HAD-superfamily phosphatases is in the third conserved catalytic motif which usually contains two conserved aspartate residues believed to be involved in binding the magnesium ion. Here, the second aspartate is usually replaced by an arginine residue which may indicate an interaction with the phosphate backbone of the substrate. Alternatively, there is an additional conserved aspartate downstream of the usual site which may indicate a slightly different fold in this region.
