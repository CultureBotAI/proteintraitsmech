identifier: InterPro:IPR059889
label: "AF_0136-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the AF_0136 family of uncharacterised proteins found in methanogenic archaea. The family is found across various methanogenic lineages including Methanosarcinaceae, Methanosarcina, and Candidatus Methanoperedenaceae, with some members in Archaeoglobus. The function of this C-terminal domain remains to be determined.
