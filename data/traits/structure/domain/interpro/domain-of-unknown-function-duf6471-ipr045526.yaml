label: "Domain of unknown function DUF6471"
definition: >-
  This domain of unknown function is found in uncharacterised proteins mostly from bacteria (predominantly Proteobacteria). There is a conserved motif KxxRG and a highly conserved L residue. It may be a DNA-binding domain.
