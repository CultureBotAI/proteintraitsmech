identifier: InterPro:IPR033985
label: "SusD-like, N-terminal"
definition: >-
  SusD is a secreted polysaccharide-binding protein with an N-terminal lipid moiety that allows association with the outer membrane. SusD probably mediates xyloglucan-binding prior to xyloglucan transport in the periplasm for degradation. This domain is found N-terminal to .
