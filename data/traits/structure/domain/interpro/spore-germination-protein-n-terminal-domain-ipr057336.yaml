identifier: InterPro:IPR057336
label: "Spore germination protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of spore germination proteins such as GERXC, GERLC, GERKC, GERAC, GERBC and others. In Bacillus cereus, GERLC contributes to the L-alanine germination response.
