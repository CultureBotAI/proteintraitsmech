identifier: InterPro:IPR059003
label: "At1g61900-like, C-terminal"
definition: >-
  This domain is found towards the C-terminal end of the uncharacterised GPI-anchored protein At1g61900 from Arabidopsis thaliana and similar plant sequences. This domain is predicted to adopt an all-α configuration. There are several C, Q and Y conserved residues.
