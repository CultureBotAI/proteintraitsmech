identifier: InterPro:IPR047034
label: Glyoxylate carboligase, TPP-binding domain
definition: >-
  Glyoxylate carboligase (Gcl), also called tartronate-semialdehyde synthase, releases CO2 while synthesizing a single molecule of tartronate semialdehyde from two molecules of glyoxylate. Its activity depends on the presence of thiamine diphosphate (ThDP), a derivative of vitamin B1. In the D-glycerate pathway, part of allantoin degradation in the Enterobacteriaceae, tartronate semialdehyde is converted to D-glycerate and then 3-phosphoglycerate, a product of glycolysis and entry point in the general metabolism. This entry represents the TPP-binding module of Gcl, found at the C-terminal end.
