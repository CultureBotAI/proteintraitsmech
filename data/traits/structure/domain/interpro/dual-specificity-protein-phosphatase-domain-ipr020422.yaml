identifier: InterPro:IPR020422
label: "Dual specificity protein phosphatase domain"
definition: >-
  Tyrosine specific protein phosphatases (PTPases) ( ) contain two conserved cysteines, the second one has been shown to be absolutely required for activity. This entry represents the PTPase domain that centre on the active site cysteine. A number of conserved residues in its immediate vicinity have also been shown to be important. This domain can be found in dual specificity phosphatases. Dual specificity phosphatases (DUSPs) are members of the superfamily of protein tyrosine phosphatases. They remove the phosphate group from both phospho-tyrosine and phospho-serine/threonine residues. They are structurally similar to tyrosine-specific phosphatases but with a shallower active site cleft and a distinctive active site signature motif, HCxxGxxR. They are characterised as VHR- or Cdc25-like. In general, DUSPs are classified into the following subgroups: Slingshot phosphatases Phosphatase of regenerating liver (PRL) Cdc14 phosphatases Phosphatase and tensin homologue deleted on chromosome 10 (PTEN)-like and myotubularin phosphatases Mitogen-activated protein kinase phosphatases (MKPs) Atypical DUSPs
