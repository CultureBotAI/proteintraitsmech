identifier: InterPro:IPR027970
label: SPATA31-like
definition: >-
  This domain of unknown function is found in proteins described as spermatogenesis-associated protein 31 (SPATA31) in mammalian such as in homo sapiens. Spermatogenesis-associated protein 3 (SPATA3), also known as Aep1, is a testis-specific protein primarily expressed during the haploid stage of spermatogenesis, from round spermatids to mature sperm. SPATA3 localizes to the acrosome region of developing spermatids and plays a role in spermiogenesis. While its precise function remains unclear, SPATA3 is involved in sperm formation and function. Deletion of the Spata3 gene in mice leads to in vitro fertility defects and ultrastructural anomalies in sperm. SPATA3 has been found to interact with beta-actin and syntaxin 1 in vitro.
