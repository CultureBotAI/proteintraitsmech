identifier: InterPro:IPR024752
label: "Myb/SANT-like domain"
definition: >-
  This domain, found in L10-interacting MYB domain-containing protein (LIMYB) and At2g29880 from Arabidopsis, is related to Myb/SANT-like DNA binding domains. LIMYB is a transcription factor that associates with ribosomal protein promoters. It is involved in global translation suppression as an antiviral immunity strategy in plants.
