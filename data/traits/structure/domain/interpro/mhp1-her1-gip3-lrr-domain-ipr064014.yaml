identifier: InterPro:IPR064014
label: "MHP1/HER1/GIP3, LRR domain"
definition: >-
  This entry represents the LRR domain of MHP1, HER1 and GIP3 from yeast and related fungal sequences. MHP1 is an essential protein in Saccharomyces cerevisiae required for microtubule function. MHP1 is essential for the formation and stabilisation of microtubules, binds to microtubules in vitro, and localises to cytoplasmic microtubules and mitotic spindles. The protein contains leucine-rich repeat (LRR) regions and extensive disordered regions, with a Tau/MAP repeat-like region at the C-terminal end. MHP1 undergoes extensive phosphorylation and ubiquitination modifications. GIP3 is a cytoplasmic protein that regulates protein phosphatase 1 Glc7p. When it is overexpressed, it re-localises Glc7p from the nucleus and prevents chromosome segregation. GIP3 has a paralogue, HER1, that arose from the whole genome duplication.
