identifier: InterPro:IPR056480
label: "Hfq-like domain"
definition: >-
  This entry includes phage proteins that contain a central Hfq-like domain. This suggests that this protein may have an RNA binding function. AlphaFold prediction suggests a confident homohexameric structure. This entry represents a hypothetical protein found in several mycobacteriophages, including Bxz1, Mangeria, Derek, DrPhinkDaddy, Phusco and Jedediah.
