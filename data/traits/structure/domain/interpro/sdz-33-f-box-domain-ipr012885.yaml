identifier: InterPro:IPR012885
label: "Sdz-33, F-box domain"
definition: >-
  This entry represents an F-box domain in Sdz-33, Sdz-15, Hecw-1 and uncharacterised proteins in Caenorhabditis elegans. F-box associated domain-containing protein SDZ-33 (Sdz-33) functions as the substrate recognition component of the E3 ubiquitin-protein ligase complex, mediating the ubiquitination and subsequent proteasomal degradation of target proteins such as MDL-1. It plays a positive role in axon regeneration by targeting MDL-1 for ubiquitin-mediated degradation, likely reducing the levels of MDL-1-MXL-1 heterodimers. This reduction allows free MXL-1 to form complexes with TDPT-1, thereby inhibiting TDPT-1-dependent sumoylation of ETS-4. E3 ubiquitin-protein ligase HECW-1 (Hecw-1) is believed to function in the OLL neurones of the anterior ganglion to inhibit avoidance behaviour towards microbial pathogens such as Pseudomonas aeruginosa. While C. elegans still displays avoidance by vacating a P. aeruginosa lawn within 24 hours, HECW-1 likely acts by inhibiting the neuropeptide receptor NPR-1, thereby modulating the behavioural response to pathogenic bacteria.
