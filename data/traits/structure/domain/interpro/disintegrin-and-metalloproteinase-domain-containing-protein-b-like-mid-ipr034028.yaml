identifier: InterPro:IPR034028
label: "Disintegrin and metalloproteinase domain-containing protein B-like, middle domain"
definition: >-
  This entry represents a middle domain in Disintegrin and metalloproteinase domain-containing protein B (ADM-B) and ADM-MDE. The ADAM (A Disintegrin And Metalloprotease) family of metalloproteases are integral membrane proteases acting on a variety of extracellular targets. They are involved in shedding soluble peptides or proteins from the cell surface. MDE could have zinc protease activity. The precise function of ADAM-B is not yet clear.
