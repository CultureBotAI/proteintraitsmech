identifier: InterPro:IPR048889
label: "NSUN5/RCM1, N-terminal domain"
definition: >-
  28S rRNA (cytosine-C(5))-methyltransferase from mammals (NSUN5), 26S rRNA (cytosine-C(5))-methyltransferase nsun-5 from nematodes, 25S rRNA (cytosine-C(5))-methyltransferase NSUN5 from plants and the homologue from yeast 25S rRNA (cytosine-C(5))-methyltransferase rcm1 are SAM-dependent methyltransferases that specifically methylate the C(5) position of a cytosine. This entry represents the N-terminal globular domain of NSUN5 which is required for targeting to nucleoli.
