identifier: InterPro:IPR058782
label: "GIY-YIG domain"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins found predominantly in halophilic archaea, specifically within the Halobacteria class. The proteins containing this domain are typically around 230 to 240 amino acids in length. The domain is highly conserved across various species within the Stenosarchaea group, indicating a potentially important but yet unidentified function. The domain belongs to the GIY-YIG superfamily and is thus likely to act as a nuclease. In some members of the family this domain is found associated with an N-terminal copy of .
