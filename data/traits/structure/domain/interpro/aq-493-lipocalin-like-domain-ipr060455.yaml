identifier: InterPro:IPR060455
label: "Aq_493, lipocalin-like domain"
definition: >-
  This entry represents a lipocalin-like domain found in Aq_493 from the hyperthermophilic bacterium Aquifex aeolicus and related bacterial proteins. The protein belongs to the COG1463 functional category and shows similarity to MlaD phospholipid transporters involved in intermembrane phospholipid transfer. Lipocalin-like domains typically adopt a β-barrel structure that can bind small hydrophobic molecules. The specific function of this domain is unknown.
