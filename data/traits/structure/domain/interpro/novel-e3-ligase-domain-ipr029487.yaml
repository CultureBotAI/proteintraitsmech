identifier: InterPro:IPR029487
label: Novel E3 ligase domain
definition: >-
  This NEL or novel E3 ligase domain is found at the C terminus of bacterial virulence factors. Its sequence is different from those of the eukaryotic HECT and RING-finger E3 ligases, and it subverts the host ubiquitination process. At the N terminus of the family-members there is a series of LRR repeats, and the NEL domain interacts with the most N-terminal repeat. The key residue for the ligation step is a cysteine, and the LRR domain sequesters the catalytic cysteine residue contained in the NEL domain until invasion has occurred.
