identifier: InterPro:IPR058590
label: "Tle-like phospholipase domain"
definition: >-
  The Tle (Type VI lipase effector) phospholipase domains are specialised protein domains found in bacterial toxins, particularly those secreted via the Type VI Secretion System (T6SS). These domains function as phospholipases that hydrolyse phospholipids, key components of cell membranes allowing bacteria to attack and disrupt competitor or host cells. This domain adopts a typical α/β hydrolase fold, characterised by a central seven-stranded mixed β-sheet surrounded by α-helices. Tle domains can exhibit both phospholipase A1 and A2 activities. This domain is also found in eukaryotic proteins, in particularly fungal ATG15 which is a vacuolar phospholipase enzyme essential for autophagy and related membrane degradation processes.
