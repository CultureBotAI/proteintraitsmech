identifier: InterPro:IPR033872
label: Non-specific lipid-transfer protein type 2
definition: >-
  Plant nsLTPs are small, soluble proteins that facilitate the transfer of fatty acids, phospholipids, glycolipids, and steroids between membranes. In addition to lipid transport and assembly, nsLTPs also play a key role in the defense of plants against pathogens. There are two closely-related types of nsLTPs, types 1 and 2, which differ in protein sequence, molecular weight, and biological properties. nsLTPs contain an internal hydrophobic cavity, which serves as the binding site for lipids. Structure studies of rice nsLTPs show that the plasticity of the hydrophobic cavity is an important factor in ligand binding. nsLTP2s possess a more flexible central hydrophobic cavity, resulting in increased lipid transfer activity. The flexibility of the sLTP2 cavity allows its binding to rigid sterol molecules, whereas nsLTP1 cannot bind sterols despite its larger cavity size. The resulting nsLTP2/sterol complexes may bind to receptors that trigger defense responses. The nsLTP2 of Brassica rapa has been identified as a potent allergen. This entry represents the non-specific lipid-transfer protein type 2 (nsLTP2) family.
