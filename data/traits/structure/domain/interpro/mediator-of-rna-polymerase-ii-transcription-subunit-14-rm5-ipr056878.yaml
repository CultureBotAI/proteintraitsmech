identifier: InterPro:IPR056878
label: "Mediator of RNA polymerase II transcription subunit 14, RM5"
definition: >-
  This entry represents a domain found in the human Mediator of RNA polymerase II transcription subunit 14 (Med14) and related proteins. This entry represents repeat RM5. Med14 is a component of the Mediator complex, a coactivator involved in the regulated transcription of nearly all RNA polymerase II-dependent genes. Mediator functions as a bridge to convey information from gene-specific regulatory proteins to the basal RNA polymerase II transcription machinery. Mediator is recruited to promoters by direct interactions with regulatory proteins and serves as a scaffold for the assembly of a functional preinitiation complex with RNA polymerase II and the general transcription factors. Med14 along with Med17 are scaffold subunits in nucleating Mediator. The major portion of Med14 exists in the Head-Shoulder module of the Mediator and consists of nine tandem repeats (RM1 to RM9), which are arranged in an atypical right-handed helix.
