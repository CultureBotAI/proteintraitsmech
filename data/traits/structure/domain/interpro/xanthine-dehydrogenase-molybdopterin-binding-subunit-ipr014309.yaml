identifier: InterPro:IPR014309
label: Xanthine dehydrogenase, molybdopterin binding subunit
definition: >-
  Members of this entry are the molybdopterin-containing large subunit of xanthine dehydrogenase (or, in, eukaryotes, the molybdopterin-binding domain) and those enzymes that reduces the purine pool by catabolizing xanthine to urate. This entry contains primarily bacterial sequences; it does not manage to include all eukaryotic xanthine dehydrogenases and thereby discriminate them from the closely related enzyme aldehyde dehydrogenase.
