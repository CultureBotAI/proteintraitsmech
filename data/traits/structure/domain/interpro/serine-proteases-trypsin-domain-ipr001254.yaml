identifier: InterPro:IPR001254
label: "Serine proteases, trypsin domain"
definition: >-
  This entry represents the active-site-containing domain found in the trypsin family members. The catalytic activity of the serine proteases from the trypsin family is provided by a charge relay system involving an aspartic acid residue hydrogen-bonded to a histidine, which itself is hydrogen-bonded to a serine. The sequences in the vicinity of the active site serine and histidine residues are well conserved in this family of proteases. A partial list of proteases known to belong to the trypsin family is shown below. Acrosin. Blood coagulation factors VII, IX, X, XI and XII, thrombin, plasminogen, and protein C. Cathepsin G. Chymotrypsins. Complement components C1r, C1s, C2, and complement factors B, D and I. Complement-activating component of RA-reactive factor. Cytotoxic cell proteases (granzymes A to H). Duodenase I. Elastases 1, 2, 3A, 3B (protease E), leukocyte (medullasin). Enterokinase (EC 3.4.21.9) (enteropeptidase). Hepatocyte growth factor activator. Hepsin. Glandular (tissue) kallikreins (including EGF-binding protein types A, B, and C, NGF-gamma chain, gamma-renin, prostate specific antigen (PSA) and tonin). Plasma kallikrein. Mast cell proteases (MCP) 1 (chymase) to 8. Myeloblastin (proteinase 3) (Wegener's autoantigen). Plasminogen activators (urokinase-type, and tissue-type). Trypsins I, II, III, and IV. Tryptases. All the above proteins belong to family S1 in the classification of peptidases and originate from eukaryotic species. It should be noted that bacterial proteases that belong to family S2A are similar enough in the regions of the active site residues that they can be picked up by the same patterns. These proteases are listed below. Achromobacter lyticus protease I. Lysobacter alpha-lytic protease. Streptogrisin A and B (Streptomyces proteases A…
