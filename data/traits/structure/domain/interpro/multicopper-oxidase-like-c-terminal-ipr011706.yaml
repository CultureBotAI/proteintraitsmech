label: "Multicopper oxidase-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of multicopper oxidase and related proteins some of which have lost the ability to bind copper. Copper is one of the most prevalent transition metals in living organisms and its biological function is intimately related to its redox properties. Since free copper is toxic, even at very low concentrations, its homeostasis in living organisms is tightly controlled by subtle molecular mechanisms. In eukaryotes, before being transported inside the cell via the high-affinity copper transporters of the CTR family, the copper (II) ion is reduced to copper (I). In blue copper proteins such as cupredoxin, the copper (I) ion form is stabilised by a constrained His2Cys coordination environment. Multicopper oxidases oxidise their substrate by accepting electrons at a mononuclear copper centre and transferring them to a trinuclear copper centre; dioxygen binds to the trinuclear centre and, following the transfer of four electrons, is reduced to two molecules of water. There are three spectroscopically different copper centres found in multicopper oxidases: type 1 (or blue), type 2 (or normal) and type 3 (or coupled binuclear). Multicopper oxidases consist of 2, 3 or 6 of these homologous domains, which also share homology to the cupredoxins azurin and plastocyanin. Structurally, these domains consist of a cupredoxin-like fold, a β-sandwich consisting of 7 strands in 2 β-sheets, arranged in a Greek-key β-barrel. Multicopper oxidases include: Ceruloplasmin ( ) (ferroxidase), a 6-domain enzyme found in the serum of mammals and birds that oxidizes different inorganic and organic substances; exhibits internal sequence homology that appears to have evolved from the triplication of a Cu-binding domain similar to that of laccase and ascorbate oxid…
