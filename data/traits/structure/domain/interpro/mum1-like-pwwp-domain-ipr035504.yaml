identifier: InterPro:IPR035504
label: "MUM1-like, PWWP domain"
definition: >-
  This entry represents the PWWP domain. The PWWP domain, named for a conserved Pro-Trp-Trp-Pro motif, is a small domain consisting of 100-150 amino acids. The PWWP domain is found in numerous proteins that are involved in cell division, growth and differentiation. Most PWWP-domain proteins seem to be nuclear, often DNA-binding proteins, that function as transcription factors regulating a variety of developmental processes. PWWP domain-containing DNA repair factor 3A (also known as EXPAND1 or MUM1) is a nucleosome-binding protein that contributes to the maintenance of chromatin state. Through its interaction with 53BP1, it serves as an accessory factor in the DNA damage response pathway to promote chromatin change in response to DNA damage. MUM1 promotes cell survival following DNA damage, suggesting that it may facilitate DNA repair by regulating the organization of chromatin structure.
