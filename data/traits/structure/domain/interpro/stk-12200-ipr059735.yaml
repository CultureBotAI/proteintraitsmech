identifier: InterPro:IPR059735
label: STK_12200
definition: >-
  This entry represents the N-terminal in STK_12200 and related uncharacterised proteins found exclusively in thermoacidophilic archaea. This domain is found in Thermoproteota, particularly Sulfolobaceae including Sulfurisphaera, Acidianus, and Metallosphaera. The proteins are approximately 163 amino acids in length and contain a C-terminal disordered region rich in basic residues. The function of this protein remains to be determined.
