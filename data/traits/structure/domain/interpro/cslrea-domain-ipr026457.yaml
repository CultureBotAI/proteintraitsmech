identifier: InterPro:IPR026457
label: "CSLREA domain"
definition: >-
  This entry represents an N-terminal region, with a motif CSLREA, shared by tandem genes in Acinetobacter that both have the GlyGly-CTERM putative protein-sorting domain. Many proteins with this domain are putative outer membrane proteins (OMPs) with predicted β-strand-forming repeats.
