identifier: InterPro:IPR019459
label: "GRIP-related Arf-binding domain"
definition: >-
  The GRIP-related Arf-binding (GRAB) domain is located towards the C terminus of Rud3 type proteins. It is related to the GRIP domain, but the conserved tyrosine residue found at position 4 in all GRIP domains is replaced by a leucine residue. The small GTPase Arf is localised to the cis-Golgi where it recruits proteins via their GRAB domain, as part of the transport of cargo from the endoplasmic reticulum to the plasma membrane.
