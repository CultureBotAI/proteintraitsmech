identifier: InterPro:IPR055474
label: "Domain of unknown function DUF7046"
definition: >-
  This domain is found in a group of uncharacterised plant proteins. These proteins are probably distantly related to the plant-specific actin-binding protein SCAB1 and are predicted to contain a fusion domain composed of Ig and PH-like domains in a similar arrangement as in SCAB1. The domain represented by this entry, which is often found associated with , is predicted to fold as an atypical PH-like domain.
