identifier: InterPro:IPR016009
label: "tRNA methyltransferase TRMD/TRM10-type domain"
definition: >-
  This domain is found in tRNA methyltransferases including tRNA (guanine-N(1)-)-methyltransferases (TRMD) and mitochondrial ribonuclease P protein 1. Proteins containing this domain also include tRNA (guanine(9)-N1)-methyltransferase (Trm10) from yeasts and Trmt10A from fruit flies.
