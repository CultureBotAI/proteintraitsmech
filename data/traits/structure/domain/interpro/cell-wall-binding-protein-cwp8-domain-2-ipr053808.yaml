identifier: InterPro:IPR053808
label: "Cell wall binding protein Cwp8, domain 2"
definition: >-
  Cwp8 is a member of the C. difficile cell wall protein (CWP) family. It consists of several domains. This entry represents domain 2 (D2) that is a part of the N-terminal elongated region of the molecule. This domain is composed of a three-stranded antiparallel β-sheet, an α-helix packed on it and a short β-hairpin located at the edge of the sheet.
