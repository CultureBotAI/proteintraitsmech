identifier: InterPro:IPR034834
label: "PGC-1-related coactivator, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif of PGC-1-related coactivator (PRC). PGC-1-related coactivator (PRC or PPRC1) was first identified as a transcriptional coactivator that shares structural and functional features with PGC-1alpha. It belongs to the PGC-1 family. Similar to other PGC-1 members, PRC has a function in growth-regulated mitochondrial biogenesis. Different from other PGC-1 family members, PRC mRNA is induced by serum growth factors in the absence of de novo protein synthesis, which place the PRC gene in a class of immediate early or primary response genes. In mice germ line, knock-out of PRC causes early embryonic lethality. PRC is also required for the induction of an inflammatory/stress response to multiple metabolic insults.
