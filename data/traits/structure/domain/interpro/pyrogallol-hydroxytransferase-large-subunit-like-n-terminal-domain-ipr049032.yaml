identifier: InterPro:IPR049032
label: "Pyrogallol hydroxytransferase large subunit-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Pyrogallol hydroxytransferase large subunit from Pelobacter acidigallici (AthL), which is involved in the isomerisation of pyrogallol to phloroglucin. This domain is found associated with , which are similar to the domains of the DMSO reductase family.
