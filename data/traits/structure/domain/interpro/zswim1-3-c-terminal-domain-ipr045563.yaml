identifier: InterPro:IPR045563
label: "ZSWIM1/3, C-terminal domain"
definition: >-
  This entry represents a domain of unknown function found at the C-terminal of Zinc finger SWIM domain-containing proteins 1/3 (ZSWIM1/3) from vertebrates. The function of these proteins is currently unknown. ZSWIM1 may play a role in the development or function of T helper cells.
