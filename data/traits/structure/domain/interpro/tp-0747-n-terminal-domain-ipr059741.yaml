identifier: InterPro:IPR059741
label: "TP_0747, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of TP_0747, an uncharacterised protein from Treponema pallidum. TP_0747 is 344 amino acids in length and contains a disordered region. This domain is found predominantly in Spirochaetota, particularly within Spirochaetales including Treponemataceae, Spirochaetaceae and Breznakiellaceae. The function of this N-terminal domain remains to be determined.
