identifier: InterPro:IPR005900
label: 6-phosphogluconolactonase, DevB-type
definition: >-
  This entry refers to the DevB type of 6-phosphogluconolactonase. 6-phosphogluconolactonases (6PGL) are cytosolic enzymes found in all organisms that catalyse the hydrolysis of 6-phosphogluconolactone to 6-phosphogluconic acid in the oxidative phase of the pentose phosphate pathway. Trypanosoma brucei and other characterised 6PGL proteins share an α/β hydrolase fold, with both parallel and anti-parallel β-sheets surrounded by eight α-helices. In Escherichia coli (strain K12), 6PGL (YbhE) is characterised by a 7-bladed β-propeller fold ( ).
