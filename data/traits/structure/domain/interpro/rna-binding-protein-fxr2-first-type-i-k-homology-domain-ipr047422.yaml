identifier: InterPro:IPR047422
label: "RNA-binding protein FXR2, first type I K homology domain"
definition: >-
  FXR2 contains three K-homology (KH) RNA-binding domains, the first one is represented in this entry, which corresponds to a divergent KH domain that lacks the RNA-binding GXXG motif. FXR2 is an RNA-binding protein that associates with polyribosomes, predominantly with 60S large ribosomal subunits and recognises methylated lysine and bind H4K20me1/2/3. It is one of the autosomal paralogues of FMRP protein, part of a family of RNA-binding proteins that are involved the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs, playing a crucial role in neuronal development and synaptic plasticity, involved in the development of fragile X syndrome (FXS). They are highly similar to one another and also retain highly conserved domain architecture comprising two tandem Tudor Agenet-like domains at the N-terminal, three ribonucleoprotein K homology (KH) domains and a cluster of arginine and glycine residues that constitute the RGG box. The KH domains and RGG box constitute a large region that is important for RNA binding and polyribosome association. FRX2 has been shown to specifically regulate hippocampal neurogenesis by reducing the stability of Noggin mRNA.
