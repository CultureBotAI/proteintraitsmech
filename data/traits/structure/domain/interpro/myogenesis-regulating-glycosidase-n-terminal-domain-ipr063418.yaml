identifier: InterPro:IPR063418
label: "Myogenesis-regulating glycosidase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of approximately 220 residues found in myogenesis-regulating glycosidase (MYORG) proteins. The domain is found N-terminal to the glycoside hydrolase family 31 catalytic domain ( ). MYORG is an endoplasmic reticulum-localised alpha-galactosidase belonging to glycoside hydrolase family 31. Mutations in MYORG are associated with primary familial brain calcification (PFBC), a condition characterised by abnormal calcium phosphate deposits in the brain. The crystal structure of human MYORG has been determined (PDB:7QQF). This family is found in metazoans including mammals and insects. The specific function of this N-terminal domain remains to be determined.
