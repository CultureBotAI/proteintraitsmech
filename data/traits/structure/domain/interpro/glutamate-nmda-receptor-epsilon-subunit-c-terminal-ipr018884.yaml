identifier: InterPro:IPR018884
label: "Glutamate [NMDA] receptor, epsilon subunit, C-terminal"
definition: >-
  This domain is found at the C terminus of many NMDA-receptor proteins, many of which are also associated with and . This region is predicted to be a large extra-cellular domain of the NMDA receptor proteins, being highly hydrophilic, and is thought to be integrally involved in the function of the receptor. The region also carries a number of potential N-glycosylation sites.
