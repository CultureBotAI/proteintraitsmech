identifier: InterPro:IPR010317
label: "WxL Interacting Protein, peptidoglycan binding domain"
definition: >-
  This domain is found in WxL interacting proteins (WxLIP) which play a role in virulence and are widely distributed in firmicutes. The WxL proteins usually occur within a gene cluster that contains two WxL proteins and a WxL interacting protein composed of three domains: peptidoglycan binding domain (PGBD), host binding domain (HBD), and transmembrane helix (TMH). The domain represented by this entry, previously known as DUF916, is involved in binding to peptidoglycan and to WxL, and anchoring the protein cluster onto the bacterial surface. This PGBD domain is frequently found in combination with HBD domain ( ) and both were shown to function synergistically as a single unit that binds to the peptidoglycan and interacts with the eukaryotic host. The PGBD domain is predicted to adopt a β-sandwich with an Ig-like topology.
