identifier: InterPro:IPR058591
label: "Glucosyltransferase 3-like, N-terminal domain"
definition: >-
  This domain is found N-terminal is Glucosyltransferase 3 (Gtf3) from from S. pneumoniae, its homologue GtfC from S. agalactiae and related proteins. This domain contains a loop region which is critical for the substrate binding and the enzymatic activity. This domain is also found in the Beta-1,6-galactofuranosyltransferase WbbI. Streptococcus agalactiae is the leading cause of bacterial sepsis and meningitis among newborns. GtfC gene is located downstream of the srr2 which is responsible for the bacterial virulence. GtfC is required for polymorphic O-glycosylation of the Srr2 protein. It catalyses the transfer of glucose from UDP-glucose to the terminal GlcNAc moiety of 3-O-(N-acetyl-alpha-D-glucosaminyl)-L-seryl-[protein] which results from the first glycosylation step of Srr2. Beta-1,6-galactofuranosyltransferase WbbI which is involved in the transfer of galactofuranose onto an alpha-D-gluco-configured acceptor substrate to form a beta-1,6-linkage. It uses n-octyl alpha-D-glucopyranoside as an acceptor substrate for the addition of galactofuranose from the donor substrate UDP-galactofuranose. Glucosyltransferase 3 (also known as Glucosyltransferase C, GtfC) catalyses the second step of glycosylation of Serine-rich repeat glycoproteins (SRRPs) in Gram-positive bacteria and transfers glucosyl residues to GlcNAc-modified SRRPs. SRRPs have been first identified in pathogenic bacteria but they are also in gut commensal bacteria. These proteins are O-glycosylated on serine or threonine residues to be exported via an specialised accessory secretion (SecA2/Y2) system. This secretion system is encoded in a gene cluster that includes the motor protein SecA2, the channel SecY2 and three to five accessory Sec proteins, but it also contains genes encoding a variable number of gl…
