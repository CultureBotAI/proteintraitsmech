label: "Domain of unknown function DUF8764"
definition: >-
  This entry represents a domain of unknown function mainly found at the C-terminal of sequences from ticks, spiders and similar sequences from arthropods. This domain may adopt an α-helical bundle fold similar to Ty3 transposon capsid-like proteins.
