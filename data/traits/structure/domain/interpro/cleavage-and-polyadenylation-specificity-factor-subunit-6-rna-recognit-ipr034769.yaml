identifier: InterPro:IPR034769
label: "Cleavage and polyadenylation specificity factor subunit 6, RNA recognition motif"
definition: >-
  This entry represents the N-terminal RNA recognition motif (RRM) of CPSF6, which mediates the interaction with the cleavage factor CFIm25 in human. It also serves to enhance RNA binding and facilitate RNA looping. CPSF6, also known as CFIm68, is a component of the Cleavage Factor Im complex (CFIm) which plays a key role in pre-mRNA 3'-cleavage and polyadenylation. It has been shown to bind HIV-1 capsid and connect HIV-1 preintegration complexes to intranuclear trafficking pathways that link integration to transcriptionally active chromatin.
