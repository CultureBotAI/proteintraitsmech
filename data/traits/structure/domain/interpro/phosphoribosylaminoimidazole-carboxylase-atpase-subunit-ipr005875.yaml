identifier: InterPro:IPR005875
label: Phosphoribosylaminoimidazole carboxylase, ATPase subunit
definition: >-
  Phosphoribosylaminoimidazole carboxylase is a fusion protein in plants and fungi, but consists of two non-interacting proteins in bacteria, PurK and PurE. This entry includes PurK, N5-carboxyaminoimidazole ribonucleotide (N5_CAIR) synthetase, which catalyzes the conversion of 5-aminoimidazole ribonucleotide (AIR), ATP, and bicarbonate to N5-CAIR, ADP, and Pi. PurE converts N5-CAIR to CAIR. In the presence of high concentrations of bicarbonate, PurE is reported able to convert AIR to CAIR directly and without ATP.
