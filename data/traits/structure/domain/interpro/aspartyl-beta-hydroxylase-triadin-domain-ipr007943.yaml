identifier: InterPro:IPR007943
label: "Aspartyl beta-hydroxylase/Triadin domain"
definition: >-
  This domain is found in members of the junctin, junctate and aspartyl beta-hydroxylase protein families. Junctate is an integral ER/SR membrane calcium binding protein, which comes from an alternatively spliced form of the same gene that generates aspartyl beta-hydroxylase and junctin. Aspartyl beta-hydroxylase catalyses the post-translational hydroxylation of aspartic acid or asparagine residues contained within epidermal growth factor (EGF) domains of proteins. This domain is also found in several eukaryotic triadin proteins. Triadin is a ryanodine receptor and calsequestrin binding protein located in junctional sarcoplasmic reticulum of striated muscles.
