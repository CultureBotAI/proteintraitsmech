identifier: InterPro:IPR049035
label: "ATP-dependent helicase/deoxyribonuclease AddB N-terminal"
definition: >-
  This entry represents the N-terminal domain of ADDB, which contains the Walker A motif involved in ATP binding. AddB functions as a heterodimer with AddA and acts as both an ATP-dependent DNA helicase and dual-direction single-stranded exonuclease. The complex recognises chi sites and generates DNA molecules suitable for homologous recombination initiation. AddB has 5' to 3' nuclease activity but lacks helicase activity despite containing conserved helicase domains. The protein binds a 4Fe-4S cluster and requires magnesium for activity.
