identifier: InterPro:IPR058987
label: "MPN635, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal end of MPN_635 from Mycoplasma pneumoniae. It is also found at the C-terminal end of MPN633 and in similar prokaryotic sequences. The specific function of this domain remains to be determined.
