identifier: InterPro:IPR047244
label: "Insulin gene enhancer protein ISL-1/2-like, LIM domain1"
definition: >-
  This entry represents the first LIM domain of ISL-1/2, which show two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain ( ). This group of proteins includes the DNA-binding transcriptional activators insulin gene enhancer proteins ISL-1/2 (also known as Islet-1/2) and its homologues from animals. ISL1 recognises and binds to the consensus octamer binding site 5'-ATAATTAA-3' in promoter of target genes. The early expression of ISL-1 in the developing hypothalamus determines the fate specification of melanocortinergic neurons and is essential for hypothalamic Pomc expression. It is required for melanocortin-induced satiety and normal adiposity throughout the entire lifespan. ISL2 is a transcriptional factor that may define subclasses of motoneurons that segregate into columns in the spinal cord and select distinct axon pathways.
