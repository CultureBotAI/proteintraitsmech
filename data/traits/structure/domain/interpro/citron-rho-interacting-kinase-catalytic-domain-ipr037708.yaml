identifier: InterPro:IPR037708
label: "Citron Rho-interacting kinase, catalytic domain"
definition: >-
  CRIK (also called citron kinase) is an effector of the small GTPase Rho. It plays an important function during cytokinesis and affects its contractile process. CRIK-deficient mice show severe ataxia and epilepsy as a result of abnormal cytokinesis and massive apoptosis in neuronal precursors. A Down syndrome critical region protein TTC3 interacts with CRIK and inhibits CRIK-dependent neuronal differentiation and neurite extension. CRIK contains a catalytic domain, a central coiled-coil domain, and a C-terminal region containing a Rho-binding domain (RBD), a zinc finger, and a pleckstrin homology (PH) domain, in addition to other motifs.
