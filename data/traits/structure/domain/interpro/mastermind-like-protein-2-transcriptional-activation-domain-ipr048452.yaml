identifier: InterPro:IPR048452
label: "Mastermind-like protein 2, transcriptional activation domain"
definition: >-
  This entry represents the TAD domain from human MAML2 and similar sequences from vertebrates. Mastermind-like proteins (MAML1-3) were first described as transcriptional co-activators for Notch signalling but more recently they have been also implicated as transcriptional co-activators in other signal transduction pathways including muscle differentiation and myopathies, tumour suppressor pathway (p53) and colon carcinoma survival (beta-catenin). The N-terminal basic domain ( ) of MAML1-3 is the most conserved region of this proteins, outside this region their sequences are quite divergent. However, they all have transactivation domains (TADs) at the C-terminal end, suggesting different functions among them as they cooperate differentially with various Notch receptors in the activation of target genes. Recently, MAML1 and MAML2 have been identified as transcriptional coactivators of the Hippo pathway. A structural feature of the MAML family is the presence of polyglutamine (polyQ) tracts, which, in some polyQ proteins, expansion of this tracts cause protein inestability and the formation of nuclear inclusions in neurons, leading to neurotoxicity.
