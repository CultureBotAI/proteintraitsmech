identifier: InterPro:IPR056179
label: "3-dehydroquinate synthase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of 3-dehydroquinate synthase (DHQS) and related proteins. This domain contains most of the residues involved in catalysis and in substrate and Zn2+ binding. This domain is also found in AROM proteins which are pentafunctional enzymes that catalyse 5 consecutive enzymatic reactions in prechorismate polyaromatic amino acid biosynthesis. The 3-dehydroquinate synthase (DHQS) domain can exist in isolation or as a domain in the pentafunctional AROM polypeptide ( ). 3-dehydroquinate synthase catalyses the formation of dehydroquinate (DHQ) and orthophosphate from 3-deoxy-D-arabino heptulosonic 7 phosphate. This reaction is part of the shikimate pathway which is involved in the biosynthesis of aromatic amino acids. DHQS consists of an N-terminal Rossmann-fold domain and a C-terminal α-helical domain. The active site is located in a cleft between the two domains. This domain is also found in 3-dehydroquinate synthase II ( ), encoded by aroB genes in M. maripaludis which is widely distributed in methanogens. In M. jannaschii, proteins ADTH synthase (AroA) and DHQ synthase II (AroB) are required to convert 6-deoxy-5-ketofructose-1-phosphate (DKFP) and aspartate semialdehyde to 3-dehydroquinate (DHQ) in vitro.
