label: "C883_1060-like, ketoreductase domain, N-terminal"
definition: >-
  This is the N-terminal region of the ketoreductase (KR) domain of C883_1060 from Bacillus stratosphericus ( ) and similar bacterial sequences. The KR domain reduces the alpha-keto acid giving rise to hydroxy acid residues.
