identifier: InterPro:IPR032880
label: "CSC1/OSCA1-like, N-terminal transmembrane domain"
definition: >-
  This entry represents the first three transmembrane regions of calcium permeable stress-gated cation channel 1 (Csc1). Csc1 is a cation channel that is permeable to calcium and gated by physical signals such as hyperosmotic stress.
