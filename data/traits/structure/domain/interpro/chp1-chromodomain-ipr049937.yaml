identifier: InterPro:IPR049937
label: Chp1, chromodomain
definition: >-
  Chromodomain-containing protein 1 (Chp1) is required for RNA interference-dependent heterochromatin formation in fission yeast and it is a member of the RNA-induced transcriptional silencing (RITS) complex which maintains the heterochromatin regions, playing a role in stabilizing microtubules which allows accurate chromosome segregation. This entry represents the chromodomain (CD) of the Chp1 component which binds the histone H3 lysine 9 methylated tail (H3K9me) and the core of the nucleosome. Chromodomain is a conserved region usually of about 50 amino acids, found in a variety of chromosomal proteins, which appears to play a role in the functional organization of the eukaryotic nucleus.
