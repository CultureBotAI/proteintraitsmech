identifier: InterPro:IPR060558
label: "Epg5-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in EPG5 (Ectopic P granules protein 5 homolog) proteins mainly found in animals. EPG5 is involved in autophagy. The domain shares structural similarity with TPR motifs but may have diverged sequence characteristics. The function of this domain remains to be determined.
