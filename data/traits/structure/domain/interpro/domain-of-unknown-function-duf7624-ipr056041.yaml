identifier: InterPro:IPR056041
label: "Domain of unknown function DUF7624"
definition: >-
  This domain is found in uncharacterised proteins mainly from fungi. It is predicted to adopt a globular structure composed of α-helices. This domain has a number of conserved positively changed residues that in the predicted structure define a large positively charged patch on the surface.
