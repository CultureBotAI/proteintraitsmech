identifier: InterPro:IPR000320
label: "Hedgehog, N-terminal signalling domain"
definition: >-
  Hedgehog proteins are a family of secreted signal molecules required for embryonic cell differentiation. They are synthesised as inactive precursors with an N-terminal signalling domain linked to a C-terminal autoprocessing domain. The three-dimensional structure of the autolytic domain of the hedgehog protein of shows similarity with the β-strand core of intein splicing domains. It has hence been termed the hint (Hedgehog/Intein) domain. This entry represents the N-terminal domain of hedgehog proteins, which is responsible for signalling following cleavage from the C-terminal domain. Its structure has been solved, and reveals a tetrahedrally coordinated zinc ion that appears to be structurally analogous to the zinc coordination sites of zinc hydrolases, such as thermolysin and carboxypeptidase A. This putative catalytic site represents a distinct activity from the autoprocessing activity that resides in the carboxy-terminal domain.
