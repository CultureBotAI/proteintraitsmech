identifier: InterPro:IPR048574
label: "Rubrerythrin, rubredoxin-like domain"
definition: >-
  Rubrerythrin (RUBY) is a fusion protein containing an N-terminal diiron-binding domain ( ) and a C-terminal rubredoxin-like domain. RUBY may play a role in oxidative stress. This entry represents the rubredoxin-like domain of RUBY, reverse rubrerythrin 1/2 from Clostridium acetobutylicum (RRBR1/2) and Nigerythrin from Desulfovibrio vulgaris. RRBRs function as the terminal component of an NADH peroxidase when using NADH:rubredoxin oxidoreductase (NROR) as the electron transport intermediary from NADH to RRBRs and play an important role in the oxidative stress defence system of C. acetobutylicum.
