identifier: InterPro:IPR010817
label: "HemY, N-terminal"
definition: >-
  This entry represents the N terminus (approximately 150 residues) of bacterial HemY porphyrin biosynthesis proteins. These are membrane protein involved in a late step of protoheme IX synthesis.
