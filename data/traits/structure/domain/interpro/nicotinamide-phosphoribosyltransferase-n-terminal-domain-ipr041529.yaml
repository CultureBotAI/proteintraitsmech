identifier: InterPro:IPR041529
label: "Nicotinamide phosphoribosyltransferase, N-terminal domain"
definition: >-
  This is the N-terminal domain found in Nicotinamide phosphoribosyltransferase (NAMPT). NAMPT captures nicotinamide (NAM) and replenishes the nicotinamide adenine dinucleotide (NAD+) pool during ADP-ribosylation and transferase reactions.
