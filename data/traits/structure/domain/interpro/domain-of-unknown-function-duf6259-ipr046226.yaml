identifier: InterPro:IPR046226
label: "Domain of unknown function DUF6259"
definition: >-
  This domain is mainly found in bacterial proteins and is functionally uncharacterised. However, some proteins containing this domain are putative glycoside hydrolases. Proteins containing this domain are typically between 678 and 749 amino acids in length.
