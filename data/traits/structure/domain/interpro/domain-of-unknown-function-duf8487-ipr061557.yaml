label: "Domain of unknown function DUF8487"
definition: >-
  This entry represents a C-terminal domain found in some glycosyl hydrolase family 2 proteins. This domain follows the N-terminal ( ), catalytic ( ) and C-terminal ( ) domains characteristic of this family. The domain is approximately 170-185 residues in length. These proteins include exo-beta-1,4-galactosidases involved in degrading galactan substituents from plant cell wall polysaccharides. The family is found in diverse bacteria including Bacteroidota and Bacillota. The function of this domain remains to be determined.
