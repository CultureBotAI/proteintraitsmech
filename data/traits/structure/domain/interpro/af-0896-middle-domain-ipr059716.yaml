identifier: InterPro:IPR059716
label: "AF_0896, middle domain"
definition: >-
  This entry represents the middle domain of AF_0896 and related uncharacterised proteins found in archaea. This domain is found predominantly in halophilic archaea including Natrialbaceae and Haloferacaceae, with some members in Nitrososphaeraceae. The full-length proteins are approximately 369 amino acids and contain three domains. The function of this middle domain remains to be determined.
