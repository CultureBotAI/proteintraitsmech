identifier: InterPro:IPR029325
label: ITPR-interacting domain
definition: >-
  This domain entry includes the N terminus of the actin-interacting protein sperm-specific antigen 2 (SSFA2), also known as Ki-ras-induced actin-interacting protein (KRAP). In this region are found the residues that interact with inositol 1,4,5-trisphosphate receptor (IP3R, also known as ITPR). SSFA2 was first localised as a membrane-bound form with extracellular regions, suggesting it might be involved in the regulation of filamentous actin and signals from the outside of the cells. It has now been shown to be critical for the proper subcellular localisation and function of IP3R. Inositol 1,4,5-trisphosphate receptor functions as the Ca2+ release channel on specialised endoplasmic reticulum membranes, so the subcellular localisation of IP3R is crucial for its proper function. This entry also recognises a domain in Tespa1 and an uncharacterised coiled-coil protein CCDC129. Tespa1 (thymocyte-expressed positive selection-associated protein 1) is required for the development and maturation of T-cells. Tespa1 shows sequence homology to SSFA2 and physically associates with IP3R in T and B lymphocytes.
