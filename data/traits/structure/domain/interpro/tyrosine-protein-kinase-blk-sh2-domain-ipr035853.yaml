identifier: InterPro:IPR035853
label: "Tyrosine-protein kinase Blk, SH2 domain"
definition: >-
  Blk is a member of the Src non-receptor type tyrosine kinase family of proteins. Blk is involved in B-cell receptor signaling and B-cell development. Unlike most other Src members Blk lacks cysteine residues in the SH4 domain that undergo palmitylation. Blk is required for the development of IL-17-producing gamma-delta T cells. The Src non-receptor type tyrosine kinase (SFK) family members have an unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail. The SH2 domain of SFKs is involved in kinase autoinhibition and T-cell receptor signaling. The binding SH2 domains to phosphotyrosine (pY) sites is critical for the autoinhibition and substrate recognition of the SFKs.
