identifier: InterPro:IPR060203
label: "Leucine-rich repeat-containing protein 43, C-terminal domain"
definition: >-
  This entry represents the C-terminal C2 domain of leucine-rich repeat-containing protein 43 (LRRC43). This C-terminal region contains a C2 fold structure. The specific function of this C-terminal domain remains to be determined. Leucine-rich repeat-containing protein 43 (LRRC43) is found in mammals and contains multiple leucine-rich repeats. The protein is expressed in testis and other tissues. Its function is not yet clear.
