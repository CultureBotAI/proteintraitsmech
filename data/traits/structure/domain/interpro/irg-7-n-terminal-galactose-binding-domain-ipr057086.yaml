identifier: InterPro:IPR057086
label: "Irg-7, N-terminal galactose binding domain"
definition: >-
  This domain is found N-terminal in the nematode Irg-7 protein and related proteins. The domain is predicted to fold into a β-sandwich with topology similar to galactose-binding domains. Irg-7 is known as mediator of longevity in germlineless animals. It plays a role in the innate immunity, probably via the atf-7 pathway, and confer resistance to pathogenic bacteria.
