identifier: InterPro:IPR000525
label: Initiator Rep protein, WH1 domain
definition: >-
  This entry represents the WH1 domain found in the initiator of plasmid replication proteins, RepA and related sequences. RepA is a protein from Escherichia coli involved in plasmid replication. The RepA protein binds to DNA repeats that flank the repA gene. A similar RepA family of proteins with wider distribution are the bacterial plasmid DNA replication initiator proteins (see ). These proteins consist of two domains containing a winged helix-turn-helix motif. The N-terminal domain, WH1, is involved in the dimerization of RepE and an auxiliary binding to DNA. The C-terminal domain, WH2, is related to a sequence-specific binding to the common 8 bp of the iteron.
