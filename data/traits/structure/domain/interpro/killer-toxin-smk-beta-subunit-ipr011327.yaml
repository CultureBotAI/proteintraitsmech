identifier: InterPro:IPR011327
label: "Killer toxin, SMK, beta subunit"
definition: >-
  This entry represents the beta subunit of SMK killer toxins that are secreted by several strains of yeasts. SMK toxin is encoded by a single open reading frame of chromosomal DNA (the SMK1 gene) and is translated in the form of a 222 amino acid preprotoxin. This preprotoxin is converted to the alpha and beta heterodimeric mature toxin, with a molecular weight of 14 kDa, through stepwise proteolytic processing. The killer toxin SMK (salt-mediated killer) from the halotolerant yeast Pichia farinosa acts to kill sensitive strains of yeast. SMK exhibits maximum activity under conditions of acidic pH and high salt concentration. It is composed of two distinct subunits, alpha and beta, which tightly interact with each other under acidic conditions, jointly folding into an ellipsoidal single domain structure belonging to the α/β-sandwich family. SMK assumes a similar folding topology to the fungal killer toxin KP4, forming two left-handed split β/α/β motifs, which is rarely found in other toxins; hence, these toxins may be evolutionarily or functionally related. SMK appears to function by associating with the membranes of sensitive cells.
