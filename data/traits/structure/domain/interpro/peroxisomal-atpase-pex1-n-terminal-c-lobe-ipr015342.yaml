identifier: InterPro:IPR015342
label: "Peroxisomal ATPase PEX1, N-terminal C-lobe"
definition: >-
  The N-terminal domain of PEX1 adopts a double ψ β-barrel fold, similar in structure to the Cdc48 N-terminal domain. It has been suggested that this domain may be involved in interactions with ubiquitin, ubiquitin-like protein modifiers, or ubiquitin-like domains, such as Ubx. Furthermore, the domain may possess a putative adaptor or substrate binding site, allowing for peroxisomal biogenesis, membrane fusion and protein translocation. This domain can be subdivided in N- and C-lobes. This entry represents the C-lobe.
