identifier: InterPro:IPR056751
label: "ERT1/acuK family, PAS domain"
definition: >-
  This entry represents a C-terminal PAS domain found in ERT1/acuK proteins. The ERT1/acuK family consists of transcription factors that play a crucial role in regulating nonfermentable carbon utilization. These proteins act as activators of gluconeogenetic genes, facilitating the conversion of non-carbohydrate substrates into glucose. Members of this family are involved in various metabolic pathways, including gluconeogenesis and the tricarboxylic acid (TCA) cycle. Some proteins in this family also participate in processes such as drug resistance and cell wall remodeling. The family includes proteins that bind specific DNA sequences in promoter regions, thereby influencing gene expression. Additionally, certain members are involved in iron acquisition and metabolism, contributing to the organism's virulence and adaptation to glucose starvation conditions.
