identifier: InterPro:IPR045100
label: Terminal uridylyltransferase 4/7, nucleotidyltransferase domain
definition: >-
  This domain is found in terminal uridylyltransferases from animals, such as TUT4 and TUT7. Uridylyltransferases mediate the terminal uridylation of mRNAs with short (less than 25 nucleotides) poly(A) tails, hence facilitating global mRNA decay.
