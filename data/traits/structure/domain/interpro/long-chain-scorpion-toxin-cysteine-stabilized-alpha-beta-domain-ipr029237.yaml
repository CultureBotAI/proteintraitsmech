identifier: InterPro:IPR029237
label: "Long chain scorpion toxin, cysteine-stabilized alpha/beta domain"
definition: >-
  This entry consists of long chain scorpion potassium channel toxins and scorpine-like peptides. Scorpine-like peptides include scorpine, opiscorpine1-4, HgeScplp1, HgeScplp2 and heteroscorpine 1. They exhibit strong antimicrobial effects as well as cytolytic activity against eukaryotic cells. This is the cysteine-stabilized alpha/beta (CS-α/β) domain, which is more closely related to invertebrate defensins, than to the classical scorpion toxins. Its structure shows an α-helix along with one β-sheet stabilised by three disulfide bridges, folding into a CS-α/β motif (see ).
