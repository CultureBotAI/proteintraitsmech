label: "Accessory colonization factor AcfD, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of putative lipoprotein AcfD, found in bacteria. AcfD (accessory colonisation factor D) is involved in bacterial colonisation and adherence.
