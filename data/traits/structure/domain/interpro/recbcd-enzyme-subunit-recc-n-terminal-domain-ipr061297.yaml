identifier: InterPro:IPR061297
label: "RecBCD enzyme subunit RecC, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of RecBCD enzyme subunit RecC and similar bacterial proteins. The exodeoxyribonuclease V enzyme or RecBCD enzyme is a multisubunit enzyme comprised of the proteins RecB ( ), RecC (this family) and RecD ( ). This enzyme plays an important role in homologous genetic recombination, repair of double strand DNA breaks resistance to UV irradiation and chemical DNA-damage. The enzyme ( ) catalyses hydrolysis of single-stranded (ss) DNA or double-stranded (ds) DNA and unwinding of the ends of dsDNA. Its nuclease activity is controlled by Chi sites (5' G-C-T-G-G-T-G-G 3') in such a way that the enzyme produces a potent single-stranded DNA substrate for homologous pairing by RecA and single-stranded DNA binding proteins.
