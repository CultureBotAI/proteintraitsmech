identifier: InterPro:IPR019136
label: "Transcription factor IIIC subunit 5, HTH domain"
definition: >-
  Transcription factor IIIC (TFIIIC) is a multisubunit DNA binding factor that serves as a dynamic platform for assembly of pre-initiation complexes on class III genes. This entry represents subunit Tfc1/Sfc1 (also known as the tau 95 subunit) which holds a key position in TFIIIC, exerting both upstream and downstream influence on the TFIIIC-DNA complex by rendering the complex more stable. Once bound to tDNA-intragenic promoter elements, TFIIIC directs the assembly of TFIIIB on the DNA, which in turn recruits the RNA polymerase III (pol III) and activates multiple rounds of transcription. This entry represents the HTH domain of transcription factor IIIC subunit 5.
