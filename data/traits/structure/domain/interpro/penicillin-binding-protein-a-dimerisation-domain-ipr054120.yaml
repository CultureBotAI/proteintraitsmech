identifier: InterPro:IPR054120
label: "Penicillin binding protein A, dimerisation domain"
definition: >-
  This domain is found in peptidoglycan D,D-transpeptidase also known as penicillin-binding protein A (PBPA). This domain consists of a four-stranded mixed β-sheet with three short helices packed on one side. Compared to the N-terminal domains of other class B High Molecular Mass (HMM) PBPs, the NTD of PBPA is relatively small because it contains only the so-called inter-domain linker region.
