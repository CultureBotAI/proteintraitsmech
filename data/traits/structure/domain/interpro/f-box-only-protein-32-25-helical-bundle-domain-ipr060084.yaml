identifier: InterPro:IPR060084
label: "F-box only protein 32/25, helical bundle domain"
definition: >-
  This entry represents a helical bundle domain from F-box only protein 32/25 (FBXO32/25). The helical bundle domain is found in vertebrates and is likely involved in protein-protein interactions. This domain is distinct from the C-terminal F-box domain and is involved in substrate recognition. These proteins are substrate-recognition components of SCF E3 ubiquitin ligase complexes. FBXO32 mediates cyclin D1 protein stabilisation via 'Lys-27'-linked ubiquitination. FBXO25 is predominantly expressed in brain tissue. The protein is localised to the nucleus where it associates with subnuclear dot-like structures. The protein is specifically expressed in cardiac and skeletal muscle and shuttles between cytoplasm and nucleus.
