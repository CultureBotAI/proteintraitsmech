identifier: InterPro:IPR063437
label: "PGA domain"
definition: >-
  This entry represents the PGA domain found in predicted GPI-anchored proteins from Candida albicans. Members of this family include PGA13, PGA26, PGA30, PGA31 and PGA48. These are GPI-anchored cell wall proteins localised to the cell membrane. PGA26 is involved in proper cell wall integrity and is required for normal virulence in a mouse model of disseminated candidiasis. PGA26 knockout leads to hyperfilamentation, increased biofilm formation and altered sensitivities to environmental stresses. The proteins are induced during cell wall regeneration and under high-iron conditions. The specific function of this domain remains to be determined.
