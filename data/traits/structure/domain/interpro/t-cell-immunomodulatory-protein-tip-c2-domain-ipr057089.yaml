identifier: InterPro:IPR057089
label: "T-cell immunomodulatory protein TIP, C2 domain"
definition: >-
  This entry represents the N-terminal C2 domain present in T-cell immunomodulatory protein TIP proteins (enconded by gene ITFG1). In mammals, TIP promotes the adhesion between neighbouring cells through its extracellular domain and regulates microtubule dynamics through its intracellular domain. In parasites, it may protect the parasite against attack by the host immune system. Its ortologue in Caenorhabditis elegans (named linkin) is involved in gonadal cell migration.
