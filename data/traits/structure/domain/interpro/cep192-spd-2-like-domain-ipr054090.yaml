identifier: InterPro:IPR054090
label: "Cep192/Spd-2-like domain"
definition: >-
  Human Cep192 is a centrosomal protein with key roles in centriole duplication and pericentriolar material recruitment, organisation and regulation. Most of the metazoan Cep192 homologues consist of eight ASH/PapD-like domains, which are located at the C-terminal part of the proteins and are likely arranged in a beads-on-string fashion. This entry represents the fourth domain of the metazoan Cep192 homologues. This domain along with domain 5 constitutes the so-called Spd2 domain that is ubiquitously present in all SPD2/CEP192 homologues beyond Metazoa and represents the most conserved region amongst them. This domain is also found centrally located in Spindle-defective protein 2 from Caenorhabditis elegans (Spd-2), which is required for centrosome duplication and maturation and for pericentriolar material (PCM) recruitment.
