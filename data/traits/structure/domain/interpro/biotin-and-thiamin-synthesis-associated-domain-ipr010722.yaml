identifier: InterPro:IPR010722
label: "Biotin and thiamin synthesis-associated domain"
definition: >-
  This domain is found in biotin synthase and 2-iminoacetate synthase. The latter enzyme is involved in thiamine diphosphate biosynthesis. The reactions catalysed by these enzymes involve the binding of co-factors and both enzymes function as dimers. This domain may therefore be involved in co-factor binding or dimerisation. The domain is also found in proteins that are currently uncharacterised, such as .
