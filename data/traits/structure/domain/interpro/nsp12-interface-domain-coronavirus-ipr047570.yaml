identifier: InterPro:IPR047570
label: "NSP12, interface domain, coronavirus"
definition: >-
  RNA-directed RNA Polymerase corresponds to the nonstructural protein 12 (NSP12) produced by cleavage of ORF1b. NSP12 contains a polymerase domain that assumes a structure resembling a cupped 'right hand', similar to other polymerases, containing a fingers domain, a palm domain and a thumb domain. Coronavirus (CoV) NSP12 also contains a nidovirus-unique N-terminal extension (nidovirus RdRp-associated nucleotidyltransferase (NiRAN)) that possesses a kinase-like fold allowing the binding of NSP12 to NSP7 and NSP8 which is followed by an interface domain (IF). NSP12 possesses some minimal activity on its own, but the addition of the NSP7 and NSP8 co-factors greatly stimulates polymerase activity. This entry represents the CoV NSP12 interface domain.
