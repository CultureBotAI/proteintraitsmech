identifier: InterPro:IPR048743
label: "Inner kinetochore subunit AME1"
definition: >-
  This entry includes the inner kinetochore subunit AME1 (also known as CEMPU), a protein that is part of the yeast kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules. This protein is a component of the inner kinetochore COMA complex, which connects centromere-associated proteins and the outer kinetochore.
