identifier: InterPro:IPR056328
label: "ATP-dependent RNA helicase DHX29, DSRM-like domain"
definition: >-
  This is a presumed domain found near the middle of ATP-dependent RNA helicase DHX29 from human and at the N-terminal of the putative ATP-dependent RNA helicase YLR419W from yeast, which has been identified as the homologue of the translation initiation factor DHX29 from human. DHX29 is a DExH-box protein involved in eukaryotic translation initiation. DHX29 is required to bind to the 40S subunit of the 43S preinitiation complex to allow highly structured 5'-UTRs to be scanned. This domain is similar to DSRM (Double-Stranded RNA-binding Motif, also known as dsRBD) domains.
definition_source: InterPro
