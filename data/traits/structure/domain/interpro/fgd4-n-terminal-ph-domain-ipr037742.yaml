identifier: InterPro:IPR037742
label: FGD4, N-terminal PH domain
definition: >-
  FGD4 (also known as FRABIN) is a member of the FGD family and is a small RhoGTPase Cdc42-guanine nucleotide exchange factor. It is associated with Charcot-Marie-Tooth neuropathy type 4 (CMT4), a group of progressive motor and sensory axonal and demyelinating neuropathies that are distinguished from other forms of CMT by autosomal recessive inheritance. FGD4 has been shown to regulate Schwann cell endocytosis. This entry represents the N-terminal PH domain of FGD4. FGDs have a RhoGEF (DH) domain, followed by an N-terminal PH domain, a FYVE domain and a C-terminal PH domain. All FGDs are guanine nucleotide exchange factors that activates the Rho GTPase Cdc42, an important regulator of membrane trafficking. The RhoGEF domain is responsible for GEF catalytic activity, while the N-terminal PH domain is involved in intracellular targeting of the DH domain. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarised. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signalling proteins such as serine/threonine kinase, tyrosi…
