identifier: InterPro:IPR063446
label: "DCT6, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in DCT6 proteins. DCT6 (Daf-16/foxo controlled, germline tumor- affecting protein 6) may have a role in tumor suppression. The domain is found in nematodes including Caenorhabditis elegans and Caenorhabditis briggsae. The protein contains WD40/YVTN repeat- like structural features suggesting a β-propeller fold. DCT6 proteins are controlled by the DAF-16/FOXO transcription factor pathway.
