identifier: InterPro:IPR054325
label: "VtrA, C-terminal periplasmic domain"
definition: >-
  VtrA forms a complex with VtrC on the surface of the membrane that surrounds the bacterial cell. These two proteins create a platform that can bind to bile salts and trigger the release of bacterial toxins. This entry represents the C-terminal periplasmic domain of VtrA from Vibrio parahaemolyticus ( ), which interacts with the VtrC periplasmic domain. The VtrA periplasmic domain adopts an α/β structure consisting of a five-stranded antiparallel β-sheet and two helices packed on one side of it. Members of this group are specific to Vibrionales.
