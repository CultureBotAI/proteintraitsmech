identifier: InterPro:IPR021447
label: "DUF3097, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal end of a group of uncharacterised proteins mainly found in Actinomycetes. Members of this group are thought to have a nuclease function. This domain is predicted to show a Toprim-like configuration.
