identifier: InterPro:IPR063079
label: "AA11 lytic polysaccharide monooxygenase, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in AA11 family lytic polysaccharide monooxygenases (LPMOs). This domain is found in Ascomycota fungi. The full-length AA11 LPMO proteins are copper-dependent enzymes that depolymerise chitin via oxidation of glycosidic bonds. The catalytic activity resides in the N-terminal LPMO domain, which contains the copper-binding histidine brace. The specific function of this C-terminal domain remains to be determined.
