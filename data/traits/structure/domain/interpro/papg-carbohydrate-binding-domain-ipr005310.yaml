identifier: InterPro:IPR005310
label: "PapG, carbohydrate-binding domain"
definition: >-
  There are 3 PapG alleles, class I-III, which bind to different receptor isotypes, GbO3, GbO4, and GbO5, respectively. PapG, the adhesin of the P-pili, is situated at the tip and is only a minor component of the whole pilus structure. A two-domain structure has been postulated for PapG; a carbohydrate binding N terminus (this domain) and chaperone binding C terminus. The carbohydrate-binding domain interacts with the receptor glycan.
