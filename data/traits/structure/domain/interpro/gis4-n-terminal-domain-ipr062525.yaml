identifier: InterPro:IPR062525
label: "GIS4, N-terminal domain"
definition: >-
  This entry represents a domain covering the N-terminal in GIS4 found in fungi. GIS4 is a cytoplasmic protein that may be involved in the Ras/cAMP signalling pathway. The protein acts as a multicopy suppressor of the Gal- phenotype in snf1 mig1 srb8/10/11 cells. GIS4 contains multiple disordered regions and undergoes phosphorylation at multiple serine residues. The specific molecular function of this domain remains to be determined.
