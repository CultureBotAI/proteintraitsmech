label: "Helicase, SWF/SNF/SWI type, bacterial"
definition: >-
  This domain is found in bacterial proteins of the SWF/SNF/SWI helicase family to the N terminus of the SNF2 family N-terminal domain ( ) and together with the Helicase conserved C-terminal domain ( ). The function of the domain is not clear.
