identifier: InterPro:IPR058970
label: "Putative phage tail fibre, C-terminal domain"
definition: >-
  This entry represents the C-terminal β sandwich domain of a putative phage tail fibre protein. Members of this group are found in tailed bacteriophages and bacterial prophages, including Phage PhiTE protein phiTE_241 . These proteins are predicted to form a homotrimeric arrangement.
