identifier: InterPro:IPR019019
label: "H-type lectin domain"
definition: >-
  The H-type lectin domain is a unit of six beta chains, combined into a homo-hexamer. It is involved in self/non-self recognition of cells, through binding with carbohydrates. It is sometimes found in association with the C-terminal domain of coagulation factor F5/8 ( ).
