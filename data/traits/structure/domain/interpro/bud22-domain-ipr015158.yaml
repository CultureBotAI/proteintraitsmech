identifier: InterPro:IPR015158
label: "Bud22 domain"
definition: >-
  This entry represents a domain found in the fungal Bud22 protein and the animal SRFB1 (serum response factor-binding protein 1) protein. Budding yeast Bud22 is required for rRNA maturation and ribosomal subunit biogenesis. SRFB1 may be involved in regulating transcriptional activation of cardiac genes during the aging process and may play a role in biosynthesis and/or processing of SLC2A4 in adipose cells.
