label: "Phage-Barnase-EndoU-ColicinE5/D-RelE like nuclease 2"
definition: >-
  This entry represents a predicted endoRNase of the Barnase-EndoU-ColicinE5/D-RelE like nuclease fold found in polyvalent proteins of phages. The predicted active site contains a conserved arginine and threonine residues.
