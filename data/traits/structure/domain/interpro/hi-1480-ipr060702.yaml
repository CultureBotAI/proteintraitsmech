identifier: InterPro:IPR060702
label: HI_1480
definition: >-
  This entry represents the HI1480 protein from Haemophilus influenzae an apparent ORF protein. The protein HI1480 from Haemophilus influenzae has been structurally characterised. It exhibits a unique amino acid sequence, lacking homology with known proteins. HI1480 adopts a novel α+β fold and forms dimers of tightly associated dimers. The dimerisation is facilitated by intermolecular interactions mediated by an antiparallel β-barrel involving both monomers, while tetramer formation is mediated by helical regions of the dimers. Notably, the helical region contains a four-helix bundle reminiscent of anticodon binding domains found in class I tRNA synthetases, suggesting a potential active centre or catalytic site. Gel mobility shift assays demonstrate HI1480's ability to bind both DNA and RNA molecules, with a preference for double-stranded DNA over single-stranded DNA and a higher affinity for longer DNA fragments.
