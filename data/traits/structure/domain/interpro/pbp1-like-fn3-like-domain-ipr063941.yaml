identifier: InterPro:IPR063941
label: "PBP1-like, Fn3-like domain"
definition: >-
  This fibronectin3-like domain (fn3-like) is found in Penicillin-binding protein 1A/1B from Bacillus subtilis (PBP1) and related sequences. PBP1 plays a role in the synthesis of cross-linked peptidoglycan from the lipid intermediates and therefore in cell wall formation. It has a partially redundant function with PBP-2A during spore outgrowth.
