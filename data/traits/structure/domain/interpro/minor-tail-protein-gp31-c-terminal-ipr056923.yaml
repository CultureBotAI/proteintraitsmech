identifier: InterPro:IPR056923
label: "Minor tail protein gp31, C-terminal"
definition: >-
  This small region is found at the C terminus of a Minor tail protein gp31 from mycobacteriophages such as D29, Bxb1, L5 and related proteins from tailed bacteriophages and some bacterial prophages. According to structure predictions these proteins form homotrimers. Presumably this domain mediates interaction with either the host cell or with another phage tail fibre protein. The structure of this region forms three β-strands and up to two small α-helices, with one of the β-strands in the trimeric structure strand swapping between the monomers. In some phage we find this domain in isolation in rather short 60 residue proteins.
