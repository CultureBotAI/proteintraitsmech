identifier: InterPro:IPR049092
label: "MIOS-like, alpha-solenoid domain"
definition: >-
  GATOR complex protein MIOS, a component of the GATOR subcomplex GATOR2 which consists of MIOS, SEC13, SEH1L, WDR24 and WDR59, that activates mTORC1 and the TORC1 signaling pathway through the inhibition of the GATOR1 subcomplex. Sea4 is the counterpart from yeast, a component of the SEA complex which coats the vacuolar membrane and is involved in intracellular trafficking, autophagy, response to nitrogen starvation, and amino acid biogenesis. This entry represents a region between the WD40 and the zinc ribbon-like domains, which may have an α-solenoid structure.
