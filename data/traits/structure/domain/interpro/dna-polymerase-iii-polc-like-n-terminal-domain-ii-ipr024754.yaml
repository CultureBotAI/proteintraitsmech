identifier: InterPro:IPR024754
label: "DNA polymerase III PolC-like, N-terminal domain II"
definition: >-
  This entry represents the second N-terminal domain, NII domain, of the DNA polymerase III PolC subunit A. DNA polymerase PolC-type III enzyme functions as the 'replicase' in low G + C Gram-positive bacteria. It has been predicted that the N terminus of PolC folds into two globular domains, NI and NII. A predicted hydrophobic surface patch suggests this domain may be involved in protein binding. This domain is associated with bacterial DNA polymerase III, alpha subunit and DNA polymerase III PolC-like, N-terminal domain I ( ).
