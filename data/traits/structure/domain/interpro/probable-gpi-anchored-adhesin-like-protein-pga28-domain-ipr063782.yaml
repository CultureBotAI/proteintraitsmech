identifier: InterPro:IPR063782
label: "Probable GPI-anchored adhesin-like protein PGA28 domain"
definition: >-
  This entry represents a domain found in PGA-like and similar proteins mostly from Candida albicans. The domain is approximately 70-90 amino acids in length and can comprise the entire protein or appear as part of larger proteins. In PGA28, this domain represents the main adhesin region involved in cell adhesion and virulence. In PGA61, it forms part of a cell wall protein involved in cell wall organisation and hyphal growth. These proteins are GPI-anchored and localised to the cell membrane or cell wall. The domain is found in multiple copies in some proteins, suggesting functional importance through duplication. The specific function of this domain remains to be determined.
