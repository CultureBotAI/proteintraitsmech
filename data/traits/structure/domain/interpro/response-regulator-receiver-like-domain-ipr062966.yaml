identifier: InterPro:IPR062966
label: "Response regulator receiver-like domain"
definition: >-
  This entry represents a small domain of approximately 75-90 amino acids found exclusively in halophilic archaea. The family is restricted to the order Halobacteriales, particularly the families Natrialbaceae, Haloarculaceae and Haloferacaceae. Based on structural prediction, this domain adopts a response regulator receiver-like fold. Response regulator receiver domains are typically components of two-component signal transduction systems. The specific function of this domain remains to be determined. This domain can be found associated with .
