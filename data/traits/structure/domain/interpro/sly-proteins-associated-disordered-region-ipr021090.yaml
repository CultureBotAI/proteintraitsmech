identifier: InterPro:IPR021090
label: "SLy proteins associated disordered region"
definition: >-
  This entry represents the SLy proteins associated disordered region (SPIDER), which is conserved in the SLy protein family. It has a disordered nature and ranges from 143 to 154 residues long. The region includes a conserved LGKK motif of unknown function as well as a nuclear localisation sequence. In most members of this group of proteins from vertebrates, this region is followed by SH3 ( ) and SAM ( ) domains, suggesting a role in the signalling function of these proteins. SPIDER is a part of the SASH1 protein that plays essential roles in tumour cell adhesion and migration. Multiple disease variants in the SPIDER of SASH1 suggest that it may be involved in the regulation of skin pigmentation.
