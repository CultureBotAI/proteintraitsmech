identifier: InterPro:IPR044081
label: "Domain of unknown function DUF5776"
definition: >-
  This entry represents a presumed stalk domain found in bacterial surface proteins forming tandem repeats with high sequence identity. This domain is also associated with other known bacterial surface protein stalks and adhesive domains. This domain can also be found in Endolysin and L-alanyl-D-glutamate peptidase from phage.
