identifier: InterPro:IPR027882
label: "SOGA 1/2-like, coiled-coil"
definition: >-
  This entry represents a coiled-coil region found in microtubule cross-linking factors 1 and 2 (also known as SOGA1/2), which are members of the SOGA (suppressor of glucose by autophagy) family. SOGA1 regulates autophagy by playing a role in the reduction of glucose production in an adiponectin-and insulin-dependent manner. It is required for faithful chromosome segregation during mitosis. This entry also includes KIAA0408, an uncharacterised human protein.
