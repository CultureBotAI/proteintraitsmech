identifier: InterPro:IPR060648
label: "Glycyl-tRNA synthetase, insertion domain 1"
definition: >-
  This entry represents an insertion domain of approximately 80-85 residues found in dimeric glycyl-tRNA synthetases from Thermus thermophilus and related organisms. This domain is uniquely inserted between sequence motifs 1 and 2 of the class II synthetase catalytic domain and is positioned above the active site. The domain contains a three-stranded antiparallel β-sheet (strands B5, B6, and B7) with flanking helical elements. The domain is positioned to interact with the minor groove of the acceptor stem of tRNAGly. Despite some disorder in the crystal structure, conserved residues in this region suggest functional importance in tRNA recognition and binding. This insertion domain represents the first example of a substantial domain insertion between class II synthetase motifs 1 and 2. The presence of this domain distinguishes dimeric GlyRS enzymes and places them in synthetase subclass IIa rather than IIc.
