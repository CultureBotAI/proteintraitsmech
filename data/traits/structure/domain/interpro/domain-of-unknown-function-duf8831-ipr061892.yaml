identifier: InterPro:IPR061892
label: "Domain of unknown function DUF8831"
definition: >-
  This entry represents a domain of approximately 62 residues found in small uncharacterised proteins in Alphaproteobacteria, particularly Rhodobacterales (Roseobacteraceae, Paracoccaceae). These proteins typically consist of this single domain only. The function of this domain remains to be determined.
