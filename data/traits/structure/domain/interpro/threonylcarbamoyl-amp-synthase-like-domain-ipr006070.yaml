identifier: InterPro:IPR006070
label: "Threonylcarbamoyl-AMP synthase-like domain"
definition: >-
  This domain has been shown to bind preferentially to dsRNA. This domain is found in Sua5 ( ) and carbamoyltransferase HypF. The threonylcarbamoyl-AMP synthase Sua5 family is required for the formation of threonylcarbamoyladenosine in tRNA. Sua5 has been shown to be required for translational regulation and telomere recombination in yeast.
