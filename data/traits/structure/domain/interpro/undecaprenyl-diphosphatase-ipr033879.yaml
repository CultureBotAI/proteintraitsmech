identifier: InterPro:IPR033879
label: Undecaprenyl-diphosphatase
definition: >-
  Several members of this family have been annotated as bacitracin transport permeases, as it was suspected that they form the permease component of an ABC transporter system. It was shown, however, that BcrC from Bacillus subtilis posesses undecaprenyl pyrophosphate (UPP) phospatase activity, and it is hypothesized that it competes with bacitracin for UPP, increasing the cell's resistance to bacitracin. YbjG from E. coli may function in the recycling of periplasmic undecaprenyl pyrophosphate.
