identifier: InterPro:IPR025295
label: "eCIS core domain"
definition: >-
  This entry represents a domain found in a group of prokaryotic proteins that was previously known as DUF4157. This domain has been recently identified as a highly conserved eCIS (extracellular Contractile Injection System) core domain. eCIS is a cell-free toxin-delivery system that evolved from a bacteriophage tail and is prevalent in prokaryotes. This eCIS core DUF4157 domain contains an HEXXH motif that is characteristic of many families of metallopeptidases and a putative metal-binding site for a divalent cation such as zinc. Proteobacterial members of this family are thought to be related to the type VI secretion system (T6SS). This region is responsible for the toxicity of the protein in the bacterial periplasm. eCIS-associated toxins carry DUF4157 domains in their N terminus or are found adjacent to genes with this domain. eCIS core DUF4157 domain containing proteins were identified in Halogeometricum borinquese, two of which, Hbor_02990 and Hbor_38900, were found to be toxic and closely associated with a downstream 'immunity' partner that seemed to prevent toxicity when expressed in tandem with their respective toxin. Another two of these proteins, Hbor_01880 and Hbor_38720, were not found to be toxic in H. volcanii, both genes are closely associated with a downstream gene, potentially indicating that they may be toxic against another target organism.
