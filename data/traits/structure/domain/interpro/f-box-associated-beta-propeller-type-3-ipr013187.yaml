identifier: InterPro:IPR013187
label: "F-box associated beta-propeller, type 3"
definition: >-
  This β-propeller domain occurs in a diverse superfamily of genes in plants. Most examples are found C-terminal to an F-box ( ), a 60 amino acid motif involved in ubiquitination of target proteins to mark them for degradation. Two-hybid experiments support the idea that most members are interchangeable F-box subunits of SCF E3 complexes. Some members have two copies of this domain.
