identifier: InterPro:IPR059823
label: "YkzU-like domain"
definition: >-
  This entry represents the conserved domain of YkzU protein, an uncharacterised protein of 172 amino acids found in Bacillus subtilis. YkzU is classified in the COG3409 group and is encoded by the gene ykzU (locus tag BSU14072) on the B. subtilis chromosome. The function of this protein remains to be determined. In some members, this domain is found at the C-terminal and associated with other domains, such as the glycoside hydrolase-like domain.
