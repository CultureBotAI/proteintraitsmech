identifier: InterPro:IPR015343
label: "Peroxisomal ATPase PEX1, N-terminal N-lobe"
definition: >-
  The N-terminal domain of PEX1 adopts a Cdc48 domain 2-like fold, with a β-α-β(3) arrangement. It has been suggested that this domain may be involved in interactions with ubiquitin, ubiquitin-like protein modifiers, or ubiquitin-like domains, such as Ubx. Furthermore, the domain may possess a putative adaptor or substrate binding site, allowing for peroxisomal biogenesis, membrane fusion and protein translocation. This domain can be subdivided in an N-lobe, represented in this entry, and a C-lobe.
