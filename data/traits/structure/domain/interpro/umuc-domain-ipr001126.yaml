identifier: InterPro:IPR001126
label: "UmuC domain"
definition: >-
  In Escherichia coli, UV and many chemicals appear to cause mutagenesis by a process of translesion synthesis that requires DNA polymerase III and the SOS-regulated proteins UmuD, UmuC and RecA. This machinery allows the replication to continue through DNA lesion, and therefore avoid lethal interruption of DNA replication after DNA damage. UmuC is a well conserved protein in prokaryotes, with a homologue in yeast species. Proteins known to contain an UmuC domain are listed below: E. coli MucB protein. Plasmid-born analogue of the UmuC protein. Saccharomyces cerevisiae (Baker's yeast) Rev1 protein. Homologue of UmuC also required for normal induction of mutations by physical and chemical agents. Salmonella typhimurium ImpB protein. Plasmid-born analogue of the UmuC protein. Bacterial UmuC protein. E. coli DNA-damage-inducible protein P (DinP). S. typhimurium SamB homologue of UmuC plasmid associated.
