identifier: InterPro:IPR019432
label: Acyltransferase MbtK/IucB-like, conserved domain
definition: >-
  This entry represents a conserved 45 residue region found in a group of acyltransferases, including MbtK from Mycobacterium tuberculosis, Ato1 from Omphalotus olearius, SidL from Neosartorya fumigatus and IucB from E.coli. Proteins containing this domain are involved in the siderophore biosynthesis.
