identifier: InterPro:IPR056729
label: "Mannose-1-phosphate guanyltransferase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Mannose-1-phosphate guanyltransferase MPG1 from fungi and Mannose-1-phosphate guanylyltransferase catalytic subunits alpha and beta (GMPPA/B) from animals. This domain consists of a left-handed parallel β-helix composed of tandem repeats of a [LIV]-G-X(4) hexapeptide. GMPPA is the regulatory subunit of the GMPPA-GMPPB mannose-1-phosphate guanylyltransferase complex which reduces the catalytic activity of GMPPB when part of the complex. It mediates allosteric feedback inhibition of GMPPB catalytic activity upon binding GDP-alpha-D-mannose. GMPPA, together with GMPPB, regulates GDP-alpha-D-mannose levels. GMPPB is the catalytic subunit of the GMPPA-GMPPB mannose-1-phosphate guanylyltransferase complex. It catalyses the formation of GDP-mannose, an essential precursor of glycan moieties of glycoproteins and glycolipids. In S. pombe, it is required for proper septum structure and is involved cell cycle progression through cell-size checkpoint. In budding yeasts, Mgp1 (also known as Psa1) plays an important part in maintenance of cell-wall integrity.
