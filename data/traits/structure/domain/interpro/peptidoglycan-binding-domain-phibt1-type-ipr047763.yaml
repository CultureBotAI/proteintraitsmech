label: "Peptidoglycan-binding domain, phiBT1-type"
definition: >-
  This entry represents a peptidoglycan-binding domain that occurs once or twice at the C-terminal end of a group of proteins mainly from actinomycetes, including cell wall amidases and in putative lysins, such as from Streptomyces phage phiBT1. It shows apparent homology to .
