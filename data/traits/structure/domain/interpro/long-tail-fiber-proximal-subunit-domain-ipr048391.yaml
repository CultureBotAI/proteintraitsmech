identifier: InterPro:IPR048391
label: "Long-tail fiber proximal subunit domain"
definition: >-
  This domain is found at the C-terminal end of Long-tail fiber proximal subunit from Bacteriophage T4 (Gp34), a structural component of the proximal-half of the long-tail fiber. This protein adopts a trimeric configuration. This domain shows a core antiparallel β-sheet.
