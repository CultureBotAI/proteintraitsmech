label: "Domain of unknown function DUF8354"
definition: >-
  This domain is found in uncharacterised proteins mainly from gammaproteobacteria. It is predicted to fold into a helical structure. It contains two highly conserved sequence motifs HxAWRYL and RAHNW that may be of functional importance.
