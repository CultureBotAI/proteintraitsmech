identifier: InterPro:IPR047455
label: "TDRD15, fourth Tudor domain"
definition: >-
  This entry represents the fourth Tudor domain of human TDRD15 and similar sequences mainly found in mammals. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. TDRD15 is an uncharacterised Tudor domain-containing protein that contains seven Tudor domains.
