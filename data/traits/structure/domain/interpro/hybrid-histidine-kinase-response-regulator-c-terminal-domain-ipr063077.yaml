identifier: InterPro:IPR063077
label: "Hybrid histidine kinase-response regulator, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 60-80 residues found in hybrid two-component sensor histidine kinases. These proteins contain N-terminal sensory domains, followed by a histidine kinase domain ( ), ATPase domain ( ), response regulator receiver domain ( ), and this C-terminal domain. This entry is predominantly found in Cyanobacteria and includes circadian input kinases and cyanobacteriochromes. Some family members function as photoreceptors in circadian clock signalling pathways. The specific function of this C-terminal domain remains to be determined.
