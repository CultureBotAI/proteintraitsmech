identifier: InterPro:IPR056910
label: "Tricalbin-1-3-like, C2 domain"
definition: >-
  This entry represents the C2 domain found in Tricalbin-1-3 from Saccharomyces cerevisiae (TCB1-3) and similar fungal proteins. TCB1 may play a role in membrane trafficking. This domain is predicted to form an eight-stranded β-sandwich.
