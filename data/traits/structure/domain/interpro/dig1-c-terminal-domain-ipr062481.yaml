identifier: InterPro:IPR062481
label: "DIG1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of DIG1, a down-regulator of invasive growth from Saccharomyces cerevisiae and similar fungal proteins. This domain mediates interaction with the MAP kinases FUS3 and KSS1. DIG1 functions as a negative regulator of filamentation and pheromone-induced mating programmes by inhibiting the transcriptional activity of STE12. The protein forms complexes with DIG2, STE12 and either FUS3 or KSS1, and is phosphorylated by these MAP kinases in a pheromone-stimulated manner.
