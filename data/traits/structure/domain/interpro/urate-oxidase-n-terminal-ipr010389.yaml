identifier: InterPro:IPR010389
label: "Urate oxidase N-terminal"
definition: >-
  Cytochrome c urate oxidase (Uox) PuuD is involved in purine degradation. In contrast with soluble Uox it is a membrane protein with an 8-helix transmembrane N-terminal domain and a C-terminal cytochrome c.
