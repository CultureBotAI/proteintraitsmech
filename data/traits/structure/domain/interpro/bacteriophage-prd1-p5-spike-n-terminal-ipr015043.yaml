identifier: InterPro:IPR015043
label: "Bacteriophage PRD1, P5, spike N-terminal"
definition: >-
  This domain is found at the N terminus of bacteriophage PRD1 spike protein P5. The spike structure of bacteriophage PRD1 is comprised of proteins P2, P5, and P31. P5 is an elongated multidomain trimer. The C-terminal fragment of P5 appears to contain the residues responsible for the trimerization of the protein, whereas the smaller N-terminal part mediates the interaction with protein P31.
