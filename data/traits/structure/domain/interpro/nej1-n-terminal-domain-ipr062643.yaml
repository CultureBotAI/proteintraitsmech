identifier: InterPro:IPR062643
label: "NEJ1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the NEJ1 protein, a key component of the non-homologous end joining (NHEJ) DNA repair pathway. NEJ1 is responsible for the direct interaction with LIF1 via its N-terminal region. The protein is essential for NHEJ function and mediates protein-protein interactions within the DNA ligase IV complex. NEJ1 facilitates the transport of LIF1 into the nucleus and prevents chromosome circularisation by NHEJ in the absence of telomerase. This domain is found particularly within Saccharomycetaceae.
