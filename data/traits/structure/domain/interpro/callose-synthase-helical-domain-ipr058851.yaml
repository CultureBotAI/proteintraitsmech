identifier: InterPro:IPR058851
label: "Callose synthase, helical domain"
definition: >-
  This domain is found in Callose synthase 1 from Arabidopsis thaliana (CALS1) and similar sequences mainly found in plants. This domain is predicted to show an α-helical configuration. CALS1 is involved in callose synthesis at the forming cell plate during cytokinesis. It is not required for callose formation after wounding or pathogen attack.
