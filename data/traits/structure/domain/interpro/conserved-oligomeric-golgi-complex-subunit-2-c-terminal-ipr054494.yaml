identifier: InterPro:IPR054494
label: "Conserved oligomeric Golgi complex subunit 2, C-terminal"
definition: >-
  This entry represents the C-terminal region of Conserved oligomeric Golgi complex subunit 2 from yeast, a component of the peripheral membrane COG complex involved in intra-Golgi protein trafficking. This domain adopts a six-helix bundle that seems to play an important structural role in the COG complex.
