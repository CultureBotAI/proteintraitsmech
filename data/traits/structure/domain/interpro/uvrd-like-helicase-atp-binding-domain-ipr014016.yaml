label: UvrD-like helicase, ATP-binding domain
definition: >-
  This entry represents the ATP-binding domain found in AddA, AddB and UvrD-like helicases. This domain is also found in the bacterial helicase-nuclease complex AddAB, both in subunit AddA and AddB. The AddA subunit is responsible for the helicase activity. AddB also harbors a putative ATP-binding domain which does not play a role as a secondary DNA motor, but that it may instead facilitate the recognition of the recombination hotspot sequences. Helicases have been classified in 5 superfamilies (SF1-SF5). All of the proteins bind ATP and, consequently, all of them carry the classical Walker A (phosphate-binding loop or P-loop) and Walker B (Mg2+-binding aspartic acid) motifs. For the two largest groups, commonly referred to as SF1 and SF2, a total of seven characteristic motifs have been identified which are distributed over two structural domains, an N-terminal ATP-binding domain and a C-terminal domain. UvrD-like DNA helicases belong to SF1, but they differ from classical SF1/SF2 by a large insertion in each domain. UvrD-like DNA helicases unwind DNA with a 3'-5' polarity. Crystal structures of several uvrD-like DNA helicases have been solved. They are monomeric enzymes consisting of two domains with a common α-β RecA-like core. The ATP-binding site is situated in a cleft between the N terminus of the ATP-binding domain and the beginning of the C-terminal domain. The enzyme crystallizes in two different conformations (open and closed). The conformational difference between the two forms comprises a large rotation of the end of the C-terminal domain by approximately 130 degrees. This "domain swiveling" was proposed to be an important aspect of the mechanism of the enzyme. Some proteins that belong to the UvrD-like DNA helicase family are listed below: Bacterial UvrD hel…
