identifier: InterPro:IPR009506
label: "YjiS-like domain"
definition: >-
  This arginine rich domain is found at the C-terminal end of YjiS from Salmonella Typhimurium ( ), YjiS from Escherichia coli and similar short sequences from proteobacteria. In S.Typhimurium, this inner membrane-associated small protein acts as a suppressor of flagella production, leading to pathogen escape from infected host cells. In E.coli, yjiA and yjiS are widely shared genes flanking the variable Immigration Control Region (ICR) restriction-modification cassettes of enterobacterial genomes. The yjiS gene defines the left border of the Immigration Control Region (ICR), and yjiA defines the right border. In the plant pathogen Agrobacterium tumefaciens (also known as Agrobacterium fabrum), some small proteins that contain this domain, such as Atu8161 ( ) are involved in nutrient acquisition and central carbon metabolism. These small proteins can also regulate bacterial phosphate metabolism through protein-protein interactions with the sensor kinase PhoR. The 71 amino acid protein CcaF1 from Rhodobacter sphaeroides (RSP_6037, ) is an RNA binding protein that has a role in the oxidative stress defence. This microprotein also promotes the formation of photosynthetic complexes by increasing levels of mRNAs for pigment synthesis and for some pigment-binding proteins. In some poorly characterised proteins, this domain, previously known as DUF1127, covers the whole sequence, such as Short DUF1127 protein 3, which may play a role in nutrient acquisition and central carbon metabolism.
