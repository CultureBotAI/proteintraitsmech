identifier: InterPro:IPR059592
label: "YosH, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the YosH protein found in Bacillus subtilis. YosH is 156 amino acids and is derived from the SPbeta prophage. YosH is encoded by the yosH gene (locus tag BSU20120) in Bacillus subtilis strain 168. The specific function of this domain remains to be determined.
