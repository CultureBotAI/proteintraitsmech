identifier: InterPro:IPR041137
label: "Zinc transporter ZIP4, N-terminal"
definition: >-
  This domain is found at the N terminus of the ZRT1-IRT1-like protein 4 (ZIP4) from mammals. ZIP4 is a zinc transporter that plays an important role in cellular zinc homeostasis. This domain can also be found in ZIP12.
