identifier: InterPro:IPR019539
label: "Galactokinase, N-terminal domain"
definition: >-
  This entry represents an N-terminal conserved domain found in all galactokinases, irrespective of how many other ATP binding sites, etc that they carry. The function of this domain appears to be to bind galactose, and it is normally located at the N terminus of these enzymes. It is associated with and . While all enzymes in this entry posses galactokinase activity, some are annotated as N-acetylgalactosamine kinases as they also posses this enzyme activity. This domain can also be found arabinose kinase from Arabidopsis.
