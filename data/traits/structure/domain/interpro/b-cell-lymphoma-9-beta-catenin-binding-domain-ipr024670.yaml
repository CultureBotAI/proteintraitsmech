identifier: InterPro:IPR024670
label: "B-cell lymphoma 9, beta-catenin binding domain"
definition: >-
  The Wnt pathway plays a role in embryonic development, stem cell growth and tumorigenesis. B-cell lymphoma 9 (BCL9) associates with beta-catenin and Tcf in the nucleus when the Wnt pathway is stimulated leading to the transactivation of Wnt target genes. This entry represents a beta-catenin binding domain found in BCL9 and BCL9 homologues.
