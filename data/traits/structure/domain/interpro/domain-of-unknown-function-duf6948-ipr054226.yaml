identifier: InterPro:IPR054226
label: "Domain of unknown function DUF6948"
definition: >-
  This domain is found either as standalone or in combination with other domains in a group of uncharacterised proteins. It is distantly related to EDC3 mRNA-decapping protein 3 and it could be involved in RNA-binding. It is predicted to adopt a barrel-like structure with a typical Sm-like fold. The pair of glycines responsible for maintaining the Sm-barrel curvature are also conserved in the members of this family.
