identifier: InterPro:IPR033926
label: "NFkappaB IPT domain"
definition: >-
  This entry represents the IPT (Immunoglobulin-like fold, Plexins, Transcription factors) domain, also known as TIG (Transcription factor ImmunoGlobin), of the transcription factor NFkappaB and related transcription factors. NFkappaB is considered a central regulator of stress responses, activated by different stressful conditions, including physical stress, oxidative stress, and exposure to certain chemicals. NFkappaB blocking cell apoptosis in several cell types, gives it an important role in cell proliferation and differentiation.
