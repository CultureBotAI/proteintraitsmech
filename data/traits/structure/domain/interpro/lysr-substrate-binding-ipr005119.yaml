label: "LysR, substrate-binding"
definition: >-
  The LysR-type transcriptional regulator (LTTR) domain is a key component of one of the largest families of prokaryotic transcriptional regulators. Its structure, similar to periplasmic binding proteins, consists of an N-terminal DNA-binding domain (DBD) with a helix-turn-helix motif and a C-terminal effector-binding domain (EBD) connected by a long helix represented by this entry. LTTRs typically form homotetramers and function as dual-function repressor-activators, often negatively regulating their own expression [ . They bind to specific DNA sequences called LTTR boxes, and their binding can cause DNA bending. The EBD can interact with a diverse array of small-molecule ligands (effectors), including: Amino acids Sugar phosphates Carboxylic acids Reactive oxygen species (e.g., H2O2, HOCl) Metabolites (e.g., homocysteine, citrate) Signaling molecules (e.g., c-di-GMP, ppGpp) The LysR-type transcriptional regulators (LTTRs) form one of the largest and most diverse families of bacterial regulators. These proteins are widely distributed and contribute to various aspects of bacterial metabolism and physiology. LTTRs are typically homotetramers, with each subunit consisting of an N-terminal DNA-binding domain and a C-terminal effector-binding domain connected by a long helix LTTRs generally function as dual-function repressor-activators, often negatively regulating their own expression while activating other genes. They respond to cellular signals by binding small-molecule ligands (effectors), which induce conformational changes altering DNA interactions and contact with RNA polymerase. Some well-studied members of the LysR family include: AmpR: regulator of β-lactamase expression CatM and CatR: involved in aromatic compound degradation CysB: regulator of cysteine biosynthes…
