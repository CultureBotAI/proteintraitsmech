identifier: InterPro:IPR012816
label: NADAR
definition: >-
  This entry contains E. coli swarming motility protein YbiA. Mutations in YbiA cause defects in Escherichia coli swarming, but not necessarily in motility. Members of this entry were predicted to be involved in NAD-utilising pathways, likely to act on ADP-ribose derivatives, and were been named NADAR (NAD and ADP-ribose). More recently, YbiA has been shown to be involved in the disposal of riboflavin intermediates. It catalyses the hydrolysis of the N-glycosidic bond in the first two intermediates of riboflavin biosynthesis, which are highly reactive metabolites, yielding relatively innocuous products. This entry represents the C-terminal domain of Riboflavin biosynthesis protein PYRR from plants, a pyrimidine reductase involved in the riboflavin biosynthesis pathway. It catalyses the hydrolysis of the N-glycosidic bond in the first two intermediates of riboflavin biosynthesis, which are highly reactive metabolites, yielding relatively innocuous products.
