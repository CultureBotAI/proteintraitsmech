identifier: InterPro:IPR048315
label: "ZSWIM9, central RNaseH-like domain"
definition: >-
  This entry represents the central domain from a chordate proteins that includes ZSWIM9 (also known as C19orf68). These proteins appear to be transposon related. This domain appears to be closely related to the MULE RNaseH domain ( ).
