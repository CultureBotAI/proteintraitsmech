identifier: InterPro:IPR062016
label: "Countin, C-terminal domain"
definition: >-
  This entry represents a C-terminal immunoglobulin-like domain found in countin-like proteins from Dictyostelium discoideum. This domain appears to be associated with secreted proteins involved in multicellular development. The countin-like proteins containing this domain are secreted factors that may play roles in regulating aggregate size during development. The specific function of this domain remains to be determined.
