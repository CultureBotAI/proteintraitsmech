identifier: InterPro:IPR049334
label: "Topoisomerase V, second (HhH)2 tandem domain"
definition: >-
  This domain is found in Topoisomerase V from Methanopyrus kandleri (Topo-V), a bifunctional enzyme carrying both topoisomerase and DNA repair lyase activities. Topo-V consists of an N-terminal topoisomerase domain followed by 12 tandem (HhH)2 domains, showing four active sites. This entry represents the second of these tandem domains.
