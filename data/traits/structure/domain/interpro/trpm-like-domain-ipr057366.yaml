identifier: InterPro:IPR057366
label: "TRPM-like domain"
definition: >-
  This domain is found in human transient receptor potential cation channel subfamily M member 1-8 (TRPM 1-8) and similar proteins. This domain is found associated with and adopts an all-α configuration. This entry also includes protein ced-11 of Caenorhabditis elegans, which plays a major role in programmed cell death. Transient receptor potential cation channel subfamily M (TRPM) is a group of cation-permeable channels within the larger TRP superfamily. The TRPM subfamily consists of eight members: TRPM1-TRPM8. TRPMs have been involved in several physiological and pathological processes, including cellular proliferation, temperature sensing, vascular development, cancer progression, neurological diseases, endothelial dysfunction, inflammation, type II diabetes, and many other processes. TRPM channels possess a large cytosolic domain consisting of 732 and 1611 aa for each subunit, making them the largest members of the TRP superfamily.
