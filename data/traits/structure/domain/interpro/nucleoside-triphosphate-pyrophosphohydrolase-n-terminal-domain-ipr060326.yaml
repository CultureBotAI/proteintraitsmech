identifier: InterPro:IPR060326
label: "Nucleoside triphosphate pyrophosphohydrolase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of nucleoside triphosphate pyrophosphohydrolase MazG and similar sequences from actinomycetes. This N-terminal domain is the first domain and contributes to the overall enzyme structure and function. MazG hydrolyses all canonical nucleoside and deoxyribonucleoside triphosphates as well as mutagenic dUTP and 8-oxo-dGTP, converting them to the corresponding nucleoside monophosphates and diphosphate. The enzyme is required to maintain mycobacterial capacity to respond to oxidative stress through degradation of oxidation-induced damaged nucleotides. MazG functions as a homotetramer and requires magnesium for activity. The protein is induced by oxidative stress and is involved in transcriptional activation of RelA. In Thermotoga maritima, it has both nucleoside triphosphate pyrophosphohydrolase and pyrophosphatase activities.
