identifier: InterPro:IPR047725
label: "Transcriptional regulator AlgP, N-terminal domain"
definition: >-
  This entry represents the conserved N-terminal domain of Transcriptional regulatory protein AlgP from Pseudomonas aeruginosa and similar proteins from pseudomonadales. The insights into the AlgP function are rather controversial. It was suggested that AlgP is required for transcription of the key biosynthetic gene AlgD, which is necessary for production of the exopolysaccharide alginate causing mucoidy in P. aeruginosa. However, more recent studies counter this by providing evidence that alginate production is not greatly affected by AlgP.
