identifier: InterPro:IPR059558
label: "RNA polymerase II elongation factor ell1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of ELL1 (RNA polymerase II elongation factor ell1) and similar proteins found in ascomicetes. ELL1 belongs to the ELL/occludin family and activates transcription elongation by RNA polymerase II. The protein forms a stable heterodimer with eaf1, and this ell1-eaf1 complex interacts with RNA polymerase II to increase the catalytic rate of transcription by suppressing transient pausing by the polymerase at multiple sites along the DNA. It is localised to the nucleus and deletion renders cells sensitive to 6-azauracil. ELL1 contains a coiled-coil region and multiple disordered regions with various compositional biases.The specific function of this domain remains to be determined.
