identifier: InterPro:IPR063912
label: "SPZ1/TANGO1-like domain"
definition: >-
  This entry represents a coiled coil domain found in SPZ1 (spermatogenic leucine zipper protein 1) and TANGO1 (Transport and Golgi organization protein 1 homolog) proteins from vertebrates. SPZ1 is a bHLH-Zip transcription factor of approximately 378 residues that is specifically expressed in the testis and epididymis. The protein contains a helix-loop-helix motif, a basic DNA-binding region, a coiled-coil region and a leucine zipper. The bHLH motif of SPZ1 is distinct from the classical bHLH domain. SPZ1 binds to E-box (CANNTG) and G-box DNA motifs and regulates genes involved in cell proliferation, including PCNA. SPZ1 interacts with protein phosphatase 1 catalytic subunit gamma isoform 2 (PPP1CC gamma-2) via its helix-loop-helix region. The protein is phosphorylated by ERK1/ERK2 MAP kinases. SPZ1 localises to both the cytoplasm and nucleus. Human TANGO1 plays a role in the transport of cargos that are too large to fit into COPII-coated vesicles and require specific mechanisms to be incorporated into membrane-bound carriers and exported from the endoplasmic reticulum. This protein is required for collagen VII (COL7A1) secretion by loading COL7A1 into transport carriers. It is also specifically required for the secretion of lipoproteins by participating in their export from the endoplasmic reticulum. It is required for correct assembly of COPII coat components at endoplasmic reticulum exit sites.
