identifier: InterPro:IPR057954
label: "Tubulin--tyrosine ligase-like protein 12, SET-like domain"
definition: >-
  This entry represents the SET-like domain found in Tubulin--tyrosine ligase-like protein 12 (TTL12) and related proteins in eukaryotes. Tubulin tyrosine ligase-like 12 (TTLL2) is a member of the tubulin tyrosine ligase (TTL) group, although its precise function remains unclear. TTLL2 contains both SET-like and TTL-like domains, suggesting potential involvement in histone methylation and tubulin tyrosine ligase activities. However, it lacks catalytic activity related to tubulin or histone modification and is instead believed to play a regulatory role in these processes. TTL proteins more broadly are implicated in the negative regulation of tubulin post-translational modifications. The SET-like domain of TTLL2 is a divergent variant of the canonical SET domain; while it retains structural features of functional SET domains, it lacks the key residues necessary for histone lysine methyltransferase activity. Rather than enzymatic function, this domain is thought to exert non-catalytic effects, possibly influencing microtubule dynamics and stability.
