identifier: InterPro:IPR028044
label: "Domain of unknown function DUF4444"
definition: >-
  This domain is found in bacteria (Rhodobacteraceae family). It is typically found at the C terminus and is approximately 40 amino acids in length. It contains a conserved LIPL sequence motif and two completely conserved G residues that may be functionally important.
