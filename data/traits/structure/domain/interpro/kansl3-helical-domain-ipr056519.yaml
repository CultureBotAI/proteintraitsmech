identifier: InterPro:IPR056519
label: "KANSL3, helical domain"
definition: >-
  This domain is found in human KAT8 regulatory NSL complex subunit 3 (KANSL3) and its homologues. KANSL3 is a non-catalytic component of the NSL histone acetyltransferase complex, a multiprotein complex that mediates histone H4 acetylation at 'Lys-5'- and 'Lys-8' (H4K5ac and H4K8ac) at transcription start sites and promotes transcription initiation. The NSL complex also acts as a regulator of gene expression in mitochondria. Within the NSL complex, KANSL3 is required to promote KAT8 association with mitochondrial DNA. This domain is predicted to adopt a globular structure consisting of array of eight helices.
