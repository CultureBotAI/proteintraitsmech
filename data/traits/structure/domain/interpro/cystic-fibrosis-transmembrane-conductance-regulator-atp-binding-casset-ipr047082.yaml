identifier: InterPro:IPR047082
label: "Cystic fibrosis transmembrane conductance regulator, ATP-binding cassette domain 1"
definition: >-
  Cystic fibrosis transmembrane conductance regulator (CFTR, also known as ATP-binding cassette sub-family C member 7 or ABCC7) is an epithelial ion channel that plays an important role in the regulation of epithelial ion and water transport and fluid homeostasis mediating the transport of chloride ions across the cell membrane. It has adapted the ABC transporter structural motif to form a tightly regulated anion channel at the apical surface of many epithelia. It is the product of the gene mutated in patients with cystic fibrosis. CFTR displays the typical organization with two ATP-binding cassette domains and a characteristic hydrophilic domain ( ) in-between. This entry represents the first ATP-binding cassette domain of CFTR.
