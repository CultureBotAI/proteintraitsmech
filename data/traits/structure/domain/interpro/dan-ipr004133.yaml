identifier: InterPro:IPR004133
label: DAN
definition: >-
  This domain contains 9 conserved cysteines and is extracellular. Therefore the cysteines may form disulphide bridges. This family of proteins has been termed the DAN family after the first member to be reported. This family includes DAN, Bursicon, Neuroblastoma suppressor of tumorigenicity 1, Cerberus and Gremlin. Bursicon is the final heterodimeric neurohormone released at the end of the molting cycle, involved in the sclerotization (tanning) of the insect cuticle, melanization and wing spreading. The gremlin protein is an antagonist of bone morphogenetic protein signalling. It is postulated that all members of this family antagonize different TGF beta TGF-beta ligands.
