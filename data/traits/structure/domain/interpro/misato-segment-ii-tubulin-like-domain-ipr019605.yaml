identifier: InterPro:IPR019605
label: "Misato Segment II tubulin-like domain"
definition: >-
  The misato protein contains three distinct, conserved domains, segments I, II and III and is involved in the regulation of mitochondrial distribution and morphology. This entry represents misato segment II. Segments I and III are common to tubulins ( ), but segment II aligns with myosin heavy chain sequences from Drosophila melanogaster (Fruit fly, ), rabbit ( ), and human.
