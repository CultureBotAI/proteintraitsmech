identifier: InterPro:IPR063692
label: "Glycoside hydrolase 123, fourth domain"
definition: >-
  This entry represents the fourth domain in predicted members of glycoside hydrolase family 123 . These enzymes remove specific terminal N-D-acetylgalactosamine from glycosphingolipids. This domain contains a TIM barrel fold.
