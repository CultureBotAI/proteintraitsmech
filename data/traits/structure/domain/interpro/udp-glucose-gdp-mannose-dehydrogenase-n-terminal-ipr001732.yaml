identifier: InterPro:IPR001732
label: "UDP-glucose/GDP-mannose dehydrogenase, N-terminal"
definition: >-
  This entry represents the N-terminal NAD(+)-binding domain. Structural studies indicate that this domain forms an α-β structure containing the six-stranded parallel β sheet characteristic of the dinucleotide binding Rossman fold. The UDP-glucose/GDP-mannose dehydrogenases are a small group of enzymes which possesses the ability to catalyse the NAD-dependent 2-fold oxidation of an alcohol to an acid without the release of an aldehyde intermediate. The enzymes have a wide range of functions. In plants UDP-glucose dehydrogenase, , is an important enzyme in the synthesis of hemicellulose and pectin, which are the components of newly formed cell walls; while in zebrafish UDP-glucose dehydrogenase is required for cardiac valve formation. In Xanthomonas campestris, a plant pathogen, UDP-glucose dehydrogenase is required for virulence.
