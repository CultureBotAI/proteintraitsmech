identifier: InterPro:IPR041618
label: "Polyketide synthase dimerisation element domain"
definition: >-
  This is the dimerisation element domain found in bacterial modular polyketide synthase ketoreductases. The dimerization element (DE) domain is located N-terminal to the ketoreductase (KR) domain ( ). The DE domain is necessary for KR function, presumably because the dimeric DE orients the KR domains for optimal activity within a module.
