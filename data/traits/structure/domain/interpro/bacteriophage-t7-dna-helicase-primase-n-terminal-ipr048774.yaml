identifier: InterPro:IPR048774
label: "Bacteriophage T7 DNA helicase/primase, N-terminal"
definition: >-
  Bacteriophage T7 DNA helicase/primase (also known as Gp4) is an ATP-dependent DNA helicase and primase that is essential for viral DNA replication and recombination. Primase activity synthesises short RNA primers at the sequence 5'-GTC-3' on the lagging strand that the polymerase elongates using dNTPs and providing the primase is still present. It consists of an N-terminal zinc ribbon ( ) followed by a RNA Polymerase Domain that can be subdivided in an N-terminal α β structure, represented in this entry and a C-terminal TOPRIM fold ( ). At the C-terminal end of the protein there is a DNA helicase domain ( ).
