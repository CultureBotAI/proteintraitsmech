identifier: InterPro:IPR005034
label: Dicer, dimerisation domain
definition: >-
  This entry represents the dimerisation domain in Dicer. It is essential for the activity of Dicer. It is a divergent double-stranded RNA-binding domain. The N-terminal α helix of this domain is in a different orientation to that found in canonical dsRNA-binding domains. This results in a change of charge distribution at the potential dsRNA-binding surface and in the N- and C-terminal of the domain being nearby. This domain has weak dsRNA-binding activity. It mediates heterodimerisation of Dicer proteins with their respective protein partners. Dicer endoribonuclease plays a central role in short dsRNA-mediated post-transcriptional gene silencing. It cleaves naturally occurring long dsRNAs and short hairpin pre-microRNAs (miRNA) into fragments of twenty-one to twenty-three nucleotides with 3' overhang of two nucleotides, producing respectively short interfering RNAs (siRNA) and mature microRNAs. Dicer shows two N-terminal helicase domains ( ), a dimerisation domain ( ), a platform domain ( ), a PAZ domain ( ), two RNase III a/b domains ( ) and a dsRNA-binding domain in its C-terminal region ( ).
