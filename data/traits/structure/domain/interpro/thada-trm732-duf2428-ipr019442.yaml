identifier: InterPro:IPR019442
label: "THADA/TRM732, DUF2428"
definition: >-
  This conserved domain is found in Thyroid adenoma-associated protein (THADA) from animals and in the yeast homologue tRNA (cytidine(32)-2'-O)-methyltransferase non-catalytic subunit TRM732. Trm732 forms a complex with the methyltransferase Trm7 to 2'- O- methylate tRNA residue 32 (Nm32), being required for Trm7 methylation activity. In humans, mutations of the Trm7 homologue FTSJ1, which interacts with THADA, impair Nm32 modifications, associated with non-syndromic X-linked intellectual disability. It has been suggested that these proteins may play a role in additional biological processes not related to translation. This domain contains a RRSAGLP conserved motif that is required for tRNA modification activity.
