identifier: InterPro:IPR024721
label: "Snurportin-1, N-terminal"
definition: >-
  Snurportin-1 is a nuclear import receptor that contains an N-terminal importin beta binding domain which is essential for its function as an snRNP-specific nuclear import receptor. Snurportin-1 interacts with m3G-cap where it enhances the m3G-cap dependent nuclear import of U snRNPs in Xenopus laevis oocytes and digitonin-permeabilized HeLa cells. This entry represents the snurportin-1 N-terminal importin beta binding domain (IBB). The essential role of the IBB domain for snurportin-1 function suggests that snurportin-1 cooperates with importin beta in mediating nuclear import of snRNPs.
