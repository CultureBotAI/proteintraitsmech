identifier: InterPro:IPR000468
label: "Barstar (barnase inhibitor)"
definition: >-
  Barstar is a small single chain protein. Barnase is the extracellular ribonuclease of Bacillus amyloliquefaciens, and barstar its specific intracellular inhibitor. Expression of barstar is necessary to counter the lethal effect of expressed active barnase. The structure of the barstar consists of two layers of parallel β-sheet of three strands. Barstar inhibits barnase by statically blocking the active site with a helix and adjacent loop segment.
