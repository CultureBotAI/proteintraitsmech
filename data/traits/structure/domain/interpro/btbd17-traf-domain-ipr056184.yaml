identifier: InterPro:IPR056184
label: "BTBD17, TRAF domain"
definition: >-
  This domain is found in human BTB/POZ domain-containing protein 17 and related proteins. It is predicted to adopt a β-sandwich with permuted Ig-like topology. It has a significant sequence and structural similarity to TRAF domains.
