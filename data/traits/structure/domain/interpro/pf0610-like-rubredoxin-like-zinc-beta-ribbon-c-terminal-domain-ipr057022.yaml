identifier: InterPro:IPR057022
label: "PF0610-like, rubredoxin-like zinc beta-ribbon, C-terminal domain"
definition: >-
  This domain is found C-terminal in PF0610 protein from Pyrococcus furiosus ( ) and related homologous proteins. This protein has a Zn-ribbon embedded in winged HTH fold. This entry represents the C-terminal domain, which is composed of a rubredoxin-like zinc beta-ribbon domain with two CXXC sequence elements. The function of PF0610 has not been fully chracterized. wHTH domains containing proteins are believed to serve as DNA- or RNA-binding domains . A large number of wHTH proteins are transcriptional regulators, while others are involved in chromosome packing. Because of its apparent sequence-independent interaction with DNA, PF0610 could be a part of the chromatin system of P. furiosus. The numerous basic residues in PF0610 ensure strong DNA interactions. The Zn ribbon motif could help improve the structural stability of the protein at a high temperature. Another possibility is that PF0610 is a metal-dependent transcription factor. This is based on DNA microarray data. However, further research is needed to conclude if PF0610 is an iron-containing protein
