identifier: InterPro:IPR041513
label: "SAS-6 coiled-coil domain"
definition: >-
  This is a coiled-coil domain found at the C terminus of spindle assembly abnormal protein 6 (Sas6). The highly conserved protein SAS-6 constitutes the centre of the cartwheel assembly that scaffolds centrioles early in their biogenesis. Structural analysis of Sas6 show that similar to XLF and XRCC4, it forms a parallel coiled-coil dimer.
