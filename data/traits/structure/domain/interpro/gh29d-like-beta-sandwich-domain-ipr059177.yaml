identifier: InterPro:IPR059177
label: "GH29D-like, beta-sandwich domain"
definition: >-
  This domain is found in AmGH29D fucosidase from A. muciniphila ( ) and in other bacterial proteins such as Endoglucanase from Clostridium saccharobutylicum ( ) and Beta-hexosaminidase from Porphyromonas gingivalis ( ). In these proteins, this domain is combined with distinct domains.
