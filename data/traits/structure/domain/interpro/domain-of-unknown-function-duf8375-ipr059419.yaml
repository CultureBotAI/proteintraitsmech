label: "Domain of unknown function DUF8375"
definition: >-
  This entry represents a domain found in uncharacterised fungal proteins. The N- and C-terminal ends of this domain contain cysteine residues that are predicted to form a disulfide bond. The exact sequence position of these cysteines is not strictly conserved.
