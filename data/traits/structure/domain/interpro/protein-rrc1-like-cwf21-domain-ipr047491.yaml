identifier: InterPro:IPR047491
label: "Protein RRC1-like, cwf21 domain"
definition: >-
  This entry represents the cwf21 domain of protein RRC1 from Arabidopsis thaliana and similar plant proteins. This domain is involved in mRNA splicing. It binds directly to the spliceosomal protein Prp8. RRC1, also called reduced red-light responses in cry1cry2 background 1, is a SR-like splicing factor required for phytochrome B (phyB) signal transduction and involved in phyB-dependent alternative splicing. This group of sequences also includes protein RRC1-like, which may also function as a SR-like splicing factor. SR family splicing factors are characterised by the presence of a domain rich in arginine and serine dipeptides, called the RS domain.
