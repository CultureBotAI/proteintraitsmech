identifier: InterPro:IPR060054
label: "Y4kK, central domain"
definition: >-
  This entry represents the central domain of Y4kK, an uncharacterised protein from Sinorhizobium fredii. Y4kK is a 312 amino acid protein (gene NGR_a02850) located on the symbiotic plasmid pNGR234a. This domain is the second of three domains in the multi-domain protein. The specific function of this domain remains to be determined. This entry also includes a central domain in putative Peptidase S8/S53 domain-containing and related bacterial proteins. Y4kK protein is encoded on the symbiotic plasmid pNGR234a and belongs to the COG1404 functional category, the N-terminal is represented by and the central domain following the N-terminal is represented by .
