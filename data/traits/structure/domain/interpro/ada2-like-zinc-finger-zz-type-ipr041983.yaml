identifier: InterPro:IPR041983
label: "ADA2-like, zinc finger, ZZ-type"
definition: >-
  This entry represents the ZZ-type Zinc finger found in ADA2-like proteins, including transcriptional adapter 2 (TADA2) from animals and plants, and Ada2 from yeasts. The ZZ motif coordinates two zinc ions and most likely participates in ligand binding or molecular scaffolding. Ada2 is a component of the SAGA/ADA coactivator complex, which regulates numerous cellular processes by coordinating histone acetylation. There are two Drosophila Ada2 homologues, dAda2a and dAda2b. dAda2b is a component of Spt-Ada-Gcn5-acetyltransferase (SAGA) complexes, while dAda2a associates with dGcn5 but is not incorporated into dSAGA-type complexes.
