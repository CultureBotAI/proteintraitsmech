identifier: InterPro:IPR022125
label: "U3 small nucleolar RNA-associated protein 10, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Utp10, which is a HEAT-repeat containing protein involved in nucleolar processing of pre-18S ribosomal RNA. Utp10 is also involved in 40S ribosome maturation. Proteins containing this domain also include HEATR1 from humans. HEATR1 is required for optimal pre-ribosomal RNA transcription by RNA polymerase I.
