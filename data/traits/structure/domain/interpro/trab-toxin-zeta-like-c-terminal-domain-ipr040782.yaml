identifier: InterPro:IPR040782
label: "TraB/Toxin zeta-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TraB from Escherichia coli and similar sequences found predominantly in proteobacteria. This domain is commonly found in polyvalent proteins of conjugative elements, or in their genomic neighbourhood, and is functionally associated with Type IV Secretion Systems (T4SS), where it plays a key role in the discrimination of self from non-self DNA. Structurally, the domain adopts an oligonucleotide/oligosaccharide-binding (OB) fold, comprising a five-stranded Greek-key β-barrel in an open, distorted conformation that is capped by a short α-helix. This entry also includes the C-terminal domain in Toxin zeta_1 and Uncharacterized 22.8 kDa protein in nuc-osa intergenic region. Toxin zeta is the toxic component of a type II toxin-antitoxin (TA) system. It exerts its toxic effect by C4'-phosphorylating UDP-activated peptidoglycan precursors at the hydroxyl group of the hexose moiety, generating dead-end substrates that drain precursors from MurA, MurB, and MurC, thereby blocking cell wall synthesis without directly inhibiting MurA. Specifically, it phosphorylates UDP-muramic acid (UNAM) and UDP-N-acetyl-D-glucosamine (UNAG) at the 4'-hydroxyl group of the hexose moiety, yielding UNAM-4P and UNAG-4P, respectively, and may additionally disrupt lipid A and lipopolysaccharide (LPS) synthesis. When expressed in E. coli , Toxin zeta causes decreased cell growth and significant mortality, though growth resumes after approximately one hour. Its toxic activity is neutralised by co-expression with the epsilon antitoxin, although antitoxin induction 15 minutes after toxin expression does not entirely abolish its lytic activity.
