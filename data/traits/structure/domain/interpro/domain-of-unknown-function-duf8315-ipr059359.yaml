identifier: InterPro:IPR059359
label: "Domain of unknown function DUF8315"
definition: >-
  This domain is found in uncharacterised proteins mainly from Campylobacterales. It is predicted to adopt an α/β structure composed of a four stranded antiparallel β-sheet and array of α-helices packed on it. It contains several conserved negatively charged residues that may be essential for function.
