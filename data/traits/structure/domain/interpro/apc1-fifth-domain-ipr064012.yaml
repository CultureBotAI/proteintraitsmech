identifier: InterPro:IPR064012
label: "APC1, fifth domain"
definition: >-
  This entry represents the fifth domain found in anaphase-promoting complex subunit 1 proteins. This domain is part of the multi-domain architecture of APC1, which is a component of the anaphase-promoting complex/cyclosome (APC/C). The APC/C is a cell cycle-regulated E3 ubiquitin ligase that controls progression through mitosis and the G1 phase of the cell cycle. The full-length APC1 protein mediates ubiquitination and subsequent degradation of target proteins and plays roles in metaphase to anaphase transition, embryonic development, and neurotransmitter regulation. This domain is found across eukaryotes including metazoans, fungi and plants. The specific function of this domain within APC1 remains to be determined. This domain contains TPR-like repeats. This domain is also found in Negative regulator of mitosis from Emericella nidulans. This protein is part of a regulatory pathway that includes the nimA protein kinase. It is required to prevent premature entry into mitosis.
