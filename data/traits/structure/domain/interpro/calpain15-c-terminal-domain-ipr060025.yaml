identifier: InterPro:IPR060025
label: "Calpain15, C-terminal domain"
definition: >-
  This domain is found towards the C-terminal end of Calpain-15 from mice, human and Drosophila melanogaster (the fly homologue is known as CalpD). This domain is often found C-terminal to . In mice, loss of Capn15 results in developmental eye anomalies and changes in brain volume. Similarly, humans with biallelic variants in CAPN15 display developmental delays, neurodevelopmental disorders, and congenital malformations, including eye defects. CalpD plays a role in eye development.
