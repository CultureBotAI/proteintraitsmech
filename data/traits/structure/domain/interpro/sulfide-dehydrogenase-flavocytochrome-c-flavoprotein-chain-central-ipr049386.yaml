identifier: InterPro:IPR049386
label: "Sulfide dehydrogenase [flavocytochrome c] flavoprotein chain, central"
definition: >-
  This domain is located centrally in Sulfide dehydrogenase [flavocytochrome c] flavoprotein chain from the proteobacteria Allochromatium vinosum ( ) , a component of the enzyme that catalyses the reversible conversion of sulphide to elemental sulfur in vitro. This domain is C-terminal to and N-terminal to . It shows a five-stranded parallel β-sheet flanked on one side by three α-helices and on the other side by a three-stranded anti parallel β-sheet.
