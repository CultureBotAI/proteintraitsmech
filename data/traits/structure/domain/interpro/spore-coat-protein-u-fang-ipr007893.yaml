identifier: InterPro:IPR007893
label: "Spore coat protein U/FanG"
definition: >-
  This domain is found in protein U, a spore coat protein produced at the late stage of development of Myxococcus xanthus. Protein U is produced as a secretory precursor, pro-protein U, which is then secreted across the membrane to assemble on the spore surface. This domain is also found in a number of the genes within a conserved polycistronic operon that encodes a novel chaperone-usher pili assembly system. Examples are CsuA/B of Acinetobacter baumannii, and the CsuA, CsuB and CsuE of Vibrio parahaemolyticus and the related genes of Yersinia pestis. Protein FanG from E.coli is also included in this entry, which is involved in the initiation of K99 fimbriae formation.
