definition: >-
  This entry represents the autotransporter domain of Vacuolating cytotoxin autotransporter VacA from Helycobacter pylori and related sequences, found at the C-terminal and associated with . VacA forms a hexamer that may correspond to the prepore-forming state, and this region may be responsible for the membrane insertion.
