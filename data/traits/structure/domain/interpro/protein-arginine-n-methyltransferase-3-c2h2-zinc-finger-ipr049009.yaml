identifier: InterPro:IPR049009
label: "Protein arginine N-methyltransferase 3, C2H2 zinc finger"
definition: >-
  This entry represents the C2H2-type zinc finger from arginine N-methyltransferase 3 (ANM3). It catalyses both the monomethylation and asymmetric dimethylation of the guanidino nitrogens of arginine residues in target proteins.
