identifier: InterPro:IPR037324
label: "Transferrin receptor protein 1/2, PA domain"
definition: >-
  This entry represents the PA domain found in transferrin receptor proteins 1 (TfR1) and 2 (TfR2). The function of the PA domain is not clear. The transferrin receptor 1 (TfR) is a transmembrane protein that assists iron uptake into vertebrate cells through a cycle of endo- and exocytosis of the iron transport protein transferrin (Tf). TfR binds iron-loaded (diferric) Tf at the cell surface and carries it to the endosome, where the iron dissociates from Tf. The apo-Tf remains bound to TfR until it reaches the cell surface, where apo-Tf is replaced by diferric Tf from the serum to begin the cycle again. The crystal structure of a TfR monomer reveals a 3-domain structure: a protease-like domain that closely resembles carboxy- and amino-peptidases; an apical domain consisting of a β-sandwich; and a helical dimerisation domain. The dimerisation domain consists of a 4-helical bundle that makes contact with each of the three domains in the dimer partner. In humans, TfR is a homodimeric type II transmembrane protein highly expressed on brain endothelial cells. It may undergo transcytosis at the blood-brain barrier (BBB) to allow entry of iron-bound Transferrin by constitutive endocytosis. The TfR-facilitated transcytosis has been explored to deliver therapeutics into the brain in a noninvasive manner.
