identifier: InterPro:IPR018959
label: "Domain of unknown function DUF1989"
definition: >-
  This domain can be found in TMAO demethylase (Tdm) from M. silvestris and R. pomeroyi. Tdm catalyzes the first step in TMAO degradation. Proteins containing this domain are mostly uncharacterised.
