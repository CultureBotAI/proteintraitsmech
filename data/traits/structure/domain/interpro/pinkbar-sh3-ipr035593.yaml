identifier: InterPro:IPR035593
label: "Pinkbar, SH3"
definition: >-
  This entry represents the SH3 domain of Pinkbar. Brain-specific angiogenesis inhibitor 1-associated protein 2-like protein 2 (Baiap2l2), also known as BAR/IMD domain-containing adapter protein 2-like 2 and planar intestinal and kidney specific BAR domain protein (Pinkbar), is an I-BAR (Bin/amphipysin/Rvs) domain containing protein. BAR domain forms an anti-parallel all-helical dimer, with a curved (banana-like) shape, that promotes membrane tubulation. BAR domain proteins can be classified into three types: BAR, F-BAR and I-BAR. BAR and F-BAR proteins generate positive membrane curvature, while I-BAR proteins induce negative curvature. In humans Baiap2l2 is specifically expressed in intestinal epithelial cells, where it localises to Rab13-positive vesicles and to the plasma membrane at intercellular junctions. The BAR domain of Baiap2l2 does not induce membrane protrusions or invaginations; instead, it promotes the formation of planar membrane sheets.
