identifier: InterPro:IPR055242
label: "Lmo2446-like, N-terminal"
definition: >-
  This domain is found at the N-terminal end of a group of bacterial proteins, including Lmo2446 protein from Listeria monocytogenes, a functionally uncharacterised extracellular lipidated protein. Lmo2446 contains a glycoside hydrolase 31 family (GH31) catalytic domain ( ) flanked by three structural β-domains. This domain folds into a carbohydrate binding module (CBM)-like β-sandwich. This domain is found also in isomaltosyltransferase CtsY, which together with CtsZ, is involved in the conversion of alpha-1,4-glucan into a cyclic tetrasaccharide (CTS) constructed from four alpha-glucopyranosyl residues.
