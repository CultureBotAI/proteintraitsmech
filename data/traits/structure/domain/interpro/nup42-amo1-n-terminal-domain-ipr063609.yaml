identifier: InterPro:IPR063609
label: "NUP42/Amo1, N-terminal domain"
definition: >-
  This entry represents the N-terminal in Nucleoporin NUP42 and similar proteins from eukaryotes, including the Nucleoporin-like protein amo1 from fission yeast. NUP42 is required for the export of mRNAs containing poly(A) tails from the nucleus into the cytoplasm. Amo1 is involved in the cell polarity process where it is required for the correct termination of microtubule growth at the cell ends during interphase. The specific function of this domain is unknown.
