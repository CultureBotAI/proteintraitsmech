identifier: InterPro:IPR054691
label: "2-isopropylmalate synthase/homocitrate synthase, post-catalytic domain"
definition: >-
  This entry represents a domain found centrally in 2-isopropylmalate synthase from Neisseria meningitidis (LeuA), homocitrate synthase from Sulfolobus acidocaldarius (HCS) and similar proteins found in all cellular organisms. This domain follows the catalytic domain and is required for the enzymatic activity.
