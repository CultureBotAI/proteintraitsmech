identifier: InterPro:IPR047502
label: "Tubulin polyglutamylase complex subunit 1, dimerization/docking domain"
definition: >-
  This entry represents the dimerization/docking (D/D) domain found at the N-terminal of human TPGS1 and similar proteins predominantly found in vertebrates. This domain shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA). Tubulin polyglutamylase complex subunit 1 (TPGS1) is part of the neuronal tubulin polyglutamylase complex which contains TPGS1, TPGS2, TTLL1, LRRC49 and NICN1. It is required for the development of the spermatid flagellum.
