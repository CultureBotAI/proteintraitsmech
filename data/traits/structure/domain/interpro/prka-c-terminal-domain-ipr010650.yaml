identifier: InterPro:IPR010650
label: "PrkA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in PrkA proteins. ATP-dependent protease PrkA proteins are bacterial and archaeal serine kinases, approximately 630 residues in length. They possesses the A-motif of nucleotide-binding proteins and exhibit distant homology to eukaryotic protein kinases.
