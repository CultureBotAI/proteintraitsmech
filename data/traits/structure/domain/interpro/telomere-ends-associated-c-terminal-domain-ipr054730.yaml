identifier: InterPro:IPR054730
label: "Telomere ends associated, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of protein telomere ends associated (Tea) found in Drosophila species and related fly sequences. The function of this domain is still unknown. According to structure predictions, it adopts and α/β structure consisting of 7 β-strands and 3 α-helices. Tea protects telomeres from fusion and it likely functions as a component of the MTV complex along with moi and ver. The complex binds single-stranded DNA in a sequence-independent manner and can protect it from DNA degradation.
