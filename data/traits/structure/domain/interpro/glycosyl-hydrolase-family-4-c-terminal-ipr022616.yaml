identifier: InterPro:IPR022616
label: Glycosyl hydrolase, family 4, C-terminal
definition: >-
  Glycoside hydrolase family 4 ( ) is a protein family that comprises enzymes with several known activities; 6-phospho-beta-glucosidase ( ); 6-phospho-alpha-glucosidase ( ); alpha-galactosidase ( ). These enzymes require both NAD(H) and divalent metal (such asMn2+, Fe2+, Co2+, or Ni2+) for its activity. This domain is found primarily in bacterial family 4 glycosyl hydrolases. It is found in the C terminus.
