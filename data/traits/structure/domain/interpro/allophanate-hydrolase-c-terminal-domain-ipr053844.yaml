identifier: InterPro:IPR053844
label: "Allophanate hydrolase, C-terminal domain"
definition: >-
  Allophanate hydrolase (AH) converts allophanate to ammonium and carbon dioxide. The AH structure is composed of N- and C-terminal domains. These domains catalyse sequential reactions: the N-terminal domain converts allophanate to N-carboxycarbamate, whereas the C-terminal domain converts it to carbon dioxide and ammonium. The C-terminal domain folds into α/β structure in which some of the β-strands form a barrel-like shape. This entry represents the C-terminal domain. This domain is also found in Urea amidolyase that is involved in hydrolysis of urea to ammonia and CO2.
