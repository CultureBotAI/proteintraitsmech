identifier: InterPro:IPR013565
label: Fatty acid synthase beta subunit AflB /Fas1-like, central domain
definition: >-
  The domain has been identified in fungi and bacteria. This domain can be found in fatty acid synthase beta subunit from fungi, including Fas1 from yeasts and aflB from Aspergillus parasiticus. The beta subunit contains domains for: [acyl-carrier-protein] acetyltransferase and malonyltransferase, S-acyl fatty acid synthase thioesterase, enoyl-[acyl-carrier-protein] reductase, and 3-hydroxypalmitoyl-[acyl-carrier-protein] dehydratase. Fas1 is a fatty acid synthetase catalyzes the formation of long-chain fatty acids from acetyl-CoA, malonyl-CoA and NADPH.
