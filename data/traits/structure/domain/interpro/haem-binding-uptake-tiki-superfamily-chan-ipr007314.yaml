identifier: InterPro:IPR007314
label: "Haem-binding uptake, Tiki superfamily, ChaN"
definition: >-
  This entry represents a domain found in ChaN family members. ChaN is a family of putative bacterial lipoproteins necessary for the uptake of haem-iron. The structure of , , comprises a large parallel β-sheet with flanking α-helices and a smaller domain consisting of α-helices. Two cofacial haem groups bind in a pocket formed by a dimer of two ChaN monomers. Proteins containing this domain also include protein RETICULATA-RELATED from Arabidopsis. They may play a role in leaf development.
