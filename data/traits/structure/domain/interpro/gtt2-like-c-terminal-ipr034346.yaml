identifier: InterPro:IPR034346
label: "Gtt2-like, C-terminal"
definition: >-
  This entry represents the C-terminal GST-like α helical domain found in the budding yeast Gtt2 protein. Gtt2 is a glutathione S-transferase involved in the glutaredoxin-mediated antioxidant activity. Proteins containing this domain also include some bacterial GST-like proteins.
