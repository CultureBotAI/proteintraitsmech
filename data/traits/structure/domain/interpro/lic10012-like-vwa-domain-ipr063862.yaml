identifier: InterPro:IPR063862
label: "LIC10012-like, vWA domain"
definition: >-
  This entry represents a group of uncharacterised proteins from Leptospira. Members of this family of putative surface-exposed proteins are found broadly throughout the genus Leptospira, and appear to have a VWA (von Willebrand factor type A) domain, represented in this entry, associated with at the N-terminal and an OB fold-like domain at the C-terminal ( ).
