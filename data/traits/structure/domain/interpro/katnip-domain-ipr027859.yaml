identifier: InterPro:IPR027859
label: "KATNIP domain"
definition: >-
  This domain can found in eukaryotic proteins such as KATNIP. It repeats several times in the vertebrate KATNIP. KATNIP is a microtubule-associated ciliary base protein probably involved in microtubule regulation.
