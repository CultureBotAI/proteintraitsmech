identifier: InterPro:IPR021978
label: "PML-like, coiled-coil"
definition: >-
  PML, also known as TRIM19, acts in association with PML-nuclear bodies (PML-NBs) in a wide range of important cellular processes, such as tumor suppression, transcriptional regulation, apoptosis, senescence, DNA damage response, and viral defense mechanisms. It acts as the scaffold of PML-NBs allowing other proteins to shuttle in and out, a process which is regulated by SUMO-mediated modifications and interactions. PML exhibits antiviral activity as it stimulates the SUMOylation of a viral protein which is supposed to serve as a cellular mechanism to compromise specific functions of the viral effector IE1p72. PML is defined by the TRIM/RBCC motif which consists of an N-terminal RING zinc finger ( ), two BBox type zinc fingers ( ), followed by a coiled-coil region, which is represented in this entry, and it is thought to mediate interactions with cytomegalovirus IE1 protein and/or other partners. This entry also includes RNF207, which has a similar domain organisation as PML.
