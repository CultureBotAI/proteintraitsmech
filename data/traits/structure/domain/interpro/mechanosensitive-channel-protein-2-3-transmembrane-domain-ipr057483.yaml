identifier: InterPro:IPR057483
label: "Mechanosensitive channel protein 2/3, transmembrane domain"
definition: >-
  This domain is found in Mechanosensitive ion channel protein 2 and 3 from Arabidopsis thaliana (MSL2/3) and similar plant sequences. MSL2/3 control plastid size, shape, and perhaps division during normal plant development by altering ion flux in response to changes in membrane tension. This domain is predicted to contain five transmembrane helices and is found N-terminal to and .
