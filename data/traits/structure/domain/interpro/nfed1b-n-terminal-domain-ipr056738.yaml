identifier: InterPro:IPR056738
label: "NfeD1b, N-terminal domain"
definition: >-
  This domain is found N-terminal in the membrane protein NfeD1b from B. subtilis and related bacterial proteins. The NfeD1b is composed of an N-terminal cytoplasmic ClpP serine protease-like domain, transmembrane domain, and a C-terminal OB (oligosaccharide/oligonucleotide-binding) fold domain. NfeD1b is a member of the NfeD (nodulation formation efficiency D) family which was divided into two groups: long and short forms. Long-form NfeD homologs contain a putative ClpP serine protease-like domain while short-form homologs have in common the C-terminal OB fold domain ( ). Despite global similarity to ClpP serine proteases, this domain lacks the typical for these enzymes Ser, His, Asp catalytic triad and of these, has only Ser residue conserved in equivalent position.
