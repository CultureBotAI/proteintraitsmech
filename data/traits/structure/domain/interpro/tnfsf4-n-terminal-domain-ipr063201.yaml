identifier: InterPro:IPR063201
label: "TNFSF4, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of tumor necrosis factor ligand superfamily member 4 (TNFSF4), also known as OX40 ligand. This domain is located at approximately residues 19-58 and precedes the well-characterised TNF homology domain (THD). TNFSF4 is a type II transmembrane protein that functions as a cytokine, binding to TNFRSF4 and co-stimulating T-cell proliferation and cytokine production. The protein forms homotrimers and contains a cytoplasmic N-terminal region, a single transmembrane helix, and an extracellular C-terminal region containing the TNF domain. The domain is found across vertebrate species and is conserved in mammals and birds. The specific function of this N-terminal domain within the TNFSF4 protein architecture remains to be determined.
