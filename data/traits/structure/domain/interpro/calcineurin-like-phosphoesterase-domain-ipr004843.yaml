identifier: InterPro:IPR004843
label: "Calcineurin-like, phosphoesterase domain"
definition: >-
  This domain is found in a diverse range of phosphoesterases, including bis(5'-nucleosyl)-tetraphosphatase (apaH), nucleotidases, sphingomyelin phosphodiesterases and 2'-3' cAMP phosphodiesterases, as well as nucleases such as bacterial SbcD or archaeal/yeast Mre11. The most conserved regions in the Calcineurin-like domain center around the metal-chelating residues. The structure typically comprises two sandwiched β-sheets flanked by α-helical segments, with the binuclear metal center located at the interface between two symmetrical halves of the molecule. This domain arrangement allows PAPs to perform their characteristic phosphatase activity under acidic conditions.
