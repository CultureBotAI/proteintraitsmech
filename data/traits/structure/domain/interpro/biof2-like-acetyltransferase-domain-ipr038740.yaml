identifier: InterPro:IPR038740
label: "BioF2-like, acetyltransferase domain"
definition: >-
  This entry represents the acetyltransferase domain found in a group of proteins, including BioF2 from Mycobacterium tuberculosis. BioF2 is a putative 8-amino-7-oxononanoate synthase.
