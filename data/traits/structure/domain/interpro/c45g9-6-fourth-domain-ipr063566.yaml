label: "C45G9.6, fourth domain"
definition: >-
  This entry represents the fourth domain found a group of uncharacterised proteins from nematodes, including C45G9.6 ( ) from Caenorhabditis elegans. The domain is predicted to adopt a mainly β-sheet structure. The function of this domain remains to be determined.
