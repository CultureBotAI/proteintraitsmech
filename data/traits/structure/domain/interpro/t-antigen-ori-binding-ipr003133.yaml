identifier: InterPro:IPR003133
label: T antigen, Ori-binding
definition: >-
  The group of polyomaviruses is formed by the homonymous murine virus (Py) as well as other representative members such as the simian virus 40 (SV40) and the human BK and JC viruses. Their large T antigen (T-ag) protein binds to and activates DNA replication from the origin of DNA replication (ori). Insofar as is known, the T-ag binds to the origin first as a monomer to its pentanucleotide recognition element. The monomers are then thought to assemble into hexamers and double hexamers, which constitute the form that is active in initiation of DNA replication. When bound to the ori, T-ag double hexamers encircle DNA. T-ag is a multidomain protein that contains an N-terminal J domain, which mediates protein interactions (see , ), a central origin-binding domain (OBD), and a C-terminal superfamily 3 helicase domain (see , ). This entry represents the central origin-binding domain (OBD). The overall fold of the ~130-residue T-ag OBD can be described as a central five-stranded antiparallel β-sheet flanked by two α-helices on one side and one α-helix and one 3(10)-helix on the other. Both faces of the central β-sheet are largely hydrophobic and are protected from solvent by the helices, thus forming two hydrophobic cores. The T-ag OBD molecules are arranged as a spiral with a left-handed twist having six T-ag OBD's per turn. The spiral surrounds a central channel, the inner wall of which consists of α helices.
