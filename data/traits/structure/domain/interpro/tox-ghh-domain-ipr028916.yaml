identifier: InterPro:IPR028916
label: "Tox-GHH domain"
definition: >-
  This entry represents the HNH/Endonuclease VII fold present in bacterial polymorphic toxin systems with a characteristic sG[HQ]H signature motif. In bacterial polymorphic toxin systems, the toxin is exported by the type 2, type 6, type 7 or TcdB/TcaC-type secretion system. In animals, an inactive version of the GHH domain can be found in the C-terminal of teneurin and Odd Oz proteins.
