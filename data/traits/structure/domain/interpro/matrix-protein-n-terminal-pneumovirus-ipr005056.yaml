identifier: InterPro:IPR005056
label: "Matrix protein, N-terminal, pneumovirus"
definition: >-
  This entry represents the N-terminal domain of the pneumoviral matrix protein (MATRX). The N-terminal domain of the RSV M protein (residues 1-126) adopts a twisted β-sandwich fold comprised of two nearly perpendicular β-sheets - one with 3 β-strands and one with 4 β-strands. The overall topology is a curved horseshoe-like arrangement with the 3-stranded β-sheet forming the concave inner face flanked by loop regions, and the 4-stranded β-sheet forming the convex outer face. This domain is loosely associated with the C-terminal domain via weak hydrophobic interactions. The N-terminal domain contains a distinctive negatively charged surface lobe that may direct interactions with binding partners. Sequence alignments indicate that regions of diversity between RSV and other pneumoviruses map to external loop regions and sheet edges in this domain, likely mediating species-specific protein or RNA interactions. The matrix proteins of Pneumovirus are transcriptional processivity and antitermination factor, and play a crucial role in viral assembly.
