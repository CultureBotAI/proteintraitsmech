label: "Domain of unknown function DUF7181"
definition: >-
  This entry represents an uncharacterised protein domain found in bacteriophage proteins, particularly those infecting Salmonella and Dickeya species. The domain is approximately 150 residues in length. The function of this domain is currently unknown.
