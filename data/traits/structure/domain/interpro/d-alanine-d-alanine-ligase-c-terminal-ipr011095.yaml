identifier: InterPro:IPR011095
label: "D-alanine--D-alanine ligase, C-terminal"
definition: >-
  This entry represents the C-terminal, catalytic domain of the D-alanine--D-alanine ligase enzyme . D-Alanine is one of the central molecules of the cross-linking step of peptidoglycan assembly. There are three enzymes involved in the D-alanine branch of peptidoglycan biosynthesis: the pyridoxal phosphate-dependent D-alanine racemase (Alr), the ATP-dependent D-alanine: D-alanine ligase (Ddl), and the ATP-dependent D-alanine:D-alanine-adding enzyme (MurF).
