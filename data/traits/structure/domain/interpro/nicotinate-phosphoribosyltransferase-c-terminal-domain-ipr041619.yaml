identifier: InterPro:IPR041619
label: "Nicotinate phosphoribosyltransferase C-terminal domain"
definition: >-
  Nicotinate phosphoribosyltransferase ( ) is the rate limiting enzyme that catalyses the first reaction in the NAD salvage synthesis. This domain is found at the C terminus of some nicotinate phosphoribosyltransferase enzymes. The function of this domain is uncertain.
