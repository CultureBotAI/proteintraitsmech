identifier: InterPro:IPR010318
label: "S-Me-THD, N-terminal domain"
definition: >-
  This entry represents a domain found N-terminal of S-methyl thiohydantoin desulfurase from Variovorax sp. (S-Me-THD), 3-(5-oxo-2-thioxoimidazolidin-4-yl)propionic acid desulfhydrase (ERTC) from Paenibacillus sp. and similar sequences mainly found in bacteria and fungi. S-Me-THD catalyses the hydrolysis of S-methyl-thiohydantoin-5-propanoate into hydantoin-5-propanoate and methanethiol, the third step in S-methyl ergothioneine degradation. ERTC is a desulfhydrase involved in the utilisation of ergothioneine, a naturally occurring histidine analog. It catalyses the hydrolysis of 3-(5-oxo-2-thioxoimidazolidin-4-yl)propionic acid (OTP) to hydantoin-5-propionic acid and H2S, the third step of the pathway. This domain is also found in the hypothetical protein from Chromobacterium violaceum and related hypothetical bacterial, archaeal and eukaryotic proteins of unknown function. This domain adopts a globular 3-layer(aba) structure consisting os a central mixed β-sheet and α-helices packed on both sides of it .
