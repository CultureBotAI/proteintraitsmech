label: "MJ0421-like, SPOUT RNA methylase domain"
definition: >-
  This entry represents a SPOUT superfamily RNA methylase domain that is found fused to an RNA-binding THUMP domain ( ) in a group of uncharacterised archaeal proteins, including MJ0421 from Methanocaldococcus jannaschii.
