identifier: InterPro:IPR019175
label: "Prp31 C-terminal"
definition: >-
  This is the C-terminal domain of the pre-mRNA processing factor Prp31. Prp31 is required for U4/U6*U5 tri-snRNP formation. In humans this protein has been linked to autosomal dominant retinitis pigmentosa.
