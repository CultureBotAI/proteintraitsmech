identifier: InterPro:IPR012869
label: "CopG-like ribbon-helix-helix domain"
definition: >-
  This entry represents a domain found in a group of bacterial proteins that form a ribbon-helix-helix fold. This fold occurs in many examples of bacterial antitoxins.
