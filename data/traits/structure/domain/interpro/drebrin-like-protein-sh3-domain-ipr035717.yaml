identifier: InterPro:IPR035717
label: "Drebrin-like protein, SH3 domain"
definition: >-
  Drebrin-like protein (also known as HIP-55 or ABP1) is a F-actin binding protein that is involved in receptor-mediated endocytosis, vesicle recycling and dorsal ruffle formation. It plays important roles in immune function and in cytoskeletal processes during neuronal network formation. ABP1 contains an N-terminal actin-binding module, the actin-depolymerizing factor (ADF) homology domain, a helical domain, and a C-terminal SH3 domain. Mammalian Abp1, unlike yeast Abp1, does not contain an acidic domain that interacts with the Arp2/3 complex. It regulates actin dynamics indirectly by interacting with dynamin and WASP family proteins. This entry represents the SH3 domain of ABP1.
