identifier: InterPro:IPR057632
label: "Tubulin polyglutamylase complex subunit 1-like, C-terminal"
definition: >-
  This is the C-terminal domain of human TPGS1 and similar animal proteins. This domain is predicted to adopt a mainly α-helical configuration. Tubulin polyglutamylase complex subunit 1-like TPGS1 (also known as PGs1) is part of the tubulin polyglutamylase complex, which plays a role in post-translational addition of glutamate residues to C-terminal tubulin tails. It is required for sperm axoneme assembly and normal animal behaviour.
