identifier: InterPro:IPR058835
label: "ALG44, barrel-sandwich hybrid domain"
definition: >-
  This domain is found in Alg44 from Pseudomonas aeruginosa and related proteins. Alg44 is a membrane protein that along Alg8 is required in vivo for the polymerisation reaction leading to alginate production.
