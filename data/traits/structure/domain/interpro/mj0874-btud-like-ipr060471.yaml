identifier: InterPro:IPR060471
label: MJ0874/BtuD-like
definition: >-
  This entry represents a domain covering the full length of MJ0874, an uncharacterised protein from Methanocaldococcus jannaschii. MJ0874 is a 93 amino acid protein (gene MJ0874) from the methanogenic archaeon. This domain also covers the C-terminal in Cobalamin import ATP-binding protein BtuD from Halobacterium salinarum. The function of this domain is unknown. BtuD is required for corrinoid utilisation. It is probably part of the ABC transporter complex BtuCDF involved in cobalamin (vitamin B12) import. It may be responsible for energy coupling to the transport system.
