label: "uDENN domain"
definition: >-
  The tripartite DENN (Differentially Expressed in Normal and Neoplastic Cells) domain is an evolutionarily conserved protein module found in several proteins involved in Rab-mediated processes and, in some cases, regulation of MAPK (Mitogen-Activated Protein Kinase) signalling pathways and related proteins in eukaryotic organisms. The DENN domain consists of three subdomains: uDENN (upstream DENN) , the core DENN domain , and dDENN (downstream DENN) , which are structurally distinct but functionally interconnected due to their roles in Rab GTPase activation. Recent studies have confirmed the DENN domain's function as a guanine nucleotide exchange factor (GEF) for Rab GTPases, facilitating the exchange of GDP for GTP to activate Rabs. This activity has been demonstrated for various DENN proteins, such as DENND1A and DENND1B, which specifically activate Rab35, and DENND2B, which serves as a GEF for Rab10 and Rab13, influencing processes like primary ciliogenesis and epithelial cancer development. The tripartite structure of the DENN domain, comprising uDENN, DENN itself, and dDENN, features distinct patterns of sequence conservation and variable interdomain lengths that suggest functional specialisation. Structural studies have revealed conserved residues critical for Rab binding and catalytic activity, emphasising the role of DENN domains in spatially and temporally regulating membrane trafficking events. Additionally, DENN domains are often associated with other domains such as RUN , PLAT , which may further enhance their functional versatility in cellular signalling pathways. Some proteins known to contain a tripartite DENN domain include: Human mitogen-activated protein kinase activating protein containing death domain (MADD) , orthologous to Rab3GEP Human SET domain-…
