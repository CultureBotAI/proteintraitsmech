identifier: InterPro:IPR054644
label: "Exosortase-dependent surface domain XDD4"
definition: >-
  This entry represents XDD4 (exosortase-dependent surface domain 4), the fourth in a series of domains or full-length proteins that appear always, or nearly always, to have a C-terminal sorting signal such as PEP-CTERM ( ) that is recognized and processed by XrtA or another exosortase.
