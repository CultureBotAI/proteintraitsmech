identifier: InterPro:IPR058415
label: "Domain of unknown function"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins found in the class Halobacteria. The proteins containing this domain are predominantly found in archaea, specifically within the order Halobacteriales. The domain is typically found in proteins ranging from 150 to 220 amino acids in length.
