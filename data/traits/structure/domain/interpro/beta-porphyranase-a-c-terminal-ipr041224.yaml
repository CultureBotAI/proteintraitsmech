identifier: InterPro:IPR041224
label: "Beta-porphyranase A, C-terminal"
definition: >-
  This domain is found towards the C-terminal end of beta-porphyranase A (BPA) from Bacteroides plebeius, a beta-galactanase that cleaves the beta-1,4 glycosidic bond and can also use methylated galactoses. This domain adopts a β sandwich shape. Beta-porphyranases, which are active on sulfated polysaccharides from marine red algae of the genus Porphyra, are present in marine bacteria. This domain is also found in Beta-agarase AgaO from Microbulbifer thermotolerans, an endo-type beta-agarase and Funoran endo-beta-hydrolase from Wenyingzhuangia aestuarii, an endohydrolase that cleaves the beta-1,4 glycosidic bond between beta-D-galactopyranose-6-sulfate and 3,6-anhydro-alpha-L-galactopyranose unit of funoran.
