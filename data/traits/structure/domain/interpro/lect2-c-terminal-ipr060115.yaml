identifier: InterPro:IPR060115
label: "LECT2, C-terminal"
definition: >-
  This entry represents the C-terminal domain of LECT2 from Caenorhabditis elegans and related proteins from nematodes. LECT2/MIM-1 proteins are involved in the development and morphogenesis of somatosensory dendritic arbors, particularly those extending from PVD and FLP sensory neurons. They function as muscle-derived dendritic guidance cues and act as ligands in a multi-protein receptor ligand complex that includes DMA-1, MNR-1, and SAX-7. This complex is crucial for controlling the growth and stabilisation of dendritic branches, especially quaternary branches, and their innervation of body wall muscles. Additionally, these proteins promote self-avoidance of tertiary dendritic branches and restrict the growth of secondary and ectopic tertiary branches. They are not involved in the dendritic growth of other neuron types such as AIY, PVQ, and various motor neurons. In Caenorhabditis elegans, LECT2 contains two domains, while LECT2/MIM-1 from mammals ( ) contains only one domain. However, they share a similar topology typical for duplicated barrel-sandwich hybrid domains ( ).
