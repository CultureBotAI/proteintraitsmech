identifier: InterPro:IPR060415
label: "RALGAPA1-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in Ral GTPase-activating protein subunit alpha-1 (RALGAPA1) and RALGAPA2 proteins. This domain is located at the N-terminal region of RALGAPA1, which functions as the catalytic subunit of the heterodimeric RalGAP1 complex. This N-terminal domain is found in vertebrates and forms part of the multi-domain architecture essential for RALGAPA1 function. The specific function of this N-terminal domain within RALGAPA1 remains to be determined. The full-length RALGAPA1 protein acts as a GTPase activator for the Ras-like small GTPases RALA and RALB. RALGAPA1 requires heterodimerisation with RALGAPB for full activity and can interact with transcription factors such as TCF3. The protein is found in both cytoplasm and nucleus and can translocate between these compartments.
