identifier: InterPro:IPR062817
label: "Treponema TP0577-like, helical hairpin domain"
definition: >-
  This entry represents a helical hairpin found near the N terminus of Treponema pallidum protein TP0577 and related spirochaete proteins. The domain is approximately 70 residues long and is found in proteins predicted to be membrane-associated. It is part of a multi-domain architecture that includes additional C-terminal domains. The function of this domain remains to be determined.
