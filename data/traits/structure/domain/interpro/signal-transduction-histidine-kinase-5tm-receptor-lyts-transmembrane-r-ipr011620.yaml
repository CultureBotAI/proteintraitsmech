identifier: InterPro:IPR011620
label: Signal transduction histidine kinase, 5TM receptor LytS, transmembrane region
definition: >-
  Signal transducing histidine kinases are the key elements in two-component signal transduction systems, which control complex processes such as the initiation of development in microorganisms. Examples of histidine kinases are EnvZ, which plays a central role in osmoregulation, and CheA, which plays a central role in the chemotaxis system. Histidine kinases usually have an N-terminal ligand-binding domain and a C-terminal kinase domain, but other domains may also be present. The kinase domain is responsible for the autophosphorylation of the histidine with ATP, the phosphotransfer from the kinase to an aspartate of the response regulator, and (with bifunctional enzymes) the phosphotransfer from aspartyl phosphate back to ADP or to water. The kinase core has a unique fold, distinct from that of the Ser/Thr/Tyr kinase superfamily. This entry represents the transmembrane region of the 5TM-Lyt (5TM Receptors of the LytS-YhcK type) histidine kinase. The two-component regulatory system LytS/LytT probably regulates genes involved in cell wall metabolism.
