identifier: InterPro:IPR057188
label: "Domain of unknown function DUF7866"
definition: >-
  This domain is found in uncharacterised proteins from plants. It is predicted to fold into a three-stranded antiparallel twisted β-sheet. It contains several highly conserved cysteine residues that are predicted to form disulfide bonds.
