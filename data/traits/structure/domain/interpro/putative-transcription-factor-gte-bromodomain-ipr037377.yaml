identifier: InterPro:IPR037377
label: "Putative transcription factor GTE, bromodomain"
definition: >-
  This entry represents the bromodomain found in a group of plant putative transcription factors, known as GLOBAL TRANSCRIPTION FACTOR GROUP E (GTE). GTE1 (also known as IMB1) regulates ABA- and phyA-mediated responses of germination in Arabidopsis.
