identifier: InterPro:IPR058365
label: "Domain of unknown function DUF8052"
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. This family represents an approximately 200 residue long globular alpha/beta domain. The domain contains a conserved Glutamic acid, Aspartic acid and Histidine residue that may contribute to an enzymatic active site.
