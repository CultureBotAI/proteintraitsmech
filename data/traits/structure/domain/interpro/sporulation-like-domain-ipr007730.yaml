identifier: InterPro:IPR007730
label: "Sporulation-like domain"
definition: >-
  This 70 residue domain, known as SPOR domain, is composed of two 35 residue repeats that are found in bacterial proteins involved in sporulation and cell division, such as FtsN, CwlM and RlpA. The SPOR domains in the FtsN cell division proteins from Escherichia coli and Caulobacter crescentus have been shown to bind peptidoglycan. SPOR domains can localise to the division site by binding preferentially to septal peptidoglycan. FtsN is an essential cell division protein with a simple bitopic topology: a short N-terminal cytoplasmic segment fused to a large carboxy periplasmic domain through a single transmembrane domain. The repeats lie at the periplasmic C terminus, which has an RNP-like fold. FtsN localises to the septum ring complex. The CwlM protein is a cell wall hydrolase, where the C-terminal region, including the repeats, determines substrate specificity. RlpA is a rare lipoprotein A protein that may be important for cell division. Its N-terminal cysteine may be attached to thioglyceride and N-fatty acyl residues.
