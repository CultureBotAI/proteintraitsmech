identifier: InterPro:IPR041677
label: DNA2/NAM7 helicase, helicase domain
definition: >-
  This domain contains the ATP-binding region of DNA2. DNA2 is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Proteins containing this domain also include Nam7 and other helicases. Dna2 is a DNA replication factor with single-stranded DNA-dependent ATPase, ATP-dependent nuclease, (5'-flap endonuclease) and helicase activities. Nam7 (also known as Upf1 and RENT1, for Regulator of nonsense transcripts 1) is an ATP-dependent RNA helicase involved in the nonsense-mediated mRNA decay (NMD) pathway.
