identifier: InterPro:IPR060598
label: "Fibronectin type III domain-containing protein 9, helical domain"
definition: >-
  This entry represents the helical domain found in fibronectin type III domain-containing protein 9 (FNDC9). The specific function of this domain remains to be determined. This entry includes Fibronectin type III domain-containing protein 9 (FNDC9) and similar proteins from vertebrates. FNDC9 is a single-pass membrane protein containing an N-terminal fibronectin type-III domain followed by this C-terminal helical region and a large disordered region. The protein is expressed in the brain and shows group enrichment in brain and pituitary gland tissues. The gene encoding FNDC9 is located within an intron of the CYFIP2 gene on the opposite strand. FNDC9 localises to cellular membranes and has been shown to interact with numerous membrane proteins. The specific function of this domain remains to be determined.
