identifier: InterPro:IPR059795
label: "WWFGPP domain"
definition: >-
  This domain is found in uncharacterised proteins mainly from Bacillales. It contains a highly conserved WWFGPP sequence motif after which it was named. It is predicted to adopt an unique α/β structure consisting of a small four-stranded β-sheet and α-helices packed on one side of it.
