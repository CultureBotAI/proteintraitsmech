identifier: InterPro:IPR033935
label: "Large ribosomal subunit protein eL19, eukaryotic"
definition: >-
  This entry represents the structural domain of the large ribosomal subunit protein eL19 from eukaryotes and it is distinct from the ribosomal subunit L19, which is found in prokaryotes. It consists of two small globular domains connected by an extended segment. It is located toward the surface of the large subunit, with one exposed end involved in forming the intersubunit bridge with the small subunit. The other exposed end is involved in forming the translocon binding site, along with L22, L23, L24, L29, and L31e subunits.
