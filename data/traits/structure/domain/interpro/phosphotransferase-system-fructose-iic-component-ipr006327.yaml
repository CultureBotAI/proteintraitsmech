identifier: InterPro:IPR006327
label: "Phosphotransferase system, fructose IIC component"
definition: >-
  This entry represents the IIC component, or IIC region of a IIABC or IIBC polypeptide of a phosphotransferase system for carbohydrate transport. Members of this family belong to the fructose-specific subfamily of the broader family of PTS EIIC proteins. Members should be found as part of the same chain or in the same operon as fructose family IIA ( ) and IIB ( ) protein regions. A number of bacterial species have members in two different branches of this subfamily, suggesting some diversity in substrate specificity of its members. PTS systems commonly occur in bacteria. An archaeal version has also been discovered. This entry identifies both the bacterial family members and archaeal homologues.
