identifier: InterPro:IPR028900
label: "Tox-SHH domain"
definition: >-
  This entry represents the HNH/Endonuclease VII fold present in bacterial polymorphic toxin systems with two conserved histidine residues. In bacterial polymorphic toxin systems, the toxin is exported by the type 2, type 5, type 6 or type 7 secretion system.
