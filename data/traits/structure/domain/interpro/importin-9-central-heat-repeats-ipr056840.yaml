identifier: InterPro:IPR056840
label: "Importin-9, central HEAT repeats"
definition: >-
  This entry represents the central HEAT repeat domain found in the human Importin-9 and the yeast orthologue Importin subunit beta-5. Importin-9 is a nuclear transport receptor that mediates nuclear import of proteins, such as histones, proteasome and actin. It consists of 20 tandem HEAT repeats. This entry represents a central segment of HEAT repeats which includes repeats 7-8 that are part of interface 2 that interacts with a five-residue segment of the H2B N-terminal tail described in.
