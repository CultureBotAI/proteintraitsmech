identifier: InterPro:IPR048637
label: "Maternal embryonic leucine zipper kinase, UBA domain"
definition: >-
  This domain is found in Maternal embryonic leucine zipper kinase from humans (MELK) and similar proteins from animals. MELK is a member of the snf1/AMPK family of serine-threonine kinases that has been associated with various cellular processes, including stem cell renewal, cell cycle progression, and pre-mRNA splicing. It is upregulated in several types of tumour. MELK is organised into three domains: an N-terminal kinase domain ( ), a ubiquitin associated (UBA) domain (this entry) and a C-terminal kinase associated domain (KA1, ). This domain adopts a compact configuration consisting of three α-helices organised in a "U"-shaped fold, with the first helix antiparallel to the third one.
