identifier: InterPro:IPR056710
label: "Domain of unknown function DUF7808"
definition: >-
  This domain is found in Uncharacterized protein T05H10.3 from C.elegans and related nematode proteins. It is predicted to adopt a β-sandwich with similarity to domains members of H-lectin-like superfamily. This domain contains several highly conserved cysteine residues that are predicted to form disulfide bonds.
