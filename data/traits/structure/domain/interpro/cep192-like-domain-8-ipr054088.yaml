identifier: InterPro:IPR054088
label: "Cep192-like, domain 8"
definition: >-
  Cep192 is a centrosomal protein with key roles in centriole duplication and pericentriolar material recruitment, organisation and regulation. Most of the metazoan Cep192 homologues consist of eight ASH/PapD-like domains, which are located at the C-terminal part of the proteins and are likely arranged in a beads-on-string fashion. This entry represents the eighth domain found in the metazoan Cep192 homologs.
