identifier: InterPro:IPR019333
label: "Integrator complex subunit 3, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the Integrator complex subunit 3 (Ints3). The Integrator complex is involved in small nuclear RNA (snRNA) U1 and U2 transcription, and in their 3'-box-dependent processing. This complex associates with the C-terminal domain of RNA polymerase II largest subunit and is recruited to the U1 and U2 snRNAs genes. Ints3 (also known as SOSSA) is also a component of the sensor of single-stranded DNA complex (SOSS), which associates with single-stranded DNA, important for DNA repair and efficient homologous recombination. This subunit serves as a central adaptor for SOSS complex assembly and stability, and facilitates the accumulation of the complex to the sites of DNA damage. This region acts as a scaffold for SOSSB1 and SOSSC interaction and it is not essential for ssDNA binding.
