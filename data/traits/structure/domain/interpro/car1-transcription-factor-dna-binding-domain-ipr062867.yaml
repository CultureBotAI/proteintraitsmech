identifier: InterPro:IPR062867
label: "CAR1 transcription factor, DNA-binding domain"
definition: >-
  This entry represents the DNA-binding domain of CRTF (CAR1 transcription factor), found in Amoebozoa. CRTF is a nuclear transcription factor with zinc-dependent sequence-binding specificity, required for carA-1 and carA-2 expression in early Dictyostelium development and for terminal spore differentiation. The protein contains a coiled-coil region and this C-terminal DNA-binding domain which interacts with the carA promoter element.
