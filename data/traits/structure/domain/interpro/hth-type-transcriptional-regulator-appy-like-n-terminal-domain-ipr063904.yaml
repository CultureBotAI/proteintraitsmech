identifier: InterPro:IPR063904
label: "HTH-type transcriptional regulator AppY-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of HTH-type transcriptional regulator AppY, GadW and YdeO found in gammaproteobacteria. AppY regulates the expression of genes in response to stress conditions and pH changes. This domain has a cupin-like fold. This domain is usually found associated with .
