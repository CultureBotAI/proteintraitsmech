identifier: InterPro:IPR037315
label: "Exonuclease-1, H3TH domain"
definition: >-
  Exonuclease-1 (EXO1) is a 5'-3' exonuclease that functions in DNA mismatch repair (MMR), double-strand break repair, replication and recombination. It also possesses a flap-endonuclease activity.
