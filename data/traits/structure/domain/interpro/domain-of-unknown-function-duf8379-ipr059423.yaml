label: "Domain of unknown function DUF8379"
definition: >-
  This domain is found in uncharacterised proteins from Gammaproteobacteria. It is predicted to fold into a β-meander that curves around a single α-helix. It contains two conserved sequence motifs DxDGxxD and QxPP.
