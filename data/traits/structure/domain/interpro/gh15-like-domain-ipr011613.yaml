identifier: InterPro:IPR011613
label: "GH15-like domain"
definition: >-
  This entry represents a domain found in glycoside hydrolase family 15 members and in phosphorylase b kinase regulatory chains alpha and beta. Glycoside hydrolase family 15 comprises enzymes with several known activities; glucoamylase ( ); alpha-glucosidase ( ); glucodextranase ( ).
