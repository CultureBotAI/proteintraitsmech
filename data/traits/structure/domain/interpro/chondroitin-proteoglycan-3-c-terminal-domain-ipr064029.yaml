identifier: InterPro:IPR064029
label: "Chondroitin proteoglycan 3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of chondroitin proteoglycan 3 (CPG-3) proteins, found in nematodes. CPG-3 proteins are approximately 260-290 amino acids in length and contain an N-terminal signal peptide for secretion. The proteins contain multiple N-linked glycosylation sites and regions of low complexity with acidic residues. CPG-3 was identified by mass spectrometry in C. elegans and belongs to a family of novel chondroitin proteoglycans. While CPG-1 and CPG-2 are essential for embryonic cell division in C. elegans, the specific function of CPG-3 remains to be determined.
