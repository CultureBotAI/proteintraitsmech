identifier: InterPro:IPR047890
label: KHDC4, first type I KH domain
definition: >-
  KHDC4 (also known as Brings lots of money 7 (Blom7), or pre-mRNA splicing factor protein KHDC4), is an RNA-binding protein involved in pre-mRNA splicing. It interacts with the PRP19C/Prp19 complex/NTC/Nineteen complex which is part of the spliceosome. KHDC4 binds preferentially RNA with A/C rich sequences and poly-C stretches. KHDC4 contains two type I K homology (KH) RNA-binding domains. This entry corresponds to the first one.
