identifier: InterPro:IPR021530
label: "AllH-like, C-terminal"
definition: >-
  This entry, previously known as DUF2877, represents the Oxamate carbamoyltransferase subunit AllH and related bacterial proteins. AllH is a component of a carbamoyltransferase involved in the anaerobic nitrogen utilization via the assimilation of allantoin. It catalyses the conversion of oxalurate (N-carbamoyl-2-oxoglycine) to oxamate and carbamoyl phosphate.
