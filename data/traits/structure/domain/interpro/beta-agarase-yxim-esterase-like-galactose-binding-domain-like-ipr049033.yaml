label: "Beta-agarase/YXIM esterase-like, galactose-binding domain-like"
definition: >-
  This entry represents the galactose-binding domain found in the middle of beta-agarase A from Zobellia galactanivorans and at the N-terminal of the uncharacterised esterase YXIM from Bacillus subtilis and similar sequences.
