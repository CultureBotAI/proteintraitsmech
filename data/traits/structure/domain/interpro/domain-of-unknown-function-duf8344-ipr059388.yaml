identifier: InterPro:IPR059388
label: "Domain of unknown function DUF8344"
definition: >-
  This domain is found in uncharacterised proteins mainly from Myxococcota lineage. It is predicted to fold into a globular structure comprising a four stranded β-sheet packed with two helices. It contains two highly conserved cysteine and a histidine residues that may coordinate a metal ion. The position of the fourth residues is not conserved but it is always present in a close proximity.
