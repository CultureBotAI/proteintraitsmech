identifier: InterPro:IPR063887
label: "ARB_00926, immunoglobulin-like domain"
definition: >-
  This entry represents a secreted domain in Ascomycota fungi and some uncharacterised bacterial sequences. The domain adopts an immunoglobulin-like fold. In Arthroderma benhamiae, the protein ARB_00926 containing this domain was identified by mass spectrometry during extracellular proteolysis at acidic pH. The function of this domain remains to be determined.
