identifier: InterPro:IPR060125
label: "Coiled-coil domain-containing protein 33, N-terminal"
definition: >-
  This entry represents the N-terminal domain of human Coiled-coil domain-containing protein 33 (Ccdc33) and related proteins from animals. The function of these proteins have not been elucidated yet. This domain is predicted to adopt a structure with some similarity to known C2 domains. This domain is not present in the orthologue found in rat.
