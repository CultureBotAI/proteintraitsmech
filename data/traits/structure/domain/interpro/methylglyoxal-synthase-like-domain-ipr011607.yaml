identifier: InterPro:IPR011607
label: "Methylglyoxal synthase-like domain"
definition: >-
  Methylglyoxal synthase (MGS, ), which catalyses the conversion of dihydroxyacetone phosphate (DHAP) to methylglyoxal (MG) and inorganic phosphate, has been found in many organisms, including enteric bacteria, some gram-positive bacteria, a number of archaebacteria, several yeast species and goat liver. The main core of the MGS-like domain, a modified 'Rossmann' fold, is characterised by a five stranded parallel β-sheet flanked on either side by three and five α-helices, respectively. MGS-like domains share a conserved phosphate binding site.
