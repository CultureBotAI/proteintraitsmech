identifier: InterPro:IPR029453
label: "Rapamycin-insensitive companion of mTOR, domain 4"
definition: >-
  This entry represents the domain 4 of the Rictor (rapamycin-insensitive companion of mTOR) protein. It is found in the more conserved central section that may include several individual domains The mammalian target of rapamycin (mTOR) is a conserved Ser/Thr kinase that forms two functionally distinct complexes, mTROC1 and mTORC2, important for nutrient and growth-factor signalling. Rictor (rapamycin-insensitive companion of mTOR) is a component of mTORC2. There is a regulatory link between the two mTOR complexes, whereby Rictor phosphorylation by mTORC1 regulates mTORC2 signalling. Over-expression of Rictor increases mTORC2 activity and promotes cell growth and motility.
