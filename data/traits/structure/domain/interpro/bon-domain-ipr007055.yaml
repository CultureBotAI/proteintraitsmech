identifier: InterPro:IPR007055
label: "BON domain"
definition: >-
  The BON domain is typically ~60 residues long and has an α/β fold. There is a conserved glycine residue and several hydrophobic regions which suggests a binding function, and, actually, it contains a phospholipid-binding site , ]. Most proteobacteria seem to possess one or two BON-containing proteins, typically of the OsmY-type proteins; outside of this group the distribution is more disparate. The OsmY protein is an Escherichia coli 20kDa outer membrane or periplasmic protein that is expressed in response to a variety of stress conditions, in particular, helping to provide protection against osmotic shock. One hypothesis is that OsmY prevents shrinkage of the cytoplasmic compartment by contacting the phospholipid interfaces surrounding the periplasmic space. The domain architecture of two BON domains alone suggests that these domains contact the surfaces of phospholipids, with each domain contacting a membrane. In the potassium binding protein Kbp, this domain is able to bind K. This domain is also found in ArfA, a membrane protein required for supporting bacterial growth in acidic environments.
