identifier: InterPro:IPR054028
label: "TarS/TarP, linker domain"
definition: >-
  TarS is an enzyme responsible for the glycosylation of wall teichoic acid polymers of the S. aureus cell wall, a process that has been shown to contribute for methicillin resistance in MRSA. TarS consist of three domains: catalytic, linker and trimerisation. This entry represents the linker domain that bridges the catalytic and trimerisation domains. This domain is also found C-terminal in Poly(ribitol-phosphate) beta-N-acetylglucosaminyltransferase TarP which transfers GlcNAc to a different hydroxyl group of the target poly(RboP)-wall teichoic acid than TarS, with important consequences for immune recognition.
