identifier: InterPro:IPR024635
label: "Gonadotropin hormone receptor, transmembrane domain"
definition: >-
  This domain represents the transmembrane region of follicular stimulating hormone and luteinizing hormone receptors- the two major gonadotropin hormone receptors. This domain is found in eukaryotes, and is approximately 70 amino acids in length. There are two completely conserved C residues that may be functionally important. The transmembrane region is conserved between the two different receptors, while the extracellular ligand binding domains are less well conserved. The follicular stimulating hormone and luteinizing hormone receptors are G protein-coupled receptors involved in development and maturation of germ cells in both fecund genders.
