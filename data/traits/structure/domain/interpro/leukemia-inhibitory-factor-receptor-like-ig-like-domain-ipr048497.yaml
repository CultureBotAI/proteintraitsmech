identifier: InterPro:IPR048497
label: "Leukemia inhibitory factor receptor-like, Ig-like domain"
definition: >-
  This domain is found in Leukemia inhibitory factor receptor from mouse (LIF-R) and similar proteins from vertebrates. LIF-R binds a cytokine that acts on many cell types including embryonic stem cells, megakaryocytes, osteoblasts, and neuronal cells. The extracellular region of this protein shows a modular structure with two cytokine-binding modules (CBM, with representing the second subdomain of CBM1, D2) separated by an Ig-like domain (this entry) and followed by three membrane-proximal fibronectin type-III (FNIII) domains ( ) This domain interacts directly with site 3 of the Cilliary Neutrophic Factor (CNTF). This domain is also found in human Oncostatin-M-specific receptor subunit beta (OSMR), which associates with IL31RA to form the IL31 receptor. It binds IL31 to activate STAT3 and possibly STAT1 and STAT5 and is capable of transducing OSM-specific signalling events.
