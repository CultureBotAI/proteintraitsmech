identifier: InterPro:IPR045983
label: "Guanylate cyclase domain-containing protein, N-terminal"
definition: >-
  This presumed domain is found at the N terminus of guanylate cyclase domain-containing proteins and is functionally uncharacterised. It is found mainly in proteobacteria and spirochaetes, and is approximately 280 amino acids in length. It is N-terminal to PF00211.
