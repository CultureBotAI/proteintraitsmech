identifier: InterPro:IPR049826
label: "Ig-like Ice domain"
definition: >-
  This entry represents an immunoglobulin-like domain found mainly in Gammaproteobacteria. Thig Ig-like domain occurs as a repeat in a number of large adhesins, including a 1.5-MDa ice-binding adhesin, the Marinomonas primoryensis antifreeze protein.
