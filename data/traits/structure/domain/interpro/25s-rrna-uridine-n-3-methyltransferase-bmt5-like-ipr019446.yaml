identifier: InterPro:IPR019446
label: 25S rRNA (uridine-N(3))-methyltransferase BMT5-like
definition: >-
  This is the N-terminal domain found in proteins from plants, yeast and humans, including 25S rRNA (uridine-N(3))-methyltransferase BMT5 from S. cerevisiae and the poorly characterised Ferredoxin-fold anticodon-binding domain-containing protein 1 from human and Heavy metal-associated isoprenylated plant protein 41 from Arabidopsis. This domain has a characteristic Rossmann-like fold of S-adenosyl-L-methionine (SAM) binding domains. BTM5 is a SAM-dependent methyltransferase that specifically methylates the N3 position of uridine in 25S rRNA.
