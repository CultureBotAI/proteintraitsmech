identifier: InterPro:IPR061884
label: "Domain of unknown function DUF8823"
definition: >-
  This entry represents a C-terminal globular domain of approximately 110 residues found in large integral membrane proteins from Actinomycetota, particularly Streptomycetaceae (Streptomyces and related genera). The parent proteins are approximately 500-700 residues in length with this domain positioned at the C terminus. While the proteins are annotated as membrane transporters, the specific function of this C-terminal domain remains to be determined.
