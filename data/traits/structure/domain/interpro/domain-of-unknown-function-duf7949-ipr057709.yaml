identifier: InterPro:IPR057709
label: "Domain of unknown function DUF7949"
definition: >-
  This entry describes a domain of unknown function in putative EGF-like domain-containing proteins found in eukaryotes, mainly ameobas. According to structure predictions it adopts an EGF-like fold which contain six conserved cysteine residues. The EGF-like fold has two-stranded β-sheets followed by a loop to a short C-termini. It usually occurs in tandem repeats. The domain described by this entry has the 6 conserved cysteine residues. It also acquires a similar structure to the EGF-like fold and it is 40 amino acids long.
