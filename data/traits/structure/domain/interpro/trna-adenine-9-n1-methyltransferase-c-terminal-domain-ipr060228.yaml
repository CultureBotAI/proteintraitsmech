identifier: InterPro:IPR060228
label: "tRNA (adenine(9)-N1)-methyltransferase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of tRNA (adenine(9)-N1)- methyltransferase (TRM10) found in thermophilic archaea. The domain is found in Thermoproteota, particularly Sulfolobaceae including Sulfolobus, Acidianus, and Metallosphaera. TRM10 proteins are approximately 292 amino acids and catalyse the S-adenosyl-L-methionine-dependent formation of N(1)-methyladenine at position 9 (m1A9) in tRNA. The protein contains three domains, the N-terminal is represented by , the central domain contains SAM-dependent methyltransferase activity ( ) and the C-terminal is represented by .
