identifier: InterPro:IPR058754
label: "Otogelin-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in Otogelin-like proteins in proteins from vertebrates. This domain is approximately 30 amino acids long and contains conserved cysteine residues that stabilise β-sheets, forming an EGF-like fold. Otogelin is a structurally complex glycoprotein with specialised roles in the inner ear membranes. While it shares some structural similarities with mucins, including von Willebrand factor-like domains and cysteine-rich regions, it differs in its glycosylation patterns and functions. Otogelin undergoes primarily N-glycosylation and plays a critical role in the organisation of the extracellular matrix within the inner ear. Otogelin proteins are specific to the acellular membranes of the inner ear. Otogelin and Otogelin-like proteins are potentially involved in the anchoring of otoconial membranes and cupulae to the underlying neuroepithelia in the vestibule. They may also play a role in the organisation and stabilisation of the fibrillar network that composes the tectorial membrane in the cochlea. Additionally, these proteins might be involved in mechanotransduction processes, which are crucial for the conversion of mechanical stimuli in neural signals in the auditory system.
