identifier: InterPro:IPR010788
label: "VDE lipocalin domain"
definition: >-
  This entry represents the conserved lipocalin domain within plant violaxanthin de-epoxidase (VDE), which is thought to bind xanthophyll molecules in all-trans configuration. In higher plants, violaxanthin de-epoxidase forms part of a conserved system that dissipates excess energy as heat in the light-harvesting complexes of photosystem II (PSII), thus protecting them from photo-inhibitory damage.
