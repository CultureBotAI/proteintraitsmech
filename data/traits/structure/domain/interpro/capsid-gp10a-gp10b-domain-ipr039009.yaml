identifier: InterPro:IPR039009
label: "Capsid Gp10A/Gp10B domain"
definition: >-
  This entry describes a domain found in capsid proteins, such as Gp10A (also known as Major capsid protein, ) and Gp10B (also known as Minor capsid protein, ) from bacteriophage T7 and T3 and similar sequences from tailed bateriophages. Gp10A subunits adopt an HK97-like conformation to form the viral shell. They incorporate into the capsid in about a 90/10 ratio.
