identifier: InterPro:IPR063718
label: "Par-4, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of prostate apoptosis response protein Par-4 (PAWR), a pro-apoptotic protein found in metazoans. Par-4 selectively induces apoptosis in cancer cells by activating the Fas prodeath pathway and inhibiting NF-kappa-B transcriptional activity. The protein interacts with the Wilms tumour suppressor WT1 to inhibit its transcriptional activation function and augment its transcriptional repression, and down-regulates the anti-apoptotic protein BCL2 via this interaction. Par-4 contains a region named SAC domain that is selective for apoptosis induction in cancer cells and is essential for nuclear entry, Fas activation and NF-kappa-B inhibition. The C-terminal leucine-zipper domain mediates interactions with partner proteins including WT1. The protein also contains a B30.2/SPRY domain-binding motif that mediates recognition by SPSB1, SPSB2 and SPSB4. Par-4 is mainly cytoplasmic in normal cells but localises to the nucleus in cancer cells, where nuclear entry is essential for apoptosis induction. Expression is elevated in neurodegenerative diseases and down-regulated in several cancers. This domain is predicted to contain a Leucine-zipper.
