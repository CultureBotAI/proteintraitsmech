identifier: InterPro:IPR034981
label: "EfeO/Algp7, imelysin-like domain"
definition: >-
  EfeO is an essential component of the EfeUOB operon which is highly conserved in bacteria. However, its biochemical function is unknown. EfeO contains an N-terminal cupredoxin (CUP)-like domain and C-terminal imelysin-like domain that may bind iron. Algp7 ( ), a member of the EfeO family of proteins from Sphingomonas sp. A1, is found to bind alginate at neutral pH, but does not contain the CUP domain, thus having a role that does not seem to be related to iron uptake. Some members of this group are fused to an N-terminal putative EfeU ion permease domain. The imelysin-like domain of this family also contains the GxHxxE sequence motif and a highly conserved functional site, suggesting a similar role to other imelysin family proteins containing the same motif.
