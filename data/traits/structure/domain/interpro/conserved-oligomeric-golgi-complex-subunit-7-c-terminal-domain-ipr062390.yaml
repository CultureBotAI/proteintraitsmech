identifier: InterPro:IPR062390
label: "Conserved oligomeric Golgi complex subunit 7, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of conserved oligomeric Golgi complex subunit 7 (COG7). COG7 is a component of the peripheral membrane COG complex that is involved in intra-Golgi protein trafficking. The COG complex is located at the cis-Golgi and regulates tethering of retrograde intra-Golgi vesicles. COG7 interacts with other COG complex subunits including COG2, COG3, COG4, COG5, COG6 and COG8. This C-terminal domain is approximately 80 amino acids in length and is found in fungi. The specific function of this domain remains to be determined.
