identifier: InterPro:IPR034185
label: "Site-1 peptidase catalytic domain"
definition: >-
  Site-1 peptidase (also known as SKI-1 or type I membrane-bound subtilisin-kexin-isoenzyme; MEROPS identifier S08.063) is a secretory Ca 2+ -dependent serine endopeptidase and a member of the subtilisin family S8, subfamily S8A. It cleaves at nonbasic residues: Thr, Leu, and Lys. Site-1 peptidase plays a critical role in the regulation of the synthesis and metabolism of cholesterol and fatty acid metabolism. The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, although there is an exopeptidase, tripeptidyl peptidase. Structures have been determined for several members of the subtilisin family: they exploit the same catalytic triad as the chymotrypsins, although the residues occur in a different order (HDS in chymotrypsin and DHS in subtilisin), but the structures show no other similarity. Some subtilisins are mosaic proteins, while others contain N- and C-terminal extensions that show no sequence similarity to any other known protein.
