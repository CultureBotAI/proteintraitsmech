identifier: InterPro:IPR059105
label: Rec21/ENK19
definition: >-
  This entry represents Rec21 proteins. This domain can be found covering the total length of Rec21 or at the N-terminal in ENK19 and related animal proteins. REC is a family of rec proteins from the HERV-K viral polyprotein family. Rec is a functional homologue of Rev and Rex, and binds to an RNA element, the Rec-responsive element (RcRE), in the 3'LTR of HTDV/HERV-K transcripts. Thus Rec mediates nuclear export of RNA by binding to its responsive element, RcRE, present in a transcript. The human small glutamine-rich tetratricopeptide repeat-containing protein (hSGT) that controls mitotic processes and is a checkpoint protein during pro-metaphase is found to be a Rec-interacting partner.interferes with its role as a negative regulator of the androgen receptor, leading to enhanced androgen receptor activity. HERV-K(HML-2) elements benefit from this enhanced activity, as this leads to a vicious cycle that can result in increased cell proliferation, an inhibition of apoptosis, and eventually tumourigenesis. ENK19 is an endogenous retroviral envelope protein. Retroviral envelope proteins typically mediate receptor recognition and membrane fusion during the early stages of infection; however, endogenous copies may retain, lose, or acquire modified functions through evolution. ENK19 has lost its original fusogenic activity, suggesting it no longer contributes to membrane fusion but may have adopted alternative roles or become functionally inert.
