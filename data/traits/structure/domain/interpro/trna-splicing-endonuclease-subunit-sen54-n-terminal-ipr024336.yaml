identifier: InterPro:IPR024336
label: "tRNA-splicing endonuclease, subunit Sen54, N-terminal"
definition: >-
  tRNA-splicing endonucleases ( ) catalyse the endonucleolytic cleavage of pre tRNA at the 5' and 3' splice sites to release the intron and produces two half tRNA molecules bearing 5' hydroxyl and 2', 3'-cyclic phosphate termini. The genes encoding these proteins are homologous in eukaryotes and archea. The eukaryotic tRNA-splicing endonucleases are heterotetrameric while the archaeal endonucleases can be split into homodimeric and homotetrameric subgroups. This entry represents the N-terminal domain of Sen54, a non-catalytic subunit of the tRNA-splicing endonuclease complex. Defects in human Sen54 are a cause of pontocerebellar hypoplasia type 4.
