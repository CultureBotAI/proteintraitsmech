identifier: InterPro:IPR060843
label: "Copper uptake system-associated domain"
definition: >-
  This entry represents an uncharacterised domain in bacterial proteins. This domain can be found as a single domain after a N-terminal signal peptide. This domain can also be found at the C-terminal. Most bacteria that make a peptide-type methanobactin precursor also have a protein from this family, which strongly implies that this domain helps the cells obtain copper.
