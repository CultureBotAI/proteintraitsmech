identifier: InterPro:IPR035507
label: "Unconventional myosin-Ie/If, SH3 domain"
definition: >-
  This entry represents the SH3 domain found in these unconventional myosins. Myosins Ie (MyoIe) and If (MyoIf) are nonmuscle, unconventional, long-tailed, class I myosins containing an N-terminal motor domain and a myosin tail with TH1, TH2, and SH3 domains. MyoIe interacts with the endocytic proteins, dynamin and synaptojanin-1, through its SH3 domain; it may play a role in clathrin-dependent endocytosis. In the kidney, Myole is critical for podocyte function and normal glomerular filtration. Mutations in MyoIe are associated with focal segmental glomerulosclerosis, a disease characterised by massive proteinuria and progression to end-stage kidney disease.
