identifier: InterPro:IPR041511
label: "Putative DNA-binding domain"
definition: >-
  This is a putative DNA-binding protein dimerization domain found bacterial proteins such as CD3330, (a transposon-related DNA-binding protein from Clostridium difficile). Crystal structure analysis suggests that CD3330 N terminus is involved in dimer formation and also in crystal packing but the C terminus is open to solvent.
