identifier: InterPro:IPR013897
label: "Domain of unknown function at the cortex 1"
definition: >-
  This entry includes the Duc1 (Domain of Unknown Function at the Cortex 1) protein, which is involved in maintaining proper plasma membrane lipid composition and cytokinetic ring anchoring in Schizosaccharomyces pombe. Duc1 localises to the plasma membrane, except at the cell division site, and its localization is controlled by interactions with the ER-PM contact site proteins Scs2 and Scs22 through a FFAT-like motif. Duc1 promotes proper localization of the PI-5 kinase Its3, thereby maintaining appropriate levels of PI(4,5)P2 at the plasma membrane. This function is important for proper anchoring of the cytokinetic ring during cell division. Duc1 contains a conserved domain previously known as the DUF1769 domain of unknown function, which is represented in this entry.
