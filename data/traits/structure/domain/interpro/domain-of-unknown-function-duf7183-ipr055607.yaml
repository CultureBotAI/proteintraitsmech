identifier: InterPro:IPR055607
label: "Domain of unknown function DUF7183"
definition: >-
  This entry represents an uncharacterised protein domain found in various mycobacteriophages. The domain averages around 150 amino acids in length. It is found as a single domain in the phage proteins. The function of this domain is currently unknown. One protein in this family contains an N-terminal associated domain .
