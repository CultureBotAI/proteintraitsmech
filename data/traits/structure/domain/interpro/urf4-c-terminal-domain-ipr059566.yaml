identifier: InterPro:IPR059566
label: "URF4, C-terminal domain"
definition: >-
  This entry represents a domain of unknown function found at the C terminus of an uncharacterised protein (URF4) from Paracoccus denitrificans. The full-length protein is encoded within the gene cluster for the energy-transducing NADH-quinone oxidoreductase, suggesting a potential role in respiratory electron transport. The sequene contains a predicted lipoprotein signal sequence, indicating it may be membrane-associated. However, the specific function of this domain remains unknown.
