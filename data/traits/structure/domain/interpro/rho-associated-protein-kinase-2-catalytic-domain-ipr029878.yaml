identifier: InterPro:IPR029878
label: Rho-associated protein kinase 2, catalytic domain
definition: >-
  Rho-associated protein kinases (ROCKs) were originally identified as small GTPase Rho effectors. Later, ROCKs were found actively phosphorylating many actin-binding proteins and intermediate filament proteins to modulate their functions. Two ROCK isoforms have been identified: ROCK1 (ROKb, p160ROCK) and ROCK2. As major downstream effectors of the small GTPase RhoA, they regulate cellular contraction, motility, morphology, polarity, cell division, and gene expression. This entry represents the catalytic domain of ROCK2. ROCK2 has a predominant role in vascular smooth muscle cell contractility.
