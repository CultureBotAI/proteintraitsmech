definition: >-
  Thie entry represents a domain found in a family of membrane proteins related to , suggesting they are membrane transporter proteins. In most members, this entry covers the whole length of the sequences, while in some others it represents a domain associated with other domains. This entry is mainly found in uncharacterised sequences from bacteria, fungi and animals.
