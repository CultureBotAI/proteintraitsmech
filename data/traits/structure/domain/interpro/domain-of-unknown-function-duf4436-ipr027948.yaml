identifier: InterPro:IPR027948
label: "Domain of unknown function DUF4436"
definition: >-
  This entry represents a domain found in a family of membrane and transmembrane proteins from mycobacterial and related species. This domain has similarity to the ligand-binding domains of neurotransmitter ligand-gated ion channels and sensory receptors and it is likely to have similar function.
