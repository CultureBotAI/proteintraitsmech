identifier: InterPro:IPR049439
label: "TRAFD1/XAF1, zinc finger"
definition: >-
  This entry represents a TRAF (C2H2)-type zinc finger found in human TRAD1 (TRAF-type zinc finger domain-containing protein 1), XIAF1 (XIAP-associated factor 1) and similar eukaryotic proteins. TRAFD1 is a negative feedback regulator that controls excessive innate immune responses. XIAF1 seems to function as a negative regulator of members of the IAP (inhibitor of apoptosis protein) family. These proteins share amino acid identity with zinc fingers of TRAF6.
