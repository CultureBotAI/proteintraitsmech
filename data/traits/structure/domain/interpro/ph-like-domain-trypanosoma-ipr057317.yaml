identifier: InterPro:IPR057317
label: "PH-like domain, trypanosoma"
definition: >-
  This domain is found in uncharacterised proteins from Trypanosomatida. It has a weak sequence similarity to known PH-domains and it is predicted to adopt similar structure. It contains a conserved GTFKT sequence motif. This domain is also found in putative Glucosyltransferases, Rab-like GTPase activators and Myotubularins (GRAM) domain-containing proteins , which are a group of uncharacterised proteins that have similar fold as PH-domains.
