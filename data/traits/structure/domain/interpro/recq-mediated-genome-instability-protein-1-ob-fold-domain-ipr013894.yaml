identifier: InterPro:IPR013894
label: "RecQ mediated genome instability protein 1, OB-fold domain"
definition: >-
  This entry represents the the OB-fold domain of RMI1 (RecQ-mediated genome instability protein 1) and similar proteins. This domain forms a stable complex with Bloom syndrome protein BLM and DNA topoisomerase 3-alpha.
