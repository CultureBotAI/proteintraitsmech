identifier: InterPro:IPR057865
label: ORF32/34
definition: >-
  This entry represents the herpesvirus ORF32 phosphoprotein. It includes the phosphoprotein 32 from Varicella-zoster virus (HHV-3) and homologous proteins such as Gene 34 from Equine herpesvirus 1. The ORF32 protein is known to be phosphorylated by the ORF47 protein in Varicella-zoster virus. The function of this protein remains to be fully characterised.
