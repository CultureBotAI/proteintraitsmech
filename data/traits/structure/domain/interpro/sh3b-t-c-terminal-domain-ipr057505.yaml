identifier: InterPro:IPR057505
label: "SH3b, T C-terminal domain"
definition: >-
  This domain is found twice towards the C-terminal end of the staphylococcal phage protein (IPLA5_0029) and in similar peptidoglycan-degrading enzymes mainly from bacteriophages. This domain, found associated with and in some members of this group, is involved in the binding of ligands at the bacterial surface.
