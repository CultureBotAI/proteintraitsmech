identifier: InterPro:IPR059172
label: "Transcription regulatory protein SNF6"
definition: >-
  This entry represents SNF6 a nuclear protein involved in transcriptional activation in Saccharomyces cerevisiae. It is a component of SWI/SNF complex, an ATP-dependent chromatin remodeling complex, which is required for the positive and negative regulation of gene expression of many genes. It changes chromatin structure by altering DNA-histone contacts within a nucleosome, leading eventually to a change in nucleosome position, thus facilitating or repressing binding of gene-specific transcription factors.
