identifier: InterPro:IPR018967
label: "Iron-binding zinc finger, CDGSH type"
definition: >-
  This entry represents iron-sulphur domain containing proteins that have a CDGSH sequence motif (although the Ser residue can also be an Ala or Thr), and is found in proteins from a wide range of organisms with the exception of fungi. The CDGSH-type domain binds a redox-active pH-labile 2Fe-2S cluster. The conserved sequence C-X-C-X2-(S/T)-X3-P-X-C-D-G-(S/A/T)-H is a defining feature of this family. CDGSH-type domains are found in mitoNEET, an iron-containing integral protein of the outer mitochondrian membrane (OMM). MitoNEET forms a dimeric structure with a NEET fold, and contains two domains: a β-cap region and a cluster-binding domain that coordinated two acid-labile 2Fe-2S clusters (one bound to each protomer). The CDGSH iron-sulphur domain is oriented towards the cytoplasm and is tethered to the mitochondrial membrane by a more N-terminal domain found in higher vertebrates, ( ). The whole protein regulates oxidative capacity and may function in electron transfer, for instance in redox reactions with metabolic intermediates, cofactors and/or proteins localized at the OMM.
