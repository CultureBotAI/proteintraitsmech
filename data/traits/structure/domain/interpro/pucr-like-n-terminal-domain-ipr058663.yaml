identifier: InterPro:IPR058663
label: "PucR-like, N-terminal domain"
definition: >-
  This entry describes a domain of unknown function found at the N-terminal of putative PucR-like transcriptional regulators from actinomycetes. It is often found associated with which is located at the C-terminal. This domain is predicted to contain a globin-like domain structure. The globin fold typically consists of eight α-helices though variations in helix number may occur.
