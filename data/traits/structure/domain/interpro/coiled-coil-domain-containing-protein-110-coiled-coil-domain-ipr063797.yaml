identifier: InterPro:IPR063797
label: "Coiled-coil domain-containing protein 110, coiled coil domain"
definition: >-
  This entry represents a coiled coil domain in the coiled-coil domain-containing protein 110 (CCDC110) family. CCDC110 is a nuclear protein that contains an extended coiled-coil domain spanning approximately 350 residues in the C-terminal region. The protein is expressed specifically in testis and is also found in tumours of different origins. CCDC110 has been identified as a cancer/testis antigen (CT52 or KM-HN-1) that can be recognised by both cellular and humoral immune responses. The protein undergoes alternative splicing to produce multiple isoforms. While CCDC110 localises to the nucleus, the specific function of this protein remains to be determined.
