identifier: InterPro:IPR064021
label: "SHORT HYPOCOTYL IN WHITE LIGHT 1, helical domain"
definition: >-
  This entry represents the helical domain of SHORT HYPOCOTYL IN WHITE LIGHT 1 (SHW1). This domain contains two predicted transmembrane helices and is responsible for the nuclear membrane localisation of the protein. The full-length SHW1 protein is a negative regulator of photomorphogenesis that modulates both light and abscisic acid signalling pathways. SHW1 interacts with HY5 and COP1 in the nucleus and promotes COP1-mediated degradation of HY5 during seedling development. While the complete protein has been characterised functionally in light signalling and hypocotyl elongation, the specific function of this helical domain remains to be determined. The domain is found across plant species within the SHW1 protein and is essential for the protein's nuclear membrane localisation.
