label: "Domain of unknown function DUF7137"
definition: >-
  This domain is found in a group of uncharacterised proteins mainly from Fungi. It is predicted to adopt a β-sandwich with Ig-like topology and is likely distantly related to the delta subunit of translocon-associated protein (TRAP-delta, ).
