identifier: InterPro:IPR011663
label: UbiC transcription regulator-associated
definition: >-
  The UbiC transcription regulator-associated (UTRA) domain is a conserved ligand-binding domain that has a similar fold to. It is believed to modulate activity of bacterial transcription factors in response to binding small molecules (sugar phosphates and urocanate,. Proteins containing this domain include the histidine utilisation repressor (expressed from the hutC gene in Pseudomonas putida), which binds to the hutP region in the histidine utilisation (hut) operon and blocks the expression of all the hut genes in the absence of inducer.
