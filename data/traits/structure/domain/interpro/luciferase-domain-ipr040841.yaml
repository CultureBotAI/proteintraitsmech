identifier: InterPro:IPR040841
label: "Luciferase domain"
definition: >-
  This entry describes the luciferase domain found in fungi. This entry also includes uncharacterised bacterial sequences. Fungal luciferase is part of the gene cluster that mediates the fungal bioluminescence cycle. It may use the fungal luciferin 3-hydroxyhispidin as a substrate to produce an endoperoxide as a high-energy intermediate with decomposition that yields oxyluciferin (also known as caffeoylpyruvate) and light emission. The fungal bioluminescence cycle begins with the hispidin synthetase that catalyses the formation of hispidin which is further hydroxylated by the hispidin-3-hydroxylase, yielding the fungal luciferin 3-hydroxyhispidin. The luciferase then produces an endoperoxide as a high-energy intermediate with decomposition that yields oxyluciferin and light emission. Oxyluciferin can be recycled to caffeic acid by caffeoylpyruvate hydrolase.
