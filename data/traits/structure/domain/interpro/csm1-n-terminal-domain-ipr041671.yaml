identifier: InterPro:IPR041671
label: "Csm1 N-terminal domain"
definition: >-
  In the budding yeast Saccharomyces cerevisiae, sister chromatid co-orientation in meiosis I depends on the four-protein monopolin complex (Mam1, Csm1, Lrs4, and Hrr25/casein kinase 1), which localizes to centromeres from meiotic prophase through metaphase I. Csm1 and Lrs4, form a complex that resides in the nucleolus during interphase and relocalizes to centromeres during meiotic prophase, accompanied by phosphorylation of Lrs4. This is the N-terminal domain of Csm1 which forms a coiled-coil.
