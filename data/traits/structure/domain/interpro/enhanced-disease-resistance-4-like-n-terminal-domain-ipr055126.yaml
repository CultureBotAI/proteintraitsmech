identifier: InterPro:IPR055126
label: "Enhanced disease resistance 4-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Protein Enhanced disease resistance 4 from Arabidopsis thaliana (EDR4), which plays a negative role in salicylic acid (SA)-mediated resistance to powdery mildew, and similar plant proteins. This domain is predicted to adopt an all-β structure.
