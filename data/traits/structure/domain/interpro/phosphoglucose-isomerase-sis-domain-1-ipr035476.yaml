identifier: InterPro:IPR035476
label: "Phosphoglucose isomerase, SIS domain 1"
definition: >-
  Phosphoglucose isomerase (PGI) is a multifunctional enzyme which as an intracellular dimer catalyses the reversible isomerization of glucose 6-phosphate to fructose 6-phosphate. As an extracellular protein, PGI also has functions equivalent to neuroleukin (NLK), autocrine motility factor (AMF), and maturation factor (MF). Evidence suggests that PGI, NLK, AMF, and MF are closely related or identical. NLK is a neurotrophic growth factor that promotes regeneration and survival of neurons. The dimeric form of NLK has isomerase function, whereas its monomeric form carries out neurotrophic activity. AMF is a cytokine that stimulates cell migration and metastasis. MF mediates the differentiation of human myeloid leukemic HL-60 cells to terminal monocytic cells. PGI is comprised of two domains; each domain is an α-β-α sandwich, which correspond to a SIS (Sugar ISomerase) domain fold.
