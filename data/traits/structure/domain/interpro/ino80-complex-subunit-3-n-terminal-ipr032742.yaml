identifier: InterPro:IPR032742
label: "INO80 complex subunit 3, N-terminal"
definition: >-
  This entry includes fungal chromatin re-modelling proteins found in one of the chromatin-central complexes, Ino80. The function was identified in Schizosaccharomyces pombe but there is no orthologue in S. cerevisiae. INO80 complex remodels chromatin by shifting nucleosomes and is involved in DNA repair. This entry represents the helical section found at the N-terminal of this group of proteins.
