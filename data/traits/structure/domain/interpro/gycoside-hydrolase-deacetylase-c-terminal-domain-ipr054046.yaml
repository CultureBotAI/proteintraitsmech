identifier: InterPro:IPR054046
label: "Gycoside hydrolase/deacetylase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of a group of predicted glycoside hydrolase/deacetylases from Thermococcales. This enzyme is predicted to have two domains: an N-terminal domain with a typical glycoside hydrolase 57 family (β/α)7-barrel fold ( ) and a C-terminal domain mainly composed of α-helical bundles.
