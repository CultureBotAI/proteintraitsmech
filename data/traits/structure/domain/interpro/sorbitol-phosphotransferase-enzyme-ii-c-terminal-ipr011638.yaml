identifier: InterPro:IPR011638
label: "Sorbitol phosphotransferase enzyme II, C-terminal"
definition: >-
  The Gut family consists only of glucitol-specific permeases, but these occur both in Gram-negative and Gram-positive bacteria. Escherichia coli contains IIA protein, IIC protein and IIBC protein. This entry represents the C-terminal conserved region of the IIBC component.
