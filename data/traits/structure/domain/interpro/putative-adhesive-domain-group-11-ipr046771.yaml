identifier: InterPro:IPR046771
label: "Putative adhesive domain (group 11)"
definition: >-
  This entry represents a domain found N-terminal to repeating stalk domains in Firmicutes surface proteins. The structure model resembles a receptor binding domain in cattle suggesting protein binding function. The structure model also resembles partly a galactose binding Yersinia pestis antigen.
