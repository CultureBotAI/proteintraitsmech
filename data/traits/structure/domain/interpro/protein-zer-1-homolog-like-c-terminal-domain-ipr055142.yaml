identifier: InterPro:IPR055142
label: "Protein zer-1 homolog-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of human Protein zer-1 homolog (ZER1) and similar animal proteins including Protein SERAC1 from Danio rerio. ZER1 serves as substrate adapter subunit in the E3 ubiquitin ligase complex ZYG11B-CUL2-Elongin BC. This protein functions to target substrates bearing N-terminal degrons for proteasomal degradation with the first four residues of substrates being the key recognition elements. SERAC1 plays an important role in the phosphatidylglycerol remodelling that is essential for both mitochondrial function and intracellular cholesterol trafficking. This domain consists of armadillo repeats.
