label: "DUF5581, N-terminal domain"
definition: >-
  This entry represents the N-terminal helical domain found in the human Fibronectin type III domain-containing protein 11 (FNDC11) (also known as C20orf195) (Swissprot: ) and its homologues in chordates. FNDC11 is functionally uncharacterised.
