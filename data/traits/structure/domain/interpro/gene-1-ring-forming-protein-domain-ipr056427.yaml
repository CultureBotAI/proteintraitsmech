identifier: InterPro:IPR056427
label: "Gene 1 ring forming protein domain"
definition: >-
  This entry represents a domain found in an uncharacterised family of bacteriophage proteins annotated as gene 1. These proteins form a pair of α-helices that interact with each other. These proteins are predicted to form large ring structures, with 13-15 subunits having the highest predicted scores. Once the rings are formed they have a strongly negatively charged exterior.
