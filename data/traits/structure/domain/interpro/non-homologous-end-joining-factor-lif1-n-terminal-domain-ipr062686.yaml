identifier: InterPro:IPR062686
label: "Non-homologous end-joining factor LIF1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of LIF1 DNA repair proteins. This domain is found in non-homologous end-joining factors from fungi, particularly in the Saccharomycetaceae family. The domain directly interacts with NEJ1 and is involved in DNA double-strand break repair. LIF1 proteins belong to the XRCC4-XLF family and are components of the DNA ligase IV complex. The function of this domain remains to be determined.
