identifier: InterPro:IPR063772
label: "SHE10/OSW, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the SHE10/OSW family of outer spore wall assembly proteins found in yeasts. The domain is approximately 250-300 amino acids in length and is found in Saccharomycetaceae species. SHE10 proteins are involved in spore wall assembly and may be components of the mitochondrial RNase MRP complex. The proteins contain N-terminal signal peptides for mitochondrial localisation and often have coiled-coil regions and disordered C-terminal regions. The specific function of this C-terminal domain remains to be determined.
