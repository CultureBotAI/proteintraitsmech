identifier: InterPro:IPR057672
label: "IPO4/5-like, TPR repeats domain"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found towards the N-terminal end of human Importin-4/5 (IPO4/5) and similar eukaryotic proteins. IPO4 serves as receptor for nuclear localisation signals in cargo substrates.
