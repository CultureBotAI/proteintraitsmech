identifier: InterPro:IPR059556
label: "HI_1622-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain found in HI_1622 proteins from Haemophilus and related bacteria. HI_1622 is an uncharacterised membrane protein of 161 amino acids (17.5 kDa) that is synthesised as a precursor with an N-terminal signal peptide and a single C-terminal transmembrane helix. The mature protein localises to the membrane. This C-terminal domain includes the transmembrane region. The protein is annotated with COG0310, suggesting it may be part of the ABC-type iron-siderophore transport system. The function of this domain remains to be determined.
