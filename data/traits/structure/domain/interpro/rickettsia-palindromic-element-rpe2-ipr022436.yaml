identifier: InterPro:IPR022436
label: "Rickettsia palindromic element RPE2"
definition: >-
  This entry describes a family, family 2, of Rickettsia palindromic elements (RPE2). The elements spread within a genome as selfish genetic elements, inserting into genes creating additional coding regions that do not disrupt the reading frame. This model finds RPE-encoded regions in several Rickettsial species and, so far, no where else.
