identifier: InterPro:IPR047500
label: "Enolase 4, dimerization/docking domain"
definition: >-
  This entry represents the dimerization/docking (D/D) domain found at the N-terminal of human ENO4 and similar proteins predominantly found in vertebrates. This domain shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. Enolase ( ), also known as phosphopyruvate hydratase, is a metalloenzyme responsible for the catalysing the conversion of 2-phosphoglycerate (2-PG) to phosphoenolpyruvate (PEP), the ninth and penultimate step of glycolysis. ENO4, also called 2-phospho-D-glycerate hydro-lyase, seems to be required for sperm motility and function.
