identifier: InterPro:IPR063311
label: "Phosphoglycerol transferase I, N-terminal"
definition: >-
  This entry represents the N-terminal domain of phosphoglycerol transferase I (MdoB/OpgB) from Gammaproteobacteria. MdoB transfers phosphoglycerol residues from phosphatidylglycerol to membrane-bound nascent glucan backbones during the biosynthesis of osmoregulated periplasmic glucans (OPGs). The protein is located in the inner membrane with four N-terminal transmembrane helices. This domain is followed by a sulfatase-like catalytic domain ( ) and a C-terminal domain ( ). The specific function of this N-terminal domain remains to be determined.
