identifier: InterPro:IPR010563
label: "TraK, N-terminal"
definition: >-
  This entry represents the N-terminal domain observed in several TraK proteins from Escherichia coli and related proteins. TraK is known to be essential for pilus assembly but its exact role in this process is unknown.
