identifier: InterPro:IPR062280
label: "CG7065, middle helical domain"
definition: >-
  This entry represents a helical domain found in the middle region of CG7065-like proteins from arthropods. This domain is located between the N-terminal and C-terminal disordered regions of the protein. The domain is found in large uncharacterised proteins such as CG7065 from Drosophila melanogaster, which contains multiple phosphorylation sites and regions of compositional bias. The surrounding protein regions contain extensive disordered sequences rich in basic residues. Gene Ontology annotations suggest the full-length proteins may be involved in transcriptional regulation. The specific function of this helical domain remains to be determined.
