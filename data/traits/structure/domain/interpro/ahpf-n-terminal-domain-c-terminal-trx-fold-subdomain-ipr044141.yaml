identifier: InterPro:IPR044141
label: "AhpF, N-terminal domain, C-terminal TRX-fold subdomain"
definition: >-
  This entry represents the C-terminal TRX subdomain that contains the catalytic CXXC motif. Alkyl hydroperoxide reductase subunit F (AhpF) is a homodimeric flavoenzyme which catalyzes the NADH-dependent reduction of the peroxiredoxin AhpC, which then reduces hydrogen peroxide and organic hydroperoxides. AhpF contains an NTD containing two contiguous TRX-fold subdomains similar to Pyrococcus furiosus protein disulfide oxidoreductase (PfPDO). It also contains a catalytic core similar to TRX reductase containing FAD and NADH binding domains with an active site disulfide. The NAD(P)H binding domain of AhpF may act to resolve the disulphide which forms after oxidation of the active site cysteine in AphC. This protein contains two paired conserved cysteine motifs, CxxC and CxHCDGP.
