identifier: InterPro:IPR056518
label: "Ints3-like, C-terminal"
definition: >-
  This is the C-terminal domain of human Integrator complex subunit 3 (Ints3) and its homologues. Ints3 is a component of the Integrator (INT) complex, which is involved in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing. This domain forms a dimer, which binds single-stranded RNA/DNA. This domain consists of HEAT repeats.
