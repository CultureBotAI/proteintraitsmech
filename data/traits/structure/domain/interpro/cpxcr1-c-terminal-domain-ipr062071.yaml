identifier: InterPro:IPR062071
label: "Cpxcr1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in CPX chromosomal region candidate gene 1 protein homolog (Cpxcr1) found in metazoas. This domain contains a Zinc finger C2H2-type-like fold. According to Bgee database, this protein is expressed in spermatid.
