label: "Apoptotic protease-activating factor 1, winged-helix domain"
definition: >-
  This domain is found in Apoptotic protease-activating factor 1 (APAF-1), responsible to ignite the downstream cascade of caspases in the mitochondrial pathway of apoptosis. This entry represents the winged-helix domain (WHD).
