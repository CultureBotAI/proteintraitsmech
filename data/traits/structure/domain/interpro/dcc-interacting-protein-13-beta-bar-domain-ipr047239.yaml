identifier: InterPro:IPR047239
label: "DCC-interacting protein 13-beta, BAR domain"
definition: >-
  This entry represents the BAR domain of DCC-interacting protein 13-beta from humans (DIP13B, also known as APPL2) and similar proteins from vertebrates. DIP13B is a multifunctional adapter protein that bind to various membrane receptors, nuclear factors and signalling proteins to regulate many processes, such as cell proliferation, immune response, endosomal trafficking and cell metabolism. DIP13B may affect adult neurogenesis in hippocampus and olfactory system via regulating the sensitivity of glucocorticoid receptor.
