identifier: InterPro:IPR058443
label: "Domain of unknown function DUF8130"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins containing this domain are primarily found in the class Halobacteria, which includes various families such as Haloferacaceae, Halobacteriaceae, and Natrialbaceae. These proteins are typically around 190-200 amino acids in length. The domain shows a high overlap with TED domains, suggesting a conserved structure. Several proteins in this family are predicted to be lipoproteins, indicating a potential association with membranes. This domain adopts an Ig-like fold.
