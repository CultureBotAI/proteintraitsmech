identifier: InterPro:IPR059565
label: "YobF, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YobF, an uncharacterised protein from Bacillus subtilis. The N-terminal domain of YobF shows structural similarity to cysteine proteinases, while the specific biological function of the full-length protein remains unknown. The role of this C-terminal domain within the YobF protein is yet to be determined.
