identifier: InterPro:IPR054378
label: "Type VI lipoprotein IgE-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the intracellular growth locus E (IglE) protein from Francisella tularensis subsp. novicida. The lipoprotein IglE has been identified as a virulence factor that functions as a regulator of the Type IV system-mediated secretion. This domain is predicted to show a mainly β configuration.
