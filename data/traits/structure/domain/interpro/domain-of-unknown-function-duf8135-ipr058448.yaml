identifier: InterPro:IPR058448
label: "Domain of unknown function DUF8135"
definition: >-
  This entry represents the C-terminal zinc-binding domain found in a family of uncharacterised proteins from halophilic archaea. The proteins are predominantly found in the Halobacteria class, including families such as Haloferacaceae, Haloarculaceae, and Natrialbaceae. The proteins in this family are typically around 150 to 230 amino acids in length.
