identifier: InterPro:IPR049469
label: "Exosome complex component RRP40, type I KH domain"
definition: >-
  This entry represents the type I K homology (KH) RNA-binding domain from human Exosome complex component RRP40 and similar proteins from eukaryotes. It is a divergent KH domain that lacks the RNA-binding GXXG motif. RRP40, also called exosome component 3 (EXOSC3), or ribosomal RNA-processing protein 40, is a non-catalytic component of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Mutations of EXOSC3 gene are associated with neurological diseases.
