identifier: InterPro:IPR057910
label: "Nanos, NED domain"
definition: >-
  This entry represents the effector domain (NED) of Nanos from Drosophila melanogaster and related proteins. This domain is necessary to repress mRNA targets. The NED domain recruits the CCR4-NOT complex through multiple and redundant binding sites, including a central region that interacts with the NOT module, which comprises the C-terminal domains of NOT1-3. Nanos proteins use short linear motifs to directly recruit the CCR4-NOT complex. Nanos is a maternal RNA-binding protein essential for the proliferation and self-renewal of germ cells. It functions by forming a translational regulatory complex with Pumilio (Pum) and Brain Tumour (Brat), which modulates mRNA stability and translation. This complex specifically binds to the Nanos Response Element (NRE), a 16-base pair sequence located in the 3'-UTR of hunchback (hb) mRNA, thereby repressing its translation. Nanos also plays a critical role in posterior development and serves as a rescuing factor for abdominal defects observed in posterior group mutants. While other posterior group proteins are not necessary for the functional activity of Nanos, they are involved in its localisation and distribution during embryogenesis.
