identifier: InterPro:IPR056866
label: "WRKY19-like, zinc finger domain"
definition: >-
  This entry represents a small zinc finger domain found in the probable WRKY transcription factor 19 from Arabidopsis thaliana (WRKY19) and similar proteins from plants and lower eukaryotes. Structure prediction suggests that this protein may have an array of these domains that wrap around the major groove of DNA. This group includes proteins that function as transcription factors, specifically interacting with the W box, a common elicitor-responsive cis-acting element. Additionally, these proteins may also act as disease resistance proteins with serine/threonine-protein kinase activity.
