identifier: InterPro:IPR061304
label: "M protein serotype 5/6, C-terminal domain"
definition: >-
  M protein (emm) is an important virulence protein and serology-defining surface antigen of Streptococcus pyogenes (group A Streptococcus). M protein has an amino-terminal YSIRK-type signal sequence (associated with cross-wall targeting in dividing cells), and a C-terminal LPXTG domain for processing by sortase and covalent attachment to the Gram-positive cell wall. Past the signal peptide, M protein has a hypervariable region, but this entry describes only the well-conserved region of M protein serotype 5/6, C-terminal to the hypervariable region. It discriminates M protein from two related proteins, Enn and Mrp.
