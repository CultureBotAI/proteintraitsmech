identifier: InterPro:IPR047511
label: "Forkhead box protein H1, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of FOXH1 and similar proteins from vertebrates. The FH domain is a winged helix DNA-binding domain. This group of proteins includes a winged-helix transcription factor, FOXH1, which is also called Forkhead activin signal transducer 1 (Fast-1), or Forkhead activin signal transducer 2 (Fast-2). FOXH1 acts as a transcriptional activator that recognises and binds to the DNA sequence 5'-TGT[GT]][GT]]ATT-3'. It is required for induction of the goosecoid (GSC) promoter by TGF-beta or activin signalling. FOXH1 forms a transcriptionally active complex containing FOXH1/SMAD2/SMAD4 on a site on the GSC promoter called TARE (TGF-beta/activin response element). FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'.
