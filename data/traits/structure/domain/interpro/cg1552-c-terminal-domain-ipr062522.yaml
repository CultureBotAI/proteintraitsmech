identifier: InterPro:IPR062522
label: "CG1552, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of uncharacterised CG1552 from Drosophila and similar proteins from diptera. The protein is secreted and undergoes alternative splicing to produce two isoforms. The protein is also subject to RNA editing at position 121, where it is partially edited and is a target of Adar. The protein is expressed in various tissues including brain and reticular neuropil-associated glial cells. The specific function of this domain remains to be determined.
