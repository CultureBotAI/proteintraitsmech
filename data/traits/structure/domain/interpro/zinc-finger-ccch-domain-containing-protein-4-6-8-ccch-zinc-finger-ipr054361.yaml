identifier: InterPro:IPR054361
label: "Zinc finger CCCH domain-containing protein 4/6/8, CCCH zinc finger"
definition: >-
  This domain is found in human KIAA1064 (also known as Zinc finger CCCH domain-containing protein 4), Zinc finger CCCH domain-containing protein 6 and 8. ZC3H4 is a RNA-binding protein that suppresses transcription of long non-coding RNAs (lncRNAs). ZC3H8 is a component of the little elongation complex (LEC), a complex required to regulate small nuclear RNA (snRNA) gene transcription by RNA polymerase II and III.
