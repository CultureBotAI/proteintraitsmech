identifier: InterPro:IPR063854
label: "Discoidin-inducing complex subunit B"
definition: >-
  This entry represents a domain found in discoidin-inducing complex subunit B. The protein containing this domain is a component of a complex that acts as a quorum-sensing protein regulating discoidin gene expression during growth and development in Dictyostelium discoideum. The domain is found in extracellular proteins and forms part of a larger protein that contains a transmembrane region and signal peptide. The protein forms a complex with psiF/dicA. The specific function of this domain remains to be determined.
