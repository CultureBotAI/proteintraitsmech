identifier: InterPro:IPR044317
label: Nonstructural protein 14, deltacoronavirus
definition: >-
  This entry includes non-structural protein 14 (NSP14) from deltacoronavirus. Nonstructural protein 14 (NSP14) of coronavirus (CoV) plays an important role in viral replication and transcription. It consists of 2 domains with different enzymatic activities: an N-terminal exoribonuclease (ExoN) domain and a C-terminal cap (guanine-N7) methyltransferase (N7-MTase) domain. ExoN is important for proofreading and therefore, the prevention of lethal mutations. The association of NSP14 with NSP10 stimulates its ExoN activity; the complex hydrolyzes double-stranded RNA in a 3' to 5' direction as well as a single mismatched nucleotide at the 3'-end mimicking an erroneous replication product. The NSP10/NSP14 complex may function in a replicative mismatch repair mechanism. N7-MTase functions in mRNA capping. NSP14 can methylate GTP, dGTP as well as cap analogs GpppG, GpppA and m7GpppG. The accumulation of m7GTP or NSP14 has been found to interfere with protein translation of cellular mRNAs. NSP14 inhibits host translation, an activity that is enhanced when NSP14 forms the complex with NSP10. This abolishes the type I interferon (IFN-I)-dependent induction of interferon-stimulated genes (ISGs), and therefore, is one of the SARS-CoV-2 mechanisms to impair host innate immune responses.
