identifier: InterPro:IPR049078
label: "ESX-1 secretion system protein EccA1-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of ESX-1 secretion system protein EccA1 from Mycobacterium tuberculosis ( ) and similar proteins predominantly from Actinobacteria. EccA1 is part of the ESX-1 specialised secretion system (a cluster of the type VII secretion system, T7SS). EccA1 contains a C-terminal ATPase domain ( and ) and a tetratricopeptide repeat (TPR) containing N-terminal domain, represented in this entry. The six tandem TPR motifs of this domain, packed in parallel, create a series of repeating antiparallel α-helices that give rise to an overall superhelix structure ( ).
