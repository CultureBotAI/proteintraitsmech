identifier: InterPro:IPR022383
label: "Lactate/malate dehydrogenase, C-terminal"
definition: >-
  This entry represents the C-terminal, and is thought to be an is an unusual α+β fold. L-lactate dehydrogenases are metabolic enzymes which catalyse the conversion of L-lactate to pyruvate, the last step in anaerobic glycolysis. L-lactate dehydrogenase is also found as a lens crystallin in bird and crocodile eyes. L-2-hydroxyisocaproate dehydrogenases are also members of the family. Malate dehydrogenases catalyse the interconversion of malate to oxaloacetate. The enzyme participates in the citric acid cycle.
