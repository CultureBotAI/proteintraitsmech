identifier: InterPro:IPR019665
label: "Putative oxidoreductase/dehydrogenase, Rossmann-like domain"
definition: >-
  This entry represents an NAD/NADP-binding domain with a core Rossmann-type fold, found in an uncharacterised protein family thought to be putative NADP oxidoreductase coenzyme F420-dependent proteins and/or NAD-dependent glycerol-3-phosphate dehydrogenase-like proteins. This Rossmann-fold domain consists of 3-layers α/β/α, where the six β strands are parallel in the order 321456.
