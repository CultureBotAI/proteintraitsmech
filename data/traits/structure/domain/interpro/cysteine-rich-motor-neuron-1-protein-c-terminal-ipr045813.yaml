identifier: InterPro:IPR045813
label: "Cysteine-rich motor neuron 1 protein, C-terminal"
definition: >-
  Cysteine-rich motor neuron 1 protein (CRIM1) interacts with growth factors implicated in motor neuron differentiation and survival, playing a role in central nervous system development. It is upregulated in endothelial cells during tube formation. CRIM1 also modulates bone morphogenetic protein activity, which affects its processing and delivery to the cell surface. This is CRIM1 C-terminal domain containing the transmembrane region. Members of this entry are found in chordates.
