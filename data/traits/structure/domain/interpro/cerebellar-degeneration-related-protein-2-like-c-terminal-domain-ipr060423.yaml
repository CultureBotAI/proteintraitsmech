identifier: InterPro:IPR060423
label: "Cerebellar degeneration-related protein 2-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of cerebellar degeneration-related protein 2 (CDR2) and CDR2-like (CDR2L) proteins. CDR2 proteins are found in vertebrates and are associated with paraneoplastic cerebellar degeneration, where they serve as autoantigens. This domain is approximately 85 residues in length and includes phosphorylation sites that may regulate protein function. The domain contains both structured helical elements and a disordered region. CDR2L is expressed in multiple tissues including brain, heart, kidney, lung and spleen. The specific function of this domain remains to be determined.
