identifier: InterPro:IPR030240
label: ATP-binding cassette sub-family C member 4, six-transmembrane helical domain 1
definition: >-
  The ABC transporter family is a group of membrane proteins that use the hydrolysis of ATP to power the translocation of a wide variety of substrates across cellular membranes. ABC transporters minimally consist of two conserved regions: a highly conserved nucleotide-binding domain (NBD) and a less conserved transmembrane domain (TMD). Eukaryotic ABC proteins are usually organised either as full transporters (containing two NBDs and two TMDs), or as half transporters (containing one NBD and one TMD), that have to form homo- or heterodimers in order to constitute a functional protein. This group of proteins includes ATP-binding cassette sub-family C member 4 (ABCC4, also known as Multidrug resistance-associated protein 4, MRP4) from animals. It belongs to the MRP (multidrug resistance protein) subfamily of the ATP-binding cassette (ABC) transporter family. MRP4 is a broad specificity organic anion exporter that seems to be able to mediate the transport of conjugated steroids, prostaglandins, and glutathione. It can localise to both basolateral and apical membranes in polarised cells, depending on the tissue where it is found. Together with CFTR, MRP4 functions in the regulation of cAMP and beta-adrenergic contraction in cardiac myocytes. This entry represents the six-transmembrane helical domain 1 (TMD1) of ABCC4.
