identifier: InterPro:IPR058361
label: "Domain of unknown function DUF8048"
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. These proteins are often found in genomic contexts with a ThiS family protein suggesting they may functionally interact. These proteins contain a highly conserved histidine towards the C terminus that may be functionally important.
