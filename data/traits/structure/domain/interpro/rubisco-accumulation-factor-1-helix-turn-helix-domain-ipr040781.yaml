identifier: InterPro:IPR040781
label: "Rubisco accumulation factor 1, helix turn helix domain"
definition: >-
  This is helix turn helix domain found in α helical region of Rubisco accumulation factor1 (Raf1). Raf1 from Arabidopsis thaliana consists of an N-terminal alpha-domain, a flexible linker segment and a C-terminal β-sheet domain that mediates dimerization. The α-domains mediate the majority of functionally important contacts with RbcL (Rubisco large subunits) by bracketing each RbcL dimer at the top and bottom. The alpha-domain alone is essentially inactive.
