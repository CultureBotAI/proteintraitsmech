identifier: InterPro:IPR054532
label: "TPL/SMU1, LisH-like dimerisation domain"
definition: >-
  This entry represents a highly conserved domain containing a lissencephaly homologous (LisH) dimerisation motif found at the N-terminal end of a group of eukaryotic proteins, including Protein TOPLESS from Arabidopsis thaliana (TPL,) and human WD40 repeat-containing protein SMU1. TPL is a transcriptional corepressor required for ovule development. It may repress the expression of root-promoting genes in the top half of the embryo to allow proper differentiation of the shoot pole during the transition stage of embryogenesis. SMU1 is involved in pre-mRNA splicing as a component of the spliceosome. Most members of this group also contain towards the C-terminal.
