identifier: InterPro:IPR018392
label: "LysM domain"
definition: >-
  The LysM (lysin motif) domain is a small globular domain, approximately 40 amino acids long. It is a widespread protein module involved in binding peptidoglycan in bacteria and chitin in eukaryotes. The domain was originally identified in enzymes that degrade bacterial cell walls, but proteins involved in many other biological functions also contain this domain. It has been reported that the LysM domain functions as a signal for specific plant-bacteria recognition in bacterial pathogenesis. Many of these enzymes are modular and are composed of catalytic units linked to one or several repeats of LysM domains. LysM domains are found in bacteria and eukaryotes. The LysM domain adopts a β-α-α-β fold, according to structure predictions and the crystal structure
