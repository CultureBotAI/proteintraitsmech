identifier: InterPro:IPR011722
label: Hemimethylated DNA-binding domain
definition: >-
  Heat shock protein HspQ, also known as YccV, is an Escherichia coli hemimethylated DNA binding protein which has been shown to regulate dnaA gene expression. This entry represents a YccV-like hemimethylated DNA binding domain that can also be found in longer eukaryotic proteins, such as F-box only protein 21 from mammals and ClpF from Arabidopsis.
