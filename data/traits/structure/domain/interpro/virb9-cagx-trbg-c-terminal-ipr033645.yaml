identifier: InterPro:IPR033645
label: "VirB9/CagX/TrbG, C-terminal"
definition: >-
  VirB9 is a component of the type IV secretion system, which is employed by pathogenic bacteria to export virulence proteins directly from the bacterial cytoplasm into the host cell. Unlike the more common type III secretion system, type IV systems evolved from the conjugative apparatus, which is used to transfer DNA between cells. VirB9 was initially identified as an essential virulence gene on the Agrobacterium tumefaciens Ti plasmid. In the pilin-like conjugative structure, VirB9 appears to form a stabilising complex in the outer membrane by interacting with the lipoprotein VirB7. The heterodimer has been shown to stabilise other components of the type IV system. This entry represents the C-terminal domain of VirB9. It is also found in TrbG, a probable conjugal transfer protein from Rhizobium and CagX, a component of the Helicobacter pylori cag PAI-encoded type IV secretion system.
