identifier: InterPro:IPR057823
label: "RCD1, WWE domain"
definition: >-
  This entry represents a WWE domain found in a family of plant proteins, which includes probable inactive ADP-ribosyltransferases that are involved in the regulation of oxidative stress, hormonal and developmental responses in Arabidopsis thaliana. Members of the family, such as SRO1 and RCD1, may regulate stress-responsive genes and play distinct roles in plant development. While they are characterised as inactive due to their inability to bind NAD in vitro, they still contribute to critical processes such as embryogenesis, vegetative and reproductive development, and abiotic stress responses. The family highlights a functional partnership between its members in managing plant responses to environmental challenges.
