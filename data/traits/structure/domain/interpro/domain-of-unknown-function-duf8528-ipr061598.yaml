identifier: InterPro:IPR061598
label: "Domain of unknown function DUF8528"
definition: >-
  This entry represents a small N-terminal domain of approximately 40-60 amino acids found exclusively in halophilic archaea. The family is restricted to the order Halobacteriales, particularly the families Natrialbaceae, Haloferacaceae and Haloarculaceae. This domain is consistently found N-terminal to a winged helix-turn-helix domain. The function of this domain remains to be determined.
