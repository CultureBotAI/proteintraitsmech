identifier: InterPro:IPR064044
label: "CBP/p300/RT109, histone acetyltransferase domain"
definition: >-
  This domain is found in human Histone acetyltransferase p300 (EP300), mouse Histone lysine acetyltransferase CREBBP (CPB), yeast Histone acetyltransferase RTT109 and similar eukaryotic proteins. Histone acetylation is required in many cellular processes including transcription, DNA repair, and chromatin assembly. EP300 functions as a histone acetyltransferase and regulates transcription via chromatin remodelling. Histone lysine acetyltransferase CREBBP acetylates histones, giving a specific tag for transcriptional activation. It mediates acetylation of histone H3 at 'Lys-18' and 'Lys-27' (H3K18ac and H3K27ac, respectively). CREBBP also acetylates non-histone proteins, like DDX21, FBL, IRF2, MAFG, NCOA3, POLR1E/PAF53 and FOXO1. The fungal RTT109 protein is required for H3K56 acetylation. Loss of RTT109 results in the loss of H3K56 acetylation, both on bulk histone and on chromatin. RTT109 and H3K56 acetylation appear to correlate with actively transcribed genes and associate with the elongating form of Pol II in yeast. The p300/CBP histone acetyltransferase domain has different catalytic properties and cofactor regulation to RTT109.
