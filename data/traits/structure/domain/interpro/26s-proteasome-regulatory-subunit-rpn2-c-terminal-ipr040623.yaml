identifier: InterPro:IPR040623
label: "26S proteasome regulatory subunit RPN2, C-terminal"
definition: >-
  This is the C-terminal domain found in S. cerevisiae Rpn2 (26S proteasome regulatory subunit RPN2) as well as other eukaryotic species. A study revealed that the C-terminal 52 residues of the Rpn2 C-terminal domain are responsible for mediating interactions with the ubiquitin-binding subunit Rpn13. Furthermore, the extreme C-terminal 20 or 21 residues of Rpn2 (926-945 or 925-945) of S. cerevisiae, were shown to be equally effective at binding Rpn13. Multiple sequence alignments indicate that Rpn2 orthologues are highly conserved in this C-terminal region and share characteristic acidic, aromatic, and proline residues, suggesting a common function. In the structure of Rpn2 from S. cerevisiae , this region is exposed and disordered, and is thus accessible for associating with Rpn13. The Rpn2 binding surface of human Rpn13 has been mapped by nuclear magnetic resonance titration to one surface of its Pru domain.
