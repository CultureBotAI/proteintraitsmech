label: "EDRF1, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Erythroid differentiation-related factor 1 (EDRF1). EDRF1 is a transcription factor involved in erythroid differentiation and in transcriptional activation of the globin gene.
