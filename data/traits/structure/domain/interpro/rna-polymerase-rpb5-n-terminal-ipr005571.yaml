identifier: InterPro:IPR005571
label: "RNA polymerase, Rpb5, N-terminal"
definition: >-
  Prokaryotes contain a single DNA-dependent RNA polymerase (RNAP; ) that is responsible for the transcription of all genes, while eukaryotes have three classes of RNAPs (I-III) that transcribe different sets of genes. Each class of RNA polymerase is an assemblage of ten to twelve different polypeptides. Certain subunits of RNAPs, including RPB5 (POLR2E in mammals), are common to all three eukaryotic polymerases. RPB5 plays a role in the transcription activation process. Eukaryotic RPB5 has a bipartite structure consisting of a unique N-terminal region, plus a C-terminal region that is structurally homologous to the prokaryotic RPB5 homologue, subunit H (gene rpoH) ( ). This entry represents the N-terminal domain of eukaryotic RPB5, which has a core structure consisting of 3 layers α/β/α. The N-terminal domain is involved in DNA binding and is part of the jaw module in the RNA pol II structure. This module is important for positioning the downstream DNA.
