identifier: InterPro:IPR041166
label: "LapB, rubredoxin metal binding domain"
definition: >-
  LapB (lipopolysaccharide assembly protein B) contains three major structural motifs: the N-terminal transmembrane helix, several tetratricopeptide repeats (TPR), and a C-terminal rubredoxin metal binding domain. This entry represents the rubredoxin-like metal binding domain. Rubredoxin proteins form small non-heme iron binding sites that use four cysteine residues to coordinate a single metal ion in a tetrahedral environment. Rubredoxins are most commonly found in bacterial systems, but have also been found in eukaryotes. The key features of these rubredoxin-like domains are the extended loops or 'knuckles' and the tetracysteine mode of iron binding. Structural analysis of LapB from Escherichia coli show that the rubredoxin metal binding domain is intimately bound to the TPR motifs and that this association to the TPR motifs is essential to LPS regulation and growth in vivo.
