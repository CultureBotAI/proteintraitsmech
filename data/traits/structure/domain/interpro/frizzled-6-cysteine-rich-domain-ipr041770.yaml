identifier: InterPro:IPR041770
label: "Frizzled 6, cysteine-rich domain"
definition: >-
  The cysteine-rich domain (CRD) is an essential extracellular portion of the frizzled 6 (Fz6) receptor, and is required for binding Wnt proteins, which play fundamental roles in many aspects of early development, such as cell and tissue polarity, neural synapse formation, and the regulation of proliferation. Fz proteins serve as Wnt receptors for multiple signal transduction pathways, including both beta-catenin dependent and -independent cellular signaling, as well as the planar cell polarity pathway and Ca(2+) modulating signaling pathway. CRD containing Fzs have been found in diverse species from amoebas to mammals. 10 different frizzled proteins are found in vertebrata. Frizzled 6 (Fz6) is involved in the neural tube closure and plays a role in the regulation of the establishment of planar cell polarity (PCP), particularly in the orientation of asymmetric bundles of stereocilia on the apical faces of a subset of auditory and vestibular sensory cells located in the inner ear.
