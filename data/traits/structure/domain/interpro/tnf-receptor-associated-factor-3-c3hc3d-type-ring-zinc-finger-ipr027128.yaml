identifier: InterPro:IPR027128
label: "TNF receptor-associated factor 3, C3HC3D-type RING zinc finger"
definition: >-
  Tumor necrosis factor (TNF) receptor associated factor 3 (TRAF3) is a highly versatile regulator that positively controls type I interferon production, but negatively regulates mitogen-activated protein (MAP) kinase activation and non-canonical nuclear factor-kB signalling. It is a critical regulator of both innate and adaptive immune responses. TRAF3 plays a role in the regulation of B-cell survival, in the regulation of antiviral responses, and in T-cell dependent immune responses. It is required for normal antibody isotype switching from IgM to IgG. Differences in the ubiquitination of TRAF3 are the key to the selective production of type I interferons versus proinflammatory cytokines. This entry represents the modified C3HC3D-type (HC subclass) RING zinc finger of TRAF3.
