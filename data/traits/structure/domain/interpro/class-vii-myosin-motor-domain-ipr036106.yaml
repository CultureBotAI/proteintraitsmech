identifier: InterPro:IPR036106
label: "Class VII myosin, motor domain"
definition: >-
  Class VII are monomeric myosins associated with functions in sensory systems such as vision and hearing. In Dictyostelium it has been shown that myosin VII is involved in phagocytosis and cell adhesion. Vertebrates have two class VII myosins (VIIa and VIIb) that are thought to play important roles in linking the actin cytoskeleton to adhesion receptors on the cell surface. Myosin VII isoforms have a conserved motor domain, 5 IQ motifs, and a tail with 2 MyTH4-FERM domains separated by an SH3 domain. The catalytic (head) domain has ATPase activity and belongs to the larger group of P-loop NTPases.
