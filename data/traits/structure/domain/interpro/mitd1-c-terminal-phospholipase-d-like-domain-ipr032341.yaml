identifier: InterPro:IPR032341
label: "MITD1, C-terminal phospholipase D-like domain"
definition: >-
  This entry represents the C-terminal domain of the MIT domain-containing proteins. It contains an unanticipated phospholipase d fold (PLD fold) that binds avidly to phosphoinositide-containing membranes.
