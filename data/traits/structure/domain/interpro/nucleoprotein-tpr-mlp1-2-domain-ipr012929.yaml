identifier: InterPro:IPR012929
label: "Nucleoprotein, TPR/MLP1-2 domain"
definition: >-
  This domain is found in several proteins, including TPR protein and yeast myosin-like protein 1 (MLP1) and MPL2. TPR and MLP1/2 share several features; for example, they have coiled-coil regions and are associated with nuclear pores. TPR is thought to be a component of nuclear pore complex-attached intranuclear filaments, and is implicated in nuclear protein import. Moreover, its N-terminal region is involved in the activation of oncogenic kinases, possibly by mediating the dimerisation of kinase domains or by targeting these kinases to the nuclear pore complex. MLP1 acts as a docking platform for heterogeneous nuclear ribonucleoproteins that are required for mRNA export.
