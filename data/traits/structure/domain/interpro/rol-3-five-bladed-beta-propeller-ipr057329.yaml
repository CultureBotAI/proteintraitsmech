identifier: InterPro:IPR057329
label: "Rol-3, five-bladed beta-propeller"
definition: >-
  This domain is found in the Protein roller-3 (Rol-3) from Caenorhabditis elegans and related proteins. Rol-3 plays a crucial role in the development and locomotion in nematodes. Rol-3 has an essential function during early to mid-larval development. The domain represented by this entry is predicted to fold into a five bladed β-propeller.
