identifier: InterPro:IPR062115
label: "AtMg01310-like mitochondrial protein"
definition: >-
  This entry represents a family of small uncharacterised proteins found in plant mitochondria. The prototype member is AtMg01310 from Arabidopsis thaliana, a 136 amino acid protein encoded by the mitochondrial genome. This gene is also present as a duplicated copy in the nuclear chromosome 2 centromere due to a 270 kb mitochondrial genome duplication event. The family is found primarily in Streptophyta. Members are typically small proteins of approximately 130-150 amino acids. The function of this protein family remains to be determined.
