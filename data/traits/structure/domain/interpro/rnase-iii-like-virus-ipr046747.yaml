identifier: InterPro:IPR046747
label: "RNAse III-like, virus"
definition: >-
  This domain is found in viruses infecting fungi (mycoviruses), either as a standalone domain in short proteins (e.g. in deltaflexiviruses), or in polyproteins (e.g. endornaviruses or hypoviruses). It is homologous to RNAse III domains ( , ) as seen using sequence-based searches. Its function is unknown.
