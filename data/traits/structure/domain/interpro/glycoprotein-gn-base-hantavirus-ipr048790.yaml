identifier: InterPro:IPR048790
label: "Glycoprotein Gn, base, hantavirus"
definition: >-
  The medium (M) genome segment of Hantaviruses (family Bunyaviridae) encodes the two virion glycoproteins, Gn and Gc (also known as G1 and G2, respectively) as a polyprotein precursor. Gn and Gc forms homotetramers (spikes) at the surface of the virion which attach the virion to host cell receptors including integrin beta3/ITGB3 and induce internalisation predominantly through clathrin-dependent endocytosis. This entry represents the C-terminal region of the Gn ectodomain denoted as Gn base (Gn-B) which contributes the most to the intra-spike tetrameric contacts.
