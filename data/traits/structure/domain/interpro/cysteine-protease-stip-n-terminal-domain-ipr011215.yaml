identifier: InterPro:IPR011215
label: "Cysteine protease StiP, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Cysteine protease StiP from Acinetobacter baylyi, which may play a role in regulating cell morphology in response to stressful conditions which likely cause oxidative damage. StiP has been shown to posses cysteine protease activity. This domain is also found centrally located in several uncharacterised proteins including from Streptomyces mobaraensis. Most members of this family have a C-terminal RNA binding PELOTA domain ( ). These genes are found in the biosynthetic operon associated with the Ter stress response.
