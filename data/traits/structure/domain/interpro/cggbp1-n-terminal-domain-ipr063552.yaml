identifier: InterPro:IPR063552
label: "CGGBP1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in CGG triplet repeat-binding protein 1 (CGGBP1) in metazoa and fungi. CGGBP1 binds to nonmethylated 5'-d(CGG)(n)-3' trinucleotide repeats in the FMR1 gene promoter and may play a role in regulating FMR1 expression. Binding is severely inhibited by cytosine-specific DNA methylation of the binding motif. CGGBP1 localises to the nucleus and is ubiquitously expressed, with high levels in the placenta, thymus, lymph nodes and brain.
