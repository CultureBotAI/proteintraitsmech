identifier: InterPro:IPR057603
label: "Periphilin-1, C-terminal domain"
definition: >-
  This domain is found in human Periphilin-1 and related proteins. It folds into an α-helical hairpin and directs HUSH complex assembly by dimerising and binding a TASOR, another component of the HUSH complex. Periphilin-1 is a component of the HUSH complex, a multiprotein complex that mediates epigenetic repression. The HUSH complex is recruited to genomic loci rich in H3K9me3 and is probably required to maintain transcriptional silencing. This protein acts as a transcriptional corepressor and regulates the cell cycle, probably via the HUSH complex. It is involved in epithelial differentiation and contributes to epidermal integrity and barrier formation. It is associated with gastric cancer.
