identifier: InterPro:IPR034228
label: "Nop6, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of Nop6, a component of 90S pre-ribosomal particles in S. cerevisiae. It is enriched in the nucleolus and is required for 40S ribosomal subunit biogenesis. Nop6 is a non-essential putative RNA-binding protein with two N-terminal putative nuclear localisation sequences (NLS-1 and NLS-2) and an RNA recognition motif (RRM). It binds to the pre-rRNA early during transcription and plays an essential role in pre-rRNA processing.
