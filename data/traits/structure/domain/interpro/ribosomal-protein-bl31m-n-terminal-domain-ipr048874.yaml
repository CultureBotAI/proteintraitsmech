identifier: InterPro:IPR048874
label: "Ribosomal protein bL31m, N-terminal domain"
definition: >-
  Ribosomal protein bL31m (also known as 54S ribosomal protein L36), is a component of the mitochondrial ribosome. Overexpression of bL31m suppresses mutations in the COX2 leader peptide-encoding and initiation codon regions. This entry represents the N-terminal domain of yeast bL31m.
