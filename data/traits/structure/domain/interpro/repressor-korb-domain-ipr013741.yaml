identifier: InterPro:IPR013741
label: "Repressor KorB domain"
definition: >-
  The korB gene is a major regulatory element in the replication and maintenance of broad host-range plasmid RK2. It negatively controls the replication gene trfA, the host-lethal determinants kilA and kilB, and the korA-korB operon. This domain found in KorB includes the DNA-binding HTH motif.
