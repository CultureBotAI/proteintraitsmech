identifier: InterPro:IPR054461
label: "TraI-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Protein TraI from Escherichia coli and similar sequences mainly found in proteobacteria. TraI is a plasmid-specific component required for the initiation process of transfer DNA synthesis, as part of a specialised nucleoprotein complex - the relaxosome, together with TraH, I, and J. Site- and strand-specific cleavage at the transfer origin is dependent of TraI and TraJ. This domain is predicted to adopt an OB fold-like structure.
