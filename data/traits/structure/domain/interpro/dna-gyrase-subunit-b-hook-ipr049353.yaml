  This entry represents the N-terminal section of the 'Toprim hook' as described in, which is localised between the Toprim ( ) and the insert ( ) domains. The C-terminal section of the hook is included in ( ). The hook is flexible towards the Toprim domain. Proteins in this group are found mainly in proteobacteria.
