identifier: InterPro:IPR040567
label: "RctB, helix turn helix domain"
definition: >-
  RctB is a highly conserved 75.3kDa protein (658 residues), which is unique to the Vibrionaceae. The first 500 amino acids of RctB are sufficient to mediate oriCII-based replication and its C-terminal 165 residues may mediate regulatory processes. RctB contains at least three DNA binding winged-helix-turn-helix motifs, and mutations within any of these severely compromise biological activity. This entry describes domain 1 located at the N-terminal region of RctB proteins. Mutational analysis shows that it binds oriCII DNA, and that this function is critical for the capacity of RctB to mediate oriCII-based replication.
