identifier: InterPro:IPR013615
label: "CbbQ/NirQ/NorQ, C-terminal"
definition: >-
  This domain is found at the C terminus of proteins of the CbbQ/NirQ/NorQ family of proteins which play a role in the post-translational activation of Rubisco. It is also found in the Thauera aromaticaTutH protein which is similar to the CbbQ/NirQ/NorQ family, as well as in putative chaperones. The ATPase domain associated with various cellular activities (AAA) is found in the same bacterial and archaeal proteins as the domain described here.
