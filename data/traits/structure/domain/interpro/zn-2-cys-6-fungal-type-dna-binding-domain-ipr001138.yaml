identifier: InterPro:IPR001138
label: "Zn(2)Cys(6) fungal-type DNA-binding domain"
definition: >-
  The N-terminal region of a number of fungal transcriptional regulatory proteins contains a Cys-rich motif that is involved in zinc-dependent binding of DNA. The region forms a binuclear Zn cluster, in which two Zn atoms are bound by six Cys residues. A wide range of proteins are known to contain this domain. These include the proteins involved in arginine, proline, pyrimidine, quinate, maltose and galactose metabolism, amide and GABA catabolism, leucine biosynthesis, amongst others. The structure of Zn2Cys6 DNA-binding domain from different proteins has been determined in free and DNA bound state ( ) revealing details of the molecular basis of DNA recognition.
