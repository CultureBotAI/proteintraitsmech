identifier: InterPro:IPR041639
label: "Large polyvalent protein-associated domain 39"
definition: >-
  Polyvalent proteins are predicted to be transmitted by genomic parasites such as conjugative elements, plasmids, and phages during the initial phase of infection along with their DNA. They are typified by the presence of multiple domains with disparate activities. This is a predicted enzymatic α-helical domain that is associated with polyvalent proteins of phages and prophages.
