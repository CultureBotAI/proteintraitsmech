identifier: InterPro:IPR049746
label: "TcpD-like, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal of the TcpD protein from Clostridium perfringens and related proteins, primarily from Firmicutes. TcpD localises to the cell envelope fraction independently of the presence of other pCW3-encoded proteins and was shown that TcpD and TcpE were essential for the conjugative transfer of pCW3. The function of this domain is unknown.
