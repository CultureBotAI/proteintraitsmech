identifier: InterPro:IPR022754
label: "DNA polymerase III, gamma subunit, domain III"
definition: >-
  This domain is found in bacteria and eukaryotes, and is approximately 110 amino acids in length. It is found in association with . This domain is also present in the tau subunit before it undergoes cleavage. Domains I-III are shared between the tau and the gamma subunits, while most of the DnaB-binding Domain IV and all of the alpha-interacting Domain V are unique to tau.
