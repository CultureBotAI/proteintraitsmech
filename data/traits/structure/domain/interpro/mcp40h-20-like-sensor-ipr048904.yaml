identifier: InterPro:IPR048904
label: "Mcp40H-20-like, sensor"
definition: >-
  This domain is found in Methyl-accepting chemotaxis sensory transducer, class 40H from Geobacter sulfurreducens (Mcp40H-20, ) and similar bacterial proteins. This entry represents the periplasmic c-type heme-containing sensor domain, which is located between two transmembrane helices near the N terminus of the protein. This domain adopts a PAS-type domain fold with two helical segments followed by a four-stranded β-sheet.
