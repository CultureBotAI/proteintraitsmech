identifier: InterPro:IPR046830
label: "Calmodulin binding protein, central domain"
definition: >-
  This entry represents the central domain. Members of this family include putative or actual calmodulin binding proteins and other transcription factors expressed by various plant species. Some members (for example, ), are known to be involved in the induction of plant defence responses. However, their precise function in this regards is as yet unknown.
