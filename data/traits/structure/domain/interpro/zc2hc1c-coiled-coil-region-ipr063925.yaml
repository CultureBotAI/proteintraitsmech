identifier: InterPro:IPR063925
label: "ZC2HC1C, coiled-coil region"
definition: >-
  This entry represents a small coiled-coil region found in ZC2HC1C (zinc finger C2HC domain-containing protein 1C) proteins from vertebrates. The domain is located N-terminal to one or two C2HC/C3H-type zinc finger domains ( ). ZC2HC1C proteins belong to the ZC2HC1 family and bind zinc ions.
