label: "MARTX multifunctional-autoprocessing repeats-in-toxin, N-terminal"
definition: >-
  This entry describes the N-terminal 1900 amino acids of MARTX family multifunctional-autoprocessing repeats-in-toxin holotoxins, which contain both repeat regions that facilitate their entry into eukaryotic target cells, and multiple effector domains.
