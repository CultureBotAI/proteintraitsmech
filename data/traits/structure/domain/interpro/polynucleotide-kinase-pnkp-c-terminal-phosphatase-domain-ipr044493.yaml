identifier: InterPro:IPR044493
label: "Polynucleotide kinase PNKP, C-terminal phosphatase domain"
definition: >-
  This entry represents the C-terminal domain of the bifunctional enzyme T4 polynucleotide kinase/phosphatase, PNKP (also known as PseT). The PNKP phosphatase domain can catalyse the hydrolytic removal of the 3'-phosphoryl of DNA, RNA and deoxynucleoside 3'-monophosphates. Members of this group are found in tailed bacteriophages.
