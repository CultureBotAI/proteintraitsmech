identifier: InterPro:IPR048757
label: "Pyrrolysine biosynthesis protein PylD, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of Pyrrolysine biosynthesis protein PylD from Methanosarcina acetivorans, also known as 3-methylornithyl-N6-L-lysine dehydrogenase, a dehydrogenase that catalyses the final step in the biosynthesis of the amino acid pyrrolysine.
