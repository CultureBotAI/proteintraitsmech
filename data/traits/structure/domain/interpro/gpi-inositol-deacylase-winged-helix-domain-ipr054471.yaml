identifier: InterPro:IPR054471
label: "GPI inositol-deacylase, winged helix domain"
definition: >-
  This winged helix domain (WHD) is found in a number of putative GPI inositol-deacylases from fungi, including Vegetative incompatibility protein HET-E-1. This protein is responsible for vegetative incompatibility through specific interactions with different alleles of the unlinked gene, het-c. It is also found in Azaphilone pigments biosynthesis cluster protein L which do not play a direct role in the biosynthesis of azaphilone pigments but rather have a regulatory function. This domain has detectable sequence similarity to WHDs found in various ATPases. The function of this domain is unknown.
