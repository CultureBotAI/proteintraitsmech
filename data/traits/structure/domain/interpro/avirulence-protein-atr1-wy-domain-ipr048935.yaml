identifier: InterPro:IPR048935
label: "Avirulence protein ATR1, WY-domain"
definition: >-
  Avirulence protein ATR1 is a secreted effector that acts as an elicitor of hypersensitive response (HR) specifically on plants. It activates the N-terminal Toll-interleukin-1 receptor (TIR) domain of Arabidopsis NLR RPP1. This entry represents the C-terminal helical domain, referred to as the WY-domain.
