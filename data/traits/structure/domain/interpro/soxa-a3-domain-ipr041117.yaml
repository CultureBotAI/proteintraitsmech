identifier: InterPro:IPR041117
label: "SoxA, A3 domain"
definition: >-
  This entry represents the sarcosine oxidase's alpha, A3 domain. This domain binds to FMN in sarcosine oxidase. This domain is related to the BFD-like [2Fe-2S]-binding domain ( ) but lacks its iron binding cysteine residues.
