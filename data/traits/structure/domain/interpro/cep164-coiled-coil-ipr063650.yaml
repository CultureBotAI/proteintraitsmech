identifier: InterPro:IPR063650
label: "CEP164, coiled-coil"
definition: >-
  This entry represents the coiled-coil domain found in the central region of centrosomal protein of 164 kDa (CEP164). CEP164 is a centriole appendage protein found in metazoans that localises to the distal appendages of the mother centriole. The full-length protein plays a role in microtubule organisation for primary cilium formation and is also involved in the DNA damage response, acting as a mediator in the ATR/ATM signalling cascade.
