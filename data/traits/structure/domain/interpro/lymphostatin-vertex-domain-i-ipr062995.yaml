identifier: InterPro:IPR062995
label: "Lymphostatin, vertex domain I"
definition: >-
  This entry represents the first vertex domain of Lymphostatin. Lymphostatin is a key virulence factor of enteropathogenic and enterohaemorrhagic Escherichia coli, playing roles in bacterial colonisation of the gut and in the inhibition of lymphocyte proliferation and proinflammatory responses. Lymphostatin is composed of six distinct domains which enable complex interactions with host cells. These domains include two glycosyltransferase domains, one PaToxP-like protease domain, an ADP-ribosyltransferase domain, a vertex domain and a delivery domain.
