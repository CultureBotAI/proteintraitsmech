identifier: InterPro:IPR062538
label: "F07F6.1-like, middle domain"
definition: >-
  This entry represents the middle domain of F07F6.1 and similar uncharacterised proteins from nematodes, particularly in Caenorhabditis and related species. The full-length proteins are predicted to have RNA-binding activity, but the specific function of this domain remains to be determined.
