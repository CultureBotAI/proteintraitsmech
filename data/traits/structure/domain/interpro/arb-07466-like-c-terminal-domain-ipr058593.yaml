label: "ARB_07466-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Uncharacterized secreted protein ARB_07466 and the LysM domain-containing protein Spr1875 from Streptococcus pneumoniae (VldE, ), which has endopeptidase activity. This domain shows an α-β configuration.
