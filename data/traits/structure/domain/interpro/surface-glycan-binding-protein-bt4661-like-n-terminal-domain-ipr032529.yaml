identifier: InterPro:IPR032529
label: "Surface glycan binding protein BT4661-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of proteins mainly found in Bacteroides, including the putative surface glycan binding protein (SGBP) BT4661 from Bacteroides thetaiotaomicron ( ). This protein seems to play a role in the bacterial degrading apparatus of the host glycosaminoglycans heparin (Hep) and heparan sulfate (HS). It shows six discrete domains that adopt an Ig-like fold arranged in an extended, curved conformation.
