identifier: InterPro:IPR058252
label: "Probable treble clef zinc finger, fungi"
definition: >-
  This domain is found in uncharacterised fungal proteins. It contains three highly conserved cysteine and histidine residues that may be involved in metal coordination. It is probably a variant of treble clef zinc fingers. This domain is frequently found paired with .
