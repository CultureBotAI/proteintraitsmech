identifier: InterPro:IPR035032
label: "Growth factor receptor-bound protein 7, SH2 domain"
definition: >-
  Grb7 (growth factor receptor bound protein 7) is an adapter protein mediating signal transduction from multiple cell surface receptors to diverse downstream pathways. It contains a Ras-associating (RA) domain, a pleckstrin-homology (PH) domain, a family-specific BPS (between PH and SH2) region and a C-terminal SH2 domain. This entry represents the C-terminal SH2 domain of Grb7. It is responsible for the binding of this protein to the epidermal growth factor receptor (EGFR, erbB1) via the SH2 domain.
