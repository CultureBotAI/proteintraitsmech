identifier: InterPro:IPR035640
label: "Endophilin B2, SH3 domain"
definition: >-
  Endophilin-B2 is a cytoplasmic protein that colocalizes to the cytoplasmic compartment of the cell together with Bax and is excluded from the nucleus. It is overexpressed in prostate cancer metastasis and has been identified as a cancer antigen with potential utility in immunotherapy. Endophilins play roles in synaptic vesicle formation, virus budding, mitochondrial morphology maintenance, receptor-mediated endocytosis inhibition and endosomal sorting. They contain an N-terminal N-BAR domain (BAR domain with an additional N-terminal amphipathic helix), followed by a variable region containing proline clusters, and a C-terminal SH3 domain. Endophilin-B2 forms homo- and heterodimers (with endophilin-B1) through its BAR domain.
