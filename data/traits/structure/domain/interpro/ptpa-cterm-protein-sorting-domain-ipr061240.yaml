identifier: InterPro:IPR061240
label: "PTPA-CTERM protein sorting domain"
definition: >-
  This C-terminal sorting and processing signal, called PTPA-CTERM, is a variant of the widespread PEP-CTERM domain. It is restricted a subset of Cyanobacteria that encode cognate sorting enzyme, named cyanoexosortase C (CrtC), and frequently is encoded near its sorting enzyme.
