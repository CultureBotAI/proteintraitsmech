identifier: InterPro:IPR061263
label: "TomO, hydrophobic C-terminal domain"
definition: >-
  This domain is found in Wolbachia-like bacteria and some lower eukaryotes. It occurs near the C terminus of distantly related paralogues such as WD_1278 and WD_0630. WD_1278 has been named TomO (toxic manipulator of oogenesis) for its effects on cultured Drosophila cells. TomO is a virulence protein that affects Drosophila oogenesis.
