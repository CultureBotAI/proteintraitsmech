identifier: InterPro:IPR062672
label: "Iso-A82775C biosynthesis cluster protein B, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of iso-A82775C biosynthesis cluster protein B (IacB), found in fungi. This domain is part of a 262 amino acid protein involved in the biosynthetic gene cluster for iso-A82775C production. Iso-A82775C is an enylepoxycyclohexane and biosynthetic precursor of chloropestolide anticancer natural products. The full-length IacB protein is part of a gene cluster that includes prenyltransferase iacE, oxidoreductase iacF, and short-chain dehydrogenases iacG and iacC, which together convert siccayne to iso-A82775C. Disruption of iacB does not affect iso-A82775C production, suggesting this protein may have a regulatory or auxiliary role in the biosynthetic pathway. The specific function of this C-terminal domain remains to be determined.
