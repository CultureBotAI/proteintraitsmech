identifier: InterPro:IPR053866
label: "PhyR, sigma2 domain"
definition: >-
  This entry represents the N-terminal domain of the signal transduction response regulator PhyR and related bacterial proteins. It consists of three α-helices and together with sigma4 domain ( ), it constitutes the PhyR N-terminal sigma-like (SL) domain. This domain was shown to bind to anti-sigma factor NepR.
