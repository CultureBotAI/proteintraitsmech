identifier: InterPro:IPR048857
label: "OTU1, Ubl domain"
definition: >-
  OTU1 is a deubiquitinating enzyme that may play an important regulatory role at the level of protein turnover by preventing degradation. This entry represents the ubiquitin-like (Ubl) domain, which interacts with the N-terminal domain of VCP and removes ubiquitin chains using the OTU domain. This domain is also found in VCIP1, a known UBXL-containing protein that functions in p97/p47-mediated Golgi reassembly.
