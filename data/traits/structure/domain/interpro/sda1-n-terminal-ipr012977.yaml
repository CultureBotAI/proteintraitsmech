identifier: InterPro:IPR012977
label: "SDA1, N-terminal"
definition: >-
  This entry represents the N-terminal domain of SDA1 (also referred to as NUC130/133). It consists of HEAT repeats. Sda1 is required for 60S pre-ribosomal subunits export to the cytoplasm and may also be required for 60S ribosomal subunit maturation and accumulation. It is involved in G1 events and passage through start, and possibly actin cytoskeleton organisation.
