identifier: InterPro:IPR056937
label: YqbQ/XkdQ
definition: >-
  This entry represents a domain found standalone in the Uncharacterized protein YqbQ, Phage-like element PBSX protein XkdQ and other related proteins. This domain is also found N-terminal in Clostridioides difficile endolysin (Ecd09610, ), diffocin CD1368. In diffocin CD1368, it adopts a globular structure comprised mainly of two β-barrels arranged in a head-to-tail manner and decorated with two small subdomains ( ). CD1368 is a component of the diffocin baseplate inner section that connects to the tube and an outer section that connects to the sheath. Three copies of this protein sit below the tube tail, enclosing the N-terminal α-helices of the spike trimer. The exact function of this domain is unknown but in CD1368 it precedes the hydrolase domain and forms a barrel with C3 symmetry, which functions as a 6-to-3-fold symmetry adapter between the tube tail and the central spike.
