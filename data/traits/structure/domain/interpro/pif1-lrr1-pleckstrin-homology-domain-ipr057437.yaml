identifier: InterPro:IPR057437
label: "PIF1/LRR1, pleckstrin homology domain"
definition: >-
  This entry represents the pleckstrin homology (PH) domain found in the N-terminal region of human ATP-dependent DNA helicase PIF1, Leucine-rich repeat protein 1 (LRR1), and similar sequences specific to animals. PIF is a DNA-dependent ATPase and 5'-3' DNA helicase required for the maintenance of both mitochondrial and nuclear genome stability. It resolves G4 structures, preventing replication pausing and double-strand breaks (DSBs) at G4 motifs. This protein is also involved in the maintenance of telomeric DNA. LRR1 is a substrate recognition subunit of an ECS (Elongin BC-CUL2/5-SOCS-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. The PH domain interacts with the zinc finger domains of MCM2 and MCM6, parental dsDNA and the N-terminal region of the TIMELESS α-solenoid. The domain is connected to a C-terminal LRR domain by a flexible linker.
