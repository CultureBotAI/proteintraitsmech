identifier: InterPro:IPR060407
label: "Sarcolemmal membrane-associated protein, first coiled-coil"
definition: >-
  This entry represents the first coiled-coil in Sarcolemmal membrane-associated protein (SLMAP) proteins found in animals. In SLMAP, this domain is responsible for binding suppressor of IKBKE 1 (SIKE1), facilitating the formation of the extended (SIKE1:SLMAP)STRIPAK complex that regulates Hippo signalling and cell growth control. SLMAP is critical for myoblast fusion and localises to multiple cellular membranes, including the sarcolemma, centrosomes, and endoplasmic reticulum.
