identifier: InterPro:IPR062277
label: "DEAD/DEAH box helicase YjiV, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of YjiV and related large DEAD/DEAH box helicases. These proteins contain an N-terminal restriction endonuclease domain ( ), DEAD box helicase domain ( ), YjiV_N domain ( ), helicase C-terminal domain ( ), MZB domain ( ), and this C-terminal domain. In Escherichia coli, YjiV may be a pseudogene. Related protein Z5898 in enterohemorrhagic E. coli O157:H7 regulates motility and promotes flagellar biosynthesis. The family is found predominantly in Pseudomonadota. The specific function of this C-terminal domain remains to be determined.
