identifier: InterPro:IPR062207
label: "C03B1.3/4, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the uncharacterised proteins C03B1.3 and C03B1.4 from Caenorhabditis elegans. These proteins are expressed during larval stages based on expression data. The domain is conserved across multiple nematode species.
