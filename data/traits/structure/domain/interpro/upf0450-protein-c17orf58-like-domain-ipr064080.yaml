identifier: InterPro:IPR064080
label: "UPF0450 protein C17orf58-like domain"
definition: >-
  This entry represents the conserved domain of UPF0450 protein C17orf58 from human and its homologues from vertebrates. This protein contains large disordered regions and a small β-barrel similar to that of TIMP proteins. It is predicted to contain disulfide bond. It is expressed in multiple tissues.
