identifier: InterPro:IPR000535
label: "Major sperm protein (MSP) domain"
definition: >-
  Nematode sperm are unusual amoeboid cells in which motility is not based on actin, but instead on the major sperm protein (MSP). MSP is a dimeric molecule that polymerises to form non-polar filaments constructed from two helical subfilaments that wind round one another. The filaments then assemble into larger macromolecular assemblies called fibre complexes. MSP is a small (~14kDa) basic protein typically encoded by a multigene family of up to 28 members. An about 120-amino acid domain similar to MSP has been found in other proteins, including: Animal Vesicle-Associated Membrane Protein-associated (VAMP-associated) protein family of 33kDa (VAP33, also known as VAMPA). VAP33 is required for neurotransmitter release. It binds to the v-SNARE synaptobrevin/VAMP which is associated with vesicle fusion. VAP33 has a two-domain structure with its N terminus being highly homologous to MSP, whereas its C terminus is based on a putative α-helical coiled-coil combined with an extremely hydrophobic membrane-attachment region. Nicotiana plumbaginifolia VAP27, a VAP33 homologue ( ). It interacts with the resistance protein Cf9. Yeast inositol regulator SCS2, a VAP33 homologue. It is C-terminally anchored to the endoplasmic reticulum. It acts as an endoplasmic reticulum (ER) membrane anchor for cytoplasmic proteins via binding to the FFAT motif of targeted proteins. The MSP polypeptide chain has an immunoglobulin-like fold based on a seven-stranded β sandwich measuring approximately 15 A x 20 A x 45 A and having opposing three-stranded and four-stranded β sheets. This entry represents the MSP domain.
