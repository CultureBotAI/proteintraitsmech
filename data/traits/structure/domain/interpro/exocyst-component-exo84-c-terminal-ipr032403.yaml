identifier: InterPro:IPR032403
label: "Exocyst component Exo84, C-terminal"
definition: >-
  The exocyst is a large complex that is required for tethering vesicles at the final stages of the exocytic pathway in all eukaryotes. Exocyst subunits are composed of mostly helical modules strung together into long rods. This entry represents the C-terminal helical region of the exocyst component Exo84. This region resembles a cullin-repeat, a multi-helical bundle.
