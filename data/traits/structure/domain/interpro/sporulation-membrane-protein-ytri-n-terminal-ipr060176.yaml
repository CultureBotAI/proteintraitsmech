identifier: InterPro:IPR060176
label: "Sporulation membrane protein YtrI, N-terminal"
definition: >-
  This domain is found at the N-terminal end of Sporulation membrane protein YtrI from Bacillus subtilis and similar proteins from firmicutes. YtrI is involved in the process of sporulation. This domain is predicted to adopt an α-helical structure.
