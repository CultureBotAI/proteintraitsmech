identifier: InterPro:IPR055365
label: "Sublancin immunity protein SunI-like, PH domain"
definition: >-
  Bacillus subtilis strain 168 produces the lantibiotic sublancin 168, a broad spectrum bacteriocin. SunI has been identified as the sublancin immunity protein. It belongs to a novel class of bacteriocin antagonists with a particular topology consisting of one N-terminal transmembrane domain and the bulk of the protein facing the cytoplasm. This entry also includes Bacillus subtilis protein YnzG and related UPF0457 proteins from Staphylococcus sp, whose function is unknown.
