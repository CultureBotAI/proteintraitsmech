identifier: InterPro:IPR057544
label: "Transcription factor spt8, beta-propeller"
definition: >-
  This entry represents the β-propeller found in Transcription factor SPT8 (SPT8) from fungi. SPT8 is a member of the transcription regulatory histone acetylation (HAT) complex SAGA. SPT8 interacts with TATA-binding protein (TBP) acting as a suppressor of transcription initiation defects caused by promoter insertions of the transposable element Ty.
