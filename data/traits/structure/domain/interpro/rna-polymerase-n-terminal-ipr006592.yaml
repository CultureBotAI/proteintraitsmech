identifier: InterPro:IPR006592
label: "RNA polymerase, N-terminal"
definition: >-
  The task of transcribing nuclear genes is shared between three RNA polymerases in eukaryotes: RNA polymerase (pol) I synthesizes the large rRNA, pol II synthesizes mRNA and pol III synthesizes tRNA and 5S rRNA. Pol I transcription is localised to discrete sites called nucleoli; these can be likened to ribosome factories, in which rRNA is synthesised by pol I in the fibrillar centres and then processed and assembled into ribosomes in the surrounding granular regions. Prokaryotes, in contrast, posses a single RNA polymerase, with transcription being controlled by the particular signam factor interacting with the catalytic core. This entry describes an N-terminal conserved region which can be found in the largest subunits of prokaryoptic and eukaryotic RNA polymerases.
