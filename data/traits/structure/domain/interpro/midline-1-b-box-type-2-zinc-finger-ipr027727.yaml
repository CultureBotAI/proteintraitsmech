identifier: InterPro:IPR027727
label: "Midline-1, B-box-type 2 zinc finger"
definition: >-
  MID1 is associated with microtubules throughout the cell cycle, co-localising with cytoplasmic fibres in interphase and with the mitotic spindle and midbodies during mitosis and cytokinesis. It has E3 ubiquitin ligase activity towards IGBP1, promoting its monoubiquitination, which results in deprotection of the catalytic subunit of protein phosphatase PP2A, and its subsequent degradation by polyubiquitination. This entry represents the B-box-type 2 (Bbox2) zinc finger of MID1, which is characterised by a CHC3H2 zinc-binding consensus motif.
