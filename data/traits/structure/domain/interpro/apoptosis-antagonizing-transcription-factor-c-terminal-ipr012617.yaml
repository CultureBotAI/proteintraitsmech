identifier: InterPro:IPR012617
label: "Apoptosis-antagonizing transcription factor, C-terminal"
definition: >-
  This C-terminal domain is found in apoptosis-antagonizing transcription factor (AATF) proteins. This is the domain of the AATF proteins that interacts with BLOS2 or Ceap, that functions as an adaptor in processes such as protein and vesicle processing and transport, and perhaps transcription.
