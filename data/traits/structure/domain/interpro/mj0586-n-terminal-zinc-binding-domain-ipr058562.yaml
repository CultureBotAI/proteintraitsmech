label: "MJ0586, N-terminal zinc binding domain"
definition: >-
  This entry represents a likely zinc binding domain found at the N-terminal end of a group of uncharacterised archaeal transcription regulators, including HVO_2718 from Haloferax volcanii ( ) and MJ0586 from Methanocaldococcus jannaschii.
