identifier: InterPro:IPR059351
label: "Domain of unknown function DUF8307"
definition: >-
  This domain is found in uncharacterised proteins mainly from Actinomycetes. It contains a semi-conserved WGYxGxG sequence motif. It is predicted to fold into an α/β structure composed of antiparallel β-sheet and α-helices packed on one side.
