identifier: InterPro:IPR055368
label: "Large helicase-related protein, winged-helix domain 3"
definition: >-
  This entry represents WH3 of Lhr. It shows three α-helices followed by two loops or 'wings' and two β-strands forming an antiparallel β-sheet. This is a winged-helix (WH) domain is found in Large helicase-related protein from Escherichia coli (Lhr), DEAD/DEAH box helicase from Mycolicibacterium smegmatis ( ) and similar bacterial sequences. These proteins have a C-terminal domain composed of a series of five WH modules (named WH2 to WH6) and a β-barrel module.
