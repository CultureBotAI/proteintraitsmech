identifier: InterPro:IPR027553
label: "Eight-cysteine-cluster domain"
definition: >-
  In this domain of about 50 residues, eight of twelve invariant residues are Cys. Proteins with this domain tend to have N-terminal signal sequences, suggesting an extracytoplasmic location for this domain.
