identifier: InterPro:IPR057712
label: "Domain of unknown function DUF7952"
definition: >-
  This entry represents a domain of unknown function found in putative SANT domain-containing proteins and uncharacterised proteins found in plants. This domain is predicted to adopt an EF-hand-like fold. The EF-hand fold is a helix-loop-helix motif that can bind calcium atoms. The EF-hand fold is usually tandemly repeated, and the number of repeats ranges from two to eight.
