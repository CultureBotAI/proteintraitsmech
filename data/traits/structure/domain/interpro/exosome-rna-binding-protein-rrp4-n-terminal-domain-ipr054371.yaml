identifier: InterPro:IPR054371
label: "Exosome RNA binding protein RRP4, N-terminal domain"
definition: >-
  This domain is found N-terminal in exosome RNA binding protein RRP4 and related proteins from archaea. RRP4 is a part of the exosome regulatory substrate recognition platform. This domain is structurally similar to ribosomal L27 protein.
