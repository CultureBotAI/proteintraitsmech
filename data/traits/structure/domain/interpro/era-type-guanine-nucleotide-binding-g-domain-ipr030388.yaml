identifier: InterPro:IPR030388
label: Era-type guanine nucleotide-binding (G) domain
definition: >-
  Era (E. coli Ras-like protein) is a small G-protein widely conserved in eubacteria and eukaryotes. It is essential for bacterial cell viability and is required for the maturation of 16S rRNA and assembly of the 30S ribosomal subunit. Era couples cell growth with cytokinesis and plays a role in cell division and energy metabolism. Era contains an N-terminal GTPase domain and a C-terminal distinct derivative of the type-II RNA-binding KH domain. Both domains are important for Era function. Era is functionally able to compensate for deletion of RbfA, a cold-shock adaptation protein that is required for efficient processing of the 16S rRNA. The Era-type GTPase domain consists of a central six-stranded β-sheet flanked by five α-helices, in which the GTP-binding site is located. Guanine nucleotide molecules interact with highly conserved G protein regions G1-G5.
