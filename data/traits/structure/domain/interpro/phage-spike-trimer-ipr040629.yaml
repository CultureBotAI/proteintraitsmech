identifier: InterPro:IPR040629
label: "Phage spike trimer"
definition: >-
  Bacteriophages penetrate the host cell membrane using their tail to inject genetic material into the host. In this penetration process, they use central spike domain located beneath their baseplate. The spike domain folds as a trimeric iron-binding structure. This entry contains three copies of the repeat unit.
