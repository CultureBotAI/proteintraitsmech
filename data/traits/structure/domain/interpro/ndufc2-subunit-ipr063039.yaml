identifier: InterPro:IPR063039
label: "NDUFC2 subunit"
definition: >-
  This entry represents the NDUFC2 accessory subunit of mitochondrial complex I (CI) from Tetrahymena thermophila ( ) and related proteins. Mitochondrial complex I is a redox-driven proton pump that generates proton-motive force across the inner mitochondrial membrane, powering oxidative phosphorylation and ATP synthesis in eukaryotes. Mitochondrial complex I has a characteristic L-shape, with a membrane arm embedded in the lipid bilayer of the inner mitochondrial membrane, joined at one end to the peripheral arm that extends into the mitochondrial matrix ( ). NDUFC2 is a single-pass protein which is located at the membrane arm of CI and makes contacts with other accessory subunits contributing to the proper assembly and structural stability of the enzyme.
