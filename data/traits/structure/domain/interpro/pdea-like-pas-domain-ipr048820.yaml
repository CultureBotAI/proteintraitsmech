identifier: InterPro:IPR048820
label: "PdeA-like, PAS domain"
definition: >-
  This entry represents the PAS domain from phosphodiesterase PdeA from Caulobacter vibrioides and similar bacterial proteins. PAS domains are found in all kingdoms of life and are involved in diverse functions but have an especially strong presence in signalling networks. They often serve as protein-protein interaction modules. In PdeA, the PAS domain serves as an adaptor recognition site needed for regulated proteolysis by the ClpXP protease.
