label: "Domain of unknown function DUF6972"
definition: >-
  This domain is found in uncharacterised cyanobacterial proteins either standalone or in combination with other domains. It is probably distantly related to the C-terminal domain of CdiA toxin (CdiA-CT), known member of RNase A superfamily.
