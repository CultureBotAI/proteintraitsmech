identifier: InterPro:IPR056755
label: "dsRNA binding domain"
definition: >-
  This entry represents a a set of divergent dsRNA binding domains. They are found in functionally diverse proteins such as Dicer-like protein 1, ATP-dependent RNA helicase DHX30 and Small RNA 2'-O-methyltransferase HEN1.
