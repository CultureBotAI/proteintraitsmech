identifier: InterPro:IPR058542
label: "SCN5A-like, C-terminal IQ motif"
definition: >-
  This entry represents the IQ motif of SCN5A, a key element in the calcium sensing apparatus. Human Sodium channel protein type 5 subunit alpha (SCN5A) mediates the voltage-dependent sodium ion permeability of excitable membranes. Its C-terminal domain is organised into two regions: an IQ motif and an EF-hand domain.
