identifier: InterPro:IPR012914
label: "Purine catabolism PurC-like domain"
definition: >-
  This domain is found in the purine catabolism regulatory protein expressed by Bacillus subtilis (PucR, ). PucR is thought to be a transcriptional regulator of genes involved in the purine degradation pathway, and may contain a LysR-like DNA-binding domain. It is similar to LysR-type regulators in that it represses its own expression. The other members of this family are also putative regulatory proteins.
