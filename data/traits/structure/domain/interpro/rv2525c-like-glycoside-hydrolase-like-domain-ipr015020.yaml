identifier: InterPro:IPR015020
label: "Rv2525c-like, glycoside hydrolase-like domain"
definition: >-
  This domain is found in uncharacterised bacterial proteins, including the putative peptidoglycan hydrolase Rv2525c from Mycobacterium tuberculosis. Rv2525c may function as a peptidoglycan hydrolase with glycosidase activity as this domain has a typical TIM barrel-like fold characteristic of glycoside hydrolases. However, it displays esterase activity toward p-nitrophenyl esters of various acyl chain length in vitro. This domain is also found in YbfG and FadG from Bacillus subtilis.
