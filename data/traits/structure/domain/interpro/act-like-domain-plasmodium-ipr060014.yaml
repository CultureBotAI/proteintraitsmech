identifier: InterPro:IPR060014
label: "ACT-like domain, plasmodium"
definition: >-
  This entry represents an ACT domain from a family of uncharacterised long proteins found in Plasmodium species. The ACT domain is a small molecule binding module with a characteristic β-α-β-β-α-β fold. Members of this group typically form dimers or higher-order oligomers, with ligand binding often occurring at the domain interfaces. These domains function as regulatory modules that bind amino acids or other small molecules, enabling allosteric control of enzyme activity, transcription regulation, or metabolic pathways.
