identifier: InterPro:IPR063715
label: "Conditioned medium factor, 2nd Ig-like domain"
definition: >-
  This entry represents the second Ig-like domain of conditioned medium factor found in Dictyostelium discoideum. The full-length protein CMF is involved in cell density sensing and may synchronise the onset of development by triggering aggregation when cells have starved. The protein is secreted and N- and O-glycosylated. This entry also includes bacterial proteins.
