identifier: InterPro:IPR025991
label: "Chemoreceptor zinc-binding domain"
definition: >-
  The chemoreceptor zinc-binding domain (CZB) is found in bacterial signal transduction proteins - most frequently receptors involved in chemotaxis and motility, but also in c-di-GMP signalling and nitrate/nitrite-sensing. Originally discovered in the cytoplasmic chemoreceptor TlpD from Helicobacter pylori, it is often found C-terminal to the MCPsignal domain in cytoplasmic chemoreceptor proteins. The CZB domain contains a core sequence motif, Hxx[WFYL]x21-28Cx[LFMVI]Gx[WFLVI]x18-27HxxxH. The highly-conserved H-C-H-H residues of this motif are believed to coordinate zinc; mutating the latter two histidines of the motif to alanines abolishes Zn binding. This domain binds zinc with high affinity, with a Kd in the femtomolar range. This domain has been shown in E. coli to be a zinc sensor that regulates the catalytic activity of the GGDEF domain ( ). This domain also binds the chemoattractant HOCl at a site very close to that of zinc. It has been shown that zinc participates in HOCl sensing by forming a redox 'Cys-Zn switch' that reacts towards HOCl.
