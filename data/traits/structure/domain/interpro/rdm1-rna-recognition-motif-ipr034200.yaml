identifier: InterPro:IPR034200
label: "RDM1, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of RDM1, also termed RAD52 homologue B, a novel factor involved in the cellular response to the anti-cancer drug cisplatin in vertebrates. RDM1 contains a small RD motif that is shared with the recombination and repair protein RAD52, and an RNA recognition motif (RRM). The RD motif is responsible for the acidic pH-dependent DNA-binding properties of RDM1. It interacts with ss- and dsDNA, and may act as a DNA-damage recognition factor by recognizing the distortions of the double helix caused by cisplatin-DNA adducts in vitro. In addition, due to the presence of RRM, RDM1 can bind to RNA as well as DNA.
