identifier: InterPro:IPR059674
label: MJ0538
definition: >-
  This entry represents the MJ0538 uncharacterised proteins found in archaea. This domain is found in thermophilic and hyperthermophilic archaea including Thermococcaceae, Thermococcus, and Methanococcales, with some members in Candidatus Micrarchaeota. The proteins are approximately 260 amino acids in length. The function of this protein remains to be determined. This domain can also be found at the C-terminal region in related uncharacterised archaeal proteins.
