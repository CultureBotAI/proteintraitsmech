identifier: InterPro:IPR055145
label: "PSV hypothetical protein ORF131-like domain"
definition: >-
  This domain is found in the uncharacterised protein from Pyrobaculum spherical virus (PSV), also known as ORF131, and similar sequences from virus and archaeal prophagues. It adopts a two-layered α-β configuration.
