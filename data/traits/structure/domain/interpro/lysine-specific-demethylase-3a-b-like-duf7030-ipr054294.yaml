identifier: InterPro:IPR054294
label: "Lysine-specific demethylase 3A/B-like, DUF7030"
definition: >-
  This domain of unknown function is found N-terminal in Lysine-specific demethylase 3A/B (KDM3A/B, also known as JmjC domain-containing histone demethylation protein 2A/B or JHDM2A/B) and related sequences. KDM3B is a histone demethylase that specifically demethylates lysine at position 9 of histone H3. This enzyme plays a central role in histone code. This domain is predicted to adopt an open β-barrel with an SH3-like topology.
