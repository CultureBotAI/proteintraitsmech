identifier: InterPro:IPR060717
label: "LIM-domain binding protein, DD and LCCD"
definition: >-
  This entry represents the dimerization domain (DD) of LIM domain-binding protein 1 (LDB1) from human and related proteins, which consists of a NTF2-like subdomain and a small helix 4-helix 5 subdomain. This entry also covers the LDB1/Chip conserved domain (LCCD) which is a short segment following the DD, which interacts with Single-stranded DNA binding proteins (SSBPs) and stabilise LDBs by preventing their proteasomal degradation. This entry includes the LIM-domain binding proteins and similar proteins, such as LIM domain-binding protein 1 (LDB1) from human and its orthologue Chip from Drosophila, SEUSS and SLK2 from Arabidopsis, Adn1 from fission yeasts, MFG1 from yeast and PTAB from other fungi. LDB1 binds to the LIM domain of a wide variety of LIM domain-containing transcription factors. It may regulate the transcriptional activity of LIM-containing proteins by determining specific partner interactions. LDB1 plays a role in the development of interneurons and motor neurons in cooperation with LHX3 and ISL1. It acts synergistically with LHX1/LIM1 in axis formation and activation of gene expression. Acts with LMO2 in the regulation of red blood cell development, maintaining erythroid precursors in an immature state. The Drosophila protein Chip is required for segmentation and activity of a remote wing margin enhancer. Chip is a ubiquitous chromosomal factor required for normal expression of diverse genes at many stages of development. It is suggested that Chip cooperates with different LIM domain proteins and other factors to structurally support remote enhancer-promoter interactions.
