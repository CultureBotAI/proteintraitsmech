identifier: InterPro:IPR059985
label: "GerT, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of GerT, a spore germination protein from Bacillus species. GerT is involved in spore germination and is probably required at the earliest stage of germination. The C-terminal is localised to the spore coat and adopts an HSP20-like chaperone superfamily structure. GerT proteins are induced during late sporulation by sigma K. This domain is found predominantly in Bacillaceae. While GerT is involved in spore germination, the specific function of this N-terminal domain remains to be determined.
