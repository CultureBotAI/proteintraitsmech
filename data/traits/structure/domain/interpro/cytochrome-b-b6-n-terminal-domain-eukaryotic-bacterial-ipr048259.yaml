identifier: InterPro:IPR048259
label: Cytochrome b/b6, N-terminal domain, eukaryotic/bacterial
definition: >-
  This entry represents the N-terminal domain of Cytochrome b/b6 found mainly in eukaryotes and bacteria. Cytochrome b is a subunit of cytochrome bc1, an 11-subunit mitochondrial respiratory enzyme. Cytochrome b spans the mitochondrial membrane with 8 transmembrane helices (A-H) in eukaryotes. In plants and cyanobacteria, cytochrome b6 is analogous to eukaryotic cytochrome b, containing two chains: helices A-D are encoded by the petB gene and helices E-H are encoded by the petD gene in these organisms. Cytochrome b/b6 contains two bound hemes and two ubiquinol/ubiquinone binding sites.
