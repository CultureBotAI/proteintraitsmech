identifier: InterPro:IPR015156
label: "Malto-oligosyltrehalose trehalohydrolase, archaeal, C-terminal"
definition: >-
  This C-terminal domain is found in the prokaryotic protein glycosyltrehalose trehalohydrolase; it assumes a gamma-crystallin-type fold with a five-stranded anti-parallel β-sheet that packs against the C-terminal side of a β-α barrel. The domain is common to family 13 glycosidases and typically contains a five to ten strand β-sheet, however its precise fold varies.
