identifier: InterPro:IPR032642
label: "DNA mismatch repair protein Msh2, ATP-binding cassette domain"
definition: >-
  This entry represents the DNA mismatch repair protein Msh2 (homologous to bacterial MutS) from eukaryotes. Msh2-Msh6 complex recognises base pair mismatches and small insertion/deletions in DNA and initiates repair. Human Msh2-Msh6 complex has been shown to regulate BLM helicase in response to the damaged DNA forks during double-stranded break repair. Mismatch repair (MMR) is one of five major DNA repair pathways. The mismatch repair system recognises and repairs mispaired or unpaired nucleotides that result from errors in DNA replication. The most extensively studied general MMR system is the MutHLS pathway of the bacterium Escherichia coli. In the first step of the MutHLS pathway, the MutS protein (in the form of a dimer) binds to the site of a mismatch in double-stranded DNA. Through a complex interaction between MutS, MutL and MutH, a section of the newly replicated DNA strand (and thus the strand with the replication error) at the location of the mismatch bound by MutS is targeted for removal. Homologues of MutS have been found in many species including eukaryotes, Archaea and other bacteria, and together these proteins have been grouped into the MutS family. This entry represents the ATP-binding cassette domain of Msh2.
