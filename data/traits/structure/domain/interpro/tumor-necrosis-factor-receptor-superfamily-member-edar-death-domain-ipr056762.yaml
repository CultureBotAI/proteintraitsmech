identifier: InterPro:IPR056762
label: "Tumor necrosis factor receptor superfamily member EDAR, death domain"
definition: >-
  This entry represents a death domain found in the human Tumor necrosis factor receptor superfamily member EDAR and similar animal proteins. EDAR is a receptor for ectodysplasin A (EDA) isoforms, specifically binding to isoform A1 in humans but not to isoform A2. This protein family is involved in mediating the activation of key signalling pathways, including NF-kappa-B and JNK, which are crucial for various cellular processes. Additionally, members of this family may promote caspase-independent cell death.
