identifier: InterPro:IPR048373
label: "Cell-division protein ZapC, N-terminal"
definition: >-
  This entry represents the N-terminal α/β region which contains a pocket, termed the N-domain pocket, lined with residues important for ZapC function as an FtsZ bundler. This domain is related to chromo domains ( ), whereas the C-terminal domain of ZapC has similarity to Tudor domains ( ). ZapC is one of four FtsZ-binding components of the Z ring in bacteria. Formation of the Z ring on the cytoplasmic surface of the membrane is the starting process for assembly of the cell-division apparatus. It binds directly to the Z ring, and although it is not essential for absolute cell division it contributes to it by enhancing the interactions between the FtsZ protofilaments (or polymers) which aggregate to form the ring conformation in the Z ring.
