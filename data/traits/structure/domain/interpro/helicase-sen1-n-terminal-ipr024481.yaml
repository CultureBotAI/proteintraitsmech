identifier: InterPro:IPR024481
label: "Helicase Sen1, N-terminal"
definition: >-
  The yeast helicase Sen1 is an ATP-dependent 5'->3' DNA/RNA helicase required for the expression and maturation of diverse classes of non-protein-coding RNAs like precursor tRNAs, rRNAs and small nuclear (snRNA) and nucleolar (snoRNA) RNAs and it also has an ATPase-dependent ability of promoting transcription termination in vitro. Sen1 has a key role at replication forks during DNA replication to promote fork progression and chromosome stability. Sen1 belongs to the superfamily 1B UPF1-like family of helicases with a common domain organisation: a N-terminal domain and a C-terminal domain which contains the SF1B RNA helicase with two RecA domains (RecA1 and RecA2) and the classical helicase motifs involved in nucleic acid binding and ATP hydrolysis. It also contains two SF1B-specific subdomains (1B and 1C) that modulate RNA binding. This entry represents the large N-terminal domain, a characteristic feature of this protein, which is important for Sen1 function in vivo. It is sufficient and necessary for replisome association as it contains the interaction sites for replisome components.
