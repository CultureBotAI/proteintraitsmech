identifier: InterPro:IPR001959
label: "Probable transposase, IS891/IS1136/IS1341"
definition: >-
  This entry represents a conserved region of a probable transposase family, which is found in a number prokaryotic and viral proteins, including the insertion sequence (IS)-like element of the Bacillus PS3 (Thermophilic bacterium PS-3) that promotes expression of the alanine carrier protein-encoding gene and IS1136 from Saccharopolyspora erythraea. RNA-guided DNA endonuclease TnpB from Deinococcus radiodurans, which is part of insertion sequence (IS) element ISDra2 but is not required for transposition belongs to this entry. This protein is an RNA-guided dsDNA endonuclease that cleaves DNA when guided by an RNA derived from its IS.
