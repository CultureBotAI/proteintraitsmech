identifier: InterPro:IPR048253
label: "Homocitrate synthase, catalytic TIM barrel domain, fungi/bacteria"
definition: >-
  This entry represents the catalytic TIM barrel domain of Homocitrate synthase from Saccharomyces cerevisiae and similar proteins from fungi and some bacterial species. This domain consists of a core (β/α)8 motif with the eight parallel β-strands forming an enclosed barrel surrounded by eight α-helices. The domain has a catalytic centre containing a divalent cation-binding site formed by a cluster of invariant residues that cap the core of the barrel. In addition, the catalytic site includes three invariant residues - an aspartate (D), an arginine (R), and a glutamate (E) - which is the basis for the domain name "DRE-TIM". Homocitrate synthase (HCS) catalyses the condensation of acetyl-CoA and alpha-ketoglutarate to form homocitrate, the first step in the lysine biosynthesis pathway. This family includes the Yarrowia lipolytica and Saccharomyces cerevisiae homologues. This family belongs to the DRE-TIM metallolyase superfamily.
