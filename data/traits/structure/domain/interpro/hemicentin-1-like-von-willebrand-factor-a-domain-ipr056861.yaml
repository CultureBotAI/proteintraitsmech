identifier: InterPro:IPR056861
label: "Hemicentin-1-like, von Willebrand factor A domain"
definition: >-
  This domain is found in human Hemicentin-1 (HMCN1), von Willebrand factor A domain-containing protein 7 (VWA7), Protein irg-7 from Caenorhabditis elegans and similar sequences. HMCN1 is involved in transforming growth factor beta-mediated rearrangement of the podocyte cytoskeleton which includes reduction of F-actin fibres and broadening, flattening and elongation of podocytes. HMCN1 is also implicated in the organisation of the basement membrane and may contribute to cleavage furrow maturation during cytokinesis in embryos. VWA7 is found in the major histocompatibility complex class III region and it is likely implicated in lung cancers Irg-7 plays a role in innate immunity and probably in the regulation of longevity.
