identifier: InterPro:IPR019960
label: "Type I secretion C-terminal target domain, VC_A0849 subclass"
definition: >-
  This entry represents a C-terminal domain associated with secretion by type 1 secretion systems (T1SS). Members of this subclass do not include the RtxA toxin of Vibrio cholerae and its homologues, although the two classes of proteins share large size, occurrence in genomes with T1SS, regions with long tandem repeats, and regions with the glycine-rich repeat modeled by .
