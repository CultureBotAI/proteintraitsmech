identifier: InterPro:IPR032837
label: "Glycerol-1-phosphate dehydrogenase, N-terminal domain"
definition: >-
  This is the N-terminal domain of glycerol-1-phosphate dehydrogenases (G1PDH) from archaea and bacteria. G1PDH catalyses the NAD(P)H-dependent reduction of dihydroxyacetonephosphate (DHAP or glycerone phosphate) to glycerol 1-phosphate (G1P).
