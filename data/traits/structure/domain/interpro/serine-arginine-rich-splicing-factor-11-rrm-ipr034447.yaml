identifier: InterPro:IPR034447
label: Serine/arginine-rich splicing factor 11, RRM
definition: >-
  SRSF11, also known as SRp54 or p54, belongs to the SR proteins family. It is involved in bridge-complex formation and splicing by mediating protein-protein interactions across either introns or exons. SRSF11 has been identified as a tau exon 10 splicing repressor. It interacts with a purine-rich element in exon 10, and suppresses exon 10 inclusion by antagonizing Tra2beta, an SR-domain-containing protein that enhances exon 10 inclusion. SRSF11 has also been shown to associate with active telomerase through the interaction with TERC and directs it to nuclear speckles specifically during S phase.
