identifier: InterPro:IPR004017
label: "Cysteine-rich domain"
definition: >-
  This domain is usually found in two copies per protein. It contains up to four conserved cysteines. The group includes proteins characterised as: heterodisulphide reductase, subunit B (HrdB, ); lactate utilization protein A (LutA); Fe-S oxidoreductase; glycerol-3-phosphate dehydrogenase subunit C (Anaerobic GlpC); and glycolate oxidase iron-sulphur subunit (GlcF).
