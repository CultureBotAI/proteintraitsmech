identifier: InterPro:IPR047825
label: "SHKBP1/KCTD3, BTB/POZ domain"
definition: >-
  This entry represents the BTB/POZ domain present in two closely related human proteins: SH3KBP1 (also known as SETA-binding protein 1) and Potassium Channel Tetramerization Domain Containing protein 3 (KCTD3) which correspond to group D of KCTD family. SHKBP1 interacts with cathepsin B and participates in tumor necrosis factor (TNF)-induced apoptosis in ovarian cancer cells. KCTD3 has been associated with neurogenetic and neurodevelopmental disorders. It is an accessory subunit of potassium/sodium hyperpolarization-activated cyclic nucleotide-gated channel 3 (HCN3) as it interacts and increases its stability and cell surface expression. BTB/POZ domains, also known as tetramerization (T1) domains, are versatile protein-protein interaction domains that facilitates homodimerization or heterodimerization.
