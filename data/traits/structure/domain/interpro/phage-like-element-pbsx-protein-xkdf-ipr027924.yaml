identifier: InterPro:IPR027924
label: "Phage-like element PBSX protein, XkdF"
definition: >-
  This domain is found in the phage-like element PBSX protein XkdF from Bacillus subtilis. This domain can also be found in the C-terminal of the N6 adenine-specific DNA methyltransferases. Its function is still not clear.
