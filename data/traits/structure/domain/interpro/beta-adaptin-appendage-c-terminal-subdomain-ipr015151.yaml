identifier: InterPro:IPR015151
label: "Beta-adaptin appendage, C-terminal subdomain"
definition: >-
  This entry represents a subdomain of the appendage (ear) domain of beta-adaptin. This domain has a three-layer arrangement, α-β-α, with a bifurcated antiparallel β-sheet. This domain is required for binding to clathrin, and its subsequent polymerisation. Furthermore, a hydrophobic patch present in the domain also binds to a subset of D-phi-F/W motif-containing proteins that are bound by the alpha-adaptin appendage domain (epsin, AP180, eps15).
