identifier: InterPro:IPR004360
label: "Glyoxalase/fosfomycin resistance/dioxygenase domain"
definition: >-
  Glyoxalase I ( ) (lactoylglutathione lyase) catalyzes the first step of the glyoxal pathway. S-lactoylglutathione is then converted by glyoxalase II to lactic acid. Glyoxalase I is an ubiquitous enzyme which binds one mole of zinc per subunit. The bacterial and yeast enzymes are monomeric while the mammalian one is homodimeric. The sequence of glyoxalase I is well conserved. The domain represented by this entry is found in glyoxalase I and in other related proteins, including fosfomycin resistance proteins FosB, FosA, FosX and dioxygenases (eg. 4-hydroxyphenylpyruvate dioxygenase).
