identifier: InterPro:IPR035642
label: "MraZ, N-terminal"
definition: >-
  MraZ proteins are highly conserved in bacteria. In Escherichia coli, MraZ functions as a transcriptional regulator. The crystal structure of this protein reveals two subdomains related by a pseudo two-fold axis, with each subdomain containing a highly conserved DXXXR sequence motif in close proximity to each other, suggested to form the functional site. This entry represents the N-terminal subdomain.
