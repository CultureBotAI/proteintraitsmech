identifier: InterPro:IPR049296
label: "PARP1-like, PADR1 domain, N-terminal helical subdomain"
definition: >-
  This entry represents de N-terminal helical region of PADR1 zinc-binding domain found in poly(ADP-ribose) polymerase-1 (PARP-1) from human and its homologues. The PADR1, known as the third zinc-binding domain (Zn3) localises between the N-terminal PARP-type zinc fingers (Zn1 and Zn2) and the central BRCT domain; it is involved in protein-protein interactions that orchestrate PARP-1 activation and are critical to the DNA-dependent stimulation of PARP-1. Poly(ADP-ribose) polymerase-1 (PARP-1) is a chromatin-associated enzyme involved in multiple cellular processes including DNA repair, cell cycle control, apoptotic signalling, and transcriptional regulation. Stimulated by binding to nicked DNA, PARP-1 catalyses poly(ADP-ribosyl)ation of the acceptor proteins using NAD as a substrate. PARP-1 has a modular architecture composed of multiple, independently folded domains that can be generally described in three major segments representing the biochemical activities and functional roles of the enzyme: the DNA-binding domain (DBD), the automodification domain which contains a BRCT fold, and the catalytic domain, which consists of the helical (HD) and the ART subdomains. The catalytic domain of PARP-1 is located at the C-terminal end of the protein. The DNA-binding domain is located at the N terminus of PARP-1 and contains two zinc fingers that bind to various DNA structures, a nuclear localization signal, and a caspase-3 cleavage site. The two N-terminal zinc fingers of PARP-1 bind to DNA structures to trigger activation of the C-terminal catalytic domain of PARP-1. The DBD of human PARP-1 contains yet a third zinc-binding domain, referred to as PADR1, located between the N-terminal PARP-type zinc fingers and the central BRCT domain and it is required to mediate interdomain co…
