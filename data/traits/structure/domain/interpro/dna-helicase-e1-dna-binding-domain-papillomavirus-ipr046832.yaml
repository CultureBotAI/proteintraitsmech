identifier: InterPro:IPR046832
label: DNA helicase E1, DNA-binding domain, papillomavirus
definition: >-
  This entry represents the DNA-binding domain (DBD) of papillomavirus E1 protein, a DNA helicase that is required for initiation of viral DNA replication. This protein forms a complex with E2 protein at the origin of replication (ori). This domain is found in the central region of E1 and binds DNA at specific sites of viral origin, and also binds cooperatively with E2-DBD. This domain comprises a five-stranded antiparallel β-sheet flanked by α-helices on each side. This domain binds originally as a dimer in which each monomer binds to one half-site of the palindromic E1 binding site, and promotes the assembly of the hexameric helicase on the ori. E1 has a domain architecture and function similar to SV40 T-antigen.
