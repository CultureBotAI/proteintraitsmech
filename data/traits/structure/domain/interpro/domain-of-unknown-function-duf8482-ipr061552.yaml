identifier: InterPro:IPR061552
label: "Domain of unknown function DUF8482"
definition: >-
  This domain is found in uncharacterised proteins mainly from Gram-negative bacteria which are probably related to the RND tripartite drug efflux pumps. The domain represented in this entry folds into a six-stranded closed β-barrel with a greek-key topology which has a structural similarity to the C-terminal domain of alanine racemase. This domain is interrupted by the barrel-sandwich hybrid domain which is inserted after the first β-strand of the barrel. This model does not include the N-terminal strand.
