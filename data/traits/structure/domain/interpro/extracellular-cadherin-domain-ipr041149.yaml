identifier: InterPro:IPR041149
label: "Extracellular cadherin domain"
definition: >-
  This entry represents an extracellular cadherin (EC) domain which can be found at the N-terminal region of Pcdh15. Pcdh15 features exceptionally long extracellular domains containing 11 ECs. These repeats are structurally similar, but not identical in sequence, often featuring linkers with conserved calcium-binding sites that confer mechanical strength to them. Protocadherin-15 (Pcdh15) belongs to the epsilon subfamily of nonclustered protocadherins. It is a component of the tip-links, the extracellular filaments that connect the tips of stereocilia and gate hair cell mechano-electrical transduction channels in the inner ear. Pcdh15 interacts with transmembrane channel-like proteins TMC1 and TMC2, which have been implicated in mechanotransduction in mammalian hair cells. Mutations in genes coding for Pcdh15 cause deafness in both mice and humans. Pcdh15 plays an important role in hair-bundle morphogenesis.
