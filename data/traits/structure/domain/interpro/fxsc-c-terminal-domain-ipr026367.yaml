identifier: InterPro:IPR026367
label: "FxsC, C-terminal domain"
definition: >-
  This entry represents a region found regularly as the C-terminal domain of some FxsC proteins from actinomycetes (where the N-terminal domain resembles a TIR domain - see ). FxsC proteins occur in the vicinity of a proposed peptide-modifying radical SAM/SPASM domain protein, FxsB ( ). The first characterised member of the FxsB family was shown to cyclise Phe to Ser in the C-terminal motif FxSxx-COOH of FxsA family RiPP precursors. FxSxx-COOH modification systems appear to be involved in cell-cell interactions such as biological conflict systems.
