identifier: InterPro:IPR048871
label: "Bacterial PH domain"
definition: >-
  This entry represents a group of bacterial PH domains that contain two transmembrane helices. The function of these proteins is uncertain, but they may act as antitoxins or as chaperones for membrane bound complexes.
