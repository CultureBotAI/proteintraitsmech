identifier: InterPro:IPR057074
label: "Ionotropic receptor 75a/84a, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the Ionotropic receptor 75a (IR75A), 84a (IR84A) from Drosophila melanogaster and related sequences from arthropods. IR75A is an odorant receptor for acetic and propionic acid. It functions as part of an olfactory receptor complex including the ionotropic receptor coreceptor Ir8a. IR84A functions as a ligand-gated cation channel, and which involved in male courtship in response to food-derived odors. This domain is predicted to adopt a periplasmic-binding protein domain fold.
