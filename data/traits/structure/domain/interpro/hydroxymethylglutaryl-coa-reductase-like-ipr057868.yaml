identifier: InterPro:IPR057868
label: "Hydroxymethylglutaryl-CoA reductase-like"
definition: >-
  This domain is found at the N-terminal end in Hydroxymethylglutaryl-CoA (HMG-CoA) reductase from Candidatus Promineifilum. This domain also covers the whole length of some HMG-CoA. This domain is predicted to adopt a mostly β configuration.
