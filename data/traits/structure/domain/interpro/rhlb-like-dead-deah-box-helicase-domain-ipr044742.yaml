identifier: InterPro:IPR044742
label: "RhlB-like, DEAD/DEAH-box helicase domain"
definition: >-
  This is the ATP-binding domain of a group of DEAD-box RNA helicases which comprises a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation.
