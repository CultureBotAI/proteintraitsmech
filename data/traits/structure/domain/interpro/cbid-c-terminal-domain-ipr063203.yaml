identifier: InterPro:IPR063203
label: "CbiD, C-terminal domain"
definition: >-
  CbiD is essential for cobalamin biosynthesis in both S. typhimurium and B. megaterium, no functional role has been ascribed to the protein. The CbiD protein has a putative S-AdoMet binding site. It is possible that CbiD might have the same role as CobF in undertaking the C-1 methylation and deacylation reactions required during the ring contraction process. This entry represents the C-terminal domain, which is found associated with and adopts an α-β configuration.
