identifier: InterPro:IPR049508
label: "Serine/threonine-protein kinase MARK 1-4, catalytic domain"
definition: >-
  This entry represents the catalytic domain found in the animal Serine/Threonine Kinases (STKs) MAP/microtubule affinity-regulating kinases 1-4 (MARK1-4). STKs catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MARKs, also called Partitioning-defective 1 (Par1) proteins, function as regulators of diverse cellular processes in nematodes, Drosophila, and vertebrates. They are involved in embryogenesis, epithelial cell polarisation, cell signalling, and neuronal differentiation. MARKs phosphorylate tau and related microtubule-associated proteins (MAPs), and regulates microtubule-based intracellular transport. Vertebrates contain four isoforms, namely MARK1 (or Par1c), MARK2 (or Par1b), MARK3 (Par1a), and MARK4 (or MARKL1). Known substrates of MARKs include the cell cycle-regulating phosphatase Cdc25, tyrosine phosphatase PTPH1, MAPK scaffolding protein KSR1, class IIa histone deacetylases, and plakophilin 2.
