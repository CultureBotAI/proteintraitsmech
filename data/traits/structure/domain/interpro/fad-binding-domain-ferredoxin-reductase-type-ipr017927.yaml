label: "FAD-binding domain, ferredoxin reductase-type"
definition: >-
  Flavoenzymes have the ability to catalyse a wide range of biochemical reactions. They are involved in the dehydrogenation of a variety of metabolites, in electron transfer from and to redox centres, in light emission, in the activation of oxygen for oxidation and hydroxylation reactions. About 1% of all eukaryotic and prokaryotic proteins are predicted to encode a flavin adenine dinucleotide (FAD)-binding domain. According to structural similarities and conserved sequence motifs, FAD-binding domains have been grouped in three main families: (i)the ferredoxin reductase (FR)-type FAD-binding domain, (ii) the FAD-binding domains that adopt a Rossmann fold and (iii) the PCMH-type FAD-binding domain. The FAD cofactor consists of adenosine monophosphate (AMP) linked to flavin mononucleotide (FMN) by a pyrophosphate bond. The AMP moiety is composed of the adenine ring bonded to a ribose that is linked to a phosphate group. The FMN moiety is composed of the isoalloxazine-flavin ring linked to a ribitol, which is connected to a phosphate group. The flavin functions mainly in a redox capacity, being able to take up two electrons from one substrate and release them two at a time to a substrate or coenzyme, or one at a time to an electron acceptor. The catalytic function of the FAD is concentrated in the isoalloxazine ring, whereas the ribityl phosphate and the AMP moiety mainly stabilise cofactor binding to protein residues. The structural core of all FR family members is well conserved. The FAD-binding fold characteristic of the FR family is a cylindrical β-domain with a flattened six-stranded antiparallel β-barrel organised into two orthogonal sheets (B1-B2-B5 and B4-B3-B6) separated by one α-helix. The cylinder is open between strands B4 and B5 which makes space for the isoall…
