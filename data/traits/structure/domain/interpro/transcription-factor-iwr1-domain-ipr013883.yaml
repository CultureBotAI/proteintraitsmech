identifier: InterPro:IPR013883
label: "Transcription factor Iwr1 domain"
definition: >-
  Iwr1 is involved in transcription from polymerase II promoters; it interacts with with most of the polymerase II subunits. Deletion of this protein results in hypersensitivity to the K1 killer toxin.
