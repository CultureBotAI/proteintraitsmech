identifier: InterPro:IPR036037
label: "Class XVII myosin, motor domain"
definition: >-
  Mcs1, also known as chitin synthase 8, is a fungal protein that contains a myosin-17 motor domain and can travel along both microtubules and F-actin. Mcs1 works in cooperation with myosin-5 and kinesin-1 and in opposition to dynein in the secretion of cell wall-forming fungal chitin synthases. Successful exocytosis requires the motor domain of Mcs1, which captures and tethers the vesicles prior to secretion.
