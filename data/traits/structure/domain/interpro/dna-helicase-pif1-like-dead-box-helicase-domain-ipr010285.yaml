identifier: InterPro:IPR010285
label: DNA helicase Pif1-like, DEAD-box helicase domain
definition: >-
  This entry represents the DEAD-box helicase domain, which includes the ATP-binding region, of a group of DNA helicases, including Pif1 and Rrm3 from budding yeasts and Pfh1 from fusion yeast. This entry also includes Pif1 like proteins from prokaryotes and eukaryotes including plants. Pif1 is a DNA helicase conserved from bacteria to humans. It suppresses both G-quadruplex-associated DNA damage and telomere lengthening. In budding yeast, it exists in two forms, nuclear form and mitochondrial form. Its nuclear form inhibits telomerase, while its mitochondrial form is involved in repair and recombination of mitochondrial DNA.
