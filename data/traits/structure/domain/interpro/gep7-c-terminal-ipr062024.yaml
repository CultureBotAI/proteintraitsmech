identifier: InterPro:IPR062024
label: "GEP7, C-terminal"
definition: >-
  This entry represents the C-terminal domain of GEP7 (genetic interactor of prohibitin 7), a mitochondrial membrane protein found in fungal species. GEP7 is involved in respiratory growth and is required for cell survival in the absence of prohibitins. The protein localises to the mitochondrial membrane as a single-pass membrane protein. This C-terminal domain contains the transmembrane region and may be involved in membrane anchoring or protein-protein interactions within the mitochondrial membrane.
