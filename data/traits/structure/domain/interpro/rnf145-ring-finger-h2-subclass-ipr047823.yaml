identifier: InterPro:IPR047823
label: "RNF145, RING finger, H2 subclass"
definition: >-
  This entry represents a RING finger domain present in the RNF145 protein, which is expressed in T lymphocytes, and its expression is altered in acute myelomonocytic and acute promyelocytic leukemias. RNF145 is a E3-ubiquitin ligase that mediates the degradation of different proteins, for example: HMG-CoA reductase and lipid hydrolase ADIPOR2. RNF145 shows high sequence similarity with RNF139, an endoplasmic reticulum (ER)-resident multi-transmembrane protein that functions as a potent growth suppressor in mammalian cells, inducing G2/M arrest, decreased DNA synthesis and increased apoptosis. Like RNF139, RNF145 contains a C3H2C3-type RING-H2 finger.
