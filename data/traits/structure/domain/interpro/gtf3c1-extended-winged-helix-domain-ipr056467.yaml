identifier: InterPro:IPR056467
label: "GTF3C1, extended winged-helix domain"
definition: >-
  This is the extended winged-helix domain (eWH) of human General transcription factor 3C polypeptide 1 (GTF3C1), a component of TFIIIC that initiates transcription complex assembly on tRNA and is required for transcription of 5S rRNA and other stable nuclear and cytoplasmic RNAs.
