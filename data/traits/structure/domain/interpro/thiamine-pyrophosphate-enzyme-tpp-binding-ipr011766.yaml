identifier: InterPro:IPR011766
label: Thiamine pyrophosphate enzyme, TPP-binding
definition: >-
  A number of enzymes require thiamine pyrophosphate (TPP) (vitamin B1) as a cofactor. It has been shown that some of these enzymes are structurally related. The thiamin diphosphate-binding fold comprises two different functional modules, the pyridine-binding (Pyr) and pyrophosphate-binding (PP) modules. This represents the TPP binding domain which localizes at the C-terminal of TPP enzymes and in some members has been described as the PP-binding module.
