identifier: InterPro:IPR040557
label: "VIP1-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal domain of inositol hexakisphosphate and diphosphoinositol-pentakisphosphate kinase 1/2 (VIP1/2, or PPIP5K1/2) and related proteins. Structure analysis of human PPIP5K2 indicates that this region forms α-β-α domain. PPIP5K2 is one of the mammalian PPIP5K isoforms responsible for the synthesis of diphosphoinositol polyphosphates (inositol pyrophosphates; PP-InsPs), regulatory molecules that function at the interface of cell signalling and organismic homeostasis.
