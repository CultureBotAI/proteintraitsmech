identifier: InterPro:IPR049884
label: "Scytalone dehydratase-like"
definition: >-
  This entry represents a domain found as standalone in Scytalone dehydratase (SDH) and in combination with amidase domain ( ) in Scytalone dehydratase-like protein Arp1. SDH is a member of the group of enzymes involved in fungal melanin biosynthesis. It was first identified in a phytopathogenic fungus, Magnaporthe grisea (Rice blast fungus), which causes rice blast disease. Scytalone dehydratase is a molecular target of inhibitor design efforts aimed at protecting rice plants from fungal disease. Arp1 ia a part of the Pks2 gene cluster that mediates the formation of infectious structures (appressoria), enabling these fungi to kill insects faster.
