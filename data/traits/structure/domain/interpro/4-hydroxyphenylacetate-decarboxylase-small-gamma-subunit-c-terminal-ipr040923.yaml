identifier: InterPro:IPR040923
label: "4-hydroxyphenylacetate decarboxylase small gamma subunit, C-terminal"
definition: >-
  This is a C-terminal domain found in 4-hydroxyphenylacetate decarboxylase small gamma subunit ( ), which catalyzes the last reaction in the fermentative production of p-cresol from tyrosine. The C-terminal domain [4F-4S] cluster bears structural similarity to high-potential iron-sulfur proteins (HiPIPs). HiPIPs have an N-terminal extension of 20-40 residues, so the structural similarity is limited to their Fe/S cluster-binding scaffold. Furthermore, despite of the weak amino acid sequence identity, the cluster binding motifs are remarkably similar to H/CX2CX12-13CX16-17C for the gamma-subunit and CX2CX13-19CX14-19C for HiPIPs.
