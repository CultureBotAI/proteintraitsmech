label: Arterivirus papain-like cysteine protease alpha (PCPalpha) domain
definition: >-
  Arteriviruses are enveloped, positive-stranded RNA viruses and include pathogens of major economic concern to the swine- and horse-breeding industries: Equine arteritis virus (EAV). Porcine reproductive and respiratory syndrome virus (PRRSV). Mice actate dehydrogenase-elevating virus. Simian hemorrhagic fever virus. The arterivirus replicase gene is composed of two open reading frames (ORFs). ORF1a is translated directly from the genomic RNA, whereas ORF1b can be expressed only by ribosomal frameshifting, yelding a 1ab fusion protein. Both replicase gene products are multidomain precursor proteins which are proteolytically processed into functional nonstructural proteins (nsps) by a complex proteolytic cascade that is directed by four (PRRSV/LDV) or three (EAV) proteinase domains encoded in ORF1a. The arterivirus replicase processing scheme involves the rapid autoproteolytic release of two or three N-terminal nsps (nsp1 (or nsp1alpha/1beta) and nsp2) and the subsequent processing of the remaining polyproteins by the "main protease" residing in nsp4, together resulting in a set of 13 or 14 individual nsps. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidazolium ring of a histidine, and a third residue, usually asparagine or aspartic acid, to orientate and activate the imidazolium ring. In only one family of cysteine peptidases, is the role of the general base assigned to a residue other than a histidine: in peptidases from family C89 (acid ceramidase) an arginine is the general base. Cysteine peptidases can be grouped into fourteen different clans, with members of each clan possessi…
