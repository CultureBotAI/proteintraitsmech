identifier: InterPro:IPR031919
label: "Alpha-L-fucosidase, C-terminal"
definition: >-
  The C-terminal domain of alpha-L-fucosidase consists of eight anti-parallel-strands packed into two-sheets of five and three strands, respectively, forming a two-layer-sandwich containing a Greek key motif.
