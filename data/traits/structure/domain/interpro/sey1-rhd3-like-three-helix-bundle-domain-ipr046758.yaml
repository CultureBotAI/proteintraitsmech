identifier: InterPro:IPR046758
label: "Sey1/RHD3-like, three-helix bundle domain"
definition: >-
  This is the three-helix bundle (3HB) domain found at the C-terminal of Sey1 from yeast and Root hair defective 3 (RHD3) from Arabidopsis, GTP-binding proteins involved in homotypic membrane fusion of the endoplasmic reticulum. This is a stalk-like domain composed of four 3HBs that interacts with its own GTPase domain and that of a neighbouring molecule, to undergo major conformational changes during the GTP cycle to drive membrane fusion.
