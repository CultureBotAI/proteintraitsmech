identifier: InterPro:IPR035470
label: "Amphiphysin I, SH3 domain"
definition: >-
  This entry represents the SH3 domain found in Amphiphysin I. Amphiphysins function primarily in endocytosis and other membrane remodeling events. They exist in several isoforms and mammals possess two amphiphysin proteins from distinct genes. Amphiphysin I proteins, enriched in the brain and nervous system, contain domains that bind clathrin, Adaptor Protein complex 2 (AP2), dynamin, and synaptojanin. They function in synaptic vesicle endocytosis. Human autoantibodies to amphiphysin I hinder GABAergic signaling and contribute to the pathogenesis of paraneoplastic stiff-person syndrome.
