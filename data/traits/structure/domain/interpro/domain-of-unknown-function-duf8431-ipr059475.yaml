label: "Domain of unknown function DUF8431"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is frequently found N-terminal to domains members of the Endonuclease/Exonuclease/phosphatase family . It is predicted to fold into a three-helical bundle.
