identifier: InterPro:IPR033495
label: Mitochondrial ribonuclease P catalytic subunit, PIN domain
definition: >-
  MRPP3 is part of mitochondrial ribonuclease P (mt-RNase P) that cleaves tRNA molecules in their 5'-ends. In humans, mt-RNase P is composed of three protein subunits (MRPP1-3) and is only active as a tripartite complex. MRPP1 and MRPP2 deliver the pre-tRNA substrate and activate MRPP3. This entry represents the PIN (PilT N terminus) domain of MRPP3, which belongs to a large nuclease superfamily. Its active centre consists of three highly conserved catalytic residues which coordinate metal ions.
