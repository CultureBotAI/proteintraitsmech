identifier: InterPro:IPR054480
label: "Acetolactate synthase small subunit-like, ACT domain"
definition: >-
  This entry represents the ACT domain found at the N-terminal of acetohydroxyacid synthase isozyme III small subunit (ILVH) from Escherichia coli and at the C-terminal of D-3-phosphoglycerate dehydrogenase, which are closely related. ILVH is the regulatory subunit of acetohydroxyacid synthase (AHAS), an enzyme that catalyses the first step in the biosynthesis of the three branched-chain amino acids.
