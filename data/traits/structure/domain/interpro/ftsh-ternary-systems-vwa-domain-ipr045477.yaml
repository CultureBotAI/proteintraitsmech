identifier: InterPro:IPR045477
label: "FtsH ternary systems, vWA domain"
definition: >-
  This entry represents the highly-divergent vWA domain lacking metal-chelating aspartates of typical vWA domains. It is the core component of the FtsH ternary systems, a class of NTP-dependent biological conflict systems.
