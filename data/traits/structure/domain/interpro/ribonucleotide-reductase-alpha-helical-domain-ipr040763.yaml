identifier: InterPro:IPR040763
label: "Ribonucleotide reductase, alpha-helical domain"
definition: >-
  This is the α helical domain of ribonucleotide reductases. Family members include Ribonucleotide reductase (RNR, ) which catalyse the reductive synthesis of deoxyribonucleotides from their corresponding ribonucleotides. It provides the precursors necessary for DNA synthesis. RNRs divide into three classes on the basis of their metallocofactor usage. This domain is found in Class II. Class II RNRs, found in bacteria, bacteriophage, algae and archaea, use coenzyme B12 (adenosylcobalamin, AdoCbl). Many organisms have more than one class of RNR present in their genomes. Ribonucleotide reductase is an oligomeric enzyme composed of a large sub-unit (700 to 1000 residues) and a small sub-unit (300 to 400 residues) - class II RNRs are less complex, using the small molecule B12 in place of the small chain. Some family members carry ATP cone domain which acts as a functional regulator. Competitive binding of ATP and dATP to an N-terminal ATP-cone domain determines enzyme activity. As the ratio of dATP to ATP increases above a certain threshold, the enzyme activity is turned off. Substrate nucleotides are recognised by relatively simple H-bonding interactions at the N terminus of one or more α helices. In the monomeric class II RNR, the effector binds in a pocket formed by helices in a 130 amino acid insertion which constitutes this domain.
