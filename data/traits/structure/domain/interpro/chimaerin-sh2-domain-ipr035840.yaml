identifier: InterPro:IPR035840
label: "Chimaerin, SH2 domain"
definition: >-
  Chimaerin is a family of GTPase activating proteins for the small G-protein Rac. Chimaerin family members have been implicated in development, neuritogenesis and cancer. This entry represents the SH2 domain of alpha2-chimerin and beta2-chimerin.
