identifier: InterPro:IPR046899
label: "KTSC and Metallopeptidase-like, N-terminal fusion domain"
definition: >-
  This entry represents an uncharacterised α/β domain N-terminally fused to diverse metallopeptidases (MPTases) and the lysyl tRNA synthetase KTSC RNA-binding domain protein. This domain is currently observed in only the jumbo phages.
