identifier: InterPro:IPR058099
label: "XAC0095-like domain"
definition: >-
  This entry represents a domain found standalone in XAC0095 from the plant pathogen Xanthomonas axonopodis pv. citri. XAC0095 was shown to interact with HrpG, a response regulator transcription factor responsible for type III secretion system (T3SS) hrp gene expression. The interaction between XAC0095 and HrpG could modulate HrpG's activity, possibly stabilising its phosphorylated or dephosphorylated state, or influencing its interactions with other regulators and promoters involved in virulence gene expression. Homologues of XAC0095 include both proteins of similar lengths and substantially longer proteins that contain additional domains.
