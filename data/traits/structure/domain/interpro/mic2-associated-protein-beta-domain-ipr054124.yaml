identifier: InterPro:IPR054124
label: "MIC2-associated protein, beta-domain"
definition: >-
  This domain is found in MIC2-associated protein from Toxoplasma gondii (M2AP) , which is necessary for the proper trafficking and secretion of MIC2 and thus involved in parasite invasion. M2AP is a soluble protein with an N-terminal propeptide, a central β-domain (this entry), and a predicted C-terminal coil domain. This domain folds into a a compact β-sandwich comprising 13 antiparallel β-strands.
