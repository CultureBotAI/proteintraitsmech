identifier: InterPro:IPR001605
label: "Pleckstrin homology domain, spectrin-type"
definition: >-
  Spectrin is the major constituent of the cytoskeletal network underlying the erythrocyte plasma membrane; it associates with band 4.1 and actin to form the cytoskeletal super-structure. The native spectrin molecule is a tetramer comprising two anti-parallel heterodimers joined head to head, such that the C terminus of the alpha-subunit and the N terminus of the beta-subunit are included within the same molecule. Spectrin is similar to alpha-actinin and dystrophin, and contains a pleckstrin homology (PH) domain. The exact function of the PH domain is unknown, but evidence suggests that it contains an electrostatically-polarised pocket that facilitates binding of a ligand (e.g., a peptide). The PH domain contains a number of hydrophobic residues that form a hydrophobic core responsible for protein stability. The spectrin PH domain, which has the familiar 7-stranded anti-parallel up and down β-barrel capped by a C-terminal amphiphilic α helical cap, contains insertions that confer 2 additional turns of α-helix in the loop between strands 3 and 4. The C-terminal helix is packed into a gorge between strands 1 and 2, and lies parallel to strand 7.
