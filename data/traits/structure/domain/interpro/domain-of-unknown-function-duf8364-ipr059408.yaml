identifier: InterPro:IPR059408
label: "Domain of unknown function DUF8364"
definition: >-
  This domain is found in uncharacterised proteins mainly from Actinomycetes. It is predicted to adopt a globular structure in which two α-helices are sandwiched between two four-stranded β-sheets. Besides a conserved RxF sequence motif, this domain contains several conserved positively charged residues which may be essential for function.
