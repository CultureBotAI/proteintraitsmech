identifier: InterPro:IPR059640
label: "YvzJ, C-terminal domain"
definition: >-
  This entry represents a domain found in uncharacterised lipoproteins from Bacillaceae. The prototype protein YvzJ from Bacillus subtilis is a small lipoprotein of 69 amino acids with an N-terminal signal peptide and lipid anchor localised to the cell membrane. These proteins are found predominantly in Bacillus and related genera. The function of this domain remains to be determined.
