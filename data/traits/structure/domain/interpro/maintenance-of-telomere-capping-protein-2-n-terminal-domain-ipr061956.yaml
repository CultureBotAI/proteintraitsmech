identifier: InterPro:IPR061956
label: "Maintenance of telomere capping protein 2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of maintenance of telomere capping protein 2 (MTC2). MTC2 is found in Saccharomycetaceae yeasts. MTC2 was identified in a genome-wide suppressor screen as being involved in telomere capping. Deletion of MTC2 in S. cerevisiae decreases resistance to doxorubicin. The specific function of this domain remains to be determined.
