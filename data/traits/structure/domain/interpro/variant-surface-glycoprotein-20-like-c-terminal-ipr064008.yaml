identifier: InterPro:IPR064008
label: "Variant surface glycoprotein 20-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of variant surface glycoproteins found in Trypanosoma. VSGs form a dense coat on the surface of the parasite and are crucial for immune evasion. The trypanosome evades the host immune response by expressing antigenically distinct VSGs from an estimated 1000 VSG genes. The C-terminal domain contains the GPI-anchor attachment site that anchors the protein to the cell membrane. VSGs are attached to the plasma membrane via a GPI-anchor and a soluble form can be released from ruptured cells by phosphatidylinositol-specific phospholipase C action.
