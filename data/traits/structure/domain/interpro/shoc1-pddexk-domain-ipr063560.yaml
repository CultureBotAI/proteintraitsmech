identifier: InterPro:IPR063560
label: "SHOC1, PDDEXK domain"
definition: >-
  This domain is found in the human Protein shortage in chiasmata 1 ortholog (SHOC1) and related proteins from chordate. This domain has significant similarity to PD-(D/E)XK nuclease domains. SHOC1 is an integral to the formation of crossover recombination intermediates during mammalian meiosis. SHOC1 preferentially binds branched DNA molecules but apparently lacks in vitro endonuclease activity. The core of SHOC1 resembles the DNA repair endonuclease XPF. This aligns with the SHOC1 ATPase activity, which is stimulated by the presence of single-stranded DNA.
