identifier: InterPro:IPR032859
label: "GTPase Der, C-terminal KH-domain-like"
definition: >-
  This domain can be found in the C terminus of the bacterial GTPases Der. The two adjacent GTPase domains (GD1 and GD2) pack at either side of the C-terminal domain. This C-terminal domain resembles a KH domain but is missing the distinctive RNA recognition elements.
