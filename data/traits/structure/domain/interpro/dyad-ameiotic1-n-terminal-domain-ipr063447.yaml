identifier: InterPro:IPR063447
label: "DYAD/AMEIOTIC1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of DYAD/AMEIOTIC1 (AM1) proteins found in plants (Viridiplantae). This domain is located N-terminal to the WHD_plant_repro domain ( ). DYAD/AM1 proteins are required for progression through meiosis. In Arabidopsis, DYAD is involved in chromatid cohesion establishment, chromosome structure during meiosis, and regulates the switch from mitosis to meiosis. In maize and rice, AM1 is required for the leptotene-zygotene transition and homologous chromosome pairing. The proteins localise to the nucleus and bind chromatin in early meiotic prophase I. The specific function of this N-terminal domain remains to be determined.
