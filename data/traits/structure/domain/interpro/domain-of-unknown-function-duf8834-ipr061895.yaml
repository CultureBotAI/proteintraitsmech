identifier: InterPro:IPR061895
label: "Domain of unknown function DUF8834"
definition: >-
  This entry represents a small domain of approximately 43 residues found in uncharacterised proteins in Streptomycetaceae. The STRING analysis indicates functional association with hydrolase domains. This domain is predicted to adopt a simple structure composed of three-stranded β-sheet and an α-helix. The function of this domain remains to be determined.
