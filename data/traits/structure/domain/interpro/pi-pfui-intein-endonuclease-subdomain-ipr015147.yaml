identifier: InterPro:IPR015147
label: "PI-PfuI intein endonuclease, subdomain"
definition: >-
  Ribonucleotide reductase from Pyrococcus species has been shown to contain two inteins, PI-PfuI and PI-PfuII. The endonuclease domain from the PI-PfuI intein (also known as Vitamin B12-dependent ribonucleoside-diphosphate reductase) is composed of two subdomains, each of which assumes an α-β-β-α-β-β-α-α topology. The four stranded β-sheet forms a saddle-shaped surface and assembles together through an interface made of α-helices. The presence of 14 basic residues on the surface of the β-sheets suggests that this large groove may be involved in DNA binding. This entry represents the endonuclease subdomain found towards the N terminus.
