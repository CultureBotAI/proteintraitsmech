identifier: InterPro:IPR060426
label: "MJECL34-like domain"
definition: >-
  This entry represents a domain found in MJECL34 from Methanocaldococcus jannaschii and similar uncharacterised proteins found in archaea and bacteria. The proteins are approximately 295 amino acids in length. The function of this domain remains to be determined.
