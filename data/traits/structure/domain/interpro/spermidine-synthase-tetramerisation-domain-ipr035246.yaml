identifier: InterPro:IPR035246
label: "Spermidine synthase, tetramerisation domain"
definition: >-
  This entry represents the N-terminal tetramerization domain of spermidine synthase. Spermidine synthase is involved in the first step of the spermidine biosynthesis subpathway that synthesizes spermidine from putrescine.
