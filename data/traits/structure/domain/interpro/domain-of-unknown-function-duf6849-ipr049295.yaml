label: "Domain of unknown function DUF6849"
definition: >-
  This domain is found in uncharacterised archaeal proteins. It is found C-terminal to , in CDC48 proteins. It self-associates to form a twelve-bladed β-propeller, possibly representing the prototypical ancestral propeller fold ( ). Its function is unknown.
