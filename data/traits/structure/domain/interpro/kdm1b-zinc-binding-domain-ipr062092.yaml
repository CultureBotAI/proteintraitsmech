identifier: InterPro:IPR062092
label: "KDM1B, zinc-binding domain"
definition: >-
  This entry represents a zinc-binding domain of lysine- specific histone demethylase 1B (KDM1B/LSD2/AOF1). The domain binds two zinc ions through a C4H2C2-type coordination: the first zinc is coordinated by two cysteines and two histidines, while the second is coordinated by four cysteines. This domain is required for the demethylase activity of KDM1B, as mutations in the zinc-coordinating residues abolish enzymatic function. KDM1B demethylates mono- and di-methylated lysine-4 of histone H3, functioning as a transcriptional corepressor. The domain is found N-terminal to a CW-type zinc finger ( ) and a SWIRM domain ( ).
