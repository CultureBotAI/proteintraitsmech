identifier: InterPro:IPR044734
label: "G protein-coupled receptor 35, 7TM"
definition: >-
  This entry represents the seven transmembrane segments of G-protein coupled receptor 35 (GPR35) from animals. GPR35 shares closest homology with GPR55, and they belong to the class A G protein-coupled receptor superfamily, which all have a common structural architecture comprising of seven-transmembrane (TM) α-helices interconnected by three extracellular and three intracellular loops. A number of studies have suggested that GPR35 may play important physiological roles in hypertension, atherosclerosis, nociception, asthma, glucose homeostasis and diabetes, and inflammatory bowel disease. GPR35 is thought to be responsible for brachydactyly mental retardation syndrome, which is associated with a deletion comprising chromosome 2q37 in human, and is also implicated as a potential oncogene in stomach cancer. Several endogenous ligands for GPR35 have been identified including kynurenic acid, 2-oleoyl lysophosphatidic acid, and zaprinast.
