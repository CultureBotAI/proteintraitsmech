identifier: InterPro:IPR060532
label: "Ubiquitin-associated protein 2, UBA domain"
definition: >-
  This ubiquitin-associated (UBA) domain is found at the N-terminal of human Ubiquitin-associated protein 2 (UBAP2) and similar proteins. UBAP2 recruits the ubiquitination machinery to RNA polymerase II for polyubiquitination, removal and degradation, when the transcription-coupled nucleotide excision repair (TC-NER) machinery fails to resolve DNA damage. UBA domains are often involved in ubiquitin binding.
