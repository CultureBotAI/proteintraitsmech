identifier: InterPro:IPR048987
label: "PIN domain associated with the TPR-GreAB-C-PIN system"
definition: >-
  This is a divergent PIN domain present in the TPR-GreAB-C-PIN type conflict system from prokaryotes. These proteins have a constant module comprising of TPR-repeats, the GreA/B-C-terminal domain and the PIN domain. The N-terminal domain is variable and usually contains effector domains or EADs. The PIN domain is predicted to cleave emerging nascent transcripts.
