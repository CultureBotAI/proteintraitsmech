identifier: InterPro:IPR058345
label: "Global regulator laeB domain"
definition: >-
  This domain is found in fungal Global regulator laeB proteins. Members are regulators of secondary metabolites production. It is predicted to fold into an α-helical array flanked on one side with a three-stranded small β-sheet.
