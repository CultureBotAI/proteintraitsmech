identifier: InterPro:IPR041868
label: "Protein disulfide-isomerase A3, first redox inactive TRX-like domain b"
definition: >-
  This entry represents the first redox inactive TRX-like domain b found in protein disulfide-isomerase A3 (also known as ERp57). ERp57 exhibits both disulfide oxidase and reductase functions like PDI, by catalyzing the formation of disulfide bonds of newly synthesized polypeptides in the ER and acting as isomerases to correct any non-native disulfide bonds. It also displays chaperone activity to prevent protein aggregation and facilitate the folding of newly synthesized proteins. ERp57 contains two redox-active TRX (a) domains and two redox inactive TRX-like (b) domains. It shares the same domain arrangement of abb'a' as PDI, but lacks the C-terminal acid-rich region (c domain) that is present in PDI. ERp57 interacts with the lectin chaperones, calnexin and calreticulin, and specifically promotes the oxidative folding of glycoproteins. Similar to PDI, the b domain of ERp57 is likely involved in binding to substrates.
