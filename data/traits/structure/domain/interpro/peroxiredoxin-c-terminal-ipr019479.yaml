label: "Peroxiredoxin, C-terminal"
definition: >-
  This entry represents the C-terminal domain of 1-Cys peroxiredoxin. The domain is associated with , which carries the catalytic cysteine. The C-terminal domain is crucial for dimerisation, providing the additional cysteine residue necessary for the assembly of the functional homodimer. 1-Cys peroxiredoxin is a member of the peroxiredoxin superfamily, which protects cells against membrane oxidation through glutathione (GSH)-dependent reduction of phospholipid hydroperoxides to their corresponding alcohols. The enzyme's peroxidase activity is lost upon oxidation of the catalytic cysteine located upstream of this domain. Glutathionylation, presumably through disruption of protein structure, facilitates access for GSH, enabling spontaneous reduction of the mixed disulphide to the sulphydryl form and consequent reactivation of the enzyme. Peroxiredoxins (Prxs) are a ubiquitous family of antioxidant enzymes that also control cytokine-induced peroxide levels which mediate signal transduction in mammalian cells. Prxs can be regulated by changes to phosphorylation, redox and possibly oligomerisation states. Prxs are divided into three classes: typical 2-Cys Prxs; atypical 2-Cys Prxs; and 1-Cys Prxs. All Prxs share the same basic catalytic mechanism, in which an active-site cysteine (the peroxidatic cysteine) is oxidised to a sulphenic acid by the peroxide substrate. The recycling of the sulphenic acid back to a thiol is what distinguishes the three enzyme classes. Using crystal structures, a detailed catalytic cycle has been derived for typical 2-Cys Prxs, including a model for the redox-regulated oligomeric state proposed to control enzyme activity. Alkyl hydroperoxide reductase (Ahp) has two subunits, the small AhpC subunit and the large AhpF subunit. AhpC is responsible for…
