label: "Domain of unknown function DUF7495"
definition: >-
  This domain is found in a group of uncharacterised eukaryotic proteins. It contains six highly conserved cysteines which are predicted to form disulfide bonds. This domain is predicted to adopt structure similar to C-type lectins.
