identifier: InterPro:IPR002586
label: "CobQ/CobB/MinD/ParA nucleotide binding domain"
definition: >-
  This domain is found in various cobyrinic acid a,c-diamide synthases. These include CbiA ( ) and CbiP ( ) from S. typhimurium, and CobQ ( ) from R. capsulatus. These amidases catalyse amidations to various side chains of hydrogenobyrinic acid or cobyrinic acid a,c-diamide in the biosynthesis of cobalamin (vitamin B12) from uroporphyrinogen III. Vitamin B12 is an important cofactor and an essential nutrient for many plants and animals and is primarily produced by bacteria.
