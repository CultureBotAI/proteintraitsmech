identifier: InterPro:IPR063062
label: "Eukaryotic translation initiation factor 2A C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 50 residues found in eukaryotic translation initiation factor 2A (eIF2A) proteins in eukaryotes including metazoans and fungi. The domain forms a small helical hairpin and follows the main eIF2A WD-repeat β-propeller domain ( ). eIF2A functions in translation initiation by directing binding of methionyl-tRNAi to 40S ribosomal subunits in a codon-dependent manner. The specific function of this C-terminal domain remains to be determined.
