identifier: InterPro:IPR021994
label: "Domain of unknown function DUF3592"
definition: >-
  This entry represents a β-barrel domain ubiquitously found, primarily in bacteria, but also in archaea and in kinetoplastids. Proteins in this family are typically between 150 and 242 amino acids in length. The domain is often found in integral membrane proteins.
