identifier: InterPro:IPR031330
label: "Glycoside hydrolase 35, catalytic domain"
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glycoside hydrolase family 35 ( ) comprises enzymes with only one known activity: beta-galactosidase ( ). Mammalian beta-galactosidase is a lysosomal enzyme (gene GLB1 ) that cleaves the terminal galactose from gangliosides, glycoproteins, and glycosaminoglycans and whose deficiency is the cause of the genetic disease Gm(1) gangliosidosis (Morquio disease type B). Beta-1,2-glucosyltransferase from gnavibacterium album is classified as part of the GH35 family ( ). This enzyme transfers a glucosyl residue from the non-reducing end of a 1,2-beta-D-glucan to a glucose residue of an acceptor molecule, forming a beta(1,2) linkage.
