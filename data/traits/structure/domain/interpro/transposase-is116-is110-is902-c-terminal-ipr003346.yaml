label: "Transposase IS116/IS110/IS902, C-terminal"
definition: >-
  Transposases are needed for efficient transposition of the insertion sequence or transposon DNA. This entry represents the C-terminal domain of region of the pilin gene inverting protein (PIVML) and transposases IS116, IS110 and IS902.
