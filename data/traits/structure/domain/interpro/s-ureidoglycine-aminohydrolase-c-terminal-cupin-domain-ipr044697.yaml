identifier: InterPro:IPR044697
label: "(S)-ureidoglycine aminohydrolase, C-terminal cupin domain"
definition: >-
  (S)-ureidoglycine aminohydrolase (UGHY or UGlyAH) is involved in the ureide pathway, a metabolic route of purine catabolism in plants, some bacteria and probably in some fungi where, uric acid is degraded into glyoxylate and ammonia. This enzyme is involved in the anaerobic nitrogen utilization via the assimilation of allantoin. It catalyses the second step in the allantoin degradation pathway, the deamination of the allantoin producing S-ureidoglycolate and ammonia from S-ureidoglycine. The structure of UGlyAH from Arabidopsis thaliana (AtUGlyAH) has been studied. It contains two structurally similar β-barrel domains, called N and C (cupin) domains. AtUGlyAH binds a Mn ion through its C-terminal domain which acts as a molecular anchor to bind (S)-ureidoglycine. Its structure showed a bi-cupin fold with a conserved jelly roll-like β-barrel fold and an octameric functional unit. Several structural homologues of UGlyAH, including the Escherichia coli ortholog YlbA (also known as GlxB6), also exhibit similar features. This entry represents the C-terminal cupin domain found in (S)-ureidoglycine aminohydrolases, including UGlyAH from E.coli and its homologues from plants and fungi.
