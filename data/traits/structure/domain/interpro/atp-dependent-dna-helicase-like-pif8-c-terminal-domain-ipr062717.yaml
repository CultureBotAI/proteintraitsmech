identifier: InterPro:IPR062717
label: "ATP-dependent DNA helicase-like PIF8, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of PIF8, found in Trypanosomatidae. PIF8 is a protein related to the Pif1 helicase family and is essential for kinetoplast genome maintenance. Despite similarity to helicases, the full-length protein probably lacks helicase activity, missing at least two of seven conserved helicase motifs. PIF8 localises to the kinetoplast matrix. The specific function of this C-terminal domain remains to be determined.
