identifier: InterPro:IPR044455
label: "ADAD1, double-stranded RNA binding domain"
definition: >-
  Adenosine deaminase domain containing 1 (ADAD1), also known as testis nuclear RNA-binding protein (TENR), is phylogenetically related to a family of adenosine deaminases involved in RNA editing. It plays an essential function in spermatid morphogenesis. It may be involved in testis-specific nuclear post-transcriptional processes such as heterogeneous nuclear RNA (hnRNA) packaging, alternative splicing, or nuclear/cytoplasmic transport of mRNAs. ADAD1 contains a double-stranded RNA binding motif (DSRM) and a C-terminal adenosine-deaminase (editase) domain. This entry represents the DSRM of ADAD1.
