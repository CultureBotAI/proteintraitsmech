identifier: InterPro:IPR048410
label: RNA-binding, Nab2-type zinc finger
definition: >-
  This domain is found in nuclear polyadenylated RNA-binding 2 protein NAB2 from Saccharomyces cerevisiae (also known as Nab2p) and its homologues from yeast. Nab2p is a major family of Poly A-binding proteins whose interactions are thought to be crucial for the control of poly(A) tail length. This domain is the second of seven CCCH zinc fingers which are responsible for polyadenosine recognition. The structures of the first two independent tandem zinc fingers (TZF12 and TZF34) were determined by NMR ( , ). These four zinc fingers together may bind RNA in the 3' to 5' direction.
