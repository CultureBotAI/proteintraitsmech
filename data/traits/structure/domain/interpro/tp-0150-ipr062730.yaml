identifier: InterPro:IPR062730
label: TP_0150
definition: >-
  This entry represents a conserved domain found in TP_0150, an uncharacterised 155-amino acid protein from Treponema pallidum. The protein contains a predicted signal peptide, suggesting it is secreted or localised to the periplasm. Orthologues are found in related Spirochaetota bacteria. The function of this domain remains to be determined.
