identifier: InterPro:IPR010496
label: "3-keto-alpha-glucoside-1,2-lyase/3-keto-2-hydroxy-glucal hydratase domain"
definition: >-
  This domain has structural similarity to an endo-1,3-1,4-beta glucanase belonging to glycoside hydrolase family 16 . A member containing this domain, BT2157 from B. thetaiotaomicron, was initially described as a 3-keto trehalose hydrolase involved in trehalose degradation. However, members of this group of proteins, previously known as DUF1080, have been reported to be 3-keto-α-glucoside-1,2-lyases and 3-keto-2-hydroxy-glucal hydratases and named AL/BT2 enzymes.
