identifier: InterPro:IPR034653
label: "SPF45, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of SPF45. This domain is also found in DNA-damage-repair/toleration protein 111. SPF45, also termed RNA-binding motif protein 17 (RBM17), is an RNA-binding protein consisting of an unstructured N-terminal region, followed by a G-patch motif and a C-terminal U2AF (U2 auxiliary factor) homology motifs (UHM) that harbours a RNA recognition motif (RRM) and an Arg-Xaa-Phe sequence motif. SPF45 is a bifunctional protein that functions in splicing and DNA repair. It is involved in regulating alternative splicing of the apoptosis regulatory gene FAS (also called CD95). Its UHM binds UHM-ligand motifs (ULMs) present in the 3' splice site-recognizing factors U2AF65, SF1 and SF3b155. It binds to the Holliday junction, which is a key DNA intermediate in the homologous-recombination pathway. DNA-damage-repair/toleration protein 111 is a component of the SWAP1-SFPS-RRC1 splicing factor complex which modulates photomorphogenesis by regulating the gene expression and pre-messenger RNA (mRNA) alternative splicing of a large number of genes.
