identifier: InterPro:IPR037682
label: "TonB, C-terminal"
definition: >-
  TonB is bound to an inner membrane-bound protein ExbB via a globular domain and has a flexible middle region that is likely to help in positioning the C-terminal domain into the iron-transporter barrel in the outer membrane. This entry represents the C-terminal domain of TonB. TonB_C interacts with the N-terminal TonB box of the outer membrane transporter that binds the Fe3+-siderophore complex. The barrel of the transporter, consisting of 22 β-sheets and an inside plug, binds the iron complex in the barrel entrance.
