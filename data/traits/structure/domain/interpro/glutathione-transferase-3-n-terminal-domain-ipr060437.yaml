identifier: InterPro:IPR060437
label: "Glutathione transferase 3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of GTT3 (glutathione transferase 3) from Saccharomyces cerevisiae and similar sequences found in Saccharomycetales. GTT3 is a nuclear membrane protein that localises to the nuclear periphery. It contains two transmembrane helices and is classified as a multi-pass membrane protein. This N-terminal domain is predicted to be cytoplasmic and contains multiple phosphorylation sites.
