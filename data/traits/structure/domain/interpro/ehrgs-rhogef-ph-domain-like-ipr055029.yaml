identifier: InterPro:IPR055029
label: "EhRGS-RhoGEF, PH domain-like"
definition: >-
  This entry represents the PH-like domain of a RGS-RhoGEF from Entamoeba histolytica (EhRGS-RhoGEF, ) which, like its mammalian homologues, serves as an EhGalpha1 effector and signals through Rho family GTPases playing important roles in its pathogenesis. This domain mediates activation of Rho family GTPases.
