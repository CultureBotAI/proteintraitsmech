identifier: InterPro:IPR012413
label: "BA14k, C-terminal domain"
definition: >-
  BA14K is strongly immunoreactive; it induces both humoral and cellular responses in hosts throughout the infective process. It has lectin-like properties, and may play a role in the synthesis of smooth lipopolysaccharide. This entry represents the C-terminal domain of BA14K.
