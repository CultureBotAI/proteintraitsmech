identifier: InterPro:IPR037610
label: "Stromal interaction molecule 2, SAM domain"
definition: >-
  STIM1 (Stromal Interaction Molecule 1) is a key Ca2+ sensor located in the membrane of the endoplasmic reticulum (ER). Upon depletion of ER Ca2+ stores, STIM1 undergoes a conformational change and oligomerises, migrating to ER-plasma membrane junctions to activate Orai1, a Ca2+-release-activated Ca2+ (CRAC) channel, in the plasma membrane. STIM1 contains a single SAM (sterile alpha motif) domain ( ) and an unpaired EF-hand domain ( ) in the conserved luminal region, which together serve as a Ca2+-sensing module. These domains form a stable intramolecular complex when Ca2+ is bound. During Ca2+ depletion, destabilisation of the EF-SAM interaction leads to partial unfolding and promotes homooligomerisation, an essential step for CRAC channel activation. The cytoplasmic region includes coiled-coil domains that are conserved in structure and position and are necessary for interaction with Orai1. In human cells, STIM1 and its homologue STIM2 regulate store-operated calcium entry (SOCE) as well as basal cytoplasmic Ca2+ levels. This entry represents the SAM domain of STIM2.
