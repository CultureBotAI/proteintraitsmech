identifier: InterPro:IPR041361
label: "Nidovirus helicase, RING/Ubox like zinc-binding domain"
definition: >-
  This is a zinc binding domain found in nidovirus helicase. It includes includes 12 or 13 conserved Cys/His residues. Amino acid substitutions in ZBD or the adjacent spacer that connects it to the downstream domain can profoundly affect EAV (equine arteritis virus) helicase activity and RNA synthesis, with most replacements of conserved Cys or His residues yielding replication-negative virus phenotypes.
