identifier: InterPro:IPR056487
label: "DpnD, N-terminal domain"
definition: >-
  This entry represents a presumed domain found at the N-terminal of DpnD protein from Streptococcus pneumoniae and similar sequences from bacteria. These proteins are functionally uncharacterised. This domain is predicted to be all helical.
