identifier: InterPro:IPR056544
label: "Nucleoporin POM152, immunoglobulin-like domain"
definition: >-
  This domain is found in Nucleoporin POM152 from Schizosaccharomyces pombe and similar fungal proteins. This domain is predicted to adopt an immunoglobulin-like structure. POM152 functions as a component of the nuclear pore complex (NPC). This protein consists of an N-terminal transmembrane domain (TMD) and an extended C-terminal domain (CTD) with tandem repeats of Ig-like domains.
