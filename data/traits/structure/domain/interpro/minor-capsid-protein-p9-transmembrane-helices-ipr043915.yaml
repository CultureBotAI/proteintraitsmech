identifier: InterPro:IPR043915
label: "Minor capsid protein P9 transmembrane helices"
definition: >-
  This entry, previously known as DUF5762, represents the N-terminal transmembrane helices of the minor capsid protein P9 found in PBCV-1 and related viruses. These transmembrane helices are inserted in the bilayer membrane of the virus vesicle structure. P9 plays a role in the stabilisation of the capsomers.
