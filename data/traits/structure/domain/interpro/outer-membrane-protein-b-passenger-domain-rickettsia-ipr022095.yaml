identifier: InterPro:IPR022095
label: "Outer membrane protein B, passenger domain, Rickettsia"
definition: >-
  This domain is found in the outer membrane protein B of Rickettsia (rOmpB), a surface-exposed major structural protein which is involved in adhesion and invasion of host cells, playing a role as a rickettsial virulence factor and immunogen during infection, as it serves as a protective envelope. These proteins contain two structural segments, an N-terminal long passenger domain (composed of a β-solenoid structural repeat), that serves as an adhesin and a C-terminal β-barrel, an autotransporter domain . The passenger domain is methylated at its lysine residues by PKMT1 and PKMT2, and this methylation appears to be associated with rickettsial pathogenicity and immunogenic response. This entry covers a section found in the middle region of the passenger domain.
