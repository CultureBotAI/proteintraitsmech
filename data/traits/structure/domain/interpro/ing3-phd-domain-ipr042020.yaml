identifier: InterPro:IPR042020
label: "ING3, PHD domain"
definition: >-
  This entry represents the PHD domain of ING3. Inhibitor of growth protein 3 (ING3) is a member of the ING family of tumour suppressors that regulate cell cycle progression, apoptosis and DNA repair. ING3 is a component of the NuA4 histone acetyltransferase complex and the SWR1-like complex that specifically mediates the removal of histone H2A.Z/H2AFZ from the nucleosome. ING3 contains an N-terminal ING domain and a C-terminal plant homeodomain (PHD) finger.
