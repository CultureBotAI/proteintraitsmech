identifier: InterPro:IPR007430
label: "Bacterial virulence protein VirB8-like"
definition: >-
  VirB8 is a bacterial virulence protein with cytoplasmic, transmembrane, and periplasmic regions. It is thought that it is a primary constituent of a DNA transporter. The periplasmic region interacts with VirB9, VirB10, and itself. It is required for stabilisation of VirB3 (an inner membrane protein). This entry also includes the conjugal transfer protein family TrbF, a family of proteins known to be involved in conjugal transfer. The TrbF protein is thought to compose part of the pilus required for transfer. Type IV secretion system protein TrwG, also known as VirB8, is a component of the Trw type IV secretion system (T4SS), which is involved in bacterial conjugation of plasmid R388, a conjugative plasmid that confers resistance to sulfonamide and trimethoprim.
