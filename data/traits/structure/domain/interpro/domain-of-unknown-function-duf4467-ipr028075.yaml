label: "Domain of unknown function DUF4467"
definition: >-
  A large family of predicted lipoproteins from Gram-positive bacteria have this domain, which has a cystatitin-like fold, suggesting that they belong to the NTF2-like superfamily, despite a lack of any detectable sequence similarity to other families in the superfamily.
