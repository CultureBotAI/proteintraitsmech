identifier: InterPro:IPR049385
label: "FAK1-like, FERM domain C-lobe"
definition: >-
  FAK1 (focal adhesion kinase 1) is a non-receptor tyrosine kinase that localises to focal adhesions in adherent cells and it is involved in diverse cellular roles. The N-terminal region of FAK1 contains a FERM domain which is subdivided FERM_N or A-lobe, FERM_M or B-lobe and FERM_C or C-lobe. This entry represents the C-lobe, which is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites. This domain is also present in protein-tyrosine kinase 2-beta (also known as PYK2), a cytoplasmic, non-receptor tyrosine kinase which is a close paralogue to FAK in vertebrates. FRMPD1/3/4 also contain this domain; FRMPD1 regulates the subcellular location of activator of G-protein signalling 3 and its interaction with G-proteins. FRMPD4 has been shown to regulate dendritic spine morphogenesis and the function of FRMPD3 is not clear.
