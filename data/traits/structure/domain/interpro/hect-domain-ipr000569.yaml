identifier: InterPro:IPR000569
label: HECT domain
definition: >-
  The HECT (Homologous to the E6-AP Carboxyl Terminus) domain is an around 350 amino acids motif that has been identified in proteins that all belong to a particular E3 ubiquitin-protein ligase family. HECT domain containing proteins accept ubiquitin from an E2 ubiquitin-conjugating enzyme in the form of a thioester and then transfer it to lysine side chains of target proteins, and transfers additional ubiquitin molecules to the end of growing ubiquitin chains. The site of ubiquitin thioester formation is a conserved cysteine residue located in the last 32-36 aa of the HECT domain. The amino-terminal part of the HECT domain has been involved in E2 binding. Once linked to ubiquitin, the target proteins are degraded in the 26 S proteasome.
