identifier: InterPro:IPR000177
label: "Apple domain"
definition: >-
  Plasma kallikrein ( ) and coagulation factor XI ( ) are two related plasma serine proteases activated by factor XIIA and which share the same domain topology: an N-terminal region that contains four tandem repeats of about 90 amino acids and a C-terminal catalytic domain. The 90 amino-acid repeated domain contains 6 conserved cysteines. It has been shown that three disulphide bonds link the first and sixth, second and fifth, and third and fourth cysteines. The domain can be drawn in the shape of an apple (see below) and has been accordingly called the 'apple domain'. x x x x x x x C---C x x x x x x Cx x x x x | x x x Schematic representation of an x Cx x x x apple domain. x x x x x x x x x x x x x x x x x x x C---C .....x x..... Apart from the cysteines, there are a number of other conserved positions in the apple domain. The apple domains of plasma prekallikrein are known to mediate its binding to high molecular weight kininogen, the apple domains of factor XI bind to factor XIIa, platelets, kininogen, factor IX and heparin.
