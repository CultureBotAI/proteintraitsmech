identifier: InterPro:IPR059338
label: "Domain of unknown function DUF8294"
definition: >-
  This domain is found in uncharacterised proteins mainly from Desulfobacterales. It is predicted to fold into an open barrel structure decorated with α-helices. It contains a conserved DGRxF sequence motif which may be important for function.
