identifier: InterPro:IPR063298
label: "TIM14, N-terminal transmembrane region"
definition: >-
  This entry represents the N-terminal transmembrane region in plant TIM14 proteins and related proteins. The region is found in eukaryotes. This region contains a single transmembrane helix that anchors the protein to the mitochondrial inner membrane. TIM14 proteins also contain a C-terminal DnaJ/J domain. TIM14 is a component of the PAM complex required for translocation of proteins into the mitochondrial matrix.
