identifier: InterPro:IPR005062
label: "SAC3/GANP/THP3, conserved domain"
definition: >-
  This domain contains one highly conserved negatively charged residue and one highly conserved positively charged residue that are probably important for the function of these proteins. Proteins containing this domain include the yeast nuclear export factor Sac3, and mammalian GANP/MCM3-associated protein, which facilitates the nuclear localisation of MCM3, a protein that associates with chromatin in the G1 phase of the cell-cycle. It also includes yeast Thp3 (THO-related protein 3), which may have a role in transcription elongation.
