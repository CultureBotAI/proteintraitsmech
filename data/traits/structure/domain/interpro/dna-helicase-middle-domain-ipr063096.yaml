identifier: InterPro:IPR063096
label: "DNA helicase, middle domain"
definition: >-
  This entry represents a middle domain of approximately 167 residues found in DNA helicases from Bacteroidota. The domain is located between the PIF1 helicase domain ( ) and the HRDC domain ( ). PIF1 family helicases are involved in DNA replication, recombination and repair, and typically contain AAA ATPase activity. The HRDC domain is thought to be involved in DNA binding. The specific function of this middle domain remains to be determined.
