identifier: InterPro:IPR054747
label: "GLMA-like, C-terminal"
definition: >-
  This entry represents a β-sandwich domain found at the C-terminal of exo-beta-D-glucosaminidase from Thermococcus kodakarensis (GLMA) and similar archaeal proteins. It is an exo-type enzyme that specifically cleaves the non-reducing terminal glycosidic bond of chitooligosaccharides, being involved in chitin degradation.
