identifier: InterPro:IPR062462
label: "Dyf-4, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of protein dyf-4 and related proteins found in nematodes. Dyf-4 from Caenorhabditis elegans is a secreted glycoprotein that is required for the localisation of daf-6 to the socket glial channel and sheath lumen. Dyf-4 is expressed in sheath and socket glial cells in amphid and phasmid ciliated sensory neurons, where it plays a role in dendrite extension and ciliogenesis to ensure proper formation of glial channels. The protein is secreted into the sensory compartment region and interacts with daf-6. Mutagenesis of Cys-366 in this C-terminal region causes ciliogenesis defects and impairs protein localisation. The specific function of this C-terminal domain remains to be determined.
