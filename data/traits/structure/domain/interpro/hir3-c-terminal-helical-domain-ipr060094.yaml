identifier: InterPro:IPR060094
label: "HIR3, C-terminal helical domain"
definition: >-
  This entry represents the C-terminal helical domain of histone transcription regulator 3 (HIR3) and related proteins from saccharomycetes. This C-terminal domain consists of multiple α-helices arranged in a compact fold. The C-terminal region contains a disordered segment that may provide flexibility for protein interactions. The specific molecular functions of this C-terminal domain within the HIR complex remain to be determined. HIR3 belongs to the HIR3/CABIN1 family and has a role in nucleosome assembly pathways that are required for heterochromatin integrity and proper chromosome segregation. The protein is involved in chromatin organisation and transcriptional regulation. HIR3 is a component of the HIR complex and is localised to the nucleus. In yeast, HIR3 is a repressor of histone gene transcription. It also has a role in nucleosome assembly.
