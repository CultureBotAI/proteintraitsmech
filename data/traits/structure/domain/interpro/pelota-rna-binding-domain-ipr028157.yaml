identifier: InterPro:IPR028157
label: "PELOTA RNA-binding domain"
definition: >-
  This RNA-binding PELOTA domain is at the C terminus of a phosphoribosyltransferase (PRTase) family. These PRTase+Pelota genes are found in the biosynthetic operon associated with the Ter stress response operon, and are predicted to be involved in the biosynthesis of a ribo-nucleoside involved in stress response. However, at least one protein predicted to possess this domain ( ) has been shown to posses cysteine protease activity.
