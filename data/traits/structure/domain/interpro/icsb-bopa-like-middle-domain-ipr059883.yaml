identifier: InterPro:IPR059883
label: "IcsB/BopA-like, middle domain"
definition: >-
  This entry represents the middle domain of IcsB, BopA and similar sequences. IcsB is a virulence-associated N-epsilon-fatty acyltransferase from Shigella flexneri. The full-length IcsB protein mediates lysine-stearoylation of host Rho GTPase proteins, disrupting the host actin cytoskeleton and enabling bacterial escape from autophagy. IcsB is secreted via the type III secretion system and localises to Shigella-containing host vacuoles where it modifies its substrates. These proteins belong to the BopA/IcsB family and are essential for bacterial virulence at the post-invasion stage. While the full-length protein has demonstrated acyltransferase activity with specific active site residues identified, the specific function of this middle domain remains to be determined.
