identifier: InterPro:IPR048662
label: "Integrator complex subunit 11, C-terminal domain"
definition: >-
  IntS11 is the catalytic component of integrator complex (INT), which is involved in the small nuclear RNAs (snRNA) U1 and U2 transcription and in their 3'-box-dependent processing. This entry represents the C-terminal domain (CTD) of IntS11 which interacts with the C-terminal of IntS9 ( ), which is a crucial interaction for the role of INT in snRNA 3'-end processing. The IntS9-IntS11 CTD complex is composed of a continuous nine-stranded β-sheet with four strands from IntS9 and five from IntS11 ( ). IntS11 is responsible for the endonuclease activity of INT.
