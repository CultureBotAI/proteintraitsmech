identifier: InterPro:IPR028969
label: "Immunity protein 52"
definition: >-
  This entry represents a domain found in bacteria, including the type VI secretion system (T6SS) immunity protein TsiT from Pseudomonas aeruginosa ( ), which belongs to the Imm52 family. This protein can suppress the virulence of TseT. TsiT adopts a β-sandwich fold with nine α-helices and an eight-stranded antiparallel central β-sheet. It has a large electro-negative pocket with hydrophobic surroundings that play a role in the interaction with TseT. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Tox-REase-5 family.
