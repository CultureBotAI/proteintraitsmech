identifier: InterPro:IPR055363
label: "PTHB1, hairpin domain"
definition: >-
  This entry represents a hairpin domain found in PTHB1 protein and PTHB1 homolog from C. elegans. PTHB1 (also known as Bardet-Biedl syndrome 9 protein, BBS9) forms a part of the BBSome complex, which is required for ciliogenesis. PTHB1 is the major binding subunit of the IFT38 C-terminal tail, which assists the BBSome in some of its roles.
