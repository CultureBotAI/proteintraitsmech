identifier: InterPro:IPR009715
label: "Regulator of RNA terminal phosphate cyclase"
definition: >-
  RtcR is a sigma54-dependent enhancer binding protein that activates transcription of the rtcBA operon. The product of the rtcA gene is an RNA 3 -terminal phosphate cyclase. This domain is found at the N terminus of the RtcR sequence. RtcR, and other sigma54-dependent activators, contain in the central region of the protein sequence.
