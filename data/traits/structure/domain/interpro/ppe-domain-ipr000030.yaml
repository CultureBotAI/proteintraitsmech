identifier: InterPro:IPR000030
label: "PPE domain"
definition: >-
  This entry represents a domain found in proteins from actinomycetes named after a conserved N-terminal region of about 180 amino acids, the PPE motif. The C-terminal end of proteins belonging to the PPE family is variable, and on the basis of this region at least three groups can be distinguished. The MPTR subgroup is characterised by tandem copies of a motif NXGXGNXG. The second subgroup contains a conserved motif at about position 350. The third group shares only similarity in the amino terminal region. The function of these proteins is uncertain but it has been suggested that they may be related to antigenic variation of Mycobacterium tuberculosis. Some members of this family are associated with virulence and evasion of host immune response as they have a role in preventing ROS generation. The human pathogen Mycobacterium tuberculosis harbours a large number of genes that encode proteins whose N-terminals contain the characteristic motifs Pro-Glu (PE) or Pro-Pro-Glu (PPE). These proteins are exported to the bacterial surface via type VII secretion systems known as ESX. A subgroup of the PE proteins contains polymorphic GC-rich sequences (PGRS), while a subgroup of the PPE proteins contains major polymorphic tandem repeats (MPTR). The function of most of these proteins remains unknown. However, the PE_PGRS proteins from Mycobacterium marinum are secreted by components of the ESX-5 system that belongs to the recently defined type VII secretion systems. It has also been reported that the PE_PGRS family of proteins contains multiple calcium-binding and glycine-rich sequence motifs GGXGXD/NXUX. This sequence repeat constitutes a calcium-binding parallel β-roll or parallel β-helix structure and is found in RTX toxins secreted by many Gram-negative bacteria. PPE51 member h…
