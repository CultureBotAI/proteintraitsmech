identifier: InterPro:IPR047317
label: "Mucolipin-3, extracytosolic/lumenal domain"
definition: >-
  This entry represents the extracytosolic/lumenal domain (ELD), a linker located between the first two transmembrane segments (S1 and S2), of ML3 and similar proteins found in vertebrates. It forms a tight tetramer that is crucial for full-length ML3 assembly and localisation. Mucolipin-3 (ML3), also called TRPML3, acts as Ca2-permeable cation channel with inwardly rectifying activity. It mediates release of Ca2 from endosomes to the cytoplasm, contributes to endosomal acidification and is involved in the regulation of membrane trafficking and fusion in the endosomal pathway. It is also involved in regulation of autophagy.
