identifier: InterPro:IPR037684
label: "Guanylate-binding protein, C-terminal"
definition: >-
  Guanylate-binding protein (GBP) is a cytokine-induced GTPase that hydrolyzes guanosine triphosphate (GTP) to both guanosine diphosphate (GDP) and GMP. It has the properties of nucleotide-dependent oligomerization and concentration-dependent GTPase activity.
