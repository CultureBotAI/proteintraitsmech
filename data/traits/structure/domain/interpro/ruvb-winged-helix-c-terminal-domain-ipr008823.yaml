identifier: InterPro:IPR008823
label: RuvB, winged helix, C-terminal domain
definition: >-
  This entry represents the C-terminal region of the RuvB protein which is thought to be an helicase DNA-binding domain. The RuvB protein makes up part of the RuvABC resolvasome which catalyses the resolution of Holliday junctions that arise during genetic recombination and DNA repair. Branch migration is catalysed by the RuvB protein that is targeted to the Holliday junction by the structure specific RuvA protein. RuvB is part of the AAA+ superfamily of ATPases.
