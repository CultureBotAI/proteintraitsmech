identifier: InterPro:IPR055220
label: "Spartan-like, zinc binding domain"
definition: >-
  This zinc binding domain (ZBD) is found in DNA-dependent metalloprotease Spartan (SPRTN) and its homologues. SPRTN cleaves DNA-protein crosslinks (DPCs) and protects cells from DPC-induced genome instability. The zinc binding domain is located in close proximity to the catalytic domain and contributes to the ssDNA specificity of SPRTN.
