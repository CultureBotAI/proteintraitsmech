identifier: InterPro:IPR040800
label: "Methyltransferase MycE, N-terminal"
definition: >-
  This is the N-terminal domain found in MycE from the mycinamicin biosynthetic pathway. MycE is a tetramer of a two-domain polypeptide, comprising a C-terminal catalytic MT domain and an N-terminal auxiliary domain, which is important for quaternary assembly and for substrate binding.
