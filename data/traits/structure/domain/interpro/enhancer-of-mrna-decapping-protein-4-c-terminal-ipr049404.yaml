identifier: InterPro:IPR049404
label: "Enhancer of mRNA-decapping protein 4, C-terminal"
definition: >-
  Enhancer of mRNA-decapping protein 4 (EDC4, also known as Ge-1), is a regulator of mRNA decapping to function in the mRNA P-bodies within the cytoplasm. It has been shown to interact with mTORC1, coenzyme A synthase and MARF1. It is also involved in the regulation of immune system. This is the C-terminal domain which is necessary and sufficient for P-body targeting and in plants, it also mediates DCP1 and DCP2 interaction, as well as self-association. It adopts an helical-repeat fold similar to that of ARM/HEAT repeat proteins.
