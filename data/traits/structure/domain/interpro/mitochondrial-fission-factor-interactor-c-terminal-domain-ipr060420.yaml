identifier: InterPro:IPR060420
label: "Mitochondrial fission factor interactor, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of mitochondrial fission factor interactor (MFI), also known as C11orf65 in human. The specific function of this C-terminal domain remains to be determined. MFI acts as an inhibitor of mitochondrial fission as it interacts with mitochondrial fission factor (MFF) and prevents dynamin-1-like protein (DNM1L) recruitment to mitochondria, promoting a more fused mitochondrial network. MFI protein is predominantly localised to the cytosol with a minor fraction at the outer mitochondrial membrane and is enriched in pancreatic beta cells and testis.
