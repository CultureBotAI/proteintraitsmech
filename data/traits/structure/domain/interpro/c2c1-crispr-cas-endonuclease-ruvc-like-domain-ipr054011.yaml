identifier: InterPro:IPR054011
label: "C2c1 CRISPR-Cas endonuclease, RuvC-like domain"
definition: >-
  This entry represents the RuvC-like domain of C2c1 CRISPR-Cas endonuclease (also known as Cas12b). C2c1 is a class 2 type V-B effector protein that was shown to be active for target DNA cleavage in vivo and in vitro. In contrast to Cpf1, this enzyme cleavage activity requires both crRNA and tracrRNA. The structure of C2c1 consists of an α-helical recognition (REC) lobe, including Helical-I and Helical-II, and a NUC lobe, including OBD, RuvC, and two Nuc domains.
