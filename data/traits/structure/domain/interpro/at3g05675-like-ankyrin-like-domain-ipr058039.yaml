identifier: InterPro:IPR058039
label: "At3g05675-like, ankyrin-like domain"
definition: >-
  This entry describes a region of ankyrin-like repeats found at the C-terminal of BTB/POZ containing proteins mostly from plants, including At3g05675, At2g13690, At1g63850, At5g60050 and At3g50780 from Arabidopsis thaliana. At3g05675 and related proteins may act as a substrate-specific adapter of an E3 ubiquitin-protein ligase complex (CUL3-RBX1-BTB) which mediates the ubiquitination and subsequent proteasomal degradation of target proteins.
