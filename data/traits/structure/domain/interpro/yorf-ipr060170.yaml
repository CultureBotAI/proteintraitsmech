identifier: InterPro:IPR060170
label: YorF
definition: >-
  This entry represents YorF proteins found in Bacillus and related bacteria, as well as in bacteriophages. The proteins are typically around 300 amino acids in length and may adopt a distorted OB-fold structure. YorF is derived from the SPbeta prophage integrated in Bacillus subtilis chromosome at locus BSU20400. The proteins contain a C-terminal disordered region rich in basic and acidic residues. The function of this protein remains to be determined.
