identifier: InterPro:IPR049030
label: "AI2M/AI1M-like, HNH endonuclease domain"
definition: >-
  This is the HNH endonuclease domain found in a set of group II intron proteins, including AIM1/2 from yeast and its orthologue from S. pombe. This domain is also found in related bacterial sequences.
