identifier: InterPro:IPR057352
label: "TmcB/TmcC, TPR repeats"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found in Tiny macrocysts protein B and C from Dictyostelium discoideum (TmcB and TmcC) and similar eukaryotic proteins. TmcB is a regulator of the cAMP signalling pathway specific to sexual development. It controls the levels of external cAMP by regulating the expression of phosphodiesterase PdsA and its inhibitor PdiA. Knockout mutants of tmcC gene were indistinguishable from the wild type cells with respect to the cAMP response, suggesting that this gene is relevant to other processes.
