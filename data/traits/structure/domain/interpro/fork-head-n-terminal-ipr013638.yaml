identifier: InterPro:IPR013638
label: Fork-head N-terminal
definition: >-
  The region described in this entry is found towards the N terminus of various eukaryotic fork head/HNF-3-related transcription factors (which contain the domain). These proteins play key roles in embryogenesis, maintenance of differentiated cell states, and tumorigenesis.
