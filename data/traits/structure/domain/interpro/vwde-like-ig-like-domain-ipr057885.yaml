definition: >-
  This predicted immunoglobulin (Ig) domain is found in VWDE and similar sequences. This domain is often found associated with and . von Willebrand factor D and EGF domain-containing protein (WWDE) is predicted to enable signalling receptor binding activity and to be active in the cell surface and extracellular region.
