identifier: InterPro:IPR041577
label: "Reverse transcriptase/retrotransposon-derived protein, RNase H-like domain"
definition: >-
  DNA polymerase and ribonuclease H (RNase H) activities allow reverse transcriptases to convert the single-stranded retroviral RNA genome into double-stranded DNA, which is integrated into the host chromosome during infection. This domain can also be found in animal retrotransposon-like proteins. This entry represents the RNase H-like domain found in a group of reverse transcriptases.
