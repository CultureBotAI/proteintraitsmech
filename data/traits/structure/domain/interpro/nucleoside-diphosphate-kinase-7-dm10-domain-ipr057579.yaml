identifier: InterPro:IPR057579
label: "Nucleoside diphosphate kinase 7, DM10 domain"
definition: >-
  This entry represents the DM10 domain in nucleoside diphosphate kinase 7 (NDK7) proteins. This domain is found preceding either one or two nucleoside diphosphate kinase (NDK) catalytic domains. DM10 domains might act as flagellar NDK regulatory modules or as units specifically involved in axonemal targeting or assembly. DM10 domains have the same organisation of secondary structural elements, a pleckstrin homology (PH)-like fold, which includes seven β strands, with a short 3-4 residue helix after the first strand, and a more extended α helical region at the C-terminal. Human NDK7 is a functional component of the gamma-tubulin ring complex, implicated in the regulation of the microtubule-nucleating activity of the gamma-tubulin ring complex in centrosomes, in a kinase activity-dependent manner. It is part of the dynein-decorated doublet microtubules (DMTs) in cilia axoneme, which is required for motile cilia beating.
