identifier: InterPro:IPR063234
label: "ECM9, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of protein ECM9. ECM9 proteins are involved in cell wall organisation and biogenesis in fungi. The proteins belong to the protein prenylyltransferase superfamily and show similarity to Rab-protein geranylgeranyltransferase complex components. ECM9 is found in the cytoplasm and is associated with endoplasmic reticulum to Golgi vesicle-mediated transport processes. The protein is present at approximately 846 molecules per cell during log phase growth.
