identifier: InterPro:IPR062660
label: "SINE4, KASH-like domain"
definition: >-
  This entry represents the KASH-like domain found in SINE4 and related proteins from Brassicaceae plants including Arabidopsis, Brassica and Raphanus. SINE4 localises to the nuclear envelope membrane and interacts with the SUN domain proteins SUN1 and SUN2. The KASH domain contains a transmembrane region and mediates nuclear envelope targeting and binding to SUN proteins. A C-terminal motif is required for nuclear localisation. SUN and KASH domain proteins form the LINC complex which bridges the inner and outer nuclear membranes.
