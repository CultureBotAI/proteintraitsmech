identifier: InterPro:IPR012437
label: "Domain of unknown function DUF1638"
definition: >-
  This entry contains sequences covering an approximately 270 amino acid stretch of a group of hypothetical proteins and are confined to Bacteria and Archaea. DUF1638 domain-containing protein, such as PGA1_c13340 from Phaeobacter inhibens, is suggested to be involved in the synthesis of vitamin B12.
