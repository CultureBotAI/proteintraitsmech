identifier: InterPro:IPR040896
label: "26S proteasome regulatory subunit RPN5, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the 26S proteasome regulatory subunit RPN5. This helical domain can be found adjacent to the PCI domain. The 26S proteasome is the major ATP-dependent protease in eukaryotes that consists of three subcomplexes: the lid, the base, and the core. The helices found at the C terminus of each lid subunit form a helical bundle that directs the ordered self-assembly of the lid subcomplex. This domain which comprises the tail of RPN5 along with the tail of RPN9, are important for RPN12 binding to the lid.
