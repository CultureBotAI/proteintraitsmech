identifier: InterPro:IPR062030
label: "DEF265-like, conserved domain"
definition: >-
  This entry represents a conserved domain found in defensin 265-267 from plants. This domain is found in secreted antimicrobial proteins that function in plant defense responses against fungi. The mature domain contains three conserved disulfide bonds, though some family members lack one of the typical four bonds. The domain is involved in defense response to fungus and killing of cells of other organisms. Over 300 defensin-like genes are present in the Arabidopsis genome.
