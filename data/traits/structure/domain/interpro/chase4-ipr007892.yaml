identifier: InterPro:IPR007892
label: CHASE4
definition: >-
  CHASE4 is an extracellular sensory domain, which is present in various classes of transmembrane receptors that are upstream of signal transduction pathways in prokaryotes. Specifically, CHASE4 domains are found in histidine kinases in archaea and in predicted diguanylate cyclases/phosphodiesterases in bacteria. Environmental factors that are recognised by CHASE4 domains are not known at this time.
