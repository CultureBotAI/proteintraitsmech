identifier: InterPro:IPR057826
label: "C20G8.02-like, WWE domain"
definition: >-
  This entry represents a WWE domain found in Probable phospholipase C20G8.02, mitochondrial from Schizosaccharomyces pombe, Phospholipase SGR2 from Arabidopsis thaliana and similar eukaryotic proteins. C20G8.02 is likely to have a phospholipase activity that hydrolyzes phosphatidic acid. SGR2 is involved in the vacuolar formation or function (e.g. formation of vacuolar membrane 'bulbs'). It is particularly important for the negative gravitropism leading to leaf movement observed in darkness. This domain is usually found associated with .
