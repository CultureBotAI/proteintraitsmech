label: "Sodium:neurotransmitter symporter, serotonin, N-terminal"
definition: >-
  The serotonin (5-HT) neurotransmitter transporter is known to be expressed in the brain and also in the periphery: on platelet, placental and pulmonary cell membranes. The brain 5-HT transporter is thought to be the principal site of action of therapeutic anti-depressants (which inhibit this transporter), and it may also mediate the behavioural effects of cocaine and amphetamines. The human form (630 amino acids) is 92% identical to the rat brain 5-HT transporter, and shares the same predicted topology and conserved sites for post-translational modification. This domain is found at the N-terminal region of some 5-HT neurotransmitters. Neurotransmitter transport systems are integral to the release, re-uptake and recycling of neurotransmitters at synapses. High affinity transport proteins found in the plasma membrane of presynaptic nerve terminals and glial cells are responsible for the removal from the extracellular space of released-transmitters, thereby terminating their actions. Plasma membrane neurotransmitter transporters fall into two structurally and mechanistically distinct families. The majority of the transporters constitute an extensive family of homologous proteins that derive energy from the co-transport of Na + and Cl - , in order to transport neurotransmitter molecules into the cell against their concentration gradient. The family has a common structure of 12 presumed transmembrane helices and includes carriers for gamma-aminobutyric acid (GABA), noradrenaline/adrenaline, dopamine, serotonin, proline, glycine, choline, betaine and taurine. They are structurally distinct from the second more-restricted family of plasma membrane transporters, which are responsible for excitatory amino acid transport. The latter couple glutamate and aspartate uptake to the c…
