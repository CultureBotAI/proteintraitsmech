identifier: InterPro:IPR063226
label: "Galacturonosyltransferase, helical domain"
definition: >-
  This entry represents a domain found in galacturonosyltransferases, hexosyltransferases, and related proteins found in plants. It contains a three-helical bundle that is specific to galacturonosyltransferases 2, 3, 4, 5, 6, 7, and 10. Although other galacturonosyltransferases may also contain a helical domain, they do not contain this specific domain.
