identifier: InterPro:IPR047564
label: "Ankyrin repeat and IBR domain-containing protein 1, Rcat domain"
definition: >-
  This entry represents the Rcat domain of ANKIB1 and similar proteins predominantly found in vertebrates. It is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. Ankyrin repeat and IBR domain-containing protein 1 (ANKIB1) is an RBR-type E3 ubiquitin-protein ligase that may function as part of an E3 complex, which accepts ubiquitin from specific E2 ubiquitin-conjugating enzymes and then transfers it to substrates. It contains an N-terminal ankyrin repeat domain and an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD (two RING fingers and a DRIL (double RING finger linked)) domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been corrected as RING-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR (RING1-BRcat-Rcat) domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase function to facilitate the ubiquitination reaction.
