identifier: InterPro:IPR046826
label: "Prephenate dehydrogenase, nucleotide-binding domain"
definition: >-
  This entry includes prephenate dehydrogenases (PDHs) involved in tyrosine biosynthesis, and related proteins predominantly found in bacteria. This is the N-terminal nucleotide-binding domain of PDHs, which has a modified Rossmann nucleotide-binding fold with an extended β-sheet sandwiched by three helices on each face.
