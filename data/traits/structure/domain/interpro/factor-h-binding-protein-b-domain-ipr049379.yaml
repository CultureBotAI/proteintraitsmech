identifier: InterPro:IPR049379
label: "Factor H binding protein B domain"
definition: >-
  Treponema denticola, a human pathogen that contributes to periodontitis, survives by binding factor H (FH) to its surface through its Factor H binding protein B (FhbB). The structure of this protein is highly ordered consisting of an α-β fold. This highly thermostable protein forms a weak dimer with an interface occurring along one α-helix from each subunit in an anti-parallel alignment with no direct hydrogen bonding between the subunits. This domain covers most of the protein length in some sequences, including FhbB from Treponema denticola ( ).
