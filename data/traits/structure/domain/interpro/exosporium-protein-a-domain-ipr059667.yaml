identifier: InterPro:IPR059667
label: "Exosporium protein A domain"
definition: >-
  This entry represents the exosporium protein A (CsxA) family found in Clostridium species. CsxA localises to the exosporium, the outermost layer of the bacterial spore. The prototype member from Clostridium sporogenes is a 308 amino acid protein that forms part of the spore surface architecture. This protein is notable for its high cysteine content, particularly in the central region, which likely contributes to the structural integrity of the exosporium through disulphide bond formation.
