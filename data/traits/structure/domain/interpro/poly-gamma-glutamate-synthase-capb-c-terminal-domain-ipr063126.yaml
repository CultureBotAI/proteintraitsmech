identifier: InterPro:IPR063126
label: "Poly-gamma-glutamate synthase CapB, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 140 residues found in poly-gamma-glutamate (PGA) synthase CapB proteins from bacteria. This domain follows the Mur_ligase_M domain ( ). CapB, together with CapA and CapC ( ), forms a membrane- associated complex that synthesises the polyglutamate capsule. In Bacillus anthracis, this capsule is a major virulence factor. The specific function of this C-terminal domain remains to be determined.
