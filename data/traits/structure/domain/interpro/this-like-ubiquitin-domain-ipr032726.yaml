identifier: InterPro:IPR032726
label: "ThiS-like ubiquitin domain"
definition: >-
  This entry represents a domain found in a members of the ubiquitin superfamily that is often fused to the ThiF-like (E1)- ubiquitin activating enzyme and is present in gene neighbourhoods with components of the thiamine biosynthesis pathway.
