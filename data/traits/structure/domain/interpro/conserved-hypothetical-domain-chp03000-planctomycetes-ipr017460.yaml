identifier: InterPro:IPR017460
label: "Conserved hypothetical domain CHP03000, planctomycetes"
definition: >-
  This domain is found, so far, only in the Planctomycetes (Pirellula sp. strain 1 and Gemmata obscuriglobus), in up to six proteins per genome, and may be duplicated within a protein. The function is unknown.
