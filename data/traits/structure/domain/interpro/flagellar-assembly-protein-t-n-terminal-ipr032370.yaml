identifier: InterPro:IPR032370
label: "Flagellar assembly protein T, N-terminal"
definition: >-
  This entry represents the N-terminal domain of FlgT, a flagellar protein that make up part of the basal body of the flagellum. The flagellum is a large macromolecular assembly composed of three major parts: the basal body, the hook, and the filament. The basal body has two unique ring structures, the T ring and the H ring. FlgT is required to form and stabilise both ring structures. FlgT is composed of three domains, the N-terminal domain (FlgT-N), the middle domain (FlgT-M), and the C-terminal domain (FlgT-C). This N-terminal domain contributes to the construction of the H-ring structure, and adopts a two-layer α-β sandwich architecture composed of a four-stranded anti-parallel β-sheet and two α helices.
