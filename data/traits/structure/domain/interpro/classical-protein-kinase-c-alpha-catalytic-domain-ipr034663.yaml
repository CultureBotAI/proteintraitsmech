identifier: InterPro:IPR034663
label: "Classical Protein Kinase C alpha, catalytic domain"
definition: >-
  Protein kinases C (PKCs) constitute a family of Ser/Thr kinases. PKCs are classified into three groups (classical, atypical, and novel) depending on their mode of activation and the structural characteristics of their regulatory domain. Conventional PKCs (cPKCs) have functional C1A and C1B domains, and a C2 domain. PKCs undergo three phosphorylations in order to take mature forms. In addition, cPKCs depend on calcium, DAG (1,2-diacylglycerol), and in most cases, phosphatidylserine for activation. There are three conventional PKC isoenzymes (alpha, beta, and gamma). PKC-alpha is expressed in many tissues and is associated with cell proliferation, apoptosis, and cell motility. It plays a role in the signalling of the growth factors PDGF, VEGF, EGF, and FGF. Abnormal levels of PKC-alpha have been detected in many transformed cell lines and several human tumours. In addition, PKC-alpha is required for HER2 dependent breast cancer invasion.
