identifier: InterPro:IPR010177
label: "Doubled CXXCH motif"
definition: >-
  This entry represents a domain of about 41 amino acids that contains, among other motifs, two copies of the CXXCH motif associated with haem binding. Most proteins in this entry have at least three copies of this domain (i.e. at least six copies of CXXCH) and are predicted to be high molecular weight c-type cytochromes.
