identifier: InterPro:IPR058847
label: "Periplakin-like, plectin repeat domain"
definition: >-
  This plectin repeat is found between two to five times in human Periplakin (PPL) and related vertebrate proteins including Envoplakin but is not present in Envoplakin-like proteins. It is predicted to adopt an α-helical fold. Periplakin is a component of the cornified envelope of keratinocytes and, together with envoplakin, forms a network radiating from desmosomes that likely serves as a scaffold for cornified envelope assembly. These two proteins coimmunoprecipitate and are the most commonly targeted by pathogenic autoantibodies. In addition to its structural role, periplakin may also act as a localisation signal in PKB/AKT-mediated signalling pathways.
