identifier: InterPro:IPR041869
label: "Manganese-dependent ADP-ribose/CDP-alcohol diphosphatase"
definition: >-
  ADP-ribose/CDP-alcohol diphosphatases (ADPRibase-Mn) are metallo-dependent phosphatases, mainly restricted, in eukaryotes, to vertebrates and plants. ADPRibase-Mn enzymes are Mn2+-dependent ADP-ribose/CDP-alcohol diphosphatases that hydrolyze the phosphoanhydride linkage of ADP-ribose and, less efficiently, of CDP-choline, CDP-glycerol and CDP-ethanolamine. In rodents is preferential expressed in immune cells.
