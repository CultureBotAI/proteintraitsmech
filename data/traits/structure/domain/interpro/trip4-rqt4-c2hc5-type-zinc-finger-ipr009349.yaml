identifier: InterPro:IPR009349
label: "TRIP4/RQT4, C2HC5-type zinc finger"
definition: >-
  This entry represents a C2HC5-type zinc finger found in human activating signal cointegrator 1 (ASC-1, also known as TRIP4) and its orthologue from yeast RQC trigger complex subunit RQT4 which function as part of the RQC trigger (RQT) complex that activates the ribosome quality control (RQC) pathway, a pathway that degrades nascent peptide chains during problematic translation. TRIP4 has also been described as a transcription coactivator which associates with nuclear receptors and transcriptional coactivators including EP300, CREBBP and NCOA1, and basal transcription factors like TBP and TFIIA to facilitate nuclear receptors-mediated transcription. Zinc finger (Znf) domains are relatively small protein motifs which contain multiple finger-like protrusions that make tandem contacts with their target molecule. Some of these domains bind zinc, but many do not; instead, they bind other metals, such as iron, or no metal at all. For example, some family members form salt bridges to stabilise the finger-like folds. They were first identified as a DNA-binding motif in transcription factor TFIIIA from Xenopus laevis (African clawed frog); however, they are now recognised to bind DNA, RNA, protein and/or lipid substrates. Their binding properties depend on the amino acid sequence of the finger domains and of the linker between fingers, as well as on the higher-order structures and the number of fingers. Znf domains are often found in clusters, where fingers can have different binding specificities. There are many superfamilies of Znf motifs, varying in both sequence and structure. They display considerable versatility in binding modes, even between members of the same class (e.g., some bind DNA, others protein), suggesting that Znf motifs are stable scaffolds that have evolved s…
