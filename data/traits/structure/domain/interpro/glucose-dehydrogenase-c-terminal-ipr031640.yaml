identifier: InterPro:IPR031640
label: "Glucose dehydrogenase, C-terminal"
definition: >-
  This entry represents the C-terminal domain of glucose dehydrogenase. Glucose 1 dehydrogenase ( ) belongs to the medium-chain alcohol dehydrogenase superfamily and requires zinc for catalysis. It catalyses the NAD(P)(+)-dependent oxidation of D-glucose to D-gluconate via gluconolactone. It is involved in the degradation of glucose through a modified version of the Entner-Doudoroff pathway in Halobacteria and a non-phosphorylative variant of the Entner-Doudoroff pathway in other organisms. This entry includes a group of glucose 1 dehydrogenases from archaea.
