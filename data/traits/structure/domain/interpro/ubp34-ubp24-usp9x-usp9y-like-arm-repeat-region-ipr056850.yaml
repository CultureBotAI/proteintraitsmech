identifier: InterPro:IPR056850
label: "UBP34/UBP24/USP9X/USP9Y-like, ARM repeat region"
definition: >-
  This entry represents an ARM-repeats domain found in ubiquitin carboxyl-terminal hydrolases (UCHs), such as human UBP24, UBP34, USP9X and USP9Y and the orthologues from Drosophila. UCHs are thiol proteases that recognise and hydrolyse the peptide bond at the C-terminal glycine of ubiquitin. UBP24 regulates cell survival in various contexts through modulating the protein stability of some of its substrates including DDB2, MCL1 or TP53. USP9X and USP9Y are involved in deubiquitination of target proteins.
