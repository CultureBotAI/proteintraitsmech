identifier: InterPro:IPR009462
label: CHD subfamily II, SANT-like domain
definition: >-
  CHD proteins (name derived from the presence of a Chromodomain, SWI2/SNF2 ATPase/Helicase and a motif with sequence similarity to a DNA-binding domain) are ATP-dependent chromatin remodelers found in plant and animals. In eukaryotes, there are three subfamilies, I, II and III. This domain is found in members of subfamily II which play a role in repression of genes involved in developmental regulation, including Mi-2 from Drosophila melanogaster, CHD3/4/5 from animals and PICKLE (a CHD3/4-related protein) from Arabidopsis. Sequence analysis revealed that this domain has a considerable similarity to SANT domains suggesting that it fold into this type of domain and it is integral to the DNA binding domain of CHD remodelers in subfamily II.
