identifier: InterPro:IPR003137
label: "PA domain"
definition: >-
  The PA (Protease associated) domain is found as an insert domain in diverse proteases, which include the MEROPS peptidase families A22B, M28, and S8A. The PA domain is also found in a plant vacuolar sorting receptor and members of the RZF family, e.g. . It has been suggested that this domain forms a lid-like structure that covers the active site in active proteases, and is involved in protein recognition in vacuolar sorting receptors.
