identifier: InterPro:IPR058828
label: "CARF/NKRF, DSRM domain"
definition: >-
  This entry represents a dsRNA binding domain found in human CDKN2A-interacting protein (CARF), NF-kappa-B-repressing factor (NKRF) and similar proteins from vertebrates. CARF fegulates DNA damage response in a dose-dependent manner through a number of signaling pathways involved in cell proliferation, apoptosis and senescence. NKRF enhances the ATPase activity of DHX15 by acting like a brace that tethers mobile sections of DHX15 together, stabilising a functional conformation with high RNA affinity of DHX15. It is involved in the constitutive silencing of the interferon beta promoter and in the regulation of IL-8 transcription.
