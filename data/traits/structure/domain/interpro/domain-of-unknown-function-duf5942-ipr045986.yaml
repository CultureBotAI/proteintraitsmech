label: "Domain of unknown function DUF5942"
definition: >-
  This presumed integral membrane domain is functionally uncharacterised. This domain family is found mainly in cyanobacteria and proteobacteria, and is approximately 190 amino acids in length. It is found to the C terminus of PF00082.
