identifier: InterPro:IPR025927
label: "KANL2-like, probable zinc-finger domain"
definition: >-
  This domain is found in the human KAT8 regulatory NSL complex subunit 2 (KANSL2) and related proteins including INO80 complex subunit D (INO80D) and Protein SUMV-1 from C. elegans. It contains six invariant cysteine and two histidines that define a C3HC3H conserved pattern and probably are involved in zinc coordination. KANSL2 is a non-catalytic component of the NSL histone acetyltransferase complex, a multiprotein complex that mediates histone H4 acetylation at Lys-5 and Lys-8 (H4K5ac and H4K8ac) at transcription start sites and promotes transcription initiation. KANSL2 protects the integrity of the NSL complex. KANSL2 has a pair of this domain, the second of which was found to be essential to NSL complex function. INO80D is a member of the INO80 chromatin-modifying complex and has been shown to interact with the NSL complex. Protein SUMV-1 is a nuclear factor that influences the activity of genes involved in vulval development. SUMV-1 physically interacts with SUMV-2 and both likely function together with MYS-2 in a nematode KAT8/MOF-like complex to antagonise the activity of the synMuv genes.
