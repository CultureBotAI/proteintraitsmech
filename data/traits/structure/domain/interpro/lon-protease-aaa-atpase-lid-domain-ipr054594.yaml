identifier: InterPro:IPR054594
label: "Lon protease, AAA+ ATPase lid domain"
definition: >-
  This entry represents the AAA+ ATPase lid domain of Lon proteases. Lon protease belongs to the S16 peptidase family and is an ATP-dependent serine protease that mediates the selective degradation of mutant and abnormal proteins, as well as certain short-lived regulatory proteins. It is required for cellular homeostasis and for survival from DNA damage and developmental changes induced by stress. In pathogenic bacteria, it is required for the expression of virulence genes that promote cell infection. Lon (La) protease was the first ATP-dependent protease to be purified from E. coli. The enzyme is a homotetramer of 87kDa subunits, with one proteolytic and one ATP-binding site per monomer, making it structurally less complex than other known ATP-dependent proteases. Despite this relative structural simplicity, Lon recognises its substrates directly, without delegating the task of substrate recognition to other enzymes.
