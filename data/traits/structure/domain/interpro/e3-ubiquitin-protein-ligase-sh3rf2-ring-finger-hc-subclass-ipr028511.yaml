identifier: InterPro:IPR028511
label: "E3 ubiquitin-protein ligase SH3RF2, RING finger, HC subclass"
definition: >-
  SH3RF2 is also called POSHER (POSH-eliminating RING protein) or HEPP1 (heart protein phosphatase 1-binding protein). It acts as an anti-apoptotic regulator of the JNK pathway by binding to and promoting the degradation of SH3RF1 (or POSH), a scaffold protein that is required for pro-apoptotic JNK activation. It may also play a role in cardiac functions together with protein phosphatase 1. SH3RF2 contains an N-terminal RING finger domain and three SH3 domains. This entry represents the N-terminal C3HC4-type RING-HC finger of SH3RF2 and similar proteins from vertebrates.
