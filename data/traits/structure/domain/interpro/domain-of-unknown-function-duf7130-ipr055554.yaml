identifier: InterPro:IPR055554
label: "Domain of unknown function DUF7130"
definition: >-
  This domain is found in a group of uncharacterised proteins mainly from Halobacteria. It contains highly conserved cysteine residues arranged in two CxxC motifs that likely coordinate zinc. The first motif could be more broadly defined as a semi-conserved MWRCxxCGEM sequence motif. This domain is predicted to adopt a zinc ribbon fold with similarity to rubredoxin-like domains.
