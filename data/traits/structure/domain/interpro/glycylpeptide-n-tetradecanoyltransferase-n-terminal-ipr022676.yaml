identifier: InterPro:IPR022676
label: Glycylpeptide N-tetradecanoyltransferase, N-terminal
definition: >-
  Glycylpeptide N-tetradecanoyltransferase, also known as Myristoyl-CoA:protein N-myristoyltransferase ( ) (Nmt), is the enzyme responsible for transferring a myristate group on the N-terminal glycine of a number of cellular eukaryotics and viral proteins. Nmt is a monomeric protein of about 50 to 60kDa whose sequence appears to be well conserved. In Drosophila, this protein is critical for the developmental processes that involve cell shape changes and movement. The N and C-terminal domains of NMT are structurally similar, each adopting an acyl-CoA N-acyltransferase-like fold. This entry represents the N-terminal region.
