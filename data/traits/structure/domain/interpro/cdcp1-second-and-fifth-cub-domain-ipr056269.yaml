identifier: InterPro:IPR056269
label: "CDCP1, second and fifth CUB domain"
definition: >-
  This domain is found in the human CUB domain-containing protein 1 (CDCP1) and related proteins. This entry represents the second and fifth of the tandem of CUB domains. CDCP1 may be involved in cell adhesion and cell matrix association. It also plays a role in the regulation of anchorage versus migration or proliferation versus differentiation via its phosphorylation. CDCP1 contains a tandem of CUB domains.
