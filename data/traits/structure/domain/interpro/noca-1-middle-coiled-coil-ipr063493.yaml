identifier: InterPro:IPR063493
label: "NOCA-1, middle coiled-coil"
definition: >-
  This entry represents the middle coiled-coil domain of NOCA-1 (Non-centrosomal microtubule array protein 1). NOCA-1 plays a role in the assembly of microtubule arrays in the germline and is required for microtubule stability and anchorage by binding to microtubule minus ends. The protein is recruited to hemidesmosomes in early embryonic elongation to direct the nucleation and growth of non-centrosomal microtubules.
