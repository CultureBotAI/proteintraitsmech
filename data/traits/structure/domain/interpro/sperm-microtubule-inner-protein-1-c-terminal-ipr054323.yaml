identifier: InterPro:IPR054323
label: "Sperm microtubule inner protein 1, C-terminal"
definition: >-
  This entry represents the C-terminal region of human Sperm microtubule inner protein 1 (SPMIP1). SPMIP1 is a microtubule inner protein (MIP) part of the doublet microtubules (DMTs) in the sperm axoneme. It binds to protofilament B09 along with CFAP90 in the sperm DMTs.
