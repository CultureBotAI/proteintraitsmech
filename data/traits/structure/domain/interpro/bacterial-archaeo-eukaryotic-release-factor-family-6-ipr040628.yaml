label: "Bacterial archaeo-eukaryotic release factor family 6"
definition: >-
  This is a domain found in a bacterial family of the archaeo-eukaryotic release factor superfamily. It is likely to play roles in biological conflicts or regulation under stress conditions at the ribosome.
