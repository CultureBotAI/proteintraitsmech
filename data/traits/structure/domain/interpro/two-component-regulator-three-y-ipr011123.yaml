label: "Two component regulator three Y"
definition: >-
  This region is mostly found at the end of the β-propellers ( ) in a family of two component regulators. However they are also found tandemly repeated in without other signal conduction domains being present. It is named after the conserved tyrosines found in the alignment. The exact function is not known.
