identifier: InterPro:IPR063449
label: "PnsB4, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of PnsB4 (photosynthetic NDH subunit of subcomplex B 4), also known as NDF6. PnsB4 is a nucleus-encoded subunit of the chloroplast NAD(P)H dehydrogenase-like (NDH) complex found in terrestrial plants. The full-length protein is a single-pass thylakoid membrane protein that is a component of NDH subcomplex B, along with PnsB1, PnsB2, PnsB3 and PnsB5. This C-terminal domain follows the transmembrane helix. The function of this domain remains to be determined.
