identifier: InterPro:IPR004330
label: "FAR1, DNA binding domain"
definition: >-
  Phytochrome A is the primary photoreceptor for mediating various far-red light-induced responses in higher plants. It has been found that the proteins governing this response, which include FAR-RED ELONGATED HYPOCOTYL3 (FHY3) and FAR-RED-IMPAIRED RESPONSE1 (FAR1), are a pair of homologous proteins sharing significant sequence homology to mutator-like transposases. These proteins appear to be novel transcription factors, which are essential for activating the expression of FHY1 and FHL (for FHY1-like) and related genes, whose products are required for light-induced phytochrome A nuclear accumulation and subsequent light responses in plants. The FRS (FAR1 Related Sequences) family of proteins share a similar domain structure to mutator-like transposases, including an N-terminal C2H2 zinc finger domain, a central putative core transposase domain, and a C-terminal SWIM motif (named after SWI2/SNF and MuDR transposases). It seems plausible that the FRS family represent transcription factors derived from mutator-like transposases. FAR1 proteins are involved in the regulation of light-mediated developmental processes. These proteins are putative transcription activators that play a role in controlling plant development in response to light signals. These proteins are likely to participate in the transcriptional regulation of genes that are essential for light perception and signal transduction pathways, thereby influencing various aspects of plant growth and adaptation to environmental light conditions. This domain is adjacent to the N-terminal FAR1 DNA-binding domain ( ) and the putative core transposase domain ( ).
