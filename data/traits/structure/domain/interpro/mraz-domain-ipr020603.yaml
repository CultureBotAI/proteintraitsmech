identifier: InterPro:IPR020603
label: "MraZ domain"
definition: >-
  This entry represents the 70 amino acid region found duplicated in the bacterial proteins MraZ. MraZ share protein structural similarity to the AbrB transition state regulator. MraZ from E. coli is a transcriptional regulator.
