identifier: InterPro:IPR003421
label: Opine dehydrogenase
definition: >-
  This group of enzymes act on the CH-NH substrate bond using NAD(+) or NADP(+) as an acceptor. This domain is found primarily in octopine dehydrogenase ( ), nopaline dehydrogenase ( ), and lysopine dehydrogenase ( ). NADPH is the preferred cofactor, but NADH is also used. Octopine dehydrogenase is involved in the reductive condensation of arginine and pyruvic acid to D-octopine. Opine dehydrogenases can be found in both bacteria and marine cephalopods. In bacteria, some of these opine dehydrogenases are involved in crown gall tumours that are produced by Agrobacterium spp., and which encode for the opine dehydrogenases on a Ti-plasmid. These bacteria can transfer a portion of this plasmid (T-DNA) to a susceptible plant cell; the T-DNA then integrates into the plant nuclear genome, where its genes can be expressed. Some of these genes direct the synthesis and secretion of unusual amino acid and sugar derivatives called opines - these opines are used as a carbon and sometimes a nitrogen source by the infecting bacteria. Opine dehydrogenases are also found in the marine invertebrate cephalopods (octopuses, squid, and cuttlefish). For example in marine cephalopods, octopine dehydrogenase activity in mantle muscle is significantly correlated with a species' ability to buffer the acidic end products of anaerobic metabolism, with activity declining strongly with a species' habitat depth.
