identifier: InterPro:IPR040600
label: "Agglutinin, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the alpha chain found in Marasmius Oreades lectin protein (MOA) which binds specifically with Gal.alpha(1,3)Gal-containing sugar epitopes. The enzymatic activity of the MOA may be associated with this domain. The domain has an α/β-fold, which features a central six-stranded, mostly anti-parallel, β-sheet flanked by three α-helices, and a short two-stranded β-sheet.
