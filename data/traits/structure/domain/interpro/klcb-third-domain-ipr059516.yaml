identifier: InterPro:IPR059516
label: "KlcB, third domain"
definition: >-
  This entry represents the third domain of the KlcB protein, a 461 amino acid DNA-binding protein found on IncP-alpha plasmids. KlcB is a four-domain protein involved in transcriptional regulation and contains a DNA-binding region and regions with similarity to KorA and TrbA proteins. The protein is part of the kilC operon and its expression is negatively regulated by KorA and KorC. KlcB is encoded on promiscuous broad-host-range plasmids such as RK2.
