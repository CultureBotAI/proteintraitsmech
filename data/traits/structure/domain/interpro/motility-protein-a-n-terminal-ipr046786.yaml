identifier: InterPro:IPR046786
label: "Motility protein A, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Motility protein A (MotA). MotA is a membrane protein that forms the stator element of the flagellar motor complex together with MotB with 5:2 stoichiometry, which couples ion flow across the cytoplasmic membrane to generate torque, and thus, it is required for rotation of the flagellar motor. This domain contains conserved torque-generating charged residues at the C-terminal and is adjacent , which represents MotA, TMH3 and TMH4.
