identifier: InterPro:IPR058189
label: "PH-like domain, ascomycota"
definition: >-
  This entry represents a PH domain found in a small set of uncharacterised proteins from Ascomycota. These proteins generally have a DH-like domain found to the N-terminal side of this domain, with two further PH-like domains observed in the structure predictions.
