identifier: InterPro:IPR060518
label: "At4g04980, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of At4g04980 and related proteins found in plants. This N-terminal domain precedes the coiled coil and disordered regions found in the central portion of the protein. The domain is found predominantly in land plants (Embryophyta), particularly within the rosids. The function of this N-terminal domain remains to be determined. At4g04980 is an uncharacterised protein in Arabidopsis thaliana that contains multiple coiled-coil regions and extensive disordered regions. The protein is classified within the CHUP1/IPGA1-like family.
