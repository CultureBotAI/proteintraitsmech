identifier: InterPro:IPR063577
label: "DDB_G0287209, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of transmembrane domain-containing protein DDB_G0287209 from Dictyostelium discoideum. This protein is predicted to be a multi-pass membrane protein localised to cellular membranes and contains multiple transmembrane helical regions. The domain shows similarity to pectin lyase fold structures. The specific function of this domain remains to be determined.
