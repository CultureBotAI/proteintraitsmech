identifier: InterPro:IPR013542
label: "Epoxyqueuosine reductase QueG, Cbl-binding domain"
definition: >-
  This is the Cbl-binding domain found at the N-terminal of Epoxyqueuosine reductase QueG, an iron-sulphur cluster-binding protein. QueG also contains a 4Fe-4S binding domain ( ) and a C-terminal RNA-binding domain. QueG catalyses the conversion of epoxyqueuosine (oQ) to queuosine (Q), which is a hypermodified base found in the wobble positions of tRNA(Asp), tRNA(Asn), tRNA(His) and tRNA(Tyr).
