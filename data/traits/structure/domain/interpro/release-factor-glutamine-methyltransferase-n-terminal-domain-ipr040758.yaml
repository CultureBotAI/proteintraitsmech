identifier: InterPro:IPR040758
label: "Release factor glutamine methyltransferase, N-terminal domain"
definition: >-
  This entry corresponds to the N-terminal α helical domain of the PrmC/HemK protein. PrmC/HemK is a methyltransferase enzyme that carries out the methylation of the N5 nitrogen of the glutamine found in the conserved GGQ motif of class-1 release factors.
