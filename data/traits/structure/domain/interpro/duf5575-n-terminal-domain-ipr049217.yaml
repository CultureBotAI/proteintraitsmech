identifier: InterPro:IPR049217
label: "DUF5575, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain from a family of chordate proteins that includes human C19orf68 (also.known as ZSWIM9) (SwissProt: ). This domain appears to be related to the WRKY-like DNA-binding domains (InterPro: ). These proteins are functionally uncharacterised.
