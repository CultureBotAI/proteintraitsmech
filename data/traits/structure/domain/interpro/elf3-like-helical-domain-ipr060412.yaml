identifier: InterPro:IPR060412
label: "ELF3-like, helical domain"
definition: >-
  This entry represents an helical domain found in ELF3 and related proteins including Hd17 (also known as Protein HEADING DATE 3B and ELF3-1) from rice. This domain adopts an all-helical fold. The specific function of this domain remains to be determined. ELF3 proteins are involved in circadian clock regulation and photoperiodic flowering control. The full-length proteins function as transcriptional regulators that modulate flowering time under different photoperiodic conditions and are components of the evening complex in the circadian clock. ELF3 proteins are nuclear-localised and play roles in light signalling pathways. Hd17 may function as a modulator of light signal transduction downstream of phytochromes. Hd17 (also known as OsELF3) is involved in rice photoperiodic flowering.
