identifier: InterPro:IPR028455
label: "ABI gene family member 3, SH3 domain"
definition: >-
  ABI gene family member 3 (ABI3, also known as NESH) belongs to the ABI family and is a component of the Abi/WAVE complex. It contains a SH3 domain that interacts with p21-activated kinase (PAK), which is involved in regulation of cell motility. This entry represents the SH3 domain found at the C-terminal end of ABI3.
