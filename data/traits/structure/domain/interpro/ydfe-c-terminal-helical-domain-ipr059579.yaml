identifier: InterPro:IPR059579
label: "YdfE, C-terminal helical domain"
definition: >-
  This entry represents the C-terminal domain of YdfE proteins found primarily in enterobacterales. This domain adopts a helical structure. YdfE is a protein of approximately 306 amino acids that is classified in the COG0847 group. It may be truncated by IS2 element insertion after residue 255 in some strains. The function of this domain remains to be determined.
