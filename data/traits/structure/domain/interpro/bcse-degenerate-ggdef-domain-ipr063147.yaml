identifier: InterPro:IPR063147
label: "BcsE, degenerate GGDEF domain"
definition: >-
  This entry represents the C-terminal domain of BcsE, known as GIL domain, for GGDEF I-site like domain, which is a degenerate diguanylate cyclase domain. This and the degenerate REC domain bind an intercalated dimeric c-di-GMP per protomer. BcsE is required for cellulose biosynthesis.
