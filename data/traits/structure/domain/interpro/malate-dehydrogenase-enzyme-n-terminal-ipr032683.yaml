label: "Malate dehydrogenase enzyme, N-terminal"
definition: >-
  This domain is found in bacteria, and is approximately 30 amino acids in length. The domain is found in association with , , . There is a conserved AAL sequence motif. There is a single completely conserved residue R that may be functionally important. Malate dehydrogenase is one of the enzymes involved in the citric acid cycle in mitochondria. It converts malate to oxaloacetate using NAD as a cofactor.
