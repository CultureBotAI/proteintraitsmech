identifier: InterPro:IPR019563
label: "Glycosyl-hydrolase 97, catalytic domain"
definition: >-
  Proteins containing this domain include the aglycoside hydrolase family 97 enzyme, SusB protein, from Bacteroides thetaiotaomicron. SusB has three domains: the N-terminal, catalytic, and C-terminal domains. This entry represents the catalytic domain that consists of a complete (β/α)8-barrel or TIM-barrel. The N- and C-terminal parts of the sequences, mainly consisting of β-strands, form two additional non-catalytic domains. In all known glycosidases with the (β-α)8-barrel fold, the amino acid residues at the active site are located on the C-termini of the β-strands.
