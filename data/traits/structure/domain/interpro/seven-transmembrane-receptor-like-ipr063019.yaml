identifier: InterPro:IPR063019
label: "Seven transmembrane receptor-like"
definition: >-
  This entry represents uncharacterised bacterial proteins, some of which are annotated as seven transmembrane receptors (7TM). Members are found in Cyanobacteriota and in diverse eukaryotes, including Stramenopiles, Viridiplantae, and Rhodophyta. Structural analysis indicates these proteins adopt a seven-transmembrane fold related to G protein- coupled receptors.
