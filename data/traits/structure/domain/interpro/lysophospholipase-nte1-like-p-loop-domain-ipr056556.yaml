identifier: InterPro:IPR056556
label: "Lysophospholipase NTE1-like, P-loop domain"
definition: >-
  This domain is found in a variety of phospholipases such as Lysophospholipase NTE1, Neuropathy target esterase sws and related proteins. This domain appears to be structurally related to P-loop ATPases, but it appears to not contain the typical APT-binding motifs. Sws is an intracellular phospholipase B that catalyses the double deacylation of phosphatidylcholine (PC) to glycerophosphocholine (GroPCho). This enzyme plays a crucial role in membrane lipid homeostasis and are responsible for the rapid turnover of PC in response to various stimuli such as inositol, elevated temperatures, or choline presence. NTE1 is involved in the signaling mechanisms between neurons and glia, regulating glia wrapping during brain development and ensuring cell survival.
