identifier: InterPro:IPR058905
label: "PARP4, WGR-like domain"
definition: >-
  This entry represents the WGR-like domain in PARP4 proteins. The WGR domain is named after its most conserved central motif (Trp-Gly-Arg residues). In PARP4, it forms part of the BRCT-WGR-CAT region, which regulates catalytic activity. In this entry, the conservation of Gly and Arg is evident, but the conservation of Trp is less evident, as it appears that Phe is replacing this residue. Members of this group are found in vertebrates. PARP4, also known as vPARP, is the largest member of the poly-ADP-ribose polymerase (PARP) family and exhibits both poly- and mono-ADP-ribosylation activity. It catalyzes the transfer of ADP-ribose units to target proteins, influencing various cellular processes. PARP4 can PARylate major vault protein (MVP) and, to a lesser extent, itself. It is a core component of the vault ribonucleoprotein particle, one of the largest ribonucleoprotein complexes in eukaryotic cells, alongside MVP, vault RNAs (vRNAs), and TEP1. Its interaction with TEP1 suggests potential roles in cellular transport or signaling pathways.
