identifier: InterPro:IPR059543
label: "YphF, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of uncharacterised YphF family proteins found in Bacillales, particularly in Bacillus and Paenibacillus species. YphF from Bacillus subtilis strain 168 is a 244 amino acid protein containing this domain. The protein is predicted to contain a prokaryotic lipoprotein signal peptide. The function of this domain remains to be determined.
