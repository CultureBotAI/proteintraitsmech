identifier: InterPro:IPR045464
label: "F-box protein Hrt3/FBXO9, C-terminal"
definition: >-
  This entry represents a domain in the C-terminal region of several F-box proteins in eukaryotes. These proteins are the substrate recognition component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. Proteins containing this domain include the yeast Hrt3 protein and human F-box only 9 protein (FBXO9).
