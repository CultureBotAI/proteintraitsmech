identifier: InterPro:IPR006417
label: Nicotinamide-nucleotide adenylyltransferase
definition: >-
  The NadR protein of Escherichia coli and closely related bacteria is both enzyme and regulatory protein. The first 60 or so amino acids, N-terminal region is a DNA-binding helix-turn-helix domain ( ) responsible for repressing the nadAB genes of NAD de novo biosynthesis. The NadR homologues in Mycobacterium tuberculosis, Haemophilus influenzae, amongst others, appear to lack the repressor domain. NadR has recently been shown to act as an enzyme of the salvage pathway of NAD biosynthesis, nicotinamide-nucleotide adenylyltransferase; members of this family are presumed to share this activity. E. coli NadR has also been found to regulate the import of its substrate, nicotinamide ribonucleotide, but it is not known if the other members of this family share that activity.
