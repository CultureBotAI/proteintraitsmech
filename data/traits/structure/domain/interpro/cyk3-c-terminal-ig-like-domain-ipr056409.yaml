identifier: InterPro:IPR056409
label: "CYK3, C-terminal Ig-like domain"
definition: >-
  This domain is found at the C terminus of yeast Cytokinesis protein 3 (CYK3) and related fungal proteins. CYK3 is involved in cytokinesis by recruiting INN1 to the bud neck. It is found in association with the actin ring and the mother-bud neck. This domain is predicted to fold into a β-sandwich with an Ig-like topology.
