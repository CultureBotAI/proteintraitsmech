identifier: InterPro:IPR063596
label: "Cilia and flagella-associated protein 70, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of human cilia and flagella-associated protein 70 (CFAP70) and similar proteins from eukaryotes and bacteria. CFAP70 is an axoneme-binding protein that plays a role in the regulation of ciliary motility and cilium length. The protein localises to the cilium axoneme and flagellum, with particular concentration at the base of the outer dynein arm. The specific function of this domain remains to be determined. This domain adopts a TPR-like fold. Glucose repression mediator protein CYC8 from Verticillium dahliae, which plays critical roles in melanin accumulation, microsclerotia production, and sporulation, is also included in this group.
