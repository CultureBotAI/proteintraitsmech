identifier: InterPro:IPR012463
label: "Ethylene-responsive binding factor-associated repression"
definition: >-
  The EAR motif is the ethylene-responsive element binding factor-associated amphiphilic repression motif. This motif binds to the Groucho/Tup1-type co-repressor TOPLESS (TPL) and TPL-related proteins. The motif is frequently to be find at the N terminus of NINJA, or Novel INteractor of JAZ, proteins. The EAR motif, defined by the consensus sequence patterns of either LxLxL or DLN xxP, is the most predominant form of transcriptional repression motif so far identified in plants. It is highly conserved in transcriptional regulators that are known to function as negative regulators in a broad range of developmental and physiological processes across evolutionarily diverse plant species. This family is closely related to family AUX_IAA ( ) which also has an LxLxL signature.
