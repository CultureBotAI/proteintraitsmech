identifier: InterPro:IPR058545
label: "EMC1, first beta-propeller domain"
definition: >-
  This entry represents the N-terminal β-propeller domain of EMC1. ER membrane protein complex subunit 1 (EMC1) is a component of the endoplasmic reticulum membrane protein complex (EMC, composed of EMC1, EMC2, EMC3, EMC4, EMC5 and EMC6) that enables the energy-independent insertion into endoplasmic reticulum membranes of newly synthesized membrane proteins. This complex preferentially accommodates proteins with transmembrane domains that are weakly hydrophobic or contain destabilising features such as charged and aromatic residues. In Saccharomyces cerevisiae, the EMC seems to be required for efficient folding of proteins in the endoplasmic reticulum (ER). EMC1 contains two eight-bladed β-propellers and stabilises the entire EMC complex, contacting six of the remaining eight subunits. The β-propellers are in the lumen and may serve as a platform for recruitment of co-factors at the site of nascent protein insertion.
