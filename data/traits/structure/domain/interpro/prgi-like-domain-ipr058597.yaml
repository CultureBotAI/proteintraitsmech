label: "PrgI-like domain"
definition: >-
  This entry represents the N-terminal domain of a group of uncharacterised proteins from halobacteria. This domain resembles the PrgI like protein ( ) suggesting a role in secretion or conjugal transfer. This domain, often found associated with , appears to contain two transmembrane helices.
