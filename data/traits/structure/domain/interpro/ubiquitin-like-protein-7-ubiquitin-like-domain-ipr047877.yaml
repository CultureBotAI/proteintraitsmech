identifier: InterPro:IPR047877
label: "Ubiquitin-like protein 7, ubiquitin-like domain"
definition: >-
  This entry represents the ubiquitin-like (UBL) domain of UBL7 and similar sequences from vertebrates. UBL7, also termed bone marrow stromal cell ubiquitin-like (Ubl) protein (BMSC-UbP), or ubiquitin-like protein SB132, is a novel Ubl protein that may play roles in regulation of bone marrow stromal cell (BMSC) function or cell differentiation via an evocator-associated and cell-specific pattern. UBL7 contains an N-terminal Ubl domain with a β-grasp Ubl fold, and a C-terminal ubiquitin-associated (UBA) domain. The Ubl domain interacts with 26S proteasome-dependent degradation, and the UBA domain links cellular processes and the ubiquitin system.
