identifier: InterPro:IPR025786
label: "Mononegavirus L protein 2-O-ribose methyltransferase"
definition: >-
  Large structural protein L or protein L from Mononegavirales is responsible for the replication and transcription of the viral genome as well as all posttranscriptional modifications of viral mRNAs. The template is composed of the viral RNA tightly encapsulated by the nucleoprotein (N). The protein can function either as transcriptase or as replicase. The transcriptase synthesises subsequently subgenomic RNAs, assuring their capping and polyadenylation by a stuttering mechanism. The replicase mode is dependent on intracellular N protein concentration. In this mode, the polymerase replicates the whole viral genome without recognising the transcriptional signals. The large structural protein carries three enzymatic activities: RNA-directed RNA polymerase ( ), mRNA (guanine-N(7)-)-methyltransferase ( ), and mRNA guanylyltransferase ( ). This entry represents the methyltransferase domain.
