identifier: InterPro:IPR035998
label: "MTMR6, PH-GRAM domain"
definition: >-
  Myotubularin-related protein 6 (MTMR6) is a catalytically active member of the myotubularin (MTM) family, which possess 3-phosphatase activity dephosphorylating phosphatidylinositol-3-phoshate and phosphatidylinositol-3,5-bisphosphate. MTMR6 forms a heteromer with enzymatically inactive MTMR9. MTMR9 increases MTMR6 binding to phospholipids and increases the 3-phosphatase activity of MTMR6 and it plays a role in the late stages of macropinocytosis by dephosphorylating phosphatidylinositol 3-phosphate in membrane ruffles. MTMR6 is reported to be involved in the regulation of the Ca2+-activated K+ channel KCa3.1 and apoptosis. The cellular localisation of MTMR6 is regulated by Rab1B in the early secretory and autophagic pathways. MTMR6 contains an N-terminal PH-GRAM domain, a Rac-induced recruitment domain (RID) domain, an active PTP domain, a SET-interaction domain, and a C-terminal coiled-coil region. The GRAM domain, found in myotubularins, glucosyltransferases, and other putative membrane-associated proteins, is part of a larger motif with a pleckstrin homology (PH) domain fold. This entry represents the PH-GRAM domain of MTMR6. The myotubularin family constitutes a large group of conserved proteins, with 14 members in humans consisting of myotubularin (MTM1) and 13 myotubularin-related proteins (MTMR1-MTMR13). Orthologues have been found throughout the eukaryotic kingdom, but not in bacteria. MTM1 dephosphorylates phosphatidylinositol 3-monophosphate (PI3P) to phosphatidylinositol and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2] to phosphatidylinositol 5-monophosphate (PI5P) [ , ,. The substrate phosphoinositides (PIs) are known to regulate traffic within the endosomal-lysosomal pathway. MTMR1, MTMR2, MTMR3, MTMR4, and MTMR6 have also been shown to utilise PI(3)…
