identifier: InterPro:IPR005104
label: "Winged helix-turn-helix transcription repressor, HrcA DNA-binding domain"
definition: >-
  Prokaryotic cells have a defence mechanism against a sudden heat-shock stress. Commonly, they induce a set of proteins that protect cellular proteins from being denatured by heat. Among such proteins are the GroE and DnaK chaperones whose transcription is regulated by a heat-shock repressor protein HrcA. HrcA is a winged helix-turn-helix repressor that negatively regulates the transcription of dnaK and groE operons by binding the upstream CIRCE (controlling inverted repeat of chaperone expression) element. In Bacillus subtilis this element is a perfect 9 base pair inverted repeat separated by a 9 base pair spacer. This domain represents the winged helix-turn-helix DNA-binding domain which is located close to the N terminus of HrcA. This domain is also found at the N terminus of a set of uncharacterised proteins that have two C-terminal CBS domains.
