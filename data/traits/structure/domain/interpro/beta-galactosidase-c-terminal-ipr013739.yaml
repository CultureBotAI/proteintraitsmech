identifier: InterPro:IPR013739
label: Beta-galactosidase C-terminal
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. This domain is found at the C terminus of beta-galactosidase enzymes that belong to the glycosyl hydrolase 42 family.
