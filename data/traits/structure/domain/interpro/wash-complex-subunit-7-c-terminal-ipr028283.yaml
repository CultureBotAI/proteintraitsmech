identifier: InterPro:IPR028283
label: "WASH complex subunit 7, C-terminal"
definition: >-
  This entry represents the C-terminal region of WASH complex subunit 7 (WASH7), also known as subunit 4 or KIAA1033. The WASH complex is present at the surface of endosomes and recruits and activates the Arp2/3 complex to induce mediated actin nucleation. The WASH complex plays a key role in the fission of tubules that serve as transport intermediates during endosome sorting. This C-terminal domain is predicted to include a transmembrane region.
