identifier: InterPro:IPR041454
label: "BsuBI/PstI restriction endonuclease, HTH domain"
definition: >-
  This entry represents the N terminus of bacterial enzymes similar to type II restriction endonucleases BsuBI and PstI ( ). The enzymes of the BsuBI restriction/modification (R/M) system recognise the target sequence 5'CTGCAG and are functionally identical with those of the PstI R/M system.
