identifier: InterPro:IPR046360
label: "T-box transcription factor, DNA-binding domain"
definition: >-
  This is the highly conserved DNA-binding domain of T-box transcription factors. Transcription factors of the T-box family are required both for early cell-fate decisions, such as those necessary for formation of the basic vertebrate body plan, for differentiation and organogenesis and also have been associated to multiple aspects of development and in adult terminal cell-type differentiation in different animal lineages. The T-box is defined as the minimal region within the T-box protein that is both necessary and sufficient for sequence-specific DNA binding, all members of the family so far examined bind to the DNA consensus sequence TCACACCT and function as transcriptional repressors and/or activators. The T-box is a relatively large DNA-binding domain, generally comprising about a third of the entire protein (17-26kDa). These genes were uncovered on the basis of similarity to the DNA binding domain of Mus musculus (Mouse) Brachyury (T) gene product, which similarity is the defining feature of the family. The Brachyury gene is named for its phenotype, which was identified 70 years ago as a mutant mouse strain with a short blunted tail. The gene, and its paralogues, have become a well-studied model for the family, and hence much of what is known about the T-box family is derived from the murine Brachyury gene. Consistent with its nuclear location, Brachyury protein has a sequence-specific DNA-binding activity and can act as a transcriptional regulator. Homozygous mutants for the gene undergo extensive developmental anomalies, thus rendering the mutation lethal. The postulated role of Brachyury is as a transcription factor, regulating the specification and differentiation of posterior mesoderm during gastrulation in a dose-dependent manner. T-box proteins tend to be ex…
