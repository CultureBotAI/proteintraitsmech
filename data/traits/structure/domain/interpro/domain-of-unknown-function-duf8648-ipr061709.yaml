identifier: InterPro:IPR061709
label: "Domain of unknown function DUF8648"
definition: >-
  This entry represents a C-terminal domain of approximately 275 residues found in Cyanobacteriota. The proteins containing this domain also possess an N-terminal domain of approximately 200 residues. Some proteins containing this domain are annotated as histidine ammonia-lyase, though this has not been experimentally verified. The function of this domain remains to be determined.
