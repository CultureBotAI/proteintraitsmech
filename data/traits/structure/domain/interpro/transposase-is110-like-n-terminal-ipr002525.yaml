identifier: InterPro:IPR002525
label: "Transposase IS110-like, N-terminal"
definition: >-
  Transposase proteins are necessary for efficient DNA transposition. This entry represents the N-terminal region of the pilin gene inverting protein (PIVML) and members of the IS111A/IS1328/IS1533 family of transposases.
