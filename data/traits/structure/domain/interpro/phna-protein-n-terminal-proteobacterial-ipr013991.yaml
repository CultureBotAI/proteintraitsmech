identifier: InterPro:IPR013991
label: "PhnA protein N-terminal, proteobacterial"
definition: >-
  The PhnA protein family includes the uncharacterised Escherichia coli protein PhnA and its homologues. The E. coli phnA gene is part of a large operon associated with alkylphosphonate uptake and carbon-phosphorus bond cleavage. The protein is not related to the characterised phosphonoacetate hydrolase designated PhnA. This entry represents the N-terminal domain of PhnA proteins, which is predicted to form a zinc-ribbon, found in some proteobacteria. It does not include the E. coli sequence.
