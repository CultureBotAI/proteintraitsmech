identifier: InterPro:IPR047224
label: "Fatty acid synthase subunit alpha-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain found in fatty acid synthase subunit alpha and similar sequences from fungi and bacteria. These "elongating" condensing enzymes are a subclass of decarboxylating condensing enzymes characterised by the utilisation of acyl carrier protein (ACP) thioesters as primer substrates, as well as the nature of their active site residues.
