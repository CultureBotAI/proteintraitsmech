identifier: InterPro:IPR043787
label: "Domain of unknown function DUF5729"
definition: >-
  This is a highly conserved domain of unknown function found in Platyhelminthes, with many of the sequences annotated as being the small conductance calcium-activated potassium channel protein. However, the location suggests that this domain belongs to the intracellular amino terminus of these transmembrane proteins, near the calcium-activated SK potassium channel.
