identifier: InterPro:IPR004103
label: Polysaccharide lyase family 8, C-terminal
definition: >-
  Proteins containing this domain consist of a group of secreted bacterial lyase enzymes capable of acting on hyaluronan (hyaluronate lyase, ) and chondroitin (chondroitin AC lyase, ) in the extracellular matrix of host tissues, contributing to the invasive capacity of the pathogen. This domain is almost always associated with the polysaccharide lyase family 8, N-terminal domain (see ). This entry represents the C-terminal domain of hyaluronate and chondroitin AC lyase enzymes.
