identifier: InterPro:IPR060510
label: "ATA15/OSA15, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain found in senescence-associated proteins of the ATA15/OSA15 family from plants including SPA15, OSA15 and AAF. The domain spans approximately 89 residues and is located in the middle region of these chloroplast-localised proteins. The N-terminal is disordered. While the full-length OSA15 proteins regulate leaf senescence and oxidative stress responses, the specific function of this coiled-coil domain remains to be determined. OSA15 proteins are up-regulated during leaf senescence and are involved in modulating redox homeostasis in response to age and stress factors. The proteins are induced by abscisic acid, salicylate, methyl jasmonate and ethylene, and their function is dependent on ethylene signalling pathways.
