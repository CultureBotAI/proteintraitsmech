identifier: InterPro:IPR015367
label: "Transcription factor CEP-1, DNA-binding domain"
definition: >-
  This DNA-binding domain is found in the Caenorhabditis transcription factor CEP-1, which is related to human p53. It adopts a β sandwich structure, with nine strands in two β-sheets, in a Greek-key topology.
