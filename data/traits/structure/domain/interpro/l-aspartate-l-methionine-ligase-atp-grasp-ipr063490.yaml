identifier: InterPro:IPR063490
label: "L-aspartate--L-methionine ligase, ATP grasp"
definition: >-
  This entry includes L-aspartate--L-methionine ligase from Staphylococcus aureus (LdmS, ), which preferentially catalyses the formation of L-aspartyl-L-methionine dipeptide from L-aspartate and L-methionine in the presence of ATP. This entry represents the ATP grasp domain.
