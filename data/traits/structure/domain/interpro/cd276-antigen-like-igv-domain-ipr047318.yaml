identifier: InterPro:IPR047318
label: "CD276 antigen-like, IgV domain"
definition: >-
  This entry represents the immunoglobulin variable (IgV) domain of CD276 antigen, also known as B7-H3, and similar proteins predominantly found in mammals. CD276 is an important immune checkpoint member of the B7 family and shares homology with other B7 ligands such as programmed death ligand 1 (PD-L1). The B7 family molecules interact with CD28 on T-cells to provide co-stimulatory signals that regulate T-cell activation and T-helper cell differentiation. Although CD276 has been shown to have both co-stimulatory and co-inhibitory effects on T-cell responses, the most current studies describe CD276 as a T-cell inhibitor that promotes tumour aggressiveness and proliferation. Moreover, this protein is highly overexpressed on a wide range of human solid cancers and promotes tumour growth, metastasis, and drug resistance. Thus, CD276 expression in tumours often correlates with both negative prognosis and poor clinical outcome in cancer patients. This protein contains a predicted signal peptide, V- and C-like Ig domains (IgV and IgC), a transmembrane region, and an intracellular tail.
