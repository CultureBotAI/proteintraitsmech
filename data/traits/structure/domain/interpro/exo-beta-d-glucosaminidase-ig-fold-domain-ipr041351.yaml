identifier: InterPro:IPR041351
label: "Exo-beta-D-glucosaminidase, Ig-fold domain"
definition: >-
  This domain can be found in 2 glycoside hydrolase subfamily of beta-glucosaminidases ( ) such as CsxA, from Amycolatopsis orientalis that has exo-beta-D-glucosaminidase (exo-chitosanase) activity. It has an immunoglobulin-like topology.
