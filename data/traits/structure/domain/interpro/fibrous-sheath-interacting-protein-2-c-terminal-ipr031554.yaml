identifier: InterPro:IPR031554
label: "Fibrous sheath-interacting protein 2, C-terminal"
definition: >-
  This domain is the C-terminal portion of FSIP2, fibrous sheath-interacting protein 2, a protein found in mammals. The function is not known, but the domain appears to be repeated up to 10 times in some members.
