identifier: InterPro:IPR025286
label: "MOFRL-associated domain"
definition: >-
  This domain is frequently found at the N terminus of proteins that carrying the MOFRL domain ( ), some of which are glycerate kinases. However, proteins matched by this entry do not have flavodoxin-like domain ( ) or restriction-enzyme-like fold ( ), which can be found in other type of glycerate kinases ( ).
