identifier: InterPro:IPR063411
label: "Repellent protein 1"
definition: >-
  This entry represents repellent protein 1, a water-repellent structural protein found in Mycosarcoma maydis. The protein is required for surface hydrophobicity and formation of aerial hyphae during filamentous growth. The precursor is processed by Kex2 endoprotease to generate eleven repellent peptides (Rep1-1 to Rep1-11). These peptides assemble to form functional amyloid fibrils that create amphipathic layers at the cell surface. The protein is secreted and localises to the cell wall, where it interacts with Lep1 to form a hydrophobic layer.
