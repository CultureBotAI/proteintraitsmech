identifier: InterPro:IPR060536
label: "TonB, transmembrane helix"
definition: >-
  This entry represents a single transmembrane helix found at the N-terminal of TonB proteins from Lysobacterales, which interacts with outer membrane receptor proteins carrying out high-affinity binding and energy dependent uptake into the periplasmic space of specific substrates.
