identifier: InterPro:IPR059690
label: MJ1308
definition: >-
  This entry represents the MJ1308 family of small uncharacterised membrane proteins found in methanogenic archaea. The family is found across various methanogenic lineages including Methanobrevibacter, Methanobacterium, Methanosphaera, and Methanobacteriaceae. The proteins are approximately 108 amino acids in length and contain three predicted transmembrane helices, suggesting they are integral membrane proteins. The function of this protein family remains to be determined.
