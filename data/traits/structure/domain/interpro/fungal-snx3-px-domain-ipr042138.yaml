identifier: InterPro:IPR042138
label: "Fungal SNX3, PX domain"
definition: >-
  This entry represents the PX domain found in SNX3 (also known as Grd19) from fungi. Grd19 has been shown to associate with early endosomes through a PX domain-mediated interaction with phosphatidylinositol-3-phosphate (PI3P). Grd19 is involved in the localization of late Golgi membrane proteins in yeast. It associates with the retromer complex, a membrane coat multimeric complex required for endosomal retrieval of lysosomal hydrolase receptors to the Golgi, and functions as a cargo-specific adaptor for the retromer. The Phox Homology (PX) domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions. Sorting nexins (SNXs) make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds phosphoinositides (PIs) and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway.
