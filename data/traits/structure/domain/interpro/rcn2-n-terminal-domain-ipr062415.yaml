identifier: InterPro:IPR062415
label: "RCN2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of RCN2 (regulator of calcineurin 2) and related proteins found in fungi. RCN2 is also known as weak suppressor of PAT1 ts protein 1 (WSP1). It functions as a regulator of calcineurin. The domain spans approximately residues 8-91. The specific function of this domain remains to be determined.
