identifier: InterPro:IPR058999
label: "EIF3CL-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human Eukaryotic translation initiation factor 3 subunit C-like protein (EIF3CL) and similar proteins. EIF3CL is a component of the eukaryotic translation initiation factor 3 (eIF-3) complex. This domain is predicted to adopt an α-helical configuration.
