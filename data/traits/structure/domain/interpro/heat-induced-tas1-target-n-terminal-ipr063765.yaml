identifier: InterPro:IPR063765
label: "HEAT-INDUCED TAS1 TARGET, N-terminal"
definition: >-
  This entry represents the N-terminal domain of HTT (Heat-induced TAS1 Target 1/2/3/4/5) proteins found in plants. HTT proteins mediate both basal and acquired thermotolerance via heat shock transcription factor pathways. These proteins are targets of trans-acting siRNA derived from TAS1 precursors in response to temperature variations. The proteins are expressed ubiquitously in plant tissues and are highly upregulated during heat shock. This N-terminal domain is found in conjunction with a variable C-terminal region and plays an important role in plant thermal stress responses. In HTT3, this domain covers its full length.
