identifier: InterPro:IPR056192
label: "NPAS4, bHLH domain"
definition: >-
  This bHLH domain is found in the family of Neuronal PAS domain-containing protein 4 (NPAS4). NPAS4 is a transcription factor expressed in neurons of the brain that regulates the excitatory-inhibitory balance within neural circuits and is required for contextual memory in the hippocampus. It binds to DNA but efficient DNA binding requires dimerisation with another bHLH protein, such as ARNT, ARNT2 or BMAL1.
