identifier: InterPro:IPR019371
label: "KxDL domain"
definition: >-
  This entry represents a conserved region of 80 residues which defines a family of coiled-coil proteins known as Biogenesis of lysosome-related organelles complex 1 subunit KXD1 in yeast and KXDL1 in animals. This domain contains the characteristic KxDL motif towards the C terminus. Members of this entry are components of the biogenesis of lysosome-related organelles complex-1 (BLOC-1) involved in endosomal cargo sorting. They may play a role in lysosomes movement and localization at the cell periphery.
