identifier: InterPro:IPR024937
label: "Domain X"
definition: >-
  Group II introns are widespread in plant cell organelles. In vivo, most plant group II introns do not self-splice, but require the assistance of proteinaceous splicing factors, known as maturases. In higher plants, maturases are encoded for in the nuclear genes, but are otherwise encoded by organellar introns. This entry represents a sequence region known as domain X, which is conserved in group II introns and is required for maturase function.
