identifier: InterPro:IPR025684
label: "Gliding motility protein SprA N-terminal domain"
definition: >-
  This domain is found repeated three times in the N-terminal half of the gliding motility-related SprA proteins. The role of this domain in motility is uncertain. It is also found in proteins required for secretion.
