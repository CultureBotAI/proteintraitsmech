label: "Domain of unknown function DUF5935"
definition: >-
  This presumed domain is functionally uncharacterised, but is is found in O-antigen polymerase proteins. It is mainly found in proteobacteria, and is approximately 190 amino acids in length. The domain is found in association with PF04932.
