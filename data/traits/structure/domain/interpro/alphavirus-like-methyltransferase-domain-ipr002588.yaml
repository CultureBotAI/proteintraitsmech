identifier: InterPro:IPR002588
label: "Alphavirus-like methyltransferase domain"
definition: >-
  This domain is found at the N terminus of the non-structural poly-protein of Tymoviruses, it spans the RNA methyltransferase domain of the replicase large subunit, which is a RNA-dependent RNA polymerase active in viral RNA replication is found in a wide range of ssRNA viruses (Tymovirales), including Hordeivirus, Tobravirus, Tobamovirus, Bromovirus, Closterovirus and Calicivirus. The poly-protein is processed into the replicase small subunit, which is the methyltransferase active in RNA capping and a RNA helicase. Methyltransferase displays a cytoplasmic capping enzyme activity. This function is necessary since all viral RNAs are synthesized in the cytoplasm, and host capping enzymes are restricted to the nucleus. The helicase region probably, which is immediately adjacent to the methyltransferase domain exhibits NTPase and RNA unwinding activities.
