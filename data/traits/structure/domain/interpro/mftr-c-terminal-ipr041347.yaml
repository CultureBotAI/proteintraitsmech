identifier: InterPro:IPR041347
label: "MftR, C-terminal"
definition: >-
  This domain resembles the acyl-CoA ligand-binding C-terminal domain of the mycofactocin biosynthesis transcriptional regulator MftR. Proteins with this domain are transcription factors with a TetR-like N-terminal DNA-binding domain.
