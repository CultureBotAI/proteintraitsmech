identifier: InterPro:IPR048345
label: "Plasmid segregation protein ParM, C-terminal domain"
definition: >-
  This entry consists of several bacterial ParM/StbA plasmid stability proteins. ParM is involved in the control of plasmid partition and required for the accurate segregation of the plasmid, which forms filaments to drive partition. This protein is an actin homologue and consists of two domains (I and II) with the same conformation. This entry represents the C-terminal domain.
