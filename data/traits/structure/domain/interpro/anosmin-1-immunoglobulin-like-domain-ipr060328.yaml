identifier: InterPro:IPR060328
label: "Anosmin-1, immunoglobulin-like domain"
definition: >-
  This entry represents a immunoglobulin-like (Ig-like) domain found in Anosmin-1 (ANOS1) and related proteins. In ANOS1 from human, this domain is found twice. Anosmin-1 (ANOS1) is an extracellular matrix protein that functions in the development of craniofacial structures. It has been linked to hereditary Kallmann's syndrome (KS), a human disorder of olfactory and gonadotropin-releasing hormone (GnRH) neuronal ontogeny. ANOS1 is a chemoattractant for fetal olfactory epithelial cells that may play an important role in the patterning of mitral and tufted cell collaterals to the olfactory cortex.
