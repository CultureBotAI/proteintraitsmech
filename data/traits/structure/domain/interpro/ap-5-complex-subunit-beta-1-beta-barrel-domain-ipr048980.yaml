identifier: InterPro:IPR048980
label: "AP-5 complex subunit beta-1, beta-barrel domain"
definition: >-
  AP5B1 is part of the AP-5 adaptor protein complex, which may be involved in endosomal transport. This entry represents a β-barrel domain found towards the C-terminal region of AP5B1. Structure predictions suggests that it contains seven antiparallel β-strands.
