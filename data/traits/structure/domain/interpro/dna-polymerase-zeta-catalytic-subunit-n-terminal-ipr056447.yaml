identifier: InterPro:IPR056447
label: "DNA polymerase zeta catalytic subunit, N-terminal"
definition: >-
  This domain is found at the N-terminal end of DNA polymerase zeta catalytic subunit (REV3) from Saccharomyces cerevisiae and similar eukaryotic sequences. REV3 is a nonessential DNA polymerase involved in DNA repair, mitochondrial DNA repair and translesion synthesis. This domain shows a mainly β-configuration. It is often found N-terminal to .
