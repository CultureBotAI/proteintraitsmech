identifier: InterPro:IPR049785
label: "GT-D fold-like domain, firmicutes"
definition: >-
  This entry describes a domain related to the GT-D fold glycotransferase domain ( ). These protein domains share a common sequence motif R[VIL]GDGE, significant structural similarity based on the predicted AF2 model, but only about 16 percent sequence identity. This domain is found standalone and in combination with other domains in a number of proteins mainly from Firmicutes.
