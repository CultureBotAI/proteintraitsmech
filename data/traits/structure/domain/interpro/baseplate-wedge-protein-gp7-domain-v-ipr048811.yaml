identifier: InterPro:IPR048811
label: "Baseplate wedge protein gp7, domain V"
definition: >-
  This domain is found in Baseplate wedge protein gp7 from Bacteriophage T4 ( ) and similar proteins from tailed bacteriophages. Gp7 provides the primary control of the conformational changes of the viral baseplate during assembly and infection. This protein is organised into six domains connected by flexible linkers. This entry represents Domain V, which is an insertion into domain IV and consists of an eight-stranded β-barrel followed by two short α-helices.
