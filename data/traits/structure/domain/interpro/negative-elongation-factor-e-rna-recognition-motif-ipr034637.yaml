identifier: InterPro:IPR034637
label: "Negative elongation factor E, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of NELFE. Negative elongation factor E (NELFE) is an essential component of the NELF complex, a complex that negatively regulates the elongation of transcription by RNA polymerase II. The NELF complex is found in higher eukaryotes, but is absent in some species of nematodes, S. cerevisiae, and plants. It may repress transcription by inducing transcriptional pausing and can be regulated by integrator complex subunits (INTScom).
