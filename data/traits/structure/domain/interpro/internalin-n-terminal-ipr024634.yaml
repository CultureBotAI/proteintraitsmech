identifier: InterPro:IPR024634
label: "Internalin, N-terminal"
definition: >-
  This entry represents the N-terminal domain of internalin, the cap domain of the protein. This domain is found in bacteria, and is approximately 60 amino acids in length. There are two completely conserved residues (I and F) that may be functionally important. Internalin mediates bacterial adhesion and invasion of epithelial cells in the human intestine through specific interaction with its host cell receptor E-cadherin. The cap domain is conserved between different internalin types and does not interact with E cadherin; therefore its function is presumably structural: capping the hydrophobic core.
