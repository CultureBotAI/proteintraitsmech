identifier: InterPro:IPR056934
label: "Histone acetyltransferase Rv0428c-like, SH3 domain"
definition: >-
  This entry represents the SH3 domain found at the N terminus of Rv0428c, a probable histone acetyltransferase from Mycobacterium tuberculosis. It may be involved in survival under stress conditions. Members of this entry are specific to actinomycetes.
