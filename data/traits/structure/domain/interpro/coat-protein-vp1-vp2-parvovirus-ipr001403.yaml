identifier: InterPro:IPR001403
label: "Coat protein VP1/VP2, Parvovirus"
definition: >-
  This entry represents a domain found in the Parvovirus coat protein VP1 and VP2. Parvoviruses are some of the smallest viruses containing linear, non-segmented single-stranded DNA genomes, with an average genome size of 5000 nucleotides. Parvoviruses have been described that infect a wide range of invertebrates and vertebrates and are well known for causing enteric disease in mammals. Genomes contain two large ORFs: NS1 and VP1; other ORFs are found in some sub-types and different gene products can arise from splice variants and the use of different start codons. The Parvovirus coat protein VP1 together with VP2 forms a capsomer. Both of these proteins are formed from the same transcript using alternative translation start codons. As a result, VP1 and VP2 differ only in the N terminus region. VP2 is involved in packaging the viral DNA. The mature viron contains three capsid proteins VP1, VP2, and VP3 and a noncapsid protein NS1. VP3 may arise from a third start codon with a favorable translation initiation context which is present at position 3067 in the ChPV genome and which has been described in the goose and Muscovy duck parvoviruses.
