identifier: InterPro:IPR022382
label: "Mycoplasma immunoglobulin protease"
definition: >-
  This is the serine protease domain of MIP (Mycoplasma immunoglobulin protease), a protein that is related to pathogenicity of animal and human pathogenic Mycoplasmas. This protein functions together with the Ig binding protein M (MIB) to evade host Ig-mediated defense against the MIB-MIP system, which is a novel mechanism that protects mycoplasma against host immune response. MIB tightly interacts to the antigen-binding fragment (Fab) and recruits the MIP protease that is activated and cleaves the IgG heavy chain, disrupting the antigen binding site. Therefore, the MIB-MIP system appears to be crucial to mycoplasma immune evasion.
