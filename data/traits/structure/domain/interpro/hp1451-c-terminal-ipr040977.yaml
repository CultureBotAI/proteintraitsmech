identifier: InterPro:IPR040977
label: "HP1451, C-terminal"
definition: >-
  HP1451 modulates the ATPase activity of HP0525 H. pylori. It is suggested that HP1451 acts as an inhibitory factor of HP0525 to regulate Cag-mediated secretion. It consists of two domains. The two HP1451 domains (referred to as the KH-domain and S8-domain) interact with each other via two salt bridges. The second domain is structurally homologous to other nucleic acid-binding proteins such as the NTD of ribosomal protein S8 and DNaseI.
