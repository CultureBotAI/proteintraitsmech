identifier: InterPro:IPR004606
label: Molybdenum-pterin binding domain
definition: >-
  Mop domains are present in a variety of bacterial and archeal proteins and specifically bind molybdate (or tungstate). The simplest mop-containing proteins are the so-called molbindins, consisting entirely of either one or two mop domains. The physiological role of these proteins is unclear, although they have been implicated in molybdate storage and homeostasis. Other mop-containing proteins are ModC, a component of the high affinity ABC transporter, and ModE, the molybdate-dependent transcriptional regulator. The mop domain consists of 68 amino acid residues arranged in six β-strands linked by short loops. It contains a β-barrel comprised of five antiparallel β-strands in a Greek key arrangement that is capped by amphipathic two-turns α-helices. The mop domain structure corresponds to the canonical oligonucleotide/oligosaccharide binding (OB) fold.
