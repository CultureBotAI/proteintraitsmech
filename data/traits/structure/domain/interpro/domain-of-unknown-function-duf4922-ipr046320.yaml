label: "Domain of unknown function DUF4922"
definition: >-
  This domain is found in uncharacterised proteins of around 310 residues in length and is mainly found in various Bacteroides species. Several members are annotated as putative glycosyltransferases, but the specific function of this domain is still unknown.
