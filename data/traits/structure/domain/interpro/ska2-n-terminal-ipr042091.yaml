identifier: InterPro:IPR042091
label: "Ska2, N-terminal"
definition: >-
  This entry represents the N-terminal domain of Ska2. Spindle and kinetochore-associated protein 2 (Ska2) is a component of the SKA1 complex (consists of Ska1, Ska2, and Ska3/Rama1), a microtubule-binding subcomplex of the outer kinetochore that is essential for proper chromosome segregation. It is required for timely anaphase onset during mitosis, when chromosomes undergo bipolar attachment on spindle microtubules leading to silencing of the spindle checkpoint. The SKA1 complex is a direct component of the kinetochore-microtubule interface and directly associates with microtubules as oligomeric assemblies. The complex facilitates the processive movement of microspheres along a microtubule in a depolymerisation-coupled manner. In the complex, it is required for SKA1 localisation.
