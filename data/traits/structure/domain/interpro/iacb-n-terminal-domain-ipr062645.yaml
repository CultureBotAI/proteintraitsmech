identifier: InterPro:IPR062645
label: "IacB, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of IacB proteins found in fungi. IacB is part of a gene cluster that mediates the biosynthesis of iso-A82775C, a enylepoxycyclohexane and biosynthetic precursor of chloropestolide anticancer natural products. The gene cluster includes prenyltransferases, oxidoreductases, and short-chain dehydrogenases that convert siccayne to iso-A82775C through multiple enzymatic steps. Expression of iacB is co-regulated with other cluster genes and controlled by cluster-specific transcription factors. Disruption of iacB does not affect iso-A82775C production. The specific function of this N-terminal domain remains to be determined.
