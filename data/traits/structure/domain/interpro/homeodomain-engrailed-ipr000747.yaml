identifier: InterPro:IPR000747
label: "Homeodomain engrailed"
definition: >-
  Proteins that regulate developmental gene expression are nuclear proteins that contain a conserved domain known as the homedomain (HD), the flanking sequences of which differ considerably among different proteins. The HD includes the helix-turn-helix (HTH) motif which binds to DNA. Most proteins which contain a HD can be classified, on the basis of their sequence characteristics, into three subfamilies, engrailed, antennapedia and paired. The engrailed subfamily plays an important role in Drosophila segmentation and neurogenesis, affecting genes in posterior compartments of the developing embryo. It is also required for the development of the central nervous system. Homologues found in other species may play a role in neurogenesis, possibly in both the compartmentalisation of the developing neural tube and specification of particular neuronal populations. Other members of the engrailed subfamily include Drosophila invected protein (inv); Apis mellifera (Honeybee) E30 and E60; Schistocerca americana (American grasshopper) G-En; mammalian and birds En-1 and En-2; Danio rerio (Zebrafish) (Brachydanio rerio) Eng-1, -2 and -3; Helobdella triserialis (Leech) Ht-En; and Caenorhabditis elegans ceh-16.
