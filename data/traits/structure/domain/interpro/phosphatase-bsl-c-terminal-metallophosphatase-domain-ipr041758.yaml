identifier: InterPro:IPR041758
label: "Phosphatase BSL, C-terminal metallophosphatase domain"
definition: >-
  Protein phosphatases with Kelch-like domains (PPKL) are members of the phosphoprotein phosphatases family present only in plants and alveolates. They have been described as positive effectors of brassinosteroid (BR) signaling in plants. This family consists of Bsu1-like (BSL) proteins, such as BSL1, BSL2, and BSL3. BSL1 and BSL2/BSL3 belong to two ancient evolutionary clades that have been highly conserved in land plants. In contrast, the Bsu1 proteins are exclusively found in the Brassicaceae and display a remarkable sequence divergence. This entry consists of the metallophosphatase domain of BSL proteins, and does not include Bsu1.
