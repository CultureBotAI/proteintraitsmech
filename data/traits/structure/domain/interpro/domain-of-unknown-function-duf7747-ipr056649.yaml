identifier: InterPro:IPR056649
label: "Domain of unknown function DUF7747"
definition: >-
  This domain is found in uncharacterised protein ZK892.6 from Caenorhabditis elegans and related proteins. It is found either standalone or in combination with other domains. Some proteins contain multiple copies of this domain. It is predicted to adopt a globular structure consisting of an antiparallel six-stranded β-sheet and α-helices packed on both sides of it. This domain contains a highly conserved PxxPP motif.
