identifier: InterPro:IPR021040
label: "LRRC8, pannexin-like TM region"
definition: >-
  This entry represents the four transmembrane domains of metazoan leucine-rich-repeat-containing 8 proteins. These four TMs associate into hexamers resulting in homo- or heteromeric channels that connect the cytosol to the extracellular space.
