identifier: InterPro:IPR055270
label: "Fucosyltransferase, C-terminal"
definition: >-
  This is the C-terminal domain of a family of fucosyltransferases, known as glycosyltransferase family 10. This enzyme transfers fucose from GDP-Fucose to GlcNAc in an alpha(1,3) linkage. The C-terminal Rossman-like domain is presumed to be involved in acceptor interactions
