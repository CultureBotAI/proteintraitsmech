identifier: InterPro:IPR005653
label: "Organic solvent tolerance-like, N-terminal"
definition: >-
  This domain is found in a number of bacterial proteins, including the LPS-assembly protein lptD, which is involved in organic solvent tolerance. It is also found in lipopolysaccharide export system protein LptH that is responsible for lipopolysaccharide and lipoproteins transport to the outer membrane respectively, and important for cell envelope stability.
