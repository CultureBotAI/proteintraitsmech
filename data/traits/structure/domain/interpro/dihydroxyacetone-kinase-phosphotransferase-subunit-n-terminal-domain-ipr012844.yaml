identifier: InterPro:IPR012844
label: "Dihydroxyacetone kinase phosphotransferase subunit, N-terminal domain"
definition: >-
  In Escherichia coli and many other bacteria, unlike the yeasts and a few bacteria such as Citrobacter freundii, the dihydroxyacetone kinase (also called glycerone kinase) transfers a phosphate from a phosphoprotein rather than from ATP. The dihydroxyacetone kinase of Escherichia coli consists of three subunits: DhaK, DhaL and DhaM. DhaM consists of three domains. The N-terminal dimerisation domain has the same fold as the IIA domain of the mannose transporter of the bacterial phosphoenolpyruvate:sugar phosphotransferase system (PTS). The middle domain is similar to HPr and the C terminus is similar to the N-terminal domain of enzyme I (EI) of the PTS. This entry represents the N-terminal domain of DhaM.
