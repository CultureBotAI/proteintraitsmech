identifier: InterPro:IPR058148
label: "M949_RS01915-like domain"
definition: >-
  This entry represents a domain found in M949_RS01915 from the Gram-negative duck pathogen Riemerella anatipestifer and similar proteins. Disruption of the gene encoding this protein causes a defect in lipopolysaccharide (LPS) structure with altered serology and apparent changes in O-antigen structure. Homologues are found in about three percent of bacteria. They are likely to be involved in some way in surface polysaccharide biosynthesis, but it has not been shown that the affected pathway product will always be LPS. This domain is found in combination with a prokaryotic membrane lipoprotein lipid attachment site ( ) in some members, suggesting it could be associated with the membrane.
