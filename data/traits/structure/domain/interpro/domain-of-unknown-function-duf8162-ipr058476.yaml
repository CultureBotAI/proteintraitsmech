identifier: InterPro:IPR058476
label: "Domain of unknown function DUF8162"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in Halobacteria. The domain is predominantly found in archaea, with a notable presence in the Halorubrum genus. Proteins containing this domain are typically between 150 and 190 amino acids in length. The domain is predicted to be part of integral membrane proteins with four predicted transmembrane helices.
