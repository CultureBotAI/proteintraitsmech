identifier: InterPro:IPR059256
label: "RIC1, second beta-propeller domain"
definition: >-
  This entry represents the second β-propeller domain found in RIC1 (Ribosome control protein 1) proteins. This domain is consistently found C-terminal to another β-propeller domain in RIC1 proteins from species ranging from yeast to humans. RIC1 proteins form a complex with RGP1 that functions as a guanine nucleotide exchange factor (GEF) for RAB6A, exchanging bound GDP for free GTP. The RIC1-RGP1 complex is required for efficient fusion of endosome-derived vesicles with the Golgi compartment and participates in the recycling of mannose-6-phosphate receptors. RIC1 is also required for phosphorylation and localization of GJA1 and plays a role in procollagen transport and secretion. It is essential for correct cartilage morphogenesis and development of the craniofacial skeleton.
