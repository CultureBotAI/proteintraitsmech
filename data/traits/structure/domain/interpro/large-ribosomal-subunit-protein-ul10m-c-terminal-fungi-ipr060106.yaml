identifier: InterPro:IPR060106
label: "Large ribosomal subunit protein uL10m, C-terminal, fungi"
definition: >-
  This entry represents the C-terminal helical region of mitochondrial ribosomal protein L11 (MRPL11/uL10m). This entry is found in fungi and contains disordered regions at the C-terminal. MRPL11 is a component of the mitochondrial large ribosomal subunit (54S) and is part of the mitoribosome machinery responsible for synthesis of mitochondrial genome-encoded proteins. The protein belongs to the universal ribosomal protein uL10 family and has been structurally characterised in the Neurospora crassa mitoribosome. While the full-length MRPL11 protein has established roles in mitochondrial translation, the specific function of this C-terminal helical region remains to be determined.
