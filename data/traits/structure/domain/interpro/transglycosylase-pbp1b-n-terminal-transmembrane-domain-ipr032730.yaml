identifier: InterPro:IPR032730
label: "Transglycosylase PBP1b, N-terminal transmembrane domain"
definition: >-
  This is the N-terminal transmembrane domain of penicillin-binding protein (PBP) transglycosylases, the multi-domain membrane proteins essential for cell wall synthesis that are targeted by penicillin antibiotics. The TM domain is a single helix, several of whose residues lie in close proximity to hydrophobic residues in the TGT domain. The TM helix seems to be necessary for stabilising the protein-membrane interaction, and the resulting orientation limits the interaction between PBPb1 and lipid II in the membrane in a 2D lateral diffusion fashion.
