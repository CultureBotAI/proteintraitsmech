identifier: InterPro:IPR055254
label: "pPIWI_RE three-gene island, domain Z"
definition: >-
  This entry represents a poorly-understood bacterial domain observed N-terminal to DinG-type helicase, which is part of a conserved three-gene island also containing a REase domain and the pPIWI_RE module. This three gene island is predicted to form a conflict system which targets R-loop formation of invasive plasmids during plasmid replication.
