identifier: InterPro:IPR059920
label: "Histidine triad hairpin domain"
definition: >-
  This small domain is found repeated in a number of uncharacterised eukaryotic proteins. It is predicted to fold into a β-hairpin which contains three highly conserved histidine residues forming a Hx(2)HxH sequence motif. These histidine residues may be involved in a metal coordination. This domain also contains two highly conserved cysteine residues which are predicted to form disulfide bond which clamps the hairpin and may contribute to the stability. In addition, a stabilising role could be attributed to a highly conserved tryptophan residue which may be involved in hydrophobic contacts with the rest of the polypeptide chain.
