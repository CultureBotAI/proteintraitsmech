identifier: InterPro:IPR035056
label: MST4, kinase domain
definition: >-
  This entry represents the catalytic domain of serine/threonine-protein kinase 26, also known as MST4 or MASK (MST3 and SOK1-related kinase). MST4 plays a role in mitogen-activated protein kinase (MAPK) signaling during cytoskeletal rearrangement, morphogenesis, and apoptosis. It influences cell growth and transformation by modulating the extracellular signal-regulated kinase (ERK) pathway. MST4 may also play a role in tumor formation and progression. It localizes in the Golgi apparatus by interacting with the Golgi matrix protein GM130 and may play a role in cell migration.
