identifier: InterPro:IPR063677
label: "Meiosis 1 arrest protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Meiosis 1 arrest protein (M1AP), which may adopt a β-barrel fold. M1AP is required for meiosis I progression during spermatogenesis and is localised to the cytoplasm. The full-length protein is expressed in male germ cells from spermatogonia to spermatids during testicular development. Mutations in M1AP cause spermatogenic failure 48 (SPGF48), an autosomal recessive disorder resulting in severe oligozoospermia and male infertility due to meiotic arrest.
