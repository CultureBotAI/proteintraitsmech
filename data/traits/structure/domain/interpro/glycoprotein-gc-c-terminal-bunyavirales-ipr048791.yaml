identifier: InterPro:IPR048791
label: "Glycoprotein Gc, C-terminal, bunyavirales"
definition: >-
  The medium (M) genome segment of hantaviruses (family Bunyaviridae) encodes the two virion glycoproteins Gn and Gc (also known as G1 and G2, respectively) as a polyprotein precursor. Gn and Gc forms homotetramers at the surface of the virion, which attach the virion to host cell receptors including integrin beta3/ITGB3 and induce internalisation, predominantly through clathrin-dependent endocytosis. This protein has a typical class II fusion protein fold consisting of a central β-sandwich domain (termed domain I) made of eight β-strands arranged in two antiparallel β-sheets; domain II which has an elongated shape with two subdomains (a central, opened β-barrel proximal to domain I and a distal β-sandwich 'tip') and the C-terminal domain III, represented in this entry, which has a Ig-like fold. This domain is also found in similar proteins from bunyavirales.
