label: "Glutamyl-tRNA amidotransferase complex subunit Gta3 domain"
definition: >-
  This domain is found in a group of fungal proteins, including glutamyl-tRNA amidotransferase complex subunit Gta3 from Schizosaccharomyces pombe ( ), an orthologue of yeast GTF1 and human Glutamyl-tRNA(Gln) amidotransferase subunit C (GATC).
