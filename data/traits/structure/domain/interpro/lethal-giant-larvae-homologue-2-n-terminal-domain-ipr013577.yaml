identifier: InterPro:IPR013577
label: "Lethal giant larvae homologue 2, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of lethal giant larvae homologue 2 (LLGL2) proteins and syntaxin-binding proteins like tomosyn. It has been identified in eukaryotes and tends to be found together with WD repeats ( ).
