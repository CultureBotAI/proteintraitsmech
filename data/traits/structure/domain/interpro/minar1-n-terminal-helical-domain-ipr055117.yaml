identifier: InterPro:IPR055117
label: "MINAR1, N-terminal helical domain"
definition: >-
  This entry represents a N-terminal conserved domain found in the Major intrinsically disordered Notch2-binding receptor 1 (MINAR1) family. MINAR1 is a Notch2-binding protein that has been shown to inhibit angiogenesis and breast cancer growth.
