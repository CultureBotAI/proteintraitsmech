identifier: InterPro:IPR013113
label: "Siderophore-interacting, FAD-binding"
definition: >-
  This entry describes the FAD-binding domain found in siderophore-interacting proteins (SIP), mostly found in bacteria. This domain is also found in Mycobactin import ATP-binding/permease protein IrtA. Siderophore-interacting proteins (SIPs) are flavin-dependent enzymes that catalyse the release of iron from the siderophore complex by facilitating the reduction of Fe(III) to Fe(II). Structural and kinetic studies of these enzymes have identified two different families: the ferric siderophore reductases (FSRs) and the SIPs. FSRs contain an iron-sulphur cluster, which is absent in SIPs. SIPs can be further classified into two subgroups, which differ in cofactor preference. Subgroup I is characterised by having a longer α-helical C-terminal and preferring NADH, while subgroup II SIPs have an extended N-terminal and utilise NADPH. Mycobactin import ATP-binding/permease protein IrtA is part of the IrtAB complex, an ATP-binding cassette (ABC) transporter that plays a crucial role in iron acquisition in Mycobacterium tuberculosis. IrtAB is responsible for importing iron-loaded siderophores called mycobactins and carboxymycobactins into the bacterial cell.
