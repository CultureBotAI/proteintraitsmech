identifier: InterPro:IPR047530
label: RNA-dependent RNA polymerase, flavivirus
definition: >-
  This entry represents RNA-directed RNA polymerase (RdRp) from flaviviruses. These are arthropod-borne viruses, with distinct groups infecting mosquitoes or ticks. Mammals and birds are the usual primary hosts, in which infections range from asymptomatic to severe or fatal haemorrhagic fever or neurological disease. Important human pathogens include yellow fever virus, dengue virus, Japanese encephalitis virus, West Nile virus and tick-borne encephalitis virus. Other members cause economically important diseases in domestic or wild animals. The viral genome of Flavivirus is a positive strand RNA that encodes a single polyprotein precursor containing three structural proteins found in the mature virion (C, prM, and E) and seven "non-structural" proteins (NS1, NS2A, NS2B, NS3, NS4A, NS4B, and NS5), which is processed into mature proteins by the host signal peptidase and NS3 serine protease, which requires NS2B as a cofactor.
