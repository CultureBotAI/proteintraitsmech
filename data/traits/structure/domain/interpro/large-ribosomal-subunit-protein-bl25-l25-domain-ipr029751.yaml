identifier: InterPro:IPR029751
label: "Large ribosomal subunit protein bL25, L25 domain"
definition: >-
  This entry represents the N-terminal domain of the long-form of the large ribosomal subunit protein bL25, also known as General stress protein CTC (CTC-like). The L25 domain covers the full length of the protein in the short-form of bL25 (L25-like). Ribosomal protein bL25, previously known as L25, is an RNA binding protein, that binds 5S rRNA. Ribosomal protein bL25 has a long-form and a short-form. The long-form is represented by the general stress protein Ctc of Bacillus subtilis, which has now been localised to ribosomes, and ribosomal protein TL5 of Thermus thermophilus. CTC is a known stress protein, and proteins of this family are believed to have two functions, acting as both ribosomal and stress proteins. In Escherichia coli, cells deleted for L25 were found to be viable; however, these cells grew slowly and had impaired protein synthesis capability. In Bacillus subtilis, CTC is induced under stress conditions and located in the ribosome; it has been proposed that CTC may be necessary for accurate translation under stress conditions. Members of this group of proteins are mostly found in bacteria, with a few exceptions such as plants. Ribosomal protein L25 of Escherichia coli and Haemophilus influenzae appear to be orthologous, but consist only of the N-terminal half of Ctc and TL5. Both short (L25-like) and full-length (CTC-like) members of this group bind the E-loop of bacterial 5S rRNA.
