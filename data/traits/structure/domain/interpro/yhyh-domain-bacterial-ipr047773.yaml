identifier: InterPro:IPR047773
label: "YHYH domain, bacterial"
definition: >-
  This entry represents a domain that contain a specific form of the YHYH motif. It is located near the N terminus of a protein just after a signal peptide region. The domain has two characteristic motifs, GxC and YH[YC]H, separated by a short spacer region of variable length. A different type of YHYH that locates more C-terminal in the protein sequences, and is repeated, is described by .
