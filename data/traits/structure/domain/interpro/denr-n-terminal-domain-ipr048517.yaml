identifier: InterPro:IPR048517
label: "DENR, N-terminal domain"
definition: >-
  The density regulated protein (DENR) forms a stable heterodimer with malignant T-cell-amplified sequence 1 (MCT-1) which interacts with the 40S ribosomal subunit during initiation, reinitiation and recycling stages, playing a role in regulation of non-canonical translation initiation and ribosomal recycling. This entry represents the N-terminal domain of DENR, containing a zinc ion-binding site, which preserves the structure of DENR's MCT-1-binding interface that is essential for the dimerisation. DENR likely coordinates the Zn ion mainly via three rather than four cysteines.
