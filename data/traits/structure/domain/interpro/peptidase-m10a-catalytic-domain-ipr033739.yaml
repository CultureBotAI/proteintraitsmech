identifier: InterPro:IPR033739
label: "Peptidase M10A, catalytic domain"
definition: >-
  This entry represents the matrix metalloproteinase (MMP) sub-family M10A catalytic domain. MMPs are responsible for a great deal of pericellular proteolysis of extracellular matrix and cell surface molecules, playing crucial roles in morphogenesis, cell fate specification, cell migration, tissue repair, tumorigenesis, gain or loss of tissue-specific functions, and apoptosis. In many instances, they are anchored to cell membranes via trans-membrane domains, and their activity is controlled via TIMPs (tissue inhibitors of metalloproteinases). Sequences having this domain are extracellular metalloproteases, such as collagenase and stromelysin, which degrade the extracellular matrix, are known as matrixins. They are zinc-dependent, calcium-activated proteases synthesised as inactive precursors(zymogens), which are proteolytically cleaved to yield the active enzyme. All MMPs possess an N-terminal domain and a zinc-binding catalytic domain. The N-terminal domain peptide, cleaved during the activation step, includes a conserved PRCGVPDV octapeptide, known as the cysteine switch, whose Cys residue chelates the active site zinc atom, rendering the enzyme inactive. The catalytic domain contains a zinc ion, which is responsible for the peptide hydrolysis reaction. Another zinc ion and one to three calcium ions are present in the catalytic domain with a structural role. All but two of the human MMPs (MMP-7 and MMP-26) also have a C-terminal hemopexin-like domain, and two MMPs (MMP-2 and MMP-9) contain fibronectin insertions into their catalytic domains.
