identifier: InterPro:IPR010895
label: CHRD
definition: >-
  CHRD (after SWISS-PROT abbreviation for chordin) is a novel domain identified in chordin, an inhibitor of bone morphogenetic proteins. This family includes bacterial homologues. It is anticipated to have an immunoglobulin-like β-barrel structure based on limited similarity to superoxide dismutases but, as yet, no clear functional prediction can be made.
