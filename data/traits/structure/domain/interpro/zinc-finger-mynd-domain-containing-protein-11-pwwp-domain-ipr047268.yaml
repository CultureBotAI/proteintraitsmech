identifier: InterPro:IPR047268
label: "Zinc finger MYND domain-containing protein 11, PWWP domain"
definition: >-
  This entry represents the PWWP domain of ZMY11, which specifically recognises DNA and histone methylated lysines. Zinc finger MYND domain-containing protein 11 (ZMYND11 or ZMY11, also known as protein BS69) is a ubiquitously expressed nuclear protein acting as a transcriptional co-repressor in association with various transcription factors. This protein specifically recognises H3K36me3 on H3.3 (H3.3K36me3) and regulates RNA polymerase II elongation. It is critical for the repression of a transcriptional program that is essential for tumour cell growth. It was originally identified as an adenovirus 5 E1A-binding protein that inhibits E1A transactivation, as well as c-Myb transcription. It also mediates repression, at least in part, through interaction with the co-repressor N-CoR. Moreover, it interacts with Toll-interleukin 1 receptor domain (TIR)-containing adaptor molecule-1 (TICAM-1, also named TRIF) to facilitate NF-kappaB activation and type I IFN induction. It associates with PIAS1, a SUMO E3 enzyme, and Ubc9, a SUMO E2 enzyme, and plays an inhibitory role in muscle and neuronal differentiation. ZMY11 regulates Epstein-Barr virus (EBV) latent membrane protein 1 (LMP1)/C-terminal activation region 2 (CTAR2)-mediated NF-kappaB activation by interfering with the complex formation between TNFR-associated death domain protein (TRADD) and LMP1/CTAR2. It also cooperates with tumour necrosis factor receptor (TNFR)-associated factor 3 (TRAF3) in the regulation of EBV-derived LMP1/CTAR1-induced NF-kappaB activation. Furthermore, ZMY11 is involved in the p53-p21Cip1-mediated senescence pathway.
