identifier: InterPro:IPR060171
label: "Stationary phase protein 5, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of stationary phase protein 5 (SPG5). This domain is found in proteins of approximately 370 amino acids present across fungal species, particularly in the Ascomycota phylum. The full-length SPG5 protein is required for survival at high temperature during stationary phase and is induced during stationary phase in Saccharomyces cerevisiae. SPG5 binds to the proteasome and is involved in proteasome assembly. The protein is conserved across fungi.
