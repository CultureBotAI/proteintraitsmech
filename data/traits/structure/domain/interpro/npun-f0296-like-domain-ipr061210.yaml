identifier: InterPro:IPR061210
label: "Npun_F0296-like domain"
definition: >-
  This domain is found in Npun_F0296 from the filamentous cyanobacterium Nostoc punctiforme and similar bacterial sequences. This protein has a PEP-CTERM-like C-terminal protein-sorting domain that is induced specifically during the formation of hormogonia, which are filamentous colonies with a cooperative, pilus-driven, exopolysaccharide-dependent sliding motility. Mutation of the sorting enzyme, cyanoexosortase B, blocks hormogonium motifility. Homologues are linked to widely varying forms of C-terminal sorting domain, recognised and processed by various lineage-specific subtypes of exosortase, such as exosortase Z ( ), which recognises the PGAP-CTERM sorting signal ( ).
