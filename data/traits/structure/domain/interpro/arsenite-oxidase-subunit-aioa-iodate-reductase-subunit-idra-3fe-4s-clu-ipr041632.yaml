identifier: InterPro:IPR041632
label: "Arsenite oxidase subunit AioA/Iodate reductase subunit IdrA, 3Fe-4S cluster"
definition: >-
  Arsenite oxidase is a 100kDa molybdenum- and iron-sulfur-containing protein located on the outer surface of the inner membrane of Gram-negative organisms. The large subunit of arsenite oxidase (AioA) is similar to other members of the dimethylsulfoxide (DMSO) reductase family of molybdenum enzymes, while the small subunit contains a Rieske-type [2Fe-2S] site. The large subunit of arsenite oxidase is divided into four domains, with domain I binding the [3Fe-4S] cluster. Domain I consists of three antiparallel β-sheets and six helices. The [3Fe-4S] cluster is coordinated by the motif Cys21-X2-Cys24-X3-Cys28 near the interface with domains III and IV. A large, flattened funnel-like cavity bounded by domains I, II, and III leads to the molybdenum centre ( ) located near the centre of the molecule. This domain is also found in iodate reductase subunit IdrA, the closest related member of the DMSO reductase family.
