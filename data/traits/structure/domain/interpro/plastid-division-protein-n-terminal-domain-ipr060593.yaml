identifier: InterPro:IPR060593
label: "Plastid division protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of plastid division proteins PDV1 and PDV2 and similar sequences found in plants. These proteins are components of the plastid division machinery that accomplishes binary fission by simultaneous constriction of the FtsZ ring and the ARC5/DRP5B ring. PDV proteins mediate recruitment and regulation of ARC5/DRP5B at the plastid division site and relay positional information between the stroma and outer surface via interactions with cytoplasmic and membrane-bound division machinery components. The N-terminal region is located in the cytoplasm and contains disordered regions and coiled-coil structures.
