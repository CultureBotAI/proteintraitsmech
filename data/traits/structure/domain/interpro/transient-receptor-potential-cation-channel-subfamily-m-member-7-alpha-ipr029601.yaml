identifier: InterPro:IPR029601
label: Transient receptor potential cation channel subfamily M member 7, alpha-kinase domain
definition: >-
  The TRPM subfamily of mammalian TRP channels includes TRPM7, which is a bifunctional molecule consisting of a TRP ion channel fused to a serine/threonine-protein kinase domain. It conducts Zn(2+), Mg(2+), and Ca(2+) as well as monovalent cations. The kinase domain is proteolytically cleaved from the channel domain in a cell-type-specific manner, with the cleaved kinase fragments translocating to the nucleus and binding multiple components of chromatin-remodeling complexes. TRPM7 plays a prominent role in cellular and systemic magnesium homeostasis, and is a key player in embryonic development, global ischemia, cardiovascular disease, and cancer. This entry represents the alpha-kinase domain of TRMP7.
