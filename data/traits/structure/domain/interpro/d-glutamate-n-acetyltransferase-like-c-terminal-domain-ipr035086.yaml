identifier: InterPro:IPR035086
label: "D-glutamate N-acetyltransferase-like, C-terminal domain"
definition: >-
  This entry represents a domain found at the C-terminal of a group of prokaryotic proteins that includes from Tritonibacter scottomollicae (DgcN), an N-acetyltransferase responsible for N-acetylation of D-Glutamate, an essential component of bacterial peptidoglycans. DgcN consists of two distinct domains. This domain, which consists of four β-strands and five α-helices, shows a P-loop structure.
