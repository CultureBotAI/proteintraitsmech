identifier: InterPro:IPR058253
label: "Probable double zinc ribbon domain"
definition: >-
  This domain is found in uncharacterised fungal proteins. It contains four pairs of highly conserved cysteine residues that may be involved in metal coordination. It probably resembles two joined zinc ribbon domains judging by the AlphaFold prediction.
