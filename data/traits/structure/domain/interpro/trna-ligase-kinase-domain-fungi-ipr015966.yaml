identifier: InterPro:IPR015966
label: "tRNA ligase, kinase domain, fungi"
definition: >-
  This entry represents a kinase domain found in fungal tRNA ligases. tRNA ligases are enzymes required for the splicing of precursor tRNA molecules containing introns. This domain contains a P-loop motif.
