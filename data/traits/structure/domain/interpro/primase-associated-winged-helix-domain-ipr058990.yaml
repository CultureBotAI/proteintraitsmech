identifier: InterPro:IPR058990
label: "Primase-associated, winged helix domain"
definition: >-
  This entry represents the third domain found in a family of uncharacterised proteins from halobacteria that are found adjacent to a DNA primase-like protein. This domain adopts a winged helix fold. Proteins in this group are typically around 500 amino acids in length. Many of these proteins are encoded on plasmids, suggesting a potential role in plasmid-associated functions.
