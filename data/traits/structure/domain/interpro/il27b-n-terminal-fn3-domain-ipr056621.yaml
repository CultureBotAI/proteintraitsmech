identifier: InterPro:IPR056621
label: "IL27B, N-terminal Fn3 domain"
definition: >-
  This entry represents the Fibronectin type III (FN3) domain found at the N-terminal end of Interleukin-27 subunit beta (IL27B), from animals. This domain is found in association with a C-terminal FN3 ( ). Also known as EBI3, IL27B binds p28 to form the heterodimeric cytokine IL-27, which plays an important role in innate immunity by inducing naive CD4+ T cells proliferation. IL-27 binds GP130 and IL-27Ra, acting as a bridge, to activate the JAK/STAT signalling cascade. EBI3 stabilises the complex by binding a positively charged surface of IL-27Ra and Domain 1 of GP130.
