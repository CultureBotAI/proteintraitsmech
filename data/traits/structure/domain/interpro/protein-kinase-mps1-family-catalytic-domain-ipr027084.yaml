identifier: InterPro:IPR027084
label: "Protein kinase Mps1 family, catalytic domain"
definition: >-
  This entry represents the catalytic domain of Mps1, which is in the C-terminal region. The Mps1 family of protein kinases is a critical regulator of genetic stability. In yeast, Mps1 is required for the spindle checkpoint and SPB duplication. Human Mps1, also known as TTK, is required for proper chromosome alignment on the metaphase plate and for the fidelity of chromosome segregation, and might also have a role at centrosomes. It is associated with cell proliferation and involved in mitotic cell cycle checkpoint control. In late mitosis, Mps1 is ubiquitinated by the APC/C and subsequently degraded.
