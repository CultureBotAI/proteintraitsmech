identifier: InterPro:IPR046944
label: Estrogen receptor, N-terminal
definition: >-
  The oestrogen receptors (ERs) are steroid or nuclear hormone receptors that act as transcription regulators involved in diverse physiological functions. Oestrogen receptors function as dimeric molecules in nuclei to regulate the transcription of target genes in a ligand-responsive manner. The ER consists of three functional and structural domains: an N-terminal modulatory domain, a highly conserved DNA-binding domain that recognises specific sequences ( ), and a C-terminal ligand-binding domain ( ). This entry represents the N-terminal modulatory domain of the estrogen receptor, which spans the first 180 residues and contains the activation function 1 (AF1) region. Nuclear receptors differ considerably with respect to AF1 activity and regulation, as it is a poorly conserved region. There is another activation function region, namely AF2, which resides in the C-terminal end of the ligand-binding domain. Transcription activation is facilitated by both AF1 and AF2, which appear to act synergistically in the ER complex. For example, the ER can recruit TIF2 (transcription intermediary factor 2) via the AF1 and AF2 regions, whose synergistic action results in the activation of transcription.
