identifier: InterPro:IPR019023
label: "Lamin-B receptor of TUDOR domain"
definition: >-
  The Lamin-B receptor is a chromatin and lamin binding protein in the inner nuclear membrane. It is one of the integral inner nuclear envelope membrane proteins responsible for targeting nuclear membranes to chromatin, being a downstream effector of Ran, a small Ras-like nuclear GTPase which regulates NE assembly. Lamin-B receptor interacts with importin beta, a Ran-binding protein, thereby directly contributing to the fusion of membrane vesicles and the formation of the nuclear envelope. It also plays an essential role in cholesterol synthesis, as it catalyses the reduction of the C14-unsaturated bond of lanosterol.
