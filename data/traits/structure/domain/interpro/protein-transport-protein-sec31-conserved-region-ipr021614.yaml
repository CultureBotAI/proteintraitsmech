identifier: InterPro:IPR021614
label: "Protein transport protein SEC31, conserved region"
definition: >-
  Sec31 is involved in COPII coat formation as it forms through the sequential binding of three cytoplasmic proteins: Sar1, Sec23/24 and Sec13/31. Sec13/31 is recruited by the pre-budding complex and polymerisation of Sec13/31 occurs to form an octahedral cage that is the outer shell of the COPII coat. Sec13/31 is a hetero-tetramer which is organised as a linear array of α-solenoid and β-propeller domains to form a rod in which twenty-four copies assemble to form the COPII cub-octahedron. This entry represents a conserved short region found towards the C-terminal, which is predicted to be disordered.
