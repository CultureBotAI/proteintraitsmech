identifier: InterPro:IPR018897
label: "Plasmid conjugative transfer protein PilI"
definition: >-
  The thin pilus of plasmid R64 belongs to the type IV family and is required for liquid matings. PilI is one of 14 genes that have been identified as being involved in the biogenesis of the R64 thin pilus. According to structure prediction, proteins in this family adopt a compact domain composed of five β strands and an α helix between strands two and three.
