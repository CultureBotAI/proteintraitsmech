identifier: InterPro:IPR039561
label: "Peptidase M15C"
definition: >-
  This entry includes members of the peptidase M15C family, including CwlK from Bacillus subtilis and L-alanyl-D-glutamate peptidase Lys from Escherichia phage T5. CwlK is a peptidoglycan L-alanyl-D-glutamate endopeptidase. Lys is a metal ion-dependent L-alanoyl-D-glutamate peptidase.
