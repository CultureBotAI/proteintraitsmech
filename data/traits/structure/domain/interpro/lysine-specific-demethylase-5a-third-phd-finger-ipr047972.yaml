identifier: InterPro:IPR047972
label: "Lysine-specific demethylase 5A, third PHD-finger"
definition: >-
  This entry represents the third PHD finger of KDM5A from chordates. KDM5A (also termed Histone demethylase JARID1A, or Retinoblastoma-binding protein 2 (RBBP-2 or RBP2)) was originally identified as a retinoblastoma protein (Rb)-binding partner and its inactivation may be important for Rb to promote differentiation. It is involved in transcription through interacting with TBP, p107, nuclear receptors, Myc, Sin3/HDAC, Mad1, RBP-J, CLOCK, and BMAL1. KDM5A functions as a trimethylated histone H3 lysine 4 (H3K4me3) demethylase that belongs to the JARID subfamily within the JmjC proteins. It also displays DNA-binding activities that can recognize the specific DNA sequence CCGCCC. KDM5A contains the catalytic JmjC domain, JmjN, the AT-rich DNA-interacting domain (ARID, also known as BRIGHT), and a Cys5HisCys2 zinc finger, as well as three plant homeodomain (PHD) fingers.
