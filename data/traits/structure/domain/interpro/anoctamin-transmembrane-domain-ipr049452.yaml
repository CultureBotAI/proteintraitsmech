identifier: InterPro:IPR049452
label: "Anoctamin, transmembrane domain"
definition: >-
  This entry represents the transmembrane domain from the anoctamin family of proteins, which includes anoctamin1-10 (Ano1-10 or TMEM16A-J). Seven members could be divided into two subfamilies; Ca2-dependent Cl(-) channels (TMEM16A and 16B) and Ca2-dependent lipid scramblases (TMEM16C, 16D, 16F, 16G, and 16J). This entry also includes anoctamin-like protein At1g73020 from Arabidopsis and increased sodium tolerance protein 2 (Ist2) from budding yeasts.
