identifier: InterPro:IPR042782
label: "Tetraspanin-32, extracellular domain"
definition: >-
  This entry represents the extracellular domain or large extracellular loop (LEL) of Tetraspanin-32 (also known as PHEMX or TSSC6). This domain spans the extracellular domain between the 3rd and 4th trans-membrane segment. Phemx (pan hematopoietic expression) may play a role in hematopoietic cell function. Tetraspanins are trans-membrane proteins with 4 trans-membrane segments. Both the N- and C-termini lie on the intracellular side of the membrane. Tetraspanins are involved in diverse processes and their various functions may relate to their ability to act as molecular facilitators. Tetraspanins associate laterally with one another and cluster dynamically with numerous parnter domains in membrane microdomains, forming a network of multimolecular complexes, the "tetraspanin web".
