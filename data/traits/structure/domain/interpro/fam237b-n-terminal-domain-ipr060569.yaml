identifier: InterPro:IPR060569
label: "FAM237B, N-terminal domain"
definition: >-
  This entry represents the N-terminal in FAM237B (Family with sequence similarity 237 member B) secreted proteins from vertebrates, which contain an N-terminal signal peptide for secretion. The mature protein undergoes C-terminal processing with removal of a propeptide region. FAM237B requires C-terminal amidation and disulfide bond formation for activity. The protein may be capable of activating GPR83 via the GNAQ signalling pathway.
