label: "Tetracyclin repressor-like 40, C-terminal domain"
definition: >-
  This domain is found at the C-terminal of bacterial transcriptional regulators, including RolR from Corynebacterium glutamicum ( ), which is involved in aromatic catabolism. This signal-receiving domain shows an all-α-helical fold. It is found associated with , responsible for DNA-binding.
