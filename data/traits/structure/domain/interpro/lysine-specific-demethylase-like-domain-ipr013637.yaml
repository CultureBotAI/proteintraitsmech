identifier: InterPro:IPR013637
label: "Lysine-specific demethylase-like domain"
definition: >-
  This domain is found in the central region of lysine-specific demethylases, which are nuclear proteins that may have a role in DNA-binding and transcription, and are associated with malignant cancer phenotypes. The domain is also found in various other Jumonji/ARID domain-containing proteins (see , ).
