identifier: InterPro:IPR006500
label: "Helicase, putative, phage/plasmid, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the putative helicase 022R from Frog virus and similar sequences found in virus and plasmids from bacteria and archaea. These sequences form a clade within a larger family of proteins from viruses of bacteria and animals.
