label: "Domain of unknown function DUF7884"
definition: >-
  This domain is found in a group of uncharacterised bacterial proteins. It is usually found associated with methyltransferase domains such as and and is predicted to adopt an α-β configuration. It has a conserved motif F/YWDG.
