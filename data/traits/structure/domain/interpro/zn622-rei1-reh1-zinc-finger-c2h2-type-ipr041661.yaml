identifier: InterPro:IPR041661
label: "ZN622/Rei1/Reh1, zinc finger C2H2-type"
definition: >-
  This domain contains two copies of a C2H2-like zinc finger. Proteins containing this domain include cytoplasmic 60S subunit biogenesis factor ZNF622 from animals, Reh1 and Rei1 from budding yeasts, and core trichothecene cluster protein 15 (TRI15) from Fusarium. Cytoplasmic 60S subunit biogenesis factor ZNF622, Reh1 and Rei1 are involved in maturation of the large (60S) ribosomal subunit. Rei1 is required for re-importing the 60S subunit export factor Arx1 from the cytoplasm to the nucleus, and both Reh1 and Rei1 are required for cytoplasmic maturation of the 60S subunit, that the two proteins have redundant functions, but without both the 6OS subunit is labile to salt.
