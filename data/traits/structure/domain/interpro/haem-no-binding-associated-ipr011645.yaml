identifier: InterPro:IPR011645
label: Haem NO binding associated
definition: >-
  The HNOBA (Haem NO Binding) domain is found associated with the HNOB domain and in soluble cyclases and signalling proteins. The HNOB domain is predicted to function as a haem-dependent sensor for gaseous ligands, and transduce diverse downstream signals in both bacteria and animals.
