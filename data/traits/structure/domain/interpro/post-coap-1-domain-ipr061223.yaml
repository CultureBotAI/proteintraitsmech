identifier: InterPro:IPR061223
label: "Post-COAP-1 domain"
definition: >-
  Post-COAP-1 is a C-terminal domain, about 115 amino acids in length, found in a subset of proteins with the choice-of-anchor P (COAP) domain (see ). This domain is seen primarily in non-cultured prokaryotes.
