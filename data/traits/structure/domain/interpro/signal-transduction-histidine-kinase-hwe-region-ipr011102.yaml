identifier: InterPro:IPR011102
label: "Signal transduction histidine kinase, HWE region"
definition: >-
  The HWE domain is found in a subset of two-component system kinases, belonging to the same superfamily as, including Blue-light-activated histidine kinase from Brucela, a photosensitive kinase that is involved in flagella synthesis, exopolysaccharide production, biofilm formation and ultimately increased bacterial virulence upon exposure to light. In, the HWE family was defined by the presence of conserved a H residue and a WXE motifs and was limited to members of the proteobacteria. However, many homologues of this domain lack the WXE motif. Furthermore, homologues are found in a wide range of Gram-positive and Gram-negative bacteria. Two-component signal transduction systems enable bacteria to sense, respond, and adapt to a wide range of environments, stressors, and growth conditions. Some bacteria can contain up to as many as 200 two-component systems that need tight regulation to prevent unwanted cross-talk. These pathways have been adapted to response to a wide variety of stimuli, including nutrients, cellular redox state, changes in osmolarity, quorum signals, antibiotics, and more. Two-component systems are comprised of a sensor histidine kinase (HK) and its cognate response regulator (RR). The HK catalyses its own auto-phosphorylation followed by the transfer of the phosphoryl group to the receiver domain on RR; phosphorylation of the RR usually activates an attached output domain, which can then effect changes in cellular physiology, often by regulating gene expression. Some HK are bifunctional, catalysing both the phosphorylation and dephosphorylation of their cognate RR. The input stimuli can regulate either the kinase or phosphatase activity of the bifunctional HK. A variant of the two-component system is the phospho-relay system. Here a hybrid HK auto-phos…
