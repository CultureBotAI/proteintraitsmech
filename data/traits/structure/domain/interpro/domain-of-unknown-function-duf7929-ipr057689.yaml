identifier: InterPro:IPR057689
label: "Domain of unknown function DUF7929"
definition: >-
  This domain is found in a very small group of proteins mainly from Phyllobacteriaceae. It is predicted to fold into a β-sandwich with topological similarity to domains members of the adhesin superfamily. Members contain conserved lysine, aspartate and asparagine residues that are likely to form an isopeptide bond.
