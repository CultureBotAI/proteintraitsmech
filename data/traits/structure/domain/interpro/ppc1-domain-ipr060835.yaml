identifier: InterPro:IPR060835
label: "PPC1 domain"
definition: >-
  This entry represents the so-called PPC1 domain. The PEP-CTERM domain is a protein-sorting domain, about 25 amino acids in length, typically found as the most C-terminal domain feature in any bacterial protein. However, a subset of choice-of-anchor J family proteins with PEP-CTERM domains have an additional, extremely unusual novel domain located C-terminally to the PEP-CTERM domain. This domain is found also in proteins that have very little sequence N-terminal to this domain. This entry represents the first observation of this that has resulting in the naming of a novel domain, and so the domain is named the post-PEP-CTERM-1 domain (PPC1 domain).
