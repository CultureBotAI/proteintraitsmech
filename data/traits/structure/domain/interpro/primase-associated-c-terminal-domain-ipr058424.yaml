identifier: InterPro:IPR058424
label: "Primase-associated, C-terminal domain"
definition: >-
  This entry represents the C-terminal α-helical domain from a family of uncharacterised proteins from halobacteria that are found adjacent to a DNA primase-like protein and associated with proteins that are often encoded on plasmids in various halophilic archaea. The proteins containing this domain are typically around 500 amino acids in length.
