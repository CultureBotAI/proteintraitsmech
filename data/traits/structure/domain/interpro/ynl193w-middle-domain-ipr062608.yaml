identifier: InterPro:IPR062608
label: "YNL193W, middle domain"
definition: >-
  This entry represents the middle domain of YNL193W and similar fungal proteins. YNL193W is an uncharacterised protein from Saccharomyces cerevisiae that is 558 amino acids in length. The function of this protein family and the specific role of this domain remain to be determined. This domain contains a TPR-like fold and a disordered region.
