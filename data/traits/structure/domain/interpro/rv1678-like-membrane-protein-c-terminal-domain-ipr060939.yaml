identifier: InterPro:IPR060939
label: "Rv1678-like membrane protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of Rv1678 from Mycobacterium tuberculosis ( ), and its full-length homologues, as well as the the total length of shorter homologues. Proteins in this family are highly hydrophobic and thus predicted to be embedded in membrane. Member proteins tend to be encoded in a conserved gene neighbourhood with other protein families, including the Rv1681 family radical SAM protein, the Rv1679 family putative acyl-CoA dehydrogenase, and the Rv1680 family, which resembles ABC transporter substrate-binding proteins, except for the lack of a signal peptide region and lack of partner ABC transporter permease or ATP-binding subunits.
