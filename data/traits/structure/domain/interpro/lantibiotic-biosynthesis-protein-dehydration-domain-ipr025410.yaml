identifier: InterPro:IPR025410
label: "Lantibiotic biosynthesis protein, dehydration domain"
definition: >-
  This domain is found in proteins involved in the synthesis of lantibiotic compounds. It is found at the N terminus of NukM, the post-translational modification enzyme of lantibiotic nukacin ISK-1, where it has been shown to be mainly responsible for substrate recognition and dehydration.
