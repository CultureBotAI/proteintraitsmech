identifier: InterPro:IPR060200
label: "Myomesin-1-3, immunoglobulin-like domain"
definition: >-
  This is one of the multiple immunoglobulin-like (Ig-like) domains found in human Myomesin-1-3 (MYOM1-3) and similar sequences. MYOM1-3 are a major component of the vertebrate myofibrillar M band. They bind myosin, titin, and light meromyosin. This binding is dose dependent.
