identifier: InterPro:IPR058713
label: "N,N-dimethylformamidase, alpha subunit domain"
definition: >-
  This entry represents a domain that covers the whole length of the alpha subunit (DmfA1) of N,N-dimethylformamidase, an enzyme that catalyses the hydrolysis of N,N-dimethylformamide to dimethylamine and formate. The enzyme functions as a heterotetramer composed of two alpha (DmfA1) and two beta (DmfA2) subunits. It is not known which subunit possesses the catalytic activity. The enzyme can also hydrolyse, to a lesser extent, N,N-dimethylacetamide and N,N-diethylacetamide, but has no activity against monosubstituted or unsubstituted amides. This domain is also found associated on the intracellular side of peptide transporters.
