identifier: InterPro:IPR021996
label: "Fibrinogen alpha C domain"
definition: >-
  This domain family is found in eukaryotes, and is approximately 70 amino acids in length, and the family is found in association with . This domain is the C-terminal domain of fibrinogen in mammals. The domain lies in the C-terminal half of the alpha C region in these proteins. The function of the domain is that of intramolecular and intermolecular interactions to form fibrin.
