identifier: InterPro:IPR060041
label: "Exportin-6, C-terminal domain"
definition: >-
  This entry represents the TPR-like C-terminal domain in human Exportin-6 (XPO6). XPO6 is a nuclear export receptor that transfers profilin-actin complexes from the nucleus to the cytoplasm. Reduced interaction of Exp6 and RanGTP has been linked to cellular senescence. It mediates the nuclear export of actin and profilin-actin complexes in somatic cells.
