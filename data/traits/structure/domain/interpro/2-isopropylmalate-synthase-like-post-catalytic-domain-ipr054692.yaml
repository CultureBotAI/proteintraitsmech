identifier: InterPro:IPR054692
label: "2-isopropylmalate synthase-like, post-catalytic domain"
definition: >-
  This entry represents a domain found in 2-isopropylmalate synthase from Mycobacterium tuberculosis (LeuA, also known as alpha-isopropylmalate synthase, IPMS) and similar sequences from bacteria and fungi. LeuA catalyses the condensation of the acetyl group of acetyl-CoA with 3-methyl-2-oxobutanoate (alpha-ketoisovalerate) to form 3-carboxy-3-hydroxy-4-methylpentanoate (2-isopropylmalate). This domain follows the catalytic domain and is required for the enzymatic activity.
definition_source: InterPro
