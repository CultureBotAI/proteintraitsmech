identifier: InterPro:IPR041248
label: "YDG domain"
definition: >-
  This presumed domain is found in a wide variety of bacterial cell surface proteins. This domain has a highly conserved YDG motif near its N terminus. This domain is likely related to the MBG domain (PF17883).
