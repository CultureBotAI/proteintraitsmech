identifier: InterPro:IPR056194
label: "Nuclear receptor coactivator 3, basic helix-loop-helix"
definition: >-
  This entry represents the N-terminal basic helix-loop-helix domain of Nuclear receptor coactivator 3. NCoA-3, also termed ACTR, or amplified in breast cancer 1 protein (AIB-1), or CBP-interacting protein (pCIP), or Class E basic helix-loop-helix protein 42 (bHLHe42), or receptor-associated coactivator 3 (RAC-3), or steroid receptor coactivator protein 3 (SRC-3), or thyroid hormone receptor activator molecule 1 (TRAM-1), is a bHLH-PAS steroid/nuclear receptor-associated coactivator that directly binds nuclear receptors and stimulates the transcriptional activities in a hormone-dependent fashion. It also plays a central role in creating a multisubunit coactivator complex, which probably acts via remodeling of chromatin.
