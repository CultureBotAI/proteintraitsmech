identifier: InterPro:IPR006988
label: "Nab, N-terminal"
definition: >-
  Nab1 and Nab2 are co-repressors that specifically interact with and repress transcription mediated by the three members of the NGFI-A (Egr-1, Krox24, zif/268) family of eukaryotic (metazoa) transcription factors. This entry represents the N-terminal NAB domain, which interacts with the EGR1 inhibitory domain (R1). It may also mediate multimerisation. This domain is related to the SAM domain.
