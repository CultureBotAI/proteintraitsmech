identifier: InterPro:IPR026496
label: "Putative ATP-grasp target RiPP, Streptomyces"
definition: >-
  A RiPP is a ribosomally produced, post-translationally modified peptide. Proteins in this entry regularly occur next to ATP-grasp enzymes related to those of microviridin maturation and next to a methyltransferase.
