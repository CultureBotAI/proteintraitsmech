identifier: InterPro:IPR043641
label: "PPE-PPW subfamily, C-terminal"
definition: >-
  This entry represents the C-terminal region of a subfamily of PPE protein family known as the PPW subfamily. The PPW refers to three conserved residues found in the sequence alignment. The region also contains a second conserved motif GFGT.
