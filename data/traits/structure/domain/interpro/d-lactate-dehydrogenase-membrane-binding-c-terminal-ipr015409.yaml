identifier: InterPro:IPR015409
label: "D-lactate dehydrogenase, membrane binding, C-terminal"
definition: >-
  Members of this entry are predominantly found in prokaryotic D-lactate dehydrogenase, forming the cap-membrane-binding domain, which consists of a large seven-stranded antiparallel β-sheet flanked on both sides by α-helices. They allow for membrane association.
