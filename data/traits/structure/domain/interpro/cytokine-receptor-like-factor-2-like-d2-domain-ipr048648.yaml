identifier: InterPro:IPR048648
label: "Cytokine receptor-like factor 2-like, D2 domain"
definition: >-
  CRLF2 is a receptor for thymic stromal lymphopoietin (TSLP). It forms a functional complex with TSLP and IL7R which is capable of stimulating cell proliferation through activation of STAT3 and STAT5. CRFL2 is implicated in the development of the hematopoietic system. It consists of two FnIII-like domains, D1 and D2. This entry represents the membrane-proximal D2 domain, which displays a an ABE/C'CFG topology with two disulfide bridges. This domain interacts with IL7R D2 domain and forms a compact network of interactions. This domain is also found in the cytokine receptor common subunit gamma (IL2RG), a common subunit for the receptors for a variety of interleukins.
