identifier: InterPro:IPR041806
label: "Polyadenylate-binding protein-interacting protein 5/6/7, CUE domain"
definition: >-
  This entry represents the CUE domain found in a group of plant proteins, including CID5/6/7. CID7 contains an N-terminal PABC-interacting domain (PAM2 or PABP-interacting motif 2) which is also found in the human Paip1 and Paip2. It functions as an interaction partner of the PABC domain of Arabidopsis thaliana Poly(A)-binding proteins. It also harbours an ubiquitin-associated (UBA)-like CUE domain and a C-terminal small MutS-related (SMR) domain. CID5 (also known as IPD1) has been shown to regulate the endocycle leading to hypocotyl elongation. The biological function of CID6 is unclear.
