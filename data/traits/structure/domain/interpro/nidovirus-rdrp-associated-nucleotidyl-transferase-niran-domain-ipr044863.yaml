label: "Nidovirus RdRp-associated nucleotidyl transferase (NiRAN) domain"
definition: >-
  Positive-stranded RNA (+RNA) viruses that belong to the order Nidovirales infect a wide range of vertebrates (families Arteriviridae and Coronaviridae) or invertebrates (Mesoniviridae and Roniviridae). Examples of nidoviruses with high economic and societal impact are the arterivirus porcine reproductive and respiratory syndrome virus (PRRSV) and the zoonotic coronaviruses (CoVs) causing severe acute respiratory syndrome (SARS), Middle East respiratory syndrome (MERS) and Covid-19 (SARS-CoV-2) in humans. In all nidoviruses, at least two-thirds of the capacity of the polycistronic genome is occupied by the two large open reading frames (ORFs; 1a and 1b) that together constitute the replicase gene. The two polyproteins produced, pp1a (ORF1a-encoded) and pp1ab (ORF1a/ORF1b-encoded), are processed to a dozen or more proteins by the virus main protease (3CLpro, encoded in ORF1a) with possible involvement of other protease(s). These and other proteins form a membrane-bound replication-transcription complex (RTC) that invariably includes two key ORF1b-encoded subunits: the RNA-dependent RNA polymerase (RdRp) and a superfamily 1 helicase domain (HEL1), which is fused with a multinuclear Zn-binding domain (ZBD). The RNA-dependent RNA polymerase (RdRp) domain of nidoviruses resides in a cleavage product of the replicase polyprotein named non- structural protein (nsp) 12 in coronaviruses and nsp9 in arteriviruses. In all nidoviruses, the C-terminal RdRp domain is linked to a conserved N-terminal domain, which has been coined NiRAN (nidovirus RdRp-associated nucleotidyl transferase). The NiRAN domain has an essential nucleotidylation activity and its potential functions in nidovirus replication may include RNA ligation, protein-primed RNA synthesis, and the guanylyl-transferase fu…
