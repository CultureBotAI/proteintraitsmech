label: "Conserved hypothetical protein CHP03067, planctomycetes"
definition: >-
  This domain occurs in several species, mostly from the Planctomycetes division of the bacteria. It has expanded into a paralogous family of at least twenty-five members in Gemmata obscuriglobus UQM 2246. This family appears related to , which has also expanded into a large paralogous family in G. obscuriglobus.
