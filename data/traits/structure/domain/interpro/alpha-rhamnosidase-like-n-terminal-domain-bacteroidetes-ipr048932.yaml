identifier: InterPro:IPR048932
label: "Alpha-rhamnosidase-like, N-terminal domain, bacteroidetes"
definition: >-
  This domain is found in a group of alpha-rhamnosidases predominantly from Bacteroidetes, including the putative alpha-rhamnosidase from Bacteroides thetaiotaomicron, whose structure shows similarity with a galactose-binding domain.
