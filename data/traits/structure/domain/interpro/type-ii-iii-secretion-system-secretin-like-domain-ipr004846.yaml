identifier: InterPro:IPR004846
label: "Type II/III secretion system, secretin-like domain"
definition: >-
  This entry represents a secretin-like domain found in proteins from Type II/III secretion systems such as Secretin OutD that is involved in the general (type II) secretion pathway (GSP) within Gram-negative bacteria, a signal sequence-dependent process responsible for protein export. This subunit forms the outer membrane channel and is involved in transporting exoproteins from the periplasm, across the outer membrane, to the extracellular environment. The type III secretion system is of great interest, as it is used to transport virulence factors from the pathogen directly into the host cell and is only triggered when the bacterium comes into close contact with the host. They are also called injectisome, which is used to inject bacterial effector proteins into eukaryotic host cells. They form a ring-shaped multimeric structure with an apparent central pore in the outer membrane and are necessary for both basic pathogenicity and the induction of the hypersensitive response in resistant plants. The protein subunits of the system are very similar to those of bacterial flagellar biosynthesis. However, while the latter forms a ring structure to allow secretion of flagellin and is an integral part of the flagellum itself, type III subunits in the outer membrane translocate secreted proteins through a channel-like structure. Protein G aids in the structural assembly of the invasion complex.
