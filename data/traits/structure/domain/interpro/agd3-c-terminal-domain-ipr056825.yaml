identifier: InterPro:IPR056825
label: "Agd3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the exopolysaccharide deacetylase Agd3 from Aspergillus fumigatus ( ) a protein required for biofilm formation. It forms six β-strands in a seven-stranded β-sandwich, whose function is unknown.
