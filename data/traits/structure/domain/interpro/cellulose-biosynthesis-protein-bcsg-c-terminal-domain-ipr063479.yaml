identifier: InterPro:IPR063479
label: "Cellulose biosynthesis protein BcsG, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Cellulose biosynthesis protein BcsG, which functions as a phosphoethanolamine transferase. Cellulose biosynthesis protein BcsG, also known as YhjU, is a component of bacterial cellulose synthase complex that plays a role in biofilm formation in bacteria. It is a Zn-dependent phosphoethanolamine transferase that catalyses transfer of phosphoethanolamine residues from membrane phosphatidylethanolamine to the glucosyl residues in the nascent cellulose chain.
