identifier: InterPro:IPR048552
label: "Probable sensor domain DACND"
definition: >-
  This entry represents a potential sensor domain found at the N-terminal of bacterial diadenylate cyclases which are typically followed by the DAC ( ). It may consist of four α-helices and three β-strands according to structure predictions. This domain is mainly found in thermodesulfobacteriotes.
