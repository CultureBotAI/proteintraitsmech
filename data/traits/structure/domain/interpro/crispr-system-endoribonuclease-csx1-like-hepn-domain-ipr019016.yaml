identifier: InterPro:IPR019016
label: "CRISPR system endoribonuclease Csx1-like, HEPN domain"
definition: >-
  CRISPR system endoribonuclease Csx1 is a metal-independent, endoribonuclease that acts selectively on ssRNA and cleaves specifically after adenosines, as part of the type III-B CRISP-Cas system and it is homologous to Csm6, sharing the same domain domain architecture consisting of a CARF domain at the N-terminal that is relatively well conserved, and a HEPN nuclease domain at the C-terminal. This entry represents the HEPN domain, which is has less conservation except for the typical R-X4-H motif. Cas are a group of proteins associated with clustered regularly interspaced short palindromic repeats - CRISPS - of DNA found in nearly half of bacterial and archaeal genomes.
