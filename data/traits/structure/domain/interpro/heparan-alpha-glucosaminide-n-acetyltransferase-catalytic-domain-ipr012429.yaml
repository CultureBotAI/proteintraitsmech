identifier: InterPro:IPR012429
label: "Heparan-alpha-glucosaminide N-acetyltransferase, catalytic domain"
definition: >-
  Heparan sulfate acetyl-CoA:alpha-glucosaminide N-acetyltransferase (HGSNAT) catalyzes the transmembrane acetylation of heparan sulfate in lysosomes required for its further catabolism. Mutations of the HGSNAT gene cause the neurodegenerative disease mucopolysaccharidosis IIIC (MPS IIIC). This entry represents the catalytic domain of HGSNAT which contains the conserved histidine in the active site (His269), thought to hold the acetyl group during the transfer across the membrane and required for its enzymatic activity.
