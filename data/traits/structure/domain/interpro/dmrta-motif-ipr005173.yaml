identifier: InterPro:IPR005173
label: "DMRTA motif"
definition: >-
  This entry represents the DMA domain found to the C terminus of the DM DNA-binding domain in Doublesex- and mab-3-related transcription factors (Dmrt proteins) from eukaryotes. These proteins are involved in sexual development. The function of the region DMA, conserved in Dmrt3, Dmrt4, and Dmrt5 (also known as Dmrt2), is still unknown.
