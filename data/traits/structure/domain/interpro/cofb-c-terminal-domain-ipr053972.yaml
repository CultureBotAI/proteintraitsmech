identifier: InterPro:IPR053972
label: "CofB, C-terminal domain"
definition: >-
  CofB is a minor pilin involved in type IV pili assembly. It consists of a pilin domain at the N-terminal ( ), followed by a β-repeat hinge-like domain ( ) and a C-terminal β-sheet-rich domain, similar to H-type lectins. This entry represents the C-terminal domain which is required for CofB to initiate pilus assembly.
