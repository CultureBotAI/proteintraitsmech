identifier: InterPro:IPR007742
label: "Periplasmic copper-binding protein NosD-like, beta helix domain"
definition: >-
  This entry represents a parallel β helix domain found in several proteins, including NosD. NosD is a periplasmic protein which is thought to insert copper into the exported reductase apoenzyme (NosZ).
