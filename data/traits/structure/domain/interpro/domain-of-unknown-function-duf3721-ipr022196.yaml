identifier: InterPro:IPR022196
label: "Domain of unknown function DUF3721"
definition: >-
  This domain is mostly found in bacteria and is approximately 30 amino acids in length. There is a conserved WMPC sequence motif. There are two completely conserved residues (A and C) that may be functionally important. In bacteria, this domain is mostly found at the C-terminal. In eukaryotes this domain can be found in uncharacterised proteins from algae.
