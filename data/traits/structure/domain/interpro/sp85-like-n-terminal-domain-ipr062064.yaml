identifier: InterPro:IPR062064
label: "SP85-like, N-terminal domain"
definition: >-
  This entry represents a β-barrel domain at the N-terminal in spore coat protein SP85 and related proteins in Dictyostelium discoideum. SP85 is required for incorporation of cotE into the spore coat and for formation of the outer layer, having a cross-bridging function between cellulose and other coat proteins. The domain occurs in multiple copies within SP85 related proteins and is also found in colossin-B, a secreted protein.
