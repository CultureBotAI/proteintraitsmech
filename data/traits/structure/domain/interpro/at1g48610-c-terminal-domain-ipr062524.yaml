identifier: InterPro:IPR062524
label: "At1g48610, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of proteins containing predicted AT-hook DNA-binding motifs, including uncharacterised protein At1g48610. AT-hook motifs are short DNA-binding domains that bind to AT-rich regions of DNA. Members are found in Brassicaceae plants and may function in DNA binding. The full-length proteins contain multiple AT-hook motifs and are localised to the nucleus.
