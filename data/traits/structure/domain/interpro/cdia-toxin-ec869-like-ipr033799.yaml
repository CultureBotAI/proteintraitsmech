identifier: InterPro:IPR033799
label: "CdiA toxin, EC869-like"
definition: >-
  This entry represents the C-terminal toxin domain of CdiA effector proteins. Despite sharing little sequence identity, the toxin domains are structurally similar and have homology to endonucleases. The EC869 toxin is a Zn(2+)-dependent DNase capable of completely degrading the genomes of target cells. Contact-dependent growth inhibition (CDI) toxins are expressed by Gram-negative bacteria as part of a mechanism to inhibit the growth of neighbouring bacteria. CDI is mediated by the CdiB/CdiA two-partner secretion system. CdiA secretion is dependent on the outer membrane protein CdiB. The growth inhibitory activity resides within the C-terminal region of CdiA. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered.
