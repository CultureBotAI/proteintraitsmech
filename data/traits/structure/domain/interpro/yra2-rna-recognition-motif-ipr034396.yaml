identifier: InterPro:IPR034396
label: "Yra2, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of Yra2. Yra2 consists of two highly conserved N- and C-terminal boxes, referred as the REF-N and REF-C, and a central RNA recognition motif (RRM), also termed RBD (RNA binding domain). The REF motifs are necessary to interact with RNA and the RBD/RRM domain is involved in both RNA and RNAPII CTD binding.
