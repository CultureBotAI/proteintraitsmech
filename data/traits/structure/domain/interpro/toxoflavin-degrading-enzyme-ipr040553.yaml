identifier: InterPro:IPR040553
label: "Toxoflavin-degrading enzyme"
definition: >-
  This domain is found in toxoflavin-degrading enzymes such as toxoflavin lyase (TflA), also known as toxoflavin-degrading enzyme (TxDE). TflA/TxDE is structurally similar to the vicinal oxygen chelate superfamily of metalloenzymes, despite the lack of apparent sequence identity.
