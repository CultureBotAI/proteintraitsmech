identifier: InterPro:IPR028269
label: "AP-4 complex subunit epsilon-1, C-terminal"
definition: >-
  This domain is found in the C-terminal of the AP-4 complex subunit epsilon-1 (AP4E1). Epsilon-1 is a subunit of novel type of clathrin- or non-clathrin-associated protein coat involved in targeting proteins from the trans-Golgi network (TGN) to the endosomal-lysosomal system.
