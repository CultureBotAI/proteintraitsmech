label: "Disease resistance protein, winged helix domain"
definition: >-
  This entry represents a winged helix-turn-helix domain (WHD) found in plant resistance proteins, including RGA4 from Oryza sativa, RPP13-like protein 4 from Arabidopsis thaliana and NRC2a from Nicotiana benthamiana.
