label: "EC042_2821-like Restriction Endonuclease-like domain"
definition: >-
  This entry represents an uncharacterised domain that is likely to adopt a restriction endonuclease-like fold. In some proteins this domain is fused to a HEPN-like domain ( ) (EC042_2821).
