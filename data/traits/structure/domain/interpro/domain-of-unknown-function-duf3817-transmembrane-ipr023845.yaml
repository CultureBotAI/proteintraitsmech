identifier: InterPro:IPR023845
label: "Domain of unknown function DUF3817, transmembrane"
definition: >-
  This domain is associated with, strictly bacterial integral membrane proteins. It occurs in proteins that on rare occasions are fused to transporter domains such as the major facilitator superfamily domain. Of three invariant residues, two occur as a His-Gly dipeptide in the middle of three predicted transmembrane helices.
