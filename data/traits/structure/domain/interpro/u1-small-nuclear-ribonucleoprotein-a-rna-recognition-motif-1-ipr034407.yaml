identifier: InterPro:IPR034407
label: "U1 small nuclear ribonucleoprotein A, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of U1A (also termed U1 snRNP A), an RNA-binding protein associated with the U1 snRNP. U1A binds with high affinity and specificity to stem-loop II (SLII) of U1 snRNA. When U1A is not associated with the U1 snRNP, it functions as a modulator of polyadenylation. U1A contains two RNA recognition motifs (RRMs); the N-terminal RRM (RRM1) binds tightly and specifically to the U1 snRNA SLII and its own 3'-UTR, while in contrast, the C-terminal RRM (RRM2) does not appear to associate with any RNA and may be free to bind other proteins. U1A also contains a proline-rich region, and a nuclear localization signal (NLS) in the central domain that is responsible for its nuclear import.
