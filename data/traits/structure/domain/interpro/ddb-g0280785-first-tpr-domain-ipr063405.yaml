identifier: InterPro:IPR063405
label: "DDB_G0280785, first TPR domain"
definition: >-
  This entry represents the first TPR domain in DDB_G0280785 of proteins found in Dictyostelium discoideum. These proteins range from 804 to 1097 amino acids in length and belong to the UPF0746 family. Most family members contain an N-terminal SAP domain ( ) involved in DNA binding.
