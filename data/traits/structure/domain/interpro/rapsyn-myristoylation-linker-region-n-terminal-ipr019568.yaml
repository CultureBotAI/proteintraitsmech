identifier: InterPro:IPR019568
label: "Rapsyn, myristoylation/linker region, N-terminal"
definition: >-
  Neuromuscular junction formation relies upon the clustering of acetylcholine receptors and other proteins in the muscle membrane. Rapsyn (receptor-associated protein of the synapse) is a peripheral membrane protein that is selectively concentrated at the neuromuscular junction (NMJ) and is essential for the formation of synaptic acetylcholine receptor aggregates. It is required for anchoring and stabilising the nicotinic acetylcholine receptor (AChR) in the postsynaptic membrane of the NMJ. Acetylcholine receptors fail to aggregate beneath nerve terminals in mice where rapsyn has been knocked out. The N-terminal six amino acids of rapsyn are its myristoylation site, and myristoylation is necessary for the targeting of the protein to the membrane.
