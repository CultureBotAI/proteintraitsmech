identifier: InterPro:IPR047322
label: "Cyclin-T2, second cyclin box"
definition: >-
  This entry represents the second cyclin box of CCNT2 and similar proteins found in vertebrates. It is a protein binding domain. Cyclin-T2 (CCNT2) is a regulatory subunit of the cyclin-dependent kinase pair (CDK9/cyclin T) complex, also called positive transcription elongation factor B (P-TEFb), which is proposed to facilitate the transition from abortive to production elongation by phosphorylating the C-terminal domain of the large subunit of RNA polymerase II (RNAP II). CCNT2 contains two cyclin boxes.
