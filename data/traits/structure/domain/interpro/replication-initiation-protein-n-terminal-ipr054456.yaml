identifier: InterPro:IPR054456
label: "Replication initiation protein, N-terminal"
definition: >-
  This domain is found at the N-terminal end of Replication initiation protein from Staphylococcus aureus (Rep and RepC, D, E, M, N variants of the pT181 family) and similar sequences from Bacilli. Rep proteins, shows similarity with the extended β-sheet in TATA binding protein (TBP). Replication of pT181 family plasmids is initiated when the dimeric Rep protein makes a sequence specific nick in the (+) strand at the double-stranded origin of replication via one of its active sites, resulting in a covalent adduct to the 5' side of the nick. After nicking, the Rep protein assists recruitment of PcrA helicase, which is responsible for unwinding the plasmid during replication. The Rep proteins possess two related catalytic activities, a type-I topoisomerase-like cleavage activity in which they form a nick in the (+) strand at the origin of replication to initiate DNA synthesis, and a re-ligation activity to join the ends of the parental strand that is displaced during replication.
