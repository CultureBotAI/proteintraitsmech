identifier: InterPro:IPR008858
label: "TROVE domain"
definition: >-
  The TROVE (Telomerase, Ro and Vault) domain is a module of ~300-500 residues that is found in TEP1 and Ro60 the protein components of three ribonucleoprotein particles. It is also found in bacterial ribonucleoproteins suggesting an ancient origin of these ribonucleoproteins. It can be found associated with other domains, such as the VWFA domain, the TEP1 N-terminal domain, the NACHT-NTPase domain, and WD-40 repeats. This domain may be involved in binding the RNA components of the three RNPs, which are telomerase RNA, Y RNA and vault RNA. The TROVE domain contains a few absolutely conserved residues. As none of these conserved residues are the polar type of amino acids found in active sites, it seems unlikely that this region has an enzymatic function.
