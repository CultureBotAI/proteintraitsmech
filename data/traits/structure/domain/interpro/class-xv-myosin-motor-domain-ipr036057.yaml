identifier: InterPro:IPR036057
label: "Class XV myosin, motor domain"
definition: >-
  The class XV myosins are monomeric. In vertebrates, myosin XV appears to be expressed in sensory tissue and plays a role in hearing. It is expressed in inner ear hair cells where it transports protein cargos within developing mechanosensory stereocilia. The catalytic (head) domain has ATPase activity and belongs to the larger group of P-loop NTPases. C-terminal to the head domain are 2 MyTH4 domain, a FERM domain, and a SH3 domain. The head domain is a molecular motor, which utilizes ATP hydrolysis to generate directed movement toward the plus end along actin filaments.
