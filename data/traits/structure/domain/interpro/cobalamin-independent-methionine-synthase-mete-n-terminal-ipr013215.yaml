identifier: InterPro:IPR013215
label: Cobalamin-independent methionine synthase MetE, N-terminal
definition: >-
  Cobalamin-independent methionine synthase, MetE, catalyses the synthesis of the amino acid methionine by the transfer of a methyl group from methyltetrahydrofolate to homocysteine. The N-terminal and C-terminal domains of MetE together define a catalytic cleft in the enzyme. The N-terminal domain is thought to bind the substrate, in particular, the negatively charged polyglutamate chain. The N-terminal domain is also thought to stabilise a loop from the C-terminal domain.
