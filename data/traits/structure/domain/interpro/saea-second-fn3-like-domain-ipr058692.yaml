identifier: InterPro:IPR058692
label: "SaeA, second Fn3-like domain"
definition: >-
  This entry represents the second Fn3-like domain found in the ESX-1 scaffolding and assembly protein SaeA and similar bacterial proteins. SaeA is involved in assembly of the ESX-1 secretion system (T7SS), which exports several proteins including EsxA and EsxB. The SaeA protein localises to the bacterial cell pole and is required for proper assembly and polar localisation of the ESX-1 complex. Disruption of SaeA affects DNA conjugation in recipient strains and blocks the secretion of EsxB.
