identifier: InterPro:IPR025192
label: Succinate dehydogenase/fumarate reductase N-terminal
definition: >-
  This entry represents the 2Fe-2S iron-sulphur cluster binding domain found in members of the succinate dehydrogenase/fumarate reductase protein family. The domain is around one hundred amino acids with four conserved cysteine residues to which the 2Fe-2S cluster is ligated.
