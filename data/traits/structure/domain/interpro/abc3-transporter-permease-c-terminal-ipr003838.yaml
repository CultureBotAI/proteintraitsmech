identifier: InterPro:IPR003838
label: "ABC3 transporter permease, C-terminal"
definition: >-
  This domain is found in members of the ABC type 3 transporter family. Proteins containing this domain include: Cell division protein FtsX from Gram-negative and Gram-positive bacteria. It is a component of the septal ring. It may insert division proteins into the cytoplasmic membrane. Permease protein MacB 1. It is part of the tripartite efflux system MacAB-TolC. Lipoprotein-releasing system transmembrane protein LolC. It is part of an ATP-dependent transport system LolCDE responsible for the release of lipoproteins targeted to the outer membrane from the inner membrane. Putative hemin transport system permease protein HrtB. It may be Part of the ABC transporter complex hrt involved in hemin import. Bacitracin export permease protein BceB. It is art of the ABC transporter complex BceAB (TC 3.A.1.123.5) involved in bacitracin export. ABC transporter permease YtrF. It is part of the ABC transporter complex YtrBCDEF that plays a role in acetoin utilization during stationary phase and sporulation. ABC transporter permease protein YxdM. It is part of the ABC transporter complex YxdLM which could be involved in peptide resistance.
