identifier: InterPro:IPR026611
label: Serine/threonine-protein kinase MRCK alpha, catalytic domain
definition: >-
  This entry represent the N-terminal catalytic domain of Serine/threonine-protein kinase MRCK alpha. Serine/threonine-protein kinase MRCK (myotonic dystrophy kinase-related CDC42-binding kinase) is an serine/threonine-protein kinase which is an important downstream effector of CDC42 and plays a role in actin-myosin regulation and activities including cell adhesion, motility and invasion. Three isoforms have been described in mammals: alpha, beta and gamma.
