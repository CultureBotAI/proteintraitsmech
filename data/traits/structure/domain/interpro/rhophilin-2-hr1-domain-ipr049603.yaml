identifier: InterPro:IPR049603
label: "Rhophilin-2, HR1 domain"
definition: >-
  This entry represents the N-terminal HR1 (homology region 1) Rho-binding domain present in Rhophilin-2 (RHPN2) from vertebrates. Rhophilin-2 is a scaffolding protein that functions as an effector of the Rho family of small GTPases. It plays a role in regulating the organisation of the actin cytoskeleton. Rhophilin-2 contains an N-terminal HR1 (this entry), a central Bro1-like ( ), and a C-terminal PDZ domain ( ); all are protein-interacting domains. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; Rhophilin-2 has been shown to bind both RhoA and RhoB.
