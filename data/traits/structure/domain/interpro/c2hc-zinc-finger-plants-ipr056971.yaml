identifier: InterPro:IPR056971
label: "C2HC zinc finger, plants"
definition: >-
  This domain is found at the C-terminal of uncharacterised plant proteins. It has three invariant cysteine residues and a histidine that are likely involved in metal coordination. It is probably a variant of the classical C2H2 zinc fingers and is predicted to adopt similar structure.
