identifier: InterPro:IPR002820
label: "Molybdopterin cofactor biosynthesis C (MoaC) domain"
definition: >-
  The majority of molybdenum-containing enzymes utilise a molybdenum cofactor (MoCF or Moco) consisting of a Mo atom coordinated via a cis-dithiolene moiety to molybdopterin (MPT). MoCF is ubiquitous in nature, and the pathway for MoCF biosynthesis is conserved in all three domains of life. MoCF-containing enzymes function as oxidoreductases in carbon, nitrogen, and sulphur metabolism. This entry represents the molybdenum cofactor biosynthesis protein MoaC from prokaryotes and eukaryotes, also known as cyclic pyranopterin monophosphate synthase.
