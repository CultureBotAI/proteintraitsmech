identifier: InterPro:IPR005728
label: "Rickettsial palindromic element 1"
definition: >-
  This domain describes protein translations of the Rickettsia conorii elements (RPE). In Rickettsia conorii, 19 copies are found within protein coding regions, where they encode an insert relative to homologues from other species but do not disrupt the reading frame. Insertion is always in the same reading frame. This model finds RPE-encoded regions in several Rickettsial species.
