identifier: InterPro:IPR048924
label: "BAHCC1-like, Tudor domain"
definition: >-
  This entry represents the Tudor domain found in BAHCC1 and TNRC18 from mammals and winged eye, the orthologue from Drosophila. BAHCC1, may function as a transcriptional regulator. BAHCC1 contains a Tudor domain and a C-terminal BAH domain. This protein specifically recognises H3K27me3 through its BAH module ( ) and enforces silencing of H3K27me3-demarcated genes in mammalian cells. TNRC18 is thought to enable chromatin binding activity, however, its function is not yet unknown. Winged eye is a factor that induces eye-to-wing transdetermination upon overexpression in eye imaginal discs. It induces various histone modifications and enhances the methylation of Lys9 on histone H3 (H3K9). This domain may be implicated in the interactions with methylated histone.
