identifier: InterPro:IPR041700
label: "Outer membrane protein beta-barrel domain 3"
definition: >-
  This domain is found in proteins annotated as TonB dependent receptors, but it is also likely to be found in other membrane β-barrel proteins with other functions. It is part of a Pfam clan that includes other outer membrane protein β-barrel domains.
