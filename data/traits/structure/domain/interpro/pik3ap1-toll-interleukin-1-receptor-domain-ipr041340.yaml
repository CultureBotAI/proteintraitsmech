identifier: InterPro:IPR041340
label: "PIK3AP1, Toll/interleukin-1 receptor domain"
definition: >-
  This is a Toll/interleukin-1 receptor (TIR) domain found in the N-terminal region of B-cell adaptor for phosphoinositide 3-kinase (PIK3AP1 or BCAP). BCAP functions in linking the B-cell receptor (BCR) and the co-receptor CD19 to the activation of PI3K via interaction with the SH2 domains on the regulatory p85 subunit. BCAP TIR associates with the MAL/TIRAP adaptor and the TIR domains of Toll-like receptors (TLRs).
