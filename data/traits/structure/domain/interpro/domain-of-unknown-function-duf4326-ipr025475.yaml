identifier: InterPro:IPR025475
label: "Domain of unknown function DUF4326"
definition: >-
  This entry represents a domain that is functionally uncharacterised. Proteins in this family have two completely conserved residues (P and C) that may be functionally important. This domain covers the whole length of the protein in some sequences and is found C-terminal to in a small group of proteobacterial proteins.
