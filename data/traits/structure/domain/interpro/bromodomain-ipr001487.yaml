identifier: InterPro:IPR001487
label: Bromodomain
definition: >-
  Bromodomains are found in a variety of mammalian, invertebrate and yeast DNA-binding proteins. Bromodomains are highly conserved α-helical motifs that can specifically interact with acetylated lysine residues on histone tails. In some proteins, the classical bromodomain has diverged to such an extent that parts of the region are either missing or contain an insertion (e.g., mammalian protein HRX, Caenorhabditis elegans hypothetical protein ZK783.4, yeast protein YTA7). The bromodomain may occur as a single copy, or in duplicate. This domain is present in proteins involved in a wide range of functions such as acetylating histones, remodelling chromatin, and recruiting other factors necessary for transcription, thus playing a critical role in the regulation of transcription.
