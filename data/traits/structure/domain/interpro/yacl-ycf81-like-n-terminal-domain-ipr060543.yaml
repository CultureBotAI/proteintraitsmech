identifier: InterPro:IPR060543
label: "YacL/YCF81-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of a group of uncharacterised proteins mainly found in firmicutes, including Uncharacterized PIN and TRAM-domain containing protein YacL from Bacillus subtilis, a putative RNase. This domain is also found at the N-terminal of the green algae uncharacterised protein YCF81. These proteins contain a C-terminal TRAM domain and a PIN domain, suggesting potential roles in RNA processing or nucleic acid metabolism. This N-terminal domain is predicted to contain multiple transmembrane regions based on sequence analysis.
