identifier: InterPro:IPR063698
label: "CCDC18, second coiled-coil region"
definition: >-
  This entry represents the second coiled-coil region of coiled-coil domain-containing protein 18 (CCDC18), also known as sarcoma antigen NY-SAR-24. CCDC18 is a large protein containing multiple coiled-coil regions that localises to centriolar satellites. The protein shows enhanced expression in bone marrow, lymphoid tissue, and testis.
