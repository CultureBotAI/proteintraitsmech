identifier: InterPro:IPR004113
label: "FAD-binding oxidoreductase/transferase, type 4, C-terminal"
definition: >-
  This entry represents a domain found in a group of type 4 FAD-binding oxidoreductase/transferases and similar proteins from all cellular organisms, including D-2-hydroxyglutarate dehydrogenase from humans and Escherichia coli, Alkyldihydroxyacetonephosphate synthase from Caenorhabditis elegans and D-2-hydroxyglutarate--pyruvate transhydrogenase DLD2 from Saccharomyces cerevisiae. This domain, often found at the C-terminal end of the proteins, shows a ferredoxin-like fold.
