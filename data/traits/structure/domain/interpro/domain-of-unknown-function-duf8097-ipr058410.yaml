identifier: InterPro:IPR058410
label: "Domain of unknown function DUF8097"
definition: >-
  This entry represents a family of small transmembrane proteins found exclusively in extremely halophilic archaea (Halobacteria). Members of this family typically contain two transmembrane helices with a conserved cytoplasmic region. Most proteins in this family are approximately 115-130 amino acids in length. The family is widely distributed across different genera within Halobacteriales, including Halococcus, Haloferax, Natrialba, Natronobacterium, and Haladaptatus. The specific function of these proteins remains unknown, but their conservation suggests they may play an important role in the adaptation to high-salt environments.
