identifier: InterPro:IPR047963
label: "Sensor histidine kinase YcbM-like, ATPase domain"
definition: >-
  This entry represents the histidine kinase-like ATPase (HATPase) domain of various two-component sensor histidine kinase (HKs) such as Sensor histidine kinase YcbM from Bacillus subtilis, a HK of the two-component system YcbM-YcbL. Proteins having this HATPase domain also contain a histidine kinase dimerisation and phosphoacceptor domain (HisKA).
