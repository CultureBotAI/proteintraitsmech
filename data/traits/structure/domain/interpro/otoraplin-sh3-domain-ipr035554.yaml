identifier: InterPro:IPR035554
label: "Otoraplin, SH3 domain"
definition: >-
  Otoraplin, also known as MIAL (MIA-like), is specifically expressed in the cochlea and the vestibule of the inner ear and may contribute to inner ear dysfunction in humans. It is a member of the MIA family. MIA (melanoma inhibitory activity) family members include MIA, MIAL, MIA2, and MIA3 (also called TANGO). MIA was found to be strongly expressed and secreted by malignant melanomas. It contains a domain that adopts a Src Homology 3 (SH3) domain-like fold; however, it contains an additional antiparallel β sheet and two disulfide bonds compared to classical SH3 domains. Unlike classical SH3 domains, MIA does not bind proline-rich ligands.
