identifier: InterPro:IPR055184
label: "COMMD8, helical N-terminal domain"
definition: >-
  This entry represents the α-helical N-terminal domain (HN) of COMMD8, one of the subunits of the CCC complex (Commander complex), which regulates the Retromer-independent retrieval and recycling of hundreds of proteins including integrins and lipoprotein receptors.
