identifier: InterPro:IPR040492
label: "Galactofuranosyltransferase GlfT2, N-terminal"
definition: >-
  This is the N-terminal β-barrel domain found in the polymerizing galactofuranosyltransferase GlfT2 (Rv3808c). This enzyme synthesizes the bulk of the galactan portion of the mycolyl-arabinogalactan complex, which is the largest component of the mycobacterial cell wall such as in Mycobacterium tuberculosis. The N-terminal domain contains two short helices preceding a 10-stranded β-sandwich with jelly roll topology.
