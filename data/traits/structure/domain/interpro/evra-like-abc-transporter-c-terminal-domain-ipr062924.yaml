identifier: InterPro:IPR062924
label: "EvrA-like ABC transporter, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 60 residues found in ABC transporters. The domain is found C-terminal to the ABC transporter ATPase domain ( ). In Synechocystis sp. PCC 6803, proteins containing this domain include EvrA (Slr1901) ( ), the ATPase component of the EvrABC viologen export pump. This family is found in bacteria including Cyanobacteriota, Planctomycetota and Bacillota. The function of this domain remains to be determined. Structure prediction suggests this domain can form a homodimeric interface.
