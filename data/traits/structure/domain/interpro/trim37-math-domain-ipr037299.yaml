identifier: InterPro:IPR037299
label: "TRIM37, MATH domain"
definition: >-
  This entry represents the MATH (meprin and TRAF homology) domain found in TRIM37, which is a member of the tripartite motif (RING, B-Box, and coiled-coil domains) family and has E3 ubiquitin ligase activity toward itself and histone H2A protein. TRIM37 localizes to peroxisomes. Mutations in the human TRIM37 gene (also known as MUL) cause Mulibrey (muscle-liver-brain-eye) nanism, a rare growth disorder of prenatal onset characterised by dysmorphic features, pericardial constriction and hepatomegaly.
