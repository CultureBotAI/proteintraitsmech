identifier: InterPro:IPR013595
label: "Peptidase S33 tripeptidyl aminopeptidase-like, C-terminal"
definition: >-
  This entry represents a C-terminal domain associated with putative hydrolases and bacterial peptidases that belong to MEROPS peptidase family S33 (clan SC). They are related to a tripeptidyl aminopeptidase from Streptomyces lividans ( ). A member of this family ( ) is thought to be involved in the C-terminal processing of propionicin F, a bacteriocidin characterised from Propionibacterium freudenreichii.
