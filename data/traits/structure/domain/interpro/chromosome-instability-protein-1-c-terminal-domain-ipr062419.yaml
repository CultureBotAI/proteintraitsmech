identifier: InterPro:IPR062419
label: "Chromosome instability protein 1, C-terminal domain"
definition: >-
  This entry represents the C-terminal region of yeast Chromosome instability protein 1 (CIN1), which consists of armadillo (ARM)-like repeats and similar proteins from ascomycetes. CIN1 is required for microtubule stability. It interacts with CIN4.
