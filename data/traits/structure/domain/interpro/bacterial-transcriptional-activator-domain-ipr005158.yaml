identifier: InterPro:IPR005158
label: "Bacterial transcriptional activator domain"
definition: >-
  Found in the DNRI/REDD/AFSR family of regulators, this domain of AFSR ( ) along with the C-terminal region is capable of independently directing actinorhodin production. AFSR is important for the formation of secondary metabolites.
