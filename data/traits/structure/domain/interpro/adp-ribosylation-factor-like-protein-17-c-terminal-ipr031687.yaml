identifier: InterPro:IPR031687
label: "ADP-ribosylation factor-like protein 17, C-terminal"
definition: >-
  ADP-ribosylation factor-like protein 17 (ARL17) is a protein of unknown function found in primates. It belongs to the Arf-like (ARL) GTPases family. This entry represents the C-terminal domain of ARL17. This domain is also found in NBR2 or Neighbour of BRAC1 gene 2.
