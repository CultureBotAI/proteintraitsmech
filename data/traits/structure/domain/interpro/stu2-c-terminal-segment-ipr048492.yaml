identifier: InterPro:IPR048492
label: "Stu2, C-terminal segment"
definition: >-
  This entry represents the C-terminal segment of Stu2, which binds the four-way junction of the Ndc80 complex (Ndc80c). This interaction is crucial for association of Stu2 with kinetochores, that when it is compromised, there is impairment in cell viability, biorientation defects and delay in cell cycle progression. This Stu2 segment folds into a single α-helix that is enriched with hydrophobic residues essential for the interaction ( ).
