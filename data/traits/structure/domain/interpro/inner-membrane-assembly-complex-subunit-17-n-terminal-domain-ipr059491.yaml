identifier: InterPro:IPR059491
label: "Inner membrane assembly complex subunit 17, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of INA17 proteins. INA17 (Inner membrane assembly complex subunit 17) is a component of the inner membrane assembly complex that promotes the biogenesis of mitochondrial F1F0-ATP synthase. The protein facilitates assembly of the peripheral stalk and promotes assembly of the catalytic F1-domain with the membrane-embedded F0-domain. This N-terminal domain encompasses the transmembrane region and part of the mitochondrial intermembrane space-facing region. INA17 localises to the mitochondrial inner membrane as a single-pass membrane protein. The specific function of this domain remains to be determined. This entry is specific to Saccharomycetes.
