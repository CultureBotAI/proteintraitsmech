identifier: InterPro:IPR021893
label: "ZMYM2-like/QRICH1, C-terminal domain"
definition: >-
  This entry (ex DUF3504) represents the C-terminal domain in Zinc finger MYM-type protein 2, 3, 4, QRICH1 and the uncharacterised KIAA1958 protein. This domain is functionally uncharacterised. QRICH1 acts as a mediator of the integrated stress response through transcriptional control of protein homeostasis under conditions of ER stress. Zinc finger MYM-type proteins 2, 3, and 4 (ZMYM2, ZMYM3, ZMYM4) are nuclear proteins involved in chromatin regulation, transcriptional repression, and DNA repair. ZMYM2 participates in retrotransposon silencing and DNA double-strand break repair by interacting with chromatin-modifying complexes and DNA-PK, and is targeted for degradation by cereblon-modulating drugs. ZMYM3 functions as a scaffold protein in gene silencing and DNA repair, facilitating BRCA1 recruitment to damaged chromatin through H2AX binding. ZMYM4 interacts with the transcription factor B-MYB, undergoes SUMOylation, and is essential for early cranial gene expression and craniofacial development. These proteins collectively highlight the importance of MYM-type zinc finger proteins in genome maintenance and developmental processes.
