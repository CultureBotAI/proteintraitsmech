identifier: InterPro:IPR056382
label: "DHX34-like, C2H2-type zinc finger"
definition: >-
  This C2H2-type zinc finger domain is found at the C-terminal end of human Probable ATP-dependent RNA helicase DHX34 and similar animal proteins. DHX34 is required for nonsense-mediated decay degradation of mRNA transcripts containing premature stop codons.
