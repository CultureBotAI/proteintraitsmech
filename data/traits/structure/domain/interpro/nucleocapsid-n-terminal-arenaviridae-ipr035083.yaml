identifier: InterPro:IPR035083
label: "Nucleocapsid, N-terminal, Arenaviridae"
definition: >-
  Arenaviridae are single stranded RNA viruses. The arenaviridae S RNAs that have been characterised include conserved terminal sequences, an ambisense arrangement of the coding regions for the precursor glycoprotein (GPC) and nucleocapsid (N) proteins and an intergenic region capable of forming a base-paired "hairpin" structure. The mature glycoproteins that result are G1 and G2 and the N protein. This entry represents the N-terminal domain found in nucleocapsid protein (that encapsulates the viral ssRNA) in arenaviridae. The domain folds into a novel structure with a deep cavity for binding the m7GpppN cap structure that is required for viral RNA transcription.
