identifier: InterPro:IPR046795
label: "Transmembrane protein 127, transmembrane region"
definition: >-
  Transmembrane protein 127 (TMEM127) modulates mTOR function in the endolysosome. Its interaction with early endosomal GTPase Rab5 to inhibit mTOR signalling seems to be related with its tumour-suppressing properties. This entry represents the transmembrane region of this protein and similar animal sequences.
