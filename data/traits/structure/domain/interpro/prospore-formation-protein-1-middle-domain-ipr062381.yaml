identifier: InterPro:IPR062381
label: "Prospore formation protein 1, middle domain"
definition: >-
  This entry represents a middle domain in prospore formation protein 1 (PFS1/ADY1), found in fungi. This domain spans approximately 40 residues and is located following a large disordered N-terminal region. PFS1 is involved in the pathway that organises the shaping and sizing of the prospore membrane during sporulation in Saccharomyces cerevisiae. The protein is required to localise MPC54 to all four spindle pole bodies, and localise DON1 and SPO14 to four prospore membranes. PFS1 shows nuclear localisation in mononucleate meiotic cells and may also localise to spindle pole bodies. The specific function of this short domain remains to be determined.
