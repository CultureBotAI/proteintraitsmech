identifier: InterPro:IPR006159
label: Methylmalonyl-CoA mutase, C-terminal
definition: >-
  This entry represents the C-terminal domain of eukaryotic and prokaryotic MUT enzymes. This domain covers the whole length of the protein in some members such as Glutamate mutase sigma subunit (GlmS), Fused isobutyryl-CoA mutase (IcmF,) and Pivalyl-CoA mutase small subunit. It seems to have evolutionary relationship with with a coenzyme B12-dependent enzyme. Methylmalonyl-CoA mutase (MUT ) catalyses a reversible isomerization between L-methylmalonyl-CoA and succinyl-CoA. The enzyme uses an adenosylcobalamin cofactor, highly conserved from bacteria to human. It may be a homodimer, as in mitochondria, or a heterodimer with partially homologous beta chain that does not bind the adenosylcobalamin cofactor, as in Propionibacterium freudenreichii. In human, it is an essential enzyme in propionate catabolism as it conducts metabolites from the breakdown of amino acids (valine, isoleucine, methionine, and threonine), odd-chain fatty acids, and the side chain of cholesterol into the tricarboxylic acid cycle. Defects in this enzyme causes methylmalonic aciduria (MMA) and is the site where most of the mutations have been found. Defects in one of several proteins (MMAA, MMAB, MMADHC) involved in the uptake, modification, and delivery of AdoCbl to the MUT enzyme for its activity also cause MMA. This metabolic disease may develop immediately after birth (early onset) with a severe metabolic crisis or later either with intermittent metabolic decompensations or with chronic progression manifesting as failure to thrive and developmental delay (late onset). Symptoms include severe ketoacidosis, feeding difficulties, lethargy, and hypotonia.
