identifier: InterPro:IPR021777
label: "SANT and BTB domain regulator of CSR, BTB domain"
definition: >-
  Class switch recombination (CSR) is the process by which B cells switch production from IgM/IgD to other immunoglobulin isotypes in the immune response process. This entry represents the BTB domain found at the N-terminal half of the protein SANT and BTB domain regulator of class switch recombination (SANBR, previously known as KIAA1841). This domain is responsible for the negative regulation of CSR. This entry includes proteins predominantly found in animals.
