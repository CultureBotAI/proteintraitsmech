identifier: InterPro:IPR034451
label: "RNA-binding protein 27, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of human RNA-binding protein 27 (RBM27). Although the specific function of the RRM in RBM27 remains unclear, it shows high sequence similarity with RRM1 of RBM26, which functions as a cutaneous lymphoma (CL)-associated antigen.
