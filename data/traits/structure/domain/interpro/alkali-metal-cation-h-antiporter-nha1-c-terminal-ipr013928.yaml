label: "Alkali metal cation/H+ antiporter Nha1, C-terminal"
definition: >-
  The C terminus of the plasma membrane Nha1 antiporter plays an important role in the immediate cell response to hypo-osmotic shock which prevents an excessive loss of ions and water. This protein is found C-terminal to .
