identifier: InterPro:IPR024784
label: "Transducer of regulated CREB activity, middle domain"
definition: >-
  This domain represents the region between the N and C terminus of TORC proteins. TORC (transducer of regulated CREB activity) is a protein family of coactivators that enhances the activity of CRE-dependent transcription via a phosphorylation-independent interaction with the bZIP DNA binding/dimerisation domain of CREB (cAMP Response Element-Binding). Although the C- and N- terminal domains of the TORC proteins have been well characterised, no functional role has yet been assigned to the central region.
