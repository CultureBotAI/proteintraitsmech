identifier: InterPro:IPR036607
label: "Glucosidase 2 subunit beta-like"
definition: >-
  The sequences found in this entry are similar to a region found in the beta-subunit of glucosidase II ( ), which is also known as protein kinase C substrate 80K-H (PRKCSH). The enzyme catalyses the sequential removal of two alpha-1,3-linked glucose residues in the second step of N-linked oligosaccharide processing. The beta subunit is required for the solubility and stability of the heterodimeric enzyme, and is involved in retaining the enzyme within the endoplasmic reticulum. The beta-subunit confers substrate specificity for di- and monoglucosylated glycans on the glucose-trimming activity of the alpha-subunit.
