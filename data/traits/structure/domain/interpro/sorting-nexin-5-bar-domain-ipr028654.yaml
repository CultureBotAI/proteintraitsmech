identifier: InterPro:IPR028654
label: "Sorting nexin-5, BAR domain"
definition: >-
  Sorting nexin-5 (SNX5) belongs to the sorting nexin family, which contains a conserved PX (phox homology) domain that is responsible for binding to specific phosphoinositides. SNX5 also contains a BAR domain that is C terminus to the PX domain. Besides being involved in several stages of intracellular trafficking, SNX5 also plays a role in macropinocytosis and in the internalisation of EGFR after EGF stimulation. This entry represents the BAR domain.
