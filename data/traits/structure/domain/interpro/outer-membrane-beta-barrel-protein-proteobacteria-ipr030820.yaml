identifier: InterPro:IPR030820
label: "Outer membrane beta-barrel protein, proteobacteria"
definition: >-
  Proteins containing this domain are putative outer membrane β-barrel proteins from Proteobacteria. They are inferred by distant homologies to other families (e.g. ) and by the concentration of aromatic residues, especially Phe, in the OMP signal region.
