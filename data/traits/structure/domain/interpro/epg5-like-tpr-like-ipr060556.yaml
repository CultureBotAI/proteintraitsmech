identifier: InterPro:IPR060556
label: "Epg5-like, TPR-like"
definition: >-
  This entry represents a TPR-like region found in EPG5 (Ectopic P granules protein 5 homolog) proteins mainly found in animals. EPG5 is involved in autophagy. Mutations in the human member are related with Vici syndrome.
