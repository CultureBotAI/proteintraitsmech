identifier: InterPro:IPR024449
label: "Anti-sigma factor RsgI, N-terminal"
definition: >-
  The heat shock genes in Bacillus subtilis can be classified into several groups according to their regulation, and the sigma gene, sigI, of Bacillus subtilis belongs to the group IV heat-shock response genes and has many orthologues in the bacterial phylum Firmicutes. Regulation of sigma factor I is carried out by RsgI from the same operon. This entry represents the N-terminal anti-sigma domain, which is located in cytoplasmic portion of RsgI ('upstream' of the single transmembrane helix) which has been shown to interact directly with Sigma-I.
