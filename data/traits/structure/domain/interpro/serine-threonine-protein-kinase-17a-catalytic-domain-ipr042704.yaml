identifier: InterPro:IPR042704
label: "Serine/threonine-protein kinase 17A, catalytic domain"
definition: >-
  STKs (serine/threonine-protein kinases) catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DRAKs (death-associated protein kinases) were named based on their similarity (around 50% identity) to the kinase domain of DAPKs. They contain an N-terminal kinase domain and a C-terminal regulatory domain. Vertebrates contain two subfamily members, DRAK1 (also called STK17A) and DRAK2. Both DRAKs are localized to the nucleus, autophosphorylate themselves, and phosphorylate myosin light chain as a substrate. Rabbit DRAK1 has been shown to induce apoptosis in osteoclasts and overexpression of human DRAK1 induces apoptosis in cultured fibroblast cells.
