label: "DyP dimeric alpha+beta barrel domain"
definition: >-
  This entry represents the N-terminal dimeric α/β barrel domain from a group of the dye-decolorising peroxidase (DyP)-type peroxidase family of proteins. This is one of the six families of peroxidases.
