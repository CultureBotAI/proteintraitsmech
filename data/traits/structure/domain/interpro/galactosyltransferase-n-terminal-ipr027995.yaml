identifier: InterPro:IPR027995
label: "Galactosyltransferase, N-terminal"
definition: >-
  This entry represents the N-terminal domain in a family of galactosyltransferases. Galactosyltransferases possess up to three related galactosyltransferase activities, which in some cases are all catalysed by a single polypeptide: N-acetyllactosamine synthase ( ), β-N-acetylglucosaminyl-glycopeptide β-1,4-galactosyltransferase ( ) and lactose synthase (EC 2.4.1.22). In the absence of α-lactalbumin, the N-acetyllactosamine synthase reaction ( ) is catalysed; however, when α-lactalbumin is present, it forms the lactose synthase complex. Proteins containing this domain include β-1,4-galactosyltransferases and N-acetylgalactosaminyltransferases.
