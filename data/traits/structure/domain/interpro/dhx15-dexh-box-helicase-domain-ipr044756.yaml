identifier: InterPro:IPR044756
label: "DHX15, DEXH-box helicase domain"
definition: >-
  DEAH-box helicase 15 (DHX15) is a pre-mRNA processing factor involved in disassembly of spliceosomes after the release of mature mRNA. DHX15 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This entry represents the DEXH-box helicase domain of DHX15. This domain contains the ATP-binding region.
