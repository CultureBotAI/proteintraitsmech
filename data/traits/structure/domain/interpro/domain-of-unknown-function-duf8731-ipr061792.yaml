identifier: InterPro:IPR061792
label: "Domain of unknown function DUF8731"
definition: >-
  This entry represents a C-terminal bacterial immunoglobulin-like (Big) domain of approximately 120 residues. The domain is found C-terminal to the M14 carboxypeptidase catalytic domain ( ). This family is found predominantly in Bacteroidota, particularly Cytophagales and Sphingobacteriales. The function of this domain remains to be determined.
