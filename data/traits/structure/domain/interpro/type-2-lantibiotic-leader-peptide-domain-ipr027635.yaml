identifier: InterPro:IPR027635
label: "Type 2 lantibiotic, leader peptide domain"
definition: >-
  This entry represents the leader peptide region of a number of type 2 lantibiotic-type bacteriocins, including mersacidin and lichenicidin. They are often are found as gene pairs encoding two-chain bacteriocins. Maturation is accomplished, at least in part, by a LanM-type enzyme ( ).
