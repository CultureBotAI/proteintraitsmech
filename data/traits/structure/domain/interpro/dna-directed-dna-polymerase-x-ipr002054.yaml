identifier: InterPro:IPR002054
label: "DNA-directed DNA polymerase X"
definition: >-
  DNA carries the biological information that instructs cells how to exist in an ordered fashion: accurate replication is thus one of the most important events in the cell life cycle. This function is mediated by DNA-directed DNA-polymerases, which add nucleotide triphosphate (dNTP) residues to the 5'-end of the growing DNA chain, using a complementary DNA as template. Small RNA molecules are generally used as primers for chain elongation, although terminal proteins may also be used. Three motifs, A, B and C, are seen to be conserved across all DNA-polymerases, with motifs A and C also seen in RNA- polymerases. They are centred on invariant residues, and their structural significance was implied from the Klenow (Escherichia coli) structure: motif A contains a strictly-conserved aspartate at the junction of a β-strand and an α-helix; motif B contains an α-helix with positive charges; and motif C has a doublet of negative charges, located in a β-turn-β secondary structure. DNA polymerases ( ) can be classified, on the basis of sequence similarity, into at least four different groups: A, B, C and X. X family polymerases fill in short gaps during DNA repair, and are small (about 40kDa) compared with other polymerases. They are relatively inaccurate enzymes and play roles in base excision repair, in non-homologous end joining (NHEJ) which acts mainly to repair damage due to ionizing radiation, and in V(D)J recombination. X family polymerases include eukaryotic Pol beta, Pol lambda, Pol mu and terminal deoxynucleotidyl-transferase (TdT) ( ). Pol beta and Pol lambda are primarily DNA template-dependent polymerases, whereas TdT is a DNA template-independent polymerase. Pol mu has both template dependent and template independent activities. These enzymes catalyse addition of nucl…
