identifier: InterPro:IPR063176
label: "ABC1 kinase 3-like, C-terminal domain"
definition: >-
  This entry represents a C-terminal domain of approximately 110 to 120 residues found in ABC1K3-type kinases of land plants and cyanobacteria. The domain follows the ABC1 kinase domain ( ) and often a UbiB helical domain ( ). In Arabidopsis, ABC1K3 (Protein ACTIVITY OF BC1 COMPLEX KINASE 3) is localised to plastoglobules where it phosphorylates tocopherol cyclase VTE1 and regulates vitamin E metabolism. ABC1K3 promotes photodamage under red light, acting in opposition to ABC1K1. This domain is also found in Serine protein kinase H from Synechocystis sp. The specific function of this domain remains to be determined.
