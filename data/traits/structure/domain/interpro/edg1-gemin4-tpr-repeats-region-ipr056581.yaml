identifier: InterPro:IPR056581
label: "Edg1/GEMIN4, TPR repeats region"
definition: >-
  This entry represents a region of tetratricopeptide-like repeats found in a group of animal proteins, including protein Edg-1 from Caenorhabditis elegans and human Gem-associated protein 4 (GEMIN4). Edg-1 plays a role in regulating deps-1 cluster formation in the germline. GEMIN4 is involved in the assembly of small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome, and thereby in the splicing of cellular pre-mRNAs.
