identifier: InterPro:IPR032010
label: "E3 ubiquitin-protein ligase APD1-4, middle domain"
definition: >-
  This domain is functionally uncharacterised, found in the middle of APD1-4 and in uncharacterised sequences, mainly found in plants and arthropods. There are two completely conserved C residues that may be functionally important. This entry includes E3 ubiquitin-protein ligase APD1 to 4 from Arabidopsis. They are involved in pollen mitosis II (PMII) regulation during male gametogenesis.
