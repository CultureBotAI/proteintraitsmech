identifier: InterPro:IPR063220
label: "BUD4, C2-like domain"
definition: >-
  This entry represents a C2-like domain found in the C-terminal region of BUD4 proteins from fungi. BUD4 is required for establishment of axial budding patterns in haploid yeast cells and cooperates with other bud site selection proteins to recognise spatial landmarks during mitosis. BUD4 localises to the bud neck and is involved in septin organisation. The protein contains multiple phosphorylation sites and is regulated in a cell cycle-dependent manner. This C-terminal domain is located near the PH domain and may contribute to membrane association or protein-protein interactions. The specific function of this domain remains to be determined.
