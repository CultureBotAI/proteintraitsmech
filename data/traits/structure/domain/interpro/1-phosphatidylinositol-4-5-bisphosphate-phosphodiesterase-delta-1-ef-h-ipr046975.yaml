identifier: InterPro:IPR046975
label: "1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase delta-1, EF-hand domain"
definition: >-
  Phosphoinositide-specific phospholipase C (PI-PLC), also known as 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase, plays a role in the inositol phospholipid signaling by hydrolysing phosphatidylinositol-4,5-bisphosphate to produce the second messengers inositol 1,4,5-trisphosphate (IP3) and diacylglycerol (DAG). These cause the increase of intracellular calcium concentration and the activation of protein kinase C (PKC), respectively. The PLC family in murine or human species is comprised of multiple subtypes. On the basis of their structure, they have been divided into five classes, beta (beta-1, 2, 3 and 4), gamma (gamma-1 and 2), delta (delta-1, 3 and 4), epsilon, zeta, and eta types. PLC-delta-1 is required for the maintenance of skin homeostasis. It functions as a calcium amplifier within the cell and is essential in trophoblasts for placental development. It is involved in Alzheimer's disease and hypertension. Furthermore, it regulates cell proliferation and cell-cycle progression. Both PLC-delta-1 and PLC-delta-3 are essential in trophoblasts for placental development. PLC-delta1 contains a core set of domains, including an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs domain (represented by this entry), a PLC catalytic core, and a single C2 domain.
