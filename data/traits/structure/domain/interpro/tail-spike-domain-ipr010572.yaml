identifier: InterPro:IPR010572
label: "Tail spike domain"
definition: >-
  This is a domain found in a family of prophage tail proteins, including the gp59 tail-assossiated lysin protein from Staphylococcus aureus bacteriophage where it comprises the tip of the tail . Many members of this group are predicted to be endopeptidases.
