identifier: InterPro:IPR035878
label: "STAP2, SH2 domain"
definition: >-
  STAP2 belongs to the STAP family, whose members are adaptor proteins that play a crucial role in a variety of cellular signal transduction pathways by interacting with signaling or transcriptional molecules. It is composed of a Pleckstrin homology (PH) and a SH2 domain along with several tyrosine phosphorylation sites. It plays an important role in modulating both the innate and adaptive immune systems. It is a substrate of breast tumour kinase, an Src-type non-receptor tyrosine kinase that mediates the interactions linking proteins involved in signal transduction pathways. This entry represents the SH2 domain of STAP2.
