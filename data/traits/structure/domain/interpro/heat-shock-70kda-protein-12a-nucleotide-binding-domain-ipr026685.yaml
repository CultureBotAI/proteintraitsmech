identifier: InterPro:IPR026685
label: "Heat shock 70kDa protein 12A, nucleotide-binding domain"
definition: >-
  Heat shock 70kDa protein 12A (HS12A) is an adapter protein for the amyloid precursor protein receptor SorLA. As a member of the heat shock protein 70 (HSP70) family of chaperones, HS12A shows a nucleotide-binding domain (NBD, represented in this entry) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. It is predominantly expressed in neuronal cells. and may play a role in the atherosclerotic process. Mutations in this protein have been related to both schizophrenia and bipolar affective disorder.
