identifier: InterPro:IPR062511
label: "MTD-1, C-terminal domain"
definition: >-
  This entry represents the C-terminal extracellular domain of MTD-1 (Mec three-dependent expression protein 1), a touch-cell-specific membrane protein found in nematodes. MTD-1 is expressed in touch receptor neurons during larval development and the protein plays a role in mechanosensory transduction. The specific function of this domain remains to be determined.
