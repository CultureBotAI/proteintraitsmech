label: "Probable Calcineurin-like phosphoesterase, transmembrane domain"
definition: >-
  This domain is found at the N-terminal of uncharacterised bacterial proteins that contain Calcineurin-like phosphoesterase domain. This domain is predicted to contain four transmembrane helices.
