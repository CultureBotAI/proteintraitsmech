identifier: InterPro:IPR056900
label: "COBRA, C-terminal domain"
definition: >-
  This entry represents a domain found C-terminal in the COBRA family of proteins from Arabidopsis thaliana and related plant sequences. COBRA family members are all extracellular glycosyl-phosphatidyl inositol-anchored proteins (GPI-linked). COBRA is involved in determining the orientation of cell expansion, probably by playing an important role in cellulose deposition. The domain represented by this entry is predicted to adopt a β-sandwich fold.
