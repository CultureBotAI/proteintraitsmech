identifier: InterPro:IPR043708
label: "Domain of unknown function DUF5648"
definition: >-
  This entry represents a three-bladed β-α propeller domain with unknown function. It is often associated with enzymatic domains in bacterial cell surface proteins. Individual blade consist of a three-stranded antiparallel β-sheet and an α-helix packed on it. In some members this helix may have transitioned to a random coil.
