identifier: InterPro:IPR060322
label: "ATRAID-like, EGF-like domain"
definition: >-
  This domain is found towards the C-terminal end of human All-trans retinoic acid-induced differentiation factor (ATRAID) and related animal proteins. This domain contains an EGF-like fold. ATRAID (All-trans retinoic acid-induced differentiation factor), also known as APR3, is a membrane protein that functions as a proliferation suppressor. It plays a role in inducing the cell cycle arrest via inhibiting CCND1 expression in all-trans-retinoic acid (ATRA) signal pathway. ATRAID promotes osteoblast cell differentiation and terminal mineralisation, and forms a transporter complex with SLC37A3 for nitrogen-containing bisphosphonates. ATRAID localises to the nuclear envelope, cell membrane, and lysosome membrane.
