identifier: InterPro:IPR022391
label: "Integrating conjugative element relaxase, PFGI-1 class"
definition: >-
  Proteins in this entry are the TraI putative relaxases required for transfer by a subclass of integrating conjugative elements (ICE) as found in Pseudomonas fluorescens Pf-5, and understood from study of two related ICE, SXT and R391. There is no homology detected to the similarly named TraI relaxase of the F plasmid. This entry represents the N-terminal domain of these proteins.
