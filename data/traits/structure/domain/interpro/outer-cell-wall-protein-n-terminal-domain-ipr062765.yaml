identifier: InterPro:IPR062765
label: "Outer cell wall protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the outer cell wall protein from Brevibacillus. The outer cell wall protein binds to the middle cell wall protein and forms a hexagonal array with a lattice constant of 14.5 nm in the outer cell wall layers. The specific function of this domain remains to be determined.
