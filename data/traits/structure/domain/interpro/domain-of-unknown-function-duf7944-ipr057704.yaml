label: "Domain of unknown function DUF7944"
definition: >-
  This domain is found in uncharacterised bacterial proteins mainly from Moraxellales. It is predicted to fold into an array of α-helices. It contains two invariant cysteine residues which are predicted to form a disulfide bond.
