identifier: InterPro:IPR023796
label: "Serpin domain"
definition: >-
  This entry represents the structural domain of serpins. Protein protease inhibitors constitute a very important mechanism for regulating proteolytic activity. Serpins (SERine Proteinase INhibitors) belong to MEROPS inhibitor family I4, clan ID. Most serpin family members are indeed serine protease inhibitors, but several have additional cross-class inhibition functions and inhibit cysteine protease family members such as the caspases and cathepsins. Others, such as ovalbumin, are incapable of protease inhibition and serve other functions.
