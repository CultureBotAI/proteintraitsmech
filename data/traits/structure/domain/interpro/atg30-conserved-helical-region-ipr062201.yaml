identifier: InterPro:IPR062201
label: "ATG30, conserved helical region"
definition: >-
  This entry represents a conserved helical region found in ATG30 and related autophagy proteins from fungi. ATG30 acts as the peroxisome receptor for pexophagy and is required for both micropexophagy and macropexophagy. The protein localises to the peroxisome membrane, vacuole lumen and preautophagosomal structures. ATG30 interacts with several autophagy-related proteins including ATG11, ATG17 and ATG37, as well as peroxisomal proteins PEX3 and PEX14. The function of this specific helical region within ATG30 remains to be determined.
