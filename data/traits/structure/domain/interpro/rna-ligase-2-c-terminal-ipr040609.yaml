identifier: InterPro:IPR040609
label: "RNA ligase 2, C-terminal"
definition: >-
  This is the C-terminal domain of RNA ligase 2 (Rnl2). The C-terminal domain consists of a four-helix bundle. The C-terminal domain is thought to be critical for binding the Rnl2 to adenylylated nicked duplex. This is known as step 2 of the ligation pathway.
