identifier: InterPro:IPR057273
label: "Ddi1/2, HDD domain"
definition: >-
  This domain is found in the human DNA-damage-inducible homologs 1 and 2 (hDdi1, hDdi2) and related proteins. hDdi2 is a member of the Ddi1-like protein family, which is intricately connected to the UBQ-proteasome. The better-studied yeast homologue Ddi1 (yDdi1) has been implicated in cell cycle regulation, DNA damage response, and exocytosis. There are significant functional differences between hDdi2 and yDdi1. The domain represented by this entry is located centrally in the hDdi2, between the UBL and aspartic protease-like RVP domain. It is named HDD after "the helical domain of Ddi." It is composed of four α-helices that are arranged in a helical bundle. This domain may act as an interaction platform for an RVP substrate.
