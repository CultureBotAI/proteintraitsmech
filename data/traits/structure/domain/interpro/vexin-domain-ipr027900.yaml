identifier: InterPro:IPR027900
label: "Vexin domain"
definition: >-
  Proteins containing this domain include Xenopus laevis Vexin and its human homologue, C8orf46. Vexin is transiently expressed in differentiating progenitors in the developing central nervous system (CNS) and is required for neurogenesis in the neural plate and retina. This entry corresponds to a presumed SH3 domain.
