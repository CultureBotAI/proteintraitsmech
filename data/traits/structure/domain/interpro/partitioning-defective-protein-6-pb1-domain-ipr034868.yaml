identifier: InterPro:IPR034868
label: "Partitioning defective protein 6, PB1 domain"
definition: >-
  PAR-6 is essential for asymmetric division of the Caenorhabditis elegans zygote and for cell polarization in the Drosophila embryo. Mammalian Par6 binds to Par3 and aPKC, as well as to the small GTPase Cdc42, to form a complex which is a major cell polarity regulator. This complex has been implicated in the formation of tight junctions (TJ) in mammalian epithelial cells. Whereas only one par-6 gene exists in Drosophila and C. elegans, a family of four is present in mammals, designated as Par6A-D, although no full-length clone of Par6D has yet been identified. Par6 isoforms A-C localize differently when expressed in MDCK epithelial cells and have distinct effects on TJ formation. Par6 contains an N-terminal PB1 domain, a C-terminal PDZ domain and a semi-CRIB motif immediately preceding the PDZ domain. The PB1 domain of Par6 forms a hetero-dimer with the PB1 domain of aPKC.
