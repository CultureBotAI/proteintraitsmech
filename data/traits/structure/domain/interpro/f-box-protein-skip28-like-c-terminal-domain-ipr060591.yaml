identifier: InterPro:IPR060591
label: "F-box protein SKIP28-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of SKIP28 and similar F-box proteins found in plants. F-box proteins are components of SCF (ASK-cullin-F-box) E3 ubiquitin ligase complexes, which mediate the ubiquitination and subsequent proteasomal degradation of target proteins. These proteins contain a F-box domain that is necessary for interaction with ASK proteins, whilst the C-terminal region provides substrate specificity. Some F-box proteins are required for developmental processes such as endosperm development in embryos.
