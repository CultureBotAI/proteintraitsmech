identifier: InterPro:IPR063958
label: "Sfc3-like, winged helix domain"
definition: >-
  This entry represents a winged helix domain found in a group of predicted transcription factors from actinomycetes. This region has similarity with the winged helix of transcription factor tau subunit sfc3 (also know as Transcription factor C subunit 3), which is an orthologue of the Saccharomyces cerevisiae transcription factor tau subunit TFC3/tau138 and the human TF3C1 counterpart.
