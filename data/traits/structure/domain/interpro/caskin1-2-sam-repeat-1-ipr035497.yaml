identifier: InterPro:IPR035497
label: "Caskin1/2, SAM repeat 1"
definition: >-
  This is the SAM (sterile alpha motif) domain repeat 1 of caskin 1 and caskin 2 proteins; it is a protein-protein interaction domain. Caskin has two tandem SAM domains. Caskin protein is known to interact with membrane-associated guanylate kinase CASK, and apparently may play a role in neural development, synaptic protein targeting, and regulation of gene expression.
