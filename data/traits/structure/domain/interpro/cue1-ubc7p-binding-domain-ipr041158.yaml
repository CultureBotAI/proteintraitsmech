identifier: InterPro:IPR041158
label: "Cue1, Ubc7p-binding domain"
definition: >-
  Cue1p (coupling of ubiquitin conjugation to ER degradation protein 1) is an integral component of yeast endoplasmic reticulum (ER)-associated degradation (ERAD) ubiquitin ligase (E3) complexes. It tethers the ERAD ubiquitin-conjugating enzyme (E2), Ubc7p, to the ER and prevents its degradation, and also activates Ubc7p. This domain represents the Ubc7p-binding region (U7BR) of Cue1p with Ubc7p. The U7BR is as E2-binding domain that includes three α-helices that interact extensively with the 'backside' of Ubc7p. U7BR stimulates both RING-independent and RING-dependent ubiquitin transfer from Ubc7p. Moreover, the U7BR enhances ubiquitin-activating enzyme (E1)-mediated charging of Ubc7p with ubiquitin.
