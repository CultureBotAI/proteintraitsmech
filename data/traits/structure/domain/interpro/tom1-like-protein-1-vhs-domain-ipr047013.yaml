identifier: InterPro:IPR047013
label: "TOM1-like protein 1, VHS domain"
definition: >-
  TOM1-like protein 1 (TOM1L1) is an adapter protein involved in signaling pathways. It interacts with the SH2 and SH3 domains of various signaling proteins when it is phosphorylated. TOM1L1 promotes activation of Src family tyrosine kinase Fyn, possibly by disrupting intramolecular SH3-dependent interactions. It has been implicated in multivesicular body (MVB) formation, viral egress from the cell, and cytokinesis. Its amplification enhances the metastatic progression of ERBB2-positive breast cancers. This entry represents the N-terminal VHS (Vps27p/Hrs/Stam) domain of TOM1L1, which is found next to the GAT domain ( ). This domain has a superhelical structure similar to the structure of the ARM repeats.
