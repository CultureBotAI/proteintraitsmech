identifier: InterPro:IPR043990
label: "Autochaperone domain type 1"
definition: >-
  This entry represents the autochaperone domain of type 1 (AC-1) in the Type Va Secretion System (T5aSS). Autotransporters (ATs) belong to a family of modular proteins secreted by the Type V, subtype a, secretion system (T5aSS) and considered as an important source of virulence factors in lipopolysaccharide diderm bacteria (archetypical Gram-negative bacteria). The AC of type 1 with β-fold appears as a prevalent and conserved structural element exclusively associated to β-helical AT passenger.
