identifier: InterPro:IPR048306
label: "Rotavirus non-structural protein 35, C-terminal domain"
definition: >-
  Rotavirus non-structural protein 35 (NS35, also known as NSP2) is a basic protein which possesses RNA-binding and helix-destabilising activities in addition to nucleoside and 5' RNA triphosphatase (NTPase/RTPase) and nucleoside-diphosphate (NDP) kinase-like activities. NS35 forms a functional octamer which is essential for genome replication and formation of viroplasms. This entry represents the C-terminal domain, which has nucleotide triphosphatase (NTPase) and nucleoside diphosphate kinase (NDP kinase) activities, required for dsRNA synthesis. Additionally, basic residues in a C-terminal helix of this domain contributes to sequence-independent RNA binding of NSP2.
