identifier: InterPro:IPR034788
label: "Protein couch potato, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of Cpo, an RNA-binding protein encoded by Drosophila couch potato (cpo) gene. The gene is named because several partial loss-of-function alleles cause hypoactive behavior in adults. Cpo contains a well conserved RNA recognition motif (RRM). It may control the processing of RNA molecules required for the proper functioning of the peripheral nervous system (PNS).
