identifier: InterPro:IPR063124
label: "Penicillin-binding protein 1A, C-terminal domain"
definition: >-
  This entry represents a small C-terminal domain found in penicillin-binding proteins of the 1A family, predominantly from Bacillota. The domain is typically 40-45 residues in length and is located downstream of the transglycosylase ( ) and transpeptidase ( ) domains. The function of this domain remains to be determined.
