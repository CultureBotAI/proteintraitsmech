identifier: InterPro:IPR037755
label: "Plc1, PH domain"
definition: >-
  Saccharomyces cerevisiae Plc1 is a homologue of the delta isoform of mammalian phosphoinositide-specific phospholipase C (PI-PLC). It is required for the initial step of inositol polyphosphate (InsP) synthesis. It hydrolyzes phosphatidylinositol 4,5-biphosphate (PIP2) to generate the signaling molecules inositol 1,4,5-triphosphate (IP3) and 1,2-diacylglycerol (DAG).
