identifier: InterPro:IPR034157
label: "DNA topoisomerase 2, TOPRIM domain"
definition: >-
  This topoisomerase-primase (TOPRIM) nucleotidyl transferase/hydrolase domain is found in proteins of the type II family of DNA topoisomerases similar to Saccharomyces cerevisiae Topoisomerase II. TopoII enzymes cut both strands of the duplex DNA to remove (relax) both positive and negative supercoils in DNA. These enzymes covalently attach to the 5' ends of the cut DNA, separate the free ends of the cleaved strands, pass another region of the duplex through this gap, then rejoin the ends. These proteins also catenate/ decatenate duplex rings. The TOPRIM domain has two conserved motifs, one of which centres at a conserved glutamate and the other one at two conserved aspartates (DxD). This glutamate and two aspartates, cluster together to form a highly acid surface patch. The conserved glutamate may act as a general base in strand joining and as a general acid in strand cleavage by topisomerases. The DXD motif may co-ordinate Mg 2+ , a cofactor required for full catalytic function.
