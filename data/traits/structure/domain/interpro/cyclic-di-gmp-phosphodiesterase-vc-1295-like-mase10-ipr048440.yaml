identifier: InterPro:IPR048440
label: "Cyclic di-GMP phosphodiesterase VC_1295-like, MASE10"
definition: >-
  This entry represents the membrane-associated sensor domain 10 (MASE10) found at the N-terminal end of Cyclic di-GMP phosphodiesterase VC_1295 from Vibrio cholerae (CDPD1), which has been reported to catalyse the hydrolysis of cyclic diguanylate (c-di-GMP) to GMP in vitro and increase motility and decrease biofilm formation in vivo. MASE10 has conserved Cys, Ser and Trp residues in the periplasmic loop, conserved aromatic residues and four charged (Arg, Asp, Lys, and another Asp) residues in the predicted transmembrane segments, suggesting specific interaction with its small molecule or protein ligands. It has been found in c-di-GMP phosphodiesterases, adenylate/guanylate cyclases and Ser/Thr protein phosphatases of the PP2C family, in which MASE10 is followed by the signal-transducing HAMP domain.
