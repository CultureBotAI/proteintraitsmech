identifier: InterPro:IPR060361
label: "Bud site selection protein RAX1, C-terminal domain"
definition: >-
  This entry represents the C-terminal helical domain of RAX1 proteins found in fungi. RAX1 is a bud site selection protein involved in cell polarisation and division. The protein contains an N-terminal RGS domain and this C-terminal helical region that spans transmembrane helices. RAX1 localises to the cell membrane and endoplasmic reticulum membrane as a multi-pass membrane protein. The specific function of this domain remains to be determined.
