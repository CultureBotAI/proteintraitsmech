identifier: InterPro:IPR054518
label: "Phosphatidylserine Lipase ABHD16, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain from ABHD16 family of proteins. The ABHD16 family comprises enzymes with phosphatidylserine lipase activity, catalysing the hydrolysis of phosphatidylserine to produce lysophosphatidylserine, a signaling lipid involved in immunological and neurological processes. These enzymes exhibit specificity, showing no activity towards diacylglycerol, triacylglycerol, or lysophosphatidylserine lipase. Additionally, they possess monoacylglycerol lipase activity, with a preference for certain monoacylglycerol substrates. The family's enzymatic functions highlight its role in lipid signaling pathways and potential implications in physiological regulation.
