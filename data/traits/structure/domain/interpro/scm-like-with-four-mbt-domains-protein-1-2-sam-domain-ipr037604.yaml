identifier: InterPro:IPR037604
label: "Scm-like with four MBT domains protein 1/2, SAM domain"
definition: >-
  Scm-like-4MBT1 and Scm-like-4MBT2 are structurally related to the transcriptional repressor Polycomb group (PcG) proteins. They contain a SAM domain, a SLED domain, and four MBT repeats. The MBT repeats of the human SFMBT1 protein are responsible for association with the nuclear matrix and for selective binding of H3 histone N-terminal tails. SFMBT1 also forms a stable complex with LSD1 and CoREST that causes chromatin compaction and transcriptional repression of target genes, including those encoding replication-dependent histones. This entry represents the SAM domain of Scm-like-4MBT1/2.
