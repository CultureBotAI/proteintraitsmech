identifier: InterPro:IPR056810
label: "Stalled ribosome sensor GCN1-like, N-terminal"
definition: >-
  This entry represents a region that consists of four HEAT repeats found towards the N-terminal of the stalled ribosome sensor GCN1, a ribosome collision sensor that plays a key role in the RNF14-RNF25 translation quality control pathway, a pathway that takes place when a ribosome has stalled during translation, and which promotes ubiquitination and degradation of translation factors on stalled ribosomes. This entry also includes Protein ILITYHIA (ILA) from Arabidopsis, a protein involved in immunity against bacterial infection and in non-host resistance.
