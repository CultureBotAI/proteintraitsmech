definition: >-
  This entry represents a domain of unknown function in a group of uncharacterised proteins mainly from plants and prokaryotes. According to structure predictions it adopts a sensor-like fold, consisting of 7 β-strands arranged in a β-barrel like fold, surrounded by a small α-helix.
