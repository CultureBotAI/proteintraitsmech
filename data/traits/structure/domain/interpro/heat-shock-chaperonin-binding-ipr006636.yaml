identifier: InterPro:IPR006636
label: "Heat shock chaperonin-binding"
definition: >-
  This entry represents a heat shock chaperonin-binding domain found in human Stress-inducible phosphoprotein STI1 and similar sequences found in eukaryotes. STI1 acts as a co-chaperone for HSP90AA1. Both N- and C-terminal ends of STI1 are capable of binding heat shock proteins. This domain is found both singly and duplicated in different proteins. This domain shows an α-helical structure.
