identifier: InterPro:IPR024448
label: "Xylosyltransferase, C-terminal"
definition: >-
  This domain is found in metazoan xylosyltransferases, which include xylosyltransferase 1 and xylosyltransferase 2. These enzymes initiate the biosynthesis of glycosaminoglycan chains in proteoglycans by transferring xylose from UDP-xylose to specific serine residues of the core protein.
