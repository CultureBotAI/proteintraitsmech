identifier: InterPro:IPR041053
label: "Replicase polyprotein 1ab"
definition: >-
  This entry relates to a regulatory domain found in replicase polyprotein 1ab found in Arterivirus. Structural studies of arterivirus helicase (nsp10), indicate that this domain undergoes conformational changes on substrate binding. Besides the large conformational change, it is suggested that the regions at the surface of domain 1B not directly involved in DNA binding may become flexible. For example, domain 1B residues Arg95, Gly125 and Ala131 become disordered after DNA binding. Together with domains 1A and 2A it forms a nucleic acid-binding channel where the single-stranded part of the DNA substrate is bound to.
