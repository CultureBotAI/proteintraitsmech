identifier: InterPro:IPR060092
label: "Histone transcription regulator 3 , N-terminal TPR repeats"
definition: >-
  This entry represents the N-terminal tetratricopeptide repeat (TPR) domain found in histone transcription regulator 3 (HIR3) fungal proteins, including HIR3 from Candida albicans. The specific function of this N-terminal TPR domain remains to be determined. HIR3 belongs to the HIR3/CABIN1 family and has a role in nucleosome assembly pathways that are required for heterochromatin integrity and proper chromosome segregation. The protein is involved in chromatin organisation and transcriptional regulation. HIR3 is a component of the HIR complex and is localised to the nucleus. In yeast, HIR3 is a repressor of histone gene transcription. It also has a role in nucleosome assembly.
