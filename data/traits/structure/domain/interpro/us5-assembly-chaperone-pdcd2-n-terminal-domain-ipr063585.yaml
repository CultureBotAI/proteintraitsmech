identifier: InterPro:IPR063585
label: "US5 assembly chaperone PDCD2, N-terminal domain"
definition: >-
  PDCD2, also known as uS5 assembly chaperone PDCD2, is localised predominantly in the cytosol of cells situated at the opposite pole of the germinal centre from the centroblasts as well as in cells in the mantle zone. It is a chaperone for ribosomal protein uS5. It cotranslationally associates with uS5 and accompanies the ribosomal protein to assembly sites in the nucleus. This entry represents the N-terminal segment of PDCD2, PDCD2L and its homologues, that together with , they form the full functional domain, which is interrupted by a zinc finger ( ).
