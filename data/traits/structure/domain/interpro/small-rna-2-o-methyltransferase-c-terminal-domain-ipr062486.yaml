identifier: InterPro:IPR062486
label: "Small RNA 2'-O-methyltransferase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in HEN1 small RNA 2'-O-methyltransferases. HEN1 methyltransferases add 2'-O-methyl groups at the 3'-end of selected small RNAs including piRNAs, single-stranded siRNAs and long hairpin RNA genes. This methylation protects the 3'-end of small RNAs from tailing and trimming and constitutes a recognition signal for appropriate argonaute machineries. The enzymes use S- adenosyl-L-methionine as a methyl donor and require magnesium as a cofactor. The proteins are involved in RNA-mediated gene silencing pathways and transposable element silencing. The specific function of this C-terminal domain remains to be determined. This domain is found in insects.
