identifier: InterPro:IPR000818
label: TEA/ATTS domain
definition: >-
  The TEA domain is a DNA-binding region of about 66 to 68 amino acids that has been named after the two proteins that originally defined the domain: TEF-1 and AbaA. The TEA domain is located toward the N-terminal of eukaryotic transcription factors of the TEA/ATTS family. It shows a three-helix bundle with a homeodomain fold. Two α-helices are nearly anti-parallel and pack on either side of the third one, which is the DNA-recognition helix of the TEA domain. Phosphorylation of one or both of the two conserved serines found on the DNA-binding surface could interfere with DNA-binding activity by introducing electrostatic repulsion and/or steric hindrance and help regulate the transcription factor activity of the proteins.
