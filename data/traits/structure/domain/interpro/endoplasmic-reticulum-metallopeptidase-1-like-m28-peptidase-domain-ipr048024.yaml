identifier: InterPro:IPR048024
label: "Endoplasmic reticulum metallopeptidase 1-like, M28 peptidase domain"
definition: >-
  Endoplasmic reticulum metallopeptidase 1 (ERMP1, also known as Felix-ina, FXNA or Fxna peptidase) is a multi-pass membrane protein located in the endoplasmic reticulum membrane. In humans, Fxna may play a crucial role in processing proteins required for the organisation of somatic cells and oocytes into discrete follicular structures, although which proteins are hydrolysed has not yet been determined. This entry also includes vacuolar membrane proteases from fungi, such as PFF1 from yeast which are homologues of human ERMP1. PFF1 may be involved in vacuolar sorting and osmoregulation.
