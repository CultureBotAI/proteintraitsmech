identifier: InterPro:IPR035656
label: "Nostrin, SH3 domain"
definition: >-
  Nostrin is expressed in endothelial and epithelial cells and is involved in the regulation, trafficking and targeting of endothelial NOS (eNOS). It facilitates the endocytosis of eNOS by coordinating the functions of dynamin and the Wiskott-Aldrich syndrome protein (WASP). Increased expression of nostrin may be correlated to pre-eclampsia. Nostrin contains an N-terminal F-BAR domain and a C-terminal SH3 domain. This entry represents the SH3 domain.
