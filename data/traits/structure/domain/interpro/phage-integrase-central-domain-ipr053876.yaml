identifier: InterPro:IPR053876
label: "Phage integrase, central domain"
definition: >-
  This is the central domain of phage integrases and similar sequences from tailed bacteriophages and bacterial prophages. This domain is known to mediate DNA binding and binds to the major groove adjacent to the site of DNA cleavage. It consists of two pairs of antiparallel helices that pack together at nearly a right angle and form a four-helix bundle.
