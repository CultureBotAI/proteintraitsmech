identifier: InterPro:IPR058439
label: "Domain of unknown function (DUF8125) C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of a family of uncharacterised proteins from archaea. The proteins in this family are primarily found in the Halobacteria class, including members of the Halorubrum and Haloferax genera. The family is also present in various viruses that infect these archaea. The proteins are typically around 250 to 280 amino acids in length. Many of these proteins are predicted to be membrane-associated, featuring one or more transmembrane helices.
