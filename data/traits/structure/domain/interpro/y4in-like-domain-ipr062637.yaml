identifier: InterPro:IPR062637
label: "Y4iN-like domain"
definition: >-
  This entry represents a domain found in uncharacterised secreted proteins of proteobacteria, including the symbiotic nitrogen-fixing bacterium Sinorhizobium fredii. Members are predicted to contain N-terminal signal peptides, indicating secretion. The function of this domain remains to be determined.
