identifier: InterPro:IPR041294
label: "Ankyrin ubiquitin-binding domain"
definition: >-
  This is an Ankyrin repeat domain found in TRABID (also known as Ubiquitin thioesterase ZRANB1) ( ). In TRABID, the first ankyrin repeat spans residues 260-290 and is connected to the second repeat residues 313-340 by a long linker that packs against what would correspond to the concave surface in an extended ankyrin-repeat structure. Ankyrin-repeat domains mediate protein interactions through a variety of surfaces. The ankyrin domain of TRABID interacts with ubiquitin, hence it is referred to as the ankyrin ubiquitin-binding domain, or AnkUBD.
