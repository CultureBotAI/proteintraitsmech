identifier: InterPro:IPR058953
label: "Pectate disaccharide-lyase-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal β supersandwich domain of pectate disaccharide-lyase from Dickeya chrysanthemi (PelX, ), also known as exopolygalacturonate lyase. This enzyme catalyses the exo-cleavage of pectate and contributes to pectate catabolism in bacteria. The enzyme requires calcium ions for activity and has an optimum pH of 7.5-8.0. Mutations in the gene encoding this protein result in reduced growth on pectate, but do not affect pathogenicity. This N-terminal is not present in all PelX proteins.
