identifier: InterPro:IPR047498
label: "E3 ubiquitin-protein ligase ORTHRUS 1/2-like, first RING finger, HC subclass"
definition: >-
  This entry represents the first RING finger, HC subclass, found in ORTH1/2 from Arabidopsis thaliana and similar sequences from plants. E3 ubiquitin-protein ligase ORTHRUS 1-5 from Arabidopsis thaliana (ORTH1-5) may participate in CpG methylation-dependent transcriptional regulation and/or epigenetic transcriptional silencing. ORTH1 mediates ubiquitination with the E2 ubiquitin-conjugating enzymes UBC11, UBC8 and UBC8 homologues (e.g. UBC10, UBC11, UBC28 and UBC29) but not with UBC27, UBC30, UBC32, UBC34 and UBC36. ORTH2 and ORTH5 mediate ubiquitination with the E2 ubiquitin-conjugating enzyme UBC11. ORTH1 and ORTH2 promote methylation-mediated gene silencing leading, for example, to early flowering. They can bind to CpG, CpNpG, and CpNpN DNA motifs, with a strong preference for methylated forms, and with highest affinity for CpG substrates. Members of this group of proteins contain two typical C3HC4-type RING-HC fingers.
