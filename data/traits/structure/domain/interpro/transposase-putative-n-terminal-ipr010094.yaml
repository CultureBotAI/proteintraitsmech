identifier: InterPro:IPR010094
label: "Transposase (putative), N-terminal"
definition: >-
  This entry represents the N-terminal region of a family of putative transposases found in the largest copy number in Thermoanaerobacter tengcongensis. The three homologues in Bacillus anthracis are each split into two ORFs and this entry represents the upstream ORF.
