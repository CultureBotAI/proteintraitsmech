identifier: InterPro:IPR056540
label: "Nucleoporin POM152, N-terminal transmembrane domain"
definition: >-
  This domain is found at the N-terminal of Nucleoporin POM152 from Saccharomyces cerevisiae and similar fungal proteins. POM152 functions as a component of the nuclear pore complex (NPC). This protein consists of an N-terminal transmembrane domain (TMD) and an extended C-terminal domain (CTD) with tandem repeats of Ig-like domains.
