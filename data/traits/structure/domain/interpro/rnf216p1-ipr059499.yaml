identifier: InterPro:IPR059499
label: RNF216P1
definition: >-
  This entry represents RNF216P1 putative proteins. These are very small proteins of 42 amino acids that are highly similar to the N-terminal region of RNF216. RNF216P1 may be the product of a pseudogene and could encode a non-functional truncated protein. The protein has been identified in humans but its existence and function remain uncertain. The function of this protein remains to be determined. In RNF216 from mice and humans, this entry covers a low complexity conserved region, according to AlphaFold2 predictions.
