identifier: InterPro:IPR047902
label: "Rhophilin-2, BRO1 domain"
definition: >-
  This entry represents the Bro1 domain of RhoA-binding protein Rhophilin-2, also known as RHPN2. Rhodophilin-2 belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domain of mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding protein Rhophilin-1, Brox, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, Ustilago maydis Rim23 (also known as PalC), and related domains. Rhophilin-2, binds both GDP- and GTP-bound RhoA. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. In addition to this Bro1-like domain, Rhophilin-2 contains an N-terminal Rho-binding domain and a C-terminal PDZ (PS.D.-95, Disc-large, ZO-1) domain. Roles for Rhophilin-2 may include limiting stress fibre formation or increasing the turnover of F-actin in the absence of high levels of RhoA signalling activity. Rhophilin-2 lacks the V-shaped (V) domain found in many members of the BRO1_Alix_like superfamily.
