identifier: InterPro:IPR026904
label: "tRNA uridine 5-carboxymethylaminomethyl modification enzyme MnmG, C-terminal"
definition: >-
  This entry represents the C-terminal domain of MnmG (also known as GidA). It consists of 4 helices, the last three being rather short and forming small bundle. MnmG is a tRNA modification enzyme found in bacteria and mitochondria that forms a complex with MnmE which is involved in the formation of methyluridine derivatives at the wobble uridine base in some tRNAs. Based on mutational analysis this domain has been suggested to be implicated in binding of the D-stem of tRNA and to be responsible for the interaction with protein MnmE.
