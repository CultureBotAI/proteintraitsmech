identifier: InterPro:IPR033729
label: "Serine-tRNA ligase catalytic core domain"
definition: >-
  Serine--tRNA ligase or seryl-tRNA synthetase (SerRS) is responsible for the attachment of serine to the 3' OH group of ribose of the appropriate tRNA. SerRS is a class II aminoacyl-tRNA synthetase, this assignment is based upon its structure and the presence of three characteristic sequence motifs in the core domain. This core domain is primarily responsible for ATP-dependent formation of the enzyme bound aminoacyl-adenylate. SerRS synthetase is a homodimer.
