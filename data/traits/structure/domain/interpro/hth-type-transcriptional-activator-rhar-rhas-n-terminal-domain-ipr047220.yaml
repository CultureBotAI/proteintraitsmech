identifier: InterPro:IPR047220
label: "HTH-type transcriptional activator RhaR/RhaS, N-terminal domain"
definition: >-
  This entry represents the N-terminal cupin domain found in the HTH-type transcription activators RhaS and RhaRan similar sequences predominantly found in Proteobacteria. RhaS and RhaR respond to the availability of L-rhamnose and activate transcription of the operons in the Escherichia coli L-rhamnose catabolic regulon. The E. coli RhaR protein activates expression of the rhaSR operon in the presence of its effector, L-rhamnose. The resulting RhaS protein (plus L-rhamnose) activates expression of the L-rhamnose catabolic operon rhaBAD as well as the transport operon rhaT. These proteins bind DNA as dimers, via their HTH motifs in the C-terminal domain ( ). Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" β-barrel fold capable of homodimerisation.
