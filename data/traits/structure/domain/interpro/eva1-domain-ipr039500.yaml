identifier: InterPro:IPR039500
label: "EVA1 domain"
definition: >-
  This entry represents the EVA1 domain found in a group of proteins, including EVA1A/B/C. EVA1A, also known as TMEM166, regulates cell autophagy and apoptosis and has been shown to promote papillary thyroid cancer progression and epithelial-mesenchymal transition via upregulating immune-related signaling pathways. This domain can be found in the C terminus of the human EVA1C, which serves as the Slit receptor that may mediate neural circuit formation in the developing nervous system. The EVA1C gene is located within the Down syndrome critical region (21q21-21q22.3).
