identifier: InterPro:IPR048249
label: "Far upstream element-binding protein 1, first type I KH domain"
definition: >-
  This entry represents first type I K homology (KH) RNA-binding domain found in human Far upstream element-binding protein 1 (FUBP1) ( ) and similar proteins from vertebrates. FUBP1, also called FBP, or FUSE-binding protein 1, or DNA helicase V, or DH V, binds RNA and single-stranded DNA (ssDNA) and may act both as activator and repressor of transcription. It regulates MYC expression by binding to a single-stranded far-upstream element (FUSE) upstream of the MYC promoter. FUBP1 contains four K-homology (KH) RNA-binding domains.
