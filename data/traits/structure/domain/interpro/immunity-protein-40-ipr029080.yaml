identifier: InterPro:IPR029080
label: "Immunity protein 40"
definition: >-
  This entry represents a predicted immunity protein with an α+β fold and conserved phenylalanine and tryptophan residues and a GGD motif. Proteins containing this domain are present in bacterial polymorphic toxin systems as an immediate gene neighbour of the toxin gene, usually containing a domain of the Ntox19 family.
