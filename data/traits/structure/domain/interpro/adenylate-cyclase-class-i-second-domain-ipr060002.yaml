identifier: InterPro:IPR060002
label: "Adenylate cyclase, class-I, second domain"
definition: >-
  This entry represents the second domain of class-I adenylate cyclases. It is composed of α-helices. Adenylate cyclase is the enzyme responsible for the synthesis of cAMP from ATP. On the basis of sequence similarity, it has been proposed that there are three different classes of adenylate cyclases. Class I cyclases are found in enterobacteria and related Gram-negative bacteria.
