identifier: InterPro:IPR040832
label: "TTHB210-like domain"
definition: >-
  This domain is found in TTHB210 protein present in Thermus thermophilus. TTHB210 is a Sigma-E factor regulated gene product that forms a homodecamer. This domain is chain G and can be classified with chains A, C, E and I based on its folds.
