identifier: InterPro:IPR062175
label: "Microsporidian spore wall protein EnP1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the EnP1 family of spore wall proteins found in microsporidia. EnP1 is involved in the adhesion to host cell surface glycosaminoglycans and is an integral part of spore activation and host cell invasion. The protein is localised to the spore wall and at the anchoring disk complex, which plays a crucial role in rupture of the spore wall and release of the polar tube following activation. EnP1 contains heparin- binding motifs that are necessary for spore adherence to host cells. The protein is expressed during merogony and sporogony and contains an N-terminal signal peptide.
