identifier: InterPro:IPR047364
label: "Forkhead box protein S1, Forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXS1 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein S1 (FOXS1) is a transcriptional repressor that suppresses transcription from the FASLG, FOXO3, and FOXO4 promoters. It may have a role in the organisation of the testicular vasculature. It has also been implicated in energy turnover, motor function, and body weight. Downregulation of FOXS1 has been related to cell proliferation and metastasis. FOX transcription factors recognise the core sequence 5'-(A/C)AA(C/T)A-3'.
