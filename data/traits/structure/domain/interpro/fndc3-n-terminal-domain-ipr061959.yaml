identifier: InterPro:IPR061959
label: "FNDC3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of approximately 70 residues found in fibronectin type III domain-containing proteins FNDC3A, FNDC3B, and FNDC3C. This domain is located N-terminal to nine tandem fibronectin type III domains ( ). These proteins are single-pass transmembrane proteins that localise to the Golgi apparatus and cell membrane. FNDC3A mediates spermatid-Sertoli cell adhesion during spermatogenesis. FNDC3B, also known as FAD104 (factor for adipocyte differentiation 104), is a positive regulator of adipogenesis. This family is found in metazoans. The function of this domain remains to be determined.
