identifier: InterPro:IPR053973
label: "Endoplasmic reticulum metallopeptidase 1-like, C-terminal domain"
definition: >-
  Endoplasmic reticulum metallopeptidase 1 (ERMP1, also known as Felix-ina, FXNA or Fxna peptidase) is a multi-pass membrane protein located in the endoplasmic reticulum membrane. In humans, it may play a crucial role in processing proteins required for the organisation of somatic cells and oocytes into discrete follicular structures, although which proteins are hydrolysed has not yet been determined. According to AlphaFold structure predictions, these proteins consist of a M28 peptidase domain ( ), a TM domain and a C-terminal elongated banana-shaped all β-sheet domain (represented in this entry), structurally similar to the Mu homology domain ( ), a protein-protein interaction module found in endocytic proteins involved in clathrin-mediated endocytosis.
