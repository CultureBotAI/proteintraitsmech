label: "Predicted membrane protein YciQ-like, C-terminal domain"
definition: >-
  This domain, found in various hypothetical prokaryotic proteins, including the predicted membrane protein YciQ from Escherichia coli, has no known function. This domain is located C-terminal to a domain of unknown function (DUF2207, ).
