identifier: InterPro:IPR008635
label: Trimeric autotransporter adhesin YadA-like, stalk domain
definition: >-
  This is the stalk domain of the trimeric autotransporter adhesin YadA. The coiled-coil neck region makes the transition from the globular head region to the narrower stalk domain. The stalk domain confers serum resistance. The Yersinia adhesin A (YadA) is a trimeric autotransporter adhesin of enteric yersiniae. It consists of three major domains: a head mediating adherence to host cells, a stalk involved in serum resistance, and an anchor that forms a membrane pore and is responsible for the autotransport function.
