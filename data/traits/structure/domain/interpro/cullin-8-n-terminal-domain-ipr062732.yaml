identifier: InterPro:IPR062732
label: "Cullin-8, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Cullin-8 (RTT101), found in Saccharomycetaceae. RTT101 is the core component of multiple cullin-RING-based E3 ubiquitin ligase complexes involved in DNA replication, DNA repair and histone modification. The full-length protein forms various complexes, including RTT101(MMS1- MMS22), RTT101(MMS1-CRT10) and others, each with different substrate specificities. The region (residues 1-50) interacts with MMS1, the linker protein that connects RTT101 to substrate receptors. This interaction is essential for complex formation and E3 ligase function.
