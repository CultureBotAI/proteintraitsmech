identifier: InterPro:IPR015250
label: MPT63-like
definition: >-
  MPT63 is a secreted protein of unknown function that is specific to Mycobacterium tuberculosis. MPT63 assumes a β-sandwich structure consisting of two antiparallel β-sheets (similar to an immunoglobulin-like fold), and an additional small, antiparallel β-sheet. The longer-stranded β-sheet is made up of four antiparallel β-strands. The shorter-stranded β-sheet consists of five β-strands, four of which form an antiparallel β-sheet. The exact function of this domain is unknown, though a putative role includes involvement in host-bacterial interactions involved in endocytosis or phagocytosis, possibly during bacterial internalisation.
