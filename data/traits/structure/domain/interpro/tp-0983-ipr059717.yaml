label: TP_0983
definition: >-
  This entry represents a domain found in Uncharacterized protein TP_0983. The domain is found predominantly in Spirochaetota, with representatives in Treponema and Spirochaeta genera within the Spirochaetales order. The domain is present in proteins that contain an N-terminal signal peptide. The function of this domain remains to be determined.
