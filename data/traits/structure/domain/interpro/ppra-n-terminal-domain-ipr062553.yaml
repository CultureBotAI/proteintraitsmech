identifier: InterPro:IPR062553
label: "PprA, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of PprA, a 300 amino acid DNA repair protein from Deinococcus radiodurans. PprA is a double-stranded DNA-binding protein that contributes to extreme radioresistance by stimulating DNA end-joining reactions catalysed by DNA ligases, playing a critical role in non-homologous end-joining DNA repair. The specific function of this domain remains to be determined.
