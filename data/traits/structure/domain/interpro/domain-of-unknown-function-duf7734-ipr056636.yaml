label: "Domain of unknown function DUF7734"
definition: >-
  This domain is found in uncharacterised proteins. It is predicted to adopt globular structure consisting of a curved β-sheet and α-helices packed on one side of it. It contains a semi-conserved FKGFSS sequence motif.
