identifier: InterPro:IPR006963
label: Molybdopterin oxidoreductase, 4Fe-4S domain
definition: >-
  The molybdopterin oxidoreductase 4Fe-4S domain is found in a number of reductase/dehydrogenase families, which include the periplasmic nitrate reductase precursor and the formate dehydrogenase alpha chain. The following proteins contain this domain and belong to the molybdenium (Mo) or tungsten (W) containing enzyme family, the Mo/W bis-MGD (molybdopterin-guanine-dinucleotide) oxydoreductases: Escherichia coli respiratory nitrate reductase ( ). Escherichia coli anaerobic dimethyl sulfoxide reductase (DMSO reductase). Escherichia coli biotin sulfoxide reductases (genes bisC and bisZ). Methanobacterium formicicum formate dehydrogenase ( ). Escherichia coli formate dehydrogenases -H (gene fdhF), -N (gene fdnG) and -O (gene fdoG). Wolinella succinogenes polysulfide reductase chain. Salmonella typhimurium thiosulfate reductase (gene phsA). Escherichia coli trimethylamine-N-oxide reductase ( ) (gene torA). Nitrate reductase ( ) from Klebsiella pneumoniae (gene nasA), Alcaligenes eutrophus, Escherichia coli, Rhodobacter sphaeroides, Thiosphaera pantotropha (gene napA), and Synechococcus PCC 7942 (gene narB).
