identifier: InterPro:IPR015285
label: "RIO2 kinase winged helix domain, N-terminal"
definition: >-
  This N-terminal domain is found in RIO2 kinases, and is structurally homologous to the winged helix (wHTH) domain. It adopts a structure consisting of four α helices followed by two β strands and a fifth α helix. The domain confers DNA binding properties to the protein, as per other winged helix domains.
