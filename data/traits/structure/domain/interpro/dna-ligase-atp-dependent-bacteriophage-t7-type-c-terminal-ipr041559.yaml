identifier: InterPro:IPR041559
label: "DNA ligase, ATP-dependent, bacteriophage T7-type, C-terminal"
definition: >-
  This is the C-terminal domain found in ATP-Dependent DNA ligase from Bacteriophage T7. This domain has no ligase activity, however together with the N-terminal domain (domain 1) they bind to double-stranded DNA consistent with the idea that the DNA-binding site is between the domains in the intact protein. While the fold of domain 2 (this domain) is very similar to a number of other proteins that bind single-stranded DNA, this domain does not bind to single-stranded DNA but instead has a high affinity for double-stranded DNA.
