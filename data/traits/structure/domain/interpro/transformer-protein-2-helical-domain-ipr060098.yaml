identifier: InterPro:IPR060098
label: "Transformer protein 2, helical domain"
definition: >-
  This entry represents a helical domain found in the sex-determining transformer protein 2 (TRA-2) from Caenorhabditis species. The function of this helical domain remains to be determined. TRA-2 is a multi-pass transmembrane protein that plays a major role in controlling sexual cell fates. The full-length protein contains multiple transmembrane helical regions and is localised to the membrane. TRA-2 promotes female development by sequestering FEM proteins to the membrane, thereby allowing TRA-1 to enter the nucleus and promote female development.
