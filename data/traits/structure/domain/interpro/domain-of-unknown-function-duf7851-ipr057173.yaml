identifier: InterPro:IPR057173
label: "Domain of unknown function DUF7851"
definition: >-
  This domain is found in uncharacterised proteins from plants. It is predicted to adopt a structure consisting of a mixed β-sheet and α-helices packed on both sides with unique topology. It contains a highly conserved sequence motif RxKxRKG that contributes to the formation of a highly basic surface patch.
