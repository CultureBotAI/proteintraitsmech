identifier: InterPro:IPR000249
label: "Bacterial microcompartment domain"
definition: >-
  Bacterial microcompartments (BMCs) are large proteinaceous structures comprised of a roughly icosahedral shell and a series of encapsulated enzymes. The shells of BMCs are made primarily of a family of proteins whose structural core is the BMC domain, and variations upon this core provide functional diversity. This domain is found in a variety of polyhedral organelle shell proteins (CcmK), including CsoS1A, CsoS1B and CsoS1C of Thiobacillus neapolitanus (Halothiobacillus neapolitanus) and their orthologues from other bacteria. Some autotrophic and non-autotrophic organisms form polyhedral organelles, carboxysomes/enterosomes. The best studied is the carboxysome of Halothiobacillus neapolitanus, which is composed of at least 9 proteins: six shell proteins, CsoS1A, CsoS1B, CsoS1C, Cso2A, Cso2B and CsoS3 (carbonic anhydrase), one protein of unknown function and the large and small subunits of RuBisCo (CbbL and Cbbs). Carboxysomes appear to be approximately 120 nm in diameter, most often observed as regular hexagons, with a solid interior bounded by a unilamellar protein shell. The interior is filled with type I RuBisCo, which is composed of 8 large subunits and 8 small subunits; it accounts for 60% of the carboxysomal protein, which amounts to approximately 300 molecules of enzyme per carboxysome. Carboxysomes are required for autotrophic growth at low CO 2 concentrations and are thought to function as part of a CO 2 -concentrating mechanism. Polyhedral organelles, enterosomes, from non-autotrophic organisms are involved in coenzyme B 12 -dependent 1,2-propanediol utilisation (e.g., in Salmonella enterica) and ethanolamine utilisation (e.g., in Salmonella typhimurium). Genes needed for enterosome formation are located in the 1,2-propanediol utilisation pdu or ethanolamine…
