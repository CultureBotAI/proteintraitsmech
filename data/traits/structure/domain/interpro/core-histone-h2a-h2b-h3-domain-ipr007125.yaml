identifier: InterPro:IPR007125
label: Core Histone H2A/H2B/H3 domain
definition: >-
  Five major families of histones exist: H1/H5, H2A, H2B, H3, and H4. Histones H2A, H2B, H3 and H4 are known as the core histones, while histones H1 and H5 are known as the linker histones. The core histones together with some other DNA binding proteins form a superfamily defined by a common fold and distant sequence similarities. Some proteins contain local homology domains related to the histone fold. This entry represents a domain found in histones H2A, H2B and H3. This domain can also be found in transcription factors, such as OsNF-YC2 from rice.
