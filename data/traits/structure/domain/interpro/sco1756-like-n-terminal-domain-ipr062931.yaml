identifier: InterPro:IPR062931
label: "SCO1756-like, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain of approximately 90 residues found in uncharacterised proteins in Streptomycetaceae. Conservation of cysteine and histidine residues suggests this domain may bind zinc. In Streptomyces coelicolor, the corresponding gene SCO1756 shows increased expression during differentiation.
