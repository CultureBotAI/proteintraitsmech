identifier: InterPro:IPR062367
label: "Mu-thomitoxin domain"
definition: >-
  This entry represents a domain that covers the whole length of the protein in mu-thomitoxin, a neurotoxin found in the venom of the crab spider Heriaeus melloteei. These toxins block specific voltage-gated sodium channels including Nav1.2, Nav1.4, and Nav1.6, reducing peak sodium current amplitude and negatively shifting steady-state inactivation. The toxins contain three disulfide bonds and exhibit a knottin fold characterised by a disulfide through disulfide knot structure. Members belong to the neurotoxin 01 family and are secreted as venom components with C-terminal amidation.
