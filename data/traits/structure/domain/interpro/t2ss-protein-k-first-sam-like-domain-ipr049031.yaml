identifier: InterPro:IPR049031
label: "T2SS protein K, first SAM-like domain"
definition: >-
  This entry represents a SAM-like domain found in proteins involved in the Type II protein secretion system (T2SS), including Type II secretion system protein K from Escherichia coli. The T2SK family includes proteins such as ExeK, PulK, OutX and XcpX. They consist of three domains, two of which are arranged in tandem and share structural similarity to SAM-like domains. This entry represents the first SAM-like domain that is involved in interaction with the minor pseudopilin XcpW or its homologues ( ).
