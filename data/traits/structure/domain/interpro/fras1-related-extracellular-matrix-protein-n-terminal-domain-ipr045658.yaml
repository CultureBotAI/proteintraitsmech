identifier: InterPro:IPR045658
label: "FRAS1-related extracellular matrix protein, N-terminal domain"
definition: >-
  This entry represents a domain found at the N terminus of FRAS1-related extracellular matrix proteins (also known as Frem related proteins) predominantly in chordates. In humans, the FRAS1-related extracellular matrix protein 1 was reported to be essential for the normal adhesion of the embryonic epidermis. FRAS1-related extracellular matrix protein 2 is involved in the development of eyelids and the anterior segment of the eyeballs and has been related to cryptophthalmos (a rare congenital disorder characterised by ocular dysplasia with eyelid malformation).
