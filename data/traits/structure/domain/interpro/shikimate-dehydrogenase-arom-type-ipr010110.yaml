identifier: InterPro:IPR010110
label: "Shikimate dehydrogenase, AroM-type"
definition: >-
  This entry represents a clade of shikimate-5-dehydrogenases found in Corynebacterium, Mycobacteria and fungi. The fungal sequences are pentafunctional proteins known as AroM which contain the central five seven steps in the chorismate biosynthesis pathway. The Corynebacterium and Mycobacterial sequences represent the sole shikimate-5-dehydrogenases in species which otherwise have every enzyme of the chorismate biosynthesis pathway.
