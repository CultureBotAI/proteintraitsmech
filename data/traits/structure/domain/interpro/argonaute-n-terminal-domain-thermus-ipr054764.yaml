identifier: InterPro:IPR054764
label: "Argonaute, N-terminal domain, thermus"
definition: >-
  This domain is found at the N-terminal of protein argonaute from Thermus thermophilus (Ago), a site-specific DNA-guided endoRNase organised into four domain: N (this entry), PAZ ( ), Mid ( ) and PIWI ( ). This domain shows a mixed α-β structure. This group of proteins is specific to Thermus species.
