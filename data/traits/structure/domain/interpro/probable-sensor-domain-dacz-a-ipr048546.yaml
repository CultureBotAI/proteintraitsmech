label: "Probable sensor domain DacZ_A"
definition: >-
  This is a probable sensor domain found at the N-terminal of archaeal diadenylate cyclases, which are typically followed by the DAC ( ) domain. It may consist of four α-helices and four β-strands according to structure predictions. DacZ_A is distantly related to PK_C ( ), DacZ_N ( ) and DACZ_P ( ).
