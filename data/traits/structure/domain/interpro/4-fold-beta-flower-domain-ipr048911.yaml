identifier: InterPro:IPR048911
label: "4-fold beta flower domain"
definition: >-
  This domain is found in a family of proteins from bacteria which have a repetitive structure composed of pairs of β-strands. Proteins in this entry usually have four copies of the β-hairpin repeat.
