identifier: InterPro:IPR013696
label: "TiaS, FLD domain"
definition: >-
  This is the FLD domain found in tRNA(Ile2) 2-agmatinylcytidine synthetase TiaS. TiaS is an ATP-dependent agmatine transferase that catalyses the formation of 2-agmatinylcytidine (agm2C) at the wobble position (C34) of tRNA(Ile2). This modified base specifically recognises AUA codons. TiaS consists of four domains, the TCKD domain at the N-terminal followed by the FLD domain, an OB fold domain and a zinc ribbon domain (ZRD) domain at the C-terminal. The FLD domain is responsible for agmantine binding.
