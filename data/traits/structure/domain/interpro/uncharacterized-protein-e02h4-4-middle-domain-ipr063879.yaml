identifier: InterPro:IPR063879
label: "Uncharacterized protein E02H4.4, middle domain"
definition: >-
  This entry represents a middle domain found in secreted proteins from nematodes and other organisms. The domain is present in proteins that are glycosylated and secreted to the extracellular region. The protein containing this domain is expressed in embryos and other tissues. The specific function of this domain remains to be determined.
