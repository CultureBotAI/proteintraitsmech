identifier: InterPro:IPR060212
label: "MJ0401-like domain"
definition: >-
  This entry represents a domain covering the conserved region of MJ0401 and related uncharacterised proteins found in archaea and bacteria. The domain is found in diverse lineages, including Methanocaldococcaceae in archaea and various bacterial groups such as Desulfosarcinaceae, Pirellulaceae, and Chlorobiaceae. The proteins are approximately 66 amino acids in length and contain a rubredoxin-like fold. This domain can also be found at the C-terminal in some members.
