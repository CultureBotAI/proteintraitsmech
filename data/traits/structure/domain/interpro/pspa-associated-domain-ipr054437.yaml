identifier: InterPro:IPR054437
label: "PspA-associated domain"
definition: >-
  This entry represents a trihelical domain (α+β) with highly conserved R and D, which occurs as a two-gene cluster with PspA in prokariotic sequences. This domain covers the whole length of the protein in most sequences, but is occasionally found fused to an N-terminal PspA in actinobacteria and chloroflexi.
