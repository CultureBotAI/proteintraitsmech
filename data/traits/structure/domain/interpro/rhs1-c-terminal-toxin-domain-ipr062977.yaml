identifier: InterPro:IPR062977
label: "Rhs1, C-terminal toxin domain"
definition: >-
  This domain is found C-terminal in the T6SS-dependent Rhs effector (Rhs1) from Serratia marcescens and related proteins. This domain possesses NAD(P)+ glycohydrolase activity and is a cytoplasmic-acting anti-bacterial toxin. Rhs1CTD is neutralised by the immunity protein, RhsI1, encoded immediately downstream of rhs1 .
