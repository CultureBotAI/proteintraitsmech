identifier: InterPro:IPR001365
label: "Adenosine deaminase domain"
definition: >-
  This entry represents the main structural domain of adenosine deaminase proteins. Adenosine deaminases ( ) are monomeric zinc dependent enzymes involved in purine metabolism. They are required for the breakdown of adenosine from food and for the turnover of nucleic acids in tissues. Adenosine deaminases convert adenosine to the related nucleoside inosine by the substitution of the amino group for a hydroxyl group. These enzymes are distantly related to AMP deaminases as they share three regions of sequence similarities; these regions are centred on residues which are proposed to play an important role in the catalytic mechanism of these two enzymes. This entry also includes a group of adenine deaminases more related to the bacterial and eukaryotic adenosine deaminases than to Bacillus subtilis adenine deaminase and its bacterial homologues. Adenine deaminase catalyses the hydrolytic deamination of adenine to hypoxanthine.
