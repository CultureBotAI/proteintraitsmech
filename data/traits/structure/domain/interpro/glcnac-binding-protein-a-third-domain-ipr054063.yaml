identifier: InterPro:IPR054063
label: "GlcNAc-binding protein A, third domain"
definition: >-
  This entry represents the third domain D3 of GlcNAc-binding protein A from Vibrio cholerae (GbpA), which is thought to promote attachment to both epithelial cell surfaces and marine chitin. GbpA contains four domains. D3 binds to the surface of the bacteria. It shows distant structural similarity to bacterial surface proteins, adopting an immunoglobulin fold. Members of this group are found in proteobacteria.
