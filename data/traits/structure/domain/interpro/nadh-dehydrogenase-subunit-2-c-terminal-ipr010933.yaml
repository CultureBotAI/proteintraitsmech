identifier: InterPro:IPR010933
label: "NADH dehydrogenase subunit 2, C-terminal"
definition: >-
  This entry represents the C-terminal region specific to the animal NADH dehydrogenase subunit 2 protein, also known as NADH-ubiquinone oxidoreductase chain 2. This protein is a core subunit of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I) which catalyses electron transfer from NADH through the respiratory chain, using ubiquinone as an electron acceptor. This domain is found in conjunction with .
