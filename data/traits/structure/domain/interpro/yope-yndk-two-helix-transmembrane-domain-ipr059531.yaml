identifier: InterPro:IPR059531
label: "YopE-YndK, two-helix transmembrane domain"
definition: >-
  This entry represents a small α-helical transmembrane domain found in uncharacterised membrane proteins from Bacillales and associated prophages. The domain consists of two predicted transmembrane helices. YopE from Bacillus subtilis is an 83 amino acid SPbeta prophage-derived protein, whilst YndK is a 121 amino acid chromosomal protein from the same organism. Both proteins localise to the cell membrane. The domain architecture suggests these are integral membrane proteins with both transmembrane segments separated by a cytoplasmic or periplasmic loop. The function of this domain remains to be determined.
