identifier: InterPro:IPR026495
label: "PIP-CTERM protein sorting domain"
definition: >-
  Proteins closely related to MJ_1469.1 from Methanocaldococcus jannaschii DSM 2661 are designated archaeosortase D (ArtD). ArtD appears to be a dedicated protein-sorting enzyme with a single target, a PKD domain repeat protein encoded by adjacent gene. This model describes the C-terminal putative protein-sorting region structurally similar to PEP-CTERM and found only on these methanogen PKD domain proteins.
