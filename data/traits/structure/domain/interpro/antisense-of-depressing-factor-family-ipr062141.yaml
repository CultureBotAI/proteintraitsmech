identifier: InterPro:IPR062141
label: "Antisense of depressing factor family"
definition: >-
  This entry represents the antisense of depressing factor (ADF1) small transcriptional repressor proteins found in fungi, particularly in the Saccharomycetaceae family. ADF1 functions as a transcriptional repressor that negatively regulates transcription of the FYV5 gene by binding to its promoter on the sense strand. The protein is encoded by the antisense strand of the FYV5 gene and localises to the nucleus. This domain is found across various yeast species including Saccharomyces cerevisiae and Eremothecium gossypii.
