identifier: InterPro:IPR003607
label: "HD/PDEase domain"
definition: >-
  This entry represents the HD domain, which is found in a superfamily of enzymes with a predicted or known phosphohydrolase activity. It also represents a related phosphodiesterase (PDEase) domain that is found in eukaryotic 3',5'-cGMP phosphodiesterase ( ), which is located in photoreceptor outer segments and it is light activated, playing a pivotal role in signal transduction.
