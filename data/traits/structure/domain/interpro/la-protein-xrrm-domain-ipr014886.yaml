identifier: InterPro:IPR014886
label: La protein, xRRM domain
definition: >-
  This entry represents the atypical RRM, named xRRM, found in La and La-related proteins (LaRPs). They belong to an ancient superfamily of proteins that are conserved in nearly all eukaryotes, except Plasmodium. These proteins are broadly involved in critical processes of RNA use and metabolism in the nucleus and the cytoplasm. The LaRP superfamily is distinguished by a conserved bipartite RNA-binding unit called the La-module, composed by a Lupus antigen motif (LaM) followed by an RNA-Recognition motif (RRM). Beyond this, each LaRP family is characterised by distinct family specific domains and motifs that contribute to structure and function. Genuine La and La-related proteins group 7 (LARP7) bind to the non-coding RNAs transcribed by RNA polymerase III (RNAPIII), which end in UUU. The La-module of these proteins bind the UUU-3'OH, protecting the RNA from degradation, while other domains may be important for RNA folding or other functions. The La and LaRP7 protein families have a C-terminal domain that contains a novel class of atypical RRM, named xRRM (for atypical RRM with extended alpha3), which uses a unique mode of single- and double-strand RNA binding.
