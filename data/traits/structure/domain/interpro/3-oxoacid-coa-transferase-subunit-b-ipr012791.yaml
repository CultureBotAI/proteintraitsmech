identifier: InterPro:IPR012791
label: 3-oxoacid CoA-transferase, subunit B
definition: >-
  This entry represents the B subunit of family I CoA-transferases, which contains the conserved active-site glutamate residue. This domain forms a three-layer α-β-α sandwich where the central layer is a mixed β-sheet, against which helices pack from both sides. The active site is thought to be located at the interface of the A and B subunits and formed by loops from both subunits. CoA-transferases catalyse the reversible transfer of of coenzyme A from CoA-thioesters to free acids, and can be divided into three families. Family I includes transferases for 3-oxoacids ( , ), short-chain fatty acids ( , ) and glutaconate ( ). Most of the family I enzymes use acetyl-CoA or succinyl-CoA as CoA donors, and are composed of two separate polypeptides, subunits A and B, which generally aggregate as heterodimers or heterotetramers. The eukaryotic enzymes, however, are generally composed of a single two-domain polypetide representing a fusion of the A and B subunits. The transfer of CoA from one substrate to another occurs via a ping pong mechanism which involves the formation of thioester bond between CoA and a conserved glutamate residue at the active site of the enzyme.
