identifier: InterPro:IPR054606
label: "NADH:ubiquinone reductase, helical insertion domain"
definition: >-
  This entry represent the helical insertion domain of NDH2, a NADH-ubiquinone oxidoreductase from Plasmodium falciparum, an interesting target for antimalarial drug development. This domain seems to be specific to sequences from Apicomplexa.
