identifier: InterPro:IPR045542
label: "Ternary complex associated domain 3"
definition: >-
  This entry represents a novel uncharacterised domain found associated with the vWA-MoxR-VMAP ternary systems. This domain is usually found at the N-terminal. It can be found associated with and in proteins named as uncharacterised . This domain is found in cyanobacteria.
