identifier: InterPro:IPR037929
label: "DCC-interacting protein 13-alpha, BAR domain"
definition: >-
  Adaptor protein, Phosphotyrosine interaction, PH domain and Leucine zipper containing (APPL) proteins are effectors of the small GTPase Rab5 that function in endosome-mediated signaling. They contain BAR, pleckstrin homology (PH) and phosphotyrosine binding (PTB) domains. They form homo- and hetero-oligomers that are mediated by their BAR domains. Vertebrates contain two APPL proteins, DCC-interacting protein 13-alpha and beta (DP13A and B, also known as APPL1 and APPL2, respectively). DP13A interacts with diverse receptors (e.g. NGF receptor TrkA, FSHR, adiponectin receptors) and signaling proteins (e.g. Akt, PI3K), and function as an adaptor linked to to regulate many processes such as cell proliferation, immune response, endosomal trafficking and cell metabolism.
