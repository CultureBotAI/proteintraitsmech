identifier: InterPro:IPR047961
label: "Transporter suffix domain-like"
definition: >-
  This entry represents a domain found in uncharacterised proteins, mainly from bacteria, that are predicted to be associated with membrane. This domain spans a highly hydrophobic region about 70 amino acids long that often occurs as a standalone domain of small membrane proteins, but rarely occurs as a C-terminal suffix domain for RND efflux transporter permease subunit proteins.
