identifier: InterPro:IPR024375
label: Non-structural protein NSP3, SUD-M domain, betacoronavirus
definition: >-
  This entry represents the macrodomain referred to as SUD-M (middle SUD subdomain) of the SARS-unique domain (SUD) which binds G-quadruplexes (unusual nucleic-acid structures formed by consecutive guanosine nucleotides). It can be found in non-structural protein 3 (NSP3) of Severe Acute Respiratory Syndrome Coronavirus (SARS-CoV) and related coronaviruses. NSP3 binds to viral RNA, nucleocapsid protein, as well as other viral proteins, and participates in polyprotein processing. It is a multifunctional protein comprising up to 16 different domains and regions. In SARS-CoV the SUD-M (527-651) domain has been shown to bind single-stranded poly(A). It has been shown through the contact area with this RNA on the protein surface, and the electrophoretic mobility shift assays, that SUD-M has higher affinity for purine bases than for pyrimidine bases. SUD consists of three globular domains separated by short linker peptide segments: SUD-N, SUD-M, and SUD-C. Among these, SUD-N and SUD-M are macrodomains. The SUD-N domain is a related macrodomain which also binds G-quadruplexes. While SUD-N is specific to the NSP3 of SARS and betacoronaviruses of the sarbecovirus subgenera (B lineage), SUD-M is present in most NSP3 proteins except the NSP3 from betacoronaviruses of the embecovirus subgenera (A lineage). SUD-M, despite its name, is not specific to SARS. SUD-C adopts a frataxin-like fold, has structural similarity to DNA-binding domains of DNA-modifying enzymes, binds single-stranded RNA, and regulates the RNA binding behavior of the SUD-M macrodomain. SARS-CoV Nsp3 contains a third macrodomain (the X-domain). The X-domain may function as a module binding poly(ADP-ribose); however, SUD-N and SUD-M do not bind ADP-ribose, as the triple glycine sequence involved in its binding is not…
