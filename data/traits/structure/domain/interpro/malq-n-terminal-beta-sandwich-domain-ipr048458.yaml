identifier: InterPro:IPR048458
label: "MalQ, N-terminal beta-sandwich domain"
definition: >-
  This entry represents the N-terminal domain of domain of 4-alpha-glucanotransferase from Mycobacterium tuberculosis (MalQ) and similar sequences mainly found in proteobacteria and actinomycetes. This domain, also called N2, resembles a β-sandwich consisting of a five-stranded mixed β-sheet and a short two-stranded antiparallel β-sheet. The N2 structure is reminiscent of carbohydrate-binding modules (CBMs). However, a comparison with structurally known CBMs did not reveal significant similarities. Amylomaltase MalQ is essential for the metabolism of maltose and maltodextrins in Escherichia coli. It catalyses transglycosylation/disproportionation reactions in which glycosyl or dextrinyl units are transferred among linear maltodextrins of various lengths.
