identifier: InterPro:IPR022119
label: "Pseudomurein endoisopeptidase, C-terminal domain"
definition: >-
  This entry represents the C-terminal in Pseudomurein endoisopeptidase from Methanobacterium phage psiM2 (PeiP) and similar proteins from tailed bacteriophages and prokariotic phophages that belong to the group of peptidases C71. These peptidases have the catalytic triad C-H-D at the C-terminal end, a triad similar to that in thiol proteases and animal transglutaminases. PeiP catalyses the in vitro lysis of M. marburgensis cells under reducing conditions and exhibits characteristics of metal-activated peptidases. This domain also covers the whole length of some proteins annotated as Secreted protein from prokaryotes.
