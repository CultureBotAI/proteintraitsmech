identifier: InterPro:IPR036029
label: "Class XX myosin, motor domain"
definition: >-
  These class XX myosins are primarily insect myosins with such members as Drosophila, Daphnia, and mosquitoes. Class XX myosin in Drosophila (DmMyo20) is encoded by dash, which functions as a downstream component of the Fat signaling pathway, influencing growth and gene expression during development. These myosins contain a motor domain followed by a single IQ motif. The motor (head) domain of DmMyo20 does not does not function as a molecular motor. Instead, it binds to actin filaments in an ATP-independent manner and enhances the interaction between actin filaments and protein Zyx102, a downstream component of the Fat pathway.
