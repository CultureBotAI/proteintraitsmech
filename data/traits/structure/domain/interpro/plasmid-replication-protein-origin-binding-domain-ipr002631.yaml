identifier: InterPro:IPR002631
label: Plasmid replication protein, origin binding domain
definition: >-
  This entry represents the N-terminal origin binding domain (OBD) of various bacterial plasmid replication (Rep) proteins. Rep is a rolling-circle replication (RCR) initiation protein and provides endonuclease activity. It is generally found as hexamer, in contrast to other RCR proteins that are purified as monomers or dimers. These proteins are essential for replication of plasmids, the Rep proteins are topoisomerases that nick the positive stand at the plus origin of replication and also at the single-strand conversion sequence. Crystal structure of RepB revealed that the DNA-binding capability as well as the nuclease and strand-transfer activities reside in its N-terminal origin binding domain (OBD), which belongs to the replication (Rep) class of the HUH endonuclease superfamily. The C-terminal oligomerisation domain of the protein form a rigid cylindrical scaffold to which the N-terminal DNA-binding/catalytic domains are attached as highly flexible appendages, featuring multiple orientations.
