identifier: InterPro:IPR000280
label: Pestivirus NS3, peptidase S31
definition: >-
  The genome of pestiviruses is a single plus-strand RNA and contains a single large open reading frame (ORF), a 5' untranslated region (5'UTR) and a 3' untranslated region (3'UTR). The ORF encodes a polyprotein, which is processed by viral and cellular proteases into mature proteins (the structural proteins in the N-terminal portion of the polyprotein whilst the replicative (non-structural or NS) proteins constitute the remainder). The pestivirus NS3 protein is a multifunctional protein possessing serine protease, RNA helicase, and a nucleoside triphosphatase (NTPase) activities located in two functionally distinct domains. The N-terminal one-third of pestiviral NS3 primarily serves as a protease to process the viral polyprotein. The helicase and NTPase activities are localized to the C- terminal of NS3 protein. The NS3 protease domain has approximately 180 aa with a catalytic triad of His-Asp-Ser. Positive regulation (activation) is observed by its interaction with NS4A. The pestivirus NS3 proteolytic domain constitutes MEROPS peptidase family S31 of clan PA. This entry represents the pestivirus NS3 protease domain. A cysteine peptidase is a proteolytic enzyme that hydrolyses a peptide bond using the thiol group of a cysteine residue as a nucleophile. Hydrolysis involves usually a catalytic triad consisting of the thiol group of the cysteine, the imidazolium ring of a histidine, and a third residue, usually asparagine or aspartic acid, to orientate and activate the imidazolium ring. In only one family of cysteine peptidases, is the role of the general base assigned to a residue other than a histidine: in peptidases from family C89 (acid ceramidase) an arginine is the general base. Cysteine peptidases can be grouped into fourteen different clans, with members of each cl…
