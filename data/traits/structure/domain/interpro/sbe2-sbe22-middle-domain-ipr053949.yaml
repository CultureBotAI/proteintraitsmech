identifier: InterPro:IPR053949
label: "SBE2/SBE22, middle domain"
definition: >-
  This entry represents a domain found central in SBE2, its paralogue, SBE22 from budding yeast, and similar proteins from ascomycetes. These proteins are involved in bud growth and yeast cell wall formation. They may be also involved in the transport of cell wall components from the Golgi apparatus to the cell surface periphery.
