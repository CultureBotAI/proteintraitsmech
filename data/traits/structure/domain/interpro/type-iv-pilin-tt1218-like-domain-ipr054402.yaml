identifier: InterPro:IPR054402
label: "Type IV pilin Tt1218-like domain"
definition: >-
  This entry represents a domain found in Tt1218 from Thermus thermophilus ( ) and similar sequences from proteobacteria. Tt1218 is a type IV pilin likely involved in the formation of polymers that extend from the surface of the bacterial cell and could mediate a wide variety of functions such as adhesion, motility and natural competence. This domain is closely related to type II secretion pseudopilin EpsI. It consists of the canonical type IV pilin structural core comprising an α-helix packed against a four-stranded antiparallel β-sheet.
