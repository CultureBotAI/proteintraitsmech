identifier: InterPro:IPR056530
label: "E3 ubiquitin-protein ligase UBR4-like domain"
definition: >-
  This domain is found in human E3 ubiquitin-protein ligase UBR4 and similar proteins found in eukaryotes. UBR4 is a component of the N-end rule pathway. It recognises and binds to proteins bearing specific N-terminal residues that are destabilising according to the N-end rule, leading to their degradation.
