identifier: InterPro:IPR047496
label: "RNA-binding protein FXR2, third type I K homology domain"
definition: >-
  FXR2 contains three K-homology (KH) RNA-binding domains, the third one is represented in this entry. FXR1 is one of the autosomal paralogues of fragile X messenger ribonucleoprotein 1 (FMRP/FMR1), part of a family of RNA-binding proteins. These proteins associate with polyribosomes, and play a central role in neuronal development and synaptic plasticity. They recognize methylated lysine and bind H4K20me1/2/3 through their Tudor-like Agenet domains and they are involved the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs, playing a crucial role in neuronal development and synaptic plasticity, involved in the development of fragile X syndrome (FXS). They are highly similar to one another and also retain highly conserved domain architecture comprising two tandem Tudor Agenet-like domains at the N-terminal, three ribonucleoprotein K homology (KH) domains and a cluster of arginine and glycine residues that constitute the RGG box. The KH domains and RGG box constitute a large region that is important for RNA binding and polyribosome association. FXR1 interacts with FXR2 and FMR1. FXR1 is highly expressed in muscle cells and is required for proper development of this tissue. It may regulate intracellular transport and local translation of certain mRNAs.
