identifier: InterPro:IPR022494
label: "Sulfopyruvate decarboxylase, beta subunit"
definition: >-
  Nearly every member of this entry is the beta subunit, or else the C-terminal region, of sulfopyruvate decarboxylase, in an archaeal species capable of coenzyme M biosynthesis. However, the enzyme also occurs in Roseovarius nubinhibens ISM in a degradative pathway, where the resulting sulfoacetaldehyde is desulfonated to acetyl phosphate, then converted to acetyl-CoA.
