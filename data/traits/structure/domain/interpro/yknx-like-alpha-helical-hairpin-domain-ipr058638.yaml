identifier: InterPro:IPR058638
label: "YknX-like, alpha-helical hairpin domain"
definition: >-
  This domain is found in the putative efflux system component YknX from Bacillus subtilis and related proteins from firmicutes. YknX is a component of an unusual four-component transporter YknWXYZ, which is required for protection against the killing factor SdpC (sporulation-delaying protein). YknX interacts with YknYZ.
