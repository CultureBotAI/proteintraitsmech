identifier: InterPro:IPR006792
label: "Vicilin, N-terminal"
definition: >-
  This region is found in plant seed storage proteins, N-terminal to the Cupin domain ( ). In Macadamia integrifolia (Macadamia nut) ( ), this region is processed into peptides of approximately 50 amino acids containing a C-X-X-X-C-(10-12)X-C-X-X-X-C motif. These peptides exhibit antimicrobial activity in vitro.
