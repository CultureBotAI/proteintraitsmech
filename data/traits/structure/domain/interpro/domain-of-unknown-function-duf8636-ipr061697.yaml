label: "Domain of unknown function DUF8636"
definition: >-
  This entry represents a family of small uncharacterised proteins approximately 40 residues in length found in Cyanobacteriota and Actinomycetota. Structural analysis indicates similarity to the double-stranded RNA-binding domain fold. The function of this family remains to be determined.
