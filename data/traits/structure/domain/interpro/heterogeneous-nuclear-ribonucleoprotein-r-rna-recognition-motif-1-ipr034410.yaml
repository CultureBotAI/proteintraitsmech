identifier: InterPro:IPR034410
label: "Heterogeneous nuclear ribonucleoprotein R, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of heterogeneous nuclear ribonucleoprotein R (hnRNP R). hnRNP R is an ubiquitously expressed RNA-binding protein. hnRNP R has been implicated in transcription regulation and AANAT mRNA translation. It is predominantly located in axons of motor neurons and to a much lower degree in sensory axons. In axons of motor neurons, it also functions as a cytosolic protein and interacts with wild type of survival motor neuron (SMN) proteins directly, further providing a molecular link between SMN and the spliceosome. Moreover, hnRNP R plays an important role in neural differentiation and development, and in retinal development and light-elicited cellular activities. hnRNP R contains an acidic auxiliary N-terminal region, followed by two well defined and one degenerated RNA recognition motifs (RRMs), and a C-terminal RGG motif; it binds RNA through its RRM domains.
