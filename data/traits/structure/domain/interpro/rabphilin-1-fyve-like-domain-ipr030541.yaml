identifier: InterPro:IPR030541
label: "Rabphilin-1, FYVE-like domain"
definition: >-
  Rabphilin (known as RBF-1 in Caenorhabditis elegans) is a putative effector of Rab3 and Rab27. In C. elegans, RAB-27/AEX-6 and its effector rabphilin/RBF-1 are required for dense core vesicles (DCV) exocytosis at different steps, whereas both RAB3 and RAB27 are required for synaptic transmission. This entry represents the FYVE-like zinc finger of rabphilin-1 from C.elegans and other invertebrates.
