identifier: InterPro:IPR018951
label: "Fumarase C, C-terminal"
definition: >-
  Fumarase C catalyses the stereo-specific interconversion of fumarate to L-malate as part of the Krebs cycle. The full-length protein forms a tetramer with visible globular shape. FumaraseC_C is the C-terminal 65 residues referred to as domain 3. The core of the molecule consists of a bundle of 20 α-helices from the five-helix bundle of domain 2. The projections from the core of the tetramer are generated from domains 1 and 3 of each subunit. This entry does not appear to be part of either the active site or the activation site but is helical in structure forming a little bundle.
