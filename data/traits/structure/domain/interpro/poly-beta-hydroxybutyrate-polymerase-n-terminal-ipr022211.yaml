label: "Poly-beta-hydroxybutyrate polymerase N-terminal"
definition: >-
  This domain family is found in bacteria and eukaryotes, and is approximately 50 amino acids in length. The family is found in association with , . There is a single completely conserved residue W that may be functionally important. PHBC is the third enzyme of the poly-beta-hydroxybutyrate biosynthetic pathway.
