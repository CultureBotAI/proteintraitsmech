identifier: InterPro:IPR054777
label: "BARF1, second Ig-like domain"
definition: >-
  This entry represents the second immunoglobulin-like domain present in the BARF1 protein from Epstein-Barr virus and similar proteins from Herpesvirales. BARF1 plays diverse functions in immunomodulation and oncogenicity, maybe by acting as a functional receptor for human CSF1. It may also inhibit interferon secretion from mononuclear cells.
