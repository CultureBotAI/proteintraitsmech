identifier: InterPro:IPR059572
label: "MSMEG_6518-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of MSMEG_6518, an uncharacterised protein of 129 amino acids found in Mycolicibacterium smegmatis. The protein contains an N-terminal domain followed by a C-terminal HTH domain. MSMEG_6518 binds 2-aminothiazole antibiotics, which are antitubercular agents. The protein is subject to pupylation at lysine 121, indicating involvement in the prokaryotic ubiquitin-like protein modification system. MSMEG_6518 is encoded by the gene MSMEG_6518 (also known as MSMEI_6344) on the M. smegmatis chromosome. The specific function of this domain remains to be determined.
