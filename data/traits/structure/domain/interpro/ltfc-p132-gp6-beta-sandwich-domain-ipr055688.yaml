identifier: InterPro:IPR055688
label: "LtfC/p132/Gp6, beta-sandwich domain"
definition: >-
  This entry, previously known as DUF7264, represents a domain found in the Minor tail protein Gp6, Collar protein p132, Lateral tail fiber protein C (LtfC) and related phage proteins. This domain folds into a β-sandwich fold with and extended β-hairpin that projects away from it. The minor tail proteins Gp6 are likely involved in the assembly or function of the tail structure in bacteriophages. The collar protein p132 forms the collar structure, which serves as an anchoring point for the side tail fiber protein pb1, suggesting a role in stabilising the tail fibres and ensuring proper attachment to the host cell. The lateral tail fiber protein C (LtfC) is a component of the DT57C bacteriophage tail tip complex where it forms a dodecameric ring. LtfC adopts a compact, single-domain structure. The LtfC ring is complemented by another lateral tail fibre protein, LtfA. Each of the LtfA monomers is connected to the LtfC assembly in a unique way by augmenting the edges of LtfC β-sheets with two short β-strands and thus completing the LtfC β-sandwich structure.
