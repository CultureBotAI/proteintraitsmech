identifier: InterPro:IPR057001
label: "RYYR-CCHC domain"
definition: >-
  This domain is found in uncharacterised proteins from nematodes. It is named after its conserved sequence motifs. It contains a semi-conserved RxY(x)nYR motif and two invariant CxxC and HxxxC motifs. This domain is predicted to adopt a globular structure with significant similarity to FLYWCH-type zinc finger, in particular . It is quite likely that this domain is a zinc-finger, given the strict conservation of the cysteine and histidine residues. However, this potential zinc-finger has a distinct pattern of the zinc coordinating residues compared to the FLYWCH-type zinc fingers.
