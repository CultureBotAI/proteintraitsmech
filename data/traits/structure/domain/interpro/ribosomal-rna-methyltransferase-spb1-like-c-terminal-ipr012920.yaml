identifier: InterPro:IPR012920
label: "Ribosomal RNA methyltransferase, SPB1-like, C-terminal"
definition: >-
  This domain is found at the C terminus SPB1-like proteins. This domain interacts with the meandering tail of Erb1 and its removal is required to form the pre-mature inter-subunit surface of the Arx1/Nog2 particle. SPB1 is an adoMet-dependent rRNA methyltransferase required for proper assembly of pre-ribosomal particles during the biogenesis of the 60S ribosomal subunit. In Saccharomyces cerevisiae, it specifically methylates the guanosine in position 2922 of the 25S rRNA at the stage of 27S pre-rRNA maturation. It interacts with the snoRNA-associated proteins Nop1 and Nop58.
