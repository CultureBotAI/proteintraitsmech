identifier: InterPro:IPR057767
label: "UGSC-like domain"
definition: >-
  This entry represents an uncharacterised domain in a group of bacterial proteins of unknown function. Some proteins represented by this entry are selenoproteins, which are characterised by a UGSC motif where U is a selenocysteine residue as described in . However, this residue is recoded from a stop codon, and most matches are split into two distinct gene predictions. This entry also includes non-selenoproteins with a CGSC motif and appear as full-length matches in the alignments.
