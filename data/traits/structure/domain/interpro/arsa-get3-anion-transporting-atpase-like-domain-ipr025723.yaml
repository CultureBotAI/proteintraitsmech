identifier: InterPro:IPR025723
label: "ArsA/GET3, Anion-transporting ATPase-like domain"
definition: >-
  This entry represents a conserved domain in ArsA/GET3 proteins. This entry also matches some sequences from the Mrp/NBP35 ATP-binding proteins family and related ATPases. Active extrusion is a common mechanism for the detoxification of heavy metals, drugs and antibiotics in bacteria, protozoa and mammals. This is particularly important for arsenic extrusion because of its prevalence in the environment and its potential to cause health and environmental problems. In prokaryotes, arsenic detoxification is accomplished by chromosomal and plasmid-borne operon-encoded efflux systems. ArsA from Escherichia coli is the catalytic subunit of the ArsAB extrusion pump, providing resistance to arsenite and antimonite. This pump consists of a soluble ATPase (ArsA) and a membrane channel (ArsB). Maintenance of a low intracellular concentration of oxidation produces resistance to the toxic agents. A third protein, ArsC, expands the substrate specificity to allow for arsenate resistance. ArsC reduces arsenate to arsenite, which is subsequently pumped out of the cell. ArsA contains two nucleotide-binding sites (NBSs) and a binding site for arsenic or antimony. Binding of metalloids to the pump stimulates the ATPase activity. Homologues of the bacterial ArsA ATPase are found in eukaryotes, where they have several recognised functions unrelated to arsenic resistance. Caenorhabditis elegans homologue Asna-1 is required for defence against arsenite and antimonite toxicity, and may be also involved in insulin signaling. The homologue in yeast, GET3/Arr4, is part of the GET complex and not only is involved in stress tolerance to metals and heat, but also specifically recognises transmenbrane domains of tail-anchored (TA) proteins destined for the secretory pathway. Archaeal GET3 homologues h…
