identifier: InterPro:IPR054306
label: "2-thiouridine synthetase TtuA-like, N-terminal LIM domain"
definition: >-
  TtuA is an oxygen-labile iron-sulfur protein that is involved in a post-transcriptional thiolation of RNA. The iron-sulfur cluster of TtuA is required for sulfurtransferase activity. The enzyme structure consists of three domains: a central catalytic domain and two Zn-fingers. This entry represents the N-terminal Zn-finger domain that share a significant similarity to LIM domains. This domain is also found in tRNA 2-thiolation protein NcsA required for formation of thiolated tRNA(Lys)UUU as well as in the cytoplasmic tRNA 2-thiolation protein 1 that plays a central role in 2-thiolation of mcm5S2U at tRNA wobble positions of tRNA(Lys), tRNA(Glu) and tRNA(Gln).
