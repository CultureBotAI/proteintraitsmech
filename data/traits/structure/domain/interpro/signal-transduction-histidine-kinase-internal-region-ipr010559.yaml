identifier: InterPro:IPR010559
label: Signal transduction histidine kinase, internal region
definition: >-
  This entry represents a region within bacterial histidine kinase enzymes. Two-component signal transduction systems such as those mediated by histidine kinase are integral parts of bacterial cellular regulatory processes, and are used to regulate the expression of genes involved in virulence. Members of this family often contain and/or . Signal transducing histidine kinases are the key elements in two-component signal transduction systems, which control complex processes such as the initiation of development in microorganisms. Examples of histidine kinases are EnvZ, which plays a central role in osmoregulation, and CheA, which plays a central role in the chemotaxis system. Histidine kinases usually have an N-terminal ligand-binding domain and a C-terminal kinase domain, but other domains may also be present. The kinase domain is responsible for the autophosphorylation of the histidine with ATP, the phosphotransfer from the kinase to an aspartate of the response regulator, and (with bifunctional enzymes) the phosphotransfer from aspartyl phosphate back to ADP or to water. The kinase core has a unique fold, distinct from that of the Ser/Thr/Tyr kinase superfamily. Two-component signal transduction systems enable bacteria to sense, respond, and adapt to a wide range of environments, stressors, and growth conditions. Some bacteria can contain up to as many as 200 two-component systems that need tight regulation to prevent unwanted cross-talk. These pathways have been adapted to response to a wide variety of stimuli, including nutrients, cellular redox state, changes in osmolarity, quorum signals, antibiotics, and more. Two-component systems are comprised of a sensor histidine kinase (HK) and its cognate response regulator (RR). The HK catalyses its own auto-phosphorylation…
