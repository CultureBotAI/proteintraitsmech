identifier: InterPro:IPR006387
label: "CPW-WPC domain"
definition: >-
  This entry represents a domain of about 61 residues in length with six well-conserved cysteine residues and six well-conserved aromatic sites mainly from Apicomplexa. The domain can be found in tandem repeats. It is named for motifs of CPxxW and (less well conserved) WPC. Its function is unknown.
