identifier: InterPro:IPR063463
label: "Meiotic topoisomerase VIB-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the meiotic topoisomerase VIB-like (MTOPVIB) found in plants. MTOPVIB is a component of a topoisomerase VI-like complex specifically required for meiotic recombination. The full-length MTOPVIB protein forms a heterotetramer with SPO11 proteins and mediates DNA cleavage that creates the double-strand breaks initiating meiotic recombination. Despite weak sequence similarity to archaeal Top6B, the full-length MTOPVIB protein retains structural features including the transducer domain that interacts with SPO11 and the ATP-binding GHKL fold. The specific function of this C-terminal domain remains to be determined.
