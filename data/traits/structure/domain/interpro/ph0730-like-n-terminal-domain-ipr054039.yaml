identifier: InterPro:IPR054039
label: "PH0730-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of PH0730 from Pyrococcus horikoshii and similar archaeal proteins that contain the domain at the C-terminal. This domain adopts a winged helix fold.
