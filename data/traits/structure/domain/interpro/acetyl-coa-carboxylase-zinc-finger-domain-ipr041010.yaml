identifier: InterPro:IPR041010
label: "Acetyl-coA carboxylase zinc finger domain"
definition: >-
  Acetyl-coA carboxylase (ACC) is a central metabolic enzyme that catalyzes the committed step in fatty acid biosynthesis: biotin-dependent conversion of acetyl-coA to malonyl-coA. In bacteria this protein contains a small zinc finger domain.
