identifier: InterPro:IPR035637
label: "JIP2, SH3 domain"
definition: >-
  JNK-interacting protein 2 (JIP2, also known as MAPK8IP2, IB2 or C-Jun-amino-terminal kinase-interacting protein 2) is widely expressed in the brain, where it forms complexes with fibroblast growth factor homologous factors (FHFs) which facilitates activation of the p38delta MAPK. JIP2 is enriched in postsynaptic densities and may play a role in motor and cognitive function. In addition to a JNK binding domain, JIP2 also contains SH3 and phosphotyrosine-binding (PTB) domains. The SH3 domain of the related protein JIP1 homodimerizes at the interface usually involved in proline-rich ligand recognition, despite the lack of this motif in the domain itself.
