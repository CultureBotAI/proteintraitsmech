identifier: InterPro:IPR035483
label: "GRAF, BAR domain"
definition: >-
  This entry represents the BAR domain of GRAF. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. The BAR domain of GRAF directly interacts with its Rho GAP domain and inhibits its activity. Autoinhibited GRAF is capable of binding membranes and tubulating liposomes, showing that the membrane-tubulation and GAP-inhibitory functions of the BAR domain can occur simultaneously. Rho GTPase-activating protein 26 (ARHGAP26), also known as GTPase regulator associated with focal adhesion kinase (GRAF), is a GTPase-activating protein for the small GTPases of the Rho family RhoA and CDC42. GRAF influences cytoskeletal changes mediated by Rho proteins. It is recognised as a tumor suppressor. GRAF contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, a Rho GAP domain, and a C-terminal SH3 domain. The SH3 domain of GRAF binds PKNbeta, a target of the small GTPase Rho.
