identifier: InterPro:IPR012951
label: Berberine/berberine-like
definition: >-
  This domain is found in the berberine bridge and berberine bridge-like enzymes, flavoproteins which have an unusual bicovalent attachment of the FAD cofactor that are involved in the biosynthesis of numerous isoquinoline alkaloids. They catalyse the transformation of the N-methyl group of (S)-reticuline into the C-8 berberine bridge carbon of (S)-scoulerine. This domain is found in many flavoproteins mainly from bacteria, fungi and plants.
