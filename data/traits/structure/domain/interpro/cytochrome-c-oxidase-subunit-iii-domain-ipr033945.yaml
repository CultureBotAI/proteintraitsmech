identifier: InterPro:IPR033945
label: "Cytochrome c oxidase subunit III domain"
definition: >-
  Cytochrome c oxidase ( ) is the terminal enzyme of the respiratory chain of mitochondria and many aerobic bacteria. It catalyses the transfer of electrons from reduced cytochrome c to molecular oxygen: 4 cytochrome c +2 + 4 H + + O 2 --> 4 cytochrome c +3 + 2 H 2 O This reaction is coupled to the pumping of four additional protons across the mitochondrial or bacterial membrane. Cytochrome c oxidase is an oligomeric enzymatic complex that is located in the mitochondrial inner membrane of eukaryotes and in the plasma membrane of aerobic prokaryotes. The core structure of prokaryotic and eukaryotic cytochrome c oxidase contains three common subunits, I, II and III. In prokaryotes, subunits I and III can be fused and a fourth subunit is sometimes found, whereas in eukaryotes there are a variable number of additional small polypeptidic subunits. The functional role of subunit III is not yet understood. As the bacterial respiratory systems are branched, they have a number of distinct terminal oxidases, rather than the single cytochrome c oxidase present in the eukaryotic mitochondrial systems. Even though the cytochrome o complex oxidises quinol (ubiquinol) and does not catalyse the oxidation of reduced cytochrome c, they belong to the same haem-copper oxidase superfamily as cytochrome c oxidases. Members of this family share sequence similarities in all three core subunits: subunit I is the most conserved subunit, whereas subunit II is the least conserved. This entry represents a structural domain found in subunit III of cytochrome c oxidase specifically.
