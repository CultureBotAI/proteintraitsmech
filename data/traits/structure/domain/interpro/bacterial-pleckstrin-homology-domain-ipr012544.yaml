label: "Bacterial Pleckstrin homology domain"
definition: >-
  This domain can be found in many bacterial hypothetical proteins. The structures of , , and , , show similarities to the PH or pleckstrin homology domain. The first evidence of PH-like domains in bacteria suggests a role in cell envelope stress response.
