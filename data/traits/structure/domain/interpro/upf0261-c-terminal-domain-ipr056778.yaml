label: "UPF0261, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of ToMV resistance protein Tm-1 and the uncharacterised UPF0261 proteins. The tomato resistance protein Tm-1, which inhibits replication complex formation through its binding to tomato mosaic virus (ToMV) replication proteins.
