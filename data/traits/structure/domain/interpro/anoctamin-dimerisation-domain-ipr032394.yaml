identifier: InterPro:IPR032394
label: "Anoctamin, dimerisation domain"
definition: >-
  This appears to be the cytoplasmic domain of the calcium-activated chloride-channel anoctamin. It is responsible for creating the homodimeric architecture of the chloride-channel proteins.
