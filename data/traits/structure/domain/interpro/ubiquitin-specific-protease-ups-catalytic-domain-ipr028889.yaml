identifier: InterPro:IPR028889
label: "Ubiquitin specific protease UPS, catalytic domain"
definition: >-
  This entry represents the entire USP domain. The USP catalytic core can be divided into six conserved boxes that are present in all USP domains. Box 1 contains the catalytic Cys residue, box 5 contains the catalytic His , and box 6 contains the catalytic Asp/Asn residue. All boxes show several additional conserved features and residues. Boxes 3 and 4 contain a Cys-X-X-Cys motif each, which have been shown to constitute a functional zinc-binding motif. Potentially, zinc-binding facilitates folding of the USP core, helping the interaction of sequence motifs some few hundred residues apart. USP domains share a common conserved fold. The USP domain resembles an open hand containing Thumb, Palm and Fingers subdomains. The catalytic triad resides between the Thumb (Cys) and Palm subdomains (His/Asp). Protein ubiquitination is a reversible posttranslational modification, which affects a large number of cellular processes including protein degradation, trafficking, cell signaling and the DNA damage response. Ubiquitination is reversible, and dedicated deubiquitinases exist which hydrolyze isopeptide bonds. Ubiquitin specific proteases (USPs) ( ) are the largest family of deubiquitinating enzymes. USP domains consist of a common conserved catalytic core which is interspersed at five points with insertions, some of which as large as the catalytic domain itself. The insertions can fold into independent domains that can be involved in the regulation of deubiquitinase activity. As commonly found in signaling proteins, many USP deubiquitinases have a modular architecture, and not only contain a catalytic domain but also additional protein-protein interaction and localisation domains. Most USP domains cleave the isopeptide linkage between two ubiquitin molecules, and hence contain (a…
