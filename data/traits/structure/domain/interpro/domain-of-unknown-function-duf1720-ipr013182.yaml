label: "Domain of unknown function DUF1720"
definition: >-
  This domain is found in different combinations with cortical patch components EF hand, SH3 and ENTH and is therefore likely to be involved in cytoskeletal processes. It is found in proteins of the actin cytoskeleton-regulatory complex.
