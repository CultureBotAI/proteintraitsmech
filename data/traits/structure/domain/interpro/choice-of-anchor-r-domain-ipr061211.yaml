identifier: InterPro:IPR061211
label: "Choice-of-anchor R domain"
definition: >-
  This GC-type dockerin domain occurs, so far, primarily in metagenome-assembled genomes from the taxonomic class Phycisphaerae, within the Planctomycetota, where it seems to anchor a number of otherwise unrelated proteins. The most frequent C-terminal anchoring domain for members of this group is PEP-CTERM (see ) or a PEP-CTERM-related variant sorting signal domain processed by one of the specialty exosortases. Some member proteins are found instead with dockerin-like C-terminal repeats and a GC motif at the extreme C terminus.
