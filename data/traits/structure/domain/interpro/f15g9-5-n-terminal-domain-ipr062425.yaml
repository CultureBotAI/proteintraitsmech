identifier: InterPro:IPR062425
label: "F15G9.5, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of F15G9.5 and related proteins found in nematodes. F15G9.5 is a multi-pass membrane protein with two transmembrane helices, expressed in larval stages and other tissues in worms. The function of this N-terminal domain remains to be determined.
