identifier: InterPro:IPR011874
label: Fibro-slime
definition: >-
  This entry represents a conserved region of about 90 amino acids, shared in at least 4 distinct large putative proteins from the slime mold Dictyostelium discoideum (Slime mold) and 10 proteins from the rumen bacterium Fibrobacter succinogenes (Bacteroides succinogenes), and in no other species so far.
