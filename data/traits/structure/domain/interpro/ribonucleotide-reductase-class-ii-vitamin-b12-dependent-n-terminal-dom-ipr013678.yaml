identifier: InterPro:IPR013678
label: "Ribonucleotide reductase class II vitamin B12-dependent, N-terminal domain"
definition: >-
  This domain is found to the N terminus of the ribonucleotide reductase barrel domain ( ). It occurs in bacterial class II ribonucleotide reductase proteins which depend upon coenzyme B12 (deoxyadenosylcobalamine).
