identifier: InterPro:IPR032067
label: "FOXO protein, transactivation domain"
definition: >-
  TAD is a promiscuous binding domain that mediates the association of the transcription factor FOXO with the coactivator CBP/p300. Both this domain and the KIX-binding domain bind simultaneously the KIX domain of CBP/p300. Coactivator CBP/p300 is recruited by FOXO3 though binding to these two regions. The promiscuity of the TAD is further evidenced by that the finding that they also bind the TAZ1 and TAZ2 domains of CBP/p300.
