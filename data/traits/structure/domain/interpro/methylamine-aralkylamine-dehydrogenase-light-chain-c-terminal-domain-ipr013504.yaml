identifier: InterPro:IPR013504
label: "Methylamine/Aralkylamine dehydrogenase light chain, C-terminal domain"
definition: >-
  Aralkylamine dehydrogenase light chain and methylamine dehydrogenase light chain are aromatic amine dehydrogenases that form heterotetramers with their respective heavy chains, and catalyse the oxidative deamination of amines to their corresponding aldehydes. This entry represents a conserved domain found towards the C terminus of these proteins.
