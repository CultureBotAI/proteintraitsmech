identifier: InterPro:IPR009419
label: Viral polyprotein, parechovirus P3A
definition: >-
  The viral polyprotein of parechoviruses contains: coat protein VP0 (P1AB); coat protein VP3 (P1C); coat protein VP1 (P1D); picornain 2A ( , core protein P2A); core protein P2B; core protein P2C; core protein P3A; genome-linked protein VPg (P3B); picornain 3C ( , MEROPS peptidase subfamily 3CF: parechovirus picornain 3C (P3C)). This entry consists of the parechovirus P3A protein. P3A has been identified as a genome-linked protein (VPg), which is involved in replication.
