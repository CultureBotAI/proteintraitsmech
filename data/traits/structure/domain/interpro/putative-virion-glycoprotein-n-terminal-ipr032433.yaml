identifier: InterPro:IPR032433
label: "Putative virion glycoprotein, N-terminal"
definition: >-
  This entry represents putative virion glycoprotein N-terminal domain-containing proteins from chroparaviruses. They carry two putative disulphide bridges. No similarity can be found with any other glycoproteins outside this region.
