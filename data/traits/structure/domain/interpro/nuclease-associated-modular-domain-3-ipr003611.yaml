identifier: InterPro:IPR003611
label: Nuclease associated modular domain 3
definition: >-
  NUMOD3 (nuclease associated modular domain 3) is a DNA-binding motif found in homing endonucleases and related proteins. It occurs on its own or in tandem repeats in GIY-YIG and HTH proteins. It constitutes a β-turn-loop-helix subregion of the the DNA-binding domain of I-TevI homing endonuclease ( ).
