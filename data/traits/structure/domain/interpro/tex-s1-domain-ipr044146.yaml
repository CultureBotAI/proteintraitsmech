identifier: InterPro:IPR044146
label: "Tex, S1 domain"
definition: >-
  Tex is a putative transcription accessory factor essential in Bordetella pertussis and is named for its role in toxin expression. Tex has two functional domains, an N-terminal domain homologous to the Escherichia coli maltose repression protein, which is a poorly defined transcriptional factor, and a C-terminal S1 RNA-binding domain. Tex is found in prokaryotes, eukaryotes, and archaea. This entry represents the S1 domain found in Tex and related proteins.
