identifier: InterPro:IPR060179
label: "Interferon-induced very large GTPase 1, C-terminal"
definition: >-
  This domain is found at the C-terminal of mouse Interferon-induced very large GTPase 1 (GVIN1 or VLIG-1) and similar proteins mainly found in vertebrates. Members of this group play a role in conserved immune functions. This domain is predicted to adopt a mainly α configuration.
