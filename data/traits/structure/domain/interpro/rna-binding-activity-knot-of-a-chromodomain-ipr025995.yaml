identifier: InterPro:IPR025995
label: "RNA binding activity-knot of a chromodomain"
definition: >-
  This is a novel knotted tudor domain which is required for binding to RNA. The knot influences the loop conformation of the helical turn Ht2 (residues 61-63) that is located at the side opposite the knot in the tudor domain-chromo domain; stabilisation of Ht2 is essential for RNA binding.
