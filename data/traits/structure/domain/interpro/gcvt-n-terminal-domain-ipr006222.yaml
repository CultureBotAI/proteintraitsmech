identifier: InterPro:IPR006222
label: "GCVT, N-terminal domain"
definition: >-
  This entry represents the N-terminal in glycine cleavage T-proteins, which are part of the glycine cleavage multienzyme complex (GCVT) found in bacteria and the mitochondria of eukaryotes. This domain is also found in YgfZ proteins. This domain represents a possible folate-binding domain. Trimethylamine-oxide aldolase is also represented by this entry; it catalyses the conversion of trimethylamine N-oxide (TMAO) to dimethylamine (DMA) and formaldehyde. The glycine cleavage multienzyme complex (GCV) catalyses the catabolism of glycine in eukaryotes. GCVT (aminomethyltransferase, ) is a folate-dependent enzyme that catalyses the release of ammonia and the transfer of the methylene carbon unit (C1 unit) to tetrahydrofolate (H4folate) from the aminomethyl intermediate attached to the lipoate cofactor of H-protein. GCV is found in bacteria and the mitochondria of eukaryotes. Mutations in the human GCVT gene are known to cause nonketotic hyperglycinemia.
