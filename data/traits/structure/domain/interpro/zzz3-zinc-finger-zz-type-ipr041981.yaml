identifier: InterPro:IPR041981
label: "ZZZ3, zinc finger, ZZ-type"
definition: >-
  This entry represents the ZZ-type Zinc finger present in ZZZ3 (ZZ finger containing 3) and related proteins. The ZZ motif coordinates two zinc ions and most likely participates in ligand binding or molecular scaffolding.
