identifier: InterPro:IPR057426
label: "E3 ubiquitin-protein ligase RNF31, third UBA domain"
definition: >-
  This domain is found in human E3 ubiquitin-protein ligase RNF31 and similar animal proteins. RNF31 is a component of the LUBAC complex which conjugates linear polyubiquitin chains to substrates and plays a key role in NF-kappa-B activation and regulation of inflammation. This domain is often found C-terminal of .
