identifier: InterPro:IPR013662
label: "RyR/IP3R Homology associated domain"
definition: >-
  This eukaryotic domain is found in ryanodine receptors (RyR) and inositol 1, 4, 5-trisphosphate receptors (IP3R) which together form a superfamily of homotetrameric ligand-gated intracellular Ca2+ channels. There seems to be no known function for this domain.
