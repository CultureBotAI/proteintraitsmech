identifier: InterPro:IPR057429
label: "eIF2D, winged helix domain"
definition: >-
  This entry represents a winged helix domain found in eukaryotic translation reinitiation factor 2D (elF2D). The domain interacts with ribosomal RNA helix h44 and is located between the MCT-1-like and DENR-like halves of eIF2D. The domain plays a role in translation reinitiation by helping position the initiator tRNA on the small ribosomal subunit.
