identifier: InterPro:IPR057641
label: "W02B3.4-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of the uncharacterised protein W02B3.4 from Caenorhabditis elegans and similar animal proteins. This domain is predicted to adopt an α-β fold.
