identifier: InterPro:IPR037602
label: "USH1G, SAM domain"
definition: >-
  pre-mRNA splicing regulator USH1G (also known as SANS) is a multifunctional scaffold protein. It regulates Magi2-mediated endocytosis and interacts with MYO7A and USH1C. Mice lacking USH1G exhibit a loss of tip-links, defects in stereocilia morphology and organization, loss of mechanotransduction currents, and perturbations to hearing and balance. Mutations in human USH1G gene cause Usher syndrome 1G (USH1G), a genetically heterogeneous condition characterised by the association of retinitis pigmentosa with sensorineural deafness.
