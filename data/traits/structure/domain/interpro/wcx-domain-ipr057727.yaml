identifier: InterPro:IPR057727
label: "WCX domain"
definition: >-
  This domain is found in the PafB and PafC heteromeric regulators that act as transcriptional activators and belong to the large bacterial family of WYL domain- containing proteins. In these proteins, WCX domain (WYL C-terminal extension) is found next to the WYL domain. WCX domain is involved in heterodimer formation. It folds into an α/β structure composed of four-stranded β-sheet with α-helices packed on it with topology similar to ferredoxin-like domains.
