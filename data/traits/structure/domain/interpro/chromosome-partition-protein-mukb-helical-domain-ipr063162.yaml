identifier: InterPro:IPR063162
label: "Chromosome partition protein MukB, helical domain"
definition: >-
  This entry represents a helical domain of approximately 115 residues found towards the C-terminal of chromosome partition protein MukB. MukB is a bacterial condensin that plays a central role in chromosome condensation and segregation. The protein forms a homodimer and interacts with MukE and MukF via its C-terminal region. The crystal structure of the MukBEF complex has been determined ( ).
