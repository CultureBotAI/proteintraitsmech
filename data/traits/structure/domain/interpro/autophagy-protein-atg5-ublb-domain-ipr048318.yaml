identifier: InterPro:IPR048318
label: "Autophagy protein ATG5, UblB domain"
definition: >-
  ATG5 is directly required for the import of aminopeptidase I via the cytoplasm-to-vacuole targeting pathway. ATG5 is conjugated to ATG12; this conjugate exhibits E3 ligase-like activity which facilitates the lipidation of members of the LC3 family, and therefore autophagosome formation. ATG5 comprises N- and C-terminal ubiquitin-like domains (UblA and UblB) that flank the helical-rich region (HBR). This entry represents the UblB domain, found at the C-terminal. Macroautophagy is a bulk degradation process induced by starvation in eukaryotic cells. In yeast, 15 Atg proteins coordinate the formation of autophagosomes. The pre-autophagosomal structure contains at least five Atg proteins: Atg1p, Atg2p, Atg5p, Aut7p/Atg8p and Atg16p, found in the vacuole. The C-terminal glycine of Atg12p is conjugated to a lysine residue of Atg5p via an isopeptide bond. During autophagy, cytoplasmic components are enclosed in autophagosomes and delivered to lysosomes/vacuoles. Autophagy protein 16 (Atg16) has been shown to bind to Atg5 and is required for the function of the Atg12p-Atg5p conjugate. Autophagy protein 5 (Atg5) is directly required for the import of aminopeptidase I via the cytoplasm-to-vacuole targeting pathway.
