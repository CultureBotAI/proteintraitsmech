identifier: InterPro:IPR062404
label: "Adaptation to cold protein C, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of AtcC, a protein essential for cold adaptation in Shewanella oneidensis and related gammaproteobacteria. AtcC functions as part of a protein network with AtcJ, a J-domain co-chaperone of the DnaK (Hsp70) chaperone system, and AtcB. AtcC interacts directly with the C-terminal extension of AtcJ and with AtcB. Deletion of atcC results in dramatically reduced growth at low temperature (7 degrees C). The specific function of this domain remains to be determined.
