identifier: InterPro:IPR028230
label: "Trimeric autotransporter adhesin, tryptophan-ring motif"
definition: >-
  Pathogenic bacteria adhere to the host cell surface using a family of outer membrane (OM) proteins called Trimeric Autotransporter Adhesins (TAAs). TAAs cosist of an N-terminal 'passenger' domain followed by a C-terminal translocation unit/membrane anchor. The 'passenger' domain has a modular structure consisting of a secretion sequence, a head region that facilitates binding to the host cell surface, and a stalk region. The TAA-head_Trp-ring is the tryptophan-ring motif of some Gram-negative Enterobacteriaceae TAAs. The Trp-ring folds into a β-meander type on the top of the head domain of its TAA. In conjunction with the GIN domain it is thought to be the region of the head that adheres to fibronectin.
