identifier: InterPro:IPR016183
label: "Leukocidin/Hemolysin toxin"
definition: >-
  This entry represents a structural domain consisting of a β-sandwich fold with an immunoglobulin-like Greek-key topology, and a β-ribbon arm that forms an oligomeric transmembrane barrel. Haemolysins attack blood cell membranes and cause cell rupture by forming water-filled homoheptameric transmembrane pores. Leukocidin consists of two polypeptides, F and S, and form pores in polymorphonuclear leukocytes.
