identifier: InterPro:IPR042698
label: "Interleukin-1 receptor-associated kinase 3, pseudokinase domain"
definition: >-
  This pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. IRAKs (IL-1R-associated kinases) are involved in Toll-like receptor (TLR) and interleukin-1 (IL-1) signalling pathways, and are thus critical in regulating innate immune responses and inflammation. IRAKs contain an N-terminal Death domain (DD), a proST region (rich in serines, prolines, and threonines), a central kinase domain (a pseudokinase in the case of IRAK3), and a C-terminal domain; IRAK-4 lacks the C-terminal domain. Vertebrates contain four IRAKs (IRAK-1, -2, -3 (or -M), and -4) that display distinct functions and patterns of expression and subcellular distribution, and can differentially mediate TLR signalling. IRAK3 (or IRAK-M) is the only IRAK that does not show kinase activity. It is found only in monocytes and macrophages in humans, and functions as a negative regulator of TLR signalling including TLR-2 induced p38 activation. It also negatively regulates the alternative NFkB pathway in a TLR-2 specific manner. IRAK3 is downregulated in the monocytes of obese people, and is associated with high SOD2, a marker of mitochondrial oxidative stress. It is an important inhibitor of inflammation in association with obesity and metabolic syndrome. The IRAK3 subfamily is part of a larger superfamily that includes the catalytic domains of other protein serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase.
