identifier: InterPro:IPR041532
label: "RlmI-like, PUA domain"
definition: >-
  This entry represents the RNA-binding PUA domain which co-occurs N-terminal to SAM-dependent methyltransferase domains, found in Escherichia coli RlmI (rRNA large subunit methyltransferase gene I, also called YccW) and Thermus thermophilus methyltransferase RlmO ( ), which are 5-methylcytosine methyltransferases (m5C MTases) that play a role in modifying 23S rRNA. This entry also includes Pyrococcus horikoshii PH1915 ( )that may play a role as a 5-methyluridine MTase, and/or perform similar roles.
