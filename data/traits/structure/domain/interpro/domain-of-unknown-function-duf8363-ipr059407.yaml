identifier: InterPro:IPR059407
label: "Domain of unknown function DUF8363"
definition: >-
  This domain is found in uncharacterised eukaryotic proteins and predominantly in fungi. It contains highly conserved cysteine and histidine residues which are likely to coordinate a metal ion. These residues are predicted to come close in space and assemble in a shape typical for CCHC zinc finger domains. This domain is likely to contain two of these domains.
