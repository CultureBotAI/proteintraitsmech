identifier: InterPro:IPR048355
label: "Malate synthase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of MS, which consists of a five-helix 'plug' connected to the barrel by an extended loop and caps the active site. Malate synthase (MS) catalyses the aldol condensation of glyoxylate with acetyl-CoA to form malate as part of the second step of the glyoxylate bypass and an alternative to the tricarboxylic acid cycle in bacteria, fungi and plants. There have been identified two isoforms, A and G (MSA and MSG, respectively) that differ in size and is attributed to an inserted α/β domain in MSG that may have regulatory function. Proteins int his entry consist of an N-terminal α-helical clasp, a central TIM barrel and a C-terminal α-helical plug. In malate synthases, the TIM β/α-barrel fold and the C-terminal helical domain are well conserved and the cleft between them forms the active site.
