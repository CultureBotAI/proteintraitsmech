identifier: InterPro:IPR026834
label: LHH
definition: >-
  This entry represents the LHH domain in the nuclease of the HNH/ENDO VII superfamily, found in toxin YobL from B. subtilis. LHH is a conserved motif that is found in bacterial polymorphic toxin systems and functions as a toxin module. This domain exhibits RNase activity when expressed in E. coli and inhibits growth. These effects are neutralized by the cognate immunity protein YobK.
