identifier: InterPro:IPR006045
label: "Cupin 1"
definition: >-
  This entry represents the conserved β-barrel fold of the 'cupin' superfamily ('cupa' is the Latin term for a small barrel). This family contains 11S and 7S plant seed storage proteins, and germins. Plant seed storage proteins provide the major nitrogen source for the developing plant. This domain can also be found as a central component of many microbial proteins including certain types of phosphomannose isomerase, polyketide synthase, epimerase, and dioxygenase.
