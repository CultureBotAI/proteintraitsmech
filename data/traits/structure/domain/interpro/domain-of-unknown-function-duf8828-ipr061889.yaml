identifier: InterPro:IPR061889
label: "Domain of unknown function DUF8828"
definition: >-
  This entry represents a small domain of approximately 70 residues found in uncharacterised proteins in Bacteroidota, predominantly Flavobacteriaceae. These are small single-domain proteins. Some entries are annotated as 3-hydroxybutyryl-CoA dehydrogenase, but this annotation appears to be erroneous given the small size and lack of typical dehydrogenase features.
