identifier: InterPro:IPR047473
label: "ARID4A, chromo barrel domain"
definition: >-
  This entry represents the chromo barrel domain of ARID4A, which is a member of the chromo-like superfamily that includes chromodomains, chromo shadow domains, and chromo barrel domains, and are implicated in the recognition of lysine-methylated histone tails and nucleic acids. This is a typical SH3-fold-β-barrel domain with sequence similarity to the canonical chromodomain. The chromo barrel domain of ARID4A has DNA binding and methylated histone tail binding activities. ARID4A, also called retinoblastoma-binding protein 1 (RBBP1 or RBP1), is a leukaemia and tumour suppressor involved in epigenetic regulation in leukaemia and Prader-Willi/Angelman syndromes. It associates with the mSIN3A histone deacetylase (HDAC) chromatin remodelling complex through its interaction with the breast cancer associated tumour suppressor ING1, the breast cancer metastasis suppressor BRMS1, and the ARID4 family homologue ARID4B (also known as RBP1L1). ARID4A specifically interacts with retinoblastoma protein (pRb) and shows both HDAC-dependent and -independent repression activities. It also acts as a Runx2 coactivator and is involved in the regulation of osteoblastic differentiation in Runx2-osterix transcriptional cascade. ARID4A contains tandem Tudor domains, a PWWP domain (also known as HATH domain or RBB1NT domain), an AT-rich DNA-interacting domain (ARID, also known as BRIGHT), a chromobarrel domain, and a C-terminal R2 domain. The ARID and R2 domains are responsible for the repression activities. The Tudor, PWWP, and chromobarrel domains are all Royal Family domains, but only the chromobarrel domain of ARID4A is responsible for recognizing both dsDNA and methylated histone tails, particularly H4K20me3, in chromatin remodelling and epigenetic regulation.
