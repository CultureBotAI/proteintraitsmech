identifier: InterPro:IPR047916
label: Tau-tubulin kinase homolog Asator-like, catalytic domain
definition: >-
  STKs (serine/threonine-protein kinases) catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TTBK is a neuron-specific kinase that phosphorylates the microtubule-associated protein tau and promotes its aggregation. Higher vertebrates contain two TTBK proteins, TTBK1 and TTBK2, both of which have been implicated in neurodegeneration. The Drosophila TTBK homologue, Asator, is an essential protein that localises to the mitotic spindle during mitosis and may be involved in regulating microtubule dynamics and function. This entry represents the catalytic domain of Asator and similar proteins from lower eukaryotes.
