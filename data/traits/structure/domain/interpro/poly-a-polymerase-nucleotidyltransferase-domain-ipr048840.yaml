identifier: InterPro:IPR048840
label: "Poly(A) polymerase, nucleotidyltransferase domain"
definition: >-
  This entry represents the N-terminal nucleotidyltransferase domain of Poly(A) polymerase and similar eukaryotic proteins. In eukaryotes, polyadenylation of pre-mRNA plays an essential role in the initiation step of protein synthesis, as well as in the export and stability of mRNAs. Poly(A) polymerase, the enzyme at the heart of the polyadenylation machinery, is a template-independent RNA polymerase which specifically incorporates ATP at the 3' end of mRNA.
