identifier: InterPro:IPR049899
label: "Zinc finger, C2HC/C3H-type"
definition: >-
  This entry represents the C2HC/C3H-type zinc finger domain found in a group of proteins mainly from animals, including members of the ZC2HC1 family and bryophyte SOSEKI proteins that locally interpret global polarity cues and can influence cell division orientation to coordinate cell polarisation relative to body axes. The C2HC/C3H-type zinc finger was first identified in four copies in Zfp474, a protein exclusively found in testis and ovary and thought to function as a germ cell specific transcription factor that plays important roles in spermatid differentiation and oocyte development.
