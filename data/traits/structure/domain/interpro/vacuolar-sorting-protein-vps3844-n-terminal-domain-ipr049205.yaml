identifier: InterPro:IPR049205
label: "Vacuolar sorting protein Vps3844, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of the uncharacterised endoplasmic reticulum membrane protein C1709.03 from S. pombe, which was renamed to vacuolar sorting protein Vps3844, which is important for protein trafficking to the vacuole. From AlphaFold structure prediction, it can be inferred that this domain may adopt an α/β structure consisting of six antiparallel β-strands surrounded by three or four α-helices.
