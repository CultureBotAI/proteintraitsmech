identifier: InterPro:IPR063787
label: "Cold-regulated 15 domain"
definition: >-
  This entry represents the COR15 (Cold-Regulated 15) domain found in plant stress proteins. This domain is present in proteins that exhibit cryoprotective activity toward stromal substrates in chloroplasts. The domain mediates interactions with lipid membranes and influences the melting curves of phospholipid-containing membranes, shifting them to lower temperatures. COR15 proteins are intrinsically disordered in solution but become predominantly α-helical after drying. The domain is found in proteins that are strongly induced by cold stress and play roles in freezing tolerance in plants.
