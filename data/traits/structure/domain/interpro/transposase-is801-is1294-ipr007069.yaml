identifier: InterPro:IPR007069
label: "Transposase, IS801/IS1294"
definition: >-
  Transposases are needed for efficient transposition of the insertion sequence or transposon DNA. This entry represents a domain found at the C-terminal of transposases IS1294 and IS801, found associated with a zinc finger domain at the N-terminal ( ).
