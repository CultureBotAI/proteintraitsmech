identifier: InterPro:IPR048806
label: "Zona-pellucida-binding protein 1/2, N-terminal domain"
definition: >-
  This entry represents the N-terminal Ig-like domain from a number of zona-pellucida-binding proteins. These are sperm proteins that bind to the 90 kDa family of zona pellucida glycoproteins in a calcium-dependent manner. These represent some of the specific molecules that mediate the first steps of gamete interaction, allowing fertilisation to occur.
