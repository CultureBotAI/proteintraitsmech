identifier: InterPro:IPR015725
label: "Myosin Light Chain Kinase 1, Kinase domain"
definition: >-
  Smooth muscle myosin light chain kinase (also known as MLCK1) is a Ser/Thr protein kinase that phosphorylates phosphorylates the 20kDa myosin regulatory light chain (RLC) of smooth and nonmuscle myosin II in the presence of Ca2+ and calmodulin, which facilitates myosin interaction with actin filaments. In mice, the mylk1 gene is a large gene spanning ~250 kb and comprising at least 31 exons. It encodes at least four protein products: two isoforms of the 220kDa MLCK (also known as endothelial, long, or nonmuscle MLCK), a 130kDa MLCK (also known as short or smooth muscle MLCK), and telokin (also known as kinase-related protein). Transcripts encoding these products are derived from four independent promoters within the gene. Each of the promoters within the mylk1 gene exhibits cell-specific differences in their activity. Both 130kDa and 220kDa MLCK contain a kinase (catalytic) domain, while telokin does not have a kinase domain.
