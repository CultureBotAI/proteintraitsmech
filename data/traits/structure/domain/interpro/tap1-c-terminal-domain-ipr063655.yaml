identifier: InterPro:IPR063655
label: "TAP1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TAP1, a small cysteine-rich thionin-like protein found in plants. TAP1 is specifically expressed in stamens and its expression is dependent on the DEFICIENS transcription factor in Antirrhinum majus. The protein contains a signal peptide suggesting it is secreted. The function of this protein remains to be determined.
