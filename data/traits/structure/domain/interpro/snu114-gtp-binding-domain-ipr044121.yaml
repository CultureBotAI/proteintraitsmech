identifier: InterPro:IPR044121
label: "Snu114, GTP-binding domain"
definition: >-
  Snu114 is a GTPase component of U5 snRNP, a spliceosome that catalyses the splicing of pre-mRNA to remove introns. It is thought that GTP hydrolysis by Snu114 induces conformational rearrangements in the spliceosome. Snu114 is homologous to EF-2, but typically contains an additional N-terminal domain not found in EF-2. This entry represents the GTP binding domain found in Snu114.
