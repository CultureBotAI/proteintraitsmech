identifier: InterPro:IPR029463
label: "Lysine-specific metallo-endopeptidase"
definition: >-
  This is the catalytic domain of aspzincins, a group of lysine-specific metallo-endopeptidases in the MEROPS M35 family. They exhibit the following active-site architecture: the active site is composed of two helices and a loop region and includes the HExxH and GTxDxxYG motifs. In protein , His117, His121 and Asp130 coordinate to the catalytic zinc ligands. An electrostatically negative region composed of Asp154 and Glu157 attracts a positively charged Lys side chain of a substrate in a specific manner.
