identifier: InterPro:IPR049772
label: "OTU domain-containing protein 6A/6B, ovarian tumor domain"
definition: >-
  This entry represents the OTU (ovarian tumor) domain of human OTU domain-containing proteins 6A (OTUD6A, also called DUBA-2) and 6B (OTUD6B, also called DUBA-5) and similar animal sequences. These proteins are deubiquitinating enzymes/ubiquitinyl hydrolases ( ). OTUD6A hydrolyses 'Lys-27'-, 'Lys-29'-, and 'Lys-33'-linked polyubiquitin chains, and may also be able to hydrolyse 'Lys-11'-linked ubiquitin chains. It deubiquitylates and stabilises dynamin-related protein 1 (Drp1), a cytosolic protein responsible for mitochondrial fission and is essential in the initiation and development of several human diseases including cancer, thereby facilitating tumourigenesis. OTUD6B may play a role in the ubiquitin-dependent regulation of protein synthesis downstream of mTORC1, and may modify the ubiquitination of the protein synthesis initiation complex to repress translation. Biallelic variants in OTUD6B cause an intellectual disability syndrome that is associated with seizures and dysmorphic features. This group of proteins belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as a catalytic triad.
