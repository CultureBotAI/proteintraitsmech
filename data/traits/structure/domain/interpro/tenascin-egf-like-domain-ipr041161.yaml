identifier: InterPro:IPR041161
label: "Tenascin, EGF-like domain"
definition: >-
  This entry represents the EGF-like domains found in Tenascin proteins (TN, TN-R, TN-X, TN-N). A common feature of all EGF-like domains is that they are found in the extracellular domain of membrane-bound proteins or in proteins known to be secreted (exception: prostaglandin G/H synthase). The EGF-like domain includes six cysteine residues which have been shown to be involved in disulfide bonds. The structure of several EGF-like domains has been solved. The fold consists of two-stranded β-sheet followed by a loop to a C-terminal short two-stranded sheet. Tenascins are extracellular matrix glycoproteins that act both as integrin ligands and as modifiers of fibronectin-integrin interactions to regulate cell adhesion, migration, proliferation and differentiation. Tenascins are usually composed of repeated epidermal growth factor (EGF)-like domains, fibronectin-type III (FNIII) domains and a C-terminal fibrinogen related domain (FReD).
