identifier: InterPro:IPR057315
label: "PGAP2IP, C-terminal nuclease-like domain"
definition: >-
  This domain is found C-terminal in the human PGAP2-interacting protein and its homologues in yeast, including . PGAP2IP is composed of three domains. Two of these domains are predicted to adopt a very similar structure consisting of six transmembrane helices, suggesting a possible duplication event in these proteins ( , ). Its yeast homologue CWH43 is involved in the remodelling of the lipid moiety of GPI anchors to ceramides. The domain represented by this entry has a significant sequence similarity to DNase I-like domains and endonuclease/exonuclease/phosphatase proteins in prokaryotes; it is predicted to adopt a similar structure.
