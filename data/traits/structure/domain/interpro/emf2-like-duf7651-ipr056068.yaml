identifier: InterPro:IPR056068
label: "EMF2-like, DUF7651"
definition: >-
  This domain of unknown function is found at the N-terminal end of Polycomb group protein EMBRYONIC FLOWER 2 (EMF2) from Arabidopsis thaliana and similar plant proteins. EMF2 is involved in flowering processes by repressing unknown target genes and preventing reproductive development. This domain is predicted to adopt a globular structure that resembles barrel-sandwich hybrid. The β-sandwich has a topology most similar to C2 domains found in diverse proteins such as CEP120, Dysferlin and Myoferlin.
