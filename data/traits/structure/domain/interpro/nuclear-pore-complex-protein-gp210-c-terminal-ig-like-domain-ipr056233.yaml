identifier: InterPro:IPR056233
label: "Nuclear pore complex protein GP210, C-terminal Ig-like domain"
definition: >-
  This domain is found in the Nuclear pore complex protein GP210 from Arabidopsis thaliana and related plant proteins. GP210 is predicted to contain 16 Ig-like domains. This entry represents the 16th of these domains.
