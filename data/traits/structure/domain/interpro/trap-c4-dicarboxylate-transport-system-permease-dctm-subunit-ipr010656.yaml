identifier: InterPro:IPR010656
label: "TRAP C4-dicarboxylate transport system permease DctM subunit"
definition: >-
  This entry represents the transmembrane segments from a diverse range of transporter proteins from the tripartite ATP-independent periplasmic (TRAP) transport system, in which the driving force for solute accumulation is an electrochemical ion gradient and not ATP hydrolysis. The first TRAP transporter to be characterised was the high-affinity C4-dicarboxylate transport (Dct) system from Rhodobacter capsulatus which consists of ESR (DctP) and small (DctQ) and large (DctM) integral membrane proteins. In general, C4-dicarboxylate transport systems allow C4-dicarboxylates like succinate, fumarate, and malate to be taken up. TRAP C4-dicarboxylate carriers are secondary carriers that use an electrochemical H+ gradient as the driving force for transport. DctM is an integral membrane protein that is one of the constituents of TRAP carriers. This entry also includes SiaM and SiaT (involved in sialic acid uptake) and YiaN (involved in the uptake of 2,3-diketo-L-gulonate).
