label: "Domain of unknown function DUF7480"
definition: >-
  This domain is found in uncharacterised bacterial proteins. These proteins contain a highly conserved lipoprotein-type signal peptide sequence at the N terminus and two invariant cysteine residues within this domain suggesting their extracytoplasmic localisation.
