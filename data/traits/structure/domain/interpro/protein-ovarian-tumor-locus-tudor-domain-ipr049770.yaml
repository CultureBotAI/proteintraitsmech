identifier: InterPro:IPR049770
label: "Protein ovarian tumor locus, Tudor domain"
definition: >-
  This entry represents the Tudor domain of a group of proteins mainly found in arthropods, including Protein ovarian tumor locus from Drosophila melanogaster (OTU), a homologue of OTU domain-containing protein 4 (OTUD4) that is essential for female fertility, germ cell division and differentiation.
