identifier: InterPro:IPR013022
label: "Xylose isomerase-like, TIM barrel domain"
definition: >-
  This entry represents a structural motif with a β/α TIM barrel found in several proteins families: Endonuclease IV ( ), an AP (apurinic/apyrimidinic) endonuclease that primes DNA repair synthesis by cleaving the DNA backbone 5' of AP sites. L-rhamnose isomerase ( ), a tetramer of four TIM barrels that catalyses the isomerisation between aldoses and ketoses, such as between L-rhamnose and L-rhamnulose. Xylose isomerase ( ), which catalyses the first reaction in the catabolism of D-xylose by converting D-xylose to D-xylulose. Mannonate dehydratase UxuA, which along with mannonate oxidoreductase converts D-fructuronate to 2-keto-3-deoxy-D-gluconate. These proteins share similar, but not identical, metal-binding sites. In addition, xylose isomerase and L-rhamnose isomerase each have additional α-helical domains involved in tetramer formation.
