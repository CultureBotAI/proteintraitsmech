identifier: InterPro:IPR024731
label: "NELL2-like, EGF domain"
definition: >-
  This entry represents an EGF domain found in several proteins, including NELL2, Cubilin, Uromodulin, Fibrillin and related proteins that contain EGF repeats. Some of these proteins have calcium-binding properties. NELL2 is almost exclusively expressed in the nervous system. In the mammalian brain, NELL2 expression is mostly neuronal. NELL2 was previously found to be a secreted protein that functions during embryonic development as a neuronal differentiation and survival factor. NELL2 is a component of glutamatergic neurons and provide evidence for its physiological involvement in a major, glutamate-dependent, process of neuroendocrine regulation.
