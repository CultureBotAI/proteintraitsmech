identifier: InterPro:IPR062337
label: "Aspirochlorine biosynthesis protein F-like, C-terminal domain"
definition: >-
  This entry represents a domain found in aspirochlorine biosynthesis protein F (aclF) and related fungal proteins involved in secondary metabolite biosynthesis. In Aspergillus oryzae aclF, this domain is located at the C-terminal region , whilst in related proteins it is found in the middle region. The aclF protein is part of the gene cluster that mediates biosynthesis of aspirochlorine, a halogenated mycotoxin with antifungal properties. This protein is predicted to be a multi-pass membrane protein with three transmembrane helical regions. Related proteins often contain Wax synthase domains ( ), suggesting involvement in membrane-associated acyltransferase activities. The specific function of this domain remains to be determined.
