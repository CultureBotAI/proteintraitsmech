identifier: InterPro:IPR010065
label: Amino acid ABC transporter, permease protein, 3-TM domain
definition: >-
  ABC transporters are minimally constituted of two conserved regions: a highly conserved ATP binding cassette (ABC) and a less conserved transmembrane domain (TMD). These regions can be found on the same protein (mostly in eukaryotes and bacterial exporters) or on two different ones (mostly bacterial importers). This entry represents the membrane component of a group of amino acid transport systems, such as histidine transport system HisM and HisQ subunits. The region covered by this domain is predicted to contain three transmembrane helices in general. Substrate specificities attributed to permeases recognised by this entry include histidine, arginine, glutamine, glutamate, and (in Agrobacterium) the opines octopine and nopaline.
