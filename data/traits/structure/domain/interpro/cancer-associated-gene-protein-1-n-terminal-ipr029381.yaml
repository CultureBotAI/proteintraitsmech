identifier: InterPro:IPR029381
label: "Cancer-associated gene protein 1, N-terminal"
definition: >-
  This entry represents the N-terminal region of human Cancer-associated gene 1 protein (CAGE-1) and similar proteins mainly found in vertebrates. CAGE-1 shows testis-specific expression among normal tissues and displays wide expression in a variety of cancer cell lines and cancer tissues. CAGE-1 is predominantly expressed during post-meiotic stages. It localises to the acrosomal matrix and acrosomal granule showing it to be a component of the acrosome of mammalian spermatids and spermatozoa.
