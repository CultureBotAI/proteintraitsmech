identifier: InterPro:IPR048557
label: "Probable sensor domain DACNK"
definition: >-
  This entry represents a potential sensor domain found at the N-terminal of bacterial diadenylate cyclases, which is typically followed by the DAC ( ) domain. This domain is mainly found in actinobacteria and cyanobacteria; structure predictions suggest that this domain may consist of five α-helices and five-eight β-strands.
