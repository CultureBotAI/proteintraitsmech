identifier: InterPro:IPR030404
label: "Zinc finger and BTB domain-containing protein 40, BTB/POZ domain"
definition: >-
  The function of Zinc finger and BTB domain-containing protein 40 (ZBTB40) is not clear. It has been linked to the reduced hip bone mineral density (BMD) and the increased risk of hip osteoporosis. This entry represents the N-terminal BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain of ZBTB40.
