identifier: InterPro:IPR047293
label: "DENN domain-containing protein 5B, first RUN domain"
definition: >-
  This entry represents the first RUN domain of DENND5B and similar proteins from vertebrates. This entry includes DENN domain-containing protein 5B (DENND5B, also called Rab6-interacting protein 1 (Rab6IP1)-like protein) which functions in membrane trafficking at a crossroads between the Golgi and the endosomal system. It is composed of an N-terminal DENN domain ( ) followed by two RUN domains flanking a PLAT domain ( ).
