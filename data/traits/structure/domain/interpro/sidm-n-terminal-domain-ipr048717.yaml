identifier: InterPro:IPR048717
label: "SidM, N-terminal domain"
definition: >-
  This domain is found in the type IV virulence effector SidM/DrrA from Legionella pneumophila. This protein has dual GEF and GDF activity specifically toward Rab1, a key regulator for endoplasmic reticulum (ER)-to-Golgi vesicle trafficking. SidM consists of an N-terminal helical domain, a Rab1-activation domain ( ), and a C-terminal phosphatidylinositol 4-phosphate-binding (P4M) domain ( ). This entry represents the N-terminal domain which is mostly α-helical, having a short two-stranded β-sheet in addition.
