identifier: InterPro:IPR057456
label: "C17orf113, probable zinc finger"
definition: >-
  This domain is found in the human uncharacterised protein C17orf113 and related proteins. It contains two pairs of invariant cysteine and histidine residues that may be involved in metal coordination. This domain contains a zinc finger like fold.
