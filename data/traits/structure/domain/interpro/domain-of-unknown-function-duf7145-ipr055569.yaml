identifier: InterPro:IPR055569
label: "Domain of unknown function DUF7145"
definition: >-
  This entry represents a domain of unknown function found in Trichuris sp., Trichinella sp. and similar sequences from nematodes. This domain is repeated in some sequences from Trichuris spp. (two to four times) and it may adopt a SH2-like fold.
