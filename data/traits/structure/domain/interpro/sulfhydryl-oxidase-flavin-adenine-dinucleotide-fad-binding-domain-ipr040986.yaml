identifier: InterPro:IPR040986
label: "Sulfhydryl oxidase, flavin adenine dinucleotide (FAD) binding domain"
definition: >-
  This is a flavin adenine dinucleotide (FAD) binding domain found in Quiescin sulfhydryl oxidases (QSOX) ( ). QSOX is a multi-domain disulfide catalyst that is localized primarily to the Golgi apparatus and secreted fluids and has attracted attention due to its over-production in tumors. Structural studies indicate that the closure of the Trx1 domain over the FAD-binding site may enhance the active-site chemistry for disulfide formation.
