identifier: InterPro:IPR035757
label: "Neutrophil cytosol factor 1, second SH3 domain"
definition: >-
  Neutrophil cytosol factor 1 (also known as p47phox, or NCF1) is a cytosolic subunit of the phagocytic NADPH oxidase complex (also called Nox2 or gp91phox), which plays a key role in the ability of phagocytes to defend against bacterial infections. NADPH oxidase catalyzes the transfer of electrons from NADPH to oxygen during phagocytosis forming superoxide and reactive oxygen species. p47phox is required for activation of NADH oxidase and plays a role in translocation. It contains an N-terminal Phox homology (PX) domain, tandem SH3 domains (N-SH3 and C-SH3), a polybasic/autoinhibitory region, and a C-terminal proline-rich region (PRR). This entry represents the second SH3 domain (or C-SH3) of p47phox. In its inactive state, the tandem SH3 domains interact intramolecularly with the autoinhibitory region; upon activation, the tandem SH3 domains are exposed through a conformational change, resulting in their binding to the PRR of p22phox and the activation of NADPH oxidase.
