identifier: InterPro:IPR003450
label: Replication origin-binding protein
definition: >-
  This entry represents replication origin binding protein. It functions as a docking protein to recruit essential components of the viral replication machinery to viral DNA origins. In the presence of the major DNA-binding protein, it opens dsDNA which leads to a conformational change in the origin that facilitates DNA unwinding and subsequent replication.
