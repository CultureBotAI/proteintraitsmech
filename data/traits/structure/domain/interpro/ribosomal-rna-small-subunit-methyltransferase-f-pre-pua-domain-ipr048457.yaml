identifier: InterPro:IPR048457
label: "Ribosomal RNA small subunit methyltransferase F, pre-PUA domain"
definition: >-
  This domain is found in Ribosomal RNA small subunit methyltransferase F from Escherichia coli (YebU) and similar proteins mainly from gammaproteobacteria. YebU requires S-adenosyl-l-methionine (SAM) to specifically methylate the cytosine at position 1407 of assembled 30 S rRNA subunits. This protein is organised into two distinct structural domains: the N-terminal MTase domain (catalytic domain), which can be divided in and , and the C-terminal, also consisting of two subdomains. This entry represents the first of these subdomains, which is found N-terminal to the PUA-like domain . The pre-PUA domain has six β-strands that form a central sheet in an antiparallel fashion, and three α-helices packing against the edges of the sheet.
