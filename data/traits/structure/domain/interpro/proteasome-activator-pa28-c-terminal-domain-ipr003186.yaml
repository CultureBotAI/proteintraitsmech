identifier: InterPro:IPR003186
label: "Proteasome activator PA28, C-terminal domain"
definition: >-
  The specificity of the 20S proteasome, which degrades many intracellular proteins, is regulated by protein complexes that bind to one or both ends of the cylindrical proteasome structure. Proteasome activator 28 (PA28), also known as 11S regulator or REG, is one of these complexes. PA28 binds to the 20S proteasome and stimulates peptidase activity in and ATP-independent manner. This entry represents the C-terminal domain found in the proteasome activator 28 subunits.
