identifier: InterPro:IPR041702
label: "Magnesium-chelatase BchD/ChlD, VWA domain"
definition: >-
  Magnesium chelatase catalyses the insertion of Mg into protoporphyrin IX (Proto). In chlorophyll biosynthesis, insertion of Mg2+ into protoporphyrin IX is catalysed by magnesium chelatase in an ATP-dependent reaction. The Mg-chelatase subunits are designated ChlI, ChlD and ChlH in plants and BchI, BchD and BchH in bacteriochlorophyll synthesis. BchD contains a AAA domain at its N terminus and a VWA domain at its C terminus. The VWA domain has been speculated to be involved in mediating protein-protein interactions. This entry represents the VWA domain found in bacterial BchD and plant ChlD.
