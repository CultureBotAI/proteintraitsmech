identifier: InterPro:IPR002900
label: "Domain of unknown function DUF38/FTH, Caenorhabditis species"
definition: >-
  This domain with no known function is presumed to be a protein-protein interaction module specific to proteins from several Caenorhabditis species. It is named FTH after FOG-2 homology domain. The domain is found associated with, and C-terminal to, the cyclin-like F-box .
