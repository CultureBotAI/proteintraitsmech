identifier: InterPro:IPR057737
label: "Phenyloxazoline synthase MbtB-like, condensation domain"
definition: >-
  This entry represents the condesantion domain found in Phenyloxazoline synthase MbtB, Pyochelin synthetase PchF/E and similar bacterial proteins. This domain is a pseudo-dimer of two lobes, the N-terminal lobe (N-lobe) and the C-terminal lobe (C-lobe), each of them consisting of one large central β-sheet, flanked by predominantly α-helices. The active site motif, HHxxxDG, is located in a loop that connects the central strand of the N-lobe and one of its long α-helices. Phenyloxazoline synthase MbtB and pyochelin synthetases PchF and PchE are non-ribosomal peptide synthetases (NRPSs) involved in siderophore biosynthesis. MbtB catalyses the condensation of salicylate with serine/threonine to form phenyloxazoline rings during mycobactin synthesis in Mycobacterium tuberculosis, containing adenylation, condensation, and cyclisation domains essential for substrate recognition and bond formation. PchF and PchE function sequentially in Pseudomonas aeruginosa, where PchE adenylates and incorporates cysteine while PchF adds a second cysteine and performs crucial thiazoline reduction and N-methylation, producing the mature pyochelin molecule.
