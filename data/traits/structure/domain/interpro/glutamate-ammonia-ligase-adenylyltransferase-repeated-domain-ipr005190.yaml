identifier: InterPro:IPR005190
label: Glutamate-ammonia ligase adenylyltransferase, repeated domain
definition: >-
  This is a conserved repeated domain found in GlnE proteins. These proteins adenylate and deadenylate glutamine synthases: ATP + {L-Glutamate:ammonia ligase (ADP-forming)} = Diphosphate + Adenylyl-{L-Glutamate:Ammonia ligase (ADP-forming)}. The domain is related to the nucleotidyltransferase domain .
