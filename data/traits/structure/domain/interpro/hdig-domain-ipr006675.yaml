identifier: InterPro:IPR006675
label: "HDIG domain"
definition: >-
  This domain is found in a few known nucleotidyltransferases and in a large number of uncharacterised proteins. It contains four widely separated His residues, the second of which is part of an invariant dipeptide His-Asp in a region matched approximately by the motif HDIG. It appears to be related to the HD domain.
