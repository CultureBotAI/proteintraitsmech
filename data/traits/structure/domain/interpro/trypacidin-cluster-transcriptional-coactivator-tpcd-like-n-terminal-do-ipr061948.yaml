identifier: InterPro:IPR061948
label: "Trypacidin cluster transcriptional coactivator tpcD-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in fungal proteins involved in secondary metabolite biosynthesis gene clusters. This domain is found in both transcriptional coactivators TpcD and related and O-methyltransferases that regulate or catalyse steps in the production of various bioactive compounds including neosartorin, dothistromin, monodictyphenone, trypacidin, viriditoxin, and aurofusarin. The domain contains a helix-turn-helix motif characteristic of DNA-binding proteins and is predicted to localise to the nucleus. The specific function of this domain within these diverse enzymes remains to be determined.
