identifier: InterPro:IPR007319
label: "WDR36/Utp21, C-terminal domain"
definition: >-
  Utp21 is a component of the SSU processome, which is required for pre-18S rRNA processing. It interacts with Utp18. Utp21 from yeast and WDR36 its orthologue in animals are part of the small subunit (SSU) processome, the first precursor of the small eukaryotic ribosomal subunit. They are involved in the nucleolar processing of SSU 18S rRNA.
