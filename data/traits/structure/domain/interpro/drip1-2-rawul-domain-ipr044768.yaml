identifier: InterPro:IPR044768
label: "DRIP1/2, RAWUL domain"
definition: >-
  DREB2A-Interacting Proteins (DRIPs) are E3 ubiquitin-protein ligases that act as negative regulators of the response to water stress, that mediate ubiquitination and subsequent proteasomal degradation of the drought-induced transcriptional activator Dehydration-Responsive Element-Binding Protein 2A (DREB2A). DREB2A regulates the expression of stress-inducible genes via the dehydration-responsive elements and requires posttranslational modification for its activation. DRIPs contain a RING finger, and a RING finger- and WD40-associated ubiquitin-like (RAWUL) domain. This entry represents the RAWUL domain found in E3 ubiquitin protein ligases DRIP1, DRIP2 and the DRIP homologue (DRIPH, At3g23060) from Arabidopsis.
