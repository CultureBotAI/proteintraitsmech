identifier: InterPro:IPR022189
label: Smoothelin
definition: >-
  This entry represents a domain found in the smoothelin protein, which is a smooth muscle-specific cytoskeletal protein exclusively found in differentiated smooth muscle cells. This domain is found in association with the calponin homology domain ( ).
