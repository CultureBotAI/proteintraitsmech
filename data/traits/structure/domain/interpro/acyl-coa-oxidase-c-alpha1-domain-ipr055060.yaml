identifier: InterPro:IPR055060
label: "Acyl-CoA oxidase, C-alpha1 domain"
definition: >-
  This entry represents the C-alpha1 domain from acyl-CoA oxidases which has an all-α helical structure that a forms a four α-helical bundle. This domain includes the FAD-binding and substrate-binding sites.
