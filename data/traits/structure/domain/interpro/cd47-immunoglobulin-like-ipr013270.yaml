identifier: InterPro:IPR013270
label: "CD47 immunoglobulin-like"
definition: >-
  This entry represents the V-set like Ig domain found at the N-terminal end of Leukocyte surface antigen CD47 proteins from chordates and CD47-like proteins A38, also known as Protein OPG166, from Poxvirus. Human CD47 is an adhesive protein that mediates cell-to-cell interactions. It is involved in signal transduction, cardiovascular homeostasis, inflammation, apoptosis, angiogenesis, cellular self-renewal, and immunoregulation. OPG166 from Vaccinia virus promotes, when overexpressed, the influx of extracellular Ca2 , leading to membrane permeability and host cell necrosis.
