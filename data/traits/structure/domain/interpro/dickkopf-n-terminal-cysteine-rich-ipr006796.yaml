identifier: InterPro:IPR006796
label: "Dickkopf, N-terminal cysteine-rich"
definition: >-
  Dickkopf proteins are a class of Wnt antagonists. They possess two conserved cysteine-rich regions. This entry represents the N-terminal conserved region. This domain, as its C-terminal region, have been found to share significant sequence similarity to the colipase fold ( ).
