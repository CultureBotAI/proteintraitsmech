identifier: InterPro:IPR004399
label: "Hydroxymethylpyrimidine kinase/phosphomethylpyrimidine kinase domain"
definition: >-
  This entry represents a bifunctional enzyme, phosphomethylpyrimidine (HMP-P) kinase ( )/Hydroxymethylpyrimidine (HMP) kinase ( ), the ThiD/J protein of thiamine biosynthesis. It catalyses two consecutive phosphorylation reactions in the thiamine phosphate biosynthesis pathway, first phosphorylating HMP to HMP-P, and then HMP-P to HMP-PP. The protein is commonly observed within operons containing other thiamine biosynthesis genes. Numerous examples are fusion proteins with other thiamine-biosynthetic domains.
