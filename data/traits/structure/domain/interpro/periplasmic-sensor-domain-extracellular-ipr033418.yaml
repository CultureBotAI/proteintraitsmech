identifier: InterPro:IPR033418
label: "Periplasmic sensor domain, extracellular"
definition: >-
  CHASE9 is a conserved extracellular (periplasmic) sensor domain found in histidine kinases, diguanylate cyclases/phosphodiesterases, methyl-accepting chemotaxis proteins, adenylate cyclases and protein serine phosphatases, including the c-di-GMP phosphodiesterases PdeI (YliE) of Escherichia coli.
