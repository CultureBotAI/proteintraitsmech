identifier: InterPro:IPR032065
label: "E3 ubiquitin-protein ligase RNF31, UBA-like domain"
definition: >-
  This entry represents a binding domain found in E3 ubiquitin-protein ligase RNF31 and similar animal proteins. RNF31 is also known as HOIL-1L binding partner (HOIP). The interaction of HOIL-1L and HOIP is via the UBL-UBA interaction. This interaction is important in E3 complex formation and the subsequent activation of NF-kappaB.
