identifier: InterPro:IPR015351
label: RBP-J/Cbf11/Cbf12, DNA binding
definition: >-
  This domain is found in RBP-J from human and Cbf11/Cbf12 from fission yeast. These proteins function as transcription factors. This domain adopts a β sandwich structure, with nine strands in two β-sheets, in a Greek-key topology, and allow for DNA binding.
