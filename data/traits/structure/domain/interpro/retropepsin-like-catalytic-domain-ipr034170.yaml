identifier: InterPro:IPR034170
label: "Retropepsin-like catalytic domain"
definition: >-
  This entry represents the peptidase domain found in a group of retropepsin-like aspartic endopeptidases from retroviruses, retrotransposons and retroelements. This group of aspartic peptidases is classified by MEROPS as the peptidase family A2 (retropepsin family, clan AA), subfamily A2A. Proteins containing this domain include retropepsins from human immunodeficiency viruses (MEROPS identifiers A02.001, A02.002), Mason-Pfizer leukemia virus (A02.009), Rous sarcoma virus (A02.015), intracisternal A-particle (A02.016), and "endogenous viruses" from human (A02.011), rabbit (A02.024) and mouse (A02.060).
definition_source: InterPro
