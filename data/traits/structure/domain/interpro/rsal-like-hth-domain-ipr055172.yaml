identifier: InterPro:IPR055172
label: "RsaL-like, HTH domain"
definition: >-
  This is a helix-turn-helix (HTH) domain found in quorum-sensing regulator RsaL ( ) from Pseudomonas aeruginosa and related proteins. RsaL is a QS repressor that reduces QS signal production and ensures homeostasis by functioning in opposition to LasR.
