identifier: InterPro:IPR037453
label: "PACSIN2, F-BAR domain"
definition: >-
  PACSIN2 (protein kinase C and casein kinase substrate in neurons protein 2, also known as Syndapin-2) belongs to the PACSIN family that contains a N-terminal F-BAR (FCH-BAR) domain and a C-terminal SH3 domain. They are cytoplasmic phosphoproteins that play a role in vesicle formation and transport. This entry represents the F-BAR domain of PACSIN2. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization.
