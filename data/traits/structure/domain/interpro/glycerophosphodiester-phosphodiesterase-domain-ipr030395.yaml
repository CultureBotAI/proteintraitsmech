label: "Glycerophosphodiester phosphodiesterase domain"
definition: >-
  This entry represents the GP-PDE domain. The glycerophosphodiester phosphodiesterases (GD-PDEs) were initially characterised in bacteria, where they have functional roles for production of metabolic carbon and phosphate sources from glycerophosphodiesters and in adherence to and degradation of mammalian host-cell membranes. Mammalian GP- GDEs have been identified more recently and shown to be implicated in several physiological functions. GD-PDEs are involved in glycerol metabolism and catalyze the reaction of glycerophosphodiester and water to alcohol and sn-glycerol-3-phosphate. They display broad specificity for glycerophosphodiesters, such as glycerophosphocholine, glycerophosphoethanolamine, glycerophosphoglycerol and bis(glycerophosphoglycerol). The GP-PDE domain adopts the ubiquitous triosephosphate isomerase (TIM) barrel α/β fold. The TIM barrel is comprised of an eight-stranded parallel β-sheet barrel surrounded by eight α-helices. There is a small insertion to the conventional TIM barrel structure referred to as the GDPD-insertion (GDPD-I). The GDPD-I is comprised of β strands, α-helices (H3 and H4), and 3/10 helices. Although the TIM barrel and a small insertion are unique for GP-PDE family, there are subtle differences in size and topology of each domain. Some proteins known to contain a GP-PDE domain are listed below: Bacterial glycerophosphoryl diester phosphodiesterase GlpQ (EC 3.1.4.46). Bacterial gylcerophosphoryl diester phosphodiesterase UgpQ (EC 3.1.4.46). Mammalian glycerophosphodiester phosphodiesterase 1 (GDE1) (EC 3.1.4.44) (or MMIR16), an integral membrane glycoprotein that interacts with regulator of G protein signaling proteins. It hydrolyzes glycerophosphoinositols (GPIs) producing inositol and glycerol 3-phosphate. Mammalian glycerophosphod…
