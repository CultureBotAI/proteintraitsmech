identifier: InterPro:IPR024424
label: "Replicative helicase inhibitor G39P, N-terminal"
definition: >-
  G39P inhibits the initiation of DNA replication by blocking G40P replicative helicase. G39P has a bipartite structure consisting of a folded N-terminal domain and an unfolded C-terminal domain. The C-terminal domain is essential for helicase interaction.
