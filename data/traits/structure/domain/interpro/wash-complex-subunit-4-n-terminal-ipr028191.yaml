identifier: InterPro:IPR028191
label: "WASH complex subunit 4, N-terminal"
definition: >-
  This entry represents the N-terminal WASH homology domain (WAHD) of WASH complex subunit 4 (WASH4), also known as KIAA1033 or SWIP. This domain comprises the WAHD1 and the TBR (tubulin-binding region) domains. In species such as Drosophila this protein is the only component of the 'complex'. WASH is a complex present at the surface of endosomes that recruits and activates the Arp2/3 complex to induce actin polymerisation.
