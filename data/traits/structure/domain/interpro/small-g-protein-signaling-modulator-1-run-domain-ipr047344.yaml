identifier: InterPro:IPR047344
label: "Small G protein signaling modulator 1, RUN domain"
definition: >-
  This entry represents the RUN domain of SGSM1. Small G protein signaling modulator 1 (SGSM1) interacts with numerous Rab family members, functioning as Rab effector for some, and as GTPase activator for others. It is a Rab9A effector and GTPase-activating protein for Rab36, and links Rab9A function to Rab36 function in the endosomal system.
