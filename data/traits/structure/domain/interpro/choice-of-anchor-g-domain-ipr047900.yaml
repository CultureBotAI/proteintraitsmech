identifier: InterPro:IPR047900
label: "Choice-of-anchor G domain"
definition: >-
  Choice-of-anchor proteins belong to homologous families in which various branches carry C-terminal sorting signals known, or suspected, to be processed by transpeptidases as sortase, exosortase, archaeo sortase, rhombosortase, or the type 9 secretion system sorting enzyme. This entry include bacterial proteins, so-called choice-of-anchor G, sortase and exosortase targets, and are likely to be found on the cell surface. This domain may occur as standalone or in combination with other domains.
