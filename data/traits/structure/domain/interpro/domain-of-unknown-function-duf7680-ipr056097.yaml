identifier: InterPro:IPR056097
label: "Domain of unknown function DUF7680"
definition: >-
  This entry represents a group of uncharacterised prokaryotic proteins. These proteins share a common semi-conserved EExxWY sequence motif which is predicted as a solvent-exposed in a α/β structure consisting of a four-stranded antiparallel β-sheet and α-helices packed on one side of it.
