identifier: InterPro:IPR059415
label: "Domain of unknown function DUF8371"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to fold into an α/β structure composed of a central five-stranded mixed β-sheet and α-helices packed on both sides. This domain has a significant structural similarity to domains members of PD-(D/E)XK nuclease superfamily that extends to the active site architecture suggesting that this domain may possess endonuclease activity. This domain is frequently found in combination with (DUF8370).
