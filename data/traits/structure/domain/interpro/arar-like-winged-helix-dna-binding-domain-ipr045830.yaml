identifier: InterPro:IPR045830
label: "AraR-like, winged helix DNA-binding domain"
definition: >-
  This entry represents the C-terminal DNA-binding winged-helix-turn-helix (wHTH) domain of bacterial Nudix hydrolase domain-containing proteins related to AraR. Winged helix DNA-binding proteins share a related winged helix-turn-helix DNA-binding motif, where the "wings", or loops, are small β-sheets. The winged helix motif consists of two wings (W1, W2), three α-helices (H1, H2, H3) and three β-sheets (S1, S2, S3) arranged in the order H1-S1-H2-H3-S2-W1-S3-W2. The DNA-recognition helix makes sequence-specific DNA contacts with the major groove of DNA, while the wings make different DNA contacts, often with the minor groove or the backbone of DNA. Several winged-helix proteins display an exposed patch of hydrophobic residues thought to mediate protein-protein interactions.
