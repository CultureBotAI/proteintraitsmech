identifier: InterPro:IPR063342
label: "C45G9.6, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain found in uncharacterised proteins from nematodes, including C45G9.6 from Caenorhabditis elegans. The domain adopts a β-sheet structure. The function of this domain remains to be determined.
