identifier: InterPro:IPR048490
label: "Type III effector Xcv3220-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of the type III effector Xcv3220 (XopL) ( ) from the plant pathogen Xanthomonas campestris and similar proteins from Xanthomonadales. XopL induces plant cell death, subverts plant immunity and shows E3 ubiquitin ligase activity, which is associated with this domain. This domain interacts with plant E2 ubiquitin conjugating enzymes and folds into a four-helical bundle, which can be subdivided into two uneven lobes almost perpendicular to each other giving the molecule an 'L' shape ( ). A large cleft with a net negative charge is formed at the intersection of the two lobes.
