identifier: InterPro:IPR041401
label: "Cell wall elongation regulator TseB-like domain"
definition: >-
  This entry represents a domain found in the probable cell wall elongation regulator TseB from Bacillus subtilis and similar sequences from firmicutes. TseB is required for normal cell shape. It plays an important role in cell wall elongation during exponential phase and spore outgrowth. This domain shows an α-β structure.
