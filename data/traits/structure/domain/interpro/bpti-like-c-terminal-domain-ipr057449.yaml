identifier: InterPro:IPR057449
label: "BPTI-like, C-terminal domain"
definition: >-
  This entry represents a BPTI-like domain found exclusively in nematodes, primarily within the class Chromadorea. The domain is well-represented across multiple nematode clades including Rhabditina, Tylenchina, and Spirurina. It is found in proteins such as LON-8 in C. elegans, which contains a single copy of this domain.
