identifier: InterPro:IPR048236
label: "Ceruloplasmin-like, fifth cupredoxin domain"
definition: >-
  Ceruloplasmin is a serum multicopper oxidase essential for normal iron homeostasis and copper transport in blood but it is also membrane-bound via a glycosylphosphatidylinositol (GPI)-anchor in astrocytes and kidney. It also functions in amine oxidation and as an antioxidant preventing free radicals in serum. The protein has 6 cupredoxin domains with six copper centres; three mononuclear sites in domain 2, 4 and 6 and three in the form of trinuclear clusters at the interface of domains 1 and 6. Ceruloplasmin exhibits internal sequence homology that appears to have evolved from the triplication of a sequence unit composed of two tandem cupredoxin domains. This entry represents the fifth cupredoxin domain of ceruloplasmin. This entry also includes the ceruloplasmin homologue hephaestin, which is involved in the metabolism and homeostasis of iron. It is a transmembrane copper-dependent ferroxidase responsible for transporting dietary iron from intestinal enterocytes into the circulatory system. The highest expression of hephaestin is found in small intestine.
