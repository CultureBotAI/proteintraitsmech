identifier: InterPro:IPR037457
label: "M28 Zn-Peptidase Glutaminyl Cyclase"
definition: >-
  This entry represents a domain found in proteins belonging to the glutaminyl cyclase (QC) subfamily of the peptidase M28 family. QC is involved in N-terminal glutamine cyclization of many endocrine peptides and is typically abundant in brain tissue. N-terminal glutamine residue cyclization is an important post-translational event in the processing of numerous bioactive proteins, including neuropeptides, hormones, and cytokines during their maturation in the secretory pathway. The N-terminal pGlu protects them from exopeptidase degradation and/or enables them to have proper conformation for binding to the receptors. QCs are highly conserved from yeast to human. Mammalian QCs have evolved likely from a bacterial zinc-dependent aminopeptidase and have been originally proposed to be Zn-dependent metalloenzymes based on structural similarities to bacterial aminopeptidases and the observation that it can bind Zn ions in a 1:1 stoichiometry. However, a Zn-independent catalytic mechanism has also been proposed. In humans, several genetic diseases, such as osteoporosis, appear to result from mutations of the QC gene. N-terminal glutamate cyclization into pyroglutamate (pGlu) is a reaction that may be related to the formation of several plaque-forming peptides, such as amyloid-(A) peptides and collagen-like Alzheimer amyloid plaque component, which play a pivotal role in Alzheimer's disease.
