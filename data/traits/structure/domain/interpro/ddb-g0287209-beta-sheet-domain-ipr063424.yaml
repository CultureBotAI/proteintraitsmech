identifier: InterPro:IPR063424
label: "DDB_G0287209, beta sheet domain"
definition: >-
  This entry represents a small β sheet domain of transmembrane domain-containing protein DDB_G0287209 from Dictyostelium discoideum. This domain is found in related transmembrane proteins across Amoebozoan species including other Dictyostelium species and Tetrahymena. The domain adopts a β sheet structure and is found downstream of transmembrane regions in these multi-pass membrane proteins. Some proteins contain multiple copies of this domain. The full-length proteins are predicted to be membrane-localised and contain coiled-coil regions.
