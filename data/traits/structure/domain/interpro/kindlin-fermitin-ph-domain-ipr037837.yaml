identifier: InterPro:IPR037837
label: "Kindlin/fermitin, PH domain"
definition: >-
  Fermitin, also known as Unc-112-related protein, functions as a mediator of integrin inside-out signalling. The recruitment of Fermitin proteins and Talin to the membrane mediates the terminal event of integrin signalling, via interaction with integrin beta subunits. Fermatin has a FERM domain interrupted with a pleckstrin homology (PH) domain. Fermitin family homologues (Fermt1, 2, and 3, also known as Kindlins) are each encoded by a different gene. In mammalian studies, Fermt1 is generally expressed in epithelial cells, Fermt2 is expressed in muscle tissues, and Fermt3 is expressed in hematopoietic lineages. Specifically Fermt2 is expressed in smooth and striated muscle tissues in mice and in the somites (a trunk muscle precursor) and neural crest in Xenopus embryos. As such it has been proposed that Fermt2 plays a role in cardiomyocyte and neural crest differentiation. Expression of mammalian Fermt3 is associated with hematopoietic lineages: the anterior ventral blood islands, vitelline veins, and early myeloid cells. In Xenopus embryos this expression, also include the notochord and cement gland. This entry represents the PH domain of fermitins.
