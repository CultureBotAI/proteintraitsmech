identifier: InterPro:IPR018285
label: "Methionyl-tRNA synthetase, N-terminal heteromerisation domain"
definition: >-
  This entry represents the N-terminal domain of methionyl-tRNA synthetase (MetRS). This N-terminal appended domain mediates non-catalytic complex formation through its interaction with a domain in the tRNA aminoacylation cofactor Arc1p. The interacting domains of MetRS, GluRS (glutamyl-tRNA synthetase) and Arc1p form a ternary complex resembling a classical GST homo-dimer. Domain-swapping between symmetrically related MetRS-N and Arc1p-N domains generates a 2:2 tetramer held together by van der Waals forces. This domain is necessary for formation of the aminoacyl-tRNA synthetase complex necessary for tRNA nuclear export and shuttling as part of the translational apparatus.
