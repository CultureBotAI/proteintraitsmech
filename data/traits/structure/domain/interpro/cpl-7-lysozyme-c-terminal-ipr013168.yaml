identifier: InterPro:IPR013168
label: "Cpl-7 lysozyme, C-terminal"
definition: >-
  This domain was originally found in the C-terminal moiety of the Cp-7 lysin (lysozyme, ) encoded by Bacteriophage Cp-7. It is also found in the cell wall hydrolases of human and life-stock pathogens. CW_7 repeats make up a cell wall binding motif.
