identifier: InterPro:IPR047385
label: "Tudor domain-containing protein 10, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif of TDRD10 and similar proteins from chordates. TDRD10 is widely expressed and localized both to the nucleus and cytoplasm and may play general roles like regulation of RNA metabolism. It contains a Tudor domain and a RNA recognition motif (RRM).
