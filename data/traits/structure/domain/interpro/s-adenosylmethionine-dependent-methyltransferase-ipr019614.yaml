identifier: InterPro:IPR019614
label: "S-adenosylmethionine-dependent methyltransferase"
definition: >-
  Members of this entry are S-adenosylmethionine-dependent methyltransferases from gammaproteobacterial species. The diversity in the roles of methylation is matched by the almost bewildering number of methyltransferase enzymes that catalyse the methylation reaction. Although several classes of methyltransferase enzymes are known, the great majority of methylation reactions are catalysed by the S-adenosylmethionine-dependent methyltransferases. SAM (S-adenosylmethionine, also known as AdoMet) is well known as the methyl donor for the majority of methyltransferases that modify DNA, RNA, histones and other proteins, dictating replicational, transcriptional and translational fidelity, mismatch repair, chromatin modelling, epigenetic modifications and imprinting.
