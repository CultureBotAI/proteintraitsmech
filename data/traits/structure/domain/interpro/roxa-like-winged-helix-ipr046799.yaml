identifier: InterPro:IPR046799
label: "ROXA-like, winged helix"
definition: >-
  This entry represents the C-terminal winged helix domain of ribosomal oxygenases, including ROXA from Escherichia coli, which is reminiscent of WH-domains involved in protein-protein and protein-nucleic acid interactions. However, this domain has an overall negative charge suggesting they do not directly bind nucleic acids.
