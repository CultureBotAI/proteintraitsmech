identifier: InterPro:IPR048359
label: "Exocyst complex component EXOC6/Sec15, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of Exocyst complex components EXOC6/Sec15, members of the complexes associated with tethering containing helical rods (CATCHR) fold family and homologous to subunits of other multisubunit tethering complexes (MTCs) such as Dsl1, Golgi-associated retrograde protein (GARP) and COG complexes, characterised by a coiled-coild region at the N-terminal and an α-helical bundle at the C-terminal. This is a coiled-coil domain of Sec15 that forms an antiparallel zipper with Sec10 and interacts with the antiparallel zipper formed between Exo70-Exo84, which form a four-helical bundle part of the core of the exocyst.
