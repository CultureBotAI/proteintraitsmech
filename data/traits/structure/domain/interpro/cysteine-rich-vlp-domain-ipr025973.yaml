identifier: InterPro:IPR025973
label: "Cysteine-rich VLP domain"
definition: >-
  This presumed domain is functionally uncharacterised. It is found in bacterial sequences and is approximately 60 amino acids in length. It contains 6 conserved cysteines and a conserved VLP sequence motif.
