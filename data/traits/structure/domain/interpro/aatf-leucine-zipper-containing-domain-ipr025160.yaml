identifier: InterPro:IPR025160
label: "AATF leucine zipper-containing domain"
definition: >-
  This leucine zipper-containing domain is found in apoptosis antagonizing transcription factor (AATF, also known as Che-1) and related proteins. AATF may function as a general inhibitor of the histone deacetylase HDAC1. AATF has been shown to inhibit the abberant production of the amyloid beta peptide 1-42 by direct interaction with Par4. This interaction occurs via the leucine zipper.
