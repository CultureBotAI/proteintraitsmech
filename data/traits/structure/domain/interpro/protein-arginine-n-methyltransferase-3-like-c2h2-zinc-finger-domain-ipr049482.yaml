identifier: InterPro:IPR049482
label: "Protein arginine N-methyltransferase 3-like, C2H2 zinc finger domain"
definition: >-
  This is the N-terminal helical domain of protein arginine N-methyltransferase 3 (ANM3/PRMT3) which has a C2H2 zinc finger. ANM3 catalyses both the monomethylation and asymmetric dimethylation of the guanidino nitrogens of arginine residues in target proteins and may regulate retinoic acid synthesis and signalling by inhibiting ALDH1A1 retinal dehydrogenase activity. PRMT3 orthologue from fission yeast, is a ribosomal protein that methylates guanidino nitrogens of arginyl residues in ribosomal protein rps2 and may regulate ribosome biosynthesis. This zinc-finger is required for its optimal enzymatic activity and contributes to substrate specificity.
