label: "Domain of unknown function DUF8631"
definition: >-
  This entry represents a small domain of approximately 63 residues found in uncharacterised proteins from Cyanobacteriota. The proteins containing this domain are annotated as putative helix-turn-helix regulators. The function of this domain remains to be determined.
