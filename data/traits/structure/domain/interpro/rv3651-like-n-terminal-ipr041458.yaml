identifier: InterPro:IPR041458
label: "Rv3651-like, N-terminal"
definition: >-
  This domain is found in Triple sensor-domain protein Rv3651 from Mycobacterium tuberculosis and similar proteins from actinobacteria. Rv3651 adopts a three-domain configuration. This entry represents the N-terminal domain, a GAF domain that shows a central antiparallel β-sheet of six β-strands.
