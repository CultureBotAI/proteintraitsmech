identifier: InterPro:IPR060565
label: "Mirror-image polydactyly gene 1 protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of mirror-image polydactyly gene 1 (MIPOL1) proteins found in animals. The specific function of this domain remains to be determined. MIPOL1 is a nuclear protein that is expressed during embryonic development, particularly between 10.5 and 13.5 days post-coitum in mice. This protein contains multiple coiled-coil regions and is involved in a chromosomal translocation associated with mirror-image polydactyly, a rare congenital anomaly characterised by mirror-image duplication of digits. The protein shows tissue-specific expression patterns with weak expression in heart, liver, skeletal muscle, kidney and pancreas.
