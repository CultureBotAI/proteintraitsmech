identifier: InterPro:IPR045495
label: "PI4-kinase, N-terminal"
definition: >-
  This entry represents a non-catalytic region in eukaryotic phosphatidylinositol 4-kinase alpha (PI4K) proteins. These proteins play a role in the production of the second messenger inositol-1,4,5-trisphosphate. In human PI4K alpha, this domain consists of a long sequence found in the N-terminal region of the protein. This region forms a large alpha solenoid structure.
