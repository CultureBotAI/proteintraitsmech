identifier: InterPro:IPR033906
label: "Lipase, N-terminal"
definition: >-
  This entry includes the catalytic, N-terminal domain of pancreatic lipase-like enzymes. Triglyceride lipases ( ) are lipolytic enzymes that hydrolyse ester linkages of triglycerides. Lipases are widely distributed in animals, plants and prokaryotes. At least three tissue-specific isozymes exist in higher vertebrates, pancreatic, hepatic and gastric/lingual. These lipases are closely related to each other and to lipoprotein lipase ( ), which hydrolyses triglycerides of chylomicrons and very low density lipoproteins (VLDL). The most conserved region in all these proteins is centred around a serine residue which has been shown to participate, with an histidine and an aspartic acid residue, in a charge relay system. Such a region is also present in lipases of prokaryotic origin and in lecithin-cholesterol acyltransferase ( ) (LCAT), which catalyzes fatty acid transfer between phosphatidylcholine and cholesterol.
