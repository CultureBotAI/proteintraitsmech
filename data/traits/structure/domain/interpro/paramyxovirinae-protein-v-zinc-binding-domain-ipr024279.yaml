identifier: InterPro:IPR024279
label: "Paramyxovirinae protein V, zinc-binding domain"
definition: >-
  The paramyxoviruses, which include such respiroviruses as para-influenzae and measles, produce phosphoproteins - protein P - that are integral to the polymerase transcription-replication complex. Protein P consists of two functionally distinct moieties, an N-terminal PNT, and a C-terminal PCT. The P mRNA encodes a variety of proteins beyond P. Protein V consists of PNT fused to a C-terminal zinc-binding region. This conserved region consists of the two-zinc-binding section sandwiched between β sheets 6 and 7 of the overall V protein. It is the binding of this core domain of V protein with the DDB1 protein (part of the ubiquitin-ligase complex) of eukaryotes which represents the key element of the virus-host protein interaction. In the Henipavirus family, which includes Nipah and Hendra viruses, the V protein is able to block IFN (interferon) signalling by preventing IFN-induced STAT phosphorylation and nuclear translocation.
