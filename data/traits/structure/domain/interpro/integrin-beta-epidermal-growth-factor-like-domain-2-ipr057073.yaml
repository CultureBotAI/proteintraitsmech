identifier: InterPro:IPR057073
label: "Integrin beta, epidermal growth factor-like domain 2"
definition: >-
  This entry represents the second EGF-like domain that is found in several integrin beta proteins, including integrin beta-1/2/3/5/6/8. This domain has two characteristically long loops. EGF-like domains in beta subunits contain three disulphide groups with the same connectivity as in other EGF domains. The disulphide bonds function as critical "locks" for integrin inactivity, with bond disruption enabling activation. Each EGF-like domain contains three β strands, with the first two antiparallel strands (A and B) forming a major β sheet found in classical EGF domains. Strand C is hydrogen bonded to strand D, which is contributed in part by the consecutive domain, with strands C and D forming a minor β sheet-like conformation. Integrin beta subunits consist of an extracellular domain with a head region, a stalk/leg section, a transmembrane domain, and a cytoplasmic tail. The head region contains a β-I-like domain inserted into a hybrid domain, connected to a plexin-semaphorin-integrin (PSI). C-terminal to the PSI domain is an A-domain, which has been predicted to adopt a Rossmann fold similar to that of the alpha subunit, but with additional loops between the second and third β strands. This domain is referred to as VWA. Many VWA domains bind metal ions via a noncontiguous sequence motif called metal ion-dependent adhesion site (MIDAS). This is followed by a β-subunit stalk/leg section that contains four cysteine-rich integrin epidermal growth factor-like (I-EGF) modules,, ]. Finally, this is followed by the β-ankle TM domain and a cytoplasmic tail. Integrins are the major metazoan receptors for cell adhesion to extracellular matrix proteins and, in vertebrates, also play important roles in certain cell-cell adhesions, make transmembrane connections to the cytoskeleton,…
