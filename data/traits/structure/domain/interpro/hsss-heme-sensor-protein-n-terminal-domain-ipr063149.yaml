identifier: InterPro:IPR063149
label: "HssS heme sensor protein, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of HssS, a heme sensor histidine kinase involved in intracellular heme homeostasis. This domain is approximately 160 amino acids and contains transmembrane helices at the N and C termini. It precedes the HAMP signalling domain ( ) and the catalytic histidine kinase domain ( ). HssS is a member of the two-component regulatory system HssS/HssR conserved across Staphylococcus and other bacterial species. The specific ligand of this N-terminal sensing region remains to be determined.
