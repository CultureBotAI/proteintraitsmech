identifier: InterPro:IPR029410
label: "CAP-associated domain"
definition: >-
  The function of this domain is unknown, but it is found towards the N terminus of bacterial proteins carrying the CAP domain, . All members that do not carry an additional copper amine oxidase N-terminal domain ( ) are likely to be extracellular, as they start with a signal-peptide. Most other non-bacterial proteins with the CAP domain are allergenic.
