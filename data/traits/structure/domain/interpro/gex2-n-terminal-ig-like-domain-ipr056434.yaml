identifier: InterPro:IPR056434
label: "GEX2, N-terminal Ig-like domain"
definition: >-
  This domain is found at the N-terminal of Arabidopsis GAMETE EXPRESSED 2 (GEX2) and related plant proteins. GEX2 is localised at the sperm membrane and contains a number of extracellular Ig-like domains. GEX2 is required for gamete attachment. The domain represented by this entry adopts a β-sandwich structure with an Ig-like topology.
