identifier: InterPro:IPR060216
label: "AKAP9/Pericentrin, N-terminal coiled coil domain"
definition: >-
  This entry represents the N-terminal coiled coil domain found in A-kinase anchor protein 9 (AKAP9, also known as AKAP 350), Pericentrin (pericentrin-B, kendrin), and similar animal proteins. AKAP9 and Pericentrin large coiled-coil proteins found in mammalian centrosomes that serve to recruit structural and regulatory components including dynein and protein kinase. The specific function of this domain remains to be determined.
