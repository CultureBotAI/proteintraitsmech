identifier: InterPro:IPR033734
label: "Jacalin-like lectin domain, plant"
definition: >-
  This entry refers to jacalin-like lectin domains found in plants. Jacalin-like lectins are sugar-binding protein domains mostly found in plants. They adopt a β-prism topology consistent with a circularly permuted three-fold repeat of a structural motif. Proteins containing this domain may bind mono- or oligosaccharides with high specificity. The domain can occur in tandem-repeat arrangements with up to six copies, and in architectures combined with a variety of other functional domains. While the family was initially named after an abundant protein found in the jackfruit seed, taxonomic distribution is not restricted to plants. The domain is also found in the salt-stress induced protein from rice and an animal prostatic spermine-binding protein. Proteins containing this domain include: Jacalin, a tetrameric plant seed lectin and agglutinin from Artocarpus heterophyllus (jackfruit), which is specific for galactose. Artocarpin, a tetrameric plant seed lectin from A. heterophyllus. Lectin MPA, a tetrameric plant seed lectin and agglutinin from Maclura pomifera (Osage orange),. Heltuba lectin, a plant seed lectin and agglutinin from Helianthus tuberosus (Jerusalem artichoke). Agglutinin from Calystegia sepium (Hedge bindweed). Griffithsin, an anti-viral lectin from red algae (Griffithsia species). Ipomoelin, a Jacalin-related lectin from sweet potato (Ipomoea batatas cv. Tainung 57).
