label: "LA_1737 protein, C-terminal"
definition: >-
  This HMM represents a well-conserved C-terminal block of aligned sequence, about 160 amino acids long, from LA_1737 and homologs, all from Leptospira. Most full-length members of this family are between 1200 and 1800 amino acids in length.
