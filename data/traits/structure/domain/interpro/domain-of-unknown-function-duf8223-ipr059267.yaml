label: "Domain of unknown function DUF8223"
definition: >-
  This entry represents a domain found in uncharacterised plant proteins. It is predicted to fold into unique α/β structure consisting of a meander curved β-sheet and α-helices packed on one face of the sheet and sandwiched with another four-stranded small β-sheet.
