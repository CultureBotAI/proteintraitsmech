identifier: InterPro:IPR057264
label: "Large ribosomal subunit protein uL24, C-terminal domain"
definition: >-
  This entry describes the C-terminal domain in large ribosomal subunit protein uL24 (also known as RPL26). RPL26 is one of the proteins from the large ribosomal subunit. In their mature form, these proteins have 103 to 150 amino-acid residues. RPL26 makes a very minor contributions to the biogenesis, structure, and function of 60s ribosomal subunits. However, RPL24 is essential to generate the first intermediate during 50s ribosomal subunits assembly. RPL26 have an extra-ribosomal function to enhances p53 translation after DNA damage.
