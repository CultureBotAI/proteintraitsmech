identifier: InterPro:IPR058923
label: "RCC1-like domain"
definition: >-
  This entry represents the RCC1-like domain (RLD) of a number of proteins including human RCC1 (Regulator of chromosome condensation). These proteins are typically composed of 7 blades that form a propeller structure.
