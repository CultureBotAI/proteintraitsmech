label: "RGS domain"
definition: >-
  This entry represents a structural domain with a multi-helical fold consisting of a 4-helical bundle with a left-handed twist and an up-and-down topology. This domain can be divided into two all-α subdomains. This domain is found in regulation of G-protein signalling (RGS) proteins, as well as other related proteins, including: RGS4. RGS9. G-alpha interacting protein GaIP. Axin. p115RhoGEF. Pdz-RhoGEF. G-protein coupled receptor kinase 2 N-terminal domain. RGS (Regulator of G Protein Signalling) proteins are multi-functional, GTPase-accelerating proteins that promote GTP hydrolysis by the alpha subunit of heterotrimeric G proteins, thereby inactivating the G protein and rapidly switching off G protein-coupled receptor signalling pathways. Upon activation by GPCRs, heterotrimeric G proteins exchange GDP for GTP, are released from the receptor, and dissociate into free, active GTP-bound alpha subunit and beta-gamma dimer, both of which activate downstream effectors. The response is terminated upon GTP hydrolysis by the alpha subunit ( ), which can then bind the beta-gamma dimer ( , ) and the receptor. RGS proteins markedly reduce the lifespan of GTP-bound alpha subunits by stabilising the G protein transition state. All RGS proteins contain an 'RGS-box' (or RGS domain), which is required for activity. Some small RGS proteins such as RGS1 and RGS4 are comprised of little more than an RGS domain, while others also contain additional domains that confer further functionality. RGS domains can be found in conjunction with a variety of domains, including: DEP for membrane targeting ( ), PDZ for binding to GPCRs ( ), PTB for phosphotyrosine-binding ( ), RBD for Ras-binding ( ), GoLoco for guanine nucleotide inhibitor activity ( ), PX for phosphatidylinositol-binding ( ), PXA th…
