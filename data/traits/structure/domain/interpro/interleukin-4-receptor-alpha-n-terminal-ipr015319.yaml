identifier: InterPro:IPR015319
label: Interleukin-4 receptor alpha, N-terminal
definition: >-
  Interleukin-4 receptor is a type I transmembrane protein that can bind interleukin 4 and interleukin 13 to regulate IgE antibody production in B cells. Among T cells, the encoded protein also can bind interleukin 4 to promote differentiation of Th2 cells. A soluble form of the encoded protein can be produced by an alternate splice variant or by proteolysis of the membrane-bound protein, and this soluble form can inhibit IL4-mediated cell proliferation and IL5 upregulation by T-cells. Allelic variations in this gene have been associated with atopy, a condition that can manifest itself as allergic rhinitis, sinusitis, asthma, or eczema. The binding of IL-4 or IL-13 to the IL-4 receptor on the surface of macrophages results in the alternative activation of those macrophages. Alternatively activated macrophages downregulate inflammatory mediators such as during immune responses, particularly with regards to helminth infections. This entry represents the N-terminal (extracellular) portion of interleukin-4 receptor alpha, it is related in overall topology to fibronectin type III modules and folds into a sandwich comprising seven antiparallel β sheets arranged in a three-strand and a four-strand β-pleated sheet. They are required for binding of interleukin-4 to the receptor alpha chain, which is a crucial event for the generation of a Th2-dominated early immune response.
