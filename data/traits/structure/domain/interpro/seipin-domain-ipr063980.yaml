identifier: InterPro:IPR063980
label: "Seipin domain"
definition: >-
  This entry represents the seipin domain found in seipin proteins from fungi. Seipin is involved in lipid metabolism and lipid droplet morphology, number and size. The protein facilitates initiation of lipid droplet formation and ensures that vectorial budding of lipid droplets from the endoplasmic reticulum is directed towards the cytoplasm. Seipin is a multi-pass membrane protein that localises to the endoplasmic reticulum membrane and concentrates at endoplasmic reticulum-lipid droplet junctions. The protein forms a complex with LDB16 and belongs to the seipin family. Disruption results in supersized lipid droplets up to 50 times the volume of those in wild- type cells. This domain contains the characteristic structural features required for seipin function in lipid droplet biogenesis.
