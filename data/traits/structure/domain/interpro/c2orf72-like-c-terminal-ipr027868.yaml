identifier: InterPro:IPR027868
label: "C2orf72-like, C-terminal"
definition: >-
  This entry represents a domain found at the C-terminal of the human uncharacterised protein C2orf72 and similar sequences from vertebrates. C2orf72 may be used for the diagnosis of prostate cancer. This domain was previously known as DUF4630.
