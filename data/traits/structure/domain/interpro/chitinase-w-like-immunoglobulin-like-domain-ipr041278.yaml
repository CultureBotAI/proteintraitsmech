identifier: InterPro:IPR041278
label: "Chitinase W-like, immunoglobulin-like domain"
definition: >-
  This is an immunoglobulin like domain found in predicted ChiW from Clostridioides difficile ( ) and similar proteins mainly bacilli. ChiW has a multi-modular architecture composed of six domains to function efficiently on the cell surface: a right-handed β-helix domain (carbohydrate-binding module family 54, CBM-54), a Gly-Ser-rich loop, 1st immunoglobulin-like (Ig-like) fold domain, 1st β/α-barrel catalytic domain (glycoside hydrolase family 18, GH-18), 2nd Ig-like fold domain and 2nd β/α-barrel catalytic domain (GH-18).
definition_source: InterPro
trait_axis: STRUCTURE
trait_category: STRUCT_DOMAIN
