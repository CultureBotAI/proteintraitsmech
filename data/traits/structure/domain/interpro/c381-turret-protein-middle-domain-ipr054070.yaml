identifier: InterPro:IPR054070
label: "C381 turret protein, middle domain"
definition: >-
  This entry represents the middle jelly roll domain of the Sulfolobus turreted icosahedral virus (STIV) turret protein. The C381 turret protein is a component of the STIV virion vertex complex, which orchestrates virion assembly by coordinating interactions of the membrane and various protein components involved. The turret protein is apposed on the penton base C-terminal jelly-roll ring and forms a pentamer consisting of three consecutive layers of jelly-rolls, with each jelly-roll exhibiting different orientations. The interior of the C381 pentamer harbors two rather large cavities, which exhibit an overall positive electrostatic potential, suggesting that the turrets may act as STIV receptor-binding proteins carrying out recognition and attachment to the host receptors. The turret protein shares similarity with many carbohydrate-binding modules as well as domains involved in protein-protein interactions.
