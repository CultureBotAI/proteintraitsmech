identifier: InterPro:IPR059069
label: "Putative Dachshund-homology domain, metazoa"
definition: >-
  This entry represents an uncharacterised putative Dachshund-homology (DHD) domain that adopts a pseudo Winged helix fold. This domain is found in a range of uncharacterised metazoan proteins.
