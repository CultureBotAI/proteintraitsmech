identifier: InterPro:IPR056277
label: "AIP/AIPL, N-terminal FKBP-type PPIase domain"
definition: >-
  This is the FKBP-type peptidyl-prolyl cis/trans isomerase (PPIase) domain of human AH receptor-interacting protein (AIP), AIPL1 and similar animal proteins. AIP may play a positive role in AHR-mediated (aromatic hydrocarbon receptor) signalling. This domain shows a typical FKBP fold with five antiparallel β-strands forming a half β-barrel wrapped around a central α-helix and an additional N-terminal α-helix and a rather long insert that covers the putative active site.
