identifier: InterPro:IPR064045
label: "GLGC, left-handed parallel beta-helix domain"
definition: >-
  This entry represents the C-terminal left-handed parallel β helix (LbH) domain of glucose-1-phosphate adenylyltransferases (GLGC). GLGC catalyse the first committed and rate-limiting step in starch biosynthesis in plants and glycogen biosynthesis in bacteria. It is the enzymatic site for regulation of storage polysaccharide accumulation in plants and bacteria. The enzyme is a homotetramer. This domain contains the imperfect tandem repeats of a hexapeptide repeat motif (X-[STAV]-X-[LIV]-[GAED]-X). The LbH domain is involved in cooperative allosteric regulation and oligomerisation.
