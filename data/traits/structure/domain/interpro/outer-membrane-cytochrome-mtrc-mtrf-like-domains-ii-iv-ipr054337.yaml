identifier: InterPro:IPR054337
label: "Outer membrane cytochrome MtrC/MtrF-like, domains II/IV"
definition: >-
  This entry represents domains II and IV found in decaheme cytochrome c component MtrC from the MtrCAB complex and its homologues MtrF (which is part of the MtrFDE complex) and OmcA. In Shewanella oneidensis, these proteins are located at the bacterial cell surface at the termini of trans-outer-membrane electron transfer conduits and allow the utilization of extracellular mineral forms of iron and manganese as respiratory electron acceptors. MtrC/MtrF/OmcA consist of four domains: domain I and III contain seven antiparallel β-strands in an extended Greek key topology; domains II and IV each bind five tightly packed hemes covalently attached to the Cys residues of the five CXXCH motifs in each domain and form the central core, flanked by domains I ( ) and III ( ).
