identifier: InterPro:IPR063678
label: "Dachshund, C-terminal region"
definition: >-
  This entry represents the C-terminal region (DACHbox-C) of approximately 70 residues found in Dachshund homologue proteins (DACH1, DACH2) in Metazoa. This domain follows the N-terminal Ski_Sno_DHD domain ( ) which contains the DNA-binding DACHbox-N motif. This C-terminal region forms a coiled-coil and interacts with the corepressor SIN3A. Dachshund proteins are transcription factors that regulate organogenesis as part of the retinal determination gene network (RDGN) with SIX1/6 and EYA proteins. DACH1 inhibits TGF-beta signalling through interaction with SMAD4 and NCOR1.
