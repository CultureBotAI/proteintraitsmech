identifier: InterPro:IPR041116
label: "SMODS and SLOG-associating 2TM effector domain 3"
definition: >-
  The SLATT domain contains two transmembrane helices. SLATT domains are generally predicted to function as pore-forming effectors in a class of conflict systems which are reliant on the production of second messenger nucleotide or nucleotide derivatives. SLATT domains are predicted to initiate cell suicide responses upon their activation. This SLATT domain is always N-terminally fused to the SLATT_1 ( ), and is typically operonically linked to either inactive TIR domains or SLOG domains which could act as regulators of the SLATT channels.
