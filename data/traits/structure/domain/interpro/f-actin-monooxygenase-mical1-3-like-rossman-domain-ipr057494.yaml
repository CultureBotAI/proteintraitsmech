identifier: InterPro:IPR057494
label: "[F-actin]-monooxygenase MICAL1-3-like, Rossman domain"
definition: >-
  This domain is found towards the N terminus of a group of animal monooxygenases that play a crucial role in the regulation of the actin cytoskeleton, including [F-actin]-monooxygenase MICAL1-3 from humans. These enzymes promote the depolymerisation of F-actin by oxidising specific methionine residues on actin, leading to the formation of methionine-sulfoxide, which results in actin filament disassembly and prevents repolymerisation. This domain adopts a Rossman fold.
