label: "Metallophosphoesterase YhaO, middle domain"
definition: >-
  This entry represents the middle domain of YhaO and related metallophosphoesterases. It is located between the N-terminal metallophosphoesterase catalytic domain ( ) and a C-terminal domain. YhaO belongs to the metallophosphoesterase superfamily. In Bacillus subtilis, YhaO is induced by DNA-damaging agents such as mitomycin C and UV irradiation as
