identifier: InterPro:IPR048941
label: "ATG1-like, MIT domain 2"
definition: >-
  These proteins consist of a kinase domain at the N-terminal ( ) and two tandem microtubule interacting and transport (MIT) domains (tMIT) at the C-terminal which, in ATG1, mediates the interaction with ATG13. In ULK1-2, MIT domain control the regulatory function and localisation of the proteins and also mediate interactions with additional autophagy proteins. This is the C-terminal MIT domain (MIT2). Members of this entry are Serine/threonine-protein kinases, including Atg1 from yeasts, Unc-51 from C. elegans and Ulk1-2 from humans. Atg1 is required for vesicle formation in autophagy and the cytoplasm-to-vacuole targeting (Cvt) pathway. Ulk1-2 are involved in autophagy in response to starvation. Ulk1 and Ulk2 regulate filopodia extension and branching of sensory axons. They are important for axon growth, playing an essential role in neurite extension of cerebellar granule cells. Unc-51 is important for axonal elongation and axonal guidance. It is required for either the maintenance of axons (membrane turnover) or for an unknown neuronal function. C elegans worms lacking Unc-51 exhibit various abnormalities in axonal elongation and axonal structures. Unc-51 could also help control cell size along with Bec-1, as mutations in their corresponding genes results in a reduction in small body size without affecting cell number. Unc-51 is also a component of the Unc-51/Atg-13 complex that is probably recruited by lgg-1 to preautophagosomes and is required for autophagosome formation.
