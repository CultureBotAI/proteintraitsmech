identifier: InterPro:IPR006094
label: "FAD linked oxidase, N-terminal"
definition: >-
  Various enzymes use FAD as a co-factor, most of these enzymes are oxygen-dependent oxidoreductases, containing a covalently bound FAD group which is attached to a histidine via an 8-alpha-(N3-histidyl)-riboflavin linkage. One of the enzymes Vanillyl-alcohol oxidase (VAO, ) has a solved structure, the alignment includes the FAD binding site, called the PP-loop, between residues 99-110. The FAD molecule is covalently bound in the known structure, however the residue that links to the FAD is not in the alignment. VAO catalyses the oxidation of a wide variety of substrates, ranging from aromatic amines to 4-alkylphenols. Other enzymes included in this family are MurB family members UDP-N-acetylenolpyruvoylglucosamine reductases involved in the biosynthesis of peptidoglycan, D-lactate dehydrogenases among many others oxidoreductases.
