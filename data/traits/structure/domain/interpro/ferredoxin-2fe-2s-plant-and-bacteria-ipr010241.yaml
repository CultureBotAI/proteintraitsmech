identifier: InterPro:IPR010241
label: "Ferredoxin [2Fe-2S], plant and bacteria"
definition: >-
  2Fe-2S (also called plant type) ferredoxins occur as single-domain proteins or with a chloroplast transit peptide. In higher plants, ferredoxin is the unique soluble electron carrier protein located in the stroma, and a wide variety of essential metabolic and signalling processes depend upon the reduction by ferredoxin. Species tend to be photosynthetic, but several forms may occur in one species and individually may not be associated with photosynthesis. For instance, in Arabidopsis two ferredoxins are leaf-type that support high photosynthetic activity, while one is a root-type that is more efficiently reduced under non-photosynthetic conditions and supporting a higher activity of sulphite reduction. Ferredoxins are small, acidic, electron transfer proteins that are ubiquitous in biological redox systems. They have either 4Fe-4S, 3Fe-4S, or 2Fe-2S cluster. Among them, ferredoxin with one 2Fe-2S cluster per molecule are present in plants, animals, and bacteria, and form a distinct Ferredoxin family. They are proteins of around one hundred amino acids with four conserved cysteine residues to which the 2Fe-2S cluster is ligated. This conserved region is also found as a domain in various metabolic enzymes. Several structures of the 2Fe-2S ferredoxin-type domain have been determined. The domain is classified as a β-grasp, which is characterised as having a β-sheet comprised of four β-strands and one α-helix flanking the sheet. The two Fe atoms are coordinated tetrahedrally by the two inorganic S atoms and four cysteinyl S atoms.
