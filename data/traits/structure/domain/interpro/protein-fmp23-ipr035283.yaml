identifier: InterPro:IPR035283
label: "Protein Fmp23"
definition: >-
  This entry represents a domain covering the whole length of protein FMP23. It can also be found covering the C-terminal region. FMP23 gene encodes a putative mitochondrial protein involved in iron-copper homoeostasis. It was observed to be induced in response to ATX1 deletion and high copper conditions.
