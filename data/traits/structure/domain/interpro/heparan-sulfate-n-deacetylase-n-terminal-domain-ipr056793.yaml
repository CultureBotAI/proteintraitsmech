label: "Heparan sulfate-N-deacetylase, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Bifunctional heparan sulfate N-deacetylase/N-sulfotransferases, which is related to the N-terminal domain of Agd3 from A. fumigatus, a carbohydrate binding module (CBM), the founding member of CBM family 87. This domain is found associated with .
