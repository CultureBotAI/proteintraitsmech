identifier: InterPro:IPR047883
label: "Regulator of Ty1 transposition protein 103-like, CID domain"
definition: >-
  Yeast Rtt103 is a 3'-end RNA-processing and transcription termination factor that functions in DNA damage response. It associates with sites of DNA breaks and is essential for recovery from DNA double strand breaks in the chromosome. It forms homodimers through its C-terminal coiled-coil domain and, via the CID domain, it binds tightly to the repetitive sequence of the phosphorylated carboxy-terminal domain (CTD) of RNA polymerase (Pol) II (RNAP II). Rtt103 CID can bind CTD phosphorylated at Thr4 and Ser2 which facilitates transcription termination at protein-coding genes. It may preferentially interacts with CTD phosphorylated at Ser2. During transcription, RNAP II synthesizes eukaryotic messenger RNA. Transcription is coupled to RNA processing through the CTD. This entry represents the CID domain of Rtt103 and its homologues from yeast.
