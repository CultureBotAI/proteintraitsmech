identifier: InterPro:IPR042580
label: "AIRE, PHD finger 2"
definition: >-
  AIRE functions as a regulator of gene transcription in the thymus. It is essential for prevention of autoimmunity. AIRE plays a critical role in the induction of central tolerance. It promotes self-tolerance through tissue-specific antigen (TSA) expression. It also acts as an active regulator of chondrocyte differentiation. AIRE contains a homogeneously-staining region (HSR) or caspase-recruitment domain (CARD), a nuclear localization signal (NLS), a SAND (for Sp100, AIRE, nuclear phosphoprotein 41/75 or NucP41/75, and deformed epidermal auto regulatory factor 1 or Deaf1) domain, two plant homeodomain (PHD) fingers, and four LXXLL (where L stands for leucine) motifs.
