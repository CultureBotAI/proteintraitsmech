identifier: InterPro:IPR058642
label: "BRE1A/B-like domain"
definition: >-
  This domain is found in human E3 ubiquitin-protein ligase BRE1A/B and similar animal proteins. This domain shows an α-helical configuration. BRE1A (known as RNF20) and BRE1B (known as RNF40) form a heterodimeric E3 ubiquitin ligase complex essential for monoubiquitinating histone H2B at lysine 120, a key epigenetic mark influencing transcription, DNA repair, and chromatin remodelling
