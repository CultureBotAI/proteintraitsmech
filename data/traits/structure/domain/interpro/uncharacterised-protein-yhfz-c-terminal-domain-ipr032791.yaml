label: "Uncharacterised protein YhfZ, C-terminal domain"
definition: >-
  This domain is found in YhfZ proteins from Escherichia coli and Shigella flexneri. The crystal structure of this proteins is known ( ). This domain is often found in association with a helix-turn-helix domain.
