identifier: InterPro:IPR055910
label: "Domain of unknown function DUF7487"
definition: >-
  This entry represents a group of uncharacterised sequences mainly from viruses. They may have a novel repeat fold consisting of two domains at the N- and C-terminals with a β-hairpin-β-α configuration that are connected by nine α-helices linked by loops. This entry includes Uncharacterized protein 273R.
