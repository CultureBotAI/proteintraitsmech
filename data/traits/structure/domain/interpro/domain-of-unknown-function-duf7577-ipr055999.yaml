identifier: InterPro:IPR055999
label: "Domain of unknown function DUF7577"
definition: >-
  This entry represents a domain found in uncharacterised proteins from prokaryotes. It contains two pairs of conserved cysteines that are likely involved in metal coordination. This domain is predicted to structurally resemble Zinc beta-ribbon domains.
