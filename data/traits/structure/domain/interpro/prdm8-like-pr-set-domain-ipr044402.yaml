identifier: InterPro:IPR044402
label: "PRDM8-like, PR/SET domain"
definition: >-
  This entry represents the PR/SET domain found in PR domain zinc finger protein 8 (PRDM8). PRDM8 is a transcription factor that plays an essential role in the development of the mammalian retina. This entry also includes the Zinc finger protein 488 from zebra fish which may have histone methyltransferase activity. It negatively regulates shh signaling activity in pMN progenitor cells which prevents their switch from motor neuron to oligodendrocyte precursor cell production and it also regulates oligodendrocyte formation. It was originally named prdm8 but the gene name was later changed to znf488 in recognition of the fact that it is an orthologue of mammalian ZNF488 as supported by synteny and phylogenetics. In non-mammalian gnathostomes, znf488 has an N-terminal SET domain and C-terminal zinc fingers similar to PRDM8. The PRDM family members are characterised by the presence of a N-terminal PR (PRDI-BF1 and RIZ1 homology) domain followed by multiple zinc fingers which confer DNA binding activity. PR domains are only distantly related to the classical SET methyltransferase domains. They are involved in epigenetic regulation of gene expression through their intrinsic histone methyltransferase activity or via interactions with other chromatin modifying enzymes.
