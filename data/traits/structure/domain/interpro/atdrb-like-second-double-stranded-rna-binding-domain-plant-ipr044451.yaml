identifier: InterPro:IPR044451
label: "AtDRB-like, second double-stranded RNA binding domain, plant"
definition: >-
  This entry represents the second double-stranded RNA binding domain of Arabidopsis thaliana double-stranded RNA-binding proteins (AtDRB1-5). They bind double-stranded RNA (dsRNA) and may be involved in RNA-mediated silencing. Members of this family contain two to three double-stranded RNA binding motifs (DSRMs).
