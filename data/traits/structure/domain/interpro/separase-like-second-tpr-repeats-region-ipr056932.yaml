identifier: InterPro:IPR056932
label: "Separase-like, second TPR repeats region"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found in Separase from Arabidopsis thaliana (ESP1) and similar plant proteins. ESP1 is essential for embryo and endosperm development and may play a role in centromeric heterochromatin structure/formation during early meiosis, non-homologous centromere association and radial microtubule system.
