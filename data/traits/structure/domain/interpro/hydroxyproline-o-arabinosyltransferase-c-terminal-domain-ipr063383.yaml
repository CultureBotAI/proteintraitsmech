identifier: InterPro:IPR063383
label: "Hydroxyproline O-arabinosyltransferase, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the HPAT family. The Hydroxyproline O-arabinosyltransferase family is comprised of glycosyltransferases involved in the post-translational modification of plant proteins. Members of this family catalyze the transfer of L-arabinose to the hydroxyl group of hydroxyproline (Hyp) residues in target proteins, such as extensins and small signaling peptides. This modification is crucial for the proper function of these proteins, which play roles in plant structure and signaling. In legumes, some family members are also implicated in the autoregulation of nodulation (AON), a process that controls the number of root nodules formed in response to nitrogen availability and rhizobial colonization. They function upstream of receptor kinases like SUNN and through CLE peptides to regulate long-distance signaling events between the root and shoot.
