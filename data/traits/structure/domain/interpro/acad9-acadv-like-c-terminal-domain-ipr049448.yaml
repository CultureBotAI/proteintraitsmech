identifier: InterPro:IPR049448
label: "ACAD9/ACADV-like, C-terminal domain"
definition: >-
  This entry represents the second C-terminal domain from human Complex I assembly factor ACAD9 and Very long-chain specific acyl-CoA dehydrogenase (ACADV) and similar sequences predominantly found in animal and bacteria. Acyl-CoA dehydrogenases catalyse the alpha,beta-dehydrogenation of acyl-CoA thioesters to the corresponding trans 2,3-enoyl CoA-products with reduction of enzyme-bound FAD. They consist of an N-terminal all-α domain, a middle open (5,8) barrel domain and a four-helical bundle C-terminal domain. Members of the acyl-CoA dehydrogenase family differ in the number of C-terminal domains. ACAD9 primarily participates in the assembly of the mitochondrial complex I and therefore plays a role in oxidative phosphorylation [ , ,. It does not seem to play a primary role in fatty acid oxidation in vivo.
