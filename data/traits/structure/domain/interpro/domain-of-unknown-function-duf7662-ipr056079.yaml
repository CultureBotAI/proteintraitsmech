identifier: InterPro:IPR056079
label: "Domain of unknown function DUF7662"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is frequently found in combination with and which suggests that it may be involved in DNA binding and recognition. It is predicted to adopt a globular structure consisting of a three-stranded antiparallel β-sheet and α-helices packed on one side of it.
