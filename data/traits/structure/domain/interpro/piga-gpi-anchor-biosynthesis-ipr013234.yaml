identifier: InterPro:IPR013234
label: "PIGA, GPI anchor biosynthesis"
definition: >-
  This domain is found on phosphatidylinositol N-acetylglucosaminyltransferase proteins. These proteins are involved in GPI anchor biosynthesis and are associated with the disease paroxysmal nocturnal haemoglobinuria.
