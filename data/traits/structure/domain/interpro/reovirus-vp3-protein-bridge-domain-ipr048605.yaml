identifier: InterPro:IPR048605
label: "Reovirus VP3 protein, bridge domain"
definition: >-
  Cytoplasmic polyhedrosis virus (CPV) has a turreted single-layer capsid consisting of 12 pentameric turrets on the five-fold vertices. Each turret has one Turret protein (TP), also known as VP3 ( ), which shows a polyhedrin-binding domain (PBD), a guanylyltransferase (GTase) domain ( ), two methylase domains ( and ) and a bridge domain (this entry), which has two discontinuous regions.
