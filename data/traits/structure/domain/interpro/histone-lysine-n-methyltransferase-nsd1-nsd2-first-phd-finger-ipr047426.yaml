label: "Histone-lysine N-methyltransferase NSD1 / NSD2, first PHD finger"
definition: >-
  This entry represents the first PHD finger found in NSD1 and NSD2, and similar sequences from vertebrates. Nuclear receptor-binding SET domain-containing protein 1 (NSD1), also called Histone-lysine N-methyltransferase H3 lysine-36 specific, is a lysine methyltransferase that preferentially methylates H3 on Lysine36 (H3-K36) and H4 on Lysine20 (H4-K20), which is primarily associated with active transcription. It plays a role in several pathologies, including but not limited to Sotos and Weaver syndromes, acute myeloid leukaemia, breast cancer, neuroblastoma, and glioblastoma formation. It can alter transcription by interacting with the protein NSD1-interacting zinc finger protein 1 (NIZP1). It also mitigates caspase-1 activation by listeriolysin o (LLO) in macrophages, and requires functional LLO for the regulation of IL-1beta secretion. Moreover, NSD1 regulates RNA polymerase II (RNAP II) recruitment to bone morphogenetic protein 4 (BMP4). Histone-lysine N-methyltransferase NSD2 is overexpressed frequently in the t(4;14) translocation in 15% to 20% of multiple myeloma. It plays important roles in cancer cell proliferation, survival, and tumour growth, by mediating constitutive NF-kappaB signalling via the cytokine autocrine loop. It also enhances androgen receptor (AR)-mediated transcription. The principal chromatin-regulatory activity of NSD2 is dimethylation of histone H3 at lysine 36 (H3K36me2). Both NSD1 and NSD2 contain a catalytic suppressor of variegation, enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-proline (PWWP) domains, five plant homeodomain (PHD) fingers, and an NSD-specific Cys-His rich domain (Cys5HisCysHis). In addition, NSD2 harbors a high mobility group (HMG) box. The SET domain is responsible for histone methyltran…
