identifier: InterPro:IPR040707
label: "Phosphoribosylformylglycinamidine synthase, N-terminal"
definition: >-
  This is the N-terminal domain found in formylglycinamide ribonucleotide amidotransferase (FGAR-AT), also known as phosphoribosylformylglycinamidine synthase ( ), PurL and formylglycinamidine ribonucleotide (FGAM) synthase. This enzyme catalyzes the ATP-dependent conversion of formylglycinamide ribonucleotide and glutamine to formylglycinamidine ribonucleotide, ADP, Pi, and glutamate in the fourth step of the purine biosynthetic pathway.
