identifier: InterPro:IPR010537
label: "Avian adenovirus fibre, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the avian adenovirus fibre proteins, which have been linked to variations in virulence. Avian adenoviruses possess penton capsomers that consist of a pentameric base associated with two fibres.
