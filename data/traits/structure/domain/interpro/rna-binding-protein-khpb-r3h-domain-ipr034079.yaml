identifier: InterPro:IPR034079
label: RNA-binding protein KhpB, R3H domain
definition: >-
  R3H domain found in proteins homologous to Bacillus subtilis RNA-binding protein KhpB (also known as Jag/EloR), which is associated with SpoIIIJ. SpoIIIJ is necessary for the third stage of sporulation. It forms a complex with KhpA which binds to cellular RNA and controls its expression. It also plays a role in peptidoglycan (PG) homeostasis and cell length regulation. The R3H domain is a conserved sequence motif found in proteins from a diverse range of organisms including eubacteria, green plants, fungi and various groups of metazoans, but not in archaea and Escherichia coli. The domain is named R3H because it contains an invariant arginine and a highly conserved histidine, that are separated by three residues. It also displays a conserved pattern of hydrophobic residues, prolines and glycines. It can be found alone, in association with AAA domain or with various DNA/RNA binding domains like DSRM, KH, G-patch, PHD, DEAD box, or RRM. The functions of these domains indicate that the R3H domain might be involved in polynucleotide-binding, including DNA, RNA and single-stranded DNA. The 3D structure of the R3H domain has been solved. The fold presents a small motif, consisting of a three-stranded antiparallel β-sheet, against which two α-helices pack from one side. This fold is related to the structures of the YhhP protein and the C-terminal domain of the translational initiation factor IF3. Three conserved basic residues cluster on the same face of the R3H domain and could play a role in nucleic acid recognition. An extended hydrophobic area at a different site of the molecular surface could act as a protein-binding site.
