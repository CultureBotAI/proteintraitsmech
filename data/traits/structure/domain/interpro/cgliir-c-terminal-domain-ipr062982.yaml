identifier: InterPro:IPR062982
label: "CglIIR, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the H-subunit found in CglI-like Type I restriction endonucleases (cglIIR). The domain has a unique fold comprising a 5-stranded mixed β sheet flanked by four α helices. The crystal structure ( ) reveals a positively charged surface patch formed by residues on helices alphaC1, alphaC2 and alphaC3, which is involved in DNA binding. This domain works together with the adjacent Z1 domain ( ) to form the principal DNA binding interface of the H-subunit. Both C-terminal domains within the heterotetrameric R2H2 complex are required for efficient ATPase and DNA cleavage activities. The domain is found primarily in Bacillota and Pseudomonadota.
