identifier: InterPro:IPR049171
label: "Alpha-1,4-glucan:maltose-1-phosphate maltosyltransferase, C-terminal"
definition: >-
  This entry represents the C-terminal domain of alpha-1,4-glucan:maltose-1-phosphate maltosyltransferases (GLGE) which has an all-β fold. This domain, referred to domain C, together with the catalytic one, is involved in the binding of alpha-glucan chains.
