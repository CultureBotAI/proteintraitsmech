identifier: InterPro:IPR048484
label: "APOLTP domain"
definition: >-
  This entry represents the human protein APOLTP (Apolipoprotein lipid transfer particle homolog, also known as LOC400499, ( ) and similar sequences from vertebrates. It has a remarkable high confidence structure prediction showing an extended single β-sheet composed of a single long meander. No obvious sequence repeat is present in the sequence. Some members of this group contain lipovitellin homologous regions additionally to the N terminus of this family. Lipovitellin contains similar open β-structures which are used to bind to lipids suggesting that this family may also be involved in lipid binding and storage.
