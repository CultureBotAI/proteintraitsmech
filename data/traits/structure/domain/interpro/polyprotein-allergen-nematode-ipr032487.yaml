identifier: InterPro:IPR032487
label: "Polyprotein allergen, nematode"
definition: >-
  The polyprotein allergens from certain nematoda, such as ABA-1 from Ascari and DvA-1 from Dictyocaulus viviparus, are lipid-binding proteins comprising multiple tandem repeats of this domain.
