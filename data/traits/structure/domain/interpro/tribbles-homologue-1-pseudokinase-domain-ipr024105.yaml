identifier: InterPro:IPR024105
label: "Tribbles homologue 1, pseudokinase domain"
definition: >-
  Tribbles encode an evolutionarily conserved protein family that influences proliferation, motility, metabolism, and oncogenic transformation. Originally identified in Drosophila, tribbles homologues are characterised by a central serine/threonine kinase-like domain (KD) and a C-terminal binding site for E3 ubiquitin ligases. Although the KD is the defining feature of the tribbles family, these proteins are considered to be catalytically inactive because they lack conserved residues from the characteristic adenosine triphosphate binding site and catalytic core motif within the KD. TRB-1, TRB-2 and TRB-3 are the mammalian homologues of Drosophila tribbles. This entry represents the pseudokinase domain of TRB-1, which interacts with and regulates activation of MAP kinases. TRB-1 may not display kinase activity. It regulates vascular smooth muscle cell proliferation and chemotaxis through the JNK signalling pathway. It is found to be down-regulated in human acute myeloid leukaemia (AML) and may play a role in the pathogenesis of the disease. It has also been identified as a potential biomarker for antibody-mediated allograft failure.
