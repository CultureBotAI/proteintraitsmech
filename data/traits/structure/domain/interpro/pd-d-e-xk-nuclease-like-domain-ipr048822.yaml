identifier: InterPro:IPR048822
label: "PD-(D/E)XK nuclease-like domain"
definition: >-
  This entry represents a domain present in a group of bacterial uncharacterised proteins. Structure prediction suggests it is likely to be part of endonuclease enzymes related to the PD-(D/E)XK nuclease superfamily.
