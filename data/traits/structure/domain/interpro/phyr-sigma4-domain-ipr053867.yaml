identifier: InterPro:IPR053867
label: "PhyR, sigma4 domain"
definition: >-
  This entry represents a domain of PhyR, a signal transduction response regulator, and related proteins found mainly in Alphaproteobacteria. PhyR contains a C-terminal receiver domain ( ) and extracytoplasmic function (ECF) σ-like (SL) domain at the N terminus. The SL domain consists of sigma2 and sigma4 subdomains with the latter represented by this entry. PhyR is the regulator of the two-component signal transduction system which controls transcription in response to general stress.
