identifier: InterPro:IPR013151
label: "Immunoglobulin-like beta-sandwich domain"
definition: >-
  This entry represents the immunoglobulin-like domain that is found in a number of proteins with diverse functions. Examples include T-cell surface glycoprotein CD4, Neurotrimin, Interleukin-1 receptor accessory protein-like 1, Receptor tyrosine kinases among others. Immunoglobulin-like domains may be involved in protein-protein and protein-ligand interactions.
