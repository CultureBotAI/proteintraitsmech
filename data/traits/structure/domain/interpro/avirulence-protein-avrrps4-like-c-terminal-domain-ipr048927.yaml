identifier: InterPro:IPR048927
label: "Avirulence protein AvrRps4-like, C-terminal domain"
definition: >-
  This domain is found in the C-terminal of Avirulence protein from Pseudomonas syringae (AvrRps4, ) and in similar sequences from plant pathogenic bacteria. AvrRps4, a causal agent of bacterial blight in pea, is a type III secretion system effector protein that triggers triggers RPS4 (resistance to P. syringae 4)-dependent immunity in resistant accessions of Arabidopsis. This domain folds into an antiparallel α-helical coiled-coil structure.
