identifier: InterPro:IPR049109
label: "Target of Nesh-SH3/FNDC1, C-terminal domain"
definition: >-
  This domain is found at the C terminus of the Target of Nesh-SH3 (also known as ABI3BP protein ) and Fibronectin type III domain-containing protein 1 (FNDC1). Proteins containing this domain are found mainly in chordates.
