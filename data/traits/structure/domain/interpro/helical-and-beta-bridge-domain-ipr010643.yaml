identifier: InterPro:IPR010643
label: "Helical and beta-bridge domain"
definition: >-
  HBB is the domain on DEAD-box eukaryotic DNA repair helicases ([ec:3.6.1.-]) that appears to be a unique fold. It's conformation is of α-helices 12-16 plus a short β-bridge to the FeS-cluster domain at the N-terminal. The full-length XPD protein verifies the presence of damage to DNA and allows DNA repair to proceed. XPD is an assembly of several domains to form a doughnut-shaped molecule that is able to separate two DNA strands and scan the DNA for damage. HBB helps to form the overall DNA-clamping architecture. This family represents a conserved region within a number of eukaryotic and prokaryotic DNA repair helicases ([ec:3.6.1.-]).
