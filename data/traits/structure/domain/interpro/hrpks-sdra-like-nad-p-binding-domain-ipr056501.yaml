identifier: InterPro:IPR056501
label: "HRPKS sdrA-like, NAD(P)-binding domain"
definition: >-
  This domain is found in Highly reducing polyketide synthase srdA from Neurospora crassa (HRPKS sdrA) and similar fungal proteins. HRPKS sdrA is part of the gene cluster that mediates the biosynthesis of sordarial, a salicylic aldehyde structurally related to the phytotoxin pyriculol. This domain is predicted to adopt a Rossmann-type fold.
