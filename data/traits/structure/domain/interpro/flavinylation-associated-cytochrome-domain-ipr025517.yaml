identifier: InterPro:IPR025517
label: "Flavinylation-associated cytochrome domain"
definition: >-
  This domain is found in a group of uncharacterised prokaryotic proteins. Proteins in this group are thought to mediate flavinylation-associated electron transfer in the cytoplasmic membrane and constitute a novel class of cytochromes. There are two conserved histidines in this domain, which are predicted to bind to two haem cofactors.
