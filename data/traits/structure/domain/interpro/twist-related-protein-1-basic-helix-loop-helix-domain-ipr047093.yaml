identifier: InterPro:IPR047093
label: "Twist-related protein 1, basic helix-loop-helix domain"
definition: >-
  This entry represents the basic helix-loop-helix (bHLH) domain found in Twist1 and related proteins mainly from vertebrates. Twist-related protein 1 (Twist1) is a bHLH transcriptional regulator that inhibits myogenesis by sequestrating E proteins, inhibiting trans-activation by MEF2, and inhibiting DNA-binding by MYOD1 through physical interaction. It also represses expression of proinflammatory cytokines such as TNFA and IL1B and plays an essential role in tooth morphogenesis. In addition, Twist1 is involved in cancer development and progression. Mutations in this protein are associated with other genetic human diseases with symptoms related to malformations.
