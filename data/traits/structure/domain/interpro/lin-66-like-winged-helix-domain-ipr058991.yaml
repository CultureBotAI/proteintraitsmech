identifier: InterPro:IPR058991
label: "Lin-66-like, winged helix domain"
definition: >-
  This entry represents a winged helix domain (WHD) found in Lin-66 and related proteins from nematodes. This domain is usually the N-terminal domain of a pair of adjacent winged helix domains.
