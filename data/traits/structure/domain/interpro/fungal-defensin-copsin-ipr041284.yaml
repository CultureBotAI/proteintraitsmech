identifier: InterPro:IPR041284
label: "Fungal defensin Copsin"
definition: >-
  This domain is present in Copsin from Coprinopsis cinerea. Copsin is a defensin that interferes with peptidoglycan synthesis and has a CS-α-β fold. Copsin is stabilized by a unique connectivity of six cysteine bonds in contrast to most other CS-α-β defensins which are linked by three or four disulfide bonds.
