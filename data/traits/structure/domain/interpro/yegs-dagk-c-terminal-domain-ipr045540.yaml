identifier: InterPro:IPR045540
label: "YegS/DAGK, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of putative lipid kinase YegS and diacylglycerol kinase DAGK from bacteria. This domain can also be found in eukaryotic sphingosine kinases, such as sphingosine kinase 2 from animals and plants. This domain is related to the β sandwich domain of NAD kinases. The structure of YegS reveals a two-domain protein with the active site cleft found between the two domains. The C-terminal domain contains 13 β-strands and two α-helices. The likely substrate for YegS is phosphatidylglycerol.
