identifier: InterPro:IPR047905
label: "MARCHF4, RING-CH finger C4HC3-type"
definition: >-
  This entry represents the C4HC3-type RING-CH finger of MARCHF4. MARCH4 and MARCH9 belong to the family of MARCH E3 ligases. They downregulate major histocompatibility complex-I (MHC-I). In the presence of MARCH4 or MARCH9, MHC-I can be ubiquitinated and rapidly internalised by endocytosis, whereas MHC-I molecules lacking lysines in their cytoplasmic tail are resistant to downregulation. Moreover, MARCH4 and MARCH9, but not other MARCH proteins, can associate with Mult1 and prevent Mult1 expression at the cell surface in a lysine-dependent manner that can be reversed by heat shocking the cells. MARCHF4 appears to be mainly expressed in the brain. MARCHF9 controls the expression of the critical cell adhesion molecule ICAM-1. Both MARCH4 and MARCH9 contain an N-terminal C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, followed by two transmembrane regions.
