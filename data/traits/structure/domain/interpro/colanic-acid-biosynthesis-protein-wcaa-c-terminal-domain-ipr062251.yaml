identifier: InterPro:IPR062251
label: "Colanic acid biosynthesis protein WcaA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of putative colanic acid biosynthesis glycosyl transferase WcaA, found in bacteria. WcaA is involved in the biosynthesis of colanic acid, an exopolysaccharide that forms a protective capsule around bacterial cells.
