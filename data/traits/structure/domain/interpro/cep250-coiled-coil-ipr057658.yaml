identifier: InterPro:IPR057658
label: "CEP250, coiled coil"
definition: >-
  This domain is found in the human Centrosomal protein 250 kDa (CEP250) and its homologues mainly from vertebrates. CEP250 plays an important role in centrosome cohesion during interphase by recruiting CCDC102B to the proximal ends of centriole. This domain interacts with FKBP12 and this interaction is mediated by small molecules such as WDB002.
