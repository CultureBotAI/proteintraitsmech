identifier: InterPro:IPR004258
label: "Duffy-binding-like domain"
definition: >-
  Plasmodium Duffy Binding-Like (DBL) domains mediate diverse receptor-ligand interactions critical for invasion, cytoadherence, sequestration and the pathogenesis of malaria. Members of the erythrocyte binding-like (EBL) superfamily contain one or two extracellular cysteine-rich DBL domains.
