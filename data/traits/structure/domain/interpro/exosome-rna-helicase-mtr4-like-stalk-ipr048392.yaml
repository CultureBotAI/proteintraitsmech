identifier: InterPro:IPR048392
label: "Exosome RNA helicase MTR4-like, stalk"
definition: >-
  This entry represents the helical stalk found at the N-terminal of KOW β-barrel from MTR4. This entry also includes Ski2-like helicases which have an overall similar structure to MTR4 proteins. However, Ski2 from yeast does not have the KOW motif and the β-barrel is tightly packed against the helical stalk. Exosome RNA helicase Mtr4 is a essential RNA helicase, and is an exosome-activating cofactor. It functions together with the nuclear exosome being involved in processing of structured RNAs, including snRNAs and snoRNAs. It also plays a role in nuclear RNA surveillance pathways involving the so-called TRAMP complex. It contains an arch domain, required for proper 5.8S rRNA processing, and appears to function independently of canonical helicase activity. The arch domain comprises an helical stalk/elbow that flanks a KOW module which adopts a β-barrel fold.
