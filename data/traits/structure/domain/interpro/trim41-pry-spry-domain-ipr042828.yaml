identifier: InterPro:IPR042828
label: "TRIM41, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of tripartite motif-containing protein 41 (TRIM41). TRIM41 (also known as RING finger-interacting protein with C kinase or RINCK) is localized to speckles in the cytoplasm and nucleus, and functions as an E3 ligase that catalyses the ubiquitin-mediated degradation of protein kinase C.
