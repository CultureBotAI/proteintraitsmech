identifier: InterPro:IPR060551
label: "ANKRD40-like, ubiquitin-like domain"
definition: >-
  This entry represents an ubiquitin-like fold domain found in ANKRD40 (ankyrin repeat domain-containing protein 40) and similar animal proteins. ANKRD40 proteins show tissue-enhanced expression in brain and other tissues. The proteins contain multiple disordered regions with compositional bias towards proline and acidic residues. The ubiquitin-like fold suggests potential roles in protein modification or signalling pathways.
