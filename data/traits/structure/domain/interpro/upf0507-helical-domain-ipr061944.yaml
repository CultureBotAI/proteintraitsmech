identifier: InterPro:IPR061944
label: "UPF0507, helical domain"
definition: >-
  This entry represents a helical domain found in UPF0507 family proteins in fungi. The UPF0507 family contains proteins with diverse domain architectures that are involved in endosomal transport processes. These proteins typically contain VPS9 domains ( ) which function as guanyl-nucleotide exchange factors for Rab GTPases. Some family members also contain ankyrin repeats and PX domains ( ) for phosphatidylinositol binding. This helical domain can be found at different positions within the protein architecture, occurring either in the middle region or towards the C-terminal region, often in association with the VPS9 domain. Some members are predicted to be involved in early to late endosome transport and SNARE binding based on computational analysis. The specific function of this domain remains to be determined.
