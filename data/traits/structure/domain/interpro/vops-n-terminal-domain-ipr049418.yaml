identifier: InterPro:IPR049418
label: "VopS, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of VopS from Vibrio parahaemolyticus and similar sequences from gammaproteobacteria. VopS is an adenylyltransferase involved in virulence by provoking the disruption of Rho GTPase signalling and the inhibition of actin assembly in infected cells. This domain is required for full activity of VopS. It consists of nine α-helices.
