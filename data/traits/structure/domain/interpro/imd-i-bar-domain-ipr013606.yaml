identifier: InterPro:IPR013606
label: "IMD/I-BAR domain"
definition: >-
  The I-BAR domain (also known as IMD domain, IRSp53 and MIM homology domain) is a BAR-like domain of approximately 250 amino acids found at the N-terminal in the IRSp53 (insulin receptor tyrosine kinase substrate p53) and in the evolutionarily related IRSp53/MIM family. The BAR domain forms an anti-parallel all-helical dimer, with a curved (banana-like) shape, that promotes membrane tubulation. The BAR domain containing proteins can be classified into three types: BAR, F-BAR and I-BAR. BAR and F-BAR proteins generate positive membrane curvature, while I-BAR proteins induce negative curvature. The I-BAR domain containing proteins include: Vertebrate MIM (missing in metastasis, also known as Protein MTSS 1), an actin-binding scaffold protein that may be involved in cancer metastasis. Vertebrate ABBA, a MIM-related protein (also known as Protein MTSS 2). Vertebrate insulin receptor tyrosine kinase substrate p53 (IRSp53, also known as BAR/IMD domain-containing adapter protein 2), a multifunctional adaptor protein that links Rac1 with a Wiskott-Aldrich syndrome family verprolin-homologous protein 2 (WAVE2) to induce lamellipodia or Cdc42 with Mena to induce filopodia. Vertebrate IRTKS (also known as BAR/IMD domain-containing adapter protein 2-like 1), which plays a role in the reorganization of the actin cytoskeleton in response to bacterial infection. Vertebrate Pinkbar (also known as BAR/IMD domain-containing adapter protein 2-like 2), which induces the formation of planar or gently curved membrane structures. Caenorhabditis elegans M04F3.5 protein. The vertebrate I-BAR family is divided into two major groups: the IRSp53/IRTKS/Pinkbar subfamily and the MIM/ABBA subfamily. The putative invertebrate homologues are positioned between them. The IRSp53/IRTKS/Pinkbar subfamily m…
