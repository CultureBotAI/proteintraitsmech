identifier: InterPro:IPR047882
label: "RPRD1B, CID domain"
definition: >-
  Regulation of nuclear pre-mRNA domain-containing protein 1B (RPRD1B, also called CREPT for cell cycle-related and expression-elevated protein in tumor) is a CID containing protein that co-purifies with RNA polymerase (Pol) II (RNAP II) and three other RNAP II-associated proteins, RPAP2, GRINL1A and RECQL5, but not with the Mediator complex. CID binds tightly to the carboxy-terminal domain (CTD) of RNAP II. During transcription, RNAP II synthesizes eukaryotic messenger RNA. Transcription is coupled to RNA processing through the CTD. RPRD1B form homodimers and heterodimers with RPRD1A through their coiled-coil domains. Both RPRD1A and RPRD1B associate directly with RPAP2 phosphatase and serve as CTD scaffolds to coordinate the dephosphorylation of phospho-S5 by RPAP2. RPRD1B is highly expressed during tumorigenesis and in endometrial cancer; it has been shown to promote tumor growth by accelerating the cell cycle. This entry represents the CID domain of RPRD1B.
