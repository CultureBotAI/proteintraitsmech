identifier: InterPro:IPR034240
label: "eIF3G, RNA recognition motif"
definition: >-
  This entry represents the RNA recognition motif (RRM) of eIF-3G (Eukaryotic translation initiation factor 3 subunit G) and similar proteins. eIF-3G is the RNA-binding subunit of eIF3, a large multisubunit complex that plays a central role in the initiation of translation by binding to the 40 S ribosomal subunit and promoting the binding of methionyl-tRNAi and mRNA. eIF-3G binds 18 S rRNA and beta-globin mRNA, and therefore appears to be a nonspecific RNA-binding protein. eIF-3G is one of the cytosolic targets and interacts with mature apoptosis-inducing factor (AIF). eIF-3G contains one RNA recognition motif (RRM). Proteins containing this motif include yeast eIF3-p33 (also known as Tif35). eIF3-p33 is a homologue of vertebrate eIF-3G, and plays an important role in the initiation phase of protein synthesis. It binds both mRNA and rRNA fragments due to an RRM near its C terminus.
