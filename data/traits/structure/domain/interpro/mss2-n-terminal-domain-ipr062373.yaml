identifier: InterPro:IPR062373
label: "MSS2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the mitochondrial protein MSS2. MSS2 is required to stabilise mitochondrial cytochrome C oxidase subunit 2 (COX2) and to translocate the C-terminal domain of COX2 through the inner membrane. The full-length protein contains C-terminal TPR repeats ( ). MSS2 is found in the mitochondrial inner membrane and interacts with COX18. The specific function of this N-terminal domain remains to be determined.
