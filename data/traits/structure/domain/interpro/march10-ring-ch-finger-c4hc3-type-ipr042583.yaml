identifier: InterPro:IPR042583
label: "MARCH10, RING-CH finger, C4HC3-type"
definition: >-
  MARCH10 is a microtubule-associated E3 ubiquitin ligase of developing spermatids. It is localized to the principal piece of elongating spermatids. MARCH10 is involved in spermiogenesis by regulating the formation and maintenance of the flagella in developing spermatids. Unlike other MARCH proteins, MARCH10 is predicted to have no transmembrane spanning region. It harbours a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, that is responsible for its E3 activity.
