identifier: InterPro:IPR028110
label: "Transmembrane protein 254"
definition: >-
  This entry represents transmembrane protein 254 (TMEM254) proteins found in mammals. This entry also includes some longer proteins that possess an N-terminal dehydrogenase domain ( ) such as Strobilurin A biosynthesis cluster protein r1. This entry includes Uncharacterized membrane protein C688.16 from Schizosaccharomyces pombe. TMEM254 is predicted to be an integral membrane protein in the endoplasmic reticulum or Golgi membrane.
