identifier: InterPro:IPR047957
label: "Alkaline protease secretion ATP-binding protein AprD-like, 6TM domain"
definition: >-
  This entry represents the six-transmembrane helical domain (6-TMD) of the ABC subunit in the type 1 secretion systems (T1SS) such as AprD/PrtD, which is the integral membrane ATP-binding cassette component of the Dickeya dadantii ( formerly known as Erwinia chrysanthemi) metalloprotease secretion system (PrtDEF). T1SS are found in pathogenic Gram-negative bacteria (such as Escherichia coli, Vibrio cholerae or Bordetella pertussis) to export proteins (often proteases) across both inner and outer membranes to the extracellular medium. This is one of three proteins of the type I secretion apparatus. The Aquifex aeolicus PrtDEF of T1SS is composed of an inner-membrane ABC transporter (PrtD), a periplasmic membrane-fusion protein (PrtE), and an outer-membrane porin (PrtF). These three components assemble into complex spanning both membranes and provide a channel for the translocation of unfolded polypeptides.
