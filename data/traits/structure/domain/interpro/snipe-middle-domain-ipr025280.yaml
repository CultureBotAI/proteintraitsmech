identifier: InterPro:IPR025280
label: "SNIPE middle domain"
definition: >-
  This entry represents a small largely α-helical domain found central in the SNIPE protein family. SNIPE proteins cleave phage DNA during genome injection. SNIPE proteins contain a functional C-terminal GIY-YIG nuclease domain, a central domain (this entry) that facilitates DNA binding, and a transmembrane domain that anchors SNIPE to the inner membrane, preventing autoimmune cleavage of host DNA. This domain binds to the phage tape measure protein and likely binds to phage DNA during genome injection.
