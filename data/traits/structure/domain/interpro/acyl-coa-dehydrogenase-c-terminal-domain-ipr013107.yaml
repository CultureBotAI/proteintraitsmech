identifier: InterPro:IPR013107
label: "Acyl-CoA dehydrogenase, C-terminal domain"
definition: >-
  Acyl Co-A dehydrogenases ( ) are enzymes that catalyse the first step in each cycle of beta-oxidation in mitochondion. Acyl-CoA dehydrogenases catalyse the alpha,beta-dehydrogenation of acyl-CoA thioesters to the corresponding trans 2,3-enoyl CoA-products with concomitant reduction of enzyme-bound FAD. Reoxidation of the flavin involves transfer of electrons to ETF (electron transferring flavoprotein). These enzymes are homodimers containing one molecule of FAD. The monomeric enzyme is folded into three domains of approximately equal size. The N-terminal and the C-terminal are mainly α-helices packed together, and the middle domain consists of two orthogonal β-sheets. The flavin ring is buried in the crevice between two α-helical domains and the β-sheet of one subunit, and the adenosine pyrophosphate moiety is stretched into the subunit junction with one formed by two C-terminal domains. The C-terminal domain of Acyl-CoA dehydrogenase is an all-α, four helical up-and-down bundle. This entry represents the C-terminal domain found in a group of related oxidoreductases, including HsaA, Indole-3-acetate monooxygenase and pigment production hydroxylases.
