identifier: InterPro:IPR017703
label: "YgfZ/CAF17, C-terminal"
definition: >-
  This entry represents the C-terminal region of YgfZ from Escherichia coli, which includes includes the conserved motif KGCYxGQE. This domain is also found in the eukaryotic homologue - CAF17 (Iron-sulfur cluster assembly factor IBA57 homolog, IBA57), which apparently has a critical role in the proper formation of either iron-sulfur clusters themselves or some iron-sulfur cluster-containing proteins. YgfZ protein has N-terminal sequence similarity to the aminomethyltransferase GcvT of the glycine cleavage system. YgfZ is needed for activity of the radical S-adenosyl methionine [4Fe-4S] cluster enzyme MiaB which thiomethylates some tRNAs. The growth of cells lacking YgfZ is compromised especially at low temperature. It is also essential for the RimO enzyme activity which thiomethylates a conserved aspartic acid in ribosomal protein S12. The glycine cleavage multienzyme complex (GCV) catalyses the catabolism of glycine in eukaryotes. GCVT (aminomethyltransferase, ) is a folate-dependent enzyme that catalyses the release of ammonia and the transfer of the methylene carbon unit (C1 unit) to tetrahydrofolate (H4folate) from the aminomethyl intermediate attached to the lipoate cofactor of H-protein. GCV is found in bacteria and the mitochondria of eukaryotes. Mutations in the human GCVT gene are known to cause nonketotic hyperglycinemia.
