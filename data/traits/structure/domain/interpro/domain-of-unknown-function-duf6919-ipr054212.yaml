label: "Domain of unknown function DUF6919"
definition: >-
  This domain is found standalone or in combination with other domains mainly from bacteria. Its function is unknown but it has a significant sequence similarity to the C-terminal SAM-binding regulatory domain of 5,10-methylenetetrahydrofolate reductase (MTHFR).
