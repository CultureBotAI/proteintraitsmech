identifier: InterPro:IPR002546
label: "Myogenic muscle-specific protein, N-terminal"
definition: >-
  Members of the bHLH family of transcription factors share homology within a basic domain and an adjacent helix-loop-helix motif. Myogenic factor MyoD belongs to the bHLH family. This domain can be found at the N terminus of MyoD, which is muscle specific protein that control muscle development. This domain includes the predicted N-terminal transcription activation domain and part of the basic domain.
