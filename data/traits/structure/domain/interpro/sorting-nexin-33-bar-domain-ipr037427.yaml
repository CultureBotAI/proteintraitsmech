identifier: InterPro:IPR037427
label: "Sorting nexin-33, BAR domain"
definition: >-
  Sorting nexins are a large family of evolutionarily conserved phosphoinositide-binding proteins that have roles in cargo sorting through the endosomal netwrok. Sorting nexins contain at least a PX domain (a phospholipid-binding motif). Some nexins contain a few additional domains. SNX33 plays a role in maintaining cell shape and cell cycle progression through its interaction with WASp (Wiskott-Aldrich syndrome protein). It interferes with cellular prion protein (PrP) formation by modulation of its shedding. It may also promote the formation of macropinosomes (large endocytic organelles).
