identifier: InterPro:IPR054180
label: "DNA-binding protein H-NS-like, N-terminal domain"
definition: >-
  This entry corresponds to the N-terminal oligomerisation domain of H-NS histone-like proteins. The histone-like nucleoid-structuring (H-NS) protein is a DNA-binding protein implicated in transcriptional repression (silencing) as well as in bacterial chromosome organisation. H-NS binds tightly to AT-rich dsDNA, increases its thermal stability and inhibits transcription. It also binds to ssDNA and RNA but with a much lower affinity.
