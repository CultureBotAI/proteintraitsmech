identifier: InterPro:IPR063180
label: "CPL1/2, SPOC domain"
definition: >-
  This domain is found N-terminal in the CPL1 and CPL2 (RNA polymerase II C-terminal domain phosphatase-like 1/2) from Arabidopsis thaliana and related proteins. CPL1 and CPL2 dephosphorylate Ser-5 but not Ser-2 of the heptad repeats YSPTSPS in the C-terminal domain of the largest RNA polymerase II subunit (RPB1). This promotes the activity of RNA polymerase II. Together CPL1/2 are required for male gametes fertility and are multifunctional regulators that modulate plant growth, stress, and phytohormones responses.
