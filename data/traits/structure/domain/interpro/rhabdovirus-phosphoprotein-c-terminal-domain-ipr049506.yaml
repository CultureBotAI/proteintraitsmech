identifier: InterPro:IPR049506
label: "Rhabdovirus phosphoprotein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the P protein (phosphoprotein) from Rabies virus (RABV) and similar sequences from Rhabdoviridae. RABV P is known to counteract the functions of various cellular factors involved in antiviral responses, including STAT1, and interferon-induced promyelocytic leukaemia (PML) protein; the C-terminal domain of the RABV P protein includes STAT1 and PML binding sites. It plays multiple roles in transcription and translation, which include acting as a chaperone of nascent nucleoprotein (N), and as a cofactor of the viral polymerase (L) where P forms a two-subunit polymerase with a large catalytic subunit (L) and stabilises the polymerase on its template of N-RNA.
