identifier: InterPro:IPR028235
label: "Dynein assembly factor 3, C-terminal domain"
definition: >-
  This domain of unknown function is found in a number of proteins, including dynein assembly factor 3 (DNAAF3), which is required for the assembly of axonemal inner and outer dynein arms. DNAAF3 is involved in preassembly of dyneins into complexes before their transport into cilia.
