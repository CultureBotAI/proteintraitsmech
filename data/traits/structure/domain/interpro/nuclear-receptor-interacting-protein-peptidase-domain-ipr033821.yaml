identifier: InterPro:IPR033821
label: "Nuclear receptor-interacting protein, peptidase domain"
definition: >-
  Proteins with this domain have been described as probable nuclear receptor interacting proteins. This C-terminal domain is homologous to the retroviral aspartyl protease domain. The domain is structurally related to one lobe of the pepsin molecule. The conserved active site aspartate occurs within a motif (Asp-Thr/Ser-Gly), as it does in pepsin. Asp residues are ligands of an activated water molecule in all examples where catalytic residues have been identified. This group of aspartate peptidases is classified by MEROPS as the peptidase family A28, with the identifier A28.002.
