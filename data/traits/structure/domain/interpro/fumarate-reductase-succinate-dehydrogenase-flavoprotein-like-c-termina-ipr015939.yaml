identifier: InterPro:IPR015939
label: "Fumarate reductase/succinate dehydrogenase flavoprotein-like, C-terminal"
definition: >-
  This entry represents a domain with a spectrin-repeat-like fold consisting of three helices in a closed bundle with a left-handed twist. This domain is found in the succinate dehydrogenase/fumarate reductase oxidoreductase family of proteins, such as: L-aspartate oxidase ( ), a flavoenzyme component of the bacterial quinolinate synthase system that catalyses the conversion of L-aspartate to oxaloacetate, the first step in the de novo biosynthesis of NAD+. Fumarate reductase, which is part of the quinol-fumarate reductase (QFR) respiratory complex that catalyses the terminal step of anaerobic respiration when fumarate acts as the terminal electron acceptor. Succinate dehydrogenase (SQR; ), an iron-sulphur flavoenzyme from bacteria that is analogous to the mitochondrial respiratory complex II, forming part of the electron transport pathway from the electron acceptor (succinate) to the terminal donor (ubiquinone). Adenylylsulphate reductase A subunit ( ), an iron-sulphur flavoenzyme that catalyses the reversible reduction of adenosine-5'-phosphate (APS) to sulphite and AMP.
