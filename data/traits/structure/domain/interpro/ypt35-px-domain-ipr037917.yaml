identifier: InterPro:IPR037917
label: "Ypt35, PX domain"
definition: >-
  The PX domain of Ypt35 binds to phosphatidylinositol 3-phosphate (PI3P). It also serves as a protein interaction domain, binding to the Yip1 protein family members, which localize to the ER and Golgi. Ypt35 is mainly associated with endosomes and together with Yip1p proteins, may be involved in a specific function in the endocytic pathway. Ypt35 recruits the lipid transfer protein VPS13 to endosomal and vacuolar membranes.
