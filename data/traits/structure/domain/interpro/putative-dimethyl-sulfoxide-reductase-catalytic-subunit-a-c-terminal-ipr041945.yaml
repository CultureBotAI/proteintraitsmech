identifier: InterPro:IPR041945
label: "Putative dimethyl sulfoxide reductase catalytic subunit A, C-terminal"
definition: >-
  DmsA is encoded in operon, dmsREABCD. dmsA is required for anaerobic respiration on DMSO and TMAO in the archaeon Halobacterium. This haloarchael DmsA has been classified as a type II molybdopterin oxidoreductase. This entry represents the C-terminal domain of DmsA.
