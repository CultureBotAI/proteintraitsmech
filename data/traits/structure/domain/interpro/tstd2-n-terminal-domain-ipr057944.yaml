identifier: InterPro:IPR057944
label: "TSTD2, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in TSTD2 (thiosulfate sulfurtransferase/rhodanese-like domain-containing protein 2). TSTD2 is involved in the transfer of sulphur from thiosulfate to cyanide, forming thiocyanate. It plays a role in cyanide detoxification and sulphur metabolism. The rhodanese-like domain is crucial for their catalytic activity, facilitating the transfer of sulphur atoms. Low TSTD2 expression correlates with poor prognosis in kidney renal clear cell carcinoma (KIRC), potentially due to disrupted sulfur metabolism promoting tumour growth and metastasis.
