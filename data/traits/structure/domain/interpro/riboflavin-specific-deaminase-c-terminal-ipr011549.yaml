identifier: InterPro:IPR011549
label: "Riboflavin-specific deaminase, C-terminal"
definition: >-
  Eubacterial riboflavin-specific deaminases have a zinc-binding domain, , toward the N terminus and this domain toward the C terminus. Yeast HTP reductase, a riboflavin-biosynthetic enzyme, and several archaeal proteins related to riboflavin biosynthesis consist only of this domain and lack the zinc-binding domain.
