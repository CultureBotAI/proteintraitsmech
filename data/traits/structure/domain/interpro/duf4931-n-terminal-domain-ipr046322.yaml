identifier: InterPro:IPR046322
label: "DUF4931, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in a group of uncharacterised proteins mainly found in various bacillus species. Some members of this entry are annotated as Galactose-1-phosphate uridylyltransferases, but the specific function of this family is unknown.
