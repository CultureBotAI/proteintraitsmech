identifier: InterPro:IPR043729
label: "Domain of unknown function DUF5672"
definition: >-
  This domain is functionally uncharacterised. Proteins containing this domain can be found in bacteria, archaea, eukaryotes and viruses. This entry corresponds to a region of about 200 amino acids in length with multiple conserved motifs. There are two conserved sequence motifs: GAP and NGG. In some proteins this domain is found associated with various glycosyl transferase enzyme domains, suggesting this domain has a related role in glycan biosynthesis.
