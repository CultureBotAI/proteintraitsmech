identifier: InterPro:IPR058901
label: "ATRX, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in Transcriptional regulator ATRX and similar proteins from vertebrates. The function of the C-terminal has not yet been elucidated. It contains an all-α-helical structure. ATRX is a chromatin-associated protein involved in transcriptional regulation, chromatin remodelling, DNA replication, and repair. It was originally identified due to mutations in the ATRX gene causing ATR-X syndrome, a severe form of X-linked mental retardation. ATRX plays a key role in stabilising G-rich regions by remodelling G-quadruplex (G4) DNA and incorporating H3.3-containing nucleosomes. It facilitates efficient replication of specific genomic loci and is essential for telomere maintenance and allele-specific gene expression. ATRX localises predominantly to large tandem repeat regions, including telomeres, centromeres, and ribosomal DNA, where it binds G-rich sequences and directs H3.3 deposition into pericentric and telomeric heterochromatin. Loss or knockdown of ATRX disrupts DNA methylation, induces telomere dysfunction, causes aberrant chromosome segregation and premature sister chromatid separation, and alters gene expression patterns.
