identifier: InterPro:IPR055933
label: "Domain of unknown function DUF7511"
definition: >-
  This domain is found in a group of uncharacterised archaeal proteins. It is predicted to fold into a three-stranded antiparallel β-sheet. It contains a highly conserved tryptophan residue located at the beginning of the third β-strand.
