identifier: InterPro:IPR013158
label: "Activation-induced cytidine deaminase AID"
definition: >-
  This entry represents Activation-induced cytidine deaminase (AID), which is a single-stranded DNA-specific cytidine deaminase. It is involved in somatic hypermutation, gene conversion, and class-switch recombination in B-lymphocytes by deaminating C to U during transcription of Ig-variable and Ig-switch region DNA. It is required for several crucial steps of B-cell terminal differentiation necessary for efficient antibody responses. The AID/APOBEC are deaminases that function in RNA/DNA editing. The AID/APOBEC family contains several subfamilies: AID, APOBEC1, APOBEC2, APOBEC3, APOBEC4 and APOBEC5. AID/APOBEC deaminases (AADs) convert cytidine to uridine in single-stranded nucleic acids. They are involved in numerous mutagenic processes, including those underpinning vertebrate innate and adaptive immunity. APOBEC were suggested to originate from ancestral AID genes expressed in the lymphocytes of jawless fish over 500 million years ago. Gene duplication and diversification of AID structure and function, probably contributed to the evolutionary process leading to genes that encode the APOBEC proteins of amphibians, birds, and tetrapods including primates.
