identifier: InterPro:IPR040640
label: "Myosin X, N-terminal SH3 domain"
definition: >-
  This is the N-terminal SH3 domain found in myosin X, which is essential for neuritogenesis, wound healing, cancer metastasis and some pathogenic infections. Myosin X is required for filopodia formation and extension.
