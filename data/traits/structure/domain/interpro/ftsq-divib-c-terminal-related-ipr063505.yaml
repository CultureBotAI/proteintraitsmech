identifier: InterPro:IPR063505
label: "FtsQ/DivIB C-terminal-related"
definition: >-
  This domain is found in Cell division protein FtsQ from Salinibacter ruber. It is closely related to the C-terminal domain of the cell division protein DivIB. This domain is also found in uncharacterised bacterial proteins
