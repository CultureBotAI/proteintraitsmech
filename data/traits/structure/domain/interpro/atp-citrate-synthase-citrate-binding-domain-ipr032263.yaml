identifier: InterPro:IPR032263
label: "ATP-citrate synthase, citrate-binding domain"
definition: >-
  This is a conserved domain containing the citrate-binding sites found in the ATP-citrate synthases (also known as ATP citrate lyases). This domain has a Rossmann fold. The ATP-citrate synthase family is responsible for the synthesis of cytosolic acetyl-CoA, a crucial substrate for de novo lipid synthesis, including cholesterol and fatty acids. In animals, these enzymes typically have a homomeric structure, whereas in plants, they are composed of distinct alpha and beta chains. These proteins play a central role in lipid metabolism, contributing to the elongation of fatty acids and the biosynthesis of various compounds such as isoprenoids and flavonoids. They are characterised by its membership in the succinate/malate CoA ligase subunit families, with distinct N-terminal and C-terminal sections.
