identifier: InterPro:IPR007330
label: "MIT domain"
definition: >-
  The MIT domain forms an asymmetric three-helix bundle. It is found in vacuolar sorting proteins, spastin (probable ATPase involved in the assembly or function of nuclear protein complexes), and a sorting nexin, which may play a role in intracellular trafficking. A 'variant' MIT domain has been described at the N-terminal region of a related AAA-ATPase, mammalian katanin p60 represented in.
