identifier: InterPro:IPR057251
label: "FP protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the FP protein from Orgyia pseudotsugata multicapsid polyhedrosis virus, which is also found in other uncharacterised sequences predominantly from arthropods and baculovirus. The function of the FP protein is not known. The protein is missing in baculovirus FP (Few Polyhedra) mutants.
