identifier: InterPro:IPR044043
label: Vanillate O-demethylase oxygenase-like, C-terminal catalytic domain
definition: >-
  The oxidative degradation of aromatic compounds implies several steps, the initial one consists in the addition of hydroxyl groups to the aromatic ring by Rieske-type non-heme iron aromatic ring-hydroxylating oxygenases (RHOs) that utilise non-heme Fe+2 to catalyse this step. RHOs are composed of two or three proteins which comprise an electron transport chain (ETC) and an oxygenase. The ETC transfers reducing equivalents from the electron donor to the oxygenase component, and then the latter transfers electrons to the oxygen molecules. The oxygenase components are oligomers, either (alpha)n or (alpha)n(beta)n. The alpha subunits constitute the catalytic component, which includes an N-terminal Rieske-like 2Fe-2S cluster binding domain and a C-terminal domain that binds the non-heme Fe 2, coordinated by conserved His and Asp residues. The beta subunit has a structural role. Some examples include carbazole 1,9a-dioxygenase, phthalate dioxygenase as well as oxidative demethylation enzymes like vanillate O-demethylase and its close relative Dicamba O-demethylase (also known as dicamba monooxygenase or DMO), Comamonas testosteroni T-2 p-toluenesulfonate dioxygenase and methylxanthine N-demethylases NdmA, NdmB, and NdmC, which catalyse the N-1-, N-3-, and N-7-specific demethylation of caffeine, respectively, in Pseudomonas putida. This entry represents the C-terminal catalytic domain of a group of Rieske [2Fe-2S]-domain-containing non-haem iron oxygenases, including vanillate O-demethylase oxygenase subunit, dicamba O-demethylase, methylxanthine N-demethylases NmdA, NmdB and NmdC, Toluene-4-sulfonate monooxygenase and Chloroacetanilide N-alkylformylase. Proteins containing this domain also include plant chlorophyllide a oxygenases that catalyse a two-step oxygenase reaction…
