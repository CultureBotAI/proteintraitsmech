identifier: InterPro:IPR049095
label: "Msx2-interacting protein, MID domain"
definition: >-
  This is the Msx2-interacting domain (MID) found in Msx2-interacting protein (MINT), a widely expressed transcription repressor that regulates key transcription effectors in several signalling pathways, including MSX2, RBP-J, and nuclear receptors. This domain provides core activation functions to MINT; it confers OCFRE (osteocalcin (OC) FGF response element) activation.
