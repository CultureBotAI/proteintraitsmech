identifier: InterPro:IPR054734
label: "Coenzyme PQQ synthesis protein F-like, C-terminal lobe, domain 4"
definition: >-
  This entry represents domain 4 from the C-terminal lobe of Coenzyme PQQ synthesis protein F (PqqF,) a protein required for coenzyme pyrroloquinoline quinone (PQQ) biosynthesis. It consists of four structurally similar domains organised in N-terminal (domain 1 represented by and domain 2) and C-terminal (domain 3 represented by and domain 4 by this entry) lobes. This domain is also found in other Peptidase M16 members, such as insulin degrading enzymes from human.
