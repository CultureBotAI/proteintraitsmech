identifier: InterPro:IPR025777
label: "GMP synthetase ATP pyrophosphatase domain"
definition: >-
  Guanosine 5'-monophosphate synthetase (GMPS) is a widespread enzyme seen in all domains of life. GMPS is required for the final step of the de novo synthesis of guanine nucleotides, converting xanthosine 5'-monophosphate (XMP) into guanosine 5'-monophosphate (GMP), a precursor of DNA and RNA. GMPS consists of two catalytic units, glutamine amidotransferase (GATase) and ATP pyrophosphatase (ATP-PPase). GATase hydrolyzes glutamine to yield glutamate and ammonia, while ATP-PPase utilises ammonia to convert adenyl xanthosine 5'-monophosphate (adenyl-XMP) into GMP. The two catalytic units are either encoded by a single gene (two-domain type) in eucaryotes, bacteria, and some archaea, or encoded by two separate genes (two-subunit type) in other archaea. In two-domain-type GMPS, the GATase domain is located in the N-terminal half, and the ATP-PPase domain is located in the C-terminal half; in two-subunit-type GMPS, these two units exist as separate polypeptides. ATP-PPase consists of two domains (N-domain and C-domain). The N-domain contains an ATP-binding platform called P-loop, whereas the C-domain contains the XMP-binding site and also contributes to homodimerisation. The GMP synthetase ATP-PPase ATP-binding domain is a twisted, five-stranded parallel β-sheet sandwiched between helical layers. It contains a glycine rich ATP-binding motif called the "P-loop motif" located after the first β-strand.
