identifier: InterPro:IPR057873
label: "CTHRC1, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human Collagen triple helix repeat-containing protein 1 (CTHRC1) and similar animal sequences. CTHRC1 may act as a negative regulator of collagen matrix deposition. This domain is predicted to adopt an all-β configuration.
