identifier: InterPro:IPR056314
label: "AP-3 complex subunit beta-1/2, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human AP-3 complex subunit beta-1/2 (AP3B1/2) and similar proteins from animals and plants. AP3B1 is a subunit of non-clathrin- and clathrin-associated AP-3 complex, which plays a role in protein sorting in the late-Golgi/trans-Golgi network (TGN) and/or endosomes. This domain is predicted to adopt a structure consisting of a five stranded β-sheet, flanked by one-α helix on the outer side, and by two α-helices on the inner side.
