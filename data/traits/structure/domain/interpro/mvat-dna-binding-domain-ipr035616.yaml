identifier: InterPro:IPR035616
label: "MvaT, DNA-binding domain"
definition: >-
  MvaT is a xenogeneic silencer conserved in Pseudomonas which assists in distinguishing foreign from self DNA. It prefers binding to flexible DNA segments with multiple TpA steps, and forms nucleoprotein filaments through cooperative polymerization.
