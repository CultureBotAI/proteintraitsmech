identifier: InterPro:IPR003540
label: "ADP ribosyltransferase"
definition: >-
  ADP-ribosylation is a posttranslational modification of proteins involving the addition of one or more ADP-ribose moieties. These reactions are involved in cell signalling and the control of many cell processes, including DNA repair and apoptosis. This entry represents an ADP-ribosyltransferase domain found in various proteins, including bacterial and viral toxins such as ExoS and ExoT from Pseudomona aeruginosa which contain a C-terminal ADP-ribosyltransferase (ADPRT) domain. This domain is also found in a number of uncharacterised sequences from rotifers (commonly known as wheel animals).
