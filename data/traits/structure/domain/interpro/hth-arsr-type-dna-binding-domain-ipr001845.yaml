identifier: InterPro:IPR001845
label: "HTH ArsR-type DNA-binding domain"
definition: >-
  The ArsR-type HTH domain is a DNA-binding, winged helix-turn-helix (wHTH) domain present in transcription regulators of the ArsR/SmtB family, involved in stress-response to heavy metal ions. This family of prokaryotic metal-sensing transcription repressors is named after Escherichia coli ArsR, an arsenic-responsive repressor of the ars operon for arsenate reductase and metal ion extrusion, and after Synechococcus PCC 7942 SmtB, a Zn(II)-responsive repressor of the smtA gene for a Zn sequestering metallothionein. ArsR/SmtB-like repressors of metal resistance operons specifically bind to the operator/promoter and seem to dissociate from the DNA in the presence of metal ions, permitting transcription of proteins involved in metal-ions efflux and/or detoxification. The crystal structure of the cyanobacterial smtB shows a fold of five α-helices (H) and a pair of antiparallel β-strands (B) in the topology H1-H2-H3-H4-B1-B2-H5. Helices 3 and 4 comprise the helix-turn-helix motif and the β-sheet is called the wing as in other wHTH, such as the dtxR-type or the merR-type. Helix 4 is termed the recognition helix, like in other HTHs where it binds the DNA major groove. Most ArsR/SmtB-like metalloregulators form homodimers. The dimer interface is formed by helix 5 and an N-terminal part. Two distinct metal-binding sites have been identified. The first site comprises cysteine thiolates located in the HTH in helix 3 and for some cases in the N terminus, called the alpha3(N) site. The second metal-binding site is located in helix 5 (and C terminus) and is called the α5(C) site. The alpha3N site binds large thiophilic, toxic metals including Cd, Pb, and Bi, as in S. aureus cadC. ArsR lacks the N-terminal arm and its α3 site coordinates smaller thiophilic ions like As and Sb. The α5 si…
