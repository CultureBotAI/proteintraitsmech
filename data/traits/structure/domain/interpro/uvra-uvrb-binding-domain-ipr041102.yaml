identifier: InterPro:IPR041102
label: "UvrA, UvrB Binding Domain"
definition: >-
  This domain found in UvrA proteins interacts with the UvrB protein, described as UvrB binding domain (UBD) which is reorganised after the recognition of the damage and the repositioning of the insersion domains (IDs) that allows the formation of the complex between UvrA and UvrB. In Eubacteria and some Archaea, the first steps in nucleotide excision repair are carried out by the coordinated action of the UvrA, UvrB, and UvrC proteins. A damage recognition complex composed of 2 UvrA and 2 UvrB subunits scans DNA for abnormalities. Upon binding of the UvrA(2)B(2) complex to a putative damaged site, the DNA wraps around one UvrB monomer. DNA wrap is dependent on ATP binding by UvrB and probably causes local melting of the DNA helix, facilitating insertion of UvrB β-hairpin between the DNA strands. Then UvrB probes one DNA strand for the presence of a lesion. If a lesion is found the UvrA subunits dissociate and the UvrB-DNA preincision complex is formed. This complex is subsequently bound by UvrC and the second UvrB is released. If no lesion is found, the DNA wraps around the other UvrB subunit that will check the other stand for damage.
