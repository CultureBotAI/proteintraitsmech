identifier: InterPro:IPR024750
label: Calcium-transporting P-type ATPase, N-terminal autoinhibitory domain
definition: >-
  This entry represents the N-terminal autoinhibitory calmodulin-binding domain characteristic of certain calcium-transporting ATPases. This domain binds calmodulin in a calcium-dependent fashion and has a conserved RRFR sequence motif. There are two completely conserved residues (F and W) that may be functionally important.
