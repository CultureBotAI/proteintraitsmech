identifier: InterPro:IPR062969
label: "Diltiazem deacetylase, C-terminal helical domain"
definition: >-
  This entry represents a C-terminal helical domain found in diltiazem deacetylases from gut bacteria. The domain is composed of four α-helices and is located C-terminal to a β-barrel subdomain and the N-terminal GDSL catalytic domain ( ). BT4096 from Bacteroides thetaiotaomicron deacetylates the vasodilating drug diltiazem when taken orally, converting it to its deacetyl metabolite in the human gut. The enzyme may also function as an oligosaccharide deacetylase. The function of this domain remains to be determined.
