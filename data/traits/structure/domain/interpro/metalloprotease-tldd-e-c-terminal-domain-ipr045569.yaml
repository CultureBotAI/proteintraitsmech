identifier: InterPro:IPR045569
label: "Metalloprotease TldD/E, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of of PmbA/TldE and TldD. This domain is also found at the C-terminal of uncharacterised proteins from archaea. This entry includes a group of metalloproteases, such as TldD and TldE (also known as PmbA) from E. coli, which interact to form a heterodimeric metalloprotease. TldD and TldE were originally related to the biosynthesis of microcin B17 (MccB17), a peptide antibiotic produced by Escherichia coli strains carrying the pMccB17 plasmid that targets the DNA gyrase from sensitive bacteria. Later, they are shown to be metalloproteases involved in CcdA/CcdA41 degradation.
