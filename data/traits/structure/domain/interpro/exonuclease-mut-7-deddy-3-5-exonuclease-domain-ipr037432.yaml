identifier: InterPro:IPR037432
label: "Exonuclease Mut-7, DEDDy 3'-5' exonuclease domain"
definition: >-
  This entry represents the DEDDy domain found in Caenorhabditis elegans mut-7 and similar proteins found in metazoans. Mut-7 is implicated in posttranscriptional gene silencing. It contains a DEDDy-type DnaQ-like 3'-5' exonuclease domain possessing three conserved sequence motifs, termed ExoI, ExoII and ExoIII, with a specific YX(3)D pattern at ExoIII. These motifs are clustered around the active site and contain four conserved acidic residues that serve as ligands for the two metal ions required for catalysis.
