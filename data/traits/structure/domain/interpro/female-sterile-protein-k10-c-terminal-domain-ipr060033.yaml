identifier: InterPro:IPR060033
label: "Female sterile protein K10, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the female sterile protein K10 from Drosophila melanogaster and related proteins. The full-length fs(1)K10 protein is a DNA-binding protein that contains a putative helix-turn-helix motif within this C-terminal region. The protein is involved in dorsoventral pattern formation during Drosophila oogenesis and interacts with the hnRNP protein squid via its N-terminal region. The fs(1)K10 protein localises to the nucleus and is expressed specifically in the oocyte during oogenesis. The specific function of this domain remains to be determined.
