identifier: InterPro:IPR048643
label: "Intraflagellar transport protein 52, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Intraflagellar transport protein 52 homolog from humans (IFT52) and similar eukaryotic proteins. IFT52 is part the IFT-B complex, which is involved in intraflagellar transport (IFT), the bidirectional movement of particles required for the assembly, maintenance and functioning of primary cilia. IFT52 is responsible for the binding to the C-terminal domain of IFT46 and essential for the interaction between the subcomplexes. This domain adopts an all-α structure.
