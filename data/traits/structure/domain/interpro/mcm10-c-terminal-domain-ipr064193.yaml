identifier: InterPro:IPR064193
label: "MCM10, C-terminal domain"
definition: >-
  This entry represents the MCM10 C-terminal domain (MCM10-CTD). It is mainly found in animals. MCM10 is composed of three domains, the N-terminal (NTD), internal (ID), and C-terminal (CTD) domains, each containing distinct functional regions involved in DNA binding and/or protein-protein contacts. The structural integrity of ID and CTD is dependent on the presence of bound zinc. The MCM10-CTD, although not present in unicellular eukaryotes and land plants, is conserved among metazoan species from nematodes to humans. Functionally, the CTD is similar to the ID, specifically in mediating interactions with DNA and Pol alpha. It contains a winged helix domain (WH) and two zinc chelating motifs, a CCCH zinc-finger (ZnF2) and a CCCC zinc-ribbon (ZnR). ZnF2 is required for the CTD to bind DNA, but the function of the ZnR has not been clearly defined, although it shares homology with the ZnRs found in archaeal and vertebrate MCM helicases. Eukaryotic DNA replication is carried out by large multiprotein machines that coordinate DNA unwinding and synthesis at the replication fork. Minichromosome Maintenance protein 10 (MCM10) is exclusive to eukaryotes and is essential to both initiation and elongation phases of chromosomal DNA replication. MCM10 works as scaffold protein that can interact with many proteins, such as DNA polymerase alpha (pol alpha) and DNA primase, some subunits of Cdc45-Mcm2-7-GINS helicase (CMG) complex, and PCNA. In addition, MCM10 binds both single-stranded (ss) and double-stranded (ds) DNA. MCM10 does not have a preference for particular DNA sequences or topological structures, but its affinity for ssDNA is higher than for dsDNA.
