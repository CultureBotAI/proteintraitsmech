identifier: InterPro:IPR056491
label: "DUF6688, C-terminal domain"
definition: >-
  This entry represents a group of bacterial proteins that is functionally uncharacterised. Proteins in this family are typically between 360 and 412 amino acids in length. This entry corresponds to the C-terminal domain, which is predicted to be α-helical.
