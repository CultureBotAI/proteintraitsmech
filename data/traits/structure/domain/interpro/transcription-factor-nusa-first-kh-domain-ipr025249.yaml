identifier: InterPro:IPR025249
label: "Transcription factor NusA, first KH domain"
definition: >-
  This entry represents the first K homology (KH) domain found in NusA transcription termination factors. KH domains bind RNA and can function in RNA recognition. NusA is involved in transcriptional pausing, termination and anti-termination. NusA from Thermotoga maritima contains an N-terminal domain and three RNA-binding domains (one S1 domain and two KH domains ). The N-terminal domain consists of a bifurcated coiled β-sheet within an α/β(3)/α/β/α fold, which can be divided into two subdomains: a globular head and a helical body. The globular head subdomain may interact with RNA polymerase, while the helical body displays a similar structure to that of the helical domain in sigma70.
