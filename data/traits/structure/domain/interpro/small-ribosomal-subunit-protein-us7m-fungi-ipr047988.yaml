identifier: InterPro:IPR047988
label: "Small ribosomal subunit protein uS7m, fungi"
definition: >-
  The small ribosomal subunit protein uS7, also known as Ribosomal protein (RP)S7, is an important part of the translation process which is universally present in the small subunit of prokaryotic and eukaryotic ribosomes. Fungal and plants mitochondrial uS7 shows less homology to the mammalian than to bacterial uS7. The small subunits of bacteria and eukaryotes have the same shape of head, body, platform, beak, and shoulder. uS7 is located at the head of the small subunit and is a primary ribosomal RNA (rRNA) binding protein that assists in rRNA folding and the binding of other proteins during small subunit assembly in all species. uS7 is also involved in the formation of the mRNA exit channel at the interface of the large and small subunits. This entry represents the structural domain of fungal uS7.
