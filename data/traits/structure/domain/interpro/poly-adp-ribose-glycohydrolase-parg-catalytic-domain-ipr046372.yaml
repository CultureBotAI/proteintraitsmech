identifier: InterPro:IPR046372
label: Poly (ADP-ribose) glycohydrolase (PARG), catalytic domain
definition: >-
  This entry represents the Macro domain fold localised in the C-terminal end of PARG catalytic domain from animals, plants and some fungal species. Poly(ADP-ribose) glycohydrolase (PARG) ( ) is a ubiquitously expressed exo- and endoglycohydrolase which catalyses the hydrolysis of the O-glycosidic linkages of ADP-ribose polymers, reversing the effects of poly(ADP-ribose). It generates mono-ADP-ribosylated proteins in cells, due to its ability of degrading poly(ADP-ribose) without cleaving the terminal protein-ribose bond. PARG is also involved in the synthesis of nuclear ATP, which is required for extensive chromatin remodeling events. This protein mediates oxidative and excitotoxic neuronal death. Arabidopsis thaliana PARG1 is involved in abiotic stress responses and DNA repair.
