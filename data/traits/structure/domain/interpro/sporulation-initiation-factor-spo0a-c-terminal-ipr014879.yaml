identifier: InterPro:IPR014879
label: "Sporulation initiation factor Spo0A, C-terminal"
definition: >-
  The response regulator Spo0A is comprised of a phosphoacceptor domain and a transcription activation domain. This domain corresponds to the transcription activation domain and forms an α helical structure comprising of 6 α helices. The structure contains a helix-turn-helix and binds DNA.
