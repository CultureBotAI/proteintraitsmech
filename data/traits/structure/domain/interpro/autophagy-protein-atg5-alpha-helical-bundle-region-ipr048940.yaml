identifier: InterPro:IPR048940
label: "Autophagy protein ATG5, alpha-helical bundle region"
definition: >-
  Autophagy protein ATG5 is involved in autophagic vesicle formation. It is conjugated with ATG12, acting as an E3-like ubiquitin enzyme required for lipidation of ATG8 family proteins and their association to the vesicle membranes. ATG5 comprises two ubiquitin-like domains (UblA and UblB) that flank a helix-rich domain. This domain represents the α-helical bundle region (HBR) of AT5 which consists of three α-helices. This region contains the Lys residue required for conjugation with ATG12.
