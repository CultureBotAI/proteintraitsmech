identifier: InterPro:IPR059284
label: "Domain of unknown function DUF8240"
definition: >-
  This domain is found in uncharacterised proteins from halobacteria. It is predicted to fold into a β-barrel structure which has a similarity to Heme iron utilization protein domains. The heme binding site is not conserved. Although, structurally it is more similar to HemS/ChuS-like domains, this domain has probably undergone a large deletion.
