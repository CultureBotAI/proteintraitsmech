identifier: InterPro:IPR062466
label: "YfbP, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of YfbP, an uncharacterised protein from Escherichia and related bacteria. YfbP from Escherichia coli K12 is a 282 amino acid protein. The function of this domain remains to be determined.
