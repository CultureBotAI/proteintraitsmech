identifier: InterPro:IPR055428
label: "Trafficking protein particle complex subunit 13, C-terminal"
definition: >-
  This entry represents the C-terminal domain of TRAPPC13 which is predicted to adopt an Ig-like fold. Trafficking protein particle complex subunit 13 (TRAPPC13) is involved in regulating autophagy and survival in response to small molecule compound-induced Golgi stress. It is the mammal homologue of Trs65 from yeast, part of TRAPPII complex which interacts with COPI-coated vesicles in mammalian cells and aids in endosome-to-Golgi transport.
