identifier: InterPro:IPR008894
label: "Sugar 3,4-ketoisomerase QdtA, cupin domain"
definition: >-
  This entry represents cupin domain found in several bacterial proteins homologous to sugar 3,4-ketoisomerases. Thermoanaerobacterium thermosaccharolyticum QdtA catalyzes a key step in the biosynthesis of these sugars, the conversion of thymidine diphosphate (dTDP)-4-keto-6-deoxyglucose to dTDP-3-keto-6-deoxyglucose. In Aneurinibacillus thermoaerophilus, TDP-4-oxo-6-deoxy-alpha-D-glucose-3,4-oxoisomerase (also known as FdtA ( )) is involved in the biosynthesis of dTDP-Fucp3NAc (3-acetamido-3,6-dideoxy-alpha-d-galactose), which is part of the repeating units of the glycan chain in the S-layer. Shewanella denitrificans bifunctional ketoisomerase/N-acetyltransferase (also known as FdtD) is involved in the third and fifth steps in the production of 3-acetamido-3,6-dideoxy-alpha-d-galactose or Fuc3NAc; the C-terminal cupin domain harbours the active site responsible for the isomerization reaction. Proteins containing this domain also includes WxcM ( ) from Xanthomonas campestris pv campestris). Proteins in this entry belong to the cupin superfamily with a conserved "jelly roll-like" β-barrel fold capable of homodimerization.
