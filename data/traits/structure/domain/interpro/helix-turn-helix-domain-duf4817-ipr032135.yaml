identifier: InterPro:IPR032135
label: "Helix-turn-helix domain (DUF4817)"
definition: >-
  This domain is functionally uncharacterised. Proteins containing this domain can be found primarily in insects, but also some other eukaryotes. They are typically between 109 and 322 amino acids in length. This domain may be involved in DNA-binding.
