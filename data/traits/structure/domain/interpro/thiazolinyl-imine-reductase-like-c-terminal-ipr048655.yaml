identifier: InterPro:IPR048655
label: "Thiazolinyl imine reductase-like, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Thiazolinyl imine reductase Irp3 from Yersinia enterocolitica, PchG from Pseudomonas aeruginosa and similar bacterial sequences. Thiazolinyl imine reductases catalyse the NADPH-dependent reduction of a thiazoline to a thiazolidine, a step involved in formation of the siderophores yersiniabactin (Yersinia spp.) and pyochelin (Pseudomonas aeruginosa). These proteins consist of two domains, an N-terminal dinucleotide-binding domain ( ) and a C-terminal α/β domain, involved in substrate binding and oligomerisation.
