identifier: InterPro:IPR016122
label: "Sporulation initiation phosphotransferase B, C-terminal"
definition: >-
  Response regulatory proteins such as sensor kinases control a variety of environmentally induced responses in bacteria. SpoOB is a response regulator that responds to nutritional stress by inducing sporulation. SpoOB is a phosphotransferase that acts upon SpoOA using SpoOF as the phosphor-donor. Phosphorylated SpoOA ca activate sporulation-specific gene transcription. SpoOB has an α-β core structure that resembles the histidine kinase fold, but lacks the kinase ATP-binding site. This domain is found at the C teminus of SpoOB, as well as in other sensor kinases.
