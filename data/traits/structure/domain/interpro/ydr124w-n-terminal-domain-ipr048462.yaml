identifier: InterPro:IPR048462
label: "YDR124W, N-terminal domain"
definition: >-
  This entry includes mitochondrial proteins of unknown function found in yeast. Null mutant showed severe fragmentation of mitochondria and its expression is strongly induced by alpha factor. Members of this entry may have a role in maintenance of mitochondrial morphology. This entry represents the N-terminal domain which may have an α/β fold.
