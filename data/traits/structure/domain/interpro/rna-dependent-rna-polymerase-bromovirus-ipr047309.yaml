identifier: InterPro:IPR047309
label: RNA-dependent RNA polymerase, bromovirus
definition: >-
  This entry represents RNA-directed RNA polymerase 2a from RNA viruses belonging to the family Bromoviridae. The Bromoviridae family of plant viruses contains tri-segmented, (+)ssRNA viruses with a total genome size of about 8 kb. Bromoviridae virions are variable in morphology (spherical or bacilliform) and are transmitted mechanically, in/on the pollen and non-persistently by insect vectors. Members of the family cause major disease epidemics in fruit, vegetable and fodder crops such as tomato, cucurbits, bananas, and alfalfa , ]. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. This domain contains conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in its fidelity in processes of correct incorporation and reorganization of nucleotides.
