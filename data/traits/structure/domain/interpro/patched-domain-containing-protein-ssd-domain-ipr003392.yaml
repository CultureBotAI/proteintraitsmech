identifier: InterPro:IPR003392
label: "Patched domain-containing protein, SSD domain"
definition: >-
  This entry represents the sterol-sensing domain (SSD) of patched domain-containing proteins 1, 3, 4 and 18. PTCHD3 may play a role in sperm development or sperm function, however, it may not play an essential role in spermatogenesis or male fertility. PTCH1 is required for the development and function of the thalamic reticular nucleus (TRN), a part of the thalamus that is critical for thalamocortical transmission, generation of sleep rhythms, sensorimotor processing and attention. It can bind cholesterol in vitro. PTCHD4 may act as a repressor of canonical hedgehog signalling by antagonising the effects of SMO, as suggested by down-regulation of hedgehog target genes, including GLI1, PTCH1, and PTCH2 in PTCHD4-expressing cells.
