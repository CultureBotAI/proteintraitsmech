identifier: InterPro:IPR056990
label: "VIN3-like, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of Protein Vernalization Insensitive 3 from Arabidopsis thaliana (VIN3) and similar plant sequences, including VIN3-like protein 1/2/3. This domain, predicted to adopt an all-α structure, is often found associated with and . VIN3 plays a central role in vernalization by mediating the initial transcriptional repression of the homeotic gene FLC, a floral repressor, after a cold treatment.
