identifier: InterPro:IPR004841
label: "Amino acid permease/SLC12A domain"
definition: >-
  Amino acid permeases are integral membrane proteins involved in the transport of amino acids into the cell. A number of such proteins have been found to be evolutionary related. These proteins seem to contain up to 12 transmembrane segments. The best conserved region in this family is located in the second transmembrane segment. This domain is found in amino acid permeases, as well as in solute carrier family 12A (SLC12A) sequences.
