identifier: InterPro:IPR058651
label: "vWA-MoxR associated protein, N-terminal HTH domain"
definition: >-
  This entry represents the N-terminal helix-turn-helix (HTH) domain of the vWA-MoxR associated protein (VMAP) of the classical ternary system (vWA-MoxR-VMAP) in NTP-dependent conflict systems. VMAP-Ms may be involved in sensing of invasive entities. Members of this group are mainly found in cyanobacteria.
