identifier: InterPro:IPR063886
label: "LIN-26/LIR3, second C2H2-type zinc finger"
definition: >-
  This entry represents the second zinc finger C2H2 in LIR3, LIN-26 and related transcription factors found in nematodes. LIN-26 is a zinc finger transcription factor required for hypodermal cell fate specification in Caenorhabditis elegans. LIR-3 (LIN-26-related protein 3) contains a similar domain organisation and functions as a positive regulator of RNA polymerase III-associated transcription. Both proteins are localised to the nucleus where they function as transcriptional regulators. The specific function of this domain remains to be determined.
