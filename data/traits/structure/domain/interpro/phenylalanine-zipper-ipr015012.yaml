identifier: InterPro:IPR015012
label: "Phenylalanine zipper"
definition: >-
  The phenylalanine zipper consists of aromatic side chains from ten phenylalanine residues that are stacked within a hydrophobic core. This zipper mediates dimerisation of various proteins, such as APS, SH2-B and Lnk.
