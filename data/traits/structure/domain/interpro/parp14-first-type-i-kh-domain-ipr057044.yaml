identifier: InterPro:IPR057044
label: "PARP14, first type I KH domain"
definition: >-
  This domain is found in human Protein mono-ADP- ribosyltransferase PARP14 and related proteins. It is a KH domain found first in human PARP14. PARP14 is a large multidomain protein which in the N-terminal half contains a series of consecutive RRM and KH domains that are known to be nucleic acid-binding. PARP14 is involved in multiple signaling pathways linked to cancer, inflammation, and infection. PARP14 is an ADP-ribosyltransferase that mediates mono-ADP-ribosylation of glutamate residues on target proteins. In contrast to PARP1 and PARP2, it is not able to mediate poly-ADP-ribosylation.
