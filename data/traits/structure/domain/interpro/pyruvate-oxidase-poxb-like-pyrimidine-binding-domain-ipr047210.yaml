identifier: InterPro:IPR047210
label: "Pyruvate oxidase POXB-like, pyrimidine-binding domain"
definition: >-
  This entry represents the PYR-binding domain of pyruvate oxidase (POXB) and similar proteins from bacteria and archaea. The thiamine pyrophosphate (TPP) family has a thiamin diphosphate-binding fold consisting of two different functional modules, the pyridine-binding (Pyr) and pyrophosphate-binding (PP) modules. The PYR domain is found in many key metabolic enzymes which use TPP (also known as thiamine diphosphate) as a cofactor. TPP binds in the cleft formed by a PYR domain and a PP domain. The PYR domain, binds the aminopyrimidine ring of TPP, the PP domain binds the diphosphate residue. The PYR and PP domains have a common fold, but do not share strong sequence conservation. Most TPP-dependent enzymes have the PYR and PP domains on the same subunit although these domains can be alternatively arranged in the primary structure. TPP-dependent enzymes are multisubunit proteins, the smallest catalytic unit being a dimer-of-active sites. Lactobacillus plantarum POX is a homotetramer (dimer-of-homodimers), having two active sites per homodimer lying between PYR and PP domains of different subunits. POXB decarboxylates pyruvate, producing hydrogen peroxide and the energy-storage metabolite acetylphosphate. This entry also includes a closely homologous member, pyruvate dehydrogenase [ubiquinone] PoxB from Escherichia coli, a peripheral membrane protein that catalyses the oxidative decarboxylation of the central metabolite pyruvate to CO(2) and acetate. It has pyruvate oxidase as an alternate name.
