identifier: InterPro:IPR031341
label: "Ribosomal RNA small subunit methyltransferase F, N-terminal"
definition: >-
  This is the N-terminal domain of the RsmF methyl transferase. RsmF is a multi-site-specific methyltransferase that is responsible for the synthesis of three modifications on cytidines in 16S ribosomal RNA. The N terminus is critical for stabilising the catalytic core of the enzyme.
