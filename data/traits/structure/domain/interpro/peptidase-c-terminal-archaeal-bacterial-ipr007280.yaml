identifier: InterPro:IPR007280
label: "Peptidase, C-terminal, archaeal/bacterial"
definition: >-
  This domain is normally found at the C terminus of secreted archaeal and bacterial peptidases, the majority of which belong to MEROPS peptidase families M4 (vibriolysin, ), M09 (microbial collagenases ColA, ColQ1 and ColT ), M28 (aminopeptidase Ap1, ) and S8 (subtilisin family peptidases, ).
