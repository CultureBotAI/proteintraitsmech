identifier: InterPro:IPR015260
label: "Syntaxin 6/10/61, N-terminal"
definition: >-
  This domain is found in the N-terminal of various SNARE proteins, including Syntaxin 6/10/61, adopt a structure consisting of an antiparallel three-helix bundle. Its exact function has not been determined, though it is known that it regulates the SNARE motif, as well as mediate various protein-protein interactions involved in membrane-transport. Syntaxin 6 regulates chemotactic cell migration through integrin trafficking to the cell surface and is a common transcriptional target of p53 family members. Syntaxin 10 interacts with syntaxin 6 and 16, but its role in regulating trans-Golgi network protein traffic is unknown. Syntaxin 61 plays a role in the exocytic trafficking of cellulose synthases and the transport of cell wall components to the plasma membrane. Together with VTI12 it is required for membrane fusion. This entry also includes the yeast homologue, t-SNARE affecting a late Golgi compartment protein 1 (Tlg1). Tlg1 plays a role in endosome-TGN vesicle fusion and forms a SNAREpin complex with Tlg2 and Vti1.
