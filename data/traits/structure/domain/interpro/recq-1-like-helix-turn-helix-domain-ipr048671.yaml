identifier: InterPro:IPR048671
label: "RecQ-1-like, helix-turn-helix domain"
definition: >-
  This domain is found in a group of bacterial DNA helicases, including RecQ-1 from Porphyromonas gingivalis, which shows an all-helical structure. This entry represents the helix-turn-helix (HTH) domain.
