identifier: InterPro:IPR063615
label: "Conditioned medium factor, third Ig-like domain"
definition: >-
  This entry represents the third Ig-like domain of conditioned medium factor found in Dictyostelium discoideum. The full-length protein CMF is involved in cell density sensing and may synchronise the onset of development by triggering aggregation when cells have starved. The protein is secreted and N- and O-glycosylated.
