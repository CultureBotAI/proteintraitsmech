identifier: InterPro:IPR029481
label: "Pleiotropic ABC efflux transporter, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of ABC-transporter proteins from fungi and plants such as the pleiotropic ABC efflux transporters MDR1 from Trichophyton interdigitale and PDR5 from yeast. They may be involved in the modulation susceptibility to a wide range of unrelated cytotoxic compounds. It is predicted to be an intracellular domain.
