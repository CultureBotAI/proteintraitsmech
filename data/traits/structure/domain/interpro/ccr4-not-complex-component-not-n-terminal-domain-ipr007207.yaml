identifier: InterPro:IPR007207
label: CCR4-Not complex component, Not N-terminal domain
definition: >-
  The Ccr4-Not complex (Not1, Not2, Not3, Not4 and Not5) is a global regulator of transcription that affects genes positively and negatively and is thought to regulate transcription factor TFIID. This domain is the N-terminal region of the Not proteins.
