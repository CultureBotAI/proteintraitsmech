identifier: InterPro:IPR057069
label: "Immunoglobulin A1 protease autotransporter, domain 2"
definition: >-
  This entry represents what has been called domain 2 of the immunoglobulin A1 protease autotransporter (IgA0) from proteobacteria. These proteases serve as virulence factors by cleaving IgA in humans and great apes. This domain has been suggested to be involved in protein-protein interactions and may contribute to substrate recognition by forming a binding surface for IgA.
