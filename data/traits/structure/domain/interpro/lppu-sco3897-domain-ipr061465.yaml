identifier: InterPro:IPR061465
label: "LppU/SCO3897 domain"
definition: >-
  This domain, with four near-invariant Cys residues, occurs in a single copy at the C-terminal region of SCO3897 from Streptomyces coelicolor, a protein reported to be involved in species differentiation. The N-terminal region of that protein is rich in Gly, Pro, and Gln. This domain also occurs in the putative lipoprotein LppU (Rv2784c) of Mycobacterium tuberculosis. Some members contain eight invariant Cys residues and two copies of this domain. They are apparent lipoproteins, with a ninth conserved Cys residue, but a few instead have an extended N-terminal region compositionally similar to that of SCO3897.
