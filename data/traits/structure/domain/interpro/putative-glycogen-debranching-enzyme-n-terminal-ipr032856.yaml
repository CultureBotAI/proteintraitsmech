identifier: InterPro:IPR032856
label: "Putative glycogen debranching enzyme, N-terminal"
definition: >-
  This domain is found at the N terminus of some putative glycogen debranching enzymes and is usually followed by GDE_C ( ). In this sense it is analogous (but probably not homologous) to the GDE_N ( ). Its exact function is unknown.
