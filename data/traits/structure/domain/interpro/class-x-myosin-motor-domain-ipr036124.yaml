identifier: InterPro:IPR036124
label: "Class X myosin, motor domain"
definition: >-
  Myosin X is an unconventional myosin found to localize to filopodia. It is thought to be involved in numerous processes ranging from invadopodia formation to cell migration. Myosin X walks towards the barbed ends of filaments and is thought to walk both on bundles of actin and single filaments, a unique behaviour. The catalytic (head) domain has ATPase activity and belongs to the larger group of P-loop NTPases. C-terminal to the head domain are a variable number of IQ domains, 2 PH domains, a MyTH4 domain, and a FERM domain.
