identifier: InterPro:IPR060130
label: "CASZ1-like, zinc finger"
definition: >-
  This predicted C2H2-type zinc finger is found repeated nine times in human Zinc finger protein castor homolog 1 (CASZ1) and related metazoan sequences. CASZ1 is a transcriptional activator involved in vascular assembly and morphogenesis through direct transcriptional regulation of EGFL7.
