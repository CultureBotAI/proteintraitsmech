identifier: InterPro:IPR002821
label: "Hydantoinase A/oxoprolinase"
definition: >-
  This domain is found in the enzymes hydantoinase A (HyuA) and oxoprolinase ( ). Both enzymes catalyse reactions involving the hydrolysis of 5-membered rings via hydrolysis of their internal imide bonds. This domain is also found in (4-{4-[2-(gamma-L-glutamylamino)ethyl]phenoxymethyl}furan-2-yl)methanamine synthase from Methanocaldococcus jannaschii , which is involved in methanofuran biosynthesis, catalysing the condensation between 5-(aminomethyl)-3-furanmethanol diphosphate and gamma-glutamyltyramine to produce 4-[N-(gamma-L-glutamyl)-p-(beta-aminoethyl)phenoxymethyl]-(aminomethyl)furan (APMF-Glu). D-5-(2-methylthioethyl)hydantoin amidohydrolase (HyuA) from Pseudomonas is a component of the hydantoinase process, an enzymatic cascade converting D-5-(2-methylthioethyl)hydantoin to N-carbamoyl-D-methionine.
