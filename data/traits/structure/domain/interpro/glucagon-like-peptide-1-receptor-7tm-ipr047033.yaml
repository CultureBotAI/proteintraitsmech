identifier: InterPro:IPR047033
label: "Glucagon-like peptide-1 receptor, 7TM"
definition: >-
  Glucagon-like peptide-1 (GLP-1), which is encoded by the glucagon gene and released from the gut in response to nutrients, is a potent stimulator of glucose-induced insulin secretion and proinsulin gene expression of pancreatic beta-cells. GLP1R is activated by glucagon-like peptide 1 (GLP1), which is derived from the large proglucagon precursor. Activation of GLP1R stimulates glucose-dependent insulin secretion from pancreatic beta cells. In humans, GLP-I exerts its physiological effect as an incretin. Patients with insulinoma tumors show uncontrolled insulin hypersecretion. The GLP-I receptor binds GLP-1 with high affinity and couples to activation of adenylate cyclase. The receptor specifically binds GLP-1 and not peptides of related structure and function, such as glucagon, gastric inhibitory peptide, VIP or secretin. It is thought that GLP-I might have effects beyond the pancreas, including the cardiovascular and central nervous systems, where a receptor with the same ligand-binding specificity is found. This entry represents the transmembrane domain of GLP1R which contains a binding pocket for negative allosteric modulators. According to molecular modelling and mutagenesis studies, agonist positive allosteric modulators may target the same region, which may be useful for type 2 diabetes therapies development.
