identifier: InterPro:IPR000310
label: Orn/Lys/Arg decarboxylase, major domain
definition: >-
  Pyridoxal-dependent decarboxylases are bacterial proteins acting on ornithine, lysine, arginine and related substrates. One of the regions of sequence similarity contains a conserved lysine residue, which is the site of attachment of the pyridoxal-phosphate group. Ornithine decarboxylase is a dodecamer composed of six homodimers and catalyzes the decarboxylation of tryptophan. Arginine decarboxylase catalyzes the decarboxylation of arginine and lysine decarboxylase catalyzes the decarboxylation of lysine. Members of this family are widely found in all three forms of life.
