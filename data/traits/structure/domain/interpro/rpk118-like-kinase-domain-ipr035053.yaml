identifier: InterPro:IPR035053
label: RPK118-like, kinase domain
definition: >-
  This entry represents the catalytic domain of the serine/threonine kinase RPK118 (also known as ribosomal protein S6 kinase delta-1) and similar proteins. RPK118 contains an N-terminal Phox homology (PX) domain, a microtubule-interacting and Trafficking (MIT) domain, and a kinase domain containing a long uncharacterised insert. This domain is also present in human RPK60 (or ribosomal protein S6 kinase-like 1), which also contains a MIT domain, but lacks a PX domain. RPK118 binds sphingosine kinase, a key enzyme in the synthesis of sphingosine 1-phosphate (SPP), a lipid messenger involved in many cellular events. RPK118 may be involved in transmitting SPP-mediated signalling. RPK118 also binds the antioxidant peroxiredoxin-3 (PRDX3). RPK118 may be involved in the transport of PRDX3 from the cytoplasm to its site of function in the mitochondria.
