identifier: InterPro:IPR047247
label: "Ajuba-like, LIM domain 2"
definition: >-
  This entry represents the second LIM domain of Ajuba-like proteins. This domain shares two characteristic zinc finger motifs that contain eight conserved residues each, mostly cysteines and histidines, which coordinately bond to two zinc atoms. Ajuba-like LIM domain-containing protein family includes three highly homologous proteins Ajuba, LIMD1, and WTIP, adapter or scaffold proteins that participate in the assembly of numerous protein complexes and are involved in several cellular processes such as cell fate determination, cytoskeletal organization, repression of gene transcription, mitosis, cell-cell adhesion, cell differentiation, proliferation and migration. They bind to Ago1/2, RCK, Dcp2, and eIF4E in vivo, being required for miRNA-mediated gene silencing. These three proteins bind to the mRNA 5' m(7)GTP cap-protein complex. Members of this family negatively regulates the Hippo signalling pathway. WTIP, the Wt1-interacting protein, was originally identified as an interaction partner of the Wilms tumour protein 1 (WT1). WTIP is involved in kidney and neural crest development. It interacts with the receptor tyrosine kinase Ror2 and inhibits canonical Wnt signaling. LIMD1 was reported to inhibit cell growth and metastases; it has been described that LIMD1 functions as tumour suppressor to block lung tumour cell line in vitro and in vivo. The inhibition may be mediated through an interaction with the protein barrier-to-autointegration (BAF), a component of SWI/SNF chromatin-remodeling protein; or through the interaction with retinoblastoma protein (pRB), resulting in inhibition of E2F-mediated transcription, and expression of the majority of genes with E2F1-responsive elements. Recently, LIMD1 was shown to interact with the p62/sequestosome protein and influence IL-1…
