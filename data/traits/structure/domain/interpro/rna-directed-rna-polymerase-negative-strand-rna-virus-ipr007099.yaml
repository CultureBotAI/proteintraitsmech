identifier: InterPro:IPR007099
label: RNA-directed RNA polymerase, negative-strand RNA virus
definition: >-
  RNA-directed RNA polymerase (RdRp) ( ) is an essential protein encoded in the genomes of all RNA containing viruses with no DNA stage. It catalyses synthesis of the RNA strand complementary to a given RNA template, but the precise molecular mechanism remains unclear. The postulated RNA replication process is a two-step mechanism. First, the initiation step of RNA synthesis begins at or near the 3' end of the RNA template by means of a primer-independent (de novo) mechanism. The de novo initiation consists in the addition of a nucleotide tri-phosphate (NTP) to the 3'-OH of the first initiating NTP. During the following so-called elongation phase, this nucleotidyl transfer reaction is repeated with subsequent NTPs to generate the complementary RNA product. This entry corresponds to a relatively conserved segment of 147 - 180 aa of RdRp or its catalytic subunit. The proteins in this family are: RNA polymerase PB1 subunits of Orthomyxoviruses and RNA polymerases (L proteins) of Arenaviruses, Bunyaviruses, Hantaviruses, Nairoviruses, Phleboviruses, Tenuiviruses and Tospoviruses.
