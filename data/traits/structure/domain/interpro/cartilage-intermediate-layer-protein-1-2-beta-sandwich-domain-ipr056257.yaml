identifier: InterPro:IPR056257
label: "Cartilage intermediate layer protein 1/2, beta-sandwich domain"
definition: >-
  This domain is found in human Cartilage intermediate layer protein 1/2 (CILP-1/2) and similar sequences mainly found in vertebrates. CILP-1 is thought to play a role in cartilage scaffolding. CLIP-1 may act by antagonising TGF-beta1 (TGFB1) and IGF1 functions. It can suppress IGF1-induced proliferation and sulfated proteoglycan synthesis, and inhibits ligand-induced IGF1R autophosphorylation. It has been suggested to inhibit TGFB1-mediated induction of cartilage matrix genes through its interaction with TGFB1. Overexpression may lead to impair chondrocyte growth and matrix repair and indirectly promote inorganic pyrophosphate (PPi) supersaturation in ageing and osteoarthritis cartilage. CLIP2 gene seems to be down-regulated osteoarthritic cartilage. This domain, which is predicted to adopt a β-sandwich structure.
