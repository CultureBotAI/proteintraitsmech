identifier: InterPro:IPR005151
label: "Tail specific protease"
definition: >-
  This entry represents a domain found in the tail-specific proteases, such as retinol-binding protein 3 (also known as IRBP) from animals, C-terminal processing peptidases from algae and tricorn proteases from archaea. This domain share structural similarity with the crotonase fold that is formed from repeated β/β/α units, which comprises two perpendicular β-sheet surrounded by α-helices.
