identifier: InterPro:IPR037302
label: "Protein Unc-13, C2B domain"
definition: >-
  C. elegans Unc-13 is a phorbol ester/diacylglycerol-binding protein that plays a role in vesicle maturation during exocytosis. Unc-13 disruption causes diverse defects in the nervous system. Mammals contain three Unc-13 homologues: Unc-13 A, B and C (also known as Munc13-1/2/3). Unc13 homologue C is cerebellum-specific and regulates cerebellar synaptic transmission. Homologues A and B are involved in neurotransmitter release by acting in synaptic vesicle priming prior to vesicle fusion. They are essential for synaptic vesicle maturation in most excitatory/glutamatergic but not inhibitory/GABA-mediated synapses. Unc-13 and its homologues contain both C1 and C2 domains. There are at least two C2 related domains present, one central and one at the carboxyl end. Munc13-1 contains a third C2-like domain. The central C2 domain (C2B) is part of a C1-C2 tandem that functions in part to inhibit calcium-triggered neurotransmitter release. The C1 domain of Munc13 binds diacylglycerol (DAG) and beta phorbol esters (beta-PEs), while the neighbouring C2 domain (C2B) binds calcium and anionic phospholipids with a preference for both PI(4)P and PI(4,5)P2. C2 domains fold into an 8-standed β-sandwich that can adopt 2 structural arrangements, type I and type II, distinguished by a circular permutation involving their N- and C-terminal β strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances, including phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this, inclu…
