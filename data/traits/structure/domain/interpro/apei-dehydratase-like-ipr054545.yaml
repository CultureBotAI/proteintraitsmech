identifier: InterPro:IPR054545
label: "ApeI dehydratase-like"
definition: >-
  This entry represents a domain found in ApeI dehydratase ( ) and its homologues. This enzyme forms a heterodimer with ApeP that carries out dehydratation in APE biosynthesis. Both subunits in this complex adopt a typical hotdog fold comprising six antiparallel β-strands and a central α-helix. The domain represented by this entry is found either stand alone or in combination with other domains mainly in proteobacteria.
