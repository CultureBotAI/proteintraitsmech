identifier: InterPro:IPR054763
label: "Argonaute, middle domain"
definition: >-
  This domain is found in protein argonaute from Thermus thermophilus (Ago), a site-specific DNA-guided endoRNase organised into four domains: N ( ), PAZ ( ), Mid (this entry) and PIWI ( ). This domain contains residues that have been reported to be critical for cleavage activity. It folds into an α-β three layered sandwich. This group of proteins is specific to Thermus species.
