identifier: InterPro:IPR060666
label: "SKA3, N-terminal"
definition: >-
  This entry represents the short N-terminal helix of SKA complex subunit 3, whose function is unknown. The SKA complex is an essential mitotic component required for accurate cell division in human cells. It is a microtubule plus end-binding complex of the outer kinetochore that stabilises spindle microtubule-kinetochore attachments and promotes chromosome alignment at the mitotic spindle equator. The SKA complex associates with dynamic microtubule plus-ends and can track both depolymerising and elongating microtubules. Together with the Ndc80 complex couples chromosome movement to microtubule depolymerization. The complex is composed of three subunits: SKA1, SKA2, and SKA3. SKA3 is a component of the SKA complex, and it was the last subunit of the complex identified. SKA3 accumulates on kinetochores in prometaphase after nuclear envelope breakdown. During mitosis, it is required for the maintenance of chromosome cohesion and may play an important role in silencing the spindle checkpoint.
