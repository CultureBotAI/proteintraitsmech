identifier: InterPro:IPR054065
label: "Baseplate wedge protein gp6, C-terminal domain III"
definition: >-
  This entry represents a domain found in Baseplate wedge protein gp6 from Enterobacteria phage T4 (Gp6) and similar sequences from tailed bacteriophages and bacterial prophages. Gp6 is located next to the tail tube and is an intermediate (or inner) baseplate protein involved in tail assembly. Two molecules of Gp6 form a complex with Gp25 and Gp7, which is involved sheath contraction. This domain has been described as C-terminal domain III.
