identifier: InterPro:IPR012549
label: "Phosphoethanolamine transferase, N-terminal"
definition: >-
  This entry represents a domain found in a group of bacterial phosphoethanolamine transferases, including EptA from Helicobacter pylori and Neisseria meningitidis, and EptA/EptB/EptC from Escherichia coli. This domain is found immediately N-terminal to the sulphatase domain in many sulphatases. The structure of EptA from Neisseria meningitidis has been solved. This entry represents the N-terminal transmembrane domain of EptA.
