identifier: InterPro:IPR063138
label: "Flagellar regulatory protein FliZ, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of protein FliZ, a flagellar regulatory protein found in Enterobacteriales and related Gammaproteobacteria. FliZ transiently interferes with RpoS (sigma S) activity during post-exponential growth phase without affecting RpoS expression. FliZ acts as a timing device for expression of genes for adhesive curli fimbriae by indirectly decreasing expression of the curli regulator CsgD. This domain is found at the N terminus alongside (Phage_int_SAM_1). The specific function of this domain remains to be determined.
