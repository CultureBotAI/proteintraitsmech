identifier: InterPro:IPR024364
label: "Baseplate hub assembly protein Gp26/51 domain"
definition: >-
  This entry represents a domain that covers the whole length of the protein in Gp26 and the N-terminal region of Gp51, both base plate proteins from bacteriophage T4 encoded by late genes. Proteins in this group have a single completely conserved residue S that may be functionally important. Gp26 is a structural component of the central hub of the baseplate. It associates with Gp25 (tail lysozyme) in the assembly process. Gp51 is essential for the formation of the central hub of the phage baseplate, playing a catalytic role for the central hub formation. It is also a structural component of the hub. Tape measure (TM) protein assembly into tails requires the action of tail assembly chaperones (TACs). Gp26 and Gp51 have been shown to be TAC proteins.
