identifier: InterPro:IPR058635
label: "YhbJ, barrel-sandwich hybrid domain"
definition: >-
  This domain is found in the putative efflux system component YhbJ from Bacillus subtilis and related proteins mainly found in firmicutes. In contrast to the barrel-sandwich hybrid domains found in other efflux system components, this domain doesn't have a helical insertion but similarly it is inserted into a β-barrel which is structurally similar to C-terminal domain of Alanine racemase. Its specific function is still unknown.
