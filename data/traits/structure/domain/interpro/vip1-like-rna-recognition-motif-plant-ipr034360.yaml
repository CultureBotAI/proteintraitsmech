identifier: InterPro:IPR034360
label: "Vip1-like, RNA recognition motif, plant"
definition: >-
  This entry represents the Vip1-like, uncharacterised proteins found in plants. Although their biological roles remain unclear, these proteins show high sequence similarity to the fission yeast Vip1. Similar to the Vip1 protein, members in this family contain an N-terminal RNA recognition motif (RRM).
