identifier: InterPro:IPR008456
label: "Collagen binding domain"
definition: >-
  The domain fold is a jelly-roll, composed of two antiparallel β-sheets and two short α-helices. A groove on β-sheet I exhibited the best surface complementarity to the collagen. This site partially overlaps with the peptide sequence previously shown to be critical for collagen binding. Recombinant proteins containing single amino acid mutations designed to disrupt the surface of the putative binding site exhibited significantly lower affinities for collagen.
