identifier: InterPro:IPR058413
label: "Domain of unknown function DUF8100"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in the Halobacteria class of Archaea. Proteins in this family are predominantly found in the order Halobacteriales, including genera such as Halobacterium, Haladaptatus, and Halonotius. The proteins in this family typically range from 145 to 227 amino acids in length. These proteins are predicted to be integral membrane proteins, as they contain multiple transmembrane helices.
