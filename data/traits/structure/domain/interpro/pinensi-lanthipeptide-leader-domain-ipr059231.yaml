identifier: InterPro:IPR059231
label: "Pinensi, lanthipeptide leader domain"
definition: >-
  This class I lanthipeptide leader peptide domain occurs in Gram-negative bacteria such as Chitinophaga pinensis (for which pinensins, antifungal lantibiotics, are named). Most member sequences contain the motif SFVT, and the leader peptide ends with a typical GlyGly motif.
