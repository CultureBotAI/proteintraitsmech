identifier: InterPro:IPR039540
label: "UBL3-like, ubiquitin domain"
definition: >-
  This entry represents the ubiquitin domain found in ubiquitin-like protein 3 (UBL3) and related proteins, such as MUB1-6 from Arabidopsis. The AtMUB proteins localize a specific subset of ubiquitin-conjugating (E2) enzymes to the plasma membrane.
