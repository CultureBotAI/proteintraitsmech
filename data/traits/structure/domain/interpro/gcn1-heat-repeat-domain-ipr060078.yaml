identifier: InterPro:IPR060078
label: "GCN1, HEAT repeat domain"
definition: >-
  This is a region of HEAT repeats found in human Stalled ribosome sensor GCN1 and similar eukaryotic proteins. GCN1 is a ribosome collision sensor that plays a key role in the RNF14-RNF25 translation quality control pathway, which occurs when a ribosome has stalled during translation, promoting ubiquitination and degradation of translation factors on stalled ribosomes. The structure of this protein is predicted to be entirely formed by HEAT repeats. This domain is also found in Protein ILITYHIA from Arabidopsis thaliana, a plant GCN1 homologue. Unlike other GCN1 homologues, ILA is not a component of the MOS4-associated complex (MSC), a protein complex with homology to the nineteen complex (NTC) in yeast and human..
