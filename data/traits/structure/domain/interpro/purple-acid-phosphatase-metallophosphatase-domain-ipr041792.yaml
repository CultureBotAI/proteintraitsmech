identifier: InterPro:IPR041792
label: "Purple acid phosphatase, metallophosphatase domain"
definition: >-
  This entry represents the whole binuclear metal centre domain. It is mainly found in purple acid phosphatases (PAPs) and related acid phosphatases. This domain contains two key components: a Calcineurin-like phosphoesterase domain , which is a conserved domain found in enzymes that catalyze phosphoester hydrolysis and a Purple acid phosphatase C-terminal domain , which contributes to the overall structure and function of PAPs. The most conserved regions in the Calcineurin-like domain center around the metal-chelating residues. The structure typically comprises two sandwiched β-sheets flanked by α-helical segments, with the binuclear metal center located at the interface between two symmetrical halves of the molecule. This domain arrangement allows PAPs to perform their characteristic phosphatase activity under acidic conditions. Purple acid phosphatases (PAPs) ( ) are a family of binuclear metallohydrolases that break down phosphate esters and anhydrides in acidic conditions; they have been identified in plants, animals, and fungi. The best-characterised enzyme is from kidney bean, and that enzyme binds Fe 3+ and Zn 2+ ions. The metals bound differ according to source species; for example, the enzyme from sweet potato binds iron and manganese. The structure of the kidney bean enzyme has been solved and shows a disulfide-linked homodimer, with each monomer having a two-domain structure. Human acid phosphatase type 7 is also known as purple acid phosphatase long form. It is associated with bone resorption and microbial killing through its phosphatase activity and hydroxyl radical production. While most of the PAPs are active on a wide range of substrates, some PAPs display higher activity on phytate or 2-phosphoenolpyruvate (PEP).
