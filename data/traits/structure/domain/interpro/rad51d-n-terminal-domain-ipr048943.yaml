identifier: InterPro:IPR048943
label: "RAD51D, N-terminal domain"
definition: >-
  DNA repair protein RAD51 homolog 4 (RAD51D) plays an important role in DNA repair by homologous recombination (HR) and together with other RAD51 paralogues, RAD51B, RAD51C, XRCC3 and XRCC2, helps recruiting RAD51 to the break site. This entry represents the N-terminal domain of human RAD51D and similar proteins from animals. This domain is essential for protein-protein interaction with XRCC2 and consists of four short helices flanked by long N- and C-terminal tails. It can bind DNA, preferentially ssDNA.
