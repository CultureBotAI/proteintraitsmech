identifier: InterPro:IPR019609
label: "Variant surface glycoprotein , C-terminal"
definition: >-
  This entry represents the C-terminal of the variant surface glycoprotein (VSG). Variant surface glycoprotein (VSG) forms a dense coat on the surface of the trypanosome parasite Trypanosoma brucei. The parasite evades the host immune response through antigenic variation, sequentially expressing antigenically distinct VSGs from an estimated repertoire of 1000 VSG genes. This continuous switching of the surface coat enables the parasite to escape immune recognition and establish persistent infection.
