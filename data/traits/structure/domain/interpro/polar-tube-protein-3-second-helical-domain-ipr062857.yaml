identifier: InterPro:IPR062857
label: "Polar tube protein 3, second helical domain"
definition: >-
  This entry represents a helical domain found in polar tube proteins from microsporidia. The protein is involved in sporoblast-to-spore polar tube biogenesis and plays a role in controlling polar tube extrusion in response to ionic stimuli. The protein is localised to the spore polar tube and is highly expressed during polar tube formation. The specific function of this domain remains to be determined.
