identifier: InterPro:IPR059963
label: "AF_0136, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the AF_0136 family of uncharacterised proteins found in methanogenic archaea. The full-length proteins are approximately 185 amino acids in length and contain both N-terminal and C-terminal domains. The function of this N-terminal domain remains to be determined.
