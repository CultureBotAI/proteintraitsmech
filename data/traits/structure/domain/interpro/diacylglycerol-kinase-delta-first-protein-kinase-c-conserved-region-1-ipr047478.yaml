identifier: InterPro:IPR047478
label: "Diacylglycerol kinase delta, first protein kinase C conserved region 1"
definition: >-
  This entry represents the first protein kinase C conserved region 1 (C1 domain) of DAG kinase delta and similar proteins from vertebrates. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn2-binding sites. Diacylglycerol (DAG) kinase ( ) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid.DGK-delta is a member of the diacylglycerol kinase family. DGK-delta is involved in the regulation of clathrin-dependent endocytosis. It is a residential lipid kinase in the endoplasmic reticulum. It promotes lipogenesis and is involved in triglyceride biosynthesis. The SAM domain of DGK-delta proteins can form high molecular weight homooligomers through head-to-tail interactions as well as heterooligomers with the SAM domain of DGK-eta proteins. The oligomerisation plays a role in the regulation of the DGK-delta intracellular localisation: it inhibits the translocation of the protein to the plasma membrane from the cytoplasm. The SAM domain also can bind Zn at multiple (not conserved) sites driving the formation of highly ordered large sheets of polymers, thus suggesting that Zn may play important role in the function of DCK-delta. DAG kinase delta also contains two copies of the C1 domain.
