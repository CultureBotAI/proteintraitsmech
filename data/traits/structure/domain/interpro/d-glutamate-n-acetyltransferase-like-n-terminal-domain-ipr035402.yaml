identifier: InterPro:IPR035402
label: "D-glutamate N-acetyltransferase-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal end of a group of prokaryotic proteins that includes from Tritonibacter scottomollicae (DgcN), an N-acetyltransferase responsible for N-acetylation of D-Glutamate, an essential component of bacterial peptidoglycans. DgcN consists of two distinct domains. This domain adopts a Rossman-like fold, with four β-strands composing a hydrogen-bonded β-sheet and six α-helices.
definition_source: InterPro
