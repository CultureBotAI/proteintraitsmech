identifier: InterPro:IPR054748
label: "NAD(P)H:rubredoxin oxidoreductase, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of NAD(P)H:rubredoxin oxidoreductase from Pyrococcus furiosus (NROR) and similar sequences mainly found in archaea. NROR catalyses the NADH -dependent reduction of rubredoxin (Rd), a small iron-containing redox protein. This domain, likely to be involved in dimerisation, is often found associated with .
