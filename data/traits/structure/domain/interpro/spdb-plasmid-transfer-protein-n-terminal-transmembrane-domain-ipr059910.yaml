identifier: InterPro:IPR059910
label: "SpdB plasmid transfer protein, N-terminal transmembrane domain"
definition: >-
  This entry represents the N-terminal transmembrane domain of SpdB, a plasmid transfer protein from Streptomyces species. SpdB is encoded on conjugative plasmids such as pIJ101 from Streptomyces lividans and functions in bacterial conjugation. This N-terminal domain contains three transmembrane helices that anchor the protein in the cell membrane.
