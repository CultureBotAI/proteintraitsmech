identifier: InterPro:IPR012788
label: "4-carboxymuconolactone decarboxylase"
definition: >-
  Members of this entry are 4-carboxymuconolactone decarboxylases, which catalyses the third step in the catabolism of protocatechuate (and therefore the fourth step in the catabolism of para-hydroxybenzoate, of 3-hydroxybenzoate, of vanillate, etc.). Most members of this domain are encoded within protocatechuate catabolism operons. This protein is sometimes found as a fusion protein with other enzymes of the pathway, as in Rhodococcus opacus (Nocardia opaca), Streptomyces avermitilis, and Caulobacter crescentus (Caulobacter vibrioides).
