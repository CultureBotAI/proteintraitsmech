identifier: InterPro:IPR021386
label: "SPP41, DUF3020"
definition: >-
  This domain of unknown function is found in the conserved fungal proteins SPP41 (suppressor of PrP4, there are four members, SPP4 1-4). Although the function of SPP41 is not known, it has been shown that it is involved in negative regulation of expression of spliceosome components PRP4 and PRP3 and that it relocalizes to the cytosol in response to hypoxia.
