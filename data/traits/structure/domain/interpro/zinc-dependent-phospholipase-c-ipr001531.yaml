identifier: InterPro:IPR001531
label: "Zinc-dependent phospholipase C"
definition: >-
  Bacillus cereus contains a monomeric phospholipase C (PLC) of 245 amino-acid residues that binds three zinc ions. Although PLC prefers to act on phosphatidylcholine, it also shows weak catalytic activity with sphingomyelin and phosphatidylinositol. Sequence studies have shown the PLC protein to be similar to the following: Alpha toxin from Clostridium perfringens and Clostridium bifermentans, which are zinc-dependent phospholipases C involved in haemolysis and cell rupture. Lecithinase C from Listeria monocytogenes, which aids cell-to-cell spread by breaking down the 2-membrane vacuoles that surround the bacterium during transfer. Each of these proteins is a zinc-dependent enzyme, binding 3 zinc ions per molecule. The enzymes catalyse the conversion of phosphatidylcholine and water to 1,2-diacylglycerol and choline phosphate. In B. cereus, there are nine residues known to be involved in binding the zinc ions: 5 His, 2 Asp, 1 Glu and 1 Trp. These residues are all conserved in the Clostridium alpha-toxin.
