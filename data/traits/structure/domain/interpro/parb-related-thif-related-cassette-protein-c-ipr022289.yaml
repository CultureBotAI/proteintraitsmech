identifier: InterPro:IPR022289
label: "ParB-related, ThiF-related cassette, protein C"
definition: >-
  This entry represents a novel genetic system which is characterised by six major proteins, one of which is a ParB and ThiF homologue designated PRTRC (ParB-Related,ThiF-Related Cassette). This PRTRC system c protein is often found on plasmids.
