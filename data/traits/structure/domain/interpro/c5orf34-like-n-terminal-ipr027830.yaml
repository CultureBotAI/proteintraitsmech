identifier: InterPro:IPR027830
label: "C5orf34-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of a family of eukaryotic proteins, including the human uncharacterised protein C5orf34, which has been reported to be correlated with an unfavorable prognosis of patients from a variety of human malignancies. This domain was previously known as DUF4524. It is predicted to show an α/β structure.
