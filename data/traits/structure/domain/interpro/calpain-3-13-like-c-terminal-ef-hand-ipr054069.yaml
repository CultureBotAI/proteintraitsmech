identifier: InterPro:IPR054069
label: "Calpain-3/13-like, C-terminal EF-hand"
definition: >-
  This domain is found at the C-terminal end of human Calpain-13 (CAPN13) , Calpain-3 (CAPN3) and similar sequences from vertebrates. CAPN13 is thought to be a non-lysosomal thiol-protease. CAPN3 is a calcium-regulated non-lysosomal thiol-protease that cleaves proteolytically CTBP1 at 'His-409'. It mediates, with UTP25, the proteasome-independent degradation of p53/TP53. This entry represents the last EF-hand domain of this protein.
