identifier: InterPro:IPR041441
label: "Pih1, Ascomycota, CS domain"
definition: >-
  This entry represents the CS domain found in Pih1 from Ascomycota. Pih1 is part of the R2TP complex. The CS domain of Pih1 binds to the unstructured region of Tah1. The C-terminal domain of Pih1 consists of a seven-stranded β sandwich with the topology of a CS domain, a structural motif also found in Hsp90 cochaperones such as p23/Sba1 and Sgt1.
