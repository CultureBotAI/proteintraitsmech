identifier: InterPro:IPR021798
label: Alpha-(1->3)-arabinofuranosyltransferase, N-terminal GT-C domain
definition: >-
  This domain is found at the N-terminal of alpha-(1->3)- arabinofuranosyltransferase from Mycolicibacterium smegmatis (AftD, EC:2.4.2.47), which is involved in the biosynthesis of the arabinogalactan (AG) region of the mycolylarabinogalactan -peptidoglycan (mAGP) complex, an essential component of the mycobacterial cell wall. It catalyses the addition of an arabinofuranosyl (Araf) residue from the sugar donor decaprenyl-phospho-arabinose (DPA) on the C-3 of an alpha-(1->5)-linked Araf from the arabinan backbone of AG. This domain shows mixed α/β folds homologous to other solved GT-C glycosyltransferase structures.
