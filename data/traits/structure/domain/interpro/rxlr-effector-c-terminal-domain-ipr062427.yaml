identifier: InterPro:IPR062427
label: "RxLR effector, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of RxLR effector proteins found in Phytophthora species. RxLR effectors are secreted proteins produced by oomycete plant pathogens that are translocated into host plant cells to manipulate host cellular processes and suppress plant immunity. These effectors typically contain an N-terminal signal peptide, an RxLR translocation motif, and variable C-terminal effector domains. This C-terminal domain is found in oomycetes of the Peronosporaceae family. The specific function of this C-terminal domain remains to be determined.
