identifier: InterPro:IPR060534
label: "SusR, N-terminal domain"
definition: >-
  This entry represents the N-terminal periplasmic domain of the SusR protein. This region of SusR is involved in sensing maltose levels and then transduces this signal to the C-terminal DNA-binding domain to promote transcription of the Sus operon.
