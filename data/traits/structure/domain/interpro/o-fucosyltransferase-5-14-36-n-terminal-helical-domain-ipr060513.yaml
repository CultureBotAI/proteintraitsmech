identifier: InterPro:IPR060513
label: "O-fucosyltransferase 5/14/36, N-terminal helical domain"
definition: >-
  This entry represents the N-terminal helical domain found in O-fucosyltransferase 5, 14 and 36 proteins in plants. This N-terminal helical domain precedes the catalytic glycosyltransferase domain and includes the transmembrane region and adjacent sequences. The domain is found in land plants (Embryophyta), particularly within flowering plants (Magnoliopsida). The specific function of this helical domain remains to be determined. This helical domain is not present in all O-fucosyltransferases. O-fucosyltransferases are membrane-bound glycosyltransferases that belong to the GT106 family and are involved in glycan metabolism. The proteins contain a signal-anchor transmembrane helix that functions as a type II membrane protein topology anchor.
