identifier: InterPro:IPR002505
label: "Phosphate acetyl/butaryl transferase"
definition: >-
  This entry contains both phosphate acetyltransferase : Acetyl-CoA + phosphate = CoA + acetyl phosphate and phosphate butaryltransferase : Butanoyl-CoA + phosphate = CoA + butanoyl phosphate These enzymes catalyse the transfer of an acetyl or butaryl group to orthophosphate.
