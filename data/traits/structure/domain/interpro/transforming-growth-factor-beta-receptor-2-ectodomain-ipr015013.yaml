identifier: InterPro:IPR015013
label: Transforming growth factor beta receptor 2 ectodomain
definition: >-
  The Transforming growth factor beta receptor 2 ectodomain is a compact fold consisting of nine β-strands and a single helix stabilised by a network of six intra strand disulphide bonds. The folding topology includes a central five-stranded antiparallel β-sheet, eight-residues long at its centre, covered by a second layer consisting of two segments of two-stranded antiparallel β-sheets (beta1-beta4, beta3-beta9).
