identifier: InterPro:IPR004305
label: Thiaminase-2/PQQC
definition: >-
  Proteins containing this domain are found in all the three major phyla of life: archaebacteria, eubacteria, and eukaryotes. In Bacillus subtilis, TenA is one of a number of proteins that enhance the expression of extracellular enzymes, such as alkaline protease, neutral protease and levansucrase and has been identified as a Thiaminase 2. The THI-4 protein, which is involved in thiamine biosynthesis, also contains this domain. The C-terminal part of these proteins consistently show significant sequence similarity to TenA proteins. This similarity was first noted with the Neurospora crassa THI-4.
