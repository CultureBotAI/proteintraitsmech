identifier: InterPro:IPR006137
label: "NADH:ubiquinone oxidoreductase-like, 20kDa subunit"
definition: >-
  This entry represents a Rossmann fold-type domain found in NADH:ubiquinone oxidoreductase 20kDa subunit, [NiFe] hydrogenase small subunit and coenzyme F420 hydrogenase subunit gamma. NADH:ubiquinone oxidoreductase (complex I) ( ) is a respiratory-chain enzyme that catalyses the transfer of two electrons from NADH to ubiquinone in a reaction that is associated with proton translocation across the membrane (NADH + ubiquinone = NAD+ + ubiquinol). Among the many polypeptide subunits that make up complex I, there is one with a molecular weight of 20kDa (in mammals), which is a component of the iron-sulphur (IP) fragment of the enzyme. It seems to bind a 4Fe-4S iron-sulphur cluster. The great majority of hydrogenases (H2ases) contain iron-sulfur clusters and two metal atoms at their active centre, Ni and Fe in the case of the [NiFe]-H2ases. They catalyse the reversible oxidation of hydrogen gas and play a central role in microbial energy metabolism; in addition to their role in fermentation and H2 respiration. The small subunit (chain A) contains the Fe4S4 clusters, whereas the large subunit (chain B) binds the binuclear NiFe active site.
