identifier: InterPro:IPR009647
label: "Penicillin-binding, C-terminal"
definition: >-
  This conserved region of approximately 90 residues is found in a sub-group of bacterial Penicillin-Binding Proteins (PBPs). A variable length loop region separates this region from the transpeptidase unit ( ). It is predicted to be a β fold.
