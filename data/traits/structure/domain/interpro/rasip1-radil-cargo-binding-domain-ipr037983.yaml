identifier: InterPro:IPR037983
label: "Rasip1/Radil, cargo-binding domain"
definition: >-
  Ras-interacting protein 1 (Rasip1 or RAIN) is an effector of the small G protein Rap1 and plays an important role in endothelial junction stabilization. It plays an essential role in vascular development. Radil is also a Rap1 effector. It regulates beta1 and beta2-integrin activation and controls neutrophil chemotaxis. Radil, like Rasip1, is a multi domain protein, that contains a myosin5-like cargo-binding domain (CBD).
