identifier: InterPro:IPR021150
label: "Ubiquinol-cytochrome c chaperone"
definition: >-
  Saccharomyces cerevisiae ubiquinol-cytochrome C chaperone (CBP3) is required for assembly of coenzyme QF-2-cytochrome C reductase. This protein is organised into two domains: a variable N-terminal domain of unknown function present in mitochondrial Cbp3 homologues and a conserved C-terminal ubiquinol-cytochrome c chaperone domain (this entry). The crystal structure of this domain has been resolved in the homologue from the bacteria Brucella abortus, showing an all-helical fold. This domain is also found other proteins mainly from eukaryotes and Proteobacteria. In vertebrates, CBP3 homologs are known as Ubiquinol-cytochrome c reductase complex assembly factors 1 (Uqcc1) Some members of this group are annotated as part of the UPF0174 family.
