identifier: InterPro:IPR059497
label: "Anti-sigma-M factor RsmA, C-terminal extracellular domain"
definition: >-
  This entry represents the C-terminal extracellular domain of RsmA (regulator of SigM) and similar sequences from actinobacteria. RsmA is an anti-sigma factor that regulates the extracytoplasmic function (ECF) sigma factor SigM. It functions to hold the ECF sigma factor SigM in an inactive form until it is released by regulated intramembrane proteolysis (RIP). This domain, which is located on the extracellular side of the membrane, following the transmembrane helix, likely functions as a sensor domain that responds to extracytoplasmic signals. Upon signal detection, this domain is cleaved by a site-1 protease (S1P) as the first step in the proteolytic cascade. Subsequent cleavage within the membrane by site-2 protease (S2P/Rip1) and cytoplasmic degradation ultimately liberates SigM from the inhibitory N-terminal cytoplasmic domain of RsmA. This domain architecture, with an N-terminal cytoplasmic anti-sigma domain, a single transmembrane helix, and a C-terminal extracellular sensor domain, is characteristic of anti-sigma factors involved in regulated intramembrane proteolysis signalling pathways in bacteria.
