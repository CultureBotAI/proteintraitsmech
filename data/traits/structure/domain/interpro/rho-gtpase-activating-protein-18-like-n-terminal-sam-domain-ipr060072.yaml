identifier: InterPro:IPR060072
label: "Rho GTPase-activating protein 18-like, N-terminal SAM domain"
definition: >-
  This SAM-like domain is found at the N-terminal end of human Rho GTPase-activating protein 18/28 (ARHGAP18/28) and similar proteins mainly found in animals. ARHGAP18 suppresses F-actin polymerisation by inhibiting Rho. It plays a key role in tissue tension and 3D tissue shape by regulating cortical actomyosin network formation.
