identifier: InterPro:IPR044737
label: "TopBP1, first BRCT domain"
definition: >-
  The entry corresponds to the first BRCT domain found in TopBP1, which is a protein-protein binding module [3]. TopBP1, also known as DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response, acting as a scaffold protein. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. It has been shown to activate the ATR-ATRIP complex. TopBP1 contains eight copies of BRCT domain which specifically recognise and bind phosphorylated proteins, bringing proteins together into functional combinations.
