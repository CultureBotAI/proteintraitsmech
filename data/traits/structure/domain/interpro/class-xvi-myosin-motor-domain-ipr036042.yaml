identifier: InterPro:IPR036042
label: "Class XVI myosin, motor domain"
definition: >-
  Type XVI myosin (Myo16) is also known as neuronal tyrosine-phosphorylated phosphoinositide-3-kinase adapter 3/NYAP3. Myo16 is thought to play a regulatory role in cell cycle progression and has been implicated in schizophrenia. Class XVI myosins are characterised by an N-terminal ankyrin repeat domain thought to bind protein phosphatase 1 catalytic subunits 1alpha/PPP1CA and 1gamma/PPP1CC. Myo16 interacts with phosphoinositide 3-kinase and the components of the WAVE1 complex. The catalytic (head) domain may not act as a molecular motor, as sequence analysis of the ATP-binding site predicted reduced ATPase activity.
