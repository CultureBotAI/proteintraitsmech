identifier: InterPro:IPR063710
label: "CCDC3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of CCDC3, a protein that negatively regulates TNF-alpha-induced pro-inflammatory responses in endothelial cells and positively regulates lipid accumulation in adipose cells. This domain adopts a β-barrel fold similar to that in tissue inhibitors of metalloproteinases (TIMPs).
