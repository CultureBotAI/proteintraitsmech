identifier: InterPro:IPR063140
label: "RMD9, N-terminal domain"
definition: >-
  This entry represents the N-terminal mitochondrial transit peptide TPR domain found in RMD9 proteins from ascomycetes. RMD9 is an RNA-binding protein that localises to the mitochondrial inner membrane and binds the 3'-UTR of mitochondrial mRNAs. The transit peptide directs the protein to the mitochondrial matrix where it is cleaved off during import. The peptide varies in length from 12 residues in Eremothecium gossypii to 108 residues in Debaryomyces hansenii. The mature protein following transit peptide cleavage is involved in mitochondrial mRNA processing and stability. RMD9 proteins function as monomers and phosphorylation promotes RNA binding activity.
