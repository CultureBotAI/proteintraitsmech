label: "K+ potassium transporter, integral membrane domain"
definition: >-
  This is a family of K+ potassium transporters that are conserved across phyla, including bacterial (KUP), yeast (HAK), and plant (AtKT). This entry represents the N-terminal integral membrane domain.
