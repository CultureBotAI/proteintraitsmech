identifier: InterPro:IPR063061
label: "DNA helicase IV HelD, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of approximately 170 residues found in DNA helicase IV (HelD) proteins. The domain is found N-terminal to UvrD-helicase ( ) and UvrD_C_2 ( ) domains. HelD catalyses the unwinding of duplex DNA in the 3' to 5' direction and interacts with RNA polymerase. HelD homologues have been implicated in rifampicin resistance in some bacteria. This entry is found predominantly in Actinomycetota and Bacillota.
