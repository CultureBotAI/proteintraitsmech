identifier: InterPro:IPR006295
label: "DNA primase, DnaG"
definition: >-
  Proteins with this domain are DNA primases, a ubiquitous bacteria protein. Most DNA primases contain nearly two hundred additional residues C-terminal to the region represented here, but conservation between species is poor. DNA primase synthesises the RNA primers for the Okazaki fragments in lagging strand DNA synthesis. Escherichia coli family member DnaG has been shown to interact with the replicative DnaB helicase, single-stranded DNA binding protein (SSB), and DNA polymerase III holoenzyme. Although DnaG is capable of synthesizing 60-nucleotide-long primers in vitro, this primer length is restrained to 11 (+/-1) nucleotides in the context of the replisome. On the basis of sequence analysis, these proteins appear structurally distinct from primases known to act in archaeal and eukaryotic replication, or to either of the two subunits, p50 and p60, of the heterodimeric eukaryotic DNA primase.
