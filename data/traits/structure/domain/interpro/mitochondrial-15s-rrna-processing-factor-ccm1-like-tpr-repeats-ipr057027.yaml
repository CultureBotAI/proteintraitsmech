identifier: InterPro:IPR057027
label: "Mitochondrial 15S rRNA processing factor CCM1-like, TPR repeats"
definition: >-
  This entry represents a predicted region of tetratricopeptide repeats (TPR) found in a group of eukaryotic proteins, including mouse Leucine-rich PPR motif-containing protein, mitochondrial (Lrpprc) and Mitochondrial 15S rRNA processing factor CCM1 from Candida albicans. Lrpprc may play a role in RNA metabolism in both nuclei and mitochondria. CCM1 regulates mitochondrial small subunit maturation by controlling 15S rRNA 5'-end processing.
