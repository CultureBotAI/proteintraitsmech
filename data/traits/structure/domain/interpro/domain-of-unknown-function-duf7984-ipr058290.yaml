identifier: InterPro:IPR058290
label: "Domain of unknown function DUF7984"
definition: >-
  This entry represents a family of uncharacterised proteins found in halobacteria. These proteins are about 160 amino acids in length and have an α helical domain fold. Shows structural similarity to the YutG/PgpA superfamily, which includes Phosphatidylglycerophosphatase. Thus this family may represent a similar enzyme.
