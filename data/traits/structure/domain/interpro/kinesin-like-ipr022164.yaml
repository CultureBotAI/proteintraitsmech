identifier: InterPro:IPR022164
label: Kinesin-like
definition: >-
  This domain is found in eukaryotes, and is typically between 131 and 151 amino acids in length. There is a single completely conserved residue W that may be functionally important. It is found in some kinesin-like proteins and in Rab GTPase-activating protein 1.
