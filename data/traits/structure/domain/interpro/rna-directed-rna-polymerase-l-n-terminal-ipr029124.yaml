identifier: InterPro:IPR029124
label: "RNA-directed RNA polymerase L, N-terminal"
definition: >-
  This endonuclease domain is found at the N-terminal of many Bunyavirus L proteins, that possess a cap-snatching mechanism that cannibalizes host cellular mRNA cap structures and it is crucial for cap-dependent viral mRNA transcription. L protein is a RNA-dependent RNA polymerase responsible for replication and transcription of the viral RNA genome.
