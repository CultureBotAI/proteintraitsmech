identifier: InterPro:IPR055139
label: "Interleukin-18-binding protein-like domain"
definition: >-
  This entry represents a domain found in human Interleukin-18-binding protein (IL18BP,) and similar sequences from vertebrates and virus. IL18BP is unique among the diverse family of mammalian and poxvirus IL18BPs in that it uses a bivalent binding mode and a unique set of interacting residues for binding IL18. It binds to the same surface of IL18 used by other IL18BPs, suggesting that all IL18BPs use a conserved inhibitory mechanism by blocking a putative receptor-binding site on IL18. This domain adopts a typical Ig-like fold.
