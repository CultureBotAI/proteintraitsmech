identifier: InterPro:IPR019079
label: "Capsule synthesis protein, CapA"
definition: >-
  CapA is a putative poly-gamma-glutamate capsule biosynthesis protein found in bacteria. Poly-gamma-glutamate is a natural polymer that may be involved in virulence and may help bacteria survive in high salt concentrations. It is a surface-associated protein.
