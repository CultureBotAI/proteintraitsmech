identifier: InterPro:IPR018807
label: "Cell wall protein YJL171C/Tos1, N-terminal"
definition: >-
  This entry represents a domain found in a group of fungal cell wall proteins, including Probable circularly permuted 1,3-beta-glucanase Tos1 and YJL171C from budding yeasts. This proteins are related to glycosyl hydrolases. The function of this glycine-rich domain is unknown.
