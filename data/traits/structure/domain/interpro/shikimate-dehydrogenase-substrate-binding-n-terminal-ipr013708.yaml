identifier: InterPro:IPR013708
label: Shikimate dehydrogenase substrate binding, N-terminal
definition: >-
  This domain is the substrate binding domain of shikimate dehydrogenase. Shikimate dehydrogenase catalyses the fourth step of the mycobacterial Shikimate pathway, which results in the biosynthesis of chorismate. Chorismate is a precursor of aromatic amino acids, naphthoquinones, menaquinones and mycobactins. This pathway is an important target for antibacterial agents, especially against Mycobacterium tuberculosis, since it does not occur in mammals.
