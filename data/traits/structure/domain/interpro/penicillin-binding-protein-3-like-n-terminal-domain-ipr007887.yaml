identifier: InterPro:IPR007887
label: Penicillin-binding protein 3-like, N-terminal domain
definition: >-
  The multiple antibiotic resistance of methicillin-resistant strains of Staphylococcus aureus (MRSA) has become a major clinical problem worldwide. Methicillin resistance in MRSA strains is due to the acquisition of the mecA gene via horizontal transfer from an unidentified species which encodes penicillin-binding protein 2a (PBP2a). This entry represents the N-terminal domain of Penicillin-binding proteins (PBPs), including PBP3 from Bacillus subtilis, which may function in the late steps of murein biosynthesis. It is probably required for both cortical and vegetative peptidoglycan synthesis. Although not usually required for cell division, in the absence of PBP 2B (pbpB) it becomes essential. PBP3 confers resistance to oxacillin and cephalexin. This entry also includes the peptidoglycan D,D-transpeptidase MAB_3167c, a transpeptidase that catalyses cross-linking of the peptidoglycan cell wall. It is required for normal cell elongation and division and it is involved in resistance to antibiotics including beta-lactams.
