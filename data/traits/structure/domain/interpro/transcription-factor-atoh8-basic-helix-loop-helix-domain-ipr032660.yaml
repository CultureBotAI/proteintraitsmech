identifier: InterPro:IPR032660
label: "Transcription factor ATOH8, basic helix-loop-helix domain"
definition: >-
  Transcription factor ATOH8 , previously known as Protein atonal homologue 8 (ATOH8, also known as Math6), is a basic helix loop helix (bHLH) transcription factor that has been implicated in development of various tissues, such as pancreas, retina and skeletal muscle, during early development. Interestingly, hepatic ATOH8 mRNA levels were up-regulated in mice chronically fed a high iron diet and down-regulated in those fed an iron-deficient diet. ATOH8 has also been found to regulate iron hormone hepcidin (HAMP) transcription and cellular pSMAD1,5,8 levels. ATOH8 can also serve as a marker in human muscle fibre regeneration. This entry represents the bHLH (basic Helix-Loop-Helix) domain of ATOH8, which is approximately 60 amino acids long and consists of a DNA-binding basic region followed by two α-helices separated by a variable loop region (HLH). The HLH domain promotes dimerisation, allowing the formation of homo- or heterodimeric complexes between different family members. Many bHLH proteins have been shown to act as transcriptional regulators.
