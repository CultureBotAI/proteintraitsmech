identifier: InterPro:IPR056336
label: "Calcium channel YVC1-like, C-terminal transmembrane domain"
definition: >-
  This domain is found in members of the transient receptor potential Ca2+/cation channel (TRP-CC) family. It is found in Calcium channel YVC1 from Saccharomyces cerevisiae, for example, which is a transient receptor potential (TRP) channel required for release of calcium ions from the vacuole in response to hyperosmotic shock. This domain adopts an all-α configuration. It is often found associated with .
