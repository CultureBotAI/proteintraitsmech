identifier: InterPro:IPR029264
label: "ARF7 effector protein, C-terminal"
definition: >-
  This domain represents the C terminus of the ARF7 effector protein (ARF7EP), also known as ARL14 effector protein. ARF7EP interacts with actin based motor protein myosin 1E (MYO1E) and may be involved in connecting MHC class II-containing cytoplasmic vesicles to the actin network in dendritic cells. It contains a conserved CXCXXXXCXXCXXXCXXCXXXXCXXXCXC motif in its C-terminal half.
