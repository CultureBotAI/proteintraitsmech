identifier: InterPro:IPR006158
label: "Cobalamin (vitamin B12)-binding domain"
definition: >-
  The cobalamin (vitamin B12) binding domain can bind two different forms of the cobalamin cofactor, with cobalt bonded either to a methyl group (methylcobalamin) or to 5'-deoxyadenosine (adenosylcobalamin). Cobalamin-binding domains are mainly found in two families of enzymes present in animals and prokaryotes, which perform distinct kinds of reactions at the cobalt-carbon bond. Enzymes that require methylcobalamin carry out methyl transfer reactions. Enzymes that require adenosylcobalamin catalyse reactions in which the first step is the cleavage of adenosylcobalamin to form cob(II)alamin and the 5'-deoxyadenosyl radical, and thus act as radical generators. In both types of enzymes the B12-binding domain uses a histidine to bind the cobalt atom of cobalamin cofactors. This histidine is embedded in a DXHXXG sequence, the most conserved primary sequence motif of the domain. Proteins containing the cobalamin-binding domain include: Animal and prokaryotic methionine synthase ( ), which catalyse the transfer of a methyl group from methyl-cobalamin to homocysteine, yielding enzyme-bound cob(I)alamin and methionine. Animal and prokaryotic methylmalonyl-CoA mutase ( ), which are involved in the degradation of several amino acids, odd-chain fatty acids and cholesterol via propionyl-CoA to the tricarboxylic acid cycle. Prokaryotic lysine 5,6-aminomutase ( ). Prokaryotic glutamate mutase ( ). Prokaryotic methyleneglutarate mutase ( ). Prokaryotic isobutyryl-CoA mutase ( ). The core structure of the cobalamin-binding domain is characterised by a five-stranded α/β (Rossmann) fold, which consists of 5 parallel β-sheets surrounded by 4-5 α-helices in three layers (α/β/α). Upon binding cobalamin, important elements of the binding site appear to become structured, including an α-helix…
