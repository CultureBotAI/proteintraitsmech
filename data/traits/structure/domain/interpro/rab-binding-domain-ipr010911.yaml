identifier: InterPro:IPR010911
label: Rab-binding domain
definition: >-
  This entry represents the Rab-binding domain. Rab are small GTPases implicated in vesicle trafficking. Like the other small GTPases, Rab proteins act as molecular switches, with an active GTP-bound form that interacts with its target or effector protein and an inactive GDP-bound form. A subgroup of Rab effectors contain in their N-terminal part a conserved region of around 70 amino acid residues, the Rab-binding domain (RabBD). In some Rab effector domains an atypical FYVE-type zinc finger is inserted in the central part. The crystal structure of the Rab effector domain of Rabphilin-3A in complex with Rab3A has been solved. The structure consists of two long helices separated by an atypical FYVE-type zinc finger which adopts a conformation similar to classical ones. The central zinc finger does not directly interact with Rab3A. The amino acids important for this interaction are located around a short C-terminal motif (SGAWFF) and an acidic cluster in the N-terminal area.
