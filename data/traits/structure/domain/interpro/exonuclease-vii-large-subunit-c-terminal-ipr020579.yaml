identifier: InterPro:IPR020579
label: Exonuclease VII, large subunit, C-terminal
definition: >-
  Exonuclease VII ( ) is composed of two nonidentical subunits; one large subunit and 4 small ones. Exonuclease VII catalyses exonucleolytic cleavage in either 5'-3' or 3'-5' direction to yield 5'-phosphomononucleotides. The large subunit also contains the OB-fold domains that bind to nucleic acids at the N terminus. This entry represents Exonuclease VII, large subunit, C-terminal.
