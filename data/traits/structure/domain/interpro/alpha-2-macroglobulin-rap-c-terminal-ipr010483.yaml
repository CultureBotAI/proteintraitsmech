identifier: InterPro:IPR010483
label: "Alpha-2-macroglobulin RAP, C-terminal"
definition: >-
  The alpha-2-macroglobulin receptor-associated protein (RAP) is a intracellular glycoprotein that binds to the 2-macroglobulin receptor and other members of the low density lipoprotein receptor family. The protein inhibits binding of all currently known ligands of these receptors. Two different studies have provided conflicting domain boundaries.
