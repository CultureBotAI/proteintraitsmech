identifier: InterPro:IPR063734
label: "HIR3, TPR domain"
definition: >-
  This entry represents a tetratricopeptide repeat (TPR) domain found in HIR3 proteins. This domain is present in proteins such as HIR3 from Candida albicans, a histone transcription regulator involved in nucleosome assembly pathways required for heterochromatin integrity and chromosome segregation. The specific function of this domain remains to be determined.
