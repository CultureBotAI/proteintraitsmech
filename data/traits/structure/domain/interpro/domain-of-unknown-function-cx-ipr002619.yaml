identifier: InterPro:IPR002619
label: "Domain of unknown function CX"
definition: >-
  This domain of unknown function is found in proteins from nematodes, including Uncharacterized protein C07A9.12 from Caenorhabditis elegans. The domain contains 6 conserved cysteines that probably form three disulphide bridges.
