identifier: InterPro:IPR048726
label: "Nuclear mitotic apparatus protein 1, LGN binding domain"
definition: >-
  Mitotic progression is orchestrated by the microtubule-based motor dynein, which sustains all mitotic spindle functions. During cell division, cytoplasmic dynein acts with the high-molecular-weight complex dynactin and nuclear mitotic apparatus (NuMA) to organise and position the spindle. NuMA contains a hook domain contacting directly LIC1 and LIC2 chains through a conserved hydrophobic patch shared among other Hook adaptors. Hook adaptor proteins, including human Nuclear mitotic apparatus protein 1 (Numa1), share an N-terminal conserved globular hook domain ( ). NuMA, in complex with LGN, forms NuMA:LGN hetero-hexamers that promote spindle orientation. This entry corresponds to the LGN binding domain (LGNBD) of NuMA. LGN (named for leu-gly-asn repeats) is also known as G protein signalling modulator 2.
