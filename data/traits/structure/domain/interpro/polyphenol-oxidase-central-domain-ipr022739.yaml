label: "Polyphenol oxidase, central domain"
definition: >-
  This domain is found in bacteria and eukaryotes and is approximately 50 amino acids in length. It is found in association with and . Most members are annotated as being polyphenol oxidases, and many are from plants or plastids. There is a conserved DWL sequence motif.
