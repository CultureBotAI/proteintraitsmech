identifier: InterPro:IPR062457
label: "F15G9.5, middle domain"
definition: >-
  This entry represents the middle domain of F15G9.5 and related proteins found in nematodes. F15G9.5 is a multi-pass membrane protein with two transmembrane helices, expressed in larval stages and other tissues in Caenorhabditis elegans. The function of this middle domain remains to be determined.
