identifier: InterPro:IPR007868
label: "Hom-end-associated Hint"
definition: >-
  Homing endonucleases are encoded by mobile DNA elements that are found inserted within host genes in all domains of life. The crystal structure of the homing nuclease PI-Sce revealed two domains: an endonucleolytic centre resembling the C-terminal domain of Drosophila melanogaster Hedgehog protein, and a second domain containing the protein-splicing active site. This domain corresponds to the protein-splicing domain.
