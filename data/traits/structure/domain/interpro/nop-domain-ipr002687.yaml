identifier: InterPro:IPR002687
label: "Nop domain"
definition: >-
  This entry represents the Nop domain. The Nop domain is present in various pre-RNA processing ribonucleoproteins (RNP): Eukaryotic Prp31, part of a tri-snRNP complex. It is involved in pre-mRNA splicing. Eukaryotic Nucleolar proteins 56 and 58 (Nop56 and Nop58), components of box C/D small nucleolar ribonucleoprotein (snoRNP) particles. Archaeal Nop5, an homologue of Nop56/Nop58. The Nop domain is a RNP binding module, exhibiting RNA and protein binding surfaces. It is oval-shaped and exclusively α-helical. U4/U6 small nuclear ribonucleoprotein Prp31 (PRPF31) is involved in pre-mRNA splicing as component of the spliceosome. This protein is required for the assembly of the U4/U5/U6 tri-snRNP complex, one of the building blocks of the spliceosome. It is associated with a progressive pigmentary retinopathy characterised by night vision blindness and loss of midperipheral visual field. Nucleolar protein 56 and 58 (NOP56/58) are required for 60S ribosomal subunit synthesis. They are core components of box C/D small nucleolar ribonucleoprotein (snoRNP) particles. In humans, NOP56 is associated with a type of slowly progressive neurodegenerative disorder characterised by late-onset ataxia followed by variable involvement of the motor neuron system.
