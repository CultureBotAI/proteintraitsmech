identifier: InterPro:IPR049212
label: "Domain of unknown function DUF6815"
definition: >-
  This presumed domain is functionally uncharacterised and is found in bacteria and eukaryotes. It may contain an ATP-grasp-like fold which suggest an ATP-binding function. There are several conserved motifs: EGxxR, PxxWxxDF and ExNCSCV.
