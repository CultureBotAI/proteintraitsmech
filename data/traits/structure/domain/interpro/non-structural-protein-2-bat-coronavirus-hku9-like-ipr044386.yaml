identifier: InterPro:IPR044386
label: "Non-structural protein 2, bat coronavirus HKU9-like"
definition: >-
  This entry includes NSP2 from Rousettus bat coronavirus HKU9 and betacoronaviruses in the nobecovirus subgenera (D lineage). The functions of NSP2 remain unclear. SARS-CoV NSP2, rather than playing a role in viral replication, may be involved in altering the host cell environment; deletion of NSP2 from the SARS-CoV genome results in only a modest reduction in viral titers, and it has been shown to interact with two host proteins, prohibitin 1 (PHB1) and PHB2 which have been implicated in cellular functions, including cell-cycle progression, cell migration, cellular differentiation, apoptosis, and mitochondrial biogenesis. MHV NSP2, also known as p65, different from SARS-CoV NSP2, may play an important role in the viral life cycle.
