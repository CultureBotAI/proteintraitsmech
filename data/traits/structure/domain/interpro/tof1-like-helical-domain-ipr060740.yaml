identifier: InterPro:IPR060740
label: "TOF1-like, helical domain"
definition: >-
  This entry represents a helical domain in Topoisomerase 1-associated factor 1 (TOF1), Protein timeless homolog, Mating-type switching protein swi1 (swi1), and Uncharacterized protein PF3D7_0210200. TOF1 forms a fork protection complex (FPC) with csm3 and which is required for chromosome segregation during meiosis and DNA damage repair. FPC coordinates leading and lagging strand synthesis and moves with the replication fork. FPC stabilises replication forks in a configuration that is recognised by replication checkpoint sensors.
