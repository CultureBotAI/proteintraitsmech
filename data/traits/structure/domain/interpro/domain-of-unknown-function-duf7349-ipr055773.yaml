identifier: InterPro:IPR055773
label: "Domain of unknown function DUF7349"
definition: >-
  This family of uncharacterised proteins is found in various phages that infect bacterial hosts such as Bacillus, Staphylococcus, Enterococcus, Listeria, Lactobacillus, and Brochothrix species. The proteins in the family are typically 75 to 100 amino acids in length. The protein contains a small N-terminal domain represented by this entry followed by a C-terminal disordered region.
