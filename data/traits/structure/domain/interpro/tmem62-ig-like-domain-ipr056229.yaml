identifier: InterPro:IPR056229
label: "TMEM62, Ig-like domain"
definition: >-
  This domain is found in the human Transmembrane protein 62 (TMEM62), uncharacterised At3g03305 protein from Arabidopsis thaliana and related eukaryotic proteins. TMEM62 has been identified as a potential therapeutic target to enhance survival from high-grade serous carcinomas. The domain represented by this entry is predicted to fold into a β-sandwich with an Ig-like topology. It is frequently found associated with .
