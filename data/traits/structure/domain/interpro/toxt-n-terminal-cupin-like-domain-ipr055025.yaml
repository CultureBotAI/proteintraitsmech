identifier: InterPro:IPR055025
label: "ToxT, N-terminal cupin-like domain"
definition: >-
  This entry represents a cupin-like domain present in ToxT from Vibrio Cholerae ( , ). ToxT serves as the culminating factor in the regulatory pathway, ensuring the coordinated production of two virulence factors: the toxin-coregulated pilus (TCP) and cholera toxin (CT), which are crucial for the pathogenicity of V.cholerae in causing cholera. ToxT possesses dimerisation and regulatory elements in its cupin-like N-terminal domain, while its C-terminal harbours two HTH AraC-like DNA binding domains.
