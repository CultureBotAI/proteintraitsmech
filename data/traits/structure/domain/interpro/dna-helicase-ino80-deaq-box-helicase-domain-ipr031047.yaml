identifier: InterPro:IPR031047
label: "DNA helicase INO80, DEAQ-box helicase domain"
definition: >-
  Ino80 is evolutionarily conserved from yeast to human. It is an ATPase subunit of the INO80 complex. The Ino80 complex displays 3'-5' DNA helicase activity and is involved in transcription, DNA replication and repair, and chromatin remodelling. INO80 removes histone H3-containing nucleosomes from associated chromatin, promotes CENP-ACnp1 chromatin assembly at the centromere in a redundant manner with another chromatin-remodeling factor Chd1Hrp1. INO80 mutants have severe defects in oxygen consumption and promiscuous cell division that is no longer coupled with metabolic status. INO80 is a member of the DEAD-like helicase superfamily. This domain contains the ATP-binding region of INO80 from fungi and animals.
