identifier: InterPro:IPR032622
label: "UCP01524, winged helix-turn-helix domain"
definition: >-
  This domain is an example of a circularly permuted winged helix-turn-helix domain. This domain is found at the very C terminus of UCP01524, which is structurally similar to M28-peptidases but lacking one of the key zinc-binding residues.
