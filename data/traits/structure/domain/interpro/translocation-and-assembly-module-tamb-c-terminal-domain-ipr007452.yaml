identifier: InterPro:IPR007452
label: "Translocation and assembly module TamB, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in TamB proteins mainly found in bacteria and plants. TamB is an integral inner membrane protein that forms a complex, the translocation and assembly module or TAM, with the outer membrane protein, TamA. TAM facilitates the insertion and assembly of specific β-barrel proteins into the outer membrane. TAM is responsible for the efficient secretion of the adhesin protein Ag43 in E.coli K-12.
