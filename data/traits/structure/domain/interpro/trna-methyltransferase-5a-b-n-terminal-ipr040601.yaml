identifier: InterPro:IPR040601
label: "tRNA methyltransferase 5a/b, N-terminal"
definition: >-
  This is the N-terminal domain of tRNA methyltransferase 5a (Trm5a, also known as Taw22) from Pyrococcus abyssi and Tmr5b from Methanocaldococcus jannaschii. These proteins catalyse the methyl transfer from S-adenosyl methionine (AdoMet) to N1 of G37. This domain, also known as the D1 domain, contacts the tertiary core (elbow) region of the tRNA L shape in a ternary complex of the enzyme with tRNA and AdoMet.
