identifier: InterPro:IPR035391
label: "Arylsulfotransferase, N-terminal domain"
definition: >-
  This entry represents the small N-terminal domain found in arylsulfotransferases. Each ASST monomer consists of a small, N-terminal 7-stranded β-sandwich domain, and a large C-terminal, 6-bladed β-propeller domain. Arylsulfate sulfotransferase catalyses the transfer of a sulphate group from a phenyl sulphate ester to both phenolic and non-phenolic compounds as acceptor molecules. In vitro studies using p-nitrophenyl sulphate (pNPS) as the sulphate donor have demonstrated that the enzyme exhibits the highest activity with catechol among phenolic acceptors and with 2-aminocyclohexanol among non-phenolic acceptors. Additionally, the enzyme is capable of performing disulfation of appropriate acceptor molecules.
