identifier: InterPro:IPR047822
label: "TECRL, ubiquitin-like domain"
definition: >-
  This entry represents the Ubiquitin-like (Ubl) domain found in the trans-2,3-enoyl-CoA reductase-like (TECRL) protein, also known as steroid 5-alpha-reductase 2-like 2 protein (SRD5A2L2). TECRL is associated with life-threatening inherited arrhythmias displaying features of both long QT syndrome (LQTS) and catecholaminergic polymorphic ventricular tachycardia (CPVT). In cardiomyocytes, TERCL deficiency results in malfunctioning of the mitochondria. TECRL contains an N-terminal Ubl domain, a common domain involved in protein-protein interactions, and a C-terminal catalytic domain.
