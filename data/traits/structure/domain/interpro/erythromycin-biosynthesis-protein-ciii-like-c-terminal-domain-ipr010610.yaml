identifier: InterPro:IPR010610
label: "Erythromycin biosynthesis protein CIII-like, C-terminal domain"
definition: >-
  This entry represents the conserved C-terminal domain found in Erythromycin biosynthesis protein CIII (EryCIII) from Saccharopolyspora erythraea, also known as 3-alpha-mycarosylerythronolide B desosaminyl transferase, and similar bacterial proteins. EryCIII is organised into two domains, both of them with a Rossmann-like α/β fold. This domain contains the nucleotide disphospho-sugar (NDP-sugar) binding site.
