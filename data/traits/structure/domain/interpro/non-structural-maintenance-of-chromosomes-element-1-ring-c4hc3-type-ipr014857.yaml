identifier: InterPro:IPR014857
label: "Non-structural maintenance of chromosomes element 1, RING C4HC3-type"
definition: >-
  This entry represents the C3HC4-type RING finger domain, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, found at the C-terminal of Nse1. This domain may play an important role in Rad52-dependent post-replication repair of UV-damaged DNA in Saccharomyces cerevisiae. Saccharomyces cerevisiae Nse1 ( ) forms part of a complex with SMC5-SMC6. This non-structural maintenance of chromosomes (SMC) complex plays an essential role in genomic stability, being involved in DNA repair and DNA metabolism. It is conserved in eukaryotes from yeast to human. Nse1 acts in a DNA repair pathway for removal of UV-induced DNA damage that is distinct from classical nucleotide excision repair and in repair of ionizing radiation damage. It also functions in homologous recombination repair of DNA double strand breaks and in recovery of stalled replication forks.
