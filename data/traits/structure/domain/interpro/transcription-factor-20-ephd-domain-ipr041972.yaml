identifier: InterPro:IPR041972
label: "Transcription factor 20, ePHD domain"
definition: >-
  This entry represents the C-terminal ePHD/ADD (ATRX-DNMT3-DNMT3L) domain of transcription factor 20 (TCF-20). The extended plant homeodomain (ePHD) zinc finger is characterised as Cys2HisCys5HisCys2His. TCF-20 (also known as SPBP) is involved in transcriptional activation of the MMP3 (matrix metalloprotease 3) promoter. It is strongly enriched on chromatin in interphase HeLa cells, and displays low nuclear mobility, and has been implicated in Smith-Magenis syndrome and Potocki-Lupski syndrome. As a chromatin-binding protein, TCF-20 plays a role in the regulation of gene expression. It also functions as a transcriptional co-regulator that enhances or represses the transcriptional activity of certain transcription factors/cofactors, such as specificity protein 1 (Sp1), E twenty-six 1 (Ets1), paired box protein 6 (Pax6), small nuclear RING-finger (SNURF)/RNF4, c-Jun, androgen receptor (AR) and estrogen receptor alpha (ERalpha). TCF-20 contains an N-terminal transactivation domain, a novel DNA-binding domain with an AT-hook motif, three nuclear localization signals (NLSs) and a C-terminal ePHD/ADD domain.
