identifier: InterPro:IPR032656
label: "Neurogenin-3, basic helix-loop-helix domain"
definition: >-
  Neurogenin-3 (Ngn3) is a basic helix-loop-helix transcription factor. Mouse Ngn3 is critical for the development of the endocrine cells of the islets. It is also involved in the neuritogenic actions of oestradiol in developing hippocampal neurones. This entry represents the basic helix-loop-helix (bHLH) domain of Ngn3.
