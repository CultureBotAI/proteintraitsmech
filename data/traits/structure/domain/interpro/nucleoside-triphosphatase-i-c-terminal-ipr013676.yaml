identifier: InterPro:IPR013676
label: Nucleoside triphosphatase I, C-terminal
definition: >-
  This entry represents the C-terminal domain of Nucleoside triphosphatase I (NPH1), specific to the family Poxviridae. It is usually found associated with the helicase conserved C-terminal domain ( ). NPH1 serves two roles in transcription. It is a DNA-dependent ATPase required for providing the needed energy to achieve the termination of early transcripts. In response to the termination signal UUUUUNU, this protein uses the mechanism known as forward translocation to releases transcripts. wich consists of moving the transcription elongation complex downstream on the DNA template. Simultaneously, this protein acts by itself as a polymerase elongation factor.
