identifier: InterPro:IPR057200
label: "Domain of unknown function DUF7878"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to contain two structural β(3)-α repeats that swap their α-helix in a similar way as observed in the known ssDNA-binding transcriptional regulator domains. It is likely that this domain is distantly related to them and probably represents the minimal two repeat containing fold.
