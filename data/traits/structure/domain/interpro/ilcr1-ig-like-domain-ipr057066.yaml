identifier: InterPro:IPR057066
label: "ILCR1, Ig-like domain"
definition: >-
  This domain is found in ILCR1 from Caenorhabditis elegans and related proteins. The domain represented by this entry is predicted to adopt a β-sandwich with an Ig-like topology. Interleukin cytokine receptor-related protein 1 (ILCR1) forms a receptor complex together with receptor ILCR2, which upon activation acts as a modulator of neuronal activity. When IL-17 binds to the ILCR-1/2 receptor complex, a signaling cascade is triggered that activates the downstream signaling components and results in increased neuronal activity in response to input from oxygen-sensing neurons. It is also predicted to enable interleukin-17 receptor activity. Is an ortholog of human IL17RA (interleukin 17 receptor A) and IL17RB (interleukin 17 receptor B).
