identifier: InterPro:IPR038035
label: Histone-lysine N-methyltransferase EHMT1, SET domain
definition: >-
  Histone-lysine N-methyltransferase EHMT1, ( ) mono- and dimethylates 'Lys-9' of histone H3 (H3K9me1 and H3K9me2, respectively) in euchromatin. H3K9me is a specific tag for repression of epigenetic transcription, recruiting HP1 proteins to methylated histones. EHMT1 also methylates 'Lys-27' of histone H3 (H3K27me), but weakly. EHMT1 also dimethylates other proteins, including 'Lys-373' of p53. EHMT1 forms a heterodimer with EHMT2, and is a component of the E2F6.com-1 complex in G0 phase. EHMT1 contains eight ankyrin repeats which bind the monomethylated RELA subunit of NF-kappa-B, a SET domain which interacts with WIZ, and a pre-SET domain that binds three zinc ions via cysteine residues. This entry covers the pre-SET and SET domains.
