identifier: InterPro:IPR059755
label: "AF0772-like protein C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of AF0772-like proteins found in archaea. These proteins are found in the Archaeoglobi class, including Archaeoglobus, Geoglobus, and Ferroglobus species, as well as some methanogens. The function of this domain remains to be determined.
