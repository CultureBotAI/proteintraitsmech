identifier: InterPro:IPR035467
label: "Putative ATP-dependent RNA helicase YLR419W-like, UBA domain"
definition: >-
  This entry represents the UBA domain found in some uncharacterised hypothetical proteins which show a high level of sequence similarity with Saccharomyces cerevisiae putative ATP-dependent RNA helicase YLR419W. All family members contain a ubiquitin-associated (UBA) domain, RWD domain, DEAD-box (DEXDc), helicase superfamily C-terminal domain (HELICc), Helicase associated domain (HA2), and a C-terminal oligonucleotide/oligosaccharide-binding (OB)-fold.
