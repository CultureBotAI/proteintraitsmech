identifier: InterPro:IPR026987
label: "WD repeat-containing protein 18, C-terminal domain"
definition: >-
  WD repeats are short subdomains of about 40 amino acids and fold into 4 anti-parallel β hairpins. The domain represented by this entry has been detected on the C terminus of WD repeat-containing protein 18 (Wdr18), which palys a role during development.
