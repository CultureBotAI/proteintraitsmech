identifier: InterPro:IPR063643
label: "R05D3.9-like, N-terminal domain"
definition: >-
  This entry represents an N-terminal domain in R05D3.9 from C. elegans and related proteins from nematodes. This domain has a thioredoxin fold and is approximately 140 amino acids in length. R05D3.9 is a secreted protein with a signal peptide. The specific function of this N-terminal domain remains to be determined.
