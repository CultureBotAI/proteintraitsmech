identifier: InterPro:IPR045586
label: "Diadenylate cyclase DacZ, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of DacZ-type diadenylate cyclase (DAC) from archaea, including DacZ form Haloferax volcanii. Sequences analysis and homology modeling of 3D structures revealed that this domain has a fold similar to the C-terminal α/β domain of pyruvate kinase.
