identifier: InterPro:IPR063158
label: "LarB/PurE-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of LarB and related PurE-like proteins. It precedes the C-terminal AIRC domain ( ). LarB is a pyridinium-3,5-biscarboxylic acid mononucleotide synthase involved in biosynthesis of the nickel- pincer nucleotide cofactor required for lactate racemase activity. This entry is found broadly in bacteria, including Bacillota, Actinomycetota, Methanobacteriota, Cyanobacteriota and Pseudomonadota. The specific function of this N-terminal domain remains to be determined.
