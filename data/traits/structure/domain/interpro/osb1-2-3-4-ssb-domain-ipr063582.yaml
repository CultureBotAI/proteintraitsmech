identifier: InterPro:IPR063582
label: "OSB1/2/3/4, SSB domain"
definition: >-
  This entry represents the SSB domain in OSB1/2/3/4 (organellar single-stranded DNA-binding) proteins from plants. OSB proteins localise to chloroplasts and mitochondria where they bind preferentially to single-stranded DNA. The SSB domain is responsible for DNA binding and contains an OB-like fold.
