identifier: InterPro:IPR057126
label: "Neuron navigator 1-like, ubiquitin-like domain"
definition: >-
  This domain is found in human Neuron navigator 1 (NAV1) and similar sequences from animals. NAV1 may be involved in neuronal migration. It is predicted to adopt a ubiquitin-like fold.
