identifier: InterPro:IPR063768
label: "Coiled-coil domain-containing protein 200, coiled-coil domain"
definition: >-
  This entry represents a coiled-coil domain found in the family of coiled-coil domain-containing proteins predominantly from metazoans, with the prototype protein CCDC200 from Homo sapiens. The human protein is 168 amino acids in length and contains a coiled-coil region from residues 16 to 50. CCDC200 is enriched in testis tissue and contains extensive disordered regions with areas of low complexity and proline-rich sequences. The protein shows conservation across vertebrates and some invertebrates including molluscs. The function of this domain remains to be determined.
