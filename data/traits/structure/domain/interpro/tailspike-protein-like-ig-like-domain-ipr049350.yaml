identifier: InterPro:IPR049350
label: "Tailspike protein-like, Ig-like domain"
definition: >-
  This domain is found in Tail spike proteins (TSP) from tailed bacteriophages (such as enterobacteria phages), bacterial prophages and bacteria. It forms a β-sandwich consisting of two antiparallel, three stranded β-sheets. A short α-helix is included in the connecting loop between the third and fourth strand. This domain is structurally homologous to viral coat proteins. In bacterial sequences, this domain appears to be inserted in the pectin lyase fold domain.
