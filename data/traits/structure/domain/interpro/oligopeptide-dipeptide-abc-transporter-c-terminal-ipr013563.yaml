identifier: InterPro:IPR013563
label: "Oligopeptide/dipeptide ABC transporter, C-terminal"
definition: >-
  This entry represents the C-terminal of oligopeptide ABC transporter ATP binding proteins, immediately following the ATP-binding domain ( ). All characterised members appear able to be involved in the transport of oligopeptides or dipeptides. Some are important for sporulation or antibiotic resistance. Some dipeptide transporters also act on the haem precursor delta-aminolevulinic acid. These members include Glutathione import ATP-binding protein GsiA, Oligopeptide transport ATP-binding protein OppF and related proteins. In the glutathione importer GsiA, this domain occurs in tandem (two copies) following each of the two ABC transporter domains. GsiA provides the energy for glutathione import by ATP hydrolysis, working together with the periplasmic binding protein GsiB and transmembrane components GsiC and GsiD.
