identifier: InterPro:IPR057912
label: "Mitochondrial protein cyt-4, OB-fold C-terminal domain"
definition: >-
  This OB-fold domain is found at the C-terminal in CYT4 from Neurospora crassa and related proteins. This domain is usually found next to . CYT4 is a nuclear-encoded protein that plays a crucial role in RNA processing and splicing within mitochondria. CYT4 is required for mitochondrial RNA 5'- and 3'-end processing and splicing.
