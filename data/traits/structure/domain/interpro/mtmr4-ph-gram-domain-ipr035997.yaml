identifier: InterPro:IPR035997
label: "MTMR4, PH-GRAM domain"
definition: >-
  Myotubularin-related protein 4 (MTMR4) is a member of the myotubularin (MTM) family. It is the only family member that possesses a FYVE domain (a zinc finger domain) at its C terminus. MTMR4 has dual-specificity phosphatase activity that specifically dephosphorylates the D-3 position of phosphatidylinositol 3-phosphate and phosphatidylinositol 3,5-bisphosphate, generating phosphatidylinositol and phosphatidylinositol 5-phosphate. MTMR4 has a unique distribution to endosomes and has been shown to function in early and recycling endosomes; through phosphatidylinositol 3-phosphate turnover in phagosome membranes regulates phagocytosis and phagosome maturation. MTMR4 attenuates TGF-beta signalling by dephosphorylating intracellular signalling mediator R-Smads. Similarly, it acts as a negative modulator for the homeostasis of bone morphogenetic proteins (BMPs) signalling. Both MTMR3 and MTMR4 contain a N-terminal PH-GRAM domain, a Rac-induced recruitment domain (RID) domain, an active PTP domain, a SET-interaction domain, a coiled-coil region, and a C-terminal lipid-binding FYVE domain which binds phosphotidylinositol-3-phosphate. Myotubularin-related proteins are a subfamily of protein tyrosine phosphatases (PTPs) that dephosphorylate D3-phosphorylated inositol lipids. Mutations in this family cause the human neuromuscular disorders myotubular myopathy and type 4B Charcot-Marie-Tooth syndrome. Six of the 13 MTMRs (MTMRs 5, 9-13) contain naturally occurring substitutions of residues required for catalysis by PTP family enzymes. Although these proteins are predicted to be enzymatically inactive, they are thought to function as antagonists of endogenous phosphatase activity or interaction modules.
