identifier: InterPro:IPR049020
label: "PRKAA1/2, autoinhibitory domain"
definition: >-
  This domain is found in the catalytic subunit (alpha, PRKAA1 and PRKAA2) of the enzymatic complex AMP-activated protein kinase (AMPK). These proteins are organised into an N-terminal kinase domain (KD, ) and a regulatory C-terminal domain, which contains an autoinhibitory domain (AID) and a adenylate sensor domain ( ). This entry represents the AID which forms a compact domain that stabilizes the KD and binds to CBS-2 of the gamma-subunit.
