identifier: InterPro:IPR058614
label: "SMCHD1, Ig-like domain 5"
definition: >-
  This entry represents the fifth Ig-like domain in structural maintenance of chromosomes flexible hinge domain-containing (SMC-FH) animal proteins, including human Structural maintenance of chromosomes flexible hinge domain-containing protein 1 (SMCHD1). This domain is part of a long linker region located between the SMCHD1, ribosomal S5 domain 2-like domain ( ) at the N-terminal and the flexible hinge domain ( ) at the C-terminal. This region is functionally uncharacterised and was previously thought to be unstructured. However, structural predictions suggest that it may consist of tandemly repeated Ig-like domains. SMC-FH proteins are atypical SMC proteins, characterised by their unique homodimeric arrangement and ATPase activity. SMC-FH plays a crucial role in epigenetic silencing by regulating chromatin architecture and promoting heterochromatin formation on both autosomes and the X chromosome. It is essential for X chromosome inactivation in females, facilitating the spreading of heterochromatin and creating a compartment-less nuclear architecture. Additionally, it is involved in silencing specific autosomal loci and contributes to DNA repair by promoting non-homologous end joining and inhibiting homologous recombination.
