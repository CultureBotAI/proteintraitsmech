label: "Alr2735, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Alr2735 proteins, whose function is unknown. This domain is found in cyanobacteria. These proteins are named after the alr2735 gene from Nostoc sp. PCC 7120.
