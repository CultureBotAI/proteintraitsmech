identifier: InterPro:IPR007506
label: "Phosphomevalonate dehydratase large subunit-like domain"
definition: >-
  This entry represents a domain that covers the whole sequence in Phosphomevalonate dehydratase large subunit from Aeropyrum pernix (PMDh-L) and similar proteins mainly found in archaea, proteobacteria and fungi. PMDh-L is a component of a hydro-lyase that catalyses the dehydration of mevalonate 5-phosphate (MVA5P) to form trans-anhydromevalonate 5-phosphate (tAHMP). It is involved in the archaeal mevalonate (MVA) pathway, which provides fundamental precursors for isoprenoid biosynthesis, such as isopentenyl diphosphate (IPP) and dimethylallyl diphosphate (DMAPP). This domain is also found at the C-terminal end of Cis-3-hydroxy-L-proline dehydratase from Agrobacterium fabrum (LhpI), which catalyses the dehydration of cis-3-hydroxy-L-proline (c3LHyp) to Delta1-pyrroline-2-carboxylate (Pyr2C). Members or this group are distantly related to the Aconitase family of proteins by sequence similarity and secondary structure prediction.
