identifier: InterPro:IPR049159
label: "PF0610-like, winged HTH, N-terminal"
definition: >-
  This domain is found in PF0610 protein from Pyrococcus furiosus ( ) and related prokaryotic proteins. This protein has a Zn-ribbon embedded in a winged HTH fold. This entry represents the N-terminal domain, which is composed of three helices. This domain is also found in some arsenical resistance operon repressor (ArsR) and similar metal-regulated homodimeric repressors, which also accquires a winged helix topology The function of PF0610 has not been fully chracterized. wHTH domains containing proteins are believed to serve as DNA- or RNA-binding domains . A large number of wHTH proteins are transcriptional regulators, while others are involved in chromosome packing. Because of its apparent sequence-independent interaction with DNA, PF0610 could be a part of the chromatin system of P. furiosus. The numerous basic residues in PF0610 ensure strong DNA interactions. The Zn ribbon motif could help improve the structural stability of the protein at a high temperature. Another possibility is that PF0610 is a metal-dependent transcription factor. This is based on DNA microarray data. However, further research is needed to conclude if PF0610 is an iron-containing protein
