identifier: InterPro:IPR040654
label: "LasR-specific antiactivator QslA"
definition: >-
  This domain is found in QslA from Pseudomonas aeruginosa. QslA is an antiactivator which binds to the transcription factor LasR, disrupting its dimerization and preventing LasR from binding to target DNA. QslA forms a dimer that interacts with the ligand-binding domain in LasR.
