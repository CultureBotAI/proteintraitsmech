identifier: InterPro:IPR062781
label: "C45G9.6, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein C45G9.6 from Caenorhabditis elegans. The full-length protein has two alternatively spliced isoforms, with isoform b lacking most of this C-terminal region. The protein is classified as a DD-GDCA protein and belongs to the differentiation-development associated protein family. The function of this C-terminal domain remains to be determined.
