identifier: InterPro:IPR060618
label: "Reprimo-like, transmembrane helix domain"
definition: >-
  This entry represents the transmembrane helix domain (TM) found in reprimo family proteins from vertebrates. These small single-pass membrane proteins are involved in the regulation of p53-dependent G2 arrest of the cell cycle. This domain is located in the central region of the protein and enables membrane localisation.
