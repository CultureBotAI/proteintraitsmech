identifier: InterPro:IPR040502
label: "Endo-alpha-N-acetylgalactosaminidase, domain 6"
definition: >-
  Proteins containing a galactose-binding domain-like fold can be found in several different protein families, in both eukaryotes and prokaryotes. The common function of these domains is to bind to specific ligands, such as cell-surface-attached carbohydrate substrates for galactose oxidase and sialidase, phospholipids on the outer side of the mammalian cell membrane for coagulation factor Va, membrane-anchored ephrin for the Eph family of receptor tyrosine kinases, and a complex of broken single-stranded DNA and DNA polymerase beta for XRCC1. The structure of the galactose-binding domain-like members consists of a β-sandwich, in which the strands making up the sheets exhibit a jelly-roll fold. This entry represents a galactose-binding domain, referred to as domain 6, found in endo-alpha-N-acetylgalactosaminidases from bacteria.
