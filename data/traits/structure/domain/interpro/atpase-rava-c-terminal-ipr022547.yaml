identifier: InterPro:IPR022547
label: "ATPase, RavA, C-terminal"
definition: >-
  This domain is found at the C-terminal of bacterial regulatory ATPase RavA (Regulatory ATPase variant A). RavA consists of three domains: the N-terminal domain is the AAA+ module, which is composed of two subdomains, the α-β-α subdomain with a Rossmann-type fold commonly found in nucleotide binding proteins and the all-α subdomain consisting of four antiparallel α-helices; the second domain is a discontinuous triple-helical domain which has a rigid structure stabilised by hydrophobic interactions localised at the interface between the three helices; and the third domain, named the LARA domain which forms a compact antiparallel β-barrel-like structure consisting of six β-strands and one α-helix. RavA forms an hexamer in which the triple helical domain mediates the lateral interactions between neighbouring RavA monomers.
