identifier: InterPro:IPR019989
label: "CRISPR-associated protein Cas8a1/Csx13, Myxan subtype, N-terminal"
definition: >-
  This entry represents the N-terminal domain of DevT proteins. This domain is found predominantly in Cyanobacteria, with representatives also in Planctomycetota and Bacillota. The specific function of this N-terminal domain remains to be determined. DevT is a CRISPR-associated protein Cas8a1/Csx13 that functions in the CRISPR adaptive immune system. In Myxococcus xanthus, DevT stimulates transcription of fruA, a gene required for fruiting body development. The protein is part of an operon that includes CRISPR-associated genes and is essential for development.
