identifier: InterPro:IPR000581
label: "Dihydroxy-acid/6-phosphogluconate dehydratase, N-terminal"
definition: >-
  This is the N-terminal domain of Ilv/ED dehydratase protein family which includes dihydroxy-acid/6-phosphogluconate dehydratases, and pentonate dehydratases. This domain is composed of a β-sheet with four parallel β-strands surrounded by four α-helices and forms a binding site for a [2Fe-2S] cluster and a Mg2+ ion. Members of this entry are involved in various biosynthetic and carbohydrate metabolic pathways. Dihydroxy-acid dehydratase catalyses the fourth step in the biosynthesis of isoleucine and valine, the dehydration of 2,3-dihydroxy-isovaleic acid into alpha-ketoisovaleric acid. 6-Phosphogluconate dehydratase catalyses the first step in the Entner-Doudoroff pathway, the dehydration of 6-phospho-D-gluconate into 6-phospho-2-dehydro-3-deoxy-D-gluconate. They consist of two domains, N- and C-terminal, the latter contains residues (Ser490 and Thr492) that participate in the formation of the substrate binding site.
