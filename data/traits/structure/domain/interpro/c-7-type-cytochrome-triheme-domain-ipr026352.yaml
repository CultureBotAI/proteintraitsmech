identifier: InterPro:IPR026352
label: C(7)-type cytochrome triheme domain
definition: >-
  This domain binds three hemes, and itself occurs as a repeating unit. It occurs, for instance, four times in the dodecaheme c-type cytochrome protein GSU_1996 ( ), whose crystal structure shows elongation and a nanowire-like arrangement of twelve hemes that could function in extracellular electron transport processes.
