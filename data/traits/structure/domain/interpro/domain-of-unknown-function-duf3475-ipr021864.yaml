label: "Domain of unknown function DUF3475"
definition: >-
  This entry represents the N-terminal domain of PSI proteins from Arabidopsis. This domain is found associated with DUF668 ( ). PSI1 was identified as a gene that is co-expressed with the phytosulfokine (PSK) receptor genes PSKR1 and PSKR2 in Arabidopsis thaliana. PSI proteins are plant-specific and promote growth.
