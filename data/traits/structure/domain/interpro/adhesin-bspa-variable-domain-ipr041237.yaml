identifier: InterPro:IPR041237
label: "Adhesin BspA, variable domain"
definition: >-
  This domain is found in BspA protein present in Streptococcus agalactiae. BspA is an antigen I/II family polypeptide that confers adhesion linked to pathogenesis in group B Streptococcus. This domain is referred to as the variable domain (BspA-V). BspA-V is responsible for binding to scavenger receptor gp340. BspA-V adopts a fold that is distinct from those of other AgI/II family polypeptide variable domains.
