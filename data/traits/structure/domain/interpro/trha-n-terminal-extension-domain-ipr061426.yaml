identifier: InterPro:IPR061426
label: "TrhA, N-terminal extension domain"
definition: >-
  This rather rare domain appears as an occasional N-terminal extension to TrhA, or as a free-standing protein. TrhA (transmembrane homeostasis protein A), a plasma membrane protein that belongs to the PAQR family, named for eukaryotic Progestin and AdipoQ Receptors, and that appears involved in the homeostasis of membrane fluidity. Member sequences show some resemblance to fatty acid hydroxylase-like proteins as described by.
