identifier: InterPro:IPR022472
label: "VPLPA-CTERM sorting domain"
definition: >-
  A probable protein export sorting signal, PEP-CTERM, has been described previously. It is predicted to interact with a putative transpeptidase we designate exosortase. This entry describes a variant with conserved motif VPLPA, rather than VPEP. It appears to be the recognition sequences for exosortase D. This variant is found prominently in two members of the Rhodobacterales, namely Jannaschia sp. CCS1 and Roseobacter denitrificans OCh 114. One interesting member protein has a full-length duplication and therefore two copies of this putative sorting domain.
