identifier: InterPro:IPR045547
label: "MoxR-vWA-beta-propeller ternary system domain bpX6"
definition: >-
  This domain is known as bpX6 and it is mainly found in proteobacteria. This entry represents an uncharacterised domain found in the MoxR-vWA-β-propeller ternary system, a class of NTP-dependent biological conflict systems.
