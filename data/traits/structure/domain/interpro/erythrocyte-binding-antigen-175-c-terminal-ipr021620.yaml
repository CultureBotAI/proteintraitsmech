identifier: InterPro:IPR021620
label: "Erythrocyte binding antigen 175, C-terminal"
definition: >-
  EBA-175 is involved in the formation of a tight junction, a necessary step in invasion. This entry represents the C-terminal region VI which is a cysteine rich domain essential for EBA-175 trafficking. The structure is a homodimer that contains a five-α-helical core stabilised by four disulphide bridges.
