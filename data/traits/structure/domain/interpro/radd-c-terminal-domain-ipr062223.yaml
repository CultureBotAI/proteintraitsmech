identifier: InterPro:IPR062223
label: "RadD, C-terminal domain"
definition: >-
  This entry represents the C-terminal OB fold domain of RadD-type DNA repair helicases found in bacteria. RadD from Escherichia coli is involved in repair of double-strand DNA breaks in combination with RadA. Mutagenesis studies show that this C-terminal domain is essential for RadD function in alleviating the deleterious effects of UV radiation and dsDNA breaks induced by ciprofloxacin. The crystal structure reveals this domain spans residues 429-574. The specific biochemical function of this domain remains to be determined.
