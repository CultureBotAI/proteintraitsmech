identifier: InterPro:IPR040806
label: "SpuA, C-terminal domain"
definition: >-
  This entry represents the C-terminal β-sandwich domain found in Streptococcus pneumoniae Pullulanase A (SpuA) proteins. SpuA is a large multimodular cell wall-attached enzyme involved in the degradation of glycogen in mammalian host cells. It hydrolyses the alpha-1,6-branchpoints of glycogen and pullulan but does not hydrolyse dextran. This domain functions as an alpha-glucan-specific carbohydrate-binding module, binding to amylose, amylopectin, pullulan and glycogen in vitro, but not to dextran. SpuA binds specifically to mouse lung alveolar type II cells, which are rich in glycogen stores.
