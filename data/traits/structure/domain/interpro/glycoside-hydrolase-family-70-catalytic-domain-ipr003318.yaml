identifier: InterPro:IPR003318
label: Glycoside hydrolase, family 70, catalytic domain
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. Glucosyltransferases or sucrose 6-glycosyl transferases (GTF-S) ( , ) catalyse the transfer of D-glucopyramnosyl units from sucrose onto acceptor molecules. This entry represents a domain that roughly corresponds to the N-terminal catalytic domain of the enzyme. Members of this family also contain the putative cell wall binding domain which corresponds with the C-terminal glucan-binding domain.
