identifier: InterPro:IPR060871
label: "Choice-of-anchor F"
definition: >-
  Choice-of-anchor F is a domain found in prokaryotic proteins with a variety of C-terminal sorting and transit domains. These include the autotransporter outer membrane β-barrel domain, the JDVT-CTERM domain, and variant forms of PEP-CTERM domains.
