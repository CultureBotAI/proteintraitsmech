identifier: InterPro:IPR015671
label: "GLTSCR protein, conserved domain"
definition: >-
  This domain is found in glioma tumour suppressor candidate region gene 1 (GLTSCR1, also known as BICRAL) protein, and is typically between 105 and 124 amino acids in length. GLTSCR1 is a component of SWI/SNF chromatin remodeling subcomplex GBAF that carries out key enzymatic activities, changing chromatin structure by altering DNA-histone contacts within a nucleosome in an ATP-dependent manner. There is a single completely conserved residue F that may be functionally important. Mutations in the gene for this protein in humans leads to the development of oligodendrogliomas. There is evidence that these protein interacts with SH3 domains.
