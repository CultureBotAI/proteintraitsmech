identifier: InterPro:IPR041629
label: "Bacterial SCP orthologue"
definition: >-
  This domain is found in MSMEG_5817 gene product from M. smegmatis. It has been shown to be vital for mycobacterial survival within host macrophages. Crystal structure revealed a Rossmann-like fold α/β two-layer sandwich forming a highly hydrophobic interface cavity and with high structural homology to the sterol carrier protein (SCP) family. Hence, it has been suggested that this domain may be involved in the interaction of apolar ligands through its hydrophobic cavity. Alanine-scanning mutagenesis of the hydrophobic cavity of MSMEG_5817 protein demonstrated that the conserved Val82 residue plays an important role in ligand binding.
