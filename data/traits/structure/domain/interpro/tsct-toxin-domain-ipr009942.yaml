identifier: InterPro:IPR009942
label: "TscT toxin domain"
definition: >-
  This entry represents a domain of unknown function in bacterial proteins of around 100 residues in length. These proteins seem to be found exclusively in Staphylococcus species. The function of these proteins is unknown. This entry includes TscT protein, which is part of the TscT/TscA toxin-antitoxin system, also named DUF1474 family protein.
