identifier: InterPro:IPR049492
label: "BD-FAE-like domain"
definition: >-
  This entry represents a domain that covers most of the length of a novel bifunctional feruloyl and acetyl xylan esterase (BD-FAE, previously known as bifunctional carbohydrate esterase (CE)), which is active on complex natural xylans and was identified as the basis of a monophyletic clade gathering all homologues identified in PULs (polysaccharide utilisation loci) predicted to act on xylan. It adopts an α-β-hydrolase fold with the catalytic triad Ser-Asp-His. These proteins are new candidate for biomass processing due to its capacity to remove ferulic acid and acetic acid from natural corn and birchwood xylan substrates. This domain is also found in Kynurenine formamidase from Mus musculus (KFase), which hydrolyses N-formyl-L-kynurenine to form L-kynurenine, the second step in the kynurenine pathway of tryptophan degradation; in Isoprenylcysteine alpha-carbonyl methylesterase ICME from Arabidopsis thaliana, which catalyses the demethylation of isoprenylcysteine methylesters; Esterase LipQ from Mycobacterium tuberculosis, which shows lipase activity and is highly immunogenic, probably playing an important role in the virulence and pathogenesis of the bacterial infection by altering the balance of cytokines; and other proteins widespread among all cellular organisms.
