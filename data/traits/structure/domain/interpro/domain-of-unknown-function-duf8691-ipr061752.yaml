identifier: InterPro:IPR061752
label: "Domain of unknown function DUF8691"
definition: >-
  This entry represents a small N-terminal domain of approximately 60 residues found in bacterial proteins. This family is found predominantly in Actinomycetota, particularly in the orders Kitasatosporales, Micrococcales, and Streptomycetales. The family is also present in Chloroflexota. Structure prediction suggests that this domain will form a homodimeric structure. The function of this domain remains to be determined.
