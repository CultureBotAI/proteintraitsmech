identifier: InterPro:IPR048010
label: "Potassium voltage-gated channel subfamily F member 1-like, BTB/POZ domain"
definition: >-
  This entry represents BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain present in human Potassium voltage-gated channel subfamily F member 1 (KCNF1) and similar potassium voltage-gated channel proteins from vertebrates. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNF1 functions as a regulatory alpha-subunit of voltage-gated potassium channel that, when coassembled with Kv2.1, can modulate gating in a physiologically relevant manner. It forms hetero-tetrameric channels (with other alpha subunits) through its BTB/POZ domain, also known as tetramerisation (T1) domain, which is a versatile protein-protein interaction motif.
