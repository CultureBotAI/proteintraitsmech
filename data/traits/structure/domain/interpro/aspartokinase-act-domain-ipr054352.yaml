identifier: InterPro:IPR054352
label: "Aspartokinase, ACT domain"
definition: >-
  This entry represents the ACT domain, found in Aspartate kinases from bacteria, archaea, plants and fungi. Aspartate kinase catalyses the phosphorylation of aspartic acid. Some members of this entry are bifunctional aspartokinase/homoserine dehydrogenases. This domain folds as a four-stranded antiparallel sheet with two α-helices parallel to the sheet and located on one side of the sheet.
