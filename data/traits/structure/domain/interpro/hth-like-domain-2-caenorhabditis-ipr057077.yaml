identifier: InterPro:IPR057077
label: "HTH-like domain 2, caenorhabditis"
definition: >-
  This domain is found C-terminal to in uncharacterised proteins from Caenorhabditis. It shares sequence similarity to the HTH 3-helical bundle domains and it is predicted to adopt a similar structure.
