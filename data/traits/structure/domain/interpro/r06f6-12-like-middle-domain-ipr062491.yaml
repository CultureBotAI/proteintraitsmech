identifier: InterPro:IPR062491
label: "R06F6.12-like, middle domain"
definition: >-
  This entry represents a middle domain found in R06F6.12 and similar proteins from nematodes. R06F6.12 from Caenorhabditis elegans is expressed in germ line and other cell types and shows protein interactions with mpz-1 and pxf-1. The specific function of this domain remains to be determined. This domain contains a small β-sheet.
