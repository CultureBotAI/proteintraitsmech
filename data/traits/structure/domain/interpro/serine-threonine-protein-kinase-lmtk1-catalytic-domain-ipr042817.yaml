identifier: InterPro:IPR042817
label: Serine/threonine-protein kinase LMTK1, catalytic domain
definition: >-
  PTKs catalyse the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. LMTK1, also called Apoptosis-associated tyrosine kinase (AATK) or AATYK, is a cytoplasmic (or nonreceptor) kinase containing a long C-terminal region. The expression of LMTK1 is upregulated during growth arrest and apoptosis in myeloid cells. LMTK1 has been implicated in neural differentiation, and is a regulator of the Na-K-2Cl cotransporter, a membrane protein involved in cell proliferation and survival, epithelial transport, and blood pressure control.
