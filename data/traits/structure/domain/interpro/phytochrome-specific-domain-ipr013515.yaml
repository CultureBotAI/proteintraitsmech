identifier: InterPro:IPR013515
label: Phytochrome specific domain
definition: >-
  Phytochromes are a family of biliprotein photoreceptors ubiquitous in plants but also present in many bacteria and fungi. The protein undergoes reversible photochemical conversion between red light- and far-red light-absorbing states (Pr and Pfr, respectively). Phytochromes are usually homodimeric, each protomer containing a covalently-attached, linear tetrapyrrole chromophore that isomerizes in light, leading to state transition. Prokaryotic phytochromes signal enzymatically from a C-terminal histidine kinase module active in the Pr state, thereby regulating diverse biological aspects such as pigmentation and the developmental program. Conversely, plant phytochromes signal as Pfr through interactions with partner molecules that have extensive regulatory effects throughout the plant genome. This domain is found in the central region of phytochrome proteins. It is structurally related to the GAF domain , which is generally located immediately N-terminal to this domain, but it carries an additional tongue-like hairpin loop between the fifth β-sheet and the sixth α-helix. The tongue reaches back to contact the GAF domain, generally sealing the chromophore pocket and stabilising the Pfr state. The conformation of the tongue changes radically upon Pr-Pfr photoconversion, an effect that is probably central to signal regulation.
