identifier: InterPro:IPR053950
label: "CAP, N-terminal domain"
definition: >-
  Cyclase-associated proteins (CAPs) are highly conserved actin-binding proteins present in a wide range of organisms including yeast, fly, plants, and mammals. CAPs are multifunctional proteins that regulate actin remodelling in response to cellular signals. They consist of an N-terminal conserved motif ( ) followed by an N-terminal and C-terminal ( ) domains which are separated by a Pro-rich region. This entry represents the N-terminal domain which contains the adenylyl cyclase binding site and has an all-α structure consisting of six helices in a bundle with a left-handed twist and up-and-down topology.
