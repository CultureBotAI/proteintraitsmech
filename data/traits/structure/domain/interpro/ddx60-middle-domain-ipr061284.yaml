identifier: InterPro:IPR061284
label: "DDX60, middle domain"
definition: >-
  This entry represents a middle domain in DDX60 and similar proteins. This domain contains a helical fold. DDX60 binds ssRNA, dsRNA and dsDNA and can promote the binding of RIGI to dsRNA. DDX60 is non-essential in mammals but it is required for the cell fitness in kinetoplastids and trypanosomatids and plays a specific role in translation initiation in these parasites. In Trypanosoma cruzi, k-DDX60 binds both to the head and the body of the 40S ribosome subunit. It is also involved in the stabilization of the 43S PIC and the remodelling of the 43S PIC mRNA channel.
