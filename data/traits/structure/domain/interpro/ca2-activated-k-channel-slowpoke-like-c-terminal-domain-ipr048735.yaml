identifier: InterPro:IPR048735
label: "Ca2+-activated K+ channel Slowpoke-like, C-terminal domain"
definition: >-
  This domain is found at the cytoplasmic C terminus of the Drosophila slowpoke K channel (dSlo) ( ) and its homologues. This domain is related to the TrkA C-terminal domain ( ). dSlo is a potassium channel activated by both membrane depolarisation or increase in cytosolic Ca2 that mediates export of K+. Its activation dampens the excitatory events that elevate the cytosolic Ca2 concentration and/or depolarise the cell membrane.
