identifier: InterPro:IPR054059
label: "MORF/ORRM1/DAG-like, MORF domain"
definition: >-
  This domain is found in Multiple organellar RNA editing factor 1 (MORF1) and ORRM1 from Arabidopsis thaliana, DAG protein from Antirrhinum majus, and similar proteins from plants involved in organellar RNA editing in mitochondria. This conserved domain, termed MORF domain, plays a role in the multimerization of MORF proteins. It adopts a globular fold with seven β-strands and three α-helices combined with four major loops.
