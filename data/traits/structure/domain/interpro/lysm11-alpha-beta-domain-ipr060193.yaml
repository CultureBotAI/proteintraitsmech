identifier: InterPro:IPR060193
label: "LysM11, alpha/beta domain"
definition: >-
  This domain is found towards the C terminus of LysM11 from Penicillium expansum (also known as PeLysM11) and related fungal proteins. PeLysM11 was shown to play a regulatory role in the fungal virulence. Besides the LysM domain, this protein contains a GH18-like domain followed by the domain represented by this entry. This domain is predicted to fold into an α/β structure composed of a curved mixed β-sheet with an α-helix packed on it. It contains four highly conserved cysteine residues which are predicted to form disulfide bonds.
