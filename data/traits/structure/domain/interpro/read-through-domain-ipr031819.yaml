identifier: InterPro:IPR031819
label: "Read-through domain"
definition: >-
  The Enterobacteria phage minor coat protein A1 is a C-terminal extended version of the coat protein formed when ribosomes read-through a leaky stop codon. This is the C-terminal read-through domain of A1.
