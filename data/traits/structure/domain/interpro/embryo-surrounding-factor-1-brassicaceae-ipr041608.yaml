identifier: InterPro:IPR041608
label: "Embryo surrounding factor 1, brassicaceae"
definition: >-
  This entry represents a domain found in ESF1 (Embryo surrounding factor 1), a protein found in Arabidopsis thaliana and other sequences mainly found in brassicaceae. Maternally contributed central cell ESF1 peptides play an important role in suspensor formation and pro-embryo development. The biological activity of ESF1 depends on structural topology, which is stabilized by disulfide bonds.
