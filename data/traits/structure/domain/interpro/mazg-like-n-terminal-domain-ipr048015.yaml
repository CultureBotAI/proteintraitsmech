identifier: InterPro:IPR048015
label: "MazG-like, N-terminal domain"
definition: >-
  MazG is a NTP-PPase that hydrolyzes all canonical NTPs into their corresponding nucleoside monophosphates and pyrophosphate. The prototype of this family is MazG proteins from Escherichia coli (EcMazG) that represents the most abundant form consisting two sequence-related domains in tandem. EcMazG functions as a regulator of cellular response to starvation by lowering the cellular concentration of guanosine 3',5'-bispyrophosphate (ppGpp). EcMazG exists as a dimer. Each monomer contains two tandem MazG-like domains with similarly folded globular structures. However, only the C-terminal domain has well-ordered active sites and exhibits an NTPase activity responsible for the regulation of bacterial cell survival under nutritional stress. Divalent ions, such as Mg2 or Mn2, are required for activity, along with structural features such as EEXX(E/D) motifs and key basic catalytic residues. It has been shown that the C-terminal NTPase activity is responsible for regulation of bacterial cell survival under nutritional stress. This entry represents the N-terminal MazG-like domain. It has been suggested that the N-terminal domain of EcMazG might have a house-cleaning function by hydrolyzing noncanonical NTPs whose incorporation into the nascent DNA leads to increased mutagenesis and DNA damage. This entry also includes mycobacterial MazG (MtMazG), which, unlike EcMazG, contains one MazG-like domain, homologous to EcMazG N-terminal domain containing key residues required for Mg2 coordination and substrate binding.
