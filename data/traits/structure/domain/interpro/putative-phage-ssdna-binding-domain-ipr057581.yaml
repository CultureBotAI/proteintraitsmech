identifier: InterPro:IPR057581
label: "Putative phage ssDNA-binding domain"
definition: >-
  This entry represents an OB fold domain in a small group of phage proteins that show structural similarity to other phage ssDNA-binding proteins. Structure prediction shows a plausible ssDNA binding pocket on the surface of the domain.
