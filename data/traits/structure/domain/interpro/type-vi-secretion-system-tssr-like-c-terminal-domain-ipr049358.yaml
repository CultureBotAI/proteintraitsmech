identifier: InterPro:IPR049358
label: "Type VI secretion system TssR-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain from the TssR protein. T6SSs are toxin delivery systems. It is a multiprotein complex requiring numerous core proteins (Tss proteins) including cytoplasmic, transmembrane, and outer membrane components. The needle or tube apparatus is comprised of a phage-like complex, similar to the T4 contractile bacteriophage tail, which is thought to be anchored to the membrane by a trans-envelope complex.
