identifier: InterPro:IPR060246
label: "MJECL01, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in MJECL01 uncharacterised proteins found exclusively in thermoacidophilic archaea. The domain is found in Thermoproteota, particularly Sulfolobaceae including Saccharolobus, Acidianus and Metallosphaera. The full-length proteins are approximately 249 amino acids and contain multiple domains. The prototype protein is encoded by plasmid pDSM2661_1 in Methanocaldococcus jannaschii. The function of this C-terminal domain remains to be determined.
