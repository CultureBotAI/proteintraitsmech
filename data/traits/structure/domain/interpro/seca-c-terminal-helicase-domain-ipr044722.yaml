identifier: InterPro:IPR044722
label: "SecA, C-terminal helicase domain"
definition: >-
  SecA is a DEAD-like helicase belonging to superfamily SF2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. SecA helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This entry represents the C-terminal domain, also called HelicC. Secretion across the inner membrane in some Gram-negative bacteria occurs via the preprotein translocase pathway. Proteins are produced in the cytoplasm as precursors, and require a chaperone subunit to direct them to the translocase component. From there, the mature proteins are either targeted to the outer membrane, or remain as periplasmic proteins. The translocase protein subunits are encoded on the bacterial chromosome. The translocase itself comprises 7 proteins, including a chaperone protein (SecB), an ATPase (SecA), an integral membrane complex (SecCY, SecE and SecG), and two additional membrane proteins that promote the release of the mature peptide into the periplasm (SecD and SecF). The chaperone protein SecB is a highly acidic homotetrameric protein that exists as a "dimer of dimers" in the bacterial cytoplasm. SecB maintains preproteins in an unfolded state after translation, and targets these to the peripheral membrane protein ATPase SecA for secretion. SecA is a cytoplasmic protein of 800 to 960 amino acid residues. Homologues of secA are also encoded in the chloroplast genome of some algae as well as in the nuclear genome of plants. It could be involved in the intraorganellar protein transport into thylakoids.
