identifier: InterPro:IPR056226
label: "PARP12, winged helix domain"
definition: >-
  This domain is found at the N-terminal of human Protein mono-ADP-ribosyltransferase PARP12 and similar proteins from vertebrates. PARP12 is a mono-ADP-ribosyltransferase that mediates mono-ADP-ribosylation of target proteins. The domain represented by this entry has a detectable sequence similarity to HTH winged helix domains and it is predicted to adopt similar structure.
