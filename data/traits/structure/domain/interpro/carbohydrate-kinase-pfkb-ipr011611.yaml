identifier: InterPro:IPR011611
label: "Carbohydrate kinase PfkB"
definition: >-
  This domain is found in a variety of carbohydrate and pyrimidine kinases. It is found in phosphomethylpyrimidine kinase ( ), which is part of the thiamine pyrophosphate (TPP) synthesis pathway -TPP being an essential cofactor for many enzymes. It is also found in 2-keto-3-deoxygluconate kinase, which is a component of the Entner-Doudoroff pathway in hyperthermophilic archaea.
