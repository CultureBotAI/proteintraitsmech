identifier: InterPro:IPR006619
label: "Peptidoglycan recognition protein family domain, metazoa/bacteria"
definition: >-
  This domain is found in a family of animal peptidoglycan recognition proteins homologous to Bacteriophage T3 lysozyme, and some bacterial homologues. The bacteriophage molecule, but not its moth homologue, has been shown to have N-acetylmuramoyl-L-alanine amidase activity. One member of this family, Tag7, is a cytokine.
