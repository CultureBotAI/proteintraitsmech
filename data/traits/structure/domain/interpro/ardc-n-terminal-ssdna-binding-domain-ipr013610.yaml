identifier: InterPro:IPR013610
label: "ArdC, N-terminal ssDNA binding domain"
definition: >-
  This is the α-helical ssDNA binding domain of anti-restriction factor ArdC deployed by plasmids and phages in polyvalent proteins related to the BHD domains of XPC/Rad4 and the Tc-38 domain found in kinetoplastid minicircle binding proteins. The structure of this domain is composed of three α-helices and a three-stranded β-sheet that supports a long and protuberant β-hairpin. This domain is also found in the N-terminal region of the RP4 TraC1 primase, together with the Toprim domain ( ).
