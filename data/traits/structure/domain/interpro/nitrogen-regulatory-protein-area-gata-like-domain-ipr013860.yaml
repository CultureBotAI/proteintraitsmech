identifier: InterPro:IPR013860
label: "Nitrogen regulatory protein areA, GATA-like domain"
definition: >-
  This entry represents fungal proteins containing GATA domains, including nitrogen regulatory protein areA, a transcription activator that binds the consensus DNA element 5'-CGATAG-3' and mediates nitrogen metabolite repression. The entry also contains that is thought to be a negative regulator of RAS-cAMP pathway in S. cerevisiae and the S. pombe member is a GAF1 transcription factor .
