identifier: InterPro:IPR012425
label: "DmpG-like communication"
definition: >-
  This domain is found towards the C-terminal region of various aldolase enzymes. It consists of five α-helices, four of which form an antiparallel helical bundle that plugs the C terminus of the N-terminal TIM barrel domain. The communication domain is thought to play an important role in the heterodimerisation of the enzyme.
