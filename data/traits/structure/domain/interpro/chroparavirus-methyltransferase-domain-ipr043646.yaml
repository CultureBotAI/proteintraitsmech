identifier: InterPro:IPR043646
label: "Chroparavirus methyltransferase domain"
definition: >-
  This entry represents a domain found in the N-terminal region of chroparavirus proteins that is homologous to . Included in chroparavirus are chronic bee paralysis virus, anopheline-associated C virus and Lake Sinai virus. These proteins are likely methytransferases involved in mRNA capping.
