identifier: InterPro:IPR049786
label: "RNA-binding protein rnc1, third type I K homology RNA-binding domain"
definition: >-
  This entry represents the third type I K homology (KH) RNA-binding domain found in Schizosaccharomyces pombe RNA-binding protein rnc1 ( ) and similar fungal proteins. Rnc1, also called RNA-binding protein that suppresses calcineurin deletion 1, is an RNA-binding protein that acts as an important regulator of the posttranscriptional expression of the MAPK phosphatase Pmp1 in fission yeast. It binds and stabilises pmp1 mRNA and hence acts as a negative regulator of pmk1 signalling. Overexpression of Rnc1 suppresses the Cl(-) sensitivity of calcineurin deletion. The nuclear export of Rnc1 requires mRNA-binding ability and the mRNA export factor Rae1. Rnc1 contains three K-homology (KH) RNA-binding domains.
