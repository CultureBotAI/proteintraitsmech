identifier: InterPro:IPR005043
label: "Exportin-2, C-terminal"
definition: >-
  Exportin-2, also known as CAS, is an export receptor for importin-alpha. It binds strongly to importin alpha only in the presence of RanGTP, forming an importin alpha/CAS/RanGTP complex. Exportin-2 mediates importin-alpha re-export from the nucleus to the cytoplasm after import substrates have been released into the nucleoplasm. This entry represents the C-terminal domain of XPO2. Structural studies of its yeast homologue, Cse1, indicate that this domain binds to both the transport-orchestrating protein RanGTP and the cargo molecule that is being exported.
