identifier: InterPro:IPR029139
label: "NADPH-dependent 7-cyano-7-deazaguanine reductase, N-terminal"
definition: >-
  The QueF (NADPH-dependent 7-cyano-7-deazaguanine reductase) monomer is made up of two ferredoxin-like domains aligned together with their β-sheets that have additional embellishments. This subunit is composed of a three-stranded β-sheet and two α-helices. QueF reduces a nitrile bond to a primary amine. The two monomer units together create suitable substrate-binding pockets.
