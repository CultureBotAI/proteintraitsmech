identifier: InterPro:IPR010730
label: "Heterokaryon incompatibility"
definition: >-
  This entry represents a conserved region approximately 150 residues long within various heterokaryon incompatibility proteins that seem to be restricted to ascomycete fungi. Genetic differences in specific het genes prevent a viable heterokaryotic fungal cell from being formed by the fusion of filaments from two different wild-type strains. Many proteins of this entry also contain the WD domain, G-beta repeat and the NACHT domain.
