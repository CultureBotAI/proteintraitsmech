identifier: InterPro:IPR048388
label: "Tail fibre protein gp37, trimerization region"
definition: >-
  This entry represents part of the phage tail fibre. In T-even phages, gp37 and gp38 are components of the tail fibre that are critical for phage-host interaction. This region is also found in similar proteins from tailed bacteriophages and proteobacterial prophages.
