identifier: InterPro:IPR058964
label: "Cap2, central linker domain"
definition: >-
  This domain is found centrally located in the ATP-dependent ubiquitin transferase-like protein Cap2 (Cap2) from Enterobacter hormaechei and related prokaryotic proteins. Bacteria encode evolutionary predecessors of cGAS called cGAS/DncV-like nucleotidyltransferases 2 (CD-NTases), which detect bacteriophage infection and produce diverse nucleotide second messengers. Cap2 primes bacterial CD-NTases for activation through a ubiquitin transferase-like mechanism. Cap2 as an ubiquitin transferase- like protein, with distinct domains resembling eukaryotic E1 and E2 proteins. The domain represented by this entry shares a structural similarity to the N-terminal domain of ATG7 . In the Cap2 structure this central linker domain of each Cap2 protomer reaches over the E1 domain of its dimer mate, positioning the N-terminal E2 domain close to the active site of its dimer-related E1 domain.
