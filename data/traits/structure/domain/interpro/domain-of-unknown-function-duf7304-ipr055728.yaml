identifier: InterPro:IPR055728
label: "Domain of unknown function DUF7304"
definition: >-
  This entry describes a family of uncharacterised proteins, around 70 amino acids in length, found in mycobacteriophages. The family members share sequence similarity but their function is currently unknown. The domain is found as a single copy in the phage proteins. The domain adopts a compact globular fold with a four stranded β sheet followed by an α helix.
