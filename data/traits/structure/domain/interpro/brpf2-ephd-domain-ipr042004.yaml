identifier: InterPro:IPR042004
label: "BRPF2, ePHD domain"
definition: >-
  This entry represents the ePHD finger of bromodomain and PHD finger-containing protein 2 (BRPF2), also known as bromodomain-containing protein 1 (BRD1). The extended plant homeodomain (ePHD) zinc finger is characterised as Cys2HisCys5HisCys2His. BRPF2 is responsible for the bulk of the acetylation of H3K14 and forms a novel monocytic leukemic zinc-finger protein (MOZ)/MOZ-related factor (MORF) H3 histone acetyltransferase (HAT) complex with HBO1 and ING4. The complex is required for full transcriptional activation of the erythroid-specific regulator genes essential for terminal differentiation and survival of erythroblasts in fetal liver. It contains a cysteine rich region harbouring a plant homeodomain (PHD) finger followed by a non-canonical ePHD finger, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain.
