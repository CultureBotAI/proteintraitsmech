identifier: InterPro:IPR013118
label: Mannitol dehydrogenase, C-terminal
definition: >-
  Long-chain mannitol dehydrogenases are a group of secondary alcohol dehydrogenases that differ from other alcohol or polyol dehydrogenases in that they do not utilise Zn(2+) or other metal cofactors and do not contain a conserved catalytic tyrosine residue. The proteins in this family that have been studied are monomeric enzymes of ~54kDa and include: Mannitol-1-phosphate 5-dehydrogenase ( ) Mannitol 2-dehydrogenase ( ) D-arabinitol 4-dehydrogenase ( ) Altronate oxidoreductase ( ) D-mannonate oxidoreductase ( ) These enzymes are mostly found in bacteria, though they are also present in some fungal species.
