identifier: InterPro:IPR048541
label: "Exosome complex component RRP40, N-terminal domain"
definition: >-
  Exosome complex component RRP40 is a non-catalytic component of the RNA exosome complex which has 3'->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. It consists of a N-terminal β-sandwich hybrid domain, a central S1 domain and a C-terminal KH domain ( ). This entry represents the N-terminal domain of RRP40 mainly from mammals.
