identifier: InterPro:IPR018804
label: "Luciferase catalytic domain"
definition: >-
  This entry represents the catalytic domain of dinoflagellate luciferase. Luciferase is involved in catalysing the light emitting reaction in bioluminescence. The structure of this domain has been solved. The core part of the domain is a 10 stranded β barrel that is structurally similar to lipocalins and FABP.
