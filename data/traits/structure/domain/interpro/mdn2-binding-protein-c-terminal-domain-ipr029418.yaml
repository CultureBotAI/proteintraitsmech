identifier: InterPro:IPR029418
label: "MDN2-binding protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the MDM2-binding protein (MTBP). MTBP, or MDM2-binding protein, binds to MDM2. The MDM2 protein, through its interaction with p53, plays an important role in the regulation of the G1 checkpoint of the cell cycle. MTBP promotes MDM2-mediated ubiquitination and degradation of p53 and also MDM2 stabilisation in an MDM2 RING finger-dependent manner. MTBP differentially regulates the E3 ubiquitin ligase activity of MDM2 towards two of its most critical targets (itself and p53) and, in doing so, significantly contributes to MDM2-dependent p53 homeostasis in unstressed cells. MTBP inhibits cancer cell migration by interacting with a protein involved in cell motility. This motility protein is alpha-actinin-4 (ACTN4). It is unclear which regions of MTBP interact with which binding partner.
