identifier: InterPro:IPR022029
label: "YoaR-like, putative peptidoglycan binding domain"
definition: >-
  This domain is found associated with the L,D-transpeptidase domain in the uncharacterised protein YoaR from Bacillus subtilis and similar bacterial proteins. The structure of this domain has been solved and shows a mixed α-β fold composed of nine β strands and four α helices. This domain is usually found to be duplicated. Therefore, it seems likely that this domain acts to bind the two unlinked peptidoglycan chains and bring them into close association so they can be cross linked by the transpeptidase domain.
