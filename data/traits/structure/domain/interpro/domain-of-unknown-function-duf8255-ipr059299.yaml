identifier: InterPro:IPR059299
label: "Domain of unknown function DUF8255"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It contains four pairs of highly conserved cysteine residues that may be involved in metal coordination. It is predicted to contain two zinc beta ribbon domains with one domain inserted into the other.
