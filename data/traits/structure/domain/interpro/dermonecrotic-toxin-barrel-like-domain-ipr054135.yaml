identifier: InterPro:IPR054135
label: "Dermonecrotic toxin, barrel-like domain"
definition: >-
  Dermonecrotic toxin (ToxA), also known as Pasteurella multocida toxin (PMT), inhibits osteoblastic differentiation in mammals and birds. It consists of an N-terminal domain that binds to target cells, and a large C-terminal domain. This entry represents a presumed barrel-like domain found between the N- and C-terminal domains.
