identifier: InterPro:IPR021099
label: "Plant organelle RNA recognition domain"
definition: >-
  The plant organelle RNA recognition (PORR) domain, previously known as DUF860, is a component of group II intron ribonucleoprotein particles in maize chloroplasts. It is required for the splicing of the introns with which it associates, and promotes splicing in the context of a heterodimer with the RNase III-domain protein RNC1. Proteins containing this domain are predicted to localise to mitochondria or chloroplasts. It seems likely that most PORR proteins function in organellar RNA metabolism.
