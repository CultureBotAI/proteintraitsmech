identifier: InterPro:IPR006949
label: "Baseplate protein J-like, barrel domain"
definition: >-
  The temperate bacteriophage P2 has four defined tail genes: V, J, W and I. Their order is the late gene promoter, VWJI, followed by the tail fibre genes H and G and then a transcription terminator. BAP V protein is the small spike at the tip of the tail and basal plate assembly protein J lies at the edge of the baseplate. This domain is found in proteins that are similar to P2 Baseplate protein, including Baseplate protein gp47 from Escherichia phage Mu. This group also includes a number of bacterial homologues, which are thought to have been horizontally transferred.
