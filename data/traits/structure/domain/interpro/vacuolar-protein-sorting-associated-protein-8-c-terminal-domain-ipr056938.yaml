identifier: InterPro:IPR056938
label: "Vacuolar protein sorting-associated protein 8, C-terminal domain"
definition: >-
  This domain is found towards the C-terminal end of Vacuolar protein sorting-associated protein 8 from Schizosaccharomyces pombe (Vps8), which is involved in the retention of proteins to the late-Golgi. Members of this group are specific to Schizosaccharomyces.
