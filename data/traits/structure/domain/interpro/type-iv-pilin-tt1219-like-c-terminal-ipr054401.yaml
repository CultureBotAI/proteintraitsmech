identifier: InterPro:IPR054401
label: "Type IV pilin Tt1219-like, C-terminal"
definition: >-
  This entry is found at the C-terminal of the type IV pilin Tt1219 from Thermus thermophilus ( ) and similar sequences. This protein is likely involved in the formation of polymers that extend from the surface of the bacterial cell and could mediate a wide variety of functions such as adhesion, motility and natural competence. This domain is closely related to type II secretion pseudopilins such as EpsJ, GspJ and XcpW. It consists of the canonical type IV pilin structural core comprising an α-helix packed against a four-stranded β-sheet and a variable lobe comprising a β-sheet that packs the helix on the side.
