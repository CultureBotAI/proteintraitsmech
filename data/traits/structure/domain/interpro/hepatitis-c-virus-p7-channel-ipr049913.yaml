identifier: InterPro:IPR049913
label: "Hepatitis C virus, p7 channel"
definition: >-
  This entry represents the p7 channel from hepatitis C virus. Hepatitis C virus (HCV) p7 protein is a viroporin essential for virus production. The p7 monomer is comprised of 2 trans-membrane helices connected by a cytosolic loop, and oligomerises to form cation-specific ion channels. These ion channels dissipate pH gradients in secretory vesicles potentially protecting acid-labile intracellular virions during egress (the rupturing of the infected cell and release of viral contents). p7 protein has at least two different functions in culture, one via the formation of these ion channels, the other through its specific interaction with the non-structural viral protein NS2. Several compounds targeting p7 have been investigated as anti-HCV drugs.
