label: "Zinc finger protein Rlf/292/654, TPR repeats"
definition: >-
  This region of tetratricopeptide (TPR)-like repeats is found in human Zinc finger protein Rlf/292/654 and similar proteins. These proteins may be involved in transcriptional regulation.
