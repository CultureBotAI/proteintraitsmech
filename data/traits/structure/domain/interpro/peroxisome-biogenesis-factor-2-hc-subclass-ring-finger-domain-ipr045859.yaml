identifier: InterPro:IPR045859
label: "Peroxisome biogenesis factor 2, HC subclass-RING finger domain"
definition: >-
  This entry represents the RING finger domain, HC subclass, found exclusively in eukaryotic proteins such as the Peroxisome biogenesis factor 2 (PEX2) from Homo sapiens and Arabidopsis thaliana. PEX2 is an integral peroxisomal membrane protein with two transmembrane regions and a C3HC4-type RING-HC finger within its cytoplasmically exposed C terminus. It may be involved in the biogenesis of peroxisomes, as well as in peroxisomal matrix protein import. Mutations in the PEX2 gene are the primary defect in a subset of patients with Zellweger syndrome and related peroxisome biogenesis disorders. Moreover, PEX2 functions as an E3-ubiquitin ligase that mediates the UBC4-dependent polyubiquitination of PEX5, a key player in peroxisomal matrix protein import, to control PEX5 receptor recycling or degradation.
