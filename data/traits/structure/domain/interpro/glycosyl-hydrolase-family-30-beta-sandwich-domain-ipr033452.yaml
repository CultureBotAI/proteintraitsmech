identifier: InterPro:IPR033452
label: "Glycosyl hydrolase family 30, beta sandwich domain"
definition: >-
  This β-sandwich domain is found in proteins from the glycosyl hydrolase family 30. Glycoside hydrolase family 30 comprises enzymes with only one known activity; glucosylceramidase ( ). Family 30 encompasses the mammalian glucosylceramidases. Human acid beta-glucosidase (D-glucosyl-N-acylsphingosine glucohydrolase), cleaves the glucosidic bonds of glucosylceramide and synthetic beta-glucosides. Any one of over 50 different mutations in the gene of glucocerebrosidase have been found to affect activity of this hydrolase, producing variants of Gaucher disease, the most prevalent lysosomal storage disease.
