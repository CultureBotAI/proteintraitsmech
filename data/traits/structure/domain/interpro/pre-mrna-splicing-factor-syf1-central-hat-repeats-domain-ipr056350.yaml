identifier: InterPro:IPR056350
label: "Pre-mRNA-splicing factor SYF1, central HAT repeats domain"
definition: >-
  This entry represents HAT repeats forming the central region of Syf1. This entry includes a group of pre-mRNA-processing factors that are components of the spliceosome, involved in pre-RNA splicing, including Syf1 from human and its homologues from S.pombe, cwf3. These proteins contain HAT (Half A TPR) repeats which have a repetitive pattern characterised by three aromatic residues with a conserved spacing. They are structurally and sequentially similar to TPRs. The HAT repeats in these proteins can be divided in three segments, N-terminal, central and C-terminal.
