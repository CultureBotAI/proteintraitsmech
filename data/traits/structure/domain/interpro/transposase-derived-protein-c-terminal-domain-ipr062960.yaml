identifier: InterPro:IPR062960
label: "Transposase-derived protein, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of approximately 100 residues found in cyanobacterial transposase-derived proteins. Although annotated as transposases, these proteins appear to have been domesticated for physiological functions. In Nostoc PCC 7120, all1338 is required for growth on dinitrogen under aerobic conditions but not for growth on fixed nitrogen. In Nostoc punctiforme, the homologue Npun_F0815 shows higher abundance in heterocysts. The family is found exclusively in cyanobacteria across Nostocales, Oscillatoriales, Chroococcales, and Synechococcales.
