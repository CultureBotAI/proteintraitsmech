identifier: InterPro:IPR059244
label: "BRE1 E3 ubiquitin ligase"
definition: >-
  This entry represents a coiled-coil domain found in BRE1 and related proteins. BRE1 is an E3 ubiquitin ligase that has been shown to act as a transcriptional activator through direct activator interactions.
