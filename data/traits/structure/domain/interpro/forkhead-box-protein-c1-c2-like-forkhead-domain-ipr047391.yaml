identifier: InterPro:IPR047391
label: "Forkhead box protein C1/C2-like, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXC1/C2 and similar sequences predominantly found in vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein C1 (FOXC1) is a DNA-binding transcriptional factor that plays a role in a broad range of cellular and developmental processes such as the development of the eyes, bones, cardiovascular system, kidneys, and skin. It plays a role in the gene regulatory network essential for epidermal keratinocyte terminal differentiation. FOX1 may function as a tumour suppressor. It is associated with Axenfeld-Rieger syndrome 3. FOXC1 has been identified as a potential prognostic candidate and also a potential molecular therapeutic target, as elevated FOXC1 expression predicted poor overall survival in basal-like breast cancer (BLBC). Forkhead box protein C2 (FOXC2) is a transcriptional activator that might be involved in the formation of special mesenchymal tissues. It is associated with the rare disorder lymphedema-distichiasis syndrome.
