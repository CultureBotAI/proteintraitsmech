identifier: InterPro:IPR063143
label: "AbpF, C-terminal domain"
definition: >-
  This entry represents the C-terminal immunoglobulin-like domain of AbpF (actin-binding protein F), also known as KenN. AbpF is found in Dictyostelium discoideum and localises to the nucleus, cytoplasm and cytoskeleton, specifically at the centrosome. The full-length protein interacts with actin. The function of this domain remains to be determined.
