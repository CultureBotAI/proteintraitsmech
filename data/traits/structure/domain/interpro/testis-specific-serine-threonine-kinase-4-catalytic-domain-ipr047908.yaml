identifier: InterPro:IPR047908
label: "Testis-specific serine/threonine kinase 4, catalytic domain"
definition: >-
  Testis-specific serine/threonine-protein kinases (TSSKs) are almost exclusively expressed post meiotically in the testis and play important roles in spermatogenesis and/or spermiogenesis. There are five mammalian TSSK proteins which show differences in their localisation and timing of expression. This entry represents the catalytic domain of TSSK4, also called TSSK5, which is expressed in testis from haploid round spermatids to mature spermatozoa. It mediates its autophosphorylation at Thr-197 in the T-loop region which is essential to its kinase activity. It phosphorylates Cre-Responsive Element Binding protein (CREB), facilitating the binding of CREB to the specific cis cAMP responsive element (CRE), which is important in activating genes related to germ cell differentiation. Mutations in the human TSSK4 gene is associated with infertile Chinese men with impaired spermatogenesis.
