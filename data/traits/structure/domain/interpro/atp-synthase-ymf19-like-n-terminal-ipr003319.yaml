identifier: InterPro:IPR003319
label: "ATP synthase YMF19-like, N-terminal"
definition: >-
  This entry represents a domain found at the N terminus of subunit 8 (or YMF19) of the F0 complex of mitochondrial F-ATPases from plants and algae. This subunit is sometimes found in association and N-terminal to , in higher plants. Subunit 8 differs in sequence between plants, Metazoa ( ) and fungi ( ).
