identifier: InterPro:IPR013914
label: "Rad9-like Rad53-binding domain, fungi"
definition: >-
  This entry represents a Rad53 binding domain (tudor domain) from yeast Rad9. In Saccharomyces cerevisiae (Baker s yeast), Rad9 is a key adaptor protein in DNA damage checkpoint pathways. DNA damage induces Rad9 phosphorylation and promotes the interaction between Rad9 and phosphorylated Rad53. This interaction is achieved through the Rad53 binding domain from Rad9 and the FHA domains from Rad53 ( ). Confusingly, there is another Rad9 protein found in fission yeast and other eukaryotes (which is known as Ddc1 in budding yeast) that is also involved in DNA repair. However, these proteins are not related to the Rad9 proteins covered by this entry.
