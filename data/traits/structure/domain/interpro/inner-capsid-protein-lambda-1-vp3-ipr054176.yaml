identifier: InterPro:IPR054176
label: "Inner capsid protein lambda-1/VP3"
definition: >-
  The reovirus inner capsid protein lambda-1 displays nucleoside triphosphate phosphohydrolase (NTPase), RNA-5'-triphosphatase (RTPase), and RNA helicase activity and may play a role in the transcription of the virus genome, the unwinding or reannealing of double-stranded RNA during RNA synthesis. Lambda1 is an Orthoreovirus core protein, VP3 is the homologous core protein in aquareoviruses.
