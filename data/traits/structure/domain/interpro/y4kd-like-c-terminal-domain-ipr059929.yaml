identifier: InterPro:IPR059929
label: "Y4kD-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Y4kD proteins found in bacteria. Y4kD proteins are found on plasmids in Sinorhizobium species. The full-length Y4kD protein is approximately 549 amino acids. The specific function of this C-terminal domain remains to be determined. This domain is also found in Probable protease Ga0182885_104520 from Desulfuromonadales bacterium, which is probably a dedicated protease for substrate gasdermin bGSDM; cleaves the bGSDM precursor, releasing the pore-forming moiety, which integrates into the membrane and triggers cell death. It is involved in defence against bacteriophages.
