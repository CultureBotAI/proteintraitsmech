identifier: InterPro:IPR043324
label: "PKHG1/2/3, pleckstrin homology domain"
definition: >-
  PLEKHG1 (also called ARHGEF41), PLEKHG2 (also called ARHGEF42 or CLG/common-site lymphoma/leukaemia guanine nucleotide exchange factor2), and PLEKHG3 (also called ARHGEF43) have RhoGEF DH/double-homology domains in tandem with a PH domain which is involved in phospholipid binding. They function as a guanine nucleotide exchange factor (GEF) and are involved in the regulation of Rho protein signal transduction. Mutations in PLEKHG1 have been associated panic disorder (PD), an anxiety disorder characterised by panic attacks and anticipatory anxiety. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarised. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signalling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes.
