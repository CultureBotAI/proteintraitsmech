identifier: InterPro:IPR048736
label: "S-layer protein SlpA, beta-barrel"
definition: >-
  This entry represents the β-barrel domain found at the C-terminal of S-layer protein SlpA ( ) and similar bacterial S-layer proteins. SlpA plays an important role in the structural organisation and integrity of the S-layer. In Deinococcus radiodurans, SlpA binds the carotenoid deinoxanthin, a strong protective antioxidant specific of this bacterium suggested to be part of the first lane of defence against UV radiation, especially under desiccation.
