identifier: InterPro:IPR063510
label: "Inner kinetochore subunit CNN1, C-terminal domain"
definition: >-
  This entry represents the C-terminal histone fold region of CNN1, the budding yeast homologue of CENP-T. This domain interacts with Wip1 to form a heterodimer. In budding yeast, the Cnn1-Wip1 heterodimer associated with the Ctf3 complex (Ctf3c) to form a sub-complex of the larger Ctf19 complex (Ctf19c). CNN1 is a component of the inner kinetochore constitutive centromere-associated network (CCAN). This N-terminal region mediates interaction with the outer kinetochore NDC80 complex subunits SPC24 and SPC25, and with the KNL1 complex. Phosphorylation of this region by MPS1 kinase regulates the interaction with the NDC80 complex.
