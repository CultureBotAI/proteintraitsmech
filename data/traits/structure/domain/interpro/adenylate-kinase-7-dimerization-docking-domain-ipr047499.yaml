identifier: InterPro:IPR047499
label: "Adenylate kinase 7, dimerization/docking domain"
definition: >-
  This entry represents the dimerization/docking (D/D) domain found at the C-terminal of human AK7 and similar proteins mainly found in animals. This domain shows high sequence similarity to the dimerization/docking (D/D) domain of protein DPY-30/SDC1. Adenylate kinase (AK7, / ), also called ATP-AMP transphosphorylase 7, is a nucleoside monophosphate (NMP) kinase that catalyses the reversible transfer of the terminal phosphate group between nucleoside triphosphates and monophosphates. It has highest activity toward AMP, and weaker activity toward dAMP, CMP and dCMP. It also displays broad nucleoside diphosphate kinase activity. AK7 is involved in maintaining ciliary structure and function.
