identifier: InterPro:IPR059596
label: AF_0334-like
definition: >-
  This entry represents the AF_0334 found in Archaeoglobus fulgidus, an uncharacterised protein, and similar sequences found in prokaryotes. The protein is 81 amino acids in length with a molecular weight of approximately 9.2 kDa. The function of this protein family remains to be determined.
