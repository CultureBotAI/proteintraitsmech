identifier: InterPro:IPR063813
label: "CCDC146, N-terminal coiled-coil region"
definition: >-
  This entry represents a N-terminal coiled-coil region found in coiled-coil domain-containing protein 146 (CCDC146). This entry is found in metazoans, primarily vertebrates. CCDC146 is essential for sperm flagellum biogenesis and male fertility. The protein localises to the centriole, flagellum axoneme and ciliary basal body. In humans, mutations in CCDC146 cause spermatogenic failure 94 (SPGF94), characterised by reduced sperm motility and multiple morphological abnormalities of the flagella. The specific function of this N-terminal coiled-coil region remains to be determined.
