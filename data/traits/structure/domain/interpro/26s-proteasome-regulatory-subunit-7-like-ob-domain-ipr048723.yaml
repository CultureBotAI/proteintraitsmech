identifier: InterPro:IPR048723
label: "26S proteasome regulatory subunit 7-like, OB domain"
definition: >-
  This entry represents the OB domain from the human 26S proteasome regulatory subunit 7 (PRS7, also known as PSMC2, Rpt1 or MSS1) and similar eukaryotic sequences. This domain mediates interactions with USP14 or Ubp6. The human 26S proteasome consists of a 20S core particle and two 19S regulatory particles. PRS7, a component of the 19S proteasome cap, is one of six ATPases of the regulatory particle that form a heterohexameric ring.
