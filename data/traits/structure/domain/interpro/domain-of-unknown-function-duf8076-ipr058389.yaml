identifier: InterPro:IPR058389
label: "Domain of unknown function DUF8076"
definition: >-
  This entry represents a domain family of uncharacterised proteins found in halobacteria. These proteins show some structural similarity to RadA proteins in their P-loop domain, however this family of proteins lack the P-loop consensus motifs.
