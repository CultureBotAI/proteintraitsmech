identifier: InterPro:IPR008808
label: "Powdery mildew resistance protein, RPW8 domain"
definition: >-
  This entry represents the RPW8 domain found in several broad-spectrum mildew resistance proteins from Arabidopsis thaliana and other dicots. Plant disease resistance (R) genes control the recognition of specific pathogens and activate subsequent defence responses. The R protein-mediated defences typically involve a rapid, localized necrosis, or hypersensitive response (HR), at the site of infection, and the localised formation of antimicrobial chemicals and proteins that restrict growth of the pathogen. The A. thaliana locus Resistance to Powdery Mildew 8 (RPW8) contains two naturally polymorphic, dominant R genes: RPW8.1 and RPW8.2, which individually control resistance to a broad range of powdery mildew pathogens. They induce localised, salicylic acid-dependent defences similar to those induced by R genes that control specific resistance. Apparently, broad-spectrum resistance mediated by RPW8 uses the same mechanisms as specific resistance. RPW8.1 and RPW8.2 share similarity with an ~150 amino acid module forming the N terminus of a group of disease resistance proteins, which have a nucleotide-binding site (NBS) and leucine-rich repeats (LRRs). The RPW8 domain sequences contain a predicted N-terminal transmembrane (TM) region or possibly a signal peptide, and a coiled-coil (CC) motif.
