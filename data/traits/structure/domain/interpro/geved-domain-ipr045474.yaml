identifier: InterPro:IPR045474
label: "GEVED domain"
definition: >-
  This presumed domain is found in the CshA protein from Streptococcus gordonii. The domain is named after the sequence found in CshA in the conserved C-terminal region. The conserved negatively charged residues suggest that this domain may bind to calcium ions. This domain is part of the non-repetitive region NR3.
