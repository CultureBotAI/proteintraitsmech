identifier: InterPro:IPR062734
label: "CG4951, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the uncharacterised protein CG4951 from Drosophila melanogaster. The protein is 446 amino acids in length and contains a large disordered region. CG4951 undergoes alternative splicing with two isoforms, where isoform A lacks the C-terminal region (residues 321-446), according to the sequence status in Uniprot. The protein is phosphorylated at multiple serine residues including Ser-200, Ser-202, Ser-212, Ser-214, Ser-251, Ser-282 and Ser-307. The function of this domain remains to be determined. This domain contains a β-sheet fold.
