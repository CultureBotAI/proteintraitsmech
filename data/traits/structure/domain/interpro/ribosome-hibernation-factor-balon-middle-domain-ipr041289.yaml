label: "Ribosome hibernation factor Balon, middle domain"
definition: >-
  This entry represents the middle domain of the ribosome hibernation factor Balon from Psychrobacter urativorans ( ) and similar bacterial sequences. Balon binds to ribosomes in an mRNA-independent manner.
