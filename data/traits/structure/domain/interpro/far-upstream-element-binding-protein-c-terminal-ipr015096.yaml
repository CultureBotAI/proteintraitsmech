identifier: InterPro:IPR015096
label: "Far upstream element-binding protein, C-terminal"
definition: >-
  This entry represents the transactivation domain found in the C-terminal of Far upstream element-binding protein 1/2 (FUBP1/2). FUBP1 regulates MYC expression by binding to a single-stranded far-upstream element (FUSE) upstream of the MYC promoter. FUBP2, also known as KSRP (K homology-type splicing regulatory protein), is a single-strand-RNA binding protein that integrate different levels of gene expression and is required for proper immune response, lipid metabolism, cell fate decisions, and tissue regeneration. This domain contains the tyrosine residues required for transactivation and adopts an α-helical configuration.
