identifier: InterPro:IPR038732
label: "FAD-dependent urate hydroxylase HpyO/Asp monooxygenase CreE-like, FAD/NAD(P)-binding domain"
definition: >-
  This entry represents the FAD/NAD(P)-binding domain found in a group of proteins, including HpyO from Xanthomonas campestris pv. campestris (FAD-dependent urate hydroxylase) and L-aspartate N-monooxygenase CreE from Streptomyces cremeus. HpyO catalyses the hydroxylation of urate to 5-hydroxyisourate (HIU). CreE is involved in the biosynthesis of cremeomycin, a light-sensitive o-diazoquinone with antibacterial and antiproliferative effects. It catalyses the iterative oxidation of L-aspartic acid to nitrosuccinic acid (2-nitrobutanedioate).
