identifier: InterPro:IPR056499
label: "HPS5-like, beta-propeller domain"
definition: >-
  This entry represents the β-propeller domain found in HPS5, a component of the biogenesis of lysosome-related organelles complex-2 (BLOC-2) and which has a role in the endo-lysosomal dynamics of skin fibroblasts. Its mutation or absence has been linked to eye-colour mutations in insects and Hermansky-Pudlak type 5 syndrome (HPS-5) in mammals, a disease characterised by defects in lysosome-related organelles such as melanosomes and platelet dense granules. This entry also represents the N-terminal β-propeller domain found in the tectonin β-propeller repeat-containing protein 2 (TCPR2), which is a paralogue of HPS5. TCPR2 acts as a molecular scaffold linking early secretion pathway and autophagy as it associates with several trafficking components, among them the COPII coat protein SEC24D. It is required for stabilisation of SEC24D protein levels, maintenance of functional ER exit sites (ERES), and efficient ER export in a manner dependent on binding to lipidated LC3C.
