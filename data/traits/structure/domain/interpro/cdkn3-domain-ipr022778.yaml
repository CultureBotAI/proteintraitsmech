identifier: InterPro:IPR022778
label: "CDKN3 domain"
definition: >-
  This entry represents a domain found in cyclin-dependent kinase inhibitor 3 or kinase associated phosphatase proteins from several mammalian species. The cyclin-dependent kinase (Cdk)-associated protein phosphatase (KAP) is a human dual specificity protein phosphatase that dephosphorylates Cdk2 on threonine 160 in a cyclin-dependent manner. This domain is also found in the probable protein tyrosine phosphatase type IVA A from Dictyostelium discoideum. This entry contains both eukaryotic and bacterial proteins.
