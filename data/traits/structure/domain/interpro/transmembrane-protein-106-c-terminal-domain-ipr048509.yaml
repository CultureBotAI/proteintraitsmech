identifier: InterPro:IPR048509
label: "Transmembrane protein 106, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of TMEM106A/B/C and similar animal proteins. This family includes Transmembrane protein 106A/B/C, type II transmembrane proteins which have homology to the late embryogenesis abundant-2 (LEA-2) domain. TMEM106A has been identified as a key factor to regulate macrophage activation and a tumour suppressor in gastric, renal cancer and non small-cell lung carcinoma (NSCLC). TMEM106B localises to late endosomes and lysosomes, and it is involved in dendrite morphogenesis and maintenance by regulating lysosomal trafficking via its interaction with MAP6. Its overexpression is associated with familial frontotemporal lobar degeneration. It has also been identified as a protein required for productive SARS-CoV-2. Structural analysis of LEA-2 domains revealed that they have a long, conserved lipid-binding groove, implying that TMEM106B and its homologues Vac7 and Tag1 from yeast, may all be lipid transfer proteins in the lumen of late endocytic organelles.
