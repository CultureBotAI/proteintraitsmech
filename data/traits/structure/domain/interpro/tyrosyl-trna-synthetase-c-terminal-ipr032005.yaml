identifier: InterPro:IPR032005
label: "Tyrosyl-tRNA synthetase, C-terminal"
definition: >-
  This domain is found at the C terminus of fungal mitochondrial tyrosyl-tRNA synthetases (mt TyrRS; CYT-18 protein), which are bifunctional proteins that both aminoacylate mitochondrial tRNA-Tyr and promote the splicing of mitochondrial group I introns. This C-terminal domain has been found to bind to group I intron RNAs.
