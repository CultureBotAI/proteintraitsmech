identifier: InterPro:IPR048009
label: "NGRR domain"
definition: >-
  This entry represents a domain that is found in the N-terminal region of proteins with extended collagen-like Gly-rich repeat regions, from which its name originates (N-terminal-to-Gly-Rich-Repeat). This domain is identified in proteins from order Bacillales. Its function is unknown.
