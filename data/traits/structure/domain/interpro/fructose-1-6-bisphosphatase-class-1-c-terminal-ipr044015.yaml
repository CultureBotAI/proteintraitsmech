identifier: InterPro:IPR044015
label: "Fructose-1-6-bisphosphatase class 1, C-terminal"
definition: >-
  Fructose-1,6-bisphosphatase (FBPase) is a critical regulatory enzyme in gluconeogenesis that catalyses the removal of 1-phosphate from fructose 1,6-bis-phosphate to form fructose 6-phosphate. Five different classes (or types) of FBPases have been identified based on their amino acid sequences, with class I most widely distributed among living organisms. This domain can be found at the C terminus of the FBPase class 1 family members. According to ECOD this domain has a Rossmann-like fold.
