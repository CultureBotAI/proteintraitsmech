identifier: InterPro:IPR054143
label: "Mannosylglycerate synthase, C-terminal domain"
definition: >-
  Mannosylglycerate synthase catalyses the formation of the stress protectant 2-O-alpha-D-mannosyl glycerate. It consists of an N-terminal GT-like domain and a C-terminal helical domain, which is represented in this entry, that is apparently involved in protein oligomerization.
