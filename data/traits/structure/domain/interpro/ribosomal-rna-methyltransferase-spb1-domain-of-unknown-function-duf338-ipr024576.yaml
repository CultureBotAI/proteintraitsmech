identifier: InterPro:IPR024576
label: "Ribosomal RNA methyltransferase Spb1, domain of unknown function DUF3381"
definition: >-
  This uncharacterised domain is found in the central region of fungal SPB1 and mammalian homologue FTSJ3. SPB1 is an adoMet-dependent rRNA methyltransferase required for proper assembly of pre-ribosomal particles during the biogenesis of the 60S ribosomal subunit. In Saccharomyces cerevisiae, it specifically methylates the guanosine in position 2922 of the 25S rRNA at the stage of 27S pre-rRNA maturation. It interacts with the snoRNA-associated proteins Nop1 and Nop58.
