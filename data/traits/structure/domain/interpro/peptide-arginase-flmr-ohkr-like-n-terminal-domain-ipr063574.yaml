identifier: InterPro:IPR063574
label: "Peptide arginase FlmR/OhkR-like, N-terminal domain"
definition: >-
  This entry represents a domain found at the N-terminal of FlmR from Flagellimonas meridianipacifica ( ), OhkR from Ohtaekwangia koreensis ( ) and similar uncharacterised proteins found in animals and bacteria, such as UPF0489 protein C5orf22 from human and its homologues. FlmR and OhkR have been reported to be peptide arginases that modify Arg residues to ornithine in bioactive RiPP peptides. This domain is predicted to adopt an α/β arginase-like fold.
