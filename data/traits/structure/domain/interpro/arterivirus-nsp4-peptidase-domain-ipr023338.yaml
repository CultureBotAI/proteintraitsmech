identifier: InterPro:IPR023338
label: Arterivirus NSP4 peptidase domain
definition: >-
  This entry represents the proteinase domain of NSP4 from arterivirus. Arteriviruses are enveloped, positive-stranded RNA viruses and include pathogens of major economic concern to the swine- and horse-breeding industries: Equine arteritis virus (EAV). Porcine reproductive and respiratory syndrome virus (PRRSV). Mice actate dehydrogenase-elevating virus. Simian hemorrhagic fever virus. The arterivirus replicase gene encodes two large precursor polyproteins that are processed by the viral main proteinase nonstructural protein 4 (NSP4). The structure of the enzyme reveals two chymotrypsin-like antiparallel β-barrels and an extra C-terminal α/β domain that may play a role in mediating protein-protein interactions. The N-terminal barrel consists of six β-strands (A1 to F1), while the C-terminal barrel is composed of seven (A2 to G2). The core of both β-barrels is comprised of conserved hydrophobic residues. The additional C-terminal domain consists of two pairs of short antiparallel β-sheets and two α-helices. It interacts with the C-terminal barrel through an interface consisting of conserved hydrophobic residues. A canonical catalytic triad that is composed of Ser, His, and Asp is located in the open cleft between the β-barrels domain. The nsp4 proteinase domain is a member of peptidase family S32.
