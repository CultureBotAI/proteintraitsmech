identifier: InterPro:IPR029111
label: "Bacterial toxin 30"
definition: >-
  Prokaryotic polymorphic toxin systems are implicated in intra-specific conflicts. They are characterised by a remarkable diversity of C-terminal toxin domains generated by recombination with standalone toxin-coding cassettes. This entry represents a predicted RNase toxin found in bacterial polymorphic toxin systems. The toxin possesses an all-β fold and two conserved histidines present in an RxH and THIP motif. The domain additionally has a highly conserved arginine residue. In bacterial polymorphic toxin systems, the toxin is usually exported by the type 2, type 6 or type 7 secretion system.
