identifier: InterPro:IPR044728
label: ATP-dependent RNA helicase eIF4A, DEAD-box helicase domain
definition: >-
  This entry represents the DEAD-box helicase domain found in eIF4A and related proteins. They are DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. Eukaryotic initiation factor 4A-I (DDX2A) is involved in cap recognition and is required for mRNA binding to ribosome. This domain contains the ATP-binding region.
