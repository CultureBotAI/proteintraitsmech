identifier: InterPro:IPR002404
label: "IRS-type PTB domain"
definition: >-
  Insulin receptor substrate (IRS) molecules are mediators in insulin signaling and play a role in maintaining basic cellular functions such as growth and metabolism. They act as docking proteins between the insulin receptor and a complex network of intracellular signaling molecules containing Src homology 2 (SH2) domains. Four members (IRS-1, IRS-2, IRS-3, IRS-4) of this family have been identified that differ as to tissue distribution, subcellular localization, developmental expression, binding to the insulin receptor, and interaction with SH2 domain-containing proteins. IRS molecules have an N-terminal pleckstrin homology domain ( ), followed by an IRS-like phosphotyrosine binding (PTB) domain which has a PH-like fold. These domains facilitate interaction with the activated tyrosine-phosphorylated insulin receptor. The PTB domain is situated towards the N terminus. Two arginines in this domain are responsible for hydrogen bonding phosphotyrosine residues on a Ac-LYASSNPApY-NH2 peptide in the juxtamembrane region of the insulin receptor. Further interactions via `bridged' water molecules are coordinated by residues an Asn and a Ser residue. PTB domains function as adaptors or scaffolds to organise the signalling complexes involved in wide-ranging physiological processes including neural development, immunity, tissue homeostasis and cell growth. Due to structural differences, PTB domains are divided into three groups represented by phosphotyrosine-dependent IRS-like, phosphotyrosine-dependent Shc-like, and phosphotyrosine-independent Dab-like PTBs. IRS-type PTB domain has an average length of about 100 amino acids. It binds to the insulin receptor through the Asn-Pro-Xaa-Tyr(P) motif found in many tyrosine-phosphorylated proteins. This domain is found in IRS/Dok/SNT pro…
