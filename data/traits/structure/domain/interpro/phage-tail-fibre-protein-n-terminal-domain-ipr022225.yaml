identifier: InterPro:IPR022225
label: "Phage tail fibre protein, N-terminal domain"
definition: >-
  This entry represents a presumed N-terminal domain found in bacteria and viruses. Some annotation suggests that it may be a tail fibre protein. There are two completely conserved residues (K and W) in these proteins that may be functionally important.
