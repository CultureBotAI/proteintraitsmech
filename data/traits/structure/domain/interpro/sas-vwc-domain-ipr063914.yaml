identifier: InterPro:IPR063914
label: "Sas, VWC domain"
definition: >-
  This VWC domain is found in the putative epidermal cell surface receptor from Drosophila melanogaster (Sas), which is vital for larval development and may modulate cellular adhesion between the apical surface and apical extracellular matrix during salivary tube elongation.
