identifier: InterPro:IPR056672
label: "Domain of unknown function DUF7770"
definition: >-
  This entry represents a domain found in uncharacterised proteins. It is predicted to adopt a globular structure that resembles the conserved core of the PPPDE superfamily (after Permuted Papain fold Peptidases of DsRNA viruses and Eukaryotes) which consists of thiol peptidases with a circularly permuted papain-like fold. This domain is found either standalone or in combination with other domains.
