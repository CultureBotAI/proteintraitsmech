identifier: InterPro:IPR041915
label: "Tudor domain-containing protein 3, UBA domain"
definition: >-
  This entry represents the UBA domain of TDRD3. TDRD3 is a modular protein containing a Tudor domain, a DUF/OB-fold motif and a ubiquitin-associated (UBA) domain. It shows both nucleic acid- and methyl-binding properties and can interact with methylated RNA-binding proteins, such as fragile X messenger ribonucleoprotein 1 (FMRP) and DEAD/H box-3 (also known as DDX3X/Y, DBX/Y, HLP2 and DDX14) which is implicated in human genetic diseases. At this point, TDRD3 may play a central role in RNA processing regulatory pathways involving arginine methylation. TDRD3 localizes predominantly to the cytoplasm stress granules (SGs). The Tudor domain is essential and sufficient for its recruitment to SGs.
