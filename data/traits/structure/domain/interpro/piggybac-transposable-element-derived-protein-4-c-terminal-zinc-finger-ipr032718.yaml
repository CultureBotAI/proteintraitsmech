identifier: InterPro:IPR032718
label: "PiggyBac transposable element-derived protein 4, C-terminal zinc-finger domain"
definition: >-
  This entry represents a zinc-finger domain which is found in piggyBac transposable element-derived protein 4 (PGBD4) protein. This zinc-finger domain is frequently found at the C terminus of proteins derived from transposable elements. Given the AlphaFold predicted structural model, this domain is probably related to C1 domain observed in Protein kinase C ( ).
