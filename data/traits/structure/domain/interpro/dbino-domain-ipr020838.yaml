identifier: InterPro:IPR020838
label: "DBINO domain"
definition: >-
  Proteins belonging to the SNF2 family of DNA dependent ATPases are important members of the chromatin remodelling complexes that are implicated in epigenetic control of gene expression. Members of the SNF2 family of proteins have been identified in organisms ranging from Escherichia coli to Homo sapiens (Human). All of them contain the conserved SNF2 domain, which is defined by the existence of seven motifs (I, Ia, and II-VI) with sequences similarity to those motifs found in DNA and RNA helicases (see ). SNF2-like family members can be further subdivided into several subfamilies according to the presence of protein motifs outside of the ATPase region. The DBINO (DNA binding domain of INO80) domain is characteristic of the INO80 subfamily and is a DNA-binding domain. The DBINO domain is a 126 amino acid long peptide located near the N terminus, approximately 100 residues upstream of the SNF2 helicase domain. The presence of this domain in all the INO80 subfamily proteins from yeast to humans suggests its conserved function in evolution.
