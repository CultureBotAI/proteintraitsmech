identifier: InterPro:IPR060355
label: "Uncharacterized protein MJ0013-like domain"
definition: >-
  This entry represents a domain that covers the whole sequence of MJ0013, an uncharacterised protein found in Methanocaldococcus jannaschii. The protein is 162 amino acids in length with a molecular weight of approximately 19.6 kDa. Its function remains to be determined. The protein is highly positively charged, but according to AlphaFold 3 prediction it does not bind to dsDNA. This domain is also found in MJ0752, MJ0857 and MJ1635 and related archaeal sequences in other positions.
