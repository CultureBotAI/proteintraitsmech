label: "Domain of unknown function DUF8269"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to fold into a β-sandwich structure consisting of two pairs of swapped β-hairpins. This domain is found in combination with TauE ( ) suggesting it may be associated with the membrane.
