identifier: InterPro:IPR063750
label: "C03B1.2/4, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the C03B1.2 and C03B1.4 proteins from Caenorhabditis elegans and related sequences found in nematodes. These proteins are expressed during larval stages based on expression data. Both proteins are encoded on chromosome X and belong to the same genomic locus, suggesting they may have arisen through gene duplication. The function of this C-terminal domain and the complete proteins remains to be determined.
