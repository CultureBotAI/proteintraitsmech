identifier: InterPro:IPR040624
label: "Halobacterial output domain 1"
definition: >-
  HalOD1 (Halobacterial output domain 1) is a protein domain that is specific for haloarchaea and their viruses. It is found in a stand-alone version and also in combination with response regulator receiver domain ( ) and other domains. This domain is found in DdfA (HVO_2176, such as ), from Haloferax sp., which has been associated with signal transduction pathways, suggesting a potential role in signal cascades that regulate cell-shape determination.
