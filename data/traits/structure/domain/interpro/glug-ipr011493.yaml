identifier: InterPro:IPR011493
label: GLUG
definition: >-
  This domain is found in the IgA1-specific metalloendopeptidases, which attach to the cell wall peptidoglycan by an amide bond. IgA1 protease selectively cleaves human IgA1 and is likely to be a pathogenicity factor in some pathogens including Giardia spp. This domain is also found in various other contexts, including with . It is named GLUG after the mostly conserved G-L-any-G motif. The IgA1-specific metalloendopeptidases belong to MEROPS peptidase family M26, clan MA(E).
