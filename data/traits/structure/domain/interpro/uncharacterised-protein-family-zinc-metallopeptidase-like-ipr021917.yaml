identifier: InterPro:IPR021917
label: "Uncharacterised protein family, zinc metallopeptidase-like"
definition: >-
  This family of proteins is functionally uncharacterised. However, it does contain an HEXXH motif characteristic of metallopeptidases. This protein is found in bacteria and eukaryotes. Proteins in this family are typically between 625 to 773 amino acids in length.
