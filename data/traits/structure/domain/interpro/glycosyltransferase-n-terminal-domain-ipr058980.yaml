identifier: InterPro:IPR058980
label: "Glycosyltransferase, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of glycosyltransferase sequences from plants. This domain is often found associated with and shows a five stranded β-sheet with α-helices on both sides.
