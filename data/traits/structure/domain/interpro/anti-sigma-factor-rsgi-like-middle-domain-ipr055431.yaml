identifier: InterPro:IPR055431
label: "Anti-sigma factor RsgI-like, middle domain"
definition: >-
  The heat shock genes in B. subtilis can be classified into several groups according to their regulation, and the sigma gene, sigI, of Bacillus subtilis belongs to the group IV heat-shock response genes and has many orthologues in firmicutes. Regulation of sigma factor I is carried out by RsgI from the same operon. This entry represents the middle cytoplasmic region of RsgI, which is found C-terminal to the single transmembrane helix which has been shown to interact directly with Sigma-I.
