identifier: InterPro:IPR054458
label: "Conserved flagellar protein F, immunoglobulin-like domain"
definition: >-
  This domain is found in Conserved flagellar protein F from Sulfolobus acidocaldarius (FlaF, ) and similar archaeal proteins. FlaF is essential for archaellum assembly with an extended N-terminal α-helix connected to a globular domain (this entry). This domain adopts a β-sandwich fold with eight anti-parallel β-strands in two sheets and Ig-like topology. FlaF associates with FlaG and this FlaG-FlaF complex is critical for archaellum assembly and motility by anchoring the archaellum to the S-layer.
