identifier: InterPro:IPR049213
label: "Domain of unknown function DUF6816"
definition: >-
  This presumed domain is functionally uncharacterised and it is found in bacterial (predominantly cyanobacterial) and eukaryotic (mainly plant) sequences. AlphaFold structure prediction suggests that this domain may have a START-like (StAR-related lipid-transfer) fold consisting of an α/β structure of a helix-grip fold, that forms cavities for hydrophobic substrates or ligands which may indicate a possible function for this domain.
