identifier: InterPro:IPR055378
label: "GH3, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the GH3 IAA-amido conjugating enzyme family, which consists of a single four-stranded β-sheet bracketed by two α-helices on each side. This entry includes GH3 IAA-amido conjugating enzyme family, which consists of proteins that catalyse the synthesis of amino acid conjugates with indole-3-acetic acid (IAA) or jasmonate (JA), which are plant hormones. These enzymes play a crucial role in regulating plant hormone levels by conjugating excess IAA and JA to amino acids, thus providing a mechanism for plants to maintain hormonal homeostasis. The conjugation process is ATP-dependent and involves the adenylation of the hormone followed by the transfer to an amino acid. This group of proteins is involved in various plant physiological processes including disease resistance, stamen and carpel differentiation, floret fertility, and response to environmental stresses such as wounding and pathogen attack. Some members also exhibit activity towards synthetic auxins and may confer resistance to herbicides. Its broad substrate specificity includes various amino acids and analogues of IAA, contributing to the complexity of hormone regulation in plants.
