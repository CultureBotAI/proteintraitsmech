identifier: InterPro:IPR057468
label: "HOIL-1/Sharpin, LUBAC thetering domain"
definition: >-
  This entry describes the Linear Ubiquitin Chain Assembly Complex (LUBAC)-tethering domain (LTM) found in the two LUBAC accessory subunits HOIL-1L and SHARPIN in vertebrates. These domains from both proteins heterodimerise and fold into a single globular domain. stabilising the multi-protein E3 ubiquitin ligase LUBAC complex.
