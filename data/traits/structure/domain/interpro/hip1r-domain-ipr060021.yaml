identifier: InterPro:IPR060021
label: "HIP1R domain"
definition: >-
  This domain is found in human Huntingtin-interacting protein 1-related protein (HIP1R) and related sequences. HIP1R is a component of clathrin-coated pits and vesicles, that may link the endocytic machinery to the actin cytoskeleton.
