identifier: InterPro:IPR049316
label: "Glycine dehydrogenase, C-terminal domain"
definition: >-
  This entry represents a small domain found at the C-terminal end of Glycine dehydrogenases, also known as glycine cleavage system P protein (GDC-P), part of the glycine decarboxylase multienzyme complex (GDC). GDC-P binds the α-amino group of glycine through its pyridoxal phosphate cofactor; CO2 is released and the remaining methylamine moiety is then transferred to the lipoamide cofactor of the H protein. The monomer consists of two domains, a large domain and a small domain. This domain has a complex α/β structure.
