identifier: InterPro:IPR011651
label: "Notch ligand, N-terminal domain"
definition: >-
  This entry represents a region of conserved sequence at the N terminus of several Notch ligand proteins, including Delta-like protein 1 (DLL1), 4 (DLL4) and Protein jagged-1. It plays a role in lipid binding.
