identifier: InterPro:IPR058854
label: "HI_0096-like, winged helix domain"
definition: >-
  This entry represents a winged helix domain found in a small family of uncharacterised bacterial proteins mainly from Negativicutes that often contain a methyltransferase domain, including HI_0096 from Haemophilus influenzae.
