identifier: InterPro:IPR044444
label: Large ribosomal subunit protein mL44, dsRNA binding domain, metazoa
definition: >-
  Large ribosomal subunit protein mL44 (MRPL44) is a component of the 39S subunit of mitochondrial ribosome. It may play a role in the assembly/stability of nascent mitochondrial polypeptides exiting the ribosome. MRPL44 contains a RNase III-like domain and a double-stranded RNA binding motif (DSRM). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. This entry represents the DSRM of MRPL44 from animals. MRPL44 has been linked to human cardiomyopathy.
