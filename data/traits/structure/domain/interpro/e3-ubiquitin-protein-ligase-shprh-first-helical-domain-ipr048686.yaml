identifier: InterPro:IPR048686
label: "E3 ubiquitin-protein ligase SHPRH, first helical domain"
definition: >-
  This entry represents the first helical domain found in the central region of the E3 ubiquitin-protein ligase SHPRH, a protein involved in DNA repair. Helices in this domain adopt an arrangement similar to TPRs.
