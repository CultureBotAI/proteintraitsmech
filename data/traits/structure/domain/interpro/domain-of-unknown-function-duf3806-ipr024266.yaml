identifier: InterPro:IPR024266
label: "Domain of unknown function DUF3806"
definition: >-
  This entry represents a domain found at the C terminus of a family of bacterial proteins, whose function is unknown. In two related Bacteroides species the gene for members of this family lies immediately upstream from a putative ATP binding component of an ATP transporter and a putative histidinol phosphatase.
