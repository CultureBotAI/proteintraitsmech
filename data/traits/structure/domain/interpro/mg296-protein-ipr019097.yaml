identifier: InterPro:IPR019097
label: "Mg296 protein"
definition: >-
  This protein of 129 residues is expressed in bacteria. It consists of three identical chains of five α helices. Two copies of each chain associate into a complex of six units of possible biological significance but of unknown function.
