identifier: InterPro:IPR034855
label: "RBM12, RNA recognition motif 3"
definition: >-
  This entry represents the RNA recognition motif 3 (RRM3) of RNA-binding protein 12 (RBM12). RBM12 is ubiquitously expressed. It contains five distinct RNA binding motifs (RRMs), two proline-rich regions, and several putative transmembrane domains. The biological role of RBM12 remains unclear.
