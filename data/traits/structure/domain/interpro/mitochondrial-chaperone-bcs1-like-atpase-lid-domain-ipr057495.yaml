identifier: InterPro:IPR057495
label: "Mitochondrial chaperone BCS1-like, ATPase lid domain"
definition: >-
  This ATPase lid domain is found at the C-terminal end of human Mitochondrial chaperone BCS1 and similar eukaryotic proteins. BCS1 is a chaperone necessary for the incorporation of Rieske iron-sulfur protein UQCRFS1 into the mitochondrial respiratory chain complex III. It plays an important role in the maintenance of mitochondrial tubular networks, respiratory chain assembly and formation of the LETM1 complex. This domain is normally found immediately C-terminal to and also associated with .
