identifier: InterPro:IPR007604
label: "CP2 transcription factor"
definition: >-
  This entry represents a domain found in animal and fungal Grh/CP2 transcription factors (TFs), key regulators of epithelial differentiation, organ development and skin barrier formation. The Grh/CP2 family of TFs comprises two distinct divisions, CP2 (CCAAT box-binding protein 2) and Grh (grainyhead). Proteins of the CP2 subfamily are generally expressed ubiquitously, while the expression pattern of the Grh subfamily is rather tissue- and developmental stage specific. All Grh/CP2 family members share a common domain architecture characterised by an intrinsically unstructured N-terminal transactivation domain (TAD), a conserved DNA-binding domain (DB, also termed CP2 binding domain), and a C-terminal dimerisation domain (DD). The Grh/CP2 DB domain contains an immunoglobulin (Ig)-like core with two long, twisted antiparallel β sheets of five and six strands, respectively. This core is decorated by three α helices and a series of surface loops.
