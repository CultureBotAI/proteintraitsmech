identifier: InterPro:IPR063700
label: "PTAC6, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of PTAC6 (PLASTID TRANSCRIPTIONALLY ACTIVE protein 6), found in land plants. This protein contains a chloroplast transit peptide that directs the protein to chloroplasts. The N-terminal region includes a disordered region and low complexity sequences. PTAC6 is an essential component of the plastid-encoded RNA polymerase complex involved in plastid gene expression and chloroplast biogenesis. The protein exhibits dual localisation between nucleus and chloroplast, linking photomorphogenesis with chloroplast development. The specific function of this N-terminal domain remains to be determined.
