identifier: InterPro:IPR049420
label: "EPCAM/Trop-2, C-terminal"
definition: >-
  EpCAM (epithelial cell adhesion molecule, also known as Trop-1) and Trop-2 (also known as tumor-associated calcium signal transducer 2, TACSTD2) are transmembrane glycoproteins that belong to the tumour-associated calcium signal transducer (TACSTD) family. They are evolutionarily related and both are implicated in signalling triggered by proteolytic cleavage within the ectodomain. They share an overall similar structure but differ in their dimers formation. They consist of an ectodomain with an N-terminal, thyroglobulin type-1 (TY, ) and C-terminal domains. This entry represents the C-terminal domain of EpCAM and Trop-2, which has an α/β fold.
