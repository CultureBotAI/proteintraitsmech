identifier: InterPro:IPR057393
label: "PIC/HAP1/IgA0-like, second beta-solenoid repeat region"
definition: >-
  This entry represents the second solenoid-repeat region found in some serine peptidase autotransporters from bacteria, including IgA0 (Immunoglobulin A1 protease autotransporter), HAP1 (Adhesion and penetration protein autotransporter), Pic (Serine protease pic autotransporter), SepA and EspC. These proteins have been associated to virulent strains. Pic and other bacterial autotransporters confer serum resistance but do not degrade immunoglobulin, in contrast to IgA0 which cleaves host immunoglobulin A producing intact Fc and Fab fragments. This region counts with insertions between β-solenoid repeats which have been suggested to be involved in forming a unique structure for recognition and binding of protein substrate.
