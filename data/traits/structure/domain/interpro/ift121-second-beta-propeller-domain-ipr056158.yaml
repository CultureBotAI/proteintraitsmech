identifier: InterPro:IPR056158
label: "IFT121, second beta-propeller domain"
definition: >-
  This entry represents the second β-propeller of IFT121. IFT121 (also known as WDR35) is a component of the IFT complex A (IFT-A), which is required for retrograde ciliary transport and entry into cilia of G protein-coupled receptors that is involved in ciliogenesis and ciliary protein trafficking. This protein plays a role in cilia assembly and maintenance. IFT121 contains a zinc finger with rubredoxin-like fold. Knock-out IFT121 cells showed defective retrograde trafficking within cilia.
