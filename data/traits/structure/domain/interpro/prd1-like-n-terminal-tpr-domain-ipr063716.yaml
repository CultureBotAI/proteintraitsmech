identifier: InterPro:IPR063716
label: "PRD1-like, N-terminal TPR domain"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found at the N-terminal of Protein PUTATIVE RECOMBINATION INITIATION DEFECT 1 from Arabidopsis thaliana (PRD1) and similar sequences. PRD1 is involved in DNA cleavage that forms the double-strand breaks (DSB) that initiate meiotic recombination.
