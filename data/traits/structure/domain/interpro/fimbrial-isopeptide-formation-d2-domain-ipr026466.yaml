identifier: InterPro:IPR026466
label: "Fimbrial isopeptide formation D2 domain"
definition: >-
  This entry represents the middle domain of Fimbrial subunit type 1 from Actinomyces viscosus (FimA), the Streptococcus Pneumoniae pilus backbone protein RrgB, and similar bacterial proteins. This domain contain one autocatalysed intramolecular isopeptide bond, which is used by Gram-positive bacteria for stabilisation of surface proteins. In FimA, it folds into an IgG-like domain of the CnaA-type, showing a a β-sandwich of two five-stranded anti-parallel sheets and an helix wedged in between the upper part of the sandwich. This domain was initially known as the D2 domain in RrgB. Platelet adherence protein A from Streptococcus gordonii (PadA), a much longer protein, contains 17 copies of this domain. This central region may serve as a flexible extension that holds the N terminus away from the bacterial surface. PadA is a cell wall protein involved with Hsa in host cell interactions required for colonization and pathogenesis. Three of every four members of this group have the typical Gram-positive C-terminal motif, LPXTG, although in many cases this motif may be involved in pilin subunit cross-linking rather than cell wall attachment. Proteins with this domain include fimbrial proteins with lectin-like adhesion functions, and the majority of characterised members are involved in surface adhesion to host structures.
