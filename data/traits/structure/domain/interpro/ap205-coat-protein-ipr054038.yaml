identifier: InterPro:IPR054038
label: "AP205 coat protein"
definition: >-
  AP205 is a single-stranded RNA bacteriophage that has a coat protein sequence that is not similar to any other known single-stranded RNA phage protein. The AP205 coat protein forms a dimer which adopts the conserved Leviviridae coat protein core fold with the exception of the N-terminal region. This coat protein has a similar structure that is circularly permuted compared to the other coat proteins.
