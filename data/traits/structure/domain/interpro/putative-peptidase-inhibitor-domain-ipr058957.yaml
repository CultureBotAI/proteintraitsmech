identifier: InterPro:IPR058957
label: "Putative peptidase inhibitor domain"
definition: >-
  This entry represents a domain found in a group of uncharacterised proteins found in halobacteria and actinomycetes species. This domain covers the whole length of the protein in many members. The structure shows similarity to the prodomain of the Tk-subtilisin from the hyperthermophilic archaeon Thermococcus kodakaraensis. This suggests that this domain may act as a peptidase inhibitor.
