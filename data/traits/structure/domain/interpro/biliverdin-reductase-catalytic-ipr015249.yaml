identifier: InterPro:IPR015249
label: "Biliverdin reductase, catalytic"
definition: >-
  This entry represents the biliverdin reductase, catalytic domain, which adopts a structure ccontaining a six-stranded β-sheet that is flanked on one face by several α-helices. This domain contains the catalytic active site which reduces the gamma-methene bridge of the open tetrapyrrole, biliverdin IX alpha, to bilirubin with the concomitant oxidation of a NADH or NADPH cofactor.
