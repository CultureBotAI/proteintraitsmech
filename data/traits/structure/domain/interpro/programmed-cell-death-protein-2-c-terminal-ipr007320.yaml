identifier: InterPro:IPR007320
label: "Programmed cell death protein 2, C-terminal"
definition: >-
  PDCD2 is localized predominantly in the cytosol of cells situated at the opposite pole of the germinal centre from the centroblasts as well as in cells in the mantle zone. It is a chaperone for ribosomal protein uS5. It cotranslationally associates with uS5 and accompanies the ribosomal protein to assembly sites in the nucleus. This entry represents the C-terminal segment of PDCD2, PDCD2L and its homologues, that is completed by a N-terminal segment to form the full functional domain, which is interrupted by a zinc finger .
