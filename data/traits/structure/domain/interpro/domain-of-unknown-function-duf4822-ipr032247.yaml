identifier: InterPro:IPR032247
label: "Domain of unknown function DUF4822"
definition: >-
  This is lipocain-like domain found in functionally uncharacterised bacterial proteins, often as a repeat of two domains. Proteins with this domain are found in a wide range of bacteria and are often annotated as S-layer proteins, but the origin of this annotation is not clear.
