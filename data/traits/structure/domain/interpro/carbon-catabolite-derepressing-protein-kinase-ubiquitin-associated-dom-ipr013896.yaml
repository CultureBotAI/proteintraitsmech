identifier: InterPro:IPR013896
label: "Carbon catabolite-derepressing protein kinase, ubiquitin-associated domain"
definition: >-
  This ubiquitin-associated (UBA) domain is found in yeast carbon catabolite-derepressing protein kinases (Snf1) and similar proteins from fungi. Mutations in this domain significantly alter SNF1 kinase activation and biological activity. Snf1, also called yeast adenosine monophosphate (AMP)-activated protein kinase (AMPK), is a global regulator of carbon metabolism in the yeast Saccharomyces cerevisiae. Snf1 is involved in the cellular responses to nutrient stress, as well as other environmental stresses.
