identifier: InterPro:IPR062725
label: "Polar tube protein 3, middle domain"
definition: >-
  This entry represents a middle domain found in Polar tube protein 3 (PTP3) from microsporidia. The specific function of this middle domain remains to be determined. PTP3 is involved in sporoblast-to-spore polar tube biogenesis and plays a role in controlling polar tube extrusion in response to ionic stimuli. The protein is localised to the spore polar tube and is highly expressed during polar tube formation.
