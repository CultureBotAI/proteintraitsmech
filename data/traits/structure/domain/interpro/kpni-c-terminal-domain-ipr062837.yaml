identifier: InterPro:IPR062837
label: "KpnI, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of KpnI-like type 2 restriction enzymes. This domain overlaps with HNH endonuclease domains ( or ) and likely contains the catalytic activity. KpnI from Klebsiella pneumoniae recognises the sequence 5'-GGTACC-3' and performs endonucleolytic cleavage after C-5. The family is found in proteins across bacteria, predominantly in Streptomyces and related Actinomycetes, with additional members in Bacillati and Pseudomonadati.
