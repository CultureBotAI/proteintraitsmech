identifier: InterPro:IPR005933
label: "Bifunctional protein PutA, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of Bifunctional protein PutA from Escherichia coli and similar sequences predominantly found in proteobacteria. This domain corresponds to the aldehyde dehydrogenase activity (Delta-1-pyrroline-5-carboxylate dehydrogenase, ) of PutA, which is critical in the de novo biosynthesis of proline and ornithine. It is the rate-limiting enzyme in proline biosynthesis and is subject to feedback inhibition by proline. Structurally, this domain shows two lobes, one that binds NAD+ using a nonclassical Rossmann fold and another harbours the catalytic cysteine.
