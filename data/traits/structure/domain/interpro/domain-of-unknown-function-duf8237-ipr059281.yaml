identifier: InterPro:IPR059281
label: "Domain of unknown function DUF8237"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It is predicted to fold into a globular structure with significant similarity to C-type lectin. Compared to known C-type lectin domains this domain contains a large insertion comprising a six-stranded β-meander. Some proteins contain two copies of this domain.
