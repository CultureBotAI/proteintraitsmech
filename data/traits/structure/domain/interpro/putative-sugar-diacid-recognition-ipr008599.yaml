identifier: InterPro:IPR008599
label: "Putative sugar diacid recognition"
definition: >-
  This region is found in several proteins characterised as carbohydrate diacid regulators (e.g. ). An HTH DNA-binding motif is found at the C terminus of these proteins suggesting that this region includes the sugar recognition region.
