identifier: InterPro:IPR025055
label: "Endospore appendages core"
definition: >-
  The surface of Bacillus and Clostridium endospores is decorated with long filamentous endospores appendages that resemble pili from Gram-negative and Gram-positive bacteria. They show two morphologies, the main or Staggered-type (S-Ena) which accounts for 90% of the fibres, and the Ladder-like (L-Ena) which is smaller and less abundant. They are a novel class of Gram-positive pili, consisting in single domain subunits with a jellyroll topology comprised by two juxtaposed β-sheets. This entry represents the S-Ena core. Disulfide bonding through the N-terminal connector peptide that precedes this domain stabilizes longitudinally the fibres, bridging the helical turns. This results in flexible pili, highly resistant to environmental harsh such as heat, drought, and chemical damage.
