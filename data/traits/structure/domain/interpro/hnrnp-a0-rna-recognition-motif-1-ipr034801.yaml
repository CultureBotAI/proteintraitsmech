identifier: InterPro:IPR034801
label: "hnRNP A0, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of heterogeneous nuclear ribonucleoprotein A0 (hnRNP A0), a low abundance hnRNP protein that has been implicated in mRNA stability in mammalian cells. It has been identified as the substrate for MAPKAP-K2 and may be involved in the lipopolysaccharide (LPS)-induced post-transcriptional regulation of tumor necrosis factor-alpha (TNF-alpha), cyclooxygenase 2 (COX-2) and macrophage inflammatory protein 2 (MIP-2). hnRNP A0 contains two RNA recognition motifs (RRMs), followed by a long glycine-rich region at the C terminus.
