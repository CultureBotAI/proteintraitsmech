identifier: InterPro:IPR035511
label: "SH3YL1, SH3 domain"
definition: >-
  SH3YL1 (SH3 domain-containing YSC84-like protein 1) localizes to the plasma membrane and is required for dorsal ruffle formation. It binds phosphoinositides (PIs) with high affinity through its N-terminal SYLF domain. In addition, SH3YL1 contains a C-terminal SH3 domain which has been reported to bind to N-WASP, dynamin 2 and SHIP2. This entry represents the SH3 domain of SH3YL1.
