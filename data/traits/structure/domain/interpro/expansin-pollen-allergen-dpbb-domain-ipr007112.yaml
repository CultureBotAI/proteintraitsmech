identifier: InterPro:IPR007112
label: "Expansin/pollen allergen, DPBB domain"
definition: >-
  This entry represents a N-terminal domain that has a Barwin-like double psi β-barrel structure(DPBB). It is found in proteins like expasin and pollen allergens. The major timothy grass pollen allergen Phl p 1 is one of the most potent and frequently recognised environmental allergens.
