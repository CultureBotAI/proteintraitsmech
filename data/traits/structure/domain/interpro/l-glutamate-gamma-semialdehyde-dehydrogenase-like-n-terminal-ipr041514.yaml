identifier: InterPro:IPR041514
label: "L-glutamate gamma-semialdehyde dehydrogenase-like, N-terminal"
definition: >-
  This domain is found at the N-terminal in uncharacterised proteins from bacteria. Some of them are annotated as L-glutamate gamma-semialdehyde dehydrogenase and Proline utilization A (PutA) proteins. PutA are bifunctional peripheral membrane flavoenzymes that catalyse the oxidation of l-proline to l-glutamate and couple the oxidation of imported proline to the reduction of membrane-associated quinones. The domain may be involved in membrane association.
