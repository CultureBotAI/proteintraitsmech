identifier: InterPro:IPR028259
label: "AP2-like integrase, N-terminal domain"
definition: >-
  This entry represents the AP2-like domains found N-terminal in a variety of phage integrase proteins, including the ICEBs1 integrase from Bacillus subtilis. Presumably these domains are DNA-binding.
