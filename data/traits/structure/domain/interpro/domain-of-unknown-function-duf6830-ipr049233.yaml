label: "Domain of unknown function DUF6830"
definition: >-
  This domain is functionally uncharacterised, predominantly found in Basidiomycetes. There are several highly conserved residues: P, W, Q and G. Some proteins containing the DUF6830 domain have been classified as members of the Plavaka family ( )
