identifier: InterPro:IPR056412
label: "Cytochrome c-type biogenesis protein H, Ig-like domain"
definition: >-
  This entry represents the immunoglobulin-like domain found in cytochrome c-type biogenesis protein CycH from bacteria. CycH is involved in the attachment of heme to cytochrome c apoproteins. This entry also represents the Ig-like domain of the uncharacterised protein AQ_1241 from Aquifex aeolicus. The function of this domain is unknown.
