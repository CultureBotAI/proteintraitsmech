identifier: InterPro:IPR041635
label: "Type ISP restriction-modification enzyme LLaBIII, C-terminal specificity domain"
definition: >-
  This is the C-terminal domain of Type ISP restriction-modification enzyme LLaBIII present in Lactococcus lactis subsp. cremoris. Type ISP restriction-modification (RM) enzymes provide a potent defence against infection by foreign and bacteriophage DNA. This domain interacts extensively with DNA and is known as the target recognition domain (TRD). TRD works by recognising 6/7 base pairs of asymmetric sequence.
