identifier: InterPro:IPR002123
label: "Phospholipid/glycerol acyltransferase"
definition: >-
  This family is found in diverse acyltransferases involved in phospholipid biosynthesis. This domain is found in tafazzins, phospholipid transacylases involved in the remodeling of cardiolipin, a mitochondrial phospholipid required for oxidative phosphorylation and whose defects cause of Barth syndrome; a severe inherited disorder which is often fatal in childhood and is characterised by cardiac and skeletal abnormalities. Phospholipid/glycerol acyltransferase is not found in the viruses or the archaea and is under represented in the bacteria. Bacterial glycerol-phosphate acyltransferases are involved in membrane biogenesis since they use fatty acid chains to form the first membrane phospholipids.
