identifier: InterPro:IPR005586
label: "ABC-type transport auxiliary lipoprotein component"
definition: >-
  This domain is found in a group of bacterial proteins that act as auxiliaries to the ABC-transporter in the gamma-hexachlorocyclohexane uptake permease system in Sphingobium japonicum. Gamma-hexachlorocyclohexane, or Lindane, can be used as the sole source of carbon in S.japonicum in aerobic conditions. Lindane is an insecticide.
