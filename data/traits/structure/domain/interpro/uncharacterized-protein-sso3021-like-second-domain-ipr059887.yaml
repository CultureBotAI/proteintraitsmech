identifier: InterPro:IPR059887
label: "Uncharacterized protein SSO3021-like, second domain"
definition: >-
  This entry represents the second domain of the uncharacterized protein SSO3021 found in Saccharolobus solfataricus and related archaeal species. Research in this organism has focused on carbohydrate-active enzymes including alpha-xylosidase. The specific function of this protein and its second domain remains to be determined. This entry also includes uncharacterised sequences from bacteria.
