identifier: InterPro:IPR059573
label: "YdeJ domain"
definition: >-
  This entry represents the central domain found in the YdeJ lipoprotein from firmicutes. YdeJ is an uncharacterised lipoprotein of approximately 219 amino acids that is anchored to the cell membrane via lipid modification. The protein contains a signal peptide for secretion and undergoes N-palmitoyl and S-diacylglycerol cysteine modifications at the N-terminal of the mature protein. The function of this lipoprotein remains to be determined.
