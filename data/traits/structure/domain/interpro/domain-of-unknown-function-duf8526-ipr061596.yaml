label: "Domain of unknown function DUF8526"
definition: >-
  This entry represents a conserved integral membrane domain of approximately 100-120 amino acids found exclusively in halophilic archaea. The family is restricted to the order Halobacteriales, particularly the families Natrialbaceae, Haloferacaceae and Haloarculaceae.
