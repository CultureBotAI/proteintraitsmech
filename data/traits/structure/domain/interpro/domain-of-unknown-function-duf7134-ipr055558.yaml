identifier: InterPro:IPR055558
label: "Domain of unknown function DUF7134"
definition: >-
  This domain is composed of six transmembrane α-helices and is found at the N-terminal of a large family of bacterial signalling proteins. It is structurally related to the N-terminal of the DesK protein. This region is believed to be involved in sensing membrane fluidity.
