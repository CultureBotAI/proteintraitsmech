identifier: InterPro:IPR013786
label: "Acyl-CoA dehydrogenase/oxidase, N-terminal"
definition: >-
  This entry represents the N-terminal α-helical domain found in medium chain acyl-CoA dehydrogenases, as well as in the related peroxisomal acyl-CoA oxidase-II enzymes. Acyl-CoA oxidase (ACO; ) catalyses the first and rate-determining step of the peroxisomal beta-oxidation of fatty acids. Acyl-CoA dehydrogenases ( ) are a family of flavoproteins that catalyse the alpha,beta-dehydrogenation of acyl-CoA thioesters to the corresponding trans 2,3-enoyl CoA products with the concomitant reduction of enzyme-bound FAD. Different family members share a high sequence identity, catalytic mechanisms, and structural properties but differ in the position of their catalytic bases and in their substrate binding specificity. Butyryl-CoA dehydrogenase prefers short-chain substrates, medium-chain and long-chain acyl-CoA dehydrogenases prefer medium- and long-chain substrates, respectively, and Isovaleryl-CoA dehydrogenase prefers branched-chain substrates. The monomeric enzyme is folded into three domains of approximately equal size, where the N-terminal domain is all-α, the middle domain is an open (5,8) barrel, and the C-terminal domain is a four-helical bundle. The constituent families differ in the numbers of C-terminal domains. This entry represents the middle β-barrel domain found in medium chain acyl-CoA dehydrogenases, as well as in the related peroxisomal acyl-CoA oxidase-II enzymes. Acyl-CoA oxidase (ACO; ) catalyses the first and rate-determining step of the peroxisomal beta-oxidation of fatty acids.
