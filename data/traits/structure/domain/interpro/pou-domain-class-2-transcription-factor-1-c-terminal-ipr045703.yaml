identifier: InterPro:IPR045703
label: "POU domain, class 2, transcription factor 1, C-terminal"
definition: >-
  This domain represents the C-terminal region of the POU2F1 (POU domain, class 2 subfamily, transcription factor 1), which is localised adjacent to the homeobox domain. This transcription factor activates the promoters of the genes for some small nuclear RNAs (snRNA) and of genes such as those for histone H2B and immunoglobulins. Members of this family are found in chordates.
