identifier: InterPro:IPR056223
label: "PH domain, EVH1-like"
definition: >-
  This domain is found in uncharacterised fungal proteins. It shares significant sequence similarity to known Pleckstrin homology domains (PH-domains), particularly to the EVH1 domain of the regulatory subunit 3 of Phosphoprotein phosphatase 4 PP4 (known as Falafel), and it is predicted to adopt a similar structure.
