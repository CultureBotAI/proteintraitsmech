identifier: InterPro:IPR048003
label: "F-box only protein 8, F-box domain"
definition: >-
  This entry represents the F-box domain of F-box only protein 8 (FBXO8, also called FBX8, or F-box/SEC7 protein FBS). FBXO8 is a novel component of F-box proteins which contains an F-box domain and a Sec7 domain. This protein was originally identified as a Skp1-binding protein. It is involved in the ubiquitin-dependent proteolytic pathway. It acts as a metastasis suppressor that functions through mTOR signaling pathway. FBXO8 may promote the activation of ADP-ribosylation factor (ARF) through replacement of GDP with GTP. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression.
