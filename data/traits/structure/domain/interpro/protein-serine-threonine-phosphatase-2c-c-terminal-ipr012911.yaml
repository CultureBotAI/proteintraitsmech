identifier: InterPro:IPR012911
label: Protein serine/threonine phosphatase 2C, C-terminal
definition: >-
  Protein phosphatase 2C (PP2C, also known as Protein phosphatase 1) is involved in regulating cellular responses to stress in various eukaryotes. It consists of two domains: an N-terminal catalytic domain and a C-terminal domain characteristic of mammalian PP2Cs. This domain consists of three antiparallel α helices, one of which packs against two corresponding α-helices of the N-terminal domain. The C-terminal domain does not seem to play a role in catalysis, but it may provide protein substrate specificity due to the cleft that is created between it and the catalytic domain.
