identifier: InterPro:IPR055089
label: "COP9 signalosome complex subunit 3, N-terminal helical repeats"
definition: >-
  This entry represents the N-terminal domain from COP9 signalosome complex subunit 3, which consists of α-helical repeats. COP9 is a component of the eight-subunit COP9 signalosome complex (CSN), which inactivate Cullin-RING E3 ubiquitin ligases (CRLs) by removing their covalently attached activator, NEDD8. The CSN complex has two organisational centres, one consisting of an open ring formed by association of the WH subdomains from the PCI proteins (CSN1-4 and CSN7-8) and a bundle comprising the C-terminal α-helices from each subunit. The N-terminal helical repeat domains of the PCI proteins radiate from the PCI ring at the base of the complex.
