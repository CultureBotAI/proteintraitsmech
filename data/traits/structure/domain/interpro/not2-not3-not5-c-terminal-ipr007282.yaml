identifier: InterPro:IPR007282
label: NOT2/NOT3/NOT5, C-terminal
definition: >-
  The Ccr4-Not complex controls mRNA metabolism at multiple levels in eukaryotic cells. This complex is a major cytoplasmic deadenylase consisting of a combination of at least nine subunits, four of which have deadenylase activity. The conserved core of the CCR4-NOT complex consists of two major modules: a catalytic module comprising two deadenylases (CAF1 or its paralogue POP2, and CCR4a or its paralogue CCR4b) and the NOT module, which minimally consists of NOT1, NOT2 and NOT3. This entry represents the C-terminal domain of NOT2, NOT3 and NOT5 (subunits 2, 3 and 5 of the complex). The C-terminal regions of NOT2 and NOT3 contain a conserved SH3-like NOT-box domain which mediates NOT-module assembly.
