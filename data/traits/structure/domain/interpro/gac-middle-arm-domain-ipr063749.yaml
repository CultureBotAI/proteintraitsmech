identifier: InterPro:IPR063749
label: "GAC, middle ARM domain"
definition: >-
  This ARM domain is found in the Toxoplasma gondii glideosome-associated connector (GAC). GAC is a giant armadillo-repeat protein, essential for parasite motility and conserved across Apicomplexa including from Toxoplasma gondii. It connects actin filaments to the plasma membrane via interactions with phosphatidic acid and membrane-spanning adhesins. GAC contains a PH domain represented by and ARM regions represented by .
