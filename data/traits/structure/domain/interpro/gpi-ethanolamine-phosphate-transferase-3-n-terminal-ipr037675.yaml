identifier: InterPro:IPR037675
label: "GPI ethanolamine phosphate transferase 3, N-terminal"
definition: >-
  GPI ethanolamine phosphate transferase 3 (also known as PIG-O) is an ethanolamine phosphate transferase involved in glycosylphosphatidylinositol-anchor biosynthesis. It catalyzes the transfer of ethanolamine phosphate to the GPI third mannose which links the GPI-anchor to the C terminus of the proteins by an amide bond.
