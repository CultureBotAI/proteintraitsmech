identifier: InterPro:IPR054434
label: "Argonaute, middle domain, bacteria"
definition: >-
  This entry represents the middle domain of bacterial argonaute (Ago). Ago binds small RNA or DNA guides, which provide base-pairing specificity for the recognition and cleavage of complementary nucleic acid targets. Bacterial Ago adopts a bilobed structure; an N-terminal and a PAZ domain constitute one lobe, the second one consists of a middle (MID) domain and the catalytic PIWI domain. This domain mediates the recognition of the 5' end of the guide.
