identifier: InterPro:IPR054495
label: "Active DUF488-N3 subclade"
definition: >-
  This entry represents a subclade of DUF488 domains with degenerate C-terminal core strand. Sometimes it is observed adjacent to the DUF488-s subclade, suggesting it preserves a catalytic activity comparable to other active DUF488 subclades.
