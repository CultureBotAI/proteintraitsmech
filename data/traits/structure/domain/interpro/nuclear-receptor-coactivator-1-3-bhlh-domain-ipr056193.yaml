identifier: InterPro:IPR056193
label: "Nuclear receptor coactivator 1-3, bHLH domain"
definition: >-
  This bHLH domain is found in nuclear receptor coactivators NCOA1, NCOA2, and NCOA3. The NCOAs bind to nuclear hormone receptors in a ligand-dependent manner and mediate the transcriptional activation of the downstream target genes in response to hormones, metabolites, xenobiotics, and drugs. They are transcriptional coactivators for steroid receptors and nuclear receptors. NCOA2 and NCOA1 are required to control energy balance between white and brown adipose tissues. NCOA2 is also a critical regulator of glucose metabolism regulation, acts as a RORA coactivator to specifically modulate G6PC1 expression.
