identifier: InterPro:IPR024759
label: "UvrB, YAD/RRR-motif-containing domain"
definition: >-
  This entry represents a domain found towards the C terminus of the ultraviolet resistance protein B (UvrB). UvrB conveys mutational resistance against UV light to various different species. This domain is approximately 40 amino acids in length and contains two conserved sequence motifs: YAD and RRR.
