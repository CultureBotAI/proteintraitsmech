identifier: InterPro:IPR049945
label: "ORC1/DEAH AAA+ ATPase domain"
definition: >-
  This entry represents a number of closely related AAA+ ATPase domains from proteins involved in diverse processes such as DNA replication, DNA transposition and mRNA splicing. Amongst the proteins containing this domain are Origin recognition complex (ORC) subunits, Transposon Tn7 transposition protein TnsC, cell division control proteins and pre-mRNA-splicing factor ATP-dependent RNA helicases.
