identifier: InterPro:IPR012924
label: "TfuA-like, core"
definition: >-
  This domain consists of a group of sequences that are similar to the core of TfuA protein ( ). TfuA plays a crucial dual role in peptide backbone thioamidation, functioning as both a hydrolase and a protein interaction mediator. It catalyses the hydrolysis of ThiS-COSH using a Ser/Lys catalytic pair to generate sulfide, while also enhancing YcaO's affinity for peptide substrates by approximately 8-fold. Structurally, TfuA has a unique di-domain architecture consisting of a main α/β fold domain which contains the catalytic residues and ThiS binding pocket, and a 4-helical bundle insertion which mediates interactions with YcaO. TfuA shares some local structural similarities with periplasmic solute-binding proteins and alpha/beta hydrolases. The coordinated action of these domains enables TfuA to work with YcaO as a thioamide synthetase, facilitating peptide modifications in archaea and bacteria.
