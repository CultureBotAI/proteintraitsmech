identifier: InterPro:IPR028971
label: NAD-glutamate dehydrogenase, catalytic domain
definition: >-
  This entry represents the catalytic domain of several proteins which are closely related to NAD-glutamate dehydrogenase found in Streptomyces clavuligerus. Glutamate dehydrogenases (GDHs) are a broadly distributed group of enzymes that catalyse the reversible oxidative deamination of glutamate to ketoglutarate and ammonia. The structure of GDH from Mycobacterium smegmatis revealed that it has long N- and C-terminal segments flanking the catalytic core which provide dimer-like interactions between pairs of monomers. The N-terminal segment is flexible and contains ACT-like and PAS-type domains that may play a role as metabolic sensors for allosteric regulation. Glutamate dehydrogenases (GDHs) are a broadly distributed group of enzymes that catalyse the reversible oxidative deamination of glutamate to ketoglutarate and ammonia.
