identifier: InterPro:IPR059570
label: "HI_1489-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of HI_1489, an uncharacterised protein of 184 amino acids found in Haemophilus influenzae. HI_1489 is a two-domain protein whose function remains to be determined.
