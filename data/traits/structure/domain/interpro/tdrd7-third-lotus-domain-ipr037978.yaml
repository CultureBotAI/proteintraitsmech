identifier: InterPro:IPR037978
label: "TDRD7, third LOTUS domain"
definition: >-
  This entry represents the third LOTUS domain of TDRD7 and similar proteins from vertebrates. TDRD7 (also called PCTAIRE2-binding protein, or Tudor repeat associator with PCTAIRE-2 (Trap)) belongs to the evolutionary conserved Tudor domain-containing protein (TDRD) family involved in germ cell development. It is a component of specific cytoplasmic RNA granules involved in post-transcriptional regulation of specific genes; it probably acts by binding to specific mRNAs and regulating their translation. It is required for lens transparency during lens development, by regulating translation of genes such as CRYBB3 and HSPB1 in the developing lens. It is also essential for dynamic ribonucleoprotein (RNP) remodelling of chromatoid bodies during spermatogenesis. In mice, TDRD7 together with TDRD1/MTR-1, TDRD5 and TDRD6 forms a ribonucleoprotein complex in the intermitochondrial cements (IMCs) and the chromatoid bodies (CBs) involved in RNA processing for spermatogenesis. TDRD7 is functionally essential for the differentiation of germ cells. TDRD7 contains three N-terminal LOTUS domains and three Tudor domains at the C-terminal. The LOTUS domain adopts the winged helix-turn-helix fold that may bind RNA.
