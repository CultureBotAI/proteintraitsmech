identifier: InterPro:IPR058604
label: "Protein of unknown function DUF8167, third domain"
definition: >-
  This entry represents the third domain from a family of uncharacterised proteins from halophilic archaea that contain four domains. These proteins are typically around 400 amino acids in length. This domain adopts a five stranded β-barrel structure.
