identifier: InterPro:IPR032101
label: "Axin-1/2, tankyrase-binding domain"
definition: >-
  This is the N-terminal tankyrase binding domain described for Axin-1. Axin (axis inhibition protein) is a scaffold protein that is involved in many signalling pathways, including the Wnt, transforming growth factor-beta, MAP kinase pathways, as well as p53 activation cascades. It controls many biological processes ranging from sugar intake, cell proliferation, and organ development to cell death.
