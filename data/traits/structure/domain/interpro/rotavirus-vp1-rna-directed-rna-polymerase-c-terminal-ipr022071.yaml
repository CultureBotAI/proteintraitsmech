identifier: InterPro:IPR022071
label: Rotavirus VP1 RNA-directed RNA polymerase, C-terminal
definition: >-
  This domain is the C-terminal bracelet domain of the rotavirus protein VP1, an RNA-directed RNA polymerase. It surrounds the exit tunnel for dsRNA produced by replication and for the RNA template for transcription.
