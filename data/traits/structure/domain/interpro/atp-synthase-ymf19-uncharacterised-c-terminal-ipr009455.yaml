identifier: InterPro:IPR009455
label: "ATP synthase YMF19, uncharacterised, C-terminal"
definition: >-
  This domain represents the C-terminal region of YMF19 of the F0 complex of mitochondrial F-ATPases from plants. This domain is found C-terminal to the plant mitochondrial ATPase subunit 8 domain .
