identifier: InterPro:IPR056093
label: "Domain of unknown function DUF7676"
definition: >-
  This entry represents a family of bacterial proteins that based on structural similarities are likely to bind to heme or a related derivative molecule. Structural modelling suggests these proteins are likely to form homodimers and that this complex can bind to two heme-like molecules. Each heme binding site is composed of parts of both subunits.
