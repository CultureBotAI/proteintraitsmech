identifier: InterPro:IPR037601
label: "ANKS4B, SAM domain"
definition: >-
  ANKS4B (also known as Harp) is part of the intermicrovillar adhesion complex (IMAC) and plays a role in epithelial brush border differentiation, controlling microvilli organization and length. It interacts with USH1C and MYO7B, which link protocadherins to the actin cytoskeleton. In mouse epithelial tissues, HARP interacts with the PDZ domain of harmonin. This scaffolding complex facilitates signal transduction in epithelia.
