identifier: InterPro:IPR053882
label: "Nlrc4-like, winged helix domain"
definition: >-
  This entry represents the winged helix domain (WHD) of NLR family CARD domain-containing protein 4 from mouse (Nlrc4) and similar sequences from vertebrates. Nlrc4 is a component of the inflammasome activated as part of the innate immune response. This domain is also found in human Baculoviral IAP repeat-containing protein 1 (NAIP, Neuronal apoptosis inhibitory protein), which prevents motor-neuron apoptosis induced by a variety of signals and acts as a sensor component of the NLRC4 inflammasome.
