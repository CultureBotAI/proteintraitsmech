identifier: InterPro:IPR040875
label: "Trypsin inhibitor"
definition: >-
  This is domain is found in trypsin inhibitor 1, 2 and 3 found in Chenopodiaceae. Structure analysis of S. oleracea trypsin inhibitor III (SOTI-III), in complex with bovine pancreatic trypsin, shows a knottin-like cystine-bridge topology.
