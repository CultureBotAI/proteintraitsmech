identifier: InterPro:IPR015236
label: Methylated DNA-protein cysteine methyltransferase, ribonuclease H-like domain
definition: >-
  This domain, found in the archaeal protein O6-alkylguanine-DNA alkyltransferase (also known as Methylated-DNA--protein-cysteine methyltransferase, MGMT), adopts a secondary structure consisting of a three stranded antiparallel β-sheet and three α helices. This entry represents the N-terminal ribonuclease H-like domain of MGMT, whose exact function has not, as yet, been defined, though it has been postulated that it may confer thermostability to the protein.
