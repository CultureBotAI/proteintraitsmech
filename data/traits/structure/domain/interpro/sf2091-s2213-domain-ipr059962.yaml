identifier: InterPro:IPR059962
label: "SF2091/S2213 domain"
definition: >-
  This entry represents a small uncharacterised domain in proteins of approximately 119 amino acids found in bacteria. This domain is primarily found in Pseudomonadota, with representatives in both Gammaproteobacteria and Betaproteobacteria. Members include protein SF2091.1/S2213 from Shigella flexneri and related proteins from Comamonadaceae and Variovorax species. The function of this domain remains to be determined.
