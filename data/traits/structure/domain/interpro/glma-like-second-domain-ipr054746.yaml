identifier: InterPro:IPR054746
label: "GLMA-like, second domain"
definition: >-
  This entry represents the second domain of exo-beta-D-glucosaminidase (GLMA) from Thermococcus kodakarensis and similar archaeal and bacterial proteins, just before the C-terminal domain ( ). It is an exo-type enzyme that specifically cleaves the non-reducing terminal glycosidic bond of chitooligosaccharides, being involved in chitin degradation. This is an α/β fold domain with central β-sheets and α-helices. This domain is also found in the beta-1,2-glucosyltransferase which acts on the beta-1,2-glucooligosaccharides and has a very broad specificity for the acceptor by acting on various aryl- and alkyl-glucosides. It catalyses the transfer of a glucosyl residue from the non-reducing end of a 1,2-beta-D-glucan to a glucose residue of an acceptor molecule, forming a beta-1,2-glucosidic bond.
