identifier: InterPro:IPR009988
label: "Regulatory protein RagB, C-terminal"
definition: >-
  This entry, previously known as DUF1510, represents the C-terminal domain of Regulatory protein RagB. RagB is a regulator that modulates the activity of the peptidoglycan glycosyltransferase RodA. RagB stimulates RodA activity via a protein-protein interaction and does not affect the expression, protein levels, localisation or dynamics of RodA. RagB is necessary for cell growth and morphology of B.subtilis in the absence of class A penicillin-binding proteins (aPBPs) and in particular of the major aPBP, PBP1.
