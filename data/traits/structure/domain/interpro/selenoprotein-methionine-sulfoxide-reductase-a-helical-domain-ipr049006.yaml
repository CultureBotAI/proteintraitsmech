identifier: InterPro:IPR049006
label: "Selenoprotein methionine sulfoxide reductase A, helical domain"
definition: >-
  This entry represents a domain from 1-Cys type selenoprotein methionine sulfoxide reductase A from the bacteria Clostridium oremlandii (MsrA, ), a repair enzyme for proteins that have been inactivated by oxidation that is found both in prokaryotes and eukaryotes. MsrA catalyses the reduction of methionine sulfoxide in proteins to methionine. This enzyme is organised into a catalytic domain ( ) and a helical domain (this entry) absent in most of the known MsrA structures. It consists of five helices, interacts with the catalytic domain and is essential for the active site formation. This domain is only found in proteins from some bacterial species and animals.
