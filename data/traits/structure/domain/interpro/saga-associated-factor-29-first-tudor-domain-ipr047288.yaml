identifier: InterPro:IPR047288
label: "SAGA-associated factor 29, first Tudor domain"
definition: >-
  This entry represents the first Tudor domain of SGF29 and similar eukaryotic proteins. SAGA-associated factor 29 (SGF29) is a chromatin reader and a component of the transcription regulatory histone acetylation (HAT) complexes SAGA and SLIK. In the SAGA complex, SGF29 binds histone H3 that has been methylated at Lys-4 (H3K4me), and preferably binds the trimethylated form (H3K4me3). SGF29 also acts as a boundary, preventing the spread of heterochromatin into neighbouring genes. SGF29 contains two Tudor domains.
