identifier: InterPro:IPR010488
label: Zeta toxin domain
definition: >-
  This entry represents a domain originally identified in bacterial zeta toxin proteins, where it comprises the whole protein. It has subsequently been found in a number of other proteins, such as polynucleotide kinase and 2',3'-cyclic-nucleotide 3'-phosphodiesterase. It appears to function as a kinase domain.
