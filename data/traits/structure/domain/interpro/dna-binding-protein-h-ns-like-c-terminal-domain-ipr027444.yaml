identifier: InterPro:IPR027444
label: DNA-binding protein H-NS-like, C-terminal domain
definition: >-
  This entry represents the C-terminal domain of the H-NS DNA binding protein. It is composed of an antiparallel β-sheet, an α-helix and a 3 (10)-helix which form a hydrophobic core, stabilising the whole structure. This domain has been found to bind to DNA. The histone-like nucleoid-structuring (H-NS) protein is a DNA-binding protein implicated in transcriptional repression (silencing) as well as in bacterial chromosome organisation. H-NS binds tightly to AT-rich dsDNA, increases its thermal stability and inhibits transcription. It also binds to ssDNA and RNA but with a much lower affinity.
