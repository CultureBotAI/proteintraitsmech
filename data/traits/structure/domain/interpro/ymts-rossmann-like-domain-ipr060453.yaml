identifier: InterPro:IPR060453
label: "YmtS, Rossmann-like domain"
definition: >-
  This entry represents a small Rossmann-like domain found in an uncharacterised protein from Clostridium tetanomorphum and related bacterial proteins. The protein is located in the mutS 5' region, which is part of a gene cluster involved in glutamate mutase activity. This domain adopts a Rossmann-like fold, which is typically associated with nucleotide binding, though the specific function of this protein is unknown.
