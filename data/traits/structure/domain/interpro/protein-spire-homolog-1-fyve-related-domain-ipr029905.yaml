identifier: InterPro:IPR029905
label: "Protein Spire homolog 1, FYVE-related domain"
definition: >-
  This entry represents the FYVE-related domain of Spire homolog 1 (Spir-1) and similar proteins from chordates. Spir-1 acts as an actin nucleation factor that remain associated with the slow-growing pointed end of the new filament. It is involved in intracellular vesicle transport along actin fibres, providing a novel link between actin cytoskeleton dynamics and intracellular transport. The structure of Spire has been revealed. It contains an N-terminal KIND (kinase noncatalytic C-lobe) domain and four actin-binding WH2 (WASP homology 2) domains, a Rab GTPase-interaction Spir-box, and a C-terminal FYVE zinc-binding domain (this entry). The mammalian genome encodes two Spir proteins, Spir-1 and Spir-2. In adult tissues, the spir-2 gene shows a rather broad expression pattern, whereas spir-1 is mainly expressed in neuronal cells of the nervous system. Spir-1 may have a role in neural function.
