identifier: InterPro:IPR063735
label: "PRDA1, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the PRDA1 protein family found in plants. PRDA1 is a chloroplast nucleoid protein essential for early chloroplast development and regulation of plastid gene expression. The full-length protein localises to chloroplast nucleoids and interacts with FSD2 and MRL7 proteins. PRDA1 is required for maintaining the redox state around chloroplast nucleoids and may positively regulate plastid-encoded RNA polymerase activity. This region contains predicted disordered sequences rich in basic and acidic residues. The specific function of this domain remains to be determined.
