identifier: InterPro:IPR056104
label: "Domain of unknown function DUF7687"
definition: >-
  This entry represents a domain found in uncharacterised bacterial proteins. It shares detectable similarity to a number of type II restriction endonucleases such as DpnII and Ecl18kI and it is predicted to adopt similar structure. It is likely to possess endonuclease activity given the conservation of putative functional site residues.
