identifier: InterPro:IPR059544
label: "Cyclic-di-GMP receptor FimW, C-terminal beta-barrel domain"
definition: >-
  This entry represents the C-terminal β-barrel domain of FimW, a cyclic-di-GMP receptor protein from Pseudomonas aeruginosa and related proteobacteria. FimW is approximately 600 amino acids and contains an N-terminal region ( ), a central PilZ-like domain that binds cyclic-di-GMP (c-di-GMP), and this C-terminal β-barrel domain. FimW regulates type IV pili (T4P) elongation and is required for T4P-mediated surface attachment and walking motility during early phases of surface colonisation. Upon surface contact, FimW rapidly localises to cell poles in a c-di-GMP-dependent manner, dynamically transitioning between the cytoplasm and cell poles as a function of c-di-GMP binding. The specific function of this domain remains to be determined. It may be involved in protein-protein interactions, subcellular localisation, or regulation of pilus assembly machinery and contains a disordered segment enriched in polar residues.
