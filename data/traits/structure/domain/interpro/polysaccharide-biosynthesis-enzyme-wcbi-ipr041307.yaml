identifier: InterPro:IPR041307
label: "Polysaccharide biosynthesis enzyme WcbI"
definition: >-
  Capsular polysaccharides (CPSs) are protective structures on the surfaces of many Gram-negative bacteria. WcbI is one of several genes in the CPS biosynthetic cluster whose deletion leads to significant attenuation of the pathogen. Structural analysis and biophysical assays suggest that WcbI functions as an acetyltransferase enzyme but it requires another functional module to carry out this function. WcbI adopts a predominantly helical fold where the N-terminal 100 amino acids form a ligand-binding domain and binds tightly to coenzyme A and its derivative acetyl-CoA.
