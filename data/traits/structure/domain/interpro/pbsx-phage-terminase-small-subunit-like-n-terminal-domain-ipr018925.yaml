identifier: InterPro:IPR018925
label: "PBSX phage terminase small subunit-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of PBSX phage terminase small subunit from Bacillus subtilis (XtmA) mainly found in firmicutes and some species of tailed bacteriophages. Members of this group share protein sequence similarity with the phage terminase small subunit. Packaging of double-stranded viral DNA concatemers requires interaction of the prohead with virus DNA. This process is mediated by a phage-encoded DNA recognition and terminase protein. The terminase enzymes described so far are hetero-oligomers composed of a small and a large subunit. The small terminase subunit is thought to form a nucleoprotein structure that helps to position the terminase large subunit at the packaging initiation site.
