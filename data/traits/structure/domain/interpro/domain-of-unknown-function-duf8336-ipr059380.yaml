label: "Domain of unknown function DUF8336"
definition: >-
  This domain is found in uncharacterised bacterial proteins. It contains invariant histidine and three cysteine residues that are likely to coordinate a metal ion. It belongs to the superfamily of HC3 zinc fingers.
