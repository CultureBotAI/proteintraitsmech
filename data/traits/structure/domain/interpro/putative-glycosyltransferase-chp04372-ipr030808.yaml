identifier: InterPro:IPR030808
label: "Putative glycosyltransferase CHP04372"
definition: >-
  This domain occurs in proteins of various lengths, in contexts that include O-antigen biosynthesis regions of various Leptospira species. It shows distant sequence similarity to family 9 glycosyltransferases ( ), including ADP-heptose:LPS heptosyltransferase (RfaF), an enzyme involved in LPS inner core region biosynthesis.
