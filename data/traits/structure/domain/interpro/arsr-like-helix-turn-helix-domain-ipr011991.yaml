identifier: InterPro:IPR011991
label: "ArsR-like helix-turn-helix domain"
definition: >-
  This domain is found in the arsenical resistance operon repressor (ArsR) and similar prokaryotic, metal regulated homodimeric repressors. The ArsR subfamily of helix-turn-helix bacterial transcription regulatory proteins (winged helix topology) includes several proteins that appear to dissociate from DNA in the presence of metal ions.
