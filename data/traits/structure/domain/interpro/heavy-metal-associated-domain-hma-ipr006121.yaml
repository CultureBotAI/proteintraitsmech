identifier: InterPro:IPR006121
label: "Heavy metal-associated domain, HMA"
definition: >-
  Proteins that transport heavy metals in micro-organisms and mammals share similarities in their sequences and structures. These proteins provide an important focus for research, some being involved in bacterial resistance to toxic metals, such as lead and cadmium, while others are involved in inherited human syndromes, such as Wilson's and Menke's diseases. A conserved domain has been found in a number of these heavy metal transport or detoxification proteins. The domain, which has been termed Heavy-Metal-Associated (HMA), contains two conserved cysteines that are probably involved in metal binding. Structure solution of the fourth HMA domain of the Menke's copper transporting ATPase shows a well-defined structure comprising a four-stranded antiparallel β-sheet and two α-helices packed in an α-β sandwich fold. This fold is common to other domains and is classified as "ferredoxin-like".
