identifier: InterPro:IPR033896
label: "MADS MEF2-like, N-terminal"
definition: >-
  This entry represents the N-terminal domain of MEF2 (myocyte enhancer factor 2)-like/Type II subfamily of MADS (MCM1, Agamous, Deficiens, and SRF (serum response factor)) box family of eukaryotic transcriptional regulators. It binds DNA and exists as hetero and homo-dimers. This protein differs from SRF-like/Type I subgroup mainly in position of the α helix responsible for the dimerisation interface. It is important in homeotic regulation in plants and in immediate-early development in animals and is also found in fungi.
