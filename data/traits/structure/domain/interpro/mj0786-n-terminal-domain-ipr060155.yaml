identifier: InterPro:IPR060155
label: "MJ0786, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the MJ0786 found in methanogenic archaea. This domain is found across various methanogenic lineages including Methanosarcinaceae, Methanotrichaceae, Methanothrix, and Methanococcales. The full-length proteins are approximately 186 amino acids and contain two domains. The function of this domain remains to be determined. This domain is also present in the middle region of putative Segregation and condensation protein B proteins.
