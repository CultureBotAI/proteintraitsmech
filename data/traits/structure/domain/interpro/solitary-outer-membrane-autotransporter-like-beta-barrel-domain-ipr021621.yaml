identifier: InterPro:IPR021621
label: "Solitary outer membrane autotransporter-like, beta-barrel domain"
definition: >-
  This entry represents the β-barrel domain in putative Solitary outer membrane autotransporte in Gram-negative Gamma-proteobacteria. Secondary structure prediction indicates a β-barrel domain of 12 β-strands. with an N-terminal helix running along the central barrel axis perpendicular to the 12 antiparallel strands that form the barrel. Autotransporter translocation units defined by a β-barrel of 12 to 14 antiparallel strands with an N-terminal helix perpendicular to the barrel.
definition_source: InterPro
