identifier: InterPro:IPR007557
label: "PSP1, C-terminal"
definition: >-
  The yeast polymerase suppressor 1 (PSP1) protein partially suppresses mutations in DNA polymerases alpha and delta. The C-terminal half of PSP1 contains a domain, which is also found in several hypothetical proteins from both eukaryotic and prokaryotic sources: Crithidia fasciculata RBP45 and RBP33, subunits of the cycling sequence binding protein (CSBP) II. RBP45 and RBP33 proteins bind specifically to the cycling sequences present in several mRNAs that accumulate periodically during the cell cycle. RBP45 and RBP33 are phosphoproteins, which are phosphorylated differentially during progression through the cell cycle. Hypothetical proteins with high sequence similarity have been identified in other kinetoplastid organisms. Bacillus subtilis YaaT protein (also known as RicT), which was first thought to play a significant role in phosphorelay during initiation of sporulation. However, YaaT/RicT belongs to a iron-sulfur containing regulatory complex that is conserved also in many non-sporulating species, together with homologs of YmcA (RicA) and YlbF (RicF). The actual biological significance of the PSP1 C-terminal domain has not yet been clearly established.
