identifier: InterPro:IPR037986
label: "Dilute domain-containing protein, fungi, CBD domain"
definition: >-
  This group of dilute domain-containing proteins from fungi contain a domain homologous to the cargo-binding domain of class V myosins. Their function is unknown. The myosinV-like CBD includes two helical lobules and C-terminal extension. The second lobule is also known as dilute domain.
