label: "CofH/MqnC-like, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain found in members of the CofH family (CofH/H1/H2 and FbiC) and MqnC/E enzymes. These are Radical SAM enzymes found in bacteria and archaea.
