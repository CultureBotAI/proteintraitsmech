identifier: InterPro:IPR035639
label: "CPSF2, metallo-hydrolase domain"
definition: >-
  Cleavage and polyadenylation specificity factor (CPSF) plays a key role in pre-mRNA 3'-end formation, recognising the AAUAAA signal sequence and interacting with poly(A) polymerase and other factors to bring about cleavage and poly(A) addition. This entry represents a metallo-hydrolase domain in subunit 2. In addition to this metallo-beta-lactamase (MBL)-fold metallo-hydrolase domain, subunit 2 contains a beta-CASP (named for metallo-beta-lactamase, CPSF, Artemis, Snm1, Pso2) domain.
definition_source: InterPro
