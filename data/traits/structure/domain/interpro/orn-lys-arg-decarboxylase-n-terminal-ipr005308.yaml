identifier: InterPro:IPR005308
label: "Orn/Lys/Arg decarboxylase, N-terminal"
definition: >-
  This domain has a flavodoxin-like fold, and is termed the "wing" domain because of its position in the overall 3D structure. Ornithine decarboxylase from Lactobacillus 30a (L30a OrnDC, ) is representative of the large, pyridoxal-5'-phosphate-dependent decarboxylases that act on lysine, arginine or ornithine. The crystal structure of the L30a OrnDC has been solved to 3.0 A resolution. Six dimers related by C6 symmetry compose the enzymatically active dodecamer (approximately 10 6 Da). Each monomer of L30a OrnDC can be described in terms of five sequential folding domains. The amino-terminal domain, residues 1 to 107, consists of a five-stranded β-sheet termed the "wing" domain. Two wing domains of each dimer project inward towards the centre of the dodecamer and contribute to dodecamer stabilisation. Proteins containing this domain include the ornithine decarboxylase, the lysine decarboxylase and the biodegradative arginine decarboxylase.
