identifier: InterPro:IPR021531
label: "Type VI lipase adapter protein Tla3, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of Type VI lipase adapter protein Tla3, an adapter protein that targets and loads the Tle3 toxin onto the H2 type VI secretion system (H2-T6SS) machinery through an interaction with the TTR domain of VgrG2b and it seems specific for Tle3. This domain and its C-terminal ( ), are both required for the interaction with the toxin.
