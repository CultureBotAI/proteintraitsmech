label: "Domain of unknown function DUF7691"
definition: >-
  This entry represents a group of uncharacterised bacterial proteins. They share detectable similarity to proteins members of whose function is unknown. Their predicted structures resemble the structure of DNA mimic protein DMP12 but elaborated with additional α-helices.
