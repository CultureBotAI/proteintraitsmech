identifier: InterPro:IPR040652
label: "Cry35Ab1, HTH C-terminal domain"
definition: >-
  This is the C-terminal domain found in Bacillus subtilis YefC and Bacillus thuringiensis protein Cry35Ab1 (an insecticidal protein). The domain has three helices held in a hydrophobic core, the first two form a typical helix-loop-helix whilst the third helix is perpendicular. The domain is structurally homologous to BinB and proteins containing similar β-trefoil lectin-like domains. The domain is not required for insecticidal activity or for immuno-reactivity and its function is likely to be to bind to WCR brush border membrane vesicles.
