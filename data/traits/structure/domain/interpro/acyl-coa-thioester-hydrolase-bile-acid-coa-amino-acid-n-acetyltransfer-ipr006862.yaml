identifier: InterPro:IPR006862
label: "Acyl-CoA thioester hydrolase/bile acid-CoA amino acid N-acetyltransferase"
definition: >-
  This entry presents the N-termini of acyl-CoA thioester hydrolase and bile acid-CoA:amino acid N-acetyltransferase (BAAT). This region is not thought to contain the active site of either enzyme. Thioesterase isoforms have been identified in peroxisomes, cytoplasm and mitochondria, where they are thought to have distinct functions in lipid metabolism. For example, in peroxisomes, the hydrolase acts on bile-CoA esters.
