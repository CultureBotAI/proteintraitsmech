identifier: InterPro:IPR063889
label: "Q4D6Q6 domain"
definition: >-
  This domain is found in Q4D6Q6, a conserved kinetoplastid-specific protein from Trypanosoma cruzi that is essential for cell viability. Q4D6Q6 forms a propeller-like tetramer. The individual monomers fold into an α/β structure composed of a six-stranded antiparallel β-sheet with two helices packed on it. Some related proteins contain two tandem repeats of this domain which are predicted to pack in a similar way to the dimer in the tetrameric structure of Q4D6Q6. It is likely that these proteins assemble in dimeric structures similar to the Q4D6Q6 tetramer.
