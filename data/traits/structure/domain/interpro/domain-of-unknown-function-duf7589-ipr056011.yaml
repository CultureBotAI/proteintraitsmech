identifier: InterPro:IPR056011
label: "Domain of unknown function DUF7589"
definition: >-
  This domain is found in uncharacterised proteins mainly from plants. It is predicted to fold into a six-stranded β-barrel. Inserted in this barrel is an α-helix that packs on the barrel side and it is enriched with positively charged residues which may have a functional importance.
