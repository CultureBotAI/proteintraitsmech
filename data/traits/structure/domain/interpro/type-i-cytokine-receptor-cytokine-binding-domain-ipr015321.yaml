identifier: InterPro:IPR015321
label: "Type I cytokine receptor, cytokine-binding domain"
definition: >-
  The alpha chain of the interleukin-6 receptor (IL-6R-alpha) consists of a signal peptide, an extracellular region, a transmembrane domain, and a short cytoplasmic domain. The extracellular region is highly modular, consisting of three domains (D1, D2, and D3). The N-terminal domain D1 is characteristic of the Ig superfamily, and domains D2 and D3 are homologous to cytokine-binding domains (CBD) consisting of two fibronectin type III (FnIII) domains. This domain corresponds to the D2 domain in IL-6R-alpha and is also found in other members of the type I cytokine receptor family.
