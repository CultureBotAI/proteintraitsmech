identifier: InterPro:IPR046833
label: "ATPase of the ABC class, N-terminal"
definition: >-
  This is the N-terminal domain of various bacterial predicted ABC class ATPases which show sequence and structural similarities to the N-terminal domain of MRB1590 ( ) from kinetoplastids, a core protein of the multiprotein mitochondrial RNA binding complex 1 (MRB1) involved in kinetoplastid RNA (kRNA) editing. MRB1590 is a dimer and contains a central ABC ATPase fold ( ) between novel N- and C-terminal regions. The N-terminal domains combine and form a RNA-binding basic pore which involves an arginine patch that has been suggested to act as a chaperone to bind and stabilize ssRNA during kRNA editing processes. N-terminal MRB1590 shows structural similarity to chaperones.
