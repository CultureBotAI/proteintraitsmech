identifier: InterPro:IPR013607
label: "Phospholipase A2-like domain"
definition: >-
  This entry represents a domain that is likely to be a phospholipase A2-like enzyme. It is found in a variety of contexts across the tree of life. This domain can be found in the N-terminal region of the Parvovirus VP1 coat protein; its function is not known. Parvoviruses are some of the smallest viruses containing linear, non-segmented single-stranded DNA genomes, with an average genome size of 5000 nucleotides. Parvoviruses have been described that infect a wide range of invertebrates and vertebrates and are well known for causing enteric disease in mammals. Genomes contain two large ORFs: NS1 and VP1; other ORFs are found in some sub-types and different gene products can arise from splice variants and the use of different start codons.
