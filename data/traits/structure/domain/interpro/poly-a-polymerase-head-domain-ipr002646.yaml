identifier: InterPro:IPR002646
label: "Poly A polymerase, head domain"
definition: >-
  This group includes nucleic acid independent RNA polymerases, such as polynucleotide adenylyltransferase ( ), which adds the poly (A) tail to mRNA. This group also includes the tRNA nucleotidyltransferase that adds the CCA to the 3' of the tRNA ( ). CCA-adding enzymes add the sequence [cytidine(C)-cytidine-adenosine (A)]., one nucleotide at a time, onto the 3' end of tRNA, in a template-independent reaction. This Class II group is comprised mainly of eubacterial and eukaryotic enzymes and includes Bacillus stearothermophilus CCAase, Escherichia coli poly(A) polymerase I, human mitochondrial CCAase, and Saccharomyces cerevisiae CCAase (CCA1). CCA-adding enzymes have a single catalytic pocket, which recognizes both ATP and CTP substrates. This family belongs to the Pol beta-like NT superfamily. In the Pol beta-like NT superfamily, the majority of enzymes have two carboxylates, Dx[D/E], together with a third more distal carboxylate, which coordinate two divalent metal cations involved in a two-metal ion mechanism of nucleotide addition. These carboxylate residues are fairly well conserved in this family.
