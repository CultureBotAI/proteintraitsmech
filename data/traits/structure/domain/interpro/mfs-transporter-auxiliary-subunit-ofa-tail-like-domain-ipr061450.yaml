identifier: InterPro:IPR061450
label: "MFS transporter auxiliary subunit, OFA tail-like domain"
definition: >-
  This entry represents a domain that covers the whole length of the protein in a group of small, hydrophobic bacterial proteins that typically occur next to a much larger MFS (major facilitator superfamily) transporter. In some members of this group, this region occurs as a C-terminal extension domain to MFS transporters related to oxalate:formate antiporters (OFA).
