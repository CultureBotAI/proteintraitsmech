identifier: InterPro:IPR057570
label: "NOL9, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of human Polynucleotide 5'-hydroxyl-kinase NOL9 and similar proteins from eukaryotes. This domain is predicted to adopt an α-β configuration. NOL9 and its orthologue Gre3 are polynucleotide 5'-kinases involved in rRNA processing. NOL9 can phosphorylate single-stranded and double-stranded RNA and DNA substrates. Its kinase activity is required for the processing of the 32S precursor into 5.8S and 28S rRNAs, more specifically for the generation of the major 5.8S(S) form.
