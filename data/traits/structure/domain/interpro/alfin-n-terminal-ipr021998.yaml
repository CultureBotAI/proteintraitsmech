identifier: InterPro:IPR021998
label: Alfin, N-terminal
definition: >-
  This entry represents the N-terminal domain found in Alfin family members. The Alfin family includes PHD finger protein Alfin1 and Alfin1-like proteins. They contain a conserved N domain at the N terminus, a PHD finger domain with conserved C4HC3 residues at the C terminus and a variable V region between the two conserved domains. Alfin1 is a histone-binding component that specifically recognises H3 tails trimethylated on 'Lys-4' (H3K4me3), which marks transcription start sites of virtually all active genes. Alfin1-like proteins have been shown to play roles in root growth and abiotic stress response.
