identifier: InterPro:IPR047384
label: "Tudor domain-containing protein 9, Tudor domain"
definition: >-
  This entry represents the Tudor domain of TDRD9 ans similar proteins from chordates. TDRD9 is an ATP-dependent DEAD-like RNA helicase required during spermatogenesis. It is involved in the biosynthesis of PIWI-interacting RNAs (piRNAs). A recessive deleterious mutation mutation in TDRD9 causes non-obstructive azoospermia in infertile men. TDRD9 contains an N-terminal HrpA-like RNA helicase module and a Tudor domain.
