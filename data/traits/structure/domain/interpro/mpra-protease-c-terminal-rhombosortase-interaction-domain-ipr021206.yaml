identifier: InterPro:IPR021206
label: "MprA protease C-terminal rhombosortase-interaction domain"
definition: >-
  This entry describes the Ralstonia lineage variant of the GlyGly-CTERM domain ( ). This is a predicted target for protein sorting and cleavage by rhombosortase, a member of the family of rhomboid proteases. The domain occurs in MprA proteases, which are predicted to be serine proteases.
