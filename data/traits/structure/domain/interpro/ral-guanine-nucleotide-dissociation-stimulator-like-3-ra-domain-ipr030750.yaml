identifier: InterPro:IPR030750
label: "Ral guanine nucleotide dissociation stimulator-like 3, RA domain"
definition: >-
  RalGDS family members can act both as Ras effectors and as guanine nucleotide exchange factors (GEFs) for Ral. They act downstream of Ras and bind to the GTP-bound active form of Ras or Ras family members. They also promote the GDP to GTP exchange for Ral small GTPase, member of the Ras family. Due to their double action, the RalGDS proteins bridge Ras and Ral. RGL3 (RalGDS-like 3) belongs to the Ral GDP dissociation stimulator (RalGDS) family. RGL3 functions as an exchange factor for Ral and may serve as a downstream effector for both Rit and Ras. This entry represents the RA domain found at the C-terminal end of RGL3. It has a β-grasp ubiquitin-like fold.
