identifier: InterPro:IPR056532
label: "KIF21A/B, second helical domain"
definition: >-
  This domain is found towards the C-terminal of human Kinesin-like protein KIF21A/B and similar eukaryotic sequences. KIF21A is a processive microtubule plus-end directed motor protein involved in neuronal axon guidance. It is recruited by KANK1 to cortical microtubule stabilising complexes (CMSCs) at focal adhesions (FAs) rims where it promotes microtubule capture and stability. It controls microtubule polymerisation rate at axonal growth cones and suppresses microtubule growth without inducing microtubule disassembly once it reaches the cell cortex. Mutations in this protein are associated with ocular abnormalities. This domain, which is found associated to and , folds into two long α-helices. Klp12, the orthologue from C. elegans, is a microtubule-binding motor protein which has ATPase activity. It forms a complex with alpha and beta tubulins, and preferentially binds to the growing microtubule plus-end to stabilise it and detaches following ATP hydrolysis. It negatively regulates axonal length through inhibiting microtubule polymerisation at its plus-end.
