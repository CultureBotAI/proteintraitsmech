identifier: InterPro:IPR059000
label: "P-type ATPase, A domain"
definition: >-
  This entry represents the actuator (A) domain, and some transmembrane helices found in P-type ATPases. It contains the TGES-loop which is essential for the metal ion binding which results in tight association between the A and P (phosphorylation) domains. It does not contain the phosphorylation site. It is thought that the large movement of the actuator domain, which is transmitted to the transmembrane helices, is essential to the long distance coupling between formation/decomposition of the acyl phosphate in the cytoplasmic P-domain and the changes in the ion-binding sites buried deep in the membranous region. This domain has a modulatory effect on the phosphoenzyme processing steps through its nucleotide binding. P-ATPases (also known as E1-E2 ATPases) ( ) are found in bacteria and in a number of eukaryotic plasma membranes and organelles. P-ATPases function to transport a variety of different compounds, including ions and phospholipids, across a membrane using ATP hydrolysis for energy. There are many different classes of P-ATPases, which transport specific types of ion: H + , Na + , K + , Mg 2+ , Ca 2+ , Ag + and Ag 2+ , Zn 2+ , Co 2+ , Pb 2+ , Ni 2+ , Cd 2+ , Cu + and Cu 2+. P-ATPases can be composed of one or two polypeptides, and can usually assume two main conformations called E1 and E2. Transmembrane ATPases are membrane-bound enzyme complexes/ion transporters that use ATP hydrolysis to drive the transport of protons across a membrane. Some transmembrane ATPases also work in reverse, harnessing the energy from a proton gradient, using the flux of ions across the membrane via the ATPase proton channel to drive the synthesis of ATP.
