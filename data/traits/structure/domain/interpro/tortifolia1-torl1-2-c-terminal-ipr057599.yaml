identifier: InterPro:IPR057599
label: "TORTIFOLIA1/TORL1-2, C-terminal"
definition: >-
  This entry represents a domain found at the C-terminal of TORTIFOLIA1/SPIRAL2, TORTIFOLIA1-like protein 1/2 from Arabidopsis thaliana and related proteins. This domain may consist of TPRs. TORTIFOLIA1/SPIRAL2 and SPIRAL2-like (SP2L) from Arabidopsis regulate the orientation of cortical microtubules and the direction of organ growth. TORTIFOLIA1-like protein 1 (also known as SPIRAL2) may regulate katanin-based microtubule (MT) severing. During virus infection, it may stabilise MT crossovers to support the formation and intercellular spread of the viral RNA complexes.
