identifier: InterPro:IPR059656
label: YomN
definition: >-
  This entry represents the YomN protein. YomN is an uncharacterised protein originally identified in the SPbeta prophage of Bacillus subtilis. This domain is found in both bacterial and viral proteins, with representatives in Spbetavirus and other Caudoviricetes, as well as various bacterial species including Bacillales and Paenibacillus. The proteins are typically small, around 139 amino acids in length. The function of this domain remains to be determined.
