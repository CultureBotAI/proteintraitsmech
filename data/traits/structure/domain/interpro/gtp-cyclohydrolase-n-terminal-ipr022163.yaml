identifier: InterPro:IPR022163
label: "GTP cyclohydrolase N-terminal"
definition: >-
  This domain is found in bacteria and eukaryotes, and is approximately 190 amino acids in length. It is the N-terminal domain of GTP cyclohydrolase, the rate limiting enzyme in the synthesis of tetrahydrobiopterin.
