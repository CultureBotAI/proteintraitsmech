identifier: InterPro:IPR056876
label: "Mechanosensitive ion channel protein 2/3, C-terminal"
definition: >-
  This entry represents the C-terminal domain of Mechanosensitive ion channel proteins 2 and 3 from Arabidopsis and related plant sequences. These channels open in response to stretch forces in the membrane lipid bilayer and control plastid size, shape, and perhaps division during normal plant development by altering ion flux in response to changes in membrane tension. They act as a component of the chloroplast division machinery. These channels are closely related to MscS from bacteria.
