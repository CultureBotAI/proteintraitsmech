identifier: InterPro:IPR053899
label: "C5orf34-like, second domain"
definition: >-
  This entry represents a domain located C-terminal to in a family of eukaryotic proteins, including the human uncharacterised protein C5orf34, which has been reported to be correlated with an unfavorable prognosis of patients from a variety of human malignancies. This domain is predicted to show an α/β structure.
