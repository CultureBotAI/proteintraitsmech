label: "Citrate transporter-like domain"
definition: >-
  This domain is found in proteins belonging to the CitM transporter, NhaD Na+/H+ antiporter and Na+/sulfate symporter families, such as CitM from Bacillus subtilis, NhaD from Halomonas elongata and SLT1 from Chlamydomonas reinhardtii.
