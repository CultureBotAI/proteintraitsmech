identifier: InterPro:IPR046816
label: "MmeI-like, DNA-methyltransferase domain"
definition: >-
  Type IIL Restriction-Modification Enzyme MmeI is a large enzyme that integrates DNA recognition and methyltransferase and endonuclease activities within the same polypeptide. MmeI is composed of five domains. An N-terminal endonuclease domain (residues 1-155), connects to a DNA-methyltransferase domain (MTase, residues 301-320) via a multi-helical spacer (residues 156-300). These are followed by the target recognition domain (TRD, residues 621-825), and a final C-terminal helical bundle (residues 826-919). The DNA is embedded between the TRD and the MTase domain. The TRD makes contacts to the DNA bases primarily in the major groove, while the MTase domain makes several contacts to the DNA in the minor groove. This entry includes DNA methyltransferase A, a MmeI homologue that lacks endonuclease activity. This domain corresponds to the DNA-methyltransferase. Structurally, it consists of a twisted β-sheet flanked by α-helices on both sides.
