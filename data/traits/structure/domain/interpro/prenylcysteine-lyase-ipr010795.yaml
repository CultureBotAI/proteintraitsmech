identifier: InterPro:IPR010795
label: "Prenylcysteine lyase"
definition: >-
  This entry represents a conserved region found in a group of prenylcysteine lyases ( ) that are approximately 500 residues long. Prenylcysteine lyase is a FAD-dependent thioether oxidase that degrades a variety of prenylcysteines, producing free cysteine, an isoprenoid aldehyde and hydrogen peroxide as products of the reaction. It has been noted that this enzyme has considerable homology with ClP55, a 55kDa protein that is associated with chloride ion pumps.
