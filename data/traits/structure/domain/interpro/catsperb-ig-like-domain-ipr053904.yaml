identifier: InterPro:IPR053904
label: "CATSPERB, Ig-like domain"
definition: >-
  CATSPERB (Cation channel sperm-associated protein subunit beta) is an auxiliary subunit of the CatSper complex which is involved in sperm cell hyperactivation, a process needed for sperm motility which is essential late in the preparation of sperm for fertilisation. This is a multi-domain protein which consists of an N-terminal domain ( ), followed by a β-propeller ( ) that is also present in the other auxiliary subunits gamma, delta and epsilon. This entry represents the Ig-like domain of CATSPERB, which seals the top of the channel together with the Ig-like domains of the other auxiliary subunits.
