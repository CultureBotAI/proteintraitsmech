identifier: InterPro:IPR010432
label: RDD
definition: >-
  This domain contains three highly conserved amino acids: one arginine and two aspartates, hence the name of RDD domain. This region contains two predicted transmembrane regions. The arginine occurs at the N terminus of the first helix and the first aspartate occurs in the middle of this helix. In Halobacillus andaensis, RDD has been shown to function as a Na+(Li+, K+)/H+ antiporter.
