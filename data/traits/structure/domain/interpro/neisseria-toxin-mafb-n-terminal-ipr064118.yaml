identifier: InterPro:IPR064118
label: "Neisseria toxin MafB, N-terminal"
definition: >-
  This entry represents the N-terminal domain of MafB and related proteins. MafB constitutes a family of secreted toxins in pathogenic Neisseria species, probably involved in interbacterial competition. Genes immediately downstream of mafB encode a specific immunity protein (MafI). MafB proteins exhibit a signal peptide sequence, a N-terminal conserved domain and a C-terminal variable region. Toxic domains identified at the C terminus include , , , and . The genus Neisseria includes both commensal and pathogenic species. The pathogenic neisseriae are a small group of virulent bacteria that initiate infection at the human host mucosal membranes. Neisseria gonorrhoeae is passed through sexual transmission and can cause renal failure in extreme cases. The more extreme Neisseria meningitidis is a usually commensal nasopharynx microbe that causes meningococcemia and acute bacterial meningitis, especially in young children and teenagers.
