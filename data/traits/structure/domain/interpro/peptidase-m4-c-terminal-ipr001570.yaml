identifier: InterPro:IPR001570
label: Peptidase M4, C-terminal
definition: >-
  This entry represents a domain found in the C-terminal of the peptidase M4 family members. This group of metallopeptidases that belong to the MEROPS peptidase family M4 (thermolysin family, clan MA(E)). The protein fold of the peptidase domain of thermolysin (MEROPS identifier M04.001), is the type example for members of the clan MA. The thermolysin family is composed only of secreted eubacterial endopeptidases. The zinc-binding residues of thermolysin are H-142, H-146 and E-166, with E-143 acting as the catalytic residue. Thermolysin also contains four calcium-binding sites, which contribute to its unusual thermostability. The family also includes enzymes from a number of pathogens, including Legionella and Listeria, and the protein pseudolysin (MEROPS identifier M04.005), all with a substrate specificity for an aromatic residue in the P1' position. Three-dimensional structure analysis has shown that the enzymes undergo a hinge-bend motion during catalysis. Pseudolysin has a broader specificity, acting on large molecules such as elastin and collagen, possibly due to its wider active site cleft.
