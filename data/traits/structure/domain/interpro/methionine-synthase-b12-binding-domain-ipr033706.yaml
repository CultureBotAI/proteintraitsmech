identifier: InterPro:IPR033706
label: Methionine synthase, B12-binding domain
definition: >-
  This domain is the B12 binding domain of methionine synthase. Methionine synthase binds methylcobalamin (B12), which it uses as an intermediate methyl carrier from methyltetrahydrofolate (CH3H4folate) to homocysteine to yield tetrahydrofolate and L-methionine.
