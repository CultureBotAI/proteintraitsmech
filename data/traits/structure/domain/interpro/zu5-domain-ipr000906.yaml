identifier: InterPro:IPR000906
label: "ZU5 domain"
definition: >-
  The ZU5 domain is a domain of 90-110 residues present in zona occludens 1 (ZO-1) protein, in unc5-like netrin receptors and in ankyrins. The ZU5 domain is named after the mouse tight junction protein ZO-1 and the C. elegans uncoordinated protein 5 (unc-5) and related Unc5-like netrin receptors. ZU5 domains are found in eukaryotic proteins that in most cases contain a C-terminal death domain. Other domains which can be found N-terminal to a ZU5 domain are ankyrin repeats; Ig-like and TSP1 repeats; PDZ, SH3 and guanylate kinase; or leucine-rich repeats (LRR). The ZU5 domain can function as a spectrin-binding domain in ankyrins, and participates in induction of apoptosis and binding of melanoma-associated antigen D1 (MAGE-D1/NRAGE) in UNC5H1-3.
