identifier: InterPro:IPR059957
label: "Uncharacterized protein AF_1314, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised protein AF_1314 from Archaeoglobus fulgidus. The protein contains an N-terminal Rossmann-fold NAD(P)-binding domain, whilst this C-terminal domain is distinct from the nucleotide-binding region. This domain is also found in some bacteria. The specific function of this protein and its C-terminal domain remains to be determined.
