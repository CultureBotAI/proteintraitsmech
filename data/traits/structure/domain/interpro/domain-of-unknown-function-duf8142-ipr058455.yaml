identifier: InterPro:IPR058455
label: "Domain of unknown function DUF8142"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in the Halobacteria class. These proteins are predominantly found in various families within the Methanobacteriota phylum, including Haloferacaceae, Haloarculaceae, and Natrialbaceae. The proteins in this family are typically between 70 to 100 amino acids in length. They are predicted to be integral membrane proteins, often featuring two transmembrane helices. The reviewed protein from Haloferax volcanii ( ) is an example of this domain's occurrence.
