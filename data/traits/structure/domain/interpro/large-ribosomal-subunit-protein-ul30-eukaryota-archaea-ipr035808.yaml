identifier: InterPro:IPR035808
label: "Large ribosomal subunit protein uL30, eukaryota/archaea"
definition: >-
  This entry represents a structural domain of the large ribosomal subunit protein uL30 from eukaryotes and archaea (which are also known as L7 subunit) and the ribosome biogenesis protein RLP7 (ribosomal protein L7-like) from yeasts. RLP7 is required for the biogenesis of the 60S ribosomal subunit. Ribosomal protein uL30 is one of the proteins from the large ribosomal subunit. uL30 belongs to a family of ribosomal proteins which, on the basis of sequence similarities, groups bacteria and archaea L30, yeast mitochondrial L33, and Drosophila melanogaster, Dictyostelium discoideum (Slime mold), fungal and mammalian uL7 ribosomal proteins. uL30 from bacteria are small proteins of about 60 residues, those from archaea are proteins of about 150 residues, and eukaryotic L7 are proteins of about 250 to 270 residues.
