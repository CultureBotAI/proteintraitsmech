identifier: InterPro:IPR060490
label: "Heat shock protein 15, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of heat shock protein 15 (HSP15). This C-terminal domain follows the S4 RNA-binding domain ( ) and is predicted to have small helical segments with basic and acidic residue composition. The exact role of this C-terminal region in ribosomal subunit binding remains to be determined. HSP15 is involved in the recycling of free 50S ribosomal subunits that still carry a nascent chain. The protein binds RNA more specifically than DNA and binds with very high affinity to the free 50S ribosomal subunit but does not bind when it is part of the 70S ribosome. The protein functions as a monomer and is induced by heat shock.
