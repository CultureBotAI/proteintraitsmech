identifier: InterPro:IPR059881
label: "YkzS-like protein"
definition: >-
  This entry represents a family of small uncharacterised proteins found in Bacillus species. The prototype member YkzS from Bacillus subtilis strain 168 is a 64 amino acid protein of unknown function. This protein family appears to be conserved among Bacillus species but its biological role remains to be determined. The protein folds into a compact domain composed of a three stranded β sheet with two helices packed on one side. The domain shows weak structural similarity to the SepF protein involved in septum formation.
