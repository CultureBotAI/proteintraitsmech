identifier: InterPro:IPR053898
label: "Shieldin complex subunit 1, C-terminal domain"
definition: >-
  SHLD1, also known as RINN3, is a component of the shieldin complex, a vertebrate-specific protein complex which functions as a downstream effector in the 53BP1 pathway, that regulates NHEJ (non-homologous end joining). This entry represents a conserved helical domain found at the C-terminal of SHLD1.
