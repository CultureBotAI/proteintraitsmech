identifier: InterPro:IPR047793
label: "Cell wall-active antibiotic response protein LiaF, C-terminal domain"
definition: >-
  This entry represents the conserved C-terminal domain of LiaF (called VraT in Staphylococcus), an additional key component of the histidine kinase LiaS and response regulator LiaR system. The system responds to cell envelop stress in the Firmicutes, and plays a role in resistance to cell wall-targeting antibiotics.
