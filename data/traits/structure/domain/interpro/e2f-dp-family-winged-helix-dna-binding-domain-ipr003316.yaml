identifier: InterPro:IPR003316
label: "E2F/DP family, winged-helix DNA-binding domain"
definition: >-
  This entry represents the DNA-binding domain of the E2F and DP proteins, which have a fold related to the winged-helix DNA-binding motif. The mammalian transcription factor E2F plays an important role in regulating the expression of genes that are required for passage through the cell cycle. Multiple E2F family members have been identified that bind to DNA as heterodimers, interacting with proteins known as DP - the dimerisation partners.
