identifier: InterPro:IPR063471
label: "RADX, third OB domain"
definition: >-
  This entry represents the third OB domain found in a group of proteins that includes RPA-related protein RADX from animals, with the human member also known as CXorf57. High-throughput sequencing used to identify genes driving tumorigenesis in Avian leukosis virus (ALV)-induced B-cell lymphomas, showed CXorf57 as the 10th most frequently targeted common integration site by ALV. ALV induces B-cell lymphoma and other neoplasms in chickens by integrating within or near cancer genes and perturbing their expression. RADX is a replication factor A protein-like (RPA-like), single-stranded DNA binding protein recruited to replication forks to maintain genome stability. It also modulates stalled fork protection by antagonising RAD51. These proteins consist of four tandem OB fold domains.
