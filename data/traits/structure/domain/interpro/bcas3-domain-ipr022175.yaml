identifier: InterPro:IPR022175
label: "BCAS3 domain"
definition: >-
  This domain is found towards the C-terminal of BCAS3 and ATG18-like proteins from plants. In BCAS3, this domain seems to be important for PHAF1 interactions. This entry includes BCAS3 microtubule associated cell migration factor (BCAS3) from animals and AT18F/G/H from Arabidopsis. BCAS3 is a microtubule associated cell migration factor that has been linked to the development of breast cancer and angiogenesis. It forms a complex with PHAF1 and associates with the preautophagosomal structure during both non-selective and selective autophagy. AT18F/G/H are linked to autophagy.
