identifier: InterPro:IPR019307
label: RNA-binding protein AU-1/Ribonuclease E/G
definition: >-
  This entry represents ribonuclease E/G and RNA-binding protein AU-1. Ribonuclease E and ribonuclease G are related enzymes that cleave a wide variety of RNAs. RNA-binding protein AU-1 binds to RNA loop regions that are with AU-rich sequences.
