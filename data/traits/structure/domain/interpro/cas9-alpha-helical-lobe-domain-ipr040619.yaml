identifier: InterPro:IPR040619
label: "Cas9, alpha-helical lobe domain"
definition: >-
  This entry represents the second α-helical lobe domain (REC2) found in Cas9, a endonuclease that cleaves linear or circular dsDNA target complementary to the spacer. Cas9 adopts a bilobed architecture composed of a nuclease lobe containing juxtaposed RuvC and HNH nuclease domains and a variable α-helical lobe likely to be involved in nucleic acid binding. Amino acid residues located in both the nuclease and α-helical lobe clefts are highly conserved within type II-A Cas9 proteins.
