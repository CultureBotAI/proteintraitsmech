identifier: InterPro:IPR059078
label: "Nuclear transport factor 2-like domain, nematodes"
definition: >-
  This entry represents a domain from a set of uncharacterised proteins in nematodes found in species such as Caenorhabditis elegans. This domain is typically around 110-130 amino acids in length. This domain belongs to the NTF2-like superfamily, characterised by a partial β-barrel structure with α helices enclosing a solvent-accessible cavity. Members of this superfamily display remarkable sequence diversity and serve diverse functions, including both enzymatic and non-enzymatic roles often involving small molecule binding or modification.
