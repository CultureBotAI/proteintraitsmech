identifier: InterPro:IPR025287
label: "Wall-associated receptor kinase, galacturonan-binding domain"
definition: >-
  Wall-associated kinases (WAKs) are transmembrane proteins containing a cytoplasmic serine/threonine kinase domain and an extracellular domain in contact with the pectin fraction of the plant cell wall. The cysteine-rich galacturonan-binding domain is located near the N-terminal end of the extracellular domain and binds to the cell-wall pectins.
