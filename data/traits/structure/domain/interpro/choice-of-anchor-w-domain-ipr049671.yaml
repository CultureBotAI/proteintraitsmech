identifier: InterPro:IPR049671
label: "Choice-of-anchor W domain"
definition: >-
  This entry represents a domain found in a group of proteins, majority of which are PEP-CTERM proteins that are thought to be sorted to the cell surface in an exosortase-dependent process. Some members have a possible alternative anchoring sequence with a TWGxxK sequence motif near the C terminus. A few proteins, containing this domain, have additional domains and a C-terminal LPXTG (sortase-dependent) sorting signal, or other unusual C-terminal regions whose significance is not yet clear.
