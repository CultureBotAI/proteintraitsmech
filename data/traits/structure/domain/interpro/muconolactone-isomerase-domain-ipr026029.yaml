identifier: InterPro:IPR026029
label: "Muconolactone isomerase domain"
definition: >-
  This entry represents a domain that covers almost the entire length of muconolactone delta-isomerase - an enzyme that forms a homodecameric complex, which catalyses the third step in the catabolism of catechol to succinate- and acetyl-coa in the beta-ketoadipate pathway ( ). The domain is also found duplicated in some proteins.
