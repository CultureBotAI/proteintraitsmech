identifier: InterPro:IPR015345
label: "Cytokinin dehydrogenase 1, FAD/cytokinin binding domain"
definition: >-
  This domain adopts an α+β sandwich structure with an antiparallel β-sheet, in a ferredoxin-like fold. It is predominantly found in plant cytokinin dehydrogenase 1, where it is capable of binding both FAD and cytokinin substrates. The substrate displays a 'plug-into-socket' binding mode that seals the catalytic site and precisely positions the carbon atom undergoing oxidation in close contact with the reactive locus of the flavin.
