identifier: InterPro:IPR003251
label: Rubrerythrin, diiron-binding domain
definition: >-
  This entry represents the N-terminal diiron-binding domain of Rr, which has a has a ferritin-like fold. Rubrerythrin (Rr) is a fusion protein containing an N-terminal diiron-binding domain and a C-terminal domain homologous to rubredoxin. This protein has been related to the response to oxidative stress. The 3-D structure of Desulphovibrio vulgaris rubrerythrin has been solved. The structure reveals a tetramer of two-domain subunits. In each monomer, the N-terminal 146 residues form a four-α-helix bundle containing the diiron-oxo site (centre I), and the C-terminal 45 residues form a rubredoxin-like FeS4 domain.
