identifier: InterPro:IPR017601
label: "DGQHR-containing domain"
definition: >-
  This highly divergent, uncharacterised domain has several absolutely conserved residues, including a QR pair and FxxxN motif. Its most striking feature, however, is a near invariant pentapeptide motif DGQHR. While the function is unknown, members occur in contexts that suggest extensive lateral gene transfer (LGT), and several have been annotated as putative bacteriophage proteins.
