identifier: InterPro:IPR061508
label: "Histone H2A, histone fold"
definition: >-
  This entry represents the histone fold. Histone H2A is a small, highly conserved nuclear protein that, together with two molecules each of histones H2B, H3 and H4, forms the eukaryotic nucleosome core; the nucleosome octamer winds ~146 DNA base-pairs. In the mouse, histone H2A can be replaced by histone H2A-like 1.
