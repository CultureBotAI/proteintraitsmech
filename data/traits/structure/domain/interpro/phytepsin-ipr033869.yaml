identifier: InterPro:IPR033869
label: Phytepsin
definition: >-
  This entry represents a domain found in phytepsin, along with some other aspartic proteases. Phytepsin (MEROPS identifier A01.020), is a plant homologue of mammalian lysosomal pepsins, which resides in grains, roots, stems, leaves and flowers. Phytepsin may participate in metabolic turnover and in protein processing events. In addition, it is highly expressed in several plant tissues undergoing apoptosis. Phytepsin contains an internal region consisting of about 100 residues not present in animal or microbial pepsins. This region is thus called a plant-specific insert. The insert is highly similar to saponins, which are lysosomal sphingolipid-activating proteins in mammalian cells. The saponin-like domain may have a role in the vacuolar targeting of phytepsin. Phytepsin, like its animal counterparts, possesses a topology typical of all aspartic proteases. In Arabidopsis, there are two phytepsin genes, At1g11910 and At4g04460, but the proteins encoded by them have not been characterised.
