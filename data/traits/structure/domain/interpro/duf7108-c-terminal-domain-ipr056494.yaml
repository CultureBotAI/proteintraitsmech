identifier: InterPro:IPR056494
label: "DUF7108, C-terminal domain"
definition: >-
  This domain is found at the C-terminal end of the uncharacterised protein HVO_0731 from Haloferax volcanii ( ) and similar proteins from halobacteria. It is predicted to adopt an all-α structure. The function of this domain is unknown.
