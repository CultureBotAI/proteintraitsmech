identifier: InterPro:IPR004302
label: "Cellulose/chitin-binding protein, N-terminal"
definition: >-
  This domain is found in a variety of cellulose- and chitin-binding proteins. This domain is also found in baculoviral spheroidins and spindolins, and in bacterial GlcNAc-binding protein A (gbpA).
