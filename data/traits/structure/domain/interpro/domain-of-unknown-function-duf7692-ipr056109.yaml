identifier: InterPro:IPR056109
label: "Domain of unknown function DUF7692"
definition: >-
  This domain is found in a group of proteins from Halobacteria. It is predicted to adopt a structure that is reminiscent of ribbon-helix-helix fold. Members of this entry are likely to form dimers. They have a stretch of positively charged residues at the N terminus.
