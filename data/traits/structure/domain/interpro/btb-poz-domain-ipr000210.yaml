identifier: InterPro:IPR000210
label: "BTB/POZ domain"
definition: >-
  The BTB domain (Broad-Complex, Tramtrack and Bric a brac) is also known as the POZ domain (POxvirus and Zinc finger). It is a homodimerisation domain occurring at the N terminus of proteins containing multiple copies of either zinc fingers of the C2H2 type or Kelch repeats. Many BTB proteins are transcriptional regulators that are thought to act through the control of chromatin structure. The structure of the BTB domain of the promyelocytic leukaemia zinc finger (PLZF) protein has been determined by X-ray crystallography and reveals a tightly intertwined dimer with an extensive hydrophobic interface. A surface-exposed groove lined with conserved amino acids is formed at the dimer interface, suggesting a peptide-binding site.
