identifier: InterPro:IPR001322
label: "Lamin tail domain"
definition: >-
  Intermediate filaments (IFs) constitute a major structural element of metazoan cells. They build two distinct systems: one inside the nucleus attached to the inner membrane, and one that is cytoplasmic, which connects intercellular junctional complexes situated at the plasma membrane with the outer nuclear membrane. In both cases, their major function is assumed to be that of a mechanical stress absorber and an integrating device for the entire cytoskeleton. In the nucleus, the IF system is assembled from lamins, which together with an ever increasing number of associated transmembrane and chromatin-binding proteins constitute the nuclear lamina. Despite the large diversity among IF proteins, they all share a similar structural building plan, with a long central α-helical 'rod' domain that is flanked by non-α-helical N- and C-terminal end domains called 'head' and 'tail', respectively. Lamins exhibit a highly conserved globular C-terminal lamin-tail domain (LTD) which has the immunoglobulin (Ig) fold. Invertebrate cytoplasmic IFs share sequence similarity with nuclear lamins and also contain a C-terminal tail domain with homology to the LTD. Domains homologous to the LTD have been detected in several uncharacterised proteins from phylogenetically diverse bacteria and two archaea, Methanosarcina and Halobacterium. In several bacterial proteins, the LTD cooccurs with membrane-associated hydrolases of the metallo-beta-lactamase, synaptojanin, and calcineurin-like phosphoesterase superfamilies. In other secreted or periplasmic bacterial proteins, the LTDs are associated with oligosaccharide-binding domains or are present as multiple tandem repeats in a single protein. These associations suggest a potential role for the prokaryotic LTDs in tethering proteins to the membrane…
