identifier: InterPro:IPR056190
label: "NOMO, fifth transthyretin-like domain"
definition: >-
  This domain is found in NOMO family and related proteins. NOMO proteins are predicted to contain a tandem of twelve Transthyretin-like domains and this domain is the fifth in the tandem. NOMO family of proteins includes NOMO1, NOMO2, NOMO3. These proteins are components of the multi-pass translocon (MPT) complex that mediates insertion of multi-pass membrane proteins into the lipid bilayer of membranes. They play an important role in the protein topogenesis and cells lacking these components show reduced multipass protein stability. NOMO proteins are multidomain proteins.
