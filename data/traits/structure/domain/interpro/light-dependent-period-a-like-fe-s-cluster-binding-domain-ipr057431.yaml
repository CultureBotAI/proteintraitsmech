identifier: InterPro:IPR057431
label: "Light dependent period A-like, Fe-S cluster-binding domain"
definition: >-
  This entry represents the Fe-S cluster-binding domain of Light dependent period A (LpdA) from Synechococcus elongatus, which is inserted in the TIM barrel domain ( ). LpdA plays a role in controlling the redox state in cyanobacteria to modulate its circadian clock. This entry also includes uncharacterised sequences from plants and archaea including the dihydromethanopterin reductase from Methanocaldococcus jannaschii which is involved in the biosynthesis of tetrahydromethanopterin, a coenzyme used in methanogenesis.
