identifier: InterPro:IPR049936
label: "TopBP1, eighth BRCT domain"
definition: >-
  This entry corresponds to the eighth BRCT domain found in TopBP1. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this group. TopBP1, also known as DNA topoisomerase II-beta-binding protein 1, or DNA topoisomerase II-binding protein 1, functions in DNA replication and damage response, acting as a scaffold protein. It binds double-stranded DNA breaks and nicks as well as single-stranded DNA. It has been shown to activate the ATR-ATRIP complex. TopBP1 contains eight copies of BRCT domain which specifically recognise and bind phosphorylated proteins, bringing proteins together into functional combinations.
