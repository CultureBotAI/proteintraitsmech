identifier: InterPro:IPR061506
label: "MCM2, N-terminal"
definition: >-
  This entry represents the N-terminal region of MCM2 which acts a component of the MCM2-7 complex (MCM complex), the replicative helicase essential for 'once per cell cycle' DNA replication initiation and elongation in eukaryotic cells. It is a core component of CDC45-MCM-GINS (CMG) helicase, the molecular machine that unwinds template DNA during replication, and around which the replisome is built. This region is responsible for histone binding.
