identifier: InterPro:IPR048694
label: "CRISPR RNA silencing complex Cmr2 subunit, first helical domain"
definition: >-
  The prokaryotic CRISPR RNA-Cas protein (Cmr) complex provides protection against mobile genetic elements by cleaving foreign RNA. Its largest subunit is Cmr2. This protein shows a N-terminal HD (histidine-aspartate) domain, two RRM domains resembling adenylate cyclase and two α-helical domains. This entry represents the first α-helical domain, which is similar to the thumb of DNA polymerases.
