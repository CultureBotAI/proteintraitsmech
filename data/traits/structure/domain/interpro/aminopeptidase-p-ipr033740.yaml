identifier: InterPro:IPR033740
label: Aminopeptidase P
definition: >-
  This entry represents the catalytic domain of aminopeptidases P, which are members of peptidase subfamily M24B, including aminopeptidases P1 (MEROPS identifier M24.005) and P2 (M24.009), both of which are assigned to E.C. 3.4.11.9. The enzymes are also known as X-Pro aminopeptidases, proline aminopeptidases and aminoacylproline aminopeptidases. They catalyse release of any N-terminal amino acid, including proline, that is linked with proline, even from a dipeptide or tripeptide.
