identifier: InterPro:IPR017884
label: "SANT domain"
definition: >-
  The SANT domain is a motif of ~50 amino acids present in proteins involved in chromatin-remodelling and transcription regulation. This eukaryotic domain was identified in nuclear receptor co-repressors and named after switching-defective protein 3 (Swi3), adaptor 2 (Ada2), nuclear receptor co-repressor (N-CoR) and transcription factor (TF)IIIB. Although SANT domains show remarkable sequence and structural similarity to the DNA-binding helix-turn-helix (HTH) domain of the myb-like tandem repeat, their function is not DNA binding. Instead, SANT domains are protein-protein interaction modules and some can bind to histone tails (e.g. in Ada2 and SMRT). The SANT domain has been proposed to function as a histone-interaction module that couples histone-tail binding to enzyme catalysis for the remodelling of nucleosomes. SANT domains are found in combination with other domains, such as the SWIRM domain ( ), the ZZ-type zinc finger (see ), the C2H2-type zinc finger, the GATA-type zinc finger ( ), the MPN-domain and DEAH ATP-helicase domain.
