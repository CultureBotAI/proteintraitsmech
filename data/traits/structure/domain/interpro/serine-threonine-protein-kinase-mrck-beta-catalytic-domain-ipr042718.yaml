identifier: InterPro:IPR042718
label: "Serine/threonine-protein kinase MRCK beta, catalytic domain"
definition: >-
  STKs (serine/threonine-protein kinases) catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MRCK-beta (or MRCKB) is expressed ubiquitously in many tissues. MRCK is activated via interaction with the small GTPase Cdc42. MRCK/Cdc42 signalling mediates myosin-dependent cell motility. This entry includes the dimerization domain.
