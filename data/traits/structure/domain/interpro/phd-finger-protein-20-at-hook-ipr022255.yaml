identifier: InterPro:IPR022255
label: "PHD finger protein 20, AT hook"
definition: >-
  PHD finger protein 20 (PHF20) is a Methyllysine-binding protein, component of the MOF histone acetyltransferase protein complex. It consists of tandem Tudor domains at the N-terminal, an AT hook, a C2H2-type zinc finger, and a plant homeodomain (PHD) finger. PHF20L1 binds to monomethylated lysine 142 on DNA (cytosine-5) methyltransferase 1 (DNMT1). It has been shown to antagonize DNMT1 proteasomal degradation. This is the AT-hook domain found in PHD finger protein 20 (PHF20) and similar sequences from vertebrates.
