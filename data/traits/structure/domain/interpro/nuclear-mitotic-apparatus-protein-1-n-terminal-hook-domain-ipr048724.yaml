identifier: InterPro:IPR048724
label: "Nuclear mitotic apparatus protein 1, N-terminal hook domain"
definition: >-
  Mitotic progression is orchestrated by the microtubule-based motor dynein, which sustains all mitotic spindle functions. During cell division, cytoplasmic dynein acts with the high-molecular-weight complex dynactin and nuclear mitotic apparatus (NuMA) to organize and position the spindle. NuMA contains a hook domain contacting directly LIC1 and LIC2 chains through a conserved hydrophobic patch shared among other Hook adaptors. Hook adaptor proteins, including human Nuclear mitotic apparatus protein 1 (Numa1), share an N-terminal conserved globular hook domain (this entry), which folds as a variant of the helical calponin homology (CH) domain.
