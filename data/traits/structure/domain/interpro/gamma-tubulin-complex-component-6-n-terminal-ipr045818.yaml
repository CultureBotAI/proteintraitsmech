identifier: InterPro:IPR045818
label: "Gamma-tubulin complex component 6, N-terminal"
definition: >-
  This entry represents the most N-terminal α-helical domain of the Gamma-tubulin complex component 6 (GCP6). It has been shown that the N-terminal domains define the functional identity of gamma-tubulin complex proteins. Gamma-tubulin complex component 6 (GCP6) is indispensable for assembly of the gamma-tubulin complex and for microtubule nucleation. It is located at the centrioles and the pericentriolar material, being required for centriole formation and reduplication. GCP6 carries a large internal insertion phosphorylated by Plk4 and contains a domain of interaction with keratins.
