identifier: InterPro:IPR055397
label: "TraK, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain from TraK proteins. The TraK C-terminal domain is observed in constituent proteins of bacterial type IV secretion systems (T4SSs), which are key players in the dissemination of multi-drug resistance. This domain contributes to the formation of the outer-membrane core complex (OMCCF) of T4SS encoded by conjugative F plasmids. The structure of the TraK C-terminal domain shows a compact fold consisting of 4 β-strands and one α-helix. This domain interacts with other components of the OMCCF, including TraV and other TraK C-terminal domains. Within the structural unit of the OMCCF, TraK C-terminal domains assemble as dimers, with each domain flipped 180 degrees relative to the other. The TraK C-terminal dimer sits laterally on top of the TraK N-terminal dimer, contributing to the overall stability of the complex. An electrostatic interaction between specific residues within TraK subunits participates in the stabilisation of the TraK C-terminal dimer. TraK is known to be essential for pilus assembly but its exact role in this process is unknown.
