identifier: InterPro:IPR003675
label: "CAAX prenyl protease 2/Lysostaphin resistance protein A-like domain"
definition: >-
  This entry represents a domain found in CAAX prenyl protease 2 from Saccharomyces cerevisiae (RCE1), its human homologue, Lysostaphin resistance protein A from Staphylococcus aureus (LyrA), putative intramembrane proteases (IMPs), and similar sequences found in bacteria, eukaryotes and archaea. This domain shows an all-α configuration. Rce1 from S. cerevisiae is a type II CAAX prenyl protease that processes all farnesylated and geranylgeranylated CAAX proteins. It is an integral membrane endoprotease localized to the endoplasmic reticulum that mediates the cleavage of the carboxyl-terminal three amino acids from CaaX proteins. It is involved in processing the Ras family of small GTPases, the gamma-subunit of heterotrimeric GTPases, nuclear lamins, and protein kinases and phosphatases. Three residues of S. cerevisiae Rce1 -E156, H194 and H248- are critical for catalysis. The structure of Rce1 from the archaea Methanococcus (MmRce1) suggests that this group of proteins represents a novel IMP family, the glutamate IMPs.
