identifier: InterPro:IPR055067
label: "Alpha-amylase-like, C-terminal"
definition: >-
  This domain is found at the C-terminal end of Alpha-amylase from Thermotoga neapolitana (AmyB), which belongs to glycoside hydrolase family 13 (GH13) and liberates maltose from multiple substrates, including starch, amylopectin and glycogen. This domain shows an all-β structure.
