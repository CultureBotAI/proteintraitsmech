identifier: InterPro:IPR004013
label: "PHP domain"
definition: >-
  The PHP (Polymerase and Histidinol Phosphatase) domain has four conserved sequence motifs that contain invariant histidine and aspartate residues implicated in metal ion coordination. It is found in alpha-subunit of bacterial DNA polymerase III ( ) and family X DNA polymerases in addition to histidinol phosphatase ( ). As part of DNA polymerases, the PHP domain was suggested to hydrolyse pyrophosphate. This family is often associated with an N-terminal region . This domain has a distorted (α/β)7 barrel fold.
