identifier: InterPro:IPR059800
label: "G39P, C-terminal domain"
definition: >-
  G39P inhibits the initiation of DNA replication by blocking G40P replicative helicase. G39P has a bipartite stricture consisting of a folded N-terminal domain and an unfolded C-terminal domain (this entry). The C-terminal is essential for helicase interaction.
