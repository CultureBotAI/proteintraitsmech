identifier: InterPro:IPR014936
label: "Axin beta-catenin binding"
definition: >-
  Proteins in this entry are found on the scaffolding protein Axin which is a component of the beta-catenin destruction complex. It competes with the tumour suppressor adenomatous polyposis coli protein (APC) for binding to beta-catenin.
