identifier: InterPro:IPR063134
label: "DNA topoisomerase 4 subunit A, C-terminal domain, Bacteroidota"
definition: >-
  This entry represents a C-terminal domain of DNA topoisomerase 4 subunit A and related topoisomerases and gyrases from Bacteroidota. The domain adopts a four-bladed β-propeller structure. These proteins usually contain two copies of this domain. The domain is found primarily in Flavobacteriaceae, Weeksellaceae, Chitinophagaceae, Sphingobacteriaceae and Bacteroidales families within the Bacteroidota phylum. C-terminal domains of topoisomerases are involved in DNA binding and substrate recognition. The function of this domain remains to be determined.
