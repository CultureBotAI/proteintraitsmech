identifier: InterPro:IPR018850
label: "Mitochondrial escape protein 2, C-terminal"
definition: >-
  Mitochondrial escape protein 2 (also known as RNA12) plays a role in maintaining the mitochondrial genome and in controlling mtDNA escape. It is also involved in the regulation of mtDNA nucleotide structure and number. Additionally, this protein have a dispensable role in the early maturation of pre-rRNA. This domain is C-terminal to the RRM domain and includes a P-loop motif suggesting this domain may bind to NTP.
