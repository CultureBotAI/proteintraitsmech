identifier: InterPro:IPR058752
label: "RDRP, C-terminal head domain"
definition: >-
  This domain is found C-terminal in eukaryotic RDRP proteins. This domain folds into an array of α-helices, and it is known as the head. The head domain was proposed to interact with incoming template RNA, helping guide the RNA to the active site. RNA dependent RNA polymerases (RDRP) enzymes (RDRP; ) are involved in the amplification of regulatory microRNAs during post-transcriptional gene silencing; they are also required for transcriptional gene silencing. Double-stranded RNA has been shown to induce gene silencing in diverse eukaryotes by a variety of pathways. These enzymes also play a role in the RNA interference (RNAi) pathway, which is important for heterochromatin formation, accurate chromosome segregation, centromere cohesion, and telomere function during mitosis and meiosis. RDRP enzymes are highly conserved in most eukaryotes but are missing in archaea and bacteria. The core catalytic domain of RDRP enzymes is structurally similar to the beta' subunit of DNA-dependent RNA polymerases (DDRP); however, the other domains of DDRP show no similarity to those of RDRP.
