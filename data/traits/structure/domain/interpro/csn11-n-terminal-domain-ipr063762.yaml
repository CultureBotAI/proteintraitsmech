identifier: InterPro:IPR063762
label: "CSN11, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in CSN11 (PCI8) and related COP9 signalosome complex subunits from fungi. The function of this specific N-terminal domain remains to be determined. CSN11 is a component of the COP9 signalosome complex that regulates the ubiquitin conjugation pathway by mediating deneddylation of cullin subunits in SCF-type E3 ligase complexes. The complex is involved in regulation of the mating pheromone response and may also function in transcriptional and translational control. CSN11 interacts with eIF3 core complex subunits and localises to both cytoplasm and nucleus.
