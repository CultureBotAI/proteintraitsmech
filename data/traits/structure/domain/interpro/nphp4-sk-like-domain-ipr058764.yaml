identifier: InterPro:IPR058764
label: "NPHP4, SK-like domain"
definition: >-
  This entry represents a small-conductance potassium channel (SK) like domain in human Nephrocystin-4 (NPHP4) and related eukaryotic proteins. NPHP4 is involved in the organisation of apical junctions and the subapical actin network in multiciliated epithelial cells. It plays a crucial role in building functional cilia and is part of a proposed NPHP1-4-8 module. It is implicated in recruiting INT to the basal bodies of motile cilia, which interact with actin-modifying proteins such as DAAM1. Additionally, NPHP4 may regulate the canonical Wnt pathway and promote the Wnt-PCP pathway, influencing the expression and localisation of Dishevelled proteins. It also acts as a negative regulator of the Hippo pathway by interacting with LATS1, affecting the phosphorylation and localisation of WWTR1/TAZ.
