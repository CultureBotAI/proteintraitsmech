identifier: InterPro:IPR037918
label: "SNX2, PX domain"
definition: >-
  Sorting nexin-2 (SNX2) belongs to the sorting nexin family, which contains a conserved PX (phox homology) domain that is responsible for binding to specific phosphoinositides. SNX1 and SNX2 are orthologues of yeast Vps5, which is a component of retromer complex that is essential in endosome-to-Golgi retrograde transport. This entry represents the PX domain of SNX2.
