identifier: InterPro:IPR059713
label: "Uncharacterised protein YtsF, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of uncharacterised proteins found in Spiroplasma, Mycoplasma and Mesoplasma species. The prototype protein YtsF from Spiroplasma citri is located in the rpsB/tsf/x operon downstream of the elongation factor Ts gene. The protein is approximately 211 amino acids in length and contains a C-terminal PH-like domain. The N-terminal region appears to contain multiple transmembrane helices. The function of this protein family remains to be determined.
