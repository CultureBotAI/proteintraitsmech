identifier: InterPro:IPR034847
label: "hnRNP DL, RNA recognition motif 1"
definition: >-
  This entry represents the RNA recognition motif 1 (RRM1) of hnRNP DL (or hnRNP D-like, also known as JKTBP), which is a dual functional protein that possesses DNA- and RNA-binding properties. It has been implicated in mRNA biogenesis at the transcriptional and post-transcriptional levels. hnRNP DL binds single-stranded DNA (ssDNA) or double-stranded DNA (dsDNA) in a non-sequence-specific manner, and interacts with poly(G) and poly(A) tenaciously. It contains two putative two RNA recognition motifs (RRMs) and a glycine- and tyrosine-rich C terminus.
