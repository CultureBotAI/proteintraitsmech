identifier: InterPro:IPR030821
label: "Synergist-CTERM sorting domain"
definition: >-
  This entry represents a 27 residue domain containing features such as: 1) a short Gly/Ser-rich region that ends in an invariant Gly-Cys motif, 2) a highly hydrophobic probable transmembrane α helix with a nearly invariant Pro near the end, and 3) a cluster of basic residues (Arg, Lys), and then the end of the protein.
