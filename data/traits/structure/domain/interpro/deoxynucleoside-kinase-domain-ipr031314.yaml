identifier: InterPro:IPR031314
label: "Deoxynucleoside kinase domain"
definition: >-
  This entry represents a domain found in various deoxynucleoside kinases including cytidine ( ), guanosine ( ), adenosine ( ) and thymidine kinase ( ), which also phosphorylates deoxyuridine and deoxycytosine. These enzymes catalyse the production of deoxynucleotide 5'-monophosphate from a deoxynucleoside, using ATP and yielding ADP in the process. Proteins containing this domain also include the subunit 10 (also known as CI-42kD) of the mitochondrial membrane respiratory chain NADH dehydrogenase (Complex I). It is an accessory subunit that is believed not to be involved in catalysis.
