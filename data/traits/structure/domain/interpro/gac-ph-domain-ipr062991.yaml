label: "GAC, PH domain"
definition: >-
  This PH domain is found in the glideosome-associated connector (GAC) protein. This PH domain contains conserved lipid-binding residues, which are exposed to solvent , suggesting a role in membrane recognition/interactions. GAC is a giant armadillo-repeat protein, essential for parasite motility and conserved across Apicomplexa including from Toxoplasma gondii. It connects actin filaments to the plasma membrane via interactions with phosphatidic acid and membrane-spanning adhesins. GAC contains a PH domain represented by and ARM regions represented by .
