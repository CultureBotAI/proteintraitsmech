identifier: InterPro:IPR006633
label: "Carbohydrate-binding/sugar hydrolysis domain"
definition: >-
  The CASH domain is shared by many carbohydrate-binding proteins and sugar hydrolases. The CASH domain is characterised by internal repetitions of glycines and hydrophobic residues that correspond to the repetitive units of a predicted or observed right-handed β-helix structure of the pectate lyase superfamily. The basic structural unit of this family consists of three β-strands that form a single turn of the β-helix. Each turn contains ~20 amino acids, and is normally repeated between 7 and 11 times to form the elongated helix structure. The repeats show a low degree of sequence identity when compared with each other. The region of homology with the CASH domain corresponds to the core region of the β-helix, covering from the second to the sixth repeat.
