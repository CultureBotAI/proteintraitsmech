identifier: InterPro:IPR043919
label: "Domain of unknown function DUF5758"
definition: >-
  This is a domain of unknown function found in uncharacterised proteins from viruses and bacteria. Some members contain a pentapeptide repeat domain or a HEAT repeats domain at the N-terminal. This domain may adopt a structure consisting of eight anti-parallel β-strands, of which the first two are the longest (47 residues) and arranged in a twisted elongated β-sheet.
