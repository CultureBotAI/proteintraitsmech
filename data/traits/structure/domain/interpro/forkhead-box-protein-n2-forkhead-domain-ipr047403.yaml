identifier: InterPro:IPR047403
label: "Forkhead box protein N2, forkhead domain"
definition: >-
  This entry represents the forkhead (FH) domain of human FOXN2 and similar sequences from vertebrates. The FH domain is a winged helix DNA-binding domain. Forkhead box protein N4 (FOXN4) is a potential tumour suppressor that can facilitate replication fork reversal. It acts as a transcription factor that binds to the purine-rich region in human T-cell leukaemia virus long terminal repeat (HTLV-I LTR). It may be a potential therapeutic and radiosensitization target for lung cancer. FOXN2 has also been found to be down-regulated in breast cancer, where it regulates migration, invasion, and epithelial-mesenchymal transition. FOXN2 is part of a pathway in which long non-coding RNA WT1-AS inhibits cell aggressiveness in cervical cancer.
