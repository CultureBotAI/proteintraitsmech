identifier: InterPro:IPR014169
label: "Peptidoglycan-associated lipoprotein, C-terminal"
definition: >-
  This entry represents the C-terminal domain of peptidoglycan-associated lipoprotein (Pal or OprL) of the Tol-Pal system. The system appears to be involved both in the maintenance of outer membrane integrity and in the import of certain organic molecules as nutrients. Pal contains a hydrodrophobic lipoprotein signal sequence, a conserved N-terminal cleavage and modification site, a poorly conserved low-complexity region, together comprising about 65 amino acids, and a well-conserved C-terminal domain. The entry represents only the conserved C-terminal domain.
