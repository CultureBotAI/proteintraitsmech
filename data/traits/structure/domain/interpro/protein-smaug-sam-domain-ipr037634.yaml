identifier: InterPro:IPR037634
label: "Protein Smaug, SAM domain"
definition: >-
  Smaug participates in regulation of transcript stability and degradation. In Drosophila, Smaug is a translational repressor of the maternal mRNA of Nanos, a protein required for the formation of the anterior-posterior body axis. Repression depends on the protein Smaug binding to two Smaug recognition elements (SREs) in the nanos 3' UTR. The SAM domain interacts specifically with the Nanos mRNA regulatory regions. Moreover, Smaug is also involved in regulation of specific maternal transcripts degradation in Drosophila early embryo via recruitment of the CCR4/POP2/NOT deadenylase. This entry represents the SAM (sterile alpha motif) domain of Smaug, which is a C-terminal RNA binding domain. This domain interacts with stem-loop structures of mRNA.
