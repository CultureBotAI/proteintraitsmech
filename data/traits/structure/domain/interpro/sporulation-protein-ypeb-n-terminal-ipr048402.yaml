identifier: InterPro:IPR048402
label: "Sporulation protein YpeB, N-terminal"
definition: >-
  This is the N-terminal region of YpeB, a protein restricted to endospore-forming species in the Firmicutes lineage of bacteria, that have been found in all such species to date except Clostridium perfringens. YpeB and the spore-cortex-lytic enzyme SleB are required for normal germination. This protein is essential in stabilising SleB enzyme in Bacillus spores, and may regulate its activity during germination.
