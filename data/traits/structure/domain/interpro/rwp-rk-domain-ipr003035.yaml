identifier: InterPro:IPR003035
label: "RWP-RK domain"
definition: >-
  This domain is found in algal minus dominance proteins as well as plant proteins involved in nitrogen-controlled development. Proteins containing this domain include NIN-like proteins (NLPs) and RWP-RK domain proteins (RKDs). RWP-RK domain may serve in dimerisation and DNA binding.
