identifier: InterPro:IPR040957
label: "Anosmin-1, cysteine rich domain"
definition: >-
  This is the Cys-box (cysteine-rich) domain found on the N-terminal of anosmin-1 proteins. It is suggested that the Cys-box domain may resemble the cysteine-rich region of the insulin-like growth factor receptor.
