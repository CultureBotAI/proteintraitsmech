identifier: InterPro:IPR003725
label: "Molybdenum-binding protein ModE, N-terminal"
definition: >-
  This entry represents the N-terminal domain of the ModE protein. ModE is a molybdate-activated repressor of the molybdate transport operon in E. coli. It consists of the N-terminal domain represented by this entry and two tandem copies of mop-like domain, where Mop proteins are a family of 68-residue molybdenum-pterin binding proteins of Clostridium pasteurianum. Proteins containing this domain also includes a few archaeal proteins that lack Mop-like domains. PSI-BLAST analysis shows similarity to helix-turn-helix regulatory proteins. Molybdenum-dependent repression of transcription of the Escherichia coli modABCD operon, which encodes the high-affinity molybdate transporter, is mediated by the ModE protein. When molybdate or tungstate bind to ModE there is little change in its α-helical content, but a major change in the environment of tryptophan and tyrosine residues occurs. This is the N-terminal domain of molybdenum-binding proteins ModE, ModA, MopA and MopB. These proteins are involved in molybdenum transport. ModE acts both as a repressor and activator of the mod and moa operons, respectively, depending on the properties of the binding site.
