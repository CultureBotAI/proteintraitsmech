identifier: InterPro:IPR039573
label: NS2A-like
definition: >-
  This domain can be found in NS2A from Coronavirus and protein VP3 from Rotavirus A. This domain has a phosphoesterase module (2H) that could function in capping and processing of viral RNAs.
