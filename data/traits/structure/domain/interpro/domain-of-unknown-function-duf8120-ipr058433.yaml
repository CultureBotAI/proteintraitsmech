identifier: InterPro:IPR058433
label: "Domain of unknown function DUF8120"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins in halophilic archaea. The proteins are predominantly found in the Halobacteria class, including genera such as Halorubrum, Haloferax, and Halogeometricum. The domain is typically 60 to 70 amino acids in length. Proteins containing this domain contain two putative transmembrane helices.
