identifier: InterPro:IPR059869
label: "Y4lR, C-terminal helical domain"
definition: >-
  This entry represents the C-terminal helical domain of Y4lR, an uncharacterised protein from Sinorhizobium fredii. Y4lR is a 522 amino acid protein (gene NGR_a02600) located on the symbiotic plasmid pNGR234a. The protein is annotated as COG3318 in the eggNOG database. This domain is the fourth domain in the multi-domain protein and adopts a helical structure. The specific function of this domain remains to be determined.
