identifier: InterPro:IPR041069
label: "FeoB, cytosolic helical domain"
definition: >-
  FeoB is a G-protein coupled membrane protein essential for Fe(II) uptake in prokaryotes. In the structures, a canonical G-protein domain (G domain) is followed by a helical bundle domain (S-domain) which is represented by this entry.
