identifier: InterPro:IPR032599
label: "YcdB/YcdC, repeated domain"
definition: >-
  This entry represents a domain that is generally found in two copies in YcdB and YcdC from B. subtilis. These proteins are uncharacterised. The C-terminal half of this domain appears to show similarity at the sequence level to the PEPSY domain.
