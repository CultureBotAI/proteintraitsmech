identifier: InterPro:IPR035062
label: "Kic1p-like serine/threonine kinase, catalytic domain"
definition: >-
  This catalytic domain is found in Saccharomyces cerevisiae Kic1p (kinase that interacts with Cdc31p) and related proteins. Kic1p is required by budding yeast for cell integrity and morphogenesis. Kic1p interacts with Cdc31p, the yeast homologue of centrin, and phosphorylates substrates in a Cdc31p-dependent manner.
