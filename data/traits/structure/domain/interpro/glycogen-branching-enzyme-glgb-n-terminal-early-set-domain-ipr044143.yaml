identifier: InterPro:IPR044143
label: "Glycogen branching enzyme GlgB, N-terminal Early set domain"
definition: >-
  This entry represents the N-terminal Early set domain found in GlgB. GlgB is a glycogen branching enzyme responsible for the transfer of chains of approximately seven alpha-(1,4)-linked glucosyl residues to other similar chains (in new alpha-(1,6) linkages) in the biosynthesis of glycogen. The branching enzyme is responsible for the degree of alpha(1,6) branch linkages found in polysaccharides. This E or "early" set domains are associated with the catalytic domain of glycogen branching enzymes at the N-terminal end. The N-terminal domain of the 1,4 alpha glucan branching enzyme may be related to the immunoglobulin and/or fibronectin type III superfamilies. These domains are associated with different types of catalytic domains at either the N-terminal or C-terminal end and may be involved in homodimeric/tetrameric/dodecameric interactions.
