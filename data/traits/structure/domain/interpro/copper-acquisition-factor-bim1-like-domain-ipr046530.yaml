identifier: InterPro:IPR046530
label: "Copper acquisition factor BIM1-like domain"
definition: >-
  This domain is found in fungal proteins, including copper acquisition factor BIM1 from Cryptococcus neoformans, a cell surface-bound protein that functions in the copper-accumulation pathway shared by the CUF1-dependent copper transporter CTR1. BIM1 facilitates copper acquisition in the brain of mammalian hosts and acts as a copper-dependent virulence trait in fungal meningitis. This domain has a lytic polysaccharide monooxygenase-like (LPMO) fold, which are evolutionarily related but have diverged to a different biological function.
