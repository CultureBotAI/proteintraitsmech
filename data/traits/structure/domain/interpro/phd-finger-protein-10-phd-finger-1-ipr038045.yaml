identifier: InterPro:IPR038045
label: "PHD finger protein 10, PHD finger 1"
definition: >-
  PHD finger protein 10 (PHF10 or BAF45A) is a component of the npBAF complex, which remodels chromatin, a mechanism by which selected genes are transcriptionally activated or repressed. The npBAF and nBAF complexes are found in neural progenitor cells. The npBAF complex is composed of at least ARID1A/BAF250A or ARID1B/BAF250B, SMARCD1/BAF60A, SMARCD3/BAF60C, SMARCA2/BRM/BAF190B, SMARCA4/BRG1/BAF190A, SMARCB1/BAF47, SMARCC1/BAF155, SMARCE1/BAF57, SMARCC2/BAF170, PHF10/BAF45A, ACTL6A/BAF53A and actin. During development, as neural stem cells differentiate post-mitotic chromatin remodeling mechanism occurs, accompanied by a change in the composition of the npBAF complex to form the nBAF complex. The subunits ACTL6A/BAF53A and PHF10/BAF45A are exchanged for ACTL6B/BAF53B and DPF1/BAF45B or DPF3/BAF45C. The nBAF complex along with CREST plays a role regulating the activity of genes essential for dendrite growth. This entry represents the first PHD finger of PHF10.
