identifier: InterPro:IPR025133
label: "Poxvirus B22R protein N-terminal domain"
definition: >-
  This domain represents the highly conserved N-terminal region of poxvirus proteins from Fowlpox virus, Myxoma virus, Lumpy skin disease, Variola virus and other members of the Poxviridae family of double-stranded, no-RNA stage poxviruses.
