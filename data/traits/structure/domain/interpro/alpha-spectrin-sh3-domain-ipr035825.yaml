identifier: InterPro:IPR035825
label: "Alpha Spectrin, SH3 domain"
definition: >-
  Spectrin is a major structural component of the red blood cell membrane skeleton and is important in erythropoiesis and membrane biogenesis. It is a flexible, rope-like molecule composed of two subunits, alpha and beta, which consist of many spectrin-type repeats. Alpha and beta spectrin associate to form heterodimers and tetramers; spectrin tetramer formation is critical for red cell shape and deformability. Defects in alpha spectrin cause West syndrome with severe cerebral hypomyelination, spastic quadriplegia, and developmental delay. Alpha spectrin contains a middle SH3 domain and a C-terminal EF-hand binding motif in addition to multiple spectrin repeats. This entry includes the SH3 domain of spectrin.
