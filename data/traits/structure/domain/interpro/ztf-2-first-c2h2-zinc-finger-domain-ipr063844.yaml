identifier: InterPro:IPR063844
label: "ZTF-2, first C2H2 zinc finger domain"
definition: >-
  This entry represents the first C2H2-type zinc finger domain from ZTF-2, a zinc finger transcription factor from Caenorhabditis elegans. ZTF-2 functions as a transcriptional repressor that binds to the DNA consensus sequence 5'-[AT][CT]TTCC[AC][AG]-3' in promoter regions. The protein is expressed in pharyngeal epithelium and plays a role in pharynx morphogenesis.
