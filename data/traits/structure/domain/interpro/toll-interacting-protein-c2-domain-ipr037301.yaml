identifier: InterPro:IPR037301
label: "Toll-interacting protein, C2 domain"
definition: >-
  Tollip is a part of the Interleukin-1 receptor (IL-1R) signaling pathway. Tollip is proposed to link serine/threonine kinase IRAK to IL-1Rs as well as inhibiting phosphorylation of IRAK. The TOLLIP-dependent selective autophagy pathway plays an important role in clearance of cytotoxic polyQ proteins aggregates. There is a single C2 domain present in Tollip. C2 domains fold into an 8-standed β-sandwich that can adopt 2 structural arrangements, type I and type II, distinguished by a circular permutation involving their N- and C-terminal β strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances, including phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this, including RIM isoforms and some splice variants of piccolo/aczonin and intersectin, which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions.
