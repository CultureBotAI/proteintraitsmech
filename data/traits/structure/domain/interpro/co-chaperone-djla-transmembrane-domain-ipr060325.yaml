identifier: InterPro:IPR060325
label: "Co-chaperone DjlA, transmembrane domain"
definition: >-
  This entry represents the N-terminal transmembrane domain of co-chaperone protein DjlA and similar proteins from gammaproteobacteria. This domain contains two transmembrane helices with glycine zipper motifs that are involved in protein dimerisation. The transmembrane domain serves as the dimerisation domain and anchors the protein to the membrane. The specific function of this transmembrane domain is membrane localisation and homodimer formation. DjlA is a regulatory DnaK co-chaperone involved in the induction of the wcaABCDE operon for colanic acid polysaccharide capsule synthesis. The protein functions as a homodimer and is localised to the inner membrane as a single-pass type III membrane protein. DjlA interacts directly with DnaK and activates the RcsB/RcsC phosphotransfer signalling pathway.
