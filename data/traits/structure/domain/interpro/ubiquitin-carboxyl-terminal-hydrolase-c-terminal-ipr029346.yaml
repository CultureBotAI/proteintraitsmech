label: "Ubiquitin carboxyl-terminal hydrolase, C-terminal"
definition: >-
  This domain is found in the C-terminal of the ubiquitin carboxyl-terminal hydrolases (USPs). The structure from C-terminal USP7 revealed that it can positively regulate deubiquitinating activity.
