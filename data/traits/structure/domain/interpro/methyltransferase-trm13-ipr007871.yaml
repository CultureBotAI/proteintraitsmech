label: "Methyltransferase TRM13"
definition: >-
  This entry consists of eukaryotic and bacterial proteins that specifically methylates guanosine-4 in various tRNAs with a Gly(CCG), His or Pro signatures. The alignment contains some conserved cysteines and histidines that might form a zinc binding site.
