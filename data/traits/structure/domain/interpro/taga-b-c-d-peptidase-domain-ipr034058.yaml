identifier: InterPro:IPR034058
label: "TagA/B/C/D, peptidase domain"
definition: >-
  In Dictyostelium discoideum, unique members of the ABCB transporter subfamily, TagB and TagC, appear responsible for peptide signal export during development. These Tag proteins are required for cell differentiation in Dictyostelium and have the potential to carry out the processing and transport of peptide signals since they possess an N-terminal serine protease domain and a C-terminal transporter domain. Other family members include TagA, which is required for the specification of an initial population of prespore cells in which tagA is expressed. This entry represents the N-terminal serine protease domain, which is is part of a family of domains found in serine peptidases belonging to the MEROPS peptidase families S8 (subfamilies S8A (subtilisin) and S8B (kexin)) and S53 (sedolisin), both of which are members of clan SB. Peptidases S8 (or subtilases serine endo- and exo-peptidase clan) have an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure and are not homologous to trypsin. The stability of subtilases may be enhanced by calcium; some members have been shown to bind up to 4 ions via binding sites with different affinities. Some members of this clan contain disulfide bonds. These enzymes can be intra- and extracellular; some function at extreme temperatures and pH values.
