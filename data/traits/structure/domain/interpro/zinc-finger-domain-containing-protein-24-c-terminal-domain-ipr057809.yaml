identifier: InterPro:IPR057809
label: "Zinc finger domain-containing protein 24, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in ZCCHC24 protein and related eukaryotic proteins. It contains highly conserved histidine and cysteine residues in an unusual arrangement (HCCC) that are likely to coordinate zinc. Zinc finger domain-containing protein 24 (ZCCHC24) encodes a protein containing two zinc finger domains from the Znf-CCHC and Znf-3CxxC superfamilies. This protein contains a 3CxxC-type zinc finger ( ) next to the C-terminal domain ( ), these subdomains are represented by .
