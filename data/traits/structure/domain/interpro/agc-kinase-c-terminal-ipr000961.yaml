identifier: InterPro:IPR000961
label: AGC-kinase, C-terminal
definition: >-
  The AGC (cAMP-dependent, cGMP-dependent and protein kinase C) protein kinase family embraces a collection of protein kinases that display a high degree of sequence similarity within their respective kinase domains. AGC kinase proteins are characterised by three conserved phosphorylation sites that critically regulate their function. The first one is located in an activation loop in the centre of the kinase domain. The two other phosphorylation sites are located outside the kinase domain in a conserved region on its C-terminal side, the AGC-kinase C-terminal domain. These sites serves as phosphorylation-regulated switches to control both intra- and inter-molecular interactions. Without these priming phosphorylations, the kinases are catalytically inactive. Several structures of the AGC-kinase C-terminal domain have been solved. The first phosphorylation site is located in a turn motif, the second one at the end of the domain in an hydrophobic pocket. In PKB the phosphorylated hydrophobic motif engages a hydrophobic groove within the N-lobe of the kinase domain which orders α helices close to the active site. Protein phosphorylation, which plays a key role in most cellular activities, is a reversible process mediated by protein kinases and phosphoprotein phosphatases. Protein kinases catalyse the transfer of the gamma phosphate from nucleotide triphosphates (often ATP) to one or more amino acid residues in a protein substrate side chain, resulting in a conformational change affecting protein function. Phosphoprotein phosphatases catalyse the reverse process. Protein kinases fall into three broad classes, characterised with respect to substrate specificity: Serine/threonine-protein kinases Tyrosine-protein kinases Dual specificity protein kinases (e.g. MEK -phosphorylates…
