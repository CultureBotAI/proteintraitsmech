label: "Min27-like integrase, DNA-binding domain"
definition: >-
  This presumed domain is functionally uncharacterised. This domain family is found in bacteria and viruses, and is approximately 90 amino acids in length. The family is found in association with . It is likely that this domain acts to bind DNA.
