label: "Tag1-like, fifth Ig-like domain"
definition: >-
  This entry describes the fifth Ig-like domain in putative Tag1 and related fungal proteins. The proteins represented by this entry have more than three Ig-like domains. This domain shows homology to LEA-2 domains. This domain is found next to .
