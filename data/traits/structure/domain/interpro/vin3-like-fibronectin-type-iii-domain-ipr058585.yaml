identifier: InterPro:IPR058585
label: "VIN3-like, fibronectin type-III domain"
definition: >-
  This entry represents the fibronectin type-III domain in Protein Vernalisation Insensitive 3 from Arabidopsis thaliana (VIN3) and similar plant sequences including VIN3-like protein. This domain is predicted to contain a fibronectin type-III and is often found associated with . VIN3 plays a central role in vernalization by mediating the initial transcriptional repression of the homeotic gene FLC, a floral repressor, after a cold treatment.
