identifier: InterPro:IPR002466
label: "Adenosine deaminase/editase"
definition: >-
  Editase ( ) are enzymes that alter mRNA by catalyzing the site-selective deamination of adenosine residue into inosine residue. The editase domain contains the active site and binds three Zn atoms. Several editases share a common global arrangement of domains, from N to C terminus: two 'double-stranded RNA-specific adenosine deaminase' (DRADA) repeat domains, followed by three 'double-stranded RNA binding' (DsRBD) domains, followed by the editase domain. Other editases have a simplified domains structure with no DRADA_REP and possibly fewer DSRBD domains. Editase that deaminate cytidine are not detected by this signature.
