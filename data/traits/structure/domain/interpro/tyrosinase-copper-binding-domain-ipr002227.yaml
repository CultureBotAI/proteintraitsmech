identifier: InterPro:IPR002227
label: "Tyrosinase copper-binding domain"
definition: >-
  Tyrosinase ( ) is a copper monooxygenases that catalyses the hydroxylation of monophenols and the oxidation of o-diphenols to o-quinols. This enzyme, found in prokaryotes as well as in eukaryotes, is involved in the formation of pigments such as melanins and other polyphenolic compounds. Tyrosinase binds two copper ions (CuA and CuB). Each of the two copper ions has been shown to be bound by three conserved histidines residues. The regions around these copper-binding ligands are well conserved and also shared by some hemocyanins, which are copper-containing oxygen carriers from the hemolymph of many molluscs and arthropods. At least two proteins related to tyrosinase are known to exist in mammals, and include TRP-1 (TYRP1), which is responsible for the conversion of 5,6-dihydro-xyindole-2-carboxylic acid (DHICA) to indole-5,6-quinone-2-carboxylic acid; and TRP-2 (TYRP2), which is the melanogenic enzyme DOPAchrome tautomerase ( ) that catalyses the conversion of DOPAchrome to DHICA. TRP-2 differs from tyrosinases and TRP-1 in that it binds two zinc ions instead of copper. Other proteins that belong to this family are plant polyphenol oxidases (PPO) ( ), which catalyze the oxidation of mono- and o-diphenols to o-diquinones; and Caenorhabditis elegans hypothetical protein C02C2.1.
