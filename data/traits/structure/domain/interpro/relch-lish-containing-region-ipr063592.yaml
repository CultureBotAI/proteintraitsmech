identifier: InterPro:IPR063592
label: "RELCH, LisH-containing region"
definition: >-
  This entry represents a region of approximately 50 residues found in RELCH (RAB11-binding protein containing LisH, coiled-coil, and HEAT repeats) proteins. This region encompasses the LisH motif and is positioned between the N-terminal coiled-coil and a second coiled-coil region that precedes the HEAT repeats. RELCH is found in metazoans and plants, and functions in intracellular cholesterol transport from recycling endosomes to the trans-Golgi network. The RAB11-binding and OSBP-binding activities reside in separate C-terminal regions of the protein. The specific function of this region remains to be determined.
