identifier: InterPro:IPR063246
label: "DNA polymerase III delta prime, C-terminal, cyanobacteria"
definition: >-
  This entry represents a C-terminal domain of approximately 120 to 130 residues found exclusively in cyanobacterial DNA polymerase III delta prime subunit proteins. The domain follows an N-terminal DNA_pol3_delta2 domain ( ). The delta prime subunit is a component of the clamp loader complex that loads the beta sliding clamp onto DNA during replication. This C-terminal extension appears to be specific to cyanobacteria and is not found in other bacterial lineages. The specific function of this cyanobacterial C-terminal domain remains to be determined.
