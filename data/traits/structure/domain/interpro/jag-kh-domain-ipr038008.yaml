identifier: InterPro:IPR038008
label: "Jag, KH domain"
definition: >-
  This entry represents the KH domain found in proteins homologous to the Bacillus subtilis RNA-binding protein KhpB, also known as Jag and EloR, which is associated with SpoIIIJ and is necessary for the third stage of sporulation. It forms a complex with KhpA which binds to cellular RNA and controls its expression. It also plays a role in peptidoglycan (PG) homeostasis and cell length regulation. The KH domain is a β-α-α-β-β unit that folds into an α/β structure with a three stranded β-sheet interrupted by two contiguous helices. In general, the KH binds single-stranded RNA or DNA. It is found in a wide variety of proteins including ribosomal proteins, transcription factors and post-transcriptional modifiers of mRNA.
