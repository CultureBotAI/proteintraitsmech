label: "DDB_G0273701/DDB_G0273221, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain found in DDB_G0273701 and related proteins across eukaryotes and bacteria. The domain is found in an uncharacterised protein from Dictyostelium discoideum, where it exists as a duplicated gene in strains AX3 and AX4.
