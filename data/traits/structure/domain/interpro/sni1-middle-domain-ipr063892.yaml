identifier: InterPro:IPR063892
label: "SNI1, middle domain"
definition: >-
  This entry represents the middle domain of the SNI1 protein family. SNI1 (Suppressor of NPR1, Inducible 1) is a negative regulator of systemic acquired resistance found in plants. SNI1 functions as a transcriptional repressor that prevents expression of pathogenesis-related genes and is a component of the SMC5-SMC6 complex involved in DNA repair. While the complete protein has well-characterised roles in plant immunity and DNA damage responses, the specific function of this middle domain remains to be determined.
