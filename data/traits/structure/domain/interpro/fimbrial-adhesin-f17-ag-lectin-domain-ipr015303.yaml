identifier: InterPro:IPR015303
label: "Fimbrial adhesin F17-AG, lectin domain"
definition: >-
  This entry represents the carbohydrate-specific lectin domain found in bacterial fimbrial adhesins F17-G. It adopts a compact, elongated structure consisting of a β-sandwich with two major sheets: one consisting of five long strands in mixed orientations, and a front sheet with four antiparallel strands, forming an immunoglobin-like fold.
