identifier: InterPro:IPR026409
label: "Firmicu-CTERM protein-sorting domain"
definition: >-
  Proteins with this domain are most conserved in the C-terminal region, where the pattern of ending with a transmembrane domain resembles both the LPXTG (sortase target) and PEP-CTERM (exosortase target) domain structures. This C-terminal domain is found only in the Firmicutes, where its presence is sporadically distributed. However, members are found exclusively in the presence of an exosortase-like protein XrtG ( ), a putative glycosyltransferase ( ), and a 6-pyruvoyl tetrahydropterin synthase-related protein ( ).
