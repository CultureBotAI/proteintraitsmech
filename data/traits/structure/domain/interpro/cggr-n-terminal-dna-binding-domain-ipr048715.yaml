identifier: InterPro:IPR048715
label: "CggR, N-terminal DNA binding domain"
definition: >-
  The central glycolytic genes repressor (CggR) controls the transcription of the gapA operon encoding five key glycolytic enzymes in Bacillus subtilis. CggR recognises a unique DNA target sequence comprising two direct repeats and fructose-1,6-bisphosphate (FBP) is the inducer that negatively controls this interaction. This entry represents the N-terminal DNA-binding domain.
