identifier: InterPro:IPR048060
label: "Zinc finger and BTB domain-containing protein 11, BTB/POZ domain"
definition: >-
  This entry represents the BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 11 (ZBTB11), a transcriptional repressor of TP53. ZBTB11 is critical for basal and emergency granulopoiesis and regulates neutrophil development through its integrase-like zinc finger domain. Its variants have been associated to neuropsychiatric phenotypes in humans.
