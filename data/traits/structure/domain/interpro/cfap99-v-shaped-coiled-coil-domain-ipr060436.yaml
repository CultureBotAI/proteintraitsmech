identifier: InterPro:IPR060436
label: "CFAP99, V-shaped coiled-coil domain"
definition: >-
  This entry represents a large V-shaped coiled-coil domain found in CFAP99 (cilia- and flagella-associated protein 99) and similar proteins mainly found in animals. CFAP99 localises to cilia and flagella in motile ciliated cells. The full-length protein contains multiple coiled-coil regions that are predicted to form extended helical structures. The specific function of this domain remains to be determined.
