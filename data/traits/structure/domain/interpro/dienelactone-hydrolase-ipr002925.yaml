identifier: InterPro:IPR002925
label: Dienelactone hydrolase
definition: >-
  Dienelactone hydrolases play a crucial role in chlorocatechol degradation via the modified ortho cleavage pathway. Enzymes induced in 4-fluorobenzoate-utilizing bacteria have been classified into three groups on the basis of their specificity towards cis- and trans-dienelactone. Some proteins contain repeated small fragments of this domain (for example rat kan-1 protein).
