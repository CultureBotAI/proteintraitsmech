identifier: InterPro:IPR013847
label: POU domain
definition: >-
  POU proteins are eukaryotic transcription factors containing a bipartite DNA binding domain referred to as the POU domain. The acronym POU (pronounced 'pow') is derived from the names of three mammalian transcription factors, the pituitary-specific Pit-1, the octamer-binding proteins Oct-1 and Oct-2, and the neural Unc-86 from Caenorhabditis elegans. POU domain genes have been described in organisms as divergent as C. elegans, Drosophila, Xenopus, zebrafish and human but have not been yet identified in plants and fungi. The various members of the POU family have a wide variety of functions, all of which are related to the development of an organism.
