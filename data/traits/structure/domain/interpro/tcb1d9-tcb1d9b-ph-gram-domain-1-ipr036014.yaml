identifier: InterPro:IPR036014
label: "TCB1D9/TCB1D9B, PH-GRAM domain 1"
definition: >-
  TBC1D9 and TCB1D9B may act as GTPase-activating proteins for Rab family protein(s). TBC1D9 and TCB1D9B contain two N-terminal PH-GRAM domains and a C-terminal Rab-GTPase-TBC (Tre-2, BUB2p, and Cdc16p) domain. This entry represents the first repeat of the PH-GRAM domain. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold.
