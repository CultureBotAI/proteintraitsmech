identifier: InterPro:IPR059032
label: "DDX60-like, winged helix domain"
definition: >-
  This predicted winged helix domain (WHD) is found in the human probable ATP-dependent RNA helicase DDX60 and similar eukaryotic proteins. DDX60 positively regulates RIGI- and IFIH1/MDA5 -dependent type I interferon and interferon inducible gene expression in response to viral infection. It binds ssRNA, dsRNA and dsDNA.
