identifier: InterPro:IPR045267
label: "Cyclin-dependent kinase 11/PITSLRE, catalytic domain"
definition: >-
  This entry represents the catalytic domain found in a group of cyclin-dependent kinases, including CDK11A/B from humans, CDKG1 from Arabidopsis, Ppk23 from fission yeasts and PITSLRE from Drosophila melanogaster. CDK11 has three isoforms that show peculiar expression patterns: the largest, mid-sized, and smallest isoforms of CDK11 are designated as CDK11/p110, CDK11/p58, and CDK11/p46, respectively. CDK11/p58, included in this entry, is translated from the same mRNA as CDK11/p110 and is expressed only during G2 and M phases. CDK11/p58 facilitates M phase progression by promoting centrosome maturation and bipolar spindle formation. CDKG1 regulates pre-mRNA splicing of CALLOSE SYNTHASE5 (CalS5) and, therefore, pollen wall formation. It is also part of the CDKG1/CYCLINL complex is essential for synapsis and recombination during male meiosis.
