identifier: InterPro:IPR046857
label: "Gem-associated protein 6, Sm-like domain"
definition: >-
  This entry represents the N-terminal Sm-like domain from mammalian Gemin6 proteins. The exact function of Gemin6 is unknown but it has been found to form part of the SMN complex. The SMN complex plays a key role in the biogenesis of spliceosomal small nuclear ribonucleoproteins (snRNPs) and other ribonucleoprotein particles.
