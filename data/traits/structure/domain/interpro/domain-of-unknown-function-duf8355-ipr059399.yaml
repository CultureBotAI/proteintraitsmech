label: "Domain of unknown function DUF8355"
definition: >-
  This domain is found in uncharacterised proteins from proteobacteria. It is predicted to fold into a partly open β-barrel elaborated with α-helices. It is frequently found with , a domain typical for Type IV pilus biogenesis factor PilY1 homologues. It contains two highly conserved cysteine residues which are predicted to form disulfide bond.
