identifier: InterPro:IPR027358
label: "Kininogen-type cystatin domain"
definition: >-
  The cystatin superfamily consists of a large group of cystatin domain-containing proteins, most of which are reversible and tight-binding inhibitors of the papain (C1) and legumain (C13) families of cysteine proteases. Kininogens are multifunctional and multidomain glycoproteins related to cystatins. Kininogens ubiquitously exist in vertebrates, including mammals, birds, amphibians, and fishes. They vary extremely in both structure and function among different taxa of animals, in particular between mammals and amphibians. Kininogens contain a bradykinin domain and one (in lampreys), two (in fishes) or three (in mammals, birds, and amphibians) cystatin domain(s). Although mammalian kininogens harbour three cystatin domains only two of them are tight-binding inhibitors of cysteine cathepsins, which belong to the papain-like cysteine proteases. A Q-x-V-x-G motif is the canonical binding site for cysteine proteinases in mammals. This entry represents the kininogen-type cystatin domain.
