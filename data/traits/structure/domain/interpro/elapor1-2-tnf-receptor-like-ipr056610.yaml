identifier: InterPro:IPR056610
label: "Elapor1/2, TNF receptor-like"
definition: >-
  This domain is found in Endosome/lysosome-associated apoptosis and autophagy regulator family members 1/2 (Elapor1/2) and similar sequences predominantly found in vertebrates. This domain, which contain several conserved cysteines, is predicted to adopt a TNF-receptor (TNFR) fold. Human Elapor1, also known as EIG121 and KIAA1324, is a type I transmembrane protein induced by estrogen. It is associated with the endosome-lysosome compartments and may play an important role in autophagy and cell proliferation. Mouse Elapor2 (Eig121l) functions as a regulator of the BMP signalling pathway and may be involved in epidermal differentiation.
