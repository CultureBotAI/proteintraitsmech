identifier: InterPro:IPR060261
label: "YOL029C, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of the uncharacterised protein YOL029C from Saccharomyces cerevisiae. YOL029C interacts with the molecular chaperones HSP82 and HSC82. The function of this protein and its N-terminal domain remains to be determined. This domain is found next to a disordered region. It is also found towards the C-terminal in other uncharacterised proteins from ascomycetes.
