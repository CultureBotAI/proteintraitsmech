identifier: InterPro:IPR059782
label: "Transmembrane-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in putative transmembrane proteins and other uncharacterised proteins mostly found in Pseudomonadati. This domain is predicted to fold into a single transmembrane helix.
