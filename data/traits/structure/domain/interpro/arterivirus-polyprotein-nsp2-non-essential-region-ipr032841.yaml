identifier: InterPro:IPR032841
label: "Arterivirus polyprotein, nsp2, non-essential region"
definition: >-
  This non-essential region of the nsp2 subunit of the polyprotein of arterivirus, such as porcine arterivirus PRRSV and equine arterivirus EAV, may offer immunogenic surfaces to B-cells.
