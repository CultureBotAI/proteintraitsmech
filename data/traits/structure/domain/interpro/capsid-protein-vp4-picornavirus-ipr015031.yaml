label: "Capsid protein VP4, Picornavirus"
definition: >-
  This entry represents the VP4 coat protein found in Picornaviruses, small RNA-containing mammalian viruses such as Foot-and-mouth disease virus (FMDV), Mengo encephalomyocarditis virus and Theiler's murine encephalomyelitis virus (strain DA) (TMEV).
