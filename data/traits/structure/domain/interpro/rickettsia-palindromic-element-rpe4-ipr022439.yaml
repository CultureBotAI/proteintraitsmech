identifier: InterPro:IPR022439
label: "Rickettsia palindromic element RPE4"
definition: >-
  This entry represents Rickettsia palindromic element RPE4, a palindromic element found in several Rickettsial species. The elements spread within a genome as selfish genetic elements, inserting into genes creating additional coding regions that do not disrupt the reading frame.
