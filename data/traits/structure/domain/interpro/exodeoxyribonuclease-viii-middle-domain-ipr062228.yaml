identifier: InterPro:IPR062228
label: "Exodeoxyribonuclease VIII, middle domain"
definition: >-
  This entry represents the middle domain of exodeoxyribonuclease 8 (RecE). It is located between the N-terminal exonuclease VIII domain ( ) and the C-terminal DUF3799 domain ( ). RecE is a double-stranded DNA exonuclease that degrades DNA progressively in a 5' to 3' direction, releasing 5'-phosphomono- nucleotides. It is involved in the RecE pathway of recombination and is encoded in the Rac prophage. The family is restricted to Enterobacterales. The specific function of this middle domain remains to be determined.
