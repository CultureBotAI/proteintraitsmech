identifier: InterPro:IPR047363
label: "Hepatoma-derived growth factor, PWWP domain"
definition: >-
  This entry represents the PWWP domain of HDGF and similar sequences from vertebrates. This domain is necessary for DNA binding. Hepatoma-derived growth factor (HDGF) is a heparin-binding protein that acts as a transcriptional repressor with mitogenic activity for fibroblasts.
