identifier: InterPro:IPR059044
label: "Transmembrane 6 superfamily member 1/2, transmembrane domain"
definition: >-
  This domain is found at the N-terminal end of Transmembrane 6 superfamily member 1/2 (Tm6sf1/2) from mouse and similar proteins mainly found in vertebrates. Tm6sf1 may function as sterol isomerase. Tm6sf2 is a regulator of liver fat metabolism influencing triglyceride secretion and hepatic lipid droplet content that may function as sterol isomerase. The zebrafish member has been reported to be related to steatotic liver disease. This domain, which is often found associated with , is predicted to fold into a six α-helical bundle.
