identifier: InterPro:IPR008893
label: "WGR domain"
definition: >-
  This domain is named after the most conserved central motif of the domain. It is found in a variety of polyA polymerases as well as the Escherichia coli molybdate metabolism regulator and other proteins of unknown function. The domain is found in isolation in proteins such as and is between 70 and 90 residues in length. This domain participates in binding DNA near the 5' terminus and mediates domain-domain contacts essential for DNA-dependent activity.
