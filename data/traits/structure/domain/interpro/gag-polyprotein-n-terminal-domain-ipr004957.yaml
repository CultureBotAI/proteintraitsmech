identifier: InterPro:IPR004957
label: "Gag polyprotein, N-terminal domain"
definition: >-
  This is the conserved N-terminal domain of the Gag polyprotein from Foamyviruses (FVs) or Spuma-retroviruses. Gag is the major structural protein required for genome packaging virion assembly, trafficking and egress. This region corresponds to the Env-binding domain containing the cytoplasmic targeting and retention sequence (CTRS). The Gag polyprotein is a core viral polyprotein that undergoes specific enzymatic cleavages in vivo to yield the mature protein. It is involved in capsid formation and genome binding. Shortly after infection, interaction between incoming particle-associated Gag proteins and host dynein allows centrosomal targeting of the viral genome (associated to Gag), prior to nucleus translocation and integration into host genome.
