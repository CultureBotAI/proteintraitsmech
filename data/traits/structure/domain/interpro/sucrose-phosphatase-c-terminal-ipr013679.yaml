identifier: InterPro:IPR013679
label: Sucrose-phosphatase, C-terminal
definition: >-
  This is the sucrose-phosphatase (S6PP or SPP) C-terminal domain as found in plant sucrose phosphatases. These enzymes irreversibly catalyse the last step in sucrose synthesis following the formation of Sucrose-6-Phosphate via sucrose-phosphate synthase (SPS).
