identifier: InterPro:IPR054015
label: "ExsA-like, N-terminal regulatory domain"
definition: >-
  This entry represents the ExsA regulatory domain which mediates the ExsD binding. The structure of this domain closely resembles those of the regulatory domains of AraC and ToxT, having typical cupin-like fold. ExsA is an AraC-type transcriptional activator protein that is regulated through protein-protein interactions rather than small molecule ligands. Prior to infection, ExsA is inhibited through a direct interaction with the anti-activator ExsD. Upon host cell contact, this interaction is disrupted by the anti-antiactivator protein ExsC. This domain is also found in Virulence regulon transcriptional activator VirF which is the transcriptional activator of the Yersinia virulence regulon and in the Thermoregulatory protein LcrF which is the transcriptional activator of the thermally regulated virulent yopE gene.
