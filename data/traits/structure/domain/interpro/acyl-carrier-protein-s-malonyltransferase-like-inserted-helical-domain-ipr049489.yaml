identifier: InterPro:IPR049489
label: "[Acyl-carrier-protein] S-malonyltransferase-like, inserted helical domain"
definition: >-
  This domain is found in the C-terminal region of [Acyl-carrier-protein] S-malonyltransferase from Bacillus velezensis (FabD, ) and similar bacterial proteins. FabD, a marine polyunsaturated fatty acid (PUFA) synthase involved in difficidin A biosynthesis, is organised into two domains: anacetyl-transferase (AT) domain ( ) and an enoyl reductase (ER) domain that consists of a TIM-barrel domain ( ) and an inserted α-helical substrate-binding domain (this entry).
