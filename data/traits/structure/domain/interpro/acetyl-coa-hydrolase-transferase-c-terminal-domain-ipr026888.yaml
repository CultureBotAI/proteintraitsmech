identifier: InterPro:IPR026888
label: "Acetyl-CoA hydrolase/transferase, C-terminal domain"
definition: >-
  This entry represents an acetyl-CoA hydrolase/transferase C-terminal domain. This domain is found in several enzymes which take part in pathways involving acetyl-CoA, including acetyl-CoA hydrolase, succinyl-CoA:coenzyme A transferase (CAT1), propionyl-CoA:succinate CoA transferase, and 4-hydroxybutyrate coenzyme A transferase (CAT2).
