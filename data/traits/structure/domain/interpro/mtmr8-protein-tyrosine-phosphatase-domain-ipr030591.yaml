identifier: InterPro:IPR030591
label: "MTMR8, protein tyrosine phosphatase domain"
definition: >-
  Myotubularin-related protein 8 (MTMR8) is a catalytically active member of the myotubularin (MTM) family, which possess 3-phosphatase activity dephosphorylating phosphatidylinositol-3-phoshate [PI(3)P] and phosphatidylinositol-3,5-bisphosphate [PI(3,5)P]. MTMR8 dimerises with the catalytically inactive MTMR9. Complex formation increases its catalytic activity and alters the substrate specificity; the MTMR8/R9 complex prefers PI(3)P as a substrate and reduces cellular PtdIns(3)P levels. The MTMR8/R9 complex inhibits autophagy. In zebrafish, MTMR8 has been shown to cooperate with PI3K to regulate actin filament modeling, and vascular and muscle development. This entry represents the active Protein Tyrosine Phosphatase (PTP) domain of MTMR8. Its catalytic activity is inhibited by oxidation and is reversibly reactivated by reduction. The myotubularin family constitutes a large group of conserved proteins, with 14 members in humans consisting of myotubularin (MTM1) and 13 myotubularin-related proteins (MTMR1-MTMR13). Orthologues have been found throughout the eukaryotic kingdom, but not in bacteria. MTM1 dephosphorylates phosphatidylinositol 3-monophosphate (PI3P) to phosphatidylinositol and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2] to phosphatidylinositol 5-monophosphate (PI5P) [ , ,. The substrate phosphoinositides (PIs) are known to regulate traffic within the endosomal-lysosomal pathway. MTMR1, MTMR2, MTMR3, MTMR4, and MTMR6 have also been shown to utilise PI(3)P as a substrate, suggesting that this activity is intrinsic to all active family members. On the other hand, six of the MTM family members encode for catalytically inactive phosphatases. Inactive myotubularin phosphatases contain substitutions in the Cys and Arg residues of the Cys-X5-Arg motif. MTM pseu…
