identifier: InterPro:IPR063412
label: "AtMg00590, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of the uncharacterised mitochondrial cytochrome b-like protein AtMg00590 from plants. The full-length protein belongs to the cytochrome b family and is a multi- pass membrane protein localised to the mitochondrial membrane. The protein is encoded by the mitochondrial genome and may be involved in respiratory electron transport chain based on sequence similarity. A 270 kb stretch of the mitochondrial genome containing this gene is duplicated within the centromere of chromosome 2, and expression of both copies has been demonstrated. This C-terminal domain is found downstream of the transmembrane helices that characterise the cytochrome b-like proteins. While the complete protein is predicted to function in electron transport, the specific function of this C-terminal domain remains to be determined.
