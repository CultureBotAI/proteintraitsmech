identifier: InterPro:IPR062303
label: "Baseplate wedge protein gp7, Fn3-like domain"
definition: >-
  This entry represents a fibronectin type III-like domain found in the baseplate wedge protein gp7 of T4-like bacteriophages. This domain occurs twice within gp7, at approximately residues 105-200 and 526-627. The gp7 protein is an intermediate baseplate protein that forms a (gp6)2-gp7 heterotrimeric complex involved in sheath contraction and tail assembly. Six copies of gp7 are present in the assembled baseplate. The domain adopts an immunoglobulin-like fold. While the role of gp7 in triggering sheath contraction is established, the specific function of this domain remains to be determined.
