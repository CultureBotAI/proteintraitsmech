identifier: InterPro:IPR060386
label: "Sip5 domain"
definition: >-
  This entry represents a domain found towards the N-terminal in fungal Sip5 proteins. Sip5 plays a role in the regulation of SNF1 kinase. It may negatively regulate SNF1 kinase under glucose-limiting conditions, by promoting the interaction of the REG1/GLC7 phosphatase complex with the kinase. It interacts directly with the SNF1 kinase and the Reg1 component of the phosphatase complex. Sip5 also physically interacts with the N terminus of Std1, an accessory subunit of the SNF1 kinase protein complex, in the absence of glucose, which prevents aggregation of Std1 and keeps it bound to SNF1, the catalytic subunit.
