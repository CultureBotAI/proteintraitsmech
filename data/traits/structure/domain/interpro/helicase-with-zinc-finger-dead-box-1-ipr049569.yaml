identifier: InterPro:IPR049569
label: "Helicase with zinc finger, DEAD-box 1"
definition: >-
  This entry represents first DEAD-like helicase domain present in the Helicase with zinc finger (HELZ) family. HELZ acts as a helicase that plays a role in RNA metabolism during development. Their helicase core consists of two similar DEAD-like domains that resemble the fold of the recombination protein RecA. HELZ is a member of the family I class of RNA helicases of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding.
