identifier: InterPro:IPR048758
label: "Carbohydrate binding domain 30"
definition: >-
  This carbohydrate binding domain is found at the N-terminal of a Glycoside hydrolase family 9 (GH9) member from Acetivibrio thermocellus ( ). This protein consists of GH9 and GH44 as catalytic modules ( and , respectively), and a family 30 carbohydrate binding domain (CBM30), represented in this entry, which displays affinity for beta-1,4-glucopolymers and plays a pivotal role in the function of of GH9, a typical processive endoglucanase. This domain adopts a β-sandwich fold with two five-stranded β-sheets. This domain is also found in the Exo beta-1,2-glucooligosaccharide sophorohydrolase (non-reducing end) which catalyses the hydrolysis of linear beta-1,2-glucan and beta-1,2-glucooligosaccharides with degrees of polymerization (DPs) greater than or equal to 4, to produce sophorose. The best substrates for this enzyme are tetra- and pentasaccharides. It acts as an exo-type enzyme that releases sophorose from the non-reducing end of the substrate. It cannot hydrolyze cyclic beta-1,2-glucans.
