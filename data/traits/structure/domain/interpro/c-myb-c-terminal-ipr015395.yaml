identifier: InterPro:IPR015395
label: "C-myb, C-terminal"
definition: >-
  This entry represents the C-terminal domain of the proto-oncogene c-myb and the viral transforming protein myb. Truncation of the domain results in 'activation' of c-myb and subsequent tumourigenesis.
