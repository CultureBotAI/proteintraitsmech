identifier: InterPro:IPR062147
label: "Uncharacterised protein HI_1492-like"
definition: >-
  This entry represents an uncharacterised domain found in Haemophilus influenzae (HI_1492) and related bacteria within Gammaproteobacteria. The protein contains a predicted signal peptide. The function of this protein remains to be determined.
