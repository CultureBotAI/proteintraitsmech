identifier: InterPro:IPR060699
label: "RNA-binding protein 48, helix domain"
definition: >-
  This entry represents the single helix domain of RNA-binding protein 48 (RBM48), located adjacent to the N-terminal RRM domain. RBM48 is a component of the minor spliceosome involved in the splicing of U12-type introns in pre-mRNAs. The protein interacts with ARMC7 and PRPF8 within the spliceosomal complex. RBM48 contains an RRM domain at its N-terminal region and shows alternative splicing. The protein belongs to the RBM48 family and is found across vertebrates. In the structure of human minor spliceosome ( ), this domain is involved in interaction with the ARMC7. The RBM48-ARMC7 complex binds the γ-monomethyl phosphate cap of the guanine nucleotide at the 5' end of U6atac snRNA through extensive interactions.
