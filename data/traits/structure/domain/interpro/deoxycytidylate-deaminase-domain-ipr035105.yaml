identifier: InterPro:IPR035105
label: "Deoxycytidylate deaminase domain"
definition: >-
  This entry represents a domain found in a group of deoxycytidylate deaminases. Deoxycytidylate deaminase ( ) (dCMP deaminase) hydrolyzes deoxycytidylate mono phosphate (dCMP) into deoxyuridine mono phosphate (dUMP), thus providing the nucleotide substrate for thymidylate synthase. The enzyme requires zinc for catalytic activity which is regulated by the ratio of dCTP to dTTP, both the end products of the pyrimidine salvage pathway. It contains a cytidine and deoxycytidylate deaminase domain. This domain can also be found in cytidine and dCMP deaminase domain-containing protein 1 (CDADC1), which may play an important role in testicular development and spermatogenesis.
