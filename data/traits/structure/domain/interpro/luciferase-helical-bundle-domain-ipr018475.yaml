identifier: InterPro:IPR018475
label: "Luciferase, helical bundle domain"
definition: >-
  This domain is found associated with the the catalytic domain of dinoflagellate luciferase. Luciferase is involved in catalysing the light emitting reaction in bioluminescence. This domain has a three helix bundle structure that holds four important histidines that are thought to play a role in the pH regulation of the enzyme.
