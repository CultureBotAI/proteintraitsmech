identifier: InterPro:IPR063403
label: "GMI1, 4th immunoglobulin-like domain"
definition: >-
  This entry represents the fourth immunoglobulin-like domain found in GMI1 and related proteins in plants. GMI1 is a structural maintenance of chromosomes flexible hinge domain-containing protein that contributes to DNA double-strand break repair via somatic homologous recombination. The protein functions downstream of ATM and is induced by DNA-damaging agents such as mitomycin C, bleocin and gamma-irradiation. GMI1 localises to the nucleus and is highly expressed in reproductive tissues. While the full-length GMI1 protein is involved in homologous recombination, the specific function of this immunoglobulin-like domain remains to be determined.
