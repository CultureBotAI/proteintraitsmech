identifier: InterPro:IPR005559
label: "CG-1 DNA-binding domain"
definition: >-
  CG-1 domains are highly conserved domains of about 130 amino-acid residues containing a predicted bipartite nuclear localisation signal. They are named after a partial cDNA clone isolated from parsley encoding a sequence-specific DNA-binding protein. CG-1 domains are found in CAMTA proteins (for CAlModulin -binding Transcription Activator), which are transcription factors containing a calmodulin-binding domain and ankyrin repeats.
