identifier: InterPro:IPR012289
label: Lytic transglycosylase, superhelical linker
definition: >-
  Bacterial lytic transglycosylases degrade murein via cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid and N-acetylglucosamine, with the concomitant formation of a 1,6-anhydrobond in the muramic acid residue. There are both soluble (Slt enzymes) and membrane-bound (Mlt enzymes) lytic transglycosylases that differ in size, sequence, activity, specificity and location. The multi-domain structure of the 70 Kd soluble lytic transglycosylase Slt70 is known. Slt70 has 3 distinct domains, each rich in α helices: an N-terminal superhelical U-shaped domain, a superhelical linker domain (L-domain, ), and a C-terminal catalytic domain ( ). Both the U-and L-domain share a similar superhelical structure. These two domains are connected, and together form a closed ring with a large central hole; the catalytic domain is packed on top of, and interacts with, this ring. The catalytic domain has a lysosome-like fold. This entry represents the superhelical linker domain (also called the L domain), which contains two small and four large α helices, the latter forming a four-α-helical bundle with a double-layer, superhelical topology that is similar to that found in the U-shaped domain.
