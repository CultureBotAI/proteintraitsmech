identifier: InterPro:IPR010525
label: Auxin response factor domain
definition: >-
  This entry represents the C-terminal conserved domain of auxin-responsive transcription factors. The plant hormone auxin (indole-3-acetic acid) can regulate the gene expression of several families, including Aux/IAA, GH3 and SAUR families. Two related families of proteins, Aux/IAA proteins ( ) and the auxin response factors (ARF), are key regulators of auxin-modulated gene expression. There are multiple ARF proteins, some of which activate, while others repress transcription. ARF proteins bind to auxin-responsive cis-acting promoter elements (AuxREs) using an N-terminal DNA-binding domain. It is thought that Aux/IAA proteins activate transcription by modifying ARF activity through the C-terminal protein-protein interaction domains found in both Aux/IAA and ARF proteins.
