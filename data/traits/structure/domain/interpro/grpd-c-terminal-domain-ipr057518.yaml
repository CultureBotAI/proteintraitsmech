identifier: InterPro:IPR057518
label: "GRPD, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain in GRDP1 and GRDP2 proteins. It has a Tubby C-terminal domain-like fold, with a β-barrel packed around a central α-helix. The β-barrels contain 10 or 12 strands. Glycine-rich domain-containing proteins (GRDPs) play a regulatory role in abscisic acid (ABA) signalling and tolerance to abiotic stress during germination. They may be involved in the regulation of the ABI transcriptional factors and in the development of stress responses.
