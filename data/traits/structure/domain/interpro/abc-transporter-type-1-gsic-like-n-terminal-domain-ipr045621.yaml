identifier: InterPro:IPR045621
label: "ABC transporter type 1, GsiC-like, N-terminal domain"
definition: >-
  This entry represents the N-terminal transmembrane domain found in a group of ABC transporters type 1, members of the Binding-protein-dependent transport system from bacteria, including Glutathione transport system permease protein (GsiC) from Escherichia coli K12, the Dipeptide transport system permease protein (DppB) from Lactococcus lactis strain MG1363, responsible for the translocation of the substrate across the membrane.
