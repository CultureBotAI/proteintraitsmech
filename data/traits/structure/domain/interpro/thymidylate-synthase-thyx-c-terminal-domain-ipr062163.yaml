identifier: InterPro:IPR062163
label: "Thymidylate synthase ThyX, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of flavin-dependent thymidylate synthase (ThyX, EC 2.1.1.148) found in spirochetes. The domain is approximately 30-40 residues long. ThyX catalyses the reductive methylation of dUMP to dTMP using methylenetetrahydrofolate as the methyl donor and NADPH and FAD as reductants. The enzyme functions as a homotetramer with each FAD-binding site formed by three monomers. The specific function of this C-terminal domain remains to be determined.
