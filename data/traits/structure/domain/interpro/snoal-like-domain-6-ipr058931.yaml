identifier: InterPro:IPR058931
label: "SnoaL-like domain 6"
definition: >-
  This entry represents a domain from a family of uncharacterised proteins from ascomycetes. Proteins containing this domain are typically around 180-200 amino acids in length. This domain belongs to the NTF2-like superfamily, characterised by a partial β-barrel structure with α helices enclosing a solvent-accessible cavity.
