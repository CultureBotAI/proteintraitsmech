identifier: InterPro:IPR045233
label: Mannose-1-phosphate guanyltransferase, N-terminal domain
definition: >-
  This entry represents the N-terminal domain of mannose-1-phosphate guanyltransferase. Mannose-1-phosphate guanyltransferase (Mpg1 or GMPPB) catalyses the formation of GDP-mannose, an essential precursor of glycan moieties of glycoproteins and glycolipids. It contains an N-terminal catalytic domain and a C-terminal Lefthanded-β-Helix fold domain. In fission yeasts Mpg1 is required for proper septum structure and is involved cell cycle progression through cell-size checkpoint. In budding yeasts Psa1 plays an important part in maintenance of cell-wall integrity.
