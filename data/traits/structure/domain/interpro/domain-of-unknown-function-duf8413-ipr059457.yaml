identifier: InterPro:IPR059457
label: "Domain of unknown function DUF8413"
definition: >-
  This entry represents a small extracellular three helical bundle domain found at the N terminus of proteins that contain a C-terminal integral membrane domain. This suggests these proteins are involved in sporulation. This domain is found in Pseudomonadati and Bacillati.
