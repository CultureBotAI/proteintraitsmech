identifier: InterPro:IPR041144
label: "Stomatal closure-related actin-binding protein, PH domain"
definition: >-
  This entry is a PH domain found on plant-specific actin-binding proteins or SCABs. SCAB proteins bind, bundle and stabilise actin filaments and regulate stomatal movement. The Ig-PH fusion domain is at the C terminus. This domain adopts the PH fold, of seven β-strands,β7-β13 and two α-helices, α1 and α2 arranged into a β-barrel. The canonical phosphoinositide-binding pocket of the classic PH domain is degenerate in this fused one, and the charge on the pocket suggest that the Ig-PH domain contains a non-canonical binding site for inositol phosphates.
