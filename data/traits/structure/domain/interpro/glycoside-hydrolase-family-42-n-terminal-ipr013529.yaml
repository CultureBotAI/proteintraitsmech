identifier: InterPro:IPR013529
label: Glycoside hydrolase, family 42, N-terminal
definition: >-
  O-Glycosyl hydrolases ( ) are a widespread group of enzymes that hydrolyse the glycosidic bond between two or more carbohydrates, or between a carbohydrate and a non-carbohydrate moiety. A classification system for glycosyl hydrolases, based on sequence similarity, has led to the definition of 85 different families. This classification is available on the CAZy (CArbohydrate-Active EnZymes) website. This group of beta-galactosidase enzymes ( ) belong to the glycosyl hydrolase 42 family . The enzyme catalyses the hydrolysis of terminal, non-reducing terminal beta-D-galactosidase residues.
