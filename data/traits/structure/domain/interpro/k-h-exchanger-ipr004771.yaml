identifier: InterPro:IPR004771
label: K+/H+ exchanger
definition: >-
  The monovalent Cation:Proton antiporter-2 (CPA2) family acts as a K+/H+ exchangers that facilitate potassium-efflux, possibly by potassium-proton antiport. This family includes KefB and KefC transporters, which are part of a glutathione-gated K(+) efflux system in Escherichia coli. The activity of the KefB and KefC potassium channels protects E. coli cells against methylglyoxal and limits the amount of DNA damage.
