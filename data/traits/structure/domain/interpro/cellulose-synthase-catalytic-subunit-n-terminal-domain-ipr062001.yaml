identifier: InterPro:IPR062001
label: "Cellulose synthase catalytic subunit, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain of cellulose synthase catalytic subunit (BcsA), found in bacteria. BcsA polymerises uridine 5'-diphosphate glucose to cellulose, which is produced as an extracellular component. The enzyme is activated by bis-(3'-5') cyclic diguanylic acid (c-di-GMP). The protein is a multi-pass membrane protein localised to the cell inner membrane.
