identifier: InterPro:IPR053821
label: "Splicing regulator SDE2, ubiquitin domain"
definition: >-
  This entry represents the ubiquitin-fold domain found at the N-terminal of human SDE2 (Splicing regulator SDE2, also known as silencing defective 2) and similar proteins from vertebrates. SDE2 in a splicing regulator that supports splicing of selected pre-mRNAs in an intron-specific manner.
