identifier: InterPro:IPR063454
label: "ARB_06334, Peptidase M6-like domain"
definition: >-
  This entry represents a domain found in putative metallopeptidases from fungi (Ascomycota) and bacteria (Actinomycetota). Proteins containing this domain are typically secreted and belong to the M6 or M10B peptidase families. This domain is found C-terminal to the Peptidase_M6 domain ( ) and may occur in multiple copies within a single protein.
