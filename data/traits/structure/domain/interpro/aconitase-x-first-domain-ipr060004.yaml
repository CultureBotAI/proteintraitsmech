identifier: InterPro:IPR060004
label: "Aconitase X, first domain"
definition: >-
  This entry represents the first domain of aconitase X (AcnX, also known as Phosphomevalonate dehydratase large subunit), which corresponds to domain 2 in the canonical four-domain architecture of the aconitase superfamily. This domain contains a central parallel β-sheet linked by α-helices, similar to nucleotide-binding domains of dehydrogenases. The AcnX subfamily includes bacterial Type I enzymes that function as cis-3-hydroxy-L-proline dehydratases and archaeal Type II enzymes that act as mevalonate 5-phosphate dehydratases. Unlike other aconitase family members that contain [4Fe-4S] clusters, AcnX enzymes utilise [2Fe-2S] or [3Fe-4S] clusters for catalysis. This domain forms part of the active site architecture but does not directly coordinate the iron-sulphur cluster.
