identifier: InterPro:IPR002791
label: "Damage-control phosphatase ARMT1-like, metal-binding domain"
definition: >-
  This domain is found in Damage-control phosphatases ARMT1, YMR027W from S. cerevisiae ( ) and At2g17340 from Arabidopsis thaliana, and it is also found at the C-terminal portion of eukaryotic pantothenate kinases. Despite the characterization of ARMT1 as a carboxyl methyltransferase, a second study suggests that these proteins are hydrolases whose function is to limit potentially harmful buildups of phosphometabolites. They are metal-dependent phosphatases involved in metabolic damage-control processes termed "damage pre-emption" or "housecleaning". Crystal structure of damage-control phosphatase At2g17340 revealed a novel protein fold and several conserved residues coordinating a metal ion (probably Mg2) with high degree of conservation suggesting that the metal-binding site is central for the function of this domain.
