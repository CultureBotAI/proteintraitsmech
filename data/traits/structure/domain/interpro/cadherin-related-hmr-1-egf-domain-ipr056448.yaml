identifier: InterPro:IPR056448
label: "Cadherin-related hmr-1, EGF domain"
definition: >-
  This domain is found towards the C-terminal of Cadherin-related hmr-1 from Caenorhabditis elegans and related nematode sequences, a calcium-dependent cell adhesion protein required for adherens junction assembly and connecting adherens junctions to the cytoskeleton.
