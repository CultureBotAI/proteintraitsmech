identifier: InterPro:IPR063676
label: "TRAPPC10/Trs130, NTS-like domain"
definition: >-
  This entry represents a TPR domain found in TRAPPC10 from animals and its homologues from plants, Trs130. This domain is the analogue of from yeast. These proteins are subunits of the TRAPP II complex and function in late Golgi trafficking as a membrane tether.
