identifier: InterPro:IPR057652
label: "RDM1, DSRM domain"
definition: >-
  This entry represents a domain found in the human RDM1 (RAD52 Motif Containing 1) and related proteins. RDM1 is a protein involved in cellular responses to DNA damage and stress. It can bind to RNA, single-stranded DNA (ssDNA), and double-stranded DNA (dsDNA). RDM1 plays a role in the cellular response to cisplatin, a chemotherapy drug that causes DNA damage. RDM1 is also involved in the heat-shock response and proteotoxic stress. This protein plays an oncogenic role in human lung adenocarcinoma cells. Its expression is significantly increased in lung tumors, and correlates with the clinical outcomes. RDM1 is a multidomain protein containing an N-terminal RRM domain and a C-terminal (this entry) DSRM domain.
