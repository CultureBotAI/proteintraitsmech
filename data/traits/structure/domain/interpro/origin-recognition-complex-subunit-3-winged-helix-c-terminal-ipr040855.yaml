label: "Origin recognition complex subunit 3, winged helix C-terminal"
definition: >-
  This is the C-terminal winged-helix (WH) DNA-binding domain of the origin recognition complex subunit 3 present in Drosophila melanogaster. The WH domain is responsible for recognizing origin sequences.
