identifier: InterPro:IPR041887
label: "Receptor-type tyrosine-protein phosphatase, carbonic anhydrase domain"
definition: >-
  Carbonic anhydrases are zinc-containing enzymes that catalyze the reversible hydration of carbon dioxide in a two-step mechanism. Carbonic anhydrase related proteins (CARPs) are sequence similar to carbonic anhydrases, but they have lost conserved histidines involved in zinc binding and consequently their catalytic activity. This entry represents a carbonic anhydrase-related domain found in tyrosine phosphatase receptors type gamma (Ptprg) and type zeta (Ptprz), which mediate cell adhesion and signaling during development. Ptprg is a regulator of spinal cord neurogenesis. Ptprz negatively regulates oligodendrocyte differentiation and myelination.
