identifier: InterPro:IPR049162
label: "Glycosyl hydrolase family 59, C-terminal lectin domain"
definition: >-
  This domain is found at the C-terminal end of a group of glycosyl hydrolase family 59 (GH59) members from animals and bacteria, including Galactocerebrosidase from Mus musculus (GALCERase) ( ). GH59 comprises enzymes with only one known activity: galactocerebrosidase ( ). GALCERase is responsible for the lysosomal catabolism of galactosylceramide, a major lipid in myelin, kidney and epithelial cells of small intestine and colon. This protein is organised into three domains, all of them contributing residues to the substrate-binding pocket. This entry represents the lectin domain, which is not present in other lysosomal enzymes, is likely to be be involved in processes that are not found in related enzymes. Mutations in this domain lead to Krabbe disease.
