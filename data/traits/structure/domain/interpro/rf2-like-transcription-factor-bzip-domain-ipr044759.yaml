identifier: InterPro:IPR044759
label: "RF2-like transcription factor, bZIP domain"
definition: >-
  This is the bZIP domain found in plant transcription factors with similarity to Oryza sativa RF2a and RF2b, which are important for plant development. RF2a and b interact, as homodimers or heterodimers, with each other, and activate transcription from the RTBV (rice tungro bacilliform virus) promoter, which is regulated by sequence-specific DNA-binding proteins that bind to the essential cis element BoxII. They show differences in binding affinities to BoxII, expression patterns in different rice organs, and subcellular localisation. Transgenic rice with increased RF2a and RF2b display increased resistance to rice tungro disease (RTD) with no impact on plant development. bZIP domains from Arabidopsis have been classified into 11 groups (groups A-I and S), the ones included in this entry belong to group I such as VIP1 or PosF21 (also known as bZIP transcription factor 59). bZIP factors act in networks of homo and heterodimers in the regulation of a diverse set of cellular processes. The bZIP structural motif contains a basic region and a leucine zipper, composed of α helices with leucine residues 7 amino acids apart, which stabilize dimerization with a parallel leucine zipper domain. Dimerization of leucine zippers creates a pair of the adjacent basic regions that bind DNA and undergo conformational change. Dimerization occurs in a specific and predictable manner resulting in hundreds of dimers having unique effects on transcription.
