identifier: InterPro:IPR033727
label: "LIM3 prickle"
definition: >-
  Prickle has been implicated in regulation of cell movement in the planar cell polarity (PCP) pathway, which requires the conserved Frizzled/Dishevelled (Dsh). Prickle interacts with Dishevelled, thereby modulating the activity of Frizzled/Dishevelled and the PCP signalling. Two forms of prickle have been identified, namely prickle 1 and prickle 2. These are differentially expressed; prickle 1 is found in fetal heart and haematological malignancies, while prickle 2 is expressed in fetal brain, adult cartilage, pancreatic islet, and some types of tumorous cells. Prickle contains an N-terminal PET domain and three C-terminal LIM domains. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. This entry represents the third LIM domain of prickle.
