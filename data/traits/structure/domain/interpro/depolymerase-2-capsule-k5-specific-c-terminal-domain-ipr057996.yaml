identifier: InterPro:IPR057996
label: "Depolymerase 2 capsule K5-specific, C-terminal domain"
definition: >-
  This entry represents the C-terminal β-sandwich domain found in bacteriophage-encoded depolymerase 2, capsule K5-specific (K52). This domain is found in phages with dual host specificity, where each phage encodes two different capsule depolymerases with specificity for different capsular types. This domain is C-terminal to a pectin lyase-like fold ( ) with enzymatic activity that cleaves bacterial capsular polysaccharides into oligosaccharides. Depolymerase 2 and related proteins target bacterial capsular polysaccharides. They may function as receptor binding proteins (RBP) and could mediate the attachment to the host capsular exopolysaccharides. They display a depolymerase activity that specifically degrades the K5-type polysaccharides of the Klebsiella pneumoniae capsule, which allows the phage to reach the host cell membrane and bind the entry receptor. These enzymes are often components of phage tail spikes or tail fibres and enable phages to attach to and degrade bacterial capsules, particularly in Klebsiella species.
