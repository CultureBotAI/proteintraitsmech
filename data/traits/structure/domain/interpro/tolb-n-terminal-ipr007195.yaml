identifier: InterPro:IPR007195
label: "TolB, N-terminal"
definition: >-
  TolB is a periplasmic protein from Escherichia coli that is part of the Tol-dependent translocation system involving group A and E colicins that is used to penetrate and kill cells. TolB has two domains, an α-helical N-terminal domain that shares structural similarity with the C-terminal domain of transfer RNA ligases, and a β-propeller C-terminal domain ( ) that shares structural similarity with numerous members of the prolyl oligopeptidase family and, to a lesser extent, to class B metallo-beta-lactamases. The N-terminal domain is essential for Tol function and colicin toxicity.
