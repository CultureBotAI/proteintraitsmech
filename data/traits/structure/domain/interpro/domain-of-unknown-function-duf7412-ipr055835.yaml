identifier: InterPro:IPR055835
label: "Domain of unknown function DUF7412"
definition: >-
  This entry represents an uncharacterised protein family found in a range of bacteriophage including Phage T2. These proteins include a β-barrel domain. Many members of the family are annotated as IP4 internal head protein, although the source of evidence for this annotation was not found.
