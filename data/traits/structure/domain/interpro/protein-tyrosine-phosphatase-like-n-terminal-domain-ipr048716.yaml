identifier: InterPro:IPR048716
label: "Protein-tyrosine-phosphatase-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of a group of bacterial phosphatases and arsenate reductases, including Protein-tyrosine- phosphatase from Corynebacterium glutamicum. This domain, often found associated to , forms a three-helical bundle that interacts with the active site of the other chain in the dimeric interface.
