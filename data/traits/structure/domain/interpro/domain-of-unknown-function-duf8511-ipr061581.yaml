identifier: InterPro:IPR061581
label: "Domain of unknown function DUF8511"
definition: >-
  This entry represents the second domain found in uncharacterised proteins from spirochaetes, predominantly from Treponema species. The domain adopts a long α-helical hairpin structure and is approximately 110 residues in length. This domain is found between an N-terminal domain ( ) and a C-terminal domain ( ) in proteins exclusive to spirochaetes. The function of this domain remains to be determined.
