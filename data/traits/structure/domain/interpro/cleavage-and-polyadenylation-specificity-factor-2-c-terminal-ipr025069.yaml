identifier: InterPro:IPR025069
label: "Cleavage and polyadenylation specificity factor 2, C-terminal"
definition: >-
  This domain lies at the C terminus of many fungal and plant cleavage and polyadenylation specificity factor subunit 2 proteins. The exact function of the domain is not known, but is likely to function as a binding domain for the protein within the overall CPSF complex.
