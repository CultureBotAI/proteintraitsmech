identifier: InterPro:IPR034187
label: "PQP1-like peptidase domain"
definition: >-
  This domain is found predominantly in fungal members of the peptidase family S8 (subtilisin), including ProQSP1 protease 1 from Cryptococcus neoformans (PQP1), which cleaves the quorum sensing peptide QSP1 precursor to produce the 11 amino acid mature QSP1 peptide. These proteins contain an additional domain inserted within the subtilisin domain known as a PA (protease-associated) domain. The subtilisin family is one of the largest serine peptidase families characterised to date. Over 200 subtilisins are presently known, more than 170 of which have their complete amino acid sequence. It is widespread, being found in eubacteria, archaebacteria, eukaryotes and viruses. The vast majority of the family are endopeptidases, although there is an exopeptidase, tripeptidyl peptidase. Structures have been determined for several members of the subtilisin family: they exploit the same catalytic triad as the chymotrypsins, although the residues occur in a different order (HDS in chymotrypsin and DHS in subtilisin), but the structures show no other similarity. Some subtilisins are mosaic proteins, while others contain N- and C-terminal extensions that show no sequence similarity to any other known protein.
