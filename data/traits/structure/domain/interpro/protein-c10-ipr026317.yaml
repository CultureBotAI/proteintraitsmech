identifier: InterPro:IPR026317
label: "Protein C10"
definition: >-
  This entry represents a domain covering the complete structure of Protein C10 (Grcc10) found in metazoa. Mutations in this protein are implicated in the pathogenesis of colobomatous microphthalmia. In brain, this protein may be required for corpus callosum development. This domain contains an helical structure and can also be found covering the N-terminal in putative Protein C10 from plants.
