identifier: InterPro:IPR057106
label: "NXPE, C-terminal"
definition: >-
  This domain is found at the C-terminal of NXPE and similar proteins, mainly from animals. This domain is predicted to adopt an α/β structure with similarity to hydrolase domains. Neurexophilins (NXPE) are secreted neuropeptide-like glycoproteins originally discovered as alpha-neurexin ligands and later found to bind to the LNS2 domain of alpha-neurexins. NXPE are encoded by four genes that are highly conserved in vertebrates but absent from invertebrates.
