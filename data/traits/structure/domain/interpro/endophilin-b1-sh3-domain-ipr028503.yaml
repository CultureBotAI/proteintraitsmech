identifier: InterPro:IPR028503
label: "Endophilin-B1, SH3 domain"
definition: >-
  Endophilin-B1 is a BAR and SH3 (Src homology 3) domain-containing protein and a member of the endophilin family that is localised predominantly to intracellular membranes. It regulates the membrane dynamics of various intracellular compartments such as mitochondria and autophagosome formation in fibroblast. This entry represents the C-terminal SH3 domain of Endophilin-B1.
