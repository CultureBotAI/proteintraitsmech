label: "Protocadherin-15 domain"
definition: >-
  This domain is found in human Protocadherin-15 (PCDH15), a calcium-dependent cell-adhesion protein that is essential for maintenance of normal retinal and cochlear function. This domain is predicted to adopt an α-β configuration. It is found C-terminal to several copies of .
