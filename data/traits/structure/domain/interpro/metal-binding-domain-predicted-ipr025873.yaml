identifier: InterPro:IPR025873
label: "Metal binding domain, predicted"
definition: >-
  A predicted metal-binding domain that is found in gene-neighbourhood associations with genes encoding components of the bacterial homologues of the ubiquitin modification pathway including the E1, E2, JAB metallopeptidase and ubiquitin proteins. The domain is characterised by a conserved motif with a CxxxxxEYHxxxxH signature.
