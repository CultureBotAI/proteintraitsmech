identifier: InterPro:IPR038749
label: "GINS complex protein Sld5, alpha-helical domain"
definition: >-
  Sld5 is a component of GINS tetrameric protein complex, and within the complex Sld5 interacts with Psf1 via its N-terminal A-domain, and with Psf2 through a combination of the A and B domains. Sld5 in Drosophila is required for normal cell cycle progression and the maintenance of genomic integrity. GINS is a complex of four subunits (Sld5, Psf1, Psf2 and Psf3) that is involved in both initiation and elongation stages of eukaryotic chromosome replication. Besides being essential for the maintenance of genomic integrity, GINS plays a central role in coordinating DNA replication with cell cycle checkpoints and is involved in cell growth. The eukaryotic GINS subunits are homologous and homologues are also found in the archaea; the complex is not found in bacteria. The four subunits of the complex consist of two domains each, termed the α-helical (A) and β-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3.
