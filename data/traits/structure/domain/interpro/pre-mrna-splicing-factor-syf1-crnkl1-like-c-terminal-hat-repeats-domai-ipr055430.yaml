identifier: InterPro:IPR055430
label: "Pre-mRNA-splicing factor Syf1/CRNKL1-like, C-terminal HAT-repeats domain"
definition: >-
  This entry includes a group of pre-mRNA-processing factors that are components of the spliceosome that are involved in pre-RNA splicing, including Syf1 from human and its homologues from fungi, crooked neck from Drosophila and its homologues from human and fungi Crooked neck-like protein 1 (CRNKL1/SYF-3) and CFL1, respectively. These proteins contain HAT (Half A TPR) repeats which have a repetitive pattern characterised by three aromatic residues with a conserved spacing. They are structurally and sequentially similar to TPRs. The HAT repeats in these proteins can be divided in three segments, N-terminal, central and C-terminal. This entry represents the C-terminal HAT repeats of these proteins, which make contacts with other proteins in the complex, to stabilise it.
