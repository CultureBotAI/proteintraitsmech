identifier: InterPro:IPR059832
label: "PA14_33160 family"
definition: >-
  This entry represents a small α-helical domain found in the PA14_33160 family of uncharacterised secreted proteins found in Pseudomonas aeruginosa. The protein contains a predicted signal peptide and is secreted to the extracellular region. The biological function of this protein family remains unknown.
