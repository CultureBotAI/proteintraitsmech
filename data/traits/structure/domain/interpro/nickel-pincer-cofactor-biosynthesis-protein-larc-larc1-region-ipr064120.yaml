identifier: InterPro:IPR064120
label: "Nickel pincer cofactor biosynthesis protein LarC, LarC1 region"
definition: >-
  LarC is a CTP-dependent nickel insertase, part of the biosynthesis pathway for the nickel-pincer nucleotide cofactor used by enzymes such as the actate racemase from Lactiplantibacillus plantarum. LarC protein sequences often contain long stretches of extremely His-rich regions. In a substantial minority of species, LarC is split into two regions, designated LarC1 and LarC2. This entry describes the longer, N-terminal LarC1 region, but applies the name LarC as it does not distinguish the less common, shorter form, LarC1, form from the longer, more common fused LarC form.
