identifier: InterPro:IPR062976
label: "Baseplate wedge Pvc12-like domain 2"
definition: >-
  This domain is found in the Baseplate wedge proteins Pvc12 from Photorhabdus laumondii ( ) and related proteins. This domain has similarity to the central domain of the P2 bacteriophage baseplate J protein and Baseplate protein gp47 from Escherichia phage Mu. The baseplate wedge protein Pvc12 and the sheath protein Pvc4 play an important role in the stabilisation of the baseplate-trunk interface of the phage contractile injection system.
