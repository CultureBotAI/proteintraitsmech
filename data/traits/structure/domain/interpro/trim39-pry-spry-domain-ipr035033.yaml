identifier: InterPro:IPR035033
label: "TRIM39, PRY/SPRY domain"
definition: >-
  This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C terminus of TRIM39, an E3 ubiquitin-protein ligase. Tripartite motif 39 (TRIM39), also known as Ring finger protein 23 (RNF23), has been shown to stabilize modulator of apoptosis 1 (MOAP-1) by suppressing its polyubiquitylation by the anaphase promoting complex. It also stabilizes p21, thus regulating cell cycle progression and the balance between cytostasis and apoptosis after DNA damage. TRIM39 interacts with p21, preventing binding to Cdt2, ubiquitylation by Cdt2 E3 ligase, and degradation.
