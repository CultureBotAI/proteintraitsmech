  The entry represents a domain found in a number of conserved hypothetical proteins. Their genes are often, though not always, encoded in apparent phage-derived regions of bacterial chromosomes. The Rhodobacter capsulatus sequence is apparently part of the gene transfer agent [see Fig.1, in ].
