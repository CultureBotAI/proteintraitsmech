identifier: InterPro:IPR063330
label: "BUR2, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of BUR2, found in yeasts. BUR2 is a component of the BUR kinase complex involved in transcription regulation. The full-length protein forms a complex with SGV1/BUR1 and is required for the kinase activity of this complex. BUR2 is localised to the nucleus and is involved in histone modifications, including H3 lysine-4 trimethylation and H2B ubiquitylation. The protein is essential for recovery from pheromone-induced growth arrest and vegetative growth.
