identifier: InterPro:IPR058856
label: "ASCC3-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal end of human Activating signal cointegrator 1 complex subunit 3 (ASCC3), an ATPase involved both in DNA repair and rescue of stalled ribosomes. This domain shows an all-alpha configuration.
