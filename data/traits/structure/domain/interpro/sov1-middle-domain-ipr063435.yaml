identifier: InterPro:IPR063435
label: "SOV1, middle domain"
definition: >-
  This entry represents a TPR middle domain found in mitochondrial protein SOV1 and related proteins. SOV1 is a mitochondrial protein involved in translation activator activity and mitochondrial ribosome assembly. SOV1 localises to mitochondria and plays a role in mitochondrial translation. The specific function of this TPR middle domain remains to be determined.
