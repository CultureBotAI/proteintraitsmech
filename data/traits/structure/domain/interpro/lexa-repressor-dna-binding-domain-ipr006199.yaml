identifier: InterPro:IPR006199
label: "LexA repressor, DNA-binding domain"
definition: >-
  The LexA SOS regulon repressor prevents the expression of DNA repair proteins in bacteria. This entry represents the DNA-binding domain, which contains a variant form of the helix-turn-helix DNA binding motif.
