identifier: InterPro:IPR057905
label: "Nal1, N-terminal domain"
definition: >-
  This entry represents the N-terminal domain in Nal1 found in rice and other plants. This domain contains an ATP-binding pocket that mediates the formation of a hexameric structure consisting of two stacked trimeric rings. ATP is embedded in a positively charged pocket stabilised by a network of residues, including R120, R122, K123, K139 and K142. This domain plays a critical role in the oligomerisation of Nal1, which is important for its protease activity. This entry also includes peptidases from bacterial proteins. Narrow leaf 1 (Nal1) is a serine protease with pleiotropic roles in plant development, affecting several agronomic traits including leaf width, plant height, root architecture, and grain yield. Nal1 regulates lateral leaf growth by modulating basipetal polar auxin transport and vascular patterning, which are essential for proper leaf development. It also influences photosynthetic efficiency by regulating carboxylation activity, thereby impacting the rate of photosynthesis. In addition, Nal1 degrades the TOPLESS-related corepressor OsTPR2, thereby modulating the expression of downstream genes involved in hormone signalling pathways. Nal1 proteins also contribute to the determination of panicle and spikelet numbers, traits that are directly associated with grain productivity.
