identifier: InterPro:IPR057820
label: "T4 y05I-like putative transcription factor, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of a family of uncharacterised phage proteins that includes T4 y05I protein . The family also includes homologues from T2 and T6 phage, among others. These proteins contain two domains. These domains appear to be related to those found in the eukaryotic PurA transcription factor. This N-terminal, presumably single-stranded DNA-binding domain contains two copies of a PurA-like repeat. The C-terminal domain contains a single copy that may analogously mediate dimerisation to PurA.
