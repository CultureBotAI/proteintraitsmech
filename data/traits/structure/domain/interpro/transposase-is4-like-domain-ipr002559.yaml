identifier: InterPro:IPR002559
label: "Transposase IS4-like domain"
definition: >-
  Autonomous mobile genetic elements such as transposon or insertion sequences (IS) encode an enzyme, transposase, that is required for excising and inserting the mobile element. Transposases have been grouped into various families. This family includes the IS4 transposase.
