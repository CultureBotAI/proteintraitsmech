identifier: InterPro:IPR037836
label: "SNX17, atypical FERM-like domain"
definition: >-
  SNX17 is a critical regulator of endosomal recycling of numerous receptors, channels, and other transmembrane proteins. It binds to Asn-Pro-Xaa-Tyr (NPxY) sequences in the cytoplasmic tails of cargo such as LDL receptors and the amyloid precursor protein. SNX17 contains a defining PtdInsP-binding PX domain, and a C-terminal 4.1, ezrin, radixin, moesin (FERM) domain with an atypical tertiary structure. This entry represents the FERM-like domain of SNX17. SNX17 binds Ras GTPase through its FERM-like domains.
