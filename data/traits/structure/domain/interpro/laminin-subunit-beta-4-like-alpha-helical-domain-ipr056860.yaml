identifier: InterPro:IPR056860
label: "Laminin subunit beta-4-like, alpha-helical domain"
definition: >-
  This domain is found in human Laminin subunit beta-4 (LAMB4) and in similar proteins from vertebrates. LAMB4 is thought to mediate the attachment, migration and organisation of cells into tissues during embryonic development by interacting with other extracellular matrix components. This domain is found associated with several copies of . It is predicted to adopt an all-α configuration.
