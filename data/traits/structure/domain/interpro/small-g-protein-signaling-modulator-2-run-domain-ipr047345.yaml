identifier: InterPro:IPR047345
label: "Small G protein signaling modulator 2, RUN domain"
definition: >-
  This entry represents the RUN domain of SGSM2. Small G protein signaling modulator 2 (SGSM2) is a GTPase-activating protein for Rab32/38, and regulates melanogenic enzyme trafficking in melanocytes. It also acts as a Rab9A effector that activates GTP hydrolysis by Rab32 and Rab33B proteins.
