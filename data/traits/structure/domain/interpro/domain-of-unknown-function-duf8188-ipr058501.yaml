identifier: InterPro:IPR058501
label: "Domain of unknown function DUF8188"
definition: >-
  This domain is found in uncharacterised proteins mainly from gram-negative bacteria. It is usually preceded by a hydrophobic α-helix predicted as transmembrane. This domain is predicted to adopt an OB-fold and has a significant structural similarity to bacterial enterotoxins and related domains members of this superfamily.
