identifier: InterPro:IPR056474
label: "Helicase SEN1, beta-barrel domain"
definition: >-
  This domain is found in the yeast Helicase SEN1 and related proteins from fungi and some uncharacterised plant sequences. SEN1 is an ATP-dependent 5'->3' DNA/RNA helicase required for the expression and maturation of diverse classes of non-protein-coding RNAs like precursor tRNAs, rRNAs and small nuclear (snRNA) and nucleolar (snoRNA) RNAs. The Nrd1-Nab3-Sen1 (NNS) complex mediates termination of RNA Polymerase II transcription on snoRNAs as well as on several short protein-coding genes. This domain folds into a β-barrel that has a structural similarity to alanine racemase C-terminal domain.
