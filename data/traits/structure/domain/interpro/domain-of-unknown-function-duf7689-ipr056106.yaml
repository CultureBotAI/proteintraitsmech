label: "Domain of unknown function DUF7689"
definition: >-
  This entry represents a group of uncharacterised proteins. They are predicted to adopt a fold typical for cysteine proteinases and topology similar to that of NlpC/P60 family proteins. These proteins are likely enzymes as they have similar active site architecture.
