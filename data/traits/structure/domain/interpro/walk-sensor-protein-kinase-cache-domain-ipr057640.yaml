identifier: InterPro:IPR057640
label: "WalK sensor protein kinase, cache domain"
definition: >-
  This entry represents the Cache domain found in the sensor protein kinase WalK (or YycG) from bacteria, mainly from firmicutes. This domain is extracellular and is involved in WalK dimerisation necessary for protein function. The WalK protein, alongside its response regulator WalR, is a member of the two-component regulatory system WalK/WalR, involved in the regulation of the ftsAZ operon, the yocH, ykvT, cwlO, lytE, ydjM, yjeA, yoeB genes and the tagAB and tagDEF operons. It is essential for cell wall metabolism, virulence regulation, and biofilm production, among many other cellular processes.
