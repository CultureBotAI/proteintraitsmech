identifier: InterPro:IPR035670
label: "Plant AGD1/2/3/4, BAR domain"
definition: >-
  The plant protein SCARFACE (SFC, also known as AGD) is an Arf GTPase Activating Protein (GAP) that plays a role in the trafficking of auxin efflux regulators from the plasma membrane to the endosome. It is required for the normal vein patterning in leaves. SCF contains an N-terminal BAR domain, followed by a Pleckstrin Homology (PH) domain, an Arf GAP domain, and C-terminal ankyrin (ANK) repeats. This entry represents the BAR domain found in plant AGD1/2/3/4 and homologues are also found in chlorophytes. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions including organelle biogenesis, membrane trafficking or remodeling, and cell division and migration.
