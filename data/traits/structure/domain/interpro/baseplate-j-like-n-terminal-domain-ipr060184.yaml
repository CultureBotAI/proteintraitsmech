label: "Baseplate J-like, N-terminal domain"
definition: >-
  This domain is found at the N-terminal of Bacteriophage P2 Baseplate protein J, which may be part of the wedges of the baseplate. This entry also includes a number of bacterial homologues, which are thought to have been horizontally transferred. This domain is often found associated with and .
