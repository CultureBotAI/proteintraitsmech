identifier: InterPro:IPR045670
label: "Domain of unknown function DUF5916"
definition: >-
  This entry represents an uncharacterised domain found mostly in bacterial proteins. In CBM9 domain containing proteins, this domain is C-terminal to the CBM9 domain. According to BOCTOPUS prediction this region has a membrane barrel topology, which suggests that proteins containing this domain maybe novel carbohydrate channels.
