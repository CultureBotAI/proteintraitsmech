identifier: InterPro:IPR024969
label: "EIF3F/CSN6-like, C-terminal"
definition: >-
  This domain is found at the C terminus of many regulatory proteins, including the eukaryotic initiation factor 3 subunit F (eIF3f) and COP9 signalosome complex subunit 6. The eIF3f C-terminal domain is critical for proper eIF3f activity in skeletal muscle through its interaction with mTOR (also known as FRAP, RAFT1 or RAPT).
