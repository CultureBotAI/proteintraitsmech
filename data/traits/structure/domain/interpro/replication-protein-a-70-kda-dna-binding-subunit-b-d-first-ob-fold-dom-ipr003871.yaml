identifier: InterPro:IPR003871
label: "Replication protein A 70 kDa DNA-binding subunit B/D, first OB fold domain"
definition: >-
  This entry represents the first OB fold found Replication protein A 70 kDa DNA-binding subunit B/D from plants which are similar to human RPA1 (also called RPA70) and are part of the RPA complex. RPA1 is the large subunit of Replication protein A (RPA). RPA is a nuclear ssDNA-binding protein (SSB) which appears to be involved in all aspects of DNA metabolism including replication, recombination, and repair. RPA also mediates specific interactions of various nuclear proteins. In animals, plants, and fungi, RPA is a heterotrimer with subunits of 70kDa (RPA1), 32kDa (RPA2), and 14kDa (RPA3). The ssDNA-binding mechanism is believed to be multistep and to involve conformational change.
