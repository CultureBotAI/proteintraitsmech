identifier: InterPro:IPR049589
label: "NXP-1, middle HEAT-repeat binding domain"
definition: >-
  This entry corresponds to the HEAT-repeat binding domain of NXP-1 located in the middle/central region, which consists of four short helices and two long extended segments. It is responsible for the binding of cohesin HEAT-repeat subunit SA2. The SA2:NXP-1 heterodimer mediates the binding between cohesin and its regulators, including Scc2-Scc4, Pds5, Wapl, and Sgo1. NXP-1, also called double-strand-break repair protein Rad21 homolog (HR21), or Scc1 homolog, is related to Rad21/Scc1/Mcd1. As a component of the cohesin complex, it is involved in sister chromatid cohesion from the time of DNA replication in S phase to their segregation in mitosis, a function that is essential for proper chromosome segregation, post-replicative DNA repair, and the prevention of inappropriate recombination between repetitive regions. The cohesin complex may also play a role in spindle pole assembly during mitosis. This entry also includes double-strand-break repair protein rad21-like protein 1 (RAD21L), which is a meiosis-specific component of some cohesin complex required during the initial steps of prophase I in male meiosis.
