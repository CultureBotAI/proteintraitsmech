identifier: InterPro:IPR033923
label: p21 activated kinase binding domain
definition: >-
  PAK (p21 activated kinase) Binding Domain (PBD), binds Cdc42p- and/or Rho-like small GTPases. It is also known as the Cdc42/Rac interactive binding (CRIB) motif. It has been shown to inhibit transcriptional activation and cell transformation mediated by the Ras-Rac pathway. This subgroup of CRIB/PBD-domains is found N-terminal of Serine/Threonine kinase domains in PAK and PAK-like proteins.
