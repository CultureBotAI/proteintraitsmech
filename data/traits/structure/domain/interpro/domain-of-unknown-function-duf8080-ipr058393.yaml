identifier: InterPro:IPR058393
label: "Domain of unknown function DUF8080"
definition: >-
  This entry represents a domain found at the C terminus of a family of uncharacterised proteins found in halobacteria. These proteins contain a domain at the N terminus and this helical domain at the C terminus. Structure prediction suggests this domain may mediate homodimerisation.
