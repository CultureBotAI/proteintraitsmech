identifier: InterPro:IPR063783
label: "AIM36, C-terminal domain"
definition: >-
  This entry represents the C-terminal domain of AIM36 (Altered inheritance of mitochondria protein 36), also known as FMP39 (Found in mitochondria protein 39). This domain is found in fungi and represents the cytoplasmic portion of a mitochondrial membrane protein. AIM36 contains a single transmembrane helix at its N-terminal region followed by this C-terminal domain. The specific function of this C-terminal domain remains to be determined, though it likely plays a role in mitochondrial inheritance processes.
