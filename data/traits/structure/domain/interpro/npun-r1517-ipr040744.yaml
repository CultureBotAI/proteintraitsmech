identifier: InterPro:IPR040744
label: "Npun R1517"
definition: >-
  This domain belongs to Npun R1517 which is found in Nostoc punctiforme. Studies indicate that Npun R1517 is encoded by orphan gene 29. Npun R1517 adopts a sleigh-shaped structure with a two-stranded antiparallel β-sheet forming the floor of the sleigh, a HTH forming the seat and a HTH forming the front of the sleigh.
