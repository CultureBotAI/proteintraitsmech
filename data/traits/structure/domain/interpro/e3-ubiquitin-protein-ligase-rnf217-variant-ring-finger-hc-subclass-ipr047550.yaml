identifier: InterPro:IPR047550
label: "E3 ubiquitin-protein ligase RNF217, variant RING finger, HC subclass"
definition: >-
  This entry represents the RING domain of RNF217 and similar proteins from vertebrates. It is a variant C4C4-type RING finger whose overall folding is similar to that of the C3HC4-type RING-HC finger. It is required for RBR-mediated ubiquitination. E3 ubiquitin-protein ligase RNF217, also known as IBR domain-containing protein 1 (IBRDC1), is a transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligase mainly expressed in testis and skeletal muscle, as different splice variants. It interacts with the anti-apoptotic protein HAX1, and is adjacent to a translocation breakpoint involving ETV6 in childhood acute lymphoblastic leukemia (ALL). RNF217 contains a RBR domain followed by TMs. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been corrected as RING-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR (RING1-BRcat-Rcat) domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase function to facilitate the ubiquitination reaction.
