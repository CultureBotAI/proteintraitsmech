identifier: InterPro:IPR047556
label: "E3 ubiquitin-protein ligase TRIAD1, Rcat domain"
definition: >-
  This entry represents the Rcat domain of TRIAD1 and similar proteins from animals. It is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. E3 ubiquitin-protein ligase ARIH2 (ARI2), also called TRIAD1 and ariadne-2 (ARI-2), is an RBR-type E3 ubiquitin-protein ligase that catalyses the formation of polyubiquitin chains linked via lysine-48 as well as lysine-63 residues. Its auto-ubiquitylation can be catalysed by the E2 conjugating enzyme UBCH7. TRIAD1 has been implicated in hematopoiesis, specifically in myelopoiesis, as well as in embryogenesis. It functions as a regulator of endosomal transport, and is required for the proper function of multivesicular bodies. It also acts as a novel ubiquitination target for proteasome-dependent degradation by murine double minute 2 (MDM2). As a proapoptotic protein, TRIAD1 promotes p53 activation, and inhibits MDM2-mediated p53 ubiquitination and degradation. Furthermore, TRIAD1 can inhibit the ubiquitination and proteasomal degradation of growth factor independence 1 (Gfi1), a transcriptional repressor essential for the function and development of many different haematopoietic lineages. TRIAD1 contains an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD (two RING fingers and a DRIL (double RING finger linked)) domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction.
