identifier: InterPro:IPR043992
label: "Transglycosylase SLT domain 3"
definition: >-
  This entry represents a lysozyme like domain found predominantly in bacteria. The domain contains several conserved cysteine and histidine residues suggesting that it may bind to zinc. This domain is related to the SLT domain 1.
