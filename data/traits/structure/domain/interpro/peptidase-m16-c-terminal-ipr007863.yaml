identifier: InterPro:IPR007863
label: "Peptidase M16, C-terminal"
definition: >-
  These metallopeptidases belong to MEROPS peptidase family M16 (clan ME). They include proteins, which are classified as non-peptidase homologues either have been found experimentally to be without peptidase activity, or lack amino acid residues that are believed to be essential for the catalytic activity. The peptidases in this group of sequences include: Insulinase, insulin-degrading enzyme ( ) Mitochondrial processing peptidase alpha subunit, (Alpha-MPP, ) Pitrlysin, Protease III precursor ( ) Nardilysin, ( ) Ubiquinol-cytochrome C reductase complex core protein I,mitochondrial precursor ( ) Coenzyme PQQ synthesis protein F ( ) These proteins do not share many regions of sequence similarity; the most noticeable is in the N-terminal section. This region includes a conserved histidine followed, two residues later by a glutamate and another histidine. In pitrilysin, it has been shown that this H-x-x-E-H motif is involved in enzymatic activity; the two histidines bind zinc and the glutamate is necessary for catalytic activity. The mitochondrial processing peptidase consists of two structurally related domains. One is the active peptidase whereas the other, the C-terminal region, is inactive. The two domains hold the substrate like a clamp.
