identifier: InterPro:IPR008147
label: "Glutamine synthetase, N-terminal domain"
definition: >-
  Glutamine synthetase ( ) (GS) plays an essential role in the metabolism of nitrogen by catalysing the condensation of glutamate and ammonia to form glutamine. This entry represents the glutamine synthetase N-terminal domain, which adopts a β-grasp fold and contributes to the substrate binding pocket of the enzyme.
