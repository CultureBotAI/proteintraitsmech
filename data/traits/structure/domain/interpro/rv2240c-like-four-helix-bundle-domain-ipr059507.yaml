identifier: InterPro:IPR059507
label: "Rv2240c-like, four-helix bundle domain"
definition: >-
  This entry represents a four-helix bundle domain found in Rv2240c, an uncharacterised membrane protein from Mycobacterium tuberculosis. The domain contains a pair of invariant cysteine residues located in the first and fourth α helices that likely form a disulphide bond, which may be important for structural stability. The biological function of this domain remains unknown.
