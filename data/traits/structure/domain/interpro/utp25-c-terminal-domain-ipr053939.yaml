identifier: InterPro:IPR053939
label: "UTP25, C-terminal domain"
definition: >-
  UTP25 is a family of eukaryotic proteins. The family displays limited sequence similarity to DEAD-box RNA helicases, having alternative residues at the Walker A and DEAD-box sites, but conservation of structural and other key residues. This entry represents the C-terminal domain that is required and sufficient for the interaction of Utp25 with Utp3. UTP25 interacts with nucleolar protein Nop19 in S. cerevisiae, and Nop19p is essential for the incorporation of Utp25p into pre-ribosomes. Proteins in this entry consist of two domains; the C-terminal one is represented in this model.
