identifier: InterPro:IPR025558
label: "Domain of unknown function DUF4283"
definition: >-
  This domain is found in a group of uncharacterised plant proteins. Considering the very diverse range of other domains it is associated with, it is possible that this domain is a binding/guiding region. It contains two highly conserved tryptophan residues.
