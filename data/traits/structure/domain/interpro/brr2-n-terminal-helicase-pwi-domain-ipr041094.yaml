identifier: InterPro:IPR041094
label: "Brr2, N-terminal helicase PWI domain"
definition: >-
  This domain is found in spliceosomal RNA helicase Brr2 and its homologues. Brr2 is required for the assembly of a catalytically active spliceosome on a messenger RNA precursor. It plays an essential role in pre-mRNA splicing as a core component of the U5 snRNP and U4/U6-U5 tri-snRNP complexes. Brr2 catalyses the ATP-dependent unwinding of U4/U6 RNA duplexes, an essential step in the assembly of a catalytically active spliceosome. The domain is found in the N-terminal region and is non-canonically PWI-like. The PWI-like domain is thought to be involved in protein-protein interactions.
