identifier: InterPro:IPR042870
label: "DAPK3, catalytic domain"
definition: >-
  This entry represents the catalytic domain of DAPK3, which is a member of the Ca(2+)/calmodulin-regulated family of serine/threonine protein kinases. STKs (serine/threonine kinases) catalyse the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DAPKs mediate cell death and act as tumour suppressors. They are necessary to induce cell death and their overexpression leads to death-associated changes including membrane blebbing, cell rounding, and formation of autophagic vesicles.
