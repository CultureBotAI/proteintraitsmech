identifier: InterPro:IPR059083
label: "Uncharacterized GPI-anchored protein At5g19230-like domain"
definition: >-
  This domain is found in several uncharacterised GPI-anchored proteins from Arabidopsis thaliana, whose specific function is unknown. These include At5g19230, At3g06035, At5g19240 and At5g19250. This domain is predicted to show an α-β configuration.
