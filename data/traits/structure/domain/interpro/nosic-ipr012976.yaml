identifier: InterPro:IPR012976
label: NOSIC
definition: >-
  This entry represents a domain centrally located in a group of pre-RNA processing ribonucleoproteins (RNPs), including the eukaryotic proteins Prp31, Nop56 and Nop58 and the archaeal homologue Nop5. This domain was named after the central domain in Nop56/SIK1-like proteins. It is found associated with the Nop domain ( ). U4/U6 small nuclear ribonucleoprotein Prp31 (PRPF31) is involved in pre-mRNA splicing as component of the spliceosome. This protein is required for the assembly of the U4/U5/U6 tri-snRNP complex, one of the building blocks of the spliceosome. It is associated with a progressive pigmentary retinopathy characterised by night vision blindness and loss of midperipheral visual field. Nucleolar protein 56 and 58 (NOP56/58) are required for 60S ribosomal subunit synthesis. They are core components of box C/D small nucleolar ribonucleoprotein (snoRNP) particles. In humans, NOP56 is associated with a type of slowly progressive neurodegenerative disorder characterised by late-onset ataxia followed by variable involvement of the motor neuron system.
