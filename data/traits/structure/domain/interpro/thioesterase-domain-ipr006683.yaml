identifier: InterPro:IPR006683
label: "Thioesterase domain"
definition: >-
  A wide variety of enzymes contain this domain, principally thioesterases. Proteins containing this domain include 4HBT (4-hydroxybenzoyl-CoA thioesterase) ( ) which catalyses the final step in the biosynthesis of 4-hydroxybenzoate from 4-chlorobenzoate in the soil dwelling microbe Pseudomonas CBS-3. It also includes various cytosolic long-chain acyl-CoA thioester hydrolases. Long-chain acyl-CoA hydrolases hydrolyse palmitoyl-CoA to CoA and palmitate, they also catalyse the hydrolysis of other long chain fatty acyl-CoA thioesters.
