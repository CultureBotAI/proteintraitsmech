identifier: InterPro:IPR022004
label: "White spot syndrome virus structural envelope protein Vp28"
definition: >-
  This family of proteins is found in viruses. Proteins in this family are approximately 210 amino acids in length. There is a conserved NNT sequence motif. These proteins are structural envelope proteins in viruses. This is the β barrel C-terminal domain. There is a protruding N-terminal domain which completes the proteins. Three of four envelope proteins in Shrimp white spot syndrome virus share sequence homology with each other and are present in this family - VP24, VP26 and VP28. VP19 is the other major envelope protein but shares no sequence homology with the other proteins. These proteins are essential for entry into cells of the crustacean host.
