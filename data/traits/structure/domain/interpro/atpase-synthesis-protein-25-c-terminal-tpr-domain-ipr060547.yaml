identifier: InterPro:IPR060547
label: "ATPase synthesis protein 25, C-terminal TPR domain"
definition: >-
  This is a region of tetratricopeptide (TPR)-like repeats found at the C-terminal end of ATPase synthesis protein 25 from fungi, which is thought to be a mitochondrial mRNA stabilisation factor.
