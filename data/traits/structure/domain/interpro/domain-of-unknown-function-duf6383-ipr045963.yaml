identifier: InterPro:IPR045963
label: "Domain of unknown function DUF6383"
definition: >-
  This presumed domain is functionally uncharacterised. This domain is mainly found at the C-terminal of uncharacterised proteins, predominantly from Bacteriodetes. It is about 74 amino acids in length and it contains the GQ and GxxV/IV conserved sequence motifs. This domain has similarity to the Type IX secretion system targeting domain.
