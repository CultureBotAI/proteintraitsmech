identifier: InterPro:IPR022453
label: "Zinc finger, MqsA-type"
definition: >-
  This entry describes a small domain with two copies of a putative zinc-binding motif CXXC (usually CXXCG). Most member proteins consist largely of this domain or else carry an additional C-terminal helix-turn-helix domain, resembling that of the phage protein Cro. This domain is found in Antitoxin MqsA and Uncharacterized protein YokU found mostly in prokaryotes.
