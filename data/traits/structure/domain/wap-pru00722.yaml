identifier: PROSITE:PRU00722
label: WAP
definition: >-
  The 'four-disulfide core' or WAP domain comprises 8 cysteine residues involved in disulfide bonds. Single or multiple copies occur in eukaryotic proteins, such as whey acidic protein (WAP), antileukoproteinase and elastase-inhibitor proteins.
