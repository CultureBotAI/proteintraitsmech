identifier: PROSITE:PRU01186
label: C2 NT-type domain
definition: >-
  The primary function of the NT-type C2 domain appears to be the linking of actin/microfilament-binding adaptors to the membrane and to act as a link that tethers endosomal vesicles to the cytoskeleton in course of their intracellular trafficking.
