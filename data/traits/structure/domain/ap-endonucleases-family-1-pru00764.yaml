identifier: PROSITE:PRU00764
label: "AP endonucleases family 1"
definition: >-
  Exonuclease III and AP endonuclease 1 related enzymes play a role in DNA repair. These nucleases cleave phosphodiester bonds at apurinic or apyrimidinic sites (AP sites) to produce new 5'-ends that are base-free deoxyribose 5-phosphate residues.
