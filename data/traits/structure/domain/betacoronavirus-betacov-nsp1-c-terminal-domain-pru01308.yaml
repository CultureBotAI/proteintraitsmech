identifier: PROSITE:PRU01308
label: "Betacoronavirus (BetaCoV) Nsp1 C-terminal domain"
definition: >-
  The Sarbecovirus Nsp1 C-terminal domain binds to the mRNA channel of the 40S ribosome, where it interferes with mRNA binding and inhibits host protein translation. This inhibition mechanism may be unique to Sarbecoviruses, because the C-terminal region of Nsp1 is shorter in AlphaCoVs and is not highly conserved amongst other BetaCoVs, including MERS-CoV.
