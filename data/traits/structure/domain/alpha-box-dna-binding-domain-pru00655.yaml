identifier: PROSITE:PRU00655
label: "Alpha box DNA-binding domain"
definition: >-
  All ascomycete MAT idiomorphs encode proteins with confirmed or putative DNA-binding motifs, such as an alpha box for MAT1-1 strains and a high mobility group (HMG) DNA-binding domain for MAT1-2 strains.
