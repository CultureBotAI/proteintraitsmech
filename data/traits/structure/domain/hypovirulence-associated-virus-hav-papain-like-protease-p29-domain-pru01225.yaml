identifier: PROSITE:PRU01225
label: "Hypovirulence-associated virus (HAV) papain-like protease p29 domain"
definition: >-
  The HAV papain-like protease p29 is a cysteine protease, which forms the peptidase family C7. A Cys and a His catalytic residue are essential for autocatalytic cleavage at a glycine dipeptide clevage site located at the C- terminus of the domain.
