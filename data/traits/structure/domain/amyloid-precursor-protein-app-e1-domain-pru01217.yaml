identifier: PROSITE:PRU01217
label: "Amyloid precursor protein (APP) E1 domain"
definition: >-
  The E1 domain is a cysteine-rich region consisting of a growth factor like subdomain (GFLD), which binds heparin and can stimulate neurite outgrowth, and a copper-binding subdomain (CuBD) that binds Cu and Zn.
