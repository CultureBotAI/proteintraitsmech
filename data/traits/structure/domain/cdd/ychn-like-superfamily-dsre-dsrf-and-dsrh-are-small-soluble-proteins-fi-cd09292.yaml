identifier: CDD:cd09292
label: "YchN_like superfamily. DsrE, DsrF, and DsrH are small soluble proteins first identified in the phototrophic sulfur bacterium Allochromatium vinosum, that are involved in the oxidation of intracellular sulfur.  These proteins contain a fold similar to that of the Escherichia coli protein YchN.  DsrE, DsrF, and DsrH bind one another to form a soluble, cytoplasmic heterohexameric holoprotein with an apparent molecular mass of 75 kDa.  In Escherichia coli, the DsrEFH-related proteins TusBCD are members of a sulfur relay system involved in thiouridine biosynthesis. TusB, TusC, and TusD also bind one another to form a heterohexamer but in other organisms these proteins form homooligomers.  The DsrEFH-like superfamily includes proteins found not only in photo- and chemolithoautotrophic bacteria but also in some thermophilic archaea including Thermotoga maritima."
definition: >-
  YchN_like superfamily. DsrE, DsrF, and DsrH are small soluble proteins first identified in the phototrophic sulfur bacterium Allochromatium vinosum, that are involved in the oxidation of intracellular sulfur. These proteins contain a fold similar to that of the Escherichia coli protein YchN. DsrE, DsrF, and DsrH bind one another to form a soluble, cytoplasmic heterohexameric holoprotein with an apparent molecular mass of 75 kDa. In Escherichia coli, the DsrEFH-related proteins TusBCD are members of a sulfur relay system involved in thiouridine biosynthesis. TusB, TusC, and TusD also bind one another to form a heterohexamer but in other organisms these proteins form homooligomers. The DsrEFH-like superfamily includes proteins found not only in photo- and chemolithoautotrophic bacteria but also in some thermophilic archaea including Thermotoga maritima. — an NCBI CDD conserved domain (cd09292); members share this curated model.
