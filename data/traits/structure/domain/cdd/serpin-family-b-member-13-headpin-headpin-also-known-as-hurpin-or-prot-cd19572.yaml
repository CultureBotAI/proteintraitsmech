identifier: CDD:cd19572
label: "serpin family B member 13, headpin. Headpin (also known as hurpin or proteinase inhibitor 13/P113) maps to chromosome 18q21.3 and is expressed in normal squamous epithelium of the oral mucosa, skin, and cervix. Inhibitory serpins are known to play an important role in tumor invasion, metastasis, tumor suppression and apoptosis. Headpin belongs to the ovalbumin family of serpins (ov-serpins), a family of closely related proteins, whose members can be secreted (ovalbumin), cytosolic (leukocyte elastase inhibitor, LEI), or targeted to both compartments (plasminogen activator inhibitor 2, PAI-2). It also characterized by N- and C-terminal extensions, the absence of a signal peptide, and a Ser rather than an Asn residue at the penultimate position. The ov-serpins corresponds to clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family B member 13, headpin. Headpin (also known as hurpin or proteinase inhibitor 13/P113) maps to chromosome 18q21.3 and is expressed in normal squamous epithelium of the oral mucosa, skin, and cervix. Inhibitory serpins are known to play an important role in tumor invasion, metastasis, tumor suppression and apoptosis. Headpin belongs to the ovalbumin family of serpins (ov-serpins), a family of closely related proteins, whose members can be secreted (ovalbumin), cytosolic (leukocyte elastase inhibitor, LEI), or targeted to both compartments (plasminogen activator inhibitor 2, PAI-2). It also characterized by N- and C-terminal extensions, the absence of a signal peptide, and a Ser rather than an Asn residue at the penultimate position. The ov-serpins corresponds to clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19572); members share this curated model.
