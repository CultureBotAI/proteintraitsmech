identifier: CDD:cd02117
label: "NifH family. This family contains the NifH (iron protein) of nitrogenase, L subunit (BchL/ChlL) of the  protochlorophyllide reductase, and the BchX subunit of the Chlorophyllide reductase. Members of this family use energy from ATP hydrolysis and transfer electrons through a Fe4-S4 cluster to other subunit for substrate reduction"
definition: >-
  NifH family. This family contains the NifH (iron protein) of nitrogenase, L subunit (BchL/ChlL) of the protochlorophyllide reductase, and the BchX subunit of the Chlorophyllide reductase. Members of this family use energy from ATP hydrolysis and transfer electrons through a Fe4-S4 cluster to other subunit for substrate reduction — an NCBI CDD conserved domain (cd02117); members share this curated model.
