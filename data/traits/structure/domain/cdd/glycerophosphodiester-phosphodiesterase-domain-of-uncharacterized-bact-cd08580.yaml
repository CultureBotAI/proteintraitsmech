identifier: CDD:cd08580
label: "Glycerophosphodiester phosphodiesterase domain of uncharacterized bacterial protein Rv2277c and similar proteins. This subfamily corresponds to the glycerophosphodiester phosphodiesterase domain (GDPD) present in uncharacterized bacterial protein Rv2277c and similar proteins. Members in this subfamily are bacterial homologous of mammalian GDE4, a transmembrane protein whose cellular function has not yet been elucidated."
definition: >-
  Glycerophosphodiester phosphodiesterase domain of uncharacterized bacterial protein Rv2277c and similar proteins. This subfamily corresponds to the glycerophosphodiester phosphodiesterase domain (GDPD) present in uncharacterized bacterial protein Rv2277c and similar proteins. Members in this subfamily are bacterial homologous of mammalian GDE4, a transmembrane protein whose cellular function has not yet been elucidated. — an NCBI CDD conserved domain (cd08580); members share this curated model.
