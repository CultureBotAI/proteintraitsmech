identifier: CDD:cd17811
label: "Fic domain of the type IV secretion system effector protein BepA and similar proteins. This family contains the Fic domain of type IV secretion system effector protein BepA and similar proteins. The Fic protein has been described as involved in cell division and the synthesis of PAB or folate, indicating that the Fic protein and cAMP are involved in a regulatory mechanism of cell division via folate metabolism. Most members of this family contain a central conserved motif HPFXXGNG, which is part of the ATP-binding site. Fic domains are presumed to act as adenosine monophosphate-protein transferases (EC 2.7.7.n1)"
definition: >-
  Fic domain of the type IV secretion system effector protein BepA and similar proteins. This family contains the Fic domain of type IV secretion system effector protein BepA and similar proteins. The Fic protein has been described as involved in cell division and the synthesis of PAB or folate, indicating that the Fic protein and cAMP are involved in a regulatory mechanism of cell division via folate metabolism. Most members of this family contain a central conserved motif HPFXXGNG, which is part of the ATP-binding site. Fic domains are presumed to act as adenosine monophosphate-protein transferases (EC 2.7.7.n1) — an NCBI CDD conserved domain (cd17811); members share this curated model.
