identifier: CDD:cd12887
label: "SPRY domain in neuralized homology repeat. This family contains the neuralized homology repeat 1 (NHR1) domain similar to the SPRY domain (known to mediate specific protein-protein interactions) at the C-terminus of a conserved region within eukaryotic neuralized and neuralized-like proteins. In Drosophila, the neuralized protein (Neur) belongs to a group of ubiquitin ligases and is required in a subset of Notch pathway-mediated cell fate decisions during development of the nervous system. Neur binds to the Notch receptor ligand Delta through its first NHR1 domain and mediates its ubiquitination for endocytosis. Multiple copies of this region are found in some members of the family."
definition: >-
  SPRY domain in neuralized homology repeat. This family contains the neuralized homology repeat 1 (NHR1) domain similar to the SPRY domain (known to mediate specific protein-protein interactions) at the C-terminus of a conserved region within eukaryotic neuralized and neuralized-like proteins. In Drosophila, the neuralized protein (Neur) belongs to a group of ubiquitin ligases and is required in a subset of Notch pathway-mediated cell fate decisions during development of the nervous system. Neur binds to the Notch receptor ligand Delta through its first NHR1 domain and mediates its ubiquitination for endocytosis. Multiple copies of this region are found in some members of the family. — an NCBI CDD conserved domain (cd12887); members share this curated model.
