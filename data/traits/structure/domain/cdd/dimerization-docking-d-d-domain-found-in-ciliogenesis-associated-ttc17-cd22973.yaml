identifier: CDD:cd22973
label: "dimerization/docking (D/D) domain found in ciliogenesis-associated TTC17-interacting protein (CATIP) and similar proteins. CATIP, also called C2orf62, plays a role in primary ciliogenesis by modulating actin polymerization. It interacts with TTC17. Mutations in CATIP may contribute to asthenozoospermia through its involvement in actin polymerization and the actin cytoskeleton. CATIP contains a C-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA)."
definition: >-
  dimerization/docking (D/D) domain found in ciliogenesis-associated TTC17-interacting protein (CATIP) and similar proteins. CATIP, also called C2orf62, plays a role in primary ciliogenesis by modulating actin polymerization. It interacts with TTC17. Mutations in CATIP may contribute to asthenozoospermia through its involvement in actin polymerization and the actin cytoskeleton. CATIP contains a C-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA). — an NCBI CDD conserved domain (cd22973); members share this curated model.
