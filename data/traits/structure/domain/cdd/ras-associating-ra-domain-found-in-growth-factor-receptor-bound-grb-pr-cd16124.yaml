identifier: CDD:cd16124
label: "Ras-associating (RA) domain found in growth factor receptor-bound (Grb) protein 7/10/14. The RA domain is highly conserved among the members of the Grb proteins family which includes Grb7, Grb10 and Grb14. Grb7/10/14 are multi-domain cytoplasmic adaptor proteins that are recruited to activated receptor tyrosine kinases. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. Grb7 and its related family members Grb10 and Grb14 share a conserved domain architecture that includes an amino-terminal proline-rich region, a central segment termed the GM region (for Grb and Mig) which includes the RA, PIR, and pleckstrin homology (PH) domains, and a carboxyl-terminal SH2 domain. The tandem RA and PH domains of Grb7/10/14 are also found in a second adaptor family, Rap1-interacting adaptor molecule (RIAM) and lamellipodin, which is involved in actin-cytoskeleton rearrangement. Grb7/10/14 family proteins are phosphorylated on serine/threonine as well as tyrosine residues and are mainly localized to the cytoplasm."
definition: >-
