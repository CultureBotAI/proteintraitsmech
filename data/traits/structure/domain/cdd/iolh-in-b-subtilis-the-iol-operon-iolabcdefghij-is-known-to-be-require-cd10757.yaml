identifier: CDD:cd10757
label: "IolH. In B. subtilis, the iol operon iolABCDEFGHIJ  is known to be required for inositol catabolism. iolH remains uncharacterized. IolH is paralogous to both IolI and IolE. The iolI gene product is 2KMI/1-keto-DCI isomerase involved in DCI metabolism and IolE is known as 2KMI dehydratase indispensable for MI catabolism . This suggests that IolH may also act on a certain ketose as its isomerase or dehydratase. These are all members of the Xylose-isomerase-like TIM barrell superfamily."
definition: >-
  IolH. In B. subtilis, the iol operon iolABCDEFGHIJ is known to be required for inositol catabolism. iolH remains uncharacterized. IolH is paralogous to both IolI and IolE. The iolI gene product is 2KMI/1-keto-DCI isomerase involved in DCI metabolism and IolE is known as 2KMI dehydratase indispensable for MI catabolism . This suggests that IolH may also act on a certain ketose as its isomerase or dehydratase. These are all members of the Xylose-isomerase-like TIM barrell superfamily. — an NCBI CDD conserved domain (cd10757); members share this curated model.
