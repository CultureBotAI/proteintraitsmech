identifier: CDD:cd11130
label: "Homoserine O-acetyltransferase. Homoserine O-acetyltransferase catalyzes the formation of O-acetylhomoserine (OAH) in the methionine biosynthesis pathway of many bacterial, archael, and lower eukaryotic species.  This family also includes a fungal deacetylcephalosporin C acetyltransferase, which catalyses the final step in cephalosporin C biosynthesis."
definition: >-
  Homoserine O-acetyltransferase. Homoserine O-acetyltransferase catalyzes the formation of O-acetylhomoserine (OAH) in the methionine biosynthesis pathway of many bacterial, archael, and lower eukaryotic species. This family also includes a fungal deacetylcephalosporin C acetyltransferase, which catalyses the final step in cephalosporin C biosynthesis. — an NCBI CDD conserved domain (cd11130); members share this curated model.
