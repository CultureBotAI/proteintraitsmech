identifier: CDD:cd05670
label: "M20 Peptidase aminoacyclase-1 YkuR-like proteins, including YkuR and Ama/HipO/HyuC proteins. Peptidase M20 family, aminoacyclase-1 YkuR-like subfamily including YkuR and Ama/HipO/HyuC proteins, most of which have not been well characterized to date. N-terminal acetylation of proteins is a widespread and highly conserved process that is involved in the protection and stability of proteins. Several types of aminoacylases can be distinguished on the basis of substrate specificity; substrates include indoleacetic acid (IAA) N-conjugates of amino acids, N-acetyl-L-amino acids and aminobenzoylglutamate. ACY1 breaks down cytosolic aliphatic N-acyl-alpha-amino acids (except L-aspartate), especially N-acetyl-methionine and acetyl-glutamate into L-amino acids and an acyl group. However, ACY1 can also catalyze the reverse reaction, the synthesis of acetylated amino acids. ACY1 may also play a role in xenobiotic bioactivation as well as in the inter-organ processing of amino acid-conjugated xenobiotic derivatives (S-substituted-N-acetyl-L-cysteine). ACY1 appears to physically interact with Sphingosine kinase type 1 (SphK1) and may influence its physiological functions; SphK1 and its product sphingosine-1-phosphate have been shown to promote cell growth and inhibit apoptosis of tumor cells. Strong expression of the human gene and its mouse ortholog Acy1 in brain, liver, and kidney suggest a role of the enzyme in amino acid metabolism of these organs."
