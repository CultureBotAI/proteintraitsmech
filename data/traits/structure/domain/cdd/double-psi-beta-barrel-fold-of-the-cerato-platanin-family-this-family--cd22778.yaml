identifier: CDD:cd22778
label: "double-psi beta-barrel fold of the cerato-platanin family. This family represents a group of double-psi beta-barrel (DPBB) fold proteins similar to cerato-platanin, including protein SnodProt1, heat-stable 19 kDa antigen, allergen Asp f 15/Asp f 13, and Epl1 protein. They are involved in plant pathogenesis and elicitation of plant defense responses. Cerato-platanin is a phytotoxin which causes production of phytoalexin in Platanus acerifolia, P. occidentalis, and P. orientalis. It also induces cell necrosis. Cerato-platanin behaves as a fungal toxin. Protein SnodProt1 is also a phytotoxic protein. Heat-stable 19 kDa antigen is a Coccidioides-specific antigen (CS antigen) with serine proteinase activity. Epl1 protein is an elicitor of plant defence responses from Trichoderma virens."
definition: >-
