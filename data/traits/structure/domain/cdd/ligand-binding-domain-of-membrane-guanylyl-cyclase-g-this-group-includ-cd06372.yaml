identifier: CDD:cd06372
label: "Ligand-binding domain of membrane guanylyl cyclase G. This group includes the ligand-binding domain of membrane guanylyl cyclase G (GC-G) which is a sperm surface receptor and might function, similar to its sea urchin counterpart, in the early signaling event that regulates the Ca2+ influx/efflux and subsequent motility response in sperm. GC-G appears to be a pseudogene in human. Furthermore, in contrast to the other orphan receptor GCs, GC-G has a broad tissue distribution in rat, including lung, intestine, kidney, and skeletal muscle."
definition: >-
  Ligand-binding domain of membrane guanylyl cyclase G. This group includes the ligand-binding domain of membrane guanylyl cyclase G (GC-G) which is a sperm surface receptor and might function, similar to its sea urchin counterpart, in the early signaling event that regulates the Ca2+ influx/efflux and subsequent motility response in sperm. GC-G appears to be a pseudogene in human. Furthermore, in contrast to the other orphan receptor GCs, GC-G has a broad tissue distribution in rat, including lung, intestine, kidney, and skeletal muscle. — an NCBI CDD conserved domain (cd06372); members share this curated model.
