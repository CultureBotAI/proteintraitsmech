identifier: CDD:cd16190
label: "Calcium-activated neutral. CAPN3, also termed calcium-activated neutral proteinase 3 (CANP 3), or calpain L3, or calpain p94, or muscle-specific calcium-activated neutral protease 3, or new calpain 1 (nCL-1), is a calpain large subunit that is mainly expressed in skeletal muscle, or lens. The skeletal muscle-specific CAPN3 are pathologically associated with limb girdle muscular dystrophy type 2A (LGMD2A). Its autolytic activity can be positively regulated by calmodulin (CaM), a known transducer of the calcium signal. CAPN3 is also involved in human melanoma tumorigenesis and progression. It impairs cell proliferation and stimulates oxidative stress-mediated cell death in melanoma cells. Moreover, it plays an important role in sarcomere remodeling and mitochondrial protein turnover. Furthermore, the phosphorylated skeletal muscle-specific CAPN3 acts as a myofibril structural component and may participate in myofibril-based signaling pathways. In the eye, the lens-specific CAPN3, together with CAPN2, is responsible for proteolytic cleavages of alpha and beta-crystallin. Overactivated alpha and beta-crystallin can lead to cataract formation. CAPN3 exists as a homodimer, rather than a heterodimer with the calpain small subunit. It may also form heterodimers with other calpain large subunits. CAPN3 contains a long N-terminal region, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. Ca2+ binding at EF5 of the CAPN3 PEF domain is a distinct feature not observed in other calpain isoforms."
definition: >-
  Calcium-activated neutral. CAPN3, also termed calcium-activated neutral proteinase 3 (CANP 3), or calpain L3, or calpain p94, or muscle-specific calcium-activated neutral protease 3, or new calpain 1 (nCL-1), is a calpain large subunit that is mainly expressed in skeletal muscle, or lens. The skeletal muscle-specific CAPN3 are pathologically associated with limb girdle muscular dystrophy type 2A (LGMD2A). Its autolytic activity can be positively regulated by calmodulin (CaM), a known transducer of the calcium signal. CAPN3 is also involved in human melanoma tumorigenesis and progression. It impairs cell proliferation and stimulates oxidative stress-mediated cell death in melanoma cells. Moreover, it plays an important role in sarcomere remodeling and mitochondrial protein turnover. Furthermore, the phosphorylated skeletal muscle-specific CAPN3 acts as a myofibril structural component and may participate in myofibril-based signaling pathways. In the eye, the lens-specific CAPN3, together with CAPN2, is responsible for proteolytic cleavages of alpha and beta-crystallin. Overactivated alpha and beta-crystallin can lead to cataract formation. CAPN3 exists as a homodimer, rather than a heterodimer with the calpain small subunit. It may also form heterodimers with other calpain large subunits. CAPN3 contains a long N-terminal region, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. Ca2+ binding at EF5 of the CAPN3 PEF domain is a distinct feature not observed in other calpain isoforms. — an NCBI CDD conserved domain (cd16190); members share this curated model.
