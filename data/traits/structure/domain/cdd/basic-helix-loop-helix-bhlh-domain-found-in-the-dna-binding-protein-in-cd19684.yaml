identifier: CDD:cd19684
label: "basic helix-loop-helix (bHLH) domain found in the DNA-binding protein inhibitor (ID) family. The ID family includes a dominant negative group of helix-loop-helix (dnHLH) proteins, ID1-4, that are negative regulators of bHLH transcription factors. They contain the HLH-dimerization domain but lack the basic domain necessary for DNA-binding. ID proteins inhibit binding to DNA and transcriptional transactivation by heterodimerization with bHLH proteins. They also interact with many non-bHLH proteins in complex networks. ID proteins have been implicated in regulating gene expression as well as cell-cycle progression. Whereas ID-1, ID-2 and ID-3, are generally considered as tumor promoters, ID4 on the contrary has emerged as a tumor suppressor."
definition: >-
  basic helix-loop-helix (bHLH) domain found in the DNA-binding protein inhibitor (ID) family. The ID family includes a dominant negative group of helix-loop-helix (dnHLH) proteins, ID1-4, that are negative regulators of bHLH transcription factors. They contain the HLH-dimerization domain but lack the basic domain necessary for DNA-binding. ID proteins inhibit binding to DNA and transcriptional transactivation by heterodimerization with bHLH proteins. They also interact with many non-bHLH proteins in complex networks. ID proteins have been implicated in regulating gene expression as well as cell-cycle progression. Whereas ID-1, ID-2 and ID-3, are generally considered as tumor promoters, ID4 on the contrary has emerged as a tumor suppressor. — an NCBI CDD conserved domain (cd19684); members share this curated model.
