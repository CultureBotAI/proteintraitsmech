identifier: CDD:cd16993
label: "Epsin N-Terminal Homology (ENTH) domain of Yeast Ent5 and similar proteins. This subfamily is composed of one of two epsinR orthologs present in Saccharomyces cerevisiae, Epsin-5 (Ent5 or Ent5p), and similar proteins. Ent5 is required, together with Ent3 and Vps27p for ubiquitin-dependent protein sorting into the multivesicular body. It is also required for protein transport from the Trans-Golgi Network (TGN) to the vacuole. Yeast epsins contain an Epsin N-Terminal Homology (ENTH) domain, an evolutionarily conserved protein module found primarily in proteins that participate in clathrin-mediated endocytosis. ENTH domain is highly similar to the N-terminal region of the AP180 N-Terminal Homology (ANTH_N) domain. ENTH and ANTH_N domains are structurally similar to the VHS domain and are composed of a superhelix of eight alpha helices. ENTH domains bind both, inositol phospholipids with preference for PtdIns(4,5)P2, and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. ENTH domains also function in the development of membrane curvature through lipid remodeling during the formation of clathrin-coated vesicles. ENTH and ANTH (E/ANTH)-containing proteins have recently been shown to function with adaptor protein-1 and GGA adaptors at the Trans-Golgi Network, which suggests that E/ANTH domains are universal components of the machinery for clathrin-mediated membrane budding."
definition: >-
  Epsin N-Terminal Homology (ENTH) domain of Yeast Ent5 and similar proteins. This subfamily is composed of one of two epsinR orthologs present in Saccharomyces cerevisiae, Epsin-5 (Ent5 or Ent5p), and similar proteins. Ent5 is required, together with Ent3 and Vps27p for ubiquitin-dependent protein sorting into the multivesicular body. It is also required for protein transport from the Trans-Golgi Network (TGN) to the vacuole. Yeast epsins contain an Epsin N-Terminal Homology (ENTH) domain, an evolutionarily conserved protein module found primarily in proteins that participate in clathrin-mediated endocytosis. ENTH domain is highly similar to the N-terminal region of the AP180 N-Terminal Homology (ANTH_N) domain. ENTH and ANTH_N domains are structurally similar to the VHS domain and are composed of a superhelix of eight alpha helices. ENTH domains bind both, inositol phospholipids with preference for PtdIns(4,5)P2, and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. ENTH domains also function in the development of membrane curvature through lipid remodeling during the formation of clathrin-coated vesicles. ENTH and ANTH (E/ANTH)-containing proteins have recently been shown to function with adaptor protein-1 and GGA adaptors at the Trans-Golgi Network, which suggests that E/ANTH domains are universal components of the machinery for clathrin-mediated membrane budding. — an NCBI CDD conserved domain (cd16993); members share this curated model.
