identifier: CDD:cd14844
label: "Proteins similar to the zinc-containing D-Ala-D-Ala dipeptidase. The zinc D-Ala-D-Ala carboxypeptidase (Streptomyces-type) (also known as D-alanyl-D-alanine hydrolase; D-alanyl-D-alanine-cleaving carboxypeptidase; DD-carboxypeptidase; DD-carboxypeptidase-transpeptidase; Zn2+ G peptidase; G enzyme; EC 3.4.17.14) is a zinc enzyme that belongs to the peptidase M15 subfamily A. The enzyme catalyzes carboxypeptidation but not transpeptidation reactions involved in bacterial cell wall metabolism. Its specificity with substrates of the type Xaa-Yaa-Zaa shows that the enzyme requires the substrate N-terminus to be blocked and C-terminus to be free, and Yaa and Zaa should be in the D-configuration. It is weakly inhibited by beta-lactams most likely caused by the enzyme active site geometry."
definition: >-
  Proteins similar to the zinc-containing D-Ala-D-Ala dipeptidase. The zinc D-Ala-D-Ala carboxypeptidase (Streptomyces-type) (also known as D-alanyl-D-alanine hydrolase; D-alanyl-D-alanine-cleaving carboxypeptidase; DD-carboxypeptidase; DD-carboxypeptidase-transpeptidase; Zn2+ G peptidase; G enzyme; EC 3.4.17.14) is a zinc enzyme that belongs to the peptidase M15 subfamily A. The enzyme catalyzes carboxypeptidation but not transpeptidation reactions involved in bacterial cell wall metabolism. Its specificity with substrates of the type Xaa-Yaa-Zaa shows that the enzyme requires the substrate N-terminus to be blocked and C-terminus to be free, and Yaa and Zaa should be in the D-configuration. It is weakly inhibited by beta-lactams most likely caused by the enzyme active site geometry. — an NCBI CDD conserved domain (cd14844); members share this curated model.
