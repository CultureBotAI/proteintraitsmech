identifier: CDD:cd07688
label: "Immunoglobulin (Ig) constant domain the alpha chain of alpha/beta T-cell antigen receptors (TCRs). The members here are composed of the constant domain of the alpha chain of alpha/beta T-cell antigen receptors (TCRs). TCRs mediate antigen recognition by T lymphocytes and are composed of alpha and beta, or gamma and delta polypeptide chains with variable (V) and constant (C) regions. This group includes the variable domain of the alpha chain. Alpha/beta TCRs recognize antigen as peptide fragments presented by major histocompatibility complex (MHC) molecules. The antigen binding site is formed by the variable domains of the alpha and beta chains, located at the N-terminus of each chain. Alpha/beta TCRs recognize antigens differently from gamma/delta TCRs."
definition: >-
  Immunoglobulin (Ig) constant domain the alpha chain of alpha/beta T-cell antigen receptors (TCRs). The members here are composed of the constant domain of the alpha chain of alpha/beta T-cell antigen receptors (TCRs). TCRs mediate antigen recognition by T lymphocytes and are composed of alpha and beta, or gamma and delta polypeptide chains with variable (V) and constant (C) regions. This group includes the variable domain of the alpha chain. Alpha/beta TCRs recognize antigen as peptide fragments presented by major histocompatibility complex (MHC) molecules. The antigen binding site is formed by the variable domains of the alpha and beta chains, located at the N-terminus of each chain. Alpha/beta TCRs recognize antigens differently from gamma/delta TCRs. — an NCBI CDD conserved domain (cd07688); members share this curated model.
