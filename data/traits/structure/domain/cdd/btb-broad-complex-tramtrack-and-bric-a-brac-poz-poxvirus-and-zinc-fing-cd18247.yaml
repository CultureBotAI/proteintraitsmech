identifier: CDD:cd18247
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 18 (KLHL18). KLHL18 acts as a substrate-specific adaptor for a Cullin3 E3 ubiquitin-protein ligase complex that regulates mitotic entry and ubiquitylates Aurora-A. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 18 (KLHL18). KLHL18 acts as a substrate-specific adaptor for a Cullin3 E3 ubiquitin-protein ligase complex that regulates mitotic entry and ubiquitylates Aurora-A. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18247); members share this curated model.
