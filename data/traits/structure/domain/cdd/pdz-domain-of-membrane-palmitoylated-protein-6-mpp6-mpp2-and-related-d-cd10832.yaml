identifier: CDD:cd10832
label: "PDZ domain of membrane palmitoylated protein 6 (MPP6), MPP2, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MPP6, MPP2, and related domains. MPP6 (also known as MAGUK p55 subfamily member, Protein associated with Lin-7, 2 (PALS2), Veli-associated MAGUK 1, and VAM-1) is a membrane-associated guanylate kinase (MAGUK)-like protein. MPP6 is a regulator of Lin-7 expression and localization. MPP6 is also known to bind cell-adhesion protein, nectin-like molecule-2 (Necl-2), and localize to the basolateral plasma membrane in mammalian epithelial cells. MPP2 (also known as MAGUK p55 subfamily member 2) is a postsynaptic protein that links SynCAM1 cell adhesion molecules to core components of the postsynaptic density. Other members of this family include the Drosophila Vari protein, an essential basolateral septate junction protein which interacts with the cell-adhesion protein neurexin IV. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MPP6-MPP2-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
