identifier: CDD:cd23506
label: "Helix located at the middle N-terminal region of Sfi1p. Sfi1p is a single continuous alpha helix wrapped with centrins, which are calmodulin-like proteins present in centrosomes and spindle pole bodies (SPBs). Sfi1p is localized to the half-bridge of the yeast SPBs, and like Cdc31p (yeast centrin), it is required for the early steps of SPB duplication. Sfi1p contains a central domain composed of multiple conserved repeats which all can bind to Cdc31p. The Sfi1p C-terminus has an important role in separation or splitting of the duplicated SPBs during bipolar spindle assembly."
definition: >-
  Helix located at the middle N-terminal region of Sfi1p. Sfi1p is a single continuous alpha helix wrapped with centrins, which are calmodulin-like proteins present in centrosomes and spindle pole bodies (SPBs). Sfi1p is localized to the half-bridge of the yeast SPBs, and like Cdc31p (yeast centrin), it is required for the early steps of SPB duplication. Sfi1p contains a central domain composed of multiple conserved repeats which all can bind to Cdc31p. The Sfi1p C-terminus has an important role in separation or splitting of the duplicated SPBs during bipolar spindle assembly. — an NCBI CDD conserved domain (cd23506); members share this curated model.
