identifier: CDD:cd08990
label: "Glycosyl hydrolase family 43 protein, includes arabinoxylan arabinofuranohydrolase, beta-xylosidase, endo-1,4-beta-xylanase, and alpha-L-arabinofuranosidase. This subgroup includes Bacillus subtilis arabinoxylan arabinofuranohydrolase  (XynD;BsAXH-m23;BSU18160), Butyrivibrio proteoclasticus alpha-L-arabinofuranosidase (Xsa43E;bpr_I2319), Clostridium stercorarium alpha-L-arabinofuranosidase XylA, and metagenomic beta-xylosidase (EC 3.2.1.37) / alpha-L-arabinofuranosidase (EC 3.2.1.55) CoXyl43. It belongs to the glycosyl hydrolase clan F (according to carbohydrate-active enzymes database (CAZY)) which includes family 43 (GH43) and 62 (GH62) families.  The GH43_AXH-like subgroup includes enzymes that have been characterized with beta-xylosidase, alpha-L-arabinofuranosidase, endo-alpha-L-arabinanase as well as arabinoxylan arabinofuranohydrolase (AXH) activities. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. AXHs specifically hydrolyze the glycosidic bond between arabinofuranosyl substituents and xylopyranosyl backbone residues of arabinoxylan. Metagenomic beta-xylosidase/alpha-L-arabinofuranosidase CoXyl43 shows synergy with Trichoderma reesei cellulases and promotes plant biomass saccharification by degrading xylo-oligosaccharides, such as xylobiose and xylotriose, into the monosaccharide xylose. Studies show that the hydrolytic activity of CoXyl43 is stimulated in the presence of calcium. Several of these enzymes also contain carbohydrate binding modules (CBMs) that bind cellulose or xylan. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  Glycosyl hydrolase family 43 protein, includes arabinoxylan arabinofuranohydrolase, beta-xylosidase, endo-1,4-beta-xylanase, and alpha-L-arabinofuranosidase. This subgroup includes Bacillus subtilis arabinoxylan arabinofuranohydrolase (XynD;BsAXH-m23;BSU18160), Butyrivibrio proteoclasticus alpha-L-arabinofuranosidase (Xsa43E;bpr_I2319), Clostridium stercorarium alpha-L-arabinofuranosidase XylA, and metagenomic beta-xylosidase (EC 3.2.1.37) / alpha-L-arabinofuranosidase (EC 3.2.1.55) CoXyl43. It belongs to the glycosyl hydrolase clan F (according to carbohydrate-active enzymes database (CAZY)) which includes family 43 (GH43) and 62 (GH62) families. The GH43_AXH-like subgroup includes enzymes that have been characterized with beta-xylosidase, alpha-L-arabinofuranosidase, endo-alpha-L-arabinanase as well as arabinoxylan arabinofuranohydrolase (AXH) activities. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. AXHs specifically hydrolyze the glycosidic bond between arabinofuranosyl substituents and xylopyranosyl backbone residues of arabinoxylan. Metagenomic beta-xylosidase/alpha-L-arabinofuranosidase CoXyl43 shows synergy with Trichoderma reesei cellulases and promotes plant biomass saccharification by degrading xylo-oligosaccharides, such as xylobiose and xylotriose, into the monosaccharide xylose. Studies show that the hydrolytic activity of CoXyl43 is stimulated in the presence of calcium. Several of these enzymes also contain carbohydrate binding modules (CBMs) that bind cellulose or xylan. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd08990); members share this curated model.
