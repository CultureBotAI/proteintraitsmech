identifier: CDD:cd11038
label: "cytochrome P450 AurH and similar cytochrome P450s. This group includes Streptomyces thioluteus P450 monooxygenase AurH which is uniquely capable of forming a homochiral tetrahydrofuran ring, a vital component of the polyketide antibiotic aureothin. AurH catalyzes an unprecedented tandem oxygenation process: first, it catalyzes an asymmetric hydroxylation of deoxyaureothin to yield (7R)-7-hydroxydeoxyaureothin as an intermediate; and second, it mediates another C-O bond formation that leads to O-heterocyclization. The AurH-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 AurH and similar cytochrome P450s. This group includes Streptomyces thioluteus P450 monooxygenase AurH which is uniquely capable of forming a homochiral tetrahydrofuran ring, a vital component of the polyketide antibiotic aureothin. AurH catalyzes an unprecedented tandem oxygenation process: first, it catalyzes an asymmetric hydroxylation of deoxyaureothin to yield (7R)-7-hydroxydeoxyaureothin as an intermediate; and second, it mediates another C-O bond formation that leads to O-heterocyclization. The AurH-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11038); members share this curated model.
