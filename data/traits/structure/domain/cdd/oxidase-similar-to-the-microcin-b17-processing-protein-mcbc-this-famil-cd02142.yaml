identifier: CDD:cd02142
label: "oxidase similar to the microcin B17 processing protein McbC. This family is the oxidase domain of NRPS (non-ribosomal peptide synthetase) and other systems that modify polypeptides by cyclizing a thioester to form a ring. These include EpoB, part of the epothilone biosynthesis pathway; TubD, part of the tubulysin biosynthesis pathway, MtsD, part of the myxothiozol biosynthesis pathway; IndC, part of the indigoidine biosynthesis pathway and TfxB, part of the trifitoxin processing pathway. All are FMN-dependent and oxidize the product of the cyclization of thioesters in short polypeptides."
definition: >-
  oxidase similar to the microcin B17 processing protein McbC. This family is the oxidase domain of NRPS (non-ribosomal peptide synthetase) and other systems that modify polypeptides by cyclizing a thioester to form a ring. These include EpoB, part of the epothilone biosynthesis pathway; TubD, part of the tubulysin biosynthesis pathway, MtsD, part of the myxothiozol biosynthesis pathway; IndC, part of the indigoidine biosynthesis pathway and TfxB, part of the trifitoxin processing pathway. All are FMN-dependent and oxidize the product of the cyclization of thioesters in short polypeptides. — an NCBI CDD conserved domain (cd02142); members share this curated model.
