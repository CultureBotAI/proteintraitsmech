identifier: CDD:cd24107
label: "nucleotide-binding domain (NBD) of benzoyl-CoA reductase, bzd-type, BzdP subunit and similar proteins. bzd-type benzoyl-CoA reductase BzdP is encoded by the gene bzdP from a benzoate-inducible catabolic operon in Azoarcus sp. The bzd-type benzoyl-CoA reductase system catalyzes the dearomatization of benzoyl-CoA, a common intermediate in pathways for the degradation for several different aromatic compounds, such as phenol and toluene. BzdP may function the same as the D subunit of benzoyl-CoA reductase BcrD from Thauera aromatica and benzoyl-CoA reductase BadG from Rhodopseudomonas palustris."
definition: >-
