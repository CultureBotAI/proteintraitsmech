identifier: CDD:cd20881
label: "protein kinase C conserved region 1 (C1 domain) found in SH3 and cysteine-rich domain-containing protein 2 (Stac2) and similar proteins. Stac2, also called 24b2/Stac2, or Src homology 3 and cysteine-rich domain-containing protein 2, plays a redundant role in promoting the expression of calcium channel CACNA1S at the cell membrane, and thereby contributes to increased channel activity. It slows down the inactivation rate of the calcium channel CACNA1C. Stac2 contains a cysteine-rich C1 domain and one SH3 domain at the C-terminus. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in SH3 and cysteine-rich domain-containing protein 2 (Stac2) and similar proteins. Stac2, also called 24b2/Stac2, or Src homology 3 and cysteine-rich domain-containing protein 2, plays a redundant role in promoting the expression of calcium channel CACNA1S at the cell membrane, and thereby contributes to increased channel activity. It slows down the inactivation rate of the calcium channel CACNA1C. Stac2 contains a cysteine-rich C1 domain and one SH3 domain at the C-terminus. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20881); members share this curated model.
