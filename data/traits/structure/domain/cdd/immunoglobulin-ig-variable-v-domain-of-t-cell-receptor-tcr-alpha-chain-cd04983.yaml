identifier: CDD:cd04983
label: "Immunoglobulin (Ig) variable (V) domain of T-cell receptor (TCR) alpha chain and similar proteins. The members here are composed of the immunoglobulin (Ig) variable domain of the alpha chain of alpha/beta T-cell antigen receptors (TCRs). TCRs mediate antigen recognition by T lymphocytes, and are composed of alpha and beta, or gamma and delta polypeptide chains with variable (V) and constant (C) regions. This group represents the variable domain of the alpha chain of TCRs and also includes the variable domain of delta chains of TCRs. Alpha/beta TCRs recognize antigen as peptide fragments presented by major histocompatibility complex (MHC) molecules. The variable domain of TCRs is responsible for antigen recognition, and is located at the N-terminus of the receptor.  Gamma/delta TCRs recognize intact protein antigens directly without antigen processing and recognize MHC independently of the bound peptide. Members of this group contain standard Ig superfamily V-set AGFCC'C\"/DEB domain topology."
definition: >-
  Immunoglobulin (Ig) variable (V) domain of T-cell receptor (TCR) alpha chain and similar proteins. The members here are composed of the immunoglobulin (Ig) variable domain of the alpha chain of alpha/beta T-cell antigen receptors (TCRs). TCRs mediate antigen recognition by T lymphocytes, and are composed of alpha and beta, or gamma and delta polypeptide chains with variable (V) and constant (C) regions. This group represents the variable domain of the alpha chain of TCRs and also includes the variable domain of delta chains of TCRs. Alpha/beta TCRs recognize antigen as peptide fragments presented by major histocompatibility complex (MHC) molecules. The variable domain of TCRs is responsible for antigen recognition, and is located at the N-terminus of the receptor. Gamma/delta TCRs recognize intact protein antigens directly without antigen processing and recognize MHC independently of the bound peptide. Members of this group contain standard Ig superfamily V-set AGFCC'C"/DEB domain topology. — an NCBI CDD conserved domain (cd04983); members share this curated model.
