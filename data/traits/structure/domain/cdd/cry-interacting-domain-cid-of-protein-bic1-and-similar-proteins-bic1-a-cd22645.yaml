identifier: CDD:cd22645
label: "CRY-interacting domain (CID) of protein BIC1 and similar proteins. BIC1, also called BLUE-LIGHT INHIBITOR OF CRYPTOCHROMES 1, interacts with photoexited CRY2 to inhibit its activity. It regulates the blue-light dependent dimerization of CRY2 and formation of photobodies. BIC1 inhibits CRY phosphorylation. This model corresponds to CRY-interacting domain (CID) of BIC1."
definition: >-
  CRY-interacting domain (CID) of protein BIC1 and similar proteins. BIC1, also called BLUE-LIGHT INHIBITOR OF CRYPTOCHROMES 1, interacts with photoexited CRY2 to inhibit its activity. It regulates the blue-light dependent dimerization of CRY2 and formation of photobodies. BIC1 inhibits CRY phosphorylation. This model corresponds to CRY-interacting domain (CID) of BIC1. — an NCBI CDD conserved domain (cd22645); members share this curated model.
