identifier: CDD:cd20201
label: "DNA-binding domain of T-box transcription factor 19 and related T-box proteins. Tbx19 (also known as Tpit) is a T-box factor restricted to two pituitary (pro-opiomelanocortin) POMC-expressing lineages, the corticotrophs and melanotrophs; it controls terminal differentiation of these lineages. TBX19 activates POMC gene transcription with the cooperation of another transcription factor Pitx1. Mutations of the human TPIT gene cause early onset pituitary adrenocorticotrophic hormone (ACTH) deficiency. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of T-box transcription factor 19 and related T-box proteins. Tbx19 (also known as Tpit) is a T-box factor restricted to two pituitary (pro-opiomelanocortin) POMC-expressing lineages, the corticotrophs and melanotrophs; it controls terminal differentiation of these lineages. TBX19 activates POMC gene transcription with the cooperation of another transcription factor Pitx1. Mutations of the human TPIT gene cause early onset pituitary adrenocorticotrophic hormone (ACTH) deficiency. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20201); members share this curated model.
