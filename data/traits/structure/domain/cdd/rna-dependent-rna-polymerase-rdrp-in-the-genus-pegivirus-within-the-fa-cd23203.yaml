identifier: CDD:cd23203
label: "RNA-dependent RNA polymerase (RdRp) in the genus Pegivirus, within the family Flaviviridae of positive-sense single-stranded RNA (+ssRNA) viruses. This group contains the RdRp of RNA viruses belonging to the Pegivirus genus within the family Flaviviridae, order Amarillovirales. Members of the Pegivirus genus are widely distributed in a range of mammalian species, in which they cause persistent infections. To date, they have not been clearly associated with disease. Virions of Pegivirus have a single, small, basic capsid (C) protein and two envelope proteins. They contain a single, long ORF flanked by 5'- and 3'-terminal non-coding regions, which form specific secondary structures required for genome replication and translation. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  RNA-dependent RNA polymerase (RdRp) in the genus Pegivirus, within the family Flaviviridae of positive-sense single-stranded RNA (+ssRNA) viruses. This group contains the RdRp of RNA viruses belonging to the Pegivirus genus within the family Flaviviridae, order Amarillovirales. Members of the Pegivirus genus are widely distributed in a range of mammalian species, in which they cause persistent infections. To date, they have not been clearly associated with disease. Virions of Pegivirus have a single, small, basic capsid (C) protein and two envelope proteins. They contain a single, long ORF flanked by 5'- and 3'-terminal non-coding regions, which form specific secondary structures required for genome replication and translation. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23203); members share this curated model.
