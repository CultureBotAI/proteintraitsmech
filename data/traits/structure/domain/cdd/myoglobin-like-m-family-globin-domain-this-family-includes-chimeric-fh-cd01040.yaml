identifier: CDD:cd01040
label: "myoglobin-like; M family globin domain. This family includes chimeric (FHbs/flavohemoglobins) and single-domain globins: FHbs, Ngbs/neuroglobins, Cygb/cytoglobins, GbE/avian eye specific globin E, GbX/globin X, amphibian GbY/globin Y, Mb/myoglobin, HbA/hemoglobin-alpha, HbB/hemoglobin-beta, SDgbs/single-domain globins related to FHbs, and Adgb/androglobin. The M family exhibits the canonical secondary structure of hemoglobins, a 3-over-3 alpha-helical sandwich structure (3/3 Mb-fold), built by eight alpha-helical segments (named A through H). In Adgbs, the globin domain is split into two: helices C-H are followed by helices A-B and the two parts are separated by the IQ motif. Although rearranged, the globin domain of most Adgbs contains a number of conserved residues which play critical roles in heme-coordination and gas ligand binding. Adgbs have been omitted from this A-H helix cd."
definition: >-
  myoglobin-like; M family globin domain. This family includes chimeric (FHbs/flavohemoglobins) and single-domain globins: FHbs, Ngbs/neuroglobins, Cygb/cytoglobins, GbE/avian eye specific globin E, GbX/globin X, amphibian GbY/globin Y, Mb/myoglobin, HbA/hemoglobin-alpha, HbB/hemoglobin-beta, SDgbs/single-domain globins related to FHbs, and Adgb/androglobin. The M family exhibits the canonical secondary structure of hemoglobins, a 3-over-3 alpha-helical sandwich structure (3/3 Mb-fold), built by eight alpha-helical segments (named A through H). In Adgbs, the globin domain is split into two: helices C-H are followed by helices A-B and the two parts are separated by the IQ motif. Although rearranged, the globin domain of most Adgbs contains a number of conserved residues which play critical roles in heme-coordination and gas ligand binding. Adgbs have been omitted from this A-H helix cd. — an NCBI CDD conserved domain (cd01040); members share this curated model.
