identifier: CDD:cd09505
label: "SAM domain of WDSUB1 proteins. SAM (sterile alpha motif) domain of WDSUB1 subfamily proteins is a putative protein-protein interaction domain. Proteins of this group contain multiple domains: SAM, one or more WD40 repeats and U-box (derived version of the RING-finger domain). Apparently the WDSUB1 subfamily proteins participate in protein degradation through ubiquitination, since U-box domain are known as a member of E3 ubiquitin ligase family, while SAM and WD40 domains most probably are responsible for an E2 ubiquitin-conjugating enzyme binding and a target protein binding."
definition: >-
  SAM domain of WDSUB1 proteins. SAM (sterile alpha motif) domain of WDSUB1 subfamily proteins is a putative protein-protein interaction domain. Proteins of this group contain multiple domains: SAM, one or more WD40 repeats and U-box (derived version of the RING-finger domain). Apparently the WDSUB1 subfamily proteins participate in protein degradation through ubiquitination, since U-box domain are known as a member of E3 ubiquitin ligase family, while SAM and WD40 domains most probably are responsible for an E2 ubiquitin-conjugating enzyme binding and a target protein binding. — an NCBI CDD conserved domain (cd09505); members share this curated model.
