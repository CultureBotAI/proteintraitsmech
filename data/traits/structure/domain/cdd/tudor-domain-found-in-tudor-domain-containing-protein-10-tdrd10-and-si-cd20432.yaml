identifier: CDD:cd20432
label: "Tudor domain found in Tudor domain-containing protein 10 (TDRD10) and similar proteins. TDRD10 is widely expressed and localized both to the nucleus and cytoplasm, and may play general roles like regulation of RNA metabolism. It contains a Tudor domain and an RNA recognition motif (RRM). The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Tudor domain-containing protein 10 (TDRD10) and similar proteins. TDRD10 is widely expressed and localized both to the nucleus and cytoplasm, and may play general roles like regulation of RNA metabolism. It contains a Tudor domain and an RNA recognition motif (RRM). The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20432); members share this curated model.
