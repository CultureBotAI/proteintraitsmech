identifier: CDD:cd11577
label: "Glycoside hydrolase family 71. This family of glycoside hydrolases 71 (following the CAZY nomenclature) function as alpha-1,3-glucanases (mutanases, EC 3.2.1.59). They appear to have an endo-hydrolytic mode of enzymatic activity and bacterial members are investigated as candidates for the development of dental caries treatments.The member from fission yeast, endo-alpha-1,3-glucanase Agn1p, plays a vital role in daughter cell separation, while Agn2p has been associated with endolysis of the ascus wall."
definition: >-
  Glycoside hydrolase family 71. This family of glycoside hydrolases 71 (following the CAZY nomenclature) function as alpha-1,3-glucanases (mutanases, EC 3.2.1.59). They appear to have an endo-hydrolytic mode of enzymatic activity and bacterial members are investigated as candidates for the development of dental caries treatments.The member from fission yeast, endo-alpha-1,3-glucanase Agn1p, plays a vital role in daughter cell separation, while Agn2p has been associated with endolysis of the ascus wall. — an NCBI CDD conserved domain (cd11577); members share this curated model.
