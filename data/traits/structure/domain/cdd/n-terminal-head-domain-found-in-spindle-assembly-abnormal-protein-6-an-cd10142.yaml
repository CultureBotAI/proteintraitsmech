identifier: CDD:cd10142
label: "N-terminal head domain found in spindle assembly abnormal protein 6 and similar proteins. Spindle assembly abnormal protein 6 (SAS6) is a central scaffolding component of the centrioles that ensures their 9-fold symmetry. It is required for centrosome biogenesis and duplication, and is required for both mother-centriole-dependent centriole duplication and deuterosome-dependent centriole amplification in multiciliated cells. It is also required for the recruitment of microcephaly protein STIL to the procentriole and for STIL-mediated centriole amplification. SAS6 is comprised of an N-terminal globular head domain, a centrally located coiled-coil domain, and a disordered C-terminus. These monomers homodimerize symmetrically, through two dimerization domains, the N-terminal globular head domains and long extended alpha-helical coiled-coil regions. These homodimers can self-assemble into a 9-fold symmetric cartwheel structure comprised of nine SAS6 homodimers associated via their head domains; the dimerized coiled-coil domains being the spokes, the central hub being the head domains. This model corresponds to the N-terminal head domain of SAS6, which is structurally related to other XRCC4-superfamily members, XRCC4, PAXX, XLF and CCDC61."
definition: >-
  N-terminal head domain found in spindle assembly abnormal protein 6 and similar proteins. Spindle assembly abnormal protein 6 (SAS6) is a central scaffolding component of the centrioles that ensures their 9-fold symmetry. It is required for centrosome biogenesis and duplication, and is required for both mother-centriole-dependent centriole duplication and deuterosome-dependent centriole amplification in multiciliated cells. It is also required for the recruitment of microcephaly protein STIL to the procentriole and for STIL-mediated centriole amplification. SAS6 is comprised of an N-terminal globular head domain, a centrally located coiled-coil domain, and a disordered C-terminus. These monomers homodimerize symmetrically, through two dimerization domains, the N-terminal globular head domains and long extended alpha-helical coiled-coil regions. These homodimers can self-assemble into a 9-fold symmetric cartwheel structure comprised of nine SAS6 homodimers associated via their head domains; the dimerized coiled-coil domains being the spokes, the central hub being the head domains. This model corresponds to the N-terminal head domain of SAS6, which is structurally related to other XRCC4-superfamily members, XRCC4, PAXX, XLF and CCDC61. — an NCBI CDD conserved domain (cd10142); members share this curated model.
