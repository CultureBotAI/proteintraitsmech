identifier: CDD:cd06670
label: "PDZ domain 6 of multi-PDZ-domain protein 1 (MUPP1) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 6 of multi-PDZ-domain protein 1 (MUPP1). MUPP1 and PATJ serve as scaffolding proteins linking different proteins and protein complexes involved in the organization of tight junctions and epithelial polarity. MUPP1 contains an L27 (Lin-2 and Lin-7 binding) domain and 13 PDZ domains. PATJ (also known as INAD-like) contains an L27 domain and ten PDZ domains. PATJ lacks 3 PDZ domains seen in MUPP1: PDZ6, PDZ9, and PDZ13. This MuPP1-like PDZ6 domain is therefore absent from PATJ. MUPP1 and PATJ share several binding partners, including junctional adhesion molecules (JAM), zonula occludens (ZO)-3, Pals1 (protein associated with Lin-7), Par (partitioning defective)-6 proteins, and nectins (adherence junction adhesion molecules). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MUPP1-like family PDZ6 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F"
definition: >-
  PDZ domain 6 of multi-PDZ-domain protein 1 (MUPP1) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 6 of multi-PDZ-domain protein 1 (MUPP1). MUPP1 and PATJ serve as scaffolding proteins linking different proteins and protein complexes involved in the organization of tight junctions and epithelial polarity. MUPP1 contains an L27 (Lin-2 and Lin-7 binding) domain and 13 PDZ domains. PATJ (also known as INAD-like) contains an L27 domain and ten PDZ domains. PATJ lacks 3 PDZ domains seen in MUPP1: PDZ6, PDZ9, and PDZ13. This MuPP1-like PDZ6 domain is therefore absent from PATJ. MUPP1 and PATJ share several binding partners, including junctional adhesion molecules (JAM), zonula occludens (ZO)-3, Pals1 (protein associated with Lin-7), Par (partitioning defective)-6 proteins, and nectins (adherence junction adhesion molecules). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MUPP1-like family PDZ6 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F — an NCBI CDD conserved domain (cd06670); members share this curated model.
