identifier: CDD:cd19641
label: "Porin OprB domain. Pseudomonads and related soil bacteria are characterized by a lack of large-channel porins in the outer membrane. Instead it has substrate-specific channels mediate uptake of nutrients and ions OprB is an OM channel that is part of a high affinity uptake system for monosaccharides. OprB forms a monomeric 16-stranded beta-barrel with a novel pore constriction. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface."
definition: >-
  Porin OprB domain. Pseudomonads and related soil bacteria are characterized by a lack of large-channel porins in the outer membrane. Instead it has substrate-specific channels mediate uptake of nutrients and ions OprB is an OM channel that is part of a high affinity uptake system for monosaccharides. OprB forms a monomeric 16-stranded beta-barrel with a novel pore constriction. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. — an NCBI CDD conserved domain (cd19641); members share this curated model.
