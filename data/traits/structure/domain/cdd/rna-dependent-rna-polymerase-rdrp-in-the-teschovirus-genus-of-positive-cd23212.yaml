identifier: CDD:cd23212
label: "RNA-dependent RNA polymerase (RdRp) in the Teschovirus genus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the RdRp of RNA viruses belonging to the Teschovirus genus within the family Picornaviridae, order Picornavirales. Member viruses have a (+)ssRNA genome.  Teschoviruses are emerging pathogens and infect the porcine population only. There are two species in this genus, including Teschovirus A (previously Porcine teschovirus), which is responsible for the porcine enteroviral encephalomyelitis disease caused in pigs, and Teschovirus B. Teschovirus is also known by several other names including Teschen disease, Talfan disease, poliomyelitis suum, benign enzootic paresis, Klobauk disease and contagious porcine paralysis. Teschovirus has a single-stranded, linear, non-segmented RNA genome. The RNA genome is positively sensed meaning that it has the same polarity as the mRNA and no reverse transcription is necessary. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  RNA-dependent RNA polymerase (RdRp) in the Teschovirus genus of positive-sense single-stranded RNA [(+)ssRNA] viruses, within the family Picornaviridae. This group contains the RdRp of RNA viruses belonging to the Teschovirus genus within the family Picornaviridae, order Picornavirales. Member viruses have a (+)ssRNA genome. Teschoviruses are emerging pathogens and infect the porcine population only. There are two species in this genus, including Teschovirus A (previously Porcine teschovirus), which is responsible for the porcine enteroviral encephalomyelitis disease caused in pigs, and Teschovirus B. Teschovirus is also known by several other names including Teschen disease, Talfan disease, poliomyelitis suum, benign enzootic paresis, Klobauk disease and contagious porcine paralysis. Teschovirus has a single-stranded, linear, non-segmented RNA genome. The RNA genome is positively sensed meaning that it has the same polarity as the mRNA and no reverse transcription is necessary. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23212); members share this curated model.
