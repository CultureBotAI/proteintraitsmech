identifier: CDD:cd06717
label: "PDZ domain of segment polarity protein dishevelled homolog DVL1, DVL2, DVL3, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of DVL1-3, and related domains. The dishevelleds (DVL1, 2 and 3 in humans) act downstream of Frizzled (FZD) receptors in both the canonical and non-canonical WNT signaling pathway; they bind the cytoplasmic C-terminus of frizzled family members and transduce the Wnt signal to down-stream effectors. They bind to several proteins known to modulate Wnt signaling. Binding partners of the DVL1 PDZ domain include nucleoredoxin (NXN), Van Gogh-like (VANGL1), Wnt receptor RYK, Dapper 1 (DACT1), Frizzled7 (FZD7), transmembrane protein 88 (TMEM88), Daple (dishevelled-associating protein with a high frequency of leucines), also known as Ccdc88c), and cysteine-rich protein Idax. The DVL2 PDZ domain has been shown to bind the nuclear export signal sequence of the DVL2 protein. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This DVL-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
