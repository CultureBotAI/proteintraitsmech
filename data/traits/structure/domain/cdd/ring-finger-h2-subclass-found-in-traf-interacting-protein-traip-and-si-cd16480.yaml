identifier: CDD:cd16480
label: "RING finger, H2 subclass, found in TRAF-interacting protein (TRAIP) and similar proteins. TRAIP, also known as RING finger protein 206 (RNF206) or TRIP, is a ubiquitously expressed nucleolar E3 ubiquitin ligase important for cellular proliferation and differentiation. It is found near mitotic chromosomes and functions as a regulator of the spindle assembly checkpoint. TRAIP interacts with tumor necrosis factor (TNF)-receptor-associated factor (TRAF) proteins and inhibits TNF-alpha-mediated nuclear factor (NF)-kappaB activation. It also interacts with two tumor suppressors CYLD and spleen tyrosine kinase (Syk), and DNA polymerase eta, which facilitates translesional synthesis after DNA damage. TRAIP contains an N-terminal C3H2C2-type RING-H2 finger and an extended coiled-coil domain."
definition: >-
  RING finger, H2 subclass, found in TRAF-interacting protein (TRAIP) and similar proteins. TRAIP, also known as RING finger protein 206 (RNF206) or TRIP, is a ubiquitously expressed nucleolar E3 ubiquitin ligase important for cellular proliferation and differentiation. It is found near mitotic chromosomes and functions as a regulator of the spindle assembly checkpoint. TRAIP interacts with tumor necrosis factor (TNF)-receptor-associated factor (TRAF) proteins and inhibits TNF-alpha-mediated nuclear factor (NF)-kappaB activation. It also interacts with two tumor suppressors CYLD and spleen tyrosine kinase (Syk), and DNA polymerase eta, which facilitates translesional synthesis after DNA damage. TRAIP contains an N-terminal C3H2C2-type RING-H2 finger and an extended coiled-coil domain. — an NCBI CDD conserved domain (cd16480); members share this curated model.
