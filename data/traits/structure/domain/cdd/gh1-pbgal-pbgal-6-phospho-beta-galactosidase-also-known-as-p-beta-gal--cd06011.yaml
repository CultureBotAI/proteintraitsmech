identifier: CDD:cd06011
label: "GH1_PBGal. PBGal (6-phospho-beta-galactosidase, also known as P-beta-GAL, or PGALase) is a glycosyl hydrolase family 1 (GH1) enzyme from bacteria that hydrolyzes lactose-6-phosphate, a product of the phosphoenolpyruvate-dependent phosphotransferase system, to yield glucose and galactose-6-phosphate.  The galactose 6-phosphate formed is further metabolized via the tagatose 6-phosphate pathway.  PBGAL was first discovered in Staphylococcus aureus and the same catalytic activity was later demonstrated in Lactococci and Lactobacilli.  This CD includes two closely related P-beta-Gal's from Lactobacillus gasseri and one from Lactococcus lactis."
definition: >-
  GH1_PBGal. PBGal (6-phospho-beta-galactosidase, also known as P-beta-GAL, or PGALase) is a glycosyl hydrolase family 1 (GH1) enzyme from bacteria that hydrolyzes lactose-6-phosphate, a product of the phosphoenolpyruvate-dependent phosphotransferase system, to yield glucose and galactose-6-phosphate. The galactose 6-phosphate formed is further metabolized via the tagatose 6-phosphate pathway. PBGAL was first discovered in Staphylococcus aureus and the same catalytic activity was later demonstrated in Lactococci and Lactobacilli. This CD includes two closely related P-beta-Gal's from Lactobacillus gasseri and one from Lactococcus lactis. — an NCBI CDD conserved domain (cd06011); members share this curated model.
