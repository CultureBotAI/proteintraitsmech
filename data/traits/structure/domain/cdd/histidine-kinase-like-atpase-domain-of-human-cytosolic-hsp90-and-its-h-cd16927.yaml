identifier: CDD:cd16927
label: "Histidine kinase-like ATPase domain of human cytosolic Hsp90 and its homologs including Escherichia coli HtpG, and related domains. This family includes the histidine kinase-like ATPase (HATPase) domains of 90 kilodalton heat-shock protein (Hsp90) eukaryotic homologs including cytosolic Hsp90, mitochondrial TRAP1 (tumor necrosis factor receptor-associated protein 1), GRP94 (94 kDa glucose-regulated protein) of the endoplasmic reticulum (ER), and chloroplast Hsp90C. It also includes the bacterial homologs of Hsp90, known as HtpG (High temperature protein G). Hsp90 family of chaperones assist other proteins to fold correctly, stabilizes them against heat stress, and aids in protein degradation."
definition: >-
  Histidine kinase-like ATPase domain of human cytosolic Hsp90 and its homologs including Escherichia coli HtpG, and related domains. This family includes the histidine kinase-like ATPase (HATPase) domains of 90 kilodalton heat-shock protein (Hsp90) eukaryotic homologs including cytosolic Hsp90, mitochondrial TRAP1 (tumor necrosis factor receptor-associated protein 1), GRP94 (94 kDa glucose-regulated protein) of the endoplasmic reticulum (ER), and chloroplast Hsp90C. It also includes the bacterial homologs of Hsp90, known as HtpG (High temperature protein G). Hsp90 family of chaperones assist other proteins to fold correctly, stabilizes them against heat stress, and aids in protein degradation. — an NCBI CDD conserved domain (cd16927); members share this curated model.
