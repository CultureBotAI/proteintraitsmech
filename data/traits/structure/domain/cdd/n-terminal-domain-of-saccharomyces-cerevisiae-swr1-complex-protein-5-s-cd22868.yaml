identifier: CDD:cd22868
label: "N-terminal domain of Saccharomyces cerevisiae SWR1-complex protein 5 (Swc5), and similar proteins. SWR1-complex protein 5 (Swc5) is involved in chromosome stability. It is a component of the SWR1 complex which mediates the ATP-dependent exchange of histone H2A for the H2A variant HZT1, leading to transcriptional regulation of selected genes by chromatin remodeling. This model corresponds to a conserved D/E-rich region at the N-terminus of Swc5, which contains two consecutive DEF/Y motifs (defined here as 5 to 6 D or E residues followed by an aromatic F or Y residue). This region is responsible for the interaction with A-B dimer and participates in the eviction step of H2A-to-H2A.Z exchange reaction."
definition: >-
  N-terminal domain of Saccharomyces cerevisiae SWR1-complex protein 5 (Swc5), and similar proteins. SWR1-complex protein 5 (Swc5) is involved in chromosome stability. It is a component of the SWR1 complex which mediates the ATP-dependent exchange of histone H2A for the H2A variant HZT1, leading to transcriptional regulation of selected genes by chromatin remodeling. This model corresponds to a conserved D/E-rich region at the N-terminus of Swc5, which contains two consecutive DEF/Y motifs (defined here as 5 to 6 D or E residues followed by an aromatic F or Y residue). This region is responsible for the interaction with A-B dimer and participates in the eviction step of H2A-to-H2A.Z exchange reaction. — an NCBI CDD conserved domain (cd22868); members share this curated model.
