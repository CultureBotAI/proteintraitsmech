identifier: CDD:cd16075
label: "C-terminal domain of the eukaryotic origin recognition complex subunit ORC6. In eukaryotes, a complex consisting of six subunits promotes the onset of DNA replication. The 6th subunit, ORC6, does not belong to the wider AAA+ family of nucleotide hydrolases, but contains a tandemly repeated domain resembling the transcription factor TFIIB, as well as this C-terminal domain which harbors a helical segment that is responsible for interactions with the complex by binding to ORC3. Mutations in this C-terminal helix interfere with the formation of the ORC and have been linked to Meier-Gorlin syndrome, a dwarfism disorder."
definition: >-
  C-terminal domain of the eukaryotic origin recognition complex subunit ORC6. In eukaryotes, a complex consisting of six subunits promotes the onset of DNA replication. The 6th subunit, ORC6, does not belong to the wider AAA+ family of nucleotide hydrolases, but contains a tandemly repeated domain resembling the transcription factor TFIIB, as well as this C-terminal domain which harbors a helical segment that is responsible for interactions with the complex by binding to ORC3. Mutations in this C-terminal helix interfere with the formation of the ORC and have been linked to Meier-Gorlin syndrome, a dwarfism disorder. — an NCBI CDD conserved domain (cd16075); members share this curated model.
