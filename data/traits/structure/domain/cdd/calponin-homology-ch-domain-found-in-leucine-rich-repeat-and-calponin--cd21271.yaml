label: "calponin homology (CH) domain found in leucine-rich repeat and calponin homology domain-containing protein 2. Leucine-rich repeat and calponin homology domain-containing protein 2 (LRCH2) may play a role in the organization of the cytoskeleton. It contains a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs."
