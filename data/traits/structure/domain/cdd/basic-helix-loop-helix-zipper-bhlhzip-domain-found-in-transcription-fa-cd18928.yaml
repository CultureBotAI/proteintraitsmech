identifier: CDD:cd18928
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in transcription factor E3 (TFE3) and similar proteins. TFE3, also termed Class E basic helix-loop-helix protein 33 (bHLHe33), is a bHLHzip transcription factor that is involved in B cell function. It specifically recognizes and binds E-box sequences (5'-CANNTG-3'). Its efficient DNA-binding requires dimerization with itself or with another MiT/TFE family member such as TFEB or MITF."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in transcription factor E3 (TFE3) and similar proteins. TFE3, also termed Class E basic helix-loop-helix protein 33 (bHLHe33), is a bHLHzip transcription factor that is involved in B cell function. It specifically recognizes and binds E-box sequences (5'-CANNTG-3'). Its efficient DNA-binding requires dimerization with itself or with another MiT/TFE family member such as TFEB or MITF. — an NCBI CDD conserved domain (cd18928); members share this curated model.
