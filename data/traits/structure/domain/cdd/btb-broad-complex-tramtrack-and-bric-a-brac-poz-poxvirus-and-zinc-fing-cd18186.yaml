identifier: CDD:cd18186
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing (ZBTB) proteins, Kelch-like (KLHL) proteins, and similar proteins. This family includes a variety of BTB/POZ domain-containing proteins, such as zinc finger and BTB domain-containing (ZBTB) proteins and Kelch-like (KLHL) proteins. They have diverse functions, such as transcriptional regulation, chromatin remodeling, protein degradation and cytoskeletal regulation. Many BTB/POZ proteins contain one or two additional domains, such as kelch repeats, zinc-finger domains, FYVE (Fab1, YOTB, Vac1, and EEA1) fingers, or ankyrin repeats. These special additional domains or interaction partners provide unique characteristics and functions to BTB/POZ proteins. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing (ZBTB) proteins, Kelch-like (KLHL) proteins, and similar proteins. This family includes a variety of BTB/POZ domain-containing proteins, such as zinc finger and BTB domain-containing (ZBTB) proteins and Kelch-like (KLHL) proteins. They have diverse functions, such as transcriptional regulation, chromatin remodeling, protein degradation and cytoskeletal regulation. Many BTB/POZ proteins contain one or two additional domains, such as kelch repeats, zinc-finger domains, FYVE (Fab1, YOTB, Vac1, and EEA1) fingers, or ankyrin repeats. These special additional domains or interaction partners provide unique characteristics and functions to BTB/POZ proteins. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18186); members share this curated model.
