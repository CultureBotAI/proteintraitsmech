identifier: CDD:cd20282
label: "dimethylsulfoniopropionate lyase DddQ, cupin domain. Dimethylsulfoniopropionate (DMSP) is produced worldwide in large amounts, mainly by marine phytoplankton and macroalgae. DMSP lyase catalyzes the cleavage of DMSP to generate the volatile dimethyl sulfide (DMS) and plays a major role in the biogeochemical cycling of sulfur. When released into the atmosphere from the oceans, DMS is oxidized, forming cloud condensation nuclei that may influence weather and climate. DMSP lyase belongs to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  dimethylsulfoniopropionate lyase DddQ, cupin domain. Dimethylsulfoniopropionate (DMSP) is produced worldwide in large amounts, mainly by marine phytoplankton and macroalgae. DMSP lyase catalyzes the cleavage of DMSP to generate the volatile dimethyl sulfide (DMS) and plays a major role in the biogeochemical cycling of sulfur. When released into the atmosphere from the oceans, DMS is oxidized, forming cloud condensation nuclei that may influence weather and climate. DMSP lyase belongs to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20282); members share this curated model.
