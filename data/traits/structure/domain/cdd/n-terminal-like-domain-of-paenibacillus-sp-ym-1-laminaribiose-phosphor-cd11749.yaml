identifier: CDD:cd11749
label: "N-terminal-like domain of Paenibacillus sp. YM-1 Laminaribiose Phosphorylase and similar proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes bacterial laminaribiose phosphorylase. This N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel]. Bacterial laminaribiose phosphorylase phosphorolyzes laminaribiose into alpha-glucose 1-phosphate and glucose, but does not phosphorolyze other glucobioses; it slightly phosphorolyzed laminaritriose and higher laminarioligosaccharides. The GH64N domain, as represented by this model, is also found at the N-terminus of GH94 members with uncharacterized specificities."
definition: >-
  N-terminal-like domain of Paenibacillus sp. YM-1 Laminaribiose Phosphorylase and similar proteins. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes bacterial laminaribiose phosphorylase. This N-terminal domain is involved in oligomerization and may play a role in catalysis, but it is separate from the catalytic domain [an (alpha/alpha)(6) barrel]. Bacterial laminaribiose phosphorylase phosphorolyzes laminaribiose into alpha-glucose 1-phosphate and glucose, but does not phosphorolyze other glucobioses; it slightly phosphorolyzed laminaritriose and higher laminarioligosaccharides. The GH64N domain, as represented by this model, is also found at the N-terminus of GH94 members with uncharacterized specificities. — an NCBI CDD conserved domain (cd11749); members share this curated model.
