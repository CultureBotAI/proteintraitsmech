identifier: CDD:cd20045
label: "Forkhead (FH) domain found in Forkhead box protein C2 (FOXC2) and similar proteins. FOXC2, also called Forkhead-related protein FKHL14, Mesenchyme fork head protein 1 (MFH-1 protein), or transcription factor FKH-14, acts as a transcriptional activator that might be involved in the formation of special mesenchymal tissues. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein C2 (FOXC2) and similar proteins. FOXC2, also called Forkhead-related protein FKHL14, Mesenchyme fork head protein 1 (MFH-1 protein), or transcription factor FKH-14, acts as a transcriptional activator that might be involved in the formation of special mesenchymal tissues. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20045); members share this curated model.
