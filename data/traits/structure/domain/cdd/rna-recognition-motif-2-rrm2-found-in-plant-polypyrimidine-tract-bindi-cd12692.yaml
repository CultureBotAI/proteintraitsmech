identifier: CDD:cd12692
label: "RNA recognition motif 2 (RRM2) found in plant polypyrimidine tract-binding protein homolog 3 (PTBPH3). This subfamily corresponds to the RRM2 of PTBPH3. Although its biological roles remain unclear, PTBPH3 shows significant sequence similarity to polypyrimidine tract binding protein (PTB) that is an important negative regulator of alternative splicing in mammalian cells and also functions at several other aspects of mRNA metabolism, including mRNA localization, stabilization, polyadenylation, and translation. Like PTB, PTBPH3 contains four RNA recognition motifs (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif 2 (RRM2) found in plant polypyrimidine tract-binding protein homolog 3 (PTBPH3). This subfamily corresponds to the RRM2 of PTBPH3. Although its biological roles remain unclear, PTBPH3 shows significant sequence similarity to polypyrimidine tract binding protein (PTB) that is an important negative regulator of alternative splicing in mammalian cells and also functions at several other aspects of mRNA metabolism, including mRNA localization, stabilization, polyadenylation, and translation. Like PTB, PTBPH3 contains four RNA recognition motifs (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd12692); members share this curated model.
