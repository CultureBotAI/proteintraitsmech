identifier: CDD:cd19513
label: "RAD51D recombinase. RAD51 recombinase plays an essential role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. RAD51 is recruited to the break site with the help of its paralogs, RAD51D, RAD51B, RAD51C, XRCC3, and XRCC2, where it forms long helical polymers which wrap around the ssDNA tail at the break which leads to pairing and strand invasion."
definition: >-
  RAD51D recombinase. RAD51 recombinase plays an essential role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. RAD51 is recruited to the break site with the help of its paralogs, RAD51D, RAD51B, RAD51C, XRCC3, and XRCC2, where it forms long helical polymers which wrap around the ssDNA tail at the break which leads to pairing and strand invasion. — an NCBI CDD conserved domain (cd19513); members share this curated model.
