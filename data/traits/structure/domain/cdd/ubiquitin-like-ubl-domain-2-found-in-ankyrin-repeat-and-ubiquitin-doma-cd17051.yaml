identifier: CDD:cd17051
label: "ubiquitin-like (Ubl) domain 2 found in Ankyrin repeat and ubiquitin domain-containing 1 (ANKUB1) and similar proteins. ANKUB1 is an uncharacterized protein with two tandem ubiquitin-like (Ubl) domains located at the N-terminal of Ankyrin repeats (ANK). The Ubl domain may have an adaptor role in ubiquitin(Ub)-signaling by mediating protein-protein interaction. Ubl proteins have a beta-grasp Ubl fold and attach to other proteins in a Ubl manner with biochemically distinct roles. The ankyrin repeats have been identified in numerous proteins with diverse functions. The family corresponds to the second Ubl domain."
definition: >-
  ubiquitin-like (Ubl) domain 2 found in Ankyrin repeat and ubiquitin domain-containing 1 (ANKUB1) and similar proteins. ANKUB1 is an uncharacterized protein with two tandem ubiquitin-like (Ubl) domains located at the N-terminal of Ankyrin repeats (ANK). The Ubl domain may have an adaptor role in ubiquitin(Ub)-signaling by mediating protein-protein interaction. Ubl proteins have a beta-grasp Ubl fold and attach to other proteins in a Ubl manner with biochemically distinct roles. The ankyrin repeats have been identified in numerous proteins with diverse functions. The family corresponds to the second Ubl domain. — an NCBI CDD conserved domain (cd17051); members share this curated model.
