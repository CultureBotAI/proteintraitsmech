identifier: CDD:cd16921
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Methanosaeta harundinacea FilI and some hybrid sensor histidine kinases. This family includes FilI, the histidine kinase (HK) component of FilI-FilRs, a two-component signal transduction system (TCS) of the methanogenic archaeon, Methanosaeta harundinacea, which is involved in regulating methanogenesis. The cytoplasmic HK core consists of a C-terminal HK-like ATPase domain (represented here) and a histidine kinase dimerization and phosphoacceptor domain (HisKA) domain, which, in FilI, are coupled to CHASE, HAMP, PAS, and GAF sensor domains. FilI-FilRs catalyzes the phosphotransfer between FilI (HK) and FilRs (FilR1 and FilR2, response regulators) of the TCS. TCSs are predicted to be of bacterial origin, and acquired by archaea by horizontal gene transfer. This model also includes related HATPase domains such as that of Synechocystis sp. PCC6803 phytochrome-like protein Cph1. Proteins having this HATPase domain and HisKA domain also have accessory sensor domains such as CHASE, GAF, HAMP and PAS; some are  hybrid sensor histidine kinases as they also contain a REC signal receiver domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Methanosaeta harundinacea FilI and some hybrid sensor histidine kinases. This family includes FilI, the histidine kinase (HK) component of FilI-FilRs, a two-component signal transduction system (TCS) of the methanogenic archaeon, Methanosaeta harundinacea, which is involved in regulating methanogenesis. The cytoplasmic HK core consists of a C-terminal HK-like ATPase domain (represented here) and a histidine kinase dimerization and phosphoacceptor domain (HisKA) domain, which, in FilI, are coupled to CHASE, HAMP, PAS, and GAF sensor domains. FilI-FilRs catalyzes the phosphotransfer between FilI (HK) and FilRs (FilR1 and FilR2, response regulators) of the TCS. TCSs are predicted to be of bacterial origin, and acquired by archaea by horizontal gene transfer. This model also includes related HATPase domains such as that of Synechocystis sp. PCC6803 phytochrome-like protein Cph1. Proteins having this HATPase domain and HisKA domain also have accessory sensor domains such as CHASE, GAF, HAMP and PAS; some are hybrid sensor histidine kinases as they also contain a REC signal receiver domain. — an NCBI CDD conserved domain (cd16921); members share this curated model.
