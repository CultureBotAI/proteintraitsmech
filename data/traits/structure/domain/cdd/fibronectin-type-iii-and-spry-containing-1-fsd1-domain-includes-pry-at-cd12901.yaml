identifier: CDD:cd12901
label: "Fibronectin type III and SPRY containing 1 (FSD1) domain includes PRY at the N-terminus. This domain is part of the fibronectin type III and SPRY domain containing 1 (FSD1) and FSD1-like (FSD1L) proteins. These are centrosome-associated proteins that are characterized by an N-terminal coiled-coil region downstream of B-box (BBC) domain, a central fibronectin type III (FN3) domain, and C-terminal repeats in PRY/SPRY domain. The FSD1 protein associates with a subset of microtubules and may be involved in the stability and organization of microtubules during cytokinesis."
definition: >-
  Fibronectin type III and SPRY containing 1 (FSD1) domain includes PRY at the N-terminus. This domain is part of the fibronectin type III and SPRY domain containing 1 (FSD1) and FSD1-like (FSD1L) proteins. These are centrosome-associated proteins that are characterized by an N-terminal coiled-coil region downstream of B-box (BBC) domain, a central fibronectin type III (FN3) domain, and C-terminal repeats in PRY/SPRY domain. The FSD1 protein associates with a subset of microtubules and may be involved in the stability and organization of microtubules during cytokinesis. — an NCBI CDD conserved domain (cd12901); members share this curated model.
