identifier: CDD:cd17595
label: "phosphoacceptor receiver (REC) domain a fused response regulator with a thioredoxin reductase output domain. This family is composed of uncharacterized fusion proteins containing a REC domain and a thioredoxin reductase domain. Thioredoxin reductase catalyzes the reduction of thioredoxin and is thus a central component in the thioredoxin system. Fusion proteins containing REC and thioredoxin reductase domains could play an important role in the environmental regulation of the cellular dithiol-disulfide ratio. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain a fused response regulator with a thioredoxin reductase output domain. This family is composed of uncharacterized fusion proteins containing a REC domain and a thioredoxin reductase domain. Thioredoxin reductase catalyzes the reduction of thioredoxin and is thus a central component in the thioredoxin system. Fusion proteins containing REC and thioredoxin reductase domains could play an important role in the environmental regulation of the cellular dithiol-disulfide ratio. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17595); members share this curated model.
