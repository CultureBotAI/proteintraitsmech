identifier: CDD:cd23143
label: "RING finger, HC subclass, found in Caenorhabditis elegans BRCA1-associated RING domain protein 1 (CeBARD1) and similar proteins. CeBARD1, also called Ce-BRD-1, Cebrd-1, or RING-type E3 ubiquitin transferase BARD1, is a constituent of the CeBCD complex that possesses E3 ubiquitin-protein ligase activity. It plays a role in triggering cellular responses at damage sites in response to DNA damage that may be induced by ionizing radiation. It protects against chromosome non-disjunction and nuclear fragmentation during meiotic double-strand break repair to ensure sister chromatid recombination and aid chromosome stability. CeBARD1 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Caenorhabditis elegans BRCA1-associated RING domain protein 1 (CeBARD1) and similar proteins. CeBARD1, also called Ce-BRD-1, Cebrd-1, or RING-type E3 ubiquitin transferase BARD1, is a constituent of the CeBCD complex that possesses E3 ubiquitin-protein ligase activity. It plays a role in triggering cellular responses at damage sites in response to DNA damage that may be induced by ionizing radiation. It protects against chromosome non-disjunction and nuclear fragmentation during meiotic double-strand break repair to ensure sister chromatid recombination and aid chromosome stability. CeBARD1 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23143); members share this curated model.
