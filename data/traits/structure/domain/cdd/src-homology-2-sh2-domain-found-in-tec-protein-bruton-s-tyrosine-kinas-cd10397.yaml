identifier: CDD:cd10397
label: "Src homology 2 (SH2) domain found  in Tec protein, Bruton's tyrosine kinase (Btk). A member of the Tec protein tyrosine kinase Btk is expressed in bone marrow, spleen, all hematopoietic cells except T lymphocytes and plasma cells where it plays a  crucial role in B cell maturation and mast cell activation. Btk has been shown to interact with GNAQ, PLCG2, protein kinase D1, B-cell linker, SH3BP5, caveolin 1, ARID3A, and GTF2I. Most of the Tec family members have a PH domain (Txk and the short (type 1) splice variant of Drosophila Btk29A are exceptions), a Tec homology (TH) domain, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. Btk is implicated in the primary immunodeficiency disease X-linked agammaglobulinemia (Bruton's agammaglobulinemia).  The TH domain consists of a Zn2+-binding Btk motif and a proline-rich region. The Btk motif is found in Tec kinases, Ras GAP, and IGBP.  It is crucial for the function of Tec PH domains and it's lack of presence in Txk is not surprising since it lacks a PH domain. The type 1 splice form of the Drosophila homolog also lacks both the PH domain and the Btk motif.  The proline-rich regions are highly conserved for the most part with the exception of Bmx whose residues surrounding the PXXP motif are not conserved (TH-like) and Btk29A  which is entirely unique with large numbers of glycine residues (TH-extended). Tec family members all lack a C-terminal tyrosine having an autoinhibitory function in its phosphorylated state. Two tyrosine phosphorylation (pY) sites have been identified in Btk: one located in the activation loop of the catalytic domain which regulates the transition between open (active) and closed (inactive) states and the other in its SH3 domain.  In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Tec protein, Bruton's tyrosine kinase (Btk). A member of the Tec protein tyrosine kinase Btk is expressed in bone marrow, spleen, all hematopoietic cells except T lymphocytes and plasma cells where it plays a crucial role in B cell maturation and mast cell activation. Btk has been shown to interact with GNAQ, PLCG2, protein kinase D1, B-cell linker, SH3BP5, caveolin 1, ARID3A, and GTF2I. Most of the Tec family members have a PH domain (Txk and the short (type 1) splice variant of Drosophila Btk29A are exceptions), a Tec homology (TH) domain, a SH3 domain, a SH2 domain, and a protein kinase catalytic domain. Btk is implicated in the primary immunodeficiency disease X-linked agammaglobulinemia (Bruton's agammaglobulinemia). The TH domain consists of a Zn2+-binding Btk motif and a proline-rich region. The Btk motif is found in Tec kinases, Ras GAP, and IGBP. It is crucial for the function of Tec PH domains and it's lack of presence in Txk is not surprising since it lacks a PH domain. The type 1 splice form of the Drosophila homolog also lacks both the PH domain and the Btk motif. The proline-rich regions are highly conserved for the most part with the exception of Bmx whose residues surrounding the PXXP motif are not conserved (TH-like) and Btk29A which is entirely unique with large numbers of glycine residues (TH-extended). Tec family members all lack a C-terminal tyrosine having an autoinhibitory function in its phosphorylated state. Two tyrosine phosphorylation (pY) sites have been identified in Btk: one located in the activation loop of the catalytic domain which regulates the transition between open (active) and closed (inactive) states and the other in its SH3 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10397); members share this curated model.
