identifier: CDD:cd21938
label: "leucine zipper domain found in TSC22 domain family protein 1. TSC22 domain family protein 1 (TSC22D1) is also called cerebral protein 2, regulatory protein TSC-22, TGFB-stimulated clone 22, or transforming growth factor beta-1-induced transcript 4 protein (TGFB1I4). It is a transcriptional repressor that was reported to be present in both the cytoplasmic and the nuclear fraction. It is activated by transcription growth factor-beta1 and other growth factors of osteoblastic cells. TSC22D1 acts on the C-type natriuretic peptide (CNP) promoter. It enhances c-Myc-mediated activation of the telomerase reverse transcriptase (TERT) promoter. This model corresponds to the conserved leucine zipper (ZIP) domain located at the C-terminus of TSC22D1. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. Thus, the DNA-binding capability of the ZIP domain is not obvious. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription."
definition: >-
  leucine zipper domain found in TSC22 domain family protein 1. TSC22 domain family protein 1 (TSC22D1) is also called cerebral protein 2, regulatory protein TSC-22, TGFB-stimulated clone 22, or transforming growth factor beta-1-induced transcript 4 protein (TGFB1I4). It is a transcriptional repressor that was reported to be present in both the cytoplasmic and the nuclear fraction. It is activated by transcription growth factor-beta1 and other growth factors of osteoblastic cells. TSC22D1 acts on the C-type natriuretic peptide (CNP) promoter. It enhances c-Myc-mediated activation of the telomerase reverse transcriptase (TERT) promoter. This model corresponds to the conserved leucine zipper (ZIP) domain located at the C-terminus of TSC22D1. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. Thus, the DNA-binding capability of the ZIP domain is not obvious. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription. — an NCBI CDD conserved domain (cd21938); members share this curated model.
