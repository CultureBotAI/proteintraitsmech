identifier: CDD:cd17976
label: "DEXH-box helicase domain of DEAH-box helicase 30. DEAH-box helicase 30 (DHX30) plays an important role in the assembly of the mitochondrial large ribosomal subunit. DHX30 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 30. DEAH-box helicase 30 (DHX30) plays an important role in the assembly of the mitochondrial large ribosomal subunit. DHX30 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17976); members share this curated model.
