identifier: CDD:cd20056
label: "Forkhead (FH) domain found in Forkhead box protein N1 (FOXN1). FOXN1, also called winged helix transcription factor nude, acts as a transcriptional regulator which regulates the development, differentiation, and function of thymic epithelial cells (TECs), both in the prenatal and postnatal thymus. It is also an important factor in controlling the skin wound healing process, as it actively participates in re-epithelialization and is responsible for scar formation. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein N1 (FOXN1). FOXN1, also called winged helix transcription factor nude, acts as a transcriptional regulator which regulates the development, differentiation, and function of thymic epithelial cells (TECs), both in the prenatal and postnatal thymus. It is also an important factor in controlling the skin wound healing process, as it actively participates in re-epithelialization and is responsible for scar formation. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20056); members share this curated model.
