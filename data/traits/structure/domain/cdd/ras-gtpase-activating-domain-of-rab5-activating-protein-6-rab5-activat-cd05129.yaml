identifier: CDD:cd05129
label: "Ras-GTPase Activating Domain of Rab5-activating protein 6. Rab5-activating protein 6 (RAP6) is an endosomal protein with a role in the regulation of receptor-mediated endocytosis. RAP6 contains a Vps9 domain, which is involved in the activation of Rab5, and a Ras GAP domain (RGD). Rab5 is a small GTPase required for the control of the endocytic route, and its activity is regulated by guanine nucleotide exchange factor, such as Rabex5, and GAPs, such as RN-tre. Human Rap6 protein is localized on the plasma membrane and on the endosome. RAP6 binds to Rab5 and Ras through the Vps9 and RGD domains, respectively."
definition: >-
