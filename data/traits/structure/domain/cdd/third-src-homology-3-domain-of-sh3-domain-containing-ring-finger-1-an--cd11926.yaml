identifier: CDD:cd11926
label: "Third Src Homology 3 domain of SH3 domain containing ring finger 1, an E3 ubiquitin-protein ligase. SH3RF1 is also called POSH (Plenty of SH3s) or SH3MD2 (SH3 multiple domains protein 2). It is a scaffold protein that acts as an E3 ubiquitin-protein ligase. It plays a role in calcium homeostasis through the control of the ubiquitin domain protein Herp. It may also have a role in regulating death receptor mediated and JNK mediated apoptosis. SH3RF1 also enhances the ubiquitination of ROMK1 potassium channel resulting in its increased endocytosis. It contains an N-terminal RING finger domain and four SH3 domains. This model represents the third SH3 domain, located in the middle, of SH3RF1. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Third Src Homology 3 domain of SH3 domain containing ring finger 1, an E3 ubiquitin-protein ligase. SH3RF1 is also called POSH (Plenty of SH3s) or SH3MD2 (SH3 multiple domains protein 2). It is a scaffold protein that acts as an E3 ubiquitin-protein ligase. It plays a role in calcium homeostasis through the control of the ubiquitin domain protein Herp. It may also have a role in regulating death receptor mediated and JNK mediated apoptosis. SH3RF1 also enhances the ubiquitination of ROMK1 potassium channel resulting in its increased endocytosis. It contains an N-terminal RING finger domain and four SH3 domains. This model represents the third SH3 domain, located in the middle, of SH3RF1. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11926); members share this curated model.
