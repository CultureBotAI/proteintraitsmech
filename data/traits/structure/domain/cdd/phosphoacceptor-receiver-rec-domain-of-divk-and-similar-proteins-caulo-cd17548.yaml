identifier: CDD:cd17548
label: "phosphoacceptor receiver (REC) domain of DivK and similar proteins. Caulobacter crescentus DivK is an essential response regulator that is involved in the complex phosphorelay pathways controlling both cell division and motility. It localizes cell cycle regulators to specific poles of the cell during division. DivK contains a stand-alone REC domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of DivK and similar proteins. Caulobacter crescentus DivK is an essential response regulator that is involved in the complex phosphorelay pathways controlling both cell division and motility. It localizes cell cycle regulators to specific poles of the cell during division. DivK contains a stand-alone REC domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17548); members share this curated model.
