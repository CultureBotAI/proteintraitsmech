identifier: CDD:cd00194
label: "UBA domain-like superfamily. The ubiquitin-associated (UBA) domain-like superfamily contains alpha-helical structural homology ubiquitin-binding domains, including UBA domains and coupling of ubiquitin conjugation to endoplasmic reticulum degradation (CUE) domains which share a common three-helical bundle architecture. UBA domains are commonly occurring sequence motifs found in proteins involved in ubiquitin-mediated proteolysis. They contribute to ubiquitin (Ub) binding or ubiquitin-like (UbL) domain binding. However, some kinds of UBA domains can only bind the UbL domain, but not the Ub domain. UBA domains are normally comprised of compact three-helix bundles which contain a conserved GF/Y-loop. They can bind polyubiquitin with high affinity. They also bind monoubiquitin and other proteins. Most UBA domain-containing proteins have one UBA domain, but some harbor two or three UBA domains. CUE domain containing proteins are characterized by an FP and a di-leucine-like sequence and bind to monoubiquitin with varying affinities. Some higher eukaryotic CUE domain proteins do not bind monoubiquitin efficiently, since they carry LP, rather than FP among CUE domains. This superfamily also includes many UBA-like domains found in AMP-activated protein kinase (AMPK) related kinases, the NXF family of mRNA nuclear export factors, elongation factor Ts (EF-Ts), nascent polypeptide-associated complex subunit alpha (NACA) and similar proteins. Although many UBA-like domains may have a conserved TG but not GF/Y-loop, they still show a high level of structural and sequence similarity with three-helical ubiquitin binding domains."
definition: >-
  UBA domain-like superfamily. The ubiquitin-associated (UBA) domain-like superfamily contains alpha-helical structural homology ubiquitin-binding domains, including UBA domains and coupling of ubiquitin conjugation to endoplasmic reticulum degradation (CUE) domains which share a common three-helical bundle architecture. UBA domains are commonly occurring sequence motifs found in proteins involved in ubiquitin-mediated proteolysis. They contribute to ubiquitin (Ub) binding or ubiquitin-like (UbL) domain binding. However, some kinds of UBA domains can only bind the UbL domain, but not the Ub domain. UBA domains are normally comprised of compact three-helix bundles which contain a conserved GF/Y-loop. They can bind polyubiquitin with high affinity. They also bind monoubiquitin and other proteins. Most UBA domain-containing proteins have one UBA domain, but some harbor two or three UBA domains. CUE domain containing proteins are characterized by an FP and a di-leucine-like sequence and bind to monoubiquitin with varying affinities. Some higher eukaryotic CUE domain proteins do not bind monoubiquitin efficiently, since they carry LP, rather than FP among CUE domains. This superfamily also includes many UBA-like domains found in AMP-activated protein kinase (AMPK) related kinases, the NXF family of mRNA nuclear export factors, elongation factor Ts (EF-Ts), nascent polypeptide-associated complex subunit alpha (NACA) and similar proteins. Although many UBA-like domains may have a conserved TG but not GF/Y-loop, they still show a high level of structural and sequence similarity with three-helical ubiquitin binding domains. — an NCBI CDD conserved domain (cd00194); members share this curated model.
