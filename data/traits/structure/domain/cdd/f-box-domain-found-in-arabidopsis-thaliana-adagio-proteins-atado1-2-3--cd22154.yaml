identifier: CDD:cd22154
label: "F-box domain found in Arabidopsis thaliana Adagio proteins (AtADO1/2/3) and similar proteins. This subfamily contains Arabidopsis thaliana Adagio proteins, including AtADO1, AtADO2 and AtADO3. They are components of E3 ubiquitin ligase complexes that play central roles in blue light-dependent circadian cycles. They act as blue light photoreceptors, due to the presence of FMN, that mediate light-regulated protein degradation of critical clock components by targeting them to the proteasome complex. AtADO1, also called clock-associated PAS protein ZTL, F-box only protein 2b (FBX2b), flavin-binding kelch repeat F-box protein 1-like protein 2 (FKL2), FKF1-like protein 2, LOV kelch protein 1 (LKP1), or protein ZEITLUPE, is a novel clock-associated PAS protein from Arabidopsis. Its circadian phase-specific degradation is mediated by the proteasome. AtADO2, also called F-box only protein 2c (FBX2c), flavin-binding kelch repeat F-box protein 1-like protein 1 (FKL1), FKF1-like protein 1, or LOV kelch protein 2 (LKP2), functions close to the circadian clock oscillator. AtADO3, also called F-box only protein 2a (FBX2a), or flavin-binding kelch repeat F-box protein 1 (FKF1), is essential for photoperiodic-specific light signaling and mediates cyclic degradation of a repressor of CONSTANS in Arabidopsis. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana Adagio proteins (AtADO1/2/3) and similar proteins. This subfamily contains Arabidopsis thaliana Adagio proteins, including AtADO1, AtADO2 and AtADO3. They are components of E3 ubiquitin ligase complexes that play central roles in blue light-dependent circadian cycles. They act as blue light photoreceptors, due to the presence of FMN, that mediate light-regulated protein degradation of critical clock components by targeting them to the proteasome complex. AtADO1, also called clock-associated PAS protein ZTL, F-box only protein 2b (FBX2b), flavin-binding kelch repeat F-box protein 1-like protein 2 (FKL2), FKF1-like protein 2, LOV kelch protein 1 (LKP1), or protein ZEITLUPE, is a novel clock-associated PAS protein from Arabidopsis. Its circadian phase-specific degradation is mediated by the proteasome. AtADO2, also called F-box only protein 2c (FBX2c), flavin-binding kelch repeat F-box protein 1-like protein 1 (FKL1), FKF1-like protein 1, or LOV kelch protein 2 (LKP2), functions close to the circadian clock oscillator. AtADO3, also called F-box only protein 2a (FBX2a), or flavin-binding kelch repeat F-box protein 1 (FKF1), is essential for photoperiodic-specific light signaling and mediates cyclic degradation of a repressor of CONSTANS in Arabidopsis. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22154); members share this curated model.
