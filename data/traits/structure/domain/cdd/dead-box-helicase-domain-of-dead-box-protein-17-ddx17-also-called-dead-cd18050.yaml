identifier: CDD:cd18050
label: "DEAD-box helicase domain of DEAD box protein 17. DDX17 (also called DEAD Box Protein P72 or DEAD Box Protein P82) has a wide variety of functions including regulating the alternative splicing of exons exhibiting specific features such as the inclusion of AC-rich alternative exons in CD44 transcripts, playing a role in innate immunity, and promoting mRNA degradation mediated by the antiviral zinc-finger protein ZC3HAV1 in an ATPase-dependent manner. DDX17 synergizes with DDX5 and SRA1 RNA to activate MYOD1 transcriptional activity and is involved in skeletal muscle differentiation. DDX17 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 17. DDX17 (also called DEAD Box Protein P72 or DEAD Box Protein P82) has a wide variety of functions including regulating the alternative splicing of exons exhibiting specific features such as the inclusion of AC-rich alternative exons in CD44 transcripts, playing a role in innate immunity, and promoting mRNA degradation mediated by the antiviral zinc-finger protein ZC3HAV1 in an ATPase-dependent manner. DDX17 synergizes with DDX5 and SRA1 RNA to activate MYOD1 transcriptional activity and is involved in skeletal muscle differentiation. DDX17 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18050); members share this curated model.
