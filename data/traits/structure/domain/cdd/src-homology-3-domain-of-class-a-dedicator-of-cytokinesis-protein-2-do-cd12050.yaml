identifier: CDD:cd12050
label: "Src Homology 3 domain of Class A Dedicator of Cytokinesis protein 2. Dock2 is a hematopoietic cell-specific, class A DOCK and is an atypical guanine nucleotide exchange factor (GEF) that lacks the conventional Dbl homology (DH) domain. It plays an important role in lymphocyte migration and activation, T-cell differentiation, neutrophil chemotaxis, and type I interferon induction. All DOCKs contain two homology domains: the DHR-1 (Dock homology region-1), also called CZH1 (CED-5, Dock180, and MBC-zizimin homology 1), and DHR-2 (also called CZH2 or Docker). The DHR-1 domain binds phosphatidylinositol-3,4,5-triphosphate while DHR-2 contains the catalytic activity for Rac and/or Cdc42. Class A DOCKs also contain an SH3 domain at the N-terminal region and a PxxP motif at the C-terminus; they are specific GEFs for Rac. The SH3 domain of Dock2 binds to DHR-2 in an autoinhibitory manner; binding of the scaffold protein Elmo to the SH3 domain of Dock2 exposes the DHR-2 domain and promotes GEF activity. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Class A Dedicator of Cytokinesis protein 2. Dock2 is a hematopoietic cell-specific, class A DOCK and is an atypical guanine nucleotide exchange factor (GEF) that lacks the conventional Dbl homology (DH) domain. It plays an important role in lymphocyte migration and activation, T-cell differentiation, neutrophil chemotaxis, and type I interferon induction. All DOCKs contain two homology domains: the DHR-1 (Dock homology region-1), also called CZH1 (CED-5, Dock180, and MBC-zizimin homology 1), and DHR-2 (also called CZH2 or Docker). The DHR-1 domain binds phosphatidylinositol-3,4,5-triphosphate while DHR-2 contains the catalytic activity for Rac and/or Cdc42. Class A DOCKs also contain an SH3 domain at the N-terminal region and a PxxP motif at the C-terminus; they are specific GEFs for Rac. The SH3 domain of Dock2 binds to DHR-2 in an autoinhibitory manner; binding of the scaffold protein Elmo to the SH3 domain of Dock2 exposes the DHR-2 domain and promotes GEF activity. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12050); members share this curated model.
