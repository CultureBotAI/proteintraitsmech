identifier: CDD:cd20985
label: "Immunoglobulin Variable domain of cell surface glycoprotein CD200 receptor and similar proteins. The members here are composed of the immunoglobulin variable (IgV) domain of cell surface glycoprotein CD200 receptor and similar proteins. CD200 (also known as OX2) is a widely distributed membrane glycoprotein that regulates myeloid cell activity through its interaction with an inhibitory receptor (CD200R). CD200-CD200R interactions are involved in the control of myeloid cellular function. In the mouse, several CD200R-related genes have been identified, including CD200RL (for receptor like), CD200R1, and CD200R2. While CD200 gives good binding to CD200R, it does not bind CD200RLa, CD200RLb, CD200RLc, or CD200RLe. For instance, CD200RLa has a 50-fold lower binding affinity to CD200, although CD200RLa shares a high amino acid sequence identity with CD200R in the V-like domain. Furthermore, the CD200-CD200R regulatory interactions provide an attractive target for immunomodulation, because its manipulation can provoke either immune tolerance or autoimmune diseases."
definition: >-
  Immunoglobulin Variable domain of cell surface glycoprotein CD200 receptor and similar proteins. The members here are composed of the immunoglobulin variable (IgV) domain of cell surface glycoprotein CD200 receptor and similar proteins. CD200 (also known as OX2) is a widely distributed membrane glycoprotein that regulates myeloid cell activity through its interaction with an inhibitory receptor (CD200R). CD200-CD200R interactions are involved in the control of myeloid cellular function. In the mouse, several CD200R-related genes have been identified, including CD200RL (for receptor like), CD200R1, and CD200R2. While CD200 gives good binding to CD200R, it does not bind CD200RLa, CD200RLb, CD200RLc, or CD200RLe. For instance, CD200RLa has a 50-fold lower binding affinity to CD200, although CD200RLa shares a high amino acid sequence identity with CD200R in the V-like domain. Furthermore, the CD200-CD200R regulatory interactions provide an attractive target for immunomodulation, because its manipulation can provoke either immune tolerance or autoimmune diseases. — an NCBI CDD conserved domain (cd20985); members share this curated model.
