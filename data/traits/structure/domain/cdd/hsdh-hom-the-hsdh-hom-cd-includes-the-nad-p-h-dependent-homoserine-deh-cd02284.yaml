identifier: CDD:cd02284
label: "HSDH_Hom. The HSDH_Hom CD includes the NAD(P)H-dependent, homoserine dehydrogenase encoded by the hom gene of Bacillus subtilis and other related sequences. This HSDH, involved in threonine biosynthesis, has a C-terminal extension of about 100 residues (relative to the E. coli bifunctional isoenzymes, HSDH I-II) and is believed to be involved in enzyme regulation; a C-terminal deletion in the Corynebacterium glutamicum HSDH abolished allosteric inhibition by L-threonine. Members of this CD contain a Rossmann fold NAD(P)H binding domain and unique catalytic fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain and are members of the NADB_G3PDH superfamily of proteins. The C-terminal, regulatory, ACT domain is not included in this alignment."
definition: >-
  HSDH_Hom. The HSDH_Hom CD includes the NAD(P)H-dependent, homoserine dehydrogenase encoded by the hom gene of Bacillus subtilis and other related sequences. This HSDH, involved in threonine biosynthesis, has a C-terminal extension of about 100 residues (relative to the E. coli bifunctional isoenzymes, HSDH I-II) and is believed to be involved in enzyme regulation; a C-terminal deletion in the Corynebacterium glutamicum HSDH abolished allosteric inhibition by L-threonine. Members of this CD contain a Rossmann fold NAD(P)H binding domain and unique catalytic fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain and are members of the NADB_G3PDH superfamily of proteins. The C-terminal, regulatory, ACT domain is not included in this alignment. — an NCBI CDD conserved domain (cd02284); members share this curated model.
