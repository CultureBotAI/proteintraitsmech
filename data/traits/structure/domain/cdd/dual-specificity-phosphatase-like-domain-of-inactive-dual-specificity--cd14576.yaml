label: "dual specificity phosphatase-like domain of inactive dual specificity protein phosphatase 27. Inactive dual specificity protein phosphatase 27 (DUSP27) may play a role in myofiber maturation. It is a pseudophosphatase containing a substitution of the active site cysteine into a serine. It is a large protein of more than 1000 amino acids in length with an N-terminal dual specificity phosphatase-like domain."
