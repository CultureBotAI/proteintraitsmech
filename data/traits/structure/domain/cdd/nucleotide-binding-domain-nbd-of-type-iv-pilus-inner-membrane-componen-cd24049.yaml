identifier: CDD:cd24049
label: "nucleotide-binding domain (NBD) of type IV pilus inner membrane component PilM and similar proteins. PilM is an inner membrane component of the type IV (T4S) secretion system that plays a role in surface and host cell adhesion, colonization, biofilm maturation, virulence, and twitching, a form of surface-associated motility. PilN/PilO heterodimers form the foundation of the inner-membrane PilM/PilN/PilO/PilP complex which plays an essential role in the assembly of a functional T4 pilus. In turn, PilM associates with PilN and facilitates PilM functionally relevant structural changes that differentially impacts PilM binding to PilB, PilT, and PilC."
definition: >-
  nucleotide-binding domain (NBD) of type IV pilus inner membrane component PilM and similar proteins. PilM is an inner membrane component of the type IV (T4S) secretion system that plays a role in surface and host cell adhesion, colonization, biofilm maturation, virulence, and twitching, a form of surface-associated motility. PilN/PilO heterodimers form the foundation of the inner-membrane PilM/PilN/PilO/PilP complex which plays an essential role in the assembly of a functional T4 pilus. In turn, PilM associates with PilN and facilitates PilM functionally relevant structural changes that differentially impacts PilM binding to PilB, PilT, and PilC. — an NCBI CDD conserved domain (cd24049); members share this curated model.
