identifier: CDD:cd18249
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 20 (KLHL20). KLHL20, also called Kelch-like ECT2-interacting protein (KLEIP) or Kelch-like protein X, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex involved in interferon response and anterograde Golgi to endosome transport. KLHL20 plays a role in actin assembly at cell-cell contact sites of Madin-Darby canine kidney cells. It also controls endothelial migration and sprouting angiogenesis. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 20 (KLHL20). KLHL20, also called Kelch-like ECT2-interacting protein (KLEIP) or Kelch-like protein X, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex involved in interferon response and anterograde Golgi to endosome transport. KLHL20 plays a role in actin assembly at cell-cell contact sites of Madin-Darby canine kidney cells. It also controls endothelial migration and sprouting angiogenesis. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18249); members share this curated model.
