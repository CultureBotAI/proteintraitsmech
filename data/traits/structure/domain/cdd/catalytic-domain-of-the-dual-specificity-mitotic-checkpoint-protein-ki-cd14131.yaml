identifier: CDD:cd14131
label: "Catalytic domain of the Dual-specificity Mitotic checkpoint protein kinase, Monopolar spindle 1 (also called TTK). Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine as well as tyrosine residues on protein substrates. TTK/Mps1 is a spindle checkpoint kinase that was first discovered due to its necessity in centrosome duplication in budding yeast. It was later found to function in the spindle assembly checkpoint, which monitors the proper attachment of chromosomes to the mitotic spindle. In yeast, substrates of Mps1 include the spindle pole body components Spc98p, Spc110p, and Spc42p. The TTK/Mps1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein serine/threonine PKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Dual-specificity Mitotic checkpoint protein kinase, Monopolar spindle 1 (also called TTK). Dual-specificity PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine as well as tyrosine residues on protein substrates. TTK/Mps1 is a spindle checkpoint kinase that was first discovered due to its necessity in centrosome duplication in budding yeast. It was later found to function in the spindle assembly checkpoint, which monitors the proper attachment of chromosomes to the mitotic spindle. In yeast, substrates of Mps1 include the spindle pole body components Spc98p, Spc110p, and Spc42p. The TTK/Mps1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein serine/threonine PKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14131); members share this curated model.
