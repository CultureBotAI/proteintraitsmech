identifier: CDD:cd15535
label: "PHD finger 1 found in Saccharomyces cerevisiae transcriptional regulatory protein Rco1 and similar proteins. Rco1 is a component of the Rpd3S histone deacetylase complex that plays an important role at actively transcribed genes. Rco1 contains two plant homeodomain (PHD) fingers, which are required for the methylation of histone H3 lysine 36 (H3K36) nucleosome recognition by Rpd3S. This model corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in Saccharomyces cerevisiae transcriptional regulatory protein Rco1 and similar proteins. Rco1 is a component of the Rpd3S histone deacetylase complex that plays an important role at actively transcribed genes. Rco1 contains two plant homeodomain (PHD) fingers, which are required for the methylation of histone H3 lysine 36 (H3K36) nucleosome recognition by Rpd3S. This model corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15535); members share this curated model.
