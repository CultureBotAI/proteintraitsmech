identifier: CDD:cd08742
label: "Regulator of G protein signaling (RGS) domain found in the RGS12 protein. RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS12 protein. RGS12 is a member of the RA/RGS subfamily of RGS proteins family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS12 belong to the R12 RGS subfamily, which includes RGS10 and RGS14, all of which are highly selective for G-alpha-i1 over G-alpha-q.  RGS12 exist in multiple splice variants: RGS12s (short) contains the core RGS/RBD/GoLoco domains, while RGS12L (long) has additional N-terminal PDZ and PTB domains. RGS12 splice variants show distinct expression patterns, suggesting that they have discrete functions during mouse embryogenesis. RGS12 also may play a critical role in coordinating Ras-dependent signals that are required for promoting and maintaining neuronal differentiation."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS12 protein. RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS12 protein. RGS12 is a member of the RA/RGS subfamily of RGS proteins family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS12 belong to the R12 RGS subfamily, which includes RGS10 and RGS14, all of which are highly selective for G-alpha-i1 over G-alpha-q. RGS12 exist in multiple splice variants: RGS12s (short) contains the core RGS/RBD/GoLoco domains, while RGS12L (long) has additional N-terminal PDZ and PTB domains. RGS12 splice variants show distinct expression patterns, suggesting that they have discrete functions during mouse embryogenesis. RGS12 also may play a critical role in coordinating Ras-dependent signals that are required for promoting and maintaining neuronal differentiation. — an NCBI CDD conserved domain (cd08742); members share this curated model.
