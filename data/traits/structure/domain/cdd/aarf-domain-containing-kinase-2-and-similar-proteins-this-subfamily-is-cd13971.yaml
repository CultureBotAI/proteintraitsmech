identifier: CDD:cd13971
label: "aarF domain containing kinase 2 and similar proteins. This subfamily is composed of uncharacterized ABC1 kinase-like proteins including the human protein called aarF domain containing kinase 2 (ADCK2). Eukaryotes contain at least three ABC1-like proteins; in humans, these are ADCK3 and the putative protein kinases named ADCK1 and ADCK2. Yeast Abc1p and its human homolog ADCK3 are atypical protein kinases required for the biosynthesis of Coenzyme Q (ubiquinone or Q), which is an essential lipid component in respiratory electron and proton transport. In algae and higher plants, ABC1 kinases have proliferated to more than 15 subfamilies, most of which are located in plastids or mitochondria. Plant subfamily 10 (ABC1K10) belong to the same group of ABC1 kinases as human ADCK2. ABC1 kinases are not related to the ATP-binding cassette (ABC) membrane transporter family."
definition: >-
  aarF domain containing kinase 2 and similar proteins. This subfamily is composed of uncharacterized ABC1 kinase-like proteins including the human protein called aarF domain containing kinase 2 (ADCK2). Eukaryotes contain at least three ABC1-like proteins; in humans, these are ADCK3 and the putative protein kinases named ADCK1 and ADCK2. Yeast Abc1p and its human homolog ADCK3 are atypical protein kinases required for the biosynthesis of Coenzyme Q (ubiquinone or Q), which is an essential lipid component in respiratory electron and proton transport. In algae and higher plants, ABC1 kinases have proliferated to more than 15 subfamilies, most of which are located in plastids or mitochondria. Plant subfamily 10 (ABC1K10) belong to the same group of ABC1 kinases as human ADCK2. ABC1 kinases are not related to the ATP-binding cassette (ABC) membrane transporter family. — an NCBI CDD conserved domain (cd13971); members share this curated model.
