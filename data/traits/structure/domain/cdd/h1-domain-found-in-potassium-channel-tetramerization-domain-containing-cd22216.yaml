identifier: CDD:cd22216
label: "H1 domain found in potassium channel tetramerization domain-containing protein 12b. Potassium channel tetramerization domain-containing protein 12b (KCTD12b) is a BTB/POZ domain-containing protein that is an auxiliary subunit of gamma-aminobutyric acid type B (GABA-B) receptors associated with mood disorders. KCTD12b consists of an N-terminal BTB domain followed by a region called the H1 domain. The BTB domain mediates interaction with the receptor. The C-terminal H1 domain, which possesses a beta-propeller-like fold, engages in interactions with G-protein beta-gamma subunits and is responsible for desensitization. This model corresponds to the H1 domain."
definition: >-
  H1 domain found in potassium channel tetramerization domain-containing protein 12b. Potassium channel tetramerization domain-containing protein 12b (KCTD12b) is a BTB/POZ domain-containing protein that is an auxiliary subunit of gamma-aminobutyric acid type B (GABA-B) receptors associated with mood disorders. KCTD12b consists of an N-terminal BTB domain followed by a region called the H1 domain. The BTB domain mediates interaction with the receptor. The C-terminal H1 domain, which possesses a beta-propeller-like fold, engages in interactions with G-protein beta-gamma subunits and is responsible for desensitization. This model corresponds to the H1 domain. — an NCBI CDD conserved domain (cd22216); members share this curated model.
