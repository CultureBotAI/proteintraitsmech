identifier: CDD:cd21682
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in C2 domain-containing protein 2 (C2CD2). C2CD2, also called transmembrane protein 24-like (TMEM24L), may be a lipid-binding protein that shows high sequence similarity with C2 domain-containing protein 2-like (C2CD2L; also transmembrane protein 24 or TMEM24). C2CD2L is a lipid-binding protein that transports phosphatidylinositol, the precursor of phosphatidylinositol 4,5-bisphosphate (PI(4,5)P2), from its site of synthesis in the endoplasmic reticulum to the cell membrane. It is a Ca2+-regulated component of endoplasmic reticulum (ER)-plasma membrane contacts in mammalian neurons. This model corresponds to the SMP domain of C2CD2, which may be implicated in lipid transport."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in C2 domain-containing protein 2 (C2CD2). C2CD2, also called transmembrane protein 24-like (TMEM24L), may be a lipid-binding protein that shows high sequence similarity with C2 domain-containing protein 2-like (C2CD2L; also transmembrane protein 24 or TMEM24). C2CD2L is a lipid-binding protein that transports phosphatidylinositol, the precursor of phosphatidylinositol 4,5-bisphosphate (PI(4,5)P2), from its site of synthesis in the endoplasmic reticulum to the cell membrane. It is a Ca2+-regulated component of endoplasmic reticulum (ER)-plasma membrane contacts in mammalian neurons. This model corresponds to the SMP domain of C2CD2, which may be implicated in lipid transport. — an NCBI CDD conserved domain (cd21682); members share this curated model.
