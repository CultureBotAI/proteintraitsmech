identifier: CDD:cd13241
label: "p63RhoGEF pleckstrin homology (PH) domain, repeat 2. The guanine nucleotide exchange factor p63RhoGEF is an effector of the heterotrimeric G protein, Galphaq and linking Galphaq-coupled receptors (GPCRs) to the activation of RhoA. The Dbl(DH) and PH domains of p63RhoGEF interact with the effector-binding site and the C-terminal region of Galphaq and appear to relieve autoinhibition of the catalytic DH domain by the PH domain. Trio, Duet, and p63RhoGEF are shown to constitute a family of Galphaq effectors that appear to activate RhoA both in vitro and in intact cells. Dbs is a guanine nucleotide exchange factor (GEF), which contains spectrin repeats, a rhoGEF (DH) domain and a PH domain. The Dbs PH domain participates in binding to both the Cdc42 and RhoA GTPases. Trio plays an essential role in regulating the actin cytoskeleton during axonal guidance and branching. Trio is a multidomain signaling protein that contains two RhoGEF(DH)-PH domains in tandem. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes."
definition: >-
  p63RhoGEF pleckstrin homology (PH) domain, repeat 2. The guanine nucleotide exchange factor p63RhoGEF is an effector of the heterotrimeric G protein, Galphaq and linking Galphaq-coupled receptors (GPCRs) to the activation of RhoA. The Dbl(DH) and PH domains of p63RhoGEF interact with the effector-binding site and the C-terminal region of Galphaq and appear to relieve autoinhibition of the catalytic DH domain by the PH domain. Trio, Duet, and p63RhoGEF are shown to constitute a family of Galphaq effectors that appear to activate RhoA both in vitro and in intact cells. Dbs is a guanine nucleotide exchange factor (GEF), which contains spectrin repeats, a rhoGEF (DH) domain and a PH domain. The Dbs PH domain participates in binding to both the Cdc42 and RhoA GTPases. Trio plays an essential role in regulating the actin cytoskeleton during axonal guidance and branching. Trio is a multidomain signaling protein that contains two RhoGEF(DH)-PH domains in tandem. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes. — an NCBI CDD conserved domain (cd13241); members share this curated model.
