identifier: CDD:cd14159
label: "Catalytic domain of the Serine/Threonine kinase, Interleukin-1 Receptor Associated Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. IRAKs are involved in Toll-like receptor (TLR) and interleukin-1 (IL-1) signalling pathways, and are thus critical in regulating innate immune responses and inflammation. IRAKs contain an N-terminal Death domain (DD), a proST region (rich in serines, prolines, and threonines), a central kinase domain, and a C-terminal domain; IRAK-4 lacks the C-terminal domain. Vertebrates contain four IRAKs (IRAK-1, -2, -3 (or -M), and -4) that display distinct functions and patterns of expression and subcellular distribution, and can differentially mediate TLR signaling. IRAK1 plays a role in the activation of IRF3/7, STAT, and NFkB. It mediates IL-6 and IFN-gamma responses following IL-1 and IL-18 stimulation, respectively. It also plays an essential role in IFN-alpha induction downstream of TLR7 and TLR9. The IRAK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Interleukin-1 Receptor Associated Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. IRAKs are involved in Toll-like receptor (TLR) and interleukin-1 (IL-1) signalling pathways, and are thus critical in regulating innate immune responses and inflammation. IRAKs contain an N-terminal Death domain (DD), a proST region (rich in serines, prolines, and threonines), a central kinase domain, and a C-terminal domain; IRAK-4 lacks the C-terminal domain. Vertebrates contain four IRAKs (IRAK-1, -2, -3 (or -M), and -4) that display distinct functions and patterns of expression and subcellular distribution, and can differentially mediate TLR signaling. IRAK1 plays a role in the activation of IRF3/7, STAT, and NFkB. It mediates IL-6 and IFN-gamma responses following IL-1 and IL-18 stimulation, respectively. It also plays an essential role in IFN-alpha induction downstream of TLR7 and TLR9. The IRAK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14159); members share this curated model.
