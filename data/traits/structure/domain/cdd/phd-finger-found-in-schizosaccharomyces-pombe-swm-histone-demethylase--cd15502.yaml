identifier: CDD:cd15502
label: "PHD finger found in Schizosaccharomyces pombe SWM histone demethylase complex subunits Phf1 (Phf1p) and Phf2 (Phf2p). Phf1p and Phf2p are components of the SWM histone demethylase complex that specifically demethylates histone H3 at lysine 9 (H3K9me2), a specific tag for epigenetic transcriptional activation. They function as corepressors and play roles in regulating heterochromatin propagation and euchromatic transcription. Both Phf1p and Phf2p contain a plant homeodomain (PHD) finger."
definition: >-
  PHD finger found in Schizosaccharomyces pombe SWM histone demethylase complex subunits Phf1 (Phf1p) and Phf2 (Phf2p). Phf1p and Phf2p are components of the SWM histone demethylase complex that specifically demethylates histone H3 at lysine 9 (H3K9me2), a specific tag for epigenetic transcriptional activation. They function as corepressors and play roles in regulating heterochromatin propagation and euchromatic transcription. Both Phf1p and Phf2p contain a plant homeodomain (PHD) finger. — an NCBI CDD conserved domain (cd15502); members share this curated model.
