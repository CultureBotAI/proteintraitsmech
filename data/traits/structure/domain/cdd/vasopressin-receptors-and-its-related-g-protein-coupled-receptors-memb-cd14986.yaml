identifier: CDD:cd14986
label: "vasopressin receptors and its related G protein-coupled receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. Members of this group form a subfamily within the class A G-protein coupled receptors (GPCRs), which includes the vasopressin and oxytocin receptors, the gonadotropin-releasing hormone receptors (GnRHRs), the neuropeptide S receptor (NPSR), and orphan GPR150. These receptors share significant sequence homology with each other, suggesting that they have a common evolutionary origin. Vasopressin, also known as arginine vasopressin or anti-diuretic hormone, is a neuropeptide synthesized in the hypothalamus. The actions of vasopressin are mediated by the interaction of this hormone with three tissue-specific subtypes: V1AR, V1BR, and V2R. Although vasopressin differs from oxytocin by only two amino acids, they have divergent physiological functions. Vasopressin is involved in regulating osmotic and cardiovascular homeostasis, whereas oxytocin plays an important role in the uterus during childbirth and in lactation. GnRHR, also known as luteinizing hormone releasing hormone receptor (LHRHR), plays an central role in vertebrate reproductive function; its activation by binding to GnRH leads to the release of follicle stimulating hormone (FSH) and luteinizing hormone (LH) from the pituitary gland. Neuropeptide S (NPS) promotes arousal and anxiolytic-like effects by activating its cognate receptor NPSR. NPSR has also been associated with asthma and allergy. GPR150 is an orphan receptor closely related to the oxytocin and vasopressin receptors."
definition: >-
  vasopressin receptors and its related G protein-coupled receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. Members of this group form a subfamily within the class A G-protein coupled receptors (GPCRs), which includes the vasopressin and oxytocin receptors, the gonadotropin-releasing hormone receptors (GnRHRs), the neuropeptide S receptor (NPSR), and orphan GPR150. These receptors share significant sequence homology with each other, suggesting that they have a common evolutionary origin. Vasopressin, also known as arginine vasopressin or anti-diuretic hormone, is a neuropeptide synthesized in the hypothalamus. The actions of vasopressin are mediated by the interaction of this hormone with three tissue-specific subtypes: V1AR, V1BR, and V2R. Although vasopressin differs from oxytocin by only two amino acids, they have divergent physiological functions. Vasopressin is involved in regulating osmotic and cardiovascular homeostasis, whereas oxytocin plays an important role in the uterus during childbirth and in lactation. GnRHR, also known as luteinizing hormone releasing hormone receptor (LHRHR), plays an central role in vertebrate reproductive function; its activation by binding to GnRH leads to the release of follicle stimulating hormone (FSH) and luteinizing hormone (LH) from the pituitary gland. Neuropeptide S (NPS) promotes arousal and anxiolytic-like effects by activating its cognate receptor NPSR. NPSR has also been associated with asthma and allergy. GPR150 is an orphan receptor closely related to the oxytocin and vasopressin receptors. — an NCBI CDD conserved domain (cd14986); members share this curated model.
