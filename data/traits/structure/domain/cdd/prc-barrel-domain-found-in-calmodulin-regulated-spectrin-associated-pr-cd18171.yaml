identifier: CDD:cd18171
label: "PRC-barrel domain found in calmodulin-regulated spectrin-associated protein 3 (CAMSAP3). CAMSAP3, also termed protein Nezha, is a microtubule minus-end binding protein that acts as a regulator of non-centrosomal microtubule dynamics and organization. It is specifically required for the biogenesis and the maintenance of zonula adherens by anchoring the minus-end of microtubules to zonula adherens and by recruiting the kinesin KIFC3 to those junctional sites. It may regulate the nucleation and the polymerization of microtubules. CAMSAP3 may also regulate the organization of cellular organelles including the Golgi and the early endosomes through the microtubule cytoskeleton."
definition: >-
  PRC-barrel domain found in calmodulin-regulated spectrin-associated protein 3 (CAMSAP3). CAMSAP3, also termed protein Nezha, is a microtubule minus-end binding protein that acts as a regulator of non-centrosomal microtubule dynamics and organization. It is specifically required for the biogenesis and the maintenance of zonula adherens by anchoring the minus-end of microtubules to zonula adherens and by recruiting the kinesin KIFC3 to those junctional sites. It may regulate the nucleation and the polymerization of microtubules. CAMSAP3 may also regulate the organization of cellular organelles including the Golgi and the early endosomes through the microtubule cytoskeleton. — an NCBI CDD conserved domain (cd18171); members share this curated model.
