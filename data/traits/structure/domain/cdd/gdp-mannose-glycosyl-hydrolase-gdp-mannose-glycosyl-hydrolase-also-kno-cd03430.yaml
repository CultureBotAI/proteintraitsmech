identifier: CDD:cd03430
label: "GDP-mannose glycosyl hydrolase. GDP-mannose glycosyl hydrolase, also known as GDP-mannose mannosyl hydrolase/GDPMH, is a member of the NUDIX hydrolase superfamily. This class of enzymes is unique from other members of the superfamily in two aspects. First, it contains a modified NUDIX signature sequence. The slight changes to the conserved sequence motif, GX5EX7REUXEEXGU, where U = I, L or V), are believed to contribute to the removal of all magnesium binding sites but one, retaining only the metal site that coordinates the pyrophosphate of the substrate. Secondly, it is not a pyrophosphatase that substitutes at a phosphorus; instead, it hydrolyzes nucleotide sugars such as GDP-mannose to GDP and mannose, cleaving the phosphoglycosyl bond by substituting at a carbon position. GDP-mannose provides mannosyl components for cell wall synthesis and is required for the synthesis of other glycosyl donors (such as GDP-fucose and colitose) for the cell wall. The importance of GDP-sugar hydrolase activities is thus closely related to the regulation of cell wall biosynthesis. Enzymes in this family are believed to regulate the concentration of GDP-mannose and GDP-glucose in the bacterial cell wall."
definition: >-
  GDP-mannose glycosyl hydrolase. GDP-mannose glycosyl hydrolase, also known as GDP-mannose mannosyl hydrolase/GDPMH, is a member of the NUDIX hydrolase superfamily. This class of enzymes is unique from other members of the superfamily in two aspects. First, it contains a modified NUDIX signature sequence. The slight changes to the conserved sequence motif, GX5EX7REUXEEXGU, where U = I, L or V), are believed to contribute to the removal of all magnesium binding sites but one, retaining only the metal site that coordinates the pyrophosphate of the substrate. Secondly, it is not a pyrophosphatase that substitutes at a phosphorus; instead, it hydrolyzes nucleotide sugars such as GDP-mannose to GDP and mannose, cleaving the phosphoglycosyl bond by substituting at a carbon position. GDP-mannose provides mannosyl components for cell wall synthesis and is required for the synthesis of other glycosyl donors (such as GDP-fucose and colitose) for the cell wall. The importance of GDP-sugar hydrolase activities is thus closely related to the regulation of cell wall biosynthesis. Enzymes in this family are believed to regulate the concentration of GDP-mannose and GDP-glucose in the bacterial cell wall. — an NCBI CDD conserved domain (cd03430); members share this curated model.
