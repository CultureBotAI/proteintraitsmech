identifier: CDD:cd20301
label: "anti-ECFsigma factor, ChrR , cupin domain. This family contains bacterial anti-sigma factor ChrR from the photosynthetic bacterium Rhodobacter sphaeroides (Rsp) and similar proteins. ChrR is a member of the ZAS (Zn2+ anti-sigma) subfamily of group IV anti-sigmas. It inhibits transcriptional activity by binding to the Rsp extra cytoplasmic function (ECF) sigma factor E (sigmaE), an essential factor to mount a transcriptional response to a singlet oxygen and for viability when carotenoids are limiting. ChrR comprises two structural and functional modules; the N-terminal anti-sigma domain (ASD) binds a Zn(2+) ion, contacts sigma(E), and is sufficient to inhibit sigma(E)-dependent transcription. The ChrR C-terminal domain adopts a cupin fold, can coordinate an additional Zn(2+), and is required for the transcriptional response to singlet oxygen, a potent oxidant that damages cellular biomolecules and can kill cells. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  anti-ECFsigma factor, ChrR , cupin domain. This family contains bacterial anti-sigma factor ChrR from the photosynthetic bacterium Rhodobacter sphaeroides (Rsp) and similar proteins. ChrR is a member of the ZAS (Zn2+ anti-sigma) subfamily of group IV anti-sigmas. It inhibits transcriptional activity by binding to the Rsp extra cytoplasmic function (ECF) sigma factor E (sigmaE), an essential factor to mount a transcriptional response to a singlet oxygen and for viability when carotenoids are limiting. ChrR comprises two structural and functional modules; the N-terminal anti-sigma domain (ASD) binds a Zn(2+) ion, contacts sigma(E), and is sufficient to inhibit sigma(E)-dependent transcription. The ChrR C-terminal domain adopts a cupin fold, can coordinate an additional Zn(2+), and is required for the transcriptional response to singlet oxygen, a potent oxidant that damages cellular biomolecules and can kill cells. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd20301); members share this curated model.
