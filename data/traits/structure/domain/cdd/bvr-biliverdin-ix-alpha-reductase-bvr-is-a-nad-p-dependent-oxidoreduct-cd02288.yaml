identifier: CDD:cd02288
label: "BVR. Biliverdin IX alpha reductase (BVR) is a NAD(P)-dependent oxidoreductase which catalyzes the reduction of the gamma-meso bridge of the heme degradation product, biliverdin, to bilirubin. Bilirubin has been shown to inhibit responses of human lymphocytes, interleukin-2 production, and antibody dependent and independent cell mediated cytotoxicity. In addition to acting as an antioxidant, it inhibits protein phosphorylation and activity of enzymes such as protein kinase C and NADPH oxidase. Human BVR has been characterized as a serine/threonine kinase that is activated by oxygen radicals, is autophosphorylated, and phosphorylation is required for bilirubin formation. Also, hBVR has been shown to have DNA-binding ability; it binds to AP-1 sites in the heme oxygenase (HO-1) promoter, playing an important role in HO-1 expression.  The cyanobacterium Synechocystis sp. PCC 6803 bvdR encodes a biliverdin reductase that, like its mammalian counterparts, converts biliverdin to bilirubin; the blockage of this conversion interferes with normal phycobiliprotein biosynthesis in cyanobacteria.  BVR contains two domains: an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and is a member of the glucose-fructose oxidoreductase superfamily of proteins.  Not included in this CD are the biliverdin-IX beta reductases, predominately found in fetal tissue, and the plant ferredoxin-dependent biliverdin reductases."
definition: >-
  BVR. Biliverdin IX alpha reductase (BVR) is a NAD(P)-dependent oxidoreductase which catalyzes the reduction of the gamma-meso bridge of the heme degradation product, biliverdin, to bilirubin. Bilirubin has been shown to inhibit responses of human lymphocytes, interleukin-2 production, and antibody dependent and independent cell mediated cytotoxicity. In addition to acting as an antioxidant, it inhibits protein phosphorylation and activity of enzymes such as protein kinase C and NADPH oxidase. Human BVR has been characterized as a serine/threonine kinase that is activated by oxygen radicals, is autophosphorylated, and phosphorylation is required for bilirubin formation. Also, hBVR has been shown to have DNA-binding ability; it binds to AP-1 sites in the heme oxygenase (HO-1) promoter, playing an important role in HO-1 expression. The cyanobacterium Synechocystis sp. PCC 6803 bvdR encodes a biliverdin reductase that, like its mammalian counterparts, converts biliverdin to bilirubin; the blockage of this conversion interferes with normal phycobiliprotein biosynthesis in cyanobacteria. BVR contains two domains: an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and is a member of the glucose-fructose oxidoreductase superfamily of proteins. Not included in this CD are the biliverdin-IX beta reductases, predominately found in fetal tissue, and the plant ferredoxin-dependent biliverdin reductases. — an NCBI CDD conserved domain (cd02288); members share this curated model.
