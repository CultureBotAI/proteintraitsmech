identifier: CDD:cd21586
label: "N-terminal domain of Kruppel-like factor 6. Kruppel-like factor 6 (KLF6; also known as Krueppel-like factor 6, BCD1, CBA1, COPEB, CPBP, GBF, PAC1, ST12, or ZF9) is a protein that, in humans, is encoded by the KLF6 gene. KLF6 contributes to cell proliferation, differentiation, cell death, and signal transduction. Hepatocyte expression of KLF6 regulates hepatic fatty acid and glucose metabolism via transcriptional activation of liver glucokinase and post-transcriptional regulation of the nuclear receptor peroxisome proliferator activated receptor alpha (PPARa). KLF6-expression contributes to hepatic insulin resistance and the progression of non-alcoholic fatty liver disease (NAFLD) to non-alcoholic steatohepatitis (NASH) and NASH-cirrhosis. KLF6 also affects peroxisome proliferator activated receptor gamma (PPARgamma)-signaling in NAFLD. KLF6 has also been identified as a tumor suppressor gene that is inactivated or downregulated in different cancers, including prostate, colon, and hepatocellular carcinomas. KLF6 transactivates genes controlling cell proliferation, including p21, E-cadherin, and pituary tumor-transforming gene 1 (PTTG1). KLF6 functions as a transcriptional activator. It belongs to a family of proteins, called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation, and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF6."
definition: >-
  N-terminal domain of Kruppel-like factor 6. Kruppel-like factor 6 (KLF6; also known as Krueppel-like factor 6, BCD1, CBA1, COPEB, CPBP, GBF, PAC1, ST12, or ZF9) is a protein that, in humans, is encoded by the KLF6 gene. KLF6 contributes to cell proliferation, differentiation, cell death, and signal transduction. Hepatocyte expression of KLF6 regulates hepatic fatty acid and glucose metabolism via transcriptional activation of liver glucokinase and post-transcriptional regulation of the nuclear receptor peroxisome proliferator activated receptor alpha (PPARa). KLF6-expression contributes to hepatic insulin resistance and the progression of non-alcoholic fatty liver disease (NAFLD) to non-alcoholic steatohepatitis (NASH) and NASH-cirrhosis. KLF6 also affects peroxisome proliferator activated receptor gamma (PPARgamma)-signaling in NAFLD. KLF6 has also been identified as a tumor suppressor gene that is inactivated or downregulated in different cancers, including prostate, colon, and hepatocellular carcinomas. KLF6 transactivates genes controlling cell proliferation, including p21, E-cadherin, and pituary tumor-transforming gene 1 (PTTG1). KLF6 functions as a transcriptional activator. It belongs to a family of proteins, called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation, and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF6. — an NCBI CDD conserved domain (cd21586); members share this curated model.
