identifier: CDD:cd08876
label: "Uncharacterized subgroup of the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domain family. Functionally uncharacterized subgroup of the START domain family. The START domain family belongs to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. For some mammalian members of the START family (STARDs), it is known which lipids bind in this pocket; these include cholesterol (STARD1, -3, -4, and -5), 25-hydroxycholesterol (STARD5), phosphatidylcholine (STARD2, -7, and -10), phosphatidylethanolamine (STARD10) and ceramides (STARD11). Mammalian STARDs participate in the control of various cellular processes, including lipid trafficking between intracellular compartments, lipid metabolism, and modulation of signaling events. Mutation or altered expression of STARDs is linked to diseases such as cancer, genetic disorders, and autoimmune disease."
definition: >-
  Uncharacterized subgroup of the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domain family. Functionally uncharacterized subgroup of the START domain family. The START domain family belongs to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. For some mammalian members of the START family (STARDs), it is known which lipids bind in this pocket; these include cholesterol (STARD1, -3, -4, and -5), 25-hydroxycholesterol (STARD5), phosphatidylcholine (STARD2, -7, and -10), phosphatidylethanolamine (STARD10) and ceramides (STARD11). Mammalian STARDs participate in the control of various cellular processes, including lipid trafficking between intracellular compartments, lipid metabolism, and modulation of signaling events. Mutation or altered expression of STARDs is linked to diseases such as cancer, genetic disorders, and autoimmune disease. — an NCBI CDD conserved domain (cd08876); members share this curated model.
