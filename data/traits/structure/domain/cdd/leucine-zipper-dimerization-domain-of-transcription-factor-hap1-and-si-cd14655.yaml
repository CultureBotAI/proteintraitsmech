identifier: CDD:cd14655
label: "Leucine zipper Dimerization domain of transcription factor Hap1 and similar fungal proteins. Hap1p mediates oxygen sensing and heme signaling in yeast. In response to heme, it promotes transcription of genes required for respiration and controlling oxidative damage. It is a member of the Gal4/Gal4p family of transcriptional activators which contain an N-terminal DNA binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner. Hap1p binds to DNA containing a direct repeat of two CGG triplets. It is a large protein that contains repression modules (RPMs) and heme-responsive motifs (HRMs) in addition to the DNA-binding and dimerization domains."
definition: >-
  Leucine zipper Dimerization domain of transcription factor Hap1 and similar fungal proteins. Hap1p mediates oxygen sensing and heme signaling in yeast. In response to heme, it promotes transcription of genes required for respiration and controlling oxidative damage. It is a member of the Gal4/Gal4p family of transcriptional activators which contain an N-terminal DNA binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner. Hap1p binds to DNA containing a direct repeat of two CGG triplets. It is a large protein that contains repression modules (RPMs) and heme-responsive motifs (HRMs) in addition to the DNA-binding and dimerization domains. — an NCBI CDD conserved domain (cd14655); members share this curated model.
