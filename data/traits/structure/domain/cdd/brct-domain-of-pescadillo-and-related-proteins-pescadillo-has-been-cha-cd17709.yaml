identifier: CDD:cd17709
label: "BRCT domain of pescadillo and related proteins. Pescadillo has been characterized in zebrafish as a protein involved in the control of cell proliferation, specifically in the developing embryo. Mammalian homologs have been linked to ribosome biogenesis and nucleologenesis, and yeast homologs have been shown to be required for synthesis of the 60S ribosomal subunit. Pescadillo contains a BRCT domain."
definition: >-
  BRCT domain of pescadillo and related proteins. Pescadillo has been characterized in zebrafish as a protein involved in the control of cell proliferation, specifically in the developing embryo. Mammalian homologs have been linked to ribosome biogenesis and nucleologenesis, and yeast homologs have been shown to be required for synthesis of the 60S ribosomal subunit. Pescadillo contains a BRCT domain. — an NCBI CDD conserved domain (cd17709); members share this curated model.
