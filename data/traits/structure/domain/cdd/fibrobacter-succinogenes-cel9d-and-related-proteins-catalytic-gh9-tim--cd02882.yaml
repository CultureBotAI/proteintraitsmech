identifier: CDD:cd02882
label: "Fibrobacter succinogenes Cel9D and related proteins, catalytic GH9 TIM barrel domain. This family includes Fibrobacter succinogenes Cel9D.  Cel9D is a beta-1,4-endoglucanase with a glycosyl hydrolase family 9 (GH9) catalytic TIM barrel domain.  Cel9D catalyzes the hydrolysis of cellulose by an inverting mode of reaction, releasing glucose from the non-reducing end."
definition: >-
  Fibrobacter succinogenes Cel9D and related proteins, catalytic GH9 TIM barrel domain. This family includes Fibrobacter succinogenes Cel9D. Cel9D is a beta-1,4-endoglucanase with a glycosyl hydrolase family 9 (GH9) catalytic TIM barrel domain. Cel9D catalyzes the hydrolysis of cellulose by an inverting mode of reaction, releasing glucose from the non-reducing end. — an NCBI CDD conserved domain (cd02882); members share this curated model.
