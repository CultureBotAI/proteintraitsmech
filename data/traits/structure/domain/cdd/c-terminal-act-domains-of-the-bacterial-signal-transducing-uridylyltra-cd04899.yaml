identifier: CDD:cd04899
label: "C-terminal ACT domains of the bacterial signal-transducing uridylyltransferase /uridylyl-removing (UUR) enzyme, GlnD and related domains. This ACT domain family, ACT_ACR-UUR-like_2, includes the second of two C-terminal ACT domains of the bacterial signal-transducing uridylyltransferase /uridylyl-removing (UUR) enzyme, GlnD; including those enzymes similar to the GlnD found in enteric Escherichia coli and those found in photosynthetic, nitrogen-fixing bacterium Rhodospirillum rubrum. Also included in this CD are the second and fourth ACT domains of a novel protein composed almost entirely of ACT domain repeats, the ACR protein. These ACR proteins, found in Arabidopsis and Oryza, are proposed to function as novel regulatory or sensor proteins in plants. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  C-terminal ACT domains of the bacterial signal-transducing uridylyltransferase /uridylyl-removing (UUR) enzyme, GlnD and related domains. This ACT domain family, ACT_ACR-UUR-like_2, includes the second of two C-terminal ACT domains of the bacterial signal-transducing uridylyltransferase /uridylyl-removing (UUR) enzyme, GlnD; including those enzymes similar to the GlnD found in enteric Escherichia coli and those found in photosynthetic, nitrogen-fixing bacterium Rhodospirillum rubrum. Also included in this CD are the second and fourth ACT domains of a novel protein composed almost entirely of ACT domain repeats, the ACR protein. These ACR proteins, found in Arabidopsis and Oryza, are proposed to function as novel regulatory or sensor proteins in plants. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04899); members share this curated model.
