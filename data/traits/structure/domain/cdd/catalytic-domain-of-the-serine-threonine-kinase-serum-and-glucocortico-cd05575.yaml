identifier: CDD:cd05575
label: "Catalytic domain of the Serine/Threonine Kinase, Serum- and Glucocorticoid-induced Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SGKs are activated by insulin and growth factors via phosphoinositide 3-kinase and PDK1. They activate ion channels, ion carriers, and the Na-K-ATPase, as well as regulate the activity of enzymes and transcription factors. SGKs play important roles in transport, hormone release, neuroexcitability, cell proliferation, and apoptosis. There are three isoforms of SGK, named SGK1, SGK2, and SGK3 (also called cytokine-independent survival kinase CISK). The SGK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Serum- and Glucocorticoid-induced Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. SGKs are activated by insulin and growth factors via phosphoinositide 3-kinase and PDK1. They activate ion channels, ion carriers, and the Na-K-ATPase, as well as regulate the activity of enzymes and transcription factors. SGKs play important roles in transport, hormone release, neuroexcitability, cell proliferation, and apoptosis. There are three isoforms of SGK, named SGK1, SGK2, and SGK3 (also called cytokine-independent survival kinase CISK). The SGK subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05575); members share this curated model.
