identifier: CDD:cd10828
label: "circularly permuted PDZ domain of Tricorn protease, and related proteins. permuted PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Tricorn protease, and related domains. The tricorn protease can degrade oligopeptides (which may have been generated by the proteasome) and channel the products to F1, F2 and F3 proteases which, in turn, catalyze the terminal degradation step yielding free amino acids. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E,  alpha-helix 2 and beta-strand F. The tricorn family PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus."
definition: >-
  circularly permuted PDZ domain of Tricorn protease, and related proteins. permuted PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Tricorn protease, and related domains. The tricorn protease can degrade oligopeptides (which may have been generated by the proteasome) and channel the products to F1, F2 and F3 proteases which, in turn, catalyze the terminal degradation step yielding free amino acids. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. The tricorn family PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus. — an NCBI CDD conserved domain (cd10828); members share this curated model.
