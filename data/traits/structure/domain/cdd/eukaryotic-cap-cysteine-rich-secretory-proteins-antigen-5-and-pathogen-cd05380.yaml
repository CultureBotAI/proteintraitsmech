identifier: CDD:cd05380
label: "Eukaryotic CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain proteins. The CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain is found mainly in eukaryotes. This family includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), glioma pathogenesis-related 1 (GLIPR1), Golgi associated pathogenesis related-1 (GAPR1) proteins, peptidase inhibitor 15 (PI15), peptidase inhibitor 16 (PI16), CRISP LCCL domain containing 1 (CRISPLD1), CRISP LCCL domain containing 2 (CRISPLD2), and allergen 5 from vespid venom."
definition: >-
  Eukaryotic CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain proteins. The CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain is found mainly in eukaryotes. This family includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), glioma pathogenesis-related 1 (GLIPR1), Golgi associated pathogenesis related-1 (GAPR1) proteins, peptidase inhibitor 15 (PI15), peptidase inhibitor 16 (PI16), CRISP LCCL domain containing 1 (CRISPLD1), CRISP LCCL domain containing 2 (CRISPLD2), and allergen 5 from vespid venom. — an NCBI CDD conserved domain (cd05380); members share this curated model.
