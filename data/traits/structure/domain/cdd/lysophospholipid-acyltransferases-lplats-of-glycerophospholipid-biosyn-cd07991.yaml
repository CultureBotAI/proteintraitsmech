identifier: CDD:cd07991
label: "Lysophospholipid Acyltransferases (LPLATs) of Glycerophospholipid Biosynthesis: LPCAT1-like. Lysophospholipid acyltransferase (LPLAT) superfamily member: acyltransferases of de novo and remodeling pathways of glycerophospholipid biosynthesis which catalyze the incorporation of an acyl group from either acylCoAs or acyl-acyl carrier proteins (acylACPs) into acceptors such as glycerol 3-phosphate, dihydroxyacetone phosphate or lyso-phosphatidic acid. Included in this subgroup are such LPLATs as lysophosphatidylcholine acyltransferase 1 (LPCAT-1),  glycerol-3-phosphate acyltransferase 3 (GPAT3), and similar sequences."
definition: >-
  Lysophospholipid Acyltransferases (LPLATs) of Glycerophospholipid Biosynthesis: LPCAT1-like. Lysophospholipid acyltransferase (LPLAT) superfamily member: acyltransferases of de novo and remodeling pathways of glycerophospholipid biosynthesis which catalyze the incorporation of an acyl group from either acylCoAs or acyl-acyl carrier proteins (acylACPs) into acceptors such as glycerol 3-phosphate, dihydroxyacetone phosphate or lyso-phosphatidic acid. Included in this subgroup are such LPLATs as lysophosphatidylcholine acyltransferase 1 (LPCAT-1), glycerol-3-phosphate acyltransferase 3 (GPAT3), and similar sequences. — an NCBI CDD conserved domain (cd07991); members share this curated model.
