identifier: CDD:cd22082
label: "F-box domain found in F-box only protein 1 (FBXO1) and similar proteins. FBXO1, also called FBX1, or cyclin-F, is a substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of CP110 during G2 phase, thereby acting as an inhibitor of centrosome reduplication. It is the largest among all cyclins and oscillates in the cell cycle like other cyclins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 1 (FBXO1) and similar proteins. FBXO1, also called FBX1, or cyclin-F, is a substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of CP110 during G2 phase, thereby acting as an inhibitor of centrosome reduplication. It is the largest among all cyclins and oscillates in the cell cycle like other cyclins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22082); members share this curated model.
