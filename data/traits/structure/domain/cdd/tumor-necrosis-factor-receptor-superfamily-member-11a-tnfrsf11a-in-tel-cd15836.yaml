identifier: CDD:cd15836
label: "Tumor necrosis factor receptor superfamily member 11A (TNFRSF11A) in teleost; also known as RANK. TNFRSF11A (also known as RANK, FEO, OFE, ODFR, OSTS, PDB2, CD26, OPTB7, TRANCER, LOH18CR1) induces the activation of NF-kappa B and MAPK8/JNK through interactions with various TRAF adaptor proteins. This receptor and its ligand are important regulators of the interaction between T cells and dendritic cells. This receptor is also an essential mediator for osteoclast and lymph node development. Mutations at this locus have been associated with familial expansile osteolysis, autosomal recessive osteopetrosis, and Juvenile Paget's disease (JPD) of bone. Alternatively spliced transcript variants have been described for this locus. Mutation analysis may improve diagnosis, prognostication, recurrence risk assessment, and perhaps treatment selection among the monogenic disorders of RANKL/OPG/RANK activation."
definition: >-
