identifier: CDD:cd12657
label: "RNA recognition motif 1 (RRM1) found in vertebrate heterogeneous nuclear ribonucleoprotein M (hnRNP M). This subgroup corresponds to the RRM1 of hnRNP M, a pre-mRNA binding protein that may play an important role in the pre-mRNA processing. It also preferentially binds to poly(G) and poly(U) RNA homopolymers. Moreover, hnRNP M is able to interact with early spliceosomes, further influencing splicing patterns of specific pre-mRNAs. hnRNP M functions as the receptor of carcinoembryonic antigen (CEA) that contains the penta-peptide sequence PELPK signaling motif. In addition, hnRNP M and another splicing factor Nova-1 work together as dopamine D2 receptor (D2R) pre-mRNA-binding proteins. They regulate alternative splicing of D2R pre-mRNA in an antagonistic manner. hnRNP M contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and an unusual hexapeptide-repeat region rich in methionine and arginine residues (MR repeat motif)."
definition: >-
  RNA recognition motif 1 (RRM1) found in vertebrate heterogeneous nuclear ribonucleoprotein M (hnRNP M). This subgroup corresponds to the RRM1 of hnRNP M, a pre-mRNA binding protein that may play an important role in the pre-mRNA processing. It also preferentially binds to poly(G) and poly(U) RNA homopolymers. Moreover, hnRNP M is able to interact with early spliceosomes, further influencing splicing patterns of specific pre-mRNAs. hnRNP M functions as the receptor of carcinoembryonic antigen (CEA) that contains the penta-peptide sequence PELPK signaling motif. In addition, hnRNP M and another splicing factor Nova-1 work together as dopamine D2 receptor (D2R) pre-mRNA-binding proteins. They regulate alternative splicing of D2R pre-mRNA in an antagonistic manner. hnRNP M contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and an unusual hexapeptide-repeat region rich in methionine and arginine residues (MR repeat motif). — an NCBI CDD conserved domain (cd12657); members share this curated model.
