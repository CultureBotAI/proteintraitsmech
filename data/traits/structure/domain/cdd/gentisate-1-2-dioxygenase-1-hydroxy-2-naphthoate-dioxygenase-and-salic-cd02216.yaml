identifier: CDD:cd02216
label: "gentisate 1,2-dioxygenase, 1-hydroxy-2-naphthoate dioxygenase, and salicylate 1,2-dioxygenase, N-terminal cupin domain. This family includes the N-terminal cupin domains of three closely related bicupin aromatic ring-cleaving dioxygenases: gentisate 1,2-dioxygenase (GDO), salicylate 1,2-dioxygenase (SDO), and 1-hydroxy-2-naphthoate dioxygenase (NDO). GDO catalyzes the cleavage of the gentisate (2,5-dihydroxybenzoate) aromatic ring, a key step in the gentisate degradation pathway allowing soil bacteria to utilize 2,5-xylenol, 3,5-xylenol, and m-cresol as sole carbon and energy sources. NDO catalyzes the cleavage of 1-hydroxy-2-naphthoate as part of the bacterial phenanthrene degradation pathway. SDO is a ring cleavage dioxygenase from Pseudaminobacter salicylatoxidans that oxidizes salicylate to 2-oxohepta-3,5-dienedioic acid via a novel ring fission mechanism. SDO differs from other known GDOs and NDOs in its unique ability to oxidatively cleave many different salicylate, gentisate and 1-hydroxy-2-naphthoate substrates with high catalytic efficiency. The active site of these enzymes is located in the N-terminal domain but could be influenced by changes in the C-terminal domain, which lacks the strictly conserved metal-binding residues found in other cupin domains and is thought to be an inactive vestigial remnant."
definition: >-
  gentisate 1,2-dioxygenase, 1-hydroxy-2-naphthoate dioxygenase, and salicylate 1,2-dioxygenase, N-terminal cupin domain. This family includes the N-terminal cupin domains of three closely related bicupin aromatic ring-cleaving dioxygenases: gentisate 1,2-dioxygenase (GDO), salicylate 1,2-dioxygenase (SDO), and 1-hydroxy-2-naphthoate dioxygenase (NDO). GDO catalyzes the cleavage of the gentisate (2,5-dihydroxybenzoate) aromatic ring, a key step in the gentisate degradation pathway allowing soil bacteria to utilize 2,5-xylenol, 3,5-xylenol, and m-cresol as sole carbon and energy sources. NDO catalyzes the cleavage of 1-hydroxy-2-naphthoate as part of the bacterial phenanthrene degradation pathway. SDO is a ring cleavage dioxygenase from Pseudaminobacter salicylatoxidans that oxidizes salicylate to 2-oxohepta-3,5-dienedioic acid via a novel ring fission mechanism. SDO differs from other known GDOs and NDOs in its unique ability to oxidatively cleave many different salicylate, gentisate and 1-hydroxy-2-naphthoate substrates with high catalytic efficiency. The active site of these enzymes is located in the N-terminal domain but could be influenced by changes in the C-terminal domain, which lacks the strictly conserved metal-binding residues found in other cupin domains and is thought to be an inactive vestigial remnant. — an NCBI CDD conserved domain (cd02216); members share this curated model.
