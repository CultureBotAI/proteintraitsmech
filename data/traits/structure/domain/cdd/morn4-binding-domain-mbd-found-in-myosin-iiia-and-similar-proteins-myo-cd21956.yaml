identifier: CDD:cd21956
label: "MORN4 binding domain (MBD) found in Myosin-IIIa and similar proteins. Myosin-IIIa, also called Myo3a, is a probable actin-based motor with ATPase and kinase activities. It may function as a cellular transporter capable of moving along actin bundles in sensory cells. Myosin-IIIa is highly expressed in retina and in inner ear hair cells. It is localized to the distal ends of actin-bundled structures. It is required for normal cochlear hair bundle development and hearing, and plays an important role in the early steps of cochlear hair bundle morphogenesis. Mutations in human myosin-IIIA are responsible for progressive nonsyndromic hearing loss. This model corresponds to the MORN4 binding domain (MBD) in the tail of myosin-IIIa. MORN4 and its Drosophila ortholog retinophilin (RTP) are binding partners/cargos of class III myosins."
definition: >-
  MORN4 binding domain (MBD) found in Myosin-IIIa and similar proteins. Myosin-IIIa, also called Myo3a, is a probable actin-based motor with ATPase and kinase activities. It may function as a cellular transporter capable of moving along actin bundles in sensory cells. Myosin-IIIa is highly expressed in retina and in inner ear hair cells. It is localized to the distal ends of actin-bundled structures. It is required for normal cochlear hair bundle development and hearing, and plays an important role in the early steps of cochlear hair bundle morphogenesis. Mutations in human myosin-IIIA are responsible for progressive nonsyndromic hearing loss. This model corresponds to the MORN4 binding domain (MBD) in the tail of myosin-IIIa. MORN4 and its Drosophila ortholog retinophilin (RTP) are binding partners/cargos of class III myosins. — an NCBI CDD conserved domain (cd21956); members share this curated model.
