identifier: CDD:cd13183
label: "FERM domain C-lobe of FERM and PDZ domain containing proteins 1, 3, and 4 (FRMPD1, 3, 4). The function of FRMPD1, FRMPD3, and FRMPD4 is unknown at present. These proteins contain an N-terminal PDZ (post synaptic density protein (PSD95), Drosophila disc large tumor suppressor (Dlg1), and zonula occludens-1 protein (zo-1) domain and a C-terminal FERM domain. PDZ (also known as DHR (Dlg homologous region) or GLGF (glycine-leucine-glycine-phenylalanine) domains) help anchor transmembrane proteins to the cytoskeleton and hold together signaling complexes. PDZ domains bind to a short region of the C-terminus of other specific proteins. The FERM domain is composed of three subdomains: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3), which form a clover leaf fold. The C-lobe/F3 within the FERM domain is part of the PH domain family. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs) , the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites."
definition: >-
  FERM domain C-lobe of FERM and PDZ domain containing proteins 1, 3, and 4 (FRMPD1, 3, 4). The function of FRMPD1, FRMPD3, and FRMPD4 is unknown at present. These proteins contain an N-terminal PDZ (post synaptic density protein (PSD95), Drosophila disc large tumor suppressor (Dlg1), and zonula occludens-1 protein (zo-1) domain and a C-terminal FERM domain. PDZ (also known as DHR (Dlg homologous region) or GLGF (glycine-leucine-glycine-phenylalanine) domains) help anchor transmembrane proteins to the cytoskeleton and hold together signaling complexes. PDZ domains bind to a short region of the C-terminus of other specific proteins. The FERM domain is composed of three subdomains: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3), which form a clover leaf fold. The C-lobe/F3 within the FERM domain is part of the PH domain family. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs) , the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites. — an NCBI CDD conserved domain (cd13183); members share this curated model.
