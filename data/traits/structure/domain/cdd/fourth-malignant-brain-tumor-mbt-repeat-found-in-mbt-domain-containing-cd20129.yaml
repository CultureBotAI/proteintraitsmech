identifier: CDD:cd20129
label: "fourth malignant brain tumor (MBT) repeat found in MBT domain-containing protein 1 (MBTD1). MBTD1 is a putative Polycomb group (PcG) protein that specifically binds to monomethylated and dimethylated 'Lys-20' on histone H4. MBTD1 contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the fourth MBT repeat that contains the semi-aromatic cage that binds methylated lysine residues."
definition: >-
  fourth malignant brain tumor (MBT) repeat found in MBT domain-containing protein 1 (MBTD1). MBTD1 is a putative Polycomb group (PcG) protein that specifically binds to monomethylated and dimethylated 'Lys-20' on histone H4. MBTD1 contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the fourth MBT repeat that contains the semi-aromatic cage that binds methylated lysine residues. — an NCBI CDD conserved domain (cd20129); members share this curated model.
