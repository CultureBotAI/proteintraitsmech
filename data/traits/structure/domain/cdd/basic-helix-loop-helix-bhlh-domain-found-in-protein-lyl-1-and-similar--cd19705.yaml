identifier: CDD:cd19705
label: "basic helix-loop-helix (bHLH) domain found in protein lyl-1 and similar proteins. Lyl-1, also termed Class A basic helix-loop-helix protein 18 (bHLHa18), or lymphoblastic leukemia-derived sequence 1, is a proto-oncogenic bHLH transcription factor involved in T-cell acute lymphoblastic leukemia. It plays an important role in hematopoietic stem cell function and is required for the late stages of postnatal angiogenesis to limit the formation of new blood vessels, notably by regulating the activity of the small GTPase Rap1. LYL-1 deficiency induces a stress erythropoiesis."
definition: >-
  basic helix-loop-helix (bHLH) domain found in protein lyl-1 and similar proteins. Lyl-1, also termed Class A basic helix-loop-helix protein 18 (bHLHa18), or lymphoblastic leukemia-derived sequence 1, is a proto-oncogenic bHLH transcription factor involved in T-cell acute lymphoblastic leukemia. It plays an important role in hematopoietic stem cell function and is required for the late stages of postnatal angiogenesis to limit the formation of new blood vessels, notably by regulating the activity of the small GTPase Rap1. LYL-1 deficiency induces a stress erythropoiesis. — an NCBI CDD conserved domain (cd19705); members share this curated model.
