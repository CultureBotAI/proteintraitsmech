identifier: CDD:cd16518
label: "RING finger, HC subclass, found in RNA-binding proteins of the evolutionarily-conserved MEX-3 family. MEX-3 phosphoproteins are found in vertebrates. They are mediators of post-transcriptional regulation in different organisms, and have been implicated in many core biological processes, including embryonic development, epithelial homeostasis, immune responses, metabolism, and cancer. They contain two K homology (KH) domains that provide RNA-binding capacity, and a C-terminal C3HC4-type RING-HC finger. They shuttle between the nucleus and the cytoplasm via the CRM1-dependent export pathway. The RNA-binding protein MEX-3 from nematode Caenorhabditis elegans is the founding member of the MEX-3 family. Due to the lack of a RING-HC finger, it is not included here."
definition: >-
  RING finger, HC subclass, found in RNA-binding proteins of the evolutionarily-conserved MEX-3 family. MEX-3 phosphoproteins are found in vertebrates. They are mediators of post-transcriptional regulation in different organisms, and have been implicated in many core biological processes, including embryonic development, epithelial homeostasis, immune responses, metabolism, and cancer. They contain two K homology (KH) domains that provide RNA-binding capacity, and a C-terminal C3HC4-type RING-HC finger. They shuttle between the nucleus and the cytoplasm via the CRM1-dependent export pathway. The RNA-binding protein MEX-3 from nematode Caenorhabditis elegans is the founding member of the MEX-3 family. Due to the lack of a RING-HC finger, it is not included here. — an NCBI CDD conserved domain (cd16518); members share this curated model.
