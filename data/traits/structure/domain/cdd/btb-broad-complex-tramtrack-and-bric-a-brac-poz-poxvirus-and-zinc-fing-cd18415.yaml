identifier: CDD:cd18415
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily C members KCNC2 and KCNC4. KCNC2, also called Shaw-like potassium channel or voltage-gated potassium channel Kv3.2, is a delayed rectifier voltage-gated potassium channel that mediates transmembrane potassium transport in excitable membranes, primarily in the brain. It contributes to the regulation of the fast action potential repolarization and in sustained high-frequency firing in neurons of the central nervous system. KCNC4, also called KSHIIIC or voltage-gated potassium channel subunit Kv3.4, is a novel high-voltage-activating, tetraethylammonium (TEA)-sensitive, type-A potassium channel that mediates the voltage-dependent potassium ion permeability of excitable membranes. It plays a pivotal role in oxidative stress-related neural cell damage as an oxidation-sensitive channel. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNC2 and KCNC4 are alpha subunit that form functional homo- or hetero-tetrameric channels (with other alpha subunits) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium voltage-gated channel subfamily C members KCNC2 and KCNC4. KCNC2, also called Shaw-like potassium channel or voltage-gated potassium channel Kv3.2, is a delayed rectifier voltage-gated potassium channel that mediates transmembrane potassium transport in excitable membranes, primarily in the brain. It contributes to the regulation of the fast action potential repolarization and in sustained high-frequency firing in neurons of the central nervous system. KCNC4, also called KSHIIIC or voltage-gated potassium channel subunit Kv3.4, is a novel high-voltage-activating, tetraethylammonium (TEA)-sensitive, type-A potassium channel that mediates the voltage-dependent potassium ion permeability of excitable membranes. It plays a pivotal role in oxidative stress-related neural cell damage as an oxidation-sensitive channel. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. KCNC2 and KCNC4 are alpha subunit that form functional homo- or hetero-tetrameric channels (with other alpha subunits) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. — an NCBI CDD conserved domain (cd18415); members share this curated model.
