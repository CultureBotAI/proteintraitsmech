identifier: CDD:cd23306
label: "FGF domain, beta-trefoil fold, found in the fibroblast growth factor 7 (FGF7)-like family. The FGF7-like family includes FGF7, FGF10 and FGF22. FGF7, also called heparin-binding growth factor 7 (HBGF7), or keratinocyte growth factor (KGF), and FGF10 play important roles in the regulation of embryonic development, cell proliferation, and cell differentiation. They are required for normal branching morphogenesis. FGF7 is a growth factor active on keratinocytes. It may act as major paracrine effector of normal epithelial cell proliferation. FGF10 may play a role in wound healing. FGF22 plays a role in the fasting response, glucose homeostasis, lipolysis, and lipogenesis. It can stimulate cell proliferation (in vitro). It may be involved in hair development. FGF7 interacts with fibroblast growth factor receptor FGFR2 and fibroblast growth factor-binding protein 1 (FGFBP1). FGF10 and FGF22 interact with FGFR1, FGFR2 and FGFBP1. Members in this family contain a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in the fibroblast growth factor 7 (FGF7)-like family. The FGF7-like family includes FGF7, FGF10 and FGF22. FGF7, also called heparin-binding growth factor 7 (HBGF7), or keratinocyte growth factor (KGF), and FGF10 play important roles in the regulation of embryonic development, cell proliferation, and cell differentiation. They are required for normal branching morphogenesis. FGF7 is a growth factor active on keratinocytes. It may act as major paracrine effector of normal epithelial cell proliferation. FGF10 may play a role in wound healing. FGF22 plays a role in the fasting response, glucose homeostasis, lipolysis, and lipogenesis. It can stimulate cell proliferation (in vitro). It may be involved in hair development. FGF7 interacts with fibroblast growth factor receptor FGFR2 and fibroblast growth factor-binding protein 1 (FGFBP1). FGF10 and FGF22 interact with FGFR1, FGFR2 and FGFBP1. Members in this family contain a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23306); members share this curated model.
