identifier: CDD:cd18116
label: "F1-ATP synthase alpha (A) subunit, N-terminal domain. The alpha (A) subunit of the F1 complex of FoF1-ATP synthase, N-terminal domain. The F-ATP synthase (also called FoF1-ATPase) is found in bacterial plasma membranes, in mitochondrial inner membranes, and in chloroplast thylakoid membranes. It has also been found in the archaea Methanosarcina barkeri. It uses a proton gradient to drive ATP synthesis and hydrolyzes ATP to build the proton gradient. The extrinsic membrane domain, F1, is composed of alpha, beta, gamma, delta, and epsilon subunits with a stoichiometry of 3:3:1:1:1. The alpha subunit of the F1 ATP synthase can bind nucleotides, but is non-catalytic."
definition: >-
  F1-ATP synthase alpha (A) subunit, N-terminal domain. The alpha (A) subunit of the F1 complex of FoF1-ATP synthase, N-terminal domain. The F-ATP synthase (also called FoF1-ATPase) is found in bacterial plasma membranes, in mitochondrial inner membranes, and in chloroplast thylakoid membranes. It has also been found in the archaea Methanosarcina barkeri. It uses a proton gradient to drive ATP synthesis and hydrolyzes ATP to build the proton gradient. The extrinsic membrane domain, F1, is composed of alpha, beta, gamma, delta, and epsilon subunits with a stoichiometry of 3:3:1:1:1. The alpha subunit of the F1 ATP synthase can bind nucleotides, but is non-catalytic. — an NCBI CDD conserved domain (cd18116); members share this curated model.
