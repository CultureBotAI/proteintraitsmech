identifier: CDD:cd11676
label: "Gemin 6. Gemins 6, together with the survival motor neuron (SMN) protein, other Gemins, and Unr-interacting protein (UNRIP) form the SMN complex, which plays an important role in the Sm core assembly reaction, by binding directly to the Sm proteins, as well as UsnRNAs. Gemin 6 forms a heterodimer with Gemin 7, which serve as a surrogate for the SmB-SmD3 dimer during the formation of the heptameric Sm ring."
definition: >-
  Gemin 6. Gemins 6, together with the survival motor neuron (SMN) protein, other Gemins, and Unr-interacting protein (UNRIP) form the SMN complex, which plays an important role in the Sm core assembly reaction, by binding directly to the Sm proteins, as well as UsnRNAs. Gemin 6 forms a heterodimer with Gemin 7, which serve as a surrogate for the SmB-SmD3 dimer during the formation of the heptameric Sm ring. — an NCBI CDD conserved domain (cd11676); members share this curated model.
