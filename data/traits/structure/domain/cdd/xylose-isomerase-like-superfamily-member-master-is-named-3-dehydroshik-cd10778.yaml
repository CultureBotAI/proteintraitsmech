identifier: CDD:cd10778
label: "Xylose-isomerase-like superfamily member. Master is named 3-dehydroshikimate dehydratase, but without experimental evidence.These are uncharacterized proteins that are closely related to IolI. Ioli protein has uncharacterized function in Myo-Inositol catabolism.In B. subtilis, the iol operons iolABCDEFGHIJ and iolRS, and the iolT gene are known to be required for inositol catabolism. The iolI gene product was shown to be 2KMI/1-keto-DCI isomerase involved in DCI metabolism. IolI is paralogous to both IolH and IolE.  These are all members of the Xylose-isomerase-like TIM barrell superfamily."
definition: >-
  Xylose-isomerase-like superfamily member. Master is named 3-dehydroshikimate dehydratase, but without experimental evidence.These are uncharacterized proteins that are closely related to IolI. Ioli protein has uncharacterized function in Myo-Inositol catabolism.In B. subtilis, the iol operons iolABCDEFGHIJ and iolRS, and the iolT gene are known to be required for inositol catabolism. The iolI gene product was shown to be 2KMI/1-keto-DCI isomerase involved in DCI metabolism. IolI is paralogous to both IolH and IolE. These are all members of the Xylose-isomerase-like TIM barrell superfamily. — an NCBI CDD conserved domain (cd10778); members share this curated model.
