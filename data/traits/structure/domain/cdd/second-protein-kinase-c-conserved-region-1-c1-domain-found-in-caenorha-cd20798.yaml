identifier: CDD:cd20798
label: "second protein kinase C conserved region 1 (C1 domain) found in Caenorhabditis elegans serine/threonine-protein kinase DKF-1 and similar proteins. DKF-1 converts transient diacylglycerol (DAG) signals into prolonged physiological effects, independently of PKC. It plays a role in the regulation of growth and neuromuscular control of movement. It is involved in immune response to Staphylococcus aureus bacterium by activating transcription factor hlh-30 downstream of phospholipase plc-1. Members of this group contain two copies of the C1 domain. This model corresponds to the second one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  second protein kinase C conserved region 1 (C1 domain) found in Caenorhabditis elegans serine/threonine-protein kinase DKF-1 and similar proteins. DKF-1 converts transient diacylglycerol (DAG) signals into prolonged physiological effects, independently of PKC. It plays a role in the regulation of growth and neuromuscular control of movement. It is involved in immune response to Staphylococcus aureus bacterium by activating transcription factor hlh-30 downstream of phospholipase plc-1. Members of this group contain two copies of the C1 domain. This model corresponds to the second one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20798); members share this curated model.
