identifier: CDD:cd16221
label: "EF-hand motif found in phosphoinositide phospholipase C eta 2 (PI-PLC-eta2). PI-PLC-eta2, also termed 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase eta-2, or phosphoinositide phospholipase C-like 4, or phospholipase C-like protein 4 (PLC-L4), or phospholipase C-eta-2 (PLC-eta2), is a neuron-specific PI-PLC that is most abundant in the brain,  particularly in the hippocampus, habenula, olfactory bulb, cerebellum, and throughout the cerebral cortex. It is also expressed in the pituitary gland, pineal gland, retina, and lung, as well as in neuroendocrine cells. PI-PLC-eta2 has been implicated in the regulation of neuronal differentiation/maturation. It is required for retinoic acid-stimulated neurite growth. It may also in part function downstream of G-protein-coupled receptors and play an important role in the formation and maintenance of the neuronal network in the postnatal brain. Moreover, PI-PLC-eta2 acts as a Ca2+ sensor that shows a canonical EF-loop directing Ca2+-sensitivity and thus can amplify transient Ca2+ signals. Its activation can be triggered either by intracellular calcium mobilization or by G beta-gamma signaling. PI-PLC-eta2 contains an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core domain, a C2 domain, and a unique C-terminal tail that terminates with a PDZ-binding motif, a potential interaction site for other signaling proteins. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. The C-terminal tail harbors a number of proline-rich motifs which may interact with SH3 (Src homology 3) domain-containing proteins, as well as many serine/threonine residues, suggesting possible regulation of interactions by protein kinases/phosphatases."
definition: >-
  EF-hand motif found in phosphoinositide phospholipase C eta 2 (PI-PLC-eta2). PI-PLC-eta2, also termed 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase eta-2, or phosphoinositide phospholipase C-like 4, or phospholipase C-like protein 4 (PLC-L4), or phospholipase C-eta-2 (PLC-eta2), is a neuron-specific PI-PLC that is most abundant in the brain, particularly in the hippocampus, habenula, olfactory bulb, cerebellum, and throughout the cerebral cortex. It is also expressed in the pituitary gland, pineal gland, retina, and lung, as well as in neuroendocrine cells. PI-PLC-eta2 has been implicated in the regulation of neuronal differentiation/maturation. It is required for retinoic acid-stimulated neurite growth. It may also in part function downstream of G-protein-coupled receptors and play an important role in the formation and maintenance of the neuronal network in the postnatal brain. Moreover, PI-PLC-eta2 acts as a Ca2+ sensor that shows a canonical EF-loop directing Ca2+-sensitivity and thus can amplify transient Ca2+ signals. Its activation can be triggered either by intracellular calcium mobilization or by G beta-gamma signaling. PI-PLC-eta2 contains an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core domain, a C2 domain, and a unique C-terminal tail that terminates with a PDZ-binding motif, a potential interaction site for other signaling proteins. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. The C-terminal tail harbors a number of proline-rich motifs which may interact with SH3 (Src homology 3) domain-containing proteins, as well as many serine/threonine residues, suggesting possible regulation of interactions by protein kinases/phosphatases. — an NCBI CDD conserved domain (cd16221); members share this curated model.
