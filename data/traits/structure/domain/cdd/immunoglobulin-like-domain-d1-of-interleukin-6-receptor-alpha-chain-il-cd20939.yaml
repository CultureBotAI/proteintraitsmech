identifier: CDD:cd20939
label: "Immunoglobulin-like domain D1 of interleukin-6 receptor alpha-chain (IL-6RA, also known as CD126); member of the C2-set of IgSF domains. The members here are composed of the immunoglobulin-like domain D1 of interleukin-6 receptor alpha-chain (IL-6RA, also known as CD126). The IL-6RA ectodomain, which is highly modular, consisting of three domains (D1, D2, and D3). Interleukin-6 (IL-6) is a multifunctional cytokine that regulates the immune response, hemopoiesis, the acute phase response and inflammation. It is generated in an infectious lesion and sends out a warning signal to the entire body. IL-6 binds first to its cognate alpha-chain receptor (IL-6R), and then the IL-6/IL-6R complex which in turn induces homodimerization of gp130. As a result, a high-affinity functional receptor complex of IL-6, IL-6R and gp130 is formed, and subsequently the complex triggers a downstream signal cascade. Aberrant production of IL-6 and its receptor (IL-6R) are implicated in the pathogenesis of multiple myeloma, autoimmune diseases and prostate cancer. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the C2-set of IgSF domains. Unlike other Ig domain sets, the C2-set lacks the D strand."
definition: >-
  Immunoglobulin-like domain D1 of interleukin-6 receptor alpha-chain (IL-6RA, also known as CD126); member of the C2-set of IgSF domains. The members here are composed of the immunoglobulin-like domain D1 of interleukin-6 receptor alpha-chain (IL-6RA, also known as CD126). The IL-6RA ectodomain, which is highly modular, consisting of three domains (D1, D2, and D3). Interleukin-6 (IL-6) is a multifunctional cytokine that regulates the immune response, hemopoiesis, the acute phase response and inflammation. It is generated in an infectious lesion and sends out a warning signal to the entire body. IL-6 binds first to its cognate alpha-chain receptor (IL-6R), and then the IL-6/IL-6R complex which in turn induces homodimerization of gp130. As a result, a high-affinity functional receptor complex of IL-6, IL-6R and gp130 is formed, and subsequently the complex triggers a downstream signal cascade. Aberrant production of IL-6 and its receptor (IL-6R) are implicated in the pathogenesis of multiple myeloma, autoimmune diseases and prostate cancer. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the C2-set of IgSF domains. Unlike other Ig domain sets, the C2-set lacks the D strand. — an NCBI CDD conserved domain (cd20939); members share this curated model.
