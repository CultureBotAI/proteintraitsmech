identifier: CDD:cd18568
label: "Six-transmembrane helical domain (6-TMD) of the ABC subunit of T1SS-like HetC and similar proteins. This group represents the six-transmembrane helical domain (6-TMD) of the ABC subunit of T1SS (type 1 secretion systems), such as heterocyst differentiation protein HetC. HetC is similar to ABC protein exporters of T1SS (type 1 secretion systems) and is involved in early regulation of heterocyst differentiation in the filamentous cynobacterium Anabaena sp. T1SS are found in pathogenic Gram-negative bacteria (such as Escherichia coli, Vibrio cholerae or Bordetella pertussis) to export proteins (often proteases) across both inner and outer membranes to the extracellular medium. ABC-transporter proteins in this group carry a proteolytic peptidase domain in their N-termini, termed as C39, which cleaves a double glycine (GG) motif-containing signal peptide from substrates before secretion."
definition: >-
  Six-transmembrane helical domain (6-TMD) of the ABC subunit of T1SS-like HetC and similar proteins. This group represents the six-transmembrane helical domain (6-TMD) of the ABC subunit of T1SS (type 1 secretion systems), such as heterocyst differentiation protein HetC. HetC is similar to ABC protein exporters of T1SS (type 1 secretion systems) and is involved in early regulation of heterocyst differentiation in the filamentous cynobacterium Anabaena sp. T1SS are found in pathogenic Gram-negative bacteria (such as Escherichia coli, Vibrio cholerae or Bordetella pertussis) to export proteins (often proteases) across both inner and outer membranes to the extracellular medium. ABC-transporter proteins in this group carry a proteolytic peptidase domain in their N-termini, termed as C39, which cleaves a double glycine (GG) motif-containing signal peptide from substrates before secretion. — an NCBI CDD conserved domain (cd18568); members share this curated model.
