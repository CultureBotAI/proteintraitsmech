identifier: CDD:cd22884
label: "Mitochondrial import receptor subunit TOM22 and similar proteins. Mitochondrial import receptor subunit TOM22, also called mitochondrial 17 kDa assembly protein, mitochondrial 22 kDa outer membrane protein (MOM22), protein MAS17, or translocase of outer membrane (TOM) 22 kDa subunit, is the central component of the TOM receptor complex responsible for the recognition and translocation of cytosolically synthesized mitochondrial preproteins. It may regulate the TOM machinery organization, stability and channel gating. Together with TOM20 and TOM70, TOM22 functions as the transit peptide receptor at the surface of the mitochondrion outer membrane and facilitates the movement of preproteins into the TOM40 translocation pore. The N-terminal region of TOM22 has been shown to have chaperone-like activity, and the C-terminal region faces the intermembrane face."
definition: >-
