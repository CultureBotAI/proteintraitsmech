identifier: CDD:cd05758
label: "Fifth immunoglobulin (Ig)-like domain of Kirrel (kin of irregular chiasm-like) 3, and similar domains; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the fifth immunoglobulin (Ig)-like domain of Kirrel (kin of irregular chiasm-like) 3 (also known as Neph2). This protein has five Ig-like domains, one transmembrane domain, and a cytoplasmic tail. Included in this group is mammalian Kirrel (also known as Neph1), Kirrel2 (also known as Neph3), and Drosophila RST (also known as irregular chiasm C-roughest) protein. These proteins contain multiple Ig domains, have properties of cell adhesion molecules, and are important in organ development."
definition: >-
  Fifth immunoglobulin (Ig)-like domain of Kirrel (kin of irregular chiasm-like) 3, and similar domains; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the fifth immunoglobulin (Ig)-like domain of Kirrel (kin of irregular chiasm-like) 3 (also known as Neph2). This protein has five Ig-like domains, one transmembrane domain, and a cytoplasmic tail. Included in this group is mammalian Kirrel (also known as Neph1), Kirrel2 (also known as Neph3), and Drosophila RST (also known as irregular chiasm C-roughest) protein. These proteins contain multiple Ig domains, have properties of cell adhesion molecules, and are important in organ development. — an NCBI CDD conserved domain (cd05758); members share this curated model.
