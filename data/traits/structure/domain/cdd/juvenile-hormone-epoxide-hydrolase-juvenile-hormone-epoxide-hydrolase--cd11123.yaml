identifier: CDD:cd11123
label: "Juvenile hormone epoxide hydrolase. Juvenile hormone epoxide hydrolase (JHEH)-like:  Epoxide hydrolases are found in all living organisms, but their specific roles vary from organism to organism.  In general, they function by transforming epoxide-containing lipids through the addition of water.  This family represents the insect juvenile hormone (JH) epoxide hydrolase and related proteins.  In most insects, JH plays a role in regulating reproduction and morphogenesis.  JH is degraded by JH-specific esterase (JHE), by JHEH, and by JH diol kinase (JHDK).  JHEH degrades JH by hydrating the epoxide moiety to produce an inactive JH diol."
