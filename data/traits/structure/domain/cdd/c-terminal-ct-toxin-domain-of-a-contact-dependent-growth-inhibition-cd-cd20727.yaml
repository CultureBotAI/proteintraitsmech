identifier: CDD:cd20727
label: "C-terminal (CT) toxin domain of a contact-dependent growth inhibition (CDI) system (CdiA-CT) similar to that of Burkholderia pseudomallei, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the C-terminal (CT) toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular model contains the C-terminal (CT) toxin domains that are similar to Burkholderia pseudomallei E479 and 1026b CdiA toxins, both of which are tRNAses."
definition: >-
  C-terminal (CT) toxin domain of a contact-dependent growth inhibition (CDI) system (CdiA-CT) similar to that of Burkholderia pseudomallei, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the C-terminal (CT) toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular model contains the C-terminal (CT) toxin domains that are similar to Burkholderia pseudomallei E479 and 1026b CdiA toxins, both of which are tRNAses. — an NCBI CDD conserved domain (cd20727); members share this curated model.
