identifier: CDD:cd00337
label: "Ribosomal protein uL14. Ribosomal protein uL14 (L14 in bacteria and mitochondria, L23 in eukaryotes, L38 in fungal mitochondria) is part of the large ribosomal subunit, located between the centers of activity for peptidyl transferase and GTPase. uL14 has an \"all beta\" fold that binds 23S rRNA. Ribosomal proteins, which are components of ribosomal subunits, are RNA-binding proteins that might have multiple extra ribosomal functions and may be involved in tumorigenesis in mammals."
definition: >-
  Ribosomal protein uL14. Ribosomal protein uL14 (L14 in bacteria and mitochondria, L23 in eukaryotes, L38 in fungal mitochondria) is part of the large ribosomal subunit, located between the centers of activity for peptidyl transferase and GTPase. uL14 has an "all beta" fold that binds 23S rRNA. Ribosomal proteins, which are components of ribosomal subunits, are RNA-binding proteins that might have multiple extra ribosomal functions and may be involved in tumorigenesis in mammals. — an NCBI CDD conserved domain (cd00337); members share this curated model.
