identifier: CDD:cd14670
label: "Bacterial immunoglobulin-like hydrophobin BslA and similar proteins. BslA (YuaB) is a protein from Bacillus subtilis acting as a hydrophobin, which forms surface layers around biofilms and participates in biofilm assembly. BslA contains an unusually hydrophobic \"cap structure\", which is essential for its activity and for the ability of bacteria to form hydrophobic, non-wetting biofilms. A number of domains in various proteins from Bacilli and other bacterial lineages appear related to BslA, but do not conserve the hydrophobic cap."
definition: >-
  Bacterial immunoglobulin-like hydrophobin BslA and similar proteins. BslA (YuaB) is a protein from Bacillus subtilis acting as a hydrophobin, which forms surface layers around biofilms and participates in biofilm assembly. BslA contains an unusually hydrophobic "cap structure", which is essential for its activity and for the ability of bacteria to form hydrophobic, non-wetting biofilms. A number of domains in various proteins from Bacilli and other bacterial lineages appear related to BslA, but do not conserve the hydrophobic cap. — an NCBI CDD conserved domain (cd14670); members share this curated model.
