identifier: CDD:cd03789
label: "lipopolysaccharide heptosyltransferase and similar proteins. Lipopolysaccharide heptosyltransferase (2.4.99.B6) is involved in the biosynthesis of lipooligosaccharide (LOS). Lipopolysaccharide (LPS) is a major component of the outer membrane of gram-negative bacteria. LPS heptosyltransferase transfers heptose molecules from ADP-heptose to 3-deoxy-D-manno-octulosonic acid (KDO), a part of the inner core component of LPS. This family also contains lipopolysaccharide 1,2-N-acetylglucosaminetransferase EC 2.4.1.56 and belongs to the GT-B structural superfamily of glycoslytransferases, which have characteristic N- and C-terminal domains each containing a typical Rossmann fold. The two domains have high structural homology despite minimal sequence homology.  The large cleft that separates the two domains includes the catalytic center and permits a high degree of flexibility."
definition: >-
  lipopolysaccharide heptosyltransferase and similar proteins. Lipopolysaccharide heptosyltransferase (2.4.99.B6) is involved in the biosynthesis of lipooligosaccharide (LOS). Lipopolysaccharide (LPS) is a major component of the outer membrane of gram-negative bacteria. LPS heptosyltransferase transfers heptose molecules from ADP-heptose to 3-deoxy-D-manno-octulosonic acid (KDO), a part of the inner core component of LPS. This family also contains lipopolysaccharide 1,2-N-acetylglucosaminetransferase EC 2.4.1.56 and belongs to the GT-B structural superfamily of glycoslytransferases, which have characteristic N- and C-terminal domains each containing a typical Rossmann fold. The two domains have high structural homology despite minimal sequence homology. The large cleft that separates the two domains includes the catalytic center and permits a high degree of flexibility. — an NCBI CDD conserved domain (cd03789); members share this curated model.
