identifier: CDD:cd15558
label: "PHD finger found in Schizosaccharomyces pombe meiosis-specific protein hop1 (Hop1p) and similar proteins. Fission yeast Hop1p, also termed linear element-associated protein hop1, is an S. pombe homolog of the synaptonemal complex (SC)-associated protein Hop1 in Saccharomyces cerevisiae. In contrast to S. cerevisiae, S. pombe forms thin threads, known as linear elements (LinEs), in meiotic nuclei, instead of a canonical synaptonemal complex. LinEs contain Rec10 protein and are evolutionary relics of SC axial elements. Fission yeast Hop1p is a linear element (LinE)-associated protein. It also associates with Rec10, which plays a role in recruiting the recombination machinery to chromatin. Hop1p contains an N-terminal HORMA (for Hop1p, Rev7p, and MAD2) domain and a C-terminal plant homeodomain (PHD) finger."
definition: >-
  PHD finger found in Schizosaccharomyces pombe meiosis-specific protein hop1 (Hop1p) and similar proteins. Fission yeast Hop1p, also termed linear element-associated protein hop1, is an S. pombe homolog of the synaptonemal complex (SC)-associated protein Hop1 in Saccharomyces cerevisiae. In contrast to S. cerevisiae, S. pombe forms thin threads, known as linear elements (LinEs), in meiotic nuclei, instead of a canonical synaptonemal complex. LinEs contain Rec10 protein and are evolutionary relics of SC axial elements. Fission yeast Hop1p is a linear element (LinE)-associated protein. It also associates with Rec10, which plays a role in recruiting the recombination machinery to chromatin. Hop1p contains an N-terminal HORMA (for Hop1p, Rev7p, and MAD2) domain and a C-terminal plant homeodomain (PHD) finger. — an NCBI CDD conserved domain (cd15558); members share this curated model.
