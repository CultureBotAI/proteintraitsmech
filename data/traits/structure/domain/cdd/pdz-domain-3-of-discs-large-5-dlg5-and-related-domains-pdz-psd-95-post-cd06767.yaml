identifier: CDD:cd06767
label: "PDZ domain 3 of Discs Large 5 (Dlg5) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 3 of Drosophila and mammalian Dlg5, and related domains. Dlg5 is a scaffold protein with multiple conserved functions that are independent of each other in regulating growth, cell polarity, and cell adhesion. It has a coiled-coil domain, 4 PDZ domains and a MAGUK domain (an SH3 domain next to a non-catalytically active guanylate kinase domain). Deregulation of Dlg5 has been implicated in the malignancy of several cancer types. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This Dlg5-like family PDZ3 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain 3 of Discs Large 5 (Dlg5) and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 3 of Drosophila and mammalian Dlg5, and related domains. Dlg5 is a scaffold protein with multiple conserved functions that are independent of each other in regulating growth, cell polarity, and cell adhesion. It has a coiled-coil domain, 4 PDZ domains and a MAGUK domain (an SH3 domain next to a non-catalytically active guanylate kinase domain). Deregulation of Dlg5 has been implicated in the malignancy of several cancer types. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This Dlg5-like family PDZ3 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06767); members share this curated model.
