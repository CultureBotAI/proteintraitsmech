identifier: CDD:cd23021
label: "zinc finger HIT (zf-HIT) found in INO80 complex subunit B (INO80B) and similar proteins. INO80B, also called high mobility group AT-hook 1-like 4 (HMGA1L4), or IES2 homolog, or PAP-1-associated protein 1 (PAPA-1), or zinc finger HIT domain-containing protein 4 (ZNHIT4), is a nucleolar protein that induces growth and cell cycle arrests at the G1 phase of the cell cycle. It is a core component of the chromatin remodeling INO80 complex, which is involved in transcriptional regulation, DNA replication and probably DNA repair. INO80B harbors a zf-HIT domain which is characterized by a fold in \"treble-clef\" through interleaved CCCC and CCHC ZnF motifs that both bind a zinc atom. The yeast counterpart of INO80B is Ies2p (Ino eighty subunit 2), which doesn't have zf-HIT domain."
definition: >-
  zinc finger HIT (zf-HIT) found in INO80 complex subunit B (INO80B) and similar proteins. INO80B, also called high mobility group AT-hook 1-like 4 (HMGA1L4), or IES2 homolog, or PAP-1-associated protein 1 (PAPA-1), or zinc finger HIT domain-containing protein 4 (ZNHIT4), is a nucleolar protein that induces growth and cell cycle arrests at the G1 phase of the cell cycle. It is a core component of the chromatin remodeling INO80 complex, which is involved in transcriptional regulation, DNA replication and probably DNA repair. INO80B harbors a zf-HIT domain which is characterized by a fold in "treble-clef" through interleaved CCCC and CCHC ZnF motifs that both bind a zinc atom. The yeast counterpart of INO80B is Ies2p (Ino eighty subunit 2), which doesn't have zf-HIT domain. — an NCBI CDD conserved domain (cd23021); members share this curated model.
