identifier: CDD:cd15546
label: "PHD finger found in PHD finger proteins PHF13 and PHF23. PHF13, also termed survival time-associated PHD finger protein in ovarian cancer 1 (SPOC1), is a novel plant homeodomain (PHD) finger-containing protein that shows strong expression in spermatogonia and ovarian cancer cells, modulates chromatin structure and mitotic chromosome condensation, and is important for proper cell division. It is also required for spermatogonial stem cell differentiation and sustained spermatogenesis. The overexpression of PHF13 associates with unresectable carcinomas and shorter survival in ovarian cancer. PHF23, also termed PHD-containing protein JUNE-1, is a hypothetical protein with a PHD finger. It is encoded by gene PHF23 that acts as a candidate fusion partner for the nucleoporin gene NUP98. The NUP98-PHF23 fusion results from a cryptic translocation t(11;17)(p15;p13) in acute myeloid leukemia (AML)."
definition: >-
  PHD finger found in PHD finger proteins PHF13 and PHF23. PHF13, also termed survival time-associated PHD finger protein in ovarian cancer 1 (SPOC1), is a novel plant homeodomain (PHD) finger-containing protein that shows strong expression in spermatogonia and ovarian cancer cells, modulates chromatin structure and mitotic chromosome condensation, and is important for proper cell division. It is also required for spermatogonial stem cell differentiation and sustained spermatogenesis. The overexpression of PHF13 associates with unresectable carcinomas and shorter survival in ovarian cancer. PHF23, also termed PHD-containing protein JUNE-1, is a hypothetical protein with a PHD finger. It is encoded by gene PHF23 that acts as a candidate fusion partner for the nucleoporin gene NUP98. The NUP98-PHF23 fusion results from a cryptic translocation t(11;17)(p15;p13) in acute myeloid leukemia (AML). — an NCBI CDD conserved domain (cd15546); members share this curated model.
