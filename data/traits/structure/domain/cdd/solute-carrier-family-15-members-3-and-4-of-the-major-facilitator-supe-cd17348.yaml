identifier: CDD:cd17348
label: "Solute Carrier family 15 members 3 and 4 of the Major Facilitator Superfamily of transporters. Solute carrier family 15 members 3 (SLC15A3) and 4 (SLC15A4) are members of the proton-coupled oligopeptide transporter (POT) family of integral membrane proteins that mediate the cellular uptake of di/tripeptides and peptide-like drugs. They are peptide/histidine transporters (PHTs) that transport free histidine in addition to di/tripeptides. SLC15A4, also called peptide transporter 4 or peptide/histidine transporter 1 (PHT1), is expressed in the human brain, retina, placenta, and immune cells. It is required for Toll-like receptor 7 (TLR7)- and TLR9-mediated type I interferon production in plasmacytoid dendritic cells (pDCs) and is involved in the pathogenesis of lupus-like autoimmunity. SLC15A3, also called osteoclast transporter, peptide transporter 3, or peptide/histidine transporter 2 (PHT2), is expressed in immune tissues including the spleen and thymus. The SLC15A3/SLC15A4 group belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute Carrier family 15 members 3 and 4 of the Major Facilitator Superfamily of transporters. Solute carrier family 15 members 3 (SLC15A3) and 4 (SLC15A4) are members of the proton-coupled oligopeptide transporter (POT) family of integral membrane proteins that mediate the cellular uptake of di/tripeptides and peptide-like drugs. They are peptide/histidine transporters (PHTs) that transport free histidine in addition to di/tripeptides. SLC15A4, also called peptide transporter 4 or peptide/histidine transporter 1 (PHT1), is expressed in the human brain, retina, placenta, and immune cells. It is required for Toll-like receptor 7 (TLR7)- and TLR9-mediated type I interferon production in plasmacytoid dendritic cells (pDCs) and is involved in the pathogenesis of lupus-like autoimmunity. SLC15A3, also called osteoclast transporter, peptide transporter 3, or peptide/histidine transporter 2 (PHT2), is expressed in immune tissues including the spleen and thymus. The SLC15A3/SLC15A4 group belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17348); members share this curated model.
