identifier: CDD:cd20521
label: "first cyclin box found in G2/mitotic-specific cyclin-F (CCNF) and similar proteins. CCNF, also termed F-box only protein 1 (FBXO1), is a substrate recognition component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of CP110 during G2 phase, thereby acting as an inhibitor of centrosome reduplication. It is the largest among all cyclins and oscillates in the cell cycle like other cyclins. CCNF contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain."
definition: >-
  first cyclin box found in G2/mitotic-specific cyclin-F (CCNF) and similar proteins. CCNF, also termed F-box only protein 1 (FBXO1), is a substrate recognition component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of CP110 during G2 phase, thereby acting as an inhibitor of centrosome reduplication. It is the largest among all cyclins and oscillates in the cell cycle like other cyclins. CCNF contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20521); members share this curated model.
