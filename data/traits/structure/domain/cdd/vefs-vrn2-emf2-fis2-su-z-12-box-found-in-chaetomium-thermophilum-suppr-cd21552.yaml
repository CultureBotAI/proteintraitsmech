identifier: CDD:cd21552
label: "VEFS (VRN2-EMF2-FIS2-Su(z)12) box found in Chaetomium thermophilum suppressor of zeste 12 protein (ctSUZ12) and similar proteins. SUZ12 is a Polycomb group (PcG) protein that acts as a component of the Polycomb Repressive Complex 2 (PRC2), a histone methyltransferase complex composed of core subunits EZH2 (or EZH1), EED, SUZ12 and Rbbp4. PRC2 trimethylates histone H3K27 (H3K27me3) to mark developmentally repressed chromatin. This model corresponds to the VEFS (VRN2-EMF2-FIS2-Su(z)12) box at the C-terminus of SUZ12, which is responsible for binding to EED and EZH2 (or EZH1)."
definition: >-
  VEFS (VRN2-EMF2-FIS2-Su(z)12) box found in Chaetomium thermophilum suppressor of zeste 12 protein (ctSUZ12) and similar proteins. SUZ12 is a Polycomb group (PcG) protein that acts as a component of the Polycomb Repressive Complex 2 (PRC2), a histone methyltransferase complex composed of core subunits EZH2 (or EZH1), EED, SUZ12 and Rbbp4. PRC2 trimethylates histone H3K27 (H3K27me3) to mark developmentally repressed chromatin. This model corresponds to the VEFS (VRN2-EMF2-FIS2-Su(z)12) box at the C-terminus of SUZ12, which is responsible for binding to EED and EZH2 (or EZH1). — an NCBI CDD conserved domain (cd21552); members share this curated model.
