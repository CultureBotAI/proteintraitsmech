identifier: CDD:cd19901
label: "double-stranded RNA binding motif of RNA-binding protein 46 (RBM46) and similar proteins. RBM46 (also known as cancer/testis antigen 68 (CT68), or RNA-binding motif protein 46) plays a novel role in the regulation of embryonic stem cell (ESC) differentiation by regulating the degradation of beta-catenin mRNA. It also regulates trophectoderm specification by stabilizing Cdx2 mRNA in early mouse embryos. RBM46 contains three RNA recognition motifs (RRMs) and a C-terminal double-stranded RNA binding motif (DSRM) that is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of RNA-binding protein 46 (RBM46) and similar proteins. RBM46 (also known as cancer/testis antigen 68 (CT68), or RNA-binding motif protein 46) plays a novel role in the regulation of embryonic stem cell (ESC) differentiation by regulating the degradation of beta-catenin mRNA. It also regulates trophectoderm specification by stabilizing Cdx2 mRNA in early mouse embryos. RBM46 contains three RNA recognition motifs (RRMs) and a C-terminal double-stranded RNA binding motif (DSRM) that is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19901); members share this curated model.
