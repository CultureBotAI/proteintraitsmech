identifier: CDD:cd23340
label: "fascin-like domain, beta-trefoil fold, found in Arabidopsis thaliana actin cross-linking protein (ACP) and similar proteins. This subfamily includes a group of uncharacterized proteins similar to Arabidopsis thaliana ACPs. ACPs organize actin filaments into dynamic and complex subcellular scaffolds that orchestrate important mechanical functions, including cell motility and adhesion. Members of this subfamily contain a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Some subfamily members contain two copies of the domain."
definition: >-
  fascin-like domain, beta-trefoil fold, found in Arabidopsis thaliana actin cross-linking protein (ACP) and similar proteins. This subfamily includes a group of uncharacterized proteins similar to Arabidopsis thaliana ACPs. ACPs organize actin filaments into dynamic and complex subcellular scaffolds that orchestrate important mechanical functions, including cell motility and adhesion. Members of this subfamily contain a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Some subfamily members contain two copies of the domain. — an NCBI CDD conserved domain (cd23340); members share this curated model.
