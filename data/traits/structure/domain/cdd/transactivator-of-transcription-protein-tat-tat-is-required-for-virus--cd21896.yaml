identifier: CDD:cd21896
label: "Transactivator of transcription protein Tat. Tat is required for virus replication and is conserved in the genomes of all primate lentiviruses. Tat uses the host cell's RNA polymerase II elongation control machinery through interaction with the positive transcription elongation factor, P-TEFb, and recruits the kinase activity of cyclin-dependent kinase 9 (CDK9) for directing the factors to promote productive elongation of viral transcripts. Other Tat cofactors include a number of transcriptional coactivators with intrinsic histone acetyltransferase activity, including p300/CBP, p300/CBP-associated factor (PCAF),TAFII250 and Tat-interacting protein 60. A tat gene with two coding exons is a feature conserved in all lentiviruses suggesting that full-length Tat has an essential biological role. The C-terminal part of Tat encoded by the second coding exon has been implicated in increasing viral transcription and fitness, and in enhancing protein stability."
definition: >-
  Transactivator of transcription protein Tat. Tat is required for virus replication and is conserved in the genomes of all primate lentiviruses. Tat uses the host cell's RNA polymerase II elongation control machinery through interaction with the positive transcription elongation factor, P-TEFb, and recruits the kinase activity of cyclin-dependent kinase 9 (CDK9) for directing the factors to promote productive elongation of viral transcripts. Other Tat cofactors include a number of transcriptional coactivators with intrinsic histone acetyltransferase activity, including p300/CBP, p300/CBP-associated factor (PCAF),TAFII250 and Tat-interacting protein 60. A tat gene with two coding exons is a feature conserved in all lentiviruses suggesting that full-length Tat has an essential biological role. The C-terminal part of Tat encoded by the second coding exon has been implicated in increasing viral transcription and fitness, and in enhancing protein stability. — an NCBI CDD conserved domain (cd21896); members share this curated model.
