identifier: CDD:sd00041
label: "beta-pinwheel repeat found at the C-terminus of GyrA, ParC, and similar proteins. Beta-pinwheel repeats are found at the C-terminus of both DNA gyrase subunit A and ParC, a subunit of topoisomerase IV (topo IV). DNA gyrase, a type IIA topoisomerase is a GyrA2GyrB2 heterotetramer which introduces negative supercoiling into the circular bacterial chromosome. Topo IV, a type IIB topoisomerase, is a ParC2ParE2 tetramer, which primarily relaxes positive supercoils and mediates topological unlinking of entangled DNA segments such as catenanes. The GyrA C-terminal repeat region, referred to as the C-terminal domain or CTD, binds DNA nonspecifically; it is thought to constrain a positive supercoil by wrapping a DNA duplex around its surface, upon strand passage, this wrap is converted into two negative supercoils. All known gyrase CTDs have 6 bladed beta-pinwheels, the topo IV CTD in various organisms is more variable and includes both 3-bladed and 8-bladed pinwheels."
definition: >-
  beta-pinwheel repeat found at the C-terminus of GyrA, ParC, and similar proteins. Beta-pinwheel repeats are found at the C-terminus of both DNA gyrase subunit A and ParC, a subunit of topoisomerase IV (topo IV). DNA gyrase, a type IIA topoisomerase is a GyrA2GyrB2 heterotetramer which introduces negative supercoiling into the circular bacterial chromosome. Topo IV, a type IIB topoisomerase, is a ParC2ParE2 tetramer, which primarily relaxes positive supercoils and mediates topological unlinking of entangled DNA segments such as catenanes. The GyrA C-terminal repeat region, referred to as the C-terminal domain or CTD, binds DNA nonspecifically; it is thought to constrain a positive supercoil by wrapping a DNA duplex around its surface, upon strand passage, this wrap is converted into two negative supercoils. All known gyrase CTDs have 6 bladed beta-pinwheels, the topo IV CTD in various organisms is more variable and includes both 3-bladed and 8-bladed pinwheels. — an NCBI CDD conserved domain (sd00041); members share this curated model.
