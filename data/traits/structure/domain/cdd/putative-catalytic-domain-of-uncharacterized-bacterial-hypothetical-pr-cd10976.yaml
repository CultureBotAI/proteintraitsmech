identifier: CDD:cd10976
label: "Putative catalytic domain of uncharacterized bacterial hypothetical proteins similar to insect chitin deacetylase-like proteins. The family includes many uncharacterized bacterial hypothetical proteins that show high sequence similarity to insect chitin deacetylase-like proteins. Chitin deacetylases (CDAs, EC 3.5.1.41) are secreted metalloproteins belonging to a family of extracellular chitin-modifying enzymes that catalyze the N-deacetylation of chitin, a beta-1,4-linked N-acetylglucosamine polymer, to form chitosan, a polymer of beta-(1,4)-linked d-glucosamine residues."
definition: >-
  Putative catalytic domain of uncharacterized bacterial hypothetical proteins similar to insect chitin deacetylase-like proteins. The family includes many uncharacterized bacterial hypothetical proteins that show high sequence similarity to insect chitin deacetylase-like proteins. Chitin deacetylases (CDAs, EC 3.5.1.41) are secreted metalloproteins belonging to a family of extracellular chitin-modifying enzymes that catalyze the N-deacetylation of chitin, a beta-1,4-linked N-acetylglucosamine polymer, to form chitosan, a polymer of beta-(1,4)-linked d-glucosamine residues. — an NCBI CDD conserved domain (cd10976); members share this curated model.
