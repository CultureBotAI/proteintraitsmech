identifier: CDD:cd09927
label: "Src homology 2 domain found in Tensin-like proteins. SH2 domain found in Tensin-like proteins. The Tensins are a family of intracellular proteins that interact with receptor tyrosine kinases (RTKs), integrins, and actin. They are thought act as signaling bridges between the extracellular space and the cytoskeleton. There are four homologues: Tensin1, Tensin2 (TENC1, C1-TEN), Tensin3 and Tensin4 (cten), all of which contain a C-terminal tandem SH2-PTB domain pairing, as well as actin-binding regions that may localize them to focal adhesions. The isoforms of Tensin2 and Tensin3 contain N-terminal C1 domains, which are atypical and not expected to bind to phorbol esters. Tensins 1-3 contain a phosphatase (PTPase) and C2 domain pairing which resembles PTEN (phosphatase and tensin homologue deleted on chromosome 10) protein. PTEN is a lipid phosphatase that dephosphorylates phosphatidylinositol 3,4,5-trisphosphate (PtdIns(3,4,5)P3) to yield phosphatidylinositol 4,5-bisphosphate (PtdIns(4,5)P2). As PtdIns(3,4,5)P3 is the product of phosphatidylinositol 3-kinase (PI3K) activity, PTEN is therefore a key negative regulator of the PI3K pathway. Because of their PTEN-like domains, the Tensins may also possess phosphoinositide-binding or phosphatase capabilities. However, only Tensin2 and Tensin3 have the potential to be phosphatases since only their PTPase domains contain a cysteine residue that is essential for catalytic activity. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in Tensin-like proteins. SH2 domain found in Tensin-like proteins. The Tensins are a family of intracellular proteins that interact with receptor tyrosine kinases (RTKs), integrins, and actin. They are thought act as signaling bridges between the extracellular space and the cytoskeleton. There are four homologues: Tensin1, Tensin2 (TENC1, C1-TEN), Tensin3 and Tensin4 (cten), all of which contain a C-terminal tandem SH2-PTB domain pairing, as well as actin-binding regions that may localize them to focal adhesions. The isoforms of Tensin2 and Tensin3 contain N-terminal C1 domains, which are atypical and not expected to bind to phorbol esters. Tensins 1-3 contain a phosphatase (PTPase) and C2 domain pairing which resembles PTEN (phosphatase and tensin homologue deleted on chromosome 10) protein. PTEN is a lipid phosphatase that dephosphorylates phosphatidylinositol 3,4,5-trisphosphate (PtdIns(3,4,5)P3) to yield phosphatidylinositol 4,5-bisphosphate (PtdIns(4,5)P2). As PtdIns(3,4,5)P3 is the product of phosphatidylinositol 3-kinase (PI3K) activity, PTEN is therefore a key negative regulator of the PI3K pathway. Because of their PTEN-like domains, the Tensins may also possess phosphoinositide-binding or phosphatase capabilities. However, only Tensin2 and Tensin3 have the potential to be phosphatases since only their PTPase domains contain a cysteine residue that is essential for catalytic activity. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd09927); members share this curated model.
