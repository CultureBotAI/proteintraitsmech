identifier: CDD:cd16344
label: "low molecular weight protein arginine phosphatase. Low molecular weight protein arginine phosphatases are part of the low molecular weight phosphatase (LMWP) family. They share a highly conserved active site motif (V/I)CXGNTCRS. It has been shown that the conserved threonine, which in many LMWPTPs is an isoleucine, confers specificity to phosphoarginine over phosphotyrosine."
