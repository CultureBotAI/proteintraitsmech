identifier: CDD:cd19087
label: "AKR12A, AKR12B,  AKR12C families of aldo-keto reductase (AKR). Streptomyces fradiae TylCII, Saccharopolyspora erythraea EryBII, and Streptomyces avermitilis aveBVIII are founding members of aldo-keto reductase family 12 member A1 (AKR12A1), B1 (AKR12B1), and C1(AKR12C1), respectively. TylCII acts as a NDP-hexose 2,3-enoyl reductase. EryBII is a mycarose/desosamine reductase involved in L-mycarose and D-desosamine production. aveBVIII functions as a dTDP-4-keto-6-deoxy-L-hexose-2,3-reductase."
definition: >-
  AKR12A, AKR12B, AKR12C families of aldo-keto reductase (AKR). Streptomyces fradiae TylCII, Saccharopolyspora erythraea EryBII, and Streptomyces avermitilis aveBVIII are founding members of aldo-keto reductase family 12 member A1 (AKR12A1), B1 (AKR12B1), and C1(AKR12C1), respectively. TylCII acts as a NDP-hexose 2,3-enoyl reductase. EryBII is a mycarose/desosamine reductase involved in L-mycarose and D-desosamine production. aveBVIII functions as a dTDP-4-keto-6-deoxy-L-hexose-2,3-reductase. — an NCBI CDD conserved domain (cd19087); members share this curated model.
