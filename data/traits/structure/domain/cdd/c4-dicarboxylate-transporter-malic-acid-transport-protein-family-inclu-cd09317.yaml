identifier: CDD:cd09317
label: "C4-dicarboxylate transporter/malic acid transport protein family includes Mae1. This family contains eukaryotic homologs of C4-dicarboxylate transporter/malic acid transport proteins which are part of the Tellurite-resistance/Dicarboxylate Transporter (TDT) family. This includes the MAE1 gene in Schizosaccharomyces pombe gene that encodes malate permease, Mae1, which functions by proton symport and transports C4-dicarboxylates (malate, fumarate, succinate, oxaloacetate, etc.), but not K-ketoglutarate."
definition: >-
  C4-dicarboxylate transporter/malic acid transport protein family includes Mae1. This family contains eukaryotic homologs of C4-dicarboxylate transporter/malic acid transport proteins which are part of the Tellurite-resistance/Dicarboxylate Transporter (TDT) family. This includes the MAE1 gene in Schizosaccharomyces pombe gene that encodes malate permease, Mae1, which functions by proton symport and transports C4-dicarboxylates (malate, fumarate, succinate, oxaloacetate, etc.), but not K-ketoglutarate. — an NCBI CDD conserved domain (cd09317); members share this curated model.
