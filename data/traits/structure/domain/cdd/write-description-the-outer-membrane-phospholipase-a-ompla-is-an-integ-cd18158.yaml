identifier: CDD:cd18158
label: "write description. The outer membrane phospholipase A (OMPLA) is an integral membrane enzyme that catalyses the hydrolysis of acylester bonds in phospholipids using calcium as a cofactor. The enzyme has a fold of transmembrane beta-barrels and is widespread among Gram-negative bacteria, both in pathogens and nonpathogens. In pathogenic bacteria such as Campylobacter coli and Helicobacter pylori OMPLA is involved in pathogenesis and virulence. In nonpathogenic bacteria the physiological function of OMPLA is less clear. The Escherichia coli enzyme is involved in the secretion of bacteriocins, antibacterial peptides that are produced in order to survive under starvation conditions. The enzyme activity of OMPLA is strictly regulated to prevent uncontrolled breakdown of the surrounding phospholipids. The activity of OMPLA can be induced by membrane perturbation and concurs with dimerization of the enzyme."
definition: >-
  write description. The outer membrane phospholipase A (OMPLA) is an integral membrane enzyme that catalyses the hydrolysis of acylester bonds in phospholipids using calcium as a cofactor. The enzyme has a fold of transmembrane beta-barrels and is widespread among Gram-negative bacteria, both in pathogens and nonpathogens. In pathogenic bacteria such as Campylobacter coli and Helicobacter pylori OMPLA is involved in pathogenesis and virulence. In nonpathogenic bacteria the physiological function of OMPLA is less clear. The Escherichia coli enzyme is involved in the secretion of bacteriocins, antibacterial peptides that are produced in order to survive under starvation conditions. The enzyme activity of OMPLA is strictly regulated to prevent uncontrolled breakdown of the surrounding phospholipids. The activity of OMPLA can be induced by membrane perturbation and concurs with dimerization of the enzyme. — an NCBI CDD conserved domain (cd18158); members share this curated model.
