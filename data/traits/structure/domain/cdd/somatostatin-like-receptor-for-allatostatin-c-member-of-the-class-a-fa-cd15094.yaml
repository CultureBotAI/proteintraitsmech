identifier: CDD:cd15094
label: "somatostatin-like receptor for allatostatin C, member of the class A family of seven-transmembrane G protein-coupled receptors. G protein-coupled somatostatin receptors (SSTRs) are composed of five distinct subtypes (SSTR1-5) that display strong sequence similarity with opioid receptors. All five receptor subtypes bind the natural somatostatin (somatotropin release inhibiting factor), a polypeptide hormone that regulates a wide variety of physiological functions such as neurotransmission, cell proliferation, contractility of smooth muscle cells, and endocrine signaling as well as inhibition of the release of many secondary hormones. In Drosophila melanogaster and other insects, a 15-amino-acid peptide named allatostatin C(AstC) binds the somatostatin-like receptors. Two AstC receptors have been identified in Drosophila with strong sequence homology to human somatostatin and opioid receptors."
definition: >-
  somatostatin-like receptor for allatostatin C, member of the class A family of seven-transmembrane G protein-coupled receptors. G protein-coupled somatostatin receptors (SSTRs) are composed of five distinct subtypes (SSTR1-5) that display strong sequence similarity with opioid receptors. All five receptor subtypes bind the natural somatostatin (somatotropin release inhibiting factor), a polypeptide hormone that regulates a wide variety of physiological functions such as neurotransmission, cell proliferation, contractility of smooth muscle cells, and endocrine signaling as well as inhibition of the release of many secondary hormones. In Drosophila melanogaster and other insects, a 15-amino-acid peptide named allatostatin C(AstC) binds the somatostatin-like receptors. Two AstC receptors have been identified in Drosophila with strong sequence homology to human somatostatin and opioid receptors. — an NCBI CDD conserved domain (cd15094); members share this curated model.
