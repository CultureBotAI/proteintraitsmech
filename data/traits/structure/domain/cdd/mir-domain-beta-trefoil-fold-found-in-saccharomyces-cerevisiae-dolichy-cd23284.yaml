identifier: CDD:cd23284
label: "MIR domain, beta-trefoil fold, found in Saccharomyces cerevisiae dolichyl-phosphate-mannose--protein mannosyltransferase 2 (PMT2) and similar proteins. Dolichyl-phosphate-mannose-protein mannosyltransferases (EC 2.4.1.109), also called PMTs, are responsible for O-linked glycosylation of proteins. They catalyze the transfer of mannose to seryl and threonyl residues of secretory proteins. Protein O-glycosylation is essential for cell wall rigidity and cell integrity. In Saccharomyces cerevisiae, a family of protein mannosyltransferases coded for by seven genes (PMT1-7). The family includes PMT2, PMT3 and PMT6. PMT2 forms a heterodimeric complex with PMT1 and more rarely with PMT5. The PMT1-PMT2 complex participates in oxidative protein folding, ER-associated protein degradation (ERAD), as well as ER export. It is required for incorporation of proteins in the cell wall. PMT3 form a functional heterodimer with PMT5 and more rarely with PMT1. It may have redundant activity to PMT2. PMT6 may form a heterodimer with PMT4. Members in this family contain a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in Saccharomyces cerevisiae dolichyl-phosphate-mannose--protein mannosyltransferase 2 (PMT2) and similar proteins. Dolichyl-phosphate-mannose-protein mannosyltransferases (EC 2.4.1.109), also called PMTs, are responsible for O-linked glycosylation of proteins. They catalyze the transfer of mannose to seryl and threonyl residues of secretory proteins. Protein O-glycosylation is essential for cell wall rigidity and cell integrity. In Saccharomyces cerevisiae, a family of protein mannosyltransferases coded for by seven genes (PMT1-7). The family includes PMT2, PMT3 and PMT6. PMT2 forms a heterodimeric complex with PMT1 and more rarely with PMT5. The PMT1-PMT2 complex participates in oxidative protein folding, ER-associated protein degradation (ERAD), as well as ER export. It is required for incorporation of proteins in the cell wall. PMT3 form a functional heterodimer with PMT5 and more rarely with PMT1. It may have redundant activity to PMT2. PMT6 may form a heterodimer with PMT4. Members in this family contain a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23284); members share this curated model.
