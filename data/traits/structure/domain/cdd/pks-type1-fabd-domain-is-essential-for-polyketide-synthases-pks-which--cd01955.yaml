identifier: CDD:cd01955
label: "PKS_type1. FabD domain is essential for polyketide synthases (PKS) which closely related to fatty acid synthases (FAS).Both are multifunctional enzymes with the same ancestral enzymatic domain structure. Type I PKS are large modular enzyme systems which catalyse the biosynthesis of microcyclic polyketide products through an assembly line of active sites.Individual domains act upon the growing chain and transfer it to downstream domains through a phosphopantetheine linkage"
definition: >-
  PKS_type1. FabD domain is essential for polyketide synthases (PKS) which closely related to fatty acid synthases (FAS).Both are multifunctional enzymes with the same ancestral enzymatic domain structure. Type I PKS are large modular enzyme systems which catalyse the biosynthesis of microcyclic polyketide products through an assembly line of active sites.Individual domains act upon the growing chain and transfer it to downstream domains through a phosphopantetheine linkage — an NCBI CDD conserved domain (cd01955); members share this curated model.
