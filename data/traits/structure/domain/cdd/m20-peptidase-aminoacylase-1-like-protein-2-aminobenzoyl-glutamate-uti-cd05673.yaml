identifier: CDD:cd05673
label: "M20 Peptidase Aminoacylase 1-like protein 2 aminobenzoyl-glutamate utilization protein B subfamily. Peptidase M20 family, ACY1L2 aminobenzoyl-glutamate utilization protein B (AbgB) subfamily. This group contains mostly bacterial amidohydrolases, including gene products of abgB that catalyze the cleavage of p-aminobenzoyl-glutamate, a folate catabolite in Escherichia coli, to p-aminobenzoate and glutamate. p-Aminobenzoyl-glutamate is a natural end product of folate catabolism, and its utilization is initiated by the abg region gene product, AbgT, by enabling uptake of its into the cell in a concentration-dependent, saturable manner. It is subsequently cleaved by AbgA and AbgB (sometimes referred to as AbgAB)."
definition: >-
  M20 Peptidase Aminoacylase 1-like protein 2 aminobenzoyl-glutamate utilization protein B subfamily. Peptidase M20 family, ACY1L2 aminobenzoyl-glutamate utilization protein B (AbgB) subfamily. This group contains mostly bacterial amidohydrolases, including gene products of abgB that catalyze the cleavage of p-aminobenzoyl-glutamate, a folate catabolite in Escherichia coli, to p-aminobenzoate and glutamate. p-Aminobenzoyl-glutamate is a natural end product of folate catabolism, and its utilization is initiated by the abg region gene product, AbgT, by enabling uptake of its into the cell in a concentration-dependent, saturable manner. It is subsequently cleaved by AbgA and AbgB (sometimes referred to as AbgAB). — an NCBI CDD conserved domain (cd05673); members share this curated model.
