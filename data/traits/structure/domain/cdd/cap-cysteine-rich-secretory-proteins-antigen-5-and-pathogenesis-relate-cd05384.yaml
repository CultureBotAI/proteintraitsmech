identifier: CDD:cd05384
label: "CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of pathogen-related yeast 1 (PRY1) protein and similar fungal proteins. PRY1, also called pathogenesis-related protein 1, is a yeast protein that is up-regulated in core ESCRT mutants. It is a secreted protein required for efficient export of lipids such as acetylated sterols, and acts in detoxification of hydrophobic compounds. This PRY1-like group also contains fruiting body proteins SC7/14 from Schizophyllum commune. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others."
definition: >-
  CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of pathogen-related yeast 1 (PRY1) protein and similar fungal proteins. PRY1, also called pathogenesis-related protein 1, is a yeast protein that is up-regulated in core ESCRT mutants. It is a secreted protein required for efficient export of lipids such as acetylated sterols, and acts in detoxification of hydrophobic compounds. This PRY1-like group also contains fruiting body proteins SC7/14 from Schizophyllum commune. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. — an NCBI CDD conserved domain (cd05384); members share this curated model.
