identifier: CDD:cd20214
label: "pore-forming module of hemolytic lectin Cucumaria echinate CEL-III and similar aerolysin-type beta-barrel pore-forming proteins. Cucumaria echinate CEL-III is a Ca(2+)-dependent and galactose-specific lectin, which is cytotoxic to some cultured cell lines, has strong hemolytic activity toward human and rabbit erythrocytes, and anti-malarial activity. Hemolysis results from ion-permeable pores formed from CEL-III oligomers in the target cell membrane. Members of this group includes CEL-III isoforms: CEL-III-L1, CEL-III-L2, CEL-III-S1, CEL-III-S2, and CEL-III-LS1. Many proteins belonging to this group have two N-terminal ricin-type carbohydrate-binding domains which adopt beta-trefoil folds. Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin). The CEL-III oligomer in the membrane may be composed of six monomers."
definition: >-
  pore-forming module of hemolytic lectin Cucumaria echinate CEL-III and similar aerolysin-type beta-barrel pore-forming proteins. Cucumaria echinate CEL-III is a Ca(2+)-dependent and galactose-specific lectin, which is cytotoxic to some cultured cell lines, has strong hemolytic activity toward human and rabbit erythrocytes, and anti-malarial activity. Hemolysis results from ion-permeable pores formed from CEL-III oligomers in the target cell membrane. Members of this group includes CEL-III isoforms: CEL-III-L1, CEL-III-L2, CEL-III-S1, CEL-III-S2, and CEL-III-LS1. Many proteins belonging to this group have two N-terminal ricin-type carbohydrate-binding domains which adopt beta-trefoil folds. Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin). The CEL-III oligomer in the membrane may be composed of six monomers. — an NCBI CDD conserved domain (cd20214); members share this curated model.
