identifier: CDD:cd13189
label: "FERM domain C-lobe of Protein tyrosine phosphatase non-receptor proteins 3 and 4 (PTPN4 and PTPN3). PTPN4 (also called PTPMEG, protein tyrosine phosphatase, megakaryocyte) is a cytoplasmic protein-tyrosine phosphatase (PTP) thought to play a role in cerebellar function. PTPMEG-knockout mice have impaired memory formation and cerebellar long-term depression. PTPN3/PTPH1 is a membrane-associated PTP that is implicated in regulating tyrosine phosphorylation of growth factor receptors, p97 VCP (valosin-containing protein, or Cdc48 in Saccharomyces cerevisiae), and HBV (Hepatitis B Virus) gene expression; it is mutated in a subset of colon cancers. PTPMEG and PTPN3/PTPH1 contains a N-terminal FERM domain, a middle PDZ domain, and a C-terminal phosphatase domain. PTP1/Tyrosine-protein phosphatase 1 from nematodes and a FERM_C repeat 1 from Tetraodon nigroviridis are also included in this cd. The FERM domain has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe within the FERM domain is part of the PH domain family. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs) , the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites."
definition: >-
  FERM domain C-lobe of Protein tyrosine phosphatase non-receptor proteins 3 and 4 (PTPN4 and PTPN3). PTPN4 (also called PTPMEG, protein tyrosine phosphatase, megakaryocyte) is a cytoplasmic protein-tyrosine phosphatase (PTP) thought to play a role in cerebellar function. PTPMEG-knockout mice have impaired memory formation and cerebellar long-term depression. PTPN3/PTPH1 is a membrane-associated PTP that is implicated in regulating tyrosine phosphorylation of growth factor receptors, p97 VCP (valosin-containing protein, or Cdc48 in Saccharomyces cerevisiae), and HBV (Hepatitis B Virus) gene expression; it is mutated in a subset of colon cancers. PTPMEG and PTPN3/PTPH1 contains a N-terminal FERM domain, a middle PDZ domain, and a C-terminal phosphatase domain. PTP1/Tyrosine-protein phosphatase 1 from nematodes and a FERM_C repeat 1 from Tetraodon nigroviridis are also included in this cd. The FERM domain has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe within the FERM domain is part of the PH domain family. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs) , the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites. — an NCBI CDD conserved domain (cd13189); members share this curated model.
