identifier: CDD:cd17188
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 7 (FRMD7). FRMD7 plays an important role in neuronal development and is involved in the regulation of F-actin, neurofilament, and microtubule dynamics. It interacts with the Rho GTPase regulator, RhoGDIalpha, and activates the Rho subfamily member Rac1, which regulates reorganization of actin filaments and controls neuronal outgrowth. Mutations in the FRMD7 gene are responsible for the X-linked idiopathic congenital nystagmus (ICN), a disease which affects ocular motor control. FRMD7 contains a FERM domain, and a pleckstrin homology (PH) domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 7 (FRMD7). FRMD7 plays an important role in neuronal development and is involved in the regulation of F-actin, neurofilament, and microtubule dynamics. It interacts with the Rho GTPase regulator, RhoGDIalpha, and activates the Rho subfamily member Rac1, which regulates reorganization of actin filaments and controls neuronal outgrowth. Mutations in the FRMD7 gene are responsible for the X-linked idiopathic congenital nystagmus (ICN), a disease which affects ocular motor control. FRMD7 contains a FERM domain, and a pleckstrin homology (PH) domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17188); members share this curated model.
