identifier: CDD:cd11771
label: "Src Homology 3 domain of fungal peroxisomal membrane protein Pex13p. Pex13p, located in the peroxisomal membrane, contains two transmembrane regions and a C-terminal SH3 domain. It binds to the peroxisomal targeting type I (PTS1) receptor Pex5p and the docking factor Pex14p through its SH3 domain. It is essential for both PTS1 and PTS2 protein import pathways into the peroxisomal matrix. Pex13p binds Pex14p, which contains a PxxP motif, in a classical fashion to the proline-rich ligand binding site of its SH3 domain. It binds the WxxxF/Y motif of Pex5p in a novel site that does not compete with Pex14p binding. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of fungal peroxisomal membrane protein Pex13p. Pex13p, located in the peroxisomal membrane, contains two transmembrane regions and a C-terminal SH3 domain. It binds to the peroxisomal targeting type I (PTS1) receptor Pex5p and the docking factor Pex14p through its SH3 domain. It is essential for both PTS1 and PTS2 protein import pathways into the peroxisomal matrix. Pex13p binds Pex14p, which contains a PxxP motif, in a classical fashion to the proline-rich ligand binding site of its SH3 domain. It binds the WxxxF/Y motif of Pex5p in a novel site that does not compete with Pex14p binding. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11771); members share this curated model.
