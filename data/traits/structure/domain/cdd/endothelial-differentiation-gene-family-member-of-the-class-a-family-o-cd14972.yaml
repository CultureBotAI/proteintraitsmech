identifier: CDD:cd14972
label: "endothelial differentiation gene family, member of the class A family of seven-transmembrane G protein-coupled receptors. This group represents the endothelial differentiation gene (Edg) family of G-protein coupled receptors, melanocortin/ACTH receptors, and cannabinoid receptors as well as their closely related receptors. The Edg GPCRs bind blood borne lysophospholipids including sphingosine-1-phosphate (S1P) and lysophosphatidic acid (LPA), which are involved in the regulation of cell proliferation, survival, migration, invasion, endothelial cell shape change and cytoskeletal remodeling. The Edg receptors are classified into two subfamilies: the lysophosphatidic acid subfamily that includes LPA1 (Edg2), LPA2 (Edg4), and LPA3 (Edg7); and the S1P subfamily that includes S1P1 (Edg1), S1P2 (Edg5), S1P3 (Edg3), S1P4 (Edg6), and S1P5 (Edg8).  Melanocortin receptors bind a group of pituitary peptide hormones known as melanocortins, which include adrenocorticotropic hormone (ACTH) and the different isoforms of melanocyte-stimulating hormones. Two types of cannabinoid receptors, CB1 and CB2, are activated by naturally occurring endocannabinoids, cannabis plant-derived cannabinoids such as tetrahydrocannabinol, or synthetic cannabinoids. The CB receptors are involved in the various physiological processes such as appetite, mood, memory, and pain sensation. CB1 receptor is expressed predominantly in central and peripheral neurons, while CB2 receptor is found mainly in the immune system."
definition: >-
  endothelial differentiation gene family, member of the class A family of seven-transmembrane G protein-coupled receptors. This group represents the endothelial differentiation gene (Edg) family of G-protein coupled receptors, melanocortin/ACTH receptors, and cannabinoid receptors as well as their closely related receptors. The Edg GPCRs bind blood borne lysophospholipids including sphingosine-1-phosphate (S1P) and lysophosphatidic acid (LPA), which are involved in the regulation of cell proliferation, survival, migration, invasion, endothelial cell shape change and cytoskeletal remodeling. The Edg receptors are classified into two subfamilies: the lysophosphatidic acid subfamily that includes LPA1 (Edg2), LPA2 (Edg4), and LPA3 (Edg7); and the S1P subfamily that includes S1P1 (Edg1), S1P2 (Edg5), S1P3 (Edg3), S1P4 (Edg6), and S1P5 (Edg8). Melanocortin receptors bind a group of pituitary peptide hormones known as melanocortins, which include adrenocorticotropic hormone (ACTH) and the different isoforms of melanocyte-stimulating hormones. Two types of cannabinoid receptors, CB1 and CB2, are activated by naturally occurring endocannabinoids, cannabis plant-derived cannabinoids such as tetrahydrocannabinol, or synthetic cannabinoids. The CB receptors are involved in the various physiological processes such as appetite, mood, memory, and pain sensation. CB1 receptor is expressed predominantly in central and peripheral neurons, while CB2 receptor is found mainly in the immune system. — an NCBI CDD conserved domain (cd14972); members share this curated model.
