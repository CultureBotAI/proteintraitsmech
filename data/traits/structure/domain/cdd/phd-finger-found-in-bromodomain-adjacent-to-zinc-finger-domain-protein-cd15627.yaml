identifier: CDD:cd15627
label: "PHD finger found in bromodomain adjacent to zinc finger domain protein 1A (BAZ1A). BAZ1A, also termed ATP-dependent chromatin-remodeling protein, or ATP-utilizing chromatin assembly and remodeling factor 1 (ACF1), or CHRAC subunit ACF1, or Williams syndrome transcription factor-related chromatin-remodeling factor 180 (WCRF180), or WALp1, is a subunit of the conserved imitation switch (ISWI)-family ATP-dependent chromatin assembly and remodeling factor (ACF)/chromatin accessibility complex (CHRAC) chromatin remodeling complex, which is required for DNA replication through heterochromatin. It alters the remodeling properties of the ATPase motor protein sucrose nonfermenting-2 homolog (SNF2H). Moreover, BAZ1A and its complexes play important roles in DNA double-strand break (DSB) repair. It is essential for averting improper gene expression during spermatogenesis. It also regulates transcriptional repression of vitamin D3 receptor-regulated genes. BAZ1A contains a WAC motif, a DDT domain, BAZ 1 and BAZ 2 motifs, a WAKZ (WSTF/Acf1/KIAA0314/ZK783.4) motif, a plant homeodomain (PHD) finger, and a bromodomain."
definition: >-
  PHD finger found in bromodomain adjacent to zinc finger domain protein 1A (BAZ1A). BAZ1A, also termed ATP-dependent chromatin-remodeling protein, or ATP-utilizing chromatin assembly and remodeling factor 1 (ACF1), or CHRAC subunit ACF1, or Williams syndrome transcription factor-related chromatin-remodeling factor 180 (WCRF180), or WALp1, is a subunit of the conserved imitation switch (ISWI)-family ATP-dependent chromatin assembly and remodeling factor (ACF)/chromatin accessibility complex (CHRAC) chromatin remodeling complex, which is required for DNA replication through heterochromatin. It alters the remodeling properties of the ATPase motor protein sucrose nonfermenting-2 homolog (SNF2H). Moreover, BAZ1A and its complexes play important roles in DNA double-strand break (DSB) repair. It is essential for averting improper gene expression during spermatogenesis. It also regulates transcriptional repression of vitamin D3 receptor-regulated genes. BAZ1A contains a WAC motif, a DDT domain, BAZ 1 and BAZ 2 motifs, a WAKZ (WSTF/Acf1/KIAA0314/ZK783.4) motif, a plant homeodomain (PHD) finger, and a bromodomain. — an NCBI CDD conserved domain (cd15627); members share this curated model.
