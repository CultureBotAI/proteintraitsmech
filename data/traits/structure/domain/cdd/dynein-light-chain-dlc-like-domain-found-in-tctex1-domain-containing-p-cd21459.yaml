identifier: CDD:cd21459
label: "dynein light chain (DLC)-like domain found in Tctex1 domain-containing protein 2 (TCTEX1D2) and similar proteins. Tctex1 domain-containing protein 2 (TCTEX1D2) is required for proper retrograde ciliary transport. It associates with short-rib polydactyly syndrome proteins, such as Wdr34, Wdr60, and other dynein complex 1 and 2 subunits, and is required for ciliogenesis. TCTEX1D2 is a negative regulator of GLUT4 translocation and glucose uptake. The model corresponds to the dynein light chain (DLC)-like domain of TCTEX1D2."
definition: >-
  dynein light chain (DLC)-like domain found in Tctex1 domain-containing protein 2 (TCTEX1D2) and similar proteins. Tctex1 domain-containing protein 2 (TCTEX1D2) is required for proper retrograde ciliary transport. It associates with short-rib polydactyly syndrome proteins, such as Wdr34, Wdr60, and other dynein complex 1 and 2 subunits, and is required for ciliogenesis. TCTEX1D2 is a negative regulator of GLUT4 translocation and glucose uptake. The model corresponds to the dynein light chain (DLC)-like domain of TCTEX1D2. — an NCBI CDD conserved domain (cd21459); members share this curated model.
