identifier: CDD:cd10431
label: "Growth-hormone inducible transmembrane protein. GHITM appears to be ubiquitiously expressed in mammalian cells and expression has also been observed in various cancer cell lines. A cytoprotective function has been suggested. It is closely related to the BAX inhibitor (BI)-1 like family of small transmembrane proteins, which have been shown to have an antiapoptotic effect."
definition: >-
  Growth-hormone inducible transmembrane protein. GHITM appears to be ubiquitiously expressed in mammalian cells and expression has also been observed in various cancer cell lines. A cytoprotective function has been suggested. It is closely related to the BAX inhibitor (BI)-1 like family of small transmembrane proteins, which have been shown to have an antiapoptotic effect. — an NCBI CDD conserved domain (cd10431); members share this curated model.
