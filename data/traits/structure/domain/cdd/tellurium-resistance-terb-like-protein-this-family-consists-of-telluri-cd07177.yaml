label: "tellurium resistance terB-like protein. This family consists of tellurium resistance terB proteins, N-terminal domain of heat shock DnaJ-like proteins, N-terminal domain of Mo-dependent nitrogenase-like proteins, C-terminal domain of ABC transporter ATP-binding proteins, C-terminal domain of serine/threonine protein kinase, and many hypothetical bacterial proteins. The function of this family is unknown."
