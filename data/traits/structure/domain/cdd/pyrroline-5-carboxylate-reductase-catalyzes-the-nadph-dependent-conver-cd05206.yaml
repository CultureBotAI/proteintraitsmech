definition: >-
  Pyrroline-5-carboxylate reductase catalyzes the NADPH-dependent conversion of pyrroline-5-carboxylate (P5C) to proline. It has an NAD binding domain in a ROssmann fold and resembles mebersof the 6-phosphogluyconate dehydrogenase family. — an NCBI CDD conserved domain (cd05206); members share this curated model.
