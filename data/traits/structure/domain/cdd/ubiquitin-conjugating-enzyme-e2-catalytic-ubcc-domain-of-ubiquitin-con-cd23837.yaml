identifier: CDD:cd23837
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 O and related proteins. The E2O subfamily includes mammalian ubiquitin-conjugating enzymes E2 O (UBE2O, EC 2.3.2.24), plant ubiquitin-conjugating enzyme E2 23-26 (UBC23-26, EC2.3.2.23) and E2 38-39 (UBC38-39, EC2.3.2.23), and similar proteins. UBE2O is an E2/E3 hybrid ubiquitin-protein ligase that displays both E2 and E3 ligase activities and mediates monoubiquitination of target proteins. Arabidopsis thaliana UBC proteins accept the ubiquitin from the E1 complex and catalyzes its covalent attachment to other proteins. UBC24, also called PHO2, mediates PHO1 degradation through multivesicular body-mediated vacuolar proteolysis in response to inorganic phosphate (Pi) availability. It negatively regulates the protein abundance of PHF1 and PHT1s under Pi-sufficient conditions by facilitating the degradation of PHT1 proteins at the endomembrane."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 O and related proteins. The E2O subfamily includes mammalian ubiquitin-conjugating enzymes E2 O (UBE2O, EC 2.3.2.24), plant ubiquitin-conjugating enzyme E2 23-26 (UBC23-26, EC2.3.2.23) and E2 38-39 (UBC38-39, EC2.3.2.23), and similar proteins. UBE2O is an E2/E3 hybrid ubiquitin-protein ligase that displays both E2 and E3 ligase activities and mediates monoubiquitination of target proteins. Arabidopsis thaliana UBC proteins accept the ubiquitin from the E1 complex and catalyzes its covalent attachment to other proteins. UBC24, also called PHO2, mediates PHO1 degradation through multivesicular body-mediated vacuolar proteolysis in response to inorganic phosphate (Pi) availability. It negatively regulates the protein abundance of PHF1 and PHT1s under Pi-sufficient conditions by facilitating the degradation of PHT1 proteins at the endomembrane. — an NCBI CDD conserved domain (cd23837); members share this curated model.
