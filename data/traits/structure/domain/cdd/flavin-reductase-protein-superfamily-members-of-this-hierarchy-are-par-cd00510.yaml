identifier: CDD:cd00510
label: "Flavin reductase protein superfamily. Members of this hierarchy are part of a two-component enzyem system. The smaller component is a flavin reductase which reduces FMN or FAD using NAD(P)H as cofactor. The larger component enzyme then uses the reduced flavin to hydroxylate the substrates."
definition: >-
  Flavin reductase protein superfamily. Members of this hierarchy are part of a two-component enzyem system. The smaller component is a flavin reductase which reduces FMN or FAD using NAD(P)H as cofactor. The larger component enzyme then uses the reduced flavin to hydroxylate the substrates. — an NCBI CDD conserved domain (cd00510); members share this curated model.
