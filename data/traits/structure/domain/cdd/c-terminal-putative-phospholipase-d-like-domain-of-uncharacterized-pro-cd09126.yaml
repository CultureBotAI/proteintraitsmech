identifier: CDD:cd09126
label: "C-terminal putative phospholipase D-like domain of uncharacterized prokaryotic HKD family nucleases fused to DEAD/DEAH box helicases. C-terminal putative phospholipase D (PLD)-like domain of uncharacterized prokaryotic HKD family nucleases fused to a DEAD/DEAH box helicase domain. All members of this subfamily are uncharacterized. In addition to the helicase-like region, members of this family also contain a PLD-like domain in the C-terminal region, which is characterized by a variant HKD (H-x-K-x(4)-D motif, where x represents any amino acid residue) motif. Due to the lack of key residues related to PLD activity in the variant HKD motif, members of this subfamily are most unlikely to carry PLD activity."
definition: >-
  C-terminal putative phospholipase D-like domain of uncharacterized prokaryotic HKD family nucleases fused to DEAD/DEAH box helicases. C-terminal putative phospholipase D (PLD)-like domain of uncharacterized prokaryotic HKD family nucleases fused to a DEAD/DEAH box helicase domain. All members of this subfamily are uncharacterized. In addition to the helicase-like region, members of this family also contain a PLD-like domain in the C-terminal region, which is characterized by a variant HKD (H-x-K-x(4)-D motif, where x represents any amino acid residue) motif. Due to the lack of key residues related to PLD activity in the variant HKD motif, members of this subfamily are most unlikely to carry PLD activity. — an NCBI CDD conserved domain (cd09126); members share this curated model.
