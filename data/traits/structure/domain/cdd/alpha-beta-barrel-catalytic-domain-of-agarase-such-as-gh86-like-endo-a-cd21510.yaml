identifier: CDD:cd21510
label: "alpha-beta barrel catalytic domain of agarase, such as GH86-like endo-acting agarases identified in non-marine organisms. Typically, agarases (E.C. 3.2.1.81) are found in ocean-dwelling bacteria since agarose is a principle component of red algae cell wall polysaccharides. Agarose is a linear polymer of alternating D-galactose and 3,6-anhydro-L-galactopyranose. Endo-acting agarases, such as glycoside hydrolase 16 (GH16) and GH86 hydrolyze internal beta-1,4 linkages. GH86-like endo-acting agarase of this protein family has been identified in the human intestinal bacterium Bacteroides uniformis. This acquired metabolic pathway, as demonstrated by the prevalence of agar-specific genetic cluster called polysaccharide utilization loci (PULs), varies considerably between human populations, being much more prevalent in a Japanese sample than in North America, European, or Chinese samples. Agarase activity was also identified in the non-marine bacterium Cellvibrio sp."
definition: >-
  alpha-beta barrel catalytic domain of agarase, such as GH86-like endo-acting agarases identified in non-marine organisms. Typically, agarases (E.C. 3.2.1.81) are found in ocean-dwelling bacteria since agarose is a principle component of red algae cell wall polysaccharides. Agarose is a linear polymer of alternating D-galactose and 3,6-anhydro-L-galactopyranose. Endo-acting agarases, such as glycoside hydrolase 16 (GH16) and GH86 hydrolyze internal beta-1,4 linkages. GH86-like endo-acting agarase of this protein family has been identified in the human intestinal bacterium Bacteroides uniformis. This acquired metabolic pathway, as demonstrated by the prevalence of agar-specific genetic cluster called polysaccharide utilization loci (PULs), varies considerably between human populations, being much more prevalent in a Japanese sample than in North America, European, or Chinese samples. Agarase activity was also identified in the non-marine bacterium Cellvibrio sp. — an NCBI CDD conserved domain (cd21510); members share this curated model.
