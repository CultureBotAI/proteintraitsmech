identifier: CDD:cd02881
label: "Clostridium thermocellum CbhA, CelD, CelJ, and related endoglucanases - catalytic GH9 TIM barrel domain. This family includes mostly bacterial proteins with a catalytic domain that is sequence-similar to the catalytic domain of the Clostridium thermocellum CbhA, CelD, and CelJ beta-1,4-endoglucanases.  These enzymes have a glycosyl hydrolase family 9 (GH9) catalytic TIM barrel domain as well as an N-terminal IG-like (immunoglobulin-like) domain and, in some cases, a CBM (carbohydrate binding module) domain located at either the N- or C-terminus.  This family includes the Clostridium thermocellum CbhA cellobiohydrolase, the Clostridium thermocellum CelD, and CelJ cellulases, the Clostridium cellulolyticum Cel9E, the Cellulomonas fimi CenC endoglucanase, and the Clostridium cellulovorans EngO endoglucanase."
definition: >-
  Clostridium thermocellum CbhA, CelD, CelJ, and related endoglucanases - catalytic GH9 TIM barrel domain. This family includes mostly bacterial proteins with a catalytic domain that is sequence-similar to the catalytic domain of the Clostridium thermocellum CbhA, CelD, and CelJ beta-1,4-endoglucanases. These enzymes have a glycosyl hydrolase family 9 (GH9) catalytic TIM barrel domain as well as an N-terminal IG-like (immunoglobulin-like) domain and, in some cases, a CBM (carbohydrate binding module) domain located at either the N- or C-terminus. This family includes the Clostridium thermocellum CbhA cellobiohydrolase, the Clostridium thermocellum CelD, and CelJ cellulases, the Clostridium cellulolyticum Cel9E, the Cellulomonas fimi CenC endoglucanase, and the Clostridium cellulovorans EngO endoglucanase. — an NCBI CDD conserved domain (cd02881); members share this curated model.
