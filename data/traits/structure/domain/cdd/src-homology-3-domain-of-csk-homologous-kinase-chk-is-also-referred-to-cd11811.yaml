identifier: CDD:cd11811
label: "Src Homology 3 domain of CSK homologous kinase. CHK is also referred to as megakaryocyte-associated tyrosine kinase (Matk). It inhibits Src kinases using a noncatalytic mechanism by simply binding to them. As a negative regulator of Src kinases, Chk may play important roles in cell proliferation, survival, and differentiation, and consequently, in cancer development and progression. To inhibit Src kinases that are anchored to the plasma membrane, CHK is translocated to the membrane via binding to specific transmembrane proteins, G-proteins, or adaptor proteins near the membrane. CHK also plays a role in neural differentiation in a manner independent of Src by enhancing MAPK activation via Ras-mediated signaling. It is a cytoplasmic (or nonreceptor) tyr kinase containing the Src homology domains, SH3 and SH2, N-terminal to the catalytic tyr kinase domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of CSK homologous kinase. CHK is also referred to as megakaryocyte-associated tyrosine kinase (Matk). It inhibits Src kinases using a noncatalytic mechanism by simply binding to them. As a negative regulator of Src kinases, Chk may play important roles in cell proliferation, survival, and differentiation, and consequently, in cancer development and progression. To inhibit Src kinases that are anchored to the plasma membrane, CHK is translocated to the membrane via binding to specific transmembrane proteins, G-proteins, or adaptor proteins near the membrane. CHK also plays a role in neural differentiation in a manner independent of Src by enhancing MAPK activation via Ras-mediated signaling. It is a cytoplasmic (or nonreceptor) tyr kinase containing the Src homology domains, SH3 and SH2, N-terminal to the catalytic tyr kinase domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11811); members share this curated model.
