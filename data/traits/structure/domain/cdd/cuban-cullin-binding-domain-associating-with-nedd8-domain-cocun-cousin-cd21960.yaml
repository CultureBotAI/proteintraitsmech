identifier: CDD:cd21960
label: "CUBAN (Cullin?Binding domain Associating with NEDD8) domain/CoCUN (Cousin of CUBAN) domain, a novel ubiquitin-binding domain (UBD), found in protein KHNYN, NEDD4-binding protein 1 (N4BP1) and similar proteins. The CUBAN/CoCUN domain family includes protein KHNYN and NEDD4-binding protein 1 (N4BP1). KHNYN, also called KH and NYN domain-containing protein, is a novel cofactor for zinc finger antiviral protein (ZAP) to target CpG-containing retroviral RNA for degradation. The model corresponds to CUBAN (Cullin?Binding domain Associating with NEDD8) domain of KHNYN, which binds to neddylated cullins and shows a clear preference for NEDD8 over monomeric ubiquitin. N4BP1 is a newly identified nucleolar protein that undergoes SUMO-regulated polyubiquitylation and proteasomal turnover at promyelocytic leukemia nuclear bodies. It is an inhibitor of the E3 ubiquitin-protein ligase ITCH. It acts by interacting with the second WW domain of ITCH, leading to compete with ITCH's substrates and impairing ubiquitination of substrates. N4BP1 interacts with the WW and HECT domains of the E3 ubiquitin ligase Nedd4, as part of an effort to discover targets of ubiquitin-mediated protein degradation that might play key roles in normal development. The model corresponds to N4BP1 CoCUN domain, for Cousin of CUBAN. CUBAN (Cullin?Binding domain Associating with NEDD8) is found in protein KHNYN (also called KH and NYN domain-containing protein), a novel cofactor for zinc finger antiviral protein (ZAP) to target CpG-containing retroviral RNA for degradation. The CoCUN domain lacks the NEDD8 binding properties observed in CUBAN. Both CUBAN domain and CoCUN domain are novel ubiquitin-binding domains (UBDs), which are not evolutionary related to coupling of ubiquitin conjugation to endoplasmic-reticulum (ER) degradation (CUE) domains."
