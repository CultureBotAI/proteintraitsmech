identifier: CDD:cd06089
label: "KOW motif of Ribosomal Protein L26. RPL26 and its bacterial paralogs RPL24 have a KOW motif at their N terminal. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. RPL26 makes a very minor contributions to the biogenesis, structure, and function of 60s ribosomal subunits. However, RPL24 is essential to generate the first intermediate during 50s ribosomal subunits assembly. RPL26 have an extra-ribosomal function to enhances p53 translation after DNA damage."
definition: >-
  KOW motif of Ribosomal Protein L26. RPL26 and its bacterial paralogs RPL24 have a KOW motif at their N terminal. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. RPL26 makes a very minor contributions to the biogenesis, structure, and function of 60s ribosomal subunits. However, RPL24 is essential to generate the first intermediate during 50s ribosomal subunits assembly. RPL26 have an extra-ribosomal function to enhances p53 translation after DNA damage. — an NCBI CDD conserved domain (cd06089); members share this curated model.
