identifier: CDD:cd09157
label: "Putative catalytic domain, repeat 1, of uncharacterized proteins similar to bacterial cardiolipin synthase. Putative catalytic domain, repeat 1, of uncharacterized proteins similar to bacterial cardiolipin (CL) synthases, which catalyze the reversible phosphatidyl group transfer between two phosphatidylglycerol molecules to form CL and glycerol. Members of this subfamily contain two HKD motifs (H-x-K-x(4)-D, where x represents any amino acid residue) that characterizes the phospholipase D (PLD) superfamily. The two motifs may be part of the active site and may be involved in phosphatidyl group transfer."
definition: >-
  Putative catalytic domain, repeat 1, of uncharacterized proteins similar to bacterial cardiolipin synthase. Putative catalytic domain, repeat 1, of uncharacterized proteins similar to bacterial cardiolipin (CL) synthases, which catalyze the reversible phosphatidyl group transfer between two phosphatidylglycerol molecules to form CL and glycerol. Members of this subfamily contain two HKD motifs (H-x-K-x(4)-D, where x represents any amino acid residue) that characterizes the phospholipase D (PLD) superfamily. The two motifs may be part of the active site and may be involved in phosphatidyl group transfer. — an NCBI CDD conserved domain (cd09157); members share this curated model.
