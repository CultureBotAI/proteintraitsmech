identifier: CDD:cd11500
label: "Na(+)- and Cl(-)-dependent L-proline transporter PROT; solute-binding domain. PROT is a high-affinity L-proline transporter that transports L-proline, and may have a role in excitatory neurotransmission. Human PROT is encoded by the SLC6A7 gene, a potential susceptible gene for asthma. PROT is expressed in the brain. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent L-proline transporter PROT; solute-binding domain. PROT is a high-affinity L-proline transporter that transports L-proline, and may have a role in excitatory neurotransmission. Human PROT is encoded by the SLC6A7 gene, a potential susceptible gene for asthma. PROT is expressed in the brain. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11500); members share this curated model.
