identifier: CDD:cd19817
label: "B-box-type 1 zinc finger found in Abscission/NoCut checkpoint regulator (ANCHR) and similar proteins. ANCHR, also termed MLL partner containing FYVE domain, or zinc finger FYVE domain-containing protein 19, is a key regulator of the abscission step in cytokinesis: part of the cytokinesis checkpoint, a process required to delay abscission to prevent both premature resolution of intercellular chromosome bridges and accumulation of DNA damage. The family also includes zinc finger B-box domain-containing protein 1 (ZBBX), a B-box motif containing protein with unclear biological function. The B-box motif of this family shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
definition: >-
  B-box-type 1 zinc finger found in Abscission/NoCut checkpoint regulator (ANCHR) and similar proteins. ANCHR, also termed MLL partner containing FYVE domain, or zinc finger FYVE domain-containing protein 19, is a key regulator of the abscission step in cytokinesis: part of the cytokinesis checkpoint, a process required to delay abscission to prevent both premature resolution of intercellular chromosome bridges and accumulation of DNA damage. The family also includes zinc finger B-box domain-containing protein 1 (ZBBX), a B-box motif containing protein with unclear biological function. The B-box motif of this family shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19817); members share this curated model.
