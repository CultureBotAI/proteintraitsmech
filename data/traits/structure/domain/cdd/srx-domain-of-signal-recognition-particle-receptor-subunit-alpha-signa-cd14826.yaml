identifier: CDD:cd14826
label: "SRX domain of signal recognition particle receptor subunit alpha. Signal recognition particle receptor subunit alpha (SR-alpha) is part of the membrane-associated heterodimeric receptor for the signal recognition particle (SRP). The signal recognition particle (SRP) pathway is highly conserved and plays an important role in the translocation of proteins across and insertion into membranes by targeting the translating ribosome to the endoplasmic reticulum. The N-terminal SRX domain of SR-alpha has a profilin-like fold and has been shown to be the interaction site with the second subunit, SR-beta."
definition: >-
  SRX domain of signal recognition particle receptor subunit alpha. Signal recognition particle receptor subunit alpha (SR-alpha) is part of the membrane-associated heterodimeric receptor for the signal recognition particle (SRP). The signal recognition particle (SRP) pathway is highly conserved and plays an important role in the translocation of proteins across and insertion into membranes by targeting the translating ribosome to the endoplasmic reticulum. The N-terminal SRX domain of SR-alpha has a profilin-like fold and has been shown to be the interaction site with the second subunit, SR-beta. — an NCBI CDD conserved domain (cd14826); members share this curated model.
