identifier: CDD:cd08909
label: "C-terminal lipid-binding START domain of mammalian STARD13 and related proteins, which also have an N-terminal Rho GTPase-activating protein (RhoGAP) domain. This subgroup includes the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domains of STARD13 (also known as DLC-2, Arhgap37, and SDCCAG13) and related proteins. It belongs to the START domain family, and in turn to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. Proteins belonging to this subfamily also have a RhoGAP domain. The precise function of the START domain in this subgroup is unclear."
definition: >-
  C-terminal lipid-binding START domain of mammalian STARD13 and related proteins, which also have an N-terminal Rho GTPase-activating protein (RhoGAP) domain. This subgroup includes the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domains of STARD13 (also known as DLC-2, Arhgap37, and SDCCAG13) and related proteins. It belongs to the START domain family, and in turn to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. Proteins belonging to this subfamily also have a RhoGAP domain. The precise function of the START domain in this subgroup is unclear. — an NCBI CDD conserved domain (cd08909); members share this curated model.
