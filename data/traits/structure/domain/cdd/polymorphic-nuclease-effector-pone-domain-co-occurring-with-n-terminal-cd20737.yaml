identifier: CDD:cd20737
label: "Polymorphic Nuclease effector (PoNe) domain co-occurring with N-terminal domains such as the HINT domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with a pre-toxin HINT domain, a member of the HINT superfamily of proteases usually found N-terminal to the toxin module in polymorphic toxin systems; the HINT domain is predicted to function in releasing the toxin domain by autoproteolysis."
definition: >-
  Polymorphic Nuclease effector (PoNe) domain co-occurring with N-terminal domains such as the HINT domain. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with a pre-toxin HINT domain, a member of the HINT superfamily of proteases usually found N-terminal to the toxin module in polymorphic toxin systems; the HINT domain is predicted to function in releasing the toxin domain by autoproteolysis. — an NCBI CDD conserved domain (cd20737); members share this curated model.
