identifier: CDD:cd11758
label: "N-terminal Src Homology 3 domain of Ct10 Regulator of Kinase adaptor proteins. CRK adaptor proteins consists of SH2 and SH3 domains, which bind tyrosine-phosphorylated peptides and proline-rich motifs, respectively. They function downstream of protein tyrosine kinases in many signaling pathways started by various extracellular signals, including growth and differentiation factors. Cellular CRK (c-CRK) contains a single SH2 domain, followed by N-terminal and C-terminal SH3 domains. It is involved in the regulation of many cellular processes including cell growth, motility, adhesion, and apoptosis. CRK has been implicated in the malignancy of various human cancers. The N-terminal SH3 domain of CRK binds a number of target proteins including DOCK180, C3G, SOS, and cABL. The CRK family includes two alternatively spliced protein forms, CRKI and CRKII, that are expressed by the CRK gene, and the CRK-like (CRKL) protein, which is expressed by a distinct gene (CRKL). SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  N-terminal Src Homology 3 domain of Ct10 Regulator of Kinase adaptor proteins. CRK adaptor proteins consists of SH2 and SH3 domains, which bind tyrosine-phosphorylated peptides and proline-rich motifs, respectively. They function downstream of protein tyrosine kinases in many signaling pathways started by various extracellular signals, including growth and differentiation factors. Cellular CRK (c-CRK) contains a single SH2 domain, followed by N-terminal and C-terminal SH3 domains. It is involved in the regulation of many cellular processes including cell growth, motility, adhesion, and apoptosis. CRK has been implicated in the malignancy of various human cancers. The N-terminal SH3 domain of CRK binds a number of target proteins including DOCK180, C3G, SOS, and cABL. The CRK family includes two alternatively spliced protein forms, CRKI and CRKII, that are expressed by the CRK gene, and the CRK-like (CRKL) protein, which is expressed by a distinct gene (CRKL). SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11758); members share this curated model.
