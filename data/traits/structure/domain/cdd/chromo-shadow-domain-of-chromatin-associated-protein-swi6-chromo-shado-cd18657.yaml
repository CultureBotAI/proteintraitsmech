identifier: CDD:cd18657
label: "chromo shadow domain of chromatin-associated protein Swi6. Chromo shadow domain (CSD) of fission yeast Swi6 protein. Swi6 is a structural and functional homolog of mammalian HP1 (heterochromatin protein 1) and is involved in the chromatin structure by binding to centromere, telomere and silent mating-type locus. Swi6 contains a N-terminal chromo (CHRromatin Organization MOdifier) domain and a C-terminal chromo shadow domain (CSD). Swi6 binds histone H3 tails methylated at Lys- and the cohesion subunit Psc3, leading to silencing the genes and sister chromatid cohesion. It is also involved in the repression of the silent mating-type loci MAT2 and MAT3. Swi6 may compact MAT2/3 into a heterochromatin-like conformation which represses the transcription of these silent cassettes. The chromo shadow domain (CSD) is always found in association with a related N-terminal chromo (CHRromatin Organization MOdifier) domain. CSD domains have only been found in proteins that also possess a chromodomain, while chromodomains can exist in isolation."
definition: >-
