identifier: CDD:cd05887
label: "First immunoglobulin variable (IgV) domain of nectin-3 (also known as poliovirus receptor related protein 3), and similar domains. The members here are composed of the first immunoglobulin (Ig) domain of nectin-3 (also known as poliovirus receptor related protein 3 (PVRL3) or cluster of differentiation (CD) 113). Nectin-3 belongs to the nectin family comprised of four transmembrane glycoproteins (nectins-1 through -4). Nectins are synaptic cell adhesion molecules (CAMs) which participate in adhesion and signaling at various intracellular junctions. Nectins form homophilic cis-dimers, followed by homophilic and heterophilic trans-dimers involved in cell-cell adhesion. For example, during spermatid development, the nectin-3,-2 trans-interaction is required for the formation of Sertoli cell-spermatid junctions in testis, and during morphogenesis of the ciliary body, the nectin-3,-1 trans-interaction is important for apex-apex adhesion between the pigment and non-pigment layers of the ciliary epithelia. Nectins also heterophilically trans-interact with other CAMs such as nectin-like molecules (Necls); nectin-3 for example, trans-interacts with Necl-5, regulating cell movement and proliferation. Other proteins with which nectin-3 interacts include the actin filament-binding protein, afadin, integrin alpha-beta3, Par-3, and PDGF receptor; its interaction with PDGF receptor regulates the latter's signaling for anti-apoptosis."
definition: >-
  First immunoglobulin variable (IgV) domain of nectin-3 (also known as poliovirus receptor related protein 3), and similar domains. The members here are composed of the first immunoglobulin (Ig) domain of nectin-3 (also known as poliovirus receptor related protein 3 (PVRL3) or cluster of differentiation (CD) 113). Nectin-3 belongs to the nectin family comprised of four transmembrane glycoproteins (nectins-1 through -4). Nectins are synaptic cell adhesion molecules (CAMs) which participate in adhesion and signaling at various intracellular junctions. Nectins form homophilic cis-dimers, followed by homophilic and heterophilic trans-dimers involved in cell-cell adhesion. For example, during spermatid development, the nectin-3,-2 trans-interaction is required for the formation of Sertoli cell-spermatid junctions in testis, and during morphogenesis of the ciliary body, the nectin-3,-1 trans-interaction is important for apex-apex adhesion between the pigment and non-pigment layers of the ciliary epithelia. Nectins also heterophilically trans-interact with other CAMs such as nectin-like molecules (Necls); nectin-3 for example, trans-interacts with Necl-5, regulating cell movement and proliferation. Other proteins with which nectin-3 interacts include the actin filament-binding protein, afadin, integrin alpha-beta3, Par-3, and PDGF receptor; its interaction with PDGF receptor regulates the latter's signaling for anti-apoptosis. — an NCBI CDD conserved domain (cd05887); members share this curated model.
