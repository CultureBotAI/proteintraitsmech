identifier: CDD:cd05423
label: "C-terminal nucleotidyltransferase (NT) domain (DUF294), found associated with CAP_ED (cAMP receptor protein effector domain), and the two tandem repeats of the cystathionine beta-synthase (CBS pair) domain. NT_CAP-ED_CBS_assoc: putative C-terminal nucleotidyltransferase (NT) domain (DUF294), found associated with CAP_ED (cAMP receptor protein effector domain, found in the CAP family of transcription factors), and the two tandem repeats of the cystathionine beta-synthase (CBS pair) domain. These proteins belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of these carboxylate residues are well conserved in these DUF294 putative NT domains."
definition: >-
  C-terminal nucleotidyltransferase (NT) domain (DUF294), found associated with CAP_ED (cAMP receptor protein effector domain), and the two tandem repeats of the cystathionine beta-synthase (CBS pair) domain. NT_CAP-ED_CBS_assoc: putative C-terminal nucleotidyltransferase (NT) domain (DUF294), found associated with CAP_ED (cAMP receptor protein effector domain, found in the CAP family of transcription factors), and the two tandem repeats of the cystathionine beta-synthase (CBS pair) domain. These proteins belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of these carboxylate residues are well conserved in these DUF294 putative NT domains. — an NCBI CDD conserved domain (cd05423); members share this curated model.
