identifier: CDD:cd21889
label: "C-terminal SARAH domain of Drosophila melanogaster protein Hippo (Hpo) and similar proteins. Hpo, also called STE20-like kinase MST (dMST), is the Drosophila homolog of STE20-like protein kinases, MST1 and MST2. It is a STE20 family serine/threonine-protein kinase that functions as a tumor suppressor by restricting cell proliferation, and promotes apoptosis in conjunction with salvador and warts. Hpo plays a key role in the Hippo/SWH (Sav/Wts/Hpo) signaling pathway that plays a pivotal role in organ size control and tumor suppression by restricting proliferation and promoting apoptosis. This model corresponds to the C-terminal SARAH (Salvador-RassF-Hippo) domain of Hpo, which mediates complex formation between Hpo and Sav, as well as homodimerization."
definition: >-
  C-terminal SARAH domain of Drosophila melanogaster protein Hippo (Hpo) and similar proteins. Hpo, also called STE20-like kinase MST (dMST), is the Drosophila homolog of STE20-like protein kinases, MST1 and MST2. It is a STE20 family serine/threonine-protein kinase that functions as a tumor suppressor by restricting cell proliferation, and promotes apoptosis in conjunction with salvador and warts. Hpo plays a key role in the Hippo/SWH (Sav/Wts/Hpo) signaling pathway that plays a pivotal role in organ size control and tumor suppression by restricting proliferation and promoting apoptosis. This model corresponds to the C-terminal SARAH (Salvador-RassF-Hippo) domain of Hpo, which mediates complex formation between Hpo and Sav, as well as homodimerization. — an NCBI CDD conserved domain (cd21889); members share this curated model.
