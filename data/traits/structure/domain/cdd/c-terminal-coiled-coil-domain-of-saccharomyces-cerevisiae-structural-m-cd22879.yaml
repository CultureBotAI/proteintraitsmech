identifier: CDD:cd22879
label: "C-terminal coiled-coil domain of Saccharomyces cerevisiae structural maintenance of chromosomes protein 5 (Smc5) and similar proteins. Smc5 acts in a DNA repair pathway for removal of UV-induced DNA damage that is distinct from classical nucleotide excision repair and in repair of ionizing radiation damage. It functions in homologous recombination repair of DNA double strand breaks and in recovery of stalled replication forks. Smc5 is a component of the Smc5-Smc6 complex which plays a critical role in chromosome stability maintenance, DNA replication, homologous recombination, and double-stranded DNA damage repair. Smc5 contains N- and C-terminal coiled-coil (CC) domains, which wrap together to form an intertwined coiled-coil structure. The model corresponds to the C-terminal CC domain of Smc5."
definition: >-
  C-terminal coiled-coil domain of Saccharomyces cerevisiae structural maintenance of chromosomes protein 5 (Smc5) and similar proteins. Smc5 acts in a DNA repair pathway for removal of UV-induced DNA damage that is distinct from classical nucleotide excision repair and in repair of ionizing radiation damage. It functions in homologous recombination repair of DNA double strand breaks and in recovery of stalled replication forks. Smc5 is a component of the Smc5-Smc6 complex which plays a critical role in chromosome stability maintenance, DNA replication, homologous recombination, and double-stranded DNA damage repair. Smc5 contains N- and C-terminal coiled-coil (CC) domains, which wrap together to form an intertwined coiled-coil structure. The model corresponds to the C-terminal CC domain of Smc5. — an NCBI CDD conserved domain (cd22879); members share this curated model.
