identifier: CDD:cd11631
label: "Second Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Protein Kinase N2. PKN2, also called PKNgamma or Protein-kinase C-related kinase 2 (PRK2), is a serine/threonine protein kinase and an effector of the small GTPase Rho/Rac. It regulates G2/M cell cycle progression and the exit from cytokinesis. It also phosphorylates hepatitis C virus (HCV) RNA polymerase and thus, plays a role in HCV RNA replication. PKN2 shares a common domain architecture with other PKNs, containing three HR1 domains, a C2 domain, and a kinase domain. In addition, PKN2 contains a proline-rich region in between its C2 and kinase domains and has been shown to associate with SH3 domain containing proteins like NCK and Grb4. This model characterizes the second HR1 domain of PKN2. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; PKN2 specifically binds to RhoA GTPase in a GTP-dependent manner. The HR1 domains of PKN2, together with its C2 domain, also facilitate the recruitment of PKN2 to primordial junctions at nascent cell-cell contacts, where it promotes junctional maturation."
definition: >-
  Second Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Protein Kinase N2. PKN2, also called PKNgamma or Protein-kinase C-related kinase 2 (PRK2), is a serine/threonine protein kinase and an effector of the small GTPase Rho/Rac. It regulates G2/M cell cycle progression and the exit from cytokinesis. It also phosphorylates hepatitis C virus (HCV) RNA polymerase and thus, plays a role in HCV RNA replication. PKN2 shares a common domain architecture with other PKNs, containing three HR1 domains, a C2 domain, and a kinase domain. In addition, PKN2 contains a proline-rich region in between its C2 and kinase domains and has been shown to associate with SH3 domain containing proteins like NCK and Grb4. This model characterizes the second HR1 domain of PKN2. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; PKN2 specifically binds to RhoA GTPase in a GTP-dependent manner. The HR1 domains of PKN2, together with its C2 domain, also facilitate the recruitment of PKN2 to primordial junctions at nascent cell-cell contacts, where it promotes junctional maturation. — an NCBI CDD conserved domain (cd11631); members share this curated model.
