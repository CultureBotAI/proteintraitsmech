identifier: CDD:cd19011
label: "extracellular domain of serotonin 5-hydroxytryptamine receptor (5-HT3) receptor subunit A (5HT3A). This subfamily contains extracellular domain of subunit A of serotonin 5-HT3 receptor (5-HT3AR), encoded by the HTR3A gene. 5-HT3A subunit forms a homopentameric complex or a heterologous combination with other subunits (B-E). Heteromeric combination of A and B subunits provides the full functional features of this receptor, since either subunit alone results in receptors with very low conductance and response amplitude. 5-HT3A receptors are located in the dorsal vagal complex of the brainstem and in the gastrointestinal (GI) tract, and form a channel circuit that controls gut motility, secretion, visceral perception, and the emesis reflex. These receptors are implicated in several GI and psychiatric disorder conditions including anxiety, depression, bipolar disorder, and irritable bowel syndrome (IBS). Several 5-HT3AR antagonists, such as the isoquinoline Palonosetron, are in clinical use to control emetic reflexes associated with gastrointestinal pathologies and cancer therapies. SNPs in the 5-HT3A serotonin receptor gene are associated with psychiatric disorders."
