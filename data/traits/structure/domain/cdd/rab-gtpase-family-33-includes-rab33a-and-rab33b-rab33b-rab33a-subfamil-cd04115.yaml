identifier: CDD:cd04115
label: "Rab GTPase family 33 includes Rab33A and Rab33B. Rab33B/Rab33A subfamily. Rab33B is ubiquitously expressed in mouse tissues and cells, where it is localized to the medial Golgi cisternae. It colocalizes with alpha-mannose II. Together with the other cisternal Rabs, Rab6A and Rab6A', it is believed to regulate the Golgi response to stress and is likely a molecular target in stress-activated signaling pathways. Rab33A (previously known as S10) is expressed primarily in the brain and immune system cells. In humans, it is located on the X chromosome at Xq26 and its expression is down-regulated in tuberculosis patients. Experimental evidence suggests that Rab33A is a novel CD8+ T cell factor that likely plays a role in tuberculosis disease processes. GTPase activating proteins (GAPs) interact with GTP-bound Rab and accelerate the hydrolysis of GTP to GDP. Guanine nucleotide exchange factors (GEFs) interact with GDP-bound Rabs to promote the formation of the GTP-bound state. Rabs are further regulated by guanine nucleotide dissociation inhibitors (GDIs), which facilitate Rab recycling by masking C-terminal lipid binding and promoting cytosolic localization. Most Rab GTPases contain a lipid modification site at the C-terminus, with sequence motifs CC, CXC, or CCX. Lipid binding is essential for membrane attachment, a key feature of most Rab proteins. Due to the presence of truncated sequences in this CD, the lipid modification site is not available for annotation."
definition: >-
  Rab GTPase family 33 includes Rab33A and Rab33B. Rab33B/Rab33A subfamily. Rab33B is ubiquitously expressed in mouse tissues and cells, where it is localized to the medial Golgi cisternae. It colocalizes with alpha-mannose II. Together with the other cisternal Rabs, Rab6A and Rab6A', it is believed to regulate the Golgi response to stress and is likely a molecular target in stress-activated signaling pathways. Rab33A (previously known as S10) is expressed primarily in the brain and immune system cells. In humans, it is located on the X chromosome at Xq26 and its expression is down-regulated in tuberculosis patients. Experimental evidence suggests that Rab33A is a novel CD8+ T cell factor that likely plays a role in tuberculosis disease processes. GTPase activating proteins (GAPs) interact with GTP-bound Rab and accelerate the hydrolysis of GTP to GDP. Guanine nucleotide exchange factors (GEFs) interact with GDP-bound Rabs to promote the formation of the GTP-bound state. Rabs are further regulated by guanine nucleotide dissociation inhibitors (GDIs), which facilitate Rab recycling by masking C-terminal lipid binding and promoting cytosolic localization. Most Rab GTPases contain a lipid modification site at the C-terminus, with sequence motifs CC, CXC, or CCX. Lipid binding is essential for membrane attachment, a key feature of most Rab proteins. Due to the presence of truncated sequences in this CD, the lipid modification site is not available for annotation. — an NCBI CDD conserved domain (cd04115); members share this curated model.
