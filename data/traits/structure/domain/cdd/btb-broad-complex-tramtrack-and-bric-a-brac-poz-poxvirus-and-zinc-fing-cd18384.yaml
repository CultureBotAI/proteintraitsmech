identifier: CDD:cd18384
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCNS/Kv9 subfamily of potassium voltage-gated channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv9, also known as subfamily S, includes KCNS1 (Kv9.1), KCNS2 (Kv9.2) and KCNS3 (Kv9.3). They are regulatory alpha subunits that cannot form functional homo-tetrameric channels. Both KCNS1 and KCNS2 are delayed-rectifier K(+) channel alpha subunits that can form functional heterotetrameric channels with KCNB1 (also known as Kv2.1) and KCNB2 (also known as Kv2.2), and further modulates the delayed rectifier voltage-gated potassium channel activation and deactivation rates of KCNB1 and KCNB2. KCNS3 is a delayed-rectifier K(+) channel alpha subunit linked to tissue oxygenation responses. It can form functional heterotetrameric channels with KCNB1, and further modulates the delayed rectifier voltage-gated potassium channel activation and deactivation rates of KCNB1."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCNS/Kv9 subfamily of potassium voltage-gated channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv9, also known as subfamily S, includes KCNS1 (Kv9.1), KCNS2 (Kv9.2) and KCNS3 (Kv9.3). They are regulatory alpha subunits that cannot form functional homo-tetrameric channels. Both KCNS1 and KCNS2 are delayed-rectifier K(+) channel alpha subunits that can form functional heterotetrameric channels with KCNB1 (also known as Kv2.1) and KCNB2 (also known as Kv2.2), and further modulates the delayed rectifier voltage-gated potassium channel activation and deactivation rates of KCNB1 and KCNB2. KCNS3 is a delayed-rectifier K(+) channel alpha subunit linked to tissue oxygenation responses. It can form functional heterotetrameric channels with KCNB1, and further modulates the delayed rectifier voltage-gated potassium channel activation and deactivation rates of KCNB1. — an NCBI CDD conserved domain (cd18384); members share this curated model.
