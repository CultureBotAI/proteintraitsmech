identifier: CDD:cd16706
label: "RING finger, HC subclass, found in caspases-8 and -10-associated RING finger protein 1 (CARP1) and similar proteins. CARP1, also known as caspase regulator CARP1, FYVE-RING finger protein Momo, RING finger homologous to inhibitor of apoptosis protein (RFI), RING finger protein 34 (RNF34), or RING finger protein RIFF, is a nuclear protein that functions as a specific E3 ubiquitin ligase for the transcriptional coactivator PGC-1alpha, a master regulator of energy metabolism and adaptive thermogenesis in the brown fat cell which negatively regulates brown fat cell metabolism. It is preferentially expressed in esophageal, gastric, and colorectal cancers, suggesting a possible association with the development of digestive tract cancers. It regulates the p53 signaling pathway by degrading 14-3-3 sigma and stabilizing MDM2. CARP1 does not localize to membranes in the cell and is involved in the negative regulation of apoptosis, specifically targeting two initiator caspases, caspase 8 and caspase 10. CARP1 contains an N-terminal FYVE-like domain and a C-terminal C3HC4-type RING-HC finger domain."
definition: >-
  RING finger, HC subclass, found in caspases-8 and -10-associated RING finger protein 1 (CARP1) and similar proteins. CARP1, also known as caspase regulator CARP1, FYVE-RING finger protein Momo, RING finger homologous to inhibitor of apoptosis protein (RFI), RING finger protein 34 (RNF34), or RING finger protein RIFF, is a nuclear protein that functions as a specific E3 ubiquitin ligase for the transcriptional coactivator PGC-1alpha, a master regulator of energy metabolism and adaptive thermogenesis in the brown fat cell which negatively regulates brown fat cell metabolism. It is preferentially expressed in esophageal, gastric, and colorectal cancers, suggesting a possible association with the development of digestive tract cancers. It regulates the p53 signaling pathway by degrading 14-3-3 sigma and stabilizing MDM2. CARP1 does not localize to membranes in the cell and is involved in the negative regulation of apoptosis, specifically targeting two initiator caspases, caspase 8 and caspase 10. CARP1 contains an N-terminal FYVE-like domain and a C-terminal C3HC4-type RING-HC finger domain. — an NCBI CDD conserved domain (cd16706); members share this curated model.
