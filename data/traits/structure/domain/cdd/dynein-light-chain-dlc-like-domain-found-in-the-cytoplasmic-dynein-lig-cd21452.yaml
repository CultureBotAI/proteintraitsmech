identifier: CDD:cd21452
label: "dynein light chain (DLC)-like domain found in the cytoplasmic dynein light chain 1 (DYNLL1) family. The cytoplasmic dynein light chain 1 (DYNLL1) family includes DYNLL1 and DYNLL2. DYNLL1, also called protein inhibitor of neuronal nitric oxide synthase (PIN), or 8 kDa dynein light chain (DLC8), or dynein light chain LC8-type 1 (DLC1), acts as a motor for the intracellular retrograde motility of vesicles and organelles along microtubules. It may play a role in changing or maintaining the spatial distribution of cytoskeletal structures. Both DYNLL1 and DYNLL2 (also called 8 kDa dynein light chain b, or DLC8b, or dynein light chain LC8-type 2, or DLC2) are non-catalytic accessory components of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. The model corresponds to the dynein light chain (DLC)-like domain of DYNLL1 and DYNLL2."
definition: >-
  dynein light chain (DLC)-like domain found in the cytoplasmic dynein light chain 1 (DYNLL1) family. The cytoplasmic dynein light chain 1 (DYNLL1) family includes DYNLL1 and DYNLL2. DYNLL1, also called protein inhibitor of neuronal nitric oxide synthase (PIN), or 8 kDa dynein light chain (DLC8), or dynein light chain LC8-type 1 (DLC1), acts as a motor for the intracellular retrograde motility of vesicles and organelles along microtubules. It may play a role in changing or maintaining the spatial distribution of cytoskeletal structures. Both DYNLL1 and DYNLL2 (also called 8 kDa dynein light chain b, or DLC8b, or dynein light chain LC8-type 2, or DLC2) are non-catalytic accessory components of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. The model corresponds to the dynein light chain (DLC)-like domain of DYNLL1 and DYNLL2. — an NCBI CDD conserved domain (cd21452); members share this curated model.
