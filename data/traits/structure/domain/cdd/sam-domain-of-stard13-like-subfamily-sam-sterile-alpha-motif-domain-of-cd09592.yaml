identifier: CDD:cd09592
label: "SAM domain of STARD13-like subfamily. SAM (sterile alpha motif) domain of DLC2 (Deleted in liver cancer) protein is a lipid-binding and putative protein-protein interaction domain located at the N-terminus of the protein. Members of this subfamily do not form dimers/oligomers through their SAM domains. They participate in lipid transfer. Human Dlc2 gene is known as a tumor suppressor gene. It was found underexpressed in hepatocellular carcinoma."
definition: >-
  SAM domain of STARD13-like subfamily. SAM (sterile alpha motif) domain of DLC2 (Deleted in liver cancer) protein is a lipid-binding and putative protein-protein interaction domain located at the N-terminus of the protein. Members of this subfamily do not form dimers/oligomers through their SAM domains. They participate in lipid transfer. Human Dlc2 gene is known as a tumor suppressor gene. It was found underexpressed in hepatocellular carcinoma. — an NCBI CDD conserved domain (cd09592); members share this curated model.
