identifier: CDD:cd20670
label: "cytochrome P450 family 2, subfamily G. CYP2G1 is uniquely expressed in the olfactory mucosa of rats and rabbits and may have important functions for the olfactory chemosensory system. It is involved in the metabolism of sex steroids and xenobiotic compounds. In cynomolgus monkeys, CYP2G2 is a functional drug-metabolizing enzyme in nasal mucosa. In humans, two different CYP2G genes, CYP2GP1 and CYP2GP2, are pseudogenes because of loss-of-function deletions/mutations. The CYP2G subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
