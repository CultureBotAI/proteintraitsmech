identifier: CDD:cd22298
label: "LGN binding domain (LGNBD) of nuclear mitotic apparatus protein (NuMA) and similar proteins. NuMA, also called nuclear matrix protein-22 (NMP-22), nuclear mitotic apparatus protein 1 (NUMA1), or SP-H antigen, is a microtubule (MT)-binding protein that plays a role in the formation and maintenance of spindle poles and the alignment and segregation of chromosomes during mitotic cell division. It is involved in the establishment of mitotic spindle orientation during metaphase, and elongation during anaphase in a dynein-dynactin-dependent manner. NuMA, in complex with LGN, forms NuMA:LGN hetero-hexamers that promote spindle orientation. The model corresponds to the LGN binding domain (LGNBD) of NuMA. LGN (named for leu-gly-asn repeats) is also known as G protein signaling modulator 2."
definition: >-
  LGN binding domain (LGNBD) of nuclear mitotic apparatus protein (NuMA) and similar proteins. NuMA, also called nuclear matrix protein-22 (NMP-22), nuclear mitotic apparatus protein 1 (NUMA1), or SP-H antigen, is a microtubule (MT)-binding protein that plays a role in the formation and maintenance of spindle poles and the alignment and segregation of chromosomes during mitotic cell division. It is involved in the establishment of mitotic spindle orientation during metaphase, and elongation during anaphase in a dynein-dynactin-dependent manner. NuMA, in complex with LGN, forms NuMA:LGN hetero-hexamers that promote spindle orientation. The model corresponds to the LGN binding domain (LGNBD) of NuMA. LGN (named for leu-gly-asn repeats) is also known as G protein signaling modulator 2. — an NCBI CDD conserved domain (cd22298); members share this curated model.
