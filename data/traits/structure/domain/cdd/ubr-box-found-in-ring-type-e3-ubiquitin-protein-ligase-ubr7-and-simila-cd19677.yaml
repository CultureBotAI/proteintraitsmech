identifier: CDD:cd19677
label: "UBR-box found in RING-type E3 ubiquitin-protein ligase UBR7 and similar proteins. UBR7 (EC 2.3.2.27; also called N-recognin-7) is a RING-type E3 ubiquitin ligase of the Arg/N-end rule degradation pathway. It recognizes and binds to proteins bearing specific N-terminal residues that are destabilizing according to the N-end rule, leading to their ubiquitination and subsequent degradation. UBR7 may play an important role in spermiogenesis and fertilization."
definition: >-
  UBR-box found in RING-type E3 ubiquitin-protein ligase UBR7 and similar proteins. UBR7 (EC 2.3.2.27; also called N-recognin-7) is a RING-type E3 ubiquitin ligase of the Arg/N-end rule degradation pathway. It recognizes and binds to proteins bearing specific N-terminal residues that are destabilizing according to the N-end rule, leading to their ubiquitination and subsequent degradation. UBR7 may play an important role in spermiogenesis and fertilization. — an NCBI CDD conserved domain (cd19677); members share this curated model.
