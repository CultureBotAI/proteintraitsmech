identifier: CDD:cd23292
label: "MIR domain, beta-trefoil fold, found in ryanodine receptor 3 (RyR3) and similar proteins. RyR3, also called RYR-3, or brain ryanodine receptor-calcium release channel, or brain-type ryanodine receptor, or type 3 ryanodine receptor, is a calcium channel that plays a role in cellular calcium signaling. It mediates the release of Ca(2+) from the sarcoplasmic reticulum into the cytoplasm in muscle and thereby plays a role in triggering muscle contraction. It also mediates Ca(2+)-induced Ca(2+) release from the endoplasmic reticulum in non-muscle cells. RYR-3 forms homotetramer and also forms heterotetramer with RYR-2. RYR-3 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in ryanodine receptor 3 (RyR3) and similar proteins. RyR3, also called RYR-3, or brain ryanodine receptor-calcium release channel, or brain-type ryanodine receptor, or type 3 ryanodine receptor, is a calcium channel that plays a role in cellular calcium signaling. It mediates the release of Ca(2+) from the sarcoplasmic reticulum into the cytoplasm in muscle and thereby plays a role in triggering muscle contraction. It also mediates Ca(2+)-induced Ca(2+) release from the endoplasmic reticulum in non-muscle cells. RYR-3 forms homotetramer and also forms heterotetramer with RYR-2. RYR-3 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23292); members share this curated model.
