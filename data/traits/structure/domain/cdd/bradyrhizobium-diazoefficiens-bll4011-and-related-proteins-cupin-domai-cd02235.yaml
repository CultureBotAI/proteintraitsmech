identifier: CDD:cd02235
label: "Bradyrhizobium diazoefficiens BLL4011 and related proteins, cupin domain. This family includes bacterial and fungal proteins homologous to BLL4011, a Bradyrhizobium diazoefficiens protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Bradyrhizobium diazoefficiens BLL4011 and related proteins, cupin domain. This family includes bacterial and fungal proteins homologous to BLL4011, a Bradyrhizobium diazoefficiens protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd02235); members share this curated model.
