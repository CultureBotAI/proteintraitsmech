identifier: CDD:cd16333
label: "resistin-like molecule (RELM) hormone family. RELMs, secreted proteins with roles including insulin resistance and the activation of inflammatory processes, are also known as found in inflammatory zone (FIZZ), and include four members in mouse (RELM-alpha/FIZZ1/HIMF, RELM-beta/FIZZ2, Resistin/FIZZ3, and RELM-gamma/FIZZ4) and two members in human (resistin and RELM-beta). Little is yet known about the differences and similarities in function of the different isoforms. RELMs are potentially implicated in a wide range of physiological and pathological processes including obesity-associated diabetes, cardiovascular system function, cancer development and metastasis. There are significant differences between human and rodent RELMs with respect to gene and protein structure, differential gene regulation, different tissue distribution profiles, and insulin resistance induction. Resistin appears to convey insulin resistance in rodents, and to instigate inflammatory processes in humans.  In the pathophysiology of obesity-associated diabetes, mouse resistin is secreted by adipocytes and increases hepatic gluconeogenesis, thereby promoting insulin resistance, human resistin is secreted by macrophages and may play a role through inflammatory contributions. Elevated levels of human resistin have been reported in various cancers including colorectal, endometrial, and postmenopausal breast cancers, and may initiate the production of further inflammatory cytokines, to promote tumor cell progression; contrary to this, in vitro overexpression of human RELM-beta abolishes invasion, metastasis and angiogenesis of gastric cancer cells. Resistin circulates as hexamers and trimers; structural similarity has been noted between the resistin homotrimer and the proprotein convertase subtilisin/kexin type 9, C-terminal cysteine-rich domain."
definition: >-
  resistin-like molecule (RELM) hormone family. RELMs, secreted proteins with roles including insulin resistance and the activation of inflammatory processes, are also known as found in inflammatory zone (FIZZ), and include four members in mouse (RELM-alpha/FIZZ1/HIMF, RELM-beta/FIZZ2, Resistin/FIZZ3, and RELM-gamma/FIZZ4) and two members in human (resistin and RELM-beta). Little is yet known about the differences and similarities in function of the different isoforms. RELMs are potentially implicated in a wide range of physiological and pathological processes including obesity-associated diabetes, cardiovascular system function, cancer development and metastasis. There are significant differences between human and rodent RELMs with respect to gene and protein structure, differential gene regulation, different tissue distribution profiles, and insulin resistance induction. Resistin appears to convey insulin resistance in rodents, and to instigate inflammatory processes in humans. In the pathophysiology of obesity-associated diabetes, mouse resistin is secreted by adipocytes and increases hepatic gluconeogenesis, thereby promoting insulin resistance, human resistin is secreted by macrophages and may play a role through inflammatory contributions. Elevated levels of human resistin have been reported in various cancers including colorectal, endometrial, and postmenopausal breast cancers, and may initiate the production of further inflammatory cytokines, to promote tumor cell progression; contrary to this, in vitro overexpression of human RELM-beta abolishes invasion, metastasis and angiogenesis of gastric cancer cells. Resistin circulates as hexamers and trimers; structural similarity has been noted between the resistin homotrimer and the proprotein convertase subtilisin/kexin type 9, C-terminal cysteine-rich domain. — an NCBI CDD conserved domain (cd16333); members share this curated model.
