identifier: CDD:cd14347
label: "UBA-like domain found in OTU domain-containing proteins OTU7A, OTU7B and similar proteins. OTU7A, also called zinc finger protein Cezanne 2, belongs to a family of proteins that have been characterized as highly specific ubiquitin iso-peptidases removing ubiquitin from proteins. OTU7B, also called cellular zinc finger anti-NF-kappaB protein, zinc finger A20 domain-containing protein 1, or zinc finger protein Cezanne, is a novel deubiquitinating enzyme that acts as a negative regulator of NF-kappaB and may play a role in the control of the inflammatory process. Both OTU7A and OTU7B contain an N-terminal ubiquitin-associated (UBA)-like domain, followed by an ovarian tumor (OTU) domain and a ubiquitin binding domain, A20-like zinc finger. In addition, they both display proteolytic activity."
definition: >-
  UBA-like domain found in OTU domain-containing proteins OTU7A, OTU7B and similar proteins. OTU7A, also called zinc finger protein Cezanne 2, belongs to a family of proteins that have been characterized as highly specific ubiquitin iso-peptidases removing ubiquitin from proteins. OTU7B, also called cellular zinc finger anti-NF-kappaB protein, zinc finger A20 domain-containing protein 1, or zinc finger protein Cezanne, is a novel deubiquitinating enzyme that acts as a negative regulator of NF-kappaB and may play a role in the control of the inflammatory process. Both OTU7A and OTU7B contain an N-terminal ubiquitin-associated (UBA)-like domain, followed by an ovarian tumor (OTU) domain and a ubiquitin binding domain, A20-like zinc finger. In addition, they both display proteolytic activity. — an NCBI CDD conserved domain (cd14347); members share this curated model.
