identifier: CDD:cd18925
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in transcription factor EC (TFEC) and similar proteins. TFEC, also termed Class E basic helix-loop-helix protein 34 (bHLHe34), or transcription factor EC-like (TFEC-L), is a bHLHzip transcriptional regulator that acts as a repressor or an activator and regulates gene expression in macrophages. It plays an important role in the niche to expand hematopoietic progenitors through the modulation of several cytokines."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in transcription factor EC (TFEC) and similar proteins. TFEC, also termed Class E basic helix-loop-helix protein 34 (bHLHe34), or transcription factor EC-like (TFEC-L), is a bHLHzip transcriptional regulator that acts as a repressor or an activator and regulates gene expression in macrophages. It plays an important role in the niche to expand hematopoietic progenitors through the modulation of several cytokines. — an NCBI CDD conserved domain (cd18925); members share this curated model.
