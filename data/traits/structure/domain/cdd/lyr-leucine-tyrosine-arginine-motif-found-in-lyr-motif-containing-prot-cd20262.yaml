identifier: CDD:cd20262
label: "LYR (leucine-tyrosine-arginine) motif found in LYR motif-containing protein 2 (LYRM2) and similar proteins. LYRM2 is an uncharacterized LYR motif-containing protein that belongs to the Complex1_LYR-like superfamily which consists of proteins of diverse functions that are exclusively found in eukaryotes; these proteins contain the conserved tripeptide 'LYR' close to the N-terminus."
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in LYR motif-containing protein 2 (LYRM2) and similar proteins. LYRM2 is an uncharacterized LYR motif-containing protein that belongs to the Complex1_LYR-like superfamily which consists of proteins of diverse functions that are exclusively found in eukaryotes; these proteins contain the conserved tripeptide 'LYR' close to the N-terminus. — an NCBI CDD conserved domain (cd20262); members share this curated model.
