identifier: CDD:cd22769
label: "OTU (ovarian tumor) domain of deubiquitinating protein VCIP135. Deubiquitinating protein VCIP135 is also called valosin-containing protein p97/p47 complex-interacting protein 1, valosin-containing protein p97/p47 complex-interacting protein p135, or VCP/p47 complex-interacting 135-kDa protein. It is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that hydrolyzes 'Lys-11'- and 'Lys-48'-linked polyubiquitin chains. It is necessary for VCP-mediated reassembly of Golgi stacks after mitosis, and may play a role in VCP-mediated formation of transitional endoplasmic reticulum (tER). VCIP135 controls Golgi membrane dynamics in the cell cycle and is required for Golgi and ER assembly. It belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in most cases an aspartate, as the catalytic triad. Not all members of this subfamily contain the active site. It is closely related to proteins classified as family C64 cysteine protease by MEROPS, such as TNFAIP3, ZRANB1, and OTUD7A/B."
definition: >-
  OTU (ovarian tumor) domain of deubiquitinating protein VCIP135. Deubiquitinating protein VCIP135 is also called valosin-containing protein p97/p47 complex-interacting protein 1, valosin-containing protein p97/p47 complex-interacting protein p135, or VCP/p47 complex-interacting 135-kDa protein. It is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that hydrolyzes 'Lys-11'- and 'Lys-48'-linked polyubiquitin chains. It is necessary for VCP-mediated reassembly of Golgi stacks after mitosis, and may play a role in VCP-mediated formation of transitional endoplasmic reticulum (tER). VCIP135 controls Golgi membrane dynamics in the cell cycle and is required for Golgi and ER assembly. It belongs to the OTU family of cysteine proteases that use a conserved cysteine and histidine, and in most cases an aspartate, as the catalytic triad. Not all members of this subfamily contain the active site. It is closely related to proteins classified as family C64 cysteine protease by MEROPS, such as TNFAIP3, ZRANB1, and OTUD7A/B. — an NCBI CDD conserved domain (cd22769); members share this curated model.
