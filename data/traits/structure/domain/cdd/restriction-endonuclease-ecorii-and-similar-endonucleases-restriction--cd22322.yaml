identifier: CDD:cd22322
label: "Restriction endonuclease EcoRII and similar endonucleases. Restriction endonuclease EcoRII recognizes the sequence 5'-CCWGG-3' (W stands for A or T); it requires binding of a second target site as an allosteric effector in order to be active. EcoRII belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease EcoRII and similar endonucleases. Restriction endonuclease EcoRII recognizes the sequence 5'-CCWGG-3' (W stands for A or T); it requires binding of a second target site as an allosteric effector in order to be active. EcoRII belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22322); members share this curated model.
