label: "repair nuclease FAN1. This model characterizes a set of nucleases that resemble Holliday-junction resolving enzymes. They belong to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  repair nuclease FAN1. This model characterizes a set of nucleases that resemble Holliday-junction resolving enzymes. They belong to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22326); members share this curated model.
