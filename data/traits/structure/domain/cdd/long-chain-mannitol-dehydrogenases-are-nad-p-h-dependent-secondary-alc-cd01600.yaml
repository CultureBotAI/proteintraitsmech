identifier: CDD:cd01600
label: "Long chain mannitol dehydrogenases are NAD(P)H-dependent secondary alcohol dehydrogenases (ADH). The N-terminal domain contain a typical Rossmann fold, but unlike many ADHs these enzymes do not have a  conserved tyrosine and are not dependent on Zinc or other co-factors. Mannitol dehydrogenases reversibly catalyze the oxidation of D-mannitol or D-manitol-1-P to D-frutose or D-frutose-6-P."
definition: >-
  Long chain mannitol dehydrogenases are NAD(P)H-dependent secondary alcohol dehydrogenases (ADH). The N-terminal domain contain a typical Rossmann fold, but unlike many ADHs these enzymes do not have a conserved tyrosine and are not dependent on Zinc or other co-factors. Mannitol dehydrogenases reversibly catalyze the oxidation of D-mannitol or D-manitol-1-P to D-frutose or D-frutose-6-P. — an NCBI CDD conserved domain (cd01600); members share this curated model.
