identifier: CDD:cd14263
label: "Integral membrane diacylglycerol kinase and similar enzymes. This mostly bacterial family of homo-trimeric integral membrane enzymes, the products of the dgkA gene, catalyzes the ATP-dependent phosphorylation of substrates such as diacylglycerol to phosphatidic acid or of undecaprenol to undecaprenyl phosphate. They are not related other cytosolic or membrane-associated kinases, including the eukaryotic diacylglycerol kinases."
definition: >-
  Integral membrane diacylglycerol kinase and similar enzymes. This mostly bacterial family of homo-trimeric integral membrane enzymes, the products of the dgkA gene, catalyzes the ATP-dependent phosphorylation of substrates such as diacylglycerol to phosphatidic acid or of undecaprenol to undecaprenyl phosphate. They are not related other cytosolic or membrane-associated kinases, including the eukaryotic diacylglycerol kinases. — an NCBI CDD conserved domain (cd14263); members share this curated model.
