identifier: CDD:cd05425
label: "Nucleotidyltransferase (NT) domain of human poly (A) polymerase gamma and related proteins. NT_hPAPgamma_like: catalytic domain found in proteins similar to human (h) poly (A) polymerase (PAP) gamma. PAPs are responsible for mRNA poly (A) tail synthesis. Multiple forms of PAPs are present in cell lines and tissues of different species as the result of gene duplication, alternative splicing and post-translational modification. In addition to hPAPgamma, this group includes mouse testis-specific PAP beta (TPAP), Saccharomyces cerevisiae (Sc) PAP1. ScPAP1 in addition to playing a role in mRNA 3'-end polyadenylation, may also participate in mRNA nuclear export and polyadenylation of some rRNAs. hPAPgamma is nuclear; its gene has been implicated in the monoadenylation of signal recognition particle (SRP) RNA. TPAP plays a role in the elongation of mRNA poly (A) tails in the cytoplasm around spermatids. Disruption of the TPAP gene results in an arrested spermatogenesis. Included in this group is a nuclear PAP from Arabidopsis thaliana (Ath) that shares a feature with a chloroplast-derived Ath PAP in being able to use PNP (a component of the chloroplast degradation machinery) as an RNA-binding factor. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these NT_hPAPgamma_like NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of human poly (A) polymerase gamma and related proteins. NT_hPAPgamma_like: catalytic domain found in proteins similar to human (h) poly (A) polymerase (PAP) gamma. PAPs are responsible for mRNA poly (A) tail synthesis. Multiple forms of PAPs are present in cell lines and tissues of different species as the result of gene duplication, alternative splicing and post-translational modification. In addition to hPAPgamma, this group includes mouse testis-specific PAP beta (TPAP), Saccharomyces cerevisiae (Sc) PAP1. ScPAP1 in addition to playing a role in mRNA 3'-end polyadenylation, may also participate in mRNA nuclear export and polyadenylation of some rRNAs. hPAPgamma is nuclear; its gene has been implicated in the monoadenylation of signal recognition particle (SRP) RNA. TPAP plays a role in the elongation of mRNA poly (A) tails in the cytoplasm around spermatids. Disruption of the TPAP gene results in an arrested spermatogenesis. Included in this group is a nuclear PAP from Arabidopsis thaliana (Ath) that shares a feature with a chloroplast-derived Ath PAP in being able to use PNP (a component of the chloroplast degradation machinery) as an RNA-binding factor. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these NT_hPAPgamma_like NT domains. — an NCBI CDD conserved domain (cd05425); members share this curated model.
