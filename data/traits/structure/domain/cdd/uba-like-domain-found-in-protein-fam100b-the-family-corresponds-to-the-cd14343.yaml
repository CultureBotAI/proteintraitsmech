identifier: CDD:cd14343
label: "UBA-like domain found in protein FAM100B. The family corresponds to the uncharacterized protein FAM100B and its homologs mainly found in Metazoa. Although their biological roles remain unclear, all family members contain a ubiquitin-associated (UBA)-like domain that may be involved in the binding of ubiquitin."
definition: >-
  UBA-like domain found in protein FAM100B. The family corresponds to the uncharacterized protein FAM100B and its homologs mainly found in Metazoa. Although their biological roles remain unclear, all family members contain a ubiquitin-associated (UBA)-like domain that may be involved in the binding of ubiquitin. — an NCBI CDD conserved domain (cd14343); members share this curated model.
