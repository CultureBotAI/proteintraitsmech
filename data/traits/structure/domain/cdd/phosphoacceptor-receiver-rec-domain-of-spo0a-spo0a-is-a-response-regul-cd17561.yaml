identifier: CDD:cd17561
label: "phosphoacceptor receiver (REC) domain of Spo0A. Spo0A is a response regulator of the phosphorelay system in the early stage of spore formation. It may be an element of the effector pathway responsible for the activation of sporulation genes in response to nutritional stress and may act in the with sigma factor spo0H to control the expression of some genes that are critical to the sporulation process. Spo0A contains a regulatory N-terminal REC domain and a C-terminal DNA-binding transcription activation domain as its effector/output domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of Spo0A. Spo0A is a response regulator of the phosphorelay system in the early stage of spore formation. It may be an element of the effector pathway responsible for the activation of sporulation genes in response to nutritional stress and may act in the with sigma factor spo0H to control the expression of some genes that are critical to the sporulation process. Spo0A contains a regulatory N-terminal REC domain and a C-terminal DNA-binding transcription activation domain as its effector/output domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17561); members share this curated model.
