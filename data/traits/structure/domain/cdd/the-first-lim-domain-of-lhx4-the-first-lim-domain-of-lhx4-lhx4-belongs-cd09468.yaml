  The first LIM domain of Lhx4. The first LIM domain of Lhx4. Lhx4 belongs to the LHX protein family, which features two tandem N-terminal LIM domains and a C-terminal DNA binding homeodomain. Members of LHX family are found in the nucleus and act as transcription factors or cofactors. LHX proteins are critical for the development of specialized cells in multiple tissue types, including the nervous system, skeletal muscle, the heart, the kidneys, and endocrine organs, such as the pituitary gland and the pancreas. LHX4 plays essential roles in pituitary gland and nervous system development. In mice, the lhx4 gene is expressed in the developing hindbrain, cerebral cortex, pituitary gland, and spinal cord. LHX4 shows significant sequence similarity to LHX3, particularly to isoforms Lhx3a. In gene regulation experiments, the LHX4 protein exhibits regulation roles towards pituitary genes, acting on their promoters/enhancers. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09468); members share this curated model.
