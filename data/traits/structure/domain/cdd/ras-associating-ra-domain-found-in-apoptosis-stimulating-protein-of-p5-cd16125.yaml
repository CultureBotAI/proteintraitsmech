identifier: CDD:cd16125
label: "Ras-associating (RA) domain found in apoptosis-stimulating protein of p53 (ASPP) 1 and 2. The ASPP protein (apoptosis-stimulating protein of p53; also called ankyrin repeat-, Src homology 3 domain- and Pro-rich region-containing protein) plays a critical role in regulating apoptosis. The ASPP family consists of three members, ASPP1, ASPP2 and iASPP, all of which bind to p53 and regulate p53-mediated apoptosis. ASPP1 and ASPP2, have a RA domain at their N-terminus and have pro-apoptotic functions, while iASPP is involved in anti-apoptotic responses. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin."
definition: >-
  Ras-associating (RA) domain found in apoptosis-stimulating protein of p53 (ASPP) 1 and 2. The ASPP protein (apoptosis-stimulating protein of p53; also called ankyrin repeat-, Src homology 3 domain- and Pro-rich region-containing protein) plays a critical role in regulating apoptosis. The ASPP family consists of three members, ASPP1, ASPP2 and iASPP, all of which bind to p53 and regulate p53-mediated apoptosis. ASPP1 and ASPP2, have a RA domain at their N-terminus and have pro-apoptotic functions, while iASPP is involved in anti-apoptotic responses. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. — an NCBI CDD conserved domain (cd16125); members share this curated model.
