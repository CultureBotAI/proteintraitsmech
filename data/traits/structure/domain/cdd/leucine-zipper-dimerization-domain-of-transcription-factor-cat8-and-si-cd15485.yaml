identifier: CDD:cd15485
label: "Leucine zipper Dimerization domain of transcription factor Cat8 and similar proteins. Cat8p binds to carbon source-responsive element (CSRE) motifs and activates target genes under conditions of glucose deprivation. It mediates the transcriptional control of at least nine genes (ACS1, FBP1, ICL1, IDP2, JEN1, MLS1, PCK1, SFC1, and SIP4) under non-fermentative growth conditions in yeast. Studies show another 25 genes or open reading frames whose expression at the transition between the fermentative and the oxidative metabolism (diauxic shift) is altered in the absence of Cat8p. This Cat8p-dependent control results in a parallel alteration in mRNA and protein synthesis. The biochemical functions of proteins encoded by Cat8p-dependent genes are essentially related to the first steps of ethanol utilization, the glyoxylate cycle, and gluconeogenesis. Cat8p is a member of the Gal4p family of transcriptional activators which contain an N-terminal DNA-binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner."
definition: >-
  Leucine zipper Dimerization domain of transcription factor Cat8 and similar proteins. Cat8p binds to carbon source-responsive element (CSRE) motifs and activates target genes under conditions of glucose deprivation. It mediates the transcriptional control of at least nine genes (ACS1, FBP1, ICL1, IDP2, JEN1, MLS1, PCK1, SFC1, and SIP4) under non-fermentative growth conditions in yeast. Studies show another 25 genes or open reading frames whose expression at the transition between the fermentative and the oxidative metabolism (diauxic shift) is altered in the absence of Cat8p. This Cat8p-dependent control results in a parallel alteration in mRNA and protein synthesis. The biochemical functions of proteins encoded by Cat8p-dependent genes are essentially related to the first steps of ethanol utilization, the glyoxylate cycle, and gluconeogenesis. Cat8p is a member of the Gal4p family of transcriptional activators which contain an N-terminal DNA-binding domain with a Zn2Cys6 binuclear cluster that interact with CCG triplets and a leucine zipper-like heptad repeat that dimerizes. Dimerization allows binding of targets which contain two CCG motifs oriented in an inverted (CGG-CCG), direct (CCG-CCG), or everted (CCG-CGG) manner. — an NCBI CDD conserved domain (cd15485); members share this curated model.
