identifier: CDD:cd22288
label: "C-terminal domain of spliceosome-associated protein CWC27 and similar proteins. CWC27, also called antigen NY-CO-10, or probable inactive peptidyl-prolyl cis-trans isomerase CWC27, or PPIase CWC27, or serologically defined colon cancer antigen 10, is part of the spliceosome and plays a role in pre-mRNA splicing. It is a probable inactive PPIase with no peptidyl-prolyl cis-trans isomerase activity. This model corresponds to the C-terminal domain of CWC27, which interacts with CWC22 MIF4G domain."
definition: >-
  C-terminal domain of spliceosome-associated protein CWC27 and similar proteins. CWC27, also called antigen NY-CO-10, or probable inactive peptidyl-prolyl cis-trans isomerase CWC27, or PPIase CWC27, or serologically defined colon cancer antigen 10, is part of the spliceosome and plays a role in pre-mRNA splicing. It is a probable inactive PPIase with no peptidyl-prolyl cis-trans isomerase activity. This model corresponds to the C-terminal domain of CWC27, which interacts with CWC22 MIF4G domain. — an NCBI CDD conserved domain (cd22288); members share this curated model.
