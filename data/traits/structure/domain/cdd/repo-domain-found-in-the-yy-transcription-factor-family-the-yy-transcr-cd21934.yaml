identifier: CDD:cd21934
label: "REPO domain found in the YY transcription factor family. The YY transcription factor family includes Yin and yang 1 (YY1) and Yin and yang 2 (YY2). YY1, also called delta transcription factor, or INO80 complex subunit S, or NF-E1, is a multifunctional transcriptional repressor protein that exhibits positive and negative control on many cellular and viral genes by binding to sites overlapping the transcription start site. It binds to the consensus sequence 5'-CCGCCATNTT-3'. It also binds to SMAD binding elements (SBEs) (5'-GTCT/AGAC-3') within BMP response element (BMPRE) of cardiac activating regions. YY1 may play an important role in development and differentiation. It is involved in DNA repair. In vitro, it binds to DNA recombination intermediate structures (Holliday junctions) and plays a role in regulating enhancer activation. YY1 is a core component of the chromatin remodeling INO80 complex which is involved in transcriptional regulation, DNA replication and probably DNA repair. YY2, also called zinc finger protein 631 (ZNF631), is a multifunctional transcription factor that may exhibit positive and negative control on many genes. It may antagonize YY1 and function in development and differentiation. The model corresponds to the REPO domain (also known as Pho spacer) of YY transcription factors, which functions in recruitment of Polycomb."
definition: >-
  REPO domain found in the YY transcription factor family. The YY transcription factor family includes Yin and yang 1 (YY1) and Yin and yang 2 (YY2). YY1, also called delta transcription factor, or INO80 complex subunit S, or NF-E1, is a multifunctional transcriptional repressor protein that exhibits positive and negative control on many cellular and viral genes by binding to sites overlapping the transcription start site. It binds to the consensus sequence 5'-CCGCCATNTT-3'. It also binds to SMAD binding elements (SBEs) (5'-GTCT/AGAC-3') within BMP response element (BMPRE) of cardiac activating regions. YY1 may play an important role in development and differentiation. It is involved in DNA repair. In vitro, it binds to DNA recombination intermediate structures (Holliday junctions) and plays a role in regulating enhancer activation. YY1 is a core component of the chromatin remodeling INO80 complex which is involved in transcriptional regulation, DNA replication and probably DNA repair. YY2, also called zinc finger protein 631 (ZNF631), is a multifunctional transcription factor that may exhibit positive and negative control on many genes. It may antagonize YY1 and function in development and differentiation. The model corresponds to the REPO domain (also known as Pho spacer) of YY transcription factors, which functions in recruitment of Polycomb. — an NCBI CDD conserved domain (cd21934); members share this curated model.
