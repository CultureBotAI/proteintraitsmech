identifier: CDD:cd18217
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in myoneurin. Myoneurin, also called zinc finger and BTB domain-containing protein 31 (ZBTB31), is a novel member of the BTB/POZ-zinc finger family highly expressed in the neuromuscular system and is associated with neuromuscular junctions during the late embryonic period. It may function as a synaptic gene regulator. Myoneurin contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in myoneurin. Myoneurin, also called zinc finger and BTB domain-containing protein 31 (ZBTB31), is a novel member of the BTB/POZ-zinc finger family highly expressed in the neuromuscular system and is associated with neuromuscular junctions during the late embryonic period. It may function as a synaptic gene regulator. Myoneurin contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18217); members share this curated model.
