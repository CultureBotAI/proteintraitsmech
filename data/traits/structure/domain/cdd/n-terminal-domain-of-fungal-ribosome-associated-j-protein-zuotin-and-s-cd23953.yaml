identifier: CDD:cd23953
label: "N-terminal domain of fungal ribosome associated J-protein zuotin and similar proteins. Zuotin, also known as DnaJ-related protein ZUO1, J protein ZUO1, or heat shock protein 40 homolog ZUO1, is a component of the ribosome-associated complex (RAC), which is a heterodimer of the Hsp70/DnaK-type chaperone SSZ1 and the Hsp40/DnaJ-type chaperone ZUO1. The RAC chaperone complex plays a role in regulating accurate translation termination and folding or maintaining nascent polypeptides in a folding-competent state. The ATPase activity of the ribosome-associated pool of Hsp70-type chaperones SSB1/SSB2 that bind to the nascent polypeptide chain is stimulated by the RAC chaperone complex. ZUO1 acts as a J-protein for SSB1/SSB2 only when it is associated with SSZ1. The N-terminal domain (NTD) of ZUO1 is responsible for its interaction with SSZ1, and it contains a conserved LP-motif that binds to the SSZ1 C-terminal SBD (substrate binding domain) beta-lid domain in the same way as canonical Hsp70s bind to their substrates."
definition: >-
  N-terminal domain of fungal ribosome associated J-protein zuotin and similar proteins. Zuotin, also known as DnaJ-related protein ZUO1, J protein ZUO1, or heat shock protein 40 homolog ZUO1, is a component of the ribosome-associated complex (RAC), which is a heterodimer of the Hsp70/DnaK-type chaperone SSZ1 and the Hsp40/DnaJ-type chaperone ZUO1. The RAC chaperone complex plays a role in regulating accurate translation termination and folding or maintaining nascent polypeptides in a folding-competent state. The ATPase activity of the ribosome-associated pool of Hsp70-type chaperones SSB1/SSB2 that bind to the nascent polypeptide chain is stimulated by the RAC chaperone complex. ZUO1 acts as a J-protein for SSB1/SSB2 only when it is associated with SSZ1. The N-terminal domain (NTD) of ZUO1 is responsible for its interaction with SSZ1, and it contains a conserved LP-motif that binds to the SSZ1 C-terminal SBD (substrate binding domain) beta-lid domain in the same way as canonical Hsp70s bind to their substrates. — an NCBI CDD conserved domain (cd23953); members share this curated model.
