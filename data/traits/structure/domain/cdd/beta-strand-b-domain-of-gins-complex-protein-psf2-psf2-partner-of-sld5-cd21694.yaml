identifier: CDD:cd21694
label: "beta-strand (B) domain of GINS complex protein Psf2. Psf2 (partner of Sld5 2) is a component of GINS (named from the Japanese go-ichi-ni-san, meaning 5-1-2-3 for the Sld5, Psf1, Psf2, and Psf3 subunits) tetrameric protein complex and has been found to play important roles in normal eye development in Xenopus laevis and in ICL (interstrand crosslinks) repair. ICLs are toxic lesions that covalently attach opposite strands of DNA. GINS is a complex of four subunits (Sld5, Psf1, Psf2 and Psf3) and is involved in both the initiation and elongation stages of eukaryotic chromosome replication. Besides being essential for the maintenance of genomic integrity, GINS plays a central role in coordinating DNA replication with cell cycle checkpoints and is involved in cell growth. The eukaryotic GINS subunits Sld5, Psf1, Psf2, and Psf3 are homologous, and homologs are also found in archaea; the complex is not found in bacteria. The four subunits of the complex consist of two domains each, called the alpha-helical (A) and beta-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3. This model represents the B-domain of GINS subunit Psf2."
definition: >-
  beta-strand (B) domain of GINS complex protein Psf2. Psf2 (partner of Sld5 2) is a component of GINS (named from the Japanese go-ichi-ni-san, meaning 5-1-2-3 for the Sld5, Psf1, Psf2, and Psf3 subunits) tetrameric protein complex and has been found to play important roles in normal eye development in Xenopus laevis and in ICL (interstrand crosslinks) repair. ICLs are toxic lesions that covalently attach opposite strands of DNA. GINS is a complex of four subunits (Sld5, Psf1, Psf2 and Psf3) and is involved in both the initiation and elongation stages of eukaryotic chromosome replication. Besides being essential for the maintenance of genomic integrity, GINS plays a central role in coordinating DNA replication with cell cycle checkpoints and is involved in cell growth. The eukaryotic GINS subunits Sld5, Psf1, Psf2, and Psf3 are homologous, and homologs are also found in archaea; the complex is not found in bacteria. The four subunits of the complex consist of two domains each, called the alpha-helical (A) and beta-strand (B) domains. The A and B domains of Sld5/Psf1 are permuted with respect to Psf1/Psf3. This model represents the B-domain of GINS subunit Psf2. — an NCBI CDD conserved domain (cd21694); members share this curated model.
