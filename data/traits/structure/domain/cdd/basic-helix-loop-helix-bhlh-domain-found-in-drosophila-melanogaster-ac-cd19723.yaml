identifier: CDD:cd19723
label: "basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster achaete-scute complex (AS-C) proteins, achaete-scute-like proteins, ASCL1-2, and similar proteins. This subfamily includes Drosophila melanogaster AS-C proteins and two ASCL family of transcription factors, ASCL-1 and ASCL-2. Drosophila melanogaster AS-C proteins includes lethal of scute (also known as achaete-scute complex protein T3 or AST3), scute (also known as achaete-scute complex protein T4 or AST4), achaete (also known as achaete-scute complex protein T5 or AST5), and asense (also known as achaete-scute complex protein T8 or AST8). They are involved in the determination of the neuronal precursors in the peripheral nervous system and the central nervous system, as well as in sex determination and dosage compensation. ASCL-1, also termed Class A basic helix-loop-helix protein 46 (bHLHa46), or achaete-scute homolog 1 (ASH-1), or mammalian achaete scute homolog 1 (Mash1), is expressed in subsets of neural progenitors in both the central and peripheral nervous system. It plays a key role in neuronal differentiation and specification in the nervous system. ASCL-2, also termed achaete-scute homolog 2 (ASH-2), or Class A basic helix-loop-helix protein 45 (bHLHa45), or mammalian achaete scute homolog 2 (Mash2), is involved in Schwann cell differentiation and control of proliferation in adult peripheral nerves."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster achaete-scute complex (AS-C) proteins, achaete-scute-like proteins, ASCL1-2, and similar proteins. This subfamily includes Drosophila melanogaster AS-C proteins and two ASCL family of transcription factors, ASCL-1 and ASCL-2. Drosophila melanogaster AS-C proteins includes lethal of scute (also known as achaete-scute complex protein T3 or AST3), scute (also known as achaete-scute complex protein T4 or AST4), achaete (also known as achaete-scute complex protein T5 or AST5), and asense (also known as achaete-scute complex protein T8 or AST8). They are involved in the determination of the neuronal precursors in the peripheral nervous system and the central nervous system, as well as in sex determination and dosage compensation. ASCL-1, also termed Class A basic helix-loop-helix protein 46 (bHLHa46), or achaete-scute homolog 1 (ASH-1), or mammalian achaete scute homolog 1 (Mash1), is expressed in subsets of neural progenitors in both the central and peripheral nervous system. It plays a key role in neuronal differentiation and specification in the nervous system. ASCL-2, also termed achaete-scute homolog 2 (ASH-2), or Class A basic helix-loop-helix protein 45 (bHLHa45), or mammalian achaete scute homolog 2 (Mash2), is involved in Schwann cell differentiation and control of proliferation in adult peripheral nerves. — an NCBI CDD conserved domain (cd19723); members share this curated model.
