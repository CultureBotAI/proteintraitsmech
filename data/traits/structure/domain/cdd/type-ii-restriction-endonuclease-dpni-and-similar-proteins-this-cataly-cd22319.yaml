identifier: CDD:cd22319
label: "type II restriction endonuclease DpnI and similar proteins. This catalytic PD-(D/E)XK domain co-occurs with a C-terminal winged-helix DNA binding domain that is not included in the model. Both domains of R.DpnI bind DNA and are separately specific for the Gm6ATC sequences in Dam-methylated DNA. DpnI or Dam-replacing protein (DRP) is a restriction endonuclease flanked by pseudo-transposable small repeat elements. The replacement of Dam-methylase by DRP allows phase variation through slippage-like mechanisms in several pathogenic isolates of Neisseria meningitidis. Type II restriction endonuclease DpnI belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  type II restriction endonuclease DpnI and similar proteins. This catalytic PD-(D/E)XK domain co-occurs with a C-terminal winged-helix DNA binding domain that is not included in the model. Both domains of R.DpnI bind DNA and are separately specific for the Gm6ATC sequences in Dam-methylated DNA. DpnI or Dam-replacing protein (DRP) is a restriction endonuclease flanked by pseudo-transposable small repeat elements. The replacement of Dam-methylase by DRP allows phase variation through slippage-like mechanisms in several pathogenic isolates of Neisseria meningitidis. Type II restriction endonuclease DpnI belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22319); members share this curated model.
