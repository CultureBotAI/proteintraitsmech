identifier: CDD:cd12921
label: "Vitamin K epoxide reductase (VKOR) family in bacteria. This family includes vitamin K epoxide reductase (VKOR) present only in bacteria. VKOR (also named VKORC1) is an integral membrane protein that catalyzes the reduction of vitamin K 2,3-epoxide and vitamin K to vitamin K hydroquinone, an essential co-factor subsequently used in the gamma-carboxylation of glutamic acid residues in blood coagulation enzymes. All homologs of VKOR contain an active site CXXC motif, which is switched between reduced and disulfide-bonded states during the reaction cycle. In some bacterial homologs, the VKOR domain is fused with domains of the thioredoxin family of oxidoreductases which may function as redox partners in initiating the reduction cascade. This family also has a cysteine peptidase domain present at the N-terminus of the VKOR domain."
definition: >-
  Vitamin K epoxide reductase (VKOR) family in bacteria. This family includes vitamin K epoxide reductase (VKOR) present only in bacteria. VKOR (also named VKORC1) is an integral membrane protein that catalyzes the reduction of vitamin K 2,3-epoxide and vitamin K to vitamin K hydroquinone, an essential co-factor subsequently used in the gamma-carboxylation of glutamic acid residues in blood coagulation enzymes. All homologs of VKOR contain an active site CXXC motif, which is switched between reduced and disulfide-bonded states during the reaction cycle. In some bacterial homologs, the VKOR domain is fused with domains of the thioredoxin family of oxidoreductases which may function as redox partners in initiating the reduction cascade. This family also has a cysteine peptidase domain present at the N-terminus of the VKOR domain. — an NCBI CDD conserved domain (cd12921); members share this curated model.
