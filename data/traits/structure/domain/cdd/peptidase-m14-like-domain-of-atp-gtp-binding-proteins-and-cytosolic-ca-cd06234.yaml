identifier: CDD:cd06234
label: "Peptidase M14-like domain of ATP/GTP binding proteins and cytosolic carboxypeptidases similar to Pseudomonas aerugnosa CCP (PaCCP). A bacterial subgroup of the Peptidase M14-like domain of Nna-1 (Nervous system Nuclear protein induced by Axotomy), also known as ATP/GTP binding protein (AGTPBP-1) and cytosolic carboxypeptidase (CCP)-like proteins. This subgroup includes PaCCP from Pseudomonas aeruginosa, a carboxypeptidase homologous to M14D subfamily of human CCPs. Structural complexes with well-known inhibitors of metallocarboxypeptidases indicate that PaCCP might only possess C-terminal hydrolase activity against cellular substrates of particular specificity. The Peptidase M14 family of metallocarboxypeptidases are zinc-binding carboxypeptidases (CPs) which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. Nna1-like proteins are active metallopeptidases that are thought to act on cytosolic proteins (such as alpha-tubulin in eukaryotes) to remove a C-terminal tyrosine. Nna1-like proteins from the different phyla are highly diverse, but they all contain a unique N-terminal conserved domain right before the CP domain. It has been suggested that this N-terminal domain might act as a folding domain."
definition: >-
  Peptidase M14-like domain of ATP/GTP binding proteins and cytosolic carboxypeptidases similar to Pseudomonas aerugnosa CCP (PaCCP). A bacterial subgroup of the Peptidase M14-like domain of Nna-1 (Nervous system Nuclear protein induced by Axotomy), also known as ATP/GTP binding protein (AGTPBP-1) and cytosolic carboxypeptidase (CCP)-like proteins. This subgroup includes PaCCP from Pseudomonas aeruginosa, a carboxypeptidase homologous to M14D subfamily of human CCPs. Structural complexes with well-known inhibitors of metallocarboxypeptidases indicate that PaCCP might only possess C-terminal hydrolase activity against cellular substrates of particular specificity. The Peptidase M14 family of metallocarboxypeptidases are zinc-binding carboxypeptidases (CPs) which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. Nna1-like proteins are active metallopeptidases that are thought to act on cytosolic proteins (such as alpha-tubulin in eukaryotes) to remove a C-terminal tyrosine. Nna1-like proteins from the different phyla are highly diverse, but they all contain a unique N-terminal conserved domain right before the CP domain. It has been suggested that this N-terminal domain might act as a folding domain. — an NCBI CDD conserved domain (cd06234); members share this curated model.
