identifier: CDD:cd18655
label: "chromo shadow domain of heterochromatin protein 1 homolog alpha. Chromo shadow domain (CSD) of heterochromatin protein 1 homolog alpha (also known as HP1alpha, Cbx5, and Chromobox 5), and related proteins. HP1alpha has diverse functions in heterochromatin formation, gene regulation, and mitotic progression, and forms complex networks of gene, RNA, and protein interactions. HP1 has two conserved protein-protein interaction domains, a single N-terminal chromodomain (CD) which can bind to histone proteins via methylated lysine residues, and a related C-terminal chromo shadow domain (CSD) which is responsible for the homodimerization and interaction with a number of chromatin-associated non-histone proteins; a flexible hinge region separates the CD and CSD and may bind nucleic acid.  CSD domains have only been found in proteins that also possess a related chromodomain, while chromodomains can exist in isolation. HP1 is a highly conserved non-histone chromosomal protein that is evolutionarily conserved from fission yeast to plants and animals. The HP1 CSD, in addition to interacting with various proteins bearing the PXVXL motif, also interacts with a region of histone H3 that bears the similar PXXVXL motif. There are three human homologs of HP1 proteins: HP1alpha, HP1beta (also known as Cbx1), and HP1gamma (also known as Cbx3). The CSD domains of all three human HP1 homologs have similar affinities to the PXXVXL motif of histone H3."
