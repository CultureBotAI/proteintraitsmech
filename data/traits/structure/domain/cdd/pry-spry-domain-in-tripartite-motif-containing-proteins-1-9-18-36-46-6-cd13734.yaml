identifier: CDD:cd13734
label: "PRY/SPRY domain in tripartite motif-containing proteins 1, 9, 18, 36, 46, 67,76 (TRIM1, TRIM9, TRIM18, TRIM36, TRIM46, TRIM67, TRIM76). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of several Class I TRIM proteins, including TRIM1, TRIM9, TRIM18, TRIM36, TRIM46, TRIM67 and TRIM76.  TRIM1 (also known as MID2) and its close homolog, TRIM18 (also known as MID1), both contain a B30.2-like domain at their C-terminus and a single fibronectin type III (FN3) motif between it and their N-terminal RBCC domain. Their coiled-coil motifs mediate both homo- and heterodimerization, a prerequisite for association of the rapamycin-sensitive PP2A regulatory subunit Alpha 4 with microtubules. Mutations in TRIM18 have shown to cause Opitz syndrome, a disorder causing congenital anomalies such as cleft lip and palate as well as heart defects. TRIM9 is expressed mainly in the cerebral cortex, and functions as an E3 ubiquitin ligase. Its immunoreactivity is severely decreased in affected brain areas in Parkinson's disease and dementia with Lewy bodies, possibly playing an important role in the regulation of neuronal function and participating in pathological process of Lewy body disease through its ligase. TRIM36 interacts with centromere protein-H, one of the kinetochore proteins and possibly associates with chromosome segregation; an excess of TRIM36 may cause chromosomal instability. TRIM46 has not yet been characterized.  TRIM67 negatively regulates Ras activity via degradation of 80K-H, leading to neural differentiation, including neuritogenesis.  TRIM76 (also known as cardiomyopathy-associated protein 5 or CMYA5) is a muscle-specific member of the TRIM superfamily, but lacks the RING domain. It is possibly involved in protein kinase A signaling as well as vesicular trafficking. It has also been implicated in Duchenne muscular dystrophy and cardiac disease. The PRY-SPRY domain in these TRIM families is suggested to serve as the target binding site."
definition: >-
  PRY/SPRY domain in tripartite motif-containing proteins 1, 9, 18, 36, 46, 67,76 (TRIM1, TRIM9, TRIM18, TRIM36, TRIM46, TRIM67, TRIM76). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of several Class I TRIM proteins, including TRIM1, TRIM9, TRIM18, TRIM36, TRIM46, TRIM67 and TRIM76. TRIM1 (also known as MID2) and its close homolog, TRIM18 (also known as MID1), both contain a B30.2-like domain at their C-terminus and a single fibronectin type III (FN3) motif between it and their N-terminal RBCC domain. Their coiled-coil motifs mediate both homo- and heterodimerization, a prerequisite for association of the rapamycin-sensitive PP2A regulatory subunit Alpha 4 with microtubules. Mutations in TRIM18 have shown to cause Opitz syndrome, a disorder causing congenital anomalies such as cleft lip and palate as well as heart defects. TRIM9 is expressed mainly in the cerebral cortex, and functions as an E3 ubiquitin ligase. Its immunoreactivity is severely decreased in affected brain areas in Parkinson's disease and dementia with Lewy bodies, possibly playing an important role in the regulation of neuronal function and participating in pathological process of Lewy body disease through its ligase. TRIM36 interacts with centromere protein-H, one of the kinetochore proteins and possibly associates with chromosome segregation; an excess of TRIM36 may cause chromosomal instability. TRIM46 has not yet been characterized. TRIM67 negatively regulates Ras activity via degradation of 80K-H, leading to neural differentiation, including neuritogenesis. TRIM76 (also known as cardiomyopathy-associated protein 5 or CMYA5) is a muscle-specific member of the TRIM superfamily, but lacks the RING domain. It is possibly involved in protein kinase A signaling as well as vesicular trafficking. It has also been implicated in Duchenne muscular dystrophy and cardiac disease. The PRY-SPRY domain in these TRIM families is suggested to serve as the target binding site. — an NCBI CDD conserved domain (cd13734); members share this curated model.
