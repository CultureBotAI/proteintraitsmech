identifier: CDD:cd07184
label: "N-terminal Early set domain associated with the catalytic domain of isoamylase-like (also called glycogen 6-glucanohydrolase) proteins. E or \"early\" set domains are associated with the catalytic domain of isoamylase-like proteins at the N-terminal end. Isoamylase is one of the starch-debranching enzymes that catalyze the hydrolysis of alpha-1,6-glucosidic linkages specific in alpha-glucans such as amylopectin or glycogen. Isoamylase contains a bound calcium ion, but this is not in the same position as the conserved calcium ion that has been reported in other alpha-amylase family enzymes. The N-terminal domain of isoamylase may be related to the immunoglobulin and/or fibronectin type III superfamilies. These domains are associated with different types of catalytic domains at either the N-terminal or C-terminal end and may be involved in homodimeric/tetrameric/dodecameric interactions. Members of this family include members of the alpha amylase family, sialidase, galactose oxidase, cellulase, cellulose, hyaluronate lyase, chitobiase, and chitinase. This domain is also a member of the CBM48 (Carbohydrate Binding Module 48) family whose members include pullulanase, maltooligosyl trehalose synthase, starch branching enzyme, glycogen branching enzyme, glycogen debranching enzyme, and the beta subunit of AMP-activated protein kinase."
definition: >-
  N-terminal Early set domain associated with the catalytic domain of isoamylase-like (also called glycogen 6-glucanohydrolase) proteins. E or "early" set domains are associated with the catalytic domain of isoamylase-like proteins at the N-terminal end. Isoamylase is one of the starch-debranching enzymes that catalyze the hydrolysis of alpha-1,6-glucosidic linkages specific in alpha-glucans such as amylopectin or glycogen. Isoamylase contains a bound calcium ion, but this is not in the same position as the conserved calcium ion that has been reported in other alpha-amylase family enzymes. The N-terminal domain of isoamylase may be related to the immunoglobulin and/or fibronectin type III superfamilies. These domains are associated with different types of catalytic domains at either the N-terminal or C-terminal end and may be involved in homodimeric/tetrameric/dodecameric interactions. Members of this family include members of the alpha amylase family, sialidase, galactose oxidase, cellulase, cellulose, hyaluronate lyase, chitobiase, and chitinase. This domain is also a member of the CBM48 (Carbohydrate Binding Module 48) family whose members include pullulanase, maltooligosyl trehalose synthase, starch branching enzyme, glycogen branching enzyme, glycogen debranching enzyme, and the beta subunit of AMP-activated protein kinase. — an NCBI CDD conserved domain (cd07184); members share this curated model.
