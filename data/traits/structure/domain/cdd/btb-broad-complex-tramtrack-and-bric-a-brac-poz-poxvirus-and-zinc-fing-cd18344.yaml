identifier: CDD:cd18344
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in TD and POZ domain-containing proteins (TDPOZ). TDPOZ is a family of bipartite animal and plant proteins that contains a tumor necrosis factor receptor-associated factor (TRAF) domain (TD) and a POZ/BTB domain. TDPOZ proteins may be nuclear scaffold proteins probably involved in transcription regulation in early development and other cellular processes. This subfamily contains only mammalian members. Plant TDPOZ proteins contain a MATH domain at the N-terminal region and are named \"BTB/POZ and MATH domain-containing proteins (BPM)\", not included in this subfamily. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in TD and POZ domain-containing proteins (TDPOZ). TDPOZ is a family of bipartite animal and plant proteins that contains a tumor necrosis factor receptor-associated factor (TRAF) domain (TD) and a POZ/BTB domain. TDPOZ proteins may be nuclear scaffold proteins probably involved in transcription regulation in early development and other cellular processes. This subfamily contains only mammalian members. Plant TDPOZ proteins contain a MATH domain at the N-terminal region and are named "BTB/POZ and MATH domain-containing proteins (BPM)", not included in this subfamily. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18344); members share this curated model.
