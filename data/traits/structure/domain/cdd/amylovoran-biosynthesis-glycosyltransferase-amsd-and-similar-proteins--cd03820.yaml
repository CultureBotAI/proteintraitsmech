identifier: CDD:cd03820
label: "amylovoran biosynthesis glycosyltransferase AmsD and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. AmSD in Erwinia amylovora has been shown to be involved in the biosynthesis of amylovoran, the acidic exopolysaccharide acting as a virulence factor. This enzyme may be responsible for the formation of  galactose alpha-1,6 linkages in amylovoran."
definition: >-
  amylovoran biosynthesis glycosyltransferase AmsD and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. AmSD in Erwinia amylovora has been shown to be involved in the biosynthesis of amylovoran, the acidic exopolysaccharide acting as a virulence factor. This enzyme may be responsible for the formation of galactose alpha-1,6 linkages in amylovoran. — an NCBI CDD conserved domain (cd03820); members share this curated model.
