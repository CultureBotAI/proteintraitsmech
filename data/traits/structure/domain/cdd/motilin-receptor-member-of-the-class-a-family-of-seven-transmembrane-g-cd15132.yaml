identifier: CDD:cd15132
label: "motilin receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. Motilin receptor, also known as GPR38, is a G-protein coupled receptor that binds the endogenous ligand motilin. Motilin is a 22 amino acid peptide hormone expressed throughout the gastrointestinal tract and stimulates contraction of gut smooth muscle. Motilin is also called as the housekeeper of the gut because it is responsible for the proper filling and emptying of the gastrointestinal tract in response to food intake, and for stimulating the production of pepsin. Motilin receptor shares significant amino acid sequence identity with the growth hormone secretagogue receptor (GHSR) and neurotensin receptors (NTS-R1 and 2)."
definition: >-
  motilin receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. Motilin receptor, also known as GPR38, is a G-protein coupled receptor that binds the endogenous ligand motilin. Motilin is a 22 amino acid peptide hormone expressed throughout the gastrointestinal tract and stimulates contraction of gut smooth muscle. Motilin is also called as the housekeeper of the gut because it is responsible for the proper filling and emptying of the gastrointestinal tract in response to food intake, and for stimulating the production of pepsin. Motilin receptor shares significant amino acid sequence identity with the growth hormone secretagogue receptor (GHSR) and neurotensin receptors (NTS-R1 and 2). — an NCBI CDD conserved domain (cd15132); members share this curated model.
