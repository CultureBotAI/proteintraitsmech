identifier: CDD:cd18455
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 16 (KLHL16). Gigaxonin, also termed Kelch-like protein 16 (KLHL16), may be a cytoskeletal component that directly or indirectly plays an important role in neurofilament architecture. It may also act as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as tubulin folding cofactor B (TBCB), microtubule-associated protein MAP1B and glial fibrillary acidic protein (GFAP). Gigaxonin is mutated in giant axonal neuropathy."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 16 (KLHL16). Gigaxonin, also termed Kelch-like protein 16 (KLHL16), may be a cytoskeletal component that directly or indirectly plays an important role in neurofilament architecture. It may also act as a substrate-specific adaptor of an E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as tubulin folding cofactor B (TBCB), microtubule-associated protein MAP1B and glial fibrillary acidic protein (GFAP). Gigaxonin is mutated in giant axonal neuropathy. — an NCBI CDD conserved domain (cd18455); members share this curated model.
