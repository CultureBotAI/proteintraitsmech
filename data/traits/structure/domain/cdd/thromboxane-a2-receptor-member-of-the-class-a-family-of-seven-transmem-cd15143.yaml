identifier: CDD:cd15143
label: "thromboxane A2 receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The thromboxane receptor, also known as the prostanoid TP receptor, is a class A G-protein coupled receptor whose endogenous ligand is thromboxane A2 (TXA2). TXA2 is the major product of cyclooxygenase metabolite of arachidonic acid that found predominantly in platelets and stimulates platelet aggregation, Ca2+ influx into platelets, and also causes vasoconstriction. TXA2 has been shown to be involved in immune regulation, angiogenesis and metastasis, among many others. Activation of TXA2 receptor is coupled to G(q) and G(13), resulting in the activations of phospholipase C and RhoGEF, respectively. TXA2 receptor is widely distributed in the body and is abundantly expressed in thymus and spleen."
definition: >-
