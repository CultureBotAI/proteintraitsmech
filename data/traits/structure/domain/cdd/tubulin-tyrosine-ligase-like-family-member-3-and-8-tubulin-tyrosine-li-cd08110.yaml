identifier: CDD:cd08110
label: "Tubulin tyrosine ligase-like family, member 3 and 8. Tubulin tyrosine ligase-like family, member 3 and 8 (TTLL3, TTLL8) are members of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 3 gene (TTLL3) maps to chromosome region 3p25.3 and encodes for a 772 amino acid protein, whereas TTLL8 maps to chromosome region 22q13.33 and encodes for a 834 amino acid protein. TTLL3 and TTLL8 play an important role in protein glycalation (a posttranslational modification that generates glycine side chains on proteins); both TTLL3 and TTLL8 initiates glycylases resulting in monoglycylation of protein. In Drosophila, however, the bifunctional enzyme dmTTLL3B (CG11201) is responsible for both initiation as well as elongation of the glycine side chains."
definition: >-
  Tubulin tyrosine ligase-like family, member 3 and 8. Tubulin tyrosine ligase-like family, member 3 and 8 (TTLL3, TTLL8) are members of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 3 gene (TTLL3) maps to chromosome region 3p25.3 and encodes for a 772 amino acid protein, whereas TTLL8 maps to chromosome region 22q13.33 and encodes for a 834 amino acid protein. TTLL3 and TTLL8 play an important role in protein glycalation (a posttranslational modification that generates glycine side chains on proteins); both TTLL3 and TTLL8 initiates glycylases resulting in monoglycylation of protein. In Drosophila, however, the bifunctional enzyme dmTTLL3B (CG11201) is responsible for both initiation as well as elongation of the glycine side chains. — an NCBI CDD conserved domain (cd08110); members share this curated model.
