identifier: CDD:cd17929
label: "DEXH-box helicase domain of PriA. PriA, also known as replication factor Y or primosomal protein N', is a 3'-->5' superfamily 2 DNA helicase that acts to remodel stalled replication forks and as a specificity factor for origin-independent assembly of a new replisome at the stalled fork. PriA is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of PriA. PriA, also known as replication factor Y or primosomal protein N', is a 3'-->5' superfamily 2 DNA helicase that acts to remodel stalled replication forks and as a specificity factor for origin-independent assembly of a new replisome at the stalled fork. PriA is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17929); members share this curated model.
