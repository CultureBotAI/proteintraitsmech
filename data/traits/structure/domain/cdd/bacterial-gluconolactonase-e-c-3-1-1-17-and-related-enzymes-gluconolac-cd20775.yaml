identifier: CDD:cd20775
label: "Bacterial gluconolactonase (E.C. 3.1.1.17) and related enzymes. Gluconolactonase catalyzes the hydrolysis of D-glucono-1,5-lactone to D-gluconate. This mostly bacterial family is involved in glucose secondary metabolite pathways, and its activity is most likely calcium-dependent. It is a member of a larger superfamily of enzymes related to the major royal jelly protein from honeybees, which share a six-bladed beta-propeller topology. Gluconolactonases in this family may participate in a variety of pathways, including the pentose phosphate pathway."
definition: >-
  Bacterial gluconolactonase (E.C. 3.1.1.17) and related enzymes. Gluconolactonase catalyzes the hydrolysis of D-glucono-1,5-lactone to D-gluconate. This mostly bacterial family is involved in glucose secondary metabolite pathways, and its activity is most likely calcium-dependent. It is a member of a larger superfamily of enzymes related to the major royal jelly protein from honeybees, which share a six-bladed beta-propeller topology. Gluconolactonases in this family may participate in a variety of pathways, including the pentose phosphate pathway. — an NCBI CDD conserved domain (cd20775); members share this curated model.
