identifier: CDD:cd24036
label: "nucleotide-binding domain (NBD) of the BcrAD/BadFG and HgdC/HadI family. The BcrAD/BadFG and HgdC/HadI family includes BcrA/BadF/BzdQ and BcrD/BadG/BzdP proteins which are subunits of benzoyl-CoA reductase, that may be involved in ATP hydrolysis. The family also contains some dehydratase activators, such as Acidaminococcus fermentans (R)-2-hydroxyglutaryl-CoA dehydratase activating ATPase (HgdC), Clostridioides difficile 2-hydroxyisocaproyl-CoA dehydratase activator (HadI), Clostridium sporogenes (R)-phenyllactate dehydratase activator (FldI), and Anaerotignum propionicum activator of lactoyl-CoA dehydratase (LcdC). Uncharacterized proteins, such as Escherichia coli protein YjiL and Methanocaldococcus jannaschii protein MJ0800, are also included in this family."
definition: >-
  nucleotide-binding domain (NBD) of the BcrAD/BadFG and HgdC/HadI family. The BcrAD/BadFG and HgdC/HadI family includes BcrA/BadF/BzdQ and BcrD/BadG/BzdP proteins which are subunits of benzoyl-CoA reductase, that may be involved in ATP hydrolysis. The family also contains some dehydratase activators, such as Acidaminococcus fermentans (R)-2-hydroxyglutaryl-CoA dehydratase activating ATPase (HgdC), Clostridioides difficile 2-hydroxyisocaproyl-CoA dehydratase activator (HadI), Clostridium sporogenes (R)-phenyllactate dehydratase activator (FldI), and Anaerotignum propionicum activator of lactoyl-CoA dehydratase (LcdC). Uncharacterized proteins, such as Escherichia coli protein YjiL and Methanocaldococcus jannaschii protein MJ0800, are also included in this family. — an NCBI CDD conserved domain (cd24036); members share this curated model.
