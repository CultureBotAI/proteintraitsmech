identifier: CDD:cd20831
label: "protein kinase C conserved region 1 (C1 domain) found in Drosophila melanogaster GM13116p and similar proteins. This group contains uncharacterized proteins including Drosophila melanogaster GM13116p and Caenorhabditis elegans hypothetical protein R11G1.4, both of which contain C2 (a calcium-binding domain) and C1 domains. This model describes the C1 domain, a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in Drosophila melanogaster GM13116p and similar proteins. This group contains uncharacterized proteins including Drosophila melanogaster GM13116p and Caenorhabditis elegans hypothetical protein R11G1.4, both of which contain C2 (a calcium-binding domain) and C1 domains. This model describes the C1 domain, a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20831); members share this curated model.
