identifier: CDD:cd22964
label: "dimerization/docking (D/D) domain of an uncharacterized subunit found in Chlamydomonas reinhardtii radial spoke 1. Flagellar radial spokes contribute to the regulation of dynein arm activity and thus the pattern of flagellar bending. They consist of a thin stalk, which is attached to a subfiber of the outer doublet microtubule, and a bulbous head, which is attached to the stalk and appears to interact with the projections from the central pair of microtubules. This subfamily includes an uncharacterized protein found in Chlamydomonas reinhardtii radial spoke 1. It contains a conserved domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain of an uncharacterized subunit found in Chlamydomonas reinhardtii radial spoke 1. Flagellar radial spokes contribute to the regulation of dynein arm activity and thus the pattern of flagellar bending. They consist of a thin stalk, which is attached to a subfiber of the outer doublet microtubule, and a bulbous head, which is attached to the stalk and appears to interact with the projections from the central pair of microtubules. This subfamily includes an uncharacterized protein found in Chlamydomonas reinhardtii radial spoke 1. It contains a conserved domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22964); members share this curated model.
