identifier: CDD:cd11396
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in upstream stimulatory factors, USF1, USF2 and similar proteins. Upstream stimulatory factor 1 and 2 (USF-1 and USF-2) are members of bHLHzip transcription factor family. USFs are ubiquitously expressed and key regulators of a wide number of gene regulation networks, including the stress and immune responses, cell cycle and proliferation, lipid and glucid metabolism. USFs recruit chromatin remodeling enzymes and interact with co-activators and the members of the transcription pre-initiation complex. USFs interact with high affinity to E-box regulatory elements."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in upstream stimulatory factors, USF1, USF2 and similar proteins. Upstream stimulatory factor 1 and 2 (USF-1 and USF-2) are members of bHLHzip transcription factor family. USFs are ubiquitously expressed and key regulators of a wide number of gene regulation networks, including the stress and immune responses, cell cycle and proliferation, lipid and glucid metabolism. USFs recruit chromatin remodeling enzymes and interact with co-activators and the members of the transcription pre-initiation complex. USFs interact with high affinity to E-box regulatory elements. — an NCBI CDD conserved domain (cd11396); members share this curated model.
