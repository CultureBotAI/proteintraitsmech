identifier: CDD:cd17538
label: "first (D1) phosphoacceptor receiver (REC) domain of response regulator PleD and similar domains. PleD contains a REC domain (D1) with the phosphorylatable aspartate, a REC-like adaptor domain (D2), and the enzymatic diguanylate cyclase (DGC) domain, also called the GGDEF domain according to a conserved sequence motif, as its output domain. The GGDEF-containing PleD response regulators are global regulators of cell metabolism in some important human pathogens. This model describes D1 of PleD and similar domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  first (D1) phosphoacceptor receiver (REC) domain of response regulator PleD and similar domains. PleD contains a REC domain (D1) with the phosphorylatable aspartate, a REC-like adaptor domain (D2), and the enzymatic diguanylate cyclase (DGC) domain, also called the GGDEF domain according to a conserved sequence motif, as its output domain. The GGDEF-containing PleD response regulators are global regulators of cell metabolism in some important human pathogens. This model describes D1 of PleD and similar domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17538); members share this curated model.
