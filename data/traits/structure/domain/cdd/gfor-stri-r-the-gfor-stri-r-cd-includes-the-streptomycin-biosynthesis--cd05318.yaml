identifier: CDD:cd05318
label: "GFOR_StrI-R. The GFOR_StrI-R CD includes the streptomycin biosynthesis StrI-related (StrI-R) protein of Deinococcus radiodurans R1, and Dictyostelium discoideum, and other similar putative dehydrogenases. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase (GFOR) superfamily of proteins."
definition: >-
  GFOR_StrI-R. The GFOR_StrI-R CD includes the streptomycin biosynthesis StrI-related (StrI-R) protein of Deinococcus radiodurans R1, and Dictyostelium discoideum, and other similar putative dehydrogenases. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase (GFOR) superfamily of proteins. — an NCBI CDD conserved domain (cd05318); members share this curated model.
