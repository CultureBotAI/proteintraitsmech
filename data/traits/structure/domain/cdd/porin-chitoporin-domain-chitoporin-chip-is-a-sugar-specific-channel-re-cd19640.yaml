identifier: CDD:cd19640
label: "Porin Chitoporin domain. Chitoporin (ChiP) is a sugar-specific channel responsible for the transport of chitooligosaccharides through the outer membrane of the marine bacterium Vibrio. The bacterium is both a primary and an opportunistic pathogen of marine animals, triggering a lethal disease called luminous vibriosis which affects marine fish and prawn-farming operations worldwide. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface."
definition: >-
  Porin Chitoporin domain. Chitoporin (ChiP) is a sugar-specific channel responsible for the transport of chitooligosaccharides through the outer membrane of the marine bacterium Vibrio. The bacterium is both a primary and an opportunistic pathogen of marine animals, triggering a lethal disease called luminous vibriosis which affects marine fish and prawn-farming operations worldwide. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. — an NCBI CDD conserved domain (cd19640); members share this curated model.
