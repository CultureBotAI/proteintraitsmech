identifier: CDD:cd16599
label: "RING finger, HC subclass, found in tripartite motif-containing protein 35 (TRIM35) and similar proteins. TRIM35, also known as hemopoietic lineage switch protein 5 (HLS5), is a putative hepatocellular carcinoma (HCC) suppressor that inhibits phosphorylation of pyruvate kinase isoform M2 (PKM2), which is involved in aerobic glycolysis of cancer cells and further suppresses the Warburg effect and tumorigenicity in HCC. It also negatively regulates Toll-like receptor 7 (TLR7)- and TLR9-mediated type I interferon production by suppressing the stability of interferon regulatory factor 7 (IRF7). Moreover, TRIM35 regulates erythroid differentiation by modulating globin transcription factor 1 (GATA-1) activity. TRIM35 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 35 (TRIM35) and similar proteins. TRIM35, also known as hemopoietic lineage switch protein 5 (HLS5), is a putative hepatocellular carcinoma (HCC) suppressor that inhibits phosphorylation of pyruvate kinase isoform M2 (PKM2), which is involved in aerobic glycolysis of cancer cells and further suppresses the Warburg effect and tumorigenicity in HCC. It also negatively regulates Toll-like receptor 7 (TLR7)- and TLR9-mediated type I interferon production by suppressing the stability of interferon regulatory factor 7 (IRF7). Moreover, TRIM35 regulates erythroid differentiation by modulating globin transcription factor 1 (GATA-1) activity. TRIM35 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16599); members share this curated model.
