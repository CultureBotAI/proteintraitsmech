identifier: CDD:cd22071
label: "Wiskott Aldrich syndrome homology region 2 (WH2 motif) found in Wiskott-Aldrich Syndrome Protein Family Member 1 (WASP1 or WAVE1 or WASF1 or SCAR1). This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in the Wiskott-Aldrich syndrome protein (WASP) relative WAVE 1 (also called WASP-family verprolin homologous protein 1 or SCAR1 or WAVE1). WAVE1 is a downstream effector protein involved in the transmission of signals from tyrosine kinase receptors and small GTPases to the actin cytoskeleton. It regulates lamellipodia formation via a hetero-pentameric WAVE regulatory complex (WRC) with additional proteins in the cell (Sra1/Cyfip1, Nap1/Hem-2, Abi and HSPC300) that regulates actin filament reorganization via its interaction with the actin related protein (Arp)2/3 complex. The WRC is stimulated by the Rac GTPase binding to CYFIP protein, allowing the release of WAVE1 from the complex.  WAVE1 then binds and activates the Arp2/3 complex via its C-terminal domain. It interacts with actin via the WH2 domain. WAVE1 has been shown to be necessary for efficient transcriptional reprogramming in Xenopus oocytes and for normal development."
