identifier: CDD:cd21442
label: "N-terminal domain of syntaxin-6 and similar proteins. The family includes soluble NSF attachment protein receptor (SNARE) proteins, syntaxin-6 (STX6) and syntaxin-10 (STX10), and their homologs found in fungi and plants, such as Tlg1p, AtSYP61, and similar proteins. STX6 is involved in intracellular vesicle trafficking. STX10, also called Syn10, is involved in vesicular transport from the late endosomes to the trans-Golgi network. Tlg1p, also called syntaxin TLG1, is a SNARE protein (of Qc type) involved in membrane fusion probably in retrograde traffic of cytosolic double-membrane vesicles derived from both, early and possibly late endosomes/PVC (prevacuolar compartment) back to the trans-Golgi network (TGN or late Golgi). It has been reported to function both as a (target membrane) t-SNARE and as a (vesicle) v-SNARE. AtSYP61, also called osmotic stress-sensitive mutant 1 (OSM1), is a vesicle trafficking syntaxin protein that functions in the secretory pathway. It is involved in osmotic stress tolerance and in abscisic acid (ABA) regulation of stomatal responses in Arabidopsis."
definition: >-
  N-terminal domain of syntaxin-6 and similar proteins. The family includes soluble NSF attachment protein receptor (SNARE) proteins, syntaxin-6 (STX6) and syntaxin-10 (STX10), and their homologs found in fungi and plants, such as Tlg1p, AtSYP61, and similar proteins. STX6 is involved in intracellular vesicle trafficking. STX10, also called Syn10, is involved in vesicular transport from the late endosomes to the trans-Golgi network. Tlg1p, also called syntaxin TLG1, is a SNARE protein (of Qc type) involved in membrane fusion probably in retrograde traffic of cytosolic double-membrane vesicles derived from both, early and possibly late endosomes/PVC (prevacuolar compartment) back to the trans-Golgi network (TGN or late Golgi). It has been reported to function both as a (target membrane) t-SNARE and as a (vesicle) v-SNARE. AtSYP61, also called osmotic stress-sensitive mutant 1 (OSM1), is a vesicle trafficking syntaxin protein that functions in the secretory pathway. It is involved in osmotic stress tolerance and in abscisic acid (ABA) regulation of stomatal responses in Arabidopsis. — an NCBI CDD conserved domain (cd21442); members share this curated model.
