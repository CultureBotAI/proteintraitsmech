identifier: CDD:cd16919
label: "Histidine kinase-like ATPase domain of two-component sensor hybrid histidine kinases, similar to Brucella abortus 2308 CckA. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component hybrid sensor histidine kinase (HKs) similar to Brucella abortus 2308 CckA, which is a component of an essential protein phosphorelay that regulates expression of genes required for growth, division, and intracellular survival; phosphoryl transfer initiates from the sensor kinase CckA and proceeds via the ChpT phosphotransferase to two regulatory substrates: the DNA-binding response regulator CtrA and the phospho-receiver protein CpdR. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), a REC signal receiver domain, and some contain PAS or PAS and GAF sensor domain(s)."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor hybrid histidine kinases, similar to Brucella abortus 2308 CckA. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component hybrid sensor histidine kinase (HKs) similar to Brucella abortus 2308 CckA, which is a component of an essential protein phosphorelay that regulates expression of genes required for growth, division, and intracellular survival; phosphoryl transfer initiates from the sensor kinase CckA and proceeds via the ChpT phosphotransferase to two regulatory substrates: the DNA-binding response regulator CtrA and the phospho-receiver protein CpdR. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA), a REC signal receiver domain, and some contain PAS or PAS and GAF sensor domain(s). — an NCBI CDD conserved domain (cd16919); members share this curated model.
