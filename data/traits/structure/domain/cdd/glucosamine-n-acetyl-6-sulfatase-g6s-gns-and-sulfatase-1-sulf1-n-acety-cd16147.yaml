identifier: CDD:cd16147
label: "glucosamine (N-acetyl)-6-sulfatase(G6S, GNS) AND sulfatase 1(SULF1). N-acetylglucosamine-6-sulfatase also known as glucosamine (N-acetyl)-6-sulfatase hydrolyzes of the 6-sulfate groups of the N-acetyl-D-glucosamine 6-sulfate units of heparan sulfate and keratan sulfate. Deficient of N-acetylglucosamine-6-sulfatase results in disease of Sanfilippo Syndrome type IIId or Mucopolysaccharidosis III (MPS-III), a rare autosomal recessive lysosomal storage disease. SULF1 encodes an extracellular heparan sulfate endosulfatase, that removes 6-O-sulfate groups from heparan sulfate chains of heparan sulfate proteoglycans (HSPGs)."
definition: >-
  glucosamine (N-acetyl)-6-sulfatase(G6S, GNS) AND sulfatase 1(SULF1). N-acetylglucosamine-6-sulfatase also known as glucosamine (N-acetyl)-6-sulfatase hydrolyzes of the 6-sulfate groups of the N-acetyl-D-glucosamine 6-sulfate units of heparan sulfate and keratan sulfate. Deficient of N-acetylglucosamine-6-sulfatase results in disease of Sanfilippo Syndrome type IIId or Mucopolysaccharidosis III (MPS-III), a rare autosomal recessive lysosomal storage disease. SULF1 encodes an extracellular heparan sulfate endosulfatase, that removes 6-O-sulfate groups from heparan sulfate chains of heparan sulfate proteoglycans (HSPGs). — an NCBI CDD conserved domain (cd16147); members share this curated model.
