identifier: CDD:cd14326
label: "UBA domain found in ubiquitin-like protein 7 (UBL7) and similar proteins. UBL7, also called bone marrow stromal cell ubiquitin-like protein (BMSC-UbP), or ubiquitin-like protein SB132, is a novel ubiquitin-like protein that may play roles in regulation of bone marrow stromal cell (BMSC) function or cell differentiation via an evocator-associated and cell-specific pattern. UBL7 contains an N-terminal ubiquitin domain (UBQ) and a C-terminal ubiquitin-associated (UBA) domain. UBQ domain interacts with 26S proteasome-dependent degradation, and UBA domain links cellular processes and the ubiquitin system."
definition: >-
  UBA domain found in ubiquitin-like protein 7 (UBL7) and similar proteins. UBL7, also called bone marrow stromal cell ubiquitin-like protein (BMSC-UbP), or ubiquitin-like protein SB132, is a novel ubiquitin-like protein that may play roles in regulation of bone marrow stromal cell (BMSC) function or cell differentiation via an evocator-associated and cell-specific pattern. UBL7 contains an N-terminal ubiquitin domain (UBQ) and a C-terminal ubiquitin-associated (UBA) domain. UBQ domain interacts with 26S proteasome-dependent degradation, and UBA domain links cellular processes and the ubiquitin system. — an NCBI CDD conserved domain (cd14326); members share this curated model.
