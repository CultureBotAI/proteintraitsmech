identifier: CDD:cd21841
label: "bipolar assembly (BASS) domain found in kinesin-like protein Klp61F. Klp61F, also called bipolar kinesin KRP-130, is a Drosophila Kinesin-5 subunit acting as a microtubule motor required for spindle body separation. It plays an important role in mitotic dividing cells. It forms cross-links between microtubules within interpolar microtubule bundles. It may display microtubule-stimulated ATPase activity. Klp61F is required for normal fusome organization. It is also essential in non-mitotic cells for transport of secretory proteins from the Golgi complex to the cell surface. The model corresponds to a central bipolar assembly (BASS) domain of Klp61F. It forms a canonical anti-parallel coiled-coil BASS domain dimer, which is associated with a second dimer to form the full tetramer, a novel four-helix bundle structure, which may have important implications for its mechanism of action within the spindle."
