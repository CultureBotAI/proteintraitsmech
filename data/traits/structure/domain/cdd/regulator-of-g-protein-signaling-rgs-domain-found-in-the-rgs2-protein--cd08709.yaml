identifier: CDD:cd08709
label: "Regulator of G protein signaling (RGS) domain found in the RGS2 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS2 protein. RGS2 is a member of R4/RGS subfamily of RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G- alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS2 plays important roles in the regulation of blood pressure and the pathogenesis of human hypertension, as well as in bone formation in osteoblasts. Outside of the GPCR pathway RGS2 interacts with calmodulin, beta- COP, tubulin, PKG1-alpha, and TRPV6."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS2 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS2 protein. RGS2 is a member of R4/RGS subfamily of RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G- alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS2 plays important roles in the regulation of blood pressure and the pathogenesis of human hypertension, as well as in bone formation in osteoblasts. Outside of the GPCR pathway RGS2 interacts with calmodulin, beta- COP, tubulin, PKG1-alpha, and TRPV6. — an NCBI CDD conserved domain (cd08709); members share this curated model.
