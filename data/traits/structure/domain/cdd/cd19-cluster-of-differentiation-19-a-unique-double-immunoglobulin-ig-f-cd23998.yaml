identifier: CDD:cd23998
label: "CD19 (Cluster of Differentiation 19), a unique double immunoglobulin (Ig)-fold protodomain 3 and 4. CD19, also known as B-Lymphocyte Surface Antigen B4, T-Cell Surface Antigen Leu-12, and CVID3, is a transmembrane receptor present on various types of B cells, including progenitor, naive, and memory B cells, as well as plasmablasts. Until recently, it was believed to comprise two extracellular immunoglobulin (Ig) structural domains arranged in tandem with C2 topology. However, recent crystal structures have shown that the CD19 extracellular domain contains a unique double Ig domain that is responsible for its binding to proteins such as CD21, CD81, and CD225, which regulate B cell activation and survival. A recent analysis of the CD19 extracellular domain sequence reveals two \"Ig domains\", but the structure demonstrates that these two domains are not folded independently and connected in tandem. Rather, they fold together as one intertwined domain that can be referred to as a \"double Ig\" domain. Each of the two regular Ig domain sequences has a noticeably short linker that forms a loop between strands C' and D, rather than allowing the formation of a C\" strand. Additionally, the two Ig-domain sequences are separated by a long linker that is structured as a small insertion domain, enabling both Ig sequences to fold together as a unique double Ig-domain. The CD19 domain comprises four \"protodomains\": two formed by A'B-CC' strands and two by DE-FG strands that interdigitate to form a novel double Ig fold. When analyzing this double Ig domain in terms of the usual Ig-fold, A'B-CC' protodomain of the first Ig sequence combines with DE-FG protodomain of the second, and vice versa. Hence, the second combined Ig fold is inverted, with DE-FG protodomain of the first Ig sequence combining with A'B-CC' protodomain of the second Ig sequence and in that order, as if it were a circular permutation, obtained only through structural folding. This group contains the protodomains 3 and 4 of the CD19 double Ig domain."
definition: >-
  CD19 (Cluster of Differentiation 19), a unique double immunoglobulin (Ig)-fold protodomain 3 and 4. CD19, also known as B-Lymphocyte Surface Antigen B4, T-Cell Surface Antigen Leu-12, and CVID3, is a transmembrane receptor present on various types of B cells, including progenitor, naive, and memory B cells, as well as plasmablasts. Until recently, it was believed to comprise two extracellular immunoglobulin (Ig) structural domains arranged in tandem with C2 topology. However, recent crystal structures have shown that the CD19 extracellular domain contains a unique double Ig domain that is responsible for its binding to proteins such as CD21, CD81, and CD225, which regulate B cell activation and survival. A recent analysis of the CD19 extracellular domain sequence reveals two "Ig domains", but the structure demonstrates that these two domains are not folded independently and connected in tandem. Rather, they fold together as one intertwined domain that can be referred to as a "double Ig" domain. Each of the two regular Ig domain sequences has a noticeably short linker that forms a loop between strands C' and D, rather than allowing the formation of a C" strand. Additionally, the two Ig-domain sequences are separated by a long linker that is structured as a small insertion domain, enabling both Ig sequences to fold together as a unique double Ig-domain. The CD19 domain comprises four "protodomains": two formed by A'B-CC' strands and two by DE-FG strands that interdigitate to form a novel double Ig fold. When analyzing this double Ig domain in terms of the usual Ig-fold, A'B-CC' protodomain of the first Ig sequence combines with DE-FG protodomain of the second, and vice versa. Hence, the second combined Ig fold is inverted, with DE-FG protodomain of the first Ig sequence combining with A'B-CC' protodomain of the second Ig sequence and in that order, as if it were a circular permutation, obtained only through structural folding. This group contains the protodomains 3 and 4 of the CD19 double Ig domain. — an NCBI CDD conserved domain (cd23998); members share this curated model.
