identifier: CDD:cd18234
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like proteins KLHL1, KLHL4 and KLHL5. This family contains the Kelch-like proteins: KLHL1, KLHL4 and KLHL5, all of which share high identity and similarity with the Drosophila kelch protein, a component of ring canals. KLHL1 is a neuronal actin-binding protein that modulates voltage-gated CaV2.1 (P/Q-type) and CaV3.2 (alpha1H T-type) calcium channels. Family members contain a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like proteins KLHL1, KLHL4 and KLHL5. This family contains the Kelch-like proteins: KLHL1, KLHL4 and KLHL5, all of which share high identity and similarity with the Drosophila kelch protein, a component of ring canals. KLHL1 is a neuronal actin-binding protein that modulates voltage-gated CaV2.1 (P/Q-type) and CaV3.2 (alpha1H T-type) calcium channels. Family members contain a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18234); members share this curated model.
