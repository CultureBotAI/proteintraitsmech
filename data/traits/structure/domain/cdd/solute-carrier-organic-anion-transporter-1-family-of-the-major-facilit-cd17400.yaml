identifier: CDD:cd17400
label: "Solute carrier organic anion transporter 1 family of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 1 (SLCO1) or Organic anion transporting polypeptide 1 (OATP1) family contains three subfamilies: OATP1A, OATP1B, and OATP1C. OATP1A contains one human member, OATP1A2, which shows a broad spectrum of substrates including endogenous compounds (such as bile acids, steroid hormones and their conjugates, thyroid hormones) and various drugs (such as fexofenadine, ouabain and the cyanobacterial toxin microcystin). OATP1B contains two human proteins, OATP1B1 and OATP1B3, which can both accept a wide variety of structurally-unrelated compounds as substrates including clinically-important drugs such as hydroxymethylglutaryl (HMG)-CoA reductase inhibitors (statins), angiotensin II receptor blockers (sartans), angiotensin converting enzyme (ACE) inhibitors, and anti-diabetes drugs (glinides). OATP1C contains one mammalian member, OATP1C1, which is also called thyroxine transporter. It mediates the high affinity transport of the thyroid hormones, T4 (3,5,3',5'tetraiodo-L-thyronine or thyroxine), rT3 (3,3'5'-triiodo-L-thyronine), and T3 (3,5,3'tri-iodo-L-thyronine or triiodothyronine). The SLCO1/OATP1 family belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier organic anion transporter 1 family of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 1 (SLCO1) or Organic anion transporting polypeptide 1 (OATP1) family contains three subfamilies: OATP1A, OATP1B, and OATP1C. OATP1A contains one human member, OATP1A2, which shows a broad spectrum of substrates including endogenous compounds (such as bile acids, steroid hormones and their conjugates, thyroid hormones) and various drugs (such as fexofenadine, ouabain and the cyanobacterial toxin microcystin). OATP1B contains two human proteins, OATP1B1 and OATP1B3, which can both accept a wide variety of structurally-unrelated compounds as substrates including clinically-important drugs such as hydroxymethylglutaryl (HMG)-CoA reductase inhibitors (statins), angiotensin II receptor blockers (sartans), angiotensin converting enzyme (ACE) inhibitors, and anti-diabetes drugs (glinides). OATP1C contains one mammalian member, OATP1C1, which is also called thyroxine transporter. It mediates the high affinity transport of the thyroid hormones, T4 (3,5,3',5'tetraiodo-L-thyronine or thyroxine), rT3 (3,3'5'-triiodo-L-thyronine), and T3 (3,5,3'tri-iodo-L-thyronine or triiodothyronine). The SLCO1/OATP1 family belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17400); members share this curated model.
