identifier: CDD:cd11889
label: "Src Homology 3 domain of Cytokinesis protein 3 and similar proteins. Cytokinesis protein 3 (Cyk3 or Cyk3p) is a component of the actomyosin ring independent cytokinesis pathway in yeast. It interacts with Inn1 and facilitates its recruitment to the bud neck, thereby promoting cytokinesis. Cyk3p contains an N-terminal SH3 domain and a C-terminal transglutaminase-like domain. The Cyk3p SH3 domain binds to the C-terminal proline-rich region of Inn1. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
