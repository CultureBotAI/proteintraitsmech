identifier: CDD:cd18269
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like proteins, KLHL40 and KLHL41. This family includes Kelch-like proteins, KLHL40 and KLHL41. KLHL40 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a key regulator of skeletal muscle development. KLHL41 is a novel kelch related protein that is involved in pseudopod elongation in transformed cells. They both contain a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like proteins, KLHL40 and KLHL41. This family includes Kelch-like proteins, KLHL40 and KLHL41. KLHL40 is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a key regulator of skeletal muscle development. KLHL41 is a novel kelch related protein that is involved in pseudopod elongation in transformed cells. They both contain a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18269); members share this curated model.
