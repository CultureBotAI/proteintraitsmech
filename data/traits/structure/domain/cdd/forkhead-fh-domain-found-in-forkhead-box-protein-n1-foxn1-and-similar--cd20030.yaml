identifier: CDD:cd20030
label: "Forkhead (FH) domain found in Forkhead box protein N1 (FOXN1) and similar proteins. The FOXN1-like group includes two FOXN subfamily winged helix transcription factors, FOXN1 and FOXN4. FOXN1, also called winged helix transcription factor nude, acts as a transcriptional regulator which regulates the development, differentiation, and function of thymic epithelial cells (TECs), both in the prenatal and postnatal thymus. FOXN4 acts as a transcription factor essential for neural and some non-neural tissue development, such as retina and lung, respectively. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein N1 (FOXN1) and similar proteins. The FOXN1-like group includes two FOXN subfamily winged helix transcription factors, FOXN1 and FOXN4. FOXN1, also called winged helix transcription factor nude, acts as a transcriptional regulator which regulates the development, differentiation, and function of thymic epithelial cells (TECs), both in the prenatal and postnatal thymus. FOXN4 acts as a transcription factor essential for neural and some non-neural tissue development, such as retina and lung, respectively. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20030); members share this curated model.
