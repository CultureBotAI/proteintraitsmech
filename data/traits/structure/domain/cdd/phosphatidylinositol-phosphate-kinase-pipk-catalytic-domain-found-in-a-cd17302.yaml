identifier: CDD:cd17302
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in Arabidopsis thaliana phosphatidylinositol 4-phosphate 5-kinases (PIP5Ks) and similar proteins. PIP5K (EC 2.7.1.68), also known as PtdIns(4)P-5-kinase, or diphosphoinositide kinase, phosphorylates phosphatidylinositol-4-phosphate to produce phosphatidylinositol-4,5-bisphosphate as a precursor of two second messengers, inositol-1,4,5-triphosphate and diacylglycerol, and as a regulator of many cellular proteins involved in signal transduction and cytoskeletal organization. The family includes several PIP5Ks from Arabidopsis thaliana. AtPIP5K1 is involved in water-stress signal transduction. AtPIP5K2 acts as an interactor of all five Arabidopsis RAB-E proteins but not with other Rab subclasses residing at the Golgi or trans-Golgi network. AtPIP5K3 is a key regulator of root hair tip growth. AtPIP5K4 and AtPIP5K5 are type B PI4P 5-kinases expressed in pollen and have important functions in pollen germination and in pollen tube growth. AtPIP5K6 regulates clathrin-dependent endocytosis in pollen tubes. AtPIP5K9 interacts with a cytosolic invertase to negatively regulate sugar-mediated root growth."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in Arabidopsis thaliana phosphatidylinositol 4-phosphate 5-kinases (PIP5Ks) and similar proteins. PIP5K (EC 2.7.1.68), also known as PtdIns(4)P-5-kinase, or diphosphoinositide kinase, phosphorylates phosphatidylinositol-4-phosphate to produce phosphatidylinositol-4,5-bisphosphate as a precursor of two second messengers, inositol-1,4,5-triphosphate and diacylglycerol, and as a regulator of many cellular proteins involved in signal transduction and cytoskeletal organization. The family includes several PIP5Ks from Arabidopsis thaliana. AtPIP5K1 is involved in water-stress signal transduction. AtPIP5K2 acts as an interactor of all five Arabidopsis RAB-E proteins but not with other Rab subclasses residing at the Golgi or trans-Golgi network. AtPIP5K3 is a key regulator of root hair tip growth. AtPIP5K4 and AtPIP5K5 are type B PI4P 5-kinases expressed in pollen and have important functions in pollen germination and in pollen tube growth. AtPIP5K6 regulates clathrin-dependent endocytosis in pollen tubes. AtPIP5K9 interacts with a cytosolic invertase to negatively regulate sugar-mediated root growth. — an NCBI CDD conserved domain (cd17302); members share this curated model.
