identifier: CDD:cd02587
label: "5'(3')-deoxyribonucleotidase. This family includes cytosolic 5'(3')-deoxyribonucleotidase (cdN) and mitochondrial 5'(3')-deoxyribonucleotidase (mdN). cdN and mdN specifically dephosphorylate the deoxyribo form of nucleoside monophosphates helps maintain homeostasis of deoxynucleosides required for mitochondrial DNA synthesis. Their preferred substrates are dUMP and dTMP. cdN also dephosphorylates dGMP and dIMP efficiently. They can also dephosphorylate the 5'- or 3'-phosphates of pyrimidine ribonucleotides.  This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  5'(3')-deoxyribonucleotidase. This family includes cytosolic 5'(3')-deoxyribonucleotidase (cdN) and mitochondrial 5'(3')-deoxyribonucleotidase (mdN). cdN and mdN specifically dephosphorylate the deoxyribo form of nucleoside monophosphates helps maintain homeostasis of deoxynucleosides required for mitochondrial DNA synthesis. Their preferred substrates are dUMP and dTMP. cdN also dephosphorylates dGMP and dIMP efficiently. They can also dephosphorylate the 5'- or 3'-phosphates of pyrimidine ribonucleotides. This family belongs to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd02587); members share this curated model.
