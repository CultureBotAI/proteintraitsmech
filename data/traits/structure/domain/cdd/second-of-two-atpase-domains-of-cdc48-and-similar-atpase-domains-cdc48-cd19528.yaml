identifier: CDD:cd19528
label: "second of two ATPase domains of CDC48 and similar ATPase domains. CDC48 in yeast and p97 or VCP in metazoans is an ATP-dependent molecular chaperone which plays an essential role in many cellular processes, by segregating polyubiquitinated proteins from complexes or membranes. Cdc48/p97 consists of an N-terminal domain and two ATPase domains; this subfamily represents the second of the two ATPase domains. CDC48's roles include in the fragmentation of Golgi stacks during mitosis and for their reassembly after mitosis, and in the formation of the nuclear envelope, and of the transitional endoplasmic reticulum (tER). This RecA-like_cdc48_r2-like subfamily belongs to the RecA-like family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  second of two ATPase domains of CDC48 and similar ATPase domains. CDC48 in yeast and p97 or VCP in metazoans is an ATP-dependent molecular chaperone which plays an essential role in many cellular processes, by segregating polyubiquitinated proteins from complexes or membranes. Cdc48/p97 consists of an N-terminal domain and two ATPase domains; this subfamily represents the second of the two ATPase domains. CDC48's roles include in the fragmentation of Golgi stacks during mitosis and for their reassembly after mitosis, and in the formation of the nuclear envelope, and of the transitional endoplasmic reticulum (tER). This RecA-like_cdc48_r2-like subfamily belongs to the RecA-like family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19528); members share this curated model.
