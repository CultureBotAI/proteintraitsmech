identifier: CDD:cd05128
label: "Ras-GTPase Activating Domain of GAP1 and similar proteins. The GAP1 family of Ras GTPase-activating proteins includes GAP1(m) (or RASA2), GAP1_IP4BP (or RASA3), Ca2+ -promoted Ras inactivator (CAPRI, or RASAL4), and Ras GTPase activating-like proteins (RASAL) or RASAL1. The members are characterized by a conserved domain structure comprising N-terminal tandem C2 domains, a highly conserved central RasGAP domain, and a C-terminal pleckstrin homology domain that is associated with a Bruton's tyrosine kinase motif. While this domain structure is conserved, a small change in the function of each individual domain and the interaction between domains has a marked effect on the regulation of each protein."
definition: >-
