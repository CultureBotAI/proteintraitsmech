identifier: CDD:cd12148
label: "fungal transcription factor regulatory middle homology region. This domain is present in the large family of fungal zinc cluster transcription factors that contain an N-terminal GAL4-like C6 zinc binuclear cluster DNA-binding domain. Examples of members of this large fungal group are the following Saccharomyces cerevisiae transcription factors, GAL4, STB5, DAL81, CAT8, RDR1, HAL9, PUT3, PPR1, ASG1, RSF2, PIP2, as well as the C-terminal domain of the Cep3, a subunit of the yeast centromere-binding factor 3. It has been suggested that this region plays a regulatory role."
definition: >-
  fungal transcription factor regulatory middle homology region. This domain is present in the large family of fungal zinc cluster transcription factors that contain an N-terminal GAL4-like C6 zinc binuclear cluster DNA-binding domain. Examples of members of this large fungal group are the following Saccharomyces cerevisiae transcription factors, GAL4, STB5, DAL81, CAT8, RDR1, HAL9, PUT3, PPR1, ASG1, RSF2, PIP2, as well as the C-terminal domain of the Cep3, a subunit of the yeast centromere-binding factor 3. It has been suggested that this region plays a regulatory role. — an NCBI CDD conserved domain (cd12148); members share this curated model.
