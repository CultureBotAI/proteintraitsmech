identifier: CDD:cd09326
label: "The LIM domains of Cysteine Rich Protein (CRP) family. The LIM domains of Cysteine Rich Protein (CRP) family: Cysteine-rich proteins (CRPs) are characterized by the presence of two LIM domains linked to a short glycine-rich repeats (GRRs). The known CRP family members include CRP1, CRP2, and CRP3/MLP. CRP1, CRP2 and CRP3 share a conserved nuclear targeting signal (K/R-K/R-Y-G-P-K), which supports the fact that these proteins function not only in the cytoplasm but also in the nucleus. CRPs control regulatory pathways during cellular differentiation, and involve in complex transcription control, and the organization as well as the arrangement of the myofibrillar/cytoskeletal network. CRP1, CRP2, and CRP3/MLP are involved in promoting protein assembly along the actin-based cytoskeleton. All LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
