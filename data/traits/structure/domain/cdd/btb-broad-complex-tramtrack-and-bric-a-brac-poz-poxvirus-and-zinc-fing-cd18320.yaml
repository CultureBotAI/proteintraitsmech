identifier: CDD:cd18320
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch repeat and BTB domain-containing protein 13 (KBTBD13). KBTBD13 is a muscle specific protein. Its autosomal dominant mutations may cause Nemaline Myopathy (NEM). KBTBD13 may act as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that functions as a muscle specific ubiquitin ligase, and thereby implicating the ubiquitin proteasome pathway in the pathogenesis of KBTBD13-associated NEM. KBTBD13 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch repeat and BTB domain-containing protein 13 (KBTBD13). KBTBD13 is a muscle specific protein. Its autosomal dominant mutations may cause Nemaline Myopathy (NEM). KBTBD13 may act as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that functions as a muscle specific ubiquitin ligase, and thereby implicating the ubiquitin proteasome pathway in the pathogenesis of KBTBD13-associated NEM. KBTBD13 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18320); members share this curated model.
