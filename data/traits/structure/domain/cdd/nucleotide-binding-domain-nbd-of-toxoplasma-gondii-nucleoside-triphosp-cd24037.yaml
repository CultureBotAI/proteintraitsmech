identifier: CDD:cd24037
label: "nucleotide-binding domain (NBD) of Toxoplasma gondii nucleoside triphosphate hydrolase (NTPase) isoforms and similar proteins. The family corresponds a group of proteins similar to Toxoplasma gondii nucleoside triphosphate hydrolase (NTPase) isoforms, NTPase-I and NTPase-II.  NTPase (EC 3.6.1.15), also called nucleoside-triphosphatase, may perform an important processing step in the conversion of high energy nucleotides prior to uptake by the parasite and may contribute to intracellular survival and virulence. NTPAse-I has a specific activity 4.5-fold higher than NTPAse-II in hydrolysis of ATP. The primary difference between these isozymes lies in their ability to hydrolyze nucleoside triphosphate versus diphosphate substrates. While NTPAse-II hydrolyzes ATP to ADP and ADP to AMP at almost the same rate, NTPAse-I hydrolyzes ADP to AMP at a much slower rate (0.7% of the rate for ATP)."
definition: >-
  nucleotide-binding domain (NBD) of Toxoplasma gondii nucleoside triphosphate hydrolase (NTPase) isoforms and similar proteins. The family corresponds a group of proteins similar to Toxoplasma gondii nucleoside triphosphate hydrolase (NTPase) isoforms, NTPase-I and NTPase-II. NTPase (EC 3.6.1.15), also called nucleoside-triphosphatase, may perform an important processing step in the conversion of high energy nucleotides prior to uptake by the parasite and may contribute to intracellular survival and virulence. NTPAse-I has a specific activity 4.5-fold higher than NTPAse-II in hydrolysis of ATP. The primary difference between these isozymes lies in their ability to hydrolyze nucleoside triphosphate versus diphosphate substrates. While NTPAse-II hydrolyzes ATP to ADP and ADP to AMP at almost the same rate, NTPAse-I hydrolyzes ADP to AMP at a much slower rate (0.7% of the rate for ATP). — an NCBI CDD conserved domain (cd24037); members share this curated model.
