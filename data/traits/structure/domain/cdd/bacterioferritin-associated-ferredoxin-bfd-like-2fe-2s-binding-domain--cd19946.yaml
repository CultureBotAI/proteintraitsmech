identifier: CDD:cd19946
label: "bacterioferritin-associated ferredoxin (BFD)-like [2Fe-2S]-binding domain of anaerobic glycerol 3-phosphate dehydrogenase subunit A, hydrogen cyanide synthase subunit B, and similar proteins. This subgroup includes the BFD-like [2Fe-2S]-binding domains of subunits of various component dehydrogenase/oxidases, including anaerobic glycerol 3-phosphate dehydrogenase subunit A of GlpABC, hydrogen cyanide synthase subunit HcnB of HcnABC, octopine oxidase subunit A of OoxAB, and nopaline oxidase subunit A of NoxAB. GlpABC catalyzes the conversion of glycerol 3-phosphate to dihydroxyacetone, and participates in the glycerol degradation by glycerol kinase pathway in step 1 of the sub-pathway that synthesizes glycerone phosphate from sn-glycerol 3-phosphate (anaerobic route). HcnABC oxidizes glycine producing hydrogen cyanide and CO2. In Agrobacterium spp, the first enzymic step in the catabolic utilization of octopine and nopaline is the oxidative cleavage into L-arginine and pyruvate or 2-ketoglutarate, respectively; nopaline oxidase (NoxAB) accepts nopaline and octopine while octopine oxidase (OoaB) has high activity with octopine but barely detectable activity with nopaline, both subunits possibly contributing to the substrate specificity. The BFD-like [2Fe-2S]-binding domain is found in a variety of other proteins including bacterioferritin-associated ferredoxin (BFD), the large subunit of NADH-dependent nitrite reductase, and Cu+ chaperone CopZ. It comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. For the class of proteins having a BFD-like [2Fe-2S]-binding domain, the Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport."
definition: >-
  bacterioferritin-associated ferredoxin (BFD)-like [2Fe-2S]-binding domain of anaerobic glycerol 3-phosphate dehydrogenase subunit A, hydrogen cyanide synthase subunit B, and similar proteins. This subgroup includes the BFD-like [2Fe-2S]-binding domains of subunits of various component dehydrogenase/oxidases, including anaerobic glycerol 3-phosphate dehydrogenase subunit A of GlpABC, hydrogen cyanide synthase subunit HcnB of HcnABC, octopine oxidase subunit A of OoxAB, and nopaline oxidase subunit A of NoxAB. GlpABC catalyzes the conversion of glycerol 3-phosphate to dihydroxyacetone, and participates in the glycerol degradation by glycerol kinase pathway in step 1 of the sub-pathway that synthesizes glycerone phosphate from sn-glycerol 3-phosphate (anaerobic route). HcnABC oxidizes glycine producing hydrogen cyanide and CO2. In Agrobacterium spp, the first enzymic step in the catabolic utilization of octopine and nopaline is the oxidative cleavage into L-arginine and pyruvate or 2-ketoglutarate, respectively; nopaline oxidase (NoxAB) accepts nopaline and octopine while octopine oxidase (OoaB) has high activity with octopine but barely detectable activity with nopaline, both subunits possibly contributing to the substrate specificity. The BFD-like [2Fe-2S]-binding domain is found in a variety of other proteins including bacterioferritin-associated ferredoxin (BFD), the large subunit of NADH-dependent nitrite reductase, and Cu+ chaperone CopZ. It comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. For the class of proteins having a BFD-like [2Fe-2S]-binding domain, the Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport. — an NCBI CDD conserved domain (cd19946); members share this curated model.
