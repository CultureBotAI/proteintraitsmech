identifier: CDD:cd13988
label: "Catalytic domain of the Serine/Threonine kinase, TANK Binding Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TBK1 is also called T2K and NF-kB-activating kinase. It is widely expressed in most cell types and acts as an IkappaB kinase (IKK)-activating kinase responsible for NF-kB activation in response to growth factors. It plays a role in modulating inflammatory responses through the NF-kB pathway. TKB1 is also a major player in innate immune responses since it functions as a virus-activated kinase necessary for establishing an antiviral state. It phosphorylates IRF-3 and IRF-7, which are important transcription factors for inducing type I interferon during viral infection. In addition, TBK1 may also play roles in cell transformation and oncogenesis. The TBK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, TANK Binding Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TBK1 is also called T2K and NF-kB-activating kinase. It is widely expressed in most cell types and acts as an IkappaB kinase (IKK)-activating kinase responsible for NF-kB activation in response to growth factors. It plays a role in modulating inflammatory responses through the NF-kB pathway. TKB1 is also a major player in innate immune responses since it functions as a virus-activated kinase necessary for establishing an antiviral state. It phosphorylates IRF-3 and IRF-7, which are important transcription factors for inducing type I interferon during viral infection. In addition, TBK1 may also play roles in cell transformation and oncogenesis. The TBK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13988); members share this curated model.
