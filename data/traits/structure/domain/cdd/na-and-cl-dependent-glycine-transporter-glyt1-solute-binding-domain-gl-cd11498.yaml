identifier: CDD:cd11498
label: "Na(+)- and Cl(-)-dependent glycine transporter GlyT1; solute-binding domain. GlyT1 is a membrane-bound transporter that re-uptakes glycine from the synaptic cleft. Human GlyT1 is encoded by the SLC6A9 gene. GlyT1 is expressed in brain, pancreas, uterus, stomach, spleen, liver, and retina. GlyT1 may play a role in schizophrenia. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent glycine transporter GlyT1; solute-binding domain. GlyT1 is a membrane-bound transporter that re-uptakes glycine from the synaptic cleft. Human GlyT1 is encoded by the SLC6A9 gene. GlyT1 is expressed in brain, pancreas, uterus, stomach, spleen, liver, and retina. GlyT1 may play a role in schizophrenia. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11498); members share this curated model.
