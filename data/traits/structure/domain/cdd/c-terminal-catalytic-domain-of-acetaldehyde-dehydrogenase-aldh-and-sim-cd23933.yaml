identifier: CDD:cd23933
label: "C-terminal catalytic domain of acetaldehyde dehydrogenase (ALDH) and similar proteins. Acetaldehyde dehydrogenase (ALDH; EC 1.2.1.10), also called acetaldehyde dehydrogenase (acetylating), acylating acetaldehyde dehydrogenase, or aldehyde dehydrogenase (acylating), catalyzes the conversion of acetaldehyde to acetyl-CoA, using NAD(+) and coenzyme A. It can also act on propanal and butanal to form propanoyl-CoA and butanoyl-CoA, respectively. ALDH is the final enzyme in the meta-cleavage pathway for the degradation of aromatic compounds such as phenols, cresols and catechols. NADP(+) can replace NAD(+) but the rate of reaction is much slower. ALDH contains two domains, an N-terminal Rossmann fold NAD+-binding domain and a C-terminal dimerization domain, which mediates dimerisation of the protein. The C-terminal dimerization domain is homologs to C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain. ALDHs are members of the GAPDH superfamily of proteins."
definition: >-
  C-terminal catalytic domain of acetaldehyde dehydrogenase (ALDH) and similar proteins. Acetaldehyde dehydrogenase (ALDH; EC 1.2.1.10), also called acetaldehyde dehydrogenase (acetylating), acylating acetaldehyde dehydrogenase, or aldehyde dehydrogenase (acylating), catalyzes the conversion of acetaldehyde to acetyl-CoA, using NAD(+) and coenzyme A. It can also act on propanal and butanal to form propanoyl-CoA and butanoyl-CoA, respectively. ALDH is the final enzyme in the meta-cleavage pathway for the degradation of aromatic compounds such as phenols, cresols and catechols. NADP(+) can replace NAD(+) but the rate of reaction is much slower. ALDH contains two domains, an N-terminal Rossmann fold NAD+-binding domain and a C-terminal dimerization domain, which mediates dimerisation of the protein. The C-terminal dimerization domain is homologs to C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain. ALDHs are members of the GAPDH superfamily of proteins. — an NCBI CDD conserved domain (cd23933); members share this curated model.
