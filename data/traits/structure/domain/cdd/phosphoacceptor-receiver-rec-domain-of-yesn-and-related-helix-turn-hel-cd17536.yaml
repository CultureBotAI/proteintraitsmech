identifier: CDD:cd17536
label: "phosphoacceptor receiver (REC) domain of YesN and related helix-turn-helix containing response regulators. This family is composed of uncharacterized response regulators that contain a REC domain and a AraC family helix-turn-helix (HTH) DNA-binding output domain, including Bacillus subtilis uncharacterized transcriptional regulatory protein YesN and Staphylococcus aureus uncharacterized response regulatory protein SAR0214. YesN is a member of the two-component regulatory system YesM/YesN and SAR0214 is a member of the probable two-component regulatory system SAR0215/SAR0214. Also included in this family is the AlgR-like group of LytTR/AlgR family response, which includes Pseudomonas aeruginosa positive alginate biosynthesis regulatory protein AlgR and Bacillus subtilis sensory transduction protein LytT, among others. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of YesN and related helix-turn-helix containing response regulators. This family is composed of uncharacterized response regulators that contain a REC domain and a AraC family helix-turn-helix (HTH) DNA-binding output domain, including Bacillus subtilis uncharacterized transcriptional regulatory protein YesN and Staphylococcus aureus uncharacterized response regulatory protein SAR0214. YesN is a member of the two-component regulatory system YesM/YesN and SAR0214 is a member of the probable two-component regulatory system SAR0215/SAR0214. Also included in this family is the AlgR-like group of LytTR/AlgR family response, which includes Pseudomonas aeruginosa positive alginate biosynthesis regulatory protein AlgR and Bacillus subtilis sensory transduction protein LytT, among others. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17536); members share this curated model.
