identifier: CDD:cd21949
label: "trimerization domain of echinoderm microtubule-associated protein-like 3. Echinoderm microtubule-associated protein-like 3 (EMAP-3), also called EML3, is a nuclear microtubule-binding protein required for the correct alignment of chromosomes in metaphase. It may modify the assembly dynamics of microtubules, such that microtubules are slightly longer, but more dynamic. This model corresponds to a conserved region located at the N-terminus of EMAP-3, which shows high sequence similarity with the N-terminal trimerization domain of EMAP-2 and EMAP-4."
definition: >-
  trimerization domain of echinoderm microtubule-associated protein-like 3. Echinoderm microtubule-associated protein-like 3 (EMAP-3), also called EML3, is a nuclear microtubule-binding protein required for the correct alignment of chromosomes in metaphase. It may modify the assembly dynamics of microtubules, such that microtubules are slightly longer, but more dynamic. This model corresponds to a conserved region located at the N-terminus of EMAP-3, which shows high sequence similarity with the N-terminal trimerization domain of EMAP-2 and EMAP-4. — an NCBI CDD conserved domain (cd21949); members share this curated model.
