identifier: CDD:cd00422
label: "Arylamine N-acetyltransferases (NATs) are a family of cytosolic enzymes that N-acetylate arylhydrazines and arylamine through transfer of an acetyl group from acetyl coenzyme A (CoA).  Acetylation of these compounds generally results in inactivation. NAT is found in many species from E.coli to human. It was the first enzyme to be observed to have polymorphic activity amongst human individuals. The NAT protein has also been shown to be involved in the breakdown of folic acid."
definition: >-
  Arylamine N-acetyltransferases (NATs) are a family of cytosolic enzymes that N-acetylate arylhydrazines and arylamine through transfer of an acetyl group from acetyl coenzyme A (CoA). Acetylation of these compounds generally results in inactivation. NAT is found in many species from E.coli to human. It was the first enzyme to be observed to have polymorphic activity amongst human individuals. The NAT protein has also been shown to be involved in the breakdown of folic acid. — an NCBI CDD conserved domain (cd00422); members share this curated model.
