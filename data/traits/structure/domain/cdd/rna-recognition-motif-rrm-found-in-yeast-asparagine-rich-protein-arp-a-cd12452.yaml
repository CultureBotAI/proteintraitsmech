identifier: CDD:cd12452
label: "RNA recognition motif (RRM) found in yeast asparagine-rich protein (ARP) and similar proteins. This subfamily corresponds to the RRM of ARP, also termed NRP1, encoded by Saccharomyces cerevisiae YDL167C. Although its exact biological function remains unclear, ARP contains an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), two Ran-binding protein zinc fingers (zf-RanBP), and an asparagine-rich region. It may possess RNA-binding and zinc ion binding activities. Additional research had indicated that ARP may function as a factor involved in the stress response."
definition: >-
  RNA recognition motif (RRM) found in yeast asparagine-rich protein (ARP) and similar proteins. This subfamily corresponds to the RRM of ARP, also termed NRP1, encoded by Saccharomyces cerevisiae YDL167C. Although its exact biological function remains unclear, ARP contains an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), two Ran-binding protein zinc fingers (zf-RanBP), and an asparagine-rich region. It may possess RNA-binding and zinc ion binding activities. Additional research had indicated that ARP may function as a factor involved in the stress response. — an NCBI CDD conserved domain (cd12452); members share this curated model.
