identifier: CDD:cd23141
label: "RING finger, HC subclass, found in Arabidopsis thaliana protein ariadne homolog 6 (ARI6) and similar proteins. This subfamily includes ARI6 and ARI11. They might act as E3 ubiquitin-protein ligases, or as part of E3 complexes, which accept ubiquitin from specific E2 ubiquitin-conjugating enzymes and then transfer it to substrates. Members of this subfamily contain a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana protein ariadne homolog 6 (ARI6) and similar proteins. This subfamily includes ARI6 and ARI11. They might act as E3 ubiquitin-protein ligases, or as part of E3 complexes, which accept ubiquitin from specific E2 ubiquitin-conjugating enzymes and then transfer it to substrates. Members of this subfamily contain a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23141); members share this curated model.
