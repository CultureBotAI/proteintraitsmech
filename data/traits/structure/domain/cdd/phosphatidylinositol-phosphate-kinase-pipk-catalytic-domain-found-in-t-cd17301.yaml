identifier: CDD:cd17301
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in type I phosphatidylinositol 4-phosphate (PtdIns(4)P) 5-kinases (PIP5KI) and similar proteins. PIP5KIs, also known as PIPKIs, or PI4P5KIs, phosphorylate the head group of phosphatidylinositol 4-phosphate (PtdIns4P) to generate phosphatidylinositol 4,5-bisphosphate (PtdIns4,5P2), an essential lipid molecule in various cellular processes. Three distinct PIP5KIs have been characterized in erythrocytes, PIP5K1alpha, PIP5K1beta, and PIP5K1gamma isoforms."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in type I phosphatidylinositol 4-phosphate (PtdIns(4)P) 5-kinases (PIP5KI) and similar proteins. PIP5KIs, also known as PIPKIs, or PI4P5KIs, phosphorylate the head group of phosphatidylinositol 4-phosphate (PtdIns4P) to generate phosphatidylinositol 4,5-bisphosphate (PtdIns4,5P2), an essential lipid molecule in various cellular processes. Three distinct PIP5KIs have been characterized in erythrocytes, PIP5K1alpha, PIP5K1beta, and PIP5K1gamma isoforms. — an NCBI CDD conserved domain (cd17301); members share this curated model.
