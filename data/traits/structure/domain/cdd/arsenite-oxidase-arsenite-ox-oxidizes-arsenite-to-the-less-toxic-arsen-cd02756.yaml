identifier: CDD:cd02756
label: "Arsenite oxidase (Arsenite-Ox) oxidizes arsenite to the less toxic arsenate; it transfers the electrons obtained from the oxidation of arsenite towards the soluble periplasmic electron carriers cytochrome c and/or amicyanin.  Arsenite oxidase is a heterodimeric enzyme containing a large and a small subunit. The large catalytic subunit harbors the molybdopterin cofactor and the [3Fe-4S] cluster; and the small subunit belongs to the structural class of the Rieske proteins. The small subunit is not included in this alignment. Members of MopB_Arsenite-Ox CD belong to the molybdopterin_binding (MopB) superfamily of proteins."
definition: >-
  Arsenite oxidase (Arsenite-Ox) oxidizes arsenite to the less toxic arsenate; it transfers the electrons obtained from the oxidation of arsenite towards the soluble periplasmic electron carriers cytochrome c and/or amicyanin. Arsenite oxidase is a heterodimeric enzyme containing a large and a small subunit. The large catalytic subunit harbors the molybdopterin cofactor and the [3Fe-4S] cluster; and the small subunit belongs to the structural class of the Rieske proteins. The small subunit is not included in this alignment. Members of MopB_Arsenite-Ox CD belong to the molybdopterin_binding (MopB) superfamily of proteins. — an NCBI CDD conserved domain (cd02756); members share this curated model.
