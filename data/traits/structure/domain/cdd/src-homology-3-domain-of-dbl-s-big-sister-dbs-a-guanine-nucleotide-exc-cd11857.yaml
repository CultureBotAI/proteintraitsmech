identifier: CDD:cd11857
label: "Src homology 3 domain of DBL's Big Sister (DBS), a guanine nucleotide exchange factor. DBS, also called MCF2L (MCF2-transforming sequence-like protein) or OST, is a Rho GTPase guanine nucleotide exchange factor (RhoGEF), facilitating the exchange of GDP and GTP. It was originally isolated from a cDNA screen for sequences that cause malignant growth. It plays roles in regulating clathrin-mediated endocytosis and cell migration through its activation of Rac1 and Cdc42. Depending on cell type, DBS can also activate RhoA and RhoG. DBS contains a Sec14-like domain, spectrin-like repeats, a RhoGEF [or Dbl homology (DH)] domain, a Pleckstrin homology (PH) domain, and an SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of DBL's Big Sister (DBS), a guanine nucleotide exchange factor. DBS, also called MCF2L (MCF2-transforming sequence-like protein) or OST, is a Rho GTPase guanine nucleotide exchange factor (RhoGEF), facilitating the exchange of GDP and GTP. It was originally isolated from a cDNA screen for sequences that cause malignant growth. It plays roles in regulating clathrin-mediated endocytosis and cell migration through its activation of Rac1 and Cdc42. Depending on cell type, DBS can also activate RhoA and RhoG. DBS contains a Sec14-like domain, spectrin-like repeats, a RhoGEF [or Dbl homology (DH)] domain, a Pleckstrin homology (PH) domain, and an SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11857); members share this curated model.
