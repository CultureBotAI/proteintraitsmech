label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 16 (BTBD16). BTBD16 is a BTB-domain-containing Kelch-like protein. Its function remains unclear. BTBD16 SNPs may be bipolar disorder (BD) genetic susceptibility variants exhibiting genetic background-dependent effects."
