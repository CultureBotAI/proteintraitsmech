identifier: CDD:cd04794
label: "Eukaryotic Lanthionine synthetase C-like protein. This family contains the lanthionine synthetase C-like proteins 1 and 2 which are related to the bacterial lanthionine synthetase components C (LanC). LANCL1 and LANCL2 (testes-specific adriamycin sensitivity protein) were thought to be peptide-modifying enzyme components in eukaryotic cells. Both proteins are produced in large quantities in the brain and testes and may have role in the immune surveillance of these organs. More recently, they have been associated with signal transduction processes and insulin sensitization. In particular, LANCL2 has been shown to bind abscisic acid (ABA), and this interaction may play a role in signaling pathways triggered by ABA, such as in human granulocytes and rat insulinoma cells. This eukaryotic LANCL family also includes Arabidopsis GCR2."
definition: >-
  Eukaryotic Lanthionine synthetase C-like protein. This family contains the lanthionine synthetase C-like proteins 1 and 2 which are related to the bacterial lanthionine synthetase components C (LanC). LANCL1 and LANCL2 (testes-specific adriamycin sensitivity protein) were thought to be peptide-modifying enzyme components in eukaryotic cells. Both proteins are produced in large quantities in the brain and testes and may have role in the immune surveillance of these organs. More recently, they have been associated with signal transduction processes and insulin sensitization. In particular, LANCL2 has been shown to bind abscisic acid (ABA), and this interaction may play a role in signaling pathways triggered by ABA, such as in human granulocytes and rat insulinoma cells. This eukaryotic LANCL family also includes Arabidopsis GCR2. — an NCBI CDD conserved domain (cd04794); members share this curated model.
