identifier: CDD:cd21642
label: "ORF8 immunoglobulin (Ig) domain protein of bat coronavirus Rf1, a type II ORF8, and related proteins. This subfamily includes the ORF8 immunoglobulin (Ig) domain proteins of bat coronavirus Rf1 (Bat SARS CoV Rf1) and Bat CoV 273/2005, which have been classified previously as type II ORF8 proteins. They belong to a family which includes the ORF8 immunoglobulin (Ig) domain protein of Severe acute respiratory syndrome (SARS) coronavirus 2 (SARS-CoV-2, also known as a 2019 novel coronavirus, 2019-nCoV) and other related Sarbecovirus ORF8's, such as Bat SARS coronavirus HKU3-1 ORF8 which has been classified previously as a type III ORF8. SARS-CoV-2 causes the disease called \"coronavirus disease 2019\" (COVID-19). SARS-CoV-2 ORF8 protein (also known as ns8 and accessory protein 8) is a fast-evolving protein in SARS-related CoVs, and a potential pathogenicity factor which evolves rapidly to counter the immune response and facilitate the transmission between hosts. A 382 nucleotide deletion in SARS-CoV-2 ORF8 was found to correlate with milder disease and a lower incidence of hypoxia. SARS-CoV-2 ORF8 interacts with a variety of host proteins, including many factors involved in ERAD. It disrupts IFN-I signaling when exogenously overexpressed in cells, and downregulates MHC-I. In most SARS-CoVs, ORF8 is split into overlapping ORF8a and ORF8b proteins; the N- and C-terminus of SARS-CoV-2 ORF8 is similar to SARS-CoV ORF8a and ORF8b, respectively."
definition: >-
  ORF8 immunoglobulin (Ig) domain protein of bat coronavirus Rf1, a type II ORF8, and related proteins. This subfamily includes the ORF8 immunoglobulin (Ig) domain proteins of bat coronavirus Rf1 (Bat SARS CoV Rf1) and Bat CoV 273/2005, which have been classified previously as type II ORF8 proteins. They belong to a family which includes the ORF8 immunoglobulin (Ig) domain protein of Severe acute respiratory syndrome (SARS) coronavirus 2 (SARS-CoV-2, also known as a 2019 novel coronavirus, 2019-nCoV) and other related Sarbecovirus ORF8's, such as Bat SARS coronavirus HKU3-1 ORF8 which has been classified previously as a type III ORF8. SARS-CoV-2 causes the disease called "coronavirus disease 2019" (COVID-19). SARS-CoV-2 ORF8 protein (also known as ns8 and accessory protein 8) is a fast-evolving protein in SARS-related CoVs, and a potential pathogenicity factor which evolves rapidly to counter the immune response and facilitate the transmission between hosts. A 382 nucleotide deletion in SARS-CoV-2 ORF8 was found to correlate with milder disease and a lower incidence of hypoxia. SARS-CoV-2 ORF8 interacts with a variety of host proteins, including many factors involved in ERAD. It disrupts IFN-I signaling when exogenously overexpressed in cells, and downregulates MHC-I. In most SARS-CoVs, ORF8 is split into overlapping ORF8a and ORF8b proteins; the N- and C-terminus of SARS-CoV-2 ORF8 is similar to SARS-CoV ORF8a and ORF8b, respectively. — an NCBI CDD conserved domain (cd21642); members share this curated model.
