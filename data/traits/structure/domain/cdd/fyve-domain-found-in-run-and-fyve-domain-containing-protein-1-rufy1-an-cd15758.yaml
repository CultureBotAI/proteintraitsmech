identifier: CDD:cd15758
label: "FYVE domain found in RUN and FYVE domain-containing protein 1 (RUFY1) and similar proteins. RUFY1, also termed FYVE-finger protein EIP1, or La-binding protein 1, or Rab4-interacting protein (Rabip4), or Zinc finger FYVE domain-containing protein 12 (ZFY12), a human homologue of mouse Rabip4, an effector of Rab4 GTPase that regulates recycling of endocytosed cargo. RUFY1 is an endosomal protein that functions as a dual effector of Rab4 and Rab14 and is involved in efficient recycling of transferrin (Tfn). It is a downstream effector of Etk, a downstream tyrosine kinase of PI3-kinase that is involved in regulation of vesicle trafficking. RUFY1 contains an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between."
definition: >-
  FYVE domain found in RUN and FYVE domain-containing protein 1 (RUFY1) and similar proteins. RUFY1, also termed FYVE-finger protein EIP1, or La-binding protein 1, or Rab4-interacting protein (Rabip4), or Zinc finger FYVE domain-containing protein 12 (ZFY12), a human homologue of mouse Rabip4, an effector of Rab4 GTPase that regulates recycling of endocytosed cargo. RUFY1 is an endosomal protein that functions as a dual effector of Rab4 and Rab14 and is involved in efficient recycling of transferrin (Tfn). It is a downstream effector of Etk, a downstream tyrosine kinase of PI3-kinase that is involved in regulation of vesicle trafficking. RUFY1 contains an N-terminal RUN domain and a C-terminal FYVE domain with two coiled-coil domains in-between. — an NCBI CDD conserved domain (cd15758); members share this curated model.
