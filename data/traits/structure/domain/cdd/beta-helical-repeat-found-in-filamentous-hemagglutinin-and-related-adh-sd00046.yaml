identifier: CDD:sd00046
label: "beta-helical repeat found in filamentous hemagglutinin and related adhesins and CdiA family proteins. This model contains ten copies of an approximately 20-residue repeat found in two-partner secretion (TPS) proteins, including the filamentous hemagglutinin (FHA) family of adhesins and CdiA family proteins. These repeats form a right-handed beta-helical structure, and are found in large secreted proteins from a number of plant and animal pathogens. FHA family adhesins bind to various types of cells and may contribute to attachment, aggregation, and pathogenesis. CdiA proteins are involved in contact-dependent growth inhibition (CDI)."
definition: >-
