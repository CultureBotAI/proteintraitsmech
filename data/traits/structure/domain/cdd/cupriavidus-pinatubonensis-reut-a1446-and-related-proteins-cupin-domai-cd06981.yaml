identifier: CDD:cd06981
label: "Cupriavidus pinatubonensis reut_a1446 and related proteins, cupin domain. This family includes bacterial and some eukaryotic proteins homologous to reut_a1446, a Cupriavidus pinatubonensis protein of unknown function that may be related to mannose-6-phosphate isomerase. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Cupriavidus pinatubonensis reut_a1446 and related proteins, cupin domain. This family includes bacterial and some eukaryotic proteins homologous to reut_a1446, a Cupriavidus pinatubonensis protein of unknown function that may be related to mannose-6-phosphate isomerase. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06981); members share this curated model.
