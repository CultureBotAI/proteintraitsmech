identifier: CDD:cd07507
label: "haloacid dehalogenase-like superfamily phosphatase similar to Pyrococcus horikoshii mannosyl-3-phosphoglycerate phosphatase and Persephonella marina glucosyl-3-phosphoglycerate phosphatase. This family includes Pyrococcus horikoshii and Thermus thermophilus HB27 mannosyl-3-phosphoglycerate phosphatases (MpgPs) which catalyze the dephosphorylation of alpha-mannosyl-3-phosphoglycerate (MPG) to produce alpha-mannosylglycerate (MG), and Persephonella marina glucosyl-3-phosphoglycerate phosphatase (GpgP) which catalyzes the dephosphorylation of glucosyl-3-phosphoglycerate (GPG) to produce glucosylglycerate (GG). It also includes Methanococcoides burtonii MpgP protein which is able to dephosphorylate GPG to GG, and MPG to MG. Similar flexibilities in substrate specificity have been confirmed in vitro for the MpgPs from Thermus thermophiles and Pyrococcus horikoshii. Screens with natural substrates have not yet detected activity for another member Escherichia Coli YedP. Members of this family belong to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
