identifier: CDD:cd20658
label: "cytochrome P450 family 79. Cytochrome P450 family 79 (CYP79) enzymes catalyze the first committed step in the biosynthesis of the core structure of glucosinolates, the conversion of amino acids to the corresponding aldoximes. Glucosinolates are amino acid-derived natural plant products that function in the defense against herbivores and microorganisms. Arabidopsis thaliana contains seven family members: CYP79B2 and CYP79B3, which metabolize trytophan; CYP79F1 and CYP79F2, which metabolize chain-elongated methionine derivatives with respectively 1-6 or 5-6 additional methylene groups in the side chain; CYP79A2 that metabolizes phenylalanine; and CYP79C1 and CYP79C2, with unknown function. CYP79 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 79. Cytochrome P450 family 79 (CYP79) enzymes catalyze the first committed step in the biosynthesis of the core structure of glucosinolates, the conversion of amino acids to the corresponding aldoximes. Glucosinolates are amino acid-derived natural plant products that function in the defense against herbivores and microorganisms. Arabidopsis thaliana contains seven family members: CYP79B2 and CYP79B3, which metabolize trytophan; CYP79F1 and CYP79F2, which metabolize chain-elongated methionine derivatives with respectively 1-6 or 5-6 additional methylene groups in the side chain; CYP79A2 that metabolizes phenylalanine; and CYP79C1 and CYP79C2, with unknown function. CYP79 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20658); members share this curated model.
