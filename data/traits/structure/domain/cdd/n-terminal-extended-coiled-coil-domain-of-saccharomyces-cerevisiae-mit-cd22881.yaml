identifier: CDD:cd22881
label: "N-terminal extended coiled-coil domain of Saccharomyces cerevisiae mitochondrial division protein 1 (Mdv1) and similar proteins. Mdv1, also known as mitochondrial fission 2 protein (FIS2), GAG3, or NET2, is involved in the mitochondrial fission machinery of the yeast Saccharomyces cerevisiae. Together with Fis1 and Dnm1, Mdv1 is an essential component of the machinery that mediates mitochondrial fission, a process crucial for mitochondrial maintenance and function. Mdv1 is an adapter protein that binds Fis1 and Dnm1 to form mitochondrial fission complexes, which facilitate the constriction and fission of the mitochondrial compartment during the late stages of mitochondrial division. Mdv1 works together with Caf4 to recruit Dnm1 to Fis1 on the mitochondrial outer membrane. Mdv1 protein has three domains: N-terminal extension, central coiled coil (CC), and C-terminal WD40 repeat region. The N-terminal extension binds to Fis1, while the CC domain facilitates dimerization of Mdv1 and is responsible for the recruitment of Dnm1 to the mitochondrial membrane. Both are included in this model. The C-terminal WD40 repeat region binds to Dnm1."
definition: >-
  N-terminal extended coiled-coil domain of Saccharomyces cerevisiae mitochondrial division protein 1 (Mdv1) and similar proteins. Mdv1, also known as mitochondrial fission 2 protein (FIS2), GAG3, or NET2, is involved in the mitochondrial fission machinery of the yeast Saccharomyces cerevisiae. Together with Fis1 and Dnm1, Mdv1 is an essential component of the machinery that mediates mitochondrial fission, a process crucial for mitochondrial maintenance and function. Mdv1 is an adapter protein that binds Fis1 and Dnm1 to form mitochondrial fission complexes, which facilitate the constriction and fission of the mitochondrial compartment during the late stages of mitochondrial division. Mdv1 works together with Caf4 to recruit Dnm1 to Fis1 on the mitochondrial outer membrane. Mdv1 protein has three domains: N-terminal extension, central coiled coil (CC), and C-terminal WD40 repeat region. The N-terminal extension binds to Fis1, while the CC domain facilitates dimerization of Mdv1 and is responsible for the recruitment of Dnm1 to the mitochondrial membrane. Both are included in this model. The C-terminal WD40 repeat region binds to Dnm1. — an NCBI CDD conserved domain (cd22881); members share this curated model.
