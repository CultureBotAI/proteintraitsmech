identifier: CDD:cd08781
label: "Death domain found in Uncoordinated-5 homolog family. Death Domain (DD) found in Uncoordinated-5 (UNC-5) homolog family, which includes Unc5A, B, C and D in vertebrates. UNC5 proteins are receptors for secreted netrins (netrin-1, -3 and -4) that are involved in diverse processes like axonal guidance, neuronal migration, blood vessel patterning, and apoptosis. They are transmembrane proteins with an extracellular domain consisting of two immunoglobulin repeats, two thrombospondin type-I modules and an intracellular region containing a ZU-5 domain, UPA domain and a DD. In general, DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Death domain found in Uncoordinated-5 homolog family. Death Domain (DD) found in Uncoordinated-5 (UNC-5) homolog family, which includes Unc5A, B, C and D in vertebrates. UNC5 proteins are receptors for secreted netrins (netrin-1, -3 and -4) that are involved in diverse processes like axonal guidance, neuronal migration, blood vessel patterning, and apoptosis. They are transmembrane proteins with an extracellular domain consisting of two immunoglobulin repeats, two thrombospondin type-I modules and an intracellular region containing a ZU-5 domain, UPA domain and a DD. In general, DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08781); members share this curated model.
