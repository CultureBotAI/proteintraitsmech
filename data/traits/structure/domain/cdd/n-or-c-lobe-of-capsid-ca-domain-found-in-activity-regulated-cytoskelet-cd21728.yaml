identifier: CDD:cd21728
label: "N- or C-lobe of capsid (CA) domain found in activity-regulated cytoskeleton-associated protein (Arc) and similar proteins. Arc, also called activity-regulated gene 3.1 protein (Arg3.1), is a flexible modular protein capable of reversible self-oligomerization. It is released from neurons in extracellular vesicles and regulates synaptic plasticity that self-assembles into virion-like capsids that encapsulate RNAs and mediate intercellular RNA transfer in the nervous system. Arc displays a bi-lobar configuration which exhibits homology to the capsid-forming Gag proteins from retroviruses, suggesting that Arc originated from the Ty3/Gypsy retrotransposon lineage. The model corresponds to N- or C-lobe of Arc capsid (CA) domain, consisting of four and five alpha helices, respectively. The family also includes retroviral-like aspartic protease 1 (ASPRV1) and similar proteins. ASPRV1, also called skin-specific retroviral-like aspartic protease (SASP), or SASPase, or skin aspartic protease, or TPA-inducible aspartic proteinase-like protein (TAPS), is an auto-activated aspartic protease that is specifically expressed within the epidermis. It might play an important role in cutaneous physiology. ASPRV1 contains a small region in the N-terminus, which shows high sequence similarity with N- or C-lobe of Arc CA domain."
definition: >-
  N- or C-lobe of capsid (CA) domain found in activity-regulated cytoskeleton-associated protein (Arc) and similar proteins. Arc, also called activity-regulated gene 3.1 protein (Arg3.1), is a flexible modular protein capable of reversible self-oligomerization. It is released from neurons in extracellular vesicles and regulates synaptic plasticity that self-assembles into virion-like capsids that encapsulate RNAs and mediate intercellular RNA transfer in the nervous system. Arc displays a bi-lobar configuration which exhibits homology to the capsid-forming Gag proteins from retroviruses, suggesting that Arc originated from the Ty3/Gypsy retrotransposon lineage. The model corresponds to N- or C-lobe of Arc capsid (CA) domain, consisting of four and five alpha helices, respectively. The family also includes retroviral-like aspartic protease 1 (ASPRV1) and similar proteins. ASPRV1, also called skin-specific retroviral-like aspartic protease (SASP), or SASPase, or skin aspartic protease, or TPA-inducible aspartic proteinase-like protein (TAPS), is an auto-activated aspartic protease that is specifically expressed within the epidermis. It might play an important role in cutaneous physiology. ASPRV1 contains a small region in the N-terminus, which shows high sequence similarity with N- or C-lobe of Arc CA domain. — an NCBI CDD conserved domain (cd21728); members share this curated model.
