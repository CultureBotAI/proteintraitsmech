identifier: CDD:cd07638
label: "The Bin/Amphiphysin/Rvs (BAR) domain of ArfGAP with Coiled-coil, ANK repeat and PH domain containing protein 2. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. ACAP2 (ArfGAP with Coiled-coil, ANK repeat and PH domain containing protein 2), also called centaurin beta-2, is an Arf6-specific GTPase activating protein (GAP) which mediates Arf6 signaling. Arf6 is involved in the regulation of endocytosis, phagocytosis, cell adhesion and migration. ACAP2 contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, an Arf GAP domain, and C-terminal ankyrin (ANK) repeats. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of ArfGAP with Coiled-coil, ANK repeat and PH domain containing protein 2. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. ACAP2 (ArfGAP with Coiled-coil, ANK repeat and PH domain containing protein 2), also called centaurin beta-2, is an Arf6-specific GTPase activating protein (GAP) which mediates Arf6 signaling. Arf6 is involved in the regulation of endocytosis, phagocytosis, cell adhesion and migration. ACAP2 contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, an Arf GAP domain, and C-terminal ankyrin (ANK) repeats. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. — an NCBI CDD conserved domain (cd07638); members share this curated model.
