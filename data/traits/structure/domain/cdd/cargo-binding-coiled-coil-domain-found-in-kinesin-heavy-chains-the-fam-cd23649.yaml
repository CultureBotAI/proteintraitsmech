identifier: CDD:cd23649
label: "cargo binding coiled-coil domain found in kinesin heavy chains. The family includes Drosophila kinesin-1, also called kinesin heavy chain (Khc), and Homo sapiens kinesin-1 heavy chain, also called conventional kinesin heavy chain/ubiquitous kinesin heavy chain (UKHC). Kinesin is a microtubule-associated force-producing protein that may play a role in organelle transport. Milt and Miro form an essential protein complex that links Khc to mitochondria for light chain-independent, anterograde transport of mitochondria. The family also includes kinesin heavy chain isoform 5A (KIF5A), also called kinesin heavy chain neuron-specific 1/neuronal kinesin heavy chain (NKHC1), and kinesin heavy chain isoform 5C (KIF5C), also called kinesin heavy chain neuron-specific 2 (NKHC2). KIF5A is a microtubule-dependent motor required for slow axonal transport of neurofilament proteins (NFH, NFM and NFL). It can induce formation of neurite-like membrane protrusions in non-neuronal cells in a ZFYVE27-dependent manner. KIF5C is involved in synaptic transmission and mediates dendritic trafficking of mRNAs. Khc comprises an N-terminal motor-domain, followed by a long coiled-coil stalk that mediates homodimerization, and an unstructured tail with regulatory function. The stalk includes the kinesin light chain (Klc) binding region and an alternative cargo binding region. The model corresponds to the cargo binding region, which is responsible for binding of the atypical tropomyosin, aTm1, a cargo adaptor that plays a stabilizing role in the interaction of Khc with RNA."
definition: >-
  cargo binding coiled-coil domain found in kinesin heavy chains. The family includes Drosophila kinesin-1, also called kinesin heavy chain (Khc), and Homo sapiens kinesin-1 heavy chain, also called conventional kinesin heavy chain/ubiquitous kinesin heavy chain (UKHC). Kinesin is a microtubule-associated force-producing protein that may play a role in organelle transport. Milt and Miro form an essential protein complex that links Khc to mitochondria for light chain-independent, anterograde transport of mitochondria. The family also includes kinesin heavy chain isoform 5A (KIF5A), also called kinesin heavy chain neuron-specific 1/neuronal kinesin heavy chain (NKHC1), and kinesin heavy chain isoform 5C (KIF5C), also called kinesin heavy chain neuron-specific 2 (NKHC2). KIF5A is a microtubule-dependent motor required for slow axonal transport of neurofilament proteins (NFH, NFM and NFL). It can induce formation of neurite-like membrane protrusions in non-neuronal cells in a ZFYVE27-dependent manner. KIF5C is involved in synaptic transmission and mediates dendritic trafficking of mRNAs. Khc comprises an N-terminal motor-domain, followed by a long coiled-coil stalk that mediates homodimerization, and an unstructured tail with regulatory function. The stalk includes the kinesin light chain (Klc) binding region and an alternative cargo binding region. The model corresponds to the cargo binding region, which is responsible for binding of the atypical tropomyosin, aTm1, a cargo adaptor that plays a stabilizing role in the interaction of Khc with RNA. — an NCBI CDD conserved domain (cd23649); members share this curated model.
