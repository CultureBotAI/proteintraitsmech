identifier: CDD:cd20237
label: "pore-forming module of Caenorhabditis elegans LIN-24 and similar aerolysin-type beta-barrel pore-forming proteins. The process of cytotoxic cell death occurs in Caenorhabditis elegans containing mutations in either of lin-24 and lin-33. The cytotoxicity caused by mutation of either gene requires the function of the other. Genes required for the engulfment of apoptotic corpses function in the cytotoxic cell deaths induced by mutations in lin-24 and lin-33. It has been proposed that Caenorhabditis elegans LIN-24 may function to interact with bacterial toxins having similarity with it, and inactivate these, thereby allowing C. elegans to consume or survive exposure to bacteria that produce such toxins. Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin)."
definition: >-
  pore-forming module of Caenorhabditis elegans LIN-24 and similar aerolysin-type beta-barrel pore-forming proteins. The process of cytotoxic cell death occurs in Caenorhabditis elegans containing mutations in either of lin-24 and lin-33. The cytotoxicity caused by mutation of either gene requires the function of the other. Genes required for the engulfment of apoptotic corpses function in the cytotoxic cell deaths induced by mutations in lin-24 and lin-33. It has been proposed that Caenorhabditis elegans LIN-24 may function to interact with bacterial toxins having similarity with it, and inactivate these, thereby allowing C. elegans to consume or survive exposure to bacteria that produce such toxins. Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin). — an NCBI CDD conserved domain (cd20237); members share this curated model.
