identifier: CDD:cd18930
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in Max-interacting protein 1 (MXI1) and similar proteins. MXI1, also termed Max interactor 1, or Class C basic helix-loop-helix protein 11 (bHLHc11), is a bHLHZip transcriptional repressor that binds with MAX to form a sequence-specific DNA-binding protein complex which recognizes the core sequence 5'-CAC[GA]TG-3'. It thus antagonizes MYC transcriptional activity by competing for MAX. It plays an important role in the regulation of cell proliferation."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in Max-interacting protein 1 (MXI1) and similar proteins. MXI1, also termed Max interactor 1, or Class C basic helix-loop-helix protein 11 (bHLHc11), is a bHLHZip transcriptional repressor that binds with MAX to form a sequence-specific DNA-binding protein complex which recognizes the core sequence 5'-CAC[GA]TG-3'. It thus antagonizes MYC transcriptional activity by competing for MAX. It plays an important role in the regulation of cell proliferation. — an NCBI CDD conserved domain (cd18930); members share this curated model.
