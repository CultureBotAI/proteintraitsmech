identifier: CDD:cd14355
label: "UBA domain found in ubiquitin carboxyl-terminal hydrolase 28 (UBP28) and similar proteins. UBP28, also called deubiquitinating enzyme 28, ubiquitin thioesterase 28, or ubiquitin-specific-processing protease 28, is an ubiquitin-specific protease that belongs to the deubiquitinating enzyme (DUB) family which specifically hydrolyzes ubiquitin chains on ubiquitin-conjugated proteins. UBP28 can form a ternary complex with nucleoplasmic Fbw7alpha, an F-box protein that is part of an SCF-type ubiquitin ligase, and MYC, a transcription factor encoded by MYC proto-oncogene. UBP28 is required for the stability of MYC, and this stabilization is necessary for tumour-cell proliferation. Besides, UBP28 plays a critical role in the regulation of the Chk2-p53-PUMA pathway. It specifically interacts with 53BP1 and is essential to stabilize Chk2 and 53BP1 in response to DNA damage."
definition: >-
  UBA domain found in ubiquitin carboxyl-terminal hydrolase 28 (UBP28) and similar proteins. UBP28, also called deubiquitinating enzyme 28, ubiquitin thioesterase 28, or ubiquitin-specific-processing protease 28, is an ubiquitin-specific protease that belongs to the deubiquitinating enzyme (DUB) family which specifically hydrolyzes ubiquitin chains on ubiquitin-conjugated proteins. UBP28 can form a ternary complex with nucleoplasmic Fbw7alpha, an F-box protein that is part of an SCF-type ubiquitin ligase, and MYC, a transcription factor encoded by MYC proto-oncogene. UBP28 is required for the stability of MYC, and this stabilization is necessary for tumour-cell proliferation. Besides, UBP28 plays a critical role in the regulation of the Chk2-p53-PUMA pathway. It specifically interacts with 53BP1 and is essential to stabilize Chk2 and 53BP1 in response to DNA damage. — an NCBI CDD conserved domain (cd14355); members share this curated model.
