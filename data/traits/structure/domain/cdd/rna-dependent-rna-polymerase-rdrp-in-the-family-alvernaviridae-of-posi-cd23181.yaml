identifier: CDD:cd23181
label: "RNA-dependent RNA polymerase (RdRp) in the family Alvernaviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the RdRp of RNA viruses belonging to the family Alvernaviridae, order Sobelivirales. Alvernaviridae is a family of non-enveloped [(+)ssRNA] viruses. Dinoflagellates serve as natural hosts. There is one genus in this family, Dinornavirus, which contains one species: Heterocapsa circularisquama RNA virus 01. Diseases associated with this family include host population control, possibly through lysis of the host cell. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  RNA-dependent RNA polymerase (RdRp) in the family Alvernaviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the RdRp of RNA viruses belonging to the family Alvernaviridae, order Sobelivirales. Alvernaviridae is a family of non-enveloped [(+)ssRNA] viruses. Dinoflagellates serve as natural hosts. There is one genus in this family, Dinornavirus, which contains one species: Heterocapsa circularisquama RNA virus 01. Diseases associated with this family include host population control, possibly through lysis of the host cell. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23181); members share this curated model.
