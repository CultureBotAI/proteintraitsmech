identifier: CDD:cd08179
label: "NADPH-dependent butanol dehydrogenase involved in the butanol and ethanol formation pathway in bacteria. NADPH-dependent butanol dehydrogenase (BDH) is involved in the butanol and ethanol formation pathway of some bacteria. The fermentation process is characterized by an acid producing growth phase, followed by a solvent producing phase. The latter phase is associated with the induction of solventogenic enzymes such as butanol dehydrogenase. The activity of the enzyme requires NADPH as cofactor, as well as divalent ions zinc or iron. This family is a member of the iron-containing alcohol dehydrogenase superfamily. Protein structure has a dehydroquinate synthase-like fold."
definition: >-
  NADPH-dependent butanol dehydrogenase involved in the butanol and ethanol formation pathway in bacteria. NADPH-dependent butanol dehydrogenase (BDH) is involved in the butanol and ethanol formation pathway of some bacteria. The fermentation process is characterized by an acid producing growth phase, followed by a solvent producing phase. The latter phase is associated with the induction of solventogenic enzymes such as butanol dehydrogenase. The activity of the enzyme requires NADPH as cofactor, as well as divalent ions zinc or iron. This family is a member of the iron-containing alcohol dehydrogenase superfamily. Protein structure has a dehydroquinate synthase-like fold. — an NCBI CDD conserved domain (cd08179); members share this curated model.
