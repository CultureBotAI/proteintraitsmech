identifier: CDD:cd17549
label: "phosphoacceptor receiver (REC) domain of C4-dicarboxylic acid transport protein D (DctD) and similar proteins. C4-dicarboxylic acid transport protein D (DctD) is part of the two-component regulatory system DctB/DctD, which regulates C4-dicarboxylate transport via regulation of expression of the dctPQM operon and dctA. It is an activator of sigma(54)-RNA polymerase holoenzyme that uses the energy released from ATP hydrolysis to stimulate the isomerization of a closed promoter complex to an open complex capable of initiating transcription. DctD is a member of the NtrC family, characterized by a domain architecture containing an N-terminal REC domain, followed by a central sigma-54 interaction/ATPase domain, and a C-terminal DNA binding domain. The ability of the central domain to hydrolyze ATP and thus to interact effectively with a complex of RNA polymerase, sigma54, and promoter, is controlled by the phosphorylation status of the REC domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of C4-dicarboxylic acid transport protein D (DctD) and similar proteins. C4-dicarboxylic acid transport protein D (DctD) is part of the two-component regulatory system DctB/DctD, which regulates C4-dicarboxylate transport via regulation of expression of the dctPQM operon and dctA. It is an activator of sigma(54)-RNA polymerase holoenzyme that uses the energy released from ATP hydrolysis to stimulate the isomerization of a closed promoter complex to an open complex capable of initiating transcription. DctD is a member of the NtrC family, characterized by a domain architecture containing an N-terminal REC domain, followed by a central sigma-54 interaction/ATPase domain, and a C-terminal DNA binding domain. The ability of the central domain to hydrolyze ATP and thus to interact effectively with a complex of RNA polymerase, sigma54, and promoter, is controlled by the phosphorylation status of the REC domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17549); members share this curated model.
