identifier: CDD:cd16836
label: "flavivirus envelope glycoprotein E, stem/anchor domain. This model describes the C-terminal domain, containing a stem region followed by two transmembrane anchor domains, of the envelope protein E. This protein is cleaved from the large flavivirus polyprotein, which yields three structural and seven nonstructural proteins."
