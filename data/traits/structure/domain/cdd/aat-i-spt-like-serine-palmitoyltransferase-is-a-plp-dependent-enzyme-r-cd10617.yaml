label: "AAT_I. SPT_like: Serine_palmitoyltransferase is a PLP dependent enzyme responsible for the condensation of L-serine with palmitoyl-CoA to produce 3-ketodihydrospingosine, the reaction of the first step in sphingolipid biosynthesis. No structural information is availabel on this sub-group. Members of this group are found in bacteria and eukaryotes."
