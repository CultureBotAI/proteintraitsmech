identifier: CDD:cd23295
label: "beta-trefoil domain found in interleukin-1 alpha (IL-1 alpha) and similar proteins. IL-1 alpha, also called hematopoietin-1, is a potent inflammatory cytokine that activates the inflammatory process. It is produced by activated macrophages. IL-1 stimulates thymocyte proliferation by inducing IL-2 release, B-cell maturation and proliferation, and fibroblast growth factor activity. IL-1 proteins are involved in the inflammatory response, being identified as endogenous pyrogens, and are reported to stimulate the release of prostaglandin and collagenase from synovial cells. IL-1 alpha contains a C-terminal beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  beta-trefoil domain found in interleukin-1 alpha (IL-1 alpha) and similar proteins. IL-1 alpha, also called hematopoietin-1, is a potent inflammatory cytokine that activates the inflammatory process. It is produced by activated macrophages. IL-1 stimulates thymocyte proliferation by inducing IL-2 release, B-cell maturation and proliferation, and fibroblast growth factor activity. IL-1 proteins are involved in the inflammatory response, being identified as endogenous pyrogens, and are reported to stimulate the release of prostaglandin and collagenase from synovial cells. IL-1 alpha contains a C-terminal beta-trefoil domain, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23295); members share this curated model.
