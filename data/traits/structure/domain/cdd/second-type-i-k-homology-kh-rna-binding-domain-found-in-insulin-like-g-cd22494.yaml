identifier: CDD:cd22494
label: "second type I K homology (KH) RNA-binding domain found in insulin-like growth factor 2 mRNA-binding protein 2 (IGF2BP2) and similar proteins. IGF2BP2, also called IGF2 mRNA-binding protein 2 (IMP-2), or hepatocellular carcinoma autoantigen p62, or IGF-II mRNA-binding protein 2, or VICKZ family member 2 (VICKZ2), is an RNA-binding factor that recruits target transcripts to cytoplasmic protein-RNA complexes (mRNPs). It functions by binding to the 5' UTR of the insulin-like growth factor 2 (IGF2) mRNA and regulating IGF2 translation. It also binds to beta-actin/ACTB and MYC transcripts. IGF2BP2 can form homooligomers and heterooligomers with IGF2BP1 and IGF2BP3 in an RNA-dependent manner. It contains four K-homology (KH) RNA-binding domains which are important in RNA binding and are known to be involved in RNA synthesis and metabolism. The model corresponds to the second one."
definition: >-
  second type I K homology (KH) RNA-binding domain found in insulin-like growth factor 2 mRNA-binding protein 2 (IGF2BP2) and similar proteins. IGF2BP2, also called IGF2 mRNA-binding protein 2 (IMP-2), or hepatocellular carcinoma autoantigen p62, or IGF-II mRNA-binding protein 2, or VICKZ family member 2 (VICKZ2), is an RNA-binding factor that recruits target transcripts to cytoplasmic protein-RNA complexes (mRNPs). It functions by binding to the 5' UTR of the insulin-like growth factor 2 (IGF2) mRNA and regulating IGF2 translation. It also binds to beta-actin/ACTB and MYC transcripts. IGF2BP2 can form homooligomers and heterooligomers with IGF2BP1 and IGF2BP3 in an RNA-dependent manner. It contains four K-homology (KH) RNA-binding domains which are important in RNA binding and are known to be involved in RNA synthesis and metabolism. The model corresponds to the second one. — an NCBI CDD conserved domain (cd22494); members share this curated model.
