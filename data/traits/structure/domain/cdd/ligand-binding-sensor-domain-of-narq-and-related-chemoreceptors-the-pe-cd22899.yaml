identifier: CDD:cd22899
label: "ligand binding sensor domain of NarQ, and related chemoreceptors. The periplasmic ligand binding sensor domain of NarQ is a histidine kinase receptor that responds to nitrate and nitrite to effect regulation of anaerobic respiration in various bacteria and similar proteins. It forms a homodimer and binds to ligands such as nitrate via the dimerization interface, a feature that appears to be conserved in this domain superfamily. NarQ-NarP sensor-response regulator pair controls Escherichia coli gene expression in response to nitrate and nitrite. NarQ has been shown to interact equally with NarP and NarL response regulators; NarL is the sensor response partner of NarX."
definition: >-
  ligand binding sensor domain of NarQ, and related chemoreceptors. The periplasmic ligand binding sensor domain of NarQ is a histidine kinase receptor that responds to nitrate and nitrite to effect regulation of anaerobic respiration in various bacteria and similar proteins. It forms a homodimer and binds to ligands such as nitrate via the dimerization interface, a feature that appears to be conserved in this domain superfamily. NarQ-NarP sensor-response regulator pair controls Escherichia coli gene expression in response to nitrate and nitrite. NarQ has been shown to interact equally with NarP and NarL response regulators; NarL is the sensor response partner of NarX. — an NCBI CDD conserved domain (cd22899); members share this curated model.
