identifier: CDD:cd04414
label: "Nucleoside diphosphate kinase 6 (NDP kinase 6, NDPk6, NM23-H6; NME6; Inhibitor of p53-induced apoptosis-alpha, IPIA-alpha): The nm23-H6 gene encoding NDPk6 is expressed mainly in mitochondria, but also found at a lower level in most tissues. NDPk6 has all nine residues considered crucial for enzyme structure and activity, and has been found to have NDP kinase activity. It may play a role in cell growth and cell cycle progression. The nm23-H6 gene locus has been implicated in a variety of malignant tumors."
definition: >-
