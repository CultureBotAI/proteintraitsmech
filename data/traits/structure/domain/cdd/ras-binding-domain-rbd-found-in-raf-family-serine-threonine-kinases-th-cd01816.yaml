identifier: CDD:cd01816
label: "Ras-binding domain (RBD) found in RAF family serine/threonine kinases. The RAF family includes three RAF serine/threonine kinases ARAF, BRAF, and RAF1/CRAF. These are encoded by proto-oncogenes, and activate the mitogen-activated protein kinase/extracellular-signal-regulated kinase (MAPK/ERK) cascade downstream of RAS. They share a common structure consisting of an N-terminal regulatory domain and a C-terminal kinase domain. There are three conserved regions (CR1-3) in the regulatory domain, CR1 contains a Ras-binding domain (RBD) and a cysteine-rich domain (CRD), CR2 is a serine/threonine-rich domain, and CR3 encodes the kinase domain required for RAF. The RBD of RAF has a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions."
definition: >-
  Ras-binding domain (RBD) found in RAF family serine/threonine kinases. The RAF family includes three RAF serine/threonine kinases ARAF, BRAF, and RAF1/CRAF. These are encoded by proto-oncogenes, and activate the mitogen-activated protein kinase/extracellular-signal-regulated kinase (MAPK/ERK) cascade downstream of RAS. They share a common structure consisting of an N-terminal regulatory domain and a C-terminal kinase domain. There are three conserved regions (CR1-3) in the regulatory domain, CR1 contains a Ras-binding domain (RBD) and a cysteine-rich domain (CRD), CR2 is a serine/threonine-rich domain, and CR3 encodes the kinase domain required for RAF. The RBD of RAF has a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions. — an NCBI CDD conserved domain (cd01816); members share this curated model.
