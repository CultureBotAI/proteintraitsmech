identifier: CDD:cd22629
label: "Kunitz-type domain from the alpha3 chain of human type VI collagen, and similar proteins. This model includes the Kunitz-type domain from the alpha3 chain of type VI collagen (collagen alpha 3(VI) chain), encoded by COL6A3 gene. Collagen VI is a widely expressed member of the triple helix-containing protein superfamily of collagens and forms beaded microfibrils that anchor large interstitial structures. Immediately after fibril formation, the Kunitz domain can be cleaved off. Mutations in the alpha1, alpha2, and alpha3 chains of collagen VI cause myopathies ranging from the severe Ullrich congenital muscular dystrophy to the milder Bethlem myopathy, including intermediate forms. Early onset isolated dystonia, a neurological disease, has been shown to be caused by mutations in the alpha3 chain. Findings also indicated potential associations between COL6A3 polymorphisms and lung cancer risk. This domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type domain from the alpha3 chain of human type VI collagen, and similar proteins. This model includes the Kunitz-type domain from the alpha3 chain of type VI collagen (collagen alpha 3(VI) chain), encoded by COL6A3 gene. Collagen VI is a widely expressed member of the triple helix-containing protein superfamily of collagens and forms beaded microfibrils that anchor large interstitial structures. Immediately after fibril formation, the Kunitz domain can be cleaved off. Mutations in the alpha1, alpha2, and alpha3 chains of collagen VI cause myopathies ranging from the severe Ullrich congenital muscular dystrophy to the milder Bethlem myopathy, including intermediate forms. Early onset isolated dystonia, a neurological disease, has been shown to be caused by mutations in the alpha3 chain. Findings also indicated potential associations between COL6A3 polymorphisms and lung cancer risk. This domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22629); members share this curated model.
