identifier: CDD:cd23695
label: "Tetrahymena thermophila ribosomal protein mS26 and similar proteins. Ribosomal protein mS26 is a component of small subunit (SSU) in Tetrahymena thermophila mitochondrial ribosome (mitoribosome). The structure of the mitoribosome reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit; the large mitoribosomal subunit (LSU) lacks 5S rRNA."
definition: >-
  Tetrahymena thermophila ribosomal protein mS26 and similar proteins. Ribosomal protein mS26 is a component of small subunit (SSU) in Tetrahymena thermophila mitochondrial ribosome (mitoribosome). The structure of the mitoribosome reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit; the large mitoribosomal subunit (LSU) lacks 5S rRNA. — an NCBI CDD conserved domain (cd23695); members share this curated model.
