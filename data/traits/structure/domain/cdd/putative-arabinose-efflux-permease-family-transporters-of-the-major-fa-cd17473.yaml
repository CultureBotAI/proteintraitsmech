identifier: CDD:cd17473
label: "Putative arabinose efflux permease family transporters of the Major Facilitator Superfamily. This family includes a group of putative arabinose efflux permease family transporters, such as alpha proteobacterium quinolone resistance protein NorA (characterized Staphylococcus aureus Quinolone resistance protein NorA belongs to a different group), Desulfovibrio dechloracetivorans bacillibactin exporter, Vibrio aerogenes antiseptic resistance protein. The biological function of those transporters remain unclear. They belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Putative arabinose efflux permease family transporters of the Major Facilitator Superfamily. This family includes a group of putative arabinose efflux permease family transporters, such as alpha proteobacterium quinolone resistance protein NorA (characterized Staphylococcus aureus Quinolone resistance protein NorA belongs to a different group), Desulfovibrio dechloracetivorans bacillibactin exporter, Vibrio aerogenes antiseptic resistance protein. The biological function of those transporters remain unclear. They belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17473); members share this curated model.
