identifier: CDD:cd12772
label: "RNA recognition motif 1 (RRM1) found in vertebrate Hu-antigen C (HuC). This subgroup corresponds to the RRM1 of HuC, also termed ELAV-like protein 3 (ELAV-3), or paraneoplastic cerebellar degeneration-associated antigen, or paraneoplastic limbic encephalitis antigen 21 (PLE21), one of the neuronal members of the Hu family. The neuronal Hu proteins play important roles in neuronal differentiation, plasticity and memory. Like other Hu proteins, HuC contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). RRM1 and RRM2 may cooperate in binding to an AU-rich RNA element (ARE). The AU-rich element binding of HuC can be inhibited by flavonoids. RRM3 may help to maintain the stability of the RNA-protein complex, and might also bind to poly(A) tails or be involved in protein-protein interactions."
definition: >-
  RNA recognition motif 1 (RRM1) found in vertebrate Hu-antigen C (HuC). This subgroup corresponds to the RRM1 of HuC, also termed ELAV-like protein 3 (ELAV-3), or paraneoplastic cerebellar degeneration-associated antigen, or paraneoplastic limbic encephalitis antigen 21 (PLE21), one of the neuronal members of the Hu family. The neuronal Hu proteins play important roles in neuronal differentiation, plasticity and memory. Like other Hu proteins, HuC contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). RRM1 and RRM2 may cooperate in binding to an AU-rich RNA element (ARE). The AU-rich element binding of HuC can be inhibited by flavonoids. RRM3 may help to maintain the stability of the RNA-protein complex, and might also bind to poly(A) tails or be involved in protein-protein interactions. — an NCBI CDD conserved domain (cd12772); members share this curated model.
