identifier: CDD:cd21800
label: "second Wiskott Aldrich syndrome homology region 2 (WH2 motif) repeat (called Wb) found in protein Cordon-Bleu (Cobl) and similar proteins. This family contains the second tandem Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2), called Wb, found in protein Cordon-Bleu (Cobl), a potent actin filament nucleator that plays an important role in the reorganization of the actin cytoskeleton. It regulates neuron morphogenesis and increases branching of axons and dendrites. It also modulates dendrite branching in Purkinje cells. Cobl binds to and sequesters actin monomers (G-actin). Cobl contains three tandem WH2 or W domains consisting of an N-terminal alpha helix and a C-terminal LRKV motif. The first two WH2 domains have the highest binding affinity for actin. They are functionally active in actin nucleation and polymerization. The model corresponds to the second WH2 domain."
definition: >-
  second Wiskott Aldrich syndrome homology region 2 (WH2 motif) repeat (called Wb) found in protein Cordon-Bleu (Cobl) and similar proteins. This family contains the second tandem Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2), called Wb, found in protein Cordon-Bleu (Cobl), a potent actin filament nucleator that plays an important role in the reorganization of the actin cytoskeleton. It regulates neuron morphogenesis and increases branching of axons and dendrites. It also modulates dendrite branching in Purkinje cells. Cobl binds to and sequesters actin monomers (G-actin). Cobl contains three tandem WH2 or W domains consisting of an N-terminal alpha helix and a C-terminal LRKV motif. The first two WH2 domains have the highest binding affinity for actin. They are functionally active in actin nucleation and polymerization. The model corresponds to the second WH2 domain. — an NCBI CDD conserved domain (cd21800); members share this curated model.
