identifier: CDD:cd07708
label: "metallo-beta-lactamases, subclass B3; MBL-fold metallo-hydrolase domain. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. Subclass B3 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile. B3 MBLs include Fluoribacter gormanii FEZ-1, Elizabethkingia meningoseptica (Chryseobacterium meningosepticum)  GOB-1, Stenotrophomonas Maltophilia L1, and Bradyrhizobium diazoefficiens BJP-1, Serratia marcescens SMB-1, and Pseudomonas Aeruginosa AIM-1. These B3 enzymes have a modified Zn2/DCH site (Asp-His-His)."
definition: >-
