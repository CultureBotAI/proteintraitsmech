  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in tyrosine-protein phosphatase non-receptor type 14 (PTPN14) and similar proteins. PTPN14, also termed protein-tyrosine phosphatase pez, or PTPD2, or PTP36, is a widely expressed non-transmembrane cytosolic protein tyrosine phosphatase (PTP). It belongs to the FERM family of PTPs characterized by a conserved N-terminal FERM domain and a C-terminal PTP catalytic domain with an intervening sequence containing an acidic region and a putative SH3 domain-binding sequence. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). PTPN14 plays a role in the nucleus during cell proliferation. It forms a complex with Kibra and LATS1 proteins and negatively regulates the key Hippo pathway protein Yes-associated protein (YAP) oncogenic function by controlling its localization. It specifically regulates p130 Crk-associated substrate (p130Cas) phosphorylation at tyrosine residue 128 (Y128) in colorectal cancer (CRC) cells. Moreover, PTPN14 may be a critical enzyme in regulating endothelial cell function. It plays a crucial role in organogenesis by inducing transforming growth factor beta (TGFbeta) and epithelial-mesenchymal transition (EMT). It also acts as a modifier of angiogenesis and hereditary haemorrhagic telangiectasia. It regulates the lymphatic function and choanal development through the interaction with the vascular endothelial growth factor receptor 3 (VEGFR3), a receptor tyrosine kinase essential for lymphangiogenesis. Furthermore, PTPN14 functions as a regulator of cell motility through its action on cell-cell adhesion. Beta-Catenin, a central component of adherens junctions, has been identified as a PTPN14 substrate. PTPN14 works as a novel sperm-motility biomarker and a potential mitochondrial protein. — an NCBI CDD conserved domain (cd17