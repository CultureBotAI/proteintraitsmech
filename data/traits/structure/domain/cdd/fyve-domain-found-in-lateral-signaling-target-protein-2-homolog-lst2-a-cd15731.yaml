identifier: CDD:cd15731
label: "FYVE domain found in lateral signaling target protein 2 homolog (Lst2) and similar proteins. Lst2, also termed zinc finger FYVE domain-containing protein 28, is a monoubiquitinylated phosphoprotein that functions as a negative regulator of epidermal growth factor receptor (EGFR) signaling. Unlike other FYVE domain-containing proteins, Lst2 displays primarily non-endosomal localization. Its endosomal localization is regulated by monoubiquitinylation. Lst2 physically binds Trim3, also known as BERP or RNF22, which is a coordinator of endosomal trafficking and interacts with Hrs and a complex that biases cargo recycling."
definition: >-
  FYVE domain found in lateral signaling target protein 2 homolog (Lst2) and similar proteins. Lst2, also termed zinc finger FYVE domain-containing protein 28, is a monoubiquitinylated phosphoprotein that functions as a negative regulator of epidermal growth factor receptor (EGFR) signaling. Unlike other FYVE domain-containing proteins, Lst2 displays primarily non-endosomal localization. Its endosomal localization is regulated by monoubiquitinylation. Lst2 physically binds Trim3, also known as BERP or RNF22, which is a coordinator of endosomal trafficking and interacts with Hrs and a complex that biases cargo recycling. — an NCBI CDD conserved domain (cd15731); members share this curated model.
