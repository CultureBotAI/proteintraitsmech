identifier: CDD:cd08722
label: "Regulator of G protein signaling (RGS) domain found in the Sorting Nexin14 (SNX14) protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the SNX14 (Sorting Nexin14) protein, a member of  the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. SNX14 is believed to regulates membrane trafficking in motor neurons."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the Sorting Nexin14 (SNX14) protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the SNX14 (Sorting Nexin14) protein, a member of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. SNX14 is believed to regulates membrane trafficking in motor neurons. — an NCBI CDD conserved domain (cd08722); members share this curated model.
