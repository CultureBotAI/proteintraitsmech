identifier: CDD:cd10909
label: "Hevein or type 1 chitin binding domain (ChtBD1) subfamily; in some members co-occurs with family 18 glycosyl hydrolases. This subfamily includes a Toxoplasma gondii ME49 protein annotated as a putative mannosyl-oligosaccharide glucosidase. ChtBD1 is a lectin domain found in proteins from plants and fungi that bind N-acetylglucosamine, plant endochitinases, wound-induced proteins such as hevein, a major IgE-binding allergen in natural rubber latex, and the alpha subunit of Kluyveromyces lactis killer toxin. This domain is involved in the recognition and/or binding of chitin subunits; it typically occurs N-terminal to glycosyl hydrolase domains in chitinases, together with other carbohydrate-binding domains, or by itself in tandem-repeat arrangements."
definition: >-
  Hevein or type 1 chitin binding domain (ChtBD1) subfamily; in some members co-occurs with family 18 glycosyl hydrolases. This subfamily includes a Toxoplasma gondii ME49 protein annotated as a putative mannosyl-oligosaccharide glucosidase. ChtBD1 is a lectin domain found in proteins from plants and fungi that bind N-acetylglucosamine, plant endochitinases, wound-induced proteins such as hevein, a major IgE-binding allergen in natural rubber latex, and the alpha subunit of Kluyveromyces lactis killer toxin. This domain is involved in the recognition and/or binding of chitin subunits; it typically occurs N-terminal to glycosyl hydrolase domains in chitinases, together with other carbohydrate-binding domains, or by itself in tandem-repeat arrangements. — an NCBI CDD conserved domain (cd10909); members share this curated model.
