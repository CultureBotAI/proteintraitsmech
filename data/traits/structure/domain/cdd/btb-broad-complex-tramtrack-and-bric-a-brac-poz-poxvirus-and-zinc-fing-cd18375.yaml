identifier: CDD:cd18375
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel regulatory protein (KCNRG). KCNRG, also called potassium channel regulator or protein CLLD4, is an endoplasmic reticulum (ER)-associated tumor suppressor that regulates Kv1 family potassium channel proteins by retaining a fraction of the channels in endomembranes. It contains a BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel regulatory protein (KCNRG). KCNRG, also called potassium channel regulator or protein CLLD4, is an endoplasmic reticulum (ER)-associated tumor suppressor that regulates Kv1 family potassium channel proteins by retaining a fraction of the channels in endomembranes. It contains a BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. — an NCBI CDD conserved domain (cd18375); members share this curated model.
