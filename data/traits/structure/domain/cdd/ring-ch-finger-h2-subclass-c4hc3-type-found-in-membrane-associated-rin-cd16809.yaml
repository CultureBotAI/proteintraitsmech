identifier: CDD:cd16809
label: "RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH3 (MARCH3). MARCH3, also known as membrane-associated RING finger protein 3, or membrane-associated RING-CH protein III (MARCH-III), or RING finger protein 173 (RNF173), is an E3 ubiquitin-protein ligase that is broadly expressed and is found at relatively high levels in spleen, colon, and lung. It is localized to early endosomes, binds to MARCH2 and syntaxin 6, and is involved in the regulation of vesicular trafficking and fusion of the transport vesicles in endosomes. MARCH3 is the closest homolog of MARCH2 and it is also a functional homolog of K3 and K5 viral ubiquitin E3 ligases related to immune-evasion strategies used by Kaposi's sarcoma-associated herpesvirus (KSHV). Its E2 specificity significantly overlaps that of MARCH2. MARCH3 contains a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, in the N-terminal cytoplasmic region, two transmembrane domains in the middle region, and a PDZ-binding motif at the C-terminus. The RING-CH finger and PDZ-binding motif are essential for the subcellular localization of MARCH3 and the inhibitory effect on transferrin uptake."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH3 (MARCH3). MARCH3, also known as membrane-associated RING finger protein 3, or membrane-associated RING-CH protein III (MARCH-III), or RING finger protein 173 (RNF173), is an E3 ubiquitin-protein ligase that is broadly expressed and is found at relatively high levels in spleen, colon, and lung. It is localized to early endosomes, binds to MARCH2 and syntaxin 6, and is involved in the regulation of vesicular trafficking and fusion of the transport vesicles in endosomes. MARCH3 is the closest homolog of MARCH2 and it is also a functional homolog of K3 and K5 viral ubiquitin E3 ligases related to immune-evasion strategies used by Kaposi's sarcoma-associated herpesvirus (KSHV). Its E2 specificity significantly overlaps that of MARCH2. MARCH3 contains a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, in the N-terminal cytoplasmic region, two transmembrane domains in the middle region, and a PDZ-binding motif at the C-terminus. The RING-CH finger and PDZ-binding motif are essential for the subcellular localization of MARCH3 and the inhibitory effect on transferrin uptake. — an NCBI CDD conserved domain (cd16809); members share this curated model.
