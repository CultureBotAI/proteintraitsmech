identifier: CDD:cd16905
label: "YEATS domain found in Taf14 and similar proteins. Taf14 has been identified as a component of TFIIF and TFIID transcription factor complexes, various chromatin-remodeling complexes (such as SWI/SNF, INO80, and RSC) and the NuA3 histone acetyltransferase complex. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. Specifically, Taf14 has been show to be a reader of lysine crotonylation, associated with active gene promoters and enhancers and binding acetyllysine on in histone H3. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein."
definition: >-
  YEATS domain found in Taf14 and similar proteins. Taf14 has been identified as a component of TFIIF and TFIID transcription factor complexes, various chromatin-remodeling complexes (such as SWI/SNF, INO80, and RSC) and the NuA3 histone acetyltransferase complex. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. Specifically, Taf14 has been show to be a reader of lysine crotonylation, associated with active gene promoters and enhancers and binding acetyllysine on in histone H3. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein. — an NCBI CDD conserved domain (cd16905); members share this curated model.
