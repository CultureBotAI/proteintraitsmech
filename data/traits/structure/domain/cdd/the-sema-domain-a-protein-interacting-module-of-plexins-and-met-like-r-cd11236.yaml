identifier: CDD:cd11236
label: "The Sema domain, a protein interacting module, of Plexins and MET-like receptor tyrosine kinases. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestor of semaphorins. Ligand binding activates signal transduction pathways controlling axon guidance in the nervous system and other developmental processes including cell migration and morphogenesis, immune function, and tumor progression. Plexins are divided into four types (A-D) according to sequence similarity. In vertebrates, type A Plexins serve as the co-receptors for neuropilins to mediate the signalling of class 3 semaphorins except Sema3E, which signals through Plexin D1. Plexins serve as direct receptors for several other members of the semaphorin family: class 6 semaphorins signal through type A plexins and class 4 semaphorins through type B. Plexin C1 serves as the receptor of Sema7A and plays regulation roles in both immune and nervous systems. This family also includes the Met and RON receptor tyrosine kinases. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of Plexins and MET-like receptor tyrosine kinases. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestor of semaphorins. Ligand binding activates signal transduction pathways controlling axon guidance in the nervous system and other developmental processes including cell migration and morphogenesis, immune function, and tumor progression. Plexins are divided into four types (A-D) according to sequence similarity. In vertebrates, type A Plexins serve as the co-receptors for neuropilins to mediate the signalling of class 3 semaphorins except Sema3E, which signals through Plexin D1. Plexins serve as direct receptors for several other members of the semaphorin family: class 6 semaphorins signal through type A plexins and class 4 semaphorins through type B. Plexin C1 serves as the receptor of Sema7A and plays regulation roles in both immune and nervous systems. This family also includes the Met and RON receptor tyrosine kinases. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module. — an NCBI CDD conserved domain (cd11236); members share this curated model.
