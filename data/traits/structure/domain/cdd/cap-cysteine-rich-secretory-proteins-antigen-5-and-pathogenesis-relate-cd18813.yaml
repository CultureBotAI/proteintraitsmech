identifier: CDD:cd18813
label: "CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of cysteine-rich secretory protein LCCL domain-containing 1. Cysteine-rich secretory protein LCCL domain-containing 1 (CRISPLD1) is also called cysteine-rich secretory protein 10 (CRISP-10), CocoaCrisp, LCCL domain-containing cysteine-rich secretory protein 1 (LCRISP1), or CAP and LCCL domain containing protein 1 (CAPLD1). CRISPLD1 is clearly distinct from CRISPs because they do not contain the 10 absolutely conserved cysteines or the ICR (ion channel regulator) domain of the CRISPs. It may play a role in NSCLP (nonsyndromic cleft lip with or without cleft palate) through the interaction with CRISPLD2 and folate pathway genes. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others."
definition: >-
  CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of cysteine-rich secretory protein LCCL domain-containing 1. Cysteine-rich secretory protein LCCL domain-containing 1 (CRISPLD1) is also called cysteine-rich secretory protein 10 (CRISP-10), CocoaCrisp, LCCL domain-containing cysteine-rich secretory protein 1 (LCRISP1), or CAP and LCCL domain containing protein 1 (CAPLD1). CRISPLD1 is clearly distinct from CRISPs because they do not contain the 10 absolutely conserved cysteines or the ICR (ion channel regulator) domain of the CRISPs. It may play a role in NSCLP (nonsyndromic cleft lip with or without cleft palate) through the interaction with CRISPLD2 and folate pathway genes. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. — an NCBI CDD conserved domain (cd18813); members share this curated model.
