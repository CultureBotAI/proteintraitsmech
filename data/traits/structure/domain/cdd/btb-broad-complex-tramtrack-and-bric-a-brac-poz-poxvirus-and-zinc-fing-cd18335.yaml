identifier: CDD:cd18335
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 1 (KLHL1). KLHL1 is a neuronal actin-binding protein that modulates voltage-gated CaV2.1 (P/Q-type) and CaV3.2 (alpha1H T-type) calcium channels. It may play a role in organizing the actin cytoskeleton the brain cells. KLHL1 contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 1 (KLHL1). KLHL1 is a neuronal actin-binding protein that modulates voltage-gated CaV2.1 (P/Q-type) and CaV3.2 (alpha1H T-type) calcium channels. It may play a role in organizing the actin cytoskeleton the brain cells. KLHL1 contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18335); members share this curated model.
