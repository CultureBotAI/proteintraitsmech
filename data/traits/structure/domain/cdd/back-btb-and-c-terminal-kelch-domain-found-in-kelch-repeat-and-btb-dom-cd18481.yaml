identifier: CDD:cd18481
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch repeat and BTB domain-containing protein 4 (KBTBD4). KBTBD4, also termed BTB and kelch domain-containing protein 4 (BKLHD4), is a BTB-BACK-Kelch domain protein belonging to a large family of cullin-RING ubiquitin ligase adaptors that facilitate the ubiquitination of target substrates."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch repeat and BTB domain-containing protein 4 (KBTBD4). KBTBD4, also termed BTB and kelch domain-containing protein 4 (BKLHD4), is a BTB-BACK-Kelch domain protein belonging to a large family of cullin-RING ubiquitin ligase adaptors that facilitate the ubiquitination of target substrates. — an NCBI CDD conserved domain (cd18481); members share this curated model.
