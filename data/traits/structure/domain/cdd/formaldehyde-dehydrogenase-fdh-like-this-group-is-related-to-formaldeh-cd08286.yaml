identifier: CDD:cd08286
label: "formaldehyde dehydrogenase (FDH)-like. This group is related to formaldehyde dehydrogenase (FDH), which  is a member of the zinc-dependent/medium chain alcohol dehydrogenase family.  This family uses NAD(H) as a cofactor in the interconversion of alcohols and aldehydes, or ketones. Another member is identified as a dihydroxyacetone reductase. Like the zinc-dependent alcohol dehydrogenases (ADH) of the medium chain alcohol dehydrogenase/reductase family (MDR), tetrameric FDHs have a catalytic zinc that resides between the catalytic and NAD(H)binding domains and a structural zinc in a lobe of the catalytic domain. Unlike ADH, where NAD(P)(H) acts as a cofactor, NADH in FDH is a tightly bound redox cofactor (similar to nicotinamide proteins). The medium chain alcohol dehydrogenase family (MDR) has a NAD(P)(H)-binding domain in a Rossmann fold of a beta-alpha form. The N-terminal region typically has an all-beta catalytic domain. These proteins typically form dimers (typically higher plants, mammals) or tetramers (yeast, bacteria), and have 2 tightly bound zinc atoms per subunit."
definition: >-
  formaldehyde dehydrogenase (FDH)-like. This group is related to formaldehyde dehydrogenase (FDH), which is a member of the zinc-dependent/medium chain alcohol dehydrogenase family. This family uses NAD(H) as a cofactor in the interconversion of alcohols and aldehydes, or ketones. Another member is identified as a dihydroxyacetone reductase. Like the zinc-dependent alcohol dehydrogenases (ADH) of the medium chain alcohol dehydrogenase/reductase family (MDR), tetrameric FDHs have a catalytic zinc that resides between the catalytic and NAD(H)binding domains and a structural zinc in a lobe of the catalytic domain. Unlike ADH, where NAD(P)(H) acts as a cofactor, NADH in FDH is a tightly bound redox cofactor (similar to nicotinamide proteins). The medium chain alcohol dehydrogenase family (MDR) has a NAD(P)(H)-binding domain in a Rossmann fold of a beta-alpha form. The N-terminal region typically has an all-beta catalytic domain. These proteins typically form dimers (typically higher plants, mammals) or tetramers (yeast, bacteria), and have 2 tightly bound zinc atoms per subunit. — an NCBI CDD conserved domain (cd08286); members share this curated model.
