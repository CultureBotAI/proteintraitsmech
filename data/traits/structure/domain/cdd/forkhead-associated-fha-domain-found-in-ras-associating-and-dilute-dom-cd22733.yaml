identifier: CDD:cd22733
label: "forkhead associated (FHA) domain found in Ras-associating and dilute domain-containing protein (Radil). Radil acts as an important small GTPase Rap1 effector required for cell spreading and migration. It regulates neutrophil adhesion and motility through linking Rap1 to beta2-integrin activation. It contains an FHA domain. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in Ras-associating and dilute domain-containing protein (Radil). Radil acts as an important small GTPase Rap1 effector required for cell spreading and migration. It regulates neutrophil adhesion and motility through linking Rap1 to beta2-integrin activation. It contains an FHA domain. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22733); members share this curated model.
