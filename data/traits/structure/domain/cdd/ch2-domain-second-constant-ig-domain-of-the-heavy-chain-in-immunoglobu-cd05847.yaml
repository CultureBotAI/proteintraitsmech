identifier: CDD:cd05847
label: "CH2 domain (second constant Ig domain of the heavy chain) in immunoglobulin E (IgE); member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the second constant domain of the heavy chain of immunoglobulin E (IgE). The basic structure of immunoglobulin (Ig) molecules is a tetramer of two light chains and two heavy chains linked by disulfide bonds. There are two types of light chains: kappa and lambda; each is composed of a constant domain and a variable domain. There are five types of heavy chains: alpha, delta, epsilon, gamma, and mu, all consisting of a variable domain (VH) with three (alpha, delta, and gamma) or four (epsilon and mu) constant domains (CH1 to CH4). The different classes of antibodies vary in their heavy chains; the IgE class has the epsilon type. This domain (Cepsilon2) of IgE is in place of the flexible hinge region found in IgG."
definition: >-
  CH2 domain (second constant Ig domain of the heavy chain) in immunoglobulin E (IgE); member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the second constant domain of the heavy chain of immunoglobulin E (IgE). The basic structure of immunoglobulin (Ig) molecules is a tetramer of two light chains and two heavy chains linked by disulfide bonds. There are two types of light chains: kappa and lambda; each is composed of a constant domain and a variable domain. There are five types of heavy chains: alpha, delta, epsilon, gamma, and mu, all consisting of a variable domain (VH) with three (alpha, delta, and gamma) or four (epsilon and mu) constant domains (CH1 to CH4). The different classes of antibodies vary in their heavy chains; the IgE class has the epsilon type. This domain (Cepsilon2) of IgE is in place of the flexible hinge region found in IgG. — an NCBI CDD conserved domain (cd05847); members share this curated model.
