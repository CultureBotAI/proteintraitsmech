identifier: CDD:cd09459
label: "The third LIM domain of the Enigma Homolog (ENH) family. The third LIM domain of the Enigma Homolog (ENH) family: ENH was initially identified in rat brain. Same as enigma, it contains three LIM domains at the C-terminus and a PDZ domain at N-terminus. ENH is implicated in signal transduction processes involving protein kinases.  It has also been shown that ENH interacts with protein kinase D1 (PKD1) via its LIM domains and forms a complex with PKD1 and the alpha1C subunit of cardiac L-type voltage-gated calcium channel in rat neonatal cardiomyocytes. The N-terminal PDZ domain interacts with alpha-actinin at the Z-line. ENH is expressed in multiple tissues, such as skeletal muscle, heart, bone, and brain. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The third LIM domain of the Enigma Homolog (ENH) family. The third LIM domain of the Enigma Homolog (ENH) family: ENH was initially identified in rat brain. Same as enigma, it contains three LIM domains at the C-terminus and a PDZ domain at N-terminus. ENH is implicated in signal transduction processes involving protein kinases. It has also been shown that ENH interacts with protein kinase D1 (PKD1) via its LIM domains and forms a complex with PKD1 and the alpha1C subunit of cardiac L-type voltage-gated calcium channel in rat neonatal cardiomyocytes. The N-terminal PDZ domain interacts with alpha-actinin at the Z-line. ENH is expressed in multiple tissues, such as skeletal muscle, heart, bone, and brain. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09459); members share this curated model.
