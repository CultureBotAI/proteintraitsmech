identifier: CDD:cd19728
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in hypoxia-inducible factor 2-alpha (HIF2a) and similar proteins. HIF2a, also termed HIF-2-alpha, or HIF2-alpha, or endothelial PAS domain-containing protein 1 (EPAS-1), or Basic-helix-loop-helix-PAS protein MOP2, or Class E basic helix-loop-helix protein 73 (bHLHe73), or Member of PAS protein 2, or PAS domain-containing protein 2 (PASD2), or HIF-1-alpha-like factor (HLF), is a bHLH-PAS transcription factor involved in the induction of oxygen regulated genes."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in hypoxia-inducible factor 2-alpha (HIF2a) and similar proteins. HIF2a, also termed HIF-2-alpha, or HIF2-alpha, or endothelial PAS domain-containing protein 1 (EPAS-1), or Basic-helix-loop-helix-PAS protein MOP2, or Class E basic helix-loop-helix protein 73 (bHLHe73), or Member of PAS protein 2, or PAS domain-containing protein 2 (PASD2), or HIF-1-alpha-like factor (HLF), is a bHLH-PAS transcription factor involved in the induction of oxygen regulated genes. — an NCBI CDD conserved domain (cd19728); members share this curated model.
