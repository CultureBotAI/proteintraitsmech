identifier: CDD:cd18446
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 6 (KLHL6). KLHL6 is a BTB-kelch protein with a lymphoid tissue-restricted expression pattern. It belongs to the KLHL gene family, which is composed of an N-terminal BTB-POZ domain and four to six Kelch motifs in tandem. It is involved in B-lymphocyte antigen receptor signaling and germinal center formation."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 6 (KLHL6). KLHL6 is a BTB-kelch protein with a lymphoid tissue-restricted expression pattern. It belongs to the KLHL gene family, which is composed of an N-terminal BTB-POZ domain and four to six Kelch motifs in tandem. It is involved in B-lymphocyte antigen receptor signaling and germinal center formation. — an NCBI CDD conserved domain (cd18446); members share this curated model.
