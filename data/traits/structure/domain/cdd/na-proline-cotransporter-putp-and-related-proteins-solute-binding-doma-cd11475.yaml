identifier: CDD:cd11475
label: "Na(+)/proline cotransporter PutP and related proteins; solute binding domain. Escherichia coli PutP catalyzes the Na+-coupled uptake of proline with a stoichiometry of 1:1. The putP gene is part of the put operon; this operon in addition encodes a proline dehydrogenase, allowing the use of proline as a source of nitrogen and/or carbon. This subfamily also includes the Bacillus subtilis Na+/proline cotransporter (OpuE) which has an osmoprotective instead of catabolic role. Expression of the opuE gene is under osmotic control and different sigma factors contribute to its regulation; it is also a putative CcpA-activated gene. This subfamily belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  Na(+)/proline cotransporter PutP and related proteins; solute binding domain. Escherichia coli PutP catalyzes the Na+-coupled uptake of proline with a stoichiometry of 1:1. The putP gene is part of the put operon; this operon in addition encodes a proline dehydrogenase, allowing the use of proline as a source of nitrogen and/or carbon. This subfamily also includes the Bacillus subtilis Na+/proline cotransporter (OpuE) which has an osmoprotective instead of catabolic role. Expression of the opuE gene is under osmotic control and different sigma factors contribute to its regulation; it is also a putative CcpA-activated gene. This subfamily belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd11475); members share this curated model.
