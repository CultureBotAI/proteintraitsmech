identifier: CDD:cd10238
label: "nucleotide-binding domain (NBD) of heat shock 70 kDa protein 14 (HSPA14) and similar proteins. HSPA14, also called HSP70-like protein 1 (Hsp70L1), or heat shock protein HSP60, is a component of the ribosome-associated complex (RAC), a complex involved in folding or maintaining nascent polypeptides in a folding-competent state. In the RAC complex, HSPA14 binds to the nascent polypeptide chain, while DNAJC2 stimulates its ATPase activity. It belongs to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly and can direct incompetent \"client\" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis."
definition: >-
  nucleotide-binding domain (NBD) of heat shock 70 kDa protein 14 (HSPA14) and similar proteins. HSPA14, also called HSP70-like protein 1 (Hsp70L1), or heat shock protein HSP60, is a component of the ribosome-associated complex (RAC), a complex involved in folding or maintaining nascent polypeptides in a folding-competent state. In the RAC complex, HSPA14 binds to the nascent polypeptide chain, while DNAJC2 stimulates its ATPase activity. It belongs to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly and can direct incompetent "client" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. — an NCBI CDD conserved domain (cd10238); members share this curated model.
