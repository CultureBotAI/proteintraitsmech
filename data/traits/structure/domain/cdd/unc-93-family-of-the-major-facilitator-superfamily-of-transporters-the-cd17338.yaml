identifier: CDD:cd17338
label: "Unc-93 family of the Major Facilitator Superfamily of transporters. The Unc-93 family is composed of Caenorhabditis elegans uncoordinated protein 93 (also called putative potassium channel regulatory protein unc-93) and similar proteins including three vertebrate members: protein unc-93 homolog A (UNC93A), protein unc-93 homolog B1 (UNC93B1), and UNC93-like protein MFSD11 (also called major facilitator superfamily domain-containing protein 11 or protein ET). Unc-93 acts as a regulatory subunit of a multi-subunit  potassium channel complex that may function in coordinating muscle contraction in C. elegans. The human UNC93A gene is located in a region of the genome that is frequently associated with ovarian cancer, however, there is no evidence that UNC93A has a tumor suppressor function. UNC93B1 controls intracellular trafficking and transport of a subset of Toll-like receptors (TLRs), including TLR3, TLR7 and TLR9, from the endoplasmic reticulum to endolysosomes where they can engage pathogen nucleotides and activate signaling cascades. MFSD11 is ubiquitously expressed in the periphery and the central nervous system of mice, where it is expressed in excitatory and inhibitory mouse brain neurons. The unc93-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Unc-93 family of the Major Facilitator Superfamily of transporters. The Unc-93 family is composed of Caenorhabditis elegans uncoordinated protein 93 (also called putative potassium channel regulatory protein unc-93) and similar proteins including three vertebrate members: protein unc-93 homolog A (UNC93A), protein unc-93 homolog B1 (UNC93B1), and UNC93-like protein MFSD11 (also called major facilitator superfamily domain-containing protein 11 or protein ET). Unc-93 acts as a regulatory subunit of a multi-subunit potassium channel complex that may function in coordinating muscle contraction in C. elegans. The human UNC93A gene is located in a region of the genome that is frequently associated with ovarian cancer, however, there is no evidence that UNC93A has a tumor suppressor function. UNC93B1 controls intracellular trafficking and transport of a subset of Toll-like receptors (TLRs), including TLR3, TLR7 and TLR9, from the endoplasmic reticulum to endolysosomes where they can engage pathogen nucleotides and activate signaling cascades. MFSD11 is ubiquitously expressed in the periphery and the central nervous system of mice, where it is expressed in excitatory and inhibitory mouse brain neurons. The unc93-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17338); members share this curated model.
