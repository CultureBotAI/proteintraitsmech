identifier: CDD:cd06868
label: "The phosphoinositide binding Phox Homology domain of HS1BP3. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Hematopoietic lineage cell-specific protein-1 (HS1) binding protein 3 (HS1BP3) associates with HS1 proteins through their SH3 domains, suggesting a role in mediating signaling. It has been reported that HS1BP3 might affect the IL-2 signaling pathway in hematopoietic lineage cells. Mutations in HS1BP3 may also be associated with familial Parkinson disease and essential tremor. HS1BP3 contains a PX domain, a leucine zipper, motifs similar to immunoreceptor tyrosine-based inhibitory motif and proline-rich regions. The PX domain interacts with PIs and plays a role in targeting proteins to PI-enriched membranes."
definition: >-
  The phosphoinositide binding Phox Homology domain of HS1BP3. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Hematopoietic lineage cell-specific protein-1 (HS1) binding protein 3 (HS1BP3) associates with HS1 proteins through their SH3 domains, suggesting a role in mediating signaling. It has been reported that HS1BP3 might affect the IL-2 signaling pathway in hematopoietic lineage cells. Mutations in HS1BP3 may also be associated with familial Parkinson disease and essential tremor. HS1BP3 contains a PX domain, a leucine zipper, motifs similar to immunoreceptor tyrosine-based inhibitory motif and proline-rich regions. The PX domain interacts with PIs and plays a role in targeting proteins to PI-enriched membranes. — an NCBI CDD conserved domain (cd06868); members share this curated model.
