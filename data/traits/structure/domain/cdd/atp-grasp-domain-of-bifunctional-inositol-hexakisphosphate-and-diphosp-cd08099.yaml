identifier: CDD:cd08099
label: "ATP-grasp domain of bifunctional inositol hexakisphosphate and diphosphoinositol-pentakisphosphate kinase. ATP-grasp domain of a bifunctional enzyme with two kinase activities. Inositolitol hexakisphosphate kinase (InsP6K, EC 2.7.4.21) converts inositol hexakisphosphate (InsP6) to inositol pentakisphosphate, and inositol pentakisphosphate to inositol tetrakisphosphate. The second enzymatic activity is diphosphoinositol-pentakisphosphate kinase (PP-IP5K, EC 2.7.4.24) which converts inositol 5-diphosphate pentakisphosphate (PP-IP5) to inositol bisdiphosphate tetrakisphosphate. All reactions require the presence of ATP, and the catalytic center is part of the ATP-grasp domain which is present at the N-terminal end. This family includes Vip1 and Asp1 from Schizosaccharomyces pombe, and hsVIP1 and hsVIP2 from human. The kinase activity is dependent on the conserved aspartic acid residue which is extensively conserved among eukaryotes. Members of this family are found only in eukaryotes."
definition: >-
  ATP-grasp domain of bifunctional inositol hexakisphosphate and diphosphoinositol-pentakisphosphate kinase. ATP-grasp domain of a bifunctional enzyme with two kinase activities. Inositolitol hexakisphosphate kinase (InsP6K, EC 2.7.4.21) converts inositol hexakisphosphate (InsP6) to inositol pentakisphosphate, and inositol pentakisphosphate to inositol tetrakisphosphate. The second enzymatic activity is diphosphoinositol-pentakisphosphate kinase (PP-IP5K, EC 2.7.4.24) which converts inositol 5-diphosphate pentakisphosphate (PP-IP5) to inositol bisdiphosphate tetrakisphosphate. All reactions require the presence of ATP, and the catalytic center is part of the ATP-grasp domain which is present at the N-terminal end. This family includes Vip1 and Asp1 from Schizosaccharomyces pombe, and hsVIP1 and hsVIP2 from human. The kinase activity is dependent on the conserved aspartic acid residue which is extensively conserved among eukaryotes. Members of this family are found only in eukaryotes. — an NCBI CDD conserved domain (cd08099); members share this curated model.
