identifier: CDD:cd08782
label: "Death domain found in death-associated protein kinase 1. Death domain (DD) found in death-associated protein kinase 1 (DAPK1). DAPK1 is composed of several functional domains, including a kinase domain, a CaM regulatory domain, ankyrin repeats, a cytoskeletal-binding domain and a C-terminal DD. It plays important roles in a diverse range of signal transduction pathways including apoptosis, growth factor signalling, and autophagy. Loss of DAPK1 expression, usually because of DNA methylation, is implicated in many tumor types. DAPK1 is highly abundant in the brain and has also been associated with neurodegeneration. In general, DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Death domain found in death-associated protein kinase 1. Death domain (DD) found in death-associated protein kinase 1 (DAPK1). DAPK1 is composed of several functional domains, including a kinase domain, a CaM regulatory domain, ankyrin repeats, a cytoskeletal-binding domain and a C-terminal DD. It plays important roles in a diverse range of signal transduction pathways including apoptosis, growth factor signalling, and autophagy. Loss of DAPK1 expression, usually because of DNA methylation, is implicated in many tumor types. DAPK1 is highly abundant in the brain and has also been associated with neurodegeneration. In general, DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08782); members share this curated model.
