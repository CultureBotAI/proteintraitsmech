identifier: CDD:cd17057
label: "ubiquitin-like (Ubl) domain found in transmembrane and ubiquitin-like domain-containing proteins TMUB1, TMUB2, and similar proteins. TMUB1, also termed dendritic cell-derived ubiquitin-like protein (DULP), or hepatocyte odd protein shuttling protein, or ubiquitin-like protein SB144, or HOPS, is highly expressed in the nervous system. It is involved in the termination of liver regeneration and plays a negative role in interleukin-6-induced hepatocyte proliferation. The overexpression of Tmub1 has been shown to play a role in the inhibition of cell proliferation. TMUB1 has been implicated in the regulation of locomotor activity and wakefulness in mice, perhaps acting through its interaction with CAMLG. It also facilitates the recycling of AMPA receptors into synaptic membrane in cultured primary neurons. TMUB1 contains transmembrane domains and a ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold. TMUB2 is an uncharacterized transmembrane domain and Ubl domain-containing protein that shows high sequence similarity to TMUB1."
definition: >-
  ubiquitin-like (Ubl) domain found in transmembrane and ubiquitin-like domain-containing proteins TMUB1, TMUB2, and similar proteins. TMUB1, also termed dendritic cell-derived ubiquitin-like protein (DULP), or hepatocyte odd protein shuttling protein, or ubiquitin-like protein SB144, or HOPS, is highly expressed in the nervous system. It is involved in the termination of liver regeneration and plays a negative role in interleukin-6-induced hepatocyte proliferation. The overexpression of Tmub1 has been shown to play a role in the inhibition of cell proliferation. TMUB1 has been implicated in the regulation of locomotor activity and wakefulness in mice, perhaps acting through its interaction with CAMLG. It also facilitates the recycling of AMPA receptors into synaptic membrane in cultured primary neurons. TMUB1 contains transmembrane domains and a ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold. TMUB2 is an uncharacterized transmembrane domain and Ubl domain-containing protein that shows high sequence similarity to TMUB1. — an NCBI CDD conserved domain (cd17057); members share this curated model.
