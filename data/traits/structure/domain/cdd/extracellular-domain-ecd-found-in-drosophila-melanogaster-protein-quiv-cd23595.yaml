identifier: CDD:cd23595
label: "extracellular domain (ECD) found in Drosophila melanogaster protein quiver and similar proteins. Quiver (Qvr, also called protein SLEEPLESS) is a glycosylphosphatidylinositol (GPI)-anchored protein required for homeostatic regulation of sleep under normal conditions and after sleep deprivation in Drosophila. It is a bifunctional regulator of excitability and cholinergic synaptic transmission. It is critical for regulating the levels, localization, and activity of the sleep-modulating potassium channel Shaker. Quiver is a member of the Drosophila Ly6 superfamily. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
