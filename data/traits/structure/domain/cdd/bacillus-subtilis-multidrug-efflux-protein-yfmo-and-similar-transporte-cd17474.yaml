identifier: CDD:cd17474
label: "Bacillus subtilis multidrug efflux protein YfmO and similar transporters of the Major Facilitator Superfamily. This family is composed of Bacillus subtilis multidrug efflux protein YfmO, bacillibactin exporter YmfD/YmfE, uncharacterized MFS-type transporter YvmA, and similar proteins. YfmO acts to efflux copper or a copper complex, and could contribute to copper resistance. YmfD/YmfE is involved in secretion of bacillibactin. The YfmO-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Bacillus subtilis multidrug efflux protein YfmO and similar transporters of the Major Facilitator Superfamily. This family is composed of Bacillus subtilis multidrug efflux protein YfmO, bacillibactin exporter YmfD/YmfE, uncharacterized MFS-type transporter YvmA, and similar proteins. YfmO acts to efflux copper or a copper complex, and could contribute to copper resistance. YmfD/YmfE is involved in secretion of bacillibactin. The YfmO-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17474); members share this curated model.
