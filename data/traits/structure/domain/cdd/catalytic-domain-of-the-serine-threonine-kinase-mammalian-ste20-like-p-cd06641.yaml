identifier: CDD:cd06641
label: "Catalytic domain of the Serine/Threonine Kinase, Mammalian Ste20-like protein kinase 3. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MST3 phosphorylates the STK NDR and may play a role in cell cycle progression and cell morphology. It may also regulate paxillin and consequently, cell migration. MST3 is present in human placenta, where it plays an essential role in the oxidative stress-induced apoptosis of trophoblasts in normal spontaneous delivery. Dysregulation of trophoblast apoptosis may result in pregnancy complications such as preeclampsia and intrauterine growth retardation. The MST3 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Mammalian Ste20-like protein kinase 3. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MST3 phosphorylates the STK NDR and may play a role in cell cycle progression and cell morphology. It may also regulate paxillin and consequently, cell migration. MST3 is present in human placenta, where it plays an essential role in the oxidative stress-induced apoptosis of trophoblasts in normal spontaneous delivery. Dysregulation of trophoblast apoptosis may result in pregnancy complications such as preeclampsia and intrauterine growth retardation. The MST3 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06641); members share this curated model.
