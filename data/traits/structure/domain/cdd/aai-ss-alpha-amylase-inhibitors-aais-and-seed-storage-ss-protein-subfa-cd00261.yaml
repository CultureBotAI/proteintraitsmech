identifier: CDD:cd00261
label: "AAI_SS: Alpha-Amylase Inhibitors (AAIs) and Seed Storage (SS) Protein subfamily; composed of cereal-type AAIs and SS proteins. They are mainly present in the seeds of a variety of plants. AAIs play an important role in the natural defenses of plants against insects and pathogens such as fungi, bacteria and viruses. AAIs impede the digestion of plant starch and proteins by inhibiting digestive alpha-amylases and proteinases. Also included in this subfamily are SS proteins such as 2S albumin, gamma-gliadin, napin, and prolamin. These AAIs and SS proteins are also known allergens in humans."
definition: >-
