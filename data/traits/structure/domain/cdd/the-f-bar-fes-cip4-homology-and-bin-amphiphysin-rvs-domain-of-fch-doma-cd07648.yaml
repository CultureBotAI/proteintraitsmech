identifier: CDD:cd07648
label: "The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of FCH domain Only proteins. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Proteins in this group have been named FCH domain Only (FCHO) proteins. Vertebrates have two members, FCHO1 and FCHO2. These proteins contain an F-BAR domain and a C-terminal domain of unknown function named SAFF which is also present in endophilin interacting protein 1. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules."
definition: >-
  The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of FCH domain Only proteins. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Proteins in this group have been named FCH domain Only (FCHO) proteins. Vertebrates have two members, FCHO1 and FCHO2. These proteins contain an F-BAR domain and a C-terminal domain of unknown function named SAFF which is also present in endophilin interacting protein 1. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. — an NCBI CDD conserved domain (cd07648); members share this curated model.
