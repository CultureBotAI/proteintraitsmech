identifier: CDD:cd18268
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 38 (KLHL38). KLHL38 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. The KLHL38 gene is significantly up-regulated during diapause, a temporary arrest of development during early ontogeny. It may also function in preadipocyte differentiation in the chicken. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 38 (KLHL38). KLHL38 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. The KLHL38 gene is significantly up-regulated during diapause, a temporary arrest of development during early ontogeny. It may also function in preadipocyte differentiation in the chicken. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18268); members share this curated model.
