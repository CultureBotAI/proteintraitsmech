identifier: CDD:cd23655
label: "mS61 domain protein found in trypanosomal mitochondrial ribosomes, and similar proteins. mS61 protein is a mitochondrial protein found in Trypanosoma, but its function has not yet been fully characterized. It is known to be a component of the small subunits of the Trypanosoma mitochondrial ribosome (Tb-mt-SSUs) and interacts with the C-terminal domain (CTD) of initiation factor IF-3 to form a complex called Tb-mt-SSU/IF-3. This complex may play a role in the maturation of the mitochondrial ribosome. The mS61 domain protein also shows sequence similarity to trans-sialidase found in Trypanosoma as well as Perkinsela, an endosymbiotic kinetoplastid. However, while both the mitochondrial ms61 protein and trans-sialidase are proteins involved in cellular processes, they are not thought to have a common evolutionary origin or functional relationship."
