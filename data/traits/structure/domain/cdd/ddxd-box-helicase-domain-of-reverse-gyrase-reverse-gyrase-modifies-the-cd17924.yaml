identifier: CDD:cd17924
label: "DDXD-box helicase domain of reverse gyrase. Reverse gyrase modifies the topological state of DNA by introducing positive supercoils in an ATP-dependent process. Reverse gyrase belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DDXD-box helicase domain of reverse gyrase. Reverse gyrase modifies the topological state of DNA by introducing positive supercoils in an ATP-dependent process. Reverse gyrase belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17924); members share this curated model.
