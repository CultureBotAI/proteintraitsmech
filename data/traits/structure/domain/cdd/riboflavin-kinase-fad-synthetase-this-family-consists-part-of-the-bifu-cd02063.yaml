identifier: CDD:cd02063
label: "Riboflavin kinase/FAD synthetase. This family consists part of the bifunctional enzyme riboflavin kinase/FAD synthetase. These enzymes have both ATP:riboflavin 5'-phospho transferase and ATP:FMN-adenylyltransferase activitys. They catalyse the 5'-phosphorylation of riboflavin to FMN and the adenylylation of FMN to FAD. CAUTION: It is not clear if this region of the enzymes catalyses either or both of the enzymatic reactions."
definition: >-
  Riboflavin kinase/FAD synthetase. This family consists part of the bifunctional enzyme riboflavin kinase/FAD synthetase. These enzymes have both ATP:riboflavin 5'-phospho transferase and ATP:FMN-adenylyltransferase activitys. They catalyse the 5'-phosphorylation of riboflavin to FMN and the adenylylation of FMN to FAD. CAUTION: It is not clear if this region of the enzymes catalyses either or both of the enzymatic reactions. — an NCBI CDD conserved domain (cd02063); members share this curated model.
