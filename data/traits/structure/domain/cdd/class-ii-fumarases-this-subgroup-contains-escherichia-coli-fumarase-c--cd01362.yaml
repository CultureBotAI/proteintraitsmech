identifier: CDD:cd01362
label: "Class II fumarases. This subgroup contains Escherichia coli fumarase C, human mitochondrial fumarase, and related proteins.  It is a member of the Lyase class I family. Members of this family for the most part catalyze similar beta-elimination reactions in which a C-N or C-O bond is cleaved with the release of fumarate as one of the products. These proteins are active as tetramers. The four active sites of the homotetrameric enzyme are each formed by residues from three different subunits. Fumarase catalyzes the reversible hydration/dehydration of fumarate to L-malate during the Krebs cycle."
definition: >-
  Class II fumarases. This subgroup contains Escherichia coli fumarase C, human mitochondrial fumarase, and related proteins. It is a member of the Lyase class I family. Members of this family for the most part catalyze similar beta-elimination reactions in which a C-N or C-O bond is cleaved with the release of fumarate as one of the products. These proteins are active as tetramers. The four active sites of the homotetrameric enzyme are each formed by residues from three different subunits. Fumarase catalyzes the reversible hydration/dehydration of fumarate to L-malate during the Krebs cycle. — an NCBI CDD conserved domain (cd01362); members share this curated model.
