label: "RING finger, H2 subclass, found in Arabidopsis thaliana protein SUGAR INSENSITIVE 3 (SIS3) and similar proteins. SIS3 is an E3 ubiquitin-protein ligase that acts as a positive regulator of sugar signaling during early seedling development. SIS3 contains a C3H2C3-type RING-H2 finger."
