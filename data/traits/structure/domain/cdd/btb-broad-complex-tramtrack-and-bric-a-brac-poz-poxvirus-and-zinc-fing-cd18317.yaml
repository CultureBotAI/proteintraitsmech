identifier: CDD:cd18317
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in voltage-gated potassium (Kv) channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. This family includes several groups of alpha subunits such as KCNA/Kv1 family of Shaker-type Kv channels, KCNB/Kv2 family of Shab-type Kv channels, KCNC/Kv3 family of Shaw-type Kv channels, KCND/Kv4 family of Shal-type Kv channels, KCNF/Kv5 subfamily of Kv channels, KCNG/Kv6 subfamily of Kv channels, KCNV/Kv8 subfamily of Kv channels, and KCNS/Kv9 subfamily of Kv channels. Kv alpha subunits form functional homo- or hetero-tetrameric channels (typically with other alpha subunits from the same subfamily) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. KCNQ/Kv7 channels are not included in this family, since they do not contain a BTB/POZ domain."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in voltage-gated potassium (Kv) channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. This family includes several groups of alpha subunits such as KCNA/Kv1 family of Shaker-type Kv channels, KCNB/Kv2 family of Shab-type Kv channels, KCNC/Kv3 family of Shaw-type Kv channels, KCND/Kv4 family of Shal-type Kv channels, KCNF/Kv5 subfamily of Kv channels, KCNG/Kv6 subfamily of Kv channels, KCNV/Kv8 subfamily of Kv channels, and KCNS/Kv9 subfamily of Kv channels. Kv alpha subunits form functional homo- or hetero-tetrameric channels (typically with other alpha subunits from the same subfamily) through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. KCNQ/Kv7 channels are not included in this family, since they do not contain a BTB/POZ domain. — an NCBI CDD conserved domain (cd18317); members share this curated model.
