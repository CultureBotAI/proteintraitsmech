identifier: CDD:cd19506
label: "ATPase domain of IQ and AAA domain-containing protein 1 (IQCA1). IQCA1 (also known as dynein regulatory complex subunit 11, DRC11 and IQCA) is an ATPase subunit of the nexin-dynein regulatory complex (N-DRC). The 9 + 2 axoneme of most motile cilia and flagella consists of nine outer doublet microtubules arranged in a ring surrounding a central pair of two singlet microtubules. The N-DRC complex maintains alignment between outer doublet microtubules and limits microtubule sliding in motile axonemes. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATPase domain of IQ and AAA domain-containing protein 1 (IQCA1). IQCA1 (also known as dynein regulatory complex subunit 11, DRC11 and IQCA) is an ATPase subunit of the nexin-dynein regulatory complex (N-DRC). The 9 + 2 axoneme of most motile cilia and flagella consists of nine outer doublet microtubules arranged in a ring surrounding a central pair of two singlet microtubules. The N-DRC complex maintains alignment between outer doublet microtubules and limits microtubule sliding in motile axonemes. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19506); members share this curated model.
