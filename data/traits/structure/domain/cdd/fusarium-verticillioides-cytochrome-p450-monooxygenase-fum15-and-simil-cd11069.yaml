identifier: CDD:cd11069
label: "Fusarium verticillioides cytochrome P450 monooxygenase FUM15, and similar cytochrome P450s. Fusarium verticillioides cytochrome P450 monooxygenase FUM15, is also called fumonisin biosynthesis cluster protein 15. The FUM15 gene is part of the gene cluster that mediates the biosynthesis of fumonisins B1, B2, B3, and B4, which are carcinogenic mycotoxins. This FUM15-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  Fusarium verticillioides cytochrome P450 monooxygenase FUM15, and similar cytochrome P450s. Fusarium verticillioides cytochrome P450 monooxygenase FUM15, is also called fumonisin biosynthesis cluster protein 15. The FUM15 gene is part of the gene cluster that mediates the biosynthesis of fumonisins B1, B2, B3, and B4, which are carcinogenic mycotoxins. This FUM15-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11069); members share this curated model.
