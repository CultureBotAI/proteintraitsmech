identifier: CDD:cd17715
label: "BRCT domain of DNA polymerase lambda and similar proteins. DNA polymerase lambda, also termed Pol Lambda, or DNA polymerase beta-2 (Pol beta2), or DNA polymerase kappa, is involved in base excision repair (BER) and is responsible for repair of lesions that give rise to abasic (AP) sites in DNA. It also contributes to DNA double-strand break repair by non-homologous end joining and homologous recombination. DNA polymerase lambda has both template-dependent and template-independent (terminal transferase) DNA polymerase activities, as well as a 5'-deoxyribose-5-phosphate lyase (dRP lyase) activity. DNA polymerase lambda contains one BRCT domain."
definition: >-
  BRCT domain of DNA polymerase lambda and similar proteins. DNA polymerase lambda, also termed Pol Lambda, or DNA polymerase beta-2 (Pol beta2), or DNA polymerase kappa, is involved in base excision repair (BER) and is responsible for repair of lesions that give rise to abasic (AP) sites in DNA. It also contributes to DNA double-strand break repair by non-homologous end joining and homologous recombination. DNA polymerase lambda has both template-dependent and template-independent (terminal transferase) DNA polymerase activities, as well as a 5'-deoxyribose-5-phosphate lyase (dRP lyase) activity. DNA polymerase lambda contains one BRCT domain. — an NCBI CDD conserved domain (cd17715); members share this curated model.
