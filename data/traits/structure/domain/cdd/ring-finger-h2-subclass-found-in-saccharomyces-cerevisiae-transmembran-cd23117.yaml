identifier: CDD:cd23117
label: "RING finger, H2 subclass, found in Saccharomyces cerevisiae transmembrane E3 ubiquitin-protein ligase 1 (TUL1) and similar proteins. This subfamily includes Saccharomyces cerevisiae TUL1, Schizosaccharomyces pombe DSC E3 ubiquitin ligase complex subunit 1 (DSC1), and Arabidopsis thaliana protein FLYING SAUCER 2 (FLY2). TUL1 is the catalytic component of DSC E3 ubiquitin ligase complexes that tag proteins present in Golgi, endosome and vacuole membranes and function in protein homeostasis under non-stress conditions, and support a role in protein quality control. It mediates ubiquitination of vacuolar proteins such as CPS1, PPN1, PEP12 and other proteins containing exposed hydrophilic residues within their transmembrane domains, leading to their sorting into internal vesicles in late endosomes. TUL1 also targets the unpalmitoylated endosomal SNARE TLG1 to the multivesicular body (MVB) pathway. DSC1, also known as defective for SREBP cleavage protein 1, is the catalytic component of the DSC E3 ubiquitin ligase complex required for the sre1 transcriptional activator proteolytic cleavage to release the soluble transcription factor from the membrane in low oxygen or sterol conditions. FLY2 acts as an E3 ubiquitin-protein ligase that may be involved in xylem development. Members of this subfamily contain a C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Saccharomyces cerevisiae transmembrane E3 ubiquitin-protein ligase 1 (TUL1) and similar proteins. This subfamily includes Saccharomyces cerevisiae TUL1, Schizosaccharomyces pombe DSC E3 ubiquitin ligase complex subunit 1 (DSC1), and Arabidopsis thaliana protein FLYING SAUCER 2 (FLY2). TUL1 is the catalytic component of DSC E3 ubiquitin ligase complexes that tag proteins present in Golgi, endosome and vacuole membranes and function in protein homeostasis under non-stress conditions, and support a role in protein quality control. It mediates ubiquitination of vacuolar proteins such as CPS1, PPN1, PEP12 and other proteins containing exposed hydrophilic residues within their transmembrane domains, leading to their sorting into internal vesicles in late endosomes. TUL1 also targets the unpalmitoylated endosomal SNARE TLG1 to the multivesicular body (MVB) pathway. DSC1, also known as defective for SREBP cleavage protein 1, is the catalytic component of the DSC E3 ubiquitin ligase complex required for the sre1 transcriptional activator proteolytic cleavage to release the soluble transcription factor from the membrane in low oxygen or sterol conditions. FLY2 acts as an E3 ubiquitin-protein ligase that may be involved in xylem development. Members of this subfamily contain a C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd23117); members share this curated model.
