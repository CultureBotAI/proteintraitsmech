identifier: CDD:cd19147
label: "Phanerochaete chrysosporium aryl-alcohol dehydrogenase [NADP(+)] (AAD) and similar proteins. Phanerochaete chrysosporium ADD (EC1.1.1.91) is a founding member of aldo-keto reductase family 9 member A3. It is involved in lignin degradation and reduces aromatic benzaldehydes to their respective alcohols in the presence of NADP(H). This family also includes Saccharomyces cerevisiae aryl-alcohol dehydrogenases AAD14p, AAD3p, AAD4p, and AAD10p, which are founding members of aldo-keto reductase family 9 member B1-4 (AKR9B1-4), respectively."
definition: >-
  Phanerochaete chrysosporium aryl-alcohol dehydrogenase [NADP(+)] (AAD) and similar proteins. Phanerochaete chrysosporium ADD (EC1.1.1.91) is a founding member of aldo-keto reductase family 9 member A3. It is involved in lignin degradation and reduces aromatic benzaldehydes to their respective alcohols in the presence of NADP(H). This family also includes Saccharomyces cerevisiae aryl-alcohol dehydrogenases AAD14p, AAD3p, AAD4p, and AAD10p, which are founding members of aldo-keto reductase family 9 member B1-4 (AKR9B1-4), respectively. — an NCBI CDD conserved domain (cd19147); members share this curated model.
