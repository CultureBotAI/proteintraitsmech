identifier: CDD:cd17514
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to Escherichia coli ST2747 S subunit (S.Eco2747I) TRD2-CR2, Methanococcus maripaludis C7 S subunit (S.MmaC7ORF19P) TRD1-CR1, and related domains. The S. Eco2747I S subunit recognizes 5'... CACNNNNNNNGTTG ... 3'. The recognition sequence of Methanococcus maripaludis C7 S subunit (S.MmaC7ORF19P) is undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This CD contains both TRD1-CR1 and TRD2-CR2. It also includes the TRD-CR-like domains of putative type II restriction enzymes and methyltransferases, such as Helicobacter cinaedi PAGU611 Hci611ORFHP which may recognize 5'... GAGNNNNNGT ... 3', and type I N6-adenine DNA methyltransferases, such as Calditerrivibrio nitroreducens M.Cni19672ORF1405P whose recognition sequence is undetermined."
