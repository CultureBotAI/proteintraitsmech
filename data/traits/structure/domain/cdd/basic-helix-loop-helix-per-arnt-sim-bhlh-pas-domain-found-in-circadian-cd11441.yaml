identifier: CDD:cd11441
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Circadian locomotor output cycles protein kaput (CLOCK) and similar proteins. The family includes CLOCK, neuronal PAS domain-containing protein 2 (NPAS2) and non-mammalian circadian clock protein PASD1. CLOCK, also termed Class E basic helix-loop-helix protein 8 (bHLHe8), is a transcriptional activator which forms a core component of the circadian clock. NPAS2, also termed neuronal PAS2, or basic-helix-loop-helix-PAS protein MOP4, or Class E basic helix-loop-helix protein 9 (bHLHe9), or member of PAS protein 4, or PAS domain-containing protein 4, is a transcriptional activator which forms a core component of the circadian clock. PASD1 is evolutionarily related to Circadian locomotor output cycles protein kaput (CLOCK)and functions as a suppressor of the biological clock that drives the daily circadian rhythms of cells throughout the body."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Circadian locomotor output cycles protein kaput (CLOCK) and similar proteins. The family includes CLOCK, neuronal PAS domain-containing protein 2 (NPAS2) and non-mammalian circadian clock protein PASD1. CLOCK, also termed Class E basic helix-loop-helix protein 8 (bHLHe8), is a transcriptional activator which forms a core component of the circadian clock. NPAS2, also termed neuronal PAS2, or basic-helix-loop-helix-PAS protein MOP4, or Class E basic helix-loop-helix protein 9 (bHLHe9), or member of PAS protein 4, or PAS domain-containing protein 4, is a transcriptional activator which forms a core component of the circadian clock. PASD1 is evolutionarily related to Circadian locomotor output cycles protein kaput (CLOCK)and functions as a suppressor of the biological clock that drives the daily circadian rhythms of cells throughout the body. — an NCBI CDD conserved domain (cd11441); members share this curated model.
