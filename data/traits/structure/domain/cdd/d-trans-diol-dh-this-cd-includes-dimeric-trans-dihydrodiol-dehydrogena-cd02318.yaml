identifier: CDD:cd02318
label: "D-trans-diol-DH. This CD includes dimeric trans-dihydrodiol dehydrogenases (D-trans-diol-DH) which catalyze the NADP+-linked oxidation of trans-dihydrodiols of aromatic hydrocarbons to the corresponding catechols; and other similar sequences.These proteins appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and are member of the glucose-fructose oxidoreductase family of proteins."
definition: >-
  D-trans-diol-DH. This CD includes dimeric trans-dihydrodiol dehydrogenases (D-trans-diol-DH) which catalyze the NADP+-linked oxidation of trans-dihydrodiols of aromatic hydrocarbons to the corresponding catechols; and other similar sequences.These proteins appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and are member of the glucose-fructose oxidoreductase family of proteins. — an NCBI CDD conserved domain (cd02318); members share this curated model.
