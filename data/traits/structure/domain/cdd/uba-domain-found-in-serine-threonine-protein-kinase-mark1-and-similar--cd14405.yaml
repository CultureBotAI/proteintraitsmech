identifier: CDD:cd14405
label: "UBA domain found in serine/threonine-protein kinase MARK1 and similar proteins. MARK1, also called MAP/microtubule affinity-regulating kinase 1 or PAR1 homolog c (Par-1c), is a kinase-regulating microtubule-dependent transport in axons and dendrites. It is involved in the specification of neuronal polarity, in axon-dendrite specification, and in the synaptic plasticity in adult neurons. It has been implicated in Alzheimer's disease, cancer, and autism."
definition: >-
  UBA domain found in serine/threonine-protein kinase MARK1 and similar proteins. MARK1, also called MAP/microtubule affinity-regulating kinase 1 or PAR1 homolog c (Par-1c), is a kinase-regulating microtubule-dependent transport in axons and dendrites. It is involved in the specification of neuronal polarity, in axon-dendrite specification, and in the synaptic plasticity in adult neurons. It has been implicated in Alzheimer's disease, cancer, and autism. — an NCBI CDD conserved domain (cd14405); members share this curated model.
