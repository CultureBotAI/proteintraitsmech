identifier: CDD:cd22105
label: "F-box domain found in F-box only protein 34 (FBXO34), F-box only protein 46 (FBXO46) and similar proteins. This family includes FBXO34 (also called FBX34) and FBXO46 (also called FBX46), both of which are substrate-recognition components of SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complexes. The SCF(FBOX46) complex mediates degradation of the tumor suppressor FBXO31 and thereby prevents premature cellular senescence. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 34 (FBXO34), F-box only protein 46 (FBXO46) and similar proteins. This family includes FBXO34 (also called FBX34) and FBXO46 (also called FBX46), both of which are substrate-recognition components of SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complexes. The SCF(FBOX46) complex mediates degradation of the tumor suppressor FBXO31 and thereby prevents premature cellular senescence. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22105); members share this curated model.
