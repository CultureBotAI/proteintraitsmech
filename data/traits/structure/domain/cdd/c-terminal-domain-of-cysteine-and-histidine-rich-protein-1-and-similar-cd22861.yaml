identifier: CDD:cd22861
label: "C-terminal domain of cysteine and histidine-rich protein 1 and similar proteins. Cysteine and histidine-rich protein 1 (CYHR1) was first identified as an interaction partner of murine galectin-3. Its biological function is still unknown, but it has been shown to be a prognostic marker for esophageal squamous cell carcinoma and a biomarker in hemodialysis patients for the response to erythropoietin. CYHR1 contains an N-terminal C3HC4-type RING-HC finger. This model represents the conserved C-terminal domain of unknown function."
definition: >-
  C-terminal domain of cysteine and histidine-rich protein 1 and similar proteins. Cysteine and histidine-rich protein 1 (CYHR1) was first identified as an interaction partner of murine galectin-3. Its biological function is still unknown, but it has been shown to be a prognostic marker for esophageal squamous cell carcinoma and a biomarker in hemodialysis patients for the response to erythropoietin. CYHR1 contains an N-terminal C3HC4-type RING-HC finger. This model represents the conserved C-terminal domain of unknown function. — an NCBI CDD conserved domain (cd22861); members share this curated model.
