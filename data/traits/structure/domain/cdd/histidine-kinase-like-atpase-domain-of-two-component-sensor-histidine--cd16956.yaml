identifier: CDD:cd16956
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli YehU. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) including Escherichia coli YehU, a HK of the two-component system (TCS) YehU-YehT which is involved in a nutrient sensing regulatory network. Proteins having this HATPase domain also contain a histidine kinase domain (His-kinase); some have a GAF sensor domain while some have a cupin domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli YehU. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) including Escherichia coli YehU, a HK of the two-component system (TCS) YehU-YehT which is involved in a nutrient sensing regulatory network. Proteins having this HATPase domain also contain a histidine kinase domain (His-kinase); some have a GAF sensor domain while some have a cupin domain. — an NCBI CDD conserved domain (cd16956); members share this curated model.
