identifier: CDD:cd20495
label: "peptidase C58 domain of Photorhabdus asymbiotica toxin PaTox and LifA/Efa1-related large cytotoxin, and similar proteins. This subfamily includes the cysteine protease domain of Photorhabdus asymbiotica toxin PaTox, a large virulence-associated multifunctional protein toxin. This domain is similar to AvrPphB protease found in Pseudomonas syringae, a C58 protease. Mutation studies show that this domain enhances cytotoxic effects of the toxin, and therefore is essential for full PaTox activity. Also included in this family is the enteropathogenic Escherichia coli (EPEC) factor for adherence/lymphocyte activation inhibitor (efa1/lifA) gene which is strongly associated with diarrhea. Efa1/LifA proteins are important for A/E lesion formation efficiency in EPEC strains lacking multiple effectors. This domain contains the invariant C/H/D residues conserved in the C58/YopT family."
definition: >-
  peptidase C58 domain of Photorhabdus asymbiotica toxin PaTox and LifA/Efa1-related large cytotoxin, and similar proteins. This subfamily includes the cysteine protease domain of Photorhabdus asymbiotica toxin PaTox, a large virulence-associated multifunctional protein toxin. This domain is similar to AvrPphB protease found in Pseudomonas syringae, a C58 protease. Mutation studies show that this domain enhances cytotoxic effects of the toxin, and therefore is essential for full PaTox activity. Also included in this family is the enteropathogenic Escherichia coli (EPEC) factor for adherence/lymphocyte activation inhibitor (efa1/lifA) gene which is strongly associated with diarrhea. Efa1/LifA proteins are important for A/E lesion formation efficiency in EPEC strains lacking multiple effectors. This domain contains the invariant C/H/D residues conserved in the C58/YopT family. — an NCBI CDD conserved domain (cd20495); members share this curated model.
