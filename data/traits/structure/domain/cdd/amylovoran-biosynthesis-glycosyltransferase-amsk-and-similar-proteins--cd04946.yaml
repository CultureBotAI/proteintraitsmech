identifier: CDD:cd04946
label: "amylovoran biosynthesis glycosyltransferase AmsK and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. AmsK is involved in the biosynthesis of amylovoran, which functions as a virulence factor. It functions as a glycosyl transferase which transfers galactose from UDP-galactose to a lipid-linked amylovoran-subunit precursor.  The members of this family are found mainly in bacteria and Archaea."
definition: >-
  amylovoran biosynthesis glycosyltransferase AmsK and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. AmsK is involved in the biosynthesis of amylovoran, which functions as a virulence factor. It functions as a glycosyl transferase which transfers galactose from UDP-galactose to a lipid-linked amylovoran-subunit precursor. The members of this family are found mainly in bacteria and Archaea. — an NCBI CDD conserved domain (cd04946); members share this curated model.
