identifier: CDD:cd07701
label: "First (N-terminal) immunoglobulin (Ig)-like domain of nectin-like molecule-3; member of the V-set of Ig superfamily (IgSF) domains. The members here are composed of the N-terminal immunoglobulin (Ig)-like domain of nectin-like molecule-3, Necl-3 (also known as cell adhesion molecule 2 (CADM2), SynCAM2, IGSF4D).  Nectin-like molecules have similar domain structures to those of nectins. At least five nectin-like molecules have been identified (Necl-1 - Necl-5). They all have an extracellular region containing three Ig-like domains, a transmembrane region, and a cytoplasmic region. The N-terminal Ig-like domain of the extracellular region, belongs to the V-type subfamily of Ig domains, is essential to cell-cell adhesion, and plays a part in the interaction with the envelope glycoprotein D of various viruses.  Necl-3 accumulates in central and peripheral nervous system tissue, and has been shown to selectively interact with oligodendrocytes."
definition: >-
  First (N-terminal) immunoglobulin (Ig)-like domain of nectin-like molecule-3; member of the V-set of Ig superfamily (IgSF) domains. The members here are composed of the N-terminal immunoglobulin (Ig)-like domain of nectin-like molecule-3, Necl-3 (also known as cell adhesion molecule 2 (CADM2), SynCAM2, IGSF4D). Nectin-like molecules have similar domain structures to those of nectins. At least five nectin-like molecules have been identified (Necl-1 - Necl-5). They all have an extracellular region containing three Ig-like domains, a transmembrane region, and a cytoplasmic region. The N-terminal Ig-like domain of the extracellular region, belongs to the V-type subfamily of Ig domains, is essential to cell-cell adhesion, and plays a part in the interaction with the envelope glycoprotein D of various viruses. Necl-3 accumulates in central and peripheral nervous system tissue, and has been shown to selectively interact with oligodendrocytes. — an NCBI CDD conserved domain (cd07701); members share this curated model.
