identifier: CDD:cd10418
label: "Src homology 2 (SH2) domain found in Fyn isoform a like proteins. Fyn is a member of the Src non-receptor type tyrosine kinase family of proteins. This cd contains the SH2 domain found in Fyn isoform a type proteins.  Fyn is involved in the control of cell growth and is required in the following pathways: T and B cell receptor signaling, integrin-mediated signaling, growth factor and cytokine receptor signaling, platelet activation, ion channel function, cell adhesion, axon guidance, fertilization, entry into mitosis, and differentiation of natural killer cells, oligodendrocytes and keratinocytes. The protein associates with the p85 subunit of phosphatidylinositol 3-kinase and interacts with the Fyn-binding protein. Alternatively spliced transcript variants encoding distinct isoforms exist. Fyn is primarily localized to the cytoplasmic leaflet of the plasma membrane. Tyrosine phosphorylation of target proteins by Fyn serves to either regulate target protein activity, and/or to generate a binding site on the target protein that recruits other signaling molecules. FYN has been shown to interact with a number of proteins including: BCAR1, Cbl, Janus kinase, nephrin, Sky, tyrosine kinase, Wiskott-Aldrich syndrome protein, and Zap-70. Fyn has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Fyn isoform a like proteins. Fyn is a member of the Src non-receptor type tyrosine kinase family of proteins. This cd contains the SH2 domain found in Fyn isoform a type proteins. Fyn is involved in the control of cell growth and is required in the following pathways: T and B cell receptor signaling, integrin-mediated signaling, growth factor and cytokine receptor signaling, platelet activation, ion channel function, cell adhesion, axon guidance, fertilization, entry into mitosis, and differentiation of natural killer cells, oligodendrocytes and keratinocytes. The protein associates with the p85 subunit of phosphatidylinositol 3-kinase and interacts with the Fyn-binding protein. Alternatively spliced transcript variants encoding distinct isoforms exist. Fyn is primarily localized to the cytoplasmic leaflet of the plasma membrane. Tyrosine phosphorylation of target proteins by Fyn serves to either regulate target protein activity, and/or to generate a binding site on the target protein that recruits other signaling molecules. FYN has been shown to interact with a number of proteins including: BCAR1, Cbl, Janus kinase, nephrin, Sky, tyrosine kinase, Wiskott-Aldrich syndrome protein, and Zap-70. Fyn has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10418); members share this curated model.
