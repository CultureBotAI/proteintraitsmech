identifier: CDD:cd09614
label: "Jacalin-like lectin domain of griffithsin and related proteins. Griffithsin is a lectin isolated from a red alga, which has shown potential as an inhibitor of viral entry, exhibiting antiviral activity against HIV and SARS. The biological functions of griffithsin and griffithsin-like proteins with respect to their source organisms are not known."
definition: >-
  Jacalin-like lectin domain of griffithsin and related proteins. Griffithsin is a lectin isolated from a red alga, which has shown potential as an inhibitor of viral entry, exhibiting antiviral activity against HIV and SARS. The biological functions of griffithsin and griffithsin-like proteins with respect to their source organisms are not known. — an NCBI CDD conserved domain (cd09614); members share this curated model.
