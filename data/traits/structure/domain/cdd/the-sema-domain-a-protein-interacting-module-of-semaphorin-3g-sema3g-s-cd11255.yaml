identifier: CDD:cd11255
label: "The Sema domain, a protein interacting module, of semaphorin 3G (Sema3G). Semaphorin 3G is identified as a primarily endothelial cell- expressed class 3 semaphorin that controls endothelial and smooth muscle cell functions in autocrine and paracrine manners, respectively. It is mainly expressed in the lung and kidney, and a little in the brain. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 3G (Sema3G). Semaphorin 3G is identified as a primarily endothelial cell- expressed class 3 semaphorin that controls endothelial and smooth muscle cell functions in autocrine and paracrine manners, respectively. It is mainly expressed in the lung and kidney, and a little in the brain. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11255); members share this curated model.
