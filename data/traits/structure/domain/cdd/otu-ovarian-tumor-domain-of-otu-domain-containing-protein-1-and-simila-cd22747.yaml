identifier: CDD:cd22747
label: "OTU (ovarian tumor) domain of OTU domain-containing protein 1 and similar proteins. OTU domain-containing protein 1 (OTUD1), also called DUBA-7 in humans, is a deubiquitinating enzyme/ubiquitinyl hydrolase (EC 3.4.19.12) that specifically hydrolyzes 'Lys-63'-linked polyubiquitin to monoubiquitin; this specificity is facilitated by the C-terminal Ub-interacting motif (UIM) of OTUD1. It interacts and promotes the deubiquitination of myeloid cell leukemia 1 (MCL1), a pro-survival Bcl-2 family protein that plays important roles in cell survival, proliferation, differentiation and tumorigenesis. OTUD1 also deubiquitinates IFN regulatory factor 3 (IRF3) and attenuates its function; IRF3 is critical for the transcription of type I IFNs in defensing virus and promoting inflammatory responses. Loss-of-function mutations of OTUD1 associated with multiple autoimmune diseases including systemic lupus erythematosus (SLE), rheumatoid arthritis (RA), ulcerative colitis (UC) and Hashimoto's thyroiditis (HT). OTUD1 belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad."
definition: >-
  OTU (ovarian tumor) domain of OTU domain-containing protein 1 and similar proteins. OTU domain-containing protein 1 (OTUD1), also called DUBA-7 in humans, is a deubiquitinating enzyme/ubiquitinyl hydrolase (EC 3.4.19.12) that specifically hydrolyzes 'Lys-63'-linked polyubiquitin to monoubiquitin; this specificity is facilitated by the C-terminal Ub-interacting motif (UIM) of OTUD1. It interacts and promotes the deubiquitination of myeloid cell leukemia 1 (MCL1), a pro-survival Bcl-2 family protein that plays important roles in cell survival, proliferation, differentiation and tumorigenesis. OTUD1 also deubiquitinates IFN regulatory factor 3 (IRF3) and attenuates its function; IRF3 is critical for the transcription of type I IFNs in defensing virus and promoting inflammatory responses. Loss-of-function mutations of OTUD1 associated with multiple autoimmune diseases including systemic lupus erythematosus (SLE), rheumatoid arthritis (RA), ulcerative colitis (UC) and Hashimoto's thyroiditis (HT). OTUD1 belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. — an NCBI CDD conserved domain (cd22747); members share this curated model.
