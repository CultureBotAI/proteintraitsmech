identifier: CDD:cd07267
label: "N-terminal domain of 2,4,5-trihydroxytoluene (THT) oxygenase. This subfamily contains the N-terminal, non-catalytic, domain of THT oxygenase. THT oxygenase is an extradiol dioxygenase in the 2,4-dinitrotoluene (DNT) degradation pathway. It catalyzes the conversion of 2,4,5-trihydroxytoluene to an unstable ring fission product, 2,4-dihydroxy-5-methyl-6-oxo-2,4-hexadienoic acid. The native protein was determined to be a dimer by gel filtration. The enzyme belongs to the type I family of extradiol dioxygenases which contains two structurally homologous barrel-shaped domains at the N- and C-terminus of each monomer. The active-site metal is located in the C-terminal barrel. Fe(II) is required for its catalytic activity."
definition: >-
  N-terminal domain of 2,4,5-trihydroxytoluene (THT) oxygenase. This subfamily contains the N-terminal, non-catalytic, domain of THT oxygenase. THT oxygenase is an extradiol dioxygenase in the 2,4-dinitrotoluene (DNT) degradation pathway. It catalyzes the conversion of 2,4,5-trihydroxytoluene to an unstable ring fission product, 2,4-dihydroxy-5-methyl-6-oxo-2,4-hexadienoic acid. The native protein was determined to be a dimer by gel filtration. The enzyme belongs to the type I family of extradiol dioxygenases which contains two structurally homologous barrel-shaped domains at the N- and C-terminus of each monomer. The active-site metal is located in the C-terminal barrel. Fe(II) is required for its catalytic activity. — an NCBI CDD conserved domain (cd07267); members share this curated model.
