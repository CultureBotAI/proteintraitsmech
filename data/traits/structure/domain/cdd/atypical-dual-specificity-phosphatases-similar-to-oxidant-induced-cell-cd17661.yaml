identifier: CDD:cd17661
label: "atypical dual specificity phosphatases similar to oxidant-induced cell-cycle arrest protein 2. Oxidant-induced cell-cycle arrest protein 2 (Oca2) is an atypical dual specificity phosphatase of unknown function. It has been identified as a putative negative regulator acting on cell wall integrity and mating MAPK pathways in yeast. It belongs to a group of atypical DSPs present in plants, fungi, kinetoplastids, and slime molds called plant and fungi atypical dual-specificity phosphatases (PFA-DSPs). Oca2 may be an inactive DSP-like protein as it lacks the CxxxxxR catalytic motif."
definition: >-
  atypical dual specificity phosphatases similar to oxidant-induced cell-cycle arrest protein 2. Oxidant-induced cell-cycle arrest protein 2 (Oca2) is an atypical dual specificity phosphatase of unknown function. It has been identified as a putative negative regulator acting on cell wall integrity and mating MAPK pathways in yeast. It belongs to a group of atypical DSPs present in plants, fungi, kinetoplastids, and slime molds called plant and fungi atypical dual-specificity phosphatases (PFA-DSPs). Oca2 may be an inactive DSP-like protein as it lacks the CxxxxxR catalytic motif. — an NCBI CDD conserved domain (cd17661); members share this curated model.
