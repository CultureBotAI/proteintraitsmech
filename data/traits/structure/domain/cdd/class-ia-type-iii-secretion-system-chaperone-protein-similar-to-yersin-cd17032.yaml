identifier: CDD:cd17032
label: "Class IA type III secretion system chaperone protein, similar to Yersinia enterocolitica SycT. This family includes type III secretion system (T3SS) chaperone proteins similar to Yersinia enterocolitica SycT and similar proteins. In Y. enterocolitica, a food-borne pathogen causing gastroenteritis and mesenteric lymphadenitis, chaperone SycT promotes translocation of effector YopT (Yersinia outer protein T), a cysteine protease that inactivates the small GTPase RhoA of targeted host cells by cleaving its C-terminal, prenylated cysteine, thereby releasing the GTPase into the host cytosol."
definition: >-
  Class IA type III secretion system chaperone protein, similar to Yersinia enterocolitica SycT. This family includes type III secretion system (T3SS) chaperone proteins similar to Yersinia enterocolitica SycT and similar proteins. In Y. enterocolitica, a food-borne pathogen causing gastroenteritis and mesenteric lymphadenitis, chaperone SycT promotes translocation of effector YopT (Yersinia outer protein T), a cysteine protease that inactivates the small GTPase RhoA of targeted host cells by cleaving its C-terminal, prenylated cysteine, thereby releasing the GTPase into the host cytosol. — an NCBI CDD conserved domain (cd17032); members share this curated model.
