identifier: CDD:cd16588
label: "RING finger, HC subclass, found in tripartite motif-containing protein 45 (TRIM45) and similar proteins. TRIM45, also known as RING finger protein 99 (RNF99), is a novel receptor for activated C-kinase (RACK1)-interacting protein that suppresses transcriptional activities of Elk-1 and AP-1 and downregulates mitogen-activated protein kinase (MAPK) signal transduction through inhibiting RACK1/PKC (protein kinase C) complex formation. It also negatively regulates tumor necrosis factor alpha (TNFalpha)-induced nuclear factor-kappaB (NF-kappa B)-mediated transcription and suppresses cell proliferation. TRIM45 belongs to the C-VII subclass of the TRIM (tripartite motif) family that is defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a filamin-type immunoglobulin (IG-FLMN) domain and NHL repeats positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 45 (TRIM45) and similar proteins. TRIM45, also known as RING finger protein 99 (RNF99), is a novel receptor for activated C-kinase (RACK1)-interacting protein that suppresses transcriptional activities of Elk-1 and AP-1 and downregulates mitogen-activated protein kinase (MAPK) signal transduction through inhibiting RACK1/PKC (protein kinase C) complex formation. It also negatively regulates tumor necrosis factor alpha (TNFalpha)-induced nuclear factor-kappaB (NF-kappa B)-mediated transcription and suppresses cell proliferation. TRIM45 belongs to the C-VII subclass of the TRIM (tripartite motif) family that is defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a filamin-type immunoglobulin (IG-FLMN) domain and NHL repeats positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16588); members share this curated model.
