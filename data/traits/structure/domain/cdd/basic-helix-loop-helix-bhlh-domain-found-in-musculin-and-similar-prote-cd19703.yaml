identifier: CDD:cd19703
label: "basic helix-loop-helix (bHLH) domain found in musculin and similar proteins. Musculin, also termed activated B-cell factor 1 (ABF-1), or Class A basic helix-loop-helix protein 22 (bHLHa22), is a bHLH transcription factor expressed in activated B lymphocytes. It acts as a transcription repressor capable of inhibiting the transactivation capability of TCF3/E47. Musculin may play a role in regulating antigen-dependent B-cell differentiation. The mouse homolog, musculin, is suggested to be a repressor of myogenesis that is expressed in developing muscle and in the spleen. Musculin heterodimerizes with products of the E2A gene."
definition: >-
  basic helix-loop-helix (bHLH) domain found in musculin and similar proteins. Musculin, also termed activated B-cell factor 1 (ABF-1), or Class A basic helix-loop-helix protein 22 (bHLHa22), is a bHLH transcription factor expressed in activated B lymphocytes. It acts as a transcription repressor capable of inhibiting the transactivation capability of TCF3/E47. Musculin may play a role in regulating antigen-dependent B-cell differentiation. The mouse homolog, musculin, is suggested to be a repressor of myogenesis that is expressed in developing muscle and in the spleen. Musculin heterodimerizes with products of the E2A gene. — an NCBI CDD conserved domain (cd19703); members share this curated model.
