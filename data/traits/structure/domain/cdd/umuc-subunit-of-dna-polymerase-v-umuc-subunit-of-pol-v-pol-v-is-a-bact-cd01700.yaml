identifier: CDD:cd01700
label: "umuC subunit of DNA Polymerase V. umuC subunit of Pol V.   Pol V is a bacterial translesion synthesis (TLS) polymerase that consists of the heterotrimer of one umuC and two umuD subunits.  Translesion synthesis is a process that allows the bypass of a variety of DNA lesions.  TLS polymerases lack proofreading activity and have low fidelity and low processivity.  They use damaged DNA as templates and insert nucleotides opposite the lesions.  Pol V, RecA, single stranded DNA-binding protein, beta sliding clamp, and gamma clamp loading complex are responsible for inducing the SOS response in bacteria to repair UV-induced DNA damage."
definition: >-
