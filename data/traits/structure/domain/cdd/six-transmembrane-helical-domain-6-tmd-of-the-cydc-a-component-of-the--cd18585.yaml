identifier: CDD:cd18585
label: "Six-transmembrane helical domain (6-TMD) of the CydC, a component of the ABC cysteine/GSH transporter. The CydC protein, together with the CydD protein, constitutes a bacterial heterodimeric ATP-binding cassette (ABC) transporter complex required for formation of the functional cytochrome bd oxidase in both gram-positive and gram-negative aerobic bacteria. In Escherichia coli, the biogenesis of both cytochrome bd-type quinol oxidases and periplasmic cytochromes requires the ABC-type cysteine/GSH transporter CydDC, which exports cysteine and glutathione from the cytoplasm to the periplasm to maintain redox homeostasis. The CydDC forms a heterodimeric ABC transporter with two transmembrane domains (TMDs), each predicted to comprise six TM alpha-helices and two nucleotide binding domains (NBDs)."
definition: >-
  Six-transmembrane helical domain (6-TMD) of the CydC, a component of the ABC cysteine/GSH transporter. The CydC protein, together with the CydD protein, constitutes a bacterial heterodimeric ATP-binding cassette (ABC) transporter complex required for formation of the functional cytochrome bd oxidase in both gram-positive and gram-negative aerobic bacteria. In Escherichia coli, the biogenesis of both cytochrome bd-type quinol oxidases and periplasmic cytochromes requires the ABC-type cysteine/GSH transporter CydDC, which exports cysteine and glutathione from the cytoplasm to the periplasm to maintain redox homeostasis. The CydDC forms a heterodimeric ABC transporter with two transmembrane domains (TMDs), each predicted to comprise six TM alpha-helices and two nucleotide binding domains (NBDs). — an NCBI CDD conserved domain (cd18585); members share this curated model.
