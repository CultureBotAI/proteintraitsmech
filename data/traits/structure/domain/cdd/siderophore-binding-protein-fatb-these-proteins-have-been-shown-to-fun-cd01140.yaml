identifier: CDD:cd01140
label: "Siderophore binding protein FatB.  These proteins have been shown to function as ABC-type initial receptors in the siderophore-mediated iron uptake in some eubacterial species.  They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind their ligands in the cleft between these domains."
definition: >-
  Siderophore binding protein FatB. These proteins have been shown to function as ABC-type initial receptors in the siderophore-mediated iron uptake in some eubacterial species. They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind their ligands in the cleft between these domains. — an NCBI CDD conserved domain (cd01140); members share this curated model.
