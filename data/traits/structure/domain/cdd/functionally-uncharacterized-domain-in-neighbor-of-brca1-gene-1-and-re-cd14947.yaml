identifier: CDD:cd14947
label: "Functionally uncharacterized domain in neighbor of Brca1 Gene 1 and related proteins. NBR1 has been characterized as a specific late endosomal protein, which might play a role in receptor (RTK) trafficking. Specifically, NBR1 was shown to inhibit ligand-mediated receptor internalization from the cell surface. The region covered by this domain model may be involved in that function, as the C-terminus (which contains a UBA domain) was shown to be essential but not sufficient by itself. In an earlier yeast two-hybrid study, the region in mouse NBR1 covered by this domain has been shown to interact with CIB (calcium and integrin-binding protein) and FEZ1 (fasciculation and elongation protein zeta-1). Thus, NBR1 may play a role in cellular signalling pathways and possibly in neural development."
definition: >-
