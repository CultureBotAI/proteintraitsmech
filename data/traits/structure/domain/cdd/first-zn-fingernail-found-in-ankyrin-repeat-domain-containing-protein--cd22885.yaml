identifier: CDD:cd22885
label: "first Zn-fingernail found in ankyrin repeat domain-containing protein 27 (ANKRD27) and similar proteins. ANKRD27, also called VPS9 domain-containing protein, or VARP, is a multifunctional endosomal protein that acts as a regulatory/accessory factor for retromer-based coats. It may be a guanine exchange factor (GEF) for Rab21, Rab32 and Rab38 and may regulate endosome dynamics. It may also regulate the participation of VAMP7 in membrane fusion events and is involved in peripheral melanosomal distribution of TYRP1 in melanocytes. In addition, ANKRD27 participates in GLUT1 endosome-to-plasma membrane trafficking in a VPS29-dependent manner. ANKRD27 contains two conserved CHPLCxCxxC motifs which are referred to as Zn-fingernails. This model corresponds to the first Zn-fingernail of ANKRD27."
definition: >-
  first Zn-fingernail found in ankyrin repeat domain-containing protein 27 (ANKRD27) and similar proteins. ANKRD27, also called VPS9 domain-containing protein, or VARP, is a multifunctional endosomal protein that acts as a regulatory/accessory factor for retromer-based coats. It may be a guanine exchange factor (GEF) for Rab21, Rab32 and Rab38 and may regulate endosome dynamics. It may also regulate the participation of VAMP7 in membrane fusion events and is involved in peripheral melanosomal distribution of TYRP1 in melanocytes. In addition, ANKRD27 participates in GLUT1 endosome-to-plasma membrane trafficking in a VPS29-dependent manner. ANKRD27 contains two conserved CHPLCxCxxC motifs which are referred to as Zn-fingernails. This model corresponds to the first Zn-fingernail of ANKRD27. — an NCBI CDD conserved domain (cd22885); members share this curated model.
