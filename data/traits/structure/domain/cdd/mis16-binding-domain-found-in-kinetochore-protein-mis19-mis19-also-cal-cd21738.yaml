identifier: CDD:cd21738
label: "Mis16 binding domain found in kinetochore protein Mis19. Mis19, also called eighteen-interacting centromere protein 1 (Eic1), is a component of the CENP-A recruiting complex that ensures the integrity of mitotic spindles through maintenance of kinetochore factors mis6/CENP-I and cnp1/CENP-A. Mis19 links mis16 and mis18 to recruit CENP-A through interacting with non-sense-mediated mRNA decay (NMD) factors and the SWI/SNF complex. It also links mis18 with the CCAN/mis6/ctf19 complex to promote CENP-A assembly. The model corresponds to Mis16 binding domain of Mis19."
definition: >-
  Mis16 binding domain found in kinetochore protein Mis19. Mis19, also called eighteen-interacting centromere protein 1 (Eic1), is a component of the CENP-A recruiting complex that ensures the integrity of mitotic spindles through maintenance of kinetochore factors mis6/CENP-I and cnp1/CENP-A. Mis19 links mis16 and mis18 to recruit CENP-A through interacting with non-sense-mediated mRNA decay (NMD) factors and the SWI/SNF complex. It also links mis18 with the CCAN/mis6/ctf19 complex to promote CENP-A assembly. The model corresponds to Mis16 binding domain of Mis19. — an NCBI CDD conserved domain (cd21738); members share this curated model.
