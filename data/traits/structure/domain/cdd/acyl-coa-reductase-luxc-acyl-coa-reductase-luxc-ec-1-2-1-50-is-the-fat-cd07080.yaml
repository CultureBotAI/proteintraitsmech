identifier: CDD:cd07080
label: "Acyl-CoA reductase LuxC. Acyl-CoA reductase, LuxC, (EC=1.2.1.50) is the fatty acid reductase enzyme responsible for synthesis of the aldehyde  substrate for the luminescent reaction catalyzed by luciferase. The fatty acid reductase, a luminescence-specific, multienzyme complex (LuxCDE), reduces myristic acid to generate the long chain fatty aldehyde required for the luciferase-catalyzed reaction resulting in the emission of blue-green light. Mutational studies of conserved cysteines of LuxC revealed that the cysteine which aligns with the catalytic cysteine conserved throughout the ALDH superfamily is the LuxC acylation site. This CD is composed of mainly bacterial sequences but also includes a few archaeal sequences similar to the Methanospirillum hungateiacyl acyl-CoA reductase RfbN."
definition: >-
  Acyl-CoA reductase LuxC. Acyl-CoA reductase, LuxC, (EC=1.2.1.50) is the fatty acid reductase enzyme responsible for synthesis of the aldehyde substrate for the luminescent reaction catalyzed by luciferase. The fatty acid reductase, a luminescence-specific, multienzyme complex (LuxCDE), reduces myristic acid to generate the long chain fatty aldehyde required for the luciferase-catalyzed reaction resulting in the emission of blue-green light. Mutational studies of conserved cysteines of LuxC revealed that the cysteine which aligns with the catalytic cysteine conserved throughout the ALDH superfamily is the LuxC acylation site. This CD is composed of mainly bacterial sequences but also includes a few archaeal sequences similar to the Methanospirillum hungateiacyl acyl-CoA reductase RfbN. — an NCBI CDD conserved domain (cd07080); members share this curated model.
