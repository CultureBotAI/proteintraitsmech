identifier: CDD:cd09263
label: "Mu homology domain (MHD) of adaptor-like protein (AP-like), stonin-2. A small family of proteins named stonins has been characterized as clathrin-dependent AP-2 mu2 chain related factors, which may act as cargo-specific sorting adaptors in endocytosis. Stonins include stonin 1 and stonin 2, which are the only mammalian homologs of Drosophila stoned B, a presynaptic protein implicated in neurotransmission and synaptic vesicle (SV) recycling. They are conserved from C. elegans to humans, but are not found in prokaryotes or yeasts. This family corresponds to the mu homology domain of stonin 2, which is distantly related to the C-terminal domain of mu chains among AP complexes. Due to the low degree of sequence conservation of the corresponding binding site, the mu homology domain of stonin-2 is unable to recognize tyrosine-based endocytic sorting signals. It acts as an AP-2-dependent synaptotagmin-specific sorting adaptor for SV endocytosis."
definition: >-
  Mu homology domain (MHD) of adaptor-like protein (AP-like), stonin-2. A small family of proteins named stonins has been characterized as clathrin-dependent AP-2 mu2 chain related factors, which may act as cargo-specific sorting adaptors in endocytosis. Stonins include stonin 1 and stonin 2, which are the only mammalian homologs of Drosophila stoned B, a presynaptic protein implicated in neurotransmission and synaptic vesicle (SV) recycling. They are conserved from C. elegans to humans, but are not found in prokaryotes or yeasts. This family corresponds to the mu homology domain of stonin 2, which is distantly related to the C-terminal domain of mu chains among AP complexes. Due to the low degree of sequence conservation of the corresponding binding site, the mu homology domain of stonin-2 is unable to recognize tyrosine-based endocytic sorting signals. It acts as an AP-2-dependent synaptotagmin-specific sorting adaptor for SV endocytosis. — an NCBI CDD conserved domain (cd09263); members share this curated model.
