identifier: CDD:cd16174
label: "EF-hand, calcium binding motif, found in calcium uptake protein 2, mitochondrial (MICU2) and similar proteins. MICU2, also termed EF-hand domain-containing family member A1 (EFHA1), is a mitochondrial-localized paralog of MICU1. MICU2 and its paralog, MICU1, are physically associated within the mitochondrial calcium uniporter (MCU) complex and are co-expressed across all tissues. They may operate together with MCU to regulate the channel. At present, the precise molecular function of MICU2 remains unclear. It may play possible roles in Ca2+ sensing and regulation of MCU, calcium buffering with a secondary impact on transport or assembly and stabilization of MCU. MICU2 contains an N-terminal mitochondrial targeting sequence (MTS) as well as two evolutionarily conserved canonical Ca2+-binding EF-hands separated by a long stretch of residues predicted to form alpha-helices."
definition: >-
  EF-hand, calcium binding motif, found in calcium uptake protein 2, mitochondrial (MICU2) and similar proteins. MICU2, also termed EF-hand domain-containing family member A1 (EFHA1), is a mitochondrial-localized paralog of MICU1. MICU2 and its paralog, MICU1, are physically associated within the mitochondrial calcium uniporter (MCU) complex and are co-expressed across all tissues. They may operate together with MCU to regulate the channel. At present, the precise molecular function of MICU2 remains unclear. It may play possible roles in Ca2+ sensing and regulation of MCU, calcium buffering with a secondary impact on transport or assembly and stabilization of MCU. MICU2 contains an N-terminal mitochondrial targeting sequence (MTS) as well as two evolutionarily conserved canonical Ca2+-binding EF-hands separated by a long stretch of residues predicted to form alpha-helices. — an NCBI CDD conserved domain (cd16174); members share this curated model.
