identifier: CDD:cd02202
label: "Cell-structure-related euryarchaeota tubulin/FtsZ homologs. CetZ proteins comprise a distinct tubulin/FtsZ family. The crystal structures of CetZ contain the FtsZ/tubulin superfamily fold and its family members have mosaic of tubulin-like and FtsZ-like amino acid residues. However, a recent study found that CetZ proteins (formerly annotated FtsZ type 2) are not required for cell division, whereas FtsZ proteins play an important role. Instead, CetZ proteins are shown to be involved in controlling archaeal cell shape dynamics. The results from inactivation studies of CetZ proteins in Haloferax volcanii suggest that CetZ1 is essential for normal swimming motility and rod-cell development."
definition: >-
  Cell-structure-related euryarchaeota tubulin/FtsZ homologs. CetZ proteins comprise a distinct tubulin/FtsZ family. The crystal structures of CetZ contain the FtsZ/tubulin superfamily fold and its family members have mosaic of tubulin-like and FtsZ-like amino acid residues. However, a recent study found that CetZ proteins (formerly annotated FtsZ type 2) are not required for cell division, whereas FtsZ proteins play an important role. Instead, CetZ proteins are shown to be involved in controlling archaeal cell shape dynamics. The results from inactivation studies of CetZ proteins in Haloferax volcanii suggest that CetZ1 is essential for normal swimming motility and rod-cell development. — an NCBI CDD conserved domain (cd02202); members share this curated model.
