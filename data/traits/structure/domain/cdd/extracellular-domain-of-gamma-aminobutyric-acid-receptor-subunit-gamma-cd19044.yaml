identifier: CDD:cd19044
label: "extracellular domain of gamma-aminobutyric acid receptor subunit gamma-2 (GABAAR-G2 or GABRG2). This family contains extracellular domain of gamma-aminobutyric acid receptor subunit gamma-2 (GABAAR-G2), a protein that is encoded by the GABRG2 gene in humans. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The gamma-2 subunit forms heteropentamers with other GABAAR subunits, most prevalently expressed as alpha1-beta2-gamma2. The gamma2 subunit also coassembles with other alpha and beta variants in the brain, but these receptors are found in considerably less abundance and are restricted in their regional, e.g. the alpha2-beta3-gamma2 and alpha3-beta3-gamma2 subtypes are highly enriched in hippocampal pyramidal neurons and cholinergic neurons of the basal forebrain, respectively. Pathogenic missense and truncating variants in this gene have been associated with spectrum of epilepsies, from Dravet syndrome to milder simple febrile seizures, while a recurrent GABRG2 missense variant is associated with early-onset seizures, significant motor and speech delays, intellectual disability, hypotonia, movement disorder, dysmorphic features, and vision/ocular issues."
