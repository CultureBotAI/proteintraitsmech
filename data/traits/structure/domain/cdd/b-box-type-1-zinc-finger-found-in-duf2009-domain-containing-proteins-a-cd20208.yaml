identifier: CDD:cd20208
label: "B-box-type 1 zinc finger found in DUF2009 domain-containing proteins and similar proteins. This group is composed of uncharacterized proteins containing a zinc finger B-box domain and a DUF2009 domain, and similar zinc finger B-box domain-containing proteins. The B-box motif shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
definition: >-
  B-box-type 1 zinc finger found in DUF2009 domain-containing proteins and similar proteins. This group is composed of uncharacterized proteins containing a zinc finger B-box domain and a DUF2009 domain, and similar zinc finger B-box domain-containing proteins. The B-box motif shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd20208); members share this curated model.
