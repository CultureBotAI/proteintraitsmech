identifier: CDD:cd02218
label: "cupin-type phosphoglucose isomerase. The cupin-type phosphoglucose isomerase (also called cupin-like glucose-6-phosphate isomerase or cPGI; EC 5.3.1.9) family is found in archaea and certain prokaryotes where they catalyze the reversible aldose-ketose isomerization of glucose 6-phosphate (G6P) and fructose 6-phosphate (F6P) as part of a unique variation of the Embden-Meyerhof glycolytic pathway. Cupin-PGIs represent a separate lineage in the evolution of phosphoglucose isomerases. Pyrococcus furiosus phosphoglucose isomerase (PfPGI) has been shown to be a metal-containing enzyme which catalyzes the interconversion of glucose 6-phosphate (G6P) and fructose 6-phosphate (F6P). These domains have a cupin beta-barrel fold capable of homodimerization."
definition: >-
  cupin-type phosphoglucose isomerase. The cupin-type phosphoglucose isomerase (also called cupin-like glucose-6-phosphate isomerase or cPGI; EC 5.3.1.9) family is found in archaea and certain prokaryotes where they catalyze the reversible aldose-ketose isomerization of glucose 6-phosphate (G6P) and fructose 6-phosphate (F6P) as part of a unique variation of the Embden-Meyerhof glycolytic pathway. Cupin-PGIs represent a separate lineage in the evolution of phosphoglucose isomerases. Pyrococcus furiosus phosphoglucose isomerase (PfPGI) has been shown to be a metal-containing enzyme which catalyzes the interconversion of glucose 6-phosphate (G6P) and fructose 6-phosphate (F6P). These domains have a cupin beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd02218); members share this curated model.
