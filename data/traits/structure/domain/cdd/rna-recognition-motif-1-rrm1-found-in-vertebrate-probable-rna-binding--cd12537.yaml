identifier: CDD:cd12537
label: "RNA recognition motif 1 (RRM1) found in vertebrate probable RNA-binding protein 23 (RBM23). This subgroup corresponds to the RRM1 of RBM23, also termed RNA-binding region-containing protein 4, or splicing factor SF2, which may function as a pre-mRNA splicing factor. It shows high sequence homology to RNA-binding protein 39 (RBM39 or HCC1), a nuclear autoantigen that contains an N-terminal arginine/serine rich (RS) motif and three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). In contrast to RBM39, RBM23 contains only two RRMs."
definition: >-
  RNA recognition motif 1 (RRM1) found in vertebrate probable RNA-binding protein 23 (RBM23). This subgroup corresponds to the RRM1 of RBM23, also termed RNA-binding region-containing protein 4, or splicing factor SF2, which may function as a pre-mRNA splicing factor. It shows high sequence homology to RNA-binding protein 39 (RBM39 or HCC1), a nuclear autoantigen that contains an N-terminal arginine/serine rich (RS) motif and three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). In contrast to RBM39, RBM23 contains only two RRMs. — an NCBI CDD conserved domain (cd12537); members share this curated model.
