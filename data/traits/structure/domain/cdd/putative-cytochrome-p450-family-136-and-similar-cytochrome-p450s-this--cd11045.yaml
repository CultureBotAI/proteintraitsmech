identifier: CDD:cd11045
label: "putative cytochrome P450 family 136 and similar cytochrome P450s. This group is composed of Mycobacterium tuberculosis putative cytochrome P450 136 (CYP136) and similar proteins. It belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  putative cytochrome P450 family 136 and similar cytochrome P450s. This group is composed of Mycobacterium tuberculosis putative cytochrome P450 136 (CYP136) and similar proteins. It belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11045); members share this curated model.
