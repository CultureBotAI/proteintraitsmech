identifier: CDD:cd16894
label: "Membrane-bound lytic murein transglycosylase D and similar proteins. Lytic transglycosylases (LT) catalyze the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetyl-D-glucosamine (GlcNAc). Membrane-bound lytic murein transglycosylase D protein (MltD) family members may have one or more small LysM domains, which may contribute to peptidoglycan binding. Unlike the similar \"goose-type\" lysozymes, LTs also make a new glycosidic bond with the C6 hydroxyl group of the same muramic acid residue. Proteins similar to this family include the soluble and insoluble membrane-bound LTs in bacteria, the LTs in bacteriophage lambda, as well as the eukaryotic \"goose-type\" lysozymes (goose egg-white lysozyme; GEWL)."
definition: >-
  Membrane-bound lytic murein transglycosylase D and similar proteins. Lytic transglycosylases (LT) catalyze the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetyl-D-glucosamine (GlcNAc). Membrane-bound lytic murein transglycosylase D protein (MltD) family members may have one or more small LysM domains, which may contribute to peptidoglycan binding. Unlike the similar "goose-type" lysozymes, LTs also make a new glycosidic bond with the C6 hydroxyl group of the same muramic acid residue. Proteins similar to this family include the soluble and insoluble membrane-bound LTs in bacteria, the LTs in bacteriophage lambda, as well as the eukaryotic "goose-type" lysozymes (goose egg-white lysozyme; GEWL). — an NCBI CDD conserved domain (cd16894); members share this curated model.
