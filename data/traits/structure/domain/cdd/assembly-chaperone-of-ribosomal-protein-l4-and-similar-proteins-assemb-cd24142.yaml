identifier: CDD:cd24142
label: "Assembly chaperone of ribosomal protein L4 and similar proteins. Assembly chaperone of RPL4 (ACL4) acts as a chaperone for the L4 ribosomal subunit, encoded by RPL4A and RPL4B, and is required for hierarchical ribosome assembly. It is required for the soluble expression of newly synthesized RPL4 and for the protection of RPL4 from the Tom1-dependent cellular degradation machinery. ACL4 shields ribosomal protein L4 until timely release and insertion into the pre-ribosome is possible, once ribosomal protein L18 is present."
definition: >-
  Assembly chaperone of ribosomal protein L4 and similar proteins. Assembly chaperone of RPL4 (ACL4) acts as a chaperone for the L4 ribosomal subunit, encoded by RPL4A and RPL4B, and is required for hierarchical ribosome assembly. It is required for the soluble expression of newly synthesized RPL4 and for the protection of RPL4 from the Tom1-dependent cellular degradation machinery. ACL4 shields ribosomal protein L4 until timely release and insertion into the pre-ribosome is possible, once ribosomal protein L18 is present. — an NCBI CDD conserved domain (cd24142); members share this curated model.
