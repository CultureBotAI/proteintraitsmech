identifier: CDD:cd22264
label: "UDM1 (ubiquitin-dependent DSB recruitment module 1) domain found in RING finger protein 169. RING finger protein 169 (RNF169) is an uncharacterized E3 ubiquitin-protein ligase paralogous to RNF168. It functions as a negative regulator of the DNA damage signaling cascade. It recognizes polyubiquitin structures but does not itself contribute to double-strand break (DSB)-induced chromatin ubiquitylation. It contributes to the regulation of DSB repair pathway utilization via functionally competing with recruiting repair factors, 53BP1 and RAP80-BRCA1, for association with RNF168-modified chromatin independent of its catalytic activity, limiting the magnitude of the RNF8/RNF168-dependent signaling response to DSBs. This model corresponds to the UDM1 (ubiquitin-dependent double-strand break [DSB] recruitment module 1) domain of RNF169, which comprises LRM1 (LR motif 1), UMI (ubiquitin-interacting motif [UIM]- and MIU-related UBD) and MIU1 (motif interacting with ubiquitin 1). Mutations of Ub-interacting residues in UDM1 have little effect on the accumulation of the related RNF168 to DSB sites, suggesting that it may not be the main site of binding ubiquitylated and polyubiquitylated targets."
definition: >-
  UDM1 (ubiquitin-dependent DSB recruitment module 1) domain found in RING finger protein 169. RING finger protein 169 (RNF169) is an uncharacterized E3 ubiquitin-protein ligase paralogous to RNF168. It functions as a negative regulator of the DNA damage signaling cascade. It recognizes polyubiquitin structures but does not itself contribute to double-strand break (DSB)-induced chromatin ubiquitylation. It contributes to the regulation of DSB repair pathway utilization via functionally competing with recruiting repair factors, 53BP1 and RAP80-BRCA1, for association with RNF168-modified chromatin independent of its catalytic activity, limiting the magnitude of the RNF8/RNF168-dependent signaling response to DSBs. This model corresponds to the UDM1 (ubiquitin-dependent double-strand break [DSB] recruitment module 1) domain of RNF169, which comprises LRM1 (LR motif 1), UMI (ubiquitin-interacting motif [UIM]- and MIU-related UBD) and MIU1 (motif interacting with ubiquitin 1). Mutations of Ub-interacting residues in UDM1 have little effect on the accumulation of the related RNF168 to DSB sites, suggesting that it may not be the main site of binding ubiquitylated and polyubiquitylated targets. — an NCBI CDD conserved domain (cd22264); members share this curated model.
