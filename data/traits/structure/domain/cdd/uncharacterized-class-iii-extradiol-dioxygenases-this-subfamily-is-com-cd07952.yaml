identifier: CDD:cd07952
label: "Uncharacterized class III extradiol dioxygenases. This subfamily is composed of proteins of unknown function with similarity to the catalytic B subunit of class III extradiol dioxygenases. Class III extradiol dioxygenases use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon. They play key roles in the degradation of aromatic compounds."
definition: >-
  Uncharacterized class III extradiol dioxygenases. This subfamily is composed of proteins of unknown function with similarity to the catalytic B subunit of class III extradiol dioxygenases. Class III extradiol dioxygenases use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon. They play key roles in the degradation of aromatic compounds. — an NCBI CDD conserved domain (cd07952); members share this curated model.
