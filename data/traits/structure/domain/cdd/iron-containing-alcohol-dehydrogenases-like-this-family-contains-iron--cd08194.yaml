identifier: CDD:cd08194
label: "Iron-containing alcohol dehydrogenases-like. This family contains iron-containing alcohol dehydrogenase (Fe-ADH) most of which have not been characterized. Their specific function is unknown. The protein structure represents a dehydroquinate synthase-like fold and belongs to the alcohol dehydrogenase-like superfamily. It is distinct from other alcohol dehydrogenases which contain different protein domains. Alcohol dehydrogenase catalyzes the reduction of acetaldehyde to alcohol with NADP as cofactor. Its activity requires iron ions."
definition: >-
  Iron-containing alcohol dehydrogenases-like. This family contains iron-containing alcohol dehydrogenase (Fe-ADH) most of which have not been characterized. Their specific function is unknown. The protein structure represents a dehydroquinate synthase-like fold and belongs to the alcohol dehydrogenase-like superfamily. It is distinct from other alcohol dehydrogenases which contain different protein domains. Alcohol dehydrogenase catalyzes the reduction of acetaldehyde to alcohol with NADP as cofactor. Its activity requires iron ions. — an NCBI CDD conserved domain (cd08194); members share this curated model.
