identifier: CDD:cd24083
label: "nucleotide-binding domain (NBD) of Thermoplasma acidophilum 2-dehydro-3-deoxygluconokinase (KdgK) and similar proteins. The family includes a group of uncharacterized proteins similar to Thermoplasma acidophilum 2-dehydro-3-deoxygluconokinase (KdgK; EC 2.7.1.45), also called 2-keto-3-deoxy-D-gluconate kinase, or KDG kinase. It catalyzes the phosphorylation of 2-keto-3-deoxygluconate (KDG) to produce 2-keto-3-deoxy-6-phosphogluconate (KDPG). It is specific for KDG."
definition: >-
  nucleotide-binding domain (NBD) of Thermoplasma acidophilum 2-dehydro-3-deoxygluconokinase (KdgK) and similar proteins. The family includes a group of uncharacterized proteins similar to Thermoplasma acidophilum 2-dehydro-3-deoxygluconokinase (KdgK; EC 2.7.1.45), also called 2-keto-3-deoxy-D-gluconate kinase, or KDG kinase. It catalyzes the phosphorylation of 2-keto-3-deoxygluconate (KDG) to produce 2-keto-3-deoxy-6-phosphogluconate (KDPG). It is specific for KDG. — an NCBI CDD conserved domain (cd24083); members share this curated model.
