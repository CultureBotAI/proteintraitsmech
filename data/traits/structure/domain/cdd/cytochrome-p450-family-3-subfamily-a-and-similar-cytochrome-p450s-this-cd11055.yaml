identifier: CDD:cd11055
label: "cytochrome P450 family 3, subfamily A and similar cytochrome P450s. This family includes vertebrate CYP3A subfamily enzymes and CYP5a1, and similar proteins. CYP5A1, also called thromboxane-A synthase, converts prostaglandin H2 into thromboxane A2, a biologically active metabolite of arachidonic acid. CYP3A enzymes are drug-metabolizing enzymes embedded in the endoplasmic reticulum, where they can catalyze a wide variety of biochemical reactions including hydroxylation, N-demethylation, O-dealkylation, S-oxidation, deamination, or epoxidation of substrates. The CYP3A-like family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 3, subfamily A and similar cytochrome P450s. This family includes vertebrate CYP3A subfamily enzymes and CYP5a1, and similar proteins. CYP5A1, also called thromboxane-A synthase, converts prostaglandin H2 into thromboxane A2, a biologically active metabolite of arachidonic acid. CYP3A enzymes are drug-metabolizing enzymes embedded in the endoplasmic reticulum, where they can catalyze a wide variety of biochemical reactions including hydroxylation, N-demethylation, O-dealkylation, S-oxidation, deamination, or epoxidation of substrates. The CYP3A-like family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11055); members share this curated model.
