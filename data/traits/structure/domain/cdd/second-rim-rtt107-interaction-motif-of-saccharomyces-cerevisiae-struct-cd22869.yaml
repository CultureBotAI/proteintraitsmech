identifier: CDD:cd22869
label: "second RIM (Rtt107 interaction motif) of Saccharomyces cerevisiae structure-specific endonuclease subunit SLX4 and similar proteins. SLX4 is the regulatory subunit that interacts with and increases the activity of different structure-specific endonucleases. It plays distinct roles in protecting genome stability by resolving diverse forms of deleterious DNA structures. SLX4 has endonuclease activity towards branched DNA substrates, introducing single-strand cuts in duplex DNA close to junctions with ssDNA. It is critical in maintaining the integrity of the ribosomal DNA (rDNA) loci, where it has a role in re-starting stalled replication forks. It also has Holliday junction resolvase activity in vitro. It interacts with the structure-specific RAD1-RAD10 endonuclease and promotes RAD1-RAD10-dependent 3'-non-homologous tail removal (NHTR) during repair of double-strand breaks by single-strand annealing. SLX4 also promotes recovery from DNA-alkylation-induced replisome stalling during DNA replication by facilitating the error-free mode of lesion bypass. This does not require SLX1 or RAD1-RAD10, but probably regulator of TY1 transposition protein 107 (Rtt107). SLX4 contains two Rtt107 interaction motif (RIM) regions, which are referred to as RIM1 and RIM2, respectively. This model corresponds to the second RIM region."
definition: >-
  second RIM (Rtt107 interaction motif) of Saccharomyces cerevisiae structure-specific endonuclease subunit SLX4 and similar proteins. SLX4 is the regulatory subunit that interacts with and increases the activity of different structure-specific endonucleases. It plays distinct roles in protecting genome stability by resolving diverse forms of deleterious DNA structures. SLX4 has endonuclease activity towards branched DNA substrates, introducing single-strand cuts in duplex DNA close to junctions with ssDNA. It is critical in maintaining the integrity of the ribosomal DNA (rDNA) loci, where it has a role in re-starting stalled replication forks. It also has Holliday junction resolvase activity in vitro. It interacts with the structure-specific RAD1-RAD10 endonuclease and promotes RAD1-RAD10-dependent 3'-non-homologous tail removal (NHTR) during repair of double-strand breaks by single-strand annealing. SLX4 also promotes recovery from DNA-alkylation-induced replisome stalling during DNA replication by facilitating the error-free mode of lesion bypass. This does not require SLX1 or RAD1-RAD10, but probably regulator of TY1 transposition protein 107 (Rtt107). SLX4 contains two Rtt107 interaction motif (RIM) regions, which are referred to as RIM1 and RIM2, respectively. This model corresponds to the second RIM region. — an NCBI CDD conserved domain (cd22869); members share this curated model.
