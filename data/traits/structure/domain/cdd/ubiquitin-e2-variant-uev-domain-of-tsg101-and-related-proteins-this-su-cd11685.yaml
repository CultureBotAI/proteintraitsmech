identifier: CDD:cd11685
label: "ubiquitin E2 variant (UEV) domain of TSG101 and related proteins. This subfamily includes the UEV domain of eukaryotic tumor susceptibility gene 101 protein (TSG101, also known as ESCRT-I complex subunit TSG101, vacuolar protein-sorting protein 23, or Vps23) which functions in endocytic trafficking. TSG101 is a component of the ESCRT (endosomal sorting complex required for transport)-I complex, one of four complexes (ESCRT 0, -I, -II, -III) in the vacuolar protein sorting pathway. TSG101 also facilitates HIV-1 virus budding from infected cells, perhaps by linking the p6 domain of the viral structural Gag protein to the vacuolar protein sorting machinery. The UEV domain of TSG101 binds to an essential tetrapeptide motif within the p6 domain of the structural Gag protein and also to ubiquitin. UEVs are homologous to E2 ubiquitin ligases but lack the conserved cysteine residue required for catalytic activity."
definition: >-
  ubiquitin E2 variant (UEV) domain of TSG101 and related proteins. This subfamily includes the UEV domain of eukaryotic tumor susceptibility gene 101 protein (TSG101, also known as ESCRT-I complex subunit TSG101, vacuolar protein-sorting protein 23, or Vps23) which functions in endocytic trafficking. TSG101 is a component of the ESCRT (endosomal sorting complex required for transport)-I complex, one of four complexes (ESCRT 0, -I, -II, -III) in the vacuolar protein sorting pathway. TSG101 also facilitates HIV-1 virus budding from infected cells, perhaps by linking the p6 domain of the viral structural Gag protein to the vacuolar protein sorting machinery. The UEV domain of TSG101 binds to an essential tetrapeptide motif within the p6 domain of the structural Gag protein and also to ubiquitin. UEVs are homologous to E2 ubiquitin ligases but lack the conserved cysteine residue required for catalytic activity. — an NCBI CDD conserved domain (cd11685); members share this curated model.
