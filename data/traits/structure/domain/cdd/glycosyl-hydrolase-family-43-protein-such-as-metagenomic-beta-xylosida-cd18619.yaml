identifier: CDD:cd18619
label: "Glycosyl hydrolase family 43 protein such as metagenomic beta-xylosidase/alpha-L-arabinofuranosidase CoXyl43. This glycosyl hydrolase family 43 (GH43) subgroup belongs to the GH43_AXH-like subgroup which includes enzymes that have been characterized with beta-xylosidase (EC 3.2.1.37), alpha-L-arabinofuranosidase (EC 3.2.1.55), alpha-1,2-L-arabinofuranosidase 43A (arabinan-specific; EC 3.2.1.-), endo-alpha-L-arabinanase as well as arabinoxylan arabinofuranohydrolase (AXH) activities. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. Included in this subfamily is the metagenomic beta-xylosidase/alpha-L-arabinofuranosidase CoXyl43, which shows synergy with Trichoderma reesei cellulases and promotes plant biomass saccharification by degrading xylo-oligosaccharides, such as xylobiose and xylotriose, into the monosaccharide xylose. Studies show that the hydrolytic activity of CoXyl43 is stimulated in the presence of calcium. Several of these enzymes also contain carbohydrate binding modules (CBMs) that bind cellulose or xylan. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  Glycosyl hydrolase family 43 protein such as metagenomic beta-xylosidase/alpha-L-arabinofuranosidase CoXyl43. This glycosyl hydrolase family 43 (GH43) subgroup belongs to the GH43_AXH-like subgroup which includes enzymes that have been characterized with beta-xylosidase (EC 3.2.1.37), alpha-L-arabinofuranosidase (EC 3.2.1.55), alpha-1,2-L-arabinofuranosidase 43A (arabinan-specific; EC 3.2.1.-), endo-alpha-L-arabinanase as well as arabinoxylan arabinofuranohydrolase (AXH) activities. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. Included in this subfamily is the metagenomic beta-xylosidase/alpha-L-arabinofuranosidase CoXyl43, which shows synergy with Trichoderma reesei cellulases and promotes plant biomass saccharification by degrading xylo-oligosaccharides, such as xylobiose and xylotriose, into the monosaccharide xylose. Studies show that the hydrolytic activity of CoXyl43 is stimulated in the presence of calcium. Several of these enzymes also contain carbohydrate binding modules (CBMs) that bind cellulose or xylan. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd18619); members share this curated model.
