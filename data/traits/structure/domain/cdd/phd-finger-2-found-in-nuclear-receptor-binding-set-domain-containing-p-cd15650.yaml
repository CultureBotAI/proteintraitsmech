identifier: CDD:cd15650
label: "PHD finger 2 found in nuclear receptor-binding SET domain-containing protein 1 (NSD1). NSD1, also termed H3 Lysine-36 and H4 Lysine-20 specific histone-lysine N-methyltransferase, or androgen receptor coactivator 267 kDa protein, or androgen receptor-associated protein of 267 kDa, or H3-K36-HMTase H4-K20-HMTase, or LysineN-methyltransferase 3B (KMT3B), or NR-binding SET domain-containing protein, is a lysine methyltransferase that preferentially methylates H3 on Lysine36 (H3-K36) and H4 on Lysine20 (H4-K20), which is primarily associated with active transcription. It plays a role in several pathologies, including but not limited to Sotos and Weaver syndromes, acute myeloid leukemia, breast cancer, neuroblastoma, and glioblastoma formation. It can alter transcription by interacting with the protein NSD1-interacting zinc finger protein 1 (NIZP1). It also mitigates caspase-1 activation by listeriolysin o (LLO) in macrophages, and requires functional LLO for the regulation of IL-1beta secretion. Moreover, NSD1 regulates RNA polymerase II (RNAP II) recruitment to bone morphogenetic protein 4 (BMP4). NSD1 contains a catalytic suppressor of variegation, enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-proline (PWWP) domains, five plant homeodomain (PHD) fingers, and an NSD-specific Cys-His rich domain (C5HCH). The SET domain is responsible for histone methyltransferase activity. The PWWP and PHD fingers are involved in protein-protein interactions. This model corresponds to the second PHD finger."
definition: >-
  PHD finger 2 found in nuclear receptor-binding SET domain-containing protein 1 (NSD1). NSD1, also termed H3 Lysine-36 and H4 Lysine-20 specific histone-lysine N-methyltransferase, or androgen receptor coactivator 267 kDa protein, or androgen receptor-associated protein of 267 kDa, or H3-K36-HMTase H4-K20-HMTase, or LysineN-methyltransferase 3B (KMT3B), or NR-binding SET domain-containing protein, is a lysine methyltransferase that preferentially methylates H3 on Lysine36 (H3-K36) and H4 on Lysine20 (H4-K20), which is primarily associated with active transcription. It plays a role in several pathologies, including but not limited to Sotos and Weaver syndromes, acute myeloid leukemia, breast cancer, neuroblastoma, and glioblastoma formation. It can alter transcription by interacting with the protein NSD1-interacting zinc finger protein 1 (NIZP1). It also mitigates caspase-1 activation by listeriolysin o (LLO) in macrophages, and requires functional LLO for the regulation of IL-1beta secretion. Moreover, NSD1 regulates RNA polymerase II (RNAP II) recruitment to bone morphogenetic protein 4 (BMP4). NSD1 contains a catalytic suppressor of variegation, enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-proline (PWWP) domains, five plant homeodomain (PHD) fingers, and an NSD-specific Cys-His rich domain (C5HCH). The SET domain is responsible for histone methyltransferase activity. The PWWP and PHD fingers are involved in protein-protein interactions. This model corresponds to the second PHD finger. — an NCBI CDD conserved domain (cd15650); members share this curated model.
