identifier: CDD:cd00579
label: "The Fis and NtrC proteins of E. coli and S. typhimurium respectively, belong to a family of bacterial response regulators that each contain a conserved C-terminal helix-turn-helix (HTH) motif capable of binding and bending DNA.  The HTH motif is made up of three alpha helices, the two C-terminal helices interacting directly with DNA and the third helix stabilizing the fold through homodimeric interactions."
definition: >-
  The Fis and NtrC proteins of E. coli and S. typhimurium respectively, belong to a family of bacterial response regulators that each contain a conserved C-terminal helix-turn-helix (HTH) motif capable of binding and bending DNA. The HTH motif is made up of three alpha helices, the two C-terminal helices interacting directly with DNA and the third helix stabilizing the fold through homodimeric interactions. — an NCBI CDD conserved domain (cd00579); members share this curated model.
