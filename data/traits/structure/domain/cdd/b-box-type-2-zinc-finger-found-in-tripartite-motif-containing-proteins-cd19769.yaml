identifier: CDD:cd19769
label: "B-box-type 2 zinc finger  found in tripartite motif-containing proteins, TRIM16, TRIM29, TRIM47 and similar proteins. This family includes a group of tripartite motif-containing proteins, such as TRIM16, TRIM29 and TRIM47. TRIM16, also termed estrogen-responsive B box protein (EBBP), is a regulator that may play a role in the regulation of keratinocyte differentiation. It may also act as a tumor suppressor through affecting cell proliferation and migration or tumorigenicity in carcinogenesis. TRIM29, also termed ataxia telangiectasia group D-associated protein (ATDC), plays a crucial role in the regulation of macrophage activation in response to viral or bacterial infections within the respiratory tract. TRIM47, also known as gene overexpressed in astrocytoma protein (GOA) or RING finger protein 100 (RNF100), plays an important role in the process of dedifferentiation that is associated with astrocytoma tumorigenesis. TRIM16 and TRIM29 belong to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. TRIM47 belongs to the C-IV subclass of TRIM family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and two coiled coil domains, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in tripartite motif-containing proteins, TRIM16, TRIM29, TRIM47 and similar proteins. This family includes a group of tripartite motif-containing proteins, such as TRIM16, TRIM29 and TRIM47. TRIM16, also termed estrogen-responsive B box protein (EBBP), is a regulator that may play a role in the regulation of keratinocyte differentiation. It may also act as a tumor suppressor through affecting cell proliferation and migration or tumorigenicity in carcinogenesis. TRIM29, also termed ataxia telangiectasia group D-associated protein (ATDC), plays a crucial role in the regulation of macrophage activation in response to viral or bacterial infections within the respiratory tract. TRIM47, also known as gene overexpressed in astrocytoma protein (GOA) or RING finger protein 100 (RNF100), plays an important role in the process of dedifferentiation that is associated with astrocytoma tumorigenesis. TRIM16 and TRIM29 belong to an unclassified TRIM (tripartite motif) family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. TRIM47 belongs to the C-IV subclass of TRIM family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and two coiled coil domains, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19769); members share this curated model.
