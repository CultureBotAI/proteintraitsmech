identifier: CDD:cd22621
label: "Kunitz-type domain 1 (KD1) of hepatocyte growth factor activator inhibitor type 2 (HAI-2), and similar proteins. This model includes the Kunitz domain 1 (KD1) of hepatocyte growth factor activator inhibitor type 2 (HAI-2 or HAI2, also known as placental bikunin or Kunitz-type protease inhibitor 2). HAI-2 is composed of two Kunitz domains that strongly inhibit many serine proteases with sub-nanomolar affinities. HAI-2 Kunitz domain 1 (KD1) has been found to be the domain responsible for inhibition of hepatocyte growth factor (HGF) activator; activated HGF/scatter factor (HGF/SF) binds to its receptor tyrosine kinase MET to induce dimerization and initiate phosphorylation cascades leading to comprehensive cellular changes that, in the deregulated context of cancer, drive malignant transformation and progression. HAI-2 has been found to be a natural tumor suppressor in renal cell carcinoma, breast cancer and prostate cancer; its loss leads to tumor growth and progression in part due to increased MET signaling. HAI-2 is also a specific substrate for mesotrypsin, which is up-regulated with progression in prostate cancers and shown to contribute to invasion and metastasis; these activities of mesotrypsin may in part be mediated through cleavage and inactivation of HAI-2, resulting in increases in HGF/SF activation and MET signaling. HAI-2 is a physiological inhibitor of hepsin and matriptase, two type II transmembrane serine proteases that, like HGF activator, can convert latent pro-HGF/SF into the two-chain active signaling heterodimer. The structures of these KD1 domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type domain 1 (KD1) of hepatocyte growth factor activator inhibitor type 2 (HAI-2), and similar proteins. This model includes the Kunitz domain 1 (KD1) of hepatocyte growth factor activator inhibitor type 2 (HAI-2 or HAI2, also known as placental bikunin or Kunitz-type protease inhibitor 2). HAI-2 is composed of two Kunitz domains that strongly inhibit many serine proteases with sub-nanomolar affinities. HAI-2 Kunitz domain 1 (KD1) has been found to be the domain responsible for inhibition of hepatocyte growth factor (HGF) activator; activated HGF/scatter factor (HGF/SF) binds to its receptor tyrosine kinase MET to induce dimerization and initiate phosphorylation cascades leading to comprehensive cellular changes that, in the deregulated context of cancer, drive malignant transformation and progression. HAI-2 has been found to be a natural tumor suppressor in renal cell carcinoma, breast cancer and prostate cancer; its loss leads to tumor growth and progression in part due to increased MET signaling. HAI-2 is also a specific substrate for mesotrypsin, which is up-regulated with progression in prostate cancers and shown to contribute to invasion and metastasis; these activities of mesotrypsin may in part be mediated through cleavage and inactivation of HAI-2, resulting in increases in HGF/SF activation and MET signaling. HAI-2 is a physiological inhibitor of hepsin and matriptase, two type II transmembrane serine proteases that, like HGF activator, can convert latent pro-HGF/SF into the two-chain active signaling heterodimer. The structures of these KD1 domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22621); members share this curated model.
