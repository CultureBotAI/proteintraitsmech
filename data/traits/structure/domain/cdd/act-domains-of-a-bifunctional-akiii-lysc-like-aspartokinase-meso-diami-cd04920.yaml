identifier: CDD:cd04920
label: "ACT domains of a bifunctional AKIII (LysC)-like aspartokinase/meso-diaminopimelate decarboxylase (DAPDC). This CD includes the second of two ACT domains of a bifunctional AKIII (LysC)-like aspartokinase/meso-diaminopimelate decarboxylase (DAPDC) bacterial protein. Aspartokinase (AK) is the first enzyme in the aspartate metabolic pathway and catalyzes the conversion of aspartate and ATP to aspartylphosphate and ADP. The lysA gene encodes the enzyme DAPDC, a pyridoxal-5'-phosphate (PLP)-dependent enzyme which catalyzes the final step in the lysine biosynthetic pathway converting meso-diaminopimelic acid (DAP) to l-lysine. Tandem ACT domains are positioned centrally with the AK catalytic domain N-terminal and the DAPDC domains C-terminal. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  ACT domains of a bifunctional AKIII (LysC)-like aspartokinase/meso-diaminopimelate decarboxylase (DAPDC). This CD includes the second of two ACT domains of a bifunctional AKIII (LysC)-like aspartokinase/meso-diaminopimelate decarboxylase (DAPDC) bacterial protein. Aspartokinase (AK) is the first enzyme in the aspartate metabolic pathway and catalyzes the conversion of aspartate and ATP to aspartylphosphate and ADP. The lysA gene encodes the enzyme DAPDC, a pyridoxal-5'-phosphate (PLP)-dependent enzyme which catalyzes the final step in the lysine biosynthetic pathway converting meso-diaminopimelic acid (DAP) to l-lysine. Tandem ACT domains are positioned centrally with the AK catalytic domain N-terminal and the DAPDC domains C-terminal. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04920); members share this curated model.
