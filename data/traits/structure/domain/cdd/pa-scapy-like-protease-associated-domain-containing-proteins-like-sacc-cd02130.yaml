identifier: CDD:cd02130
label: "PA_ScAPY_like: Protease-associated domain containing proteins like Saccharomyces cerevisiae aminopeptidase Y (ScAPY). This group contains various PA domain-containing proteins similar to the S. cerevisiae APY, including Trichophyton rubrum leucine aminopeptidase 1(LAP1). Proteins in this group belong to the peptidase M28 family. ScAPY hydrolyzes amino acid-4-methylcoumaryl-7-amides (MCAs). ScAPY more rapidly hydrolyzes dipeptidyl-MCAs. Hydrolysis of amino acid-MCAs or dipeptides is stimulated by Co2+ while  the hydrolysis of dipeptidyl-MCAs, tripeptides, and longer peptides is inhibited by Co2+. ScAPY is vacuolar and  is activated by proteolytic processing. LAP1 is a secreted leucine aminopeptidase. The significance of the PA domain to these proteins has not been ascertained. It may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate."
definition: >-
  PA_ScAPY_like: Protease-associated domain containing proteins like Saccharomyces cerevisiae aminopeptidase Y (ScAPY). This group contains various PA domain-containing proteins similar to the S. cerevisiae APY, including Trichophyton rubrum leucine aminopeptidase 1(LAP1). Proteins in this group belong to the peptidase M28 family. ScAPY hydrolyzes amino acid-4-methylcoumaryl-7-amides (MCAs). ScAPY more rapidly hydrolyzes dipeptidyl-MCAs. Hydrolysis of amino acid-MCAs or dipeptides is stimulated by Co2+ while the hydrolysis of dipeptidyl-MCAs, tripeptides, and longer peptides is inhibited by Co2+. ScAPY is vacuolar and is activated by proteolytic processing. LAP1 is a secreted leucine aminopeptidase. The significance of the PA domain to these proteins has not been ascertained. It may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate. — an NCBI CDD conserved domain (cd02130); members share this curated model.
