identifier: CDD:cd18449
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins, KLHL9 and KLHL13. KLHL9 and KLHL13 (also termed BTB and kelch domain-containing protein 2, or BKLHD2) are substrate-specific adaptors of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex required for mitotic progression and cytokinesis. The BCR(KLHL9-KLHL13) E3 ubiquitin ligase complex mediates the ubiquitination of AURKB and controls the dynamic behavior of AURKB on mitotic chromosomes and thereby coordinates faithful mitotic progression and completion of cytokinesis."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins, KLHL9 and KLHL13. KLHL9 and KLHL13 (also termed BTB and kelch domain-containing protein 2, or BKLHD2) are substrate-specific adaptors of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex required for mitotic progression and cytokinesis. The BCR(KLHL9-KLHL13) E3 ubiquitin ligase complex mediates the ubiquitination of AURKB and controls the dynamic behavior of AURKB on mitotic chromosomes and thereby coordinates faithful mitotic progression and completion of cytokinesis. — an NCBI CDD conserved domain (cd18449); members share this curated model.
