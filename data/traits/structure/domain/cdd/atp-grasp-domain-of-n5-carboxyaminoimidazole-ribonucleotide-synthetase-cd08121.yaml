identifier: CDD:cd08121
label: "ATP-grasp domain of N5-carboxyaminoimidazole ribonucleotide synthetase or PurK. ATP-grasp domain of N5-carboxyaminoimidazole ribonucleotide (NCAIR) synthetase, also known as PurK, (EC 4.1.1.21) catalyzes the formation of NCAIR from 5-aminoimidazole ribonucleotide (AIR) in the presence of ATP and a bicarbonate. PurK utilizes bicarbonate as a carboxylate substrate and 5-phosphoribosyglycinamide as an amine or thiol substrate. NCAIR, ADP, and an inorganic phosphate are the byproduct of this reaction. It contains the signature flexible loop region that is stabilized when bound to ATP. PurK functions as a homodimer where each subunit having 355 amino acid residues. PurK is one of the enzymes in the purine biosynthetic pathway. There are a total of four enzymes from purine biosynthetic pathway (PurD, PurT, PurK, PurP) that belong to the ATP-grasp superfamily."
definition: >-
