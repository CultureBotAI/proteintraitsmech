identifier: CDD:cd04701
label: "Bacterial/fungal L-Asparaginase type 2. L-Asparaginase hydrolyzes L-asparagine to L-aspartate and ammonia. The proenzyme undergoes an autoproteolytic cleavage into alpha and beta subunits to expose a threonine residue which becomes the N-terminal residue of the beta subunit. The threonine residue plays a central role in hydrolase activity. Some asparaginases can also hydrolyze L-glutamine and are termed glutaminase-asparaginase. This is a member of the Ntn-hydrolase superfamily, and this subfamily covers mostly bacterial and fungal enzymes."
definition: >-
  Bacterial/fungal L-Asparaginase type 2. L-Asparaginase hydrolyzes L-asparagine to L-aspartate and ammonia. The proenzyme undergoes an autoproteolytic cleavage into alpha and beta subunits to expose a threonine residue which becomes the N-terminal residue of the beta subunit. The threonine residue plays a central role in hydrolase activity. Some asparaginases can also hydrolyze L-glutamine and are termed glutaminase-asparaginase. This is a member of the Ntn-hydrolase superfamily, and this subfamily covers mostly bacterial and fungal enzymes. — an NCBI CDD conserved domain (cd04701); members share this curated model.
