identifier: CDD:cd06841
label: "Type III Pyridoxal 5-phosphate (PLP)-Dependent Enzyme MccE. This subfamily is composed of uncharacterized proteins with similarity to Escherichia coli MccE, a hypothetical protein that is homologous to eukaryotic ornithine decarboxylase (ODC) and diaminopimelate decarboxylase (DapDC). ODC and DapDC are fold type III PLP-dependent enzymes that contain an N-terminal PLP-binding TIM-barrel domain and a C-terminal beta-sandwich domain, similar to bacterial alanine racemases. ODC participates in the formation of putrescine by catalyzing the decarboxylation of ornithine, the first step in polyamine biosynthesis. DapDC participates in the last step of lysine biosynthesis, the conversion of meso-2,6-diaminoheptanedioate to L-lysine. Most members of this subfamily share the same domain architecture as ODC and DapDC. A few members, including Escherichia coli MccE, contain an additional acetyltransferase domain at the C-terminus."
definition: >-
  Type III Pyridoxal 5-phosphate (PLP)-Dependent Enzyme MccE. This subfamily is composed of uncharacterized proteins with similarity to Escherichia coli MccE, a hypothetical protein that is homologous to eukaryotic ornithine decarboxylase (ODC) and diaminopimelate decarboxylase (DapDC). ODC and DapDC are fold type III PLP-dependent enzymes that contain an N-terminal PLP-binding TIM-barrel domain and a C-terminal beta-sandwich domain, similar to bacterial alanine racemases. ODC participates in the formation of putrescine by catalyzing the decarboxylation of ornithine, the first step in polyamine biosynthesis. DapDC participates in the last step of lysine biosynthesis, the conversion of meso-2,6-diaminoheptanedioate to L-lysine. Most members of this subfamily share the same domain architecture as ODC and DapDC. A few members, including Escherichia coli MccE, contain an additional acetyltransferase domain at the C-terminus. — an NCBI CDD conserved domain (cd06841); members share this curated model.
