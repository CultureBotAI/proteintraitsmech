identifier: CDD:cd11842
label: "Src homology 3 domain of Ysc84p and similar fungal proteins. This family is composed of the Saccharomyces cerevisiae proteins, Ysc84p (also called LAS17-binding protein 4, Lsb4p) and Lsb3p, and similar fungal proteins. They contain an N-terminal SYLF domain (also called DUF500) and a C-terminal SH3 domain. Ysc84p localizes to actin patches and plays an important in actin polymerization during endocytosis. The N-terminal domain of both Ysc84p and Lsb3p can bind and bundle actin filaments. A study of the yeast SH3 domain interactome predicts that the SH3 domains of Lsb3p and Lsb4p may function as molecular hubs for the assembly of endocytic complexes. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Ysc84p and similar fungal proteins. This family is composed of the Saccharomyces cerevisiae proteins, Ysc84p (also called LAS17-binding protein 4, Lsb4p) and Lsb3p, and similar fungal proteins. They contain an N-terminal SYLF domain (also called DUF500) and a C-terminal SH3 domain. Ysc84p localizes to actin patches and plays an important in actin polymerization during endocytosis. The N-terminal domain of both Ysc84p and Lsb3p can bind and bundle actin filaments. A study of the yeast SH3 domain interactome predicts that the SH3 domains of Lsb3p and Lsb4p may function as molecular hubs for the assembly of endocytic complexes. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11842); members share this curated model.
