identifier: CDD:cd13959
label: "4-Hydroxybenzoate polyprenyltransferase. 4-Hydroxybenzoate polyprenyltransferase, also known as Coq2, catalyzes the prenylation of p-hydroxybenzoate with an all-trans polyprenyl group, an important step in ubiquinone (CoQ) biosynthesis. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways."
