identifier: CDD:cd11259
label: "The Sema domain, a protein interacting module, of semaphorin 4D (Sema4D, also known as CD100). Sema4D/CD100 is expressed in immune cells and plays critical roles in immune response; it is thus termed an \"immune semaphorin\". It is expressed by lymphocytes and promotes the aggregation and survival of B lymphocytes and inhibits cytokine-induced migration of immune cells in vitro. Sema4D/CD100 knock-out mice demonstrate that Sema4D is required for normal activation of B and T lymphocytes. Sema4D increases B-cell and DC function using either Plexin B1 or CD72 as receptors. The function of Sema4D in immune response implicates its role in infectious and noninfectious diseases. Sema4D belongs to the class 4 transmembrane semaphorin family of proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 4D (Sema4D, also known as CD100). Sema4D/CD100 is expressed in immune cells and plays critical roles in immune response; it is thus termed an "immune semaphorin". It is expressed by lymphocytes and promotes the aggregation and survival of B lymphocytes and inhibits cytokine-induced migration of immune cells in vitro. Sema4D/CD100 knock-out mice demonstrate that Sema4D is required for normal activation of B and T lymphocytes. Sema4D increases B-cell and DC function using either Plexin B1 or CD72 as receptors. The function of Sema4D in immune response implicates its role in infectious and noninfectious diseases. Sema4D belongs to the class 4 transmembrane semaphorin family of proteins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11259); members share this curated model.
