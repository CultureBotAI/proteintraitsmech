identifier: CDD:cd22175
label: "F-box domain found in F-box only protein 40 (FBXO40) and similar proteins. FBXO40, also called FBX40, or muscle disease-related protein, is a probable substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex that may function in myogenesis. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 40 (FBXO40) and similar proteins. FBXO40, also called FBX40, or muscle disease-related protein, is a probable substrate-recognition component of the SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex that may function in myogenesis. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22175); members share this curated model.
