identifier: CDD:cd12313
label: "RNA recognition motif 1 (RRM1) and 2 (RRM2) found in RNA-binding protein 5 (RBM5) and similar proteins. This subfamily includes the RRM1 and RRM2 of RNA-binding protein 5 (RBM5 or LUCA15 or H37) and RNA-binding protein 10 (RBM10 or S1-1), and the RRM2 of RNA-binding protein 6 (RBM6 or NY-LU-12 or g16 or DEF-3). These RBMs share high sequence homology and may play an important role in regulating apoptosis. RBM5 is a known modulator of apoptosis. It may also act as a tumor suppressor or an RNA splicing factor. RBM6 has been predicted to be a nuclear factor based on its nuclear localization signal. Both, RBM6 and RBM5, specifically bind poly(G) RNA. RBM10 is a paralog of RBM5. It may play an important role in mRNA generation, processing and degradation in several cell types. The rat homolog of human RBM10 is protein S1-1, a hypothetical RNA binding protein with poly(G) and poly(U) binding capabilities. All family members contain two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two C2H2-type zinc fingers, and a G-patch/D111 domain."
definition: >-
  RNA recognition motif 1 (RRM1) and 2 (RRM2) found in RNA-binding protein 5 (RBM5) and similar proteins. This subfamily includes the RRM1 and RRM2 of RNA-binding protein 5 (RBM5 or LUCA15 or H37) and RNA-binding protein 10 (RBM10 or S1-1), and the RRM2 of RNA-binding protein 6 (RBM6 or NY-LU-12 or g16 or DEF-3). These RBMs share high sequence homology and may play an important role in regulating apoptosis. RBM5 is a known modulator of apoptosis. It may also act as a tumor suppressor or an RNA splicing factor. RBM6 has been predicted to be a nuclear factor based on its nuclear localization signal. Both, RBM6 and RBM5, specifically bind poly(G) RNA. RBM10 is a paralog of RBM5. It may play an important role in mRNA generation, processing and degradation in several cell types. The rat homolog of human RBM10 is protein S1-1, a hypothetical RNA binding protein with poly(G) and poly(U) binding capabilities. All family members contain two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two C2H2-type zinc fingers, and a G-patch/D111 domain. — an NCBI CDD conserved domain (cd12313); members share this curated model.
