identifier: CDD:cd18218
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 32 (ZBTB32). ZBTB32 is also called FANCC-interacting protein, fanconi anemia zinc finger protein (FAZF), testis zinc finger protein (TZFP), or zinc finger protein 538 (ZNF538). It is a DNA-binding transcription factor that binds to the 5'-TGTACAGTGT-3' core sequence. It acts as a transcription suppressor that controls T cell-mediated autoimmunity. ZBTB32 is essential  for down-regulation of GATA3 via ZPO2; this promotes aggressive breast cancer development. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 32 (ZBTB32). ZBTB32 is also called FANCC-interacting protein, fanconi anemia zinc finger protein (FAZF), testis zinc finger protein (TZFP), or zinc finger protein 538 (ZNF538). It is a DNA-binding transcription factor that binds to the 5'-TGTACAGTGT-3' core sequence. It acts as a transcription suppressor that controls T cell-mediated autoimmunity. ZBTB32 is essential for down-regulation of GATA3 via ZPO2; this promotes aggressive breast cancer development. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18218); members share this curated model.
