identifier: CDD:cd16338
label: "T-type phycobiliprotein (PBP) lyase. This family contains the T-type phycobiliprotein (PBP) lyase (includes CpcT/CpeT, also known as CpcT bilin lyase). PBP lyases are employed by cyanobacteria, red algae, cryptophytes and glaucophytes for light-harvesting. Pigmentation of light-harvesting phycobiliproteins of cyanobacteria and cryptophytes requires covalent attachment of open-chain tetrapyrrole chromophores, the phycobilins, to the apoproteins. PBP lyases mediate this covalent attachment of phycobilin chromophores to apo-PBPs and also ensure the correct binding of the chromophore with regard to the specific attachment site and stereospecificity. The T-type lyase is distantly related to CpcS and is responsible for covalent attachment of phycocyanobilin (PCB) or phycoerythrobilin to a specific cysteine residue in the beta-subunit of phycocyanin (CpcB) and the beta-subunit of phycoerythrocyanin (PecB), and with a different stereochemistry than CpcS. In CpcT (All5339) from Nostoc (Anabaena) sp. PCC7120, sequential binding studies indicate that beta-subunit chromophorylation with PCB at a specific C- terminal cysteine residue in cyanobacterial phycocyanin and phycoerythrocyanin is hindered by a preceding chromophorylation at a specific N-terminal cysteine residue by CpcS.  T-type PBP lyases adopt a beta-barrel structure with a modified lipocalin fold, similar to S-type PBP lyases."
definition: >-
  T-type phycobiliprotein (PBP) lyase. This family contains the T-type phycobiliprotein (PBP) lyase (includes CpcT/CpeT, also known as CpcT bilin lyase). PBP lyases are employed by cyanobacteria, red algae, cryptophytes and glaucophytes for light-harvesting. Pigmentation of light-harvesting phycobiliproteins of cyanobacteria and cryptophytes requires covalent attachment of open-chain tetrapyrrole chromophores, the phycobilins, to the apoproteins. PBP lyases mediate this covalent attachment of phycobilin chromophores to apo-PBPs and also ensure the correct binding of the chromophore with regard to the specific attachment site and stereospecificity. The T-type lyase is distantly related to CpcS and is responsible for covalent attachment of phycocyanobilin (PCB) or phycoerythrobilin to a specific cysteine residue in the beta-subunit of phycocyanin (CpcB) and the beta-subunit of phycoerythrocyanin (PecB), and with a different stereochemistry than CpcS. In CpcT (All5339) from Nostoc (Anabaena) sp. PCC7120, sequential binding studies indicate that beta-subunit chromophorylation with PCB at a specific C- terminal cysteine residue in cyanobacterial phycocyanin and phycoerythrocyanin is hindered by a preceding chromophorylation at a specific N-terminal cysteine residue by CpcS. T-type PBP lyases adopt a beta-barrel structure with a modified lipocalin fold, similar to S-type PBP lyases. — an NCBI CDD conserved domain (cd16338); members share this curated model.
