identifier: CDD:cd13992
label: "Pseudokinase domain of membrane Guanylate Cyclase receptors. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. Membrane (or particulate) GCs consist of an extracellular ligand-binding domain, a single transmembrane region, and an intracellular tail that contains a PK-like domain, an amphiphatic region and a catalytic GC domain that catalyzes the conversion of GTP into cGMP and pyrophosphate. Membrane GCs act as receptors that transduce an extracellular signal to the intracellular production of cGMP, which has been implicated in many  processes including cell proliferation, phototransduction, and muscle contractility, through its downstream effectors such as PKG. The PK-like domain of GCs lack a critical aspartate involved in ATP binding and does not exhibit kinase activity. It functions as a negative regulator of the catalytic GC domain and may also act as a docking site for interacting proteins such as GC-activating proteins. The GC subfamily is part of a larger superfamily that includes the catalytic domains of protein serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Pseudokinase domain of membrane Guanylate Cyclase receptors. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. Membrane (or particulate) GCs consist of an extracellular ligand-binding domain, a single transmembrane region, and an intracellular tail that contains a PK-like domain, an amphiphatic region and a catalytic GC domain that catalyzes the conversion of GTP into cGMP and pyrophosphate. Membrane GCs act as receptors that transduce an extracellular signal to the intracellular production of cGMP, which has been implicated in many processes including cell proliferation, phototransduction, and muscle contractility, through its downstream effectors such as PKG. The PK-like domain of GCs lack a critical aspartate involved in ATP binding and does not exhibit kinase activity. It functions as a negative regulator of the catalytic GC domain and may also act as a docking site for interacting proteins such as GC-activating proteins. The GC subfamily is part of a larger superfamily that includes the catalytic domains of protein serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13992); members share this curated model.
