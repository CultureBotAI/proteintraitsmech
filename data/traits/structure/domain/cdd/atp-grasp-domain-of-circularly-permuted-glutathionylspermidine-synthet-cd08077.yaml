identifier: CDD:cd08077
label: "ATP-grasp domain of circularly permuted glutathionylspermidine synthetase and trypanothione synthetase like. ATP-grasp domain of glutathionylspermidine synthetase and trypanothione synthetase like enzymes. Glutathionylspermidine synthetase (GspS; EC: 6.3.1.8), and trypanothione synthetase (TryS; EC: 6.3.1.9) catalyzes trypanothione biosynthesis by conjugating glutathione (GSH) to the two terminal amino groups of spermidine in the presence of ATP. Mg ions are utilized as a cofactor. The C-terminal end of this enzyme belongs to the ATP-grasp superfamily. Just like the human Glutathione Synthetase (hGS), GspS and TryS also display a rare gene permutation that results into a circular shift in the core structure of GspS and TryS with respect to other members of ATP-grasp superfamily. The 70-kDa Escherichia coli GspS is a bifunctional enzyme that catalyzes reaction in both directions."
definition: >-
  ATP-grasp domain of circularly permuted glutathionylspermidine synthetase and trypanothione synthetase like. ATP-grasp domain of glutathionylspermidine synthetase and trypanothione synthetase like enzymes. Glutathionylspermidine synthetase (GspS; EC: 6.3.1.8), and trypanothione synthetase (TryS; EC: 6.3.1.9) catalyzes trypanothione biosynthesis by conjugating glutathione (GSH) to the two terminal amino groups of spermidine in the presence of ATP. Mg ions are utilized as a cofactor. The C-terminal end of this enzyme belongs to the ATP-grasp superfamily. Just like the human Glutathione Synthetase (hGS), GspS and TryS also display a rare gene permutation that results into a circular shift in the core structure of GspS and TryS with respect to other members of ATP-grasp superfamily. The 70-kDa Escherichia coli GspS is a bifunctional enzyme that catalyzes reaction in both directions. — an NCBI CDD conserved domain (cd08077); members share this curated model.
