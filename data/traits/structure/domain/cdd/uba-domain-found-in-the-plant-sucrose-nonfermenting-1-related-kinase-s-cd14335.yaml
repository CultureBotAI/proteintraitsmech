identifier: CDD:cd14335
label: "UBA domain found in the plant sucrose nonfermenting-1-related kinase (SnRK1) proteins. The plant SnRK1 proteins (also known as AKIN10/11) family contains plant orthologs of the yeast sucrose non-fermenting (Snf1) kinase and mammalian AMP-activated protein kinase (AMPK), including two catalytic alpha-subunits of plant Snf1-related kinases (SnRKs): SNF1-related protein kinase catalytic subunit alpha KIN10 (also called AKIN10 or AKIN alpha2) and SNF1-related protein kinase catalytic subunit alpha KIN11 (also called AKIN11 or AKIN alpha1). AKIN10 and AKIN11 function as central integrators of sugar, metabolic, stress, and developmental signals in plants. They form different complexes with the regulatory AKINbeta2, a plant ortholog of conserved Snf1/AMPK beta-subunits. In addition to an N-terminal protein kinase domain and a C-terminal regulatory domain of 5'-AMP-activated protein kinase (AMPK), Snf1 contains an ubiquitin-associated (UBA) domain, previously called SNF1 homology (SNH) domain, in the middle region."
definition: >-
  UBA domain found in the plant sucrose nonfermenting-1-related kinase (SnRK1) proteins. The plant SnRK1 proteins (also known as AKIN10/11) family contains plant orthologs of the yeast sucrose non-fermenting (Snf1) kinase and mammalian AMP-activated protein kinase (AMPK), including two catalytic alpha-subunits of plant Snf1-related kinases (SnRKs): SNF1-related protein kinase catalytic subunit alpha KIN10 (also called AKIN10 or AKIN alpha2) and SNF1-related protein kinase catalytic subunit alpha KIN11 (also called AKIN11 or AKIN alpha1). AKIN10 and AKIN11 function as central integrators of sugar, metabolic, stress, and developmental signals in plants. They form different complexes with the regulatory AKINbeta2, a plant ortholog of conserved Snf1/AMPK beta-subunits. In addition to an N-terminal protein kinase domain and a C-terminal regulatory domain of 5'-AMP-activated protein kinase (AMPK), Snf1 contains an ubiquitin-associated (UBA) domain, previously called SNF1 homology (SNH) domain, in the middle region. — an NCBI CDD conserved domain (cd14335); members share this curated model.
