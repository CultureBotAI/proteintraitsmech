identifier: CDD:cd05441
label: "Nucleotidyltransferase (NT) domain of  Escherichia coli ppGpp synthetase (RelA) and related proteins. NT_EcRelA_like: A subgroup, of the catalytic domain found in proteins similar to Escherichia coli ppGpp synthetase (RelA). Bacterial Rel-Spo family enzymes produce an intracellular signaling alarmone guanosine 5prime, 3prime-polyphosphate [(p)ppGpp] that triggers the stringent response, enabling bacteria to survive extended periods of nutrient limitation. (p)ppGpp is synthesized in E. coli, by RelA in response to amino-acid starvation and in association with ribosomes. E.coli also produces another Rel-Spo enzyme SpoT that synthesizes (p)ppGpp under conditions of carbon limitation and in a ribosome-independent fashion; however, SpoT is not found in this subgroup. RelA lacks of the HD domain and consequently does not possess the hydrolysis [(p)ppGpp degradation activity] of some other Rel-Spo family enzymes which do. Proteins belonging to this subgroup have in association with the catalytic domain, a C-terminal metal dependent phophohydrolase domain (TGS), some also have a C-terminal ACT regulatory domain. Proteins in this subgroup belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of the three catalytic carboxylates are found in Rel-Spo enzymes, missing is the second carboxylate of the DXD motif. Evidence supports a single-cation synthetase mechanism."
definition: >-
  Nucleotidyltransferase (NT) domain of Escherichia coli ppGpp synthetase (RelA) and related proteins. NT_EcRelA_like: A subgroup, of the catalytic domain found in proteins similar to Escherichia coli ppGpp synthetase (RelA). Bacterial Rel-Spo family enzymes produce an intracellular signaling alarmone guanosine 5prime, 3prime-polyphosphate [(p)ppGpp] that triggers the stringent response, enabling bacteria to survive extended periods of nutrient limitation. (p)ppGpp is synthesized in E. coli, by RelA in response to amino-acid starvation and in association with ribosomes. E.coli also produces another Rel-Spo enzyme SpoT that synthesizes (p)ppGpp under conditions of carbon limitation and in a ribosome-independent fashion; however, SpoT is not found in this subgroup. RelA lacks of the HD domain and consequently does not possess the hydrolysis [(p)ppGpp degradation activity] of some other Rel-Spo family enzymes which do. Proteins belonging to this subgroup have in association with the catalytic domain, a C-terminal metal dependent phophohydrolase domain (TGS), some also have a C-terminal ACT regulatory domain. Proteins in this subgroup belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. Two of the three catalytic carboxylates are found in Rel-Spo enzymes, missing is the second carboxylate of the DXD motif. Evidence supports a single-cation synthetase mechanism. — an NCBI CDD conserved domain (cd05441); members share this curated model.
