identifier: CDD:cd08748
label: "Regulator of G protein signaling domain (RGS) found in G protein-coupled receptor kinase 1 (GRK1). The RGS domain is found in G protein-coupled receptor kinases 1 (GRK1, also refered to as  Rhodopsin kinase) which play a key role in phosphorylation of rhodopsin (Rho), a G protein-coupled receptor responsible for visual signal transduction in rod cell. GRK1 is a member of the GRK kinase family which includes three major subfamilies: the GRK4 subfamily (GRK4, GRK5 and GRK6), the rhodopsin kinase or visual GRK subfamily (GRK1 and GRK7), and the beta-adrenergic receptor kinases subfamily (GRK2/GRK3). The RGS domain of the GRKs has very little sequence similarity with the canonical RGS domain of the RGS proteins and therefore is often refered to as the RH (RGS Homology) domain. A few inactivation mutations in GRK1 have been found in patients with Oguchi disease, a stationary form of night blindness. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development."
definition: >-
  Regulator of G protein signaling domain (RGS) found in G protein-coupled receptor kinase 1 (GRK1). The RGS domain is found in G protein-coupled receptor kinases 1 (GRK1, also refered to as Rhodopsin kinase) which play a key role in phosphorylation of rhodopsin (Rho), a G protein-coupled receptor responsible for visual signal transduction in rod cell. GRK1 is a member of the GRK kinase family which includes three major subfamilies: the GRK4 subfamily (GRK4, GRK5 and GRK6), the rhodopsin kinase or visual GRK subfamily (GRK1 and GRK7), and the beta-adrenergic receptor kinases subfamily (GRK2/GRK3). The RGS domain of the GRKs has very little sequence similarity with the canonical RGS domain of the RGS proteins and therefore is often refered to as the RH (RGS Homology) domain. A few inactivation mutations in GRK1 have been found in patients with Oguchi disease, a stationary form of night blindness. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. — an NCBI CDD conserved domain (cd08748); members share this curated model.
