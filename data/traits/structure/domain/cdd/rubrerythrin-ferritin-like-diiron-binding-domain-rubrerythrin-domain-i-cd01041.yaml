identifier: CDD:cd01041
label: "Rubrerythrin, ferritin-like diiron-binding domain. Rubrerythrin domain is a nonheme iron binding domain found in many air-sensitive bacteria and archaea and member of a broad superfamily of ferritin-like diiron-carboxylate proteins. The homodimeric rubrerythrin protein contains a binuclear metal center located within a four helix bundle. Many, but not all, rubrerythrin proteins have a second domain with a rubredoxin-like hexacoordinated iron center. Rubrerythrin is thought to reduce hydrogen peroxide as part of an oxidative stress protection system but its function is still poorly understood."
definition: >-
  Rubrerythrin, ferritin-like diiron-binding domain. Rubrerythrin domain is a nonheme iron binding domain found in many air-sensitive bacteria and archaea and member of a broad superfamily of ferritin-like diiron-carboxylate proteins. The homodimeric rubrerythrin protein contains a binuclear metal center located within a four helix bundle. Many, but not all, rubrerythrin proteins have a second domain with a rubredoxin-like hexacoordinated iron center. Rubrerythrin is thought to reduce hydrogen peroxide as part of an oxidative stress protection system but its function is still poorly understood. — an NCBI CDD conserved domain (cd01041); members share this curated model.
