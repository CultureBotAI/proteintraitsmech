label: "RUN domain found in RUN and SH3 domain-containing protein 1 (RUSC1) and similar proteins. RUSC1, also called new molecule containing SH3 at the carboxy-terminus (NESCA), may acts as a signaling adapter that translocates to the nuclear envelope and regulates neurotrophin-induced neurite outgrowth. This model contains the RUN domain of RUSC1."
definition: >-
