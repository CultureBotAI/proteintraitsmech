identifier: CDD:cd18894
label: "oxygenase domain of J-binding protein (JBP) 1 and JBP2 thymidine hydroxylases and similar proteins, including uncharacterized bacterial and phage proteins. J binding protein (JBP) 1 and JBP2 catalyze the first step of base J biosynthesis: the hydroxylation of thymine in DNA to form 5-hydroxymethyluracil (hmU). Base J (beta-d-glucopyranosyloxymethyluracil) is a hyper-modified DNA base found in the DNA of kinetoplastids (Trypanosoma brucei, Trypanosoma cruzi, and Leishmania). JBP1 and JBP2 each contain a J-DNA binding domain and this oxygenase domain. They belong to the TET/JBP family of dioxygenases that require Fe2+ and alpha-ketoglutarate (also known as 2-oxoglutarate) for activity."
definition: >-
  oxygenase domain of J-binding protein (JBP) 1 and JBP2 thymidine hydroxylases and similar proteins, including uncharacterized bacterial and phage proteins. J binding protein (JBP) 1 and JBP2 catalyze the first step of base J biosynthesis: the hydroxylation of thymine in DNA to form 5-hydroxymethyluracil (hmU). Base J (beta-d-glucopyranosyloxymethyluracil) is a hyper-modified DNA base found in the DNA of kinetoplastids (Trypanosoma brucei, Trypanosoma cruzi, and Leishmania). JBP1 and JBP2 each contain a J-DNA binding domain and this oxygenase domain. They belong to the TET/JBP family of dioxygenases that require Fe2+ and alpha-ketoglutarate (also known as 2-oxoglutarate) for activity. — an NCBI CDD conserved domain (cd18894); members share this curated model.
