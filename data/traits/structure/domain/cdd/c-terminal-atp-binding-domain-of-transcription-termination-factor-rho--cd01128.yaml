label: "C-terminal ATP binding domain of transcription termination factor rho. Transcription termination factor rho is a bacterial ATP-dependent RNA/DNA helicase. It is a homohexamer.  Each monomer consists of an N-terminal oligonucleotide/oligosaccharide binding fold (OB-fold) domain which binds cysteine-rich nucleotides, and a C-terminal ATP binding domain. This alignment is of the C-terminal ATP binding domain."
definition: >-
  C-terminal ATP binding domain of transcription termination factor rho. Transcription termination factor rho is a bacterial ATP-dependent RNA/DNA helicase. It is a homohexamer. Each monomer consists of an N-terminal oligonucleotide/oligosaccharide binding fold (OB-fold) domain which binds cysteine-rich nucleotides, and a C-terminal ATP binding domain. This alignment is of the C-terminal ATP binding domain. — an NCBI CDD conserved domain (cd01128); members share this curated model.
