identifier: CDD:cd16954
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli PhoQ and Providencia stuartii AarG. This family includes histidine kinase-like ATPase (HATPase) domain of two-component sensor histidine kinases similar to Escherichia coli PhoQ and Providencia stuartii AarG. PhoQ is the histidine kinase (HK) of the PhoP-PhoQ two-component regulatory system (TCS), which responds to the levels of Mg2+ and Ca2+, controls virulence, mediates the adaptation to Mg2+-limiting environments, and regulates numerous cellular activities. Providencia stuartii AarG is a putative sensor kinase which controls the expression of the 2'-N-acetyltransferase and an intrinsic multiple antibiotic resistance (Mar) response in Providencia stuartii. The AarG product is similar to PhoQ in that it is able to restore wild-type levels of resistance to a Salmonella typhimurium phoQ mutant. However, the expression of the 2'-N-acetyltransferase gene and of aarP (a gene encoding a transcriptional activator of 2'-N-acetyltransferase) are not significantly affected by the levels of Mg2+ or Ca2+. Most proteins in this group contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some have an accessory HAMP sensor domain, and some have an intracellular membrane -interaction PhoQ sensor domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli PhoQ and Providencia stuartii AarG. This family includes histidine kinase-like ATPase (HATPase) domain of two-component sensor histidine kinases similar to Escherichia coli PhoQ and Providencia stuartii AarG. PhoQ is the histidine kinase (HK) of the PhoP-PhoQ two-component regulatory system (TCS), which responds to the levels of Mg2+ and Ca2+, controls virulence, mediates the adaptation to Mg2+-limiting environments, and regulates numerous cellular activities. Providencia stuartii AarG is a putative sensor kinase which controls the expression of the 2'-N-acetyltransferase and an intrinsic multiple antibiotic resistance (Mar) response in Providencia stuartii. The AarG product is similar to PhoQ in that it is able to restore wild-type levels of resistance to a Salmonella typhimurium phoQ mutant. However, the expression of the 2'-N-acetyltransferase gene and of aarP (a gene encoding a transcriptional activator of 2'-N-acetyltransferase) are not significantly affected by the levels of Mg2+ or Ca2+. Most proteins in this group contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some have an accessory HAMP sensor domain, and some have an intracellular membrane -interaction PhoQ sensor domain. — an NCBI CDD conserved domain (cd16954); members share this curated model.
