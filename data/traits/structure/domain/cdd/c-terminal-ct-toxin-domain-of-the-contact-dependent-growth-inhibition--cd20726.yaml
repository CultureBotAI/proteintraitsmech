identifier: CDD:cd20726
label: "C-terminal (CT) toxin domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) of Burkholderia pseudomallei, and similar proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the C-terminal (CT) toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular model contains the C-terminal (CT) domain of Burkholderia pseudomallei E479 CdiA. This CdiA-CT domain is a tRNAse that contains a core alpha/beta-fold that is characteristic of PD(D/E)XK superfamily nucleases. It is structurally similar to another CDI toxin domain from B. pseudomallei 1026b which is unrelated in sequence but has a similar nuclease domain, and shares similar fold and active-site architecture. The PD(D/E)XK superfamily includes most restriction endonucleases and other enzymes involved in DNA recombination and repair."
definition: >-
  C-terminal (CT) toxin domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) of Burkholderia pseudomallei, and similar proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring cells. This model represents the C-terminal (CT) toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered via the C-terminal domain. A wide variety of C-terminal toxin domains appear to exist; this particular model contains the C-terminal (CT) domain of Burkholderia pseudomallei E479 CdiA. This CdiA-CT domain is a tRNAse that contains a core alpha/beta-fold that is characteristic of PD(D/E)XK superfamily nucleases. It is structurally similar to another CDI toxin domain from B. pseudomallei 1026b which is unrelated in sequence but has a similar nuclease domain, and shares similar fold and active-site architecture. The PD(D/E)XK superfamily includes most restriction endonucleases and other enzymes involved in DNA recombination and repair. — an NCBI CDD conserved domain (cd20726); members share this curated model.
