identifier: CDD:cd23338
label: "fascin-like domain, beta-trefoil fold, found in FSHD region gene 1 protein (FRG1) and similar proteins. Protein FRG1 binds to mRNA in a sequence-independent manner. It may play a role in the regulation of pre-mRNA splicing or in the assembly of rRNA into ribosomal subunits. It may be involved in mRNA transport, as well as in epigenetic regulation of muscle differentiation through regulation of activity of the histone-lysine N-methyltransferase KMT5B. FRG1 contains a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  fascin-like domain, beta-trefoil fold, found in FSHD region gene 1 protein (FRG1) and similar proteins. Protein FRG1 binds to mRNA in a sequence-independent manner. It may play a role in the regulation of pre-mRNA splicing or in the assembly of rRNA into ribosomal subunits. It may be involved in mRNA transport, as well as in epigenetic regulation of muscle differentiation through regulation of activity of the histone-lysine N-methyltransferase KMT5B. FRG1 contains a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23338); members share this curated model.
