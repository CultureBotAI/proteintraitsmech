identifier: CDD:cd19442
label: "cellular retinol-binding protein. Cellular retinol-binding proteins (CRBPs) participate in the cellular uptake of vitamin A in the form of free retinol. Retinol achieves a higher chemical stability when bound to CRBPs, and its interaction with retinol-binding proteins allows the solubilization in the aqueous medium of the hydrophobic retinol molecule. There are four human CRBP types (CRBP1, -2, -3, -4) which differ in their tissue-specific expression pattern, as well as in their different ligand affinities. CRBPs belong to the intracellular fatty acid-binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and, besides CRBPS, include the cellular retinoic acid-binding proteins (CRABPs) and the fatty acid-binding proteins (FABPs)."
