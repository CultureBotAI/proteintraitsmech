identifier: CDD:cd11840
label: "Fifth Src homology 3 domain (or SH3E) of Intersectin. Intersectins (ITSNs) are adaptor proteins that function in exo- and endocytosis, actin cytoskeletal reorganization, and signal transduction. They are essential for initiating clathrin-coated pit formation. They bind to many proteins through their multidomain structure and facilitate the assembly of multimeric complexes. Vertebrates contain two ITSN proteins, ITSN1 and ITSN2, which exist in alternatively spliced short and long isoforms. The short isoforms contain two Eps15 homology domains (EH1 and EH2), a coiled-coil region and five SH3 domains (SH3A-E), while the long isoforms, in addition, contain RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains. ITSN1 and ITSN2 are both widely expressed, with variations depending on tissue type and stage of development. The fifth SH3 domain (or SH3E) of ITSN1 has been shown to bind many protein partners including SGIP1, Sos1, dynamin1/2, CIN85, c-Cbl, SHIP2, N-WASP, and synaptojanin-1, among others. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Fifth Src homology 3 domain (or SH3E) of Intersectin. Intersectins (ITSNs) are adaptor proteins that function in exo- and endocytosis, actin cytoskeletal reorganization, and signal transduction. They are essential for initiating clathrin-coated pit formation. They bind to many proteins through their multidomain structure and facilitate the assembly of multimeric complexes. Vertebrates contain two ITSN proteins, ITSN1 and ITSN2, which exist in alternatively spliced short and long isoforms. The short isoforms contain two Eps15 homology domains (EH1 and EH2), a coiled-coil region and five SH3 domains (SH3A-E), while the long isoforms, in addition, contain RhoGEF (also called Dbl-homologous or DH), Pleckstrin homology (PH) and C2 domains. ITSN1 and ITSN2 are both widely expressed, with variations depending on tissue type and stage of development. The fifth SH3 domain (or SH3E) of ITSN1 has been shown to bind many protein partners including SGIP1, Sos1, dynamin1/2, CIN85, c-Cbl, SHIP2, N-WASP, and synaptojanin-1, among others. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11840); members share this curated model.
