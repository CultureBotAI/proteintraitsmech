identifier: CDD:cd21808
label: "lantibiotic immunity ABC transporter MutG family permease (also called ABC-2 transporter MutG family permease) subunit. This subfamily includes lantibiotic ABC transporter permease subunit MutG which is a highly hydrophobic, integral membrane protein, and part of the bacitracin ABC transport system that confers resistance to the Gram-positive bacteria in which this system operates, specifically to lantibiotic mutacin. Lantibiotics are small peptides, produced by Gram-positive bacteria, which are ribosomally-synthesized as pre-peptides and act by disrupting membrane integrity. Genes encoding the lantibiotic ABC transporter subunits are highly organized in operons containing all the genes required for maturation, transport, immunity, and synthesis. For example, in Streptococcus mutans CH43, the lantibiotic mutacin is active against other Gram-positive bacteria via various modes of actions; however, its self-protection against the pore-forming mutacin is mediated by the ABC transporter composed of MutF, MutE, and MutG. This subfamily includes the MutG permease subunit that transports mutacin to the surface and expels it from the membrane."
definition: >-
  lantibiotic immunity ABC transporter MutG family permease (also called ABC-2 transporter MutG family permease) subunit. This subfamily includes lantibiotic ABC transporter permease subunit MutG which is a highly hydrophobic, integral membrane protein, and part of the bacitracin ABC transport system that confers resistance to the Gram-positive bacteria in which this system operates, specifically to lantibiotic mutacin. Lantibiotics are small peptides, produced by Gram-positive bacteria, which are ribosomally-synthesized as pre-peptides and act by disrupting membrane integrity. Genes encoding the lantibiotic ABC transporter subunits are highly organized in operons containing all the genes required for maturation, transport, immunity, and synthesis. For example, in Streptococcus mutans CH43, the lantibiotic mutacin is active against other Gram-positive bacteria via various modes of actions; however, its self-protection against the pore-forming mutacin is mediated by the ABC transporter composed of MutF, MutE, and MutG. This subfamily includes the MutG permease subunit that transports mutacin to the surface and expels it from the membrane. — an NCBI CDD conserved domain (cd21808); members share this curated model.
