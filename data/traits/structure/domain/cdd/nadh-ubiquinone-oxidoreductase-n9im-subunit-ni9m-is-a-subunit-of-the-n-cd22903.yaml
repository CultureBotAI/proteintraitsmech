identifier: CDD:cd22903
label: "NADH:Ubiquinone Oxidoreductase, N9IM subunit. NI9M is a subunit of the NADH:ubiquinone oxidoreductase (Respiratory complex I), which is a redox-driven proton pump that plays an important role in creating the electrochemical gradient that powers mitochondrial adenosine triphosphate synthesis. NI9M is a single-pass membrane protein and a fungal subunit homologous to NADH dehydrogenase 1 alpha subcomplex subunit 3 (NDUFA3) that is considered an accessory subunit."
definition: >-
