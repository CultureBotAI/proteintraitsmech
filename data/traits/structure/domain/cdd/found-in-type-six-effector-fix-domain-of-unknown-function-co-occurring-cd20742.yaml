identifier: CDD:cd20742
label: "Found in type sIX effector (FIX) domain of unknown function co-occurring with von Willebrand factor type A (vWA) domain or MSCRAMM family adhesin SdrC domain. The Found in type sIX effector (FIX) domain is found N-terminal to known toxin domains and is genetically and functionally linked to type VI secretion system (T6SS), a widespread mechanism used by Gram-negative bacteria to antagonize neighboring cells. In Vibrio parahaemolyticus, it also co-occurs with C-terminal nuclease toxin PoNe (Polymorphic Nuclease effector) which is associated with several toxin delivery systems including type V, type VI, and type VII. In this subfamily, members contain a FIX domain that co-occurs with domains such as the von Willebrand factor type A (vWA) domain, which has a wide variety of important cellular functions, and the MSCRAMM (Microbial Surface Components Recognizing Adhesive Matrix Molecules) family adhesin SdrC domain, that contains a variable-length C-terminal region of Ser-Asp (SD) repeats."
definition: >-
  Found in type sIX effector (FIX) domain of unknown function co-occurring with von Willebrand factor type A (vWA) domain or MSCRAMM family adhesin SdrC domain. The Found in type sIX effector (FIX) domain is found N-terminal to known toxin domains and is genetically and functionally linked to type VI secretion system (T6SS), a widespread mechanism used by Gram-negative bacteria to antagonize neighboring cells. In Vibrio parahaemolyticus, it also co-occurs with C-terminal nuclease toxin PoNe (Polymorphic Nuclease effector) which is associated with several toxin delivery systems including type V, type VI, and type VII. In this subfamily, members contain a FIX domain that co-occurs with domains such as the von Willebrand factor type A (vWA) domain, which has a wide variety of important cellular functions, and the MSCRAMM (Microbial Surface Components Recognizing Adhesive Matrix Molecules) family adhesin SdrC domain, that contains a variable-length C-terminal region of Ser-Asp (SD) repeats. — an NCBI CDD conserved domain (cd20742); members share this curated model.
