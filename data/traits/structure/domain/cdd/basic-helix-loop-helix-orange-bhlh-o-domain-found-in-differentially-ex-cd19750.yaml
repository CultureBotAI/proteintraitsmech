identifier: CDD:cd19750
label: "basic helix-loop-helix-orange (bHLH-O) domain found in differentially expressed in chondrocytes protein 2 (DEC2) and similar proteins. DEC2, also termed Class E basic helix-loop-helix protein 41 (bHLHe41), or Class B basic helix-loop-helix protein 3 (bHLHb3), or enhancer-of-split and hairy-related protein 1 (SHARP-1), is a bHLH-O transcriptional repressor involved in the regulation of the circadian rhythm by negatively regulating the activity of the clock genes and clock-controlled genes."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in differentially expressed in chondrocytes protein 2 (DEC2) and similar proteins. DEC2, also termed Class E basic helix-loop-helix protein 41 (bHLHe41), or Class B basic helix-loop-helix protein 3 (bHLHb3), or enhancer-of-split and hairy-related protein 1 (SHARP-1), is a bHLH-O transcriptional repressor involved in the regulation of the circadian rhythm by negatively regulating the activity of the clock genes and clock-controlled genes. — an NCBI CDD conserved domain (cd19750); members share this curated model.
