identifier: CDD:cd01990
label: "Lactate racemization operon protein LarE and similar proteins. This subfamily includes Lactiplantibacillus plantarum LarE, a sacrificial sulfur insertase of the N-type ATP pyrophosphatase family. LarE is part of the  lar operon, encoding five Lar proteins (LarA-E) that collaboratively synthesize and incorporate a niacin-derived Ni-containing cofactor into LarA, an Ni-dependent lactate racemase. It catalyzes successive thiolation reactions by donating the sulfur atom of their exclusive cysteine residues to the substrate. The LarE-like subfamily belongs to the nucleotide alpha hydrolase (AANH) superfamily that includes N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to the adenosine group. Proteins from this subfamily probably binds ATP. This domain is about 200 amino acids long with a strongly conserved motif SGGxDS at the N-terminus."
definition: >-
  Lactate racemization operon protein LarE and similar proteins. This subfamily includes Lactiplantibacillus plantarum LarE, a sacrificial sulfur insertase of the N-type ATP pyrophosphatase family. LarE is part of the lar operon, encoding five Lar proteins (LarA-E) that collaboratively synthesize and incorporate a niacin-derived Ni-containing cofactor into LarA, an Ni-dependent lactate racemase. It catalyzes successive thiolation reactions by donating the sulfur atom of their exclusive cysteine residues to the substrate. The LarE-like subfamily belongs to the nucleotide alpha hydrolase (AANH) superfamily that includes N-type ATP PPases and ATP sulfurylases. It forms an alpha/beta/alpha fold which binds to the adenosine group. Proteins from this subfamily probably binds ATP. This domain is about 200 amino acids long with a strongly conserved motif SGGxDS at the N-terminus. — an NCBI CDD conserved domain (cd01990); members share this curated model.
