identifier: CDD:cd20649
label: "cytochrome P450 family 5, subfamily A, polypeptide 1, also called thromboxane-A synthase. Cytochrome P450 5A1 (CYP5A1), also called thromboxane-A synthase (EC 5.3.99.5) or thromboxane synthetase, converts prostaglandin H2 into thromboxane A2, a biologically active metabolite of arachidonic acid that has been implicated in stroke, asthma, and various cardiovascular diseases, due to its acute and chronic effects in promoting platelet aggregation, vasoconstriction, bronchoconstriction, and proliferation. CYP5A1 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 5, subfamily A, polypeptide 1, also called thromboxane-A synthase. Cytochrome P450 5A1 (CYP5A1), also called thromboxane-A synthase (EC 5.3.99.5) or thromboxane synthetase, converts prostaglandin H2 into thromboxane A2, a biologically active metabolite of arachidonic acid that has been implicated in stroke, asthma, and various cardiovascular diseases, due to its acute and chronic effects in promoting platelet aggregation, vasoconstriction, bronchoconstriction, and proliferation. CYP5A1 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20649); members share this curated model.
