identifier: CDD:cd23288
label: "MIR domain, beta-trefoil fold, found in inositol 1,4,5-trisphosphate receptor type 2 (ITPR2) and similar proteins. ITPR2, also called IP3 receptor isoform 2 (IP3R 2), or InsP3R2, or type 2 inositol 1,4,5-trisphosphate receptor, or type 2 InsP3 receptor, is a key regulator for the activity of calcium ion transmembrane transportation, which plays a critical role in cell cycle and proliferation. It is a receptor for inositol 1,4,5-trisphosphate, a second messenger that mediates the release of intracellular calcium. This release is regulated by cAMP both dependently and independently of cAMP-dependent protein kinase (PKA). ITPR2 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in inositol 1,4,5-trisphosphate receptor type 2 (ITPR2) and similar proteins. ITPR2, also called IP3 receptor isoform 2 (IP3R 2), or InsP3R2, or type 2 inositol 1,4,5-trisphosphate receptor, or type 2 InsP3 receptor, is a key regulator for the activity of calcium ion transmembrane transportation, which plays a critical role in cell cycle and proliferation. It is a receptor for inositol 1,4,5-trisphosphate, a second messenger that mediates the release of intracellular calcium. This release is regulated by cAMP both dependently and independently of cAMP-dependent protein kinase (PKA). ITPR2 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23288); members share this curated model.
