identifier: CDD:cd07994
label: "WGR domain. The WGR domain is found in a variety of eukaryotic poly(ADP-ribose) polymerases (PARPs) as well as the putative Escherichia coli molybdate metabolism regulator and related bacterial proteins, a small family of bacterial DNA ligases, and various other bacterial proteins of unknown function. It has been called WGR after the most conserved central motif of the domain. The domain occurs in single-domain proteins and in a variety of domain architectures, and is between 70 and 80 residues in length. It has been proposed to function as a nucleic acid binding domain."
definition: >-
  WGR domain. The WGR domain is found in a variety of eukaryotic poly(ADP-ribose) polymerases (PARPs) as well as the putative Escherichia coli molybdate metabolism regulator and related bacterial proteins, a small family of bacterial DNA ligases, and various other bacterial proteins of unknown function. It has been called WGR after the most conserved central motif of the domain. The domain occurs in single-domain proteins and in a variety of domain architectures, and is between 70 and 80 residues in length. It has been proposed to function as a nucleic acid binding domain. — an NCBI CDD conserved domain (cd07994); members share this curated model.
