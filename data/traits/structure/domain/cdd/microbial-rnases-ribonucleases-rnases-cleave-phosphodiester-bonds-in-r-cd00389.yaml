identifier: CDD:cd00389
label: "microbial_RNases. Ribonucleases (RNAses) cleave phosphodiester bonds in RNA and are essential  for both non-specific RNA degradation and for numerous forms of RNA processing. The alignment contains fungal RNases (U2, T1, F1, Th,  Pb, N1, and Ms) and bacterial RNases (barnase, binase, RNase Sa) , the majority of which are guanyl specific and fungal ribotoxins."
definition: >-
  microbial_RNases. Ribonucleases (RNAses) cleave phosphodiester bonds in RNA and are essential for both non-specific RNA degradation and for numerous forms of RNA processing. The alignment contains fungal RNases (U2, T1, F1, Th, Pb, N1, and Ms) and bacterial RNases (barnase, binase, RNase Sa) , the majority of which are guanyl specific and fungal ribotoxins. — an NCBI CDD conserved domain (cd00389); members share this curated model.
