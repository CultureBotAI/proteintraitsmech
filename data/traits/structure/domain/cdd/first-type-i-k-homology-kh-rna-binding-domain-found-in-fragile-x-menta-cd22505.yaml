identifier: CDD:cd22505
label: "first type I K homology (KH) RNA-binding domain found in fragile X mental retardation syndrome-related protein 2 (FXR2) and similar proteins. FXR2, also known as FMR1L2, is an RNA-binding protein that plays a role in central nervous system function. It specifically regulates hippocampal neurogenesis by reducing the stability of Noggin mRNA. FXR2 contains three K-homology (KH) RNA-binding domains. The model corresponds to the first one. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  first type I K homology (KH) RNA-binding domain found in fragile X mental retardation syndrome-related protein 2 (FXR2) and similar proteins. FXR2, also known as FMR1L2, is an RNA-binding protein that plays a role in central nervous system function. It specifically regulates hippocampal neurogenesis by reducing the stability of Noggin mRNA. FXR2 contains three K-homology (KH) RNA-binding domains. The model corresponds to the first one. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22505); members share this curated model.
