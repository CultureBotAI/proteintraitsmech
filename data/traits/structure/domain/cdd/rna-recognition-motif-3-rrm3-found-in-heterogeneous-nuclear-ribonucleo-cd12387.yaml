identifier: CDD:cd12387
label: "RNA recognition motif 3 (RRM3) found in heterogeneous nuclear ribonucleoprotein M (hnRNP M) and similar proteins. This subfamily corresponds to the RRM3 of heterogeneous nuclear ribonucleoprotein M (hnRNP M), myelin expression factor 2 (MEF-2 or MyEF-2 or MST156) and similar proteins. hnRNP M is pre-mRNA binding protein that may play an important role in the pre-mRNA processing. It also preferentially binds to poly(G) and poly(U) RNA homopolymers. hnRNP M is able to interact with early spliceosomes, further influencing splicing patterns of specific pre-mRNAs. hnRNP M functions as the receptor of carcinoembryonic antigen (CEA) that contains the penta-peptide sequence PELPK signaling motif. In addition, hnRNP M and another splicing factor Nova-1 work together as dopamine D2 receptor (D2R) pre-mRNA-binding proteins. They regulate alternative splicing of D2R pre-mRNA in an antagonistic manner. hnRNP M contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and an unusual hexapeptide-repeat region rich in methionine and arginine residues (MR repeat motif). MEF-2 is a sequence-specific single-stranded DNA (ssDNA) binding protein that binds specifically to ssDNA derived from the proximal (MB1) element of the myelin basic protein (MBP) promoter and represses transcription of the MBP gene. MEF-2 shows high sequence homology with hnRNP M. It also contains three RRMs, which may be responsible for its ssDNA binding activity."
definition: >-
  RNA recognition motif 3 (RRM3) found in heterogeneous nuclear ribonucleoprotein M (hnRNP M) and similar proteins. This subfamily corresponds to the RRM3 of heterogeneous nuclear ribonucleoprotein M (hnRNP M), myelin expression factor 2 (MEF-2 or MyEF-2 or MST156) and similar proteins. hnRNP M is pre-mRNA binding protein that may play an important role in the pre-mRNA processing. It also preferentially binds to poly(G) and poly(U) RNA homopolymers. hnRNP M is able to interact with early spliceosomes, further influencing splicing patterns of specific pre-mRNAs. hnRNP M functions as the receptor of carcinoembryonic antigen (CEA) that contains the penta-peptide sequence PELPK signaling motif. In addition, hnRNP M and another splicing factor Nova-1 work together as dopamine D2 receptor (D2R) pre-mRNA-binding proteins. They regulate alternative splicing of D2R pre-mRNA in an antagonistic manner. hnRNP M contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and an unusual hexapeptide-repeat region rich in methionine and arginine residues (MR repeat motif). MEF-2 is a sequence-specific single-stranded DNA (ssDNA) binding protein that binds specifically to ssDNA derived from the proximal (MB1) element of the myelin basic protein (MBP) promoter and represses transcription of the MBP gene. MEF-2 shows high sequence homology with hnRNP M. It also contains three RRMs, which may be responsible for its ssDNA binding activity. — an NCBI CDD conserved domain (cd12387); members share this curated model.
