identifier: CDD:cd02412
label: "type II K-homology (KH) RNA-binding domain found in 30S ribosomal protein S3 and similar proteins. 30S ribosomal protein S3, also called small ribosomal subunit protein uS3, is part of the head region of the 30S ribosomal subunit and binds to the lower part of the 30S subunit head. It may also bind mRNA in the 70S ribosome, positioning it for translation. S3 protein is believed to interact with mRNA as it threads its way from the latch into the channel. Members of this family contain only one canonical type II K-homology (KH) domain that has the signature motif GXXG (where X represents any amino acid)."
definition: >-
  type II K-homology (KH) RNA-binding domain found in 30S ribosomal protein S3 and similar proteins. 30S ribosomal protein S3, also called small ribosomal subunit protein uS3, is part of the head region of the 30S ribosomal subunit and binds to the lower part of the 30S subunit head. It may also bind mRNA in the 70S ribosome, positioning it for translation. S3 protein is believed to interact with mRNA as it threads its way from the latch into the channel. Members of this family contain only one canonical type II K-homology (KH) domain that has the signature motif GXXG (where X represents any amino acid). — an NCBI CDD conserved domain (cd02412); members share this curated model.
