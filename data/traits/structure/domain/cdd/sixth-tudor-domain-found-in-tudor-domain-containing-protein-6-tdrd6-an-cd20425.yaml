identifier: CDD:cd20425
label: "sixth Tudor domain found in Tudor domain-containing protein 6 (TDRD6) and similar proteins. TDRD6, also called antigen NY-CO-45 or cancer/testis antigen 41.2 (CT41.2), is a testis-specific expressed protein that was localized to the chromatoid bodies in germ cells, and is involved in spermiogenesis, chromatoid body formation, and for proper precursor and mature miRNA expression. Mutations in TDRD6 may be associated with human male infertility and early embryonic lethality. TDRD6 contains seven Tudor domains. This model corresponds to the sixth one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  sixth Tudor domain found in Tudor domain-containing protein 6 (TDRD6) and similar proteins. TDRD6, also called antigen NY-CO-45 or cancer/testis antigen 41.2 (CT41.2), is a testis-specific expressed protein that was localized to the chromatoid bodies in germ cells, and is involved in spermiogenesis, chromatoid body formation, and for proper precursor and mature miRNA expression. Mutations in TDRD6 may be associated with human male infertility and early embryonic lethality. TDRD6 contains seven Tudor domains. This model corresponds to the sixth one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20425); members share this curated model.
