identifier: CDD:cd02409
label: "type II K-homology (KH) RNA-binding domain superfamily. The K-homology (KH) domain binds single-stranded RNA or DNA, and is found in a wide variety of proteins including ribosomal proteins, transcription factors, and post-transcriptional modifiers of mRNA. There are two different KH domains that belong to different protein folds, but share a single \"minimal KH motif\" which is folded into a beta-alpha-alpha-beta unit. In addition to the core, type II KH domains (e.g. ribosomal protein S3) include an N-terminal extension while type I KH domains (e.g. hnRNP K) contain a C-terminal extension, connected to the KH motif by variable loops that are different in different KH domains, whether they are type I or type II. KH-II superfamily members contain one or two KH domains, most of which are canonical type II KH domains that have the signature motif GXXG (where X represents any amino acid). The first KH domain found in archaeal cleavage and polyadenylation specificity factors (CPSFs) is a non-canonical type II KH domain that lacks the GXXG motif. Some others have mutated GXXG motifs which may or may not have nucleic acid binding ability."
definition: >-
  type II K-homology (KH) RNA-binding domain superfamily. The K-homology (KH) domain binds single-stranded RNA or DNA, and is found in a wide variety of proteins including ribosomal proteins, transcription factors, and post-transcriptional modifiers of mRNA. There are two different KH domains that belong to different protein folds, but share a single "minimal KH motif" which is folded into a beta-alpha-alpha-beta unit. In addition to the core, type II KH domains (e.g. ribosomal protein S3) include an N-terminal extension while type I KH domains (e.g. hnRNP K) contain a C-terminal extension, connected to the KH motif by variable loops that are different in different KH domains, whether they are type I or type II. KH-II superfamily members contain one or two KH domains, most of which are canonical type II KH domains that have the signature motif GXXG (where X represents any amino acid). The first KH domain found in archaeal cleavage and polyadenylation specificity factors (CPSFs) is a non-canonical type II KH domain that lacks the GXXG motif. Some others have mutated GXXG motifs which may or may not have nucleic acid binding ability. — an NCBI CDD conserved domain (cd02409); members share this curated model.
