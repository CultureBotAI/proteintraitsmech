identifier: CDD:cd11513
label: "Na(+)- and Cl(-)-dependent serotonin transporter SERT; solute-binding domain. SERT (also called 5-HTT), is a transmembrane transporter that transports the neurotransmitter serotonin from synaptic spaces into presynaptic neurons. The antiport of a K+ ion is believed to follow the transport of serotonin and promote the reorientation of SERT for another transport cycle. Human SERT is encoded by the SLC6A4 gene. SERT is expressed in brain, peripheral nervous system, placenta, epithelium, and platelets. SERT may play a role in diseases or disorders including anxiety, depression, autism, gastrointestinal disorders, premature ejaculation, and obesity. It may also have a role in social cognition. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
