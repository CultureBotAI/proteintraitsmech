identifier: CDD:cd14183
label: "Catalytic domain of the Serine/Threonine Kinase, Doublecortin-like kinase 1 (also called Doublecortin-like and CAM kinase-like 1). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DCKL1 (or DCAMKL1) belongs to the doublecortin (DCX) family of proteins which are involved in neuronal migration, neurogenesis, and eye receptor development, among others. Family members typically contain tandem doublecortin (DCX) domains at the N-terminus; DCX domains can bind microtubules and serve as protein-interaction platforms. In addition, DCKL1 contains a serine, threonine, and proline rich domain (SP) and a C-terminal kinase domain with similarity to CAMKs. DCKL1 interacts with tubulin, glucocorticoid receptor, dynein, JIP1/2, caspases (3 and 8), and calpain, among others. It plays roles in neurogenesis, neuronal migration, retrograde transport, and neuronal apoptosis. The DCKL1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Doublecortin-like kinase 1 (also called Doublecortin-like and CAM kinase-like 1). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DCKL1 (or DCAMKL1) belongs to the doublecortin (DCX) family of proteins which are involved in neuronal migration, neurogenesis, and eye receptor development, among others. Family members typically contain tandem doublecortin (DCX) domains at the N-terminus; DCX domains can bind microtubules and serve as protein-interaction platforms. In addition, DCKL1 contains a serine, threonine, and proline rich domain (SP) and a C-terminal kinase domain with similarity to CAMKs. DCKL1 interacts with tubulin, glucocorticoid receptor, dynein, JIP1/2, caspases (3 and 8), and calpain, among others. It plays roles in neurogenesis, neuronal migration, retrograde transport, and neuronal apoptosis. The DCKL1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14183); members share this curated model.
