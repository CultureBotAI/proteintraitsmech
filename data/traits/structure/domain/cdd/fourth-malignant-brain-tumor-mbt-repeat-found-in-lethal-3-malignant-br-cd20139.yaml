identifier: CDD:cd20139
label: "fourth malignant brain tumor (MBT) repeat found in Lethal(3)malignant brain tumor-like protein 4 (L3MBTL4). L3MBTL4, also called L(3)mbt-like protein 4, or L3mbt-like 4, is a Polycomb group (PcG) protein that may act as a tumor suppressor. L3MBTL4 contains three MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the third MBT repeat that contains the semi-aromatic cage that may bind methylated lysine residues."
definition: >-
  fourth malignant brain tumor (MBT) repeat found in Lethal(3)malignant brain tumor-like protein 4 (L3MBTL4). L3MBTL4, also called L(3)mbt-like protein 4, or L3mbt-like 4, is a Polycomb group (PcG) protein that may act as a tumor suppressor. L3MBTL4 contains three MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the third MBT repeat that contains the semi-aromatic cage that may bind methylated lysine residues. — an NCBI CDD conserved domain (cd20139); members share this curated model.
