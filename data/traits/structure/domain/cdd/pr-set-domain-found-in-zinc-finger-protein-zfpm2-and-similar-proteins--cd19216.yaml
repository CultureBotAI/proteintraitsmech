identifier: CDD:cd19216
label: "PR-SET domain found in zinc finger protein ZFPM2 and similar proteins. ZFPM2 (also termed friend of GATA protein 2, FOG-2, friend of GATA 2, zinc finger protein 89B, or zinc finger protein multitype 2) functions as a transcription regulator that plays a central role in heart morphogenesis and development of coronary vessels from epicardium, by regulating genes that are essential during cardiogenesis."
definition: >-
  PR-SET domain found in zinc finger protein ZFPM2 and similar proteins. ZFPM2 (also termed friend of GATA protein 2, FOG-2, friend of GATA 2, zinc finger protein 89B, or zinc finger protein multitype 2) functions as a transcription regulator that plays a central role in heart morphogenesis and development of coronary vessels from epicardium, by regulating genes that are essential during cardiogenesis. — an NCBI CDD conserved domain (cd19216); members share this curated model.
