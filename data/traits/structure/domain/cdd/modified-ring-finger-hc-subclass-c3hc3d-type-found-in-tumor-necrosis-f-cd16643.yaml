identifier: CDD:cd16643
label: "Modified RING finger, HC subclass (C3HC3D-type), found in tumor necrosis factor (TNF) receptor-associated factor 6 (TRAF6) and similar proteins. TRAF6, also known as interleukin-1 signal transducer or RING finger protein 85 (RNF85), is a cytoplasmic adapter protein that mediates signals induced by the tumor necrosis factor receptor (TNFR) superfamily and Toll-like receptor (TLR)/interleukin-1 receptor (IL-1R) family. It functions as a mediator involved in the activation of mitogen-activated protein kinase (MAPK), phosphoinositide 3-kinase (PI3K), and interferon regulatory factor pathways, as well as in IL-1R-mediated activation of NF-kappaB. TRAF6 is also an oncogene that plays a vital role in K-RAS-mediated oncogenesis. TRAF6 contains an N-terminal domain with a modified C3HC3D-type RING-HC finger and several zinc fingers, and a C-terminal TRAF domain that comprises a coiled coil domain and a conserved TRAF-C domain."
definition: >-
  Modified RING finger, HC subclass (C3HC3D-type), found in tumor necrosis factor (TNF) receptor-associated factor 6 (TRAF6) and similar proteins. TRAF6, also known as interleukin-1 signal transducer or RING finger protein 85 (RNF85), is a cytoplasmic adapter protein that mediates signals induced by the tumor necrosis factor receptor (TNFR) superfamily and Toll-like receptor (TLR)/interleukin-1 receptor (IL-1R) family. It functions as a mediator involved in the activation of mitogen-activated protein kinase (MAPK), phosphoinositide 3-kinase (PI3K), and interferon regulatory factor pathways, as well as in IL-1R-mediated activation of NF-kappaB. TRAF6 is also an oncogene that plays a vital role in K-RAS-mediated oncogenesis. TRAF6 contains an N-terminal domain with a modified C3HC3D-type RING-HC finger and several zinc fingers, and a C-terminal TRAF domain that comprises a coiled coil domain and a conserved TRAF-C domain. — an NCBI CDD conserved domain (cd16643); members share this curated model.
