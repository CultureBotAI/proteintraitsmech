identifier: CDD:cd22445
label: "type I K homology (KH) RNA-binding domain found in exosome complex components Rrp4, Rrp40 and similar proteins. The family includes two ribosomal RNA-processing proteins, Rrp4 and Rrp40. They are non-catalytic components of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Eukaryotic Rrp4 and Rrp40 contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  type I K homology (KH) RNA-binding domain found in exosome complex components Rrp4, Rrp40 and similar proteins. The family includes two ribosomal RNA-processing proteins, Rrp4 and Rrp40. They are non-catalytic components of the RNA exosome complex which has 3'-->5' exoribonuclease activity and participates in a multitude of cellular RNA processing and degradation events. Eukaryotic Rrp4 and Rrp40 contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22445); members share this curated model.
