identifier: CDD:cd11723
label: "N-terminal S-AdoMet-dependent tetrapyrrole methylase domain of Bacillus subtilis YabN and similar domains. This family includes the S-AdoMet (S-adenosyl-L-methionine or SAM)-dependent tetrapyrrole methylase (TP-methylase) domain of Bacillus subtilis YabN, and similar domains. YabN is a fusion of an N-terminal TP-methylase and a C-terminal MazG-type nucleotide pyrophosphohydrolase domain. MazG-like NTP-PPases have been implicated in house-cleaning functions such as degrading abnormal (d)NTPs. TP-methylases use S-AdoMet in the methylation of diverse substrates. Most TP-methylase family members catalyze various methylation steps in cobalamin (vitamin B12) biosynthesis, other members like diphthine synthase and ribosomal RNA small subunit methyltransferase I (RsmI) act on other substrates. The specific function of YabN's TP-methylase domain is not known."
definition: >-
  N-terminal S-AdoMet-dependent tetrapyrrole methylase domain of Bacillus subtilis YabN and similar domains. This family includes the S-AdoMet (S-adenosyl-L-methionine or SAM)-dependent tetrapyrrole methylase (TP-methylase) domain of Bacillus subtilis YabN, and similar domains. YabN is a fusion of an N-terminal TP-methylase and a C-terminal MazG-type nucleotide pyrophosphohydrolase domain. MazG-like NTP-PPases have been implicated in house-cleaning functions such as degrading abnormal (d)NTPs. TP-methylases use S-AdoMet in the methylation of diverse substrates. Most TP-methylase family members catalyze various methylation steps in cobalamin (vitamin B12) biosynthesis, other members like diphthine synthase and ribosomal RNA small subunit methyltransferase I (RsmI) act on other substrates. The specific function of YabN's TP-methylase domain is not known. — an NCBI CDD conserved domain (cd11723); members share this curated model.
