identifier: CDD:cd11546
label: "Nucleoside Triphosphate Pyrophosphohydrolase (EC 3.6.1.8) MazG-like domain found in His4-like fungal histidine biosynthesis trifunctional proteins and their homologs. This family includes fungal histidine biosynthesis trifunctional proteins and their homologs from eukaryotes and bacteria. Some family members contain three domains responsible for phosphoribosyl-AMP cyclohydrolase (PRAMP-CH), phosphoribosyl-ATP pyrophosphohydrolase (PRATP-PH), and histidinol dehydrogenase (Histidinol-DH) activity, respectively. Some others do not have Histidinol-DH domain, but have an additional N-terminal TIM phosphate binding domain. This family corresponds to the domain for PRATP-PH activity, which shows significant sequence similarity to Mycobacterium tuberculosis PRATP-PH that catalyzes the second step in the histidine-biosynthetic pathway, irreversibly hydrolyzing phosphoribosyl-ATP (PRATP) to phosphoribosyl-AMP (PRAMP) and pyrophosphate."
definition: >-
  Nucleoside Triphosphate Pyrophosphohydrolase (EC 3.6.1.8) MazG-like domain found in His4-like fungal histidine biosynthesis trifunctional proteins and their homologs. This family includes fungal histidine biosynthesis trifunctional proteins and their homologs from eukaryotes and bacteria. Some family members contain three domains responsible for phosphoribosyl-AMP cyclohydrolase (PRAMP-CH), phosphoribosyl-ATP pyrophosphohydrolase (PRATP-PH), and histidinol dehydrogenase (Histidinol-DH) activity, respectively. Some others do not have Histidinol-DH domain, but have an additional N-terminal TIM phosphate binding domain. This family corresponds to the domain for PRATP-PH activity, which shows significant sequence similarity to Mycobacterium tuberculosis PRATP-PH that catalyzes the second step in the histidine-biosynthetic pathway, irreversibly hydrolyzing phosphoribosyl-ATP (PRATP) to phosphoribosyl-AMP (PRAMP) and pyrophosphate. — an NCBI CDD conserved domain (cd11546); members share this curated model.
