identifier: CDD:cd19682
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in MAX gene-associated protein (MGA) family. The MGA family includes MGA, Schizosaccharomyces pombe ESC1 (spESC1) and similar proteins. MGA, also termed MAX dimerization protein 5 (MAD5), is a dual specificity T-box/ bHLHzip transcription factor that regulates the expression of both Max-network and T-box family target genes. It contains a Myc-like bHLHZip motif and requires heterodimerization with Max for binding to the preferred Myc-Max-binding site CACGTG. In addition to the bHLHZip domain, MGA harbors a second DNA-binding domain, the T-box or T-domain. It thus binds the preferred Brachyury-binding sequence and represses transcription of reporter genes containing promoter-proximal Brachyury-binding sites. spESC1 is a bHLHzip protein with homology to human MyoD and Myf-5 myogenic differentiation inducers. It is involved in the sexual differentiation process."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in MAX gene-associated protein (MGA) family. The MGA family includes MGA, Schizosaccharomyces pombe ESC1 (spESC1) and similar proteins. MGA, also termed MAX dimerization protein 5 (MAD5), is a dual specificity T-box/ bHLHzip transcription factor that regulates the expression of both Max-network and T-box family target genes. It contains a Myc-like bHLHZip motif and requires heterodimerization with Max for binding to the preferred Myc-Max-binding site CACGTG. In addition to the bHLHZip domain, MGA harbors a second DNA-binding domain, the T-box or T-domain. It thus binds the preferred Brachyury-binding sequence and represses transcription of reporter genes containing promoter-proximal Brachyury-binding sites. spESC1 is a bHLHzip protein with homology to human MyoD and Myf-5 myogenic differentiation inducers. It is involved in the sexual differentiation process. — an NCBI CDD conserved domain (cd19682); members share this curated model.
