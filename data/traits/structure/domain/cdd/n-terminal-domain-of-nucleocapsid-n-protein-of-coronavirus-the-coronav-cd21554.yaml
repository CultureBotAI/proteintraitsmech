identifier: CDD:cd21554
label: "N-terminal domain of nucleocapsid (N) protein of coronavirus. The coronavirus nucleocapsid (N) protein is a major structural and multifunctional protein. It plays an important role in the virus replication cycle, by forming a complex with the viral RNA through its N-terminal domain (N-NTD), which makes this domain an important drug target. It also interacts with the viral membrane protein during virion assembly and plays a critical role in enhancing the efficiency of virus transcription and assembly."
definition: >-
  N-terminal domain of nucleocapsid (N) protein of coronavirus. The coronavirus nucleocapsid (N) protein is a major structural and multifunctional protein. It plays an important role in the virus replication cycle, by forming a complex with the viral RNA through its N-terminal domain (N-NTD), which makes this domain an important drug target. It also interacts with the viral membrane protein during virion assembly and plays a critical role in enhancing the efficiency of virus transcription and assembly. — an NCBI CDD conserved domain (cd21554); members share this curated model.
