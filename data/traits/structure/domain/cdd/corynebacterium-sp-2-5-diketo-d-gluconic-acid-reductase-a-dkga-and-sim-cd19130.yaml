identifier: CDD:cd19130
label: "Corynebacterium sp. 2,5-diketo-D-gluconic acid reductase A (DkgA) and similar proteins. Corynebacterium sp. DkgA is a founding member of aldo-keto reductase family 5 member C1 (AKR5C1). DkgA (EC 1.1.1.346), also called 2,5-DKG reductase A, or 2,5-DKGR A, or 25DKGR-A, or AKR5C, catalyzes the reduction of 2,5-diketo-D-gluconic acid (25DKG) to 2-keto-L-gulonic acid (2KLG). 5-keto-D-fructose and dihydroxyacetone can also serve as substrates."
definition: >-
  Corynebacterium sp. 2,5-diketo-D-gluconic acid reductase A (DkgA) and similar proteins. Corynebacterium sp. DkgA is a founding member of aldo-keto reductase family 5 member C1 (AKR5C1). DkgA (EC 1.1.1.346), also called 2,5-DKG reductase A, or 2,5-DKGR A, or 25DKGR-A, or AKR5C, catalyzes the reduction of 2,5-diketo-D-gluconic acid (25DKG) to 2-keto-L-gulonic acid (2KLG). 5-keto-D-fructose and dihydroxyacetone can also serve as substrates. — an NCBI CDD conserved domain (cd19130); members share this curated model.
