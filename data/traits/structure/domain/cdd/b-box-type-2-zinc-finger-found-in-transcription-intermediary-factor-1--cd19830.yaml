identifier: CDD:cd19830
label: "B-box-type 2 zinc finger  found in transcription intermediary factor 1 gamma (TIF1-gamma). TIF1-gamma, also known as tripartite motif-containing 33 (TRIM33), ectodermin, RFG7, or PTC7, belongs to the C-VI subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil region, as well as a plant homeodomain (PHD), and a bromodomain (Bromo) positioned C-terminal to the RBCC domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. TIF1-gamma is an E3-ubiquitin ligase that functions as a regulator of transforming growth factor beta (TGFbeta) signaling. It inhibits the Smad4-mediated TGFbeta response by interaction with Smad2/3 or ubiquitylation of Smad4. Moreover, TIF1gamma is an important regulator of transcription during hematopoiesis, as well as a key actor of tumorigenesis. Like other TIF1 family members, TIF1-gamma also contains an intrinsic transcriptional silencing function. It can control erythroid cell fate by regulating transcription elongation. It can bind to the anaphase-promoting complex/cyclosome (APC/C) and promotes mitosis."
