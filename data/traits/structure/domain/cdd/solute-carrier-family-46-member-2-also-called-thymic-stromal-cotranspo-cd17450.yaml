identifier: CDD:cd17450
label: "Solute carrier family 46 member 2, also called Thymic stromal cotransporter protein, of the Major Facilitator Superfamily of transporters. Solute carrier family 46 member 2 (SLC46A2) is also called thymic stromal cotransporter protein (TSCOT). It is a putative 12-transmembrane protein mainly expressed in the thymic cortex in a specific thymic epithelial cell (TEC) subpopulation. Polymorphisms in TSCOT are linked to cervical cancer in affected sib-pairs with high mean age at diagnosis. TSCOT belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier family 46 member 2, also called Thymic stromal cotransporter protein, of the Major Facilitator Superfamily of transporters. Solute carrier family 46 member 2 (SLC46A2) is also called thymic stromal cotransporter protein (TSCOT). It is a putative 12-transmembrane protein mainly expressed in the thymic cortex in a specific thymic epithelial cell (TEC) subpopulation. Polymorphisms in TSCOT are linked to cervical cancer in affected sib-pairs with high mean age at diagnosis. TSCOT belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17450); members share this curated model.
