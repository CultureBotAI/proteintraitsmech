identifier: CDD:cd11247
label: "The Sema domain, a protein interacting module, of Plexin D1. Plexins are known as semaphorin receptors and Plexin D1 has been identified as the receptor of Sema3E. It binds to Sema3E directly with high affinity. Sema3E is implicated in axonal path finding and inhibition of developmental and post-ischemic angiogenesis. Plexin D1 is broadly expressed on tumor vessels and tumor cells in a number of different types of human tumors. Plexin D1-Sema3E interaction inhibits tumor growth but promotes invasiveness and metastasis. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of Plexin D1. Plexins are known as semaphorin receptors and Plexin D1 has been identified as the receptor of Sema3E. It binds to Sema3E directly with high affinity. Sema3E is implicated in axonal path finding and inhibition of developmental and post-ischemic angiogenesis. Plexin D1 is broadly expressed on tumor vessels and tumor cells in a number of different types of human tumors. Plexin D1-Sema3E interaction inhibits tumor growth but promotes invasiveness and metastasis. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module. — an NCBI CDD conserved domain (cd11247); members share this curated model.
