identifier: CDD:cd22165
label: "F-box domain found in Arabidopsis thaliana SKP1-interacting partner 22 (AtSKIP22) and similar proteins. AtSKIP22, also called F-box protein SKIP22, is a component of SCF (SKP1/ASK-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with SKP1A/ASK1 and SPK1B/ASK2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana SKP1-interacting partner 22 (AtSKIP22) and similar proteins. AtSKIP22, also called F-box protein SKIP22, is a component of SCF (SKP1/ASK-cullin-F-box protein) E3 ubiquitin ligase complexes, which may mediate the ubiquitination and subsequent proteasomal degradation of target proteins. It interacts with SKP1A/ASK1 and SPK1B/ASK2. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22165); members share this curated model.
