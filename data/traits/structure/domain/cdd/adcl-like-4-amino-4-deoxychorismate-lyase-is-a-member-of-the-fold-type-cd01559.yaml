identifier: CDD:cd01559
label: "ADCL_like: 4-Amino-4-deoxychorismate lyase:  is a member of the fold-type IV of PLP dependent enzymes that converts 4-amino-4-deoxychorismate (ADC) to p-aminobenzoate and pyruvate.  Based on the information available from the crystal structure, most members of this subgroup are likely to function as dimers.  The enzyme from E.Coli, the structure of which is available, is a homodimer that is folded into a small and a larger domain. The coenzyme pyridoxal 5; -phosphate  resides at the interface of the two domains that is linked by a flexible loop. Members of this subgroup are found in Eukaryotes and bacteria."
definition: >-
  ADCL_like: 4-Amino-4-deoxychorismate lyase: is a member of the fold-type IV of PLP dependent enzymes that converts 4-amino-4-deoxychorismate (ADC) to p-aminobenzoate and pyruvate. Based on the information available from the crystal structure, most members of this subgroup are likely to function as dimers. The enzyme from E.Coli, the structure of which is available, is a homodimer that is folded into a small and a larger domain. The coenzyme pyridoxal 5; -phosphate resides at the interface of the two domains that is linked by a flexible loop. Members of this subgroup are found in Eukaryotes and bacteria. — an NCBI CDD conserved domain (cd01559); members share this curated model.
