identifier: CDD:cd05308
label: "UDP-glucose/GDP-mannose dehydrogenase family. The UDP-glucose/GDP-mannose dehydrogenaseses are a small group of enzymes which possesses the ability to catalyse the NAD-dependent 2-fold oxidation of an alcohol to an acid without the release of an aldehyde intermediate. UDP-glucose dehydrogenase catalyzes the NAD+-dependent oxidation of UDP-glucose to UDP-gluconuronic acid."
definition: >-
  UDP-glucose/GDP-mannose dehydrogenase family. The UDP-glucose/GDP-mannose dehydrogenaseses are a small group of enzymes which possesses the ability to catalyse the NAD-dependent 2-fold oxidation of an alcohol to an acid without the release of an aldehyde intermediate. UDP-glucose dehydrogenase catalyzes the NAD+-dependent oxidation of UDP-glucose to UDP-gluconuronic acid. — an NCBI CDD conserved domain (cd05308); members share this curated model.
