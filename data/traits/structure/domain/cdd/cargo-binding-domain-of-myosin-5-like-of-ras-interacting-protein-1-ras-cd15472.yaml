label: "cargo binding domain of myosin 5-like of Ras-interacting protein 1. Ras-interacting protein 1 (Rasip1 or RAIN) is an effector of the small G protein Rap1 and plays an important role in endothelial junction stabilization. Rasip1, like afadin, is a multi domain protein, that contains beside a myosin5-like CBD, a Ras-associated domain and a PDZ domain."
definition: >-
