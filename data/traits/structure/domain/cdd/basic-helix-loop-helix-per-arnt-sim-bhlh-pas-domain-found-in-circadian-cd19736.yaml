identifier: CDD:cd19736
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in circadian clock protein PASD1. PASD1, also termed PAS domain-containing protein 1, is evolutionarily related to Circadian locomotor output cycles protein kaput (CLOCK)and functions as a suppressor of the biological clock that drives the daily circadian rhythms of cells throughout the body. Mammalian PASD1 doesn't harbor the bHLH-PAS domain and is not included in this family."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in circadian clock protein PASD1. PASD1, also termed PAS domain-containing protein 1, is evolutionarily related to Circadian locomotor output cycles protein kaput (CLOCK)and functions as a suppressor of the biological clock that drives the daily circadian rhythms of cells throughout the body. Mammalian PASD1 doesn't harbor the bHLH-PAS domain and is not included in this family. — an NCBI CDD conserved domain (cd19736); members share this curated model.
