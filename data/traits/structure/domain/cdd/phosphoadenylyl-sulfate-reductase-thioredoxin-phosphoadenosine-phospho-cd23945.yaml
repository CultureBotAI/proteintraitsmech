identifier: CDD:cd23945
label: "Phosphoadenylyl-sulfate reductase (thioredoxin). Phosphoadenosine phosphosulfate (PAPS) reductase (or PAPS sulfotransferase EC 1.8.4.8) is part of the adenine nucleotide alpha hydrolase superfamily that also includes N-type ATP PPases and ATP sulfurylases. A highly modified version of the P loop, the fingerprint peptide of mononucleotide-binding proteins, is present in the active site of the protein, which appears to be a positively charged cleft containing a number of conserved arginine and lysine residues. Although PAPS reductase has no ATPase activity, it shows a striking similarity to the structure of the ATP pyrophosphatase (ATP PPase) domain of GMP synthetase, indicating that both enzyme families have evolved from a common ancestral nucleotide-binding fold. The enzyme uses thioredoxin as an electron donor for the reduction of PAPS to phospho-adenosine-phosphate (PAP)."
definition: >-
  Phosphoadenylyl-sulfate reductase (thioredoxin). Phosphoadenosine phosphosulfate (PAPS) reductase (or PAPS sulfotransferase EC 1.8.4.8) is part of the adenine nucleotide alpha hydrolase superfamily that also includes N-type ATP PPases and ATP sulfurylases. A highly modified version of the P loop, the fingerprint peptide of mononucleotide-binding proteins, is present in the active site of the protein, which appears to be a positively charged cleft containing a number of conserved arginine and lysine residues. Although PAPS reductase has no ATPase activity, it shows a striking similarity to the structure of the ATP pyrophosphatase (ATP PPase) domain of GMP synthetase, indicating that both enzyme families have evolved from a common ancestral nucleotide-binding fold. The enzyme uses thioredoxin as an electron donor for the reduction of PAPS to phospho-adenosine-phosphate (PAP). — an NCBI CDD conserved domain (cd23945); members share this curated model.
