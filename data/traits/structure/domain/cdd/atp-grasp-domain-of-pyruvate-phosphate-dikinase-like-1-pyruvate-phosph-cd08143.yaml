label: "ATP-grasp domain of pyruvate phosphate dikinase-like 1. Pyruvate phosphate dikinase-like family members have the signature nucleotide-binding domain of ATP-grasp superfamily. Based on the sequence conservation it appears that this family has similar catalytic mechanism to that of PPDK. ATP and MG-binding sites are also conserved."
definition: >-
  ATP-grasp domain of pyruvate phosphate dikinase-like 1. Pyruvate phosphate dikinase-like family members have the signature nucleotide-binding domain of ATP-grasp superfamily. Based on the sequence conservation it appears that this family has similar catalytic mechanism to that of PPDK. ATP and MG-binding sites are also conserved. — an NCBI CDD conserved domain (cd08143); members share this curated model.
