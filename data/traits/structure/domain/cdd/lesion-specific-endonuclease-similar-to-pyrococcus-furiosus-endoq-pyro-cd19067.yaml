identifier: CDD:cd19067
label: "lesion-specific endonuclease similar to Pyrococcus furiosus EndoQ. Pyrococcus furiosus EndoQ is a lesion-specific endonuclease which is assumed to be involved in DNA repair pathways in Thermococcales. It recognizes a deaminated base and hydrolyzes the phosphodiester bond 5' to the site of the lesion. Initially identified as a hypoxanthine-specific endonuclease, it has now been shown that EndoQ also recognizes uracil, xanthine, and apurinic/apyrimidinic (AP) sites in DNA, and that a homolog in Bacillus pumilus shares functional properties of the archaeal EndoQs."
definition: >-
