identifier: CDD:cd16489
label: "Modified RING-CH finger, H2 subclass (C4HC2H-type), found in the ZNRF family. The ZNRF family includes zinc/RING finger proteins ZNRF1, ZNRF2, and similar proteins. It has been characterized by containing a unique combination of zinc finger-RING finger motifs in the C-terminal region, which is evolutionarily conserved in a wide range of species, including Caenorhabditis elegans and Drosophila. ZNRF proteins function as E3 ubiquitin ligases and are highly expressed in central nervous system (CNS) and peripheral nervous system (PNS) neurons, particularly during development and in adulthood. ZNRF1 and ZNRF2 are differentially localized within the synaptic region. ZNRF1 is associated with synaptic vesicle membranes, whereas ZNRF2 is present in presynaptic plasma membranes. They are N-myrisotoylated and also located in the endosome-lysosome compartment in fibroblasts. ZNRF proteins may play a role in the establishment and maintenance of neuronal transmission and plasticity via their ubiquitin ligase activity, as well as in regulating Ca2+-dependent exocytosis. The RING fingers found in ZNRF proteins are modified as C4HC2H-type RING-CH finger, rather than the typical C4HC3-type RING-CH finger, which is a variant of the RING-H2 finger."
definition: >-
  Modified RING-CH finger, H2 subclass (C4HC2H-type), found in the ZNRF family. The ZNRF family includes zinc/RING finger proteins ZNRF1, ZNRF2, and similar proteins. It has been characterized by containing a unique combination of zinc finger-RING finger motifs in the C-terminal region, which is evolutionarily conserved in a wide range of species, including Caenorhabditis elegans and Drosophila. ZNRF proteins function as E3 ubiquitin ligases and are highly expressed in central nervous system (CNS) and peripheral nervous system (PNS) neurons, particularly during development and in adulthood. ZNRF1 and ZNRF2 are differentially localized within the synaptic region. ZNRF1 is associated with synaptic vesicle membranes, whereas ZNRF2 is present in presynaptic plasma membranes. They are N-myrisotoylated and also located in the endosome-lysosome compartment in fibroblasts. ZNRF proteins may play a role in the establishment and maintenance of neuronal transmission and plasticity via their ubiquitin ligase activity, as well as in regulating Ca2+-dependent exocytosis. The RING fingers found in ZNRF proteins are modified as C4HC2H-type RING-CH finger, rather than the typical C4HC3-type RING-CH finger, which is a variant of the RING-H2 finger. — an NCBI CDD conserved domain (cd16489); members share this curated model.
