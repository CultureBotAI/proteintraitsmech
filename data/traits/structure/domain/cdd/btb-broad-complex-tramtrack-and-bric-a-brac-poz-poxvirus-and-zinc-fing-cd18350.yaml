identifier: CDD:cd18350
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Ankyrin repeat and BTB/POZ domain-containing protein 2 (ABTB2). ABTB2, also called bood POZ containing gene type 2 (BPOZ-2), is a scaffold protein that controls the degradation of many biological proteins with various functions ranging from embryonic development to tumor progression. It may be involved in the initiation of hepatocyte growth. It inhibits the aggregation of alpha-synuclein, with implications for Parkinson's disease. ABTB2 functions as an adaptor protein for the E3 ubiquitin ligase scaffold protein Cullin-3. It directly binds to eukaryotic elongation factor 1A1 (eEF1A1) to promote eEF1A1 ubiquitylation and degradation, and prevent translation. It is also involved in the growth suppressive effect of the phosphatase and tensin homolog (PTEN). It contains an ankyrin repeat, BTB/POZ, and BACK domains. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Ankyrin repeat and BTB/POZ domain-containing protein 2 (ABTB2). ABTB2, also called bood POZ containing gene type 2 (BPOZ-2), is a scaffold protein that controls the degradation of many biological proteins with various functions ranging from embryonic development to tumor progression. It may be involved in the initiation of hepatocyte growth. It inhibits the aggregation of alpha-synuclein, with implications for Parkinson's disease. ABTB2 functions as an adaptor protein for the E3 ubiquitin ligase scaffold protein Cullin-3. It directly binds to eukaryotic elongation factor 1A1 (eEF1A1) to promote eEF1A1 ubiquitylation and degradation, and prevent translation. It is also involved in the growth suppressive effect of the phosphatase and tensin homolog (PTEN). It contains an ankyrin repeat, BTB/POZ, and BACK domains. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18350); members share this curated model.
