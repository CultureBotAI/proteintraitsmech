identifier: CDD:cd23833
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of Acanthamoeba polyphaga mimivirus bifunctional E2/E3 enzyme R795 and related proteins. R795 (EC 2.3.2.23/EC 2.3.2.27) is a bifunctional enzyme which acts as an E2 ubiquitin-conjugating enzyme that catalyzes the covalent attachment of ubiquitin to other proteins. It also acts as a RING-type E3 ubiquitin-protein transferase."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of Acanthamoeba polyphaga mimivirus bifunctional E2/E3 enzyme R795 and related proteins. R795 (EC 2.3.2.23/EC 2.3.2.27) is a bifunctional enzyme which acts as an E2 ubiquitin-conjugating enzyme that catalyzes the covalent attachment of ubiquitin to other proteins. It also acts as a RING-type E3 ubiquitin-protein transferase. — an NCBI CDD conserved domain (cd23833); members share this curated model.
