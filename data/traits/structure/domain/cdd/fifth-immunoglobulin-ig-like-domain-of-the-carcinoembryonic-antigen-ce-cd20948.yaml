identifier: CDD:cd20948
label: "Fifth immunoglobulin (Ig)-like domain of the carcinoembryonic antigen (CEA) related cell adhesion molecule 5 (CEACAM5) and similar domains; member of the C2-set IgSF domains. The members here are composed of the fifth immunoglobulin (Ig)-like domain of the carcinoembryonic antigen (CEA) related cell adhesion molecule 5 (CEACAM5) and similar domains. The CEA family is a group of anchored or secreted glycoproteins, expressed by epithelial cells, leukocytes, endothelial cells and placenta. The CEA family is divided into the CEACAM and pregnancy-specific glycoprotein (PSG) subfamilies. Carcinoembryonic antigen-related cell adhesion molecule 5 (CEACAM5), also known as CD66e (Cluster of Differentiation 66e), is a cell surface glycoprotein that plays a role in cell adhesion, intracellular signaling and tumor progression. Diseases associated with CEACAM5 include lung cancer and rectum cancer. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the C2-set of IgSF domains, having A, B, and E strands in one beta-sheet and A', G, F, C' in the other. Unlike other Ig domain sets, the C2-set lacks the D strand."
definition: >-
  Fifth immunoglobulin (Ig)-like domain of the carcinoembryonic antigen (CEA) related cell adhesion molecule 5 (CEACAM5) and similar domains; member of the C2-set IgSF domains. The members here are composed of the fifth immunoglobulin (Ig)-like domain of the carcinoembryonic antigen (CEA) related cell adhesion molecule 5 (CEACAM5) and similar domains. The CEA family is a group of anchored or secreted glycoproteins, expressed by epithelial cells, leukocytes, endothelial cells and placenta. The CEA family is divided into the CEACAM and pregnancy-specific glycoprotein (PSG) subfamilies. Carcinoembryonic antigen-related cell adhesion molecule 5 (CEACAM5), also known as CD66e (Cluster of Differentiation 66e), is a cell surface glycoprotein that plays a role in cell adhesion, intracellular signaling and tumor progression. Diseases associated with CEACAM5 include lung cancer and rectum cancer. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the C2-set of IgSF domains, having A, B, and E strands in one beta-sheet and A', G, F, C' in the other. Unlike other Ig domain sets, the C2-set lacks the D strand. — an NCBI CDD conserved domain (cd20948); members share this curated model.
