identifier: CDD:cd23431
label: "ricin B-type lectin domain, beta-trefoil fold, found in Arabidopsis thaliana Ricin B-like lectin EULS3 (AtEULS3) and similar proteins. AtEULS3, also called euonymus lectin S3, is a Ricin B-like lectin that binds carbohydrates in vitro. It interacts through its lectin domain with glycan structures containing one or more Lewis X, Lewis Y or lactosamine motifs. It has been implicated in abiotic stress responses, abscisic acid-induced stomatal closure, as well as disease resistance against Pseudomonas syringae through its involvement in stomatal movement. All subfamily members contain a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Arabidopsis thaliana Ricin B-like lectin EULS3 (AtEULS3) and similar proteins. AtEULS3, also called euonymus lectin S3, is a Ricin B-like lectin that binds carbohydrates in vitro. It interacts through its lectin domain with glycan structures containing one or more Lewis X, Lewis Y or lactosamine motifs. It has been implicated in abiotic stress responses, abscisic acid-induced stomatal closure, as well as disease resistance against Pseudomonas syringae through its involvement in stomatal movement. All subfamily members contain a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23431); members share this curated model.
