identifier: CDD:cd11277
label: "The Sema domain, a protein interacting module, of Plexin B3. Plexin B3 is the receptor of semaphorin 5A. It is a highly potent stimulator of neurite outgrowth of primary murine cerebellar neurons. Plexin B3 has been linked to verbal performance and white matter volume in human brain. Furthermore, Sema5A and plexin B3 have been implicated in the progression of various types of cancer. They play an important role in the invasion and metastasis of gastric carcinoma. The stimulation of plexin B3 by Sema5A binding in human glioma cells results in the inhibition of cell migration and invasion. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of Plexin B3. Plexin B3 is the receptor of semaphorin 5A. It is a highly potent stimulator of neurite outgrowth of primary murine cerebellar neurons. Plexin B3 has been linked to verbal performance and white matter volume in human brain. Furthermore, Sema5A and plexin B3 have been implicated in the progression of various types of cancer. They play an important role in the invasion and metastasis of gastric carcinoma. The stimulation of plexin B3 by Sema5A binding in human glioma cells results in the inhibition of cell migration and invasion. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a ligand-recognition and -binding module. — an NCBI CDD conserved domain (cd11277); members share this curated model.
