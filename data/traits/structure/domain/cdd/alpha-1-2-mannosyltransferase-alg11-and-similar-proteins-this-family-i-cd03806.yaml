identifier: CDD:cd03806
label: "alpha-1,2-mannosyltransferase ALG11 and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. ALG11 in yeast is involved in adding the final 1,2-linked Man to the Man5GlcNAc2-PP-Dol synthesized on the cytosolic face of the ER. The deletion analysis of ALG11 was shown to block the early steps of core biosynthesis that takes place on the cytoplasmic face of the ER and lead to a defect in the assembly of lipid-linked oligosaccharides."
definition: >-
  alpha-1,2-mannosyltransferase ALG11 and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. ALG11 in yeast is involved in adding the final 1,2-linked Man to the Man5GlcNAc2-PP-Dol synthesized on the cytosolic face of the ER. The deletion analysis of ALG11 was shown to block the early steps of core biosynthesis that takes place on the cytoplasmic face of the ER and lead to a defect in the assembly of lipid-linked oligosaccharides. — an NCBI CDD conserved domain (cd03806); members share this curated model.
