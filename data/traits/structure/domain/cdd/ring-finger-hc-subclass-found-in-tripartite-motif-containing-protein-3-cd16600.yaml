identifier: CDD:cd16600
label: "RING finger, HC subclass, found in tripartite motif-containing protein 38 (TRIM38) and similar proteins. TRIM38, also known as RING finger protein 15 (RNF15) or zinc finger protein RoRet, is an E3 ubiquitin-protein ligase that promotes K63- and K48-linked ubiquitination of cellular proteins and also catalyzes self-ubiquitination. It negatively regulates Tumor necrosis factor alpha (TNF-alpha)- and interleukin-1beta-triggered Nuclear factor-kappaB (NF-kappaB) activation by mediating lysosomal-dependent degradation of transforming growth factor beta (TGFbeta)-activated kinase 1 (TAK1)-binding protein (TAB)2/3, two critical components of the TAK1 kinase complex. It also inhibits TLR3/4-mediated activation of NF-kappaB and interferon regulatory factor 3 (IRF3) by mediating ubiquitin-proteasomal degradation of TNF receptor-associated factor 6 (Traf6) and NAK-associated protein 1 (Nap1), respectively. Moreover, TRIM38 negatively regulates TLR3-mediated interferon beta (IFN-beta) signaling by targeting ubiquitin-proteasomal degradation of TIR domain-containing adaptor inducing IFN-beta (TRIF). It functions as a valid target for autoantibodies in primary Sjogren's Syndrome. TRIM38 belongs the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, a B-box, and two coiled coil domains, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 38 (TRIM38) and similar proteins. TRIM38, also known as RING finger protein 15 (RNF15) or zinc finger protein RoRet, is an E3 ubiquitin-protein ligase that promotes K63- and K48-linked ubiquitination of cellular proteins and also catalyzes self-ubiquitination. It negatively regulates Tumor necrosis factor alpha (TNF-alpha)- and interleukin-1beta-triggered Nuclear factor-kappaB (NF-kappaB) activation by mediating lysosomal-dependent degradation of transforming growth factor beta (TGFbeta)-activated kinase 1 (TAK1)-binding protein (TAB)2/3, two critical components of the TAK1 kinase complex. It also inhibits TLR3/4-mediated activation of NF-kappaB and interferon regulatory factor 3 (IRF3) by mediating ubiquitin-proteasomal degradation of TNF receptor-associated factor 6 (Traf6) and NAK-associated protein 1 (Nap1), respectively. Moreover, TRIM38 negatively regulates TLR3-mediated interferon beta (IFN-beta) signaling by targeting ubiquitin-proteasomal degradation of TIR domain-containing adaptor inducing IFN-beta (TRIF). It functions as a valid target for autoantibodies in primary Sjogren's Syndrome. TRIM38 belongs the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, a B-box, and two coiled coil domains, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16600); members share this curated model.
