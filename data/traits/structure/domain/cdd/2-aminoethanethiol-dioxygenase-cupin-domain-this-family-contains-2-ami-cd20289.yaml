identifier: CDD:cd20289
label: "2-aminoethanethiol dioxygenase, cupin domain. This family contains 2-aminoethanethiol dioxygenase (also known as cysteamine dioxygenase, persulfurase or ADO; EC 1.13.11.19), which catalyzes the addition of two oxygen atoms to free cysteamine (2-aminoethanethiol) to form hypotaurine that subsequently oxidizes to taurine. These enzymes are found in prokaryotes as well as eukaryotes and belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  2-aminoethanethiol dioxygenase, cupin domain. This family contains 2-aminoethanethiol dioxygenase (also known as cysteamine dioxygenase, persulfurase or ADO; EC 1.13.11.19), which catalyzes the addition of two oxygen atoms to free cysteamine (2-aminoethanethiol) to form hypotaurine that subsequently oxidizes to taurine. These enzymes are found in prokaryotes as well as eukaryotes and belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20289); members share this curated model.
