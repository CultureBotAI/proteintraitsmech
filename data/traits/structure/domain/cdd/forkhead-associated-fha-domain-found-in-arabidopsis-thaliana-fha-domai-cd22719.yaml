identifier: CDD:cd22719
label: "forkhead associated (FHA) domain found in Arabidopsis thaliana FHA domain-containing protein DDL and similar proteins. DDL, also called protein DAWDLE, is involved in microRNA (miRNA) and short interfering RNA (siRNA) biogenesis. It may facilitate DCL1 to access or recognize primary miRNAs. DDL binds RNA non-specifically. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Arabidopsis thaliana FHA domain-containing protein DDL and similar proteins. DDL, also called protein DAWDLE, is involved in microRNA (miRNA) and short interfering RNA (siRNA) biogenesis. It may facilitate DCL1 to access or recognize primary miRNAs. DDL binds RNA non-specifically. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22719); members share this curated model.
