identifier: CDD:cd19143
label: "AKR6C family of aldo-keto reductase (AKR). Voltage-gated potassium channel subunit beta (KCAB) from Arabidopsis thaliana and Egeria densa are founding members of aldo-keto reductase family 6 member C1 (AKR6C1) and C2 (AKR6C2), respectively. KCAB, also called Shaker channel b-subunit, or K(+) channel subunit beta, or potassium voltage beta 1, or KV-beta1, or KAB1, is a probable accessory potassium channel protein which modulates the activity of the pore-forming alpha subunit."
definition: >-
  AKR6C family of aldo-keto reductase (AKR). Voltage-gated potassium channel subunit beta (KCAB) from Arabidopsis thaliana and Egeria densa are founding members of aldo-keto reductase family 6 member C1 (AKR6C1) and C2 (AKR6C2), respectively. KCAB, also called Shaker channel b-subunit, or K(+) channel subunit beta, or potassium voltage beta 1, or KV-beta1, or KAB1, is a probable accessory potassium channel protein which modulates the activity of the pore-forming alpha subunit. — an NCBI CDD conserved domain (cd19143); members share this curated model.
