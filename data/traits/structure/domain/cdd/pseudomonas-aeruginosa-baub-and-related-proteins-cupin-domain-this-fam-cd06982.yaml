identifier: CDD:cd06982
label: "Pseudomonas aeruginosa BauB and related proteins, cupin domain. This family includes bacterial proteins homologous to beta-alanine degradation protein BauB from Pseudomonas aeruginosa, which is involved in the degradation of beta-alanine. Also included are Rhodopseudomonas palustris Rpa4178 and Bordetella pertussis Bp2299, which are both proteins with unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Pseudomonas aeruginosa BauB and related proteins, cupin domain. This family includes bacterial proteins homologous to beta-alanine degradation protein BauB from Pseudomonas aeruginosa, which is involved in the degradation of beta-alanine. Also included are Rhodopseudomonas palustris Rpa4178 and Bordetella pertussis Bp2299, which are both proteins with unknown function. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06982); members share this curated model.
