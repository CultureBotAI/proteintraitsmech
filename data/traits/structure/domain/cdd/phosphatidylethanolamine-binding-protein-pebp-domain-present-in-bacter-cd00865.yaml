identifier: CDD:cd00865
label: "PhosphatidylEthanolamine-Binding Protein (PEBP) domain present in bacteria and archaea. PhosphatidylEthanolamine-Binding Proteins (PEBPs) are represented in all three major phylogenetic divisions (eukaryotes, bacteria, archaea).  The members in this subgroup are present in bacterial and archaea.  Members here include Escherichia coli YBHB and YBCL which are thought to regulate protein phosphorylation as well as Sulfolobus solfataricus SsCEI which inhibits serine proteases alpha-chymotrypsin and elastase.  Although their overall structures are similar, the members of the PEBP family have very different substrates and oligomerization states (monomer/dimer/tetramer). In a few of the bacterial members present here the dimerization interface is proposed to form the ligand binding site, unlike in other PEBP members."
definition: >-
  PhosphatidylEthanolamine-Binding Protein (PEBP) domain present in bacteria and archaea. PhosphatidylEthanolamine-Binding Proteins (PEBPs) are represented in all three major phylogenetic divisions (eukaryotes, bacteria, archaea). The members in this subgroup are present in bacterial and archaea. Members here include Escherichia coli YBHB and YBCL which are thought to regulate protein phosphorylation as well as Sulfolobus solfataricus SsCEI which inhibits serine proteases alpha-chymotrypsin and elastase. Although their overall structures are similar, the members of the PEBP family have very different substrates and oligomerization states (monomer/dimer/tetramer). In a few of the bacterial members present here the dimerization interface is proposed to form the ligand binding site, unlike in other PEBP members. — an NCBI CDD conserved domain (cd00865); members share this curated model.
