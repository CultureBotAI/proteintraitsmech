identifier: CDD:cd10329
label: "Na(+)/glucose cotransporter SGLT1 and related proteins; solute binding domain. This subfamily includes the solute-binding domain of SGLT proteins that cotransport Na+ with various solutes. Its members include: the human glucose (SGLT1, -2, -4, -5 ), chiro-inositol (SGLT5), and myo-inositol (SMIT) cotransporters. It also includes human SGLT3 which has been characterized as a glucose sensor and not a transporter. It belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  Na(+)/glucose cotransporter SGLT1 and related proteins; solute binding domain. This subfamily includes the solute-binding domain of SGLT proteins that cotransport Na+ with various solutes. Its members include: the human glucose (SGLT1, -2, -4, -5 ), chiro-inositol (SGLT5), and myo-inositol (SMIT) cotransporters. It also includes human SGLT3 which has been characterized as a glucose sensor and not a transporter. It belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd10329); members share this curated model.
