identifier: CDD:cd17698
label: "RUN domain found in FYVE and coiled-coil domain-containing protein 1 (FYCO1) and similar proteins. FYCO1, also called zinc finger FYVE domain-containing protein 7 (ZFYVE7), is a multidomain autophagy adaptor protein that interacts with kinesin motor proteins and with the autophagosomal membrane components microtubule-associated protein 1 light chain 3 (LC3), Rab7, and Phosphatidylinositol 3-phosphate (PI3P), to mediate microtubule plus-end-directed autophagosome transport. This model represents the RUN domain of FYCO1."
definition: >-
  RUN domain found in FYVE and coiled-coil domain-containing protein 1 (FYCO1) and similar proteins. FYCO1, also called zinc finger FYVE domain-containing protein 7 (ZFYVE7), is a multidomain autophagy adaptor protein that interacts with kinesin motor proteins and with the autophagosomal membrane components microtubule-associated protein 1 light chain 3 (LC3), Rab7, and Phosphatidylinositol 3-phosphate (PI3P), to mediate microtubule plus-end-directed autophagosome transport. This model represents the RUN domain of FYCO1. — an NCBI CDD conserved domain (cd17698); members share this curated model.
