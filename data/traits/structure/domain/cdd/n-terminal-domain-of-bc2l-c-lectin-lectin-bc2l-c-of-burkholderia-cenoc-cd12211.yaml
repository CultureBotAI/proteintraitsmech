identifier: CDD:cd12211
label: "N-Terminal Domain Of Bc2l-C Lectin. Lectin BC2L-C of Burkholderia cenocepacia is one of several lectins produced by this pathogen. BC2L-C has been shown to bind fucosylated human histo-blood group epitopes H-type 1, Lewis B, and Lewis Y. The C-terminal domain resembles BC2L-A, a calcium dependent mannose-binding protein. The N-terminal domain trimerizes and binds alpha-MeSeFuc in pockets between the monomeric units. The N-terminal domain has a similar structure to tumor necrosis factor (TNF)."
definition: >-
  N-Terminal Domain Of Bc2l-C Lectin. Lectin BC2L-C of Burkholderia cenocepacia is one of several lectins produced by this pathogen. BC2L-C has been shown to bind fucosylated human histo-blood group epitopes H-type 1, Lewis B, and Lewis Y. The C-terminal domain resembles BC2L-A, a calcium dependent mannose-binding protein. The N-terminal domain trimerizes and binds alpha-MeSeFuc in pockets between the monomeric units. The N-terminal domain has a similar structure to tumor necrosis factor (TNF). — an NCBI CDD conserved domain (cd12211); members share this curated model.
