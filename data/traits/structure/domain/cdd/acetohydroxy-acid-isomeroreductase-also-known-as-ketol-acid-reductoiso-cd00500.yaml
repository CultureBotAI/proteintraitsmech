identifier: CDD:cd00500
label: "Acetohydroxy acid isomeroreductase (also known as ketol acid reductoisomerase) C-terminal domain: Enzyme in the biosynthetic pathway of the branched amino acids Ile, Leu, and Val, found only in plants and microorganisms. Enzyme is unique in that it catalyzes two reactions: an isomerization (alkyl migration), followed by an NADPH-dependent reduction. A divalent metal ion is required for each reaction.  The C-terminal domain contains the active site and is responsible for monomer-monomer interactions. Enzyme has two substrates: 2-acetolactate, which is the precursor of Val or Leu, and 2-aceto-2-hydroxybutyrate, which is the precursor of Ile. Enzyme functions as a homodimer. This domain is a repeat in plants, including 1QMG_A. The N-terminal domain is a Rossman fold NAD(P)(+) binding domain. Members of this  family share in common  a Rossmann fold, NAD(P)H binding (NADB) domain.  This structural domain is found in numerous dehydrogenases of glycolysis  and other enzymes. These domains have an alpha-beta-alpha configuration. NAD binding involves numerous hydrogen and van der Waals contacts. In particular  H-bonding between the residues in the turn between the first strand and the subsequent  helix. Typically, the turn has a consensus binding pattern similar to GXGXXG, in which the  first 2 glycines participate in NAD(P)-binding, and the third facilitates close packing of  the helix to the beta-strand."
definition: >-
  Acetohydroxy acid isomeroreductase (also known as ketol acid reductoisomerase) C-terminal domain: Enzyme in the biosynthetic pathway of the branched amino acids Ile, Leu, and Val, found only in plants and microorganisms. Enzyme is unique in that it catalyzes two reactions: an isomerization (alkyl migration), followed by an NADPH-dependent reduction. A divalent metal ion is required for each reaction. The C-terminal domain contains the active site and is responsible for monomer-monomer interactions. Enzyme has two substrates: 2-acetolactate, which is the precursor of Val or Leu, and 2-aceto-2-hydroxybutyrate, which is the precursor of Ile. Enzyme functions as a homodimer. This domain is a repeat in plants, including 1QMG_A. The N-terminal domain is a Rossman fold NAD(P)(+) binding domain. Members of this family share in common a Rossmann fold, NAD(P)H binding (NADB) domain. This structural domain is found in numerous dehydrogenases of glycolysis and other enzymes. These domains have an alpha-beta-alpha configuration. NAD binding involves numerous hydrogen and van der Waals contacts. In particular H-bonding between the residues in the turn between the first strand and the subsequent helix. Typically, the turn has a consensus binding pattern similar to GXGXXG, in which the first 2 glycines participate in NAD(P)-binding, and the third facilitates close packing of the helix to the beta-strand. — an NCBI CDD conserved domain (cd00500); members share this curated model.
