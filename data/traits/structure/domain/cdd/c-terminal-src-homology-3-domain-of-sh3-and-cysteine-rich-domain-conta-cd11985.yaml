identifier: CDD:cd11985
label: "C-terminal Src homology 3 domain of SH3 and cysteine-rich domain-containing protein 2 (Stac2). Stac proteins are putative adaptor proteins that contain a cysteine-rich C1 domain and one or two SH3 domains at the C-terminus. There are three mammalian members (Stac1, Stac2, and Stac3) of this family. Stac2 contains a single SH3 domain at the C-terminus unlike Stac1 and Stac3, which contain two C-terminal SH3 domains. Stac1 and Stac2 have been found to be expressed differently in mature dorsal root ganglia (DRG) neurons. Stac1 is mainly expressed in peptidergic neurons while Stac2 is found in a subset of nonpeptidergic and all trkB+ neurons. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  C-terminal Src homology 3 domain of SH3 and cysteine-rich domain-containing protein 2 (Stac2). Stac proteins are putative adaptor proteins that contain a cysteine-rich C1 domain and one or two SH3 domains at the C-terminus. There are three mammalian members (Stac1, Stac2, and Stac3) of this family. Stac2 contains a single SH3 domain at the C-terminus unlike Stac1 and Stac3, which contain two C-terminal SH3 domains. Stac1 and Stac2 have been found to be expressed differently in mature dorsal root ganglia (DRG) neurons. Stac1 is mainly expressed in peptidergic neurons while Stac2 is found in a subset of nonpeptidergic and all trkB+ neurons. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11985); members share this curated model.
