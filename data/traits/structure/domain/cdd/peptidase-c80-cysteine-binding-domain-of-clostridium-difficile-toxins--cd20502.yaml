identifier: CDD:cd20502
label: "Peptidase C80 cysteine binding domain of Clostridium difficile toxins A and B, and related proteins. This peptidase C80 family includes the major virulence factors of Clostridium difficile multidomain toxins TcdA and TcdB. These large homologous toxins contain several distinct domains including a cysteine protease domain (CPD) that autoproteolytically releases a cytotoxic effector domain upon binding of intracellular inositol hexakisphosphate. C. difficile is a major cause of intestinal tissue damage and inflammation, and TcdA is generally more inflammatory whereas TcdB is more cytotoxic; studies show that the CPD is an internal regulator of the proinflammatory activity. Site-directed mutagenesis has identified functional residues Asp/His/Cys in Clostridium toxin B."
definition: >-
  Peptidase C80 cysteine binding domain of Clostridium difficile toxins A and B, and related proteins. This peptidase C80 family includes the major virulence factors of Clostridium difficile multidomain toxins TcdA and TcdB. These large homologous toxins contain several distinct domains including a cysteine protease domain (CPD) that autoproteolytically releases a cytotoxic effector domain upon binding of intracellular inositol hexakisphosphate. C. difficile is a major cause of intestinal tissue damage and inflammation, and TcdA is generally more inflammatory whereas TcdB is more cytotoxic; studies show that the CPD is an internal regulator of the proinflammatory activity. Site-directed mutagenesis has identified functional residues Asp/His/Cys in Clostridium toxin B. — an NCBI CDD conserved domain (cd20502); members share this curated model.
