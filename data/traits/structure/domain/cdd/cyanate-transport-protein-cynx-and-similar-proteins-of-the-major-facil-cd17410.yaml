identifier: CDD:cd17410
label: "Cyanate transport protein CynX and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of Escherichia coli cyanate transport protein CynX and similar proteins. CynX is part of an active transport system that transports exogenous cyanate into E. coli cells. The gene encoding CynX is part of the cyn operon that also includes cynS, encoding cynase, which catalyzes the reaction of cyanate with bicarbonate to give ammonia and carbon dioxide, and cynT, which encodes a carbonic anhydrase. The CynX-like subfamily belongs to the 2-nitroimidazole and cyanate transporters like (NIMT/CynX-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Cyanate transport protein CynX and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of Escherichia coli cyanate transport protein CynX and similar proteins. CynX is part of an active transport system that transports exogenous cyanate into E. coli cells. The gene encoding CynX is part of the cyn operon that also includes cynS, encoding cynase, which catalyzes the reaction of cyanate with bicarbonate to give ammonia and carbon dioxide, and cynT, which encodes a carbonic anhydrase. The CynX-like subfamily belongs to the 2-nitroimidazole and cyanate transporters like (NIMT/CynX-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17410); members share this curated model.
