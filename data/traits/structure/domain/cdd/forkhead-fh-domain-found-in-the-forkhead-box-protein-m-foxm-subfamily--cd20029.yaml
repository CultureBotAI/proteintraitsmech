identifier: CDD:cd20029
label: "Forkhead (FH) domain found in the Forkhead box protein M (FOXM) subfamily. The FOXM subfamily includes a winged helix transcription factor, FOXM1, which is also called Forkhead-related protein FKHL16, Hepatocyte nuclear factor 3 Forkhead homolog 11 (HFH-11), HNF-3/fork-head homolog 11, M-phase phosphoprotein 2, MPM-2 reactive phosphoprotein 2, transcription factor Trident, or Winged-helix factor from INS-1 cells. FOXM1 acts as a transcriptional factor regulating the expression of cell cycle genes essential for DNA replication and mitosis. It plays a role in the control of cell proliferation. It is also involved in DNA break repair, participating in the DNA damage checkpoint response. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein M (FOXM) subfamily. The FOXM subfamily includes a winged helix transcription factor, FOXM1, which is also called Forkhead-related protein FKHL16, Hepatocyte nuclear factor 3 Forkhead homolog 11 (HFH-11), HNF-3/fork-head homolog 11, M-phase phosphoprotein 2, MPM-2 reactive phosphoprotein 2, transcription factor Trident, or Winged-helix factor from INS-1 cells. FOXM1 acts as a transcriptional factor regulating the expression of cell cycle genes essential for DNA replication and mitosis. It plays a role in the control of cell proliferation. It is also involved in DNA break repair, participating in the DNA damage checkpoint response. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20029); members share this curated model.
