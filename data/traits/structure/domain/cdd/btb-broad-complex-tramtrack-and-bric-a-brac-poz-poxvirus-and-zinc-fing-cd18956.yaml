identifier: CDD:cd18956
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 42 (ZBTB42). ZBTB42 is a transcriptional repressor that specifically binds DNA and probably acts by recruiting chromatin remodeling multiprotein complexes. It is enriched in skeletal muscles, especially at the neuromuscular junction. A ZBTB42 mutation has been identified to define a novel lethal congenital contracture syndrome (LCCS6), a lethal autosomal recessive form of arthrogryposis multiplex congenita (AMC). ZBTB42 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 42 (ZBTB42). ZBTB42 is a transcriptional repressor that specifically binds DNA and probably acts by recruiting chromatin remodeling multiprotein complexes. It is enriched in skeletal muscles, especially at the neuromuscular junction. A ZBTB42 mutation has been identified to define a novel lethal congenital contracture syndrome (LCCS6), a lethal autosomal recessive form of arthrogryposis multiplex congenita (AMC). ZBTB42 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18956); members share this curated model.
