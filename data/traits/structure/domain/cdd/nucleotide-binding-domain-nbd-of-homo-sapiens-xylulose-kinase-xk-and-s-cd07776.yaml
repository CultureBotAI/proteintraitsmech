identifier: CDD:cd07776
label: "nucleotide-binding domain (NBD) of Homo sapiens xylulose kinase (XK) and similar proteins. XK (EC 2.7.1.17), also called xylulokinase or D-xylulose kinase, catalyze the rate-limiting step in the ATP-dependent phosphorylation of D-xylulose to produce D-xylulose 5-phosphate (X5P), a molecule that may play an important role in the regulation of glucose metabolism and lipogenesis. The subfamily includes XKs mainly from eukaryote. They belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of Homo sapiens xylulose kinase (XK) and similar proteins. XK (EC 2.7.1.17), also called xylulokinase or D-xylulose kinase, catalyze the rate-limiting step in the ATP-dependent phosphorylation of D-xylulose to produce D-xylulose 5-phosphate (X5P), a molecule that may play an important role in the regulation of glucose metabolism and lipogenesis. The subfamily includes XKs mainly from eukaryote. They belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07776); members share this curated model.
