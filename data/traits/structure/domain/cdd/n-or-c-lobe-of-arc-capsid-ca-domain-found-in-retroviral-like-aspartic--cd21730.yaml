identifier: CDD:cd21730
label: "N- or C-lobe of Arc capsid (CA) domain found in retroviral-like aspartic protease 1 (ASPRV1) and similar proteins. ASPRV1, also called skin-specific retroviral-like aspartic protease (SASP), or SASPase, or skin aspartic protease, or TPA-inducible aspartic proteinase-like protein (TAPS), is an auto-activated aspartic protease that is specifically expressed within the epidermis. It might play an important role in cutaneous physiology. The model corresponds to a small region in N-terminus of ASPRV1, which shows high sequence similarity with N- or C-lobe of capsid (CA) domain found in activity-regulated cytoskeleton-associated protein (Arc)."
definition: >-
  N- or C-lobe of Arc capsid (CA) domain found in retroviral-like aspartic protease 1 (ASPRV1) and similar proteins. ASPRV1, also called skin-specific retroviral-like aspartic protease (SASP), or SASPase, or skin aspartic protease, or TPA-inducible aspartic proteinase-like protein (TAPS), is an auto-activated aspartic protease that is specifically expressed within the epidermis. It might play an important role in cutaneous physiology. The model corresponds to a small region in N-terminus of ASPRV1, which shows high sequence similarity with N- or C-lobe of capsid (CA) domain found in activity-regulated cytoskeleton-associated protein (Arc). — an NCBI CDD conserved domain (cd21730); members share this curated model.
