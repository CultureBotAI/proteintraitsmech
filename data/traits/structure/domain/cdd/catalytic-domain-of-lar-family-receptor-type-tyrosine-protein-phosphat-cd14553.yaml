identifier: CDD:cd14553
label: "catalytic domain of LAR family receptor-type tyrosine-protein phosphatases, repeat 1. The LAR (leukocyte common antigen-related) family of receptor-type tyrosine-protein phosphatases (RPTPs) include three vertebrate members: LAR (or PTPRF), R-PTP-delta (or PTPRD), and R-PTP-sigma (or PTPRS). They belong to the larger family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. LAR-RPTPs are synaptic adhesion molecules; they bind to distinct synaptic membrane proteins and are physiologically responsible for mediating presynaptic development by shaping various synaptic adhesion pathways. They play roles in various aspects of neuronal development, including axon guidance, neurite extension, and synapse formation and function. LAR-RPTPs contain an extracellular region with three immunoglobulin-like (Ig) domains and four to eight fibronectin type III (FN3) repeats (determined by alternative splicing), a single transmembrane domain, followed by an intracellular region with a membrane-proximal catalytic PTP domain (repeat 1, also called D1) and a membrane-distal non-catalytic PTP-like domain (repeat 2, also called D2). This model represents the catalytic PTP domain (repeat 1)."
