identifier: CDD:cd08717
label: "Regulator of G protein signaling (RGS) domain found in the RGS5 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS5 protein. RGS5 is member of the R4/RGS subfamily of the RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis.  Two splice isoforms of RGS5 has been found: RGS5L (long) which is expressed in smooth muscle cells (pericytes) and heart and RGS5S (short) which is highly expressed in the ciliary body of the eye, kidney, brain, spleen, skeletal muscle, and small intestine. Outside of the GPCR pathway, RGS5 interacts with the 14-3-3 protein."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS5 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS5 protein. RGS5 is member of the R4/RGS subfamily of the RGS family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha subunits. The RGS domain controls G-protein signaling by accelerating the GTPase activity of the G-alpha subunit which leads to G protein deactivation and promotes desensitization. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. Two splice isoforms of RGS5 has been found: RGS5L (long) which is expressed in smooth muscle cells (pericytes) and heart and RGS5S (short) which is highly expressed in the ciliary body of the eye, kidney, brain, spleen, skeletal muscle, and small intestine. Outside of the GPCR pathway, RGS5 interacts with the 14-3-3 protein. — an NCBI CDD conserved domain (cd08717); members share this curated model.
