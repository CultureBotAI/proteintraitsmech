label: "N-Utilization Substance G (NusG) N terminal (NGN) insert and Lin0431 are part of DUF1312. Domains of Unknown Function 1312 (DUF1312) are represented in at least 71 bacterial species with no functional annotation. Included in this family are N-Utilization Substance G (NusG) N terminal (NGN) insert and Lin0431, having similar structure and surface features that appear to be conserved across these domain families, suggesting similar function. NusG contains NGN at the N-terminus and Kyrpides Ouzounis and Woese (KOW) repeats at the C-terminus in bacteria and archaea, and this insert (often known as Domain II) is found in several bacteria. Lin0431 is similar to NGN-insert but does ot contain the disulphite bridge"
definition: >-
  N-Utilization Substance G (NusG) N terminal (NGN) insert and Lin0431 are part of DUF1312. Domains of Unknown Function 1312 (DUF1312) are represented in at least 71 bacterial species with no functional annotation. Included in this family are N-Utilization Substance G (NusG) N terminal (NGN) insert and Lin0431, having similar structure and surface features that appear to be conserved across these domain families, suggesting similar function. NusG contains NGN at the N-terminus and Kyrpides Ouzounis and Woese (KOW) repeats at the C-terminus in bacteria and archaea, and this insert (often known as Domain II) is found in several bacteria. Lin0431 is similar to NGN-insert but does ot contain the disulphite bridge — an NCBI CDD conserved domain (cd09846); members share this curated model.
