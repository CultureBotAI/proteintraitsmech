identifier: CDD:cd20273
label: "LYR (leucine-tyrosine-arginine) motif found in uncharacterized LYR motif-containing protein. This group contains uncharacterized LYR motif-containing proteins belonging to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus."
