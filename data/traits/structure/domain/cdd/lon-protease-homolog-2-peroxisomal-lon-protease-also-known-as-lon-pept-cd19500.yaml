identifier: CDD:cd19500
label: "lon protease homolog 2 peroxisomal. Lon protease (also known as Lon peptidase) is an evolutionarily conserved ATP-dependent serine protease, present in bacteria and eukaryotic mitochondria and peroxisomes, which mediates the selective degradation of mutant and abnormal proteins as well as certain short-lived regulatory proteins. Lon protease is both an ATP-dependent peptidase and a protein-activated ATPase. This RecA-like Lon domain subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  lon protease homolog 2 peroxisomal. Lon protease (also known as Lon peptidase) is an evolutionarily conserved ATP-dependent serine protease, present in bacteria and eukaryotic mitochondria and peroxisomes, which mediates the selective degradation of mutant and abnormal proteins as well as certain short-lived regulatory proteins. Lon protease is both an ATP-dependent peptidase and a protein-activated ATPase. This RecA-like Lon domain subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19500); members share this curated model.
