identifier: CDD:cd16534
label: "RING finger, HC subclass, found in RING finger protein RNF5, RNF185 and similar proteins. RNF5 and RNF185 are E3 ubiquitin-protein ligases that are anchored to the outer membrane of the endoplasmic reticulum (ER). RNF5 acts at early stages of cystic fibrosis (CF) transmembrane conductance regulator (CFTR) biosynthesis, and functions as a target for therapeutic modalities to antagonize mutant CFTR proteins in CF patients carrying the F508del allele. RNF185 controls the degradation of CFTR and CFTR F508del allele in a RING- and proteasome-dependent manner, but does not control that of other classical endoplasmic reticulum-associated degradation (ERAD) model substrates. Moreover, both RNF5 and RNF185 play important roles in cell adhesion and migration through the modulation of cell migration by ubiquitinating paxillin. Arabidopsis thaliana RING membrane-anchor proteins (AtRMAs) are also included in this family. They possess E3 ubiquitin-protein ligase activity and may play a role in the growth and development of Arabidopsis. All members of this family contain a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein RNF5, RNF185 and similar proteins. RNF5 and RNF185 are E3 ubiquitin-protein ligases that are anchored to the outer membrane of the endoplasmic reticulum (ER). RNF5 acts at early stages of cystic fibrosis (CF) transmembrane conductance regulator (CFTR) biosynthesis, and functions as a target for therapeutic modalities to antagonize mutant CFTR proteins in CF patients carrying the F508del allele. RNF185 controls the degradation of CFTR and CFTR F508del allele in a RING- and proteasome-dependent manner, but does not control that of other classical endoplasmic reticulum-associated degradation (ERAD) model substrates. Moreover, both RNF5 and RNF185 play important roles in cell adhesion and migration through the modulation of cell migration by ubiquitinating paxillin. Arabidopsis thaliana RING membrane-anchor proteins (AtRMAs) are also included in this family. They possess E3 ubiquitin-protein ligase activity and may play a role in the growth and development of Arabidopsis. All members of this family contain a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16534); members share this curated model.
