identifier: CDD:cd12456
label: "RNA recognition motif (RRM) found in the holoenzyme La family protein p65. This subfamily corresponds to the RRM of a lineage specific family containing the essential La family protein p65 found in Tetrahymena thermophila. It is a telomerase holoenzyme protein necessary for telomerase RNA (TER) accumulation in vivo. p65, together with TER and telomerase reverse transcriptase (TERT), comprise a ternary catalytic core complex of Tetrahymena telomerase, which is a ribonucleoprotein complex essential for maintenance of telomere DNA at linear chromosome ends. p65 harbors a cryptic, atypical RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), which displays high structural homology to the RRM in genuine La and LARP7 proteins."
definition: >-
  RNA recognition motif (RRM) found in the holoenzyme La family protein p65. This subfamily corresponds to the RRM of a lineage specific family containing the essential La family protein p65 found in Tetrahymena thermophila. It is a telomerase holoenzyme protein necessary for telomerase RNA (TER) accumulation in vivo. p65, together with TER and telomerase reverse transcriptase (TERT), comprise a ternary catalytic core complex of Tetrahymena telomerase, which is a ribonucleoprotein complex essential for maintenance of telomere DNA at linear chromosome ends. p65 harbors a cryptic, atypical RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), which displays high structural homology to the RRM in genuine La and LARP7 proteins. — an NCBI CDD conserved domain (cd12456); members share this curated model.
