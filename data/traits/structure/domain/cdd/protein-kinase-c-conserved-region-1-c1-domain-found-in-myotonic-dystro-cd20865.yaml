identifier: CDD:cd20865
label: "protein kinase C conserved region 1 (C1 domain) found in myotonic dystrophy kinase-related Cdc42-binding kinase beta (MRCK beta) and similar proteins. MRCK beta, also called Cdc42-binding protein kinase beta (Cdc42BP-beta), DMPK-like beta, or myotonic dystrophy protein kinase-like beta, is a serine/threonine-protein kinase expressed ubiquitously in many tissues. MRCK beta is an important downstream effector of Cdc42 and plays a role in the regulation of cytoskeleton reorganization and cell migration. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in myotonic dystrophy kinase-related Cdc42-binding kinase beta (MRCK beta) and similar proteins. MRCK beta, also called Cdc42-binding protein kinase beta (Cdc42BP-beta), DMPK-like beta, or myotonic dystrophy protein kinase-like beta, is a serine/threonine-protein kinase expressed ubiquitously in many tissues. MRCK beta is an important downstream effector of Cdc42 and plays a role in the regulation of cytoskeleton reorganization and cell migration. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20865); members share this curated model.
