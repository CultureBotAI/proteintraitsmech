identifier: CDD:cd16503
label: "RING finger, HC subclass, found in checkpoint with forkhead and RING finger domains protein (CHFR). CHFR, also known as RING finger protein 196 (RNF196), is a checkpoint protein that delays entry into mitosis in response to stress. It functions as an E3 ubiquitin ligase that ubiquitinates and degrades its target proteins, such as Aurora-A, Plk1, Kif22, and PARP-1, which are critical for proper mitotic transitions. It also plays an important role in cell cycle progression and tumor suppression, and is negatively regulated by SUMOylation-mediated proteasomal ubiquitylation. Moreover, CHFR is involved in the early stage of the DNA damage response, which mediates the crosstalk between ubiquitination and poly-ADP-ribosylation. CHFR contains a fork head associated (FHA) domain and a C3HC4-type RING-HC finger."
definition: >-
