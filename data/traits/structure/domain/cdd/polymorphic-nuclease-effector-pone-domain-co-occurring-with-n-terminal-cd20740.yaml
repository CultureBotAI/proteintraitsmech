identifier: CDD:cd20740
label: "Polymorphic Nuclease effector (PoNe) domain co-occurring with N-terminal LXG or pre-toxin HINT domains. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains members with PoNe domains that co-occur with N-terminal domains such as HINT or LXG domains. The pre-toxin HINT domain, a member of the HINT superfamily of proteases, is usually found N-terminal to the toxin module in polymorphic toxin systems; the HINT domain is predicted to function in releasing the toxin domain by autoproteolysis. The LXG domains that are present in the N-terminal region of a group of polymorphic toxin proteins in bacteria and predicted to use a Type VII secretion pathway to mediate export of bacterial toxins."
definition: >-
  Polymorphic Nuclease effector (PoNe) domain co-occurring with N-terminal LXG or pre-toxin HINT domains. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains members with PoNe domains that co-occur with N-terminal domains such as HINT or LXG domains. The pre-toxin HINT domain, a member of the HINT superfamily of proteases, is usually found N-terminal to the toxin module in polymorphic toxin systems; the HINT domain is predicted to function in releasing the toxin domain by autoproteolysis. The LXG domains that are present in the N-terminal region of a group of polymorphic toxin proteins in bacteria and predicted to use a Type VII secretion pathway to mediate export of bacterial toxins. — an NCBI CDD conserved domain (cd20740); members share this curated model.
