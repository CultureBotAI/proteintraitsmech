identifier: CDD:cd23690
label: "Tetrahymena thermophila ribosomal protein mL101 and similar proteins. Ribosomal protein mL101 is a helical repeat protein binding partially unfolded H79. It acts as a component of large subunit (LSU) in Tetrahymena thermophila mitoribosome. The structure of the mitoribosomal complex reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit (SSU), while the large subunit (LSU) lacks 5S rRNA."
definition: >-
  Tetrahymena thermophila ribosomal protein mL101 and similar proteins. Ribosomal protein mL101 is a helical repeat protein binding partially unfolded H79. It acts as a component of large subunit (LSU) in Tetrahymena thermophila mitoribosome. The structure of the mitoribosomal complex reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit (SSU), while the large subunit (LSU) lacks 5S rRNA. — an NCBI CDD conserved domain (cd23690); members share this curated model.
