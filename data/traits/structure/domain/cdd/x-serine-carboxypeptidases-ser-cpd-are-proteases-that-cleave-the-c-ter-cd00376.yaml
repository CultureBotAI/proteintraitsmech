identifier: CDD:cd00376
label: "x. Serine carboxypeptidases (Ser-CPD) are proteases that cleave the C-terminal amino acid residues of other proteins.  Their activity is optimum at low pH. Their name is derived from their ability to be inactivated by compounds which detect enzymes with serine-containing active sites. These enzymes are homodimers consisting of disulfide bond linked monomers. They can be divided into three groups based upon substrate specificity. Highly specific serine carboxypeptidases are involved in prohormone processing. The remaining groups which are less specific generally prefer either basic or hydrophobic groups."
definition: >-
  x. Serine carboxypeptidases (Ser-CPD) are proteases that cleave the C-terminal amino acid residues of other proteins. Their activity is optimum at low pH. Their name is derived from their ability to be inactivated by compounds which detect enzymes with serine-containing active sites. These enzymes are homodimers consisting of disulfide bond linked monomers. They can be divided into three groups based upon substrate specificity. Highly specific serine carboxypeptidases are involved in prohormone processing. The remaining groups which are less specific generally prefer either basic or hydrophobic groups. — an NCBI CDD conserved domain (cd00376); members share this curated model.
