identifier: CDD:cd01954
label: "PKS1_NR. FabD domain is essential for polyketide synthases (PKS) which closely related to fatty acid synthases (FAS).Both are multifunctional enzymes with the same ancestral enzymatic domain structure. Type I PKS are large modular enzyme systems which catalyse the biosynthesis of microcyclic polyketide products through an assembly line of active sites.Individual domains act upon the growing chain and transfer it to downstream domains through a phosphopantetheine linkage. PKS1_NR group included fungal PKS that synthesize unreduced and usually aromatic polyketides that are precursors to toxin (for example aflatoxin) and pigments."
definition: >-
  PKS1_NR. FabD domain is essential for polyketide synthases (PKS) which closely related to fatty acid synthases (FAS).Both are multifunctional enzymes with the same ancestral enzymatic domain structure. Type I PKS are large modular enzyme systems which catalyse the biosynthesis of microcyclic polyketide products through an assembly line of active sites.Individual domains act upon the growing chain and transfer it to downstream domains through a phosphopantetheine linkage. PKS1_NR group included fungal PKS that synthesize unreduced and usually aromatic polyketides that are precursors to toxin (for example aflatoxin) and pigments. — an NCBI CDD conserved domain (cd01954); members share this curated model.
