identifier: CDD:cd17067
label: "Ras-binding domain (RBD) 2 of regulator of G protein signaling 12 (RGS12) and similar proteins. Regulator of G-protein signaling (RGS) proteins belong to a large family of GTPase-accelerating proteins (GAPs) which act as key inhibitors of G-protein-mediated cell responses in eukaryotes. The RGS12-like subfamily is composed of RGS12 and RGS14, with multidomain architectures including a RGS domain, two tandem Ras-binding domains (RBDs), and a second Galpha interacting domain, the GoLoco motif. The RBD is structurally similar to the beta-grasp fold of ubiquitin, a common structure involved in protein-protein interactions. Ubiquitin is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes."
