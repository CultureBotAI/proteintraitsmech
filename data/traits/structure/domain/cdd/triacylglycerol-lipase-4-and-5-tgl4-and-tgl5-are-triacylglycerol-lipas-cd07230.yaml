identifier: CDD:cd07230
label: "Triacylglycerol lipase 4 and 5. TGL4 and TGL5 are triacylglycerol lipases that are involved in triacylglycerol mobilization and degradation; they are found in lipid particles. Tgl4 is a functional ortholog of mammalian adipose TG lipase (ATGL) and is phosphorylated and activated by cyclin-dependent kinase 1 (Cdk1/Cdc28). TGL4 is 30% homologus to TGL3, whereas TGL5 is 26% homologus to TGL3. This family includes TGL4 (STC1) and TGL5 (STC2) from Saccharomyces cerevisiae."
definition: >-
  Triacylglycerol lipase 4 and 5. TGL4 and TGL5 are triacylglycerol lipases that are involved in triacylglycerol mobilization and degradation; they are found in lipid particles. Tgl4 is a functional ortholog of mammalian adipose TG lipase (ATGL) and is phosphorylated and activated by cyclin-dependent kinase 1 (Cdk1/Cdc28). TGL4 is 30% homologus to TGL3, whereas TGL5 is 26% homologus to TGL3. This family includes TGL4 (STC1) and TGL5 (STC2) from Saccharomyces cerevisiae. — an NCBI CDD conserved domain (cd07230); members share this curated model.
