identifier: CDD:cd20764
label: "Arylesterases or serum paraoxonases (PON1), EC:3.1.1.2, and related enzymes. These enzymes hydrolyse organophosphorus esters such as paraoxon and are found in the liver and blood. They confer resistance to organophosphate toxicity. Human arylesterase (PON1) is associated with HDL and may protect against LDL oxidation. Paraoxonases are enzymes that hydrolyze organophosphate compounds, such as lipophilic lactones. Mammalian serum paraoxonases (PON1) are associated with high-density lipoprotein and function as antioxidants preventing the oxidation of low-density lipoprotein. PON2 is an intracellular enzyme that provides protection against oxidative damage; PON3 is similar to PON1, but is not regulated by inflammation and the level of oxidized lipids. These enzymes hydrolyse organophosphorus esters such as paraoxon and are found in the liver and blood, confering resistance to organophosphate toxicity. That resistance appears to have been lost in marine mammals, which exhibit loss of paraoxonase function."
definition: >-
  Arylesterases or serum paraoxonases (PON1), EC:3.1.1.2, and related enzymes. These enzymes hydrolyse organophosphorus esters such as paraoxon and are found in the liver and blood. They confer resistance to organophosphate toxicity. Human arylesterase (PON1) is associated with HDL and may protect against LDL oxidation. Paraoxonases are enzymes that hydrolyze organophosphate compounds, such as lipophilic lactones. Mammalian serum paraoxonases (PON1) are associated with high-density lipoprotein and function as antioxidants preventing the oxidation of low-density lipoprotein. PON2 is an intracellular enzyme that provides protection against oxidative damage; PON3 is similar to PON1, but is not regulated by inflammation and the level of oxidized lipids. These enzymes hydrolyse organophosphorus esters such as paraoxon and are found in the liver and blood, confering resistance to organophosphate toxicity. That resistance appears to have been lost in marine mammals, which exhibit loss of paraoxonase function. — an NCBI CDD conserved domain (cd20764); members share this curated model.
