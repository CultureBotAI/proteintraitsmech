label: "RING finger, H2 subclass, found in RING finger protein 214 (RNF214) and similar proteins. RNF214 is an uncharacterized RING finger protein containing a C3H2C3-type RING-H2 finger, suggesting it may have E3-ubiquitin ligase activity."
definition: >-
