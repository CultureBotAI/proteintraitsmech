identifier: CDD:cd14456
label: "Scaffolding protein menin encoded by the MEN1 gene. MEN1 is the gene responsible for multiple endocrine neoplasia type 1, and it has been characterized as a tumor suppressor gene that encodes a protein called menin. Menin is mostly found in the nucleus and can regulate gene expression in a positive and in a negative way, and it has been shown to interact with transcription activators, transcription repressors, cell signaling proteins, and various other proteins. It plays major roles in DNA repair, the regulation of the cell cycle, and chromatin remodeling."
definition: >-
  Scaffolding protein menin encoded by the MEN1 gene. MEN1 is the gene responsible for multiple endocrine neoplasia type 1, and it has been characterized as a tumor suppressor gene that encodes a protein called menin. Menin is mostly found in the nucleus and can regulate gene expression in a positive and in a negative way, and it has been shown to interact with transcription activators, transcription repressors, cell signaling proteins, and various other proteins. It plays major roles in DNA repair, the regulation of the cell cycle, and chromatin remodeling. — an NCBI CDD conserved domain (cd14456); members share this curated model.
