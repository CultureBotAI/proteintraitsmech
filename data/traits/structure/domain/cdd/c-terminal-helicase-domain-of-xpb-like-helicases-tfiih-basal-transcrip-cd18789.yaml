identifier: CDD:cd18789
label: "C-terminal helicase domain of XPB-like helicases. TFIIH basal transcription factor complex helicase XPB (xeroderma pigmentosum type B) subunit (also known as DNA excision repair protein ERCC-3 or TFIIH 89 kDa subunit) is the ATP-dependent 3'-5' DNA helicase component of the core-TFIIH basal transcription factor, involved in nucleotide excision repair (NER) of DNA and, when complexed to CAK, in RNA transcription by RNA polymerase II. XPB is a DEAD-like helicase belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC."
definition: >-
  C-terminal helicase domain of XPB-like helicases. TFIIH basal transcription factor complex helicase XPB (xeroderma pigmentosum type B) subunit (also known as DNA excision repair protein ERCC-3 or TFIIH 89 kDa subunit) is the ATP-dependent 3'-5' DNA helicase component of the core-TFIIH basal transcription factor, involved in nucleotide excision repair (NER) of DNA and, when complexed to CAK, in RNA transcription by RNA polymerase II. XPB is a DEAD-like helicase belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC. — an NCBI CDD conserved domain (cd18789); members share this curated model.
