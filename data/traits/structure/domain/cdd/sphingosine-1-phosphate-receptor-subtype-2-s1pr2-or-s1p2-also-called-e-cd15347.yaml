identifier: CDD:cd15347
label: "sphingosine-1-phosphate receptor subtype 2 (S1PR2 or S1P2), also called endothelial differentiation gene 5 (Edg5), member of the class A family of seven-transmembrane G protein-coupled receptors. The endothelial differentiation gene (Edg) family of G-protein coupled receptors binds blood borne lysophospholipids including sphingosine-1-phosphate (S1P) and lysophosphatidic acid (LPA), which are involved in the regulation of cell proliferation, survival, migration, invasion, endothelial cell shape change and cytoskeletal remodeling. The Edg receptors are classified into two subfamilies: the lysophosphatidic acid subfamily that includes LPA1 (Edg2), LPA2 (Edg4), and LPA3 (Edg7); and the S1P subfamily that includes S1P1 (Edg1), S1P2 (Edg5), S1P3 (Edg3), S1P4 (Edg6), and S1P5 (Edg8).  The Edg receptors couple and activate at least three different G protein subtypes including G(i/o), G(q/11), and G(12/13)."
definition: >-
  sphingosine-1-phosphate receptor subtype 2 (S1PR2 or S1P2), also called endothelial differentiation gene 5 (Edg5), member of the class A family of seven-transmembrane G protein-coupled receptors. The endothelial differentiation gene (Edg) family of G-protein coupled receptors binds blood borne lysophospholipids including sphingosine-1-phosphate (S1P) and lysophosphatidic acid (LPA), which are involved in the regulation of cell proliferation, survival, migration, invasion, endothelial cell shape change and cytoskeletal remodeling. The Edg receptors are classified into two subfamilies: the lysophosphatidic acid subfamily that includes LPA1 (Edg2), LPA2 (Edg4), and LPA3 (Edg7); and the S1P subfamily that includes S1P1 (Edg1), S1P2 (Edg5), S1P3 (Edg3), S1P4 (Edg6), and S1P5 (Edg8). The Edg receptors couple and activate at least three different G protein subtypes including G(i/o), G(q/11), and G(12/13). — an NCBI CDD conserved domain (cd15347); members share this curated model.
