identifier: CDD:cd18175
label: "V-type proton ATPase 16 kDa proteolipid subunit (ATP6C/ATP6V0C/ATP6L/ATPL) and similar proteins. ATP6C (also called the V-ATPase 16 kDa proteolipid subunit, or vacuolar proton pump 16 kDa proteolipid subunit) is a proton-conducting pore forming subunit of the membrane integral Vo complex of vacuolar ATPase. V-ATPase is responsible for acidifying a variety of intracellular compartments in eukaryotic cells."
definition: >-
  V-type proton ATPase 16 kDa proteolipid subunit (ATP6C/ATP6V0C/ATP6L/ATPL) and similar proteins. ATP6C (also called the V-ATPase 16 kDa proteolipid subunit, or vacuolar proton pump 16 kDa proteolipid subunit) is a proton-conducting pore forming subunit of the membrane integral Vo complex of vacuolar ATPase. V-ATPase is responsible for acidifying a variety of intracellular compartments in eukaryotic cells. — an NCBI CDD conserved domain (cd18175); members share this curated model.
