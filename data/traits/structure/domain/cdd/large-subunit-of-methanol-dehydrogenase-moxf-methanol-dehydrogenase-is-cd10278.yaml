identifier: CDD:cd10278
label: "Large subunit of methanol dehydrogenase (moxF). Methanol dehydrogenase is a key enzyme in the utilization of C1 compounds as a source of energy and carbon by bacteria. It catalyzes the oxidation of methanol to formaldehyde, transfering two electrons per methanol to cytochrome c(L) as the acceptor. Methanol dehydrogenase belongs to a family of dehydrogenases with pyrroloquinoline quinone (PQQ) as cofactor, which also includes dehydrogenases specific to other alcohols and membrane-bound glucose dehydrogenases. This alignment model for the large subunit contains an 8-bladed beta-propeller; the functional enzyme forms a heterotetramer composed of two large and two small subunits."
definition: >-
  Large subunit of methanol dehydrogenase (moxF). Methanol dehydrogenase is a key enzyme in the utilization of C1 compounds as a source of energy and carbon by bacteria. It catalyzes the oxidation of methanol to formaldehyde, transfering two electrons per methanol to cytochrome c(L) as the acceptor. Methanol dehydrogenase belongs to a family of dehydrogenases with pyrroloquinoline quinone (PQQ) as cofactor, which also includes dehydrogenases specific to other alcohols and membrane-bound glucose dehydrogenases. This alignment model for the large subunit contains an 8-bladed beta-propeller; the functional enzyme forms a heterotetramer composed of two large and two small subunits. — an NCBI CDD conserved domain (cd10278); members share this curated model.
