identifier: CDD:cd16888
label: "lysozyme G-like protein 1. Eukaryotic goose-type or G-type lysozymes (goose egg-white lysozyme; GEWL) catalyze the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc). Mammals have two lysozyme G-like proteins, and this family corresponds to human and mouse lysozyme G-like protein 1. In humans and some other species, the canonical catalytic glutamate residue is absent, suggesting a loss of muramidase activity."
definition: >-
  lysozyme G-like protein 1. Eukaryotic goose-type or G-type lysozymes (goose egg-white lysozyme; GEWL) catalyze the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc). Mammals have two lysozyme G-like proteins, and this family corresponds to human and mouse lysozyme G-like protein 1. In humans and some other species, the canonical catalytic glutamate residue is absent, suggesting a loss of muramidase activity. — an NCBI CDD conserved domain (cd16888); members share this curated model.
