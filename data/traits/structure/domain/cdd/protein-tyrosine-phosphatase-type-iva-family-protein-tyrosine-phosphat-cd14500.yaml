identifier: CDD:cd14500
label: "protein tyrosine phosphatase type IVA family. Protein tyrosine phosphatases type IVA (PTP-IVa), also known as protein-tyrosine phosphatases of regenerating liver (PRLs) constitute a family of small, prenylated phosphatases that are the most oncogenic of all PTPs. They stimulate progression from G1 into S phase during mitosis and enhances cell proliferation, cell motility and invasive activity, and promotes cancer metastasis. They associate with magnesium transporters of the cyclin M (CNNM) family, which results in increased intracellular magnesium levels that promote oncogenic transformation. Vertebrates contain three members: PRL-1, PRL-2, and PRL-3."
definition: >-
  protein tyrosine phosphatase type IVA family. Protein tyrosine phosphatases type IVA (PTP-IVa), also known as protein-tyrosine phosphatases of regenerating liver (PRLs) constitute a family of small, prenylated phosphatases that are the most oncogenic of all PTPs. They stimulate progression from G1 into S phase during mitosis and enhances cell proliferation, cell motility and invasive activity, and promotes cancer metastasis. They associate with magnesium transporters of the cyclin M (CNNM) family, which results in increased intracellular magnesium levels that promote oncogenic transformation. Vertebrates contain three members: PRL-1, PRL-2, and PRL-3. — an NCBI CDD conserved domain (cd14500); members share this curated model.
