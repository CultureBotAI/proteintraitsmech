identifier: CDD:cd18173
label: "bacterial peptidase M14 carboxypeptidase, uncharacterized. This family contains only bacterial carboxypeptidase (CP) members of the M14 family of metallocarboxypeptidases (MCPs), mostly of which have yet to be characterized. The M14 family are zinc-binding CPs which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. The N/E subfamily includes eight members, of which five (CPN, CPE, CPM, CPD, CPZ) are considered enzymatically active, while the other three are non-active (CPX1, PCX2, ACLP/AEBP1) and lack the critical active site and substrate-binding residues considered necessary for CP activity. These non-active members may function as binding proteins or display catalytic activity towards other substrates. Unlike the A/B CP subfamily, enzymes belonging to the N/E subfamily are not produced as inactive precursors that require proteolysis to produce the active form; rather, they rely on their substrate specificity and subcellular compartmentalization to prevent inappropriate cleavages that would otherwise damage the cell. In addition, all members of the N/E subfamily contain an extra C-terminal domain that is not present in the A/B subfamily. This domain has structural homology to transthyretin and other proteins and has been proposed to function as a folding domain. The active N/E enzymes fulfill a variety of cellular functions, including prohormone processing, regulation of peptide hormone activity, alteration of protein-protein or protein-cell interactions and transcriptional regulation."
definition: >-
  bacterial peptidase M14 carboxypeptidase, uncharacterized. This family contains only bacterial carboxypeptidase (CP) members of the M14 family of metallocarboxypeptidases (MCPs), mostly of which have yet to be characterized. The M14 family are zinc-binding CPs which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. The N/E subfamily includes eight members, of which five (CPN, CPE, CPM, CPD, CPZ) are considered enzymatically active, while the other three are non-active (CPX1, PCX2, ACLP/AEBP1) and lack the critical active site and substrate-binding residues considered necessary for CP activity. These non-active members may function as binding proteins or display catalytic activity towards other substrates. Unlike the A/B CP subfamily, enzymes belonging to the N/E subfamily are not produced as inactive precursors that require proteolysis to produce the active form; rather, they rely on their substrate specificity and subcellular compartmentalization to prevent inappropriate cleavages that would otherwise damage the cell. In addition, all members of the N/E subfamily contain an extra C-terminal domain that is not present in the A/B subfamily. This domain has structural homology to transthyretin and other proteins and has been proposed to function as a folding domain. The active N/E enzymes fulfill a variety of cellular functions, including prohormone processing, regulation of peptide hormone activity, alteration of protein-protein or protein-cell interactions and transcriptional regulation. — an NCBI CDD conserved domain (cd18173); members share this curated model.
