identifier: CDD:cd19042
label: "extracellular domain of gamma-aminobutyric acid receptor subunit beta-3 (GABAAR-B3 or GABRB3). This family contains extracellular domain (ECD) of gamma-aminobutyric acid receptor beta-3 subunit, a protein that is encoded by the GABRB3 gene. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The beta-3 subunit forms heteropentamers with other GABAAR subunits, with alpha2-beta3-gamma2 and alpha3-beta3-gamma2 subtypes highly enriched in hippocampal pyramidal neurons and cholinergic neurons of the basal forebrain, respectively. Other heteromers include alpha1-beta3-gamma2 and alpha5-beta3-gamma2. GABRB3 mutations are likely associated with a broad phenotypic spectrum of epilepsies and that reduced receptor function causing GABAergic disinhibition represents the relevant disease mechanism. GABRB3 might be associated with heroin dependence, and increased expression possibly contributing to the pathogenesis of heroin dependence. This gene may also be associated with the pathogenesis of other disorders such as Angelman syndrome, Prader-Willi syndrome, nonsyndromic orofacial clefts, schizophrenia, and autism."
