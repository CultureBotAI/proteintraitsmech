identifier: CDD:cd14538
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 20 and type 13. Tyrosine-protein phosphatase non-receptor type 20 (PTPN20) and type 13 (PTPN13, also known as PTPL1) belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Human PTPN20 is a widely expressed phosphatase with a dynamic subcellular distribution that is targeted to sites of actin polymerization. Human PTPN13 is an important regulator of tumor aggressiveness."
definition: >-
  catalytic domain of tyrosine-protein phosphatase non-receptor type 20 and type 13. Tyrosine-protein phosphatase non-receptor type 20 (PTPN20) and type 13 (PTPN13, also known as PTPL1) belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Human PTPN20 is a widely expressed phosphatase with a dynamic subcellular distribution that is targeted to sites of actin polymerization. Human PTPN13 is an important regulator of tumor aggressiveness. — an NCBI CDD conserved domain (cd14538); members share this curated model.
