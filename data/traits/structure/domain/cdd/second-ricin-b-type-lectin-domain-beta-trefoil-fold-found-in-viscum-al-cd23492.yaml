identifier: CDD:cd23492
label: "second ricin B-type lectin domain, beta-trefoil fold, found in Viscum album B chain of beta-galactoside-specific lectins and similar proteins. This subfamily includes Viscum album beta-galactoside-specific lectins 1-4 (also known as mistletoe lectins or MLs), which inhibit growth of the human tumor cell line Molt4. They contain A and B chains. The A chain is responsible for inhibiting protein synthesis through the catalytic inactivation of 60S ribosomal subunits by removing adenine from position 4,324 of 28S rRNA. The B chain binds to cell receptors and probably facilitates the entry into the cell of the A chain; B chains are also responsible for cell agglutination (lectin activity). The B chain contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the second ricin B-type lectin domain."
definition: >-
  second ricin B-type lectin domain, beta-trefoil fold, found in Viscum album B chain of beta-galactoside-specific lectins and similar proteins. This subfamily includes Viscum album beta-galactoside-specific lectins 1-4 (also known as mistletoe lectins or MLs), which inhibit growth of the human tumor cell line Molt4. They contain A and B chains. The A chain is responsible for inhibiting protein synthesis through the catalytic inactivation of 60S ribosomal subunits by removing adenine from position 4,324 of 28S rRNA. The B chain binds to cell receptors and probably facilitates the entry into the cell of the A chain; B chains are also responsible for cell agglutination (lectin activity). The B chain contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the second ricin B-type lectin domain. — an NCBI CDD conserved domain (cd23492); members share this curated model.
