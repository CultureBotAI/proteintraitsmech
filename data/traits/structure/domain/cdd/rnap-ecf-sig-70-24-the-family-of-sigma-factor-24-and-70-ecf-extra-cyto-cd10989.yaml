identifier: CDD:cd10989
label: "RNAP_ECF_sig_70_24. The family of sigma factor 24 and 70 ECF (extra cytoplasmic function) sigma factors, which for this particular subfamily are found mostly in Rhodospirillium, Rhodopseudomonas, and Magnetospirillium bacteria. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs."
definition: >-
  RNAP_ECF_sig_70_24. The family of sigma factor 24 and 70 ECF (extra cytoplasmic function) sigma factors, which for this particular subfamily are found mostly in Rhodospirillium, Rhodopseudomonas, and Magnetospirillium bacteria. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs. — an NCBI CDD conserved domain (cd10989); members share this curated model.
