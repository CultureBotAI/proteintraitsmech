identifier: CDD:cd16808
label: "RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH2 (MARCH2). MARCH2, also known as membrane-associated RING finger protein 2, membrane-associated RING-CH protein II (MARCH-II), or RING finger protein 172 (RNF172), is a Golgi-localized, membrane-associated E3 ubiquitin-protein ligase that is involved in endosomal trafficking through the binding of syntaxin 6 (STX6). It is involved in the cystic fibrosis transmembrane conductance regulator (CFTR)-associated ligand (CAL)-mediated ubiquitination and lysosomal degradation of mature CFTR through the association with adaptor proteins CAL and STX6. It also reduces the surface expression of CD86 and the transferrin receptor TFRC and regulates cell surface carvedilol-bound beta2-adrenergic receptor (beta2AR) expression. Moreover, MARCH2 interacts with and ubiquitinates PDZ domains polarity determining scaffold protein DLG1 through its PDZ-binding motif, suggesting it may function as a molecular bridge with ubiquitin ligase activity connecting endocytic tumor suppressor proteins such as syntaxins to DLG1. MARCH2 contains a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, in the N-terminal cytoplasmic region, two transmembrane domains in the middle region, and a PDZ-binding motif at the C-terminus."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH2 (MARCH2). MARCH2, also known as membrane-associated RING finger protein 2, membrane-associated RING-CH protein II (MARCH-II), or RING finger protein 172 (RNF172), is a Golgi-localized, membrane-associated E3 ubiquitin-protein ligase that is involved in endosomal trafficking through the binding of syntaxin 6 (STX6). It is involved in the cystic fibrosis transmembrane conductance regulator (CFTR)-associated ligand (CAL)-mediated ubiquitination and lysosomal degradation of mature CFTR through the association with adaptor proteins CAL and STX6. It also reduces the surface expression of CD86 and the transferrin receptor TFRC and regulates cell surface carvedilol-bound beta2-adrenergic receptor (beta2AR) expression. Moreover, MARCH2 interacts with and ubiquitinates PDZ domains polarity determining scaffold protein DLG1 through its PDZ-binding motif, suggesting it may function as a molecular bridge with ubiquitin ligase activity connecting endocytic tumor suppressor proteins such as syntaxins to DLG1. MARCH2 contains a C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, in the N-terminal cytoplasmic region, two transmembrane domains in the middle region, and a PDZ-binding motif at the C-terminus. — an NCBI CDD conserved domain (cd16808); members share this curated model.
