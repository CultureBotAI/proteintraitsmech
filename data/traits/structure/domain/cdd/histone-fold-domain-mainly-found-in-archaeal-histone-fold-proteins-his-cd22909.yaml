identifier: CDD:cd22909
label: "histone-fold domain mainly found in archaeal histone-fold proteins, histone-like transcription regulators and similar proteins. The family includes many archaeal histone-fold proteins and histone-like transcription regulators, which may bind and compact DNA (95 to 150 base pairs) to form nucleosome-like structures that contain positive DNA supercoils. They can increase the resistance of DNA to thermal denaturation."
definition: >-
  histone-fold domain mainly found in archaeal histone-fold proteins, histone-like transcription regulators and similar proteins. The family includes many archaeal histone-fold proteins and histone-like transcription regulators, which may bind and compact DNA (95 to 150 base pairs) to form nucleosome-like structures that contain positive DNA supercoils. They can increase the resistance of DNA to thermal denaturation. — an NCBI CDD conserved domain (cd22909); members share this curated model.
