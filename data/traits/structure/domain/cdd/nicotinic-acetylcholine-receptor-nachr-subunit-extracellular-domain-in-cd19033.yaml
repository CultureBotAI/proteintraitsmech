identifier: CDD:cd19033
label: "nicotinic acetylcholine receptor (nAChR) subunit extracellular domain in molluscs and annelids. This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit found in molluscs, including several Lymnaea nAChRs, and annelids that are mostly uncharacterized. To date, 12 Lymnaea nAChRs have been identified which can be subdivided in two subtypes according to the residues that may be contributing to the selectivity of ion conductance. Phylogenetic analysis of the nAChR gene sequences suggests that anionic nAChRs in molluscs probably evolved from cationic ancestors through amino acid substitutions in the ion channel pore which is a mechanism different from acetylcholine-gated channels in other invertebrates."
definition: >-
  nicotinic acetylcholine receptor (nAChR) subunit extracellular domain in molluscs and annelids. This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit found in molluscs, including several Lymnaea nAChRs, and annelids that are mostly uncharacterized. To date, 12 Lymnaea nAChRs have been identified which can be subdivided in two subtypes according to the residues that may be contributing to the selectivity of ion conductance. Phylogenetic analysis of the nAChR gene sequences suggests that anionic nAChRs in molluscs probably evolved from cationic ancestors through amino acid substitutions in the ion channel pore which is a mechanism different from acetylcholine-gated channels in other invertebrates. — an NCBI CDD conserved domain (cd19033); members share this curated model.
