identifier: CDD:cd13991
label: "Catalytic domain of the Serine/Threonine kinase, NF-kappaB Inducing Kinase (NIK). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. NIK, also called mitogen activated protein kinase kinase kinase 14 (MAP3K14), phosphorylates and activates Inhibitor of NF-KappaB Kinase (IKK) alpha, which is a regulator of NF-kB proteins, a family of transcription factors which are critical in many cellular functions including inflammatory responses, immune development, cell survival, and cell proliferation, among others. NIK is essential in the IKKalpha-mediated non-canonical NF-kB signaling pathway, in which IKKalpha processes the IkB-like C-terminus of NF-kB2/p100 to produce p52, allowing the p52/RelB dimer to migrate to the nucleus where it regulates gene transcription. NIK also plays an important role in Toll-like receptor 7/9 signaling cascades. The NIK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, NF-kappaB Inducing Kinase (NIK). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. NIK, also called mitogen activated protein kinase kinase kinase 14 (MAP3K14), phosphorylates and activates Inhibitor of NF-KappaB Kinase (IKK) alpha, which is a regulator of NF-kB proteins, a family of transcription factors which are critical in many cellular functions including inflammatory responses, immune development, cell survival, and cell proliferation, among others. NIK is essential in the IKKalpha-mediated non-canonical NF-kB signaling pathway, in which IKKalpha processes the IkB-like C-terminus of NF-kB2/p100 to produce p52, allowing the p52/RelB dimer to migrate to the nucleus where it regulates gene transcription. NIK also plays an important role in Toll-like receptor 7/9 signaling cascades. The NIK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13991); members share this curated model.
