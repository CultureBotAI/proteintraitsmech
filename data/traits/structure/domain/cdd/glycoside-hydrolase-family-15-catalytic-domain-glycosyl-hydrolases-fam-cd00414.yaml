identifier: CDD:cd00414
label: "Glycoside Hydrolase Family 15 catalytic domain. Glycosyl hydrolases family 15 includes enzymes with several activities: glucoamylase, alpha-glucosidase and glucodextranase. Glucoamylase (glucan 1,4-alpha-glucosidase; 4-alpha-D-glucan glucohydrolase; amyloglucosidase; exo-1,4-alpha-glucosidase; gamma-amylase; lysosomal alpha-glucosidase; EC 3.2.1.3) hydrolyzes alpha-1,4-glucosidic linkages of starch, glycogen and malto-oligosaccharides, releasing beta-D-glucose from the non-reducing end. It is also able to degrade alpha-1,6-glucosidic linkages although much less effectively (for example, when the next bond in the sequence is 1,4). Alpha-glucosidase (acid maltase; glucoinvertase; glucosidosucrase; lysosomal alpha-glucosidase; maltase; maltase-glucoamylase; EC 3.2.1.20) hydrolyzes terminal, non-reducing (1->4)-linked alpha-D-glucose residues with release of alpha-D-glucose. Glucodextranase (glucan 1,6-alpha-glucosidase; exo-1,6-alpha-glucosidase; EC 3.2.1.70) uses an inverting reaction mechanism to hydrolyze  alpha-1,6-glucosidic linkages of dextran and related oligosaccharides, releasing beta-D-glucose from the non-reducing end. Glucoamylases are used in industrial processes in the production of glucose and fructose syrups, and ethanol."
definition: >-
  Glycoside Hydrolase Family 15 catalytic domain. Glycosyl hydrolases family 15 includes enzymes with several activities: glucoamylase, alpha-glucosidase and glucodextranase. Glucoamylase (glucan 1,4-alpha-glucosidase; 4-alpha-D-glucan glucohydrolase; amyloglucosidase; exo-1,4-alpha-glucosidase; gamma-amylase; lysosomal alpha-glucosidase; EC 3.2.1.3) hydrolyzes alpha-1,4-glucosidic linkages of starch, glycogen and malto-oligosaccharides, releasing beta-D-glucose from the non-reducing end. It is also able to degrade alpha-1,6-glucosidic linkages although much less effectively (for example, when the next bond in the sequence is 1,4). Alpha-glucosidase (acid maltase; glucoinvertase; glucosidosucrase; lysosomal alpha-glucosidase; maltase; maltase-glucoamylase; EC 3.2.1.20) hydrolyzes terminal, non-reducing (1->4)-linked alpha-D-glucose residues with release of alpha-D-glucose. Glucodextranase (glucan 1,6-alpha-glucosidase; exo-1,6-alpha-glucosidase; EC 3.2.1.70) uses an inverting reaction mechanism to hydrolyze alpha-1,6-glucosidic linkages of dextran and related oligosaccharides, releasing beta-D-glucose from the non-reducing end. Glucoamylases are used in industrial processes in the production of glucose and fructose syrups, and ethanol. — an NCBI CDD conserved domain (cd00414); members share this curated model.
