identifier: CDD:cd10563
label: "CooF, iron-sulfur subunit of carbon monoxide dehydrogenase. This family includes CooF, the iron-sulfur subunit of carbon monoxide dehydrogenase (CODH), found in anaerobic bacteria and archaea. Carbon monoxide dehydrogenase is a key enzyme for carbon monoxide (CO) metabolism, where CooF is the proposed mediator of electron transfer between CODH and the CO-induced hydrogenase, catalyzing the reaction that uses CO as a single carbon and energy source, and producing only H2 and CO2. The ion-sulfur subunit contains four Fe4/S4 and/or Fe3/S4 clusters which transfer the electrons in the protein complex during reaction."
definition: >-
  CooF, iron-sulfur subunit of carbon monoxide dehydrogenase. This family includes CooF, the iron-sulfur subunit of carbon monoxide dehydrogenase (CODH), found in anaerobic bacteria and archaea. Carbon monoxide dehydrogenase is a key enzyme for carbon monoxide (CO) metabolism, where CooF is the proposed mediator of electron transfer between CODH and the CO-induced hydrogenase, catalyzing the reaction that uses CO as a single carbon and energy source, and producing only H2 and CO2. The ion-sulfur subunit contains four Fe4/S4 and/or Fe3/S4 clusters which transfer the electrons in the protein complex during reaction. — an NCBI CDD conserved domain (cd10563); members share this curated model.
