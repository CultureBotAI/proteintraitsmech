identifier: CDD:cd14827
label: "AP complex subunit sigma. AP complex sigma subunits are part of the heterotetrameric adaptor protein (AP) complex which consists of one large subunit (alpha-, gamma-, delta- or epsilon), one beta-, one mu-, and one sigma-subunit. In general, AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In most cases the coat protein is clathrin (AP1 and AP2 complex), but some of the other members of the AP complex family are associated with nonclathrin coats. The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals."
definition: >-
  AP complex subunit sigma. AP complex sigma subunits are part of the heterotetrameric adaptor protein (AP) complex which consists of one large subunit (alpha-, gamma-, delta- or epsilon), one beta-, one mu-, and one sigma-subunit. In general, AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In most cases the coat protein is clathrin (AP1 and AP2 complex), but some of the other members of the AP complex family are associated with nonclathrin coats. The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals. — an NCBI CDD conserved domain (cd14827); members share this curated model.
