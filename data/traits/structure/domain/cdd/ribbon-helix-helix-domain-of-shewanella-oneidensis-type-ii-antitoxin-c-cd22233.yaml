identifier: CDD:cd22233
label: "ribbon-helix-helix domain of Shewanella oneidensis type II antitoxin CopA(SO), and similar proteins. This family includes the N-terminal ribbon-helix-helix (RHH) domain of Shewanella oneidensis CopA(SO), a newly identified type II antitoxin, as well as the N-terminal RHH domain of Escherichia coli PutA flavoprotein, among other similar proteins, many of which are as yet uncharacterized. CopA(SO) is a typical RHH antitoxin that includes an ordered N-terminal domain (CopA(SO)-N) and a disordered C-terminal domain (CopA(SO)-C). Biophysical investigation indicates allosteric effects of CopA(SO)-N on CopA(SO)-C; DNA binding of CopA(SO)-N appears to induce CopA(SO)-C to fold and self-associate the C-terminal domain. The multifunctional E. coli proline utilization A (PutA) flavoprotein functions as a membrane-associated proline catabolic enzyme as well as a transcriptional repressor of the proline utilization genes putA and putP. The N-terminal domain of PutA is a transcriptional regulator with an RHH fold; structure studies show that it forms a homodimer to bind one DNA duplex. This family also includes orphan antitoxin ParD2, an antitoxin component of a non-functional type II toxin-antitoxin (TA system); it does not neutralize the effect of any of the RelE or ParE toxins."
definition: >-
  ribbon-helix-helix domain of Shewanella oneidensis type II antitoxin CopA(SO), and similar proteins. This family includes the N-terminal ribbon-helix-helix (RHH) domain of Shewanella oneidensis CopA(SO), a newly identified type II antitoxin, as well as the N-terminal RHH domain of Escherichia coli PutA flavoprotein, among other similar proteins, many of which are as yet uncharacterized. CopA(SO) is a typical RHH antitoxin that includes an ordered N-terminal domain (CopA(SO)-N) and a disordered C-terminal domain (CopA(SO)-C). Biophysical investigation indicates allosteric effects of CopA(SO)-N on CopA(SO)-C; DNA binding of CopA(SO)-N appears to induce CopA(SO)-C to fold and self-associate the C-terminal domain. The multifunctional E. coli proline utilization A (PutA) flavoprotein functions as a membrane-associated proline catabolic enzyme as well as a transcriptional repressor of the proline utilization genes putA and putP. The N-terminal domain of PutA is a transcriptional regulator with an RHH fold; structure studies show that it forms a homodimer to bind one DNA duplex. This family also includes orphan antitoxin ParD2, an antitoxin component of a non-functional type II toxin-antitoxin (TA system); it does not neutralize the effect of any of the RelE or ParE toxins. — an NCBI CDD conserved domain (cd22233); members share this curated model.
