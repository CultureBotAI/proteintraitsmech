identifier: CDD:cd15829
label: "PRY/SPRY domain of tripartite motif-binding protein 75 (TRIM75). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM75, also known as Gm794. TRIM75 domains are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. TRIM75 has a single site of positive selection in its RING domain associated with E3 ubiquitin ligase activity. It has not been detectably expressed experimentally due to their constant turnover by the proteasome, and therefore not been characterized."
definition: >-
  PRY/SPRY domain of tripartite motif-binding protein 75 (TRIM75). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM75, also known as Gm794. TRIM75 domains are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. TRIM75 has a single site of positive selection in its RING domain associated with E3 ubiquitin ligase activity. It has not been detectably expressed experimentally due to their constant turnover by the proteasome, and therefore not been characterized. — an NCBI CDD conserved domain (cd15829); members share this curated model.
