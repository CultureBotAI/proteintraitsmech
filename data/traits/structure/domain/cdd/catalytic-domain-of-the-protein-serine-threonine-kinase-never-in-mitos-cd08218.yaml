identifier: CDD:cd08218
label: "Catalytic domain of the Protein Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Nek1 is associated with centrosomes throughout the cell cycle. It is involved in the formation of primary cilium and in the maintenance of centrosomes. It cycles through the nucleus and may be capable of relaying signals between the cilium and the nucleus. Nek1 is implicated in the development of polycystic kidney disease, which is characterized by benign polycystic tumors formed by abnormal overgrowth of renal epithelial cells. It appears also to be involved in DNA damage response, and may be important for both correct DNA damage checkpoint activation and DNA repair. Nek1 is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control. The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Nek1 is associated with centrosomes throughout the cell cycle. It is involved in the formation of primary cilium and in the maintenance of centrosomes. It cycles through the nucleus and may be capable of relaying signals between the cilium and the nucleus. Nek1 is implicated in the development of polycystic kidney disease, which is characterized by benign polycystic tumors formed by abnormal overgrowth of renal epithelial cells. It appears also to be involved in DNA damage response, and may be important for both correct DNA damage checkpoint activation and DNA repair. Nek1 is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control. The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd08218); members share this curated model.
