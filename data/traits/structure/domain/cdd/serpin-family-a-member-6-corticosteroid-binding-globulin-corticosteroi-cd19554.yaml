identifier: CDD:cd19554
label: "serpin family A member 6, corticosteroid-binding globulin. Corticosteroid-binding globulin (CBG, also known as transcortin) is encoded by the SERPINA6 gene in humans which encodes an alpha-globulin with corticosteroid-binding properties. It is produced in the liver. CBG binds several steroid hormones at high rates including cortisol, cortisone, deoxycorticosterone (DOC), corticosterone, aldosterone, progesterone, and 17a-hydroxyprogesterone. This family belongs to the clade A of the serpin superfamily, which includes the classical serine proteinase inhibitors, alpha-1-antitrypsin and alpha-1-antichymotrypsin, protein C inhibitor, kallistatin, and non-inhibitory serpins, like corticosteroid and thyroxin binding globulins. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
definition: >-
  serpin family A member 6, corticosteroid-binding globulin. Corticosteroid-binding globulin (CBG, also known as transcortin) is encoded by the SERPINA6 gene in humans which encodes an alpha-globulin with corticosteroid-binding properties. It is produced in the liver. CBG binds several steroid hormones at high rates including cortisol, cortisone, deoxycorticosterone (DOC), corticosterone, aldosterone, progesterone, and 17a-hydroxyprogesterone. This family belongs to the clade A of the serpin superfamily, which includes the classical serine proteinase inhibitors, alpha-1-antitrypsin and alpha-1-antichymotrypsin, protein C inhibitor, kallistatin, and non-inhibitory serpins, like corticosteroid and thyroxin binding globulins. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans. — an NCBI CDD conserved domain (cd19554); members share this curated model.
