identifier: CDD:cd22932
label: "histone-fold domain found in TAF6-like RNA polymerase II p300/CBP-associated factor-associated factor 65 kDa subunit 6L (TAF6L) and similar proteins. TAF6L, also called PCAF-associated factor 65-alpha (PAF65-alpha), is a component of the PCAF complex, which can efficiently acetylate histones in a nucleosomal context. The PCAF complex is composed of several TBP-associated factors (TAFs) and PCAF-associated factors (PAFs). It might be the human version of the yeast SAGA complex. With TAF5L, TAF6L acts as an epigenetic regulator essential for somatic reprogramming. It also regulates target genes through H3K9ac deposition and MYC recruitment, which trigger the MYC regulatory network to orchestrate gene expression programs to control embryonic stem cell state."
definition: >-
  histone-fold domain found in TAF6-like RNA polymerase II p300/CBP-associated factor-associated factor 65 kDa subunit 6L (TAF6L) and similar proteins. TAF6L, also called PCAF-associated factor 65-alpha (PAF65-alpha), is a component of the PCAF complex, which can efficiently acetylate histones in a nucleosomal context. The PCAF complex is composed of several TBP-associated factors (TAFs) and PCAF-associated factors (PAFs). It might be the human version of the yeast SAGA complex. With TAF5L, TAF6L acts as an epigenetic regulator essential for somatic reprogramming. It also regulates target genes through H3K9ac deposition and MYC recruitment, which trigger the MYC regulatory network to orchestrate gene expression programs to control embryonic stem cell state. — an NCBI CDD conserved domain (cd22932); members share this curated model.
