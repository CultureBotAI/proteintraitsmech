identifier: CDD:cd09752
label: "CRISPR/Cas system-associated RAMP superfamily protein Cas5. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Cas5 is a RAMP superfamily protein; Subunit of the Cascade complex; in subtype I-C this protein might be the endoribonuclease that generates crRNAs; also known as DevS family"
definition: >-
  CRISPR/Cas system-associated RAMP superfamily protein Cas5. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Cas5 is a RAMP superfamily protein; Subunit of the Cascade complex; in subtype I-C this protein might be the endoribonuclease that generates crRNAs; also known as DevS family — an NCBI CDD conserved domain (cd09752); members share this curated model.
