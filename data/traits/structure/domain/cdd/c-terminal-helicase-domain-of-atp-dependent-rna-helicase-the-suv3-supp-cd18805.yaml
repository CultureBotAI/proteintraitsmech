identifier: CDD:cd18805
label: "C-terminal helicase domain of ATP-dependent RNA helicase. The SUV3 (suppressor of Var 3) gene encodes a DNA and RNA helicase, which is localized in mitochondria and is a subunit of the degradosome complex involved in regulation of RNA surveillance and turnover. SUV3 exhibits DNA and RNA-dependent ATPase, DNA and RNA-binding and DNA and RNA unwinding activities. SUV3 is a DEAD-like helicase belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC."
definition: >-
  C-terminal helicase domain of ATP-dependent RNA helicase. The SUV3 (suppressor of Var 3) gene encodes a DNA and RNA helicase, which is localized in mitochondria and is a subunit of the degradosome complex involved in regulation of RNA surveillance and turnover. SUV3 exhibits DNA and RNA-dependent ATPase, DNA and RNA-binding and DNA and RNA unwinding activities. SUV3 is a DEAD-like helicase belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC. — an NCBI CDD conserved domain (cd18805); members share this curated model.
