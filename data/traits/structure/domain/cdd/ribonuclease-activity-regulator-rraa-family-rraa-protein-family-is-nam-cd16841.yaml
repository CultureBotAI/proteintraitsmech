identifier: CDD:cd16841
label: "ribonuclease activity regulator RraA family. RraA protein family is named after the regulator of ribonuclease activity A (RraA), a protein that  binds to RNase E and inhibits RNase E endonucleolytic cleavages. Members also include proteins with other functions, like a 4-hydroxy-4-methyl-2-oxoglutarate/4-carboxy-4-hydroxy-2-oxoadipate (HMG/CHA) aldolase from Pseudomonas putida, which catalyzes the last step of the bacterial protocatechuate 4,5-cleavage pathway and the uncharacterized YER010Cp protein from yeast, an organism lacking RNAse E."
definition: >-
  ribonuclease activity regulator RraA family. RraA protein family is named after the regulator of ribonuclease activity A (RraA), a protein that binds to RNase E and inhibits RNase E endonucleolytic cleavages. Members also include proteins with other functions, like a 4-hydroxy-4-methyl-2-oxoglutarate/4-carboxy-4-hydroxy-2-oxoadipate (HMG/CHA) aldolase from Pseudomonas putida, which catalyzes the last step of the bacterial protocatechuate 4,5-cleavage pathway and the uncharacterized YER010Cp protein from yeast, an organism lacking RNAse E. — an NCBI CDD conserved domain (cd16841); members share this curated model.
