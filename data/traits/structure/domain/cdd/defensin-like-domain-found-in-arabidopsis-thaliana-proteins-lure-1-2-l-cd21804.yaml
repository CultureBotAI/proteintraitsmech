identifier: CDD:cd21804
label: "defensin-like domain found in Arabidopsis thaliana proteins LURE 1.2, LURE 1.6, and similar proteins. This subfamily includes Arabidopsis thaliana (At) LURE1.2 (also called cysteine-rich peptide 810_1.2, CRP810_1.2, or defensin-like protein 213) and AtLURE1.6 (also called cysteine-rich peptide 810_1.6, CRP810_1.6, or defensin-like protein 215). They are pollen tube attractants guiding pollen tubes to the ovular micropyle. AtLURE1.2 attracts specifically pollen tubes from A. thaliana, but not those from A. lyrata. It triggers endocytosis of MDIS1 in the pollen tube tip. This model corresponds to the defensin-like (DEFL) domains of AtLURE1.2 and AtLURE1.6, which adopts a typical structure characterized by cysteine-stabilized alpha/beta scaffold."
definition: >-
  defensin-like domain found in Arabidopsis thaliana proteins LURE 1.2, LURE 1.6, and similar proteins. This subfamily includes Arabidopsis thaliana (At) LURE1.2 (also called cysteine-rich peptide 810_1.2, CRP810_1.2, or defensin-like protein 213) and AtLURE1.6 (also called cysteine-rich peptide 810_1.6, CRP810_1.6, or defensin-like protein 215). They are pollen tube attractants guiding pollen tubes to the ovular micropyle. AtLURE1.2 attracts specifically pollen tubes from A. thaliana, but not those from A. lyrata. It triggers endocytosis of MDIS1 in the pollen tube tip. This model corresponds to the defensin-like (DEFL) domains of AtLURE1.2 and AtLURE1.6, which adopts a typical structure characterized by cysteine-stabilized alpha/beta scaffold. — an NCBI CDD conserved domain (cd21804); members share this curated model.
