identifier: CDD:cd21764
label: "central domain found in usher syndrome type-1G protein, ankyrin repeat and SAM domain-containing protein 4B, and similar proteins. The family includes usher syndrome type-1G protein (USH1G), ankyrin repeat and SAM domain-containing protein 4B (ANKS4B), and similar proteins. USH1G, also called scaffold protein containing ankyrin repeats and SAM domain (Sans), is an anchoring/scaffolding protein that is a part of the functional network formed by USH1C, USH1G, CDH23 and MYO7A, that mediates mechanotransduction in cochlear hair cells. It is required for normal development and maintenance of cochlear hair cell bundles, as well as for normal hearing. ANKS4B, also called Harmonin-interacting ankyrin repeat-containing protein (Harp), is highly expressed in intestine and is essential for intermicrovillar adhesion. As part of the intermicrovillar adhesion complex (IMAC), ANKS4B plays a role in epithelial brush border differentiation, controlling microvilli organization and length. It may be involved in cellular response to endoplasmic reticulum stress. Both USH1G and ANKS4B contain four N-terminal ANK repeats, a central region, and a sterile alpha motif (SAM) followed by a C-terminal type I PDZ binding motif (PBM). This model corresponds to the central region (CEN), which contains the conserved regions CEN1 and CEN2. CEN is directly responsible for USH1G binding to the MYO7A MyTH4-FERM tandem, as well as for ANKS4B binding to the N-terminal MyTH4-FERM-SH3 supramodule of MYO7B."
definition: >-
  central domain found in usher syndrome type-1G protein, ankyrin repeat and SAM domain-containing protein 4B, and similar proteins. The family includes usher syndrome type-1G protein (USH1G), ankyrin repeat and SAM domain-containing protein 4B (ANKS4B), and similar proteins. USH1G, also called scaffold protein containing ankyrin repeats and SAM domain (Sans), is an anchoring/scaffolding protein that is a part of the functional network formed by USH1C, USH1G, CDH23 and MYO7A, that mediates mechanotransduction in cochlear hair cells. It is required for normal development and maintenance of cochlear hair cell bundles, as well as for normal hearing. ANKS4B, also called Harmonin-interacting ankyrin repeat-containing protein (Harp), is highly expressed in intestine and is essential for intermicrovillar adhesion. As part of the intermicrovillar adhesion complex (IMAC), ANKS4B plays a role in epithelial brush border differentiation, controlling microvilli organization and length. It may be involved in cellular response to endoplasmic reticulum stress. Both USH1G and ANKS4B contain four N-terminal ANK repeats, a central region, and a sterile alpha motif (SAM) followed by a C-terminal type I PDZ binding motif (PBM). This model corresponds to the central region (CEN), which contains the conserved regions CEN1 and CEN2. CEN is directly responsible for USH1G binding to the MYO7A MyTH4-FERM tandem, as well as for ANKS4B binding to the N-terminal MyTH4-FERM-SH3 supramodule of MYO7B. — an NCBI CDD conserved domain (cd21764); members share this curated model.
