identifier: CDD:cd12359
label: "RNA recognition motif 2 (RRM2) found in the VICKZ family proteins. This subfamily corresponds to the RRM2 of IGF-II mRNA-binding proteins (IGF2BPs or IMPs) in the VICKZ family that have been implicated in the post-transcriptional regulation of several different RNAs and in subcytoplasmic localization of mRNAs during embryogenesis. IGF2BPs are composed of two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and four hnRNP K homology (KH) domains."
definition: >-
  RNA recognition motif 2 (RRM2) found in the VICKZ family proteins. This subfamily corresponds to the RRM2 of IGF-II mRNA-binding proteins (IGF2BPs or IMPs) in the VICKZ family that have been implicated in the post-transcriptional regulation of several different RNAs and in subcytoplasmic localization of mRNAs during embryogenesis. IGF2BPs are composed of two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and four hnRNP K homology (KH) domains. — an NCBI CDD conserved domain (cd12359); members share this curated model.
