identifier: CDD:cd23616
label: "extracellular domain (ECD) found in anti-Muellerian hormone type-2 receptor (AMHR2) and similar proteins. AMHR2 (EC 2.7.11.30, also called anti-Muellerian hormone type II receptor (MISRII), or AMH type II receptor, or MIS type II receptor, or MRII, on ligand binding) forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. AMHR2 is the receptor for anti-Muellerian hormone. This model corresponds to the extracellular domain (ECD) of AMHR2, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in anti-Muellerian hormone type-2 receptor (AMHR2) and similar proteins. AMHR2 (EC 2.7.11.30, also called anti-Muellerian hormone type II receptor (MISRII), or AMH type II receptor, or MIS type II receptor, or MRII, on ligand binding) forms a receptor complex consisting of two type II and two type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators. AMHR2 is the receptor for anti-Muellerian hormone. This model corresponds to the extracellular domain (ECD) of AMHR2, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23616); members share this curated model.
