identifier: CDD:cd01173
label: "Pyridoxal kinase plays a key role in the synthesis of the active coenzyme pyridoxal-5'-phosphate  (PLP), by catalyzing the phosphorylation of the precursor vitamin B6  in the presence of Zn2+ and ATP. Mammals are unable to synthesize PLP de novo and require its precursors in the form of vitamin B6 (pyridoxal, pyridoxine, and pyridoxamine) from their diet. Pyridoxal kinase encoding genes are also found in many other species including yeast and bacteria."
definition: >-
  Pyridoxal kinase plays a key role in the synthesis of the active coenzyme pyridoxal-5'-phosphate (PLP), by catalyzing the phosphorylation of the precursor vitamin B6 in the presence of Zn2+ and ATP. Mammals are unable to synthesize PLP de novo and require its precursors in the form of vitamin B6 (pyridoxal, pyridoxine, and pyridoxamine) from their diet. Pyridoxal kinase encoding genes are also found in many other species including yeast and bacteria. — an NCBI CDD conserved domain (cd01173); members share this curated model.
