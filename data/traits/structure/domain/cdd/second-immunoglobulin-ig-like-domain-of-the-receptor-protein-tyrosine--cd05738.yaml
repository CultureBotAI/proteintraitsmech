identifier: CDD:cd05738
label: "Second immunoglobulin (Ig)-like domain of  the receptor protein tyrosine phosphatase (RPTP)-F; member of the I-set of IgSF domains. The members here are composed of the second immunoglobulin (Ig)-like domain found in the receptor protein tyrosine phosphatase (RPTP)-F, also known as LAR. LAR belongs to the RPTP type IIa subfamily. Members of this subfamily are cell adhesion molecule-like proteins involved in central nervous system (CNS) development. They have large extracellular portions comprised of multiple Ig-like domains and two to nine fibronectin type III (FNIII) domains and a cytoplasmic portion having two tandem phosphatase domains."
definition: >-
  Second immunoglobulin (Ig)-like domain of the receptor protein tyrosine phosphatase (RPTP)-F; member of the I-set of IgSF domains. The members here are composed of the second immunoglobulin (Ig)-like domain found in the receptor protein tyrosine phosphatase (RPTP)-F, also known as LAR. LAR belongs to the RPTP type IIa subfamily. Members of this subfamily are cell adhesion molecule-like proteins involved in central nervous system (CNS) development. They have large extracellular portions comprised of multiple Ig-like domains and two to nine fibronectin type III (FNIII) domains and a cytoplasmic portion having two tandem phosphatase domains. — an NCBI CDD conserved domain (cd05738); members share this curated model.
