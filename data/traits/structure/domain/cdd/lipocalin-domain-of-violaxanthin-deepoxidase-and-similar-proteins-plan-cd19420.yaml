identifier: CDD:cd19420
label: "lipocalin domain of violaxanthin deepoxidase and similar proteins. Plant violaxanthin de-epoxidase (VDE, EC 1.23.5.1) participates in the xanthophyll cycle for controlling the concentration of zeaxanthin in chloroplasts. It catalyzes the conversion of violaxanthin to antheraxanthin and zeaxanthin in strong light, and plays a central role in adjusting photosynthetic activity to changing light conditions. In addition, maize VDE has been shown to interact with sugarcane mosaic virus helper component-proteinase, HC-(SCMV), and to attenuate the RNA silencing suppression activity of the latter. VDE belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
