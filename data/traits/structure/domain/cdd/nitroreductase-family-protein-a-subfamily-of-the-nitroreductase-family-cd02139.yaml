identifier: CDD:cd02139
label: "nitroreductase family protein. A subfamily of the nitroreductase family containing uncharacterized proteins. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor.  The enzyme is typically a homodimer."
definition: >-
  nitroreductase family protein. A subfamily of the nitroreductase family containing uncharacterized proteins. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor. The enzyme is typically a homodimer. — an NCBI CDD conserved domain (cd02139); members share this curated model.
