identifier: CDD:cd08138
label: "ATP-grasp domain of acetyl-CoA synthetase and pimeloyl-CoA synthetase. ATP-grasp domain of acetyl-CoA synthetase and pimeloyl-CoA synthetase. Acetyl CoA synthetase (EC 62.1.1.13) converts acetyl-CoA to acetate with the production of ATP. It is widely distributed in prokaryotes. Members of this family are homologous to Suc CoA synthetase and ATP citrate lyase and have the signature ATP-grasp domain. Histone acetylation in single cell eukaryotes relies on acetyl-CoA synthetase. Members of pimeloyl-CoA synthetase (PCS) are also found in this family. pimeloyl-CoA synthetase (PCS) catalyzes the formation of Pimeloyl-CoA from pimelic acid and CoA with concomitant hydrolysis of ATP to ADP. PCS members included in this subfamily are homologous to ACS and appear to have the signature ATP-grasp domain."
definition: >-
  ATP-grasp domain of acetyl-CoA synthetase and pimeloyl-CoA synthetase. ATP-grasp domain of acetyl-CoA synthetase and pimeloyl-CoA synthetase. Acetyl CoA synthetase (EC 62.1.1.13) converts acetyl-CoA to acetate with the production of ATP. It is widely distributed in prokaryotes. Members of this family are homologous to Suc CoA synthetase and ATP citrate lyase and have the signature ATP-grasp domain. Histone acetylation in single cell eukaryotes relies on acetyl-CoA synthetase. Members of pimeloyl-CoA synthetase (PCS) are also found in this family. pimeloyl-CoA synthetase (PCS) catalyzes the formation of Pimeloyl-CoA from pimelic acid and CoA with concomitant hydrolysis of ATP to ADP. PCS members included in this subfamily are homologous to ACS and appear to have the signature ATP-grasp domain. — an NCBI CDD conserved domain (cd08138); members share this curated model.
