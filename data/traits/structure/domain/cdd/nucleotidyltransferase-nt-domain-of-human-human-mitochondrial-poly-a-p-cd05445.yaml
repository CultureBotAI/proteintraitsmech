identifier: CDD:cd05445
label: "Nucleotidyltransferase (NT) domain of human human mitochondrial poly (A) polymerase and related proteins. NT_hmtPAP_like: catalytic domain found in proteins similar to human (h) mitochondrial (mt) poly (A) polymerase (PAP). hmtPAP synthesizes short poly(A) tails at the 3' termini of mt mRNAs. Little is known about how these tails may function in translation and turnover of these mt mRNAs. Proteins in this group belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these hmtPAP_like NT domains."
definition: >-
