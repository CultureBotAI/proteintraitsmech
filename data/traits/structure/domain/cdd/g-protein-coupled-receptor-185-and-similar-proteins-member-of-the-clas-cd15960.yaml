identifier: CDD:cd15960
label: "G protein-coupled receptor 185 and similar proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR185, also called GPRx, is a member of the constitutively active GPR3/6/12 subfamily of G protein-coupled receptors. It plays a role in the maintenance of meiotic arrest in Xenopus laevis oocytes through G(s) protein, which leads to increased cAMP levels. In Xenopus laevis, GPR185 is primarily expressed in brain, ovary, and testis; however, its ortholog has not been identified in other vertebrate genomes. GPR3, GPR6, and GPR12 form a subfamily of constitutively active G-protein coupled receptors with dual coupling to G(s) and G(i) proteins. These three orphan receptors are involved in the regulation of cell proliferation and survival, neurite outgrowth, cell clustering, and maintenance of meiotic prophase arrest."
definition: >-
