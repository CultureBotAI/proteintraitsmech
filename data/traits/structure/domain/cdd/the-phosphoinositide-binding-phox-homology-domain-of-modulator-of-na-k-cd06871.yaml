identifier: CDD:cd06871
label: "The phosphoinositide binding Phox Homology domain of Modulator of Na,K-ATPase. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. MONaKA (Modulator of Na,K-ATPase) binds the plasma membrane ion transporter, Na,K-ATPase, and modulates its enzymatic and ion pump activities. It modulates brain Na,K-ATPase and may be involved in regulating electrical excitability and synaptic transmission. MONaKA contains an N-terminal PX domain and a C-terminal catalytic kinase domain. The PX domain interacts with PIs and plays a role in targeting proteins to PI-enriched membranes."
definition: >-
  The phosphoinositide binding Phox Homology domain of Modulator of Na,K-ATPase. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. MONaKA (Modulator of Na,K-ATPase) binds the plasma membrane ion transporter, Na,K-ATPase, and modulates its enzymatic and ion pump activities. It modulates brain Na,K-ATPase and may be involved in regulating electrical excitability and synaptic transmission. MONaKA contains an N-terminal PX domain and a C-terminal catalytic kinase domain. The PX domain interacts with PIs and plays a role in targeting proteins to PI-enriched membranes. — an NCBI CDD conserved domain (cd06871); members share this curated model.
