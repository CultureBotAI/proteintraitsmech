identifier: CDD:cd14314
label: "UBA domain found in a putative ubiquitin conjugating enzyme from plasmodium Yoelii (pyUCE) and similar proteins. P. Yoelii ubiquitin-conjugating enzyme and other uncharacterized family members show high sequence similarity to the human Huntingtin interacting protein-2 (HIP2) which belongs to a class II E2 ubiquitin-conjugating enzyme family. These proteins may play roles in the ubiquitin-mediated protein degradation pathway. They all contain a C-terminal ubiquitin-associated (UBA) domain in addition to an N-terminal catalytic ubiquitin-conjugating enzyme E2 (UBCc) domain."
definition: >-
  UBA domain found in a putative ubiquitin conjugating enzyme from plasmodium Yoelii (pyUCE) and similar proteins. P. Yoelii ubiquitin-conjugating enzyme and other uncharacterized family members show high sequence similarity to the human Huntingtin interacting protein-2 (HIP2) which belongs to a class II E2 ubiquitin-conjugating enzyme family. These proteins may play roles in the ubiquitin-mediated protein degradation pathway. They all contain a C-terminal ubiquitin-associated (UBA) domain in addition to an N-terminal catalytic ubiquitin-conjugating enzyme E2 (UBCc) domain. — an NCBI CDD conserved domain (cd14314); members share this curated model.
