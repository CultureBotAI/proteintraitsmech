identifier: CDD:cd12420
label: "RNA recognition motif (RRM) found in RNA-binding protein with multiple splicing (RBP-MS)-like proteins. This subfamily corresponds to the RRM of RNA-binding proteins with multiple splicing (RBP-MS)-like proteins, including protein products of RBPMS genes (RBP-MS and its paralogue RBP-MS2), the Drosophila couch potato (cpo), and Caenorhabditis elegans Mec-8 genes. RBP-MS may be involved in regulation of mRNA translation and localization during Xenopus laevis development. It has also been shown to physically interact with Smad2, Smad3 and Smad4, and stimulates Smad-mediated transactivation. Cpo may play an important role in regulating normal function of the nervous system, whereas mutations in Mec-8 affect mechanosensory and chemosensory neuronal function. All members contain a well conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). Some uncharacterized family members contain two RRMs; this subfamily includes their RRM1. Their RRM2 shows high sequence homology to the RRM of yeast proteins scw1, Whi3, and Whi4."
definition: >-
  RNA recognition motif (RRM) found in RNA-binding protein with multiple splicing (RBP-MS)-like proteins. This subfamily corresponds to the RRM of RNA-binding proteins with multiple splicing (RBP-MS)-like proteins, including protein products of RBPMS genes (RBP-MS and its paralogue RBP-MS2), the Drosophila couch potato (cpo), and Caenorhabditis elegans Mec-8 genes. RBP-MS may be involved in regulation of mRNA translation and localization during Xenopus laevis development. It has also been shown to physically interact with Smad2, Smad3 and Smad4, and stimulates Smad-mediated transactivation. Cpo may play an important role in regulating normal function of the nervous system, whereas mutations in Mec-8 affect mechanosensory and chemosensory neuronal function. All members contain a well conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). Some uncharacterized family members contain two RRMs; this subfamily includes their RRM1. Their RRM2 shows high sequence homology to the RRM of yeast proteins scw1, Whi3, and Whi4. — an NCBI CDD conserved domain (cd12420); members share this curated model.
