identifier: CDD:cd16597
label: "RING finger, HC subclass, found in tripartite motif-containing protein TRIM25 and similar proteins. TRIM25, also known as estrogen-responsive finger protein (EFP), RING finger protein 147 (RNF147), or RING-type E3 ubiquitin transferase, is an E3 ubiquitin/ISG15 ligase that is induced by estrogen and is therefore particularly abundant in placenta and uterus. TRIM25 regulates various cellular processes through E3 ubiquitin ligase activity, transferring ubiquitin and ISG15 to target proteins. It mediates K63-linked polyubiquitination of retinoic acid inducible gene I (RIG-I) that is crucial for downstream antiviral interferon signaling. It is also required for melanoma differentiation-associated gene 5 (MDA5) and mitochondrial antiviral signaling (MAVS, also known as IPS-1, VISA, Cardiff) mediated activation of nuclear factor-kappaB (NF-kappaB) and interferon production. Upon UV irradiation, TRIM25 interacts with mono-ubiquitinated PCNA and promotes its ISG15 modification (ISGylation), suggesting a crucial role in termination of error-prone translesion DNA synthesis. TRIM25 also functions as a novel regulator of p53 and Mdm2. It enhances p53 and Mdm2 abundance by inhibiting their ubiquitination and degradation in 26S proteasomes. Meanwhile, it inhibits p53's transcriptional activity and dampens the response to DNA damage, and is essential for medaka development and this dependence is rescued by silencing of p53. Moreover, TRIM25 is involved in the host cellular innate immune response against retroviral infection. It interferes with the late stage of feline leukemia virus (FeLV) replication. Furthermore, TRIM25 acts as an oncogene in gastric cancer. Its blockade by RNA interference inhibits migration and invasion of gastric cancer cells through transforming growth factor-beta (TGF-beta) signaling, suggesting it presents a novel target for the detection and treatment of gastric cancer. In addition, TRIM25 acts as an RNA-specific activator for Lin28a/TuT4-mediated uridylation. TRIM25 belongs to the C-IV subclass of TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
