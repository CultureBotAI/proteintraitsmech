identifier: CDD:cd18447
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 7 (KLHL7). KLHL7 is a BTB-Kelch protein that constitutes a Cul3-based E3 ubiquitin ligase complex and is involved in the ubiquitination of target proteins for proteasome-mediated degradation. Mutations in KLHL7 cause autosomal-dominant retinitis pigmentosa."
definition: >-
