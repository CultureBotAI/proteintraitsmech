identifier: CDD:cd00178
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold. The STI-like domain is found in the soybean trypsin inhibitor (Kunitz) family of protease inhibitors. They inhibit proteases by binding with high affinity to their active sites. Plant Kunitz-type inhibitors are thought to be important in defense, especially against insect pests. The STI-like domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold. The STI-like domain is found in the soybean trypsin inhibitor (Kunitz) family of protease inhibitors. They inhibit proteases by binding with high affinity to their active sites. Plant Kunitz-type inhibitors are thought to be important in defense, especially against insect pests. The STI-like domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd00178); members share this curated model.
