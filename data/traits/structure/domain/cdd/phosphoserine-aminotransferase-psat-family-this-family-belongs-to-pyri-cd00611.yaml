identifier: CDD:cd00611
label: "Phosphoserine aminotransferase (PSAT) family. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). The major group in this CD corresponds to phosphoserine aminotransferase (PSAT).  PSAT is active as a dimer and catalyzes the conversion of phosphohydroxypyruvate to phosphoserine."
definition: >-
  Phosphoserine aminotransferase (PSAT) family. This family belongs to pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily (fold I). The major group in this CD corresponds to phosphoserine aminotransferase (PSAT). PSAT is active as a dimer and catalyzes the conversion of phosphohydroxypyruvate to phosphoserine. — an NCBI CDD conserved domain (cd00611); members share this curated model.
