identifier: CDD:cd14379
label: "UBA1 domain of putative DNA repair proteins Rad23 found in plant. The radiation sensitive 23 (Rad23) subfamily consists of four isoforms of putative DNA repair proteins from Arabidopsis thaliana and similar proteins from other plants. The nuclear-enriched Rad23 proteins function in the cell cycle, morphology, and fertility of plants through their delivery of ubiquitin (Ub)/26S proteasome system (UPS) substrates to the 26S proteasome. Rad23 proteins contain an N-terminal ubiquitin-like (UBL) domain that associates with the 26S proteasome Ub receptor RPN10, and two C-terminal ubiquitin-associated (UBA) domains that bind Ub conjugates. This model corresponds to the UBA1 domain."
definition: >-
  UBA1 domain of putative DNA repair proteins Rad23 found in plant. The radiation sensitive 23 (Rad23) subfamily consists of four isoforms of putative DNA repair proteins from Arabidopsis thaliana and similar proteins from other plants. The nuclear-enriched Rad23 proteins function in the cell cycle, morphology, and fertility of plants through their delivery of ubiquitin (Ub)/26S proteasome system (UPS) substrates to the 26S proteasome. Rad23 proteins contain an N-terminal ubiquitin-like (UBL) domain that associates with the 26S proteasome Ub receptor RPN10, and two C-terminal ubiquitin-associated (UBA) domains that bind Ub conjugates. This model corresponds to the UBA1 domain. — an NCBI CDD conserved domain (cd14379); members share this curated model.
