identifier: CDD:cd03850
label: "Flavin reductase protein family. It belongs to a flavin reductase superfamily which is part of a two-component enzyem system. In Burkholderia cepacia, the gene tftC encodes a flavin reductase which catalyzes the reduction of FAD using NADH as cofactor. The reduced FAD then is used by chlorophenol-4-monooxygenase to hydroxylate 2,4,5-trichlorophenol to 5-chloro-2-hydroxy-1,4-benzoquinone."
definition: >-
  Flavin reductase protein family. It belongs to a flavin reductase superfamily which is part of a two-component enzyem system. In Burkholderia cepacia, the gene tftC encodes a flavin reductase which catalyzes the reduction of FAD using NADH as cofactor. The reduced FAD then is used by chlorophenol-4-monooxygenase to hydroxylate 2,4,5-trichlorophenol to 5-chloro-2-hydroxy-1,4-benzoquinone. — an NCBI CDD conserved domain (cd03850); members share this curated model.
