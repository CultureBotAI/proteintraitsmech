identifier: CDD:cd17181
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain, found in kindlin-2 (KIND2). KIND2, also termed fermitin family homolog 2 (FERMT2), or mitogen-inducible gene 2 protein (MIG-2), or Pleckstrin homology (PH) domain-containing family C member 1, is an adaptor protein that is widely distributed and is particularly abundant in adherent cells. It binds to the integrin beta cytoplasmic tail to promote integrin activation. It promotes carcinogenesis through regulation of cell-cell and cell-extracellular matrix adhesion. In additon, KIND2 plays an important role in cardiac development. KIND2 consists of an atypical FERM domain that is made up of F1, F2 and F3 domains, as well as an N-terminal region, which precedes the FERM domain and has been referred to as the F0 domain. This family corresponds to the F0 domain."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain, found in kindlin-2 (KIND2). KIND2, also termed fermitin family homolog 2 (FERMT2), or mitogen-inducible gene 2 protein (MIG-2), or Pleckstrin homology (PH) domain-containing family C member 1, is an adaptor protein that is widely distributed and is particularly abundant in adherent cells. It binds to the integrin beta cytoplasmic tail to promote integrin activation. It promotes carcinogenesis through regulation of cell-cell and cell-extracellular matrix adhesion. In additon, KIND2 plays an important role in cardiac development. KIND2 consists of an atypical FERM domain that is made up of F1, F2 and F3 domains, as well as an N-terminal region, which precedes the FERM domain and has been referred to as the F0 domain. This family corresponds to the F0 domain. — an NCBI CDD conserved domain (cd17181); members share this curated model.
