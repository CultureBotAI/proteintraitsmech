identifier: CDD:cd08997
label: "Glycosyl hydrolase family 68, includes levansucrase, beta-fructofuranosidase and inulosucrase. Glycosyl hydrolase family 68 (GH68) consists of frucosyltransferases (FTFs) that include levansucrase (EC 2.4.1.10), beta-fructofuranosidase (EC 3.2.1.26) and inulosucrase (EC 2.4.1.9), all of which use sucrose as their preferential donor substrate. Levansucrase, also known as beta-D-fructofuranosyl transferase, catalyzes the transfer of the sucrose fructosyl moiety to a growing levan chain. Similarly, inulosucrase catalyzes long inulin-type of fructans, and beta-fructofuranosidases create fructooligosaccharides (FOS). However, in the absence of high fructan/sucrose ratio, some GH68 enzymes can also use fructan as donor substrate. GH68 retaining enzymes (i.e. they retain the configuration at anomeric carbon atom of the substrate) catalyze hydrolysis in two steps involving a covalent glycosyl enzyme intermediate: an aspartate located close to the N-terminus acts as the catalytic nucleophile and a glutamate acts as the general acid/base; a conserved aspartate residue in the Arg-Asp-Pro (RDP) motif stabilizes the transition state. A common structural feature of all these enzymes is a 5-bladed beta-propeller domain, similar to GH43, that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. Biotechnological applications of these enzymes include use of inulin in inexpensive production of rich fructose syrups as well as use of FOS as health-promoting pre-biotics."
definition: >-
  Glycosyl hydrolase family 68, includes levansucrase, beta-fructofuranosidase and inulosucrase. Glycosyl hydrolase family 68 (GH68) consists of frucosyltransferases (FTFs) that include levansucrase (EC 2.4.1.10), beta-fructofuranosidase (EC 3.2.1.26) and inulosucrase (EC 2.4.1.9), all of which use sucrose as their preferential donor substrate. Levansucrase, also known as beta-D-fructofuranosyl transferase, catalyzes the transfer of the sucrose fructosyl moiety to a growing levan chain. Similarly, inulosucrase catalyzes long inulin-type of fructans, and beta-fructofuranosidases create fructooligosaccharides (FOS). However, in the absence of high fructan/sucrose ratio, some GH68 enzymes can also use fructan as donor substrate. GH68 retaining enzymes (i.e. they retain the configuration at anomeric carbon atom of the substrate) catalyze hydrolysis in two steps involving a covalent glycosyl enzyme intermediate: an aspartate located close to the N-terminus acts as the catalytic nucleophile and a glutamate acts as the general acid/base; a conserved aspartate residue in the Arg-Asp-Pro (RDP) motif stabilizes the transition state. A common structural feature of all these enzymes is a 5-bladed beta-propeller domain, similar to GH43, that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. Biotechnological applications of these enzymes include use of inulin in inexpensive production of rich fructose syrups as well as use of FOS as health-promoting pre-biotics. — an NCBI CDD conserved domain (cd08997); members share this curated model.
