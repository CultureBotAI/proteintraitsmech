identifier: CDD:cd22466
label: "type I K homology (KH) RNA-binding domain found in Drosophila protein held out wings (how) and similar proteins. How, also called KH domain protein KH93F, or protein muscle-specific, or protein Struthio, or protein wings held out (who), or Quaking-related 93F (qkr93F), is an RNA-binding protein involved in the control of muscular and cardiac activity. It is required for integrin-mediated cell-adhesion in wing blade. It plays essential roles during embryogenesis, in late stages of somatic muscle development, for myotube migration and during metamorphosis for muscle reorganization."
definition: >-
  type I K homology (KH) RNA-binding domain found in Drosophila protein held out wings (how) and similar proteins. How, also called KH domain protein KH93F, or protein muscle-specific, or protein Struthio, or protein wings held out (who), or Quaking-related 93F (qkr93F), is an RNA-binding protein involved in the control of muscular and cardiac activity. It is required for integrin-mediated cell-adhesion in wing blade. It plays essential roles during embryogenesis, in late stages of somatic muscle development, for myotube migration and during metamorphosis for muscle reorganization. — an NCBI CDD conserved domain (cd22466); members share this curated model.
