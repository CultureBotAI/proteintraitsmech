identifier: CDD:cd18443
label: "BRCT domain of DNA nucleotidylexotransferase (DNTT) and similar proteins. DNTT (EC 2.7.7.31), also termed terminal addition enzyme, or terminal deoxynucleotidyltransferase, or terminal transferase, is a template-independent DNA polymerase which catalyzes the random addition of deoxynucleoside 5'-triphosphate to the 3'-end of a DNA initiator. It is the addition of nucleotides at the junction (N region) of rearranged Ig heavy chain and T-cell receptor gene segments during the maturation of B- and T-cells. DNA nucleotidylexotransferase contains a BRCT domain."
definition: >-
  BRCT domain of DNA nucleotidylexotransferase (DNTT) and similar proteins. DNTT (EC 2.7.7.31), also termed terminal addition enzyme, or terminal deoxynucleotidyltransferase, or terminal transferase, is a template-independent DNA polymerase which catalyzes the random addition of deoxynucleoside 5'-triphosphate to the 3'-end of a DNA initiator. It is the addition of nucleotides at the junction (N region) of rearranged Ig heavy chain and T-cell receptor gene segments during the maturation of B- and T-cells. DNA nucleotidylexotransferase contains a BRCT domain. — an NCBI CDD conserved domain (cd18443); members share this curated model.
