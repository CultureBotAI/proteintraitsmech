identifier: CDD:cd08761
label: "Eukaryotic cytochrome b(561), including the CYB561D2 gene product. Cytochrome b(561), as found in eukaryotes, similar to and including the human CYB561D2 gene product. CYB561D2 is a candidate tumor suppressor. The protein might act as a ferric-chelate reductase, catalyzing the reduction of Fe(3+) to Fe(2+), such as associated with the transport of iron from the endosome to the cytoplasm. It is assumed that this protein uses ascorbate as the electron donor. Belongs to the cytochrome b(561) family, which are secretory vesicle-specific electron transport proteins. Cytochromes b(561) are integral membrane proteins that bind two heme groups non-covalently, and may have six alpha-helical trans-membrane segments."
definition: >-
  Eukaryotic cytochrome b(561), including the CYB561D2 gene product. Cytochrome b(561), as found in eukaryotes, similar to and including the human CYB561D2 gene product. CYB561D2 is a candidate tumor suppressor. The protein might act as a ferric-chelate reductase, catalyzing the reduction of Fe(3+) to Fe(2+), such as associated with the transport of iron from the endosome to the cytoplasm. It is assumed that this protein uses ascorbate as the electron donor. Belongs to the cytochrome b(561) family, which are secretory vesicle-specific electron transport proteins. Cytochromes b(561) are integral membrane proteins that bind two heme groups non-covalently, and may have six alpha-helical trans-membrane segments. — an NCBI CDD conserved domain (cd08761); members share this curated model.
