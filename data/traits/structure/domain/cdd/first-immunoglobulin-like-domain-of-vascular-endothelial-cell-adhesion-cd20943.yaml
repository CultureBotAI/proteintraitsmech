identifier: CDD:cd20943
label: "First immunoglobulin-like domain of vascular endothelial cell adhesion molecule-1 (VCAM-1), and similar domains; member of the I-set of IgSF domains. The members here include the first immunoglobulin-like domain of vascular endothelial cell adhesion molecule-1 (VCAM-1; also known as Cluster of Differentiation 106 (CD106)) and similar proteins. During the inflammation process, these molecules recruit leukocytes onto the vascular endothelium before extravasation to the injured tissues. The interaction of VCAM-1 binding to the beta1 integrin very late antigen (VLA-4) expressed by lymphocytes and monocytes mediates the adhesion of leucocytes to blood vessel walls, and regulates migration across the endothelium. During metastasis, some circulating cancer cells extravasate to a secondary site by a similar process. VCAM-1 may be involved in organ targeted tumor metastasis and may also act as host receptors for viruses and parasites. VCAM-1 contains seven Ig domains. The Ig superfamily (IgSF) is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. The two sheets are linked together by a conserved disulfide bond between B strand and F strand. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The first Ig-like domain of VCAM-1 is a member of the I-set IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, the A strand of the I-set is discontinuous, but lacks a C\" strand."
definition: >-
  First immunoglobulin-like domain of vascular endothelial cell adhesion molecule-1 (VCAM-1), and similar domains; member of the I-set of IgSF domains. The members here include the first immunoglobulin-like domain of vascular endothelial cell adhesion molecule-1 (VCAM-1; also known as Cluster of Differentiation 106 (CD106)) and similar proteins. During the inflammation process, these molecules recruit leukocytes onto the vascular endothelium before extravasation to the injured tissues. The interaction of VCAM-1 binding to the beta1 integrin very late antigen (VLA-4) expressed by lymphocytes and monocytes mediates the adhesion of leucocytes to blood vessel walls, and regulates migration across the endothelium. During metastasis, some circulating cancer cells extravasate to a secondary site by a similar process. VCAM-1 may be involved in organ targeted tumor metastasis and may also act as host receptors for viruses and parasites. VCAM-1 contains seven Ig domains. The Ig superfamily (IgSF) is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. The two sheets are linked together by a conserved disulfide bond between B strand and F strand. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The first Ig-like domain of VCAM-1 is a member of the I-set IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, the A strand of the I-set is discontinuous, but lacks a C" strand. — an NCBI CDD conserved domain (cd20943); members share this curated model.
