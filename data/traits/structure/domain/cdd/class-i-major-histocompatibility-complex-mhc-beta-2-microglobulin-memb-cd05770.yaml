identifier: CDD:cd05770
label: "Class I major histocompatibility complex (MHC) beta-2-microglobulin; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the immunoglobulin-like domain in beta-2-microglobulin (beta2m). Beta2m is the non-covalently bound light chain of the human class I major histocompatibility complex (MHC-I). Beta2m is structured as a beta-sandwich domain composed of two facing beta-sheets (four stranded and three stranded), that is typical of the C-type immunoglobulin superfamily. This structure is stabilized by an intramolecular disulfide bridge connecting two Cys residues in the facing beta-sheets. In vivo, MHC-I continuously exposes beta2m on the cell surface, where it may be released to plasmatic fluids, transported to the kidneys, degraded, and finally excreted."
definition: >-
  Class I major histocompatibility complex (MHC) beta-2-microglobulin; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the immunoglobulin-like domain in beta-2-microglobulin (beta2m). Beta2m is the non-covalently bound light chain of the human class I major histocompatibility complex (MHC-I). Beta2m is structured as a beta-sandwich domain composed of two facing beta-sheets (four stranded and three stranded), that is typical of the C-type immunoglobulin superfamily. This structure is stabilized by an intramolecular disulfide bridge connecting two Cys residues in the facing beta-sheets. In vivo, MHC-I continuously exposes beta2m on the cell surface, where it may be released to plasmatic fluids, transported to the kidneys, degraded, and finally excreted. — an NCBI CDD conserved domain (cd05770); members share this curated model.
