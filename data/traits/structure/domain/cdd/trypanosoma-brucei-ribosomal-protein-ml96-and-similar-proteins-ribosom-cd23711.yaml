label: "Trypanosoma brucei ribosomal protein mL96, and similar proteins. Ribosomal protein mL96 is a component of mitoribosomal large subunit (mtLSU) central protuberance (CP) in Trypanosoma brucei mitochondrial ribosome (mitoribosome), which is composed of 127 mitoribosomal proteins and contains very small rRNAs. The family also includes Leishmania major ribosomal protein mL96."
definition: >-
  Trypanosoma brucei ribosomal protein mL96, and similar proteins. Ribosomal protein mL96 is a component of mitoribosomal large subunit (mtLSU) central protuberance (CP) in Trypanosoma brucei mitochondrial ribosome (mitoribosome), which is composed of 127 mitoribosomal proteins and contains very small rRNAs. The family also includes Leishmania major ribosomal protein mL96. — an NCBI CDD conserved domain (cd23711); members share this curated model.
