identifier: CDD:cd13742
label: "PRY/SPRY domain in tripartite motif-binding protein 72 (TRIM72). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM72. Muscle-specific TRIM72 (also known as Mitsugumin 53 or MG53) has been shown to perform a critical function in membrane repair following acute muscle injury by nucleating the assembly of the repair machinery at injury sites. It is expressed specifically in skeletal muscle and heart, and tethered to the plasma membrane and cytoplasmic vesicles via its interaction with phosphatidylserine. TRIM72 interacts with dysferlin, a sarcolemmal protein whose deficiency causes Miyoshi myopathy (MM) and limb girdle muscular dystrophy type 2B (LGMD2B); this coordination plays an important role in the repair of sarcolemma damage."
