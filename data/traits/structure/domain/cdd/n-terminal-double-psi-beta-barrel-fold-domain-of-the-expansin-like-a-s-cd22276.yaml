identifier: CDD:cd22276
label: "N-terminal double-psi beta-barrel fold domain of the expansin-like A subfamily. Expansin-like A (EXLA) belongs to the plant expansin family that also includes alpha-expansin (EXPA), beta-expansin (EXPB), and expansin-like B (EXLB). Unlike EXPA and EXPB, EXLA proteins have not been shown to display cell wall loosening activity. EXLA2 is one of the three EXLA members in Arabidopsis. It lacks expansin activity, but contains a presumed cellulose-interacting domain. EXLA2 may function as a positive regulator of cell elongation in the dark-grown hypocotyl of Arabidopsis, possibly by interference with cellulose metabolism, deposition, or its organization. EXLA belongs to the expansin family of proteins that contain an N-terminal domain (D1) homologous to the catalytic domain of glycoside hydrolase family 45 (GH45) proteins but with no hydrolytic activity, and a C-terminal domain (D2) homologous to group-2 grass pollen allergens. This model represents the N-terminal domain of EXLA proteins, which adopts a double-psi beta-barrel (DPBB) fold."
definition: >-
  N-terminal double-psi beta-barrel fold domain of the expansin-like A subfamily. Expansin-like A (EXLA) belongs to the plant expansin family that also includes alpha-expansin (EXPA), beta-expansin (EXPB), and expansin-like B (EXLB). Unlike EXPA and EXPB, EXLA proteins have not been shown to display cell wall loosening activity. EXLA2 is one of the three EXLA members in Arabidopsis. It lacks expansin activity, but contains a presumed cellulose-interacting domain. EXLA2 may function as a positive regulator of cell elongation in the dark-grown hypocotyl of Arabidopsis, possibly by interference with cellulose metabolism, deposition, or its organization. EXLA belongs to the expansin family of proteins that contain an N-terminal domain (D1) homologous to the catalytic domain of glycoside hydrolase family 45 (GH45) proteins but with no hydrolytic activity, and a C-terminal domain (D2) homologous to group-2 grass pollen allergens. This model represents the N-terminal domain of EXLA proteins, which adopts a double-psi beta-barrel (DPBB) fold. — an NCBI CDD conserved domain (cd22276); members share this curated model.
