identifier: CDD:cd21175
label: "lytic polysaccharide monooxygenase (LPMO) auxiliary activity family 9 (AA9). AA9 proteins are copper-dependent lytic polysaccharide monooxygenases (LPMOs) involved in the cleavage of cellulose chains with oxidation of carbons C1 and/or C4 and C6. Activities include lytic cellulose monooxygenase (C1-hydroxylating) (EC 1.14.99.54) and lytic cellulose monooxygenase (C4-dehydrogenating) (EC 1.14.99.56). The family used to be called GH61 because weak endoglucanase activity had been demonstrated in some family members."
definition: >-
  lytic polysaccharide monooxygenase (LPMO) auxiliary activity family 9 (AA9). AA9 proteins are copper-dependent lytic polysaccharide monooxygenases (LPMOs) involved in the cleavage of cellulose chains with oxidation of carbons C1 and/or C4 and C6. Activities include lytic cellulose monooxygenase (C1-hydroxylating) (EC 1.14.99.54) and lytic cellulose monooxygenase (C4-dehydrogenating) (EC 1.14.99.56). The family used to be called GH61 because weak endoglucanase activity had been demonstrated in some family members. — an NCBI CDD conserved domain (cd21175); members share this curated model.
