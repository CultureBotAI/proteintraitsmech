identifier: CDD:cd00285
label: "O_Methyltransferase. O-methyltransferases: Enzymes that use S-adenosyl -L-methionone (SAM) to methylate oxygen in a diverse set of small-molecule substrates. The products serve regulatory, structural, and functional purposes.  This process is best characterized in the secondary metabolic pathway of phenylpropanoid biosynthesis in plants; however, not all sequences in this CD are from plants."
definition: >-
  O_Methyltransferase. O-methyltransferases: Enzymes that use S-adenosyl -L-methionone (SAM) to methylate oxygen in a diverse set of small-molecule substrates. The products serve regulatory, structural, and functional purposes. This process is best characterized in the secondary metabolic pathway of phenylpropanoid biosynthesis in plants; however, not all sequences in this CD are from plants. — an NCBI CDD conserved domain (cd00285); members share this curated model.
