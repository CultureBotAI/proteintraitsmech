identifier: CDD:cd05424
label: "Nucleotidyltransferase (NT) domain of  Escherichia coli uridylyl transferase (GlnD), and related proteins. NT_GlnD: catalytic nucleotidyltransferase (NT) domains found in proteins similar to Escherichia coli (Ec) Corynebacterium glutamicum (Cg), and Mt uridylyl transferases (GlnD). The assimilation of nitrogen and its regulation has been well studied in E. coli. One route by which E.coli assimilates its preferred nitrogen source (NH4+) is through the GS/Glutamate synthase (GOGAT) pathway: GS first catalyzes the synthesis of glutamine from ammonia and glutamate, GOGAT then catalyzes the transfer of the amide-amino group of glutamine to 2-oxoglutarate. The GS/GOGAT pathway operates under nitrogen limitation. GS can be regulated through reversible nucleotidylation by GlnE. In enterobacteria, when nitrogen is limiting, GlnD uridylylates PII to PII_UTP (in nitrogen sufficiency it removes the modifying groups). PII-UMP promotes GlnE deadenylation activity (whereas PII promotes GlnE adenylation activity). The E.coli glnD uridylyl transferase gene is constitutively expressed, the expression of the Gram-positive Cg and Mt glnD genes is upregulated upon nitrogen limitation. GlnD proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these GlnD NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of Escherichia coli uridylyl transferase (GlnD), and related proteins. NT_GlnD: catalytic nucleotidyltransferase (NT) domains found in proteins similar to Escherichia coli (Ec) Corynebacterium glutamicum (Cg), and Mt uridylyl transferases (GlnD). The assimilation of nitrogen and its regulation has been well studied in E. coli. One route by which E.coli assimilates its preferred nitrogen source (NH4+) is through the GS/Glutamate synthase (GOGAT) pathway: GS first catalyzes the synthesis of glutamine from ammonia and glutamate, GOGAT then catalyzes the transfer of the amide-amino group of glutamine to 2-oxoglutarate. The GS/GOGAT pathway operates under nitrogen limitation. GS can be regulated through reversible nucleotidylation by GlnE. In enterobacteria, when nitrogen is limiting, GlnD uridylylates PII to PII_UTP (in nitrogen sufficiency it removes the modifying groups). PII-UMP promotes GlnE deadenylation activity (whereas PII promotes GlnE adenylation activity). The E.coli glnD uridylyl transferase gene is constitutively expressed, the expression of the Gram-positive Cg and Mt glnD genes is upregulated upon nitrogen limitation. GlnD proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these GlnD NT domains. — an NCBI CDD conserved domain (cd05424); members share this curated model.
