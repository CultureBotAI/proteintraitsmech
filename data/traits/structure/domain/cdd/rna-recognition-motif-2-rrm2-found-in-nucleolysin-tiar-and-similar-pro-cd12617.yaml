identifier: CDD:cd12617
label: "RNA recognition motif 2 (RRM2) found in nucleolysin TIAR and similar proteins. This subgroup corresponds to the RRM2 of nucleolysin TIAR, also termed TIA-1-related protein, a cytotoxic granule-associated RNA-binding protein that shows high sequence similarity with 40-kDa isoform of T-cell-restricted intracellular antigen-1 (p40-TIA-1). TIAR is mainly localized in the nucleus of hematopoietic and nonhematopoietic cells. It is translocated from the nucleus to the cytoplasm in response to exogenous triggers of apoptosis. TIAR possesses nucleolytic activity against cytolytic lymphocyte (CTL) target cells. It can trigger DNA fragmentation in permeabilized thymocytes, and thus may function as an effector responsible for inducing apoptosis. TIAR is composed of three N-terminal, highly homologous RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a glutamine-rich C-terminal auxiliary domain containing a lysosome-targeting motif. It interacts with RNAs containing short stretches of uridylates and its RRM2 can mediate the specific binding to uridylate-rich RNAs."
definition: >-
  RNA recognition motif 2 (RRM2) found in nucleolysin TIAR and similar proteins. This subgroup corresponds to the RRM2 of nucleolysin TIAR, also termed TIA-1-related protein, a cytotoxic granule-associated RNA-binding protein that shows high sequence similarity with 40-kDa isoform of T-cell-restricted intracellular antigen-1 (p40-TIA-1). TIAR is mainly localized in the nucleus of hematopoietic and nonhematopoietic cells. It is translocated from the nucleus to the cytoplasm in response to exogenous triggers of apoptosis. TIAR possesses nucleolytic activity against cytolytic lymphocyte (CTL) target cells. It can trigger DNA fragmentation in permeabilized thymocytes, and thus may function as an effector responsible for inducing apoptosis. TIAR is composed of three N-terminal, highly homologous RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a glutamine-rich C-terminal auxiliary domain containing a lysosome-targeting motif. It interacts with RNAs containing short stretches of uridylates and its RRM2 can mediate the specific binding to uridylate-rich RNAs. — an NCBI CDD conserved domain (cd12617); members share this curated model.
