identifier: CDD:cd07154
label: "The DNA-binding domain of the photoreceptor cell-specific nuclear receptor (PNR) nuclear receptor-like family. The DNA-binding domain of the photoreceptor cell-specific nuclear receptor (PNR) nuclear receptor-like family is composed of two C4-type zinc fingers. Each zinc finger contains a group of four Cys residues which coordinates a single zinc atom. PNR interacts with specific DNA sites upstream of the target gene and modulates the rate of transcriptional initiation. This family includes nuclear receptor Tailless (TLX), photoreceptor cell-specific nuclear receptor (PNR) and related receptors. TLX is an orphan receptor that plays a key role in neural development by regulating cell cycle progression and exit of neural stem cells in the developing brain. PNR is expressed only in the outer layer of retinal photoreceptor cells. It may be involved in the signaling pathway regulating photoreceptor differentiation and/or maintenance. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, PNR-like receptors have a central well-conserved DNA-binding domain (DBD), a variable N-terminal domain, a flexible hinge and a C-terminal ligand binding domain (LBD)."
