identifier: CDD:cd22161
label: "F-box domain found in Arabidopsis thaliana SKP2-like proteins (AtSKP2A and AtSKP2B) and similar proteins. AtSKP2A, also called FBL5-like protein (AtFBL5), is an F-box protein that regulates cell division and is degraded via the ubiquitin pathway. It acts as an auxin receptor. AtSKP2B, also called F-box/LRR-repeat protein 5 (AtFB5), is an F-box protein that does not interact with auxin. Both AtSKP2A and AtSKP2B are components of SCF(SKP2A/SKP2B) E3 ubiquitin ligase complexes, which mediate the ubiquitination and subsequent proteasomal degradation of target proteins (including cell cycle repressors). AtSKP2A regulates the stability of the transcription factors E2FC and DPB, repressors of cell proliferation. It confers increased tolerance to osmotic stress by promoting cell division, especially in meristems and promotes the formation of lateral root primordia. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Arabidopsis thaliana SKP2-like proteins (AtSKP2A and AtSKP2B) and similar proteins. AtSKP2A, also called FBL5-like protein (AtFBL5), is an F-box protein that regulates cell division and is degraded via the ubiquitin pathway. It acts as an auxin receptor. AtSKP2B, also called F-box/LRR-repeat protein 5 (AtFB5), is an F-box protein that does not interact with auxin. Both AtSKP2A and AtSKP2B are components of SCF(SKP2A/SKP2B) E3 ubiquitin ligase complexes, which mediate the ubiquitination and subsequent proteasomal degradation of target proteins (including cell cycle repressors). AtSKP2A regulates the stability of the transcription factors E2FC and DPB, repressors of cell proliferation. It confers increased tolerance to osmotic stress by promoting cell division, especially in meristems and promotes the formation of lateral root primordia. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22161); members share this curated model.
