identifier: CDD:cd23248
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Deltaflexiviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses, in the order Tymovirales. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Deltaflexiviridae, order Tymovirales. Deltaflexiviridae consists of one genus (Deltaflexivirus) and three species: Fusarium deltaflexivirus 1, Sclerotinia deltaflexivirus 1, and Soybean-associated deltaflexivirus 1. Members of the Tymovirales order are mainly plant pathogens that are characterized by similarities in their replication-associated polyproteins, which account for the majority of their genomic coding capacity. They are considered to form a group, phylogenetically, referred to as flexiviruses, with filamentous virions. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the family Deltaflexiviridae of positive-sense single-stranded RNA [(+)ssRNA] viruses, in the order Tymovirales. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Deltaflexiviridae, order Tymovirales. Deltaflexiviridae consists of one genus (Deltaflexivirus) and three species: Fusarium deltaflexivirus 1, Sclerotinia deltaflexivirus 1, and Soybean-associated deltaflexivirus 1. Members of the Tymovirales order are mainly plant pathogens that are characterized by similarities in their replication-associated polyproteins, which account for the majority of their genomic coding capacity. They are considered to form a group, phylogenetically, referred to as flexiviruses, with filamentous virions. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23248); members share this curated model.
