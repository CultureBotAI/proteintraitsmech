identifier: CDD:cd22430
label: "type I K homology (KH) RNA-binding domain found in DEAD box protein 43 (DDX43), DEAD box protein 53 (DDX53) and similar proteins. DDX43 (also called cancer/testis antigen 13, or DEAD box protein HAGE, or helical antigen) displays tumor-specific expression. Diseases associated with DDX43 include rheumatoid lung disease. DDX53 (also called cancer-associated gene protein, or cancer/testis antigen 26, or DEAD box protein CAGE) shows high expression level in various tumors and is involved in anti-cancer drug resistance. Both DDX46 and DDX53 are members of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation."
definition: >-
