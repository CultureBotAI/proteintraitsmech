identifier: CDD:cd13958
label: "Bacteriochlorophyll/chlorophyll synthetase. Chlorophyll synthase catalyzes the last step of chlorophyll (Chl) biosynthesis, the addition of the tetraprenyl (phytyl or geranylgeranyl) side chain. In plant chloroplast, the chlorophyll synthase is located in thylakoid membrane and has been shown to also have a regulatory or channeling function. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways."
definition: >-
  Bacteriochlorophyll/chlorophyll synthetase. Chlorophyll synthase catalyzes the last step of chlorophyll (Chl) biosynthesis, the addition of the tetraprenyl (phytyl or geranylgeranyl) side chain. In plant chloroplast, the chlorophyll synthase is located in thylakoid membrane and has been shown to also have a regulatory or channeling function. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways. — an NCBI CDD conserved domain (cd13958); members share this curated model.
