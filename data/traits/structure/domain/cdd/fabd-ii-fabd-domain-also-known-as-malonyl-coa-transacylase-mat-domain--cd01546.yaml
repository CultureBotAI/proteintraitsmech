identifier: CDD:cd01546
label: "FabD_II. FabD domain also known as Malonyl-CoA: transacylase (MAT)domain participates in both fatty acid and polyketide pathways, transferring malonyl groups that are used as extender units in chain growth from Malonyl-CoA to pathway -specific acyl carrier proteins (ACP). FabD is 32 kDa monomer composed of two subdomain. The core of first subdomain is structurally similar to  hydrolases. The second subdomain has ferredoxin-like fold. FabD domain is essential part of both type I and type II fatty acid synthases(FAS) and polyketide synthases (PKS).The type II  FAS is a collection of individual enzymes encoded by separate genes and found mostly in Prokaryote  and mitochondrial form of FAS of Eucaryote."
definition: >-
  FabD_II. FabD domain also known as Malonyl-CoA: transacylase (MAT)domain participates in both fatty acid and polyketide pathways, transferring malonyl groups that are used as extender units in chain growth from Malonyl-CoA to pathway -specific acyl carrier proteins (ACP). FabD is 32 kDa monomer composed of two subdomain. The core of first subdomain is structurally similar to hydrolases. The second subdomain has ferredoxin-like fold. FabD domain is essential part of both type I and type II fatty acid synthases(FAS) and polyketide synthases (PKS).The type II FAS is a collection of individual enzymes encoded by separate genes and found mostly in Prokaryote and mitochondrial form of FAS of Eucaryote. — an NCBI CDD conserved domain (cd01546); members share this curated model.
