identifier: CDD:cd21595
label: "C-terminal domain of nucleocapsid (N) protein of coronavirus. The coronavirus nucleocapsid (N) protein is a major structural and multifunctional protein. It plays an important role in the virus replication cycle, by forming a complex with the viral RNA. It also interacts with the viral membrane protein during virion assembly and plays a critical role in enhancing the efficiency of virus transcription and assembly. The C-terminal domain of the N protein (N-CTD) is involved in dimerization, and is thus, also called the dimerization domain."
definition: >-
  C-terminal domain of nucleocapsid (N) protein of coronavirus. The coronavirus nucleocapsid (N) protein is a major structural and multifunctional protein. It plays an important role in the virus replication cycle, by forming a complex with the viral RNA. It also interacts with the viral membrane protein during virion assembly and plays a critical role in enhancing the efficiency of virus transcription and assembly. The C-terminal domain of the N protein (N-CTD) is involved in dimerization, and is thus, also called the dimerization domain. — an NCBI CDD conserved domain (cd21595); members share this curated model.
