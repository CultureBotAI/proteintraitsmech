identifier: CDD:sd00001
label: "Calcium-binding Thrombospondin type 3 (TSP3) repeat. TSP3 repeats of the vertebrate thrombospondin (TSP)-1,-2,-3,-4 and TSP-5/also known as COMP (cartilage oligomeric matrix protein), and related proteins. These short aspartate-rich repeats are a continuous series of calcium binding sites that can be divided into two sequence motifs: N-type and C-type. N-type and C-type motifs are distinguished by their sequence length, calcium ion binding, and their interactions with water molecules. C-type motifs are higher affinity binding sites compared to N-type motifs."
definition: >-
  Calcium-binding Thrombospondin type 3 (TSP3) repeat. TSP3 repeats of the vertebrate thrombospondin (TSP)-1,-2,-3,-4 and TSP-5/also known as COMP (cartilage oligomeric matrix protein), and related proteins. These short aspartate-rich repeats are a continuous series of calcium binding sites that can be divided into two sequence motifs: N-type and C-type. N-type and C-type motifs are distinguished by their sequence length, calcium ion binding, and their interactions with water molecules. C-type motifs are higher affinity binding sites compared to N-type motifs. — an NCBI CDD conserved domain (sd00001); members share this curated model.
