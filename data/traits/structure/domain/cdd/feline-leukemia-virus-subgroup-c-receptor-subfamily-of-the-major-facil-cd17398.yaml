identifier: CDD:cd17398
label: "Feline leukemia virus subgroup C receptor subfamily of the Major Facilitator Superfamily of transporters. The Feline leukemia virus subgroup C receptor (FLVCR) subfamily is conserved in metazoans and is composed of two vertebrate members, FLVCR1 and FLVCR2. FLVCR1 is a heme transporter and it has two isoforms: 1 (or FLVCR1a), which exports cytoplasmic heme as well as coproporphyrin and protoporphyrin IX; and 2 (FLVCR1b), which promotes heme efflux from the mitochondrion to the cytoplasm. FLVCR2 functions as a heme importer as well as a transporter for a calcium-chelator complex that is important for growth and calcium metabolism. The FLVCR subfamily belongs to the Solute carrier 49 (SLC49) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Feline leukemia virus subgroup C receptor subfamily of the Major Facilitator Superfamily of transporters. The Feline leukemia virus subgroup C receptor (FLVCR) subfamily is conserved in metazoans and is composed of two vertebrate members, FLVCR1 and FLVCR2. FLVCR1 is a heme transporter and it has two isoforms: 1 (or FLVCR1a), which exports cytoplasmic heme as well as coproporphyrin and protoporphyrin IX; and 2 (FLVCR1b), which promotes heme efflux from the mitochondrion to the cytoplasm. FLVCR2 functions as a heme importer as well as a transporter for a calcium-chelator complex that is important for growth and calcium metabolism. The FLVCR subfamily belongs to the Solute carrier 49 (SLC49) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17398); members share this curated model.
