identifier: CDD:cd22589
label: "central coiled-coil domain of geminin. Geminin, together with geminin coiled-coil domain-containing protein 1 (GemC1) and McIdas (also called Idas or multicilin), controls both the cell cycle and differentiation decisions in cells. Geminin is an inhibitor of Cdt1, a key component and crucial regulator of pre-replicative complexes (pre-RC) that function in the duplication of chromosomal DNA. Pre-RC assembly culminates in the recruitment of the hexameric mini-chromosome maintenance complex (MCM) onto chromatin. Geminin tightly binds and sequesters Cdt1 in a complex that is unable to recruit MCM to origins, inhibiting DNA replication. It belongs to the geminin family of proteins that also includes GemC1 and McIdas. They share a homologous central coiled-coil domain that mediates homo- and heterodimerization with other family members; this ability is likely to be important for modulating their function in cycling and differentiating cells. This model represents the central coiled-coil domain of geminin."
