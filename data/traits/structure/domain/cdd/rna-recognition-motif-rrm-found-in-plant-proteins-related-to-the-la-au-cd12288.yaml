identifier: CDD:cd12288
label: "RNA recognition motif (RRM) found in plant proteins related to the La autoantigen. This subfamily corresponds to the RRM of plant La-like proteins related to the La autoantigen. A variety of La-related proteins (LARPs or La ribonucleoproteins), with differing domain architecture, appear to function as RNA-binding proteins in eukaryotic cellular processes. Members in this family contain an LAM domain followed by an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif (RRM) found in plant proteins related to the La autoantigen. This subfamily corresponds to the RRM of plant La-like proteins related to the La autoantigen. A variety of La-related proteins (LARPs or La ribonucleoproteins), with differing domain architecture, appear to function as RNA-binding proteins in eukaryotic cellular processes. Members in this family contain an LAM domain followed by an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd12288); members share this curated model.
