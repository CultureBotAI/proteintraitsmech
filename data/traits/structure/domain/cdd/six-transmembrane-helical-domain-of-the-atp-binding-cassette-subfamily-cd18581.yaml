identifier: CDD:cd18581
label: "Six-transmembrane helical domain of the ATP-binding cassette subfamily B member 6, mitochondrial. This group represents the ABCB6 subfamily of ATP Binding Cassette (ABC) transporters that are involved in transition metal homeostasis and detoxification processes. ABCB6 is originally identified as a porphyrin transporter present in the outer membrane of mitochondria. It is highly expressed in cells resistance to arsenic and protects against arsenic cytotoxicity. Moreover, ABCB6 (ABC transporter subfamily B, member 6) is closely related to yeast ATM1 and human ABCB7, which are involved in the assembly of cytosolic iron-sulfur (Fe/S) cluster-containing proteins by mediating export of Fe/S cluster precursors from mitochondria. In eukaryotes, the Atm1/ABCB7 is present in the inner membrane of mitochondria and is required for the formation of cytosolic iron sulfur cluster containing proteins; mutations of ABCB7 gene result in mitochondrial iron accumulation and are responsible for X-linked sideroblastic anemia."
