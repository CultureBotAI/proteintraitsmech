identifier: CDD:cd22174
label: "F-box domain found in F-box only protein 30 (FBXO30) and similar proteins. FBXO30, also called FBX30, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It is required for muscle atrophy following denervation. FBXO30 regulates mammopoiesis by targeting the bipolar mitotic kinesin Eg5. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 30 (FBXO30) and similar proteins. FBXO30, also called FBX30, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It is required for muscle atrophy following denervation. FBXO30 regulates mammopoiesis by targeting the bipolar mitotic kinesin Eg5. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22174); members share this curated model.
