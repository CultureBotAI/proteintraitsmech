identifier: CDD:cd14373
label: "CUE domain found in yeast ubiquitin-binding protein CUE3 (Cue3p) and similar proteins. Cue3p, also called coupling of ubiquitin conjugation to ER degradation protein 3, is encoded by the open reading frame (ORF) YGL110C. It is involved in the intramolecular monoubiquitination that serves as a regulatory signal in a variety of cellular processes in yeast. Cue3p contains a CUE domain."
definition: >-
  CUE domain found in yeast ubiquitin-binding protein CUE3 (Cue3p) and similar proteins. Cue3p, also called coupling of ubiquitin conjugation to ER degradation protein 3, is encoded by the open reading frame (ORF) YGL110C. It is involved in the intramolecular monoubiquitination that serves as a regulatory signal in a variety of cellular processes in yeast. Cue3p contains a CUE domain. — an NCBI CDD conserved domain (cd14373); members share this curated model.
