identifier: CDD:cd15703
label: "Extended PHD finger found in bromodomain and PHD finger-containing protein 3 (BRPF3) and similar proteins. The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the ePHD finger of BRPF3. BRF3 is a homolog of BRPF1 and BRPF2. It is a scaffold protein that forms a novel monocytic leukemic zinc finger protein (MOZ)/MOZ-related factor (MORF) H3 histone acetyltransferase (HAT) complex with other regulatory subunits. BRPF3 contains a plant homeodomain (PHD) finger followed by this non-canonical ePHD finger, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain."
definition: >-
  Extended PHD finger found in bromodomain and PHD finger-containing protein 3 (BRPF3) and similar proteins. The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the ePHD finger of BRPF3. BRF3 is a homolog of BRPF1 and BRPF2. It is a scaffold protein that forms a novel monocytic leukemic zinc finger protein (MOZ)/MOZ-related factor (MORF) H3 histone acetyltransferase (HAT) complex with other regulatory subunits. BRPF3 contains a plant homeodomain (PHD) finger followed by this non-canonical ePHD finger, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain. — an NCBI CDD conserved domain (cd15703); members share this curated model.
