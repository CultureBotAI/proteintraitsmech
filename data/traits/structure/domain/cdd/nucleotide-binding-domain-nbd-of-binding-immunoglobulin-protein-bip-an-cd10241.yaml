identifier: CDD:cd10241
label: "nucleotide-binding domain (NBD) of binding-immunoglobulin protein (BiP) and similar proteins. This subfamily includes human BiP (also known as HSP70 family protein 5 /HSPA5; 70-kDa heat shock protein 5; glucose-regulated protein 78/GRP78; immunoglobulin heavy chain-binding protein), Sacchaormyces cerevisiae BiP (also known as Grp78p), Arabidopsis thaliana BiP1-3 (also known as luminal-binding protein 1-3) and related proteins. BiP plays a key role in protein folding and quality control in the endoplasmic reticulum lumen. It plays an auxiliary role in post-translational transport of small presecretory proteins across endoplasmic reticulum (ER). BiP may function as an allosteric modulator for SEC61 channel-forming translocon complex, likely cooperating with SEC62 to enable the productive insertion of these precursors into SEC61 channel. It appears to specifically regulate translocation of precursors having inhibitory residues in their mature region that weaken channel gating. BiP may also play a role in apoptosis and cell proliferation. Plant BiP may be required for pollen development and pollen tube growth. This subfamily belongs to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly and can direct incompetent \"client\" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs)."
definition: >-
  nucleotide-binding domain (NBD) of binding-immunoglobulin protein (BiP) and similar proteins. This subfamily includes human BiP (also known as HSP70 family protein 5 /HSPA5; 70-kDa heat shock protein 5; glucose-regulated protein 78/GRP78; immunoglobulin heavy chain-binding protein), Sacchaormyces cerevisiae BiP (also known as Grp78p), Arabidopsis thaliana BiP1-3 (also known as luminal-binding protein 1-3) and related proteins. BiP plays a key role in protein folding and quality control in the endoplasmic reticulum lumen. It plays an auxiliary role in post-translational transport of small presecretory proteins across endoplasmic reticulum (ER). BiP may function as an allosteric modulator for SEC61 channel-forming translocon complex, likely cooperating with SEC62 to enable the productive insertion of these precursors into SEC61 channel. It appears to specifically regulate translocation of precursors having inhibitory residues in their mature region that weaken channel gating. BiP may also play a role in apoptosis and cell proliferation. Plant BiP may be required for pollen development and pollen tube growth. This subfamily belongs to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly and can direct incompetent "client" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs). — an NCBI CDD conserved domain (cd10241); members share this curated model.
