identifier: CDD:cd13444
label: "Zn-dependent DNAse of the contact-dependent growth inhibition (CDI) system of Escherichia coli EC869, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring bacteria. This model represents the C-terminal toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered. A wide variety of C-terminal toxin domains appear to exist; this particular example from Escherichia coli EC869 and other bacteria appears to function as a Zn2+-dependent DNAse degrading the genome of target cells."
definition: >-
  Zn-dependent DNAse of the contact-dependent growth inhibition (CDI) system of Escherichia coli EC869, and related proteins. CDI toxins are expressed by gram-negative bacteria as part of a mechanism to inhibit the growth of neighboring bacteria. This model represents the C-terminal toxin domain of CdiA effector proteins. CdiA secretion is dependent on the outer membrane protein CdiB. Upon binding to a receptor on the surface of target bacteria, the CDI toxin is delivered. A wide variety of C-terminal toxin domains appear to exist; this particular example from Escherichia coli EC869 and other bacteria appears to function as a Zn2+-dependent DNAse degrading the genome of target cells. — an NCBI CDD conserved domain (cd13444); members share this curated model.
