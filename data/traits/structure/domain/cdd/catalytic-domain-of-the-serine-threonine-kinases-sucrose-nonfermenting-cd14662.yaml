identifier: CDD:cd14662
label: "Catalytic domain of the Serine/Threonine Kinases, Sucrose nonfermenting 1-related protein kinase subfamily 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The SnRKs form three different subfamilies designated SnRK1-3. SnRK2 is represented in this cd. SnRK2s are involved in plant response to abiotic stresses and abscisic acid (ABA)-dependent plant development. The SnRK2s subfamily is in turn classed into three subgroups, all 3 of which are represented in this CD. Group 1 comprises kinases not activated by ABA, group 2 - kinases not activated or activated very weakly by ABA (depending on plant species), and group 3 - kinases strongly activated by ABA. The SnRKs belong to a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinases, Sucrose nonfermenting 1-related protein kinase subfamily 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The SnRKs form three different subfamilies designated SnRK1-3. SnRK2 is represented in this cd. SnRK2s are involved in plant response to abiotic stresses and abscisic acid (ABA)-dependent plant development. The SnRK2s subfamily is in turn classed into three subgroups, all 3 of which are represented in this CD. Group 1 comprises kinases not activated by ABA, group 2 - kinases not activated or activated very weakly by ABA (depending on plant species), and group 3 - kinases strongly activated by ABA. The SnRKs belong to a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14662); members share this curated model.
