identifier: CDD:cd23369
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Arabidopsis thaliana Kunitz trypsin inhibitor 6 (AtKTI6) and similar proteins. This subfamily includes AtKTI6 and AtKTI7, which exhibit Kunitz trypsin protease inhibitor activity. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Arabidopsis thaliana Kunitz trypsin inhibitor 6 (AtKTI6) and similar proteins. This subfamily includes AtKTI6 and AtKTI7, which exhibit Kunitz trypsin protease inhibitor activity. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23369); members share this curated model.
