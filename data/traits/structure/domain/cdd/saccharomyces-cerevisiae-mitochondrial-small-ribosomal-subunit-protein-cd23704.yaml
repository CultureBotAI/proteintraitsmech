identifier: CDD:cd23704
label: "Saccharomyces cerevisiae mitochondrial small ribosomal subunit protein mS44, and similar proteins. mS44, also known as mitochondrial 37S ribosomal protein MRP13, is a component of the mitochondrial small ribosomal subunit (mt-SSU) of Saccharomyces cerevisiae mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. The mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane."
definition: >-
  Saccharomyces cerevisiae mitochondrial small ribosomal subunit protein mS44, and similar proteins. mS44, also known as mitochondrial 37S ribosomal protein MRP13, is a component of the mitochondrial small ribosomal subunit (mt-SSU) of Saccharomyces cerevisiae mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. The mitoribosomes are attached to the mitochondrial inner membrane and translation products are cotranslationally integrated into the membrane. — an NCBI CDD conserved domain (cd23704); members share this curated model.
