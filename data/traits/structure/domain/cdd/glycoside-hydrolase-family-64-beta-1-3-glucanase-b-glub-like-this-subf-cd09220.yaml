identifier: CDD:cd09220
label: "glycoside hydrolase family 64: beta-1,3-glucanase B (GluB)-like. This subfamily is represented by GluB, beta-1,3-glucanase B , from Lysobacter enzymogenes Strain N4-7 and related bacterial and ascomycete proteins. GluB is a member of the glycoside hydrolase family 64 (GH64) involved in the cleavage of long-chain polysaccharide beta-1,3-glucans, into specific pentasaccharide oligomers. Among bacteria, many beta-1,3-glucanases are implicated in fungal cell wall degradation. GluB possesses the conserved Glu and Asp residues required to cleave substrate beta-1,3-glucans. Recombinant GluB demonstrated higher relative activity toward the branched-chain beta-1,3 glucan substrate zymosan A than toward linear beta-1,3 glucan substrates. Based on the structure of laminaripentaose-producing, beta-1,3-glucanase (LPHase) of Streptomyces matensis, which belongs to the same family as GluB but to a different subfamily, this cd is a two-domain model. Sometimes these two domains are found associated with other domains such as in the Catenulispora acidiphila DSM 44928 carbohydrate binding family 6 protein in which they are positioned N-terminal of a carbohydrate binding module, family 6 (CBM_6) domain."
definition: >-
  glycoside hydrolase family 64: beta-1,3-glucanase B (GluB)-like. This subfamily is represented by GluB, beta-1,3-glucanase B , from Lysobacter enzymogenes Strain N4-7 and related bacterial and ascomycete proteins. GluB is a member of the glycoside hydrolase family 64 (GH64) involved in the cleavage of long-chain polysaccharide beta-1,3-glucans, into specific pentasaccharide oligomers. Among bacteria, many beta-1,3-glucanases are implicated in fungal cell wall degradation. GluB possesses the conserved Glu and Asp residues required to cleave substrate beta-1,3-glucans. Recombinant GluB demonstrated higher relative activity toward the branched-chain beta-1,3 glucan substrate zymosan A than toward linear beta-1,3 glucan substrates. Based on the structure of laminaripentaose-producing, beta-1,3-glucanase (LPHase) of Streptomyces matensis, which belongs to the same family as GluB but to a different subfamily, this cd is a two-domain model. Sometimes these two domains are found associated with other domains such as in the Catenulispora acidiphila DSM 44928 carbohydrate binding family 6 protein in which they are positioned N-terminal of a carbohydrate binding module, family 6 (CBM_6) domain. — an NCBI CDD conserved domain (cd09220); members share this curated model.
