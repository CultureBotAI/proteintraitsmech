identifier: CDD:cd08089
label: "ATP-grasp domain of the large subunit of carbamoyl phosphate synthetase. ATP-grasp domain of the large subunit of carbamoyl phosphate synthetase. Carbamoyl phosphate synthetase (CPS) catalyzes the production of carbamoyl phosphate from glutamine, bicarbonate, and two molecules of MgATP. CPS plays an important role in two separate biosynthetic pathways; urea cycle (occurs in mitochondria) and pyrimidine metabolism (occurs in cytosol). In Escherechia coli, there's only a single enzyme for both pathways which is allosterically activated by ornithine and inhibited by UMP. In humans, the allosteric activator for urea cycle CPS is N-acetyl glutamate. Escherichia coli CPS is a heterodimer with a small and a large subunit. Small subunit carries out glutamine hydrolysis whereas the large subunit catalyzes the synthesis of carbamoyl phosphate. In addition, the large subunit provides binding sites for allosteric ligands and divalent and monovalent cations. This group represents the members large subunuit of CPS. Sequence analysis of Escherichia coli CPS shows that its large subunit is folded into two similar halves that are superimposable on each other. It appears that these two halves are the result of gene duplication event from a primitive enzyme containing kinase activity. These two halves form two distinct active sites and are referred to as carboxyphosphate and carbamoyl phosphate synthetic components of CPS."
definition: >-
  ATP-grasp domain of the large subunit of carbamoyl phosphate synthetase. ATP-grasp domain of the large subunit of carbamoyl phosphate synthetase. Carbamoyl phosphate synthetase (CPS) catalyzes the production of carbamoyl phosphate from glutamine, bicarbonate, and two molecules of MgATP. CPS plays an important role in two separate biosynthetic pathways; urea cycle (occurs in mitochondria) and pyrimidine metabolism (occurs in cytosol). In Escherechia coli, there's only a single enzyme for both pathways which is allosterically activated by ornithine and inhibited by UMP. In humans, the allosteric activator for urea cycle CPS is N-acetyl glutamate. Escherichia coli CPS is a heterodimer with a small and a large subunit. Small subunit carries out glutamine hydrolysis whereas the large subunit catalyzes the synthesis of carbamoyl phosphate. In addition, the large subunit provides binding sites for allosteric ligands and divalent and monovalent cations. This group represents the members large subunuit of CPS. Sequence analysis of Escherichia coli CPS shows that its large subunit is folded into two similar halves that are superimposable on each other. It appears that these two halves are the result of gene duplication event from a primitive enzyme containing kinase activity. These two halves form two distinct active sites and are referred to as carboxyphosphate and carbamoyl phosphate synthetic components of CPS. — an NCBI CDD conserved domain (cd08089); members share this curated model.
