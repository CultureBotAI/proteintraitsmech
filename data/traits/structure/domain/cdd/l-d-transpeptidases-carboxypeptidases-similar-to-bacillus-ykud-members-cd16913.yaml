identifier: CDD:cd16913
label: "L,D-transpeptidases/carboxypeptidases similar to Bacillus YkuD. Members of the YkuD-like family of proteins are found in a range of bacteria. The best studied member Bacillus YkuD has been shown to act as an L,D-transpeptidase that gives rise to an alternative pathway for peptidoglycan cross-linking. Another member Helicobacter pylori Csd6 functions as an L,D-carboxypeptidase and regulates helical cell shape and motility. The conserved region contains a conserved histidine and cysteine, with the cysteine thought to be an active site residue."
definition: >-
  L,D-transpeptidases/carboxypeptidases similar to Bacillus YkuD. Members of the YkuD-like family of proteins are found in a range of bacteria. The best studied member Bacillus YkuD has been shown to act as an L,D-transpeptidase that gives rise to an alternative pathway for peptidoglycan cross-linking. Another member Helicobacter pylori Csd6 functions as an L,D-carboxypeptidase and regulates helical cell shape and motility. The conserved region contains a conserved histidine and cysteine, with the cysteine thought to be an active site residue. — an NCBI CDD conserved domain (cd16913); members share this curated model.
