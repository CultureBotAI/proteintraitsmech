identifier: CDD:cd23188
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the Medioniviridae family of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Medioniviridae, order Nidovirales. Member viruses have a viral envelope and (+)ssRNA genome. The Medioniviridae subgenera includes Turrinivirus and Balbicanovirus. The structure of Medioniviridae RdRp contains a RdRp domain as well as a large N-terminal extension that adopts a nidovirus RdRp-associated nucleotidyltransferase (NiRAN) architecture. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the Medioniviridae family of positive-sense single-stranded RNA [(+)ssRNA] viruses. This group contains the catalytic core domain of RdRp of RNA viruses belonging to the family Medioniviridae, order Nidovirales. Member viruses have a viral envelope and (+)ssRNA genome. The Medioniviridae subgenera includes Turrinivirus and Balbicanovirus. The structure of Medioniviridae RdRp contains a RdRp domain as well as a large N-terminal extension that adopts a nidovirus RdRp-associated nucleotidyltransferase (NiRAN) architecture. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23188); members share this curated model.
