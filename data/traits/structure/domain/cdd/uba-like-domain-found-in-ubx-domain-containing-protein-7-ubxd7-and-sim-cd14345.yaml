identifier: CDD:cd14345
label: "UBA-like domain found in UBX domain-containing protein 7 (UBXD7) and similar proteins. UBXD7, also known as UBXN7, functions as a ubiquitin-binding adaptor that mediates the interaction between the AAA+ ATPase p97 (also known as VCP or Cdc48) and the transcription factor HIF1alpha. It binds only to the active, NEDD8- or Rub1-modified form of cullins. UBXD7 contains the ubiquitin-associated (UBA), ubiquitin-associating (UAS), ubiquitin regulatory X (UBX), and ubiquitin-interacting motif (UIM) domains. Either UBA or UIM could serve as a docking site for neddylated-cullins. Moreover, UBA-like domain is required for binding ubiquitylated-protein substrates, UIM motif is responsible for the binding to cullin RING ligases (CRLs), and UBX domain is essential for p97 binding."
definition: >-
  UBA-like domain found in UBX domain-containing protein 7 (UBXD7) and similar proteins. UBXD7, also known as UBXN7, functions as a ubiquitin-binding adaptor that mediates the interaction between the AAA+ ATPase p97 (also known as VCP or Cdc48) and the transcription factor HIF1alpha. It binds only to the active, NEDD8- or Rub1-modified form of cullins. UBXD7 contains the ubiquitin-associated (UBA), ubiquitin-associating (UAS), ubiquitin regulatory X (UBX), and ubiquitin-interacting motif (UIM) domains. Either UBA or UIM could serve as a docking site for neddylated-cullins. Moreover, UBA-like domain is required for binding ubiquitylated-protein substrates, UIM motif is responsible for the binding to cullin RING ligases (CRLs), and UBX domain is essential for p97 binding. — an NCBI CDD conserved domain (cd14345); members share this curated model.
