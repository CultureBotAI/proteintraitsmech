identifier: CDD:cd02242
label: "11S legumin seed storage globulin, N-terminal cupin domain. This family contains the N-terminal domains of 11S legumin seed storage proteins that supply nutrition for seed germination, such as glycinin and legumin, including many common food allergens such as the peanut major allergen Ara h 3, almond allergen Pru du 6, Pecan allergen Car i 4, hazelnut nut allergen Cor a 9, Brazil nut allergen Ber e 2, cashew allergen Ana o 2, pistachio allergen Pis v 2/5, and walnut allergen Jug n/r 4. These plant seed storage globulins have tandem cupin-like beta-barrel folds (referred to as a bicupin). They are synthesized as propeptides in the endoplasmic reticulum and transported to the secretory vesicles as a homotrimer. The propeptides are processed as they are sorted in the secretory vesicles. The homotrimer binds another homotrimer to form a homohexamer with 32-point symmetry formed by a face-to-face stacking of the two trimers. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  11S legumin seed storage globulin, N-terminal cupin domain. This family contains the N-terminal domains of 11S legumin seed storage proteins that supply nutrition for seed germination, such as glycinin and legumin, including many common food allergens such as the peanut major allergen Ara h 3, almond allergen Pru du 6, Pecan allergen Car i 4, hazelnut nut allergen Cor a 9, Brazil nut allergen Ber e 2, cashew allergen Ana o 2, pistachio allergen Pis v 2/5, and walnut allergen Jug n/r 4. These plant seed storage globulins have tandem cupin-like beta-barrel folds (referred to as a bicupin). They are synthesized as propeptides in the endoplasmic reticulum and transported to the secretory vesicles as a homotrimer. The propeptides are processed as they are sorted in the secretory vesicles. The homotrimer binds another homotrimer to form a homohexamer with 32-point symmetry formed by a face-to-face stacking of the two trimers. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd02242); members share this curated model.
