identifier: CDD:cd20503
label: "peptidase C80 domains found in filamentous hemagglutinin or adhesin, and other similar proteins. This peptidase C80 family includes the cysteine-binding domain (CPD) of several large, repetitive bacterial exoproteins involved in heme utilization or adhesion and many typically having CPD repeats as well as regions rich in repeats. Many members of this family have been designated adhesins or filamentous haemagglutinins. The CPD contains the characteristic Asp/Cys/His residues found in Clostridium toxin B active site."
definition: >-
  peptidase C80 domains found in filamentous hemagglutinin or adhesin, and other similar proteins. This peptidase C80 family includes the cysteine-binding domain (CPD) of several large, repetitive bacterial exoproteins involved in heme utilization or adhesion and many typically having CPD repeats as well as regions rich in repeats. Many members of this family have been designated adhesins or filamentous haemagglutinins. The CPD contains the characteristic Asp/Cys/His residues found in Clostridium toxin B active site. — an NCBI CDD conserved domain (cd20503); members share this curated model.
