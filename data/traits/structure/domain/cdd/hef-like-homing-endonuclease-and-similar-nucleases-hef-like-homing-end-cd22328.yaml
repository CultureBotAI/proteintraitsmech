identifier: CDD:cd22328
label: "Hef-like homing endonuclease and similar nucleases. Hef-like homing endonuclease such as I-Bth0305I, which is encoded within a group I intron in the recA gene of a Bacillus thuringiensis bacteriophage and cleaves a DNA target in the uninterrupted recA gene at a position immediately adjacent to the intron insertion site. It belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
