identifier: CDD:cd15904
label: "Translocator protein (TSPO)/peripheral-type benzodiazepine receptor (MBR) family. This family contains tryptophan-rich translocator protein (TSPO), an integral membrane protein that is highly conserved from bacteria to mammals. In eukaryotes, it is mainly found in the outer mitochondrial membranes of steroid-synthesizing cells of the nervous system where it transports cholesterol into mitochondria. It is known to be highly expressed in metastatic cancer, steriodogenic tissues, as well as inflammatory and neurological diseases such as Alzheimer's and Parkinson's. TSPO is also known as the peripheral benzodiazepine receptor (MBR) and its ligands include benzodiazepine drugs, implicated in regulating apoptosis. In human, a single polymorphism A147T is associated with psychiatric disorders; the mutation causes structural changes in a region implicated in cholesterol binding. TSPO is homologous to bacterial tryptophan-rich sensory proteins, and their tryptophan residues are believed to be functionally important. In bacteria, TSPO acts as a negative regulator of expression of specific photosynthesis genes in response to oxygen/light; it catalyzes a photooxidative degradation of Proto porphyrine (PpIX). R. sphaeroides TSPO (RsTSPO) is involved in porphyrin transport, similar to human, while Arabidopsis translocator protein (AtTSPO) is regulated at multiple levels in response to salt stress and perturbations in tetrapyrrole metabolism."
definition: >-
  Translocator protein (TSPO)/peripheral-type benzodiazepine receptor (MBR) family. This family contains tryptophan-rich translocator protein (TSPO), an integral membrane protein that is highly conserved from bacteria to mammals. In eukaryotes, it is mainly found in the outer mitochondrial membranes of steroid-synthesizing cells of the nervous system where it transports cholesterol into mitochondria. It is known to be highly expressed in metastatic cancer, steriodogenic tissues, as well as inflammatory and neurological diseases such as Alzheimer's and Parkinson's. TSPO is also known as the peripheral benzodiazepine receptor (MBR) and its ligands include benzodiazepine drugs, implicated in regulating apoptosis. In human, a single polymorphism A147T is associated with psychiatric disorders; the mutation causes structural changes in a region implicated in cholesterol binding. TSPO is homologous to bacterial tryptophan-rich sensory proteins, and their tryptophan residues are believed to be functionally important. In bacteria, TSPO acts as a negative regulator of expression of specific photosynthesis genes in response to oxygen/light; it catalyzes a photooxidative degradation of Proto porphyrine (PpIX). R. sphaeroides TSPO (RsTSPO) is involved in porphyrin transport, similar to human, while Arabidopsis translocator protein (AtTSPO) is regulated at multiple levels in response to salt stress and perturbations in tetrapyrrole metabolism. — an NCBI CDD conserved domain (cd15904); members share this curated model.
