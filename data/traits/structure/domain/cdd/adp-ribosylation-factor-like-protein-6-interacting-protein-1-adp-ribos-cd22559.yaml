identifier: CDD:cd22559
label: "ADP-ribosylation factor-like protein 6-interacting protein 1. ADP-ribosylation factor-like 6 binding factor 1 (Arl6IP1 or Arl6ip-1), also called apoptotic regulator in the membrane of the endoplasmic reticulum (ARMER), is an endoplasmic reticulum (ER) protein that has an important role in cell conduction and material transport. Arl6IP1, a tetraspan membrane protein, is an anti-apoptotic protein specific to multicellular organisms, and is a potential player in shaping the ER tubules in mammalian cells. In neurons, Arl6IP1 has been associated with the regulation of glutamate, a major excitatory neurotransmitter in excitatory synapses. In Drosophila, knockdown of the Arl6IP1 gene leads to progressive motor deficit. An Arl6IP1 variant has also been associated with hereditary spastic paraplegia (HSP), motor and sensory polyneuropathy, and acromutilation. Arl6IP1 shows some sequence similarity to the reticulon-homology domain (RHD) of reticulophagy regulators, which may function in inducing membrane curvature."
definition: >-
  ADP-ribosylation factor-like protein 6-interacting protein 1. ADP-ribosylation factor-like 6 binding factor 1 (Arl6IP1 or Arl6ip-1), also called apoptotic regulator in the membrane of the endoplasmic reticulum (ARMER), is an endoplasmic reticulum (ER) protein that has an important role in cell conduction and material transport. Arl6IP1, a tetraspan membrane protein, is an anti-apoptotic protein specific to multicellular organisms, and is a potential player in shaping the ER tubules in mammalian cells. In neurons, Arl6IP1 has been associated with the regulation of glutamate, a major excitatory neurotransmitter in excitatory synapses. In Drosophila, knockdown of the Arl6IP1 gene leads to progressive motor deficit. An Arl6IP1 variant has also been associated with hereditary spastic paraplegia (HSP), motor and sensory polyneuropathy, and acromutilation. Arl6IP1 shows some sequence similarity to the reticulon-homology domain (RHD) of reticulophagy regulators, which may function in inducing membrane curvature. — an NCBI CDD conserved domain (cd22559); members share this curated model.
