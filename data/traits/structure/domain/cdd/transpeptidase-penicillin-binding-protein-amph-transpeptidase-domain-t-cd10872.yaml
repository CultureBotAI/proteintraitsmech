label: "Transpeptidase. Penicillin binding protein AmpH transpeptidase domain. The active site serine is conserved in all members of this family. Although closely related to AmpC and other class C beta-lactamases, AmpH showed no beta-lactamase activity toward the substrate nitrocefin"
definition: >-
  Transpeptidase. Penicillin binding protein AmpH transpeptidase domain. The active site serine is conserved in all members of this family. Although closely related to AmpC and other class C beta-lactamases, AmpH showed no beta-lactamase activity toward the substrate nitrocefin — an NCBI CDD conserved domain (cd10872); members share this curated model.
