identifier: CDD:cd16825
label: "RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH9 (MARCH9). MARCH9, also known as membrane-associated RING finger protein 9, membrane-associated RING-CH protein IX (MARCH-IX), or RING finger protein 179 (RNF179), is a transmembrane E3 ubiquitin-protein ligase that down-regulates Mult1, CD4, major histocompatibility complex-I (MHC), and intercellular adhesion molecule (ICAM-1). It may also interact with receptor-type protein-tyrosine phosphatases (e.g. PTPRJ/CD148) as well as Fc gamma receptor IIB (CD32B), HLA-DQ, signaling lymphocytic activation molecule (CD150), and polio virus receptor (CD155). MARCH9 contains an N-terminal C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, followed by two transmembrane regions."
definition: >-
  RING-CH finger, H2 subclass (C4HC3-type), found in membrane-associated RING-CH9 (MARCH9). MARCH9, also known as membrane-associated RING finger protein 9, membrane-associated RING-CH protein IX (MARCH-IX), or RING finger protein 179 (RNF179), is a transmembrane E3 ubiquitin-protein ligase that down-regulates Mult1, CD4, major histocompatibility complex-I (MHC), and intercellular adhesion molecule (ICAM-1). It may also interact with receptor-type protein-tyrosine phosphatases (e.g. PTPRJ/CD148) as well as Fc gamma receptor IIB (CD32B), HLA-DQ, signaling lymphocytic activation molecule (CD150), and polio virus receptor (CD155). MARCH9 contains an N-terminal C4HC3-type RING-CH finger, also known as vRING or RINGv, a variant of C3H2C3-type RING-H2 finger, followed by two transmembrane regions. — an NCBI CDD conserved domain (cd16825); members share this curated model.
