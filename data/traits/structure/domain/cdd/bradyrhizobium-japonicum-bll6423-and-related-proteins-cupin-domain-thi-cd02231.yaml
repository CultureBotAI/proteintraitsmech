identifier: CDD:cd02231
label: "Bradyrhizobium japonicum BLL6423 and related proteins, cupin domain. This family includes bacterial and fungal proteins homologous to BLL6423, a Bradyrhizobium japonicum protein of unknown function; it includes a structure of an uncharacterized protein from Novosphingobium aromaticivorans. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Bradyrhizobium japonicum BLL6423 and related proteins, cupin domain. This family includes bacterial and fungal proteins homologous to BLL6423, a Bradyrhizobium japonicum protein of unknown function; it includes a structure of an uncharacterized protein from Novosphingobium aromaticivorans. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd02231); members share this curated model.
