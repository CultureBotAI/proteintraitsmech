identifier: CDD:cd08024
label: "Coelomic cytolytic factor, member of glycosyl hydrolase family 16. Subgroup of glucanases of unknown function that are related to beta-GRP (beta-1,3-glucan recognition protein), but contain active site residues. Beta-GRPs are one group of pattern recognition receptors (PRRs), also referred to as biosensor proteins, that complexes with pathogen-associated beta-1,3-glucans and then transduces signals necessary for activation of an appropriate innate immune response. Beta-GRPs are present in insects and lack all catalytic residues. This subgroup contains related proteins that still contain the active site and are widely distributed in eukaryotes. Their structures adopt a jelly roll fold with a deep active site channel harboring the catalytic residues, like those of other glycosyl hydrolase family 16 members."
definition: >-
  Coelomic cytolytic factor, member of glycosyl hydrolase family 16. Subgroup of glucanases of unknown function that are related to beta-GRP (beta-1,3-glucan recognition protein), but contain active site residues. Beta-GRPs are one group of pattern recognition receptors (PRRs), also referred to as biosensor proteins, that complexes with pathogen-associated beta-1,3-glucans and then transduces signals necessary for activation of an appropriate innate immune response. Beta-GRPs are present in insects and lack all catalytic residues. This subgroup contains related proteins that still contain the active site and are widely distributed in eukaryotes. Their structures adopt a jelly roll fold with a deep active site channel harboring the catalytic residues, like those of other glycosyl hydrolase family 16 members. — an NCBI CDD conserved domain (cd08024); members share this curated model.
