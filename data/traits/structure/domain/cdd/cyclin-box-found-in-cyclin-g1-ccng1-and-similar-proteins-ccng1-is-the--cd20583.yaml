identifier: CDD:cd20583
label: "cyclin box found in cyclin-G1 (CCNG1) and similar proteins. CCNG1 is the only cyclin that has either positive or negative effects on cell growth. It is associated with G2/M phase arrest in response to DNA damage. It is also involved in the development of human carcinoma. CCNG1 contains one cyclin box. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in cyclin-G1 (CCNG1) and similar proteins. CCNG1 is the only cyclin that has either positive or negative effects on cell growth. It is associated with G2/M phase arrest in response to DNA damage. It is also involved in the development of human carcinoma. CCNG1 contains one cyclin box. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20583); members share this curated model.
