identifier: CDD:cd18257
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 28 (KLHL28). KLHL28, also called BTB/POZ domain-containing protein 5 (BTBD5), contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 28 (KLHL28). KLHL28, also called BTB/POZ domain-containing protein 5 (BTBD5), contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18257); members share this curated model.
