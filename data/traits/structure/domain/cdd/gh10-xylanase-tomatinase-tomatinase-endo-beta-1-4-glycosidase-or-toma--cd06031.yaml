label: "GH10_xylanase_tomatinase. Tomatinase (endo-beta-1,4-glycosidase or TomA), N-terminal catalytic domain.  Tomatinase deglycosylates alpha-tomatine to yield less toxic derivatives.  Tomatinase has two domains, an N-terminal catalytic TIM barrel domain and a C-terminal fibronectin III-like domain."
