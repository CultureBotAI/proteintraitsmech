identifier: CDD:cd01785
label: "Ras-associating (RA) domain found in PDZ domain-containing guanine nucleotide exchange factor 1 (PDZ-GEF1) and similar proteins. PDZ-GEF1, also termed Rap guanine nucleotide exchange factor 2, or cyclic nucleotide ras GEF (CNrasGEF), or neural RAP guanine nucleotide exchange protein (nRap GEP), or Ras/Rap1-associating GEF-1 (RA-GEF-1), is a Rap-specific guanine nucleotide exchange factor (GEF) that has a PSD-95/DlgA/ZO-1 (PDZ) domain, a RA domain and a region related to a cyclic nucleotide binding domain (RCBD). The RA domain of PDZ-GEF interacts with Rap1 and also contributes to the membrane localization of PDZ-GEF. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and involve in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes."
definition: >-
  Ras-associating (RA) domain found in PDZ domain-containing guanine nucleotide exchange factor 1 (PDZ-GEF1) and similar proteins. PDZ-GEF1, also termed Rap guanine nucleotide exchange factor 2, or cyclic nucleotide ras GEF (CNrasGEF), or neural RAP guanine nucleotide exchange protein (nRap GEP), or Ras/Rap1-associating GEF-1 (RA-GEF-1), is a Rap-specific guanine nucleotide exchange factor (GEF) that has a PSD-95/DlgA/ZO-1 (PDZ) domain, a RA domain and a region related to a cyclic nucleotide binding domain (RCBD). The RA domain of PDZ-GEF interacts with Rap1 and also contributes to the membrane localization of PDZ-GEF. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and involve in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. — an NCBI CDD conserved domain (cd01785); members share this curated model.
