identifier: CDD:cd16582
label: "RING finger, HC subclass, found in tripartite motif-containing protein 31 (TRIM31) and similar proteins. TRIM31 is an E3 ubiquitin-protein ligase that primarily localizes to the cytoplasm, but is also associated with the mitochondria. It can negatively regulate cell proliferation and may be a potential biomarker of gastric cancer as it is overexpressed from the early stage of gastric carcinogenesis. TRIM31 is downregulated in non-small cell lung cancer and serves as a potential tumor suppressor. It interacts with p52 (Shc) and inhibits Src-induced anchorage-independent growth. TRIM31 belongs to the C-V subclass of the TRIM (tripartite motif) family of proteins that are defined by an N-terminal RBCC (RING, Bbox, and coiled coil) domain, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as an uncharacterized region positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 31 (TRIM31) and similar proteins. TRIM31 is an E3 ubiquitin-protein ligase that primarily localizes to the cytoplasm, but is also associated with the mitochondria. It can negatively regulate cell proliferation and may be a potential biomarker of gastric cancer as it is overexpressed from the early stage of gastric carcinogenesis. TRIM31 is downregulated in non-small cell lung cancer and serves as a potential tumor suppressor. It interacts with p52 (Shc) and inhibits Src-induced anchorage-independent growth. TRIM31 belongs to the C-V subclass of the TRIM (tripartite motif) family of proteins that are defined by an N-terminal RBCC (RING, Bbox, and coiled coil) domain, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as an uncharacterized region positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16582); members share this curated model.
