identifier: CDD:cd02709
label: "GH1_TmGH1_like. TmGH1 is a GH1 (glycosyl hydrolase family 1) aryl-beta-D-glucosidase found in Thermotoga maritima that hydrolyzes_____________________ The TmGH1-like family of aryl-beta-D-glucosidases includes TmGH1 from Thermotoga maritima, BglA and BglB from Bacillus polymyxa, Bgl3 from Streptomyces sp., and Gly(Tn) from the thermophilic eubacterium Thermus nonproteolyticus. The T. maritima BglB is a monomeric exo-beta-glucosidase that hydrolyzes cellobiose and cellodextrins."
definition: >-
  GH1_TmGH1_like. TmGH1 is a GH1 (glycosyl hydrolase family 1) aryl-beta-D-glucosidase found in Thermotoga maritima that hydrolyzes_____________________ The TmGH1-like family of aryl-beta-D-glucosidases includes TmGH1 from Thermotoga maritima, BglA and BglB from Bacillus polymyxa, Bgl3 from Streptomyces sp., and Gly(Tn) from the thermophilic eubacterium Thermus nonproteolyticus. The T. maritima BglB is a monomeric exo-beta-glucosidase that hydrolyzes cellobiose and cellodextrins. — an NCBI CDD conserved domain (cd02709); members share this curated model.
