identifier: CDD:cd22461
label: "third type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana RNA-binding KH domain-containing protein PEPPER and similar proteins. The family includes a group of plant RNA-binding KH domain-containing proteins, such as PEPPER and flowering locus K homology domain protein (FLK). PEPPER regulates vegetative and gynoecium development. It acts as a positive regulator of the central floral repressor FLOWERING LOCUS C. In concert with HUA2, PEPPER antagonizes FLK by positively regulating FLC probably at transcriptional and post-transcriptional levels, and thus acts as a negative regulator of flowering. FLK, also called flowering locus KH domain protein, regulates positively flowering by repressing FLC expression and post-transcriptional modification. PEPPER and FLK contain three K-homology (KH) RNA-binding domains.  The model corresponds to the KH3 domain of PEPPER and FLK."
definition: >-
  third type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana RNA-binding KH domain-containing protein PEPPER and similar proteins. The family includes a group of plant RNA-binding KH domain-containing proteins, such as PEPPER and flowering locus K homology domain protein (FLK). PEPPER regulates vegetative and gynoecium development. It acts as a positive regulator of the central floral repressor FLOWERING LOCUS C. In concert with HUA2, PEPPER antagonizes FLK by positively regulating FLC probably at transcriptional and post-transcriptional levels, and thus acts as a negative regulator of flowering. FLK, also called flowering locus KH domain protein, regulates positively flowering by repressing FLC expression and post-transcriptional modification. PEPPER and FLK contain three K-homology (KH) RNA-binding domains. The model corresponds to the KH3 domain of PEPPER and FLK. — an NCBI CDD conserved domain (cd22461); members share this curated model.
