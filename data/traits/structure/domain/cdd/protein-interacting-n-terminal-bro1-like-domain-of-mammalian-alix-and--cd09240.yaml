identifier: CDD:cd09240
label: "Protein-interacting, N-terminal, Bro1-like domain of mammalian Alix and related domains. This family contains the N-terminal, Bro1-like domain of mammalian Alix (apoptosis-linked gene-2 interacting protein X), also called apoptosis-linked gene-2 interacting protein 1 (AIP1). It belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domains of His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding proteins Rhophilin-1 and -2, Brox, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, Ustilago maydis Rim23 (also known as PalC), and related domains. Alix, HD-PTP, Brox, Bro1, Rim20, and Rim23, interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. Alix participates in membrane remodeling processes during the budding of enveloped viruses, vesicle budding inside late endosomal multivesicular bodies (MVBs), and the abscission reactions of mammalian cell division. It also functions in apoptosis. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Bro1-like domains bind components of the ESCRT-III complex: CHMP4, in the case of Alix. The Alix Bro1-like domain can also bind human immunodeficiency virus type 1 (HIV-1) nucleocapsid and Rab5-specfic GAP (RabGAP5, also known as Rab-GAPLP). In addition to this Bro1-like domain, Alix has a middle V-shaped (V) domain. The Alix V-domain is a dimerization domain, and carries a binding site for the retroviral late assembly (L) domain YPXnL motif, which is partially conserved in the superfamily. Alix also has a C-terminal proline-rich region (PRR) that binds multiple partners including Tsg101 (tumor susceptibility gene 101, a component of ESCRT-1) and the apoptotic protein ALG-2."
definition: >-
  Protein-interacting, N-terminal, Bro1-like domain of mammalian Alix and related domains. This family contains the N-terminal, Bro1-like domain of mammalian Alix (apoptosis-linked gene-2 interacting protein X), also called apoptosis-linked gene-2 interacting protein 1 (AIP1). It belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domains of His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding proteins Rhophilin-1 and -2, Brox, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, Ustilago maydis Rim23 (also known as PalC), and related domains. Alix, HD-PTP, Brox, Bro1, Rim20, and Rim23, interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. Alix participates in membrane remodeling processes during the budding of enveloped viruses, vesicle budding inside late endosomal multivesicular bodies (MVBs), and the abscission reactions of mammalian cell division. It also functions in apoptosis. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Bro1-like domains bind components of the ESCRT-III complex: CHMP4, in the case of Alix. The Alix Bro1-like domain can also bind human immunodeficiency virus type 1 (HIV-1) nucleocapsid and Rab5-specfic GAP (RabGAP5, also known as Rab-GAPLP). In addition to this Bro1-like domain, Alix has a middle V-shaped (V) domain. The Alix V-domain is a dimerization domain, and carries a binding site for the retroviral late assembly (L) domain YPXnL motif, which is partially conserved in the superfamily. Alix also has a C-terminal proline-rich region (PRR) that binds multiple partners including Tsg101 (tumor susceptibility gene 101, a component of ESCRT-1) and the apoptotic protein ALG-2. — an NCBI CDD conserved domain (cd09240); members share this curated model.
