identifier: CDD:cd24074
label: "ATPase-like domain of protein Mlc and similar proteins. Mlc, also called making large colonies protein, acts as a transcriptional repressor that regulates the expression of proteins that are part of the phosphotransferase system for sugar uptake. It regulates the expression of malT. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities."
definition: >-
  ATPase-like domain of protein Mlc and similar proteins. Mlc, also called making large colonies protein, acts as a transcriptional repressor that regulates the expression of proteins that are part of the phosphotransferase system for sugar uptake. It regulates the expression of malT. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. — an NCBI CDD conserved domain (cd24074); members share this curated model.
