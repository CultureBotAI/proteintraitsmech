identifier: CDD:cd10973
label: "Putative catalytic NodB homology domain of uncharacterized bacterial polysaccharide deacetylases which consist of a 5-stranded beta/alpha barrel. This family contains many uncharacterized bacterial polysaccharide deacetylases. Although their biological functions remain unknown, all members of the family are predicted to contain a conserved domain with a 5-stranded beta/alpha barrel, which is similar to the catalytic NodB homology domain of rhizobial NodB-like proteins, belonging to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative catalytic NodB homology domain of uncharacterized bacterial polysaccharide deacetylases which consist of a 5-stranded beta/alpha barrel. This family contains many uncharacterized bacterial polysaccharide deacetylases. Although their biological functions remain unknown, all members of the family are predicted to contain a conserved domain with a 5-stranded beta/alpha barrel, which is similar to the catalytic NodB homology domain of rhizobial NodB-like proteins, belonging to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10973); members share this curated model.
