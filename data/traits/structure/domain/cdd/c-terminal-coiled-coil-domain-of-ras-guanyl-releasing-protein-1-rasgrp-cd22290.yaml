identifier: CDD:cd22290
label: "C-terminal coiled-coil domain of RAS guanyl-releasing protein 1 (RasGRP1) and similar proteins. RasGRP1, also called calcium and DAG-regulated guanine nucleotide exchange factor II (CalDAG-GEFII), or Ras guanyl-releasing protein, acts as a calcium- and diacylglycerol (DAG)-regulated nucleotide exchange factor, specifically activating Ras through the exchange of bound GDP for GTP. This model corresponds to the C-terminal coiled-coil domain of RasGRP1, which mediates oligomerization."
definition: >-
  C-terminal coiled-coil domain of RAS guanyl-releasing protein 1 (RasGRP1) and similar proteins. RasGRP1, also called calcium and DAG-regulated guanine nucleotide exchange factor II (CalDAG-GEFII), or Ras guanyl-releasing protein, acts as a calcium- and diacylglycerol (DAG)-regulated nucleotide exchange factor, specifically activating Ras through the exchange of bound GDP for GTP. This model corresponds to the C-terminal coiled-coil domain of RasGRP1, which mediates oligomerization. — an NCBI CDD conserved domain (cd22290); members share this curated model.
