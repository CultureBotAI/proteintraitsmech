identifier: CDD:cd23462
label: "ricin B-type lectin domain, beta-trefoil fold, found in Drosophila melanogaster polypeptide N-acetylgalactosaminyltransferase 9 (Pgant9) and similar proteins. The subfamily includes Pgant9 (also called pp-GaNTase 9, protein-UDP acetylgalactosaminyltransferase 9, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 9), Pgant4 (also called pp-GaNTase 4, N-acetylgalactosaminyltransferase 4, protein-UDP acetylgalactosaminyltransferase 4, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 4) and Pgant6 (also called pp-GaNTase 6, N-acetylgalactosaminyltransferase 6, protein-UDP acetylgalactosaminyltransferase 6, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 6). They function as GalNAc transferases (EC 2.4.1.41) that catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. Pgant9 can both act as a peptide transferase that transfers GalNAc onto unmodified peptide substrates, and as a glycopeptide transferase that requires the prior addition of a GalNAc on a peptide before adding additional GalNAc moieties. Pgant4 and Pgant6 do not act as a peptide transferase, but instead requires the prior addition of a GalNAc on a peptide before adding additional GalNAc moieties. They prefer the diglycosylated Muc5AC-3/13 as a substrate. Pgant6 may have a role in protein O-glycosylation in the Golgi and thereby in establishing and/or maintaining a proper secretory apparatus structure. Members of this subfamily contain a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Drosophila melanogaster polypeptide N-acetylgalactosaminyltransferase 9 (Pgant9) and similar proteins. The subfamily includes Pgant9 (also called pp-GaNTase 9, protein-UDP acetylgalactosaminyltransferase 9, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 9), Pgant4 (also called pp-GaNTase 4, N-acetylgalactosaminyltransferase 4, protein-UDP acetylgalactosaminyltransferase 4, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 4) and Pgant6 (also called pp-GaNTase 6, N-acetylgalactosaminyltransferase 6, protein-UDP acetylgalactosaminyltransferase 6, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 6). They function as GalNAc transferases (EC 2.4.1.41) that catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. Pgant9 can both act as a peptide transferase that transfers GalNAc onto unmodified peptide substrates, and as a glycopeptide transferase that requires the prior addition of a GalNAc on a peptide before adding additional GalNAc moieties. Pgant4 and Pgant6 do not act as a peptide transferase, but instead requires the prior addition of a GalNAc on a peptide before adding additional GalNAc moieties. They prefer the diglycosylated Muc5AC-3/13 as a substrate. Pgant6 may have a role in protein O-glycosylation in the Golgi and thereby in establishing and/or maintaining a proper secretory apparatus structure. Members of this subfamily contain a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23462); members share this curated model.
