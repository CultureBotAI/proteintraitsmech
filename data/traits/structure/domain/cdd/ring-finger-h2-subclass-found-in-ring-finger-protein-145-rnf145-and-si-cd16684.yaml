identifier: CDD:cd16684
label: "RING finger, H2 subclass, found in RING finger protein 145 (RNF145) and similar proteins. RNF145 is an uncharacterized RING finger protein encoded by the RNF145 gene, which is expressed in T lymphocytes, and its expression is altered in acute myelomonocytic and acute promyelocytic leukemias. Although its biological function remains unclear, RNF145 shows high sequence similarity with RNF139, an endoplasmic reticulum (ER)-resident multi-transmembrane protein that functions as a potent growth suppressor in mammalian cells, inducing G2/M arrest, decreased DNA synthesis and increased apoptosis. Like RNF139, RNF145 contains a C3H2C3-type RING-H2 finger with possible E3-ubiquitin ligase activity."
definition: >-
