identifier: CDD:cd10392
label: "Src homology 2 domain found in SH2 domain-containing adapter protein F (SHF). SHF is thought to play a role in PDGF-receptor signaling and regulation of apoptosis. SHF is mainly expressed in skeletal muscle, brain, liver, prostate, testis, ovary, small intestine, and colon. SHF contains  four putative tyrosine phosphorylation sites and an SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in SH2 domain-containing adapter protein F (SHF). SHF is thought to play a role in PDGF-receptor signaling and regulation of apoptosis. SHF is mainly expressed in skeletal muscle, brain, liver, prostate, testis, ovary, small intestine, and colon. SHF contains four putative tyrosine phosphorylation sites and an SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10392); members share this curated model.
