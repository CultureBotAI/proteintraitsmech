identifier: CDD:cd16717
label: "variant of RING finger, HC subclass, found in interferon regulatory factor 2-binding protein-like (IRF-2BPL). IRF-2BPL, also known as C14orf4 or enhanced at puberty protein 1(EAP1), is a homolog of interferon regulatory factor 2-binding proteins, IRF-2BP1 and IRF-2BP2. It is expressed in the mediobasal hypothalamus and plays a critical function in regulating the female reproductive neuroendocrine axis. IRF-2BPL is a proline-rich protein with polyglutamine and polyalanine tracks at the N-terminus and a C3HC4-type RING-HC finger domain with a partially new pattern at the C-terminus."
definition: >-
  variant of RING finger, HC subclass, found in interferon regulatory factor 2-binding protein-like (IRF-2BPL). IRF-2BPL, also known as C14orf4 or enhanced at puberty protein 1(EAP1), is a homolog of interferon regulatory factor 2-binding proteins, IRF-2BP1 and IRF-2BP2. It is expressed in the mediobasal hypothalamus and plays a critical function in regulating the female reproductive neuroendocrine axis. IRF-2BPL is a proline-rich protein with polyglutamine and polyalanine tracks at the N-terminus and a C3HC4-type RING-HC finger domain with a partially new pattern at the C-terminus. — an NCBI CDD conserved domain (cd16717); members share this curated model.
