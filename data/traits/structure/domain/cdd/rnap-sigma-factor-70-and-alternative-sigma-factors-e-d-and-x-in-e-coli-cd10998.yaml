identifier: CDD:cd10998
label: "RNAP sigma factor 70 and alternative sigma factors E, D, and X. In E.coli, Sigma E is an alternative sigma factor which responds to environmental stress, or conditions that would initiate protein denaturation as well as directing promoter recognition specificity on the DNA template which is being transcribed. In Bacillus subtilis, Sigma E is responsibile in the sporulation process. Sigma D and Sigma X are two alternative Sigma factors in Bacillus subtilis. Sigma X is also in the ECF(Extra-cytoplasmic function) subfamily of sigma factors, and Sigma D is involed in chemotaxis, motility, and autolysis in Bacillus subtilis. The regulon for Sigma X is also overlapped by another alternative sigma factor which is found in Bacillus subtilis, Sigma W. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs."
definition: >-
  RNAP sigma factor 70 and alternative sigma factors E, D, and X. In E.coli, Sigma E is an alternative sigma factor which responds to environmental stress, or conditions that would initiate protein denaturation as well as directing promoter recognition specificity on the DNA template which is being transcribed. In Bacillus subtilis, Sigma E is responsibile in the sporulation process. Sigma D and Sigma X are two alternative Sigma factors in Bacillus subtilis. Sigma X is also in the ECF(Extra-cytoplasmic function) subfamily of sigma factors, and Sigma D is involed in chemotaxis, motility, and autolysis in Bacillus subtilis. The regulon for Sigma X is also overlapped by another alternative sigma factor which is found in Bacillus subtilis, Sigma W. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs. — an NCBI CDD conserved domain (cd10998); members share this curated model.
