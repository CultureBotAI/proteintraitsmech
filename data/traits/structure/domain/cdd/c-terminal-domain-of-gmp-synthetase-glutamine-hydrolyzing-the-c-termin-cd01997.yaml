identifier: CDD:cd01997
label: "C-terminal domain of GMP synthetase (glutamine-hydrolyzing). The C-terminal domain of GMP synthetase (glutamine-hydrolyzing, EC 6.3.5.2) contains two subdomains: the ATP pyrophosphatase domain at the N-terminal and the dimerization domain at the C-terminal end. The ATP-PPase domain is a twisted, five-stranded parallel beta-sheet sandwiched between helical layers. It has a signature nucleotide-binding motif, or PP-loop, at the end of the first-beta strand. GMP synthetase is a homodimer, but in some archaea, it is a heterodimer made up of ATP pyrophosphatase (ATP-PPase) and a GATase subunit. In eukaryotes and bacteria, the two catalytic units are encoded by a single gene producing a two-domain-type GMP with a GATase domain in the N-terminus and an ATP-PPase domain in the C-terminus."
definition: >-
  C-terminal domain of GMP synthetase (glutamine-hydrolyzing). The C-terminal domain of GMP synthetase (glutamine-hydrolyzing, EC 6.3.5.2) contains two subdomains: the ATP pyrophosphatase domain at the N-terminal and the dimerization domain at the C-terminal end. The ATP-PPase domain is a twisted, five-stranded parallel beta-sheet sandwiched between helical layers. It has a signature nucleotide-binding motif, or PP-loop, at the end of the first-beta strand. GMP synthetase is a homodimer, but in some archaea, it is a heterodimer made up of ATP pyrophosphatase (ATP-PPase) and a GATase subunit. In eukaryotes and bacteria, the two catalytic units are encoded by a single gene producing a two-domain-type GMP with a GATase domain in the N-terminus and an ATP-PPase domain in the C-terminus. — an NCBI CDD conserved domain (cd01997); members share this curated model.
