identifier: CDD:cd16635
label: "Modified RING finger, HC subclass (C3HC3D-type), found in PHD and RING finger domain-containing protein 1 (PHRF1) and similar proteins. PHRF1, also known as KIAA1542, or CTD-binding SR-like protein rA9, is a ubiquitin ligase which induces the ubiquitination of TGIF (TG-interacting factor) at lysine 130. It acts as a tumor suppressor that promotes the transforming growth factor (TGF)-beta cytostatic program through selective release of TGIF-driven promyelocytic leukemia protein (PML) inactivation. PHRF1 contains a plant homeodomain (PHD) finger and a modified C3HC3D-type RING-HC finger."
definition: >-
  Modified RING finger, HC subclass (C3HC3D-type), found in PHD and RING finger domain-containing protein 1 (PHRF1) and similar proteins. PHRF1, also known as KIAA1542, or CTD-binding SR-like protein rA9, is a ubiquitin ligase which induces the ubiquitination of TGIF (TG-interacting factor) at lysine 130. It acts as a tumor suppressor that promotes the transforming growth factor (TGF)-beta cytostatic program through selective release of TGIF-driven promyelocytic leukemia protein (PML) inactivation. PHRF1 contains a plant homeodomain (PHD) finger and a modified C3HC3D-type RING-HC finger. — an NCBI CDD conserved domain (cd16635); members share this curated model.
