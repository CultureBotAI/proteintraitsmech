identifier: CDD:cd02573
label: "Pseudouridine synthase, Escherichia coli TruB like. This group consists of bacterial pseudouridine synthases similar to E. coli TruB and Mycobacterium tuberculosis TruB. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi).  E. coli TruB and M.  tuberculosis TruB make psi55 in the T loop of tRNAs. Psi55 is nearly universally conserved.  E. coli TruB is not inhibited by RNA containing 5-fluorouridine."
definition: >-
  Pseudouridine synthase, Escherichia coli TruB like. This group consists of bacterial pseudouridine synthases similar to E. coli TruB and Mycobacterium tuberculosis TruB. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi). E. coli TruB and M. tuberculosis TruB make psi55 in the T loop of tRNAs. Psi55 is nearly universally conserved. E. coli TruB is not inhibited by RNA containing 5-fluorouridine. — an NCBI CDD conserved domain (cd02573); members share this curated model.
