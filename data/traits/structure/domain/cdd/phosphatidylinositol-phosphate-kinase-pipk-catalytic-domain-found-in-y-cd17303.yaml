identifier: CDD:cd17303
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in yeast phosphatidylinositol 4-phosphate 5-kinases (PIP5Ks) and similar proteins. PIP5K (EC 2.7.1.68), also known as PtdIns(4)P-5-kinase, or diphosphoinositide kinase, phosphorylates phosphatidylinositol-4-phosphate to produce phosphatidylinositol-4,5-bisphosphate as a precursor of two second messengers, inositol-1,4,5-triphosphate and diacylglycerol, and as a regulator of many cellular proteins involved in signal transduction and cytoskeletal organization. The family includes Saccharomyces cerevisiae PIP5K MSS4, Schizosaccharomyces pombe PIP5K Its3. MSS4 is required for organization of the actin cytoskeleton in budding yeast. Its3 is involved, together with the calcineurin ppb1, in cytokinesis of fission yeast."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in yeast phosphatidylinositol 4-phosphate 5-kinases (PIP5Ks) and similar proteins. PIP5K (EC 2.7.1.68), also known as PtdIns(4)P-5-kinase, or diphosphoinositide kinase, phosphorylates phosphatidylinositol-4-phosphate to produce phosphatidylinositol-4,5-bisphosphate as a precursor of two second messengers, inositol-1,4,5-triphosphate and diacylglycerol, and as a regulator of many cellular proteins involved in signal transduction and cytoskeletal organization. The family includes Saccharomyces cerevisiae PIP5K MSS4, Schizosaccharomyces pombe PIP5K Its3. MSS4 is required for organization of the actin cytoskeleton in budding yeast. Its3 is involved, together with the calcineurin ppb1, in cytokinesis of fission yeast. — an NCBI CDD conserved domain (cd17303); members share this curated model.
