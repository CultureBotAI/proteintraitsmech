identifier: CDD:cd18165
label: "PRC-barrel domain found in Methanothermobacter thermautotrophicus protein MTH1859 and similar proteins. This family includes a group uncharacterized proteins similar to Methanothermobacter thermautotrophicus protein MTH1859, and two uncharacterized proteins from Bacillus subtilis, YlmC and YmxH. MTH1859 may function as an adapter for protein complex assembly. It adopts a mainly anti-parallel all-beta-fold. Its monomer structure possesses similarities to the photoreaction center (PRC) domain fold, but the protein employs a unique oligomerization scheme."
definition: >-
  PRC-barrel domain found in Methanothermobacter thermautotrophicus protein MTH1859 and similar proteins. This family includes a group uncharacterized proteins similar to Methanothermobacter thermautotrophicus protein MTH1859, and two uncharacterized proteins from Bacillus subtilis, YlmC and YmxH. MTH1859 may function as an adapter for protein complex assembly. It adopts a mainly anti-parallel all-beta-fold. Its monomer structure possesses similarities to the photoreaction center (PRC) domain fold, but the protein employs a unique oligomerization scheme. — an NCBI CDD conserved domain (cd18165); members share this curated model.
