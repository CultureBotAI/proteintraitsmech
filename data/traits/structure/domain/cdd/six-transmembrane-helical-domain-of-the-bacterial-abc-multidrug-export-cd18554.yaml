identifier: CDD:cd18554
label: "Six-transmembrane helical domain of the bacterial ABC multidrug exporter Sav1866 and similar proteins. This group represents the homodimeric bacterial ABC multidrug exporter Sav1866, which is homologous to the lipid flippase MsbA, and both of which are functionally related to the human P-glycoprotein multidrug transporter (ABCB1 or MDR1). This transmembrane (TM) subunit possesses the ATP-binding cassette (ABC) exporter fold, which is characterized by 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds, a various type of lipids and polypeptides. ABC transporters typically consist of two transmembrane domains (TMDs) and two nucleotide-binding domains (NBDs). The sequences and structures of the TMDs are quite varied between the different type of transporters, suggesting significant structural diversity of the translocated substrates, while NBDs are conserved among all ABC transporters. The two NBDs together bind and hydrolyze ATP, thereby providing the driving force for transport, while the TMDs participate in substrate recognition and translocation across the lipid membrane by alternating between inward- and outward-facing conformations. Bacterial exporters are typically formed by dimers of TMD-NBD half-transporters. Thus, most bacterial ABC transporters are formed of two identical TMDs and two identical NBDs."
definition: >-
  Six-transmembrane helical domain of the bacterial ABC multidrug exporter Sav1866 and similar proteins. This group represents the homodimeric bacterial ABC multidrug exporter Sav1866, which is homologous to the lipid flippase MsbA, and both of which are functionally related to the human P-glycoprotein multidrug transporter (ABCB1 or MDR1). This transmembrane (TM) subunit possesses the ATP-binding cassette (ABC) exporter fold, which is characterized by 6 TM helices per subunit (domain), or a total of 12 TM helices for the complete transporter. The ABC exporters are found in both prokaryotes and eukaryotes, where they mediate the cellular secretion of toxic compounds, a various type of lipids and polypeptides. ABC transporters typically consist of two transmembrane domains (TMDs) and two nucleotide-binding domains (NBDs). The sequences and structures of the TMDs are quite varied between the different type of transporters, suggesting significant structural diversity of the translocated substrates, while NBDs are conserved among all ABC transporters. The two NBDs together bind and hydrolyze ATP, thereby providing the driving force for transport, while the TMDs participate in substrate recognition and translocation across the lipid membrane by alternating between inward- and outward-facing conformations. Bacterial exporters are typically formed by dimers of TMD-NBD half-transporters. Thus, most bacterial ABC transporters are formed of two identical TMDs and two identical NBDs. — an NCBI CDD conserved domain (cd18554); members share this curated model.
