identifier: CDD:cd22450
label: "fifth type I K homology (KH) RNA-binding domain found in Saccharomyces cerevisiae Protein SCP160 and similar proteins. SCP160, also called protein HX, is a new yeast protein associated with the nuclear membrane and the endoplasmic reticulum. It is involved in the control of mitotic chromosome transmission. It is required during cell division for faithful partitioning of the ER-nuclear envelope membranes which enclose the duplicated chromosomes in yeast. SCP160 contains seven K-homology (KH) RNA-binding domains. The model corresponds to the fifth one."
definition: >-
  fifth type I K homology (KH) RNA-binding domain found in Saccharomyces cerevisiae Protein SCP160 and similar proteins. SCP160, also called protein HX, is a new yeast protein associated with the nuclear membrane and the endoplasmic reticulum. It is involved in the control of mitotic chromosome transmission. It is required during cell division for faithful partitioning of the ER-nuclear envelope membranes which enclose the duplicated chromosomes in yeast. SCP160 contains seven K-homology (KH) RNA-binding domains. The model corresponds to the fifth one. — an NCBI CDD conserved domain (cd22450); members share this curated model.
