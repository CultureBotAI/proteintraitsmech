identifier: CDD:cd20090
label: "F-box domain found in F-box/WD repeat-containing protein 4 (FBXW4) and similar proteins. FBXW4, also called dactylin, or F-box and WD-40 domain-containing protein 4, probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It is likely to be involved in key signaling pathways crucial for normal limb development. It may participate in Wnt signaling and act as a novel tumor suppressor that regulates important cellular processes. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/WD repeat-containing protein 4 (FBXW4) and similar proteins. FBXW4, also called dactylin, or F-box and WD-40 domain-containing protein 4, probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It is likely to be involved in key signaling pathways crucial for normal limb development. It may participate in Wnt signaling and act as a novel tumor suppressor that regulates important cellular processes. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd20090); members share this curated model.
