identifier: CDD:cd16365
label: "beta FeS subunits DMSOR NarH-like family. This subfamily contains beta FeS subunits of several DMSO reductase superfamily, including nitrate reductase A, ethylbenzene dehydrogenase and selenate reductase.  DMSO Reductase (DMSOR) family members have a large, periplasmic molybdenum-containing alpha subunit as well as a small beta FeS subunit, and may also have a small gamma subunit. . The beta subunits of DMSOR contains four Fe4/S4 and/or Fe3/S4 clusters which transfer the electrons from the alpha subunit to a hydrophobic integral membrane protein, presumably a cytochrome containing two b-type heme groups. The reducing equivalents are then transferred to menaquinone, which finally reduces the electron-accepting enzyme system. Nitrate reductase A contains three subunits (the catalytic subunit NarG, the catalytic subunit NarH with four [Fe-S] clusters, and integral membrane subunit NarI) and often forms a respiratory chain with the formate dehydrogenase via the lipid soluble quinol pool. Ethylbenzene dehydrogenase oxidizes the hydrocarbon ethylbenzene to (S)-1-phenylethanol. Selenate reductase catalyzes reduction of selenate to selenite in bacterial species that can obtain energy by respiring anaerobically with selenate as the terminal electron acceptor."
definition: >-
  beta FeS subunits DMSOR NarH-like family. This subfamily contains beta FeS subunits of several DMSO reductase superfamily, including nitrate reductase A, ethylbenzene dehydrogenase and selenate reductase. DMSO Reductase (DMSOR) family members have a large, periplasmic molybdenum-containing alpha subunit as well as a small beta FeS subunit, and may also have a small gamma subunit. . The beta subunits of DMSOR contains four Fe4/S4 and/or Fe3/S4 clusters which transfer the electrons from the alpha subunit to a hydrophobic integral membrane protein, presumably a cytochrome containing two b-type heme groups. The reducing equivalents are then transferred to menaquinone, which finally reduces the electron-accepting enzyme system. Nitrate reductase A contains three subunits (the catalytic subunit NarG, the catalytic subunit NarH with four [Fe-S] clusters, and integral membrane subunit NarI) and often forms a respiratory chain with the formate dehydrogenase via the lipid soluble quinol pool. Ethylbenzene dehydrogenase oxidizes the hydrocarbon ethylbenzene to (S)-1-phenylethanol. Selenate reductase catalyzes reduction of selenate to selenite in bacterial species that can obtain energy by respiring anaerobically with selenate as the terminal electron acceptor. — an NCBI CDD conserved domain (cd16365); members share this curated model.
