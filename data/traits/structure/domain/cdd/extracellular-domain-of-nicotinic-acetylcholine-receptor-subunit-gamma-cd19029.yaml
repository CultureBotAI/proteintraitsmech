identifier: CDD:cd19029
label: "extracellular domain of nicotinic acetylcholine receptor subunit gamma (CHRNG). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit gamma (gamma), encoded by the CHRNG gene expressed during early fetal development, and replaced by the epsilon subunit in the adult. The gamma subunit forms a heteropentamer with (alpha1)2, beta, and delta and plays a role in neuromuscular organogenesis and ligand binding. Disruption of gamma subunit expression prevents the correct localization of the receptor in cell membranes. Mutations in CHRNG may cause the non-lethal Escobar variant (EVMPS) and lethal form (LMPS) of multiple pterygium syndrome (MPS), a condition characterized by prenatal growth failure with pterygium and akinesia leading to muscle weakness and severe congenital contractures, as well as scoliosis. Muscle-type acetylcholine receptor is the major antigen in the autoimmune disease myasthenia gravis."
