identifier: CDD:cd23685
label: "Tetrahymena thermophila ribosomal protein uS7m and similar proteins. Ribosomal protein uS7m, also called Ymf63, is a component of small subunit (SSU) in Tetrahymena thermophila mitoribosome. The structure of the mitoribosomal complex reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit, while the large subunit (LSU) lacks 5S rRNA."
definition: >-
  Tetrahymena thermophila ribosomal protein uS7m and similar proteins. Ribosomal protein uS7m, also called Ymf63, is a component of small subunit (SSU) in Tetrahymena thermophila mitoribosome. The structure of the mitoribosomal complex reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit, while the large subunit (LSU) lacks 5S rRNA. — an NCBI CDD conserved domain (cd23685); members share this curated model.
