identifier: CDD:cd05621
label: "Catalytic domain of the Serine/Threonine Kinase, Rho-associated coiled-coil containing protein kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. ROCK2 was the first identified target of activated RhoA, and was found to play a role in stress fiber and focal adhesion formation. It is prominently expressed in the brain, heart, and skeletal muscles. It is implicated in vascular and neurological disorders, such as hypertension and vasospasm of the coronary and cerebral arteries. ROCK2 is also activated by caspase-2 cleavage, resulting in thrombin-induced microparticle generation in response to cell activation. Mice deficient in ROCK2 show intrauterine growth retardation and embryonic lethality because of placental dysfunction. ROCK contains an N-terminal extension, a catalytic kinase domain, and a C-terminal extension, which contains a coiled-coil region encompassing a Rho-binding domain (RBD) and a pleckstrin homology (PH) domain. ROCK is auto-inhibited by the RBD and PH domain interacting with the catalytic domain, and is activated via interaction with Rho GTPases. The ROCK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Rho-associated coiled-coil containing protein kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. ROCK2 was the first identified target of activated RhoA, and was found to play a role in stress fiber and focal adhesion formation. It is prominently expressed in the brain, heart, and skeletal muscles. It is implicated in vascular and neurological disorders, such as hypertension and vasospasm of the coronary and cerebral arteries. ROCK2 is also activated by caspase-2 cleavage, resulting in thrombin-induced microparticle generation in response to cell activation. Mice deficient in ROCK2 show intrauterine growth retardation and embryonic lethality because of placental dysfunction. ROCK contains an N-terminal extension, a catalytic kinase domain, and a C-terminal extension, which contains a coiled-coil region encompassing a Rho-binding domain (RBD) and a pleckstrin homology (PH) domain. ROCK is auto-inhibited by the RBD and PH domain interacting with the catalytic domain, and is activated via interaction with Rho GTPases. The ROCK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05621); members share this curated model.
