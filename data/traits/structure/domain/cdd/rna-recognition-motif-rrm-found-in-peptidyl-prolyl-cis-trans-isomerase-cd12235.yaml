identifier: CDD:cd12235
label: "RNA recognition motif (RRM) found in peptidyl-prolyl cis-trans isomerase-like 4 (PPIase) and similar proteins. This subfamily corresponds to the RRM of PPIase, also termed cyclophilin-like protein PPIL4, or rotamase PPIL4, a novel nuclear RNA-binding protein encoded by cyclophilin-like PPIL4 gene. The precise role of PPIase remains unclear. PPIase contains a conserved N-terminal peptidyl-prolyl cistrans isomerase (PPIase) motif, a central RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a lysine rich domain, and a pair of bipartite nuclear targeting sequences (NLS) at the C-terminus."
definition: >-
  RNA recognition motif (RRM) found in peptidyl-prolyl cis-trans isomerase-like 4 (PPIase) and similar proteins. This subfamily corresponds to the RRM of PPIase, also termed cyclophilin-like protein PPIL4, or rotamase PPIL4, a novel nuclear RNA-binding protein encoded by cyclophilin-like PPIL4 gene. The precise role of PPIase remains unclear. PPIase contains a conserved N-terminal peptidyl-prolyl cistrans isomerase (PPIase) motif, a central RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a lysine rich domain, and a pair of bipartite nuclear targeting sequences (NLS) at the C-terminus. — an NCBI CDD conserved domain (cd12235); members share this curated model.
