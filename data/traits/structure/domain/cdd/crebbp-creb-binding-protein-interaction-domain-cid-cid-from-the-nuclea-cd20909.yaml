identifier: CDD:cd20909
label: "CREBBP (CREB-binding protein) interaction domain (CID). CID from the nuclear coactivator protein nuclear receptor coactivator 1 (NCOA1), NCOA2, and NCOA3 is an intrinsically disordered protein (IDP) domain that its association with nuclear coactivator binding domain (NCBD) of CREB-binding protein (CREBBP, also called CBP, and its paralog p300 (CREBBP/p300)) results in a more efficient transcription. IDPs do not have rigid 3D structures, showing changes in their folding depending on the environment or ligands. Some IDPs, when aberrantly folded, can be the cause of some diseases such as alzheimer and parkinson."
definition: >-
  CREBBP (CREB-binding protein) interaction domain (CID). CID from the nuclear coactivator protein nuclear receptor coactivator 1 (NCOA1), NCOA2, and NCOA3 is an intrinsically disordered protein (IDP) domain that its association with nuclear coactivator binding domain (NCBD) of CREB-binding protein (CREBBP, also called CBP, and its paralog p300 (CREBBP/p300)) results in a more efficient transcription. IDPs do not have rigid 3D structures, showing changes in their folding depending on the environment or ligands. Some IDPs, when aberrantly folded, can be the cause of some diseases such as alzheimer and parkinson. — an NCBI CDD conserved domain (cd20909); members share this curated model.
