identifier: CDD:cd05872
label: "Immunoglobulin (Ig)-like domain of the class IV semaphorin Sema4B. The members here are composed of the immunoglobulin (Ig)-like domain of Sema4B and similar proteins. Sema4B is a Class IV semaphorin. Semaphorins are classified based on structural features additional to the Sema domain. Sema4B has extracellular Sema and Ig domains, a transmembrane domain, and a short cytoplasmic domain. Sema4B has been shown to preferentially regulate the development of the postsynaptic specialization at the glutamatergic synapses. This cytoplasmic domain includes a PDZ-binding motif upon which the synaptic localization of Sem4B is dependent. Sema4B is a ligand of CLCP1. CLCP1 was identified in an expression profiling analysis, which compared a highly metastic lung cancer subline with its low metastic parental line. Sema4B was shown to promote CLCP1 endocytosis and their interaction is a potential target for therapeutic intervention of metastasis."
