identifier: CDD:cd17058
label: "ubiquitin-like (Ubl) domain found in small nuclear ribonucleoprotein U11/U12 subunit 25 (SNRNP25) and similar proteins. SNRNP25, also termed U11/U12 small nuclear ribonucleoprotein 25 kDa protein, U11/U12 snRNP 25 kDa protein (U11/U12-25K), or minus-99 protein, is a component of the U11/U12 snRNPs that are part of the U12-type spliceosome. It contains a conserved ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions."
definition: >-
  ubiquitin-like (Ubl) domain found in small nuclear ribonucleoprotein U11/U12 subunit 25 (SNRNP25) and similar proteins. SNRNP25, also termed U11/U12 small nuclear ribonucleoprotein 25 kDa protein, U11/U12 snRNP 25 kDa protein (U11/U12-25K), or minus-99 protein, is a component of the U11/U12 snRNPs that are part of the U12-type spliceosome. It contains a conserved ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. — an NCBI CDD conserved domain (cd17058); members share this curated model.
