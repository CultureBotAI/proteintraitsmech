identifier: CDD:cd09827
label: "The PET domain of Prickle. The PET domain of Prickle: Prickle contains an N-terminal PET domain and three C-terminal LIM domains. Prickle has been implicated in regulation of cell movement in the planar cell polarity (PCP) pathway which   requires the conserved Frizzled/Dishevelled (Dsh); Prickle interacts with Dishevelled, thereby modulating the activity of Frizzled/Dishevelled and the PCP signaling. Two forms of Prickle have been identified, namely Prickle 1 and Prickle 2. These are differentially expressed; Prickle 1 is found in fetal heart and hematological malignancies, while Prickle 2 is expressed in fetal brain, adult cartilage, pancreatic islet, and some types of timorous cells. The PET domain is a protein-protein interaction domain, usually found in conjunction with the LIM domain, which is also involved in protein-protein interactions. The PET containing proteins serve as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The PET domain of Prickle. The PET domain of Prickle: Prickle contains an N-terminal PET domain and three C-terminal LIM domains. Prickle has been implicated in regulation of cell movement in the planar cell polarity (PCP) pathway which requires the conserved Frizzled/Dishevelled (Dsh); Prickle interacts with Dishevelled, thereby modulating the activity of Frizzled/Dishevelled and the PCP signaling. Two forms of Prickle have been identified, namely Prickle 1 and Prickle 2. These are differentially expressed; Prickle 1 is found in fetal heart and hematological malignancies, while Prickle 2 is expressed in fetal brain, adult cartilage, pancreatic islet, and some types of timorous cells. The PET domain is a protein-protein interaction domain, usually found in conjunction with the LIM domain, which is also involved in protein-protein interactions. The PET containing proteins serve as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09827); members share this curated model.
