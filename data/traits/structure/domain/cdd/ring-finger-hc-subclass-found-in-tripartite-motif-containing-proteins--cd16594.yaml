identifier: CDD:cd16594
label: "RING finger, HC subclass, found in tripartite motif-containing proteins, TRIM7, TRIM11 and TRIM27, and similar proteins. TRIM7, TRIM11 and TRIM27, closely related tripartite motif-containing proteins, belong to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox2, and a coiled coil region, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain. TRIM7, also known as glycogenin-interacting protein (GNIP) or RING finger protein 90 (RNF90), is an E3 ubiquitin-protein ligase that mediates c-Jun/AP-1 activation by Ras signalling. Its phosphorylation and activation by MSK1 in response to direct activation by the Ras-Raf-MEK-ERK pathway can stimulate TRIM7 E3 ubiquitin ligase activity in mediating Lys63-linked ubiquitination of the AP-1 coactivator RACO-1, leading to RACO-1 protein stabilization. Moreover, TRIM7 binds and activates glycogenin, the self-glucosylating initiator of glycogen biosynthesis. TRIM11, also known as protein BIA1, or RING finger protein 92 (RNF92), is an E3 ubiquitin-protein ligase involved in the development of the central nervous system. It is overexpressed in high-grade gliomas and promotes proliferation, invasion, migration and glial tumor growth. TRIM11 acts as a potential therapeutic target for congenital central hypoventilation syndrome (CCHS) by mediating the degradation of CCHS-associated polyalanine-expanded Phox2b. TRIM11 modulates the function of neurogenic transcription factor Pax6 through the ubiquitin-proteosome system, and thus plays an essential role for Pax6-dependent neurogenesis. It also binds to and destabilizes a key component of the activator-mediated cofactor complex (ARC105), humanin, a neuroprotective peptide against Alzheimer's disease-relevant insults, and further regulates ARC105 function in transforming growth factor beta (TGFbeta) signaling. Moreover, TRIM11 negatively regulates retinoic acid-inducible gene-I (RIG-I)-mediated interferon-beta (IFNbeta) production and antiviral activity by targeting TANK-binding kinase-1 (TBK1). It may contribute to the endogenous restriction of retroviruses in cells. It enhances N-tropic murine leukemia virus (N-MLV) entry by interfering with Ref1 restriction. It also suppresses the early steps of human immunodeficiency virus HIV-1 transduction, resulting in decreased reverse transcripts. TRIM27, also known as RING finger protein 76 (RNF76), RET finger protein (RFP), or zinc finger protein RFP, is a nuclear E3 ubiquitin-protein ligase that is highly expressed in testis and in various tumor cell lines. Expression of TRIM27 is associated with prognosis of colon and endometrial cancers. TRIM27 was first identified as a fusion partner of the RET receptor tyrosine kinase. It functions as a transcriptional repressor and associates with several proteins involved in transcriptional activity, such as enhancer of polycomb 1 (Epc1), a member of the Polycomb group proteins, and Mi-2beta, a main component of the nucleosome remodeling and deacetylase (NuRD) complex, and the cell cycle regulator retinoblastoma protein (RB1). It also interacts with HDAC1, leading to downregulation of thioredoxin binding protein 2 (TBP-2), which inhibits the function of thioredoxin. Moreover, TRIM27 mediates Pax7-induced ubiquitination of MyoD in skeletal muscle atrophy. In addition, it inhibits muscle differentiation by modulating serum response factor (SRF) and Epc1. TRIM27 promotes a non-canonical polyubiquitination of PTEN, a lipid phosphatase that catalyzes PtdIns(3,4,5)P3 (PIP3) to PtdIns(4,5)P2 (PIP2). It is an IKKepsilon-interacting protein that regulates IkappaB kinase (IKK) function and negatively regulates signaling involved in the antiviral response and inflammation. TRIM27 also forms a protein complex with MBD4 or MBD2 or MBD3, and thus plays an important role in the enhancement of transcriptional repression through MBD proteins in tumorigenesis, spermatogenesis, and embryogenesis. It is a component of an estrogen receptor 1 (ESR1) regulatory complex that is involved in estrogen receptor-mediated transcription in MCF-7 cells."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing proteins, TRIM7, TRIM11 and TRIM27, and similar proteins. TRIM7, TRIM11 and TRIM27, closely related tripartite motif-containing proteins, belong to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox2, and a coiled coil region, as well as a SPRY/B30.2 domain positioned C-terminal to the RBCC domain. TRIM7, also known as glycogenin-interacting protein (GNIP) or RING finger protein 90 (RNF90), is an E3 ubiquitin-protein ligase that mediates c-Jun/AP-1 activation by Ras signalling. Its phosphorylation and activation by MSK1 in response to direct activation by the Ras-Raf-MEK-ERK pathway can stimulate TRIM7 E3 ubiquitin ligase activity in mediating Lys63-linked ubiquitination of the AP-1 coactivator RACO-1, leading to RACO-1 protein stabilization. Moreover, TRIM7 binds and activates glycogenin, the self-glucosylating initiator of glycogen biosynthesis. TRIM11, also known as protein BIA1, or RING finger protein 92 (RNF92), is an E3 ubiquitin-protein ligase involved in the development of the central nervous system. It is overexpressed in high-grade gliomas and promotes proliferation, invasion, migration and glial tumor growth. TRIM11 acts as a potential therapeutic target for congenital central hypoventilation syndrome (CCHS) by mediating the degradation of CCHS-associated polyalanine-expanded Phox2b. TRIM11 modulates the function of neurogenic transcription factor Pax6 through the ubiquitin-proteosome system, and thus plays an essential role for Pax6-dependent neurogenesis. It also binds to and destabilizes a key component of the activator-mediated cofactor complex (ARC105), humanin, a neuroprotective peptide against Alzheimer's disease-relevant insults, and further regulates ARC105 function in transforming growth factor beta (TGFbeta) signaling. Moreover, TRIM11 negatively regulates retinoic acid-inducible gene-I (RIG-I)-mediated interferon-beta (IFNbeta) production and antiviral activity by targeting TANK-binding kinase-1 (TBK1). It may contribute to the endogenous restriction of retroviruses in cells. It enhances N-tropic murine leukemia virus (N-MLV) entry by interfering with Ref1 restriction. It also suppresses the early steps of human immunodeficiency virus HIV-1 transduction, resulting in decreased reverse transcripts. TRIM27, also known as RING finger protein 76 (RNF76), RET finger protein (RFP), or zinc finger protein RFP, is a nuclear E3 ubiquitin-protein ligase that is highly expressed in testis and in various tumor cell lines. Expression of TRIM27 is associated with prognosis of colon and endometrial cancers. TRIM27 was first identified as a fusion partner of the RET receptor tyrosine kinase. It functions as a transcriptional repressor and associates with several proteins involved in transcriptional activity, such as enhancer of polycomb 1 (Epc1), a member of the Polycomb group proteins, and Mi-2beta, a main component of the nucleosome remodeling and deacetylase (NuRD) complex, and the cell cycle regulator retinoblastoma protein (RB1). It also interacts with HDAC1, leading to downregulation of thioredoxin binding protein 2 (TBP-2), which inhibits the function of thioredoxin. Moreover, TRIM27 mediates Pax7-induced ubiquitination of MyoD in skeletal muscle atrophy. In addition, it inhibits muscle differentiation by modulating serum response factor (SRF) and Epc1. TRIM27 promotes a non-canonical polyubiquitination of PTEN, a lipid phosphatase that catalyzes PtdIns(3,4,5)P3 (PIP3) to PtdIns(4,5)P2 (PIP2). It is an IKKepsilon-interacting protein that regulates IkappaB kinase (IKK) function and negatively regulates signaling involved in the antiviral response and inflammation. TRIM27 also forms a protein complex with MBD4 or MBD2 or MBD3, and thus plays an important role in the enhancement of transcriptional repression through MBD proteins in tumorigenesis, spermatogenesis, and embryogenesis. It is a component of an estrogen receptor 1 (ESR1) regulatory complex that is involved in estrogen receptor-mediated transcription in MCF-7 cells. — an NCBI CDD conserved domain (cd16594); members share this curated model.
