identifier: CDD:cd01127
label: "TrwB/TraG/TraD/VirD4 family of bacterial conjugation proteins. The TraG/TraD/VirD4 family are bacterial conjugation proteins involved in type IV secretion (T4S) systems, versatile bacterial secretion systems mediating transport of protein and/or DNA. They are present in gram-negative and gram-positive bacteria, as well as archaea. They form hexameric rings and belong to the RecA-like NTPases superfamily, which also includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases."
definition: >-
  TrwB/TraG/TraD/VirD4 family of bacterial conjugation proteins. The TraG/TraD/VirD4 family are bacterial conjugation proteins involved in type IV secretion (T4S) systems, versatile bacterial secretion systems mediating transport of protein and/or DNA. They are present in gram-negative and gram-positive bacteria, as well as archaea. They form hexameric rings and belong to the RecA-like NTPases superfamily, which also includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. — an NCBI CDD conserved domain (cd01127); members share this curated model.
