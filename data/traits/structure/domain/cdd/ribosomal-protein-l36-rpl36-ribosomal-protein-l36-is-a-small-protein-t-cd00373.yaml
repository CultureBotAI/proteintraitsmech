identifier: CDD:cd00373
label: "Ribosomal protein L36 (Rpl36). Ribosomal protein L36 is a small protein that is highly conserved in bacteria, as well as in mitochondria and chloroplasts with a conserved CCCH binding motif. Rpl36 might be involved in late steps of ribosome subunit assembly which its removal causes extensive disruptions in the rRNA tertiary structure. Rpl36 may function as an effective tumor suppressor during pancreatic tumorigenesis."
definition: >-
  Ribosomal protein L36 (Rpl36). Ribosomal protein L36 is a small protein that is highly conserved in bacteria, as well as in mitochondria and chloroplasts with a conserved CCCH binding motif. Rpl36 might be involved in late steps of ribosome subunit assembly which its removal causes extensive disruptions in the rRNA tertiary structure. Rpl36 may function as an effective tumor suppressor during pancreatic tumorigenesis. — an NCBI CDD conserved domain (cd00373); members share this curated model.
