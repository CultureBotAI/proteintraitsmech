identifier: CDD:cd21759
label: "calmodulin binding domain found in unconventional myosin-VI and similar proteins. Myosins, which are actin-based motor molecules with ATPase activity, include unconventional myosins that serve in intracellular movements. Myosin-VI, also called unconventional myosin-6 (MYO6), is a reverse-direction motor protein that moves towards the minus-end of actin filaments. It is required for the structural integrity of the Golgi apparatus via the p53-dependent pro-survival pathway. Myosin-VI appears to be involved in a very early step of clathrin-mediated endocytosis in polarized epithelial cells. It modulates RNA polymerase II-dependent transcription. As part of the DISP (DOCK7-Induced Septin disPlacement) complex, Myosin-VI may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. Myosin-VI is encoded by gene MYO6, the human homolog of the gene responsible for deafness in Snell's waltzer mice. It is mutated in autosomal dominant non-syndromic hearing loss. This family also includes Drosophila melanogaster unconventional myosin VI Jaguar (Jar; also called myosin heavy chain 95F (Mhc95F), or 95F MHC), which is a motor protein necessary for the morphogenesis of epithelial tissues during Drosophila development. Jar is required for basal protein targeting and correct spindle orientation in mitotic neuroblasts. It contributes to synaptic transmission and development at the Drosophila neuromuscular junction. Together with CLIP-190 (CAP-Gly domain-containing/cytoplasmic linker protein 190), Jar may coordinate the interaction between the actin and microtubule cytoskeleton. Jar may link endocytic vesicles to microtubules and possibly be involved in transport in the early embryo and in the dynamic process of dorsal closure; its function is believed to change during the life cycle. This model corresponds to the calmodulin (CaM) binding domain (CBD), which consists of three subdomains: a unique insert (Insert 2 or Ins2), an IQ motif, and a proximal tail domain (PTD, also known as lever arm extension or LAE)."
definition: >-
  calmodulin binding domain found in unconventional myosin-VI and similar proteins. Myosins, which are actin-based motor molecules with ATPase activity, include unconventional myosins that serve in intracellular movements. Myosin-VI, also called unconventional myosin-6 (MYO6), is a reverse-direction motor protein that moves towards the minus-end of actin filaments. It is required for the structural integrity of the Golgi apparatus via the p53-dependent pro-survival pathway. Myosin-VI appears to be involved in a very early step of clathrin-mediated endocytosis in polarized epithelial cells. It modulates RNA polymerase II-dependent transcription. As part of the DISP (DOCK7-Induced Septin disPlacement) complex, Myosin-VI may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. Myosin-VI is encoded by gene MYO6, the human homolog of the gene responsible for deafness in Snell's waltzer mice. It is mutated in autosomal dominant non-syndromic hearing loss. This family also includes Drosophila melanogaster unconventional myosin VI Jaguar (Jar; also called myosin heavy chain 95F (Mhc95F), or 95F MHC), which is a motor protein necessary for the morphogenesis of epithelial tissues during Drosophila development. Jar is required for basal protein targeting and correct spindle orientation in mitotic neuroblasts. It contributes to synaptic transmission and development at the Drosophila neuromuscular junction. Together with CLIP-190 (CAP-Gly domain-containing/cytoplasmic linker protein 190), Jar may coordinate the interaction between the actin and microtubule cytoskeleton. Jar may link endocytic vesicles to microtubules and possibly be involved in transport in the early embryo and in the dynamic process of dorsal closure; its function is believed to change during the life cycle. This model corresponds to the calmodulin (CaM) binding domain (CBD), which consists of three subdomains: a unique insert (Insert 2 or Ins2), an IQ motif, and a proximal tail domain (PTD, also known as lever arm extension or LAE). — an NCBI CDD conserved domain (cd21759); members share this curated model.
