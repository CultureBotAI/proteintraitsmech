identifier: CDD:cd14822
label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 9 (BTBD9). BTBD9 is a risk factor for Restless Legs Syndrome (RLS) encoding a Cullin-3 substrate adaptor. The BTBD9 gene may be associated with antipsychotic-induced RLS in schizophrenia. Mutations in BTBD9 lead to reduced dopamine, increased locomotion and sleep fragmentation."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 9 (BTBD9). BTBD9 is a risk factor for Restless Legs Syndrome (RLS) encoding a Cullin-3 substrate adaptor. The BTBD9 gene may be associated with antipsychotic-induced RLS in schizophrenia. Mutations in BTBD9 lead to reduced dopamine, increased locomotion and sleep fragmentation. — an NCBI CDD conserved domain (cd14822); members share this curated model.
