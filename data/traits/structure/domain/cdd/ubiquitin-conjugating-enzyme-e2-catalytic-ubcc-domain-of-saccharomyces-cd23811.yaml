identifier: CDD:cd23811
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of Saccharomyces cerevisiae CDC34 and related proteins. Saccharomyces cerevisiae CDC34 (EC 2.3.2.23), also called ubiquitin-conjugating enzyme E2-34 kDa, cell division control protein 34, E2 ubiquitin-conjugating enzyme 3 (UBC3), DNA6, or ubiquitin ligase complex SCF subunit CDC34, catalyzes the covalent attachment of ubiquitin to other proteins. In vitro, it may ubiquitinate histone H2A. CDC34 mediates the initiation of DNA replication (transition of G1 to S phase in cell cycle). It is the catalytic subunit of an SCF ubiquitin-protein ligase complex (together with Skp1p, Rbx1p, CDC53, and an F-box protein) that regulates cell cycle progression by targeting key substrates for degradation. Moreover, CDC34 is involved in the regulation of methionine biosynthesis genes and in the degradation of CDC6 together with CDC4 and CDC53."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of Saccharomyces cerevisiae CDC34 and related proteins. Saccharomyces cerevisiae CDC34 (EC 2.3.2.23), also called ubiquitin-conjugating enzyme E2-34 kDa, cell division control protein 34, E2 ubiquitin-conjugating enzyme 3 (UBC3), DNA6, or ubiquitin ligase complex SCF subunit CDC34, catalyzes the covalent attachment of ubiquitin to other proteins. In vitro, it may ubiquitinate histone H2A. CDC34 mediates the initiation of DNA replication (transition of G1 to S phase in cell cycle). It is the catalytic subunit of an SCF ubiquitin-protein ligase complex (together with Skp1p, Rbx1p, CDC53, and an F-box protein) that regulates cell cycle progression by targeting key substrates for degradation. Moreover, CDC34 is involved in the regulation of methionine biosynthesis genes and in the degradation of CDC6 together with CDC4 and CDC53. — an NCBI CDD conserved domain (cd23811); members share this curated model.
