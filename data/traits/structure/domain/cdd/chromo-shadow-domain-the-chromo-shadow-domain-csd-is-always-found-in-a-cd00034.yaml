identifier: CDD:cd00034
label: "chromo shadow domain. The chromo shadow domain (CSD) is always found in association with a related N-terminal chromo (CHRromatin Organization MOdifier) domain. CSD domains have only been found in proteins that also possess a chromodomain, while chromodomains can exist in isolation. CSDs are found for example in Drosophila and human heterochromatin protein (HP1) and mammalian modifier 1 and modifier 2. HP1 is a highly conserved non-histone chromosomal protein that is evolutionarily conserved from fission yeast to plants and animals. HP1 has two conserved protein-protein interaction domains, a single N-terminal chromodomain (CD) which can bind to histone proteins via methylated lysine residues, and a related C-terminal chromo shadow domain (CSD) which is responsible for the homodimerization and interaction with a number of chromatin-associated non-histone proteins; a flexible hinge region separates the CD and CSD and may bind nucleic acid. The HP1 CSD, in addition to interacting with various proteins bearing the PXVXL motif, also interacts with a region of histone H3 that bears the similar PXXVXL motif. There are three human homologs of HP1 proteins: HP1alpha (also known as Cbx5), HP1beta (also known as Cbx1), and HP1gamma (also known as Cbx3). The CSD domains of all three human HP1 homologs have similar affinities to the PXXVXL motif of histone H3."
