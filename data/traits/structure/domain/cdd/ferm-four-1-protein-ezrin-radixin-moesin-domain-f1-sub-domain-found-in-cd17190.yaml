identifier: CDD:cd17190
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM, ARH/RhoGEF and pleckstrin domain-containing protein 2 (FARP2) and similar proteins. FARP2, also termed FERM domain including RhoGEF (FIR), or Pleckstrin homology (PH) domain-containing family C member 3, is a Dbl-family guanine nucleotide exchange factor (GEF) that activates Rac1 or Cdc42 in response to upstream signals, suggesting roles in regulating processes such as neuronal axon guidance and bone homeostasis. It is also a key molecule involved in the response of neuronal growth cones to class-3 semaphorins. FARP2 contains a FERM domain, a Dbl-homology (DH) domain and two pleckstrin homology (PH) domains. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM, ARH/RhoGEF and pleckstrin domain-containing protein 2 (FARP2) and similar proteins. FARP2, also termed FERM domain including RhoGEF (FIR), or Pleckstrin homology (PH) domain-containing family C member 3, is a Dbl-family guanine nucleotide exchange factor (GEF) that activates Rac1 or Cdc42 in response to upstream signals, suggesting roles in regulating processes such as neuronal axon guidance and bone homeostasis. It is also a key molecule involved in the response of neuronal growth cones to class-3 semaphorins. FARP2 contains a FERM domain, a Dbl-homology (DH) domain and two pleckstrin homology (PH) domains. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17190); members share this curated model.
