identifier: CDD:cd14955
label: "Uncharacterized NHL-repeat domain in bacterial and archaeal proteins. The NHL (NCL-1, HT2A and LIN-41) repeat is found in multiple tandem copies, typically as 6 instances. It is about 40 residues long and resembles the WD repeat and other beta-propeller structures."
