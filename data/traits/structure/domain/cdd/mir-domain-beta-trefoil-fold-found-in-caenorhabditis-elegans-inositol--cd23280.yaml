identifier: CDD:cd23280
label: "MIR domain, beta-trefoil fold, found in Caenorhabditis elegans inositol 1,4,5-trisphosphate receptor Itr-1 and similar proteins. Itr-1, also called IP3 receptor, or IP3R, or InsP3R, or LET-23 fertility effector 1, is a receptor for inositol 1,4,5-trisphosphate, a second messenger that regulates intracellular calcium homeostasis. It binds in vitro to both inositol 1,4,5-trisphosphate (1,4,5-InsP3) and inositol 2,4,5-trisphosphate (2,4,5-InsP3) with high affinity. It can also bind inositol 1,3,4,5-tetrakisphosphate (1,3,4,5-InsP4) and inositol 4,5-bisphosphate (4,5-InsP2), but with lower affinity. Itr-1 acts as a timekeeper/rhythm generator via calcium signaling, affecting the defecation cycle and pharyngeal pumping. It affects normal hermaphrodite and male fertility as a participant in intracellular signaling by acting downstream of let-23/lin-3 which regulates ovulation, spermathecal valve dilation and male mating behavior. It plays an important role in early embryonic development. It controls epidermal cell migration and may also regulate filopodial protrusive activity during epithelial morphogenesis. Itr-1 functions as a component of inositol trisphosphate (IP3)-mediated downstream signaling pathways that controls amphid sensory neuronal (ASH)-mediated response to nose touch and benzaldehyde, but no other ASH-mediated responses. Itr-1 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in Caenorhabditis elegans inositol 1,4,5-trisphosphate receptor Itr-1 and similar proteins. Itr-1, also called IP3 receptor, or IP3R, or InsP3R, or LET-23 fertility effector 1, is a receptor for inositol 1,4,5-trisphosphate, a second messenger that regulates intracellular calcium homeostasis. It binds in vitro to both inositol 1,4,5-trisphosphate (1,4,5-InsP3) and inositol 2,4,5-trisphosphate (2,4,5-InsP3) with high affinity. It can also bind inositol 1,3,4,5-tetrakisphosphate (1,3,4,5-InsP4) and inositol 4,5-bisphosphate (4,5-InsP2), but with lower affinity. Itr-1 acts as a timekeeper/rhythm generator via calcium signaling, affecting the defecation cycle and pharyngeal pumping. It affects normal hermaphrodite and male fertility as a participant in intracellular signaling by acting downstream of let-23/lin-3 which regulates ovulation, spermathecal valve dilation and male mating behavior. It plays an important role in early embryonic development. It controls epidermal cell migration and may also regulate filopodial protrusive activity during epithelial morphogenesis. Itr-1 functions as a component of inositol trisphosphate (IP3)-mediated downstream signaling pathways that controls amphid sensory neuronal (ASH)-mediated response to nose touch and benzaldehyde, but no other ASH-mediated responses. Itr-1 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23280); members share this curated model.
