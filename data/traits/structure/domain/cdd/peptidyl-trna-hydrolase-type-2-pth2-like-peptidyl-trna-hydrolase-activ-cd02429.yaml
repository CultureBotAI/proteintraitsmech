identifier: CDD:cd02429
label: "Peptidyl-tRNA hydrolase, type 2 (PTH2)_like . Peptidyl-tRNA hydrolase activity releases tRNA from the premature translation termination product peptidyl-tRNA. Two structurally different enzymes have been reported  to encode such activity, Pth present in bacteria and eukaryotes and  Pth2 present in archaea and eukaryotes. There is no functional information for this eukaryote-specific subgroup."
definition: >-
  Peptidyl-tRNA hydrolase, type 2 (PTH2)_like . Peptidyl-tRNA hydrolase activity releases tRNA from the premature translation termination product peptidyl-tRNA. Two structurally different enzymes have been reported to encode such activity, Pth present in bacteria and eukaryotes and Pth2 present in archaea and eukaryotes. There is no functional information for this eukaryote-specific subgroup. — an NCBI CDD conserved domain (cd02429); members share this curated model.
