identifier: CDD:cd16671
label: "RING finger, H2 subclass, found in E3 ubiquitin-protein ligase deltex1 (DTX1), deltex4 (DTX4), and similar proteins. DTX1 functions as a Notch downstream transcription regulator that mediates a Notch signal to block differentiation of neural progenitor cells. It interacts with the transcription coactivator p300 and inhibits transcription activation mediated by the neural specific transcription factor MASH1. It is also a transcription target of nuclear factor of activated T cells (NFAT) and participates in T cell anergy and Foxp3 protein level maintenance in vivo. Moreover, DTX1 appears to promote B-cell development at the expense of T-cell development. It also promotes protein kinase C theta degradation and sustains Casitas B-lineage lymphoma expression. DTX4, also known as RING finger protein 155, shares the highest degree of sequence similarity with DTX1 and likely interacts with the intracellular domain of Notch as well. Both DTX1 and DTX4 contain two Notch-binding WWE domains at the N-terminus that physically interact with the Notch ankyrin domains, a proline-rich motif that shares homology with SH3-binding domains, and a C3H2C3-type RING-H2 finger at the C-terminus. They also harbor two nuclear localization signals."
definition: >-
  RING finger, H2 subclass, found in E3 ubiquitin-protein ligase deltex1 (DTX1), deltex4 (DTX4), and similar proteins. DTX1 functions as a Notch downstream transcription regulator that mediates a Notch signal to block differentiation of neural progenitor cells. It interacts with the transcription coactivator p300 and inhibits transcription activation mediated by the neural specific transcription factor MASH1. It is also a transcription target of nuclear factor of activated T cells (NFAT) and participates in T cell anergy and Foxp3 protein level maintenance in vivo. Moreover, DTX1 appears to promote B-cell development at the expense of T-cell development. It also promotes protein kinase C theta degradation and sustains Casitas B-lineage lymphoma expression. DTX4, also known as RING finger protein 155, shares the highest degree of sequence similarity with DTX1 and likely interacts with the intracellular domain of Notch as well. Both DTX1 and DTX4 contain two Notch-binding WWE domains at the N-terminus that physically interact with the Notch ankyrin domains, a proline-rich motif that shares homology with SH3-binding domains, and a C3H2C3-type RING-H2 finger at the C-terminus. They also harbor two nuclear localization signals. — an NCBI CDD conserved domain (cd16671); members share this curated model.
