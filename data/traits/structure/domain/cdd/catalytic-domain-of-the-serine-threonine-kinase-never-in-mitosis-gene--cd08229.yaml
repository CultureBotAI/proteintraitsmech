identifier: CDD:cd08229
label: "Catalytic domain of the Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 7. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Nek7 is required for mitotic spindle formation and cytokinesis. It is enriched in the centrosome and is critical for microtubule nucleation. Nek7 is activated by Nek9 during mitosis, and may regulate the p70 ribosomal S6 kinase. It is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control. The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Never In Mitosis gene A (NIMA)-related kinase 7. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Nek7 is required for mitotic spindle formation and cytokinesis. It is enriched in the centrosome and is critical for microtubule nucleation. Nek7 is activated by Nek9 during mitosis, and may regulate the p70 ribosomal S6 kinase. It is one in a family of 11 different Neks (Nek1-11) that are involved in cell cycle control. The Nek family is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd08229); members share this curated model.
