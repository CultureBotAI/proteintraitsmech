identifier: CDD:cd09547
label: "SAM domain of EPH-A6 subfamily of tyrosine kinase receptors. SAM (sterile alpha motif) domain of EPH-A6 subfamily of receptor tyrosine kinases is a C-terminal potential protein-protein interaction domain. This domain is located in the cytoplasmic region of EPH-A6 receptors and appears to mediate cell-cell initiated signal transduction. Eph-A6 gene is preferentially expressed in the nervous system. EPH-A6 receptors are involved in primate retina vascular and axon guidance, and in neural circuits responsible for learning and memory. EphA6 gene was significantly down regulated in colorectal cancer and in malignant melanomas. It is a potential molecular marker for these cancers."
