identifier: CDD:cd15543
label: "PHD finger found in Remodeling and spacing factor 1 (Rsf-1). Rsf-1, also termed HBV pX-associated protein 8, or Hepatitis B virus X-associated protein alpha (HBxAPalpha), or p325 subunit of RSF chromatin-remodeling complex, is a novel nuclear protein with histone chaperon function. It is a subunit of an ISWI chromatin remodeling complex, remodeling and spacing factor (RSF), and plays a role in mediating ATPase-dependent chromatin remodeling and conferring tumor aggressiveness in common carcinomas. As an ataxia-telangiectasia mutated (ATM)-dependent chromatin remodeler, Rsf-1 facilitates DNA damage checkpoints and homologous recombination repair. It regulates the mitotic spindle checkpoint and chromosome instability through the association with serine/threonine kinase BubR1 (BubR1) and Hepatitis B virus (HBV) X protein (HBx) in the chromatin fraction during mitosis. It also interacts with cyclin E1 and promotes tumor development. Rsf-1 contains a plant homeodomain (PHD) finger."
definition: >-
  PHD finger found in Remodeling and spacing factor 1 (Rsf-1). Rsf-1, also termed HBV pX-associated protein 8, or Hepatitis B virus X-associated protein alpha (HBxAPalpha), or p325 subunit of RSF chromatin-remodeling complex, is a novel nuclear protein with histone chaperon function. It is a subunit of an ISWI chromatin remodeling complex, remodeling and spacing factor (RSF), and plays a role in mediating ATPase-dependent chromatin remodeling and conferring tumor aggressiveness in common carcinomas. As an ataxia-telangiectasia mutated (ATM)-dependent chromatin remodeler, Rsf-1 facilitates DNA damage checkpoints and homologous recombination repair. It regulates the mitotic spindle checkpoint and chromosome instability through the association with serine/threonine kinase BubR1 (BubR1) and Hepatitis B virus (HBV) X protein (HBx) in the chromatin fraction during mitosis. It also interacts with cyclin E1 and promotes tumor development. Rsf-1 contains a plant homeodomain (PHD) finger. — an NCBI CDD conserved domain (cd15543); members share this curated model.
