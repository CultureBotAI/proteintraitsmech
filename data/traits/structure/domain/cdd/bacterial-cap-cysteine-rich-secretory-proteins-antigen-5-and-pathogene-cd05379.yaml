identifier: CDD:cd05379
label: "Bacterial CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain proteins. Little is known about bacterial and archaeal members of the CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain family. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. Studies of eukaryotic proteins show that CAP domains have several functions, including the binding of cholesterol, lipids and heparan sulfate. This group includes Borrelia burgdorferi outer surface protein BB0689, which does not bind to cholesterol, lipids, or heparan sulfate, and whose function is unknown."
definition: >-
  Bacterial CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain proteins. Little is known about bacterial and archaeal members of the CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain family. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. Studies of eukaryotic proteins show that CAP domains have several functions, including the binding of cholesterol, lipids and heparan sulfate. This group includes Borrelia burgdorferi outer surface protein BB0689, which does not bind to cholesterol, lipids, or heparan sulfate, and whose function is unknown. — an NCBI CDD conserved domain (cd05379); members share this curated model.
