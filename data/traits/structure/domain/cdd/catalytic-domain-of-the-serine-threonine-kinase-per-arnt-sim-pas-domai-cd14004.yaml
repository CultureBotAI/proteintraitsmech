identifier: CDD:cd14004
label: "Catalytic domain of the Serine/Threonine kinase, Per-ARNT-Sim (PAS) domain Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PASK (or PASKIN) is a nutrient and energy sensor and thus, plays an important role in maintaining cellular energy homeostasis. It coordinates the utilization of glucose in response to metabolic demand. It contains an N-terminal PAS domain which directly interacts and inhibits a C-terminal catalytic kinase domain. The PAS domain serves as a sensory module for different environmental signals such as light, redox state, and various metabolites. Binding of ligands to the PAS domain causes structural changes which leads to kinase activation and the phosphorylation of substrates to trigger the appropriate cellular response. The PASK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Per-ARNT-Sim (PAS) domain Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PASK (or PASKIN) is a nutrient and energy sensor and thus, plays an important role in maintaining cellular energy homeostasis. It coordinates the utilization of glucose in response to metabolic demand. It contains an N-terminal PAS domain which directly interacts and inhibits a C-terminal catalytic kinase domain. The PAS domain serves as a sensory module for different environmental signals such as light, redox state, and various metabolites. Binding of ligands to the PAS domain causes structural changes which leads to kinase activation and the phosphorylation of substrates to trigger the appropriate cellular response. The PASK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14004); members share this curated model.
