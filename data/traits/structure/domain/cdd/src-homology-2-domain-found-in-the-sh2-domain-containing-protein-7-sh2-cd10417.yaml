identifier: CDD:cd10417
label: "Src homology 2 domain found in the SH2 domain containing protein 7 (SH2D7). SH2D7 contains a single SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in the SH2 domain containing protein 7 (SH2D7). SH2D7 contains a single SH2 domain. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10417); members share this curated model.
