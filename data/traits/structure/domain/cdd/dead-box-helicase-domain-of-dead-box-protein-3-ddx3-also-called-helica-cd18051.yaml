identifier: CDD:cd18051
label: "DEAD-box helicase domain of DEAD box protein 3. DDX3 (also called helicase-like protein, DEAD box, X isoform, or DDX14) has been reported to display a high level of RNA-independent ATPase activity stimulated by both RNA and DNA. This protein has multiple conserved domains and is thought to play roles in both the nucleus and cytoplasm. Nuclear roles include transcriptional regulation, mRNP assembly, pre-mRNA splicing, and mRNA export. In the cytoplasm, this protein is thought to be involved in translation, cellular signaling, and viral replication. Misregulation of this gene has been implicated in tumorigenesis. Diseases associated with DDX3 include mental retardation, X-linked 102 and agenesis of the corpus callosum, with facial anomalies and robin sequence. DDX3 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 3. DDX3 (also called helicase-like protein, DEAD box, X isoform, or DDX14) has been reported to display a high level of RNA-independent ATPase activity stimulated by both RNA and DNA. This protein has multiple conserved domains and is thought to play roles in both the nucleus and cytoplasm. Nuclear roles include transcriptional regulation, mRNP assembly, pre-mRNA splicing, and mRNA export. In the cytoplasm, this protein is thought to be involved in translation, cellular signaling, and viral replication. Misregulation of this gene has been implicated in tumorigenesis. Diseases associated with DDX3 include mental retardation, X-linked 102 and agenesis of the corpus callosum, with facial anomalies and robin sequence. DDX3 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18051); members share this curated model.
