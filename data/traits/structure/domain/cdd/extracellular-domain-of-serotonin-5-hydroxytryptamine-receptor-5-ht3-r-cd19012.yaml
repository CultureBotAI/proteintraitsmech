identifier: CDD:cd19012
label: "extracellular domain of serotonin 5-hydroxytryptamine receptor (5-HT3) receptor subunit B (5HT3B). This subfamily contains extracellular domain of subunit B of serotonin 5-HT3 receptor (5-HT3BR), encoded by the HTR3B gene. 5-HT3B is not functional as a homopentameric complex and is co-expression with the 5-HT3A subunit, resulting in heteromeric 5-HT3AB receptors that are functionally distinct from homomeric 5-HT3A receptors. This receptor causes fast, depolarizing responses in neurons after activation, with affinities of competitive ligands at the two receptor subtypes extracellular domains mostly similar. HTR3B gene variants may contribute to variability in severity of and response to anti-emetic therapy for nausea and vomiting in pregnancy, as well as efficacy of ondansetron in cancer chemotherapy, radiation therapy, or surgery. 5-HT3B subunit affects high-potency inhibition of 5-HT3 receptors by morphine by reducing its affinity at its high-affinity, non-competitive site."
definition: >-
  extracellular domain of serotonin 5-hydroxytryptamine receptor (5-HT3) receptor subunit B (5HT3B). This subfamily contains extracellular domain of subunit B of serotonin 5-HT3 receptor (5-HT3BR), encoded by the HTR3B gene. 5-HT3B is not functional as a homopentameric complex and is co-expression with the 5-HT3A subunit, resulting in heteromeric 5-HT3AB receptors that are functionally distinct from homomeric 5-HT3A receptors. This receptor causes fast, depolarizing responses in neurons after activation, with affinities of competitive ligands at the two receptor subtypes extracellular domains mostly similar. HTR3B gene variants may contribute to variability in severity of and response to anti-emetic therapy for nausea and vomiting in pregnancy, as well as efficacy of ondansetron in cancer chemotherapy, radiation therapy, or surgery. 5-HT3B subunit affects high-potency inhibition of 5-HT3 receptors by morphine by reducing its affinity at its high-affinity, non-competitive site. — an NCBI CDD conserved domain (cd19012); members share this curated model.
