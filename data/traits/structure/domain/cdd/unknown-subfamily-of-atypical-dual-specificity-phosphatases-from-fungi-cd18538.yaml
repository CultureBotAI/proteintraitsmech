identifier: CDD:cd18538
label: "unknown subfamily of atypical dual-specificity phosphatases from fungi. This uncharacterized subfamily belongs to the plant and fungi atypical dual-specificity phosphatases (PFA-DSPs) group of atypical DSPs that present in plants, fungi, kinetoplastids, and slime molds. They share structural similarity with atypical- and lipid phosphatase DSPs from mammals. The PFA-DSP group is composed of active as well as inactive phosphatases. This unknown subgroup contains the conserved the CxxxxxR catalytic motif present in active cysteine phosphatases."
definition: >-
  unknown subfamily of atypical dual-specificity phosphatases from fungi. This uncharacterized subfamily belongs to the plant and fungi atypical dual-specificity phosphatases (PFA-DSPs) group of atypical DSPs that present in plants, fungi, kinetoplastids, and slime molds. They share structural similarity with atypical- and lipid phosphatase DSPs from mammals. The PFA-DSP group is composed of active as well as inactive phosphatases. This unknown subgroup contains the conserved the CxxxxxR catalytic motif present in active cysteine phosphatases. — an NCBI CDD conserved domain (cd18538); members share this curated model.
