identifier: CDD:cd14306
label: "UBA domain found in vacuolar protein sorting-associated protein 13D (VP13D) and similar proteins. VP13D is a chorea-acanthocytosis (CHAC)-similar protein encoded by gene VPS13D. it contains two putative domains, ubiquitin-associated (UBA) domain and lectin domain of ricin B chain profile (ricin-B-lectin), suggesting it may interact with, and be involved in the trafficking of, proteins modified with ubiquitin and/or carbohydrate molecules. Further investigation is required."
definition: >-
  UBA domain found in vacuolar protein sorting-associated protein 13D (VP13D) and similar proteins. VP13D is a chorea-acanthocytosis (CHAC)-similar protein encoded by gene VPS13D. it contains two putative domains, ubiquitin-associated (UBA) domain and lectin domain of ricin B chain profile (ricin-B-lectin), suggesting it may interact with, and be involved in the trafficking of, proteins modified with ubiquitin and/or carbohydrate molecules. Further investigation is required. — an NCBI CDD conserved domain (cd14306); members share this curated model.
