identifier: CDD:cd20384
label: "Tudor domain found in zinc finger CCCH-type with G patch domain-containing protein (ZGPAT) and similar proteins. ZGPAT, also called ZIP, G patch domain-containing protein 6 (GPATC6), GPATCH6, zinc finger CCCH domain-containing protein 9 (ZC3HDC9), ZC3H9, or zinc finger and G patch domain-containing protein, is a transcription repressor that specifically binds the 5'-GGAG[GA]A[GA]A-3' consensus sequence. It represses transcription by recruiting the chromatin multiprotein complex NuRD to target promoters. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in zinc finger CCCH-type with G patch domain-containing protein (ZGPAT) and similar proteins. ZGPAT, also called ZIP, G patch domain-containing protein 6 (GPATC6), GPATCH6, zinc finger CCCH domain-containing protein 9 (ZC3HDC9), ZC3H9, or zinc finger and G patch domain-containing protein, is a transcription repressor that specifically binds the 5'-GGAG[GA]A[GA]A-3' consensus sequence. It represses transcription by recruiting the chromatin multiprotein complex NuRD to target promoters. It contains one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20384); members share this curated model.
