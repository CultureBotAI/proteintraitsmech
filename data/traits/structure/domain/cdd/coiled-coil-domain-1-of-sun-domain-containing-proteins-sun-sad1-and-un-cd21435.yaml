identifier: CDD:cd21435
label: "coiled-coil domain 1 of SUN domain-containing proteins. SUN (Sad1 and UNC-84) proteins (SUN1 and SUN2) are components of the LINC (LInker of Nucleoskeleton and Cytoskeleton) complex which is involved in the connection between the nuclear lamina and the cytoskeleton. Besides the core SUN domain, SUN proteins contain two coiled-coil domains (CC1 and CC2), which act as intrinsic dynamic regulators controlling the activity of the SUN domain. The model corresponds to CC1 that functions as an activation segment to release CC2-mediated inhibition of the SUN domain."
definition: >-
  coiled-coil domain 1 of SUN domain-containing proteins. SUN (Sad1 and UNC-84) proteins (SUN1 and SUN2) are components of the LINC (LInker of Nucleoskeleton and Cytoskeleton) complex which is involved in the connection between the nuclear lamina and the cytoskeleton. Besides the core SUN domain, SUN proteins contain two coiled-coil domains (CC1 and CC2), which act as intrinsic dynamic regulators controlling the activity of the SUN domain. The model corresponds to CC1 that functions as an activation segment to release CC2-mediated inhibition of the SUN domain. — an NCBI CDD conserved domain (cd21435); members share this curated model.
