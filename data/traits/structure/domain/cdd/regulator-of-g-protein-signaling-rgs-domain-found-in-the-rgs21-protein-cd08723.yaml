identifier: CDD:cd08723
label: "Regulator of G protein signaling (RGS) domain found in the RGS21 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part RGS21 protein, a member of RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, apoptosis, and cell proliferation, as well as modulation of cardiac development.  RGS21 is a member of the R4/RGS subfamily and its mRNA was detected only in sensory taste cells that express sweet taste receptors and the taste G-alpha subunit, gustducin, suggesting a potential role in regulating taste transduction."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS21 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part RGS21 protein, a member of RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins play critical regulatory roles as GTPase activating proteins (GAPs) of the heterotrimeric G-protein G-alpha-subunits. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes. RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, apoptosis, and cell proliferation, as well as modulation of cardiac development. RGS21 is a member of the R4/RGS subfamily and its mRNA was detected only in sensory taste cells that express sweet taste receptors and the taste G-alpha subunit, gustducin, suggesting a potential role in regulating taste transduction. — an NCBI CDD conserved domain (cd08723); members share this curated model.
