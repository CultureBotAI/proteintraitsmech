identifier: CDD:cd02760
label: "The MopB_Phenylacetyl-CoA-OR CD contains the phenylacetyl-CoA:acceptor oxidoreductase, large subunit (PadB2), and other related proteins. The phenylacetyl-CoA:acceptor oxidoreductase has been characterized as a membrane-bound molybdenum-iron-sulfur enzyme involved in anaerobic metabolism of phenylalanine in the denitrifying bacterium Thauera aromatica. Members of this CD belong to the molybdopterin_binding (MopB) superfamily of proteins."
definition: >-
  The MopB_Phenylacetyl-CoA-OR CD contains the phenylacetyl-CoA:acceptor oxidoreductase, large subunit (PadB2), and other related proteins. The phenylacetyl-CoA:acceptor oxidoreductase has been characterized as a membrane-bound molybdenum-iron-sulfur enzyme involved in anaerobic metabolism of phenylalanine in the denitrifying bacterium Thauera aromatica. Members of this CD belong to the molybdopterin_binding (MopB) superfamily of proteins. — an NCBI CDD conserved domain (cd02760); members share this curated model.
