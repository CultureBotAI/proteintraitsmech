identifier: CDD:cd04881
label: "ACT_HSDH_Hom CD includes the C-terminal ACT domain of the NAD(P)H-dependent, homoserine dehydrogenase (HSDH) and related domains. The ACT_HSDH_Hom CD includes the C-terminal ACT domain of the NAD(P)H-dependent, homoserine dehydrogenase (HSDH) encoded by the hom gene of Bacillus subtilis and other related sequences. HSDH reduces aspartate semi-aldehyde to the amino acid homoserine, one that is required for the biosynthesis of Met, Thr, and Ile from Asp. Neither the enzyme nor the aspartate pathway is found in the animal kingdom. This mostly bacterial HSDH group has a C-terminal ACT domain and is believed to be involved in enzyme regulation. A C-terminal deletion in the Corynebacterium glutamicum HSDH abolished allosteric inhibition by L-threonine. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  ACT_HSDH_Hom CD includes the C-terminal ACT domain of the NAD(P)H-dependent, homoserine dehydrogenase (HSDH) and related domains. The ACT_HSDH_Hom CD includes the C-terminal ACT domain of the NAD(P)H-dependent, homoserine dehydrogenase (HSDH) encoded by the hom gene of Bacillus subtilis and other related sequences. HSDH reduces aspartate semi-aldehyde to the amino acid homoserine, one that is required for the biosynthesis of Met, Thr, and Ile from Asp. Neither the enzyme nor the aspartate pathway is found in the animal kingdom. This mostly bacterial HSDH group has a C-terminal ACT domain and is believed to be involved in enzyme regulation. A C-terminal deletion in the Corynebacterium glutamicum HSDH abolished allosteric inhibition by L-threonine. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04881); members share this curated model.
