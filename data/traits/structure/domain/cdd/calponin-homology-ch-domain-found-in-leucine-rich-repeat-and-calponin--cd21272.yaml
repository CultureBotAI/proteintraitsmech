identifier: CDD:cd21272
label: "calponin homology (CH) domain found in leucine-rich repeat and calponin homology domain-containing protein 3. Leucine-rich repeat and calponin homology domain-containing protein 3 (LRCH3) is part of the DISP (DOCK7-Induced Septin disPlacement) complex. It may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. LRCH3 contains a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in leucine-rich repeat and calponin homology domain-containing protein 3. Leucine-rich repeat and calponin homology domain-containing protein 3 (LRCH3) is part of the DISP (DOCK7-Induced Septin disPlacement) complex. It may regulate the association of septins with actin and thereby regulate the actin cytoskeleton. LRCH3 contains a single copy of the CH domain at the C-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21272); members share this curated model.
