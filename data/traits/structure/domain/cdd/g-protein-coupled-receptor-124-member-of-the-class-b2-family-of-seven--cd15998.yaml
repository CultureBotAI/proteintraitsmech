identifier: CDD:cd15998
label: "G protein-coupled receptor 124, member of the class B2 family of seven-transmembrane G protein-coupled receptors. GPR124 is an orphan receptor that has been classified as that belongs to the group III of adhesion GPCRs, which also includes orphan GPR123 and GPR125. GPR124, also known as tumor endothelial marker 5 (TEM5), is highly expressed in tumor vessels and in the vasculature of the developing embryo. GPR124 is essentially required for proper angiogenic sprouting into neural tissue, CNS-specific vascularization, and formation of the blood-brain barrier. GPR124 interacts with the PDZ domain of DLG1 (discs large homolog 1) through its PDZ-binding motif. Recently, studies of double-knockout mice showed that GPR124 functions as a co-activator of Wnt7a/Wnt7b-dependent beta-catenin signaling in brain endothelium. Moreover, WNT7-stimulated beta-catenin signaling is regulated by GPR124's intracellular PDZ binding motif and leucine-rich repeats (LRR) in its N-terminal extracellular domain. The adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. Furthermore, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR- autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions."
definition: >-
  G protein-coupled receptor 124, member of the class B2 family of seven-transmembrane G protein-coupled receptors. GPR124 is an orphan receptor that has been classified as that belongs to the group III of adhesion GPCRs, which also includes orphan GPR123 and GPR125. GPR124, also known as tumor endothelial marker 5 (TEM5), is highly expressed in tumor vessels and in the vasculature of the developing embryo. GPR124 is essentially required for proper angiogenic sprouting into neural tissue, CNS-specific vascularization, and formation of the blood-brain barrier. GPR124 interacts with the PDZ domain of DLG1 (discs large homolog 1) through its PDZ-binding motif. Recently, studies of double-knockout mice showed that GPR124 functions as a co-activator of Wnt7a/Wnt7b-dependent beta-catenin signaling in brain endothelium. Moreover, WNT7-stimulated beta-catenin signaling is regulated by GPR124's intracellular PDZ binding motif and leucine-rich repeats (LRR) in its N-terminal extracellular domain. The adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. Furthermore, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR- autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions. — an NCBI CDD conserved domain (cd15998); members share this curated model.
