identifier: CDD:cd17221
label: "Ras-associating (RA) domain found in Ras-association domain-containing protein 2 (RASSF2). RASSF2 is a member of a family of six related classical RASSF1-6 proteins. The RASSF2 gene is transcribed into two major isoforms (A and C). RASSF2 is structurally related to RASSF1A but unlike RASSF1A It is primarily a nuclear protein. RASSF2 contains the RA and SARAH domains. The RA domain of the classical RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RA domains mediate interactions with Ras and other small GTPases, and SARAH domains mediate protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis. RASSF2 is inactivated in different cancers and cancer cell lines by promoter methylation and loss of expression, implicating the correlation and significance of RASSF2 in tumorigenesis. In addition to regulating apoptosis and proliferation RASSF2 may have other functions as RASSF2 knockout mice develop normally for the first two weeks but then develop growth retardation and die 4 weeks after birth."
definition: >-
  Ras-associating (RA) domain found in Ras-association domain-containing protein 2 (RASSF2). RASSF2 is a member of a family of six related classical RASSF1-6 proteins. The RASSF2 gene is transcribed into two major isoforms (A and C). RASSF2 is structurally related to RASSF1A but unlike RASSF1A It is primarily a nuclear protein. RASSF2 contains the RA and SARAH domains. The RA domain of the classical RASSF protein family has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. RA domains mediate interactions with Ras and other small GTPases, and SARAH domains mediate protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis. RASSF2 is inactivated in different cancers and cancer cell lines by promoter methylation and loss of expression, implicating the correlation and significance of RASSF2 in tumorigenesis. In addition to regulating apoptosis and proliferation RASSF2 may have other functions as RASSF2 knockout mice develop normally for the first two weeks but then develop growth retardation and die 4 weeks after birth. — an NCBI CDD conserved domain (cd17221); members share this curated model.
