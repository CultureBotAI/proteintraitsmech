identifier: CDD:cd03817
label: "UDP-Glc:1,2-diacylglycerol 3-a-glucosyltransferase and similar proteins. This family is most closely related to the GT1 family of glycosyltransferases. UDP-glucose-diacylglycerol glucosyltransferase (EC 2.4.1.337, UGDG; also known as 1,2-diacylglycerol 3-glucosyltransferase) catalyzes the transfer of glucose from UDP-glucose to 1,2-diacylglycerol forming 3-D-glucosyl-1,2-diacylglycerol."
definition: >-
  UDP-Glc:1,2-diacylglycerol 3-a-glucosyltransferase and similar proteins. This family is most closely related to the GT1 family of glycosyltransferases. UDP-glucose-diacylglycerol glucosyltransferase (EC 2.4.1.337, UGDG; also known as 1,2-diacylglycerol 3-glucosyltransferase) catalyzes the transfer of glucose from UDP-glucose to 1,2-diacylglycerol forming 3-D-glucosyl-1,2-diacylglycerol. — an NCBI CDD conserved domain (cd03817); members share this curated model.
