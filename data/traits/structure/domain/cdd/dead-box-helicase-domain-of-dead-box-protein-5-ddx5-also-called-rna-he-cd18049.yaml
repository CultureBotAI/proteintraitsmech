identifier: CDD:cd18049
label: "DEAD-box helicase domain of DEAD box protein 5. DDX5 (also called RNA helicase P68, HLR1, G17P1, or HUMP68) is involved in pathways that include the alteration of RNA structures, plays a role as a coregulator of transcription, a regulator of splicing, and in the processing of small noncoding RNAs. It synergizes with DDX17 and SRA1 RNA to activate MYOD1 transcriptional activity and is involved in skeletal muscle differentiation. Dysregulation of this gene may play a role in cancer development. DDX5 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 5. DDX5 (also called RNA helicase P68, HLR1, G17P1, or HUMP68) is involved in pathways that include the alteration of RNA structures, plays a role as a coregulator of transcription, a regulator of splicing, and in the processing of small noncoding RNAs. It synergizes with DDX17 and SRA1 RNA to activate MYOD1 transcriptional activity and is involved in skeletal muscle differentiation. Dysregulation of this gene may play a role in cancer development. DDX5 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18049); members share this curated model.
