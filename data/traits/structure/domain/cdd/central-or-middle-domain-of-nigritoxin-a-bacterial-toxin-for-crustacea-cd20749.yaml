identifier: CDD:cd20749
label: "central or middle domain of nigritoxin, a bacterial toxin for crustaceans and insects. This family contains the central domain of nigritoxin expressed in Vibrio nigripulchritudo, a bacterial pathogen affecting shrimp. Nigritoxin is lethal for organisms within the Tetraconata and non-toxic to other animals. It shows significant sequence similarity with antifeeding prophage 18 (Afp18), a partially characterized toxin found in the entomopathogenic bacteria Serratia entomophila and in the fish pathogen Yersinia ruckeri, suggesting that nigritoxin may display toxicity against organisms beyond the known target, Litopenaeus stylirostris shrimp. Structure studies show that nigritoxin represents an entirely unique protein fold, indicating that Afp18 and nigritoxin do not possess the same biological functions. Nigritoxin is comprised of three domains: N-terminal, C-terminal and central domains. This central (or middle) domain has a unique fold that does not superimpose to any other known structure."
definition: >-
  central or middle domain of nigritoxin, a bacterial toxin for crustaceans and insects. This family contains the central domain of nigritoxin expressed in Vibrio nigripulchritudo, a bacterial pathogen affecting shrimp. Nigritoxin is lethal for organisms within the Tetraconata and non-toxic to other animals. It shows significant sequence similarity with antifeeding prophage 18 (Afp18), a partially characterized toxin found in the entomopathogenic bacteria Serratia entomophila and in the fish pathogen Yersinia ruckeri, suggesting that nigritoxin may display toxicity against organisms beyond the known target, Litopenaeus stylirostris shrimp. Structure studies show that nigritoxin represents an entirely unique protein fold, indicating that Afp18 and nigritoxin do not possess the same biological functions. Nigritoxin is comprised of three domains: N-terminal, C-terminal and central domains. This central (or middle) domain has a unique fold that does not superimpose to any other known structure. — an NCBI CDD conserved domain (cd20749); members share this curated model.
