identifier: CDD:cd08094
label: "ATP-grasp domain of prokaryotic glutathione synthetase. ATP-grasp domain of prokaryotic glutathione synthetase. Glutathione synthetase (GSHase or GSH-S, EC 6.3.2.3) catalyzes the second step in the glutathione biosynthesis pathway by ligating gamma-L-glutamyl-L-cysteine and glycine in the presence of ATP. Mg ion is required for this reaction. Escherichia coli strain B GSHase, encoded by gshII, exits as a tetramer of four identical subunuit, and each subunit is 316 amino acid long. Methotrexate which is an inhibitor of dihydrofolate reductases can inhibit GSHase of Escherichia coli B, by binding to the ATP binding site of GSHase."
definition: >-
  ATP-grasp domain of prokaryotic glutathione synthetase. ATP-grasp domain of prokaryotic glutathione synthetase. Glutathione synthetase (GSHase or GSH-S, EC 6.3.2.3) catalyzes the second step in the glutathione biosynthesis pathway by ligating gamma-L-glutamyl-L-cysteine and glycine in the presence of ATP. Mg ion is required for this reaction. Escherichia coli strain B GSHase, encoded by gshII, exits as a tetramer of four identical subunuit, and each subunit is 316 amino acid long. Methotrexate which is an inhibitor of dihydrofolate reductases can inhibit GSHase of Escherichia coli B, by binding to the ATP binding site of GSHase. — an NCBI CDD conserved domain (cd08094); members share this curated model.
