identifier: CDD:cd18536
label: "protein tyrosine phosphatase type IVA 2. Protein tyrosine phosphatase type IVA 2 (PTP-IVa2), also known as protein-tyrosine phosphatase of regenerating liver 2 (PRL-2), stimulates progression from G1 into S phase during mitosis and  promotes tumors. It regulates tumor cell migration and invasion through an ERK-dependent signaling pathway. Its overexpression correlates with breast tumor formation and progression. PRL-2 is a member of the PTP-IVa/PRL family of small, prenylated phosphatases that are the most oncogenic of all PTPs. PRLs associate with magnesium transporters of the cyclin M (CNNM) family, which results in increased intracellular magnesium levels that promote oncogenic transformation."
definition: >-
  protein tyrosine phosphatase type IVA 2. Protein tyrosine phosphatase type IVA 2 (PTP-IVa2), also known as protein-tyrosine phosphatase of regenerating liver 2 (PRL-2), stimulates progression from G1 into S phase during mitosis and promotes tumors. It regulates tumor cell migration and invasion through an ERK-dependent signaling pathway. Its overexpression correlates with breast tumor formation and progression. PRL-2 is a member of the PTP-IVa/PRL family of small, prenylated phosphatases that are the most oncogenic of all PTPs. PRLs associate with magnesium transporters of the cyclin M (CNNM) family, which results in increased intracellular magnesium levels that promote oncogenic transformation. — an NCBI CDD conserved domain (cd18536); members share this curated model.
