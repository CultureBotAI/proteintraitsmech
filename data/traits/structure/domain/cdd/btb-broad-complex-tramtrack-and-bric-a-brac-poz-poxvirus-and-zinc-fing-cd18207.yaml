identifier: CDD:cd18207
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in POZ-, AT hook-, and zinc finger-containing protein 1 (PATZ1). PATZ1 is also called zinc finger and BTB domain-containing protein 19 (ZBTB19), BTB/POZ domain zinc finger transcription factor, protein kinase A RI subunit alpha-associated protein, zinc finger protein 278, or zinc finger sarcoma gene protein. It is an important transcriptional regulatory factor that regulates divergent pathways depending on the cellular context. For instance, it acts as a transcriptional suppressor that functions in T lymphocytes. It is also a DNA damage-responsive transcription factor that inhibits p53 function. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in POZ-, AT hook-, and zinc finger-containing protein 1 (PATZ1). PATZ1 is also called zinc finger and BTB domain-containing protein 19 (ZBTB19), BTB/POZ domain zinc finger transcription factor, protein kinase A RI subunit alpha-associated protein, zinc finger protein 278, or zinc finger sarcoma gene protein. It is an important transcriptional regulatory factor that regulates divergent pathways depending on the cellular context. For instance, it acts as a transcriptional suppressor that functions in T lymphocytes. It is also a DNA damage-responsive transcription factor that inhibits p53 function. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18207); members share this curated model.
