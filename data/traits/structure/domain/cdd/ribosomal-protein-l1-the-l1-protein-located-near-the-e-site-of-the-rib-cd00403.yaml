identifier: CDD:cd00403
label: "Ribosomal protein L1.  The L1 protein, located near the E-site of the ribosome, forms part of the L1 stalk along with 23S rRNA.  In bacteria and archaea, L1 functions both as a ribosomal protein that binds rRNA, and as a translation repressor that binds its own mRNA.  Like several other large ribosomal subunit proteins, L1 displays RNA chaperone activity.  L1 is one of the largest ribosomal proteins. It is composed of two domains that cycle between open and closed conformations via a hinge motion. The RNA-binding site of L1 is highly conserved, with both mRNA and rRNA binding the same binding site."
definition: >-
  Ribosomal protein L1. The L1 protein, located near the E-site of the ribosome, forms part of the L1 stalk along with 23S rRNA. In bacteria and archaea, L1 functions both as a ribosomal protein that binds rRNA, and as a translation repressor that binds its own mRNA. Like several other large ribosomal subunit proteins, L1 displays RNA chaperone activity. L1 is one of the largest ribosomal proteins. It is composed of two domains that cycle between open and closed conformations via a hinge motion. The RNA-binding site of L1 is highly conserved, with both mRNA and rRNA binding the same binding site. — an NCBI CDD conserved domain (cd00403); members share this curated model.
