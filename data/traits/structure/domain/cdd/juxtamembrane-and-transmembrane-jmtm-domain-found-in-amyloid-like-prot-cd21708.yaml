identifier: CDD:cd21708
label: "juxtamembrane and transmembrane (JMTM) domain found in amyloid-like protein 1 (APLP-1) and similar proteins. Amyloid-like protein 1 (APLP-1), also called APLP, may play a role in postsynaptic function. It couples to JIP signal transduction through C-terminal binding. APLP-1 may interact with cellular G-protein signaling pathways. It can regulate neurite outgrowth through binding to components of the extracellular matrix such as heparin and collagen I. This model corresponds to the juxtamembrane and transmembrane (JMTM) domain of APLP-1, which consists of the intact transmembrane (TM) domain with adjacent N-terminal juxtamembrane (JM) region."
definition: >-
  juxtamembrane and transmembrane (JMTM) domain found in amyloid-like protein 1 (APLP-1) and similar proteins. Amyloid-like protein 1 (APLP-1), also called APLP, may play a role in postsynaptic function. It couples to JIP signal transduction through C-terminal binding. APLP-1 may interact with cellular G-protein signaling pathways. It can regulate neurite outgrowth through binding to components of the extracellular matrix such as heparin and collagen I. This model corresponds to the juxtamembrane and transmembrane (JMTM) domain of APLP-1, which consists of the intact transmembrane (TM) domain with adjacent N-terminal juxtamembrane (JM) region. — an NCBI CDD conserved domain (cd21708); members share this curated model.
