identifier: CDD:cd24030
label: "nucleotide-binding domain (NBD) of diol dehydratase-reactivating factor large subunit (DDRA) and similar proteins. DDRA, also called DDR large subunit, diol dehydratase-reactivase large subunit, diol dehydratase-reactivating factor alpha subunit, or DDR alpha subunit, is the large subunit of the diol dehydratase-reactivating factor (DDR), which reactivates suicidally inhibited adenosylcobalamin-dependent diol dehydratase (DD, pddA, pddB, pddC). DDR acts as a chaperone, reactivating inactivated DD holoenzyme in the presence of ATP, Mg(2+) and free adenosylcobalamin (AdoCbl), by mediating the exchange of the tightly bound damaged cofactor AdoCbl for a free intact one. DDR has weak ATPase activity which is required for DD reactivation. DDRA contains the adenosine nucleotide binding site. DDRA has four domains, the ATPase domain, the swiveling domain, the linker domain, and the insert domain. The model corresponds to the ATPase domain. DDRA belongs to the heat shock protein 70 family of chaperones that assist in protein folding and assembly and can direct incompetent \"client\" proteins towards degradation."
definition: >-
  nucleotide-binding domain (NBD) of diol dehydratase-reactivating factor large subunit (DDRA) and similar proteins. DDRA, also called DDR large subunit, diol dehydratase-reactivase large subunit, diol dehydratase-reactivating factor alpha subunit, or DDR alpha subunit, is the large subunit of the diol dehydratase-reactivating factor (DDR), which reactivates suicidally inhibited adenosylcobalamin-dependent diol dehydratase (DD, pddA, pddB, pddC). DDR acts as a chaperone, reactivating inactivated DD holoenzyme in the presence of ATP, Mg(2+) and free adenosylcobalamin (AdoCbl), by mediating the exchange of the tightly bound damaged cofactor AdoCbl for a free intact one. DDR has weak ATPase activity which is required for DD reactivation. DDRA contains the adenosine nucleotide binding site. DDRA has four domains, the ATPase domain, the swiveling domain, the linker domain, and the insert domain. The model corresponds to the ATPase domain. DDRA belongs to the heat shock protein 70 family of chaperones that assist in protein folding and assembly and can direct incompetent "client" proteins towards degradation. — an NCBI CDD conserved domain (cd24030); members share this curated model.
