identifier: CDD:cd16046
label: "Tumor necrosis factor ligand superfamily member 4 (TNFSF4), also known as OX40L. This family contains TNFSF4 (also known as OX40L, tax-transcriptionally activated glycoprotein 1 or TXGP1, GP34, CD252, OX4OL,  CD134L, OX-40L, ATH1)  and is the ligand for receptor TNFRSF4 (also known as OX40, ACT35, CD134, IMD16, TXGP1L). OX40L/OX40 play an important role in antigen-specific T-cell expansion, homeostasis and survival, and are widely expressed, regulating many cell types including T cells, natural killer (NK) cells, NKT cells, B cells, and dendritic cells. These molecules are proinflammatory, and have been shown to play a role in development of several diseases, such as asthma, diabetes, colitis, multiple sclerosis (MS), rheumatoid arthritis (RA), atherosclerosis, and graft-versus-host disease (GVHD). OX40 and OX40L are upregulated in the bronchial submucosa in mild asthmatics compared to healthy individuals; antibodies to OX40L in clinical trials for mild to moderate asthma have been reported. Therapeutic inhibition of OX40L improves joint inflammation in RA as well as heart inflammation in atherosclerotic disease. OX40L regulates inflammation and mortality in the innate immune response during polymicrobial sepsis and blocking it could potentially be beneficial in this disorder. Elevated OX40L expression is also closely associated with elevation of the HCV-specific CD4(+) T-cell response and therefore, OX40L expression can be used as a marker to evaluate antiviral treatment efficacy. Genome-wide association studies have identified single-nucleotide polymorphisms of the OX40L and OX40 genes that are related to cardiovascular diseases, systemic lupus erythematosus (SLE) and Sjogren's syndrome. The expression of OX40 on CD4+ T-lymphocytes and the serum level of OX40L may act as markers of lupus nephritis."
definition: >-
  Tumor necrosis factor ligand superfamily member 4 (TNFSF4), also known as OX40L. This family contains TNFSF4 (also known as OX40L, tax-transcriptionally activated glycoprotein 1 or TXGP1, GP34, CD252, OX4OL, CD134L, OX-40L, ATH1) and is the ligand for receptor TNFRSF4 (also known as OX40, ACT35, CD134, IMD16, TXGP1L). OX40L/OX40 play an important role in antigen-specific T-cell expansion, homeostasis and survival, and are widely expressed, regulating many cell types including T cells, natural killer (NK) cells, NKT cells, B cells, and dendritic cells. These molecules are proinflammatory, and have been shown to play a role in development of several diseases, such as asthma, diabetes, colitis, multiple sclerosis (MS), rheumatoid arthritis (RA), atherosclerosis, and graft-versus-host disease (GVHD). OX40 and OX40L are upregulated in the bronchial submucosa in mild asthmatics compared to healthy individuals; antibodies to OX40L in clinical trials for mild to moderate asthma have been reported. Therapeutic inhibition of OX40L improves joint inflammation in RA as well as heart inflammation in atherosclerotic disease. OX40L regulates inflammation and mortality in the innate immune response during polymicrobial sepsis and blocking it could potentially be beneficial in this disorder. Elevated OX40L expression is also closely associated with elevation of the HCV-specific CD4(+) T-cell response and therefore, OX40L expression can be used as a marker to evaluate antiviral treatment efficacy. Genome-wide association studies have identified single-nucleotide polymorphisms of the OX40L and OX40 genes that are related to cardiovascular diseases, systemic lupus erythematosus (SLE) and Sjogren's syndrome. The expression of OX40 on CD4+ T-lymphocytes and the serum level of OX40L may act as markers of lupus nephritis. — an NCBI CDD conserved domain (cd16046); members share this curated model.
