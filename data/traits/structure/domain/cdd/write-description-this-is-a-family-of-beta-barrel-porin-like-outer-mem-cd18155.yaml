identifier: CDD:cd18155
label: "write description. This is a family of beta-barrel porin-like outer membrane proteins from enteropathogenic Gram-negative bacteria. Intimins and invasins are virulence factors produced by pathogenic Gram-negative bacteria. They carry C-terminal extracellular passenger domains that are involved in adhesion to host cells and N-terminal beta domains that are embedded in the outer membrane. This family represents the beta-barrel porin-like domain in the outer membrane that can be found in intimins, invasins and some inverse autotransporters."
definition: >-
  write description. This is a family of beta-barrel porin-like outer membrane proteins from enteropathogenic Gram-negative bacteria. Intimins and invasins are virulence factors produced by pathogenic Gram-negative bacteria. They carry C-terminal extracellular passenger domains that are involved in adhesion to host cells and N-terminal beta domains that are embedded in the outer membrane. This family represents the beta-barrel porin-like domain in the outer membrane that can be found in intimins, invasins and some inverse autotransporters. — an NCBI CDD conserved domain (cd18155); members share this curated model.
