label: "putative colanic acid biosynthesis glycosyl transferase WcaC and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. Escherichia coli WcaC has been predicted to function in colanic acid biosynthesis. WcfI in Bacteroides fragilis has been shown to be involved in the capsular polysaccharide biosynthesis."
