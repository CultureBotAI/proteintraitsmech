identifier: CDD:cd13391
label: "PDZ Rho guanine nucleotide exchange factor Pleckstrin homology (PH) domain. PRG (also called RhoGEF11) belongs to regulator of G-protein signaling (RGS) domain-containing RhoGEFs that are RhoA-selective and directly activated by the Galpha12/13 family of heterotrimeric G proteins. RhoGEFs activate Rho GTPases regulating cytoskeletal structure, gene transcription, and cell migration. PRG contains an N-terminal PDZ domain, a regulators of G-protein signaling-like (RGSL) domain, a linker region, and a C-terminal Dbl-homology (DH) and pleckstrin-homology (PH) domains which bind and catalyze the exchange of GDP for GTP on RhoA. As is the case in p115-RhoGEF, it is thought that the PRG activated by relieving autoinhibition caused by the linker region. PH domains have diverse functions, but in general are involved in targeting proteins to the appropriate cellular location or in the interaction with a binding partner. They share little sequence conservation, but all have a common fold, which is electrostatically polarized. Less than 10% of PH domains bind phosphoinositide phosphates (PIPs) with high affinity and specificity. PH domains are distinguished from other PIP-binding domains by their specific high-affinity binding to PIPs with two vicinal phosphate groups: PtdIns(3,4)P2, PtdIns(4,5)P2 or PtdIns(3,4,5)P3 which results in targeting some PH domain proteins to the plasma membrane. A few display strong specificity in lipid binding. Any specificity is usually determined by loop regions or insertions in the N-terminus of the domain, which are not conserved across all PH domains. PH domains are found in cellular signaling proteins such as serine/threonine kinase, tyrosine kinases, regulators of G-proteins, endocytotic GTPases, adaptors, as well as cytoskeletal associated molecules and in lipid associated enzymes."
definition: >-
