identifier: CDD:cd10208
label: "nucleotide-binding domain (NBD) of Saccharomyces cerevisiae actin-related protein 9 (Arp9) and similar proteins. Saccharomyces cerevisiae Arp9, also called actin-like protein 9, chromatin structure-remodeling complex protein ARP9, or SWI/SNF complex component ARP9, is a component of the chromatin structure remodeling complex (RSC), which is involved in transcription regulation and nucleosome positioning. It is also part of the SWI/SNF complex, an ATP-dependent chromatin remodeling complex, which is required for the positive and negative regulation of gene expression of many genes. Arp9 forms a stable heterodimer with Arp7 protein in both the RSC and SWI/SNF chromatin-remodeling complexes. It has been suggested that this dimer functions as a module with DNA bending proteins, to achieve correct architecture and facilitate complex-complex interactions. Fission yeast SWI/SNF and RSC complexes do not contain Arp7 and Arp8, but instead contain Arp9 and Arp42."
definition: >-
  nucleotide-binding domain (NBD) of Saccharomyces cerevisiae actin-related protein 9 (Arp9) and similar proteins. Saccharomyces cerevisiae Arp9, also called actin-like protein 9, chromatin structure-remodeling complex protein ARP9, or SWI/SNF complex component ARP9, is a component of the chromatin structure remodeling complex (RSC), which is involved in transcription regulation and nucleosome positioning. It is also part of the SWI/SNF complex, an ATP-dependent chromatin remodeling complex, which is required for the positive and negative regulation of gene expression of many genes. Arp9 forms a stable heterodimer with Arp7 protein in both the RSC and SWI/SNF chromatin-remodeling complexes. It has been suggested that this dimer functions as a module with DNA bending proteins, to achieve correct architecture and facilitate complex-complex interactions. Fission yeast SWI/SNF and RSC complexes do not contain Arp7 and Arp8, but instead contain Arp9 and Arp42. — an NCBI CDD conserved domain (cd10208); members share this curated model.
