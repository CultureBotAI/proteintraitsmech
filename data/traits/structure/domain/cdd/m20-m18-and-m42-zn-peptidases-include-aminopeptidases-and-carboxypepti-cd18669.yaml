identifier: CDD:cd18669
label: "M20, M18 and M42 Zn-peptidases include aminopeptidases and carboxypeptidases. This family corresponds to the MEROPS MH clan families M18, M20, and M42. The peptidase M20 family contains exopeptidases, including carboxypeptidases such as the glutamate carboxypeptidase from Pseudomonas, the thermostable carboxypeptidase Ss1 of broad specificity from archaea and yeast Gly-X carboxypeptidase, dipeptidases such as bacterial dipeptidase, peptidase V (PepV), a eukaryotic, non-specific dipeptidase, and two Xaa-His dipeptidases (carnosinases). This family also includes the bacterial aminopeptidase peptidase T (PepT) that acts only on tripeptide substrates and has therefore been termed a tripeptidase. These peptidases generally hydrolyze the late products of protein degradation so as to complete the conversion of proteins to free amino acids. Glutamate carboxypeptidase hydrolyzes folate analogs such as methotrexate, and therefore can be used to treat methotrexate toxicity. Peptidase families M18 and M42 contain metallo-aminopeptidases. M18 (aspartyl aminopeptidase, DAP) family cleaves only unblocked N-terminal acidic amino-acid residues and is highly selective for hydrolyzing aspartate or glutamate residues. Some M42 (also known as glutamyl aminopeptidase) enzymes exhibit aminopeptidase specificity while others also have acylaminoacyl-peptidase activity (i.e. hydrolysis of acylated N-terminal residues)."
definition: >-
  M20, M18 and M42 Zn-peptidases include aminopeptidases and carboxypeptidases. This family corresponds to the MEROPS MH clan families M18, M20, and M42. The peptidase M20 family contains exopeptidases, including carboxypeptidases such as the glutamate carboxypeptidase from Pseudomonas, the thermostable carboxypeptidase Ss1 of broad specificity from archaea and yeast Gly-X carboxypeptidase, dipeptidases such as bacterial dipeptidase, peptidase V (PepV), a eukaryotic, non-specific dipeptidase, and two Xaa-His dipeptidases (carnosinases). This family also includes the bacterial aminopeptidase peptidase T (PepT) that acts only on tripeptide substrates and has therefore been termed a tripeptidase. These peptidases generally hydrolyze the late products of protein degradation so as to complete the conversion of proteins to free amino acids. Glutamate carboxypeptidase hydrolyzes folate analogs such as methotrexate, and therefore can be used to treat methotrexate toxicity. Peptidase families M18 and M42 contain metallo-aminopeptidases. M18 (aspartyl aminopeptidase, DAP) family cleaves only unblocked N-terminal acidic amino-acid residues and is highly selective for hydrolyzing aspartate or glutamate residues. Some M42 (also known as glutamyl aminopeptidase) enzymes exhibit aminopeptidase specificity while others also have acylaminoacyl-peptidase activity (i.e. hydrolysis of acylated N-terminal residues). — an NCBI CDD conserved domain (cd18669); members share this curated model.
