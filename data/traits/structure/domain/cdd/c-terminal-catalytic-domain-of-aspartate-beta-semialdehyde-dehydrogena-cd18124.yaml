identifier: CDD:cd18124
label: "C-terminal catalytic domain of aspartate beta-semialdehyde dehydrogenase (ASADH), USG-1 protein and similar proteins. The family includes aspartate beta-semialdehyde dehydrogenase (ASADH), NADP-dependent malonyl-CoA reductase (MCR), and USG-1 protein. These proteins contain an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain and are members of the GAPDH superfamily of proteins. ASADH (EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the NADPH-dependent formation of L-aspartate-semialdehyde (ASA) by the reductive dephosphorylation of L-aspartyl-4-phosphate, which is the second step of the aspartate biosynthetic pathway. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. NADP-dependent MCR (EC 1.2.1.75) is mainly found in Archaea. It catalyzes the reduction of malonyl-CoA to malonate semialdehyde, a key step in the 3-hydroxypropanoate and the 3-hydroxypropanoate/4-hydroxybutyrate cycles. It can also use succinyl-CoA and succinate semialdehyde as substrates but at a lower rate than malonyl-CoA. Sequence comparison suggests that the archaeal MCR gene (mcr) has evolved from the duplication of a common ancestral ASADH gene (asd). The biological function of USG-1 protein and homologs remains unclear. They are homologs to ASADH but lack the conserved active site residues of the ASADH protein C-terminal catalytic domain."
definition: >-
  C-terminal catalytic domain of aspartate beta-semialdehyde dehydrogenase (ASADH), USG-1 protein and similar proteins. The family includes aspartate beta-semialdehyde dehydrogenase (ASADH), NADP-dependent malonyl-CoA reductase (MCR), and USG-1 protein. These proteins contain an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain and are members of the GAPDH superfamily of proteins. ASADH (EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the NADPH-dependent formation of L-aspartate-semialdehyde (ASA) by the reductive dephosphorylation of L-aspartyl-4-phosphate, which is the second step of the aspartate biosynthetic pathway. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. NADP-dependent MCR (EC 1.2.1.75) is mainly found in Archaea. It catalyzes the reduction of malonyl-CoA to malonate semialdehyde, a key step in the 3-hydroxypropanoate and the 3-hydroxypropanoate/4-hydroxybutyrate cycles. It can also use succinyl-CoA and succinate semialdehyde as substrates but at a lower rate than malonyl-CoA. Sequence comparison suggests that the archaeal MCR gene (mcr) has evolved from the duplication of a common ancestral ASADH gene (asd). The biological function of USG-1 protein and homologs remains unclear. They are homologs to ASADH but lack the conserved active site residues of the ASADH protein C-terminal catalytic domain. — an NCBI CDD conserved domain (cd18124); members share this curated model.
