identifier: CDD:cd16467
label: "RING finger, H2 subclass, found in E3 ubiquitin-protein ligase RNF6, RNF12, and similar proteins. RNF6 is an androgen receptor (AR)-associated protein that induces AR ubiquitination and promotes AR transcriptional activity. RNF6-induced ubiquitination may regulate AR transcriptional activity and specificity by modulating cofactor recruitment. RNF6 is overexpressed in hormone-refractory human prostate cancer tissues and required for prostate cancer cell growth under androgen-depleted conditions. RNF6 also regulates local serine/threonine kinase LIM kinase 1 (LIMK1) levels in axonal growth cones. RNF6-induced LIMK1 polyubiquitination is mediated via K48 of ubiquitin and leads to proteasomal degradation of the kinase. RNF6 binds and upregulates the Inha promoter, and functions as a transcription regulatory protein in the mouse sertoli cell. It acts as a potential tumor suppressor gene involved in the pathogenesis of esophageal squamous cell carcinoma (ESCC). RNF12, also known as LIM domain-interacting RING finger protein, or RING finger LIM domain-binding protein (R-LIM), is an E3 ubiquitin-protein ligase encoded by gene RLIM that is crucial for normal embryonic development in some species and for normal X inactivation in mice. It thus functions as a major sex-specific epigenetic regulator of female mouse nurturing tissues. RNF12 is widely expressed during embryogenesis, and mainly localizes to the cell nucleus, where it regulates the levels of many proteins, including CLIM, LMO, HDAC2, TRF1, SMAD7, and REX1, by proteasomal degradation. Both RNF6 and RNF12 contain a well conserved C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in E3 ubiquitin-protein ligase RNF6, RNF12, and similar proteins. RNF6 is an androgen receptor (AR)-associated protein that induces AR ubiquitination and promotes AR transcriptional activity. RNF6-induced ubiquitination may regulate AR transcriptional activity and specificity by modulating cofactor recruitment. RNF6 is overexpressed in hormone-refractory human prostate cancer tissues and required for prostate cancer cell growth under androgen-depleted conditions. RNF6 also regulates local serine/threonine kinase LIM kinase 1 (LIMK1) levels in axonal growth cones. RNF6-induced LIMK1 polyubiquitination is mediated via K48 of ubiquitin and leads to proteasomal degradation of the kinase. RNF6 binds and upregulates the Inha promoter, and functions as a transcription regulatory protein in the mouse sertoli cell. It acts as a potential tumor suppressor gene involved in the pathogenesis of esophageal squamous cell carcinoma (ESCC). RNF12, also known as LIM domain-interacting RING finger protein, or RING finger LIM domain-binding protein (R-LIM), is an E3 ubiquitin-protein ligase encoded by gene RLIM that is crucial for normal embryonic development in some species and for normal X inactivation in mice. It thus functions as a major sex-specific epigenetic regulator of female mouse nurturing tissues. RNF12 is widely expressed during embryogenesis, and mainly localizes to the cell nucleus, where it regulates the levels of many proteins, including CLIM, LMO, HDAC2, TRF1, SMAD7, and REX1, by proteasomal degradation. Both RNF6 and RNF12 contain a well conserved C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd16467); members share this curated model.
