identifier: CDD:cd22677
label: "forkhead associated (FHA) domain found in kanadaptin and similar proteins. Kanadaptin, also called human lung cancer oncogene 3 protein (HLC-3), kidney anion exchanger adapter protein, or solute carrier family 4 anion exchanger member 1 adapter protein (SLC4A1AP), is a nuclear protein widely expressed in mammalian tissues. It was originally isolated as a kidney Cl-/HCO3- anion exchanger 1 (kAE1)-binding protein. It is a highly mobile nucleocytoplasmic shuttling and multilocalizing protein. Its role in mammalian cells remains unclear. It contains an FHA domain, which is a small phosphopeptide recognition module."
definition: >-
