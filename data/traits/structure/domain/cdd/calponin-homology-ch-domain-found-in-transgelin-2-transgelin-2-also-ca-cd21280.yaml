identifier: CDD:cd21280
label: "calponin homology (CH) domain found in transgelin-2. Transgelin-2, also called epididymis tissue protein Li 7e, or SM22-alpha homolog, acts as an actin-binding protein that induces actin gelation and regulates the actin cytoskeleton. It may participate in the development and progression of multiple cancers. It contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
