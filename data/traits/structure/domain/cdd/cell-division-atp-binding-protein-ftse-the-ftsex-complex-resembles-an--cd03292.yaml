label: "Cell division ATP-binding protein FtsE. The FtsEX complex resembles an ABC transporter, where FtsE is the ATPase and the membrane subunit FtsX resembles a       permease subunit. But rather than transporting any substrate, the complex acts in cell division by undergoing conformational      changes that alter the activity of cell wall hydrolases located outside the plasma membrane. The complex is widely conserved       in bacteria, but also extremely divergent in sequence between different lineages"
definition: >-
  Cell division ATP-binding protein FtsE. The FtsEX complex resembles an ABC transporter, where FtsE is the ATPase and the membrane subunit FtsX resembles a permease subunit. But rather than transporting any substrate, the complex acts in cell division by undergoing conformational changes that alter the activity of cell wall hydrolases located outside the plasma membrane. The complex is widely conserved in bacteria, but also extremely divergent in sequence between different lineages — an NCBI CDD conserved domain (cd03292); members share this curated model.
