identifier: CDD:cd03830
label: "This superfamily contains PNP_oxidases and flavin reductase families. Members of this hierarchy contain flavin binding domain. They catalyze flavin-mediated oxidoreduction process. The electron is transferred from substrate to FMN and then pass along to another substrate. The flavin reductase family includes the ferric reductase. It is the smaller component of a two-component enzyme system. The larger component is an oxidase."
definition: >-
  This superfamily contains PNP_oxidases and flavin reductase families. Members of this hierarchy contain flavin binding domain. They catalyze flavin-mediated oxidoreduction process. The electron is transferred from substrate to FMN and then pass along to another substrate. The flavin reductase family includes the ferric reductase. It is the smaller component of a two-component enzyme system. The larger component is an oxidase. — an NCBI CDD conserved domain (cd03830); members share this curated model.
