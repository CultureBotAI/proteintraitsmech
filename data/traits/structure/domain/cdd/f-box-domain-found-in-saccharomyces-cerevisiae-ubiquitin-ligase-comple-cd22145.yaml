identifier: CDD:cd22145
label: "F-box domain found in Saccharomyces cerevisiae ubiquitin ligase complex F-box protein UFO1 (ScUFO1) and similar proteins. ScUFO1 is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It probably recognizes and binds to phosphorylated target proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Saccharomyces cerevisiae ubiquitin ligase complex F-box protein UFO1 (ScUFO1) and similar proteins. ScUFO1 is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. It probably recognizes and binds to phosphorylated target proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22145); members share this curated model.
