identifier: CDD:cd21455
label: "dynein light chain (DLC)-like domain found in the dynein light chain Tctex-type 1 (DYNLT1) family. The dynein light chain Tctex-type 1 (DYNLT1) family includes two isoforms, DYNLT1 and DYNLT3, which contribute to the differential regulation of dynein cargo binding. They are non-catalytic accessory components of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. The dynein complex contains either DYNLT1 or DYNLT3, but not both. The model corresponds to the dynein light chain (DLC)-like domain of DYNLT1 and DYNLT3."
definition: >-
  dynein light chain (DLC)-like domain found in the dynein light chain Tctex-type 1 (DYNLT1) family. The dynein light chain Tctex-type 1 (DYNLT1) family includes two isoforms, DYNLT1 and DYNLT3, which contribute to the differential regulation of dynein cargo binding. They are non-catalytic accessory components of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. The dynein complex contains either DYNLT1 or DYNLT3, but not both. The model corresponds to the dynein light chain (DLC)-like domain of DYNLT1 and DYNLT3. — an NCBI CDD conserved domain (cd21455); members share this curated model.
