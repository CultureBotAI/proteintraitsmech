identifier: CDD:cd14853
label: "Longin-like domains of Trafficking protein particle complex. Longin-like domains of a subfamily of core components of the trafficking protein particle complex (TRAPP), including TRAPPC2, TRAPPC4, TRAPPC1 and a TRAPPC2L, whose function is not known.  TRAPP complexes are required for tethering endoplasmic reticulum (ER)-derived vesicles to Golgi membranes and for Golgi traffic."
definition: >-
  Longin-like domains of Trafficking protein particle complex. Longin-like domains of a subfamily of core components of the trafficking protein particle complex (TRAPP), including TRAPPC2, TRAPPC4, TRAPPC1 and a TRAPPC2L, whose function is not known. TRAPP complexes are required for tethering endoplasmic reticulum (ER)-derived vesicles to Golgi membranes and for Golgi traffic. — an NCBI CDD conserved domain (cd14853); members share this curated model.
