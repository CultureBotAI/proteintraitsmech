identifier: CDD:cd02227
label: "Thermotoga maritima TM1112 and related proteins, cupin domain. This family includes bacterial and plant proteins homologous to TM1112, a Thermotoga maritima protein of unknown function with a cupin beta barrel domain. TM1112 (also known as DUF861) is a subfamily of RmlC-like cupins with a conserved \"jelly roll-like\" beta-barrel fold; structures indicate that a monomer is the biologically-relevant form."
definition: >-
  Thermotoga maritima TM1112 and related proteins, cupin domain. This family includes bacterial and plant proteins homologous to TM1112, a Thermotoga maritima protein of unknown function with a cupin beta barrel domain. TM1112 (also known as DUF861) is a subfamily of RmlC-like cupins with a conserved "jelly roll-like" beta-barrel fold; structures indicate that a monomer is the biologically-relevant form. — an NCBI CDD conserved domain (cd02227); members share this curated model.
