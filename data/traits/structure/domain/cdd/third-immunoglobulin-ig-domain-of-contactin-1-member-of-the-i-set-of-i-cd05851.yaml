identifier: CDD:cd05851
label: "Third immunoglobulin (Ig) domain of contactin-1; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the third immunoglobulin (Ig) domain of the neural cell adhesion molecule contactin-1. Contactins are comprised of six Ig domains followed by four fibronectin type III (FnIII) domains anchored to the membrane by glycosylphosphatidylinositol. Contactin-1 is differentially expressed in tumor tissues and may through a RhoA mechanism, facilitate invasion and metastasis of human lung adenocarcinoma. This group belongs to the I-set of IgSF domains."
definition: >-
  Third immunoglobulin (Ig) domain of contactin-1; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the third immunoglobulin (Ig) domain of the neural cell adhesion molecule contactin-1. Contactins are comprised of six Ig domains followed by four fibronectin type III (FnIII) domains anchored to the membrane by glycosylphosphatidylinositol. Contactin-1 is differentially expressed in tumor tissues and may through a RhoA mechanism, facilitate invasion and metastasis of human lung adenocarcinoma. This group belongs to the I-set of IgSF domains. — an NCBI CDD conserved domain (cd05851); members share this curated model.
