identifier: CDD:cd03736
label: "SOCS (suppressors of cytokine signaling) box of SOCS2-like proteins. Together with CIS1, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. SOCS2 has recently been shown to regulate neuronal differentiation by controlling expression of a neurogenic transcription factor, Neurogenin-1. SOCS2 binds to GH receptors and inhibits the activation of STAT5b induced by GH. The general function of the SOCS box is the recruitment of the ubiquitin-transferase system. The SOCS box interacts with Elongins B and C, Cullin-5 or Cullin-2, Rbx-1, and E2. Therefore, SOCS-box-containing proteins probably function as E3 ubiquitin ligases and mediate the degradation of proteins associated through their N-terminal regions."
definition: >-
  SOCS (suppressors of cytokine signaling) box of SOCS2-like proteins. Together with CIS1, the CIS/SOCS family of proteins is characterized by the presence of a C-terminal SOCS box and a central SH2 domain. SOCS2 has recently been shown to regulate neuronal differentiation by controlling expression of a neurogenic transcription factor, Neurogenin-1. SOCS2 binds to GH receptors and inhibits the activation of STAT5b induced by GH. The general function of the SOCS box is the recruitment of the ubiquitin-transferase system. The SOCS box interacts with Elongins B and C, Cullin-5 or Cullin-2, Rbx-1, and E2. Therefore, SOCS-box-containing proteins probably function as E3 ubiquitin ligases and mediate the degradation of proteins associated through their N-terminal regions. — an NCBI CDD conserved domain (cd03736); members share this curated model.
