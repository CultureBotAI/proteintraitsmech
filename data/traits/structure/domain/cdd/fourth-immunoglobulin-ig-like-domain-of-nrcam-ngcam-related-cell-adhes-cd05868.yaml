identifier: CDD:cd05868
label: "Fourth immunoglobulin (Ig)-like domain of NrCAM (NgCAM-related cell adhesion molecule). The members here are composed of the fourth immunoglobulin (Ig)-like domain of NrCAM (NgCAM-related cell adhesion molecule). NrCAM belongs to the L1 subfamily of cell adhesion molecules (CAMs) and is comprised of an extracellular region having six IG-like domains and five fibronectin type III domains, a transmembrane region, and an intracellular domain. NrCAM is primarily expressed in the nervous system."
definition: >-
  Fourth immunoglobulin (Ig)-like domain of NrCAM (NgCAM-related cell adhesion molecule). The members here are composed of the fourth immunoglobulin (Ig)-like domain of NrCAM (NgCAM-related cell adhesion molecule). NrCAM belongs to the L1 subfamily of cell adhesion molecules (CAMs) and is comprised of an extracellular region having six IG-like domains and five fibronectin type III domains, a transmembrane region, and an intracellular domain. NrCAM is primarily expressed in the nervous system. — an NCBI CDD conserved domain (cd05868); members share this curated model.
