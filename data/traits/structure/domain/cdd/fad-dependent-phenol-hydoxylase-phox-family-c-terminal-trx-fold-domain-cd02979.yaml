identifier: CDD:cd02979
label: "FAD-dependent Phenol hydoxylase (PHOX) family, C-terminal TRX-fold domain; composed of proteins similar to PHOX from the aerobic topsoil yeast Trichosporon cutaneum. PHOX is a flavoprotein monooxygenase that catalyzes the hydroxylation of phenol and simple phenol derivatives in the ortho position with the consumption of NADPH and oxygen. This is the first step in the biodegradation and detoxification of phenolic compounds. PHOX contains three domains. The substrate and FAD/NAD(P) binding sites are contained in the first two domains, which adopt a complicated folding pattern. The third or C-terminal domain contains a TRX fold and is involved in dimerization. The functional unit of PHOX is a dimer, although active tetramers of the recombinant enzyme can be isolated when overproduced in bacteria."
definition: >-
  FAD-dependent Phenol hydoxylase (PHOX) family, C-terminal TRX-fold domain; composed of proteins similar to PHOX from the aerobic topsoil yeast Trichosporon cutaneum. PHOX is a flavoprotein monooxygenase that catalyzes the hydroxylation of phenol and simple phenol derivatives in the ortho position with the consumption of NADPH and oxygen. This is the first step in the biodegradation and detoxification of phenolic compounds. PHOX contains three domains. The substrate and FAD/NAD(P) binding sites are contained in the first two domains, which adopt a complicated folding pattern. The third or C-terminal domain contains a TRX fold and is involved in dimerization. The functional unit of PHOX is a dimer, although active tetramers of the recombinant enzyme can be isolated when overproduced in bacteria. — an NCBI CDD conserved domain (cd02979); members share this curated model.
