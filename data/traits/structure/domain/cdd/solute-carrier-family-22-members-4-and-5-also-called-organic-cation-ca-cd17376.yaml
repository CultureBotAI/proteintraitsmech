identifier: CDD:cd17376
label: "Solute carrier family 22 members 4 and 5 (also called Organic cation/carnitine transporters 1 and 2) of the Major Facilitator Superfamily of transporters. This subfamily is composed of solute carrier family 22 members 4 (SLC22A4) and 5 (SLC22A5), and similar proteins. SLC22A4 is also called ergothioneine transporter (ETT) or organic cation/carnitine transporter 1 (OCTN1). It is a sodium-ion dependent, low affinity carnitine transporter, and a highly specific transporter for the uptake of ergothioneine (ET), a thiolated derivative of histidine with antioxidant properties. ET is a natural compound produced only by certain fungi and bacteria and must be absorbed from the diet by humans and other vetebrates. SLC22A5, also called organic cation/carnitine transporter 2 (OCTN2), is a sodium-ion dependent, high affinity carnitine transporter involved in the active cellular uptake of carnitine. SLC22A4/5 belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier family 22 members 4 and 5 (also called Organic cation/carnitine transporters 1 and 2) of the Major Facilitator Superfamily of transporters. This subfamily is composed of solute carrier family 22 members 4 (SLC22A4) and 5 (SLC22A5), and similar proteins. SLC22A4 is also called ergothioneine transporter (ETT) or organic cation/carnitine transporter 1 (OCTN1). It is a sodium-ion dependent, low affinity carnitine transporter, and a highly specific transporter for the uptake of ergothioneine (ET), a thiolated derivative of histidine with antioxidant properties. ET is a natural compound produced only by certain fungi and bacteria and must be absorbed from the diet by humans and other vetebrates. SLC22A5, also called organic cation/carnitine transporter 2 (OCTN2), is a sodium-ion dependent, high affinity carnitine transporter involved in the active cellular uptake of carnitine. SLC22A4/5 belongs to the Solute carrier 22 (SLC22) family of organic cation/anion/zwitterion transporters of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17376); members share this curated model.
