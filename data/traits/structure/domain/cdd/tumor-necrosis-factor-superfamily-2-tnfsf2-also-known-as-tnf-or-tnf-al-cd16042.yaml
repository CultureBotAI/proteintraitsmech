identifier: CDD:cd16042
label: "Tumor Necrosis Factor Superfamily 2 (TNFSF2), also known as TNF or TNF-alpha. This family contains TNF-alpha (also known as TNF, TNFSF2, TNFA, DIF or Cachectin) is a cytokine that has a wide variety of functions, including cytolysis of certain tumor cell lines, induction of cachexia, induction of fever by direct action or by stimulation of interleukin-1 secretion, as well as stimulation of cell proliferation and induction of cell differentiation under certain conditions. TNF-alpha binds TNFR1 (also known as type I TNFR, TNFR1, DR1, TNFRSF1A, CD120a, p55) through the death domain (DD), which activates NF-kappaB, mediates apoptosis and activates signaling pathways controlling inflammatory, immune and stress responses. It also binds TNFR2 (TNFRSF2, type 2 TNFR, TNFBR, TNFR80, TNF-R75, TNF-R-II, p75, CD120b) which lacks the DD but is inducible and expressed exclusively by oligodendrocytes, astrocytes, T cells, thymocytes, myocytes, endothelial cells and in human mesenchymal stem cells, and is responsible for suppression of inflammation. Although the affinities of both receptors for soluble TNF-alpha are similar, TNFR1 is sometimes more abundantly expressed and thought to associate with TNF, thereby increasing its concentration near TNFR1 receptors, and making TNF available to activate TNFR1 (a ligand-passing mechanism). TNF-alpha is synthesized as a type II transmembrane protein which is then clipped by the TNF converting enzyme (TACE) and released as a homotrimer to bind to its receptors. It is a mediator of hepatotoxicity and has been implicated in cholestasis-induced liver fibrosis. TNF-alpha is an essential player in infection with Leishmania, controlling inflammatory lesion and parasite killing by generating nitric oxide."
definition: >-
  Tumor Necrosis Factor Superfamily 2 (TNFSF2), also known as TNF or TNF-alpha. This family contains TNF-alpha (also known as TNF, TNFSF2, TNFA, DIF or Cachectin) is a cytokine that has a wide variety of functions, including cytolysis of certain tumor cell lines, induction of cachexia, induction of fever by direct action or by stimulation of interleukin-1 secretion, as well as stimulation of cell proliferation and induction of cell differentiation under certain conditions. TNF-alpha binds TNFR1 (also known as type I TNFR, TNFR1, DR1, TNFRSF1A, CD120a, p55) through the death domain (DD), which activates NF-kappaB, mediates apoptosis and activates signaling pathways controlling inflammatory, immune and stress responses. It also binds TNFR2 (TNFRSF2, type 2 TNFR, TNFBR, TNFR80, TNF-R75, TNF-R-II, p75, CD120b) which lacks the DD but is inducible and expressed exclusively by oligodendrocytes, astrocytes, T cells, thymocytes, myocytes, endothelial cells and in human mesenchymal stem cells, and is responsible for suppression of inflammation. Although the affinities of both receptors for soluble TNF-alpha are similar, TNFR1 is sometimes more abundantly expressed and thought to associate with TNF, thereby increasing its concentration near TNFR1 receptors, and making TNF available to activate TNFR1 (a ligand-passing mechanism). TNF-alpha is synthesized as a type II transmembrane protein which is then clipped by the TNF converting enzyme (TACE) and released as a homotrimer to bind to its receptors. It is a mediator of hepatotoxicity and has been implicated in cholestasis-induced liver fibrosis. TNF-alpha is an essential player in infection with Leishmania, controlling inflammatory lesion and parasite killing by generating nitric oxide. — an NCBI CDD conserved domain (cd16042); members share this curated model.
