identifier: CDD:cd19448
label: "fatty acid-binding protein similar to Manduca sexta and Eriocheir sinensis fatty acid-binding protein 1. This subfamily includes fatty acid-binding protein found mainly in insects such as Manduca sexta FABP1 (also known as MFB1) and Luciola cerata FABP (LcFABP), and crustacea such as Eriocheir sinensis FABP (Es-FABP). MFB1, which is isolated from midgut cytosol, binds fatty acids in a 1:1 molar ratio. LcFABP, abundantly and specifically expressed in the cytosol as well as the nucleus of cells of the photogenic layer of firefly light organ, binds fatty acids of length C14-C18. Es-FABP plays a role in lipid transport during the period of rapid ovarian growth and is involved in lipid nutrient absorption and utilization processes in the hepatopancreas, ovary, and hemocytes. It is also expressed in gills, muscle, thoracic ganglia, heart, and intestine. This subgroup belongs to the intracellular fatty acid-binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
