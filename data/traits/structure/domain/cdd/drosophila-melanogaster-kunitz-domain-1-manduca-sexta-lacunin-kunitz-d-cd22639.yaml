identifier: CDD:cd22639
label: "Drosophila melanogaster Kunitz domain 1, Manduca sexta lacunin Kunitz domain 1, and simialr proteins. This model includes Drosophila melanogaster Kunitz domain 1 of papilin and Manduca sexta Kunitz domain 1 of lacunin, and similar proteins. D. melanogaster papilin is an essential extracellular matrix (ECM) protein that influences cell rearrangements. It may act by modulating metalloproteinase action during organogenesis and is able to non-competitively inhibit procollagen N-proteinase, an ADAMTS metalloproteinase. M. sexta lacunin is a large multidomain ECM containing several domains including several Kunitz-type protease inhibitors, thrombospondin type I, immunoglobulin-like and others. It exerts multiple effects on a variety of cell behaviors associated with the complex phenomenon of epithelial morphogenesis. These domains are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Drosophila melanogaster Kunitz domain 1, Manduca sexta lacunin Kunitz domain 1, and simialr proteins. This model includes Drosophila melanogaster Kunitz domain 1 of papilin and Manduca sexta Kunitz domain 1 of lacunin, and similar proteins. D. melanogaster papilin is an essential extracellular matrix (ECM) protein that influences cell rearrangements. It may act by modulating metalloproteinase action during organogenesis and is able to non-competitively inhibit procollagen N-proteinase, an ADAMTS metalloproteinase. M. sexta lacunin is a large multidomain ECM containing several domains including several Kunitz-type protease inhibitors, thrombospondin type I, immunoglobulin-like and others. It exerts multiple effects on a variety of cell behaviors associated with the complex phenomenon of epithelial morphogenesis. These domains are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22639); members share this curated model.
