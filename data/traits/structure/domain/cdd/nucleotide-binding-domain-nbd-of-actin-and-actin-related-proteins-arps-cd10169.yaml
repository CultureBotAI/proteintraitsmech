identifier: CDD:cd10169
label: "nucleotide-binding domain (NBD) of actin and actin-related proteins (ARPs). Actin is ubiquitous in eukaryotes, and the major component of the actin cytoskeleton; monomeric globular protein (G-actin) reversibly polymerizes to form filaments (F-actin). Each actin protomer binds one molecule of ATP and either calcium or magnesium ions. F-actin filaments form with the consequent hydrolysis of ATP. Some actin-related proteins (Arps) have roles in cytoskeletal functions, such as actin polymerization (Arp2/3) and dynein motor activity (Arp1). Both conventional actin and specific Arps have been implicated in chromatin remodeling and/or transcription regulation. The actin/ARP family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of actin and actin-related proteins (ARPs). Actin is ubiquitous in eukaryotes, and the major component of the actin cytoskeleton; monomeric globular protein (G-actin) reversibly polymerizes to form filaments (F-actin). Each actin protomer binds one molecule of ATP and either calcium or magnesium ions. F-actin filaments form with the consequent hydrolysis of ATP. Some actin-related proteins (Arps) have roles in cytoskeletal functions, such as actin polymerization (Arp2/3) and dynein motor activity (Arp1). Both conventional actin and specific Arps have been implicated in chromatin remodeling and/or transcription regulation. The actin/ARP family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd10169); members share this curated model.
