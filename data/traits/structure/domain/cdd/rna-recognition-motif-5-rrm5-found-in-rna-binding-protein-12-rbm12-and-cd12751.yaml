identifier: CDD:cd12751
label: "RNA recognition motif 5 (RRM5) found in RNA-binding protein 12 (RBM12) and similar proteins. This subgroup corresponds to the RRM5 of RBM12, also termed SH3/WW domain anchor protein in the nucleus (SWAN), which is ubiquitously expressed. It contains five distinct RNA binding motifs (RBMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two proline-rich regions, and several putative transmembrane domains. The biological role of RBM12 remains unclear."
definition: >-
  RNA recognition motif 5 (RRM5) found in RNA-binding protein 12 (RBM12) and similar proteins. This subgroup corresponds to the RRM5 of RBM12, also termed SH3/WW domain anchor protein in the nucleus (SWAN), which is ubiquitously expressed. It contains five distinct RNA binding motifs (RBMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two proline-rich regions, and several putative transmembrane domains. The biological role of RBM12 remains unclear. — an NCBI CDD conserved domain (cd12751); members share this curated model.
