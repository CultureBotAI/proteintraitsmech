identifier: CDD:cd17189
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM, ARH/RhoGEF and pleckstrin domain-containing protein 1 (FARP1). FARP1, also termed chondrocyte-derived ezrin-like protein (CDEP), or pleckstrin homology (PH) domain-containing family C member 2 (PLEKHC2), is a neuronal activator of the RhoA GTPase. It promotes outgrowth of developing motor neuron dendrites. It also regulates excitatory synapse formation and morphology, as well as activates the GTPase Rac1 to promote F-actin assembly. As a novel downstream signaling partner of Rif, FARP1 is involved in the regulation of semaphorin signaling in neurons. FARP1 contains a FERM domain, a Dbl-homology (DH) domain and two pleckstrin homology (PH) domains. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM, ARH/RhoGEF and pleckstrin domain-containing protein 1 (FARP1). FARP1, also termed chondrocyte-derived ezrin-like protein (CDEP), or pleckstrin homology (PH) domain-containing family C member 2 (PLEKHC2), is a neuronal activator of the RhoA GTPase. It promotes outgrowth of developing motor neuron dendrites. It also regulates excitatory synapse formation and morphology, as well as activates the GTPase Rac1 to promote F-actin assembly. As a novel downstream signaling partner of Rif, FARP1 is involved in the regulation of semaphorin signaling in neurons. FARP1 contains a FERM domain, a Dbl-homology (DH) domain and two pleckstrin homology (PH) domains. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17189); members share this curated model.
