identifier: CDD:cd16683
label: "RING finger, H2 subclass, found in RING finger protein 139 (RNF139) and similar proteins. RNF139, also known as translocation in renal carcinoma on chromosome 8 protein (TRC8), is an endoplasmic reticulum (ER)-resident multi-transmembrane protein that functions as a potent growth suppressor in mammalian cells, inducing G2/M arrest, decreased DNA synthesis and increased apoptosis. It is a tumor suppressor that has been implicated in a novel regulatory relationship linking the cholesterol/lipid biosynthetic pathway with cellular growth control. A mutation in RNF139 has been identified in families with hereditary renal (RCC) and thyroid cancers. RNF139 physically and functionally interacts with von Hippel-Lindau (VHL), which is part of an SCF related E3-ubiquitin ligase complex with \"gatekeeper\" function in renal carcinoma and is defective in most sporadic clear-cell renal cell carcinomas (ccRCC). It suppresses growth and functions with VHL in a common pathway. RNF139 also suppresses tumorigenesis by targeting heme oxygenase-1 for ubiquitination and degradation. Moreover, RNF139 is a target of Translin (TSN), a posttranscriptional regulator of genes transcribed by the transcription factor CREM-tau in postmeiotic male germ cells, suggesting a role of RNF139 in dysgerminoma. In addition, RNF139 forms an integral part of a novel multi-protein ER complex, containing MHC I, US2, and signal peptide peptidase, which is associated with the ER-associated degradation (ERAD) pathway. It is required for the ubiquitination of MHC class I molecules before dislocation from the ER. As a novel sterol-sensing ER membrane protein, RNF139 hinders sterol regulatory element-binding protein-2 (SREBP-2) processing through interaction with SREBP-2 and SREBP cleavage-activated protein (SCAP), regulating its own turnover rate via its E3 ubiquitin ligase activity. RNF139 shows two regions of similarity with the receptor for sonic hedgehog (SHH), Patched. The first region corresponds to the second extracellular domain of Patched, which is involved in binding SHH. The second region is a putative sterol-sensing domain (SSD). The C-terminal half of RNF139 contains a C3H2C3-type RING-H2 finger with E3-ubiquitin ligase activity in vitro."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 139 (RNF139) and similar proteins. RNF139, also known as translocation in renal carcinoma on chromosome 8 protein (TRC8), is an endoplasmic reticulum (ER)-resident multi-transmembrane protein that functions as a potent growth suppressor in mammalian cells, inducing G2/M arrest, decreased DNA synthesis and increased apoptosis. It is a tumor suppressor that has been implicated in a novel regulatory relationship linking the cholesterol/lipid biosynthetic pathway with cellular growth control. A mutation in RNF139 has been identified in families with hereditary renal (RCC) and thyroid cancers. RNF139 physically and functionally interacts with von Hippel-Lindau (VHL), which is part of an SCF related E3-ubiquitin ligase complex with "gatekeeper" function in renal carcinoma and is defective in most sporadic clear-cell renal cell carcinomas (ccRCC). It suppresses growth and functions with VHL in a common pathway. RNF139 also suppresses tumorigenesis by targeting heme oxygenase-1 for ubiquitination and degradation. Moreover, RNF139 is a target of Translin (TSN), a posttranscriptional regulator of genes transcribed by the transcription factor CREM-tau in postmeiotic male germ cells, suggesting a role of RNF139 in dysgerminoma. In addition, RNF139 forms an integral part of a novel multi-protein ER complex, containing MHC I, US2, and signal peptide peptidase, which is associated with the ER-associated degradation (ERAD) pathway. It is required for the ubiquitination of MHC class I molecules before dislocation from the ER. As a novel sterol-sensing ER membrane protein, RNF139 hinders sterol regulatory element-binding protein-2 (SREBP-2) processing through interaction with SREBP-2 and SREBP cleavage-activated protein (SCAP), regulating its own turnover rate via its E3 ubiquitin ligase activity. RNF139 shows two regions of similarity with the receptor for sonic hedgehog (SHH), Patched. The first region corresponds to the second extracellular domain of Patched, which is involved in binding SHH. The second region is a putative sterol-sensing domain (SSD). The C-terminal half of RNF139 contains a C3H2C3-type RING-H2 finger with E3-ubiquitin ligase activity in vitro. — an NCBI CDD conserved domain (cd16683); members share this curated model.
