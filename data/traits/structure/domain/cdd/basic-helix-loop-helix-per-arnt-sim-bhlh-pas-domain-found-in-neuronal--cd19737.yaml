identifier: CDD:cd19737
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing protein 2 (NPAS2) and similar proteins. NPAS2, also termed neuronal PAS2, or basic-helix-loop-helix-PAS protein MOP4, or Class E basic helix-loop-helix protein 9 (bHLHe9), or member of PAS protein 4, or PAS domain-containing protein 4 (PASD4), is a bHLH-PAS transcriptional activator which forms a core component of the circadian clock."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing protein 2 (NPAS2) and similar proteins. NPAS2, also termed neuronal PAS2, or basic-helix-loop-helix-PAS protein MOP4, or Class E basic helix-loop-helix protein 9 (bHLHe9), or member of PAS protein 4, or PAS domain-containing protein 4 (PASD4), is a bHLH-PAS transcriptional activator which forms a core component of the circadian clock. — an NCBI CDD conserved domain (cd19737); members share this curated model.
