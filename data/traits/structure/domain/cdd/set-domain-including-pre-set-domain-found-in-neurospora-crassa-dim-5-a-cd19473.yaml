identifier: CDD:cd19473
label: "SET domain (including pre-SET domain) found in Neurospora crassa (DIM-5) and similar proteins. This subfamily contains Neurospora crassa DIM-5 (also termed H3-K9-HMTase dim-5, or HKMT) which functions as histone-lysine N-methyltransferase that specifically trimethylates histone H3 to form H3K9me3."
definition: >-
  SET domain (including pre-SET domain) found in Neurospora crassa (DIM-5) and similar proteins. This subfamily contains Neurospora crassa DIM-5 (also termed H3-K9-HMTase dim-5, or HKMT) which functions as histone-lysine N-methyltransferase that specifically trimethylates histone H3 to form H3K9me3. — an NCBI CDD conserved domain (cd19473); members share this curated model.
