identifier: CDD:cd09439
label: "The LIM domain of Mical (molecule interacting with CasL). The LIM domain of Mical (molecule interacting with CasL): MICAL is a large, multidomain, cytosolic protein with a single LIM domain, a calponin homology (CH) domain and a flavoprotein monooxygenase domain. In Drosophila, MICAL is expressed in axons, interacts with the neuronal A (PlexA)  receptor and is required for Semapho-rin 1a (Sema-1a)-PlexA-mediated repulsive axon guidance.  The LIM domain and calporin homology domain are known for interactions with the cytoskeleton, cytoskeletal adaptor proteins, and other signaling proteins. The flavoprotein monooxygenase (MO) is required for semaphorin-plexin repulsive axon guidance during axonal pathfinding in the Drosophila neuromuscular system. In addition, MICAL was characterized to interact with Rab13 and Rab8 to coordinate the assembly of tight junctions and adherens junctions in epithelial cells. Thus, MICAL was also named junctional Rab13-binding protein (JRAB). As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The LIM domain of Mical (molecule interacting with CasL). The LIM domain of Mical (molecule interacting with CasL): MICAL is a large, multidomain, cytosolic protein with a single LIM domain, a calponin homology (CH) domain and a flavoprotein monooxygenase domain. In Drosophila, MICAL is expressed in axons, interacts with the neuronal A (PlexA) receptor and is required for Semapho-rin 1a (Sema-1a)-PlexA-mediated repulsive axon guidance. The LIM domain and calporin homology domain are known for interactions with the cytoskeleton, cytoskeletal adaptor proteins, and other signaling proteins. The flavoprotein monooxygenase (MO) is required for semaphorin-plexin repulsive axon guidance during axonal pathfinding in the Drosophila neuromuscular system. In addition, MICAL was characterized to interact with Rab13 and Rab8 to coordinate the assembly of tight junctions and adherens junctions in epithelial cells. Thus, MICAL was also named junctional Rab13-binding protein (JRAB). As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09439); members share this curated model.
