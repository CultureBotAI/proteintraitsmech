identifier: CDD:cd08545
label: "Reeler-like domain of YcnI and similar proteins. YcnI is a copper-responsive gene of Bacillus subtilis. It is homologous to an uncharacterized protein from Nocardia farcinica, which shares a conserved three-dimensional structure with cohesins and the reeler domain. Some members in this YcnI_like family have C-terminal domains (DUF461) that may bind copper."
definition: >-
  Reeler-like domain of YcnI and similar proteins. YcnI is a copper-responsive gene of Bacillus subtilis. It is homologous to an uncharacterized protein from Nocardia farcinica, which shares a conserved three-dimensional structure with cohesins and the reeler domain. Some members in this YcnI_like family have C-terminal domains (DUF461) that may bind copper. — an NCBI CDD conserved domain (cd08545); members share this curated model.
