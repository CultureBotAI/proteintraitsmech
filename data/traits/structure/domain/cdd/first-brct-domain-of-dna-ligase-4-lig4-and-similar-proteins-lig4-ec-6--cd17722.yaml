identifier: CDD:cd17722
label: "first BRCT domain of DNA ligase 4 (LIG4) and similar proteins. LIG4 (EC 6.5.1.1), also termed DNA ligase IV, or polydeoxyribonucleotide synthase [ATP] 4, is involved in DNA non-homologous end joining (NHEJ) required for double-strand break repair and V(D)J recombination. It is a component of the LIG4-XRCC4 complex that is responsible for the NHEJ ligation step. LIG4 contains two BRCT domains. The family corresponds to the first one."
definition: >-
  first BRCT domain of DNA ligase 4 (LIG4) and similar proteins. LIG4 (EC 6.5.1.1), also termed DNA ligase IV, or polydeoxyribonucleotide synthase [ATP] 4, is involved in DNA non-homologous end joining (NHEJ) required for double-strand break repair and V(D)J recombination. It is a component of the LIG4-XRCC4 complex that is responsible for the NHEJ ligation step. LIG4 contains two BRCT domains. The family corresponds to the first one. — an NCBI CDD conserved domain (cd17722); members share this curated model.
