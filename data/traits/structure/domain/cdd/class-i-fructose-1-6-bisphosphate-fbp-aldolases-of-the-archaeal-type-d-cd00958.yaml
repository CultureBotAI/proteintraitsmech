identifier: CDD:cd00958
label: "Class I fructose-1,6-bisphosphate (FBP) aldolases of the archaeal type (DhnA homologs). Class I fructose-1,6-bisphosphate (FBP) aldolases of the archaeal type (DhnA homologs) found in bacteria and archaea. Catalysis of the enzymes proceeds via a Schiff-base mechanism like other class I aldolases, although this subfamily is clearly divergent based on sequence similarity to other class I and class II  (metal dependent) aldolase subfamilies."
definition: >-
  Class I fructose-1,6-bisphosphate (FBP) aldolases of the archaeal type (DhnA homologs). Class I fructose-1,6-bisphosphate (FBP) aldolases of the archaeal type (DhnA homologs) found in bacteria and archaea. Catalysis of the enzymes proceeds via a Schiff-base mechanism like other class I aldolases, although this subfamily is clearly divergent based on sequence similarity to other class I and class II (metal dependent) aldolase subfamilies. — an NCBI CDD conserved domain (cd00958); members share this curated model.
