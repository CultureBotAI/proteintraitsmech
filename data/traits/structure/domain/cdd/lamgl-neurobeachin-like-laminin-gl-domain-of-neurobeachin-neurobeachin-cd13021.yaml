identifier: CDD:cd13021
label: "LamGL_neurobeachin-like. Laminin GL domain of neurobeachin; Neurobeachin is expressed predominantly in neural tissues. Its gene has been linked to an idiopathic case of non-familial autism and spans the common fragile site FRA13A. Neurobeachin is a member of the BEACH protein family, characterized by containing a BEACH domain, which plays a role in vesicle biogenesis, fusion, fission, and/or trafficking. Neurobeachin also contains a high-affinity binding site for the type II regulatory subunit of protein kinase A (PKA RII). It may play a role in neurotransmitter release at neuromuscular junctions and in synaptic transmission.   In general, LamG domains of neurexin and agrin undergo alternative splicing that modulates their affinity for protein ligands. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  LamGL_neurobeachin-like. Laminin GL domain of neurobeachin; Neurobeachin is expressed predominantly in neural tissues. Its gene has been linked to an idiopathic case of non-familial autism and spans the common fragile site FRA13A. Neurobeachin is a member of the BEACH protein family, characterized by containing a BEACH domain, which plays a role in vesicle biogenesis, fusion, fission, and/or trafficking. Neurobeachin also contains a high-affinity binding site for the type II regulatory subunit of protein kinase A (PKA RII). It may play a role in neurotransmitter release at neuromuscular junctions and in synaptic transmission. In general, LamG domains of neurexin and agrin undergo alternative splicing that modulates their affinity for protein ligands. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13021); members share this curated model.
