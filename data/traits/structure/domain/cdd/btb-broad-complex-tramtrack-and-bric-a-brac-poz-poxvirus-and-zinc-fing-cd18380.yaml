identifier: CDD:cd18380
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCND/Kv4 subfamily of Shal-type voltage-dependent potassium channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv4, also known as subfamily D, contains three alpha subunit members, Kv4.1 (KCND1), Kv4.2 (KCND2), and Kv4.3 (KCND3), which are orthologs of the Shal gene in Drosophila. They are A-type potassium channels that mediate the native, fast inactivating (A-type) K+ current (IA) described both in the nervous system (A currents) and the heart (transient outward current). Kv4/KCND subfamily alpha subunits form functional homo- or hetero-tetrameric channels through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. They are modulated by cytoplasmic KChIPs/KCNIPs (Kv-channel interacting proteins), which are small calcium binding proteins with  EF-hand-like domains."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in KCND/Kv4 subfamily of Shal-type voltage-dependent potassium channels. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. The potassium voltage-gated channel subfamily Kv4, also known as subfamily D, contains three alpha subunit members, Kv4.1 (KCND1), Kv4.2 (KCND2), and Kv4.3 (KCND3), which are orthologs of the Shal gene in Drosophila. They are A-type potassium channels that mediate the native, fast inactivating (A-type) K+ current (IA) described both in the nervous system (A currents) and the heart (transient outward current). Kv4/KCND subfamily alpha subunits form functional homo- or hetero-tetrameric channels through their BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. They are modulated by cytoplasmic KChIPs/KCNIPs (Kv-channel interacting proteins), which are small calcium binding proteins with EF-hand-like domains. — an NCBI CDD conserved domain (cd18380); members share this curated model.
