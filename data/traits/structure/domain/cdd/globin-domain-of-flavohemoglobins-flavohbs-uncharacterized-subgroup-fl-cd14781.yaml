identifier: CDD:cd14781
label: "Globin domain of flavohemoglobins (flavoHbs); uncharacterized subgroup. FlavoHbs function primarily as nitric oxide dioxygenases (NODs, EC 1.14.12.17), converting NO and O2 to inert NO3- (nitrate). They have an N-terminal globin domain and a C-terminal ferredoxin reductase-like NAD- and FAD-binding domain, and use the reducing power of cellular NAD(P)H to drive regeneration of the ferrous heme. They protect from nitrosative stress (the broad range of cellular toxicities caused by NO), and modulate NO signaling pathways. This subfamily may contain some single-domain goblins (SDgbs)."
definition: >-
  Globin domain of flavohemoglobins (flavoHbs); uncharacterized subgroup. FlavoHbs function primarily as nitric oxide dioxygenases (NODs, EC 1.14.12.17), converting NO and O2 to inert NO3- (nitrate). They have an N-terminal globin domain and a C-terminal ferredoxin reductase-like NAD- and FAD-binding domain, and use the reducing power of cellular NAD(P)H to drive regeneration of the ferrous heme. They protect from nitrosative stress (the broad range of cellular toxicities caused by NO), and modulate NO signaling pathways. This subfamily may contain some single-domain goblins (SDgbs). — an NCBI CDD conserved domain (cd14781); members share this curated model.
