identifier: CDD:cd21422
label: "mitochondrial glutamyl-tRNA(Gln) amidotransferase subunit F. Glutamyl-tRNA(Gln) amidotransferase subunit F (GatF), also called Glu-AdT subunit F, is the connector subunit of yeast mitochondrial tRNA-dependent amidotransferase (AdT) that is also composed of the GatA and GatB subunits. GatA and GatB are well conserved among bacteria and eukaryota, but the GatF subunit is a fungi-specific ortholog of the GatC subunit found in all other known heterotrimeric AdTs. AdT allows the formation of correctly charged Gln-tRNA(Gln) through the transamidation of misacylated Glu-tRNA(Gln) in the mitochondria. The reaction takes place in the presence of glutamine and ATP through an activated gamma-phospho-Glu-tRNA(Gln). This model corresponds to the GatF subunit, which can be divided into two halves, the C-terminal GatC-like portion and the N-terminal appended domain (NTD)."
