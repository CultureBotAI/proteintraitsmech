identifier: CDD:cd05407
label: "Nucleotidyltransferase (NT) domain of a subgroup of the Polymerase X family DNA polymerase domain-containing proteins having a C-terminal phosphoesterase domain. NT_PolXc_ PHP: A subgroup of the Polymerase X family DNA polymerase domain containing proteins having a C-terminal phosphoesterase (PHP) domain. This group includes Pol X from the highly radioresistant Deinococcus radiodurans (DrPolX). D. radiodurans is a highly radioresistant bacterium. DrPolX plays a role in DNA double-strand break (DSB) repair, particularly repair of DSBs originating from cellular exposure to high doses of ionizing radiation. DrPol X is the only PolX family member known to have a 3prime-to-5prime exonuclease activity; this exonuclease is associated with the polymerase domain. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these POLXc_PHP NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of a subgroup of the Polymerase X family DNA polymerase domain-containing proteins having a C-terminal phosphoesterase domain. NT_PolXc_ PHP: A subgroup of the Polymerase X family DNA polymerase domain containing proteins having a C-terminal phosphoesterase (PHP) domain. This group includes Pol X from the highly radioresistant Deinococcus radiodurans (DrPolX). D. radiodurans is a highly radioresistant bacterium. DrPolX plays a role in DNA double-strand break (DSB) repair, particularly repair of DSBs originating from cellular exposure to high doses of ionizing radiation. DrPol X is the only PolX family member known to have a 3prime-to-5prime exonuclease activity; this exonuclease is associated with the polymerase domain. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these POLXc_PHP NT domains. — an NCBI CDD conserved domain (cd05407); members share this curated model.
