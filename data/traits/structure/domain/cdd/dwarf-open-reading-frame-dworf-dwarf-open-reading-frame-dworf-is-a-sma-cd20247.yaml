label: "DWarf Open Reading Frame (DWORF). DWarf Open Reading Frame (DWORF) is a small protein that plays a key role in heart muscle contraction. DWORF, Sarcolipin (SLN), and myoregulin (MRLN) are transmembrane regulators of the sarcoplasmic reticulum calcium transporting ATPase (SERCA). DWORF enhances SERCA activity by displacing phospholamban (PLN), a potent SERCA inhibitor. This makes DWORF an attractive candidate for a heart failure therapeutic. DWORF is also present in slow-twitch skeletal muscle fibers."
definition: >-
  DWarf Open Reading Frame (DWORF). DWarf Open Reading Frame (DWORF) is a small protein that plays a key role in heart muscle contraction. DWORF, Sarcolipin (SLN), and myoregulin (MRLN) are transmembrane regulators of the sarcoplasmic reticulum calcium transporting ATPase (SERCA). DWORF enhances SERCA activity by displacing phospholamban (PLN), a potent SERCA inhibitor. This makes DWORF an attractive candidate for a heart failure therapeutic. DWORF is also present in slow-twitch skeletal muscle fibers. — an NCBI CDD conserved domain (cd20247); members share this curated model.
