identifier: CDD:cd14238
label: "canonical GAT domain found in target of Myb-like protein 2 (Tom1L2). Tom1L2, together with Myb protein 1 (Tom1) and target of Myb-like protein 1 (Tom1L1), constitute the Tom1 family. Tom1L2 can interact with Toll-interacting protein (Tollip), clathrin, and ubiquitin. It may play a potential role in endosomal sorting, as well as in the regulation of membrane trafficking that is linked to immunity and cell proliferation. Tom1L2 contains an N-terminal VHS (Vps27p/Hrs/STAM)-domain, a GAT (GGA and TOM1) domain, and a C-terminal clathrin-binding region, both of which are conserved in Golgi-localized gamma ear-containing Arf-binding proteins (GGAs). It interacts with Tollip through their GAT domain and recuits clathrin onto endosomes through their C-terminal region. However, in the C-terminal clathrin-binding region, Tom1 and Tom1L2 are similar to each other, but distinguishable from Tom1L1. The canonical GAT domain is a monomeric three-helix bundle that binds ubiquitin."
definition: >-
  canonical GAT domain found in target of Myb-like protein 2 (Tom1L2). Tom1L2, together with Myb protein 1 (Tom1) and target of Myb-like protein 1 (Tom1L1), constitute the Tom1 family. Tom1L2 can interact with Toll-interacting protein (Tollip), clathrin, and ubiquitin. It may play a potential role in endosomal sorting, as well as in the regulation of membrane trafficking that is linked to immunity and cell proliferation. Tom1L2 contains an N-terminal VHS (Vps27p/Hrs/STAM)-domain, a GAT (GGA and TOM1) domain, and a C-terminal clathrin-binding region, both of which are conserved in Golgi-localized gamma ear-containing Arf-binding proteins (GGAs). It interacts with Tollip through their GAT domain and recuits clathrin onto endosomes through their C-terminal region. However, in the C-terminal clathrin-binding region, Tom1 and Tom1L2 are similar to each other, but distinguishable from Tom1L1. The canonical GAT domain is a monomeric three-helix bundle that binds ubiquitin. — an NCBI CDD conserved domain (cd14238); members share this curated model.
