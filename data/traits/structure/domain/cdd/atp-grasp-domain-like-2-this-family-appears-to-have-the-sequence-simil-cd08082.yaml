identifier: CDD:cd08082
label: "ATP-grasp domain like-2. This family appears to have the sequence similarity with the ATP-grasp domain. Enzymes related to ATP-grasp superfamily catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. Catalytic center requires the presence of one or more metal ions as a physiological cofactor. ATP-grasp superfamily members also share a conserved Mg-ATP-binding pocket which is covered by a flexible loop that is believed to undergo a conformational change on substrate binding."
definition: >-
  ATP-grasp domain like-2. This family appears to have the sequence similarity with the ATP-grasp domain. Enzymes related to ATP-grasp superfamily catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. Catalytic center requires the presence of one or more metal ions as a physiological cofactor. ATP-grasp superfamily members also share a conserved Mg-ATP-binding pocket which is covered by a flexible loop that is believed to undergo a conformational change on substrate binding. — an NCBI CDD conserved domain (cd08082); members share this curated model.
