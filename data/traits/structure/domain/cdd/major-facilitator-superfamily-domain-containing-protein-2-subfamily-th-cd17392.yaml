identifier: CDD:cd17392
label: "Major facilitator superfamily domain-containing protein 2 subfamily. The major facilitator superfamily domain-containing protein 2 (MFSD2) subfamily is composed of two vertebrate members, MFSD2A amd MFSD2B. MFSD2A is more commonly called sodium-dependent lysophosphatidylcholine symporter 1 (NLS1). It is an LPC symporter that plays an essential role for blood-brain barrier formation and function. Inactivating mutations in MFSD2A cause a lethal microcephaly syndrome. MFSD2B is a potential risk or protect factor in the prognosis of lung adenocarcinoma. The MFSD2 subfamily belongs to the Salmonella enterica Na+/melibiose symporter like (MelB-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 2 subfamily. The major facilitator superfamily domain-containing protein 2 (MFSD2) subfamily is composed of two vertebrate members, MFSD2A amd MFSD2B. MFSD2A is more commonly called sodium-dependent lysophosphatidylcholine symporter 1 (NLS1). It is an LPC symporter that plays an essential role for blood-brain barrier formation and function. Inactivating mutations in MFSD2A cause a lethal microcephaly syndrome. MFSD2B is a potential risk or protect factor in the prognosis of lung adenocarcinoma. The MFSD2 subfamily belongs to the Salmonella enterica Na+/melibiose symporter like (MelB-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17392); members share this curated model.
