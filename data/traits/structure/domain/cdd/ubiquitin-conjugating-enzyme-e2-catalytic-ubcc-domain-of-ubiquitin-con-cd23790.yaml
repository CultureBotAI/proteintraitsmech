identifier: CDD:cd23790
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzymes E2A, E2B and related proteins. The E2A/2B subfamily includes mammalian ubiquitin-conjugating enzymes UBE2A/RAD6A and UBE2B/RAD6B, yeast ubiquitin-conjugating enzyme E2 2 (UBC2/RAD6), plant ubiquitin-conjugating enzyme E2 1-3 (UBC1-3), and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. Both UBE2A/RAD6A and UBE2B/RAD6B are required for post-replication repair of UV-damaged DNA. In vitro, they catalyze 'Lys-11', as well as 'Lys-48'-linked polyubiquitination. UBE2B might also catalyze 'Lys-63'-linked polyubiquitination. Saccharomyces cerevisiae UBC2 is required for DNA repair, damage-induced mutagenesis, and sporulation."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzymes E2A, E2B and related proteins. The E2A/2B subfamily includes mammalian ubiquitin-conjugating enzymes UBE2A/RAD6A and UBE2B/RAD6B, yeast ubiquitin-conjugating enzyme E2 2 (UBC2/RAD6), plant ubiquitin-conjugating enzyme E2 1-3 (UBC1-3), and similar proteins. They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. Both UBE2A/RAD6A and UBE2B/RAD6B are required for post-replication repair of UV-damaged DNA. In vitro, they catalyze 'Lys-11', as well as 'Lys-48'-linked polyubiquitination. UBE2B might also catalyze 'Lys-63'-linked polyubiquitination. Saccharomyces cerevisiae UBC2 is required for DNA repair, damage-induced mutagenesis, and sporulation. — an NCBI CDD conserved domain (cd23790); members share this curated model.
