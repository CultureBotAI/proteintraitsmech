identifier: CDD:cd21936
label: "leucine zipper domain found in the TSC22 domain family of leucine zipper transcription factors. The TGF-beta-stimulated clone-22 domain (TSC22D) family includes TSC22D1-4 and similar proteins. They have diverse physiological functions, including cell growth, development, homeostasis, and immune regulation. All family members contain a conserved leucine zipper (ZIP) domain located at the C-terminus. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. In the bZIP family of transcription factors, the leucine zipper acts as a dimerization domain and the upstream basic region as a DNA-binding domain. However, DNA-binding capability of TSC22D family proteins is not obvious, due to the lack of the basic region found in the original bZIP DNA-binding domains. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription."
definition: >-
  leucine zipper domain found in the TSC22 domain family of leucine zipper transcription factors. The TGF-beta-stimulated clone-22 domain (TSC22D) family includes TSC22D1-4 and similar proteins. They have diverse physiological functions, including cell growth, development, homeostasis, and immune regulation. All family members contain a conserved leucine zipper (ZIP) domain located at the C-terminus. Its first helix is not basic and does not contain the consensus sequence, NXX(A)(A)XX(C/S)R, found in most basic region/leucine zipper (bZIP) proteins. In the bZIP family of transcription factors, the leucine zipper acts as a dimerization domain and the upstream basic region as a DNA-binding domain. However, DNA-binding capability of TSC22D family proteins is not obvious, due to the lack of the basic region found in the original bZIP DNA-binding domains. Similar to bZIP, ZIP forms homo- and heterodimers, resulting in many dimers that may have different effects on transcription. — an NCBI CDD conserved domain (cd21936); members share this curated model.
