identifier: CDD:cd18909
label: "basic helix-loop-helix (bHLH) domain found in transcription factor-like 5 protein (TCFL5) and similar proteins. TCFL5, also termed Cha transcription factor, or HPV-16 E2-binding protein 1 (E2BP-1), is a bHLH transcription factor that plays a crucial role in spermatogenesis. It regulates cell proliferation or differentiation of cells through binding to a specific DNA sequence like other bHLH molecules."
definition: >-
  basic helix-loop-helix (bHLH) domain found in transcription factor-like 5 protein (TCFL5) and similar proteins. TCFL5, also termed Cha transcription factor, or HPV-16 E2-binding protein 1 (E2BP-1), is a bHLH transcription factor that plays a crucial role in spermatogenesis. It regulates cell proliferation or differentiation of cells through binding to a specific DNA sequence like other bHLH molecules. — an NCBI CDD conserved domain (cd18909); members share this curated model.
