identifier: CDD:cd21263
label: "calponin homology (CH) domain found in VAV2 protein and similar proteins. VAV2 is widely expressed and functions as a guanine nucleotide exchange factor (GEF) for RhoA, RhoB and RhoG and also activates Rac1 and Cdc42. It is implicated in many cellular and physiological functions including blood pressure control, eye development, neurite outgrowth and branching, EGFR endocytosis and degradation, and cell cluster morphology, among others. It has been reported to associate with Nek3. VAV proteins contain several domains that enable their function: N-terminal calponin homology (CH), acidic, RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), C1 (zinc finger), SH2, and two SH3 domains. The model corresponds to CH domain, an actin-binding domain which is present as a single copy in VAV2 protein."
definition: >-
  calponin homology (CH) domain found in VAV2 protein and similar proteins. VAV2 is widely expressed and functions as a guanine nucleotide exchange factor (GEF) for RhoA, RhoB and RhoG and also activates Rac1 and Cdc42. It is implicated in many cellular and physiological functions including blood pressure control, eye development, neurite outgrowth and branching, EGFR endocytosis and degradation, and cell cluster morphology, among others. It has been reported to associate with Nek3. VAV proteins contain several domains that enable their function: N-terminal calponin homology (CH), acidic, RhoGEF (also called Dbl-homologous or DH), Pleckstrin Homology (PH), C1 (zinc finger), SH2, and two SH3 domains. The model corresponds to CH domain, an actin-binding domain which is present as a single copy in VAV2 protein. — an NCBI CDD conserved domain (cd21263); members share this curated model.
