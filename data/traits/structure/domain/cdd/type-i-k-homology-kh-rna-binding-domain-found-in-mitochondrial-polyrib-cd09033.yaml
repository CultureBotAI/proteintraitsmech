identifier: CDD:cd09033
label: "type I K homology (KH) RNA-binding domain found in mitochondrial polyribonucleotide nucleotidyltransferase 1 (PNPT1) and similar proteins. PNPT1, also called 3'-5' RNA exonuclease OLD35, or PNPase old-35, or polynucleotide phosphorylase 1, or PNPase 1, or polynucleotide phosphorylase-like protein, is an RNA-binding protein implicated in numerous RNA metabolic processes. It catalyzes the phosphorolysis of single-stranded polyribonucleotides processively in the 3'-to-5' direction. It acts as a mitochondrial intermembrane factor with RNA-processing exoribonulease activity. PNPT1 is a component of the mitochondrial degradosome (mtEXO) complex, that degrades 3' overhang double-stranded RNA with a 3'-to-5' directionality in an ATP-dependent manner. It is involved in the degradation of non-coding mitochondrial transcripts (MT-ncRNA) and tRNA-like molecules and required for correct processing and polyadenylation of mitochondrial mRNAs. PNPT1 also plays a role as a cytoplasmic RNA import factor that mediates the translocation of small RNA components, like the 5S RNA, the RNA subunit of ribonuclease P and the mitochondrial RNA-processing (MRP) RNA, into the mitochondrial matrix."
definition: >-
  type I K homology (KH) RNA-binding domain found in mitochondrial polyribonucleotide nucleotidyltransferase 1 (PNPT1) and similar proteins. PNPT1, also called 3'-5' RNA exonuclease OLD35, or PNPase old-35, or polynucleotide phosphorylase 1, or PNPase 1, or polynucleotide phosphorylase-like protein, is an RNA-binding protein implicated in numerous RNA metabolic processes. It catalyzes the phosphorolysis of single-stranded polyribonucleotides processively in the 3'-to-5' direction. It acts as a mitochondrial intermembrane factor with RNA-processing exoribonulease activity. PNPT1 is a component of the mitochondrial degradosome (mtEXO) complex, that degrades 3' overhang double-stranded RNA with a 3'-to-5' directionality in an ATP-dependent manner. It is involved in the degradation of non-coding mitochondrial transcripts (MT-ncRNA) and tRNA-like molecules and required for correct processing and polyadenylation of mitochondrial mRNAs. PNPT1 also plays a role as a cytoplasmic RNA import factor that mediates the translocation of small RNA components, like the 5S RNA, the RNA subunit of ribonuclease P and the mitochondrial RNA-processing (MRP) RNA, into the mitochondrial matrix. — an NCBI CDD conserved domain (cd09033); members share this curated model.
