identifier: CDD:cd08176
label: "Lactadehyde:propanediol oxidoreductase (LPO) catalyzes the interconversion between L-lactaldehyde and L-1,2-propanediol in Escherichia coli and other enterobacteria. Lactadehyde:propanediol oxidoreductase (LPO) is a member of the group III iron-activated dehydrogenases which catalyze the interconversion between L-lactaldehyde and L-1,2-propanediol in Escherichia coli and other enterobacteria. L-fucose and L-rhamnose are used by Escherichia coli through an inducible pathway mediated by the fucose regulon comprising four linked operons fucO, fucA, fucPIK, and fucR. The fucA-encoded aldolase catalyzes the formation of dihydroxyacetone phosphate and L-lactaldehyde. Under anaerobic conditions, with NADH as a cofactor, lactaldehyde is converted by a fucO-encoded lactadehyde:propanediol oxidoreductase (LPO) to L-1,2-propanediol, which is excreted as a fermentation product. In mutant strains, E. coli adapted to grow on L-1,2-propanediol, FucO catalyzes the oxidation of the polyol to L-lactaldehyde. FucO is induced regardless of the respiratory conditions of the culture, remains fully active in the absence of oxygen. In the presence of oxygen, this enzyme becomes oxidatively inactivated by a metal-catalyzed oxidation mechanism. FucO is an iron-dependent metalloenzyme that is inactivated by other metals, such as zinc, copper, or cadmium. This enzyme can also reduce glycol aldehyde with similar efficiency.  Beside L-1,2-propanediol, the enzyme is also able to oxidize methanol as an alternative substrate."
definition: >-
  Lactadehyde:propanediol oxidoreductase (LPO) catalyzes the interconversion between L-lactaldehyde and L-1,2-propanediol in Escherichia coli and other enterobacteria. Lactadehyde:propanediol oxidoreductase (LPO) is a member of the group III iron-activated dehydrogenases which catalyze the interconversion between L-lactaldehyde and L-1,2-propanediol in Escherichia coli and other enterobacteria. L-fucose and L-rhamnose are used by Escherichia coli through an inducible pathway mediated by the fucose regulon comprising four linked operons fucO, fucA, fucPIK, and fucR. The fucA-encoded aldolase catalyzes the formation of dihydroxyacetone phosphate and L-lactaldehyde. Under anaerobic conditions, with NADH as a cofactor, lactaldehyde is converted by a fucO-encoded lactadehyde:propanediol oxidoreductase (LPO) to L-1,2-propanediol, which is excreted as a fermentation product. In mutant strains, E. coli adapted to grow on L-1,2-propanediol, FucO catalyzes the oxidation of the polyol to L-lactaldehyde. FucO is induced regardless of the respiratory conditions of the culture, remains fully active in the absence of oxygen. In the presence of oxygen, this enzyme becomes oxidatively inactivated by a metal-catalyzed oxidation mechanism. FucO is an iron-dependent metalloenzyme that is inactivated by other metals, such as zinc, copper, or cadmium. This enzyme can also reduce glycol aldehyde with similar efficiency. Beside L-1,2-propanediol, the enzyme is also able to oxidize methanol as an alternative substrate. — an NCBI CDD conserved domain (cd08176); members share this curated model.
