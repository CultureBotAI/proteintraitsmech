identifier: CDD:cd08120
label: "Putative tubulin tyrosine ligase associated with P-bodies. Putative tubulin tyrosine ligase associated with P-bodies are members of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Putative tubulin tyrosine ligase (Pby1p) from Saccharomyces cerevisiae, encoded by YBR094W, is a component of cytoplasmic P-bodies; this provides additional evidence for a physical connection between P-bodies and microtubules."
definition: >-
  Putative tubulin tyrosine ligase associated with P-bodies. Putative tubulin tyrosine ligase associated with P-bodies are members of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Putative tubulin tyrosine ligase (Pby1p) from Saccharomyces cerevisiae, encoded by YBR094W, is a component of cytoplasmic P-bodies; this provides additional evidence for a physical connection between P-bodies and microtubules. — an NCBI CDD conserved domain (cd08120); members share this curated model.
