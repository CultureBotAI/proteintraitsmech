label: "Ribosomal protein L9 of chloroplasts and cyanobacteria. Ribosomal protein L9, a component of the large subunit of the ribosome, has a fidelity functions and is required to suppress bypassing, frameshifting, and stop codon \"hopping\". Rpl9 has a highly conserved architecture consisting of two globular domains connecting by a long alpha-helix which its conserved architecture is required for its fidelity functions. Plastids arose from cyanobacteria and this organelle has retained genome."
definition: >-
  Ribosomal protein L9 of chloroplasts and cyanobacteria. Ribosomal protein L9, a component of the large subunit of the ribosome, has a fidelity functions and is required to suppress bypassing, frameshifting, and stop codon "hopping". Rpl9 has a highly conserved architecture consisting of two globular domains connecting by a long alpha-helix which its conserved architecture is required for its fidelity functions. Plastids arose from cyanobacteria and this organelle has retained genome. — an NCBI CDD conserved domain (cd17893); members share this curated model.
