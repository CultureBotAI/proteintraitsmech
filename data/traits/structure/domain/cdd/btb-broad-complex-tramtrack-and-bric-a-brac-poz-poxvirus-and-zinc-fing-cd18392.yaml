identifier: CDD:cd18392
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 3 (KCTD3). KCTD3, also called renal carcinoma antigen NY-REN-45, is a BTB/POZ domain-containing protein that is an accessory subunit of potassium/sodium hyperpolarization-activated cyclic nucleotide-gated channel 3 (HCN3), upregulating its cell-surface expression and current density without affecting its voltage dependence and kinetics. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 3 (KCTD3). KCTD3, also called renal carcinoma antigen NY-REN-45, is a BTB/POZ domain-containing protein that is an accessory subunit of potassium/sodium hyperpolarization-activated cyclic nucleotide-gated channel 3 (HCN3), upregulating its cell-surface expression and current density without affecting its voltage dependence and kinetics. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18392); members share this curated model.
