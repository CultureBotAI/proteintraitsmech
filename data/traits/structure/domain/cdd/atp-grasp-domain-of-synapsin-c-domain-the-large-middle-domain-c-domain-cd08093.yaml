identifier: CDD:cd08093
label: "ATP-grasp domain of synapsin; C-domain. The large middle domain (C-domain) of synapsin I is structurally and funcationally very similar to the ATP-grasp superfamily. A striking resemblance of synC to glutathione synthetase (GSHase), D-alanine:Dalanine ligase (DD-ligase), biotin carboxylase alpha-chain (BC), succinyl CoA synthetase beta-chain (SCS), and pyruvate phospho dikinase (PPDK) suggests a similar catalytic mechanism of transferring gamma-phosphate from bound ATP to a substrate. SynC binds with ATP in a Ca-dependent manner (unlike GSHase, DD-ligase, and other members of ATP-grasp superfamily that binds ATP in the presence of Mg ions)."
definition: >-
  ATP-grasp domain of synapsin; C-domain. The large middle domain (C-domain) of synapsin I is structurally and funcationally very similar to the ATP-grasp superfamily. A striking resemblance of synC to glutathione synthetase (GSHase), D-alanine:Dalanine ligase (DD-ligase), biotin carboxylase alpha-chain (BC), succinyl CoA synthetase beta-chain (SCS), and pyruvate phospho dikinase (PPDK) suggests a similar catalytic mechanism of transferring gamma-phosphate from bound ATP to a substrate. SynC binds with ATP in a Ca-dependent manner (unlike GSHase, DD-ligase, and other members of ATP-grasp superfamily that binds ATP in the presence of Mg ions). — an NCBI CDD conserved domain (cd08093); members share this curated model.
