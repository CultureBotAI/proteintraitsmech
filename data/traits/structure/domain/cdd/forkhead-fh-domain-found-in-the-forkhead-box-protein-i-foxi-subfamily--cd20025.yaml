identifier: CDD:cd20025
label: "Forkhead (FH) domain found in the Forkhead box protein I (FOXI) subfamily. The FOXI subfamily includes three human winged helix transcription factors, FOXI1-3, Xenopus laevis FoxI1c, and similar proteins. FOXI1 acts as a transcriptional activator required for the development of normal hearing, sense of balance, and kidney function. FOXI2 may act as a transcriptional activator that plays a possible role in controlling cellular identity. Loss of function mutations in the FOXI2 gene may contribute to ectodermal dysplasia. FOXI3 plays a critical role in the development of the inner ear and jaw. It is a regulator of ectodermal development. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein I (FOXI) subfamily. The FOXI subfamily includes three human winged helix transcription factors, FOXI1-3, Xenopus laevis FoxI1c, and similar proteins. FOXI1 acts as a transcriptional activator required for the development of normal hearing, sense of balance, and kidney function. FOXI2 may act as a transcriptional activator that plays a possible role in controlling cellular identity. Loss of function mutations in the FOXI2 gene may contribute to ectodermal dysplasia. FOXI3 plays a critical role in the development of the inner ear and jaw. It is a regulator of ectodermal development. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20025); members share this curated model.
