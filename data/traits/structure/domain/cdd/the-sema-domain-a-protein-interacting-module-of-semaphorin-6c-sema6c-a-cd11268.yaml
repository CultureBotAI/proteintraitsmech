identifier: CDD:cd11268
label: "The Sema domain, a protein interacting module, of semaphorin 6C (Sema6C, also called semaphorin Y). Sema6C is highly expressed in adult brain and skeletal muscle and it shows growth cone collapsing activity. It may play a role in the maintenance and remodelling of neuronal connections. In adult skeletal muscle, this role includes prevention of motor neuron sprouting and uncontrolled motor neuron growth. The expression of Sema6C in adult skeletal muscle is down-regulated following denervation. Sema6C is a member of the class 6 semaphorin family of proteins, which are membrane associated semaphorins. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
  The Sema domain, a protein interacting module, of semaphorin 6C (Sema6C, also called semaphorin Y). Sema6C is highly expressed in adult brain and skeletal muscle and it shows growth cone collapsing activity. It may play a role in the maintenance and remodelling of neuronal connections. In adult skeletal muscle, this role includes prevention of motor neuron sprouting and uncontrolled motor neuron growth. The expression of Sema6C in adult skeletal muscle is down-regulated following denervation. Sema6C is a member of the class 6 semaphorin family of proteins, which are membrane associated semaphorins. Semaphorins are regulatory molecules involved in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module. — an NCBI CDD conserved domain (cd11268); members share this curated model.
