identifier: CDD:cd10553
label: "uncharacterized beta subfamily of DMSO Reductase similar to Desulfonauticus sp PhsB. This family includes beta FeS subunits of anaerobic DMSO reductase (DMSOR) superfamily that have yet to be characterized. DMSOR consists of a large, periplasmic molybdenum-containing alpha subunit as well as a small beta FeS subunit, and may also have a small gamma subunit.  Examples of heterodimeric members with alpha and beta subunits include arsenite oxidase, and the tungsten-containing formate dehydrogenase (FDH-T).  Examples of heterotrimeric members containing alpha, beta, and gamma subunits include formate dehydrogenase-N (FDH-N), and nitrate reductase (NarGHI).  The beta subunit contains four Fe4/S4 and/or Fe3/S4 clusters which transfer the electrons from the alpha subunit to a hydrophobic integral membrane protein, presumably a cytochrome containing two b-type heme groups. The reducing equivalents are then transferred to menaquinone, which finally reduces the electron-accepting enzyme system."
definition: >-
  uncharacterized beta subfamily of DMSO Reductase similar to Desulfonauticus sp PhsB. This family includes beta FeS subunits of anaerobic DMSO reductase (DMSOR) superfamily that have yet to be characterized. DMSOR consists of a large, periplasmic molybdenum-containing alpha subunit as well as a small beta FeS subunit, and may also have a small gamma subunit. Examples of heterodimeric members with alpha and beta subunits include arsenite oxidase, and the tungsten-containing formate dehydrogenase (FDH-T). Examples of heterotrimeric members containing alpha, beta, and gamma subunits include formate dehydrogenase-N (FDH-N), and nitrate reductase (NarGHI). The beta subunit contains four Fe4/S4 and/or Fe3/S4 clusters which transfer the electrons from the alpha subunit to a hydrophobic integral membrane protein, presumably a cytochrome containing two b-type heme groups. The reducing equivalents are then transferred to menaquinone, which finally reduces the electron-accepting enzyme system. — an NCBI CDD conserved domain (cd10553); members share this curated model.
