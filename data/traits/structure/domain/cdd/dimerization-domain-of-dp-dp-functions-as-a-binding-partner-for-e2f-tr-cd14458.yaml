identifier: CDD:cd14458
label: "Dimerization domain of DP. DP functions as a binding partner for E2F transcription factors. DP and E2F form heterodimers and play important roles in regulating genes involved in DNA synthesis, cell cycle progression, proliferation and apoptosis. The transcriptional activity of E2F is inhibited by the retinoblastoma protein (Rb) which binds to the E2F-DP heterodimer, blocks the transactivation domain, and negatively regulates the G1-S transition. DP is distantly related to E2F. In humans, there are at least six closely related E2F and two DP family members, all containing a DNA binding domain, a coiled-coil (CC) region, and a marked-box domain. E2F1 to E2F5 also contain a C-terminal transactivation domain."
definition: >-
  Dimerization domain of DP. DP functions as a binding partner for E2F transcription factors. DP and E2F form heterodimers and play important roles in regulating genes involved in DNA synthesis, cell cycle progression, proliferation and apoptosis. The transcriptional activity of E2F is inhibited by the retinoblastoma protein (Rb) which binds to the E2F-DP heterodimer, blocks the transactivation domain, and negatively regulates the G1-S transition. DP is distantly related to E2F. In humans, there are at least six closely related E2F and two DP family members, all containing a DNA binding domain, a coiled-coil (CC) region, and a marked-box domain. E2F1 to E2F5 also contain a C-terminal transactivation domain. — an NCBI CDD conserved domain (cd14458); members share this curated model.
