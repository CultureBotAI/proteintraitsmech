identifier: CDD:cd07700
label: "Immunoglobulin (Ig) variable (V) domain of Cluster of Differentiation (CD) 8 beta chain. The members here are composed of the immunoglobulin (Ig)-like domain in Cluster of Differentiation (CD) 8 beta. The CD8 glycoprotein plays an essential role in the control of T-cell selection, maturation, and the T-cell receptor (TCR)-mediated response to peptide antigen. CD8 is comprised of alpha and beta subunits and is expressed as either an alpha/alpha or alpha/beta dimer. Both dimeric isoforms can serve as a coreceptor for T cell activation and differentiation, however they have distinct physiological roles, different cellular distributions, unique binding partners, etc. Each CD8 subunit is comprised of an extracellular domain containing a V-type Ig-like domain, a single pass transmembrane portion, and a short intracellular domain. Members of this group contain standard Ig superfamily V-set AGFCC'C\"/DEB domain topology."
definition: >-
  Immunoglobulin (Ig) variable (V) domain of Cluster of Differentiation (CD) 8 beta chain. The members here are composed of the immunoglobulin (Ig)-like domain in Cluster of Differentiation (CD) 8 beta. The CD8 glycoprotein plays an essential role in the control of T-cell selection, maturation, and the T-cell receptor (TCR)-mediated response to peptide antigen. CD8 is comprised of alpha and beta subunits and is expressed as either an alpha/alpha or alpha/beta dimer. Both dimeric isoforms can serve as a coreceptor for T cell activation and differentiation, however they have distinct physiological roles, different cellular distributions, unique binding partners, etc. Each CD8 subunit is comprised of an extracellular domain containing a V-type Ig-like domain, a single pass transmembrane portion, and a short intracellular domain. Members of this group contain standard Ig superfamily V-set AGFCC'C"/DEB domain topology. — an NCBI CDD conserved domain (cd07700); members share this curated model.
