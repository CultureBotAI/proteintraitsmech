identifier: CDD:cd04618
label: "Two tandem repeats of the cystathionine beta-synthase (CBS pair) domains found in AMP-activated protein kinase gamma-like proteins, repeat 1. AMP-activated protein kinase (AMPK) plays multiple roles in the body's overall metabolic balance and response to exercise, nutritional stress, hormonal stimulation, and the glucose-lowering drugs metformin and rosiglitazone. AMPK consists of a catalytic alpha subunit and two non-catalytic subunits, beta and gamma, each with multiple isoforms that form active 1:1:1 heterotrimers.  This cd contains 2 tandem repeats of the CBS domains found in the gamma subunits of AMPK. The CBS domain, named after human CBS, is a small domain originally identified in cystathionine beta-synthase and is subsequently found in a wide range of different proteins. CBS domains usually occur in tandem repeats. They associate to form a so-called Bateman domain or a CBS pair based on crystallographic studies in bacteria.  The CBS pair was used as a basis for this cd hierarchy since the human CBS proteins can adopt the typical core structure and form an intramolecular CBS pair.  The interface between the two CBS domains forms a cleft that is a potential ligand binding site. The CBS pair coexists with a variety of other functional domains and this has been used to help in its classification here.  It has been proposed that the CBS domain may play a regulatory role, although its exact function is unknown. Mutations of conserved residues within this domain are associated with a variety of human hereditary diseases, including congenital myotonia, idiopathic generalized epilepsy, hypercalciuric nephrolithiasis, and classic Bartter syndrome (CLC chloride channel family members), Wolff-Parkinson-White syndrome (gamma 2 subunit of AMP-activated protein kinase), retinitis pigmentosa (IMP dehydrogenase-1), and homocystinuria (cystathionine beta-synthase)."
definition: >-
  Two tandem repeats of the cystathionine beta-synthase (CBS pair) domains found in AMP-activated protein kinase gamma-like proteins, repeat 1. AMP-activated protein kinase (AMPK) plays multiple roles in the body's overall metabolic balance and response to exercise, nutritional stress, hormonal stimulation, and the glucose-lowering drugs metformin and rosiglitazone. AMPK consists of a catalytic alpha subunit and two non-catalytic subunits, beta and gamma, each with multiple isoforms that form active 1:1:1 heterotrimers. This cd contains 2 tandem repeats of the CBS domains found in the gamma subunits of AMPK. The CBS domain, named after human CBS, is a small domain originally identified in cystathionine beta-synthase and is subsequently found in a wide range of different proteins. CBS domains usually occur in tandem repeats. They associate to form a so-called Bateman domain or a CBS pair based on crystallographic studies in bacteria. The CBS pair was used as a basis for this cd hierarchy since the human CBS proteins can adopt the typical core structure and form an intramolecular CBS pair. The interface between the two CBS domains forms a cleft that is a potential ligand binding site. The CBS pair coexists with a variety of other functional domains and this has been used to help in its classification here. It has been proposed that the CBS domain may play a regulatory role, although its exact function is unknown. Mutations of conserved residues within this domain are associated with a variety of human hereditary diseases, including congenital myotonia, idiopathic generalized epilepsy, hypercalciuric nephrolithiasis, and classic Bartter syndrome (CLC chloride channel family members), Wolff-Parkinson-White syndrome (gamma 2 subunit of AMP-activated protein kinase), retinitis pigmentosa (IMP dehydrogenase-1), and homocystinuria (cystathionine beta-synthase). — an NCBI CDD conserved domain (cd04618); members share this curated model.
