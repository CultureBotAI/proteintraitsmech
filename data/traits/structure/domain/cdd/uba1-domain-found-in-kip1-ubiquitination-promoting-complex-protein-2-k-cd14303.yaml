identifier: CDD:cd14303
label: "UBA1 domain found in Kip1 ubiquitination-promoting complex protein 2 (KPC2) and similar proteins. KPC2, also called ubiquitin-associated domain-containing protein 1 (UBAC1), or glialblastoma cell differentiation-related protein 1, is one of two subunits of Kip1 ubiquitination-promoting complex (KPC), a novel E3 ubiquitin-protein ligase that also contains KPC1 subunit and regulates the ubiquitin-dependent degradation of the cyclin-dependent kinase (CDK) inhibitor p27 at G1 phase. KPC2 contains a ubiquitin-like (UBL) domain and two ubiquitin-associated (UBA) domains. This model corresponds to the UBA1 domain."
definition: >-
  UBA1 domain found in Kip1 ubiquitination-promoting complex protein 2 (KPC2) and similar proteins. KPC2, also called ubiquitin-associated domain-containing protein 1 (UBAC1), or glialblastoma cell differentiation-related protein 1, is one of two subunits of Kip1 ubiquitination-promoting complex (KPC), a novel E3 ubiquitin-protein ligase that also contains KPC1 subunit and regulates the ubiquitin-dependent degradation of the cyclin-dependent kinase (CDK) inhibitor p27 at G1 phase. KPC2 contains a ubiquitin-like (UBL) domain and two ubiquitin-associated (UBA) domains. This model corresponds to the UBA1 domain. — an NCBI CDD conserved domain (cd14303); members share this curated model.
