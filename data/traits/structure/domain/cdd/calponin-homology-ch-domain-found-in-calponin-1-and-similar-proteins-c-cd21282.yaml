identifier: CDD:cd21282
label: "calponin homology (CH) domain found in calponin-1 and similar proteins. Calponin-1 (CNN1), also called basic calponin, or smooth muscle calponin H1, is a thin filament-associated protein that is implicated in the regulation and modulation of smooth muscle contraction. It is capable of binding to actin, calmodulin, troponin C, and tropomyosin. Calponin-1 contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in calponin-1 and similar proteins. Calponin-1 (CNN1), also called basic calponin, or smooth muscle calponin H1, is a thin filament-associated protein that is implicated in the regulation and modulation of smooth muscle contraction. It is capable of binding to actin, calmodulin, troponin C, and tropomyosin. Calponin-1 contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21282); members share this curated model.
