identifier: CDD:cd18373
label: "first BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 19 (KCTD19). KCTD19 is a BTB/POZ domain-containing protein with unclear biological function. It may be a host factor involved in Nef-induced downregulation of MHC-I. Nef is a HIV-1-encoded protein that plays a key role in the development of AIDS. KCTD19 contains two BTB domains. This model corresponds to the first domain. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  first BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 19 (KCTD19). KCTD19 is a BTB/POZ domain-containing protein with unclear biological function. It may be a host factor involved in Nef-induced downregulation of MHC-I. Nef is a HIV-1-encoded protein that plays a key role in the development of AIDS. KCTD19 contains two BTB domains. This model corresponds to the first domain. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18373); members share this curated model.
