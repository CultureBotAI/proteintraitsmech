identifier: CDD:cd09486
label: "a LIM domain subfamily on a group of proteins with unknown function. This model represents a LIM domain subfamily of Eplin-like family.  This family shows highest homology to the LIM domains on Eplin and XIRP2 protein families. Epithelial Protein Lost in Neoplasm is a cytoskeleton-associated tumor suppressor whose expression inversely correlates with cell growth, motility, invasion and cancer mortality. Xirp2 is expressed in muscles and is an important effector of the Ang II signaling pathway in the heart. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  a LIM domain subfamily on a group of proteins with unknown function. This model represents a LIM domain subfamily of Eplin-like family. This family shows highest homology to the LIM domains on Eplin and XIRP2 protein families. Epithelial Protein Lost in Neoplasm is a cytoskeleton-associated tumor suppressor whose expression inversely correlates with cell growth, motility, invasion and cancer mortality. Xirp2 is expressed in muscles and is an important effector of the Ang II signaling pathway in the heart. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09486); members share this curated model.
