identifier: CDD:cd18325
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 18.2 and similar proteins. This subfamily is composed of Xenopus laevis zinc finger and BTB domain-containing protein 18.2, encoded by the znf238.2.L gene, and similar proteins. Many proteins in this group are annotated as zinc finger and BTB domain-containing protein 42 (ZBTB42). However, characterized mammalian ZBTB42 does not belong to this subfamily. ZBTB18.2, like ZBTB18, functions as a transcriptional repressor that plays a role in various developmental processes. Members of this family contain a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 18.2 and similar proteins. This subfamily is composed of Xenopus laevis zinc finger and BTB domain-containing protein 18.2, encoded by the znf238.2.L gene, and similar proteins. Many proteins in this group are annotated as zinc finger and BTB domain-containing protein 42 (ZBTB42). However, characterized mammalian ZBTB42 does not belong to this subfamily. ZBTB18.2, like ZBTB18, functions as a transcriptional repressor that plays a role in various developmental processes. Members of this family contain a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18325); members share this curated model.
