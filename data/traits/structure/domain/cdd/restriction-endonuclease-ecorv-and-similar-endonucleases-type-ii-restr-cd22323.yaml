identifier: CDD:cd22323
label: "Restriction endonuclease EcoRV and similar endonucleases. Type II restriction endonuclease EcoRV recognizes the site 5'-GAT|ATC-3' (| denotes the cleavage site) and functions as a homodimer; it belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease EcoRV and similar endonucleases. Type II restriction endonuclease EcoRV recognizes the site 5'-GAT|ATC-3' (| denotes the cleavage site) and functions as a homodimer; it belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22323); members share this curated model.
