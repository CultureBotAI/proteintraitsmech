identifier: CDD:cd09237
label: "Protein-interacting V-domain of Saccharomyces cerevisiae Bro1 and related domains. This family contains the V-shaped (V) domain of Saccharomyces cerevisiae Bro1, and related domains. It belongs to the V_Alix_like superfamily which also includes the V-domain of Saccharomyces cerevisiae Rim20 (also known as PalA), mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), and related domains. Bro1 interacts with the ESCRT (Endosomal Sorting Complexes Required for Transport) system, and participates in endosomal trafficking. The mammalian Alix V-domain (belonging to a different family) contains a binding site, partially conserved in the superfamily, for the retroviral late assembly (L) domain YPXnL motif. The Alix V-domain is also a dimerization domain. Bro1 also has an N-terminal Bro1-like domain, which binds Snf7, a component of the ESCRT-III complex, and a C-terminal proline-rich region (PRR). The C-terminal portion (V-domain and PRR) of S. cerevisiae Bro1 interacts with Doa4, a ubiquitin thiolesterase needed to remove ubiquitin from MVB cargoes. It interacts with a YPxL motif in the Doa4s catalytic domain to stimulate its deubiquitination activity."
definition: >-
  Protein-interacting V-domain of Saccharomyces cerevisiae Bro1 and related domains. This family contains the V-shaped (V) domain of Saccharomyces cerevisiae Bro1, and related domains. It belongs to the V_Alix_like superfamily which also includes the V-domain of Saccharomyces cerevisiae Rim20 (also known as PalA), mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), and related domains. Bro1 interacts with the ESCRT (Endosomal Sorting Complexes Required for Transport) system, and participates in endosomal trafficking. The mammalian Alix V-domain (belonging to a different family) contains a binding site, partially conserved in the superfamily, for the retroviral late assembly (L) domain YPXnL motif. The Alix V-domain is also a dimerization domain. Bro1 also has an N-terminal Bro1-like domain, which binds Snf7, a component of the ESCRT-III complex, and a C-terminal proline-rich region (PRR). The C-terminal portion (V-domain and PRR) of S. cerevisiae Bro1 interacts with Doa4, a ubiquitin thiolesterase needed to remove ubiquitin from MVB cargoes. It interacts with a YPxL motif in the Doa4s catalytic domain to stimulate its deubiquitination activity. — an NCBI CDD conserved domain (cd09237); members share this curated model.
