identifier: CDD:cd07008
label: "Klebsiella pneumoniae yp_001338853.1 and related proteins, cupin domain. This family includes bacterial proteins homologous to Klebsiella pneumoniae yp_001338853.1, an uncharacterized conserved protein with double-stranded beta-helix domain. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Klebsiella pneumoniae yp_001338853.1 and related proteins, cupin domain. This family includes bacterial proteins homologous to Klebsiella pneumoniae yp_001338853.1, an uncharacterized conserved protein with double-stranded beta-helix domain. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd07008); members share this curated model.
