identifier: CDD:cd22095
label: "F-box domain found in F-box only protein 18 (FBXO18) and similar proteins. FBXO18, also called FBX18, or F-box DNA helicase 1 (FBH1), is a 3'-5' DNA helicase and the substrate-recognition component of the SCF(FBH1) E3 ubiquitin ligase complex that plays a key role in response to stalled/damaged replication forks. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 18 (FBXO18) and similar proteins. FBXO18, also called FBX18, or F-box DNA helicase 1 (FBH1), is a 3'-5' DNA helicase and the substrate-recognition component of the SCF(FBH1) E3 ubiquitin ligase complex that plays a key role in response to stalled/damaged replication forks. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22095); members share this curated model.
