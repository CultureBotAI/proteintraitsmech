identifier: CDD:cd17219
label: "Ras-associating (RA) domain found in Ras-association domain-containing protein 3 (RASSF3). RASSF3 is a member of a family of six related classical RASSF1-6 proteins (the classical RASSF proteins). RASSF3 has three transcripts (A-C) due to alternative splicing of the exons. The RASSF3B and 3C isoforms are shorter than RASSF3A, and unlike RASSF3A do not contain the RA or SARAH domains. The RA domain of the classical RASSF proteins has a beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. The RA domain mediates interactions with Ras and other small GTPases, and the SARAH domain mediates protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis. RASSF3A regulates apoptosis and cell cycle via p53 stabilization and possibly is involved in DNA repair."
definition: >-
  Ras-associating (RA) domain found in Ras-association domain-containing protein 3 (RASSF3). RASSF3 is a member of a family of six related classical RASSF1-6 proteins (the classical RASSF proteins). RASSF3 has three transcripts (A-C) due to alternative splicing of the exons. The RASSF3B and 3C isoforms are shorter than RASSF3A, and unlike RASSF3A do not contain the RA or SARAH domains. The RA domain of the classical RASSF proteins has a beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. The RA domain mediates interactions with Ras and other small GTPases, and the SARAH domain mediates protein-protein interactions crucial in the pathways that induce cell cycle arrest and apoptosis. RASSF3A regulates apoptosis and cell cycle via p53 stabilization and possibly is involved in DNA repair. — an NCBI CDD conserved domain (cd17219); members share this curated model.
