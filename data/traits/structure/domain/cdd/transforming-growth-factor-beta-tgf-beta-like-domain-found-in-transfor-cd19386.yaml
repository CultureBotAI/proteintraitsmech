identifier: CDD:cd19386
label: "transforming growth factor beta (TGF-beta) like domain found in transforming growth factor beta-3 (TGF-beta-3) and similar proteins. TGF-beta-3 is a polypeptide member of the transforming growth factor beta superfamily of cytokines. It is involved in embryogenesis and cell differentiation. It regulates molecules involved in cellular adhesion and extracellular matrix (ECM) formation during the process of palate development."
