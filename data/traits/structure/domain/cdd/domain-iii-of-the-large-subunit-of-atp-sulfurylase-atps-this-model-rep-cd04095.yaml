identifier: CDD:cd04095
label: "Domain III of the large subunit of ATP sulfurylase (ATPS). This model represents domain III of the large subunit of ATP sulfurylase (ATPS): CysN or the N-terminal portion of NodQ, found mainly in proteobacteria and is homologous to domain III of EF-Tu. Escherichia coli ATPS consists of CysN and a smaller subunit CysD and CysN. ATPS produces adenosine-5'-phosphosulfate (APS) from ATP and sulfate, coupled with GTP hydrolysis. In the subsequent reaction APS is phosphorylated by an APS kinase (CysC), to produce 3'-phosphoadenosine-5'-phosphosulfate (PAPS) for use in amino acid (aa) biosynthesis. The Rhizobiaceae group (alpha-proteobacteria) appears to carry out the same chemistry for the sulfation of a nodulation factor. In Rhizobium meliloti, the heterodimeric complex comprised of NodP and NodQ appears to possess both ATPS and APS kinase activities. The N- and C-termini of NodQ correspond to CysN and CysC, respectively. Other eubacteria, archaea, and eukaryotes use a different ATP sulfurylase, which shows no amino acid sequence similarity to CysN or NodQ. CysN and the N-terminal portion of NodQ show similarity to GTPases involved in translation, in particular, EF-Tu and EF-1alpha."
definition: >-
  Domain III of the large subunit of ATP sulfurylase (ATPS). This model represents domain III of the large subunit of ATP sulfurylase (ATPS): CysN or the N-terminal portion of NodQ, found mainly in proteobacteria and is homologous to domain III of EF-Tu. Escherichia coli ATPS consists of CysN and a smaller subunit CysD and CysN. ATPS produces adenosine-5'-phosphosulfate (APS) from ATP and sulfate, coupled with GTP hydrolysis. In the subsequent reaction APS is phosphorylated by an APS kinase (CysC), to produce 3'-phosphoadenosine-5'-phosphosulfate (PAPS) for use in amino acid (aa) biosynthesis. The Rhizobiaceae group (alpha-proteobacteria) appears to carry out the same chemistry for the sulfation of a nodulation factor. In Rhizobium meliloti, the heterodimeric complex comprised of NodP and NodQ appears to possess both ATPS and APS kinase activities. The N- and C-termini of NodQ correspond to CysN and CysC, respectively. Other eubacteria, archaea, and eukaryotes use a different ATP sulfurylase, which shows no amino acid sequence similarity to CysN or NodQ. CysN and the N-terminal portion of NodQ show similarity to GTPases involved in translation, in particular, EF-Tu and EF-1alpha. — an NCBI CDD conserved domain (cd04095); members share this curated model.
