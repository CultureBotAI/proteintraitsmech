identifier: CDD:cd19181
label: "SET domain (including post-SET domain) found in SET domain-containing protein 5 (SETD5) and similar proteins. SETD5 is a probable transcriptional regulator that acts via the formation of large multiprotein complexes that modify and/or remodel the chromatin. SETD5 loss-of-function mutations are a likely cause of a familial syndromic intellectual disability with variable phenotypic expression."
definition: >-
  SET domain (including post-SET domain) found in SET domain-containing protein 5 (SETD5) and similar proteins. SETD5 is a probable transcriptional regulator that acts via the formation of large multiprotein complexes that modify and/or remodel the chromatin. SETD5 loss-of-function mutations are a likely cause of a familial syndromic intellectual disability with variable phenotypic expression. — an NCBI CDD conserved domain (cd19181); members share this curated model.
