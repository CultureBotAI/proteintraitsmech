identifier: CDD:cd22090
label: "F-box domain found in F-box only protein 10 (FBXO10) and similar proteins. FBXO10, also called FBX10, or PRMT11, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The SCF(FBXO10) complex mediates ubiquitination and degradation of BCL2, an anti-apoptotic protein, thereby playing a role in apoptosis by controlling the stability of BCL2. It also associates with the receptor for advanced glycation end products (RAGE) to mediate its ubiquitination and degradation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 10 (FBXO10) and similar proteins. FBXO10, also called FBX10, or PRMT11, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The SCF(FBXO10) complex mediates ubiquitination and degradation of BCL2, an anti-apoptotic protein, thereby playing a role in apoptosis by controlling the stability of BCL2. It also associates with the receptor for advanced glycation end products (RAGE) to mediate its ubiquitination and degradation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22090); members share this curated model.
