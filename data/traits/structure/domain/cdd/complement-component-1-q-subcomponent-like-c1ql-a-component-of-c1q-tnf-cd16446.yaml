identifier: CDD:cd16446
label: "complement component 1, q subcomponent-like (C1ql), a component of C1q/TNF superfamily. This family contains complement component 1, q subcomponent-like (C1ql) proteins which are members of the C1q/TNF superfamily. C1ql proteins share a homologous three-dimensional folding and a trimeric assembly with the TNF family despite low sequence identity. They play a role in synapse homeostasis which includes the formation, maintenance, and/or elimination of synapses. C1q-like (C1ql1, C1ql2, C1ql3 and C1ql4) proteins are expressed almost exclusively in the CNS and found in distinct spatial regions of the brain. C1ql proteins serve as ligands for the brain-specific angiogenesis inhibitor (BAI) cell-adhesion G-protein coupled receptor (GPCR) family, and both C1QLs and BAI GPCRs are highly expressed in the CNS. BAI proteins have been linked to a number of diverse functions, including angiogenesis and engulfment of apoptotic cells. In addition, BAI genes have been identified by systematic cancer-genomics analysis as frequently mutated in various forms of cancer. SNPs in BAI3 significantly associate with schizophrenia; all four C1ql proteins interact with BAI3, but C1ql3 does so in a Ca2+-dependent manner. This family also contains C1q domain of Caprin-2 (also called Caprin-2 C1q-related domain or Cap2_CRD, at its C-terminus), an intracellular protein that is required in canonical Wnt signaling through a mechanism of facilitating LRP5/6 phosphorylation; Caprin-2 is associated with several components in LRP5/6 signalosomes, such as Axin and Dvl. Dysfunction of synaptic cell-adhesion molecules that span the synaptic cleft and regulate the properties of synapses may lead to neuropsychiatric and neurodegenerative disorders. Human Cap2_CRD exists as a flexible trimer mediated by calcium and its trimerization has been shown to be essential for the function of Caprin-2 in promoting LRP5/6 phosphorylation."
definition: >-
  complement component 1, q subcomponent-like (C1ql), a component of C1q/TNF superfamily. This family contains complement component 1, q subcomponent-like (C1ql) proteins which are members of the C1q/TNF superfamily. C1ql proteins share a homologous three-dimensional folding and a trimeric assembly with the TNF family despite low sequence identity. They play a role in synapse homeostasis which includes the formation, maintenance, and/or elimination of synapses. C1q-like (C1ql1, C1ql2, C1ql3 and C1ql4) proteins are expressed almost exclusively in the CNS and found in distinct spatial regions of the brain. C1ql proteins serve as ligands for the brain-specific angiogenesis inhibitor (BAI) cell-adhesion G-protein coupled receptor (GPCR) family, and both C1QLs and BAI GPCRs are highly expressed in the CNS. BAI proteins have been linked to a number of diverse functions, including angiogenesis and engulfment of apoptotic cells. In addition, BAI genes have been identified by systematic cancer-genomics analysis as frequently mutated in various forms of cancer. SNPs in BAI3 significantly associate with schizophrenia; all four C1ql proteins interact with BAI3, but C1ql3 does so in a Ca2+-dependent manner. This family also contains C1q domain of Caprin-2 (also called Caprin-2 C1q-related domain or Cap2_CRD, at its C-terminus), an intracellular protein that is required in canonical Wnt signaling through a mechanism of facilitating LRP5/6 phosphorylation; Caprin-2 is associated with several components in LRP5/6 signalosomes, such as Axin and Dvl. Dysfunction of synaptic cell-adhesion molecules that span the synaptic cleft and regulate the properties of synapses may lead to neuropsychiatric and neurodegenerative disorders. Human Cap2_CRD exists as a flexible trimer mediated by calcium and its trimerization has been shown to be essential for the function of Caprin-2 in promoting LRP5/6 phosphorylation. — an NCBI CDD conserved domain (cd16446); members share this curated model.
