identifier: CDD:cd08107
label: "Tubulin tyrosine ligase. Tubulin-tyrosine ligase (TTL, EC 6.3.2.25), as the name suggests, catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Pig TTL is a globular monomeric protein which is 379 amino acid long and has a molecular weight of 43,425 Da."
definition: >-
