identifier: CDD:cd07349
label: "The ligand binding domain of DAX1 protein, a nuclear receptor lacking DNA binding domain. The ligand binding domain of the Small Heterodimer Partner (SHP): SHP is a member of the nuclear receptor superfamily. SHP has a ligand binding domain, but lacks the DNA binding domain, typical to almost all of the nuclear receptors. It functions as a transcriptional coregulator by directly interacting with other nuclear receptors through its AF-2 motif. The closest relative of SHP is DAX1 and they can form heterodimer. SHP is an orphan receptor, lacking an identified ligand."
definition: >-
  The ligand binding domain of DAX1 protein, a nuclear receptor lacking DNA binding domain. The ligand binding domain of the Small Heterodimer Partner (SHP): SHP is a member of the nuclear receptor superfamily. SHP has a ligand binding domain, but lacks the DNA binding domain, typical to almost all of the nuclear receptors. It functions as a transcriptional coregulator by directly interacting with other nuclear receptors through its AF-2 motif. The closest relative of SHP is DAX1 and they can form heterodimer. SHP is an orphan receptor, lacking an identified ligand. — an NCBI CDD conserved domain (cd07349); members share this curated model.
