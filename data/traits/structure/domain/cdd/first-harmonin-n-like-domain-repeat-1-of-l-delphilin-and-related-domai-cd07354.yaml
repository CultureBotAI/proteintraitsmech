identifier: CDD:cd07354
label: "first harmonin_N_like domain (repeat 1) of L-delphilin, and related domains. This subgroup contains the first of two harmonin_N_like domains of an alternatively spliced longer variant of mouse delphilin (L-delphilin, isoform 1), and related domains. Delphilin is a scaffold protein which binds the glutamate receptor delta-2 (GRID2) subunit and the monocarboxylate transporter 2 at the cerebellar parallel fiber-Purkinje cell synapses. The N-terminus of L-delphilin contains this harmonin_N_like domain preceded by a postsynaptic density-95/discs-large/ZO-1 (PDZ) protein-binding domain, PDZ1. L-delphilin, in common with the shorter C-terminal isoforms (S-delphilin/delphilin alpha and delphilin beta) has a second harmonin_N_like domain (not belonging to this subgroup) and a second PDZ domain, PDZ2. This first harmonin_N_like domain is a putative protein-binding module based on its sequence similarity to the N-terminal domain of harmonin."
definition: >-
  first harmonin_N_like domain (repeat 1) of L-delphilin, and related domains. This subgroup contains the first of two harmonin_N_like domains of an alternatively spliced longer variant of mouse delphilin (L-delphilin, isoform 1), and related domains. Delphilin is a scaffold protein which binds the glutamate receptor delta-2 (GRID2) subunit and the monocarboxylate transporter 2 at the cerebellar parallel fiber-Purkinje cell synapses. The N-terminus of L-delphilin contains this harmonin_N_like domain preceded by a postsynaptic density-95/discs-large/ZO-1 (PDZ) protein-binding domain, PDZ1. L-delphilin, in common with the shorter C-terminal isoforms (S-delphilin/delphilin alpha and delphilin beta) has a second harmonin_N_like domain (not belonging to this subgroup) and a second PDZ domain, PDZ2. This first harmonin_N_like domain is a putative protein-binding module based on its sequence similarity to the N-terminal domain of harmonin. — an NCBI CDD conserved domain (cd07354); members share this curated model.
