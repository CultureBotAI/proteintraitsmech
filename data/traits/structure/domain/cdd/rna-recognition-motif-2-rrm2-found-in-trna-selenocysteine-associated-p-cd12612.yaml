identifier: CDD:cd12612
label: "RNA recognition motif 2 (RRM2) found in tRNA selenocysteine-associated protein 1 (SECp43). This subgroup corresponds to the RRM2 of SECp43, an RNA-binding protein associated specifically with eukaryotic selenocysteine tRNA [tRNA(Sec)]. It may play an adaptor role in the mechanism of selenocysteine insertion. SECp43 is located primarily in the nucleus and contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a C-terminal polar/acidic region."
definition: >-
  RNA recognition motif 2 (RRM2) found in tRNA selenocysteine-associated protein 1 (SECp43). This subgroup corresponds to the RRM2 of SECp43, an RNA-binding protein associated specifically with eukaryotic selenocysteine tRNA [tRNA(Sec)]. It may play an adaptor role in the mechanism of selenocysteine insertion. SECp43 is located primarily in the nucleus and contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), and a C-terminal polar/acidic region. — an NCBI CDD conserved domain (cd12612); members share this curated model.
