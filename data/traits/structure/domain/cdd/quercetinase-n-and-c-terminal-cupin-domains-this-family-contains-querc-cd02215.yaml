identifier: CDD:cd02215
label: "quercetinase, N- and C-terminal cupin domains. This family contains quercetinase (also known as quercetin 2,3-dioxygenase, 2,3QD, QDO and YxaG; EC 1.13.11.24), a mononuclear copper-dependent dioxygenase that catalyzes the cleavage of the flavonol quercetin (5,7,3',4'-tetrahydroxyflavonol) heterocyclic ring to produce 2-protocatechuoyl-phloroglucinol carboxylic acid and carbon monoxide. Bacillus subtilis quercetin 2,3-dioxygenase (QDO) is a homodimer that shows oxygenase activity with several divalent metals such as Mn2+, Co2+, Fe2+, and Cu2+, although the preferred one appears to be Mn2+. The dioxygen binds to the metal ion of the Cu-QDO-quercetin complex, yielding a Cu2+-superoxo quercetin radical intermediate, which then forms a Cu2+-alkylperoxo complex which then evolves into endoperoxide intermediate that decomposes to the product. Quercetinase is a bicupin with two tandem cupin beta-barrel domains, both of which are included in this alignment model. The pirins, which also belong to the cupin domain family, have been shown to catalyze a reaction involving quercetin and may have a function similar to that of quercetinase."
definition: >-
  quercetinase, N- and C-terminal cupin domains. This family contains quercetinase (also known as quercetin 2,3-dioxygenase, 2,3QD, QDO and YxaG; EC 1.13.11.24), a mononuclear copper-dependent dioxygenase that catalyzes the cleavage of the flavonol quercetin (5,7,3',4'-tetrahydroxyflavonol) heterocyclic ring to produce 2-protocatechuoyl-phloroglucinol carboxylic acid and carbon monoxide. Bacillus subtilis quercetin 2,3-dioxygenase (QDO) is a homodimer that shows oxygenase activity with several divalent metals such as Mn2+, Co2+, Fe2+, and Cu2+, although the preferred one appears to be Mn2+. The dioxygen binds to the metal ion of the Cu-QDO-quercetin complex, yielding a Cu2+-superoxo quercetin radical intermediate, which then forms a Cu2+-alkylperoxo complex which then evolves into endoperoxide intermediate that decomposes to the product. Quercetinase is a bicupin with two tandem cupin beta-barrel domains, both of which are included in this alignment model. The pirins, which also belong to the cupin domain family, have been shown to catalyze a reaction involving quercetin and may have a function similar to that of quercetinase. — an NCBI CDD conserved domain (cd02215); members share this curated model.
