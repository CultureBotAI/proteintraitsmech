identifier: CDD:cd18992
label: "extracellular domain of histimine-gated chloride channel (HisCl or HGCC). This family contains extracellular domain (ECD) of histamine-gated chloride channel (HisCl), a member of the Cys-loop receptor superfamily of ligand-gated ion channels and is closely related to the mammalian GABAA receptor and glycine receptor (GlyR). Histamine (HA) is a neurotransmitter that activates GPCRs in vertebrates, but in arthropods, it is a photoreceptor neurotransmitter, directly gating chloride channels on large monopolar cells (LMCs), postsynaptic to photoreceptors in the lamina. It has also been reported to play important roles in mechanosensory reception, temperature preference, and sleep in insects. HA activates its receptor channels to cause an inward chloride flux in the insect nervous system. In Drosophila, HA acts on two histamine-gated chloride channel (HGCC) subunits called HisCl1 (HisClalpha2, HCLB) and HisCl2 (HisClalpha1, Ort, HCLA). HisCl1 (HCLB) and HisCl2 (HCLA) are expressed predominantly in the insect eye, sharing 60% sequence identity, and forming homomeric and heteromeric HGCCs. HCLA homomers are involved in synaptic transmission in the lamina, while HCLB homomers, localized in the glia cells, have a role in shaping the transmission. HCLB channels, but not HCLA channels, are also responsible for the activation and maintenance of wake state in D. melanogaster. In Manduca sexta, HCLB channels in the flight sensory-motor have been shown to be involved in olfactory processing circuit. Studies show that HCLB channels are more sensitive to agonists when compared with HCLA channels, but insensitive to known LGCC insecticides."
definition: >-
  extracellular domain of histimine-gated chloride channel (HisCl or HGCC). This family contains extracellular domain (ECD) of histamine-gated chloride channel (HisCl), a member of the Cys-loop receptor superfamily of ligand-gated ion channels and is closely related to the mammalian GABAA receptor and glycine receptor (GlyR). Histamine (HA) is a neurotransmitter that activates GPCRs in vertebrates, but in arthropods, it is a photoreceptor neurotransmitter, directly gating chloride channels on large monopolar cells (LMCs), postsynaptic to photoreceptors in the lamina. It has also been reported to play important roles in mechanosensory reception, temperature preference, and sleep in insects. HA activates its receptor channels to cause an inward chloride flux in the insect nervous system. In Drosophila, HA acts on two histamine-gated chloride channel (HGCC) subunits called HisCl1 (HisClalpha2, HCLB) and HisCl2 (HisClalpha1, Ort, HCLA). HisCl1 (HCLB) and HisCl2 (HCLA) are expressed predominantly in the insect eye, sharing 60% sequence identity, and forming homomeric and heteromeric HGCCs. HCLA homomers are involved in synaptic transmission in the lamina, while HCLB homomers, localized in the glia cells, have a role in shaping the transmission. HCLB channels, but not HCLA channels, are also responsible for the activation and maintenance of wake state in D. melanogaster. In Manduca sexta, HCLB channels in the flight sensory-motor have been shown to be involved in olfactory processing circuit. Studies show that HCLB channels are more sensitive to agonists when compared with HCLA channels, but insensitive to known LGCC insecticides. — an NCBI CDD conserved domain (cd18992); members share this curated model.
