identifier: CDD:cd20949
label: "C-terminal immunoglobulin-like domain of the myosin-associated giant protein kinase Twitchin, and similar domains; member of the I-set IgSF domains. The members here are composed of the C-terminal immunoglobulin-like domain of the myosin-associated giant protein kinase Twitchin and similar proteins, including Caenorhabditis elegans and Aplysia californica Twitchin, Drosophila melanogaster Projectin, and similar proteins. These are very large muscle proteins containing multiple immunoglobulin (Ig)-like and fibronectin type III (FN3) domains and a single kinase domain near the C-terminus. In humans these proteins are called Titin. The Ig superfamily (IgSF) is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The Ig-like domain of the Twitchin is a member of the I-set IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand but lack a C\" strand.  I-set domains are found in several cell adhesion molecules (such as VCAM, ICAM, and MADCAM), and are also present in numerous other diverse protein families, including several tyrosine-protein kinase receptors, the hemolymph protein hemolin, the muscle proteins (titin, telokin, and twitchin), the neuronal adhesion molecule axonin-1, and the signaling molecule semaphorin 4D."
definition: >-
  C-terminal immunoglobulin-like domain of the myosin-associated giant protein kinase Twitchin, and similar domains; member of the I-set IgSF domains. The members here are composed of the C-terminal immunoglobulin-like domain of the myosin-associated giant protein kinase Twitchin and similar proteins, including Caenorhabditis elegans and Aplysia californica Twitchin, Drosophila melanogaster Projectin, and similar proteins. These are very large muscle proteins containing multiple immunoglobulin (Ig)-like and fibronectin type III (FN3) domains and a single kinase domain near the C-terminus. In humans these proteins are called Titin. The Ig superfamily (IgSF) is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. The Ig-like domain of the Twitchin is a member of the I-set IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand but lack a C" strand. I-set domains are found in several cell adhesion molecules (such as VCAM, ICAM, and MADCAM), and are also present in numerous other diverse protein families, including several tyrosine-protein kinase receptors, the hemolymph protein hemolin, the muscle proteins (titin, telokin, and twitchin), the neuronal adhesion molecule axonin-1, and the signaling molecule semaphorin 4D. — an NCBI CDD conserved domain (cd20949); members share this curated model.
