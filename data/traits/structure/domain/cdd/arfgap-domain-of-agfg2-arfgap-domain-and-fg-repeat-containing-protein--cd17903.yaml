identifier: CDD:cd17903
label: "ArfGAP domain of AGFG2 (ArfGAP domain and FG repeat-containing protein 2). The ArfGAP domain and FG repeat-containing proteins (AFGF) subfamily of Arf GTPase-activating proteins consists of the two structurally-related members: AGFG1 and AGFG2. AGFG2 is a member of the HIV-1 Rev binding protein (HRB) family and contains one Arf-GAP zinc finger domain, several Phe-Gly (FG) motifs, and four Asn-Pro-Phe (NPF) motifs. AGFG2 interacts with Eps15 homology (EH) domains and plays a role in the Rev export pathway, which mediates the nucleocytoplasmic transfer of proteins and RNAs. In humans, the presence of the FG repeat motifs (11 in AGFG1 and 7 in AGFG2) are thought to be required for these proteins to act as HIV-1 Rev cofactors. Hence, AGFG promotes movement of Rev-responsive element-containing RNAs from the nuclear periphery to the cytoplasm, which is an essential step for HIV-1 replication."
definition: >-
  ArfGAP domain of AGFG2 (ArfGAP domain and FG repeat-containing protein 2). The ArfGAP domain and FG repeat-containing proteins (AFGF) subfamily of Arf GTPase-activating proteins consists of the two structurally-related members: AGFG1 and AGFG2. AGFG2 is a member of the HIV-1 Rev binding protein (HRB) family and contains one Arf-GAP zinc finger domain, several Phe-Gly (FG) motifs, and four Asn-Pro-Phe (NPF) motifs. AGFG2 interacts with Eps15 homology (EH) domains and plays a role in the Rev export pathway, which mediates the nucleocytoplasmic transfer of proteins and RNAs. In humans, the presence of the FG repeat motifs (11 in AGFG1 and 7 in AGFG2) are thought to be required for these proteins to act as HIV-1 Rev cofactors. Hence, AGFG promotes movement of Rev-responsive element-containing RNAs from the nuclear periphery to the cytoplasm, which is an essential step for HIV-1 replication. — an NCBI CDD conserved domain (cd17903); members share this curated model.
