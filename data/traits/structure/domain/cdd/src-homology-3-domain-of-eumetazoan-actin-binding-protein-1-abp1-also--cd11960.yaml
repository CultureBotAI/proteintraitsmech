identifier: CDD:cd11960
label: "Src homology 3 domain of eumetazoan Actin-binding protein 1. Abp1, also called drebrin-like protein, is an adaptor protein that functions in receptor-mediated endocytosis and vesicle trafficking. It contains an N-terminal actin-binding module, the actin-depolymerizing factor (ADF) homology domain, a helical domain, and a C-terminal SH3 domain. Mammalian Abp1, unlike yeast Abp1, does not contain an acidic domain that interacts with the Arp2/3 complex. It regulates actin dynamics indirectly by interacting with dynamin and WASP family proteins. Abp1 deficiency causes abnormal organ structure and function of the spleen, heart, and lung of mice. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of eumetazoan Actin-binding protein 1. Abp1, also called drebrin-like protein, is an adaptor protein that functions in receptor-mediated endocytosis and vesicle trafficking. It contains an N-terminal actin-binding module, the actin-depolymerizing factor (ADF) homology domain, a helical domain, and a C-terminal SH3 domain. Mammalian Abp1, unlike yeast Abp1, does not contain an acidic domain that interacts with the Arp2/3 complex. It regulates actin dynamics indirectly by interacting with dynamin and WASP family proteins. Abp1 deficiency causes abnormal organ structure and function of the spleen, heart, and lung of mice. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11960); members share this curated model.
