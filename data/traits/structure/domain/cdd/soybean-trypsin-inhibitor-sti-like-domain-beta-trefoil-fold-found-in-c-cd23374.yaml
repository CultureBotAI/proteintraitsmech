identifier: CDD:cd23374
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Crateva tapia bark lectin (CrataBL) and similar proteins. CrataBL is both a Kunitz-type plant protease inhibitor and a glucose- and N-acetylglucosamine-binding lectin. It has hemagglutinating activity against human and rabbit erythrocytes which does not require divalent cations. It inhibits factor Xa and, to a lesser extent, trypsin. It does not inhibit neutrophil elastase, human plasma kallikrein, papain, human plasmin, porcine pancreatic kallikrein and bovine chymotrypsin. CrataBL has insecticidal activity against the termite species Nasutitermes corniger. It induces apoptosis in prostate cancer cell lines DU145 and PC3. The family includes CrataBL-form I and CrataBL-form II. This subfamily also includes Arabidopsis thaliana Kunitz trypsin inhibitor 3 (AtKTI3) that exhibits Kunitz trypsin protease inhibitor activity. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Crateva tapia bark lectin (CrataBL) and similar proteins. CrataBL is both a Kunitz-type plant protease inhibitor and a glucose- and N-acetylglucosamine-binding lectin. It has hemagglutinating activity against human and rabbit erythrocytes which does not require divalent cations. It inhibits factor Xa and, to a lesser extent, trypsin. It does not inhibit neutrophil elastase, human plasma kallikrein, papain, human plasmin, porcine pancreatic kallikrein and bovine chymotrypsin. CrataBL has insecticidal activity against the termite species Nasutitermes corniger. It induces apoptosis in prostate cancer cell lines DU145 and PC3. The family includes CrataBL-form I and CrataBL-form II. This subfamily also includes Arabidopsis thaliana Kunitz trypsin inhibitor 3 (AtKTI3) that exhibits Kunitz trypsin protease inhibitor activity. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23374); members share this curated model.
