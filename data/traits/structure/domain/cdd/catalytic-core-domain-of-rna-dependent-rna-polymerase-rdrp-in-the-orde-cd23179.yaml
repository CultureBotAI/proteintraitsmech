identifier: CDD:cd23179
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the order Toliovirales of positive-sense single-stranded RNA (+ssRNA) viruses. This family contains the catalytic core domain of RdRp of Tolivirales, an order of (+)ssRNA viruses which infect insects and plants. The virions are non-enveloped, spherical, and have an icosahedral capsid. The name Tolivirales, is derived from \"tombusvirus-like\" with the suffix -virales indicating a virus order. This order includes two families: Carmotetraviridae and Tombusviridae. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the order Toliovirales of positive-sense single-stranded RNA (+ssRNA) viruses. This family contains the catalytic core domain of RdRp of Tolivirales, an order of (+)ssRNA viruses which infect insects and plants. The virions are non-enveloped, spherical, and have an icosahedral capsid. The name Tolivirales, is derived from "tombusvirus-like" with the suffix -virales indicating a virus order. This order includes two families: Carmotetraviridae and Tombusviridae. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23179); members share this curated model.
