identifier: CDD:cd16528
label: "RING finger, HC subclass, found in prokaryotic RING finger family proteins. The family corresponds to a group of uncharacterized prokaryotic C3HC4-type RING-HC finger containing proteins. The RING finger is fused to an N-terminal alpha-helical domain, ROT/Trove-like repeats, and a C-terminal TerD domain, suggesting a possible role in an RNA-processing complex."
definition: >-
  RING finger, HC subclass, found in prokaryotic RING finger family proteins. The family corresponds to a group of uncharacterized prokaryotic C3HC4-type RING-HC finger containing proteins. The RING finger is fused to an N-terminal alpha-helical domain, ROT/Trove-like repeats, and a C-terminal TerD domain, suggesting a possible role in an RNA-processing complex. — an NCBI CDD conserved domain (cd16528); members share this curated model.
