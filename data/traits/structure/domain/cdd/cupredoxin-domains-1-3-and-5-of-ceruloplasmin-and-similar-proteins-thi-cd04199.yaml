identifier: CDD:cd04199
label: "Cupredoxin domains 1, 3, and 5 of ceruloplasmin and similar proteins. This family includes the first, third, and fifth cupredoxin domains of ceruloplasmin and similar proteins including the first, third and fifth cupredoxin domains of unprocessed coagulation factors V and VIII. Ceruloplasmin (ferroxidase) is a multicopper oxidase essential for normal iron homeostasis. It functions in copper transport, amine oxidation and as an antioxidant preventing free radicals in serum. The protein has 6 cupredoxin domains and exhibits internal sequence homology that appears to have evolved from the triplication of a sequence unit composed of two tandem cupredoxin domains. Human Factor VIII facilitates blood clotting by acting as a cofactor for factor IXa. Factor VIII and IXa forms a complex in the presence of Ca+2 and phospholipids that converts factor X to the activated form Xa."
definition: >-
  Cupredoxin domains 1, 3, and 5 of ceruloplasmin and similar proteins. This family includes the first, third, and fifth cupredoxin domains of ceruloplasmin and similar proteins including the first, third and fifth cupredoxin domains of unprocessed coagulation factors V and VIII. Ceruloplasmin (ferroxidase) is a multicopper oxidase essential for normal iron homeostasis. It functions in copper transport, amine oxidation and as an antioxidant preventing free radicals in serum. The protein has 6 cupredoxin domains and exhibits internal sequence homology that appears to have evolved from the triplication of a sequence unit composed of two tandem cupredoxin domains. Human Factor VIII facilitates blood clotting by acting as a cofactor for factor IXa. Factor VIII and IXa forms a complex in the presence of Ca+2 and phospholipids that converts factor X to the activated form Xa. — an NCBI CDD conserved domain (cd04199); members share this curated model.
