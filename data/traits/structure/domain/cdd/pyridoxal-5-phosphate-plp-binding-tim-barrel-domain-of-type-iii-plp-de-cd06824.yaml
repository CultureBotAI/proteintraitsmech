identifier: CDD:cd06824
label: "Pyridoxal 5-phosphate (PLP)-binding TIM barrel domain of Type III PLP-Dependent Enzymes, Yggs-like proteins. This subfamily contains mainly uncharacterized proteobacterial proteins with similarity to the hypothetical Escherichia coli protein YggS, a homolog of yeast YBL036c, which is homologous to a Pseudomonas aeruginosa gene that is co-transcribed with a known proline biosynthetic gene. Like yeast YBL036c, Yggs is a single domain monomeric protein with a typical TIM-barrel fold. Its structure, which shows a covalently-bound PLP cofactor, is similar to the N-terminal domain of the fold type III PLP-dependent enzymes, bacterial alanine racemase and eukaryotic ornithine decarboxylase, which are two-domain dimeric proteins. YggS has not been characterized extensively and its biological function is still unkonwn."
definition: >-
