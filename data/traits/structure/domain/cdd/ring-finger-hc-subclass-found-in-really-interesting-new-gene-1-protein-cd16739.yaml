identifier: CDD:cd16739
label: "RING finger, HC subclass, found in really interesting new gene 1 protein (RING1) and similar proteins. RING1, also known as polycomb complex protein RING1, RING finger protein 1 (RNF1), or RING finger protein 1A (RING1A), was identified as a transcriptional repressor that is associated with the Polycomb group (PcG) protein complex involved in stable repression of gene activity. It is a core component of polycomb repressive complex 1 (PRC1) that functions as an E3-ubuiquitin ligase that transferring the mono-ubuiquitin mark to the C-terminal tail of Histone H2A at K118/K119. PRC1 is also capable of chromatin compaction, a function not requiring histone tails, and this activity appears important in gene silencing. RING1 interacts with multiple PcG proteins and displays tumorigenic activity. It also shows zinc-dependent DNA binding activity. Moreover, RING1 inhibits transactivation of the DNA-binding protein recombination signal binding protein-Jkappa (RBP-J) by Notch through interaction with the LIM domains of KyoT2. RING1 contains a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in really interesting new gene 1 protein (RING1) and similar proteins. RING1, also known as polycomb complex protein RING1, RING finger protein 1 (RNF1), or RING finger protein 1A (RING1A), was identified as a transcriptional repressor that is associated with the Polycomb group (PcG) protein complex involved in stable repression of gene activity. It is a core component of polycomb repressive complex 1 (PRC1) that functions as an E3-ubuiquitin ligase that transferring the mono-ubuiquitin mark to the C-terminal tail of Histone H2A at K118/K119. PRC1 is also capable of chromatin compaction, a function not requiring histone tails, and this activity appears important in gene silencing. RING1 interacts with multiple PcG proteins and displays tumorigenic activity. It also shows zinc-dependent DNA binding activity. Moreover, RING1 inhibits transactivation of the DNA-binding protein recombination signal binding protein-Jkappa (RBP-J) by Notch through interaction with the LIM domains of KyoT2. RING1 contains a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16739); members share this curated model.
