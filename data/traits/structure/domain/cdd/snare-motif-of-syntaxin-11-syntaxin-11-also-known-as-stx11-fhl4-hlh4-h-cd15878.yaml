identifier: CDD:cd15878
label: "SNARE motif of syntaxin 11. Syntaxin 11 (also known as STX11, FHL4, HLH4, HPLH4) is present on endosomal membranes, including late endosomes and lysosomes in macrophages, and has been shown to bind Vti1b and regulate the availability of Vti1b to form other SNARE-complexes. Mutations in human STX11 has been linked to familial hemophagocytic lymphohistiocytosis type-4 (FHL-4), an autosomal recessive disorder of immune dysregulation. Syntaxin 11 is a member of the Qa subgroup of SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins, which consist of coiled-coil helices (called SNARE motifs) that mediate the interactions between SNARE proteins, and a transmembrane domain. The SNARE complexes mediate membrane fusion, important for trafficking of newly synthesized proteins, recycling of pre-existing proteins and organelle formation. SNARE proteins are classified into four groups, Qa-, Qb-, Qc- and R-SNAREs, depending on whether the residue in the hydrophilic center layer of the four-helical bundle is a glutamine (Q) or arginine (R). Qa-, as well as Qb- and Qc-SNAREs, are localized to target organelle membranes, while R-SNARE is localized to vesicle membranes. They form unique complexes consisting of one member of each subgroup, that mediate fusion between a specific type of vesicles and their target organelle."
