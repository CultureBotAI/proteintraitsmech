identifier: CDD:cd23123
label: "RING finger, H2 subclass, found in Saccharomyces cerevisiae RING-H2 zinc finger protein RHA2B and similar proteins. RHA2B is an E3 ubiquitin-protein ligase involved in the positive regulation of abscisic acid (ABA) signaling and responses to salt and osmotic stresses during seed germination and early seedling development. It acts additively with RHA2A in regulating ABA signaling and drought response. RHA2B contains a C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Saccharomyces cerevisiae RING-H2 zinc finger protein RHA2B and similar proteins. RHA2B is an E3 ubiquitin-protein ligase involved in the positive regulation of abscisic acid (ABA) signaling and responses to salt and osmotic stresses during seed germination and early seedling development. It acts additively with RHA2A in regulating ABA signaling and drought response. RHA2B contains a C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd23123); members share this curated model.
