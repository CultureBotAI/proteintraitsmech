identifier: CDD:cd23527
label: "Cap-0 specific (nucleoside-2'-O-)-methyltransferase of alphacoronavirus, also called non-structural protein 16. Cap-0 specific (nucleoside-2'-O-)-methyltransferase (2'OMTase) catalyzes the methylation of Cap-0 (m7GpppNp) at the 2'-hydroxyl of the ribose of the first nucleotide, using S-adenosyl-L-methionine (AdoMet) as the methyl donor. This reaction is the fourth and last step in mRNA capping, the creation of the stabilizing five-prime cap (5' cap) on mRNA. The alphacoronavirus (alphaCoV) 2'OMTase activity is located in the non-structural protein 16 (Nsp16). CoVs utilize a multi-subunit replication/transcription machinery. A set of non-structural proteins (Nsps) generated as cleavage products of the ORF1a and ORF1ab viral polyproteins assemble to facilitate viral replication and transcription. Nsp16 requires Nsp10 to bind both m7GpppA-RNA substrate and SAM cofactor; the structure suggests that Nsp10 may stabilize the SAM-binding pocket and extend the substrate RNA-binding groove of Nsp16."
definition: >-
  Cap-0 specific (nucleoside-2'-O-)-methyltransferase of alphacoronavirus, also called non-structural protein 16. Cap-0 specific (nucleoside-2'-O-)-methyltransferase (2'OMTase) catalyzes the methylation of Cap-0 (m7GpppNp) at the 2'-hydroxyl of the ribose of the first nucleotide, using S-adenosyl-L-methionine (AdoMet) as the methyl donor. This reaction is the fourth and last step in mRNA capping, the creation of the stabilizing five-prime cap (5' cap) on mRNA. The alphacoronavirus (alphaCoV) 2'OMTase activity is located in the non-structural protein 16 (Nsp16). CoVs utilize a multi-subunit replication/transcription machinery. A set of non-structural proteins (Nsps) generated as cleavage products of the ORF1a and ORF1ab viral polyproteins assemble to facilitate viral replication and transcription. Nsp16 requires Nsp10 to bind both m7GpppA-RNA substrate and SAM cofactor; the structure suggests that Nsp10 may stabilize the SAM-binding pocket and extend the substrate RNA-binding groove of Nsp16. — an NCBI CDD conserved domain (cd23527); members share this curated model.
