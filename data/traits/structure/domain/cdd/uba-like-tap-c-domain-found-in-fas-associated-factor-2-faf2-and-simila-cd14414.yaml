identifier: CDD:cd14414
label: "UBA-like TAP-C domain found in FAS-associated factor 2 (FAF2) and similar proteins. FAF2, also called protein ETEA, UBX domain-containing protein 3B, or UBX domain-containing protein 8, is the translation product of a highly expressed gene in the T-cells and eosinophils of atopic dermatitis patients compared with those of normal individuals. FAF2 shows homology to Fas-associated factor 1 (FAF1). Both of them contain N-terminal ubiquitin-associated (UBA)-like domain, UAS and ubiquitin-like (UBX) domains. Compared to FAF1, however, FAF2 lacks the nuclear targeting domain. The function of FAF2 remains unclear. A yeast two-hybrid assay showed that it can interact with Fas. Because of its homology to FAF1, it is postulated that FAF2 could be involved in modulating Fas-mediated apoptosis of T-cells and eosinophils of atopic dermatitis patients, making them more resistant to apoptosis."
definition: >-
  UBA-like TAP-C domain found in FAS-associated factor 2 (FAF2) and similar proteins. FAF2, also called protein ETEA, UBX domain-containing protein 3B, or UBX domain-containing protein 8, is the translation product of a highly expressed gene in the T-cells and eosinophils of atopic dermatitis patients compared with those of normal individuals. FAF2 shows homology to Fas-associated factor 1 (FAF1). Both of them contain N-terminal ubiquitin-associated (UBA)-like domain, UAS and ubiquitin-like (UBX) domains. Compared to FAF1, however, FAF2 lacks the nuclear targeting domain. The function of FAF2 remains unclear. A yeast two-hybrid assay showed that it can interact with Fas. Because of its homology to FAF1, it is postulated that FAF2 could be involved in modulating Fas-mediated apoptosis of T-cells and eosinophils of atopic dermatitis patients, making them more resistant to apoptosis. — an NCBI CDD conserved domain (cd14414); members share this curated model.
