identifier: CDD:cd22117
label: "F-box domain found in F-box/LRR-repeat protein 4 (FBXL4) and similar proteins. FBXL4, also called F-box and leucine-rich repeat protein 4, or F-box protein FBL4/FBL5, is part of an SCF (SKP1-cullin-F-box) protein ligase complex. It serves as a clock output molecule that regulates sleep through promotion of rhythmic degradation of the GABA(A) receptor. Biallelic pathogenic variants in FBXL4 are associated with an encephalopathic mtDNA maintenance defect syndrome that is a multi-system disease characterized by lactic acidemia, developmental delay, and hypotonia. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
