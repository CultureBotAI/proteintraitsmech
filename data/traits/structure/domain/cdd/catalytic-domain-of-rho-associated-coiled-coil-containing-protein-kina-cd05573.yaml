identifier: CDD:cd05573
label: "Catalytic domain of Rho-associated coiled-coil containing protein kinase (ROCK)- and Nuclear Dbf2-Related (NDR)-like Serine/Threonine Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Members of this subfamily include ROCK and ROCK-like proteins such as DMPK, MRCK, and CRIK, as well as NDR and NDR-like proteins such as LATS, CBK1 and Sid2p. ROCK and CRIK are effectors of the small GTPase Rho, while MRCK is an effector of the small GTPase Cdc42. NDR and NDR-like kinases contain an N-terminal regulatory (NTR) domain and an insert within the catalytic domain that contains an auto-inhibitory sequence. Proteins in this subfamily are involved in regulating many cellular functions including contraction, motility, division, proliferation, apoptosis, morphogenesis, and cytokinesis. The ROCK/NDR-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Rho-associated coiled-coil containing protein kinase (ROCK)- and Nuclear Dbf2-Related (NDR)-like Serine/Threonine Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Members of this subfamily include ROCK and ROCK-like proteins such as DMPK, MRCK, and CRIK, as well as NDR and NDR-like proteins such as LATS, CBK1 and Sid2p. ROCK and CRIK are effectors of the small GTPase Rho, while MRCK is an effector of the small GTPase Cdc42. NDR and NDR-like kinases contain an N-terminal regulatory (NTR) domain and an insert within the catalytic domain that contains an auto-inhibitory sequence. Proteins in this subfamily are involved in regulating many cellular functions including contraction, motility, division, proliferation, apoptosis, morphogenesis, and cytokinesis. The ROCK/NDR-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05573); members share this curated model.
