identifier: CDD:cd17345
label: "Glycerol-3-Phosphate Transporter of the Major Facilitator Superfamily of transporters. Glycerol-3-Phosphate Transporter (also called GlpT or G-3-P permease) is responsible for glycerol-3-phosphate uptake. It is part of the Organophosphate:Pi antiporter (OPA) family of integral membrane proteins responsible for the transport of specific organophosphates or sugar phosphates across biological membranes with the simultaneous translocation of inorganic phosphate into the opposite direction. The GlpT group belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Glycerol-3-Phosphate Transporter of the Major Facilitator Superfamily of transporters. Glycerol-3-Phosphate Transporter (also called GlpT or G-3-P permease) is responsible for glycerol-3-phosphate uptake. It is part of the Organophosphate:Pi antiporter (OPA) family of integral membrane proteins responsible for the transport of specific organophosphates or sugar phosphates across biological membranes with the simultaneous translocation of inorganic phosphate into the opposite direction. The GlpT group belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17345); members share this curated model.
