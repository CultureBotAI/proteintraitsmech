identifier: CDD:cd06815
label: "Type III Pyridoxal 5-phosphate (PLP)-Dependent Enzyme Alanine Racemase-like 1. This subfamily is composed of uncharacterized bacterial proteins with similarity to bacterial alanine racemases (AR), which are fold type III PLP-dependent enzymes containing an N-terminal PLP-binding TIM-barrel domain and a C-terminal beta-sandwich domain. AR exists as homodimers with active sites that lie at the interface between the TIM barrel domain of one subunit and the beta-sandwich domain of the other subunit. It catalyzes the interconversion between L- and D-alanine, which is an essential component of the peptidoglycan layer of bacterial cell walls. Members of this subfamily may act as PLP-dependent enzymes."
definition: >-
  Type III Pyridoxal 5-phosphate (PLP)-Dependent Enzyme Alanine Racemase-like 1. This subfamily is composed of uncharacterized bacterial proteins with similarity to bacterial alanine racemases (AR), which are fold type III PLP-dependent enzymes containing an N-terminal PLP-binding TIM-barrel domain and a C-terminal beta-sandwich domain. AR exists as homodimers with active sites that lie at the interface between the TIM barrel domain of one subunit and the beta-sandwich domain of the other subunit. It catalyzes the interconversion between L- and D-alanine, which is an essential component of the peptidoglycan layer of bacterial cell walls. Members of this subfamily may act as PLP-dependent enzymes. — an NCBI CDD conserved domain (cd06815); members share this curated model.
