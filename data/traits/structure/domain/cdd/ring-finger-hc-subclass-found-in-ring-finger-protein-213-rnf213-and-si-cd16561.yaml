identifier: CDD:cd16561
label: "RING finger, HC subclass, found in RING finger protein 213 (RNF213) and similar proteins. RNF213, also known as ALK lymphoma oligomerization partner on chromosome 17 or Moyamoya steno-occlusive disease-associated AAA+ and RING finger protein (mysterin), is an intracellular soluble protein that functions as an E3 ubiquitin-protein ligase and AAA+ ATPase, which possibly contributes to vascular development through mechanical processes in the cell. It plays a unique role in endothelial cells for proper gene expression in response to inflammatory signals from the environment. Mutations in RNF213 may be associated with Moyamoya disease (MMD), an idiopathic cerebrovascular occlusive disorder prevalent in East Asia. It also acts as a nuclear marker for acanthomorph phylogeny. RNF213 contains two tandem enzymatically active AAA+ ATPase modules and a C3HC4-type RING-HC finger. It can form a huge ring-shaped oligomeric complex."
definition: >-
