identifier: CDD:cd14095
label: "Catalytic domain of the Serine/Threonine Kinase, Doublecortin-like kinase (also called Doublecortin-like and CAM kinase-like). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DCKL (or DCAMKL) proteins belong to the doublecortin (DCX) family of proteins which are involved in neuronal migration, neurogenesis, and eye receptor development, among others. Family members typically contain tandem doublecortin (DCX) domains at the N-terminus; DCX domains can bind microtubules and serve as protein-interaction platforms. In addition, DCKL proteins contain a C-terminal kinase domain with similarity to CAMKs. They are involved in the regulation of cAMP signaling. Vertebrates contain three DCKL proteins (DCKL1-3); DCKL1 and 2 also contain a serine, threonine, and proline rich domain (SP), while DCKL3 contains only a single DCX domain instead of tandem domains. The DCKL subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Doublecortin-like kinase (also called Doublecortin-like and CAM kinase-like). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DCKL (or DCAMKL) proteins belong to the doublecortin (DCX) family of proteins which are involved in neuronal migration, neurogenesis, and eye receptor development, among others. Family members typically contain tandem doublecortin (DCX) domains at the N-terminus; DCX domains can bind microtubules and serve as protein-interaction platforms. In addition, DCKL proteins contain a C-terminal kinase domain with similarity to CAMKs. They are involved in the regulation of cAMP signaling. Vertebrates contain three DCKL proteins (DCKL1-3); DCKL1 and 2 also contain a serine, threonine, and proline rich domain (SP), while DCKL3 contains only a single DCX domain instead of tandem domains. The DCKL subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14095); members share this curated model.
