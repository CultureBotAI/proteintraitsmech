identifier: CDD:cd22477
label: "type I K homology (KH) RNA-binding domain found in the subfamily of NYN domain and retroviral integrase catalytic domain-containing protein (NYNRIN). The NYNRIN subfamily includes NYNRIN and KH and NYN domain-containing protein (KHNYN). NYNRIN, also known as CGIN1/Cousin of GIN1, may contribute to retroviral resistance in mammals by regulating the ubiquitination of viral proteins. KHNYN acts as a novel cofactor for zinc finger antiviral protein (ZAP) to target CpG-containing retroviral RNA for degradation."
definition: >-
  type I K homology (KH) RNA-binding domain found in the subfamily of NYN domain and retroviral integrase catalytic domain-containing protein (NYNRIN). The NYNRIN subfamily includes NYNRIN and KH and NYN domain-containing protein (KHNYN). NYNRIN, also known as CGIN1/Cousin of GIN1, may contribute to retroviral resistance in mammals by regulating the ubiquitination of viral proteins. KHNYN acts as a novel cofactor for zinc finger antiviral protein (ZAP) to target CpG-containing retroviral RNA for degradation. — an NCBI CDD conserved domain (cd22477); members share this curated model.
