identifier: CDD:cd02176
label: "Xyloglucan endotransglycosylase, member of glycosyl hydrolase family 16. Xyloglucan endotransglycosylases (XETs) cleave and religate xyloglucan polymers in plant cell walls via a transglycosylation mechanism. Xyloglucan is a soluble hemicellulose with a backbone of beta-1,4-linked glucose units, partially substituted with alpha-1,6-linked xylopyranose branches. It binds noncovalently to cellulose, cross-linking the adjacent cellulose microfibrils, giving it a key structural role as a matrix polymer. Therefore, XET plays an important role in all plant processes that require cell wall remodeling."
definition: >-
  Xyloglucan endotransglycosylase, member of glycosyl hydrolase family 16. Xyloglucan endotransglycosylases (XETs) cleave and religate xyloglucan polymers in plant cell walls via a transglycosylation mechanism. Xyloglucan is a soluble hemicellulose with a backbone of beta-1,4-linked glucose units, partially substituted with alpha-1,6-linked xylopyranose branches. It binds noncovalently to cellulose, cross-linking the adjacent cellulose microfibrils, giving it a key structural role as a matrix polymer. Therefore, XET plays an important role in all plant processes that require cell wall remodeling. — an NCBI CDD conserved domain (cd02176); members share this curated model.
