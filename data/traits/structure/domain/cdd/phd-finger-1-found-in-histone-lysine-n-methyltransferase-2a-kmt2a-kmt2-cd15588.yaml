identifier: CDD:cd15588
label: "PHD finger 1 found in histone-lysine N-methyltransferase 2A (KMT2A). KMT2A (also termed ALL-1, CXXC-type zinc finger protein 7, myeloid/lymphoid or mixed-lineage leukemia protein 1 (MLL1), trithorax-like protein (Htrx), or zinc finger protein HRX) is a histone methyltransferase that belongs to the MLL subfamily of H3K4-specific histone lysine methyltransferases (KMT2). It regulates chromatin-mediated transcription through the catalysis of methylation of histone 3 lysine 4 (H3K4), and is frequently rearranged in acute leukemia. KMT2A functions as the catalytic subunit in MLL1 complex, which also contains WDR5, RbBP5, ASH2L and DPY30 as integral core subunits required for the efficient methylation activity of the complex. The MLL1 complex is highly active and specific for H3K4 methylation. KMT2A contains a CxxC (x for any residue) zinc finger domain, three plant homeodomain (PHD) fingers, a Bromodomain domain, an extended PHD (ePHD) finger, Cys2HisCys5HisCys2His, two FY (phenylalanine tyrosine)-rich domains, and a SET (Suppressor of variegation, Enhancer of zeste, Trithorax) domain. This model corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in histone-lysine N-methyltransferase 2A (KMT2A). KMT2A (also termed ALL-1, CXXC-type zinc finger protein 7, myeloid/lymphoid or mixed-lineage leukemia protein 1 (MLL1), trithorax-like protein (Htrx), or zinc finger protein HRX) is a histone methyltransferase that belongs to the MLL subfamily of H3K4-specific histone lysine methyltransferases (KMT2). It regulates chromatin-mediated transcription through the catalysis of methylation of histone 3 lysine 4 (H3K4), and is frequently rearranged in acute leukemia. KMT2A functions as the catalytic subunit in MLL1 complex, which also contains WDR5, RbBP5, ASH2L and DPY30 as integral core subunits required for the efficient methylation activity of the complex. The MLL1 complex is highly active and specific for H3K4 methylation. KMT2A contains a CxxC (x for any residue) zinc finger domain, three plant homeodomain (PHD) fingers, a Bromodomain domain, an extended PHD (ePHD) finger, Cys2HisCys5HisCys2His, two FY (phenylalanine tyrosine)-rich domains, and a SET (Suppressor of variegation, Enhancer of zeste, Trithorax) domain. This model corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15588); members share this curated model.
