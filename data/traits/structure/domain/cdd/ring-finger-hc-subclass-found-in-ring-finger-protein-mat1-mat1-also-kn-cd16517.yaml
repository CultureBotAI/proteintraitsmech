identifier: CDD:cd16517
label: "RING finger, HC subclass, found in RING finger protein MAT1. MAT1, also known as CDK-activating kinase assembly factor MAT1, CDK7/cyclin-H assembly factor, cyclin-G1-interacting protein, menage a trois, RING finger protein 66 (RNF66), p35, or p36, is involved in cell cycle control and in RNA transcription by RNA polymerase II. It associates primarily with the catalytic subunit cyclin-dependent kinase 7 (CDK7) and the regulatory subunit cyclin H to form the CDK-activating kinase (CAK) complex that can further associate with the core-TFIIH to form the transcription factor IIH (TFIIH) basal transcription/DNA repair factor, which activates RNA polymerase II by serine phosphorylation of the repetitive C-terminal domain (CTD) of its large subunit (POLR2A), allowing its escape from the promoter, and elongation of the transcripts. MAT1 contains an N-terminal C3HC4-type RING-HC finger, a central coiled coil domain, and a C-terminal domain rich in hydrophobic residues."
definition: >-
  RING finger, HC subclass, found in RING finger protein MAT1. MAT1, also known as CDK-activating kinase assembly factor MAT1, CDK7/cyclin-H assembly factor, cyclin-G1-interacting protein, menage a trois, RING finger protein 66 (RNF66), p35, or p36, is involved in cell cycle control and in RNA transcription by RNA polymerase II. It associates primarily with the catalytic subunit cyclin-dependent kinase 7 (CDK7) and the regulatory subunit cyclin H to form the CDK-activating kinase (CAK) complex that can further associate with the core-TFIIH to form the transcription factor IIH (TFIIH) basal transcription/DNA repair factor, which activates RNA polymerase II by serine phosphorylation of the repetitive C-terminal domain (CTD) of its large subunit (POLR2A), allowing its escape from the promoter, and elongation of the transcripts. MAT1 contains an N-terminal C3HC4-type RING-HC finger, a central coiled coil domain, and a C-terminal domain rich in hydrophobic residues. — an NCBI CDD conserved domain (cd16517); members share this curated model.
