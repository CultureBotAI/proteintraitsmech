identifier: CDD:cd11692
label: "N-terminal domain of HRI1 and related proteins. Saccharomyces cerevisiae Hri1p (Hrr25-interacting protein 1, YLR301w) is a non-essential gene product named for its interaction with the yeast protein kinase Hrr25p. It has also been characterized as an interaction partner for Sec72p, but does not seem to be required for protein translocation into the ER. It may be a cytosolic protein. Hri1p contains a tandem repeat of a structural unit that forms a beta-barrel with structural similarity to nitrobindin. This N-terminal repeat is involved in homodimerization and may contain a ligand binding site."
definition: >-
  N-terminal domain of HRI1 and related proteins. Saccharomyces cerevisiae Hri1p (Hrr25-interacting protein 1, YLR301w) is a non-essential gene product named for its interaction with the yeast protein kinase Hrr25p. It has also been characterized as an interaction partner for Sec72p, but does not seem to be required for protein translocation into the ER. It may be a cytosolic protein. Hri1p contains a tandem repeat of a structural unit that forms a beta-barrel with structural similarity to nitrobindin. This N-terminal repeat is involved in homodimerization and may contain a ligand binding site. — an NCBI CDD conserved domain (cd11692); members share this curated model.
