identifier: CDD:cd16557
label: "RING finger, HC subclass, found in RING finger protein 186 (RNF186) and similar proteins. RNF186 is an E3 ubiquitin-protein ligase with an N-terminal C3HC4-type RING-HC finger and two putative C-terminal transmembrane domains which enable it to localize in a certain organelle. It regulates RING-dependent self-ubiquitination, as well as endoplasmic reticulum (ER) stress-mediated apoptosis through interaction with the Bcl-2 family protein BNip1."
definition: >-
  RING finger, HC subclass, found in RING finger protein 186 (RNF186) and similar proteins. RNF186 is an E3 ubiquitin-protein ligase with an N-terminal C3HC4-type RING-HC finger and two putative C-terminal transmembrane domains which enable it to localize in a certain organelle. It regulates RING-dependent self-ubiquitination, as well as endoplasmic reticulum (ER) stress-mediated apoptosis through interaction with the Bcl-2 family protein BNip1. — an NCBI CDD conserved domain (cd16557); members share this curated model.
