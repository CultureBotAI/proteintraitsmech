identifier: CDD:cd21920
label: "cytoplasmic domain found in platelet endothelial cell adhesion molecule (PECAM-1) and similar proteins. PECAM-1, also called EndoCAM, or GPIIA', or PECA1, or antigen CD31, is a cell adhesion molecule which is required for leukocyte transendothelial migration (TEM) under most inflammatory conditions. It promotes macrophage-mediated phagocytosis of apoptotic leukocytes by tethering them to the phagocytic cells. Homophilic ligation of PECAM1 prevents macrophage-mediated phagocytosis of neighboring viable leukocytes by transmitting a detachment signal. PECAM-1 modulates bradykinin receptor BDKRB2 activation. It also regulates bradykinin- and hyperosmotic shock-induced ERK1/2 activation in endothelial cells. PECAM-1 is a type I transmembrane glycoprotein that contains 6 extracellular Ig homology domains, a single-pass transmembrane region, and a long cytoplasmic domain. The model corresponds to the cytoplasmic domain that contains 2 Immunoreceptor tyrosine-based inhibitory motifs (ITIMs) surrounding tyrosine (Y) residues."
definition: >-
  cytoplasmic domain found in platelet endothelial cell adhesion molecule (PECAM-1) and similar proteins. PECAM-1, also called EndoCAM, or GPIIA', or PECA1, or antigen CD31, is a cell adhesion molecule which is required for leukocyte transendothelial migration (TEM) under most inflammatory conditions. It promotes macrophage-mediated phagocytosis of apoptotic leukocytes by tethering them to the phagocytic cells. Homophilic ligation of PECAM1 prevents macrophage-mediated phagocytosis of neighboring viable leukocytes by transmitting a detachment signal. PECAM-1 modulates bradykinin receptor BDKRB2 activation. It also regulates bradykinin- and hyperosmotic shock-induced ERK1/2 activation in endothelial cells. PECAM-1 is a type I transmembrane glycoprotein that contains 6 extracellular Ig homology domains, a single-pass transmembrane region, and a long cytoplasmic domain. The model corresponds to the cytoplasmic domain that contains 2 Immunoreceptor tyrosine-based inhibitory motifs (ITIMs) surrounding tyrosine (Y) residues. — an NCBI CDD conserved domain (cd21920); members share this curated model.
