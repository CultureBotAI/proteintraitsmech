identifier: CDD:cd14523
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 19. Dual specificity protein phosphatase 19 (DUSP19), also called low molecular weight dual specificity phosphatase 3 (LMW-DSP3) or stress-activated protein kinase (SAPK) pathway-regulating phosphatase 1 (SKRP1), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. DUSP19  interacts with the MAPK kinase MKK7, a JNK activator, and inactivates the JNK MAPK pathway."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 19. Dual specificity protein phosphatase 19 (DUSP19), also called low molecular weight dual specificity phosphatase 3 (LMW-DSP3) or stress-activated protein kinase (SAPK) pathway-regulating phosphatase 1 (SKRP1), functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). It is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. DUSP19 interacts with the MAPK kinase MKK7, a JNK activator, and inactivates the JNK MAPK pathway. — an NCBI CDD conserved domain (cd14523); members share this curated model.
