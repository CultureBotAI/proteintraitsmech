identifier: CDD:cd06989
label: "Arabidopsis thaliana DRT102 and related proteins, cupin domain. This family includes bacterial and eukaryotic proteins homologous to DNA-damage-repair/toleration protein DRT102 found in Arabidopsis thaliana. DRT102 may be involved in DNA repair from UV damage. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  Arabidopsis thaliana DRT102 and related proteins, cupin domain. This family includes bacterial and eukaryotic proteins homologous to DNA-damage-repair/toleration protein DRT102 found in Arabidopsis thaliana. DRT102 may be involved in DNA repair from UV damage. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06989); members share this curated model.
