identifier: CDD:cd23596
label: "extracellular domain (ECD) found in Drosophila melanogaster receptor protein serine/threonine kinase Thickveins and similar proteins. Thickveins (Tkv) is a decapentaplegic (dpp) type I receptor encoded by the thick veins (tkv) gene that is expressed in a highly localized and dynamic pattern during development. Thickveins is the ortholog of the human activin receptor-like kinase (ALK)-3/6. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Drosophila melanogaster receptor protein serine/threonine kinase Thickveins and similar proteins. Thickveins (Tkv) is a decapentaplegic (dpp) type I receptor encoded by the thick veins (tkv) gene that is expressed in a highly localized and dynamic pattern during development. Thickveins is the ortholog of the human activin receptor-like kinase (ALK)-3/6. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23596); members share this curated model.
