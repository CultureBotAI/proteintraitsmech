identifier: CDD:cd11428
label: "basic helix-loop-helix (bHLH) domain found in neurogenin (NGN) family. The NGN family includes three neural-specific bHLH transcription factors, NGN1-3, which may function at neuroblast selection genes during the development of several neuronal lineages. NGN-1, also termed Class A basic helix-loop-helix protein 6 (bHLHa6), or neurogenic basic-helix-loop-helix protein, or neurogenic differentiation factor 3 (NeuroD3), is a neural-specific bHLH transcription factor involved in the initiation of neuronal differentiation. NGN-2, also termed Class A basic helix-loop-helix protein 8 (bHLHa8), or protein atonal homolog 4 (ATOH4), is a neural-specific bHLH transcription factor required for sensory neurogenesis. NGN-3, also termed Class A basic helix-loop-helix protein 7 (bHLHa7), or protein atonal homolog 5 (ATOH5), is a neural-specific bHLH transcription factor expressed in the developing central nervous system and the embryonic pancreas. It is involved in neurogenesis and plays an important role in spermatogenesis."
definition: >-
