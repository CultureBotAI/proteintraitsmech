identifier: CDD:cd06984
label: "uncharacterized Methanocaldococcus jannaschii Moth_1897 and related proteins, cupin domain. This family includes archaeal and bacterial proteins homologous to Moth_1897, a Methanocaldococcus jannaschii protein of unknown function. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
