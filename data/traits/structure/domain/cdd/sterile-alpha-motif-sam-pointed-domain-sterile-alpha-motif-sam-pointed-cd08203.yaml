identifier: CDD:cd08203
label: "Sterile alpha motif (SAM)/Pointed domain. Sterile alpha motif (SAM)/Pointed domain is found in about 40% of transcriptional regulators of ETS family (initially named for Erythroblastosis virus, E26-E Twenty Six).  SAM Pointed domain containing proteins of this family additionally have a C-terminal ETS DNA-binding domain. In a few cases, SAM Pointed domain appears as a single domain protein.  Members of this group are mostly involved in regulation of embryonic development and growth control in eukaryotes. SAM Pointed domains mediate protein-protein interactions. Depending on the subgroup, they can interact with other SAM Pointed domains forming homo or hetero dimers/oligomers and/or they can recruit a protein kinase to its target which can be a SAM Pointed domain containing protein itself or another protein that has no kinase docking site. Thus, SAM Pointed domains participate in transcriptional regulation and signal transduction. Some genes coding ETS family transcriptional regulators are proto-oncogenes. They are prone to chromosomal translocations resulting in gene fusions. Chimeric proteins with SAM Pointed domains were found in a number of different human tumors including myeloid leukemia, lymphoblastic leukemia, Ewing's sarcoma and primitive neuroectodermal tumor. Members of this family are potential targets for cancer therapy."
definition: >-
  Sterile alpha motif (SAM)/Pointed domain. Sterile alpha motif (SAM)/Pointed domain is found in about 40% of transcriptional regulators of ETS family (initially named for Erythroblastosis virus, E26-E Twenty Six). SAM Pointed domain containing proteins of this family additionally have a C-terminal ETS DNA-binding domain. In a few cases, SAM Pointed domain appears as a single domain protein. Members of this group are mostly involved in regulation of embryonic development and growth control in eukaryotes. SAM Pointed domains mediate protein-protein interactions. Depending on the subgroup, they can interact with other SAM Pointed domains forming homo or hetero dimers/oligomers and/or they can recruit a protein kinase to its target which can be a SAM Pointed domain containing protein itself or another protein that has no kinase docking site. Thus, SAM Pointed domains participate in transcriptional regulation and signal transduction. Some genes coding ETS family transcriptional regulators are proto-oncogenes. They are prone to chromosomal translocations resulting in gene fusions. Chimeric proteins with SAM Pointed domains were found in a number of different human tumors including myeloid leukemia, lymphoblastic leukemia, Ewing's sarcoma and primitive neuroectodermal tumor. Members of this family are potential targets for cancer therapy. — an NCBI CDD conserved domain (cd08203); members share this curated model.
