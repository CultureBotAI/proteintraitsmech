identifier: CDD:cd17054
label: "ubiquitin-like (Ubl) domain found in Arabidopsis thaliana Bcl-2-associated athanogenes AtBAG1, AtBAG2, AtBAG3, AtBAG4, and similar proteins. The family includes four Arabidopsis BAG family proteins (AtBAG1, AtBAG2, AtBAG3, AtBAG4) that have very similar domain organizations with a ubiquitin-like (Ubl) domain in the N-terminus and a BAG domain in the C-terminus. They may function as co-chaperones that regulate diverse cellular pathways, such as programmed cell death and stress responses. AtBAG1, AtBAG3, and AtBAG4 are predicted to localize in the cytoplasm, but the localization of AtBAG2 is the microbody. AtBAG4 can interact with Hsc70. The overexpression of AtBAG4 in tobacco plants confers tolerance to a wide range of abiotic stresses such as UV light, cold, oxidants, and salt treatments."
definition: >-
  ubiquitin-like (Ubl) domain found in Arabidopsis thaliana Bcl-2-associated athanogenes AtBAG1, AtBAG2, AtBAG3, AtBAG4, and similar proteins. The family includes four Arabidopsis BAG family proteins (AtBAG1, AtBAG2, AtBAG3, AtBAG4) that have very similar domain organizations with a ubiquitin-like (Ubl) domain in the N-terminus and a BAG domain in the C-terminus. They may function as co-chaperones that regulate diverse cellular pathways, such as programmed cell death and stress responses. AtBAG1, AtBAG3, and AtBAG4 are predicted to localize in the cytoplasm, but the localization of AtBAG2 is the microbody. AtBAG4 can interact with Hsc70. The overexpression of AtBAG4 in tobacco plants confers tolerance to a wide range of abiotic stresses such as UV light, cold, oxidants, and salt treatments. — an NCBI CDD conserved domain (cd17054); members share this curated model.
