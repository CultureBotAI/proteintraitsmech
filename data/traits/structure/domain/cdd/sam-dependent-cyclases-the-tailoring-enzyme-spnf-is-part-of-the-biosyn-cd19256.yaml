identifier: CDD:cd19256
label: "SAM dependent cyclases. The tailoring enzyme SpnF is part of the biosynthetic pathway of the spinosyn insecticides and catalyzes a [4 + 2] cycloaddition on a 22-membered macrolactone to create an embedded cyclohexene ring. TleD is a key enzymes in the teleocidin B biosynthesis pathway  and catalyzes the rearranging of the geranyl and indole moieties of the precursor to form a six-membered ring. S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I;  AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc)."
definition: >-
  SAM dependent cyclases. The tailoring enzyme SpnF is part of the biosynthetic pathway of the spinosyn insecticides and catalyzes a [4 + 2] cycloaddition on a 22-membered macrolactone to create an embedded cyclohexene ring. TleD is a key enzymes in the teleocidin B biosynthesis pathway and catalyzes the rearranging of the geranyl and indole moieties of the precursor to form a six-membered ring. S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I; AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc). — an NCBI CDD conserved domain (cd19256); members share this curated model.
