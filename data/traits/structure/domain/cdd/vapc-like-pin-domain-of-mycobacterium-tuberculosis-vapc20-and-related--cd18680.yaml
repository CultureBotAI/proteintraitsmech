identifier: CDD:cd18680
label: "VapC-like PIN domain of Mycobacterium tuberculosis VapC20 and related proteins. M. tuberculosis VapC20 inhibits translation by site-specific cleavage of the universally conserved Sarcin-Ricin loop in 23S rRNA. This subfamily belongs to the VapC (virulence-associated protein C)-like nuclease family of the PIN domain-like superfamily. VapC is the PIN-domain ribonuclease toxin from prokaryotic VapBC toxin-antitoxin (TA) systems. VapB is a transcription factor-like protein antitoxin acting as an inhibitor. Other members of the VapC-like nuclease family include FitB toxin of the FitAB TA system, eukaryotic ribonucleases such as Smg6, ribosome assembly factor NOB1, exosome subunit Rrp44 endoribonuclease and rRNA-processing protein Fcf1."
definition: >-
  VapC-like PIN domain of Mycobacterium tuberculosis VapC20 and related proteins. M. tuberculosis VapC20 inhibits translation by site-specific cleavage of the universally conserved Sarcin-Ricin loop in 23S rRNA. This subfamily belongs to the VapC (virulence-associated protein C)-like nuclease family of the PIN domain-like superfamily. VapC is the PIN-domain ribonuclease toxin from prokaryotic VapBC toxin-antitoxin (TA) systems. VapB is a transcription factor-like protein antitoxin acting as an inhibitor. Other members of the VapC-like nuclease family include FitB toxin of the FitAB TA system, eukaryotic ribonucleases such as Smg6, ribosome assembly factor NOB1, exosome subunit Rrp44 endoribonuclease and rRNA-processing protein Fcf1. — an NCBI CDD conserved domain (cd18680); members share this curated model.
