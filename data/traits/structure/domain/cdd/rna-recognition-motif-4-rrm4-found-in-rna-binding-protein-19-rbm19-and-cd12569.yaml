identifier: CDD:cd12569
label: "RNA recognition motif 4 (RRM4) found in RNA-binding protein 19 (RBM19) and similar proteins. This subgroup corresponds to the RRM4 of RBM19, also termed RNA-binding domain-1 (RBD-1), which is a nucleolar protein conserved in eukaryotes. It is involved in ribosome biogenesis by processing rRNA. In addition, it is essential for preimplantation development. RBM19 has a unique domain organization containing 6 conserved RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains)."
definition: >-
  RNA recognition motif 4 (RRM4) found in RNA-binding protein 19 (RBM19) and similar proteins. This subgroup corresponds to the RRM4 of RBM19, also termed RNA-binding domain-1 (RBD-1), which is a nucleolar protein conserved in eukaryotes. It is involved in ribosome biogenesis by processing rRNA. In addition, it is essential for preimplantation development. RBM19 has a unique domain organization containing 6 conserved RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). — an NCBI CDD conserved domain (cd12569); members share this curated model.
