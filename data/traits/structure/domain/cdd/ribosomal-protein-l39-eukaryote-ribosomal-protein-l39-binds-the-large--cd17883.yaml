identifier: CDD:cd17883
label: "ribosomal protein L39 eukaryote. Ribosomal protein L39 binds the large ribosomal subunit in the region surrounding the distal end of the polypeptide exit tunnel. The ribosome is a large complex catalyst responsible for the synthesis of new proteins. Ribosomal features at the exit of the tunnel can play a role in the regulation of nascent chain exit and ion flux. L39 is found in eukaryotes and archaea but not in prokaryotes."
definition: >-
  ribosomal protein L39 eukaryote. Ribosomal protein L39 binds the large ribosomal subunit in the region surrounding the distal end of the polypeptide exit tunnel. The ribosome is a large complex catalyst responsible for the synthesis of new proteins. Ribosomal features at the exit of the tunnel can play a role in the regulation of nascent chain exit and ion flux. L39 is found in eukaryotes and archaea but not in prokaryotes. — an NCBI CDD conserved domain (cd17883); members share this curated model.
