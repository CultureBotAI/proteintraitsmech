identifier: CDD:cd18305
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Drosophila melanogaster protein germ cell-less (GCL) and similar proteins. GCL proteins are nuclear envelope proteins highly conserved between the mammalian and Drosophila orthologs. Drosophila melanogaster GCL is a key regulator required for the specification of pole cells and primordial germ cell formation in embryos. Both, human germ cell-less protein-like 1 (GMCL1) and germ cell-less protein-like 2 (GMCL2), also called germ cell-less protein-like 1-like (GMCL1P1 or GMCL1L), may function in spermatogenesis. They may also be substrate-specific adaptors of E3 ubiquitin-protein ligase complexes which mediate the ubiquitination and subsequent proteasomal degradation of target proteins. They contain BTB and BACK domains. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Drosophila melanogaster protein germ cell-less (GCL) and similar proteins. GCL proteins are nuclear envelope proteins highly conserved between the mammalian and Drosophila orthologs. Drosophila melanogaster GCL is a key regulator required for the specification of pole cells and primordial germ cell formation in embryos. Both, human germ cell-less protein-like 1 (GMCL1) and germ cell-less protein-like 2 (GMCL2), also called germ cell-less protein-like 1-like (GMCL1P1 or GMCL1L), may function in spermatogenesis. They may also be substrate-specific adaptors of E3 ubiquitin-protein ligase complexes which mediate the ubiquitination and subsequent proteasomal degradation of target proteins. They contain BTB and BACK domains. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18305); members share this curated model.
