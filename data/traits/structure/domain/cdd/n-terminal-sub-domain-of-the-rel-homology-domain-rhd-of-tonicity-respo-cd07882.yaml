identifier: CDD:cd07882
label: "N-terminal sub-domain of the Rel homology domain (RHD) of tonicity-responsive enhancer binding protein (TonEBP). Proteins containing the Rel homology domain (RHD) are metazoan transcription factors. The RHD is composed of two structural sub-domains; this model characterizes the N-terminal RHD sub-domain of the tonicity-responsive enhancer binding protein (TonEBP), also called NFAT5. Mammalian TonEBP regulates the expression of genes in response to tonicity. It plays a pivotal role in urinary concentrating mechanisms in kidney medulla, by triggering the accumulation of osmolytes that enable renal medullary cells to tolerate high levels of urea and salt."
definition: >-
  N-terminal sub-domain of the Rel homology domain (RHD) of tonicity-responsive enhancer binding protein (TonEBP). Proteins containing the Rel homology domain (RHD) are metazoan transcription factors. The RHD is composed of two structural sub-domains; this model characterizes the N-terminal RHD sub-domain of the tonicity-responsive enhancer binding protein (TonEBP), also called NFAT5. Mammalian TonEBP regulates the expression of genes in response to tonicity. It plays a pivotal role in urinary concentrating mechanisms in kidney medulla, by triggering the accumulation of osmolytes that enable renal medullary cells to tolerate high levels of urea and salt. — an NCBI CDD conserved domain (cd07882); members share this curated model.
