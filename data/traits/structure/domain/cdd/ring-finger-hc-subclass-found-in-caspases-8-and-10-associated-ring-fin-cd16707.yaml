identifier: CDD:cd16707
label: "RING finger, HC subclass, found in caspases-8 and -10-associated RING finger protein 2 (CARP-2) and similar proteins. CARP-2, also known as rififylin, caspase regulator CARP2, FYVE-RING finger protein Sakura (Fring), RING finger and FYVE-like domain-containing protein 1, RING finger protein 189 (RNF189), or RING finger protein 34-like, is an endosome-associated E3 ubiquitin-protein ligase that targets internalized receptor interacting kinase (RIP) for proteasome-mediated degradation. It acts as a negative regulator of tumor necrosis factor (TNF)-induced nuclear factor (NF)-kappaB activation. It also regulates the p53 signaling pathway by degrading 14-3-3sigma and stabilizing MDM2. As a caspase regulator, CARP2 does not localize to membranes in the cell and is involved in the negative regulation of apoptosis, specifically targeting two initiator caspases, caspase 8 and caspase 10. CARP2 contains an N-terminal FYVE-like domain and a C-terminal C3HC4-type RING-HC finger domain."
definition: >-
  RING finger, HC subclass, found in caspases-8 and -10-associated RING finger protein 2 (CARP-2) and similar proteins. CARP-2, also known as rififylin, caspase regulator CARP2, FYVE-RING finger protein Sakura (Fring), RING finger and FYVE-like domain-containing protein 1, RING finger protein 189 (RNF189), or RING finger protein 34-like, is an endosome-associated E3 ubiquitin-protein ligase that targets internalized receptor interacting kinase (RIP) for proteasome-mediated degradation. It acts as a negative regulator of tumor necrosis factor (TNF)-induced nuclear factor (NF)-kappaB activation. It also regulates the p53 signaling pathway by degrading 14-3-3sigma and stabilizing MDM2. As a caspase regulator, CARP2 does not localize to membranes in the cell and is involved in the negative regulation of apoptosis, specifically targeting two initiator caspases, caspase 8 and caspase 10. CARP2 contains an N-terminal FYVE-like domain and a C-terminal C3HC4-type RING-HC finger domain. — an NCBI CDD conserved domain (cd16707); members share this curated model.
