identifier: CDD:cd18085
label: "SPOUT superfamily RNA methyltransferase TM1570-like. DUF2168; This domain, found in various hypothetical prokaryotic proteins, has no known function. It is also found in a few prokaryotic tRNA (guanine-N(1)-)-methyltransferases. Proteins of this family are members of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  SPOUT superfamily RNA methyltransferase TM1570-like. DUF2168; This domain, found in various hypothetical prokaryotic proteins, has no known function. It is also found in a few prokaryotic tRNA (guanine-N(1)-)-methyltransferases. Proteins of this family are members of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18085); members share this curated model.
