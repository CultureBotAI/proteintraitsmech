identifier: CDD:cd17685
label: "RUN domain found in RUN and SH3 domain-containing proteins, RUSC1, RUSC2 and similar proteins. RUSC1, also called new molecule containing SH3 at the carboxy-terminus (NESCA), may acts as a signaling adapter that translocates to the nuclear envelope and regulates neurotrophin-induced neurite outgrowth. RUSC2, also called iporin, or interacting protein of Rab1, is a novel interacting molecule for the active GTP-bound conformation of Rab1. It may function as a link between the targeting of endoplasmic reticulum derived vesicles, triggered by the Rab1 GTPase and a signaling pathway regulated by molecules containing SH3 and/or poly-proline regions. This model contains the RUN domain of RUSC1 and RUSC2."
definition: >-
  RUN domain found in RUN and SH3 domain-containing proteins, RUSC1, RUSC2 and similar proteins. RUSC1, also called new molecule containing SH3 at the carboxy-terminus (NESCA), may acts as a signaling adapter that translocates to the nuclear envelope and regulates neurotrophin-induced neurite outgrowth. RUSC2, also called iporin, or interacting protein of Rab1, is a novel interacting molecule for the active GTP-bound conformation of Rab1. It may function as a link between the targeting of endoplasmic reticulum derived vesicles, triggered by the Rab1 GTPase and a signaling pathway regulated by molecules containing SH3 and/or poly-proline regions. This model contains the RUN domain of RUSC1 and RUSC2. — an NCBI CDD conserved domain (cd17685); members share this curated model.
