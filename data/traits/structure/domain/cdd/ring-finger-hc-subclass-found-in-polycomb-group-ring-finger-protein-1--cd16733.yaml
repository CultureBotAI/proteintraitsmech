identifier: CDD:cd16733
label: "RING finger, HC subclass, found in polycomb group RING finger protein 1 (PCGF1) and similar proteins. PCGF1, also known as nervous system Polycomb-1 (NSPc1) or RING finger protein 68 (RNF68), is one of six PcG RING finger (PCGF) homologs (PCGF1/NSPc1, PCGF2/Mel-18, PCGF3, PCGF4/BMI1, PCGF5, and PCGF6/MBLR). It serves as the core component of a noncanonical Polycomb repressive complex 1 (PRC1)-like BCOR complex that also contains RING1, RNF2, RYBP, SKP1, as well as the BCL6 co-repressor BCOR and the histone demethylase KDM2B, and is required to maintain the transcriptionally repressive state of some genes, such as Hox genes, BCL6 and the cyclin-dependent kinase inhibitor, CDKN1A. PCGF1 promotes cell cycle progression and enhances cell proliferation as well. It is a cell growth regulator that acts as a transcriptional repressor of p21Waf1/Cip1 via the retinoid acid response element (RARE element). Moreover, PCGF1 functions as an epigenetic regulator involved in hematopoietic cell differentiation. It cooperates with the transcription factor runt-related transcription factor 1 (Runx1) in regulating differentiation and self-renewal of hematopoietic cells. Furthermore, PCGF1 represents a physical and functional link between Polycomb function and pluripotency. PCGF1 contains a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in polycomb group RING finger protein 1 (PCGF1) and similar proteins. PCGF1, also known as nervous system Polycomb-1 (NSPc1) or RING finger protein 68 (RNF68), is one of six PcG RING finger (PCGF) homologs (PCGF1/NSPc1, PCGF2/Mel-18, PCGF3, PCGF4/BMI1, PCGF5, and PCGF6/MBLR). It serves as the core component of a noncanonical Polycomb repressive complex 1 (PRC1)-like BCOR complex that also contains RING1, RNF2, RYBP, SKP1, as well as the BCL6 co-repressor BCOR and the histone demethylase KDM2B, and is required to maintain the transcriptionally repressive state of some genes, such as Hox genes, BCL6 and the cyclin-dependent kinase inhibitor, CDKN1A. PCGF1 promotes cell cycle progression and enhances cell proliferation as well. It is a cell growth regulator that acts as a transcriptional repressor of p21Waf1/Cip1 via the retinoid acid response element (RARE element). Moreover, PCGF1 functions as an epigenetic regulator involved in hematopoietic cell differentiation. It cooperates with the transcription factor runt-related transcription factor 1 (Runx1) in regulating differentiation and self-renewal of hematopoietic cells. Furthermore, PCGF1 represents a physical and functional link between Polycomb function and pluripotency. PCGF1 contains a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16733); members share this curated model.
