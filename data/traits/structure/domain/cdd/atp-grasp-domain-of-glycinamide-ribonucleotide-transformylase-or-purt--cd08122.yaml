identifier: CDD:cd08122
label: "ATP-grasp domain of glycinamide ribonucleotide transformylase or PurT transformylase. ATP-grasp domain of glycinamide ribonucleotide (GAR) transformylase (PurT transformylase) catalyzes the formation of formylgycinamide ribonucleotide (FGAR) from GAR, ATP, and formate. This reaction occurs in the presence of Mg ions. PurT transformylase is a homodimer with each subunit containing 392 amino acid residues. It functions in the purine biosynthetic pathway. There are a total of four enzymes from purine biosynthetic pathway (PurD, PurT, PurK, PurP) that belong to the ATP-grasp superfamily."
definition: >-
