identifier: CDD:cd12032
label: "Src Homology 3 domain of Disks Large homolog 2. DLG2, also called postsynaptic density-93 (PSD93) or Channel-associated protein of synapse-110 (chapsyn 110), is a scaffolding protein that clusters at synapses and plays an important role in synaptic development and plasticity. The DLG2 delta isoform binds inwardly rectifying potassium Kir2 channels, which determine resting membrane potential in neurons. It regulates the spatial and temporal distribution of Kir2 channels within neuronal membranes. DLG2 is a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. DLG2 contains three PDZ domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Disks Large homolog 2. DLG2, also called postsynaptic density-93 (PSD93) or Channel-associated protein of synapse-110 (chapsyn 110), is a scaffolding protein that clusters at synapses and plays an important role in synaptic development and plasticity. The DLG2 delta isoform binds inwardly rectifying potassium Kir2 channels, which determine resting membrane potential in neurons. It regulates the spatial and temporal distribution of Kir2 channels within neuronal membranes. DLG2 is a member of the MAGUK (membrane-associated guanylate kinase) protein family, which is characterized by the presence of a core of three domains: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. DLG2 contains three PDZ domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12032); members share this curated model.
