label: "Major facilitator superfamily domain containing 13A. Human major facilitator superfamily domain containing 13A (MFSD1A) protein is also called transmembrane protein 180. Its function is still unknown. MFSD13A belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement"
definition: >-
  Major facilitator superfamily domain containing 13A. Human major facilitator superfamily domain containing 13A (MFSD1A) protein is also called transmembrane protein 180. Its function is still unknown. MFSD13A belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement — an NCBI CDD conserved domain (cd17481); members share this curated model.
