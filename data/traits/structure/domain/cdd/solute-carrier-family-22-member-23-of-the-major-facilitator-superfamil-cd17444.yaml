identifier: CDD:cd17444
label: "Solute carrier family 22, member 23 of the Major Facilitator Superfamily. Solute carrier family 22, member 23 (SLC22A23) is an orphan member of the SLC22 family of organic cation/anion/zwitterion transporters, which includes organic cation transporters (OCTs/OCTNs) and organic anion transporters (OATs). It is abundantly expressed in brain and is also found in liver. Single-nucleotide polymorphisms in SLC22A23 are associated with inflammatory bowel disease (IBD) in a Canadian white population. SLC22 transporters interact with a variety of compounds that include drugs of abuse, environmental toxins, opioid analgesics, antidepressant and anxiolytic agents, and neurotransmitters and their metabolites. SLC22A23 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
