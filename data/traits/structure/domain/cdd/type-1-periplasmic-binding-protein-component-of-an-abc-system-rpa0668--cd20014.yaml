identifier: CDD:cd20014
label: "type 1 periplasmic binding-protein component of an ABC system (RPA0668), involved in in the active transport of lignin-derived benzoate derivative compounds, and its close homologs. This group includes RPA0668 from Rhodopseudomonas palustris and its close homologs in other bacteria. Rpa0668 is the periplasmic binding-protein component of an ABC system that is involved in the active transport of lignin-derived benzoate derivative compounds. Members of this group has high sequence similarity to members of the family of hydrophobic amino acid transporters (HAAT), such as leucine-isoleucine-valine binding protein (LIVBP)."
definition: >-
