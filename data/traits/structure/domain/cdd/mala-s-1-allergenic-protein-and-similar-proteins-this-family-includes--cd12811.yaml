identifier: CDD:cd12811
label: "Mala s 1 allergenic protein and similar proteins. This family includes the yeast Malassezia sympodialis allergen Mala s 1 which is localized in the cell wall and exposed on the cell surface. It can elicit specific IgE and T-cell activity in patients with atopic eczema (AE), a chronic inflammatory disease. Mala s 1 does not show any significant sequence homology to characterized proteins. However, its structure is a beta-propeller which is a novel fold among allergens."
definition: >-
  Mala s 1 allergenic protein and similar proteins. This family includes the yeast Malassezia sympodialis allergen Mala s 1 which is localized in the cell wall and exposed on the cell surface. It can elicit specific IgE and T-cell activity in patients with atopic eczema (AE), a chronic inflammatory disease. Mala s 1 does not show any significant sequence homology to characterized proteins. However, its structure is a beta-propeller which is a novel fold among allergens. — an NCBI CDD conserved domain (cd12811); members share this curated model.
