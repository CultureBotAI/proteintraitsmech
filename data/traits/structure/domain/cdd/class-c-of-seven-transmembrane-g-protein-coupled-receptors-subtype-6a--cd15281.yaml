identifier: CDD:cd15281
label: "class C of seven-transmembrane G protein-coupled receptors, subtype 6A. GRPC6A (GPCR, class C, group 6, subtype A) is a widely expressed amino acid-sensing GPCR that is most closely related to CaSR.  GPRC6A is most potently activated by the basic amino acids L-arginine, L-lysine, and L-ornithine and less potently by small aliphatic amino acids. Moreover, the receptor can be either activated or modulated by divalent cations such as Ca2+ and Mg2+. GPRC6A is expressed in the testis, but not the ovary and specifically also binds to the osteoblast-derived hormone osteocalcin (OCN), which regulates testosterone production by the testis and male fertility independently of the hypothalamic-pituitary axis. Furthermore, GPRC6A knockout studies suggest that GRPC6A is involved in regulation of bone metabolism, male reproduction, energy homeostasis, glucose metabolism, and in activation of inflammation response, as well as prostate cancer growth and progression, among others. GPRC6A has been suggested to couple to the Gq subtype of G proteins, leading to IP3 production and intracellular calcium mobilization. GPRC6A contains a large extracellular Venus flytrap-like domain in the N-terminus, cysteine-rich domain (CRD), and seven-transmembrane (7TM) domain, which are characteristics of the class C GPCRs.  The Venus flytrap-like domain shares strong sequence homology to bacterial periplasmic binding proteins and possess the orthosteric amino acid and calcium binding sites for members of the class C, including CaSR, GABA-B, GPRC6A, mGlu, and TAS1R receptors."
definition: >-
  class C of seven-transmembrane G protein-coupled receptors, subtype 6A. GRPC6A (GPCR, class C, group 6, subtype A) is a widely expressed amino acid-sensing GPCR that is most closely related to CaSR. GPRC6A is most potently activated by the basic amino acids L-arginine, L-lysine, and L-ornithine and less potently by small aliphatic amino acids. Moreover, the receptor can be either activated or modulated by divalent cations such as Ca2+ and Mg2+. GPRC6A is expressed in the testis, but not the ovary and specifically also binds to the osteoblast-derived hormone osteocalcin (OCN), which regulates testosterone production by the testis and male fertility independently of the hypothalamic-pituitary axis. Furthermore, GPRC6A knockout studies suggest that GRPC6A is involved in regulation of bone metabolism, male reproduction, energy homeostasis, glucose metabolism, and in activation of inflammation response, as well as prostate cancer growth and progression, among others. GPRC6A has been suggested to couple to the Gq subtype of G proteins, leading to IP3 production and intracellular calcium mobilization. GPRC6A contains a large extracellular Venus flytrap-like domain in the N-terminus, cysteine-rich domain (CRD), and seven-transmembrane (7TM) domain, which are characteristics of the class C GPCRs. The Venus flytrap-like domain shares strong sequence homology to bacterial periplasmic binding proteins and possess the orthosteric amino acid and calcium binding sites for members of the class C, including CaSR, GABA-B, GPRC6A, mGlu, and TAS1R receptors. — an NCBI CDD conserved domain (cd15281); members share this curated model.
