identifier: CDD:cd12890
label: "PRY/SPRY domain in tripartite motif-containing protein 16 (TRIM16). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM16 and TRIM-like proteins. TRIM16 (also known as estrogen-responsive B box protein or EBBP) does not possess a RING domain like the other TRIM proteins, but contains two B-box domains and can heterodimerize with other TRIM proteins such as TRIM24, Promyelocytic leukemia (PML) protein and Midline-1 (MID1 or TRIM18). It is a regulator of keratinocyte differentiation and a tumor suppressor in retinoid-sensitive neuroblastoma. It has been shown that loss of TRIM16 expression plays an important role in the development of cutaneous squamous cell carcinoma (SCC) and is a determinant of retinoid sensitivity. TRIM16 also has E3 ubiquitin ligase activity."
definition: >-
