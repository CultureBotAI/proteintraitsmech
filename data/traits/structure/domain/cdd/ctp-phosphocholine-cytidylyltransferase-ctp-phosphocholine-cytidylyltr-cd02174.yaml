identifier: CDD:cd02174
label: "CTP:phosphocholine cytidylyltransferase. CTP:phosphocholine cytidylyltransferase (CCT) catalyzes the condensation of CTP and phosphocholine to form CDP-choline as the rate-limiting and regulatory step in the CDP-choline pathway. CCT is unique in that its enzymatic activity is regulated by the extent of its association with membrane structures. A current model posts that the elastic stress of the bilayer curvature is sensed by CCT and this governs the degree of membrane association, thus providing a mechanism for both positive and negative regulation of activity."
definition: >-
  CTP:phosphocholine cytidylyltransferase. CTP:phosphocholine cytidylyltransferase (CCT) catalyzes the condensation of CTP and phosphocholine to form CDP-choline as the rate-limiting and regulatory step in the CDP-choline pathway. CCT is unique in that its enzymatic activity is regulated by the extent of its association with membrane structures. A current model posts that the elastic stress of the bilayer curvature is sensed by CCT and this governs the degree of membrane association, thus providing a mechanism for both positive and negative regulation of activity. — an NCBI CDD conserved domain (cd02174); members share this curated model.
