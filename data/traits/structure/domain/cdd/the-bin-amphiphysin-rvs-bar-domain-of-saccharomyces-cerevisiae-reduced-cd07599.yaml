identifier: CDD:cd07599
label: "The Bin/Amphiphysin/Rvs (BAR) domain of Saccharomyces cerevisiae Reduced viability upon starvation protein 167 and similar proteins. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. This subfamily is composed of fungal proteins with similarity to Saccharomyces cerevisiae Reduced viability upon starvation protein 167 (Rvs167p) and Schizosaccharomyces pombe Hob1 (homolog of Bin1). S. cerevisiae Rvs167p plays a role in regulation of the actin cytoskeleton, endocytosis, and sporulation. It forms a heterodimer with another BAR domain protein Rvs161p. Rvs161p and Rvs167p share common functions but are not interchangeable. Their BAR domains cannot be replaced with each other and the overexpression of one cannot suppress the mutant phenotypes of the other. Rvs167p also interacts with the GTPase activating protein (GAP) Gyp5p, which is involved in ER to Golgi vesicle trafficking. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of Saccharomyces cerevisiae Reduced viability upon starvation protein 167 and similar proteins. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. This subfamily is composed of fungal proteins with similarity to Saccharomyces cerevisiae Reduced viability upon starvation protein 167 (Rvs167p) and Schizosaccharomyces pombe Hob1 (homolog of Bin1). S. cerevisiae Rvs167p plays a role in regulation of the actin cytoskeleton, endocytosis, and sporulation. It forms a heterodimer with another BAR domain protein Rvs161p. Rvs161p and Rvs167p share common functions but are not interchangeable. Their BAR domains cannot be replaced with each other and the overexpression of one cannot suppress the mutant phenotypes of the other. Rvs167p also interacts with the GTPase activating protein (GAP) Gyp5p, which is involved in ER to Golgi vesicle trafficking. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. — an NCBI CDD conserved domain (cd07599); members share this curated model.
