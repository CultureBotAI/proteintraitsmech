identifier: CDD:cd04660
label: "nsLTP_like: Non-specific lipid-transfer protein (nsLTP)-like subfamily; composed of predominantly uncharacterized proteins with similarity to nsLTPs, including Medicago truncatula MtN5, the root-specific Phaseolus vulgaris PVR3, Antirrhinum majus FIL1, and Lilium longiflorum LIM3. Plant nsLTPs are small, soluble proteins that facilitate the transfer of fatty acids, phospholipids, glycolipids, and steroids between membranes. The MtN5 gene is induced during root nodule development. FIL1 is thought to be important in petal and stamen formation. The LIM3 gene is induced during the early prophase stage of meiosis in lily microsporocytes."
definition: >-
  nsLTP_like: Non-specific lipid-transfer protein (nsLTP)-like subfamily; composed of predominantly uncharacterized proteins with similarity to nsLTPs, including Medicago truncatula MtN5, the root-specific Phaseolus vulgaris PVR3, Antirrhinum majus FIL1, and Lilium longiflorum LIM3. Plant nsLTPs are small, soluble proteins that facilitate the transfer of fatty acids, phospholipids, glycolipids, and steroids between membranes. The MtN5 gene is induced during root nodule development. FIL1 is thought to be important in petal and stamen formation. The LIM3 gene is induced during the early prophase stage of meiosis in lily microsporocytes. — an NCBI CDD conserved domain (cd04660); members share this curated model.
