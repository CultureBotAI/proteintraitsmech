identifier: CDD:cd12788
label: "Ras-GTPase Activating Domain of plexin-D1. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. Plexins are divided into four types (A-D) according to sequence similarity. Plexin-D1 has been identified as the receptor of Sema3E. It binds to Sema3E directly with high affinity. Sema3E is implicated in axonal path finding and inhibition of developmental and postischemic angiogenesis. Plexin-D1 is broadly expressed on tumor vessels and tumor cells in a number of different types of human tumors. The Plexin-D1 and Sema3E interaction inhibits tumor growth but promotes invasiveness and metastasis. Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator."
definition: >-
  Ras-GTPase Activating Domain of plexin-D1. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. Plexins are divided into four types (A-D) according to sequence similarity. Plexin-D1 has been identified as the receptor of Sema3E. It binds to Sema3E directly with high affinity. Sema3E is implicated in axonal path finding and inhibition of developmental and postischemic angiogenesis. Plexin-D1 is broadly expressed on tumor vessels and tumor cells in a number of different types of human tumors. The Plexin-D1 and Sema3E interaction inhibits tumor growth but promotes invasiveness and metastasis. Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator. — an NCBI CDD conserved domain (cd12788); members share this curated model.
