identifier: CDD:cd16215
label: "1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma-2. PI-PLC-gamma2, also termed 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma-2, or phospholipase C-IV (PLC-IV), or phospholipase C-gamma-2 (PLC-gamma-2), is highly expressed in cells of hematopoietic origin. It has been implicated in cell motility important to invasion and dissemination of tumor cells. As an important component of the B cell receptor (BCR) signaling pathway, PI-PLC-gamma2 is required for efficient formation of germinal center (GC) and memory B cells. It works as a critical effector stimulating the increase of intracellular Ca2+ and activates various signaling pathways downstream of the BCR. Moreover, PI-PLC-gamma2 has been implicated in Fc receptor-mediated degranulation of mast cells, integrin signaling in platelets, as well as integrin and Fc receptor-mediated neutrophil functions. It also acts as a crucial signaling mediator modifying DC gene expression program to activate DC responses to beta-glucan-containing pathogens. PI-PLC-gamma2 contains an N-terminal pleckstrin homology (PH) domain, an array of EF hands, a PLC catalytic core domain, and a C2 domain. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. Besides, PI-PLC-gamma2 has a second PH domain, two SH2 (Src homology 2) regions, and one SH3 (Src homology 3) region, which are present within this linker. PI-PLC-gamma2 is activated by receptor and non-receptor tyrosine kinases via its two SH2 and a single SH3 domain. Unlike PI-PLC-gamma1, the activation of PI-PLC-gamma2 may require concurrent stimulation of PI 3-kinase."
definition: >-
  1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma-2. PI-PLC-gamma2, also termed 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma-2, or phospholipase C-IV (PLC-IV), or phospholipase C-gamma-2 (PLC-gamma-2), is highly expressed in cells of hematopoietic origin. It has been implicated in cell motility important to invasion and dissemination of tumor cells. As an important component of the B cell receptor (BCR) signaling pathway, PI-PLC-gamma2 is required for efficient formation of germinal center (GC) and memory B cells. It works as a critical effector stimulating the increase of intracellular Ca2+ and activates various signaling pathways downstream of the BCR. Moreover, PI-PLC-gamma2 has been implicated in Fc receptor-mediated degranulation of mast cells, integrin signaling in platelets, as well as integrin and Fc receptor-mediated neutrophil functions. It also acts as a crucial signaling mediator modifying DC gene expression program to activate DC responses to beta-glucan-containing pathogens. PI-PLC-gamma2 contains an N-terminal pleckstrin homology (PH) domain, an array of EF hands, a PLC catalytic core domain, and a C2 domain. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. Besides, PI-PLC-gamma2 has a second PH domain, two SH2 (Src homology 2) regions, and one SH3 (Src homology 3) region, which are present within this linker. PI-PLC-gamma2 is activated by receptor and non-receptor tyrosine kinases via its two SH2 and a single SH3 domain. Unlike PI-PLC-gamma1, the activation of PI-PLC-gamma2 may require concurrent stimulation of PI 3-kinase. — an NCBI CDD conserved domain (cd16215); members share this curated model.
