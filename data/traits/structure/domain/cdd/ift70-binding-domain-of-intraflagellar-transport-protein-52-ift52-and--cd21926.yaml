identifier: CDD:cd21926
label: "IFT70-binding domain of intraflagellar transport protein 52 (IFT52) and similar proteins. IFT52, also called protein NGD5 homolog, is involved in ciliogenesis as part of a complex involved in intraflagellar transport (IFT), the bi-directional movement of particles required for the assembly, maintenance and functioning of primary cilia. It is required for the anterograde transport of IFT88. The model corresponds to IFT70-binding domain of IFT52."
definition: >-
  IFT70-binding domain of intraflagellar transport protein 52 (IFT52) and similar proteins. IFT52, also called protein NGD5 homolog, is involved in ciliogenesis as part of a complex involved in intraflagellar transport (IFT), the bi-directional movement of particles required for the assembly, maintenance and functioning of primary cilia. It is required for the anterograde transport of IFT88. The model corresponds to IFT70-binding domain of IFT52. — an NCBI CDD conserved domain (cd21926); members share this curated model.
