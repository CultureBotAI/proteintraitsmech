identifier: CDD:cd16265
label: "Proteins related to domain II of EF-Tu and related translation factors. Elongation factor Tu consists of three structural domains; this family represents single domain proteins that are related to the second domain of EF-Tu. Domain II of EF-Tu adopts a beta barrel structure and is involved in binding to charged tRNA. Domain II is also found in other proteins such as elongation factor G and translation initiation factor IF-2."
definition: >-
  Proteins related to domain II of EF-Tu and related translation factors. Elongation factor Tu consists of three structural domains; this family represents single domain proteins that are related to the second domain of EF-Tu. Domain II of EF-Tu adopts a beta barrel structure and is involved in binding to charged tRNA. Domain II is also found in other proteins such as elongation factor G and translation initiation factor IF-2. — an NCBI CDD conserved domain (cd16265); members share this curated model.
