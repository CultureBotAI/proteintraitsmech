identifier: CDD:cd04707
label: "otoconin_90: Phospholipase A2-like domains present in otoconin-90 and otoconin-95, mammal proteins that are principal matrix proteins of calcitic otoconia. Interactions involving otoconin-90 may trigger or constitute key events in otoconia formation. The PLA2-like domains in otoconins may have lost their metal-binding sites."
