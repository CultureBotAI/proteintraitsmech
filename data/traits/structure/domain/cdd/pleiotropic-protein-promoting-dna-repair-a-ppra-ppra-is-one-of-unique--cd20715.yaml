identifier: CDD:cd20715
label: "Pleiotropic protein promoting DNA repair A (PprA). PprA is one of unique double-strand breaks (DSBs) repair proteins to the genus Deinococcus which is facilitating the extreme radiation resistance damage. The site-directed mutational analysis of PprA identified essential basic amino acids for DNA binding. Therefore, complex assembly of PprA molecules surrounds the damaged DNA strand of genus Deinococcus and guide its DNA strands for efficient DNA repairs."
definition: >-
  Pleiotropic protein promoting DNA repair A (PprA). PprA is one of unique double-strand breaks (DSBs) repair proteins to the genus Deinococcus which is facilitating the extreme radiation resistance damage. The site-directed mutational analysis of PprA identified essential basic amino acids for DNA binding. Therefore, complex assembly of PprA molecules surrounds the damaged DNA strand of genus Deinococcus and guide its DNA strands for efficient DNA repairs. — an NCBI CDD conserved domain (cd20715); members share this curated model.
