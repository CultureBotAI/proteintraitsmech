identifier: CDD:cd21070
label: "extracytosolic/lumenal domain (ELD) found in transient receptor potential channel mucolipin 1 (TRPML1). TRPML1, also called mucolipin-1 (ML1), or MG-2, or Mucolipidin, may play a major role in Ca(2+) release from late endosome and lysosome vesicles to the cytoplasm, which is important for many lysosome-dependent cellular events, including the fusion and trafficking of these organelles, exocytosis and autophagy. The model corresponds to extracytosolic/lumenal domain (ELD), a linker located between the first two transmembrane segments (S1 and S2) of TRPML1. It forms a tight tetramer that is crucial for full-length TRPML1 assembly and localization."
definition: >-
  extracytosolic/lumenal domain (ELD) found in transient receptor potential channel mucolipin 1 (TRPML1). TRPML1, also called mucolipin-1 (ML1), or MG-2, or Mucolipidin, may play a major role in Ca(2+) release from late endosome and lysosome vesicles to the cytoplasm, which is important for many lysosome-dependent cellular events, including the fusion and trafficking of these organelles, exocytosis and autophagy. The model corresponds to extracytosolic/lumenal domain (ELD), a linker located between the first two transmembrane segments (S1 and S2) of TRPML1. It forms a tight tetramer that is crucial for full-length TRPML1 assembly and localization. — an NCBI CDD conserved domain (cd21070); members share this curated model.
