identifier: CDD:cd05408
label: "Nucleotidyltransferase (NT) domain of human mitochondrial CCA-adding enzyme, ClassII and related proteins. NT_hCCAase_like:  Human mitochondrial CCA-adding enzyme [ATP (CTP): tRNA nucleotidyltransferase, hCCAase]-like, class II. CCAase in a template-independent reaction adds the precise sequence [cytidine(C)-cytidine-adenosine (A)], one nucleotide at a time, onto the 3prime end of tRNA. The class II group of CCAase enzymes is comprised mainly of eubacterial and eukaryotic enzymes. This subgroup of ClassII CCAases includes proteins similar to the mitochondrial hCCAase. A single catalytic pocket appears to recognize both ATP and CTP substrates. hCAAase exists as a dimer in solution. Class II CCAases are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group."
