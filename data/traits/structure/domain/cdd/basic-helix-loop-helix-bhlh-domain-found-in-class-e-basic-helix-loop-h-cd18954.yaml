identifier: CDD:cd18954
label: "basic helix-loop-helix (bHLH) domain found in Class E basic helix-loop-helix protein 22 (bHLHe22) and similar proteins. bHLHe22, also termed Class B basic helix-loop-helix protein 5 (bHLHb5), or trinucleotide repeat-containing gene 20 protein, is an OLIG-related bHLH neural-specific transcriptional repressor that is expressed in both excitatory (unipolar brush cells) and inhibitory neurons (cartwheel cells) of the dorsal cochlear nucleus (DCN) during development. It is important for the proper development and/or survival of a number of neural cell types."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Class E basic helix-loop-helix protein 22 (bHLHe22) and similar proteins. bHLHe22, also termed Class B basic helix-loop-helix protein 5 (bHLHb5), or trinucleotide repeat-containing gene 20 protein, is an OLIG-related bHLH neural-specific transcriptional repressor that is expressed in both excitatory (unipolar brush cells) and inhibitory neurons (cartwheel cells) of the dorsal cochlear nucleus (DCN) during development. It is important for the proper development and/or survival of a number of neural cell types. — an NCBI CDD conserved domain (cd18954); members share this curated model.
