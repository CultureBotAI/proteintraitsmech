identifier: CDD:cd02228
label: "Clostridium difficile EutQ and related proteins, cupin domain. This family includes bacterial and fungal proteins homologous to ethanolamine utilization protein EutQ found in Clostridium difficile, as well as in other bacteria, including the enteric pathogens Salmonella enterica and Enterococcus faecalis. EutQ is encoded by the eutQ gene which is part of the eut (ethanolamine utilization) operon found to be essential during anoxic growth of S. enterica on ethanolamine and tetrathionate. In C. difficile, inability to utilize ethanolamine results in greater virulence and a shorter time to morbidity in the animal model, suggesting that, in contrast to other intestinal pathogens, the metabolism of ethanolamine can delay the onset of disease. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization. In contrast to the metal-binding catalytic cupins, the EutQ family does not possess the histidine residues that are responsible for metal coordination in the oxidoreductase and epimerase classes of cupins."
definition: >-
  Clostridium difficile EutQ and related proteins, cupin domain. This family includes bacterial and fungal proteins homologous to ethanolamine utilization protein EutQ found in Clostridium difficile, as well as in other bacteria, including the enteric pathogens Salmonella enterica and Enterococcus faecalis. EutQ is encoded by the eutQ gene which is part of the eut (ethanolamine utilization) operon found to be essential during anoxic growth of S. enterica on ethanolamine and tetrathionate. In C. difficile, inability to utilize ethanolamine results in greater virulence and a shorter time to morbidity in the animal model, suggesting that, in contrast to other intestinal pathogens, the metabolism of ethanolamine can delay the onset of disease. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. In contrast to the metal-binding catalytic cupins, the EutQ family does not possess the histidine residues that are responsible for metal coordination in the oxidoreductase and epimerase classes of cupins. — an NCBI CDD conserved domain (cd02228); members share this curated model.
