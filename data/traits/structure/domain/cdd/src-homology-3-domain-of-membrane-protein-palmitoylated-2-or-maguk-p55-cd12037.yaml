identifier: CDD:cd12037
label: "Src Homology 3 domain of Membrane Protein, Palmitoylated 2 (or MAGUK p55 subfamily member 2). MPP2 is a scaffolding protein that interacts with the non-receptor tyrosine kinase c-Src in epithelial cells to negatively regulate its activity and morphological function. It is one of seven vertebrate homologs of the Drosophila Stardust protein, which is required in establishing cell polarity, and it contains two L27 domains followed by the core of three domains characteristic of MAGUK (membrane-associated guanylate kinase) proteins: PDZ, SH3, and guanylate kinase (GuK). In addition, it also contains the Hook (Protein 4.1 Binding) motif in between the SH3 and GuK domains. The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Membrane Protein, Palmitoylated 2 (or MAGUK p55 subfamily member 2). MPP2 is a scaffolding protein that interacts with the non-receptor tyrosine kinase c-Src in epithelial cells to negatively regulate its activity and morphological function. It is one of seven vertebrate homologs of the Drosophila Stardust protein, which is required in establishing cell polarity, and it contains two L27 domains followed by the core of three domains characteristic of MAGUK (membrane-associated guanylate kinase) proteins: PDZ, SH3, and guanylate kinase (GuK). In addition, it also contains the Hook (Protein 4.1 Binding) motif in between the SH3 and GuK domains. The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12037); members share this curated model.
