identifier: CDD:cd13418
label: "Tumor necrosis factor receptor superfamily member 19 (TNFRSF19), also known as TROY. TNFRSF19 (also known as TAJ; TROY; TRADE; TAJ-alpha) is expressed in progenitor cells of the hippocampus, thalamus, and cerebral cortex and highly expressed during embryonic development. It has been shown to interact with TRAF family members, and to activate JNK signaling pathway when overexpressed in cells. It is frequently overexpressed in colorectal cancer cell lines and primary colorectal carcinomas. TNFRSF19 is a beta-catenin target gene, in mesenchymal stem cells, and also activates NF-kappaB signaling, showing that beta-catenin regulates NF-kappaB activity via TNFRSF19.  Since Wnt/beta-catenin signaling plays a crucial role in the regulation of colon tissue regeneration and the development of colon tumors, TNFRSF19 may contribute to the development of colorectal tumors. These findings define a role for death receptors DR6 and TROY in CNS-specific vascular development. TNFRSF19 has been shown to promote glioblastoma (GBM) survival signaling and therefore targeting it may increase tumor vulnerability and improve therapeutic response in glioblastoma. It may play an important role in myelin-associated inhibitory factors (MAIFs)-induced inhibition of neurite outgrowth in the postnatal central nervous system (CNS) or on axon regeneration following CNS injury."
definition: >-
  Tumor necrosis factor receptor superfamily member 19 (TNFRSF19), also known as TROY. TNFRSF19 (also known as TAJ; TROY; TRADE; TAJ-alpha) is expressed in progenitor cells of the hippocampus, thalamus, and cerebral cortex and highly expressed during embryonic development. It has been shown to interact with TRAF family members, and to activate JNK signaling pathway when overexpressed in cells. It is frequently overexpressed in colorectal cancer cell lines and primary colorectal carcinomas. TNFRSF19 is a beta-catenin target gene, in mesenchymal stem cells, and also activates NF-kappaB signaling, showing that beta-catenin regulates NF-kappaB activity via TNFRSF19. Since Wnt/beta-catenin signaling plays a crucial role in the regulation of colon tissue regeneration and the development of colon tumors, TNFRSF19 may contribute to the development of colorectal tumors. These findings define a role for death receptors DR6 and TROY in CNS-specific vascular development. TNFRSF19 has been shown to promote glioblastoma (GBM) survival signaling and therefore targeting it may increase tumor vulnerability and improve therapeutic response in glioblastoma. It may play an important role in myelin-associated inhibitory factors (MAIFs)-induced inhibition of neurite outgrowth in the postnatal central nervous system (CNS) or on axon regeneration following CNS injury. — an NCBI CDD conserved domain (cd13418); members share this curated model.
