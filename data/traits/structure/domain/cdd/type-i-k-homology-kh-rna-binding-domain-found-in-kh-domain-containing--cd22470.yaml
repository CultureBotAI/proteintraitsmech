identifier: CDD:cd22470
label: "type I K homology (KH) RNA-binding domain found in KH domain-containing, RNA-binding, signal transduction-associated protein 3 (KHDRBS3) and similar proteins. KHDRBS3, also called RNA-binding protein T-Star, or Sam68-like mammalian protein 2, or SLM-2, or Sam68-like phosphotyrosine protein, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds optimally to RNA containing 5'-[AU]UAA-3' as a bipartite motif spaced by more than 15 nucleotides. It also binds poly(A). KHDRBS3 may play a role as a negative regulator of cell growth."
definition: >-
  type I K homology (KH) RNA-binding domain found in KH domain-containing, RNA-binding, signal transduction-associated protein 3 (KHDRBS3) and similar proteins. KHDRBS3, also called RNA-binding protein T-Star, or Sam68-like mammalian protein 2, or SLM-2, or Sam68-like phosphotyrosine protein, is an RNA-binding protein that plays a role in the regulation of alternative splicing and influences mRNA splice site selection and exon inclusion. It binds optimally to RNA containing 5'-[AU]UAA-3' as a bipartite motif spaced by more than 15 nucleotides. It also binds poly(A). KHDRBS3 may play a role as a negative regulator of cell growth. — an NCBI CDD conserved domain (cd22470); members share this curated model.
