identifier: CDD:cd17756
label: "DNA replication licensing factor Mcm5. Mcm5 is a helicase that play an important role in replication. It is part of the heterohexameric ring-shaped Mcm2-7 complex, which is part of the replicative helicase that unwinds parental double-stranded DNA at a replication fork to provide single-stranded DNA templates for the replicative polymerases."
definition: >-
  DNA replication licensing factor Mcm5. Mcm5 is a helicase that play an important role in replication. It is part of the heterohexameric ring-shaped Mcm2-7 complex, which is part of the replicative helicase that unwinds parental double-stranded DNA at a replication fork to provide single-stranded DNA templates for the replicative polymerases. — an NCBI CDD conserved domain (cd17756); members share this curated model.
