identifier: CDD:cd10839
label: "circularly permuted first PDZ domain (PDZ1) of Escherichia coli periplasmic serine endoprotease DegP and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of Escherichia coli DegP (also known as heat shock protein DegP and Protease Do) and related domains. DegP belongs to the HtrA family of housekeeping proteases. It acts as a protease, degrading transiently denatured and unfolded or misfolded proteins which accumulate in the periplasm following heat shock or other stress conditions, and as a molecular chaperone at low temperatures. DegP has two PDZ domains in addition to the protease domain; its PDZ1 domain is responsible for identifying the distinct substrate sequences that affect degradation (degron) of the substrate sequence, and its PDZ2 domain is responsible for combining with other DegP monomers to form a stable oligomer structure. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E,  alpha-helix 2 and beta-strand F. This DegP family PDZ domain 1 is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus."
definition: >-
  circularly permuted first PDZ domain (PDZ1) of Escherichia coli periplasmic serine endoprotease DegP and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of Escherichia coli DegP (also known as heat shock protein DegP and Protease Do) and related domains. DegP belongs to the HtrA family of housekeeping proteases. It acts as a protease, degrading transiently denatured and unfolded or misfolded proteins which accumulate in the periplasm following heat shock or other stress conditions, and as a molecular chaperone at low temperatures. DegP has two PDZ domains in addition to the protease domain; its PDZ1 domain is responsible for identifying the distinct substrate sequences that affect degradation (degron) of the substrate sequence, and its PDZ2 domain is responsible for combining with other DegP monomers to form a stable oligomer structure. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This DegP family PDZ domain 1 is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus. — an NCBI CDD conserved domain (cd10839); members share this curated model.
