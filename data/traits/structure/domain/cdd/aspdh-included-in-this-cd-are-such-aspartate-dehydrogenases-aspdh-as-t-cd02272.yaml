identifier: CDD:cd02272
label: "AspDH. Included in this CD are such aspartate dehydrogenases (AspDH) as the Thermotoga maritima TM1643 which is proposed to catalyze the first step in NAD biosynthesis; and similar proteins. TM1643 is the first gene of the Nad operon in T. maritime; its gene product is proposed to be an NAD(P)+-dependent oxidoreductase, a dehydrogenase strictly specific for L-aspartate. Structural and functional studies suggest that TM1643 catalyzes the first reaction of de novo biosynthesis of NAD from aspartate, and it produces iminoaspartate required for this pathway. Members of this CD contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and are member of the NADB_G3PDH superfamily of proteins."
definition: >-
  AspDH. Included in this CD are such aspartate dehydrogenases (AspDH) as the Thermotoga maritima TM1643 which is proposed to catalyze the first step in NAD biosynthesis; and similar proteins. TM1643 is the first gene of the Nad operon in T. maritime; its gene product is proposed to be an NAD(P)+-dependent oxidoreductase, a dehydrogenase strictly specific for L-aspartate. Structural and functional studies suggest that TM1643 catalyzes the first reaction of de novo biosynthesis of NAD from aspartate, and it produces iminoaspartate required for this pathway. Members of this CD contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and are member of the NADB_G3PDH superfamily of proteins. — an NCBI CDD conserved domain (cd02272); members share this curated model.
