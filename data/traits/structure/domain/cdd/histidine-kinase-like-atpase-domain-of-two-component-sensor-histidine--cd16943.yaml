identifier: CDD:cd16943
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli K-12 AtoS. This family includes the histidine kinase-like ATPase (HATPase) domains of various histidine kinases (HKs) of two-component signal transduction systems (TCSs) such as Escherichia coli AtoS, an HK of the AtoS-AtoC TCS. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some have accessory domains such as HAMP or PAS sensor domains or CBS-pair domains."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli K-12 AtoS. This family includes the histidine kinase-like ATPase (HATPase) domains of various histidine kinases (HKs) of two-component signal transduction systems (TCSs) such as Escherichia coli AtoS, an HK of the AtoS-AtoC TCS. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some have accessory domains such as HAMP or PAS sensor domains or CBS-pair domains. — an NCBI CDD conserved domain (cd16943); members share this curated model.
