identifier: CDD:cd22247
label: "winged-helix domain (WHD) found in minichromosome maintenance 8 (MCM8) and similar proteins. MCM8 is a DNA helicase that is a component of the MCM8-MCM9 complex, which is involved in the repair of double-stranded DNA breaks (DBSs) and DNA interstrand cross-links (ICLs) by homologous recombination (HR). The MCM8-MCM9 complex is also required for DNA resection by the MRE11-RAD50-NBN/NBS1 (MRN) complex by recruiting the MRN complex to the repair site and by promoting its nuclease activity. This model corresponds to the C-terminal winged-helix domain (WHD) of MCM8, which mediates protein-nucleic acid interaction, as well as protein-protein interaction."
definition: >-
  winged-helix domain (WHD) found in minichromosome maintenance 8 (MCM8) and similar proteins. MCM8 is a DNA helicase that is a component of the MCM8-MCM9 complex, which is involved in the repair of double-stranded DNA breaks (DBSs) and DNA interstrand cross-links (ICLs) by homologous recombination (HR). The MCM8-MCM9 complex is also required for DNA resection by the MRE11-RAD50-NBN/NBS1 (MRN) complex by recruiting the MRN complex to the repair site and by promoting its nuclease activity. This model corresponds to the C-terminal winged-helix domain (WHD) of MCM8, which mediates protein-nucleic acid interaction, as well as protein-protein interaction. — an NCBI CDD conserved domain (cd22247); members share this curated model.
