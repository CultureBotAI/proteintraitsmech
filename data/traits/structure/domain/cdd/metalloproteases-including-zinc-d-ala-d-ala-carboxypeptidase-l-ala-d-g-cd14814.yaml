identifier: CDD:cd14814
label: "Metalloproteases including zinc D-Ala-D-Ala carboxypeptidase, L-Ala-D-Glu peptidase, L,D-carboxypeptidase, bacteriophage endolysins, and related proteins. This family summarizes zinc-binding metallopeptidases which are mostly carboxypeptidases and dipeptidases, and includes zinc-dependent D-Ala-D-Ala carboxypeptidases, VanX, L-Ala-D-Glu peptidase, L,D-carboxypeptidase and bacteriophage endolysins, amongst other family members. These peptidases belong to MEROPS family M15 which are involved in bacterial cell wall biosynthesis and metabolism."
definition: >-
  Metalloproteases including zinc D-Ala-D-Ala carboxypeptidase, L-Ala-D-Glu peptidase, L,D-carboxypeptidase, bacteriophage endolysins, and related proteins. This family summarizes zinc-binding metallopeptidases which are mostly carboxypeptidases and dipeptidases, and includes zinc-dependent D-Ala-D-Ala carboxypeptidases, VanX, L-Ala-D-Glu peptidase, L,D-carboxypeptidase and bacteriophage endolysins, amongst other family members. These peptidases belong to MEROPS family M15 which are involved in bacterial cell wall biosynthesis and metabolism. — an NCBI CDD conserved domain (cd14814); members share this curated model.
