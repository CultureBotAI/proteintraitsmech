identifier: CDD:cd23399
label: "Arabinose-binding domain (ABD), beta-trefoil fold, found in alpha-L-arabinofuranosidase B (ABF B) and similar proteins. Alpha-L-arabinofuranosidase (EC 3.2.1.55), also called ABF, or non-reducing end alpha-L-arabinofuranosidase, or arabinofuranosidase, or arabinosidase, is involved in the degradation of arabinoxylan, a major component of plant hemicellulose. It can hydrolyze 1,5-, 1,3- and 1,2-alpha-linkages not only in L-arabinofuranosyl oligosaccharides, but also in polysaccharides containing terminal non-reducing L-arabinofuranoses in side chains, like L-arabinan, arabinogalactan and arabinoxylan. ABF belongs to the glycosyl hydrolase 54 family. The family also includes Hungateiclostridium thermocellum anti-sigma-I factor RsgI5. It negatively regulates SigI5 activity through direct interaction. Binding of the polysaccharide substrate to the extracellular C-terminal sensing domain of RsgI5 may induce a conformational change in its N-terminal cytoplasmic region, leading to the release and activation of SigI5. Members of the ABFB family contain an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD binds two arabinose molecules in the beta and gamma subdomains."
definition: >-
  Arabinose-binding domain (ABD), beta-trefoil fold, found in alpha-L-arabinofuranosidase B (ABF B) and similar proteins. Alpha-L-arabinofuranosidase (EC 3.2.1.55), also called ABF, or non-reducing end alpha-L-arabinofuranosidase, or arabinofuranosidase, or arabinosidase, is involved in the degradation of arabinoxylan, a major component of plant hemicellulose. It can hydrolyze 1,5-, 1,3- and 1,2-alpha-linkages not only in L-arabinofuranosyl oligosaccharides, but also in polysaccharides containing terminal non-reducing L-arabinofuranoses in side chains, like L-arabinan, arabinogalactan and arabinoxylan. ABF belongs to the glycosyl hydrolase 54 family. The family also includes Hungateiclostridium thermocellum anti-sigma-I factor RsgI5. It negatively regulates SigI5 activity through direct interaction. Binding of the polysaccharide substrate to the extracellular C-terminal sensing domain of RsgI5 may induce a conformational change in its N-terminal cytoplasmic region, leading to the release and activation of SigI5. Members of the ABFB family contain an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD binds two arabinose molecules in the beta and gamma subdomains. — an NCBI CDD conserved domain (cd23399); members share this curated model.
