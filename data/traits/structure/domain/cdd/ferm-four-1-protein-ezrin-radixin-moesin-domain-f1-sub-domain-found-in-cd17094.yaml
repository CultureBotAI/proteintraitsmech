identifier: CDD:cd17094
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in Caenorhabditis elegans max-1 and its homologs PLEKHH1 and PLEKHH2. Caenorhabditis elegans max-1 is expressed and functions in motor neurons. MAX-1 protein plays a possible role in netrin-induced axon repulsion by modulating the UNC-5 receptor signaling pathway. PLEKHH1 is critically required in vascular patterning in vertebrate species through acting upstream of the ephrin pathway. PLEKHH2 is highly enriched in renal glomerular podocytes, and acts as a novel, important component of the podocyte foot processes. It is involved in matrix adhesion and actin dynamics. Members in this family all contain two Pleckstrin homology (PH) domains, a MyTH4 domain, and a FERM (Band 4.1, ezrin, radixin, moesin) domain within the C-terminal half. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in Caenorhabditis elegans max-1 and its homologs PLEKHH1 and PLEKHH2. Caenorhabditis elegans max-1 is expressed and functions in motor neurons. MAX-1 protein plays a possible role in netrin-induced axon repulsion by modulating the UNC-5 receptor signaling pathway. PLEKHH1 is critically required in vascular patterning in vertebrate species through acting upstream of the ephrin pathway. PLEKHH2 is highly enriched in renal glomerular podocytes, and acts as a novel, important component of the podocyte foot processes. It is involved in matrix adhesion and actin dynamics. Members in this family all contain two Pleckstrin homology (PH) domains, a MyTH4 domain, and a FERM (Band 4.1, ezrin, radixin, moesin) domain within the C-terminal half. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17094); members share this curated model.
