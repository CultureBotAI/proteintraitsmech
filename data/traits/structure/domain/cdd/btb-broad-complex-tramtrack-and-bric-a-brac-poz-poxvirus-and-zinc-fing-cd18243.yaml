identifier: CDD:cd18243
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 14 (KLHL14). KLHL14 is also called protein interactor of Torsin-1A (TOR1A), protein interactor of torsinA, or Printor. It is a novel torsinA-interacting protein that preferentially interacts with ATP-free form of TOR1A and is implicated in dystonia pathogenesis. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 14 (KLHL14). KLHL14 is also called protein interactor of Torsin-1A (TOR1A), protein interactor of torsinA, or Printor. It is a novel torsinA-interacting protein that preferentially interacts with ATP-free form of TOR1A and is implicated in dystonia pathogenesis. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18243); members share this curated model.
