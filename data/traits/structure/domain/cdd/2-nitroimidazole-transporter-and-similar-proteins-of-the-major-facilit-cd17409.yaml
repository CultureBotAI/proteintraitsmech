identifier: CDD:cd17409
label: "2-nitroimidazole transporter and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of Escherichia coli 2-nitroimidazole transporter (NIMT), also called YeaN, and similar proteins. NIMT confers resistance to 2-nitroimidazole, the antibacterial and antifungal antibiotic, by mediating the active efflux of this compound. The NIMT-like subfamily belongs to the 2-nitroimidazole and cyanate transporters like (NIMT/CynX-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  2-nitroimidazole transporter and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of Escherichia coli 2-nitroimidazole transporter (NIMT), also called YeaN, and similar proteins. NIMT confers resistance to 2-nitroimidazole, the antibacterial and antifungal antibiotic, by mediating the active efflux of this compound. The NIMT-like subfamily belongs to the 2-nitroimidazole and cyanate transporters like (NIMT/CynX-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17409); members share this curated model.
