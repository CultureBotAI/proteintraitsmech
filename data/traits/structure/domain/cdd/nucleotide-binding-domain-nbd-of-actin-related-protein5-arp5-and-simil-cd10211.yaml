identifier: CDD:cd10211
label: "nucleotide-binding domain (NBD) of actin-related protein5 (Arp5) and similar proteins. Arp5, also called actin-like protein 5, may act as a core component of the chromatin remodeling INO80 complex which is involved in transcriptional regulation, DNA replication and probably DNA repair. It is involved in DNA double-strand break repair and UV-damage excision repair. Human Arp5 is encoded by the ACTR5 gene. Arabidopsis thaliana ARP5 (AtARp5) is a ubiquitously expressed nuclear protein involved in DNA repair and required for multicellular development of all organs. AtARp5 may be part of other chromatin remodeling machines in addition to INO80."
definition: >-
  nucleotide-binding domain (NBD) of actin-related protein5 (Arp5) and similar proteins. Arp5, also called actin-like protein 5, may act as a core component of the chromatin remodeling INO80 complex which is involved in transcriptional regulation, DNA replication and probably DNA repair. It is involved in DNA double-strand break repair and UV-damage excision repair. Human Arp5 is encoded by the ACTR5 gene. Arabidopsis thaliana ARP5 (AtARp5) is a ubiquitously expressed nuclear protein involved in DNA repair and required for multicellular development of all organs. AtARp5 may be part of other chromatin remodeling machines in addition to INO80. — an NCBI CDD conserved domain (cd10211); members share this curated model.
