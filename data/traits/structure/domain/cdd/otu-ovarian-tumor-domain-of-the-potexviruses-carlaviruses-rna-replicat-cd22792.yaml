identifier: CDD:cd22792
label: "OTU (ovarian tumor) domain of the potexviruses/carlaviruses RNA replication protein family. RNA replication polyprotein (RDRP) is a viral homolog of ovarian tumor protease (vOTU), which displays RNA helicase (EC 3.6.4.13), RNA-directed RNA polymerase (EC 2.7.7.48), viral methyltransferase, Fe(2+) 2-oxoglutarate dioxygenase and protease activities. The central part of this protein possibly functions as an ATP-binding helicase. It is an RNA-directed RNA polymerase involved in viral RNA replication. It also acts as a thiol protease that cleaves the polyprotein. This subfamily belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad."
definition: >-
  OTU (ovarian tumor) domain of the potexviruses/carlaviruses RNA replication protein family. RNA replication polyprotein (RDRP) is a viral homolog of ovarian tumor protease (vOTU), which displays RNA helicase (EC 3.6.4.13), RNA-directed RNA polymerase (EC 2.7.7.48), viral methyltransferase, Fe(2+) 2-oxoglutarate dioxygenase and protease activities. The central part of this protein possibly functions as an ATP-binding helicase. It is an RNA-directed RNA polymerase involved in viral RNA replication. It also acts as a thiol protease that cleaves the polyprotein. This subfamily belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. — an NCBI CDD conserved domain (cd22792); members share this curated model.
