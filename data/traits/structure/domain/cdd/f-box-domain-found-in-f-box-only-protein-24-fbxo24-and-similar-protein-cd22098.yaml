identifier: CDD:cd22098
label: "F-box domain found in F-box only protein 24 (FBXO24) and similar proteins. FBXO24, also called FBX24, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It recognizes deacetylated nucleoside diphosphate kinase A (NDPK-A) to enhance its degradation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 24 (FBXO24) and similar proteins. FBXO24, also called FBX24, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It recognizes deacetylated nucleoside diphosphate kinase A (NDPK-A) to enhance its degradation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22098); members share this curated model.
