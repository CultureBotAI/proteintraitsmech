identifier: CDD:cd02131
label: "PA_hNAALADL2_like: Protease-associated domain containing proteins like human N-acetylated alpha-linked acidic dipeptidase-like 2 protein (hNAALADL2). This group contains various PA domain-containing proteins similar to hNAALADL2. The function of hNAALADL2 is unknown. This gene has been mapped to a chromosomal region associated with Cornelia de Lange syndrome. The significance of the PA domain to hNAALADL2 has not been ascertained. It may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate."
definition: >-
