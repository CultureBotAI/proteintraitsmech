identifier: CDD:cd08737
label: "Regulator of G protein signaling (RGS) domain found in the RGS6 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS6 protein, a member of R7 subfamily of the RGS protein family. RGS is a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). Other members of the R7 subfamily (Neuronal RGS) include: RGS7, RGS9, and RGS11, all of which are expressed predominantly in the nervous system, form an obligatory complex with G-beta-5, and play important roles in the regulation of crucial neuronal processes such as vision and motor control.  Additionally they have been implicated in many neurological conditions such as anxiety, schizophrenia, and drug dependence. RGS6 exists in multiple splice isoforms with identical RGS domains, but possess complete or incomplete GGL domains and distinct N- and C-terminal domains. RGS6 interacts with SCG10, a neuronal growth-associated protein and therefore regulates neuronal differentiation. Another RGS6-binding protein is DMAP1, a component of the Dnmt1 complex involved in repression of newly replicated genes. Mutations of a critical residue required for interaction of RGS6 protein with G proteins did not affect the ability of RGS6 to interact with both SCG10 and DMAP1. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS6 protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS6 protein, a member of R7 subfamily of the RGS protein family. RGS is a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). Other members of the R7 subfamily (Neuronal RGS) include: RGS7, RGS9, and RGS11, all of which are expressed predominantly in the nervous system, form an obligatory complex with G-beta-5, and play important roles in the regulation of crucial neuronal processes such as vision and motor control. Additionally they have been implicated in many neurological conditions such as anxiety, schizophrenia, and drug dependence. RGS6 exists in multiple splice isoforms with identical RGS domains, but possess complete or incomplete GGL domains and distinct N- and C-terminal domains. RGS6 interacts with SCG10, a neuronal growth-associated protein and therefore regulates neuronal differentiation. Another RGS6-binding protein is DMAP1, a component of the Dnmt1 complex involved in repression of newly replicated genes. Mutations of a critical residue required for interaction of RGS6 protein with G proteins did not affect the ability of RGS6 to interact with both SCG10 and DMAP1. As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. — an NCBI CDD conserved domain (cd08737); members share this curated model.
