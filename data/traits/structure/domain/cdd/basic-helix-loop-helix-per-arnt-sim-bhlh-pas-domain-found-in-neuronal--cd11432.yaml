identifier: CDD:cd11432
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing proteins, NPAS1, NPAS3 and similar proteins. The family includes neuronal PAS domain proteins NPAS1 and NPAS3, both of which are master regulators of neuropsychiatric function. NPAS1, also termed neuronal PAS1, or Basic-helix-loop-helix-PAS protein MOP5, or Class E basic helix-loop-helix protein 11 (bHLHe11), or member of PAS protein 5, or PAS domain-containing protein 5 (PASD5), is a bHLH-PAS transcriptional repressor expressed in the central nervous system and involved in neuronal differentiation. It is active during late embryogenesis and postnatal development. NPAS3, also termed neuronal PAS3, or Basic-helix-loop-helix-PAS protein MOP6, or Class E basic helix-loop-helix protein 12 (bHLHe12), or member of PAS protein 6, or PAS domain-containing protein 6 (PASD6), is a bHLH-PAS brain-enriched transcription factor that is involved in central nervous system development and neurogenesis. It is a replicated genetic risk factor for psychiatric disorders. Human chromosomal rearrangements that affect NPAS3 normal expression are associated with schizophrenia and mental retardation."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing proteins, NPAS1, NPAS3 and similar proteins. The family includes neuronal PAS domain proteins NPAS1 and NPAS3, both of which are master regulators of neuropsychiatric function. NPAS1, also termed neuronal PAS1, or Basic-helix-loop-helix-PAS protein MOP5, or Class E basic helix-loop-helix protein 11 (bHLHe11), or member of PAS protein 5, or PAS domain-containing protein 5 (PASD5), is a bHLH-PAS transcriptional repressor expressed in the central nervous system and involved in neuronal differentiation. It is active during late embryogenesis and postnatal development. NPAS3, also termed neuronal PAS3, or Basic-helix-loop-helix-PAS protein MOP6, or Class E basic helix-loop-helix protein 12 (bHLHe12), or member of PAS protein 6, or PAS domain-containing protein 6 (PASD6), is a bHLH-PAS brain-enriched transcription factor that is involved in central nervous system development and neurogenesis. It is a replicated genetic risk factor for psychiatric disorders. Human chromosomal rearrangements that affect NPAS3 normal expression are associated with schizophrenia and mental retardation. — an NCBI CDD conserved domain (cd11432); members share this curated model.
