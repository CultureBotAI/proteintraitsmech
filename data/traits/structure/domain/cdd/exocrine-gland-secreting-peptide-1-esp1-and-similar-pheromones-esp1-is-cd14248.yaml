identifier: CDD:cd14248
label: "Exocrine gland-secreting peptide 1 (ESP1) and similar pheromones. ESP1 is a peptide pheromone found in male mouse tear fluid, which is recognized by a specific G-protein-coupled receptor in the vomeronasal sensory neurons and affects female mouse sexual receptive behaviour. This small family appears restricted to rodents. ESP36 is expressed only in the female mouse extraorbital lacrimal gland. The juvenile pheromone ESP22 is secreted from the lacrimal gland and released into the tears of 2-3 week old mice; it activates the vomeronasal response pathway, and inhibits male sexual behavior. Information regarding other members of this family is not yet available."
definition: >-
