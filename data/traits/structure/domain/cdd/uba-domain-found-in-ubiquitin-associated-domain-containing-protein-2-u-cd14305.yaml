identifier: CDD:cd14305
label: "UBA domain found in ubiquitin-associated domain-containing protein 2 (UBAC2) and similar proteins. UBAC2, also called phosphoglycerate dehydrogenase-like protein 1, is a ubiquitin-associated domain (UBA)-domain containing protein encoded by gene UBAC2 (or PHGDHL1), a risk gene for Behcet's disease (BD). It may play an important role in the development of BD through its transcriptional modulation. Members in this family contain an N-terminal rhomboid-like domain and a C-terminal UBA domain."
definition: >-
  UBA domain found in ubiquitin-associated domain-containing protein 2 (UBAC2) and similar proteins. UBAC2, also called phosphoglycerate dehydrogenase-like protein 1, is a ubiquitin-associated domain (UBA)-domain containing protein encoded by gene UBAC2 (or PHGDHL1), a risk gene for Behcet's disease (BD). It may play an important role in the development of BD through its transcriptional modulation. Members in this family contain an N-terminal rhomboid-like domain and a C-terminal UBA domain. — an NCBI CDD conserved domain (cd14305); members share this curated model.
