identifier: CDD:cd21494
label: "Transmembrane (TMEM) protein family 168. This family includes transmembrane protein 168 (TMEM168) and similar proteins. TMEM168 is a multi-pass membrane protein predicted to contain nine transmembrane helices. Its expression has been implicated in several diseases. It is upregulated in glioblastoma multiforme (GBM) and small interfering RNA (siRNA)-TMEM168 has been shown to prevent viability of human GBM cell lines, induce cell cycle arrest (G0/G1 phase), and promote apoptosis through the suppression of the Wnt/beta-catenin pathway. A TMEM168 point mutation has also been associated with arrhythmogenesis in familial Brugada syndrome."
definition: >-
  Transmembrane (TMEM) protein family 168. This family includes transmembrane protein 168 (TMEM168) and similar proteins. TMEM168 is a multi-pass membrane protein predicted to contain nine transmembrane helices. Its expression has been implicated in several diseases. It is upregulated in glioblastoma multiforme (GBM) and small interfering RNA (siRNA)-TMEM168 has been shown to prevent viability of human GBM cell lines, induce cell cycle arrest (G0/G1 phase), and promote apoptosis through the suppression of the Wnt/beta-catenin pathway. A TMEM168 point mutation has also been associated with arrhythmogenesis in familial Brugada syndrome. — an NCBI CDD conserved domain (cd21494); members share this curated model.
