identifier: CDD:cd14480
label: "SPX domain of the vacuolar transport chaperone Vtc2 and similar proteins. This region has been named the SPX domain after (Syg1, Pho81 and XPR1). The domain is found at the amino terminus of a variety of proteins. Vtc2 is part of the Saccharomyces cerevisiae membrane-integral VTC complex, together with Vtc1, Vtc3, and Vtc4. It contains an N-terminal SPX domain next to a central polyphosphate polymerase domain and a C-terminal domain of unknown function."
definition: >-
  SPX domain of the vacuolar transport chaperone Vtc2 and similar proteins. This region has been named the SPX domain after (Syg1, Pho81 and XPR1). The domain is found at the amino terminus of a variety of proteins. Vtc2 is part of the Saccharomyces cerevisiae membrane-integral VTC complex, together with Vtc1, Vtc3, and Vtc4. It contains an N-terminal SPX domain next to a central polyphosphate polymerase domain and a C-terminal domain of unknown function. — an NCBI CDD conserved domain (cd14480); members share this curated model.
