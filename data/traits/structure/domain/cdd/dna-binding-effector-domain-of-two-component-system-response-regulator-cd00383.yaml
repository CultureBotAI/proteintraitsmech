identifier: CDD:cd00383
label: "DNA-binding effector domain of two-component system response regulators. Bacteria and some eukaryotes use two-component signal transduction systems to detect and respond to changes in the environment. The systems consists of a sensor histidine kinase and a response regulator. The former autophosphorylates a histidine residue on detecting an external stimulus. The phosphate is then transferred to an invariant aspartate residue in a highly conserved receiver domain of the response regulator. Phosphorylation activates a variable effector domain of the response regulator, which triggers the cellular response. This C-terminal effector domain belongs to the winged helix-turn-helix family of transcriptional regulators and contains DNA and RNA polymerase binding sites. Several dimers or monomers bind head to tail to small tandem repeats upstream of the genes. The RNA polymerase binding sites interact with the alpha or sigma subunit of RNA polymerase."
definition: >-
  DNA-binding effector domain of two-component system response regulators. Bacteria and some eukaryotes use two-component signal transduction systems to detect and respond to changes in the environment. The systems consists of a sensor histidine kinase and a response regulator. The former autophosphorylates a histidine residue on detecting an external stimulus. The phosphate is then transferred to an invariant aspartate residue in a highly conserved receiver domain of the response regulator. Phosphorylation activates a variable effector domain of the response regulator, which triggers the cellular response. This C-terminal effector domain belongs to the winged helix-turn-helix family of transcriptional regulators and contains DNA and RNA polymerase binding sites. Several dimers or monomers bind head to tail to small tandem repeats upstream of the genes. The RNA polymerase binding sites interact with the alpha or sigma subunit of RNA polymerase. — an NCBI CDD conserved domain (cd00383); members share this curated model.
