identifier: CDD:cd18618
label: "Glycosyl hydrolase family 43, including Butyrivibrio proteoclasticus arabinofuranosidase Xsa43E. This glycosyl hydrolase family 43 (GH43) subgroup belongs to the GH43_AXH-like subgroup which includes enzymes that have been characterized with beta-xylosidase (EC 3.2.1.37), alpha-L-arabinofuranosidase (EC 3.2.1.55), alpha-1,2-L-arabinofuranosidase 43A (arabinan-specific; EC 3.2.1.-), endo-alpha-L-arabinanase as well as arabinoxylan arabinofuranohydrolase (AXH) activities. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. AXHs specifically hydrolyze the glycosidic bond between arabinofuranosyl substituents and xylopyranosyl backbone residues of arabinoxylan. This subgroup includes Cellvibrio japonicus arabinan-specific alpha-1,2-arabinofuranosidase, CjAbf43A, which confers its specificity by a surface cleft that is complementary to the helical backbone of the polysaccharide, and Butyrivibrio proteoclasticus GH43 enzyme Xsa43E, also an arabinofuranosidase, which has been shown to cleave arabinose side chains from short segments of xylan. Several of these enzymes also contain carbohydrate binding modules (CBMs) that bind cellulose or xylan. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  Glycosyl hydrolase family 43, including Butyrivibrio proteoclasticus arabinofuranosidase Xsa43E. This glycosyl hydrolase family 43 (GH43) subgroup belongs to the GH43_AXH-like subgroup which includes enzymes that have been characterized with beta-xylosidase (EC 3.2.1.37), alpha-L-arabinofuranosidase (EC 3.2.1.55), alpha-1,2-L-arabinofuranosidase 43A (arabinan-specific; EC 3.2.1.-), endo-alpha-L-arabinanase as well as arabinoxylan arabinofuranohydrolase (AXH) activities. GH43 are inverting enzymes (i.e. they invert the stereochemistry of the anomeric carbon atom of the substrate) that have an aspartate as the catalytic general base, a glutamate as the catalytic general acid and another aspartate that is responsible for pKa modulation and orienting the catalytic acid. Many GH43 enzymes display both alpha-L-arabinofuranosidase and beta-D-xylosidase activity using aryl-glycosides as substrates. AXHs specifically hydrolyze the glycosidic bond between arabinofuranosyl substituents and xylopyranosyl backbone residues of arabinoxylan. This subgroup includes Cellvibrio japonicus arabinan-specific alpha-1,2-arabinofuranosidase, CjAbf43A, which confers its specificity by a surface cleft that is complementary to the helical backbone of the polysaccharide, and Butyrivibrio proteoclasticus GH43 enzyme Xsa43E, also an arabinofuranosidase, which has been shown to cleave arabinose side chains from short segments of xylan. Several of these enzymes also contain carbohydrate binding modules (CBMs) that bind cellulose or xylan. A common structural feature of GH43 enzymes is a 5-bladed beta-propeller domain that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd18618); members share this curated model.
