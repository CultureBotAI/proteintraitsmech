identifier: CDD:cd07735
label: "class II cyclic nucleotide phosphodiesterases Saccharomyces cerevisiae PDE1, Dictyostelium discoideum PDE1 and PDE7, and related proteins; MBL-fold metallo-hydrolase domain. Cyclic nucleotide phosphodiesterases (PDEs) decompose the second messengers cyclic adenosine and guanosine 3',5'-monophosphate (cAMP and cGMP, respectively). Saccharomyces cerevisiae PDE1 and Dictyostelium discoideum PDE1 and PDE7, have dual cAMP/cGMP specificity. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  class II cyclic nucleotide phosphodiesterases Saccharomyces cerevisiae PDE1, Dictyostelium discoideum PDE1 and PDE7, and related proteins; MBL-fold metallo-hydrolase domain. Cyclic nucleotide phosphodiesterases (PDEs) decompose the second messengers cyclic adenosine and guanosine 3',5'-monophosphate (cAMP and cGMP, respectively). Saccharomyces cerevisiae PDE1 and Dictyostelium discoideum PDE1 and PDE7, have dual cAMP/cGMP specificity. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd07735); members share this curated model.
