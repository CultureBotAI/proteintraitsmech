identifier: CDD:cd11518
label: "Na(+)- and Cl(-)-dependent imino acid transporter SIT1; solute-binding domain. SIT1 (also called XTRP3, XT3, IMINO) transports imino acids, such as proline, pipecolate, MeAIB, and sarcosine. It has weak affinity for neutral amino acids such as phenylalanine. Human SIT1 is encoded by the SLC6A20 gene. SIT1 is expressed in brain, kidney, small intestine, thymus, spleen, ovary, and lung. SLC6A20 is a candidate gene for the rare disorder iminoglycinuria. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent imino acid transporter SIT1; solute-binding domain. SIT1 (also called XTRP3, XT3, IMINO) transports imino acids, such as proline, pipecolate, MeAIB, and sarcosine. It has weak affinity for neutral amino acids such as phenylalanine. Human SIT1 is encoded by the SLC6A20 gene. SIT1 is expressed in brain, kidney, small intestine, thymus, spleen, ovary, and lung. SLC6A20 is a candidate gene for the rare disorder iminoglycinuria. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11518); members share this curated model.
