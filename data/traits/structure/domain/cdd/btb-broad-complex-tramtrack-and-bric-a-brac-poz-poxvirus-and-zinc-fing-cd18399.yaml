identifier: CDD:cd18399
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 10 (KCTD10). KCTD10, also called BTB/POZ domain-containing adapter for CUL3-mediated RhoA degradation protein 3 (BACURD3), is a BTB/POZ domain-containing protein that interacts with proliferating cell nuclear antigen (PCNA) and polymerase delta, and participates in DNA repair, DNA replication, and cell-cycle control. Its down-regulation could inhibit cell proliferation. KCTD10 also plays crucial roles in embryonic angiogenesis and heart development in mammals by negatively regulating the Notch signaling pathway. Furthermore, KCTD10 may function as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex, which mediates the ubiquitination of target proteins, leading to their degradation by the proteasome. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD10 BTB domain forms a novel two-fold symmetric tetramer that is distinct from the tetramer formed by voltage-gated potassium (Kv) channels."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 10 (KCTD10). KCTD10, also called BTB/POZ domain-containing adapter for CUL3-mediated RhoA degradation protein 3 (BACURD3), is a BTB/POZ domain-containing protein that interacts with proliferating cell nuclear antigen (PCNA) and polymerase delta, and participates in DNA repair, DNA replication, and cell-cycle control. Its down-regulation could inhibit cell proliferation. KCTD10 also plays crucial roles in embryonic angiogenesis and heart development in mammals by negatively regulating the Notch signaling pathway. Furthermore, KCTD10 may function as a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex, which mediates the ubiquitination of target proteins, leading to their degradation by the proteasome. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD10 BTB domain forms a novel two-fold symmetric tetramer that is distinct from the tetramer formed by voltage-gated potassium (Kv) channels. — an NCBI CDD conserved domain (cd18399); members share this curated model.
