identifier: CDD:cd22974
label: "dimerization/docking (D/D) domain found in enolase 4 and similar proteins. Enolase (EC 4.2.1.11), also known as phosphopyruvate hydratase, is a metalloenzyme responsible for the catalyzing the conversion of 2-phosphoglycerate (2-PG) to phosphoenolpyruvate (PEP), the ninth and penultimate step of glycolysis. ENO4, also called 2-phospho-D-glycerate hydro-lyase, may be required for sperm motility and function. It contains an N-terminal domain which shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in enolase 4 and similar proteins. Enolase (EC 4.2.1.11), also known as phosphopyruvate hydratase, is a metalloenzyme responsible for the catalyzing the conversion of 2-phosphoglycerate (2-PG) to phosphoenolpyruvate (PEP), the ninth and penultimate step of glycolysis. ENO4, also called 2-phospho-D-glycerate hydro-lyase, may be required for sperm motility and function. It contains an N-terminal domain which shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22974); members share this curated model.
