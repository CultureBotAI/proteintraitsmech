identifier: CDD:cd20256
label: "Stannin family includes vertebrate Stannin and insect Hemotin. The Stannin family includes vertebrate Stannin and insect Hemotin, which are functional homologs required at the cellular level for endosomal maturation, and at the molecular level, to bind and antagonize 14-3-3zeta. Stannin is a monotopic membrane protein containing an N-terminal single transmembrane helix that transverses the lipid bilayer, an unstructured linker which includes a conserved CXC metal-binding motif and a putative 14-3-3zeta binding site, and a C-terminal distorted cytoplasmic helix. Analysis of the Hemotin sequence using a transmembrane topology prediction program revealed a very similar potential transmembrane alpha-helical domain arrangement as Stannin."
definition: >-
  Stannin family includes vertebrate Stannin and insect Hemotin. The Stannin family includes vertebrate Stannin and insect Hemotin, which are functional homologs required at the cellular level for endosomal maturation, and at the molecular level, to bind and antagonize 14-3-3zeta. Stannin is a monotopic membrane protein containing an N-terminal single transmembrane helix that transverses the lipid bilayer, an unstructured linker which includes a conserved CXC metal-binding motif and a putative 14-3-3zeta binding site, and a C-terminal distorted cytoplasmic helix. Analysis of the Hemotin sequence using a transmembrane topology prediction program revealed a very similar potential transmembrane alpha-helical domain arrangement as Stannin. — an NCBI CDD conserved domain (cd20256); members share this curated model.
