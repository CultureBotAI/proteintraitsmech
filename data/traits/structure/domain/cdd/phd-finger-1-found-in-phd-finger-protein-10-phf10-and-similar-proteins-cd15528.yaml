identifier: CDD:cd15528
label: "PHD finger 1 found in PHD finger protein 10 (PHF10) and similar proteins. PHF10, also termed BRG1-associated factor 45a (BAF45a), or XAP135, is a ubiquitously expressed transcriptional regulator that is required for maintaining the undifferentiated status of neuroblasts. It contains a SAY (supporter of activation of yellow) domain and two adjacent plant homeodomain (PHD) fingers. This model corresponds to the first PHD finger."
definition: >-
  PHD finger 1 found in PHD finger protein 10 (PHF10) and similar proteins. PHF10, also termed BRG1-associated factor 45a (BAF45a), or XAP135, is a ubiquitously expressed transcriptional regulator that is required for maintaining the undifferentiated status of neuroblasts. It contains a SAY (supporter of activation of yellow) domain and two adjacent plant homeodomain (PHD) fingers. This model corresponds to the first PHD finger. — an NCBI CDD conserved domain (cd15528); members share this curated model.
