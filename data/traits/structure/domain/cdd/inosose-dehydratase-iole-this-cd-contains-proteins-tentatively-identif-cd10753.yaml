identifier: CDD:cd10753
label: "inosose dehydratase (IolE). This cd contains proteins tentatively identified as inosose dehydratase (IolE). Related to the Xylose-isomerase-like superfamily of TIM barrell proteins. **Abstract from PMID 14993306 ***: \"The myo-inositol catabolism pathway of Bacillus subtilis has not been fully characterized but was proposed to involve step-wise multiple reactions that finally yielded acetyl-CoA and dihydroxyacetone phosphate. It is known that the iolABCDEFGHIJ operon is responsible for the catabolism of inositol. IolG catalyses the first step of myo-inositol catabolism, the dehydrogenation of myo-inositol, producing 2-keto-myo-inositol (inosose). The second step was thought to be the dehydration of inosose. Genetic and biochemical analyses of the iol genes led to the identification of iolE, encoding the enzyme for the second step of inositol catabolism, inosose dehydratase. The reaction product of inosose dehydratase was identified as D-2,3-diketo-4-deoxy-epi-inositol\""
definition: >-
  inosose dehydratase (IolE). This cd contains proteins tentatively identified as inosose dehydratase (IolE). Related to the Xylose-isomerase-like superfamily of TIM barrell proteins. **Abstract from PMID 14993306 ***: "The myo-inositol catabolism pathway of Bacillus subtilis has not been fully characterized but was proposed to involve step-wise multiple reactions that finally yielded acetyl-CoA and dihydroxyacetone phosphate. It is known that the iolABCDEFGHIJ operon is responsible for the catabolism of inositol. IolG catalyses the first step of myo-inositol catabolism, the dehydrogenation of myo-inositol, producing 2-keto-myo-inositol (inosose). The second step was thought to be the dehydration of inosose. Genetic and biochemical analyses of the iol genes led to the identification of iolE, encoding the enzyme for the second step of inositol catabolism, inosose dehydratase. The reaction product of inosose dehydratase was identified as D-2,3-diketo-4-deoxy-epi-inositol" — an NCBI CDD conserved domain (cd10753); members share this curated model.
