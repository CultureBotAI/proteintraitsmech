identifier: CDD:cd21284
label: "calponin homology (CH) domain found in calponin-3. Calponin-3 (CNN3), also called acidic isoform calponin, is an F-actin-binding protein that is expressed in the brain and has been shown to control dendritic spine morphology, density, and plasticity by regulating actin cytoskeletal reorganization and dynamics. It contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
