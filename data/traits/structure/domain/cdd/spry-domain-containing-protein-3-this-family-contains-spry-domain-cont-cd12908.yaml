label: "SPRY domain-containing protein 3. This family contains SPRY domain-containing protein 3 (SPRYD3). In humans, it is highly expressed in most tissues, including brain, kidney, heart, intestine, skeletal muscle, and testis. It also has cross-species conservation, suggesting that it is likely to carry out important cellular processes."
