identifier: CDD:cd14626
label: "catalytic domain of receptor-type tyrosine-protein phosphatase F, repeat 1. Receptor-type tyrosine-protein phosphatase F (PTPRF), also known as leukocyte common antigen related (LAR), is the prototypical member of the LAR family of receptor-type tyrosine-protein phosphatases (RPTPs), which belong to the larger family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRF/LAR plays a role for LAR in cadherin complexes where it associates with and dephosphorylates beta-catenin, a pathway which may be critical for cadherin complex stability and cell-cell association. It also regulates focal adhesions through cyclin-dependent kinase-1 and is involved in axon guidance in the developing nervous system. It also functions in regulating insulin signaling. PTPRF contains an extracellular region with three immunoglobulin-like (Ig) domains and four to eight fibronectin type III (FN3) repeats (determined by alternative splicing), a single transmembrane domain, followed by an intracellular region with a membrane-proximal catalytic PTP domain (repeat 1, also called D1) and a membrane-distal non-catalytic PTP-like domain (repeat 2, also called D2). This model represents the catalytic PTP domain (repeat 1)."
