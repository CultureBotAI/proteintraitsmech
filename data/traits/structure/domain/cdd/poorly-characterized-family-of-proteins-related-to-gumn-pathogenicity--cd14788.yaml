identifier: CDD:cd14788
label: "poorly characterized family of proteins related to gumN pathogenicity factor of Xanthomonas. GumN, a poorly characterized protein, is part of the large gum cluster of pathogenicity factors of the plant pathogen Xanthomonas. Except for GumN, the gum cluster is conserved, and proteins of this operon are involved in the production of xanthan, an extracellular polysaccharide that promotes plant disease. Xanthomonas campestri is responsible for 'black rot' disease in certain crop plants. GumN has sequence similarity to the Tiki/TraB protease family, but lacks the typical conserved residues of the active site."
definition: >-
  poorly characterized family of proteins related to gumN pathogenicity factor of Xanthomonas. GumN, a poorly characterized protein, is part of the large gum cluster of pathogenicity factors of the plant pathogen Xanthomonas. Except for GumN, the gum cluster is conserved, and proteins of this operon are involved in the production of xanthan, an extracellular polysaccharide that promotes plant disease. Xanthomonas campestri is responsible for 'black rot' disease in certain crop plants. GumN has sequence similarity to the Tiki/TraB protease family, but lacks the typical conserved residues of the active site. — an NCBI CDD conserved domain (cd14788); members share this curated model.
