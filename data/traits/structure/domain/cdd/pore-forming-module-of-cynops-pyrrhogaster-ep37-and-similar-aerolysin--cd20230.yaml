identifier: CDD:cd20230
label: "pore-forming module of Cynops pyrrhogaster EP37, and similar aerolysin-type beta-barrel pore-forming proteins. Cynops pyrrhogaster (Japanese newt EP37) EP37 is an epidermis-specific protein which has a non-lens beta/gamma-crystallin domain in tandem and N-terminal to this pore-forming module. C. pyrrhogaster has several EP37-like proteins present in skin, gastric epithelium and fundic glands of an adult newt and in the swimming larva. This group also includes the alpha subunit of Bombina maxima betagamma-CAT (a non-lens betagamma-crystallin (alpha-subunit) and trefoil factor (beta subunit) complex) identified from skin secretions. Betagamma-CAT shows potent hemolytic activity on mammalian erythrocytes. Many proteins belonging to this group have N-terminal crystallin (beta/gamma crystallin) domain(s). Members of this group belong to the aerolysin family of beta-pore-forming proteins (beta-PFPs). PFPs are generally secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores harmful to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel, are found in all kingdoms of life and many are bacterial toxins. In addition to having a role in microbial infection, they have potential as biotechnological sensors and delivery systems. They share a similar monomeric architecture, with a variable membrane-binding domain and a structurally conserved pore-forming region. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin)."
