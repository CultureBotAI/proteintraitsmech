identifier: CDD:cd23691
label: "Tetrahymena thermophila ribosomal protein uS4m, and similar proteins. Ribosomal protein uS4m, also called Ymf76, is a component of small subunit (SSU) in Tetrahymena thermophila mitochondrial ribosome (mitoribosome), which reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit; its large subunit (LSU) lacks 5S rRNA."
definition: >-
  Tetrahymena thermophila ribosomal protein uS4m, and similar proteins. Ribosomal protein uS4m, also called Ymf76, is a component of small subunit (SSU) in Tetrahymena thermophila mitochondrial ribosome (mitoribosome), which reveals an assembly of 94-ribosomal proteins and four-rRNAs with an additional protein mass of ~700 kDa on the small subunit; its large subunit (LSU) lacks 5S rRNA. — an NCBI CDD conserved domain (cd23691); members share this curated model.
