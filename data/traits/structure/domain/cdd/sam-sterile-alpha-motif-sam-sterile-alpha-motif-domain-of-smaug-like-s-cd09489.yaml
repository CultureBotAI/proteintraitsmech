identifier: CDD:cd09489
label: "SAM (Sterile alpha motif ). SAM (sterile alpha motif) domain of Smaug-like subfamily proteins is an RNA binding domain. SAM interacts with stem-loop structures in target mRNAs. Proteins of this subfamily are post-transcriptional regulators involved in mRNA silencing and deadenylation; they can be implicated in transcript stability regulation and vacuolar protein transport as well.  SAM_Smaug-like domain-containing proteins are found in metazoa from yeast to human. In animals they are active during early embryogenesis."
definition: >-
  SAM (Sterile alpha motif ). SAM (sterile alpha motif) domain of Smaug-like subfamily proteins is an RNA binding domain. SAM interacts with stem-loop structures in target mRNAs. Proteins of this subfamily are post-transcriptional regulators involved in mRNA silencing and deadenylation; they can be implicated in transcript stability regulation and vacuolar protein transport as well. SAM_Smaug-like domain-containing proteins are found in metazoa from yeast to human. In animals they are active during early embryogenesis. — an NCBI CDD conserved domain (cd09489); members share this curated model.
