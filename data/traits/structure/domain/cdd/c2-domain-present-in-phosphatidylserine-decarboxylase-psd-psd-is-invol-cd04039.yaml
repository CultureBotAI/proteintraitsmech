identifier: CDD:cd04039
label: "C2 domain present in Phosphatidylserine decarboxylase (PSD). PSD is involved in the biosynthesis of aminophospholipid by converting phosphatidylserine (PtdSer) to phosphatidylethanolamine (PtdEtn). There is a single C2 domain present and it is thought to confer PtdSer binding motif that is common to PKC and synaptotagmin. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins.  Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1.  However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain.  C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions."
definition: >-
  C2 domain present in Phosphatidylserine decarboxylase (PSD). PSD is involved in the biosynthesis of aminophospholipid by converting phosphatidylserine (PtdSer) to phosphatidylethanolamine (PtdEtn). There is a single C2 domain present and it is thought to confer PtdSer binding motif that is common to PKC and synaptotagmin. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. — an NCBI CDD conserved domain (cd04039); members share this curated model.
