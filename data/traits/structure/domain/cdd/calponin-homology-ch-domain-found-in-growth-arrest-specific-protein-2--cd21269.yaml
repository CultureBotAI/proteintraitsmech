identifier: CDD:cd21269
label: "calponin homology (CH) domain found in growth arrest-specific protein 2-like 3. Growth arrest-specific protein 2-like 3 (GAS2L3), also called GAS2-like protein 3, is a cytoskeletal linker protein that may promote and stabilize the formation of the actin and microtubule network. It contains a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in growth arrest-specific protein 2-like 3. Growth arrest-specific protein 2-like 3 (GAS2L3), also called GAS2-like protein 3, is a cytoskeletal linker protein that may promote and stabilize the formation of the actin and microtubule network. It contains a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21269); members share this curated model.
