identifier: CDD:cd12768
label: "RNA recognition motif 2 (RRM2) found in vertebrate serine/arginine-rich splicing factor 9 (SRSF9). This subgroup corresponds to the RRM2 of SRSF9, also termed pre-mRNA-splicing factor SRp30C, an essential splicing regulatory serine/arginine (SR) protein that has been implicated in the activity of many elements that control splice site selection, the alternative splicing of the glucocorticoid receptor beta in neutrophils and in the gonadotropin-releasing hormone pre-mRNA. SRSF9 can also interact with other proteins implicated in alternative splicing, including YB-1, rSLM-1, rSLM-2, E4-ORF4, Nop30, and p32. SRSF9 contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by an unusually short C-terminal RS domains rich in serine-arginine dipeptides."
definition: >-
  RNA recognition motif 2 (RRM2) found in vertebrate serine/arginine-rich splicing factor 9 (SRSF9). This subgroup corresponds to the RRM2 of SRSF9, also termed pre-mRNA-splicing factor SRp30C, an essential splicing regulatory serine/arginine (SR) protein that has been implicated in the activity of many elements that control splice site selection, the alternative splicing of the glucocorticoid receptor beta in neutrophils and in the gonadotropin-releasing hormone pre-mRNA. SRSF9 can also interact with other proteins implicated in alternative splicing, including YB-1, rSLM-1, rSLM-2, E4-ORF4, Nop30, and p32. SRSF9 contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by an unusually short C-terminal RS domains rich in serine-arginine dipeptides. — an NCBI CDD conserved domain (cd12768); members share this curated model.
