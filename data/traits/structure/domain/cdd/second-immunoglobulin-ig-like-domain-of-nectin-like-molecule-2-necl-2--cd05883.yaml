identifier: CDD:cd05883
label: "Second immunoglobulin (Ig)-like domain of nectin-like molecule 2 (Necl-2); member of the I-set of Ig superfamily domains. The members here are composed of the second immunoglobulin (Ig)-like domain of nectin-like molecule 2 (Necl-2; also known as cell adhesion molecule 1 (CADM1)). Nectin-like molecules (Necls) have similar domain structures to those of nectins. At least five nectin-like molecules have been identified (Necl-1 through Necl-5). These have an extracellular region containing three Ig-like domains, one transmembrane region, and one cytoplasmic region. Necl-2 has Ca(2+)-independent homophilic and heterophilic cell-cell adhesion activity. Necl-1 is expressed in a wide variety of tissues and is a putative tumour suppressor gene which is downregulated in aggressive neuroblastoma. Ig domains are likely to participate in ligand binding and recognition."
definition: >-
  Second immunoglobulin (Ig)-like domain of nectin-like molecule 2 (Necl-2); member of the I-set of Ig superfamily domains. The members here are composed of the second immunoglobulin (Ig)-like domain of nectin-like molecule 2 (Necl-2; also known as cell adhesion molecule 1 (CADM1)). Nectin-like molecules (Necls) have similar domain structures to those of nectins. At least five nectin-like molecules have been identified (Necl-1 through Necl-5). These have an extracellular region containing three Ig-like domains, one transmembrane region, and one cytoplasmic region. Necl-2 has Ca(2+)-independent homophilic and heterophilic cell-cell adhesion activity. Necl-1 is expressed in a wide variety of tissues and is a putative tumour suppressor gene which is downregulated in aggressive neuroblastoma. Ig domains are likely to participate in ligand binding and recognition. — an NCBI CDD conserved domain (cd05883); members share this curated model.
