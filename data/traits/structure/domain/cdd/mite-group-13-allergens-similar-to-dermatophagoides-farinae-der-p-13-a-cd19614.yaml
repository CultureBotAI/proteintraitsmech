identifier: CDD:cd19614
label: "mite group 13 allergens similar to Dermatophagoides farinae Der p 13, and related proteins. The minor house dust mite allergen Der p 13 is a fatty acid-binding protein and an activator of a TLR2-mediated innate immune response. This group also contains other mite group 13 allergens, including Tyrophagus putrescentiae Tyr p 13 and Blomia tropicalis mite blo t 13. blo t 13 binds the natural fluorescent fatty acid cis-parinaric acid and oleic acid by competition, but not retinol, retinoic acid, cholesterol, or dansylated or anthroxylated fatty acids. This subgroup belongs to the intracellular fatty acid-binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
