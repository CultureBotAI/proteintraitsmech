identifier: CDD:cd22934
label: "histone-fold domain found in transcriptional adapter 1 (TADA1) and similar proteins. TADA1, also called SPT3-associated factor 42, or STAF42, or transcriptional adapter 1-like protein (TADA1L), may be involved in transcriptional regulation. It functions as a component of the STAGA transcription coactivator-HAT complex, which is composed at least of SUPT3H, GCN5L2, TAF5L, TAF6L, SUPT7L, TADA3L, TAD1L, TAF10, TAF12, TRRAP and TAF9."
definition: >-
  histone-fold domain found in transcriptional adapter 1 (TADA1) and similar proteins. TADA1, also called SPT3-associated factor 42, or STAF42, or transcriptional adapter 1-like protein (TADA1L), may be involved in transcriptional regulation. It functions as a component of the STAGA transcription coactivator-HAT complex, which is composed at least of SUPT3H, GCN5L2, TAF5L, TAF6L, SUPT7L, TADA3L, TAD1L, TAF10, TAF12, TRRAP and TAF9. — an NCBI CDD conserved domain (cd22934); members share this curated model.
