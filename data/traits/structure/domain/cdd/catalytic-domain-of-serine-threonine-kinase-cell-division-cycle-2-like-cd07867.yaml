identifier: CDD:cd07867
label: "Catalytic domain of Serine/Threonine Kinase, Cell Division Cycle 2-like 6. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDC2L6 is also called CDK8-like and was previously referred to as CDK11. However, this is a confusing nomenclature as CDC2L6 is distinct from CDC2L1, which is represented by the two protein products from its gene, called CDK11(p110) and CDK11(p58), as well as the caspase-processed CDK11(p46). CDK11(p110), CDK11(p58), and CDK11(p46)do not belong to this subfamily. CDC2L6 is an associated protein of Mediator, a multiprotein complex that provides a platform to connect transcriptional and chromatin regulators and cofactors, in order to activate and mediate RNA polymerase II transcription. CDC2L6 is localized mainly in the nucleus amd exerts an opposing effect to CDK8 in VP16-dependent transcriptional activation by being a negative regulator. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDC2L6 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Serine/Threonine Kinase, Cell Division Cycle 2-like 6. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDC2L6 is also called CDK8-like and was previously referred to as CDK11. However, this is a confusing nomenclature as CDC2L6 is distinct from CDC2L1, which is represented by the two protein products from its gene, called CDK11(p110) and CDK11(p58), as well as the caspase-processed CDK11(p46). CDK11(p110), CDK11(p58), and CDK11(p46)do not belong to this subfamily. CDC2L6 is an associated protein of Mediator, a multiprotein complex that provides a platform to connect transcriptional and chromatin regulators and cofactors, in order to activate and mediate RNA polymerase II transcription. CDC2L6 is localized mainly in the nucleus amd exerts an opposing effect to CDK8 in VP16-dependent transcriptional activation by being a negative regulator. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDC2L6 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd07867); members share this curated model.
