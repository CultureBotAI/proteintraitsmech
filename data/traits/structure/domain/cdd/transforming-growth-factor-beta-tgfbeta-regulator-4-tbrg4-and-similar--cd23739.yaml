identifier: CDD:cd23739
label: "transforming growth factor beta (TGFbeta) regulator 4 (TBRG4) and similar proteins; predicted alpha-helical domain N-terminal to FAST kinase-like protein, subdomain 1 (FAST_1). TBRG4 also called cell cycle progression restoration protein 2 or Fas-activated serine-threonine (FAST) kinase domain-containing protein 4, is a regulator of TGFbeta and is implicated in numerous types of cancer. It serves a role in the tumorigenesis of lung cancer via deregulation of DNA damage-inducible transcript 3 (DDIT3), caveolin 1 (CAV1), and ribonucleotide reductase regulatory subunit M2 (RRM2). This domain lies N-terminal to the FAST_1 domain, and is predicted (by AlphaFold) to be alpha-helical, with similarity to structures of members of the 6-hairpin (6 helical hairpin) clan."
definition: >-
  transforming growth factor beta (TGFbeta) regulator 4 (TBRG4) and similar proteins; predicted alpha-helical domain N-terminal to FAST kinase-like protein, subdomain 1 (FAST_1). TBRG4 also called cell cycle progression restoration protein 2 or Fas-activated serine-threonine (FAST) kinase domain-containing protein 4, is a regulator of TGFbeta and is implicated in numerous types of cancer. It serves a role in the tumorigenesis of lung cancer via deregulation of DNA damage-inducible transcript 3 (DDIT3), caveolin 1 (CAV1), and ribonucleotide reductase regulatory subunit M2 (RRM2). This domain lies N-terminal to the FAST_1 domain, and is predicted (by AlphaFold) to be alpha-helical, with similarity to structures of members of the 6-hairpin (6 helical hairpin) clan. — an NCBI CDD conserved domain (cd23739); members share this curated model.
