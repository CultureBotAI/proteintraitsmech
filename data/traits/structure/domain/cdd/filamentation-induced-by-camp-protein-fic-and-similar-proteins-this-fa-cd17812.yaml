identifier: CDD:cd17812
label: "filamentation induced by cAMP protein Fic and similar proteins. This family consists of the Fic (filamentation induced by cAMP) protein and proteins similar to Fic. The Fic protein is involved in cell division and is suggested to be involved in the synthesis of PAB or folate, indicating that the Fic protein and cAMP are involved in a regulatory mechanism of cell division via folate metabolism. Most members of this family contain a central conserved motif HPFXXGNG, which is part of the ATP-binding site. Fic domains are presumed to act as adenosine monophosphate-protein transferases (EC 2.7.7.n1)"
definition: >-
  filamentation induced by cAMP protein Fic and similar proteins. This family consists of the Fic (filamentation induced by cAMP) protein and proteins similar to Fic. The Fic protein is involved in cell division and is suggested to be involved in the synthesis of PAB or folate, indicating that the Fic protein and cAMP are involved in a regulatory mechanism of cell division via folate metabolism. Most members of this family contain a central conserved motif HPFXXGNG, which is part of the ATP-binding site. Fic domains are presumed to act as adenosine monophosphate-protein transferases (EC 2.7.7.n1) — an NCBI CDD conserved domain (cd17812); members share this curated model.
