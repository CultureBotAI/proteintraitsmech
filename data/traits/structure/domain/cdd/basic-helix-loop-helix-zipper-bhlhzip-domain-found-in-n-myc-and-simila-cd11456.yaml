identifier: CDD:cd11456
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in N-Myc and similar proteins. N-Myc, also termed Class E basic helix-loop-helix protein 37 (bHLHe37), is a bHLHZip proto-oncogene protein that positively regulates the transcription of MYCNOS in neuroblastoma cells. It is also essential during embryonic development. N-Myc has a critical role in regulating the switch between proliferation and differentiation of progenitor cells. It binds DNA as a heterodimer with MAX. The family also includes S-Myc, encoded by rat or mouse intronless myc gene, which has apoptosis-inducing activity."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in N-Myc and similar proteins. N-Myc, also termed Class E basic helix-loop-helix protein 37 (bHLHe37), is a bHLHZip proto-oncogene protein that positively regulates the transcription of MYCNOS in neuroblastoma cells. It is also essential during embryonic development. N-Myc has a critical role in regulating the switch between proliferation and differentiation of progenitor cells. It binds DNA as a heterodimer with MAX. The family also includes S-Myc, encoded by rat or mouse intronless myc gene, which has apoptosis-inducing activity. — an NCBI CDD conserved domain (cd11456); members share this curated model.
