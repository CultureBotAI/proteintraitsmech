identifier: CDD:cd13696
label: "The substrate binding domain of putative amino acid transporter; the type 2 periplasmic binding protein fold. This group includes the periplamic-binding protein component of a putative amino acid ABC transporter from Agrobacterium tumefaciens and its related proteins. The putative Atu4678-like domain belongs to the type 2 periplasmic binding protein fold superfamily (PBP2), whose many members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. The PBP2 proteins are typically comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis."
