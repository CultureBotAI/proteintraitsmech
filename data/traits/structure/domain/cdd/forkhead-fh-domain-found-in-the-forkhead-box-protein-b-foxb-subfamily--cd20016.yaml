identifier: CDD:cd20016
label: "Forkhead (FH) domain found in the Forkhead box protein B (FOXB) subfamily. The FOXB subfamily includes two winged helix transcription factors, FOXB1 (also called transcription factor FKH-5) and FOXB2 (also called transcription factor FKH-4). FOXB1 controls development of mammary glands and regions of the central nervous system (CNS) that regulate the milk-ejection reflex. It is essential for access of mammillothalamic axons to the thalamus. FOXB2 may act as a tumor suppressor; it has been found to inhibit the malignant characteristics of the pancreatic cancer cell line Panc-1 in vitro. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in the Forkhead box protein B (FOXB) subfamily. The FOXB subfamily includes two winged helix transcription factors, FOXB1 (also called transcription factor FKH-5) and FOXB2 (also called transcription factor FKH-4). FOXB1 controls development of mammary glands and regions of the central nervous system (CNS) that regulate the milk-ejection reflex. It is essential for access of mammillothalamic axons to the thalamus. FOXB2 may act as a tumor suppressor; it has been found to inhibit the malignant characteristics of the pancreatic cancer cell line Panc-1 in vitro. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20016); members share this curated model.
