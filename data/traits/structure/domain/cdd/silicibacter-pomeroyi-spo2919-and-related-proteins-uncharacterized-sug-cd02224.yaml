identifier: CDD:cd02224
label: "Silicibacter pomeroyi SPO2919 and related proteins, uncharacterized sugar phosphate isomerase with a cupin domain. This family includes proteins similar to sugar phosphate isomerase SPO2919 from Silicibacter pomeroyi and Afe_0303 from Acidithiobacillus ferrooxidans, but are as yet uncharacterized. Structures of these proteins show a cupin fold with a conserved \"jelly roll-like\" beta-barrel fold that form a homodimer."
definition: >-
  Silicibacter pomeroyi SPO2919 and related proteins, uncharacterized sugar phosphate isomerase with a cupin domain. This family includes proteins similar to sugar phosphate isomerase SPO2919 from Silicibacter pomeroyi and Afe_0303 from Acidithiobacillus ferrooxidans, but are as yet uncharacterized. Structures of these proteins show a cupin fold with a conserved "jelly roll-like" beta-barrel fold that form a homodimer. — an NCBI CDD conserved domain (cd02224); members share this curated model.
