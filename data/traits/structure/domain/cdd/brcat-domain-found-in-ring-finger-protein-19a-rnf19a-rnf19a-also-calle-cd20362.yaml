identifier: CDD:cd20362
label: "BRcat domain found in RING finger protein 19A (RNF19A). RNF19A, also called double ring-finger protein (Dorfin) or p38, is a transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligase that localizes to the ubiquitylated inclusions in Parkinson's disease (PD), dementia with Lewy bodies (LBs), multiple system atrophy, and amyotrophic lateral sclerosis (ALS). It interacts with Psmc3, a protein component of the 19S regulatory cap of the 26S proteasome, and further participates in the ubiquitin-proteasome system in acrosome biogenesis, spermatid head shaping, and development of the head-tail coupling apparatus and tail. It modulates the ubiquitination and degradation of Calcium-sensing receptor (CaR), which may contribute to a general mechanism for CaR quality control during biosynthesis. Moreover, RNF19A can also ubiquitylate mutant superoxide dismutase 1 (SOD1), the causative gene of familial ALS. It may associate with the endoplasmic reticulum-associated degradation (ERAD) pathway, which is related to the pathogenesis of neurodegenerative disorders, such as PD or Alzheimer's disease. It is also involved in the pathogenic process of PD and LB formation by ubiquitylation of synphilin-1. RNF19A contains an RBR domain followed by three TMs. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the BRcat domain of RNF19A that adopts the same fold as the Rcat domain while lacking the catalytic cysteine residue and ubiquitination activity."
definition: >-
  BRcat domain found in RING finger protein 19A (RNF19A). RNF19A, also called double ring-finger protein (Dorfin) or p38, is a transmembrane (TM) domain-containing RBR-type E3 ubiquitin-protein ligase that localizes to the ubiquitylated inclusions in Parkinson's disease (PD), dementia with Lewy bodies (LBs), multiple system atrophy, and amyotrophic lateral sclerosis (ALS). It interacts with Psmc3, a protein component of the 19S regulatory cap of the 26S proteasome, and further participates in the ubiquitin-proteasome system in acrosome biogenesis, spermatid head shaping, and development of the head-tail coupling apparatus and tail. It modulates the ubiquitination and degradation of Calcium-sensing receptor (CaR), which may contribute to a general mechanism for CaR quality control during biosynthesis. Moreover, RNF19A can also ubiquitylate mutant superoxide dismutase 1 (SOD1), the causative gene of familial ALS. It may associate with the endoplasmic reticulum-associated degradation (ERAD) pathway, which is related to the pathogenesis of neurodegenerative disorders, such as PD or Alzheimer's disease. It is also involved in the pathogenic process of PD and LB formation by ubiquitylation of synphilin-1. RNF19A contains an RBR domain followed by three TMs. The RBR domain was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the BRcat domain of RNF19A that adopts the same fold as the Rcat domain while lacking the catalytic cysteine residue and ubiquitination activity. — an NCBI CDD conserved domain (cd20362); members share this curated model.
