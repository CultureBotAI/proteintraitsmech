identifier: CDD:cd18170
label: "PRC-barrel domain found in calmodulin-regulated spectrin-associated protein 2 (CAMSAP2). CAMSAP2, also termed calmodulin-regulated spectrin-associated protein 1-like protein 1 (CAMSAP1L1), is a microtubule minus-end binding protein that may regulate the organization of non-centrosomal microtubules. It may also modulate the nucleation and the polymerization of microtubules. Moreover, CAMSAP2 may be involved in regulation of the organization of cellular organelles including the Golgi and the early endosomes through the microtubule cytoskeleton."
definition: >-
  PRC-barrel domain found in calmodulin-regulated spectrin-associated protein 2 (CAMSAP2). CAMSAP2, also termed calmodulin-regulated spectrin-associated protein 1-like protein 1 (CAMSAP1L1), is a microtubule minus-end binding protein that may regulate the organization of non-centrosomal microtubules. It may also modulate the nucleation and the polymerization of microtubules. Moreover, CAMSAP2 may be involved in regulation of the organization of cellular organelles including the Golgi and the early endosomes through the microtubule cytoskeleton. — an NCBI CDD conserved domain (cd18170); members share this curated model.
