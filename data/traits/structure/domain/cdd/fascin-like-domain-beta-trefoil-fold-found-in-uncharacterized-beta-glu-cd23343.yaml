identifier: CDD:cd23343
label: "fascin-like domain, beta-trefoil fold, found in uncharacterized beta-glucosidase-like proteins. This subfamily includes a group of uncharacterized proteins which may be related to beta-glucosidase/glycosyl hydrolase 3 family. They contain a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  fascin-like domain, beta-trefoil fold, found in uncharacterized beta-glucosidase-like proteins. This subfamily includes a group of uncharacterized proteins which may be related to beta-glucosidase/glycosyl hydrolase 3 family. They contain a fascin-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23343); members share this curated model.
