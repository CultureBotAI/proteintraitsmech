identifier: CDD:cd21837
label: "Pseudomonas syringae coiled-coil effector AvrRps4 C-terminal region, and regions in similar proteins. This model includes the C-terminal region of AvrRps4, a type III-secreted (T3S) effector protein originally identified in Pseudomonas syringae pv. pisi, a causal agent of bacterial blight in pea. AvrRps4 triggers RPS4 (resistance to P. syringae 4)-dependent immunity in resistant accessions of Arabidopsis. AvrRps4 is a bipartite effector, processed upon entry in planta by cleavage between two glycine residues, generating two protein parts, AvrRps4N and AvrRps4C. Mutation studies have shown that an electronegative surface patch in AvrRps4(C) is required for recognition by RPS4; mutations in this region have been shown to uncouple triggering of the hypersensitive response from disease resistance. The N-terminal part of AvrRps4 was previously assumed to only function in effector secretion into the host cell; however, in Arabidopsis, which uses a pair of resistance proteins, RRS1 and RPS4, both AvrRps4 parts are required for triggering resistance in Arabidopsis, and in fact, AvrRps4N on its own has some functions of an effector, implying that the fusion of the two AvrRps4 parts may have arisen to counteract plant defenses."
definition: >-
  Pseudomonas syringae coiled-coil effector AvrRps4 C-terminal region, and regions in similar proteins. This model includes the C-terminal region of AvrRps4, a type III-secreted (T3S) effector protein originally identified in Pseudomonas syringae pv. pisi, a causal agent of bacterial blight in pea. AvrRps4 triggers RPS4 (resistance to P. syringae 4)-dependent immunity in resistant accessions of Arabidopsis. AvrRps4 is a bipartite effector, processed upon entry in planta by cleavage between two glycine residues, generating two protein parts, AvrRps4N and AvrRps4C. Mutation studies have shown that an electronegative surface patch in AvrRps4(C) is required for recognition by RPS4; mutations in this region have been shown to uncouple triggering of the hypersensitive response from disease resistance. The N-terminal part of AvrRps4 was previously assumed to only function in effector secretion into the host cell; however, in Arabidopsis, which uses a pair of resistance proteins, RRS1 and RPS4, both AvrRps4 parts are required for triggering resistance in Arabidopsis, and in fact, AvrRps4N on its own has some functions of an effector, implying that the fusion of the two AvrRps4 parts may have arisen to counteract plant defenses. — an NCBI CDD conserved domain (cd21837); members share this curated model.
