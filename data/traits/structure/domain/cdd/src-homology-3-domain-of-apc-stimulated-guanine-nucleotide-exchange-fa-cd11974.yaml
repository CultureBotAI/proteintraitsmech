identifier: CDD:cd11974
label: "Src homology 3 domain of APC-Stimulated guanine nucleotide Exchange Factor 2. ASEF2, also called Spermatogenesis-associated protein 13 (SPATA13), is a GEF that localizes with actin at the leading edge of cells and is important in cell migration and adhesion dynamics. GEFs activate small GTPases by exchanging bound GDP for free GTP. ASEF2 can activate both Rac 1 and Cdc42, but only Rac1 activation is necessary for increased cell migration and adhesion turnover. Together with APC (adenomatous polyposis coli) and Neurabin2, a scaffold protein that binds F-actin, it is involved in regulating HGF-induced cell migration. ASEF2 contains a SH3 domain followed by RhoGEF (also called Dbl-homologous or DH) and Pleckstrin Homology (PH) domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of APC-Stimulated guanine nucleotide Exchange Factor 2. ASEF2, also called Spermatogenesis-associated protein 13 (SPATA13), is a GEF that localizes with actin at the leading edge of cells and is important in cell migration and adhesion dynamics. GEFs activate small GTPases by exchanging bound GDP for free GTP. ASEF2 can activate both Rac 1 and Cdc42, but only Rac1 activation is necessary for increased cell migration and adhesion turnover. Together with APC (adenomatous polyposis coli) and Neurabin2, a scaffold protein that binds F-actin, it is involved in regulating HGF-induced cell migration. ASEF2 contains a SH3 domain followed by RhoGEF (also called Dbl-homologous or DH) and Pleckstrin Homology (PH) domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11974); members share this curated model.
