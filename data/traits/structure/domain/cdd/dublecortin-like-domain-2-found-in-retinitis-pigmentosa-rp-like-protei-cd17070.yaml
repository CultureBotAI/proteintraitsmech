identifier: CDD:cd17070
label: "Dublecortin-like domain 2 found in retinitis pigmentosa (RP)-like protein. RP-like protein family is part of doublecortin (DCX) superfamily with double tandem DCX repeats that are associated with retinitis pigmentosa. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport.  RP-like proteins are colocalized to the photoreceptor and share a function in outer segment disc morphogenesis."
definition: >-
  Dublecortin-like domain 2 found in retinitis pigmentosa (RP)-like protein. RP-like protein family is part of doublecortin (DCX) superfamily with double tandem DCX repeats that are associated with retinitis pigmentosa. DCX is a microtubule-associated protein (MAP) with a stable ubiquitin-like tertiary fold. Microtubules are key components of cytoskeleton that are involved in cell movement, shape determination, division and transport. RP-like proteins are colocalized to the photoreceptor and share a function in outer segment disc morphogenesis. — an NCBI CDD conserved domain (cd17070); members share this curated model.
