identifier: CDD:cd00339
label: "Ribosomal small subunit protein uS14. Ribosomal protein uS14 is a member of the small ribosomal subunit forming a tight cluster with subunits S3 and S10 in the head region of the ribosome.  This family includes the bacterial 30S ribosomal protein S14 and its orthologs in the archaea and known as S29e in eukaryotes.  Biochemical studies implicated substantial loss of activity in ribosomes lacking S14."
definition: >-
  Ribosomal small subunit protein uS14. Ribosomal protein uS14 is a member of the small ribosomal subunit forming a tight cluster with subunits S3 and S10 in the head region of the ribosome. This family includes the bacterial 30S ribosomal protein S14 and its orthologs in the archaea and known as S29e in eukaryotes. Biochemical studies implicated substantial loss of activity in ribosomes lacking S14. — an NCBI CDD conserved domain (cd00339); members share this curated model.
