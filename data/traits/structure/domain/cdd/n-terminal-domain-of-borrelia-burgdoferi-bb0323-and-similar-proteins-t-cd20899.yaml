identifier: CDD:cd20899
label: "N-terminal domain of Borrelia burgdoferi BB0323, and similar proteins. This family contains the N-terminal domain of the major virulence factor BB0323 from Lyme disease agent Borrelia burgdoferi. The function of this periplasmic BB0323 is associated with outer membrane integrity, cell fission and infectivity. After expression and transport to the periplasm, BB0323 is cleaved into the N-terminal and C-terminal domains by the periplasmic serine protease BB0104. The resulting N-terminal is sufficient to ensure survival of B. burgdorferi throughout its infection cycle in the mouse tick, while the C-terminal LysM domain is known to bind peptidoglycan in bacteria. The overall fold of this N-terminal domain belongs to the spectrin superfamily, with structural similarity to the bacterial spectrin-like protein EzrA, which plays a role in cell division by regulating the polymerization of FtsZ; however, BB0323, a periplasmic protein containing only two spectrin repeats, likely serves some other function and has a different binding partner, considering EzrA proteins are cytosolic and mainly composed of 5-100 spectrin repeats. It is possible that BB0323 utilizes spectrin repeats to link the outer membrane to the peptidoglycan layer or currently unidentified components of the inner membrane."
definition: >-
  N-terminal domain of Borrelia burgdoferi BB0323, and similar proteins. This family contains the N-terminal domain of the major virulence factor BB0323 from Lyme disease agent Borrelia burgdoferi. The function of this periplasmic BB0323 is associated with outer membrane integrity, cell fission and infectivity. After expression and transport to the periplasm, BB0323 is cleaved into the N-terminal and C-terminal domains by the periplasmic serine protease BB0104. The resulting N-terminal is sufficient to ensure survival of B. burgdorferi throughout its infection cycle in the mouse tick, while the C-terminal LysM domain is known to bind peptidoglycan in bacteria. The overall fold of this N-terminal domain belongs to the spectrin superfamily, with structural similarity to the bacterial spectrin-like protein EzrA, which plays a role in cell division by regulating the polymerization of FtsZ; however, BB0323, a periplasmic protein containing only two spectrin repeats, likely serves some other function and has a different binding partner, considering EzrA proteins are cytosolic and mainly composed of 5-100 spectrin repeats. It is possible that BB0323 utilizes spectrin repeats to link the outer membrane to the peptidoglycan layer or currently unidentified components of the inner membrane. — an NCBI CDD conserved domain (cd20899); members share this curated model.
