identifier: CDD:cd16958
label: "Fe-S cluster binding domain found in the N-terminal of 4-hydroxyphenylacetate decarboxylase (4-Hpd) small subunit and similar proteins. 4-Hpd (EC 4.1.1.83), also termed p-hydroxyphenylacetate decarboxylase (p-Hpd), is the prototype of a new class of Fe-S cluster-dependent glycyl radical enzymes (Fe-S GREs) proposed to work together with 4-hydroxyphenylacetate decarboxylase activating enzyme (4Hpd-AE), and use a glycyl/thiyl radical dyad to catalyze the last reaction in the fermentative production of p-cresol from tyrosine in several facultative and obligately anaerobic bacteria. 4-Hpd forms a hetero-octamer consisting of 4 large (HpdB) subunits and 4 small (HpdC) subunits. It contains two [4Fe-4S] clusters coordinated by an extra small subunit of unknown function."
definition: >-
  Fe-S cluster binding domain found in the N-terminal of 4-hydroxyphenylacetate decarboxylase (4-Hpd) small subunit and similar proteins. 4-Hpd (EC 4.1.1.83), also termed p-hydroxyphenylacetate decarboxylase (p-Hpd), is the prototype of a new class of Fe-S cluster-dependent glycyl radical enzymes (Fe-S GREs) proposed to work together with 4-hydroxyphenylacetate decarboxylase activating enzyme (4Hpd-AE), and use a glycyl/thiyl radical dyad to catalyze the last reaction in the fermentative production of p-cresol from tyrosine in several facultative and obligately anaerobic bacteria. 4-Hpd forms a hetero-octamer consisting of 4 large (HpdB) subunits and 4 small (HpdC) subunits. It contains two [4Fe-4S] clusters coordinated by an extra small subunit of unknown function. — an NCBI CDD conserved domain (cd16958); members share this curated model.
