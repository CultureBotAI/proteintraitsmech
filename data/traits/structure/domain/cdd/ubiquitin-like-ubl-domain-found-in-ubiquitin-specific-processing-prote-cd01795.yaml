identifier: CDD:cd01795
label: "ubiquitin-like (Ubl) domain found in ubiquitin-specific-processing protease 48 (USP48) and similar proteins. USP48, also termed USP31, or deubiquitinating enzyme 48, or ubiquitin thioesterase 48, or ubiquitin carboxyl-terminal hydrolase 48, belongs to the ubiquitin specific protease (USP) family that is one of at least seven deubiquitylating enzyme (DUB) families capable of deconjugating ubiquitin (Ub)and ubiquitin-like (Ubl) adducts. While the USP proteins have a conserved catalytic core domain, USP48 differs in its domain architecture. It contains an N-terminal USP domain, three DUSP (domain present in ubiquitin-specific protease) domains, and a C-terminal Ubl domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. USP48 is a deubiquitinating enzyme that interacts with TNF receptor-associated factor 2 (TRAF2) and has been implicated in activation of nuclear factor-kappaB (NF-kappaB). Moreover, as a nuclear deubiquitinase regulated by casein kinase 2 (CK2), USP48 controls the ubiquitin/proteasome-system (UPS)-dependent turnover of activated NF-kappaB/RelA in the nucleus together with the COP9 signalosome, suggesting a role of USP48 in a timely control of immune responses."
definition: >-
  ubiquitin-like (Ubl) domain found in ubiquitin-specific-processing protease 48 (USP48) and similar proteins. USP48, also termed USP31, or deubiquitinating enzyme 48, or ubiquitin thioesterase 48, or ubiquitin carboxyl-terminal hydrolase 48, belongs to the ubiquitin specific protease (USP) family that is one of at least seven deubiquitylating enzyme (DUB) families capable of deconjugating ubiquitin (Ub)and ubiquitin-like (Ubl) adducts. While the USP proteins have a conserved catalytic core domain, USP48 differs in its domain architecture. It contains an N-terminal USP domain, three DUSP (domain present in ubiquitin-specific protease) domains, and a C-terminal Ubl domain with a beta-grasp Ubl fold, a common structure involved in protein-protein interactions. USP48 is a deubiquitinating enzyme that interacts with TNF receptor-associated factor 2 (TRAF2) and has been implicated in activation of nuclear factor-kappaB (NF-kappaB). Moreover, as a nuclear deubiquitinase regulated by casein kinase 2 (CK2), USP48 controls the ubiquitin/proteasome-system (UPS)-dependent turnover of activated NF-kappaB/RelA in the nucleus together with the COP9 signalosome, suggesting a role of USP48 in a timely control of immune responses. — an NCBI CDD conserved domain (cd01795); members share this curated model.
