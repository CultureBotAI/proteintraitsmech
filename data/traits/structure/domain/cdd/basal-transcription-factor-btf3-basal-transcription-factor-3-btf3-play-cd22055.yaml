identifier: CDD:cd22055
label: "basal transcription factor BTF3. Basal transcription factor 3 (BTF3) plays an important role in the transcriptional regulation linked to growth and development in eukaryotes. In mammals, the BTF3 gene encodes two alternative splicing isoforms, BTF3a and BTF3b. The full length BTF3a protein excites transcription. The shortened BTF3b, which lacks the first 44 amino-terminal extension, is a component of the nascent polypeptide-associated complex (NAC), involved in regulating protein localization during translation. BTF3 is involved in oncogenesis; overexpression of BTF3 has been shown to be associated with a variety of malignancies such as cancer of the colon, pancreas, stomach, prostate and breast. It is upregulated in hypopharyngeal squamous cell carcinoma (HSCC) tumors correlating with lymph node metastasis and tumor promotion, thus indicating that BTF3 is a potential therapeutic target and prognostic biomarker for HSCC. BTF3 has also been implicated in the pathogenesis of osteosarcoma (OS), a malignant cancer that affects rapidly proliferating bones, and has a poor prognosis."
