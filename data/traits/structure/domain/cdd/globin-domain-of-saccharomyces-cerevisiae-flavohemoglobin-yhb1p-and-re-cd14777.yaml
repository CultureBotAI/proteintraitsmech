identifier: CDD:cd14777
label: "Globin domain of Saccharomyces cerevisiae flavohemoglobin (Yhb1p) and related domains. FlavoHbs function primarily as nitric oxide dioxygenases (NODs, EC 1.14.12.17), converting NO and O2 to inert NO3- (nitrate). They have an N-terminal globin domain and a C-terminal ferredoxin reductase-like NAD- and FAD-binding domain, and use the reducing power of cellular NAD(P)H to drive regeneration of the ferrous heme. They protect from nitrosative stress (the broad range of cellular toxicities caused by NO), and modulate NO signaling pathways. S. cerevisiae Yhb1p has been shown to protect against nitrosative stress and to control ferric reductase activity; it may participate in regulating the activity of plasma membrane ferric reductase(s). Also included in this subfamily is Dictyostelium discoideum FlavoHb, the expression of which affects D. discoideum development."
definition: >-
  Globin domain of Saccharomyces cerevisiae flavohemoglobin (Yhb1p) and related domains. FlavoHbs function primarily as nitric oxide dioxygenases (NODs, EC 1.14.12.17), converting NO and O2 to inert NO3- (nitrate). They have an N-terminal globin domain and a C-terminal ferredoxin reductase-like NAD- and FAD-binding domain, and use the reducing power of cellular NAD(P)H to drive regeneration of the ferrous heme. They protect from nitrosative stress (the broad range of cellular toxicities caused by NO), and modulate NO signaling pathways. S. cerevisiae Yhb1p has been shown to protect against nitrosative stress and to control ferric reductase activity; it may participate in regulating the activity of plasma membrane ferric reductase(s). Also included in this subfamily is Dictyostelium discoideum FlavoHb, the expression of which affects D. discoideum development. — an NCBI CDD conserved domain (cd14777); members share this curated model.
