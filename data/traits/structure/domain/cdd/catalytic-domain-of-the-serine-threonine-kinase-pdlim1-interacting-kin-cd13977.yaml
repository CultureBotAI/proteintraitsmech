identifier: CDD:cd13977
label: "Catalytic domain of the Serine/Threonine kinase, PDLIM1 interacting kinase 1 like. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PDIK1L is also called STK35 or CLIK-1. It is predominantly a nuclear protein which is capable of autophosphorylation. Through its interaction with the PDZ-LIM protein CLP-36, it is localized to actin stress fibers. The PDIK1L subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase (PI3K)."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, PDLIM1 interacting kinase 1 like. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PDIK1L is also called STK35 or CLIK-1. It is predominantly a nuclear protein which is capable of autophosphorylation. Through its interaction with the PDZ-LIM protein CLP-36, it is localized to actin stress fibers. The PDIK1L subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase (PI3K). — an NCBI CDD conserved domain (cd13977); members share this curated model.
