identifier: CDD:cd08364
label: "fosfomycin resistant protein subfamily FosX. This subfamily family contains FosX, a fosfomycin resistant protein. FosX is a Mn(II)-dependent fosfomycin-specific epoxide hydrolase. Fosfomycin inhibits the enzyme UDP-Nacetylglucosamine-3-enolpyruvyltransferase (MurA), which catalyzes the first committed step in bacterial cell wall biosynthesis. FosX catalyzes the addition of a water molecule to the C1 position of the antibiotic with inversion of the configuration at C1 in the presence of Mn(II). The hydrated fosfomycin loses the inhibition activity. FosX is evolutionarily related to glyoxalase I and type I extradiol dioxygenases."
definition: >-
  fosfomycin resistant protein subfamily FosX. This subfamily family contains FosX, a fosfomycin resistant protein. FosX is a Mn(II)-dependent fosfomycin-specific epoxide hydrolase. Fosfomycin inhibits the enzyme UDP-Nacetylglucosamine-3-enolpyruvyltransferase (MurA), which catalyzes the first committed step in bacterial cell wall biosynthesis. FosX catalyzes the addition of a water molecule to the C1 position of the antibiotic with inversion of the configuration at C1 in the presence of Mn(II). The hydrated fosfomycin loses the inhibition activity. FosX is evolutionarily related to glyoxalase I and type I extradiol dioxygenases. — an NCBI CDD conserved domain (cd08364); members share this curated model.
