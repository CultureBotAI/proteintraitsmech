identifier: CDD:cd21741
label: "WDB1 domain found in suppressor of zeste 12 protein (SUZ12) and similar proteins. SUZ12, also called chromatin precipitated E2F target 9 protein (ChET 9 protein), or joined to JAZF1 protein, is a Polycomb group (PcG) protein that is a component of the PRC2/EED-EZH2 complex, which methylates 'Lys-9' (H3K9me) and 'Lys-27' (H3K27me) of histone H3, leading to transcriptional repression of the affected target gene. The PRC2/EED-EZH2 complex may also serve as a recruiting platform for DNA methyltransferases, thereby linking two epigenetic repression systems. The model corresponds to WDB1, a WD40-binding domain closely associated with Rbbp4."
definition: >-
  WDB1 domain found in suppressor of zeste 12 protein (SUZ12) and similar proteins. SUZ12, also called chromatin precipitated E2F target 9 protein (ChET 9 protein), or joined to JAZF1 protein, is a Polycomb group (PcG) protein that is a component of the PRC2/EED-EZH2 complex, which methylates 'Lys-9' (H3K9me) and 'Lys-27' (H3K27me) of histone H3, leading to transcriptional repression of the affected target gene. The PRC2/EED-EZH2 complex may also serve as a recruiting platform for DNA methyltransferases, thereby linking two epigenetic repression systems. The model corresponds to WDB1, a WD40-binding domain closely associated with Rbbp4. — an NCBI CDD conserved domain (cd21741); members share this curated model.
