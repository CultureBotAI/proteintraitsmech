identifier: CDD:cd18125
label: "C-terminal catalytic domain of N-acetyl-gamma-glutamyl-phosphate reductase (AGPR) and similar proteins. N-acetyl-gamma-glutamyl-phosphate reductase (AGPR; EC 1.2.1.38), also called N-acetyl-glutamate semialdehyde dehydrogenase, or NAGSA dehydrogenase, catalyzes the third step in the biosynthesis of arginine from glutamate, the NADP-dependent reduction of N-acetyl-5-glutamyl phosphate into N-acetylglutamate 5-semialdehyde. In bacteria it is a monofunctional protein of 35 to 38kDa (gene argC), while in fungi it is part of a bifunctional mitochondrial enzyme (gene ARG5,6, arg11 or arg-6) which contains a N-terminal acetylglutamate kinase (EC 2.7.2.8) domain and a C-terminal AGPR domain. There are two related families (type 1 and type 2) of N-acetyl-gamma-glutamyl-phosphate reductase, which differ by phylogeny, similarity clustering, and gap architecture in a multiple sequence alignment. This family also includes LysY (LysW-L-2-aminoadipate/LysW-L-glutamate phosphate reductase, EC 1.2.1.103/EC 1.2.1.106), which is involved in both the arginine and lysine biosynthetic pathways."
definition: >-
  C-terminal catalytic domain of N-acetyl-gamma-glutamyl-phosphate reductase (AGPR) and similar proteins. N-acetyl-gamma-glutamyl-phosphate reductase (AGPR; EC 1.2.1.38), also called N-acetyl-glutamate semialdehyde dehydrogenase, or NAGSA dehydrogenase, catalyzes the third step in the biosynthesis of arginine from glutamate, the NADP-dependent reduction of N-acetyl-5-glutamyl phosphate into N-acetylglutamate 5-semialdehyde. In bacteria it is a monofunctional protein of 35 to 38kDa (gene argC), while in fungi it is part of a bifunctional mitochondrial enzyme (gene ARG5,6, arg11 or arg-6) which contains a N-terminal acetylglutamate kinase (EC 2.7.2.8) domain and a C-terminal AGPR domain. There are two related families (type 1 and type 2) of N-acetyl-gamma-glutamyl-phosphate reductase, which differ by phylogeny, similarity clustering, and gap architecture in a multiple sequence alignment. This family also includes LysY (LysW-L-2-aminoadipate/LysW-L-glutamate phosphate reductase, EC 1.2.1.103/EC 1.2.1.106), which is involved in both the arginine and lysine biosynthetic pathways. — an NCBI CDD conserved domain (cd18125); members share this curated model.
