identifier: CDD:cd02079
label: "P-type heavy metal-transporting ATPase. Heavy metal-transporting ATPases (Type IB ATPases) transport heavy metal ions (Cu(+), Cu(2+), Zn(2+), Cd(2+), Co(2+), etc.) across biological membranes. These ATPases include mammalian copper-transporting ATPases, ATP7A and ATP7B, Bacillus subtilis CadA which transports cadmium, zinc and cobalt out of the cell, Bacillus subtilis ZosA/PfeT which transports copper, and perhaps also zinc and ferrous iron, Archaeoglobus fulgidus CopA and CopB, Staphylococcus aureus plasmid pI258 CadA, a cadmium-efflux ATPase, and Escherichia coli ZntA which is selective for Pb(2+), Zn(2+), and Cd(2+). The characteristic N-terminal heavy metal associated (HMA) domain of this group is essential for the binding of metal ions. This family belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type heavy metal-transporting ATPase. Heavy metal-transporting ATPases (Type IB ATPases) transport heavy metal ions (Cu(+), Cu(2+), Zn(2+), Cd(2+), Co(2+), etc.) across biological membranes. These ATPases include mammalian copper-transporting ATPases, ATP7A and ATP7B, Bacillus subtilis CadA which transports cadmium, zinc and cobalt out of the cell, Bacillus subtilis ZosA/PfeT which transports copper, and perhaps also zinc and ferrous iron, Archaeoglobus fulgidus CopA and CopB, Staphylococcus aureus plasmid pI258 CadA, a cadmium-efflux ATPase, and Escherichia coli ZntA which is selective for Pb(2+), Zn(2+), and Cd(2+). The characteristic N-terminal heavy metal associated (HMA) domain of this group is essential for the binding of metal ions. This family belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd02079); members share this curated model.
