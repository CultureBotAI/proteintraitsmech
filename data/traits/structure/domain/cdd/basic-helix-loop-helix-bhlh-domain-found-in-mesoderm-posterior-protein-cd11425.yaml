identifier: CDD:cd11425
label: "basic helix-loop-helix (bHLH) domain found in mesoderm posterior protein (Mesp) family. Mesp, a bHLH tissue specific transcription factor, acts as a key regulator of the cardiovascular transcriptional network by inducing directly and/or indirectly the expression of the majority of key cardiovascular transcription factors. The Mesp family includes two bHLH transcription factors, Mesp1 and Mesp2. Mesp1, also termed Class C basic helix-loop-helix protein 5 (bHLHc5), promotes cardiovascular differentiation during embryonic development and embryonic stem cell differentiation. Mesp2, also termed Class C basic helix-loop-helix protein 6 (bHLHc6), plays an important role in somitogenesis. The family also includes mesogenin-1 (Msgn1) and similar proteins. Msgn1, also termed paraxial mesoderm-specific mesogenin1, or pMesogenin1 (pMsgn1), is a bHLH transcription factor required for maturation and segmentation of paraxial mesoderm. It may regulate the expression of T-box transcription factors essential for mesoderm formation and differentiation."
definition: >-
  basic helix-loop-helix (bHLH) domain found in mesoderm posterior protein (Mesp) family. Mesp, a bHLH tissue specific transcription factor, acts as a key regulator of the cardiovascular transcriptional network by inducing directly and/or indirectly the expression of the majority of key cardiovascular transcription factors. The Mesp family includes two bHLH transcription factors, Mesp1 and Mesp2. Mesp1, also termed Class C basic helix-loop-helix protein 5 (bHLHc5), promotes cardiovascular differentiation during embryonic development and embryonic stem cell differentiation. Mesp2, also termed Class C basic helix-loop-helix protein 6 (bHLHc6), plays an important role in somitogenesis. The family also includes mesogenin-1 (Msgn1) and similar proteins. Msgn1, also termed paraxial mesoderm-specific mesogenin1, or pMesogenin1 (pMsgn1), is a bHLH transcription factor required for maturation and segmentation of paraxial mesoderm. It may regulate the expression of T-box transcription factors essential for mesoderm formation and differentiation. — an NCBI CDD conserved domain (cd11425); members share this curated model.
