identifier: CDD:cd12394
label: "RNA recognition motif 1 (RRM1) found in RNA-binding protein 34 (RBM34) and similar proteins. This subfamily corresponds to the RRM1 of RBM34, a putative RNA-binding protein containing two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). Although the function of RBM34 remains unclear currently, its RRM domains may participate in mRNA processing. RBM34 may act as an mRNA processing-related protein."
definition: >-
  RNA recognition motif 1 (RRM1) found in RNA-binding protein 34 (RBM34) and similar proteins. This subfamily corresponds to the RRM1 of RBM34, a putative RNA-binding protein containing two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). Although the function of RBM34 remains unclear currently, its RRM domains may participate in mRNA processing. RBM34 may act as an mRNA processing-related protein. — an NCBI CDD conserved domain (cd12394); members share this curated model.
