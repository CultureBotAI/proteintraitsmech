identifier: CDD:cd04975
label: "Fourth immunoglobulin (Ig)-like domain of stem cell factor receptor (SCFR), and similar domains; member of the I-set of IgSF domains. The members here are composed of the fourth immunoglobulin (Ig)-like domain of stem cell factor receptor (SCFR). In addition to SCFR, this group also includes the fourth Ig domain of macrophage colony stimulating factor receptor (M-CSF-R). SCFR, also called receptor tyrosine kinase KIT or proto-oncogene c-Kit, contains an extracellular component having five Ig-like domains, a transmembrane segment, and a cytoplasmic portion having protein tyrosine kinase activity. SCFR and its ligand SCF are critical for normal hematopoiesis, mast cell development, melanocytes, and gametogenesis. SCF binds to the second and third Ig-like domains of SCFR, this fourth Ig-like domain participates in SCFR dimerization, which follows ligand binding. Deletion of this fourth SCFR Ig-like domain abolishes the ligand-induced dimerization of SCFR and completely inhibits signal transduction. M-CSF-R, also called proto-oncogene c-Fms, acts as cell-surface receptor for CSF1 and IL34 and plays an essential role in the regulation of survival, proliferation and differentiation of hematopoietic precursor cells, such as macrophages and monocytes. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C\" strand."
definition: >-
  Fourth immunoglobulin (Ig)-like domain of stem cell factor receptor (SCFR), and similar domains; member of the I-set of IgSF domains. The members here are composed of the fourth immunoglobulin (Ig)-like domain of stem cell factor receptor (SCFR). In addition to SCFR, this group also includes the fourth Ig domain of macrophage colony stimulating factor receptor (M-CSF-R). SCFR, also called receptor tyrosine kinase KIT or proto-oncogene c-Kit, contains an extracellular component having five Ig-like domains, a transmembrane segment, and a cytoplasmic portion having protein tyrosine kinase activity. SCFR and its ligand SCF are critical for normal hematopoiesis, mast cell development, melanocytes, and gametogenesis. SCF binds to the second and third Ig-like domains of SCFR, this fourth Ig-like domain participates in SCFR dimerization, which follows ligand binding. Deletion of this fourth SCFR Ig-like domain abolishes the ligand-induced dimerization of SCFR and completely inhibits signal transduction. M-CSF-R, also called proto-oncogene c-Fms, acts as cell-surface receptor for CSF1 and IL34 and plays an essential role in the regulation of survival, proliferation and differentiation of hematopoietic precursor cells, such as macrophages and monocytes. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C" strand. — an NCBI CDD conserved domain (cd04975); members share this curated model.
