identifier: CDD:cd24038
label: "nucleotide-binding domain (NBD) of Legionella pneumophila ectonucleoside triphosphate diphosphohydrolase I (Lp1NTPDase/Lpg1905) and similar proteins. The family corresponds to a group of proteins similar to Lp1NTPDase, which is a structural and functional homolog of the eukaryotic nucleoside triphosphate diphosphohydrolases (NTPDases) that control the extracellular levels of nucleotides (NTPs). Lp1NTPDase contributes to host-pathogen interactions through its NTPDase activity. Unlike most of the mammalian NTPDases, Lp1NTPDase is soluble and does not require membrane association to regulate its catalytic activity."
definition: >-
  nucleotide-binding domain (NBD) of Legionella pneumophila ectonucleoside triphosphate diphosphohydrolase I (Lp1NTPDase/Lpg1905) and similar proteins. The family corresponds to a group of proteins similar to Lp1NTPDase, which is a structural and functional homolog of the eukaryotic nucleoside triphosphate diphosphohydrolases (NTPDases) that control the extracellular levels of nucleotides (NTPs). Lp1NTPDase contributes to host-pathogen interactions through its NTPDase activity. Unlike most of the mammalian NTPDases, Lp1NTPDase is soluble and does not require membrane association to regulate its catalytic activity. — an NCBI CDD conserved domain (cd24038); members share this curated model.
