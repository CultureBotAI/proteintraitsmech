identifier: CDD:cd16704
label: "RING finger, HC subclass, found in RING finger protein RNF20, RNF40, and similar proteins. RNF20, also known as BRE1A, and RNF40, also known as BRE1B, are E3 ubiquitin-protein ligases that work together to form a heterodimeric complex that facilitate the K120 monoubiquitination of histone H2B (H2Bub1), a DNA damage-induced histone modification that is crucial for recruitment of the chromatin remodeler SNF2h to DNA double-strand break (DSB) damage sites. RNF20 regulates the cell cycle and differentiation of neural precursor cells (NPCs) and links histone H2B ubiquitylation with inflammation and inflammation-associated cancer. RNF40, also known as 95 kDa retinoblastoma-associated protein (RBP95), was identified as a novel leucine zipper retinoblastoma protein (pRb)-associated protein that may function as a regulation factor in RNA polymerase II-mediated transcription and/or transcriptional processing. All subfamily members contain a C3HC4-type RING-HC finger at its C-terminus."
definition: >-
  RING finger, HC subclass, found in RING finger protein RNF20, RNF40, and similar proteins. RNF20, also known as BRE1A, and RNF40, also known as BRE1B, are E3 ubiquitin-protein ligases that work together to form a heterodimeric complex that facilitate the K120 monoubiquitination of histone H2B (H2Bub1), a DNA damage-induced histone modification that is crucial for recruitment of the chromatin remodeler SNF2h to DNA double-strand break (DSB) damage sites. RNF20 regulates the cell cycle and differentiation of neural precursor cells (NPCs) and links histone H2B ubiquitylation with inflammation and inflammation-associated cancer. RNF40, also known as 95 kDa retinoblastoma-associated protein (RBP95), was identified as a novel leucine zipper retinoblastoma protein (pRb)-associated protein that may function as a regulation factor in RNA polymerase II-mediated transcription and/or transcriptional processing. All subfamily members contain a C3HC4-type RING-HC finger at its C-terminus. — an NCBI CDD conserved domain (cd16704); members share this curated model.
