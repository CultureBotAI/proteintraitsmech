identifier: CDD:cd14221
label: "Catalytic domain of the Serine/Threonine Kinase, LIM domain kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LIMK1 activation is induced by bone morphogenic protein, vascular endothelial growth factor, and thrombin. It plays roles in microtubule disassembly and cell cycle progression, and is critical in the regulation of neurite outgrowth. LIMK1 knockout mice show abnormalities in dendritic spine morphology and synaptic function. LIMK1 is one of the genes deleted in patients with Williams Syndrome, which is characterized by distinct craniofacial features, cardiovascular problems, as well as behavioral and neurological abnormalities. LIMKs phosphorylate and inactivate cofilin, an actin depolymerizing factor, to induce the reorganization of the actin cytoskeleton. They act downstream of Rho GTPases and are expressed ubiquitously. As regulators of actin dynamics, they contribute to diverse cellular functions such as cell motility, morphogenesis, differentiation, apoptosis, meiosis, mitosis, and neurite extension. LIMKs contain the LIM (two repeats), PDZ, and catalytic kinase domains. The LIMK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, LIM domain kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LIMK1 activation is induced by bone morphogenic protein, vascular endothelial growth factor, and thrombin. It plays roles in microtubule disassembly and cell cycle progression, and is critical in the regulation of neurite outgrowth. LIMK1 knockout mice show abnormalities in dendritic spine morphology and synaptic function. LIMK1 is one of the genes deleted in patients with Williams Syndrome, which is characterized by distinct craniofacial features, cardiovascular problems, as well as behavioral and neurological abnormalities. LIMKs phosphorylate and inactivate cofilin, an actin depolymerizing factor, to induce the reorganization of the actin cytoskeleton. They act downstream of Rho GTPases and are expressed ubiquitously. As regulators of actin dynamics, they contribute to diverse cellular functions such as cell motility, morphogenesis, differentiation, apoptosis, meiosis, mitosis, and neurite extension. LIMKs contain the LIM (two repeats), PDZ, and catalytic kinase domains. The LIMK1 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14221); members share this curated model.
