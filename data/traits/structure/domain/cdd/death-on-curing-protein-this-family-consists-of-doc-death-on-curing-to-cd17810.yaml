identifier: CDD:cd17810
label: "death-on-curing protein. This family consists of Doc (death on curing) toxin proteins, which act as kinases phosphorylating a conserved threonine close to the C-terminus of EF-Tu (T382), hampering EF-Tu's ability to bind aminoacylated tRNAs. Phage P1 lysogens of Escherichia coli carry the prophage as a stable low copy number plasmid. The frequency with which viable cells cured of prophage are produced is about 10(-5) per cell per generation. To some extent this stability can be attributed to a plasmid-encoded mechanism that causes death of cells that have lost P1 - the lysogenic cells appear to be addicted to the presence of the prophage. The plasmid withdrawal response depends on a gene named death on curing (doc). Doc induces a reversible growth arrest of E. coli cells by targetting the protein synthesis machinery. Doc hosts the C-terminal domain of its antitoxin partner Phd (prevents host death) through fold complementation."
definition: >-
  death-on-curing protein. This family consists of Doc (death on curing) toxin proteins, which act as kinases phosphorylating a conserved threonine close to the C-terminus of EF-Tu (T382), hampering EF-Tu's ability to bind aminoacylated tRNAs. Phage P1 lysogens of Escherichia coli carry the prophage as a stable low copy number plasmid. The frequency with which viable cells cured of prophage are produced is about 10(-5) per cell per generation. To some extent this stability can be attributed to a plasmid-encoded mechanism that causes death of cells that have lost P1 - the lysogenic cells appear to be addicted to the presence of the prophage. The plasmid withdrawal response depends on a gene named death on curing (doc). Doc induces a reversible growth arrest of E. coli cells by targetting the protein synthesis machinery. Doc hosts the C-terminal domain of its antitoxin partner Phd (prevents host death) through fold complementation. — an NCBI CDD conserved domain (cd17810); members share this curated model.
