label: "cyclin box found in cyclin-G2 (CCNG2) and similar proteins. CCNG2 may play a role in growth regulation and in negative regulation of cell cycle progression. It has been identified as a tumor suppressor in several cancers. CCNG2 contains one cyclin box. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in cyclin-G2 (CCNG2) and similar proteins. CCNG2 may play a role in growth regulation and in negative regulation of cell cycle progression. It has been identified as a tumor suppressor in several cancers. CCNG2 contains one cyclin box. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20584); members share this curated model.
