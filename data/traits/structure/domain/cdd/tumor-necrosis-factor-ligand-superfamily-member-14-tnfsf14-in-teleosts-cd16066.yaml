identifier: CDD:cd16066
label: "Tumor necrosis factor ligand superfamily member 14 (TNFSF14) in teleosts; also known as HVEML or LIGHT. This family contains TNFSF14 (also known as herpes virus entry mediator ligand or HVEML, CD258, LIGHT, LTg or TR2) found in teleosts (i.e. ray-finned, bony fish). Localized or genome-wide duplication and evolution of the TNFSF members appear to have paralleled the emergence of the adaptive immune system. LIGHT is a key component of the communication system that controls the responses of T-cells. It is expressed transiently in activated T- and B-cells, but constitutively in dendritic cells of lymphoid tissue. It has been shown to contribute to inflammation and pathogenesis in mucosal, hepatic, joint and vascular tissues. It stimulates the proliferation of T cells, and triggers apoptosis of various tumor cells. It activates two cell surface receptors, TNFRSF14 (also known as HVEM, ATAR, CD270, HVEA, LIGHTR, or TR2) and TNFRSF3 (also known as lymphotoxin beta receptor or LTbetaR). LIGHT-LTbetaR modifies the functions of dendritic cells and stromal cells by creating tissue microenvironments, which promote immune responses, while the LIGHT-HVEM pathway is an important cosignaling pathway for T-cells. LIGHT is inhibited by the soluble receptor TNFRSF6B (also known as decoy receptor-3 or DcR3), providing a post-translational control mechanism to turn off signaling. The receptor HVEM also binds an Ig superfamily member, B and T lymphocyte attenuator (BTLA) that inhibits T-cell activation; LIGHT is a key factor in the HVEM-BTLA switch between positive and inhibitory signaling and serves as a molecular switch. Thus, the accessibility of LIGHT to biologic-based therapeutics provides a novel target for modulating immunity that may be useful in treatment of autoimmune diseases, cancer and infections. Studies show that expression of LIGHT is increased in several diseases, including ALS spinal cords, atopic dermatitis (AD), sickle cell disease (SCD) and Multiple Myeloma (MM)-bone disease. A polymorphism in the LIGHT gene has been shown to increase the risk of multiple sclerosis (MS) in a genome-wide association study (GWAS)."
definition: >-
  Tumor necrosis factor ligand superfamily member 14 (TNFSF14) in teleosts; also known as HVEML or LIGHT. This family contains TNFSF14 (also known as herpes virus entry mediator ligand or HVEML, CD258, LIGHT, LTg or TR2) found in teleosts (i.e. ray-finned, bony fish). Localized or genome-wide duplication and evolution of the TNFSF members appear to have paralleled the emergence of the adaptive immune system. LIGHT is a key component of the communication system that controls the responses of T-cells. It is expressed transiently in activated T- and B-cells, but constitutively in dendritic cells of lymphoid tissue. It has been shown to contribute to inflammation and pathogenesis in mucosal, hepatic, joint and vascular tissues. It stimulates the proliferation of T cells, and triggers apoptosis of various tumor cells. It activates two cell surface receptors, TNFRSF14 (also known as HVEM, ATAR, CD270, HVEA, LIGHTR, or TR2) and TNFRSF3 (also known as lymphotoxin beta receptor or LTbetaR). LIGHT-LTbetaR modifies the functions of dendritic cells and stromal cells by creating tissue microenvironments, which promote immune responses, while the LIGHT-HVEM pathway is an important cosignaling pathway for T-cells. LIGHT is inhibited by the soluble receptor TNFRSF6B (also known as decoy receptor-3 or DcR3), providing a post-translational control mechanism to turn off signaling. The receptor HVEM also binds an Ig superfamily member, B and T lymphocyte attenuator (BTLA) that inhibits T-cell activation; LIGHT is a key factor in the HVEM-BTLA switch between positive and inhibitory signaling and serves as a molecular switch. Thus, the accessibility of LIGHT to biologic-based therapeutics provides a novel target for modulating immunity that may be useful in treatment of autoimmune diseases, cancer and infections. Studies show that expression of LIGHT is increased in several diseases, including ALS spinal cords, atopic dermatitis (AD), sickle cell disease (SCD) and Multiple Myeloma (MM)-bone disease. A polymorphism in the LIGHT gene has been shown to increase the risk of multiple sclerosis (MS) in a genome-wide association study (GWAS). — an NCBI CDD conserved domain (cd16066); members share this curated model.
