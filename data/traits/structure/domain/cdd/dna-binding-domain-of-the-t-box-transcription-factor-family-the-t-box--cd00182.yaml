identifier: CDD:cd00182
label: "DNA-binding domain of the T-box transcription factor family. The T-box family is an ancient family of transcription factors which plays a multitude of diverse functions throughout development. The founding member of the family is Brachyury (also known as TBXT, or T). Members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. The T-box factors in Caenorhabditis elegans have evolved very differently than those in other organisms; its genome contains 22 T-box genes which encode factors which are diverse in DNA-binding specificity, function and sequence, and only 3 of these factors fall into the conserved T-box subfamilies."
definition: >-
  DNA-binding domain of the T-box transcription factor family. The T-box family is an ancient family of transcription factors which plays a multitude of diverse functions throughout development. The founding member of the family is Brachyury (also known as TBXT, or T). Members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. The T-box factors in Caenorhabditis elegans have evolved very differently than those in other organisms; its genome contains 22 T-box genes which encode factors which are diverse in DNA-binding specificity, function and sequence, and only 3 of these factors fall into the conserved T-box subfamilies. — an NCBI CDD conserved domain (cd00182); members share this curated model.
