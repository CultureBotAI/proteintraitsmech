identifier: CDD:cd24154
label: "NUDIX domain family found in Deinococcus radiodurans, and similar proteins. Deinococcus radiodurans protein DR_0079 is one of 21 NUDIX hydrolases that it encodes, and it has been observed to have a marked preference for cytosine ribonucleoside 5'-diphosphate (CDP) and cytosine ribonucleoside 5'-triphosphate (CTP), and for their corresponding deoxyribose nucleotides, dCDP and dCTP, to a lesser degree. Members of the NUDIX hydrolase superfamily catalyze the hydrolysis of NUcleoside DIphosphates linked to other moieties, X. Enzymes belonging to this superfamily require a divalent cation, such as Mg2+ or Mn2+, for their activity and contain a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. Substrates of NUDIX hydrolases include intact and oxidatively damaged nucleoside triphosphates, dinucleoside polyphosphates, nucleotide-sugars and dinucleotide enzymes. These substrates are metabolites or cell signaling molecules that require regulation during different stages of the cell cycle or during periods of stress. In general, the role of the NUDIX hydrolase is to sanitize the nucleotide pools and to maintain cell viability, thereby serving as surveillance & \"house-cleaning\" enzymes. Substrate specificity is used to define families within the superfamily. Differences in substrate specificity are determined by the N-terminal extension or by residues in variable loop regions. Mechanistically, substrate hydrolysis occurs by a nucleophilic substitution reaction, with variation in the numbers and roles of divalent cations required."
definition: >-
  NUDIX domain family found in Deinococcus radiodurans, and similar proteins. Deinococcus radiodurans protein DR_0079 is one of 21 NUDIX hydrolases that it encodes, and it has been observed to have a marked preference for cytosine ribonucleoside 5'-diphosphate (CDP) and cytosine ribonucleoside 5'-triphosphate (CTP), and for their corresponding deoxyribose nucleotides, dCDP and dCTP, to a lesser degree. Members of the NUDIX hydrolase superfamily catalyze the hydrolysis of NUcleoside DIphosphates linked to other moieties, X. Enzymes belonging to this superfamily require a divalent cation, such as Mg2+ or Mn2+, for their activity and contain a highly conserved 23-residue NUDIX motif (GX5EX7REUXEEXGU, where U = I, L or V), which functions as a metal binding and catalytic site. Substrates of NUDIX hydrolases include intact and oxidatively damaged nucleoside triphosphates, dinucleoside polyphosphates, nucleotide-sugars and dinucleotide enzymes. These substrates are metabolites or cell signaling molecules that require regulation during different stages of the cell cycle or during periods of stress. In general, the role of the NUDIX hydrolase is to sanitize the nucleotide pools and to maintain cell viability, thereby serving as surveillance & "house-cleaning" enzymes. Substrate specificity is used to define families within the superfamily. Differences in substrate specificity are determined by the N-terminal extension or by residues in variable loop regions. Mechanistically, substrate hydrolysis occurs by a nucleophilic substitution reaction, with variation in the numbers and roles of divalent cations required. — an NCBI CDD conserved domain (cd24154); members share this curated model.
