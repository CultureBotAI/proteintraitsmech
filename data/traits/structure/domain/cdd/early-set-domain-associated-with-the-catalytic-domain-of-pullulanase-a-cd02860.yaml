identifier: CDD:cd02860
label: "Early set domain associated with the catalytic domain of pullulanase (also called dextrinase and alpha-dextrin endo-1,6-alpha glucosidase). E or \"early\" set domains are associated with the catalytic domain of pullulanase at either the N-terminal or C-terminal end, and in a few instances at both ends. Pullulanase is an enzyme with activity similar to that of isoamylase; it cleaves 1,6-alpha-glucosidic linkages in pullulan, amylopectin, and glycogen, and in alpha-and beta-amylase limit-dextrins of amylopectin and glycogen. The E set domain of pullulanase may be related to the immunoglobulin and/or fibronectin type III superfamilies. These domains are associated with different types of catalytic domains at either the N-terminal or C-terminal end and may be involved in homodimeric/tetrameric/dodecameric interactions. Members of this family include members of the alpha amylase family, sialidase, galactose oxidase, cellulase, cellulose, hyaluronate lyase, chitobiase, and chitinase. This domain is also a member of the CBM48 (Carbohydrate Binding Module 48) family whose members include maltooligosyl trehalose synthase, starch branching enzyme, glycogen branching enzyme, glycogen debranching enzyme, isoamylase, and the beta subunit of AMP-activated protein kinase."
definition: >-
  Early set domain associated with the catalytic domain of pullulanase (also called dextrinase and alpha-dextrin endo-1,6-alpha glucosidase). E or "early" set domains are associated with the catalytic domain of pullulanase at either the N-terminal or C-terminal end, and in a few instances at both ends. Pullulanase is an enzyme with activity similar to that of isoamylase; it cleaves 1,6-alpha-glucosidic linkages in pullulan, amylopectin, and glycogen, and in alpha-and beta-amylase limit-dextrins of amylopectin and glycogen. The E set domain of pullulanase may be related to the immunoglobulin and/or fibronectin type III superfamilies. These domains are associated with different types of catalytic domains at either the N-terminal or C-terminal end and may be involved in homodimeric/tetrameric/dodecameric interactions. Members of this family include members of the alpha amylase family, sialidase, galactose oxidase, cellulase, cellulose, hyaluronate lyase, chitobiase, and chitinase. This domain is also a member of the CBM48 (Carbohydrate Binding Module 48) family whose members include maltooligosyl trehalose synthase, starch branching enzyme, glycogen branching enzyme, glycogen debranching enzyme, isoamylase, and the beta subunit of AMP-activated protein kinase. — an NCBI CDD conserved domain (cd02860); members share this curated model.
