identifier: CDD:cd22533
label: "type II K-homology (KH) RNA-binding domain found in Bacillus subtilis UPF0109 protein YlqC and similar proteins. The family includes a group of uncharacterized proteins which show sequence similarity to Bacillus subtilis UPF0109 protein YlqC. They are mainly found in bacteria and contain only one canonical type II K-homology (KH) domain that has the signature motif GXXG (where X represents any amino acid)."
definition: >-
  type II K-homology (KH) RNA-binding domain found in Bacillus subtilis UPF0109 protein YlqC and similar proteins. The family includes a group of uncharacterized proteins which show sequence similarity to Bacillus subtilis UPF0109 protein YlqC. They are mainly found in bacteria and contain only one canonical type II K-homology (KH) domain that has the signature motif GXXG (where X represents any amino acid). — an NCBI CDD conserved domain (cd22533); members share this curated model.
