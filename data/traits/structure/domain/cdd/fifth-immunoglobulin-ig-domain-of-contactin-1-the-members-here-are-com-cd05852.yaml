identifier: CDD:cd05852
label: "Fifth immunoglobulin (Ig) domain of contactin-1. The members here are composed of the fifth immunoglobulin (Ig) domain of the neural cell adhesion molecule contactin-1. Contactins are comprised of six Ig domains followed by four fibronectin type III (FnIII) domains anchored to the membrane by glycosylphosphatidylinositol. Contactin-1 is differentially expressed in tumor tissues and may through a RhoA mechanism, facilitate invasion and metastasis of human lung adenocarcinoma."
definition: >-
  Fifth immunoglobulin (Ig) domain of contactin-1. The members here are composed of the fifth immunoglobulin (Ig) domain of the neural cell adhesion molecule contactin-1. Contactins are comprised of six Ig domains followed by four fibronectin type III (FnIII) domains anchored to the membrane by glycosylphosphatidylinositol. Contactin-1 is differentially expressed in tumor tissues and may through a RhoA mechanism, facilitate invasion and metastasis of human lung adenocarcinoma. — an NCBI CDD conserved domain (cd05852); members share this curated model.
