identifier: CDD:cd23559
label: "extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 1 (LYPD1) and similar proteins. LYPD1 (also called putative HeLa tumor suppressor (PHTS)) may act as a modulator of nicotinic acetylcholine receptors (nAChRs) activity. In vitro LYPD1 increases receptor desensitization and decreases affinity for ACh of alpha-4:beta-2-containing nAChRs. It may play a role in the intracellular trafficking of alpha-4:beta-2 and alpha-7-containing nAChRs and may inhibit their expression at the cell surface. It may be involved in the control of anxiety. LYPD1 also functions as a novel putative tumor suppressor involved in the transformation reversion of HeLaHF cells independently of the p53 pathway. LYPD1 contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 1 (LYPD1) and similar proteins. LYPD1 (also called putative HeLa tumor suppressor (PHTS)) may act as a modulator of nicotinic acetylcholine receptors (nAChRs) activity. In vitro LYPD1 increases receptor desensitization and decreases affinity for ACh of alpha-4:beta-2-containing nAChRs. It may play a role in the intracellular trafficking of alpha-4:beta-2 and alpha-7-containing nAChRs and may inhibit their expression at the cell surface. It may be involved in the control of anxiety. LYPD1 also functions as a novel putative tumor suppressor involved in the transformation reversion of HeLaHF cells independently of the p53 pathway. LYPD1 contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23559); members share this curated model.
