identifier: CDD:cd03158
label: "Tetraspanin, extracellular domain or large extracellular loop (LEL), penumbra_like family. Tetraspanins are trans-membrane proteins with 4 trans-membrane segments. Both the N- and C-termini lie on the intracellular side of the membrane. This alignment model spans the extracellular domain between the 3rd and 4th trans-membrane segment. Tetraspanins are involved in diverse processes and their various functions may relate to their ability to act as molecular facilitators. Tetraspanins associate laterally with one another and cluster dynamically with numerous parnter domains in membrane microdomains, forming a network of multimolecular complexes, the \"tetraspanin web\". Human Penumbra exhibits growth-suppressive activity in vitro and has been associated with myeloid malignancies."
definition: >-
  Tetraspanin, extracellular domain or large extracellular loop (LEL), penumbra_like family. Tetraspanins are trans-membrane proteins with 4 trans-membrane segments. Both the N- and C-termini lie on the intracellular side of the membrane. This alignment model spans the extracellular domain between the 3rd and 4th trans-membrane segment. Tetraspanins are involved in diverse processes and their various functions may relate to their ability to act as molecular facilitators. Tetraspanins associate laterally with one another and cluster dynamically with numerous parnter domains in membrane microdomains, forming a network of multimolecular complexes, the "tetraspanin web". Human Penumbra exhibits growth-suppressive activity in vitro and has been associated with myeloid malignancies. — an NCBI CDD conserved domain (cd03158); members share this curated model.
