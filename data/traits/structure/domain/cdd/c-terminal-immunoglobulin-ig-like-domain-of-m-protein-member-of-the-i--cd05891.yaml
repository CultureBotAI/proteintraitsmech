identifier: CDD:cd05891
label: "C-terminal immunoglobulin (Ig)-like domain of M-protein; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the C-terminal immunoglobulin (Ig)-like domain of M-protein (also known as myomesin-2). M-protein is a structural protein localized to the M-band, a transverse structure in the center of the sarcomere, and is a candidate for M-band bridges. M-protein is modular consisting mainly of repetitive IG-like and fibronectin type III (FnIII) domains and has a muscle-type specific expression pattern. M-protein is present in fast fibers."
definition: >-
  C-terminal immunoglobulin (Ig)-like domain of M-protein; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the C-terminal immunoglobulin (Ig)-like domain of M-protein (also known as myomesin-2). M-protein is a structural protein localized to the M-band, a transverse structure in the center of the sarcomere, and is a candidate for M-band bridges. M-protein is modular consisting mainly of repetitive IG-like and fibronectin type III (FnIII) domains and has a muscle-type specific expression pattern. M-protein is present in fast fibers. — an NCBI CDD conserved domain (cd05891); members share this curated model.
