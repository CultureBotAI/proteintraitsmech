identifier: CDD:cd17271
label: "Type I restriction-modification system specificity (S) subunit TRD-CR, similar to Nitrosopumilus maritimus SCM1 S subunit (S2.NmaSCMORF606P) TRD2-CR2, Corynebacterium jeikeium K411 S subunit (S.CjeKORF1254P) TRD2-CR2 and Porphyromonas canoris COT-108 OH2762 S subunit (S2.Pca2762ORF8685P) TRD1-CR1. The recognition sequences of Nitrosopumilus maritimus SCM1 S subunit (S2.NmaSCMORF606P), Corynebacterium jeikeium K411 S subunit (S.CjeKORF1254P), and Porphyromonas canoris COT-108 OH2762 S subunit (S2.Pca2762ORF8685P) are undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one heteromeric enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It may also include TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases and type I DNA methyltransferases."
definition: >-
