identifier: CDD:cd02445
label: "tRNA(Phe)(4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase. tRNA(Phe)(4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase (also known as TRM(T)12 and tRNA-yW-synthesizing protein 2 or TYW2; EC 2.1.1.114) catalyzes the transfer of the alpha-amino-alpha-carboxypropyl (acp) group from S-adenosyl-L-methionine to the C-7 position of 4-demethylwyosine (imG-14) to produce wybutosine-86, a hyper modified guanosine with a tricyclic base."
definition: >-
  tRNA(Phe)(4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase. tRNA(Phe)(4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase (also known as TRM(T)12 and tRNA-yW-synthesizing protein 2 or TYW2; EC 2.1.1.114) catalyzes the transfer of the alpha-amino-alpha-carboxypropyl (acp) group from S-adenosyl-L-methionine to the C-7 position of 4-demethylwyosine (imG-14) to produce wybutosine-86, a hyper modified guanosine with a tricyclic base. — an NCBI CDD conserved domain (cd02445); members share this curated model.
