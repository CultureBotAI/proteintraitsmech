identifier: CDD:cd20313
label: "double-stranded RNA binding motif of dead end protein homolog 1 (DND1) and similar proteins. DND1 (also known as dead end protein, or RNA-binding motif single-stranded-interacting protein 4 (RBMS4)) is an RNA-binding protein that is required for the survival of primordial germ cells (PGCs) and suppresses the formation of germ-cell tumors. DND1 binds a UU(A/U) trinucleotide motif predominantly in the 3' untranslated regions of mRNA, and destabilizes target mRNAs. It also counteracts the function of several microRNAs (miRNAs), which are inhibitors of gene expression, by binding mRNAs and prohibiting miRNAs from associating with their target sites. DND1 contains two RNA recognition motifs (RRMs) and a C-terminal double-stranded RNA binding motif (DSRM) that is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of dead end protein homolog 1 (DND1) and similar proteins. DND1 (also known as dead end protein, or RNA-binding motif single-stranded-interacting protein 4 (RBMS4)) is an RNA-binding protein that is required for the survival of primordial germ cells (PGCs) and suppresses the formation of germ-cell tumors. DND1 binds a UU(A/U) trinucleotide motif predominantly in the 3' untranslated regions of mRNA, and destabilizes target mRNAs. It also counteracts the function of several microRNAs (miRNAs), which are inhibitors of gene expression, by binding mRNAs and prohibiting miRNAs from associating with their target sites. DND1 contains two RNA recognition motifs (RRMs) and a C-terminal double-stranded RNA binding motif (DSRM) that is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd20313); members share this curated model.
