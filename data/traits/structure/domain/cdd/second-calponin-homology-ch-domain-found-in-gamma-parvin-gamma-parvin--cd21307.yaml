label: "second calponin homology (CH) domain found in gamma-parvin. Gamma-parvin probably plays a role in the regulation of cell adhesion and cytoskeleton organization. It contains two copies of the CH domain. This model corresponds to the second CH domain. CH domains are actin filament (F-actin) binding motifs."
