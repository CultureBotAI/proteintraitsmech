identifier: CDD:cd06769
label: "PDZ domain of FERM and PDZ domain-containing protein 1 (FRMPD1), FRMPD3, FRMPD4, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of FRMPD1, FRMPD3, FRMPD4, and related domains. FRMPD1 (also known as FERM domain-containing protein 2, FRMD2), inhibits the malignant phenotype of lung cancer by activating the Hippo pathway via interaction with WWC3; the FRMPD1 PDZ domain binds WWC3. FRMPD3 is a target gene of the neuron-specific transcription factor NPAS4 that is involved in synaptic plasticity. FRMPD4 (also known as PDZ domain-containing protein 10, PDZD10, PDZK10, PSD-95-interacting regulator of spine morphogenesis, and Preso) regulates dendritic spine morphogenesis, and mGluR1/5 signaling; the FRMPD4 PDZ domain binds PAK-interacting exchange factor-beta (betaPix). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This FRMPD1,3,4-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
