identifier: CDD:cd13738
label: "PRY/SPRY domain of tripartite motif-binding protein 14 (TRIM14). This is a TRIM14 domain family contains residues in the N-terminus that form a distinct PRY domain structure such that the B30.2 domain consists of PRY and SPRY subdomains. TRIM14 domains have yet to be characterized. These B30.2 domains are a more recent adaptation where the SPRY/PRY combination is a possible component of immune defense. It belongs to Class IV TRIM protein family which has members involved in antiviral immunity at various levels of interferon signaling cascade."
definition: >-
  PRY/SPRY domain of tripartite motif-binding protein 14 (TRIM14). This is a TRIM14 domain family contains residues in the N-terminus that form a distinct PRY domain structure such that the B30.2 domain consists of PRY and SPRY subdomains. TRIM14 domains have yet to be characterized. These B30.2 domains are a more recent adaptation where the SPRY/PRY combination is a possible component of immune defense. It belongs to Class IV TRIM protein family which has members involved in antiviral immunity at various levels of interferon signaling cascade. — an NCBI CDD conserved domain (cd13738); members share this curated model.
