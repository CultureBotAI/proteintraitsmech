identifier: CDD:cd23824
label: "RWD domain of Saccharomyces cerevisiae genetically interacts with ribosomal genes protein 2 (GIR2) and related proteins. GIR2, also called DRG family-regulatory protein 2, acts as a negative regulator of GCN2 kinase activity by interacting with GCN1 and disrupting the GCN1-GCN2 interaction in amino acid-starved cells. It also interacts with RBG1. The RBG1-GIR2 complex is responsible for efficient cell growth under conditions of amino acid depletion and binds the activator GCN1. Critical mutations in the RWD domain of GIR2 abolishes its interaction with GCN1. GIR2 may interact with ribosomes through GCN1, which binds directly to ribosomes."
definition: >-
  RWD domain of Saccharomyces cerevisiae genetically interacts with ribosomal genes protein 2 (GIR2) and related proteins. GIR2, also called DRG family-regulatory protein 2, acts as a negative regulator of GCN2 kinase activity by interacting with GCN1 and disrupting the GCN1-GCN2 interaction in amino acid-starved cells. It also interacts with RBG1. The RBG1-GIR2 complex is responsible for efficient cell growth under conditions of amino acid depletion and binds the activator GCN1. Critical mutations in the RWD domain of GIR2 abolishes its interaction with GCN1. GIR2 may interact with ribosomes through GCN1, which binds directly to ribosomes. — an NCBI CDD conserved domain (cd23824); members share this curated model.
