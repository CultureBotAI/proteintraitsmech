identifier: CDD:cd22143
label: "F-box domain found in Saccharomyces cerevisiae mitochondrial distribution and morphology protein 30 (ScMDM30) and similar proteins. ScMDM30 is an F-box protein required for maintenance of fusion-competent mitochondria in yeast. It is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. ScMDM30 recognizes FZO1 and regulates the amount of FZO1. It acts as a regulatory factor for the mitochondrial fusion machinery and is required for mitochondrial DNA maintenance. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in Saccharomyces cerevisiae mitochondrial distribution and morphology protein 30 (ScMDM30) and similar proteins. ScMDM30 is an F-box protein required for maintenance of fusion-competent mitochondria in yeast. It is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins. ScMDM30 recognizes FZO1 and regulates the amount of FZO1. It acts as a regulatory factor for the mitochondrial fusion machinery and is required for mitochondrial DNA maintenance. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22143); members share this curated model.
