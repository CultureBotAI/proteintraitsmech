identifier: CDD:cd11756
label: "First GH94N domain of cyclic beta 1-2 glucan synthetase and similar domains. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cyclic beta 1-2 glucan synthetase (EC:2.4.1.20) or ChvB (encoded by the chromosomal chvB virulence gene). This first of two tandemly repeated GH94-N-terminal-like domains has not been characterized functionally. Some beta 1-2 glucan synthetases are annotated as NdvB (nodule development B) gene products, glycosyltransferases required for the synthesis of cyclic beta-(1,2)-glucans, which play a role in interactions between bacteria and plants."
definition: >-
  First GH94N domain of cyclic beta 1-2 glucan synthetase and similar domains. The glycoside hydrolase family 94 (previously known as glycosyltransferase family 36) includes cyclic beta 1-2 glucan synthetase (EC:2.4.1.20) or ChvB (encoded by the chromosomal chvB virulence gene). This first of two tandemly repeated GH94-N-terminal-like domains has not been characterized functionally. Some beta 1-2 glucan synthetases are annotated as NdvB (nodule development B) gene products, glycosyltransferases required for the synthesis of cyclic beta-(1,2)-glucans, which play a role in interactions between bacteria and plants. — an NCBI CDD conserved domain (cd11756); members share this curated model.
