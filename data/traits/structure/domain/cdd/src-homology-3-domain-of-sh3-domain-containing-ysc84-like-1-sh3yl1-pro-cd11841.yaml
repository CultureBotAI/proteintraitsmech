identifier: CDD:cd11841
label: "Src homology 3 domain of SH3 domain containing Ysc84-like 1 (SH3YL1) protein. SH3YL1 localizes to the plasma membrane and is required for dorsal ruffle formation. It binds phosphoinositides (PIs) with high affinity through its N-terminal SYLF domain (also called DUF500). In addition, SH3YL1 contains a C-terminal SH3 domain which has been reported to bind to N-WASP, dynamin 2, and SHIP2 (a PI 5-phosphatase). SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
