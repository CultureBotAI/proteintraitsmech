identifier: CDD:cd22617
label: "Kunitz domain 2 (KD2) of tissue factor pathway inhibitor 2 (TFPI2) and similar proteins. This model represents the Kunitz-type domain 2 (KD2) of tissue factor pathway inhibitor 2 (TFPI2 or TFPI-2) and similar proteins. TFPI2 exhibits inhibitory activity primarily toward trypsin, plasmin, and factor VIIa (FVIIa)/tissue factor (TF) via its KD1. It is believed to be the major inhibitor of plasmin in the extracellular matrix (ECM) but has little inhibitory activity toward urokinase-type plasminogen activator, tissue-type plasminogen activator, or thrombin. While TFPI2 specifically inhibits the proteases via the P1 arginine residue in KD1, domains KD2 and KD3 appear to have no discernible inhibitory activity and may serve to bind to nearby proteins to localize TFPI2 in the ECM. This domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz domain 2 (KD2) of tissue factor pathway inhibitor 2 (TFPI2) and similar proteins. This model represents the Kunitz-type domain 2 (KD2) of tissue factor pathway inhibitor 2 (TFPI2 or TFPI-2) and similar proteins. TFPI2 exhibits inhibitory activity primarily toward trypsin, plasmin, and factor VIIa (FVIIa)/tissue factor (TF) via its KD1. It is believed to be the major inhibitor of plasmin in the extracellular matrix (ECM) but has little inhibitory activity toward urokinase-type plasminogen activator, tissue-type plasminogen activator, or thrombin. While TFPI2 specifically inhibits the proteases via the P1 arginine residue in KD1, domains KD2 and KD3 appear to have no discernible inhibitory activity and may serve to bind to nearby proteins to localize TFPI2 in the ECM. This domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22617); members share this curated model.
