identifier: CDD:cd22914
label: "first histone-fold domain found in son of sevenless homolog 1 (SOS-1) and similar proteins. SOS-1 is a guanine nucleotide exchange factor for Ras that binds to GRB2. It promotes the exchange of Ras-bound GDP by GTP. It is a catalytic component of a trimeric complex that participates in transduction of signals from Ras to Rac, by promoting the Rac-specific guanine nucleotide exchange factor (GEF) activity. SOS-1 contains tandem histone folds at the N-terminal region. The model corresponds to the first repeat."
definition: >-
  first histone-fold domain found in son of sevenless homolog 1 (SOS-1) and similar proteins. SOS-1 is a guanine nucleotide exchange factor for Ras that binds to GRB2. It promotes the exchange of Ras-bound GDP by GTP. It is a catalytic component of a trimeric complex that participates in transduction of signals from Ras to Rac, by promoting the Rac-specific guanine nucleotide exchange factor (GEF) activity. SOS-1 contains tandem histone folds at the N-terminal region. The model corresponds to the first repeat. — an NCBI CDD conserved domain (cd22914); members share this curated model.
