identifier: CDD:cd18265
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 35 (KLHL35). KLHL35 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. Significant differences in DNA methylation of the KLHL35 gene in abdominal aortic aneurysm (AAA) patients compared to non-AAA controls suggest a potential role in AAA pathology. Hypermethylation of the KLHL35 gene has also been associated with the development of hepatocellular carcinoma. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 35 (KLHL35). KLHL35 contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. Significant differences in DNA methylation of the KLHL35 gene in abdominal aortic aneurysm (AAA) patients compared to non-AAA controls suggest a potential role in AAA pathology. Hypermethylation of the KLHL35 gene has also been associated with the development of hepatocellular carcinoma. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18265); members share this curated model.
