identifier: CDD:cd17368
label: "Citrate-proton symporter of the Major Facilitator Superfamily of transporters. Citrate-proton symporter, also called citrate carrier protein or citrate transporter or citrate utilization protein A (CitA), is a proton symporter that functions in the uptake of citrate across the boundary membrane. It allows the utilization of citrate as a sole source of carbon and energy. In Klebsiella pneumoniae, the gene encoding this protein is called citH, instead of citA, which is the case for Escherichia coli and other organisms. CitA belongs to the Metazoan Synaptic Vesicle Glycoprotein 2 (SV2) and related small molecule transporter family (SV2-like) of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
