identifier: CDD:cd08025
label: "Uncharacterized proteins with similarity to Ribonucleotide reductase and Pyruvate formate lyase. This subfamily contains Streptococcus pneumoniae Sp0239 and similar uncharacterized proteins. Sp0239 is structurally similar to ribonucleotide reductase (RNR) and pyruvate formate lyase (PFL), which are believed to have diverged from a common ancestor. RNR and PFL possess a ten-stranded alpha-beta barrel domain that hosts the active site, and are radical enzymes. RNRs are found in all organisms and provide the only mechanism by which nucleotides are converted to deoxynucleotides. PFL is an essential enzyme in anaerobic bacteria that catalyzes the conversion of pyruvate and CoA to acteylCoA and formate."
definition: >-
  Uncharacterized proteins with similarity to Ribonucleotide reductase and Pyruvate formate lyase. This subfamily contains Streptococcus pneumoniae Sp0239 and similar uncharacterized proteins. Sp0239 is structurally similar to ribonucleotide reductase (RNR) and pyruvate formate lyase (PFL), which are believed to have diverged from a common ancestor. RNR and PFL possess a ten-stranded alpha-beta barrel domain that hosts the active site, and are radical enzymes. RNRs are found in all organisms and provide the only mechanism by which nucleotides are converted to deoxynucleotides. PFL is an essential enzyme in anaerobic bacteria that catalyzes the conversion of pyruvate and CoA to acteylCoA and formate. — an NCBI CDD conserved domain (cd08025); members share this curated model.
