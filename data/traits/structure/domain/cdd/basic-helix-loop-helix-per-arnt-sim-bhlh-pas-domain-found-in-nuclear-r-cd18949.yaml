identifier: CDD:cd18949
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in nuclear receptor coactivator 3 (NCoA-3) and similar proteins. NCoA-3, also termed ACTR, or amplified in breast cancer 1 protein (AIB-1), or CBP-interacting protein (pCIP), or Class E basic helix-loop-helix protein 42 (bHLHe42), or receptor-associated coactivator 3 (RAC-3), or steroid receptor coactivator protein 3 (SRC-3), or thyroid hormone receptor activator molecule 1 (TRAM-1), is a bHLH-PAS steroid/nuclear receptor-associated coactivator that directly binds nuclear receptors and stimulates the transcriptional activities in a hormone-dependent fashion. It also plays a central role in creating a multisubunit coactivator complex, which probably acts via remodeling of chromatin."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in nuclear receptor coactivator 3 (NCoA-3) and similar proteins. NCoA-3, also termed ACTR, or amplified in breast cancer 1 protein (AIB-1), or CBP-interacting protein (pCIP), or Class E basic helix-loop-helix protein 42 (bHLHe42), or receptor-associated coactivator 3 (RAC-3), or steroid receptor coactivator protein 3 (SRC-3), or thyroid hormone receptor activator molecule 1 (TRAM-1), is a bHLH-PAS steroid/nuclear receptor-associated coactivator that directly binds nuclear receptors and stimulates the transcriptional activities in a hormone-dependent fashion. It also plays a central role in creating a multisubunit coactivator complex, which probably acts via remodeling of chromatin. — an NCBI CDD conserved domain (cd18949); members share this curated model.
