identifier: CDD:cd12996
label: "Laminin G domain of Crumbs homologue (CRB) proteins, repeat 3;. CRB is a large transmembrane protein required,as part of the crumbs complex, for maintenance of apico-basal cell polarity and adherens junction in embryonic epithelia. It has a short intracellular domain containing a C-terminal PDZ- and a FERM-domain, and a large extracellular portion including multiple epidermal growth factor (EGF)-like repeats and three or four laminin G domains. Mutation in the human CRB1 gene cause autosomal recessive retinitis pigmentosa (arRP) and autosomal Leber congenital amaurosis (arLCA). ArRP is characterized by a progressive degeneration of photoreceptors and LCA by blindness or severe visual impairment at birth. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Laminin G domain of Crumbs homologue (CRB) proteins, repeat 3;. CRB is a large transmembrane protein required,as part of the crumbs complex, for maintenance of apico-basal cell polarity and adherens junction in embryonic epithelia. It has a short intracellular domain containing a C-terminal PDZ- and a FERM-domain, and a large extracellular portion including multiple epidermal growth factor (EGF)-like repeats and three or four laminin G domains. Mutation in the human CRB1 gene cause autosomal recessive retinitis pigmentosa (arRP) and autosomal Leber congenital amaurosis (arLCA). ArRP is characterized by a progressive degeneration of photoreceptors and LCA by blindness or severe visual impairment at birth. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd12996); members share this curated model.
