identifier: CDD:cd04214
label: "N-terminal non-catalytic domain of protein-arginine deiminase. The N-terminal non-catalytic domain of protein-arginine deiminase has a cupredoxin-like fold, but lacks the Cu binding site. PAD (protein-arginine deiminase) and protein L-arginine iminohydrolase catalyze the conversion of protein arginine residues to citrulline residues post-translationally in a process called citrullination. The modification plays crucial regulatory roles in development and cell differentiation."
definition: >-
  N-terminal non-catalytic domain of protein-arginine deiminase. The N-terminal non-catalytic domain of protein-arginine deiminase has a cupredoxin-like fold, but lacks the Cu binding site. PAD (protein-arginine deiminase) and protein L-arginine iminohydrolase catalyze the conversion of protein arginine residues to citrulline residues post-translationally in a process called citrullination. The modification plays crucial regulatory roles in development and cell differentiation. — an NCBI CDD conserved domain (cd04214); members share this curated model.
