identifier: CDD:cd19902
label: "double-stranded RNA binding motif of double-stranded RNA-specific adenosine deaminase (DRADA) and similar proteins. DRADA (EC 3.5.4.37; also known as 136 kDa double-stranded RNA-binding protein (p136), interferon-inducible protein 4 (IFI-4), K88DSRBP, ADAR1, G1P1, or ADAR) catalyzes the hydrolytic deamination of adenosine to inosine in double-stranded RNA (dsRNA), referred to as A-to-I RNA editing. DRADA family members contain at least one double-stranded RNA binding motifs (DSRM); vertebrate proteins contain three. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of double-stranded RNA-specific adenosine deaminase (DRADA) and similar proteins. DRADA (EC 3.5.4.37; also known as 136 kDa double-stranded RNA-binding protein (p136), interferon-inducible protein 4 (IFI-4), K88DSRBP, ADAR1, G1P1, or ADAR) catalyzes the hydrolytic deamination of adenosine to inosine in double-stranded RNA (dsRNA), referred to as A-to-I RNA editing. DRADA family members contain at least one double-stranded RNA binding motifs (DSRM); vertebrate proteins contain three. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19902); members share this curated model.
