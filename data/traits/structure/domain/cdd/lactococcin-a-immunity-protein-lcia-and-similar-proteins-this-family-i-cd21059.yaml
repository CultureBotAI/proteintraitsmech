identifier: CDD:cd21059
label: "lactococcin A immunity protein (LciA) and similar proteins. This family includes pore-forming bacteriocin class IId lactococcin A immunity protein (LciA) and similar proteins. The subclass IId is a linear, one-peptide bacteriocin that shares no sequence similarity to the other class II pediocin-like bacteriocins (class IIa), two-peptide bacteriocins (class IIb) or cyclic bacteriocins (class IIc). However, they all induce membrane leakage and cell death by specifically binding the mannose phosphotransferase system (man-PTS) on their target cells. LciA shares the same 4-helical bundle structure as the pediocin-like immunity proteins but has a shorter C-terminal helix and a different surface potential. Also, it has a flexible C-terminal tail that is important for the functionality of the immunity protein."
definition: >-
  lactococcin A immunity protein (LciA) and similar proteins. This family includes pore-forming bacteriocin class IId lactococcin A immunity protein (LciA) and similar proteins. The subclass IId is a linear, one-peptide bacteriocin that shares no sequence similarity to the other class II pediocin-like bacteriocins (class IIa), two-peptide bacteriocins (class IIb) or cyclic bacteriocins (class IIc). However, they all induce membrane leakage and cell death by specifically binding the mannose phosphotransferase system (man-PTS) on their target cells. LciA shares the same 4-helical bundle structure as the pediocin-like immunity proteins but has a shorter C-terminal helix and a different surface potential. Also, it has a flexible C-terminal tail that is important for the functionality of the immunity protein. — an NCBI CDD conserved domain (cd21059); members share this curated model.
