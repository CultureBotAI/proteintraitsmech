identifier: CDD:cd16000
label: "G protein-coupled receptor 123, member of the class B2 family of seven-transmembrane G protein-coupled receptors. GPR123 is an orphan receptor that has been classified as that belongs to the group III of adhesion GPCRs, and also includes orphan receptors GPR124 and GPR125. GPR123 is predominantly expressed in the CNS including thalamus, brain stem and regions containing large pyramidal cells, yet its biological function remains to be determined. Adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. Furthermore, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR- autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions."
definition: >-
  G protein-coupled receptor 123, member of the class B2 family of seven-transmembrane G protein-coupled receptors. GPR123 is an orphan receptor that has been classified as that belongs to the group III of adhesion GPCRs, and also includes orphan receptors GPR124 and GPR125. GPR123 is predominantly expressed in the CNS including thalamus, brain stem and regions containing large pyramidal cells, yet its biological function remains to be determined. Adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. Furthermore, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR- autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions. — an NCBI CDD conserved domain (cd16000); members share this curated model.
