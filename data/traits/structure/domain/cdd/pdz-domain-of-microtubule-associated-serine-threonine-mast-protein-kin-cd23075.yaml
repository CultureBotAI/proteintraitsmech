identifier: CDD:cd23075
label: "PDZ domain of microtubule-associated serine-threonine (MAST) protein kinase 3 (MAST3). PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MAST3, and related domains. MAST3 belongs to the MAST family kinases, which include MAST1-4. These MAST proteins contain a DUF1908 domain, a serine/threonine kinase domain, a AGC-kinase C-terminal domain, and a PDZ domain. MAST3 plays a critical role in regulating the immune response of inflammatory bowel disease (IBD), and is involved in the process of cytoskeleton organization, intracellular signal transduction and peptidyl-serine phosphorylation. MAST3 also promotes the proliferation and inflammation of fibroblast-like synoviocytes in rheumatoid arthritis. Binding partners of MAST3 include cAMP-regulated phosphoprotein (ARPP-16) and the tumor suppressor PTEN. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MAST3 family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of microtubule-associated serine-threonine (MAST) protein kinase 3 (MAST3). PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MAST3, and related domains. MAST3 belongs to the MAST family kinases, which include MAST1-4. These MAST proteins contain a DUF1908 domain, a serine/threonine kinase domain, a AGC-kinase C-terminal domain, and a PDZ domain. MAST3 plays a critical role in regulating the immune response of inflammatory bowel disease (IBD), and is involved in the process of cytoskeleton organization, intracellular signal transduction and peptidyl-serine phosphorylation. MAST3 also promotes the proliferation and inflammation of fibroblast-like synoviocytes in rheumatoid arthritis. Binding partners of MAST3 include cAMP-regulated phosphoprotein (ARPP-16) and the tumor suppressor PTEN. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MAST3 family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd23075); members share this curated model.
