identifier: CDD:cd19919
label: "phosphoacceptor receiver (REC) domain of DNA-binding transcriptional regulator NtrC. DNA-binding transcriptional regulator NtrC is also called nitrogen regulation protein NR(I) or nitrogen regulator I (NRI). It contains an N-terminal receiver (REC) domain, followed by a sigma-54 interaction domain, and a C-terminal helix-turn-helix DNA-binding domain. It is part of the two-component regulatory system NtrB/NtrC, which controls expression of the nitrogen-regulated (ntr) genes in response to nitrogen limitation. DNA-binding response regulator NtrC is phosphorylated by NtrB; phosphorylation of the N-terminal REC domain activates the central sigma-54 interaction domain and leads to the transcriptional activation from promoters that require sigma(54)-containing RNA polymerase. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of DNA-binding transcriptional regulator NtrC. DNA-binding transcriptional regulator NtrC is also called nitrogen regulation protein NR(I) or nitrogen regulator I (NRI). It contains an N-terminal receiver (REC) domain, followed by a sigma-54 interaction domain, and a C-terminal helix-turn-helix DNA-binding domain. It is part of the two-component regulatory system NtrB/NtrC, which controls expression of the nitrogen-regulated (ntr) genes in response to nitrogen limitation. DNA-binding response regulator NtrC is phosphorylated by NtrB; phosphorylation of the N-terminal REC domain activates the central sigma-54 interaction domain and leads to the transcriptional activation from promoters that require sigma(54)-containing RNA polymerase. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19919); members share this curated model.
