identifier: CDD:cd21057
label: "dimerization domain found in Schizosaccharomyces pombe telomere length regulator Taz1 and similar. Taz1 regulates telomere length and function. It is required for the repression of telomere-adjacent gene expression and for normal meiosis or sporulation. It may be a negative regulator of the telomere-replicating enzyme, telomerase, or may protect against activation of telomerase-independent pathways of telomere elongation. It may be involved in the interactions between chromosomes and spindle proteins, disruption of these interactions would lead to defective meiosis. The model corresponds to the dimerization domain (DD) domain of Taz1. It constitutes the minimal core for Taz1 dimerization."
definition: >-
  dimerization domain found in Schizosaccharomyces pombe telomere length regulator Taz1 and similar. Taz1 regulates telomere length and function. It is required for the repression of telomere-adjacent gene expression and for normal meiosis or sporulation. It may be a negative regulator of the telomere-replicating enzyme, telomerase, or may protect against activation of telomerase-independent pathways of telomere elongation. It may be involved in the interactions between chromosomes and spindle proteins, disruption of these interactions would lead to defective meiosis. The model corresponds to the dimerization domain (DD) domain of Taz1. It constitutes the minimal core for Taz1 dimerization. — an NCBI CDD conserved domain (cd21057); members share this curated model.
