identifier: CDD:cd14402
label: "UBA domain found in probable E3 ubiquitin-protein ligase HERC2 and similar proteins. HERC2, also called HECT domain and RCC1-like domain-containing protein 2, is a SUMO-regulated E3 ubiquitin ligase that plays an important role in the SUMO-dependent pathway which orchestrates the DNA double-strand break (DSB) response. Moreover, HERC2 functions as a RNF8 auxiliary factor that regulates ubiquitin-dependent retention of repair proteins on damaged chromosomes. In addition to a ubiquitin-association (UBA) domain, HERC2 contains more than one RCC1-like domains (RLDs) and a C-terminal HECT E3 ubiquitin ligase domain."
definition: >-
  UBA domain found in probable E3 ubiquitin-protein ligase HERC2 and similar proteins. HERC2, also called HECT domain and RCC1-like domain-containing protein 2, is a SUMO-regulated E3 ubiquitin ligase that plays an important role in the SUMO-dependent pathway which orchestrates the DNA double-strand break (DSB) response. Moreover, HERC2 functions as a RNF8 auxiliary factor that regulates ubiquitin-dependent retention of repair proteins on damaged chromosomes. In addition to a ubiquitin-association (UBA) domain, HERC2 contains more than one RCC1-like domains (RLDs) and a C-terminal HECT E3 ubiquitin ligase domain. — an NCBI CDD conserved domain (cd14402); members share this curated model.
