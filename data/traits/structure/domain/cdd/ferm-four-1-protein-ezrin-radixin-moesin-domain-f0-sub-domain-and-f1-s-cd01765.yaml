identifier: CDD:cd01765
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain and F1 sub-domain, found in FERM (Four.1/Ezrin/Radixin/Moesin) family proteins. FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain is present at the N-terminus of a large and diverse group of proteins that mediate linkage of the cytoskeleton to the plasma membrane. FERM-containing proteins are ubiquitous components of the cytocortex and are involved in cell transport, cell structure and signaling functions. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N), which is structurally similar to ubiquitin."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain and F1 sub-domain, found in FERM (Four.1/Ezrin/Radixin/Moesin) family proteins. FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain is present at the N-terminus of a large and diverse group of proteins that mediate linkage of the cytoskeleton to the plasma membrane. FERM-containing proteins are ubiquitous components of the cytocortex and are involved in cell transport, cell structure and signaling functions. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N), which is structurally similar to ubiquitin. — an NCBI CDD conserved domain (cd01765); members share this curated model.
