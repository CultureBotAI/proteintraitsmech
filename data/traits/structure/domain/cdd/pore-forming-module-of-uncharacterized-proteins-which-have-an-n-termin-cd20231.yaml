identifier: CDD:cd20231
label: "pore-forming module of uncharacterized proteins which have an N-terminal jacalin-like lectin domain, and similar aerolysin-type beta-barrel pore-forming proteins. Jacalin-like lectins are sugar-binding protein domains. Proteins having these lectin domains may bind mono- or oligosaccharides with high specificity. Generally, pore-forming proteins (PFPs) are secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores detrimental to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel. Many of this family are bacterial toxins. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin)."
definition: >-
  pore-forming module of uncharacterized proteins which have an N-terminal jacalin-like lectin domain, and similar aerolysin-type beta-barrel pore-forming proteins. Jacalin-like lectins are sugar-binding protein domains. Proteins having these lectin domains may bind mono- or oligosaccharides with high specificity. Generally, pore-forming proteins (PFPs) are secreted as water-soluble monomers, which upon binding to target lipid membranes, oligomerize and form transmembrane pores detrimental to cells. Beta-PFPs form pores by transmembrane beta-barrels. Aerolysin-type beta-PFPs are believed to use an amphipathic beta-hairpin to form the beta-barrel. Many of this family are bacterial toxins. A significant portion of the monomeric subunit structure is re-organized to form the pore. Oligomers formed by members of the aerolysin family include: hepta- (aerolysin), octa- (Dln1), and nonameric oligomers (lysenin and monalysin). — an NCBI CDD conserved domain (cd20231); members share this curated model.
