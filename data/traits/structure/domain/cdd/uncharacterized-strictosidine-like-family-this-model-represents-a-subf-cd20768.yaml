identifier: CDD:cd20768
label: "uncharacterized strictosidine-like family. This model represents a subfamily of the N6P (Nucleophilic attack 6-bladed beta-propeller) superfamily, a set of enzymes including and related to strictosidine synthase, a key enzyme in the production of indole alkaloids in plants. The N6P family is widely distributed across all three kindgoms of life and many subfamilies are uncharacterized. Included are vertebrate paraoxonase, the major royal jelly protein, the yellow protein of drosophila, members of the senescence marker protein 30 (SMP30)/gluconolactonase family, regulocalcin, S-valerolactone hydrolase. The proteins in this family are composed of six beta-propeller repeats that form a closed structure, similar to WD40- and NHL-repeat containing protein families."
definition: >-
  uncharacterized strictosidine-like family. This model represents a subfamily of the N6P (Nucleophilic attack 6-bladed beta-propeller) superfamily, a set of enzymes including and related to strictosidine synthase, a key enzyme in the production of indole alkaloids in plants. The N6P family is widely distributed across all three kindgoms of life and many subfamilies are uncharacterized. Included are vertebrate paraoxonase, the major royal jelly protein, the yellow protein of drosophila, members of the senescence marker protein 30 (SMP30)/gluconolactonase family, regulocalcin, S-valerolactone hydrolase. The proteins in this family are composed of six beta-propeller repeats that form a closed structure, similar to WD40- and NHL-repeat containing protein families. — an NCBI CDD conserved domain (cd20768); members share this curated model.
