identifier: CDD:cd07370
label: "The Class III extradiol dioxygenase, homoprotocatechuate 2,3-dioxygenase, catalyzes the key ring cleavage step in the metabolism of homoprotocatechuate. 3,4-dihydroxyphenylacetate (homoprotocatechuate) 2,3-dioxygenase (HPCD) catalyzes the key ring cleavage step in the metabolism of homoprotocatechuate (hpca), a central intermediate in the bacterial degradation of aromatic compounds. The enzyme incorporates both atoms of molecular oxygen into hpca, resulting in aromatic ring-opening to yield alpha-hydroxy-delta-carboxymethyl cis-muconic semialdehyde. HPCD is a member of the class III extradiol dioxygenase family, a group of enzymes which use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon."
definition: >-
  The Class III extradiol dioxygenase, homoprotocatechuate 2,3-dioxygenase, catalyzes the key ring cleavage step in the metabolism of homoprotocatechuate. 3,4-dihydroxyphenylacetate (homoprotocatechuate) 2,3-dioxygenase (HPCD) catalyzes the key ring cleavage step in the metabolism of homoprotocatechuate (hpca), a central intermediate in the bacterial degradation of aromatic compounds. The enzyme incorporates both atoms of molecular oxygen into hpca, resulting in aromatic ring-opening to yield alpha-hydroxy-delta-carboxymethyl cis-muconic semialdehyde. HPCD is a member of the class III extradiol dioxygenase family, a group of enzymes which use a non-heme Fe(II) to cleave aromatic rings between a hydroxylated carbon and an adjacent non-hydroxylated carbon. — an NCBI CDD conserved domain (cd07370); members share this curated model.
