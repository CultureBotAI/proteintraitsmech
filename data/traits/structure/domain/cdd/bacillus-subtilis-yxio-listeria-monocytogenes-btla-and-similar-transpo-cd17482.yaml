identifier: CDD:cd17482
label: "Bacillus subtilis YxiO, Listeria monocytogenes BtlA, and similar transporters of the Major Facilitator Superfamily. This family is composed of Bacillus subtilis MFS-type transporter YxiO, and similar proteins including Listeria monocytogenes BtlA. The function of B. subtilis YxiO is still unknown, and L. monocytogenes BtlA is a putative secondary transporter involved in bile tolerance and general stress resistance. This family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Bacillus subtilis YxiO, Listeria monocytogenes BtlA, and similar transporters of the Major Facilitator Superfamily. This family is composed of Bacillus subtilis MFS-type transporter YxiO, and similar proteins including Listeria monocytogenes BtlA. The function of B. subtilis YxiO is still unknown, and L. monocytogenes BtlA is a putative secondary transporter involved in bile tolerance and general stress resistance. This family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17482); members share this curated model.
