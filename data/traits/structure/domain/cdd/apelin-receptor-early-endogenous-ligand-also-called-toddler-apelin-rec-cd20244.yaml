identifier: CDD:cd20244
label: "Apelin receptor early endogenous ligand, also called Toddler. Apelin receptor early endogenous ligand, also called protein Elabela or protein Toddler, is an endogenous peptidic ligand of the G protein-coupled receptor APJ, also called apelin receptor (APLNR). The apelin/APJ axis contributes to maintaining homeostasis in normal and pathological hearts, and is also involved in heart development, including endoderm differentiation, heart morphogenesis and coronary vascular formation. Elabela/Toddler plays crucial roles in heart development and disease conditions, presumably at time points or at areas of the heart different from apelin. It is a potential therapeutic peptide, showing beneficial effects on body fluid homeostasis, cardiovascular health, and renal insufficiency, as well as potential benefits for metabolism and diabetes."
definition: >-
  Apelin receptor early endogenous ligand, also called Toddler. Apelin receptor early endogenous ligand, also called protein Elabela or protein Toddler, is an endogenous peptidic ligand of the G protein-coupled receptor APJ, also called apelin receptor (APLNR). The apelin/APJ axis contributes to maintaining homeostasis in normal and pathological hearts, and is also involved in heart development, including endoderm differentiation, heart morphogenesis and coronary vascular formation. Elabela/Toddler plays crucial roles in heart development and disease conditions, presumably at time points or at areas of the heart different from apelin. It is a potential therapeutic peptide, showing beneficial effects on body fluid homeostasis, cardiovascular health, and renal insufficiency, as well as potential benefits for metabolism and diabetes. — an NCBI CDD conserved domain (cd20244); members share this curated model.
