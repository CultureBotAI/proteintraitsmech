identifier: CDD:cd08091
label: "ATP-grasp domain of succinyl-CoA synthetase, ATP-citrate lyase, acetyl-CoA synthetase, and pimeloyl-CoA synthetase. All members in this family have the signature nucleotide-binding domain of ATP-grasp superfamily. The catalytic reaction requires the presence of ATP and Mg ions. This family includes succinyl-CoA synthetase, ATP-citrate lyase, acetyl-CoA synthetase, and pimeloyl-CoA synthetase subfamilies."
definition: >-
  ATP-grasp domain of succinyl-CoA synthetase, ATP-citrate lyase, acetyl-CoA synthetase, and pimeloyl-CoA synthetase. All members in this family have the signature nucleotide-binding domain of ATP-grasp superfamily. The catalytic reaction requires the presence of ATP and Mg ions. This family includes succinyl-CoA synthetase, ATP-citrate lyase, acetyl-CoA synthetase, and pimeloyl-CoA synthetase subfamilies. — an NCBI CDD conserved domain (cd08091); members share this curated model.
