identifier: CDD:cd04152
label: "Arf-like 4 (Arl4) and 7 (Arl7) GTPases. Arl4 (Arf-like 4) is highly expressed in testicular germ cells, and is found in the nucleus and nucleolus. In mice, Arl4 is developmentally expressed during embryogenesis, and a role in somite formation and central nervous system differentiation has been proposed. Arl7 has been identified as the only Arf/Arl protein to be induced by agonists of liver X-receptor and retinoid X-receptor and by cholesterol loading in human macrophages. Arl7 is proposed to play a role in transport between a perinuclear compartment and the plasma membrane, apparently linked to the ABCA1-mediated cholesterol secretion pathway. Older literature suggests that Arl6 is a part of the Arl4/Arl7 subfamily, but analyses based on more recent sequence data place Arl6 in its own subfamily."
definition: >-
  Arf-like 4 (Arl4) and 7 (Arl7) GTPases. Arl4 (Arf-like 4) is highly expressed in testicular germ cells, and is found in the nucleus and nucleolus. In mice, Arl4 is developmentally expressed during embryogenesis, and a role in somite formation and central nervous system differentiation has been proposed. Arl7 has been identified as the only Arf/Arl protein to be induced by agonists of liver X-receptor and retinoid X-receptor and by cholesterol loading in human macrophages. Arl7 is proposed to play a role in transport between a perinuclear compartment and the plasma membrane, apparently linked to the ABCA1-mediated cholesterol secretion pathway. Older literature suggests that Arl6 is a part of the Arl4/Arl7 subfamily, but analyses based on more recent sequence data place Arl6 in its own subfamily. — an NCBI CDD conserved domain (cd04152); members share this curated model.
