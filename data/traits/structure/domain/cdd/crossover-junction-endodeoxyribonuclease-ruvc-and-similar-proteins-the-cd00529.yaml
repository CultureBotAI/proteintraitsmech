identifier: CDD:cd00529
label: "Crossover junction endodeoxyribonuclease RuvC and similar proteins. The RuvC-like family consists of bacterial RuvC, fungal Cruciform cutting endonuclease 1 (CCE1), bacterial YqgF and monokaryotic chloroplast 1 protein (MOC1). RuvC, CCE1 and MOC1 are Holliday junction resolvases (HJRs), endonucleases that specifically resolve Holliday junction DNA intermediates during homologous recombination. RuvC is part of the RuvABC pathway in Escherichia coli and other Gram-negative bacteria that is involved in processing Holliday junctions, which are formed by the reciprocal exchange of strands between two DNA duplexes. CCE1 is a HJR specific for 4-way junctions; it is involved in the maintenance of mitochondrial DNA. Escherichia coli YqgF has been shown to act as a pre-16S rRNA nuclease, presumably as a monomer. It is involved in the processing of pre-16S rRNA during ribosome maturation. HJRs occur in archaea, bacteria, and in the mitochondria of certain fungi. RuvC and its orthologs are homodimers and display structural similarity to RNase H and Hsp70."
definition: >-
  Crossover junction endodeoxyribonuclease RuvC and similar proteins. The RuvC-like family consists of bacterial RuvC, fungal Cruciform cutting endonuclease 1 (CCE1), bacterial YqgF and monokaryotic chloroplast 1 protein (MOC1). RuvC, CCE1 and MOC1 are Holliday junction resolvases (HJRs), endonucleases that specifically resolve Holliday junction DNA intermediates during homologous recombination. RuvC is part of the RuvABC pathway in Escherichia coli and other Gram-negative bacteria that is involved in processing Holliday junctions, which are formed by the reciprocal exchange of strands between two DNA duplexes. CCE1 is a HJR specific for 4-way junctions; it is involved in the maintenance of mitochondrial DNA. Escherichia coli YqgF has been shown to act as a pre-16S rRNA nuclease, presumably as a monomer. It is involved in the processing of pre-16S rRNA during ribosome maturation. HJRs occur in archaea, bacteria, and in the mitochondria of certain fungi. RuvC and its orthologs are homodimers and display structural similarity to RNase H and Hsp70. — an NCBI CDD conserved domain (cd00529); members share this curated model.
