identifier: CDD:cd20844
label: "second protein kinase C conserved region 1 (C1 domain) found in protein kinase D3 (PKD3) and similar proteins. PKD3 is also called PRKD3, PRKCN, serine/threonine-protein kinase D3 (nPKC-D3), protein kinase C nu type (nPKC-nu), or protein kinase EPK2. It converts transient diacylglycerol (DAG) signals into prolonged physiological effects, downstream of PKC. It is involved in the regulation of the cell cycle by modulating microtubule nucleation and dynamics. PKD3 acts as a key mediator in several cancer development signaling pathways. PKD3 contains N-terminal tandem cysteine-rich zinc binding C1 (PKC conserved region 1), central PH (Pleckstrin Homology), and C-terminal catalytic kinase domains. This model corresponds to the second C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  second protein kinase C conserved region 1 (C1 domain) found in protein kinase D3 (PKD3) and similar proteins. PKD3 is also called PRKD3, PRKCN, serine/threonine-protein kinase D3 (nPKC-D3), protein kinase C nu type (nPKC-nu), or protein kinase EPK2. It converts transient diacylglycerol (DAG) signals into prolonged physiological effects, downstream of PKC. It is involved in the regulation of the cell cycle by modulating microtubule nucleation and dynamics. PKD3 acts as a key mediator in several cancer development signaling pathways. PKD3 contains N-terminal tandem cysteine-rich zinc binding C1 (PKC conserved region 1), central PH (Pleckstrin Homology), and C-terminal catalytic kinase domains. This model corresponds to the second C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20844); members share this curated model.
