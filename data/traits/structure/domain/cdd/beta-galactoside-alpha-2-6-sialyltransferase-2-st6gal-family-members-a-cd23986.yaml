label: "beta-galactoside alpha-2,6-sialyltransferase 2. ST6Gal family members are beta-galactoside alpha-2,3-sialyltransferases that catalyze an alpha2,6-linkage between sialic acid and the terminal galactose residue of a glycochain, by a transfering sialic acid from CMP-Sia. Members of this family belong to glycosyltransferase family 29 (GT29)."
