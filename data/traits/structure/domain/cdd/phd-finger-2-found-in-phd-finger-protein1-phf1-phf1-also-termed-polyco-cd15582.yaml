identifier: CDD:cd15582
label: "PHD finger 2 found in PHD finger protein1 (PHF1). PHF1, also termed Polycomb-like protein 1 (PCL1), together with JARID2 and AEBP2, associates with the Polycomb repressive complex 2 (PRC2), which is the major H3K27 methyltransferase that regulates pluripotency, differentiation, and tumorigenesis through catalysis of histone H3 lysine 27 trimethylation (H3K27me3) on chromatin. PHF1 is essential in epigenetic regulation and genome maintenance. It acts as a dual reader of Lysine trimethylation at Lysine 36 of Histone H3 and Lysine 27 of Histone variant H3t. PHF1 consists of an N-terminal Tudor domain followed by two plant homeodomain (PHD) fingers, and a C-terminal MTF2 domain. Its Tudor domain selectively binds to histone H3K36me3. Moreover, PHF1 is required for efficient H3K27me3 and Hox gene silencing. It can mediate deposition of the repressive H3K27me3 mark and acts as a cofactor in early DNA-damage response. This model corresponds to the second PHD finger."
definition: >-
  PHD finger 2 found in PHD finger protein1 (PHF1). PHF1, also termed Polycomb-like protein 1 (PCL1), together with JARID2 and AEBP2, associates with the Polycomb repressive complex 2 (PRC2), which is the major H3K27 methyltransferase that regulates pluripotency, differentiation, and tumorigenesis through catalysis of histone H3 lysine 27 trimethylation (H3K27me3) on chromatin. PHF1 is essential in epigenetic regulation and genome maintenance. It acts as a dual reader of Lysine trimethylation at Lysine 36 of Histone H3 and Lysine 27 of Histone variant H3t. PHF1 consists of an N-terminal Tudor domain followed by two plant homeodomain (PHD) fingers, and a C-terminal MTF2 domain. Its Tudor domain selectively binds to histone H3K36me3. Moreover, PHF1 is required for efficient H3K27me3 and Hox gene silencing. It can mediate deposition of the repressive H3K27me3 mark and acts as a cofactor in early DNA-damage response. This model corresponds to the second PHD finger. — an NCBI CDD conserved domain (cd15582); members share this curated model.
