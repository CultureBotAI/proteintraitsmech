identifier: CDD:cd11435
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor repressor (AhRR) and similar proteins. AhRR, also termed AhR repressor, or Class E basic helix-loop-helix protein 77 (bHLHe77), is a member of bHLH-PAS transcription factors that acts as a negative regulator of AhR (or Dioxin Receptor), playing key roles in development and environmental sensing. AhR is activated by Dioxin to control the expression of certain genes to influence biological processes such as apoptosis, proliferation, cell growth and differentiation. To form active DNA binding complexes, AhR dimerizes with a bHLH-PAS factor ARNT (Aryl hydrocarbon Nuclear Receptor Translocator). AhRR functions by competing with AhR for its partner ARNT. AhRR-ARNT complexes are transcriptionally inactive."
