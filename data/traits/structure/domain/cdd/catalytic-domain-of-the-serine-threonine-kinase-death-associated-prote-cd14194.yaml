identifier: CDD:cd14194
label: "Catalytic domain of the Serine/Threonine Kinase, Death-Associated Protein Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DAPKs mediate cell death and act as tumor suppressors. They are necessary to induce cell death and their overexpression leads to death-associated changes including membrane blebbing, cell rounding, and formation of autophagic vesicles. Vertebrates contain three subfamily members with different domain architecture, localization, and function. DAPK1 is the prototypical member of the subfamily and is also simply referred to as DAPK. It is Ca2+/calmodulin (CaM)-regulated and actin-associated protein that contains an N-terminal kinase domain followed by an autoinhibitory CaM binding region and a large C-terminal extension with multiple functional domains including ankyrin (ANK) repeats, a cytoskeletal binding domain, a Death domain, and a serine-rich tail. Loss of DAPK1 expression, usually because of DNA methylation, is implicated in many tumor types. DAPK1 is highly abundant in the brain and has also been associated with neurodegeneration. The DAPK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Death-Associated Protein Kinase 1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DAPKs mediate cell death and act as tumor suppressors. They are necessary to induce cell death and their overexpression leads to death-associated changes including membrane blebbing, cell rounding, and formation of autophagic vesicles. Vertebrates contain three subfamily members with different domain architecture, localization, and function. DAPK1 is the prototypical member of the subfamily and is also simply referred to as DAPK. It is Ca2+/calmodulin (CaM)-regulated and actin-associated protein that contains an N-terminal kinase domain followed by an autoinhibitory CaM binding region and a large C-terminal extension with multiple functional domains including ankyrin (ANK) repeats, a cytoskeletal binding domain, a Death domain, and a serine-rich tail. Loss of DAPK1 expression, usually because of DNA methylation, is implicated in many tumor types. DAPK1 is highly abundant in the brain and has also been associated with neurodegeneration. The DAPK1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14194); members share this curated model.
