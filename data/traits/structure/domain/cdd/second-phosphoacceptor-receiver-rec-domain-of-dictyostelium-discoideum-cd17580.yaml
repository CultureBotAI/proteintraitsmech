identifier: CDD:cd17580
label: "second phosphoacceptor receiver (REC) domain of Dictyostelium discoideum hybrid signal transduction histidine kinase D and similar domains. Dictyostelium discoideum hybrid signal transduction histidine kinase D (DhkD) is a large protein that contains two histidine kinase (HK) and two REC domains on the intracellular side of a single pass transmembrane domain, and extracellular PAS and PAC domains that likely are involved in ligand binding. This model represents the second REC domain and similar domains. DhkD activates the cAMP phosphodiesterase RegA to ensure proper prestalk and prespore patterning, tip formation, and the vertical elongation of the mound into a finger, in Dictyostelium discoideum. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  second phosphoacceptor receiver (REC) domain of Dictyostelium discoideum hybrid signal transduction histidine kinase D and similar domains. Dictyostelium discoideum hybrid signal transduction histidine kinase D (DhkD) is a large protein that contains two histidine kinase (HK) and two REC domains on the intracellular side of a single pass transmembrane domain, and extracellular PAS and PAC domains that likely are involved in ligand binding. This model represents the second REC domain and similar domains. DhkD activates the cAMP phosphodiesterase RegA to ensure proper prestalk and prespore patterning, tip formation, and the vertical elongation of the mound into a finger, in Dictyostelium discoideum. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17580); members share this curated model.
