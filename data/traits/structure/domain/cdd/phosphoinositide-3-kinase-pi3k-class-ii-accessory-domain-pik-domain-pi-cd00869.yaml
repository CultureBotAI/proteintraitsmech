identifier: CDD:cd00869
label: "Phosphoinositide 3-kinase (PI3K) class II, accessory domain (PIK domain); PIK domain is conserved in all PI3 and PI4-kinases. Its role is unclear but it has been suggested to be involved in substrate presentation. In general,  class II PI3-kinases phosphorylate phosphoinositol (PtdIns), PtdIns(4)-phosphate, but not PtdIns(4,5)-bisphosphate. They are larger, having a C2 domain at the C-terminus."
definition: >-
  Phosphoinositide 3-kinase (PI3K) class II, accessory domain (PIK domain); PIK domain is conserved in all PI3 and PI4-kinases. Its role is unclear but it has been suggested to be involved in substrate presentation. In general, class II PI3-kinases phosphorylate phosphoinositol (PtdIns), PtdIns(4)-phosphate, but not PtdIns(4,5)-bisphosphate. They are larger, having a C2 domain at the C-terminus. — an NCBI CDD conserved domain (cd00869); members share this curated model.
