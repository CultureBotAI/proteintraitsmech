identifier: CDD:cd22047
label: "high mobility group (HMG)-box found in sex determining region Y (SRY)-box 17 (SOX17) and similar proteins. SOX-17 is a developmental transcription regulator involved in endoderm formation, angiogenesis, and carcinogenesis. It acts as a tumor suppressor and modulates WNT signaling. SOX-17 binds target promoter DNA and bends the DNA. It binds to the sequences 5'-AACAAT-'3 or 5'-AACAAAG-3'. SOX-17 belongs to the group F of SRY-related high-mobility group (HMG) box (Sox) transcription factors."
definition: >-
  high mobility group (HMG)-box found in sex determining region Y (SRY)-box 17 (SOX17) and similar proteins. SOX-17 is a developmental transcription regulator involved in endoderm formation, angiogenesis, and carcinogenesis. It acts as a tumor suppressor and modulates WNT signaling. SOX-17 binds target promoter DNA and bends the DNA. It binds to the sequences 5'-AACAAT-'3 or 5'-AACAAAG-3'. SOX-17 belongs to the group F of SRY-related high-mobility group (HMG) box (Sox) transcription factors. — an NCBI CDD conserved domain (cd22047); members share this curated model.
