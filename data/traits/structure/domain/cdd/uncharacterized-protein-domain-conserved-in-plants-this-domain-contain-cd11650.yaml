identifier: CDD:cd11650
label: "Uncharacterized protein domain conserved in plants. This domain contains an extensive protein sequence fragment that appears conserved in a number of plant proteins, including the gene product of Arabidopsis thaliana locus AT4G37440, which has been identified in transcriptional profiling as expressed at different levels in white cabbage cultivars."
definition: >-
  Uncharacterized protein domain conserved in plants. This domain contains an extensive protein sequence fragment that appears conserved in a number of plant proteins, including the gene product of Arabidopsis thaliana locus AT4G37440, which has been identified in transcriptional profiling as expressed at different levels in white cabbage cultivars. — an NCBI CDD conserved domain (cd11650); members share this curated model.
