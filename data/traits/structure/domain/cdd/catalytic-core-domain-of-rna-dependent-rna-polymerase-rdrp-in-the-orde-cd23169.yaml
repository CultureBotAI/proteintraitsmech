identifier: CDD:cd23169
label: "catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the order Picornavirales of positive-sense single-stranded RNA [(+)ssRNA] viruses. This family contains the catalytic core domain of RdRp of Picornavirales, an order of (+)ssRNA viruses. The order Picornavirales comprises viruses that historically are referred to as picorna-like viruses and which are classified into eight virus families: Caliciviridae, Dicistroviridae, Iflaviridae, Marnaviridae, Picornaviridae, Polycipiviridae, Secoviridae, and Solinviviridae. All known genomes of Picornavirales members encode proteins with helicase, 3C-like protease, and RdRp domains, as well as capsid proteins with related structures, although the genome organizations can differ among viruses. The picornavirus genome is replicated via a negative-sense (-) RNA intermediate by the viral RdRp, named 3Dpol, which uses VPg (the product of 3B) as a primer to initiate the replication process. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides."
definition: >-
  catalytic core domain of RNA-dependent RNA polymerase (RdRp) in the order Picornavirales of positive-sense single-stranded RNA [(+)ssRNA] viruses. This family contains the catalytic core domain of RdRp of Picornavirales, an order of (+)ssRNA viruses. The order Picornavirales comprises viruses that historically are referred to as picorna-like viruses and which are classified into eight virus families: Caliciviridae, Dicistroviridae, Iflaviridae, Marnaviridae, Picornaviridae, Polycipiviridae, Secoviridae, and Solinviviridae. All known genomes of Picornavirales members encode proteins with helicase, 3C-like protease, and RdRp domains, as well as capsid proteins with related structures, although the genome organizations can differ among viruses. The picornavirus genome is replicated via a negative-sense (-) RNA intermediate by the viral RdRp, named 3Dpol, which uses VPg (the product of 3B) as a primer to initiate the replication process. The RdRp domain displays a right hand with three functional subdomains, called fingers, palm, and thumb. All RdRps contain conserved polymerase motifs (A-G), located in the palm (A-E motifs) and finger (F-G) subdomains. All these motifs have been implicated in RdRp fidelity such as processes of correct incorporation and reorganization of nucleotides. — an NCBI CDD conserved domain (cd23169); members share this curated model.
