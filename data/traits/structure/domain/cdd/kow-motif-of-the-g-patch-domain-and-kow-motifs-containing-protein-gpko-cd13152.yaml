identifier: CDD:cd13152
label: "KOW motif of the \"G-patch domain and KOW motifs-containing protein\" (GPKOW) repeat A. GPKOW contains one G-patch domain and two KOW motifs. GPKOW is a nuclear protein that regulated by catalytic (C) subunit of Protein Kinase A (PKA) and bind RNA in vivo. PKA may be involved in regulating multiple steps in post-transcriptional processing of pre-mRNAs. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. GPKOW is also known as T54 protein or MOS2 homolog."
definition: >-
  KOW motif of the "G-patch domain and KOW motifs-containing protein" (GPKOW) repeat A. GPKOW contains one G-patch domain and two KOW motifs. GPKOW is a nuclear protein that regulated by catalytic (C) subunit of Protein Kinase A (PKA) and bind RNA in vivo. PKA may be involved in regulating multiple steps in post-transcriptional processing of pre-mRNAs. KOW domain is known as an RNA-binding motif that is shared so far among some families of ribosomal proteins, the essential bacterial transcriptional elongation factor NusG, the eukaryotic chromatin elongation factor Spt5, the higher eukaryotic KIN17 proteins and Mtr4. GPKOW is also known as T54 protein or MOS2 homolog. — an NCBI CDD conserved domain (cd13152); members share this curated model.
