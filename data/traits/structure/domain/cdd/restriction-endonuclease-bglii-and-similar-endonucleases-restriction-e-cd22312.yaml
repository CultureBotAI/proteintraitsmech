identifier: CDD:cd22312
label: "Restriction endonuclease BglII and similar endonucleases. Restriction endonuclease BglII cleaves duplex DNA containing the sequence 5'-A|GATCT-3' (| designates the cleavage position) to generate staggered products with four nucleotide 5'-overhangs. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease BglII and similar endonucleases. Restriction endonuclease BglII cleaves duplex DNA containing the sequence 5'-A|GATCT-3' (| designates the cleavage position) to generate staggered products with four nucleotide 5'-overhangs. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22312); members share this curated model.
