identifier: CDD:cd12791
label: "Ras-GTPase Activating Domain of plexin-B3. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. Plexins are divided into four types (A-D) according to sequence similarity. Plexin-B3 is the receptor of semaphorin 5A. It is a highly potent stimulator of neurite outgrowth of primary murine cerebellar neurons. Plexin-B3 has been linked to verbal performance and white matter volume in human brain. Furthermore, Sema5A and plexin-B3 have been implicated in the progression of various types of cancer. They play an important role in the invasion and metastasis of gastric carcinoma. The protein and mRNA expression of Sema5A and its receptor plexin-B3 increased gradually in non-neoplastic mucosa, primary gastric carcinoma, and lymph node metastasis, and their expression is correlated. The stimulation of plexin-B3 by Sema5A binding in human glioma cells results in the inhibition of cell migration and invasion. Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator."
definition: >-
  Ras-GTPase Activating Domain of plexin-B3. Plexins form a conserved family of transmembrane receptors for semaphorins and may be the ancestors of semaphorins. Plexins are divided into four types (A-D) according to sequence similarity. Plexin-B3 is the receptor of semaphorin 5A. It is a highly potent stimulator of neurite outgrowth of primary murine cerebellar neurons. Plexin-B3 has been linked to verbal performance and white matter volume in human brain. Furthermore, Sema5A and plexin-B3 have been implicated in the progression of various types of cancer. They play an important role in the invasion and metastasis of gastric carcinoma. The protein and mRNA expression of Sema5A and its receptor plexin-B3 increased gradually in non-neoplastic mucosa, primary gastric carcinoma, and lymph node metastasis, and their expression is correlated. The stimulation of plexin-B3 by Sema5A binding in human glioma cells results in the inhibition of cell migration and invasion. Plexins contain a C-terminal RasGAP domain, which functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Plexins display GAP activity towards the Ras homolog Rap. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a large number of of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGAP domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator. — an NCBI CDD conserved domain (cd12791); members share this curated model.
