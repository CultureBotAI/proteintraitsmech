identifier: CDD:cd22473
label: "type I K homology (KH) RNA-binding domain found in DEAD box protein 46 (DDX46) and similar proteins. DDX46, also called PRP5 homolog, is an ATP-dependent RNA helicase that plays an essential role in splicing, either prior to, or during splicing A complex formation. It inhibits antiviral innate responses by entrapping selected antiviral transcripts in the nucleus. It is also involved in the development of several tumors. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  type I K homology (KH) RNA-binding domain found in DEAD box protein 46 (DDX46) and similar proteins. DDX46, also called PRP5 homolog, is an ATP-dependent RNA helicase that plays an essential role in splicing, either prior to, or during splicing A complex formation. It inhibits antiviral innate responses by entrapping selected antiviral transcripts in the nucleus. It is also involved in the development of several tumors. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22473); members share this curated model.
