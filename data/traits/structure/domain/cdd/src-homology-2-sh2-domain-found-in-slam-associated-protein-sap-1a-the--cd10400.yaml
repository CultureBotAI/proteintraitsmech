identifier: CDD:cd10400
label: "Src homology 2 (SH2) domain found in SLAM-associated protein (SAP) 1a. The X-linked lymphoproliferative syndrome (XLP) gene encodes SAP (also called SH2D1A/DSHP) a protein that consists of a 5 residue N-terminus, a single SH2 domain, and a short 25 residue C-terminal tail. XLP is characterized by an extreme sensitivity to Epstein-Barr virus.  Both T and natural killer (NK) cell dysfunctions have been seen in XLP patients. SAP binds the cytoplasmic tail of Signaling lymphocytic activation molecule (SLAM), 2B4, Ly-9, and CD84. SAP is believed to function as a signaling inhibitor, by blocking or regulating binding of other signaling proteins. SAP and the SAP-like protein EAT-2 recognize the sequence motif TIpYXX[VI], which is found in the cytoplasmic domains of a restricted number of T, B, and NK cell surface receptors and are proposed to be natural inhibitors or regulators of the physiological role of a small family of receptors on the surface of these cells.  In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in SLAM-associated protein (SAP) 1a. The X-linked lymphoproliferative syndrome (XLP) gene encodes SAP (also called SH2D1A/DSHP) a protein that consists of a 5 residue N-terminus, a single SH2 domain, and a short 25 residue C-terminal tail. XLP is characterized by an extreme sensitivity to Epstein-Barr virus. Both T and natural killer (NK) cell dysfunctions have been seen in XLP patients. SAP binds the cytoplasmic tail of Signaling lymphocytic activation molecule (SLAM), 2B4, Ly-9, and CD84. SAP is believed to function as a signaling inhibitor, by blocking or regulating binding of other signaling proteins. SAP and the SAP-like protein EAT-2 recognize the sequence motif TIpYXX[VI], which is found in the cytoplasmic domains of a restricted number of T, B, and NK cell surface receptors and are proposed to be natural inhibitors or regulators of the physiological role of a small family of receptors on the surface of these cells. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10400); members share this curated model.
