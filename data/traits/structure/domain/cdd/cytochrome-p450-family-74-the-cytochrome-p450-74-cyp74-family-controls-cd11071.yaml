identifier: CDD:cd11071
label: "cytochrome P450 family 74. The cytochrome P450 74 (CYP74) family controls several enzymatic conversions of fatty acid hydroperoxides to bioactive oxylipins in plants, some invertebrates, and bacteria. It includes two dehydrases, namely allene oxide synthase (AOS) and divinyl ether synthase (DES), and two isomerases, hydroperoxide lyase (HPL) and epoxyalcohol synthase (EAS). AOS (EC 4.2.1.92, also called hydroperoxide dehydratase), such as Arabidopsis thaliana CYP74A acts on a number of unsaturated fatty-acid hydroperoxides, forming the corresponding allene oxides. DES (EC 4.2.1.121), also called colneleate synthase or CYP74D, catalyzes the selective removal of pro-R hydrogen at C-8 in the biosynthesis of colneleic acid. The linolenate HPL, Arabidopsis thaliana CYP74B2, is required for the synthesis of the green leaf volatiles (GLVs) hexanal and trans-2-hexenal. The fatty acid HPL, Solanum lycopersicum CYP74B, is involved in the biosynthesis of traumatin and C6 aldehydes. The epoxyalcohol synthase Ranunculus japonicus CYP74A88 (also known as RjEAS) specifically converts linoleic acid 9- and 13-hydroperoxides to oxiranyl carbinols 9,10-epoxy-11-hydroxy-12-octadecenoic acid and 11-hydroxy-12,13-epoxy-9-octadecenoic acid, respectively. The CYP74 family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 74. The cytochrome P450 74 (CYP74) family controls several enzymatic conversions of fatty acid hydroperoxides to bioactive oxylipins in plants, some invertebrates, and bacteria. It includes two dehydrases, namely allene oxide synthase (AOS) and divinyl ether synthase (DES), and two isomerases, hydroperoxide lyase (HPL) and epoxyalcohol synthase (EAS). AOS (EC 4.2.1.92, also called hydroperoxide dehydratase), such as Arabidopsis thaliana CYP74A acts on a number of unsaturated fatty-acid hydroperoxides, forming the corresponding allene oxides. DES (EC 4.2.1.121), also called colneleate synthase or CYP74D, catalyzes the selective removal of pro-R hydrogen at C-8 in the biosynthesis of colneleic acid. The linolenate HPL, Arabidopsis thaliana CYP74B2, is required for the synthesis of the green leaf volatiles (GLVs) hexanal and trans-2-hexenal. The fatty acid HPL, Solanum lycopersicum CYP74B, is involved in the biosynthesis of traumatin and C6 aldehydes. The epoxyalcohol synthase Ranunculus japonicus CYP74A88 (also known as RjEAS) specifically converts linoleic acid 9- and 13-hydroperoxides to oxiranyl carbinols 9,10-epoxy-11-hydroxy-12-octadecenoic acid and 11-hydroxy-12,13-epoxy-9-octadecenoic acid, respectively. The CYP74 family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11071); members share this curated model.
