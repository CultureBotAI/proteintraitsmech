identifier: CDD:cd16170
label: "DNA-binding domain of the bacterial xenogeneic silencer MvaT. MvaT is a xenogeneic silencer conserved in Pseudomonas which assists in distinguishing foreign from self DNA. It prefers binding to flexible DNA segments with multiple TpA steps, and forms nucleoprotein filaments through cooperative polymerization."
definition: >-
  DNA-binding domain of the bacterial xenogeneic silencer MvaT. MvaT is a xenogeneic silencer conserved in Pseudomonas which assists in distinguishing foreign from self DNA. It prefers binding to flexible DNA segments with multiple TpA steps, and forms nucleoprotein filaments through cooperative polymerization. — an NCBI CDD conserved domain (cd16170); members share this curated model.
