identifier: CDD:cd14360
label: "UBA-like domain found in uncharacterized bacteria proteins similar to eukaryotic nascent polypeptide-associated complex proteins (NAC). This subfamily contains a group of uncharacterized proteins found in bacteria. They all contain an N-terminal ubiquitin-associated (UBA) that shows high sequence similarity with that of eukaryotic nascent polypeptide-associated complex proteins (NAC) which is one of the cytosolic chaperones that contact the nascent polypeptide chains as they emerge from the ribosome and assist in post-translational processes."
definition: >-
  UBA-like domain found in uncharacterized bacteria proteins similar to eukaryotic nascent polypeptide-associated complex proteins (NAC). This subfamily contains a group of uncharacterized proteins found in bacteria. They all contain an N-terminal ubiquitin-associated (UBA) that shows high sequence similarity with that of eukaryotic nascent polypeptide-associated complex proteins (NAC) which is one of the cytosolic chaperones that contact the nascent polypeptide chains as they emerge from the ribosome and assist in post-translational processes. — an NCBI CDD conserved domain (cd14360); members share this curated model.
