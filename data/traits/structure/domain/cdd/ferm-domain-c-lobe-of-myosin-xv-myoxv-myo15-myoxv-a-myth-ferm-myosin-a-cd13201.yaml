identifier: CDD:cd13201
label: "FERM domain C-lobe of Myosin XV (MyoXV/Myo15). MyoXV, a MyTH-FERM myosin, are actin-based motor proteins essential for a variety of biological processes in actin cytoskeleton function. Specifically MyoXV functions in the actin organization in hair cells of the organ of Corti. Mutations in Human MyoXVa causes non-syndromic deafness, DFNB3 and the mouse shaker-2 mutation. MyoXV consists of a N-terminal motor/head region, a neck made of 1-3 IQ motifs, and a tail that consists of either a myosin tail homology 4 (MyTH4) domains, followed by an SH3 domain, and a MyTH-FERM domains as in rat Myo15 or two MyTH-FERM domains separated by a SH3 domain as in human Myo15A. The MyTH-FERM domains are thought to mediate dimerization and binding to other proteins or cargo. The FERM domain has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe/F3 within the FERM domain is part of the PH domain family. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs), the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites."
definition: >-
  FERM domain C-lobe of Myosin XV (MyoXV/Myo15). MyoXV, a MyTH-FERM myosin, are actin-based motor proteins essential for a variety of biological processes in actin cytoskeleton function. Specifically MyoXV functions in the actin organization in hair cells of the organ of Corti. Mutations in Human MyoXVa causes non-syndromic deafness, DFNB3 and the mouse shaker-2 mutation. MyoXV consists of a N-terminal motor/head region, a neck made of 1-3 IQ motifs, and a tail that consists of either a myosin tail homology 4 (MyTH4) domains, followed by an SH3 domain, and a MyTH-FERM domains as in rat Myo15 or two MyTH-FERM domains separated by a SH3 domain as in human Myo15A. The MyTH-FERM domains are thought to mediate dimerization and binding to other proteins or cargo. The FERM domain has a cloverleaf tripart structure composed of: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe/F3 within the FERM domain is part of the PH domain family. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs), the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites. — an NCBI CDD conserved domain (cd13201); members share this curated model.
