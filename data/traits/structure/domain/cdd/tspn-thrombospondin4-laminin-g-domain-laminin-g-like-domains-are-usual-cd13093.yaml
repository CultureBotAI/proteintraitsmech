identifier: CDD:cd13093
label: "TSPN_Thrombospondin4. Laminin G domain; Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans. LamG domains of neurexin and agrin undergo alternative splicing that modulates their affinity for protein ligands. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  TSPN_Thrombospondin4. Laminin G domain; Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans. LamG domains of neurexin and agrin undergo alternative splicing that modulates their affinity for protein ligands. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13093); members share this curated model.
