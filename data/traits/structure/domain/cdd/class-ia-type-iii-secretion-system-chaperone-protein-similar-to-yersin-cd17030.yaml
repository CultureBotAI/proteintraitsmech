identifier: CDD:cd17030
label: "Class IA type III secretion system chaperone protein, similar to Yersinia pestis SycH. This family includes type III secretion system (T3SS) chaperone proteins similar to Yersinia pestis SycH and similar proteins. In Yersinia pestis, the causative agent of bubonic and pneumonic plague, the T3SS allows injection of effector proteins, termed Yersinia outer proteins (Yops) into macrophages and other immune cells, forming pores in the host cell membrane and have been linked to cytolysis. The secretion of Yops is regulated by the activity of the YopN/SycN/YscB/TyeA complex. SycH is the chaperone for YopH, a potent eukaryotic-like protein tyrosine phosphatase that is essential for virulence. SycH also binds two negative regulators of type III secretion, YscM1 and YscM2, both sharing significant sequence homology with the chaperone-binding domain of YopH."
definition: >-
  Class IA type III secretion system chaperone protein, similar to Yersinia pestis SycH. This family includes type III secretion system (T3SS) chaperone proteins similar to Yersinia pestis SycH and similar proteins. In Yersinia pestis, the causative agent of bubonic and pneumonic plague, the T3SS allows injection of effector proteins, termed Yersinia outer proteins (Yops) into macrophages and other immune cells, forming pores in the host cell membrane and have been linked to cytolysis. The secretion of Yops is regulated by the activity of the YopN/SycN/YscB/TyeA complex. SycH is the chaperone for YopH, a potent eukaryotic-like protein tyrosine phosphatase that is essential for virulence. SycH also binds two negative regulators of type III secretion, YscM1 and YscM2, both sharing significant sequence homology with the chaperone-binding domain of YopH. — an NCBI CDD conserved domain (cd17030); members share this curated model.
