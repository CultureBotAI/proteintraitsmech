identifier: CDD:cd17517
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR),similar to Escherichia coli str. K-12 substr. MG1655 S subunit (S.EcoKI) TRD2-CR2, Salmonella enterica subsp. enterica serovar Potsdam S subunit (S.StySPI) TRD2-CR2, and other TRD-CR's. Escherichia coli str. K-12 substr. MG1655 S subunit (S.EcoKI) recognizes 5'... AACNNNNNNGTGC ... 3' and Salmonella enterica subsp. enterica serovar Potsdam S subunit (S.StySPI) recognizes 5'... AACNNNNNNGTRC ... 3'. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. For example, S.EcoKI-TRD1 and S.StySPI-TRD1 both recognize AAC/GTT, S.EcoKI-TRD2 recognizes GCAC/GTGC and S.StySPI-TRD2 recognizes GYAC/GTRC. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2.It also includes TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases, such as Pseudomonas putida Jo 4-731 Type IIG restriction enzyme/N6-adenine DNA methyltransferase (RM.PpiI), and type I DNA methyltransferases such as Bacillus cereus BDRD-ST24 M subunit of Type I N6-adenine DNA methyltransferase (M.Bce24ORF51270P). RM.PpiI recognizes 5' ... GAACNNNNNCTC ... 3'."
