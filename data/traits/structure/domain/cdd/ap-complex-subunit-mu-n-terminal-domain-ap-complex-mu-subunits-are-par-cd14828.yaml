identifier: CDD:cd14828
label: "AP complex subunit mu N-terminal domain. AP complex mu subunits are part of the heterotetrameric adaptor protein (AP) complex which consists of one large subunit (alpha-, gamma-, delta- or epsilon), one beta-, one mu-, and one sigma-subunit. In general, AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In most cases the coat protein is clathrin (AP1 and AP2 complex), but some of the other members of the AP complex family are associated with nonclathrin coats. The mu subunit is comprised of an N-terminal longin domain followed by a C-terminal domain which is involved in the binding of the Y-X-X-Phi sorting signal."
definition: >-
  AP complex subunit mu N-terminal domain. AP complex mu subunits are part of the heterotetrameric adaptor protein (AP) complex which consists of one large subunit (alpha-, gamma-, delta- or epsilon), one beta-, one mu-, and one sigma-subunit. In general, AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In most cases the coat protein is clathrin (AP1 and AP2 complex), but some of the other members of the AP complex family are associated with nonclathrin coats. The mu subunit is comprised of an N-terminal longin domain followed by a C-terminal domain which is involved in the binding of the Y-X-X-Phi sorting signal. — an NCBI CDD conserved domain (cd14828); members share this curated model.
