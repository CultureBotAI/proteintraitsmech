identifier: CDD:cd09825
label: "Thyroid peroxidase (TPO). TPO is a member of the animal heme peroxidase family, which is expressed in the thyroid and involved in the processing of iodine and iodine compounds. Specifically, TPO oxidizes iodide via hydrogen peroxide to form active iodine, which is then, for example, incorporated into the tyrosine residues of thyroglobulin to yield mono- and di-iodotyrosines."
definition: >-
  Thyroid peroxidase (TPO). TPO is a member of the animal heme peroxidase family, which is expressed in the thyroid and involved in the processing of iodine and iodine compounds. Specifically, TPO oxidizes iodide via hydrogen peroxide to form active iodine, which is then, for example, incorporated into the tyrosine residues of thyroglobulin to yield mono- and di-iodotyrosines. — an NCBI CDD conserved domain (cd09825); members share this curated model.
