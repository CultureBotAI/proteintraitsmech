identifier: CDD:cd15442
label: "orphan adhesion receptor GPR97, member of the class B2 family of seven-transmembrane G protein-coupled receptors. GPR97 is an orphan receptor that has been classified into the group VIII of adhesion GPCRs. Other members of the Group VII include GPR56, GPR64, GPR112, GPR114, and GPR126. GPR97 is identified as a lymphatic adhesion receptor that is specifically expressed in lymphatic endothelium, but not in blood vascular endothelium, and is shown to regulate migration of lymphatic endothelial cells via the small GTPases RhoA and cdc42. The adhesion receptors are characterized by the presence of large N-terminal extracellular domains containing multiple adhesion motifs, which play critical roles in cell-cell adhesion and cell-matrix interactions, that are coupled to a class B seven-transmembrane domain. Furthermore, almost all adhesion receptors, except GPR123, contain an evolutionarily conserved GPCR- autoproteolysis inducing (GAIN) domain that undergoes autoproteolytic processing at the GPCR proteolysis site (GPS) motif located immediately N-terminal to the first transmembrane region, to generate N- and C-terminal fragments (NTF and CTF), which may serve important biological functions."
