identifier: CDD:cd23439
label: "ricin B-type lectin domain, beta-trefoil fold, found in the polypeptide N-acetylgalactosaminyltransferase 10 (GALNT10)-like subfamily. The GALNT10-like subfamily includes GALNT10 and GALNTL6. They act as GalNAc transferases (EC 2.4.1.41) that catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT10 has activity toward Muc5Ac and EA2 peptide substrates. Members of this subfamily comprise a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in the polypeptide N-acetylgalactosaminyltransferase 10 (GALNT10)-like subfamily. The GALNT10-like subfamily includes GALNT10 and GALNTL6. They act as GalNAc transferases (EC 2.4.1.41) that catalyze the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT10 has activity toward Muc5Ac and EA2 peptide substrates. Members of this subfamily comprise a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity. — an NCBI CDD conserved domain (cd23439); members share this curated model.
