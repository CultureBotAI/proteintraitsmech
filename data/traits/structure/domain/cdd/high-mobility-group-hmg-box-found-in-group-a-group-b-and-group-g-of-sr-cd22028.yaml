identifier: CDD:cd22028
label: "high mobility group (HMG)-box found in group A, group B and group G of SRY-related high-mobility group (HMG) box (Sox) transcription factors. This subfamily includes SoxA, SoxB, and SoxG proteins. SRY is the only member of group A SRY-related high-mobility group (HMG) box (Sox) transcription factors. SRY, also called testis-determining factor, is a transcriptional regulator that controls a genetic switch in male development. It promotes DNA bending and is also involved in pre-mRNA splicing. The SRY HMG box recognizes DNA by partial intercalation in the minor groove. It binds to the DNA consensus sequence 5'-[AT]AACAA[AT]-3'. SoxB transcription factors play critical roles in the regulation of neurogenesis. They can be divided into two main subgroups, SoxB1 (Sox-1/Sox-2/Sox-3) and SoxB2 (SOX-14/SOX-21). SoxB1 proteins suppress neurogenesis by maintaining neural cells in an undifferentiated state. SoxB2 proteins may have the opposite activity and promote neuronal differentiation. SOX-5 is the only member of group G Sox transcription factors. It is also called SOX-12, SOX-20, SOX-26, or SOX-27. SOX-5 is a crucial transcription factor involved in the regulation of embryonic development and in cell fate determination. It binds to the 5'-AACAAT-3' sequence. SOX-15 can be a tumor suppressor in multiple cancer types."
definition: >-
  high mobility group (HMG)-box found in group A, group B and group G of SRY-related high-mobility group (HMG) box (Sox) transcription factors. This subfamily includes SoxA, SoxB, and SoxG proteins. SRY is the only member of group A SRY-related high-mobility group (HMG) box (Sox) transcription factors. SRY, also called testis-determining factor, is a transcriptional regulator that controls a genetic switch in male development. It promotes DNA bending and is also involved in pre-mRNA splicing. The SRY HMG box recognizes DNA by partial intercalation in the minor groove. It binds to the DNA consensus sequence 5'-[AT]AACAA[AT]-3'. SoxB transcription factors play critical roles in the regulation of neurogenesis. They can be divided into two main subgroups, SoxB1 (Sox-1/Sox-2/Sox-3) and SoxB2 (SOX-14/SOX-21). SoxB1 proteins suppress neurogenesis by maintaining neural cells in an undifferentiated state. SoxB2 proteins may have the opposite activity and promote neuronal differentiation. SOX-5 is the only member of group G Sox transcription factors. It is also called SOX-12, SOX-20, SOX-26, or SOX-27. SOX-5 is a crucial transcription factor involved in the regulation of embryonic development and in cell fate determination. It binds to the 5'-AACAAT-3' sequence. SOX-15 can be a tumor suppressor in multiple cancer types. — an NCBI CDD conserved domain (cd22028); members share this curated model.
