identifier: CDD:cd23415
label: "ricin B-type lectin domain, beta-trefoil fold, found in Actinomycete actinohivin and similar proteins. Actinohivin is an actinomycete lectin with a potent specific anti-human immunodeficiency virus (anti-HIV) activity. It inhibits viral entry to cells by binding the high-mannose type sugar chains of gp120. Actinohivin contains a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain contains a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Actinomycete actinohivin and similar proteins. Actinohivin is an actinomycete lectin with a potent specific anti-human immunodeficiency virus (anti-HIV) activity. It inhibits viral entry to cells by binding the high-mannose type sugar chains of gp120. Actinohivin contains a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain contains a sugar-binding pocket. — an NCBI CDD conserved domain (cd23415); members share this curated model.
