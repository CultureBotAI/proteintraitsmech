identifier: CDD:cd13396
label: "nucleotide-binding domain (NBD) of Arabidopsis thaliana actin-related protein 8 (AtArp8) and similar proteins. Arabidopsis thaliana ARP8, also called F-box protein ARP8, is an F-Box protein localized to the nucleolus. It is ubiquitously expressed in all organs and cell types and has a cell cycle-dependent subcellular pattern of distribution: it is localized to the nucleolus in interphase cells and dispersed in the cytoplasm in mitotic cells."
definition: >-
  nucleotide-binding domain (NBD) of Arabidopsis thaliana actin-related protein 8 (AtArp8) and similar proteins. Arabidopsis thaliana ARP8, also called F-box protein ARP8, is an F-Box protein localized to the nucleolus. It is ubiquitously expressed in all organs and cell types and has a cell cycle-dependent subcellular pattern of distribution: it is localized to the nucleolus in interphase cells and dispersed in the cytoplasm in mitotic cells. — an NCBI CDD conserved domain (cd13396); members share this curated model.
