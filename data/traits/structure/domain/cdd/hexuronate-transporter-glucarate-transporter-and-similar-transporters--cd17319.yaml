identifier: CDD:cd17319
label: "Hexuronate transporter, Glucarate transporter, and similar transporters of the Major Facilitator Superfamily. This family is composed of predominantly bacterial transporters for hexuronate (ExuT), glucarate (GudP), galactarate (GarP), and galactonate (DgoT). They mediate the uptake of these compounds into the cell. They belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Hexuronate transporter, Glucarate transporter, and similar transporters of the Major Facilitator Superfamily. This family is composed of predominantly bacterial transporters for hexuronate (ExuT), glucarate (GudP), galactarate (GarP), and galactonate (DgoT). They mediate the uptake of these compounds into the cell. They belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17319); members share this curated model.
