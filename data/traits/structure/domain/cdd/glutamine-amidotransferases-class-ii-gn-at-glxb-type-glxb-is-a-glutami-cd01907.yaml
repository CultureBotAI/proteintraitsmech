identifier: CDD:cd01907
label: "Glutamine amidotransferases class-II (Gn-AT)_GlxB-type.  GlxB is a glutamine amidotransferase-like protein of unknown function found in bacteria and archaea. GlxB has a structural fold similar to that of other class II glutamine amidotransferases including glucosamine-fructose 6-phosphate synthase (GLMS or GFAT), glutamine phosphoribosylpyrophosphate (Prpp) amidotransferase (GPATase),  asparagine synthetase B (AsnB), beta lactam synthetase (beta-LS) and glutamate synthase (GltS).   The GlxB fold is also somewhat similar to the Ntn (N-terminal nucleophile) hydrolase fold of the proteasomal alpha and beta subunits."
definition: >-
  Glutamine amidotransferases class-II (Gn-AT)_GlxB-type. GlxB is a glutamine amidotransferase-like protein of unknown function found in bacteria and archaea. GlxB has a structural fold similar to that of other class II glutamine amidotransferases including glucosamine-fructose 6-phosphate synthase (GLMS or GFAT), glutamine phosphoribosylpyrophosphate (Prpp) amidotransferase (GPATase), asparagine synthetase B (AsnB), beta lactam synthetase (beta-LS) and glutamate synthase (GltS). The GlxB fold is also somewhat similar to the Ntn (N-terminal nucleophile) hydrolase fold of the proteasomal alpha and beta subunits. — an NCBI CDD conserved domain (cd01907); members share this curated model.
