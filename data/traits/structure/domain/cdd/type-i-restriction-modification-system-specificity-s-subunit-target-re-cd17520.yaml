identifier: CDD:cd17520
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to Heliobacterium modesticaldum Ice1 S subunit (S1.HmoORF3075P) TRD1-CR1. The recognition sequence of Heliobacterium modesticaldum Ice1 S subunit (S1.HmoORF3075P) is undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one heteromeric enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This subfamily also includes the TRD-CR-like sequence-recognition domain of type I N6-adenine DNA methyltransferase (M) subunit of Clostridium intestinale URNW (M2.CinURNWORF2828P). The recognition sequence of M2.CinURNWORF2828P is undetermined. Type I methyltransferases included in this group include two domains: one for methylation, and another (TRD-CR-like) for sequence-recognition."
definition: >-
  Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to Heliobacterium modesticaldum Ice1 S subunit (S1.HmoORF3075P) TRD1-CR1. The recognition sequence of Heliobacterium modesticaldum Ice1 S subunit (S1.HmoORF3075P) is undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one heteromeric enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This subfamily also includes the TRD-CR-like sequence-recognition domain of type I N6-adenine DNA methyltransferase (M) subunit of Clostridium intestinale URNW (M2.CinURNWORF2828P). The recognition sequence of M2.CinURNWORF2828P is undetermined. Type I methyltransferases included in this group include two domains: one for methylation, and another (TRD-CR-like) for sequence-recognition. — an NCBI CDD conserved domain (cd17520); members share this curated model.
