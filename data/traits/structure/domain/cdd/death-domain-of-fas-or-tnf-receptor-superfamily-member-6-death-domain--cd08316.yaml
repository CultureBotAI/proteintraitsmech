identifier: CDD:cd08316
label: "Death domain of FAS or TNF receptor superfamily member 6. Death Domain (DD) found in the FS7-associated cell surface antigen (FAS). FAS, also known as TNFRSF6 (TNF receptor superfamily member 6), APT1, CD95, FAS1, or APO-1, together with FADD (Fas-associating via Death Domain) and caspase 8, is an integral part of the death inducing signalling complex (DISC), which plays an important role in the induction of apoptosis and is activated by binding of the ligand FasL to FAS. FAS also plays a critical role in self-tolerance by eliminating cell types (autoreactive T and B cells) that contribute to autoimmunity. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Death domain of FAS or TNF receptor superfamily member 6. Death Domain (DD) found in the FS7-associated cell surface antigen (FAS). FAS, also known as TNFRSF6 (TNF receptor superfamily member 6), APT1, CD95, FAS1, or APO-1, together with FADD (Fas-associating via Death Domain) and caspase 8, is an integral part of the death inducing signalling complex (DISC), which plays an important role in the induction of apoptosis and is activated by binding of the ligand FasL to FAS. FAS also plays a critical role in self-tolerance by eliminating cell types (autoreactive T and B cells) that contribute to autoimmunity. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including CARD (Caspase activation and recruitment domain), DED (Death Effector Domain), and PYRIN. They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08316); members share this curated model.
