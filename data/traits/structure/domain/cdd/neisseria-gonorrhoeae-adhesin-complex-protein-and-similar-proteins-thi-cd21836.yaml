identifier: CDD:cd21836
label: "Neisseria gonorrhoeae Adhesin Complex Protein and similar proteins. This model contains adhesin complex protein found in Neisseria gonorrhoeae (Ng-ACP), the causative organism of the sexually transmitted disease gonorrhoea, and similar proteins. Studies have shown that Ng-ACP is conserved and expressed by over 50 gonococcal strains and that recombinant proteins induce antibodies in mice that killed the bacteria in vitro. Thus, recombinant Ng-ACP (rNg-ACP) is a potential vaccine candidate that induces antibodies that are bactericidal and prevent the gonococcus from inhibiting the lytic activity of an innate defense molecule. This protein is structurally similar to N. meningitidis adhesin complex protein as well as members of the MliC/PliC protein family of membrane-bound or periplasmic inhibitors of human C-type lysozyme (HL), suggesting that Ng-ACP may probably be located in the periplasm or phospholipid layer of the outer membrane."
