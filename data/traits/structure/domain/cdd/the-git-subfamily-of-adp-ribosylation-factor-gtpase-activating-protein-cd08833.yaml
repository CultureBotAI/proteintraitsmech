identifier: CDD:cd08833
label: "The GIT subfamily of ADP-ribosylation factor GTPase-activating proteins. The GIT (G-protein coupled receptor kinase-interacting protein) subfamily includes GIT1 and GIT2, which have three ANK repeats, a Spa-homology domain (SHD), a coiled-coil domain and a C-terminal paxillin-binding site (PBS). The GIT1/2 proteins are GTPase-activating proteins that function as an inactivator of Arf signaling, and interact with the PIX/Cool family of Rac/Cdc42  guanine nucleotide exchange factors (GEFs). Unlike other ArfGAPs, GIT and PIX (Pak-interacting exchange factor) proteins are tightly associated to form an oligomeric complex that acts as a scaffold and signal integrator that can be recruited for multiple signaling pathways. The GIT/PIX complex functions as a signaling scaffold by binding to specific protein partners. As a result, the complex is transported to specific cellular locations. For instance, the GIT partners paxillin or integrin-alpha4 (to focal adhesions), piccolo and liprin-alpha (to synapses), and the beta-PIX partner Scribble (to epithelial cell-cell contacts and synapses). Moreover, the GIT/PIT complex functions to integrate signals from multiple GTP-binding protein and protein kinase pathways to regulate the actin cytoskeleton and thus cell polarity, adhesion and migration."
definition: >-
  The GIT subfamily of ADP-ribosylation factor GTPase-activating proteins. The GIT (G-protein coupled receptor kinase-interacting protein) subfamily includes GIT1 and GIT2, which have three ANK repeats, a Spa-homology domain (SHD), a coiled-coil domain and a C-terminal paxillin-binding site (PBS). The GIT1/2 proteins are GTPase-activating proteins that function as an inactivator of Arf signaling, and interact with the PIX/Cool family of Rac/Cdc42 guanine nucleotide exchange factors (GEFs). Unlike other ArfGAPs, GIT and PIX (Pak-interacting exchange factor) proteins are tightly associated to form an oligomeric complex that acts as a scaffold and signal integrator that can be recruited for multiple signaling pathways. The GIT/PIX complex functions as a signaling scaffold by binding to specific protein partners. As a result, the complex is transported to specific cellular locations. For instance, the GIT partners paxillin or integrin-alpha4 (to focal adhesions), piccolo and liprin-alpha (to synapses), and the beta-PIX partner Scribble (to epithelial cell-cell contacts and synapses). Moreover, the GIT/PIT complex functions to integrate signals from multiple GTP-binding protein and protein kinase pathways to regulate the actin cytoskeleton and thus cell polarity, adhesion and migration. — an NCBI CDD conserved domain (cd08833); members share this curated model.
