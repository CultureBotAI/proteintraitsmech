identifier: CDD:cd12984
label: "Laminin G domain repeat 2 of melanoma-associated chondroitin sulfate proteoglycan (MCSP)-like proteins. Human MCSP, also known as chondroitin sulfate proteoglycan 4, and its rat ortholog NG2 play important roles in angiogenesis-dependent processes like wound healing and tumor growth. Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Laminin G domain repeat 2 of melanoma-associated chondroitin sulfate proteoglycan (MCSP)-like proteins. Human MCSP, also known as chondroitin sulfate proteoglycan 4, and its rat ortholog NG2 play important roles in angiogenesis-dependent processes like wound healing and tumor growth. Laminin G-like domains are usually Ca2+ mediated receptors that can have binding sites for steroids, beta1 integrins, heparin, sulfatides, fibulin-1, and alpha-dystroglycans. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd12984); members share this curated model.
