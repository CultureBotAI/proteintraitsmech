identifier: CDD:cd17102
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 3 (FRMD3) and similar proteins. FRMD3, also termed band 4.1-like protein 4O, or ovary type protein 4.1 (4.1O), belongs to the 4.1 protein superfamily, which share the highly conserved membrane-association FERM domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). FRMD3 is involved in maintaining cell shape and integrity. It also functions as a tumour suppressor in non-small cell lung carcinoma (NSCLC). Some single nucleotide polymorphisms (SNPs) located in FRMD3 have been associated with diabetic kidney disease (DKD) in different ethnicities."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 3 (FRMD3) and similar proteins. FRMD3, also termed band 4.1-like protein 4O, or ovary type protein 4.1 (4.1O), belongs to the 4.1 protein superfamily, which share the highly conserved membrane-association FERM domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). FRMD3 is involved in maintaining cell shape and integrity. It also functions as a tumour suppressor in non-small cell lung carcinoma (NSCLC). Some single nucleotide polymorphisms (SNPs) located in FRMD3 have been associated with diabetic kidney disease (DKD) in different ethnicities. — an NCBI CDD conserved domain (cd17102); members share this curated model.
