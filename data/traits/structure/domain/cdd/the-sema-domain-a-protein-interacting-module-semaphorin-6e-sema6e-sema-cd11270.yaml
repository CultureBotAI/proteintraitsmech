identifier: CDD:cd11270
label: "The Sema domain, a protein interacting module, semaphorin 6E (sema6E). Sema6E is expressed predominantly in the nervous system during embryogenesis. It binds Plexin A1 and might utilize it as a receptor to repel axons of specific types during development. Sema6E acts as a repellent to dorsal root ganglion axons as well as sympathetic axons. Sema6E is a member of the class 6 semaphorin family of proteins, which are membrane associated semaphorins. Semaphorins are regulatory molecules in the development of the nervous system and in axonal guidance. They also play important roles in other biological processes, such as angiogenesis, immune regulation, respiration systems and cancer. The Sema domain is located at the N-terminus and contains four disulfide bonds formed by eight conserved cysteine residues. It serves as a receptor-recognition and -binding module."
definition: >-
