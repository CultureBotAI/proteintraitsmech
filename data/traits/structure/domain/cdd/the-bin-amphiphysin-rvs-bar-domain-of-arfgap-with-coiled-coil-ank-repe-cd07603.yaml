identifier: CDD:cd07603
label: "The Bin/Amphiphysin/Rvs (BAR) domain of ArfGAP with Coiled-coil, ANK repeat and PH domain containing proteins. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. This subfamily is composed of ACAPs (ArfGAP with Coiled-coil, ANK repeat and PH domain containing proteins), which are Arf GTPase activating proteins (GAPs) containing an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, an Arf GAP domain, and C-terminal ankyrin (ANK) repeats. Vertebrates contain at least three members, ACAP1, ACAP2, and ACAP3. ACAP1 and ACAP2 are Arf6-specific GAPs, involved in the regulation of endocytosis, phagocytosis, cell adhesion and migration, by mediating Arf6 signaling. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of ArfGAP with Coiled-coil, ANK repeat and PH domain containing proteins. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. This subfamily is composed of ACAPs (ArfGAP with Coiled-coil, ANK repeat and PH domain containing proteins), which are Arf GTPase activating proteins (GAPs) containing an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, an Arf GAP domain, and C-terminal ankyrin (ANK) repeats. Vertebrates contain at least three members, ACAP1, ACAP2, and ACAP3. ACAP1 and ACAP2 are Arf6-specific GAPs, involved in the regulation of endocytosis, phagocytosis, cell adhesion and migration, by mediating Arf6 signaling. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. — an NCBI CDD conserved domain (cd07603); members share this curated model.
