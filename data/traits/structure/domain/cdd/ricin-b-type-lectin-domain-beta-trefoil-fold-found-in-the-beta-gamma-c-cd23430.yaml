identifier: CDD:cd23430
label: "ricin B-type lectin domain, beta-trefoil fold, found in the beta/gamma crystallin domain-containing protein (CRYBG) family. The CRYBG family includes three members: CRYBG1, CRYBG2, and CRYBG3/vlAKAP. CRYBG1, also called absent in melanoma 1 protein (AIM1), may function as a suppressor of malignant melanoma. It may exert its effects through interactions with the cytoskeleton. CRYBG2 is also called absent in melanoma 1-like protein (AIM1L). CRYBG3/vlAKAP, also called very large A-kinase anchor protein, is an anchoring protein that mediates the subcellular compartmentation of protein kinase A (PKA). It binds to the dimeric RII-alpha regulatory subunit of PKA (PRKAR2A/PRKAR2B). CRYBG proteins belong to the beta/gamma-crystallin family. They all contain a ricin B-type lectin domain with a beta-trefoil fold at the C-terminus. The beta-trefoil fold is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in the beta/gamma crystallin domain-containing protein (CRYBG) family. The CRYBG family includes three members: CRYBG1, CRYBG2, and CRYBG3/vlAKAP. CRYBG1, also called absent in melanoma 1 protein (AIM1), may function as a suppressor of malignant melanoma. It may exert its effects through interactions with the cytoskeleton. CRYBG2 is also called absent in melanoma 1-like protein (AIM1L). CRYBG3/vlAKAP, also called very large A-kinase anchor protein, is an anchoring protein that mediates the subcellular compartmentation of protein kinase A (PKA). It binds to the dimeric RII-alpha regulatory subunit of PKA (PRKAR2A/PRKAR2B). CRYBG proteins belong to the beta/gamma-crystallin family. They all contain a ricin B-type lectin domain with a beta-trefoil fold at the C-terminus. The beta-trefoil fold is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23430); members share this curated model.
