identifier: CDD:cd16074
label: "OCRE domain. The OCRE (OCtamer REpeat) domain contains 5 repeats of an 8-residue motif, which were shown to form beta-strands. Based on the architectures of proteins containing OCRE domains, a role in RNA metabolism and/or signalling has been proposed."
definition: >-
  OCRE domain. The OCRE (OCtamer REpeat) domain contains 5 repeats of an 8-residue motif, which were shown to form beta-strands. Based on the architectures of proteins containing OCRE domains, a role in RNA metabolism and/or signalling has been proposed. — an NCBI CDD conserved domain (cd16074); members share this curated model.
