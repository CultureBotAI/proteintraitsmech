identifier: CDD:cd13785
label: "BinCARD (Bcl10-interacting protein with CARD). BinCARD was ubiquitously expressed CRAD (Caspase activation and recruitment domain) protein in all tissues. CARD proteins play important role in apoptosis by functioning as direct regulators of death-inducing caspases. BinCARD interacts with apoptosis inducer CARD protein Bcl10 through CARD. It inhibits Bcl10-mediated activation of NF-kappa B and to suppress Bcl10 phosphorylation. Caspase activation and recruitment domains (CARDs) are death domains (DDs) found associated with caspases. In general, DDs domains are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  BinCARD (Bcl10-interacting protein with CARD). BinCARD was ubiquitously expressed CRAD (Caspase activation and recruitment domain) protein in all tissues. CARD proteins play important role in apoptosis by functioning as direct regulators of death-inducing caspases. BinCARD interacts with apoptosis inducer CARD protein Bcl10 through CARD. It inhibits Bcl10-mediated activation of NF-kappa B and to suppress Bcl10 phosphorylation. Caspase activation and recruitment domains (CARDs) are death domains (DDs) found associated with caspases. In general, DDs domains are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd13785); members share this curated model.
