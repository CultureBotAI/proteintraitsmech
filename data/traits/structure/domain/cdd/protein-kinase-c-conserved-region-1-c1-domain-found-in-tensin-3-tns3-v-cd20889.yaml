identifier: CDD:cd20889
label: "protein kinase C conserved region 1 (C1 domain) found in tensin-3 (TNS3) variant and similar proteins. Tensin-3 (TNS3), also called tensin-like SH2 domain-containing protein 1 (TENS1), or tumor endothelial marker 6 (TEM6), may play a role in actin remodeling. It is involved in the dissociation of the integrin-tensin-actin complex. This model corresponds to the C1 domain found in TNS3 variant. Typical TNS3 does not contain C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in tensin-3 (TNS3) variant and similar proteins. Tensin-3 (TNS3), also called tensin-like SH2 domain-containing protein 1 (TENS1), or tumor endothelial marker 6 (TEM6), may play a role in actin remodeling. It is involved in the dissociation of the integrin-tensin-actin complex. This model corresponds to the C1 domain found in TNS3 variant. Typical TNS3 does not contain C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20889); members share this curated model.
