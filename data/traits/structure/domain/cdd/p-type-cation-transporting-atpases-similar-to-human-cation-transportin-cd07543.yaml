identifier: CDD:cd07543
label: "P-type cation-transporting ATPases, similar to human cation-transporting ATPase type 13A1 (ATP13A1) and Saccharomyces manganese-transporting ATPase 1 Spf1p. Saccharomyces Spf1p may mediate manganese transport into the endoplasmic reticulum (ER); one consequence of deletion of SPF1 is severe ER stress. This subfamily also includes Arabidopsis thaliana MIA (Male Gametogenesis Impaired Anthers) protein which is highly abundant in the endoplasmic reticulum and small vesicles of developing pollen grains and tapetum cells. The MIA gene functionally complements a mutant in the SPF1 from Saccharomyces cerevisiae. The expression of ATP13A1 has been followed during mouse development, ATP13A1 transcript expression showed an increase as development progressed, with the highest expression at the peak of neurogenesis. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type cation-transporting ATPases, similar to human cation-transporting ATPase type 13A1 (ATP13A1) and Saccharomyces manganese-transporting ATPase 1 Spf1p. Saccharomyces Spf1p may mediate manganese transport into the endoplasmic reticulum (ER); one consequence of deletion of SPF1 is severe ER stress. This subfamily also includes Arabidopsis thaliana MIA (Male Gametogenesis Impaired Anthers) protein which is highly abundant in the endoplasmic reticulum and small vesicles of developing pollen grains and tapetum cells. The MIA gene functionally complements a mutant in the SPF1 from Saccharomyces cerevisiae. The expression of ATP13A1 has been followed during mouse development, ATP13A1 transcript expression showed an increase as development progressed, with the highest expression at the peak of neurogenesis. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd07543); members share this curated model.
