identifier: CDD:cd22220
label: "pseudoGTPase domain found in p190RhoGAP-B and similar proteins. p190RhoGAP protein B (p190RhoGAP-B), also called ARHGAP5, or p190-B, or Rho-type GTPase-activating protein 5 (RHOGAP5), is a Rho family GTPase-activating protein (GAP) that acts as a key regulator of Rho GTPase signaling and is essential for actin cytoskeletal structure and contractility. This model corresponds to the GTPase-like domain called pseudoGTPase domain that is located at the middle region of p190RhoGAP-B. Rho family GTPase-activating proteins normally have five highly conserved sequence motifs, termed 'G-motifs', required for nucleotide-binding and catalytic activity. PseudoGTPases consist of a GTPase fold lacking one or more of these G motifs."
definition: >-
  pseudoGTPase domain found in p190RhoGAP-B and similar proteins. p190RhoGAP protein B (p190RhoGAP-B), also called ARHGAP5, or p190-B, or Rho-type GTPase-activating protein 5 (RHOGAP5), is a Rho family GTPase-activating protein (GAP) that acts as a key regulator of Rho GTPase signaling and is essential for actin cytoskeletal structure and contractility. This model corresponds to the GTPase-like domain called pseudoGTPase domain that is located at the middle region of p190RhoGAP-B. Rho family GTPase-activating proteins normally have five highly conserved sequence motifs, termed 'G-motifs', required for nucleotide-binding and catalytic activity. PseudoGTPases consist of a GTPase fold lacking one or more of these G motifs. — an NCBI CDD conserved domain (cd22220); members share this curated model.
