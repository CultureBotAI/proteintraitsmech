identifier: CDD:cd21444
label: "N-terminal domain of t-SNARE affecting a late Golgi compartment protein 1 and similar proteins. t-SNARE affecting a late Golgi compartment protein 1 (Tlg1p), also called syntaxin TLG1, is a soluble NSF attachment protein receptor (SNARE) protein (of Qc type) involved in membrane fusion, probably in retrograde traffic of cytosolic double-membrane vesicles derived from both, early and possibly late endosomes/PVC (prevacuolar compartment) back to the trans-Golgi network (TGN or late Golgi). It has been reported to function both as a (target membrane) t-SNARE and as a (vesicle) v-SNARE. The model corresponds to the N-terminal domain of Tlg1p, which consists of a three-helix bundle."
definition: >-
  N-terminal domain of t-SNARE affecting a late Golgi compartment protein 1 and similar proteins. t-SNARE affecting a late Golgi compartment protein 1 (Tlg1p), also called syntaxin TLG1, is a soluble NSF attachment protein receptor (SNARE) protein (of Qc type) involved in membrane fusion, probably in retrograde traffic of cytosolic double-membrane vesicles derived from both, early and possibly late endosomes/PVC (prevacuolar compartment) back to the trans-Golgi network (TGN or late Golgi). It has been reported to function both as a (target membrane) t-SNARE and as a (vesicle) v-SNARE. The model corresponds to the N-terminal domain of Tlg1p, which consists of a three-helix bundle. — an NCBI CDD conserved domain (cd21444); members share this curated model.
