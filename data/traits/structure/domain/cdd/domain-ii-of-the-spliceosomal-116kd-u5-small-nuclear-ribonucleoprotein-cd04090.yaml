identifier: CDD:cd04090
label: "Domain II of the spliceosomal 116kD U5 small nuclear ribonucleoprotein (snRNP) component. This subfamily includes domain II of the spliceosomal human 116kD U5 small nuclear ribonucleoprotein (snRNP) protein (U5-116 kD) and its yeast counterpart Snu114p. This domain is homologous to domain II of the eukaryotic translational elongation factor EF-2.  U5-116 kD is a GTPase which is a component of the spliceosome complex which processes precursor mRNAs to produce mature mRNAs."
definition: >-
  Domain II of the spliceosomal 116kD U5 small nuclear ribonucleoprotein (snRNP) component. This subfamily includes domain II of the spliceosomal human 116kD U5 small nuclear ribonucleoprotein (snRNP) protein (U5-116 kD) and its yeast counterpart Snu114p. This domain is homologous to domain II of the eukaryotic translational elongation factor EF-2. U5-116 kD is a GTPase which is a component of the spliceosome complex which processes precursor mRNAs to produce mature mRNAs. — an NCBI CDD conserved domain (cd04090); members share this curated model.
