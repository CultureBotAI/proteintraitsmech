identifier: CDD:cd14824
label: "longin domain. Longin-domain is N-terminal domain of a subgroup of R-SNARE proteins, including VAMP7, Ykt6, and Sec22. Longin is one of the approximately 26 components required for transporting proteins from the ER to the plasma membrane, via the Golgi apparatus. It is necessary for the steps of the transfer from the ER to the Golgi complex. Longins are the only R-SNAREs that are common to all eukaryotes, and they are characterized by a conserved N-terminal domain with a profilin-like fold called a longin domain."
definition: >-
  longin domain. Longin-domain is N-terminal domain of a subgroup of R-SNARE proteins, including VAMP7, Ykt6, and Sec22. Longin is one of the approximately 26 components required for transporting proteins from the ER to the plasma membrane, via the Golgi apparatus. It is necessary for the steps of the transfer from the ER to the Golgi complex. Longins are the only R-SNAREs that are common to all eukaryotes, and they are characterized by a conserved N-terminal domain with a profilin-like fold called a longin domain. — an NCBI CDD conserved domain (cd14824); members share this curated model.
