identifier: CDD:cd19433
label: "CpcS/CpeS phycobiliprotein lyase family. Phycobilin lyases covalently attach a chromophore to the Cys residue(s) of cyanobacterial phycobiliproteins. They include Synechococcus sp. PCC 7002 phycocyanobilin lyase CpcS which attaches a phycocyanobilin chromophore to C-phycocyanain beta subunit and to allophycocyanin alpha and beta subunits, Synechococcus sp. PCC 7002 phycocyanobilin lyase subunit CpcU which forms a heterodimer with CpcS-I to attach phycocyanobilin to beta-phycocyanin and to allophycocyanin subunits, and Prochlorococcus marinus phycoerythrobilin lyase CpeS which attaches 3Z-phycoerythrobilin to phycoerythrin. This group belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
  CpcS/CpeS phycobiliprotein lyase family. Phycobilin lyases covalently attach a chromophore to the Cys residue(s) of cyanobacterial phycobiliproteins. They include Synechococcus sp. PCC 7002 phycocyanobilin lyase CpcS which attaches a phycocyanobilin chromophore to C-phycocyanain beta subunit and to allophycocyanin alpha and beta subunits, Synechococcus sp. PCC 7002 phycocyanobilin lyase subunit CpcU which forms a heterodimer with CpcS-I to attach phycocyanobilin to beta-phycocyanin and to allophycocyanin subunits, and Prochlorococcus marinus phycoerythrobilin lyase CpeS which attaches 3Z-phycoerythrobilin to phycoerythrin. This group belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development. — an NCBI CDD conserved domain (cd19433); members share this curated model.
