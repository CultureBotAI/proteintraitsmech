identifier: CDD:cd14310
label: "UBA domain found in Cryptococcus neoformans DNA-damage response protein Ddi1 and similar proteins. The family includes some uncharacterized Ddi and similar proteins which show a high level of sequence similarity with yeast Ddi1. Ddi1, also called v-SNARE-master 1 (Vsm1), is a ubiquitin receptor involved in regulation of the cell cycle and late secretory pathway in yeast. It functions as a ubiquitin association domain (UBA)- ubiquitin-like-domain (UBL) shuttle protein that is required for the proteasome to enable ubiquitin-dependent degradation of its ligands. Ddi1 contains an N-terminal UBL domain and a C-terminal UBA domain. It also harbors a central retroviral aspartyl-protease-like domain (RVP) which may be important in cell-cycle control. At this point, Ddi1 may function proteolytically during regulated protein turnover in the cell."
definition: >-
  UBA domain found in Cryptococcus neoformans DNA-damage response protein Ddi1 and similar proteins. The family includes some uncharacterized Ddi and similar proteins which show a high level of sequence similarity with yeast Ddi1. Ddi1, also called v-SNARE-master 1 (Vsm1), is a ubiquitin receptor involved in regulation of the cell cycle and late secretory pathway in yeast. It functions as a ubiquitin association domain (UBA)- ubiquitin-like-domain (UBL) shuttle protein that is required for the proteasome to enable ubiquitin-dependent degradation of its ligands. Ddi1 contains an N-terminal UBL domain and a C-terminal UBA domain. It also harbors a central retroviral aspartyl-protease-like domain (RVP) which may be important in cell-cycle control. At this point, Ddi1 may function proteolytically during regulated protein turnover in the cell. — an NCBI CDD conserved domain (cd14310); members share this curated model.
