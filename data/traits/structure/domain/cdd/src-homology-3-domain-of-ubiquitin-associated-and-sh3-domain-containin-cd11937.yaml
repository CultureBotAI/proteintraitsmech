identifier: CDD:cd11937
label: "Src homology 3 domain of Ubiquitin-associated and SH3 domain-containing protein A. UBASH3A is also called Cbl-Interacting Protein 4 (CLIP4), T cell Ubiquitin LigAnd (TULA), or T cell receptor Signaling (STS)-2. It is only found in lymphoid cells and exhibits weak phosphatase activity. UBASH3A facilitates T cell-induced apoptosis through interaction with the apoptosis-inducing factor AIF. It is involved in regulating the level of phosphorylation of the zeta-associated protein (ZAP)-70 tyrosine kinase. TULA proteins contain an N-terminal UBA domain, a central SH3 domain, and a C-terminal histidine phosphatase domain. They bind c-Cbl through the SH3 domain and to ubiquitin via UBA. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Ubiquitin-associated and SH3 domain-containing protein A. UBASH3A is also called Cbl-Interacting Protein 4 (CLIP4), T cell Ubiquitin LigAnd (TULA), or T cell receptor Signaling (STS)-2. It is only found in lymphoid cells and exhibits weak phosphatase activity. UBASH3A facilitates T cell-induced apoptosis through interaction with the apoptosis-inducing factor AIF. It is involved in regulating the level of phosphorylation of the zeta-associated protein (ZAP)-70 tyrosine kinase. TULA proteins contain an N-terminal UBA domain, a central SH3 domain, and a C-terminal histidine phosphatase domain. They bind c-Cbl through the SH3 domain and to ubiquitin via UBA. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11937); members share this curated model.
