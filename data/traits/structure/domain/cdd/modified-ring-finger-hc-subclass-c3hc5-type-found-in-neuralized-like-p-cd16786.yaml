identifier: CDD:cd16786
label: "Modified RING finger, HC subclass (C3HC5-type), found in neuralized-like protein 1B (NEURL1B). NEURL1B, also known as neuralized-2 (NEUR2) or neuralized-like protein 3, is a mammalian homolog of the Drosophila neuralized (D-neu) protein. It functions as an E3 ubiquitin-protein ligase that interacts with and ubiquitinates Delta. Thus, it plays a role in the endocytic pathways for Notch signaling through working cooperatively with another E3 ligase, Mind bomb-1 (Mib1), in Delta endocytosis to hepatocyte growth factor-regulated tyrosine kinase substrate (Hrs)-positive vesicles. NEURL1B contains two neuralized homology regions (NHRs) responsible for Neural-ligand interactions and a modified C3HC5-type RING-HC finger required for ubiquitin ligase activity. The C3HC5-type RING-HC finger is distinguished from typical C3HC4-type RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain."
definition: >-
  Modified RING finger, HC subclass (C3HC5-type), found in neuralized-like protein 1B (NEURL1B). NEURL1B, also known as neuralized-2 (NEUR2) or neuralized-like protein 3, is a mammalian homolog of the Drosophila neuralized (D-neu) protein. It functions as an E3 ubiquitin-protein ligase that interacts with and ubiquitinates Delta. Thus, it plays a role in the endocytic pathways for Notch signaling through working cooperatively with another E3 ligase, Mind bomb-1 (Mib1), in Delta endocytosis to hepatocyte growth factor-regulated tyrosine kinase substrate (Hrs)-positive vesicles. NEURL1B contains two neuralized homology regions (NHRs) responsible for Neural-ligand interactions and a modified C3HC5-type RING-HC finger required for ubiquitin ligase activity. The C3HC5-type RING-HC finger is distinguished from typical C3HC4-type RING-HC finger due to the existence of the additional cysteine residue in the middle portion of the RING finger domain. — an NCBI CDD conserved domain (cd16786); members share this curated model.
