identifier: CDD:cd22224
label: "Hook domain found in nuclear mitotic apparatus protein (NuMA) and similar proteins. NuMA, also called nuclear mitotic apparatus protein 1, or nuclear matrix protein-22 (NMP-22), or SP-H antigen, is a microtubule (MT)-binding protein that plays a role in the formation and maintenance of the spindle poles, and the alignment and segregation of chromosomes during mitotic cell division. The model corresponds to the N-terminal conserved globular Hook domain of NuMA, which folds as a variant of the helical calponin homology (CH) domain. It directly binds dynein light intermediate chains LIC1 and LIC2 through a conserved hydrophobic patch shared among other Hook adaptors."
definition: >-
  Hook domain found in nuclear mitotic apparatus protein (NuMA) and similar proteins. NuMA, also called nuclear mitotic apparatus protein 1, or nuclear matrix protein-22 (NMP-22), or SP-H antigen, is a microtubule (MT)-binding protein that plays a role in the formation and maintenance of the spindle poles, and the alignment and segregation of chromosomes during mitotic cell division. The model corresponds to the N-terminal conserved globular Hook domain of NuMA, which folds as a variant of the helical calponin homology (CH) domain. It directly binds dynein light intermediate chains LIC1 and LIC2 through a conserved hydrophobic patch shared among other Hook adaptors. — an NCBI CDD conserved domain (cd22224); members share this curated model.
