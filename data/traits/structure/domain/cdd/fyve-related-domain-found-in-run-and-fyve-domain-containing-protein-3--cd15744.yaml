identifier: CDD:cd15744
label: "FYVE-related domain found in RUN and FYVE domain-containing protein 3 (RUFY3) and similar proteins. RUFY3, also termed Rap2-interacting protein x (RIPx or RPIPx), or single axon-regulated protein (singar), is an N-terminal RUN domain and a C-terminal FYVE domain containing protein predominantly expressed in the brain. It suppresses formation of surplus axons for neuronal polarity. Unlike other RUFY proteins, RUFY3 can associate with the GTP-bound active form of Rab5. Moreover, the FYVE domain of RUFY3 resembles the FYVE-related domain as it lacks the WxxD motif (x for any residue)."
definition: >-
  FYVE-related domain found in RUN and FYVE domain-containing protein 3 (RUFY3) and similar proteins. RUFY3, also termed Rap2-interacting protein x (RIPx or RPIPx), or single axon-regulated protein (singar), is an N-terminal RUN domain and a C-terminal FYVE domain containing protein predominantly expressed in the brain. It suppresses formation of surplus axons for neuronal polarity. Unlike other RUFY proteins, RUFY3 can associate with the GTP-bound active form of Rab5. Moreover, the FYVE domain of RUFY3 resembles the FYVE-related domain as it lacks the WxxD motif (x for any residue). — an NCBI CDD conserved domain (cd15744); members share this curated model.
