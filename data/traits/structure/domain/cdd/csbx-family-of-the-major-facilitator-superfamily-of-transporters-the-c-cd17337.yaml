identifier: CDD:cd17337
label: "CsbX family of the Major Facilitator Superfamily of transporters. The CsbX family is composed of Bacillus subtilis CsbX protein (also named alpha-ketoglutarate permease), Klebsiella pneumoniae D-arabinitol transporter (DalT), and similar proteins. The csbX gene is a sigmaB-controlled gene that  is expressed during the stationary phase of cell growth. DalT is a pentose-specific ion symporter for D-arabinitol uptake. Most members of this family remain uncharacterized. The CsbX family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  CsbX family of the Major Facilitator Superfamily of transporters. The CsbX family is composed of Bacillus subtilis CsbX protein (also named alpha-ketoglutarate permease), Klebsiella pneumoniae D-arabinitol transporter (DalT), and similar proteins. The csbX gene is a sigmaB-controlled gene that is expressed during the stationary phase of cell growth. DalT is a pentose-specific ion symporter for D-arabinitol uptake. Most members of this family remain uncharacterized. The CsbX family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17337); members share this curated model.
