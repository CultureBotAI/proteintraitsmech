identifier: CDD:cd09857
label: "FEN-like PIN domains of Exonuclease-1, a structure-specific, divalent-metal-ion dependent, 5' nuclease and homologs. exonuclease-1 (EXO1) is involved in multiple, eukaryotic DNA metabolic pathways, including DNA replication processes (5' flap DNA endonuclease activity and double stranded DNA 5'-exonuclease activity), DNA repair processes (DNA mismatch repair (MMR) and post-replication repair (PRR)), recombination, and telomere integrity. EXO1 functions in the MMS2 error-free branch of the PRR pathway in the maintenance and repair of stalled replication forks. Studies also suggest that EXO1 plays both structural and catalytic roles during MMR-mediated mutation avoidance. These nucleases are members of the structure-specific, 5' nuclease family (FEN-like) that catalyzes hydrolysis of DNA duplex-containing nucleic acid structures during DNA replication, repair, and recombination. Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), and at the C-terminus of the PIN domain a H3TH (helix-3-turn-helix) domain, an atypical helix-hairpin-helix-2-like region. Both the H3TH domain (not included in this model) and the helical arch/clamp region are involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. EXO1 nucleases also have C-terminal Mlh1- and Msh2-binding domains which allow interaction with MMR and PRR proteins, respectively."
definition: >-
  FEN-like PIN domains of Exonuclease-1, a structure-specific, divalent-metal-ion dependent, 5' nuclease and homologs. exonuclease-1 (EXO1) is involved in multiple, eukaryotic DNA metabolic pathways, including DNA replication processes (5' flap DNA endonuclease activity and double stranded DNA 5'-exonuclease activity), DNA repair processes (DNA mismatch repair (MMR) and post-replication repair (PRR)), recombination, and telomere integrity. EXO1 functions in the MMS2 error-free branch of the PRR pathway in the maintenance and repair of stalled replication forks. Studies also suggest that EXO1 plays both structural and catalytic roles during MMR-mediated mutation avoidance. These nucleases are members of the structure-specific, 5' nuclease family (FEN-like) that catalyzes hydrolysis of DNA duplex-containing nucleic acid structures during DNA replication, repair, and recombination. Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), and at the C-terminus of the PIN domain a H3TH (helix-3-turn-helix) domain, an atypical helix-hairpin-helix-2-like region. Both the H3TH domain (not included in this model) and the helical arch/clamp region are involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. EXO1 nucleases also have C-terminal Mlh1- and Msh2-binding domains which allow interaction with MMR and PRR proteins, respectively. — an NCBI CDD conserved domain (cd09857); members share this curated model.
