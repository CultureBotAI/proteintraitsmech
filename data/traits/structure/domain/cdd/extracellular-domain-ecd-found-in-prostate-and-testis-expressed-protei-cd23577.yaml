identifier: CDD:cd23577
label: "extracellular domain (ECD) found in prostate and testis expressed protein 1 (PATE1) and similar proteins. PATE1 is a novel sperm-associated protein generally expressed in male genital tract and related to sperm development, maturation and fertilization. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in prostate and testis expressed protein 1 (PATE1) and similar proteins. PATE1 is a novel sperm-associated protein generally expressed in male genital tract and related to sperm development, maturation and fertilization. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23577); members share this curated model.
