identifier: CDD:cd04111
label: "Rab GTPase family 39 (Rab39). Found in eukaryotes, Rab39 is mainly found in epithelial cell lines, but is distributed widely in various human tissues and cell lines. It is believed to be a novel Rab protein involved in regulating Golgi-associated vesicular transport during cellular endocytosis. GTPase activating proteins (GAPs) interact with GTP-bound Rab and accelerate the hydrolysis of GTP to GDP. Guanine nucleotide exchange factors (GEFs) interact with GDP-bound Rabs to promote the formation of the GTP-bound state. Rabs are further regulated by guanine nucleotide dissociation inhibitors (GDIs), which facilitate Rab recycling by masking C-terminal lipid binding and promoting cytosolic localization. Most Rab GTPases contain a lipid modification site at the C-terminus, with sequence motifs CC, CXC, or CCX. Lipid binding is essential for membrane attachment, a key feature of most Rab proteins."
definition: >-
  Rab GTPase family 39 (Rab39). Found in eukaryotes, Rab39 is mainly found in epithelial cell lines, but is distributed widely in various human tissues and cell lines. It is believed to be a novel Rab protein involved in regulating Golgi-associated vesicular transport during cellular endocytosis. GTPase activating proteins (GAPs) interact with GTP-bound Rab and accelerate the hydrolysis of GTP to GDP. Guanine nucleotide exchange factors (GEFs) interact with GDP-bound Rabs to promote the formation of the GTP-bound state. Rabs are further regulated by guanine nucleotide dissociation inhibitors (GDIs), which facilitate Rab recycling by masking C-terminal lipid binding and promoting cytosolic localization. Most Rab GTPases contain a lipid modification site at the C-terminus, with sequence motifs CC, CXC, or CCX. Lipid binding is essential for membrane attachment, a key feature of most Rab proteins. — an NCBI CDD conserved domain (cd04111); members share this curated model.
