identifier: CDD:cd02721
label: "GH2_C_galactosidase. Beta-galactosidase (lacZ) from Escherichia coli is a 464 kDa homotetramer. Each subunit has five domains, the third being an alpha/beta TIM barrel that contains most of the active site residues.  Beta-galactosidase activity requires both Mg2+ and Na+ although the later is not essential."
definition: >-
  GH2_C_galactosidase. Beta-galactosidase (lacZ) from Escherichia coli is a 464 kDa homotetramer. Each subunit has five domains, the third being an alpha/beta TIM barrel that contains most of the active site residues. Beta-galactosidase activity requires both Mg2+ and Na+ although the later is not essential. — an NCBI CDD conserved domain (cd02721); members share this curated model.
