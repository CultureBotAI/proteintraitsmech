identifier: CDD:cd14333
label: "UBA domain found in some hypothetical proteins from Eumetazoa. The family includes some uncharacterized Eumetazoan proteins. Although their biological function remain unclear, they all contain a very conserved ubiquitin-associated (UBA) domain which is a commonly occurring sequence motif found in proteins involved in ubiquitin-mediated proteolysis."
definition: >-
  UBA domain found in some hypothetical proteins from Eumetazoa. The family includes some uncharacterized Eumetazoan proteins. Although their biological function remain unclear, they all contain a very conserved ubiquitin-associated (UBA) domain which is a commonly occurring sequence motif found in proteins involved in ubiquitin-mediated proteolysis. — an NCBI CDD conserved domain (cd14333); members share this curated model.
