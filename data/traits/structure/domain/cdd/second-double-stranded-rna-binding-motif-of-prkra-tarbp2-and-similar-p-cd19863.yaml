identifier: CDD:cd19863
label: "second double-stranded RNA binding motif of PRKRA, TARBP2 and similar proteins. The family includes protein activator of the interferon-induced protein kinase (PRKRA) and the RISC-loading complex subunit TARBP2. PRKRA (also known as interferon-inducible double-stranded RNA-dependent protein kinase activator A, PKR-associated protein X (RAX), PKR-associating protein X, protein kinase, interferon-inducible double-stranded RNA-dependent activator, PACT, or HSD14) is a cellular activator for double-stranded RNA-dependent protein kinase during stress signaling. TARBP2 (also called TAR RNA-binding protein 2, or trans-activation-responsive RNA-binding protein (TRBP)) participates in the formation of the RNA-induced silencing complex (RISC). It is part of the RISC-loading complex (RLC), together with dicer1 and eif2c2/ago2, and is required to process precursor miRNAs. The family also includes Drosophila melanogaster Loquacious and similar proteins. Loquacious (Loqs) is a double-stranded RNA-binding domain (dsRBD) protein, a homolog of human TAR RNA binding protein (TRBP) that is a protein first identified as binding the HIV trans-activator RNA (TAR). Loqs interacts with Dicer1 (dmDcr1) to facilitate miRNA processing. PRKRA family proteins contain three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  second double-stranded RNA binding motif of PRKRA, TARBP2 and similar proteins. The family includes protein activator of the interferon-induced protein kinase (PRKRA) and the RISC-loading complex subunit TARBP2. PRKRA (also known as interferon-inducible double-stranded RNA-dependent protein kinase activator A, PKR-associated protein X (RAX), PKR-associating protein X, protein kinase, interferon-inducible double-stranded RNA-dependent activator, PACT, or HSD14) is a cellular activator for double-stranded RNA-dependent protein kinase during stress signaling. TARBP2 (also called TAR RNA-binding protein 2, or trans-activation-responsive RNA-binding protein (TRBP)) participates in the formation of the RNA-induced silencing complex (RISC). It is part of the RISC-loading complex (RLC), together with dicer1 and eif2c2/ago2, and is required to process precursor miRNAs. The family also includes Drosophila melanogaster Loquacious and similar proteins. Loquacious (Loqs) is a double-stranded RNA-binding domain (dsRBD) protein, a homolog of human TAR RNA binding protein (TRBP) that is a protein first identified as binding the HIV trans-activator RNA (TAR). Loqs interacts with Dicer1 (dmDcr1) to facilitate miRNA processing. PRKRA family proteins contain three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19863); members share this curated model.
