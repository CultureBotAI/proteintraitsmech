identifier: CDD:cd17095
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain, found in the kindlin family. The kindlin family is composed of kindlin-1, 2 and 3, which are FERM domain-containing adaptor molecules that interact with the cytoplasmic component of integrins and regulate cell-matrix connections. Kindlins belong to the 4.1- ezrin-ridixin-moesin (FERM) domain containing protein family. They contain F1, F2 and F3 subdomains that typify FERM family members, and these subdomains are preceded by an N-terminal F0 subdomain. Both F0 and F1 domains have similar ubiquitin-like folds. This family corresponds to the F0 domain. In addition, a distinctive feature of kindlins is the insertion of a pleckstrin homology (PH) subdomain into the F2 subdomain."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F0 sub-domain, found in the kindlin family. The kindlin family is composed of kindlin-1, 2 and 3, which are FERM domain-containing adaptor molecules that interact with the cytoplasmic component of integrins and regulate cell-matrix connections. Kindlins belong to the 4.1- ezrin-ridixin-moesin (FERM) domain containing protein family. They contain F1, F2 and F3 subdomains that typify FERM family members, and these subdomains are preceded by an N-terminal F0 subdomain. Both F0 and F1 domains have similar ubiquitin-like folds. This family corresponds to the F0 domain. In addition, a distinctive feature of kindlins is the insertion of a pleckstrin homology (PH) subdomain into the F2 subdomain. — an NCBI CDD conserved domain (cd17095); members share this curated model.
