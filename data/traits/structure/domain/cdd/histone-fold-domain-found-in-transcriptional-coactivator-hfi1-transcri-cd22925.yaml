identifier: CDD:cd22925
label: "histone-fold domain found in transcriptional coactivator HFI1, transcriptional adapter 1 (TADA1), and similar proteins. This subfamily includes HFI1 and TADA1. HFI1, also called ADA1, is a component of the transcription regulatory histone acetylation (HAT) complexes SAGA, SALSA and SLIK. SAGA (Spt-Ada-Gcn5-acetyltransferase) is involved in RNA polymerase II-dependent transcriptional regulation of approximately 10% of yeast genes. At the promoters, SAGA is required for recruitment of the basal transcription machinery. It influences RNA polymerase II transcriptional activity through different activities such as TATA binding protein (TBP) interaction (SPT3, SPT8 and SPT20) and promoter selectivity, interaction with transcription activators (GCN5, ADA2, ADA3 and TRA1), and chromatin modification through histone acetylation (GCN5) and deubiquitination (UBP8). SAGA acetylates nucleosomal histone H3 to some extent (to form H3K9ac, H3K14ac, H3K18ac and H3K23ac). SAGA interacts with DNA via upstream activating sequences (UASs). SALSA (SAGA altered, SPT8 absent), an altered form of SAGA, may be involved in positive transcriptional regulation. Besides lacking SPT8, SALSA contains an SPT7 subunit that is truncated. SLIK (SAGA-like) is proposed to have partly overlapping functions with SAGA. It preferentially acetylates methylated histone H3, at least after activation at the GAL1-10 locus. HFI1/ADA1 and SPT20/ADA5 may recruit TATA binding protein (TBP) and possibly other basal factors to bind to the TATA box. TADA1, also called SPT3-associated factor 42, or STAF42, or transcriptional adapter 1-like protein (TADA1L), may be involved in transcriptional regulation. It functions as a component of the STAGA transcription coactivator-HAT complex, which is composed of at least SUPT3H, GCN5L2, TAF5L, TAF6L, SUPT7L, TADA3L, TAD1L, TAF10, TAF12, TRRAP, and TAF9."
definition: >-
  histone-fold domain found in transcriptional coactivator HFI1, transcriptional adapter 1 (TADA1), and similar proteins. This subfamily includes HFI1 and TADA1. HFI1, also called ADA1, is a component of the transcription regulatory histone acetylation (HAT) complexes SAGA, SALSA and SLIK. SAGA (Spt-Ada-Gcn5-acetyltransferase) is involved in RNA polymerase II-dependent transcriptional regulation of approximately 10% of yeast genes. At the promoters, SAGA is required for recruitment of the basal transcription machinery. It influences RNA polymerase II transcriptional activity through different activities such as TATA binding protein (TBP) interaction (SPT3, SPT8 and SPT20) and promoter selectivity, interaction with transcription activators (GCN5, ADA2, ADA3 and TRA1), and chromatin modification through histone acetylation (GCN5) and deubiquitination (UBP8). SAGA acetylates nucleosomal histone H3 to some extent (to form H3K9ac, H3K14ac, H3K18ac and H3K23ac). SAGA interacts with DNA via upstream activating sequences (UASs). SALSA (SAGA altered, SPT8 absent), an altered form of SAGA, may be involved in positive transcriptional regulation. Besides lacking SPT8, SALSA contains an SPT7 subunit that is truncated. SLIK (SAGA-like) is proposed to have partly overlapping functions with SAGA. It preferentially acetylates methylated histone H3, at least after activation at the GAL1-10 locus. HFI1/ADA1 and SPT20/ADA5 may recruit TATA binding protein (TBP) and possibly other basal factors to bind to the TATA box. TADA1, also called SPT3-associated factor 42, or STAF42, or transcriptional adapter 1-like protein (TADA1L), may be involved in transcriptional regulation. It functions as a component of the STAGA transcription coactivator-HAT complex, which is composed of at least SUPT3H, GCN5L2, TAF5L, TAF6L, SUPT7L, TADA3L, TAD1L, TAF10, TAF12, TRRAP, and TAF9. — an NCBI CDD conserved domain (cd22925); members share this curated model.
