identifier: CDD:cd16602
label: "RING finger, HC subclass, found in tripartite motif-containing proteins TRIM41, TRIM52 and similar proteins. TRIM41 and TRIM52, two closely related tripartite motif-containing proteins, have dramatically expanded RING domains compared with the rest of the TRIM family proteins. TRIM41 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. In contrast, TRIM52 lacks the putative viral recognition SPRY/B30.2 domain, and thus has been classified to the C-V subclass of the TRIM family that contains only RBCC domains. TRIM41, also known as RING finger-interacting protein with C kinase (RINCK), is an E3 ubiquitin-protein ligase that promotes the ubiquitination of protein kinase C (PKC) isozymes in cells. It specifically recognizes the C1 domain of PKC isozymes. It controls the amplitude of PKC signaling by controlling the amount of PKC in the cell. TRIM52, also known as RING finger protein 102 (RNF102), is encoded by a novel, noncanonical antiviral TRIM52 gene in primate genomes with unique specificity determined by the rapidly evolving RING domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing proteins TRIM41, TRIM52 and similar proteins. TRIM41 and TRIM52, two closely related tripartite motif-containing proteins, have dramatically expanded RING domains compared with the rest of the TRIM family proteins. TRIM41 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. In contrast, TRIM52 lacks the putative viral recognition SPRY/B30.2 domain, and thus has been classified to the C-V subclass of the TRIM family that contains only RBCC domains. TRIM41, also known as RING finger-interacting protein with C kinase (RINCK), is an E3 ubiquitin-protein ligase that promotes the ubiquitination of protein kinase C (PKC) isozymes in cells. It specifically recognizes the C1 domain of PKC isozymes. It controls the amplitude of PKC signaling by controlling the amount of PKC in the cell. TRIM52, also known as RING finger protein 102 (RNF102), is encoded by a novel, noncanonical antiviral TRIM52 gene in primate genomes with unique specificity determined by the rapidly evolving RING domain. — an NCBI CDD conserved domain (cd16602); members share this curated model.
