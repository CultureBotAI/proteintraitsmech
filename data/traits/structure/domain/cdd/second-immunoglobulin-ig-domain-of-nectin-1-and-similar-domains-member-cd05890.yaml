identifier: CDD:cd05890
label: "Second immunoglobulin (Ig) domain of nectin-1, and similar domains; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the second immunoglobulin (Ig) domain of nectin-1 (also known as poliovirus receptor related protein 1, or cluster of differentiation (CD) 111). Nectin-1 belongs to the nectin family comprised of four transmembrane glycoproteins (nectin-1 through -4). Nectins are synaptic cell adhesion molecules (CAMs) which facilitate adhesion and signaling at various intracellular junctions. Nectins form homophilic cis-dimers, followed by homophilic and heterophilic trans-dimers involved in cell-cell adhesion. Nectins also heterophilically trans-interact with other CAMs such as nectin-like molecules (Necls); nectin-1 for example, has been shown to trans-interact with Necl-1. Nectins also interact with various other proteins, including the actin filament (F-actin)-binding protein, afadin. Mutation in the human nectin-1 gene is associated with cleft lip/palate ectodermal dysplasia syndrome (CLPED1). Nectin-1 is a major receptor for herpes simplex virus through interaction with the viral envelope glycoprotein D."
definition: >-
  Second immunoglobulin (Ig) domain of nectin-1, and similar domains; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the second immunoglobulin (Ig) domain of nectin-1 (also known as poliovirus receptor related protein 1, or cluster of differentiation (CD) 111). Nectin-1 belongs to the nectin family comprised of four transmembrane glycoproteins (nectin-1 through -4). Nectins are synaptic cell adhesion molecules (CAMs) which facilitate adhesion and signaling at various intracellular junctions. Nectins form homophilic cis-dimers, followed by homophilic and heterophilic trans-dimers involved in cell-cell adhesion. Nectins also heterophilically trans-interact with other CAMs such as nectin-like molecules (Necls); nectin-1 for example, has been shown to trans-interact with Necl-1. Nectins also interact with various other proteins, including the actin filament (F-actin)-binding protein, afadin. Mutation in the human nectin-1 gene is associated with cleft lip/palate ectodermal dysplasia syndrome (CLPED1). Nectin-1 is a major receptor for herpes simplex virus through interaction with the viral envelope glycoprotein D. — an NCBI CDD conserved domain (cd05890); members share this curated model.
