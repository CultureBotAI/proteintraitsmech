identifier: CDD:cd09870
label: "FEN-like PIN domains of Saccharomyces cerevisiae endonuclease 1 (YEN1), Chaetomium thermophilum junction-resolving enzyme GEN1, and fungal homologs. Fungal Endonuclease 1 (YEN1 and GEN1, GEN1 is known as YEN1 in Saccharomyces cerevisiae) is a four-way (Holliday) junction resolvase. Members of this subgroup belong to the structure-specific, 5' nuclease family (FEN-like) that catalyzes hydrolysis of DNA duplex-containing nucleic acid structures during DNA replication, repair, and recombination. Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), and at the C-terminus of the PIN domain a H3TH (helix-3-turn-helix) domain, an atypical helix-hairpin-helix-2-like region. Both the H3TH domain (not included in this model) and the helical arch/clamp region are involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons."
definition: >-
  FEN-like PIN domains of Saccharomyces cerevisiae endonuclease 1 (YEN1), Chaetomium thermophilum junction-resolving enzyme GEN1, and fungal homologs. Fungal Endonuclease 1 (YEN1 and GEN1, GEN1 is known as YEN1 in Saccharomyces cerevisiae) is a four-way (Holliday) junction resolvase. Members of this subgroup belong to the structure-specific, 5' nuclease family (FEN-like) that catalyzes hydrolysis of DNA duplex-containing nucleic acid structures during DNA replication, repair, and recombination. Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), and at the C-terminus of the PIN domain a H3TH (helix-3-turn-helix) domain, an atypical helix-hairpin-helix-2-like region. Both the H3TH domain (not included in this model) and the helical arch/clamp region are involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. — an NCBI CDD conserved domain (cd09870); members share this curated model.
