identifier: CDD:cd06704
label: "PDZ domain 1 of Drosophila Scribble, human Scribble homolog, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain 1 of Drosophila Scribble (also known as LAP4), human Scribble homolog (also known as hScrib, LAP4, CriB1, ScrB1 and Vartul), and related domains. They belong to the LAP family, which describes proteins that contain either one or four PDZ domains and 16 LRRs (leucine-rich repeats) and function in controlling cell shape, size and subcellular protein localization. In Drosophila, the Scribble complex, comprising Scribble, discs large, and lethal giant larvae, plays a role in apico-basal cell polarity, in other forms of polarity, including regulation of the actin cytoskeleton, cell signaling and vesicular trafficking, and in tumor development. Mammalian Scribble is important in many aspects of cancer development. Scribble and its homologs can be downregulated or overexpressed in cancer; they have a role in cancer beyond their function in loss of cell polarity. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This Scribble-like family PDZ1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
