identifier: CDD:cd17983
label: "DEXH-box helicase domain of DEAH-box helicase 38. DEAH-box helicase 38 (DHX38, also known as PRP16) is involved in pre-mRNA splicing. DHX38 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 38. DEAH-box helicase 38 (DHX38, also known as PRP16) is involved in pre-mRNA splicing. DHX38 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17983); members share this curated model.
