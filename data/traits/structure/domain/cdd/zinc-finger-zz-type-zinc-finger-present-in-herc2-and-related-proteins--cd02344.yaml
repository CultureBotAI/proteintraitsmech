label: "Zinc finger, ZZ type. Zinc finger present in HERC2 and related proteins. HERC2 is a potential E3 ubiquitin protein ligase and/or guanine nucleotide exchange factor. The ZZ motif coordinates two zinc ions and most likely participates in ligand binding or molecular scaffolding."
definition: >-
