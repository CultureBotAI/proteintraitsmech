identifier: CDD:cd20309
label: "Escherichia coli sugar isomerase (EcSI), cupin domain. This family includes a sugar isomerase homologous to pathogenic Escherichia coli O157 z5688 D-lyxose isomerase (EcSI or Z5688) which has an active site highly similar to YdaE from the sigma B regulon of Bacillus subtilis. Extensive substrate screening has revealed that EcSI is capable of acting on D-lyxose and D-mannose. Studies show that overexpression of EcSI enables cell growth on D-lyxose as the sole carbon source. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  Escherichia coli sugar isomerase (EcSI), cupin domain. This family includes a sugar isomerase homologous to pathogenic Escherichia coli O157 z5688 D-lyxose isomerase (EcSI or Z5688) which has an active site highly similar to YdaE from the sigma B regulon of Bacillus subtilis. Extensive substrate screening has revealed that EcSI is capable of acting on D-lyxose and D-mannose. Studies show that overexpression of EcSI enables cell growth on D-lyxose as the sole carbon source. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd20309); members share this curated model.
