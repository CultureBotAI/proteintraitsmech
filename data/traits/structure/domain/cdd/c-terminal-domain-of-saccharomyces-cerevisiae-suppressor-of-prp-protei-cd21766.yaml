identifier: CDD:cd21766
label: "C-terminal domain of Saccharomyces cerevisiae suppressor of PRP protein 1 (SPP1) and similar proteins. SPP1, also called Cps40, or Set1C component SPP1, or complex proteins associated with SET1 protein SPP1, is component of the COMPASS (Set1C) complex that specifically mono-, di- and trimethylates histone H3 to form H3K4me1/2/3, which subsequently plays a role in telomere length maintenance and transcription elongation regulation. The model corresponds to the C-terminal domain of SPP1, which is important for COMPASS integrity and function."
definition: >-
  C-terminal domain of Saccharomyces cerevisiae suppressor of PRP protein 1 (SPP1) and similar proteins. SPP1, also called Cps40, or Set1C component SPP1, or complex proteins associated with SET1 protein SPP1, is component of the COMPASS (Set1C) complex that specifically mono-, di- and trimethylates histone H3 to form H3K4me1/2/3, which subsequently plays a role in telomere length maintenance and transcription elongation regulation. The model corresponds to the C-terminal domain of SPP1, which is important for COMPASS integrity and function. — an NCBI CDD conserved domain (cd21766); members share this curated model.
