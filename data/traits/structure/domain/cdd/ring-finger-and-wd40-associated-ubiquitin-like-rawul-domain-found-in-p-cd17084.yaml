identifier: CDD:cd17084
label: "RING finger- and WD40-associated ubiquitin-like (RAWUL) domain found in polycomb group RING finger protein 5 (PCGF5) and similar proteins. PCGF5, also termed RING finger protein 159 (RNF159), is one of six PcG RING finger (PCGF) homologs (PCGF1/NSPc1, PCGF2/Mel-18, PCGF3, PCGF4/BMI1, PCGF5, and PCGF6/MBLR) and serves as the core component of a Polycomb repressive complex 1 (PRC1). Like other PCGF homologs, PCGF5 associates with ring finger protein 2 (RNF2) to form a RNF2-PCGF heterodimer, which is catalytically competent as an E3 ubiquitin transferase and is the scaffold for the assembly of additional components. PCGF5 contains a C3HC4-type RING-HC finger, and a RAWUL domain."
definition: >-
  RING finger- and WD40-associated ubiquitin-like (RAWUL) domain found in polycomb group RING finger protein 5 (PCGF5) and similar proteins. PCGF5, also termed RING finger protein 159 (RNF159), is one of six PcG RING finger (PCGF) homologs (PCGF1/NSPc1, PCGF2/Mel-18, PCGF3, PCGF4/BMI1, PCGF5, and PCGF6/MBLR) and serves as the core component of a Polycomb repressive complex 1 (PRC1). Like other PCGF homologs, PCGF5 associates with ring finger protein 2 (RNF2) to form a RNF2-PCGF heterodimer, which is catalytically competent as an E3 ubiquitin transferase and is the scaffold for the assembly of additional components. PCGF5 contains a C3HC4-type RING-HC finger, and a RAWUL domain. — an NCBI CDD conserved domain (cd17084); members share this curated model.
