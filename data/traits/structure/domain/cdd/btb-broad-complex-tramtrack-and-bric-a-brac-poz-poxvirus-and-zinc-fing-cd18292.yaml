identifier: CDD:cd18292
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 17 (BTBD17). BTBD17, also called galectin-3-binding protein-like, is a BTB domain-containing protein. Its function remains unclear. It may be associated with hepatocellular carcinoma. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 17 (BTBD17). BTBD17, also called galectin-3-binding protein-like, is a BTB domain-containing protein. Its function remains unclear. It may be associated with hepatocellular carcinoma. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18292); members share this curated model.
