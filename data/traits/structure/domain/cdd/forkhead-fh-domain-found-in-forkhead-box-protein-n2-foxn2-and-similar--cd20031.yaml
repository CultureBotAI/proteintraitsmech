identifier: CDD:cd20031
label: "Forkhead (FH) domain found in Forkhead box protein N2 (FOXN2) and similar proteins. The FOXN2-like group includes two FOXN subfamily winged helix transcription factors, FOXN2 and FOXN3. FOXN2, also called human T-cell leukemia virus enhancer factor (HTLF), is a potential tumor suppressor that can facilitate replication fork reversal. It acts as a transcription factor that binds to the purine-rich region in human T-cell leukemia virus long terminal repeat (HTLV-I LTR). It may be a potential therapeutic and radiosensitization target for lung cancer. FOXN3, also called checkpoint suppressor 1, acts as a transcriptional repressor that may be involved in DNA damage-inducible cell cycle arrests (checkpoints). The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein N2 (FOXN2) and similar proteins. The FOXN2-like group includes two FOXN subfamily winged helix transcription factors, FOXN2 and FOXN3. FOXN2, also called human T-cell leukemia virus enhancer factor (HTLF), is a potential tumor suppressor that can facilitate replication fork reversal. It acts as a transcription factor that binds to the purine-rich region in human T-cell leukemia virus long terminal repeat (HTLV-I LTR). It may be a potential therapeutic and radiosensitization target for lung cancer. FOXN3, also called checkpoint suppressor 1, acts as a transcriptional repressor that may be involved in DNA damage-inducible cell cycle arrests (checkpoints). The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20031); members share this curated model.
