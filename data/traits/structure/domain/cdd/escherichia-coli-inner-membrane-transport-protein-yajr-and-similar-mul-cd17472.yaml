identifier: CDD:cd17472
label: "Escherichia coli inner membrane transport protein YajR and similar multidrug-efflux transporters of the Major Facilitator Superfamily. This family is composed of Escherichia coli inner membrane transport protein YajR and some uncharacterized multidrug-efflux transporters. YajR is a putative proton-driven major facilitator superfamily (MFS) transporter found in many gram-negative bacteria. Unlike most MFS transporters, YajR contains a C-terminal, cytosolic YAM domain, which may play an essential role for the proper functioning of the transporter. YajR-like transporters belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Escherichia coli inner membrane transport protein YajR and similar multidrug-efflux transporters of the Major Facilitator Superfamily. This family is composed of Escherichia coli inner membrane transport protein YajR and some uncharacterized multidrug-efflux transporters. YajR is a putative proton-driven major facilitator superfamily (MFS) transporter found in many gram-negative bacteria. Unlike most MFS transporters, YajR contains a C-terminal, cytosolic YAM domain, which may play an essential role for the proper functioning of the transporter. YajR-like transporters belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17472); members share this curated model.
