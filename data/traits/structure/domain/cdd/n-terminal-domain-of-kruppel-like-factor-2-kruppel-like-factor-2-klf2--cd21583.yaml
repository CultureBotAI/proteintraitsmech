identifier: CDD:cd21583
label: "N-terminal domain of Kruppel-like factor 2. Kruppel-like Factor 2 (KLF2, also known as Krueppel-like factor 2 or lung Kruppel-like Factor/LKLF) is a protein that, in humans, is encoded by the KLF2 gene on chromosome 19. It has been implicated in a variety of biochemical processes in the human body, including lung development, embryonic erythropoiesis, epithelial integrity, T-cell viability, and adipogenesis. KLF proteins KLF1, KLF2, KLF4, KLF5, KLF6, and KLF7 are transcriptional activators. KLF2 belongs to a family of proteins called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation, and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF2, which is related to the N-terminal domains of KLF1 and KLF4."
definition: >-
  N-terminal domain of Kruppel-like factor 2. Kruppel-like Factor 2 (KLF2, also known as Krueppel-like factor 2 or lung Kruppel-like Factor/LKLF) is a protein that, in humans, is encoded by the KLF2 gene on chromosome 19. It has been implicated in a variety of biochemical processes in the human body, including lung development, embryonic erythropoiesis, epithelial integrity, T-cell viability, and adipogenesis. KLF proteins KLF1, KLF2, KLF4, KLF5, KLF6, and KLF7 are transcriptional activators. KLF2 belongs to a family of proteins called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation, and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the N-terminal domain of KLF2, which is related to the N-terminal domains of KLF1 and KLF4. — an NCBI CDD conserved domain (cd21583); members share this curated model.
