identifier: CDD:cd01045
label: "Uncharacterized family of ferritin-like proteins found in archaea and bacteria. Ferritin-like domain found in archaea and bacteria (Ferritin_like_AB).  This uncharacterized domain is a member of a broad superfamily of ferritin-like diiron-carboxylate proteins whose function is unknown.  This family includes unknown or hypothetical proteins which were sequenced from mostly anaerobic or microaerophilic metal-metabolizing and/or nitrogen-fixing microbes. The family includes sequences from ferric-, sulfate-, and arsenic-reducing bacteria, Geobacter, Magnetospirillum, Desulfovibrio, and Desulfitobacterium.  Also included are several nitrogen-fixing endosymbiotic bacteria, Rhizobium, Mesorhizobium, and Bradyrhizobium; also phototrophic purple nonsulfur bacteria, Rhodobacter and Rhodopseudomonas, as well as, obligate thermophiles, Thermotoga, Thermoanaerobacter, and Pyrococcus. The conserved residues of a diiron center are present in this uncharacterized domain."
definition: >-
  Uncharacterized family of ferritin-like proteins found in archaea and bacteria. Ferritin-like domain found in archaea and bacteria (Ferritin_like_AB). This uncharacterized domain is a member of a broad superfamily of ferritin-like diiron-carboxylate proteins whose function is unknown. This family includes unknown or hypothetical proteins which were sequenced from mostly anaerobic or microaerophilic metal-metabolizing and/or nitrogen-fixing microbes. The family includes sequences from ferric-, sulfate-, and arsenic-reducing bacteria, Geobacter, Magnetospirillum, Desulfovibrio, and Desulfitobacterium. Also included are several nitrogen-fixing endosymbiotic bacteria, Rhizobium, Mesorhizobium, and Bradyrhizobium; also phototrophic purple nonsulfur bacteria, Rhodobacter and Rhodopseudomonas, as well as, obligate thermophiles, Thermotoga, Thermoanaerobacter, and Pyrococcus. The conserved residues of a diiron center are present in this uncharacterized domain. — an NCBI CDD conserved domain (cd01045); members share this curated model.
