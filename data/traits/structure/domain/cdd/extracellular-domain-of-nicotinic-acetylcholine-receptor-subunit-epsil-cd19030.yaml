identifier: CDD:cd19030
label: "extracellular domain of nicotinic acetylcholine receptor subunit epsilon (CHRNE). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit epsilon (epsilon), encoded by the CHRNE gene and found in adult skeletal muscle. Epsilon subunit forms a heteropentamer with (alpha1)2, beta and delta after birth, replacing the gamma subunit seen in embryonic receptors. The adult-type epsilon-AChR has a higher conductance and a shorter open time compared to embryonic gamma-AChR and the open channel is non-selectively cation permeable. Mutations of the CHRNE gene are the most common causes of congenital myasthenic syndrome (CMS), most of which are autosomal recessive loss-of-function mutations, resulting in endplate AChR deficiency. A highly fatal fast-channel syndrome is caused by AChR epsilon subunit mutation (Trp to Arg; changing environment from anionic to cationic) at the agonist binding site at the alpha/epsilon interface of the receptor, thus disrupting agonist binding affinity and gating efficiency."
definition: >-
  extracellular domain of nicotinic acetylcholine receptor subunit epsilon (CHRNE). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit epsilon (epsilon), encoded by the CHRNE gene and found in adult skeletal muscle. Epsilon subunit forms a heteropentamer with (alpha1)2, beta and delta after birth, replacing the gamma subunit seen in embryonic receptors. The adult-type epsilon-AChR has a higher conductance and a shorter open time compared to embryonic gamma-AChR and the open channel is non-selectively cation permeable. Mutations of the CHRNE gene are the most common causes of congenital myasthenic syndrome (CMS), most of which are autosomal recessive loss-of-function mutations, resulting in endplate AChR deficiency. A highly fatal fast-channel syndrome is caused by AChR epsilon subunit mutation (Trp to Arg; changing environment from anionic to cationic) at the agonist binding site at the alpha/epsilon interface of the receptor, thus disrupting agonist binding affinity and gating efficiency. — an NCBI CDD conserved domain (cd19030); members share this curated model.
