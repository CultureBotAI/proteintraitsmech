identifier: CDD:cd22422
label: "third type I K homology (KH) RNA-binding domain found in protein bicaudal C homolog 1 (BICC1) and similar proteins. BICC1, also called Bic-C, is a mammalian homologue of Drosophila Bicaudal-C (dBic-C). BICC1 functions as an RNA-binding protein that represses the translation of selected mRNAs to control development. It regulates gene expression and modulates cell proliferation and apoptosis. BICC1 is a negative regulator of Wnt signaling.  Increased levels of BICC1 may be associated with depression. Besides, BICC1 is a genetic determinant of osteoblastogenesis and bone mineral density. BICC1 contains three K-homology (KH) RNA-binding domains. The model corresponds to the third one."
definition: >-
  third type I K homology (KH) RNA-binding domain found in protein bicaudal C homolog 1 (BICC1) and similar proteins. BICC1, also called Bic-C, is a mammalian homologue of Drosophila Bicaudal-C (dBic-C). BICC1 functions as an RNA-binding protein that represses the translation of selected mRNAs to control development. It regulates gene expression and modulates cell proliferation and apoptosis. BICC1 is a negative regulator of Wnt signaling. Increased levels of BICC1 may be associated with depression. Besides, BICC1 is a genetic determinant of osteoblastogenesis and bone mineral density. BICC1 contains three K-homology (KH) RNA-binding domains. The model corresponds to the third one. — an NCBI CDD conserved domain (cd22422); members share this curated model.
