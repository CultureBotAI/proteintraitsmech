identifier: CDD:cd09534
label: "SAM domain of Ste11_fungal subfamily. SAM (sterile alpha motif) domain of Ste11 subfamily is a protein-protein interaction domain. Proteins of this subfamily have SAM domain at the N-terminus and protein kinase domain at the C-terminus. They participate in regulation of mating pheromone response, invasive growth and high osmolarity growth response. MAP triple kinase Ste11 from S.cerevisia is known to interact with Ste20 kinase and Ste50 regulator. These kinases are able to form homodimers interacting through their SAM domains as well as heterodimers or heterogenous complexes when either SAM domain of monomeric or homodimeric form of Ste11 interacts with Ste50 regulator."
definition: >-
  SAM domain of Ste11_fungal subfamily. SAM (sterile alpha motif) domain of Ste11 subfamily is a protein-protein interaction domain. Proteins of this subfamily have SAM domain at the N-terminus and protein kinase domain at the C-terminus. They participate in regulation of mating pheromone response, invasive growth and high osmolarity growth response. MAP triple kinase Ste11 from S.cerevisia is known to interact with Ste20 kinase and Ste50 regulator. These kinases are able to form homodimers interacting through their SAM domains as well as heterodimers or heterogenous complexes when either SAM domain of monomeric or homodimeric form of Ste11 interacts with Ste50 regulator. — an NCBI CDD conserved domain (cd09534); members share this curated model.
