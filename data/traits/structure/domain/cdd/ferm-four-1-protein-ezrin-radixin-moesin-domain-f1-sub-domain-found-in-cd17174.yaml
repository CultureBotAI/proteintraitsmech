identifier: CDD:cd17174
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in Talin-2 (TLN2). TLN2 is a cytoskeletal protein that plays an important role in cell adhesion and recycling of synaptic vesicles. TLN2 is required for myoblast fusion, sarcomere assembly and the maintenance of myotendinous junctions. TLN2 consists of an N-terminal head and a C-terminal rod. The talin head harbors a FERM (Band 4.1, ezrin, radixin, moesin) domain made up of F1, F2 and F3 domains, as well as an N-terminal region that precedes the FERM domain and has been referred to as the F0 domain. Both F0 and F1 domains have similar ubiquitin-like folds. This family corresponds to the F1 domain."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in Talin-2 (TLN2). TLN2 is a cytoskeletal protein that plays an important role in cell adhesion and recycling of synaptic vesicles. TLN2 is required for myoblast fusion, sarcomere assembly and the maintenance of myotendinous junctions. TLN2 consists of an N-terminal head and a C-terminal rod. The talin head harbors a FERM (Band 4.1, ezrin, radixin, moesin) domain made up of F1, F2 and F3 domains, as well as an N-terminal region that precedes the FERM domain and has been referred to as the F0 domain. Both F0 and F1 domains have similar ubiquitin-like folds. This family corresponds to the F1 domain. — an NCBI CDD conserved domain (cd17174); members share this curated model.
