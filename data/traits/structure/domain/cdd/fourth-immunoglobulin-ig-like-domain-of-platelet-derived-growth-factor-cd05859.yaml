identifier: CDD:cd05859
label: "Fourth immunoglobulin (Ig)-like domain of platelet-derived growth factor receptor (PDGFR). The members here are composed of the fourth immunoglobulin (Ig)-like domain of platelet-derived growth factor receptor (PDGFR; also known as cluster of differentiation (CD) 140a) alpha and beta. PDGF is a potent mitogen for connective tissue cells. PDGF-stimulated processes are mediated by three different PDGFs (PDGF-A,PDGF-B, and PDGF-C). PDGFR alpha binds to all three PDGFs, whereas the PDGFR beta binds only to PDGF-B. PDGF alpha is organized as an extracellular component having five Ig-like domains, a transmembrane segment, and a cytoplasmic portion having protein tyrosine kinase activity. In mice, PDGFR alpha and PDGFR beta are essential for normal development."
definition: >-
  Fourth immunoglobulin (Ig)-like domain of platelet-derived growth factor receptor (PDGFR). The members here are composed of the fourth immunoglobulin (Ig)-like domain of platelet-derived growth factor receptor (PDGFR; also known as cluster of differentiation (CD) 140a) alpha and beta. PDGF is a potent mitogen for connective tissue cells. PDGF-stimulated processes are mediated by three different PDGFs (PDGF-A,PDGF-B, and PDGF-C). PDGFR alpha binds to all three PDGFs, whereas the PDGFR beta binds only to PDGF-B. PDGF alpha is organized as an extracellular component having five Ig-like domains, a transmembrane segment, and a cytoplasmic portion having protein tyrosine kinase activity. In mice, PDGFR alpha and PDGFR beta are essential for normal development. — an NCBI CDD conserved domain (cd05859); members share this curated model.
