identifier: CDD:cd18048
label: "DEAD-box helicase domain of DEAD box protein 25. DDX25 (also called gonadotropin-regulated testicular RNA helicase (GRTH) is a testis-specific protein essential for completion of spermatogenesis. DDX25 is also a novel negative regulator of IFN pathway and facilitates RNA virus infection. Diseases associated with DDX25 include hydrolethalus syndrome, an autosomal recessive lethal malformation syndrome characterized by multiple developmental defects of fetus.. DDX25 (also called gonadotropin-regulated testicular RNA helicase) is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 25. DDX25 (also called gonadotropin-regulated testicular RNA helicase (GRTH) is a testis-specific protein essential for completion of spermatogenesis. DDX25 is also a novel negative regulator of IFN pathway and facilitates RNA virus infection. Diseases associated with DDX25 include hydrolethalus syndrome, an autosomal recessive lethal malformation syndrome characterized by multiple developmental defects of fetus.. DDX25 (also called gonadotropin-regulated testicular RNA helicase) is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18048); members share this curated model.
