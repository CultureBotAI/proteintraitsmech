identifier: CDD:cd23820
label: "RWD domain of RING finger protein 14 (RNF14) and related proteins. RNF14, also called androgen receptor (AR)-associated protein 54 (ARA54), HFB30, or Triad2 protein, is an RBR-type E3 ubiquitin-protein ligase (EC 2.3.2.31) that is highly expressed in the testis and interacts with class III E2s (UBE2E2, UbcH6, and UBE2E3). Its differential localization may play an important role in testicular development and spermatogenesis in humans. RNF14 functions as a transcriptional regulator of mitochondrial and immune function in muscles. It is a ligand-dependent AR co-activator that enhances AR-dependent transcriptional activation. It also may participate in enhancing cell cycle progression and cell proliferation via induction of cyclin D1. Moreover, RNF14 is crucial for colon cancer cell survival. It acts as a new enhancer of Wnt-dependent transcriptional outputs that act at the level of the T-cell factor/lymphoid enhancer factor (TCF/LEF)-beta-catenin complex."
definition: >-
  RWD domain of RING finger protein 14 (RNF14) and related proteins. RNF14, also called androgen receptor (AR)-associated protein 54 (ARA54), HFB30, or Triad2 protein, is an RBR-type E3 ubiquitin-protein ligase (EC 2.3.2.31) that is highly expressed in the testis and interacts with class III E2s (UBE2E2, UbcH6, and UBE2E3). Its differential localization may play an important role in testicular development and spermatogenesis in humans. RNF14 functions as a transcriptional regulator of mitochondrial and immune function in muscles. It is a ligand-dependent AR co-activator that enhances AR-dependent transcriptional activation. It also may participate in enhancing cell cycle progression and cell proliferation via induction of cyclin D1. Moreover, RNF14 is crucial for colon cancer cell survival. It acts as a new enhancer of Wnt-dependent transcriptional outputs that act at the level of the T-cell factor/lymphoid enhancer factor (TCF/LEF)-beta-catenin complex. — an NCBI CDD conserved domain (cd23820); members share this curated model.
