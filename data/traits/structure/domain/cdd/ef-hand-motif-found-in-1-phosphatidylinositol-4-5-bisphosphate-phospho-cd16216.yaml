identifier: CDD:cd16216
label: "EF-hand motif found in 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma-1-like proteins. This family corresponds to a small group of uncharacterized 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma-1-like (PI-PLC-gamma1-like) proteins. Although their biological function remains unclear, they shows high sequence similarity with other phosphoinositide phospholipase C gamma proteins.  They contain a core set of domains, including an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core, and a single C2 domain. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence.  A second PH domain, which is split by two SH2 (Src homology 2) domains, and one SH3 (Src homology 3) domain, are present within this linker."
definition: >-
  EF-hand motif found in 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma-1-like proteins. This family corresponds to a small group of uncharacterized 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase gamma-1-like (PI-PLC-gamma1-like) proteins. Although their biological function remains unclear, they shows high sequence similarity with other phosphoinositide phospholipase C gamma proteins. They contain a core set of domains, including an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core, and a single C2 domain. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. A second PH domain, which is split by two SH2 (Src homology 2) domains, and one SH3 (Src homology 3) domain, are present within this linker. — an NCBI CDD conserved domain (cd16216); members share this curated model.
