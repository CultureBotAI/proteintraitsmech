identifier: CDD:cd12781
label: "RNA recognition motif 1 (RRM1) found in vertebrate heterogeneous nuclear ribonucleoprotein L-like (hnRNP-LL). This subgroup corresponds to the RRM1 of hnRNP-LL, which plays a critical and unique role in the signal-induced regulation of CD45 and acts as a global regulator of alternative splicing in activated T cells. It is closely related in domain structure and sequence to heterogeneous nuclear ribonucleoprotein L (hnRNP-L), which is an abundant nuclear, multifunctional RNA-binding protein with three RNA-recognition motifs (RRMs), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif 1 (RRM1) found in vertebrate heterogeneous nuclear ribonucleoprotein L-like (hnRNP-LL). This subgroup corresponds to the RRM1 of hnRNP-LL, which plays a critical and unique role in the signal-induced regulation of CD45 and acts as a global regulator of alternative splicing in activated T cells. It is closely related in domain structure and sequence to heterogeneous nuclear ribonucleoprotein L (hnRNP-L), which is an abundant nuclear, multifunctional RNA-binding protein with three RNA-recognition motifs (RRMs), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd12781); members share this curated model.
