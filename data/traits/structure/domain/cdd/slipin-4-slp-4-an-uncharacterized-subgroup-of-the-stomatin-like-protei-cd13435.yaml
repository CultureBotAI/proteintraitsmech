identifier: CDD:cd13435
label: "Slipin-4 (SLP-4), an uncharacterized subgroup of the stomatin-like proteins (slipins) family; belonging to the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. This model summarizes a subgroup of the stomatin-like protein family (SLPs or slipins) that is found in arthropods. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. Members of this divergent slipin subgroup remain largely uncharacterized. It contains Drosophila Mec2, the gene for which was identified in a screen for genes required for nephrocyte function; it may function together with Sns in maintaining nephrocyte diaphragm."
definition: >-
