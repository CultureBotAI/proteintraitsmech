identifier: CDD:cd22017
label: "high mobility group (HMG)-box found in high mobility group protein 20A (HMG20A) and similar proteins. HMG20A, also called HMG box-containing protein 20A, HMG domain-containing protein 1 (HMGXB1), HMG domain-containing protein HMGX1, HMGXB1, or iBRAF, is a chromatin-associated protein involved in neuronal differentiation and maturation. It is required for SNAI1-mediated epithelial to mesenchymal transition. HMG20A acts as an inhibitor of HMG20B."
definition: >-
  high mobility group (HMG)-box found in high mobility group protein 20A (HMG20A) and similar proteins. HMG20A, also called HMG box-containing protein 20A, HMG domain-containing protein 1 (HMGXB1), HMG domain-containing protein HMGX1, HMGXB1, or iBRAF, is a chromatin-associated protein involved in neuronal differentiation and maturation. It is required for SNAI1-mediated epithelial to mesenchymal transition. HMG20A acts as an inhibitor of HMG20B. — an NCBI CDD conserved domain (cd22017); members share this curated model.
