identifier: CDD:cd02699
label: "Peptidase M4 family (includes thermolysin, aureolysin, neutral protease and bacillolysin) and Peptidase M36 family (also known as fungalysin). This family includes the peptidases M4 as well as M36, both belonging to the Gluzincin family. The M4 peptidase family includes numerous zinc-dependent metallopeptidases that hydrolyze peptide bonds, such as thermolysin (EC 3.4.24.27), pseudolysin (the extracellullar elastase of Pseudomonas aeruginosa), aureolysin (the extracellular metalloproteinase from Staphylococcus aureus), neutral protease from Bacillus cereus, as well as bacillolysin (EC 3.4.24.28). The M36 family also known as fungalysin (elastinolytic metalloproteinase) family, includes endopeptidases from pathogenic fungi. Both M4 and M36 families have similar folds and contain the Zn-binding site and the active site HEXXH motif. The eukaryotic M36 and bacterial M4 families of metalloproteases also share a conserved domain in their propeptides called FTP (fungalysin/thermolysin propeptide)."
definition: >-
  Peptidase M4 family (includes thermolysin, aureolysin, neutral protease and bacillolysin) and Peptidase M36 family (also known as fungalysin). This family includes the peptidases M4 as well as M36, both belonging to the Gluzincin family. The M4 peptidase family includes numerous zinc-dependent metallopeptidases that hydrolyze peptide bonds, such as thermolysin (EC 3.4.24.27), pseudolysin (the extracellullar elastase of Pseudomonas aeruginosa), aureolysin (the extracellular metalloproteinase from Staphylococcus aureus), neutral protease from Bacillus cereus, as well as bacillolysin (EC 3.4.24.28). The M36 family also known as fungalysin (elastinolytic metalloproteinase) family, includes endopeptidases from pathogenic fungi. Both M4 and M36 families have similar folds and contain the Zn-binding site and the active site HEXXH motif. The eukaryotic M36 and bacterial M4 families of metalloproteases also share a conserved domain in their propeptides called FTP (fungalysin/thermolysin propeptide). — an NCBI CDD conserved domain (cd02699); members share this curated model.
