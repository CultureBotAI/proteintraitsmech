identifier: CDD:cd17729
label: "BRCT domain of RNA polymerase II subunit A C-terminal domain phosphatase (CTDP1) and similar proteins. CTDP1 (EC 3.1.3.16), also termed TFIIF-associating CTD phosphatase, or TFIIF- associating RNA polymerase C-terminal domain phosphatase (FCP1), promotes the activity of RNA polymerase II through processively dephosphorylating 'Ser-2' and 'Ser-5' of the heptad repeats YSPTSPS in the C-terminal domain of the largest RNA polymerase II subunit. It plays a role in the exit from mitosis by dephosphorylating crucial mitotic substrates (USP44, CDC20 and WEE1) that are required for M-phase-promoting factor (MPF)/CDK1 inactivation."
definition: >-
  BRCT domain of RNA polymerase II subunit A C-terminal domain phosphatase (CTDP1) and similar proteins. CTDP1 (EC 3.1.3.16), also termed TFIIF-associating CTD phosphatase, or TFIIF- associating RNA polymerase C-terminal domain phosphatase (FCP1), promotes the activity of RNA polymerase II through processively dephosphorylating 'Ser-2' and 'Ser-5' of the heptad repeats YSPTSPS in the C-terminal domain of the largest RNA polymerase II subunit. It plays a role in the exit from mitosis by dephosphorylating crucial mitotic substrates (USP44, CDC20 and WEE1) that are required for M-phase-promoting factor (MPF)/CDK1 inactivation. — an NCBI CDD conserved domain (cd17729); members share this curated model.
