identifier: CDD:cd23598
label: "extracellular domain (ECD) found in Drosophila melanogaster Baboon and similar proteins. Baboon (Babo) is the Drosophila transforming growth factor-beta (TGF-beta)/activin-specific type I receptor that transmits signals through dSmad2. Baboon/dSmad2-mediated TGF-beta signaling is required during late larval stage for development of adult-specific neurons. In addition to dSmad2, it can Mad and bone morphogenetic protein (BMP)-specific R-Smad. Baboon is the ortholog of the human activin receptor-like kinase (ALK)-4/5/7. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Drosophila melanogaster Baboon and similar proteins. Baboon (Babo) is the Drosophila transforming growth factor-beta (TGF-beta)/activin-specific type I receptor that transmits signals through dSmad2. Baboon/dSmad2-mediated TGF-beta signaling is required during late larval stage for development of adult-specific neurons. In addition to dSmad2, it can Mad and bone morphogenetic protein (BMP)-specific R-Smad. Baboon is the ortholog of the human activin receptor-like kinase (ALK)-4/5/7. It contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23598); members share this curated model.
