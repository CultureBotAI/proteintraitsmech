identifier: CDD:cd06747
label: "PDZ domain of MYO18A protein, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MYO18 protein and related domains. MYO18 (also known as myosin XVIIIA, KIAA0216, MysPDZ), a member of the myosin superfamily, is involved in regulating cell protrusion and migration, and Golgi trafficking and morphology, and is required for myoblast adhesion and muscle integrity. The MYO18A/MRCK/LRAP35a complex regulates actomyosin retrograde flow in cell protrusion and migration; the PtdIns(4)P/GOLPH3/MYO18A/F-actin complex is a hub for signals that regulate Golgi trafficking function. The MYO18A PDZ domain binds p190Rho-guanine nucleotide exchange factor (p190RhoGEF), Golgin45, and leucine repeat adaptor protein 1 (Lurap1, also known as Lrap35a). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MYO18-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta- strand F."
definition: >-
  PDZ domain of MYO18A protein, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of MYO18 protein and related domains. MYO18 (also known as myosin XVIIIA, KIAA0216, MysPDZ), a member of the myosin superfamily, is involved in regulating cell protrusion and migration, and Golgi trafficking and morphology, and is required for myoblast adhesion and muscle integrity. The MYO18A/MRCK/LRAP35a complex regulates actomyosin retrograde flow in cell protrusion and migration; the PtdIns(4)P/GOLPH3/MYO18A/F-actin complex is a hub for signals that regulate Golgi trafficking function. The MYO18A PDZ domain binds p190Rho-guanine nucleotide exchange factor (p190RhoGEF), Golgin45, and leucine repeat adaptor protein 1 (Lurap1, also known as Lrap35a). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This MYO18-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged as beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta- strand F. — an NCBI CDD conserved domain (cd06747); members share this curated model.
