identifier: CDD:cd09461
label: "The third LIM domain of an Enigma subfamily with unknown function. The third LIM domain of an Enigma subfamily with unknown function: The Enigma LIM domain family is comprised of three characterized members: Enigma, ENH, and Cypher (mouse)/ZASP (human). These subfamily members contain a single PDZ domain at the N-terminus and three LIM domains at the C-terminus. They serve as adaptor proteins, where the PDZ domain tethers the protein to the cytoskeleton and the LIM domains, recruit signaling proteins to implement corresponding functions. The members of the enigma family have been implicated in regulating or organizing cytoskeletal structure, as well as involving multiple signaling pathways. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The third LIM domain of an Enigma subfamily with unknown function. The third LIM domain of an Enigma subfamily with unknown function: The Enigma LIM domain family is comprised of three characterized members: Enigma, ENH, and Cypher (mouse)/ZASP (human). These subfamily members contain a single PDZ domain at the N-terminus and three LIM domains at the C-terminus. They serve as adaptor proteins, where the PDZ domain tethers the protein to the cytoskeleton and the LIM domains, recruit signaling proteins to implement corresponding functions. The members of the enigma family have been implicated in regulating or organizing cytoskeletal structure, as well as involving multiple signaling pathways. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09461); members share this curated model.
