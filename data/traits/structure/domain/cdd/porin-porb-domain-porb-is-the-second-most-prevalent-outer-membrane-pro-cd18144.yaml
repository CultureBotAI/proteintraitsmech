identifier: CDD:cd18144
label: "Porin PorB domain. PorB is the second most prevalent outer membrane protein in Neisseria meningitidis. PorB is required for neisserial pathogenesis and can elicit a Toll-like receptor mediated host immune response. There are 3 putative solute translocation pathways through the channel pore: one pathway transports anions nonselectively, one transports cations nonselectively, and one facilitates the specific uptake of sugars. During infection, PorB is thought to bind host mitochondrial ATP, and cocrystallization with the ATP analog AMP-PNP suggests that binding of nucleotides regulates these translocation pathways both by partial occlusion of the pore and by restricting the motion of a putative voltage gating loop. PorB is located on the surface of N. meningitidis and can be recognized by receptors of the host innate immune system. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. The porin members here are Proteobacteria (Alphaproteobacteria, Gammaproteobacteria, and Betaproteobacteria) and Fibrobacteres/Acidobacteria."
definition: >-
  Porin PorB domain. PorB is the second most prevalent outer membrane protein in Neisseria meningitidis. PorB is required for neisserial pathogenesis and can elicit a Toll-like receptor mediated host immune response. There are 3 putative solute translocation pathways through the channel pore: one pathway transports anions nonselectively, one transports cations nonselectively, and one facilitates the specific uptake of sugars. During infection, PorB is thought to bind host mitochondrial ATP, and cocrystallization with the ATP analog AMP-PNP suggests that binding of nucleotides regulates these translocation pathways both by partial occlusion of the pore and by restricting the motion of a putative voltage gating loop. PorB is located on the surface of N. meningitidis and can be recognized by receptors of the host innate immune system. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. The porin members here are Proteobacteria (Alphaproteobacteria, Gammaproteobacteria, and Betaproteobacteria) and Fibrobacteres/Acidobacteria. — an NCBI CDD conserved domain (cd18144); members share this curated model.
