identifier: CDD:cd16290
label: "AIM-1, SMB-1, EVM-1, THIN-B and related metallo-beta-lactamases, subclass B3; MBL-fold metallo-hydrolase domain. This subgroup of B3 subclass MBLs includes Pseudomonas Aeruginosa AIM-1, Serratia marcescens SMB-1, Erythrobacter vulgaris EVM-1, and Janthinobacterium lividum THIN-B. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. This subgroup of AIM-1-,SMB-1-, EVM-1-, THIN-B-like MBLs belongs to the B3 subclass. Subclass B3 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile. These B3 enzymes have a modified Zn2/DCH site (Asp-His-His)."
definition: >-
