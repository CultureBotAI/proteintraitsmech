identifier: CDD:cd16031
label: "unchracterized sulfatase homologous to glucosamine (N-acetyl)-6-sulfatase(G6S, GNS). N-acetylglucosamine-6-sulfatase also known as glucosamine (N-acetyl)-6-sulfatase hydrolyzes of the 6-sulfate groups of the N-acetyl-D-glucosamine 6-sulfate units of heparan sulfate and keratan sulfate. Deficiency of N-acetylglucosamine-6-sulfatase results in the disease of Sanfilippo Syndrome type IIId or Mucopolysaccharidosis III (MPS-III), a rare autosomal recessive lysosomal storage disease."
definition: >-
