identifier: CDD:cd08719
label: "Regulator of G protein signaling (RGS) domain found in the Sorting Nexin 13 (SNX13) protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the SNX13 (Sorting Nexin 13) protein, a member of  the RGS protein family.  They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. The RGS-domain of SNX13 plays a major role through attenuation of Galphas-mediated signaling and regulates endocytic trafficking and degradation of the epidermal growth factor receptor. Snx13-null mice were embryonic lethal around midgestation which supports an essential role for SNX13 in mouse development and regulation of endocytosis dynamics."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the Sorting Nexin 13 (SNX13) protein. The RGS (Regulator of G-protein Signaling) domain is an essential part of the SNX13 (Sorting Nexin 13) protein, a member of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. The RGS-domain of SNX13 plays a major role through attenuation of Galphas-mediated signaling and regulates endocytic trafficking and degradation of the epidermal growth factor receptor. Snx13-null mice were embryonic lethal around midgestation which supports an essential role for SNX13 in mouse development and regulation of endocytosis dynamics. — an NCBI CDD conserved domain (cd08719); members share this curated model.
