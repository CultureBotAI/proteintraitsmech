identifier: CDD:cd09623
label: "Heme-binding domain of bacterial ethylbenzene dehydrogenase. Ethylbenzene dehydrogenase (EBDH) is a bacterial molybdopterin enzyme. It catalyzes anaerobic hydroxylation of alkylaromatic compounds to secondary alcohols. The DOMON domain in EBDH and related proteins, typically called the gamma subunit, binds a heme; its function in the catalytic mechanism is unclear. It co-occurs with a molybdopterin-binding subunit and an iron-sulfur protein. This family also contains heme-binding domains of dimethylsulfide dehydrogenase, selenate reductases, and chlorate reductase."
definition: >-
  Heme-binding domain of bacterial ethylbenzene dehydrogenase. Ethylbenzene dehydrogenase (EBDH) is a bacterial molybdopterin enzyme. It catalyzes anaerobic hydroxylation of alkylaromatic compounds to secondary alcohols. The DOMON domain in EBDH and related proteins, typically called the gamma subunit, binds a heme; its function in the catalytic mechanism is unclear. It co-occurs with a molybdopterin-binding subunit and an iron-sulfur protein. This family also contains heme-binding domains of dimethylsulfide dehydrogenase, selenate reductases, and chlorate reductase. — an NCBI CDD conserved domain (cd09623); members share this curated model.
