identifier: CDD:cd06633
label: "Catalytic domain of the Serine/Threonine Kinase, Thousand-and-One Amino acids 3. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TAO3 is also known as JIK (c-Jun N-terminal kinase inhibitory kinase) or KFC (kinase from chicken). It specifically activates JNK, presumably by phosphorylating and activating MKK4/MKK7. In Saccharomyces cerevisiae, TAO3 is a component of the RAM (regulation of Ace2p activity and cellular morphogenesis) signaling pathway. TAO3 is upregulated in retinal ganglion cells after axotomy, and may play a role in apoptosis. TAO proteins possess mitogen-activated protein kinase (MAPK) kinase kinase activity. MAPK signaling cascades are important in mediating cellular responses to extracellular signals. The TAO3 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Thousand-and-One Amino acids 3. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TAO3 is also known as JIK (c-Jun N-terminal kinase inhibitory kinase) or KFC (kinase from chicken). It specifically activates JNK, presumably by phosphorylating and activating MKK4/MKK7. In Saccharomyces cerevisiae, TAO3 is a component of the RAM (regulation of Ace2p activity and cellular morphogenesis) signaling pathway. TAO3 is upregulated in retinal ganglion cells after axotomy, and may play a role in apoptosis. TAO proteins possess mitogen-activated protein kinase (MAPK) kinase kinase activity. MAPK signaling cascades are important in mediating cellular responses to extracellular signals. The TAO3 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06633); members share this curated model.
