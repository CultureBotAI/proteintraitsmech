identifier: CDD:cd06950
label: "The ligand binding domain of Tailless-like proteins,  orphan nuclear receptors. The ligand binding domain of the photoreceptor cell-specific nuclear receptor (PNR)  like family: This family includes photoreceptor cell-specific nuclear receptor (PNR), Tailless (TLX), and related receptors. TLX is an orphan receptor that is expressed by neural stem/progenitor cells in the adult brain of the subventricular zone (SVZ) and the dentate gyrus (DG). It plays a key role in neural development by promoting cell cycle progression and preventing apoptosis in the developing brain. PNR is expressed only in the outer layer of retinal photoreceptor cells. It may be involved in the signaling pathway regulating photoreceptor differentiation and/or maintenance. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, TLX and PNR  have  a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a flexible hinge and a C-terminal ligand binding domain (LBD)."
definition: >-
  The ligand binding domain of Tailless-like proteins, orphan nuclear receptors. The ligand binding domain of the photoreceptor cell-specific nuclear receptor (PNR) like family: This family includes photoreceptor cell-specific nuclear receptor (PNR), Tailless (TLX), and related receptors. TLX is an orphan receptor that is expressed by neural stem/progenitor cells in the adult brain of the subventricular zone (SVZ) and the dentate gyrus (DG). It plays a key role in neural development by promoting cell cycle progression and preventing apoptosis in the developing brain. PNR is expressed only in the outer layer of retinal photoreceptor cells. It may be involved in the signaling pathway regulating photoreceptor differentiation and/or maintenance. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, TLX and PNR have a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a flexible hinge and a C-terminal ligand binding domain (LBD). — an NCBI CDD conserved domain (cd06950); members share this curated model.
