identifier: CDD:cd10277
label: "Ethanol dehydrogenase, a bacterial quinoprotein (PQQ-dependent type I alcohol dehydrogenase). This bacterial family of homodimeric ethanol dehydrogenases utilize pyrroloquinoline quinone (PQQ) as a cofactor. It represents proteins whose expression may be induced by ethanol, and which are similar to quinoprotein methanol dehydrogenases, but have higher specificities for ethanol and other primary and secondary alcohols. Dehydrogenases with PQQ cofactors, such as ethanol, methanol, and membrane-bound glucose dehydrogenases, form an 8-bladed beta-propeller."
definition: >-
  Ethanol dehydrogenase, a bacterial quinoprotein (PQQ-dependent type I alcohol dehydrogenase). This bacterial family of homodimeric ethanol dehydrogenases utilize pyrroloquinoline quinone (PQQ) as a cofactor. It represents proteins whose expression may be induced by ethanol, and which are similar to quinoprotein methanol dehydrogenases, but have higher specificities for ethanol and other primary and secondary alcohols. Dehydrogenases with PQQ cofactors, such as ethanol, methanol, and membrane-bound glucose dehydrogenases, form an 8-bladed beta-propeller. — an NCBI CDD conserved domain (cd10277); members share this curated model.
