identifier: CDD:cd17700
label: "RUN domain found in RUN domain-containing protein 3B (RUNDC3B) and similar proteins. RUN domain-containing protein 3B (RUNDC3B), also called Rap2-binding protein 9, or Rap2-interacting protein 9 (RPIP-9), contains a RUN domain in its N-terminal region that mediates interaction with Rap2, an important component of the Mitogen-Activated Protein Kinase (MAPK) cascade, which regulates cellular proliferation and differentiation. It also contains characteristic binding sites for MAPK intermediates. RUNDC3B contains a RUN domain."
definition: >-
  RUN domain found in RUN domain-containing protein 3B (RUNDC3B) and similar proteins. RUN domain-containing protein 3B (RUNDC3B), also called Rap2-binding protein 9, or Rap2-interacting protein 9 (RPIP-9), contains a RUN domain in its N-terminal region that mediates interaction with Rap2, an important component of the Mitogen-Activated Protein Kinase (MAPK) cascade, which regulates cellular proliferation and differentiation. It also contains characteristic binding sites for MAPK intermediates. RUNDC3B contains a RUN domain. — an NCBI CDD conserved domain (cd17700); members share this curated model.
