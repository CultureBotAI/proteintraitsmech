identifier: CDD:cd10974
label: "Putative catalytic domain of chitin deacetylase-like proteins with additional chitin-binding peritrophin-A domain (ChBD) and/or a low-density lipoprotein receptor class A domain (LDLa). Chitin deacetylases (CDAs, EC 3.5.1.41) are secreted metalloproteins belonging to a family of extracellular chitin-modifying enzymes that catalyze the N-deacetylation of chitin, a beta-1,4-linked N-acetylglucosamine polymer, to form chitosan, a polymer of beta-(1,4)-linked d-glucosamine residues. CDAs have been isolated and characterized from various bacterial and fungal species and belong to the larger carbohydrate esterase 4 (CE4) superfamily. This family includes many CDA-like proteins mainly from insects, which contain a putative CDA-like catalytic domain similar to the catalytic NodB homology domain of CE4 esterases. In addition to the CDA-like domain, family members contain two additional domains, a chitin-binding peritrophin-A domain (ChBD) and a low-density lipoprotein receptor class A domain (LDLa), or have the ChBD domain but do not have the LDLa domain."
definition: >-
  Putative catalytic domain of chitin deacetylase-like proteins with additional chitin-binding peritrophin-A domain (ChBD) and/or a low-density lipoprotein receptor class A domain (LDLa). Chitin deacetylases (CDAs, EC 3.5.1.41) are secreted metalloproteins belonging to a family of extracellular chitin-modifying enzymes that catalyze the N-deacetylation of chitin, a beta-1,4-linked N-acetylglucosamine polymer, to form chitosan, a polymer of beta-(1,4)-linked d-glucosamine residues. CDAs have been isolated and characterized from various bacterial and fungal species and belong to the larger carbohydrate esterase 4 (CE4) superfamily. This family includes many CDA-like proteins mainly from insects, which contain a putative CDA-like catalytic domain similar to the catalytic NodB homology domain of CE4 esterases. In addition to the CDA-like domain, family members contain two additional domains, a chitin-binding peritrophin-A domain (ChBD) and a low-density lipoprotein receptor class A domain (LDLa), or have the ChBD domain but do not have the LDLa domain. — an NCBI CDD conserved domain (cd10974); members share this curated model.
