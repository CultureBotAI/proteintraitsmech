identifier: CDD:cd21844
label: "JAK1 binding box domain found in interferon lambda receptor 1 (IFNLR1), interleukin-10 receptor subunit alpha (IL10RA) and similar proteins. This family includes two class II cytokine receptors, IFNLR1 and IL10RA. IFNLR1 (also called IFN-lambda receptor 1, IFN-lambda-R1, cytokine receptor class-II member 12, cytokine receptor family 2 member 12, CRF2-12, interleukin-28 receptor subunit alpha, IL-28 receptor subunit alpha, IL-28R-alpha, IL-28RA, likely interleukin, cytokine receptor 2 or LICR2), together with IL10RB, forms a dimer. The IFNLR1/IL10RB dimer is a receptor for the cytokine ligands IFNL2 and IFNL3, and mediates their antiviral activity. The ligand/receptor complex stimulates the activation of the JAK/STAT signaling pathway, leading to expression of IFN-stimulated genes (ISG), which contribute to the antiviral state. IFNLR1 determines the cell type specificity of the lambda interferon action. It plays a significant role in the antiviral immune defense in the intestinal epithelium. IL10RA (also called IL-10 receptor subunit alpha, IL-10R subunit alpha, IL-10RA, CDw210a, interleukin-10 receptor subunit 1, IL-10R subunit 1, or IL-10R1) is a cell surface receptor for the cytokine IL10 that participates in IL10-mediated anti-inflammatory functions, limiting excessive tissue disruption caused by inflammation. Both, IFNLR1 and IL10RA, contain a box domain consisting of box1 and box2. The cytokine receptor box1 motif is critical for JAK kinase binding and activation."
definition: >-
  JAK1 binding box domain found in interferon lambda receptor 1 (IFNLR1), interleukin-10 receptor subunit alpha (IL10RA) and similar proteins. This family includes two class II cytokine receptors, IFNLR1 and IL10RA. IFNLR1 (also called IFN-lambda receptor 1, IFN-lambda-R1, cytokine receptor class-II member 12, cytokine receptor family 2 member 12, CRF2-12, interleukin-28 receptor subunit alpha, IL-28 receptor subunit alpha, IL-28R-alpha, IL-28RA, likely interleukin, cytokine receptor 2 or LICR2), together with IL10RB, forms a dimer. The IFNLR1/IL10RB dimer is a receptor for the cytokine ligands IFNL2 and IFNL3, and mediates their antiviral activity. The ligand/receptor complex stimulates the activation of the JAK/STAT signaling pathway, leading to expression of IFN-stimulated genes (ISG), which contribute to the antiviral state. IFNLR1 determines the cell type specificity of the lambda interferon action. It plays a significant role in the antiviral immune defense in the intestinal epithelium. IL10RA (also called IL-10 receptor subunit alpha, IL-10R subunit alpha, IL-10RA, CDw210a, interleukin-10 receptor subunit 1, IL-10R subunit 1, or IL-10R1) is a cell surface receptor for the cytokine IL10 that participates in IL10-mediated anti-inflammatory functions, limiting excessive tissue disruption caused by inflammation. Both, IFNLR1 and IL10RA, contain a box domain consisting of box1 and box2. The cytokine receptor box1 motif is critical for JAK kinase binding and activation. — an NCBI CDD conserved domain (cd21844); members share this curated model.
