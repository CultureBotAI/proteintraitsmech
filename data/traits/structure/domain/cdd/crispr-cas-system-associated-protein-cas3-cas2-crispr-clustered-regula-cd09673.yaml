label: "CRISPR/Cas system-associated protein Cas3/Cas2. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Cas3/Cas2 fusion; This protein includes both DEAH and HD motifs for helicase and N-terminal domain corresponding to Cas2 RNAse; signature gene for Type I and subtype I-F"
definition: >-
  CRISPR/Cas system-associated protein Cas3/Cas2. CRISPR (Clustered Regularly Interspaced Short Palindromic Repeats) and associated Cas proteins comprise a system for heritable host defense by prokaryotic cells against phage and other foreign DNA; Cas3/Cas2 fusion; This protein includes both DEAH and HD motifs for helicase and N-terminal domain corresponding to Cas2 RNAse; signature gene for Type I and subtype I-F — an NCBI CDD conserved domain (cd09673); members share this curated model.
