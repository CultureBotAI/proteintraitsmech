identifier: CDD:cd05853
label: "Sixth immunoglobulin (Ig) domain of contactin-4. The members here are composed of the sixth immunoglobulin (Ig) domain of the neural cell adhesion molecule contactin-4. Contactins are neural cell adhesion molecules, and are comprised of six Ig domains followed by four fibronectin type III (FnIII) domains anchored to the membrane by glycosylphosphatidylinositol. The different contactins show different expression patterns in the central nervous system. Highest expression of contactin-4 is in testes, thyroid, small intestine, uterus, and brain. Contactin-4 plays a role in the response of neuroblastoma cells to differentiating agents, such as retinoids. The contactin 4 gene is associated with cerebellar degeneration in spinocerebellar ataxia type 16."
definition: >-
  Sixth immunoglobulin (Ig) domain of contactin-4. The members here are composed of the sixth immunoglobulin (Ig) domain of the neural cell adhesion molecule contactin-4. Contactins are neural cell adhesion molecules, and are comprised of six Ig domains followed by four fibronectin type III (FnIII) domains anchored to the membrane by glycosylphosphatidylinositol. The different contactins show different expression patterns in the central nervous system. Highest expression of contactin-4 is in testes, thyroid, small intestine, uterus, and brain. Contactin-4 plays a role in the response of neuroblastoma cells to differentiating agents, such as retinoids. The contactin 4 gene is associated with cerebellar degeneration in spinocerebellar ataxia type 16. — an NCBI CDD conserved domain (cd05853); members share this curated model.
