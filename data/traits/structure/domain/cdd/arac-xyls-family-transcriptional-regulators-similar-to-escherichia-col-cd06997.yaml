identifier: CDD:cd06997
label: "AraC/XylS family transcriptional regulators similar to Escherichia coli MelR, N-terminal cupin domain. This family contains bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators, including Escherichia coli MelR, a transcription factor that controls melibiose utilization. MelR is encoded by the melR gene and is essential for melibiose-dependent triggering of the melAB operon that encodes products needed for melibiose catabolism and transport. Expression of melR is autoregulated by MelR, which represses the melR promoter by binding to a target that overlaps the transcript start. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  AraC/XylS family transcriptional regulators similar to Escherichia coli MelR, N-terminal cupin domain. This family contains bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators, including Escherichia coli MelR, a transcription factor that controls melibiose utilization. MelR is encoded by the melR gene and is essential for melibiose-dependent triggering of the melAB operon that encodes products needed for melibiose catabolism and transport. Expression of melR is autoregulated by MelR, which represses the melR promoter by binding to a target that overlaps the transcript start. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06997); members share this curated model.
