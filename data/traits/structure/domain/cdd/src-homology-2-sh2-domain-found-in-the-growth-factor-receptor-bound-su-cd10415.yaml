identifier: CDD:cd10415
label: "Src homology 2 (SH2) domain found in the growth factor receptor bound, subclass 10 (Grb10) proteins. The Grb family binds to the epidermal growth factor receptor (EGFR, erbB1) via their SH2 domains. Grb10 is part of the Grb7 family of proteins which also includes Grb7, and Grb14. They are composed of an N-terminal Proline-rich domain, a Ras Associating-like (RA) domain, a Pleckstrin Homology (PH) domain, a phosphotyrosine interaction region (PIR, BPS) and a C-terminal SH2 domain. The SH2 domains of Grb7, Grb10 and Grb14 preferentially bind to a different RTK. Grb10 has been shown to interact with many different proteins, including the insulin and IGF1 receptors, platelet-derived growth factor (PDGF) receptor-beta, Ret, Kit, Raf1 and MEK1, and Nedd4. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in the growth factor receptor bound, subclass 10 (Grb10) proteins. The Grb family binds to the epidermal growth factor receptor (EGFR, erbB1) via their SH2 domains. Grb10 is part of the Grb7 family of proteins which also includes Grb7, and Grb14. They are composed of an N-terminal Proline-rich domain, a Ras Associating-like (RA) domain, a Pleckstrin Homology (PH) domain, a phosphotyrosine interaction region (PIR, BPS) and a C-terminal SH2 domain. The SH2 domains of Grb7, Grb10 and Grb14 preferentially bind to a different RTK. Grb10 has been shown to interact with many different proteins, including the insulin and IGF1 receptors, platelet-derived growth factor (PDGF) receptor-beta, Ret, Kit, Raf1 and MEK1, and Nedd4. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10415); members share this curated model.
