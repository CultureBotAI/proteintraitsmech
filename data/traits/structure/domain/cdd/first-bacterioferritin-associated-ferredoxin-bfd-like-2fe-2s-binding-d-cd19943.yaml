identifier: CDD:cd19943
label: "first bacterioferritin-associated ferredoxin (BFD)-like [2Fe-2S]-binding domain of the large subunit of the NADH-dependent nitrite reductase. The NADH-dependent nitrite reductase (NirBD) complex comprises a large and a small subunit, and is also known as nitrite reductase (reduced nicotinamide adenine dinucleotide), NADH-nitrite oxidoreductase, and assimilatory nitrite reductase. NirBD uses NADH as electron donor, and FAD, iron-sulfur cluster, and siroheme cofactors, all embedded in the large subunit NirB to catalyze the 6-electron reduction of nitrite to ammonium. NirBD plays a role in regulating nitric oxide homeostasis in Streptomyces coelicolor. In addition to NirB, the BFD-like [2Fe-2S]-binding domain is found in a variety of proteins including bacterioferritin-associated ferredoxin (BFD) and Cu+ chaperone CopZ. It comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. For the class of proteins having a BFD-like [2Fe-2S]-binding domain, the Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport."
definition: >-
  first bacterioferritin-associated ferredoxin (BFD)-like [2Fe-2S]-binding domain of the large subunit of the NADH-dependent nitrite reductase. The NADH-dependent nitrite reductase (NirBD) complex comprises a large and a small subunit, and is also known as nitrite reductase (reduced nicotinamide adenine dinucleotide), NADH-nitrite oxidoreductase, and assimilatory nitrite reductase. NirBD uses NADH as electron donor, and FAD, iron-sulfur cluster, and siroheme cofactors, all embedded in the large subunit NirB to catalyze the 6-electron reduction of nitrite to ammonium. NirBD plays a role in regulating nitric oxide homeostasis in Streptomyces coelicolor. In addition to NirB, the BFD-like [2Fe-2S]-binding domain is found in a variety of proteins including bacterioferritin-associated ferredoxin (BFD) and Cu+ chaperone CopZ. It comprises a helix-turn-helix fold, and binds an [2Fe-2S] cluster via 4 highly-conserved Cys residues, found in loops between the alpha-helices. For the class of proteins having a BFD-like [2Fe-2S]-binding domain, the Cys residues are organized in a unique C-X2-C-X31-35-C-X2-9-C-arrangement. [2Fe-2S] clusters are sulfide-linked diiron centers, a primary role for which is electron transport. — an NCBI CDD conserved domain (cd19943); members share this curated model.
