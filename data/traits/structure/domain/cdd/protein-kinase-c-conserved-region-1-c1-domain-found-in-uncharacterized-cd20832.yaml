identifier: CDD:cd20832
label: "protein kinase C conserved region 1 (C1 domain) found in uncharacterized Rho guanine nucleotide exchange factor (ARHGEF)-like proteins. The family includes a group of uncharacterized proteins that show high sequence similarity to vertebrate Rho guanine nucleotide exchange factors ARHGEF11 and ARHGEF12, which may play a role in the regulation of RhoA GTPase by guanine nucleotide-binding alpha-12 (GNA12) and alpha-13 (GNA13). Unlike typical ARHGEF11 and ARHGEF12, members of this family contain a C1 domain. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in uncharacterized Rho guanine nucleotide exchange factor (ARHGEF)-like proteins. The family includes a group of uncharacterized proteins that show high sequence similarity to vertebrate Rho guanine nucleotide exchange factors ARHGEF11 and ARHGEF12, which may play a role in the regulation of RhoA GTPase by guanine nucleotide-binding alpha-12 (GNA12) and alpha-13 (GNA13). Unlike typical ARHGEF11 and ARHGEF12, members of this family contain a C1 domain. This model corresponds to the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20832); members share this curated model.
