identifier: CDD:cd22003
label: "sixth high mobility group (HMG)-box found in upstream-binding factor 1 (UBF1) and similar proteins. UBF1, also called UBTF, nucleolar transcription factor 1, or auto-antigen NOR-90, is a nucleolar transcription factor that recognizes the ribosomal RNA gene promoter and activates transcription mediated by RNA polymerase I through cooperative interactions with the transcription factor SL1/TIF-IB complex. It binds specifically to the upstream control element. UBF1 contains six HMG-box domains. This model corresponds to the sixth one. This model also includes the second HMG-box domain of upstream-binding factor 1-like protein 1 (UBTFL1), which contains two HMG-box domains."
definition: >-
  sixth high mobility group (HMG)-box found in upstream-binding factor 1 (UBF1) and similar proteins. UBF1, also called UBTF, nucleolar transcription factor 1, or auto-antigen NOR-90, is a nucleolar transcription factor that recognizes the ribosomal RNA gene promoter and activates transcription mediated by RNA polymerase I through cooperative interactions with the transcription factor SL1/TIF-IB complex. It binds specifically to the upstream control element. UBF1 contains six HMG-box domains. This model corresponds to the sixth one. This model also includes the second HMG-box domain of upstream-binding factor 1-like protein 1 (UBTFL1), which contains two HMG-box domains. — an NCBI CDD conserved domain (cd22003); members share this curated model.
