identifier: CDD:cd22720
label: "forkhead associated (FHA) domain found in Mycobacterium tuberculosis glycogen accumulation regulator GarA and similar proteins. GarA is an FHA domain-containing protein involved in the regulation of glutamate metabolism. It acts as a phosphorylation-dependent ON/OFF molecular switch that modulates the activities of KGD, GDH and GltB. Its FHA domain has dual specificity. It binds to both phosphorylated upstream partners, such as the kinases PknB and PknG, and nonphosphorylated downstream partners, such as the 2-oxoglutarate decarboxylase KGD. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Mycobacterium tuberculosis glycogen accumulation regulator GarA and similar proteins. GarA is an FHA domain-containing protein involved in the regulation of glutamate metabolism. It acts as a phosphorylation-dependent ON/OFF molecular switch that modulates the activities of KGD, GDH and GltB. Its FHA domain has dual specificity. It binds to both phosphorylated upstream partners, such as the kinases PknB and PknG, and nonphosphorylated downstream partners, such as the 2-oxoglutarate decarboxylase KGD. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22720); members share this curated model.
