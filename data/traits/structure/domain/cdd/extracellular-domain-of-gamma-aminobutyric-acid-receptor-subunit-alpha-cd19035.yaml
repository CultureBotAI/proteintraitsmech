identifier: CDD:cd19035
label: "extracellular domain of gamma-aminobutyric acid receptor subunit alpha-2 (GABAAR-A2 or GABRA2). This family contains extracellular domain of gamma-aminobutyric acid receptor subunit alpha-2 (GABAAR-A2), a protein that is encoded by the GABRA2 gene in humans. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The alpha-2 subunit forms heteropentamers with other GABAAR subunits, most broadly expressed as combination of alpha2beta3gamma2. The alpha-2 (GABRA2) subunit is found primarily in the forebrain and hippocampus, and is more confined to areas of the brain compared to other alpha subunits. GABRA2 increases the risk of anxiety, making it a target for treating behavioral disorders including alcohol dependence, and drug use. GABRA2 is a binding site for benzodiazepines (psychoactive drugs known to reduce anxiety), causing chloride channels to open, leading to the hyper-polarization of the membrane. Other anxiolytic drugs such as Diazepam bind this subunit to induce inhibitory effects. GABRA2 is associated with reward behavior when it activates the insula, the part of the cerebral cortex responsible for emotions. GABA alpha2 and/or alpha3 receptor subtypes are also involved in GABAergic modulation of prolactin secretion."
definition: >-
  extracellular domain of gamma-aminobutyric acid receptor subunit alpha-2 (GABAAR-A2 or GABRA2). This family contains extracellular domain of gamma-aminobutyric acid receptor subunit alpha-2 (GABAAR-A2), a protein that is encoded by the GABRA2 gene in humans. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The alpha-2 subunit forms heteropentamers with other GABAAR subunits, most broadly expressed as combination of alpha2beta3gamma2. The alpha-2 (GABRA2) subunit is found primarily in the forebrain and hippocampus, and is more confined to areas of the brain compared to other alpha subunits. GABRA2 increases the risk of anxiety, making it a target for treating behavioral disorders including alcohol dependence, and drug use. GABRA2 is a binding site for benzodiazepines (psychoactive drugs known to reduce anxiety), causing chloride channels to open, leading to the hyper-polarization of the membrane. Other anxiolytic drugs such as Diazepam bind this subunit to induce inhibitory effects. GABRA2 is associated with reward behavior when it activates the insula, the part of the cerebral cortex responsible for emotions. GABA alpha2 and/or alpha3 receptor subtypes are also involved in GABAergic modulation of prolactin secretion. — an NCBI CDD conserved domain (cd19035); members share this curated model.
