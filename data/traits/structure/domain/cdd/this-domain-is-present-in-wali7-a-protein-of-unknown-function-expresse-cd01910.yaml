identifier: CDD:cd01910
label: "This domain is present in Wali7, a protein of unknown function, expressed in wheat and induced by aluminum.  Wali7 has a single domain similar to the glutamine amidotransferase domain of glucosamine-fructose 6-phosphate synthase (GLMS or GFAT), glutamine phosphoribosylpyrophosphate (Prpp) amidotransferase (GPATase),  asparagine synthetase B (AsnB), beta lactam synthetase (beta-LS) and glutamate synthase (GltS).  The Wali7 domain is also somewhat similar to the Ntn hydrolase fold of the proteasomal alph and beta subunits."
definition: >-
  This domain is present in Wali7, a protein of unknown function, expressed in wheat and induced by aluminum. Wali7 has a single domain similar to the glutamine amidotransferase domain of glucosamine-fructose 6-phosphate synthase (GLMS or GFAT), glutamine phosphoribosylpyrophosphate (Prpp) amidotransferase (GPATase), asparagine synthetase B (AsnB), beta lactam synthetase (beta-LS) and glutamate synthase (GltS). The Wali7 domain is also somewhat similar to the Ntn hydrolase fold of the proteasomal alph and beta subunits. — an NCBI CDD conserved domain (cd01910); members share this curated model.
