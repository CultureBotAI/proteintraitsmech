identifier: CDD:cd23277
label: "MIR domain, beta-trefoil fold, found in the family of inositol 1,4,5-trisphosphate receptor (ITPR). Inositol 1,4,5 trisphosphate receptors (ITPRs) are a family of endoplasmic reticulum Ca2+ channels essential for the control of intracellular Ca2+ levels in virtually every mammalian cell type. Calcium-mediated signaling through ITPRs is essential for the regulation of numerous physiological processes, including fertilization, muscle contraction, apoptosis, secretion, and synaptic plasticity. The ITPR family includes three isoforms (ITPR1, ITPR2 and ITPR3), which can control different cellular processes due to their unique biophysical properties, subcellular localization, and tissue distribution. ITPRs contain an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in the family of inositol 1,4,5-trisphosphate receptor (ITPR). Inositol 1,4,5 trisphosphate receptors (ITPRs) are a family of endoplasmic reticulum Ca2+ channels essential for the control of intracellular Ca2+ levels in virtually every mammalian cell type. Calcium-mediated signaling through ITPRs is essential for the regulation of numerous physiological processes, including fertilization, muscle contraction, apoptosis, secretion, and synaptic plasticity. The ITPR family includes three isoforms (ITPR1, ITPR2 and ITPR3), which can control different cellular processes due to their unique biophysical properties, subcellular localization, and tissue distribution. ITPRs contain an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23277); members share this curated model.
