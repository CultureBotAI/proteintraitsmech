identifier: CDD:cd18456
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 17 (KLHL17). KLHL17, also termed actinfilin, is a substrate-recognition component of some cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complexes. It acts as a Cullin 3 (Cul3) substrate adaptor that links GluR6 to the E3 ubiquitin-ligase complex, and mediates the ubiquitination and subsequent degradation of GLUR6. It may play a role in the actin-based neuronal function."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 17 (KLHL17). KLHL17, also termed actinfilin, is a substrate-recognition component of some cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complexes. It acts as a Cullin 3 (Cul3) substrate adaptor that links GluR6 to the E3 ubiquitin-ligase complex, and mediates the ubiquitination and subsequent degradation of GLUR6. It may play a role in the actin-based neuronal function. — an NCBI CDD conserved domain (cd18456); members share this curated model.
