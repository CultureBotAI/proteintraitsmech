 three globular domains each of which contains a pair of EF-hand motifs. Human SCGN simultaneously binds four calcium ions through its EF-hands 3, 4, 5 and 6 in one high affinity and three low affinity calcium-binding sites. In contrast, SCGNs in other lower eukaryotes, such as D. rerio, X. laevis, M. domestica, G. gallus, O. anatinus, are fully competent in terms of six calcium-binding. — an NCBI CDD conserved domain (cd15902); members share this curated model.
