identifier: CDD:cd14201
label: "Catalytic domain of the Serine/Threonine kinase, Unc-51-like kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The ATG1/ULK complex is conserved from yeast to humans and it plays a critical role in the initiation of autophagy, the intracellular system that leads to the lysosomal degradation of cellular components and their recycling into basic metabolic units. ULK2 is ubiquitously expressed and is essential in autophagy induction. It displays partially redundant functions with ULK1 and is able to compensate for the loss of ULK1 in non-selective autophagy. It also displays neuron-specific functions and is important in axon development. The ULK2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Unc-51-like kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The ATG1/ULK complex is conserved from yeast to humans and it plays a critical role in the initiation of autophagy, the intracellular system that leads to the lysosomal degradation of cellular components and their recycling into basic metabolic units. ULK2 is ubiquitously expressed and is essential in autophagy induction. It displays partially redundant functions with ULK1 and is able to compensate for the loss of ULK1 in non-selective autophagy. It also displays neuron-specific functions and is important in axon development. The ULK2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14201); members share this curated model.
