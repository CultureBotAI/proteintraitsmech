identifier: CDD:cd22729
label: "forkhead associated (FHA) domain found in kinesin-like protein KIF13A. KIF13A, also called kinesin-like protein RBKIN, is a plus end-directed microtubule-dependent motor protein involved in intracellular transport and in regulating various processes such as mannose-6-phosphate receptor (M6PR) transport to the plasma membrane, endosomal sorting during melanosome biogenesis, and cytokinesis. It mediates the transport of M6PR-containing vesicles from trans-Golgi network to the plasma membrane via direct interaction with the AP-1 complex. During melanosome maturation, KIF13A is required for delivering melanogenic enzymes from recycling endosomes to nascent melanosomes by creating peripheral recycling endosomal subdomains in melanocytes. It is also required for the abscission step in cytokinesis: it mediates translocation of ZFYVE26, and possibly TTC19, to the midbody during cytokinesis. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in kinesin-like protein KIF13A. KIF13A, also called kinesin-like protein RBKIN, is a plus end-directed microtubule-dependent motor protein involved in intracellular transport and in regulating various processes such as mannose-6-phosphate receptor (M6PR) transport to the plasma membrane, endosomal sorting during melanosome biogenesis, and cytokinesis. It mediates the transport of M6PR-containing vesicles from trans-Golgi network to the plasma membrane via direct interaction with the AP-1 complex. During melanosome maturation, KIF13A is required for delivering melanogenic enzymes from recycling endosomes to nascent melanosomes by creating peripheral recycling endosomal subdomains in melanocytes. It is also required for the abscission step in cytokinesis: it mediates translocation of ZFYVE26, and possibly TTC19, to the midbody during cytokinesis. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22729); members share this curated model.
