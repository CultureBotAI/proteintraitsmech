identifier: CDD:cd21932
label: "second motif interacting with ubiquitin domain found in RING finger protein 168 and similar domains. The domain family includes motif interacting with ubiquitin (MIU) domains of RING finger protein, RNF168 and RNF169. RNF168 is an E3 ubiquitin-protein ligase that promotes noncanonical K27 ubiquitination to signal DNA damage. It, together with RNF8, functions as a DNA damage response (DDR) factor that promotes monoubiquitination of H2A/H2AX at K13/15, facilitates recruitment of repair factors p53-binding protein 1 (53BP1) or the RAP80-BRCA1 complex to sites of double-strand breaks (DSBs), and inhibits homologous recombination (HR) in cells deficient in the tumor suppressor BRCA1. RNF168 also promotes H2A neddylation, which antagonizes ubiquitylation of H2A and regulates DNA damage repair. RNF169 is an uncharacterized E3 ubiquitin-protein ligase paralogous to RNF168. It functions as a negative regulator of the DNA damage signaling cascade. RNF169 recognizes polyubiquitin structures but does not itself contribute to double-strand break (DSB)-induced chromatin ubiquitylation. It contributes to the regulation of the DSB repair pathway by competing with repair factors, 53BP1 and RAP80-BRCA1, for association with RNF168-modified chromatin, limiting the magnitude of the RNF8/RNF168-dependent signaling response to DSBs. RNF168 contains an N-terminal C3HC4-type RING-HC finger that catalyzes H2A-K15ub modification and interacts with H2A, and two MIU (motif interacting with ubiquitin) domains responsible for interaction with K63 linked poly-ubiquitin. RNF169 contains an N-terminal C3HC4-type RING-HC finger and a C-terminal MIU domain. This model corresponds to the second MIU (MIU2) domain of RNF168 and the C-terminal MIU domain of RNF169, which is responsible for bridging histone and ubiquitin surfaces."
definition: >-
  second motif interacting with ubiquitin domain found in RING finger protein 168 and similar domains. The domain family includes motif interacting with ubiquitin (MIU) domains of RING finger protein, RNF168 and RNF169. RNF168 is an E3 ubiquitin-protein ligase that promotes noncanonical K27 ubiquitination to signal DNA damage. It, together with RNF8, functions as a DNA damage response (DDR) factor that promotes monoubiquitination of H2A/H2AX at K13/15, facilitates recruitment of repair factors p53-binding protein 1 (53BP1) or the RAP80-BRCA1 complex to sites of double-strand breaks (DSBs), and inhibits homologous recombination (HR) in cells deficient in the tumor suppressor BRCA1. RNF168 also promotes H2A neddylation, which antagonizes ubiquitylation of H2A and regulates DNA damage repair. RNF169 is an uncharacterized E3 ubiquitin-protein ligase paralogous to RNF168. It functions as a negative regulator of the DNA damage signaling cascade. RNF169 recognizes polyubiquitin structures but does not itself contribute to double-strand break (DSB)-induced chromatin ubiquitylation. It contributes to the regulation of the DSB repair pathway by competing with repair factors, 53BP1 and RAP80-BRCA1, for association with RNF168-modified chromatin, limiting the magnitude of the RNF8/RNF168-dependent signaling response to DSBs. RNF168 contains an N-terminal C3HC4-type RING-HC finger that catalyzes H2A-K15ub modification and interacts with H2A, and two MIU (motif interacting with ubiquitin) domains responsible for interaction with K63 linked poly-ubiquitin. RNF169 contains an N-terminal C3HC4-type RING-HC finger and a C-terminal MIU domain. This model corresponds to the second MIU (MIU2) domain of RNF168 and the C-terminal MIU domain of RNF169, which is responsible for bridging histone and ubiquitin surfaces. — an NCBI CDD conserved domain (cd21932); members share this curated model.
