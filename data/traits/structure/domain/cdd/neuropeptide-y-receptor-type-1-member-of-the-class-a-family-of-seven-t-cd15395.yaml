identifier: CDD:cd15395
label: "neuropeptide Y receptor type 1, member of the class A family of seven-transmembrane G protein-coupled receptors. NPY is a 36-amino acid peptide neurotransmitter with a C-terminal tyrosine amide residue that is widely distributed in the brain and the autonomic nervous system of many mammalian species. NPY exerts its functions through five, G-protein coupled receptor subtypes including NPY1R, NPY2R, NPY4R, NPY5R, and NPY6R; however, NPY6R is not functional in humans. NYP receptors are also activated by its two other family members, peptide YY (PYY) and pancreatic polypeptide (PP). They typically couple to G(i) or G(o) proteins, which leads to a decrease in adenylate cyclase activity, thereby decreasing intracellular cAMP levels, and are involved in diverse physiological roles including appetite regulation, circadian rhythm, and anxiety. When NPY signals through NPY2R in concert with NPY5R, it induces angiogenesis and consequently plays an important role in revascularization and wound healing. On the other hand, when NPY acts through NPY1R and NPYR5, it acts as a vascular mitogen, leading to restenosis and atherosclerosis."
