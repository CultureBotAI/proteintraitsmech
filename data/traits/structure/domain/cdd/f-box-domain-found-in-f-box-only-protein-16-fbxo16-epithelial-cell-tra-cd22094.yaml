identifier: CDD:cd22094
label: "F-box domain found in F-box only protein 16 (FBXO16), epithelial cell-transforming sequence 2 oncogene-like (ECT2L) and similar proteins. This family includes FBXO16 and ECT2L. FBXO16, also called FBX16, is part of an SCF (SKP1-cullin-F-box) protein ligase complex. It probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It functions as a tumor suppressor by attenuating nuclear beta-catenin function. ECT2L, also called lung-specific F-box and DH domain-containing protein, or putative guanine nucleotide exchange factor LFDH, may act as a guanine nucleotide exchange factor (GEF). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 16 (FBXO16), epithelial cell-transforming sequence 2 oncogene-like (ECT2L) and similar proteins. This family includes FBXO16 and ECT2L. FBXO16, also called FBX16, is part of an SCF (SKP1-cullin-F-box) protein ligase complex. It probably recognizes and binds to some phosphorylated proteins and promotes their ubiquitination and degradation. It functions as a tumor suppressor by attenuating nuclear beta-catenin function. ECT2L, also called lung-specific F-box and DH domain-containing protein, or putative guanine nucleotide exchange factor LFDH, may act as a guanine nucleotide exchange factor (GEF). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22094); members share this curated model.
