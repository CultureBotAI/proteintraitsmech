identifier: CDD:cd21100
label: "C-terminal region of mitogen-inducible gene 6, activated CDC42 kinase 1, and related proteins; includes a region that may be involved in inhibition of epidermal growth factor receptor (EGFR). MIG6 (also known as ERBB receptor feedback inhibitor 1, ERRFI1, RALT receptor associated late transducer, RALT) is a feedback inhibitor of EGFR signaling in skin morphogenesis, it binds to EGFR at the activation interface of the kinase domain, locks it in an inactive configuration, thus preventing signal generation. MIG6 inhibits the signaling triggered by Hepatocyte growth factor (HGF), by indirectly binding to its tyrosine kinase receptor, HGFR, through the adaptor protein Grb2. ACK-1 is a nonreceptor tyrosine kinase implicated in cell survival, cell spreading and migration, cell growth and proliferation. As an oncogenic kinase it plays a regulatory role in the initiation and progression of tumors.  Grb2 mediates the interaction of ACK1 with a number of receptor tyrosine kinases, including EGFR. Upon EGF stimulation ACK1 interacts with EGFR. This model does not include the proline-rich region has been implicated in growth-factor-receptor-bound protein 2 (Gbr2) binding."
definition: >-
  C-terminal region of mitogen-inducible gene 6, activated CDC42 kinase 1, and related proteins; includes a region that may be involved in inhibition of epidermal growth factor receptor (EGFR). MIG6 (also known as ERBB receptor feedback inhibitor 1, ERRFI1, RALT receptor associated late transducer, RALT) is a feedback inhibitor of EGFR signaling in skin morphogenesis, it binds to EGFR at the activation interface of the kinase domain, locks it in an inactive configuration, thus preventing signal generation. MIG6 inhibits the signaling triggered by Hepatocyte growth factor (HGF), by indirectly binding to its tyrosine kinase receptor, HGFR, through the adaptor protein Grb2. ACK-1 is a nonreceptor tyrosine kinase implicated in cell survival, cell spreading and migration, cell growth and proliferation. As an oncogenic kinase it plays a regulatory role in the initiation and progression of tumors. Grb2 mediates the interaction of ACK1 with a number of receptor tyrosine kinases, including EGFR. Upon EGF stimulation ACK1 interacts with EGFR. This model does not include the proline-rich region has been implicated in growth-factor-receptor-bound protein 2 (Gbr2) binding. — an NCBI CDD conserved domain (cd21100); members share this curated model.
