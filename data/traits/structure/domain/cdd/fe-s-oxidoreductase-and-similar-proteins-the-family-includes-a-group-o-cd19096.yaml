identifier: CDD:cd19096
label: "Fe-S oxidoreductase and similar proteins. The family includes a group of uncharacterized Fe-S oxidoreductase that belongs to aldo-keto reductase (AKR) superfamily. Aldo-keto reductases (AKRs) are a superfamily of soluble NAD(P)(H) oxidoreductases whose chief purpose is to reduce aldehydes and ketones to primary and secondary alcohols. AKRs are present in all phyla and are of importance in both health and industrial applications."
definition: >-
  Fe-S oxidoreductase and similar proteins. The family includes a group of uncharacterized Fe-S oxidoreductase that belongs to aldo-keto reductase (AKR) superfamily. Aldo-keto reductases (AKRs) are a superfamily of soluble NAD(P)(H) oxidoreductases whose chief purpose is to reduce aldehydes and ketones to primary and secondary alcohols. AKRs are present in all phyla and are of importance in both health and industrial applications. — an NCBI CDD conserved domain (cd19096); members share this curated model.
