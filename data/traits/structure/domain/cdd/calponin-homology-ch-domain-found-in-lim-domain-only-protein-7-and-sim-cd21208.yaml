identifier: CDD:cd21208
label: "calponin homology (CH) domain found in LIM domain only protein 7 and similar proteins. This family includes LIM domain only protein 7 (LMO-7) and LIM and calponin homology domains-containing protein 1 (LIMCH1), and similar proteins. LMO-7, also called F-box only protein 20, or LOMP, is a transcription regulator for expression of many Emery-Dreifuss muscular dystrophy (EDMD)-relevant genes. It binds to alpha-actinin and AF6/afadin at adherens junctions for epithelial cell-cell adhesion. LIMCH1 acts as an actin stress fiber-associated protein that activates the non-muscle myosin IIa complex by promoting the phosphorylation of its regulatory subunit MRLC/MYL9. It positively regulates actin stress fiber assembly and stabilizes focal adhesions, and therefore negatively regulates cell spreading and cell migration. Members of this family contain a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  calponin homology (CH) domain found in LIM domain only protein 7 and similar proteins. This family includes LIM domain only protein 7 (LMO-7) and LIM and calponin homology domains-containing protein 1 (LIMCH1), and similar proteins. LMO-7, also called F-box only protein 20, or LOMP, is a transcription regulator for expression of many Emery-Dreifuss muscular dystrophy (EDMD)-relevant genes. It binds to alpha-actinin and AF6/afadin at adherens junctions for epithelial cell-cell adhesion. LIMCH1 acts as an actin stress fiber-associated protein that activates the non-muscle myosin IIa complex by promoting the phosphorylation of its regulatory subunit MRLC/MYL9. It positively regulates actin stress fiber assembly and stabilizes focal adhesions, and therefore negatively regulates cell spreading and cell migration. Members of this family contain a single copy of the CH domain at the N-terminus. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21208); members share this curated model.
