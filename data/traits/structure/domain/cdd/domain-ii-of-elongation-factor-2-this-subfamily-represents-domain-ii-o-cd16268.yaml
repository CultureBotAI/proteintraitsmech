identifier: CDD:cd16268
label: "Domain II of Elongation Factor 2. This subfamily represents domain II of elongation factor 2 (EF-2) found in eukaryotes and archaea. During the process of peptide synthesis and tRNA site changes, the ribosome is moved along the mRNA a distance equal to one codon with the addition of each amino acid. This translocation step is catalyzed by EF-2_GTP, which is hydrolyzed to provide the required energy. Thus, this action releases the uncharged tRNA from the P site and transfers the newly formed peptidyl-tRNA from the A site to the P site."
definition: >-
  Domain II of Elongation Factor 2. This subfamily represents domain II of elongation factor 2 (EF-2) found in eukaryotes and archaea. During the process of peptide synthesis and tRNA site changes, the ribosome is moved along the mRNA a distance equal to one codon with the addition of each amino acid. This translocation step is catalyzed by EF-2_GTP, which is hydrolyzed to provide the required energy. Thus, this action releases the uncharged tRNA from the P site and transfers the newly formed peptidyl-tRNA from the A site to the P site. — an NCBI CDD conserved domain (cd16268); members share this curated model.
