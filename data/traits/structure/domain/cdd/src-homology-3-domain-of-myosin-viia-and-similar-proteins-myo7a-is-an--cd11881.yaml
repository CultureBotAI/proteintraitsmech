identifier: CDD:cd11881
label: "Src Homology 3 domain of Myosin VIIa and similar proteins. Myo7A is an uncoventional myosin that is involved in organelle transport. It is required for sensory function in both Drosophila and mammals. Mutations in the Myo7A gene cause both syndromic deaf-blindness [Usher syndrome I (USH1)] and nonsyndromic (DFNB2 and DFNA11) deafness in humans. It contains an N-terminal motor domain, light chain-binding IQ motifs, a coiled-coil region for heavy chain dimerization, and a tail consisting of a pair of MyTH4-FERM tandems separated by a SH3 domain. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Myosin VIIa and similar proteins. Myo7A is an uncoventional myosin that is involved in organelle transport. It is required for sensory function in both Drosophila and mammals. Mutations in the Myo7A gene cause both syndromic deaf-blindness [Usher syndrome I (USH1)] and nonsyndromic (DFNB2 and DFNA11) deafness in humans. It contains an N-terminal motor domain, light chain-binding IQ motifs, a coiled-coil region for heavy chain dimerization, and a tail consisting of a pair of MyTH4-FERM tandems separated by a SH3 domain. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11881); members share this curated model.
