identifier: CDD:cd09884
label: "VapC-like PIN domain of human nonsense-mediated decay factor Smg5, and other similar eukaryotic homologs. Nonsense-mediated decay (NMD) factors, Smg5 and Smg6 are essential to the post-transcriptional regulatory pathway, NMD, which recognizes and rapidly degrades mRNAs containing premature translation termination codons. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases (also known as Flap endonuclease-1-like), PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. Point mutation studies of the conserved aspartate residues in the catalytic center of the Smg6 PIN domain revealed that Smg6 is the endonuclease involved in human NMD. However, Smg5 lacks several of these key catalytic residues and does not degrade single-stranded RNA, in vivo."
definition: >-
  VapC-like PIN domain of human nonsense-mediated decay factor Smg5, and other similar eukaryotic homologs. Nonsense-mediated decay (NMD) factors, Smg5 and Smg6 are essential to the post-transcriptional regulatory pathway, NMD, which recognizes and rapidly degrades mRNAs containing premature translation termination codons. The PIN (PilT N terminus) domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases (also known as Flap endonuclease-1-like), PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. Point mutation studies of the conserved aspartate residues in the catalytic center of the Smg6 PIN domain revealed that Smg6 is the endonuclease involved in human NMD. However, Smg5 lacks several of these key catalytic residues and does not degrade single-stranded RNA, in vivo. — an NCBI CDD conserved domain (cd09884); members share this curated model.
