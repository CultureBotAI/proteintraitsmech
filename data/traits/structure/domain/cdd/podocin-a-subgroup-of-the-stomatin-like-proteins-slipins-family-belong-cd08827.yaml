identifier: CDD:cd08827
label: "Podocin, a subgroup of the stomatin-like proteins (slipins) family; belonging to the SPFH (stomatin, prohibitin, flotillin, and HflK/C) superfamily. This model summarizes a subgroup of the stomatin-like protein family (SLPs or slipins) that is found in vertebrates. The conserved domain common to the SPFH superfamily has also been referred to as the Band 7 domain. Individual proteins of the SPFH superfamily may cluster to form membrane microdomains which may in turn recruit multiprotein complexes. Podocin is expressed in the kidney and mutations in the gene have been linked to familial idiopathic nephrotic syndrome. Podocin interacts with the TRP ion channel TRPV-6 and may function as a scaffolding protein in the organization of lipid-protein domains."
