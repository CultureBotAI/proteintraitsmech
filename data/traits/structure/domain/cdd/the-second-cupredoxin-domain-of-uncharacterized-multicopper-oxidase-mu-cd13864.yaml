identifier: CDD:cd13864
label: "The second cupredoxin domain of uncharacterized multicopper oxidase. Multicopper Oxidases (MCOs) are multi-domain enzymes that are able to couple oxidation of substrates with reduction of dioxygen to water. MCOs oxidize their substrate by accepting electrons at a mononuclear copper centre and transferring them to a trinuclear copper centre which binds a dioxygen. The dioxygen, following the transfer of four electrons, is reduced to two molecules of water. These MCOs are capable of oxidizing a vast range of substrates, varying from aromatic to inorganic compounds such as metals. This subfamily of MCOs is composed of three cupredoxin domains. The cupredoxin domain 1 of 3-domain MCOs contains part the trinuclear copper binding site, which is located at the interface of domains 1 and 3."
definition: >-
  The second cupredoxin domain of uncharacterized multicopper oxidase. Multicopper Oxidases (MCOs) are multi-domain enzymes that are able to couple oxidation of substrates with reduction of dioxygen to water. MCOs oxidize their substrate by accepting electrons at a mononuclear copper centre and transferring them to a trinuclear copper centre which binds a dioxygen. The dioxygen, following the transfer of four electrons, is reduced to two molecules of water. These MCOs are capable of oxidizing a vast range of substrates, varying from aromatic to inorganic compounds such as metals. This subfamily of MCOs is composed of three cupredoxin domains. The cupredoxin domain 1 of 3-domain MCOs contains part the trinuclear copper binding site, which is located at the interface of domains 1 and 3. — an NCBI CDD conserved domain (cd13864); members share this curated model.
