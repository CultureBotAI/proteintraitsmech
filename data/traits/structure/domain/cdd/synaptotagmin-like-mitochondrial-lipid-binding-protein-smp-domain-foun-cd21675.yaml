identifier: CDD:cd21675
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in testis-expressed protein 2 (TEX2) and similar proteins. testis-expressed protein 2 (TEX2), also called transmembrane protein 96 (TMEM96), is a transmembrane protein with uncharacterized biological function. Diseases associated with TEX2 include Wernicke-Korsakoff Syndrome. This model corresponds to the SMP domain of TEX2, which may be implicated in lipid transport."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in testis-expressed protein 2 (TEX2) and similar proteins. testis-expressed protein 2 (TEX2), also called transmembrane protein 96 (TMEM96), is a transmembrane protein with uncharacterized biological function. Diseases associated with TEX2 include Wernicke-Korsakoff Syndrome. This model corresponds to the SMP domain of TEX2, which may be implicated in lipid transport. — an NCBI CDD conserved domain (cd21675); members share this curated model.
