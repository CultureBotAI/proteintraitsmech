identifier: CDD:cd23432
label: "ricin B-type lectin domain, beta-trefoil fold, found in Clostridium perfringens GlcNac-alpha-1,4-Gal-releasing endo-beta-galactosidase (Endo-beta-Gal(GnGa)) and similar proteins. Endo-beta-Gal(GnGa) can release disaccharide GlcNAc-alpha-1,4Gal from O-glycans expressed in the gastric gland mucous cell-type mucin. It contains a C-terminal ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Clostridium perfringens GlcNac-alpha-1,4-Gal-releasing endo-beta-galactosidase (Endo-beta-Gal(GnGa)) and similar proteins. Endo-beta-Gal(GnGa) can release disaccharide GlcNAc-alpha-1,4Gal from O-glycans expressed in the gastric gland mucous cell-type mucin. It contains a C-terminal ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23432); members share this curated model.
