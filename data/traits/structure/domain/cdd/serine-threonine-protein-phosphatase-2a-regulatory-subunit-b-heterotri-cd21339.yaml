identifier: CDD:cd21339
label: "serine/threonine protein phosphatase 2A regulatory subunit B\". Heterotrimeric serine/threonine protein phosphatase 2A (PP2A) consists of scaffolding (A), catalytic (C), and variable (B, B', and B\") subunits. The variable subunits dictate subcellular localization and substrate specificity of the PP2A holoenzyme. This family includes PP2A regulatory B'' subunits alpha, beta and gamma, encoded by PPP2R3A, PPP2R3B and PPP2R3C, respectively. It also includes subunit delta encoded by PPP2R3D in mouse. These B-family regulatory subunits play various roles including regulation of cytoskeletal assembly, neuronal differentiation, mitogen-activated protein kinase signaling, and apoptosis. Subunits alpha and beta contain two-domain elongated structure with two calcium EF-hands which mediate Ca2+-dependent changes in phosphatase activity."
definition: >-
  serine/threonine protein phosphatase 2A regulatory subunit B". Heterotrimeric serine/threonine protein phosphatase 2A (PP2A) consists of scaffolding (A), catalytic (C), and variable (B, B', and B") subunits. The variable subunits dictate subcellular localization and substrate specificity of the PP2A holoenzyme. This family includes PP2A regulatory B'' subunits alpha, beta and gamma, encoded by PPP2R3A, PPP2R3B and PPP2R3C, respectively. It also includes subunit delta encoded by PPP2R3D in mouse. These B-family regulatory subunits play various roles including regulation of cytoskeletal assembly, neuronal differentiation, mitogen-activated protein kinase signaling, and apoptosis. Subunits alpha and beta contain two-domain elongated structure with two calcium EF-hands which mediate Ca2+-dependent changes in phosphatase activity. — an NCBI CDD conserved domain (cd21339); members share this curated model.
