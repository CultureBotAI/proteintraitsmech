identifier: CDD:cd24060
label: "nucleotide-binding domain (NBD) of bifunctional UDP-N-acetylglucosamine 2-epimerase/N-acetylmannosamine kinase (GNE) and similar proteins. GNE (EC 3.2.1.183/EC 2.7.1.60), also called UDP-GlcNAc-2-epimerase/ManAc kinase, is a bi-functional enzyme that plays a key role in sialic acid biosynthesis. It regulates and initiates biosynthesis of N-acetylneuraminic acid (NeuAc), a precursor of sialic acids. It plays an essential role in early development and required for normal sialylation in hematopoietic cells. Sialylation is implicated in cell adhesion, signal transduction, tumorigenicity and metastatic behavior of malignant cells. GNE is the only human protein that contains a kinase domain belonging to the ROK (repressor, ORF, kinase) family. Mutations of the GNE protein cause sialurea or autosomal recessive inclusion body myopathy/Nonaka myopathy."
definition: >-
  nucleotide-binding domain (NBD) of bifunctional UDP-N-acetylglucosamine 2-epimerase/N-acetylmannosamine kinase (GNE) and similar proteins. GNE (EC 3.2.1.183/EC 2.7.1.60), also called UDP-GlcNAc-2-epimerase/ManAc kinase, is a bi-functional enzyme that plays a key role in sialic acid biosynthesis. It regulates and initiates biosynthesis of N-acetylneuraminic acid (NeuAc), a precursor of sialic acids. It plays an essential role in early development and required for normal sialylation in hematopoietic cells. Sialylation is implicated in cell adhesion, signal transduction, tumorigenicity and metastatic behavior of malignant cells. GNE is the only human protein that contains a kinase domain belonging to the ROK (repressor, ORF, kinase) family. Mutations of the GNE protein cause sialurea or autosomal recessive inclusion body myopathy/Nonaka myopathy. — an NCBI CDD conserved domain (cd24060); members share this curated model.
