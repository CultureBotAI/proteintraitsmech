identifier: CDD:cd22633
label: "Kunitz-type actitoxins such as Anemonia viridis U-actitoxin-Avd3l, and similar proteins. This model includes the Kunitz-type actitoxins such as Anemonia viridis U-actitoxin-Avd3l (also called U-AITX-Avd3l or AsKC9), Anthopleura elegantissima KappaPI-actitoxin-Ael3a (also called KappaPI-AITX-Ael3a or Kunitz-type serine protease inhibitor APEKTx1) and Anthopleura aff. xanthogrammica PI-actitoxin-Axm2b (also called PI-AITX-Axm2b or Kunitz-type proteinase inhibitor AXPI-II). U-AITX-Avd3l and KappaPI-AITX-Ael3a are dual-function toxins that inhibit both the serine protease trypsin and voltage-gated potassium channels Kv1.2/KCNA2. These proteins are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type actitoxins such as Anemonia viridis U-actitoxin-Avd3l, and similar proteins. This model includes the Kunitz-type actitoxins such as Anemonia viridis U-actitoxin-Avd3l (also called U-AITX-Avd3l or AsKC9), Anthopleura elegantissima KappaPI-actitoxin-Ael3a (also called KappaPI-AITX-Ael3a or Kunitz-type serine protease inhibitor APEKTx1) and Anthopleura aff. xanthogrammica PI-actitoxin-Axm2b (also called PI-AITX-Axm2b or Kunitz-type proteinase inhibitor AXPI-II). U-AITX-Avd3l and KappaPI-AITX-Ael3a are dual-function toxins that inhibit both the serine protease trypsin and voltage-gated potassium channels Kv1.2/KCNA2. These proteins are similar to Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor) that shows an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22633); members share this curated model.
