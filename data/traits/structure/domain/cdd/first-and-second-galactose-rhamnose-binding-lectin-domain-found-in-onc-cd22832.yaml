identifier: CDD:cd22832
label: "first and second galactose/rhamnose binding lectin domain found in Oncorhynchus keta L-rhamnose-binding lectin CSL3 and similar proteins. The family includes a group of L-rhamnose-binding lectins, such as Oncorhynchus keta CSL1-3. CSL1 has hemagglutinating activity towards rabbit erythrocytes, but not human type B erythrocytes. CSL2 has hemagglutinating activity towards rabbit erythrocytes and human type B erythrocytes. CSL3 has hemagglutinating activity towards rabbit erythrocytes, human type A erythrocytes, human type B erythrocytes, human type O erythrocytes, and sheep erythrocytes. Their hemagglutinating activities are inhibited by smooth-type lipopolysaccharide (LPS) from different bacterial species. Members in this family contain two tandem galactose-binding lectin domains. This model corresponds to the first and second galactose/rhamnose-binding lectin domains found in Oncorhynchus keta CSL3, as well as the second galactose/rhamnose-binding lectin domain found in Oncorhynchus keta CSL2."
definition: >-
  first and second galactose/rhamnose binding lectin domain found in Oncorhynchus keta L-rhamnose-binding lectin CSL3 and similar proteins. The family includes a group of L-rhamnose-binding lectins, such as Oncorhynchus keta CSL1-3. CSL1 has hemagglutinating activity towards rabbit erythrocytes, but not human type B erythrocytes. CSL2 has hemagglutinating activity towards rabbit erythrocytes and human type B erythrocytes. CSL3 has hemagglutinating activity towards rabbit erythrocytes, human type A erythrocytes, human type B erythrocytes, human type O erythrocytes, and sheep erythrocytes. Their hemagglutinating activities are inhibited by smooth-type lipopolysaccharide (LPS) from different bacterial species. Members in this family contain two tandem galactose-binding lectin domains. This model corresponds to the first and second galactose/rhamnose-binding lectin domains found in Oncorhynchus keta CSL3, as well as the second galactose/rhamnose-binding lectin domain found in Oncorhynchus keta CSL2. — an NCBI CDD conserved domain (cd22832); members share this curated model.
