identifier: CDD:cd20888
label: "protein kinase C conserved region 1 (C1 domain) found in tensin-1 (TNS1) variant and similar proteins. Tensin-1 (TNS1) plays a role in fibrillar adhesion formation. It may be involved in cell migration, cartilage development and in linking signal transduction pathways to the cytoskeleton. This model corresponds to the C1 domain found in TNS1 variant. Typical TNS1 does not contain C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in tensin-1 (TNS1) variant and similar proteins. Tensin-1 (TNS1) plays a role in fibrillar adhesion formation. It may be involved in cell migration, cartilage development and in linking signal transduction pathways to the cytoskeleton. This model corresponds to the C1 domain found in TNS1 variant. Typical TNS1 does not contain C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20888); members share this curated model.
