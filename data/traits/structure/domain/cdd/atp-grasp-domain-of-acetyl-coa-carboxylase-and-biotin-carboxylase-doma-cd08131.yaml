identifier: CDD:cd08131
label: "ATP-grasp domain of acetyl CoA carboxylase and biotin carboxylase domain C. Acetyl-CoA carboxylase (ACC) catalyzes the carboxylation of acetyl CoA to malonyl CoA. Biotin carboxylase (BC, EC 6.3.4.14), a MgATP-dependent protein, forms one of the subunits of ACC. In eukaryotes ACCs are multidomain enzymes that contains three domains of each catalytic activity within a single polypeptide chain in order of biotin carboxylase  (BC), biotin carboxyl carrier protein (BCCP), and carboxyltransferase (CT) domains. BC domain interacts with BCCP to catalyze carboxybiotin via formation of carboxyphosphate intermediate. This reaction utilizes bicarbonate and ATP as substrate. The CT domain then transfers the carboxyl group from carboxybiotin to acetyl CoA to produce malonyl CoA. Soraphen A is found to inhibit ACC activity in yeast. Acc1 and Acc2 isozymes from humans belong to this family."
definition: >-
  ATP-grasp domain of acetyl CoA carboxylase and biotin carboxylase domain C. Acetyl-CoA carboxylase (ACC) catalyzes the carboxylation of acetyl CoA to malonyl CoA. Biotin carboxylase (BC, EC 6.3.4.14), a MgATP-dependent protein, forms one of the subunits of ACC. In eukaryotes ACCs are multidomain enzymes that contains three domains of each catalytic activity within a single polypeptide chain in order of biotin carboxylase (BC), biotin carboxyl carrier protein (BCCP), and carboxyltransferase (CT) domains. BC domain interacts with BCCP to catalyze carboxybiotin via formation of carboxyphosphate intermediate. This reaction utilizes bicarbonate and ATP as substrate. The CT domain then transfers the carboxyl group from carboxybiotin to acetyl CoA to produce malonyl CoA. Soraphen A is found to inhibit ACC activity in yeast. Acc1 and Acc2 isozymes from humans belong to this family. — an NCBI CDD conserved domain (cd08131); members share this curated model.
