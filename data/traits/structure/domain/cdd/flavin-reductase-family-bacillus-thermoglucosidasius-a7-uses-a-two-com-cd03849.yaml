identifier: CDD:cd03849
label: "Flavin reductase family.  Bacillus thermoglucosidasius A7 uses a two-component enzyme system  (phenol hydroxylase) to catabolise toxic phenol. The gene PheA2 encodes the smaller flavin reductase component which catalyzes the reduction of FAD using NADH as electron donor. The reduced FAD is then used by the larger oxygenase component to hydroxylate phenols to catechols. This domain contains a dual binding cleft for NADH and FAD substrate. This family presents in bacteria."
definition: >-
  Flavin reductase family. Bacillus thermoglucosidasius A7 uses a two-component enzyme system (phenol hydroxylase) to catabolise toxic phenol. The gene PheA2 encodes the smaller flavin reductase component which catalyzes the reduction of FAD using NADH as electron donor. The reduced FAD is then used by the larger oxygenase component to hydroxylate phenols to catechols. This domain contains a dual binding cleft for NADH and FAD substrate. This family presents in bacteria. — an NCBI CDD conserved domain (cd03849); members share this curated model.
