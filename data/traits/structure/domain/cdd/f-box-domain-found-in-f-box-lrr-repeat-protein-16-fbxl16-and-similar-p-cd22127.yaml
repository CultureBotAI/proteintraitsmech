identifier: CDD:cd22127
label: "F-box domain found in F-box/LRR-repeat protein 16 (FBXL16) and similar proteins. FBXL16, also called F-box and leucine-rich repeat protein 16, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It acts as a repressor of one of the earliest steps in the cardiogenic lineage: FLK1+ progenitor formation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 16 (FBXL16) and similar proteins. FBXL16, also called F-box and leucine-rich repeat protein 16, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It acts as a repressor of one of the earliest steps in the cardiogenic lineage: FLK1+ progenitor formation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22127); members share this curated model.
