identifier: CDD:cd05047
label: "Catalytic domain of Tie Protein Tyrosine Kinases. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Tie proteins, consisting of Tie1 and Tie2, are receptor PTKs (RTKs) containing an extracellular region, a transmembrane segment, and an intracellular catalytic domain. The extracellular region contains an immunoglobulin (Ig)-like domain, three epidermal growth factor (EGF)-like domains, a second Ig-like domain, and three fibronectin type III repeats. Tie receptors are specifically expressed in endothelial cells and hematopoietic stem cells. The angiopoietins (Ang-1 to Ang-4) serve as ligands for Tie2, while no specific ligand has been identified for Tie1. The binding of Ang-1 to Tie2 leads to receptor autophosphorylation and activation, promoting cell migration and survival. In contrast, Ang-2 binding to Tie2 does not result in the same response, suggesting that Ang-2 may function as an antagonist. In vivo studies of Tie1 show that it is critical in vascular development. The Tie subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Tie Protein Tyrosine Kinases. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Tie proteins, consisting of Tie1 and Tie2, are receptor PTKs (RTKs) containing an extracellular region, a transmembrane segment, and an intracellular catalytic domain. The extracellular region contains an immunoglobulin (Ig)-like domain, three epidermal growth factor (EGF)-like domains, a second Ig-like domain, and three fibronectin type III repeats. Tie receptors are specifically expressed in endothelial cells and hematopoietic stem cells. The angiopoietins (Ang-1 to Ang-4) serve as ligands for Tie2, while no specific ligand has been identified for Tie1. The binding of Ang-1 to Tie2 leads to receptor autophosphorylation and activation, promoting cell migration and survival. In contrast, Ang-2 binding to Tie2 does not result in the same response, suggesting that Ang-2 may function as an antagonist. In vivo studies of Tie1 show that it is critical in vascular development. The Tie subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05047); members share this curated model.
