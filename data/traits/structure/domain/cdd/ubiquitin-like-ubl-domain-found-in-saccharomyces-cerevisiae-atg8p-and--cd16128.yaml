identifier: CDD:cd16128
label: "ubiquitin-like (Ubl) domain found in Saccharomyces cerevisiae Atg8p and related proteins; sub-family of the autophagy-related 8 (ATG8) family. The ATG8 family of proteins constitutes a single member in Saccharomyces cerevisiae, Atg8p, and multiple homologs in higher eukaryotes. These proteins are multifunctional ubiquitin-like (Ubl) key regulators of autophagy. ATG8 is characterized by a C-terminal ubiquitin-like (Ubl) domain with a short N-terminal extension. The covalent attachment of ATG8 to phosphatidylethanolamine (PtdEth) at the autophagosomal membrane places it at a crucial juncture during autophagosome formation. ATG Ubl proteins such as Saccharomyces cerevisiae Atg8p undergo a unique Ubl conjugation, a process essential for autophagosome formation."
definition: >-
  ubiquitin-like (Ubl) domain found in Saccharomyces cerevisiae Atg8p and related proteins; sub-family of the autophagy-related 8 (ATG8) family. The ATG8 family of proteins constitutes a single member in Saccharomyces cerevisiae, Atg8p, and multiple homologs in higher eukaryotes. These proteins are multifunctional ubiquitin-like (Ubl) key regulators of autophagy. ATG8 is characterized by a C-terminal ubiquitin-like (Ubl) domain with a short N-terminal extension. The covalent attachment of ATG8 to phosphatidylethanolamine (PtdEth) at the autophagosomal membrane places it at a crucial juncture during autophagosome formation. ATG Ubl proteins such as Saccharomyces cerevisiae Atg8p undergo a unique Ubl conjugation, a process essential for autophagosome formation. — an NCBI CDD conserved domain (cd16128); members share this curated model.
