identifier: CDD:cd02497
label: "Cap-specific mRNA (nucleoside-2'-O-)-methyltransferase. Cap-specific mRNA (nucleoside-2'-O-)-methyltransferases methylate the ribose of the first or second nucleotide of a m(7)GpppG-capped mRNA to produce m(7)GpppNmp (cap1) or m(7)GpppRmpNm (cap2), both are important steps in the creation of stable and mature messenger RNA ."
definition: >-
