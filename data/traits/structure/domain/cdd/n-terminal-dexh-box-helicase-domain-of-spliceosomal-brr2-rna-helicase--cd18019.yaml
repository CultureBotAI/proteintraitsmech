identifier: CDD:cd18019
label: "N-terminal DEXH-box helicase domain of spliceosomal Brr2 RNA helicase. Brr2 is a type II DEAD box helicase that mediates spliceosome catalytic activation. It is a stable subunit of the spliceosome, required during splicing catalysis and spliceosome disassembly. Brr2 belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  N-terminal DEXH-box helicase domain of spliceosomal Brr2 RNA helicase. Brr2 is a type II DEAD box helicase that mediates spliceosome catalytic activation. It is a stable subunit of the spliceosome, required during splicing catalysis and spliceosome disassembly. Brr2 belongs to the type II DEAD box helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18019); members share this curated model.
