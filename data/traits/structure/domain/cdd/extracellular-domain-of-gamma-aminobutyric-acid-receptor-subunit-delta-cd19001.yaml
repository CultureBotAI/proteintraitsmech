identifier: CDD:cd19001
label: "extracellular domain of gamma-aminobutyric acid receptor subunit delta. This family contains extracellular domain of delta subunit of type-A gamma-aminobutyric acid receptor (GABAAR). GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. Receptors containing the delta subunit (GABRD) are expressed exclusively extra-synaptically (in the cortex, hippocampus, thalamus, striatum, and cerebellum) and mediate tonic inhibition. Studies suggest that delta subunits form heteropentamers in similar stoichiometry and arrangement as alpha/beta/gamma receptors, with the delta subunit replacing the gamma subunit (2alpha:2beta:1delta), although other stoichiometries have also been detected. The delta subunit is flexible in its positioning in the pentameric complex, producing receptors with diverse pharmacological properties. Mutations in GABRD have been associated with susceptibility to generalized epilepsy with febrile seizures, type 5. GABRD gene may also be associated with childhood-onset mood disorders."
definition: >-
  extracellular domain of gamma-aminobutyric acid receptor subunit delta. This family contains extracellular domain of delta subunit of type-A gamma-aminobutyric acid receptor (GABAAR). GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. Receptors containing the delta subunit (GABRD) are expressed exclusively extra-synaptically (in the cortex, hippocampus, thalamus, striatum, and cerebellum) and mediate tonic inhibition. Studies suggest that delta subunits form heteropentamers in similar stoichiometry and arrangement as alpha/beta/gamma receptors, with the delta subunit replacing the gamma subunit (2alpha:2beta:1delta), although other stoichiometries have also been detected. The delta subunit is flexible in its positioning in the pentameric complex, producing receptors with diverse pharmacological properties. Mutations in GABRD have been associated with susceptibility to generalized epilepsy with febrile seizures, type 5. GABRD gene may also be associated with childhood-onset mood disorders. — an NCBI CDD conserved domain (cd19001); members share this curated model.
