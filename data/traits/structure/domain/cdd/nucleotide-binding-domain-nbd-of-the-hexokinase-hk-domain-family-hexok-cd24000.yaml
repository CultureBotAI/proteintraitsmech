identifier: CDD:cd24000
label: "nucleotide-binding domain (NBD) of the hexokinase (HK) domain family. Hexokinase (EC 2.7.1.1) possesses the ability to transfer an inorganic phosphate group from ATP to a substrate. It catalyzes the ATP-dependent phosphorylation of aldo- and keto-hexose sugars to the hexose-6-phosphate (H6P). It can catalyze this reaction on glucose, fructose, sorbitol and glucosamine, and as such is the first step in a number of metabolic pathways. Hexokinase contains two structurally similar domains. Some members of the family have two copies of each of these domains. Hexokinases belong to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
