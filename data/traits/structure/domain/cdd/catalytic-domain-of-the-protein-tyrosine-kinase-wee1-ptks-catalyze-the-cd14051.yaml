identifier: CDD:cd14051
label: "Catalytic domain of the Protein Tyrosine Kinase, Wee1. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Wee1 is a nuclear cell cycle checkpoint kinase that helps keep the cyclin-dependent kinase CDK1 in an inactive state through phosphorylation of an N-terminal tyr (Y15) residue. During the late G2 phase, CDK1 is activated and mitotic entry is promoted by the removal of this inhibitory phosphorylation by the phosphatase Cdc25. Although Wee1 is functionally a tyr kinase, it is more closely related to serine/threonine kinases (STKs). It contains a catalytic kinase domain sandwiched in between N- and C-terminal regulatory domains. It is regulated by phosphorylation and degradation, and its expression levels are also controlled by circadian clock proteins. There are two distinct Wee1 proteins in vertebrates showing different expression patterns, called Wee1a and Wee1b. They are functionally dstinct and are implicated in different steps of egg maturation and embryo development. The Wee1 subfamily is part of a larger superfamily that includes the catalytic domains of STKs, other PTKs, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinase, Wee1. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Wee1 is a nuclear cell cycle checkpoint kinase that helps keep the cyclin-dependent kinase CDK1 in an inactive state through phosphorylation of an N-terminal tyr (Y15) residue. During the late G2 phase, CDK1 is activated and mitotic entry is promoted by the removal of this inhibitory phosphorylation by the phosphatase Cdc25. Although Wee1 is functionally a tyr kinase, it is more closely related to serine/threonine kinases (STKs). It contains a catalytic kinase domain sandwiched in between N- and C-terminal regulatory domains. It is regulated by phosphorylation and degradation, and its expression levels are also controlled by circadian clock proteins. There are two distinct Wee1 proteins in vertebrates showing different expression patterns, called Wee1a and Wee1b. They are functionally dstinct and are implicated in different steps of egg maturation and embryo development. The Wee1 subfamily is part of a larger superfamily that includes the catalytic domains of STKs, other PTKs, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14051); members share this curated model.
