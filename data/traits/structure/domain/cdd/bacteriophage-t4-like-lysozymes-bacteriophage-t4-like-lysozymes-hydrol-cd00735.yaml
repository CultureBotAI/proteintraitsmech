identifier: CDD:cd00735
label: "bacteriophage T4-like lysozymes. Bacteriophage T4-like lysozymes hydrolyze the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc) in peptidoglycan heteropolymers of prokaryotic cell walls. Members include a variety of bacteriophages (T4, RB49, RB69, Aeh1), as well as Dictyostelium."
definition: >-
