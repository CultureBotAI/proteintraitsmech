identifier: CDD:cd23819
label: "RWD domain of RWD domain-containing protein 3 (RWDD3) and related proteins. RWDD3, also called RWD domain-containing sumoylation enhancer (RSUME), acts as an enhancer of SUMO conjugation and has no effect on ubiquitination. It increases protein sumoylation (a dynamic ubiquitin-like post translational modification) of several proteins including HIF1alpha and I-kappa-B, through direct interaction with UBC9. Its RWD domain is required for the sumoylation enhancement activity."
definition: >-
  RWD domain of RWD domain-containing protein 3 (RWDD3) and related proteins. RWDD3, also called RWD domain-containing sumoylation enhancer (RSUME), acts as an enhancer of SUMO conjugation and has no effect on ubiquitination. It increases protein sumoylation (a dynamic ubiquitin-like post translational modification) of several proteins including HIF1alpha and I-kappa-B, through direct interaction with UBC9. Its RWD domain is required for the sumoylation enhancement activity. — an NCBI CDD conserved domain (cd23819); members share this curated model.
