identifier: CDD:cd11310
label: "14-3-3 protein domain. This 14-3-3 domain family includes proteins in Caenorhabditis elegans, the silkworm (Bombyx mori) as well as barley (Hordeum vulgare). In C. elegans, 14-3-3 proteins are SIR-2.1 binding partners which induce transcriptional activation of DAF-16 during stress and are required for the life-span extension conferred by extra copies of sir-2.1. In B. mori, the 14-3-3 proteins are expressed widely in larval and adult tissues, including the brain, fat body, Malpighian tube, silk gland, midgut, testis, ovary, antenna, and pheromone gland, and interact with the N-terminal fragment of Hsp60, suggesting that 14-3-3 (a molecular adaptor) and Hsp60 (a molecular chaperone) work together to achieve a wide range of cellular functions in B. mori. In barley aleurone cells, 14-3-3 proteins and members of the ABF transcription factor family have a regulatory function in the gibberellic acid (GA) pathway since the balance of GA and abscisic acid (ABA) is a determining factor during transition of embryogenesis and seed germination. 14-3-3 is an essential part of 14-3-3 proteins, a ubiquitous class of regulatory, phosphoserine/threonine-binding proteins found in all eukaryotic cells, including yeast, protozoa and mammalian cells."
definition: >-
  14-3-3 protein domain. This 14-3-3 domain family includes proteins in Caenorhabditis elegans, the silkworm (Bombyx mori) as well as barley (Hordeum vulgare). In C. elegans, 14-3-3 proteins are SIR-2.1 binding partners which induce transcriptional activation of DAF-16 during stress and are required for the life-span extension conferred by extra copies of sir-2.1. In B. mori, the 14-3-3 proteins are expressed widely in larval and adult tissues, including the brain, fat body, Malpighian tube, silk gland, midgut, testis, ovary, antenna, and pheromone gland, and interact with the N-terminal fragment of Hsp60, suggesting that 14-3-3 (a molecular adaptor) and Hsp60 (a molecular chaperone) work together to achieve a wide range of cellular functions in B. mori. In barley aleurone cells, 14-3-3 proteins and members of the ABF transcription factor family have a regulatory function in the gibberellic acid (GA) pathway since the balance of GA and abscisic acid (ABA) is a determining factor during transition of embryogenesis and seed germination. 14-3-3 is an essential part of 14-3-3 proteins, a ubiquitous class of regulatory, phosphoserine/threonine-binding proteins found in all eukaryotic cells, including yeast, protozoa and mammalian cells. — an NCBI CDD conserved domain (cd11310); members share this curated model.
