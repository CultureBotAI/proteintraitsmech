identifier: CDD:cd10469
label: "C-terminal putative kinase domain of FAM20A. Human FAM20A may play a fundamental role in enamel development and gingival homeostasis as mutations in FAM20A may underlie the pathogenesis of the autosomal recessive Amelogenesis imperfecta (AI) and Gingival Hyperplasia Syndrome. It is expressed in ameloblasts and gingivae. AI refers to a heterogeneous group of disorders of biomineralization caused by a lack of normal enamel formation. Mouse FAM20A is a secreted protein and the gene encoding it is differentially expressed in hematopoietic cells undergoing myeloid differentiation. This protein has also been associated with growth disorder in mice. The C-terminal domain of FAM20A is a putative kinase domain, based on mutagenesis of the C-terminal domain of Drosophila Four-Jointed, a related Golgi kinase. This subfamily belongs to the FAM20_C (also known as DUF1193) domain family."
definition: >-
