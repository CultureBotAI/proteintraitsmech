label: "dynein light chain (DLC)-like domain found in topoisomerase I damage affected protein 2 (TDA2) and similar proteins. Topoisomerase I damage affected protein 2 (TDA2) is a novel protein of the endocytic machinery necessary for normal internalization of native cargo in yeast. It works independently of the dynein motor complex and microtubules. The model corresponds to the dynein light chain (DLC)-like domain of TDA2."
definition: >-
  dynein light chain (DLC)-like domain found in topoisomerase I damage affected protein 2 (TDA2) and similar proteins. Topoisomerase I damage affected protein 2 (TDA2) is a novel protein of the endocytic machinery necessary for normal internalization of native cargo in yeast. It works independently of the dynein motor complex and microtubules. The model corresponds to the dynein light chain (DLC)-like domain of TDA2. — an NCBI CDD conserved domain (cd21457); members share this curated model.
