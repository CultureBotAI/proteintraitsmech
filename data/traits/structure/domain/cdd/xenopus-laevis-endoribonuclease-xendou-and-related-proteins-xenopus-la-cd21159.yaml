identifier: CDD:cd21159
label: "Xenopus laevis endoribonuclease XendoU, and related proteins. Xenopus laevis XendoU is a uridylate-specific endoribonuclease, which releases a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. XendoU is a monomer and requires Mn2+.  It is involved in the processing of intron-encoded box C/D U16 small, nucleolar RNA. XendoU is distantly related to the Nidovirus uridylate-specific endoribonucleases (NendoUs) which include Nonstructural protein 15 (Nsp15) from coronaviruses, Nsp11 from arteriviruses, and torovirus endoribonuclease."
definition: >-
  Xenopus laevis endoribonuclease XendoU, and related proteins. Xenopus laevis XendoU is a uridylate-specific endoribonuclease, which releases a cleavage product containing a 2',3'-cyclic phosphate at the 3' terminal end. XendoU is a monomer and requires Mn2+. It is involved in the processing of intron-encoded box C/D U16 small, nucleolar RNA. XendoU is distantly related to the Nidovirus uridylate-specific endoribonucleases (NendoUs) which include Nonstructural protein 15 (Nsp15) from coronaviruses, Nsp11 from arteriviruses, and torovirus endoribonuclease. — an NCBI CDD conserved domain (cd21159); members share this curated model.
