identifier: CDD:cd23464
label: "ricin B-type lectin domain, beta-trefoil fold, found in beta/gamma crystallin domain-containing protein 1 (CRYBG1) and similar proteins. CRYBG1, also called absent in melanoma 1 protein (AIM1), may function as a suppressor of malignant melanoma. It may exert its effects through interactions with the cytoskeleton. CRYBG1 belongs to the beta/gamma-crystallin family. It contains a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in beta/gamma crystallin domain-containing protein 1 (CRYBG1) and similar proteins. CRYBG1, also called absent in melanoma 1 protein (AIM1), may function as a suppressor of malignant melanoma. It may exert its effects through interactions with the cytoskeleton. CRYBG1 belongs to the beta/gamma-crystallin family. It contains a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23464); members share this curated model.
