identifier: CDD:cd24021
label: "nucleotide-binding domain (NBD) of Staphylococcus aureus pSK41 actin-like ParM protein and similar proteins from the ParM domain family. Type II plasmid partition systems utilize ParM NTPases in coordination with a centromere-binding protein called ParR to mediate accurate DNA segregation, a process critical for plasmid retention. The family corresponds to a group of uncharacterized proteins similar to Staphylococcus aureus pSK41 actin-like ParM protein, which is functionally homologous to R1 ParM, a known actin homologue, suggesting that it may also form filaments to drive partition. However, pSK41 ParM shows the strongest structural homology to the archaeal actin-like protein Thermoplasma acidophilum Ta0583, but not R1 ParM."
definition: >-
  nucleotide-binding domain (NBD) of Staphylococcus aureus pSK41 actin-like ParM protein and similar proteins from the ParM domain family. Type II plasmid partition systems utilize ParM NTPases in coordination with a centromere-binding protein called ParR to mediate accurate DNA segregation, a process critical for plasmid retention. The family corresponds to a group of uncharacterized proteins similar to Staphylococcus aureus pSK41 actin-like ParM protein, which is functionally homologous to R1 ParM, a known actin homologue, suggesting that it may also form filaments to drive partition. However, pSK41 ParM shows the strongest structural homology to the archaeal actin-like protein Thermoplasma acidophilum Ta0583, but not R1 ParM. — an NCBI CDD conserved domain (cd24021); members share this curated model.
