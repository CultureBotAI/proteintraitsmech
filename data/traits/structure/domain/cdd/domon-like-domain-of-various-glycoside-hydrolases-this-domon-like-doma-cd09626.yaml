identifier: CDD:cd09626
label: "DOMON-like domain of various glycoside hydrolases. This DOMON-like domain is found at the C-terminus of various bacterial proteins that play roles in metabolizing carbohydrates, such as glucodextranase (hydrolyzes alpha-1,6-glucosidic linkages of dextran from the non-reducing end), glucan alpha-1,4-glucosidase, pullulanase (degrades pullulan, a polysaccharide built from maltotriose units), arabinogalactan endo-1,4-beta-galactosidase, and others. Consequently, the DOMON-like domains in this family co-occur with catalytic domains from various glycosyl hydrolase families. The precise function of the DOMON domains in these proteins is not clear, they may be involved in interactions with carbohydrates."
definition: >-
  DOMON-like domain of various glycoside hydrolases. This DOMON-like domain is found at the C-terminus of various bacterial proteins that play roles in metabolizing carbohydrates, such as glucodextranase (hydrolyzes alpha-1,6-glucosidic linkages of dextran from the non-reducing end), glucan alpha-1,4-glucosidase, pullulanase (degrades pullulan, a polysaccharide built from maltotriose units), arabinogalactan endo-1,4-beta-galactosidase, and others. Consequently, the DOMON-like domains in this family co-occur with catalytic domains from various glycosyl hydrolase families. The precise function of the DOMON domains in these proteins is not clear, they may be involved in interactions with carbohydrates. — an NCBI CDD conserved domain (cd09626); members share this curated model.
