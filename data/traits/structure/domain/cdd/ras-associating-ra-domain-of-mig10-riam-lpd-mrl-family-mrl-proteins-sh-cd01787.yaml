identifier: CDD:cd01787
label: "Ras-associating (RA) domain of Mig10/RIAM/Lpd (MRL) family. MRL proteins share a common structural architecture, including a central structural unit consisting of a Ras-associating (RA) domain and a pleckstrin homology (PH) domain, an upstream coiled-coil region, and a number of polyproline motifs. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. RA and PH form a tandem domain pair (RA-PH), and serve tightly coordinated functions in both Ras GTPase signaling via the RA domain and membrane translocalization via the PH domain. MRL proteins have distinct functions in cell migration and adhesion, signaling, and in cell growth."
definition: >-
  Ras-associating (RA) domain of Mig10/RIAM/Lpd (MRL) family. MRL proteins share a common structural architecture, including a central structural unit consisting of a Ras-associating (RA) domain and a pleckstrin homology (PH) domain, an upstream coiled-coil region, and a number of polyproline motifs. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. RA and PH form a tandem domain pair (RA-PH), and serve tightly coordinated functions in both Ras GTPase signaling via the RA domain and membrane translocalization via the PH domain. MRL proteins have distinct functions in cell migration and adhesion, signaling, and in cell growth. — an NCBI CDD conserved domain (cd01787); members share this curated model.
