identifier: CDD:cd16044
label: "Tumor necrosis factor superfamily 1 (TNFSF1), also known as TNF-beta or lymphotoxin alpha. This family contains TNFSF1 (also known as TNF-beta or lymphotoxin-alpha or LTA, LT), a pro-inflammatory cytokine produced by lymphocytes. TNFSF1/LTA plays an important role in the inflammatory and immunologic response. It is released as a homotrimer to bind to one of two receptors, TNFR1 (also known as TNFRSF1A) or TNFR2 (also known as TNFRSF1B). LTA also exist as a heterotrimer with TNFSF3 (also known as lymphotoxin-beta or LTB) on the cell surface (major form LTA1B2, minor form LTA2B1) and signals through the TNFRSF3 (also known as lymphotoxin-beta receptor or LTbetaR). The three receptor-binding interfaces of LTA1B2 induces dimerization trigger signaling through LTbetaR resulting in lymphoid organogenesis and propagation of inflammatory signals. LTA is a product of stimulated T cells and can help communicate lymphocytes and stromal cells and subsequently eliciting cytotoxic effects on cancer cells. Numerous studies have shown LTA polymorphisms as risk factors for cancers; LTA 252 A>G polymorphism is associated with SLE susceptibility in Asians and also a risk factor for non-Hodgkin lymphoma. Idiopathic achalasia, a rare motor disorder of the oesophagus characterized by neuronal loss at the lower oesophageal sphincter, is implicated by SNP rs1799724 at the LTA/TNFalpha locus."
definition: >-
  Tumor necrosis factor superfamily 1 (TNFSF1), also known as TNF-beta or lymphotoxin alpha. This family contains TNFSF1 (also known as TNF-beta or lymphotoxin-alpha or LTA, LT), a pro-inflammatory cytokine produced by lymphocytes. TNFSF1/LTA plays an important role in the inflammatory and immunologic response. It is released as a homotrimer to bind to one of two receptors, TNFR1 (also known as TNFRSF1A) or TNFR2 (also known as TNFRSF1B). LTA also exist as a heterotrimer with TNFSF3 (also known as lymphotoxin-beta or LTB) on the cell surface (major form LTA1B2, minor form LTA2B1) and signals through the TNFRSF3 (also known as lymphotoxin-beta receptor or LTbetaR). The three receptor-binding interfaces of LTA1B2 induces dimerization trigger signaling through LTbetaR resulting in lymphoid organogenesis and propagation of inflammatory signals. LTA is a product of stimulated T cells and can help communicate lymphocytes and stromal cells and subsequently eliciting cytotoxic effects on cancer cells. Numerous studies have shown LTA polymorphisms as risk factors for cancers; LTA 252 A>G polymorphism is associated with SLE susceptibility in Asians and also a risk factor for non-Hodgkin lymphoma. Idiopathic achalasia, a rare motor disorder of the oesophagus characterized by neuronal loss at the lower oesophageal sphincter, is implicated by SNP rs1799724 at the LTA/TNFalpha locus. — an NCBI CDD conserved domain (cd16044); members share this curated model.
