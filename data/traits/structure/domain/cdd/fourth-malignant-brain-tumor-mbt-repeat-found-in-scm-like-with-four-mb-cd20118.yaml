identifier: CDD:cd20118
label: "fourth malignant brain tumor (MBT) repeat found in Scm-like with four MBT domains protein 2 (SFMBT2). SFMBT2, also called Scm-like with 4 MBT domains protein 2, is a transcriptional repressor of the HOXB13 gene. It is required for trophoblast maintenance and placenta development. It also negatively regulates cell migration and invasion in prostate cancer cells. SFMBT2 contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the fourth MBT repeat that does not contain a semi-aromatic cage and may not bind methylated lysine residues."
definition: >-
  fourth malignant brain tumor (MBT) repeat found in Scm-like with four MBT domains protein 2 (SFMBT2). SFMBT2, also called Scm-like with 4 MBT domains protein 2, is a transcriptional repressor of the HOXB13 gene. It is required for trophoblast maintenance and placenta development. It also negatively regulates cell migration and invasion in prostate cancer cells. SFMBT2 contains four MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the fourth MBT repeat that does not contain a semi-aromatic cage and may not bind methylated lysine residues. — an NCBI CDD conserved domain (cd20118); members share this curated model.
