identifier: CDD:cd21462
label: "dynein light chain (DLC)-like domain found in dynein light chain Tctex-type 1 (DYNLT1) and similar proteins. Dynein light chain Tctex-type 1 (DYNLT1), also called TCTEL1, or TCTEX1, or protein CW-1, or T-complex testis-specific protein 1 homolog, is a non-catalytic accessory component of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. It plays a role in neuronal morphogenesis. It is involved in intracellular targeting of D-type retrovirus gag polyproteins to the cytoplasmic assembly site. The model corresponds to the dynein light chain (DLC)-like domain of DYNLT1."
definition: >-
  dynein light chain (DLC)-like domain found in dynein light chain Tctex-type 1 (DYNLT1) and similar proteins. Dynein light chain Tctex-type 1 (DYNLT1), also called TCTEL1, or TCTEX1, or protein CW-1, or T-complex testis-specific protein 1 homolog, is a non-catalytic accessory component of the cytoplasmic dynein 1 complex that are thought to be involved in linking dynein to cargos and to adapter proteins that regulate dynein function. It plays a role in neuronal morphogenesis. It is involved in intracellular targeting of D-type retrovirus gag polyproteins to the cytoplasmic assembly site. The model corresponds to the dynein light chain (DLC)-like domain of DYNLT1. — an NCBI CDD conserved domain (cd21462); members share this curated model.
