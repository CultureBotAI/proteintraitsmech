identifier: CDD:sd00038
label: "Kelch repeat. Kelch repeats are 44 to 56 amino acids in length and form a four-stranded beta-sheet corresponding to a single blade of five to seven bladed beta propellers. The Kelch superfamily is a large evolutionary conserved protein family whose members are present throughout the cell and extracellularly, and have diverse activities. Kelch repeats are often in combination with other domains, like BTB and BACK or F-box domains."
definition: >-
  Kelch repeat. Kelch repeats are 44 to 56 amino acids in length and form a four-stranded beta-sheet corresponding to a single blade of five to seven bladed beta propellers. The Kelch superfamily is a large evolutionary conserved protein family whose members are present throughout the cell and extracellularly, and have diverse activities. Kelch repeats are often in combination with other domains, like BTB and BACK or F-box domains. — an NCBI CDD conserved domain (sd00038); members share this curated model.
