identifier: CDD:cd16038
label: "GPCR-Autoproteolysis INducing (GAIN) domain. The GPCR-autoproteolysis inducing domain (GAIN) is both necessary and sufficient for autoproteolysis of cell adhesion G protein-coupled receptors and polycystic kidney disease proteins. It includes the C-terminal GPCR proteolysis site (GPS, a motif of about 40 amino acids length). The larger body of the domain has previously been assigned the designation DUF3497. GAIN forms a large extracellular globular domain and is evolutionarily conserved in eukaryotes."
definition: >-
  GPCR-Autoproteolysis INducing (GAIN) domain. The GPCR-autoproteolysis inducing domain (GAIN) is both necessary and sufficient for autoproteolysis of cell adhesion G protein-coupled receptors and polycystic kidney disease proteins. It includes the C-terminal GPCR proteolysis site (GPS, a motif of about 40 amino acids length). The larger body of the domain has previously been assigned the designation DUF3497. GAIN forms a large extracellular globular domain and is evolutionarily conserved in eukaryotes. — an NCBI CDD conserved domain (cd16038); members share this curated model.
