identifier: CDD:cd13089
label: "Thrombospondin N (TSPN)-like domain of collagen XV;. Collagen XV is a rare large non-fibrillar collagen that plays a structural role in skeletal muscle and capillaries. Its triple-helical collagenous domain , characterized by Gly-X-Y triplet repeats, shows several interruptions and seems to be heavily post-translationally modified. Collagen XV contains an N-terminal TSPN-like domain and a C-terminal domain, homologous to the endostatin domain of collagen XVIII. Recent studies indicate that collagen XV adapts unusual knotted/pretzel-like structures. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Thrombospondin N (TSPN)-like domain of collagen XV;. Collagen XV is a rare large non-fibrillar collagen that plays a structural role in skeletal muscle and capillaries. Its triple-helical collagenous domain , characterized by Gly-X-Y triplet repeats, shows several interruptions and seems to be heavily post-translationally modified. Collagen XV contains an N-terminal TSPN-like domain and a C-terminal domain, homologous to the endostatin domain of collagen XVIII. Recent studies indicate that collagen XV adapts unusual knotted/pretzel-like structures. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13089); members share this curated model.
