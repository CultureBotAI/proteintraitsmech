identifier: CDD:cd05033
label: "Catalytic domain of Ephrin Receptor Protein Tyrosine Kinases. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. EphRs comprise the largest subfamily of receptor PTKs (RTKs). They can be classified into two classes (EphA and EphB), according to their extracellular sequences, which largely correspond to binding preferences for either GPI-anchored ephrin-A ligands or transmembrane ephrin-B ligands. Vertebrates have ten EphA and six EphB receptors, which display promiscuous ligand interactions within each class. EphRs contain an ephrin binding domain and two fibronectin repeats extracellularly, a transmembrane segment, and a cytoplasmic tyr kinase domain. Binding of the ephrin ligand to EphR requires cell-cell contact since both are anchored to the plasma membrane. This allows ephrin/EphR dimers to form, leading to the activation of the intracellular tyr kinase domain. The resulting downstream signals occur bidirectionally in both EphR-expressing cells (forward signaling) and ephrin-expressing cells (reverse signaling). The main effect of ephrin/EphR interaction is cell-cell repulsion or adhesion. Ephrin/EphR signaling is important in neural development and plasticity, cell morphogenesis and proliferation, cell-fate determination, embryonic development, tissue patterning, and angiogenesis.The EphR subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Ephrin Receptor Protein Tyrosine Kinases. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. EphRs comprise the largest subfamily of receptor PTKs (RTKs). They can be classified into two classes (EphA and EphB), according to their extracellular sequences, which largely correspond to binding preferences for either GPI-anchored ephrin-A ligands or transmembrane ephrin-B ligands. Vertebrates have ten EphA and six EphB receptors, which display promiscuous ligand interactions within each class. EphRs contain an ephrin binding domain and two fibronectin repeats extracellularly, a transmembrane segment, and a cytoplasmic tyr kinase domain. Binding of the ephrin ligand to EphR requires cell-cell contact since both are anchored to the plasma membrane. This allows ephrin/EphR dimers to form, leading to the activation of the intracellular tyr kinase domain. The resulting downstream signals occur bidirectionally in both EphR-expressing cells (forward signaling) and ephrin-expressing cells (reverse signaling). The main effect of ephrin/EphR interaction is cell-cell repulsion or adhesion. Ephrin/EphR signaling is important in neural development and plasticity, cell morphogenesis and proliferation, cell-fate determination, embryonic development, tissue patterning, and angiogenesis.The EphR subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05033); members share this curated model.
