identifier: CDD:cd11556
label: "uncharacterized subgroup of the SERT-like Na(+)- and Cl(-)-dependent monoamine transporter subfamily; solute binding domain. SERT-like Na(+)- and Cl(-)-dependent monoamine transporters, transport monoamine neurotransmitters from synaptic spaces into presynaptic neurons. Members include: the norepinephrine transporter NET, the serotonin transporter SERT , and the dopamine transporter DAT1. These latter may play a role in diseases or disorders including depression, anxiety disorders, and attention-deficit hyperactivity disorder, and in the control of human behavior and emotional states. They belongs to the solute carrier 6 (SLC6) transporter family. Members of this subgroup are uncharacterized."
definition: >-
