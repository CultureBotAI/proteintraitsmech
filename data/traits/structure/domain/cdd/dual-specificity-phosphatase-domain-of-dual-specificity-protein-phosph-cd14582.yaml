identifier: CDD:cd14582
label: "dual specificity phosphatase domain of dual specificity protein phosphatase 15. Dual specificity protein phosphatase 15 (DUSP15), also called Vaccinia virus VH1-related dual-specific protein phosphatase Y (VHY) or VH1-related member Y, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). DUSP15 is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. It is highly expressed in the testis and is located in the plasma membrane in a myristoylation-dependent manner. It may be involved in the regulation of meiotic signal transduction in testis cells. It is also expressed in the brain and has been identified as a regulator of oligodendrocyte differentiation. DUSP15 contains an N-terminal catalytic dual specificity phosphatase domain and a short C-terminal tail."
definition: >-
  dual specificity phosphatase domain of dual specificity protein phosphatase 15. Dual specificity protein phosphatase 15 (DUSP15), also called Vaccinia virus VH1-related dual-specific protein phosphatase Y (VHY) or VH1-related member Y, functions as a protein-serine/threonine phosphatase (EC 3.1.3.16) and a protein-tyrosine-phosphatase (EC 3.1.3.48). DUSP15 is an atypical DUSP; it contains the catalytic dual specificity phosphatase domain but lacks the N-terminal Cdc25/rhodanese-like domain that is present in typical DUSPs or MKPs. It is highly expressed in the testis and is located in the plasma membrane in a myristoylation-dependent manner. It may be involved in the regulation of meiotic signal transduction in testis cells. It is also expressed in the brain and has been identified as a regulator of oligodendrocyte differentiation. DUSP15 contains an N-terminal catalytic dual specificity phosphatase domain and a short C-terminal tail. — an NCBI CDD conserved domain (cd14582); members share this curated model.
