identifier: CDD:cd20570
label: "second cyclin box found in G2/mitotic-specific cyclin-B2 (CCNB2) and similar proteins. CCNB2 is essential for the control of the cell cycle at the G2/M (mitosis) transition. It is required for progression through meiosis. CCNB2 contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in G2/mitotic-specific cyclin-B2 (CCNB2) and similar proteins. CCNB2 is essential for the control of the cell cycle at the G2/M (mitosis) transition. It is required for progression through meiosis. CCNB2 contains two cyclin boxes. This model corresponds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20570); members share this curated model.
