identifier: CDD:cd16507
label: "RING finger, HC subclass, found in Dictyostelium discoideum Ras guanine nucleotide exchange factor O (RasGEFO) and similar proteins. RasGEFO, also known as RasGEF domain-containing protein O, functions as a Ras guanine-nucleotide exchange factor (RasGEFs), activating Ras by catalyzing the replacement of GDP with GTP. RasGEFs are particularly important for signaling in development and chemotaxis in many organisms, including Dictyostelium. RasGEFO contains a C3HC4-type RING-HC finger that may be responsible for E3 ubiquitin ligase activity."
definition: >-
  RING finger, HC subclass, found in Dictyostelium discoideum Ras guanine nucleotide exchange factor O (RasGEFO) and similar proteins. RasGEFO, also known as RasGEF domain-containing protein O, functions as a Ras guanine-nucleotide exchange factor (RasGEFs), activating Ras by catalyzing the replacement of GDP with GTP. RasGEFs are particularly important for signaling in development and chemotaxis in many organisms, including Dictyostelium. RasGEFO contains a C3HC4-type RING-HC finger that may be responsible for E3 ubiquitin ligase activity. — an NCBI CDD conserved domain (cd16507); members share this curated model.
