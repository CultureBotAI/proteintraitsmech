identifier: CDD:cd12950
label: "RRP7 domain ribosomal RNA-processing protein 7 (Rrp7p) and similar proteins. This CD corresponds to the RRP7 domain of Rrp7p. Rrp7p is encoded by YCL031C gene from Saccharomyces cerevisiae. It is an essential yeast protein involved in pre-rRNA processing and ribosome assembly. Rrp7p contains an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal RRP7 domain."
definition: >-
  RRP7 domain ribosomal RNA-processing protein 7 (Rrp7p) and similar proteins. This CD corresponds to the RRP7 domain of Rrp7p. Rrp7p is encoded by YCL031C gene from Saccharomyces cerevisiae. It is an essential yeast protein involved in pre-rRNA processing and ribosome assembly. Rrp7p contains an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal RRP7 domain. — an NCBI CDD conserved domain (cd12950); members share this curated model.
