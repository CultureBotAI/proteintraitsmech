identifier: CDD:cd18388
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 15 (KCTD15). KCTD15 is a BTB/POZ domain-containing protein that plays a role in the regulation of neural crest (NC) formation and other steps in embryonic development. It inhibits AP2 transcriptional activity by interaction with its activation domain. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD1 BTB domains, closely related to KCTD15, form pentamers."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 15 (KCTD15). KCTD15 is a BTB/POZ domain-containing protein that plays a role in the regulation of neural crest (NC) formation and other steps in embryonic development. It inhibits AP2 transcriptional activity by interaction with its activation domain. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD1 BTB domains, closely related to KCTD15, form pentamers. — an NCBI CDD conserved domain (cd18388); members share this curated model.
