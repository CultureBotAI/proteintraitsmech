identifier: CDD:cd17625
label: "phosphoacceptor receiver (REC) domain of DrrD-like OmpR family response regulators. DrrD is a OmpR/PhoB homolog from Thermotoga maritima whose function is not yet known. This subfamily also includes Streptococcus agalactiae transcriptional regulatory protein DltR, part of the DltS/DltR two-component system (TCS), and Pseudomonas aeruginosa transcriptional activator protein PfeR, part of the PfeR/PfeS TCS, which activates expression of the ferric enterobactin receptor. The DltS/DltR TCS regulates the expression of the dlt operon, which comprises four genes (dltA, dltB, dltC, and dltD) that catalyze the incorporation of D-alanine residues into the lipoteichoic acids. Members of this subfamily belong to the OmpR/PhoB family, which comprises of two domains, an N-terminal receiver domain and a C-terminal DNA-binding winged helix-turn-helix effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of DrrD-like OmpR family response regulators. DrrD is a OmpR/PhoB homolog from Thermotoga maritima whose function is not yet known. This subfamily also includes Streptococcus agalactiae transcriptional regulatory protein DltR, part of the DltS/DltR two-component system (TCS), and Pseudomonas aeruginosa transcriptional activator protein PfeR, part of the PfeR/PfeS TCS, which activates expression of the ferric enterobactin receptor. The DltS/DltR TCS regulates the expression of the dlt operon, which comprises four genes (dltA, dltB, dltC, and dltD) that catalyze the incorporation of D-alanine residues into the lipoteichoic acids. Members of this subfamily belong to the OmpR/PhoB family, which comprises of two domains, an N-terminal receiver domain and a C-terminal DNA-binding winged helix-turn-helix effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17625); members share this curated model.
