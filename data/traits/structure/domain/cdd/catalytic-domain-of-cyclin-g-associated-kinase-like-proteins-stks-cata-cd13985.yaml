identifier: CDD:cd13985
label: "Catalytic domain of cyclin G-Associated Kinase-like proteins. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily includes cyclin G-Associated Kinase (GAK), Drosophila melanogaster Numb-Associated Kinase (NAK)-like proteins, and similar protein kinases. GAK plays regulatory roles in clathrin-mediated membrane trafficking, the maintenance of centrosome integrity and chromosome congression, neural patterning, survival of neurons, and immune responses. NAK plays a role in asymmetric cell division through its association with Numb. It also regulates the localization of Dlg, a protein essential for septate junction formation. The GAK-like subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of cyclin G-Associated Kinase-like proteins. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. This subfamily includes cyclin G-Associated Kinase (GAK), Drosophila melanogaster Numb-Associated Kinase (NAK)-like proteins, and similar protein kinases. GAK plays regulatory roles in clathrin-mediated membrane trafficking, the maintenance of centrosome integrity and chromosome congression, neural patterning, survival of neurons, and immune responses. NAK plays a role in asymmetric cell division through its association with Numb. It also regulates the localization of Dlg, a protein essential for septate junction formation. The GAK-like subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13985); members share this curated model.
