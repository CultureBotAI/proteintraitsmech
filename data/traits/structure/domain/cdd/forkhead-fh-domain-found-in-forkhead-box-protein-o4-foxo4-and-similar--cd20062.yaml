identifier: CDD:cd20062
label: "Forkhead (FH) domain found in Forkhead box protein O4 (FOXO4) and similar proteins. FOXO4, also called Fork head domain transcription factor AFX1, is a transcription factor involved in the regulation of the insulin signaling pathway. It binds to insulin-response elements (IREs) and can activate transcription of IGFBP1. The FH domain is a winged helix DNA-binding domain. All FOXOs bind to the consensus sequence 5'-GTAAACAA-3', known as the DAF-16 family member-binding element, which includes the core sequence 5'-(A/C)AA(C/T)A-3' recognized by all FOX family members."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein O4 (FOXO4) and similar proteins. FOXO4, also called Fork head domain transcription factor AFX1, is a transcription factor involved in the regulation of the insulin signaling pathway. It binds to insulin-response elements (IREs) and can activate transcription of IGFBP1. The FH domain is a winged helix DNA-binding domain. All FOXOs bind to the consensus sequence 5'-GTAAACAA-3', known as the DAF-16 family member-binding element, which includes the core sequence 5'-(A/C)AA(C/T)A-3' recognized by all FOX family members. — an NCBI CDD conserved domain (cd20062); members share this curated model.
