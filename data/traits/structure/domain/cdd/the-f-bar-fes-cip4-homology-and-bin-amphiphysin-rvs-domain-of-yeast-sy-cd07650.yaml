identifier: CDD:cd07650
label: "The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of yeast Syp1 protein. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Syp1p is associated with septins, a family of GTP-binding proteins that serve as elements of septin filaments, which are required for cell morphogenesis and division. Syp1p regulates cell-cycle dependent septin cytoskeletal dynamics in yeast. It contains an N-terminal F-BAR domain and a C-terminal domain of unknown function named SAFF which is also present in FCH domain Only (FCHO) proteins and endophilin interacting protein 1. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules."
definition: >-
  The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of yeast Syp1 protein. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Syp1p is associated with septins, a family of GTP-binding proteins that serve as elements of septin filaments, which are required for cell morphogenesis and division. Syp1p regulates cell-cycle dependent septin cytoskeletal dynamics in yeast. It contains an N-terminal F-BAR domain and a C-terminal domain of unknown function named SAFF which is also present in FCH domain Only (FCHO) proteins and endophilin interacting protein 1. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. — an NCBI CDD conserved domain (cd07650); members share this curated model.
