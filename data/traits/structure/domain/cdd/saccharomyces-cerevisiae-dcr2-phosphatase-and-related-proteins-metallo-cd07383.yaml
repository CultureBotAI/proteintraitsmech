identifier: CDD:cd07383
label: "Saccharomyces cerevisiae DCR2 phosphatase and related proteins, metallophosphatase domain. DCR2 phosphatase (Dosage-dependent Cell Cycle Regulator 2) functions together with DCR1 (Gid8) in a common pathway to accelerate initiation of DNA replication in Saccharomyces cerevisiae. Genetic analysis suggests that DCR1 functions upstream of DCR2.  DCR2 interacts with and dephosphorylates Sic1, an inhibitor of mitotic cyclin/cyclin-dependent kinase complexes, which may serve to trigger the initiation of cell division.  DCR2 belongs to the metallophosphatase (MPP) superfamily.  MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The MPP superfamily includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases).  The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination."
definition: >-
  Saccharomyces cerevisiae DCR2 phosphatase and related proteins, metallophosphatase domain. DCR2 phosphatase (Dosage-dependent Cell Cycle Regulator 2) functions together with DCR1 (Gid8) in a common pathway to accelerate initiation of DNA replication in Saccharomyces cerevisiae. Genetic analysis suggests that DCR1 functions upstream of DCR2. DCR2 interacts with and dephosphorylates Sic1, an inhibitor of mitotic cyclin/cyclin-dependent kinase complexes, which may serve to trigger the initiation of cell division. DCR2 belongs to the metallophosphatase (MPP) superfamily. MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The MPP superfamily includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases). The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination. — an NCBI CDD conserved domain (cd07383); members share this curated model.
