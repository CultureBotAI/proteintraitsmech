identifier: CDD:cd04811
label: "Ferric reductase (FeR) family which is found in archaea and bacteria. It catalyzes the flavin-mediated reduction of ferric iron (Fe3) with either NADH or NADPH as electron donor. Ferric reductase is also named flavin reductase. It provides reduced FMN or FAD which is used for the reduction of iron. This enzyme is abundant inside the cell, suggesting a role as the terminal electron acceptor in a ferric iron-based respiratory pathway. FeR is a homodimer, consisting of a single domain which binds both FMN and NAD(P)H."
definition: >-
  Ferric reductase (FeR) family which is found in archaea and bacteria. It catalyzes the flavin-mediated reduction of ferric iron (Fe3) with either NADH or NADPH as electron donor. Ferric reductase is also named flavin reductase. It provides reduced FMN or FAD which is used for the reduction of iron. This enzyme is abundant inside the cell, suggesting a role as the terminal electron acceptor in a ferric iron-based respiratory pathway. FeR is a homodimer, consisting of a single domain which binds both FMN and NAD(P)H. — an NCBI CDD conserved domain (cd04811); members share this curated model.
