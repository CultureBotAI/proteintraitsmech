identifier: CDD:cd14108
label: "Catalytic kinase domain, first repeat, of Giant Serine/Threonine Kinase Striated muscle preferentially expressed protein kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The Striated muscle preferentially expressed gene (SPEG) generates 4 different isoforms through alternative promoter use and splicing in a tissue-specific manner: SPEGalpha and SPEGbeta are expressed in cardiac and skeletal striated muscle; Aortic Preferentially Expressed Protein-1 (APEG-1) is expressed in vascular smooth muscle; and Brain preferentially expressed gene (BPEG) is found in the brain and aorta. SPEG proteins have mutliple immunoglobulin (Ig), 2 fibronectin type III (FN3), and two kinase domains. They are necessary for cardiac development and survival. The SPEG subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic kinase domain, first repeat, of Giant Serine/Threonine Kinase Striated muscle preferentially expressed protein kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The Striated muscle preferentially expressed gene (SPEG) generates 4 different isoforms through alternative promoter use and splicing in a tissue-specific manner: SPEGalpha and SPEGbeta are expressed in cardiac and skeletal striated muscle; Aortic Preferentially Expressed Protein-1 (APEG-1) is expressed in vascular smooth muscle; and Brain preferentially expressed gene (BPEG) is found in the brain and aorta. SPEG proteins have mutliple immunoglobulin (Ig), 2 fibronectin type III (FN3), and two kinase domains. They are necessary for cardiac development and survival. The SPEG subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14108); members share this curated model.
