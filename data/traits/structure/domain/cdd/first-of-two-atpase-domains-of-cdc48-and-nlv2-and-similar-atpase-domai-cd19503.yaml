identifier: CDD:cd19503
label: "first of two ATPase domains of CDC48 and NLV2, and similar ATPase domains. CDC48 in yeast and p97 or VCP metazoans is an ATP-dependent molecular chaperone which plays an essential role in many cellular processes, by segregating polyubiquitinated proteins from complexes or membranes. Cdc48/p97 consists of an N-terminal domain and two ATPase domains; this subfamily represents the first of the two ATPase domains. This subfamily also includes the first of the two ATPase domains of NVL (nuclear VCP-like protein) 2, an isoform of NVL mainly present in the nucleolus, which is involved in ribosome biogenesis, in telomerase assembly and the regulation of telomerase activity, and in pre-rRNA processing. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  first of two ATPase domains of CDC48 and NLV2, and similar ATPase domains. CDC48 in yeast and p97 or VCP metazoans is an ATP-dependent molecular chaperone which plays an essential role in many cellular processes, by segregating polyubiquitinated proteins from complexes or membranes. Cdc48/p97 consists of an N-terminal domain and two ATPase domains; this subfamily represents the first of the two ATPase domains. This subfamily also includes the first of the two ATPase domains of NVL (nuclear VCP-like protein) 2, an isoform of NVL mainly present in the nucleolus, which is involved in ribosome biogenesis, in telomerase assembly and the regulation of telomerase activity, and in pre-rRNA processing. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19503); members share this curated model.
