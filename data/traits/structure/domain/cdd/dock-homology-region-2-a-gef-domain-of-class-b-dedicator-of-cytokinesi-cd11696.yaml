identifier: CDD:cd11696
label: "Dock Homology Region 2, a GEF domain, of Class B Dedicator of Cytokinesis proteins. DOCK proteins are atypical guanine nucleotide exchange factors (GEFs) that lack the conventional Dbl homology (DH) domain. As GEFs, they activate small GTPases by exchanging bound GDP for free GTP. They are divided into four classes (A-D) based on sequence similarity and domain architecture; class B includes Dock3 and 4. Dock3 is a specific GEF for Rac and it regulates N-cadherin dependent cell-cell adhesion, cell polarity, and neuronal morphology. It promotes axonal growth by stimulating actin polymerization and microtubule assembly. Dock4 activates the Ras family GTPase Rap1, probably indirectly through interaction with Rap regulatory proteins. It plays a role in regulating dendritic growth and branching in hippocampal neurons, where it is highly expressed. All DOCKs contain two homology domains: the DHR-1 (Dock homology region-1), also called CZH1 (CED-5, Dock180, and MBC-zizimin homology 1), and DHR-2 (also called CZH2 or Docker). The DHR-1 domain binds phosphatidylinositol-3,4,5-triphosphate. This alignment model represents the DHR-2 domain of class B DOCKs, which contains the catalytic GEF activity for Rac and/or Cdc42. Class B DOCKs also contain an SH3 domain at the N-terminal region and a PxxP motif at the C-terminus."
definition: >-
  Dock Homology Region 2, a GEF domain, of Class B Dedicator of Cytokinesis proteins. DOCK proteins are atypical guanine nucleotide exchange factors (GEFs) that lack the conventional Dbl homology (DH) domain. As GEFs, they activate small GTPases by exchanging bound GDP for free GTP. They are divided into four classes (A-D) based on sequence similarity and domain architecture; class B includes Dock3 and 4. Dock3 is a specific GEF for Rac and it regulates N-cadherin dependent cell-cell adhesion, cell polarity, and neuronal morphology. It promotes axonal growth by stimulating actin polymerization and microtubule assembly. Dock4 activates the Ras family GTPase Rap1, probably indirectly through interaction with Rap regulatory proteins. It plays a role in regulating dendritic growth and branching in hippocampal neurons, where it is highly expressed. All DOCKs contain two homology domains: the DHR-1 (Dock homology region-1), also called CZH1 (CED-5, Dock180, and MBC-zizimin homology 1), and DHR-2 (also called CZH2 or Docker). The DHR-1 domain binds phosphatidylinositol-3,4,5-triphosphate. This alignment model represents the DHR-2 domain of class B DOCKs, which contains the catalytic GEF activity for Rac and/or Cdc42. Class B DOCKs also contain an SH3 domain at the N-terminal region and a PxxP motif at the C-terminus. — an NCBI CDD conserved domain (cd11696); members share this curated model.
