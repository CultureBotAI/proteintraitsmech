identifier: CDD:cd22999
label: "SAP domain of structure-specific endonuclease subunit SLX4 and similar proteins. SLX4, also called BTB/POZ domain-containing protein 12 (BTBD12), is a Holliday junction resolvase subunit that binds multiple DNA repair/recombination endonucleases and is required for DNA repair. Mutations in the SLX4 gene are found in Fanconi anemia. This model corresponds to a conserved region called the SAP domain, which is responsible for the binding of MUS81, which plays a distinct role in interstrand crosslink repair."
definition: >-
  SAP domain of structure-specific endonuclease subunit SLX4 and similar proteins. SLX4, also called BTB/POZ domain-containing protein 12 (BTBD12), is a Holliday junction resolvase subunit that binds multiple DNA repair/recombination endonucleases and is required for DNA repair. Mutations in the SLX4 gene are found in Fanconi anemia. This model corresponds to a conserved region called the SAP domain, which is responsible for the binding of MUS81, which plays a distinct role in interstrand crosslink repair. — an NCBI CDD conserved domain (cd22999); members share this curated model.
