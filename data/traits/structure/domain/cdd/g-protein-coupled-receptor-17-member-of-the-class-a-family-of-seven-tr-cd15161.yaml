identifier: CDD:cd15161
label: "G protein-coupled receptor 17, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR17 is a Forkhead box protein O1 (FOXO1) target and abundantly expressed in agouti-related peptide (AGRP) neurons. FOXO1 is a transcription factor that plays key roles in regulation of gluconeogenesis and glycogenolysis by insulin signaling.  For instance, food intake and body weight increase when hypothalamic FOXO1 is activated, whereas they both decrease when FOXO1 is inhibited. However, a recent study has been reported that GPR17 deficiency in mice did not affect food intake or glucose homeostasis. Thus, GPR17 may not play a role in the control of food intake, body weight, or glycemic control. GPR17 is phylogenetically closely related to purinergic P2Y and cysteinyl-leukotriene receptors."
definition: >-
  G protein-coupled receptor 17, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR17 is a Forkhead box protein O1 (FOXO1) target and abundantly expressed in agouti-related peptide (AGRP) neurons. FOXO1 is a transcription factor that plays key roles in regulation of gluconeogenesis and glycogenolysis by insulin signaling. For instance, food intake and body weight increase when hypothalamic FOXO1 is activated, whereas they both decrease when FOXO1 is inhibited. However, a recent study has been reported that GPR17 deficiency in mice did not affect food intake or glucose homeostasis. Thus, GPR17 may not play a role in the control of food intake, body weight, or glycemic control. GPR17 is phylogenetically closely related to purinergic P2Y and cysteinyl-leukotriene receptors. — an NCBI CDD conserved domain (cd15161); members share this curated model.
