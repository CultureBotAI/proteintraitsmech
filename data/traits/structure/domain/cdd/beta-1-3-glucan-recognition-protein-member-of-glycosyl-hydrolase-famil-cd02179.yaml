identifier: CDD:cd02179
label: "beta-1,3-glucan recognition protein, member of glycosyl hydrolase family 16. Beta-GRP (beta-1,3-glucan recognition protein) is one of several pattern recognition receptors (PRRs), also referred to as biosensor proteins, that complexes with pathogen-associated beta-1,3-glucans and then transduces signals necessary for activation of an appropriate innate immune response. They are present in insects and lack all catalytic residues. This subgroup also contains related proteins of unknown function that still contain the active site. Their structures adopt a jelly roll fold with a deep active site channel harboring the catalytic residues, like those of other glycosyl hydrolase family 16 members."
definition: >-
  beta-1,3-glucan recognition protein, member of glycosyl hydrolase family 16. Beta-GRP (beta-1,3-glucan recognition protein) is one of several pattern recognition receptors (PRRs), also referred to as biosensor proteins, that complexes with pathogen-associated beta-1,3-glucans and then transduces signals necessary for activation of an appropriate innate immune response. They are present in insects and lack all catalytic residues. This subgroup also contains related proteins of unknown function that still contain the active site. Their structures adopt a jelly roll fold with a deep active site channel harboring the catalytic residues, like those of other glycosyl hydrolase family 16 members. — an NCBI CDD conserved domain (cd02179); members share this curated model.
