identifier: CDD:cd09498
label: "SAM domain of caskin protein repeat 2. SAM (sterile alpha motif) domain repeat 2 of caskin1,2 proteins is a protein-protein interaction domain. Caskin has two tandem SAM domains. Caskin protein is known to interact with membrane-associated guanylate kinase CASK, and may play a role in neural development, synaptic protein targeting, and regulation of gene expression."
definition: >-
  SAM domain of caskin protein repeat 2. SAM (sterile alpha motif) domain repeat 2 of caskin1,2 proteins is a protein-protein interaction domain. Caskin has two tandem SAM domains. Caskin protein is known to interact with membrane-associated guanylate kinase CASK, and may play a role in neural development, synaptic protein targeting, and regulation of gene expression. — an NCBI CDD conserved domain (cd09498); members share this curated model.
