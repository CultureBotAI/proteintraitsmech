identifier: CDD:cd01701
label: "DNA polymerase Rev1. Rev1 is a translesion synthesis (TLS) polymerase found in eukaryotes.  Translesion synthesis is a process that allows the bypass of a variety of DNA lesions.  TLS polymerases lack proofreading activity and have low fidelity and low processivity.  They use damaged DNA as templates and insert nucleotides opposite the lesions.  Rev1 has both structural and enzymatic roles.  Structurally, it is believed to interact with other nonclassical polymerases and replication machinery to act as a scaffold.  Enzymatically, it catalyzes the specific insertion of dCMP opposite abasic sites.  Rev1 interacts with the Rev7 subunit of the B-family TLS polymerase Pol zeta (Rev3/Rev7).  Rev1 is known to actively promote the introduction of mutations, potentially making it a significant target for cancer treatment."
definition: >-
  DNA polymerase Rev1. Rev1 is a translesion synthesis (TLS) polymerase found in eukaryotes. Translesion synthesis is a process that allows the bypass of a variety of DNA lesions. TLS polymerases lack proofreading activity and have low fidelity and low processivity. They use damaged DNA as templates and insert nucleotides opposite the lesions. Rev1 has both structural and enzymatic roles. Structurally, it is believed to interact with other nonclassical polymerases and replication machinery to act as a scaffold. Enzymatically, it catalyzes the specific insertion of dCMP opposite abasic sites. Rev1 interacts with the Rev7 subunit of the B-family TLS polymerase Pol zeta (Rev3/Rev7). Rev1 is known to actively promote the introduction of mutations, potentially making it a significant target for cancer treatment. — an NCBI CDD conserved domain (cd01701); members share this curated model.
