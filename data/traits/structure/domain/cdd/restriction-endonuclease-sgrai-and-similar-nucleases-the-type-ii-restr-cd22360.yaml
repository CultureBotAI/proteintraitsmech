identifier: CDD:cd22360
label: "Restriction endonuclease SgrAI and similar nucleases. The type II restriction endonuclease SgrAI binds and cleaves the target sequence CR|CCGGYG (| denotes the cleavage site, R stands for a purine and Y stands for a pyrimidine). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease SgrAI and similar nucleases. The type II restriction endonuclease SgrAI binds and cleaves the target sequence CR|CCGGYG (| denotes the cleavage site, R stands for a purine and Y stands for a pyrimidine). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22360); members share this curated model.
