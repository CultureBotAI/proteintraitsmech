identifier: CDD:cd02270
label: "N-terminal NAD(P)-binding domain of meso-diaminopimelate D-dehydrogenase (meso-DAPDH) and similar proteins. Meso-DAPDH (EC 1.4.1.16), also called diaminopimelate dehydrogenase, or meso-DAP dehydrogenase, probably plays a role in lysine biosynthesis. It catalyzes the reversible NADP(H)-dependent reductive amination of L-2-amino-6-oxopimelate, the acyclic form of L-tetrahydrodipicolinate, to generate the meso compound, D,L-2,6-diaminopimelate. DAPDH is a homodimer which is highly specific for meso-DAP and NADP(+) as substrates. Members of this family contain an N-terminal Rossmann fold NAD(P)-binding domain and a C-terminal dimerization domain."
definition: >-
  N-terminal NAD(P)-binding domain of meso-diaminopimelate D-dehydrogenase (meso-DAPDH) and similar proteins. Meso-DAPDH (EC 1.4.1.16), also called diaminopimelate dehydrogenase, or meso-DAP dehydrogenase, probably plays a role in lysine biosynthesis. It catalyzes the reversible NADP(H)-dependent reductive amination of L-2-amino-6-oxopimelate, the acyclic form of L-tetrahydrodipicolinate, to generate the meso compound, D,L-2,6-diaminopimelate. DAPDH is a homodimer which is highly specific for meso-DAP and NADP(+) as substrates. Members of this family contain an N-terminal Rossmann fold NAD(P)-binding domain and a C-terminal dimerization domain. — an NCBI CDD conserved domain (cd02270); members share this curated model.
