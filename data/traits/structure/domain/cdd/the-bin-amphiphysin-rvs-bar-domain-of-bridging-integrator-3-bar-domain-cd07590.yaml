identifier: CDD:cd07590
label: "The Bin/Amphiphysin/Rvs (BAR) domain of Bridging integrator 3. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. Bridging integrator 3 (Bin3) is widely expressed in many tissues except in the brain. It plays roles in regulating filamentous actin localization and in cell division. In humans, the Bin3 gene is located in chromosome 8p21.3, a region that is implicated in cancer suppression. Homozygous inactivation of the Bin3 gene in mice led to the development of cataracts and an increased likelihood of lymphomas during aging, suggesting a role for Bin3 in lens development and cancer suppression. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of Bridging integrator 3. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. Bridging integrator 3 (Bin3) is widely expressed in many tissues except in the brain. It plays roles in regulating filamentous actin localization and in cell division. In humans, the Bin3 gene is located in chromosome 8p21.3, a region that is implicated in cancer suppression. Homozygous inactivation of the Bin3 gene in mice led to the development of cataracts and an increased likelihood of lymphomas during aging, suggesting a role for Bin3 in lens development and cancer suppression. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. — an NCBI CDD conserved domain (cd07590); members share this curated model.
