label: "AKR11C family of aldo-keto reductase (AKR). Bacillus subtilis uncharacterized oxidoreductase YqkF is a founding member of aldo-keto reductase family 11 member C1 (AKR11C1). It may function as oxidoreductase. This family also includes Bacillus halodurans AKR11C1, an NADPH-dependent 4-hydroxy-2,3-trans-nonenal reductase."
definition: >-
  AKR11C family of aldo-keto reductase (AKR). Bacillus subtilis uncharacterized oxidoreductase YqkF is a founding member of aldo-keto reductase family 11 member C1 (AKR11C1). It may function as oxidoreductase. This family also includes Bacillus halodurans AKR11C1, an NADPH-dependent 4-hydroxy-2,3-trans-nonenal reductase. — an NCBI CDD conserved domain (cd19086); members share this curated model.
