identifier: CDD:cd11810
label: "Src homology 3 domain of RUN and SH3 domain-containing proteins 1 and 2. RUSC1 and RUSC2, that were originally characterized in silico. They are adaptor proteins consisting of RUN, leucine zipper, and SH3 domains. RUSC1, also called NESCA (New molecule containing SH3 at the carboxy-terminus), is highly expressed in the brain and is translocated to the nuclear membrane from the cytoplasm upon stimulation with neurotrophin. It plays a role in facilitating neurotrophin-dependent neurite outgrowth. It also interacts with NEMO (or IKKgamma) and may function in NEMO-mediated activation of NF-kB. RUSC2, also called Iporin, is expressed ubiquitously with highest amounts in the brain and testis. It interacts with the small GTPase Rab1 and the Golgi matrix protein GM130, and may function in linking GTPases to certain intracellular signaling pathways. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of RUN and SH3 domain-containing proteins 1 and 2. RUSC1 and RUSC2, that were originally characterized in silico. They are adaptor proteins consisting of RUN, leucine zipper, and SH3 domains. RUSC1, also called NESCA (New molecule containing SH3 at the carboxy-terminus), is highly expressed in the brain and is translocated to the nuclear membrane from the cytoplasm upon stimulation with neurotrophin. It plays a role in facilitating neurotrophin-dependent neurite outgrowth. It also interacts with NEMO (or IKKgamma) and may function in NEMO-mediated activation of NF-kB. RUSC2, also called Iporin, is expressed ubiquitously with highest amounts in the brain and testis. It interacts with the small GTPase Rab1 and the Golgi matrix protein GM130, and may function in linking GTPases to certain intracellular signaling pathways. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11810); members share this curated model.
