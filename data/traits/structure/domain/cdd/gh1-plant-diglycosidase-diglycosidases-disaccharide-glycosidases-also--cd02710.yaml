identifier: CDD:cd02710
label: "GH1_plant_diglycosidase. Diglycosidases (disaccharide glycosidases, also referred to as plant beta-O-glucosidases) occur in mosses (Bryophyta) and flowering plants (Magnoliophyta) that directly hydrolyze the second beta-glycosidic bond from the nonreducing end of disaccharide glycosides to liberate a disaccharide unit and an aglycone. This CD represents a glycosyl hydrolase, family 1 (GH1) domain present in the following closely related plant diglycosidases; Strictosidine Glucosidase, beta-Primeverosidase, Furcatin Hydrolase, Vicianin Hydrolase, Dalcochinase, Raucaffricine Glucosidase, Dhurrinase, Furostanol Glycoside Glucosidase (F26G), Linamarase, Coniferin beta-Glucosidase, Amygdalin Hydrolase, Prunasin Hydrolase, and a plant myrosinase that is present in Sinapis alba (white mustard) and Arabidopsis thaliana. Plants contain disaccharide glycosides which are resistant to hydrolysis by monogucoside beta-glucosidases, such as beta-primeveroside, beta-gentiobioside, beta-vicianoside, beta-acuminoside, and beta-rutinoside, that require diglycosidases for their hydrolysis.  A characteristic of diglycosidases is their one-step reaction mechanism releasing aglycones from disaccharide-glycosides, by which they specifically hydrolyze the beta-glycosidic bond between disaccharide and aglycone but do not hydrolyze the O-linked bond connecting the two sugars. Strictosidine glucosidase from Catharanthus roseus hydrolyzes strictosidine, an  intermediate from which thousands of monoterpene indole alkaloids are derived.  beta-Primeverosidase, from the tea plant Camellia sinensis, hydrolyzes beta-primeveroside to yield a disaccharide primeverose and various aroma alcohols. Furcatin Hydrolase, from Viburnum furcatum, is a unique disaccharide-specific acuminosidase that hydrolyzes furcatin to yield p-allylphenol and the disaccharide acuminose. Vicianin Hydrolase, from Vicia augustifolia and Davallia trichomanoides, hydrolyzes vicianin to yield mandelonitrile and a disaccharide vicianose.  Dalcochinase, from the Thai rosewood (Dalbergia cochinchinensis Pierre) hydrolyzes the isoflavonoid glucoside, dalcochinin-8'-O-beta-D-glucoside. Raucaffricine Glucosidase, from the plant Rauvolfia serpentina, one of two major glucose-hydrolysing enzymes participating in Rauvolfia alkaloid metabolism, catalyzes the hydrolysis of raucaffricine to yield the aglycone vomilenine. Dhurrinase from Sorghum bicolor hydrolyzes dhurrin, as well as its structural analog sambunigrin, to yield p-hydroxymandelonitrile, which disassociates to free HCN and p-hydroxybenzaldehyde.  Furostanol Glycoside 26-O-beta-Glucosidase (F26G), from Costus speciosus, hydrolyzes furostanol glycosides to yield spirostanol glycosides.  Linamarase (cyanogenic beta-Glucosidase) from Trifolium repens hydrolyzes linamarin.  Coniferin beta-Glucosidase from Pinus contorta hydrolyzes coniferin, a lignin precursor present in gymnosperms.  The digycosidases Amygdalin Hydrolase and Prunasin Hydrolase sequentially hydrolyze the cyanogenic diglucoside amygdalin, found in black cherry (Prunus serotina) seeds.  Amygdalin Hydrolase hydrolyzes the beta-1,6-glycosidic bond of amygdalin to yield prunasin and D-Gucose, while Prunasin Hydrolase hydrolyzes prunasin to yield mandelonitrile and D-glucose.  The plant myrosinase from Sinapis alba hydrolyzes thio-beta-glycosides to yield toxic compounds."
definition: >-
  GH1_plant_diglycosidase. Diglycosidases (disaccharide glycosidases, also referred to as plant beta-O-glucosidases) occur in mosses (Bryophyta) and flowering plants (Magnoliophyta) that directly hydrolyze the second beta-glycosidic bond from the nonreducing end of disaccharide glycosides to liberate a disaccharide unit and an aglycone. This CD represents a glycosyl hydrolase, family 1 (GH1) domain present in the following closely related plant diglycosidases; Strictosidine Glucosidase, beta-Primeverosidase, Furcatin Hydrolase, Vicianin Hydrolase, Dalcochinase, Raucaffricine Glucosidase, Dhurrinase, Furostanol Glycoside Glucosidase (F26G), Linamarase, Coniferin beta-Glucosidase, Amygdalin Hydrolase, Prunasin Hydrolase, and a plant myrosinase that is present in Sinapis alba (white mustard) and Arabidopsis thaliana. Plants contain disaccharide glycosides which are resistant to hydrolysis by monogucoside beta-glucosidases, such as beta-primeveroside, beta-gentiobioside, beta-vicianoside, beta-acuminoside, and beta-rutinoside, that require diglycosidases for their hydrolysis. A characteristic of diglycosidases is their one-step reaction mechanism releasing aglycones from disaccharide-glycosides, by which they specifically hydrolyze the beta-glycosidic bond between disaccharide and aglycone but do not hydrolyze the O-linked bond connecting the two sugars. Strictosidine glucosidase from Catharanthus roseus hydrolyzes strictosidine, an intermediate from which thousands of monoterpene indole alkaloids are derived. beta-Primeverosidase, from the tea plant Camellia sinensis, hydrolyzes beta-primeveroside to yield a disaccharide primeverose and various aroma alcohols. Furcatin Hydrolase, from Viburnum furcatum, is a unique disaccharide-specific acuminosidase that hydrolyzes furcatin to yield p-allylphenol and the disaccharide acuminose. Vicianin Hydrolase, from Vicia augustifolia and Davallia trichomanoides, hydrolyzes vicianin to yield mandelonitrile and a disaccharide vicianose. Dalcochinase, from the Thai rosewood (Dalbergia cochinchinensis Pierre) hydrolyzes the isoflavonoid glucoside, dalcochinin-8'-O-beta-D-glucoside. Raucaffricine Glucosidase, from the plant Rauvolfia serpentina, one of two major glucose-hydrolysing enzymes participating in Rauvolfia alkaloid metabolism, catalyzes the hydrolysis of raucaffricine to yield the aglycone vomilenine. Dhurrinase from Sorghum bicolor hydrolyzes dhurrin, as well as its structural analog sambunigrin, to yield p-hydroxymandelonitrile, which disassociates to free HCN and p-hydroxybenzaldehyde. Furostanol Glycoside 26-O-beta-Glucosidase (F26G), from Costus speciosus, hydrolyzes furostanol glycosides to yield spirostanol glycosides. Linamarase (cyanogenic beta-Glucosidase) from Trifolium repens hydrolyzes linamarin. Coniferin beta-Glucosidase from Pinus contorta hydrolyzes coniferin, a lignin precursor present in gymnosperms. The digycosidases Amygdalin Hydrolase and Prunasin Hydrolase sequentially hydrolyze the cyanogenic diglucoside amygdalin, found in black cherry (Prunus serotina) seeds. Amygdalin Hydrolase hydrolyzes the beta-1,6-glycosidic bond of amygdalin to yield prunasin and D-Gucose, while Prunasin Hydrolase hydrolyzes prunasin to yield mandelonitrile and D-glucose. The plant myrosinase from Sinapis alba hydrolyzes thio-beta-glycosides to yield toxic compounds. — an NCBI CDD conserved domain (cd02710); members share this curated model.
