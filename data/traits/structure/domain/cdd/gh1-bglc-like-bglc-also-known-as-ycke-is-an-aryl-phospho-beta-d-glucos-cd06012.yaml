identifier: CDD:cd06012
label: "GH1_BglC_like. BglC (also known as YckE) is an aryl-phospho-beta-D-glucosidase found in bacteria that hydrolyzes the phenolic glucosides, such as arbutin and salicin, that are produced in plants. Organisms like Bacillus subtilis take up aryl-beta-D-glucosides through the phosphotransferase system with phosphorylation of the glucosides occurring on the 6-position of the glucose moieties.  BglC and other aryl-phospho-beta-D-glucosidases cleave the glycosidic bond between the sugar and the aryl group of the aryl-beta-D-glucosides, which frees the phosphosugars for metabolism.  BglS from Lactococcus lactis, an ortholog of BglC, is essential for lactose assimilation in  Lactococcus lactis and is the major enzyme involved in galactose hydrolysis."
definition: >-
  GH1_BglC_like. BglC (also known as YckE) is an aryl-phospho-beta-D-glucosidase found in bacteria that hydrolyzes the phenolic glucosides, such as arbutin and salicin, that are produced in plants. Organisms like Bacillus subtilis take up aryl-beta-D-glucosides through the phosphotransferase system with phosphorylation of the glucosides occurring on the 6-position of the glucose moieties. BglC and other aryl-phospho-beta-D-glucosidases cleave the glycosidic bond between the sugar and the aryl group of the aryl-beta-D-glucosides, which frees the phosphosugars for metabolism. BglS from Lactococcus lactis, an ortholog of BglC, is essential for lactose assimilation in Lactococcus lactis and is the major enzyme involved in galactose hydrolysis. — an NCBI CDD conserved domain (cd06012); members share this curated model.
