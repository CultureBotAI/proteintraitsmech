identifier: CDD:cd22918
label: "histone-fold domain found in transcription initiation factor TFIID subunit 8 (TAF8) and similar proteins. TAF8, also called TATA Binding Protein (TBP) associated factor 8, protein taube nuss, TBP-associated factor 43 kDa, TBP-associated factor 8, or transcription initiation factor TFIID 43 kDa subunit (TAFII-43, TAFII43), is a component of the TFIID complex that is composed of TATA binding protein (TBP) and a number of TBP-associated factors (TAFs). TFIID is one of the general transcription factors required for accurate and regulated initiation by RNA polymerase II. It plays a central role in mediating promoter responses to various activators and repressors. TAF8 mediates both basal and activator-dependent transcription. It is involved in the differentiation of preadipocyte fibroblasts to adipocytes, however, it does not seem to play a role in differentiation of myoblasts. TAF8 is required for the integration of TAF10 in the TAF complex. It may be important for survival of cells of the inner cell mass which constitute the pluripotent cell population of the early embryo."
definition: >-
  histone-fold domain found in transcription initiation factor TFIID subunit 8 (TAF8) and similar proteins. TAF8, also called TATA Binding Protein (TBP) associated factor 8, protein taube nuss, TBP-associated factor 43 kDa, TBP-associated factor 8, or transcription initiation factor TFIID 43 kDa subunit (TAFII-43, TAFII43), is a component of the TFIID complex that is composed of TATA binding protein (TBP) and a number of TBP-associated factors (TAFs). TFIID is one of the general transcription factors required for accurate and regulated initiation by RNA polymerase II. It plays a central role in mediating promoter responses to various activators and repressors. TAF8 mediates both basal and activator-dependent transcription. It is involved in the differentiation of preadipocyte fibroblasts to adipocytes, however, it does not seem to play a role in differentiation of myoblasts. TAF8 is required for the integration of TAF10 in the TAF complex. It may be important for survival of cells of the inner cell mass which constitute the pluripotent cell population of the early embryo. — an NCBI CDD conserved domain (cd22918); members share this curated model.
