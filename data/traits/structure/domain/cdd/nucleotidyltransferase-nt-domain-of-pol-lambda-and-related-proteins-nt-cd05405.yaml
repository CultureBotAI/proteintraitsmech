identifier: CDD:cd05405
label: "Nucleotidyltransferase (NT) domain of Pol lambda and related proteins. NT_PolXc_lambda_like: A subgroup of the Polymerase X family DNA polymerase domain containing proteins similar to human (h)Pol lambda. hPol lambda participate in human base excision repair (BER); this enzyme has an additional, 5prime-deoxyribose phosphate lyase activity (dRP) which complements DNA synthesis during BER. hPol lambda may also participate in translesion synthesis (TLS) and non-homologous end joining mediated repair of DNA double-strand breaks (NHEJ-DSBR). hPol lambda is a low fidelity DNA template-dependent polymerase able to extend mispaired primer-termini, it lacks exonuclease proofreading activity.  hPol lambda may carry out synthesis when precursor concentrations are low in the cell since it has a high affinity for dNTPs.  hPol lambda has some intrinsic template-independent terminal deoxyribonucleotidyl transferase (TdT)-like activity, and can also act as DNA-independent RNA polymerases. hPol lambda has an N-terminal BRCT (BRCA1 C-terminal) domain, responsible for protein-protein and/or protein-DNA interactions. hPol lambda has been shown to interact with replication clamp proliferating cell nuclear antigen (PCNA), and end-joining factors: Ku and DNA repair protein ligase IV/XRCC4. hPol lambda is preferentially expressed in pachytene spermatocytes and may have a role in DNA repair associated with meiosis. The level of rice Pol lambda expression correlates with cell proliferation in meristematic and meiotic tissues. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these PolXc_lambda_like NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of Pol lambda and related proteins. NT_PolXc_lambda_like: A subgroup of the Polymerase X family DNA polymerase domain containing proteins similar to human (h)Pol lambda. hPol lambda participate in human base excision repair (BER); this enzyme has an additional, 5prime-deoxyribose phosphate lyase activity (dRP) which complements DNA synthesis during BER. hPol lambda may also participate in translesion synthesis (TLS) and non-homologous end joining mediated repair of DNA double-strand breaks (NHEJ-DSBR). hPol lambda is a low fidelity DNA template-dependent polymerase able to extend mispaired primer-termini, it lacks exonuclease proofreading activity. hPol lambda may carry out synthesis when precursor concentrations are low in the cell since it has a high affinity for dNTPs. hPol lambda has some intrinsic template-independent terminal deoxyribonucleotidyl transferase (TdT)-like activity, and can also act as DNA-independent RNA polymerases. hPol lambda has an N-terminal BRCT (BRCA1 C-terminal) domain, responsible for protein-protein and/or protein-DNA interactions. hPol lambda has been shown to interact with replication clamp proliferating cell nuclear antigen (PCNA), and end-joining factors: Ku and DNA repair protein ligase IV/XRCC4. hPol lambda is preferentially expressed in pachytene spermatocytes and may have a role in DNA repair associated with meiosis. The level of rice Pol lambda expression correlates with cell proliferation in meristematic and meiotic tissues. Proteins in this subgroup are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these PolXc_lambda_like NT domains. — an NCBI CDD conserved domain (cd05405); members share this curated model.
