identifier: CDD:cd11068
label: "cytochrome P450 family 102, subfamily A, polypeptide 1, also called bifunctional cytochrome P450/NADPH--P450 reductase. Cytochrome P450 102A1, also called cytochrome P450(BM-3) or P450BM-3, is a bifunctional cytochrome P450/NADPH--P450 reductase. These proteins fuse an N-terminal cytochrome p450 with a C-terminal cytochrome p450 reductase (CYPOR). It functions as a fatty acid monooxygenase, catalyzing the hydroxylation of fatty acids at omega-1, omega-2 and omega-3 positions, with activity towards fatty acids with a chain length of 9-18 carbons. Its NADPH-dependent reductase activity (via the C-terminal domain) allows electron transfer from NADPH to the heme iron of the N-terminal cytochrome P450. CYP120A1 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
