identifier: CDD:cd23448
label: "ricin B-type lectin domain, beta-trefoil fold, found in Bacillus thuringiensis Cry35Ab1 and similar proteins. Cry35Ab1 is an insecticidal protein belonging to the toxin_10 family (Pfam05431) that includes other insecticidal proteins such as the binary toxin BinA/BinB. It acts together with Cry34Ab1 to control corn rootworms. Cry35Ab1 contains a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Bacillus thuringiensis Cry35Ab1 and similar proteins. Cry35Ab1 is an insecticidal protein belonging to the toxin_10 family (Pfam05431) that includes other insecticidal proteins such as the binary toxin BinA/BinB. It acts together with Cry34Ab1 to control corn rootworms. Cry35Ab1 contains a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23448); members share this curated model.
