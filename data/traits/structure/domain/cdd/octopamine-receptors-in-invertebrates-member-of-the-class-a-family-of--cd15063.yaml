identifier: CDD:cd15063
label: "octopamine receptors in invertebrates, member of the class A family of seven-transmembrane G protein-coupled receptors. G-protein coupled receptor for octopamine (OA), which functions as a neurotransmitter, neurohormone, and neuromodulator in invertebrate nervous system. Octopamine (also known as beta, 4-dihydroxyphenethylamine) is an endogenous trace amine that is highly similar to norepinephrine, but lacks a hydroxyl group, and has effects on the adrenergic and dopaminergic nervous systems. Based on the pharmacological and signaling profiles, the octopamine receptors can be classified into at least two groups:  OA1 receptors elevate intracellular calcium levels in muscle, whereas OA2 receptors activate adenylate cyclase and increase cAMP production."
definition: >-
  octopamine receptors in invertebrates, member of the class A family of seven-transmembrane G protein-coupled receptors. G-protein coupled receptor for octopamine (OA), which functions as a neurotransmitter, neurohormone, and neuromodulator in invertebrate nervous system. Octopamine (also known as beta, 4-dihydroxyphenethylamine) is an endogenous trace amine that is highly similar to norepinephrine, but lacks a hydroxyl group, and has effects on the adrenergic and dopaminergic nervous systems. Based on the pharmacological and signaling profiles, the octopamine receptors can be classified into at least two groups: OA1 receptors elevate intracellular calcium levels in muscle, whereas OA2 receptors activate adenylate cyclase and increase cAMP production. — an NCBI CDD conserved domain (cd15063); members share this curated model.
