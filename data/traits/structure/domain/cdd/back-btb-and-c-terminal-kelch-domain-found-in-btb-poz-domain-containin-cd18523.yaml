identifier: CDD:cd18523
label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 2 (BTBD2). BTBD2 is a BTB-domain-containing Kelch-like protein that interacts with DNA topoisomerase 1 (Topo1), a key enzyme in cell survival. BTBD1 and BTBD2 colocalize to cytoplasmic bodies with the RBCC/tripartite motif protein, TRIM5delta."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 2 (BTBD2). BTBD2 is a BTB-domain-containing Kelch-like protein that interacts with DNA topoisomerase 1 (Topo1), a key enzyme in cell survival. BTBD1 and BTBD2 colocalize to cytoplasmic bodies with the RBCC/tripartite motif protein, TRIM5delta. — an NCBI CDD conserved domain (cd18523); members share this curated model.
