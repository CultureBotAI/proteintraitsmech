identifier: CDD:cd10379
label: "Src homology 2 (SH2) domain in the Janus kinase 2 (Jak2) proteins. Jak2 is a protein tyrosine kinase involved in a specific subset of cytokine receptor signaling pathways. It has been found to be constitutively associated with the prolactin receptor and is required for responses to gamma interferon. Mice that do not express an active protein for this gene exhibit embryonic lethality associated with the absence of definitive erythropoiesis. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain in the Janus kinase 2 (Jak2) proteins. Jak2 is a protein tyrosine kinase involved in a specific subset of cytokine receptor signaling pathways. It has been found to be constitutively associated with the prolactin receptor and is required for responses to gamma interferon. Mice that do not express an active protein for this gene exhibit embryonic lethality associated with the absence of definitive erythropoiesis. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10379); members share this curated model.
