identifier: CDD:cd11983
label: "Src homology 3 domain of SH3 and multiple ankyrin repeat domains protein 2. Shank2, also called ProSAP1 (Proline-rich synapse-associated protein 1) or CortBP1 (Cortactin-binding protein 1), is found in neurons, glia, endocrine cells, liver, and kidney. It plays a role in regulating dendritic spine volume and branching and postsynaptic clustering. Mutations in the Shank2 gene are associated with autism spectrum disorder and mental retardation. Shank proteins carry scaffolding functions through multiple sites of protein-protein interaction in its domain architecture, including ankyrin (ANK) repeats, a long proline rich region, as well as SH3, PDZ, and SAM domains. The SH3 domain of Shank binds GRIP, a scaffold protein that binds AMPA receptors and Eph receptors/ligands. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of SH3 and multiple ankyrin repeat domains protein 2. Shank2, also called ProSAP1 (Proline-rich synapse-associated protein 1) or CortBP1 (Cortactin-binding protein 1), is found in neurons, glia, endocrine cells, liver, and kidney. It plays a role in regulating dendritic spine volume and branching and postsynaptic clustering. Mutations in the Shank2 gene are associated with autism spectrum disorder and mental retardation. Shank proteins carry scaffolding functions through multiple sites of protein-protein interaction in its domain architecture, including ankyrin (ANK) repeats, a long proline rich region, as well as SH3, PDZ, and SAM domains. The SH3 domain of Shank binds GRIP, a scaffold protein that binds AMPA receptors and Eph receptors/ligands. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11983); members share this curated model.
