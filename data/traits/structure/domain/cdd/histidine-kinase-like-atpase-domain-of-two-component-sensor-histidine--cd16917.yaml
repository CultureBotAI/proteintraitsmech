identifier: CDD:cd16917
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli UhpB, NarQ and NarX, and Bacillus subtilis YdfH, YhcY and YfiJ. This family includes the histidine kinase-like ATPase (HATPase) domains of various histidine kinases (HKs) of two-component signal transduction systems (TCSs) such as Escherichia coli UhpB, a HK of the UhpB-UhpA TCS, NarQ and NarX, HKs of the NarQ-NarP and NarX-NarL TCSs, respectively, and Bacillus YdfH, YhcY and YfiJ HKs, of the YdfH-YdfI, YhcY-YhcZ and  YfiJ-YfiK  TCSs, respectively. In addition, it includes Bacillus YxjM, ComP, LiaS and DesK, HKs of the YxjM-YxjML, ComP-ComA, LiaS-LiaR, DesR-DesK TCSs, respectively. Proteins having this HATPase domain have a histidine kinase dimerization and phosphoacceptor domain; some have accessory domains such as GAF, HAMP, PAS and MASE sensor domains."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli UhpB, NarQ and NarX, and Bacillus subtilis YdfH, YhcY and YfiJ. This family includes the histidine kinase-like ATPase (HATPase) domains of various histidine kinases (HKs) of two-component signal transduction systems (TCSs) such as Escherichia coli UhpB, a HK of the UhpB-UhpA TCS, NarQ and NarX, HKs of the NarQ-NarP and NarX-NarL TCSs, respectively, and Bacillus YdfH, YhcY and YfiJ HKs, of the YdfH-YdfI, YhcY-YhcZ and YfiJ-YfiK TCSs, respectively. In addition, it includes Bacillus YxjM, ComP, LiaS and DesK, HKs of the YxjM-YxjML, ComP-ComA, LiaS-LiaR, DesR-DesK TCSs, respectively. Proteins having this HATPase domain have a histidine kinase dimerization and phosphoacceptor domain; some have accessory domains such as GAF, HAMP, PAS and MASE sensor domains. — an NCBI CDD conserved domain (cd16917); members share this curated model.
