identifier: CDD:cd23092
label: "mitochondrial large subunit assembly factor 12 (mt-LAF12) and related proteins. mt-LAF12 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF) which together with RPUSD4 and MRM performs a structural scaffolding role for binding GTPBP7, a GTPase assembly factor. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large (mt-LSU) and small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs, and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases and cancer development and progression."
