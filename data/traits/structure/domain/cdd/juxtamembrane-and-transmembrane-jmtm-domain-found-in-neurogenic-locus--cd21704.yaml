identifier: CDD:cd21704
label: "juxtamembrane and transmembrane (JMTM) domain found in neurogenic locus notch homolog protein 3 (Notch3) and similar proteins. Neurogenic locus notch homolog protein 3 (Notch3) functions as a receptor for membrane-bound ligands Jagged1, Jagged2 and Delta1 to regulate cell-fate determination. Upon ligand activation through the released notch intracellular domain (NICD) it forms a transcriptional activator complex with RBPJ/RBPSUH and activates genes of the enhancer of split locus. The model corresponds to the juxtamembrane and transmembrane (JMTM) domain of Notch3, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand."
definition: >-
  juxtamembrane and transmembrane (JMTM) domain found in neurogenic locus notch homolog protein 3 (Notch3) and similar proteins. Neurogenic locus notch homolog protein 3 (Notch3) functions as a receptor for membrane-bound ligands Jagged1, Jagged2 and Delta1 to regulate cell-fate determination. Upon ligand activation through the released notch intracellular domain (NICD) it forms a transcriptional activator complex with RBPJ/RBPSUH and activates genes of the enhancer of split locus. The model corresponds to the juxtamembrane and transmembrane (JMTM) domain of Notch3, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand. — an NCBI CDD conserved domain (cd21704); members share this curated model.
