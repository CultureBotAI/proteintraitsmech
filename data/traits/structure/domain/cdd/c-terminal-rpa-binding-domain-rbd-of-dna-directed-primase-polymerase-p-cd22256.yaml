identifier: CDD:cd22256
label: "C-terminal RPA-binding domain (RBD) of DNA-directed primase/polymerase protein and similar proteins. DNA-directed primase/polymerase protein (PrimPol), also called coiled-coil domain-containing protein 111, is a DNA primase-polymerase required for the maintenance of genome integrity. It facilitates mitochondrial and nuclear replication fork progression by initiating de novo DNA synthesis using dNTPs and acting as an error-prone DNA polymerase able to bypass certain DNA lesions. PrimPol is regulated by single-stranded DNA binding proteins. This model corresponds to the C-terminal RPA-binding domain (RBD) of PrimPol, which interacts directly with the RPA70N domain of RPA70."
definition: >-
  C-terminal RPA-binding domain (RBD) of DNA-directed primase/polymerase protein and similar proteins. DNA-directed primase/polymerase protein (PrimPol), also called coiled-coil domain-containing protein 111, is a DNA primase-polymerase required for the maintenance of genome integrity. It facilitates mitochondrial and nuclear replication fork progression by initiating de novo DNA synthesis using dNTPs and acting as an error-prone DNA polymerase able to bypass certain DNA lesions. PrimPol is regulated by single-stranded DNA binding proteins. This model corresponds to the C-terminal RPA-binding domain (RBD) of PrimPol, which interacts directly with the RPA70N domain of RPA70. — an NCBI CDD conserved domain (cd22256); members share this curated model.
