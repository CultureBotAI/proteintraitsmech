identifier: CDD:cd10971
label: "Putative catalytic NodB homology domain of uncharacterized prokaryotic polysaccharide deacetylases which consist of a 5-stranded beta/alpha barrel. This family contains many uncharacterized prokaryotic polysaccharide deacetylases. Although their biological functions remain unknown, all members of this family are predicted to contain a conserved domain with a 5-stranded beta/alpha barrel, which is similar to the catalytic NodB homology domain of rhizobial NodB-like proteins, belonging to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative catalytic NodB homology domain of uncharacterized prokaryotic polysaccharide deacetylases which consist of a 5-stranded beta/alpha barrel. This family contains many uncharacterized prokaryotic polysaccharide deacetylases. Although their biological functions remain unknown, all members of this family are predicted to contain a conserved domain with a 5-stranded beta/alpha barrel, which is similar to the catalytic NodB homology domain of rhizobial NodB-like proteins, belonging to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10971); members share this curated model.
