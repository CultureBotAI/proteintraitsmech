identifier: CDD:cd12118
label: "Fatty acyl-CoA synthetases similar to LC-FACS from Thermus thermophiles and Arabidopsis. This family includes fatty acyl-CoA synthetases that can activate medium to long-chain fatty acids. These enzymes catalyze the ATP-dependent acylation of fatty acids in a two-step reaction. The carboxylate substrate first reacts with ATP to form an acyl-adenylate intermediate, which then reacts with CoA to produce an acyl-CoA ester. Fatty acyl-CoA synthetases are responsible for fatty acid degradation as well as physiological regulation of cellular functions via the production of fatty acyl-CoA esters. The fatty acyl-CoA synthetase from Thermus thermophiles in this family has been shown to catalyze the long-chain fatty acid, myristoyl acid. Also included in this family are acyl activating enzymes from Arabidopsis, which contains a large number of proteins from this family with up to 63 different genes, many of which are uncharacterized."
definition: >-
  Fatty acyl-CoA synthetases similar to LC-FACS from Thermus thermophiles and Arabidopsis. This family includes fatty acyl-CoA synthetases that can activate medium to long-chain fatty acids. These enzymes catalyze the ATP-dependent acylation of fatty acids in a two-step reaction. The carboxylate substrate first reacts with ATP to form an acyl-adenylate intermediate, which then reacts with CoA to produce an acyl-CoA ester. Fatty acyl-CoA synthetases are responsible for fatty acid degradation as well as physiological regulation of cellular functions via the production of fatty acyl-CoA esters. The fatty acyl-CoA synthetase from Thermus thermophiles in this family has been shown to catalyze the long-chain fatty acid, myristoyl acid. Also included in this family are acyl activating enzymes from Arabidopsis, which contains a large number of proteins from this family with up to 63 different genes, many of which are uncharacterized. — an NCBI CDD conserved domain (cd12118); members share this curated model.
