identifier: CDD:cd14087
label: "Catalytic domain of the Protein Serine/Threonine kinase H1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PSKH1 is an autophosphorylating STK that is expressed ubiquitously and exhibits multiple intracellular localizations including the centrosome, Golgi apparatus, and splice factor compartments. It contains a catalytic kinase domain and an N-terminal SH4-like motif that is acylated to facilitate membrane attachment. PSKH1 plays a rile in the maintenance of the Golgi apparatus, an important organelle within the secretory pathway. It may also function as a novel splice factor and a regulator of prostate cancer cell growth. The PSKH1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Serine/Threonine kinase H1. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PSKH1 is an autophosphorylating STK that is expressed ubiquitously and exhibits multiple intracellular localizations including the centrosome, Golgi apparatus, and splice factor compartments. It contains a catalytic kinase domain and an N-terminal SH4-like motif that is acylated to facilitate membrane attachment. PSKH1 plays a rile in the maintenance of the Golgi apparatus, an important organelle within the secretory pathway. It may also function as a novel splice factor and a regulator of prostate cancer cell growth. The PSKH1 subfamily is part of a larger superfamily that includes the catalytic domains of other protein kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14087); members share this curated model.
