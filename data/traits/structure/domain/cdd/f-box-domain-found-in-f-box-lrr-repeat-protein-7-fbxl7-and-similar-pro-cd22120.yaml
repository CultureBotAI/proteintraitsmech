identifier: CDD:cd22120
label: "F-box domain found in F-box/LRR-repeat protein 7 (FBXL7) and similar proteins. FBXL7, also called F-box and leucine-rich repeat protein 7, or F-box protein FBL6/FBL7, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of Aurora kinase A (AURKA) during mitosis, causing mitotic arrest. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 7 (FBXL7) and similar proteins. FBXL7, also called F-box and leucine-rich repeat protein 7, or F-box protein FBL6/FBL7, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of Aurora kinase A (AURKA) during mitosis, causing mitotic arrest. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22120); members share this curated model.
