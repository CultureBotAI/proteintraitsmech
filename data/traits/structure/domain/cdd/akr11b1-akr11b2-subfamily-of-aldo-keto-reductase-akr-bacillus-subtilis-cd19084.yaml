identifier: CDD:cd19084
label: "AKR11B1/AKR11B2 subfamily of aldo-keto reductase (AKR). Bacillus subtilis YhdN, also called general stress protein 69 (GSP69), is a founding member of aldo-keto reductase family 11 member B1 (AKR11B1). It acts as an aldo-keto reductase (AKR) that catalyzes the reversible reduction of ketones to the respective alcohols using NAD(P)H as a hydride donor. Escherichia coli YdjG is a founding member of aldo-keto reductase family 11 member B2 (AKR11B2). It catalyzes the NADH-dependent reduction of methylglyoxal (2-oxopropanal) in vitro. It may play some role in intestinal colonization."
definition: >-
  AKR11B1/AKR11B2 subfamily of aldo-keto reductase (AKR). Bacillus subtilis YhdN, also called general stress protein 69 (GSP69), is a founding member of aldo-keto reductase family 11 member B1 (AKR11B1). It acts as an aldo-keto reductase (AKR) that catalyzes the reversible reduction of ketones to the respective alcohols using NAD(P)H as a hydride donor. Escherichia coli YdjG is a founding member of aldo-keto reductase family 11 member B2 (AKR11B2). It catalyzes the NADH-dependent reduction of methylglyoxal (2-oxopropanal) in vitro. It may play some role in intestinal colonization. — an NCBI CDD conserved domain (cd19084); members share this curated model.
