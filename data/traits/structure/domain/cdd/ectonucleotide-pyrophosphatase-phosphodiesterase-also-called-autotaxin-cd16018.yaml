identifier: CDD:cd16018
label: "Ectonucleotide pyrophosphatase/phosphodiesterase, also called autotaxin. Ecto-nucleotide pyrophosphatases/phosphodiesterases (ENPPs) hydrolyze 5'-phosphodiester bonds in nucleotides and their derivatives, resulting in the release of 5'-nucleotide monophosphates. ENPPs have multiple physiological roles, including nucleotide recycling, modulation of purinergic receptor signaling, regulation of extracellular pyrophosphate levels, stimulation of cell motility, and possible roles in regulation of insulin receptor (IR) signaling and activity of ecto-kinases. The eukaryotic ENPP family contains at least five members that have different tissue distribution and physiological roles."
definition: >-
