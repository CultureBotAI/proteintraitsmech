identifier: CDD:cd12927
label: "Minimal MMP-like domain found in Thermus thermophilus TTHA0227, Acidothermus cellulolyticus ACEL2062 and similar proteins. The family includes hypothetical proteins from bacteria that contain a minimal metalloprotease (MMP)-like domain consisting of 3-stranded mixed 2-beta sheets.These proteins may belong to a superfamily of bacterial zinc metallo-peptidases, which is characterized by a conserved HExxHxxGxxD (x could be any amino acid) motif. However, some family members carry a shorter HExxHxxG motif or HExxH motif. Some others do not have such a motif, but still share very high sequence similarity."
definition: >-
  Minimal MMP-like domain found in Thermus thermophilus TTHA0227, Acidothermus cellulolyticus ACEL2062 and similar proteins. The family includes hypothetical proteins from bacteria that contain a minimal metalloprotease (MMP)-like domain consisting of 3-stranded mixed 2-beta sheets.These proteins may belong to a superfamily of bacterial zinc metallo-peptidases, which is characterized by a conserved HExxHxxGxxD (x could be any amino acid) motif. However, some family members carry a shorter HExxHxxG motif or HExxH motif. Some others do not have such a motif, but still share very high sequence similarity. — an NCBI CDD conserved domain (cd12927); members share this curated model.
