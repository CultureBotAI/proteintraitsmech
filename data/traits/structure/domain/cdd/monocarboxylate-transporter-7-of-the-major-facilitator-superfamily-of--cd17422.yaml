identifier: CDD:cd17422
label: "Monocarboxylate transporter 7 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 7 (MCT7) is also called Solute carrier family 16 member 6 (SLC16A6). Zebrafish MCT7 is required for hepatocyte secretion of ketone bodies during fasting; it has been shown to be a selective transporter of the major ketone body beta-hydroxybutyrate, whose abundance is increased during fasting. MCT7 is expressed in the brain, pancreas, muscle, and prostate. It belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporter 7 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporter 7 (MCT7) is also called Solute carrier family 16 member 6 (SLC16A6). Zebrafish MCT7 is required for hepatocyte secretion of ketone bodies during fasting; it has been shown to be a selective transporter of the major ketone body beta-hydroxybutyrate, whose abundance is increased during fasting. MCT7 is expressed in the brain, pancreas, muscle, and prostate. It belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17422); members share this curated model.
