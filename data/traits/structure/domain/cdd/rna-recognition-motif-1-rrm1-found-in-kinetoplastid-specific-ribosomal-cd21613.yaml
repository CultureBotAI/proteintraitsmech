identifier: CDD:cd21613
label: "RNA recognition motif 1 (RRM1) found in Kinetoplastid-Specific Ribosomal Protein (KSRP) and similar proteins. KSRP is an essential protein located at the solvent face of the 40S subunit, where it binds and stabilizes kinetoplastid-specific domains of rRNA, suggesting its role in ribosome integrity. It also interacts with the kinetoplastid-specific C-terminal region of protein eS6. KSRP contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The model corresponds to the first RRM motif."
definition: >-
  RNA recognition motif 1 (RRM1) found in Kinetoplastid-Specific Ribosomal Protein (KSRP) and similar proteins. KSRP is an essential protein located at the solvent face of the 40S subunit, where it binds and stabilizes kinetoplastid-specific domains of rRNA, suggesting its role in ribosome integrity. It also interacts with the kinetoplastid-specific C-terminal region of protein eS6. KSRP contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains). The model corresponds to the first RRM motif. — an NCBI CDD conserved domain (cd21613); members share this curated model.
