identifier: CDD:cd21146
label: "N-terminal domain of eukaryotic 60S ribosome subunit biogenesis protein Nip7 and similar proteins. This N-terminal domain of various proteins co-occurs with a PUA (PseudoUridine synthase and Archaeosine transglycosylase) RNA binding domain. This model contains eukaryotic Nip7, a protein that was shown to be required for efficient biogenesis of the 60S ribosome subunit in Saccharomyces cerevisiae. Recently, it was demonstrated that human Nip7 is essential in the accurate processing of pre-rRNA. Also included is KD93, a human homolog of Nip7. Nip7 and its homologs share a two-domain architecture with the C-terminal PUA domain mediating interaction with RNA, suggesting that Nip7 is an adaptor protein with the C-terminal domain interacting with RNA targets and the N-terminal domain mediating interaction with protein targets."
definition: >-
