identifier: CDD:cd19163
label: "L-galactose dehydrogenase (L-galDH) and similar proteins. L-galDH (EC 1.1.1.316), also called L-galactose 1-dehydrogenase, catalyzes the oxidation of L-galactose to L-galactono-1,4-lactone in the presence of NAD(+). It uses NAD(+) as a hydrogen acceptor much more efficiently than NADP(+)."
definition: >-
