identifier: CDD:cd19275
label: "tRNA (guanine(37)-N1)-methyltransferase. tRNA (guanine(37)-N1)-methyltransferase Trm5 (EC 2.1.1.228) specifically methylates the N1 position of guanosine-37 in various tRNAs, the first step in the biosynthesis of wybutosine (yW), a modified base adjacent to the anticodon of tRNAs and required for accurate decoding."
definition: >-
  tRNA (guanine(37)-N1)-methyltransferase. tRNA (guanine(37)-N1)-methyltransferase Trm5 (EC 2.1.1.228) specifically methylates the N1 position of guanosine-37 in various tRNAs, the first step in the biosynthesis of wybutosine (yW), a modified base adjacent to the anticodon of tRNAs and required for accurate decoding. — an NCBI CDD conserved domain (cd19275); members share this curated model.
