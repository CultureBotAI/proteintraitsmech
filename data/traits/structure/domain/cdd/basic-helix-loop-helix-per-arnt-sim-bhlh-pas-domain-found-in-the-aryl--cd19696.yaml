identifier: CDD:cd19696
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in the aryl hydrocarbon receptor (AhR) family. The AhR family includes AhR, AhR repressor (AhRR) and Drosophila melanogaster protein spineless. AhR, also termed Ah receptor, or Dioxin receptor (DR), or Class E basic helix-loop-helix protein 76 (bHLHe76), is the only member of bHLH-PAS transcription regulators that bind and be activated by small chemical ligands. It is activated by Dioxin to control the expression of certain genes to influence biological processes such as apoptosis, proliferation, cell growth and differentiation. To form active DNA binding complexes AhR dimerizes with a bHLH-PAS factor ARNT (Aryl hydrocarbon Nuclear Receptor Translocator). AhRR, also termed Class E basic helix-loop-helix protein 77 (bHLHe77), is a member of bHLH-PAS transcription factors that acts as a negative regulator of AhR, playing key roles in development and environmental sensing. AhRR functions by competing with AhR for its partner ARNT. AhRR-ARNT complexes are transcriptionally inactive. Spineless is a bHLH-PAS transcription factor that plays an important role in fly morphogenesis. It is both necessary and sufficient for the formation of the ommatidial mosaic."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in the aryl hydrocarbon receptor (AhR) family. The AhR family includes AhR, AhR repressor (AhRR) and Drosophila melanogaster protein spineless. AhR, also termed Ah receptor, or Dioxin receptor (DR), or Class E basic helix-loop-helix protein 76 (bHLHe76), is the only member of bHLH-PAS transcription regulators that bind and be activated by small chemical ligands. It is activated by Dioxin to control the expression of certain genes to influence biological processes such as apoptosis, proliferation, cell growth and differentiation. To form active DNA binding complexes AhR dimerizes with a bHLH-PAS factor ARNT (Aryl hydrocarbon Nuclear Receptor Translocator). AhRR, also termed Class E basic helix-loop-helix protein 77 (bHLHe77), is a member of bHLH-PAS transcription factors that acts as a negative regulator of AhR, playing key roles in development and environmental sensing. AhRR functions by competing with AhR for its partner ARNT. AhRR-ARNT complexes are transcriptionally inactive. Spineless is a bHLH-PAS transcription factor that plays an important role in fly morphogenesis. It is both necessary and sufficient for the formation of the ommatidial mosaic. — an NCBI CDD conserved domain (cd19696); members share this curated model.
