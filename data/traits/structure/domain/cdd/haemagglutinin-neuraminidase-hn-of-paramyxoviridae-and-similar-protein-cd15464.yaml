identifier: CDD:cd15464
label: "Haemagglutinin-neuraminidase (HN) of paramyxoviridae and similar proteins. Most paramyxoviridae have two membrane-anchored glycoproteins that mediate entry of the virus into the host cell. The protein characterized by this model is called hemagglutinin-neuraminidase (HN), hemagglutinin glycoprotein (H), or glycoprotein (G). Typically it has a variety of functions during viral infection; it participates in virus attachment to host cells, may cleave sialic acid off host oligosaccharides, and has a stimulating effect on membrane fusion during the entry of the virus into the host cell."
definition: >-
  Haemagglutinin-neuraminidase (HN) of paramyxoviridae and similar proteins. Most paramyxoviridae have two membrane-anchored glycoproteins that mediate entry of the virus into the host cell. The protein characterized by this model is called hemagglutinin-neuraminidase (HN), hemagglutinin glycoprotein (H), or glycoprotein (G). Typically it has a variety of functions during viral infection; it participates in virus attachment to host cells, may cleave sialic acid off host oligosaccharides, and has a stimulating effect on membrane fusion during the entry of the virus into the host cell. — an NCBI CDD conserved domain (cd15464); members share this curated model.
