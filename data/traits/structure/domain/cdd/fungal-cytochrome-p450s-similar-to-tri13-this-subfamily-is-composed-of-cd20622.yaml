identifier: CDD:cd20622
label: "fungal cytochrome P450s similar to TRI13. This subfamily is composed of cytochrome P450 monooxygenase TRI13, also called core trichothecene cluster (CTC) protein 13, and similar proteins. The tri13 gene is located in the trichothecene biosynthesis gene cluster in Fusarium species, which produce a great diversity of agriculturally important trichothecene toxins that differ from each other in their pattern of oxygenation and esterification. Trichothecenes comprise a large family of chemically related bicyclic sesquiterpene compounds acting as mycotoxins, including the T2-toxin; TRI13 is required for the addition of the C-4 oxygen of T-2 toxin. The TRI13-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  fungal cytochrome P450s similar to TRI13. This subfamily is composed of cytochrome P450 monooxygenase TRI13, also called core trichothecene cluster (CTC) protein 13, and similar proteins. The tri13 gene is located in the trichothecene biosynthesis gene cluster in Fusarium species, which produce a great diversity of agriculturally important trichothecene toxins that differ from each other in their pattern of oxygenation and esterification. Trichothecenes comprise a large family of chemically related bicyclic sesquiterpene compounds acting as mycotoxins, including the T2-toxin; TRI13 is required for the addition of the C-4 oxygen of T-2 toxin. The TRI13-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20622); members share this curated model.
