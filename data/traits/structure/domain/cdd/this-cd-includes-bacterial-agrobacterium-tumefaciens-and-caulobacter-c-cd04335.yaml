identifier: CDD:cd04335
label: "This CD includes bacterial (Agrobacterium tumefaciens and Caulobacter crescentus ProX, and Clostridium sticklandii PrdX) and eukaryotic (Plasmodium falciparum N-terminal ProRS editing domain) sequences. The C. sticklandii PrdX protein, a homolog of the YbaK and ProX proteins, and the prolyl-tRNA synthetase-editing domain (ProRS-INS), specifically hydrolyzes Ala-tRNA(Pro). In this CD, many of the eukaryotic editing domains are N-terminal and cis-acting, expressed from a multidomain ProRS, however, similar to the bacterial PrdX, the mammalian, amphibian, and echinoderm PrdX-like proteins are trans-acting, single-domain proteins."
definition: >-
  This CD includes bacterial (Agrobacterium tumefaciens and Caulobacter crescentus ProX, and Clostridium sticklandii PrdX) and eukaryotic (Plasmodium falciparum N-terminal ProRS editing domain) sequences. The C. sticklandii PrdX protein, a homolog of the YbaK and ProX proteins, and the prolyl-tRNA synthetase-editing domain (ProRS-INS), specifically hydrolyzes Ala-tRNA(Pro). In this CD, many of the eukaryotic editing domains are N-terminal and cis-acting, expressed from a multidomain ProRS, however, similar to the bacterial PrdX, the mammalian, amphibian, and echinoderm PrdX-like proteins are trans-acting, single-domain proteins. — an NCBI CDD conserved domain (cd04335); members share this curated model.
