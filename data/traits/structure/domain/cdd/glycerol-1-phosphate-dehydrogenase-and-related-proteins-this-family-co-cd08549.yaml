identifier: CDD:cd08549
label: "Glycerol-1-phosphate dehydrogenase and related proteins. This family contains bacterial and archeal glycerol-1-phosphate dehydrogenase-like oxidoreductases. These proteins have similarity with glycerol-1-phosphate dehydrogenase (G1PDH) which plays a role in the synthesis of phosphoglycerolipids in gram-positive bacterial species. It catalyzes the reversibly reduction of dihydroxyacetone phosphate (DHAP) to glycerol-1-phosphate (G1P) in a NADH-dependent manner. Its activity requires Ni++ ion. It also contains archaeal Sn-glycerol-1-phosphate dehydrogenase (Gro1PDH) that plays an important role in the formation of the enantiomeric configuration of the glycerophosphate backbone (sn-glycerol-1-phosphate) of archaeal ether lipids."
definition: >-
  Glycerol-1-phosphate dehydrogenase and related proteins. This family contains bacterial and archeal glycerol-1-phosphate dehydrogenase-like oxidoreductases. These proteins have similarity with glycerol-1-phosphate dehydrogenase (G1PDH) which plays a role in the synthesis of phosphoglycerolipids in gram-positive bacterial species. It catalyzes the reversibly reduction of dihydroxyacetone phosphate (DHAP) to glycerol-1-phosphate (G1P) in a NADH-dependent manner. Its activity requires Ni++ ion. It also contains archaeal Sn-glycerol-1-phosphate dehydrogenase (Gro1PDH) that plays an important role in the formation of the enantiomeric configuration of the glycerophosphate backbone (sn-glycerol-1-phosphate) of archaeal ether lipids. — an NCBI CDD conserved domain (cd08549); members share this curated model.
