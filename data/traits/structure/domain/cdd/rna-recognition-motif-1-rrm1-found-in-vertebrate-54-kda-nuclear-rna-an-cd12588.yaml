identifier: CDD:cd12588
label: "RNA recognition motif 1 (RRM1) found in vertebrate 54 kDa nuclear RNA- and DNA-binding protein (p54nrb). This subgroup corresponds to the RRM1 of p54nrb, also termed non-POU domain-containing octamer-binding protein (NonO), or 55 kDa nuclear protein (NMT55), or DNA-binding p52/p100 complex 52 kDa subunit. p54nrb is a multifunctional protein involved in numerous nuclear processes including transcriptional regulation, splicing, DNA unwinding, nuclear retention of hyperedited double-stranded RNA, viral RNA processing, control of cell proliferation, and circadian rhythm maintenance. It is ubiquitously expressed and highly conserved in vertebrates. p54nrb binds both, single- and double-stranded RNA and DNA, and also possesses inherent carbonic anhydrase activity. It forms a heterodimer with paraspeckle component 1 (PSPC1 or PSP1), localizing to paraspeckles in an RNA-dependent manneras well as with polypyrimidine tract-binding protein-associated-splicing factor (PSF). p54nrb contains two conserved RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), at the N-terminus."
definition: >-
  RNA recognition motif 1 (RRM1) found in vertebrate 54 kDa nuclear RNA- and DNA-binding protein (p54nrb). This subgroup corresponds to the RRM1 of p54nrb, also termed non-POU domain-containing octamer-binding protein (NonO), or 55 kDa nuclear protein (NMT55), or DNA-binding p52/p100 complex 52 kDa subunit. p54nrb is a multifunctional protein involved in numerous nuclear processes including transcriptional regulation, splicing, DNA unwinding, nuclear retention of hyperedited double-stranded RNA, viral RNA processing, control of cell proliferation, and circadian rhythm maintenance. It is ubiquitously expressed and highly conserved in vertebrates. p54nrb binds both, single- and double-stranded RNA and DNA, and also possesses inherent carbonic anhydrase activity. It forms a heterodimer with paraspeckle component 1 (PSPC1 or PSP1), localizing to paraspeckles in an RNA-dependent manneras well as with polypyrimidine tract-binding protein-associated-splicing factor (PSF). p54nrb contains two conserved RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), at the N-terminus. — an NCBI CDD conserved domain (cd12588); members share this curated model.
