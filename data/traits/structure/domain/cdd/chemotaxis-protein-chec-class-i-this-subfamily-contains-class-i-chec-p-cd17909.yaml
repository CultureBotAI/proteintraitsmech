identifier: CDD:cd17909
label: "chemotaxis protein CheC, Class I. This subfamily contains Class I CheC proteins with phosphatase activity. The Class I cheC genes are generally found in firmicute and archaeal chemotaxis operons with cheD, usually translationally coupled. Class I CheCs interact with the CheD protein which is responsible for deamidation of certain glutamine residues to glutamates on the chemotaxis receptor proteins. This family contains two active sites with the consensus sequence ([DS]xxxExxNx(22)P), with four conserved residues thought to form the phosphatase active site. The C-terminal helix of CheC acts as a mimic of the natural enzymatic target of CheD, the alpha-helical receptors, and serves as the binding site for CheD. The CheC/CheD heterodimerization increases CheY-P phosphatase activity five-fold. Class I CheCs are involved in adaptation of the chemotaxis system."
definition: >-
  chemotaxis protein CheC, Class I. This subfamily contains Class I CheC proteins with phosphatase activity. The Class I cheC genes are generally found in firmicute and archaeal chemotaxis operons with cheD, usually translationally coupled. Class I CheCs interact with the CheD protein which is responsible for deamidation of certain glutamine residues to glutamates on the chemotaxis receptor proteins. This family contains two active sites with the consensus sequence ([DS]xxxExxNx(22)P), with four conserved residues thought to form the phosphatase active site. The C-terminal helix of CheC acts as a mimic of the natural enzymatic target of CheD, the alpha-helical receptors, and serves as the binding site for CheD. The CheC/CheD heterodimerization increases CheY-P phosphatase activity five-fold. Class I CheCs are involved in adaptation of the chemotaxis system. — an NCBI CDD conserved domain (cd17909); members share this curated model.
