identifier: CDD:cd21147
label: "RsmF rRNA methyltransferase first C-terminal domain. This model represents the first of two distinct C-terminal domains of the 16S rRNA methyltransferase RsmF and related RsmB/RsmF family ribosomal methyltransferases. It is necessary for stabilizing the N-terminal catalytic core (a SAM-dependent methyltransferase) and is related to the N-terminal domain of Nip7, a protein that was shown to be required for efficient biogenesis of the 60S ribosome subunit in Saccharomyces cerevisiae (human Nip7 is essential in the accurate processing of pre-rRNA). The second distinct C-terminal domain belongs to the PUA (PseudoUridine synthase and Archaeosine transglycosylase) RNA binding domain superfamily."
definition: >-
  RsmF rRNA methyltransferase first C-terminal domain. This model represents the first of two distinct C-terminal domains of the 16S rRNA methyltransferase RsmF and related RsmB/RsmF family ribosomal methyltransferases. It is necessary for stabilizing the N-terminal catalytic core (a SAM-dependent methyltransferase) and is related to the N-terminal domain of Nip7, a protein that was shown to be required for efficient biogenesis of the 60S ribosome subunit in Saccharomyces cerevisiae (human Nip7 is essential in the accurate processing of pre-rRNA). The second distinct C-terminal domain belongs to the PUA (PseudoUridine synthase and Archaeosine transglycosylase) RNA binding domain superfamily. — an NCBI CDD conserved domain (cd21147); members share this curated model.
