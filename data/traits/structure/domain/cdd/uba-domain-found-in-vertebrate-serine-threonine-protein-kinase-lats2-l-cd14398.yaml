identifier: CDD:cd14398
label: "UBA domain found in vertebrate serine/threonine-protein kinase LATS2. LATS2, also called kinase phosphorylated during mitosis protein, or large tumor suppressor homolog 2, or serine/threonine-protein kinase KPM, or Warts-like kinase, is a novel mammalian homolog of the Drosophila tumor suppressor gene lats/warts. It inhibits the G1/S transition and is essential for embryonic development, proliferation control, and genomic integrity. LATS2 is a serine/threonine kinase that negatively regulates CyclinE/CDK2 and plays a role in tumor suppression. It also acts as the negative regulator of androgen receptor (AR) through inhibiting androgen-regulated gene expression and thus plays an important role in AR -regulated transcription and in the development of prostate cancer. Moreover, LATS2 induces apoptosis via down-regulation of anti-apoptotic proteins, BCL-2 and BCL-x(L), in human lung cancer cells. It is a centrosomal protein and forms a complex with Ajuba, a LIM protein, to regulate organization of the spindle apparatus through recruitment of gamma-tubulin to the centrosome during mitosis. Furthermore, LATS2 interacts with Mdm2 to inhibit p53 ubiquitination and promote p53 activation. It stabilizes the cellular protein level of Snail1, a central regulator of epithelial cell adhesion and movement in epithelial-to-mesenchymal transitions (EMTs) during embryo development, and enhances its EMT activity. LATS2 contains an N-terminal ubiquitin-associated (UBA) domain and a C-terminal protein kinase domain."
definition: >-
  UBA domain found in vertebrate serine/threonine-protein kinase LATS2. LATS2, also called kinase phosphorylated during mitosis protein, or large tumor suppressor homolog 2, or serine/threonine-protein kinase KPM, or Warts-like kinase, is a novel mammalian homolog of the Drosophila tumor suppressor gene lats/warts. It inhibits the G1/S transition and is essential for embryonic development, proliferation control, and genomic integrity. LATS2 is a serine/threonine kinase that negatively regulates CyclinE/CDK2 and plays a role in tumor suppression. It also acts as the negative regulator of androgen receptor (AR) through inhibiting androgen-regulated gene expression and thus plays an important role in AR -regulated transcription and in the development of prostate cancer. Moreover, LATS2 induces apoptosis via down-regulation of anti-apoptotic proteins, BCL-2 and BCL-x(L), in human lung cancer cells. It is a centrosomal protein and forms a complex with Ajuba, a LIM protein, to regulate organization of the spindle apparatus through recruitment of gamma-tubulin to the centrosome during mitosis. Furthermore, LATS2 interacts with Mdm2 to inhibit p53 ubiquitination and promote p53 activation. It stabilizes the cellular protein level of Snail1, a central regulator of epithelial cell adhesion and movement in epithelial-to-mesenchymal transitions (EMTs) during embryo development, and enhances its EMT activity. LATS2 contains an N-terminal ubiquitin-associated (UBA) domain and a C-terminal protein kinase domain. — an NCBI CDD conserved domain (cd14398); members share this curated model.
