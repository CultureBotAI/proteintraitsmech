identifier: CDD:cd15615
label: "PHD finger found in Arabidopsis thaliana AT-rich interactive domain-containing protein 4 (ARID4) and similar proteins. This family includes A. thaliana ARID4 (ARID domain-containing protein 4) and similar proteins. Their biological roles remain unclear, but they all contain an AT-rich interactive domain (ARID) and a plant homeodomain (PHD) finger at the C-terminus. ARID is a helix-turn-helix motif-based DNA-binding domain conserved in all eukaryotes. PHD fingers can recognize the unmodified and modified histone H3 tail, and some have been found to interact with non-histone proteins."
definition: >-
