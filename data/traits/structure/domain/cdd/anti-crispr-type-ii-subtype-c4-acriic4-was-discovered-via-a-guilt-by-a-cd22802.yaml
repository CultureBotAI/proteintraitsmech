identifier: CDD:cd22802
label: "Anti-CRISPR type II subtype C4. AcrIIC4 was discovered via a guilt-by association (GBA) approach, which was based on the strong co-occurrence and clustering of anti-CRISPR (acr) and anti-CRISPR associated (aca) genes through proximity and homology searches. AcrIIC4 inhibits Cas9 activity in vitro, as well as CRISPR interference activity in bacteria; it also prevents Cas9-mediated genome editing in mammalian cells. AcrIIC4 blocks CRISPR-Cas9 DNA cleavage activity. Structural studies on Haemophilus parainfluenzae AcrIIC4 show that it binds to the Cas9 Recognition Domain; this binding does not prevent the Cas9-anti-CRISPR complex from interacting with target DNA but does inhibit DNA cleavage. Type IIC CRISPR-Cas systems are the simplest of the type II systems, employing only three Cas proteins, Cas9, Cas1 and Cas2. Almost all type II Acrs characterized to date directly interact with the Cas9 endonuclease, although by distinct mechanisms. The type II CRISPR/Cas subtype has a distinct crRNA-guided surveillance complex encoded by cas9 (formerly csn1), cas1, cas2, and csn2 (for type IIA) or cas4 (for type IIB) genes, all located in a single transcriptional unit directly upstream of the CRISPR locus. Cleavage of the DNA target in type II systems is carried out by Cas9 which is an RNA-guided double-stranded DNase with two independent nuclease domains, HNH and RuvC. Due to the reliance of the type II system on a single protein for function, Cas9 homologs derived from different subtypes and species have been utilized for numerous gene editing applications. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 2 systems employ a single multi-domain effector Cas9 protein complex that performs target recognition and cleavage. Acr families are named for their type and subtype which are numbered sequentially as they are discovered."
definition: >-
  Anti-CRISPR type II subtype C4. AcrIIC4 was discovered via a guilt-by association (GBA) approach, which was based on the strong co-occurrence and clustering of anti-CRISPR (acr) and anti-CRISPR associated (aca) genes through proximity and homology searches. AcrIIC4 inhibits Cas9 activity in vitro, as well as CRISPR interference activity in bacteria; it also prevents Cas9-mediated genome editing in mammalian cells. AcrIIC4 blocks CRISPR-Cas9 DNA cleavage activity. Structural studies on Haemophilus parainfluenzae AcrIIC4 show that it binds to the Cas9 Recognition Domain; this binding does not prevent the Cas9-anti-CRISPR complex from interacting with target DNA but does inhibit DNA cleavage. Type IIC CRISPR-Cas systems are the simplest of the type II systems, employing only three Cas proteins, Cas9, Cas1 and Cas2. Almost all type II Acrs characterized to date directly interact with the Cas9 endonuclease, although by distinct mechanisms. The type II CRISPR/Cas subtype has a distinct crRNA-guided surveillance complex encoded by cas9 (formerly csn1), cas1, cas2, and csn2 (for type IIA) or cas4 (for type IIB) genes, all located in a single transcriptional unit directly upstream of the CRISPR locus. Cleavage of the DNA target in type II systems is carried out by Cas9 which is an RNA-guided double-stranded DNase with two independent nuclease domains, HNH and RuvC. Due to the reliance of the type II system on a single protein for function, Cas9 homologs derived from different subtypes and species have been utilized for numerous gene editing applications. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 2 systems employ a single multi-domain effector Cas9 protein complex that performs target recognition and cleavage. Acr families are named for their type and subtype which are numbered sequentially as they are discovered. — an NCBI CDD conserved domain (cd22802); members share this curated model.
