identifier: CDD:cd12073
label: "Src homology 3 domain of Hematopoietic lineage cell-specific protein 1. HS1, also called HCLS1 (hematopoietic cell-specific Lyn substrate 1), is a cortactin homolog expressed specifically in hematopoietic cells. It is an actin regulatory protein that binds the Arp2/3 complex and stabilizes branched actin filaments. It is required for cell spreading and signaling in lymphocytes. It regulates cytoskeletal remodeling that controls lymphocyte trafficking, and it also affects tissue invasion and infiltration of leukemic B cells. Like cortactin, HS1 contains an N-terminal acidic domain, several copies of a repeat domain found in cortactin and HS1, a proline-rich region, and a C-terminal SH3 domain. The N-terminal region binds the Arp2/3 complex and F-actin, while the C-terminal region acts as an adaptor or scaffold that can connect varied proteins that bind the SH3 domain within the actin network. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Hematopoietic lineage cell-specific protein 1. HS1, also called HCLS1 (hematopoietic cell-specific Lyn substrate 1), is a cortactin homolog expressed specifically in hematopoietic cells. It is an actin regulatory protein that binds the Arp2/3 complex and stabilizes branched actin filaments. It is required for cell spreading and signaling in lymphocytes. It regulates cytoskeletal remodeling that controls lymphocyte trafficking, and it also affects tissue invasion and infiltration of leukemic B cells. Like cortactin, HS1 contains an N-terminal acidic domain, several copies of a repeat domain found in cortactin and HS1, a proline-rich region, and a C-terminal SH3 domain. The N-terminal region binds the Arp2/3 complex and F-actin, while the C-terminal region acts as an adaptor or scaffold that can connect varied proteins that bind the SH3 domain within the actin network. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12073); members share this curated model.
