identifier: CDD:cd21701
label: "juxtamembrane and transmembrane (JMTM) domain found in Notch protein family. Neurogenic locus notch homolog (Notch) proteins are a family of type-1 transmembrane proteins that form a core component of the Notch signaling pathway. They operate in a variety of different tissues and play a role in a variety of developmental processes by controlling cell fate decisions. The model corresponds to the juxtamembrane and transmembrane (JMTM) domain of Notch proteins, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand."
definition: >-
  juxtamembrane and transmembrane (JMTM) domain found in Notch protein family. Neurogenic locus notch homolog (Notch) proteins are a family of type-1 transmembrane proteins that form a core component of the Notch signaling pathway. They operate in a variety of different tissues and play a role in a variety of developmental processes by controlling cell fate decisions. The model corresponds to the juxtamembrane and transmembrane (JMTM) domain of Notch proteins, which comprises an extended coil, a transmembrane helix (TM), and a beta-strand. — an NCBI CDD conserved domain (cd21701); members share this curated model.
