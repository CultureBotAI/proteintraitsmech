identifier: CDD:cd21772
label: "nuclear export signal 2 (NES2) and nuclear import signal (NLS) domains found in MLX-interacting protein (MLXIP), and similar proteins. MLXIP, also called class E basic helix-loop-helix protein 36 (bHLHe36), transcriptional activator MondoA, or MIR, is a novel basic helix-loop-helix-leucine zipper transcriptional activator that constitutes a positive branch of a max-like network. It binds DNA by forming a heterodimer with Max-like protein (MLX) and activates transcription. It binds to the canonical E box sequence 5'-CACGTG-3'. MLXIP plays a role in transcriptional activation of glycolytic target genes and is involved in glucose-responsive gene regulation. MLXIP may contain functional domains, including two nuclear export signals, NES1 and NES2, and a nuclear import signal (NLS) in the N-terminal region. This model corresponds to NES2 and NLS domains."
definition: >-
  nuclear export signal 2 (NES2) and nuclear import signal (NLS) domains found in MLX-interacting protein (MLXIP), and similar proteins. MLXIP, also called class E basic helix-loop-helix protein 36 (bHLHe36), transcriptional activator MondoA, or MIR, is a novel basic helix-loop-helix-leucine zipper transcriptional activator that constitutes a positive branch of a max-like network. It binds DNA by forming a heterodimer with Max-like protein (MLX) and activates transcription. It binds to the canonical E box sequence 5'-CACGTG-3'. MLXIP plays a role in transcriptional activation of glycolytic target genes and is involved in glucose-responsive gene regulation. MLXIP may contain functional domains, including two nuclear export signals, NES1 and NES2, and a nuclear import signal (NLS) in the N-terminal region. This model corresponds to NES2 and NLS domains. — an NCBI CDD conserved domain (cd21772); members share this curated model.
