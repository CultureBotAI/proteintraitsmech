identifier: CDD:cd01017
label: "Metal binding protein AdcA.  These proteins have been shown to function in the ABC uptake of Zn2+ and Mn2+ and in competence for genetic transformation and adhesion.  The AdcA proteins belong to the TroA superfamily of helical backbone metal receptor proteins that share a distinct fold and ligand binding mechanism.  They are comprised of two globular subdomains connected by a long alpha helix and they bind their ligand in the cleft between these domains.  In addition, many of these proteins have a low complexity region containing metal binding histidine-rich motif (repetitive HDH sequence)."
definition: >-
  Metal binding protein AdcA. These proteins have been shown to function in the ABC uptake of Zn2+ and Mn2+ and in competence for genetic transformation and adhesion. The AdcA proteins belong to the TroA superfamily of helical backbone metal receptor proteins that share a distinct fold and ligand binding mechanism. They are comprised of two globular subdomains connected by a long alpha helix and they bind their ligand in the cleft between these domains. In addition, many of these proteins have a low complexity region containing metal binding histidine-rich motif (repetitive HDH sequence). — an NCBI CDD conserved domain (cd01017); members share this curated model.
