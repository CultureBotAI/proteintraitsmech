identifier: CDD:cd19550
label: "serpin family A member 2, protease inhibitor 1-like. Protease inhibitor 1-like (also called serpin peptidase inhibitor, clade A (alpha-1 antiproteinase, antitrypsin), member 2, ARGS, protease inhibitor 1 (alpha-1-antitrypsin)-like)/PIL, and alpha-1-antitrypsin-related protein/ATR) belongs to the serpin superfamily and is encoded by the SERPINA2 gene in humans. SERPINA2 was once thought to be a pseudogene, but recent evidence shows that it produces an active transcript. It is very similar in structure and function to SERPINA1. This family belongs to the clade A of the serpin superfamily, which includes the classical serine proteinase inhibitors, alpha-1-antitrypsin and alpha-1-antichymotrypsin, protein C inhibitor, kallistatin, and non-inhibitory serpins, like corticosteroid and thyroxin binding globulins. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
