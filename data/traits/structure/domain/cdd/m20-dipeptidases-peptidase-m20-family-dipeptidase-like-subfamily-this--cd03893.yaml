identifier: CDD:cd03893
label: "M20 Dipeptidases. Peptidase M20 family, dipeptidase-like subfamily. This group contains a large variety of enzymes, including cytosolic nonspecific dipeptidase (CNDP), Xaa-methyl-His dipeptidase (anserinase), canosinase, DUG2 type proteins, as well as many proteins inferred by homology to be dipeptidases. These enzymes have been shown to act on a wide range of dipeptides, but not larger peptides. For example, anserinase mainly catalyzes the hydrolysis of N-alpha-acetylhistidine while carnosinase degrades beta-alanyl-L-histidine. Substrates of CNDP are varied and not limited to Xaa-His dipeptides. DUG2 proteins contain a metallopeptidase domain and a large N-terminal WD40 repeat region, and are involved in the alternative pathway of glutathione degradation."
definition: >-
  M20 Dipeptidases. Peptidase M20 family, dipeptidase-like subfamily. This group contains a large variety of enzymes, including cytosolic nonspecific dipeptidase (CNDP), Xaa-methyl-His dipeptidase (anserinase), canosinase, DUG2 type proteins, as well as many proteins inferred by homology to be dipeptidases. These enzymes have been shown to act on a wide range of dipeptides, but not larger peptides. For example, anserinase mainly catalyzes the hydrolysis of N-alpha-acetylhistidine while carnosinase degrades beta-alanyl-L-histidine. Substrates of CNDP are varied and not limited to Xaa-His dipeptides. DUG2 proteins contain a metallopeptidase domain and a large N-terminal WD40 repeat region, and are involved in the alternative pathway of glutathione degradation. — an NCBI CDD conserved domain (cd03893); members share this curated model.
