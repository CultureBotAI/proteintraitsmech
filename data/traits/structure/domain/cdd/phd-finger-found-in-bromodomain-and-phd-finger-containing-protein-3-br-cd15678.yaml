identifier: CDD:cd15678
label: "PHD finger found in bromodomain and PHD finger-containing protein 3 (BRPF3) and similar proteins. BRPF3 is a homolog of BRPF1 and BRPF2. It is a scaffold protein that forms a novel monocytic leukemic zinc finger protein (MOZ)/MOZ-related factor (MORF) H3 histone acetyltransferase (HAT) complex with other regulatory subunits. BRPF3 contains a canonical Cys4HisCys3 plant homeodomain (PHD) finger followed by a non-canonical extended PHD (ePHD) finger, Cys2HisCys5HisCys2His, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain. This model corresponds to the canonical Cys4HisCys3 PHD finger."
definition: >-
  PHD finger found in bromodomain and PHD finger-containing protein 3 (BRPF3) and similar proteins. BRPF3 is a homolog of BRPF1 and BRPF2. It is a scaffold protein that forms a novel monocytic leukemic zinc finger protein (MOZ)/MOZ-related factor (MORF) H3 histone acetyltransferase (HAT) complex with other regulatory subunits. BRPF3 contains a canonical Cys4HisCys3 plant homeodomain (PHD) finger followed by a non-canonical extended PHD (ePHD) finger, Cys2HisCys5HisCys2His, a bromodomain, and a proline-tryptophan-tryptophan-proline (PWWP) domain. This model corresponds to the canonical Cys4HisCys3 PHD finger. — an NCBI CDD conserved domain (cd15678); members share this curated model.
