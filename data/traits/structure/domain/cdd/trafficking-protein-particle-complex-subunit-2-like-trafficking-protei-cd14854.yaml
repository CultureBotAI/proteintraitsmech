identifier: CDD:cd14854
label: "Trafficking protein particle complex subunit 2-like. Trafficking protein particle complex subunit 2-like (TRAPPC2L) is related to TRAPPC2. Its function is not known, but there are indications that it is part of the TRAPP II complex, which is required for distinct tethering events at Golgi membranes. TRAPPC2 has been identified as a general component of transport protein particle (TRAPP), required for tethering endoplasmic reticulum (ER)-derived vesicles to Golgi membranes and for Golgi traffic."
definition: >-
  Trafficking protein particle complex subunit 2-like. Trafficking protein particle complex subunit 2-like (TRAPPC2L) is related to TRAPPC2. Its function is not known, but there are indications that it is part of the TRAPP II complex, which is required for distinct tethering events at Golgi membranes. TRAPPC2 has been identified as a general component of transport protein particle (TRAPP), required for tethering endoplasmic reticulum (ER)-derived vesicles to Golgi membranes and for Golgi traffic. — an NCBI CDD conserved domain (cd14854); members share this curated model.
