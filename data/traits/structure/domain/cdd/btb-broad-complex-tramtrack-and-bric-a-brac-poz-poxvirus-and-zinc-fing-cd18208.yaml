identifier: CDD:cd18208
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 20 (ZBTB20). ZBTB20, also called dendritic-derived BTB/POZ zinc finger protein (DPZF) or zinc finger protein 288, may be a transcription factor involved in hematopoiesis, oncogenesis, and immune responses. It is an essential regulator of hepatic lipogenesis and may be a therapeutic target for the treatment of fatty liver disease. It also functions as a critical regulator of anterior pituitary development and lactotrope specification. Moreover, it promotes astrocytogenesis during neocortical development. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 20 (ZBTB20). ZBTB20, also called dendritic-derived BTB/POZ zinc finger protein (DPZF) or zinc finger protein 288, may be a transcription factor involved in hematopoiesis, oncogenesis, and immune responses. It is an essential regulator of hepatic lipogenesis and may be a therapeutic target for the treatment of fatty liver disease. It also functions as a critical regulator of anterior pituitary development and lactotrope specification. Moreover, it promotes astrocytogenesis during neocortical development. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18208); members share this curated model.
