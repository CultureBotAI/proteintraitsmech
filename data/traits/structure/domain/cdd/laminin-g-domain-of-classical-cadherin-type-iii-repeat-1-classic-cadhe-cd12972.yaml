identifier: CDD:cd12972
label: "Laminin G domain of classical cadherin type III, repeat 1. Classic cadherins mediate calcium-dependent cell-cell adhesion in a wide range of multicellular organisms. They contain a  highly conserved cytoplasmic domain that associates with catenins. There are 3 types of classical cadherin: type I and II are well-studied and present in chordates and urochordates. Type III was believed to be specific to nonchordate species, but recently vertebrate members were identified. Their extracellular region also has a type III specific domain architecture, called a PCCD complex (primitive classic cadherin domains), between the cadherin repeats and transmembrane domains. The PCCD complex consists of a nonchordate cadherin-specific cadherin motif named NC, laminin-G domains, and  EGF-like motifs. Chicken cadherin type III has been shown to be present in outer part of the early embryonic neural retina, and restricted to horizontal cells at later stages. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Laminin G domain of classical cadherin type III, repeat 1. Classic cadherins mediate calcium-dependent cell-cell adhesion in a wide range of multicellular organisms. They contain a highly conserved cytoplasmic domain that associates with catenins. There are 3 types of classical cadherin: type I and II are well-studied and present in chordates and urochordates. Type III was believed to be specific to nonchordate species, but recently vertebrate members were identified. Their extracellular region also has a type III specific domain architecture, called a PCCD complex (primitive classic cadherin domains), between the cadherin repeats and transmembrane domains. The PCCD complex consists of a nonchordate cadherin-specific cadherin motif named NC, laminin-G domains, and EGF-like motifs. Chicken cadherin type III has been shown to be present in outer part of the early embryonic neural retina, and restricted to horizontal cells at later stages. In general, proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd12972); members share this curated model.
