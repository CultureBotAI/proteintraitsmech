identifier: CDD:cd20453
label: "Tudor domain found in PHD finger protein 20 (PHF20) and similar proteins. PHF20, also called Glioma-expressed antigen 2, hepatocellular carcinoma-associated antigen 58, novel zinc finger protein, or transcription factor TZP (referring to Tudor and zinc finger domain containing protein), is a regulator of NF-kappaB activation by disrupting recruitment of PP2A to p65. It also functions as a transcription factor that binds to Akt and plays a role in Akt cell survival/growth signaling. Moreover, it transcriptionally regulates p53. The phosphorylation of PHF20 on Ser291 mediated by protein kinase B (PKB) is essential in tumorigenesis via the regulation of p53-mediated signaling. PHF20 contains an N-terminal malignant brain tumor (MBT) domain, a Tudor domain, a plant homeodomain (PHD) finger and putative DNA-binding domains AT hook and C2H2-type zinc finger. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in PHD finger protein 20 (PHF20) and similar proteins. PHF20, also called Glioma-expressed antigen 2, hepatocellular carcinoma-associated antigen 58, novel zinc finger protein, or transcription factor TZP (referring to Tudor and zinc finger domain containing protein), is a regulator of NF-kappaB activation by disrupting recruitment of PP2A to p65. It also functions as a transcription factor that binds to Akt and plays a role in Akt cell survival/growth signaling. Moreover, it transcriptionally regulates p53. The phosphorylation of PHF20 on Ser291 mediated by protein kinase B (PKB) is essential in tumorigenesis via the regulation of p53-mediated signaling. PHF20 contains an N-terminal malignant brain tumor (MBT) domain, a Tudor domain, a plant homeodomain (PHD) finger and putative DNA-binding domains AT hook and C2H2-type zinc finger. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20453); members share this curated model.
