identifier: CDD:cd05834
label: "PWWP domain found in hepatoma-derived growth factor (HDGF)-related protein (HRP) family. The HRP family includes hepatoma-derived growth factor (HDGF), and HDGF-related proteins (HRPs). HDGF, also called high mobility group protein 1-like 2 (HMG-1L2), is a heparin-binding protein that acts as a transcriptional repressor with mitogenic activity for fibroblasts. It is a prognostic factor in several types of cancer. HDGFL1 is also called PWWP domain-containing protein 1 (PWWP1). Its biological function remains unclear. HDGFL2, also called HDGF-related protein 2 (HRP-2), or hepatoma-derived growth factor 2 (HDGF-2), is involved in cellular growth control, through the regulation of cyclin D1 expression. HDGFL3, also called HDGF-related protein 3 (HRP-3), enhances DNA synthesis and may play a role in cell proliferation. The family also includes PC4 and SFRS1-interacting protein (PSIP) and similar proteins. PSIP, also called CLL-associated antigen KW-7, dense fine speckles 70 kDa protein (DFS 70), lens epithelium-derived growth factor (LEDGF), or transcriptional coactivator p75/p52, acts as a transcriptional coactivator involved in neuroepithelial stem cell differentiation and neurogenesis. Members of the HRP family contains a PWWP domain, which is necessary for DNA binding."
definition: >-
  PWWP domain found in hepatoma-derived growth factor (HDGF)-related protein (HRP) family. The HRP family includes hepatoma-derived growth factor (HDGF), and HDGF-related proteins (HRPs). HDGF, also called high mobility group protein 1-like 2 (HMG-1L2), is a heparin-binding protein that acts as a transcriptional repressor with mitogenic activity for fibroblasts. It is a prognostic factor in several types of cancer. HDGFL1 is also called PWWP domain-containing protein 1 (PWWP1). Its biological function remains unclear. HDGFL2, also called HDGF-related protein 2 (HRP-2), or hepatoma-derived growth factor 2 (HDGF-2), is involved in cellular growth control, through the regulation of cyclin D1 expression. HDGFL3, also called HDGF-related protein 3 (HRP-3), enhances DNA synthesis and may play a role in cell proliferation. The family also includes PC4 and SFRS1-interacting protein (PSIP) and similar proteins. PSIP, also called CLL-associated antigen KW-7, dense fine speckles 70 kDa protein (DFS 70), lens epithelium-derived growth factor (LEDGF), or transcriptional coactivator p75/p52, acts as a transcriptional coactivator involved in neuroepithelial stem cell differentiation and neurogenesis. Members of the HRP family contains a PWWP domain, which is necessary for DNA binding. — an NCBI CDD conserved domain (cd05834); members share this curated model.
