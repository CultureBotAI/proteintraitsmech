identifier: CDD:cd02240
label: "Oxalate decarboxylase (OxDC), cupin domain. Oxalate decarboxylase (OxDC; EC 4.1.1.2) is a manganese-dependent bicupin that catalyzes the conversion of oxalate to formate and carbon dioxide, utilizing dioxygen as a cofactor. It is evolutionarily related to oxalate oxidase (OxOx or germin; EC 1.2.3.4) which, in contrast, converts oxalate and dioxygen to carbon dioxide and hydrogen peroxide. OxDC is classified as a bicupin because it contains two cupin folds and both domains are included in this alignment.  Each OxDC cupin domain contains one manganese binding site, with four manganese binding residues (three histidines and one glutamate) conserved as well as a number of hydrophobic residues. Members of this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  Oxalate decarboxylase (OxDC), cupin domain. Oxalate decarboxylase (OxDC; EC 4.1.1.2) is a manganese-dependent bicupin that catalyzes the conversion of oxalate to formate and carbon dioxide, utilizing dioxygen as a cofactor. It is evolutionarily related to oxalate oxidase (OxOx or germin; EC 1.2.3.4) which, in contrast, converts oxalate and dioxygen to carbon dioxide and hydrogen peroxide. OxDC is classified as a bicupin because it contains two cupin folds and both domains are included in this alignment. Each OxDC cupin domain contains one manganese binding site, with four manganese binding residues (three histidines and one glutamate) conserved as well as a number of hydrophobic residues. Members of this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd02240); members share this curated model.
