identifier: CDD:cd05938
label: "Fatty acid transport proteins (FATP) including hsFATP2, hsFATP5, and hsFATP6, and similar proteins. Fatty acid transport proteins (FATP) of this family transport long-chain or very-long-chain fatty acids across the plasma membrane. At least five copies of FATPs are identified in mammalian cells. This family includes hsFATP2, hsFATP5, and hsFATP6, and similar proteins. Each FATP has unique patterns of tissue distribution. These FATPs also have fatty acid CoA synthetase activity, thus playing dual roles as fatty acid transporters and its activation enzymes. The hsFATP proteins exist in two splice variants; the b variant, lacking exon 3, has no acyl-CoA synthetase activity. FATPs are key players in the trafficking of exogenous fatty acids into the cell and in intracellular fatty acid homeostasis."
definition: >-
