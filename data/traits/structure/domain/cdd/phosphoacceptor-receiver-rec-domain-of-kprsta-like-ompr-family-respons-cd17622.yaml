identifier: CDD:cd17622
label: "phosphoacceptor receiver (REC) domain of kpRstA-like OmpR family response regulators. Klebsiella pneumoniae RstA (kpRstA) is part of the RstA/RstB two-component regulatory system that may play a regulatory role in virulence. It belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of kpRstA-like OmpR family response regulators. Klebsiella pneumoniae RstA (kpRstA) is part of the RstA/RstB two-component regulatory system that may play a regulatory role in virulence. It belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17622); members share this curated model.
