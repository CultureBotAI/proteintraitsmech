identifier: CDD:cd15667
label: "Extended PHD finger found in Saccharomyces cerevisiae SANT domain-containing protein 2 (Snt2p) and similar proteins. The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the ePHD finger of Snt2p. Sntp2 is a yeast protein that may function in multiple stress pathways. It coordinates the transcriptional response to hydrogen peroxide-mediated oxidative stress through interaction with Ecm5 and the Rpd3 deacetylase. Snt2p contains a bromo adjacent homology (BAH) domain, two canonical PHD fingers, a non-canonical ePHD finger, and a SANT (SWI3, ADA2, N-CoR and TFIIIB) DNA-binding domain."
definition: >-
  Extended PHD finger found in Saccharomyces cerevisiae SANT domain-containing protein 2 (Snt2p) and similar proteins. The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the ePHD finger of Snt2p. Sntp2 is a yeast protein that may function in multiple stress pathways. It coordinates the transcriptional response to hydrogen peroxide-mediated oxidative stress through interaction with Ecm5 and the Rpd3 deacetylase. Snt2p contains a bromo adjacent homology (BAH) domain, two canonical PHD fingers, a non-canonical ePHD finger, and a SANT (SWI3, ADA2, N-CoR and TFIIIB) DNA-binding domain. — an NCBI CDD conserved domain (cd15667); members share this curated model.
