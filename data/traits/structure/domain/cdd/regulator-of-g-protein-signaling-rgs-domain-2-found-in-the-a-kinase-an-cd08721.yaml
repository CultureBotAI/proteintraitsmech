identifier: CDD:cd08721
label: "Regulator of G protein signaling (RGS) domain 2 found in the A-kinase anchoring protein, D-AKAP2. The RGS (Regulator of G-protein Signaling) domain is an essential part of the D-AKAP2 (A-kinase anchoring protein), a member of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. D-AKAP2 contains two RGS domains which play an important role in spatiotemporal localization of cAMP-dependent PKA (cyclic AMP-dependent protein kinase) that regulates many different signaling pathways by phosphorylation of target proteins. This cd contains the second RGS domain."
definition: >-
  Regulator of G protein signaling (RGS) domain 2 found in the A-kinase anchoring protein, D-AKAP2. The RGS (Regulator of G-protein Signaling) domain is an essential part of the D-AKAP2 (A-kinase anchoring protein), a member of the RGS protein family. They are a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). RGS proteins regulate many aspects of embryonic development such as glial differentiation, embryonic axis formation, skeletal and muscle development, cell migration during early embryogenesis, as well as apoptosis, cell proliferation, and modulation of cardiac development. D-AKAP2 contains two RGS domains which play an important role in spatiotemporal localization of cAMP-dependent PKA (cyclic AMP-dependent protein kinase) that regulates many different signaling pathways by phosphorylation of target proteins. This cd contains the second RGS domain. — an NCBI CDD conserved domain (cd08721); members share this curated model.
