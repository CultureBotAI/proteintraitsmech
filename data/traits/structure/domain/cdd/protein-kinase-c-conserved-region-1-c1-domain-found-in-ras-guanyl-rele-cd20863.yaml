identifier: CDD:cd20863
label: "protein kinase C conserved region 1 (C1 domain) found in RAS guanyl-releasing protein 4 (RASGRP4) and similar proteins. RASGRP4 functions as a cation- and diacylglycerol (DAG)-regulated nucleotide exchange factor activating Ras through the exchange of bound GDP for GTP. It may function in mast cell differentiation. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in RAS guanyl-releasing protein 4 (RASGRP4) and similar proteins. RASGRP4 functions as a cation- and diacylglycerol (DAG)-regulated nucleotide exchange factor activating Ras through the exchange of bound GDP for GTP. It may function in mast cell differentiation. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20863); members share this curated model.
