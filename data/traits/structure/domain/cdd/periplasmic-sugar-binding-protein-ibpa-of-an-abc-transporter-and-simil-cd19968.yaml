identifier: CDD:cd19968
label: "periplasmic sugar-binding protein IbpA of an ABC transporter and similar proteins. The periplasmic binding protein (PBP) IbpA mediates the uptake of myo-inositol by an ABC transporter that consists of the PBP IbpA, the transmembrane permease IatP, and the ABC IatA. IbpA shares homology with a family of pentose/hexose sugar-binding proteins of the type 1 periplasmic binding protein superfamily, which consists of two domains connected by a three-stranded hinge."
definition: >-
  periplasmic sugar-binding protein IbpA of an ABC transporter and similar proteins. The periplasmic binding protein (PBP) IbpA mediates the uptake of myo-inositol by an ABC transporter that consists of the PBP IbpA, the transmembrane permease IatP, and the ABC IatA. IbpA shares homology with a family of pentose/hexose sugar-binding proteins of the type 1 periplasmic binding protein superfamily, which consists of two domains connected by a three-stranded hinge. — an NCBI CDD conserved domain (cd19968); members share this curated model.
