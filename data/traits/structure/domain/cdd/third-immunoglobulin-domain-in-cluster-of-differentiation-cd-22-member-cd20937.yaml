identifier: CDD:cd20937
label: "Third immunoglobulin domain in Cluster of Differentiation (CD) 22; member of the Constant 2 (C2)-set of IgSF domains. The members here are composed of the third immunoglobulin domain in Cluster of Differentiation (CD) 22 (also known as Siglec-2).  CD22, a sialic-acid binding immunoglobulin type-lectin (Siglec) family member, is an inhibitory co-receptor of the B-cell receptor (BCR). The inhibitory function of CD22 and its restricted expression on B cells makes CD22 an attractive target against dysregulated B cells that cause autoimmune diseases and B-cell-derived cancers. CD22 plays a vital role in establishing a baseline level of B-cell inhibition, and thus is an important determinant of homeostasis in humoral immunity. Siglecs are primarily expressed on immune cells and recognize sialic acid-containing glycan ligands. Siglecs are organized as an extracellular module composed of Ig-like domains (an N-terminal variable set of Ig-like carbohydrate recognition domains, and 1 to 16 constant Ig-like domains), followed by transmembrane and short cytoplasmic domains. Human Siglecs are classified into two subgroups, one subgroup is comprised of sialoadhesin (Siglec-1), CD22 (Siglec-2), and MAG (Siglec-4, myelin-associated glycoprotein), the other subgroup is comprised of CD33-related Siglecs which include CD33 (Siglec-3) and human Siglecs 5-11. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the C2-set of IgSF domains, having A, B, and E strands in one beta-sheet and A', G, F, C' in the other. Unlike other Ig domain sets, the C2-set lacks the D strand."
definition: >-
  Third immunoglobulin domain in Cluster of Differentiation (CD) 22; member of the Constant 2 (C2)-set of IgSF domains. The members here are composed of the third immunoglobulin domain in Cluster of Differentiation (CD) 22 (also known as Siglec-2). CD22, a sialic-acid binding immunoglobulin type-lectin (Siglec) family member, is an inhibitory co-receptor of the B-cell receptor (BCR). The inhibitory function of CD22 and its restricted expression on B cells makes CD22 an attractive target against dysregulated B cells that cause autoimmune diseases and B-cell-derived cancers. CD22 plays a vital role in establishing a baseline level of B-cell inhibition, and thus is an important determinant of homeostasis in humoral immunity. Siglecs are primarily expressed on immune cells and recognize sialic acid-containing glycan ligands. Siglecs are organized as an extracellular module composed of Ig-like domains (an N-terminal variable set of Ig-like carbohydrate recognition domains, and 1 to 16 constant Ig-like domains), followed by transmembrane and short cytoplasmic domains. Human Siglecs are classified into two subgroups, one subgroup is comprised of sialoadhesin (Siglec-1), CD22 (Siglec-2), and MAG (Siglec-4, myelin-associated glycoprotein), the other subgroup is comprised of CD33-related Siglecs which include CD33 (Siglec-3) and human Siglecs 5-11. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the C2-set of IgSF domains, having A, B, and E strands in one beta-sheet and A', G, F, C' in the other. Unlike other Ig domain sets, the C2-set lacks the D strand. — an NCBI CDD conserved domain (cd20937); members share this curated model.
