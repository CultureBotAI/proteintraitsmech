identifier: CDD:cd01513
label: "Domain III of Elongation factor (EF) Tu (EF-TU) and related proteins. Elongation factor (EF) EF-Tu participates in the elongation phase during protein biosynthesis on the ribosome. Its functional cycles depend on GTP binding and its hydrolysis. The EF-Tu complexed with GTP and aminoacyl-tRNA delivers tRNA to the ribosome, whereas EF-G stimulates translocation, a process in which tRNA and mRNA movements occur in the ribosome. Experimental findings indicate an essential contribution of domain III to activation of GTP hydrolysis. This domain III, which is distinct from the domain III in EFG and related elongation factors, is found in several eukaryotic translation factors, like peptide chain release factors RF3, elongation factor 1, selenocysteine (Sec)-specific elongation factor, and in GT-1 family of GTPase (GTPBP1)."
definition: >-
  Domain III of Elongation factor (EF) Tu (EF-TU) and related proteins. Elongation factor (EF) EF-Tu participates in the elongation phase during protein biosynthesis on the ribosome. Its functional cycles depend on GTP binding and its hydrolysis. The EF-Tu complexed with GTP and aminoacyl-tRNA delivers tRNA to the ribosome, whereas EF-G stimulates translocation, a process in which tRNA and mRNA movements occur in the ribosome. Experimental findings indicate an essential contribution of domain III to activation of GTP hydrolysis. This domain III, which is distinct from the domain III in EFG and related elongation factors, is found in several eukaryotic translation factors, like peptide chain release factors RF3, elongation factor 1, selenocysteine (Sec)-specific elongation factor, and in GT-1 family of GTPase (GTPBP1). — an NCBI CDD conserved domain (cd01513); members share this curated model.
