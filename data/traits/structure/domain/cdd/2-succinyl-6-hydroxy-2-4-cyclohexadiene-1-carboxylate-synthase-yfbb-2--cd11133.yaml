label: "2-succinyl-6-hydroxy-2,4-cyclohexadiene-1-carboxylate synthase (yfbB). 2-succinyl-6-hydroxy-2,4-cyclohexadiene-1-carboxylate synthase (yfbB, MenH, MenD) participates in the biosynthesis of menaquinone, a lipid-soluble molecule that functions as an electron carrier in the respiratory chains of several bacteria."
