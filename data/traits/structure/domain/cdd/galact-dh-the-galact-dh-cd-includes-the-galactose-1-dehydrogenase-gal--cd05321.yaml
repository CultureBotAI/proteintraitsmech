identifier: CDD:cd05321
label: "Galact_DH. The Galact-DH CD includes the galactose 1-dehydrogenase, Gal-dh, found in Pseudomonas fluorescens and other related sequences. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins. Glucose-fructose oxidoreductase superfamily (GFOR_SF); these proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins."
definition: >-
  Galact_DH. The Galact-DH CD includes the galactose 1-dehydrogenase, Gal-dh, found in Pseudomonas fluorescens and other related sequences. Members of this CD appear to contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins. Glucose-fructose oxidoreductase superfamily (GFOR_SF); these proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins. — an NCBI CDD conserved domain (cd05321); members share this curated model.
