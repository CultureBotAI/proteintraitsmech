identifier: CDD:cd15098
label: "galanin receptor subtype 1, member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled galanin receptors bind galanin, a neuropeptide that is widely expressed in the brain, peripheral tissues, and endocrine glands. Three receptors subtypes have been so far identified: GAL1, GAL2, and GAL3. The specific functions of each subtype remains mostly unknown, although galanin is thought to be involved in a variety of neuronal functions such as hormone release and food intake. Galanin is implicated in numerous neurological and psychiatric diseases including Alzheimer's disease, depression, eating disorders, epilepsy and stroke, among many others."
