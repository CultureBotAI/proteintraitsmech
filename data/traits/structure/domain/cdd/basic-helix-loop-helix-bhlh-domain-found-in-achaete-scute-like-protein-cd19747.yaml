identifier: CDD:cd19747
label: "basic helix-loop-helix (bHLH) domain found in achaete-scute-like protein 5 (ASCL-5) and similar proteins. ASCL-5, also termed Class A basic helix-loop-helix protein 47 (bHLHa47), or achaete-scute homolog 5 (ASH-5), is an uncharacterized bHLH transcription factor that belongs to AS-C (achaete, scute, lethal of scute, and asense) family."
definition: >-
