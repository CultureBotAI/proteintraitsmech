identifier: CDD:cd02191
label: "Subfamily of FitZ and Cell-structure-related euryarchaeota tubulin/FtsZ homolog-like. FtsZ is a GTPase that is similar to the eukaryotic tubulins and is essential for cell division in prokaryotes.  CetZ-like proteins are related to tubulin and FtsZ and co-exists with FtsZ in many archaea. However, a recent study found that Cetz proteins (formerly annotated FtsZ type 2) are not required for cell division. Instead, CetZ proteins are shown to be involved in controlling archaeal cell shape dynamics.  The results from inactivation studies of CetZ proteins in Haloferax volcanii suggest that CetZ1 is essential for normal swimming motility and rod-cell development."
definition: >-
  Subfamily of FitZ and Cell-structure-related euryarchaeota tubulin/FtsZ homolog-like. FtsZ is a GTPase that is similar to the eukaryotic tubulins and is essential for cell division in prokaryotes. CetZ-like proteins are related to tubulin and FtsZ and co-exists with FtsZ in many archaea. However, a recent study found that Cetz proteins (formerly annotated FtsZ type 2) are not required for cell division. Instead, CetZ proteins are shown to be involved in controlling archaeal cell shape dynamics. The results from inactivation studies of CetZ proteins in Haloferax volcanii suggest that CetZ1 is essential for normal swimming motility and rod-cell development. — an NCBI CDD conserved domain (cd02191); members share this curated model.
