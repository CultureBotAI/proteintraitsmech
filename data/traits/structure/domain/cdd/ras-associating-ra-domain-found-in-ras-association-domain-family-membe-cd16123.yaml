identifier: CDD:cd16123
label: "Ras-associating (RA) domain found in Ras-association domain family members, RASSF7, RASSF8, RASSF9, and RASSF10. The RASSF family of proteins shares a conserved RalGDS/AF6 Ras association (RA) domain either in the C-terminus (RASSF1-6) or N-terminus (RASSF7-10). RASSF7-10 lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that is found in members of the RASSF1-6 family. The structural differences between the C-terminus and N-terminus RASSF subgroups have led to the suggestion that they are two distinct families. RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ras proteins are small GTPases that are involved in cellular signal transduction. The N-terminus RASSF proteins are potential Ras effectors that have been linked to key biological processes, including cell death, proliferation, microtubule stability, promoter methylation, vesicle trafficking and response to hypoxia."
definition: >-
  Ras-associating (RA) domain found in Ras-association domain family members, RASSF7, RASSF8, RASSF9, and RASSF10. The RASSF family of proteins shares a conserved RalGDS/AF6 Ras association (RA) domain either in the C-terminus (RASSF1-6) or N-terminus (RASSF7-10). RASSF7-10 lacks a conserved SARAH (Salvador/RASSF/Hpo) motif adjacent to the RA domain that is found in members of the RASSF1-6 family. The structural differences between the C-terminus and N-terminus RASSF subgroups have led to the suggestion that they are two distinct families. RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ras proteins are small GTPases that are involved in cellular signal transduction. The N-terminus RASSF proteins are potential Ras effectors that have been linked to key biological processes, including cell death, proliferation, microtubule stability, promoter methylation, vesicle trafficking and response to hypoxia. — an NCBI CDD conserved domain (cd16123); members share this curated model.
