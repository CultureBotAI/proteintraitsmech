identifier: CDD:cd08101
label: "ATP-grasp domain of circularly permuted glutathionylspermidine synthetase and trypanothione synthetase. ATP-grasp domain of glutathionylspermidine synthetase (GspS; EC: 6.3.1.8), and trypanothione synthetase (TryS; EC: 6.3.1.9). These enzymes catalyze the biosynthesis of trypanothione by conjugating glutathione (GSH) to the two terminal amino groups of spermidine in the presence of ATP. Mg ions are utilized as a cofactor. The C-terminal end of this protein belongs to the ATP-grasp superfamily. Just like the human Glutathione Synthetase (hGS), GspS and TryS also display a rare gene permutation that results into a circular shift in the core structure of GspS and TryS with respect to other members of ATP-grasp superfamily. Most of the members of this group are bifunctional, having both amidase as well as synthetase activity. EcGSPS (E. coli glutathionylspermidine synthetase), LmTSA (L. major trypanothione synthetase-amidase), and gssA (from Pseudoalteromonas haloplanktis TAC125) belong to this group."
definition: >-
  ATP-grasp domain of circularly permuted glutathionylspermidine synthetase and trypanothione synthetase. ATP-grasp domain of glutathionylspermidine synthetase (GspS; EC: 6.3.1.8), and trypanothione synthetase (TryS; EC: 6.3.1.9). These enzymes catalyze the biosynthesis of trypanothione by conjugating glutathione (GSH) to the two terminal amino groups of spermidine in the presence of ATP. Mg ions are utilized as a cofactor. The C-terminal end of this protein belongs to the ATP-grasp superfamily. Just like the human Glutathione Synthetase (hGS), GspS and TryS also display a rare gene permutation that results into a circular shift in the core structure of GspS and TryS with respect to other members of ATP-grasp superfamily. Most of the members of this group are bifunctional, having both amidase as well as synthetase activity. EcGSPS (E. coli glutathionylspermidine synthetase), LmTSA (L. major trypanothione synthetase-amidase), and gssA (from Pseudoalteromonas haloplanktis TAC125) belong to this group. — an NCBI CDD conserved domain (cd08101); members share this curated model.
