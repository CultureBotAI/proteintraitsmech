identifier: CDD:cd20431
label: "Tudor domain found in Tudor domain-containing protein 9 (TDRD9) and similar proteins. TDRD9 is an ATP-dependent DEAD-like RNA helicase required during spermatogenesis. It is involved in the biosynthesis of PIWI-interacting RNAs (piRNAs). A recessive deleterious mutation mutation in TDRD9 causes non-obstructive azoospermia in infertile men. TDRD9 contains an N-terminal HrpA-like RNA helicase module and a Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Tudor domain-containing protein 9 (TDRD9) and similar proteins. TDRD9 is an ATP-dependent DEAD-like RNA helicase required during spermatogenesis. It is involved in the biosynthesis of PIWI-interacting RNAs (piRNAs). A recessive deleterious mutation mutation in TDRD9 causes non-obstructive azoospermia in infertile men. TDRD9 contains an N-terminal HrpA-like RNA helicase module and a Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20431); members share this curated model.
