identifier: CDD:cd11972
label: "Src homology 3 domain of Abl Interactor 2. Abi2 is highly expressed in the brain and eye. It regulates actin cytoskeletal reorganization at adherens junctions and dendritic spines, which is important in cell morphogenesis, migration, and cognitive function. Mice deficient with Abi2 show defects in orientation and migration of lens fibers, neuronal migration, dendritic spine morphology, as well as deficits in learning and memory. Abi proteins are adaptor proteins serving as binding partners and substrates of Abl tyrosine kinases. They are involved in regulating actin cytoskeletal reorganization and play important roles in membrane-ruffling, endocytosis, cell motility, and cell migration. Abi proteins contain a homeobox homology domain, a proline-rich region, and a SH3 domain. The SH3 domain of Abi binds to a PxxP motif in Abl. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Abl Interactor 2. Abi2 is highly expressed in the brain and eye. It regulates actin cytoskeletal reorganization at adherens junctions and dendritic spines, which is important in cell morphogenesis, migration, and cognitive function. Mice deficient with Abi2 show defects in orientation and migration of lens fibers, neuronal migration, dendritic spine morphology, as well as deficits in learning and memory. Abi proteins are adaptor proteins serving as binding partners and substrates of Abl tyrosine kinases. They are involved in regulating actin cytoskeletal reorganization and play important roles in membrane-ruffling, endocytosis, cell motility, and cell migration. Abi proteins contain a homeobox homology domain, a proline-rich region, and a SH3 domain. The SH3 domain of Abi binds to a PxxP motif in Abl. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11972); members share this curated model.
