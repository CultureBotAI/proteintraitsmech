identifier: CDD:cd09587
label: "SAM domain of HARP subfamily. SAM (sterile alpha motif) domain of HARP (Harmonin-interacting Ankyrin Repeat-containing) proteins, also known as ANKS4B, is a protein-protein interaction domain. Proteins of this subfamily have an N-terminal ankyrin repeat region and C-terminal SAM. In mouse epithelial tissues, HARP protein interacts with the PDZ domain of harmonin. This scaffolding complex facilitates signal transduction in epithelia. HARP was found co-expressed with harmonin in a number of epithelial cells including pancreatic ductal epithelium, embryonic epithelia of the lung, kidney, salivary glands, and cochlea."
definition: >-
  SAM domain of HARP subfamily. SAM (sterile alpha motif) domain of HARP (Harmonin-interacting Ankyrin Repeat-containing) proteins, also known as ANKS4B, is a protein-protein interaction domain. Proteins of this subfamily have an N-terminal ankyrin repeat region and C-terminal SAM. In mouse epithelial tissues, HARP protein interacts with the PDZ domain of harmonin. This scaffolding complex facilitates signal transduction in epithelia. HARP was found co-expressed with harmonin in a number of epithelial cells including pancreatic ductal epithelium, embryonic epithelia of the lung, kidney, salivary glands, and cochlea. — an NCBI CDD conserved domain (cd09587); members share this curated model.
