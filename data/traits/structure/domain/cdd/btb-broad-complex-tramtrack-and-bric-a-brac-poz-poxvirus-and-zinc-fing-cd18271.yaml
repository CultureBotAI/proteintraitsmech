identifier: CDD:cd18271
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch repeat and BTB domain-containing protein 3 (KBTBD3). KBTBD3, also called BTB and kelch domain-containing protein 3 (BKLHD3), contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch repeat and BTB domain-containing protein 3 (KBTBD3). KBTBD3, also called BTB and kelch domain-containing protein 3 (BKLHD3), contains a BTB domain and kelch repeats, characteristics of a kelch family protein. Its function remains unclear. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18271); members share this curated model.
