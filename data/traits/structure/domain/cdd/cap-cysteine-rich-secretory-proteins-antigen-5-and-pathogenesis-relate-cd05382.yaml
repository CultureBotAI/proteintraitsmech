identifier: CDD:cd05382
label: "CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of Golgi-associated plant pathogenesis-related protein 1 and similar proteins. Golgi-associated plant pathogenesis related protein 1 (GAPR1), also called Golgi-associated PR-1 protein or glioma pathogenesis-related protein 2 (GLIPR-2), forms amyloid-like fibrils in the presence of liposomes containing acidic phospholipids. It has been identified in mice as an up-regulated protein in kidney fibrosis, and is involved in epithelial to mesenchymal transition and in generating a pool of myofibroblasts contributing to fibrosis. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others."
definition: >-
  CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of Golgi-associated plant pathogenesis-related protein 1 and similar proteins. Golgi-associated plant pathogenesis related protein 1 (GAPR1), also called Golgi-associated PR-1 protein or glioma pathogenesis-related protein 2 (GLIPR-2), forms amyloid-like fibrils in the presence of liposomes containing acidic phospholipids. It has been identified in mice as an up-regulated protein in kidney fibrosis, and is involved in epithelial to mesenchymal transition and in generating a pool of myofibroblasts contributing to fibrosis. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. — an NCBI CDD conserved domain (cd05382); members share this curated model.
