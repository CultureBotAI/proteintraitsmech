identifier: CDD:cd21438
label: "coiled-coil domain 1 of SUN domain-containing protein 2 and similar proteins. SUN domain-containing protein 2 (SUN2), also called protein unc-84 homolog B, Rab5-interacting protein (Rab5IP), or Sad1/unc-84 protein-like 2, is a component of the LINC (LInker of Nucleoskeleton and Cytoskeleton) complex which is involved in the connection between the nuclear lamina and the cytoskeleton. Besides the core SUN domain, SUN2 contains two coiled-coil domains (CC1 and CC2), which act as the intrinsic dynamic regulators for controlling the activity of the SUN domain. This model corresponds to CC1 that functions as an activation segment to release CC2-mediated inhibition of the SUN domain."
definition: >-
  coiled-coil domain 1 of SUN domain-containing protein 2 and similar proteins. SUN domain-containing protein 2 (SUN2), also called protein unc-84 homolog B, Rab5-interacting protein (Rab5IP), or Sad1/unc-84 protein-like 2, is a component of the LINC (LInker of Nucleoskeleton and Cytoskeleton) complex which is involved in the connection between the nuclear lamina and the cytoskeleton. Besides the core SUN domain, SUN2 contains two coiled-coil domains (CC1 and CC2), which act as the intrinsic dynamic regulators for controlling the activity of the SUN domain. This model corresponds to CC1 that functions as an activation segment to release CC2-mediated inhibition of the SUN domain. — an NCBI CDD conserved domain (cd21438); members share this curated model.
