identifier: CDD:cd23938
label: "C-terminal catalytic domain of bacterial aspartate beta-semialdehyde dehydrogenase (ASADH) and similar proteins. The family corresponds to a branch of bacterial aspartate beta-semialdehyde dehydrogenase (ASADH) enzymes mainly found in proteobacteria, such as Escherichia coli, Haemophilus influenzae, Pseudomonas aeruginosa and Vibrio cholerae. These proteins have similar overall folds and domain organizations but share less sequence homology with fungal and archaeal ASADHs. ASADH (EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the NADPH-dependent formation of L-aspartate-semialdehyde (ASA) by the reductive dephosphorylation of L-aspartyl-4-phosphate, which is the second step of the aspartate biosynthetic pathway. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. ASADH contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain and are members of the GAPDH superfamily of proteins."
definition: >-
  C-terminal catalytic domain of bacterial aspartate beta-semialdehyde dehydrogenase (ASADH) and similar proteins. The family corresponds to a branch of bacterial aspartate beta-semialdehyde dehydrogenase (ASADH) enzymes mainly found in proteobacteria, such as Escherichia coli, Haemophilus influenzae, Pseudomonas aeruginosa and Vibrio cholerae. These proteins have similar overall folds and domain organizations but share less sequence homology with fungal and archaeal ASADHs. ASADH (EC 1.2.1.11), also called ASA dehydrogenase (ASD), or aspartate-beta-semialdehyde dehydrogenase, catalyzes the NADPH-dependent formation of L-aspartate-semialdehyde (ASA) by the reductive dephosphorylation of L-aspartyl-4-phosphate, which is the second step of the aspartate biosynthetic pathway. ASA can either be further reduced to homoserine, which leads to methionine, threonine, or isoleucine, or it can be condensed with pyruvate and cyclized into dihydrodipicolinate, and then converted into diaminopimelate, a component of bacterial cell walls, and finally decarboxylated to produce lysine. ASADH contains an N-terminal Rossmann fold NAD(P) binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like catalytic domain and are members of the GAPDH superfamily of proteins. — an NCBI CDD conserved domain (cd23938); members share this curated model.
