identifier: CDD:cd16297
label: "artemis-SNM1C and related proteins; MBL-fold metallo-hydrolase domain. Includes the nuclease artemis (also known as SNM1C, SNM1 homolog C, SNM1-like protein and DNA cross-link repair 1C protein) which plays a role in V(D)J recombination/DNA repair. Purified artemis protein possesses single-strand-specific 5' to 3' exonuclease activity. Upon complex formation with, and phosphorylation by, DNA-dependent protein kinase, artemis gains endonucleolytic activity on hairpins and 5' and 3' overhangs. Inactivation of Artemis causes severe combined immunodeficiency (SCID). Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  artemis-SNM1C and related proteins; MBL-fold metallo-hydrolase domain. Includes the nuclease artemis (also known as SNM1C, SNM1 homolog C, SNM1-like protein and DNA cross-link repair 1C protein) which plays a role in V(D)J recombination/DNA repair. Purified artemis protein possesses single-strand-specific 5' to 3' exonuclease activity. Upon complex formation with, and phosphorylation by, DNA-dependent protein kinase, artemis gains endonucleolytic activity on hairpins and 5' and 3' overhangs. Inactivation of Artemis causes severe combined immunodeficiency (SCID). Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd16297); members share this curated model.
