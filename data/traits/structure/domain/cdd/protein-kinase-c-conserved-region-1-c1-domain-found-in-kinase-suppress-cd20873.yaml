identifier: CDD:cd20873
label: "protein kinase C conserved region 1 (C1 domain) found in kinase suppressor of Ras 2 (KSR2) and similar proteins. KSR2 interacts with the protein phosphatase calcineurin and functions in calcium-mediated ERK signaling. It also functions in energy metabolism by regulating AMP kinase and AMPK-dependent processes such as glucose uptake and fatty acid oxidation. KSR proteins act as scaffold proteins that function downstream of Ras and upstream of Raf in the Extracellular signal-Regulated Kinase (ERK) pathway that regulates many cellular processes including cycle regulation, proliferation, differentiation, survival, and apoptosis. KSR proteins regulate the assembly and activation of the Raf/MEK/ERK module upon Ras activation at the membrane by direct association of its components. They are widely regarded as pseudokinases. KSR proteins contain a SAM-like domain, a zinc finger cysteine-rich domain (C1), and a pseudokinase domain. This model describes the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in kinase suppressor of Ras 2 (KSR2) and similar proteins. KSR2 interacts with the protein phosphatase calcineurin and functions in calcium-mediated ERK signaling. It also functions in energy metabolism by regulating AMP kinase and AMPK-dependent processes such as glucose uptake and fatty acid oxidation. KSR proteins act as scaffold proteins that function downstream of Ras and upstream of Raf in the Extracellular signal-Regulated Kinase (ERK) pathway that regulates many cellular processes including cycle regulation, proliferation, differentiation, survival, and apoptosis. KSR proteins regulate the assembly and activation of the Raf/MEK/ERK module upon Ras activation at the membrane by direct association of its components. They are widely regarded as pseudokinases. KSR proteins contain a SAM-like domain, a zinc finger cysteine-rich domain (C1), and a pseudokinase domain. This model describes the C1 domain. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20873); members share this curated model.
