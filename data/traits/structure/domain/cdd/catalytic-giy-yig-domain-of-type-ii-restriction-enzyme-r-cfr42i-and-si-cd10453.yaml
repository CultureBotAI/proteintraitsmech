identifier: CDD:cd10453
label: "Catalytic GIY-YIG domain of type II restriction enzyme R.Cfr42I and similar proteins. This family corresponds to the catalytic GIY-YIG domain of GGCGCC-specific type II restriction endonucleases R.Cfr42I and similar proteins. R.Cfr42I is encoded on plasmid pET21b(+) in the Citrobacter freundii RFL42 strain. This enzyme recognizes the palindromic 5'-CCGC/GG-3' target and cuts between Cyt4 and Gua5 on each strand of the restriction site to generate 3'-staggered ends. It is an isoschizomer of R.Eco29kI. Unlike R.Eco29kI, R.Cfr42I is functional as a homotetramer, binding and cleaving two cognate DNA molecules in a cooperative manner. Members in this family are single-domain proteins sharing sequence similarities with the catalytic domain of GIY-YIG endonucleases, such as  homing endonuclease I-TevI. However, they utilize loop insertions and terminal extensions instead of the separate DNA-binding domain to interact with the target site 5'-CCGC/GG-3'. A divalent metal-ion cofactor is required for their catalysis."
definition: >-
  Catalytic GIY-YIG domain of type II restriction enzyme R.Cfr42I and similar proteins. This family corresponds to the catalytic GIY-YIG domain of GGCGCC-specific type II restriction endonucleases R.Cfr42I and similar proteins. R.Cfr42I is encoded on plasmid pET21b(+) in the Citrobacter freundii RFL42 strain. This enzyme recognizes the palindromic 5'-CCGC/GG-3' target and cuts between Cyt4 and Gua5 on each strand of the restriction site to generate 3'-staggered ends. It is an isoschizomer of R.Eco29kI. Unlike R.Eco29kI, R.Cfr42I is functional as a homotetramer, binding and cleaving two cognate DNA molecules in a cooperative manner. Members in this family are single-domain proteins sharing sequence similarities with the catalytic domain of GIY-YIG endonucleases, such as homing endonuclease I-TevI. However, they utilize loop insertions and terminal extensions instead of the separate DNA-binding domain to interact with the target site 5'-CCGC/GG-3'. A divalent metal-ion cofactor is required for their catalysis. — an NCBI CDD conserved domain (cd10453); members share this curated model.
