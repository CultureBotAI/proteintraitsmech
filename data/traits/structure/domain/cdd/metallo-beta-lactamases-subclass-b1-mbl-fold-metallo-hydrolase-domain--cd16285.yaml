identifier: CDD:cd16285
label: "metallo-beta-lactamases, subclass B1; MBL-fold metallo-hydrolase domain. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. Subclass B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile. Includes chromosomally-encoded MBLs such as Bacillus cereus BcII, Bacteroides fragilis CcrA, and  Elizabethkingia meningoseptica (Chryseobacterium meningosepticum) BlaB and acquired MBLs including IMP-1, VIM-1, VIM-2, GIM-1, NDM-1 and FIM-1."
definition: >-
  metallo-beta-lactamases, subclass B1; MBL-fold metallo-hydrolase domain. MBLs (class B of the Ambler beta-lactamase classification) are a diverse group of metallo-enzymes that are capable of catalyzing the hydrolysis of a wide range of beta-lactam antibiotics. MBLs have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs being most closely related to each other. Subclass B1 enzymes are most active with two zinc ions bound in the active site, and have a broad-spectrum substrate profile. Includes chromosomally-encoded MBLs such as Bacillus cereus BcII, Bacteroides fragilis CcrA, and Elizabethkingia meningoseptica (Chryseobacterium meningosepticum) BlaB and acquired MBLs including IMP-1, VIM-1, VIM-2, GIM-1, NDM-1 and FIM-1. — an NCBI CDD conserved domain (cd16285); members share this curated model.
