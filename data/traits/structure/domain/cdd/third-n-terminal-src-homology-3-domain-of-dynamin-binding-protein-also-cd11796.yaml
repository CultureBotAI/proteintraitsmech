identifier: CDD:cd11796
label: "Third N-terminal Src homology 3 domain of Dynamin Binding Protein, also called Tuba. DNMBP or Tuba is a cdc42-specific guanine nucleotide exchange factor (GEF) that contains four N-terminal SH3 domains, a central RhoGEF [or Dbl homology (DH)] domain followed by a Bin/Amphiphysin/Rvs (BAR) domain, and two C-terminal SH3 domains. It provides a functional link between dynamin and key regulatory proteins of the actin cytoskeleton. It plays an important role in regulating cell junction configuration. The four N-terminal SH3 domains of DNMBP binds the GTPase dynamin, which plays an important role in the fission of endocytic vesicles. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Third N-terminal Src homology 3 domain of Dynamin Binding Protein, also called Tuba. DNMBP or Tuba is a cdc42-specific guanine nucleotide exchange factor (GEF) that contains four N-terminal SH3 domains, a central RhoGEF [or Dbl homology (DH)] domain followed by a Bin/Amphiphysin/Rvs (BAR) domain, and two C-terminal SH3 domains. It provides a functional link between dynamin and key regulatory proteins of the actin cytoskeleton. It plays an important role in regulating cell junction configuration. The four N-terminal SH3 domains of DNMBP binds the GTPase dynamin, which plays an important role in the fission of endocytic vesicles. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11796); members share this curated model.
