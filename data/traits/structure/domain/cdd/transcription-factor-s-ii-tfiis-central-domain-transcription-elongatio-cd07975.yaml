identifier: CDD:cd07975
label: "Transcription factor S-II (TFIIS), central domain. Transcription elongation by RNA polymerase II is regulated by the general elongation factor TFIIS. This factor stimulates RNA polymerase II to transcribe through regions of DNA that promote the formation of stalled ternary complexes. TFIIS is composed of three structural domains, termed I, II, and III. The two C-terminal domains (II and III), this domain and pfam01096 are required for transcription activity."
definition: >-
  Transcription factor S-II (TFIIS), central domain. Transcription elongation by RNA polymerase II is regulated by the general elongation factor TFIIS. This factor stimulates RNA polymerase II to transcribe through regions of DNA that promote the formation of stalled ternary complexes. TFIIS is composed of three structural domains, termed I, II, and III. The two C-terminal domains (II and III), this domain and pfam01096 are required for transcription activity. — an NCBI CDD conserved domain (cd07975); members share this curated model.
