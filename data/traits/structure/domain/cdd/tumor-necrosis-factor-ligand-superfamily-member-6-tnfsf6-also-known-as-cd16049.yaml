identifier: CDD:cd16049
label: "Tumor necrosis factor ligand superfamily member 6 (TNFSF6), also known as FasL. This family contains TNFSF6 (also known as Fas ligand or FasL, Faslg, gld, CD178, CD95L,  CD95-L, PT1LG1), a cytokine involved in cell death. The interaction of FasL with its receptor TNFRSF6 (also known as fas cell surface death receptor (FasR) or Fas, APT1, CD95, FAS1, APO-1, FASTM, ALPS1A) regulates many of the physiological and pathological processes of programmed cell death (apoptosis). FasL is expressed only in the lungs, small intestine, testes, and anterior chamber of the eye whereas its receptor Fas is expressed on a variety of immune cells including T and B cells, as well as being constitutively expressed in numerous other tissues.  FasL plays a critical role in the induction of apoptosis in cancer cells as well as other cells. Fas/FasL-mediated apoptosis is controlled by various signaling molecules; Fas/FasL binding promotes the recruitment of death domain and activation of Caspase 8 and Caspase 3 to execute the apoptotic events. Activation-induced cell death (AICD) of T cells is believed to be one of the mechanisms responsible for regulating peripheral immune tolerance through Fas/Fas-mediated apoptosis of T cells. Apoptosis signaling interacts or overlaps with T-cell signaling to regulate the switch from T-cell viability to death, and impaired AICD can influence the onset or development of autoimmunity. In rheumatoid arthritis (RA), apoptotic pathway involving Fas/FasL is defective and may have a proinflammatory effect; soluble FasL (sFasL) blocks membrane FasL (mFasL)-mediated apoptosis, but also activates RA fibroblast-like synoviocytes (FLS) of arthritic joints and FasL is therefore suggested as a promising candidate for targeting the hyperplastic synovial tissue. Polymorphisms of FAS (-670 G/A), FASL (-844 T/C) and their circulating levels play an important role in the pathology of coronary artery disease (CAD), while the FAS -670 A/G, FAS -1377 G/A, and FASL -844 T/C polymorphisms are associated with susceptibility to systemic lupus erythematosus (SLE). In ischemic brain tissues, upregulation of microRNA-25 (miR-25) inhibits cerebral I/R injury-induced apoptosis through downregulating Fas/FasL, which may provide a promising therapeutic target. The Fas/FasL signaling pathway and the constitutive expression of FasL in the lung microenvironment play a critical role in the metastatic potential of osteosarcoma (OS) cells; FasL positive (FasL+) lung microenvironment eliminates Fas+ osteosarcoma cells. Thus, blocking the Fas signaling pathway allows the Fas(+) cells to grow in the lungs."
definition: >-
  Tumor necrosis factor ligand superfamily member 6 (TNFSF6), also known as FasL. This family contains TNFSF6 (also known as Fas ligand or FasL, Faslg, gld, CD178, CD95L, CD95-L, PT1LG1), a cytokine involved in cell death. The interaction of FasL with its receptor TNFRSF6 (also known as fas cell surface death receptor (FasR) or Fas, APT1, CD95, FAS1, APO-1, FASTM, ALPS1A) regulates many of the physiological and pathological processes of programmed cell death (apoptosis). FasL is expressed only in the lungs, small intestine, testes, and anterior chamber of the eye whereas its receptor Fas is expressed on a variety of immune cells including T and B cells, as well as being constitutively expressed in numerous other tissues. FasL plays a critical role in the induction of apoptosis in cancer cells as well as other cells. Fas/FasL-mediated apoptosis is controlled by various signaling molecules; Fas/FasL binding promotes the recruitment of death domain and activation of Caspase 8 and Caspase 3 to execute the apoptotic events. Activation-induced cell death (AICD) of T cells is believed to be one of the mechanisms responsible for regulating peripheral immune tolerance through Fas/Fas-mediated apoptosis of T cells. Apoptosis signaling interacts or overlaps with T-cell signaling to regulate the switch from T-cell viability to death, and impaired AICD can influence the onset or development of autoimmunity. In rheumatoid arthritis (RA), apoptotic pathway involving Fas/FasL is defective and may have a proinflammatory effect; soluble FasL (sFasL) blocks membrane FasL (mFasL)-mediated apoptosis, but also activates RA fibroblast-like synoviocytes (FLS) of arthritic joints and FasL is therefore suggested as a promising candidate for targeting the hyperplastic synovial tissue. Polymorphisms of FAS (-670 G/A), FASL (-844 T/C) and their circulating levels play an important role in the pathology of coronary artery disease (CAD), while the FAS -670 A/G, FAS -1377 G/A, and FASL -844 T/C polymorphisms are associated with susceptibility to systemic lupus erythematosus (SLE). In ischemic brain tissues, upregulation of microRNA-25 (miR-25) inhibits cerebral I/R injury-induced apoptosis through downregulating Fas/FasL, which may provide a promising therapeutic target. The Fas/FasL signaling pathway and the constitutive expression of FasL in the lung microenvironment play a critical role in the metastatic potential of osteosarcoma (OS) cells; FasL positive (FasL+) lung microenvironment eliminates Fas+ osteosarcoma cells. Thus, blocking the Fas signaling pathway allows the Fas(+) cells to grow in the lungs. — an NCBI CDD conserved domain (cd16049); members share this curated model.
