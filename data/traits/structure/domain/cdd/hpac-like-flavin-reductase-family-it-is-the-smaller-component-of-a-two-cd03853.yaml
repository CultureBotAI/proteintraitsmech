identifier: CDD:cd03853
label: "HpaC-like flavin reductase family. It is the smaller component of a two-component enzyme system. The larger component enzyme is an monooxygenase. In Sulfolobus tokodaii, 4-Hydroxyphenylacetate (4-HPA) is used as an energy source. It is oxidized by a two-component enzyme system, 4-Hydroxyphenylacetate (4-HPA) 3-monooxygenase, that comprises flavin reductase (HpaC) and 4-HPA monooxygenase (HpaB). HpacC is a homodimer. Each monomer contains an FMN. HpaC provides FMNH2 to HpaB using NAD(P)H as electron donor. HpaB oxidizes 4_HPA to 3,4-dihydroxyphenylacetate (3,4-DHPA) using FMNH2."
definition: >-
  HpaC-like flavin reductase family. It is the smaller component of a two-component enzyme system. The larger component enzyme is an monooxygenase. In Sulfolobus tokodaii, 4-Hydroxyphenylacetate (4-HPA) is used as an energy source. It is oxidized by a two-component enzyme system, 4-Hydroxyphenylacetate (4-HPA) 3-monooxygenase, that comprises flavin reductase (HpaC) and 4-HPA monooxygenase (HpaB). HpacC is a homodimer. Each monomer contains an FMN. HpaC provides FMNH2 to HpaB using NAD(P)H as electron donor. HpaB oxidizes 4_HPA to 3,4-dihydroxyphenylacetate (3,4-DHPA) using FMNH2. — an NCBI CDD conserved domain (cd03853); members share this curated model.
