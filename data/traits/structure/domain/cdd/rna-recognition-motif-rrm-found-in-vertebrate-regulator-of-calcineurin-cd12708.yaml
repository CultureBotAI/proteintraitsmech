identifier: CDD:cd12708
label: "RNA recognition motif (RRM) found in vertebrate regulator of calcineurin 1 (RCAN1). This subgroup corresponds to the RRM of RCAN1, also termed calcipressin-1, or Adapt78, or Down syndrome critical region protein 1, or myocyte-enriched calcineurin-interacting protein 1 (MCIP1), encoded by the Down syndrome critical region 1 (DSCR1) gene that is abundantly expressed in human brain, heart and muscles. Overexpressed RCAN1 functions as an inhibitor of the Ca2+/calmodulin-dependent phosphatase calcineurin (also termed PP2B or PP3C), and is associated with Alzheimer's disease (AD) and Down syndrome (DS). RCAN1 can be phosphorylated by several kinases such as big MAP kinase 1 (BMK1), glycogen synthase kinase-3 (GSK-3), NF-kappaB inducing kinase (NIK), and protein kinase A (PKA). The phosphorylation of RCAN1 can positively or negatively regulate calcineurin-mediated gene transcription, and also affect its protein stability in the ubiquitin-proteasome pathway. RCAN1 consists of an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a highly conserved SP repeat domain containing the phosphorylation site by GSK-3, a well-known PxIxIT motif responsible for docking many substrates to calcineurin, and an unrecognized C-terminal TxxP motif of unknown function."
definition: >-
  RNA recognition motif (RRM) found in vertebrate regulator of calcineurin 1 (RCAN1). This subgroup corresponds to the RRM of RCAN1, also termed calcipressin-1, or Adapt78, or Down syndrome critical region protein 1, or myocyte-enriched calcineurin-interacting protein 1 (MCIP1), encoded by the Down syndrome critical region 1 (DSCR1) gene that is abundantly expressed in human brain, heart and muscles. Overexpressed RCAN1 functions as an inhibitor of the Ca2+/calmodulin-dependent phosphatase calcineurin (also termed PP2B or PP3C), and is associated with Alzheimer's disease (AD) and Down syndrome (DS). RCAN1 can be phosphorylated by several kinases such as big MAP kinase 1 (BMK1), glycogen synthase kinase-3 (GSK-3), NF-kappaB inducing kinase (NIK), and protein kinase A (PKA). The phosphorylation of RCAN1 can positively or negatively regulate calcineurin-mediated gene transcription, and also affect its protein stability in the ubiquitin-proteasome pathway. RCAN1 consists of an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a highly conserved SP repeat domain containing the phosphorylation site by GSK-3, a well-known PxIxIT motif responsible for docking many substrates to calcineurin, and an unrecognized C-terminal TxxP motif of unknown function. — an NCBI CDD conserved domain (cd12708); members share this curated model.
