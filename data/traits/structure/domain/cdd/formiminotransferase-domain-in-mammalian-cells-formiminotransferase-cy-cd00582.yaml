identifier: CDD:cd00582
label: "Formiminotransferase domain. In mammalian cells formiminotransferase cyclodeaminase (FTCD) is present either free in the cytosol or tightly bound to the Golgi complex.  It catalyzes two key consecutive reactions that couple histidine degradation to folate metabolism. The FT activity transfers the formimino group from formimino-L-glutamic acid, a product of the histidine catabolism, to the N5 position of tetrahydrofolate (THF) to produce N5-formimino-THF and glutamate."
definition: >-
  Formiminotransferase domain. In mammalian cells formiminotransferase cyclodeaminase (FTCD) is present either free in the cytosol or tightly bound to the Golgi complex. It catalyzes two key consecutive reactions that couple histidine degradation to folate metabolism. The FT activity transfers the formimino group from formimino-L-glutamic acid, a product of the histidine catabolism, to the N5 position of tetrahydrofolate (THF) to produce N5-formimino-THF and glutamate. — an NCBI CDD conserved domain (cd00582); members share this curated model.
