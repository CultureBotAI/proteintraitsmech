identifier: CDD:cd05183
label: "Rossman fold NAD(P)(+) binding proteins. These protein family members share in common  a Rossmann fold, NAD(P)H binding (NADB) domain.  This structural domain is found in numerous dehydrogenases of glycolysis  and other enzymes. These domains have an alpha-beta-alpha configuration. NAD binding involves numerous hydrogen and van der Waals contacts. In particular  H-bonding between the residues in the turn between the first strand and the subsequent  helix. Typically, the turn has a consensus binding pattern similar to GXGXXG, in which the  first 2 glycines participate in NAD(P)-binding, and the third facilitates close packing of  the helix to the beta-strand."
definition: >-
  Rossman fold NAD(P)(+) binding proteins. These protein family members share in common a Rossmann fold, NAD(P)H binding (NADB) domain. This structural domain is found in numerous dehydrogenases of glycolysis and other enzymes. These domains have an alpha-beta-alpha configuration. NAD binding involves numerous hydrogen and van der Waals contacts. In particular H-bonding between the residues in the turn between the first strand and the subsequent helix. Typically, the turn has a consensus binding pattern similar to GXGXXG, in which the first 2 glycines participate in NAD(P)-binding, and the third facilitates close packing of the helix to the beta-strand. — an NCBI CDD conserved domain (cd05183); members share this curated model.
