identifier: CDD:cd05654
label: "M20 Peptidase arginine utilization protein, RocB. Peptidase M20 family, ArgE RocB (arginine utilization protein, RocB; arginine degradation protein, RocB) subfamily. This group of proteins is possibly related to acetylornithine deacetylase (ArgE) and may be involved in the arginine and/or ornithine degradation pathway. In Bacillus subtilis, RocB is one of the three genes found in the rocABC operon, which is sigma L dependent and induced by arginine. The function of members of this family is as yet unknown, although they are predicted as deacetylases."
definition: >-
  M20 Peptidase arginine utilization protein, RocB. Peptidase M20 family, ArgE RocB (arginine utilization protein, RocB; arginine degradation protein, RocB) subfamily. This group of proteins is possibly related to acetylornithine deacetylase (ArgE) and may be involved in the arginine and/or ornithine degradation pathway. In Bacillus subtilis, RocB is one of the three genes found in the rocABC operon, which is sigma L dependent and induced by arginine. The function of members of this family is as yet unknown, although they are predicted as deacetylases. — an NCBI CDD conserved domain (cd05654); members share this curated model.
