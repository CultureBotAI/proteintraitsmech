identifier: CDD:cd11416
label: "basic helix-loop-helix (bHLH) domain found in Caenorhabditis elegans Helix-loop-helix protein 13 (HLH13) and similar proteins. Caenorhabditis elegans HLH13, also termed Fer3-like protein, or nephew of atonal 3, is a bHLH transcription factor that plays a role in the negative regulation of exit from L1 arrest and dauer diapause dependent on IIS signaling (insulin and insulin-like growth factor (IGF) signaling)."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Caenorhabditis elegans Helix-loop-helix protein 13 (HLH13) and similar proteins. Caenorhabditis elegans HLH13, also termed Fer3-like protein, or nephew of atonal 3, is a bHLH transcription factor that plays a role in the negative regulation of exit from L1 arrest and dauer diapause dependent on IIS signaling (insulin and insulin-like growth factor (IGF) signaling). — an NCBI CDD conserved domain (cd11416); members share this curated model.
