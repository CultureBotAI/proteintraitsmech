identifier: CDD:cd09515
label: "SAM domain of sphingomyelin synthase related subfamily. SAM (sterile alpha motif) domain of SGMS-like (sphingomyelin synthase) subfamily is a potential protein-protein interaction domain. This group of proteins is related to sphingomyelin synthase 1, and contains an N-terminal SAM domain. The function of SGMS1-like proteins is unknown; they may play a role in sphingolipid metabolism."
definition: >-
  SAM domain of sphingomyelin synthase related subfamily. SAM (sterile alpha motif) domain of SGMS-like (sphingomyelin synthase) subfamily is a potential protein-protein interaction domain. This group of proteins is related to sphingomyelin synthase 1, and contains an N-terminal SAM domain. The function of SGMS1-like proteins is unknown; they may play a role in sphingolipid metabolism. — an NCBI CDD conserved domain (cd09515); members share this curated model.
