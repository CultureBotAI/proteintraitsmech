identifier: CDD:cd24046
label: "nucleotide-binding domain (NBD) of the ectonucleoside triphosphate diphosphohydrolase 5 (NTPDase5)-like subfamily. The NTPDase5-like subfamily includes NTPDase5 and NTPDase6. NTPDase5 (EC 3.6.1.6), also called nucleoside diphosphate phosphatase ENTPD5, CD39 antigen-like 4 (CD39L4), ER-UDPase, guanosine-diphosphatase ENTPD5, GDPase ENTPD5, inosine diphosphate phosphatase ENTPD5, nucleoside diphosphatase, uridine-diphosphatase ENTPD5, or UDPase ENTPD5, hydrolyzes nucleoside diphosphates with a preference for GDP, IDP and UDP compared to ADP and CDP. NTPDase6 (EC 3.6.1.6), also called CD39 antigen-like 2 (CD39L2), catalyzes the hydrolysis of nucleoside triphosphates and diphosphates in a calcium- or magnesium-dependent manner. It has a strong preference for nucleoside diphosphates, preferentially hydrolyzes GDP, IDP, and UDP, with slower hydrolysis of CDP, ITP, GTP, CTP, ADP, and UTP and virtually no hydrolysis of ATP. The membrane bound form might support glycosylation reactions in the Golgi apparatus and, when released from cells, might catalyze the hydrolysis of extracellular nucleotides."
definition: >-
  nucleotide-binding domain (NBD) of the ectonucleoside triphosphate diphosphohydrolase 5 (NTPDase5)-like subfamily. The NTPDase5-like subfamily includes NTPDase5 and NTPDase6. NTPDase5 (EC 3.6.1.6), also called nucleoside diphosphate phosphatase ENTPD5, CD39 antigen-like 4 (CD39L4), ER-UDPase, guanosine-diphosphatase ENTPD5, GDPase ENTPD5, inosine diphosphate phosphatase ENTPD5, nucleoside diphosphatase, uridine-diphosphatase ENTPD5, or UDPase ENTPD5, hydrolyzes nucleoside diphosphates with a preference for GDP, IDP and UDP compared to ADP and CDP. NTPDase6 (EC 3.6.1.6), also called CD39 antigen-like 2 (CD39L2), catalyzes the hydrolysis of nucleoside triphosphates and diphosphates in a calcium- or magnesium-dependent manner. It has a strong preference for nucleoside diphosphates, preferentially hydrolyzes GDP, IDP, and UDP, with slower hydrolysis of CDP, ITP, GTP, CTP, ADP, and UTP and virtually no hydrolysis of ATP. The membrane bound form might support glycosylation reactions in the Golgi apparatus and, when released from cells, might catalyze the hydrolysis of extracellular nucleotides. — an NCBI CDD conserved domain (cd24046); members share this curated model.
