identifier: CDD:cd20450
label: "Tudor domain found in metal-response element-binding transcription factor 2 (MTF2) and similar proteins. MTF2, also called metal regulatory transcription factor 2, metal-response element DNA-binding protein M96, or Polycomb-like protein 2 (PCL2), complexes with the Polycomb repressive complex-2 (PRC2) in embryonic stem cells and regulates the transcriptional networks during embryonic stem cell self-renewal and differentiation. It recruits the PRC2 complex to the inactive X chromosome and target loci in embryonic stem cells. Moreover, MTF2 is required for PRC2-mediated Hox cluster repression. It activates the Cdkn2a gene and promotes cellular senescence, thus suppressing the catalytic activity of PRC2 locally. MTF2, like other PCL family proteins, consists of an N-terminal Tudor domain followed by two PHD domains, and a C-terminal MTF2 domain. PCL proteins specifically recognize tri-methylated H3K36 (H3K36me3) through their N-terminal Tudor domains."
definition: >-
  Tudor domain found in metal-response element-binding transcription factor 2 (MTF2) and similar proteins. MTF2, also called metal regulatory transcription factor 2, metal-response element DNA-binding protein M96, or Polycomb-like protein 2 (PCL2), complexes with the Polycomb repressive complex-2 (PRC2) in embryonic stem cells and regulates the transcriptional networks during embryonic stem cell self-renewal and differentiation. It recruits the PRC2 complex to the inactive X chromosome and target loci in embryonic stem cells. Moreover, MTF2 is required for PRC2-mediated Hox cluster repression. It activates the Cdkn2a gene and promotes cellular senescence, thus suppressing the catalytic activity of PRC2 locally. MTF2, like other PCL family proteins, consists of an N-terminal Tudor domain followed by two PHD domains, and a C-terminal MTF2 domain. PCL proteins specifically recognize tri-methylated H3K36 (H3K36me3) through their N-terminal Tudor domains. — an NCBI CDD conserved domain (cd20450); members share this curated model.
