identifier: CDD:cd14969
label: "type 2 opsins in animals, member of the class A family of seven-transmembrane G protein-coupled receptors. This rhodopsin family represents the type 2 opsins found in vertebrates and invertebrates except sponge. Type 2 opsins primarily function as G protein coupled receptors and are responsible for vision as well as for circadian rhythm and pigment regulation. On the contrary, type 1 opsins such as bacteriorhodopsin and proteorhodopsin are found in both prokaryotic and eukaryotic microbes, functioning as light-gated ion channels, proton pumps, sensory receptors and in other unknown functions. Although these two opsin types share seven-transmembrane domain topology and a conserved lysine reside in the seventh helix, type 1 opsins do not activate G-proteins and are not evolutionarily related to type 2. Type 2 opsins can be classified into six distinct subfamilies including the vertebrate opsins/encephalopsins, the G(o) opsins, the G(s) opsins, the invertebrate G(q) opsins, the photoisomerases, and the neuropsins."
definition: >-
  type 2 opsins in animals, member of the class A family of seven-transmembrane G protein-coupled receptors. This rhodopsin family represents the type 2 opsins found in vertebrates and invertebrates except sponge. Type 2 opsins primarily function as G protein coupled receptors and are responsible for vision as well as for circadian rhythm and pigment regulation. On the contrary, type 1 opsins such as bacteriorhodopsin and proteorhodopsin are found in both prokaryotic and eukaryotic microbes, functioning as light-gated ion channels, proton pumps, sensory receptors and in other unknown functions. Although these two opsin types share seven-transmembrane domain topology and a conserved lysine reside in the seventh helix, type 1 opsins do not activate G-proteins and are not evolutionarily related to type 2. Type 2 opsins can be classified into six distinct subfamilies including the vertebrate opsins/encephalopsins, the G(o) opsins, the G(s) opsins, the invertebrate G(q) opsins, the photoisomerases, and the neuropsins. — an NCBI CDD conserved domain (cd14969); members share this curated model.
