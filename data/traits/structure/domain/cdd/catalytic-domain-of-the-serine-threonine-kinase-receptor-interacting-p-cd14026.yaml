identifier: CDD:cd14026
label: "Catalytic domain of the Serine/Threonine kinase, Receptor Interacting Protein 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. RIP2, also called RICK or CARDIAK, harbors a C-terminal Caspase Activation and Recruitment domain (CARD) belonging to the Death domain (DD) superfamily. It functions as an effector kinase downstream of the pattern recognition receptors from the Nod-like (NLR) family, Nod1 and Nod2, which recognizes bacterial peptidoglycans released upon infection. RIP2 may also be involved in regulating wound healing and keratinocyte proliferation. RIP kinases serve as essential sensors of cellular stress. The RIP2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Receptor Interacting Protein 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. RIP2, also called RICK or CARDIAK, harbors a C-terminal Caspase Activation and Recruitment domain (CARD) belonging to the Death domain (DD) superfamily. It functions as an effector kinase downstream of the pattern recognition receptors from the Nod-like (NLR) family, Nod1 and Nod2, which recognizes bacterial peptidoglycans released upon infection. RIP2 may also be involved in regulating wound healing and keratinocyte proliferation. RIP kinases serve as essential sensors of cellular stress. The RIP2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14026); members share this curated model.
