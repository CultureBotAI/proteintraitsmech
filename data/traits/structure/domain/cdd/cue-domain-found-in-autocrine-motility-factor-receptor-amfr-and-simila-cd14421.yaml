identifier: CDD:cd14421
label: "CUE domain found in autocrine motility factor receptor (AMFR) and similar proteins. AMFR is an internalizing cell surface glycoprotein that is localized in both plasma membrane caveolae and the endoplasmic reticulum (ER), and involves in the regulation of cellular adhesion, proliferation, motility and apoptosis, as well as in the process of learning and memory. It is also called ER-protein gp78 that has been identified as a RING finger-dependent ubiquitin protein ligase (E3) implicated in degradation from the ER. AMFR contains an N-terminal RING-finger domain and a C-terminal CUE domain."
definition: >-
  CUE domain found in autocrine motility factor receptor (AMFR) and similar proteins. AMFR is an internalizing cell surface glycoprotein that is localized in both plasma membrane caveolae and the endoplasmic reticulum (ER), and involves in the regulation of cellular adhesion, proliferation, motility and apoptosis, as well as in the process of learning and memory. It is also called ER-protein gp78 that has been identified as a RING finger-dependent ubiquitin protein ligase (E3) implicated in degradation from the ER. AMFR contains an N-terminal RING-finger domain and a C-terminal CUE domain. — an NCBI CDD conserved domain (cd14421); members share this curated model.
