identifier: CDD:cd08810
label: "Caspase activation and recruitment domain of B-cell lymphoma 10. Caspase activation and recruitment domain (CARD) similar to that found in BCL10 (B-cell lymphoma 10). BCL10 and Malt1 (mucosa-associated lymphoid tissue-lymphoma-translocation gene 1) are the integral components of CBM signalosomes. They associate with CARD9 to form M-CBM (CBM complex in myeloid immune cells) and with CARMA1 to form L-CBM (CBM complex in lymphoid immune cells), to mediate activation of NF-kB and MAPK by ITAM-coupled receptors expressed on immune cells. Both CARMA1 and CARD9 associate with BCL10 via a CARD-CARD interaction. In general, CARDs are death domains (DDs) found associated with caspases. They are known to be important in the signaling pathways for apoptosis, inflammation, and host-defense mechanisms. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes."
definition: >-
  Caspase activation and recruitment domain of B-cell lymphoma 10. Caspase activation and recruitment domain (CARD) similar to that found in BCL10 (B-cell lymphoma 10). BCL10 and Malt1 (mucosa-associated lymphoid tissue-lymphoma-translocation gene 1) are the integral components of CBM signalosomes. They associate with CARD9 to form M-CBM (CBM complex in myeloid immune cells) and with CARMA1 to form L-CBM (CBM complex in lymphoid immune cells), to mediate activation of NF-kB and MAPK by ITAM-coupled receptors expressed on immune cells. Both CARMA1 and CARD9 associate with BCL10 via a CARD-CARD interaction. In general, CARDs are death domains (DDs) found associated with caspases. They are known to be important in the signaling pathways for apoptosis, inflammation, and host-defense mechanisms. DDs are protein-protein interaction domains found in a variety of domain architectures. Their common feature is that they form homodimers by self-association or heterodimers by associating with other members of the DD superfamily including PYRIN and DED (Death Effector Domain). They serve as adaptors in signaling pathways and can recruit other proteins into signaling complexes. — an NCBI CDD conserved domain (cd08810); members share this curated model.
