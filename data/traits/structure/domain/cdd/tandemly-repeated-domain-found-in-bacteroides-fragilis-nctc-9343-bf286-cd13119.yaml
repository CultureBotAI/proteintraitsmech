identifier: CDD:cd13119
label: "Tandemly repeated domain found in Bacteroides fragilis Nctc 9343 BF2867 and related proteins. Two structurally similar domains with low sequence similarity form a protein that may have a role in cell adhesion. This family also includes BF1858 and overlaps with DUF3988."
definition: >-
  Tandemly repeated domain found in Bacteroides fragilis Nctc 9343 BF2867 and related proteins. Two structurally similar domains with low sequence similarity form a protein that may have a role in cell adhesion. This family also includes BF1858 and overlaps with DUF3988. — an NCBI CDD conserved domain (cd13119); members share this curated model.
