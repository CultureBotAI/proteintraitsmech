identifier: CDD:cd18798
label: "C-terminal helicase domain of the reverse gyrase. Reverse gyrase modifies the topological state of DNA by introducing positive supercoils in an ATP-dependent process. Reverse gyrase is a DEAD-like helicase belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC."
definition: >-
  C-terminal helicase domain of the reverse gyrase. Reverse gyrase modifies the topological state of DNA by introducing positive supercoils in an ATP-dependent process. Reverse gyrase is a DEAD-like helicase belonging to superfamily (SF)2, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. Similar to SF1 helicases, SF2 helicases do not form toroidal structures like SF3-6 helicases. Their helicase core consists of two similar protein domains that resemble the fold of the recombination protein RecA. This model describes the C-terminal domain, also called HelicC. — an NCBI CDD conserved domain (cd18798); members share this curated model.
