identifier: CDD:cd12706
label: "RNA recognition motif (RRM) found in vertebrate La-related protein 5 (LARP5 or LARP4B). This subgroup corresponds to the RRM of LARP5, a cytosolic protein that co-sediments with polysomes and accumulates upon stress induction in cellular stress granules. It can interact with the cytosolic poly(A) binding protein 1 (PABPC1) and the receptor for activated C Kinase (RACK1), a component of the 40S ribosomal subunit. LARP5 may function as a stimulatory factor of translation through bridging mRNA factors of the 3' end with initiating ribosomes. Like other La-related proteins (LARPs) family members, LARP5 contains a La motif (LAM) and an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif (RRM) found in vertebrate La-related protein 5 (LARP5 or LARP4B). This subgroup corresponds to the RRM of LARP5, a cytosolic protein that co-sediments with polysomes and accumulates upon stress induction in cellular stress granules. It can interact with the cytosolic poly(A) binding protein 1 (PABPC1) and the receptor for activated C Kinase (RACK1), a component of the 40S ribosomal subunit. LARP5 may function as a stimulatory factor of translation through bridging mRNA factors of the 3' end with initiating ribosomes. Like other La-related proteins (LARPs) family members, LARP5 contains a La motif (LAM) and an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd12706); members share this curated model.
