identifier: CDD:cd22702
label: "forkhead associated (FHA) domain found in chloroplastic zeaxanthin epoxidase (ZEP) and similar proteins. ZEP, also called protein ABA DEFICIENT 1, ABA1, protein IMPAIRED IN BABA-INDUCED STERILITY 3, protein LOW EXPRESSION OF OSMOTIC STRESS-RESPONSIVE GENES 6, or protein NON-PHOTOCHEMICAL QUENCHING 2, plays an important role in the xanthophyll cycle and abscisic acid (ABA) biosynthesis. It converts zeaxanthin into antheraxanthin and subsequently violaxanthin. ZEP is required for resistance to osmotic and drought stresses, ABA-dependent stomatal closure, seed development and dormancy, modulation of defense gene expression, and disease resistance and non-photochemical quencing (NPQ). The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in chloroplastic zeaxanthin epoxidase (ZEP) and similar proteins. ZEP, also called protein ABA DEFICIENT 1, ABA1, protein IMPAIRED IN BABA-INDUCED STERILITY 3, protein LOW EXPRESSION OF OSMOTIC STRESS-RESPONSIVE GENES 6, or protein NON-PHOTOCHEMICAL QUENCHING 2, plays an important role in the xanthophyll cycle and abscisic acid (ABA) biosynthesis. It converts zeaxanthin into antheraxanthin and subsequently violaxanthin. ZEP is required for resistance to osmotic and drought stresses, ABA-dependent stomatal closure, seed development and dormancy, modulation of defense gene expression, and disease resistance and non-photochemical quencing (NPQ). The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22702); members share this curated model.
