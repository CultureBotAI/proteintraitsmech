identifier: CDD:cd09818
label: "Animal heme oxidases similar to plant pathogen-inducible oxygenases. This is a diverse family of oxygenases related to the animal heme peroxidases, with members from plants, animals, and bacteria. The plant pathogen-inducible oxygenases (PIOX) oxygenate fatty acids into 2R-hydroperoxides. They may be involved in the hypersensitive reaction, rapid and localized cell death induced by infection with pathogens, and the rapidly induced expression of PIOX may be caused by the oxidative burst that occurs in the process of cell death."
definition: >-
  Animal heme oxidases similar to plant pathogen-inducible oxygenases. This is a diverse family of oxygenases related to the animal heme peroxidases, with members from plants, animals, and bacteria. The plant pathogen-inducible oxygenases (PIOX) oxygenate fatty acids into 2R-hydroperoxides. They may be involved in the hypersensitive reaction, rapid and localized cell death induced by infection with pathogens, and the rapidly induced expression of PIOX may be caused by the oxidative burst that occurs in the process of cell death. — an NCBI CDD conserved domain (cd09818); members share this curated model.
