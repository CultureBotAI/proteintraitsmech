identifier: CDD:cd16619
label: "Modified RING finger, HC subclass (C4C4-type), found in tripartite motif-containing protein 37 (TRIM37) and similar proteins. TRIM37, also known as mulibrey nanism protein, or MUL, is a peroxisomal E3 ubiquitin-protein ligase that is involved in the tumorigenesis of several cancer types, including pancreatic ductal adenocarcinoma (PDAC), hepatocellular carcinoma (HCC), breast cancer, and sporadic fibrothecoma. It mono-ubiquitinates histone H2A, a chromatin modification associated with transcriptional repression. Moreover, TRIM37 possesses anti-HIV-1 activity, and interferes with viral DNA synthesis. Mutations in the human TRIM37 gene (also known as MUL) cause Mulibrey (muscle-liver-brain-eye) nanism, a rare growth disorder of prenatal onset characterized by dysmorphic features, pericardial constriction, and hepatomegaly. TRIM37 belongs to the C-VIII subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C4C4-type RING finger, whose overall folding is similar to that of the typical C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a MATH (meprin and TRAF-C homology) domain positioned C-terminal to the RBCC domain. Its MATH domain has been shown to interact with the TRAF (TNF-Receptor-Associated Factor) domain of six known TRAFs in vitro."
definition: >-
  Modified RING finger, HC subclass (C4C4-type), found in tripartite motif-containing protein 37 (TRIM37) and similar proteins. TRIM37, also known as mulibrey nanism protein, or MUL, is a peroxisomal E3 ubiquitin-protein ligase that is involved in the tumorigenesis of several cancer types, including pancreatic ductal adenocarcinoma (PDAC), hepatocellular carcinoma (HCC), breast cancer, and sporadic fibrothecoma. It mono-ubiquitinates histone H2A, a chromatin modification associated with transcriptional repression. Moreover, TRIM37 possesses anti-HIV-1 activity, and interferes with viral DNA synthesis. Mutations in the human TRIM37 gene (also known as MUL) cause Mulibrey (muscle-liver-brain-eye) nanism, a rare growth disorder of prenatal onset characterized by dysmorphic features, pericardial constriction, and hepatomegaly. TRIM37 belongs to the C-VIII subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C4C4-type RING finger, whose overall folding is similar to that of the typical C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a MATH (meprin and TRAF-C homology) domain positioned C-terminal to the RBCC domain. Its MATH domain has been shown to interact with the TRAF (TNF-Receptor-Associated Factor) domain of six known TRAFs in vitro. — an NCBI CDD conserved domain (cd16619); members share this curated model.
