identifier: CDD:cd07123
label: "Delta(1)-pyrroline-5-carboxylate dehydrogenase, ALDH families 4 and 17. Delta(1)-pyrroline-5-carboxylate dehydrogenase (EC=1.5.1.12 ), families 4 and 17: a proline catabolic enzyme of the aldehyde dehydrogenase (ALDH) protein superfamily.  Delta(1)-pyrroline-5-carboxylate dehydrogenase (P5CDH), also known as ALDH4A1 in humans,  is a mitochondrial  homodimer involved in proline degradation and catalyzes the NAD + -dependent conversion of P5C to glutamate. This is a necessary step in the pathway interconnecting the urea and tricarboxylic acid cycles. The preferred substrate is glutamic gamma-semialdehyde, other substrates include succinic, glutaric and adipic semialdehydes. Also included in this CD is the Aldh17 Drosophila melanogaster (Q9VUC0) P5CDH and similar sequences."
definition: >-
  Delta(1)-pyrroline-5-carboxylate dehydrogenase, ALDH families 4 and 17. Delta(1)-pyrroline-5-carboxylate dehydrogenase (EC=1.5.1.12 ), families 4 and 17: a proline catabolic enzyme of the aldehyde dehydrogenase (ALDH) protein superfamily. Delta(1)-pyrroline-5-carboxylate dehydrogenase (P5CDH), also known as ALDH4A1 in humans, is a mitochondrial homodimer involved in proline degradation and catalyzes the NAD + -dependent conversion of P5C to glutamate. This is a necessary step in the pathway interconnecting the urea and tricarboxylic acid cycles. The preferred substrate is glutamic gamma-semialdehyde, other substrates include succinic, glutaric and adipic semialdehydes. Also included in this CD is the Aldh17 Drosophila melanogaster (Q9VUC0) P5CDH and similar sequences. — an NCBI CDD conserved domain (cd07123); members share this curated model.
