identifier: CDD:cd20165
label: "second PWWP domain found in nuclear SET domain-containing protein 2 (NSD2) and similar proteins. NSD2, also called histone-lysine N-methyltransferase NSD2, multiple myeloma SET domain-containing protein (MMSET), or protein trithorax-5 Wolf-Hirschhorn syndrome candidate 1 protein (WHSC1), is overexpressed frequently in the t(4;14) translocation in 15% to 20% of multiple myeloma. It plays important roles in cancer cell proliferation, survival, and tumor growth, through mediating constitutive NF-kappaB signaling via the cytokine autocrine loop. It also enhances androgen receptor (AR)-mediated transcription. The principal chromatin-regulatory activity of NSD2 is dimethylation of histone H3 at lysine 36 (H3K36me2). NSD2 contains a catalytic suppressor of variegation, enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-prolin motif (PWWP) domains, an high mobility group (HMG) box, five PHD (plant-homeodomain) zinc finger motifs, and an NSD-specific Cys-His rich domain (C5HCH). The SET domain is responsible for histone methyltransferase activity. The PWWP, HMG, and PHD domains mediate chromatin interaction and recognition of histone marks. This model corresponds to the second PWWP domain. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  second PWWP domain found in nuclear SET domain-containing protein 2 (NSD2) and similar proteins. NSD2, also called histone-lysine N-methyltransferase NSD2, multiple myeloma SET domain-containing protein (MMSET), or protein trithorax-5 Wolf-Hirschhorn syndrome candidate 1 protein (WHSC1), is overexpressed frequently in the t(4;14) translocation in 15% to 20% of multiple myeloma. It plays important roles in cancer cell proliferation, survival, and tumor growth, through mediating constitutive NF-kappaB signaling via the cytokine autocrine loop. It also enhances androgen receptor (AR)-mediated transcription. The principal chromatin-regulatory activity of NSD2 is dimethylation of histone H3 at lysine 36 (H3K36me2). NSD2 contains a catalytic suppressor of variegation, enhancer of zeste and trithorax (SET) domain, two proline-tryptophan-tryptophan-prolin motif (PWWP) domains, an high mobility group (HMG) box, five PHD (plant-homeodomain) zinc finger motifs, and an NSD-specific Cys-His rich domain (C5HCH). The SET domain is responsible for histone methyltransferase activity. The PWWP, HMG, and PHD domains mediate chromatin interaction and recognition of histone marks. This model corresponds to the second PWWP domain. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd20165); members share this curated model.
