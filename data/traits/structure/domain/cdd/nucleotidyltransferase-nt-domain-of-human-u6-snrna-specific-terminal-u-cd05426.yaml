identifier: CDD:cd05426
label: "Nucleotidyltransferase (NT) domain of human U6 snRNA-specific terminal uridylyl transferase 1 and human mitochondrial poly (A) polymerase and related proteins. NT_hU6-TUTase1_hmtPAP_like: catalytic domain found in proteins similar to human (h) U6 snRNA-specific terminal uridylyl transferase 1 (hU6-TUTase1) and human mitochondrial (mt) poly (A) polymerase (PAP). hU6-TUTase1 is essential for cell proliferation. This enzyme appears to accumulate within the nucleoli, where U6 snRNA maturation takes place. In a template-independent reaction hU6-TUTase1 specifically uridylates U6 snRNA. hmtPAP synthesizes short poly(A) tails at the 3' termini of mt mRNAs. Little is known about how these tails may function in translation and turnover of these mt mRNAs. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these hU6-TUTase1_like and hmtPAP-like NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of human U6 snRNA-specific terminal uridylyl transferase 1 and human mitochondrial poly (A) polymerase and related proteins. NT_hU6-TUTase1_hmtPAP_like: catalytic domain found in proteins similar to human (h) U6 snRNA-specific terminal uridylyl transferase 1 (hU6-TUTase1) and human mitochondrial (mt) poly (A) polymerase (PAP). hU6-TUTase1 is essential for cell proliferation. This enzyme appears to accumulate within the nucleoli, where U6 snRNA maturation takes place. In a template-independent reaction hU6-TUTase1 specifically uridylates U6 snRNA. hmtPAP synthesizes short poly(A) tails at the 3' termini of mt mRNAs. Little is known about how these tails may function in translation and turnover of these mt mRNAs. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these hU6-TUTase1_like and hmtPAP-like NT domains. — an NCBI CDD conserved domain (cd05426); members share this curated model.
