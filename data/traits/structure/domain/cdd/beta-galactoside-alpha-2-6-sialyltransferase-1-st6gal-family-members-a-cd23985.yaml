identifier: CDD:cd23985
label: "beta-galactoside alpha-2,6-sialyltransferase 1. ST6Gal family members are beta-galactoside alpha-2,6-sialyltransferases that catalyze an alpha-2,6-linkage between sialic acid and the terminal galactose residue of a glycochain, by transfering sialic acid from CMP-Sia. ST6Gal1 play important roles in the immune system. The ST6Gal family belongs to the glycosyltransferase family 29 (GT29)."
definition: >-
