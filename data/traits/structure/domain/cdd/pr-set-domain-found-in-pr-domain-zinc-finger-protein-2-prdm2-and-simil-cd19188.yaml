identifier: CDD:cd19188
label: "PR-SET domain found in PR domain zinc finger protein 2 (PRDM2) and similar proteins. PRDM2 (also termed GATA-3-binding protein G3B, lysine N-methyltransferase 8, MTB-or MTE-binding protein, PR domain-containing protein 2, retinoblastoma protein-interacting zinc finger protein, or zinc finger protein RIZ) is S-adenosyl-L-methionine-dependent histone methyltransferase that specifically methylates 'Lys-9' of histone H3. It may function as a DNA-binding transcription factor."
definition: >-
  PR-SET domain found in PR domain zinc finger protein 2 (PRDM2) and similar proteins. PRDM2 (also termed GATA-3-binding protein G3B, lysine N-methyltransferase 8, MTB-or MTE-binding protein, PR domain-containing protein 2, retinoblastoma protein-interacting zinc finger protein, or zinc finger protein RIZ) is S-adenosyl-L-methionine-dependent histone methyltransferase that specifically methylates 'Lys-9' of histone H3. It may function as a DNA-binding transcription factor. — an NCBI CDD conserved domain (cd19188); members share this curated model.
