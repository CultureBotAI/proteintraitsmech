label: "THUMP domain, predicted to bind RNA. The THUMP domain is named after THioUridine synthases, RNA Methyltransferases and Pseudo-uridine synthases. It is predicted to be an RNA-binding domain and  probably functions by delivering a variety of RNA modification enzymes to their targets."
