identifier: CDD:cd21153
label: "PUA RNA-binding domain of the SAM-dependent methyltransferase RlmI and related proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this subfamily contain PUA domains that co-occur N-terminal to SAM-dependent methyltransferase domains and include Escherichia coli RlmI (rRNA large subunit methyltransferase gene I, also called YccW) and Thermus thermophilus methyltransferase RlmO, which are 5-methylcytosine methyltransferases (m5C MTases) that play a role in modifying 23S rRNA. This subfamily also includes Pyrococcus horikoshii PH1915 that may play a role as a 5-methyluridine MTase, and/or perform similar roles."
definition: >-
  PUA RNA-binding domain of the SAM-dependent methyltransferase RlmI and related proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. Members of this subfamily contain PUA domains that co-occur N-terminal to SAM-dependent methyltransferase domains and include Escherichia coli RlmI (rRNA large subunit methyltransferase gene I, also called YccW) and Thermus thermophilus methyltransferase RlmO, which are 5-methylcytosine methyltransferases (m5C MTases) that play a role in modifying 23S rRNA. This subfamily also includes Pyrococcus horikoshii PH1915 that may play a role as a 5-methyluridine MTase, and/or perform similar roles. — an NCBI CDD conserved domain (cd21153); members share this curated model.
