identifier: CDD:cd22230
label: "Hook domain found in Gipie (GRP78-interacting protein induced by ER stress) and similar proteins. Gipie, also called coiled-coil domain-containing protein 88B (CCDC88B), or brain leucine zipper domain-containing protein, or Hook-related protein 3 (HkRP3), is a novel actin cytoskeleton-binding protein and Akt substrate that regulates cell migratory responses in various biological contexts. It acts as a positive regulator of T-cell maturation and inflammatory function. As a microtubule-binding protein, Gipie regulates lytic granule clustering and NK cell killing."
definition: >-
  Hook domain found in Gipie (GRP78-interacting protein induced by ER stress) and similar proteins. Gipie, also called coiled-coil domain-containing protein 88B (CCDC88B), or brain leucine zipper domain-containing protein, or Hook-related protein 3 (HkRP3), is a novel actin cytoskeleton-binding protein and Akt substrate that regulates cell migratory responses in various biological contexts. It acts as a positive regulator of T-cell maturation and inflammatory function. As a microtubule-binding protein, Gipie regulates lytic granule clustering and NK cell killing. — an NCBI CDD conserved domain (cd22230); members share this curated model.
