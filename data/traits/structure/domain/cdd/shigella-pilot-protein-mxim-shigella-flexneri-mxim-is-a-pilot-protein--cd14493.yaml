identifier: CDD:cd14493
label: "Shigella Pilot protein MxiM. Shigella flexneri MxiM is a pilot protein for S. flexneri MxiD, an outer membrane (OM)-associated ring-forming secretin. MxiM, also an OM protein, binds lipids and MxiD. MixD is a component of the type-III secretion system that translocates proteins through both membranes of gram-negative bacterial pathogens into host cells and requires the formation of an integral OM secretin ring. MxiM binds and affects several features of the secretin MxiD, including its stability in the periplasm, OM association, as well as assembly into multimeric structure. MxiM belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
definition: >-
