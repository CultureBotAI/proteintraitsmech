identifier: CDD:cd22967
label: "dimerization/docking (D/D) domain found in adenylate kinase 7 and similar proteins. Adenylate kinase (AK7, EC2.7.4.3/EC 2.7.4.6), also called ATP-AMP transphosphorylase 7, is a nucleoside monophosphate (NMP) kinase that catalyzes the reversible transfer of the terminal phosphate group between nucleoside triphosphates and monophosphates. It has highest activity toward AMP, and weaker activity toward dAMP, CMP and dCMP. It also displays broad nucleoside diphosphate kinase activity. AK7 is involved in maintaining ciliary structure and function. This model corresponds to the C-terminal domain of AK7, which shows high sequence similarity to the dimerization/docking (D/D) domain of protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in adenylate kinase 7 and similar proteins. Adenylate kinase (AK7, EC2.7.4.3/EC 2.7.4.6), also called ATP-AMP transphosphorylase 7, is a nucleoside monophosphate (NMP) kinase that catalyzes the reversible transfer of the terminal phosphate group between nucleoside triphosphates and monophosphates. It has highest activity toward AMP, and weaker activity toward dAMP, CMP and dCMP. It also displays broad nucleoside diphosphate kinase activity. AK7 is involved in maintaining ciliary structure and function. This model corresponds to the C-terminal domain of AK7, which shows high sequence similarity to the dimerization/docking (D/D) domain of protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22967); members share this curated model.
