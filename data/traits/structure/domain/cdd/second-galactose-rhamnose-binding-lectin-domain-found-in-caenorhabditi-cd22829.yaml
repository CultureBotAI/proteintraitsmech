identifier: CDD:cd22829
label: "second galactose/rhamnose binding lectin domain found in Caenorhabditis elegans protein EVA-1, human protein EVA-1 homolog C and similar proteins. The family includes Caenorhabditis elegans protein EVA-1 and its homologs, such as human protein EVA-1 homolog C (also known as C21orf63). EVA-1 functions as an UNC-40 coreceptor to enhance attraction to the MADD-4 guidance cue in C. elegans. It also acts as a receptor for slt-1 and is required for the guidance of the AVM pioneer axon to the ventral nerve cord. Human C21orf63 is a type-1 transmembrane heparin-binding protein. Members in this family contain two tandem galactose/rhamnose-binding lectin domains. This model corresponds to the second one. Due to the lack of rhamnose-binding key residues, the second galactose/rhamnose-binding domains of EVA-1 does not form a binding pocket for rhamnose."
definition: >-
  second galactose/rhamnose binding lectin domain found in Caenorhabditis elegans protein EVA-1, human protein EVA-1 homolog C and similar proteins. The family includes Caenorhabditis elegans protein EVA-1 and its homologs, such as human protein EVA-1 homolog C (also known as C21orf63). EVA-1 functions as an UNC-40 coreceptor to enhance attraction to the MADD-4 guidance cue in C. elegans. It also acts as a receptor for slt-1 and is required for the guidance of the AVM pioneer axon to the ventral nerve cord. Human C21orf63 is a type-1 transmembrane heparin-binding protein. Members in this family contain two tandem galactose/rhamnose-binding lectin domains. This model corresponds to the second one. Due to the lack of rhamnose-binding key residues, the second galactose/rhamnose-binding domains of EVA-1 does not form a binding pocket for rhamnose. — an NCBI CDD conserved domain (cd22829); members share this curated model.
