identifier: CDD:cd15341
label: "cannabinoid receptor subtype 2, member of the class A family of seven-transmembrane G protein-coupled receptors. Cannabinoid receptors belong to the class A G-protein coupled receptor superfamily. Two types of cannabinoid receptors, CB1 and CB2, have been identified so far. They are activated by naturally occurring endocannabinoids, cannabis plant-derived cannabinoids such as tetrahydrocannabinol, or synthetic cannabinoids. The CB receptors are involved in the various physiological processes such as appetite, mood, memory, and pain sensation. CB1 receptor is expressed predominantly in central and peripheral neurons, while CB2 receptor is found mainly in the immune system."
