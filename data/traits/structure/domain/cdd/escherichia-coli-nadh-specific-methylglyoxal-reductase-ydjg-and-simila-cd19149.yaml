label: "Escherichia coli NADH-specific methylglyoxal reductase (YdjG) and similar proteins. Escherichia coli YdjG is a founding member of aldo-keto reductase family 11 member B2 (AKR11B2). It catalyzes the NADH-dependent reduction of methylglyoxal (2-oxopropanal) in vitro. It may play some role in intestinal colonization."
