identifier: CDD:cd14337
label: "UBA domain found in microtubule-associated protein (MAP)/microtubule affinity-regulating kinase (MARK)/ partitioning-defective 1 (Par-1) and similar proteins. The MARK/Par-1 subfamily contains serine/threonine-protein kinases including mammal MARKs, and polarity kinases Par-1 found in Caenorhabditis elegans and Drosophila melanogaster. Those proteins are frequently found associated with membrane structures and participate in diverse processes from control of the cell cycle and polarity to intracellular signaling and microtubule stability. They are involved in nematode embryogenesis, cell cycle control, epithelial cell polarization, cell signaling, and neuronal migration and differentiation. The mammals MARKs have been implicated in carcinomas, Alzheimer's disease (through tau hyperphosphorylation), and autism. Four MARK isoforms exist in humans. Members in this subfamily contain an N-terminal protein kinase catalytic domain, followed by an ubiquitin-associated (UBA) domain and a C-terminal regulatory domain of 5'-AMP-activated protein kinase (AMPK)."
definition: >-
  UBA domain found in microtubule-associated protein (MAP)/microtubule affinity-regulating kinase (MARK)/ partitioning-defective 1 (Par-1) and similar proteins. The MARK/Par-1 subfamily contains serine/threonine-protein kinases including mammal MARKs, and polarity kinases Par-1 found in Caenorhabditis elegans and Drosophila melanogaster. Those proteins are frequently found associated with membrane structures and participate in diverse processes from control of the cell cycle and polarity to intracellular signaling and microtubule stability. They are involved in nematode embryogenesis, cell cycle control, epithelial cell polarization, cell signaling, and neuronal migration and differentiation. The mammals MARKs have been implicated in carcinomas, Alzheimer's disease (through tau hyperphosphorylation), and autism. Four MARK isoforms exist in humans. Members in this subfamily contain an N-terminal protein kinase catalytic domain, followed by an ubiquitin-associated (UBA) domain and a C-terminal regulatory domain of 5'-AMP-activated protein kinase (AMPK). — an NCBI CDD conserved domain (cd14337); members share this curated model.
