identifier: CDD:cd18311
label: "BTB (Broad-Complex, Tramtrack and Bric a brac) /POZ (poxvirus and zinc finger) domain found in Drosophila melanogaster centrosomal protein 190kD (CP190) and similar proteins. CP190 is a large, multi-domain protein, first identified as a centrosome protein with oscillatory localization over the course of the cell cycle. It has an essential function in the nucleus as a chromatin insulator. It is known to associate with the nuclear matrix, components of the RNAi machinery, active promoters and borders of the repressive chromatin domains. CP190 contains an N-terminal BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac) /POZ (poxvirus and zinc finger) domain found in Drosophila melanogaster centrosomal protein 190kD (CP190) and similar proteins. CP190 is a large, multi-domain protein, first identified as a centrosome protein with oscillatory localization over the course of the cell cycle. It has an essential function in the nucleus as a chromatin insulator. It is known to associate with the nuclear matrix, components of the RNAi machinery, active promoters and borders of the repressive chromatin domains. CP190 contains an N-terminal BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18311); members share this curated model.
