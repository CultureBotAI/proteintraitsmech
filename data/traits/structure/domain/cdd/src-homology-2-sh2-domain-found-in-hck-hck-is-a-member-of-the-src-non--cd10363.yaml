identifier: CDD:cd10363
label: "Src homology 2 (SH2) domain found in HCK. HCK is a member of the Src non-receptor type tyrosine kinase family of proteins and is expressed in hemopoietic cells. HCK is proposed to couple the Fc receptor to the activation of the respiratory burst. It may also play a role in neutrophil migration and in the degranulation of neutrophils. It has two different translational starts that have different subcellular localization. HCK has been shown to interact with BCR gene,  ELMO1 Cbl gene, RAS p21 protein activator 1, RASA3, Granulocyte colony-stimulating factor receptor, ADAM15 and RAPGEF1.  Like the other members of the Src family the SH2 domain in addition to binding the target, also plays an autoinhibitory role by binding to its C-terminal tail.  In general SH2 domains are involved in signal transduction. HCK has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in HCK. HCK is a member of the Src non-receptor type tyrosine kinase family of proteins and is expressed in hemopoietic cells. HCK is proposed to couple the Fc receptor to the activation of the respiratory burst. It may also play a role in neutrophil migration and in the degranulation of neutrophils. It has two different translational starts that have different subcellular localization. HCK has been shown to interact with BCR gene, ELMO1 Cbl gene, RAS p21 protein activator 1, RASA3, Granulocyte colony-stimulating factor receptor, ADAM15 and RAPGEF1. Like the other members of the Src family the SH2 domain in addition to binding the target, also plays an autoinhibitory role by binding to its C-terminal tail. In general SH2 domains are involved in signal transduction. HCK has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10363); members share this curated model.
