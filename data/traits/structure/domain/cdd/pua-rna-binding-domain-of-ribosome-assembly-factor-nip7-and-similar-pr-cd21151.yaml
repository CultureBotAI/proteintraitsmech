identifier: CDD:cd21151
label: "PUA RNA binding domain of ribosome assembly factor Nip7 and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. This eukaryotic and archaeal subfamily contains the conserved protein Nip7 and similar proteins, which are involved in ribosome biogenesis, taking part in 27S pre-rRNA processing and in formation of 60S ribosomal subunit. Nip7 orthologs share a two-domain architecture with the C-terminal PUA domain mediating interaction with RNA, suggesting that Nip7 is an adaptor protein with the C-terminal domain interacting with RNA targets and the N-terminal domain mediating interaction with protein targets. Structural analyses of the RNA-interacting surfaces of Saccharomyces cerevisiae and Pyrococcus abyssi Nip7 orthologs indicate that, in the archaeal PUA domain, C-terminal positively charged residues (arginines and lysines) are involved in RNA interaction while equivalent positions in eukaryotic orthologs are occupied by mostly hydrophobic residues. Both proteins can bind specifically to polyuridine, and RNA interaction requires specific residues of the PUA domain as determined by site-directed mutagenesis."
definition: >-
  PUA RNA binding domain of ribosome assembly factor Nip7 and similar proteins. The RNA-binding PUA (PseudoUridine synthase and Archaeosine transglycosylase) domain was detected in a number of proteins involved in RNA metabolism. This eukaryotic and archaeal subfamily contains the conserved protein Nip7 and similar proteins, which are involved in ribosome biogenesis, taking part in 27S pre-rRNA processing and in formation of 60S ribosomal subunit. Nip7 orthologs share a two-domain architecture with the C-terminal PUA domain mediating interaction with RNA, suggesting that Nip7 is an adaptor protein with the C-terminal domain interacting with RNA targets and the N-terminal domain mediating interaction with protein targets. Structural analyses of the RNA-interacting surfaces of Saccharomyces cerevisiae and Pyrococcus abyssi Nip7 orthologs indicate that, in the archaeal PUA domain, C-terminal positively charged residues (arginines and lysines) are involved in RNA interaction while equivalent positions in eukaryotic orthologs are occupied by mostly hydrophobic residues. Both proteins can bind specifically to polyuridine, and RNA interaction requires specific residues of the PUA domain as determined by site-directed mutagenesis. — an NCBI CDD conserved domain (cd21151); members share this curated model.
