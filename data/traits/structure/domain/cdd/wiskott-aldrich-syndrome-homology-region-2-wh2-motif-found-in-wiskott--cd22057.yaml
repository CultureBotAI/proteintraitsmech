identifier: CDD:cd22057
label: "Wiskott Aldrich syndrome homology region 2 (WH2 motif) found in Wiskott-Aldrich Syndrome Protein Family members 1 (WASP1 or WAVE1), 2 (WASP2 or WAVE2) and 3 (WASP3 or WAVE3). This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in three Wiskott-Aldrich syndrome protein (WASP) family verprolin homologous protein (SCAR/WAVE) isoforms: WAVE1, WAVE2, and WAVE3. Members of this family activate actin related protein (Arp)2/3-dependent actin nucleation and branching in response to signals mediated by Rho-family GTPases. The domain structure of these proteins varies, reflecting different modes of regulation; however, they all share a common C-terminal WH2 region which constitutes the smallest fragment necessary for Arp2/3 activation. These proteins interact with actin via their WH2 domain."
definition: >-
  Wiskott Aldrich syndrome homology region 2 (WH2 motif) found in Wiskott-Aldrich Syndrome Protein Family members 1 (WASP1 or WAVE1), 2 (WASP2 or WAVE2) and 3 (WASP3 or WAVE3). This family contains the Wiskott-Aldrich syndrome protein (WASP)-homology domain 2 (WH2) found in three Wiskott-Aldrich syndrome protein (WASP) family verprolin homologous protein (SCAR/WAVE) isoforms: WAVE1, WAVE2, and WAVE3. Members of this family activate actin related protein (Arp)2/3-dependent actin nucleation and branching in response to signals mediated by Rho-family GTPases. The domain structure of these proteins varies, reflecting different modes of regulation; however, they all share a common C-terminal WH2 region which constitutes the smallest fragment necessary for Arp2/3 activation. These proteins interact with actin via their WH2 domain. — an NCBI CDD conserved domain (cd22057); members share this curated model.
