identifier: CDD:cd07531
label: "UmpH/NagD family phosphatase, similar to Bacillus AraL phosphatase, a putative sugar phosphatase. Bacillus subtilis AraL is a phosphatase displaying activity towards different sugar phosphate substrates; it is encoded by the arabinose metabolic operon araABDLMNPQ-abfA and may play a role in the dephosphorylation of substrates related to l-arabinose metabolism. This subfamily belongs to the UmpH/NagD phosphatase family, and to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases."
definition: >-
  UmpH/NagD family phosphatase, similar to Bacillus AraL phosphatase, a putative sugar phosphatase. Bacillus subtilis AraL is a phosphatase displaying activity towards different sugar phosphate substrates; it is encoded by the arabinose metabolic operon araABDLMNPQ-abfA and may play a role in the dephosphorylation of substrates related to l-arabinose metabolism. This subfamily belongs to the UmpH/NagD phosphatase family, and to the haloacid dehalogenase-like (HAD) hydrolases, a large superfamily of diverse enzymes that catalyze carbon or phosphoryl group transfer reactions on a range of substrates, using an active site aspartate in nucleophilic catalysis. Members of this superfamily include 2-L-haloalkanoic acid dehalogenase, azetidine hydrolase, phosphonoacetaldehyde hydrolase, phosphoserine phosphatase, phosphomannomutase, P-type ATPases and many others. HAD hydrolases are found in all three kingdoms of life, and most genomes are predicted to contain multiple HAD-like proteins. Members possess a highly conserved alpha/beta core domain, and many also possess a small cap domain, the fold and function of which is variable. HAD hydrolases are sometimes referred to as belonging to the DDDD superfamily of phosphohydrolases. — an NCBI CDD conserved domain (cd07531); members share this curated model.
