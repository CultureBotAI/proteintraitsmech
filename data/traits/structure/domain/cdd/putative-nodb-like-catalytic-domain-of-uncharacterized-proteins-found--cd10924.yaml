identifier: CDD:cd10924
label: "Putative NodB-like catalytic domain of uncharacterized proteins found in bacteria. The family corresponds to a group of uncharacterized bacterial proteins with high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily."
definition: >-
  Putative NodB-like catalytic domain of uncharacterized proteins found in bacteria. The family corresponds to a group of uncharacterized bacterial proteins with high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily. — an NCBI CDD conserved domain (cd10924); members share this curated model.
