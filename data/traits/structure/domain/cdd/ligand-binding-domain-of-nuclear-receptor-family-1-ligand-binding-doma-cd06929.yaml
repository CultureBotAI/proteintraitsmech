identifier: CDD:cd06929
label: "Ligand-binding domain of nuclear receptor family 1. Ligand-binding domain (LBD) of nuclear receptor (NR) family 1:  This is one of the major subfamily of nuclear receptors, including thyroid receptor, retinoid acid receptor, ecdysone receptor, farnesoid X receptor, vitamin D receptor, and other related receptors. Nuclear receptors form a superfamily of ligand-activated transcription regulators, which regulate various physiological functions, from development, reproduction, to homeostasis and metabolism in animals (metazoans). The family contains not only receptors for known ligands but also orphan receptors for which ligands do not exist or have not been identified. NRs share a common structural organization with a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a flexible hinge and a C-terminal ligand binding domain (LBD)."
