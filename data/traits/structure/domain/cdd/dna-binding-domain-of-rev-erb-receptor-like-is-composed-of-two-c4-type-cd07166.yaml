identifier: CDD:cd07166
label: "DNA-binding domain of REV-ERB receptor-like is composed of two C4-type zinc fingers. DNA-binding domain of REV-ERB receptor- like is composed of two C4-type zinc fingers. Each zinc finger contains a group of four Cys residues which coordinates a single zinc atom. This domain interacts with specific DNA sites upstream of the target gene and modulates the rate of transcriptional initiation. REV-ERB receptors are transcriptional regulators belonging to the nuclear receptor superfamily. They regulate a number of physiological functions including the circadian rhythm, lipid metabolism, and cellular differentiation. REV-ERB receptors bind as a monomer to a (A/G)GGTCA half-site with a 5' AT-rich extension or as a homodimer to a direct repeat 2 element (AGGTCA sequence with a 2-bp spacer), indicating functional diversity. When bound to the DNA, they recruit corepressors (NcoR/histone deacetylase 3) to the promoter, resulting in repression of the target genes. The porphyrin heme has been demonstrated to function as a ligand for REV-ERB receptor. Like other members of the nuclear receptor (NR) superfamily of ligand-activated transcription factors, REV-ERB receptors have a central well conserved DNA binding domain (DBD), a variable N-terminal domain, a non-conserved hinge and a C-terminal ligand binding domain (LBD)."
