identifier: CDD:cd14112
label: "Catalytic kinase domain, second repeat, of the Giant Serine/Threonine Kinase Uncoordinated protein 89. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The nematode Unc-89 gene, through alternative promoter use and splicing, encodes at least six major isoforms (Unc-89A to Unc-89F) of giant muscle proteins that are homologs for the vetebrate obscurin. In flies, five isoforms of Unc-89 have been detected: four in the muscles of adult flies (two in the indirect flight muscle and two in other muscles) and another isoform in the larva. Unc-89 in nematodes is required for normal muscle cell architecture. In flies, it is necessary for the development of a symmetrical sarcomere in the flight muscles. Unc-89 proteins contain several adhesion and signaling domains including multiple copies of the immunoglobulin (Ig) domain, as well as fibronectin type III (FN3), SH3, RhoGEF, and PH domains. The nematode Unc-89 isoforms D, C, D, and F contain two kinase domain with B and F having two complete kinase domains while the first repeat of C and D are partial domains. Homology modeling suggests that the first kinase repeat of Unc-89 may be catalytically inactive, a pseudokinase, while the second kinase repeat may be active. The Unc-89 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic kinase domain, second repeat, of the Giant Serine/Threonine Kinase Uncoordinated protein 89. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The nematode Unc-89 gene, through alternative promoter use and splicing, encodes at least six major isoforms (Unc-89A to Unc-89F) of giant muscle proteins that are homologs for the vetebrate obscurin. In flies, five isoforms of Unc-89 have been detected: four in the muscles of adult flies (two in the indirect flight muscle and two in other muscles) and another isoform in the larva. Unc-89 in nematodes is required for normal muscle cell architecture. In flies, it is necessary for the development of a symmetrical sarcomere in the flight muscles. Unc-89 proteins contain several adhesion and signaling domains including multiple copies of the immunoglobulin (Ig) domain, as well as fibronectin type III (FN3), SH3, RhoGEF, and PH domains. The nematode Unc-89 isoforms D, C, D, and F contain two kinase domain with B and F having two complete kinase domains while the first repeat of C and D are partial domains. Homology modeling suggests that the first kinase repeat of Unc-89 may be catalytically inactive, a pseudokinase, while the second kinase repeat may be active. The Unc-89 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14112); members share this curated model.
