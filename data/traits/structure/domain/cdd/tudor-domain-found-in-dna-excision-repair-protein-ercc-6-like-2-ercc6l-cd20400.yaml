identifier: CDD:cd20400
label: "Tudor domain found in DNA excision repair protein ERCC-6-like 2 (ERCC6L2) and similar proteins. ERCC6L2, also called DNA repair and recombination protein RAD26-like (RAD26L), may be involved in early DNA damage response. It regulates RNA Pol II-mediated transcription via its interaction with DNA-dependent protein kinase (DNA-PK) to resolve R loops and minimize transcription-associated genome instability. ERCC6L2 gene mutations have been associated with bone marrow failure that includes developmental delay and microcephaly. It contains an N-terminal Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in DNA excision repair protein ERCC-6-like 2 (ERCC6L2) and similar proteins. ERCC6L2, also called DNA repair and recombination protein RAD26-like (RAD26L), may be involved in early DNA damage response. It regulates RNA Pol II-mediated transcription via its interaction with DNA-dependent protein kinase (DNA-PK) to resolve R loops and minimize transcription-associated genome instability. ERCC6L2 gene mutations have been associated with bone marrow failure that includes developmental delay and microcephaly. It contains an N-terminal Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20400); members share this curated model.
