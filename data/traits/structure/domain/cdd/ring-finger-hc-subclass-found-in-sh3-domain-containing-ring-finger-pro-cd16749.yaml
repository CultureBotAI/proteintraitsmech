identifier: CDD:cd16749
label: "RING finger, HC subclass, found in SH3 domain-containing RING finger protein 2 (SH3RF2) and similar proteins. SH3RF2, also known as heart protein phosphatase 1-binding protein (HEPP1), plenty of SH3s (POSH)-eliminating RING protein (POSHER), protein phosphatase 1 regulatory subunit 39, or RING finger protein 158 (RNF158), is a putative E3 ubiquitin-protein ligase that acts as an anti-apoptotic regulator for the c-Jun N-terminal kinase (JNK) pathway by binding to and promoting the proteasomal degradation of SH3RF1 (or POSH), a scaffold protein that is required for pro-apoptotic JNK activation. It may also play a role in cardiac functions together with protein phosphatase 1. SH3RF2 contains an N-terminal C3HC4-type RING-HC finger responsible for the E3 ligase activity and four Src Homology 3 (SH3) domains, which are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs."
definition: >-
  RING finger, HC subclass, found in SH3 domain-containing RING finger protein 2 (SH3RF2) and similar proteins. SH3RF2, also known as heart protein phosphatase 1-binding protein (HEPP1), plenty of SH3s (POSH)-eliminating RING protein (POSHER), protein phosphatase 1 regulatory subunit 39, or RING finger protein 158 (RNF158), is a putative E3 ubiquitin-protein ligase that acts as an anti-apoptotic regulator for the c-Jun N-terminal kinase (JNK) pathway by binding to and promoting the proteasomal degradation of SH3RF1 (or POSH), a scaffold protein that is required for pro-apoptotic JNK activation. It may also play a role in cardiac functions together with protein phosphatase 1. SH3RF2 contains an N-terminal C3HC4-type RING-HC finger responsible for the E3 ligase activity and four Src Homology 3 (SH3) domains, which are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. — an NCBI CDD conserved domain (cd16749); members share this curated model.
