identifier: CDD:cd16286
label: "Pseudomonas areoginosa SPM-1 and related metallo-beta-lactamases, subclasses B1 and B2 like; MBL-fold metallo-hydrolase domain. SPM-1 was first identified in a Pseudomonas aeruginosa strain from a paediatric leukaemia patient and is a major clinical problem. MBLs (class B of the Ambler beta-lactamase classification) have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs are most closely related to each other. SPM-1 appears to be a hybrid B1/B2 MBL."
definition: >-
  Pseudomonas areoginosa SPM-1 and related metallo-beta-lactamases, subclasses B1 and B2 like; MBL-fold metallo-hydrolase domain. SPM-1 was first identified in a Pseudomonas aeruginosa strain from a paediatric leukaemia patient and is a major clinical problem. MBLs (class B of the Ambler beta-lactamase classification) have been divided into three subclasses B1, B2 and B3, based on sequence/structural relationships and substrates, with the B1 and B2 MBLs are most closely related to each other. SPM-1 appears to be a hybrid B1/B2 MBL. — an NCBI CDD conserved domain (cd16286); members share this curated model.
