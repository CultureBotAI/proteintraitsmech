identifier: CDD:cd07778
label: "nucleotide-binding domain (NBD) of Saccharomyces cerevisiae protein MPA43 and similar proteins. This subfamily contains a group of uncharacterized proteins with similarity to Saccharomyces cerevisiae protein MPA43. They belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of Saccharomyces cerevisiae protein MPA43 and similar proteins. This subfamily contains a group of uncharacterized proteins with similarity to Saccharomyces cerevisiae protein MPA43. They belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07778); members share this curated model.
