identifier: CDD:cd23089
label: "mitochondrial large subunit assembly factor 15a (mt-LAF15a), mt-LAF15b and related proteins. mt-LAF15 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF). In an mt-LSU assembly intermediate during maturation of the L7/L12 stalk, mt-LAF15 and an additional protein UNK6 form a protrusion similar to mtLSU factors bL10m:bL12m, and a protein module of mt-LAF15, mL75, and UNK6 protein form a continuum of at least 13 helices that is peripherally associated. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large (mt-LSU) and small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs, and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases and cancer development and progression."
