identifier: CDD:cd09079
label: "Streptococcus agalactiae RgfB, part of a putative two component signal transduction system, and related proteins. This family includes Streptococcus agalactiae RgfB (for regulator of fibrinogen binding) and related proteins. The function of RgfB is unknown. It is part of a putative two component signal transduction system designated rgfBDAC (the rgf locus was identified in a screen for mutants of Streptococcus agalactiae with altered binding to fibrinogen). RgfA,-C,and -D do not belong to this superfamily: rgfA encodes a putative response regulator, and rgfC, a putative histidine kinase. All four genes are co-transcribed, and may be involved in regulating expression of bacterial cell surface components. This family belongs to the large EEP (exonuclease/endonuclease/phosphatase) superfamily that contains functionally diverse enzymes that share a common catalytic mechanism of cleaving phosphodiester bonds."
