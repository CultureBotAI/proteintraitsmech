identifier: CDD:cd20598
label: "second cyclin box found in cyclin-T2 (CCNT2). CCNT2, also termed CycT2, is a regulatory subunit of the cyclin-dependent kinase pair (CDK9/cyclin T) complex, also called positive transcription elongation factor B (P-TEFb), which is proposed to facilitate the transition from abortive to production elongation by phosphorylating the CTD (carboxy-terminal domain) of the large subunit of RNA polymerase II (RNAP II). CCNT2 contains two cyclin boxs. The model responds to the second one. The cyclin box is a protein binding domain."
definition: >-
  second cyclin box found in cyclin-T2 (CCNT2). CCNT2, also termed CycT2, is a regulatory subunit of the cyclin-dependent kinase pair (CDK9/cyclin T) complex, also called positive transcription elongation factor B (P-TEFb), which is proposed to facilitate the transition from abortive to production elongation by phosphorylating the CTD (carboxy-terminal domain) of the large subunit of RNA polymerase II (RNAP II). CCNT2 contains two cyclin boxs. The model responds to the second one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20598); members share this curated model.
