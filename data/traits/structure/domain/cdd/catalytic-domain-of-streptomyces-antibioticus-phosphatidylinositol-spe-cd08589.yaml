identifier: CDD:cd08589
label: "Catalytic domain of Streptomyces antibioticus phosphatidylinositol-specific phospholipase C1-like proteins. This subfamily corresponds to the catalytic domain present in Streptomyces antibioticus phosphatidylinositol-specific phospholipase C1 (SaPLC1) and similar proteins. The typical bacterial phosphatidylinositol-specific phospholipase C (PI-PLC, EC 4.6.1.13) catalyzes Ca2+-independent hydrolysis of the membrane lipid phosphatidylinositol (PI) to produce phosphorylated myo-inositol and diacylglycerol (DAG). The catalytic mechanism is based on general base and acid catalysis utilizing two well conserved histidines, and consists of two steps, a phosphotransfer and a phosphodiesterase reaction. In contrast, SaPLC1 is the first known natural Ca2+-dependent bacterial PI-PLC. It is more closely related to the eukaryotic PI-PLCs rather than the typical bacterial PI-PLCs. It participates in PI metabolism to generate myo-inositol-1-phosphate and myo-inositol-1:2-cyclic phosphate simultaneously. SaPLC1 and other members in this subfamily have two Ca2+-chelating amino acid substitutions which convert them from metal-independent enzymes to metal-dependent bacterial PI-PLC. Additionally, SaPLC1 active site utilizes a mechanism of amino acid juxtaposition, swapping amino acid positions, to adapt a calcium binding pocket and maintain more ideal active site geometry to support efficient catalysis."
definition: >-
  Catalytic domain of Streptomyces antibioticus phosphatidylinositol-specific phospholipase C1-like proteins. This subfamily corresponds to the catalytic domain present in Streptomyces antibioticus phosphatidylinositol-specific phospholipase C1 (SaPLC1) and similar proteins. The typical bacterial phosphatidylinositol-specific phospholipase C (PI-PLC, EC 4.6.1.13) catalyzes Ca2+-independent hydrolysis of the membrane lipid phosphatidylinositol (PI) to produce phosphorylated myo-inositol and diacylglycerol (DAG). The catalytic mechanism is based on general base and acid catalysis utilizing two well conserved histidines, and consists of two steps, a phosphotransfer and a phosphodiesterase reaction. In contrast, SaPLC1 is the first known natural Ca2+-dependent bacterial PI-PLC. It is more closely related to the eukaryotic PI-PLCs rather than the typical bacterial PI-PLCs. It participates in PI metabolism to generate myo-inositol-1-phosphate and myo-inositol-1:2-cyclic phosphate simultaneously. SaPLC1 and other members in this subfamily have two Ca2+-chelating amino acid substitutions which convert them from metal-independent enzymes to metal-dependent bacterial PI-PLC. Additionally, SaPLC1 active site utilizes a mechanism of amino acid juxtaposition, swapping amino acid positions, to adapt a calcium binding pocket and maintain more ideal active site geometry to support efficient catalysis. — an NCBI CDD conserved domain (cd08589); members share this curated model.
