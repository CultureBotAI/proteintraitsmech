identifier: CDD:cd13751
label: "transforming growth factor beta (TGF-beta) like domain found in growth/differentiation factors, GDF8 and GDF11, and similar proteins. The family includes GDF8 and GDF11. GDF8, also termed myostatin, acts specifically as a negative regulator of skeletal muscle growth. GDF11, also termed bone morphogenetic protein 11 (BMP-11), is a secreted signal that acts globally to specify positional identity along the anterior/posterior axis during development."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in growth/differentiation factors, GDF8 and GDF11, and similar proteins. The family includes GDF8 and GDF11. GDF8, also termed myostatin, acts specifically as a negative regulator of skeletal muscle growth. GDF11, also termed bone morphogenetic protein 11 (BMP-11), is a secreted signal that acts globally to specify positional identity along the anterior/posterior axis during development. — an NCBI CDD conserved domain (cd13751); members share this curated model.
