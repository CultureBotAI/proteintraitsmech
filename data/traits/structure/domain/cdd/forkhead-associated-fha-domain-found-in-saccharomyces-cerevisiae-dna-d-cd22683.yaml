identifier: CDD:cd22683
label: "forkhead associated (FHA) domain found in Saccharomyces cerevisiae DNA damage response protein kinase DUN1 and similar proteins. DUN1 is a protein kinase that controls the DNA damage response in yeast. It phosphorylates SML1 on serine residues and cooperates with the PAN deadenylation complex in the regulation of RAD5 mRNA levels and cell survival in response to replicational stress. It contains an FHA domain, which is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Saccharomyces cerevisiae DNA damage response protein kinase DUN1 and similar proteins. DUN1 is a protein kinase that controls the DNA damage response in yeast. It phosphorylates SML1 on serine residues and cooperates with the PAN deadenylation complex in the regulation of RAD5 mRNA levels and cell survival in response to replicational stress. It contains an FHA domain, which is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22683); members share this curated model.
