identifier: CDD:cd19198
label: "PR-SET domain found in PR domain zinc finger protein 14 (PRDM14) and similar proteins. PRDM14 (also termed PR domain-containing protein 14) acts as a transcription factor that has both positive and negative roles on transcription. It acts on regulating epigenetic modifications in the cells, playing a key role in the regulation of cell pluripotency, epigenetic reprogramming, differentiation and development. Aberrant PRDM14 expression is associated with tumorigenesis, cell migration and cell chemotherapeutic drugs resistance."
definition: >-
  PR-SET domain found in PR domain zinc finger protein 14 (PRDM14) and similar proteins. PRDM14 (also termed PR domain-containing protein 14) acts as a transcription factor that has both positive and negative roles on transcription. It acts on regulating epigenetic modifications in the cells, playing a key role in the regulation of cell pluripotency, epigenetic reprogramming, differentiation and development. Aberrant PRDM14 expression is associated with tumorigenesis, cell migration and cell chemotherapeutic drugs resistance. — an NCBI CDD conserved domain (cd19198); members share this curated model.
