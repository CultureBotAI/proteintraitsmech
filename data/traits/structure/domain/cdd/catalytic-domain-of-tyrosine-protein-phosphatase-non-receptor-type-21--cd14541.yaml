identifier: CDD:cd14541
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 21 and type 14. Tyrosine-protein phosphatase non-receptor type 3 (PTPN3) and type 4 (PTPN4) belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN3 and PTPN4 are large modular proteins containing an N-terminal FERM domain, a PDZ domain and a C-terminal catalytic PTP domain. PTPN3 interacts with mitogen-activated protein kinase p38gamma and serves as its specific phosphatase. PTPN4 functions in TCR cell signaling, apoptosis, cerebellar synaptic plasticity, and innate immune responses."
definition: >-
