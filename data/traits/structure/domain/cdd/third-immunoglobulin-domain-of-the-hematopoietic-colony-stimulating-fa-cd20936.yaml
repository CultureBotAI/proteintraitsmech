identifier: CDD:cd20936
label: "Third immunoglobulin domain of the hematopoietic colony-stimulating factor 1 receptor (CSF-1R), and similar domains; member of the I-set of IgSF domains. The members here are composed of the third immunoglobulin domain of the hematopoietic colony-stimulating factor 1 receptor (CSF-1R) and similar proteins. CSF-1R, a class III receptor tyrosine kinase (RTKIII), is critical to the survival, proliferation, and differentiation of mononuclear phagocytic cells such as monocytes, tissue macrophages, muscularis macrophages, microglia, osteoclasts, Paneth cells, and myeloid dendritic cells. Human colony-stimulating factor 1 receptor (hCSF-1R) is unique among the hematopoietic receptors because it is activated by two distinct cytokines, CSF-1 and interleukin-34 (IL-34). The Ig superfamily (IgSF) is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. Members of this group are components of immunoglobulin, neuroglia, cell surface glycoproteins, such as, T-cell receptors, CD2, CD4, CD8, and membrane glycoproteins, such as, butyrophilin and chondroitin sulfate proteoglycan core protein. A predominant feature of most Ig domains is a disulfide bridge connecting the two beta-sheets with a tryptophan residue packed against the disulfide bond. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the I-set of IgSF domains."
definition: >-
  Third immunoglobulin domain of the hematopoietic colony-stimulating factor 1 receptor (CSF-1R), and similar domains; member of the I-set of IgSF domains. The members here are composed of the third immunoglobulin domain of the hematopoietic colony-stimulating factor 1 receptor (CSF-1R) and similar proteins. CSF-1R, a class III receptor tyrosine kinase (RTKIII), is critical to the survival, proliferation, and differentiation of mononuclear phagocytic cells such as monocytes, tissue macrophages, muscularis macrophages, microglia, osteoclasts, Paneth cells, and myeloid dendritic cells. Human colony-stimulating factor 1 receptor (hCSF-1R) is unique among the hematopoietic receptors because it is activated by two distinct cytokines, CSF-1 and interleukin-34 (IL-34). The Ig superfamily (IgSF) is a heterogenous group of proteins, built on a common fold comprised of a sandwich of two beta sheets. Members of this group are components of immunoglobulin, neuroglia, cell surface glycoproteins, such as, T-cell receptors, CD2, CD4, CD8, and membrane glycoproteins, such as, butyrophilin and chondroitin sulfate proteoglycan core protein. A predominant feature of most Ig domains is a disulfide bridge connecting the two beta-sheets with a tryptophan residue packed against the disulfide bond. IgSF domains can be divided into 4 main classes based on their structures and sequences: the Variable (V), Constant 1 (C1), Constant 2 (C2), and Intermediate (I) sets. This group belongs to the I-set of IgSF domains. — an NCBI CDD conserved domain (cd20936); members share this curated model.
