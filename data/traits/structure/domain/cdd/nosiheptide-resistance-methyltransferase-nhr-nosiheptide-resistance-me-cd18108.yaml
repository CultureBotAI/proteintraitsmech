identifier: CDD:cd18108
label: "Nosiheptide-resistance methyltransferase (NHR). Nosiheptide-resistance methyltransferase (NHR) confers resistance to the thiazole antibiotic nosiheptide via catalyzing 2'O-methylation of 23S rRNA at the nucleotide A1067. NHR is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  Nosiheptide-resistance methyltransferase (NHR). Nosiheptide-resistance methyltransferase (NHR) confers resistance to the thiazole antibiotic nosiheptide via catalyzing 2'O-methylation of 23S rRNA at the nucleotide A1067. NHR is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18108); members share this curated model.
