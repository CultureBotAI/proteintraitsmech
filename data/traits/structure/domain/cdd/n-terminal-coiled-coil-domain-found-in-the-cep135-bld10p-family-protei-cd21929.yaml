identifier: CDD:cd21929
label: "N-terminal coiled-coil domain found in the CEP135/Bld10p family proteins. The CEP135/Bld10p family proteins are evolutionarily conserved microtubule-associated proteins important for centriole formation. The prototypes of this family include human centrosomal protein of 135 kDa (CEP135) and Chlamydomonas reinhardtii Bld10p. CEP135, also called centrosomal protein 4 (CEP4), is a novel coiled-coil centrosomal protein involved in microtubule organization in mammalian cells. It has been implicated in early centriole assembly/duplication/biogenesis/formation. It is required for centriole elongation, as well as for the recruitment of CEP295 to the proximal end of new-born centrioles at the centriolar microtubule wall during early S phase in a PLK4-dependent manner. Bld10Pis a novel coiled-coil protein essential for basal body assembly in Chlamydomonas. It is localized to the cartwheel, a 9-fold symmetrical structure possibly functioning as the scaffold for the centriole-microtubule assembly. It acts as a major spoke-tip component that extends the cartwheel diameter and attaches triplet microtubules. The model corresponds to the N-terminal coiled-coil domain of CEP135/Bld10p, which forms a very stable, parallel, two-stranded coiled-coil structure."
definition: >-
  N-terminal coiled-coil domain found in the CEP135/Bld10p family proteins. The CEP135/Bld10p family proteins are evolutionarily conserved microtubule-associated proteins important for centriole formation. The prototypes of this family include human centrosomal protein of 135 kDa (CEP135) and Chlamydomonas reinhardtii Bld10p. CEP135, also called centrosomal protein 4 (CEP4), is a novel coiled-coil centrosomal protein involved in microtubule organization in mammalian cells. It has been implicated in early centriole assembly/duplication/biogenesis/formation. It is required for centriole elongation, as well as for the recruitment of CEP295 to the proximal end of new-born centrioles at the centriolar microtubule wall during early S phase in a PLK4-dependent manner. Bld10Pis a novel coiled-coil protein essential for basal body assembly in Chlamydomonas. It is localized to the cartwheel, a 9-fold symmetrical structure possibly functioning as the scaffold for the centriole-microtubule assembly. It acts as a major spoke-tip component that extends the cartwheel diameter and attaches triplet microtubules. The model corresponds to the N-terminal coiled-coil domain of CEP135/Bld10p, which forms a very stable, parallel, two-stranded coiled-coil structure. — an NCBI CDD conserved domain (cd21929); members share this curated model.
