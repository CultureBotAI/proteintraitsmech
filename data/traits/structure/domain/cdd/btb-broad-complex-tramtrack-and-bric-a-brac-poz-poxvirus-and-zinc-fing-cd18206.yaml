identifier: CDD:cd18206
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 17 (ZBTB17). ZBTB1 is also called c-Myc-interacting zinc finger protein 1 (Miz-1), zinc finger protein 151, or zinc finger protein 60. It is a poly-Cys2His2 zinc finger (ZF) transcription factor that can function as an activator or repressor depending on its binding partners, and by targeting negative regulators of cell cycle progression. ZBTB17 has been implicated in cardiomyopathy and is important in cardiac stress response. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 17 (ZBTB17). ZBTB1 is also called c-Myc-interacting zinc finger protein 1 (Miz-1), zinc finger protein 151, or zinc finger protein 60. It is a poly-Cys2His2 zinc finger (ZF) transcription factor that can function as an activator or repressor depending on its binding partners, and by targeting negative regulators of cell cycle progression. ZBTB17 has been implicated in cardiomyopathy and is important in cardiac stress response. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18206); members share this curated model.
