identifier: CDD:cd17028
label: "Class IA type III secretion system chaperone protein, similar to Chlamydia SycE/Scc1. This family includes type III secretion system (T3SS) chaperone proteins similar to Chlamydia SycE (also known as Scc1) and similar proteins. Chlamydia SycE is homologous to that of the SycE chaperone protein of Yersinia, which is involved in promoting translocation of Yersinia outer protein E (YopE). In Chlamydia, two T3SS chaperones, Scc1 and Scc4, work together to promote secretion of the important effector and plug protein, CopN, whereas, the Scc3 chaperone represses its secretion."
definition: >-
  Class IA type III secretion system chaperone protein, similar to Chlamydia SycE/Scc1. This family includes type III secretion system (T3SS) chaperone proteins similar to Chlamydia SycE (also known as Scc1) and similar proteins. Chlamydia SycE is homologous to that of the SycE chaperone protein of Yersinia, which is involved in promoting translocation of Yersinia outer protein E (YopE). In Chlamydia, two T3SS chaperones, Scc1 and Scc4, work together to promote secretion of the important effector and plug protein, CopN, whereas, the Scc3 chaperone represses its secretion. — an NCBI CDD conserved domain (cd17028); members share this curated model.
