identifier: CDD:cd13167
label: "PTB-containing, cubilin and LRP1-interacting protein Phosphotyrosine-binding (PTB) PH-like fold. P-CLI1 (also called Phosphotyrosine interaction domain-containing protein 1) increases proliferation of preadipocytes without affecting adipocytic differentiation. It forms a complex with PID1/PCLI1, LRP1 and CUBNI. It is found in subcutaneous fat, heart, skeletal muscle, brain, colon, thymus, spleen, kidney, liver, small intestine, placenta, lung and peripheral blood leukocyte. P-CLI1 contains a single PTB domain. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains."
definition: >-
  PTB-containing, cubilin and LRP1-interacting protein Phosphotyrosine-binding (PTB) PH-like fold. P-CLI1 (also called Phosphotyrosine interaction domain-containing protein 1) increases proliferation of preadipocytes without affecting adipocytic differentiation. It forms a complex with PID1/PCLI1, LRP1 and CUBNI. It is found in subcutaneous fat, heart, skeletal muscle, brain, colon, thymus, spleen, kidney, liver, small intestine, placenta, lung and peripheral blood leukocyte. P-CLI1 contains a single PTB domain. PTB domains have a common PH-like fold and are found in various eukaryotic signaling molecules. This domain was initially shown to binds peptides with a NPXY motif with differing requirements for phosphorylation of the tyrosine, although more recent studies have found that some types of PTB domains can bind to peptides lack tyrosine residues altogether. In contrast to SH2 domains, which recognize phosphotyrosine and adjacent carboxy-terminal residues, PTB-domain binding specificity is conferred by residues amino-terminal to the phosphotyrosine. PTB domains are classified into three groups: phosphotyrosine-dependent Shc-like, phosphotyrosine-dependent IRS-like, and phosphotyrosine-independent Dab-like PTB domains. — an NCBI CDD conserved domain (cd13167); members share this curated model.
