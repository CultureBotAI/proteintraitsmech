identifier: CDD:cd17335
label: "Major facilitator superfamily domain-containing protein 6. Human Major facilitator superfamily domain-containing protein 6 (MFSD6) is also called macrophage MHC class I receptor 2 homolog (MMR2). It has been postulated as a possible receptor for human leukocyte antigen (HLA)-B62. MFSD6 is conserved through evolution and appeared before bilateral animals. It belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 6. Human Major facilitator superfamily domain-containing protein 6 (MFSD6) is also called macrophage MHC class I receptor 2 homolog (MMR2). It has been postulated as a possible receptor for human leukocyte antigen (HLA)-B62. MFSD6 is conserved through evolution and appeared before bilateral animals. It belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17335); members share this curated model.
