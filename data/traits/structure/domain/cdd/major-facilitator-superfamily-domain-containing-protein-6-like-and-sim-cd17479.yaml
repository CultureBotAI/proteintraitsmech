identifier: CDD:cd17479
label: "Major facilitator superfamily domain-containing protein 6-like and similar transporters of the Major Facilitator Superfamily. Major facilitator superfamily domain-containing protein 6-like (MFSD6L) protein family includes a group uncharacterized proteins similar to human major facilitator superfamily domain-containing protein 6 (MFSD6). MFSD6 is also called Macrophage MHC class I receptor 2 homolog (MMR2). It has been postulated as a possible receptor for human leukocyte antigen (HLA)-B62. The MFSD6L family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 6-like and similar transporters of the Major Facilitator Superfamily. Major facilitator superfamily domain-containing protein 6-like (MFSD6L) protein family includes a group uncharacterized proteins similar to human major facilitator superfamily domain-containing protein 6 (MFSD6). MFSD6 is also called Macrophage MHC class I receptor 2 homolog (MMR2). It has been postulated as a possible receptor for human leukocyte antigen (HLA)-B62. The MFSD6L family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17479); members share this curated model.
