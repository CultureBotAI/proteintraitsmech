identifier: CDD:cd17025
label: "Class IA type III secretion system chaperone protein, similar to Pseudomonas syringae ShcF. This family includes type III secretion system (T3SS) chaperone proteins similar to Pseudomonas syringae ShcF and similar proteins. In P. syringae, which is a plant pathogen that can infect a wide range of species, the T3SS allows injection of the effector protein AvrPphF into genetically susceptible host cells.  Chaperone ShcF (originally known as AvrPphF ORD1) binds AvrPphF in a similar manner to type III chaperones from bacterial pathogens of animals, indicating structural conservation of these specialized chaperones, despite high sequence divergence."
definition: >-
  Class IA type III secretion system chaperone protein, similar to Pseudomonas syringae ShcF. This family includes type III secretion system (T3SS) chaperone proteins similar to Pseudomonas syringae ShcF and similar proteins. In P. syringae, which is a plant pathogen that can infect a wide range of species, the T3SS allows injection of the effector protein AvrPphF into genetically susceptible host cells. Chaperone ShcF (originally known as AvrPphF ORD1) binds AvrPphF in a similar manner to type III chaperones from bacterial pathogens of animals, indicating structural conservation of these specialized chaperones, despite high sequence divergence. — an NCBI CDD conserved domain (cd17025); members share this curated model.
