identifier: CDD:cd22816
label: "Transmembrane protein 203. Transmembrane protein 203 (TMEM203) is a conserved putative transmembrane protein that functions as a regulator of signaling pathways activated in response to diverse bacterial and viral stimuli. It has been shown in humans to be an intracellular regulator of STimulator of IFN Genes (STING)-mediated signaling and to interact with the pleiotropic inositol phosphate signaling pathway protein IP3R. In T-cells of patients with systemic lupus erythematosus (SLE), a disease characterized by the over-expression of type I interferons (IFN1), elevated TMEM203 mRNA levels are associated with disease activity. Thus, identification of TMEM203 may elucidate the control of STING-mediated innate immune responses, and provide a potential novel mechanism for therapeutic interventions in STING-associated inflammatory diseases."
definition: >-
