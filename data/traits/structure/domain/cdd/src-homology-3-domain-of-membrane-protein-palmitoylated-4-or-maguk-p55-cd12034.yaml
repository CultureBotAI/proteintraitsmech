identifier: CDD:cd12034
label: "Src Homology 3 domain of Membrane Protein, Palmitoylated 4 (or MAGUK p55 subfamily member 4). MPP4, also called Disks Large homolog 6 (DLG6) or Amyotrophic lateral sclerosis 2 chromosomal region candidate gene 5 protein (ALS2CR5), is a retina-specific scaffolding protein that plays a role in organizing presynaptic protein complexes in the photoreceptor synapse, where it localizes to the plasma membrane. It is required in the proper localization of calcium ATPases and for maintenance of calcium homeostasis. MPP4 is one of seven vertebrate homologs of the Drosophila Stardust protein, which is required in establishing cell polarity, and it contains two L27 domains followed by the core of three domains characteristic of MAGUK (membrane-associated guanylate kinase) proteins: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Membrane Protein, Palmitoylated 4 (or MAGUK p55 subfamily member 4). MPP4, also called Disks Large homolog 6 (DLG6) or Amyotrophic lateral sclerosis 2 chromosomal region candidate gene 5 protein (ALS2CR5), is a retina-specific scaffolding protein that plays a role in organizing presynaptic protein complexes in the photoreceptor synapse, where it localizes to the plasma membrane. It is required in the proper localization of calcium ATPases and for maintenance of calcium homeostasis. MPP4 is one of seven vertebrate homologs of the Drosophila Stardust protein, which is required in establishing cell polarity, and it contains two L27 domains followed by the core of three domains characteristic of MAGUK (membrane-associated guanylate kinase) proteins: PDZ, SH3, and guanylate kinase (GuK). The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12034); members share this curated model.
