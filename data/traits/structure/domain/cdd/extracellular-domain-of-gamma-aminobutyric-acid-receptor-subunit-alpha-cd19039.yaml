identifier: CDD:cd19039
label: "extracellular domain of gamma-aminobutyric acid receptor subunit alpha-6 (GABAAR-A6 or GABRA6). This family contains extracellular domain of gamma-aminobutyric acid receptor subunit alpha-6 (GABAAR-A6), a protein that is encoded by the GABRA6 gene in humans. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The alpha-6 subunit forms heteropentamers with other GABAAR subunits, most broadly expressed as alpha6-beta-gamma2 found extrasynaptically, alpha6-beta2/3-delta in the cerebellar granule cells and likely also forms alpha1-alpha6-beta-gamma/alpha1-alpha6-beta-delta. A GABRA6 mutation from Arg to Trp, has been identified as a susceptibility gene that may contribute to the pathogenesis of childhood absence epilepsy and cause neuronal disinhibition and increase in seizures via a reduction of alphabetagamma and alphabetadelta receptor function and expression. Polymorphism in the GABRA6 gene is associated with specific personality characteristics as well as a marked attenuation in hormonal and blood pressure responses to psychological stress. Alpha6-containing receptors lack high sensitivity to diazepam."
definition: >-
  extracellular domain of gamma-aminobutyric acid receptor subunit alpha-6 (GABAAR-A6 or GABRA6). This family contains extracellular domain of gamma-aminobutyric acid receptor subunit alpha-6 (GABAAR-A6), a protein that is encoded by the GABRA6 gene in humans. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to the ligand binding site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. The alpha-6 subunit forms heteropentamers with other GABAAR subunits, most broadly expressed as alpha6-beta-gamma2 found extrasynaptically, alpha6-beta2/3-delta in the cerebellar granule cells and likely also forms alpha1-alpha6-beta-gamma/alpha1-alpha6-beta-delta. A GABRA6 mutation from Arg to Trp, has been identified as a susceptibility gene that may contribute to the pathogenesis of childhood absence epilepsy and cause neuronal disinhibition and increase in seizures via a reduction of alphabetagamma and alphabetadelta receptor function and expression. Polymorphism in the GABRA6 gene is associated with specific personality characteristics as well as a marked attenuation in hormonal and blood pressure responses to psychological stress. Alpha6-containing receptors lack high sensitivity to diazepam. — an NCBI CDD conserved domain (cd19039); members share this curated model.
