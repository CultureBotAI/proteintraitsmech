identifier: CDD:cd21853
label: "N-terminal domain found in kinetochore scaffold 1 (KNL1) and similar proteins. Kinetochore scaffold 1 (KNL1), also called ALL1-fused gene from chromosome 15q14 protein (AF15q14), Bub-linking kinetochore protein (Blinkin), cancer susceptibility candidate gene 5 protein (CASC5), cancer/testis antigen 29 (CT29), kinetochore-null protein 1, or protein D40/AF15q14, plays crucial roles during mitosis. It is essential for spindle-assembly checkpoint (SAC) signaling and for correct chromosome alignment. It is required for attachment of the kinetochores to the spindle microtubules. KNL1 directly links BUB1 and BUB1B to kinetochores. It is part of the MIS12 complex, which may be fundamental for kinetochore formation and proper chromosome segregation during mitosis. KNL1 also acts in coordination with CENPK to recruit the NDC80 complex to the outer kinetochore. This model corresponds to  a small conserved region at the N-terminus of KNL1, which is responsible for the binding of protein phosphatase 1 (PP1). PP1 regulates SAC silencing and mitotic exit, and is targeted to kinetochores, in part, by KNL1."
definition: >-
  N-terminal domain found in kinetochore scaffold 1 (KNL1) and similar proteins. Kinetochore scaffold 1 (KNL1), also called ALL1-fused gene from chromosome 15q14 protein (AF15q14), Bub-linking kinetochore protein (Blinkin), cancer susceptibility candidate gene 5 protein (CASC5), cancer/testis antigen 29 (CT29), kinetochore-null protein 1, or protein D40/AF15q14, plays crucial roles during mitosis. It is essential for spindle-assembly checkpoint (SAC) signaling and for correct chromosome alignment. It is required for attachment of the kinetochores to the spindle microtubules. KNL1 directly links BUB1 and BUB1B to kinetochores. It is part of the MIS12 complex, which may be fundamental for kinetochore formation and proper chromosome segregation during mitosis. KNL1 also acts in coordination with CENPK to recruit the NDC80 complex to the outer kinetochore. This model corresponds to a small conserved region at the N-terminus of KNL1, which is responsible for the binding of protein phosphatase 1 (PP1). PP1 regulates SAC silencing and mitotic exit, and is targeted to kinetochores, in part, by KNL1. — an NCBI CDD conserved domain (cd21853); members share this curated model.
