identifier: CDD:cd09878
label: "VapC-like PIN domain of an uncharacterized AAA+, VirB11-like ATPase-, KH- and PIN-domain containing protein MJ1533 from Methanocaldococcus jannaschii DSM 2661, and other similar archaeal homologs. PIN (PilT N terminus) domain present N-terminal of AAA+, VirB11-like ATPases. Several members of this subfamily possess an AAA+, VirB11-like ATPase domain, flanked by PIN and KH nucleic acid-binding domains. VirB11-ATPase is a type IV secretory pathway component required for T-pilus biogenesis and virulence. This subgroup belongs to the VapC (virulence-associated protein C)-like family of the PIN domain nuclease superfamily. VapC is the PIN-domain ribonuclease toxin from prokaryotic VapBC toxin-antitoxin (TA) systems. VapB is a transcription factor-like protein antitoxin acting as an inhibitor. Other members of the VapC-like nuclease family include FitB toxin of the FitAB TA system, eukaryotic ribonucleases such as Smg6, ribosome assembly factor NOB1, exosome subunit Rrp44 endoribonuclease and rRNA-processing protein Fcf1. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. PIN domains within this subgroup contain four of these highly conserved residues which cluster at the C-terminal end of the beta-sheet and form a negatively charged pocket near the center of the molecule. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons."
definition: >-
  VapC-like PIN domain of an uncharacterized AAA+, VirB11-like ATPase-, KH- and PIN-domain containing protein MJ1533 from Methanocaldococcus jannaschii DSM 2661, and other similar archaeal homologs. PIN (PilT N terminus) domain present N-terminal of AAA+, VirB11-like ATPases. Several members of this subfamily possess an AAA+, VirB11-like ATPase domain, flanked by PIN and KH nucleic acid-binding domains. VirB11-ATPase is a type IV secretory pathway component required for T-pilus biogenesis and virulence. This subgroup belongs to the VapC (virulence-associated protein C)-like family of the PIN domain nuclease superfamily. VapC is the PIN-domain ribonuclease toxin from prokaryotic VapBC toxin-antitoxin (TA) systems. VapB is a transcription factor-like protein antitoxin acting as an inhibitor. Other members of the VapC-like nuclease family include FitB toxin of the FitAB TA system, eukaryotic ribonucleases such as Smg6, ribosome assembly factor NOB1, exosome subunit Rrp44 endoribonuclease and rRNA-processing protein Fcf1. The structural properties of the PIN domain indicate its active center, consisting of three highly conserved catalytic residues which coordinate metal ions; in some members, additional metal coordinating residues can be found while some others lack several of these key catalytic residues. PIN domains within this subgroup contain four of these highly conserved residues which cluster at the C-terminal end of the beta-sheet and form a negatively charged pocket near the center of the molecule. The PIN active site is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. — an NCBI CDD conserved domain (cd09878); members share this curated model.
