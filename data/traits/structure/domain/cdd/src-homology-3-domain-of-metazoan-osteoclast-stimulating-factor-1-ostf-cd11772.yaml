identifier: CDD:cd11772
label: "Src Homology 3 domain of metazoan osteoclast stimulating factor 1. OSTF1, also named OSF or SH3P2, is a signaling protein containing SH3 and ankyrin-repeat domains. It acts through a Src-related pathway to enhance the formation of osteoclasts and bone resorption. It also acts as a negative regulator of cell motility. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
