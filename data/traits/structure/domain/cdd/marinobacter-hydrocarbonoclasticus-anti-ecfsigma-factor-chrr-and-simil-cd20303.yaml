identifier: CDD:cd20303
label: "Marinobacter hydrocarbonoclasticus anti-ECFsigma factor ChrR, and similar proteins; 2 heterologous tandem repeats of cupin domain. This family contains bacterial anti-sigma factor such as ChrR from Marinobacter hydrocarbonoclasticus. Anti-sigma factor ChrR is a member of the ZAS (Zn2+ anti-sigma) subfamily of group IV anti-sigmas. It inhibits transcriptional activity by binding to the ECF sigma factor E (sigmaE), an essential factor to mount a transcriptional response to a singlet oxygen and for viability when carotenoids are limiting. This protein family likely contains two distinct homologous functional domains belonging to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  Marinobacter hydrocarbonoclasticus anti-ECFsigma factor ChrR, and similar proteins; 2 heterologous tandem repeats of cupin domain. This family contains bacterial anti-sigma factor such as ChrR from Marinobacter hydrocarbonoclasticus. Anti-sigma factor ChrR is a member of the ZAS (Zn2+ anti-sigma) subfamily of group IV anti-sigmas. It inhibits transcriptional activity by binding to the ECF sigma factor E (sigmaE), an essential factor to mount a transcriptional response to a singlet oxygen and for viability when carotenoids are limiting. This protein family likely contains two distinct homologous functional domains belonging to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd20303); members share this curated model.
