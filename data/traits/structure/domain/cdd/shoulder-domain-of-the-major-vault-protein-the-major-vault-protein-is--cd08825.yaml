identifier: CDD:cd08825
label: "Shoulder domain of the major vault protein. The major vault protein is the major polypeptide component of a large cellular ribonuclear protein complex found in the cytoplasm of eukaryotic cells. Its shoulder domain appears to be a homolog of the SPFH core domain. Vault proteins may be involved in detoxification processes, and have been associated with the multi-drug resistance (MDR) phenotype in malignancies. Presumably they play a role in transport processes."
definition: >-
  Shoulder domain of the major vault protein. The major vault protein is the major polypeptide component of a large cellular ribonuclear protein complex found in the cytoplasm of eukaryotic cells. Its shoulder domain appears to be a homolog of the SPFH core domain. Vault proteins may be involved in detoxification processes, and have been associated with the multi-drug resistance (MDR) phenotype in malignancies. Presumably they play a role in transport processes. — an NCBI CDD conserved domain (cd08825); members share this curated model.
