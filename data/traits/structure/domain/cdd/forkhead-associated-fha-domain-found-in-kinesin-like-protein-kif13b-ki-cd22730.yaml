identifier: CDD:cd22730
label: "forkhead associated (FHA) domain found in kinesin-like protein KIF13B. KIF13B, also called kinesin-like protein GAKIN, is a novel kinesin-like protein that associates with the human homolog of the Drosophila discs large tumor suppressor in T lymphocytes. It is involved in reorganization of the cortical cytoskeleton. It regulates axon formation by promoting the formation of extra axons. KIF13B may be functionally important for the intracellular trafficking of membrane-associated guanylate kinase homologs (MAGUKs) and associated protein complexes. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in kinesin-like protein KIF13B. KIF13B, also called kinesin-like protein GAKIN, is a novel kinesin-like protein that associates with the human homolog of the Drosophila discs large tumor suppressor in T lymphocytes. It is involved in reorganization of the cortical cytoskeleton. It regulates axon formation by promoting the formation of extra axons. KIF13B may be functionally important for the intracellular trafficking of membrane-associated guanylate kinase homologs (MAGUKs) and associated protein complexes. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22730); members share this curated model.
