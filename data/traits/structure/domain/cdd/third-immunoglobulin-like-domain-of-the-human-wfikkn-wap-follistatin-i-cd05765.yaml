identifier: CDD:cd05765
label: "Third immunoglobulin-like domain of the human WFIKKN (WAP, follistatin, immunoglobulin, Kunitz and NTR domain-containing protein), and similar domains; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the third immunoglobulin-like domain of the human WFIKKN (WAP, follistatin, immunoglobulin, Kunitz and NTR domain-containing protein) and similar proteins. WFIKKN is a secreted protein that consists of multiple types of protease inhibitory modules, including two tandem Kunitz-type protease inhibitor-domains. The Ig superfamily is a heterogenous group of proteins built on a common fold comprised of a sandwich of two beta sheets. Members of the Ig superfamily are components of immunoglobulin, neuroglia, cell surface glycoproteins, such as T-cell receptors, CD2, CD4, CD8, and membrane glycoproteins, such as butyrophilin and chondroitin sulfate proteoglycan core protein. A predominant feature of most Ig domains is a disulfide bridge connecting the two beta-sheets with a tryptophan residue packed against the disulfide bond. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C\" strand."
definition: >-
  Third immunoglobulin-like domain of the human WFIKKN (WAP, follistatin, immunoglobulin, Kunitz and NTR domain-containing protein), and similar domains; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the third immunoglobulin-like domain of the human WFIKKN (WAP, follistatin, immunoglobulin, Kunitz and NTR domain-containing protein) and similar proteins. WFIKKN is a secreted protein that consists of multiple types of protease inhibitory modules, including two tandem Kunitz-type protease inhibitor-domains. The Ig superfamily is a heterogenous group of proteins built on a common fold comprised of a sandwich of two beta sheets. Members of the Ig superfamily are components of immunoglobulin, neuroglia, cell surface glycoproteins, such as T-cell receptors, CD2, CD4, CD8, and membrane glycoproteins, such as butyrophilin and chondroitin sulfate proteoglycan core protein. A predominant feature of most Ig domains is a disulfide bridge connecting the two beta-sheets with a tryptophan residue packed against the disulfide bond. This group belongs to the I-set of IgSF domains, having A-B-E-D strands in one beta-sheet and A'-G-F-C-C' in the other. Like the V-set Ig domains, members of the I-set have a discontinuous A strand, but lack a C" strand. — an NCBI CDD conserved domain (cd05765); members share this curated model.
