identifier: CDD:cd19716
label: "basic helix-loop-helix (bHLH) domain found in neurogenin-1 (NGN-1) and similar proteins. NGN-1, also termed Class A basic helix-loop-helix protein 6 (bHLHa6), or neurogenic basic-helix-loop-helix protein, or neurogenic differentiation factor 3 (NeuroD3), is a neural-specific bHLH transcription factor involved in the initiation of neuronal differentiation. It activates transcription by binding to the E box (5'-CANNTG-3')."
definition: >-
  basic helix-loop-helix (bHLH) domain found in neurogenin-1 (NGN-1) and similar proteins. NGN-1, also termed Class A basic helix-loop-helix protein 6 (bHLHa6), or neurogenic basic-helix-loop-helix protein, or neurogenic differentiation factor 3 (NeuroD3), is a neural-specific bHLH transcription factor involved in the initiation of neuronal differentiation. It activates transcription by binding to the E box (5'-CANNTG-3'). — an NCBI CDD conserved domain (cd19716); members share this curated model.
