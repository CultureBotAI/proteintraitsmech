identifier: CDD:cd22616
label: "Kunitz domain 1 (KD1) of tissue factor pathway inhibitor 2 (TFPI2) and similar proteins. This model represents the Kunitz-type domain 1 (KD1) of tissue factor pathway inhibitor 2 (TFPI2 or TFPI-2) and similar proteins. TFPI2 exhibits inhibitory activity primarily toward trypsin, plasmin, and factor VIIa (FVIIa)/tissue factor (TF) via its KD1. It is believed to be the major inhibitor of plasmin in the extracellular matrix (ECM) but has little inhibitory activity toward urokinase-type plasminogen activator, tissue-type plasminogen activator, or thrombin. TFPI2 specifically inhibits the proteases via the P1 arginine residue in KD1. The TFPI2 domains KD2 and KD3 appear to have no discernible inhibitory activity and may serve to bind to nearby proteins to localize TFPI2 in the ECM. Structure studies of KD1 complexed with proteases may help in the development of specific and potent KD1 domain protein that may have a large pharmacologic impact in preventing tumor metastasis, retinal degeneration, and degradation of collagen in the ECM. The structure of this domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz domain 1 (KD1) of tissue factor pathway inhibitor 2 (TFPI2) and similar proteins. This model represents the Kunitz-type domain 1 (KD1) of tissue factor pathway inhibitor 2 (TFPI2 or TFPI-2) and similar proteins. TFPI2 exhibits inhibitory activity primarily toward trypsin, plasmin, and factor VIIa (FVIIa)/tissue factor (TF) via its KD1. It is believed to be the major inhibitor of plasmin in the extracellular matrix (ECM) but has little inhibitory activity toward urokinase-type plasminogen activator, tissue-type plasminogen activator, or thrombin. TFPI2 specifically inhibits the proteases via the P1 arginine residue in KD1. The TFPI2 domains KD2 and KD3 appear to have no discernible inhibitory activity and may serve to bind to nearby proteins to localize TFPI2 in the ECM. Structure studies of KD1 complexed with proteases may help in the development of specific and potent KD1 domain protein that may have a large pharmacologic impact in preventing tumor metastasis, retinal degeneration, and degradation of collagen in the ECM. The structure of this domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22616); members share this curated model.
