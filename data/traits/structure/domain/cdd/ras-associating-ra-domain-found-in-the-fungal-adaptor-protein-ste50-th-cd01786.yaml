identifier: CDD:cd01786
label: "Ras-associating (RA) domain found in the fungal adaptor protein STE50. The fungal adaptor protein STE50 is an essential component of three MAPK-mediated signaling pathways that control the mating response, invasive/filamentous growth and osmotolerance (HOG pathway), respectively. STE50 functions in cell signaling between the activated G protein and STE11. The domain architecture of STE50 includes an amino-terminal SAM (sterile alpha motif) domain in addition to the carboxy-terminal ubiquitin-like RA (RAS-associated) domain. RA domain of STE50 interacts with the small GTPase Cdc42p, a member of Rho type of the Ras superfamily. This interaction activates Ste11p/Ste7p/Kss1pMAP kinase cascade that controls filamentous growth. RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes."
definition: >-
  Ras-associating (RA) domain found in the fungal adaptor protein STE50. The fungal adaptor protein STE50 is an essential component of three MAPK-mediated signaling pathways that control the mating response, invasive/filamentous growth and osmotolerance (HOG pathway), respectively. STE50 functions in cell signaling between the activated G protein and STE11. The domain architecture of STE50 includes an amino-terminal SAM (sterile alpha motif) domain in addition to the carboxy-terminal ubiquitin-like RA (RAS-associated) domain. RA domain of STE50 interacts with the small GTPase Cdc42p, a member of Rho type of the Ras superfamily. This interaction activates Ste11p/Ste7p/Kss1pMAP kinase cascade that controls filamentous growth. RA domain has the beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. — an NCBI CDD conserved domain (cd01786); members share this curated model.
