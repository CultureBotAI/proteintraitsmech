identifier: CDD:cd01782
label: "Ras-associating (RA) domain 1 found in Afadin. Afadin, also termed ALL1-fused gene from chromosome 6 protein (AF-6), or canoe, is involved in many fundamental signaling cascades in cells. In addition, it is involved in oncogenesis and metastasis. Afadin has multiple domains: from the N-terminus to the C-terminus it has two Ras-associated (RA) domains, a forkhead-associated domain, a dilute domain, a PDZ domain, three proline-rich domains, and an F-actin-binding domain. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has a beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. Afadin is abundant at cadherin-based adherens junctions in epithelial cells, endothelial cells, and fibroblasts. This family corresponds to the first RA domain of afadin, which mediates its self-association."
definition: >-
  Ras-associating (RA) domain 1 found in Afadin. Afadin, also termed ALL1-fused gene from chromosome 6 protein (AF-6), or canoe, is involved in many fundamental signaling cascades in cells. In addition, it is involved in oncogenesis and metastasis. Afadin has multiple domains: from the N-terminus to the C-terminus it has two Ras-associated (RA) domains, a forkhead-associated domain, a dilute domain, a PDZ domain, three proline-rich domains, and an F-actin-binding domain. RA domain-containing proteins function by interacting with Ras proteins directly or indirectly and are involved in several different functions ranging from tumor suppression to being oncoproteins. Ras proteins are small GTPases that are involved in cellular signal transduction. The RA domain has a beta-grasp ubiquitin-like (Ubl) fold with low sequence similarity to ubiquitin (Ub). Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. Afadin is abundant at cadherin-based adherens junctions in epithelial cells, endothelial cells, and fibroblasts. This family corresponds to the first RA domain of afadin, which mediates its self-association. — an NCBI CDD conserved domain (cd01782); members share this curated model.
