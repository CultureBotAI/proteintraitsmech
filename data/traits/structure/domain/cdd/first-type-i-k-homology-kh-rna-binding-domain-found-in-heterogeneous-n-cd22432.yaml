identifier: CDD:cd22432
label: "first type I K homology (KH) RNA-binding domain found in heterogeneous nuclear ribonucleoprotein K (hnRNP K) and similar proteins. hnRNP K, also called transformation up-regulated nuclear protein (TUNP), is a pre-mRNA binding protein that binds tenaciously to poly(C) sequences. It may be involved in the nuclear metabolism of hnRNAs, particularly for pre-mRNAs that contain cytidine-rich sequences. It can also bind poly(C) single-stranded DNA. hnRNP K plays an important role in p53/TP53 response to DNA damage, acting at the level of both transcription activation and repression. hnRNP K contains three K-homology (KH) RNA-binding domains. The model corresponds to the first one."
definition: >-
  first type I K homology (KH) RNA-binding domain found in heterogeneous nuclear ribonucleoprotein K (hnRNP K) and similar proteins. hnRNP K, also called transformation up-regulated nuclear protein (TUNP), is a pre-mRNA binding protein that binds tenaciously to poly(C) sequences. It may be involved in the nuclear metabolism of hnRNAs, particularly for pre-mRNAs that contain cytidine-rich sequences. It can also bind poly(C) single-stranded DNA. hnRNP K plays an important role in p53/TP53 response to DNA damage, acting at the level of both transcription activation and repression. hnRNP K contains three K-homology (KH) RNA-binding domains. The model corresponds to the first one. — an NCBI CDD conserved domain (cd22432); members share this curated model.
