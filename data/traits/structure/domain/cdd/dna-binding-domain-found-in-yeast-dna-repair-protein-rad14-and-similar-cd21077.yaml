identifier: CDD:cd21077
label: "DNA-binding domain found in yeast DNA repair protein Rad14 and similar proteins. Rad14 is involved in nucleotide excision repair. It binds specifically to damaged DNA and is required for the incision step. Rad14 is a component of the nucleotide excision repair factor 1 (NEF1) complex consisting of Rad1, Rad10 and Rad14."
definition: >-
  DNA-binding domain found in yeast DNA repair protein Rad14 and similar proteins. Rad14 is involved in nucleotide excision repair. It binds specifically to damaged DNA and is required for the incision step. Rad14 is a component of the nucleotide excision repair factor 1 (NEF1) complex consisting of Rad1, Rad10 and Rad14. — an NCBI CDD conserved domain (cd21077); members share this curated model.
