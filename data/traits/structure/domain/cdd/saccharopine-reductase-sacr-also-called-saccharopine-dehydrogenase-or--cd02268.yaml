identifier: CDD:cd02268
label: "Saccharopine reductase (SacR), also called saccharopine dehydrogenase or alpha-aminoadipate-delta-semialdehyde-glutamate reductase, catalyzes the reversible conversion of glutamate and alpha-aminoadipic-delta-semialdehyde to saccharopine; the forward reaction is part of  the fungal lysine biosynthetic, alpha -aminoadipate pathway. In this capacity, the enzyme shows a marked preference for NADPH as co-substrate.  In mammals and plants, saccharopine reductase has been characterized as a bifunctional polypeptide together with lysine-ketoglutarate reductase, but there are also reports of separate enzyme activities. These enzymes are involved in the catabolism of lysine, and in plants and mammals, saccharopine reductase functions as a saccharopine dehydrogenase (glutamate forming) rather than a reductase. Members of this CD contain a Rossmann fold NAD(P)H binding domain and a glyceraldehyde-3-phosphate dehydrogenase-like domain and are member of the NADB_G3PDH family of proteins."
definition: >-
  Saccharopine reductase (SacR), also called saccharopine dehydrogenase or alpha-aminoadipate-delta-semialdehyde-glutamate reductase, catalyzes the reversible conversion of glutamate and alpha-aminoadipic-delta-semialdehyde to saccharopine; the forward reaction is part of the fungal lysine biosynthetic, alpha -aminoadipate pathway. In this capacity, the enzyme shows a marked preference for NADPH as co-substrate. In mammals and plants, saccharopine reductase has been characterized as a bifunctional polypeptide together with lysine-ketoglutarate reductase, but there are also reports of separate enzyme activities. These enzymes are involved in the catabolism of lysine, and in plants and mammals, saccharopine reductase functions as a saccharopine dehydrogenase (glutamate forming) rather than a reductase. Members of this CD contain a Rossmann fold NAD(P)H binding domain and a glyceraldehyde-3-phosphate dehydrogenase-like domain and are member of the NADB_G3PDH family of proteins. — an NCBI CDD conserved domain (cd02268); members share this curated model.
