identifier: CDD:cd06652
label: "Catalytic domain of the Serine/Threonine Kinase, Mitogen-Activated Protein (MAP)/Extracellular signal-Regulated Kinase (ERK) Kinase Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MEKK2 is a MAPK kinase kinase (MAPKKK or MKKK), that phosphorylates and activates the MAPK kinase MEK5 (or MKK5), which in turn phosphorylates and activates ERK5. The ERK5 cascade plays roles in promoting cell proliferation, differentiation, neuronal survival, and neuroprotection. MEKK2 also activates ERK1/2, c-Jun N-terminal kinase (JNK) and p38 through their respective MAPKKs MEK1/2, JNK-activating kinase 2 (JNKK2), and MKK3/6. MEKK2 plays roles in T cell receptor signaling, immune synapse formation, cytokine gene expression, as well as in EGF and FGF receptor signaling. The MEKK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Mitogen-Activated Protein (MAP)/Extracellular signal-Regulated Kinase (ERK) Kinase Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. MEKK2 is a MAPK kinase kinase (MAPKKK or MKKK), that phosphorylates and activates the MAPK kinase MEK5 (or MKK5), which in turn phosphorylates and activates ERK5. The ERK5 cascade plays roles in promoting cell proliferation, differentiation, neuronal survival, and neuroprotection. MEKK2 also activates ERK1/2, c-Jun N-terminal kinase (JNK) and p38 through their respective MAPKKs MEK1/2, JNK-activating kinase 2 (JNKK2), and MKK3/6. MEKK2 plays roles in T cell receptor signaling, immune synapse formation, cytokine gene expression, as well as in EGF and FGF receptor signaling. The MEKK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06652); members share this curated model.
