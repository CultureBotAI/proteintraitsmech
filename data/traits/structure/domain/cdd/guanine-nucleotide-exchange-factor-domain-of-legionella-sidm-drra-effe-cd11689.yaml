identifier: CDD:cd11689
label: "guanine nucleotide-exchange factor domain of Legionella SidM/DrrA. Effector protein DrrA of Legionella pneumophila, an intracellular pathogen, is a potent guanine nucleotide-exchange factor (GEF) specific for the host Rab1 GTPase. It competes with endogenous exchange factors to recruit and activate Rab1 on plasma membrane-derived organelle, therefore effectively hijacking the host's vesicle trafficking to avoid phagosome-lysosome fusion."
definition: >-
  guanine nucleotide-exchange factor domain of Legionella SidM/DrrA. Effector protein DrrA of Legionella pneumophila, an intracellular pathogen, is a potent guanine nucleotide-exchange factor (GEF) specific for the host Rab1 GTPase. It competes with endogenous exchange factors to recruit and activate Rab1 on plasma membrane-derived organelle, therefore effectively hijacking the host's vesicle trafficking to avoid phagosome-lysosome fusion. — an NCBI CDD conserved domain (cd11689); members share this curated model.
