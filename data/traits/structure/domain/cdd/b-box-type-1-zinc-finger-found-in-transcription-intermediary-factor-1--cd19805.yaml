identifier: CDD:cd19805
label: "B-box-type 1 zinc finger found in transcription intermediary factor 1 (TIF1) family. This family corresponds to the TIF1 family of transcriptional cofactors including TIF1-alpha (TRIM24), TIF1-beta (TRIM28), and TIF1-gamma (TRIM33), which belongs to the C-VI subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil region, as well as a plant homeodomain (PHD), and a bromodomain (Bromo) positioned C-terminal to the RBCC domain. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. TIF1 proteins couple chromatin modifications to transcriptional regulation, signaling, and tumor suppression. They exert a deacetylase-dependent silencing effect when tethered to a promoter region. TIF1-alpha and TIF1-beta can homodimerize and contain a PXVXL motif necessary and sufficient for heterochromatin protein 1(HP1) binding. They bind nuclear receptors and Kruppel-associated boxes (KRAB) specifically and respectively. TIF1-gamma is structurally closely related to TIF1-alpha and TIF1-beta, but has very little functional features in common with them. It does not interact with the KRAB silencing domain of KOX1 or the heterochromatinic proteins HP1alpha, beta and gamma. It cannot bind to nuclear receptors (NRs)."
definition: >-
  B-box-type 1 zinc finger found in transcription intermediary factor 1 (TIF1) family. This family corresponds to the TIF1 family of transcriptional cofactors including TIF1-alpha (TRIM24), TIF1-beta (TRIM28), and TIF1-gamma (TRIM33), which belongs to the C-VI subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a RING finger, Bbox1 and Bbox2, and a coiled coil region, as well as a plant homeodomain (PHD), and a bromodomain (Bromo) positioned C-terminal to the RBCC domain. The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. TIF1 proteins couple chromatin modifications to transcriptional regulation, signaling, and tumor suppression. They exert a deacetylase-dependent silencing effect when tethered to a promoter region. TIF1-alpha and TIF1-beta can homodimerize and contain a PXVXL motif necessary and sufficient for heterochromatin protein 1(HP1) binding. They bind nuclear receptors and Kruppel-associated boxes (KRAB) specifically and respectively. TIF1-gamma is structurally closely related to TIF1-alpha and TIF1-beta, but has very little functional features in common with them. It does not interact with the KRAB silencing domain of KOX1 or the heterochromatinic proteins HP1alpha, beta and gamma. It cannot bind to nuclear receptors (NRs). — an NCBI CDD conserved domain (cd19805); members share this curated model.
