identifier: CDD:cd00545
label: "Methenyltetrahydromethanopterin (methenyl-H4MPT) cyclohydrolase (MCH). MCH is a cytoplasmic enzyme that has been identified in methanogenic archaea, sulfate- reducing archaea, and methylotrophic bacteria.  It catalyzes the reversible formation of N(5), N(10)-methenyltetrahydromethanopterin (methenyl-H4MPT+) from N(5)-formyltetrahydromethanopterin (formyl- H4MPT), in the third step of the reaction to reduce CO2 to CH4. The protein functions as a homodimer or homotrimer, depending on the organism."
definition: >-
  Methenyltetrahydromethanopterin (methenyl-H4MPT) cyclohydrolase (MCH). MCH is a cytoplasmic enzyme that has been identified in methanogenic archaea, sulfate- reducing archaea, and methylotrophic bacteria. It catalyzes the reversible formation of N(5), N(10)-methenyltetrahydromethanopterin (methenyl-H4MPT+) from N(5)-formyltetrahydromethanopterin (formyl- H4MPT), in the third step of the reaction to reduce CO2 to CH4. The protein functions as a homodimer or homotrimer, depending on the organism. — an NCBI CDD conserved domain (cd00545); members share this curated model.
