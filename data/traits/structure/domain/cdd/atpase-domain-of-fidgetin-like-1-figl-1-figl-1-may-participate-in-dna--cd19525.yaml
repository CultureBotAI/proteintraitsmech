identifier: CDD:cd19525
label: "ATPase domain of Fidgetin-Like 1 (FIGL-1). FIGL-1 may participate in DNA repair in the nucleus; it may be involved in DNA double-strand break repair via homologous recombination. Caenorhabditis elegans FIGL-1 is a nuclear protein and controls the mitotic progression in the germ line and mouse FIGL-1 may be involved in the control of male meiosis. human FIGL-1 has been shown to be a centrosome protein involved in ciliogenesis perhaps as a microtubule-severing protein. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  ATPase domain of Fidgetin-Like 1 (FIGL-1). FIGL-1 may participate in DNA repair in the nucleus; it may be involved in DNA double-strand break repair via homologous recombination. Caenorhabditis elegans FIGL-1 is a nuclear protein and controls the mitotic progression in the germ line and mouse FIGL-1 may be involved in the control of male meiosis. human FIGL-1 has been shown to be a centrosome protein involved in ciliogenesis perhaps as a microtubule-severing protein. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19525); members share this curated model.
