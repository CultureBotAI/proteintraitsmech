identifier: CDD:cd06996
label: "AraC/XylS family transcriptional regulators similar to Listeria monocytogenes Lmo2851 protein, N-terminal cupin domain. This family contains bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators. Included is Listeria monocytogenes Lmo2851 protein, whose function is unknown. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  AraC/XylS family transcriptional regulators similar to Listeria monocytogenes Lmo2851 protein, N-terminal cupin domain. This family contains bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators. Included is Listeria monocytogenes Lmo2851 protein, whose function is unknown. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd06996); members share this curated model.
