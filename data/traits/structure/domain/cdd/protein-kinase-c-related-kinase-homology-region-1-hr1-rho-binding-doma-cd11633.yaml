identifier: CDD:cd11633
label: "Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Rhophilin-1. Rhophilin-1 is a scaffolding protein that functions as an effector of the Rho family of small GTPases. It has been implicated in sperm motility. Rhophilin-1 contains an N-terminal HR1, a central Bro1-like, and a C-terminal PDZ domain; all are protein-interacting domains. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; Rhophilin-1 binds RhoA was isolated initially as a RhoA-binding protein."
definition: >-
  Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Rhophilin-1. Rhophilin-1 is a scaffolding protein that functions as an effector of the Rho family of small GTPases. It has been implicated in sperm motility. Rhophilin-1 contains an N-terminal HR1, a central Bro1-like, and a C-terminal PDZ domain; all are protein-interacting domains. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; Rhophilin-1 binds RhoA was isolated initially as a RhoA-binding protein. — an NCBI CDD conserved domain (cd11633); members share this curated model.
