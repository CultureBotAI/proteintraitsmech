identifier: CDD:cd22353
label: "C-terminal nuclease-like domain of exodeoxyribonuclease V subunit RecC and similar proteins. Exodeoxyribonuclease V subunit beta (RecC) is part of the RecBCD complex that processes DNA ends resulting from a double-strand break. Its C-terminal domain contacts the two separate strands of the DNA substrate and may be responsible for stabilizing RecD interactions with the complex. It belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  C-terminal nuclease-like domain of exodeoxyribonuclease V subunit RecC and similar proteins. Exodeoxyribonuclease V subunit beta (RecC) is part of the RecBCD complex that processes DNA ends resulting from a double-strand break. Its C-terminal domain contacts the two separate strands of the DNA substrate and may be responsible for stabilizing RecD interactions with the complex. It belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22353); members share this curated model.
