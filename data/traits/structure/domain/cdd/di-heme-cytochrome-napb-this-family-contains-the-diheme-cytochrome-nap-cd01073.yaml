identifier: CDD:cd01073
label: "Di-heme cytochrome NapB. This family contains the diheme cytochrome NapB domain which constitutes the small subunit of a periplasmic nitrate reductase found in a wide variety of bacterial species, including pathogens. The NapB protein is essential in transferring electrons to the large catalytic subunit NapA, which subsequently reduces nitrate to nitrite. The periplasmic nitrate reductase (NapAB) is a heterodimeric protein that belongs to the dimethyl sulfoxide reductase family of mononuclear Mo-containing enzymes."
definition: >-
  Di-heme cytochrome NapB. This family contains the diheme cytochrome NapB domain which constitutes the small subunit of a periplasmic nitrate reductase found in a wide variety of bacterial species, including pathogens. The NapB protein is essential in transferring electrons to the large catalytic subunit NapA, which subsequently reduces nitrate to nitrite. The periplasmic nitrate reductase (NapAB) is a heterodimeric protein that belongs to the dimethyl sulfoxide reductase family of mononuclear Mo-containing enzymes. — an NCBI CDD conserved domain (cd01073); members share this curated model.
