identifier: CDD:cd18509
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 1 (KLHL1). KLHL1 is a neuronal actin-binding protein that modulates voltage-gated CaV2.1 (P/Q-type) and CaV3.2 (alpha1H T-type) calcium channels. It may play a role in organizing the actin cytoskeleton in brain cells. KLHL1 contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 1 (KLHL1). KLHL1 is a neuronal actin-binding protein that modulates voltage-gated CaV2.1 (P/Q-type) and CaV3.2 (alpha1H T-type) calcium channels. It may play a role in organizing the actin cytoskeleton in brain cells. KLHL1 contains a BTB domain and kelch repeat domains, characteristics of a kelch family protein. — an NCBI CDD conserved domain (cd18509); members share this curated model.
