identifier: CDD:cd05102
label: "Catalytic domain of the Protein Tyrosine Kinase, Vascular Endothelial Growth Factor Receptor 3. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. VEGFR3 (or Flt4) preferentially binds the ligands VEGFC and VEGFD. VEGFR3 is essential for lymphatic endothelial cell (EC) development and function. It has been shown to regulate adaptive immunity during corneal transplantation. VEGFR3 is upregulated on blood vascular ECs in pathological conditions such as vascular tumors and the periphery of solid tumors. It plays a role in cancer progression and lymph node metastasis. Missense mutations in the VEGFR3 gene are associated with primary human lymphedema. VEGFR3 is a member of the VEGFR subfamily of proteins, which are receptor PTKs (RTKs) containing an extracellular ligand-binding region with seven immunoglobulin (Ig)-like domains, a transmembrane segment, and an intracellular catalytic domain. In VEGFR3, the fifth Ig-like domain is replaced by a disulfide bridge. The binding of VEGFRs to their ligands, the VEGFs, leads to receptor dimerization, activation, and intracellular signaling. The VEGFR3 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinase, Vascular Endothelial Growth Factor Receptor 3. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. VEGFR3 (or Flt4) preferentially binds the ligands VEGFC and VEGFD. VEGFR3 is essential for lymphatic endothelial cell (EC) development and function. It has been shown to regulate adaptive immunity during corneal transplantation. VEGFR3 is upregulated on blood vascular ECs in pathological conditions such as vascular tumors and the periphery of solid tumors. It plays a role in cancer progression and lymph node metastasis. Missense mutations in the VEGFR3 gene are associated with primary human lymphedema. VEGFR3 is a member of the VEGFR subfamily of proteins, which are receptor PTKs (RTKs) containing an extracellular ligand-binding region with seven immunoglobulin (Ig)-like domains, a transmembrane segment, and an intracellular catalytic domain. In VEGFR3, the fifth Ig-like domain is replaced by a disulfide bridge. The binding of VEGFRs to their ligands, the VEGFs, leads to receptor dimerization, activation, and intracellular signaling. The VEGFR3 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05102); members share this curated model.
