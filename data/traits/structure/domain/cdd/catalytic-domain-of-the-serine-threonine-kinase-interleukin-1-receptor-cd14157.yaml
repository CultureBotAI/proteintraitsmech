identifier: CDD:cd14157
label: "Catalytic domain of the Serine/Threonine kinase, Interleukin-1 Receptor Associated Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. IRAKs are involved in Toll-like receptor (TLR) and interleukin-1 (IL-1) signalling pathways, and are thus critical in regulating innate immune responses and inflammation. IRAKs contain an N-terminal Death domain (DD), a proST region (rich in serines, prolines, and threonines), a central kinase domain, and a C-terminal domain; IRAK-4 lacks the C-terminal domain. Vertebrates contain four IRAKs (IRAK-1, -2, -3 (or -M), and -4) that display distinct functions and patterns of expression and subcellular distribution, and can differentially mediate TLR signaling. IRAK2 plays a role in mediating NFkB activation by TLR3, TLR4, and TLR8. It is specifically targeted by the viral protein A52, which is important for virulence, to inhibit all IL-1/TLR pathways, indicating that IRAK2 has a predominant role in NFkB activation. It is redundant with IRAK1 in early signaling but is critical for late and sustained activation. The IRAK2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Interleukin-1 Receptor Associated Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. IRAKs are involved in Toll-like receptor (TLR) and interleukin-1 (IL-1) signalling pathways, and are thus critical in regulating innate immune responses and inflammation. IRAKs contain an N-terminal Death domain (DD), a proST region (rich in serines, prolines, and threonines), a central kinase domain, and a C-terminal domain; IRAK-4 lacks the C-terminal domain. Vertebrates contain four IRAKs (IRAK-1, -2, -3 (or -M), and -4) that display distinct functions and patterns of expression and subcellular distribution, and can differentially mediate TLR signaling. IRAK2 plays a role in mediating NFkB activation by TLR3, TLR4, and TLR8. It is specifically targeted by the viral protein A52, which is important for virulence, to inhibit all IL-1/TLR pathways, indicating that IRAK2 has a predominant role in NFkB activation. It is redundant with IRAK1 in early signaling but is critical for late and sustained activation. The IRAK2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14157); members share this curated model.
