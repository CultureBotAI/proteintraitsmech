identifier: CDD:cd00507
label: "Pyruvate ferredoxin/flavodoxin oxidoreductase (POR or PFOR), domain III. Pyruvate ferredoxin/flavodoxin oxidoreductase (POR or PFOR), domain III. Enzymes that catalyze the oxidative decarboxylation of pyruvate in anaerobic organisms, using either ferredoxin or flavoredoxin as electron acceptor, resulting in the acetylation of coenzyme A (CoA). PFORs can be homodimeric, heterodimeric, or heterotetrameric, depending on the organism.  The chains of the hetero-oligomeric forms share sequence similarity, with alpha, beta, and gamma chains all corresponding domains are represented in this CD."
definition: >-
  Pyruvate ferredoxin/flavodoxin oxidoreductase (POR or PFOR), domain III. Pyruvate ferredoxin/flavodoxin oxidoreductase (POR or PFOR), domain III. Enzymes that catalyze the oxidative decarboxylation of pyruvate in anaerobic organisms, using either ferredoxin or flavoredoxin as electron acceptor, resulting in the acetylation of coenzyme A (CoA). PFORs can be homodimeric, heterodimeric, or heterotetrameric, depending on the organism. The chains of the hetero-oligomeric forms share sequence similarity, with alpha, beta, and gamma chains all corresponding domains are represented in this CD. — an NCBI CDD conserved domain (cd00507); members share this curated model.
