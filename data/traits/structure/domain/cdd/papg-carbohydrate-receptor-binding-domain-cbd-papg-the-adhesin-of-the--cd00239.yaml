identifier: CDD:cd00239
label: "PapG carbohydrate / receptor binding domain (CBD); PapG, the adhesin of the P-pili, is situated at the tip, mediating the attachment of uropathogenic Escherichia coli to the uroepithelium of the human kidney; PapG has a two-domain architecture: a carbohydrate binding N-terminus (this domain) and chaperone binding C-terminus (C-terminal pilin region). The carbohydrate-binding domain interacts with the receptor glycan. There are 3 PapG alleles, class I-III, which bind to different receptor isotypes, GbO3, GbO4, and GbO5, respectively."
definition: >-
  PapG carbohydrate / receptor binding domain (CBD); PapG, the adhesin of the P-pili, is situated at the tip, mediating the attachment of uropathogenic Escherichia coli to the uroepithelium of the human kidney; PapG has a two-domain architecture: a carbohydrate binding N-terminus (this domain) and chaperone binding C-terminus (C-terminal pilin region). The carbohydrate-binding domain interacts with the receptor glycan. There are 3 PapG alleles, class I-III, which bind to different receptor isotypes, GbO3, GbO4, and GbO5, respectively. — an NCBI CDD conserved domain (cd00239); members share this curated model.
