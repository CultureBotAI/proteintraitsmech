identifier: CDD:cd23802
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 Q1, Q2, and related proteins. The E2Q subfamily includes mammalian ubiquitin-conjugating enzymes E2 Q1 (UBE2Q1/NICE5/UBE2Q), Q2 (UBE2Q2), and similar proteins. They are ubiquitin-conjugating (EC 2.3.2.23) enzymes that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2Q1 may be involved in hormonal homeostasis in females. It is involved in regulation of B4GALT1 cell surface expression, B4GALT1-mediated cell adhesion to laminin and embryoid body formation. In vitro, UBE2Q2 catalyzes 'Lys-48'-linked polyubiquitination. This subfamily also includes ubiquitin-conjugating enzyme E2Q-like protein 1 (UBE2QL1), which is a probable E2 ubiquitin-protein ligase that may facilitate the monoubiquitination and degradation of MTOR and CCNE1 through interaction with FBXW7."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 Q1, Q2, and related proteins. The E2Q subfamily includes mammalian ubiquitin-conjugating enzymes E2 Q1 (UBE2Q1/NICE5/UBE2Q), Q2 (UBE2Q2), and similar proteins. They are ubiquitin-conjugating (EC 2.3.2.23) enzymes that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. UBE2Q1 may be involved in hormonal homeostasis in females. It is involved in regulation of B4GALT1 cell surface expression, B4GALT1-mediated cell adhesion to laminin and embryoid body formation. In vitro, UBE2Q2 catalyzes 'Lys-48'-linked polyubiquitination. This subfamily also includes ubiquitin-conjugating enzyme E2Q-like protein 1 (UBE2QL1), which is a probable E2 ubiquitin-protein ligase that may facilitate the monoubiquitination and degradation of MTOR and CCNE1 through interaction with FBXW7. — an NCBI CDD conserved domain (cd23802); members share this curated model.
