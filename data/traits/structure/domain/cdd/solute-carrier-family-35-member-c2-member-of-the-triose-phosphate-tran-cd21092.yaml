identifier: CDD:cd21092
label: "solute carrier family 35 member C2, member of the triose-phosphate transporter family. Solute carrier family 35 member C2 (S35C2 or Slc35c2), also called ovarian cancer-overexpressed gene 1 protein (OVCOV1), is a member of the triose-phosphate transporter (TPT) family, which is part of the drug/metabolite transporter (DMT) superfamily. It may function either as a GDP-fucose transporter that competes with Slc35c1 (S35C1) for GDP-fucose, or a factor that otherwise enhances the fucosylation of Notch and is required for optimal Notch signaling in mammalian cells."
definition: >-
