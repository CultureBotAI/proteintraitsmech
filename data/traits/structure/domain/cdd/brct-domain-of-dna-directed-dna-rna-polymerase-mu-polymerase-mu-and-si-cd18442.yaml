label: "BRCT domain of DNA-directed DNA/RNA polymerase mu (polymerase mu) and similar proteins. Polymerase Mu (EC 2.7.7.7), also termed Pol mu, or terminal transferase, is a Gap-filling polymerase involved in repair of DNA double-strand breaks by non-homologous end joining (NHEJ). It participates in immunoglobulin (Ig) light chain gene rearrangement in V(D)J recombination. Polymerase Mu contains a BRCT domain."
definition: >-
  BRCT domain of DNA-directed DNA/RNA polymerase mu (polymerase mu) and similar proteins. Polymerase Mu (EC 2.7.7.7), also termed Pol mu, or terminal transferase, is a Gap-filling polymerase involved in repair of DNA double-strand breaks by non-homologous end joining (NHEJ). It participates in immunoglobulin (Ig) light chain gene rearrangement in V(D)J recombination. Polymerase Mu contains a BRCT domain. — an NCBI CDD conserved domain (cd18442); members share this curated model.
