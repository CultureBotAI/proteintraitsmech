label: "Uncharacterized protein YjiJ and similar proteins of the Major Facilitator Superfamily of transporters. This family is composed of Escherichia coli YjiJ and other uncharacterized proteins. They belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Uncharacterized protein YjiJ and similar proteins of the Major Facilitator Superfamily of transporters. This family is composed of Escherichia coli YjiJ and other uncharacterized proteins. They belong to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd06180); members share this curated model.
