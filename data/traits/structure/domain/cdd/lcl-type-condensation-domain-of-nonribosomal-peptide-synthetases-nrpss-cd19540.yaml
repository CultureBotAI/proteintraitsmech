identifier: CDD:cd19540
label: "LCL-type Condensation domain of nonribosomal peptide synthetases (NRPSs) and similar domains. LCL-type Condensation (C) domains catalyze peptide bond formation between two L-amino acids, ((L)C(L)). C-domains of NRPSs catalyze peptide bond formation within (usually) large multi-modular enzymatic complexes. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long (with various activities such as antibiotic, antifungal, antitumor and immunosuppression). In addition to the LCL-type, there are various subtypes of C-domains such as the DCL-type which links an L-amino acid to the D-amino acid at the end of a growing peptide, starter C-domains which acylate the first amino acid with a beta-hydroxy carboxylic acid, and heterocyclization (Cyc) domains which catalyze both peptide bond formation and cyclization of Cys, Ser, or Thr residues. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a C-domain. NRPS modules may also include specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C (epimerization and condensation) domains, and the X-domain. C-domains typically have a conserved HHxxxD motif at the active site; mutations in this motif can abolish or diminish condensation activity. An HHxx[SAG]DGxSx(6)[ED] motif is characteristic of LCL-type C-domains."
definition: >-
  LCL-type Condensation domain of nonribosomal peptide synthetases (NRPSs) and similar domains. LCL-type Condensation (C) domains catalyze peptide bond formation between two L-amino acids, ((L)C(L)). C-domains of NRPSs catalyze peptide bond formation within (usually) large multi-modular enzymatic complexes. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long (with various activities such as antibiotic, antifungal, antitumor and immunosuppression). In addition to the LCL-type, there are various subtypes of C-domains such as the DCL-type which links an L-amino acid to the D-amino acid at the end of a growing peptide, starter C-domains which acylate the first amino acid with a beta-hydroxy carboxylic acid, and heterocyclization (Cyc) domains which catalyze both peptide bond formation and cyclization of Cys, Ser, or Thr residues. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a C-domain. NRPS modules may also include specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C (epimerization and condensation) domains, and the X-domain. C-domains typically have a conserved HHxxxD motif at the active site; mutations in this motif can abolish or diminish condensation activity. An HHxx[SAG]DGxSx(6)[ED] motif is characteristic of LCL-type C-domains. — an NCBI CDD conserved domain (cd19540); members share this curated model.
