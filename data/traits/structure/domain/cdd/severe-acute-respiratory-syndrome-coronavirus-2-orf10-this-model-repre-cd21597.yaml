identifier: CDD:cd21597
label: "Severe acute respiratory syndrome coronavirus 2 Orf10. This model represents the Orf10 protein of Severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2), also known as 2019 novel coronavirus (2019-nCoV). SARS-CoV-2 causes the disease called \"coronavirus disease 2019\" (COVID-19). Orf10 appears to have no homologous proteins in SARS-CoV and other coronaviruses. It has been suggested that the genome sequence currently annotated as orf10 may not have a protein coding function in SARS-CoV-2, and instead may act, itself or as a precursor of other RNAs, in the regulation of gene expression, replication, or modulating cellular antiviral pathways (DOI:10.1101/2020.03.05.976167)."
definition: >-
  Severe acute respiratory syndrome coronavirus 2 Orf10. This model represents the Orf10 protein of Severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2), also known as 2019 novel coronavirus (2019-nCoV). SARS-CoV-2 causes the disease called "coronavirus disease 2019" (COVID-19). Orf10 appears to have no homologous proteins in SARS-CoV and other coronaviruses. It has been suggested that the genome sequence currently annotated as orf10 may not have a protein coding function in SARS-CoV-2, and instead may act, itself or as a precursor of other RNAs, in the regulation of gene expression, replication, or modulating cellular antiviral pathways (DOI:10.1101/2020.03.05.976167). — an NCBI CDD conserved domain (cd21597); members share this curated model.
