identifier: CDD:cd00498
label: "Heat shock protein 33 (Hsp33):  Cytosolic protein that acts as a molecular chaperone under oxidative conditions.  In normal (reducing) cytosolic conditions, four conserved Cys residues are coordinated by a Zn ion.  Under oxidative stress (such as heat shock), the Cys are reversibly oxidized to disulfide bonds, which causes the chaperone activity to be turned on.  Hsp33 is homodimeric in its functional form."
definition: >-
  Heat shock protein 33 (Hsp33): Cytosolic protein that acts as a molecular chaperone under oxidative conditions. In normal (reducing) cytosolic conditions, four conserved Cys residues are coordinated by a Zn ion. Under oxidative stress (such as heat shock), the Cys are reversibly oxidized to disulfide bonds, which causes the chaperone activity to be turned on. Hsp33 is homodimeric in its functional form. — an NCBI CDD conserved domain (cd00498); members share this curated model.
