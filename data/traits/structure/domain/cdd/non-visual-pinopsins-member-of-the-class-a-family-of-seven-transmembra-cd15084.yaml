identifier: CDD:cd15084
label: "non-visual pinopsins, member of the class A family of seven-transmembrane G protein-coupled receptors. Pinopsins are found in the pineal organ of birds, reptiles and amphibians, but are absent from teleosts and mammals. The vertebrate non-visual opsin family includes pinopsins, parapinopsin, VA (vertebrate ancient) opsins, and parietopsins. These non-visual opsins are expressed in various extra-retinal tissues and/or in non-rod, non-cone retinal cells. They are thought to be involved in light-dependent physiological functions such as photo-entrainment of circadian rhythm, photoperiodicity and body color change. Pinopsins belong the class A of the G protein-coupled receptors and possess seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops."
definition: >-
