identifier: CDD:cd13970
label: "Activator of bc1 complex (ABC1) kinases, also called aarF domain containing kinase 3. This subfamily is composed of the atypical yeast protein kinase Abc1p, its human homolog ADCK3 (also called CABC1), and similar proteins. Abc1p (also called Coq8p) is required for the biosynthesis of Coenzyme Q (ubiquinone or Q), which is an essential lipid component in respiratory electron and proton transport. It is necessary for the formation of a multi-subunit Q-biosynthetic complex and may also function in the regulation of Q synthesis. Human ADCK3 is able to rescue defects in Q synthesis and the phosphorylation state of Coq proteins in yeast Abc1 (or Coq8) mutants. Mutations in ADCK3 cause progressive cerebellar ataxia and atrophy due to Q10 deficiency. In algae and higher plants, ABC1 kinases have proliferated to more than 15 subfamilies, most of which are located in plastids or mitochondria. Subfamily 13 (ABC1K13) of plant ABC1 kinases belongs in this subfamily with yeast Abc1p and human ADCK3. ABC1 kinases are not related to the ATP-binding cassette (ABC) membrane transporter family."
definition: >-
  Activator of bc1 complex (ABC1) kinases, also called aarF domain containing kinase 3. This subfamily is composed of the atypical yeast protein kinase Abc1p, its human homolog ADCK3 (also called CABC1), and similar proteins. Abc1p (also called Coq8p) is required for the biosynthesis of Coenzyme Q (ubiquinone or Q), which is an essential lipid component in respiratory electron and proton transport. It is necessary for the formation of a multi-subunit Q-biosynthetic complex and may also function in the regulation of Q synthesis. Human ADCK3 is able to rescue defects in Q synthesis and the phosphorylation state of Coq proteins in yeast Abc1 (or Coq8) mutants. Mutations in ADCK3 cause progressive cerebellar ataxia and atrophy due to Q10 deficiency. In algae and higher plants, ABC1 kinases have proliferated to more than 15 subfamilies, most of which are located in plastids or mitochondria. Subfamily 13 (ABC1K13) of plant ABC1 kinases belongs in this subfamily with yeast Abc1p and human ADCK3. ABC1 kinases are not related to the ATP-binding cassette (ABC) membrane transporter family. — an NCBI CDD conserved domain (cd13970); members share this curated model.
