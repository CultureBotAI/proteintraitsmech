identifier: CDD:cd22318
label: "Nuclease domain of the nuclease/helicase DNA2 and related nucleases. The eukaryotic nuclease/helicase DNA2 processes double-strand breaks in DNA that have single-stranded ends/overhangs, as well as Okazaki fragments and stalled replication forks; it is therefore crucial for maintaining the integrity of the genome. The nuclease domain modeled here belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Nuclease domain of the nuclease/helicase DNA2 and related nucleases. The eukaryotic nuclease/helicase DNA2 processes double-strand breaks in DNA that have single-stranded ends/overhangs, as well as Okazaki fragments and stalled replication forks; it is therefore crucial for maintaining the integrity of the genome. The nuclease domain modeled here belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22318); members share this curated model.
