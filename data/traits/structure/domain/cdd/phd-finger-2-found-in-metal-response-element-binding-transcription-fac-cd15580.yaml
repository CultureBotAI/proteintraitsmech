identifier: CDD:cd15580
label: "PHD finger 2 found in metal-response element-binding transcription factor 2 (MTF2). MTF2, also termed metal regulatory transcription factor 2, or metal-response element DNA-binding protein M96, or Polycomb-like protein 2 (PCL2), complexes with the Polycomb repressive complex-2 (PRC2) in embryonic stem cells and regulates the transcriptional networks during embryonic stem cell self-renewal and differentiation. It recruits the PRC2 complex to the inactive X chromosome and target loci in embryonic stem cells. Moreover, MTF2 is required for PRC2-mediated Hox cluster repression. It activates the Cdkn2a gene and promotes cellular senescence, thus suppressing the catalytic activity of PRC2 locally. MTF2 consists of an N-terminal Tudor domain followed by two plant homeodomain (PHD) fingers, and a C-terminal MTF2 domain. This model corresponds to the second PHD finger."
definition: >-
  PHD finger 2 found in metal-response element-binding transcription factor 2 (MTF2). MTF2, also termed metal regulatory transcription factor 2, or metal-response element DNA-binding protein M96, or Polycomb-like protein 2 (PCL2), complexes with the Polycomb repressive complex-2 (PRC2) in embryonic stem cells and regulates the transcriptional networks during embryonic stem cell self-renewal and differentiation. It recruits the PRC2 complex to the inactive X chromosome and target loci in embryonic stem cells. Moreover, MTF2 is required for PRC2-mediated Hox cluster repression. It activates the Cdkn2a gene and promotes cellular senescence, thus suppressing the catalytic activity of PRC2 locally. MTF2 consists of an N-terminal Tudor domain followed by two plant homeodomain (PHD) fingers, and a C-terminal MTF2 domain. This model corresponds to the second PHD finger. — an NCBI CDD conserved domain (cd15580); members share this curated model.
