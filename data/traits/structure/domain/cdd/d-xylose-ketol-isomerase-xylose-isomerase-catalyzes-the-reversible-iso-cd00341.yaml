identifier: CDD:cd00341
label: "D-xylose ketol-isomerase. Xylose isomerase; catalyzes the reversible isomerization of D-glucose and D-xylose to D-fructose and D-xylulose, respectively. Interconversion of xylose to xylulose serves a nutritional requirement in saprophytic bacteria. The enzyme is a homotetramer, which is stabilised by cobalt, and requires magnesium or manganese for catalytic activity. Mg++ provides maximam actifvity whereas Mn++ and Co++ provide thermostability. Each subunit contains 2 domains: the core domain is a parallel TIM- barrel; the C-terminal domain is a loop structure consisting of 5 helices and is involved in intermolecular contacts between adjacent subunits. The active site lies in a deep pocket near the C-terminal ends of the strands of the barrel domain and includes residues from a second subunit. The tetramer is effectively a dimer of \"active\" dimers, the active sites being composed of residues from both subunits  There are two characteristic signature motifs, VXW(GP)GREG(YSTAE)E and (LIVM)EPKPX(EQ)P. This family contains both Class I and Class II enzymes."
definition: >-
  D-xylose ketol-isomerase. Xylose isomerase; catalyzes the reversible isomerization of D-glucose and D-xylose to D-fructose and D-xylulose, respectively. Interconversion of xylose to xylulose serves a nutritional requirement in saprophytic bacteria. The enzyme is a homotetramer, which is stabilised by cobalt, and requires magnesium or manganese for catalytic activity. Mg++ provides maximam actifvity whereas Mn++ and Co++ provide thermostability. Each subunit contains 2 domains: the core domain is a parallel TIM- barrel; the C-terminal domain is a loop structure consisting of 5 helices and is involved in intermolecular contacts between adjacent subunits. The active site lies in a deep pocket near the C-terminal ends of the strands of the barrel domain and includes residues from a second subunit. The tetramer is effectively a dimer of "active" dimers, the active sites being composed of residues from both subunits There are two characteristic signature motifs, VXW(GP)GREG(YSTAE)E and (LIVM)EPKPX(EQ)P. This family contains both Class I and Class II enzymes. — an NCBI CDD conserved domain (cd00341); members share this curated model.
