identifier: CDD:cd20647
label: "cytochrome P450 family 27, subfamily C, polypeptide 1, also called all-trans retinol 3,4-desaturase. Cytochrome P450 27C1 (CYP27C1) is also called all-trans retinol 3,4-desaturase. It catalyzes the conversion of all-trans retinol (also called vitamin A1, the precursor of 11-cis retinal) to 3,4-didehydroretinol (also called vitamin A2, the precursor of 11-cis 3,4-didehydroretinal). CYP27C1 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
