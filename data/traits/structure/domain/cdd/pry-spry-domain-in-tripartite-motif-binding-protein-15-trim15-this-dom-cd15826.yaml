identifier: CDD:cd15826
label: "PRY/SPRY domain in tripartite motif-binding protein 15 (TRIM15). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of tripartite motif-containing protein 15 (TRIM15), also referred to as RING finger protein 93 (RNF93) or Zinc finger protein B7 or 178 (ZNFB7 or ZNF178). TRIM15 domains are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. The PRY and SPRY/B30.2 domains can function as immune defense components and in pathogen sensing. TRIM15 has been shown to regulate inflammatory and innate immune signaling, in addition to displaying antiviral activities. Down-regulation of TRIM15, as well as TRIM11, enhances virus release, suggesting that these proteins contribute to the endogenous restriction of retroviruses in cells. TRIM15 is also a regulatory component of focal adhesion turnover and cell migration."
definition: >-
  PRY/SPRY domain in tripartite motif-binding protein 15 (TRIM15). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of tripartite motif-containing protein 15 (TRIM15), also referred to as RING finger protein 93 (RNF93) or Zinc finger protein B7 or 178 (ZNFB7 or ZNF178). TRIM15 domains are composed of RING/B-box/coiled-coil core and also known as RBCC proteins. The PRY and SPRY/B30.2 domains can function as immune defense components and in pathogen sensing. TRIM15 has been shown to regulate inflammatory and innate immune signaling, in addition to displaying antiviral activities. Down-regulation of TRIM15, as well as TRIM11, enhances virus release, suggesting that these proteins contribute to the endogenous restriction of retroviruses in cells. TRIM15 is also a regulatory component of focal adhesion turnover and cell migration. — an NCBI CDD conserved domain (cd15826); members share this curated model.
