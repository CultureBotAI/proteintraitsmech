identifier: CDD:cd20298
label: "ureidoglycolate amidohydrolase (UAH) and related proteins, cupin domain. This family includes the cupin-fold protein, ureidoglycolate hydrolase (AllA; EC 3.5.3.19), which is involved in the breakdown of allantoin under aerobic conditions. Allantoin is the key intermediate of nitrogen fixation in bacteria, and its degradation occurs in several steps. AllA is involved in the third step of this pathway which consists of hydrolysis of (S)-ureidoglycolate to yield glyoxylate, ammonia, and CO2. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  ureidoglycolate amidohydrolase (UAH) and related proteins, cupin domain. This family includes the cupin-fold protein, ureidoglycolate hydrolase (AllA; EC 3.5.3.19), which is involved in the breakdown of allantoin under aerobic conditions. Allantoin is the key intermediate of nitrogen fixation in bacteria, and its degradation occurs in several steps. AllA is involved in the third step of this pathway which consists of hydrolysis of (S)-ureidoglycolate to yield glyoxylate, ammonia, and CO2. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd20298); members share this curated model.
