identifier: CDD:cd06752
label: "PDZ domain of PDZ domain-containing protein 11, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of PDZD11, and related domains. PDZD11 (also known as ATPase-interacting PDZ protein, plasma membrane calcium ATPase-interacting single-PDZ protein, PMCA-interacting single-PDZ protein, PISP) is involved in the dynamic assembly of apical junctions (AJs). It is recruited by PLEKHA7 to AJs to promote the efficient junctional recruitment and stabilization of nectins, and the efficient early phases of assembly of AJs in epithelial cells. The PDZD11 PDZ domain binds nectin-1 and nectin-3. PDZD11 also binds to a PDZ binding motif located in the C-terminal tail of the human sodium-dependent multivitamin transporter, to the cytoplasmic tail of the Menkes copper ATPase ATP7A, and to the cytoplasmic tail of all plasma membrane Ca2+-ATPase b-splice variants. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This PDZD11-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
