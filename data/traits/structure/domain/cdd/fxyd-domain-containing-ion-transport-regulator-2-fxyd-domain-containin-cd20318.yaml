identifier: CDD:cd20318
label: "FXYD domain-containing ion transport regulator 2. FXYD domain-containing ion transport regulator 2 (FXYD2), also known as sodium/potassium-transporting ATPase subunit gamma, or Na(+)/K(+) ATPase subunit gamma, or  sodium pump gamma chain, is the regulatory subunit of the sodium/potassium-transporting ATPase (Na,K-ATPase). Na+,K+-ATPase is a heteromeric complex consisting of a large alpha-subunit, which is responsible for ATP hydrolysis, ion transport, and CTS binding, and a beta-subunit, acting as a chaperone. Although the Na,K-ATPase does not depend on the gamma subunit to be functional, it is thought that the gamma subunit modulates the enzyme's activity by inducing ion channel activity. Mutations in this gene have been associated with renal hypomagnesaemia."
definition: >-
