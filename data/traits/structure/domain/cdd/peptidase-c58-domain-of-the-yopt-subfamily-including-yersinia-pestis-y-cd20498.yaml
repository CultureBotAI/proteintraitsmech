identifier: CDD:cd20498
label: "peptidase C58 domain of the YopT subfamily, including Yersinia pestis YopT and related proteins. This subfamily includes the plague organism Yersinia pestis cysteine protease YopT, an outer membrane protein. Y. pestis can disarm the host immune response by interfering with cell-signaling pathways; YopT cleaves post-translationally modified Rho GTPases near their carboxyl termini, releasing them from the membrane. This leads to the disruption of the actin cytoskeleton in host cells. YopT's proteolytic activity is dependent upon the invariant C/H/D residues conserved in the C58/YopT family peptidase domain."
definition: >-
  peptidase C58 domain of the YopT subfamily, including Yersinia pestis YopT and related proteins. This subfamily includes the plague organism Yersinia pestis cysteine protease YopT, an outer membrane protein. Y. pestis can disarm the host immune response by interfering with cell-signaling pathways; YopT cleaves post-translationally modified Rho GTPases near their carboxyl termini, releasing them from the membrane. This leads to the disruption of the actin cytoskeleton in host cells. YopT's proteolytic activity is dependent upon the invariant C/H/D residues conserved in the C58/YopT family peptidase domain. — an NCBI CDD conserved domain (cd20498); members share this curated model.
