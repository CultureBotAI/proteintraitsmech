identifier: CDD:cd11673
label: "Globular domain of extracellular hemoglobin linker. This family of hemoglobin linker chains is restricted to annelid worms, and participates in the formation of the large erythrocruorin respiratory complex. Via its N-terminal coiled-coil segment (not included in this model), the molecule forms trimers, which are part of a scaffold organizing the overall complex architecture; the latter encompasses 36 linkers and 144 hemoglobins in total. This C-terminal globular domain is involved in trimerization, and also interacts with globins and other C-terminal globular linker domains of neighboring trimers. The structure resembles that of nitrophorins and lipocalins."
definition: >-
  Globular domain of extracellular hemoglobin linker. This family of hemoglobin linker chains is restricted to annelid worms, and participates in the formation of the large erythrocruorin respiratory complex. Via its N-terminal coiled-coil segment (not included in this model), the molecule forms trimers, which are part of a scaffold organizing the overall complex architecture; the latter encompasses 36 linkers and 144 hemoglobins in total. This C-terminal globular domain is involved in trimerization, and also interacts with globins and other C-terminal globular linker domains of neighboring trimers. The structure resembles that of nitrophorins and lipocalins. — an NCBI CDD conserved domain (cd11673); members share this curated model.
