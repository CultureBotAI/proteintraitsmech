identifier: CDD:cd22977
label: "dimerization/docking (D/D) domain found in F-box/LRR-repeat protein 13 (FBXL13) and similar proteins. FBXL13, also called F-box and leucine-rich repeat protein 13, or dynein regulatory complex subunit 6 (DRC6), is a component of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. It may also function as a substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It contains an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in F-box/LRR-repeat protein 13 (FBXL13) and similar proteins. FBXL13, also called F-box and leucine-rich repeat protein 13, or dynein regulatory complex subunit 6 (DRC6), is a component of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. It may also function as a substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It contains an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22977); members share this curated model.
