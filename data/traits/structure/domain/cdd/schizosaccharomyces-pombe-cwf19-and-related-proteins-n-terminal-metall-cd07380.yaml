identifier: CDD:cd07380
label: "Schizosaccharomyces pombe CWF19 and related proteins, N-terminal metallophosphatase domain. CWF19 cell cycle control protein (also known as CWF19-like 1 (CWF19L1) in Homo sapiens), N-terminal metallophosphatase domain.   CWF19 contains C-terminal domains similar to that found in the CwfJ cell cycle control protein.   The metallophosphatase domain belongs to the metallophosphatase (MPP) superfamily.  MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The MPP superfamily includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases).  The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination."
definition: >-
  Schizosaccharomyces pombe CWF19 and related proteins, N-terminal metallophosphatase domain. CWF19 cell cycle control protein (also known as CWF19-like 1 (CWF19L1) in Homo sapiens), N-terminal metallophosphatase domain. CWF19 contains C-terminal domains similar to that found in the CwfJ cell cycle control protein. The metallophosphatase domain belongs to the metallophosphatase (MPP) superfamily. MPPs are functionally diverse, but all share a conserved domain with an active site consisting of two metal ions (usually manganese, iron, or zinc) coordinated with octahedral geometry by a cage of histidine, aspartate, and asparagine residues. The MPP superfamily includes: Mre11/SbcD-like exonucleases, Dbr1-like RNA lariat debranching enzymes, YfcE-like phosphodiesterases, purple acid phosphatases (PAPs), YbbF-like UDP-2,3-diacylglucosamine hydrolases, and acid sphingomyelinases (ASMases). The conserved domain is a double beta-sheet sandwich with a di-metal active site made up of residues located at the C-terminal side of the sheets. This domain is thought to allow for productive metal coordination. — an NCBI CDD conserved domain (cd07380); members share this curated model.
