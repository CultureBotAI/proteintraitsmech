identifier: CDD:cd18445
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins, KLHL2 and KLHL3. This subfamily includes Kelch-like proteins, KLHL2 and KLHL3. KLHL2 is a novel actin-binding protein predominantly expressed in the brain. It plays a role in the reorganization of the actin cytoskeleton, and promotes growth of cell projections in oligodendrocyte precursors. Both KLHL2 and KLHL3 function as a component of an E3 ubiquitin ligase complex that mediates the ubiquitination of target proteins."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like proteins, KLHL2 and KLHL3. This subfamily includes Kelch-like proteins, KLHL2 and KLHL3. KLHL2 is a novel actin-binding protein predominantly expressed in the brain. It plays a role in the reorganization of the actin cytoskeleton, and promotes growth of cell projections in oligodendrocyte precursors. Both KLHL2 and KLHL3 function as a component of an E3 ubiquitin ligase complex that mediates the ubiquitination of target proteins. — an NCBI CDD conserved domain (cd18445); members share this curated model.
