identifier: CDD:cd20152
label: "PWWP domain found in PWWP domain-containing protein 2A (PWWP2A). PWWP2A is a H2A.Z-specific chromatin binding protein which may play an important role in the neural crest stem cell migration and differentiation during early development. It is also required for proper mitosis progression. PWWP2A and its paralog PWWP2B form a stable complex with NuRD subunits MTA1/2/3:HDAC1/2:RBBP4/7, but not with MBD2/3, p66alpha/beta, and CHD3/4. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in PWWP domain-containing protein 2A (PWWP2A). PWWP2A is a H2A.Z-specific chromatin binding protein which may play an important role in the neural crest stem cell migration and differentiation during early development. It is also required for proper mitosis progression. PWWP2A and its paralog PWWP2B form a stable complex with NuRD subunits MTA1/2/3:HDAC1/2:RBBP4/7, but not with MBD2/3, p66alpha/beta, and CHD3/4. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd20152); members share this curated model.
