identifier: CDD:cd09804
label: "mRNA decapping enzyme 1 (Dcp1). mRNA decapping enzyme 1 (Dcp1), together with Dcp2, is part of the decapping complex which catalyzes the removal of the 5' cap structure of mRNA. This decapping reaction is an essential step in mRNA degradation, by exposing the 5' end for exonucleolytic digestion. Dcp1 binds to the N-terminal helical domain of catalytic subunit Dcp2 and enhances its function by promoting Dsp2's closed conformation which is catalytically more active."
definition: >-
  mRNA decapping enzyme 1 (Dcp1). mRNA decapping enzyme 1 (Dcp1), together with Dcp2, is part of the decapping complex which catalyzes the removal of the 5' cap structure of mRNA. This decapping reaction is an essential step in mRNA degradation, by exposing the 5' end for exonucleolytic digestion. Dcp1 binds to the N-terminal helical domain of catalytic subunit Dcp2 and enhances its function by promoting Dsp2's closed conformation which is catalytically more active. — an NCBI CDD conserved domain (cd09804); members share this curated model.
