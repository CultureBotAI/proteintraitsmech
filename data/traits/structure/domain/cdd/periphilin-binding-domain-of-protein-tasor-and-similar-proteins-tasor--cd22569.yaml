identifier: CDD:cd22569
label: "periphilin binding domain of protein TASOR and similar proteins. TASOR, also called CTCL tumor antigen se89-1, retinoblastoma-associated protein RAP140, or transgene activation suppressor protein, is a component of the HUSH complex, a multiprotein complex that is at least composed of TASOR, PPHLN1 and MPHOSPH8, and mediates epigenetic repression. The HUSH complex is recruited to genomic loci rich in H3K9me3 and is required to maintain transcriptional silencing by promoting recruitment of SETDB1, a histone methyltransferase that mediates further deposition of H3K9me3, as well as MORC2. The HUSH complex is also involved in the silencing of unintegrated retroviral DNA by being recruited by ZNF638: some part of the retroviral DNA formed immediately after infection remains unintegrated in the host genome and is transcriptionally repressed. This model corresponds to a conserved region of TASOR, which is responsible for the binding of periphilin."
