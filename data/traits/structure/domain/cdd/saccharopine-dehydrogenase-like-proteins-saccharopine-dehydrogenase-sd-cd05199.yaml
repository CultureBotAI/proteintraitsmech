identifier: CDD:cd05199
label: "Saccharopine Dehydrogenase like proteins. Saccharopine Dehydrogenase (SDH) and related proteins, including bifunctional lysine ketoglutarate reductase/SDH enzymes and N(5)-(carboxyethyl)ornithine synthases. SDH catalyzes the final step in the reversible NAD-dependent oxidative deamination of saccharopine to alpha-ketoglutarate and lysine, in the alpha-aminoadipate pathway of L-lysine biosynthesis. SDH is structurally related to formate dehydrogenase and similar enzymes, having a 2-domain structure in which a Rossmann-fold NAD(P)-binding domain is inserted within the linear sequence of a catalytic domain of related structure. Bifunctional lysine ketoglutarate reductase/SDH protein is a pair of enzymes linked on a single polypeptide chain that catalyze the initial, consecutive steps of lysine degradation. These proteins are related to the 2-domain saccharopine dehydrogenases."
definition: >-
  Saccharopine Dehydrogenase like proteins. Saccharopine Dehydrogenase (SDH) and related proteins, including bifunctional lysine ketoglutarate reductase/SDH enzymes and N(5)-(carboxyethyl)ornithine synthases. SDH catalyzes the final step in the reversible NAD-dependent oxidative deamination of saccharopine to alpha-ketoglutarate and lysine, in the alpha-aminoadipate pathway of L-lysine biosynthesis. SDH is structurally related to formate dehydrogenase and similar enzymes, having a 2-domain structure in which a Rossmann-fold NAD(P)-binding domain is inserted within the linear sequence of a catalytic domain of related structure. Bifunctional lysine ketoglutarate reductase/SDH protein is a pair of enzymes linked on a single polypeptide chain that catalyze the initial, consecutive steps of lysine degradation. These proteins are related to the 2-domain saccharopine dehydrogenases. — an NCBI CDD conserved domain (cd05199); members share this curated model.
