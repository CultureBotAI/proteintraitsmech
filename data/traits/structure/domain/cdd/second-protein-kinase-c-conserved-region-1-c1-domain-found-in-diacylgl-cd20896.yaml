identifier: CDD:cd20896
label: "second protein kinase C conserved region 1 (C1 domain) found in diacylglycerol kinase iota (DAG kinase iota) and similar proteins. Diacylglycerol (DAG) kinase (EC 2.7.1.107) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid. DAG kinase iota, also called diglyceride kinase iota (DGK-iota), or DGKI, is a homolog of Drosophila DGK2, RdgA. It may have important cellular functions in the retina and brain. It is classified as a type IV DAG kinase (DGK), containing myristoylated alanine-rich protein kinase C substrate (MARCKS), PDZ-binding, and ankyrin domains, in addition to C1 and catalytic domains that are present in all DGKs. The MARCKS domain regulates the nuclear localizations of type IV DGKs while the PDZ-binding and ankyrin domains regulate interactions with several proteins. DAG kinase iota contains two copies of the C1 domain. This model corresponds to the second one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  second protein kinase C conserved region 1 (C1 domain) found in diacylglycerol kinase iota (DAG kinase iota) and similar proteins. Diacylglycerol (DAG) kinase (EC 2.7.1.107) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid. DAG kinase iota, also called diglyceride kinase iota (DGK-iota), or DGKI, is a homolog of Drosophila DGK2, RdgA. It may have important cellular functions in the retina and brain. It is classified as a type IV DAG kinase (DGK), containing myristoylated alanine-rich protein kinase C substrate (MARCKS), PDZ-binding, and ankyrin domains, in addition to C1 and catalytic domains that are present in all DGKs. The MARCKS domain regulates the nuclear localizations of type IV DGKs while the PDZ-binding and ankyrin domains regulate interactions with several proteins. DAG kinase iota contains two copies of the C1 domain. This model corresponds to the second one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20896); members share this curated model.
