identifier: CDD:cd09867
label: "FEN-like PIN domains of Flap endonuclease-1, a structure-specific, divalent-metal-ion dependent, 5' nuclease and homologs. Flap endonuclease-1 (FEN1) is involved in multiple DNA metabolic pathways, including DNA replication processes (5' flap DNA endonuclease activity and double stranded DNA 5'-exonuclease activity) and DNA repair processes (long-patch base excision repair) in eukaryotes and archaea. Interaction between FEN1 and PCNA (Proliferating cell nuclear antigen) is an essential prerequisite to FEN1's DNA replication functionality and stimulates FEN1 nuclease activity by 10-50 fold. FEN1 belongs to the FEN1-EXO1-like subfamily of structure-specific, 5' nucleases (FEN-like family). Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), and at the C-terminus of the PIN domain a H3TH (helix-3-turn-helix) domain, an atypical helix-hairpin-helix-2-like region. Both the H3TH domain (not included in this model) and the helical arch/clamp region are involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. FEN1 has a C-terminal extension containing residues forming the consensus PIP-box - Qxx(M/L/I)xxF(Y/F) which serves to anchor FEN1 to PCNA."
definition: >-
  FEN-like PIN domains of Flap endonuclease-1, a structure-specific, divalent-metal-ion dependent, 5' nuclease and homologs. Flap endonuclease-1 (FEN1) is involved in multiple DNA metabolic pathways, including DNA replication processes (5' flap DNA endonuclease activity and double stranded DNA 5'-exonuclease activity) and DNA repair processes (long-patch base excision repair) in eukaryotes and archaea. Interaction between FEN1 and PCNA (Proliferating cell nuclear antigen) is an essential prerequisite to FEN1's DNA replication functionality and stimulates FEN1 nuclease activity by 10-50 fold. FEN1 belongs to the FEN1-EXO1-like subfamily of structure-specific, 5' nucleases (FEN-like family). Canonical members of the FEN-like family possess a PIN domain with a two-helical structure insert (also known as the helical arch, helical clamp or I domain) of variable length (approximately 16 to 800 residues), and at the C-terminus of the PIN domain a H3TH (helix-3-turn-helix) domain, an atypical helix-hairpin-helix-2-like region. Both the H3TH domain (not included in this model) and the helical arch/clamp region are involved in DNA binding. The PIN domain belongs to a large nuclease superfamily. The structural properties of the PIN domain indicate its putative active center, consisting of invariant acidic amino acid residues (putative metal-binding residues), is geometrically similar in the active center of structure-specific 5' nucleases, PIN-domain ribonucleases of eukaryotic rRNA editing proteins, and bacterial toxins of toxin-antitoxin (TA) operons. FEN1 has a C-terminal extension containing residues forming the consensus PIP-box - Qxx(M/L/I)xxF(Y/F) which serves to anchor FEN1 to PCNA. — an NCBI CDD conserved domain (cd09867); members share this curated model.
