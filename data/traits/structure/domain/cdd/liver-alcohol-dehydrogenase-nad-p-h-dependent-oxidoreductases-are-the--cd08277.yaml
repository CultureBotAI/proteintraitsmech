identifier: CDD:cd08277
label: "Liver alcohol dehydrogenase. NAD(P)(H)-dependent oxidoreductases are the major enzymes in the interconversion of alcohols and aldehydes, or ketones.  Alcohol dehydrogenase in the liver converts ethanol and NAD+ to acetaldehyde and NADH, while in yeast and some other microorganisms ADH catalyzes the conversion acetaldehyde to ethanol in alcoholic fermentation.  There are 7 vertebrate ADH 7 classes, 6 of which have been identified in humans. Class III, glutathione-dependent formaldehyde dehydrogenase, has been identified as the primordial form and exists in diverse species, including plants, micro-organisms, vertebrates, and invertebrates. Class I, typified by  liver dehydrogenase, is an evolving form. Gene duplication and functional specialization of ADH into ADH classes and subclasses created numerous forms in vertebrates.  For example, the A, B and C (formerly alpha, beta, gamma) human class I subunits have high overall structural similarity, but differ in the substrate binding pocket and therefore in substrate specificity. In human ADH catalysis, the zinc ion helps coordinate the alcohol, followed by deprotonation of  a histidine (His-51), the ribose of NAD,  a serine (Ser-48) , then the alcohol, which allows the transfer of a hydride to NAD+, creating NADH and a zinc-bound aldehyde or ketone. In yeast and some bacteria, the active site zinc binds an aldehyde, polarizing it, and leading to the reverse reaction. ADH is a member of the medium chain alcohol dehydrogenase family (MDR), which has a NAD(P)(H)-binding domain in a Rossmann fold of an beta-alpha form. The NAD(H)-binding region is comprised of 2 structurally similar halves, each of which contacts a mononucleotide.  A GxGxxG motif after the first mononucleotide contact half allows the close contact of the coenzyme with the ADH backbone.  The N-terminal catalytic domain has a distant homology  to GroES.  These proteins typically form dimers (typically higher plants, mammals) or tetramers (yeast, bacteria), and have 2 tightly bound zinc atoms per subunit, a catalytic zinc at the active site and a structural zinc in a lobe of the catalytic domain.  NAD(H) binding occurs in the cleft between the catalytic  and coenzyme-binding domains at the active site, and coenzyme binding induces a conformational closing of this cleft. Coenzyme binding typically precedes and contributes to substrate binding."
definition: >-
  Liver alcohol dehydrogenase. NAD(P)(H)-dependent oxidoreductases are the major enzymes in the interconversion of alcohols and aldehydes, or ketones. Alcohol dehydrogenase in the liver converts ethanol and NAD+ to acetaldehyde and NADH, while in yeast and some other microorganisms ADH catalyzes the conversion acetaldehyde to ethanol in alcoholic fermentation. There are 7 vertebrate ADH 7 classes, 6 of which have been identified in humans. Class III, glutathione-dependent formaldehyde dehydrogenase, has been identified as the primordial form and exists in diverse species, including plants, micro-organisms, vertebrates, and invertebrates. Class I, typified by liver dehydrogenase, is an evolving form. Gene duplication and functional specialization of ADH into ADH classes and subclasses created numerous forms in vertebrates. For example, the A, B and C (formerly alpha, beta, gamma) human class I subunits have high overall structural similarity, but differ in the substrate binding pocket and therefore in substrate specificity. In human ADH catalysis, the zinc ion helps coordinate the alcohol, followed by deprotonation of a histidine (His-51), the ribose of NAD, a serine (Ser-48) , then the alcohol, which allows the transfer of a hydride to NAD+, creating NADH and a zinc-bound aldehyde or ketone. In yeast and some bacteria, the active site zinc binds an aldehyde, polarizing it, and leading to the reverse reaction. ADH is a member of the medium chain alcohol dehydrogenase family (MDR), which has a NAD(P)(H)-binding domain in a Rossmann fold of an beta-alpha form. The NAD(H)-binding region is comprised of 2 structurally similar halves, each of which contacts a mononucleotide. A GxGxxG motif after the first mononucleotide contact half allows the close contact of the coenzyme with the ADH backbone. The N-terminal catalytic domain has a distant homology to GroES. These proteins typically form dimers (typically higher plants, mammals) or tetramers (yeast, bacteria), and have 2 tightly bound zinc atoms per subunit, a catalytic zinc at the active site and a structural zinc in a lobe of the catalytic domain. NAD(H) binding occurs in the cleft between the catalytic and coenzyme-binding domains at the active site, and coenzyme binding induces a conformational closing of this cleft. Coenzyme binding typically precedes and contributes to substrate binding. — an NCBI CDD conserved domain (cd08277); members share this curated model.
