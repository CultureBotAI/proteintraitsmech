identifier: CDD:cd06026
label: "GH10_xylanase_child_6. The endo-beta-1,4-xylanases (xylanases) are glycosyl hydrolases that depolymerize a plant cell wall component called xylan, the second most abundant polysaccharide.  Xylanases have distinct catalytic and cellulose binding domains, with a separate non-catalytic domain in some xylanases that confers enhanced thermostability. The catalytic domain is an eightfold TIM-barrel containing a deep active-site groove which extends along the length of the domain and can accomodate four to seven xylose residues, consistent with its 'endo' mode of action."
definition: >-
  GH10_xylanase_child_6. The endo-beta-1,4-xylanases (xylanases) are glycosyl hydrolases that depolymerize a plant cell wall component called xylan, the second most abundant polysaccharide. Xylanases have distinct catalytic and cellulose binding domains, with a separate non-catalytic domain in some xylanases that confers enhanced thermostability. The catalytic domain is an eightfold TIM-barrel containing a deep active-site groove which extends along the length of the domain and can accomodate four to seven xylose residues, consistent with its 'endo' mode of action. — an NCBI CDD conserved domain (cd06026); members share this curated model.
