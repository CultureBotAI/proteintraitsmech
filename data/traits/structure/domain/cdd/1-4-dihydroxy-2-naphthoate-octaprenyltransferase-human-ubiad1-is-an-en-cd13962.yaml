identifier: CDD:cd13962
label: "1,4-Dihydroxy-2-naphthoate octaprenyltransferase. Human UBIAD1 is an enzyme involved in the synthesis of MK-4. Menaquinones (MKs, also called bacterial forms) are one of the two forms of natural vitamin K, the other being the plant form, phylloquinone (PK). All forms of vitamin K have a 2-methyl-1,4-naphthoquinone (menadione; K3) ring structure in common. At the 3-position of the ring, PK has a phytyl side chain while MKs have several repeating prenyl units. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways."
definition: >-
  1,4-Dihydroxy-2-naphthoate octaprenyltransferase. Human UBIAD1 is an enzyme involved in the synthesis of MK-4. Menaquinones (MKs, also called bacterial forms) are one of the two forms of natural vitamin K, the other being the plant form, phylloquinone (PK). All forms of vitamin K have a 2-methyl-1,4-naphthoquinone (menadione; K3) ring structure in common. At the 3-position of the ring, PK has a phytyl side chain while MKs have several repeating prenyl units. Prenyltransferases (PTs) catalyze the regioselective transfer of prenyl moieties onto a wide variety of substrates and play an important role in many biosynthetic pathways. — an NCBI CDD conserved domain (cd13962); members share this curated model.
