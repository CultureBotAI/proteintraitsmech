identifier: CDD:cd23961
label: "Kinetoplastid RNA Editing Protein A5 (KREPA5). The KREPA5 (TbMP19) protein is a component of the KREPA RNA editing catalytic complex (RECC) in parasitic protozoans. Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. KREPA complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. KRPEA5 is not found in Leishmania."
definition: >-
  Kinetoplastid RNA Editing Protein A5 (KREPA5). The KREPA5 (TbMP19) protein is a component of the KREPA RNA editing catalytic complex (RECC) in parasitic protozoans. Kinetoplastid RNA editing (KRE) proteins occur as pairs or sets of related proteins in multiple complexes. KREPA complex is composed of six components (KREPA1-6), which share a conserved C-terminal region containing an oligonucleotide-binding (OB)-fold-like domain. KRPEA5 is not found in Leishmania. — an NCBI CDD conserved domain (cd23961); members share this curated model.
