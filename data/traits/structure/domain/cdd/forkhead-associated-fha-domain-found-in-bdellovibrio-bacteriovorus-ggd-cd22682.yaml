identifier: CDD:cd22682
label: "forkhead associated (FHA) domain found in Bdellovibrio bacteriovorus GGDEF domain protein DgcB and similar proteins. DgcB is a GGDEF enzyme that produces cyclic-di-GMP in response to an unknown stimulus. It appends the C-terminal GGDEF enzymatic domain with an N-terminal forkhead-associated (FHA) domain that acts as a consensus phosphopeptide sensor. The GGDEF and sensory FHA domains form an asymmetrical dimer."
definition: >-
  forkhead associated (FHA) domain found in Bdellovibrio bacteriovorus GGDEF domain protein DgcB and similar proteins. DgcB is a GGDEF enzyme that produces cyclic-di-GMP in response to an unknown stimulus. It appends the C-terminal GGDEF enzymatic domain with an N-terminal forkhead-associated (FHA) domain that acts as a consensus phosphopeptide sensor. The GGDEF and sensory FHA domains form an asymmetrical dimer. — an NCBI CDD conserved domain (cd22682); members share this curated model.
