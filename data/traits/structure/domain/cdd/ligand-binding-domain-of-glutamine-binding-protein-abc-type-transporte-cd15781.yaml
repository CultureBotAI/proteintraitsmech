identifier: CDD:cd15781
label: "Ligand binding domain of Glutamine-Binding Protein ABC-type transporter and similar proteins; the type 2 periplasmic binding protein fold. This subfamily is composed of the ligand binding domains of glutamine-binding proteins (GlnBPs) as well as ABC-type transporters with specificity to arginine, histidine, and lysine. The ligand binding component serves as an initial receptor in the ABC transport of glutamine and other amino acids in bacteria and eukaryota. GlnBP belongs to the type 2 periplasmic-binding fold protein (PBP2) superfamily, whose members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. PBP2 typically comprises of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis."
definition: >-
  Ligand binding domain of Glutamine-Binding Protein ABC-type transporter and similar proteins; the type 2 periplasmic binding protein fold. This subfamily is composed of the ligand binding domains of glutamine-binding proteins (GlnBPs) as well as ABC-type transporters with specificity to arginine, histidine, and lysine. The ligand binding component serves as an initial receptor in the ABC transport of glutamine and other amino acids in bacteria and eukaryota. GlnBP belongs to the type 2 periplasmic-binding fold protein (PBP2) superfamily, whose members are involved in chemotaxis and uptake of nutrients and other small molecules from the extracellular space as a primary receptor. PBP2 typically comprises of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. After binding their specific ligand with high affinity, they can interact with a cognate membrane transport complex comprised of two integral membrane domains and two receptor cytoplasmically-located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. — an NCBI CDD conserved domain (cd15781); members share this curated model.
