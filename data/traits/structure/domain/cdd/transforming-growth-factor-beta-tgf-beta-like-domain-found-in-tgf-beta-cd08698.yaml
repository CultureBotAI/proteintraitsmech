identifier: CDD:cd08698
label: "transforming growth factor beta (TGF-beta) like domain found in TGF-beta superfamily. TGF-beta superfamily consists of a large group of cell regulatory proteins, such as TFG-betas, Nodal, Activins/Inhibins, glial cell-line-derived neurotrophic factor (GDNF) family of ligands, bone morphogenetic proteins (BMPs), and growth and differentiation factors (GDFs). They play important roles in developmental and physiological processes in a variety of species, including invertebrates as well as vertebrates, through specific receptor complexes that are composed of type I and type II serine/threonine receptor kinases. The receptor kinases subsequently activate Smad proteins, which then propagate the signals into the nucleus to regulate target gene expression. Proteins from the TGF-beta superfamily are only active as homo- or heterodimer."
definition: >-
