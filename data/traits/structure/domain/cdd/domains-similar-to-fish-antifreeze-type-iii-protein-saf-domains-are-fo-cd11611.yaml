identifier: CDD:cd11611
label: "Domains similar to fish antifreeze type III protein. SAF domains are found in a wide variety of proteins with quite different functions. They are components of enzymes, such as D-altronate-dehydratases or sialic acid synthetases, of antifreeze proteins conserved in fish (where they bind to nascent ice crystals), and may act as periplasmic chaperones in bacterial flagella basal body P-ring formation."
definition: >-
  Domains similar to fish antifreeze type III protein. SAF domains are found in a wide variety of proteins with quite different functions. They are components of enzymes, such as D-altronate-dehydratases or sialic acid synthetases, of antifreeze proteins conserved in fish (where they bind to nascent ice crystals), and may act as periplasmic chaperones in bacterial flagella basal body P-ring formation. — an NCBI CDD conserved domain (cd11611); members share this curated model.
