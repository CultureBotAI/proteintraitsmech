identifier: CDD:cd00181
label: "4-helix bundle ligand binding sensor domain of chemoreceptors such as Tar or Tsr. The ligand binding sensor domain of chemoreceptors and related sensor histidine kinases forms homodimers and binds to ligands via the dimerization interface, a feature that appears to be conserved in this domain superfamily. This family includes ligand binding sensor domain of several chemoreceptors, such as Escherichia coli Tar, Tsr, NarQ, NarX, Pseudomonas aeruginosa KinB, Rhodopseudomonas palustris histidine kinase HK9 chemoreceptors, Comamonas testosteroni CNB-2 MCP2201 and Anaeromyxobacter dehalogenans histidine kinase Adeh_2942, among others."
definition: >-
  4-helix bundle ligand binding sensor domain of chemoreceptors such as Tar or Tsr. The ligand binding sensor domain of chemoreceptors and related sensor histidine kinases forms homodimers and binds to ligands via the dimerization interface, a feature that appears to be conserved in this domain superfamily. This family includes ligand binding sensor domain of several chemoreceptors, such as Escherichia coli Tar, Tsr, NarQ, NarX, Pseudomonas aeruginosa KinB, Rhodopseudomonas palustris histidine kinase HK9 chemoreceptors, Comamonas testosteroni CNB-2 MCP2201 and Anaeromyxobacter dehalogenans histidine kinase Adeh_2942, among others. — an NCBI CDD conserved domain (cd00181); members share this curated model.
