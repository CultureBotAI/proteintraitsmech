identifier: CDD:cd01792
label: "ubiquitin-like (Ubl) domain 1 found in interferon-stimulated gene 15 (ISG15) and similar proteins. ISG15, also termed interferon-induced 15 kDa protein, or interferon-induced 17 kDa protein (IP17), or ubiquitin cross-reactive protein (UCRP), is an antiviral interferon-induced ubiquitin-like protein (Ubl) that upon viral infection, modifies cellular and viral proteins by mechanisms similar to ubiquitination. Although ISG15 has properties similar to those of other Ubl molecules, it is a unique member of the Ubl superfamily, whose expression and conjugation to target proteins are tightly regulated by specific signaling pathways, indicating it may have specialized functions in the immune system. ISG15 contains two tandem Ubl domains with a beta-grasp Ubl fold. This family corresponds to the first Ubl domain."
definition: >-
  ubiquitin-like (Ubl) domain 1 found in interferon-stimulated gene 15 (ISG15) and similar proteins. ISG15, also termed interferon-induced 15 kDa protein, or interferon-induced 17 kDa protein (IP17), or ubiquitin cross-reactive protein (UCRP), is an antiviral interferon-induced ubiquitin-like protein (Ubl) that upon viral infection, modifies cellular and viral proteins by mechanisms similar to ubiquitination. Although ISG15 has properties similar to those of other Ubl molecules, it is a unique member of the Ubl superfamily, whose expression and conjugation to target proteins are tightly regulated by specific signaling pathways, indicating it may have specialized functions in the immune system. ISG15 contains two tandem Ubl domains with a beta-grasp Ubl fold. This family corresponds to the first Ubl domain. — an NCBI CDD conserved domain (cd01792); members share this curated model.
