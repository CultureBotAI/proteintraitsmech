identifier: CDD:cd11299
label: "GDP-fucose protein O-fucosyltransferase, plant specific subfamily. Some members of this plant-specific family of O-fucosyltransferases have been annotated as auxin-independent growth promotors. The function of the protein seems unclear. O-fucosyltransferase-like proteins are GDP-fucose dependent enzymes with similarities to the family 1 glycosyltransferases (GT1). They are soluble ER proteins that may be proteolytically cleaved from a membrane-associated preprotein, and are involved in the O-fucosylation of protein substrates, the core fucosylation of growth factor receptors, and other processes."
definition: >-
  GDP-fucose protein O-fucosyltransferase, plant specific subfamily. Some members of this plant-specific family of O-fucosyltransferases have been annotated as auxin-independent growth promotors. The function of the protein seems unclear. O-fucosyltransferase-like proteins are GDP-fucose dependent enzymes with similarities to the family 1 glycosyltransferases (GT1). They are soluble ER proteins that may be proteolytically cleaved from a membrane-associated preprotein, and are involved in the O-fucosylation of protein substrates, the core fucosylation of growth factor receptors, and other processes. — an NCBI CDD conserved domain (cd11299); members share this curated model.
