identifier: CDD:cd00137
label: "Catalytic domain of prokaryotic and eukaryotic phosphoinositide-specific phospholipase C. This subfamily corresponds to the catalytic domain present in prokaryotic and eukaryotic phosphoinositide-specific phospholipase C (PI-PLC), which is a ubiquitous enzyme catalyzing the cleavage of the sn3-phosphodiester bond in the membrane phosphoinositides (phosphatidylinositol, PI; Phosphatidylinositol-4-phosphate, PIP; phosphatidylinositol 4,5-bisphosphate, PIP2) to yield inositol phosphates (inositol monosphosphate, InsP;  inositol diphosphate, InsP2;  inositol trisphosphate, InsP3) and diacylglycerol (DAG). The higher eukaryotic PI-PLCs (EC 3.1.4.11) have a multidomain organization that consists of a PLC catalytic core domain, and various regulatory domains. They play a critical role in most signal transduction pathways, controlling numerous cellular events, such as cell growth, proliferation, excitation and secretion. These PI-PLCs strictly require Ca2+ for their catalytic activity. They display a clear preference towards the hydrolysis of the more highly phosphorylated PI-analogues, PIP2 and PIP, to generate two important second messengers, InsP3 and DAG. InsP3 triggers inflow of calcium from intracellular stores, while DAG, together with calcium, activates protein kinase C, which then phosphorylates other molecules, leading to altered cellular activity. In contrast, bacterial PI-PLCs contain a single catalytic domain. Although their precise physiological function remains unclear, bacterial PI-PLCs may function as virulence factors in some pathogenic bacteria. They participate in Ca2+-independent PI metabolism. They are characterized as phosphatidylinositol-specific phospholipase C (EC 4.6.1.13) that selectively hydrolyze PI, not PIP or PIP2. The TIM-barrel type catalytic domain in bacterial PI-PLCs is very similar to the one in eukaryotic PI-PLCs, in which the catalytic domain is assembled from two highly conserved X- and Y-regions split by a divergent linker sequence. The catalytic mechanism of both prokaryotic and eukaryotic PI-PLCs is based on general base and acid catalysis utilizing two well conserved histidines, and consists of two steps, a phosphotransfer and a phosphodiesterase reaction. This superfamily also includes a distinctly different type of eukaryotic PLC, glycosylphosphatidylinositol-specific phospholipase C (GPI-PLC), an integral membrane protein characterized in the protozoan parasite Trypanosoma brucei. T. brucei GPI-PLC hydrolyzes the GPI-anchor on the variant specific glycoprotein (VSG), releasing dimyristyl glycerol (DMG), which may facilitate the evasion of the protozoan to the host#s immune system. It does not require Ca2+ for its activity and is more closely related to bacterial PI-PLCs, but not mammalian PI-PLCs."
definition: >-
  Catalytic domain of prokaryotic and eukaryotic phosphoinositide-specific phospholipase C. This subfamily corresponds to the catalytic domain present in prokaryotic and eukaryotic phosphoinositide-specific phospholipase C (PI-PLC), which is a ubiquitous enzyme catalyzing the cleavage of the sn3-phosphodiester bond in the membrane phosphoinositides (phosphatidylinositol, PI; Phosphatidylinositol-4-phosphate, PIP; phosphatidylinositol 4,5-bisphosphate, PIP2) to yield inositol phosphates (inositol monosphosphate, InsP; inositol diphosphate, InsP2; inositol trisphosphate, InsP3) and diacylglycerol (DAG). The higher eukaryotic PI-PLCs (EC 3.1.4.11) have a multidomain organization that consists of a PLC catalytic core domain, and various regulatory domains. They play a critical role in most signal transduction pathways, controlling numerous cellular events, such as cell growth, proliferation, excitation and secretion. These PI-PLCs strictly require Ca2+ for their catalytic activity. They display a clear preference towards the hydrolysis of the more highly phosphorylated PI-analogues, PIP2 and PIP, to generate two important second messengers, InsP3 and DAG. InsP3 triggers inflow of calcium from intracellular stores, while DAG, together with calcium, activates protein kinase C, which then phosphorylates other molecules, leading to altered cellular activity. In contrast, bacterial PI-PLCs contain a single catalytic domain. Although their precise physiological function remains unclear, bacterial PI-PLCs may function as virulence factors in some pathogenic bacteria. They participate in Ca2+-independent PI metabolism. They are characterized as phosphatidylinositol-specific phospholipase C (EC 4.6.1.13) that selectively hydrolyze PI, not PIP or PIP2. The TIM-barrel type catalytic domain in bacterial PI-PLCs is very similar to the one in eukaryotic PI-PLCs, in which the catalytic domain is assembled from two highly conserved X- and Y-regions split by a divergent linker sequence. The catalytic mechanism of both prokaryotic and eukaryotic PI-PLCs is based on general base and acid catalysis utilizing two well conserved histidines, and consists of two steps, a phosphotransfer and a phosphodiesterase reaction. This superfamily also includes a distinctly different type of eukaryotic PLC, glycosylphosphatidylinositol-specific phospholipase C (GPI-PLC), an integral membrane protein characterized in the protozoan parasite Trypanosoma brucei. T. brucei GPI-PLC hydrolyzes the GPI-anchor on the variant specific glycoprotein (VSG), releasing dimyristyl glycerol (DMG), which may facilitate the evasion of the protozoan to the host#s immune system. It does not require Ca2+ for its activity and is more closely related to bacterial PI-PLCs, but not mammalian PI-PLCs. — an NCBI CDD conserved domain (cd00137); members share this curated model.
