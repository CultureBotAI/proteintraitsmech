label: "Neurotransmitter transporter 5; solute-binding domain. Human NTT5 is encoded by the SLC6A16 gene. NTT5 is expressed in testis, pancreas, and prostate; its expression is predominantly intracellular, indicative of a vesicular location. Its substrates are unknown. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Neurotransmitter transporter 5; solute-binding domain. Human NTT5 is encoded by the SLC6A16 gene. NTT5 is expressed in testis, pancreas, and prostate; its expression is predominantly intracellular, indicative of a vesicular location. Its substrates are unknown. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11502); members share this curated model.
