identifier: CDD:cd15732
label: "FYVE domain found in myotubularin-related protein 3 (MTMR3) and similar proteins. MTMR3, also termed Myotubularin-related phosphatase 3, or FYVE domain-containing dual specificity protein phosphatase 1 (FYVE-DSP1), or zinc finger FYVE domain-containing protein 10, is a ubiquitously expressed phosphoinositide 3-phosphatase specific for phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) and phosphatidylinositol 3,5-bisphosphate (PtdIns(3,5)P2) and PIKfyve, which produces PtdIns(3,5)P2 from PtdIns3P. It regulates cell migration through modulating phosphatidylinositol 5-phosphate (PtdIns5P) levels. MTMR3 contains an N-terminal PH-GRAM (PH-G) domain, a MTM phosphatase domain, a coiled-coil region, and a C-terminal FYVE domain. Unlike conventional FYVE domains, the FYVE domain of MTMR3 neither confers endosomal localization nor binds to PtdIns3P. It is also not required for the enzyme activity of MTMR3. In contrast, the PH-G domain binds phosphoinositides."
definition: >-
  FYVE domain found in myotubularin-related protein 3 (MTMR3) and similar proteins. MTMR3, also termed Myotubularin-related phosphatase 3, or FYVE domain-containing dual specificity protein phosphatase 1 (FYVE-DSP1), or zinc finger FYVE domain-containing protein 10, is a ubiquitously expressed phosphoinositide 3-phosphatase specific for phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) and phosphatidylinositol 3,5-bisphosphate (PtdIns(3,5)P2) and PIKfyve, which produces PtdIns(3,5)P2 from PtdIns3P. It regulates cell migration through modulating phosphatidylinositol 5-phosphate (PtdIns5P) levels. MTMR3 contains an N-terminal PH-GRAM (PH-G) domain, a MTM phosphatase domain, a coiled-coil region, and a C-terminal FYVE domain. Unlike conventional FYVE domains, the FYVE domain of MTMR3 neither confers endosomal localization nor binds to PtdIns3P. It is also not required for the enzyme activity of MTMR3. In contrast, the PH-G domain binds phosphoinositides. — an NCBI CDD conserved domain (cd15732); members share this curated model.
