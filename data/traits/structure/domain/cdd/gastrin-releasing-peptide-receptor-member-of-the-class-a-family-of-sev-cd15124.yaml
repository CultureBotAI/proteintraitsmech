identifier: CDD:cd15124
label: "gastrin-releasing peptide receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The gastrin-releasing peptide receptor (GRPR) is a G-protein coupled receptor whose endogenous ligand is gastrin releasing peptide. GRP shares high sequence homology with the neuropeptide neuromedin B in the C-terminal region. This receptor is high glycosylated and couples to a pertussis-toxin-insensitive G protein of the family of Gq/11, which leads to the activation of phospholipase C. Gastrin-releasing peptide (GRP) is a potent mitogen for neoplastic tissues and involved in regulating multiple functions of the gastrointestinal and central nervous systems. These include the release of gastrointestinal hormones, the contraction of smooth muscle cells, and the proliferation of epithelial cells. GRPR belongs to the bombesin subfamily of G-protein coupled receptors, whose members also include neuromedin B receptor (NMBR) and bombesin receptor subtype 3 (BRS-3). Bombesin is a tetradecapeptide, originally isolated from frog skin."
definition: >-
  gastrin-releasing peptide receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The gastrin-releasing peptide receptor (GRPR) is a G-protein coupled receptor whose endogenous ligand is gastrin releasing peptide. GRP shares high sequence homology with the neuropeptide neuromedin B in the C-terminal region. This receptor is high glycosylated and couples to a pertussis-toxin-insensitive G protein of the family of Gq/11, which leads to the activation of phospholipase C. Gastrin-releasing peptide (GRP) is a potent mitogen for neoplastic tissues and involved in regulating multiple functions of the gastrointestinal and central nervous systems. These include the release of gastrointestinal hormones, the contraction of smooth muscle cells, and the proliferation of epithelial cells. GRPR belongs to the bombesin subfamily of G-protein coupled receptors, whose members also include neuromedin B receptor (NMBR) and bombesin receptor subtype 3 (BRS-3). Bombesin is a tetradecapeptide, originally isolated from frog skin. — an NCBI CDD conserved domain (cd15124); members share this curated model.
