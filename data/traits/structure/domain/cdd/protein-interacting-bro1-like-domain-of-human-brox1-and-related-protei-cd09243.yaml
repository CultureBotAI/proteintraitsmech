identifier: CDD:cd09243
label: "Protein-interacting Bro1-like domain of human Brox1 and related proteins. This family contains the Bro1-like domain of a single-domain protein, human Brox, and related domains. It belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domains of mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding proteins Rhophilin-1 and -2, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, Ustilago maydis Rim23 (also known as PalC), and related domains. Alix, HD-PTP, Brox, Bro1, Rim20, and Rim23, interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Bro1-like domains bind components of the ESCRT-III complex: CHMP4 in the case of Brox. Human Brox can bind to human immunodeficiency virus type 1 (HIV-1) nucleocapsid. In addition to a Bro1-like domain, Brox also has a C-terminal thioester-linkage site for isoprenoid lipids (CaaX motif). This family lacks the V-shaped (V) domain found in many members of the BRO1_Alix_like superfamily."
definition: >-
  Protein-interacting Bro1-like domain of human Brox1 and related proteins. This family contains the Bro1-like domain of a single-domain protein, human Brox, and related domains. It belongs to the BRO1_Alix_like superfamily which also includes the Bro1-like domains of mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding proteins Rhophilin-1 and -2, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, Ustilago maydis Rim23 (also known as PalC), and related domains. Alix, HD-PTP, Brox, Bro1, Rim20, and Rim23, interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. Bro1-like domains are boomerang-shaped, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Bro1-like domains bind components of the ESCRT-III complex: CHMP4 in the case of Brox. Human Brox can bind to human immunodeficiency virus type 1 (HIV-1) nucleocapsid. In addition to a Bro1-like domain, Brox also has a C-terminal thioester-linkage site for isoprenoid lipids (CaaX motif). This family lacks the V-shaped (V) domain found in many members of the BRO1_Alix_like superfamily. — an NCBI CDD conserved domain (cd09243); members share this curated model.
