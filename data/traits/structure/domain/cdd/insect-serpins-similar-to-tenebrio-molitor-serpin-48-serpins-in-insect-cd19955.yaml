identifier: CDD:cd19955
label: "insect serpins similar to Tenebrio molitor serpin 48. Serpins in insects function within development, wound healing and immunity. Tenebrio molitor serpin 48 (SPN48) is highly specific for Spatzle-processing enzyme, an essential component in insect innate immunity. SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants have been associated with blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
