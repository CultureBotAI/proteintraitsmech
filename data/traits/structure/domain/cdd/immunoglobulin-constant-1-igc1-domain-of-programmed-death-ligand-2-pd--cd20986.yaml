identifier: CDD:cd20986
label: "Immunoglobulin Constant 1 (IgC1) domain of Programmed death ligand 2 (PD-L2). The members here are composed of the immunoglobulin Constant 1 (IgC1) domain of Programmed death ligand 2 (PD-L2; also known as B7-DC or CD273). PD-L2 is a cell-surface ligand that competes with PD-L1 for binding to the immunosuppressive receptor programmed death-1 (PD-1). PD-1 is a member of the CD28/B7 family that plays an important role in negatively regulating immune responses upon interaction with its two ligands, PD-L1 or PD-L2. PD-L2 has a higher affinity for PD-1 but is expressed at lower levels. PD-L2 interaction with PD-1 suppresses T cell proliferation, cytokine production and cytotoxic activity. PD-L2 is expressed on tumor cells, antigen-presenting cells or APCs (such as macrophages, B cells and dendritic cells), and a variety of other immune and nonimmune cells. Tumor expression of PD-L2 may contribute to tumor evasion of immune destruction by inactivating T cells. Thus, PD-L2 is a negative predictor for prognosis among solid cancer patients."
definition: >-
  Immunoglobulin Constant 1 (IgC1) domain of Programmed death ligand 2 (PD-L2). The members here are composed of the immunoglobulin Constant 1 (IgC1) domain of Programmed death ligand 2 (PD-L2; also known as B7-DC or CD273). PD-L2 is a cell-surface ligand that competes with PD-L1 for binding to the immunosuppressive receptor programmed death-1 (PD-1). PD-1 is a member of the CD28/B7 family that plays an important role in negatively regulating immune responses upon interaction with its two ligands, PD-L1 or PD-L2. PD-L2 has a higher affinity for PD-1 but is expressed at lower levels. PD-L2 interaction with PD-1 suppresses T cell proliferation, cytokine production and cytotoxic activity. PD-L2 is expressed on tumor cells, antigen-presenting cells or APCs (such as macrophages, B cells and dendritic cells), and a variety of other immune and nonimmune cells. Tumor expression of PD-L2 may contribute to tumor evasion of immune destruction by inactivating T cells. Thus, PD-L2 is a negative predictor for prognosis among solid cancer patients. — an NCBI CDD conserved domain (cd20986); members share this curated model.
