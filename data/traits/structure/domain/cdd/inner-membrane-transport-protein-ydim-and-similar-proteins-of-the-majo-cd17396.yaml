identifier: CDD:cd17396
label: "Inner membrane transport protein YdiM and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily contains Escherichia coli inner membrane transport proteins YdiM and YdiN, which belong to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Inner membrane transport protein YdiM and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily contains Escherichia coli inner membrane transport proteins YdiM and YdiN, which belong to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17396); members share this curated model.
