identifier: CDD:cd20482
label: "coiled-coil (CC) domain of Drosophila brain tumor (brat) and similar proteins. This family contains the coiled-coil (CC) region of Drosophila brain tumor (Brat), a translational repressor that belongs to the tripartite motif (TRIM) protein superfamily. TRIM proteins play important roles in various cellular processes and are involved in many diseases which consists of two B-box domains and a coiled-coil (CC) domain at the N-terminal region, and an NHL domain at the C-terminus. Brat localizes at the basal cortex during asymmetric division of Drosophila neuroblasts by directly interacting with the scaffolding protein Miranda (Mira), which it does through the CC-NHL domain tandem, indicating that the function of the Brat CC domain is to assemble Brat-NHL in dimeric form which is necessary for Mira binding. Brat CC forms an elongated antiparallel dimer similar to its other TRIM protein counterparts, but the overall length of Brat CC dimer is shorter than the TRIMs."
definition: >-
  coiled-coil (CC) domain of Drosophila brain tumor (brat) and similar proteins. This family contains the coiled-coil (CC) region of Drosophila brain tumor (Brat), a translational repressor that belongs to the tripartite motif (TRIM) protein superfamily. TRIM proteins play important roles in various cellular processes and are involved in many diseases which consists of two B-box domains and a coiled-coil (CC) domain at the N-terminal region, and an NHL domain at the C-terminus. Brat localizes at the basal cortex during asymmetric division of Drosophila neuroblasts by directly interacting with the scaffolding protein Miranda (Mira), which it does through the CC-NHL domain tandem, indicating that the function of the Brat CC domain is to assemble Brat-NHL in dimeric form which is necessary for Mira binding. Brat CC forms an elongated antiparallel dimer similar to its other TRIM protein counterparts, but the overall length of Brat CC dimer is shorter than the TRIMs. — an NCBI CDD conserved domain (cd20482); members share this curated model.
