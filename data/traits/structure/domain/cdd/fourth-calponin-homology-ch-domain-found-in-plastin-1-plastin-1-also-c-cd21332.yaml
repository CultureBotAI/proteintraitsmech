label: "fourth calponin homology (CH) domain found in plastin-1. Plastin-1, also called intestine-specific plastin, or I-plastin, is an actin-bundling protein in the absence of calcium. It contains four copies of the CH domain. This model corresponds to the fourth CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
