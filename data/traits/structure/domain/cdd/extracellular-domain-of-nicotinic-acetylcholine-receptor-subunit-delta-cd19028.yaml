identifier: CDD:cd19028
label: "extracellular domain of nicotinic acetylcholine receptor subunit delta (CHRND). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit delta (delta), encoded by the CHRND gene and found in the muscle. Delta nAChR subunit forms a heteropentamer with either (alpha1)2, beta and gamma subunits in embryonic type or (alpha1)2, beta and epsilon subunits in adult type receptors. Defects in this gene are a cause of multiple pterygium syndrome lethal type (MUPSL), congenital myasthenic syndrome slow-channel type (SCCMS), and congenital myasthenic syndrome fast-channel type (FCCMS). The slow-channel congenital myasthenic syndromes (SCCMS) are caused by prolonged opening episodes of AChR due to dominant gain-of-function mutations in the transmembrane regions of the heteropentamer. These mutations produce an increase in the channel opening rate, a decrease in the channel closing rate, or an increase in the affinity of ACh for the AChR, resulting in the stabilization of the open state or the destabilization of the closed state of the AChR."
definition: >-
  extracellular domain of nicotinic acetylcholine receptor subunit delta (CHRND). This subfamily contains the extracellular domain of nicotinic acetylcholine receptor subunit delta (delta), encoded by the CHRND gene and found in the muscle. Delta nAChR subunit forms a heteropentamer with either (alpha1)2, beta and gamma subunits in embryonic type or (alpha1)2, beta and epsilon subunits in adult type receptors. Defects in this gene are a cause of multiple pterygium syndrome lethal type (MUPSL), congenital myasthenic syndrome slow-channel type (SCCMS), and congenital myasthenic syndrome fast-channel type (FCCMS). The slow-channel congenital myasthenic syndromes (SCCMS) are caused by prolonged opening episodes of AChR due to dominant gain-of-function mutations in the transmembrane regions of the heteropentamer. These mutations produce an increase in the channel opening rate, a decrease in the channel closing rate, or an increase in the affinity of ACh for the AChR, resulting in the stabilization of the open state or the destabilization of the closed state of the AChR. — an NCBI CDD conserved domain (cd19028); members share this curated model.
