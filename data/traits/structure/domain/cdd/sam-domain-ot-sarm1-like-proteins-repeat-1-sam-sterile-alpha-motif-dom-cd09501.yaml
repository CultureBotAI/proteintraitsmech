identifier: CDD:cd09501
label: "SAM domain ot SARM1-like proteins, repeat 1. SAM (sterile alpha motif) domain repeat 1 of SARM1-like adaptor proteins is a protein-protein interaction domain. SARM1-like proteins contain two tandem SAM domains. SARM1-like proteins are involved in TLR (Toll-like receptor) signaling. They are responsible for targeted localization of the whole protein to post-synaptic regions of axons. In humans SARM1 expression is detected in kidney and liver."
definition: >-
  SAM domain ot SARM1-like proteins, repeat 1. SAM (sterile alpha motif) domain repeat 1 of SARM1-like adaptor proteins is a protein-protein interaction domain. SARM1-like proteins contain two tandem SAM domains. SARM1-like proteins are involved in TLR (Toll-like receptor) signaling. They are responsible for targeted localization of the whole protein to post-synaptic regions of axons. In humans SARM1 expression is detected in kidney and liver. — an NCBI CDD conserved domain (cd09501); members share this curated model.
