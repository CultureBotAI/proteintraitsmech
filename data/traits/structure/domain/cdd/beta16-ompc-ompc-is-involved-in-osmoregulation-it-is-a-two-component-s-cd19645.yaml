identifier: CDD:cd19645
label: "beta16_OmpC. OmpC is involved in osmoregulation.  It is a two component system with EnvZ, a sensor-transmitter, and OmpR, a response regulator.  They interact and differentially regulate OmpF and OmpC. When the medium osmolarity is low OmpF is transcribed at a higher rate than OmpC and vice versa under high osmolarity. OmpA, OmpC, OmpX, and FhuA have all been implicated as host receptors for various tailed phages.  Though OmpA is the preferred receptor for Sf6/Ox2, in its absence OmpC can be substituted for OmpA. These proteins all have homologous folds made up of transmembrane beta-barrels and surface-exposed loops, although their diameters and oligomeric states differ.  Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane.  They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances.  Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface."
definition: >-
  beta16_OmpC. OmpC is involved in osmoregulation. It is a two component system with EnvZ, a sensor-transmitter, and OmpR, a response regulator. They interact and differentially regulate OmpF and OmpC. When the medium osmolarity is low OmpF is transcribed at a higher rate than OmpC and vice versa under high osmolarity. OmpA, OmpC, OmpX, and FhuA have all been implicated as host receptors for various tailed phages. Though OmpA is the preferred receptor for Sf6/Ox2, in its absence OmpC can be substituted for OmpA. These proteins all have homologous folds made up of transmembrane beta-barrels and surface-exposed loops, although their diameters and oligomeric states differ. Porins form aqueous channels for the diffusion of small hydrophillic molecules across the outer membrane. They are integral membrane proteins found in the outer membrane of Gram-negative bacteria, mitochondria and chloroplasts. They act as molecular sieves to ensure the unhindered diffusion of nutrients into the periplasmic space while protecting the cell from hostile substances. Individual 16-stranded anti-parallel beta-barrels form a central pore. They are are usually trimeric with three 16-stranded beta-barrels forming three pores that merge on one side through mainly hydrophobic interactions at the interface. — an NCBI CDD conserved domain (cd19645); members share this curated model.
