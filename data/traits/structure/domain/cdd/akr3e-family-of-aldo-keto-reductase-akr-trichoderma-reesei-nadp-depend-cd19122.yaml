label: "AKR3E family of aldo-keto reductase (AKR). Trichoderma reesei NADP(+)-dependent glycerol 2-dehydrogenase (GLD2, EC 1.1.1.156), also called dihydroxyacetone reductase, is a founding member of aldo-keto reductase family 3 member E1 (AKR3E1). It acts as a glycerol oxidoreductase probably involved in glycerol synthesis."
