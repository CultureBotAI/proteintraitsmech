identifier: CDD:cd11065
label: "cytochrome P450 family 64-like fungal cytochrome P450s. This group includes Aspergillus flavus cytochrome P450 64 (CYP64), also called O-methylsterigmatocystin (OMST) oxidoreductase or aflatoxin B synthase or aflatoxin biosynthesis protein Q, and similar fungal cytochrome P450s. CYP64 converts OMST to aflatoxin B1 and converts dihydro-O-methylsterigmatocystin (DHOMST) to aflatoxin B2 in the aflatoxin biosynthesis pathway. The CYP64-like subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
