identifier: CDD:cd09319
label: "The Tellurite-resistance/Dicarboxylate Transporter (TDT) family. The Tellurite-resistance/Dicarboxylate Transporter (TDT) family includes members from all three kingdoms, but only three members of the family have been functionally characterized: the TehA protein of E. coli functioning as a tellurite-resistance uptake permease, the Mae1 protein of S. pombe functioning in the uptake of malate and other dicarboxylates, and the sulfite efflux pump (SSU1) of Saccharomyces cerevisiae. In plants, the plasma membrane protein SLAC1 (Slow Anion Channel-Associated 1), which is preferentially expressed in guard cells, encodes a distant homolog of fungal and bacterial dicarboxylate/malic acid transport proteins. SLAC1 is essential  in mediating stomatal responses to physiological and stress stimuli. Members of the TDT family exhibit 10 putative transmembrane alpha-helical spanners (TMSs)."
definition: >-
  The Tellurite-resistance/Dicarboxylate Transporter (TDT) family. The Tellurite-resistance/Dicarboxylate Transporter (TDT) family includes members from all three kingdoms, but only three members of the family have been functionally characterized: the TehA protein of E. coli functioning as a tellurite-resistance uptake permease, the Mae1 protein of S. pombe functioning in the uptake of malate and other dicarboxylates, and the sulfite efflux pump (SSU1) of Saccharomyces cerevisiae. In plants, the plasma membrane protein SLAC1 (Slow Anion Channel-Associated 1), which is preferentially expressed in guard cells, encodes a distant homolog of fungal and bacterial dicarboxylate/malic acid transport proteins. SLAC1 is essential in mediating stomatal responses to physiological and stress stimuli. Members of the TDT family exhibit 10 putative transmembrane alpha-helical spanners (TMSs). — an NCBI CDD conserved domain (cd09319); members share this curated model.
