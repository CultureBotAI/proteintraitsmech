identifier: CDD:cd13409
label: "Tumor necrosis factor receptor superfamily member 8 (TNFRSF8), also known as CD30. TNFRSF8 (also known as CD30, Ki-1, D1S166E) is expressed by activated T and B cells. It transduces signals that lead to the activation of NF-kappaB, mediated by the adaptor proteins TRAF2 and TRAF5. This receptor is a positive regulator of apoptosis, and has been shown to limit the proliferative potential of auto-reactive CD8 effector T cells and protect the body against autoimmunity. Two alternatively spliced transcript variants of this gene encoding distinct isoforms have been reported.  CD30 is expressed in malignant Hodgkin and Reed-Sternberg cells on the surface of extracellular vesicles, facilitating CD30-CD30L interaction between cell types. This receptor is also associated with anaplastic large cell lymphoma. It is expressed in embryonal carcinoma, but not in seminoma, making it a useful marker in distinguishing between these germ cell tumors. Since CD30 has restricted expression in normal tissues, it is an optimal target for selectively eliminating CD30-expressing neoplastic cells by specific toxin-conjugated monoclonal antibodies (mAbs)."
definition: >-
  Tumor necrosis factor receptor superfamily member 8 (TNFRSF8), also known as CD30. TNFRSF8 (also known as CD30, Ki-1, D1S166E) is expressed by activated T and B cells. It transduces signals that lead to the activation of NF-kappaB, mediated by the adaptor proteins TRAF2 and TRAF5. This receptor is a positive regulator of apoptosis, and has been shown to limit the proliferative potential of auto-reactive CD8 effector T cells and protect the body against autoimmunity. Two alternatively spliced transcript variants of this gene encoding distinct isoforms have been reported. CD30 is expressed in malignant Hodgkin and Reed-Sternberg cells on the surface of extracellular vesicles, facilitating CD30-CD30L interaction between cell types. This receptor is also associated with anaplastic large cell lymphoma. It is expressed in embryonal carcinoma, but not in seminoma, making it a useful marker in distinguishing between these germ cell tumors. Since CD30 has restricted expression in normal tissues, it is an optimal target for selectively eliminating CD30-expressing neoplastic cells by specific toxin-conjugated monoclonal antibodies (mAbs). — an NCBI CDD conserved domain (cd13409); members share this curated model.
