identifier: CDD:cd07829
label: "Catalytic domain of Cyclin-Dependent protein Kinase-like Serine/Threonine Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. CDKs are partly regulated by their subcellular localization, which defines substrate phosphorylation and the resulting specific function. CDK1, CDK2, CDK4, and CDK6 have well-defined functions in the cell cycle, such as the regulation of the early G1 phase by CDK4 or CDK6, the G1/S phase transition by CDK2, or the entry of mitosis by CDK1. They also exhibit overlapping cyclin specificity and functions in certain conditions. Knockout mice with a single CDK deleted remain viable with specific phenotypes, showing that some CDKs can compensate for each other. For example, CDK4 can compensate for the loss of CDK6, however, double knockout mice with both CDK4 and CDK6 deleted die in utero. CDK8 and CDK9 are mainly involved in transcription while CDK5 is implicated in neuronal function. CDK7 plays essential roles in both the cell cycle as a CDK-Activating Kinase (CAK) and in transcription as a component of the general transcription factor TFIIH. The CDK-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Cyclin-Dependent protein Kinase-like Serine/Threonine Kinases. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. CDKs are partly regulated by their subcellular localization, which defines substrate phosphorylation and the resulting specific function. CDK1, CDK2, CDK4, and CDK6 have well-defined functions in the cell cycle, such as the regulation of the early G1 phase by CDK4 or CDK6, the G1/S phase transition by CDK2, or the entry of mitosis by CDK1. They also exhibit overlapping cyclin specificity and functions in certain conditions. Knockout mice with a single CDK deleted remain viable with specific phenotypes, showing that some CDKs can compensate for each other. For example, CDK4 can compensate for the loss of CDK6, however, double knockout mice with both CDK4 and CDK6 deleted die in utero. CDK8 and CDK9 are mainly involved in transcription while CDK5 is implicated in neuronal function. CDK7 plays essential roles in both the cell cycle as a CDK-Activating Kinase (CAK) and in transcription as a component of the general transcription factor TFIIH. The CDK-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd07829); members share this curated model.
