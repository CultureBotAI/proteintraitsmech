identifier: CDD:cd22766
label: "OTU (ovarian tumor) domain of tumor necrosis factor alpha induced protein 3. Tumor necrosis factor (TNF) alpha-induced protein 3 (TNFAIP3) is also called OTU domain-containing protein 7C (OTUD7C), DNA-binding protein A20, or zinc finger protein A20. It is a ubiquitin-editing enzyme that contains both ubiquitin ligase and deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) activities. It antagonizes IKK [IkappaB (inhibitor of kappaB) kinase] activation by modulating Lys63-linked polyubiquitination of cytokine-receptor-associated factors including TRAF2/6 (tumour-necrosis-factor-receptor-associated factor 2/6) and RIP1 (receptor-interacting protein 1). It can also inhibit IKK through a non-catalytic mechanism which involves polyubiquitin. In vitro, TNFAIP3 is able to deubiquitinate 'Lys-11'-, 'Lys-48'- and 'Lys-63' polyubiquitin chains. TNFAIP3 contains several A20-type zinc fingers that mediate the ubiquitin ligase activity and an OTU (ovarian tumor) domain that contains the DUB activity. It belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. It is classified as a family C64 cysteine protease by MEROPS."
definition: >-
  OTU (ovarian tumor) domain of tumor necrosis factor alpha induced protein 3. Tumor necrosis factor (TNF) alpha-induced protein 3 (TNFAIP3) is also called OTU domain-containing protein 7C (OTUD7C), DNA-binding protein A20, or zinc finger protein A20. It is a ubiquitin-editing enzyme that contains both ubiquitin ligase and deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) activities. It antagonizes IKK [IkappaB (inhibitor of kappaB) kinase] activation by modulating Lys63-linked polyubiquitination of cytokine-receptor-associated factors including TRAF2/6 (tumour-necrosis-factor-receptor-associated factor 2/6) and RIP1 (receptor-interacting protein 1). It can also inhibit IKK through a non-catalytic mechanism which involves polyubiquitin. In vitro, TNFAIP3 is able to deubiquitinate 'Lys-11'-, 'Lys-48'- and 'Lys-63' polyubiquitin chains. TNFAIP3 contains several A20-type zinc fingers that mediate the ubiquitin ligase activity and an OTU (ovarian tumor) domain that contains the DUB activity. It belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. It is classified as a family C64 cysteine protease by MEROPS. — an NCBI CDD conserved domain (cd22766); members share this curated model.
