identifier: CDD:cd23400
label: "Arabinose-binding domain (ABD), beta-trefoil fold, found in otogelin (OTOG) and similar proteins. OTOG is a glycoprotein specific to acellular membranes of the inner ear. It may be required for the anchoring of the otoconial membranes and cupula to the underlying neuroepithelia in the vestibule. OTOG may be involved in the organization and/or stabilization of the fibrillar network that compose the tectorial membrane in the cochlea. Mutations in the OTOG gene may cause hearing loss. OTOG contains an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD of the related protein, alpha-L-arabinofuranosidase, binds two arabinose molecules in the beta and gamma subdomains."
definition: >-
  Arabinose-binding domain (ABD), beta-trefoil fold, found in otogelin (OTOG) and similar proteins. OTOG is a glycoprotein specific to acellular membranes of the inner ear. It may be required for the anchoring of the otoconial membranes and cupula to the underlying neuroepithelia in the vestibule. OTOG may be involved in the organization and/or stabilization of the fibrillar network that compose the tectorial membrane in the cochlea. Mutations in the OTOG gene may cause hearing loss. OTOG contains an ABD with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ABD of the related protein, alpha-L-arabinofuranosidase, binds two arabinose molecules in the beta and gamma subdomains. — an NCBI CDD conserved domain (cd23400); members share this curated model.
