label: "Ribulose bisphosphate carboxylase like proteins (RLPs) similar to R.rubrum RLP. RLP from Rhodospirillum rubrum plays a role in an uncharacterized sulfur salvage pathway and has been shown to catalyze a novel isomerization reaction that converts 5-methylthio-d-ribulose 1-phosphate to a 3:1 mixture of 1-methylthioxylulose 5-phosphate and 1-methylthioribulose 5-phosphate."
definition: >-
