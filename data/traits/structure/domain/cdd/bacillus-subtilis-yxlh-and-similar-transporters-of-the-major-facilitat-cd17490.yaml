identifier: CDD:cd17490
label: "Bacillus subtilis YxlH and similar transporters of the Major Facilitator Superfamily. This subfamily is composed of Bacillus subtilis YxlH uncharacterized MFS-type transporter YxlH and similar proteins. The biological function of YxlH remains unclear. The YxlH-like subfamily belongs to the bacterial MdtG-like and eukaryotic solute carrier 18 (SLC18) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Bacillus subtilis YxlH and similar transporters of the Major Facilitator Superfamily. This subfamily is composed of Bacillus subtilis YxlH uncharacterized MFS-type transporter YxlH and similar proteins. The biological function of YxlH remains unclear. The YxlH-like subfamily belongs to the bacterial MdtG-like and eukaryotic solute carrier 18 (SLC18) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17490); members share this curated model.
