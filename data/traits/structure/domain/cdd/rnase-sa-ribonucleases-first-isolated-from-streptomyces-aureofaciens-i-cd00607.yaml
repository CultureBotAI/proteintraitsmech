identifier: CDD:cd00607
label: "RNase_Sa. Ribonucleases first isolated from Streptomyces aureofaciens. In general, ribonucleases cleave phosphodiester bonds in RNA and are essential  for both non-specific RNA degradation and for numerous forms of RNA processing. RNAse Sa is a guanylate specific endoribonuclease which belongs to the superfamily of microbial ribonucleases. Typical of this sub-family, the enzyme hydrolyses the phosphodiester bonds of RNA at the 3' oxygen end of guanosine residues to yield oligonucleotides with the guanosine-2',3'-cyclophosphate at the 3' end and the hydroxyl group at the 5' end. The terminal guanosine-2,3'-cyclophosphate is hydrolysed by guanyl RNAses to give guanosine-3'-phosphate."
definition: >-
  RNase_Sa. Ribonucleases first isolated from Streptomyces aureofaciens. In general, ribonucleases cleave phosphodiester bonds in RNA and are essential for both non-specific RNA degradation and for numerous forms of RNA processing. RNAse Sa is a guanylate specific endoribonuclease which belongs to the superfamily of microbial ribonucleases. Typical of this sub-family, the enzyme hydrolyses the phosphodiester bonds of RNA at the 3' oxygen end of guanosine residues to yield oligonucleotides with the guanosine-2',3'-cyclophosphate at the 3' end and the hydroxyl group at the 5' end. The terminal guanosine-2,3'-cyclophosphate is hydrolysed by guanyl RNAses to give guanosine-3'-phosphate. — an NCBI CDD conserved domain (cd00607); members share this curated model.
