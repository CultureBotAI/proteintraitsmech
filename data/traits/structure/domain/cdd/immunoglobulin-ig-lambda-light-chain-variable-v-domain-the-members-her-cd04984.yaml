identifier: CDD:cd04984
label: "Immunoglobulin (Ig) lambda light chain variable (V) domain. The members here are composed of the immunoglobulin (Ig) light chain, lambda type, variable (V) domain. The basic structure of Ig molecules is a tetramer of two light chains and two heavy chains linked by disulfide bonds. There are two types of light chains: kappa and lambda, each composed of a constant domain (CL) and a variable domain (VL). There are five types of heavy chains (alpha, gamma, delta, epsilon, and mu), which determines the type of immunoglobulin formed:  IgA, IgG, IgD, IgE, and IgM, respectively. In higher vertebrates, there are two types of light chain, designated kappa and lambda, which seem to be functionally identical, and can associate with any of the heavy chains. Members of this group contain standard Ig superfamily V-set AGFCC'C\"/DEB domain topology."
definition: >-
  Immunoglobulin (Ig) lambda light chain variable (V) domain. The members here are composed of the immunoglobulin (Ig) light chain, lambda type, variable (V) domain. The basic structure of Ig molecules is a tetramer of two light chains and two heavy chains linked by disulfide bonds. There are two types of light chains: kappa and lambda, each composed of a constant domain (CL) and a variable domain (VL). There are five types of heavy chains (alpha, gamma, delta, epsilon, and mu), which determines the type of immunoglobulin formed: IgA, IgG, IgD, IgE, and IgM, respectively. In higher vertebrates, there are two types of light chain, designated kappa and lambda, which seem to be functionally identical, and can associate with any of the heavy chains. Members of this group contain standard Ig superfamily V-set AGFCC'C"/DEB domain topology. — an NCBI CDD conserved domain (cd04984); members share this curated model.
