identifier: CDD:cd17307
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in phosphatidylinositol 4-phosphate 5-kinase type-1 beta (PIP5K1beta) and similar proteins. PIP5K1beta (EC 2.7.1.68), also known as PtdIns(4)P-5-kinase 1 beta, or protein STM-7, or PIP5K1B, is encoded by the Friedreich's ataxia (FRDA) gene, STM7. FRDA is a progressive neurodegenerative disease characterized by ataxia, variously associating heart disease, diabetes mellitus, and/or glucose intolerance. PIP5K1beta is an enzyme functionally linked to actin cytoskeleton dynamics and it phosphorylates phosphatidylinositol 4-phosphate (PtdIns4P) to generate phosphatidylinositol-4,5-bisphosphate (PtdIns(4,5)P2)."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in phosphatidylinositol 4-phosphate 5-kinase type-1 beta (PIP5K1beta) and similar proteins. PIP5K1beta (EC 2.7.1.68), also known as PtdIns(4)P-5-kinase 1 beta, or protein STM-7, or PIP5K1B, is encoded by the Friedreich's ataxia (FRDA) gene, STM7. FRDA is a progressive neurodegenerative disease characterized by ataxia, variously associating heart disease, diabetes mellitus, and/or glucose intolerance. PIP5K1beta is an enzyme functionally linked to actin cytoskeleton dynamics and it phosphorylates phosphatidylinositol 4-phosphate (PtdIns4P) to generate phosphatidylinositol-4,5-bisphosphate (PtdIns(4,5)P2). — an NCBI CDD conserved domain (cd17307); members share this curated model.
