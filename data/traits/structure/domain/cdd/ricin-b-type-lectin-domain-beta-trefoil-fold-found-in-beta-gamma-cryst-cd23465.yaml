identifier: CDD:cd23465
label: "ricin B-type lectin domain, beta-trefoil fold, found in beta/gamma crystallin domain-containing protein 2 (CRYBG2) and similar proteins. CRYBG2, also called absent in melanoma 1-like protein (AIM1L), is a beta/gamma-crystallin family protein with a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in beta/gamma crystallin domain-containing protein 2 (CRYBG2) and similar proteins. CRYBG2, also called absent in melanoma 1-like protein (AIM1L), is a beta/gamma-crystallin family protein with a ricin B-type lectin domain at the C-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23465); members share this curated model.
