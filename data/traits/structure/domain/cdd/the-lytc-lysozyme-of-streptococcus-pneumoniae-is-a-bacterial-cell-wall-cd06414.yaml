identifier: CDD:cd06414
label: "The LytC lysozyme of Streptococcus pneumoniae is a bacterial cell wall hydrolase that cleaves the beta1-4-glycosydic bond located between the N-acetylmuramoyl-N-glucosaminyl residues of the cell wall polysaccharide chains.   LytC is composed of a C-terminal glycosyl hydrolase family 25 (GH25) domain and an N-terminal choline-binding module (CBM) consisting of eleven homologous repeats that specifically recognizes the choline residues of pneumococcal lipoteichoic and teichoic acids. This domain arrangement is the reverse of the major pneumococcal autolysin, LytA, and the CPL-1-like lytic enzymes of the pneumococcal bacteriophages, in which the CBM (consisting of six repeats) is at the C-terminus. This model represents the C-terminal catalytic domain of the LytC-like enzymes."
definition: >-
  The LytC lysozyme of Streptococcus pneumoniae is a bacterial cell wall hydrolase that cleaves the beta1-4-glycosydic bond located between the N-acetylmuramoyl-N-glucosaminyl residues of the cell wall polysaccharide chains. LytC is composed of a C-terminal glycosyl hydrolase family 25 (GH25) domain and an N-terminal choline-binding module (CBM) consisting of eleven homologous repeats that specifically recognizes the choline residues of pneumococcal lipoteichoic and teichoic acids. This domain arrangement is the reverse of the major pneumococcal autolysin, LytA, and the CPL-1-like lytic enzymes of the pneumococcal bacteriophages, in which the CBM (consisting of six repeats) is at the C-terminus. This model represents the C-terminal catalytic domain of the LytC-like enzymes. — an NCBI CDD conserved domain (cd06414); members share this curated model.
