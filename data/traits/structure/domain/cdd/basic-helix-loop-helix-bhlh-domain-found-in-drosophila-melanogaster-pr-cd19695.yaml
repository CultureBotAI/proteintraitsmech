identifier: CDD:cd19695
label: "basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster protein extra-macrochaetae   and similar proteins. Extra-macrochaetae is a negative regulator of sensory organ development in Drosophila. It belongs to dominant negative group of helix-loop-helix (dnHLH) proteins, which lack a basic DNA-binding domain but can form heterodimers with other HLH proteins, thereby inhibiting DNA binding."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster protein extra-macrochaetae and similar proteins. Extra-macrochaetae is a negative regulator of sensory organ development in Drosophila. It belongs to dominant negative group of helix-loop-helix (dnHLH) proteins, which lack a basic DNA-binding domain but can form heterodimers with other HLH proteins, thereby inhibiting DNA binding. — an NCBI CDD conserved domain (cd19695); members share this curated model.
