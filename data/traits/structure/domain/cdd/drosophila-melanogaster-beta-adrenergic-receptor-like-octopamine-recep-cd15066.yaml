identifier: CDD:cd15066
label: "Drosophila melanogaster beta-adrenergic receptor-like octopamine receptors and similar receptors in bilateria; member of the class A family of seven-transmembrane G protein-coupled receptors. This group includes Drosophila beta-adrenergic-like octopamine receptors and similar proteins. The biogenic amine octopamine is the invertebrate equivalent of vertebrate adrenergic neurotransmitters and exerts its effects through different G protein-coupled receptor types. Insect octopamine receptors are involved in the modulation of carbohydrate metabolism, muscular tension, cognition and memory. The activation of octopamine receptors mediating these actions leads to an increase in adenylate cyclase activity, thereby increasing cAMP levels. In Drosophila melanogaster, three subgroups have been classified on the basis of their structural homology and functional equivalents with vertebrate beta-adrenergic receptors: DmOctBeta1R, DmOctBeta2R, and DmOctBeta3R."
definition: >-
  Drosophila melanogaster beta-adrenergic receptor-like octopamine receptors and similar receptors in bilateria; member of the class A family of seven-transmembrane G protein-coupled receptors. This group includes Drosophila beta-adrenergic-like octopamine receptors and similar proteins. The biogenic amine octopamine is the invertebrate equivalent of vertebrate adrenergic neurotransmitters and exerts its effects through different G protein-coupled receptor types. Insect octopamine receptors are involved in the modulation of carbohydrate metabolism, muscular tension, cognition and memory. The activation of octopamine receptors mediating these actions leads to an increase in adenylate cyclase activity, thereby increasing cAMP levels. In Drosophila melanogaster, three subgroups have been classified on the basis of their structural homology and functional equivalents with vertebrate beta-adrenergic receptors: DmOctBeta1R, DmOctBeta2R, and DmOctBeta3R. — an NCBI CDD conserved domain (cd15066); members share this curated model.
