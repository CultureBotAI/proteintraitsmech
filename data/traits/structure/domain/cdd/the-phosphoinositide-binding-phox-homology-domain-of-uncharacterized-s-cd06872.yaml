identifier: CDD:cd06872
label: "The phosphoinositide binding Phox Homology domain of uncharacterized SNX19-like plant proteins. The PX domain is a phosphoinositide (PI) binding module involved in targeting proteins to PI-enriched membranes. Members in this subfamily are uncharacterized plant proteins containing an N-terminal PXA domain, a central PX domain, and a C-terminal domain that is conserved in some sorting nexins (SNXs). This is the same domain architecture found in SNX19. SNX13 and SNX14 also contain these three domains but also contain a regulator of G protein signaling (RGS) domain in between the PXA and PX domains. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. In addition to protein-lipid interaction, the PX domain may also be involved in protein-protein interaction."
definition: >-
  The phosphoinositide binding Phox Homology domain of uncharacterized SNX19-like plant proteins. The PX domain is a phosphoinositide (PI) binding module involved in targeting proteins to PI-enriched membranes. Members in this subfamily are uncharacterized plant proteins containing an N-terminal PXA domain, a central PX domain, and a C-terminal domain that is conserved in some sorting nexins (SNXs). This is the same domain architecture found in SNX19. SNX13 and SNX14 also contain these three domains but also contain a regulator of G protein signaling (RGS) domain in between the PXA and PX domains. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. In addition to protein-lipid interaction, the PX domain may also be involved in protein-protein interaction. — an NCBI CDD conserved domain (cd06872); members share this curated model.
