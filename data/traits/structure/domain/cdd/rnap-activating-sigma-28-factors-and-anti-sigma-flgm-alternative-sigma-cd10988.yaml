identifier: CDD:cd10988
label: "RNAP activating Sigma 28 factors and anti-sigma FlgM; alternative Sigma D. Sigma 28 is the flagellar sigma factor, which is often found in complex with its anti-sigma, FlgM. FlgM attacks and stabilizes the sig28 holoenzyme in order to regulate its respective sigma. In E.coli sig28 is called FliA or SigF, while in Bacillus subtilis, it is called alternative factor Sigma D. In Streptomyces coelicolor, this sigma factor is called WhiG. Sig28 is among a group of key bacterial transcription regulators. Sigma factors direct promoter recognition and melting after binding to the core RNAP and forming the holoenzyme. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs."
definition: >-
  RNAP activating Sigma 28 factors and anti-sigma FlgM; alternative Sigma D. Sigma 28 is the flagellar sigma factor, which is often found in complex with its anti-sigma, FlgM. FlgM attacks and stabilizes the sig28 holoenzyme in order to regulate its respective sigma. In E.coli sig28 is called FliA or SigF, while in Bacillus subtilis, it is called alternative factor Sigma D. In Streptomyces coelicolor, this sigma factor is called WhiG. Sig28 is among a group of key bacterial transcription regulators. Sigma factors direct promoter recognition and melting after binding to the core RNAP and forming the holoenzyme. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs. — an NCBI CDD conserved domain (cd10988); members share this curated model.
