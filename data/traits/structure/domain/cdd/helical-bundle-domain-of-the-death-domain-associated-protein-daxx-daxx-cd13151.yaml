identifier: CDD:cd13151
label: "Helical bundle domain of the death-domain associated protein (DAXX). DAXX is a nuclear protein that modulates transcription of various genes and is involved in cell death and/or the suppression of growth. DAXX is also a histone chaperone conserved in Metazoa that acts specifically on histone H3.3. This alignment models the N-terminal helical bundle domain of DAXX, which was shown to interact with the tumor suppressor Ras-association domain family 1C (RASSF1C)."
definition: >-
  Helical bundle domain of the death-domain associated protein (DAXX). DAXX is a nuclear protein that modulates transcription of various genes and is involved in cell death and/or the suppression of growth. DAXX is also a histone chaperone conserved in Metazoa that acts specifically on histone H3.3. This alignment models the N-terminal helical bundle domain of DAXX, which was shown to interact with the tumor suppressor Ras-association domain family 1C (RASSF1C). — an NCBI CDD conserved domain (cd13151); members share this curated model.
