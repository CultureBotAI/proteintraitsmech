identifier: CDD:cd17704
label: "RUN domain found in small G protein signaling modulator 2 (SGSM2) and similar proteins. SGSM2, also called RUN and TBC1 domain-containing protein 1 (RUTBC1), is a GTPase-activating protein for Rab32/38, and regulates melanogenic enzyme trafficking in melanocytes. It also acts as a Rab9A effector that activates GTP hydrolysis by Rab32 and Rab33B proteins. This model contains the RUN domain of SGSM2."
definition: >-
  RUN domain found in small G protein signaling modulator 2 (SGSM2) and similar proteins. SGSM2, also called RUN and TBC1 domain-containing protein 1 (RUTBC1), is a GTPase-activating protein for Rab32/38, and regulates melanogenic enzyme trafficking in melanocytes. It also acts as a Rab9A effector that activates GTP hydrolysis by Rab32 and Rab33B proteins. This model contains the RUN domain of SGSM2. — an NCBI CDD conserved domain (cd17704); members share this curated model.
