identifier: CDD:cd08170
label: "Glycerol dehydrogenases (GlyDH) catalyzes oxidation of glycerol to dihydroxyacetone in glycerol dissmilation. Glycerol dehydrogenases (GlyDH) is a key enzyme in the glycerol dissimilation pathway. In anaerobic conditions, many microorganisms utilize glycerol as a source of carbon through coupled oxidative and reductive pathways. One of the pathways involves the oxidation of glycerol to dihydroxyacetone with the reduction of NAD+ to NADH catalyzed by glycerol dehydrogenases. Dihydroxyacetone is then phosphorylated by dihydroxyacetone kinase and enters the glycolytic pathway for further degradation. The activity of GlyDH is zinc-dependent; the zinc ion plays a role in stabilizing an alkoxide intermediate at the active site."
definition: >-
  Glycerol dehydrogenases (GlyDH) catalyzes oxidation of glycerol to dihydroxyacetone in glycerol dissmilation. Glycerol dehydrogenases (GlyDH) is a key enzyme in the glycerol dissimilation pathway. In anaerobic conditions, many microorganisms utilize glycerol as a source of carbon through coupled oxidative and reductive pathways. One of the pathways involves the oxidation of glycerol to dihydroxyacetone with the reduction of NAD+ to NADH catalyzed by glycerol dehydrogenases. Dihydroxyacetone is then phosphorylated by dihydroxyacetone kinase and enters the glycolytic pathway for further degradation. The activity of GlyDH is zinc-dependent; the zinc ion plays a role in stabilizing an alkoxide intermediate at the active site. — an NCBI CDD conserved domain (cd08170); members share this curated model.
