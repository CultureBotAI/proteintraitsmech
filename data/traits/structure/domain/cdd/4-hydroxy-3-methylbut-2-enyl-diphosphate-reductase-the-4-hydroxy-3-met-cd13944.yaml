identifier: CDD:cd13944
label: "4-hydroxy-3-methylbut-2-enyl diphosphate reductase. The 4-hydroxy-3-methylbut-2-enyl diphosphate (HMBPP) reductase (called lytB or ispH) is the terminal enzyme of the mevalonate-independent 2-C-methyl-D-erythritol 4-phosphate (MEP) pathway, one of the two metabolic routes for isoprenoid biosynthesis. The MEP pathway is essential in many eubacteria, plants, and the malaria parasite. LytB converts HMBPP into isopentenyl diphosphate (IPP) and dimethylallyl diphosphate (DMAPP)."
definition: >-
  4-hydroxy-3-methylbut-2-enyl diphosphate reductase. The 4-hydroxy-3-methylbut-2-enyl diphosphate (HMBPP) reductase (called lytB or ispH) is the terminal enzyme of the mevalonate-independent 2-C-methyl-D-erythritol 4-phosphate (MEP) pathway, one of the two metabolic routes for isoprenoid biosynthesis. The MEP pathway is essential in many eubacteria, plants, and the malaria parasite. LytB converts HMBPP into isopentenyl diphosphate (IPP) and dimethylallyl diphosphate (DMAPP). — an NCBI CDD conserved domain (cd13944); members share this curated model.
