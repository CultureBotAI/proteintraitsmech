identifier: CDD:cd10472
label: "Ligand Binding Domain of Ephrin type-B receptors. Ephrin receptors (EphRs) comprise the largest subfamily of receptor tyrosine kinases (RTKs). Class EphB receptors bind to transmembrane ephrin-B ligands. They play important roles in synapse formation and plasticity, spine morphogenesis, axon guidance, and angiogenesis. In the intestinal epithelium, EphB receptors are Wnt signaling target genes that control cell compartmentalization. They function as suppressors of colon cancer progression. There are six vertebrate EhpB receptors (EphB1-6), which display promiscuous interactions with three ephrin-B ligands. One exception is EphB2, which also interacts with ephrin A5. EphRs contain a ligand binding domain and two fibronectin repeats extracellularly, a transmembrane segment, and a cytoplasmic tyrosine kinase domain. Binding of the ephrin ligand to EphR requires cell-cell contact since both are anchored to the plasma membrane. The resulting downstream signals occur bidirectionally in both EphR-expressing cells (forward signaling) and ephrin-expressing cells (reverse signaling). Ephrin/EphR interaction mainly results in cell-cell repulsion or adhesion, making it important in neural development and plasticity, cell morphogenesis, cell-fate determination, embryonic development, tissue patterning, and angiogenesis."
