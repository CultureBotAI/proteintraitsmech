identifier: CDD:cd22102
label: "F-box domain found in F-box only protein 31 (FBXO31) and similar proteins. FBXO31, also called FBX31, or FBXO14, is a component of an SCF (SKP1-cullin-F-box) protein ligase complex that plays a central role in G1 arrest following DNA damage. It specifically recognizes phosphorylated cyclin-D1 (CCND1), promoting its ubiquitination and degradation by the proteasome, resulting in G1 arrest. FBXO31 may act as a tumor suppressor. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 31 (FBXO31) and similar proteins. FBXO31, also called FBX31, or FBXO14, is a component of an SCF (SKP1-cullin-F-box) protein ligase complex that plays a central role in G1 arrest following DNA damage. It specifically recognizes phosphorylated cyclin-D1 (CCND1), promoting its ubiquitination and degradation by the proteasome, resulting in G1 arrest. FBXO31 may act as a tumor suppressor. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22102); members share this curated model.
