identifier: CDD:cd22713
label: "forkhead associated (FHA) domain found in pleckstrin homology-like domain family B member 1 (PHLDB1) and similar proteins. PHLDB1, also called protein LL5-alpha (LL5A), acts as an insulin-responsive protein that enhances Akt activation. PHLDB1 contains a pleckstrin homology domain, which binds phosphatidylinositol PI(3,4)P(2), PI(3,5)P(2), and PI(3,4,5)P(3), as well as a Forkhead-associated (FHA) domain and coiled coil regions. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in pleckstrin homology-like domain family B member 1 (PHLDB1) and similar proteins. PHLDB1, also called protein LL5-alpha (LL5A), acts as an insulin-responsive protein that enhances Akt activation. PHLDB1 contains a pleckstrin homology domain, which binds phosphatidylinositol PI(3,4)P(2), PI(3,5)P(2), and PI(3,4,5)P(3), as well as a Forkhead-associated (FHA) domain and coiled coil regions. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22713); members share this curated model.
