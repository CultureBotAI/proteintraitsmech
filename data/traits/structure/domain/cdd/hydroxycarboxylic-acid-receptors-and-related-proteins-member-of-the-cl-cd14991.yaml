identifier: CDD:cd14991
label: "hydroxycarboxylic acid receptors and related proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. This group includes the hydroxycarboxylic acid receptors (HCARs) as well as their closely related receptors, GPR31 and oxoeicosanoid receptor 1 (OXER1). HCARs are members of the class A family of G-protein coupled receptors (GPCRs). HCAR subfamily contain three receptor subtypes: HCAR1, HCAR2, and HCAR3. The endogenous ligand of HCAR1 (also known as lactate receptor 1, GPR104, or GPR81) is L-lactic acid. The endogenous ligands of HCAR2 (also known as niacin receptor 1, GPR109A, nicotinic acid receptor) and HCAR3 (also known as niacin receptor 2, orGPR109B) are 3-hydroxybutyric acid and 3-hydroxyoctanoic acid, respectively. All three HCA receptors are expressed in adipocytes, and are coupled to G(i)-proteins mediating anti-lipolytic effects in fat cells. OXER1 is a receptor for eicosanoids and polyunsaturated fatty acids such as 5-oxo-6E,8Z,11Z,14Z-eicosatetraenoic acid (5-OXO-ETE), 5(S)-hydroperoxy-6E,8Z,11Z,14Z-eicosatetraenoic acid (5(S)-HPETE) and arachidonic acid, whereas GPR31 is a high-affinity receptor for 12-(S)-hydroxy-5,8,10,14-eicosatetraenoic acid (12-S-HETE)."
