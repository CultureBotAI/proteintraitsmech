identifier: CDD:cd22876
label: "CIR (central inhibitory region) domain of Saccharomyces cerevisiae APC/C-CDH1 modulator 1 (Acm1) and similar proteins. Acm1 functions as a negative regulator of Cdh1, which is an activator protein responsible for regulating the ubiquitin ligase activity and substrate specificity of the anaphase promoting complex/cyclosome (APC/C). Cdh1 is necessary for various cellular processes, such as exiting from mitosis, cytokinesis, and the formation of prereplicative complexes in G1. Acm1's central inhibitory region (CIR) plays a crucial role in inhibiting Cdh1, and it interacts with the WD40 domain of Cdh1."
definition: >-
  CIR (central inhibitory region) domain of Saccharomyces cerevisiae APC/C-CDH1 modulator 1 (Acm1) and similar proteins. Acm1 functions as a negative regulator of Cdh1, which is an activator protein responsible for regulating the ubiquitin ligase activity and substrate specificity of the anaphase promoting complex/cyclosome (APC/C). Cdh1 is necessary for various cellular processes, such as exiting from mitosis, cytokinesis, and the formation of prereplicative complexes in G1. Acm1's central inhibitory region (CIR) plays a crucial role in inhibiting Cdh1, and it interacts with the WD40 domain of Cdh1. — an NCBI CDD conserved domain (cd22876); members share this curated model.
