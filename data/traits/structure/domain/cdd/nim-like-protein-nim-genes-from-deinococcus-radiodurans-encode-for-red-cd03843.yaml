identifier: CDD:cd03843
label: "Nim-like protein. Nim genes from Deinococcus radiodurans encode for reductases which are responsible for the 5-Nitroimidazole-based antibiotics resistance in bacteria. These antibiotics are prodrugs which are activated by an anaerobic one electron reduction of the nitro group by a reductase in the cells into toxic radical anion. In the resistant bacteria, Nim transforms 5-Ni-based drug into its non-toxic amine derivative by transferring two electrons and one H+ from pyruvate to the nitro group of the 5-Ni-based drug. This two electrons reduction avoids formation of the toxic nitro radical anion and leads to resistance against the antibiotic. Nim requires FAD or ferredoxin and pyrurate as co-factors. The active site is on the dimer interface."
definition: >-
  Nim-like protein. Nim genes from Deinococcus radiodurans encode for reductases which are responsible for the 5-Nitroimidazole-based antibiotics resistance in bacteria. These antibiotics are prodrugs which are activated by an anaerobic one electron reduction of the nitro group by a reductase in the cells into toxic radical anion. In the resistant bacteria, Nim transforms 5-Ni-based drug into its non-toxic amine derivative by transferring two electrons and one H+ from pyruvate to the nitro group of the 5-Ni-based drug. This two electrons reduction avoids formation of the toxic nitro radical anion and leads to resistance against the antibiotic. Nim requires FAD or ferredoxin and pyrurate as co-factors. The active site is on the dimer interface. — an NCBI CDD conserved domain (cd03843); members share this curated model.
