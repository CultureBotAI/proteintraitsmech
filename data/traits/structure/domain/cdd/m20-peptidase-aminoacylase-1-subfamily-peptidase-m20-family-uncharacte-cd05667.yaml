identifier: CDD:cd05667
label: "M20 Peptidase aminoacylase 1 subfamily. Peptidase M20 family, uncharacterized subfamily of bacterial proteins that have been predicted as N-acyl-L-amino acid amidohydrolase (amaA), thermostable carboxypeptidase (cpsA-1, cpsA-2 in Sulfolobus solfataricus) and abgB (aminobenzoyl-glutamate utilization protein B), and generally are involved in the urea cycle and metabolism of amino groups. Aminoacylases 1 (ACY1s) comprise a class of zinc binding homodimeric enzymes involved in the hydrolysis of N-acetylated proteins. N-terminal acetylation of proteins is a widespread and is a highly conserved process that is involved in the protection and stability of proteins. Several types of aminoacylases can be distinguished on the basis of substrate specificity. ACY1 breaks down cytosolic aliphatic N-acyl-alpha-amino acids (except L-aspartate), especially N-acetyl-methionine and acetyl-glutamate into L-amino acids and an acyl group. However, ACY1 can also catalyze the reverse reaction, the synthesis of acetylated amino acids. ACY1 may also play a role in xenobiotic bioactivation as well as the inter-organ processing of amino acid-conjugated xenobiotic derivatives (S-substituted-N-acetyl-L-cysteine)."
