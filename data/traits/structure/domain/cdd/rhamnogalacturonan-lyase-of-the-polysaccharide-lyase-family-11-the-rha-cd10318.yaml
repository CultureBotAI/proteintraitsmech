identifier: CDD:cd10318
label: "Rhamnogalacturonan lyase of the polysaccharide lyase family 11. The rhamnogalacturonan lyase of the polysaccharide lyase family 11 (RGL11) cleaves glycoside bonds in polygalacturonan as well as RG (rhamnogalacturonan) type-I through a beta-elimination reaction. Functionally characterized members of this family, YesW and YesX from Bacillus subtilis, cleave glycoside bonds between rhamnose and galacturonic acid residues in the RG-I region of plant cell wall pectin. YesW and YesX work synergistically, with YesW cleaving the glycoside bond of the RG chain endolytically, and YesX converting the resultant oligosaccharides through an exotype reaction. This domain is sometimes found in architectures with non-catalytic carbohydrate-binding modules (CBMs). There are two types of RG lyases, which both cleave the alpha-1,4 bonds of the RG-I main chain through a beta-elimination reaction, but belong to two structurally unrelated polysaccharide lyase (PL) families, 4 and 11."
definition: >-
  Rhamnogalacturonan lyase of the polysaccharide lyase family 11. The rhamnogalacturonan lyase of the polysaccharide lyase family 11 (RGL11) cleaves glycoside bonds in polygalacturonan as well as RG (rhamnogalacturonan) type-I through a beta-elimination reaction. Functionally characterized members of this family, YesW and YesX from Bacillus subtilis, cleave glycoside bonds between rhamnose and galacturonic acid residues in the RG-I region of plant cell wall pectin. YesW and YesX work synergistically, with YesW cleaving the glycoside bond of the RG chain endolytically, and YesX converting the resultant oligosaccharides through an exotype reaction. This domain is sometimes found in architectures with non-catalytic carbohydrate-binding modules (CBMs). There are two types of RG lyases, which both cleave the alpha-1,4 bonds of the RG-I main chain through a beta-elimination reaction, but belong to two structurally unrelated polysaccharide lyase (PL) families, 4 and 11. — an NCBI CDD conserved domain (cd10318); members share this curated model.
