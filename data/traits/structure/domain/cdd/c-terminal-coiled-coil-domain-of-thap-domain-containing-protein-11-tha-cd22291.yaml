identifier: CDD:cd22291
label: "C-terminal coiled-coil domain of THAP domain-containing protein 11. THAP domain-containing protein 11 (THAP11) is a cell cycle and cell growth regulator differentially expressed in cancer cells. It acts as a transcriptional repressor that plays a central role for embryogenesis and the pluripotency of embryonic stem (ES) cells. This model corresponds to the C-terminal coiled-coil domain of THAP11, which is involved in protein dimerization."
definition: >-
  C-terminal coiled-coil domain of THAP domain-containing protein 11. THAP domain-containing protein 11 (THAP11) is a cell cycle and cell growth regulator differentially expressed in cancer cells. It acts as a transcriptional repressor that plays a central role for embryogenesis and the pluripotency of embryonic stem (ES) cells. This model corresponds to the C-terminal coiled-coil domain of THAP11, which is involved in protein dimerization. — an NCBI CDD conserved domain (cd22291); members share this curated model.
