identifier: CDD:cd20249
label: "Hemotin. Hemotin is a transmembrane alpha-helical microprotein localized to early endosomes in hemocytes (Drosophila macrophages), where it regulates endosomal maturation during phagocytosis by repressing the cooperation of 14-3-3zeta with specific phosphatidylinositol enzymes. Hemocytes are professional phagocytes tasked with removing dying cells and microorganisms invading the body. Drosophila hemotin mutants accumulate undigested phagocytic material inside enlarged endolysosomes, resulting in reduced ability to fight bacteria and severely reduced life span."
definition: >-
  Hemotin. Hemotin is a transmembrane alpha-helical microprotein localized to early endosomes in hemocytes (Drosophila macrophages), where it regulates endosomal maturation during phagocytosis by repressing the cooperation of 14-3-3zeta with specific phosphatidylinositol enzymes. Hemocytes are professional phagocytes tasked with removing dying cells and microorganisms invading the body. Drosophila hemotin mutants accumulate undigested phagocytic material inside enlarged endolysosomes, resulting in reduced ability to fight bacteria and severely reduced life span. — an NCBI CDD conserved domain (cd20249); members share this curated model.
