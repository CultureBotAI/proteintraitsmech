identifier: CDD:cd03793
label: "glycogen synthase GSY2 and similar proteins. Glycogen synthase, which is most closely related to the GT3 family of glycosyltransferases, catalyzes the transfer of a glucose molecule from UDP-glucose to a terminal branch of a glycogen molecule, a rate-limit step of glycogen biosynthesis. GSY2, the member of this family in S. cerevisiae, has been shown to possess glycogen synthase activity."
definition: >-
