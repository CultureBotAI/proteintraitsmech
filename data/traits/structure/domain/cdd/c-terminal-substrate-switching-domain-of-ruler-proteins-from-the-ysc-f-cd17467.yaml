identifier: CDD:cd17467
label: "C-terminal substrate-switching domain of ruler proteins from the Ysc family, such as YscP and PscP. This subfamily includes needle-length sensing proteins, also called ruler proteins, in type 3 secretion systems (T3SS), such as Yersinia pestis Yop proteins translocation protein P (YscP) and Pseudomonas aeruginosa PscP. T3SS ruler proteins contain an N-terminal helical region that dictates needle length and is referred to as the length-sensing (LS) domain, and a C-terminal globular domain that is necessary for the hierarchical switching of substrates during T3SS assembly and subsequent virulence effector secretion and is also referred to as the substrate-switching (SS) domain or the type III secretion substrate specificity switch (T3S4) domain. The C-terminal SS domain is highly stable and sits on the extracellular side prior to needle assembly."
definition: >-
  C-terminal substrate-switching domain of ruler proteins from the Ysc family, such as YscP and PscP. This subfamily includes needle-length sensing proteins, also called ruler proteins, in type 3 secretion systems (T3SS), such as Yersinia pestis Yop proteins translocation protein P (YscP) and Pseudomonas aeruginosa PscP. T3SS ruler proteins contain an N-terminal helical region that dictates needle length and is referred to as the length-sensing (LS) domain, and a C-terminal globular domain that is necessary for the hierarchical switching of substrates during T3SS assembly and subsequent virulence effector secretion and is also referred to as the substrate-switching (SS) domain or the type III secretion substrate specificity switch (T3S4) domain. The C-terminal SS domain is highly stable and sits on the extracellular side prior to needle assembly. — an NCBI CDD conserved domain (cd17467); members share this curated model.
