identifier: CDD:cd17423
label: "Monocarboxylate transporters 11 and 13 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporters 11 (MCT11) and 13 (MCT13) are also called Solute carrier family 16 members 11 (SLC16A11) and 13 (SLC16A13), respectively. They are orphan transporters whose substrates are yet to be determined. MCT11 is expressed in skin, lung, ovary, breast, lung, pancreas, retinal pigment epithelium, and choroid plexus. Genetic variants in SLC16A11, the gene encoding MCT11, are associated with type 2 diabetes in Mexican and other Latin American populations. MCT13 is expressed in breast and bone marrow stem cells. MCT11/13 belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Monocarboxylate transporters 11 and 13 of the Major Facilitator Superfamily of transporters. Monocarboxylate transporters 11 (MCT11) and 13 (MCT13) are also called Solute carrier family 16 members 11 (SLC16A11) and 13 (SLC16A13), respectively. They are orphan transporters whose substrates are yet to be determined. MCT11 is expressed in skin, lung, ovary, breast, lung, pancreas, retinal pigment epithelium, and choroid plexus. Genetic variants in SLC16A11, the gene encoding MCT11, are associated with type 2 diabetes in Mexican and other Latin American populations. MCT13 is expressed in breast and bone marrow stem cells. MCT11/13 belongs to the Monocarboxylate transporter (MCT) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17423); members share this curated model.
