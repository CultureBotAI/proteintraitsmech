identifier: CDD:cd22015
label: "high mobility group (HMG)-box found in Saccharomyces cerevisiae high mobility group protein 1 (HMO1) and similar proteins. HMO1, also called high spontaneous mutagenesis protein 2 (HSM2), is a DNA-binding protein that is probably part of the rDNA transcription apparatus. It acts synergetically with the RPA49 subunit of RNA polymerase I during rDNA transcription. It may participate in mutagenesis control."
definition: >-
  high mobility group (HMG)-box found in Saccharomyces cerevisiae high mobility group protein 1 (HMO1) and similar proteins. HMO1, also called high spontaneous mutagenesis protein 2 (HSM2), is a DNA-binding protein that is probably part of the rDNA transcription apparatus. It acts synergetically with the RPA49 subunit of RNA polymerase I during rDNA transcription. It may participate in mutagenesis control. — an NCBI CDD conserved domain (cd22015); members share this curated model.
