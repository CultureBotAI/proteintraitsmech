label: "RING finger, HC subclass, found in Saccharomyces cerevisiae increased recombination centers protein 20 (IRC20) and similar proteins. IRC20 is an uncharacterized ATP-dependent helicase that is probably involved in a pathway contributing to genomic integrity. IRC20 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Saccharomyces cerevisiae increased recombination centers protein 20 (IRC20) and similar proteins. IRC20 is an uncharacterized ATP-dependent helicase that is probably involved in a pathway contributing to genomic integrity. IRC20 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23135); members share this curated model.
