identifier: CDD:cd15368
label: "purinergic receptor P2Y8, member of the class A family of seven-transmembrane G protein-coupled receptors. P2Y8 (or P2RY8) expression is often increased in leukemia patients, and it plays a role in the pathogenesis of acute leukemia. P2Y8 is phylogenetically closely related to the protease-activated receptors (PARs), which are activated by serine proteases such as thrombin, trypsin, and tryptase. These proteases cleave the extracellular domain of the receptor to form a new N-terminus, which in turn functions as a tethered ligand. The newly-formed tethered ligand binds intramolecularly to activate the receptor and triggers G-protein binding and intracellular signaling. Four different types of the protease-activated receptors have been identified (PAR1-4) and are predominantly expressed in platelets. PAR1, PA3, and PAR4 are activated by thrombin, whereas PAR2 is activated by trypsin.  The PARs are known to couple with several G-proteins including Gi (cAMP inhibitory), G12/13 (Rho and Ras activation), and Gq (calcium signaling) to activate downstream signaling messengers which induces numerous cellular and physiological effects."
definition: >-
