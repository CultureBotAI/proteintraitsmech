identifier: CDD:cd09823
label: "peroxinectin_like animal heme peroxidases. Peroxinectin is an arthropod protein that plays a role in invertebrate immunity mechanisms. Specifically, peroxinectins are secreted as cell-adhesive and opsonic peroxidases. The immunity mechanism appears to involve an interaction between peroxinectin and a transmembrane receptor of the integrin family. Human myeloperoxidase, which is included in this wider family, has also been reported to interact with integrins."
definition: >-
  peroxinectin_like animal heme peroxidases. Peroxinectin is an arthropod protein that plays a role in invertebrate immunity mechanisms. Specifically, peroxinectins are secreted as cell-adhesive and opsonic peroxidases. The immunity mechanism appears to involve an interaction between peroxinectin and a transmembrane receptor of the integrin family. Human myeloperoxidase, which is included in this wider family, has also been reported to interact with integrins. — an NCBI CDD conserved domain (cd09823); members share this curated model.
