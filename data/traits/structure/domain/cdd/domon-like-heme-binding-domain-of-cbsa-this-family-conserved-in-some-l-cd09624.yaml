identifier: CDD:cd09624
label: "DOMON-like heme-binding domain of CbsA. This family, conserved in some lineages of the Crenarchaeota, represents a mono-heme cytochrome b558/566. CbsA is reported to be a subunit in a heterodimeric complex (CbsA-CbsB in Sulfolobus species), and appears to be glycosylated."
definition: >-
  DOMON-like heme-binding domain of CbsA. This family, conserved in some lineages of the Crenarchaeota, represents a mono-heme cytochrome b558/566. CbsA is reported to be a subunit in a heterodimeric complex (CbsA-CbsB in Sulfolobus species), and appears to be glycosylated. — an NCBI CDD conserved domain (cd09624); members share this curated model.
