identifier: CDD:cd07002
label: "Streptomyces achromogenes SznF and related proteins, C-terminal cupin domain. This family includes bacterial proteins similar to Streptomyces achromogenes SznF, containing an N-terminal helical region that mediates dimerization, a central heme oxygenase domain, and a C-terminal cupin domain. SznF is a metalloenzyme that catalyzes an oxidative rearrangement of the guanidine group of N(omega)-methyl-L-arginine to generate an N-nitrosourea product, during the biosynthesis of streptozotocin, an N-nitrosourea natural product and an approved cancer chemotherapeutic. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold generally capable of homodimerization. However, in SznF, the cupin domain is not involved in dimerization."
definition: >-
  Streptomyces achromogenes SznF and related proteins, C-terminal cupin domain. This family includes bacterial proteins similar to Streptomyces achromogenes SznF, containing an N-terminal helical region that mediates dimerization, a central heme oxygenase domain, and a C-terminal cupin domain. SznF is a metalloenzyme that catalyzes an oxidative rearrangement of the guanidine group of N(omega)-methyl-L-arginine to generate an N-nitrosourea product, during the biosynthesis of streptozotocin, an N-nitrosourea natural product and an approved cancer chemotherapeutic. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold generally capable of homodimerization. However, in SznF, the cupin domain is not involved in dimerization. — an NCBI CDD conserved domain (cd07002); members share this curated model.
