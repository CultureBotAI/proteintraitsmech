identifier: CDD:cd14222
label: "Catalytic domain of the Serine/Threonine Kinase, LIM domain kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LIMK2 activation is induced by transforming growth factor-beta l (TGFb-l) and shares the same subcellular location as the cofilin family member twinfilin, which may be its biological substrate. LIMK2 plays a role in spermatogenesis, and may contribute to tumor progression and metastasis formation in some cancer cells. LIMKs phosphorylate and inactivate cofilin, an actin depolymerizing factor, to induce the reorganization of the actin cytoskeleton. They act downstream of Rho GTPases and are expressed ubiquitously. As regulators of actin dynamics, they contribute to diverse cellular functions such as cell motility, morphogenesis, differentiation, apoptosis, meiosis, mitosis, and neurite extension. LIMKs contain the LIM (two repeats), PDZ, and catalytic kinase domains. The LIMK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, LIM domain kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. LIMK2 activation is induced by transforming growth factor-beta l (TGFb-l) and shares the same subcellular location as the cofilin family member twinfilin, which may be its biological substrate. LIMK2 plays a role in spermatogenesis, and may contribute to tumor progression and metastasis formation in some cancer cells. LIMKs phosphorylate and inactivate cofilin, an actin depolymerizing factor, to induce the reorganization of the actin cytoskeleton. They act downstream of Rho GTPases and are expressed ubiquitously. As regulators of actin dynamics, they contribute to diverse cellular functions such as cell motility, morphogenesis, differentiation, apoptosis, meiosis, mitosis, and neurite extension. LIMKs contain the LIM (two repeats), PDZ, and catalytic kinase domains. The LIMK2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14222); members share this curated model.
