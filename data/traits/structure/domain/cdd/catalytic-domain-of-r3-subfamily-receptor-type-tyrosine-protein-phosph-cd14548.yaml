identifier: CDD:cd14548
label: "catalytic domain of R3 subfamily receptor-type tyrosine-protein phosphatases and similar proteins. R3 subfamily receptor-type phosphotyrosine phosphatases (RPTP) are characterized by a unique modular composition consisting of multiple extracellular fibronectin type III (FN3) repeats and a single (most RPTP subtypes have two) cytoplasmic catalytic PTP domain. Vertebrate members include receptor-type tyrosine-protein phosphatase-like O (PTPRO), J (PTPRJ), Q (PTPRQ), B (PTPRB), V (PTPRV) and H (PTPRH). They belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Most members are PTPs, except for PTPRQ, which dephosphorylates phosphatidylinositide substrates. PTPRV is characterized only in rodents; its function has been lost in humans. Both vertebrate and invertebrate R3 subfamily RPTPs are involved in the control of a variety of cellular processes, including cell growth, differentiation, mitotic cycle and oncogenic transformation."
definition: >-
  catalytic domain of R3 subfamily receptor-type tyrosine-protein phosphatases and similar proteins. R3 subfamily receptor-type phosphotyrosine phosphatases (RPTP) are characterized by a unique modular composition consisting of multiple extracellular fibronectin type III (FN3) repeats and a single (most RPTP subtypes have two) cytoplasmic catalytic PTP domain. Vertebrate members include receptor-type tyrosine-protein phosphatase-like O (PTPRO), J (PTPRJ), Q (PTPRQ), B (PTPRB), V (PTPRV) and H (PTPRH). They belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Most members are PTPs, except for PTPRQ, which dephosphorylates phosphatidylinositide substrates. PTPRV is characterized only in rodents; its function has been lost in humans. Both vertebrate and invertebrate R3 subfamily RPTPs are involved in the control of a variety of cellular processes, including cell growth, differentiation, mitotic cycle and oncogenic transformation. — an NCBI CDD conserved domain (cd14548); members share this curated model.
