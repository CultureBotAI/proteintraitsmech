label: "Fructose-1,6-bisphosphatase, an enzyme that catalyzes the hydrolysis of fructose-1,6-biphosphate  into fructose-6-phosphate and is critical in gluconeogenesis pathway. The alignment model also includes chloroplastic FBPases and sedoheptulose-1,7-biphosphatases that play a role in pentose phosphate pathway (Calvin cycle)."
definition: >-
