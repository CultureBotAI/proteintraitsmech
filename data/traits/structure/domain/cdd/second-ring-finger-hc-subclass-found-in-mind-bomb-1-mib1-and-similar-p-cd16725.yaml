identifier: CDD:cd16725
label: "second RING finger, HC subclass, found in mind bomb 1 (MIB1) and similar proteins. MIB1, also known as DAPK-interacting protein 1 (DIP-1) or zinc finger ZZ type with ankyrin repeat domain protein 2, is a large, multi-domain E3 ubiquitin-protein ligase that promotes ubiquitination of the cytoplasmic tails of Notch ligands, and thus plays an essential role in controlling metazoan development by Notch signaling. It is also involved in Wnt/beta-catenin signaling and nuclear factor (NF)-kappaB signaling, and has been implicated in innate immunity, neuronal function, genomic stability, and cell death. MIB1 contains an MZM region with two Mib-Herc2 domains flanking a ZZ zinc finger, a REP region including two tandem Mib repeats, an ANK region that spans ankyrin repeats, and a RNG region consisting of three C3HC4-type RING-HC fingers. This model corresponds to the second RING-HC finger."
definition: >-
  second RING finger, HC subclass, found in mind bomb 1 (MIB1) and similar proteins. MIB1, also known as DAPK-interacting protein 1 (DIP-1) or zinc finger ZZ type with ankyrin repeat domain protein 2, is a large, multi-domain E3 ubiquitin-protein ligase that promotes ubiquitination of the cytoplasmic tails of Notch ligands, and thus plays an essential role in controlling metazoan development by Notch signaling. It is also involved in Wnt/beta-catenin signaling and nuclear factor (NF)-kappaB signaling, and has been implicated in innate immunity, neuronal function, genomic stability, and cell death. MIB1 contains an MZM region with two Mib-Herc2 domains flanking a ZZ zinc finger, a REP region including two tandem Mib repeats, an ANK region that spans ankyrin repeats, and a RNG region consisting of three C3HC4-type RING-HC fingers. This model corresponds to the second RING-HC finger. — an NCBI CDD conserved domain (cd16725); members share this curated model.
