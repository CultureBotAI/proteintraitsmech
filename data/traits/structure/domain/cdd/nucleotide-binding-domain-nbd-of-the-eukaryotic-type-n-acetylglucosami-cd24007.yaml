identifier: CDD:cd24007
label: "nucleotide-binding domain (NBD) of the eukaryotic-type N-acetylglucosamine kinase (NAGK) family. The eukaryotic-type NAGK-like family includes a group of proteins similar to eukaryotic N-acetyl-D-glucosamine kinases, such as Vibrio cholerae glucosamine kinase GspK, Sulfurisphaera tokodaii ATP-dependent hexokinase (StHK), Thermoplasma acidophilum 2-dehydro-3-deoxygluconokinase (KdgK) and Clostridium acetobutylicum N-acetylmuramic acid/N-acetylglucosamine kinase (MurK). NAGK (EC 2.7.1.59), also called GlcNAc kinase, converts endogenous N-acetylglucosamine (GlcNAc), a major component of complex carbohydrates, from lysosomal degradation or nutritional sources into GlcNAc 6-phosphate. It is involved in the N-glycolylneuraminic acid (Neu5Gc) degradation pathway. NAGK also has ManNAc kinase activity. GspK (EC 2.7.1.8), also called GlcN kinase, acts as ATP-dependent kinase, which is specific for glucosamine. StHK is a novel hexokinase that can phosphorylate not only glucose but also GlcNAc, glucosamine, and mannose. KdgK (EC 2.7.1.45), also called 2-keto-3-deoxy-D-gluconate kinase, or KDG kinase, catalyzes the phosphorylation of 2-keto-3-deoxygluconate (KDG) to produce 2-keto-3-deoxy-6-phosphogluconate (KDPG). It is specific for KDG. MurK (EC 2.7.1.-/EC 2.7.1.59), also known MurNAc/GlcNAc kinase, or murein sugar kinase, catalyzes the ATP-dependent phosphorylation of both cell wall (peptidoglycan) amino sugars, N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc), at the 6-hydroxyl group. The eukaryotic-type N-acetylglucosamine kinase (NAGK) family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the eukaryotic-type N-acetylglucosamine kinase (NAGK) family. The eukaryotic-type NAGK-like family includes a group of proteins similar to eukaryotic N-acetyl-D-glucosamine kinases, such as Vibrio cholerae glucosamine kinase GspK, Sulfurisphaera tokodaii ATP-dependent hexokinase (StHK), Thermoplasma acidophilum 2-dehydro-3-deoxygluconokinase (KdgK) and Clostridium acetobutylicum N-acetylmuramic acid/N-acetylglucosamine kinase (MurK). NAGK (EC 2.7.1.59), also called GlcNAc kinase, converts endogenous N-acetylglucosamine (GlcNAc), a major component of complex carbohydrates, from lysosomal degradation or nutritional sources into GlcNAc 6-phosphate. It is involved in the N-glycolylneuraminic acid (Neu5Gc) degradation pathway. NAGK also has ManNAc kinase activity. GspK (EC 2.7.1.8), also called GlcN kinase, acts as ATP-dependent kinase, which is specific for glucosamine. StHK is a novel hexokinase that can phosphorylate not only glucose but also GlcNAc, glucosamine, and mannose. KdgK (EC 2.7.1.45), also called 2-keto-3-deoxy-D-gluconate kinase, or KDG kinase, catalyzes the phosphorylation of 2-keto-3-deoxygluconate (KDG) to produce 2-keto-3-deoxy-6-phosphogluconate (KDPG). It is specific for KDG. MurK (EC 2.7.1.-/EC 2.7.1.59), also known MurNAc/GlcNAc kinase, or murein sugar kinase, catalyzes the ATP-dependent phosphorylation of both cell wall (peptidoglycan) amino sugars, N-acetylmuramic acid (MurNAc) and N-acetylglucosamine (GlcNAc), at the 6-hydroxyl group. The eukaryotic-type N-acetylglucosamine kinase (NAGK) family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24007); members share this curated model.
