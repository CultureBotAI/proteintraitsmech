identifier: CDD:cd07713
label: "Methanocaldococcus jannaschii dihydropteroate synthase, Thermoanaerobacter tengcongensis Tflp, and related proteins; MBL-fold metallo hydrolase domain. This subgroup includes Methanocaldococcus jannaschii 7,8-dihydropterin-6-methyl-4-(beta-D-ribofuranosyl)-aminobenzene-5'-phosphate synthase (EC 2.5.1.15), a folate biosynthetic enzyme also known as dihydropteroate synthase and 7,8 dihydropteroate synthase. Thermoanaerobacter tengcongensis Tflp is a ferredoxin-like member. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  Methanocaldococcus jannaschii dihydropteroate synthase, Thermoanaerobacter tengcongensis Tflp, and related proteins; MBL-fold metallo hydrolase domain. This subgroup includes Methanocaldococcus jannaschii 7,8-dihydropterin-6-methyl-4-(beta-D-ribofuranosyl)-aminobenzene-5'-phosphate synthase (EC 2.5.1.15), a folate biosynthetic enzyme also known as dihydropteroate synthase and 7,8 dihydropteroate synthase. Thermoanaerobacter tengcongensis Tflp is a ferredoxin-like member. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd07713); members share this curated model.
