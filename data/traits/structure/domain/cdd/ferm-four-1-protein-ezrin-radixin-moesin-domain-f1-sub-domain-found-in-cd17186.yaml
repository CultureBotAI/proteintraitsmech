identifier: CDD:cd17186
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in merlin and similar proteins. Merlin, also termed moesin-ezrin-radixin-like protein, or neurofibromin-2 (NF2), or Schwannomerlin, or Schwannomin, is a member of the ezrin/radixin/moesin (ERM) family of cytoskeletal proteins that plays an essential role in microvilli formation, T-cell activation, and tumor metastasis through providing a regulated linkage between F-actin and membrane-associated proteins. These proteins may also function in signaling cascades that regulate the assembly of actin stress fibers. The ERM proteins consist of an N-terminal FERM domain, a coiled-coil (CC) domain and a C-terminal tail segment (C-tail) containing a well-defined actin-binding motif, merlin however lacks the typical actin-binding motif in the C-tail. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). Merlin plays vital roles in controlling proper development of organ sizes by specifically binding to a large number of target proteins localized both in cytoplasm and nuclei. Merlin may function as a tumor suppressor that functions upstream of the core Hippo pathway kinases Lats1/2 (Wts in Drosophila) and Mst1/2 (Hpo in Drosophila), as well as the nuclear E3 ubiquitin ligase DDB1-and-Cullin 4-associated Factor 1 (DCAF1)-associated cullin 4-Roc1 ligase, CRL4(DCAF1). Merlin may also has a tumor suppressor function in melanoma cells, the inhibition of the proto-oncogenic Na(+)/H(+) exchanger isoform 1 (NHE1) activity."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in merlin and similar proteins. Merlin, also termed moesin-ezrin-radixin-like protein, or neurofibromin-2 (NF2), or Schwannomerlin, or Schwannomin, is a member of the ezrin/radixin/moesin (ERM) family of cytoskeletal proteins that plays an essential role in microvilli formation, T-cell activation, and tumor metastasis through providing a regulated linkage between F-actin and membrane-associated proteins. These proteins may also function in signaling cascades that regulate the assembly of actin stress fibers. The ERM proteins consist of an N-terminal FERM domain, a coiled-coil (CC) domain and a C-terminal tail segment (C-tail) containing a well-defined actin-binding motif, merlin however lacks the typical actin-binding motif in the C-tail. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). Merlin plays vital roles in controlling proper development of organ sizes by specifically binding to a large number of target proteins localized both in cytoplasm and nuclei. Merlin may function as a tumor suppressor that functions upstream of the core Hippo pathway kinases Lats1/2 (Wts in Drosophila) and Mst1/2 (Hpo in Drosophila), as well as the nuclear E3 ubiquitin ligase DDB1-and-Cullin 4-associated Factor 1 (DCAF1)-associated cullin 4-Roc1 ligase, CRL4(DCAF1). Merlin may also has a tumor suppressor function in melanoma cells, the inhibition of the proto-oncogenic Na(+)/H(+) exchanger isoform 1 (NHE1) activity. — an NCBI CDD conserved domain (cd17186); members share this curated model.
