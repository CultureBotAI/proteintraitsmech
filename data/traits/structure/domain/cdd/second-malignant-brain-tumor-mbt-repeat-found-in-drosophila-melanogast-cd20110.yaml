identifier: CDD:cd20110
label: "second malignant brain tumor (MBT) repeat found in Drosophila melanogaster Polycomb protein sex comb on midleg (Scm) and similar proteins. Scm is a putative zinc finger protein that functions as a transcriptional regulator which represses multiple homeotic genes during embryonic stages. It coordinates Polycomb group (PcG) complexes, PRC1 (PcG-repressive complex 1) or PRC2 (PcG-repressive complex 2), and polymerizes to produce broad domains of PcG silencing. Scm contains two MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the second MBT repeat that contains the semi-aromatic cage that binds methylated lysine residues."
definition: >-
  second malignant brain tumor (MBT) repeat found in Drosophila melanogaster Polycomb protein sex comb on midleg (Scm) and similar proteins. Scm is a putative zinc finger protein that functions as a transcriptional regulator which represses multiple homeotic genes during embryonic stages. It coordinates Polycomb group (PcG) complexes, PRC1 (PcG-repressive complex 1) or PRC2 (PcG-repressive complex 2), and polymerizes to produce broad domains of PcG silencing. Scm contains two MBT (malignant brain tumor) repeats. The MBT repeat is a protein module that recognizes methylated lysine residues on histones. MBT repeats contain a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine. This model corresponds to the second MBT repeat that contains the semi-aromatic cage that binds methylated lysine residues. — an NCBI CDD conserved domain (cd20110); members share this curated model.
