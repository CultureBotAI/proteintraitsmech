label: "calponin homology (CH) domain found in growth arrest-specific protein 2. Growth arrest-specific protein 2 (GAS-2) may play a role in apoptosis by acting as a cell death substrate for caspases. It contains a single copy of the CH domain at the N-terminal region. CH domains are actin filament (F-actin) binding motifs."
