identifier: CDD:cd17318
label: "Solute carrier 17 (SLC17) family of the Major Facilitator Superfamily of transporters. The Solute carrier 17 (SLC17) family is primarily involved in the transport of organic anions. There are nime human proteins belonging to this family including: the type I phosphate transporters (SLC17A1-4) that were initially identified as sodium-dependent inorganic phosphate (Pi) transporters but are now known to be involved in tha transport of organic anions; lysosomal acidic sugar transporter (SLC17A5 or sialin), vesicular glutamate transporters (VGluT1#3 or SLC17A7, SLC17A6, and SLC17A8, respectively), and a vesicular nucleotide transporter (VNUT or SLC17A9). SLC17A1 and SLC17A3 have roles in the transport of urate and para-aminohippurate, respectively. The SLC17 family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier 17 (SLC17) family of the Major Facilitator Superfamily of transporters. The Solute carrier 17 (SLC17) family is primarily involved in the transport of organic anions. There are nime human proteins belonging to this family including: the type I phosphate transporters (SLC17A1-4) that were initially identified as sodium-dependent inorganic phosphate (Pi) transporters but are now known to be involved in tha transport of organic anions; lysosomal acidic sugar transporter (SLC17A5 or sialin), vesicular glutamate transporters (VGluT1#3 or SLC17A7, SLC17A6, and SLC17A8, respectively), and a vesicular nucleotide transporter (VNUT or SLC17A9). SLC17A1 and SLC17A3 have roles in the transport of urate and para-aminohippurate, respectively. The SLC17 family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17318); members share this curated model.
