identifier: CDD:cd06060
label: "Misato segment II tubulin-like domain. Human Misato shows similarity with Tubulin/FtsZ family of GTPases and is localized to the the outer membrane of mitochondria. It has a role in mitochondrial fusion and in mitochondrial distribution and morphology. Mutations in its Drosophila homolog (misato) lead to irregular chromosome segregation during mitosis. Deletion of the budding yeast homolog DML1 is lethal and unregulate expression of DML1 leads to mitochondrial dispersion and abnormalities in cell morphology. The Misato/DML1 protein family is conserved from yeast to human, but its exact function is still unknown."
definition: >-
  Misato segment II tubulin-like domain. Human Misato shows similarity with Tubulin/FtsZ family of GTPases and is localized to the the outer membrane of mitochondria. It has a role in mitochondrial fusion and in mitochondrial distribution and morphology. Mutations in its Drosophila homolog (misato) lead to irregular chromosome segregation during mitosis. Deletion of the budding yeast homolog DML1 is lethal and unregulate expression of DML1 leads to mitochondrial dispersion and abnormalities in cell morphology. The Misato/DML1 protein family is conserved from yeast to human, but its exact function is still unknown. — an NCBI CDD conserved domain (cd06060); members share this curated model.
