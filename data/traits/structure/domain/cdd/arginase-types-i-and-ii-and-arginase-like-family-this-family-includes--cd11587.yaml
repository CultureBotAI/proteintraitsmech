identifier: CDD:cd11587
label: "Arginase types I and II and arginase-like family. This family includes arginase, also known as arginase-like amidino hydrolase family, and related proteins, found in bacteria, archaea and eykaryotes. Arginase is a binuclear Mn-dependent metalloenzyme and catalyzes hydrolysis of L-arginine to L-ornithine and urea (Arg, EC 3.5.3.1), the reaction being the fifth and final step in the urea cycle, providing the path for the disposal of nitrogenous compounds. Arginase controls cellular levels of arginine and ornithine which are involved in protein biosynthesis, and in production of creatine, polyamines, proline and nitric acid. In vertebrates, at least two isozymes have been identified: type I cytoplasmic or hepatic liver-type arginase and type II mitochondrial or non-hepatic arginase. Point mutations in human arginase gene lead to hyperargininemia with consequent mental disorders, retarded development and early death. Arginase is a therapeutic target to treat asthma, erectile dysfunction, atherosclerosis and cancer."
definition: >-
  Arginase types I and II and arginase-like family. This family includes arginase, also known as arginase-like amidino hydrolase family, and related proteins, found in bacteria, archaea and eykaryotes. Arginase is a binuclear Mn-dependent metalloenzyme and catalyzes hydrolysis of L-arginine to L-ornithine and urea (Arg, EC 3.5.3.1), the reaction being the fifth and final step in the urea cycle, providing the path for the disposal of nitrogenous compounds. Arginase controls cellular levels of arginine and ornithine which are involved in protein biosynthesis, and in production of creatine, polyamines, proline and nitric acid. In vertebrates, at least two isozymes have been identified: type I cytoplasmic or hepatic liver-type arginase and type II mitochondrial or non-hepatic arginase. Point mutations in human arginase gene lead to hyperargininemia with consequent mental disorders, retarded development and early death. Arginase is a therapeutic target to treat asthma, erectile dysfunction, atherosclerosis and cancer. — an NCBI CDD conserved domain (cd11587); members share this curated model.
