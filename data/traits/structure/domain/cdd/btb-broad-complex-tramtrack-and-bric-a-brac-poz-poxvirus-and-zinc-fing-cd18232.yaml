identifier: CDD:cd18232
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in telomere zinc finger-associated protein (TZAP). TZAP is also called Krueppel-related zinc finger protein 3 (KR3), zinc finger and BTB domain-containing protein 48 (ZBTB48), or zinc finger protein 855 (ZNF855). It is a vertebrate telomere-binding protein involved in telomere length control. It directly binds the telomeric double-stranded 5'-TTAGGG-3' repeat. TZAP also acts as a transcription regulator that binds to promoter regions. It is a transcriptional activator of alternate reading frame (ARF) gene. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in telomere zinc finger-associated protein (TZAP). TZAP is also called Krueppel-related zinc finger protein 3 (KR3), zinc finger and BTB domain-containing protein 48 (ZBTB48), or zinc finger protein 855 (ZNF855). It is a vertebrate telomere-binding protein involved in telomere length control. It directly binds the telomeric double-stranded 5'-TTAGGG-3' repeat. TZAP also acts as a transcription regulator that binds to promoter regions. It is a transcriptional activator of alternate reading frame (ARF) gene. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18232); members share this curated model.
