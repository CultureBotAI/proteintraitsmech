identifier: CDD:cd12206
label: "Ras-GTPase Activating Domain of proteins related to IQGAPs. RasGAP: Ras-GTPase Activating Domain. RasGAP functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Proteins having a RasGAP domain include p120GAP, IQGAP, Rab5-activating protein 6, and Neurofibromin. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a myriad of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGap domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator."
definition: >-
  Ras-GTPase Activating Domain of proteins related to IQGAPs. RasGAP: Ras-GTPase Activating Domain. RasGAP functions as an enhancer of the hydrolysis of GTP that is bound to Ras-GTPases. Proteins having a RasGAP domain include p120GAP, IQGAP, Rab5-activating protein 6, and Neurofibromin. Although the Rho (Ras homolog) GTPases are most closely related to members of the Ras family, RhoGAP and RasGAP show no sequence homology at their amino acid level. RasGTPases function as molecular switches in a myriad of signaling pathways. When bound to GTP they are in the on state and when bound to GDP they are in the off state. The RasGap domain speeds up the hydrolysis of GTP in Ras-like proteins acting as a negative regulator. — an NCBI CDD conserved domain (cd12206); members share this curated model.
