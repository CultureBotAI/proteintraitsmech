identifier: CDD:cd12011
label: "Src homology 3 domain of Src-Like Adaptor Protein 2. SLAP2 plays a role in c-Cbl-dependent regulation of CSF1R, a tyrosine kinase important for myeloid cell growth and differentiation. It has been shown to interact with CSF1R, c-Cbl, LAT, CD247, and Zap70. SLAPs are adaptor proteins with limited similarity to Src family tyrosine kinases. They contain an N-terminal SH3 domain followed by an SH2 domain, and a unique C-terminal sequence. They function in regulating the signaling, ubiquitination, and trafficking of T-cell receptor (TCR) and B-cell receptor (BCR) components. The SH3 domain of SLAP forms a complex with v-Abl. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Src-Like Adaptor Protein 2. SLAP2 plays a role in c-Cbl-dependent regulation of CSF1R, a tyrosine kinase important for myeloid cell growth and differentiation. It has been shown to interact with CSF1R, c-Cbl, LAT, CD247, and Zap70. SLAPs are adaptor proteins with limited similarity to Src family tyrosine kinases. They contain an N-terminal SH3 domain followed by an SH2 domain, and a unique C-terminal sequence. They function in regulating the signaling, ubiquitination, and trafficking of T-cell receptor (TCR) and B-cell receptor (BCR) components. The SH3 domain of SLAP forms a complex with v-Abl. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12011); members share this curated model.
