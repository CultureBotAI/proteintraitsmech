identifier: CDD:cd12150
label: "rod-segment of the talin C-terminal domain. The talin rod-segment characterize by this model interacts with its N-terminal FERM domain to mask its integrin-binding site and interferes with interactions between the FERM domain and the cellular membrane. Talin is a large and ubiquitous cytoskeletal protein concentrated at focal adhesion sites. It is involved in linking integrins to the actin cytoskeleton."
definition: >-
  rod-segment of the talin C-terminal domain. The talin rod-segment characterize by this model interacts with its N-terminal FERM domain to mask its integrin-binding site and interferes with interactions between the FERM domain and the cellular membrane. Talin is a large and ubiquitous cytoskeletal protein concentrated at focal adhesion sites. It is involved in linking integrins to the actin cytoskeleton. — an NCBI CDD conserved domain (cd12150); members share this curated model.
