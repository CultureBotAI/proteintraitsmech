identifier: CDD:cd16189
label: "Penta-EF hand, calcium binding motifs, found in mu-type calpain (CAPN1), m-type calpain (CAPN2), and similar proteins. The family includes mu-type calpain (CAPN1) and m-type calpain (CAPN2), both of which are ubiquitously expressed 80-kDa Ca2+-dependent intracellular cysteine proteases that contain a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. The catalytic subunit CAPN1 or CAPN2 in complex with a regulatory subunit encoded by CAPNS1 forms a mu- or m-calpain heterodimer, respectively."
definition: >-
  Penta-EF hand, calcium binding motifs, found in mu-type calpain (CAPN1), m-type calpain (CAPN2), and similar proteins. The family includes mu-type calpain (CAPN1) and m-type calpain (CAPN2), both of which are ubiquitously expressed 80-kDa Ca2+-dependent intracellular cysteine proteases that contain a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. The catalytic subunit CAPN1 or CAPN2 in complex with a regulatory subunit encoded by CAPNS1 forms a mu- or m-calpain heterodimer, respectively. — an NCBI CDD conserved domain (cd16189); members share this curated model.
