identifier: CDD:cd14053
label: "Catalytic domain of the Serine/Threonine Kinase, Activin Type II Receptor. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. ACVR2 belongs to a group of receptors for the TGFbeta family of secreted signaling molecules that includes TGFbeta, bone morphogenetic proteins (BMPs), activins, growth and differentiation factors (GDFs), and anti-Mullerian hormone, among others. These receptors contain an extracellular domain that binds ligands, a single transmembrane region, and a cytoplasmic catalytic kinase domain. Type II receptors, such as ACVR2, are high-affinity receptors which bind ligands, autophosphorylate, as well as trans-phosphorylate and activate low-affinity type I receptors. ACVR2 acts primarily as the receptors for activins, nodal, myostatin, GDF11, and a subset of BMPs. ACVR2 signaling impacts many cellular and physiological processes including reproductive and gonadal functions, myogenesis, bone remodeling and tooth development, kidney organogenesis, apoptosis, fibrosis, inflammation, and neurogenesis. Vertebrates contain two ACVR2 proteins, ACVR2a (or ActRIIA) and ACVR2b (or ActRIIB). The ACVR2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Activin Type II Receptor. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. ACVR2 belongs to a group of receptors for the TGFbeta family of secreted signaling molecules that includes TGFbeta, bone morphogenetic proteins (BMPs), activins, growth and differentiation factors (GDFs), and anti-Mullerian hormone, among others. These receptors contain an extracellular domain that binds ligands, a single transmembrane region, and a cytoplasmic catalytic kinase domain. Type II receptors, such as ACVR2, are high-affinity receptors which bind ligands, autophosphorylate, as well as trans-phosphorylate and activate low-affinity type I receptors. ACVR2 acts primarily as the receptors for activins, nodal, myostatin, GDF11, and a subset of BMPs. ACVR2 signaling impacts many cellular and physiological processes including reproductive and gonadal functions, myogenesis, bone remodeling and tooth development, kidney organogenesis, apoptosis, fibrosis, inflammation, and neurogenesis. Vertebrates contain two ACVR2 proteins, ACVR2a (or ActRIIA) and ACVR2b (or ActRIIB). The ACVR2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14053); members share this curated model.
