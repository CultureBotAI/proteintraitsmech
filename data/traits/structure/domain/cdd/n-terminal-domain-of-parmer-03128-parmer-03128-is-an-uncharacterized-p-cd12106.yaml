label: "N-terminal domain of PARMER_03128. PARMER_03128 is an uncharacterized protein from Parabacteroides merdae. This model characterizes its N-terminal domain plus that of related proteins from Bacteroidetes. Structurally, they resemble domains found in streptococcal surface proteins such as SpaP."
definition: >-
  N-terminal domain of PARMER_03128. PARMER_03128 is an uncharacterized protein from Parabacteroides merdae. This model characterizes its N-terminal domain plus that of related proteins from Bacteroidetes. Structurally, they resemble domains found in streptococcal surface proteins such as SpaP. — an NCBI CDD conserved domain (cd12106); members share this curated model.
