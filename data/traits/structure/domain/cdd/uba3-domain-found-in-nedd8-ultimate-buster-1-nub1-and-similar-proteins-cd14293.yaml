identifier: CDD:cd14293
label: "UBA3 domain found in NEDD8 ultimate buster 1 (NUB1) and similar proteins. NUB1, also called negative regulator of ubiquitin-like proteins 1, renal carcinoma antigen NY-REN-18, or protein BS4, is a NEDD8-interacting protein that can be induced by interferon. It functions as a strong post-transcriptional down-regulator of the NEDD8 expression and plays critical roles in regulating many biological events, such as cell growth, NF-kappaB signaling, and biological responses to hypoxia. NUB1 can also interact with aryl hydrocarbon receptor-interacting protein-like 1 (AIPL1) which may function in the regulation of cell cycle progression. NUB1 contains three ubiquitin-associated domains (UBA), a bipartite nuclear localization signal (NLS) and a PEST motif. This model corresponds to UBA3 domain."
definition: >-
  UBA3 domain found in NEDD8 ultimate buster 1 (NUB1) and similar proteins. NUB1, also called negative regulator of ubiquitin-like proteins 1, renal carcinoma antigen NY-REN-18, or protein BS4, is a NEDD8-interacting protein that can be induced by interferon. It functions as a strong post-transcriptional down-regulator of the NEDD8 expression and plays critical roles in regulating many biological events, such as cell growth, NF-kappaB signaling, and biological responses to hypoxia. NUB1 can also interact with aryl hydrocarbon receptor-interacting protein-like 1 (AIPL1) which may function in the regulation of cell cycle progression. NUB1 contains three ubiquitin-associated domains (UBA), a bipartite nuclear localization signal (NLS) and a PEST motif. This model corresponds to UBA3 domain. — an NCBI CDD conserved domain (cd14293); members share this curated model.
