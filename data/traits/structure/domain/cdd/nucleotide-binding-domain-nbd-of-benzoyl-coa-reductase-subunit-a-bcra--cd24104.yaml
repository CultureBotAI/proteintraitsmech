identifier: CDD:cd24104
label: "nucleotide-binding domain (NBD) of benzoyl-CoA reductase subunit A (BcrA/BadF) and similar proteins. Benzoyl-CoA reductase (EC 1.3.7.8), also called benzoyl-CoA reductase (dearomatizing), or 3-hydroxybenzoyl-CoA reductase, catalyzes the anaerobic reduction of benzoyl-CoA and 3-hydroxybenzoyl-CoA to form cyclohexa-1,5-diene-1-carbonyl-CoA and 3-hydroxycyclohexa-1,5-diene-1-carbonyl-CoA, respectively. The enzyme also reduces other benzoyl-CoA analogs with small substituents at the aromatic ring. The model corresponds to subunit A of benzoyl-CoA reductase."
definition: >-
  nucleotide-binding domain (NBD) of benzoyl-CoA reductase subunit A (BcrA/BadF) and similar proteins. Benzoyl-CoA reductase (EC 1.3.7.8), also called benzoyl-CoA reductase (dearomatizing), or 3-hydroxybenzoyl-CoA reductase, catalyzes the anaerobic reduction of benzoyl-CoA and 3-hydroxybenzoyl-CoA to form cyclohexa-1,5-diene-1-carbonyl-CoA and 3-hydroxycyclohexa-1,5-diene-1-carbonyl-CoA, respectively. The enzyme also reduces other benzoyl-CoA analogs with small substituents at the aromatic ring. The model corresponds to subunit A of benzoyl-CoA reductase. — an NCBI CDD conserved domain (cd24104); members share this curated model.
