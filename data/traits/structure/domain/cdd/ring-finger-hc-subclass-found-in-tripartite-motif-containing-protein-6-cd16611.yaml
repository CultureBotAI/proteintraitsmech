identifier: CDD:cd16611
label: "RING finger, HC subclass, found in tripartite motif-containing protein 69 (TRIM69) and similar proteins. TRIM69, also known as RFP-like domain-containing protein trimless or RING finger protein 36 (RNF36), is a testis E3 ubiquitin-protein ligase that plays a specific role in apoptosis and may also play an important role in germ cell homeostasis during spermatogenesis. TRIM69 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain."
definition: >-
  RING finger, HC subclass, found in tripartite motif-containing protein 69 (TRIM69) and similar proteins. TRIM69, also known as RFP-like domain-containing protein trimless or RING finger protein 36 (RNF36), is a testis E3 ubiquitin-protein ligase that plays a specific role in apoptosis and may also play an important role in germ cell homeostasis during spermatogenesis. TRIM69 belongs to the C-IV subclass of the TRIM (tripartite motif) family of proteins that are defined by their N-terminal RBCC (RING, Bbox, and coiled coil) domains, including three consecutive zinc-binding domains, a C3HC4-type RING-HC finger, Bbox1 and Bbox2, and a coiled coil region, as well as a B30.2/SPRY (SplA and ryanodine receptor) domain positioned C-terminal to the RBCC domain. — an NCBI CDD conserved domain (cd16611); members share this curated model.
