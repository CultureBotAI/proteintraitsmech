identifier: CDD:cd20905
label: "Zinc-binding domain of euchromatic histone lysine methyltransferases EHMT1 and EHTM2. EHMT1 (also known as GLP) and EHMT2 (also known as NG36 and G9a) are histone methyltransferases that methylate the K9 position of histone H3, marking genomic regions for transcriptional repression. They may play a role in the G0/G1 cell cycle transition and are associated with promoting various types of cancer. Mutations in EHMT1 are associated with the genetic disorder Kleefstra syndrome. A functional role for the zinc-binding domain has not been established."
definition: >-
  Zinc-binding domain of euchromatic histone lysine methyltransferases EHMT1 and EHTM2. EHMT1 (also known as GLP) and EHMT2 (also known as NG36 and G9a) are histone methyltransferases that methylate the K9 position of histone H3, marking genomic regions for transcriptional repression. They may play a role in the G0/G1 cell cycle transition and are associated with promoting various types of cancer. Mutations in EHMT1 are associated with the genetic disorder Kleefstra syndrome. A functional role for the zinc-binding domain has not been established. — an NCBI CDD conserved domain (cd20905); members share this curated model.
