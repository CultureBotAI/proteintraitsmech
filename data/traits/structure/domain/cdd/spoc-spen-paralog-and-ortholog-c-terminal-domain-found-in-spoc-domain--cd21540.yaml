identifier: CDD:cd21540
label: "SPOC (Spen paralog and ortholog C-terminal) domain found in SPOC domain-containing protein 1 (SPOCD1) and similar proteins. SPOCD1 is a protein belonging to the transcription factor S-II (TFIIS) family of transcription factors. It acts as a tumor-related factor that promotes cell proliferation and metastasis. SPOCD1 was initially found to interact with testis protein phosphatase 1, which is a major eukaryotic serine/threonine-specific phosphatase that regulates cellular signaling. The model corresponds to the SPOC domain of SPOCD1; the SPOC domain is involved in developmental signaling and has also been proposed to be a phosphorylation binding module."
definition: >-
  SPOC (Spen paralog and ortholog C-terminal) domain found in SPOC domain-containing protein 1 (SPOCD1) and similar proteins. SPOCD1 is a protein belonging to the transcription factor S-II (TFIIS) family of transcription factors. It acts as a tumor-related factor that promotes cell proliferation and metastasis. SPOCD1 was initially found to interact with testis protein phosphatase 1, which is a major eukaryotic serine/threonine-specific phosphatase that regulates cellular signaling. The model corresponds to the SPOC domain of SPOCD1; the SPOC domain is involved in developmental signaling and has also been proposed to be a phosphorylation binding module. — an NCBI CDD conserved domain (cd21540); members share this curated model.
