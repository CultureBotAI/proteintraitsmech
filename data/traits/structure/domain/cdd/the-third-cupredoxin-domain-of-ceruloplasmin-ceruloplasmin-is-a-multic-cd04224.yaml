identifier: CDD:cd04224
label: "The third cupredoxin domain of Ceruloplasmin. Ceruloplasmin is a multicopper oxidase essential for normal iron homeostasis and copper transport in blood. It also functions in amine oxidation and as an antioxidant preventing free radicals in serum. The protein has 6 cupredoxin domains with six copper centers; three mononuclear sites in domain 2, 4 and 6 and three in the form of trinuclear clusters at the interface of domains 1 and 6. Ceruloplasmin exhibits internal sequence homology that appears to have evolved from the triplication of a sequence unit composed of two tandem cupredoxin domains. This model represents the third cupredoxin domain of ceruloplasmin."
definition: >-
  The third cupredoxin domain of Ceruloplasmin. Ceruloplasmin is a multicopper oxidase essential for normal iron homeostasis and copper transport in blood. It also functions in amine oxidation and as an antioxidant preventing free radicals in serum. The protein has 6 cupredoxin domains with six copper centers; three mononuclear sites in domain 2, 4 and 6 and three in the form of trinuclear clusters at the interface of domains 1 and 6. Ceruloplasmin exhibits internal sequence homology that appears to have evolved from the triplication of a sequence unit composed of two tandem cupredoxin domains. This model represents the third cupredoxin domain of ceruloplasmin. — an NCBI CDD conserved domain (cd04224); members share this curated model.
