identifier: CDD:cd07827
label: "N-terminal sub-domain of the Rel homology domain (RHD). Proteins containing the Rel homology domain (RHD) are metazoan transcription factors. The RHD is composed of two structural sub-domains; this model characterizes the N-terminal sub-domain, which may be distantly related to the DNA-binding domain found in P53. The C-terminal sub-domain has an immunoglobulin-like fold and serves as a dimerization module that also binds DNA (see cd00102). The RHD is found in NF-kappa B, nuclear factor of activated T-cells (NFAT), the tonicity-responsive enhancer binding protein (TonEBP), and the arthropod proteins Dorsal and Relish (Rel)."
definition: >-
  N-terminal sub-domain of the Rel homology domain (RHD). Proteins containing the Rel homology domain (RHD) are metazoan transcription factors. The RHD is composed of two structural sub-domains; this model characterizes the N-terminal sub-domain, which may be distantly related to the DNA-binding domain found in P53. The C-terminal sub-domain has an immunoglobulin-like fold and serves as a dimerization module that also binds DNA (see cd00102). The RHD is found in NF-kappa B, nuclear factor of activated T-cells (NFAT), the tonicity-responsive enhancer binding protein (TonEBP), and the arthropod proteins Dorsal and Relish (Rel). — an NCBI CDD conserved domain (cd07827); members share this curated model.
