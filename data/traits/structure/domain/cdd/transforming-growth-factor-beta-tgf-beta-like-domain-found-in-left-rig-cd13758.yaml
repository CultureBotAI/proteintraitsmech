identifier: CDD:cd13758
label: "transforming growth factor beta (TGF-beta) like domain found in left-right determination factor 1 (lefty-1), factor 2 (lefty-2) and similar proteins. Lefty-1, also termed left-right determination factor B, or protein lefty-B, is required for left-right axis determination as a regulator of Lefty-2 and NODAL. Lefty-2, also termed endometrial bleeding-associated factor, or left-right determination factor A, or protein lefty-A, or transforming growth factor beta-4 (TGF-beta-4), is required for left-right (L-R) asymmetry determination of organ systems in mammals. It may play a role in endometrial bleeding."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in left-right determination factor 1 (lefty-1), factor 2 (lefty-2) and similar proteins. Lefty-1, also termed left-right determination factor B, or protein lefty-B, is required for left-right axis determination as a regulator of Lefty-2 and NODAL. Lefty-2, also termed endometrial bleeding-associated factor, or left-right determination factor A, or protein lefty-A, or transforming growth factor beta-4 (TGF-beta-4), is required for left-right (L-R) asymmetry determination of organ systems in mammals. It may play a role in endometrial bleeding. — an NCBI CDD conserved domain (cd13758); members share this curated model.
