identifier: CDD:cd07048
label: "1,2-propanediol utilization protein B (PduB), Bacterial Micro-Compartment (BMC) domain repeat 2. PduB proteins are homologs of the carboxysome shell protein. They are encoded within the pdu operon and might be required for the formation of the outer shell of the bacterial pdu polyhedral organelles involved in coenzyme B12-dependent degradation of 1,2-propanediol. Although it has been suggested that PduB might form hexamers and further assemble into the flat facets of the polyhedral outer shell of the pdu organelles at present no experimental evidence directly supports this view. PduB proteins contain two tandem BMC domains repeats. This CD contains repeat 2 (the second BMC domain of PduB)."
definition: >-
  1,2-propanediol utilization protein B (PduB), Bacterial Micro-Compartment (BMC) domain repeat 2. PduB proteins are homologs of the carboxysome shell protein. They are encoded within the pdu operon and might be required for the formation of the outer shell of the bacterial pdu polyhedral organelles involved in coenzyme B12-dependent degradation of 1,2-propanediol. Although it has been suggested that PduB might form hexamers and further assemble into the flat facets of the polyhedral outer shell of the pdu organelles at present no experimental evidence directly supports this view. PduB proteins contain two tandem BMC domains repeats. This CD contains repeat 2 (the second BMC domain of PduB). — an NCBI CDD conserved domain (cd07048); members share this curated model.
