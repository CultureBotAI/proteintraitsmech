identifier: CDD:cd21035
label: "basic tilted helix bundle (BTHB) domain. BTHB domain is found in the N-terminal region of FKBPs such as FKBP25 and in the core region of E3 ubiquitin ligase HectD1. It adopts a compact 5-helix bundle, hence termed BTHB (Basic Tilted Helix Bundle) domain. In FKBP25, it may have a role in regulating the association state of nucleosomes by interacting with nucleolin. This basic domain in FKBP25 also forms alternative complexes with other chromatin-related proteins, such as the HDAC1, HDAC2, and the transcriptional regulator YY1, the DNA binding activity of which is enhanced on binding FKBP25. Structural analysis of this fold suggests that the DNA binding properties of FKBP25 and HectD1 are presented by the conserved basic region."
definition: >-
  basic tilted helix bundle (BTHB) domain. BTHB domain is found in the N-terminal region of FKBPs such as FKBP25 and in the core region of E3 ubiquitin ligase HectD1. It adopts a compact 5-helix bundle, hence termed BTHB (Basic Tilted Helix Bundle) domain. In FKBP25, it may have a role in regulating the association state of nucleosomes by interacting with nucleolin. This basic domain in FKBP25 also forms alternative complexes with other chromatin-related proteins, such as the HDAC1, HDAC2, and the transcriptional regulator YY1, the DNA binding activity of which is enhanced on binding FKBP25. Structural analysis of this fold suggests that the DNA binding properties of FKBP25 and HectD1 are presented by the conserved basic region. — an NCBI CDD conserved domain (cd21035); members share this curated model.
