identifier: CDD:cd00875
label: "RNA 3' phosphate cyclase domain (class I) This subfamily of cyclase-like proteins are encoded in eukaryotic genomes. They lack a conserved catalytic histidine residue required for cyclase activity, so probably do not function as cyclases. They are believed to play a role in ribosomal RNA processing and assembly."
definition: >-
  RNA 3' phosphate cyclase domain (class I) This subfamily of cyclase-like proteins are encoded in eukaryotic genomes. They lack a conserved catalytic histidine residue required for cyclase activity, so probably do not function as cyclases. They are believed to play a role in ribosomal RNA processing and assembly. — an NCBI CDD conserved domain (cd00875); members share this curated model.
