identifier: CDD:cd17322
label: "Yeast ARN family of Siderophore iron transporters and similar proteins of the Major Facilitator Superfamily. The ARN family of siderophore iron transporters includes ARN1 (or ferrichrome permease), ARN2 (or triacetylfusarinine C transporter 1 or TAF1), ARN3 (or siderophore iron transporter 1 or SIT1 or ferrioxamine B permease) and ARN4 (or Enterobactin permease or ENB1). They specifically recognize siderophore-iron chelates are expressed under conditions of iron deprivation. They facilitate the uptake of both hydroxamate- and catecholate-type siderophores. This group also includes glutathione exchanger 1 (Gex1p) and Gex2p, which are proton/glutathione antiporters that import glutathione from the vacuole and exports it through the plasma membrane. The ARN family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Yeast ARN family of Siderophore iron transporters and similar proteins of the Major Facilitator Superfamily. The ARN family of siderophore iron transporters includes ARN1 (or ferrichrome permease), ARN2 (or triacetylfusarinine C transporter 1 or TAF1), ARN3 (or siderophore iron transporter 1 or SIT1 or ferrioxamine B permease) and ARN4 (or Enterobactin permease or ENB1). They specifically recognize siderophore-iron chelates are expressed under conditions of iron deprivation. They facilitate the uptake of both hydroxamate- and catecholate-type siderophores. This group also includes glutathione exchanger 1 (Gex1p) and Gex2p, which are proton/glutathione antiporters that import glutathione from the vacuole and exports it through the plasma membrane. The ARN family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17322); members share this curated model.
