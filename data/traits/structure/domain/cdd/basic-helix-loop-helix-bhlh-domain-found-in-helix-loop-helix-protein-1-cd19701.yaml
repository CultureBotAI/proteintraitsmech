identifier: CDD:cd19701
label: "basic helix-loop-helix (bHLH) domain found in helix-loop-helix protein 1 (HEN-1) and similar proteins. HEN-1, also termed nescient helix-loop-helix 1 (Nhlh1), or Class A basic helix-loop-helix protein 35 (bHLHa35), or nescient helix loop helix 1 (NSCL-1), is a neuron-specific bHLH transcription factor that may serve as DNA-binding protein and may be involved in the control of cell-type determination, possibly within the developing nervous system."
definition: >-
  basic helix-loop-helix (bHLH) domain found in helix-loop-helix protein 1 (HEN-1) and similar proteins. HEN-1, also termed nescient helix-loop-helix 1 (Nhlh1), or Class A basic helix-loop-helix protein 35 (bHLHa35), or nescient helix loop helix 1 (NSCL-1), is a neuron-specific bHLH transcription factor that may serve as DNA-binding protein and may be involved in the control of cell-type determination, possibly within the developing nervous system. — an NCBI CDD conserved domain (cd19701); members share this curated model.
