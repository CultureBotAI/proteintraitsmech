identifier: CDD:cd00136
label: "canonical PDZ domain. Canonical PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain. PDZ domains usually bind to short specific peptide sequences located at the C-terminal end of their partner proteins known as PDZ binding motifs. These domains can also interact with internal peptide motifs and certain lipids, and can take part in a head-to-tail oligomerization with other PDZ domains. The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  canonical PDZ domain. Canonical PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain. PDZ domains usually bind to short specific peptide sequences located at the C-terminal end of their partner proteins known as PDZ binding motifs. These domains can also interact with internal peptide motifs and certain lipids, and can take part in a head-to-tail oligomerization with other PDZ domains. The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd00136); members share this curated model.
