identifier: CDD:cd02911
label: "Archeal FMN-binding domain. This family of archaeal proteins are part of the NAD(P)H-dependent flavin oxidoreductase (oxidored) FMN-binding family that reduce a range of alternative electron acceptors. Most use FAD/FMN as a cofactor and NAD(P)H as electron donor. Some contain 4Fe-4S cluster to transfer electron from FAD to FMN. The specific function of this group is unknown."
definition: >-
  Archeal FMN-binding domain. This family of archaeal proteins are part of the NAD(P)H-dependent flavin oxidoreductase (oxidored) FMN-binding family that reduce a range of alternative electron acceptors. Most use FAD/FMN as a cofactor and NAD(P)H as electron donor. Some contain 4Fe-4S cluster to transfer electron from FAD to FMN. The specific function of this group is unknown. — an NCBI CDD conserved domain (cd02911); members share this curated model.
