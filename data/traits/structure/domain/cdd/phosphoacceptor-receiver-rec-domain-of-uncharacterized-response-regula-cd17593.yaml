identifier: CDD:cd17593
label: "phosphoacceptor receiver (REC) domain of uncharacterized response regulators containing a CheC domain. This subfamily is composed of uncharacterized proteins containing an N-terminal REC domain and a C-terminal CheC domain that may function as the output/effector domain of a response regulator. CheC is a CheY-P phosphatase, affecting the level of phosphorylated CheY which controls the sense of flagella rotation and determine swimming behavior of chemotactic bacteria. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of uncharacterized response regulators containing a CheC domain. This subfamily is composed of uncharacterized proteins containing an N-terminal REC domain and a C-terminal CheC domain that may function as the output/effector domain of a response regulator. CheC is a CheY-P phosphatase, affecting the level of phosphorylated CheY which controls the sense of flagella rotation and determine swimming behavior of chemotactic bacteria. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17593); members share this curated model.
