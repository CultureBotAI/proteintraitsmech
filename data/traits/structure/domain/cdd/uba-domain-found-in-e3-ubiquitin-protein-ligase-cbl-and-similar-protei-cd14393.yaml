identifier: CDD:cd14393
label: "UBA domain found in E3 ubiquitin-protein ligase Cbl and similar proteins. Cbl, also called casitas B-lineage lymphoma proto-oncogene, proto-oncogene c-Cbl, RING finger protein 55, or signal transduction protein Cbl, is a multi-domain protein that acts as a key negative regulator of various receptor and non-receptor tyrosine kinases signaling. It contains a tyrosine kinase-binding domain (TKB), a proline-rich domain, a RING domain, and a ubiquitin-associated (UBA) domain. The TKB is responsible for the interactions with many tyrosine kinases, such as the colony-stimulating factor-1 (CSF-1) receptor, Syk/ZAP-70 and Src-family of protein tyrosine kinases. The proline-rich domain can recruit proteins with SH3 domain. Moreover, Cbl functions as an E3 ubiquitin ligase that can bind ubiquitin-conjugating enzymes (E2s) through RING domain."
definition: >-
  UBA domain found in E3 ubiquitin-protein ligase Cbl and similar proteins. Cbl, also called casitas B-lineage lymphoma proto-oncogene, proto-oncogene c-Cbl, RING finger protein 55, or signal transduction protein Cbl, is a multi-domain protein that acts as a key negative regulator of various receptor and non-receptor tyrosine kinases signaling. It contains a tyrosine kinase-binding domain (TKB), a proline-rich domain, a RING domain, and a ubiquitin-associated (UBA) domain. The TKB is responsible for the interactions with many tyrosine kinases, such as the colony-stimulating factor-1 (CSF-1) receptor, Syk/ZAP-70 and Src-family of protein tyrosine kinases. The proline-rich domain can recruit proteins with SH3 domain. Moreover, Cbl functions as an E3 ubiquitin ligase that can bind ubiquitin-conjugating enzymes (E2s) through RING domain. — an NCBI CDD conserved domain (cd14393); members share this curated model.
