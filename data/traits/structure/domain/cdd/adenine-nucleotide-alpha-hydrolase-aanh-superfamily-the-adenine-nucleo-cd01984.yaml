label: "Adenine nucleotide alpha hydrolase (AANH) superfamily. The adenine nucleotide alpha hydrolase (AANH) superfamily includes N-type ATP PPases, ATP sulfurylases, universal stress response proteins (USPs), and electron transfer flavoproteins (ETFs). The domain forms an alpha/beta/alpha fold which binds to adenosine nucleotide."
definition: >-
  Adenine nucleotide alpha hydrolase (AANH) superfamily. The adenine nucleotide alpha hydrolase (AANH) superfamily includes N-type ATP PPases, ATP sulfurylases, universal stress response proteins (USPs), and electron transfer flavoproteins (ETFs). The domain forms an alpha/beta/alpha fold which binds to adenosine nucleotide. — an NCBI CDD conserved domain (cd01984); members share this curated model.
