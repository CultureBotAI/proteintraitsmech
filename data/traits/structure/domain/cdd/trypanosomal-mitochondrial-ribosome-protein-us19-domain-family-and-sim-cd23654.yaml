identifier: CDD:cd23654
label: "Trypanosomal mitochondrial ribosome protein uS19 domain family, and similar proteins. uS19 is a mitochondrial protein found in Trypanosoma cruzi but its function has not been fully characterized yet. It has been shown to be a component of T. brucei mitoribosome small subunits (Tb-mt-SSUs), which forms a complex with the C-terminal domain (CTD) of initiation factor IF-3 (Tb-mt-SSU/IF-3) and may be involved in mitoribosomal maturation."
definition: >-
  Trypanosomal mitochondrial ribosome protein uS19 domain family, and similar proteins. uS19 is a mitochondrial protein found in Trypanosoma cruzi but its function has not been fully characterized yet. It has been shown to be a component of T. brucei mitoribosome small subunits (Tb-mt-SSUs), which forms a complex with the C-terminal domain (CTD) of initiation factor IF-3 (Tb-mt-SSU/IF-3) and may be involved in mitoribosomal maturation. — an NCBI CDD conserved domain (cd23654); members share this curated model.
