identifier: CDD:cd01552
label: "fFAS_beta. In yeast, fatty acid synthase (FAS)is a complex of six   alfa- and six  beta- subunits. The  alfa-subunit is coded by the gene FAS2 and the  beta- subunit by FAS1.  The subunit stiochiometry is achieved by means of coordinated regulation of FAS1 and FAS2 through common upstream activating sequences (UAS) and through the equally efficient translation initiation sequence TCATTATG. The mutants of FAS1 and FAS2 are auxotrophic for long-chain fatty acids."
definition: >-
  fFAS_beta. In yeast, fatty acid synthase (FAS)is a complex of six alfa- and six beta- subunits. The alfa-subunit is coded by the gene FAS2 and the beta- subunit by FAS1. The subunit stiochiometry is achieved by means of coordinated regulation of FAS1 and FAS2 through common upstream activating sequences (UAS) and through the equally efficient translation initiation sequence TCATTATG. The mutants of FAS1 and FAS2 are auxotrophic for long-chain fatty acids. — an NCBI CDD conserved domain (cd01552); members share this curated model.
