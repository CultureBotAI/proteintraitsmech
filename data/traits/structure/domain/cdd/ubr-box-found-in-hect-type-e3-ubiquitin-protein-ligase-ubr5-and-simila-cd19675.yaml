identifier: CDD:cd19675
label: "UBR-box found in HECT-type E3 ubiquitin-protein ligase UBR5 and similar proteins. UBR5 (EC 2.3.2.26; also called E3 ubiquitin-protein ligase, HECT domain-containing 1, E3 ligase identified by differential display (EDD), hyperplastic discs protein homolog (HYD), progestin-induced protein, or N-recognin-5) is a HECT (homologous to E6-AP C-terminus)-type E3 ubiquitin-protein ligase that acts as a key regulator of the ubiquitin proteasome system in both cancer and developmental biology. It is required for Wnt signal responses in Drosophila and human cell lines downstream of activated Armadillo/beta-catenin. It also plays a key role in ciliogenesis by regulating centriolar satellite stability and primary cilia."
definition: >-
