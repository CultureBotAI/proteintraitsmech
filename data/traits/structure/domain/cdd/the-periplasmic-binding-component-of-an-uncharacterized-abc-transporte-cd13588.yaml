identifier: CDD:cd13588
label: "The periplasmic-binding component of an uncharacterized ABC transporter involved in uptake of polyamines; contains the type 2 periplasmic binding fold. This group represents the periplasmic binding domain that functions as the primary high-affinity receptor of an uncharactertized ABC-type polyamine transport system. Polyamine transport plays an essential role in the regulation of intracellular polyamine levels which are known to be elevated in rapidly proliferating cells and tumors. Natural polyamines are putrescine, spermindine, and spermine. They are polycations that play multiple roles in cell growth, survival and proliferation, and plant stress and disease resistance. They can interact with negatively charged molecules, such as nucleic acids, to modulate their functions. Members of this family belong to the type 2 periplasmic-binding fold superfamily. PBP2 is comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  The periplasmic-binding component of an uncharacterized ABC transporter involved in uptake of polyamines; contains the type 2 periplasmic binding fold. This group represents the periplasmic binding domain that functions as the primary high-affinity receptor of an uncharactertized ABC-type polyamine transport system. Polyamine transport plays an essential role in the regulation of intracellular polyamine levels which are known to be elevated in rapidly proliferating cells and tumors. Natural polyamines are putrescine, spermindine, and spermine. They are polycations that play multiple roles in cell growth, survival and proliferation, and plant stress and disease resistance. They can interact with negatively charged molecules, such as nucleic acids, to modulate their functions. Members of this family belong to the type 2 periplasmic-binding fold superfamily. PBP2 is comprised of two globular subdomains connected by a flexible hinge and bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd13588); members share this curated model.
