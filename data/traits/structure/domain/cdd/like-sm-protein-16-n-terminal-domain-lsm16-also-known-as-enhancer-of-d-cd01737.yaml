identifier: CDD:cd01737
label: "Like-Sm protein 16, N-terminal domain. LSm16 (also known as enhancer of decapping-3 or EDC3) has been shown to be associated with an mRNA-decapping complex Dcp1-Dcp2, required for removal of the 5-prime cap from mRNA prior to its degradation from the 5-prime end. EDC3 is believed to be a scaffold for decapping complex formation. It belongs to a family of Sm-like proteins that associate with RNA to form complexes involved in a variety of RNA processing events including pre-mRNA splicing, telomere replication, and mRNA degradation. Members of this family share a highly conserved Sm fold, containing an N-terminal helix followed by a strongly bent five-stranded antiparallel beta-sheet, that associates with other Sm proteins to form hexameric and heptameric ring structures. LSm16 has, in addition to its N-terminal Sm-like domain, a C-terminal Yjef_N-type Rossmann fold domain of unknown function."
definition: >-
  Like-Sm protein 16, N-terminal domain. LSm16 (also known as enhancer of decapping-3 or EDC3) has been shown to be associated with an mRNA-decapping complex Dcp1-Dcp2, required for removal of the 5-prime cap from mRNA prior to its degradation from the 5-prime end. EDC3 is believed to be a scaffold for decapping complex formation. It belongs to a family of Sm-like proteins that associate with RNA to form complexes involved in a variety of RNA processing events including pre-mRNA splicing, telomere replication, and mRNA degradation. Members of this family share a highly conserved Sm fold, containing an N-terminal helix followed by a strongly bent five-stranded antiparallel beta-sheet, that associates with other Sm proteins to form hexameric and heptameric ring structures. LSm16 has, in addition to its N-terminal Sm-like domain, a C-terminal Yjef_N-type Rossmann fold domain of unknown function. — an NCBI CDD conserved domain (cd01737); members share this curated model.
