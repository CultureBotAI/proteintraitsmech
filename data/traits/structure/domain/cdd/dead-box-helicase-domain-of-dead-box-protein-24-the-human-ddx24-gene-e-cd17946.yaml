identifier: CDD:cd17946
label: "DEAD-box helicase domain of DEAD box protein 24. The human DDX24 gene encodes a DEAD box protein, which shows little similarity to any of the other known human DEAD box proteins, but shows a high similarity to mouse Ddx24 at the amino acid level. MDM2 mediates nonproteolytic polyubiquitylation of the DEAD-Box RNA helicase DDX24. DDX24 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP- binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 24. The human DDX24 gene encodes a DEAD box protein, which shows little similarity to any of the other known human DEAD box proteins, but shows a high similarity to mouse Ddx24 at the amino acid level. MDM2 mediates nonproteolytic polyubiquitylation of the DEAD-Box RNA helicase DDX24. DDX24 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP- binding region. — an NCBI CDD conserved domain (cd17946); members share this curated model.
