identifier: CDD:cd03558
label: "extracellular domain (ECD) of Cys-loop neurotransmitter-gated ion channels (also known as ligand-gated ion channel (LGIC)). This superfamily contains the extracellular domain (ECD) of Cys-loop neurotransmitter-gated ion channels, which include nicotinic acetylcholine receptor (nAChR), serotonin 5-hydroxytryptamine receptor (5-HT3), type-A gamma-aminobutyric acid receptor (GABAAR) and glycine receptor (GlyR). These ligand-gated ion channels (LGICs) are found across metazoans and have close homologs in bacteria. They are vital for communication throughout the nervous system. GABAAR and GlyR are anionic channels, both mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR receptor pore, resulting in hyperpolarization of the neuron. nAChR is a non-selective cation channel that is permeable to Na+ and K+, and some subunit combinations are also permeable to Ca2+. Na+ enters and K+ exits to allow net flow of positively charged ions inward. 5-HT3, a cation-selective channel, binds serotonin and is permeable to Na+, K+, and Ca2+. It mediates neuronal depolarization and excitation within the central and peripheral nervous systems. These ligand-gated chloride channels are critical not only for maintaining appropriate neuronal activity, but have long been important therapeutic targets: benzodiazepines, barbiturates, some intravenous and volatile anaesthetics, alcohol, strychnine, picrotoxin, and ivermectin all derive their biological activity from acting on the inhibitory half of the Cys-loop receptor family. The ECD contains the ligand binding sites for these receptors."
definition: >-
  extracellular domain (ECD) of Cys-loop neurotransmitter-gated ion channels (also known as ligand-gated ion channel (LGIC)). This superfamily contains the extracellular domain (ECD) of Cys-loop neurotransmitter-gated ion channels, which include nicotinic acetylcholine receptor (nAChR), serotonin 5-hydroxytryptamine receptor (5-HT3), type-A gamma-aminobutyric acid receptor (GABAAR) and glycine receptor (GlyR). These ligand-gated ion channels (LGICs) are found across metazoans and have close homologs in bacteria. They are vital for communication throughout the nervous system. GABAAR and GlyR are anionic channels, both mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR receptor pore, resulting in hyperpolarization of the neuron. nAChR is a non-selective cation channel that is permeable to Na+ and K+, and some subunit combinations are also permeable to Ca2+. Na+ enters and K+ exits to allow net flow of positively charged ions inward. 5-HT3, a cation-selective channel, binds serotonin and is permeable to Na+, K+, and Ca2+. It mediates neuronal depolarization and excitation within the central and peripheral nervous systems. These ligand-gated chloride channels are critical not only for maintaining appropriate neuronal activity, but have long been important therapeutic targets: benzodiazepines, barbiturates, some intravenous and volatile anaesthetics, alcohol, strychnine, picrotoxin, and ivermectin all derive their biological activity from acting on the inhibitory half of the Cys-loop receptor family. The ECD contains the ligand binding sites for these receptors. — an NCBI CDD conserved domain (cd03558); members share this curated model.
