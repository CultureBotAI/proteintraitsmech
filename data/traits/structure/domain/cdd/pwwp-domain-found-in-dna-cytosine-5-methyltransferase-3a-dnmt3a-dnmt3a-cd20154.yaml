identifier: CDD:cd20154
label: "PWWP domain found in DNA (cytosine-5)-methyltransferase 3A (DNMT3A). DNMT3A, also called DNA methyltransferase HsaIIIA, DNA MTase HsaIIIA, or M.HsaIIIA, is required for genome-wide de novo methylation and is essential for the establishment of DNA methylation patterns during development. It modifies DNA in a non-processive manner and also methylates non-CpG sites. It may preferentially methylate DNA linker between 2 nucleosomal cores and is inhibited by histone H1. DNMT3A is recruited to trimethylated 'Lys-36' of histone H3 (H3K36me3) sites. It contains a PWWP domain that binds methylated histone."
definition: >-
  PWWP domain found in DNA (cytosine-5)-methyltransferase 3A (DNMT3A). DNMT3A, also called DNA methyltransferase HsaIIIA, DNA MTase HsaIIIA, or M.HsaIIIA, is required for genome-wide de novo methylation and is essential for the establishment of DNA methylation patterns during development. It modifies DNA in a non-processive manner and also methylates non-CpG sites. It may preferentially methylate DNA linker between 2 nucleosomal cores and is inhibited by histone H1. DNMT3A is recruited to trimethylated 'Lys-36' of histone H3 (H3K36me3) sites. It contains a PWWP domain that binds methylated histone. — an NCBI CDD conserved domain (cd20154); members share this curated model.
