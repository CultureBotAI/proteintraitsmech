identifier: CDD:cd22085
label: "F-box domain found in F-box only protein 4 (FBXO4) and similar proteins. FBXO4, also called FBX4, is a specific substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex that catalyzes the ubiquitination and subsequent degradation of cyclin D1 and Trx1. It recognizes TERF1 and promotes its ubiquitination together with UBE2D1. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 4 (FBXO4) and similar proteins. FBXO4, also called FBX4, is a specific substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex that catalyzes the ubiquitination and subsequent degradation of cyclin D1 and Trx1. It recognizes TERF1 and promotes its ubiquitination together with UBE2D1. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22085); members share this curated model.
