identifier: CDD:cd00035
label: "Hevein or type 1 chitin binding domain. Hevein or type 1 chitin binding domain (ChtBD1), a lectin domain found in proteins from plants and fungi that bind N-acetylglucosamine, plant endochitinases, wound-induced proteins such as hevein, a major IgE-binding allergen in natural rubber latex, and the alpha subunit of Kluyveromyces lactis killer toxin. This domain is involved in the recognition and/or binding of chitin subunits; it typically occurs N-terminal to glycosyl hydrolase domains in chitinases, together with other carbohydrate-binding domains, or by itself in tandem-repeat arrangements."
definition: >-
  Hevein or type 1 chitin binding domain. Hevein or type 1 chitin binding domain (ChtBD1), a lectin domain found in proteins from plants and fungi that bind N-acetylglucosamine, plant endochitinases, wound-induced proteins such as hevein, a major IgE-binding allergen in natural rubber latex, and the alpha subunit of Kluyveromyces lactis killer toxin. This domain is involved in the recognition and/or binding of chitin subunits; it typically occurs N-terminal to glycosyl hydrolase domains in chitinases, together with other carbohydrate-binding domains, or by itself in tandem-repeat arrangements. — an NCBI CDD conserved domain (cd00035); members share this curated model.
