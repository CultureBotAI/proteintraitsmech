identifier: CDD:cd22905
label: "histone-fold domain found in protein Dr1 and similar proteins. Dr1, also called down-regulator of transcription 1 or negative cofactor 2-beta (NC2-beta), is a TATA-binding protein-associated phosphoprotein and inhibitor of class II gene transcription. It forms a heterodimer with DRAP1. The association of the Dr1/DRAP1 heterodimer with TBP results in functional repression of both activated and basal transcription of class II genes. Dr1 can bind to DNA on its own. Dr1 is a component of the ADA2A-containing complex (ATAC) that has histone acetyltransferase activity on histones H3 and H4."
definition: >-
  histone-fold domain found in protein Dr1 and similar proteins. Dr1, also called down-regulator of transcription 1 or negative cofactor 2-beta (NC2-beta), is a TATA-binding protein-associated phosphoprotein and inhibitor of class II gene transcription. It forms a heterodimer with DRAP1. The association of the Dr1/DRAP1 heterodimer with TBP results in functional repression of both activated and basal transcription of class II genes. Dr1 can bind to DNA on its own. Dr1 is a component of the ADA2A-containing complex (ATAC) that has histone acetyltransferase activity on histones H3 and H4. — an NCBI CDD conserved domain (cd22905); members share this curated model.
