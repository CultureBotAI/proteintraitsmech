identifier: CDD:cd16213
label: "EF-hand motif found in phosphoinositide phospholipase PLC21 and similar proteins. The family includes invertebrate homologs of phosphoinositide phospholipase C beta (PI-PLC-beta) named PLC21 from cephalopod retina. It also includes PLC21 encoded by plc-21 gene, which is expressed in the central nervous system of Drosophila. Like beta-class of vertebrate PI-PLCs, PLC21 contains an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core, and a single C2 domain. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence."
definition: >-
  EF-hand motif found in phosphoinositide phospholipase PLC21 and similar proteins. The family includes invertebrate homologs of phosphoinositide phospholipase C beta (PI-PLC-beta) named PLC21 from cephalopod retina. It also includes PLC21 encoded by plc-21 gene, which is expressed in the central nervous system of Drosophila. Like beta-class of vertebrate PI-PLCs, PLC21 contains an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core, and a single C2 domain. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. — an NCBI CDD conserved domain (cd16213); members share this curated model.
