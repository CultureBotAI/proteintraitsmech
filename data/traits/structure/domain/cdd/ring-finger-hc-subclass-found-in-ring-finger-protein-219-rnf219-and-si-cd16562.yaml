identifier: CDD:cd16562
label: "RING finger, HC subclass, found in RING finger protein 219 (RNF219) and similar proteins. RNF219 may function as a modulator of late-onset Alzheimer's disease (LOAD) associated amyloid beta A4 precursor protein (APP) endocytosis and metabolism. It genetically interacts with apolipoprotein E epsilon4 allele (APOE4). Thus, a genetic variant of RNF219 was found to affect amyloid deposition in human brain and LOAD age-of-onset. Moreover, common genetic variants at the RNF219 locus had been associated with alternations in lipid metabolism, cognitive performance and central nervous system ventricle volume. RNF219 contains a C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein 219 (RNF219) and similar proteins. RNF219 may function as a modulator of late-onset Alzheimer's disease (LOAD) associated amyloid beta A4 precursor protein (APP) endocytosis and metabolism. It genetically interacts with apolipoprotein E epsilon4 allele (APOE4). Thus, a genetic variant of RNF219 was found to affect amyloid deposition in human brain and LOAD age-of-onset. Moreover, common genetic variants at the RNF219 locus had been associated with alternations in lipid metabolism, cognitive performance and central nervous system ventricle volume. RNF219 contains a C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16562); members share this curated model.
