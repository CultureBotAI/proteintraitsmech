identifier: CDD:cd22727
label: "forkhead associated (FHA) domain found in kinesin-like protein KIF1B. KIF1B, also called Klp, is a motor for anterograde transport of mitochondria. It has a microtubule plus end-directed motility. Isoform 1 mediates the transport of synaptic vesicles in neuronal cells, while isoform 2 is required for induction of neuronal apoptosis. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in kinesin-like protein KIF1B. KIF1B, also called Klp, is a motor for anterograde transport of mitochondria. It has a microtubule plus end-directed motility. Isoform 1 mediates the transport of synaptic vesicles in neuronal cells, while isoform 2 is required for induction of neuronal apoptosis. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22727); members share this curated model.
