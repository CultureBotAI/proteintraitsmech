identifier: CDD:cd18516
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 40 (KLHL40). KLHL40, also called Kelch repeat and BTB domain-containing protein 5, or sarcosynapsin, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a key regulator of skeletal muscle development. Mutations in KLHL40 may cause severe autosomal-recessive nemaline myopathy."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 40 (KLHL40). KLHL40, also called Kelch repeat and BTB domain-containing protein 5, or sarcosynapsin, is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex that acts as a key regulator of skeletal muscle development. Mutations in KLHL40 may cause severe autosomal-recessive nemaline myopathy. — an NCBI CDD conserved domain (cd18516); members share this curated model.
