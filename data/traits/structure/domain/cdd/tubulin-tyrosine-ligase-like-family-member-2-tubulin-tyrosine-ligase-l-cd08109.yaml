identifier: CDD:cd08109
label: "Tubulin tyrosine ligase-like family, member 2. Tubulin tyrosine ligase-like family, member 2 (TTLL2) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 2 gene (TTLL2) maps to chromosome region 6q27 and encodes for a 592 amino acid protein."
definition: >-
  Tubulin tyrosine ligase-like family, member 2. Tubulin tyrosine ligase-like family, member 2 (TTLL2) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 2 gene (TTLL2) maps to chromosome region 6q27 and encodes for a 592 amino acid protein. — an NCBI CDD conserved domain (cd08109); members share this curated model.
