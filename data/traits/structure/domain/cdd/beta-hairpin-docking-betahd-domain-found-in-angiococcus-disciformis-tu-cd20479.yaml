identifier: CDD:cd20479
label: "Beta-hairpin docking (betaHD) domain found in Angiococcus disciformis TubC and other nonribosomal polypeptide synthetases (NRPSs). Modular polyketide synthases (PKSs) and NRPSs are molecular assembly lines that consist of several multienzyme subunits that undergo dynamic self-assembly to form a functional megacomplex. N- and C-terminal docking domains are usually responsible for mediating the interactions between subunits. From study of Burkholderia ambifaria condensation-domain containing-protein, an NRPS responsible for chain release from the enacyloxin polyketide synthase, it has been shown that the BetaHD domains interact with short linear motifs (SLiMs) appended to the C-terminus of upstream PKS subunits, which facilitates the recognition of acyl groups attached to an acyl carrier protein (ACP) domain by condensation (C) or heterocyclization domains in the NRPS subunit. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long, with various activities such as antibiotic, antifungal, antitumor and immunosuppression. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a condensation (C) domain. NRPS modules may also include other specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C (epimerization and condensation) domains, and the X-domain."
definition: >-
  Beta-hairpin docking (betaHD) domain found in Angiococcus disciformis TubC and other nonribosomal polypeptide synthetases (NRPSs). Modular polyketide synthases (PKSs) and NRPSs are molecular assembly lines that consist of several multienzyme subunits that undergo dynamic self-assembly to form a functional megacomplex. N- and C-terminal docking domains are usually responsible for mediating the interactions between subunits. From study of Burkholderia ambifaria condensation-domain containing-protein, an NRPS responsible for chain release from the enacyloxin polyketide synthase, it has been shown that the BetaHD domains interact with short linear motifs (SLiMs) appended to the C-terminus of upstream PKS subunits, which facilitates the recognition of acyl groups attached to an acyl carrier protein (ACP) domain by condensation (C) or heterocyclization domains in the NRPS subunit. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long, with various activities such as antibiotic, antifungal, antitumor and immunosuppression. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a condensation (C) domain. NRPS modules may also include other specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C (epimerization and condensation) domains, and the X-domain. — an NCBI CDD conserved domain (cd20479); members share this curated model.
