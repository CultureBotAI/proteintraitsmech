label: "SET domain found in chloroplastic ribulose-1,5 bisphosphate carboxylase/oxygenase large subunit N-methyltransferase (RBCMT) and similar proteins. RBCMT (EC 2.1.1.127; also termed [Ribulose-bisphosphate carboxylase]-lysine N-methyltransferase, RuBisCO LSMT, RuBisCO methyltransferase, or rbcMT) methylates 'Lys-14' of the large subunit of RuBisCO."
definition: >-
