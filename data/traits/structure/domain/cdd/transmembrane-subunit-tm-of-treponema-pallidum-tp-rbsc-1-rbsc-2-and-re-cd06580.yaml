identifier: CDD:cd06580
label: "Transmembrane subunit (TM) of Treponema pallidum (Tp) RbsC-1, RbsC-2 and related proteins. This is a functionally uncharacterized subgroup of TMs which belong to a larger group of TMs of Periplasmic Binding Protein (PBP)-dependent ATP-Binding Cassette (ABC) transporters, which are mainly involved in the uptake of branched-chain amino acids (AAs) or in the uptake of monosaccharides including ribose, galactose, and arabinose, and which generally bind type 1 PBPs. PBP-dependent ABC transporters consist of a PBP, two TMs, and two cytoplasmic ABCs, and are mainly involved in importing solutes from the environment. The solute is captured by the PBP, which delivers it to a gated translocation pathway formed by the two TMs. The two ABCs bind and hydrolyze ATP and drive the transport reaction."
definition: >-
  Transmembrane subunit (TM) of Treponema pallidum (Tp) RbsC-1, RbsC-2 and related proteins. This is a functionally uncharacterized subgroup of TMs which belong to a larger group of TMs of Periplasmic Binding Protein (PBP)-dependent ATP-Binding Cassette (ABC) transporters, which are mainly involved in the uptake of branched-chain amino acids (AAs) or in the uptake of monosaccharides including ribose, galactose, and arabinose, and which generally bind type 1 PBPs. PBP-dependent ABC transporters consist of a PBP, two TMs, and two cytoplasmic ABCs, and are mainly involved in importing solutes from the environment. The solute is captured by the PBP, which delivers it to a gated translocation pathway formed by the two TMs. The two ABCs bind and hydrolyze ATP and drive the transport reaction. — an NCBI CDD conserved domain (cd06580); members share this curated model.
