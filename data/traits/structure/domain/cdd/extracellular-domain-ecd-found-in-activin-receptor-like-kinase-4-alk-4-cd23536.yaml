identifier: CDD:cd23536
label: "extracellular domain (ECD) found in activin receptor-like kinase 4 (ALK-4) and similar proteins. ALK-4 (EC 2.7.11.30, also called ACVRLK4, or activin receptor type-1B (ACVR1B), or activin receptor type IB (ACTR-IB), or serine/threonine-protein kinase receptor R2 (SKR2)) is the transmembrane serine/threonine kinase activin type-1 receptor forming an activin receptor complex with activin receptor type-2 (ACVR2A or ACVR2B). It transduces the activin signal from the cell surface to the cytoplasm and is thus regulating many physiological and pathological processes including neuronal differentiation and neuronal survival, hair follicle development and cycling, FSH production by the pituitary gland, wound healing, extracellular matrix production, immunosuppression, and carcinogenesis. This model corresponds to the extracellular domain (ECD) of ALK-4, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in activin receptor-like kinase 4 (ALK-4) and similar proteins. ALK-4 (EC 2.7.11.30, also called ACVRLK4, or activin receptor type-1B (ACVR1B), or activin receptor type IB (ACTR-IB), or serine/threonine-protein kinase receptor R2 (SKR2)) is the transmembrane serine/threonine kinase activin type-1 receptor forming an activin receptor complex with activin receptor type-2 (ACVR2A or ACVR2B). It transduces the activin signal from the cell surface to the cytoplasm and is thus regulating many physiological and pathological processes including neuronal differentiation and neuronal survival, hair follicle development and cycling, FSH production by the pituitary gland, wound healing, extracellular matrix production, immunosuppression, and carcinogenesis. This model corresponds to the extracellular domain (ECD) of ALK-4, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23536); members share this curated model.
