identifier: CDD:cd24100
label: "N-terminal nucleotide-binding domain (NBD) of Methanocaldococcus jannaschii protein MJ1051 and similar proteins. The family includes a group of uncharacterized proteins similar to Methanocaldococcus jannaschii protein MJ1051 and protein MJ1058. Members of this family consist of two domains. The model corresponds to the N-terminal Kae1-like domain."
definition: >-
  N-terminal nucleotide-binding domain (NBD) of Methanocaldococcus jannaschii protein MJ1051 and similar proteins. The family includes a group of uncharacterized proteins similar to Methanocaldococcus jannaschii protein MJ1051 and protein MJ1058. Members of this family consist of two domains. The model corresponds to the N-terminal Kae1-like domain. — an NCBI CDD conserved domain (cd24100); members share this curated model.
