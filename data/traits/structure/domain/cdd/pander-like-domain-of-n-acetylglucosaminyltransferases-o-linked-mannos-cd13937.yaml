identifier: CDD:cd13937
label: "PANDER-like domain of N-acetylglucosaminyltransferases. O-linked-mannose beta-1,2-N-acetylglucosaminyltransferase 1 participates in O-mannosyl glycosylation and may be responsible for creating GlcNAc(beta1-2)Man(alpha1-)O-Ser/Thr moieties on alpha dystroglycan and other O-mannosylated proteins. The domain characterized by this model lies N-terminal to the catalytic domain. Its function has not been determined."
definition: >-
