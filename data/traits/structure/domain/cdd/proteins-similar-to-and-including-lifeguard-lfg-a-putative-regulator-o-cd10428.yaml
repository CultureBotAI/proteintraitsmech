identifier: CDD:cd10428
label: "Proteins similar to and including lifeguard (LFG), a putative regulator of apoptosis. Lifeguard (LFG) inhibits Fas-mediated apoptosis and interacts with the death receptor FasR/CD95/Apo1. LFG has been shown to interact with Bax and is supposed to be integral to cellular membranes such as the ER. A close homolog, PP1201 or RECS1, appears located in the Golgi compartment and also interacts with the Fas receptor CD95/Apo1. PP1201 is expressed in response to shear stress."
definition: >-
  Proteins similar to and including lifeguard (LFG), a putative regulator of apoptosis. Lifeguard (LFG) inhibits Fas-mediated apoptosis and interacts with the death receptor FasR/CD95/Apo1. LFG has been shown to interact with Bax and is supposed to be integral to cellular membranes such as the ER. A close homolog, PP1201 or RECS1, appears located in the Golgi compartment and also interacts with the Fas receptor CD95/Apo1. PP1201 is expressed in response to shear stress. — an NCBI CDD conserved domain (cd10428); members share this curated model.
