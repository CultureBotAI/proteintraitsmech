identifier: CDD:cd23088
label: "mitochondrial large subunit assembly factor 8 (mt-LAF8), and related proteins. mt-LAF8 is a Trypanosoma brucei mitochondrial large subunit (mt-LSU) assembly factor (mt-LAF) that plays a structural role in stabilizing a mt-LSU assembly intermediate (pre-mt-LSU), mt-LAF8, along with mt-LAF7, is bound at the L7/12 stalk base to the unfolded rRNA H41/42. Mitochondrial ribosomes (mitoribosomes) are ribonucleoprotein complexes and consist of a large (mt-LSU) and small subunit (mt-SSU). They differ markedly in composition and architecture from their bacterial counterparts and between different eukaryotic lineages, and their biogenesis involves exchange of assembly factors by ribosomal proteins. An investigation of native assembly intermediates of the mt-LSU from T. brucei identified 28 assembly factors, some of which are homologous to bacterial and eukaryotic ribosome assembly factors. Mitochondrial biogenesis is biomedically important since mutations in mitoribosomal proteins, rRNAs, and assembly factors have been linked to a heterogeneous group of human multisystemic oxidative phosphorylation (OXPHOS) diseases and cancer development and progression."
