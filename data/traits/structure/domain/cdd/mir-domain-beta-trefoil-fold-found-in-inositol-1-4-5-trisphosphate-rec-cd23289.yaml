identifier: CDD:cd23289
label: "MIR domain, beta-trefoil fold, found in inositol 1,4,5-trisphosphate receptor type 3 (ITPR3) and similar proteins. ITPR3, also called IP3 receptor isoform 3 (IP3R 3), or InsP3R3, or type 3 inositol 1,4,5-trisphosphate receptor, or type 3 InsP3 receptor, acts as anti-oncogenic channel by propelling pro-apoptotic Ca2+ signals to mitochondria. It is the principal intracellular Ca2+ release channel in cholangiocytes and plays a particularly important role in cancer. ITPR3 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in inositol 1,4,5-trisphosphate receptor type 3 (ITPR3) and similar proteins. ITPR3, also called IP3 receptor isoform 3 (IP3R 3), or InsP3R3, or type 3 inositol 1,4,5-trisphosphate receptor, or type 3 InsP3 receptor, acts as anti-oncogenic channel by propelling pro-apoptotic Ca2+ signals to mitochondria. It is the principal intracellular Ca2+ release channel in cholangiocytes and plays a particularly important role in cancer. ITPR3 contains an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23289); members share this curated model.
