identifier: CDD:cd11474
label: "Na(+)- and Cl(-)-dependent choline cotransporter CHT and related proteins; solute-binding domain. Na+/choline co-transport by CHT is Cl- dependent. Human CHT (also called CHT1) is encoded by the SLC5A7 gene, and is expressed in the central nervous system. hCHT1-mediated choline uptake may be the rate-limiting step in acetylcholine synthesis, and essential for cholinergic transmission. Changes in this choline uptake in cortical neurons may contribute to Alzheimer's dementia. This subfamily belongs to the solute carrier 5 (SLC5) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent choline cotransporter CHT and related proteins; solute-binding domain. Na+/choline co-transport by CHT is Cl- dependent. Human CHT (also called CHT1) is encoded by the SLC5A7 gene, and is expressed in the central nervous system. hCHT1-mediated choline uptake may be the rate-limiting step in acetylcholine synthesis, and essential for cholinergic transmission. Changes in this choline uptake in cortical neurons may contribute to Alzheimer's dementia. This subfamily belongs to the solute carrier 5 (SLC5) transporter family. — an NCBI CDD conserved domain (cd11474); members share this curated model.
