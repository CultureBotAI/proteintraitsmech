identifier: CDD:cd16506
label: "RING finger, HC subclass, found in E3 ubiquitin-protein ligase Deltex3 (DTX3), Deltex-3-like (DTX3L) and similar proteins. This subfamily contains Deltex3 (DTX3) and Deltex-3-like (DTX3L), both of which are E3 ubiquitin-protein ligases belonging to the Deltex (DTX) family. DTX3, also known as RING finger protein 154 (RNF154), has a biological function that remains unclear. DTX3L, also known as B-lymphoma- and BAL-associated protein (BBAP) or Rhysin-2 (Rhysin2), regulates endosomal sorting of the G protein-coupled receptor CXCR4 from endosomes to lysosomes. It also regulates subcellular localization of its partner protein, B aggressive lymphoma (BAL), by a dynamic nucleocytoplasmic trafficking mechanism. In contrast to other DTXs, both DTX3 and DTX3L contain a C3HC4-type RING-HC finger, and a previously unidentified C-terminal domain. DTX3L can associate with DTX1 through its unique N termini and further enhance self-ubiquitination."
definition: >-
  RING finger, HC subclass, found in E3 ubiquitin-protein ligase Deltex3 (DTX3), Deltex-3-like (DTX3L) and similar proteins. This subfamily contains Deltex3 (DTX3) and Deltex-3-like (DTX3L), both of which are E3 ubiquitin-protein ligases belonging to the Deltex (DTX) family. DTX3, also known as RING finger protein 154 (RNF154), has a biological function that remains unclear. DTX3L, also known as B-lymphoma- and BAL-associated protein (BBAP) or Rhysin-2 (Rhysin2), regulates endosomal sorting of the G protein-coupled receptor CXCR4 from endosomes to lysosomes. It also regulates subcellular localization of its partner protein, B aggressive lymphoma (BAL), by a dynamic nucleocytoplasmic trafficking mechanism. In contrast to other DTXs, both DTX3 and DTX3L contain a C3HC4-type RING-HC finger, and a previously unidentified C-terminal domain. DTX3L can associate with DTX1 through its unique N termini and further enhance self-ubiquitination. — an NCBI CDD conserved domain (cd16506); members share this curated model.
