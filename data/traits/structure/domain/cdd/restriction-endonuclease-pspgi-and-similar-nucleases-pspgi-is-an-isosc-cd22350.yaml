identifier: CDD:cd22350
label: "Restriction endonuclease PspGI and similar nucleases. PspGI is an isoschizomer of EcoRII, it recognizes and cleaves the DNA sequence 5'-|CCWGG-3' (| denotes the cleavage site, W stands for A or T). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease PspGI and similar nucleases. PspGI is an isoschizomer of EcoRII, it recognizes and cleaves the DNA sequence 5'-|CCWGG-3' (| denotes the cleavage site, W stands for A or T). It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22350); members share this curated model.
