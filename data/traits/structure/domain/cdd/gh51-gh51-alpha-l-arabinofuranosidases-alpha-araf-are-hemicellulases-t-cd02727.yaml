identifier: CDD:cd02727
label: "GH51. GH51 alpha-L-arabinofuranosidases (alpha-AraF) are hemicellulases that hydrolyze the arabinofuranosyl substitutions in hemicellulose. Some of these enzymes exhibit broad substrate specificity, acting on arabinofuranoside moieties at O-2 or O-3 as a single substituent, as well as from O-2 and O-3 doubly substituted xylans, xylooligomers and a-1,5-linked arabinans."
definition: >-
  GH51. GH51 alpha-L-arabinofuranosidases (alpha-AraF) are hemicellulases that hydrolyze the arabinofuranosyl substitutions in hemicellulose. Some of these enzymes exhibit broad substrate specificity, acting on arabinofuranoside moieties at O-2 or O-3 as a single substituent, as well as from O-2 and O-3 doubly substituted xylans, xylooligomers and a-1,5-linked arabinans. — an NCBI CDD conserved domain (cd02727); members share this curated model.
