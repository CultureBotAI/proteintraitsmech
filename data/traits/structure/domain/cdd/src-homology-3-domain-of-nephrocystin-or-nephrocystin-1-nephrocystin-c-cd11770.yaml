identifier: CDD:cd11770
label: "Src Homology 3 domain of Nephrocystin (or Nephrocystin-1). Nephrocystin contains an SH3 domain involved in signaling pathways that regulate cell adhesion and cytoskeletal organization. It is a protein that in humans is associated with juvenile nephronophthisis, an inherited kidney disease characterized by renal fibrosis that lead to chronic renal failure in children. It is localized in cell-cell junctions in renal duct cells, and is known to interact with Ack1, an activated Cdc42-associated kinase. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Nephrocystin (or Nephrocystin-1). Nephrocystin contains an SH3 domain involved in signaling pathways that regulate cell adhesion and cytoskeletal organization. It is a protein that in humans is associated with juvenile nephronophthisis, an inherited kidney disease characterized by renal fibrosis that lead to chronic renal failure in children. It is localized in cell-cell junctions in renal duct cells, and is known to interact with Ack1, an activated Cdc42-associated kinase. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11770); members share this curated model.
