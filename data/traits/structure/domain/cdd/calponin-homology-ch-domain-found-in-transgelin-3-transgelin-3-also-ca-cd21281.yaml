identifier: CDD:cd21281
label: "calponin homology (CH) domain found in transgelin-3. Transgelin-3, also called neuronal protein 22 (NP22), or neuronal protein NP25, may have a role in alcohol-related adaptations and may mediate regulatory signal transduction pathways in neurons. It contains a single copy of the CH domain. CH domains are actin filament (F-actin) binding motifs."
