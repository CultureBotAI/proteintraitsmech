identifier: CDD:cd20280
label: "Restriction endonuclease NotI and similar proteins. Restriction enzyme NotI is a type IIP restriction enzyme (the simplest being separate homodimeric endonucleases and methyltransferases that each recognize the same palindromic DNA target sequence) that recognize sites of 8 bp or longer in invasive DNA. NotI is commonly used for the introduction of radiolabeled landmarks in the restriction landmark genomic scanning (RLGS) method, which has become a common technique for the study of aberrant DNA methylation patterns in tumor- and tissue-specific cell lines."
definition: >-
  Restriction endonuclease NotI and similar proteins. Restriction enzyme NotI is a type IIP restriction enzyme (the simplest being separate homodimeric endonucleases and methyltransferases that each recognize the same palindromic DNA target sequence) that recognize sites of 8 bp or longer in invasive DNA. NotI is commonly used for the introduction of radiolabeled landmarks in the restriction landmark genomic scanning (RLGS) method, which has become a common technique for the study of aberrant DNA methylation patterns in tumor- and tissue-specific cell lines. — an NCBI CDD conserved domain (cd20280); members share this curated model.
