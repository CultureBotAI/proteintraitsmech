identifier: CDD:cd17900
label: "ArfGAP domain of ASAP3 (ArfGAP with ANK repeat and PH domain-containing protein 3). The ArfGAPs are a family of multidomain proteins with a common catalytic domain that promotes the hydrolysis of GTP bound to Arf, thereby  inactivating Arf signaling. ASAP-subfamily GAPs include three members: ASAP1, ASAP2, ASAP3.  The ASAP subfamily comprises Arf GAP, SH3, ANK repeat and PH domains. From the N-terminus, each member has a BAR, PH, Arf GAP, ANK repeat, and proline rich domains. Unlike ASAP1 and ASAP2, ASAP3 do not have an SH3 domain at the C-terminus. ASAP1 and ASAP2 show strong GTPase-activating protein (GAP) activity toward Arf1 and Arf5 and weak activity toward Arf6. ASAP1 is a target of Src and FAK signaling that regulates focal adhesions, circular dorsal ruffles (CDR), invadopodia, and podosomes. ASAP1 GAP activity is synergistically stimulated by phosphatidylinositol 4,5-bisphosphate (PIP2) and phosphatidic acid.  ASAP2 is believed to function as an ArfGAP that controls ARF-mediated vesicle budding when recruited to Golgi membranes. It also functions as a substrate and downstream target for protein tyrosine kinases Pyk2 and Src, a pathway that may be involved in the regulation of vesicular transport. ASAP3 is a focal adhesion-associated ArfGAP that functions in cell migration and invasion. Similar to ASAP1, the GAP activity of ASAP3 is strongly enhanced by PIP2 via PH domain. Like ASAP1, ASAP3 associates with focal adhesions and circular dorsal ruffles. However, unlike ASAP1, ASAP3 does not localize to invadopodia or podosomes. ASAP 1 and 3 have been implicated in oncogenesis, as ASAP1 is highly expressed in metastatic breast cancer and ASAP3 in hepatocellular carcinoma."
definition: >-
  ArfGAP domain of ASAP3 (ArfGAP with ANK repeat and PH domain-containing protein 3). The ArfGAPs are a family of multidomain proteins with a common catalytic domain that promotes the hydrolysis of GTP bound to Arf, thereby inactivating Arf signaling. ASAP-subfamily GAPs include three members: ASAP1, ASAP2, ASAP3. The ASAP subfamily comprises Arf GAP, SH3, ANK repeat and PH domains. From the N-terminus, each member has a BAR, PH, Arf GAP, ANK repeat, and proline rich domains. Unlike ASAP1 and ASAP2, ASAP3 do not have an SH3 domain at the C-terminus. ASAP1 and ASAP2 show strong GTPase-activating protein (GAP) activity toward Arf1 and Arf5 and weak activity toward Arf6. ASAP1 is a target of Src and FAK signaling that regulates focal adhesions, circular dorsal ruffles (CDR), invadopodia, and podosomes. ASAP1 GAP activity is synergistically stimulated by phosphatidylinositol 4,5-bisphosphate (PIP2) and phosphatidic acid. ASAP2 is believed to function as an ArfGAP that controls ARF-mediated vesicle budding when recruited to Golgi membranes. It also functions as a substrate and downstream target for protein tyrosine kinases Pyk2 and Src, a pathway that may be involved in the regulation of vesicular transport. ASAP3 is a focal adhesion-associated ArfGAP that functions in cell migration and invasion. Similar to ASAP1, the GAP activity of ASAP3 is strongly enhanced by PIP2 via PH domain. Like ASAP1, ASAP3 associates with focal adhesions and circular dorsal ruffles. However, unlike ASAP1, ASAP3 does not localize to invadopodia or podosomes. ASAP 1 and 3 have been implicated in oncogenesis, as ASAP1 is highly expressed in metastatic breast cancer and ASAP3 in hepatocellular carcinoma. — an NCBI CDD conserved domain (cd17900); members share this curated model.
