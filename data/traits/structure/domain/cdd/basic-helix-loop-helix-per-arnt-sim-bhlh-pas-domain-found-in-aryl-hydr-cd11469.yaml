identifier: CDD:cd11469
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor nuclear translocator-like protein 2 (ARNTL2) and similar proteins. ARNTL2, also termed Basic-helix-loop-helix-PAS protein MOP9, or brain and muscle ARNT-like 2 (BMAL2), or CYCLE-like factor (CLIF), or Class E basic helix-loop-helix protein 6 (bHLHe6), or member of PAS protein 9, or PAS domain-containing protein 9 (PASD9), is a neuronal bHLH-PAS transcriptional factor, regulating cell cycle progression and preventing cell death, whose sustained expression might ensure brain neuron survival. It also plays important roles in tumor angiogenesis. ARNT-2 heterodimerize with other bHLH-PAS proteins such as aryl hydrocarbon receptor (AhR), hypoxia-inducible factor (HIF), and single-minded (SIM)."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in aryl hydrocarbon receptor nuclear translocator-like protein 2 (ARNTL2) and similar proteins. ARNTL2, also termed Basic-helix-loop-helix-PAS protein MOP9, or brain and muscle ARNT-like 2 (BMAL2), or CYCLE-like factor (CLIF), or Class E basic helix-loop-helix protein 6 (bHLHe6), or member of PAS protein 9, or PAS domain-containing protein 9 (PASD9), is a neuronal bHLH-PAS transcriptional factor, regulating cell cycle progression and preventing cell death, whose sustained expression might ensure brain neuron survival. It also plays important roles in tumor angiogenesis. ARNT-2 heterodimerize with other bHLH-PAS proteins such as aryl hydrocarbon receptor (AhR), hypoxia-inducible factor (HIF), and single-minded (SIM). — an NCBI CDD conserved domain (cd11469); members share this curated model.
