identifier: CDD:cd14594
label: "protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatase 12. Myotubularin related phosphoinositide phosphatase 12 (MTMR12), also called phosphatidylinositol 3 phosphate 3-phosphatase adapter subunit (3-PAP), is enzymatically inactive and contains a C-terminal coiled-coil domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR12 is a pseudophosphatase that lacks the catalytic cysteine in its catalytic pocket. It functions as an adapter for the catalytically active myotubularin to regulate its intracellular location."
definition: >-
  protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatase 12. Myotubularin related phosphoinositide phosphatase 12 (MTMR12), also called phosphatidylinositol 3 phosphate 3-phosphatase adapter subunit (3-PAP), is enzymatically inactive and contains a C-terminal coiled-coil domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR12 is a pseudophosphatase that lacks the catalytic cysteine in its catalytic pocket. It functions as an adapter for the catalytically active myotubularin to regulate its intracellular location. — an NCBI CDD conserved domain (cd14594); members share this curated model.
