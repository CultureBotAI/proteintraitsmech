identifier: CDD:cd23006
label: "Dickkopf-like protein 1. Dickkopf (Dkk) genes comprise an evolutionarily conserved small gene family of four members (Dkk1-4) and a unique Dkk3-related gene, Dkkl1, also called Dickkopf-like protein 1, cancer/testis antigen 34 (CT34), or sgy/soggy. Soggy is thought to play an important role in testicular development and spermatogenesis, and its abnormal expression may be an important factor in male infertility. It may promote spermatocyte apoptosis, thereby limiting sperm production. In adults, Dkkl1 may reduce testosterone synthesis in Leydig cells. Unlike the other members of the Dickkopf family, Soggy does not contain two conserved cysteine-rich domains (Cys-1 and Cys-2) separated by a linker region. It contains an N-terminal domain similar to that of the N-terminal region of Dkk3."
definition: >-
  Dickkopf-like protein 1. Dickkopf (Dkk) genes comprise an evolutionarily conserved small gene family of four members (Dkk1-4) and a unique Dkk3-related gene, Dkkl1, also called Dickkopf-like protein 1, cancer/testis antigen 34 (CT34), or sgy/soggy. Soggy is thought to play an important role in testicular development and spermatogenesis, and its abnormal expression may be an important factor in male infertility. It may promote spermatocyte apoptosis, thereby limiting sperm production. In adults, Dkkl1 may reduce testosterone synthesis in Leydig cells. Unlike the other members of the Dickkopf family, Soggy does not contain two conserved cysteine-rich domains (Cys-1 and Cys-2) separated by a linker region. It contains an N-terminal domain similar to that of the N-terminal region of Dkk3. — an NCBI CDD conserved domain (cd23006); members share this curated model.
