identifier: CDD:cd16450
label: "Modified RING finger, C3HGC3-type, found in RING finger and WD repeat domain-containing protein 3 (RFWD3) and similar proteins. RFWD3, also known as RING finger protein 201 (RNF201) or FLJ10520, is an E3 ubiquitin-protein ligase that forms a complex with Mdm2 and p53 to synergistically ubiquitinate p53 and acts as a positive regulator of p53 stability in response to DNA damage. It is phosphorylated by checkpoint kinase ATM/ATR and the phosphorylation mutant fails to stimulate p53 ubiquitination. RFWD3 also functions as a novel replication protein A (RPA)-associated protein involved in DNA replication checkpoint control. RFWD3 contains an N-terminal SQ-rich region followed by a RING finger domain that exhibits robust E3 ubiquitin ligase activity toward p53, a coiled-coil domain and three WD40 repeats in the C-terminus, the latter two of which may be responsible for protein-protein interaction. The RING finger in this family is a modified C3HGC3-type RING finger, but not a canonical C3H2C3-type RING-H2 finger or C3HC4-type RING-HC finger."
definition: >-
  Modified RING finger, C3HGC3-type, found in RING finger and WD repeat domain-containing protein 3 (RFWD3) and similar proteins. RFWD3, also known as RING finger protein 201 (RNF201) or FLJ10520, is an E3 ubiquitin-protein ligase that forms a complex with Mdm2 and p53 to synergistically ubiquitinate p53 and acts as a positive regulator of p53 stability in response to DNA damage. It is phosphorylated by checkpoint kinase ATM/ATR and the phosphorylation mutant fails to stimulate p53 ubiquitination. RFWD3 also functions as a novel replication protein A (RPA)-associated protein involved in DNA replication checkpoint control. RFWD3 contains an N-terminal SQ-rich region followed by a RING finger domain that exhibits robust E3 ubiquitin ligase activity toward p53, a coiled-coil domain and three WD40 repeats in the C-terminus, the latter two of which may be responsible for protein-protein interaction. The RING finger in this family is a modified C3HGC3-type RING finger, but not a canonical C3H2C3-type RING-H2 finger or C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16450); members share this curated model.
