identifier: CDD:cd13740
label: "PRY/SPRY domain in tripartite motif-binding protein 7 (TRIM7). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of tripartite motif-containing protein 7 (TRIM7), also referred to as glycogenin-interacting protein (GNIP) or RING finger protein 90 (RNF90). TRIM7 or GNIP interacts with glycogenin and stimulates its self-glucosylating activity via its SPRY domain. The GNIP gene encodes at least four distinct isoforms of GNIP, of which three (GNIP1, GNIP2, and GNIP3) have the B30.2 domain."
definition: >-
  PRY/SPRY domain in tripartite motif-binding protein 7 (TRIM7). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of tripartite motif-containing protein 7 (TRIM7), also referred to as glycogenin-interacting protein (GNIP) or RING finger protein 90 (RNF90). TRIM7 or GNIP interacts with glycogenin and stimulates its self-glucosylating activity via its SPRY domain. The GNIP gene encodes at least four distinct isoforms of GNIP, of which three (GNIP1, GNIP2, and GNIP3) have the B30.2 domain. — an NCBI CDD conserved domain (cd13740); members share this curated model.
