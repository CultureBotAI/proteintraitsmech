identifier: CDD:cd17697
label: "RUN domain found in RUN and FYVE domain-containing protein 4 (RUFY4) and similar proteins. RUFY4 acts as a positive regulator that enhances autophagy and lysosome tethering in response to Interleukin-4. It is expressed in a cell-specific manner or under specific immunological conditions associated with IL4 expression such as allergic asthma. RUFY4 belongs to the FUFY protein family which is characterized by the presence of an N-terminal RUN domain and a C-terminal FYVE domain; this model represents the RUN domain of RUFY4."
definition: >-
  RUN domain found in RUN and FYVE domain-containing protein 4 (RUFY4) and similar proteins. RUFY4 acts as a positive regulator that enhances autophagy and lysosome tethering in response to Interleukin-4. It is expressed in a cell-specific manner or under specific immunological conditions associated with IL4 expression such as allergic asthma. RUFY4 belongs to the FUFY protein family which is characterized by the presence of an N-terminal RUN domain and a C-terminal FYVE domain; this model represents the RUN domain of RUFY4. — an NCBI CDD conserved domain (cd17697); members share this curated model.
