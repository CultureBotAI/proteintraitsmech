identifier: CDD:sd00044
label: "HEAT repeats. The canonical HEAT repeat consists of two helices forming a helical hairpin. HEAT repeats are found in a diverse family of proteins, including the four proteins from which its name is based: Huntingtin, Elongation factor 3, the PR65/A subunit of protein phosphatase 2A (PP2A), and the lipid kinase TOR (target of rapamycin). The HEAT repeat family is related to armadillo (ARM)/beta-catenin-like repeats."
definition: >-
  HEAT repeats. The canonical HEAT repeat consists of two helices forming a helical hairpin. HEAT repeats are found in a diverse family of proteins, including the four proteins from which its name is based: Huntingtin, Elongation factor 3, the PR65/A subunit of protein phosphatase 2A (PP2A), and the lipid kinase TOR (target of rapamycin). The HEAT repeat family is related to armadillo (ARM)/beta-catenin-like repeats. — an NCBI CDD conserved domain (sd00044); members share this curated model.
