identifier: CDD:cd19676
label: "UBR-box found in F-box only protein 11 (FBXO11) and similar proteins. FBXO11 (also called UBR6, protein arginine N-methyltransferase 9 (PRMT9), or vitiligo-associated protein 1 (VIT-1)) is an E3 ubiquitin ligase and a type II methyltransferase, which functions as a key regulator of tumor initiation and progression. FBXO11 is a substrate recognition component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as DTL/CDT2, BCL6 and PRDM1/BLIMP1. FBXO11 does not bind N-terminal signals."
definition: >-
  UBR-box found in F-box only protein 11 (FBXO11) and similar proteins. FBXO11 (also called UBR6, protein arginine N-methyltransferase 9 (PRMT9), or vitiligo-associated protein 1 (VIT-1)) is an E3 ubiquitin ligase and a type II methyltransferase, which functions as a key regulator of tumor initiation and progression. FBXO11 is a substrate recognition component of a SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as DTL/CDT2, BCL6 and PRDM1/BLIMP1. FBXO11 does not bind N-terminal signals. — an NCBI CDD conserved domain (cd19676); members share this curated model.
