identifier: CDD:cd11888
label: "Src Homology 3 domain of Rho GTPase-activating protein 9 and similar proteins. This subfamily is composed of Rho GTPase-activating proteins including mammalian ARHGAP9, and vertebrate ARHGAPs 12 and 27. RhoGAPs (or ARHGAPs) bind to Rho proteins and enhance the hydrolysis rates of bound GTP. ARHGAP9 functions as a GAP for Rac and Cdc42, but not for RhoA. It negatively regulates cell migration and adhesion. It also acts as a docking protein for the MAP kinases Erk2 and p38alpha, and may facilitate cross-talk between the Rho GTPase and MAPK pathways to control actin remodeling. ARHGAP27, also called CAMGAP1, shows GAP activity towards Rac1 and Cdc42. It binds the adaptor protein CIN85 and may play a role in clathrin-mediated endocytosis. ARHGAP12 has been shown to display GAP activity towards Rac1. It plays a role in regulating HFG-driven cell growth and invasiveness. ARHGAPs in this subfamily contain SH3, WW, Pleckstin homology (PH), and RhoGAP domains. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Rho GTPase-activating protein 9 and similar proteins. This subfamily is composed of Rho GTPase-activating proteins including mammalian ARHGAP9, and vertebrate ARHGAPs 12 and 27. RhoGAPs (or ARHGAPs) bind to Rho proteins and enhance the hydrolysis rates of bound GTP. ARHGAP9 functions as a GAP for Rac and Cdc42, but not for RhoA. It negatively regulates cell migration and adhesion. It also acts as a docking protein for the MAP kinases Erk2 and p38alpha, and may facilitate cross-talk between the Rho GTPase and MAPK pathways to control actin remodeling. ARHGAP27, also called CAMGAP1, shows GAP activity towards Rac1 and Cdc42. It binds the adaptor protein CIN85 and may play a role in clathrin-mediated endocytosis. ARHGAP12 has been shown to display GAP activity towards Rac1. It plays a role in regulating HFG-driven cell growth and invasiveness. ARHGAPs in this subfamily contain SH3, WW, Pleckstin homology (PH), and RhoGAP domains. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11888); members share this curated model.
