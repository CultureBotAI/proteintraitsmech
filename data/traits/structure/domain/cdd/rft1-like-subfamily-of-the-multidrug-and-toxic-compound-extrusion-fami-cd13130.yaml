identifier: CDD:cd13130
label: "Rft1-like subfamily of the multidrug and toxic compound extrusion family (MATE). This eukaryotic family may function as a transporter, shuttling phospholipids, lipopolysaccharides or oligosaccharides from cytoplasmic to the lumenal side of the endoplasmic reticulum. Proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. MATE has also been identified as a large multigene family in plants, where the proteins are linked to disease resistance."
definition: >-
  Rft1-like subfamily of the multidrug and toxic compound extrusion family (MATE). This eukaryotic family may function as a transporter, shuttling phospholipids, lipopolysaccharides or oligosaccharides from cytoplasmic to the lumenal side of the endoplasmic reticulum. Proteins from the MATE family are involved in exporting metabolites across the cell membrane and are responsible for multidrug resistance (MDR) in many bacteria and animals. MATE has also been identified as a large multigene family in plants, where the proteins are linked to disease resistance. — an NCBI CDD conserved domain (cd13130); members share this curated model.
