identifier: CDD:cd14116
label: "Catalytic domain of the Serine/Threonine kinase, Aurora-A kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Aurora kinases are key regulators of mitosis and are essential for the accurate and equal division of genomic material from parent to daughter cells. Vertebrates contain at least 2 Aurora kinases (A and B); mammals contains a third Aurora kinase gene (C). Aurora-A regulates cell cycle events from the late S-phase through the M-phase including centrosome maturation, mitotic entry, centrosome separation, spindle assembly, chromosome alignment, cytokinesis, and mitotic exit. Aurora-A activation depends on its autophosphorylation and binding to the microtubule-associated protein TPX2, which also localizes the kinase to spindle microtubules. Aurora-A is overexpressed in many cancer types such as prostate, ovarian, breast, bladder, gastric, and pancreatic. The Aurora subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Aurora-A kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Aurora kinases are key regulators of mitosis and are essential for the accurate and equal division of genomic material from parent to daughter cells. Vertebrates contain at least 2 Aurora kinases (A and B); mammals contains a third Aurora kinase gene (C). Aurora-A regulates cell cycle events from the late S-phase through the M-phase including centrosome maturation, mitotic entry, centrosome separation, spindle assembly, chromosome alignment, cytokinesis, and mitotic exit. Aurora-A activation depends on its autophosphorylation and binding to the microtubule-associated protein TPX2, which also localizes the kinase to spindle microtubules. Aurora-A is overexpressed in many cancer types such as prostate, ovarian, breast, bladder, gastric, and pancreatic. The Aurora subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14116); members share this curated model.
