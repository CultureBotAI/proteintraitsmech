identifier: CDD:cd07746
label: "Glycosyl hydrolases family 15 glucoamylase catalytic domain. Glucoamylase (GA; glucan 1,4-alpha-glucosidase; 4-alpha-D-glucan glucohydrolase; amyloglucosidase; exo-1,4-alpha-glucosidase; gamma-amylase; lysosomal alpha-glucosidase; EC 3.2.1.3) is classified into the glycoside hydrolase family 15 (GH15) and it hydrolyzes alpha-1,4-glucosidic linkages of starch, glycogen and malto-oligosaccharides, releasing beta-D-glucose from the non-reducing end. It is also able to degrade alpha-1,6-glucosidic linkages although much less effectively (for example, when the next bond in the sequence is 1,4). All GAs possess all-helical catalytic domains but some have an additional all-beta starch-binding domain (SBD) or carbohydrate-binding module CBM) at the N or C-terminus. Glucoamylases are used primarily in industrial processes in the production of food and ethanol."
definition: >-
