identifier: CDD:cd05431
label: "Nucleotidyltransferase (NT) domain of Haemophilus influenzae HI0073, and related proteins. NT_HI0073_like: catalytic nucleotidyltransferase (NT) domains found in proteins similar to Haemophilus influenzae HI0073. HI0073, the nucleotide-binding domain of a two-component NT complex, forms a 2:2 heterotetramer with the protein HI0074. The HI0073/HI0074 ORFs form an operon, having the HI0073 homolog downstream of the HI0074 homolog. Structurally HI0074 is related to the substrate-binding domain of Staphylococcus aureus kanamycin NT (KNTase). Little is known about the substrate specificity or function of the two-component NTs. Proteins in this group belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these two-component NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of Haemophilus influenzae HI0073, and related proteins. NT_HI0073_like: catalytic nucleotidyltransferase (NT) domains found in proteins similar to Haemophilus influenzae HI0073. HI0073, the nucleotide-binding domain of a two-component NT complex, forms a 2:2 heterotetramer with the protein HI0074. The HI0073/HI0074 ORFs form an operon, having the HI0073 homolog downstream of the HI0074 homolog. Structurally HI0074 is related to the substrate-binding domain of Staphylococcus aureus kanamycin NT (KNTase). Little is known about the substrate specificity or function of the two-component NTs. Proteins in this group belong to the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these two-component NT domains. — an NCBI CDD conserved domain (cd05431); members share this curated model.
