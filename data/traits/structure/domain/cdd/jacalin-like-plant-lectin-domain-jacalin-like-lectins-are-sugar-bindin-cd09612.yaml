identifier: CDD:cd09612
label: "Jacalin-like plant lectin domain. Jacalin-like lectins are sugar-binding protein domains mostly found in plants. They adopt a beta-prism topology consistent with a circularly permuted three-fold repeat of a structural motif. Proteins containing this domain may bind mono- or oligosaccharides with high specificity. The domain can occur in tandem-repeat arrangements with up to six copies, and in architectures combined with a variety of other functional domains. The family was initially named after an abundant protein found in the jackfruit seed. Jacalin specifically binds to the alpha-O-glycoside of the disaccharide Gal-beta1-3-GalNAc, and has proven useful in the study of O-linked glycoproteins. Jacalin-like lectins in this family may occur in various oligomerization states."
definition: >-
  Jacalin-like plant lectin domain. Jacalin-like lectins are sugar-binding protein domains mostly found in plants. They adopt a beta-prism topology consistent with a circularly permuted three-fold repeat of a structural motif. Proteins containing this domain may bind mono- or oligosaccharides with high specificity. The domain can occur in tandem-repeat arrangements with up to six copies, and in architectures combined with a variety of other functional domains. The family was initially named after an abundant protein found in the jackfruit seed. Jacalin specifically binds to the alpha-O-glycoside of the disaccharide Gal-beta1-3-GalNAc, and has proven useful in the study of O-linked glycoproteins. Jacalin-like lectins in this family may occur in various oligomerization states. — an NCBI CDD conserved domain (cd09612); members share this curated model.
