identifier: CDD:cd02286
label: "Glucose-Fructose Oxidoreductase and similar proteins (GFOR-like); GFOR is a homotetrameric enzyme that catalyzes the NADP+-dependent oxidation of glucose to gluconolactone and reduction of fructose to sorbitol. This group also  includes the dimeric trans-dihydrodiol dehydrogenases (D-trans-diol-DH) which catalyze the NADP+-linked oxidation of trans-dihydrodiols of aromatic hydrocarbons; and sequences similar to the deduced ORF334 product of the rhizopine catabolism mocC-mocA intergenic region of Rhizobium meliloti L5-30; and also sequences similar to the unknown gene product of an embryo-specific cDNA clone of Daucus carota, AX110P. Also included in this CD, is a lineage specific group of sugar ketoreductases involved in antibiotic biosynthesis, such as the Streptomyces argillaceus, MtmU, D-oliose 4-ketoreductase involved in one of the earliest steps of biosynthesis of the sugar moieties of the antitumor polyketide mithramycin. These proteins contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and are member of the GFOR superfamily of proteins."
definition: >-
  Glucose-Fructose Oxidoreductase and similar proteins (GFOR-like); GFOR is a homotetrameric enzyme that catalyzes the NADP+-dependent oxidation of glucose to gluconolactone and reduction of fructose to sorbitol. This group also includes the dimeric trans-dihydrodiol dehydrogenases (D-trans-diol-DH) which catalyze the NADP+-linked oxidation of trans-dihydrodiols of aromatic hydrocarbons; and sequences similar to the deduced ORF334 product of the rhizopine catabolism mocC-mocA intergenic region of Rhizobium meliloti L5-30; and also sequences similar to the unknown gene product of an embryo-specific cDNA clone of Daucus carota, AX110P. Also included in this CD, is a lineage specific group of sugar ketoreductases involved in antibiotic biosynthesis, such as the Streptomyces argillaceus, MtmU, D-oliose 4-ketoreductase involved in one of the earliest steps of biosynthesis of the sugar moieties of the antitumor polyketide mithramycin. These proteins contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and are member of the GFOR superfamily of proteins. — an NCBI CDD conserved domain (cd02286); members share this curated model.
