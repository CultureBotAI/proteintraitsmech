label: "Putative catalytic domain of uncharacterized phospholipase D-like proteins. Putative catalytic domain of uncharacterized phospholipase D (PLD, EC 3.1.4.4)-like proteins. Members of this subfamily contain one copy of HKD motif (H-x-K-x(4)-D, where x represents any amino acid residue) that characterizes the PLD superfamily."
