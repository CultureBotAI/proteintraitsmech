identifier: CDD:cd13219
label: "C2 and GRAM domain-containing protein Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain. C2GRAM contains two N-terminal C2 domains followed by a single PH-GRAM domain. Since it contains both of these domains it is assumed that this gene cross-links both calcium and phosphoinositide signaling pathways. In general he C2 domain is involved in binding phospholipids in a calcium dependent manner or calcium independent manner. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold."
definition: >-
  C2 and GRAM domain-containing protein Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain. C2GRAM contains two N-terminal C2 domains followed by a single PH-GRAM domain. Since it contains both of these domains it is assumed that this gene cross-links both calcium and phosphoinositide signaling pathways. In general he C2 domain is involved in binding phospholipids in a calcium dependent manner or calcium independent manner. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold. — an NCBI CDD conserved domain (cd13219); members share this curated model.
