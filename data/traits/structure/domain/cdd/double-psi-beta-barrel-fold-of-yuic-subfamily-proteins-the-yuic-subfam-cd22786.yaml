identifier: CDD:cd22786
label: "double-psi beta-barrel fold of YuiC subfamily proteins. The YuiC subfamily includes a group of conserved double-psi beta-barrel (DPBB) fold proteins, such as Bacillus subtilis protein YuiC, cell wall shaping protein YabE, cell wall-binding protein YocH, as well as Clostridium tetani phosphatase-associated protein PapQ. YuiC is a Firmicute stationary phase survival (Sps) protein that closely resembles the Barwin-like endoglucanase beta barrel of MltA. It is a double-psi beta-barrel (DPBB) fold that consists of two interlocked \"psi-structure\" motifs related by a pseudo-2-fold axis and may be involved in substrate binding and catalysis."
definition: >-
  double-psi beta-barrel fold of YuiC subfamily proteins. The YuiC subfamily includes a group of conserved double-psi beta-barrel (DPBB) fold proteins, such as Bacillus subtilis protein YuiC, cell wall shaping protein YabE, cell wall-binding protein YocH, as well as Clostridium tetani phosphatase-associated protein PapQ. YuiC is a Firmicute stationary phase survival (Sps) protein that closely resembles the Barwin-like endoglucanase beta barrel of MltA. It is a double-psi beta-barrel (DPBB) fold that consists of two interlocked "psi-structure" motifs related by a pseudo-2-fold axis and may be involved in substrate binding and catalysis. — an NCBI CDD conserved domain (cd22786); members share this curated model.
