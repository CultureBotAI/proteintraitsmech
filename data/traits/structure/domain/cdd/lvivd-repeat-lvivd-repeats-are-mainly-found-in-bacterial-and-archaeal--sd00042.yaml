identifier: CDD:sd00042
label: "LVIVD repeat. LVIVD repeats are mainly found in bacterial and archaeal cell surface proteins, many of them hypothetical. Structurally, LVIVD repeats have been predicted to form a beta-propeller, with each repeat forming one four-stranded anti-parallel beta-sheet blade."
definition: >-
  LVIVD repeat. LVIVD repeats are mainly found in bacterial and archaeal cell surface proteins, many of them hypothetical. Structurally, LVIVD repeats have been predicted to form a beta-propeller, with each repeat forming one four-stranded anti-parallel beta-sheet blade. — an NCBI CDD conserved domain (sd00042); members share this curated model.
