identifier: CDD:cd23683
label: "C-terminal domain of intraflagellar transport protein 52 (IFT52) and similar proteins. IFT52 is involved in ciliogenesis as part of a complex involved in intraflagellar transport (IFT), the bi-directional movement of particles required for the assembly, maintenance, and functioning of primary cilia. It is required for the anterograde transport of IFT88. IFT52 is a component of the IFT complex B that consists of a 9-subunit salt-stable core and several peripheral subunits. The model corresponds to the C-terminal domain of IFT52, which is responsible for binding to the C-terminal domain of IFT46."
definition: >-
  C-terminal domain of intraflagellar transport protein 52 (IFT52) and similar proteins. IFT52 is involved in ciliogenesis as part of a complex involved in intraflagellar transport (IFT), the bi-directional movement of particles required for the assembly, maintenance, and functioning of primary cilia. It is required for the anterograde transport of IFT88. IFT52 is a component of the IFT complex B that consists of a 9-subunit salt-stable core and several peripheral subunits. The model corresponds to the C-terminal domain of IFT52, which is responsible for binding to the C-terminal domain of IFT46. — an NCBI CDD conserved domain (cd23683); members share this curated model.
