identifier: CDD:cd16352
label: "chemotaxis protein CheD stimulates methylation of methyl-accepting chemotaxis proteins. This family contains bacterial chemotaxis protein CheD that stimulates methylation of methyl-accepting chemotaxis proteins (MCPs). The CheD chemotaxis gene is not found in the Escherichia coli genome, but is present in many other organisms, including B. subtilis, where CheD appears to have two separate roles; it binds to chemoreceptors to activate them as part of the CheC/CheD/CheYp adaptation system, and it deamidates selected residues to activate chemoreceptors, enabling them to mediate amino acid chemotaxis. CheD has been shown to catalyze amide hydrolysis of specific glutaminyl side chains of the B. subtilis chemoreceptors McpA, McpB and McpC; deamination by CheD is required for the chemoreceptors to effectively transduce signals to the CheA kinase. CheD's ability to bind the receptors is controlled by CheC via a competitive binding mechanism; substituting Gln into the receptor motif of the signal-terminating phosphatase, CheC, turns the inhibitor into a receptor-modifying deamidase CheD substrate.  Also, CheYp increases the affinity of CheD for CheC, controlling CheD binding to the receptors through its interactions with CheC. Thus, high levels of CheYp means CheC is a better binding target for CheD than the receptors, resulting in decreased CheA activity. The CheD structure reveals a distant homology with a class of bacterial toxins represented by the cytotoxic necrotizing factor 1 (CNF1) as well as a class of proteins of unknown function represented by B. subtilis YfiH. An invariant Cys-His pair forming a catalytic dyad is observed, and is required by the toxins for deamidation activity."
definition: >-
  chemotaxis protein CheD stimulates methylation of methyl-accepting chemotaxis proteins. This family contains bacterial chemotaxis protein CheD that stimulates methylation of methyl-accepting chemotaxis proteins (MCPs). The CheD chemotaxis gene is not found in the Escherichia coli genome, but is present in many other organisms, including B. subtilis, where CheD appears to have two separate roles; it binds to chemoreceptors to activate them as part of the CheC/CheD/CheYp adaptation system, and it deamidates selected residues to activate chemoreceptors, enabling them to mediate amino acid chemotaxis. CheD has been shown to catalyze amide hydrolysis of specific glutaminyl side chains of the B. subtilis chemoreceptors McpA, McpB and McpC; deamination by CheD is required for the chemoreceptors to effectively transduce signals to the CheA kinase. CheD's ability to bind the receptors is controlled by CheC via a competitive binding mechanism; substituting Gln into the receptor motif of the signal-terminating phosphatase, CheC, turns the inhibitor into a receptor-modifying deamidase CheD substrate. Also, CheYp increases the affinity of CheD for CheC, controlling CheD binding to the receptors through its interactions with CheC. Thus, high levels of CheYp means CheC is a better binding target for CheD than the receptors, resulting in decreased CheA activity. The CheD structure reveals a distant homology with a class of bacterial toxins represented by the cytotoxic necrotizing factor 1 (CNF1) as well as a class of proteins of unknown function represented by B. subtilis YfiH. An invariant Cys-His pair forming a catalytic dyad is observed, and is required by the toxins for deamidation activity. — an NCBI CDD conserved domain (cd16352); members share this curated model.
