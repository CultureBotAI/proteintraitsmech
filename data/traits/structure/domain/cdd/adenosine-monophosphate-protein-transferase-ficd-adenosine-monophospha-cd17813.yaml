label: "adenosine monophosphate-protein transferase FICD. adenosine monophosphate-protein transferase(EC 2.7.7.n1) catalyzes the addition of adenosine 5'-monophosphate (AMP) to specific residues of target proteins. This family contains a central conserved motif HPFXXGNG, present in most members, which forms part of the ATP binding site."
