identifier: CDD:cd18532
label: "BACK (BTB and C-terminal Kelch) domain found in Rho-related BTB domain-containing protein 3 (RhoBTB3). RhoBTB3 is an atypical member of the Rho GTPase family of signaling proteins, which is characterized by containing a carboxyl terminal extension that harbors two BTB domains and a BACK domain and is capable of assembling cullin 3-dependent ubiquitin ligase complexes. It is a Golgi-associated Rho-related ATPase that regulates the S/G2 transition of the cell cycle by targeting cyclin E for ubiquitylation. RhoBTB3 is involved in vesicle trafficking and in targeting proteins for degradation in the proteasome. It binds directly to Rab9 GTPase and functions with Rab9 in protein transport from endosomes to the trans Golgi network. It also promotes proteasomal degradation of Hypoxia-inducible factor alpha (HIFalpha) by facilitating hydroxylation and ubiquitination."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Rho-related BTB domain-containing protein 3 (RhoBTB3). RhoBTB3 is an atypical member of the Rho GTPase family of signaling proteins, which is characterized by containing a carboxyl terminal extension that harbors two BTB domains and a BACK domain and is capable of assembling cullin 3-dependent ubiquitin ligase complexes. It is a Golgi-associated Rho-related ATPase that regulates the S/G2 transition of the cell cycle by targeting cyclin E for ubiquitylation. RhoBTB3 is involved in vesicle trafficking and in targeting proteins for degradation in the proteasome. It binds directly to Rab9 GTPase and functions with Rab9 in protein transport from endosomes to the trans Golgi network. It also promotes proteasomal degradation of Hypoxia-inducible factor alpha (HIFalpha) by facilitating hydroxylation and ubiquitination. — an NCBI CDD conserved domain (cd18532); members share this curated model.
