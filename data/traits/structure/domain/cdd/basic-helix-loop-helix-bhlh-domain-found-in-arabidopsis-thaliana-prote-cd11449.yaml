identifier: CDD:cd11449
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein ABA-INDUCIBLE bHLH-TYPE (AIB) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as AIB and MYC proteins (MYC2, MYC3 and MYC4). AIB, also termed AtbHLH17, or EN 35, is a transcription activator that regulates positively abscisic acid (ABA) response. MYC2, also termed protein jasmonate insensitive 1, or R-homologous Arabidopsis protein 1 (RAP-1), or AtbHLH6, or EN 38, or Z-box binding factor 1 protein, is a transcriptional activator involved in abscisic acid (ABA), jasmonic acid (JA), and light signaling pathways. MYC3, also termed protein altered tryptophan regulation 2, or AtbHLH5, or transcription factor ATR2, or EN 36, is a transcription factor involved in tryptophan, jasmonic acid (JA) and other stress-responsive gene regulation. MYC4, also termed AtbHLH4, or EN 37, is a transcription factor involved in jasmonic acid (JA) gene regulation. MYC2, together with MYC3 and MYC4, controls additively subsets of JA-dependent responses."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein ABA-INDUCIBLE bHLH-TYPE (AIB) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as AIB and MYC proteins (MYC2, MYC3 and MYC4). AIB, also termed AtbHLH17, or EN 35, is a transcription activator that regulates positively abscisic acid (ABA) response. MYC2, also termed protein jasmonate insensitive 1, or R-homologous Arabidopsis protein 1 (RAP-1), or AtbHLH6, or EN 38, or Z-box binding factor 1 protein, is a transcriptional activator involved in abscisic acid (ABA), jasmonic acid (JA), and light signaling pathways. MYC3, also termed protein altered tryptophan regulation 2, or AtbHLH5, or transcription factor ATR2, or EN 36, is a transcription factor involved in tryptophan, jasmonic acid (JA) and other stress-responsive gene regulation. MYC4, also termed AtbHLH4, or EN 37, is a transcription factor involved in jasmonic acid (JA) gene regulation. MYC2, together with MYC3 and MYC4, controls additively subsets of JA-dependent responses. — an NCBI CDD conserved domain (cd11449); members share this curated model.
