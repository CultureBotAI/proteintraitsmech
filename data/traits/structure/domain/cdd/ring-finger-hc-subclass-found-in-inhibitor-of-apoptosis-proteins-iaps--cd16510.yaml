identifier: CDD:cd16510
label: "RING finger, HC subclass, found in inhibitor of apoptosis proteins (IAPs). IAPs are frequently overexpressed in cancer and associated with tumor cell survival, chemoresistance, disease progression, and poor prognosis. They function primarily as negative regulators of cell death. They regulate caspases and apoptosis through the inhibition of specific members of the caspase family of cysteine proteases. In addition, IAPs has been implicated in a multitude of other cellular processes, including inflammatory signalling and immunity, mitogenic kinase signalling, proliferation and mitosis, as well as cell invasion and metastasis. IAPs in this family includes cellular inhibitor of apoptosis protein c-IAP1 (BIRC2) and c-IAP2 (BIRC3), XIAP (BIRC4), BIRC7, and BIRC8, all of which contain three N-terminal baculoviral IAP repeat (BIR) domains that enable interactions with proteins, a ubiquitin-association (UBA) domain that is responsible for the binding of polyubiquitin (polyUb), and a C3HC4-type RING-HC finger at the carboxyl terminus that is required for ubiquitin ligase activity. The UBA domain is only absent in mammalian homologs of BIRC7. Moreover, c-IAPs contains an additional caspase activation and recruitment domain (CARD) between the UBA and C3HC4-type RING-HC domains. The CARD domain may serve as a protein interaction surface."
definition: >-
  RING finger, HC subclass, found in inhibitor of apoptosis proteins (IAPs). IAPs are frequently overexpressed in cancer and associated with tumor cell survival, chemoresistance, disease progression, and poor prognosis. They function primarily as negative regulators of cell death. They regulate caspases and apoptosis through the inhibition of specific members of the caspase family of cysteine proteases. In addition, IAPs has been implicated in a multitude of other cellular processes, including inflammatory signalling and immunity, mitogenic kinase signalling, proliferation and mitosis, as well as cell invasion and metastasis. IAPs in this family includes cellular inhibitor of apoptosis protein c-IAP1 (BIRC2) and c-IAP2 (BIRC3), XIAP (BIRC4), BIRC7, and BIRC8, all of which contain three N-terminal baculoviral IAP repeat (BIR) domains that enable interactions with proteins, a ubiquitin-association (UBA) domain that is responsible for the binding of polyubiquitin (polyUb), and a C3HC4-type RING-HC finger at the carboxyl terminus that is required for ubiquitin ligase activity. The UBA domain is only absent in mammalian homologs of BIRC7. Moreover, c-IAPs contains an additional caspase activation and recruitment domain (CARD) between the UBA and C3HC4-type RING-HC domains. The CARD domain may serve as a protein interaction surface. — an NCBI CDD conserved domain (cd16510); members share this curated model.
