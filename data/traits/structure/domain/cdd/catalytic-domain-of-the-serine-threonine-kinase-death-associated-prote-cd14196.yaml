identifier: CDD:cd14196
label: "Catalytic domain of the Serine/Threonine Kinase, Death-Associated Protein Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DAPKs mediate cell death and act as tumor suppressors. They are necessary to induce cell death and their overexpression leads to death-associated changes including membrane blebbing, cell rounding, and formation of autophagic vesicles. Vertebrates contain three subfamily members with different domain architecture, localization, and function. DAPK2, also called DAPK-related protein 1 (DRP-1), is a Ca2+/calmodulin (CaM)-regulated protein containing an N-terminal kinase domain, a CaM autoinhibitory site and a dimerization module. It lacks the cytoskeletal binding regions of DAPK1 and the exogenous protein has been shown to be soluble and cytoplasmic. FLAG-tagged DAPK2, however, accumulated within membrane-enclosed autophagic vesicles. It is unclear where endogenous DAPK2 is localized. DAPK2 participates in TNF-alpha and FAS-receptor induced cell death and enhances neutrophilic maturation in myeloid leukemic cells. It contributes to the induction of anoikis and its down-regulation is implicated in the beta-catenin induced resistance of malignant epithelial cells to anoikis. The DAPK2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Death-Associated Protein Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DAPKs mediate cell death and act as tumor suppressors. They are necessary to induce cell death and their overexpression leads to death-associated changes including membrane blebbing, cell rounding, and formation of autophagic vesicles. Vertebrates contain three subfamily members with different domain architecture, localization, and function. DAPK2, also called DAPK-related protein 1 (DRP-1), is a Ca2+/calmodulin (CaM)-regulated protein containing an N-terminal kinase domain, a CaM autoinhibitory site and a dimerization module. It lacks the cytoskeletal binding regions of DAPK1 and the exogenous protein has been shown to be soluble and cytoplasmic. FLAG-tagged DAPK2, however, accumulated within membrane-enclosed autophagic vesicles. It is unclear where endogenous DAPK2 is localized. DAPK2 participates in TNF-alpha and FAS-receptor induced cell death and enhances neutrophilic maturation in myeloid leukemic cells. It contributes to the induction of anoikis and its down-regulation is implicated in the beta-catenin induced resistance of malignant epithelial cells to anoikis. The DAPK2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14196); members share this curated model.
