identifier: CDD:cd23569
label: "second extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 8 (LYPD8) and similar proteins. LYPD8 is a highly glycosylated glycosylphosphatidylinositol-anchored secreted protein selectively expressed on colonic enterocytes. It mediates segregation of intestinal bacteria and epithelial cells in the colon to preserve intestinal homeostasis. LYPD8 regulates the proliferation and migration of colorectal cancer cells through inhibiting the secretion of interleukin 6 (IL 6) and tumor necrosis factor alpha (TNF alpha). LYPD8 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD."
definition: >-
  second extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 8 (LYPD8) and similar proteins. LYPD8 is a highly glycosylated glycosylphosphatidylinositol-anchored secreted protein selectively expressed on colonic enterocytes. It mediates segregation of intestinal bacteria and epithelial cells in the colon to preserve intestinal homeostasis. LYPD8 regulates the proliferation and migration of colorectal cancer cells through inhibiting the secretion of interleukin 6 (IL 6) and tumor necrosis factor alpha (TNF alpha). LYPD8 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD. — an NCBI CDD conserved domain (cd23569); members share this curated model.
