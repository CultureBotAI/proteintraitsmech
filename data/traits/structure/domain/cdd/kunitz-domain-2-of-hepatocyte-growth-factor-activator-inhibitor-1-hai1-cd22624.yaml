identifier: CDD:cd22624
label: "Kunitz domain 2 of hepatocyte growth factor activator inhibitor-1 (HAI1). This model includes Kunitz domain 2 (KD2) of hepatocyte growth factor activator inhibitor type 1 (HAI-1 or HAI1, also known as Kunitz-type protease inhibitor 1), a membrane-bound multidomain protein essential to the integrity of the basement membrane during placental development. HAI-1 contains an extracellular region and several internal domains that include two Kunitz domains separated in sequence but spatially closed to each other, and their interdomain interactions have evolved to stimulate the inhibitory activity of an integrated Kunitz. While the Kunitz domain 1 (KD1) is the major inhibitory domain of HAI-1 and involved in auto-inhibition of the extracellular region via steric blockage of its active site in the HAI-1 compact tertiary structure, studies show that deletion of HAI-1 Kunitz domain 2 (KD2) and the extracellular region enhanced inhibition of matriptase. HAI-1 KD2 has been shown to have potent inhibitory activity against trypsin, but it cannot inhibit hepatocyte growth factor activator (HGFA), and matriptase. HAI-1 is also important in maintaining postnatal homeostasis in many tissues, including keratinization of the epidermis, hair development, colonic epithelium integrity, proliferation and cell fate of neural progenitor cells, and tissue injury and repair. The interaction between HAI-1 and matriptase is critical for tissue morphogenesis and cellular biology. HAI-1:matriptase ratio imbalance results in tumorigenesis; slight overexpression of matriptase relative to HAI-1 causes spontaneous squamous cell carcinoma, a phenotype that can be effectively reversed back to wild type by additional expression of HAI-1, indicating the need for a tight functional relationship between the two to maintain homeostasis. The structure of KD2 is similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz domain 2 of hepatocyte growth factor activator inhibitor-1 (HAI1). This model includes Kunitz domain 2 (KD2) of hepatocyte growth factor activator inhibitor type 1 (HAI-1 or HAI1, also known as Kunitz-type protease inhibitor 1), a membrane-bound multidomain protein essential to the integrity of the basement membrane during placental development. HAI-1 contains an extracellular region and several internal domains that include two Kunitz domains separated in sequence but spatially closed to each other, and their interdomain interactions have evolved to stimulate the inhibitory activity of an integrated Kunitz. While the Kunitz domain 1 (KD1) is the major inhibitory domain of HAI-1 and involved in auto-inhibition of the extracellular region via steric blockage of its active site in the HAI-1 compact tertiary structure, studies show that deletion of HAI-1 Kunitz domain 2 (KD2) and the extracellular region enhanced inhibition of matriptase. HAI-1 KD2 has been shown to have potent inhibitory activity against trypsin, but it cannot inhibit hepatocyte growth factor activator (HGFA), and matriptase. HAI-1 is also important in maintaining postnatal homeostasis in many tissues, including keratinization of the epidermis, hair development, colonic epithelium integrity, proliferation and cell fate of neural progenitor cells, and tissue injury and repair. The interaction between HAI-1 and matriptase is critical for tissue morphogenesis and cellular biology. HAI-1:matriptase ratio imbalance results in tumorigenesis; slight overexpression of matriptase relative to HAI-1 causes spontaneous squamous cell carcinoma, a phenotype that can be effectively reversed back to wild type by additional expression of HAI-1, indicating the need for a tight functional relationship between the two to maintain homeostasis. The structure of KD2 is similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22624); members share this curated model.
