identifier: CDD:cd01760
label: "Ras-binding domain (RBD), structurally similar to a beta-grasp ubiquitin-like fold. The RBD of the serine/threonine kinase Raf is structurally similar to the beta-grasp fold of ubiquitin, a common structure involved in protein-protein interactions. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. A Raf-like RBD is also present in Regulator of G protein Signaling (RGS12 and RGS14) members of GTPase activating proteins."
definition: >-
  Ras-binding domain (RBD), structurally similar to a beta-grasp ubiquitin-like fold. The RBD of the serine/threonine kinase Raf is structurally similar to the beta-grasp fold of ubiquitin, a common structure involved in protein-protein interactions. Ubiquitin (Ub) is a protein modifier in eukaryotes that is involved in various cellular processes, including transcriptional regulation, cell cycle control, and DNA repair. A Raf-like RBD is also present in Regulator of G protein Signaling (RGS12 and RGS14) members of GTPase activating proteins. — an NCBI CDD conserved domain (cd01760); members share this curated model.
