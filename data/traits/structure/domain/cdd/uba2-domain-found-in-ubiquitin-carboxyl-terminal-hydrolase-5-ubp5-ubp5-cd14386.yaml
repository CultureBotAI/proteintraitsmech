identifier: CDD:cd14386
label: "UBA2 domain found in ubiquitin carboxyl-terminal hydrolase 5 (UBP5). UBP5, also called deubiquitinating enzyme 5, Isopeptidase T (IsoT), ubiquitin thioesterase 5, or ubiquitin-specific-processing protease 5, is a deubiquitinating enzyme largely responsible for the disassembly of the majority of unanchored polyubiquitin in the cell. Zinc is required for its catalytic activity. UBP5 contains four ubiquitin (Ub)-binding sites including an N-terminal zinc finger (ZnF) domain, a catalytic ubiquitin-specific processing protease (UBP) domain (catalytic C-box and H-box), and two ubiquitin-associated (UBA) domains. ZnF domain binds the proximal ubiquitin. UBP domain forms the active site. UBA domains are involved in binding linear or K48-linked polyubiquitin. This model corresponds to the UBA2 domain."
definition: >-
  UBA2 domain found in ubiquitin carboxyl-terminal hydrolase 5 (UBP5). UBP5, also called deubiquitinating enzyme 5, Isopeptidase T (IsoT), ubiquitin thioesterase 5, or ubiquitin-specific-processing protease 5, is a deubiquitinating enzyme largely responsible for the disassembly of the majority of unanchored polyubiquitin in the cell. Zinc is required for its catalytic activity. UBP5 contains four ubiquitin (Ub)-binding sites including an N-terminal zinc finger (ZnF) domain, a catalytic ubiquitin-specific processing protease (UBP) domain (catalytic C-box and H-box), and two ubiquitin-associated (UBA) domains. ZnF domain binds the proximal ubiquitin. UBP domain forms the active site. UBA domains are involved in binding linear or K48-linked polyubiquitin. This model corresponds to the UBA2 domain. — an NCBI CDD conserved domain (cd14386); members share this curated model.
