identifier: CDD:cd13990
label: "Catalytic domain of the Serine/Threonine kinase, Tousled-Like Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TLKs play important functions during the cell cycle and are implicated in chromatin remodeling, DNA replication and repair, and mitosis. They phosphorylate and regulate Anti-silencing function 1 protein (Asf1), a histone H3/H4 chaperone that helps facilitate the assembly of chromatin following DNA replication during S phase. TLKs also phosphorylate the H3 histone tail and are essential in transcription. Vertebrates contain two subfamily members, TLK1 and TLK2. The TLK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Tousled-Like Kinase. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. TLKs play important functions during the cell cycle and are implicated in chromatin remodeling, DNA replication and repair, and mitosis. They phosphorylate and regulate Anti-silencing function 1 protein (Asf1), a histone H3/H4 chaperone that helps facilitate the assembly of chromatin following DNA replication during S phase. TLKs also phosphorylate the H3 histone tail and are essential in transcription. Vertebrates contain two subfamily members, TLK1 and TLK2. The TLK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd13990); members share this curated model.
