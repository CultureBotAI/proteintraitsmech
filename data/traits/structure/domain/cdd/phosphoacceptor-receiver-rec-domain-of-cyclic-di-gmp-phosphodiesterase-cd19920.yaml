identifier: CDD:cd19920
label: "phosphoacceptor receiver (REC) domain of cyclic di-GMP phosphodiesterase PA4781 and similar domains. Pseudomonas aeruginosa cyclic di-GMP phosphodiesterase PA4781 contains an N-terminal REC domain and a C-terminal catalytic HD-GYP domain, characteristics of RpfG family response regulators. PA4781 is involved in cyclic di-3',5'-GMP (c-di-GMP) hydrolysis/degradation in a two-step reaction via the linear intermediate pGpG to produce GMP. Its unphosphorylated REC domain prevents accessibility of c-di-GMP to the active site. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of cyclic di-GMP phosphodiesterase PA4781 and similar domains. Pseudomonas aeruginosa cyclic di-GMP phosphodiesterase PA4781 contains an N-terminal REC domain and a C-terminal catalytic HD-GYP domain, characteristics of RpfG family response regulators. PA4781 is involved in cyclic di-3',5'-GMP (c-di-GMP) hydrolysis/degradation in a two-step reaction via the linear intermediate pGpG to produce GMP. Its unphosphorylated REC domain prevents accessibility of c-di-GMP to the active site. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19920); members share this curated model.
