identifier: CDD:cd23486
label: "first ricin B-type lectin domain, beta-trefoil fold, found in Cinnamomum camphora type II ribosome-inactivating protein (RIP) cinnamomin and similar proteins. RIPs are a group of ribotoxins that inhibit mammalian protein biosynthesis by irreversible inactivation of their 60S ribosomal subunit. Type II RIPs in plant cells comprise part of the plant's defense system towards animals. Cinnamomin is a type II RIP isolated from Cinnamomum camphora seeds. It shows inhibitory effects on cultured carcinoma cells and on the larvae of bollworm and mosquito. There are three cinnamomin isoforms (I, II, III). They are composed of two polypeptide chains (A- and B-chain) linked by a disulfide bond. The A-chain displays specific activity as an RNA N-glycosidase that blocks protein synthesis, whereas the B-chain is responsible for the binding to galactose-terminated receptors on cell membranes. The B-chain contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. This model corresponds to the first ricin B-type lectin domain."
definition: >-
  first ricin B-type lectin domain, beta-trefoil fold, found in Cinnamomum camphora type II ribosome-inactivating protein (RIP) cinnamomin and similar proteins. RIPs are a group of ribotoxins that inhibit mammalian protein biosynthesis by irreversible inactivation of their 60S ribosomal subunit. Type II RIPs in plant cells comprise part of the plant's defense system towards animals. Cinnamomin is a type II RIP isolated from Cinnamomum camphora seeds. It shows inhibitory effects on cultured carcinoma cells and on the larvae of bollworm and mosquito. There are three cinnamomin isoforms (I, II, III). They are composed of two polypeptide chains (A- and B-chain) linked by a disulfide bond. The A-chain displays specific activity as an RNA N-glycosidase that blocks protein synthesis, whereas the B-chain is responsible for the binding to galactose-terminated receptors on cell membranes. The B-chain contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. This model corresponds to the first ricin B-type lectin domain. — an NCBI CDD conserved domain (cd23486); members share this curated model.
