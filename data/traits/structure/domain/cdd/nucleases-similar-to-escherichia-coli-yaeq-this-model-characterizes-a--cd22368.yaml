identifier: CDD:cd22368
label: "Nucleases similar to Escherichia coli YaeQ. This model characterizes a diverse set of poorly characterized nucleases such as Escherichia coli YaeQ. They belong to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Nucleases similar to Escherichia coli YaeQ. This model characterizes a diverse set of poorly characterized nucleases such as Escherichia coli YaeQ. They belong to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22368); members share this curated model.
