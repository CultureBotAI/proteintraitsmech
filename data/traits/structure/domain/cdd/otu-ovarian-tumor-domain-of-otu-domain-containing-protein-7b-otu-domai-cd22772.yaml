identifier: CDD:cd22772
label: "OTU (ovarian tumor) domain of OTU domain-containing protein 7B. OTU domain-containing protein 7B (OTUD7B) is also called cellular zinc finger anti-NF-kappa-B protein, zinc finger A20 domain-containing protein 1, or zinc finger protein Cezanne. It is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that specifically targets Lys11-linked polyubiquitin. It functions as a negative regulator of the non-canonical NF-kappaB pathway by mediating the deubiquitination of TRAF3, an inhibitor of the NF-kappaB pathway, resulting in preventing TRAF3 proteolysis and over-activation of non-canonical NF-kappaB. OTUD7B also deubiquitinates ZAP70, and thus, regulates T cell receptor (TCR) signaling. It belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. It is classified as a family C64 cysteine protease by MEROPS."
definition: >-
  OTU (ovarian tumor) domain of OTU domain-containing protein 7B. OTU domain-containing protein 7B (OTUD7B) is also called cellular zinc finger anti-NF-kappa-B protein, zinc finger A20 domain-containing protein 1, or zinc finger protein Cezanne. It is a deubiquitinase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that specifically targets Lys11-linked polyubiquitin. It functions as a negative regulator of the non-canonical NF-kappaB pathway by mediating the deubiquitination of TRAF3, an inhibitor of the NF-kappaB pathway, resulting in preventing TRAF3 proteolysis and over-activation of non-canonical NF-kappaB. OTUD7B also deubiquitinates ZAP70, and thus, regulates T cell receptor (TCR) signaling. It belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. It is classified as a family C64 cysteine protease by MEROPS. — an NCBI CDD conserved domain (cd22772); members share this curated model.
