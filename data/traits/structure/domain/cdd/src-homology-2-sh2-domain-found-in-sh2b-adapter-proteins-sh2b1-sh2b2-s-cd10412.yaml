identifier: CDD:cd10412
label: "Src homology 2 (SH2) domain found in SH2B adapter proteins (SH2B1, SH2B2, SH2B3). SH2B3 (Lnk), like other members of the SH2B adapter protein family, contains a pleckstrin homology domain, at least one dimerization domain, and a C-terminal SH2 domain which binds to phosphorylated tyrosines in a variety of tyrosine kinases.  SH2B3 negatively regulates lymphopoiesis and early hematopoiesis. The lnk-deficiency results in enhanced production of B cells, and expansion as well as enhanced function of hematopoietic stem cells (HSCs), demonstrating negative regulatory functions of Sh2b3/Lnk in cytokine signaling. Sh2b3/Lnk also functions in responses controlled by cell adhesion and in crosstalk between integrin- and cytokine-mediated signaling. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in SH2B adapter proteins (SH2B1, SH2B2, SH2B3). SH2B3 (Lnk), like other members of the SH2B adapter protein family, contains a pleckstrin homology domain, at least one dimerization domain, and a C-terminal SH2 domain which binds to phosphorylated tyrosines in a variety of tyrosine kinases. SH2B3 negatively regulates lymphopoiesis and early hematopoiesis. The lnk-deficiency results in enhanced production of B cells, and expansion as well as enhanced function of hematopoietic stem cells (HSCs), demonstrating negative regulatory functions of Sh2b3/Lnk in cytokine signaling. Sh2b3/Lnk also functions in responses controlled by cell adhesion and in crosstalk between integrin- and cytokine-mediated signaling. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10412); members share this curated model.
