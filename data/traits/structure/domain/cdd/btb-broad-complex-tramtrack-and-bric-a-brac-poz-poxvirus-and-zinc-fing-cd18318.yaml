identifier: CDD:cd18318
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 20 (KCTD20) and BTB/POZ domain-containing protein 10 (BTBD10). KCTD20, also termed potassium channel tetramerization domain containing 20, is a positive regulator of Akt signaling. It may play an important role in regulating the death and growth of some non-nervous and nervous cells. BTBD10, also termed glucose metabolism-related protein 1 (GMRP1), plays a major role as an activator of AKT family members. It binds to Akt and protein phosphatase 2A (PP2A) and inhibits the PP2A-mediated dephosphorylation of Akt, thereby keeping Akt activated. It also plays a role in preventing motor neuronal death and accelerating the growth of pancreatic beta cells."
definition: >-
