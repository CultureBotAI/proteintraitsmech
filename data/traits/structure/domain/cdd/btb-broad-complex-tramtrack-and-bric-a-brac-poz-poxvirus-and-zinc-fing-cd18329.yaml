identifier: CDD:cd18329
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 8A (ZBTB8A). ZBTB8A, also called BTB/POZ and zinc-finger domain-containing factor or BTB/POZ and zinc-finger domains factor on chromosome 1 (BOZ-F1), is a novel proto-oncoprotein that stimulates cell proliferation. It binds to all the proximal GC boxes to repress transcription, and it inhibits p53 acetylation without affecting p53 stability. It may be involved in gastric adenocarcinoma cell differentiation, cancer invasion, and metastasis. ZBTB8A contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 8A (ZBTB8A). ZBTB8A, also called BTB/POZ and zinc-finger domain-containing factor or BTB/POZ and zinc-finger domains factor on chromosome 1 (BOZ-F1), is a novel proto-oncoprotein that stimulates cell proliferation. It binds to all the proximal GC boxes to repress transcription, and it inhibits p53 acetylation without affecting p53 stability. It may be involved in gastric adenocarcinoma cell differentiation, cancer invasion, and metastasis. ZBTB8A contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18329); members share this curated model.
