identifier: CDD:cd09576
label: "SAM domain of diacylglycerol kinase eta. SAM (sterile alpha motif) domain of DGK-eta subfamily proteins is a protein-protein interaction domain. Proteins of this subfamily are multidomain diacylglycerol kinases. The SAM domain is located at the C-terminus of two out of three isoforms of DGK-eta protein. DGK-eta proteins participate in signal transduction. They regulate the level of second messengers such as diacylglycerol and phosphatidic acid. The SAM domain of DCK-eta proteins can form high molecular weight homooligomers through head-to-tail interactions as well as heterooligomers with the SAM domain of DGK-delta proteins. The oligomerization plays a role in the regulation of the DGK-delta intracellular localization: it is responsible for sustained endosomal localization of the protein and resulted in negative regulation of DCK-eta catalytic activity."
definition: >-
  SAM domain of diacylglycerol kinase eta. SAM (sterile alpha motif) domain of DGK-eta subfamily proteins is a protein-protein interaction domain. Proteins of this subfamily are multidomain diacylglycerol kinases. The SAM domain is located at the C-terminus of two out of three isoforms of DGK-eta protein. DGK-eta proteins participate in signal transduction. They regulate the level of second messengers such as diacylglycerol and phosphatidic acid. The SAM domain of DCK-eta proteins can form high molecular weight homooligomers through head-to-tail interactions as well as heterooligomers with the SAM domain of DGK-delta proteins. The oligomerization plays a role in the regulation of the DGK-delta intracellular localization: it is responsible for sustained endosomal localization of the protein and resulted in negative regulation of DCK-eta catalytic activity. — an NCBI CDD conserved domain (cd09576); members share this curated model.
