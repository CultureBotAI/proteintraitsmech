identifier: CDD:cd19157
label: "AKR5G family of aldo-keto reductase (AKR). Bacillus subtilis glyoxal reductase (GR), uncharacterized oxidoreductase YtbE, and Bacillus aryabhattai aldo-keto reductase are founding members of aldo-keto reductase family 5 member G1-3 (AKR5G1-3), respectively. GR (YvgN, EC 1.1.1.283), also called methylglyoxal reductase, reduces glyoxal and methylglyoxal (2-oxopropanal). It is not involved in vitamin B6 biosynthesis."
definition: >-
  AKR5G family of aldo-keto reductase (AKR). Bacillus subtilis glyoxal reductase (GR), uncharacterized oxidoreductase YtbE, and Bacillus aryabhattai aldo-keto reductase are founding members of aldo-keto reductase family 5 member G1-3 (AKR5G1-3), respectively. GR (YvgN, EC 1.1.1.283), also called methylglyoxal reductase, reduces glyoxal and methylglyoxal (2-oxopropanal). It is not involved in vitamin B6 biosynthesis. — an NCBI CDD conserved domain (cd19157); members share this curated model.
