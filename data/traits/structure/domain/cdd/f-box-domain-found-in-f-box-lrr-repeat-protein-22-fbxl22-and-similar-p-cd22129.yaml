identifier: CDD:cd22129
label: "F-box domain found in F-box/LRR-repeat protein 22 (FBXL22) and similar proteins. FBXL22, also called F-box and leucine-rich repeat protein 22, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex that promotes ubiquitination of sarcomeric proteins alpha-actinin-2 (ACTN2) and filamin-C (FLNC). It acts as a cardiac-enriched F-box protein that regulates sarcomeric protein turnover and is essential for maintenance of contractile function in vivo. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
