identifier: CDD:cd16193
label: "Penta-EF hand, calcium binding motifs, found in calpain-11 (CAPN11). CAPN11, also termed calcium-activated neutral proteinase 11 (CANP 11), is a mammalian orthologue of micro/m calpain. It is one of the calpain large subunits that appears to be exclusively expressed in certain cells of the testis. It may be involved in regulating calcium-dependent signal transduction events during meiosis and sperm functional processes. CAPN11 contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain."
definition: >-
  Penta-EF hand, calcium binding motifs, found in calpain-11 (CAPN11). CAPN11, also termed calcium-activated neutral proteinase 11 (CANP 11), is a mammalian orthologue of micro/m calpain. It is one of the calpain large subunits that appears to be exclusively expressed in certain cells of the testis. It may be involved in regulating calcium-dependent signal transduction events during meiosis and sperm functional processes. CAPN11 contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. — an NCBI CDD conserved domain (cd16193); members share this curated model.
