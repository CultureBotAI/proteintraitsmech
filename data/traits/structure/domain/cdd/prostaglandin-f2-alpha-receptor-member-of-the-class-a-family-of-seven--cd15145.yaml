identifier: CDD:cd15145
label: "prostaglandin F2-alpha receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The PGF2-alpha receptor, also called prostanoid FP receptor, is a class A G-protein coupled receptor whose endogenous ligand is prostaglandin F2-alpha.  PGF2-alpha binding to this receptor is coupled to the stimulation of phospholipase C (PLC) pathway via G-protein subunit G(q).  This leads to the release of inositol trisphosphate (IP3) and diacylglycerol (DAG) which results in increased intracellular Ca2+ levels and activation of PKC.  The receptor activation primarily induces uterine contraction and bronchoconstriction, and stimulates luteolysis. Like most prostanoid receptors, the PGF2-alpha receptor has also been implicated in tumor angiogenesis and metastasis."
definition: >-
  prostaglandin F2-alpha receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The PGF2-alpha receptor, also called prostanoid FP receptor, is a class A G-protein coupled receptor whose endogenous ligand is prostaglandin F2-alpha. PGF2-alpha binding to this receptor is coupled to the stimulation of phospholipase C (PLC) pathway via G-protein subunit G(q). This leads to the release of inositol trisphosphate (IP3) and diacylglycerol (DAG) which results in increased intracellular Ca2+ levels and activation of PKC. The receptor activation primarily induces uterine contraction and bronchoconstriction, and stimulates luteolysis. Like most prostanoid receptors, the PGF2-alpha receptor has also been implicated in tumor angiogenesis and metastasis. — an NCBI CDD conserved domain (cd15145); members share this curated model.
