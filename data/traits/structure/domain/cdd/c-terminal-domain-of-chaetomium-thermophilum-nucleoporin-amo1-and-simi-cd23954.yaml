identifier: CDD:cd23954
label: "C-terminal domain of Chaetomium thermophilum nucleoporin AMO1 and similar proteins. AMO1, also known as nuclear pore protein AMO1, is a nucleoporin component of the nuclear pore complex (NPC), which is responsible for mediating the transport of macromolecules between the nucleus and the cytoplasm. Nucleoporins (NUPs) can act as both structural components of the NPC and docking or interaction partners for transiently associated nuclear transport factors. AMO1 is particularly essential for nuclear protein and mRNA export. The C-terminal domain (CTD) of AMO1 is responsible for interacting with the Nup-associated mRNA export factors Gle1. This interaction is important for coordinating the export of mRNA from the nucleus to the cytoplasm. The CTD of AMO1 is thought to play a crucial role in regulating the export of mRNAs, particularly those involved in stress responses."
