identifier: CDD:cd18489
label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 7 (BTBD7). BTBD7 is a crucial regulator that is essential for region-specific epithelial cell dynamics and branching morphogenesis. It has been implicated in various cancers. BTBD7 contains two BTB domains and a BACK domain."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing protein 7 (BTBD7). BTBD7 is a crucial regulator that is essential for region-specific epithelial cell dynamics and branching morphogenesis. It has been implicated in various cancers. BTBD7 contains two BTB domains and a BACK domain. — an NCBI CDD conserved domain (cd18489); members share this curated model.
