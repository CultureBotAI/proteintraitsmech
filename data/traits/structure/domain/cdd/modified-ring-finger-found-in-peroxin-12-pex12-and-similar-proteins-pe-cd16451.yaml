identifier: CDD:cd16451
label: "Modified RING finger found in peroxin-12 (PEX12) and similar proteins. PEX12, also known as peroxisome assembly protein 12 or peroxisome assembly factor 3 (PAF-3), is a RING finger domain-containing integral membrane peroxin required for protein import into peroxisomes. Mutations in human PEX12 result in the peroxisome deficiency Zellweger syndrome of complementation group III (CG-III), a lethal neurological disorder. PEX12 also functions as an E3-ubiquitin ligase that facilitates the PEX4-dependent monoubiquitination of PEX5, a key player in peroxisomal matrix protein import, to control PEX5 receptor recycling or degradation. PEX12 contains a modified RING finger that lacks the third, fourth, and eighth zinc-binding residues of the consensus RING finger motif, suggesting PEX12 may only bind one zinc ion."
definition: >-
  Modified RING finger found in peroxin-12 (PEX12) and similar proteins. PEX12, also known as peroxisome assembly protein 12 or peroxisome assembly factor 3 (PAF-3), is a RING finger domain-containing integral membrane peroxin required for protein import into peroxisomes. Mutations in human PEX12 result in the peroxisome deficiency Zellweger syndrome of complementation group III (CG-III), a lethal neurological disorder. PEX12 also functions as an E3-ubiquitin ligase that facilitates the PEX4-dependent monoubiquitination of PEX5, a key player in peroxisomal matrix protein import, to control PEX5 receptor recycling or degradation. PEX12 contains a modified RING finger that lacks the third, fourth, and eighth zinc-binding residues of the consensus RING finger motif, suggesting PEX12 may only bind one zinc ion. — an NCBI CDD conserved domain (cd16451); members share this curated model.
