identifier: CDD:cd00393
label: "Ribosomal_L4. Ribosomal protein L4 is an important 23S rRNA folding mediator and a repressor of its own transcription unit, the S10 operon, which encodes 10 r-proteins in addition to L4. L4 has a globular domain that sits on the surface of the large ribosomal subunit and an extended loop that penetrates its core. rRNA and mRNA interactions map to the loop and globular regions, respectively. The globular domain is structurally similar to domainII of ribosomal protein L1 and a low molecular weight phosphotyrosine phosphatase (PTPase)."
definition: >-
  Ribosomal_L4. Ribosomal protein L4 is an important 23S rRNA folding mediator and a repressor of its own transcription unit, the S10 operon, which encodes 10 r-proteins in addition to L4. L4 has a globular domain that sits on the surface of the large ribosomal subunit and an extended loop that penetrates its core. rRNA and mRNA interactions map to the loop and globular regions, respectively. The globular domain is structurally similar to domainII of ribosomal protein L1 and a low molecular weight phosphotyrosine phosphatase (PTPase). — an NCBI CDD conserved domain (cd00393); members share this curated model.
