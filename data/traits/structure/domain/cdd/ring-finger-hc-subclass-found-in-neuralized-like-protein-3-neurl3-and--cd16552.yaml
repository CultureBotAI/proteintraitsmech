identifier: CDD:cd16552
label: "RING finger, HC subclass, found in neuralized-like protein 3 (NEURL3) and similar proteins. NEURL3, also known as lung-inducible neuralized-related C3HC4 RING domain protein (LINCR), is a novel inflammation-induced E3 ubiquitin-protein ligase encoded by LINCR, a glucocorticoid-attenuated response gene induced in the lung during endotoxemia. It is expressed in alveolar epithelial type II cells, preferentially interacts with the ubiquitin-conjugating enzyme UbcH6, and generates polyubiquitin chains linked via non-canonical lysine residues. Overexpression of NEURL3 in the developing lung epithelium inhibits distal differentiation and induces cystic changes in the Notch signaling pathway. NEURL3 contains an N-terminal neuralized homology repeat (NHR) domain similar to the SPRY (SPla and the RYanodine receptor) domain and a C-terminal C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in neuralized-like protein 3 (NEURL3) and similar proteins. NEURL3, also known as lung-inducible neuralized-related C3HC4 RING domain protein (LINCR), is a novel inflammation-induced E3 ubiquitin-protein ligase encoded by LINCR, a glucocorticoid-attenuated response gene induced in the lung during endotoxemia. It is expressed in alveolar epithelial type II cells, preferentially interacts with the ubiquitin-conjugating enzyme UbcH6, and generates polyubiquitin chains linked via non-canonical lysine residues. Overexpression of NEURL3 in the developing lung epithelium inhibits distal differentiation and induces cystic changes in the Notch signaling pathway. NEURL3 contains an N-terminal neuralized homology repeat (NHR) domain similar to the SPRY (SPla and the RYanodine receptor) domain and a C-terminal C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16552); members share this curated model.
