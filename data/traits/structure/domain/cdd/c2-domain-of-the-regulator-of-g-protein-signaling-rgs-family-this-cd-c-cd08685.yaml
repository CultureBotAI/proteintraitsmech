identifier: CDD:cd08685
label: "C2 domain of the Regulator Of G-Protein Signaling (RGS) family. This CD contains members of the regulator of G-protein signaling (RGS) family. RGS is a GTPase activating protein which inhibits G-protein mediated signal transduction. The protein is largely cytosolic, but G-protein activation leads to translocation of this protein to the plasma membrane. A nuclear form of this protein has also been described, but its sequence has not been identified. There are multiple alternatively spliced transcript variants in this family with some members having additional domains (ex. PDZ and RGS) downstream of the C2 domain. The C2 domain was first identified in PKC. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins.  Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1.  However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain.  C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions."
definition: >-
  C2 domain of the Regulator Of G-Protein Signaling (RGS) family. This CD contains members of the regulator of G-protein signaling (RGS) family. RGS is a GTPase activating protein which inhibits G-protein mediated signal transduction. The protein is largely cytosolic, but G-protein activation leads to translocation of this protein to the plasma membrane. A nuclear form of this protein has also been described, but its sequence has not been identified. There are multiple alternatively spliced transcript variants in this family with some members having additional domains (ex. PDZ and RGS) downstream of the C2 domain. The C2 domain was first identified in PKC. C2 domains fold into an 8-standed beta-sandwich that can adopt 2 structural arrangements: Type I and Type II, distinguished by a circular permutation involving their N- and C-terminal beta strands. Many C2 domains are Ca2+-dependent membrane-targeting modules that bind a wide variety of substances including bind phospholipids, inositol polyphosphates, and intracellular proteins. Most C2 domain proteins are either signal transduction enzymes that contain a single C2 domain, such as protein kinase C, or membrane trafficking proteins which contain at least two C2 domains, such as synaptotagmin 1. However, there are a few exceptions to this including RIM isoforms and some splice variants of piccolo/aczonin and intersectin which only have a single C2 domain. C2 domains with a calcium binding region have negatively charged residues, primarily aspartates, that serve as ligands for calcium ions. — an NCBI CDD conserved domain (cd08685); members share this curated model.
