identifier: CDD:cd17240
label: "Ras-associating (RA) domain found in PH domain leucine-rich repeat-containing protein phosphatase 1 (PHLPP1). PHLPP1, also termed pleckstrin homology domain-containing family E member 1, or PH domain-containing family E member 1, or suprachiasmatic nucleus circadian oscillatory protein (SCOP), is involved in two key signaling pathways, the phosphatidylinositol 3-kinase and diacylglycerol signaling pathways, by directly dephosphorylating and inactivating Akt serine-threonine kinases (Akt1, Akt2, Akt3) and protein kinase C (PKC) isoforms. PHLPP1 also plays critical roles in many cancers, such as gastric cancer, sacral chordoma, gallbladder cancer, hypopharyngeal squamous cell carcinomas, and non-small cell lung cancer. It plays a suppression role in inflammatory response of glioma. Its loss contributes to gliomas development and progression. Loss of PHLPP1 also protects against colitis by inhibiting intestinal epithelial cell apoptosis. The overexpression of PHLPP1 impairs hippocampus-dependent learning, suggesting a role in learning and memory. PHLPP1 contains a Ras-associating (RA) domain followed by a pleckstrin homology (PH) domain, a series of leucine-rich repeats and a protein phosphatase 2C (PP2C) domain."
definition: >-
  Ras-associating (RA) domain found in PH domain leucine-rich repeat-containing protein phosphatase 1 (PHLPP1). PHLPP1, also termed pleckstrin homology domain-containing family E member 1, or PH domain-containing family E member 1, or suprachiasmatic nucleus circadian oscillatory protein (SCOP), is involved in two key signaling pathways, the phosphatidylinositol 3-kinase and diacylglycerol signaling pathways, by directly dephosphorylating and inactivating Akt serine-threonine kinases (Akt1, Akt2, Akt3) and protein kinase C (PKC) isoforms. PHLPP1 also plays critical roles in many cancers, such as gastric cancer, sacral chordoma, gallbladder cancer, hypopharyngeal squamous cell carcinomas, and non-small cell lung cancer. It plays a suppression role in inflammatory response of glioma. Its loss contributes to gliomas development and progression. Loss of PHLPP1 also protects against colitis by inhibiting intestinal epithelial cell apoptosis. The overexpression of PHLPP1 impairs hippocampus-dependent learning, suggesting a role in learning and memory. PHLPP1 contains a Ras-associating (RA) domain followed by a pleckstrin homology (PH) domain, a series of leucine-rich repeats and a protein phosphatase 2C (PP2C) domain. — an NCBI CDD conserved domain (cd17240); members share this curated model.
