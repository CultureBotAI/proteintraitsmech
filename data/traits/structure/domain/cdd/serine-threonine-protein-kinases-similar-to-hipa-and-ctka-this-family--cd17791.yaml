identifier: CDD:cd17791
label: "serine/threonine-protein kinases similar to HipA and CtkA. This family contains serine/threonine-protein kinases similar to Escherichia coli HipA, a type II toxin-antitoxin (TA) system HipA family toxin that phosphorylates Glu-tRNA-ligase (GltX), preventing it from being charged, leading to an increase in uncharged tRNA(Glu), and is the toxin component of the HipA-HipB TA module, as well as similar to the Helicobacter pylori serine/threonine-protein kinase CtkA (proinflammatory kinase), which has been shown to be secreted by the bacteria and to induce cytokines in gastric epithelial cells relevant to chronic gastric inflammation."
definition: >-
  serine/threonine-protein kinases similar to HipA and CtkA. This family contains serine/threonine-protein kinases similar to Escherichia coli HipA, a type II toxin-antitoxin (TA) system HipA family toxin that phosphorylates Glu-tRNA-ligase (GltX), preventing it from being charged, leading to an increase in uncharged tRNA(Glu), and is the toxin component of the HipA-HipB TA module, as well as similar to the Helicobacter pylori serine/threonine-protein kinase CtkA (proinflammatory kinase), which has been shown to be secreted by the bacteria and to induce cytokines in gastric epithelial cells relevant to chronic gastric inflammation. — an NCBI CDD conserved domain (cd17791); members share this curated model.
