identifier: CDD:cd22114
label: "F-box domain found in F-box/LRR-repeat protein 1 (FBXL1) and similar proteins. FBXL1, also called S-phase kinase-associated protein 2, cyclin-A/CDK2-associated protein p45, F-box protein Skp2, or p45skp2, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins involved in cell cycle progression, signal transduction and transcription. It specifically recognizes phosphorylated CDKN1B/p27kip and is involved in regulation of G1/S transition. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 1 (FBXL1) and similar proteins. FBXL1, also called S-phase kinase-associated protein 2, cyclin-A/CDK2-associated protein p45, F-box protein Skp2, or p45skp2, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins involved in cell cycle progression, signal transduction and transcription. It specifically recognizes phosphorylated CDKN1B/p27kip and is involved in regulation of G1/S transition. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22114); members share this curated model.
