identifier: CDD:cd14002
label: "Catalytic domain of Serine/Threonine Kinase 36. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. STK36, also called Fused (or Fu) kinase, is involved in the Hedgehog signaling pathway. It is activated by the Smoothened (SMO) signal transducer, resulting in the stabilization of GLI transcription factors and the phosphorylation of SUFU to facilitate the nuclear accumulation of GLI. In Drosophila, Fused kinase is maternally required for proper segmentation during embryonic development and for the development of legs and wings during the larval stage. In mice, STK36 is not necessary for embryonic development, although mice deficient in STK36 display growth retardation postnatally. The STK36 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of Serine/Threonine Kinase 36. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. STK36, also called Fused (or Fu) kinase, is involved in the Hedgehog signaling pathway. It is activated by the Smoothened (SMO) signal transducer, resulting in the stabilization of GLI transcription factors and the phosphorylation of SUFU to facilitate the nuclear accumulation of GLI. In Drosophila, Fused kinase is maternally required for proper segmentation during embryonic development and for the development of legs and wings during the larval stage. In mice, STK36 is not necessary for embryonic development, although mice deficient in STK36 display growth retardation postnatally. The STK36 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14002); members share this curated model.
