identifier: CDD:cd24034
label: "nucleotide-binding domain (NBD) of the first repeat of Aquifex aeolicus hypothetical protein O66634 and similar proteins. The family includes a group of uncharacterized proteins similar to Aquifex aeolicus hypothetical protein O66634, which contains two copies of the BcrAD/BadFG-like domain, suggesting that the family may structurally dimerize. The model corresponds to the first copy of the BcrAD/BadFG-like domain."
definition: >-
  nucleotide-binding domain (NBD) of the first repeat of Aquifex aeolicus hypothetical protein O66634 and similar proteins. The family includes a group of uncharacterized proteins similar to Aquifex aeolicus hypothetical protein O66634, which contains two copies of the BcrAD/BadFG-like domain, suggesting that the family may structurally dimerize. The model corresponds to the first copy of the BcrAD/BadFG-like domain. — an NCBI CDD conserved domain (cd24034); members share this curated model.
