identifier: CDD:cd08090
label: "ATP-grasp domain of biotin-dependent carboxylase enzymes. Biotin carboxylase (BC, EC 6.3.4.14) enzyme is present in all biotin-dependent enzymes, such as acetyl-CoA carboxylase, pyruvate carboxylase, propionyl-CoA carboxylase, methylcrotonyl-CoA carboxylase, geranoyl-CoA carboxylase, oxaloacetate decarboxylase, methylmalonyl-CoA decarboxylase, transcarboxylase, and urea amidolyase. All these enzymes have the ATP-grasp domain. BC interacts with biotin carboxyl carrier protein (BCCP) to catalyze carboxybiotin via formation of carboxyphosphate intermediate. This reaction utilizes bicarbonate and ATP as substrate. All biotin carboxylases have the ATP/bicarbonate binding domain which is similar to nucleotide-binding domain of the ATP-grasp superfamily. Binding of ATP results into a large conformational change of the protein resulting into the movement of the flexible loop region and, therefore, closure of the active site in the presence of the nucleotide."
definition: >-
  ATP-grasp domain of biotin-dependent carboxylase enzymes. Biotin carboxylase (BC, EC 6.3.4.14) enzyme is present in all biotin-dependent enzymes, such as acetyl-CoA carboxylase, pyruvate carboxylase, propionyl-CoA carboxylase, methylcrotonyl-CoA carboxylase, geranoyl-CoA carboxylase, oxaloacetate decarboxylase, methylmalonyl-CoA decarboxylase, transcarboxylase, and urea amidolyase. All these enzymes have the ATP-grasp domain. BC interacts with biotin carboxyl carrier protein (BCCP) to catalyze carboxybiotin via formation of carboxyphosphate intermediate. This reaction utilizes bicarbonate and ATP as substrate. All biotin carboxylases have the ATP/bicarbonate binding domain which is similar to nucleotide-binding domain of the ATP-grasp superfamily. Binding of ATP results into a large conformational change of the protein resulting into the movement of the flexible loop region and, therefore, closure of the active site in the presence of the nucleotide. — an NCBI CDD conserved domain (cd08090); members share this curated model.
