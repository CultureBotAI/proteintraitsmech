identifier: CDD:cd19392
label: "transforming growth factor beta (TGF-beta) like domain found in Drosophila melanogaster protein decapentaplegic (Dpp) and similar proteins. decapentaplegic (Dpp) and similar proteins Dpp, also termed as protein DPP-C, is required later in embryogenesis for dorsal closure and patterning of the hindgut. It also functions postembryonically as a long-range morphogen during imaginal disk development and is responsible for the progression of the morphogenetic furrow during eye development."
definition: >-
