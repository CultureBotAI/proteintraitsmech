identifier: CDD:cd20474
label: "second Tudor-like Agenet domain found in synaptic functional regulator FMR1 and similar proteins. FMR1, also called fragile X mental retardation protein 1 (FMRP), is a multifunctional polyribosome-associated RNA-binding protein that plays a central role in neuronal development and synaptic plasticity through the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs. FMR1 contains two copies of the Tudor-like Agenet domain. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  second Tudor-like Agenet domain found in synaptic functional regulator FMR1 and similar proteins. FMR1, also called fragile X mental retardation protein 1 (FMRP), is a multifunctional polyribosome-associated RNA-binding protein that plays a central role in neuronal development and synaptic plasticity through the regulation of alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of a subset of mRNAs. FMR1 contains two copies of the Tudor-like Agenet domain. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20474); members share this curated model.
