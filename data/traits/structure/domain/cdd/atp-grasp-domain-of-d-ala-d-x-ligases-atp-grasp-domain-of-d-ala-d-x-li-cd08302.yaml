identifier: CDD:cd08302
label: "ATP-grasp domain of D-ala-D-x ligases. ATP-grasp domain of D-ala-D-x ligases. D-alanine:D-x ligase (DDl, EC 6.3.2.4) is a bacterial cell wall synthesizing enzyme that catalyzes the ligation of two D-alanines in the presence of ATP. Carboxylate substrate is D-alanine; amine or thiol substrate is either D-alanine, D-lactate, or D-serine. It belongs to the ATP-grasp superfamily. DDl is essential for bacterial development since it has no human orthologs, and, therefore, is an ideal target for treatment of infectious deseases. This family includes members like EcDdlA and EcDdlB from Escherechia coli, StaDdl from Staphylococcus aureus, HpDdl from Halicobacter pylori, TcaDdl from Thermus caldophilus, SlaDdl from Streptomyces lavendulae, and LmDdl from Leuconostoc mesenteroides. Sequence comparision reveals that Y216 position from EcDdlB is critical to differentiate between vancomycin-sensitive and vancomycin-resistant bacteria. Van-sensitive bacteria have tyrosine at this position which is replaced by phenylalanine in Van-resistant strains. EcDdlB, StaDdl, HpDdl, TcaDdl, and SlaDdl are all Van-sensitive whereas LmDdl is Van-resistant. Enterococcal VanA has no tyrosine or phenylalanine anywere near this position."
definition: >-
  ATP-grasp domain of D-ala-D-x ligases. ATP-grasp domain of D-ala-D-x ligases. D-alanine:D-x ligase (DDl, EC 6.3.2.4) is a bacterial cell wall synthesizing enzyme that catalyzes the ligation of two D-alanines in the presence of ATP. Carboxylate substrate is D-alanine; amine or thiol substrate is either D-alanine, D-lactate, or D-serine. It belongs to the ATP-grasp superfamily. DDl is essential for bacterial development since it has no human orthologs, and, therefore, is an ideal target for treatment of infectious deseases. This family includes members like EcDdlA and EcDdlB from Escherechia coli, StaDdl from Staphylococcus aureus, HpDdl from Halicobacter pylori, TcaDdl from Thermus caldophilus, SlaDdl from Streptomyces lavendulae, and LmDdl from Leuconostoc mesenteroides. Sequence comparision reveals that Y216 position from EcDdlB is critical to differentiate between vancomycin-sensitive and vancomycin-resistant bacteria. Van-sensitive bacteria have tyrosine at this position which is replaced by phenylalanine in Van-resistant strains. EcDdlB, StaDdl, HpDdl, TcaDdl, and SlaDdl are all Van-sensitive whereas LmDdl is Van-resistant. Enterococcal VanA has no tyrosine or phenylalanine anywere near this position. — an NCBI CDD conserved domain (cd08302); members share this curated model.
