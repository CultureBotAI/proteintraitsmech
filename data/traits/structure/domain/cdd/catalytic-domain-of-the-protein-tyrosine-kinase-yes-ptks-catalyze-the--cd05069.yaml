  Catalytic domain of the Protein Tyrosine Kinase, Yes. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Yes (or c-Yes) is a member of the Src subfamily of proteins, which are cytoplasmic (or non-receptor) PTKs. c-Yes kinase is the cellular homolog of the oncogenic protein (v-Yes) encoded by the Yamaguchi 73 and Esh sarcoma viruses. It displays functional overlap with other Src subfamily members, particularly Src. It also shows some unique functions such as binding to occludins, transmembrane proteins that regulate extracellular interactions in tight junctions. Yes also associates with a number of proteins in different cell types that Src does not interact with, like JAK2 and gp130 in pre-adipocytes, and Pyk2 in treated pulmonary vein endothelial cells. Although the biological function of Yes remains unclear, it appears to have a role in regulating cell-cell interactions and vesicle trafficking in polarized cells. Src kinases contain an N-terminal SH4 domain with a myristoylation site, followed by SH3 and SH2 domains, a tyr kinase domain, and a regulatory C-terminal region containing a conserved tyr. They are activated by autophosphorylation at the tyr kinase domain, but are negatively regulated by phosphorylation at the C-terminal tyr by Csk (C-terminal Src Kinase). The Yes subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase (PI3K). — an NCBI CDD conserved domain (cd05069); members share this curated model.
