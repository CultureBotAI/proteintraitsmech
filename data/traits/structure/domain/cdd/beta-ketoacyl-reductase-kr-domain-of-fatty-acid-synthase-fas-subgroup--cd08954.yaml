identifier: CDD:cd08954
label: "beta-ketoacyl reductase (KR) domain of fatty acid synthase (FAS), subgroup 1, complex (x) SDRs. NADP-dependent KR domain of the multidomain type I FAS, a complex SDR family. This subfamily also includes proteins identified as polyketide synthase (PKS), a protein with related modular protein architecture and similar function. It includes the KR domains of mammalian and chicken FAS, and Dictyostelium discoideum putative polyketide synthases (PKSs). These KR domains contain two subdomains, each of which is related to SDR Rossmann fold domains. However, while the C-terminal subdomain has an active site similar to the other SDRs and a NADP-binding capability, the N-terminal SDR-like subdomain is truncated and lacks these functions, serving a supportive structural role. In some instances, such as porcine FAS, an enoyl reductase (a Rossman fold NAD-binding domain of the medium-chain dehydrogenase/reductase, MDR family) module is inserted between the sub-domains. Fatty acid synthesis occurs via the stepwise elongation of a chain (which is attached to acyl carrier protein, ACP) with 2-carbon units. Eukaryotic systems consists of large, multifunctional synthases (type I) while bacterial, type II systems, use single function proteins. Fungal fatty acid synthesis uses a dodecamer of 6 alpha and 6 beta subunits. In mammalian type FAS cycles,  ketoacyl synthase forms acetoacetyl-ACP which is reduced by the NADP-dependent beta-ketoacyl reductase (KR), forming beta-hydroxyacyl-ACP, which is in turn dehydrated by dehydratase to a beta-enoyl intermediate, which is reduced by NADP-dependent beta-enoyl reductase (ER); this KR and ER are members of the SDR family. This KR subfamily has an active site tetrad with a similar 3D orientation compared to archetypical SDRs, but the active site Lys and Asn residue positions are swapped. The characteristic NADP-binding is typical of the multidomain  complex SDRs, with a GGXGXXG NADP binding motif. SDRs are a functionally diverse family of oxidoreductases that have a single domain with a structurally conserved Rossmann fold (alpha/beta folding pattern with a central beta-sheet), an NAD(P)(H)-binding region, and a structurally diverse C-terminal region. Classical SDRs are typically about 250 residues long, while extended SDRs are approximately 350 residues. Sequence identity between different SDR enzymes are typically in the 15-30% range, but the enzymes share the Rossmann fold NAD-binding motif and characteristic NAD-binding and catalytic sequence patterns. These enzymes catalyze a wide range of activities including the metabolism of steroids, cofactors, carbohydrates, lipids, aromatic compounds, and amino acids, and act in redox sensing. Classical SDRs have an TGXXX[AG]XG cofactor binding motif and a YXXXK active site motif, with the Tyr residue of the active site motif serving as a critical catalytic residue (Tyr-151, human prostaglandin dehydrogenase (PGDH) numbering). In addition to the Tyr and Lys, there is often an upstream Ser (Ser-138, PGDH numbering) and/or an Asn (Asn-107, PGDH numbering) contributing to the active site; while substrate binding is in the C-terminal region, which determines specificity. The standard reaction mechanism is a 4-pro-S hydride transfer and proton relay involving the conserved Tyr and Lys, a water molecule stabilized by Asn, and nicotinamide. Extended SDRs have additional elements in the C-terminal region, and typically have a TGXXGXXG cofactor binding motif. Complex (multidomain) SDRs such as ketoreductase domains of fatty acid synthase have a GGXGXXG NAD(P)-binding motif and an altered active site motif (YXXXN). Fungal type KRs have a TGXXXGX(1-2)G NAD(P)-binding motif. Some atypical SDRs have lost catalytic activity and/or have an unusual NAD(P)-binding motif and missing or unusual active site residues. Reactions catalyzed within the SDR family include isomerization, decarboxylation, epimerization, C=N bond reduction, dehydratase activity, dehalogenation, Enoyl-CoA reduction, and carbonyl-alcohol oxidoreduction."
definition: >-
  beta-ketoacyl reductase (KR) domain of fatty acid synthase (FAS), subgroup 1, complex (x) SDRs. NADP-dependent KR domain of the multidomain type I FAS, a complex SDR family. This subfamily also includes proteins identified as polyketide synthase (PKS), a protein with related modular protein architecture and similar function. It includes the KR domains of mammalian and chicken FAS, and Dictyostelium discoideum putative polyketide synthases (PKSs). These KR domains contain two subdomains, each of which is related to SDR Rossmann fold domains. However, while the C-terminal subdomain has an active site similar to the other SDRs and a NADP-binding capability, the N-terminal SDR-like subdomain is truncated and lacks these functions, serving a supportive structural role. In some instances, such as porcine FAS, an enoyl reductase (a Rossman fold NAD-binding domain of the medium-chain dehydrogenase/reductase, MDR family) module is inserted between the sub-domains. Fatty acid synthesis occurs via the stepwise elongation of a chain (which is attached to acyl carrier protein, ACP) with 2-carbon units. Eukaryotic systems consists of large, multifunctional synthases (type I) while bacterial, type II systems, use single function proteins. Fungal fatty acid synthesis uses a dodecamer of 6 alpha and 6 beta subunits. In mammalian type FAS cycles, ketoacyl synthase forms acetoacetyl-ACP which is reduced by the NADP-dependent beta-ketoacyl reductase (KR), forming beta-hydroxyacyl-ACP, which is in turn dehydrated by dehydratase to a beta-enoyl intermediate, which is reduced by NADP-dependent beta-enoyl reductase (ER); this KR and ER are members of the SDR family. This KR subfamily has an active site tetrad with a similar 3D orientation compared to archetypical SDRs, but the active site Lys and Asn residue positions are swapped. The characteristic NADP-binding is typical of the multidomain complex SDRs, with a GGXGXXG NADP binding motif. SDRs are a functionally diverse family of oxidoreductases that have a single domain with a structurally conserved Rossmann fold (alpha/beta folding pattern with a central beta-sheet), an NAD(P)(H)-binding region, and a structurally diverse C-terminal region. Classical SDRs are typically about 250 residues long, while extended SDRs are approximately 350 residues. Sequence identity between different SDR enzymes are typically in the 15-30% range, but the enzymes share the Rossmann fold NAD-binding motif and characteristic NAD-binding and catalytic sequence patterns. These enzymes catalyze a wide range of activities including the metabolism of steroids, cofactors, carbohydrates, lipids, aromatic compounds, and amino acids, and act in redox sensing. Classical SDRs have an TGXXX[AG]XG cofactor binding motif and a YXXXK active site motif, with the Tyr residue of the active site motif serving as a critical catalytic residue (Tyr-151, human prostaglandin dehydrogenase (PGDH) numbering). In addition to the Tyr and Lys, there is often an upstream Ser (Ser-138, PGDH numbering) and/or an Asn (Asn-107, PGDH numbering) contributing to the active site; while substrate binding is in the C-terminal region, which determines specificity. The standard reaction mechanism is a 4-pro-S hydride transfer and proton relay involving the conserved Tyr and Lys, a water molecule stabilized by Asn, and nicotinamide. Extended SDRs have additional elements in the C-terminal region, and typically have a TGXXGXXG cofactor binding motif. Complex (multidomain) SDRs such as ketoreductase domains of fatty acid synthase have a GGXGXXG NAD(P)-binding motif and an altered active site motif (YXXXN). Fungal type KRs have a TGXXXGX(1-2)G NAD(P)-binding motif. Some atypical SDRs have lost catalytic activity and/or have an unusual NAD(P)-binding motif and missing or unusual active site residues. Reactions catalyzed within the SDR family include isomerization, decarboxylation, epimerization, C=N bond reduction, dehydratase activity, dehalogenation, Enoyl-CoA reduction, and carbonyl-alcohol oxidoreduction. — an NCBI CDD conserved domain (cd08954); members share this curated model.
