identifier: CDD:cd20046
label: "Forkhead (FH) domain found in Forkhead box proteins FOXD1, FOXD2 and similar proteins. FOXD1, also called Forkhead-related protein FKHL8, or Forkhead-related transcription factor 4 (FREAC-4), is involved in transcriptional activation of Placental Growth Factor (PGF) and the complement component (C3) genes. It plays an important role in early embryonic development and organogenesis, and functions as an oncogene in several cancers. FOXD2, also called Forkhead-related protein FKHL17, or Forkhead-related transcription factor 9 (FREAC-9), is a probable transcription factor involved in embryogenesis and somatogenesis. It has been found that long noncoding RNA FOXD2 adjacent opposite strand RNA1 (lncRNA FOXD2-AS1) expression is upregulated in various human malignancies, including gastric, lung, bladder, colorectal, nasopharyngeal, esophageal, hepatocellular, thyroid and skin cancer. It is a promising candidate as a new biomarker and therapeutic target for cancer diagnosis/prognostication due to high tissue specificity and elevated efficiency. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box proteins FOXD1, FOXD2 and similar proteins. FOXD1, also called Forkhead-related protein FKHL8, or Forkhead-related transcription factor 4 (FREAC-4), is involved in transcriptional activation of Placental Growth Factor (PGF) and the complement component (C3) genes. It plays an important role in early embryonic development and organogenesis, and functions as an oncogene in several cancers. FOXD2, also called Forkhead-related protein FKHL17, or Forkhead-related transcription factor 9 (FREAC-9), is a probable transcription factor involved in embryogenesis and somatogenesis. It has been found that long noncoding RNA FOXD2 adjacent opposite strand RNA1 (lncRNA FOXD2-AS1) expression is upregulated in various human malignancies, including gastric, lung, bladder, colorectal, nasopharyngeal, esophageal, hepatocellular, thyroid and skin cancer. It is a promising candidate as a new biomarker and therapeutic target for cancer diagnosis/prognostication due to high tissue specificity and elevated efficiency. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20046); members share this curated model.
