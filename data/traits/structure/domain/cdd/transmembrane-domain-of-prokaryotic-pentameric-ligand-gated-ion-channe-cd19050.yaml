identifier: CDD:cd19050
label: "transmembrane domain of prokaryotic pentameric ligand-gated ion channels (pLGIC). This family contains transmembrane (TM) domain of bacterial pentameric ligand-gated ion channels (pLGICs) including ones from Gloeobacter violaceus (GLIC) and Erwinia chrysanthemi (ELIC). The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. Studies show that GLIC activation is inhibited by most general anaesthetics at clinical concentrations, including xenon which has been used in clinical practice as a potent gaseous anesthetic for decades. Xenon binding sites have been identified in three distinct regions of the TMD: in a large intra-subunit cavity, in the pore, and at the interface between adjacent subunits. Propofol, the drug used for induction and maintenance of general anesthesia, and desflurane, a negative allosteric modulator of GLIC bind at the entrance in the intra-subunit cavity. Alzheimer's drug memantine, which blocks ion conduction at vertebrate pLGICs by plugging the channel pore, has been shown to have similar potency in ELIC."
definition: >-
  transmembrane domain of prokaryotic pentameric ligand-gated ion channels (pLGIC). This family contains transmembrane (TM) domain of bacterial pentameric ligand-gated ion channels (pLGICs) including ones from Gloeobacter violaceus (GLIC) and Erwinia chrysanthemi (ELIC). The transmembrane region consists of four transmembrane-spanning alpha-helical segments (M1-M4) that are linked by loops. Studies show that GLIC activation is inhibited by most general anaesthetics at clinical concentrations, including xenon which has been used in clinical practice as a potent gaseous anesthetic for decades. Xenon binding sites have been identified in three distinct regions of the TMD: in a large intra-subunit cavity, in the pore, and at the interface between adjacent subunits. Propofol, the drug used for induction and maintenance of general anesthesia, and desflurane, a negative allosteric modulator of GLIC bind at the entrance in the intra-subunit cavity. Alzheimer's drug memantine, which blocks ion conduction at vertebrate pLGICs by plugging the channel pore, has been shown to have similar potency in ELIC. — an NCBI CDD conserved domain (cd19050); members share this curated model.
