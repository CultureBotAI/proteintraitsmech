identifier: CDD:cd18289
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in nucleus accumbens-associated protein 2 (NAC-2). NAC-2, also called BTB/POZ domain-containing protein 14A (BTBD14A) or repressor with BTB domain and BEN domain (RBB), is a novel transcription repressor through its association with the NuRD complex. It recruits the NuRD complex to the promoter of MDM2, leading to the repression of MDM2 transcription and subsequent stability of p53/TP53. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in nucleus accumbens-associated protein 2 (NAC-2). NAC-2, also called BTB/POZ domain-containing protein 14A (BTBD14A) or repressor with BTB domain and BEN domain (RBB), is a novel transcription repressor through its association with the NuRD complex. It recruits the NuRD complex to the promoter of MDM2, leading to the repression of MDM2 transcription and subsequent stability of p53/TP53. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18289); members share this curated model.
