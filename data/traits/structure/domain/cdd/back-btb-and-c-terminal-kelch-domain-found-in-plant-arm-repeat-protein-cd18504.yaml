identifier: CDD:cd18504
label: "BACK (BTB and C-terminal Kelch) domain found in plant ARM repeat protein interacting with ABF2 (ARIA) and similar proteins. ARIA is an ARM repeat protein that acts as a positive regulator of ABA response via the modulation of the transcriptional activity of ABF2, a transcription factor which controls ABA-dependent gene expression via the G-box-type ABA-responsive elements. ARIA is a novel abscisic acid signaling component. It negatively regulates seed germination and young seedling growth."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in plant ARM repeat protein interacting with ABF2 (ARIA) and similar proteins. ARIA is an ARM repeat protein that acts as a positive regulator of ABA response via the modulation of the transcriptional activity of ABF2, a transcription factor which controls ABA-dependent gene expression via the G-box-type ABA-responsive elements. ARIA is a novel abscisic acid signaling component. It negatively regulates seed germination and young seedling growth. — an NCBI CDD conserved domain (cd18504); members share this curated model.
