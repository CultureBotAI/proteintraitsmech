identifier: CDD:cd22124
label: "F-box domain found in F-box/LRR-repeat protein 13 (FBXL13) and similar proteins. FBXL13, also called F-box and leucine-rich repeat protein 13, or dynein regulatory complex subunit 6, is a component of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. It is also the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 13 (FBXL13) and similar proteins. FBXL13, also called F-box and leucine-rich repeat protein 13, or dynein regulatory complex subunit 6, is a component of the nexin-dynein regulatory complex (N-DRC), a key regulator of ciliary/flagellar motility which maintains the alignment and integrity of the distal axoneme and regulates microtubule sliding in motile axonemes. It is also the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22124); members share this curated model.
