identifier: CDD:cd18440
label: "sixth BRCT domain of PAX-interacting protein 1 (PAXIP1) and similar proteins. PAXIP1, also termed PAX transactivation activation domain-interacting protein (PTIP), is involved in DNA damage response and in transcriptional regulation through histone methyltransferase (HMT) complexes. It also facilitates ATM-mediated activation of p53 and promotes cellular resistance to ionizing radiation. PAXIP1 contains six BRCT repeats. This family corresponds to the sixth BRCT domain. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this family."
definition: >-
  sixth BRCT domain of PAX-interacting protein 1 (PAXIP1) and similar proteins. PAXIP1, also termed PAX transactivation activation domain-interacting protein (PTIP), is involved in DNA damage response and in transcriptional regulation through histone methyltransferase (HMT) complexes. It also facilitates ATM-mediated activation of p53 and promotes cellular resistance to ionizing radiation. PAXIP1 contains six BRCT repeats. This family corresponds to the sixth BRCT domain. The Trp-X-X-X-Cys/Ser signature motif of the BRCT family is not conserved in this family. — an NCBI CDD conserved domain (cd18440); members share this curated model.
