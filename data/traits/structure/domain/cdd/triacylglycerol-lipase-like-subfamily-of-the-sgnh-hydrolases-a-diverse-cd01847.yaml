identifier: CDD:cd01847
label: "Triacylglycerol lipase-like subfamily of the SGNH hydrolases, a diverse family of lipases and esterases. The tertiary fold of the enzyme is substantially different from that of the alpha/beta hydrolase family and unique among all known hydrolases; its active site closely resembles the Ser-His-Asp(Glu) triad found in other serine hydrolases. Members of this subfamily might hydrolyze triacylglycerol into diacylglycerol and fatty acid anions."
definition: >-
  Triacylglycerol lipase-like subfamily of the SGNH hydrolases, a diverse family of lipases and esterases. The tertiary fold of the enzyme is substantially different from that of the alpha/beta hydrolase family and unique among all known hydrolases; its active site closely resembles the Ser-His-Asp(Glu) triad found in other serine hydrolases. Members of this subfamily might hydrolyze triacylglycerol into diacylglycerol and fatty acid anions. — an NCBI CDD conserved domain (cd01847); members share this curated model.
