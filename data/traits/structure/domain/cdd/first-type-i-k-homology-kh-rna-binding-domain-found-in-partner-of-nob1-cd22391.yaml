identifier: CDD:cd22391
label: "first type I K homology (KH) RNA-binding domain found in partner of NOB1 (PNO1) and similar proteins. PNO1 is an RNA-binding protein that acts as a ribosome assembly factor and plays an important role in ribosome biogenesis. It positively regulates dimethylation of two adjacent adenosines in the loop of a conserved hairpin near the 3'-end of 18S rRNA. PNO1 contains two K-homology (KH) RNA-binding domains. The model corresponds to the first one. The KH1 domain is a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  first type I K homology (KH) RNA-binding domain found in partner of NOB1 (PNO1) and similar proteins. PNO1 is an RNA-binding protein that acts as a ribosome assembly factor and plays an important role in ribosome biogenesis. It positively regulates dimethylation of two adjacent adenosines in the loop of a conserved hairpin near the 3'-end of 18S rRNA. PNO1 contains two K-homology (KH) RNA-binding domains. The model corresponds to the first one. The KH1 domain is a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22391); members share this curated model.
