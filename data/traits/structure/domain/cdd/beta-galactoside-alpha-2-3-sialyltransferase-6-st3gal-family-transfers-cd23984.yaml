label: "beta-galactoside alpha-2,3-sialyltransferase 6. ST3GAL family transfers sialic acid from CMP-Sia to the terminal galactose residues of glycochains through an 2,3-linkage. ST3GAL6 utilizes the Galbeta1,4GlcNAc on glycoproteins and glycolipids as an acceptor. Members of this family belong to glycosyltransferase family 29 (GT29)."
