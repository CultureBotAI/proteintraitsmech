identifier: CDD:cd21017
label: "Class Ia major histocompatibility complex (MHC) immunoglobulin domain of MIC-A and MIC-B; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ia major histocompatibility complex (MHC) immunoglobulin domain of MIC-A and MIC-B. MIC-A and MIC-B are homologs that serve as stress-inducible antigens on epithelial and epithelially derived cells. Both serve as ligands for the widely expressed activating immunoreceptor NKG2D, a C-type lectin-like activating immunoreceptor. MIC-B is very similar in structure to MIC-A and likely interacts with NKG2D in an analogous manner. The interdomain flexibility observed in the MIC-A structures, a feature unique to MIC proteins among MHC class I proteins and homologs, is also displayed by MIC-B, with an interdomain relationship intermediate between the two examples of MIC-A structures. Mapping sequence variations onto the structures of MIC-A and MIC-B reveals patterns completely distinct from those displayed by classical MHC class I proteins, with a number of substitutions falling on positions likely to affect interactions with NKG2D, but with other positions lying distant from the NKG2D binding sites or buried within the core of the proteins. Members of the IgC family are components of immunoglobulin, T-cell receptors, CD1 cell surface glycoproteins, secretory glycoproteins A/C, and major histocompatibility complex (MHC) class I/II molecules. In immunoglobulins, each chain is composed of one variable domain (IgV) and one or more IgC domains. These names reflect the fact that the variability in sequences is higher in the variable domain than in the constant domain. The IgV domain is responsible for antigen binding and the IgC domain is involved in oligomerization and molecular interactions."
definition: >-
  Class Ia major histocompatibility complex (MHC) immunoglobulin domain of MIC-A and MIC-B; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the Class Ia major histocompatibility complex (MHC) immunoglobulin domain of MIC-A and MIC-B. MIC-A and MIC-B are homologs that serve as stress-inducible antigens on epithelial and epithelially derived cells. Both serve as ligands for the widely expressed activating immunoreceptor NKG2D, a C-type lectin-like activating immunoreceptor. MIC-B is very similar in structure to MIC-A and likely interacts with NKG2D in an analogous manner. The interdomain flexibility observed in the MIC-A structures, a feature unique to MIC proteins among MHC class I proteins and homologs, is also displayed by MIC-B, with an interdomain relationship intermediate between the two examples of MIC-A structures. Mapping sequence variations onto the structures of MIC-A and MIC-B reveals patterns completely distinct from those displayed by classical MHC class I proteins, with a number of substitutions falling on positions likely to affect interactions with NKG2D, but with other positions lying distant from the NKG2D binding sites or buried within the core of the proteins. Members of the IgC family are components of immunoglobulin, T-cell receptors, CD1 cell surface glycoproteins, secretory glycoproteins A/C, and major histocompatibility complex (MHC) class I/II molecules. In immunoglobulins, each chain is composed of one variable domain (IgV) and one or more IgC domains. These names reflect the fact that the variability in sequences is higher in the variable domain than in the constant domain. The IgV domain is responsible for antigen binding and the IgC domain is involved in oligomerization and molecular interactions. — an NCBI CDD conserved domain (cd21017); members share this curated model.
