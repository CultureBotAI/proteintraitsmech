identifier: CDD:cd21849
label: "N-terminal REV7 interacting motif (RIM)found in shieldin complex subunit 2 (SHLD2) and similar proteins. SHLD2, also called protein FAM35A, or RINN1-REV7-interacting novel NHEJ regulator 2 (RINN2), or Shield complex subunit 2, is a 53BP1-pathway factor and and a component of the shieldin complex, which plays an important role in repair of DNA double-stranded breaks (DSBs). During G1 and S phase of the cell cycle, the complex functions downstream of TP53BP1 to promote non-homologous end joining (NHEJ) and suppress DNA end resection. SHLD2 mediates various NHEJ-dependent processes including immunoglobulin class-switch recombination, and fusion of unprotected telomeres. SHLD2 has unique domains: an N-terminal disordered domain and three C-terminal OB-fold domains. The model corresponds to a conserved region called REV7 interacting motif (RIM) at the N-terminus of SHLD2, which is sufficient for its interaction with upstream molecules SHLD3 and REV7."
definition: >-
  N-terminal REV7 interacting motif (RIM)found in shieldin complex subunit 2 (SHLD2) and similar proteins. SHLD2, also called protein FAM35A, or RINN1-REV7-interacting novel NHEJ regulator 2 (RINN2), or Shield complex subunit 2, is a 53BP1-pathway factor and and a component of the shieldin complex, which plays an important role in repair of DNA double-stranded breaks (DSBs). During G1 and S phase of the cell cycle, the complex functions downstream of TP53BP1 to promote non-homologous end joining (NHEJ) and suppress DNA end resection. SHLD2 mediates various NHEJ-dependent processes including immunoglobulin class-switch recombination, and fusion of unprotected telomeres. SHLD2 has unique domains: an N-terminal disordered domain and three C-terminal OB-fold domains. The model corresponds to a conserved region called REV7 interacting motif (RIM) at the N-terminus of SHLD2, which is sufficient for its interaction with upstream molecules SHLD3 and REV7. — an NCBI CDD conserved domain (cd21849); members share this curated model.
