identifier: CDD:cd11074
label: "cytochrome P450 family 73. Cytochrome P450 family 73 (CYP73 pr Cyp73), also called trans-cinnamate 4-monooxygenase (EC 1.14.14.91) or cinnamic acid 4-hydroxylase, catalyzes the regiospecific 4-hydroxylation of cinnamic acid to form precursors of lignin and many other phenolic compounds. It controls the general phenylpropanoid pathway, and controls carbon flux to pigments essential for pollination or UV protection. CYP73 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
