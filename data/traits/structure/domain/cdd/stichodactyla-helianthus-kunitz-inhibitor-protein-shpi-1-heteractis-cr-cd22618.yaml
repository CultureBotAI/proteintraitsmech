identifier: CDD:cd22618
label: "Stichodactyla helianthus Kunitz inhibitor protein ShPI-1, Heteractis crispa protease inhibitor stichotoxin-Hcr2e, and similar proteins. This model includes Kunitz inhibitor protein ShPI-1, the major protease inhibitor from the sea anemone Stichodactyla helianthus, as well as protease inhibitor stichotoxin-Hcr2e (also called PI- stichotoxin-Hcr2e, PI-SHTX-Hcr2e, or Kunitz-type serine protease inhibitor InhVJ) and HCRG1 from Heteractis crispa. ShPI-1 has an unusually broad specificity toward several serine proteases, including trypsin, chymotrypsin, human neutrophil elastase, kallikrein and plasmin, and can also bind aspartic and cysteine proteases, such as pepsin and papain, respectively. PI-SHTX-Hcr2e and HCRG1 inhibit trypsin and chymotrypsin, but do not inhibit the serine proteases plasmin, thrombin, kallikrein, the cysteine proteinase papain, and the aspartic protease pepsin. The structures of these domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Stichodactyla helianthus Kunitz inhibitor protein ShPI-1, Heteractis crispa protease inhibitor stichotoxin-Hcr2e, and similar proteins. This model includes Kunitz inhibitor protein ShPI-1, the major protease inhibitor from the sea anemone Stichodactyla helianthus, as well as protease inhibitor stichotoxin-Hcr2e (also called PI- stichotoxin-Hcr2e, PI-SHTX-Hcr2e, or Kunitz-type serine protease inhibitor InhVJ) and HCRG1 from Heteractis crispa. ShPI-1 has an unusually broad specificity toward several serine proteases, including trypsin, chymotrypsin, human neutrophil elastase, kallikrein and plasmin, and can also bind aspartic and cysteine proteases, such as pepsin and papain, respectively. PI-SHTX-Hcr2e and HCRG1 inhibit trypsin and chymotrypsin, but do not inhibit the serine proteases plasmin, thrombin, kallikrein, the cysteine proteinase papain, and the aspartic protease pepsin. The structures of these domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22618); members share this curated model.
