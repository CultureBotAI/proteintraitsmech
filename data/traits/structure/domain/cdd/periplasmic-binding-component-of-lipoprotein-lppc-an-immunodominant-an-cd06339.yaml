label: "periplasmic binding component of lipoprotein LppC, an immunodominant antigen. This subgroup includes periplasmic binding component of lipoprotein LppC, an immunodominant antigen, whose molecular function is not characterized. Members of this subgroup are predicted to be involved in transport of lipid compounds, and they are sequence similar to the family of ABC-type hydrophobic amino acid transporters (HAAT)."
