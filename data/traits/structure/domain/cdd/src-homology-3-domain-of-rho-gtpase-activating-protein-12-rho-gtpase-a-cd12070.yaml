identifier: CDD:cd12070
label: "Src Homology 3 domain of Rho GTPase-activating protein 12. Rho GTPase-activating proteins (RhoGAPs or ARHGAPs) bind to Rho proteins and enhance the hydrolysis rates of bound GTP. ARHGAP12 has been shown to display GAP activity towards Rac1. It plays a role in regulating hepatocyte growth factor (HGF)-driven cell growth and invasiveness. It contains SH3, WW, Pleckstin homology (PH), and RhoGAP domains. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
