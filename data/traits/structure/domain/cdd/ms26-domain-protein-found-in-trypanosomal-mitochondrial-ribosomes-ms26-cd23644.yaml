identifier: CDD:cd23644
label: "mS26 domain protein found in trypanosomal mitochondrial ribosomes. mS26 protein is a mitochondrial protein found in Trypanosoma, but its function has not yet been fully characterized. It is known to be a component of the small subunits of the Trypanosoma mitochondrial ribosome (Tb-mt-SSUs) and interacts with the C-terminal domain (CTD) of initiation factor IF-3 to form a complex called Tb-mt-SSU/IF-3. This complex may play a role in the maturation of the mitochondrial ribosome."
definition: >-
  mS26 domain protein found in trypanosomal mitochondrial ribosomes. mS26 protein is a mitochondrial protein found in Trypanosoma, but its function has not yet been fully characterized. It is known to be a component of the small subunits of the Trypanosoma mitochondrial ribosome (Tb-mt-SSUs) and interacts with the C-terminal domain (CTD) of initiation factor IF-3 to form a complex called Tb-mt-SSU/IF-3. This complex may play a role in the maturation of the mitochondrial ribosome. — an NCBI CDD conserved domain (cd23644); members share this curated model.
