identifier: CDD:cd06332
label: "type 1 periplasmic binding proteins of active transport systems predicted to be involved in transport of aromatic compounds such as 2-nitrobenzoic acid and alkylbenzenes. This group includes the type 1 periplasmic binding proteins of active transport systems that are predicted to be involved in transport of aromatic compounds such as 2-nitrobenzoic acid and alkylbenzenes; their substrate specificities are not well characterized, however. Members also exhibit close similarity to active transport systems for short chain amides and/or urea found in bacteria and archaea."
definition: >-
