identifier: CDD:cd02094
label: "P-type heavy metal-transporting ATPase, similar to human copper-transporting ATPases, ATP7A and ATP7B. The mammalian copper-transporting P-type ATPases, ATP7A and ATP7B are key molecules required for the regulation and maintenance of copper homeostasis. Menkes and Wilson diseases are caused by mutation in ATP7A and ATP7B respectively. This subfamily includes other copper-transporting ATPases such as: Bacillus subtilis CopA , Archeaoglobus fulgidus CopA, and Saccharomyces cerevisiae Ccc2p. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  P-type heavy metal-transporting ATPase, similar to human copper-transporting ATPases, ATP7A and ATP7B. The mammalian copper-transporting P-type ATPases, ATP7A and ATP7B are key molecules required for the regulation and maintenance of copper homeostasis. Menkes and Wilson diseases are caused by mutation in ATP7A and ATP7B respectively. This subfamily includes other copper-transporting ATPases such as: Bacillus subtilis CopA , Archeaoglobus fulgidus CopA, and Saccharomyces cerevisiae Ccc2p. This subclass of P-type ATPase is also referred to as CPx-type ATPases because their amino acid sequences contain a characteristic CPC or CPH motif associated with a stretch of hydrophobic amino acids and N-terminal ion-binding sequences. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd02094); members share this curated model.
