identifier: CDD:cd06800
label: "PDZ domain of Golgi-associated PDZ and coiled-coil motif-containing protein (GOPC), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of GOPC and related domains. GOPC, also known as PIST (PDZ domain protein interacting specifically with TC10), FIG (fused in glioblastoma), and CAL (CFTR-associated ligand), regulates the trafficking of a wide array of proteins, including small GTPases, receptors, and cell surface molecules such as cadherin 23 and CFTR. It may regulate CFTR chloride currents and acid-sensing ASIC3 currents by modulating cell surface expression of both channels, and may play a role in autophagy. Interaction partners of the GOPC PDZ domains include: FZD5, FZD8, ASIC3, CFTR, MUC3, ARFRP1, Ggamma13, neuroligin, and Stargazin. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This GOPC-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of Golgi-associated PDZ and coiled-coil motif-containing protein (GOPC), and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of GOPC and related domains. GOPC, also known as PIST (PDZ domain protein interacting specifically with TC10), FIG (fused in glioblastoma), and CAL (CFTR-associated ligand), regulates the trafficking of a wide array of proteins, including small GTPases, receptors, and cell surface molecules such as cadherin 23 and CFTR. It may regulate CFTR chloride currents and acid-sensing ASIC3 currents by modulating cell surface expression of both channels, and may play a role in autophagy. Interaction partners of the GOPC PDZ domains include: FZD5, FZD8, ASIC3, CFTR, MUC3, ARFRP1, Ggamma13, neuroligin, and Stargazin. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This GOPC-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd06800); members share this curated model.
