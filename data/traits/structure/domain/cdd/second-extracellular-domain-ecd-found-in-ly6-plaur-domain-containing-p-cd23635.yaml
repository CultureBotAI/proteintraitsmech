identifier: CDD:cd23635
label: "second extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 4 (LYPD4) and similar proteins. LYPD4 is an acrosome protein expressed specifically in mammalian testes and sperm. It plays an essential role in mammalian fertilization. LYPD4 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and shows snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD domain of LYPD4."
definition: >-
  second extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 4 (LYPD4) and similar proteins. LYPD4 is an acrosome protein expressed specifically in mammalian testes and sperm. It plays an essential role in mammalian fertilization. LYPD4 contains two extracellular domains (ECDs) that belong to Ly-6 antigen/uPA receptor-like (LU) superfamily and shows snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). This model corresponds to the second ECD domain of LYPD4. — an NCBI CDD conserved domain (cd23635); members share this curated model.
