identifier: CDD:cd19288
label: "3-terminal RNA ribose 2-O-methyltransferase Hen1. Plant HEN1 is a 3-terminal RNA ribose 2-O-methyltransferase for miRNAs and all types of siRNAs, protecting them from  3'-to-5' exonuclease-mediated degradation. S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I;  AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc)."
definition: >-
  3-terminal RNA ribose 2-O-methyltransferase Hen1. Plant HEN1 is a 3-terminal RNA ribose 2-O-methyltransferase for miRNAs and all types of siRNAs, protecting them from 3'-to-5' exonuclease-mediated degradation. S-adenosylmethionine-dependent methyltransferases (SAM or AdoMet-MTase), class I; AdoMet-MTases are enzymes that use S-adenosyl-L-methionine (SAM or AdoMet) as a substrate for methyltransfer, creating the product S-adenosyl-L-homocysteine (AdoHcy). There are at least five structurally distinct families of AdoMet-MTases, class I being the largest and most diverse. Within this class enzymes can be classified by different substrate specificity (small molecules, lipids, nucleic acids, etc) and different target atoms for methylation (nitrogen, oxygen, carbon, sulfur,etc). — an NCBI CDD conserved domain (cd19288); members share this curated model.
