identifier: CDD:cd23458
label: "ricin B-type lectin domain, beta-trefoil fold, found in Agarivorans albus beta-agarase AgaB34 and similar proteins. Beta-agarase (EC 3.2.1.81), also called endo-beta-agarase, is a glycosyl hydrolase family 16 (GH16) member that catalyzes the hydrolysis of (1->4)-beta-D-galactosidic linkages in agarose, a hydrophilic polysaccharide found in the cell wall of Rhodophyceaea (marine red algae), giving the tetramer as the predominant product. Beta-agarase contains a ricin B-type lectin domain that adopts a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Agarivorans albus beta-agarase AgaB34 and similar proteins. Beta-agarase (EC 3.2.1.81), also called endo-beta-agarase, is a glycosyl hydrolase family 16 (GH16) member that catalyzes the hydrolysis of (1->4)-beta-D-galactosidic linkages in agarose, a hydrophilic polysaccharide found in the cell wall of Rhodophyceaea (marine red algae), giving the tetramer as the predominant product. Beta-agarase contains a ricin B-type lectin domain that adopts a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23458); members share this curated model.
