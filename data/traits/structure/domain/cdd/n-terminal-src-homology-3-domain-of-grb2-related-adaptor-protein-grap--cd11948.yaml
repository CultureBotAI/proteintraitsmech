identifier: CDD:cd11948
label: "N-terminal Src homology 3 domain of GRB2-related adaptor protein. GRAP is a GRB-2 like adaptor protein that is highly expressed in lymphoid tissues. It acts as a negative regulator of T cell receptor (TCR)-induced lymphocyte proliferation by downregulating the signaling to the Ras/ERK pathway. It has been identified as a regulator of TGFbeta signaling in diabetic kidney tubules and may have a role in the pathogenesis of the disease. GRAP contains an N-terminal SH3 domain, a central SH2 domain, and a C-terminal SH3 domain. The N-terminal SH3 domain of the related protein GRB2 binds to Sos and Sos-derived proline-rich peptides. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  N-terminal Src homology 3 domain of GRB2-related adaptor protein. GRAP is a GRB-2 like adaptor protein that is highly expressed in lymphoid tissues. It acts as a negative regulator of T cell receptor (TCR)-induced lymphocyte proliferation by downregulating the signaling to the Ras/ERK pathway. It has been identified as a regulator of TGFbeta signaling in diabetic kidney tubules and may have a role in the pathogenesis of the disease. GRAP contains an N-terminal SH3 domain, a central SH2 domain, and a C-terminal SH3 domain. The N-terminal SH3 domain of the related protein GRB2 binds to Sos and Sos-derived proline-rich peptides. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11948); members share this curated model.
