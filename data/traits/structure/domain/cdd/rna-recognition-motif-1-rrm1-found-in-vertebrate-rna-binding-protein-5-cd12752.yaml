identifier: CDD:cd12752
label: "RNA recognition motif 1 (RRM1) found in vertebrate RNA-binding protein 5 (RBM5). This subgroup corresponds to the RRM1 of RBM5, also termed protein G15, or putative tumor suppressor LUCA15, or renal carcinoma antigen NY-REN-9, a known modulator of apoptosis. It may also act as a tumor suppressor or an RNA splicing factor. RBM5 shows high sequence similarity to RNA-binding protein 6 (RBM6 or NY-LU-12 or g16 or DEF-3). Both, RBM5 and RBM6, specifically bind poly(G) RNA. They contain two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two C2H2-type zinc fingers, a nuclear localization signal, and a G-patch/D111 domain."
definition: >-
  RNA recognition motif 1 (RRM1) found in vertebrate RNA-binding protein 5 (RBM5). This subgroup corresponds to the RRM1 of RBM5, also termed protein G15, or putative tumor suppressor LUCA15, or renal carcinoma antigen NY-REN-9, a known modulator of apoptosis. It may also act as a tumor suppressor or an RNA splicing factor. RBM5 shows high sequence similarity to RNA-binding protein 6 (RBM6 or NY-LU-12 or g16 or DEF-3). Both, RBM5 and RBM6, specifically bind poly(G) RNA. They contain two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two C2H2-type zinc fingers, a nuclear localization signal, and a G-patch/D111 domain. — an NCBI CDD conserved domain (cd12752); members share this curated model.
