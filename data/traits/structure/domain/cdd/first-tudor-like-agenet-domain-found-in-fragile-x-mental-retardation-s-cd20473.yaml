identifier: CDD:cd20473
label: "first Tudor-like Agenet domain found in fragile X mental retardation syndrome-related protein 2 (FXR2) and similar proteins. FXR2 is an RNA-binding protein that associates with polyribosomes, predominantly with 60S large ribosomal subunits. It may have a role in the development of fragile X mental retardation syndrome. FXR2 contains two copies of the Tudor-like Agenet domain. The model corresponds to the first one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  first Tudor-like Agenet domain found in fragile X mental retardation syndrome-related protein 2 (FXR2) and similar proteins. FXR2 is an RNA-binding protein that associates with polyribosomes, predominantly with 60S large ribosomal subunits. It may have a role in the development of fragile X mental retardation syndrome. FXR2 contains two copies of the Tudor-like Agenet domain. The model corresponds to the first one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20473); members share this curated model.
