identifier: CDD:cd12429
label: "RNA recognition motif (RRM) found in the DnaJ homolog subfamily C member 17. The CD corresponds to the RRM of some eukaryotic DnaJ homolog subfamily C member 17 and similar proteins. DnaJ/Hsp40 (heat shock protein 40) proteins are highly conserved and play crucial roles in protein translation, folding, unfolding, translocation, and degradation. They act primarily by stimulating the ATPase activity of Hsp70s, an important chaperonine family. Members in this family contains an N-terminal DnaJ domain or J-domain, which mediates the interaction with Hsp70. They also contains a RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain), at the C-terminus, which may play an essential role in RNA binding."
definition: >-
  RNA recognition motif (RRM) found in the DnaJ homolog subfamily C member 17. The CD corresponds to the RRM of some eukaryotic DnaJ homolog subfamily C member 17 and similar proteins. DnaJ/Hsp40 (heat shock protein 40) proteins are highly conserved and play crucial roles in protein translation, folding, unfolding, translocation, and degradation. They act primarily by stimulating the ATPase activity of Hsp70s, an important chaperonine family. Members in this family contains an N-terminal DnaJ domain or J-domain, which mediates the interaction with Hsp70. They also contains a RNA recognition motif (RRM), also known as RBD (RNA binding domain) or RNP (ribonucleoprotein domain), at the C-terminus, which may play an essential role in RNA binding. — an NCBI CDD conserved domain (cd12429); members share this curated model.
