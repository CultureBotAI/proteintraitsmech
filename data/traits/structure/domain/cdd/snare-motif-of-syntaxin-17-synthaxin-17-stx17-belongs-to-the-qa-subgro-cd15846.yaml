identifier: CDD:cd15846
label: "SNARE motif of syntaxin 17. Synthaxin 17 (STX17) belongs to the Qa subgroup of SNAREs and interacts with SNAP29 (Qb/Qc) and the lysosomal R-SNARE VAMP8. The complex plays a role in autophagosome-lysosome fusion. Autophagosome transports cytoplasmic materials, including cytoplasmic proteins, glycogen, lipids, organelles, and invading bacteria to the lysosome for degradation. SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins consist of coiled-coil helices (called SNARE motifs) which mediate the interactions between SNARE proteins, and a transmembrane domain. The SNARE complexes mediate membrane fusion, important for trafficking of newly synthesized proteins, recycling of pre-existing proteins and organelle formation. SNARE proteins are classified into four groups, Qa-, Qb-, Qc- and R-SNAREs, depending on whether the residue in the hydrophilic center layer of the four-helical bundle is a glutamine (Q) or arginine (R). Qa-, as well as Qb- and Qc-SNAREs, are localized to target organelle membranes, while R-SNARE is localized to vesicle membranes. They form unique complexes consisting of one member of each subgroup, that mediate fusion between a specific type of vesicles and their target organelle."
definition: >-
  SNARE motif of syntaxin 17. Synthaxin 17 (STX17) belongs to the Qa subgroup of SNAREs and interacts with SNAP29 (Qb/Qc) and the lysosomal R-SNARE VAMP8. The complex plays a role in autophagosome-lysosome fusion. Autophagosome transports cytoplasmic materials, including cytoplasmic proteins, glycogen, lipids, organelles, and invading bacteria to the lysosome for degradation. SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptor) proteins consist of coiled-coil helices (called SNARE motifs) which mediate the interactions between SNARE proteins, and a transmembrane domain. The SNARE complexes mediate membrane fusion, important for trafficking of newly synthesized proteins, recycling of pre-existing proteins and organelle formation. SNARE proteins are classified into four groups, Qa-, Qb-, Qc- and R-SNAREs, depending on whether the residue in the hydrophilic center layer of the four-helical bundle is a glutamine (Q) or arginine (R). Qa-, as well as Qb- and Qc-SNAREs, are localized to target organelle membranes, while R-SNARE is localized to vesicle membranes. They form unique complexes consisting of one member of each subgroup, that mediate fusion between a specific type of vesicles and their target organelle. — an NCBI CDD conserved domain (cd15846); members share this curated model.
