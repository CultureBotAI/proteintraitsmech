identifier: CDD:cd08741
label: "Regulator of G protein signaling (RGS) domain found in the RGS10 protein. RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS10 protein. RGS10 is a member of the RA/RGS subfamily of RGS proteins family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS10 belong to the R12 RGS subfamily, which includes RGS12 and RGS14, all of which are highly selective for G-alpha-i1 over G-alpha-q. RGS10 exists in 2 splice isoforms. RGS10A is specifically expressed in osteoclasts and is a key component in the RANKL signaling mechanism for osteoclast differentiation, whereas RGS10B expressed in brain and in immune tissues and  has been implicated in diverse processes including: promoting of  dopaminergic neuron survival via regulation of the microglial inflammatory response, modulation of presynaptic and postsynaptic G-protein signalling, as well as a possible role in regulation of gene expression."
definition: >-
  Regulator of G protein signaling (RGS) domain found in the RGS10 protein. RGS (Regulator of G-protein Signaling) domain is an essential part of the RGS10 protein. RGS10 is a member of the RA/RGS subfamily of RGS proteins family, a diverse group of multifunctional proteins that regulate cellular signaling events downstream of G-protein coupled receptors (GPCRs). As a major G-protein regulator, RGS domain containing proteins are involved in many crucial cellular processes such as regulation of intracellular trafficking, glial differentiation, embryonic axis formation, skeletal and muscle development, and cell migration during early embryogenesis. RGS10 belong to the R12 RGS subfamily, which includes RGS12 and RGS14, all of which are highly selective for G-alpha-i1 over G-alpha-q. RGS10 exists in 2 splice isoforms. RGS10A is specifically expressed in osteoclasts and is a key component in the RANKL signaling mechanism for osteoclast differentiation, whereas RGS10B expressed in brain and in immune tissues and has been implicated in diverse processes including: promoting of dopaminergic neuron survival via regulation of the microglial inflammatory response, modulation of presynaptic and postsynaptic G-protein signalling, as well as a possible role in regulation of gene expression. — an NCBI CDD conserved domain (cd08741); members share this curated model.
