identifier: CDD:cd00935
label: "GlyRS_RNA binding domain.  This short RNA-binding domain is found at the  N-terminus of GlyRS in several higher eukaryote aminoacyl-tRNA synthetases (aaRSs). This domain consists of a helix-turn-helix structure , which is similar to other RNA-binding proteins. It is involved in both protein-RNA interactions by binding tRNA and protein-protein interactions, which are important for the formation of aaRSs into multienzyme complexes."
definition: >-
  GlyRS_RNA binding domain. This short RNA-binding domain is found at the N-terminus of GlyRS in several higher eukaryote aminoacyl-tRNA synthetases (aaRSs). This domain consists of a helix-turn-helix structure , which is similar to other RNA-binding proteins. It is involved in both protein-RNA interactions by binding tRNA and protein-protein interactions, which are important for the formation of aaRSs into multienzyme complexes. — an NCBI CDD conserved domain (cd00935); members share this curated model.
