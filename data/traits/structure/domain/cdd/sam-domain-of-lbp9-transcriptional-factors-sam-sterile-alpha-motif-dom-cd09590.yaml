identifier: CDD:cd09590
label: "SAM domain of LBP9 transcriptional factors. SAM (sterile alpha motif) domain of LBP9 (also known as TFCP2L1 or CRTR-1 (CP2-Related Transcriptional Repressor-1)) transcription factor is a putative protein-protein interaction domain. Proteins of this group have an N-terminal DNA-binding CP2 domain, a central predicted SAM domain and a C-terminal dimerization domain. They are involved in transcriptional regulation from early development to terminal differentiation. In particular, they are required for proper maturation of the dust (epithelial component of tubular organs) of kidney and salivary gland as well as for regulation of P450scc (the cholesterol side-chain cleavage enzyme, cytochrome) in human placenta."
definition: >-
  SAM domain of LBP9 transcriptional factors. SAM (sterile alpha motif) domain of LBP9 (also known as TFCP2L1 or CRTR-1 (CP2-Related Transcriptional Repressor-1)) transcription factor is a putative protein-protein interaction domain. Proteins of this group have an N-terminal DNA-binding CP2 domain, a central predicted SAM domain and a C-terminal dimerization domain. They are involved in transcriptional regulation from early development to terminal differentiation. In particular, they are required for proper maturation of the dust (epithelial component of tubular organs) of kidney and salivary gland as well as for regulation of P450scc (the cholesterol side-chain cleavage enzyme, cytochrome) in human placenta. — an NCBI CDD conserved domain (cd09590); members share this curated model.
