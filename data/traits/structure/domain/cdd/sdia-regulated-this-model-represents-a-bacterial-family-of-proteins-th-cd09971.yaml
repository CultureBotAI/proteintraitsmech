identifier: CDD:cd09971
label: "SdiA-regulated. This model represents a bacterial family of proteins that may be regulated by SdiA, a member of the LuxR family of transcriptional regulators. The C-terminal domain included in the alignment forms a five-bladed beta-propeller structure. The X-ray structure of Escherichia coli yjiK (C-terminal domain) exhibits binding of calcium ions (Ca++) in what appears to be an evolutionarily conserved site. Sequence analysis suggests a distant relationship to proteins that are characterized as containing NHL-repeats. The latter also form beta-propeller structures, with several examples known to form six-bladed beta-propellers. Several of the six-bladed beta-propellers containing NHL repeats have been characterized functionally, including members with enzymatic functions that are dependent on metal ions. No functional characterization is available for this family of five-bladed propellers, though."
definition: >-
  SdiA-regulated. This model represents a bacterial family of proteins that may be regulated by SdiA, a member of the LuxR family of transcriptional regulators. The C-terminal domain included in the alignment forms a five-bladed beta-propeller structure. The X-ray structure of Escherichia coli yjiK (C-terminal domain) exhibits binding of calcium ions (Ca++) in what appears to be an evolutionarily conserved site. Sequence analysis suggests a distant relationship to proteins that are characterized as containing NHL-repeats. The latter also form beta-propeller structures, with several examples known to form six-bladed beta-propellers. Several of the six-bladed beta-propellers containing NHL repeats have been characterized functionally, including members with enzymatic functions that are dependent on metal ions. No functional characterization is available for this family of five-bladed propellers, though. — an NCBI CDD conserved domain (cd09971); members share this curated model.
