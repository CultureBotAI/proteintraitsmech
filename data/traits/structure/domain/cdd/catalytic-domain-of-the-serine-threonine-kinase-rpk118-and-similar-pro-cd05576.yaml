identifier: CDD:cd05576
label: "Catalytic domain of the Serine/Threonine Kinase, RPK118, and similar proteins. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. RPK118 contains an N-terminal Phox homology (PX) domain, a Microtubule Interacting and Trafficking (MIT) domain, and a kinase domain containing a long uncharacterized insert. Also included in the family is human RPK60 (or ribosomal protein S6 kinase-like 1), which also contains MIT and kinase domains but lacks a PX domain. RPK118 binds sphingosine kinase, a key enzyme in the synthesis of sphingosine 1-phosphate (SPP), a lipid messenger involved in many cellular events. RPK118 may be involved in transmitting SPP-mediated signaling. RPK118 also binds the antioxidant peroxiredoxin-3. RPK118 may be involved in the transport of PRDX3 from the cytoplasm to its site of function in the mitochondria. The RPK118-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, RPK118, and similar proteins. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. RPK118 contains an N-terminal Phox homology (PX) domain, a Microtubule Interacting and Trafficking (MIT) domain, and a kinase domain containing a long uncharacterized insert. Also included in the family is human RPK60 (or ribosomal protein S6 kinase-like 1), which also contains MIT and kinase domains but lacks a PX domain. RPK118 binds sphingosine kinase, a key enzyme in the synthesis of sphingosine 1-phosphate (SPP), a lipid messenger involved in many cellular events. RPK118 may be involved in transmitting SPP-mediated signaling. RPK118 also binds the antioxidant peroxiredoxin-3. RPK118 may be involved in the transport of PRDX3 from the cytoplasm to its site of function in the mitochondria. The RPK118-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05576); members share this curated model.
