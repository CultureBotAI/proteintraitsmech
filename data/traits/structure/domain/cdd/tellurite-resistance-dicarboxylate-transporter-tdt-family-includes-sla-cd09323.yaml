identifier: CDD:cd09323
label: "Tellurite-resistance/Dicarboxylate Transporter (TDT) family includes SLAC1 (Slow Anion Channel-Associated 1). SLAC1 (Slow Anion Channel-Associated 1) is a plasma membrane protein, preferentially expressed in guard cells, which encodes a distant homolog of fungal and bacterial dicarboxylate/malic acid transport proteins. It is essential for stomatal closure in response to carbon dioxide, abscisic acid, ozone, light/dark transitions, humidity change, calcium ions, hydrogen peroxide and nitric oxide. In the Arabidopsis genome, SLAC1 is part of a gene family with five members and encodes a membrane protein that has ten putative transmembrane domains flanked by large N- and C-terminal domains. Mutations in SLAC1 impair slow (S-type) anion channel currents that are activated by cytosolic calcium ions and abscisic acid, but do not affect rapid (R-type) anion channel currents or calcium ion channel function."
definition: >-
  Tellurite-resistance/Dicarboxylate Transporter (TDT) family includes SLAC1 (Slow Anion Channel-Associated 1). SLAC1 (Slow Anion Channel-Associated 1) is a plasma membrane protein, preferentially expressed in guard cells, which encodes a distant homolog of fungal and bacterial dicarboxylate/malic acid transport proteins. It is essential for stomatal closure in response to carbon dioxide, abscisic acid, ozone, light/dark transitions, humidity change, calcium ions, hydrogen peroxide and nitric oxide. In the Arabidopsis genome, SLAC1 is part of a gene family with five members and encodes a membrane protein that has ten putative transmembrane domains flanked by large N- and C-terminal domains. Mutations in SLAC1 impair slow (S-type) anion channel currents that are activated by cytosolic calcium ions and abscisic acid, but do not affect rapid (R-type) anion channel currents or calcium ion channel function. — an NCBI CDD conserved domain (cd09323); members share this curated model.
