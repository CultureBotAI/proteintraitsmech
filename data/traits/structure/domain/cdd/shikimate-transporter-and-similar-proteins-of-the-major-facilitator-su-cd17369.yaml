identifier: CDD:cd17369
label: "Shikimate transporter and similar proteins of the Major Facilitator Superfamily. This subfamily is composed of Escherichia coli shikimate transporter (ShiA), inner membrane metabolite transport protein YhjE, and other putative metabolite transporters. ShiA is involved in the uptake of shikimate, an aromatic compound involved in siderophore biosynthesis. It has been suggested that YhjE may mediate the uptake of osmoprotectants. The ShiA-like subfamily belongs to the Metazoan Synaptic Vesicle Glycoprotein 2 (SV2) and related small molecule transporter family (SV2-like) of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
