identifier: CDD:cd15646
label: "PHD finger found in histone acetyltransferase p300. p300, also termed KAT3B, or E1A-associated protein p300 (EP300), is a paralog of CREB-binding protein (CBP). It is involved in E1A function in cell cycle progression and cellular differentiation. It functions as an intrinsic HAT, as well as a factor acetyltransferase (FAT) for many transcription regulators. And thus, p300 serves as a scaffold or bridge for transcription factors and other components of the basal transcription machinery to facilitate chromatin remodeling and to activate gene transcription. p300 contains a cysteine-histidine rich region, KIX (CREB interaction) domain, a plant homeodomain (PHD) finger, a HAT domain, followed by a SRC interaction domain."
definition: >-
  PHD finger found in histone acetyltransferase p300. p300, also termed KAT3B, or E1A-associated protein p300 (EP300), is a paralog of CREB-binding protein (CBP). It is involved in E1A function in cell cycle progression and cellular differentiation. It functions as an intrinsic HAT, as well as a factor acetyltransferase (FAT) for many transcription regulators. And thus, p300 serves as a scaffold or bridge for transcription factors and other components of the basal transcription machinery to facilitate chromatin remodeling and to activate gene transcription. p300 contains a cysteine-histidine rich region, KIX (CREB interaction) domain, a plant homeodomain (PHD) finger, a HAT domain, followed by a SRC interaction domain. — an NCBI CDD conserved domain (cd15646); members share this curated model.
