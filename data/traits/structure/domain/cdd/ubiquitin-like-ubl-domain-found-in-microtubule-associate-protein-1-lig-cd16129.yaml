identifier: CDD:cd16129
label: "ubiquitin-like (Ubl) domain found in microtubule associate protein 1 light chain 3 (MAP1LC3). Autophagy is an essential intracellular process that targets large protein complexes, bacterial pathogens, and organelles for degradation. MAP1LC3 (also known as LC3) has a ubiquitin-like (Ubl) fold and belongs to the ATG8 autophagy protein family. A Ubl conjugation of MAP1LC3 by the phospholipid phosphatidylethanolamine (PE) is an essential process for the formation of autophagosomes. MAP1LC3 is cleaved by the cysteine protease ATG4 and is then conjugated with PE by E1-like enzyme ATG7 and ATG3, an E2-like enzyme. The Ubl conversion of MAP1LC3 is known as a marker of autophagy-induction. This sub-family includes MAP1LC3A, MAP1LC3B, and MAP1LC3C, each encoded by a different MAP1LC3 gene."
definition: >-
