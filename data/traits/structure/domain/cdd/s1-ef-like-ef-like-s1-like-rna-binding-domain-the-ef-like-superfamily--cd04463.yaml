identifier: CDD:cd04463
label: "S1_EF_like: EF-like, S1-like RNA-binding domain. The EF-like superfamily contains the bacterial translation elongation factor P and its archeal and eukaryotic homologs, aIF5A and eIF5A. All proteins in this superfamily contain an S1 domain, which binds RNA or single-stranded DNA and often interacts with the ribosome. Hex-1, the SI-like domain of which is also found in this group, is structurally homologous to eIF5A and might have evolved from an ancestral eIF5A through gene duplication."
definition: >-
  S1_EF_like: EF-like, S1-like RNA-binding domain. The EF-like superfamily contains the bacterial translation elongation factor P and its archeal and eukaryotic homologs, aIF5A and eIF5A. All proteins in this superfamily contain an S1 domain, which binds RNA or single-stranded DNA and often interacts with the ribosome. Hex-1, the SI-like domain of which is also found in this group, is structurally homologous to eIF5A and might have evolved from an ancestral eIF5A through gene duplication. — an NCBI CDD conserved domain (cd04463); members share this curated model.
