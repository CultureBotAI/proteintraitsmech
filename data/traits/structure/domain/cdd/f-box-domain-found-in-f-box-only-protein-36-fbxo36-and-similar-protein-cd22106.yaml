identifier: CDD:cd22106
label: "F-box domain found in F-box only protein 36 (FBXO36) and similar proteins. FBXO36, also called FBX36, likely functions as the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 36 (FBXO36) and similar proteins. FBXO36, also called FBX36, likely functions as the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22106); members share this curated model.
