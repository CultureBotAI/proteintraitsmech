identifier: CDD:cd14997
label: "ecdysis-triggering hormone receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup represents the ecdysis-triggering hormone receptors found in insects, which are members of the class A family of seven-transmembrane G-protein coupled receptors. Ecdysis-triggering hormones are vital regulatory signals that govern the stereotypic physiological sequence leading to cuticle shedding in insects. Thus, the ETH signaling system has been a target for the design of more sophisticated insect-selective pest control strategies. Two subtypes of ecdysis-triggering hormone receptor were identified in Drosophila melanogaster. Blood-borne ecdysis-triggering hormone (ETH) activates the behavioral sequence through direct actions on the central nervous system. In insects, ecdysis is thought to be controlled by the interaction between peptide hormones; in particular between ecdysis-triggering hormone (ETH) from the periphery and eclosion hormone (EH) and crustacean cardioactive peptide (CCAP) from the central nervous system. All GPCRs have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A general feature of GPCR signaling is agonist-induced conformational changes in the receptors, leading to activation of the heterotrimeric G proteins, which consist of the guanine nucleotide-binding G-alpha subunit and the dimeric G-beta-gamma subunits. The activated G proteins then bind to and activate numerous downstream effector proteins, which generate second messengers that mediate a broad range of cellular and physiological processes."
definition: >-
  ecdysis-triggering hormone receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. This subgroup represents the ecdysis-triggering hormone receptors found in insects, which are members of the class A family of seven-transmembrane G-protein coupled receptors. Ecdysis-triggering hormones are vital regulatory signals that govern the stereotypic physiological sequence leading to cuticle shedding in insects. Thus, the ETH signaling system has been a target for the design of more sophisticated insect-selective pest control strategies. Two subtypes of ecdysis-triggering hormone receptor were identified in Drosophila melanogaster. Blood-borne ecdysis-triggering hormone (ETH) activates the behavioral sequence through direct actions on the central nervous system. In insects, ecdysis is thought to be controlled by the interaction between peptide hormones; in particular between ecdysis-triggering hormone (ETH) from the periphery and eclosion hormone (EH) and crustacean cardioactive peptide (CCAP) from the central nervous system. All GPCRs have a common structural architecture comprising of seven-transmembrane (TM) alpha-helices interconnected by three extracellular and three intracellular loops. A general feature of GPCR signaling is agonist-induced conformational changes in the receptors, leading to activation of the heterotrimeric G proteins, which consist of the guanine nucleotide-binding G-alpha subunit and the dimeric G-beta-gamma subunits. The activated G proteins then bind to and activate numerous downstream effector proteins, which generate second messengers that mediate a broad range of cellular and physiological processes. — an NCBI CDD conserved domain (cd14997); members share this curated model.
