identifier: CDD:cd04924
label: "ACT domains of a monofunctional aspartokinase found mostly in Archaea species (ACT_AK-Arch_2). Included in this CD is the second of two ACT domains of a monofunctional aspartokinase found mostly in Archaea species (ACT_AK-Arch_2). The first or N-terminal ACT domain of these proteins cluster with the ThrA-like ACT 1 domains (ACT_AKi-HSDH-ThrA-like_1) which includes the threonine-sensitive archaeal Methanococcus jannaschii aspartokinase ACT 1 domain. Members of this CD belong to the superfamily of ACT regulatory domains."
definition: >-
  ACT domains of a monofunctional aspartokinase found mostly in Archaea species (ACT_AK-Arch_2). Included in this CD is the second of two ACT domains of a monofunctional aspartokinase found mostly in Archaea species (ACT_AK-Arch_2). The first or N-terminal ACT domain of these proteins cluster with the ThrA-like ACT 1 domains (ACT_AKi-HSDH-ThrA-like_1) which includes the threonine-sensitive archaeal Methanococcus jannaschii aspartokinase ACT 1 domain. Members of this CD belong to the superfamily of ACT regulatory domains. — an NCBI CDD conserved domain (cd04924); members share this curated model.
