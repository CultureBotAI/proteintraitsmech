identifier: CDD:cd24068
label: "nucleotide-binding domain (NBD) of Fusobacterium nucleatum N-acetylmannosamine kinase and similar proteins. The family includes Fusobacterium nucleatum N-acetylmannosamine kinase (NanK; EC 2.7.1.60) and beta-glucoside kinase (BglK; EC 2.7.1.85) from Klebsiella pneumoniae and Listeria innocua. NanK catalyzes the second step of the sialic acid catabolic pathway, transferring a phosphate group from adenosine 5'-triphosphate to the C6 position of N-acetylmannosamine to generate N-acetylmannosamine 6-phosphate. Unlike other NanK enzymes and ROK family members, F. nucleatum NanK does not have a conserved zinc-binding site. BglK catalyzes the ATP-dependent phosphorylation of cellobiose to produce cellobiose-6'-P. It may have a dual role of kinase and transcriptional regulator of the cellobiose-PTS operon. The subfamily belongs to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. Members of this subfamily lack the cysteine-rich zinc-binding motif, which presents in other ROK families."
definition: >-
  nucleotide-binding domain (NBD) of Fusobacterium nucleatum N-acetylmannosamine kinase and similar proteins. The family includes Fusobacterium nucleatum N-acetylmannosamine kinase (NanK; EC 2.7.1.60) and beta-glucoside kinase (BglK; EC 2.7.1.85) from Klebsiella pneumoniae and Listeria innocua. NanK catalyzes the second step of the sialic acid catabolic pathway, transferring a phosphate group from adenosine 5'-triphosphate to the C6 position of N-acetylmannosamine to generate N-acetylmannosamine 6-phosphate. Unlike other NanK enzymes and ROK family members, F. nucleatum NanK does not have a conserved zinc-binding site. BglK catalyzes the ATP-dependent phosphorylation of cellobiose to produce cellobiose-6'-P. It may have a dual role of kinase and transcriptional regulator of the cellobiose-PTS operon. The subfamily belongs to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. Members of this subfamily lack the cysteine-rich zinc-binding motif, which presents in other ROK families. — an NCBI CDD conserved domain (cd24068); members share this curated model.
