identifier: CDD:cd12624
label: "RNA recognition motif (RRM) found in peroxisome proliferator-activated receptor gamma coactivator-related protein 1 (PRC) and similar proteins. This subgroup corresponds to the RRM of PRC, also termed PGC-1-related coactivator, one of the members of PGC-1 transcriptional coactivators family, including peroxisome proliferator-activated receptor gamma coactivators PGC-1alpha and PGC-1beta. Unlike PGC-1alpha and PGC-1beta, PRC is ubiquitous and more abundantly expressed in proliferating cells than in growth-arrested cells. PRC has been implicated in the regulation of several metabolic pathways, mitochondrial biogenesis, and cell growth. It functions as a growth-regulated transcriptional cofactor activating many nuclear genes specifying mitochondrial respiratory function. PRC directly interacts with nuclear transcriptional factors implicated in respiratory chain expression including nuclear respiratory factors 1 and 2 (NRF-1 and NRF-2), CREB (cAMP-response element-binding protein), and estrogen-related receptor alpha (ERRalpha). It interacts indirectly with the NRF-2beta subunit through host cell factor (HCF), a cellular protein involved in herpes simplex virus (HSV) infection and cell cycle regulation. Furthermore, like PGC-1alpha and PGC-1beta, PRC can transactivate a number of NRF-dependent nuclear genes required for mitochondrial respiratory function, including those encoding cytochrome c, 5-aminolevulinate synthase, Tfam, and TFB1M, and TFB2M. Further research indicates that PRC may also act as a sensor of metabolic stress that orchestrates a redox-sensitive program of inflammatory gene expression. PRC is a multi-domain protein containing an N-terminal activation domain, an LXXLL coactivator signature, a central proline-rich region, a tetrapeptide motif (DHDY) responsible for HCF binding, a C-terminal arginine/serine-rich (SR) domain, and an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif (RRM) found in peroxisome proliferator-activated receptor gamma coactivator-related protein 1 (PRC) and similar proteins. This subgroup corresponds to the RRM of PRC, also termed PGC-1-related coactivator, one of the members of PGC-1 transcriptional coactivators family, including peroxisome proliferator-activated receptor gamma coactivators PGC-1alpha and PGC-1beta. Unlike PGC-1alpha and PGC-1beta, PRC is ubiquitous and more abundantly expressed in proliferating cells than in growth-arrested cells. PRC has been implicated in the regulation of several metabolic pathways, mitochondrial biogenesis, and cell growth. It functions as a growth-regulated transcriptional cofactor activating many nuclear genes specifying mitochondrial respiratory function. PRC directly interacts with nuclear transcriptional factors implicated in respiratory chain expression including nuclear respiratory factors 1 and 2 (NRF-1 and NRF-2), CREB (cAMP-response element-binding protein), and estrogen-related receptor alpha (ERRalpha). It interacts indirectly with the NRF-2beta subunit through host cell factor (HCF), a cellular protein involved in herpes simplex virus (HSV) infection and cell cycle regulation. Furthermore, like PGC-1alpha and PGC-1beta, PRC can transactivate a number of NRF-dependent nuclear genes required for mitochondrial respiratory function, including those encoding cytochrome c, 5-aminolevulinate synthase, Tfam, and TFB1M, and TFB2M. Further research indicates that PRC may also act as a sensor of metabolic stress that orchestrates a redox-sensitive program of inflammatory gene expression. PRC is a multi-domain protein containing an N-terminal activation domain, an LXXLL coactivator signature, a central proline-rich region, a tetrapeptide motif (DHDY) responsible for HCF binding, a C-terminal arginine/serine-rich (SR) domain, and an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserve