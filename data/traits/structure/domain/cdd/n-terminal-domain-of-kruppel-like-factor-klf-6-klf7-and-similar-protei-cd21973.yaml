identifier: CDD:cd21973
label: "N-terminal domain of Kruppel-like factor (KLF) 6, KLF7, and similar proteins. This subfamily is composed of Kruppel-like factor or Krueppel-like factor (KLF) 6, KLF7, and similar proteins, including KLF Luna, a Drosophila KLF6/KLF7. KLF6 contributes to cell proliferation, differentiation, cell death and signal transduction. Hepatocyte expression of KLF6 regulates hepatic fatty acid and glucose metabolism via transcriptional activation of liver glucokinase and post-transcriptional regulation of the nuclear receptor peroxisome proliferator activated receptor alpha (PPARa). KLF7 is involved in regulation of the development and function of the nervous system and adipose tissue, type 2 diabetes, blood diseases, as well as pluripotent cell maintenance. KLF Luna is maternally required for synchronized nuclear and centrosome cycles in the preblastoderm embryo. KLF6 and KLF7 are transcriptional activators. They belong to a family of proteins, called the Specificity Protein (SP)/KLF family, characterized by a C-terminal DNA-binding domain of 81 amino acids consisting of three Kruppel-like C2H2 zinc fingers. These factors bind to a loose consensus motif, namely NNRCRCCYY (where N is any nucleotide; R is A/G, and Y is C/T), such as the recurring motifs in GC and GT boxes (5'-GGGGCGGGG-3' and 5-GGTGTGGGG-3') that are present in promoters and more distal regulatory elements of mammalian genes. Members of the KLF family can act as activators or repressors of transcription depending on cell and promoter context. KLFs regulate various cellular functions, such as proliferation, differentiation, and apoptosis, as well as the development and homeostasis of several types of tissue. In addition to the C-terminal DNA-binding domain, each KLF also has a unique N-terminal activation/repression domain that confers specificity and allows it to bind specifically to a certain partner, leading to distinct activities in vivo. This model represents the related N-terminal domains of KLF6, KLF7, and similar proteins."
