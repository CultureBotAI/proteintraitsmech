identifier: CDD:cd15549
label: "PHD finger found in PHD finger protein 20 (PHF20) and PHD finger protein 20-like protein 1 (P20L1). PHF20, also termed Glioma-expressed antigen 2, or hepatocellular carcinoma-associated antigen 58, or novel zinc finger protein, or transcription factor TZP (referring to Tudor and zinc finger domain containing protein), is a regulator of NF-kappaB activation by disrupting recruitment of PP2A to p65. It also functions as a transcription factor that binds Akt and plays a role in Akt cell survival/growth signaling. Moreover, it transcriptionally regulates p53. The phosphorylation of PHF20 on Ser291 mediated by protein kinase B (PKB) is essential in tumorigenesis via the regulation of p53 mediated signaling. P20L1 is an active malignant brain tumor (MBT) domain-containing protein that binds to monomethylated lysine 142 on DNA (Cytosine-5) Methyltransferase 1 (DNMT1) (DNMT1K142me1) and colocalizes at the perinucleolar space in a SET7-dependent manner. Its MBT domain reads and controls enzyme levels of methylated DNMT1 in cells, thus representing a novel antagonist of DNMT1 proteasomal degradation. Both PHF20 and PHF20L1 contain an N-terminal MBT domain, two Tudor domains, a plant homeodomain (PHD) finger and the putative DNA-binding domains, AT hook and Cys2His2-type zinc finger."
definition: >-
  PHD finger found in PHD finger protein 20 (PHF20) and PHD finger protein 20-like protein 1 (P20L1). PHF20, also termed Glioma-expressed antigen 2, or hepatocellular carcinoma-associated antigen 58, or novel zinc finger protein, or transcription factor TZP (referring to Tudor and zinc finger domain containing protein), is a regulator of NF-kappaB activation by disrupting recruitment of PP2A to p65. It also functions as a transcription factor that binds Akt and plays a role in Akt cell survival/growth signaling. Moreover, it transcriptionally regulates p53. The phosphorylation of PHF20 on Ser291 mediated by protein kinase B (PKB) is essential in tumorigenesis via the regulation of p53 mediated signaling. P20L1 is an active malignant brain tumor (MBT) domain-containing protein that binds to monomethylated lysine 142 on DNA (Cytosine-5) Methyltransferase 1 (DNMT1) (DNMT1K142me1) and colocalizes at the perinucleolar space in a SET7-dependent manner. Its MBT domain reads and controls enzyme levels of methylated DNMT1 in cells, thus representing a novel antagonist of DNMT1 proteasomal degradation. Both PHF20 and PHF20L1 contain an N-terminal MBT domain, two Tudor domains, a plant homeodomain (PHD) finger and the putative DNA-binding domains, AT hook and Cys2His2-type zinc finger. — an NCBI CDD conserved domain (cd15549); members share this curated model.
