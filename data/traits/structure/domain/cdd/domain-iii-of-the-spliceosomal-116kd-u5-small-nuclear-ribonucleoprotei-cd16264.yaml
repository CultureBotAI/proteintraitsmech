identifier: CDD:cd16264
label: "Domain III of the spliceosomal 116kD U5 small nuclear ribonucleoprotein (snRNP) component. Domain III of the spliceosomal human 116kD U5 small nuclear ribonucleoprotein (snRNP) protein (U5-116 kD) and its yeast counterpart Snu114p is homologous to domain III of the eukaryotic translational elongation factor EF-2. U5-116 kD is a GTPase component of the spliceosome complex which functions in the processing of precursor mRNAs to produce mature mRNAs."
definition: >-
  Domain III of the spliceosomal 116kD U5 small nuclear ribonucleoprotein (snRNP) component. Domain III of the spliceosomal human 116kD U5 small nuclear ribonucleoprotein (snRNP) protein (U5-116 kD) and its yeast counterpart Snu114p is homologous to domain III of the eukaryotic translational elongation factor EF-2. U5-116 kD is a GTPase component of the spliceosome complex which functions in the processing of precursor mRNAs to produce mature mRNAs. — an NCBI CDD conserved domain (cd16264); members share this curated model.
