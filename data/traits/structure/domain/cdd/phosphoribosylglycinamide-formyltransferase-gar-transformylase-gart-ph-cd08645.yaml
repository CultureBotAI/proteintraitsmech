identifier: CDD:cd08645
label: "Phosphoribosylglycinamide formyltransferase (GAR transformylase, GART). Phosphoribosylglycinamide formyltransferase, also known as GAR transformylase or GART, is an essential enzyme that catalyzes the third step in de novo purine biosynthesis. This enzyme uses formyl tetrahydrofolate as a formyl group donor to produce 5'-phosphoribosyl-N-formylglycinamide. In prokaryotes, GART is a single domain protein but in most eukaryotes it is the C-terminal portion of a large multifunctional protein which also contains GAR synthetase and aminoimidazole ribonucleotide synthetase activities."
definition: >-
