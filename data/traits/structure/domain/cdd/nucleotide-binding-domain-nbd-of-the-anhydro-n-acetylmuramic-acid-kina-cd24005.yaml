identifier: CDD:cd24005
label: "nucleotide-binding domain (NBD) of the anhydro-N-acetylmuramic acid kinase (ANMK)-like domain family. The family includes anhydro-N-acetylmuramic acid kinase (ANMK) and levoglucosan kinase (LGK). ANMK (EC 2.7.1.170), also called AnhMurNAc kinase, catalyzes the specific phosphorylation of 1,6-anhydro-N-acetylmuramic acid (anhMurNAc) with the simultaneous cleavage of the 1,6-anhydro ring, generating MurNAc-6-P. It is required for the utilization of anhMurNAc either imported from the medium or derived from its own cell wall murein, and thus plays a role in cell wall recycling. LGK (EC 2.7.1.232) catalyzes the transfer of a phosphate group from ATP to levoglucosan (1,6-anhydro-beta-D-glucopyranose, LG) to yield glucose 6-phosphate in the presence of magnesium ion and ATP. In addition to the canonical kinase phosphotransfer reaction, the conversion requires cleavage of the 1,6-anhydro ring to allow ATP-dependent phosphorylation of the sugar O-6 atom. The ANMK-like family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains."
definition: >-
  nucleotide-binding domain (NBD) of the anhydro-N-acetylmuramic acid kinase (ANMK)-like domain family. The family includes anhydro-N-acetylmuramic acid kinase (ANMK) and levoglucosan kinase (LGK). ANMK (EC 2.7.1.170), also called AnhMurNAc kinase, catalyzes the specific phosphorylation of 1,6-anhydro-N-acetylmuramic acid (anhMurNAc) with the simultaneous cleavage of the 1,6-anhydro ring, generating MurNAc-6-P. It is required for the utilization of anhMurNAc either imported from the medium or derived from its own cell wall murein, and thus plays a role in cell wall recycling. LGK (EC 2.7.1.232) catalyzes the transfer of a phosphate group from ATP to levoglucosan (1,6-anhydro-beta-D-glucopyranose, LG) to yield glucose 6-phosphate in the presence of magnesium ion and ATP. In addition to the canonical kinase phosphotransfer reaction, the conversion requires cleavage of the 1,6-anhydro ring to allow ATP-dependent phosphorylation of the sugar O-6 atom. The ANMK-like family belongs to the ASKHA (Acetate and Sugar Kinases/Hsc70/Actin) superfamily of phosphotransferases, all members of which share a common characteristic five-stranded beta sheet occurring in both the N- and C-terminal domains. — an NCBI CDD conserved domain (cd24005); members share this curated model.
