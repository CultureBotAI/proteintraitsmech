identifier: CDD:cd12884
label: "SPRY domain in heterogeneous nuclear ribonucleoprotein U-like (hnRNP) protein 1. This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of heterogeneous nuclear ribonucleoprotein U-like (hnRNP) protein 1 (also known as HNRPUL1 ) which is a major constituent of nuclear matrix or scaffold and binds directly to DNA sequences through the N-terminal acidic region named serum amyloid P (SAP). Its function is specifically modulated by E1B-55kDa in adenovirus-infected cells. HNRPUL1 also participates in ATR protein kinase signaling pathways during adenovirus infection. Two transcript variants encoding different isoforms have been found for this gene. When associated with bromodomain-containing protein 7 (BRD7), it activates transcription of glucocorticoid-responsive promoter in the absence of ligand-stimulation."
definition: >-
