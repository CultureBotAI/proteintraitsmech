label: "Picornavirus capsid protein domain_like. Picornaviruses are non-enveloped plus-strand ssRNA animal viruses with icosahedral capsids composed of 60 copies each of 4 virus encoded proteins; alignment includes picornaviridae, like poliovirus, hepatitis A virus, rhinovirus, foot-and-mouth disease virus and encephalomyocarditis virus; common structure is an 8-stranded beta sandwich"
definition: >-
  Picornavirus capsid protein domain_like. Picornaviruses are non-enveloped plus-strand ssRNA animal viruses with icosahedral capsids composed of 60 copies each of 4 virus encoded proteins; alignment includes picornaviridae, like poliovirus, hepatitis A virus, rhinovirus, foot-and-mouth disease virus and encephalomyocarditis virus; common structure is an 8-stranded beta sandwich — an NCBI CDD conserved domain (cd00205); members share this curated model.
