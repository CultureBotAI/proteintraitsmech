identifier: CDD:cd14801
label: "DNA-binding domain of Signal Transducer and Activator of Transcription (STAT). This family consists of the DNA binding domain (DBD) of the STAT proteins (Signal Transducer and Activator of Transcription, or Signal Transduction And Transcription), which are latent cytoplasmic transcriptional factors that play an important role in cytokine and growth factor signaling. STAT proteins regulate several aspects of growth, survival and differentiation in cells. The transcription factors of this family are activated by JAK (Janus kinase) and dysregulation of this pathway is frequently observed in primary tumors and leads to immunosuppression, increased angiogenesis and enhanced survival of tumors. There are seven mammalian STAT family members that have been identified: STAT1, STAT2, STAT3, STAT4, STAT5A, STAT5B and STAT6. STAT proteins consist of six structural regions: N-terminal domain (ND)/protein interaction domain, coiled-coil domain (CCD)/STAT all alpha domain, DNA-binding domain (DBD), linker domain (LK), a Src homology 2 (SH2) domain, and C-terminal transcriptional activation domain (TA) that includes two conserved phosphorylation sites (tyrosine and serine residues). STAT1 and STAT3 have the greatest diversity of biological functions among the 7 known members of the STAT family. The DNA binding domain of STAT has an Ig-like fold. DNA binding specificity experiments of different STAT proteins show that STAT5A specificity is more similar to that of STAT6 than that of STAT1, as also seen from the evolutionary relationships."
definition: >-
  DNA-binding domain of Signal Transducer and Activator of Transcription (STAT). This family consists of the DNA binding domain (DBD) of the STAT proteins (Signal Transducer and Activator of Transcription, or Signal Transduction And Transcription), which are latent cytoplasmic transcriptional factors that play an important role in cytokine and growth factor signaling. STAT proteins regulate several aspects of growth, survival and differentiation in cells. The transcription factors of this family are activated by JAK (Janus kinase) and dysregulation of this pathway is frequently observed in primary tumors and leads to immunosuppression, increased angiogenesis and enhanced survival of tumors. There are seven mammalian STAT family members that have been identified: STAT1, STAT2, STAT3, STAT4, STAT5A, STAT5B and STAT6. STAT proteins consist of six structural regions: N-terminal domain (ND)/protein interaction domain, coiled-coil domain (CCD)/STAT all alpha domain, DNA-binding domain (DBD), linker domain (LK), a Src homology 2 (SH2) domain, and C-terminal transcriptional activation domain (TA) that includes two conserved phosphorylation sites (tyrosine and serine residues). STAT1 and STAT3 have the greatest diversity of biological functions among the 7 known members of the STAT family. The DNA binding domain of STAT has an Ig-like fold. DNA binding specificity experiments of different STAT proteins show that STAT5A specificity is more similar to that of STAT6 than that of STAT1, as also seen from the evolutionary relationships. — an NCBI CDD conserved domain (cd14801); members share this curated model.
