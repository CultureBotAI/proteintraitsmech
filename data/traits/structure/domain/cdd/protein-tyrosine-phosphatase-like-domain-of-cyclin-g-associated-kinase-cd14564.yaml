identifier: CDD:cd14564
label: "protein tyrosine phosphatase-like domain of cyclin-G-associated kinase. cyclin-G-associated kinase (GAK), also called auxilin-2, contains an N-terminal protein kinase domain that phosphorylates the mu subunits of adaptor protein (AP) 1 and AP2. In addition, it contains an auxilin-1-like domain structure consisting of a protein tyrosine phosphatase (PTP)-like domain similar to the PTP-like domain of PTEN (a phosphoinositide 3-phosphatase), and a C-terminal region with clathrin-binding and J domains. Like auxilin-1, GAK facilitates Hsc70-mediated dissociation of clathrin from clathrin-coated vesicles. GAK is expressed ubiquitously and is enriched in the Golgi, unlike auxilin-1 which is nerve-specific. GAK also plays regulatory roles outside of clathrin-mediated membrane traffic including the maintenance of centrosome integrity and chromosome congression, neural patterning, survival of neurons, and immune responses through interaction with the interleukin 12 receptor."
definition: >-
  protein tyrosine phosphatase-like domain of cyclin-G-associated kinase. cyclin-G-associated kinase (GAK), also called auxilin-2, contains an N-terminal protein kinase domain that phosphorylates the mu subunits of adaptor protein (AP) 1 and AP2. In addition, it contains an auxilin-1-like domain structure consisting of a protein tyrosine phosphatase (PTP)-like domain similar to the PTP-like domain of PTEN (a phosphoinositide 3-phosphatase), and a C-terminal region with clathrin-binding and J domains. Like auxilin-1, GAK facilitates Hsc70-mediated dissociation of clathrin from clathrin-coated vesicles. GAK is expressed ubiquitously and is enriched in the Golgi, unlike auxilin-1 which is nerve-specific. GAK also plays regulatory roles outside of clathrin-mediated membrane traffic including the maintenance of centrosome integrity and chromosome congression, neural patterning, survival of neurons, and immune responses through interaction with the interleukin 12 receptor. — an NCBI CDD conserved domain (cd14564); members share this curated model.
