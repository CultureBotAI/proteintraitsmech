identifier: CDD:cd11632
label: "Second Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Protein Kinase N3. PKN3, also called PKNbeta, is a serine/threonine protein kinase that is activated by the Rho family of small GTPases, preferentially by RhoC. Both PKN1 and RhoC show limited and barely detectable expression in normal tissues, but are both upregulated in cancer cells, particularly in late-stage malignancies. PKN3 has been implicated to play a role in the metastatic growth and invasiveness of cancer cells, downstream of the oncogenic phosphoinositide 3-kinase signaling network. PKN3 shares a common domain architecture with other PKNs, containing three HR1 domains, a C2 domain, and a kinase domain. In addition, PKN3 contains two proline-rich regions between its C2 and kinase domains, and has been shown to associate with SH3 domain containing proteins like GRAFs, GAP for RhoA, and Cdc42Hs. This model characterizes the second HR1 domain of PKN3. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; PKN3 binds Rho family GTPases, preferentially RhoC."
definition: >-
  Second Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Protein Kinase N3. PKN3, also called PKNbeta, is a serine/threonine protein kinase that is activated by the Rho family of small GTPases, preferentially by RhoC. Both PKN1 and RhoC show limited and barely detectable expression in normal tissues, but are both upregulated in cancer cells, particularly in late-stage malignancies. PKN3 has been implicated to play a role in the metastatic growth and invasiveness of cancer cells, downstream of the oncogenic phosphoinositide 3-kinase signaling network. PKN3 shares a common domain architecture with other PKNs, containing three HR1 domains, a C2 domain, and a kinase domain. In addition, PKN3 contains two proline-rich regions between its C2 and kinase domains, and has been shown to associate with SH3 domain containing proteins like GRAFs, GAP for RhoA, and Cdc42Hs. This model characterizes the second HR1 domain of PKN3. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; PKN3 binds Rho family GTPases, preferentially RhoC. — an NCBI CDD conserved domain (cd11632); members share this curated model.
