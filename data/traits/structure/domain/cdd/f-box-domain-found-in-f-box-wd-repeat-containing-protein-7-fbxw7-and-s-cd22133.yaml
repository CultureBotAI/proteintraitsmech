identifier: CDD:cd22133
label: "F-box domain found in F-box/WD repeat-containing protein 7 (FBXW7) and similar proteins. FBXW7, also called Archipelago homolog (Ago), F-box and WD-40 domain-containing protein 7, F-box protein FBX30, SEL-10, or Cdc4, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as cyclin-E (CCNE1 or CCNE2), DISC1, JUN, MYC, NOTCH1 released notch intracellular domain (NICD), NOTCH2, MCL1, and probably PSEN1. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/WD repeat-containing protein 7 (FBXW7) and similar proteins. FBXW7, also called Archipelago homolog (Ago), F-box and WD-40 domain-containing protein 7, F-box protein FBX30, SEL-10, or Cdc4, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of target proteins, such as cyclin-E (CCNE1 or CCNE2), DISC1, JUN, MYC, NOTCH1 released notch intracellular domain (NICD), NOTCH2, MCL1, and probably PSEN1. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22133); members share this curated model.
