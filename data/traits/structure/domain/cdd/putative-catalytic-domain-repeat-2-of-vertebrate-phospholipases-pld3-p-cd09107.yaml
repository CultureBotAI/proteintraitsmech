identifier: CDD:cd09107
label: "Putative catalytic domain, repeat 2, of vertebrate phospholipases, PLD3, PLD4 and PLD5, viral envelope proteins K4 and p37, and similar proteins. Putative catalytic domain, repeat 2, of vertebrate phospholipases D, PLD3, PLD4, and PLD5 (EC 3.1.4.4), viral envelope proteins (vaccinia virus proteins K4 and p37), and similar proteins. Most family members contain two copies of the HKD motifs (H-x-K-x(4)-D, where x represents any amino acid residue), and have been classified into the phospholipase D (PLD) superfamily. Proteins in this subfamily are associated with Golgi membranes, altering their lipid content by the conversion of phospholipids into phosphatidic acid, which is thought to be involved in the regulation of lipid movement. ADP ribosylation factor (ARF), a small guanosine triphosphate binding protein, might be required activity. The vaccinia virus p37 protein, encoded by the F13L gene, is also associated with Golgi membranes and is required for the envelopment and spread of the extracellular enveloped virus (EEV). The vaccinia virus protein K4, encoded by the HindIII K4L gene, remains to be characterized. Sequence analysis indicates that the vaccinia virus proteins K4 and p37 might have evolved from one or more captured eukaryotic genes involved in cellular lipid metabolism. Up to date, no catalytic activity of PLD3 has been shown. Furthermore, due to the lack of functional important histidine and lysine residues in the HKD motif, mammalian PLD5 has been characterized as an inactive PLD. The poxvirus p37 proteins may also lack PLD enzymatic activity, since they contain only one partially conserved HKD motif (N-x-K-x(4)-D)."
