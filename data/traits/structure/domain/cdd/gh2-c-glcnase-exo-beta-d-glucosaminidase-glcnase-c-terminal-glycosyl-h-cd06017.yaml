identifier: CDD:cd06017
label: "GH2_C_GlcNase. Exo-beta-D-glucosaminidase (GlcNase), C-terminal glycosyl hydrolase, family 2 (GH2) domain.  GlcNase is an extracellular enzyme that hydrolyzes N,N'-diacetylchitobiose, a product of chitin degradation, producing individual beta-(1-4)-linked GlcNAc (N-acetyl-D-glucosamine) units which are then transported into the cell in a phosphorylation-coupled manner."
definition: >-
