identifier: CDD:cd05316
label: "Gal80-MmyG. The Gal80-MmyG CD includes Gal80, the transcriptional regulator involved in the repression of galactose (GAL) metabolism genes in the absence of galactose, as well as, the  putative oxidoreductase, MmyG of Streptomyces coelicolor A3(2). The nucleocytoplasmic shuttling of the repressor Gal80 is known to play a pivotal role in the signal transduction process of GAL genetic switch of Saccharomyces cerevisiae. Recently, it has been shown that Gal80 dimerizes with high affinity and appears to stabilize Gal4 (transcription activator) and Gal80 as well as Gal4 and DNA interactions. The dimer-dimer interaction of Gal80 has also been implicated as important for completely shutting off the expression of GAL genes from GAL promoters containing two Gal4-binding sites. Members of this CD share sequence similarity with proteins containing an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins."
definition: >-
  Gal80-MmyG. The Gal80-MmyG CD includes Gal80, the transcriptional regulator involved in the repression of galactose (GAL) metabolism genes in the absence of galactose, as well as, the putative oxidoreductase, MmyG of Streptomyces coelicolor A3(2). The nucleocytoplasmic shuttling of the repressor Gal80 is known to play a pivotal role in the signal transduction process of GAL genetic switch of Saccharomyces cerevisiae. Recently, it has been shown that Gal80 dimerizes with high affinity and appears to stabilize Gal4 (transcription activator) and Gal80 as well as Gal4 and DNA interactions. The dimer-dimer interaction of Gal80 has also been implicated as important for completely shutting off the expression of GAL genes from GAL promoters containing two Gal4-binding sites. Members of this CD share sequence similarity with proteins containing an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins. — an NCBI CDD conserved domain (cd05316); members share this curated model.
