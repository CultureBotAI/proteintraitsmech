identifier: CDD:cd17406
label: "Protein unc-93 homolog A and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of Caenorhabditis elegans Uncoordinated protein 93 (also called putative potassium channel regulatory protein unc-93), human protein unc-93 homolog A (HmUnc-93A or UNC93A), and similar proteins. Unc-93 acts as a regulatory subunit of a multi-subunit  potassium channel complex that may function in coordinating muscle contraction in C. elegans. The human UNC93A gene is located in a region of the genome that is frequently associated with ovarian cancer, however, there is no evidence that UNC93A has a tumor suppressor function. This unc93A-like subfamily belongs to the Unc-93 family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Protein unc-93 homolog A and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of Caenorhabditis elegans Uncoordinated protein 93 (also called putative potassium channel regulatory protein unc-93), human protein unc-93 homolog A (HmUnc-93A or UNC93A), and similar proteins. Unc-93 acts as a regulatory subunit of a multi-subunit potassium channel complex that may function in coordinating muscle contraction in C. elegans. The human UNC93A gene is located in a region of the genome that is frequently associated with ovarian cancer, however, there is no evidence that UNC93A has a tumor suppressor function. This unc93A-like subfamily belongs to the Unc-93 family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17406); members share this curated model.
