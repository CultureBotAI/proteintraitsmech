identifier: CDD:cd20866
label: "protein kinase C conserved region 1 (C1 domain) found in myotonic dystrophy kinase-related Cdc42-binding kinase gamma (MRCK gamma) and similar proteins. MRCK gamma (MRCKG), also called Cdc42-binding protein kinase gamma, DMPK-like gamma, myotonic dystrophy protein kinase-like gamma, or myotonic dystrophy protein kinase-like alpha, is a serine/threonine-protein kinase expressed in heart and skeletal muscles. It may act as a downstream effector of Cdc42 in cytoskeletal reorganization and contributes to the actomyosin contractility required for cell invasion, through the regulation of MYPT1 and thus MLC2 phosphorylation. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  protein kinase C conserved region 1 (C1 domain) found in myotonic dystrophy kinase-related Cdc42-binding kinase gamma (MRCK gamma) and similar proteins. MRCK gamma (MRCKG), also called Cdc42-binding protein kinase gamma, DMPK-like gamma, myotonic dystrophy protein kinase-like gamma, or myotonic dystrophy protein kinase-like alpha, is a serine/threonine-protein kinase expressed in heart and skeletal muscles. It may act as a downstream effector of Cdc42 in cytoskeletal reorganization and contributes to the actomyosin contractility required for cell invasion, through the regulation of MYPT1 and thus MLC2 phosphorylation. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20866); members share this curated model.
