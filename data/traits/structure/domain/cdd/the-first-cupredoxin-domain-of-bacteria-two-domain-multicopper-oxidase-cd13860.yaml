identifier: CDD:cd13860
label: "The first cupredoxin domain of bacteria two domain multicopper oxidase. This subfamily includes bacterial two domain multicopper oxidases (2dMCOs) with similarity to McoN from Nitrosomonas europaea. 2dMCO is a trimeric type C blue copper oxidase. Each subunit houses a type 1 copper site in domain 1 and a type 2/type 3 trinuclear copper cluster at the subunit-subunit interface. The 2dMCO is proposed to be a key intermediate in the evolution of three domain MCOs. Multicopper oxidases couple oxidation of substrates with reduction of dioxygen to water. These MCOs are capable of oxidizing a vast range of substrates, varying from aromatic to inorganic compounds such as metals."
definition: >-
  The first cupredoxin domain of bacteria two domain multicopper oxidase. This subfamily includes bacterial two domain multicopper oxidases (2dMCOs) with similarity to McoN from Nitrosomonas europaea. 2dMCO is a trimeric type C blue copper oxidase. Each subunit houses a type 1 copper site in domain 1 and a type 2/type 3 trinuclear copper cluster at the subunit-subunit interface. The 2dMCO is proposed to be a key intermediate in the evolution of three domain MCOs. Multicopper oxidases couple oxidation of substrates with reduction of dioxygen to water. These MCOs are capable of oxidizing a vast range of substrates, varying from aromatic to inorganic compounds such as metals. — an NCBI CDD conserved domain (cd13860); members share this curated model.
