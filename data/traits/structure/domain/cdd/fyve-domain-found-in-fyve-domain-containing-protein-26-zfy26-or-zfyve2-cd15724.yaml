identifier: CDD:cd15724
label: "FYVE domain found in FYVE domain-containing protein 26 (ZFY26 or ZFYVE26). ZFY26, also termed FYVE domain-containing centrosomal protein (FYVE-CENT), or spastizin, is a phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding protein that localizes to the centrosome and midbody. ZFY26 and its interacting partners TTC19 and KIF13A are required for cytokinesis. It also interacts with Beclin 1, a subunit of class III phosphatidylinositol 3-kinase complex, and may have potential implications for carcinogenesis. In addition, it has been considered as the causal agent of a rare form of hereditary spastic paraplegia. ZFY26 contains a FYVE domain that is important for targeting of FYVE-CENT to the midbody."
definition: >-
  FYVE domain found in FYVE domain-containing protein 26 (ZFY26 or ZFYVE26). ZFY26, also termed FYVE domain-containing centrosomal protein (FYVE-CENT), or spastizin, is a phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding protein that localizes to the centrosome and midbody. ZFY26 and its interacting partners TTC19 and KIF13A are required for cytokinesis. It also interacts with Beclin 1, a subunit of class III phosphatidylinositol 3-kinase complex, and may have potential implications for carcinogenesis. In addition, it has been considered as the causal agent of a rare form of hereditary spastic paraplegia. ZFY26 contains a FYVE domain that is important for targeting of FYVE-CENT to the midbody. — an NCBI CDD conserved domain (cd15724); members share this curated model.
