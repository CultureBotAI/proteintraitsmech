identifier: CDD:cd09826
label: "Animal heme peroxidase domain of peroxidasin and related proteins. Peroxidasin is a secreted heme peroxidase which is involved in hydrogen peroxide metabolism and peroxidative reactions in the cardiovascular system. The domain co-occurs with extracellular matrix domains and may play a role in the formation of the extracellular matrix."
definition: >-
  Animal heme peroxidase domain of peroxidasin and related proteins. Peroxidasin is a secreted heme peroxidase which is involved in hydrogen peroxide metabolism and peroxidative reactions in the cardiovascular system. The domain co-occurs with extracellular matrix domains and may play a role in the formation of the extracellular matrix. — an NCBI CDD conserved domain (cd09826); members share this curated model.
