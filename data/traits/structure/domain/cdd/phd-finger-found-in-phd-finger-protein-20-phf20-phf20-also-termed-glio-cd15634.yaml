identifier: CDD:cd15634
label: "PHD finger found in PHD finger protein 20 (PHF20). PHF20, also termed Glioma-expressed antigen 2, or hepatocellular carcinoma-associated antigen 58, or novel zinc finger protein, or transcription factor TZP (referring to Tudor and zinc finger domain containing protein), is a regulator of NF-kappaB activation by disrupting recruitment of PP2A to p65. It also functions as a transcription factor that binds Akt and plays a role in Akt cell survival/growth signaling. Moreover, it transcriptionally regulates p53. The phosphorylation of PHF20 on Ser291 mediated by protein kinase B (PKB) is essential in tumorigenesis via the regulation of p53 mediated signaling. PHF20 contains an N-terminal malignant brain tumor (MBT) domain, two Tudor domains, a plant homeodomain (PHD) finger and the putative DNA-binding domains, AT hook and Cys2His2-type zinc finger."
definition: >-
  PHD finger found in PHD finger protein 20 (PHF20). PHF20, also termed Glioma-expressed antigen 2, or hepatocellular carcinoma-associated antigen 58, or novel zinc finger protein, or transcription factor TZP (referring to Tudor and zinc finger domain containing protein), is a regulator of NF-kappaB activation by disrupting recruitment of PP2A to p65. It also functions as a transcription factor that binds Akt and plays a role in Akt cell survival/growth signaling. Moreover, it transcriptionally regulates p53. The phosphorylation of PHF20 on Ser291 mediated by protein kinase B (PKB) is essential in tumorigenesis via the regulation of p53 mediated signaling. PHF20 contains an N-terminal malignant brain tumor (MBT) domain, two Tudor domains, a plant homeodomain (PHD) finger and the putative DNA-binding domains, AT hook and Cys2His2-type zinc finger. — an NCBI CDD conserved domain (cd15634); members share this curated model.
