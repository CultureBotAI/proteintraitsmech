identifier: CDD:cd19564
label: "serpin family B member 4, squamous cell carcinoma antigen 2. Squamous cell carcinoma antigen 2 (SCCA2, also called PI11 or leupin) is encoded by the SERPINB4 gene is a member of the serpin family of serine protease inhibitors. SCCA2 inhibits chymotrypsin-like serine proteases including chymase, cathepsin G, and Der p. Elevated levels of SCCA1 and SCCA2 have been detected in chronic inflammatory conditions involving the skin, especially atopic dermatitis (AD)and psoriasis, as well as in respiratory inflammatory diseases such as asthma, chronic obstructive pulmonary disease (COPD), and tuberculosis. They are both are normally co-expressed in squamous epithelial cells of tongue, esophagus, tonsils, epidermal hair follicles, lung and uterus and become highly up-regulated in squamous carcinomas of these organs. Diseases associated with SERPINB4 include squamous cell carcinoma and chromosome 18Q deletion syndrome. The ovalbumin family of serpins (ov-serpins) is a family of closely related proteins, whose members can be secreted (ovalbumin), cytosolic (leukocyte elastase inhibitor, LEI), or targeted to both compartments (plasminogen activator inhibitor 2, PAI-2). It also characterized by N- and C-terminal extensions, the absence of a signal peptide, and a Ser rather than an Asn residue at the penultimate position. The ov-serpins corresponds to clade B of the serpin superfamily. In general, SERine Proteinase INhibitors (serpins) exhibit conformational polymorphism shifting from native to cleaved, latent, delta, or polymorphic forms. Many serpins, such as antitrypsin and antichymotrypsin, function as serine protease inhibitors which regulate blood coagulation cascades. Non-inhibitory serpins perform many diverse functions such as chaperoning proteins or transporting hormones. Serpins are of medical interest because mutants can cause blood clotting disorders, emphysema, cirrhosis, and dementia. A classification based on evolutionary relatedness has resulted in the assignment of serpins to 16 clades designated A-P along with some orphans."
