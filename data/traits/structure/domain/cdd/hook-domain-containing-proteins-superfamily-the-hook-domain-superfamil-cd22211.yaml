identifier: CDD:cd22211
label: "Hook domain-containing proteins superfamily. The Hook domain superfamily includes Hook adaptor proteins, Hook-related proteins and nuclear mitotic apparatus protein (NuMA). They share an N-terminal conserved globular Hook domain, which folds as a variant of the helical calponin homology (CH) domain with an extended alpha-helix. The Hook domain is responsible for the binding of microtubule. The Hook family includes microtubule-binding proteins, Hook1-3. Hook1 is required for spermatid differentiation. Hook2 contributes to the establishment and maintenance of centrosome function. Hook3 is an adaptor protein for microtubule-dependent intracellular vesicle and protein trafficking, and is involved in Golgi and endosome transport. Hook proteins are components of the FTS/Hook/FHIP complex (FHF complex), which may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting (HOPS) complex. The Hook-related protein (HkRP) family includes Daple, Girdin and Gipie. Daple, also called Dvl-associating protein with a high frequency of leucine residues, or coiled-coil domain-containing protein 88C(CCDC88C), or Hook-related protein 2 (HkRP2), is a novel non-receptor nucleotide exchange factor (GEF) required for activation of guanine nucleotide-binding proteins (G-proteins) during non-canonical Wnt signaling. Girdin, also called Akt phosphorylation enhancer (APE), or coiled-coil domain-containing protein 88A (CCDC88A), or G alpha-interacting vesicle-associated protein (GIV), or Girders of actin filament, or Hook-related protein 1 (HkRP1), is a bifunctional modulator of guanine nucleotide-binding proteins (G proteins). Gipie, also called GRP78-interacting protein induced by ER stress, or coiled-coil domain-containing protein 88B(CCDC88B), or brain leucine zipper domain-containing protein, or Hook-related protein 3 (HkRP3), is a novel actin cytoskeleton-binding protein and Akt substrate that regulates cell migratory responses in various biological contexts. NuMA, also called nuclear mitotic apparatus protein 1, or nuclear matrix protein-22 (NMP-22), or SP-H antigen, is a microtubule (MT)-binding protein that plays a role in the formation and maintenance of the spindle poles and the alignment and the segregation of chromosomes during mitotic cell division."
definition: >-
  Hook domain-containing proteins superfamily. The Hook domain superfamily includes Hook adaptor proteins, Hook-related proteins and nuclear mitotic apparatus protein (NuMA). They share an N-terminal conserved globular Hook domain, which folds as a variant of the helical calponin homology (CH) domain with an extended alpha-helix. The Hook domain is responsible for the binding of microtubule. The Hook family includes microtubule-binding proteins, Hook1-3. Hook1 is required for spermatid differentiation. Hook2 contributes to the establishment and maintenance of centrosome function. Hook3 is an adaptor protein for microtubule-dependent intracellular vesicle and protein trafficking, and is involved in Golgi and endosome transport. Hook proteins are components of the FTS/Hook/FHIP complex (FHF complex), which may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting (HOPS) complex. The Hook-related protein (HkRP) family includes Daple, Girdin and Gipie. Daple, also called Dvl-associating protein with a high frequency of leucine residues, or coiled-coil domain-containing protein 88C(CCDC88C), or Hook-related protein 2 (HkRP2), is a novel non-receptor nucleotide exchange factor (GEF) required for activation of guanine nucleotide-binding proteins (G-proteins) during non-canonical Wnt signaling. Girdin, also called Akt phosphorylation enhancer (APE), or coiled-coil domain-containing protein 88A (CCDC88A), or G alpha-interacting vesicle-associated protein (GIV), or Girders of actin filament, or Hook-related protein 1 (HkRP1), is a bifunctional modulator of guanine nucleotide-binding proteins (G proteins). Gipie, also called GRP78-interacting protein induced by ER stress, or coiled-coil domain-containing protein 88B(CCDC88B), or brain leucine zipper domain-containing protein, or Hook-related protein 3 (HkRP3), is a novel actin cytoskeleton-binding protein and Akt substrate that regulates cell migratory responses in various biological contexts. NuMA, also called nuclear mitotic apparatus protein 1, or nuclear matrix protein-22 (NMP-22), or SP-H antigen, is a microtubule (MT)-binding protein that plays a role in the formation and maintenance of the spindle poles and the alignment and the segregation of chromosomes during mitotic cell division. — an NCBI CDD conserved domain (cd22211); members share this curated model.
