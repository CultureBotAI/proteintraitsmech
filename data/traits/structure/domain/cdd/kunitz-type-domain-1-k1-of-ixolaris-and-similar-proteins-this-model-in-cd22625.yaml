identifier: CDD:cd22625
label: "Kunitz-type domain 1 (K1) of Ixolaris, and similar proteins. This model includes the first Kunitz-type domain (K1) of ixolaris from the venomous organism Conus striatus. Ixolaris is a potent tick salivary anticoagulant that binds coagulation factor Xa (FXa) and zymogen FX, and forms a quaternary tissue factor (TF)/FVIIa/FX(a)/Ixolaris inhibitory complex. It blocks TF-induced coagulation and PAR2 (proteinase-activated receptor 2) signaling, and prevents thrombosis, tumor growth, and immune activation. Ixolaris consists of 2 Kunitz domains (K1 and K2), both of which recognize the heparin-binding (pro)exosite (HBE) on FX. While K2 is an extraordinarily dynamic domain that encompasses several residues involved in FX binding, K1 domain keeps as a rigid platform supporting the conformational dynamic of the K2 domain, forming a salt bridge with FXa. The structure of this domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds."
definition: >-
  Kunitz-type domain 1 (K1) of Ixolaris, and similar proteins. This model includes the first Kunitz-type domain (K1) of ixolaris from the venomous organism Conus striatus. Ixolaris is a potent tick salivary anticoagulant that binds coagulation factor Xa (FXa) and zymogen FX, and forms a quaternary tissue factor (TF)/FVIIa/FX(a)/Ixolaris inhibitory complex. It blocks TF-induced coagulation and PAR2 (proteinase-activated receptor 2) signaling, and prevents thrombosis, tumor growth, and immune activation. Ixolaris consists of 2 Kunitz domains (K1 and K2), both of which recognize the heparin-binding (pro)exosite (HBE) on FX. While K2 is an extraordinarily dynamic domain that encompasses several residues involved in FX binding, K1 domain keeps as a rigid platform supporting the conformational dynamic of the K2 domain, forming a salt bridge with FXa. The structure of this domain is similar to that of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor), showing an alpha/beta fold with irregular secondary structure stabilized by three disulfide bonds. — an NCBI CDD conserved domain (cd22625); members share this curated model.
