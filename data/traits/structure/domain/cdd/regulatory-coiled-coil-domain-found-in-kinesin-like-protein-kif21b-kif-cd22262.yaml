identifier: CDD:cd22262
label: "regulatory coiled-coil domain found in kinesin-like protein KIF21B. KIF21B is a plus-end directed microtubule-dependent motor protein which displays processive activity. It is involved in regulation of microtubule dynamics, synapse function, and neuronal morphology, including dendritic tree branching and spine formation. KIF21B plays a role in learning and memory. It is involved in the delivery of gamma-aminobutyric acid (GABA(A)) receptors to the cell surface. This model corresponds to a conserved region of KIF21B, which shows high sequence similarity to the regulatory coiled-coil domain of KIF21A."
definition: >-
  regulatory coiled-coil domain found in kinesin-like protein KIF21B. KIF21B is a plus-end directed microtubule-dependent motor protein which displays processive activity. It is involved in regulation of microtubule dynamics, synapse function, and neuronal morphology, including dendritic tree branching and spine formation. KIF21B plays a role in learning and memory. It is involved in the delivery of gamma-aminobutyric acid (GABA(A)) receptors to the cell surface. This model corresponds to a conserved region of KIF21B, which shows high sequence similarity to the regulatory coiled-coil domain of KIF21A. — an NCBI CDD conserved domain (cd22262); members share this curated model.
