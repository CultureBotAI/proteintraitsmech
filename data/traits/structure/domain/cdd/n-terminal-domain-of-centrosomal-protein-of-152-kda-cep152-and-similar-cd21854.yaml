identifier: CDD:cd21854
label: "N-terminal domain of centrosomal protein of 152 kDa (Cep152) and similar proteins. Cep152 is a genome maintenance protein necessary for centrosome duplication. The function seems also to involve Cep63, CDK5RAP2 and WDR62 through a stepwise assembled complex at the centrosome that recruits CDK2 required for centriole duplication. Cep152 also acts as a scaffold for recruitment of Plk4 and CPAP to the centrosome. In addition, it plays a key role in deuterosome-mediated centriole amplification in multiciliated that can generate more than 100 centrioles. Overexpression of CEP152 can drive amplification of centrioles. The model corresponds to a conserved region at the N-terminus of Cep152, which is responsible for the binding of PIK4."
definition: >-
  N-terminal domain of centrosomal protein of 152 kDa (Cep152) and similar proteins. Cep152 is a genome maintenance protein necessary for centrosome duplication. The function seems also to involve Cep63, CDK5RAP2 and WDR62 through a stepwise assembled complex at the centrosome that recruits CDK2 required for centriole duplication. Cep152 also acts as a scaffold for recruitment of Plk4 and CPAP to the centrosome. In addition, it plays a key role in deuterosome-mediated centriole amplification in multiciliated that can generate more than 100 centrioles. Overexpression of CEP152 can drive amplification of centrioles. The model corresponds to a conserved region at the N-terminus of Cep152, which is responsible for the binding of PIK4. — an NCBI CDD conserved domain (cd21854); members share this curated model.
