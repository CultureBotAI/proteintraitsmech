identifier: CDD:cd17524
label: "Type I restriction-modification system specificity (S) subunit TRD-CR, similar to Escherichia coli UTI89 S subunit (S.EcoUTORF5051P) TRD2-CR2 and Archaeoglobus fulgidus VC-16 S subunit (S.AfuORF1715P) TRD2-CR2. Escherichia coli UTI89 S subunit (S.EcoUTORF5051P) recognizes 5'... CCANNNNNNNCTTC ... 3' and the recognition sequence of Archaeoglobus fulgidus VC-16 S subunit (S.AfuORF1715P) is undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It also includes TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases, such as Pseudomonas putida Jo 4-731 Type IIG restriction enzyme/N6-adenine DNA methyltransferase (RM.PpiI), and type I DNA methyltransferases such as Bacillus cereus BDRD-ST24 M subunit of Type I N6-adenine DNA methyltransferase (M.Bce24ORF51270P). RM.PpiI recognizes 5' ... GAACNNNNNCTC ... 3'."
