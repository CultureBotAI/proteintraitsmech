identifier: CDD:cd16292
label: "cleavage and polyadenylation specificity factor (CPSF) subunit 3 and related proteins; MBL-fold metallo-hydrolase domain. CPSF3 (also known as cleavage and polyadenylation specificity factor 73 kDa subunit/CPSF-73) functions as a 3' endonuclease in 3' end processing of pre-mRNAs during cleavage/polyadenylation, and in 3' end processing of metazoan histone pre-mRNAs. This subgroup also contains the yeast homolog of CPSF-73, Ysh1/Brr5 which has roles in mRNA and snoRNA synthesis. In addition to this MBL-fold metallo-hydrolase domain, members of this subgroup contain a beta-CASP (named for metallo-beta-lactamase, CPSF, Artemis, Snm1, Pso2) domain, and a RMMBL domain (RNA-metabolizing metallo-beta-lactamase). Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  cleavage and polyadenylation specificity factor (CPSF) subunit 3 and related proteins; MBL-fold metallo-hydrolase domain. CPSF3 (also known as cleavage and polyadenylation specificity factor 73 kDa subunit/CPSF-73) functions as a 3' endonuclease in 3' end processing of pre-mRNAs during cleavage/polyadenylation, and in 3' end processing of metazoan histone pre-mRNAs. This subgroup also contains the yeast homolog of CPSF-73, Ysh1/Brr5 which has roles in mRNA and snoRNA synthesis. In addition to this MBL-fold metallo-hydrolase domain, members of this subgroup contain a beta-CASP (named for metallo-beta-lactamase, CPSF, Artemis, Snm1, Pso2) domain, and a RMMBL domain (RNA-metabolizing metallo-beta-lactamase). Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd16292); members share this curated model.
