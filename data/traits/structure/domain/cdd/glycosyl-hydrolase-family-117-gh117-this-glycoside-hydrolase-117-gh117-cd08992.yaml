identifier: CDD:cd08992
label: "Glycosyl hydrolase family 117 (GH117). This glycoside hydrolase 117 (GH117) family includes alpha-1,3-L-neoagarooligosaccharide hydrolase (EC 3.2.1.-); alpha-1,3-L-neoagarobiase/neoagarobiose hydrolase (NABH, EC 3.2.1.-). In the agarolytic pathway, in order to metabolize agar, NABH is an essential enzyme because it converts alpha-neoagarobiose (O-3,6-anhydro-alpha-l-galactopyranosyl-(1,3)-d-galactose) into fermentable monosaccharides (d-galactose and 3,6-anhydro-l-galactose). Thus, these enzymes have exo-alpha-1,3-(3,6-anhydro)-l-galactosidase activity, removing terminal non-reducing alpha-1,3-linked 3,6-anhydro-l-galactose residues from their neoagarose substrate. This family includes Zobellia galactanivorans enzymes, Zg4663 and Zg3615 (also known as ZgAhgA and ZgAhgB, respectively) that have been shown to have similar activity on unsubstituted agarose oligosaccharides while Zg3597 has been shown to be inactive, possibly due to differences in dimerization conformation, active-site structure and function. GH117 shares distant sequence similarity with families GH43 and GH32. A common structural feature of all these enzymes is a 5-bladed beta-propeller domain, similar to GH43, that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller."
definition: >-
  Glycosyl hydrolase family 117 (GH117). This glycoside hydrolase 117 (GH117) family includes alpha-1,3-L-neoagarooligosaccharide hydrolase (EC 3.2.1.-); alpha-1,3-L-neoagarobiase/neoagarobiose hydrolase (NABH, EC 3.2.1.-). In the agarolytic pathway, in order to metabolize agar, NABH is an essential enzyme because it converts alpha-neoagarobiose (O-3,6-anhydro-alpha-l-galactopyranosyl-(1,3)-d-galactose) into fermentable monosaccharides (d-galactose and 3,6-anhydro-l-galactose). Thus, these enzymes have exo-alpha-1,3-(3,6-anhydro)-l-galactosidase activity, removing terminal non-reducing alpha-1,3-linked 3,6-anhydro-l-galactose residues from their neoagarose substrate. This family includes Zobellia galactanivorans enzymes, Zg4663 and Zg3615 (also known as ZgAhgA and ZgAhgB, respectively) that have been shown to have similar activity on unsubstituted agarose oligosaccharides while Zg3597 has been shown to be inactive, possibly due to differences in dimerization conformation, active-site structure and function. GH117 shares distant sequence similarity with families GH43 and GH32. A common structural feature of all these enzymes is a 5-bladed beta-propeller domain, similar to GH43, that contains the catalytic acid and catalytic base. A long V-shaped groove, partially enclosed at one end, forms a single extended substrate-binding surface across the face of the propeller. — an NCBI CDD conserved domain (cd08992); members share this curated model.
