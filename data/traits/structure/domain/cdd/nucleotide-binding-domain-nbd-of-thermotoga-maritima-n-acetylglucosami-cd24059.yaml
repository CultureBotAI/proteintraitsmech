identifier: CDD:cd24059
label: "nucleotide-binding domain (NBD) of Thermotoga maritima N-acetylglucosamine kinase (TM1224) and similar proteins. This subfamily includes a group of uncharacterized proteins similar to N-acetylglucosamine kinase (Tm1224; EC 2.7.1.59) from Thermotoga maritima, which belongs to kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. Tm1224 lacks the cysteine-rich zinc-binding motif, which presents in other family members."
definition: >-
  nucleotide-binding domain (NBD) of Thermotoga maritima N-acetylglucosamine kinase (TM1224) and similar proteins. This subfamily includes a group of uncharacterized proteins similar to N-acetylglucosamine kinase (Tm1224; EC 2.7.1.59) from Thermotoga maritima, which belongs to kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. Tm1224 lacks the cysteine-rich zinc-binding motif, which presents in other family members. — an NCBI CDD conserved domain (cd24059); members share this curated model.
