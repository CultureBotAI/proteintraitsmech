identifier: CDD:cd16015
label: "Lipoteichoic acid synthase like. Lipoteichoic acid (LTA) is an important cell wall polymer found in Gram-positive bacteria. It may contain long chains of ribitol or glycerol phosphate. LTA synthase catalyzes the reaction to extend the polymer by the repeated addition of glycerolphosphate (GroP) subunits to the end of the growing chain."
definition: >-
  Lipoteichoic acid synthase like. Lipoteichoic acid (LTA) is an important cell wall polymer found in Gram-positive bacteria. It may contain long chains of ribitol or glycerol phosphate. LTA synthase catalyzes the reaction to extend the polymer by the repeated addition of glycerolphosphate (GroP) subunits to the end of the growing chain. — an NCBI CDD conserved domain (cd16015); members share this curated model.
