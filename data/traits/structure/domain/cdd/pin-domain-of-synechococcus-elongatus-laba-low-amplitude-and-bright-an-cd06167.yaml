identifier: CDD:cd06167
label: "PIN domain of Synechococcus elongatus LabA (low-amplitude and bright) and related proteins. The LabA-like PIN domain family includes Synechococcus elongatus PCC 7942 LabA which participates in cyanobacterial circadian timing. It is required for negative feedback regulation of the autokinase/autophosphatase KaiC, a central component of the circadian clock system. In particular, LabA seems necessary for KaiC-dependent repression of gene expression. This family also includes the N-terminal domain of limkain b1, a human autoantigen associated with cytoplasmic vesicles. Other members are the LabA-like PIN domains of human ZNF451, uncharacterized Bacillus subtilis YqxD and Escherichia coli YaiI, and the N-terminal domain of a well-conserved group of mainly bacterial proteins with no defined function, which contain a C-terminal LabA_like_C domain. Curiously, a gene labeled NicB from Pseudomonas putida S16, which is described as a putative NADH-dependent hydroxylase involved in the microbial degradation of nicotine also falls into this family."
definition: >-
  PIN domain of Synechococcus elongatus LabA (low-amplitude and bright) and related proteins. The LabA-like PIN domain family includes Synechococcus elongatus PCC 7942 LabA which participates in cyanobacterial circadian timing. It is required for negative feedback regulation of the autokinase/autophosphatase KaiC, a central component of the circadian clock system. In particular, LabA seems necessary for KaiC-dependent repression of gene expression. This family also includes the N-terminal domain of limkain b1, a human autoantigen associated with cytoplasmic vesicles. Other members are the LabA-like PIN domains of human ZNF451, uncharacterized Bacillus subtilis YqxD and Escherichia coli YaiI, and the N-terminal domain of a well-conserved group of mainly bacterial proteins with no defined function, which contain a C-terminal LabA_like_C domain. Curiously, a gene labeled NicB from Pseudomonas putida S16, which is described as a putative NADH-dependent hydroxylase involved in the microbial degradation of nicotine also falls into this family. — an NCBI CDD conserved domain (cd06167); members share this curated model.
