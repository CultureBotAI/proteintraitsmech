identifier: CDD:cd01908
label: "Glutamine amidotransferases class-II (Gn-AT)_YafJ-type.  YafJ is a glutamine amidotransferase-like protein of unknown function found in prokaryotes, eukaryotes and archaea.  YafJ has a conserved structural fold similar to those of other class II glutamine amidotransferases including glucosamine-fructose 6-phosphate synthase (GLMS or GFAT), glutamine phosphoribosylpyrophosphate (Prpp) amidotransferase (GPATase),  asparagine synthetase B (AsnB), beta lactam synthetase (beta-LS) and glutamate synthase (GltS).  The YafJ fold is also somewhat similar to the Ntn (N-terminal nucleophile) hydrolase fold of the proteasomal alpha and beta subunits."
definition: >-
  Glutamine amidotransferases class-II (Gn-AT)_YafJ-type. YafJ is a glutamine amidotransferase-like protein of unknown function found in prokaryotes, eukaryotes and archaea. YafJ has a conserved structural fold similar to those of other class II glutamine amidotransferases including glucosamine-fructose 6-phosphate synthase (GLMS or GFAT), glutamine phosphoribosylpyrophosphate (Prpp) amidotransferase (GPATase), asparagine synthetase B (AsnB), beta lactam synthetase (beta-LS) and glutamate synthase (GltS). The YafJ fold is also somewhat similar to the Ntn (N-terminal nucleophile) hydrolase fold of the proteasomal alpha and beta subunits. — an NCBI CDD conserved domain (cd01908); members share this curated model.
