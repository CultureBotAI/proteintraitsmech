identifier: CDD:cd10229
label: "nucleotide-binding domain (NBD) of heat shock 70 kDa proteins HSPA12A, HSPA12B and similar proteins. The family includes heat shock 70 kDa proteins HSPA12A and HSPA12B. HSPA12A is an adapter protein for SORL1, but not SORT1. It delays SORL1 internalization and affects SORL1 subcellular localization. HSPA12B, predominantly expressed in endothelial cells, is required for angiogenesis, and may interact with known angiogenesis mediators. It may be important for host defense in microglia-mediated immune response. Both HSPA12A and HSPA12B belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly, and can direct incompetent \"client\" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs). No co-chaperones have yet been identified for HSPA12A and HSPA12B."
definition: >-
  nucleotide-binding domain (NBD) of heat shock 70 kDa proteins HSPA12A, HSPA12B and similar proteins. The family includes heat shock 70 kDa proteins HSPA12A and HSPA12B. HSPA12A is an adapter protein for SORL1, but not SORT1. It delays SORL1 internalization and affects SORL1 subcellular localization. HSPA12B, predominantly expressed in endothelial cells, is required for angiogenesis, and may interact with known angiogenesis mediators. It may be important for host defense in microglia-mediated immune response. Both HSPA12A and HSPA12B belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly, and can direct incompetent "client" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. HSP70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs). No co-chaperones have yet been identified for HSPA12A and HSPA12B. — an NCBI CDD conserved domain (cd10229); members share this curated model.
