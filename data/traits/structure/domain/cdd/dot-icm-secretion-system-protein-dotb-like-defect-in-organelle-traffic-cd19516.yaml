identifier: CDD:cd19516
label: "dot/icm secretion system protein DotB-like. Defect in organelle trafficking (Dot)B is part of the type IVb secretion (T4bS) system, also known as the dot/icm system, and is the main energy supplier of the secretion system. It is an ATPase, similar to the VirB11 component of the T4aS systems. This family also includes Escherichia coli IncI plasmid-encoded conjugative transfer ATPase TraJ encoded on the tra (transfer) operon."
definition: >-
  dot/icm secretion system protein DotB-like. Defect in organelle trafficking (Dot)B is part of the type IVb secretion (T4bS) system, also known as the dot/icm system, and is the main energy supplier of the secretion system. It is an ATPase, similar to the VirB11 component of the T4aS systems. This family also includes Escherichia coli IncI plasmid-encoded conjugative transfer ATPase TraJ encoded on the tra (transfer) operon. — an NCBI CDD conserved domain (cd19516); members share this curated model.
