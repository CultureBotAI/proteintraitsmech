identifier: CDD:cd10576
label: "Tumor necrosis factor receptor superfamily member 1A (TNFRSF1A), also known as TNFR1. TNFRSF1A (also known as type I TNFR, TNFR1, DR1, TNFRSF1A, CD120a, p55) binds TNF-alpha, through the death domain (DD), and activates NF-kappaB, mediates apoptosis and activates signaling pathways controlling inflammatory, immune, and stress responses. It mediates signal transduction by interacting with antiapoptotic protein BCL2-associated athanogene 4 (BAG4/SODD) and adaptor proteins TRAF2 and TRADD that play regulatory roles. The human genetic disorder called tumor necrosis factor associated periodic syndrome (TRAPS), or periodic fever syndrome, is associated with germline mutations of the extracellular domains of this receptor, possibly due to impaired receptor clearance. TNFRSF1A polymorphisms rs1800693 and rs4149584 are associated with elevated risk of multiple sclerosis. Serum levels of TNFRSF1A are elevated in schizophrenia and bipolar disorder, and high levels are also associated with cognitive impairment and dementia. Patients with idiopathic recurrent acute pericarditis (IRAP), presumed to be an autoimmune process, have also been shown to carry rare mutations (R104Q and D12E) in the TNFRSF1A gene."
definition: >-
  Tumor necrosis factor receptor superfamily member 1A (TNFRSF1A), also known as TNFR1. TNFRSF1A (also known as type I TNFR, TNFR1, DR1, TNFRSF1A, CD120a, p55) binds TNF-alpha, through the death domain (DD), and activates NF-kappaB, mediates apoptosis and activates signaling pathways controlling inflammatory, immune, and stress responses. It mediates signal transduction by interacting with antiapoptotic protein BCL2-associated athanogene 4 (BAG4/SODD) and adaptor proteins TRAF2 and TRADD that play regulatory roles. The human genetic disorder called tumor necrosis factor associated periodic syndrome (TRAPS), or periodic fever syndrome, is associated with germline mutations of the extracellular domains of this receptor, possibly due to impaired receptor clearance. TNFRSF1A polymorphisms rs1800693 and rs4149584 are associated with elevated risk of multiple sclerosis. Serum levels of TNFRSF1A are elevated in schizophrenia and bipolar disorder, and high levels are also associated with cognitive impairment and dementia. Patients with idiopathic recurrent acute pericarditis (IRAP), presumed to be an autoimmune process, have also been shown to carry rare mutations (R104Q and D12E) in the TNFRSF1A gene. — an NCBI CDD conserved domain (cd10576); members share this curated model.
