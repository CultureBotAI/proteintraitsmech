identifier: CDD:cd21047
label: "N-terminal domain of negative elongation factor A (NELF-A) and similar proteins. NELF-A, also known as Wolf-Hirschhorn syndrome candidate 2 protein (WHSC2), is an essential component of the NELF complex, a complex that negatively regulates the elongation of transcription by RNA polymerase II. The model corresponds to the N-terminal domain of NELF-A, which forms a dimeric NELF subcomplex (NELF-AC dimer) by binding to the middle and C-terminal regions of NELF-C. The NELF-AC subcomplex binds single-stranded nucleic acids in vitro."
definition: >-
  N-terminal domain of negative elongation factor A (NELF-A) and similar proteins. NELF-A, also known as Wolf-Hirschhorn syndrome candidate 2 protein (WHSC2), is an essential component of the NELF complex, a complex that negatively regulates the elongation of transcription by RNA polymerase II. The model corresponds to the N-terminal domain of NELF-A, which forms a dimeric NELF subcomplex (NELF-AC dimer) by binding to the middle and C-terminal regions of NELF-C. The NELF-AC subcomplex binds single-stranded nucleic acids in vitro. — an NCBI CDD conserved domain (cd21047); members share this curated model.
