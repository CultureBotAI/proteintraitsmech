identifier: CDD:cd16169
label: "extended winged-helix domain of tau138 and related proteins. Tau138 is one of three subunits of the tauB subcomplex of yeast transcription factor IIIC. This extended winged-helix domain of tau138 appears to interact with the TPR (tetratricopeptide repeat) array of tauA subunit tau131, and may therefore play a role in linking tauA, tauB, and TFIIIB to regulate the formation of the  RNA polymerase III pre-initiation complex."
definition: >-
  extended winged-helix domain of tau138 and related proteins. Tau138 is one of three subunits of the tauB subcomplex of yeast transcription factor IIIC. This extended winged-helix domain of tau138 appears to interact with the TPR (tetratricopeptide repeat) array of tauA subunit tau131, and may therefore play a role in linking tauA, tauB, and TFIIIB to regulate the formation of the RNA polymerase III pre-initiation complex. — an NCBI CDD conserved domain (cd16169); members share this curated model.
