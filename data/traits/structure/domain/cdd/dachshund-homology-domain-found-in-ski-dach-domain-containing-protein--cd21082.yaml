identifier: CDD:cd21082
label: "Dachshund-homology domain found in SKI/DACH domain-containing protein 1 (SKIDA1) and similar proteins. SKIDA1 is also known as protein DLN-1. Its biological function remains unclear. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA."
definition: >-
  Dachshund-homology domain found in SKI/DACH domain-containing protein 1 (SKIDA1) and similar proteins. SKIDA1 is also known as protein DLN-1. Its biological function remains unclear. The Dachshund-homology domain (DHD), also known as the N-terminal Ski/Sno/Dac domain, adopts a mixed alpha/beta structure containing a helix-turn-helix motif, similar to features found in the forkhead/winged-helix family of DNA binding proteins. It contains a conserved CLPQ motif and can bind co-factors. Its structure suggests that it may also bind DNA. — an NCBI CDD conserved domain (cd21082); members share this curated model.
