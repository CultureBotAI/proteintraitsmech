identifier: CDD:cd02859
label: "N-terminal Early set domain, a glycogen binding domain, associated with the catalytic domain of AMP-activated protein kinase beta subunit. E or \"early\" set domains are associated with the catalytic domain of AMP-activated protein kinase beta subunit glycogen binding domain at the N-terminal end. AMPK is a metabolic stress sensing protein that senses AMP/ATP and has recently been found to act as a glycogen sensor as well. The protein functions as an alpha-beta-gamma heterotrimer. This N-terminal domain is the glycogen binding domain of the beta subunit. This domain is also a member of the CBM48 (Carbohydrate Binding Module 48) family whose members include pullulanase, maltooligosyl trehalose synthase, starch branching enzyme, glycogen branching enzyme, glycogen debranching enzyme, and isoamylase."
definition: >-
  N-terminal Early set domain, a glycogen binding domain, associated with the catalytic domain of AMP-activated protein kinase beta subunit. E or "early" set domains are associated with the catalytic domain of AMP-activated protein kinase beta subunit glycogen binding domain at the N-terminal end. AMPK is a metabolic stress sensing protein that senses AMP/ATP and has recently been found to act as a glycogen sensor as well. The protein functions as an alpha-beta-gamma heterotrimer. This N-terminal domain is the glycogen binding domain of the beta subunit. This domain is also a member of the CBM48 (Carbohydrate Binding Module 48) family whose members include pullulanase, maltooligosyl trehalose synthase, starch branching enzyme, glycogen branching enzyme, glycogen debranching enzyme, and isoamylase. — an NCBI CDD conserved domain (cd02859); members share this curated model.
