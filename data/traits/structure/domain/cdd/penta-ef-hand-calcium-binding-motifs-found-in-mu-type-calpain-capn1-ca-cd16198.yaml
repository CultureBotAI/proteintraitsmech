identifier: CDD:cd16198
label: "Penta-EF hand, calcium binding motifs, found in mu-type calpain (CAPN1). CAPN1, also termed calpain-1 80-kDa catalytic subunit, or calpain-1 large subunit, or micromolar-calpain (muCANP), or calcium-activated neutral proteinase 1 (CANP 1), or cell proliferation-inducing gene 30 protein, is a ubiquitously expressed 80-kDa Ca2+-dependent intracellular cysteine protease that contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. The catalytic subunit CAPN1 in complex with a regulatory subunit encoded by CAPNS1 forms a mu-calpain heterodimer. CAPN1 plays a central role in postmortem proteolysis and meat tenderization processes, as well as in regulation of proliferation and survival of skeletal satellite cells. It also acts as a novel regulator in IgE-mediated mast cell activation and could serve as a potential therapeutic target for the management of allergic inflammation. Moreover, CAPN1 is involved in neutrophil motility and functions as a potential target for intervention in inflammatory disease. It also facilitates age-associated aortic wall calcification and fibrosis through the regulation of matrix metalloproteinase 2 activity in vascular smooth muscle cells, and thus plays a role in hypertension and atherosclerosis. The proteolytic cleavage of beta-amyloid precursor protein and tau protein by CAPN1 may be involved in plaque formation. Furthermore, CAPN1 is activated in the brains of individuals with Alzheimer's disease. It is involved in the maintenance of a proliferative neural stem cell pool. The activation and macrophage inflammation of CAPN1 in hypercholesterolemic nephropathy is promoted by nicotinic acetylcholine receptor alpha1 (nAChRalpha1). In addition, CAPN1 displays a functional role in hemostasis, as well as in sickle cell disease."
definition: >-
  Penta-EF hand, calcium binding motifs, found in mu-type calpain (CAPN1). CAPN1, also termed calpain-1 80-kDa catalytic subunit, or calpain-1 large subunit, or micromolar-calpain (muCANP), or calcium-activated neutral proteinase 1 (CANP 1), or cell proliferation-inducing gene 30 protein, is a ubiquitously expressed 80-kDa Ca2+-dependent intracellular cysteine protease that contains a short N-terminal anchor helix, followed by a calpain cysteine protease (CysPc) domain, a C2-domain-like (C2L) domain, and a C-terminal Ca2+-binding penta-EF-hand (PEF) domain. The catalytic subunit CAPN1 in complex with a regulatory subunit encoded by CAPNS1 forms a mu-calpain heterodimer. CAPN1 plays a central role in postmortem proteolysis and meat tenderization processes, as well as in regulation of proliferation and survival of skeletal satellite cells. It also acts as a novel regulator in IgE-mediated mast cell activation and could serve as a potential therapeutic target for the management of allergic inflammation. Moreover, CAPN1 is involved in neutrophil motility and functions as a potential target for intervention in inflammatory disease. It also facilitates age-associated aortic wall calcification and fibrosis through the regulation of matrix metalloproteinase 2 activity in vascular smooth muscle cells, and thus plays a role in hypertension and atherosclerosis. The proteolytic cleavage of beta-amyloid precursor protein and tau protein by CAPN1 may be involved in plaque formation. Furthermore, CAPN1 is activated in the brains of individuals with Alzheimer's disease. It is involved in the maintenance of a proliferative neural stem cell pool. The activation and macrophage inflammation of CAPN1 in hypercholesterolemic nephropathy is promoted by nicotinic acetylcholine receptor alpha1 (nAChRalpha1). In addition, CAPN1 displays a functional role in hemostasis, as well as in sickle cell disease. — an NCBI CDD conserved domain (cd16198); members share this curated model.
