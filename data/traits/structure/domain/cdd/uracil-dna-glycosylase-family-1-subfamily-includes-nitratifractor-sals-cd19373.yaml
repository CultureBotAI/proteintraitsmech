identifier: CDD:cd19373
label: "Uracil DNA glycosylase family 1 subfamily, includes Nitratifractor salsuginis UNG and similar proteins. Uracil DNA glycosylase family 1 is the most efficient of all uracil-DNA glycosylases (UDGs, also known as UNGs) and shows a specificity for uracil in DNA. Nitratifractor salsuginis UNG (NsaUNG) only exhibits robust enzymatic activity on uracil-containing DNAs, in particular double-stranded uracil-containing substrates, and does not act on hypoxanthine- and xanthine-containing substrates. NsUNG is not inhibited by Ugi protein that specifically inhibits conventional family 1 UDGs. UDG catalyzes the removal of uracil from DNA to initiate the DNA base excision repair pathway. Uracil in DNA can arise as a result of misincorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other."
definition: >-
  Uracil DNA glycosylase family 1 subfamily, includes Nitratifractor salsuginis UNG and similar proteins. Uracil DNA glycosylase family 1 is the most efficient of all uracil-DNA glycosylases (UDGs, also known as UNGs) and shows a specificity for uracil in DNA. Nitratifractor salsuginis UNG (NsaUNG) only exhibits robust enzymatic activity on uracil-containing DNAs, in particular double-stranded uracil-containing substrates, and does not act on hypoxanthine- and xanthine-containing substrates. NsUNG is not inhibited by Ugi protein that specifically inhibits conventional family 1 UDGs. UDG catalyzes the removal of uracil from DNA to initiate the DNA base excision repair pathway. Uracil in DNA can arise as a result of misincorporation of dUMP residues by DNA polymerase or deamination of cytosine. Uracil mispaired with guanine in DNA is one of the major pro-mutagenic events, causing G:C->A:T mutations. Thus, UDG is an essential enzyme for maintaining the integrity of genetic information. UDGs have been classified into various families on the basis of their substrate specificity, conserved motifs, and structural similarities. Although these families demonstrate different substrate specificities, often the function of one enzyme can be complemented by the other. — an NCBI CDD conserved domain (cd19373); members share this curated model.
