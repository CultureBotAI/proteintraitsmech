identifier: CDD:cd19940
label: "nuclease domain of XPF/MUS81 family proteins. The XPF/MUS81 family belongs to 3'-flap endonuclease that act upon 3'-flap structures and involved in DNA repair pathways that are necessary for the removal of UV-light-induced DNA lesions and cross-links between DNA strands. Family members exist either as heterodimers or as homodimers in their functionally competent states which consist of a catalytic and a noncatalytic subunit. The catalytic subunits have a DX(n)RKX(3)D motif. This motif is required for metal-dependent endonuclease activity but not for DNA junction binding. The equivalent regions of the noncatalytic subunits (ERCC1, EME1, and FAAP24) have diverged. The noncatalytic subunits have roles such as binding ssDNA or an ability to target the endonuclease to defined DNA structures or sites of DNA damage."
