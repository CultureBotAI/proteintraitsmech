identifier: CDD:cd00251
label: "The ectodomain of Methuselah (Mth); Mth mutants have a 35% increase in average lifespan and increased resistance to several forms of stress, including heat, starvation, and oxidative damage; The protein affected by this mutation is related to G protein-coupled receptors of the secretin receptor family; Mth, like secretin receptor family members, has a large N-terminal ectodomain, which may constitute the ligand binding site."
definition: >-
  The ectodomain of Methuselah (Mth); Mth mutants have a 35% increase in average lifespan and increased resistance to several forms of stress, including heat, starvation, and oxidative damage; The protein affected by this mutation is related to G protein-coupled receptors of the secretin receptor family; Mth, like secretin receptor family members, has a large N-terminal ectodomain, which may constitute the ligand binding site. — an NCBI CDD conserved domain (cd00251); members share this curated model.
