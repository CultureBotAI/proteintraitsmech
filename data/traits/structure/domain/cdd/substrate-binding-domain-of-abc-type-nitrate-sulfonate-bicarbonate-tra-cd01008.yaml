identifier: CDD:cd01008
label: "Substrate binding domain of ABC-type nitrate/sulfonate/bicarbonate transporters, a member of the type 2 periplasmic binding fold superfamily. This family represents the periplasmic binding proteins involved in nitrate, alkanesulfonate, and bicarbonate transport. These domains are found in eubacterial perisplamic-binding proteins that serve as initial receptors in the ABC transport of bicarbonate, nitrate, taurine, or a wide range of aliphatic sulfonates. Other closest homologs involved in thiamine (vitamin B1) biosynthetic pathway and desulfurization (DszB) are also included in this family. After binding their ligand with high affinity, they interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. These binding proteins belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  Substrate binding domain of ABC-type nitrate/sulfonate/bicarbonate transporters, a member of the type 2 periplasmic binding fold superfamily. This family represents the periplasmic binding proteins involved in nitrate, alkanesulfonate, and bicarbonate transport. These domains are found in eubacterial perisplamic-binding proteins that serve as initial receptors in the ABC transport of bicarbonate, nitrate, taurine, or a wide range of aliphatic sulfonates. Other closest homologs involved in thiamine (vitamin B1) biosynthetic pathway and desulfurization (DszB) are also included in this family. After binding their ligand with high affinity, they interact with a cognate membrane transport complex comprised of two integral membrane domains and two cytoplasmically located ATPase domains. This interaction triggers the ligand translocation across the cytoplasmic membrane energized by ATP hydrolysis. These binding proteins belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd01008); members share this curated model.
