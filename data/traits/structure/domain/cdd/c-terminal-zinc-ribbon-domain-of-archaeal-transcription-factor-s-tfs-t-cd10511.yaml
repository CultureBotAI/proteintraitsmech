identifier: CDD:cd10511
label: "C-terminal zinc ribbon domain of archaeal Transcription Factor S (TFS). TFS is an archaeal protein that stimulates the intrinsic cleavage activity of archaeal RNA polymerase. TFS C-terminal domain shows sequence similarity to the homologous C-terminal zinc ribbon domain of subunits A12.2, Rpb9, and C11 in eukaryotic RNA Polymerases (Pol) I, II, and III, respectively and domain III of TFIIS. TFS is not a subunit of archaeal RNA polymerase even though its domains arrangement is similar to A12.2, Rpb9, and C1. TFS is a transcription factor with a similar function to eukaryotic TFIIS. TFS has external cleavage induction activity and improves the fidelity of transcription. TFS has two zinc-binding domains."
definition: >-
  C-terminal zinc ribbon domain of archaeal Transcription Factor S (TFS). TFS is an archaeal protein that stimulates the intrinsic cleavage activity of archaeal RNA polymerase. TFS C-terminal domain shows sequence similarity to the homologous C-terminal zinc ribbon domain of subunits A12.2, Rpb9, and C11 in eukaryotic RNA Polymerases (Pol) I, II, and III, respectively and domain III of TFIIS. TFS is not a subunit of archaeal RNA polymerase even though its domains arrangement is similar to A12.2, Rpb9, and C1. TFS is a transcription factor with a similar function to eukaryotic TFIIS. TFS has external cleavage induction activity and improves the fidelity of transcription. TFS has two zinc-binding domains. — an NCBI CDD conserved domain (cd10511); members share this curated model.
