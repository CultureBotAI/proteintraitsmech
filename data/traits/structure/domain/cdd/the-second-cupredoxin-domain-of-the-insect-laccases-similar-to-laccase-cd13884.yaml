identifier: CDD:cd13884
label: "The second cupredoxin domain of the insect laccases similar to laccase 2 in Tribolium castaneum. This multicopper oxidase (MCO) subfamily includes the majority of insect laccases. One member is laccase 2 from Tribolium castaneum, which is required for beetle cuticle tanning. Laccase (polyphenol oxidase EC 1.10.3.2) is a blue multi-copper enzyme that catalyzes the oxidation of a variety of organic substrates coupled to the reduction of molecular oxygen to water. It displays broad substrate specificity, catalyzing the oxidation of a wide variety of aromatic - notably phenolic and inorganic substances. Laccase has been implicated in a wide spectrum of biological activities and, in particular, plays a key role in morphogenesis, development and lignin metabolism in fungi, plants and insects. Laccase is composed of three cupredoxin domains that include one mononuclear and one trinuclear copper center. The copper ions are bound in several sites: Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 2 of 3-domain MCOs has lost the ability to bind copper."
definition: >-
  The second cupredoxin domain of the insect laccases similar to laccase 2 in Tribolium castaneum. This multicopper oxidase (MCO) subfamily includes the majority of insect laccases. One member is laccase 2 from Tribolium castaneum, which is required for beetle cuticle tanning. Laccase (polyphenol oxidase EC 1.10.3.2) is a blue multi-copper enzyme that catalyzes the oxidation of a variety of organic substrates coupled to the reduction of molecular oxygen to water. It displays broad substrate specificity, catalyzing the oxidation of a wide variety of aromatic - notably phenolic and inorganic substances. Laccase has been implicated in a wide spectrum of biological activities and, in particular, plays a key role in morphogenesis, development and lignin metabolism in fungi, plants and insects. Laccase is composed of three cupredoxin domains that include one mononuclear and one trinuclear copper center. The copper ions are bound in several sites: Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 2 of 3-domain MCOs has lost the ability to bind copper. — an NCBI CDD conserved domain (cd13884); members share this curated model.
