identifier: CDD:cd15560
label: "PHD finger 2 and 3 found in bromodomain and PHD finger-containing transcription factor (BPTF). BPTF, also termed nucleosome-remodeling factor subunit BPTF, or fetal Alz-50 clone 1 protein (FAC1), or fetal Alzheimer antigen, functions as a transcriptional regulator that exhibits altered expression and subcellular localization during neuronal development and neurodegenerative diseases such as Alzheimer's disease. It interacts with the human orthologue of the Kelch-like Ech-associated protein (Keap1). Its function and subcellular localization can be regulated by Keap1. Moreover, BPTF is a novel DNA-binding protein that recognizes the DNA sequence CACAACAC and represses transcription through this site in a phosphorylation-dependent manner. Furthermore, BPTF interacts with the Myc-associated zinc finger protein (ZF87/MAZ) and alters its transcriptional activity, which has been implicated in gene regulation in neurodegeneration. Some family members contain two or three plant homeodomain (PHD) fingers, which may be involved in complex formation with histone H3 trimethylated at K4 (H3K4me3). This family corresponds to the second and third PHD fingers."
definition: >-
  PHD finger 2 and 3 found in bromodomain and PHD finger-containing transcription factor (BPTF). BPTF, also termed nucleosome-remodeling factor subunit BPTF, or fetal Alz-50 clone 1 protein (FAC1), or fetal Alzheimer antigen, functions as a transcriptional regulator that exhibits altered expression and subcellular localization during neuronal development and neurodegenerative diseases such as Alzheimer's disease. It interacts with the human orthologue of the Kelch-like Ech-associated protein (Keap1). Its function and subcellular localization can be regulated by Keap1. Moreover, BPTF is a novel DNA-binding protein that recognizes the DNA sequence CACAACAC and represses transcription through this site in a phosphorylation-dependent manner. Furthermore, BPTF interacts with the Myc-associated zinc finger protein (ZF87/MAZ) and alters its transcriptional activity, which has been implicated in gene regulation in neurodegeneration. Some family members contain two or three plant homeodomain (PHD) fingers, which may be involved in complex formation with histone H3 trimethylated at K4 (H3K4me3). This family corresponds to the second and third PHD fingers. — an NCBI CDD conserved domain (cd15560); members share this curated model.
