identifier: CDD:cd17068
label: "Ras-binding domain (RBD) found in pleckstrin homology (PH) and RhoGEF domain containing G5 (PLEKHG5) and similar proteins. PLEKHG5, is also termed PH domain-containing family G member 5, or guanine nucleotide exchange factor 720 (GEF720), Syx, or Tech, is a novel Dbl-like protein related to p115Rho-GEF. It functions as a Rho guanine nucleotide exchange factor directly activating RhoA in vivo and potentially involved in the control of neuronal cell differentiation. It also regulates the balance of the RhoA downstream effector Dia and ROCK activities to promote polarized-cancer-cell migration. Moreover, PLEKHG5 activates the nuclear factor kappaB (NFkappaB) signaling pathway. Mutations in the PLEKHG5 gene are relevant with autosomal recessive intermediate Charcot-Marie-Tooth disease (CMT) and lower motor neuron disease (LMND)."
definition: >-
