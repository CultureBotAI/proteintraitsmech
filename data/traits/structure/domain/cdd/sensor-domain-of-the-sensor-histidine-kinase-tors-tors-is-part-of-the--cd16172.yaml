identifier: CDD:cd16172
label: "sensor domain of the sensor histidine kinase TorS. TorS is part of the trimethylamine-N-oxide (TMAO) reductase (Tor) pathway, which consists TorT, a periplasmic binding protein that binds TMAO; TorS, a sensor histidine kinase that forms a complex with TorT,  and TorR, the response regulator. The Tor pathway is involved in regulating a cellular response to trimethylamine-N-oxide (TMAO), a terminal electron receptor in anaerobic respiration. TorS consists of a periplasmic sensor domain, as well as a HAMP domain, a histidine kinase domain, and a receiver domain."
definition: >-
  sensor domain of the sensor histidine kinase TorS. TorS is part of the trimethylamine-N-oxide (TMAO) reductase (Tor) pathway, which consists TorT, a periplasmic binding protein that binds TMAO; TorS, a sensor histidine kinase that forms a complex with TorT, and TorR, the response regulator. The Tor pathway is involved in regulating a cellular response to trimethylamine-N-oxide (TMAO), a terminal electron receptor in anaerobic respiration. TorS consists of a periplasmic sensor domain, as well as a HAMP domain, a histidine kinase domain, and a receiver domain. — an NCBI CDD conserved domain (cd16172); members share this curated model.
