identifier: CDD:cd05841
label: "PWWP domain found in protein BS69, protein kinase C-binding protein 1 (PRKCBP1) and similar proteins. Protein BS69, also called zinc finger MYND domain-containing protein 11 (ZMYND11 or ZMY11), is a ubiquitously expressed nuclear protein acting as a transcriptional co-repressor in association with various transcription factors. It was originally identified as an adenovirus 5 E1A-binding protein that inhibits E1A transactivation, as well as c-Myb transcription. BS69 is a multi-domain protein, containing bromo, plant homeodomain (PHD), proline-tryptophan-tryptophan-proline (PWWP), and MYeloid translocation protein 8, Nervy and DEAF-1 (MYND) domains. The specific role of the PWWP domain within BS69 is not clearly identified, but BS69 functions in chromatin remodeling, consistent with other PWWP-containing proteins. PRKCBP1, also called cutaneous T-cell lymphoma-associated antigen se14-3 (CTCL-associated antigen se14-3), Rack7, or zinc finger MYND domain-containing protein 8 (ZMYND8), is a novel receptor for activated C-kinase (RACK)-like protein that may play an important role in the activation and regulation of PKC-beta I, and the PKC signaling cascade. It also has been identified as a formin homology-2-domain containing protein 1 (FHOD1)-binding protein that may be involved in FHOD1-regulated actin polymerization and transcription. Moreover, PRKCBP1 may function as a REST co-repressor 2 (RCOR2) interacting factor. They form a RCOR2/ZMYND8 complex which might be involved in the regulation of neural differentiation. PRKCBP1 contains a PHD finger, a bromodomain, and a PWWP domain. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in protein BS69, protein kinase C-binding protein 1 (PRKCBP1) and similar proteins. Protein BS69, also called zinc finger MYND domain-containing protein 11 (ZMYND11 or ZMY11), is a ubiquitously expressed nuclear protein acting as a transcriptional co-repressor in association with various transcription factors. It was originally identified as an adenovirus 5 E1A-binding protein that inhibits E1A transactivation, as well as c-Myb transcription. BS69 is a multi-domain protein, containing bromo, plant homeodomain (PHD), proline-tryptophan-tryptophan-proline (PWWP), and MYeloid translocation protein 8, Nervy and DEAF-1 (MYND) domains. The specific role of the PWWP domain within BS69 is not clearly identified, but BS69 functions in chromatin remodeling, consistent with other PWWP-containing proteins. PRKCBP1, also called cutaneous T-cell lymphoma-associated antigen se14-3 (CTCL-associated antigen se14-3), Rack7, or zinc finger MYND domain-containing protein 8 (ZMYND8), is a novel receptor for activated C-kinase (RACK)-like protein that may play an important role in the activation and regulation of PKC-beta I, and the PKC signaling cascade. It also has been identified as a formin homology-2-domain containing protein 1 (FHOD1)-binding protein that may be involved in FHOD1-regulated actin polymerization and transcription. Moreover, PRKCBP1 may function as a REST co-repressor 2 (RCOR2) interacting factor. They form a RCOR2/ZMYND8 complex which might be involved in the regulation of neural differentiation. PRKCBP1 contains a PHD finger, a bromodomain, and a PWWP domain. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd05841); members share this curated model.
