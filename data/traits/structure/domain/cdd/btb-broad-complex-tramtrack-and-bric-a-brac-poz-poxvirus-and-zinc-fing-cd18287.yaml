identifier: CDD:cd18287
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 9 (BTBD9). BTBD9 is a risk factor for Restless Legs Syndrome (RLS) encoding a Cullin-3 substrate adaptor. The BTBD9 gene may be associated with antipsychotic-induced RLS in schizophrenia. Mutations in BTBD9 lead to reduced dopamine, increased locomotion and sleep fragmentation. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in BTB/POZ domain-containing protein 9 (BTBD9). BTBD9 is a risk factor for Restless Legs Syndrome (RLS) encoding a Cullin-3 substrate adaptor. The BTBD9 gene may be associated with antipsychotic-induced RLS in schizophrenia. Mutations in BTBD9 lead to reduced dopamine, increased locomotion and sleep fragmentation. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18287); members share this curated model.
