identifier: CDD:cd22309
label: "restriction endonuclease AgeI and similar endonucleases. Type IIP restriction endonuclease AgeI recognizes a palindromic sequence 5'-A|CCGGT-3' and cuts it ('|' denotes the cleavage site) producing staggered DNA ends. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  restriction endonuclease AgeI and similar endonucleases. Type IIP restriction endonuclease AgeI recognizes a palindromic sequence 5'-A|CCGGT-3' and cuts it ('|' denotes the cleavage site) producing staggered DNA ends. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22309); members share this curated model.
