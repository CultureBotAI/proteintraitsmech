identifier: CDD:cd24111
label: "nucleotide-binding domain (NBD) of ectonucleoside triphosphate diphosphohydrolase 2 (NTPDase2) and similar proteins. NTPDase2 (EC 3.6.1.-), also called CD39 antigen-like 1 (CD39L1), Ecto-ATP diphosphohydrolase 2 (ENTPD2), Ecto-ATPDase 2, or Ecto-ATPase 2, has E-type ecto-ATPase activity, by hydrolyzing extracellular ATP and other nucleotides to regulate purinergic neurotransmission in the nervous system. It hydrolyzes ADP only to a marginal extent."
definition: >-
  nucleotide-binding domain (NBD) of ectonucleoside triphosphate diphosphohydrolase 2 (NTPDase2) and similar proteins. NTPDase2 (EC 3.6.1.-), also called CD39 antigen-like 1 (CD39L1), Ecto-ATP diphosphohydrolase 2 (ENTPD2), Ecto-ATPDase 2, or Ecto-ATPase 2, has E-type ecto-ATPase activity, by hydrolyzing extracellular ATP and other nucleotides to regulate purinergic neurotransmission in the nervous system. It hydrolyzes ADP only to a marginal extent. — an NCBI CDD conserved domain (cd24111); members share this curated model.
