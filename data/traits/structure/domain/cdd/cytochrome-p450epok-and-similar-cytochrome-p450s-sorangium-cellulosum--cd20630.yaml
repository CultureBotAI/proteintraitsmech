identifier: CDD:cd20630
label: "cytochrome P450epok and similar cytochrome P450s. Sorangium cellulosum cytochrome P450epoK is a heme-containing monooxygenase which participates in epothilone biosynthesis where it catalyzes the epoxidation of epothilones C and D into epothilones A and B, respectively. This subfamily belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
