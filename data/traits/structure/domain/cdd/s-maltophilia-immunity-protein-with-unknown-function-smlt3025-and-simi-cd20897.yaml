identifier: CDD:cd20897
label: "S. maltophilia immunity protein with unknown function (Smlt3025) and similar proteins. This family includes Smlt3025, an immunity protein of the type IV secretion system (T4SS) found in the multi-drug-resistant opportunistic pathogen Stenotrophomonas maltophilia. Experiments show that Smlt3025 counteracts Smlt3024, an effector protein transferred by the T4SS into target cells. The crystal structure of Smlt3025 reveals a topology similar to the iron-regulated protein FrpD from Neisseria meningitidis which has been shown to interact with the RTX protein FrpC, while its counterpart Smlt3024 is homologous to the N-terminal domain of large Ca2+-binding RTX proteins."
definition: >-
  S. maltophilia immunity protein with unknown function (Smlt3025) and similar proteins. This family includes Smlt3025, an immunity protein of the type IV secretion system (T4SS) found in the multi-drug-resistant opportunistic pathogen Stenotrophomonas maltophilia. Experiments show that Smlt3025 counteracts Smlt3024, an effector protein transferred by the T4SS into target cells. The crystal structure of Smlt3025 reveals a topology similar to the iron-regulated protein FrpD from Neisseria meningitidis which has been shown to interact with the RTX protein FrpC, while its counterpart Smlt3024 is homologous to the N-terminal domain of large Ca2+-binding RTX proteins. — an NCBI CDD conserved domain (cd20897); members share this curated model.
