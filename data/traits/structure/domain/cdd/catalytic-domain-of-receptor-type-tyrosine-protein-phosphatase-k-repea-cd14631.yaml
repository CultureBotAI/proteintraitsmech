identifier: CDD:cd14631
label: "catalytic domain of receptor-type tyrosine-protein phosphatase K, repeat 1. Receptor-type tyrosine-protein phosphatase K (PTPRK), also known as receptor-type tyrosine-protein phosphatase kappa (RPTP-kappa or PTPkappa), belongs to the type IIb subfamily of receptor protein tyrosine phosphatases (RPTPs), which belong to the larger family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRK is widely expressed and has been shown to stimulate cell motility and neurite outgrowth. It is required for anti-proliferative and pro-migratory effects of TGF-beta, suggesting a role in regulation, maintenance, and restoration of cell adhesion. It is a potential tumour suppressor in primary central nervous system lymphomas, colorectal cancer, and breast cancer. It contains an extracellular region with an Meprin-A5 (neuropilin)-mu (MAM) domain, an immunoglobulin (Ig) domain, and four fibronectin type III (FN3) repeats, a transmembrane domain, and an intracellular segment  with a juxtamembrane domain similar to the cytoplasmic domain of classical cadherins and two tandem PTP domains. This model represents the first (repeat 1) PTP domain."
definition: >-
  catalytic domain of receptor-type tyrosine-protein phosphatase K, repeat 1. Receptor-type tyrosine-protein phosphatase K (PTPRK), also known as receptor-type tyrosine-protein phosphatase kappa (RPTP-kappa or PTPkappa), belongs to the type IIb subfamily of receptor protein tyrosine phosphatases (RPTPs), which belong to the larger family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPRK is widely expressed and has been shown to stimulate cell motility and neurite outgrowth. It is required for anti-proliferative and pro-migratory effects of TGF-beta, suggesting a role in regulation, maintenance, and restoration of cell adhesion. It is a potential tumour suppressor in primary central nervous system lymphomas, colorectal cancer, and breast cancer. It contains an extracellular region with an Meprin-A5 (neuropilin)-mu (MAM) domain, an immunoglobulin (Ig) domain, and four fibronectin type III (FN3) repeats, a transmembrane domain, and an intracellular segment with a juxtamembrane domain similar to the cytoplasmic domain of classical cadherins and two tandem PTP domains. This model represents the first (repeat 1) PTP domain. — an NCBI CDD conserved domain (cd14631); members share this curated model.
