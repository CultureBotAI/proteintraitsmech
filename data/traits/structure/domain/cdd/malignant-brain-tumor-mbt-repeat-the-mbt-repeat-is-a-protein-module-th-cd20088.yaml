identifier: CDD:cd20088
label: "malignant brain tumor (MBT) repeat. The MBT repeat is a protein module that recognizes methylated lysine residues on histones and are thought to affect a variety of chromatin processes, including transcription. It exists as tandem repeats and is found in a number of nuclear proteins such as Drosophila sex comb on midleg protein. In the human genome, there are at least 9 MBT repeat proteins, each containing two, three or four MBT repeats. MBT repeat proteins use a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine (monomethyllysine and/or dimethyllysine)."
definition: >-
  malignant brain tumor (MBT) repeat. The MBT repeat is a protein module that recognizes methylated lysine residues on histones and are thought to affect a variety of chromatin processes, including transcription. It exists as tandem repeats and is found in a number of nuclear proteins such as Drosophila sex comb on midleg protein. In the human genome, there are at least 9 MBT repeat proteins, each containing two, three or four MBT repeats. MBT repeat proteins use a semi-aromatic cage to accommodate methyllysine and show specificity towards the lower methylation states of lysine (monomethyllysine and/or dimethyllysine). — an NCBI CDD conserved domain (cd20088); members share this curated model.
