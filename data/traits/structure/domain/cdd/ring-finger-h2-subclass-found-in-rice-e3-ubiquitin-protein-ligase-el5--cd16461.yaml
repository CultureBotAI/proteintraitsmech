identifier: CDD:cd16461
label: "RING finger, H2 subclass, found in rice E3 ubiquitin-protein ligase EL5 and similar proteins. EL5, also known as protein ELICITOR 5, is an E3 ubiquitin-protein ligase containing an N-terminal transmembrane domain and a C3H2C3-type RING-H2 finger that is a binding site for ubiquitin-conjugating enzyme (E2). It can be rapidly induced by N-acetylchitooligosaccharide elicitor. EL5 catalyzes polyubiquitination via the Lys48 residue of ubiquitin, and thus plays a crucial role as a membrane-anchored E3 in the maintenance of cell viability after the initiation of root primordial formation in rice. It also acts as an anti-cell death enzyme that might be responsible for mediating the degradation of cytotoxic proteins produced in root cells after the actions of phytohormones. Moreover, EL5 interacts with UBC5b, a rice ubiquitin carrier protein, through its RING-H2 finger. EL5 is an unstable protein, and its degradation is regulated by the C3H2C3-type RING-H2 finger in a proteasome-independent manner."
definition: >-
  RING finger, H2 subclass, found in rice E3 ubiquitin-protein ligase EL5 and similar proteins. EL5, also known as protein ELICITOR 5, is an E3 ubiquitin-protein ligase containing an N-terminal transmembrane domain and a C3H2C3-type RING-H2 finger that is a binding site for ubiquitin-conjugating enzyme (E2). It can be rapidly induced by N-acetylchitooligosaccharide elicitor. EL5 catalyzes polyubiquitination via the Lys48 residue of ubiquitin, and thus plays a crucial role as a membrane-anchored E3 in the maintenance of cell viability after the initiation of root primordial formation in rice. It also acts as an anti-cell death enzyme that might be responsible for mediating the degradation of cytotoxic proteins produced in root cells after the actions of phytohormones. Moreover, EL5 interacts with UBC5b, a rice ubiquitin carrier protein, through its RING-H2 finger. EL5 is an unstable protein, and its degradation is regulated by the C3H2C3-type RING-H2 finger in a proteasome-independent manner. — an NCBI CDD conserved domain (cd16461); members share this curated model.
