label: "glycerol-3-phosphate-dehydrogenase. GPDH is a member of the Rossman fold NAD binding proteins. NAD-dependent GPDH catalyzes the reaction dihydroxy acetone phosphate + NADH + H+ to  glycerol-3-phosphate + NAD+ in the cytosol as part of the Glycerol 3-phosphgate shuttle. g3P is then  reoxidized by electron transfer to an FAD prosthetic group (via a membrane-bound  isozyme of GPDH)."
definition: >-
  glycerol-3-phosphate-dehydrogenase. GPDH is a member of the Rossman fold NAD binding proteins. NAD-dependent GPDH catalyzes the reaction dihydroxy acetone phosphate + NADH + H+ to glycerol-3-phosphate + NAD+ in the cytosol as part of the Glycerol 3-phosphgate shuttle. g3P is then reoxidized by electron transfer to an FAD prosthetic group (via a membrane-bound isozyme of GPDH). — an NCBI CDD conserved domain (cd05200); members share this curated model.
