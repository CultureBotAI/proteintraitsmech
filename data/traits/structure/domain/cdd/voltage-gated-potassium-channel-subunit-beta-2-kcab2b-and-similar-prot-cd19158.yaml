identifier: CDD:cd19158
label: "voltage-gated potassium channel subunit beta-2 (KCAB2B) and similar proteins. KCAB2B from Bos taurus, Rattus norvegicus, Mus musculus, Homo sapiens, and Oryctolagus cuniculus, are founding members of aldo-keto reductase family 6 member A1 (AKR6A1), A2 (AKR6A2), A4 (AKR6A4), A5 (AKR6A5), and A6 (AKR6A6), respectively. KCAB2B, also called Shaker channel b-subunit 2 (Kvb2), or K(+) channel subunit beta-2, or Kv-beta-2, or Kvbeta2, is a cytoplasmic potassium channel subunit that modulates the characteristics of the channel-forming alpha-subunits. It may be involved in the regulation of nerve signaling, and prevents neuronal hyperexcitability."
definition: >-
