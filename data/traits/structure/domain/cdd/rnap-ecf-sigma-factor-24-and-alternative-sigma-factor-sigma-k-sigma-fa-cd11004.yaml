identifier: CDD:cd11004
label: "RNAP ECF sigma factor 24 and alternative sigma factor Sigma K. Sigma factor 24 is a member of the Sigma 70 family found in E.coli, and is also an Extra-cytoplasmic function (ECF) sigma factor. Sigma K is an alternative sigma factor which is activates the production of DNA binding protein GerE found in Bacillus Subtilis, in addition to being involved in the sporulation process in that organism. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. A variety of regions on domain 2 are responsible for DNA promoter binding specificty at the -10 promoter recognition site and other functions in transcription initiation with aided by the entire sigma factor."
definition: >-
  RNAP ECF sigma factor 24 and alternative sigma factor Sigma K. Sigma factor 24 is a member of the Sigma 70 family found in E.coli, and is also an Extra-cytoplasmic function (ECF) sigma factor. Sigma K is an alternative sigma factor which is activates the production of DNA binding protein GerE found in Bacillus Subtilis, in addition to being involved in the sporulation process in that organism. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. A variety of regions on domain 2 are responsible for DNA promoter binding specificty at the -10 promoter recognition site and other functions in transcription initiation with aided by the entire sigma factor. — an NCBI CDD conserved domain (cd11004); members share this curated model.
