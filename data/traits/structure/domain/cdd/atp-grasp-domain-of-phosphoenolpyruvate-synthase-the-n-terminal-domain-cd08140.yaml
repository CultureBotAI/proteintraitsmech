identifier: CDD:cd08140
label: "ATP-grasp domain of phosphoenolpyruvate synthase. The N-terminal domain of phosphoenolpyruvate synthetase (PPS) is similar to the nucleotide-binding domain of the ATP-grasp superfamily. PPS (EC 2.7.9.2), also known as pyruvate water dikinase, catalyzes the reversible conversion of ATP, water, and pyruvate to AMP, inorganic phosphate (Pi), and phosphoenolpyruvate (PEP). PPS is homologous to pyruvate phosphate dikinase (PPDK) which catalyzes a very similar reaction of phosphoenolpyruvate biosynthesis. PPS utilizes Mg as a cofactor."
definition: >-
  ATP-grasp domain of phosphoenolpyruvate synthase. The N-terminal domain of phosphoenolpyruvate synthetase (PPS) is similar to the nucleotide-binding domain of the ATP-grasp superfamily. PPS (EC 2.7.9.2), also known as pyruvate water dikinase, catalyzes the reversible conversion of ATP, water, and pyruvate to AMP, inorganic phosphate (Pi), and phosphoenolpyruvate (PEP). PPS is homologous to pyruvate phosphate dikinase (PPDK) which catalyzes a very similar reaction of phosphoenolpyruvate biosynthesis. PPS utilizes Mg as a cofactor. — an NCBI CDD conserved domain (cd08140); members share this curated model.
