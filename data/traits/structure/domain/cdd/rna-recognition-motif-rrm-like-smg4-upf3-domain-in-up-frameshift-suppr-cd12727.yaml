identifier: CDD:cd12727
label: "RNA recognition motif (RRM)-like Smg4_UPF3 domain in up-frameshift suppressor 3 homolog A (Upf3A). This subgroup corresponds to the RRM-like Smg4_UPF3 domain in Upf3A, also termed regulator of nonsense transcripts 3A, or nonsense mRNA reducing factor 3A, a human ortholog of yeast Upf3p and Caenorhabditis elegans SMG-4. It derives from gene UPF3A and is required for nonsense-mediated mRNA decay (NMD) in human. Upf3A is a nucleocytoplasmic shuttling protein that associates selectively with spliced beta-globin mRNA in vivo. Like other Upf3 proteins, Upf3A contains nuclear import and export signals, and a conserved Smg4_UPF3 domain with some similarity to an RNA recognition motif (RRM), indicating that it may be an RNA binding protein."
definition: >-
  RNA recognition motif (RRM)-like Smg4_UPF3 domain in up-frameshift suppressor 3 homolog A (Upf3A). This subgroup corresponds to the RRM-like Smg4_UPF3 domain in Upf3A, also termed regulator of nonsense transcripts 3A, or nonsense mRNA reducing factor 3A, a human ortholog of yeast Upf3p and Caenorhabditis elegans SMG-4. It derives from gene UPF3A and is required for nonsense-mediated mRNA decay (NMD) in human. Upf3A is a nucleocytoplasmic shuttling protein that associates selectively with spliced beta-globin mRNA in vivo. Like other Upf3 proteins, Upf3A contains nuclear import and export signals, and a conserved Smg4_UPF3 domain with some similarity to an RNA recognition motif (RRM), indicating that it may be an RNA binding protein. — an NCBI CDD conserved domain (cd12727); members share this curated model.
