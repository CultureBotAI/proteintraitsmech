identifier: CDD:cd06226
label: "Peptidase M14-like domain of an uncharacterized group of Peptidase M14 Carboxypeptidase T (CPT)-like proteins. Peptidase M14-like domain of an uncharacterized group of Peptidase M14 Carboxypeptidase T (CPT)-like proteins. This group belongs to the M14 family of metallocarboxypeptidases (MCPs). The M14 family are zinc-binding CPs which hydrolyze single, C-terminal amino acids from polypeptide chains, and have a recognition site for the free C-terminal carboxyl group, which is a key determinant of specificity. CPT exhibits dual-substrate specificity by cleaving C-terminal hydrophobic amino acid residues and C-terminal positively charged residues. However, CPT does not belong to this CPT-like group."
definition: >-
