identifier: CDD:cd13184
label: "FERM domain C-lobe of Protein 4.1 family. The protein 4.1 family includes four well-defined members: erythroid protein 4.1 (4.1R), the best known and characterized member, 4.1G (general), 4.1N (neuronal), and 4.1 B (brain). The less well understood 4.1O/FRMD3 is not a true member of this family and is not included in this hierarchy. Besides three highly conserved domains, FERM, SAB (spectrin and actin binding domain) and CTD (C-terminal domain), the proteins from this family contain several unique domains: U1, U2 and U3. FERM domains like other members of the FERM domain superfamily have a cloverleaf architecture with three distinct lobes: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe/F3 within the FERM domain is part of the PH domain family. The brain is a particularly rich source of protein 4.1 isoforms. The various 4.1R, 4.1G, 4.1N, and 4.1B mRNAs are all expressed in distinct patterns within the brain. It is likely that 4.1 proteins play important functional roles in the brain including motor coordination and spatial learning, postmitotic differentiation, and synaptic architecture and function. In addition they are found in nonerythroid, nonneuronal cells where they may play a general structural role in nuclear architecture and/or may interact with splicing factors. The FERM C domain is the third structural domain within the FERM domain. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs) , the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites."
definition: >-
  FERM domain C-lobe of Protein 4.1 family. The protein 4.1 family includes four well-defined members: erythroid protein 4.1 (4.1R), the best known and characterized member, 4.1G (general), 4.1N (neuronal), and 4.1 B (brain). The less well understood 4.1O/FRMD3 is not a true member of this family and is not included in this hierarchy. Besides three highly conserved domains, FERM, SAB (spectrin and actin binding domain) and CTD (C-terminal domain), the proteins from this family contain several unique domains: U1, U2 and U3. FERM domains like other members of the FERM domain superfamily have a cloverleaf architecture with three distinct lobes: (1) FERM_N (A-lobe or F1); (2) FERM_M (B-lobe, or F2); and (3) FERM_C (C-lobe or F3). The C-lobe/F3 within the FERM domain is part of the PH domain family. The brain is a particularly rich source of protein 4.1 isoforms. The various 4.1R, 4.1G, 4.1N, and 4.1B mRNAs are all expressed in distinct patterns within the brain. It is likely that 4.1 proteins play important functional roles in the brain including motor coordination and spatial learning, postmitotic differentiation, and synaptic architecture and function. In addition they are found in nonerythroid, nonneuronal cells where they may play a general structural role in nuclear architecture and/or may interact with splicing factors. The FERM C domain is the third structural domain within the FERM domain. The FERM domain is found in the cytoskeletal-associated proteins such as ezrin, moesin, radixin, 4.1R, and merlin. These proteins provide a link between the membrane and cytoskeleton and are involved in signal transduction pathways. The FERM domain is also found in protein tyrosine phosphatases (PTPs) , the tyrosine kinases FAK and JAK, in addition to other proteins involved in signaling. This domain is structurally similar to the PH and PTB domains and consequently is capable of binding to both peptides and phospholipids at different sites. — an NCBI CDD conserved domain (cd13184); members share this curated model.
