identifier: CDD:cd24044
label: "nucleotide-binding domain (NBD) of the ectonucleoside triphosphate diphosphohydrolase 1 (NTPDase1)-like subfamily. The NTPDase1-like subfamily includes NTPDases 1, 2, 3 and 8, which are localized to the cell surface with their catalytic domain facing the extracellular matrix. They are the ecto-apyrase group with NTPase activities. They participate in the regulation of purinergic signaling mediated by extracellular ATP and/or ADP (eATP and eADP) through the degradation of eATP and/or eADP into AMP."
definition: >-
  nucleotide-binding domain (NBD) of the ectonucleoside triphosphate diphosphohydrolase 1 (NTPDase1)-like subfamily. The NTPDase1-like subfamily includes NTPDases 1, 2, 3 and 8, which are localized to the cell surface with their catalytic domain facing the extracellular matrix. They are the ecto-apyrase group with NTPase activities. They participate in the regulation of purinergic signaling mediated by extracellular ATP and/or ADP (eATP and eADP) through the degradation of eATP and/or eADP into AMP. — an NCBI CDD conserved domain (cd24044); members share this curated model.
