identifier: CDD:cd17273
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to S.EcoJA69PI TRD1-CR1, MjaXIP/S.MjaORF132P TRD2-CR2, and S.HspDL1ORF16625P TRD2-CR2. Escherichia coli UCD_JA69_pb S subunit (S.EcoJA69PI) recognizes 5'... CCANNNNNNNCTTC ... 3'. The recognition sequences of Methanococcus jannaschii MjaXIP/S.MjaORF132P TRD2-CR2 and Halobacterium species DL1 S subunit (S.HspDL1ORF16625P) are undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. It also includes TRD-CR-like sequence-recognition domains of various putative type II restriction enzymes and methyltransferases and may also include type I DNA methyltransferases."
definition: >-
