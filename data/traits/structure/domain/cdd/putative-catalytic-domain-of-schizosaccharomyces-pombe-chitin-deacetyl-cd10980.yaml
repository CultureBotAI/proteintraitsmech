identifier: CDD:cd10980
label: "Putative catalytic domain of Schizosaccharomyces pombe chitin deacetylase 1 (SpCDA1), and similar proteins. This family is represented by Schizosaccharomyces pombe chitin deacetylase 1 (SpCDA1), encoded by the cda1 gene. The general function of chitin deacetylase (CDA) is the synthesis of chitosan from chitin, a polymer of N-acetyl glucosamine, to build up the proper ascospore wall. The actual function of SpCDA1 might be involved in allantoin hydrolysis. It is likely an ortholog to bacterial PuuE allantoinase, whereas it is more distantly related to the CDAs found in other fungi, such as Saccharomyces cerevisiae and Mucor rouxii. Those CDAs are similar with rizobial NodB protein and are not included in this family."
definition: >-
  Putative catalytic domain of Schizosaccharomyces pombe chitin deacetylase 1 (SpCDA1), and similar proteins. This family is represented by Schizosaccharomyces pombe chitin deacetylase 1 (SpCDA1), encoded by the cda1 gene. The general function of chitin deacetylase (CDA) is the synthesis of chitosan from chitin, a polymer of N-acetyl glucosamine, to build up the proper ascospore wall. The actual function of SpCDA1 might be involved in allantoin hydrolysis. It is likely an ortholog to bacterial PuuE allantoinase, whereas it is more distantly related to the CDAs found in other fungi, such as Saccharomyces cerevisiae and Mucor rouxii. Those CDAs are similar with rizobial NodB protein and are not included in this family. — an NCBI CDD conserved domain (cd10980); members share this curated model.
