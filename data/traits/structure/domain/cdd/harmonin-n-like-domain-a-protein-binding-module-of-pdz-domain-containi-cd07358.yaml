identifier: CDD:cd07358
label: "harmonin_N_like domain, a protein-binding module of PDZ domain-containing protein 7 and related proteins. Human PDZD7 is a scaffolding protein which associates with the Usher Syndrome protein network, and localizes to the stereocilia Ankle-link. Usher syndrome is the leading cause of genetic deaf-blindness. PDZD7 has a role as in Usher syndrome type 2 (and not in USH1) in humans. Whirlin, Usherin and GRP98 are other USH2 proteins. The latter two form the ankle links and whirlin is thought to be a scaffold for protein interactions at these links. PDZD7, whirlin, and harmonin (an USH1 protein) have a similar domain composition. The domain represented here is a putative protein-binding module based on its sequence similarity to the N-terminal domain of harmonin. Cooperative effects of mutations in PDZD7 and Usherin, and in PDZD7 and GPR98, result in a digenic USH2 phenotype."
definition: >-
  harmonin_N_like domain, a protein-binding module of PDZ domain-containing protein 7 and related proteins. Human PDZD7 is a scaffolding protein which associates with the Usher Syndrome protein network, and localizes to the stereocilia Ankle-link. Usher syndrome is the leading cause of genetic deaf-blindness. PDZD7 has a role as in Usher syndrome type 2 (and not in USH1) in humans. Whirlin, Usherin and GRP98 are other USH2 proteins. The latter two form the ankle links and whirlin is thought to be a scaffold for protein interactions at these links. PDZD7, whirlin, and harmonin (an USH1 protein) have a similar domain composition. The domain represented here is a putative protein-binding module based on its sequence similarity to the N-terminal domain of harmonin. Cooperative effects of mutations in PDZD7 and Usherin, and in PDZD7 and GPR98, result in a digenic USH2 phenotype. — an NCBI CDD conserved domain (cd07358); members share this curated model.
