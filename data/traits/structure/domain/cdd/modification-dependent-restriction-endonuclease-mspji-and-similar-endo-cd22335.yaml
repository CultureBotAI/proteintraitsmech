identifier: CDD:cd22335
label: "Modification-dependent restriction endonuclease MspjI and similar endonucleases. MspJI recognizes 5-methylcytosine or 5-hydroxymethylcytosine as part of the motif CNN(G/A) and cleaves both strands at fixed distances (N(12)/N(16)) away from the modified cytosine at the 3'-side. It belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Modification-dependent restriction endonuclease MspjI and similar endonucleases. MspJI recognizes 5-methylcytosine or 5-hydroxymethylcytosine as part of the motif CNN(G/A) and cleaves both strands at fixed distances (N(12)/N(16)) away from the modified cytosine at the 3'-side. It belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22335); members share this curated model.
