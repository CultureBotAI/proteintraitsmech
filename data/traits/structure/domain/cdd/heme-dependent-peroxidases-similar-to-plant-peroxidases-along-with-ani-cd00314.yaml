identifier: CDD:cd00314
label: "Heme-dependent peroxidases similar to plant peroxidases. Along with animal peroxidases, these enzymes belong to a group of peroxidases containing a heme prosthetic group (ferriprotoporphyrin IX), which catalyzes a multistep oxidative reaction involving hydrogen peroxide as the electron acceptor. The plant peroxidase-like superfamily is found in all three kingdoms of life and carries out a variety of biosynthetic and degradative functions. Several sub-families can be identified. Class I includes intracellular peroxidases present in fungi, plants, archaea and bacteria, called catalase-peroxidases, that can exhibit both catalase and broad-spectrum peroxidase activities depending on the steady-state concentration of hydrogen peroxide. Catalase-peroxidases are typically comprised of two homologous domains that probably arose via a single gene duplication event. Class II includes ligninase and other extracellular fungal peroxidases, while class III is comprised of classic extracellular plant peroxidases, like horseradish peroxidase."
definition: >-
  Heme-dependent peroxidases similar to plant peroxidases. Along with animal peroxidases, these enzymes belong to a group of peroxidases containing a heme prosthetic group (ferriprotoporphyrin IX), which catalyzes a multistep oxidative reaction involving hydrogen peroxide as the electron acceptor. The plant peroxidase-like superfamily is found in all three kingdoms of life and carries out a variety of biosynthetic and degradative functions. Several sub-families can be identified. Class I includes intracellular peroxidases present in fungi, plants, archaea and bacteria, called catalase-peroxidases, that can exhibit both catalase and broad-spectrum peroxidase activities depending on the steady-state concentration of hydrogen peroxide. Catalase-peroxidases are typically comprised of two homologous domains that probably arose via a single gene duplication event. Class II includes ligninase and other extracellular fungal peroxidases, while class III is comprised of classic extracellular plant peroxidases, like horseradish peroxidase. — an NCBI CDD conserved domain (cd00314); members share this curated model.
