identifier: CDD:cd24039
label: "nucleotide-binding domain (NBD) of yeast nucleoside diphosphatase 1 (YND1) and similar proteins. YND1 (EC 3.6.1.5), also called Golgi apyrase, ATP-diphosphatase, ATP-diphosphohydrolase, adenosine diphosphatase, ADPase, or Golgi nucleoside diphosphatase, catalyzes the hydrolysis of phosphoanhydride bonds of nucleoside tri- and di-phosphates. YND1 is required for Golgi glycosylation and cell wall integrity."
definition: >-
