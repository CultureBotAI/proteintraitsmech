identifier: CDD:cd22138
label: "F-box domain found in uncharacterized F-box protein group similar to F-box only protein 13 (FBXO13). The family corresponds to a group of uncharacterized F-box proteins which show sequence similarity to F-box only protein 13 (FBXO13). FBXO13, also called FBX13, or F-box/LRR-repeat protein 17 (FBL17), or F-box and leucine-rich repeat protein 17 (FBXL17), is the substrate-recognition component of the SCF(FBXL17) E3 ubiquitin ligase complex, a key component of a quality control pathway required to ensure functional dimerization of BTB domain-containing proteins (dimerization quality control, DQC). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in uncharacterized F-box protein group similar to F-box only protein 13 (FBXO13). The family corresponds to a group of uncharacterized F-box proteins which show sequence similarity to F-box only protein 13 (FBXO13). FBXO13, also called FBX13, or F-box/LRR-repeat protein 17 (FBL17), or F-box and leucine-rich repeat protein 17 (FBXL17), is the substrate-recognition component of the SCF(FBXL17) E3 ubiquitin ligase complex, a key component of a quality control pathway required to ensure functional dimerization of BTB domain-containing proteins (dimerization quality control, DQC). The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22138); members share this curated model.
