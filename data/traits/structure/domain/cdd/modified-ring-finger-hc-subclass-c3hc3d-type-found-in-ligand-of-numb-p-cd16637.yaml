identifier: CDD:cd16637
label: "Modified RING finger, HC subclass (C3HC3D-type), found in ligand of Numb protein LNX1, LNX2, and similar proteins. The ligand of Numb protein X (LNX) family, also known as PDZ and RING (PDZRN) family, includes LNX1-5, which can interact with Numb, a key regulator of neurogenesis and neuronal differentiation. LNX5 (also known as PDZK4 or PDZRN4L) shows high sequence homology to LNX3 and LNX4, but it lacks the RING domain. LNX1-4 proteins function as E3 ubiquitin ligases and have a unique domain architecture consisting of an N-terminal RING-HC finger for E3 ubiquitin ligase activity and either two or four PDZ domains necessary for substrate-binding. LNX1/LNX2-like proteins contain a modified C3HC3D-type RING-HC finger and four PDZ domains. This model corresponds to the RING finger."
definition: >-
  Modified RING finger, HC subclass (C3HC3D-type), found in ligand of Numb protein LNX1, LNX2, and similar proteins. The ligand of Numb protein X (LNX) family, also known as PDZ and RING (PDZRN) family, includes LNX1-5, which can interact with Numb, a key regulator of neurogenesis and neuronal differentiation. LNX5 (also known as PDZK4 or PDZRN4L) shows high sequence homology to LNX3 and LNX4, but it lacks the RING domain. LNX1-4 proteins function as E3 ubiquitin ligases and have a unique domain architecture consisting of an N-terminal RING-HC finger for E3 ubiquitin ligase activity and either two or four PDZ domains necessary for substrate-binding. LNX1/LNX2-like proteins contain a modified C3HC3D-type RING-HC finger and four PDZ domains. This model corresponds to the RING finger. — an NCBI CDD conserved domain (cd16637); members share this curated model.
