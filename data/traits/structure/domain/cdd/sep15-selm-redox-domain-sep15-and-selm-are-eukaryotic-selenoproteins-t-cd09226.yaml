identifier: CDD:cd09226
label: "Sep15/SelM redox domain. Sep15 and SelM are eukaryotic selenoproteins that have a thioredoxin-like domain and a surface accessible active site redox motif. This suggests that they function as thiol-disulphide isomerases involved in disulphide bond formation in the endoplasmic reticulum."
definition: >-
  Sep15/SelM redox domain. Sep15 and SelM are eukaryotic selenoproteins that have a thioredoxin-like domain and a surface accessible active site redox motif. This suggests that they function as thiol-disulphide isomerases involved in disulphide bond formation in the endoplasmic reticulum. — an NCBI CDD conserved domain (cd09226); members share this curated model.
