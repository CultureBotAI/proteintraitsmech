identifier: CDD:cd19726
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Drosophila melanogaster protein cycle and similar proteins. Protein cycle, also termed brain and muscle ARNT-like 1 (BMAL1), or MOP3, is a putative bHLH-PAS transcription factor involved in the generation of biological rhythms in Drosophila. It activates cycling transcription of Period (PER) and Timeless (TIM) by binding to the E-box (5'-CACGTG-3') present in their promoters."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Drosophila melanogaster protein cycle and similar proteins. Protein cycle, also termed brain and muscle ARNT-like 1 (BMAL1), or MOP3, is a putative bHLH-PAS transcription factor involved in the generation of biological rhythms in Drosophila. It activates cycling transcription of Period (PER) and Timeless (TIM) by binding to the E-box (5'-CACGTG-3') present in their promoters. — an NCBI CDD conserved domain (cd19726); members share this curated model.
