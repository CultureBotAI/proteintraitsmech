identifier: CDD:cd19814
label: "B-box-type 1 zinc finger found in RING finger protein 207 (RNF207) and similar proteins. RNF207 is a cardiac-specific E3 ubiquitin-protein ligase that plays an important role in the regulation of cardiac repolarization. It regulates action potential duration, likely via effects on human ether-a-go-go-related gene (HERG) trafficking and localization, in a heat shock protein-dependent manner. RNF207 contains a RING finger, a B-box motif and Bbox C-terminal (BBC) domain, as well as a C-terminal non-homologous region (CNHR). The B-box motif shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
definition: >-
  B-box-type 1 zinc finger found in RING finger protein 207 (RNF207) and similar proteins. RNF207 is a cardiac-specific E3 ubiquitin-protein ligase that plays an important role in the regulation of cardiac repolarization. It regulates action potential duration, likely via effects on human ether-a-go-go-related gene (HERG) trafficking and localization, in a heat shock protein-dependent manner. RNF207 contains a RING finger, a B-box motif and Bbox C-terminal (BBC) domain, as well as a C-terminal non-homologous region (CNHR). The B-box motif shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19814); members share this curated model.
