identifier: CDD:cd14481
label: "SPX domain of the plant protein SPX1 and similar proteins. This region has been named the SPX domain after (Syg1, Pho81 and XPR1). The domain is found at the amino terminus of a variety of proteins. This family of plant proteins contains a single SPX domain. Arabidopsis thaliana SPX1 and SPX3 have been reported to play roles in the adaptation to low-phosphate conditions, SPX3 may be involved in the regulation of SPX1 activity. Oryza sativa SPX1 suppresses the regulation of expression of OsPT2, a low-affinity phosphate transporter, by the MYB-like OsPHR2."
definition: >-
  SPX domain of the plant protein SPX1 and similar proteins. This region has been named the SPX domain after (Syg1, Pho81 and XPR1). The domain is found at the amino terminus of a variety of proteins. This family of plant proteins contains a single SPX domain. Arabidopsis thaliana SPX1 and SPX3 have been reported to play roles in the adaptation to low-phosphate conditions, SPX3 may be involved in the regulation of SPX1 activity. Oryza sativa SPX1 suppresses the regulation of expression of OsPT2, a low-affinity phosphate transporter, by the MYB-like OsPHR2. — an NCBI CDD conserved domain (cd14481); members share this curated model.
