identifier: CDD:cd17530
label: "phosphoacceptor receiver (REC) domain of response regulator RocR. The response regulator RocR from some pathogens contains an N-terminal phosphoreceiver (REC) domain and a C-terminal EAL domain that possesses c-di-GMP specific phosphodiesterase activity. The RocR REC domain is phosphorylated and modulates its EAL domain enzymatic activity, regulating the local level of c-di-GMP. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of response regulator RocR. The response regulator RocR from some pathogens contains an N-terminal phosphoreceiver (REC) domain and a C-terminal EAL domain that possesses c-di-GMP specific phosphodiesterase activity. The RocR REC domain is phosphorylated and modulates its EAL domain enzymatic activity, regulating the local level of c-di-GMP. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17530); members share this curated model.
