identifier: CDD:cd17207
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in pleckstrin homology domain-containing family H member 3 (PLEKHH3). PLEKHH3 is an uncharacterized Pleckstrin homology (PH) domain-containing protein that shows high sequence similarity with unconventional myosin-X, an actin-based motor protein that plays a critical role in diverse cellular motile events, such as filopodia formation/extension, phagocytosis, cell migration, and mitotic spindle maintenance, as well as a number of disease states including cancer metastasis and pathogen infection. In addition to two PH domains, PLEKHH3 harbors a MyTH4 domain, and a FERM (Band 4.1, ezrin, radixin, moesin) domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in pleckstrin homology domain-containing family H member 3 (PLEKHH3). PLEKHH3 is an uncharacterized Pleckstrin homology (PH) domain-containing protein that shows high sequence similarity with unconventional myosin-X, an actin-based motor protein that plays a critical role in diverse cellular motile events, such as filopodia formation/extension, phagocytosis, cell migration, and mitotic spindle maintenance, as well as a number of disease states including cancer metastasis and pathogen infection. In addition to two PH domains, PLEKHH3 harbors a MyTH4 domain, and a FERM (Band 4.1, ezrin, radixin, moesin) domain. The FERM domain is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17207); members share this curated model.
