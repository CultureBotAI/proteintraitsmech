identifier: CDD:cd23354
label: "third fascin-like domain, beta-trefoil fold, found in fascin-3 and similar proteins. Fascin-3, also called testis fascin, is a novel paralog of the actin-bundling protein fascin expressed specifically in the elongate spermatid head. Fascin-3 is composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the third fascin-like beta-trefoil domain."
definition: >-
  third fascin-like domain, beta-trefoil fold, found in fascin-3 and similar proteins. Fascin-3, also called testis fascin, is a novel paralog of the actin-bundling protein fascin expressed specifically in the elongate spermatid head. Fascin-3 is composed of four fascin beta-trefoil domains, which are characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The model corresponds to the third fascin-like beta-trefoil domain. — an NCBI CDD conserved domain (cd23354); members share this curated model.
