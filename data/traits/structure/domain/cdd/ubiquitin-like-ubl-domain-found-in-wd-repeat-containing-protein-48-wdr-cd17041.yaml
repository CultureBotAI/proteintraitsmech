identifier: CDD:cd17041
label: "Ubiquitin-like (Ubl) domain found in WD repeat-containing protein 48 (WDR48) and similar proteins. WDR48, also termed USP1-associated factor 1 (UAF1), or WD repeat endosomal protein, or p80, is required for the histone deubiquitination activity. It stimulates activity of ubiquitin-specific proteases USP1, USP12, and USP46.As potential tumor suppressor, WDR48 in complex with deubiquitinase USP12 suppresses Akt-dependent cell survival signaling by stabilizing PH domain leucine-rich repeat protein phosphatase 1 (PHLPP1). WDR48 also functions as a novel interaction partner of E1 helicase from anogenital human papillomavirus (HPV) types, and plays an essential role in anogenital HPV DNA replication. WDR48 contains a WD40 domain and a ubiquitin-like domain that shows high sequence and structural similarity with RING finger- and WD40-associated ubiquitin-like (RAWUL) domain."
definition: >-
  Ubiquitin-like (Ubl) domain found in WD repeat-containing protein 48 (WDR48) and similar proteins. WDR48, also termed USP1-associated factor 1 (UAF1), or WD repeat endosomal protein, or p80, is required for the histone deubiquitination activity. It stimulates activity of ubiquitin-specific proteases USP1, USP12, and USP46.As potential tumor suppressor, WDR48 in complex with deubiquitinase USP12 suppresses Akt-dependent cell survival signaling by stabilizing PH domain leucine-rich repeat protein phosphatase 1 (PHLPP1). WDR48 also functions as a novel interaction partner of E1 helicase from anogenital human papillomavirus (HPV) types, and plays an essential role in anogenital HPV DNA replication. WDR48 contains a WD40 domain and a ubiquitin-like domain that shows high sequence and structural similarity with RING finger- and WD40-associated ubiquitin-like (RAWUL) domain. — an NCBI CDD conserved domain (cd17041); members share this curated model.
