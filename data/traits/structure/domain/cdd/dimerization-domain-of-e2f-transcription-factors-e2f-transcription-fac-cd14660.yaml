identifier: CDD:cd14660
label: "Dimerization domain of E2F transcription factors. E2F transcription factors are involved in the regulation of DNA synthesis, cell cycle progression, proliferation and apoptosis. It associates with the retinoblastoma (Rb) protein, negatively regulating the G1-S transition until cyclin-dependent kinases phosphorylate Rb, which causes E2F release. E2F forms heterodimers with DP, a distantly related protein. Heterodimerization enhances the Rb binding, DNA binding, and transactivation activities of E2Fs. In humans, there are at least six closely related E2F and two DP family members, all containing a DNA-binding domain, a coiled-coil (CC) region, and a marked-box domain. E2F1 to E2F5 also contain a C-terminal transactivation domain."
definition: >-
  Dimerization domain of E2F transcription factors. E2F transcription factors are involved in the regulation of DNA synthesis, cell cycle progression, proliferation and apoptosis. It associates with the retinoblastoma (Rb) protein, negatively regulating the G1-S transition until cyclin-dependent kinases phosphorylate Rb, which causes E2F release. E2F forms heterodimers with DP, a distantly related protein. Heterodimerization enhances the Rb binding, DNA binding, and transactivation activities of E2Fs. In humans, there are at least six closely related E2F and two DP family members, all containing a DNA-binding domain, a coiled-coil (CC) region, and a marked-box domain. E2F1 to E2F5 also contain a C-terminal transactivation domain. — an NCBI CDD conserved domain (cd14660); members share this curated model.
