identifier: CDD:cd20800
label: "first protein kinase C conserved region 1 (C1 domain) found in type II diacylglycerol kinases. Diacylglycerol (DAG) kinase (EC 2.7.1.107) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid. Type II DAG kinases (DGKs) contain pleckstrin homology (PH) and sterile alpha motifs (SAM) domains, in addition to C1 and catalytic domains that are present in all DGKs. The SAM domain mediates oligomerization of type II DGKs. Three DGK isozymes (delta, eta and kappa) are classified as type II. DAG kinase delta, also called 130 kDa DAG kinase, or diglyceride kinase delta (DGK-delta), is a residential lipid kinase in the endoplasmic reticulum. It promotes lipogenesis and is involved in triglyceride biosynthesis. DAG kinase eta, also called diglyceride kinase eta (DGK-eta), plays a key role in promoting cell growth. The DAG kinase eta gene, DGKH, is a replicated risk gene of bipolar disorder (BPD). DAG kinase kappa is also called diglyceride kinase kappa (DGK-kappa) or 142 kDa DAG kinase. Members of this family contain two copies of the C1 domain. This model corresponds to the first one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  first protein kinase C conserved region 1 (C1 domain) found in type II diacylglycerol kinases. Diacylglycerol (DAG) kinase (EC 2.7.1.107) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid. Type II DAG kinases (DGKs) contain pleckstrin homology (PH) and sterile alpha motifs (SAM) domains, in addition to C1 and catalytic domains that are present in all DGKs. The SAM domain mediates oligomerization of type II DGKs. Three DGK isozymes (delta, eta and kappa) are classified as type II. DAG kinase delta, also called 130 kDa DAG kinase, or diglyceride kinase delta (DGK-delta), is a residential lipid kinase in the endoplasmic reticulum. It promotes lipogenesis and is involved in triglyceride biosynthesis. DAG kinase eta, also called diglyceride kinase eta (DGK-eta), plays a key role in promoting cell growth. The DAG kinase eta gene, DGKH, is a replicated risk gene of bipolar disorder (BPD). DAG kinase kappa is also called diglyceride kinase kappa (DGK-kappa) or 142 kDa DAG kinase. Members of this family contain two copies of the C1 domain. This model corresponds to the first one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20800); members share this curated model.
