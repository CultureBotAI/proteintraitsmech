identifier: CDD:cd14297
label: "UBA2 domain found in Schizosaccharomyces pombe ubiquitin carboxyl-terminal hydrolase 14 (spUBP14) and similar proteins. spUBP14, also called deubiquitinating enzyme 14, UBA domain-containing protein 2, ubiquitin thioesterase 14, or ubiquitin-specific-processing protease 14, functions as a deubiquitinating enzyme that is involved in protein degradation in fission yeast. Members in this family contain two tandem ubiquitin-association (UBA) domains. This model corresponds to the UBA2 domain."
definition: >-
  UBA2 domain found in Schizosaccharomyces pombe ubiquitin carboxyl-terminal hydrolase 14 (spUBP14) and similar proteins. spUBP14, also called deubiquitinating enzyme 14, UBA domain-containing protein 2, ubiquitin thioesterase 14, or ubiquitin-specific-processing protease 14, functions as a deubiquitinating enzyme that is involved in protein degradation in fission yeast. Members in this family contain two tandem ubiquitin-association (UBA) domains. This model corresponds to the UBA2 domain. — an NCBI CDD conserved domain (cd14297); members share this curated model.
