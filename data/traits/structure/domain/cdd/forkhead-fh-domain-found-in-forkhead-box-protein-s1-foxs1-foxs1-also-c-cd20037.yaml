identifier: CDD:cd20037
label: "Forkhead (FH) domain found in Forkhead box protein S1 (FOXS1). FOXS1, also called Forkhead-like 18 protein or Forkhead-related transcription factor 10 (FREAC-10), is a transcriptional repressor that suppresses transcription from the FASLG, FOXO3, and FOXO4 promoters. It may have a role in the organization of the testicular vasculature. It has also been implicated in energy turnover, motor function, and body weight. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein S1 (FOXS1). FOXS1, also called Forkhead-like 18 protein or Forkhead-related transcription factor 10 (FREAC-10), is a transcriptional repressor that suppresses transcription from the FASLG, FOXO3, and FOXO4 promoters. It may have a role in the organization of the testicular vasculature. It has also been implicated in energy turnover, motor function, and body weight. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20037); members share this curated model.
