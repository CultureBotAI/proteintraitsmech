identifier: CDD:cd21034
label: "C-terminal winged-helix domain found in DNA replication licensing factor MCM6. MCM6, also termed 105MCM, functions as component of the MCM2-7 complex (MCM complex) which is the putative replicative helicase essential for 'once per cell cycle' DNA replication initiation and elongation in eukaryotic cells. During late M and early G(1), the MCM complex is loaded onto chromatin to form prereplicative complex in a Cdt1-dependent manner. The model corresponds to the C-terminal winged-helix domain of MCM6, which is the Cdt1 binding domain (CBD) exhibiting a typical \"winged helix\" fold that is generally involved in protein-nucleic acid interaction. The CBD failed to interact with DNA in experiments. The CBD-Cdt1 interaction involves the helix-turn-helix motif of CBD."
definition: >-
  C-terminal winged-helix domain found in DNA replication licensing factor MCM6. MCM6, also termed 105MCM, functions as component of the MCM2-7 complex (MCM complex) which is the putative replicative helicase essential for 'once per cell cycle' DNA replication initiation and elongation in eukaryotic cells. During late M and early G(1), the MCM complex is loaded onto chromatin to form prereplicative complex in a Cdt1-dependent manner. The model corresponds to the C-terminal winged-helix domain of MCM6, which is the Cdt1 binding domain (CBD) exhibiting a typical "winged helix" fold that is generally involved in protein-nucleic acid interaction. The CBD failed to interact with DNA in experiments. The CBD-Cdt1 interaction involves the helix-turn-helix motif of CBD. — an NCBI CDD conserved domain (cd21034); members share this curated model.
