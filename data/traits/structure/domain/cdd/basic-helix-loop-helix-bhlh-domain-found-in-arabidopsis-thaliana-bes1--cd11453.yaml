identifier: CDD:cd11453
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana BES1-interacting Myc-like proteins (BIMs) and similar proteins. The family includes Arabidopsis thaliana BIM1 and its homologs (BIM2 and BIM3), which are bHLH transcription factors that interact with BES1 to regulate transcription of Brassinosteroid (BR)-induced gene. BR regulates many growth and developmental processes such as cell elongation, vascular development, senescence stress responses, and photomorphogenesis. BIM1 heterodimerize with BES1 and bind to E-box sequences present in many BR-induced promoters to regulated BR-induced genes."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana BES1-interacting Myc-like proteins (BIMs) and similar proteins. The family includes Arabidopsis thaliana BIM1 and its homologs (BIM2 and BIM3), which are bHLH transcription factors that interact with BES1 to regulate transcription of Brassinosteroid (BR)-induced gene. BR regulates many growth and developmental processes such as cell elongation, vascular development, senescence stress responses, and photomorphogenesis. BIM1 heterodimerize with BES1 and bind to E-box sequences present in many BR-induced promoters to regulated BR-induced genes. — an NCBI CDD conserved domain (cd11453); members share this curated model.
