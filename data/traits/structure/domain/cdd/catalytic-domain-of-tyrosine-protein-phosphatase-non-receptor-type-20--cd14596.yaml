label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 20. Tyrosine-protein phosphatase non-receptor type 20 (PTPN20) belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. Human PTPN20 is a widely expressed phosphatase with a dynamic subcellular distribution that is targeted to sites of actin polymerization."
definition: >-
