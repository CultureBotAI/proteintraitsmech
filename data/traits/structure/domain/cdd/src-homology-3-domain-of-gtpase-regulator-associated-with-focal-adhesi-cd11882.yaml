identifier: CDD:cd11882
label: "Src Homology 3 domain of GTPase Regulator Associated with Focal adhesion kinase and similar proteins. This subfamily is composed of Rho GTPase activating proteins (GAPs) with similarity to GRAF. Members contain an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, a Rho GAP domain, and a C-terminal SH3 domain. Although vertebrates harbor four Rho GAPs in the GRAF subfamily including GRAF, GRAF2, GRAF3, and Oligophrenin-1 (OPHN1), only three are included in this model. OPHN1 contains the BAR, PH and GAP domains, but not the C-terminal SH3 domain. GRAF and GRAF2 show GAP activity towards RhoA and Cdc42. GRAF influences Rho-mediated cytoskeletal rearrangements and binds focal adhesion kinase. GRAF2 regulates caspase-activated p21-activated protein kinase-2. The SH3 domain of GRAF and GRAF2 binds PKNbeta, a target of the small GTPase Rho. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of GTPase Regulator Associated with Focal adhesion kinase and similar proteins. This subfamily is composed of Rho GTPase activating proteins (GAPs) with similarity to GRAF. Members contain an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, a Rho GAP domain, and a C-terminal SH3 domain. Although vertebrates harbor four Rho GAPs in the GRAF subfamily including GRAF, GRAF2, GRAF3, and Oligophrenin-1 (OPHN1), only three are included in this model. OPHN1 contains the BAR, PH and GAP domains, but not the C-terminal SH3 domain. GRAF and GRAF2 show GAP activity towards RhoA and Cdc42. GRAF influences Rho-mediated cytoskeletal rearrangements and binds focal adhesion kinase. GRAF2 regulates caspase-activated p21-activated protein kinase-2. The SH3 domain of GRAF and GRAF2 binds PKNbeta, a target of the small GTPase Rho. SH3 domains bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs; they play a role in the regulation of enzymes by intramolecular interactions, changing the subcellular localization of signal pathway components and mediate multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11882); members share this curated model.
