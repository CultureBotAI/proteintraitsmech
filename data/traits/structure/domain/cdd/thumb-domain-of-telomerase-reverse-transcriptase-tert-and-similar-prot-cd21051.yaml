identifier: CDD:cd21051
label: "thumb domain of telomerase reverse transcriptase (TERT) and similar proteins. TERT (EC 2.7.7.49), also termed EST2, or telomerase catalytic subunit (TCS1), or telomerase-associated protein 2 (TP2), is a ribonucleoprotein enzyme essential for the replication of chromosome termini in most eukaryotes. It catalyzes the RNA-dependent extension of 3'-chromosomal termini with the 6-nucleotide telomeric repeat unit, 5'-TTAGGG-3'. The model corresponds to thumb domain of TERT, which bind the RNADNA hybrid and stabilize the telomerase elongation complex."
definition: >-
  thumb domain of telomerase reverse transcriptase (TERT) and similar proteins. TERT (EC 2.7.7.49), also termed EST2, or telomerase catalytic subunit (TCS1), or telomerase-associated protein 2 (TP2), is a ribonucleoprotein enzyme essential for the replication of chromosome termini in most eukaryotes. It catalyzes the RNA-dependent extension of 3'-chromosomal termini with the 6-nucleotide telomeric repeat unit, 5'-TTAGGG-3'. The model corresponds to thumb domain of TERT, which bind the RNADNA hybrid and stabilize the telomerase elongation complex. — an NCBI CDD conserved domain (cd21051); members share this curated model.
