identifier: CDD:cd17969
label: "DEAH-box helicase domain of TFIIH basal transcription factor complex helicase XPD subunit. TFIIH can be resolved biochemically into a seven subunit core complex containing XPD/Rad3, XPB/Ssl2, p62/Tfb1, p52/Tfb2, p44/Ssl1, p34/Tfb4, and p8/Tfb5 and a three subunit Cdk Activating Kinase (CAK) complex containing CDK7/Kin28, cyclin H/Ccl1, and MAT1/Tfb3. XPD interacts directly with p44, which stimulates XPD helicase activity. XPD/Rad3 also interacts directly with the CAK via its MAT1/Tfb3 subunit inhibiting the helicase activity of XPD. XPD is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAH-box helicase domain of TFIIH basal transcription factor complex helicase XPD subunit. TFIIH can be resolved biochemically into a seven subunit core complex containing XPD/Rad3, XPB/Ssl2, p62/Tfb1, p52/Tfb2, p44/Ssl1, p34/Tfb4, and p8/Tfb5 and a three subunit Cdk Activating Kinase (CAK) complex containing CDK7/Kin28, cyclin H/Ccl1, and MAT1/Tfb3. XPD interacts directly with p44, which stimulates XPD helicase activity. XPD/Rad3 also interacts directly with the CAK via its MAT1/Tfb3 subunit inhibiting the helicase activity of XPD. XPD is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17969); members share this curated model.
