identifier: CDD:cd18395
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 21 (KCTD21). KCTD21, also calledz KCTD containing, Cullin3 adaptor, suppressor of Hedgehog 2 (KCASH2), is a BTB/POZ domain-containing protein that functions as a substrate-specific adaptor of cullin-3, promoting the ubiquitination and degradation of histone deacetylase HDAC1, thereby inhibiting the deacetylation-mediated transcriptional activation of the Hedgehog effectors Gli1 and Gli2. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing protein 21 (KCTD21). KCTD21, also calledz KCTD containing, Cullin3 adaptor, suppressor of Hedgehog 2 (KCASH2), is a BTB/POZ domain-containing protein that functions as a substrate-specific adaptor of cullin-3, promoting the ubiquitination and degradation of histone deacetylase HDAC1, thereby inhibiting the deacetylation-mediated transcriptional activation of the Hedgehog effectors Gli1 and Gli2. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18395); members share this curated model.
