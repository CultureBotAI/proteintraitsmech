identifier: CDD:cd05315
label: "GFOR_like2. Glucose-fructose oxidoreductase superfamily (GFOR_SF); these proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins."
definition: >-
  GFOR_like2. Glucose-fructose oxidoreductase superfamily (GFOR_SF); these proteins share sequence similarity with a class of oxidoreductases that have been implicated in interconversions between hydroxyl and carbonyl groups, such as glucose-fructose oxidoreductase which oxidizes glucose to gluconolactone and reduces fructose to sorbitol in Zymomonas mobilis. Members of this CD contain an N-terminal Rossmann fold NAD(P)H binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase-like domain and belong to the glucose-fructose oxidoreductase superfamily of proteins. — an NCBI CDD conserved domain (cd05315); members share this curated model.
