identifier: CDD:cd21959
label: "C-terminal domain of zinc finger CCHC domain-containing protein 8 (ZCCHC8) and similar proteins. ZCCHC8, also called TRAMP-like complex RNA-binding factor ZCCHC8, is a glycogen synthase kinase-3 substrate that interacts with RNA-binding proteins. It is a scaffolding subunit of the trimeric nuclear exosome targeting (NEXT) complex, which functions as an RNA exosome cofactor that directs a subset of non-coding short-lived RNAs for exosomal degradation. NEXT is involved in surveillance and turnover of aberrant transcripts and non-coding RNAs. ZCCHC8 may be involved in pre-mRNA splicing. The model corresponds to the C-terminal domain of ZCCHC8, which binds the helicase core and can stimulate MTR4 helicase/ATPase activities."
definition: >-
  C-terminal domain of zinc finger CCHC domain-containing protein 8 (ZCCHC8) and similar proteins. ZCCHC8, also called TRAMP-like complex RNA-binding factor ZCCHC8, is a glycogen synthase kinase-3 substrate that interacts with RNA-binding proteins. It is a scaffolding subunit of the trimeric nuclear exosome targeting (NEXT) complex, which functions as an RNA exosome cofactor that directs a subset of non-coding short-lived RNAs for exosomal degradation. NEXT is involved in surveillance and turnover of aberrant transcripts and non-coding RNAs. ZCCHC8 may be involved in pre-mRNA splicing. The model corresponds to the C-terminal domain of ZCCHC8, which binds the helicase core and can stimulate MTR4 helicase/ATPase activities. — an NCBI CDD conserved domain (cd21959); members share this curated model.
