identifier: CDD:cd20735
label: "Polymorphic Nuclease effector (PoNe) domain co-occurring with N-terminal domains such as RHS repeats. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with uncharacterized N-terminal RHS repeat domains."
definition: >-
  Polymorphic Nuclease effector (PoNe) domain co-occurring with N-terminal domains such as RHS repeats. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains proteins with PoNe domains that typically co-occur with uncharacterized N-terminal RHS repeat domains. — an NCBI CDD conserved domain (cd20735); members share this curated model.
