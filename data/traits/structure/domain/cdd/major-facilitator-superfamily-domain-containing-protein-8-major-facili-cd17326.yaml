identifier: CDD:cd17326
label: "Major facilitator superfamily domain-containing protein 8. Major facilitator superfamily (MFS) domain-containing protein 8 (MFSD8) is also called ceroid-lipofuscinosis neuronal protein 7 (CLN7). It is a polytopic lysosomal membrane protein that may transport small solutes by using chemiosmotic ion gradients. Mutations in MFSD8/CLN7 cause a variant of late-infantile neuronal ceroid lipofuscinoses (vLINCL), a neurodegenerative lysosomal storage disorder. Some variants are associated with nonsyndromic autosomal recessive macular dystrophy. MFSD8/CLN7 belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 8. Major facilitator superfamily (MFS) domain-containing protein 8 (MFSD8) is also called ceroid-lipofuscinosis neuronal protein 7 (CLN7). It is a polytopic lysosomal membrane protein that may transport small solutes by using chemiosmotic ion gradients. Mutations in MFSD8/CLN7 cause a variant of late-infantile neuronal ceroid lipofuscinoses (vLINCL), a neurodegenerative lysosomal storage disorder. Some variants are associated with nonsyndromic autosomal recessive macular dystrophy. MFSD8/CLN7 belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17326); members share this curated model.
