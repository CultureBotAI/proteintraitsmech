identifier: CDD:cd09485
label: "The Lim domain of Epithelial Protein Lost in Neoplasm (Eplin). The Lim domain of Epithelial Protein Lost in Neoplasm (Eplin): Epithelial Protein Lost in Neoplasm is a cytoskeleton-associated tumor suppressor whose expression inversely correlates with cell growth, motility, invasion and cancer mortality.  Eplin interacts and stabilizes F-actin filaments and stress fibers, which correlates with its ability to suppress anchorage independent growth. In epithelial cells, Eplin is required for formation of the F-actin adhesion belt by binding to the E-cadherin-catenin complex through alpha-catenin. Eplin is expressed in two isoforms, a longer Eplin-beta and a shorter Eplin-alpha. Eplin-alpha mRNA is detected in various tissues and cell lines, but is absent or down regulated in cancer cells. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The Lim domain of Epithelial Protein Lost in Neoplasm (Eplin). The Lim domain of Epithelial Protein Lost in Neoplasm (Eplin): Epithelial Protein Lost in Neoplasm is a cytoskeleton-associated tumor suppressor whose expression inversely correlates with cell growth, motility, invasion and cancer mortality. Eplin interacts and stabilizes F-actin filaments and stress fibers, which correlates with its ability to suppress anchorage independent growth. In epithelial cells, Eplin is required for formation of the F-actin adhesion belt by binding to the E-cadherin-catenin complex through alpha-catenin. Eplin is expressed in two isoforms, a longer Eplin-beta and a shorter Eplin-alpha. Eplin-alpha mRNA is detected in various tissues and cell lines, but is absent or down regulated in cancer cells. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09485); members share this curated model.
