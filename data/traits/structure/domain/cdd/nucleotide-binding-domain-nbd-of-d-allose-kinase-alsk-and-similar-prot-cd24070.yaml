identifier: CDD:cd24070
label: "nucleotide-binding domain (NBD) of D-allose kinase (AlsK) and similar proteins. AlsK (EC 2.7.1.55), also called allokinase, catalyzes the phosphorylation of D-allose to D-allose 6-phosphate. It has also low level glucokinase activity in vitro. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities."
definition: >-
  nucleotide-binding domain (NBD) of D-allose kinase (AlsK) and similar proteins. AlsK (EC 2.7.1.55), also called allokinase, catalyzes the phosphorylation of D-allose to D-allose 6-phosphate. It has also low level glucokinase activity in vitro. Members of this subfamily belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. — an NCBI CDD conserved domain (cd24070); members share this curated model.
