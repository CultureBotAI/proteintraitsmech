label: "Somatolactin (SL) and somatolactin-like proteins. This family of hormones specific to Actinopterygii is expressed in the pars intermedia bordering the neurohypophysis (posterior pituitary). Somatolactin appears to be involved in acid-base regulation, but much of its physiological role remains to be understood."
