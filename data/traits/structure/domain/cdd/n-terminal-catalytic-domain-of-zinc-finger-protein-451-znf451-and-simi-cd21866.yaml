identifier: CDD:cd21866
label: "N-terminal catalytic domain of zinc finger protein 451 (ZNF451) and similar proteins. ZNF451, also called E3 SUMO-protein ligase ZNF451, or coactivator for steroid receptors, is E3 SUMO-protein transferase that has a preference for SUMO2 and SUMO3 and facilitates UBE2I/UBC9-mediated sumoylation of target proteins. It acts as a novel PML body- and SUMO-associated transcriptional coregulator. It is also a novel Smad corepressor in transforming growth factor-beta signaling. ZNF451 negatively regulates transcriptional activation mediated by the SMAD4 complex in response to TGF-beta signaling. Inhibits EP300-mediated acetylation of histone H3 at 'Lys-9'. The family also includes E3 SUMO-protein ligase KIAA1586, which acts as E3 SUMO-protein transferase that facilitates UBE2I/UBC9-mediated SUMO2 modification of target proteins. The model corresponds to a conserved domain located at the N-terminus of ZNF451 and KIAA1586, which functions as the catalytic module for SUMO E3 ligase activity. It contains tandem SUMO interaction motifs (SIMs) bridged by a Proline-Leucine-Arginine-Proline (PLRP) motif."
definition: >-
  N-terminal catalytic domain of zinc finger protein 451 (ZNF451) and similar proteins. ZNF451, also called E3 SUMO-protein ligase ZNF451, or coactivator for steroid receptors, is E3 SUMO-protein transferase that has a preference for SUMO2 and SUMO3 and facilitates UBE2I/UBC9-mediated sumoylation of target proteins. It acts as a novel PML body- and SUMO-associated transcriptional coregulator. It is also a novel Smad corepressor in transforming growth factor-beta signaling. ZNF451 negatively regulates transcriptional activation mediated by the SMAD4 complex in response to TGF-beta signaling. Inhibits EP300-mediated acetylation of histone H3 at 'Lys-9'. The family also includes E3 SUMO-protein ligase KIAA1586, which acts as E3 SUMO-protein transferase that facilitates UBE2I/UBC9-mediated SUMO2 modification of target proteins. The model corresponds to a conserved domain located at the N-terminus of ZNF451 and KIAA1586, which functions as the catalytic module for SUMO E3 ligase activity. It contains tandem SUMO interaction motifs (SIMs) bridged by a Proline-Leucine-Arginine-Proline (PLRP) motif. — an NCBI CDD conserved domain (cd21866); members share this curated model.
