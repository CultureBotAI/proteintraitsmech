identifier: CDD:cd12295
label: "RNA recognition motif in yeast RNA annealing protein YRA2 (Yra2p) and similar proteins. This subfamily corresponds to the RRM of Yra2p, a nonessential nuclear RNA-binding protein encoded by Saccharomyces cerevisiae YRA2 gene. It may share some overlapping functions with Yra1p, and is able to complement an YRA1 deletion when overexpressed in yeast. Yra2p belongs to the evolutionarily conserved REF (RNA and export factor binding proteins) family of hnRNP-like proteins. It is a major component of endogenous Yra1p complexes. It interacts with Yra1p and functions as a negative regulator of Yra1p. Yra2p consists of two highly conserved N- and C-terminal boxes and a central RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif in yeast RNA annealing protein YRA2 (Yra2p) and similar proteins. This subfamily corresponds to the RRM of Yra2p, a nonessential nuclear RNA-binding protein encoded by Saccharomyces cerevisiae YRA2 gene. It may share some overlapping functions with Yra1p, and is able to complement an YRA1 deletion when overexpressed in yeast. Yra2p belongs to the evolutionarily conserved REF (RNA and export factor binding proteins) family of hnRNP-like proteins. It is a major component of endogenous Yra1p complexes. It interacts with Yra1p and functions as a negative regulator of Yra1p. Yra2p consists of two highly conserved N- and C-terminal boxes and a central RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd12295); members share this curated model.
