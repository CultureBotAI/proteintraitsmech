identifier: CDD:cd08916
label: "Truncated hemoglobins (TrHbs, 2/2Hb, 2/2 globins); group 3 (P). The M- and S families exhibit the canonical secondary structure of hemoglobins, a 3-over-3 alpha-helical sandwich structure (3/3 Mb-fold), built by eight alpha-helical segments. Truncated hemoglobins (TrHbs, 2/2Hb, or 2/2 globins) or the T family globins adopt a 2-on-2 alpha-helical sandwich structure, resulting from extensive and complex modifications of the canonical 3-on-3 alpha-helical sandwich that are distributed throughout the whole protein molecule. They are classified into three main groups based on their structural properties and named after Mycobacterium sp. genes glbN, glbO, and glbP: TrHb1s (N), TrHb2s (O) and TrHb3s (P). TrHb3s include Campylobacter jejuni Ctb, encoded by Cj0465c, which may play a role in moderating O2 flux within C. jejuni."
definition: >-
  Truncated hemoglobins (TrHbs, 2/2Hb, 2/2 globins); group 3 (P). The M- and S families exhibit the canonical secondary structure of hemoglobins, a 3-over-3 alpha-helical sandwich structure (3/3 Mb-fold), built by eight alpha-helical segments. Truncated hemoglobins (TrHbs, 2/2Hb, or 2/2 globins) or the T family globins adopt a 2-on-2 alpha-helical sandwich structure, resulting from extensive and complex modifications of the canonical 3-on-3 alpha-helical sandwich that are distributed throughout the whole protein molecule. They are classified into three main groups based on their structural properties and named after Mycobacterium sp. genes glbN, glbO, and glbP: TrHb1s (N), TrHb2s (O) and TrHb3s (P). TrHb3s include Campylobacter jejuni Ctb, encoded by Cj0465c, which may play a role in moderating O2 flux within C. jejuni. — an NCBI CDD conserved domain (cd08916); members share this curated model.
