identifier: CDD:cd19146
label: "Aspergillus nidulans sterigmatocystin biosynthesis dehydrogenase StcV, Aspergillus flavus norsolorinic acid reductase (NOR), and similar proteins. Aspergillus nidulans sterigmatocystin biosynthesis dehydrogenase StcV and Aspergillus flavus norsolorinic acid reductase (NOR), are founding members of aldo-keto reductase family 9 member A1-2 (AKR9A1-2), respectively. StcV may be involved in the dehydration of 5'-hydroxyaverantin to form averufin. NOR is involved in aflatoxin biosynthesis."
definition: >-
  Aspergillus nidulans sterigmatocystin biosynthesis dehydrogenase StcV, Aspergillus flavus norsolorinic acid reductase (NOR), and similar proteins. Aspergillus nidulans sterigmatocystin biosynthesis dehydrogenase StcV and Aspergillus flavus norsolorinic acid reductase (NOR), are founding members of aldo-keto reductase family 9 member A1-2 (AKR9A1-2), respectively. StcV may be involved in the dehydration of 5'-hydroxyaverantin to form averufin. NOR is involved in aflatoxin biosynthesis. — an NCBI CDD conserved domain (cd19146); members share this curated model.
