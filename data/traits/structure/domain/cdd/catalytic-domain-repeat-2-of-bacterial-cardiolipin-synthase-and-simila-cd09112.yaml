identifier: CDD:cd09112
label: "catalytic domain repeat 2 of bacterial cardiolipin synthase and similar proteins. This CD corresponds to the catalytic domain repeat 2 of bacterial cardiolipin synthase (CL synthase, EC 2.7.8.-) and a few homologs found in eukaryotes and archea. Bacterial CL synthases catalyze reversible phosphatidyl group transfer between two phosphatidylglycerol molecules to form cardiolipin (CL) and glycerol. The monomer of bacterial CL synthase consists of two catalytic domains. Each catalytic domain contains one copy of conserved HKD motifs (H-X-K-X(4)-D, X represents any amino acid residue) that are the characteristic of the phospholipase D (PLD) superfamily. Two HKD motifs from two domains together form a single active site involving in phosphatidyl group transfer. Bacterial CL synthases can be stimulated by phosphate and inhibited by CL, the product of the reaction, and by phosphatidate. Phosphate stimulation may be unique to enzymes with CL synthase activity in PLD superfamily. Like other PLD enzymes, bacterial CL synthase utilize a common two-step ping-pong catalytic mechanism involving an enzyme-substrate intermediate to cleave phosphodiester bonds. The two histidine residues from the two HKD motifs play key roles in the catalysis. Upon substrate binding, a histidine residue from one HKD motif could function as the nucleophile attacking the phosphodiester bond to create a covalent phosphohistidine intermediate, while the other histidine residue from the second HKD motif could serve as a general acid stabilizing the leaving group."
definition: >-
  catalytic domain repeat 2 of bacterial cardiolipin synthase and similar proteins. This CD corresponds to the catalytic domain repeat 2 of bacterial cardiolipin synthase (CL synthase, EC 2.7.8.-) and a few homologs found in eukaryotes and archea. Bacterial CL synthases catalyze reversible phosphatidyl group transfer between two phosphatidylglycerol molecules to form cardiolipin (CL) and glycerol. The monomer of bacterial CL synthase consists of two catalytic domains. Each catalytic domain contains one copy of conserved HKD motifs (H-X-K-X(4)-D, X represents any amino acid residue) that are the characteristic of the phospholipase D (PLD) superfamily. Two HKD motifs from two domains together form a single active site involving in phosphatidyl group transfer. Bacterial CL synthases can be stimulated by phosphate and inhibited by CL, the product of the reaction, and by phosphatidate. Phosphate stimulation may be unique to enzymes with CL synthase activity in PLD superfamily. Like other PLD enzymes, bacterial CL synthase utilize a common two-step ping-pong catalytic mechanism involving an enzyme-substrate intermediate to cleave phosphodiester bonds. The two histidine residues from the two HKD motifs play key roles in the catalysis. Upon substrate binding, a histidine residue from one HKD motif could function as the nucleophile attacking the phosphodiester bond to create a covalent phosphohistidine intermediate, while the other histidine residue from the second HKD motif could serve as a general acid stabilizing the leaving group. — an NCBI CDD conserved domain (cd09112); members share this curated model.
