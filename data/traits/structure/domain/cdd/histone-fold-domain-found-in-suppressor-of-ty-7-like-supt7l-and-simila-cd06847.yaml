identifier: CDD:cd06847
label: "histone-fold domain found in Suppressor of Ty 7-like (SUPT7L) and similar proteins. SUPT7L, also called STAGA complex 65 subunit gamma, adenocarcinoma antigen ART1, SPTF-associated factor 65 gamma, or STAF65gamma, is the ortholog of yeast SPT7 in mammalian cells. It is highly similar to yeast SPT7 but lacks the N-terminal SPT7 bromodomain. SUPT7L is a protein component specific to STAGA (SPT3-TAF9-GCN5 Acetyltransferase)-type complexes. It plays an essential role for the integrity of the STAGA complex."
definition: >-
