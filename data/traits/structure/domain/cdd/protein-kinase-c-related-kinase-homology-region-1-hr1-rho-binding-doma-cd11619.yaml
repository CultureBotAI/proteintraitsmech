identifier: CDD:cd11619
label: "Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Cdc42-Interacting Protein 4 and similar proteins. This subfamily is composed of Cdc42-Interacting Protein 4 (CIP4), Formin Binding Protein 17 (FBP17), FormiN Binding Protein 1-Like (FNBP1L), and similar proteins. CIP4 and FNBP1L are Cdc42 effectors that bind Wiskott-Aldrich syndrome protein (WASP) and function in endocytosis. CIP4 and FBP17 bind to the Fas ligand and may be implicated in the inflammatory response. CIP4 may also play a role in phagocytosis. It functions downstream of Cdc42 in PDGF-dependent actin reorganization and cell migration, and also regulates the activity of PDGFRbeta. It uses Src as a substrate in regulating the invasiveness of breast tumor cells. CIP4 may also play a role in the pathogenesis of Huntington's disease. Members of this subfamily typically contain an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain, central HR1 domain, and a C-terminal SH3 domain. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; the HR1 domain of CIP4 binds Cdc42 and TC10. Translocation of CIP4 is facilitated by its binding to TC10 at the plasma membrane."
definition: >-
  Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Cdc42-Interacting Protein 4 and similar proteins. This subfamily is composed of Cdc42-Interacting Protein 4 (CIP4), Formin Binding Protein 17 (FBP17), FormiN Binding Protein 1-Like (FNBP1L), and similar proteins. CIP4 and FNBP1L are Cdc42 effectors that bind Wiskott-Aldrich syndrome protein (WASP) and function in endocytosis. CIP4 and FBP17 bind to the Fas ligand and may be implicated in the inflammatory response. CIP4 may also play a role in phagocytosis. It functions downstream of Cdc42 in PDGF-dependent actin reorganization and cell migration, and also regulates the activity of PDGFRbeta. It uses Src as a substrate in regulating the invasiveness of breast tumor cells. CIP4 may also play a role in the pathogenesis of Huntington's disease. Members of this subfamily typically contain an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain, central HR1 domain, and a C-terminal SH3 domain. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family; the HR1 domain of CIP4 binds Cdc42 and TC10. Translocation of CIP4 is facilitated by its binding to TC10 at the plasma membrane. — an NCBI CDD conserved domain (cd11619); members share this curated model.
