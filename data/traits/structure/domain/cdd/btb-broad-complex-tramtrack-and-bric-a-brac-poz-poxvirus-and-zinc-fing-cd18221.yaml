identifier: CDD:cd18221
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger protein 131 (ZNF131). ZNF131, also called zinc finger and BTB domain-containing protein 35 (ZBTB35), is a transcriptional activator implicated as a regulator of Kaiso-mediated biological processes. It regulates cell growth of developing and mature T cells. It inhibits estrogen signaling by suppressing estrogen receptor alpha homo-dimerization, and plays a role in breast cancer cell proliferation. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger protein 131 (ZNF131). ZNF131, also called zinc finger and BTB domain-containing protein 35 (ZBTB35), is a transcriptional activator implicated as a regulator of Kaiso-mediated biological processes. It regulates cell growth of developing and mature T cells. It inhibits estrogen signaling by suppressing estrogen receptor alpha homo-dimerization, and plays a role in breast cancer cell proliferation. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18221); members share this curated model.
