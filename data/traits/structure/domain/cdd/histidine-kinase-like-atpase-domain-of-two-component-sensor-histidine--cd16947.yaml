identifier: CDD:cd16947
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Bacillus subtilis YcbM. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Bacillus subtilis YcbM, a HK of the two-component system YcbM-YcbL. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA)."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Bacillus subtilis YcbM. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Bacillus subtilis YcbM, a HK of the two-component system YcbM-YcbL. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA). — an NCBI CDD conserved domain (cd16947); members share this curated model.
