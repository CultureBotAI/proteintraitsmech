identifier: CDD:cd04631
label: "CBS pair domains found in archeal 5'-AMP-activated protein kinase gamma subunit-like proteins. Archeal gamma-subunit of 5'-AMP-activated protein kinase (AMPK) contains four CBS domains in tandem repeats, similar to eukaryotic homologs. AMPK is an important regulator of metabolism and of energy homeostasis. It is a heterotrimeric protein composed of a catalytic serine/threonine kinase subunit (alpha) and two regulatory subunits (beta and gamma). The gamma subunit senses the intracellular energy status by competitively binding AMP and ATP and is believed to be responsible for allosteric regulation of the whole complex. In humans mutations in gamma- subunit of AMPK are associated with hypertrophic cardiomiopathy, Wolff-Parkinson-White syndrome and glycogen storage in the skeletal muscle. The CBS domain, named after human CBS, is a small domain originally identified in cystathionine beta-synthase and is subsequently found in a wide range of different proteins. CBS domains usually occur in tandem repeats. They associate to form a so-called Bateman domain or a CBS pair based on crystallographic studies in bacteria.  The CBS pair was used as a basis for this cd hierarchy since the human CBS proteins can adopt the typical core structure and form an intramolecular CBS pair.  The interface between the two CBS domains forms a cleft that is a potential ligand binding site. The CBS pair coexists with a variety of other functional domains and this has been used to help in its classification here."
definition: >-
  CBS pair domains found in archeal 5'-AMP-activated protein kinase gamma subunit-like proteins. Archeal gamma-subunit of 5'-AMP-activated protein kinase (AMPK) contains four CBS domains in tandem repeats, similar to eukaryotic homologs. AMPK is an important regulator of metabolism and of energy homeostasis. It is a heterotrimeric protein composed of a catalytic serine/threonine kinase subunit (alpha) and two regulatory subunits (beta and gamma). The gamma subunit senses the intracellular energy status by competitively binding AMP and ATP and is believed to be responsible for allosteric regulation of the whole complex. In humans mutations in gamma- subunit of AMPK are associated with hypertrophic cardiomiopathy, Wolff-Parkinson-White syndrome and glycogen storage in the skeletal muscle. The CBS domain, named after human CBS, is a small domain originally identified in cystathionine beta-synthase and is subsequently found in a wide range of different proteins. CBS domains usually occur in tandem repeats. They associate to form a so-called Bateman domain or a CBS pair based on crystallographic studies in bacteria. The CBS pair was used as a basis for this cd hierarchy since the human CBS proteins can adopt the typical core structure and form an intramolecular CBS pair. The interface between the two CBS domains forms a cleft that is a potential ligand binding site. The CBS pair coexists with a variety of other functional domains and this has been used to help in its classification here. — an NCBI CDD conserved domain (cd04631); members share this curated model.
