identifier: CDD:cd20574
label: "first cyclin box found in G1/S-specific cyclin-D2 (CCND2). CCND2 is a regulatory component of the cyclin D2-CDK4 (DC) complex that phosphorylates and inhibits members of the retinoblastoma (RB) protein family, including RB1, and regulates the cell-cycle during G(1)/S transition. It is a critical mediator of exercise-induced cardiac hypertrophy. It also acts as a regulator of cell cycle proteins affecting SAMHD1-mediated HIV-1 restriction in non-proliferating macrophages. CCND2 contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain."
definition: >-
  first cyclin box found in G1/S-specific cyclin-D2 (CCND2). CCND2 is a regulatory component of the cyclin D2-CDK4 (DC) complex that phosphorylates and inhibits members of the retinoblastoma (RB) protein family, including RB1, and regulates the cell-cycle during G(1)/S transition. It is a critical mediator of exercise-induced cardiac hypertrophy. It also acts as a regulator of cell cycle proteins affecting SAMHD1-mediated HIV-1 restriction in non-proliferating macrophages. CCND2 contains two cyclin boxes. This model corresponds to the first one. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20574); members share this curated model.
