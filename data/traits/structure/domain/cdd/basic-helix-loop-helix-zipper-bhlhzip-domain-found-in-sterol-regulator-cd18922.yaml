identifier: CDD:cd18922
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in sterol regulatory element-binding protein 2 (SREBP2) and similar proteins. SREBP2, also termed Class D basic helix-loop-helix protein 2 (bHLHd2), or sterol regulatory element-binding transcription factor 2 (SREBF2), is a member of a family of bHLHzip transcription factors that recognize sterol regulatory element 1 (SRE-1). It acts as a transcription activator of cholesterol biosynthesis."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in sterol regulatory element-binding protein 2 (SREBP2) and similar proteins. SREBP2, also termed Class D basic helix-loop-helix protein 2 (bHLHd2), or sterol regulatory element-binding transcription factor 2 (SREBF2), is a member of a family of bHLHzip transcription factors that recognize sterol regulatory element 1 (SRE-1). It acts as a transcription activator of cholesterol biosynthesis. — an NCBI CDD conserved domain (cd18922); members share this curated model.
