identifier: CDD:cd17555
label: "phosphoacceptor receiver (REC) domain of Pseudomonas aeruginosa RssB and similar domains. Pseudomonas aeruginosa RssB is an orphan atypical response regulator containing a REC domain and a PP2C-type protein phosphatase output domain. Its function is still unknown. Escherichia RssB, which is not included in this subfamily, is a ClpX adaptor protein which alters ClpX specificity by mediating a specific interaction between ClpX and the substrates such as RpoS, an RNA polymerase sigma factor. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of Pseudomonas aeruginosa RssB and similar domains. Pseudomonas aeruginosa RssB is an orphan atypical response regulator containing a REC domain and a PP2C-type protein phosphatase output domain. Its function is still unknown. Escherichia RssB, which is not included in this subfamily, is a ClpX adaptor protein which alters ClpX specificity by mediating a specific interaction between ClpX and the substrates such as RpoS, an RNA polymerase sigma factor. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17555); members share this curated model.
