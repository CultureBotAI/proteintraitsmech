identifier: CDD:cd17546
label: "phosphoacceptor receiver (REC) domain of hybrid sensor histidine kinases/response regulators similar to Arabidopsis thaliana CKI1 and Escherichia coli RcsC. This family is composed of hybrid sensor histidine kinases/response regulators that are sensor histidine kinases (HKs) fused with a REC domain, similar to the sensor histidine kinase CKI1 from Arabidopsis thaliana, which is involved in multi-step phosphorelay (MSP) signaling that mediates responses to a variety of important stimuli in plants. MSP involves a signal being transferred from HKs via histidine phosphotransfer proteins (AHP1-AHP5) to nuclear response regulators. The CKI1 REC domain specifically interacts with the downstream signaling protein AHP2, AHP3 and AHP5. The plant MSP system has evolved from the prokaryotic two-component system (TCS), which allows organisms to sense and respond to changes in environmental conditions. This family also includes bacterial hybrid sensor HKs such as Escherichia coli RcsC, which is a component of the Rcs signalling pathway that controls a variety of physiological functions like capsule synthesis, cell division, and motility. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of hybrid sensor histidine kinases/response regulators similar to Arabidopsis thaliana CKI1 and Escherichia coli RcsC. This family is composed of hybrid sensor histidine kinases/response regulators that are sensor histidine kinases (HKs) fused with a REC domain, similar to the sensor histidine kinase CKI1 from Arabidopsis thaliana, which is involved in multi-step phosphorelay (MSP) signaling that mediates responses to a variety of important stimuli in plants. MSP involves a signal being transferred from HKs via histidine phosphotransfer proteins (AHP1-AHP5) to nuclear response regulators. The CKI1 REC domain specifically interacts with the downstream signaling protein AHP2, AHP3 and AHP5. The plant MSP system has evolved from the prokaryotic two-component system (TCS), which allows organisms to sense and respond to changes in environmental conditions. This family also includes bacterial hybrid sensor HKs such as Escherichia coli RcsC, which is a component of the Rcs signalling pathway that controls a variety of physiological functions like capsule synthesis, cell division, and motility. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17546); members share this curated model.
