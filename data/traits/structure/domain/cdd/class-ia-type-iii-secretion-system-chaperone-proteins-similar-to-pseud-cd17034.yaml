identifier: CDD:cd17034
label: "Class IA type III secretion system chaperone proteins, similar to Pseudomonas syringae ShcO1, ShcS1, and ShcS2. This family includes type III secretion system (T3SS) chaperone proteins similar to Pseudomonas syringae ShcO1 and similar proteins. In P. syringae, which is a plant pathogen that can infect a wide range of species, the T3SS allows injection of effector Hrp-dependent outer proteins (HOPs) HopO1-1, HopS1, and HopS2. Three homologous chaperones ShcO1, ShcS1, and ShcS2 facilitate the translocation of their cognate effectors HopO1-1, HopS1, and HopS2, respectively. Interestingly, ShcS1 and ShcS2 are capable of substituting for ShcO1 in facilitating HopO1-1 secretion and translocation. ShcS1 and ShcO1 are exceptional class IA T3SS chaperones because they can bind more than one target effector."
definition: >-
  Class IA type III secretion system chaperone proteins, similar to Pseudomonas syringae ShcO1, ShcS1, and ShcS2. This family includes type III secretion system (T3SS) chaperone proteins similar to Pseudomonas syringae ShcO1 and similar proteins. In P. syringae, which is a plant pathogen that can infect a wide range of species, the T3SS allows injection of effector Hrp-dependent outer proteins (HOPs) HopO1-1, HopS1, and HopS2. Three homologous chaperones ShcO1, ShcS1, and ShcS2 facilitate the translocation of their cognate effectors HopO1-1, HopS1, and HopS2, respectively. Interestingly, ShcS1 and ShcS2 are capable of substituting for ShcO1 in facilitating HopO1-1 secretion and translocation. ShcS1 and ShcO1 are exceptional class IA T3SS chaperones because they can bind more than one target effector. — an NCBI CDD conserved domain (cd17034); members share this curated model.
