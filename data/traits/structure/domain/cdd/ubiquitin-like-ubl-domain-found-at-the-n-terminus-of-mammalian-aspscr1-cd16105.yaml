identifier: CDD:cd16105
label: "Ubiquitin-like (Ubl) domain found at the N-terminus of mammalian ASPSCR1 (alveolar soft part sarcoma chromosomal region candidate gene 1 protein), Saccharomyces cerevisie Ubx4p, and similar proteins. ASPSCR1 (alveolar soft part sarcoma chromosomal region candidate gene 1 protein) is also known as alveolar soft part sarcoma locus protein (ASPL), tether containing UBX domain for GLUT4, TUG, UBX domain protein 9, UBXD9, UBXN9 or renal papillary cell carcinoma protein 17 (RCC17). The majority of members of this family contain two beta-grasp ubiquitin-like fold domains: the N-terminal UBL domain (described in this CD), and a C-terminal UBX domain. This UBL domain lacks the characteristic C-terminal double glycine motif. ASPSCR1 functions as a cofactor of the hexameric AAA (ATPase associated with various activities) ATPase complex, known as p97 or VCP in mammals and Cdc48p in yeast. In mammalian cells, ASPSCR1 is involved in insulin-stimulated redistribution of the glucose transporter GLUT4 and assembly of the Golgi apparatus; ASPSCR1 also plays a role in controlling vesicle translocation by interacting with insulin-regulated aminopeptidase (IRAP), a transmembrane aminopeptidase. Ubx4p and ASPSCR1 have only partially overlapping functions: both interact with p97/Cdc48p; however, Ubx4p is important for the ERAD (endoplasmic reticulum-associated protein degradation) pathway while ASPSCR1 appears not to be."
definition: >-
  Ubiquitin-like (Ubl) domain found at the N-terminus of mammalian ASPSCR1 (alveolar soft part sarcoma chromosomal region candidate gene 1 protein), Saccharomyces cerevisie Ubx4p, and similar proteins. ASPSCR1 (alveolar soft part sarcoma chromosomal region candidate gene 1 protein) is also known as alveolar soft part sarcoma locus protein (ASPL), tether containing UBX domain for GLUT4, TUG, UBX domain protein 9, UBXD9, UBXN9 or renal papillary cell carcinoma protein 17 (RCC17). The majority of members of this family contain two beta-grasp ubiquitin-like fold domains: the N-terminal UBL domain (described in this CD), and a C-terminal UBX domain. This UBL domain lacks the characteristic C-terminal double glycine motif. ASPSCR1 functions as a cofactor of the hexameric AAA (ATPase associated with various activities) ATPase complex, known as p97 or VCP in mammals and Cdc48p in yeast. In mammalian cells, ASPSCR1 is involved in insulin-stimulated redistribution of the glucose transporter GLUT4 and assembly of the Golgi apparatus; ASPSCR1 also plays a role in controlling vesicle translocation by interacting with insulin-regulated aminopeptidase (IRAP), a transmembrane aminopeptidase. Ubx4p and ASPSCR1 have only partially overlapping functions: both interact with p97/Cdc48p; however, Ubx4p is important for the ERAD (endoplasmic reticulum-associated protein degradation) pathway while ASPSCR1 appears not to be. — an NCBI CDD conserved domain (cd16105); members share this curated model.
