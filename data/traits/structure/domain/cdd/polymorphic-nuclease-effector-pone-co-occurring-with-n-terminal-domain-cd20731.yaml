identifier: CDD:cd20731
label: "Polymorphic Nuclease effector (PoNe) co-occurring with N-terminal domains such as filamentous hemagglutinin repeats or TANFOR. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains members with PoNe domains typically co-occuring with N-terminal domains such as hemagglutinin repeats and/or hemagglutination activity domains, or a TANFOR domain, which contains uncharacterized single or repeat domains that co-occur with fibronectin type III domains."
definition: >-
  Polymorphic Nuclease effector (PoNe) co-occurring with N-terminal domains such as filamentous hemagglutinin repeats or TANFOR. The DNase toxin domain called PoNe (Polymorphic Nuclease effector) belongs to a diverse superfamily of PD-(D/E)xK phosphodiesterases, and is associated with several toxin delivery systems including type V, type VI, and type VII. PoNe toxicity is antagonized by cognate immunity proteins (PoNi) containing DUF1911 and DUF1910 domains. This subfamily contains members with PoNe domains typically co-occuring with N-terminal domains such as hemagglutinin repeats and/or hemagglutination activity domains, or a TANFOR domain, which contains uncharacterized single or repeat domains that co-occur with fibronectin type III domains. — an NCBI CDD conserved domain (cd20731); members share this curated model.
