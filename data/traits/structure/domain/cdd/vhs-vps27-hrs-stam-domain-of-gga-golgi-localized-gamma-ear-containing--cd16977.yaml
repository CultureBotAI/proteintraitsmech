identifier: CDD:cd16977
label: "VHS (Vps27/Hrs/STAM) domain of GGA (Golgi-localized, Gamma-ear-containing, Arf-binding) subfamily. GGA (Golgi-localized, Gamma-ear-containing, Arf-binding) comprises a subfamily of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins involved in membrane trafficking between the Trans-Golgi Network (TGN) and endosomes. The VHS domain has a superhelical structure similar to the structure of the ARM (Armadillo) repeats and is present at the N-termini of proteins. GGA proteins have a multidomain structure consisting of an N-terminal VHS domain linked by a short proline-rich linker to a GAT (GGA and TOM) domain, which is followed by a long flexible linker to the C-terminal appendage, GAE (Gamma-Adaptin Ear) domain. The VHS domain of GGA proteins binds to the acidic-cluster dileucine (DxxLL) motif found on the cytoplasmic tails of cargo proteins trafficked between the Trans-Golgi Network and the endosomal system."
definition: >-
  VHS (Vps27/Hrs/STAM) domain of GGA (Golgi-localized, Gamma-ear-containing, Arf-binding) subfamily. GGA (Golgi-localized, Gamma-ear-containing, Arf-binding) comprises a subfamily of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins involved in membrane trafficking between the Trans-Golgi Network (TGN) and endosomes. The VHS domain has a superhelical structure similar to the structure of the ARM (Armadillo) repeats and is present at the N-termini of proteins. GGA proteins have a multidomain structure consisting of an N-terminal VHS domain linked by a short proline-rich linker to a GAT (GGA and TOM) domain, which is followed by a long flexible linker to the C-terminal appendage, GAE (Gamma-Adaptin Ear) domain. The VHS domain of GGA proteins binds to the acidic-cluster dileucine (DxxLL) motif found on the cytoplasmic tails of cargo proteins trafficked between the Trans-Golgi Network and the endosomal system. — an NCBI CDD conserved domain (cd16977); members share this curated model.
