identifier: CDD:cd17459
label: "Solute carrier organic anion transporter 1C subfamily of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 1C (SLCO1C), also called Organic anion-transporting polypeptide 1C (OATP1C), subfamily contains one mammalian member, OATP1C1 (encoded by SLCO1C1), which is also called thyroxine transporter. It mediates the high affinity transport of the thyroid hormones, T4 (3,5,3',5'tetraiodo-L-thyronine or thyroxine), rT3 (3,3'5'-triiodo-L-thyronine), and T3 (3,5,3'tri-iodo-L-thyronine or triiodothyronine), as well as organic anions such as 17-beta-glucuronosyl estradiol, estrone-3-sulfate, and sulfobromophthalein (BSP), which are transported with much lower efficiency. The SLCO1C/OATP1C subfamily belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier organic anion transporter 1C subfamily of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 1C (SLCO1C), also called Organic anion-transporting polypeptide 1C (OATP1C), subfamily contains one mammalian member, OATP1C1 (encoded by SLCO1C1), which is also called thyroxine transporter. It mediates the high affinity transport of the thyroid hormones, T4 (3,5,3',5'tetraiodo-L-thyronine or thyroxine), rT3 (3,3'5'-triiodo-L-thyronine), and T3 (3,5,3'tri-iodo-L-thyronine or triiodothyronine), as well as organic anions such as 17-beta-glucuronosyl estradiol, estrone-3-sulfate, and sulfobromophthalein (BSP), which are transported with much lower efficiency. The SLCO1C/OATP1C subfamily belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17459); members share this curated model.
