identifier: CDD:cd16053
label: "Tumor necrosis factor ligand superfamily member 9 (TNFSF9), also known as CD137L. This family contains TNFSF9 (also known as CD137L or 4-1BBL), a bidirectional signal transducer that acts as a ligand for TNFRSF9 (also known as CD137, ILA, 4-1BB), a potent costimulatory receptor molecule in T lymphocytes. TNFSF9/CD137L is expressed mainly in myeloid cells (dendritic cells, mast cells, macrophages and eosinophils) and non-hematopoietic cells (endothelial cells, epithelial cells and fibroblasts). CD137L signaling mediates cellular functions that include cell differentiation, proliferation and survival, as well as production of inflammatory mediators in a variety of cells. It induces B cell proliferation and immunoglobulin production, particularly in dendritic cells (DCs) and monocytes/macrophages, and enhances the inflammatory response in an autocrine or paracrine manner. In non-hematopoietic cells, CD137L signaling is essential for tissue inflammation; epithelial cells are most commonly damaged by intracellular and extracellular insults, thus initiating inflammation. CD137L signals are also required to recruit neutrophils in renal ischemia-reperfusion injury. Both, CD137 and CD137L are expressed in the endothelial cells of vessels in atherosclerotic lesions. Deficient CD137L signaling induces myelopoiesis and promotes B-cell differentiation in the bone marrow. CD137L has been shown to be expressed in neoplastic cells in most B-cell lymphomas and in primary and secondary lymphoid follicles. Induction of CD137L signaling can be utilized therapeutically to reinitiate myeloid differentiation in acute myeloid leukemia cells, and to generate potent DC for immunotherapy."
definition: >-
  Tumor necrosis factor ligand superfamily member 9 (TNFSF9), also known as CD137L. This family contains TNFSF9 (also known as CD137L or 4-1BBL), a bidirectional signal transducer that acts as a ligand for TNFRSF9 (also known as CD137, ILA, 4-1BB), a potent costimulatory receptor molecule in T lymphocytes. TNFSF9/CD137L is expressed mainly in myeloid cells (dendritic cells, mast cells, macrophages and eosinophils) and non-hematopoietic cells (endothelial cells, epithelial cells and fibroblasts). CD137L signaling mediates cellular functions that include cell differentiation, proliferation and survival, as well as production of inflammatory mediators in a variety of cells. It induces B cell proliferation and immunoglobulin production, particularly in dendritic cells (DCs) and monocytes/macrophages, and enhances the inflammatory response in an autocrine or paracrine manner. In non-hematopoietic cells, CD137L signaling is essential for tissue inflammation; epithelial cells are most commonly damaged by intracellular and extracellular insults, thus initiating inflammation. CD137L signals are also required to recruit neutrophils in renal ischemia-reperfusion injury. Both, CD137 and CD137L are expressed in the endothelial cells of vessels in atherosclerotic lesions. Deficient CD137L signaling induces myelopoiesis and promotes B-cell differentiation in the bone marrow. CD137L has been shown to be expressed in neoplastic cells in most B-cell lymphomas and in primary and secondary lymphoid follicles. Induction of CD137L signaling can be utilized therapeutically to reinitiate myeloid differentiation in acute myeloid leukemia cells, and to generate potent DC for immunotherapy. — an NCBI CDD conserved domain (cd16053); members share this curated model.
