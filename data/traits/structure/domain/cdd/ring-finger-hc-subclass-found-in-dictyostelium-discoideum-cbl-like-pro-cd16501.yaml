identifier: CDD:cd16501
label: "RING finger, HC subclass, found in Dictyostelium discoideum Cbl-like protein A (CblA) and similar proteins. CblA is a Dictyostelium homolog of the Cbl proteins which are multi-domain proteins acting as  key negative regulators of various receptor and non-receptor tyrosine kinase signaling. CblA upregulates STATc tyrosine phosphorylation by downregulating PTP3, the protein tyrosine phosphatase responsible for dephosphorylating STATc. STATc is a signal transducer and activator of transcription protein. Like other Cbl proteins, CblA contains a tyrosine-kinase-binding domain (TKB), a proline-rich domain, a C3HC4-type RING-HC finger, and an ubiquitin-associated (UBA) domain. TKB, also known as a phosphotyrosine binding PTB domain, is composed of a four helix-bundle, a Ca2+ binding EF-hand and a highly variant SH2 domain. This family also includes Drosophila melanogaster defense repressor 1 (Dnr1) that was identified as an inhibitor of Dredd activity in the absence of a microbial insult in Drosophila S2 cells. It inhibits the Drosophila initiator caspases Dredd and Dronc. Moreover, Dnr1 acts as a negative regulator of the Imd (immune deficiency) innate immune-response pathway. Its mutations cause neurodegeneration in Drosophila by activating the innate immune response in the brain. Dnr1 contains a FERM N-terminal domain followed by a region rich in glutamine and serine residues, a central FERM domain, and a C-terminal C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Dictyostelium discoideum Cbl-like protein A (CblA) and similar proteins. CblA is a Dictyostelium homolog of the Cbl proteins which are multi-domain proteins acting as key negative regulators of various receptor and non-receptor tyrosine kinase signaling. CblA upregulates STATc tyrosine phosphorylation by downregulating PTP3, the protein tyrosine phosphatase responsible for dephosphorylating STATc. STATc is a signal transducer and activator of transcription protein. Like other Cbl proteins, CblA contains a tyrosine-kinase-binding domain (TKB), a proline-rich domain, a C3HC4-type RING-HC finger, and an ubiquitin-associated (UBA) domain. TKB, also known as a phosphotyrosine binding PTB domain, is composed of a four helix-bundle, a Ca2+ binding EF-hand and a highly variant SH2 domain. This family also includes Drosophila melanogaster defense repressor 1 (Dnr1) that was identified as an inhibitor of Dredd activity in the absence of a microbial insult in Drosophila S2 cells. It inhibits the Drosophila initiator caspases Dredd and Dronc. Moreover, Dnr1 acts as a negative regulator of the Imd (immune deficiency) innate immune-response pathway. Its mutations cause neurodegeneration in Drosophila by activating the innate immune response in the brain. Dnr1 contains a FERM N-terminal domain followed by a region rich in glutamine and serine residues, a central FERM domain, and a C-terminal C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16501); members share this curated model.
