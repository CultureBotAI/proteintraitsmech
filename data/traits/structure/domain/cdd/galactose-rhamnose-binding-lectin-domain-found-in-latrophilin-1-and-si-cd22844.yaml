identifier: CDD:cd22844
label: "galactose/rhamnose binding lectin domain found in latrophilin-1 and similar proteins. Latrophilin-1 (LPHN1), also called adhesion G protein-coupled receptor L1 (ADGRL1), or calcium-independent alpha-latrotoxin receptor 1 (CIRL-1), or lectomedin-2, is a brain-specific calcium-independent receptor that mediates the effect of alpha-latrotoxin, a potent presynaptic neurotoxin from the venom of the black widow spider that induces massive neurotransmitter release from sensory and motor neurons as well as endocrine cells, leading to nerve-terminal degeneration. This model corresponds to a galactose/rhamnose-binding lectin domain found at the N-terminus of LPHN1."
definition: >-
  galactose/rhamnose binding lectin domain found in latrophilin-1 and similar proteins. Latrophilin-1 (LPHN1), also called adhesion G protein-coupled receptor L1 (ADGRL1), or calcium-independent alpha-latrotoxin receptor 1 (CIRL-1), or lectomedin-2, is a brain-specific calcium-independent receptor that mediates the effect of alpha-latrotoxin, a potent presynaptic neurotoxin from the venom of the black widow spider that induces massive neurotransmitter release from sensory and motor neurons as well as endocrine cells, leading to nerve-terminal degeneration. This model corresponds to a galactose/rhamnose-binding lectin domain found at the N-terminus of LPHN1. — an NCBI CDD conserved domain (cd22844); members share this curated model.
