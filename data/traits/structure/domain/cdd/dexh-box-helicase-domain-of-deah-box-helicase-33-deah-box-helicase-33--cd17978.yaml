identifier: CDD:cd17978
label: "DEXH-box helicase domain of DEAH-box helicase 33. DEAH-box helicase 33 (DHX33) stimulates RNA polymerase I transcription of the 47S precursor rRNA. DHX33 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 33. DEAH-box helicase 33 (DHX33) stimulates RNA polymerase I transcription of the 47S precursor rRNA. DHX33 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17978); members share this curated model.
