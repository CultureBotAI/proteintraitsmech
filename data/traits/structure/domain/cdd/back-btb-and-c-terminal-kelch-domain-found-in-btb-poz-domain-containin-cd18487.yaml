identifier: CDD:cd18487
label: "BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing proteins, BTBD1 and BTBD2. This subfamily includes BTB/POZ domain-containing proteins BTBD1 and BTBD2, both of which are BTB-domain-containing Kelch-like proteins that interact with DNA topoisomerase 1 (Topo1), a key enzyme in cell survival. BTBD1 and BTBD2 colocalize to cytoplasmic bodies with the RBCC/tripartite motif protein, TRIM5delta."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in BTB/POZ domain-containing proteins, BTBD1 and BTBD2. This subfamily includes BTB/POZ domain-containing proteins BTBD1 and BTBD2, both of which are BTB-domain-containing Kelch-like proteins that interact with DNA topoisomerase 1 (Topo1), a key enzyme in cell survival. BTBD1 and BTBD2 colocalize to cytoplasmic bodies with the RBCC/tripartite motif protein, TRIM5delta. — an NCBI CDD conserved domain (cd18487); members share this curated model.
