identifier: CDD:cd22310
label: "Restriction endonuclease BcnI and similar endonucleases. Restriction endonuclease BcnI cleaves duplex DNA containing the sequence 5'-CC|SGG-3' (S stands for C or G, | designates a cleavage position) to generate staggered products with single nucleotide 5'-overhangs. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease BcnI and similar endonucleases. Restriction endonuclease BcnI cleaves duplex DNA containing the sequence 5'-CC|SGG-3' (S stands for C or G, | designates a cleavage position) to generate staggered products with single nucleotide 5'-overhangs. It belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22310); members share this curated model.
