identifier: CDD:cd10440
label: "GIY-YIG domain of uncharacterized proteins from bacteria and their eukaryotic homologs. This family includes a group of functionally uncharacterized proteins from bacteria and their eukaryotic homologs which are present only in metazoa. These proteins might have nuclease activities and possibly be engaged in DNA repair or recombination, since they share sequence homology with the catalytic GIY-YIG domain of bacterial UvrC DNA repair proteins. Distinct from their prokaryotic relatives, the eukaryotic homologs contain an N-terminal extension that includes the region of approximately 3-4 ankyrin repeats, unique motifs mediating protein-protein interactions. Some of eukaryotic homologs do have an additional LEM domain located between ankyrin repeats region and GIY-YIG domain. The LEM domain, found in inner nuclear membrane proteins, may be involved in protein- or DNA-binding. The different domain composition of the eukaryotic homologs suggests that  they might participate in interactions with multiple partners and implies  important cellular function."
definition: >-
  GIY-YIG domain of uncharacterized proteins from bacteria and their eukaryotic homologs. This family includes a group of functionally uncharacterized proteins from bacteria and their eukaryotic homologs which are present only in metazoa. These proteins might have nuclease activities and possibly be engaged in DNA repair or recombination, since they share sequence homology with the catalytic GIY-YIG domain of bacterial UvrC DNA repair proteins. Distinct from their prokaryotic relatives, the eukaryotic homologs contain an N-terminal extension that includes the region of approximately 3-4 ankyrin repeats, unique motifs mediating protein-protein interactions. Some of eukaryotic homologs do have an additional LEM domain located between ankyrin repeats region and GIY-YIG domain. The LEM domain, found in inner nuclear membrane proteins, may be involved in protein- or DNA-binding. The different domain composition of the eukaryotic homologs suggests that they might participate in interactions with multiple partners and implies important cellular function. — an NCBI CDD conserved domain (cd10440); members share this curated model.
