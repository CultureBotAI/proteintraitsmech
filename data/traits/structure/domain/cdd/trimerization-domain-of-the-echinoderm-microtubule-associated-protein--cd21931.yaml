identifier: CDD:cd21931
label: "trimerization domain of the echinoderm microtubule-associated protein-like family. The echinoderm microtubule-associated protein (EMAP)-like (EML) family includes EMAP-1, EMAP-2, EMAP-3, and EMAP-4. EMAP-1, also called EMAL1, EMAPL or EMAPL1, modulates the assembly and organization of the microtubule cytoskeleton, and probably plays a role in regulating the orientation of the mitotic spindle and the orientation of the plane of cell division. It is required for normal proliferation of neuronal progenitor cells in the developing brain and for normal brain development. EMAP-2, also called EML2 or EMAPL2, is a tubulin binding protein that inhibits microtubule nucleation and growth, resulting in shorter microtubules. EMAP-3, also called EML3, is a nuclear microtubule-binding protein required for the correct alignment of chromosomes in metaphase. EMAP-4, also called EML4, EMAPL4, restrictedly overexpressed proliferation-associated protein, or Ropp 120, may modify the assembly dynamics of microtubules, such that microtubules are slightly longer, but more dynamic. This model corresponds to a conserved trimerization domain located at the N-terminus of EML family members."
definition: >-
  trimerization domain of the echinoderm microtubule-associated protein-like family. The echinoderm microtubule-associated protein (EMAP)-like (EML) family includes EMAP-1, EMAP-2, EMAP-3, and EMAP-4. EMAP-1, also called EMAL1, EMAPL or EMAPL1, modulates the assembly and organization of the microtubule cytoskeleton, and probably plays a role in regulating the orientation of the mitotic spindle and the orientation of the plane of cell division. It is required for normal proliferation of neuronal progenitor cells in the developing brain and for normal brain development. EMAP-2, also called EML2 or EMAPL2, is a tubulin binding protein that inhibits microtubule nucleation and growth, resulting in shorter microtubules. EMAP-3, also called EML3, is a nuclear microtubule-binding protein required for the correct alignment of chromosomes in metaphase. EMAP-4, also called EML4, EMAPL4, restrictedly overexpressed proliferation-associated protein, or Ropp 120, may modify the assembly dynamics of microtubules, such that microtubules are slightly longer, but more dynamic. This model corresponds to a conserved trimerization domain located at the N-terminus of EML family members. — an NCBI CDD conserved domain (cd21931); members share this curated model.
