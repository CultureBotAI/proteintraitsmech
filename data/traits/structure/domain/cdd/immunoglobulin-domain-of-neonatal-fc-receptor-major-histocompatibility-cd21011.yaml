identifier: CDD:cd21011
label: "immunoglobulin domain of neonatal Fc receptor, major histocompatibility complex (MHC)-like; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the immunoglobulin domain of neonatal Fc receptor (FcRn). FcRn performs two distinct functions: the transport of maternal immunoglobulin G (IgG) to pre- or neonatal mammals which provides passive immunity and protection of IgG from normal serum protein catabolism. FcRn is related to class I MHC proteins, but lacks a functional peptide binding groove. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3). Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading.  Class I MHC molecules are expressed on most nucleated cells."
definition: >-
  immunoglobulin domain of neonatal Fc receptor, major histocompatibility complex (MHC)-like; member of the C1-set of Ig superfamily (IgSF) domains. The members here are composed of the immunoglobulin domain of neonatal Fc receptor (FcRn). FcRn performs two distinct functions: the transport of maternal immunoglobulin G (IgG) to pre- or neonatal mammals which provides passive immunity and protection of IgG from normal serum protein catabolism. FcRn is related to class I MHC proteins, but lacks a functional peptide binding groove. Class I MHC proteins bind antigenic peptide fragments and present them to CD8+ T lymphocytes. Class I molecules consist of a transmembrane alpha chain and a small chain called the beta-2-microglobulin. The alpha chain contains three extracellular domains, two of which fold together to form the peptide-binding cleft (alpha1 and alpha2), and one which has an Ig fold (alpha3). Peptide binding to class I molecules occurs in the endoplasmic reticulum (ER) and involves both chaperones and dedicated factors to assist in peptide loading. Class I MHC molecules are expressed on most nucleated cells. — an NCBI CDD conserved domain (cd21011); members share this curated model.
