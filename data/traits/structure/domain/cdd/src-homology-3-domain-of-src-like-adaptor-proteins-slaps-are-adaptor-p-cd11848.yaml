identifier: CDD:cd11848
label: "Src homology 3 domain of Src-Like Adaptor Proteins. SLAPs are adaptor proteins with limited similarity to Src family tyrosine kinases. They contain an N-terminal SH3 domain followed by an SH2 domain, and a unique C-terminal sequence. They function in regulating the signaling, ubiquitination, and trafficking of T-cell receptor (TCR) and B-cell receptor (BCR) components. Vertebrates contain two SLAPs, named SLAP (or SLA1) and SLAP2 (or SLA2). SLAP has been shown to interact with the EphA receptor, EpoR, Lck, PDGFR, Syk, CD79a, among others, while SLAP2 interacts with CSF1R. Both SLAPs interact with c-Cbl, LAT, CD247, and Zap70. SLAP modulates TCR surface expression levels as well as surface and total BCR levels. As an adaptor to c-Cbl, SLAP increases the ubiquitination, intracellular retention, and targeted degradation of the BCR complex components. SLAP2 plays a role in c-Cbl-dependent regulation of CSF1R, a tyrosine kinase important for myeloid cell growth and differentiation. The SH3 domain of SLAP forms a complex with v-Abl. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Src-Like Adaptor Proteins. SLAPs are adaptor proteins with limited similarity to Src family tyrosine kinases. They contain an N-terminal SH3 domain followed by an SH2 domain, and a unique C-terminal sequence. They function in regulating the signaling, ubiquitination, and trafficking of T-cell receptor (TCR) and B-cell receptor (BCR) components. Vertebrates contain two SLAPs, named SLAP (or SLA1) and SLAP2 (or SLA2). SLAP has been shown to interact with the EphA receptor, EpoR, Lck, PDGFR, Syk, CD79a, among others, while SLAP2 interacts with CSF1R. Both SLAPs interact with c-Cbl, LAT, CD247, and Zap70. SLAP modulates TCR surface expression levels as well as surface and total BCR levels. As an adaptor to c-Cbl, SLAP increases the ubiquitination, intracellular retention, and targeted degradation of the BCR complex components. SLAP2 plays a role in c-Cbl-dependent regulation of CSF1R, a tyrosine kinase important for myeloid cell growth and differentiation. The SH3 domain of SLAP forms a complex with v-Abl. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11848); members share this curated model.
