identifier: CDD:cd19120
label: "Saccharomyces pombe NAD/NADP-dependent indole-3-acetaldehyde reductase, Candida parapsilosis NADPH-dependent conjugated polyketone reductase C2 (CPR), and similar proteins. Saccharomyces pombe NAD/NADP-dependent indole-3-acetaldehyde reductase (EC 1.1.1.190/EC 1.1.1.191) and Candida parapsilosis NADPH-dependent CPR (EC 1.1.1.358/EC 1.1.1.168) are founding members of aldo-keto reductase family 3 member C2 (AKR3C2) and C3 (AKR3C3), respectively. Saccharomyces pombe NAD/NADP-dependent indole-3-acetaldehyde reductase catalyzes the conversion from (Indol-3-yl)ethanol to (indol-3-yl)acetaldehyde in a NAD/NADP-dependent manner. CPR, also called 2-dehydropantolactone reductase, or 2-dehydropantolactone reductase (A-specific), or ketopantoyl-lactone reductase, acts as a NADPH-dependent conjugated polyketone reductase with broad substrate specificity and strict stereospecificity. It reduces ketopantoyl lactone and isatin."
definition: >-
  Saccharomyces pombe NAD/NADP-dependent indole-3-acetaldehyde reductase, Candida parapsilosis NADPH-dependent conjugated polyketone reductase C2 (CPR), and similar proteins. Saccharomyces pombe NAD/NADP-dependent indole-3-acetaldehyde reductase (EC 1.1.1.190/EC 1.1.1.191) and Candida parapsilosis NADPH-dependent CPR (EC 1.1.1.358/EC 1.1.1.168) are founding members of aldo-keto reductase family 3 member C2 (AKR3C2) and C3 (AKR3C3), respectively. Saccharomyces pombe NAD/NADP-dependent indole-3-acetaldehyde reductase catalyzes the conversion from (Indol-3-yl)ethanol to (indol-3-yl)acetaldehyde in a NAD/NADP-dependent manner. CPR, also called 2-dehydropantolactone reductase, or 2-dehydropantolactone reductase (A-specific), or ketopantoyl-lactone reductase, acts as a NADPH-dependent conjugated polyketone reductase with broad substrate specificity and strict stereospecificity. It reduces ketopantoyl lactone and isatin. — an NCBI CDD conserved domain (cd19120); members share this curated model.
