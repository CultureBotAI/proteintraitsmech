identifier: CDD:cd22135
label: "F-box domain found in F-box/WD repeat-containing protein 9 (FBXW9) and similar proteins. FBXW9, also called F-box and WD-40 domain-containing protein 9, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/WD repeat-containing protein 9 (FBXW9) and similar proteins. FBXW9, also called F-box and WD-40 domain-containing protein 9, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22135); members share this curated model.
