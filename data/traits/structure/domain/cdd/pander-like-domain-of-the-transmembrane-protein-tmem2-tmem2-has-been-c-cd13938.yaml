identifier: CDD:cd13938
label: "PANDER-like domain of the transmembrane protein TMEM2. TMEM2 has been characterized as a transmembrane protein that maps to the DFNB7-DFNB11 deafness locus on human chromosome 9. It contains a domain similar to the Pancreatic-derived factor PANDER, C-terminal to a glycine rich G8-domain. The function of the PANDER-like domain in TMEM2 has not been characterized."
definition: >-
  PANDER-like domain of the transmembrane protein TMEM2. TMEM2 has been characterized as a transmembrane protein that maps to the DFNB7-DFNB11 deafness locus on human chromosome 9. It contains a domain similar to the Pancreatic-derived factor PANDER, C-terminal to a glycine rich G8-domain. The function of the PANDER-like domain in TMEM2 has not been characterized. — an NCBI CDD conserved domain (cd13938); members share this curated model.
