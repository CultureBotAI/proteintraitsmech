identifier: CDD:cd21109
label: "Iron-sulfur cluster-binding SPASM domain. This iron-sulfur cluster-binding domain is named SPASM after the biochemically characterized members, AlbA, PqqE, anSME, and MftC, which are involved in Subtilosin A, Pyrroloquinoline quinone, Anaerobic Sulfatase, and Mycofactocin maturation, respectively. SPASM occurs as an additional C-terminal domain in many peptide-modifying enzymes of the radical S-adenosylmethionine (SAM) superfamily. Radical SAM enzymes are characterized by a conserved CxxxCxxC motif, which coordinates the conserved iron-sulfur cluster that is involved in the reductive cleavage of SAM and generates a 5'-deoxyadenosyl radical, which in turn abstracts a hydrogen from the appropriately positioned carbon atom of the substrate. Radical SAM enzymes with a C-terminal SPASM domain contain at least one other iron-sulfur cluster."
definition: >-
