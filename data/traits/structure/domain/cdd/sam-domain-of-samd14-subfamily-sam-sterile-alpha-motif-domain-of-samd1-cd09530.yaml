identifier: CDD:cd09530
label: "SAM domain of Samd14 subfamily. SAM (sterile alpha motif) domain of SamD14 (or FAM15A) subfamily is a putative protein-protein interaction domain. SAM is widespread domain in proteins involved in signal transduction and regulation. In many cases SAM mediates homodimerization/oligomerization. The exact function of proteins belonging to this subfamily is unknown."
definition: >-
  SAM domain of Samd14 subfamily. SAM (sterile alpha motif) domain of SamD14 (or FAM15A) subfamily is a putative protein-protein interaction domain. SAM is widespread domain in proteins involved in signal transduction and regulation. In many cases SAM mediates homodimerization/oligomerization. The exact function of proteins belonging to this subfamily is unknown. — an NCBI CDD conserved domain (cd09530); members share this curated model.
