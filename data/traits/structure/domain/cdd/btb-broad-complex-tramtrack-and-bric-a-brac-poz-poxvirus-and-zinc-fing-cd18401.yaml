identifier: CDD:cd18401
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in tumor necrosis factor, alpha-induced protein 1, endothelial (TNFAIP1). TNFAIP1, also called BTB/POZ domain-containing adapter for CUL3-mediated RhoA degradation protein 2 (BACURD2), or protein B12, is a BTB/POZ domain-containing protein that is involved in DNA replication, DNA damage repair and cell apoptosis, and is implicated in human diseases including cancer, Alzheimer's disease (AD) and type 2 diabetic nephropathy. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The BTB domains of other BACURD subfamily members, KCTD10 and KCTD13, form a novel two-fold symmetric tetramer that is distinct from the tetramer formed by voltage-gated potassium (Kv) channels."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in tumor necrosis factor, alpha-induced protein 1, endothelial (TNFAIP1). TNFAIP1, also called BTB/POZ domain-containing adapter for CUL3-mediated RhoA degradation protein 2 (BACURD2), or protein B12, is a BTB/POZ domain-containing protein that is involved in DNA replication, DNA damage repair and cell apoptosis, and is implicated in human diseases including cancer, Alzheimer's disease (AD) and type 2 diabetic nephropathy. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The BTB domains of other BACURD subfamily members, KCTD10 and KCTD13, form a novel two-fold symmetric tetramer that is distinct from the tetramer formed by voltage-gated potassium (Kv) channels. — an NCBI CDD conserved domain (cd18401); members share this curated model.
