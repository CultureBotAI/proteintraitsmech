identifier: CDD:cd21662
label: "BECV protein I and related Embecovirus proteins. This subfamily includes protein I (also known as accessory protein N2) from bovine enteritic coronavirus-F15 strain (BECV-F15) and related Embecoviruses (A lineage) including murine hepatitis virus. The gene encoding protein I is included in the N gene as an alternative ORF. Protein I appears to have no homologous proteins in Sarbecovirus lineage B, which includes Severe acute respiratory syndrome (SARS) coronavirus (SARS-CoV) and SARS-CoV-2 (2019 novel coronavirus, 2019-nCoV). There are five essential genes in CoVs that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and replicase/protease polyproteins (ORF1ab); all are required to produce a structurally complete viral particle. In addition, CoV genomes also contain ORFs coding for accessory proteins that are specific for certain CoV lineages or for a particular CoV. In general, CoV accessory proteins are considered dispensable for viral replication; however, several accessory proteins have been shown to exhibit functions in virus-host interactions during CoV infection. BECV-F15 protein I is not essential for viral replication. It is related to the ORF8b accessory protein of Middle East respiratory syndrome-related coronavirus (MERS-CoV) and other related merbecoviruses (C lineage); the gene encoding ORF8b is an internal ORF that is overlapped by the N (nucleocapsid) protein gene (ORF8a)."
definition: >-
  BECV protein I and related Embecovirus proteins. This subfamily includes protein I (also known as accessory protein N2) from bovine enteritic coronavirus-F15 strain (BECV-F15) and related Embecoviruses (A lineage) including murine hepatitis virus. The gene encoding protein I is included in the N gene as an alternative ORF. Protein I appears to have no homologous proteins in Sarbecovirus lineage B, which includes Severe acute respiratory syndrome (SARS) coronavirus (SARS-CoV) and SARS-CoV-2 (2019 novel coronavirus, 2019-nCoV). There are five essential genes in CoVs that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and replicase/protease polyproteins (ORF1ab); all are required to produce a structurally complete viral particle. In addition, CoV genomes also contain ORFs coding for accessory proteins that are specific for certain CoV lineages or for a particular CoV. In general, CoV accessory proteins are considered dispensable for viral replication; however, several accessory proteins have been shown to exhibit functions in virus-host interactions during CoV infection. BECV-F15 protein I is not essential for viral replication. It is related to the ORF8b accessory protein of Middle East respiratory syndrome-related coronavirus (MERS-CoV) and other related merbecoviruses (C lineage); the gene encoding ORF8b is an internal ORF that is overlapped by the N (nucleocapsid) protein gene (ORF8a). — an NCBI CDD conserved domain (cd21662); members share this curated model.
