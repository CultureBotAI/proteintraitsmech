identifier: CDD:cd16002
label: "neurokinin 1 receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The neurokinin 1 receptor (NK1R), also known as tachykinin receptor 1 (TACR1) or substance P receptor (SPR), is a G-protein coupled receptor found in the mammalian central nervous and peripheral nervous systems. The tachykinins act as excitatory transmitters on neurons and cells in the gastrointestinal tract. The TKs are characterized by a common five-amino acid C-terminal sequence, Phe-X-Gly-Leu-Met-NH2, where X is a hydrophobic residue. The three major mammalian tachykinins are substance P (SP), neurokinin A (NKA), and neurokinin B (NKB). The physiological actions of tachykinins are mediated through three types of receptors: neurokinin receptor type 1 (NK1R), NK2R, and NK3R.  SP is a high-affinity endogenous ligand for NK1R, which interacts with the Gq protein and activates phospholipase C, leading to elevation of intracellular calcium. SP is an extremely potent vasodilator through endothelium dependent mechanism and is released from the autonomic sensory nerves. NK2R is a high-affinity receptor for NKA, the tachykinin neuropeptide substance K. SP and NKA are found in the enteric nervous system and mediate in the regulation of gastrointestinal motility, secretion, vascular permeability, and pain perception."
