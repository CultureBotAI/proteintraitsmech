identifier: CDD:cd11715
label: "THUMP domain associated with S-adenosylmethionine-dependent methyltransferases. Proteins of this family contain an N-terminal THUMP domain and a C-terminal S-adenosylmethionine-dependent methyltransferase domain. Members have been implicated in the modification of 23S RNA m2G2445, a highly conserved modification in bacteria and in the m2G6 modification of tRNA.  The THUMP domain is named after thiouridine synthases, methylases and PSUSs. The domain consists of about 110 amino acid residues. It is predicted to be an RNA-binding domain and probably functions by delivering a variety of RNA modification enzymes to their targets."
definition: >-
  THUMP domain associated with S-adenosylmethionine-dependent methyltransferases. Proteins of this family contain an N-terminal THUMP domain and a C-terminal S-adenosylmethionine-dependent methyltransferase domain. Members have been implicated in the modification of 23S RNA m2G2445, a highly conserved modification in bacteria and in the m2G6 modification of tRNA. The THUMP domain is named after thiouridine synthases, methylases and PSUSs. The domain consists of about 110 amino acid residues. It is predicted to be an RNA-binding domain and probably functions by delivering a variety of RNA modification enzymes to their targets. — an NCBI CDD conserved domain (cd11715); members share this curated model.
