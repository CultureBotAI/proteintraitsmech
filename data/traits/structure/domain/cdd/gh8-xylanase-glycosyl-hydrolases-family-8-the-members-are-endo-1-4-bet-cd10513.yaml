identifier: CDD:cd10513
label: "GH8_xylanase. Glycosyl hydrolases family 8. The members are endo-1,4-beta-glucanases (cellulases). Family 8 glycosidases hydrolyze the glycosidic bond via a single displacement mechanism with inversion of the anomeric configuration. They cleave only saccharides with a degree of polymerization of at least 5 glucosyl residues."
definition: >-
  GH8_xylanase. Glycosyl hydrolases family 8. The members are endo-1,4-beta-glucanases (cellulases). Family 8 glycosidases hydrolyze the glycosidic bond via a single displacement mechanism with inversion of the anomeric configuration. They cleave only saccharides with a degree of polymerization of at least 5 glucosyl residues. — an NCBI CDD conserved domain (cd10513); members share this curated model.
