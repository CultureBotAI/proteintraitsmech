identifier: CDD:cd14542
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 22, type 18 and type 12. Tyrosine-protein phosphatase non-receptor type 22 (PTPN22), type 18 (PTPN18) and type 12 (PTPN12) belong to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN22 is expressed in hematopoietic cells and it functions as a key regulator of immune homeostasis by inhibiting T-cell receptor signaling through the direct dephosphorylation of Src family kinases (Lck and Fyn), ITAMs of the TCRz/CD3 complex, and other signaling molecules. TPN18 regulates HER2-mediated cellular functions through defining both its phosphorylation and ubiquitination states. PTPN12 is characterized as a tumor suppressor and a pivotal regulator of EGFR/HER2 signaling."
