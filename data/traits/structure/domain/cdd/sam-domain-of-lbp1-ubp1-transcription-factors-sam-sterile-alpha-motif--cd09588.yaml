identifier: CDD:cd09588
label: "SAM domain of LBP1 (UBP1) transcription factors. SAM (sterile alpha motif) domain of LBP1 (also known as UBP1) transcription factor is a putative protein-protein interaction domain. Proteins of this group have an N-terminal DNA-binding CP2 domain, a central predicted SAM domain and some also have a C-terminal dimerization domain. They are involved in transcriptional regulation from early development to terminal differentiation. In particular, they regulate alpha-globin in erythroid cells and P450scc (the cholesterol side-chain cleavage enzyme, cytochrome) in human placenta. Human LBP1 is known to be induced by HIV type I infection in lymphocytes; it represses HIV transcription by preventing the binding of TFIID to the virus promoter. Additionally, it has been suggested that UBP1 (LPB1) regulator might be a member of a blood pressure controlling network. LBP1 protein isoforms are able to form dimers, apparently via SAM domain since SAM deletion or mutation resulted in a loss of this ability."
definition: >-
  SAM domain of LBP1 (UBP1) transcription factors. SAM (sterile alpha motif) domain of LBP1 (also known as UBP1) transcription factor is a putative protein-protein interaction domain. Proteins of this group have an N-terminal DNA-binding CP2 domain, a central predicted SAM domain and some also have a C-terminal dimerization domain. They are involved in transcriptional regulation from early development to terminal differentiation. In particular, they regulate alpha-globin in erythroid cells and P450scc (the cholesterol side-chain cleavage enzyme, cytochrome) in human placenta. Human LBP1 is known to be induced by HIV type I infection in lymphocytes; it represses HIV transcription by preventing the binding of TFIID to the virus promoter. Additionally, it has been suggested that UBP1 (LPB1) regulator might be a member of a blood pressure controlling network. LBP1 protein isoforms are able to form dimers, apparently via SAM domain since SAM deletion or mutation resulted in a loss of this ability. — an NCBI CDD conserved domain (cd09588); members share this curated model.
