identifier: CDD:cd19607
label: "Putative glycoside hydrolase TIM-barrel domain in gene transfer agent and similar proteins. This domain is found in the gene transfer agent protein, such as the Rhodobacter capsulatus putative gene transfer agent protein encoded by orfg15. In the purple nonsulfur bacterium Rhodobacter capsulatus, DNA transmission is mediated via an unusual system, a small bacteriophage-like particle called the gene transfer agent (GTA) that transfers random 4.5-kb segments of the producing cell's genome to recipient cells, where allelic replacement occurs."
definition: >-
  Putative glycoside hydrolase TIM-barrel domain in gene transfer agent and similar proteins. This domain is found in the gene transfer agent protein, such as the Rhodobacter capsulatus putative gene transfer agent protein encoded by orfg15. In the purple nonsulfur bacterium Rhodobacter capsulatus, DNA transmission is mediated via an unusual system, a small bacteriophage-like particle called the gene transfer agent (GTA) that transfers random 4.5-kb segments of the producing cell's genome to recipient cells, where allelic replacement occurs. — an NCBI CDD conserved domain (cd19607); members share this curated model.
