identifier: CDD:cd01052
label: "DPS-like protein, ferritin-like diiron-binding domain. DPSL (DPS-like).  DPSL is a phylogenetically distinct class within the ferritin-like superfamily, and similar in many ways to the DPS (DNA Protecting protein under Starved conditions) proteins. Like DPS, these proteins are expressed in response to oxidative stress, form dodecameric cage-like particles, preferentially utilize hydrogen peroxide in the controlled oxidation of iron, and possess a short N-terminal extension implicated in stabilizing cellular DNA.  This domain is a member of a broad superfamily of ferritin-like diiron-carboxylate proteins. These proteins are distantly related to bacterial ferritins which assemble 24 monomers,  each of which have a four-helix bundle with a fifth shorter helix at the C terminus and a diiron (ferroxidase) center. Ferritins contain a center where oxidation of ferrous iron by molecular oxygen occurs, facilitating the detoxification of iron, protection against dioxygen and radical products, and storage of iron in the ferric form. Many of the conserved residues of a diiron center are present in this domain."
definition: >-
  DPS-like protein, ferritin-like diiron-binding domain. DPSL (DPS-like). DPSL is a phylogenetically distinct class within the ferritin-like superfamily, and similar in many ways to the DPS (DNA Protecting protein under Starved conditions) proteins. Like DPS, these proteins are expressed in response to oxidative stress, form dodecameric cage-like particles, preferentially utilize hydrogen peroxide in the controlled oxidation of iron, and possess a short N-terminal extension implicated in stabilizing cellular DNA. This domain is a member of a broad superfamily of ferritin-like diiron-carboxylate proteins. These proteins are distantly related to bacterial ferritins which assemble 24 monomers, each of which have a four-helix bundle with a fifth shorter helix at the C terminus and a diiron (ferroxidase) center. Ferritins contain a center where oxidation of ferrous iron by molecular oxygen occurs, facilitating the detoxification of iron, protection against dioxygen and radical products, and storage of iron in the ferric form. Many of the conserved residues of a diiron center are present in this domain. — an NCBI CDD conserved domain (cd01052); members share this curated model.
