identifier: CDD:cd18519
label: "BACK (BTB and C-terminal Kelch) domain found in speckle-type POZ protein-like (SPOPL). SPOPL, also termed HIB homolog 2, or Roadkill homolog 2, is a component of a cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. The complexes containing homodimeric SPOPL or the heterodimer formed by speckle-type POZ protein (SPOP) and SPOPL are less efficient than ubiquitin ligase complexes containing only SPOP."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in speckle-type POZ protein-like (SPOPL). SPOPL, also termed HIB homolog 2, or Roadkill homolog 2, is a component of a cullin-RING-based BCR (BTB-CUL3-RBX1) E3 ubiquitin-protein ligase complex that mediates the ubiquitination and subsequent proteasomal degradation of target proteins. The complexes containing homodimeric SPOPL or the heterodimer formed by speckle-type POZ protein (SPOP) and SPOPL are less efficient than ubiquitin ligase complexes containing only SPOP. — an NCBI CDD conserved domain (cd18519); members share this curated model.
