identifier: CDD:cd11984
label: "Src homology 3 domain of SH3 and multiple ankyrin repeat domains protein 3. Shank3, also called ProSAP2 (Proline-rich synapse-associated protein 2), is widely expressed. It plays a role in the formation of dendritic spines and synapses. Haploinsufficiency of the Shank3 gene causes the 22q13 deletion/Phelan-McDermid syndrome, and variants of Shank3 have been implicated in autism spectrum disorder, schizophrenia, and intellectual disability. Shank proteins carry scaffolding functions through multiple sites of protein-protein interaction in its domain architecture, including ankyrin (ANK) repeats, a long proline rich region, as well as SH3, PDZ, and SAM domains. The SH3 domain of Shank binds GRIP, a scaffold protein that binds AMPA receptors and Eph receptors/ligands. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of SH3 and multiple ankyrin repeat domains protein 3. Shank3, also called ProSAP2 (Proline-rich synapse-associated protein 2), is widely expressed. It plays a role in the formation of dendritic spines and synapses. Haploinsufficiency of the Shank3 gene causes the 22q13 deletion/Phelan-McDermid syndrome, and variants of Shank3 have been implicated in autism spectrum disorder, schizophrenia, and intellectual disability. Shank proteins carry scaffolding functions through multiple sites of protein-protein interaction in its domain architecture, including ankyrin (ANK) repeats, a long proline rich region, as well as SH3, PDZ, and SAM domains. The SH3 domain of Shank binds GRIP, a scaffold protein that binds AMPA receptors and Eph receptors/ligands. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11984); members share this curated model.
