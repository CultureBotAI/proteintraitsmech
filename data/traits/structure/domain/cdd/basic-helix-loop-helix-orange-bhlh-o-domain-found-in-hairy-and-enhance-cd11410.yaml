identifier: CDD:cd11410
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split (HES) family. The HES family includes bHLH-O transcriptional regulators that are related to the Drosophila hairy and Enhancer-of-split (HES) proteins. They contain a basic helix-loop-helix (bHLH) domain with an invariant proline residue in its basic region, an orange domain in the central region and a conserved tetrapeptide motif, WRPW, at its C-terminal region. HES family proteins form heterodimers or homodimers via their HLH domain and bind DNA to repress gene transcription that play an essential role in development of both compartment and boundary cells of the central nervous system."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split (HES) family. The HES family includes bHLH-O transcriptional regulators that are related to the Drosophila hairy and Enhancer-of-split (HES) proteins. They contain a basic helix-loop-helix (bHLH) domain with an invariant proline residue in its basic region, an orange domain in the central region and a conserved tetrapeptide motif, WRPW, at its C-terminal region. HES family proteins form heterodimers or homodimers via their HLH domain and bind DNA to repress gene transcription that play an essential role in development of both compartment and boundary cells of the central nervous system. — an NCBI CDD conserved domain (cd11410); members share this curated model.
