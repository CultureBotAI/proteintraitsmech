identifier: CDD:cd24096
label: "nucleotide-binding domain (NBD) of Kae1 and similar proteins. Kae1 (EC 2.3.1.234), also called kinase-associated endopeptidase 1, N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, kinase-associated endopeptidase 1 (Kae1), t(6)A37 threonylcarbamoyladenosine biosynthesis protein Kae1, or tRNA threonylcarbamoyladenosine biosynthesis protein Kae1, is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It is a component of the KEOPS complex that is probably involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37. Kae1 likely plays a direct catalytic role in this reaction but requires other protein(s) of the complex to fulfill this activity. OSGEP (EC 2.3.1.234), also called tRNA N6-adenosine threonylcarbamoyltransferase, N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, t(6)A37 threonylcarbamoyladenosine biosynthesis protein OSGEP, tRNA threonylcarbamoyladenosine biosynthesis protein OSGEP, is the mammalian orthologue of kinase-associated endopeptidase Kae1. The family also includes bifunctional tRNA threonylcarbamoyladenosine biosynthesis protein (EC 2.3.1.234/EC 2.7.11.1), which contains a Kae1 domain and a Bud32 domain. The Kae1 domain may play a catalytic role and the Bud32 domain probably displays kinase activity that regulates Kae1 function."
definition: >-
  nucleotide-binding domain (NBD) of Kae1 and similar proteins. Kae1 (EC 2.3.1.234), also called kinase-associated endopeptidase 1, N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, kinase-associated endopeptidase 1 (Kae1), t(6)A37 threonylcarbamoyladenosine biosynthesis protein Kae1, or tRNA threonylcarbamoyladenosine biosynthesis protein Kae1, is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in tRNAs that read codons beginning with adenine. It is a component of the KEOPS complex that is probably involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37. Kae1 likely plays a direct catalytic role in this reaction but requires other protein(s) of the complex to fulfill this activity. OSGEP (EC 2.3.1.234), also called tRNA N6-adenosine threonylcarbamoyltransferase, N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, t(6)A37 threonylcarbamoyladenosine biosynthesis protein OSGEP, tRNA threonylcarbamoyladenosine biosynthesis protein OSGEP, is the mammalian orthologue of kinase-associated endopeptidase Kae1. The family also includes bifunctional tRNA threonylcarbamoyladenosine biosynthesis protein (EC 2.3.1.234/EC 2.7.11.1), which contains a Kae1 domain and a Bud32 domain. The Kae1 domain may play a catalytic role and the Bud32 domain probably displays kinase activity that regulates Kae1 function. — an NCBI CDD conserved domain (cd24096); members share this curated model.
