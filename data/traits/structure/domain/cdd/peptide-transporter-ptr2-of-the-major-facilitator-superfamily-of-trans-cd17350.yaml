identifier: CDD:cd17350
label: "Peptide transporter PTR2 of the Major Facilitator Superfamily of transporters. Fungal peptide transporter or permease PTR2 is a member of the proton-coupled oligopeptide transporter (POT) family of integral membrane proteins that mediate the cellular uptake of di/tripeptides and peptide-like drugs. It is a 12-transmembrane domain (TMD) integral membrane protein that translocates di-/tripeptides. As with other POT family proteins, it displays characteristic substrate multispecificity. PTR2 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Peptide transporter PTR2 of the Major Facilitator Superfamily of transporters. Fungal peptide transporter or permease PTR2 is a member of the proton-coupled oligopeptide transporter (POT) family of integral membrane proteins that mediate the cellular uptake of di/tripeptides and peptide-like drugs. It is a 12-transmembrane domain (TMD) integral membrane protein that translocates di-/tripeptides. As with other POT family proteins, it displays characteristic substrate multispecificity. PTR2 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17350); members share this curated model.
