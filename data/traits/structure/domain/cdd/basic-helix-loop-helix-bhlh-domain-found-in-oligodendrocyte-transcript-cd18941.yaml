identifier: CDD:cd18941
label: "basic helix-loop-helix (bHLH) domain found in oligodendrocyte transcription factor 3 (Oligo3) and similar proteins. Oligo3, also termed Class B basic helix-loop-helix protein 7 (bHLHb7), or Class E basic helix-loop-helix protein 20 (bHLHe20), is a bHLH transcription factor that is expressed in the ventricular zone of the dorsal alar plate of the hindbrain and involved in regulating the development of dorsal and ventral spinal cord. It may determine the distinct specification program of class A neurons in the dorsal part of the spinal cord and suppress specification of class B neurons."
definition: >-
  basic helix-loop-helix (bHLH) domain found in oligodendrocyte transcription factor 3 (Oligo3) and similar proteins. Oligo3, also termed Class B basic helix-loop-helix protein 7 (bHLHb7), or Class E basic helix-loop-helix protein 20 (bHLHe20), is a bHLH transcription factor that is expressed in the ventricular zone of the dorsal alar plate of the hindbrain and involved in regulating the development of dorsal and ventral spinal cord. It may determine the distinct specification program of class A neurons in the dorsal part of the spinal cord and suppress specification of class B neurons. — an NCBI CDD conserved domain (cd18941); members share this curated model.
