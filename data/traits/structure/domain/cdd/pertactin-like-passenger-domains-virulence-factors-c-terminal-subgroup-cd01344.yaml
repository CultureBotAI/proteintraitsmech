label: "Pertactin-like passenger domains (virulence factors), C-terminal, subgroup 2, of autotransporter proteins of the type V secretion system of Gram-negative bacteria. This subgroup includes the passenger domains of the nonprotease autotransporters, Ag43, AIDA-1 and IcsA, as well as, the less characterized ShdA, MisL, and BapA autotransporters."
