identifier: CDD:cd08075
label: "ATP-grasp domain. This group represents most of the families of ATP-grasp superfamily. There are three domains that define the general feature of most of the members of this superfamily; the N-terminal domain, central domain, and the C-terminal domain. The central and C-terminal domains predominantly form the nucleotide and substrate-binding sites which makes the catalytic core. These enzymes catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. These enzymes also share a conserved Mg-ATP-binding pocket which is covered by a flexible loop that is believed to undergo a conformational change on substrate binding. Each member of the ATP-Grasp superfamily is known to bind one or more divalent metal ions at the catalytic site, and all but synapsin (which binds a single Ca ion) utilizes Mg ion as the physiological cofactor."
definition: >-
  ATP-grasp domain. This group represents most of the families of ATP-grasp superfamily. There are three domains that define the general feature of most of the members of this superfamily; the N-terminal domain, central domain, and the C-terminal domain. The central and C-terminal domains predominantly form the nucleotide and substrate-binding sites which makes the catalytic core. These enzymes catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. These enzymes also share a conserved Mg-ATP-binding pocket which is covered by a flexible loop that is believed to undergo a conformational change on substrate binding. Each member of the ATP-Grasp superfamily is known to bind one or more divalent metal ions at the catalytic site, and all but synapsin (which binds a single Ca ion) utilizes Mg ion as the physiological cofactor. — an NCBI CDD conserved domain (cd08075); members share this curated model.
