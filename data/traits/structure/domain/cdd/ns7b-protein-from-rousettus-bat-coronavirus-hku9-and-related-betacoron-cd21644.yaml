identifier: CDD:cd21644
label: "NS7b protein from Rousettus bat coronavirus HKU9 and related betacoronaviruses in the D lineage. This model represents the NS7b protein of Rousettus bat coronavirus (CoV) HKU9 and related proteins from betacoronaviruses in the nobecovirus subgenera (D lineage). There are five essential genes in CoVs that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and replicase/protease polyproteins (ORF1ab); all are required to produce a structurally complete viral particle. In addition, CoV genomes also contain ORFs coding for accessory proteins that are specific for certain CoV lineages or for a particular CoV. In general, CoV accessory proteins are considered to be dispensable for viral replication; however, several accessory proteins have been shown to exhibit functions in virus-host interactions during CoV infection. The NS7b protein of lineage D betacoronavirus is an accessory protein whose function is unknown. It is not related to NS7b proteins from other betacoronavirus lineages."
definition: >-
  NS7b protein from Rousettus bat coronavirus HKU9 and related betacoronaviruses in the D lineage. This model represents the NS7b protein of Rousettus bat coronavirus (CoV) HKU9 and related proteins from betacoronaviruses in the nobecovirus subgenera (D lineage). There are five essential genes in CoVs that result in the following gene products: Spike (S) protein, Membrane (M) glycoprotein, Nucleocapsid (N), Envelope (E) protein, and replicase/protease polyproteins (ORF1ab); all are required to produce a structurally complete viral particle. In addition, CoV genomes also contain ORFs coding for accessory proteins that are specific for certain CoV lineages or for a particular CoV. In general, CoV accessory proteins are considered to be dispensable for viral replication; however, several accessory proteins have been shown to exhibit functions in virus-host interactions during CoV infection. The NS7b protein of lineage D betacoronavirus is an accessory protein whose function is unknown. It is not related to NS7b proteins from other betacoronavirus lineages. — an NCBI CDD conserved domain (cd21644); members share this curated model.
