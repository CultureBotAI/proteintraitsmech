identifier: CDD:cd10605
label: "Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: 7,8-diaminopelargonic acid synthase-like. (DAPA_syn) family. The biosynthesis of the vitamin biotin, a co-factor in biological carboxylation reactions, occurs in micro-organisms and plants that involves at least four different enzymes. One of these enzymes is 7,8-diaminopelargonic acid synthase (DAPA) the enzyme that catalyses the antepenultimate step of the biotin biosynthesis pathway. DAPA_syn like others in the family, is a a pyridoxal 5'-phosphate dependant enzyme The enzyme is a homodimer and converts 7-keto-8-aminopelargonic acid to 7,8-diaminopelargonic acid."
definition: >-
  Pyridoxal phosphate (PLP)-dependent aspartate aminotransferase superfamily: 7,8-diaminopelargonic acid synthase-like. (DAPA_syn) family. The biosynthesis of the vitamin biotin, a co-factor in biological carboxylation reactions, occurs in micro-organisms and plants that involves at least four different enzymes. One of these enzymes is 7,8-diaminopelargonic acid synthase (DAPA) the enzyme that catalyses the antepenultimate step of the biotin biosynthesis pathway. DAPA_syn like others in the family, is a a pyridoxal 5'-phosphate dependant enzyme The enzyme is a homodimer and converts 7-keto-8-aminopelargonic acid to 7,8-diaminopelargonic acid. — an NCBI CDD conserved domain (cd10605); members share this curated model.
