identifier: CDD:cd10214
label: "nucleotide-binding domain (NBD) of the actin-like protein 7 (ACTL7)-like family. The ACTL7-like family includes ACTL7A, ACTL7B and ACTL9 (also known as ACTL7C). In mammalian, ACTL7A is expressed in a wide variety of adult tissues, while the ACTL7B is expressed in spermatids through the elongation phase of spermatid development. ACTL7A, also called actin-like-7-alpha, or T-ACTIN-2 in mouse, may play an important role in formation and fusion of Golgi-derived vesicles during acrosome biogenesis. ACTL7B, also called actin-like-7-beta, acts as a key regulator of spermiogenesis that is required for male fertility. ACTL9 is a testis-specific protein that plays an important role in fusion of proacrosomal vesicles and perinuclear theca formation."
definition: >-
  nucleotide-binding domain (NBD) of the actin-like protein 7 (ACTL7)-like family. The ACTL7-like family includes ACTL7A, ACTL7B and ACTL9 (also known as ACTL7C). In mammalian, ACTL7A is expressed in a wide variety of adult tissues, while the ACTL7B is expressed in spermatids through the elongation phase of spermatid development. ACTL7A, also called actin-like-7-alpha, or T-ACTIN-2 in mouse, may play an important role in formation and fusion of Golgi-derived vesicles during acrosome biogenesis. ACTL7B, also called actin-like-7-beta, acts as a key regulator of spermiogenesis that is required for male fertility. ACTL9 is a testis-specific protein that plays an important role in fusion of proacrosomal vesicles and perinuclear theca formation. — an NCBI CDD conserved domain (cd10214); members share this curated model.
