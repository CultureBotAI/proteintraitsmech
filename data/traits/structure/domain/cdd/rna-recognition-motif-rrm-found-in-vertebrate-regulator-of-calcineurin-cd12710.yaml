identifier: CDD:cd12710
label: "RNA recognition motif (RRM) found in vertebrate regulator of calcineurin 3 (RCAN3). This subgroup corresponds to the RRM of RCAN3, also termed calcipressin-3, or Down syndrome candidate region 1-like protein 2 (DSCR1L2), or myocyte-enriched calcineurin-interacting protein 3 (MCIP3), encoded by a ubiquitously expressed DSCR1L2 gene. Overexpressed RCAN3 binds and inhibits the Ca2+/calmodulin-dependent phosphatase calcineurin (also termed PP2B or PP3C), and further down-regulates nuclear factor of activated T cells (NFAT)-dependent cytokine gene expression in activated human Jurkat T cells. Moreover, RCAN3 interacts with cardiac troponin I (TNNI3), a heart-specific inhibitory subunit of the troponin complex, and may play a role in cardiac contraction. RCAN3 consists of an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a highly conserved SP repeat domain containing the phosphorylation site by GSK-3, a well-known PxIxIT motif responsible for docking many substrates to calcineurin, and an unrecognized C-terminal TxxP motif of unknown function."
definition: >-
  RNA recognition motif (RRM) found in vertebrate regulator of calcineurin 3 (RCAN3). This subgroup corresponds to the RRM of RCAN3, also termed calcipressin-3, or Down syndrome candidate region 1-like protein 2 (DSCR1L2), or myocyte-enriched calcineurin-interacting protein 3 (MCIP3), encoded by a ubiquitously expressed DSCR1L2 gene. Overexpressed RCAN3 binds and inhibits the Ca2+/calmodulin-dependent phosphatase calcineurin (also termed PP2B or PP3C), and further down-regulates nuclear factor of activated T cells (NFAT)-dependent cytokine gene expression in activated human Jurkat T cells. Moreover, RCAN3 interacts with cardiac troponin I (TNNI3), a heart-specific inhibitory subunit of the troponin complex, and may play a role in cardiac contraction. RCAN3 consists of an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a highly conserved SP repeat domain containing the phosphorylation site by GSK-3, a well-known PxIxIT motif responsible for docking many substrates to calcineurin, and an unrecognized C-terminal TxxP motif of unknown function. — an NCBI CDD conserved domain (cd12710); members share this curated model.
