identifier: CDD:cd19683
label: "basic helix-loop-helix (bHLH) domain found in the spermatogenesis- and oogenesis-specific basic helix-loop-helix-containing protein (SOHLH) family and similar proteins. The SOHLH family includes two bHLH transcription factors, SOHLH1 and SOHLH2. They are specifically in spermatogonia and oocytes and essential for early spermatogonial and oocyte differentiation. The family also includes transcription factor-like 5 protein (TCFL5) and similar proteins. TCFL5, also termed Cha transcription factor, or HPV-16 E2-binding protein 1 (E2BP-1), is a bHLH transcription factor that plays a crucial role in spermatogenesis. It regulates cell proliferation or differentiation of cells through binding to a specific DNA sequence like other bHLH molecules."
definition: >-
  basic helix-loop-helix (bHLH) domain found in the spermatogenesis- and oogenesis-specific basic helix-loop-helix-containing protein (SOHLH) family and similar proteins. The SOHLH family includes two bHLH transcription factors, SOHLH1 and SOHLH2. They are specifically in spermatogonia and oocytes and essential for early spermatogonial and oocyte differentiation. The family also includes transcription factor-like 5 protein (TCFL5) and similar proteins. TCFL5, also termed Cha transcription factor, or HPV-16 E2-binding protein 1 (E2BP-1), is a bHLH transcription factor that plays a crucial role in spermatogenesis. It regulates cell proliferation or differentiation of cells through binding to a specific DNA sequence like other bHLH molecules. — an NCBI CDD conserved domain (cd19683); members share this curated model.
