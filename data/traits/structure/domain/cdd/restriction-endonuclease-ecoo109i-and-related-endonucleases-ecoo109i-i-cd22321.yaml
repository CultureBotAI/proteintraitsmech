identifier: CDD:cd22321
label: "Restriction endonuclease EcoO109I and related endonucleases. EcoO109I is a type II restriction endonuclease that recognizes ds DNA with a seven-base pair motif of both degenerate and discontinuous sequence, RG|GNCCY (R = A or G, Y = T or C, with | designating the cleavage site), and generates 5'-overhangs; it belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease EcoO109I and related endonucleases. EcoO109I is a type II restriction endonuclease that recognizes ds DNA with a seven-base pair motif of both degenerate and discontinuous sequence, RG|GNCCY (R = A or G, Y = T or C, with | designating the cleavage site), and generates 5'-overhangs; it belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22321); members share this curated model.
