identifier: CDD:cd23479
label: "ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase 16 (GALNT16) and similar proteins. GALNT16 (EC 2.4.1.41), also called polypeptide GalNAc transferase 16, GalNAc-T16, polypeptide GalNAc transferase-like protein 1, GalNAc-T-like protein 1, pp-GaNTase-like protein 1, polypeptide N-acetylgalactosaminyltransferase-like protein 1, protein-UDP acetylgalactosaminyltransferase-like protein 1, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase-like protein 1, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT16 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase 16 (GALNT16) and similar proteins. GALNT16 (EC 2.4.1.41), also called polypeptide GalNAc transferase 16, GalNAc-T16, polypeptide GalNAc transferase-like protein 1, GalNAc-T-like protein 1, pp-GaNTase-like protein 1, polypeptide N-acetylgalactosaminyltransferase-like protein 1, protein-UDP acetylgalactosaminyltransferase-like protein 1, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase-like protein 1, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNT16 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity. — an NCBI CDD conserved domain (cd23479); members share this curated model.
