identifier: CDD:cd11407
label: "basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split (HES)-related repressor protein (HERP) family. HERP (also called Hey/Hesr/HRT/CHF/gridlock) proteins corresponds to a family of bHLH-O transcriptional repressors that are related to the Drosophila hairy and Enhancer-of-split proteins and act as downstream effectors of Notch signaling. They contain a basic helix-loop-helix (bHLH) domain with an invariant glycine residue in its basic region, an orange domain in the central region and YXXW sequence motif at its C-terminal region. HERP proteins are involved in cardiovascular development and have roles in somitogenesis, myogenesis and gliogenesis."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in hairy and enhancer of split (HES)-related repressor protein (HERP) family. HERP (also called Hey/Hesr/HRT/CHF/gridlock) proteins corresponds to a family of bHLH-O transcriptional repressors that are related to the Drosophila hairy and Enhancer-of-split proteins and act as downstream effectors of Notch signaling. They contain a basic helix-loop-helix (bHLH) domain with an invariant glycine residue in its basic region, an orange domain in the central region and YXXW sequence motif at its C-terminal region. HERP proteins are involved in cardiovascular development and have roles in somitogenesis, myogenesis and gliogenesis. — an NCBI CDD conserved domain (cd11407); members share this curated model.
