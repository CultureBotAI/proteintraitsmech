identifier: CDD:cd20087
label: "eukaryotic Initiation Factor 4 Gamma (eIF4G) canonical 4E-BM. eIF4G plays a central role in eukaryotic initiation factor 4F (eIF4F) assembly on the 5' cap structure of mRNA for cap-dependent translation initiation as it bridges the interaction between eIF4E and eIF4A. eIF4G contains three domains of a similar size: (i) the N-terminal region, which contains the eIF4E and PABP binding sites; (ii) the middle portion, which participates in the recruitment of the 43 S preinitiation complex on interaction with eIF3; (iii) the C-terminal domain, which binds Mnk1, a mitogen-activated protein kinase. eIF4G interacts with the cap-binding protein eIF4E via a conserved motif, which is termed the canonical eIF4E-binding motif (canonical 4E-BM). eIF4G is also required for cell growth, differentiation, and organism development. eIF4G has been implicated in the pathogenesis of various conditions such as tumor growth and age-related diseases. There are different isoforms of eIF4G in mammalian cells. It has been proposed that these isoforms possess similar biochemical activities and are functionally interchangeable."
definition: >-
  eukaryotic Initiation Factor 4 Gamma (eIF4G) canonical 4E-BM. eIF4G plays a central role in eukaryotic initiation factor 4F (eIF4F) assembly on the 5' cap structure of mRNA for cap-dependent translation initiation as it bridges the interaction between eIF4E and eIF4A. eIF4G contains three domains of a similar size: (i) the N-terminal region, which contains the eIF4E and PABP binding sites; (ii) the middle portion, which participates in the recruitment of the 43 S preinitiation complex on interaction with eIF3; (iii) the C-terminal domain, which binds Mnk1, a mitogen-activated protein kinase. eIF4G interacts with the cap-binding protein eIF4E via a conserved motif, which is termed the canonical eIF4E-binding motif (canonical 4E-BM). eIF4G is also required for cell growth, differentiation, and organism development. eIF4G has been implicated in the pathogenesis of various conditions such as tumor growth and age-related diseases. There are different isoforms of eIF4G in mammalian cells. It has been proposed that these isoforms possess similar biochemical activities and are functionally interchangeable. — an NCBI CDD conserved domain (cd20087); members share this curated model.
