identifier: CDD:cd19876
label: "double-stranded RNA binding motif of Saccharomyces cerevisiae ribonuclease 3 (RNT1p) and similar proteins. RNT1p (EC 3.1.26.3; also known as ribonuclease III (RNase III)) is a dsRNA-specific nuclease that cleaves eukaryotic pre-ribosomal RNA at the U3 snoRNP-dependent A0 site in the 5'-external transcribed spacer (ETS) and in the 3'-ETS. RNT1p contains a double-stranded RNA binding motif (DSRM) at the C-terminus. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of Saccharomyces cerevisiae ribonuclease 3 (RNT1p) and similar proteins. RNT1p (EC 3.1.26.3; also known as ribonuclease III (RNase III)) is a dsRNA-specific nuclease that cleaves eukaryotic pre-ribosomal RNA at the U3 snoRNP-dependent A0 site in the 5'-external transcribed spacer (ETS) and in the 3'-ETS. RNT1p contains a double-stranded RNA binding motif (DSRM) at the C-terminus. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19876); members share this curated model.
