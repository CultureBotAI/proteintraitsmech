identifier: CDD:cd12071
label: "Src Homology 3 domain of Formin Binding Protein 17. Formin Binding Protein 17 (FBP17), also called FormiN Binding Protein 1 (FNBP1), is involved in dynamin-mediated endocytosis. It is recruited to clathrin-coated pits late in the endocytosis process and may play a role in the invagination and scission steps. FBP17 binds in vivo to tankyrase, a protein involved in telomere maintenance and mitogen activated protein kinase (MAPK) signaling. It contains an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain, a Cdc42-binding HR1 domain, and a C-terminal SH3 domain. The SH3 domain of the related protein, CIP4, associates with Gapex-5, a Rab31 GEF. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Formin Binding Protein 17. Formin Binding Protein 17 (FBP17), also called FormiN Binding Protein 1 (FNBP1), is involved in dynamin-mediated endocytosis. It is recruited to clathrin-coated pits late in the endocytosis process and may play a role in the invagination and scission steps. FBP17 binds in vivo to tankyrase, a protein involved in telomere maintenance and mitogen activated protein kinase (MAPK) signaling. It contains an N-terminal F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain, a Cdc42-binding HR1 domain, and a C-terminal SH3 domain. The SH3 domain of the related protein, CIP4, associates with Gapex-5, a Rab31 GEF. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd12071); members share this curated model.
