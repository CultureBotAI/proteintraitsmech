identifier: CDD:cd22507
label: "second type I K homology (KH) RNA-binding domain found in fragile X mental retardation syndrome-related protein 1 (FXR1) and similar proteins. FXR1 is an RNA-binding protein required for embryonic and postnatal development of muscle tissue. It may regulate intracellular transport and local translation of certain mRNAs. FXR1 protein may be present in amyloid form in brain of different species of mammals. It may regulate memory and emotions. FXR1 contains three K-homology (KH) RNA-binding domains. The model corresponds to the second one."
definition: >-
  second type I K homology (KH) RNA-binding domain found in fragile X mental retardation syndrome-related protein 1 (FXR1) and similar proteins. FXR1 is an RNA-binding protein required for embryonic and postnatal development of muscle tissue. It may regulate intracellular transport and local translation of certain mRNAs. FXR1 protein may be present in amyloid form in brain of different species of mammals. It may regulate memory and emotions. FXR1 contains three K-homology (KH) RNA-binding domains. The model corresponds to the second one. — an NCBI CDD conserved domain (cd22507); members share this curated model.
