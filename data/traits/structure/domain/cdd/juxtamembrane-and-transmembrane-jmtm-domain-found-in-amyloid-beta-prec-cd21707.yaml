identifier: CDD:cd21707
label: "juxtamembrane and transmembrane (JMTM) domain found in amyloid-beta precursor protein (APP) and similar proteins. Amyloid-beta precursor protein (APP), also called APPI, ABPP, Alzheimer disease amyloid protein, amyloid precursor protein, amyloid-beta A4 protein, cerebral vascular amyloid peptide (CVAP), PreA4, or protease nexin-II (PN-II), functions as a cell surface receptor and performs physiological functions on the surface of neurons relevant to neurite growth, neuronal adhesion and axonogenesis. Amyloid-beta peptides are lipophilic metal chelators with metal-reducing activity; they bind transient metals such as copper, zinc and iron. This model corresponds to juxtamembrane and transmembrane (JMTM) domain of APP, which consists of the intact transmembrane (TM) domain with adjacent N-terminal juxtamembrane (JM) region. More than half of all familial APP mutations of Alzheimer's disease are seen in its JMTM domain region."
definition: >-
  juxtamembrane and transmembrane (JMTM) domain found in amyloid-beta precursor protein (APP) and similar proteins. Amyloid-beta precursor protein (APP), also called APPI, ABPP, Alzheimer disease amyloid protein, amyloid precursor protein, amyloid-beta A4 protein, cerebral vascular amyloid peptide (CVAP), PreA4, or protease nexin-II (PN-II), functions as a cell surface receptor and performs physiological functions on the surface of neurons relevant to neurite growth, neuronal adhesion and axonogenesis. Amyloid-beta peptides are lipophilic metal chelators with metal-reducing activity; they bind transient metals such as copper, zinc and iron. This model corresponds to juxtamembrane and transmembrane (JMTM) domain of APP, which consists of the intact transmembrane (TM) domain with adjacent N-terminal juxtamembrane (JM) region. More than half of all familial APP mutations of Alzheimer's disease are seen in its JMTM domain region. — an NCBI CDD conserved domain (cd21707); members share this curated model.
