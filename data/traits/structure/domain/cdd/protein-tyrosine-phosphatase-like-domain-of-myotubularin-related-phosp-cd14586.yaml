identifier: CDD:cd14586
label: "protein tyrosine phosphatase-like domain of myotubularin related phosphoinositide phosphatase 3. Myotubularin related phosphoinositide phosphatase 3 (MTMR3), also known as FYVE domain-containing dual specificity protein phosphatase 1 (FYVE-DSP1) or Zinc finger FYVE domain-containing protein 10 (ZFYVE10), is enzymatically active and contains a C-terminal FYVE domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. Together with phosphoinositide 5-kinase PIKfyve, phosphoinositide 3-phosphatase MTMR3 constitutes a phosphoinositide loop that produces PI(5)P via PI(3,5)P2 and regulates cell migration."
definition: >-
  protein tyrosine phosphatase-like domain of myotubularin related phosphoinositide phosphatase 3. Myotubularin related phosphoinositide phosphatase 3 (MTMR3), also known as FYVE domain-containing dual specificity protein phosphatase 1 (FYVE-DSP1) or Zinc finger FYVE domain-containing protein 10 (ZFYVE10), is enzymatically active and contains a C-terminal FYVE domain and an N-terminal PH-GRAM domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. They dephosphorylate the D-3 position of phosphatidylinositol 3-phosphate [PI(3)P] and phosphatidylinositol 3,5-bisphosphate [PI(3,5)P2], generating phosphatidylinositol and phosphatidylinositol 5-phosphate [PI(5)P], respectively. Together with phosphoinositide 5-kinase PIKfyve, phosphoinositide 3-phosphatase MTMR3 constitutes a phosphoinositide loop that produces PI(5)P via PI(3,5)P2 and regulates cell migration. — an NCBI CDD conserved domain (cd14586); members share this curated model.
