identifier: CDD:cd01814
label: "ubiquitin-like (Ubl) domain found in plant membrane-anchored ubiquitin-fold proteins (MUBs). The plant MUBs belong to a family of ubiquitin-fold proteins that are plasma membrane-anchored by prenylation. They may serve as docking site to facilitate the association of specific E2s to the plasma membrane. MUBs contain a ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold."
definition: >-
  ubiquitin-like (Ubl) domain found in plant membrane-anchored ubiquitin-fold proteins (MUBs). The plant MUBs belong to a family of ubiquitin-fold proteins that are plasma membrane-anchored by prenylation. They may serve as docking site to facilitate the association of specific E2s to the plasma membrane. MUBs contain a ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold. — an NCBI CDD conserved domain (cd01814); members share this curated model.
