identifier: CDD:cd00627
label: "RNA_pol_K_RPB6. RNA polymerases are multisubunit enzyme complexes that synthesize RNA from DNA.  This CD encompasses subunit RPB6 of the eukaryotic RNA polymerases and its orthologs, archeal subunit K and bacterial subunit omega, all of which are conserved in sequence, structure, and function.  RPB6 is an essential subunit of the RNA polymerases that promotes polymerase complex assembly."
definition: >-
