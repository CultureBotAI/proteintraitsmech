identifier: CDD:cd07841
label: "Catalytic domain of the Serine/Threonine Kinase, Cyclin-Dependent protein Kinase 7. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDK7 plays essential roles in the cell cycle and in transcription. It associates with cyclin H and MAT1 and acts as a CDK-Activating Kinase (CAK) by phosphorylating and activating cell cycle CDKs (CDK1/2/4/6). In the brain, it activates CDK5. CDK7 is also a component of the general transcription factor TFIIH, which phosphorylates the C-terminal domain (CTD) of RNA polymerase II when it is bound with unphosphorylated DNA, as present in the pre-initiation complex. Following phosphorylation, the CTD dissociates from the DNA which allows transcription initiation. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDK7 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Cyclin-Dependent protein Kinase 7. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. CDK7 plays essential roles in the cell cycle and in transcription. It associates with cyclin H and MAT1 and acts as a CDK-Activating Kinase (CAK) by phosphorylating and activating cell cycle CDKs (CDK1/2/4/6). In the brain, it activates CDK5. CDK7 is also a component of the general transcription factor TFIIH, which phosphorylates the C-terminal domain (CTD) of RNA polymerase II when it is bound with unphosphorylated DNA, as present in the pre-initiation complex. Following phosphorylation, the CTD dissociates from the DNA which allows transcription initiation. CDKs belong to a large family of STKs that are regulated by their cognate cyclins. Together, they are involved in the control of cell-cycle progression, transcription, and neuronal function. The CDK7 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd07841); members share this curated model.
