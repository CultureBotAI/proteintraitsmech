identifier: CDD:cd18958
label: "Ribosomal small subunit protein S29, eukaryote. Ribosomal protein uS14 which is known as S29 in eukaryotes is conserved from yeasts to mammals and is mainly responsible for protein synthesis in organisms. Ribosomal protein S29 in eukaryotes which contains a zinc finger-like domain is up-regulated in the apoptotic thymocytes in mammals. Over-expression of S29 induces apoptosis in cancer cells and sensitizes cells to chemotherapy."
definition: >-
  Ribosomal small subunit protein S29, eukaryote. Ribosomal protein uS14 which is known as S29 in eukaryotes is conserved from yeasts to mammals and is mainly responsible for protein synthesis in organisms. Ribosomal protein S29 in eukaryotes which contains a zinc finger-like domain is up-regulated in the apoptotic thymocytes in mammals. Over-expression of S29 induces apoptosis in cancer cells and sensitizes cells to chemotherapy. — an NCBI CDD conserved domain (cd18958); members share this curated model.
