identifier: CDD:cd17745
label: "first (central) BRCT domain in p53-binding protein 1 (p53BP1) and similar proteins. p53BP1, also termed 53BP1, or TP53-binding protein 1 (TP53BP1) , is a double-strand break (DSB) repair protein involved in response to DNA damage, telomere dynamics and class-switch recombination (CSR) during antibody genesis. TP53BP1 contains two tandem BRCT repeats. This family also includes Schizosaccharomyces pombe Crb2, which is a checkpoint mediator required for the cellular response to DNA damage. This model corresponds to the first BRCT domain."
definition: >-
  first (central) BRCT domain in p53-binding protein 1 (p53BP1) and similar proteins. p53BP1, also termed 53BP1, or TP53-binding protein 1 (TP53BP1) , is a double-strand break (DSB) repair protein involved in response to DNA damage, telomere dynamics and class-switch recombination (CSR) during antibody genesis. TP53BP1 contains two tandem BRCT repeats. This family also includes Schizosaccharomyces pombe Crb2, which is a checkpoint mediator required for the cellular response to DNA damage. This model corresponds to the first BRCT domain. — an NCBI CDD conserved domain (cd17745); members share this curated model.
