identifier: CDD:cd23371
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Carica papaya latex serine proteinase inhibitor (LSPI) and similar proteins. LSPI, also called papaya protease inhibitor (PPI), is a double-headed Kunitz-type serine protease inhibitor. A single LSPI molecule can bind two trypsin units at the same time. LSPI may serve as a defense protein as it is induced by wounding and is inactive against endogenous proteases from C. papaya. LSPI belongs to the miraculin family of taste-modifying proteins, which are active against serine proteases. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Carica papaya latex serine proteinase inhibitor (LSPI) and similar proteins. LSPI, also called papaya protease inhibitor (PPI), is a double-headed Kunitz-type serine protease inhibitor. A single LSPI molecule can bind two trypsin units at the same time. LSPI may serve as a defense protein as it is induced by wounding and is inactive against endogenous proteases from C. papaya. LSPI belongs to the miraculin family of taste-modifying proteins, which are active against serine proteases. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23371); members share this curated model.
