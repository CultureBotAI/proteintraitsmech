identifier: CDD:cd18458
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like ECH-associated protein 1 (KEAP1). KEAP1, also termed cytosolic inhibitor of Nrf2 (INrf2), or Kelch-like protein 19 (KLHL19), is a redox-regulated substrate adaptor protein for a Cullin3-dependent ubiquitin ligase complex that targets NFE2L2/NRF2 for ubiquitination and degradation by the proteasome, thus resulting in the suppression of its transcriptional activity and the repression of antioxidant response element-mediated detoxifying enzyme gene expression."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like ECH-associated protein 1 (KEAP1). KEAP1, also termed cytosolic inhibitor of Nrf2 (INrf2), or Kelch-like protein 19 (KLHL19), is a redox-regulated substrate adaptor protein for a Cullin3-dependent ubiquitin ligase complex that targets NFE2L2/NRF2 for ubiquitination and degradation by the proteasome, thus resulting in the suppression of its transcriptional activity and the repression of antioxidant response element-mediated detoxifying enzyme gene expression. — an NCBI CDD conserved domain (cd18458); members share this curated model.
