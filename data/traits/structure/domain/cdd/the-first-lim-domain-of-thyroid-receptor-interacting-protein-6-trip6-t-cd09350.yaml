identifier: CDD:cd09350
label: "The first LIM domain of Thyroid receptor-interacting protein 6 (TRIP6). The first LIM domain of Thyroid receptor-interacting protein 6 (TRIP6): TRIP6 is a member of the zyxin LIM protein family and contains three LIM zinc-binding domains at the C-terminal. TRIP6 protein localizes to focal adhesion sites and along actin stress fibers. Recruitment of this protein to the plasma membrane occurs in a lysophosphatidic acid (LPA)-dependent manner. TRIP6 recruits a number of molecules involved in actin assembly, cell motility, survival and transcriptional control. The function of TRIP6 in cell motility is regulated by Src-dependent phosphorylation at a Tyr residue. The phosphorylation activates the coupling to the Crk SH2 domain, which is required for the function of TRIP6 in promoting lysophosphatidic acid (LPA)-induced cell migration. TRIP6 can shuttle to the nucleus to serve as a coactivator of AP-1 and NF-kappaB transcriptional factors. Moreover, TRIP6 can form a ternary complex with the NHERF2 PDZ protein and LPA2 receptor to regulate LPA-induced activation of ERK and AKT, rendering cells resistant to chemotherapy. Recent evidence shows that TRIP6 antagonizes Fas-Induced apoptosis by enhancing the antiapoptotic effect of LPA in cells. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein."
definition: >-
  The first LIM domain of Thyroid receptor-interacting protein 6 (TRIP6). The first LIM domain of Thyroid receptor-interacting protein 6 (TRIP6): TRIP6 is a member of the zyxin LIM protein family and contains three LIM zinc-binding domains at the C-terminal. TRIP6 protein localizes to focal adhesion sites and along actin stress fibers. Recruitment of this protein to the plasma membrane occurs in a lysophosphatidic acid (LPA)-dependent manner. TRIP6 recruits a number of molecules involved in actin assembly, cell motility, survival and transcriptional control. The function of TRIP6 in cell motility is regulated by Src-dependent phosphorylation at a Tyr residue. The phosphorylation activates the coupling to the Crk SH2 domain, which is required for the function of TRIP6 in promoting lysophosphatidic acid (LPA)-induced cell migration. TRIP6 can shuttle to the nucleus to serve as a coactivator of AP-1 and NF-kappaB transcriptional factors. Moreover, TRIP6 can form a ternary complex with the NHERF2 PDZ protein and LPA2 receptor to regulate LPA-induced activation of ERK and AKT, rendering cells resistant to chemotherapy. Recent evidence shows that TRIP6 antagonizes Fas-Induced apoptosis by enhancing the antiapoptotic effect of LPA in cells. As in other LIM domains, this domain family is 50-60 amino acids in size and shares two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein. — an NCBI CDD conserved domain (cd09350); members share this curated model.
