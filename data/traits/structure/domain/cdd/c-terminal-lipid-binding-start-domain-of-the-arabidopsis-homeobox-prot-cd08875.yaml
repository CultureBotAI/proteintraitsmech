identifier: CDD:cd08875
label: "C-terminal lipid-binding START domain of the Arabidopsis homeobox protein GLABRA 2 and related proteins. This subfamily includes the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domains of the Arabidopsis homeobox protein GLABRA 2 and related proteins. The START domain family belongs to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. Most proteins in this subgroup contain an N-terminal homeobox DNA-binding domain, some contain a leucine zipper. ArGLABRA2 plays a role in the differentiation of hairless epidermal cells of the Arabidopsis root. It acts in a cell-position-dependent manner to suppress root hair formation in those cells."
definition: >-
  C-terminal lipid-binding START domain of the Arabidopsis homeobox protein GLABRA 2 and related proteins. This subfamily includes the steroidogenic acute regulatory protein (StAR)-related lipid transfer (START) domains of the Arabidopsis homeobox protein GLABRA 2 and related proteins. The START domain family belongs to the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. Most proteins in this subgroup contain an N-terminal homeobox DNA-binding domain, some contain a leucine zipper. ArGLABRA2 plays a role in the differentiation of hairless epidermal cells of the Arabidopsis root. It acts in a cell-position-dependent manner to suppress root hair formation in those cells. — an NCBI CDD conserved domain (cd08875); members share this curated model.
