identifier: CDD:cd17413
label: "NRT1/PTR family (NPF), subfamily 6 of the Major Facilitator Superfamily of transporters. The plant Nitrate transporter 1/Peptide transporter (NRT1/PTR) family (NPF) is related to the POT (proton-coupled oligopeptide transporter), Peptide transporter (PepT/PTR), or Solute Carrier 15 (SLC15) family in animals. In contrast to related animal and bacterial counterparts, the plant proteins transport a wide variety of substrates including nitrate, peptides, amino acids, dicarboxylates, glucosinolates, as well as the plant hormones indole-3-acetic acid (IAA) and abscisic acid (ABA). A recent study identified eight subfamilies within this family, named NPF1-NPF8. NPF6 includes the first identified member of the NRT1/PTR family: Arabidopsis thaliana NRT1.1, now called AtNPF6.3. It is a dual affinity nitrate influx transporter and a nitrate sensor. It also transports auxin and has nitrate efflux activity. NPF6 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  NRT1/PTR family (NPF), subfamily 6 of the Major Facilitator Superfamily of transporters. The plant Nitrate transporter 1/Peptide transporter (NRT1/PTR) family (NPF) is related to the POT (proton-coupled oligopeptide transporter), Peptide transporter (PepT/PTR), or Solute Carrier 15 (SLC15) family in animals. In contrast to related animal and bacterial counterparts, the plant proteins transport a wide variety of substrates including nitrate, peptides, amino acids, dicarboxylates, glucosinolates, as well as the plant hormones indole-3-acetic acid (IAA) and abscisic acid (ABA). A recent study identified eight subfamilies within this family, named NPF1-NPF8. NPF6 includes the first identified member of the NRT1/PTR family: Arabidopsis thaliana NRT1.1, now called AtNPF6.3. It is a dual affinity nitrate influx transporter and a nitrate sensor. It also transports auxin and has nitrate efflux activity. NPF6 belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17413); members share this curated model.
