identifier: CDD:cd08152
label: "Catalase-like heme-binding proteins similar to the uncharacterized y4iL. Catalase is a ubiquitous enzyme found in both prokaryotes and eukaryotes involved in the protection of cells from the toxic effects of peroxides. It catalyses the conversion of hydrogen peroxide to water and molecular oxygen. Several other related protein families share the catalase fold and bind to heme, but do not necessarily have catalase activity.  This family contains uncharacterized proteins similar to Rhizobium sp. NGR234 y4iL, of mostly bacterial origin."
definition: >-
  Catalase-like heme-binding proteins similar to the uncharacterized y4iL. Catalase is a ubiquitous enzyme found in both prokaryotes and eukaryotes involved in the protection of cells from the toxic effects of peroxides. It catalyses the conversion of hydrogen peroxide to water and molecular oxygen. Several other related protein families share the catalase fold and bind to heme, but do not necessarily have catalase activity. This family contains uncharacterized proteins similar to Rhizobium sp. NGR234 y4iL, of mostly bacterial origin. — an NCBI CDD conserved domain (cd08152); members share this curated model.
