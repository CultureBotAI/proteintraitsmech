identifier: CDD:cd20523
label: "cyclin box found in the cyclin-G (CCNG) family. The CCNG family includes two cyclins, CCNG1 and CCNG2. CCNG1 is the only cyclin that has either positive or negative effects on cell growth. It is associated with G2/M phase arrest in response to DNA damage. It is also involved in the development of human carcinoma. CCNG2 may play a role in growth regulation and in negative regulation of cell cycle progression. It has been identified as a tumor suppressor in several cancers. Members of this family contain one cyclin box. The cyclin box is a protein binding domain."
definition: >-
  cyclin box found in the cyclin-G (CCNG) family. The CCNG family includes two cyclins, CCNG1 and CCNG2. CCNG1 is the only cyclin that has either positive or negative effects on cell growth. It is associated with G2/M phase arrest in response to DNA damage. It is also involved in the development of human carcinoma. CCNG2 may play a role in growth regulation and in negative regulation of cell cycle progression. It has been identified as a tumor suppressor in several cancers. Members of this family contain one cyclin box. The cyclin box is a protein binding domain. — an NCBI CDD conserved domain (cd20523); members share this curated model.
