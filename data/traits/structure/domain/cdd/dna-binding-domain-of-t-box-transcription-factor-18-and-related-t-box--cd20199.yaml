identifier: CDD:cd20199
label: "DNA-binding domain of T-box transcription factor 18 and related T-box proteins. TBX18 acts as a transcription repressor involved in the developmental processes of a variety of tissues and organs, including the ureter, vertebral column. epicardium and coronary vessels. TBX18 is important for the development of the head portion of the sino atrial node (SAN); SAN is the pacemaker region of the heart that initiates each heartbeat. This subgroup belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of T-box transcription factor 18 and related T-box proteins. TBX18 acts as a transcription repressor involved in the developmental processes of a variety of tissues and organs, including the ureter, vertebral column. epicardium and coronary vessels. TBX18 is important for the development of the head portion of the sino atrial node (SAN); SAN is the pacemaker region of the heart that initiates each heartbeat. This subgroup belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20199); members share this curated model.
