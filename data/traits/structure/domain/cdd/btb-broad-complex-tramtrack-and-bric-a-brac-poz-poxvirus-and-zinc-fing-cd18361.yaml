identifier: CDD:cd18361
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins, KCTD1 and KCTD15. This subfamily of KCTD proteins includes KCTD1 and KCTD15. KCTD1 is a nuclear BTB/POZ domain-containing protein that acts as a transcriptional repressor and mediates protein-protein interactions through a BTB domain. It represses the transcriptional activity of AP-2 family members, including TFAP2A, TFAP2B and TFAP2C. It also functions as a novel inhibitor of the Wnt signaling pathway. Mutations in KCTD1 cause scalp-ear-nipple (SEN) syndrome. KCTD15 is a BTB/POZ domain-containing protein that plays a role in the regulation of neural crest (NC) formation and other steps in embryonic development. It inhibits AP2 transcriptional activity by interaction with its activation domain. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD1 BTB domains form pentamers."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in potassium channel tetramerization domain-containing proteins, KCTD1 and KCTD15. This subfamily of KCTD proteins includes KCTD1 and KCTD15. KCTD1 is a nuclear BTB/POZ domain-containing protein that acts as a transcriptional repressor and mediates protein-protein interactions through a BTB domain. It represses the transcriptional activity of AP-2 family members, including TFAP2A, TFAP2B and TFAP2C. It also functions as a novel inhibitor of the Wnt signaling pathway. Mutations in KCTD1 cause scalp-ear-nipple (SEN) syndrome. KCTD15 is a BTB/POZ domain-containing protein that plays a role in the regulation of neural crest (NC) formation and other steps in embryonic development. It inhibits AP2 transcriptional activity by interaction with its activation domain. The BTB/POZ domain, also known as tetramerization (T1) domain, is a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. The KCTD1 BTB domains form pentamers. — an NCBI CDD conserved domain (cd18361); members share this curated model.
