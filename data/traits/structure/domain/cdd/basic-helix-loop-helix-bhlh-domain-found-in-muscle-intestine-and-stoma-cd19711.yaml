identifier: CDD:cd19711
label: "basic helix-loop-helix (bHLH) domain found in muscle, intestine and stomach expression 1 (MIST-1) and similar proteins. MIST-1, also termed Class A basic helix-loop-helix protein 15 (bHLHa15), or Class B basic helix-loop-helix protein 8 (bHLHb8), is a bHLH transcription factor expressed in pancreatic acinar cells and other serous exocrine cells. It is essential for cytoskeletal organization and secretory activity. It also functions as a potent endoplasmic reticulum (ER) stress-inducible transcriptional regulator. MIST-1 is capable of binding to E-box (CANNTG) motifs as a homodimer or a heterodimer with E-proteins (E12 and E47) to regulate transcription."
definition: >-
