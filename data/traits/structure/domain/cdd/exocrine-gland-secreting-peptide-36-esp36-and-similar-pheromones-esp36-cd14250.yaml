identifier: CDD:cd14250
label: "Exocrine gland-secreting peptide 36 (ESP36) and similar pheromones. ESP36 is a peptide pheromone expressed only in the female mouse extraorbital lacrimal gland. This family also includes the juvenile pheromone ESP22 which is secreted from the lacrimal gland and released into the tears of 2-3 week old mice. ESP22 activates the vomeronasal response pathway, and inhibits male sexual behavior. This small family appears restricted to rodents; the functions of other members have not yet been determined."
definition: >-
  Exocrine gland-secreting peptide 36 (ESP36) and similar pheromones. ESP36 is a peptide pheromone expressed only in the female mouse extraorbital lacrimal gland. This family also includes the juvenile pheromone ESP22 which is secreted from the lacrimal gland and released into the tears of 2-3 week old mice. ESP22 activates the vomeronasal response pathway, and inhibits male sexual behavior. This small family appears restricted to rodents; the functions of other members have not yet been determined. — an NCBI CDD conserved domain (cd14250); members share this curated model.
