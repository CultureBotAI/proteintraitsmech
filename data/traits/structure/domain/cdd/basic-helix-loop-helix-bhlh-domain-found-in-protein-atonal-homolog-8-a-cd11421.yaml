identifier: CDD:cd11421
label: "basic helix-loop-helix (bHLH) domain found in protein atonal homolog 8 (ATOH8) and similar proteins. ATOH8, also termed Class A basic helix-loop-helix protein 21 (bHLHa21), or helix-loop-helix protein hATH-6 (hATH6), is a bHLH shear-stress-responsive transcription factor expressed in activated satellite cells and proliferating myoblasts of human skeletal muscle tissue. It regulates endothelial cell proliferation, migration and tube-like structures formation. ATOH8 binds a palindromic (canonical) core consensus DNA sequence 5'-CANNTG- 3' known as an E-box element, possibly as a heterodimer with other bHLH proteins."
definition: >-
  basic helix-loop-helix (bHLH) domain found in protein atonal homolog 8 (ATOH8) and similar proteins. ATOH8, also termed Class A basic helix-loop-helix protein 21 (bHLHa21), or helix-loop-helix protein hATH-6 (hATH6), is a bHLH shear-stress-responsive transcription factor expressed in activated satellite cells and proliferating myoblasts of human skeletal muscle tissue. It regulates endothelial cell proliferation, migration and tube-like structures formation. ATOH8 binds a palindromic (canonical) core consensus DNA sequence 5'-CANNTG- 3' known as an E-box element, possibly as a heterodimer with other bHLH proteins. — an NCBI CDD conserved domain (cd11421); members share this curated model.
