identifier: CDD:cd18984
label: "chromo barrel domain of Drosophila melanogaster males-absent on the first protein, and similar proteins. This subgroup includes the chromo barrel domain of Drosophila melanogaster males-absent on the first (MOF) protein. The histone H4 lysine 16 (H4K16)-specific acetyltransferase MOF is part of two distinct complexes involved in X chromosome dosage compensation and autosomal transcription regulation. Its chromobarrel domain is essential for H4K16 acetylation throughout the Drosophila genome and controls spreading of the male-specific lethal (MSL) complex on the X chromosome. SH3-fold-beta-barrel domains of the chromo-like superfamily include chromodomains, chromo shadow domains, and chromo barrel domains, and are implicated in the recognition of lysine-methylated histone tails and nucleic acids. The chromodomain differs, in that it lacks the first strand of the SH3-fold-beta-barrel. This first strand is altered by insertion in the chromo shadow domains, and chromo barrel domains are typical SH3-fold-beta-barrel domains with sequence similarity to the canonical chromodomain. The MOF-like chromo barrels may be may be auto-inhibited, i.e. they seem to have occluded peptide binding sites."
definition: >-
  chromo barrel domain of Drosophila melanogaster males-absent on the first protein, and similar proteins. This subgroup includes the chromo barrel domain of Drosophila melanogaster males-absent on the first (MOF) protein. The histone H4 lysine 16 (H4K16)-specific acetyltransferase MOF is part of two distinct complexes involved in X chromosome dosage compensation and autosomal transcription regulation. Its chromobarrel domain is essential for H4K16 acetylation throughout the Drosophila genome and controls spreading of the male-specific lethal (MSL) complex on the X chromosome. SH3-fold-beta-barrel domains of the chromo-like superfamily include chromodomains, chromo shadow domains, and chromo barrel domains, and are implicated in the recognition of lysine-methylated histone tails and nucleic acids. The chromodomain differs, in that it lacks the first strand of the SH3-fold-beta-barrel. This first strand is altered by insertion in the chromo shadow domains, and chromo barrel domains are typical SH3-fold-beta-barrel domains with sequence similarity to the canonical chromodomain. The MOF-like chromo barrels may be may be auto-inhibited, i.e. they seem to have occluded peptide binding sites. — an NCBI CDD conserved domain (cd18984); members share this curated model.
