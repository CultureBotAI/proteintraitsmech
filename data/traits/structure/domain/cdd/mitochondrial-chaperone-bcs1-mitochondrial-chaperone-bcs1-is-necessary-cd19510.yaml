identifier: CDD:cd19510
label: "Mitochondrial chaperone BCS1. Mitochondrial chaperone BCS1 is necessary for the assembly of mitochondrial respiratory chain complex III and plays an important role in the maintenance of mitochondrial tubular networks, respiratory chain assembly and formation of the LETM1 complex. RecA-like NTPases. This family includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. This group also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
  Mitochondrial chaperone BCS1. Mitochondrial chaperone BCS1 is necessary for the assembly of mitochondrial respiratory chain complex III and plays an important role in the maintenance of mitochondrial tubular networks, respiratory chain assembly and formation of the LETM1 complex. RecA-like NTPases. This family includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. This group also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion. — an NCBI CDD conserved domain (cd19510); members share this curated model.
