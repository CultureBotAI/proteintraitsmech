identifier: CDD:cd07637
label: "The Bin/Amphiphysin/Rvs (BAR) domain of ArfGAP with Coiled-coil, ANK repeat and PH domain containing protein 3. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions. ACAP3 (ArfGAP with Coiled-coil, ANK repeat and PH domain containing protein 3), also called centaurin beta-5, is presumed to be an Arf GTPase activating protein (GAP) based on its similarity to the Arf6-specific GAPs ACAP1 and ACAP2. The specific function of ACAP3 is still unknown. ACAP3 contains an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, an Arf GAP domain, and C-terminal ankyrin (ANK) repeats. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions."
definition: >-
