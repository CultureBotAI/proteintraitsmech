identifier: CDD:cd19406
label: "transforming growth factor beta (TGF-beta) like domain found in inhibin beta C chain (INHBC), inhibin beta E chain (INHBE) and similar proteins. The family includes INHBC and INHBE. INHBC, also termed activin beta-C chain, might play important roles in carcinogenesis. It may function as a negative regulator of liver growth. INHBE, also termed activin beta-E chain, is a possible insulin resistance-associated hepatokine with hepatic gene expression that positively correlated with insulin resistance and body mass index in humans. It also acts as a possible new marker for drug-induced endoplasmic reticulum stress."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in inhibin beta C chain (INHBC), inhibin beta E chain (INHBE) and similar proteins. The family includes INHBC and INHBE. INHBC, also termed activin beta-C chain, might play important roles in carcinogenesis. It may function as a negative regulator of liver growth. INHBE, also termed activin beta-E chain, is a possible insulin resistance-associated hepatokine with hepatic gene expression that positively correlated with insulin resistance and body mass index in humans. It also acts as a possible new marker for drug-induced endoplasmic reticulum stress. — an NCBI CDD conserved domain (cd19406); members share this curated model.
