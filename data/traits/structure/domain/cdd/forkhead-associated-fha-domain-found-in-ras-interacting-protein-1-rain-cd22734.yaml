identifier: CDD:cd22734
label: "forkhead associated (FHA) domain found in Ras-interacting protein 1 (Rain). Rain, also called Rasip1, is an endothelial-specific Ras-interacting protein required for the proper formation of vascular structures that develop via both vasculogenesis and angiogenesis. It acts as a critical and vascular-specific regulator of GTPase signaling, cell architecture, and adhesion, which is essential for endothelial cell morphogenesis and blood vessel tubulogenesis. Rain interacts with Ras in a GTP-dependent manner and may serve as an effector for endomembrane-associated Ras. It contains an FHA domain. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in Ras-interacting protein 1 (Rain). Rain, also called Rasip1, is an endothelial-specific Ras-interacting protein required for the proper formation of vascular structures that develop via both vasculogenesis and angiogenesis. It acts as a critical and vascular-specific regulator of GTPase signaling, cell architecture, and adhesion, which is essential for endothelial cell morphogenesis and blood vessel tubulogenesis. Rain interacts with Ras in a GTP-dependent manner and may serve as an effector for endomembrane-associated Ras. It contains an FHA domain. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22734); members share this curated model.
