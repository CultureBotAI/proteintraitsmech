identifier: CDD:cd19905
label: "double-stranded RNA binding motif of adenosine deaminase domain-containing protein 1 (ADAD1) and similar proteins. ADAD1 (also known as testis nuclear RNA-binding protein (TENR)) is phylogenetically related to a family of adenosine deaminases involved in RNA editing. It plays an essential function in spermatid morphogenesis. It may be involved in testis-specific nuclear post-transcriptional processes such as heterogeneous nuclear RNA (hnRNA) packaging, alternative splicing, or nuclear/cytoplasmic transport of mRNAs. ADAD1 contains a double-stranded RNA binding motif (DSRM) and a C-terminal adenosine-deaminase (editase) domain. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of adenosine deaminase domain-containing protein 1 (ADAD1) and similar proteins. ADAD1 (also known as testis nuclear RNA-binding protein (TENR)) is phylogenetically related to a family of adenosine deaminases involved in RNA editing. It plays an essential function in spermatid morphogenesis. It may be involved in testis-specific nuclear post-transcriptional processes such as heterogeneous nuclear RNA (hnRNA) packaging, alternative splicing, or nuclear/cytoplasmic transport of mRNAs. ADAD1 contains a double-stranded RNA binding motif (DSRM) and a C-terminal adenosine-deaminase (editase) domain. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19905); members share this curated model.
