identifier: CDD:cd12932
label: "RRP7 domain ribosomal RNA-processing protein 7 (Rrp7p), ribosomal RNA-processing protein 7 homolog A (Rrp7A), and similar proteins. This CD corresponds to the RRP7 domain of Rrp7p and Rrp7A. Rrp7p is encoded by YCL031C gene from Saccharomyces cerevisiae. It is an essential yeast protein involved in pre-rRNA processing and ribosome assembly, and is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle. Rrp7A, also termed gastric cancer antigen Zg14, is the Rrp7p homolog mainly found in Metazoans. The cellular function of Rrp7A remains unclear currently. Both Rrp7p and Rrp7A harbor an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal RRP7 domain."
definition: >-
  RRP7 domain ribosomal RNA-processing protein 7 (Rrp7p), ribosomal RNA-processing protein 7 homolog A (Rrp7A), and similar proteins. This CD corresponds to the RRP7 domain of Rrp7p and Rrp7A. Rrp7p is encoded by YCL031C gene from Saccharomyces cerevisiae. It is an essential yeast protein involved in pre-rRNA processing and ribosome assembly, and is speculated to be required for correct assembly of rpS27 into the pre-ribosomal particle. Rrp7A, also termed gastric cancer antigen Zg14, is the Rrp7p homolog mainly found in Metazoans. The cellular function of Rrp7A remains unclear currently. Both Rrp7p and Rrp7A harbor an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), and a C-terminal RRP7 domain. — an NCBI CDD conserved domain (cd12932); members share this curated model.
