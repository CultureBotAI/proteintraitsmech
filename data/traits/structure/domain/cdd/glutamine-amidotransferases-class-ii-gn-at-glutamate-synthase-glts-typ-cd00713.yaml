identifier: CDD:cd00713
label: "Glutamine amidotransferases class-II (Gn-AT), glutamate synthase (GltS)-type. GltS is a homodimer that synthesizes L-glutamate from 2-oxoglutarate and L-glutamine, an important step in ammonia assimilation in bacteria, cyanobacteria and plants. The N-terminal glutaminase domain catalyzes the hydrolysis of glutamine to glutamic acid and ammonia, and has a fold similar to that of other glutamine amidotransferases such as glucosamine-fructose 6-phosphate synthase (GLMS or GFAT), glutamine phosphoribosylpyrophosphate (Prpp) amidotransferase (GPATase), asparagine synthetase B (AsnB), and beta lactam synthetase (beta-LS), as well as the Ntn hydrolase folds of the proteasomal alpha and beta subunits."
definition: >-
  Glutamine amidotransferases class-II (Gn-AT), glutamate synthase (GltS)-type. GltS is a homodimer that synthesizes L-glutamate from 2-oxoglutarate and L-glutamine, an important step in ammonia assimilation in bacteria, cyanobacteria and plants. The N-terminal glutaminase domain catalyzes the hydrolysis of glutamine to glutamic acid and ammonia, and has a fold similar to that of other glutamine amidotransferases such as glucosamine-fructose 6-phosphate synthase (GLMS or GFAT), glutamine phosphoribosylpyrophosphate (Prpp) amidotransferase (GPATase), asparagine synthetase B (AsnB), and beta lactam synthetase (beta-LS), as well as the Ntn hydrolase folds of the proteasomal alpha and beta subunits. — an NCBI CDD conserved domain (cd00713); members share this curated model.
