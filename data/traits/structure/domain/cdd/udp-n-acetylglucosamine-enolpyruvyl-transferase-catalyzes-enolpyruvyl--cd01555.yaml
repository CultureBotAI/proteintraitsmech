identifier: CDD:cd01555
label: "UDP-N-acetylglucosamine enolpyruvyl transferase catalyzes enolpyruvyl transfer as part of the first step in the biosynthesis of peptidoglycan, a component of the bacterial cell wall. The reaction is phosphoenolpyruvate + UDP-N-acetyl-D-glucosamine = phosphate + UDP-N-acetyl-3-(1-carboxyvinyl)-D-glucosamine. This enzyme is of interest as a potential target for anti-bacterial agents. The only other known enolpyruvyl transferase is the related 5-enolpyruvylshikimate-3-phosphate synthase."
definition: >-
  UDP-N-acetylglucosamine enolpyruvyl transferase catalyzes enolpyruvyl transfer as part of the first step in the biosynthesis of peptidoglycan, a component of the bacterial cell wall. The reaction is phosphoenolpyruvate + UDP-N-acetyl-D-glucosamine = phosphate + UDP-N-acetyl-3-(1-carboxyvinyl)-D-glucosamine. This enzyme is of interest as a potential target for anti-bacterial agents. The only other known enolpyruvyl transferase is the related 5-enolpyruvylshikimate-3-phosphate synthase. — an NCBI CDD conserved domain (cd01555); members share this curated model.
