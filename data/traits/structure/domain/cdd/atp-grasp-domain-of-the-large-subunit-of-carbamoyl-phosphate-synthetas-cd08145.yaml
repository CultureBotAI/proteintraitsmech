identifier: CDD:cd08145
label: "ATP-grasp domain of the large subunit of carbamoyl phosphate synthetase - carbamoyl phosphate synthetic component-1. ATP-grasp domain of the large subunit of carbamoyl phosphate synthetase: the carbamoyl phosphate synthetic component. Escherichia coli carbamoyl phosphate synthetase (CPS) is a heterodimer with a small and a large subunit. Small subunit carries out glutamine hydrolysis whereas the large subunit catalyzes the synthesis of carbamoyl phosphate. In addition, the large subunit provides binding sites for allosteric ligands and divalent and monovalent cations. Sequence analysis of Escherichia coli CPS shows that its large subunit is folded into two similar halves that are superimposable on each other. It appears that these two halves are the result of gene duplication event from a primitive enzyme containing kinase activity. These two halves form two distinct active sites and are referred to as carboxyphosphate and carbamoyl phosphate synthetic components of CPS. This group represents the members that form the carbamoyl phosphate synthetic component of the large subunuit of CPS. Majority of the sequences from this group are from eukaryotes and a few from archea and bacteria."
definition: >-
  ATP-grasp domain of the large subunit of carbamoyl phosphate synthetase - carbamoyl phosphate synthetic component-1. ATP-grasp domain of the large subunit of carbamoyl phosphate synthetase: the carbamoyl phosphate synthetic component. Escherichia coli carbamoyl phosphate synthetase (CPS) is a heterodimer with a small and a large subunit. Small subunit carries out glutamine hydrolysis whereas the large subunit catalyzes the synthesis of carbamoyl phosphate. In addition, the large subunit provides binding sites for allosteric ligands and divalent and monovalent cations. Sequence analysis of Escherichia coli CPS shows that its large subunit is folded into two similar halves that are superimposable on each other. It appears that these two halves are the result of gene duplication event from a primitive enzyme containing kinase activity. These two halves form two distinct active sites and are referred to as carboxyphosphate and carbamoyl phosphate synthetic components of CPS. This group represents the members that form the carbamoyl phosphate synthetic component of the large subunuit of CPS. Majority of the sequences from this group are from eukaryotes and a few from archea and bacteria. — an NCBI CDD conserved domain (cd08145); members share this curated model.
