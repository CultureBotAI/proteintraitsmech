identifier: CDD:cd18290
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in nucleus accumbens-associated protein 1 (NAC-1). NAC-1, also called BTB/POZ domain-containing protein 14B (BTBD14B), is a transcriptional repressor that contributes to tumor progression, tumor cell proliferation, and survival. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in nucleus accumbens-associated protein 1 (NAC-1). NAC-1, also called BTB/POZ domain-containing protein 14B (BTBD14B), is a transcriptional repressor that contributes to tumor progression, tumor cell proliferation, and survival. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18290); members share this curated model.
