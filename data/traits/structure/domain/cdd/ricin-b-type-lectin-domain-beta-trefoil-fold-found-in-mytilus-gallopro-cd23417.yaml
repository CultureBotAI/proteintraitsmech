identifier: CDD:cd23417
label: "ricin B-type lectin domain, beta-trefoil fold, found in Mytilus galloprovincialis lectin (MytiLec) and similar proteins. MytiLec is a D-galactose-binding lectin from the mussel Mytilus galloprovincialis with cytotoxicity against certain cancer cell types. It has hemagglutinating activity towards rabbit erythrocytes. It induces glycan-mediated cytotoxicity of human globotriaosylceramide-expressing lymphoma cells. The family also includes lectin from the mussel Mytilus californianus (MCL) and lectin from the sea mussel Crenomytilus grayanus (CGL). MCL is specific for binding D-galactose and N-Acetyl-d-galactosamine that contained carbohydrate moieties that were also inhibited by melibiose and raffinose. It can agglutinate all types of human erythrocytes, as well as rabbit red blood cells. CGL is specific for binding GalNAc/Gal-containing carbohydrate moieties. It displays antibacterial, antifungal, and antiviral activities. It also possesses anti-cancer activity through recognizing globotriose Gb3. Members of this family contain a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Mytilus galloprovincialis lectin (MytiLec) and similar proteins. MytiLec is a D-galactose-binding lectin from the mussel Mytilus galloprovincialis with cytotoxicity against certain cancer cell types. It has hemagglutinating activity towards rabbit erythrocytes. It induces glycan-mediated cytotoxicity of human globotriaosylceramide-expressing lymphoma cells. The family also includes lectin from the mussel Mytilus californianus (MCL) and lectin from the sea mussel Crenomytilus grayanus (CGL). MCL is specific for binding D-galactose and N-Acetyl-d-galactosamine that contained carbohydrate moieties that were also inhibited by melibiose and raffinose. It can agglutinate all types of human erythrocytes, as well as rabbit red blood cells. CGL is specific for binding GalNAc/Gal-containing carbohydrate moieties. It displays antibacterial, antifungal, and antiviral activities. It also possesses anti-cancer activity through recognizing globotriose Gb3. Members of this family contain a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23417); members share this curated model.
