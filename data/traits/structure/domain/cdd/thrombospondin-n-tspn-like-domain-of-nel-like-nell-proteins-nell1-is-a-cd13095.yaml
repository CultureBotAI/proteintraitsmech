identifier: CDD:cd13095
label: "Thrombospondin N (TSPN)-like domain of Nel-like (NELL) proteins. NELL1 is an extracellular protein inducing osteogenic differentiation and bone formation of osteoblastic cells. NELL2 is as a neuron-specific secreted glycoprotein. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  Thrombospondin N (TSPN)-like domain of Nel-like (NELL) proteins. NELL1 is an extracellular protein inducing osteogenic differentiation and bone formation of osteoblastic cells. NELL2 is as a neuron-specific secreted glycoprotein. The thrombospondin N, the laminin G, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13095); members share this curated model.
