identifier: CDD:cd16171
label: "arylsulfatase family, member K ....arylsulfatase k short ask flags precursor. ARSK is a lysosomal sulfatase which exhibits an acidic pH optimum for catalytic activity against arylsulfate substrates. Other names for ARSK include arylsulfatase K and TSULF. Sulfatases catalyze the hydrolysis of sulfate esters from wide range of substrates, including steroids, carbohydrates and proteins. Sulfate esters may be formed from various alcohols and amines. The biological roles of sulfatase includes the cycling of sulfur in the environment, in the degradation of sulfated glycosaminoglycans and glycolipids in the lysosome, and in remodeling sulfated glycosaminoglycans in the extracellular space. The sulfatases are essential for human metabolism. At least eight human monogenic diseases are caused by the deficiency of individual sulfatases."
