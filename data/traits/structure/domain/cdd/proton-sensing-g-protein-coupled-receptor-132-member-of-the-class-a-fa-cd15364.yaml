identifier: CDD:cd15364
label: "proton-sensing G protein-coupled receptor 132, member of the class A family of seven-transmembrane G protein-coupled receptors. The G2 accumulation receptor (G2A, also known as GPR132) is a member of the proton-sensing G-protein-coupled receptor (GPCR) family which also includes the T cell death associated gene-8 (TDAG8, GPR65) receptor, ovarian cancer G-protein receptor 1 (OGR-1, GPR68), and G-protein-coupled receptor 4 (GPR4). Proton-sensing G-protein coupled receptors sense pH of 7.6 to 6.0 and mediates a variety of biological activities in neutral and mildly acidic pH conditions, whereas the acid-sensing ionotropic ion channels typically sense strong acidic pH. G2A was originally identified as a stress-inducible receptor that causes the cell cycle arrest at G2/M phase when serum is deprived. Lysophosphatidylcholine was identified as a ligand for G2A, and whose overexpression was shown to induce cell proliferation, oncogenic transformation, and apoptosis."
definition: >-
  proton-sensing G protein-coupled receptor 132, member of the class A family of seven-transmembrane G protein-coupled receptors. The G2 accumulation receptor (G2A, also known as GPR132) is a member of the proton-sensing G-protein-coupled receptor (GPCR) family which also includes the T cell death associated gene-8 (TDAG8, GPR65) receptor, ovarian cancer G-protein receptor 1 (OGR-1, GPR68), and G-protein-coupled receptor 4 (GPR4). Proton-sensing G-protein coupled receptors sense pH of 7.6 to 6.0 and mediates a variety of biological activities in neutral and mildly acidic pH conditions, whereas the acid-sensing ionotropic ion channels typically sense strong acidic pH. G2A was originally identified as a stress-inducible receptor that causes the cell cycle arrest at G2/M phase when serum is deprived. Lysophosphatidylcholine was identified as a ligand for G2A, and whose overexpression was shown to induce cell proliferation, oncogenic transformation, and apoptosis. — an NCBI CDD conserved domain (cd15364); members share this curated model.
