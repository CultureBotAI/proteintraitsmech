identifier: CDD:cd22574
label: "C-terminal histone fold domain of Saccharomyces cerevisiae co-purified with NNF1 protein 1 (CNN1). Cnn1, also called CENP-T homolog, or constitutive centromere-associated network protein Cnn1, is a component of the inner kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. Cnn1 is important for the recruitment of the outer kinetochore Ndc80 complex. The model corresponds to the C-terminal histone fold domain of Cnn1, which interacts with Wip1 to form a heterodimer. In budding yeast, the Cnn1-Wip1 heterodimer associated with the Ctf3 complex (Ctf3c) to form a sub-complex of the larger Ctf19 complex (Ctf19c)."
definition: >-
  C-terminal histone fold domain of Saccharomyces cerevisiae co-purified with NNF1 protein 1 (CNN1). Cnn1, also called CENP-T homolog, or constitutive centromere-associated network protein Cnn1, is a component of the inner kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. Cnn1 is important for the recruitment of the outer kinetochore Ndc80 complex. The model corresponds to the C-terminal histone fold domain of Cnn1, which interacts with Wip1 to form a heterodimer. In budding yeast, the Cnn1-Wip1 heterodimer associated with the Ctf3 complex (Ctf3c) to form a sub-complex of the larger Ctf19 complex (Ctf19c). — an NCBI CDD conserved domain (cd22574); members share this curated model.
