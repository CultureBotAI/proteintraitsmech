identifier: CDD:cd21391
label: "HDD domain of DNA damage-inducible protein Ddi1. HDD domain of Ddi1 is similar to DNA-binding domains from transcriptional regulators and could play a role in substrate recognition. Ddi1 belongs to a group of shuttle proteins that deliver polyubiquitinated cargoes for degradation due to their ability to interact with the proteasome through their ubiquitin-like (UbL) domain and at the same time with ubiquitinated substrates through their ubiquitin associated domains(s) (UBA). Ddi1 has roles in cell cycle, growth control and protein trafficking."
definition: >-
  HDD domain of DNA damage-inducible protein Ddi1. HDD domain of Ddi1 is similar to DNA-binding domains from transcriptional regulators and could play a role in substrate recognition. Ddi1 belongs to a group of shuttle proteins that deliver polyubiquitinated cargoes for degradation due to their ability to interact with the proteasome through their ubiquitin-like (UbL) domain and at the same time with ubiquitinated substrates through their ubiquitin associated domains(s) (UBA). Ddi1 has roles in cell cycle, growth control and protein trafficking. — an NCBI CDD conserved domain (cd21391); members share this curated model.
