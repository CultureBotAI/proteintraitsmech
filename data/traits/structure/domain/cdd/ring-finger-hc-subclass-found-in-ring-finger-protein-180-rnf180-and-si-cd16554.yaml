identifier: CDD:cd16554
label: "RING finger, HC subclass, found in RING finger protein 180 (RNF180) and similar proteins. RNF180, also known as Rines, is a membrane-bound E3 ubiquitin-protein ligase well conserved among vertebrates. It is a critical regulator of the monoaminergic system, as well as emotional and social behavior. It interacts with brain monoamine oxidase A (MAO-A) and targets it for ubiquitination and degradation. It also functions as a novel tumor suppressor in gastric carcinogenesis. The hypermethylated CpG site count of the RNF180 DNA promoter can be used to predict survival of gastric cancer. RNF180 contains a novel conserved dual specificity protein phosphatase Rines conserved (DSPRC) domain, a basic coiled-coil domain, a C3HC4-type RING-HC finger, and a C-terminal hydrophobic region that is predicted to be a transmembrane domain."
definition: >-
