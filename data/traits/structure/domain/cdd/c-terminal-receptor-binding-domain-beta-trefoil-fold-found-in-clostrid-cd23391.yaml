identifier: CDD:cd23391
label: "C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type B (BoNT/D), C/D mosaic serotype (BoNT/CD) and similar proteins. BoNT/D, also called bontoxilysin-D, is botulinum toxin that causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of the eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. BoNT/D activity is inhibited by GT1b. The protein receptor for BoNT/D has yet to be definitively proven. BoNT/CD is a BoNT subtype that is essentially a hybrid of the BoNT/C (about two-thirds) and BoNT/D (about one-third) serotypes. Both BoNT/D and BoNT/CD comprise three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type B (BoNT/D), C/D mosaic serotype (BoNT/CD) and similar proteins. BoNT/D, also called bontoxilysin-D, is botulinum toxin that causes flaccid paralysis by inhibiting neurotransmitter (acetylcholine) release from the presynaptic membranes of nerve terminals of the eukaryotic host skeletal and autonomic nervous system, with frequent heart or respiratory failure. BoNT/D activity is inhibited by GT1b. The protein receptor for BoNT/D has yet to be definitively proven. BoNT/CD is a BoNT subtype that is essentially a hybrid of the BoNT/C (about two-thirds) and BoNT/D (about one-third) serotypes. Both BoNT/D and BoNT/CD comprise three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23391); members share this curated model.
