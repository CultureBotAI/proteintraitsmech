identifier: CDD:cd15796
label: "Cell-wall inhibitor of beta fructosidase and similar proteins. Cell-wall invertases (CWIs) are secreted apoplastic enzymes belonging to the glycoside hydrolase family 32 (EC 3.2.1.26) that catalyze the hydrolytic cleavage of the disaccharide sucrose into glucose and fructose. Their activity is tightly regulated by compartment-specific inhibitor proteins at transcriptional and post-transcriptional levels.  Invertase inhibitors are structurally similar to those of pectin methylesterase (PMEIs), an enzyme that is involved in the control of pectin metabolism and is structurally unrelated to invertases. All inhibitors share a size of about 18 kDa, two strictly conserved disulfide bridges and only moderate sequence homology (about 20% sequence identity). Interaction of invertase inhibitor Nt-CIF (Nicotiana tabacum cell-wall inhibitor of beta-fructosidase) with CWI is strictly pH-dependent, modulated between pH 4 and 6, with rapid dissociation at neutral pH mediated by structure rearrangement or surface charge pattern in the binding interface. Comparison of the CIF/INV1 structure with the complex between the structurally CIF-related pectin methylesterase inhibitor (PMEI) and pectin methylesterase indicates a common targeting mechanism in PMEI and CIF."
definition: >-
  Cell-wall inhibitor of beta fructosidase and similar proteins. Cell-wall invertases (CWIs) are secreted apoplastic enzymes belonging to the glycoside hydrolase family 32 (EC 3.2.1.26) that catalyze the hydrolytic cleavage of the disaccharide sucrose into glucose and fructose. Their activity is tightly regulated by compartment-specific inhibitor proteins at transcriptional and post-transcriptional levels. Invertase inhibitors are structurally similar to those of pectin methylesterase (PMEIs), an enzyme that is involved in the control of pectin metabolism and is structurally unrelated to invertases. All inhibitors share a size of about 18 kDa, two strictly conserved disulfide bridges and only moderate sequence homology (about 20% sequence identity). Interaction of invertase inhibitor Nt-CIF (Nicotiana tabacum cell-wall inhibitor of beta-fructosidase) with CWI is strictly pH-dependent, modulated between pH 4 and 6, with rapid dissociation at neutral pH mediated by structure rearrangement or surface charge pattern in the binding interface. Comparison of the CIF/INV1 structure with the complex between the structurally CIF-related pectin methylesterase inhibitor (PMEI) and pectin methylesterase indicates a common targeting mechanism in PMEI and CIF. — an NCBI CDD conserved domain (cd15796); members share this curated model.
