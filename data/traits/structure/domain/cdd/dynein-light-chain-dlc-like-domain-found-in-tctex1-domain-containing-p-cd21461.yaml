identifier: CDD:cd21461
label: "dynein light chain (DLC)-like domain found in Tctex1 domain-containing protein 4 (TCTEX1D4) and similar proteins. Tctex1 domain-containing protein 4 (TCTEX1D4), also called protein N22.1, or Tctex-2-beta, is a novel protein phosphatase 1 (PPP1) interactor. It also interacts with ENG/endoglin, TGFBR2 and TGFBR3. The distribution of TCTEX1D4 in testis suggests its involvement in distinct functions, such as TGFbeta signaling at the blood-testis barrier and acrosome cap formation. The model corresponds to the dynein light chain (DLC)-like domain of TCTEX1D4."
definition: >-
  dynein light chain (DLC)-like domain found in Tctex1 domain-containing protein 4 (TCTEX1D4) and similar proteins. Tctex1 domain-containing protein 4 (TCTEX1D4), also called protein N22.1, or Tctex-2-beta, is a novel protein phosphatase 1 (PPP1) interactor. It also interacts with ENG/endoglin, TGFBR2 and TGFBR3. The distribution of TCTEX1D4 in testis suggests its involvement in distinct functions, such as TGFbeta signaling at the blood-testis barrier and acrosome cap formation. The model corresponds to the dynein light chain (DLC)-like domain of TCTEX1D4. — an NCBI CDD conserved domain (cd21461); members share this curated model.
