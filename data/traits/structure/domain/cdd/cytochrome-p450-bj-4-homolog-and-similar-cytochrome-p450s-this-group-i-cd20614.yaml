identifier: CDD:cd20614
label: "cytochrome P450 BJ-4 homolog and similar cytochrome P450s. This group is composed of mostly uncharacterized proteins including Sinorhizobium fredii CYPBJ-4 homolog. It belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 BJ-4 homolog and similar cytochrome P450s. This group is composed of mostly uncharacterized proteins including Sinorhizobium fredii CYPBJ-4 homolog. It belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd20614); members share this curated model.
