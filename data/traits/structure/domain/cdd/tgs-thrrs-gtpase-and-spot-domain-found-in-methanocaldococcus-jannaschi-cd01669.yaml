identifier: CDD:cd01669
label: "TGS (ThrRS, GTPase and SpoT) domain found in Methanocaldococcus jannaschii uncharacterized GTP-binding protein MJ1332 and similar proteins. This family includes a group of uncharacterized GTP-binding proteins from archaea, which belong to the Obg family of GTPases. The family members contain a domain of characteristic Obg-type G-motifs that may be the core of GTPase activity, as well as a C-terminal TGS (ThrRS, GTPase and SpoT) domain that has a predominantly beta-grasp ubiquitin-like fold."
definition: >-
  TGS (ThrRS, GTPase and SpoT) domain found in Methanocaldococcus jannaschii uncharacterized GTP-binding protein MJ1332 and similar proteins. This family includes a group of uncharacterized GTP-binding proteins from archaea, which belong to the Obg family of GTPases. The family members contain a domain of characteristic Obg-type G-motifs that may be the core of GTPase activity, as well as a C-terminal TGS (ThrRS, GTPase and SpoT) domain that has a predominantly beta-grasp ubiquitin-like fold. — an NCBI CDD conserved domain (cd01669); members share this curated model.
