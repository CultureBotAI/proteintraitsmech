identifier: CDD:cd23367
label: "soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Medicago truncatula Kunitz type trypsin inhibitor 104 (KPI104) and similar proteins. This subfamily includes Medicago truncatula KPI104, KPI106, and KPI111. They are protease inhibitors involved in the control of mycorrhiza establishment and arbuscule development during root colonization by arbuscular mycorrhizal (AM) fungi (e.g. Rhizophagus irregularis). KPI104 interacts with cysteine protease (CP). It shows a stronger affinity for serine carboxypeptidase (SCP1) than for CP. KPI111 only interacts with SCP1. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  soybean trypsin inhibitor (STI)-like domain, beta-trefoil fold, found in Medicago truncatula Kunitz type trypsin inhibitor 104 (KPI104) and similar proteins. This subfamily includes Medicago truncatula KPI104, KPI106, and KPI111. They are protease inhibitors involved in the control of mycorrhiza establishment and arbuscule development during root colonization by arbuscular mycorrhizal (AM) fungi (e.g. Rhizophagus irregularis). KPI104 interacts with cysteine protease (CP). It shows a stronger affinity for serine carboxypeptidase (SCP1) than for CP. KPI111 only interacts with SCP1. Members of this subfamily contain an STI-like domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23367); members share this curated model.
