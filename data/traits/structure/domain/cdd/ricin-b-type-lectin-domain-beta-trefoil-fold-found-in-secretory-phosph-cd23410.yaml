identifier: CDD:cd23410
label: "ricin B-type lectin domain, beta-trefoil fold, found in secretory phospholipase A2 receptor (PLA2R1) and similar proteins. PLA2R1, also called PLA2-R, PLA2R, 180 kDa secretory phospholipase A2 receptor, C-type lectin domain family 13 member C (CLEC13C), or M-type receptor, is a receptor for secretory phospholipase A2 (sPLA2). It acts as a receptor for phospholipase sPLA2-IB/PLA2G1B but not sPLA2-IIA/PLA2G2A. It can also bind to snake PA2-like toxins.  It may be involved in responses in proinflammatory cytokine production during endotoxic shock. It also has endocytic properties and rapidly internalizes sPLA2 ligands, which is particularly important for the clearance of extracellular sPLA2s to protect their potent enzymatic activities. PLA2R1 contains a ricin B-type lectin domain at the N-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in secretory phospholipase A2 receptor (PLA2R1) and similar proteins. PLA2R1, also called PLA2-R, PLA2R, 180 kDa secretory phospholipase A2 receptor, C-type lectin domain family 13 member C (CLEC13C), or M-type receptor, is a receptor for secretory phospholipase A2 (sPLA2). It acts as a receptor for phospholipase sPLA2-IB/PLA2G1B but not sPLA2-IIA/PLA2G2A. It can also bind to snake PA2-like toxins. It may be involved in responses in proinflammatory cytokine production during endotoxic shock. It also has endocytic properties and rapidly internalizes sPLA2 ligands, which is particularly important for the clearance of extracellular sPLA2s to protect their potent enzymatic activities. PLA2R1 contains a ricin B-type lectin domain at the N-terminus. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. — an NCBI CDD conserved domain (cd23410); members share this curated model.
