identifier: CDD:cd20646
label: "cytochrome P450 family 27, subfamily A, polypeptide 1, also called vitamin D(3) 25-hydroxylase. Cytochrome P450 27A1 (CYP27A1, EC 1.14.15.15) is also called CYP27, cholestanetriol 26-monooxygenase, sterol 26-hydroxylase, 5-beta-cholestane-3-alpha,7-alpha,12-alpha-triol 27-hydroxylase, cytochrome P-450C27/25, sterol 27-hydroxylase, or vitamin D(3) 25-hydroxylase. It catalyzes the first step in the oxidation of the side chain of sterol intermediates, the 27-hydroxylation of 5-beta-cholestane-3-alpha,7-alpha,12-alpha-triol, and the first three sterol side chain oxidations in bile acid biosynthesis via the neutral (classic) pathway. It also hydroxylates vitamin D3 at the 25-position, as well as cholesterol at positions 24 and 25. CYP27A1 belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
