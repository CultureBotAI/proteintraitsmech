identifier: CDD:cd22972
label: "dimerization/docking (D/D) domain found in the ropporin (ROP)-like subfamily. The ROP-like family includes ropporin-1A (ROP1A, also called cancer/testis antigen 91, CT91, or rhophilin-associated protein 1A), ropporin-1B (ROP1B, also called rhophilin-associated protein 1B), and ropporin-1-like protein (ROPN1L, also called ROPN1-like protein, AKAP-associated sperm protein, or ASP), as well as Chlamydomonas reinhardtii flagellar radial spoke proteins, RSP7 and RSP11. ROP1A, ROP1B and ROPN1L play important roles in male fertility. They are involved in fibrous sheath integrity and sperm motility and play roles in cAMP-dependent protein kinase (PKA)-dependent signaling processes required for spermatozoa capacitation. RSP7 is a PKA RII-like protein. RSP11 is a non-PKA RIIa protein that contains a RII domain but lack any features required for cAMP signaling or phosphorylation. It is involved in the control of ciliary and flagellar beating. Members of this subfamily contain a conserved helical bundle domain that shows high sequence similarity to the dimerization/docking (D/D) domain of the regulatory subunit of PKA."
definition: >-
  dimerization/docking (D/D) domain found in the ropporin (ROP)-like subfamily. The ROP-like family includes ropporin-1A (ROP1A, also called cancer/testis antigen 91, CT91, or rhophilin-associated protein 1A), ropporin-1B (ROP1B, also called rhophilin-associated protein 1B), and ropporin-1-like protein (ROPN1L, also called ROPN1-like protein, AKAP-associated sperm protein, or ASP), as well as Chlamydomonas reinhardtii flagellar radial spoke proteins, RSP7 and RSP11. ROP1A, ROP1B and ROPN1L play important roles in male fertility. They are involved in fibrous sheath integrity and sperm motility and play roles in cAMP-dependent protein kinase (PKA)-dependent signaling processes required for spermatozoa capacitation. RSP7 is a PKA RII-like protein. RSP11 is a non-PKA RIIa protein that contains a RII domain but lack any features required for cAMP signaling or phosphorylation. It is involved in the control of ciliary and flagellar beating. Members of this subfamily contain a conserved helical bundle domain that shows high sequence similarity to the dimerization/docking (D/D) domain of the regulatory subunit of PKA. — an NCBI CDD conserved domain (cd22972); members share this curated model.
