identifier: CDD:cd16678
label: "second RING finger, H2 subclass, found in RING finger protein 32 (RNF32) and similar proteins. RNF32 is mainly expressed in testis spermatogenesis, most likely in spermatocytes and/or in spermatids, suggesting a possible role in sperm formation. RNF32 contains two C3H2C3-type RING-H2 fingers separated by an IQ domain of unknown function. Although the biological function of RNF32 remains unclear, proteins with double RING-H2 fingers may act as scaffolds for binding several proteins that function in the same pathway. This model corresponds to the second RING-H2 finger."
definition: >-
  second RING finger, H2 subclass, found in RING finger protein 32 (RNF32) and similar proteins. RNF32 is mainly expressed in testis spermatogenesis, most likely in spermatocytes and/or in spermatids, suggesting a possible role in sperm formation. RNF32 contains two C3H2C3-type RING-H2 fingers separated by an IQ domain of unknown function. Although the biological function of RNF32 remains unclear, proteins with double RING-H2 fingers may act as scaffolds for binding several proteins that function in the same pathway. This model corresponds to the second RING-H2 finger. — an NCBI CDD conserved domain (cd16678); members share this curated model.
