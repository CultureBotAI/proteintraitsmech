identifier: CDD:cd22096
label: "F-box domain found in F-box only protein 21 (FBXO21) and similar proteins. FBXO21, also called FBX21, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It facilitates Lys29-linkage and activation of ASK1 (apoptosis signal-regulating kinase 1) and promotes type I interferon production upon viral infection. It also polyubiquitylates EP300-interacting inhibitor of differentiation 1 (EID1) and is required for the efficient degradation of EID1 in both cycling and quiescent cells. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 21 (FBXO21) and similar proteins. FBXO21, also called FBX21, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein)-type E3 ubiquitin ligase complex. It facilitates Lys29-linkage and activation of ASK1 (apoptosis signal-regulating kinase 1) and promotes type I interferon production upon viral infection. It also polyubiquitylates EP300-interacting inhibitor of differentiation 1 (EID1) and is required for the efficient degradation of EID1 in both cycling and quiescent cells. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22096); members share this curated model.
