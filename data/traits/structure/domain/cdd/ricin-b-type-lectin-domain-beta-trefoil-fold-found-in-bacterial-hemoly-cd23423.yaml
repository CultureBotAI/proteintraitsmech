identifier: CDD:cd23423
label: "ricin B-type lectin domain, beta-trefoil fold, found in bacterial hemolysin and similar proteins. Bacterial hemolysins are exotoxins that attack blood cell membranes and cause cytolysis by forming heptameric pores in target host membranes. After binding to target membranes, the protein assembles into a heptameric pre-pore complex. Proteolytic cleavage triggers a conformation change that is required for membrane insertion and pore formation. Hemolysin may be called \"cytolysin\" or \"cytolytic toxin\", according to a specific action for certain cells. For example, this subfamily includes Vibrio vulnificus cytolysin that attack blood cell membranes and cause cell rupture, thereby liberating hemoglobins. Members of this subfamily contain a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a putative sugar-binding pocket."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in bacterial hemolysin and similar proteins. Bacterial hemolysins are exotoxins that attack blood cell membranes and cause cytolysis by forming heptameric pores in target host membranes. After binding to target membranes, the protein assembles into a heptameric pre-pore complex. Proteolytic cleavage triggers a conformation change that is required for membrane insertion and pore formation. Hemolysin may be called "cytolysin" or "cytolytic toxin", according to a specific action for certain cells. For example, this subfamily includes Vibrio vulnificus cytolysin that attack blood cell membranes and cause cell rupture, thereby liberating hemoglobins. Members of this subfamily contain a ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a putative sugar-binding pocket. — an NCBI CDD conserved domain (cd23423); members share this curated model.
