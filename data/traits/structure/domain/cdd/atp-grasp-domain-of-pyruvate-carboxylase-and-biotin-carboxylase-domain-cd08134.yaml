identifier: CDD:cd08134
label: "ATP-grasp domain of pyruvate carboxylase, and biotin carboxylase domain C. Pyruvate carboxylase (PC, EC 6.4.1.1) catalyzes the carboxylation of pyruvate to form oxaloacetate. The domain arrangement of biotin carboxylase (BC), biotin carboxyl carrier protein (BCCP), and carboxyltransferase (CT) varies in different organisms. In eukaryotes, all three domains are present on one polypeptide: N-terminal BC that binds to ATP and bicarbonate, the central pyruvate binding CT domain, and the C-terminal BCCP domain. Catalytic mechanism involves interaction between BC and BCCP domains to catalyze carboxybiotin in the presence of ATP and bicarbonate. The CT domain then transfers the carboxyl group from carboxybiotin to pyruvate to produce oxaloacetate."
definition: >-
  ATP-grasp domain of pyruvate carboxylase, and biotin carboxylase domain C. Pyruvate carboxylase (PC, EC 6.4.1.1) catalyzes the carboxylation of pyruvate to form oxaloacetate. The domain arrangement of biotin carboxylase (BC), biotin carboxyl carrier protein (BCCP), and carboxyltransferase (CT) varies in different organisms. In eukaryotes, all three domains are present on one polypeptide: N-terminal BC that binds to ATP and bicarbonate, the central pyruvate binding CT domain, and the C-terminal BCCP domain. Catalytic mechanism involves interaction between BC and BCCP domains to catalyze carboxybiotin in the presence of ATP and bicarbonate. The CT domain then transfers the carboxyl group from carboxybiotin to pyruvate to produce oxaloacetate. — an NCBI CDD conserved domain (cd08134); members share this curated model.
