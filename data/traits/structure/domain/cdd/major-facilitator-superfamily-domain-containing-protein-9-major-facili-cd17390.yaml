identifier: CDD:cd17390
label: "Major facilitator superfamily domain-containing protein 9. Major facilitator superfamily domain-containing protein 9 (MFSD9) is expressed in the central nervous system (CNS) and in most peripheral tissues but at very low expression levels. The function of MFSD9 is unknown. MFSD9 belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Major facilitator superfamily domain-containing protein 9. Major facilitator superfamily domain-containing protein 9 (MFSD9) is expressed in the central nervous system (CNS) and in most peripheral tissues but at very low expression levels. The function of MFSD9 is unknown. MFSD9 belongs to the Eukaryotic Solute carrier 46 (SLC46)/Bacterial Tetracycline resistance (TetA) -like (SLC46/TetA-like) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17390); members share this curated model.
