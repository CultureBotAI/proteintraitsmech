identifier: CDD:cd04715
label: "BAH, or Bromo Adjacent Homology domain, as present in the Schizosaccharomyces pombe homolog of Saccharomyces cerevisiae Orc1p and similar proteins. Orc1  is part of the Yeast Sir1-origin recognition complex, the Orc1p BAH doman functions in epigenetic silencing. BAH domains are found in a variety of proteins playing roles in transcriptional silencing and the remodeling of chromatin. It is assumed that in most or all of these instances the BAH domain mediates protein-protein interactions."
definition: >-
  BAH, or Bromo Adjacent Homology domain, as present in the Schizosaccharomyces pombe homolog of Saccharomyces cerevisiae Orc1p and similar proteins. Orc1 is part of the Yeast Sir1-origin recognition complex, the Orc1p BAH doman functions in epigenetic silencing. BAH domains are found in a variety of proteins playing roles in transcriptional silencing and the remodeling of chromatin. It is assumed that in most or all of these instances the BAH domain mediates protein-protein interactions. — an NCBI CDD conserved domain (cd04715); members share this curated model.
