identifier: CDD:cd20666
label: "cytochrome P450 family 2, subfamily U, polypeptide 1. CYP2U1 is a thymus- and brain-specific cytochrome P450 that catalyzes omega- and (omega-1)-hydroxylation of fatty acids such as arachidonic acid, docosahexaenoic acid, and other long chain fatty acids. Mutations in CYP2U1 are associated with hereditary spastic paraplegia (HSP), a neurological disorder, and pigmentary degenerative maculopathy associated with progressive spastic paraplegia. CYP2U1 belongs to family 2 of the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
