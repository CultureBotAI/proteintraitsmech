identifier: CDD:cd13150
label: "Histone binding domain of the death-domain associated protein (DAXX). DAXX is a nuclear protein that modulates transcription of various genes and is involved in cell death and/or the suppression of growth. DAXX is also a histone chaperone conserved in Metazoa that acts specifically on histone H3.3. This alignment models a functional domain of DAXX that interacts with the histone H3.3-H4 dimer, and in doing so competes with DNA binding and interactions between the histone chaperone ASF1/CIA and the H3-H4 dimer."
definition: >-
  Histone binding domain of the death-domain associated protein (DAXX). DAXX is a nuclear protein that modulates transcription of various genes and is involved in cell death and/or the suppression of growth. DAXX is also a histone chaperone conserved in Metazoa that acts specifically on histone H3.3. This alignment models a functional domain of DAXX that interacts with the histone H3.3-H4 dimer, and in doing so competes with DNA binding and interactions between the histone chaperone ASF1/CIA and the H3-H4 dimer. — an NCBI CDD conserved domain (cd13150); members share this curated model.
