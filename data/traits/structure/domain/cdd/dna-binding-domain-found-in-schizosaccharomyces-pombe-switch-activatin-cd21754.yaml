identifier: CDD:cd21754
label: "DNA binding domain found in Schizosaccharomyces pombe switch-activating protein 1 (Sap1) and similar proteins. Sap1 is a replication-initiation factor essential for the assembly of pre-replicative complex in the fission yeast Schizosaccharomyces pombe. It binds to sequences required for mating-type switching. It has a role in chromosome organization and integrity where it is involved in chromosome segregation. It's also involved in sister chromatid cohesion and condensation. The model corresponds to the DNA binding domain of Sap1."
definition: >-
  DNA binding domain found in Schizosaccharomyces pombe switch-activating protein 1 (Sap1) and similar proteins. Sap1 is a replication-initiation factor essential for the assembly of pre-replicative complex in the fission yeast Schizosaccharomyces pombe. It binds to sequences required for mating-type switching. It has a role in chromosome organization and integrity where it is involved in chromosome segregation. It's also involved in sister chromatid cohesion and condensation. The model corresponds to the DNA binding domain of Sap1. — an NCBI CDD conserved domain (cd21754); members share this curated model.
