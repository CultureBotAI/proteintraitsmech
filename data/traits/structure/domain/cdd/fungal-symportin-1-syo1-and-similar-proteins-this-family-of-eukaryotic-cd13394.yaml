identifier: CDD:cd13394
label: "Fungal symportin 1 (syo1) and similar proteins. This family of eukaryotic proteins includes Saccharomyces cerevisiae Ydl063c and Chaetomium thermophilum Syo1, which mediate the co-import of two ribosomal proteins, Rpl5 and Rpl11 (which both interact with 5S rRNA) into the nucleus. Import precedes their association with rRNA and subsequent ribosome assembly in the nucleolus. The primary structure of syo1 is a mixture of Armadillo- (ARM, N-terminal part of syo1) and HEAT-repeats (C-terminal part of syo1)."
definition: >-
  Fungal symportin 1 (syo1) and similar proteins. This family of eukaryotic proteins includes Saccharomyces cerevisiae Ydl063c and Chaetomium thermophilum Syo1, which mediate the co-import of two ribosomal proteins, Rpl5 and Rpl11 (which both interact with 5S rRNA) into the nucleus. Import precedes their association with rRNA and subsequent ribosome assembly in the nucleolus. The primary structure of syo1 is a mixture of Armadillo- (ARM, N-terminal part of syo1) and HEAT-repeats (C-terminal part of syo1). — an NCBI CDD conserved domain (cd13394); members share this curated model.
