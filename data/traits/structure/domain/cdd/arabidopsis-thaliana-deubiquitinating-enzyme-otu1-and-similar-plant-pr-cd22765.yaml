identifier: CDD:cd22765
label: "Arabidopsis thaliana Deubiquitinating enzyme OTU1 and similar plant proteins. This group contains plant otibain-like proteins including Oryza sativa Japonica group otubain-like deubiquitinase and Arabidopsis thaliana deubiquitinating enzyme OTU1 (AtOTU1), also called OVARIAN TUMOR DOMAIN-containing deubiquitinating enzyme 1 or OTU domain-containing protein 1. It is a deubiquitylase (DUB)/ubiquitin thioesterase (EC 3.4.19.12) that mediates the deubiquitination of protein substrates and may therefore play an important regulatory role at the level of protein turnover by preventing degradation. AtOTU1 shows a preference for Met-1 and 'Lys-48' over 'Lys-63'-linked ubiquitin tetramers as substrates. It belongs to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. It is classified as a family C65 cysteine protease by MEROPS."
definition: >-
