identifier: CDD:cd16920
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Rhizobium meliloti FixL, and Rhodobacter capsulatus DctS; includes hybrid sensor histidine kinase similar to Pseudomonas mendocina TmoS. This family includes the histidine kinase-like ATPase (HATPase) domains of various histidine kinases (HKs) of two-component signal transduction systems (TCSs), such as Pseudomonas mendocina TmoS HK of the TmoS-TmoT TCS, which controls the expression of the toluene-4-monooxygenase pathway, Rhizobium meliloti FixL HK of the FixL-FixJ TCS, which regulates the expression of the genes related to nitrogen fixation in the root nodule in response to O(2) levels, and Rhodobacter capsulatus DctS of the DctS-DctR TCS, which controls synthesis of the high-affinity C4-dicarboxylate transport system. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA) and PAS sensor domain(s); many are hybrid sensor histidine kinases as they also contain a REC signal receiver domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Rhizobium meliloti FixL, and Rhodobacter capsulatus DctS; includes hybrid sensor histidine kinase similar to Pseudomonas mendocina TmoS. This family includes the histidine kinase-like ATPase (HATPase) domains of various histidine kinases (HKs) of two-component signal transduction systems (TCSs), such as Pseudomonas mendocina TmoS HK of the TmoS-TmoT TCS, which controls the expression of the toluene-4-monooxygenase pathway, Rhizobium meliloti FixL HK of the FixL-FixJ TCS, which regulates the expression of the genes related to nitrogen fixation in the root nodule in response to O(2) levels, and Rhodobacter capsulatus DctS of the DctS-DctR TCS, which controls synthesis of the high-affinity C4-dicarboxylate transport system. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA) and PAS sensor domain(s); many are hybrid sensor histidine kinases as they also contain a REC signal receiver domain. — an NCBI CDD conserved domain (cd16920); members share this curated model.
