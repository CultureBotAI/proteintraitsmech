identifier: CDD:cd23276
label: "MIR domain, beta-trefoil fold, found in the family of dolichyl-phosphate-mannose-protein mannosyltransferase (PMT). The PMT (EC 2.4.1.109) family includes mammalian protein O-mannosyl-transferases (POMT1 and POMT2) and yeast PMT1-7. PMTs are responsible for O-linked glycosylation of proteins. They catalyze the transfer of mannose to seryl and threonyl residues of secretory proteins. Protein O-glycosylation is essential for cell wall rigidity and cell integrity. Members in this family contain a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in the family of dolichyl-phosphate-mannose-protein mannosyltransferase (PMT). The PMT (EC 2.4.1.109) family includes mammalian protein O-mannosyl-transferases (POMT1 and POMT2) and yeast PMT1-7. PMTs are responsible for O-linked glycosylation of proteins. They catalyze the transfer of mannose to seryl and threonyl residues of secretory proteins. Protein O-glycosylation is essential for cell wall rigidity and cell integrity. Members in this family contain a MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23276); members share this curated model.
