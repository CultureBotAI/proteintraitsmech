identifier: CDD:cd17228
label: "Ras-associating (RA) domain found in Arf-GAP with Rho-GAP domain, ANK repeat and PH domain-containing protein 3 (ARAP3). ARAP3, also termed Centaurin-delta-3 (Cnt-d3), is a phosphatidylinositol 3,4,5-trisphosphate (PtdIns(3,4,5)P(3))-dependent Arf Rap-activated guanosine triphosphatase (GTPase)-activating protein (GAP) that modulates actin cytoskeleton remodeling by regulating ARF and RHO family members, ADP-ribosylation factor 6 (Arf6) and Ras homolog gene family member A (RhoA). It is regulated by phosphatidylinositol 3,4,5-trisphosphate and a small GTPase Rap1-GTP, and has been implicated in the regulation of cell shape and adhesion. ARAP3 contains multiple functional domains, including ArfGAP and RhoGAP domains, as well as a sterile alpha motif (Sam) domain, five PH domains, and a RA domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub); Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes."
definition: >-
  Ras-associating (RA) domain found in Arf-GAP with Rho-GAP domain, ANK repeat and PH domain-containing protein 3 (ARAP3). ARAP3, also termed Centaurin-delta-3 (Cnt-d3), is a phosphatidylinositol 3,4,5-trisphosphate (PtdIns(3,4,5)P(3))-dependent Arf Rap-activated guanosine triphosphatase (GTPase)-activating protein (GAP) that modulates actin cytoskeleton remodeling by regulating ARF and RHO family members, ADP-ribosylation factor 6 (Arf6) and Ras homolog gene family member A (RhoA). It is regulated by phosphatidylinositol 3,4,5-trisphosphate and a small GTPase Rap1-GTP, and has been implicated in the regulation of cell shape and adhesion. ARAP3 contains multiple functional domains, including ArfGAP and RhoGAP domains, as well as a sterile alpha motif (Sam) domain, five PH domains, and a RA domain. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin (Ub); Ub is a protein modifier in eukaryotes that is involved in various cellular processes including transcriptional regulation, cell cycle control, and DNA repair in eukaryotes. — an NCBI CDD conserved domain (cd17228); members share this curated model.
