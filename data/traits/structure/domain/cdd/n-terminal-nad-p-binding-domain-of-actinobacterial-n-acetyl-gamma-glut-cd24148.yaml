identifier: CDD:cd24148
label: "N-terminal NAD(P)-binding domain of actinobacterial N-acetyl-gamma-glutamyl-phosphate reductase (actinobacAGPR) and similar proteins. AGPR (EC 1.2.1.38), also called N-acetyl-glutamate semialdehyde dehydrogenase, or NAGSA dehydrogenase, catalyzes the third step in the biosynthesis of arginine from glutamate, the NADPH-dependent reduction of N-acetyl-5-glutamyl phosphate into N-acetylglutamate 5-semialdehyde. In bacteria it is a monofunctional protein of 35 to 38kDa (gene argC). There are two related families (type 1 and type 2) of N-acetyl-gamma-glutamyl-phosphate reductase, which differ by phylogeny, similarity clustering, and gap architecture in a multiple sequence alignment. The family includes N-acetyl-gamma-glutamyl-phosphate reductases mainly from actinobacteria. They belong to the type 1 AGPR family. Members in this family contain an N-terminal Rossmann fold NAD(P)-binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain."
definition: >-
  N-terminal NAD(P)-binding domain of actinobacterial N-acetyl-gamma-glutamyl-phosphate reductase (actinobacAGPR) and similar proteins. AGPR (EC 1.2.1.38), also called N-acetyl-glutamate semialdehyde dehydrogenase, or NAGSA dehydrogenase, catalyzes the third step in the biosynthesis of arginine from glutamate, the NADPH-dependent reduction of N-acetyl-5-glutamyl phosphate into N-acetylglutamate 5-semialdehyde. In bacteria it is a monofunctional protein of 35 to 38kDa (gene argC). There are two related families (type 1 and type 2) of N-acetyl-gamma-glutamyl-phosphate reductase, which differ by phylogeny, similarity clustering, and gap architecture in a multiple sequence alignment. The family includes N-acetyl-gamma-glutamyl-phosphate reductases mainly from actinobacteria. They belong to the type 1 AGPR family. Members in this family contain an N-terminal Rossmann fold NAD(P)-binding domain and a C-terminal glyceraldehyde-3-phosphate dehydrogenase (GAPDH)-like domain. — an NCBI CDD conserved domain (cd24148); members share this curated model.
