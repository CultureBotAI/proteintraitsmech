identifier: CDD:cd23148
label: "RING finger, HC subclass, found in Saccharomyces cerevisiae radiation sensitivity protein 18 (RAD18) and similar proteins. RAD18, also called RING-type E3 ubiquitin transferase RAD18, acts as a postreplication repair E3 ubiquitin-protein ligase that associates with the E2 ubiquitin conjugating enzyme UBC2/RAD6 to form the UBC2-RAD18 ubiquitin ligase complex involved in postreplicative repair (PRR) of damaged DNA. The UBC2-RAD18 complex cooperates with RAD5 and the UBC13-MMS2 dimer to attach mono-ubiquitin chains on 'Lys-164' of POL30, which is necessary for PRR. The UBC2-RAD18 complex is also involved in prevention of spontaneous mutations caused by 7,8-dihydro-8-oxoguanine. RAD18 is an E3 RING-finger protein belonging to the UBC2/RAD6 epistasis group. It contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Saccharomyces cerevisiae radiation sensitivity protein 18 (RAD18) and similar proteins. RAD18, also called RING-type E3 ubiquitin transferase RAD18, acts as a postreplication repair E3 ubiquitin-protein ligase that associates with the E2 ubiquitin conjugating enzyme UBC2/RAD6 to form the UBC2-RAD18 ubiquitin ligase complex involved in postreplicative repair (PRR) of damaged DNA. The UBC2-RAD18 complex cooperates with RAD5 and the UBC13-MMS2 dimer to attach mono-ubiquitin chains on 'Lys-164' of POL30, which is necessary for PRR. The UBC2-RAD18 complex is also involved in prevention of spontaneous mutations caused by 7,8-dihydro-8-oxoguanine. RAD18 is an E3 RING-finger protein belonging to the UBC2/RAD6 epistasis group. It contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23148); members share this curated model.
