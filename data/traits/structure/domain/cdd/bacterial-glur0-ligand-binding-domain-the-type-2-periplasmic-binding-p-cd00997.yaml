identifier: CDD:cd00997
label: "Bacterial GluR0 ligand-binding domain; the type 2 periplasmic binding protein fold. Glutamate receptor domain GluR0. These domains are found in the GluR0 proteins that have been shown to function as prokaryotic L-glutamate activated potassium channels, also known ionotropic glutamate receptors or iGluRs. In addition to two ligand binding core domains, iGluRs typically have a channel-like domain inserted in the middle of the GluR-like domain.  The GluR0 proteins belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap."
definition: >-
  Bacterial GluR0 ligand-binding domain; the type 2 periplasmic binding protein fold. Glutamate receptor domain GluR0. These domains are found in the GluR0 proteins that have been shown to function as prokaryotic L-glutamate activated potassium channels, also known ionotropic glutamate receptors or iGluRs. In addition to two ligand binding core domains, iGluRs typically have a channel-like domain inserted in the middle of the GluR-like domain. The GluR0 proteins belong to the PBP2 superfamily of periplasmic binding proteins that differ in size and ligand specificity, but have similar tertiary structures consisting of two globular subdomains connected by a flexible hinge. They have been shown to bind their ligand in the cleft between these domains in a manner resembling a Venus flytrap. — an NCBI CDD conserved domain (cd00997); members share this curated model.
