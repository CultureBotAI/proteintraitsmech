identifier: CDD:cd15707
label: "Extended PHD finger found in Drosophila melanogaster PHD finger protein rhinoceros (RNO) and similar proteins. The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the ePHD finger of Drosophila melanogaster RNO. RNO is a novel plant homeodomain (PHD)-containing nuclear protein that may function as a transcription factor that antagonizes Ras signaling by regulating the transcription of key EGFR/Ras pathway regulators in the Drosophila eye. RNO contains a canonical PHD domain followed by this non-canonical ePHD domain, both of which are zinc-binding motifs."
definition: >-
  Extended PHD finger found in Drosophila melanogaster PHD finger protein rhinoceros (RNO) and similar proteins. The extended plant homeodomain (ePHD) zinc finger is characterized as Cys2HisCys5HisCys2His. This model includes the ePHD finger of Drosophila melanogaster RNO. RNO is a novel plant homeodomain (PHD)-containing nuclear protein that may function as a transcription factor that antagonizes Ras signaling by regulating the transcription of key EGFR/Ras pathway regulators in the Drosophila eye. RNO contains a canonical PHD domain followed by this non-canonical ePHD domain, both of which are zinc-binding motifs. — an NCBI CDD conserved domain (cd15707); members share this curated model.
