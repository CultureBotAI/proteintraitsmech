identifier: CDD:cd07771
label: "nucleotide-binding domain (NBD) of rhamnulokinase (RhaB) and similar proteins. Rhamnulokinase (EC 2.7.1.5), also known as L-rhamnulose kinase, ATP:L-rhamnulose phosphotransferase, L-rhamnulose 1-kinase, or rhamnulose kinase, is an enzyme involved in the second step in rhamnose catabolism. It catalyzes the ATP-dependent phosphorylation of L-rhamnulose to produce L-rhamnulose-1-phosphate and ADP. Rhamnulokinase exists as a monomer composed of two large domains. The ATP binding site is located in the cleft between the two domains. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. The presence of divalent Mg2+ or Mn2+ is required for catalysis. The subfamily also includes Streptococcus pneumoniae L-fuculose k fuculose Kinase inase (FcsK) that uses ATP to phosphorylate fuculose creating fuculose-1-phosphate, and Alkalihalobacillus clausii bifunctional enzyme RhaA/RhaB. Members of this subfamily belong to the FGGY family of carbohydrate kinases."
