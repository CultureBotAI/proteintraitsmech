identifier: CDD:cd07895
label: "Adenylation domain of GTP-dependent mRNA capping enzymes. RNA capping enzymes transfer GMP from GTP to the 5'-diphosphate end of nascent mRNAs to form a G(5')ppp(5')RNA cap structure. The RNA cap is found only in eukarya. RNA capping is chemically analogous to the first two steps of polynucleotide ligation. ATP-dependent polynucleotide ligases catalyze phosphodiester bond formation of nicked nucleic acid substrates using the high energy nucleotide of ATP as a cofactor in a three step reaction mechanism. Structural studies reveal a shared structure for DNA ligases and capping enzymes, with a common catalytic core composed of an adenylation or nucleotidyltransferase domain and a C-terminal OB-fold domain containing conserved sequence motifs. The adenylation domain binds ATP and contains many active site residues."
definition: >-
  Adenylation domain of GTP-dependent mRNA capping enzymes. RNA capping enzymes transfer GMP from GTP to the 5'-diphosphate end of nascent mRNAs to form a G(5')ppp(5')RNA cap structure. The RNA cap is found only in eukarya. RNA capping is chemically analogous to the first two steps of polynucleotide ligation. ATP-dependent polynucleotide ligases catalyze phosphodiester bond formation of nicked nucleic acid substrates using the high energy nucleotide of ATP as a cofactor in a three step reaction mechanism. Structural studies reveal a shared structure for DNA ligases and capping enzymes, with a common catalytic core composed of an adenylation or nucleotidyltransferase domain and a C-terminal OB-fold domain containing conserved sequence motifs. The adenylation domain binds ATP and contains many active site residues. — an NCBI CDD conserved domain (cd07895); members share this curated model.
