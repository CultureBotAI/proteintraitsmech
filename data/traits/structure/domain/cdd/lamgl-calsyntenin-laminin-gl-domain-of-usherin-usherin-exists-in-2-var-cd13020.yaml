identifier: CDD:cd13020
label: "LamGL_calsyntenin. Laminin GL domain of usherin; Usherin exists in 2 variants, a shorter, secreted, extracellular and a long, membrane-anchored variant with a large extracellular domain containing and a short C-terminal PDZ-binding motif, both containing an N-terminal LamGL domain. It is required for the long-term maintenance of retinal photoreceptors and for the development of cochlear hair cells. Mutations in usherin account for the majority of Usher syndrome (USH) type II cases, the most common of the 3 types of USH. USH is the most frequent cause of combined deaf-blindness in humans. USH type II is characterized by moderate nonprogressive hearing loss without vestibular dysfunction and a tendency for more pronounced hearing loss for higher-frequency sounds. In general, LamG domains of neurexin and agrin undergo alternative splicing that modulates their affinity for protein ligands. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold."
definition: >-
  LamGL_calsyntenin. Laminin GL domain of usherin; Usherin exists in 2 variants, a shorter, secreted, extracellular and a long, membrane-anchored variant with a large extracellular domain containing and a short C-terminal PDZ-binding motif, both containing an N-terminal LamGL domain. It is required for the long-term maintenance of retinal photoreceptors and for the development of cochlear hair cells. Mutations in usherin account for the majority of Usher syndrome (USH) type II cases, the most common of the 3 types of USH. USH is the most frequent cause of combined deaf-blindness in humans. USH type II is characterized by moderate nonprogressive hearing loss without vestibular dysfunction and a tendency for more pronounced hearing loss for higher-frequency sounds. In general, LamG domains of neurexin and agrin undergo alternative splicing that modulates their affinity for protein ligands. Proteins that contain LamG domains serve a variety of purposes including signal transduction via cell-surface steroid receptors, adhesion, migration and differentiation through mediation of cell adhesion molecules. The laminin G, the thrombospondin N, and the pentraxin families form a superfamily all with a similar jellyroll fold. — an NCBI CDD conserved domain (cd13020); members share this curated model.
