identifier: CDD:cd17009
label: "VHS (Vps27/Hrs/STAM) domain of ADP-ribosylation factor-binding protein GGA1. ADP-ribosylation factor-binding protein GGA1 (Golgi-localized, Gamma-ear-containing, Arf-binding 1) is also called Gamma-adaptin-related protein 1. It is expressed in human brain and affects the generation of amyloid beta-peptide, and may be involved in the pathogenesis of Alzheimer disease. It is a member of the GGA subfamily, which is comprised of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins involved in membrane trafficking between the Trans-Golgi Network (TGN) and endosomes. The VHS domain has a superhelical structure similar to the structure of the ARM (Armadillo) repeats and is present at the N-termini of proteins. GGA proteins have a multidomain structure consisting of an N-terminal VHS domain linked by a short proline-rich linker to a GAT (GGA and TOM) domain, which is followed by a long flexible linker to the C-terminal appendage, GAE (Gamma-Adaptin Ear) domain. The VHS domain of GGA proteins binds to the acidic-cluster dileucine (DxxLL) motif found on the cytoplasmic tails of cargo proteins trafficked between the Trans-Golgi Network and the endosomal system."
definition: >-
  VHS (Vps27/Hrs/STAM) domain of ADP-ribosylation factor-binding protein GGA1. ADP-ribosylation factor-binding protein GGA1 (Golgi-localized, Gamma-ear-containing, Arf-binding 1) is also called Gamma-adaptin-related protein 1. It is expressed in human brain and affects the generation of amyloid beta-peptide, and may be involved in the pathogenesis of Alzheimer disease. It is a member of the GGA subfamily, which is comprised of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins involved in membrane trafficking between the Trans-Golgi Network (TGN) and endosomes. The VHS domain has a superhelical structure similar to the structure of the ARM (Armadillo) repeats and is present at the N-termini of proteins. GGA proteins have a multidomain structure consisting of an N-terminal VHS domain linked by a short proline-rich linker to a GAT (GGA and TOM) domain, which is followed by a long flexible linker to the C-terminal appendage, GAE (Gamma-Adaptin Ear) domain. The VHS domain of GGA proteins binds to the acidic-cluster dileucine (DxxLL) motif found on the cytoplasmic tails of cargo proteins trafficked between the Trans-Golgi Network and the endosomal system. — an NCBI CDD conserved domain (cd17009); members share this curated model.
