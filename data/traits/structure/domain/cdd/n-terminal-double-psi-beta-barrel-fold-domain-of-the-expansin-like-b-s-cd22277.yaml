identifier: CDD:cd22277
label: "N-terminal double-psi beta-barrel fold domain of the expansin-like B subfamily. Expansin-like B (EXLB) belongs to the plant expansin family that also includes alpha-expansin (EXPA), beta-expansin (EXPB), and expansin-like A (EXLA). Unlike EXPA and EXPB, EXLA proteins have not been shown to display cell wall loosening activity. Solanum tuberosum StEXLB6 showed differential expression under the treatments of abscisic acid (ABA), indoleacetic acid (IAA), and gibberellin acid 3 (GA3), as well as under drought and heat stresses, indicating that it is likely involved in potato stress resistance. Soybean GmEXLB1 improves phosphorus acquisition by regulating root elongation and architecture in Arabidopsis. EXLB belongs to the expansin family of proteins that contain an N-terminal domain (D1) homologous to the catalytic domain of glycoside hydrolase family 45 (GH45) proteins but with no hydrolytic activity, and a C-terminal domain (D2) homologous to group-2 grass pollen allergens. This model represents the N-terminal domain of EXLB proteins, which adopts a double-psi beta-barrel (DPBB) fold."
definition: >-
  N-terminal double-psi beta-barrel fold domain of the expansin-like B subfamily. Expansin-like B (EXLB) belongs to the plant expansin family that also includes alpha-expansin (EXPA), beta-expansin (EXPB), and expansin-like A (EXLA). Unlike EXPA and EXPB, EXLA proteins have not been shown to display cell wall loosening activity. Solanum tuberosum StEXLB6 showed differential expression under the treatments of abscisic acid (ABA), indoleacetic acid (IAA), and gibberellin acid 3 (GA3), as well as under drought and heat stresses, indicating that it is likely involved in potato stress resistance. Soybean GmEXLB1 improves phosphorus acquisition by regulating root elongation and architecture in Arabidopsis. EXLB belongs to the expansin family of proteins that contain an N-terminal domain (D1) homologous to the catalytic domain of glycoside hydrolase family 45 (GH45) proteins but with no hydrolytic activity, and a C-terminal domain (D2) homologous to group-2 grass pollen allergens. This model represents the N-terminal domain of EXLB proteins, which adopts a double-psi beta-barrel (DPBB) fold. — an NCBI CDD conserved domain (cd22277); members share this curated model.
