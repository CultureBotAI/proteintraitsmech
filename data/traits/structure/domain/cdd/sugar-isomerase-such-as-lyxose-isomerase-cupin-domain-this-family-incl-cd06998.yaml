identifier: CDD:cd06998
label: "sugar isomerase such as lyxose isomerase, cupin domain. This family includes D-lyxose isomerase (D-LI; EC 5.3.1.15) homologous to YdaE from the sigma B regulon of Bacillus subtilis and to pathogenic Escherichia coli O157 z5688 D-lyxose isomerase (EcSI or Z5688), both having highly similar active sites. YdaE may have a synergistic role with ydaD, an NAD(P)-dependent alcohol dehydrogenase, in the adaptation to environment stresses, while EcSI has D-lyxose/D-mannose activity. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  sugar isomerase such as lyxose isomerase, cupin domain. This family includes D-lyxose isomerase (D-LI; EC 5.3.1.15) homologous to YdaE from the sigma B regulon of Bacillus subtilis and to pathogenic Escherichia coli O157 z5688 D-lyxose isomerase (EcSI or Z5688), both having highly similar active sites. YdaE may have a synergistic role with ydaD, an NAD(P)-dependent alcohol dehydrogenase, in the adaptation to environment stresses, while EcSI has D-lyxose/D-mannose activity. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd06998); members share this curated model.
