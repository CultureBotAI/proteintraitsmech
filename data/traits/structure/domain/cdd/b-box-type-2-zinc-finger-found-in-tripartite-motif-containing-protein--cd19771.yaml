identifier: CDD:cd19771
label: "B-box-type 2 zinc finger  found in tripartite motif-containing protein TRIM20 and similar proteins. TRIM20, also termed Pyrin, or Marenostrin (MEFV), is involved in the regulation of innate immunity and the inflammatory response in response to IFNG/IFN-gamma. TRIM20 belongs to unclassified TRIM family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. It contains a pyrin domain, a Bbox2 zinc finger, and a C-terminal SPRY/B30.2 domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif."
definition: >-
  B-box-type 2 zinc finger found in tripartite motif-containing protein TRIM20 and similar proteins. TRIM20, also termed Pyrin, or Marenostrin (MEFV), is involved in the regulation of innate immunity and the inflammatory response in response to IFNG/IFN-gamma. TRIM20 belongs to unclassified TRIM family of proteins that do not have RING fingers and thus lack the characteristic tripartite (RING (R), B-box, and coiled coil (CC)) RBCC motif. It contains a pyrin domain, a Bbox2 zinc finger, and a C-terminal SPRY/B30.2 domain. The type 2 B-box (Bbox2) zinc finger is characterized by a CHC3H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19771); members share this curated model.
