identifier: CDD:cd23828
label: "Ubiquitin-conjugating enzyme E2, putative catalytic (UBCc) domain of Trypanosoma cruzi putative ubiquitin-conjugating enzyme E2 and related proteins. This subfamily includes uncharacterized Trypanosoma cruzi putative ubiquitin-conjugating enzyme E2 and similar proteins. They may function as ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins."
definition: >-
  Ubiquitin-conjugating enzyme E2, putative catalytic (UBCc) domain of Trypanosoma cruzi putative ubiquitin-conjugating enzyme E2 and related proteins. This subfamily includes uncharacterized Trypanosoma cruzi putative ubiquitin-conjugating enzyme E2 and similar proteins. They may function as ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. — an NCBI CDD conserved domain (cd23828); members share this curated model.
