identifier: CDD:cd19734
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Circadian locomotor output cycles protein kaput (CLOCK) and similar proteins. CLOCK, also termed Class E basic helix-loop-helix protein 8 (bHLHe8), is a bHLH-PAS transcriptional activator which forms a core component of the circadian clock. It forms heterodimers with another bHLH-PAS protein, Brain-Muscle-Arnt-Like (also known as BMAL or ARNT3 or mop3), which regulates circadian rhythm. BMAL1-CLOCK heterodimer complex activates transcription from E-box (CANNTG) elements found in the promoter of circadian responsive genes."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in Circadian locomotor output cycles protein kaput (CLOCK) and similar proteins. CLOCK, also termed Class E basic helix-loop-helix protein 8 (bHLHe8), is a bHLH-PAS transcriptional activator which forms a core component of the circadian clock. It forms heterodimers with another bHLH-PAS protein, Brain-Muscle-Arnt-Like (also known as BMAL or ARNT3 or mop3), which regulates circadian rhythm. BMAL1-CLOCK heterodimer complex activates transcription from E-box (CANNTG) elements found in the promoter of circadian responsive genes. — an NCBI CDD conserved domain (cd19734); members share this curated model.
