identifier: CDD:cd21427
label: "Vac8p binding domain of nucleus-vacuole junction protein 1 (Nvj1p) and similar proteins. Nvj1p is involved in the formation of nucleus-vacuole (NV) junctions during piecemeal microautophagy of the nucleus (PMN). NV junctions are inter-organelle interfaces mediated by Nvj1p in the nuclear envelope and Vac8p on the vacuole membrane. Together, Nvj1p and Vac8p form Velcro-like patches through which teardrop-like portions of the nucleus are pinched off into the vacuolar lumen and degraded by the PMN process. Nvj1p Acts also as an outer-nuclear membrane receptor for OSH1 and TSC13. The model corresponds to Vac8p binding domain at the C-terminus of Nvj1p."
definition: >-
  Vac8p binding domain of nucleus-vacuole junction protein 1 (Nvj1p) and similar proteins. Nvj1p is involved in the formation of nucleus-vacuole (NV) junctions during piecemeal microautophagy of the nucleus (PMN). NV junctions are inter-organelle interfaces mediated by Nvj1p in the nuclear envelope and Vac8p on the vacuole membrane. Together, Nvj1p and Vac8p form Velcro-like patches through which teardrop-like portions of the nucleus are pinched off into the vacuolar lumen and degraded by the PMN process. Nvj1p Acts also as an outer-nuclear membrane receptor for OSH1 and TSC13. The model corresponds to Vac8p binding domain at the C-terminus of Nvj1p. — an NCBI CDD conserved domain (cd21427); members share this curated model.
