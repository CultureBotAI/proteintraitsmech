identifier: CDD:cd14153
label: "Pseudokinase domain of Kinase Suppressor of Ras 2. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. KSR2 interacts with the protein phosphatase calcineurin and functions in calcium-mediated ERK signaling. It also functions in energy metabolism by regulating AMP kinase and AMPK-dependent processes such as glucose uptake and fatty acid oxidation. KSR proteins act as scaffold proteins that function downstream of Ras and upstream of Raf in the Extracellular signal-Regulated Kinase (ERK) pathway that regulates many cellular processes including cycle regulation, proliferation, differentiation, survival, and apoptosis. KSR proteins regulate the assembly and activation of the Raf/MEK/ERK module upon Ras activation at the membrane by direct association of its components. They are widely regarded as pseudokinases. The KSR2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Pseudokinase domain of Kinase Suppressor of Ras 2. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity. KSR2 interacts with the protein phosphatase calcineurin and functions in calcium-mediated ERK signaling. It also functions in energy metabolism by regulating AMP kinase and AMPK-dependent processes such as glucose uptake and fatty acid oxidation. KSR proteins act as scaffold proteins that function downstream of Ras and upstream of Raf in the Extracellular signal-Regulated Kinase (ERK) pathway that regulates many cellular processes including cycle regulation, proliferation, differentiation, survival, and apoptosis. KSR proteins regulate the assembly and activation of the Raf/MEK/ERK module upon Ras activation at the membrane by direct association of its components. They are widely regarded as pseudokinases. The KSR2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14153); members share this curated model.
