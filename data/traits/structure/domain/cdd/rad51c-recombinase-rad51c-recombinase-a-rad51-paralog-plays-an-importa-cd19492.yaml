identifier: CDD:cd19492
label: "RAD51C recombinase. RAD51C recombinase, a RAD51 paralog, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. RAD51C, together with the other RAD51 paralogs, RAD51B, RAD51D, XRCC3, and XRCC2, helps recruit RAD51 to the break site. Additionally, RAD51C acts as a mediator in the early steps of DNA damage signaling."
definition: >-
  RAD51C recombinase. RAD51C recombinase, a RAD51 paralog, plays an important role in DNA repair by homologous recombination (HR). HR is an important error-free repair mechanism for chromosomal double-strand break (DSB) which otherwise leads to cell cycle arrest and death. RAD51C, together with the other RAD51 paralogs, RAD51B, RAD51D, XRCC3, and XRCC2, helps recruit RAD51 to the break site. Additionally, RAD51C acts as a mediator in the early steps of DNA damage signaling. — an NCBI CDD conserved domain (cd19492); members share this curated model.
