identifier: CDD:cd22246
label: "N-terminal domain of phosphatidylinositol 4-kinase beta. Phosphatidylinositol 4-kinase beta (PI4K-beta, PI4Kbeta or PI4KB), also called PtdIns 4-kinase beta, NPIK, PI4K92, or PI4KIII, catalyzes the phosphorylation of phosphatidylinositol (PI) to form phosphatidylinositol 4-phosphate (PI4P), in the first committed step in the production of the second messenger inositol-1,4,5,-trisphosphate (PIP). It may regulate Golgi disintegration/reorganization during mitosis, possibly via its phosphorylation. PI4K-beta is critical for the maintenance of the Golgi and trans Golgi network (TGN) PI4P pools. It is recruited to membranes via its interaction with Golgi adaptor protein acyl-coenzyme A binding domain containing protein 3 (ACBD3). The ACBD3:PI4K-beta complex formation is essential for proper function of the Golgi. PI4K-beta also plays an essential role in Aichi virus RNA replication. It is recruited by ACBD3 at viral replication sites. This model corresponds to the N-terminal domain of PI4K-beta, which is responsible for interacting with ACBD3 by forming a complex with the Q domain."
definition: >-
  N-terminal domain of phosphatidylinositol 4-kinase beta. Phosphatidylinositol 4-kinase beta (PI4K-beta, PI4Kbeta or PI4KB), also called PtdIns 4-kinase beta, NPIK, PI4K92, or PI4KIII, catalyzes the phosphorylation of phosphatidylinositol (PI) to form phosphatidylinositol 4-phosphate (PI4P), in the first committed step in the production of the second messenger inositol-1,4,5,-trisphosphate (PIP). It may regulate Golgi disintegration/reorganization during mitosis, possibly via its phosphorylation. PI4K-beta is critical for the maintenance of the Golgi and trans Golgi network (TGN) PI4P pools. It is recruited to membranes via its interaction with Golgi adaptor protein acyl-coenzyme A binding domain containing protein 3 (ACBD3). The ACBD3:PI4K-beta complex formation is essential for proper function of the Golgi. PI4K-beta also plays an essential role in Aichi virus RNA replication. It is recruited by ACBD3 at viral replication sites. This model corresponds to the N-terminal domain of PI4K-beta, which is responsible for interacting with ACBD3 by forming a complex with the Q domain. — an NCBI CDD conserved domain (cd22246); members share this curated model.
