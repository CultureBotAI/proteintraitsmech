identifier: CDD:cd22758
label: "OTU (ovarian tumor) domain of Invertebrate iridescent virus putative ubiquitin thioesterase 232R and similar proteins. This subfamily contains putative ubiquitin thioesterases 232R from Invertebrate iridescent virus and L96 from Tipula iridescent virus (TIV), Dictyostelium discoideum OTU domain-containing protein DDB_G0284757, and similar proteins. L96 may be involved in TIV genomic DNA packaging in a manner related to the Gag polyproteins of the mammalian viruses. Proteins in this subfamily contain an OTU domain. OTU domains typically function as deubiquitinases (DUBs)/ubiquitin thiolesterases (EC 3.4.19.12) that catalyze the thiol-dependent hydrolysis of ester, thioester, amide, peptide and isopeptide bonds formed by the C-terminal Gly of ubiquitin, a small regulatory protein that can be conjugated to a large range of target proteins. Protein ubiquitination is a post-translational modification of mostly Lys residues that regulates many cellular processes, including protein degradation, intracellular trafficking, cell signaling, autophagy, transcription, translation, and the DNA damage response. These DUBs may play important regulatory roles at the level of protein turnover by preventing degradation. They belong to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad."
definition: >-
  OTU (ovarian tumor) domain of Invertebrate iridescent virus putative ubiquitin thioesterase 232R and similar proteins. This subfamily contains putative ubiquitin thioesterases 232R from Invertebrate iridescent virus and L96 from Tipula iridescent virus (TIV), Dictyostelium discoideum OTU domain-containing protein DDB_G0284757, and similar proteins. L96 may be involved in TIV genomic DNA packaging in a manner related to the Gag polyproteins of the mammalian viruses. Proteins in this subfamily contain an OTU domain. OTU domains typically function as deubiquitinases (DUBs)/ubiquitin thiolesterases (EC 3.4.19.12) that catalyze the thiol-dependent hydrolysis of ester, thioester, amide, peptide and isopeptide bonds formed by the C-terminal Gly of ubiquitin, a small regulatory protein that can be conjugated to a large range of target proteins. Protein ubiquitination is a post-translational modification of mostly Lys residues that regulates many cellular processes, including protein degradation, intracellular trafficking, cell signaling, autophagy, transcription, translation, and the DNA damage response. These DUBs may play important regulatory roles at the level of protein turnover by preventing degradation. They belong to the OTU family of cysteine proteases that use a conserved cysteine, histidine, and an aspartate, as the catalytic triad. — an NCBI CDD conserved domain (cd22758); members share this curated model.
