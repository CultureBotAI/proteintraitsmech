identifier: CDD:cd16017
label: "Lipooligosaccharide Phosphoethanolamine Transferase A (LptA) or Lipid A Phosphoethanolamine Transferase. Lipooligosaccharide Phosphoethanolamine Transferase A (LptA) or Lipid A Phosphoethanolamine Transferase catalyzes the modification of the lipid A headgroups by phosphoethanolamine (PEA) or 4-amino-arabinose residues. Lipopolysaccharides, also called endotoxins, protect bacterial pathogens from antimicrobial peptides and have roles in virulence. The PEA modified lipid A increases resistance to the cationic cyclic polypeptide antibiotic, polymyxin. Lipid A PEA transferases usually consist of a transmembrane domain anchoring the enzyme to the periplasmic face of the cytoplasmic membrane."
definition: >-
