identifier: CDD:cd17133
label: "Ras-binding domain (RBD) found in serine/threonine-protein kinase ARAF. ARAF, also termed proto-oncogene ARAF, or proto-oncogene ARAF1, or proto-oncogene PKS2, belongs to the RAF protein family. The RAF family includes three RAF kinases ARAF, BRAF, and RAF1/CRAF, encoded by proto-oncogenes, which activate the mitogen-activated protein kinase/extracellular-signal-regulated kinase (MAPK/ERK) cascade downstream of RAS. They share a common structure consisting of an N-terminal regulatory domain and a C-terminal kinase domain. There are three conserved regions (CR1-3) in the regulatory domain, CR1 contains a Ras-binding domain (RBD) and a cysteine-rich domain (CRD), CR2 is a serine/threonine-rich domain, and CR3 encodes the kinase domain required for RAF. The RBD of RAF has a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions. ARAF is predominantly found in urogenital tissue with a low basal kinase activity. It directly cross-talks with NODAL/SMAD2 signaling in a MAPK-independent manner. It also promotes MAPK pathway activation and cell migration in a cell type-dependent manner. Moreover, ARAF acts as a scaffold to stabilize BRAF-CRAF heterodimers. Mice deleted for ARAF are viable but die perinatally."
definition: >-
  Ras-binding domain (RBD) found in serine/threonine-protein kinase ARAF. ARAF, also termed proto-oncogene ARAF, or proto-oncogene ARAF1, or proto-oncogene PKS2, belongs to the RAF protein family. The RAF family includes three RAF kinases ARAF, BRAF, and RAF1/CRAF, encoded by proto-oncogenes, which activate the mitogen-activated protein kinase/extracellular-signal-regulated kinase (MAPK/ERK) cascade downstream of RAS. They share a common structure consisting of an N-terminal regulatory domain and a C-terminal kinase domain. There are three conserved regions (CR1-3) in the regulatory domain, CR1 contains a Ras-binding domain (RBD) and a cysteine-rich domain (CRD), CR2 is a serine/threonine-rich domain, and CR3 encodes the kinase domain required for RAF. The RBD of RAF has a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions. ARAF is predominantly found in urogenital tissue with a low basal kinase activity. It directly cross-talks with NODAL/SMAD2 signaling in a MAPK-independent manner. It also promotes MAPK pathway activation and cell migration in a cell type-dependent manner. Moreover, ARAF acts as a scaffold to stabilize BRAF-CRAF heterodimers. Mice deleted for ARAF are viable but die perinatally. — an NCBI CDD conserved domain (cd17133); members share this curated model.
