identifier: CDD:cd10536
label: "SET domain (including iSET domain and post-SET domain) found in SET and MYND domain-containing protein 4 (SMYD4) and similar proteins. SMYD4 functions as a potential tumor suppressor that plays a critical role in breast carcinogenesis at least partly through inhibiting the expression of PDGFR-alpha. In zebrafish, SMYD4 is ubiquitously expressed in early embryos and becomes enriched in the developing heart;  mutants show a strong defect in cardiomyocyte proliferation, which lead to a severe cardiac malformation."
definition: >-
  SET domain (including iSET domain and post-SET domain) found in SET and MYND domain-containing protein 4 (SMYD4) and similar proteins. SMYD4 functions as a potential tumor suppressor that plays a critical role in breast carcinogenesis at least partly through inhibiting the expression of PDGFR-alpha. In zebrafish, SMYD4 is ubiquitously expressed in early embryos and becomes enriched in the developing heart; mutants show a strong defect in cardiomyocyte proliferation, which lead to a severe cardiac malformation. — an NCBI CDD conserved domain (cd10536); members share this curated model.
