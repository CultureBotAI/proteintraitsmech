identifier: CDD:cd21451
label: "dynein light chain (DLC)-like domain found in the Tctex1 domain-containing protein (TCTEX1D) family. The Tctex1 domain-containing protein (TCTEX1D) family includes TCTEX1D1-4. TCTEX1D1 is a genetic modifier of disease progression in Duchenne muscular dystrophy (DMD). It can interact with ZMYND10 that stabilizes intermediate chain proteins in the cytoplasmic pre-assembly of dynein arms. TCTEX1D2 is required for proper retrograde ciliary transport. It associates with short-rib polydactyly syndrome proteins, such as Wdr34, Wdr60, and other dynein complex 1 and 2 subunits, and is required for ciliogenesis. TCTEX1D2 is a negative regulator of GLUT4 translocation and glucose uptake. TCTEX1D3, also called T-complex testis-specific protein 3, or T-complex-associated testis-expressed protein 3 (Tcte-3), may be an accessory component of axonemal dynein and cytoplasmic dynein 1. TCTEX1D4, also called protein N22.1, or Tctex-2-beta, is a novel protein phosphatase 1 (PPP1) interactor. It also interacts with ENG/endoglin, TGFBR2, and TGFBR3. The distribution of TCTEX1D4 in testis suggests its involvement in distinct functions, such as TGFbeta signaling at the blood-testis barrier and acrosome cap formation. The model corresponds to the dynein light chain (DLC)-like domain of TCTEX1Ds."
definition: >-
  dynein light chain (DLC)-like domain found in the Tctex1 domain-containing protein (TCTEX1D) family. The Tctex1 domain-containing protein (TCTEX1D) family includes TCTEX1D1-4. TCTEX1D1 is a genetic modifier of disease progression in Duchenne muscular dystrophy (DMD). It can interact with ZMYND10 that stabilizes intermediate chain proteins in the cytoplasmic pre-assembly of dynein arms. TCTEX1D2 is required for proper retrograde ciliary transport. It associates with short-rib polydactyly syndrome proteins, such as Wdr34, Wdr60, and other dynein complex 1 and 2 subunits, and is required for ciliogenesis. TCTEX1D2 is a negative regulator of GLUT4 translocation and glucose uptake. TCTEX1D3, also called T-complex testis-specific protein 3, or T-complex-associated testis-expressed protein 3 (Tcte-3), may be an accessory component of axonemal dynein and cytoplasmic dynein 1. TCTEX1D4, also called protein N22.1, or Tctex-2-beta, is a novel protein phosphatase 1 (PPP1) interactor. It also interacts with ENG/endoglin, TGFBR2, and TGFBR3. The distribution of TCTEX1D4 in testis suggests its involvement in distinct functions, such as TGFbeta signaling at the blood-testis barrier and acrosome cap formation. The model corresponds to the dynein light chain (DLC)-like domain of TCTEX1Ds. — an NCBI CDD conserved domain (cd21451); members share this curated model.
