identifier: CDD:cd19732
label: "basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing protein 3 (NPAS3) and similar proteins. NPAS3, also termed neuronal PAS3, or Basic-helix-loop-helix-PAS protein MOP6, or Class E basic helix-loop-helix protein 12 (bHLHe12), or member of PAS protein 6, or PAS domain-containing protein 6 (PASD6), is a bHLH-PAS brain-enriched transcription factor that is involved in central nervous system development and neurogenesis. It is a replicated genetic risk factor for psychiatric disorders. Human chromosomal rearrangements that affect NPAS3 normal expression are associated with schizophrenia and mental retardation."
definition: >-
  basic helix-loop-helix-Per-ARNT-Sim (bHLH-PAS) domain found in neuronal PAS domain-containing protein 3 (NPAS3) and similar proteins. NPAS3, also termed neuronal PAS3, or Basic-helix-loop-helix-PAS protein MOP6, or Class E basic helix-loop-helix protein 12 (bHLHe12), or member of PAS protein 6, or PAS domain-containing protein 6 (PASD6), is a bHLH-PAS brain-enriched transcription factor that is involved in central nervous system development and neurogenesis. It is a replicated genetic risk factor for psychiatric disorders. Human chromosomal rearrangements that affect NPAS3 normal expression are associated with schizophrenia and mental retardation. — an NCBI CDD conserved domain (cd19732); members share this curated model.
