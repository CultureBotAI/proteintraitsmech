identifier: CDD:cd15465
label: "Mitochondrial Ribosomal Protein (MRP) S6. bS6_MRPS6 is one of the proteins of the small subunit of the mitochondrial ribosome. Mitochondrial and chloroplastic ribosomes are similar to bacterial ribosomes. The ribosome is a ribonucleoprotein organelle that decodes the genetic information in messenger RNA and forms peptide bonds to synthesize the corresponding polypeptide. Ribosomes consist of a large and a small subunit, which assemble during the initiation stage of protein synthesis. Prokaryotic ribosomes consist of three molecules of RNA and more than 50 proteins. The small subunits of bacterial and eukaryotic ribosomes have the same overall shapes (with structural elements described as head, body, platform, beak and shoulder). Mitochondrial and chloroplastic ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. bS6_MRPS6 is one of the fourteen mitochondrial ribosomal proteins that is  known to have significant sequence homology with their bacterial counterpart."
definition: >-
  Mitochondrial Ribosomal Protein (MRP) S6. bS6_MRPS6 is one of the proteins of the small subunit of the mitochondrial ribosome. Mitochondrial and chloroplastic ribosomes are similar to bacterial ribosomes. The ribosome is a ribonucleoprotein organelle that decodes the genetic information in messenger RNA and forms peptide bonds to synthesize the corresponding polypeptide. Ribosomes consist of a large and a small subunit, which assemble during the initiation stage of protein synthesis. Prokaryotic ribosomes consist of three molecules of RNA and more than 50 proteins. The small subunits of bacterial and eukaryotic ribosomes have the same overall shapes (with structural elements described as head, body, platform, beak and shoulder). Mitochondrial and chloroplastic ribosomes synthesize proteins that are involved in oxidative phosphorylation (ATP generation) and photosynthesis. bS6_MRPS6 is one of the fourteen mitochondrial ribosomal proteins that is known to have significant sequence homology with their bacterial counterpart. — an NCBI CDD conserved domain (cd15465); members share this curated model.
