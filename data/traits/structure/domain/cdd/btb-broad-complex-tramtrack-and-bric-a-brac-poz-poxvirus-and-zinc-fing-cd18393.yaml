identifier: CDD:cd18393
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in SH3KBP1-binding protein 1 (SHKBP1). SHKBP1, also called SETA-binding protein 1, interacts with cathepsin B and participates in tumor necrosis factor (TNF)-induced apoptosis in ovarian cancer cells. It can promote epidermal growth factor receptor (EGFR) signaling by interrupting c-Cbl-CIN85 complex and inhibiting EGFR degradation. It contains a BTB/POZ domain, also known as tetramerization (T1) domain, a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in SH3KBP1-binding protein 1 (SHKBP1). SHKBP1, also called SETA-binding protein 1, interacts with cathepsin B and participates in tumor necrosis factor (TNF)-induced apoptosis in ovarian cancer cells. It can promote epidermal growth factor receptor (EGFR) signaling by interrupting c-Cbl-CIN85 complex and inhibiting EGFR degradation. It contains a BTB/POZ domain, also known as tetramerization (T1) domain, a versatile protein-protein interaction motif that facilitates homodimerization or heterodimerization. KCTD family BTB domains can adopt a wide range of oligomerization geometries, including homodimerization, tetramerization, and pentamerization. — an NCBI CDD conserved domain (cd18393); members share this curated model.
