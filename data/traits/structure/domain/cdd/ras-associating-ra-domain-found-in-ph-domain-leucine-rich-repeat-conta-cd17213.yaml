identifier: CDD:cd17213
label: "Ras-associating (RA) domain found in PH domain leucine-rich repeat-containing protein phosphatase PHLPP1, PHLPP2, and similar proteins. PHLPP represents a novel family of Ser/Thr protein phosphatases, which is involved in two key signaling pathways, the phosphatidylinositol 3-kinase and diacylglycerol signaling pathways, by directly dephosphorylating and inactivating Akt serine-threonine kinases (Akt1, Akt2, Akt3) and protein kinase C (PKC) isoforms. PHLPP targets oncogenic kinases and may act as a tumor suppressor in several types of cancers. Two PHLPP isoforms are included in this family, PHLPP1 and PHLPP2. They regulate Akt activation together when both phosphatases are expressed. PHLPP1 is also termed pleckstrin homology domain-containing family E member 1, or PH domain-containing family E member 1, or suprachiasmatic nucleus circadian oscillatory protein (SCOP). It plays a suppression role in inflammatory response of glioma. Its loss contributes to gliomas development and progression. Loss of PHLPP1 also protects against colitis by inhibiting intestinal epithelial cell apoptosis. The overexpression of PHLPP1 impairs hippocampus-dependent learning, suggesting a role for PHLPP1 in learning and memory. PHLPP2 is also termed PH domain leucine-rich repeat-containing protein phosphatase-like (PHLPP-like). Both PHLPP1 and PHLPP2 contain a putative Ras-associating (RA) domain followed by a pleckstrin homology (PH) domain, a series of leucine-rich repeats and a protein phosphatase 2C (PP2C) domain."
definition: >-
  Ras-associating (RA) domain found in PH domain leucine-rich repeat-containing protein phosphatase PHLPP1, PHLPP2, and similar proteins. PHLPP represents a novel family of Ser/Thr protein phosphatases, which is involved in two key signaling pathways, the phosphatidylinositol 3-kinase and diacylglycerol signaling pathways, by directly dephosphorylating and inactivating Akt serine-threonine kinases (Akt1, Akt2, Akt3) and protein kinase C (PKC) isoforms. PHLPP targets oncogenic kinases and may act as a tumor suppressor in several types of cancers. Two PHLPP isoforms are included in this family, PHLPP1 and PHLPP2. They regulate Akt activation together when both phosphatases are expressed. PHLPP1 is also termed pleckstrin homology domain-containing family E member 1, or PH domain-containing family E member 1, or suprachiasmatic nucleus circadian oscillatory protein (SCOP). It plays a suppression role in inflammatory response of glioma. Its loss contributes to gliomas development and progression. Loss of PHLPP1 also protects against colitis by inhibiting intestinal epithelial cell apoptosis. The overexpression of PHLPP1 impairs hippocampus-dependent learning, suggesting a role for PHLPP1 in learning and memory. PHLPP2 is also termed PH domain leucine-rich repeat-containing protein phosphatase-like (PHLPP-like). Both PHLPP1 and PHLPP2 contain a putative Ras-associating (RA) domain followed by a pleckstrin homology (PH) domain, a series of leucine-rich repeats and a protein phosphatase 2C (PP2C) domain. — an NCBI CDD conserved domain (cd17213); members share this curated model.
