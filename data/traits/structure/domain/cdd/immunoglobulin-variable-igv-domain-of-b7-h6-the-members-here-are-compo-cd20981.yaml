identifier: CDD:cd20981
label: "Immunoglobulin variable (IgV) domain of B7-H6. The members here are composed of the immunoglobulin variable (IgV) domain of B7-H6 (also known as NCR3LG1). B7-H6 contains one IgV domain and one IgC domain (IgV-IgC) and belongs to the B7-family, which consists of structurally related cell-surface protein ligands which bind to receptors on lymphocytes that regulate immune responses. B7-H6 is a ligand of NKp30, which is a member of CD28 family and an activating receptor of natural killer (NK) cells. The expression of NKp30 has been found in most of NK cells, which is involved in the process of tumor cell killing and interaction with antigen presenting cells (APCs) such as dendritic cells. Studies showed that NK cells eliminate B7-H6-expressing tumor cells either directly via cytotoxicity or indirectly by cytokine secretion. For instance, chimeric NKp30-expressing T cells responded to B7-H6(+) tumor cells and those T cells produced IFN-gamma and killed B7-H6-expressing tumor cells in vivo.  B7-H6 mRNA is not found in normal cells, while high expression of B7-H6 is found in certain type tumor cells, such as lymphoma, leukemia, ovarian cancer, brain tumors, breast cancers, and various sarcomas. Since B7-H6 can bind NKp30 to exert anti-tumor effects by NK cells, which are able to recognize the difference between cancer cells and normal cells, B7-H6 may serve as a promising target for cancer immunotherapy."
definition: >-
  Immunoglobulin variable (IgV) domain of B7-H6. The members here are composed of the immunoglobulin variable (IgV) domain of B7-H6 (also known as NCR3LG1). B7-H6 contains one IgV domain and one IgC domain (IgV-IgC) and belongs to the B7-family, which consists of structurally related cell-surface protein ligands which bind to receptors on lymphocytes that regulate immune responses. B7-H6 is a ligand of NKp30, which is a member of CD28 family and an activating receptor of natural killer (NK) cells. The expression of NKp30 has been found in most of NK cells, which is involved in the process of tumor cell killing and interaction with antigen presenting cells (APCs) such as dendritic cells. Studies showed that NK cells eliminate B7-H6-expressing tumor cells either directly via cytotoxicity or indirectly by cytokine secretion. For instance, chimeric NKp30-expressing T cells responded to B7-H6(+) tumor cells and those T cells produced IFN-gamma and killed B7-H6-expressing tumor cells in vivo. B7-H6 mRNA is not found in normal cells, while high expression of B7-H6 is found in certain type tumor cells, such as lymphoma, leukemia, ovarian cancer, brain tumors, breast cancers, and various sarcomas. Since B7-H6 can bind NKp30 to exert anti-tumor effects by NK cells, which are able to recognize the difference between cancer cells and normal cells, B7-H6 may serve as a promising target for cancer immunotherapy. — an NCBI CDD conserved domain (cd20981); members share this curated model.
