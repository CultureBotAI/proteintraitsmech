identifier: CDD:cd22331
label: "Restriction endonuclease HinP1I and similar endonucleases. HinP1I is a type II restriction endonuclease that recognizes and cleaves a palindromic tetranucleotide sequence (G|CGC) in double-stranded DNA, producing 2 nt 5' overhanging ends, it belongs to the PDDEXK superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction endonuclease HinP1I and similar endonucleases. HinP1I is a type II restriction endonuclease that recognizes and cleaves a palindromic tetranucleotide sequence (G|CGC) in double-stranded DNA, producing 2 nt 5' overhanging ends, it belongs to the PDDEXK superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22331); members share this curated model.
