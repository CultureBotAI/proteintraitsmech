identifier: CDD:cd20475
label: "second Tudor-like Agenet domain found in fragile X mental retardation syndrome-related protein 1 (FXR1) and similar proteins. FXR1 is an RNA binding protein that interacts with the functionally similar proteins FMR1 and FXR2. It shuttles between the nucleus and cytoplasm and associates with polyribosomes, predominantly with the 60S ribosomal subunit. FXR1 contains two copies of the Tudor-like Agenet domain. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  second Tudor-like Agenet domain found in fragile X mental retardation syndrome-related protein 1 (FXR1) and similar proteins. FXR1 is an RNA binding protein that interacts with the functionally similar proteins FMR1 and FXR2. It shuttles between the nucleus and cytoplasm and associates with polyribosomes, predominantly with the 60S ribosomal subunit. FXR1 contains two copies of the Tudor-like Agenet domain. The model corresponds to the second one. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20475); members share this curated model.
