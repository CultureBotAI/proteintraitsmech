identifier: CDD:cd23795
label: "Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 G1 and related proteins. The subfamily includes mammalian ubiquitin-conjugating enzymes E2 G1 (UBE2G1/UBC7/E217K), fission yeast ubiquitin-conjugating enzyme E2 15 (UBC15), plant ubiquitin-conjugating enzymes E2 7 (UBC7), E2 13 (UBC13) and E2 14 (UBC14). They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. In vitro, UBE2G1 catalyzes 'Lys-48'-, as well as 'Lys-63'-linked polyubiquitination. It may be involved in the degradation of muscle-specific proteins and may mediate polyubiquitination of CYP3A4. Schizosaccharomyces pombe UBC15 has a role in the formation of chromatin structures that influence the localization of transcriptional silencing factors. Arabidopsis thaliana UBC7, UBC13 and UBC14 are involved in the formation of multiubiquitin chains. They signal the protein for selective degradation."
definition: >-
  Ubiquitin-conjugating enzyme E2, catalytic (UBCc) domain of ubiquitin-conjugating enzyme E2 G1 and related proteins. The subfamily includes mammalian ubiquitin-conjugating enzymes E2 G1 (UBE2G1/UBC7/E217K), fission yeast ubiquitin-conjugating enzyme E2 15 (UBC15), plant ubiquitin-conjugating enzymes E2 7 (UBC7), E2 13 (UBC13) and E2 14 (UBC14). They are ubiquitin-conjugating enzymes (EC 2.3.2.23) that accept ubiquitin from the E1 complex and catalyze the covalent attachment to other proteins. In vitro, UBE2G1 catalyzes 'Lys-48'-, as well as 'Lys-63'-linked polyubiquitination. It may be involved in the degradation of muscle-specific proteins and may mediate polyubiquitination of CYP3A4. Schizosaccharomyces pombe UBC15 has a role in the formation of chromatin structures that influence the localization of transcriptional silencing factors. Arabidopsis thaliana UBC7, UBC13 and UBC14 are involved in the formation of multiubiquitin chains. They signal the protein for selective degradation. — an NCBI CDD conserved domain (cd23795); members share this curated model.
