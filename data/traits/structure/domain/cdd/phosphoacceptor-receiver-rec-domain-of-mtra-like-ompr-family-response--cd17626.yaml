identifier: CDD:cd17626
label: "phosphoacceptor receiver (REC) domain of MtrA-like OmpR family response regulators. MtrA is part of MtrA/MtrB (or MtrAB), a highly conserved two-component system (TCS) implicated in the regulation of cell division in the actinobacteria. In unicellular Mycobacterium tuberculosis, MtrAB coordinates DNA replication with cell division and regulates the transcription of resuscitation-promoting factor B. In filamentous Streptomyces venezuelae, it links antibiotic production to sporulation. MtrA belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of MtrA-like OmpR family response regulators. MtrA is part of MtrA/MtrB (or MtrAB), a highly conserved two-component system (TCS) implicated in the regulation of cell division in the actinobacteria. In unicellular Mycobacterium tuberculosis, MtrAB coordinates DNA replication with cell division and regulates the transcription of resuscitation-promoting factor B. In filamentous Streptomyces venezuelae, it links antibiotic production to sporulation. MtrA belongs to the OmpR family of DNA-binding response regulators that contain N-terminal receiver (REC) and C-terminal DNA-binding winged helix-turn-helix effector domains. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17626); members share this curated model.
