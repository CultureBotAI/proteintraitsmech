identifier: CDD:cd05446
label: "Nucleotidyltransferase (NT) domain of  Caenorhabditis elegans (Ce) Germ Line Development (GLD)-2 and related domains. NT_CeGLD2_like: catalytic domain found in poly (A) polymerase (PAPs) similar to Caenorhabditis elegans (Ce) Germ Line Development (GLD)-2. PAPs are responsible for mRNA poly (A) tail synthesis. Multiple forms of PAPs are present in cell lines and tissues of different species as the result of gene duplication, alternative splicing and post-translational modification. CeGLD-2 is associated with P granules in early embryos. It is a cytoplasmic PAP, which promotes entry into meiosis from the mitosis and is needed for normal progression through meiotic prophase. CeGLD-2 has minimal PAP activity, but is stimulated in vitro by GLD-3, which may supply the RNA binding function. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these CeGLD2_like NT domains."
definition: >-
  Nucleotidyltransferase (NT) domain of Caenorhabditis elegans (Ce) Germ Line Development (GLD)-2 and related domains. NT_CeGLD2_like: catalytic domain found in poly (A) polymerase (PAPs) similar to Caenorhabditis elegans (Ce) Germ Line Development (GLD)-2. PAPs are responsible for mRNA poly (A) tail synthesis. Multiple forms of PAPs are present in cell lines and tissues of different species as the result of gene duplication, alternative splicing and post-translational modification. CeGLD-2 is associated with P granules in early embryos. It is a cytoplasmic PAP, which promotes entry into meiosis from the mitosis and is needed for normal progression through meiotic prophase. CeGLD-2 has minimal PAP activity, but is stimulated in vitro by GLD-3, which may supply the RNA binding function. These proteins are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in these CeGLD2_like NT domains. — an NCBI CDD conserved domain (cd05446); members share this curated model.
