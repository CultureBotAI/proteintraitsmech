identifier: CDD:cd19512
label: "ATPase domains of ATPase AAA-domain protein 3A (ATAD3A), -3B, and -3C, and similar ATPase domains. ATPase AAA-domain protein 3 (ATAD3) is a ubiquitously expressed mitochondrial protein involved in mitochondrial dynamics, DNA-nucleoid structural organization, cholesterol transport and steroidogenesis. The ATAD3 gene family in human comprises three paralog genes: ATAD3A, ATAD3B and ATAD3C. This subfamily belongs to the RecA-like NTPase family which includes the NTP binding domain of F1 and V1 H(+)ATPases, DnaB and related helicases as well as bacterial RecA and related eukaryotic and archaeal recombinases. The RecA-like NTPase family also includes bacterial conjugation proteins and related DNA transfer proteins involved in type II and type IV secretion."
definition: >-
