identifier: CDD:cd15756
label: "FYVE domain found in WD40 repeat and FYVE domain-containing protein 1 (WDFY1) and similar proteins. WDFY1, also termed FYVE domain containing protein localized to endosomes-1 (FENS-1), or phosphoinositide-binding protein 1, or zinc finger FYVE domain-containing protein 17, is a novel single FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. WDFY1 to early endosomes requires an intact FYVE domain and is inhibited by wortmannin, a PI3-kinase inhibitor. In addition to FYVE domain, WDFY1 harbors multiple WD-40 repeats."
definition: >-
  FYVE domain found in WD40 repeat and FYVE domain-containing protein 1 (WDFY1) and similar proteins. WDFY1, also termed FYVE domain containing protein localized to endosomes-1 (FENS-1), or phosphoinositide-binding protein 1, or zinc finger FYVE domain-containing protein 17, is a novel single FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. WDFY1 to early endosomes requires an intact FYVE domain and is inhibited by wortmannin, a PI3-kinase inhibitor. In addition to FYVE domain, WDFY1 harbors multiple WD-40 repeats. — an NCBI CDD conserved domain (cd15756); members share this curated model.
