identifier: CDD:cd20499
label: "peptidase C58 domain of Pseudomonas syringae type III effector HopN1 and related proteins. This family includes the C58 peptidase domain of Pseudomonas syringae HopN1 peptidase, a type III secretion system effector that can suppress plant cell death events in both compatible and incompatible interactions. HopN1's proteolytic activity is dependent upon the invariant C/H/D residues conserved in the C58/YopT family peptidase domain."
definition: >-
  peptidase C58 domain of Pseudomonas syringae type III effector HopN1 and related proteins. This family includes the C58 peptidase domain of Pseudomonas syringae HopN1 peptidase, a type III secretion system effector that can suppress plant cell death events in both compatible and incompatible interactions. HopN1's proteolytic activity is dependent upon the invariant C/H/D residues conserved in the C58/YopT family peptidase domain. — an NCBI CDD conserved domain (cd20499); members share this curated model.
