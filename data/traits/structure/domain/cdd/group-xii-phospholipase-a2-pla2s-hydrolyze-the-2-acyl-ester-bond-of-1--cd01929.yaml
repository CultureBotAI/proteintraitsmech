label: "Group XII Phospholipase A2; PLA2s hydrolyze the 2-acyl ester bond of 1,2-diacylglycero-3-phospholipids. This specific subgroup is found in metazoans; some members might be involved in signaling during helper T cell immune response. It belongs to the broad class of small extracellular Ca+ dependent PLA2s containing disulfide bridges."
