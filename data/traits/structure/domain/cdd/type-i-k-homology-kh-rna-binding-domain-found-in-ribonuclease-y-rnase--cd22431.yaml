identifier: CDD:cd22431
label: "type I K homology (KH) RNA-binding domain found in ribonuclease Y (RNase Y) and similar proteins. RNase Y is an endoribonuclease that initiates mRNA decay. It initiates the decay of all SAM-dependent riboswitches, such as yitJ riboswitch. RNase Y is involved in processing of the gapA operon mRNA and it cleaves between cggR and gapA. It is also the decay-initiating endonuclease for rpsO mRNA. It plays a role in degradation of type I toxin-antitoxin system bsrG/SR4 RNAs and also a minor role in degradation of type I toxin-antitoxin system bsrE/SR5 degradation."
definition: >-
  type I K homology (KH) RNA-binding domain found in ribonuclease Y (RNase Y) and similar proteins. RNase Y is an endoribonuclease that initiates mRNA decay. It initiates the decay of all SAM-dependent riboswitches, such as yitJ riboswitch. RNase Y is involved in processing of the gapA operon mRNA and it cleaves between cggR and gapA. It is also the decay-initiating endonuclease for rpsO mRNA. It plays a role in degradation of type I toxin-antitoxin system bsrG/SR4 RNAs and also a minor role in degradation of type I toxin-antitoxin system bsrE/SR5 degradation. — an NCBI CDD conserved domain (cd22431); members share this curated model.
