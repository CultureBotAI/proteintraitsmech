identifier: CDD:cd14958
label: "Peptidyl-alpha-hydroxyglycine alpha-amidating lyase (PAL, EC 4.3.2.5). PAL catalyzes the N-dealkylation of peptidyl-alpha-hydroxyglycine, which results in an alpha-amidated peptide and glyoxylate. Amidation of the C-terminus is required for the activity of many peptide hormones and neuropeptides. The catalytic residues of PAL are located on several NHL-repeats. The NHL (NCL-1, HT2A and LIN-41) repeat is found in multiple tandem copies, typically as 6 instances. It is about 40 residues long and resembles the WD repeat and other beta-propeller structures."
definition: >-
  Peptidyl-alpha-hydroxyglycine alpha-amidating lyase (PAL, EC 4.3.2.5). PAL catalyzes the N-dealkylation of peptidyl-alpha-hydroxyglycine, which results in an alpha-amidated peptide and glyoxylate. Amidation of the C-terminus is required for the activity of many peptide hormones and neuropeptides. The catalytic residues of PAL are located on several NHL-repeats. The NHL (NCL-1, HT2A and LIN-41) repeat is found in multiple tandem copies, typically as 6 instances. It is about 40 residues long and resembles the WD repeat and other beta-propeller structures. — an NCBI CDD conserved domain (cd14958); members share this curated model.
