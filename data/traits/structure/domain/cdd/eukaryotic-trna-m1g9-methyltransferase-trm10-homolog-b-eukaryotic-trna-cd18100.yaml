identifier: CDD:cd18100
label: "eukaryotic tRNA m1G9 methyltransferase Trm10 homolog B. Eukaryotic tRNA m1G9 methyltransferase Trm10 homolog B (TM10B) catalyzes the N(1) methylation of guanine at Position 9 (m(1)G9) of tRNA, which might play a role in the stabilization of tRNA and in translation termination efficiency. Trm10 is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
