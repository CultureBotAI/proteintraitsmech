identifier: CDD:cd18933
label: "basic helix-loop-helix-orange (bHLH-O) domain found in transcription factor HES-3 and similar proteins. HES-3, also termed Class B basic helix-loop-helix protein 43 (bHLHb43), or hairy and enhancer of split 3, is a bHLH-O transcription factor expressed in neural stem and progenitor cells that is involved in tissue regeneration. It regulates gene expression, cell growth, and insulin release. HES-3 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability."
definition: >-
  basic helix-loop-helix-orange (bHLH-O) domain found in transcription factor HES-3 and similar proteins. HES-3, also termed Class B basic helix-loop-helix protein 43 (bHLHb43), or hairy and enhancer of split 3, is a bHLH-O transcription factor expressed in neural stem and progenitor cells that is involved in tissue regeneration. It regulates gene expression, cell growth, and insulin release. HES-3 is one mammalian counterpart of the Hairy and Enhancer of split proteins that play a critical role in many physiological processes including cellular differentiation, cell cycle arrest, apoptosis and self-renewal ability. — an NCBI CDD conserved domain (cd18933); members share this curated model.
