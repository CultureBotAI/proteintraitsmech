identifier: CDD:cd11457
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in L-Myc and similar proteins. L-Myc, also termed Class E basic helix-loop-helix protein 38 (bHLHe38), or protein L-Myc-1, or V-myc myelocytomatosis viral oncogene homolog, is a bHLHZip oncoprotein belonging to the Myc oncogene protein family. It binds DNA as a heterodimer with MAX. L-Myc is co-expressed with another Myc family member and has weaker transformation/transactivation activities. L-Myc knockout mouse did not exhibit any phenotypic abnormalities."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in L-Myc and similar proteins. L-Myc, also termed Class E basic helix-loop-helix protein 38 (bHLHe38), or protein L-Myc-1, or V-myc myelocytomatosis viral oncogene homolog, is a bHLHZip oncoprotein belonging to the Myc oncogene protein family. It binds DNA as a heterodimer with MAX. L-Myc is co-expressed with another Myc family member and has weaker transformation/transactivation activities. L-Myc knockout mouse did not exhibit any phenotypic abnormalities. — an NCBI CDD conserved domain (cd11457); members share this curated model.
