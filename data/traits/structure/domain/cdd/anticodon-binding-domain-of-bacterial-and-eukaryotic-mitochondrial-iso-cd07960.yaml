identifier: CDD:cd07960
label: "Anticodon-binding domain of bacterial and eukaryotic mitochondrial isoleucyl tRNA synthetases. This domain is found in isoleucyl tRNA synthetases (IleRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. This family includes bacterial and eukaryotic mitochondrial members. IleRS catalyzes the transfer of isoleucine to the 3'-end of its tRNA."
definition: >-
  Anticodon-binding domain of bacterial and eukaryotic mitochondrial isoleucyl tRNA synthetases. This domain is found in isoleucyl tRNA synthetases (IleRS), which belong to the class Ia aminoacyl tRNA synthetases. It lies C-terminal to the catalytic core domain, and recognizes and specifically binds to the tRNA anticodon. This family includes bacterial and eukaryotic mitochondrial members. IleRS catalyzes the transfer of isoleucine to the 3'-end of its tRNA. — an NCBI CDD conserved domain (cd07960); members share this curated model.
