identifier: CDD:cd01667
label: "TGS (ThrRS, GTPase and SpoT) domain found in threonyl-tRNA synthetase (ThrRS) and similar proteins. ThrRS, also termed cytoplasmic threonine--tRNA ligase, is a class II aminoacyl-tRNA synthetase (aaRS) that plays an essential role in protein synthesis by catalyzing the aminoacylation of tRNA(Thr), generating aminoacyl-tRNA, and editing misacylation. In addition to its catalytic and anticodon-binding domains, ThrRS has an N-terminal TGS domain, named after the ThrRS, GTPase, and SpoT/RelA proteins where it occurs. TGS is a small domain with a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions."
definition: >-
  TGS (ThrRS, GTPase and SpoT) domain found in threonyl-tRNA synthetase (ThrRS) and similar proteins. ThrRS, also termed cytoplasmic threonine--tRNA ligase, is a class II aminoacyl-tRNA synthetase (aaRS) that plays an essential role in protein synthesis by catalyzing the aminoacylation of tRNA(Thr), generating aminoacyl-tRNA, and editing misacylation. In addition to its catalytic and anticodon-binding domains, ThrRS has an N-terminal TGS domain, named after the ThrRS, GTPase, and SpoT/RelA proteins where it occurs. TGS is a small domain with a beta-grasp ubiquitin-like fold, a common structure involved in protein-protein interactions. — an NCBI CDD conserved domain (cd01667); members share this curated model.
