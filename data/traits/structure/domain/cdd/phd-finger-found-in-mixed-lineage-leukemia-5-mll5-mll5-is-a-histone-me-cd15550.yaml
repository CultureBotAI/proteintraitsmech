identifier: CDD:cd15550
label: "PHD finger found in mixed lineage leukemia 5 (MLL5). MLL5 is a histone methyltransferase that plays a key role in hematopoiesis, spermatogenesis and cell cycle progression. It contains a single plant homeodomain (PHD) finger followed by a catalytic SET domain. MLL5 can be recruited to E2F1-responsive promoters to stimulate H3K4 trimethylation and transcriptional activation by binding to the cell cycle regulator host cell factor (HCF-1), thereby facilitating the cell cycle G1 to S phase transition. It is also involved in mitotic fidelity and genomic integrity by modulating the stability of the chromosomal passenger complex (CPC) via the interaction with Borealin. Moreover, MLL5 is a component of a complex associated with retinoic acid receptor that requires GlcN Acylation of its SET domain in order to activate its histone lysine methyltransferase activity. It also participates in the camptothecin (CPT)-induced p53 activation. Furthermore, MLL5 indirectly regulates H3K4 methylation, represses cyclin A2 (CycA) expression, and promotes myogenic differentiation."
definition: >-
  PHD finger found in mixed lineage leukemia 5 (MLL5). MLL5 is a histone methyltransferase that plays a key role in hematopoiesis, spermatogenesis and cell cycle progression. It contains a single plant homeodomain (PHD) finger followed by a catalytic SET domain. MLL5 can be recruited to E2F1-responsive promoters to stimulate H3K4 trimethylation and transcriptional activation by binding to the cell cycle regulator host cell factor (HCF-1), thereby facilitating the cell cycle G1 to S phase transition. It is also involved in mitotic fidelity and genomic integrity by modulating the stability of the chromosomal passenger complex (CPC) via the interaction with Borealin. Moreover, MLL5 is a component of a complex associated with retinoic acid receptor that requires GlcN Acylation of its SET domain in order to activate its histone lysine methyltransferase activity. It also participates in the camptothecin (CPT)-induced p53 activation. Furthermore, MLL5 indirectly regulates H3K4 methylation, represses cyclin A2 (CycA) expression, and promotes myogenic differentiation. — an NCBI CDD conserved domain (cd15550); members share this curated model.
