identifier: CDD:cd12899
label: "PRY/SPRY domain in tripartite motif-containing protein 76 (TRIM76)-like. This domain is similar to the distinct PRY/SPRY subdomain found at the C-terminus of TRIM76, a Class I TRIM protein. TRIM76 (also known as cardiomyopathy-associated protein 5 or CMYA5 or myospryn or SPRYD2) is a muscle-specific member of the TRIM superfamily, but lacks the RING domain. It has been suggested that TRIM76 is involved in two distinct processes, protein kinase A signaling and vesicular trafficking."
definition: >-
  PRY/SPRY domain in tripartite motif-containing protein 76 (TRIM76)-like. This domain is similar to the distinct PRY/SPRY subdomain found at the C-terminus of TRIM76, a Class I TRIM protein. TRIM76 (also known as cardiomyopathy-associated protein 5 or CMYA5 or myospryn or SPRYD2) is a muscle-specific member of the TRIM superfamily, but lacks the RING domain. It has been suggested that TRIM76 is involved in two distinct processes, protein kinase A signaling and vesicular trafficking. — an NCBI CDD conserved domain (cd12899); members share this curated model.
