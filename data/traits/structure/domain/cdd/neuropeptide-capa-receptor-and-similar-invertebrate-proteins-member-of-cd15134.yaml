identifier: CDD:cd15134
label: "neuropeptide capa receptor and similar invertebrate proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. CapaR is a G-protein coupled receptor for the Drosophila melanogaster capa neuropeptides (Drm-capa-1 and -2), which act on the Malpighian tubules to increase fluid transport. The capa peptides are evolutionarily related to vertebrate Neuromedin U neuropeptide and contain a C-terminal FPRXamide motif. CapaR regulates fluid homeostasis through its ligands, thereby acts as a desiccation stress-responsive receptor. CapaR undergoes desensitization, with internalization mediated by beta-arrestin-2."
definition: >-
  neuropeptide capa receptor and similar invertebrate proteins, member of the class A family of seven-transmembrane G protein-coupled receptors. CapaR is a G-protein coupled receptor for the Drosophila melanogaster capa neuropeptides (Drm-capa-1 and -2), which act on the Malpighian tubules to increase fluid transport. The capa peptides are evolutionarily related to vertebrate Neuromedin U neuropeptide and contain a C-terminal FPRXamide motif. CapaR regulates fluid homeostasis through its ligands, thereby acts as a desiccation stress-responsive receptor. CapaR undergoes desensitization, with internalization mediated by beta-arrestin-2. — an NCBI CDD conserved domain (cd15134); members share this curated model.
