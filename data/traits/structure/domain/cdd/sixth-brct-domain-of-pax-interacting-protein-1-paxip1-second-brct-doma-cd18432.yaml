identifier: CDD:cd18432
label: "sixth BRCT domain of PAX-interacting protein 1 (PAXIP1), second BRCT domain of mediator of DNA damage checkpoint protein 1 (MDC1) and similar proteins. PAXIP1, also termed PAX transactivation activation domain-interacting protein (PTIP), is involved in DNA damage response and in transcriptional regulation through histone methyltransferase (HMT) complexes. It also facilitates ATM-mediated activation of p53 and promotes cellular resistance to ionizing radiation. PAXIP1 contains six BRCT repeats. MDC1, also termed nuclear factor with BRCT domains 1 (NFBD1), is a nuclear chromatin-associated protein that is required for checkpoint mediated cell cycle arrest in response to DNA damage within both the S phase and G2/M phases of the cell cycle. It directly binds phosphorylated histone H2AX to regulate cellular responses to DNA double-strand breaks. MDC1 contains a forkhead-associated (FHA) domain and two BRCT domains, as well as an internal 41-amino acid repeat sequence. The family corresponds to the sixth BRCT domain of PAXIP1 and the second BRCT domain of MDC1."
definition: >-
  sixth BRCT domain of PAX-interacting protein 1 (PAXIP1), second BRCT domain of mediator of DNA damage checkpoint protein 1 (MDC1) and similar proteins. PAXIP1, also termed PAX transactivation activation domain-interacting protein (PTIP), is involved in DNA damage response and in transcriptional regulation through histone methyltransferase (HMT) complexes. It also facilitates ATM-mediated activation of p53 and promotes cellular resistance to ionizing radiation. PAXIP1 contains six BRCT repeats. MDC1, also termed nuclear factor with BRCT domains 1 (NFBD1), is a nuclear chromatin-associated protein that is required for checkpoint mediated cell cycle arrest in response to DNA damage within both the S phase and G2/M phases of the cell cycle. It directly binds phosphorylated histone H2AX to regulate cellular responses to DNA double-strand breaks. MDC1 contains a forkhead-associated (FHA) domain and two BRCT domains, as well as an internal 41-amino acid repeat sequence. The family corresponds to the sixth BRCT domain of PAXIP1 and the second BRCT domain of MDC1. — an NCBI CDD conserved domain (cd18432); members share this curated model.
