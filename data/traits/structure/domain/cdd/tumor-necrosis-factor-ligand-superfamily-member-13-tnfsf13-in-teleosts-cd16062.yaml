identifier: CDD:cd16062
label: "Tumor necrosis factor ligand superfamily member 13 (TNFSF13) in teleosts, also known as a proliferation-inducing ligand (APRIL). This family contains TNFSF13 (also known as a proliferation-inducing ligand or APRIL, apoptosis ligand-related leukocyte-expressed ligand-2 or TALL-2, zTNF2, TRDL-1, UNQ383/PRO715 and CD256) found in teleosts (i.e. ray-finned, bony fish). Localized or genome-wide duplication and evolution of the TNFSF members appear to have paralleled the emergence of the adaptive immune system. TNFSF13/APRIL is predominantly expressed in the skin, spleen, and head kidney, and is significantly upregulated in most immune tissues by A. hydrophila and Aquareovirus infections. In teleosts, liver is the most responsive tissue against bacterial infection, whereas gill is the most responsive tissue against viral infection. Increased APRIL expression in grass carp after bacterial and viral infections suggests that it play a potentially important role in the immune system of fish. In tetrapods, APRIL regulates lymphocyte survival and activation, and has been implicated in tumorigenesis and autoimmune diseases. It is important for antibody class-switching and plasma-cell survival. It binds two TNF receptors, which it shares with TNFSF13B (also known as B-cell activating factor or BAFF), and often thus called BAFF-APRIL system: TNFRSF17 (also known as B-cell maturation antigen or BCMA) and TNFRSF13B (also known as transmembrane activator and calcium modulator and cyclophilin ligand interactor or TACI). BCMA, expressed by plasmablasts and plasma cells, promotes plasma cell survival, while TACI is critical for T-cell-independent responses of B cells to type I and type II antigens, negative regulation of the B-cell compartment and class-switch recombination of B cells. APRIL is a type-II transmembrane protein, processed intracellularly and found in circulation either as a trimer, or a multimer associated with proteoglycans. APRIL is over-expressed in a majority of malignancies, playing a potential role in the occurrence and development of these tumors. High expression of APRIL in tumor cells and fibroblasts of patients with non-small cell lung cancer (NSCLC) is associated with poor prognosis. APRIL also induces tumorigenesis and metastasis of colorectal cancer (CRC) cells via activation of the PI3 K/Akt pathway, and is associated with carcinogenesis and prognosis, suggesting that APRIL might be used as a novel target for the intervention and therapy. APRIL as well as C-reactive protein (CRP) are elevated in patients with pancreatic ductal adenocarcinoma (PDAC)-associated diabetes mellitus (PDAC-DM), and are significantly decreased after surgery. Serum APRIL levels of seropositive rheumatoid arthritis (RA) patients are significantly higher than those of seronegative RA patients; APRIL may participate in the formation of seropositive RA. BAFF and APRIL have been known to assemble as BAFF-APRIL heterotrimers of undefined stoichiometries, and have been detected in the serum of patients with rheumatic diseases such as systemic lupus erythematosus (SLE)."
definition: >-
  Tumor necrosis factor ligand superfamily member 13 (TNFSF13) in teleosts, also known as a proliferation-inducing ligand (APRIL). This family contains TNFSF13 (also known as a proliferation-inducing ligand or APRIL, apoptosis ligand-related leukocyte-expressed ligand-2 or TALL-2, zTNF2, TRDL-1, UNQ383/PRO715 and CD256) found in teleosts (i.e. ray-finned, bony fish). Localized or genome-wide duplication and evolution of the TNFSF members appear to have paralleled the emergence of the adaptive immune system. TNFSF13/APRIL is predominantly expressed in the skin, spleen, and head kidney, and is significantly upregulated in most immune tissues by A. hydrophila and Aquareovirus infections. In teleosts, liver is the most responsive tissue against bacterial infection, whereas gill is the most responsive tissue against viral infection. Increased APRIL expression in grass carp after bacterial and viral infections suggests that it play a potentially important role in the immune system of fish. In tetrapods, APRIL regulates lymphocyte survival and activation, and has been implicated in tumorigenesis and autoimmune diseases. It is important for antibody class-switching and plasma-cell survival. It binds two TNF receptors, which it shares with TNFSF13B (also known as B-cell activating factor or BAFF), and often thus called BAFF-APRIL system: TNFRSF17 (also known as B-cell maturation antigen or BCMA) and TNFRSF13B (also known as transmembrane activator and calcium modulator and cyclophilin ligand interactor or TACI). BCMA, expressed by plasmablasts and plasma cells, promotes plasma cell survival, while TACI is critical for T-cell-independent responses of B cells to type I and type II antigens, negative regulation of the B-cell compartment and class-switch recombination of B cells. APRIL is a type-II transmembrane protein, processed intracellularly and found in circulation either as a trimer, or a multimer associated with proteoglycans. APRIL is over-expressed in a majority of malignancies, playing a potential role in the occurrence and development of these tumors. High expression of APRIL in tumor cells and fibroblasts of patients with non-small cell lung cancer (NSCLC) is associated with poor prognosis. APRIL also induces tumorigenesis and metastasis of colorectal cancer (CRC) cells via activation of the PI3 K/Akt pathway, and is associated with carcinogenesis and prognosis, suggesting that APRIL might be used as a novel target for the intervention and therapy. APRIL as well as C-reactive protein (CRP) are elevated in patients with pancreatic ductal adenocarcinoma (PDAC)-associated diabetes mellitus (PDAC-DM), and are significantly decreased after surgery. Serum APRIL levels of seropositive rheumatoid arthritis (RA) patients are significantly higher than those of seronegative RA patients; APRIL may participate in the formation of seropositive RA. BAFF and APRIL have been known to assemble as BAFF-APRIL heterotrimers of undefined stoichiometries, and have been detected in the serum of patients with rheumatic diseases such as systemic lupus erythematosus (SLE). — an NCBI CDD conserved domain (cd16062); members share this curated model.
