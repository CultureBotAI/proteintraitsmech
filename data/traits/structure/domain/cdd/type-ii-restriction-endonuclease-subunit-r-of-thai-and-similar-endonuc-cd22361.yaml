identifier: CDD:cd22361
label: "type II restriction endonuclease subunit R of ThaI and similar endonucleases. The PD-(D/E)XK type II restriction endonuclease ThaI cuts the target sequence CG/CG with blunt ends. It belongs to a superfamily of PDDEXK nucleases that includes diverse members such as very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  type II restriction endonuclease subunit R of ThaI and similar endonucleases. The PD-(D/E)XK type II restriction endonuclease ThaI cuts the target sequence CG/CG with blunt ends. It belongs to a superfamily of PDDEXK nucleases that includes diverse members such as very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22361); members share this curated model.
