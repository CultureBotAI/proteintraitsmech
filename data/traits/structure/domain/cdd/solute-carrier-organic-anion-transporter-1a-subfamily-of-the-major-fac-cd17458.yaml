identifier: CDD:cd17458
label: "Solute carrier organic anion transporter 1A subfamily of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 1A (SLCO1A), also called Organic anion-transporting polypeptide 1A (OATP1A), subfamily is composed of one human member OATP1A2 (encoded by SLCO1A2) and several rodent proteins encoded by the Slco1a1, Slco1a3, Slco1a4, Slco1a5, and Slco1a6 genes. OATP1A2, also known as human OATP-A or OATP1, shows a broad spectrum of substrates including endogenous compounds (such as bile acids, steroid hormones and their conjugates, thyroid hormones) and various drugs (such as fexofenadine, ouabain and the cyanobacterial toxin microcystin). It is expressed in the brain, kidney, intestine, liver, lung, testes, and the eye (ciliary body). The SLCO1A/OATP1A subfamily belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Solute carrier organic anion transporter 1A subfamily of the Major Facilitator Superfamily of transporters. The Solute carrier organic anion transporter 1A (SLCO1A), also called Organic anion-transporting polypeptide 1A (OATP1A), subfamily is composed of one human member OATP1A2 (encoded by SLCO1A2) and several rodent proteins encoded by the Slco1a1, Slco1a3, Slco1a4, Slco1a5, and Slco1a6 genes. OATP1A2, also known as human OATP-A or OATP1, shows a broad spectrum of substrates including endogenous compounds (such as bile acids, steroid hormones and their conjugates, thyroid hormones) and various drugs (such as fexofenadine, ouabain and the cyanobacterial toxin microcystin). It is expressed in the brain, kidney, intestine, liver, lung, testes, and the eye (ciliary body). The SLCO1A/OATP1A subfamily belongs to the Solute carrier organic anion transporter [SLCO, also called organic anion transporting polypeptides (OATPs) or Solute carrier family 21] family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17458); members share this curated model.
