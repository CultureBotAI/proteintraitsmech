identifier: CDD:cd23628
label: "extracellular domain (ECD) found in acrosomal protein SP-10, prostate and testis expressed protein 14 (Pate14) and similar proteins. The family includes SP-10 and Pate14. SP-10 (also called acrosomal vesicle protein 1 (ACRV1)) is a human intra-acrosomal protein that is first detected in the developing acrosome of round spermatids and is observed associated with the acrosomal membranes and matrix of mature sperm. Pate14 ( also called prostate and testis expressed 14, or secreted seminal-vesicle Ly-6 protein 1 (SSLP-1)) is a secreted Ly-6 protein purified from mouse seminal vesicle fluid. Members in this family contain an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in acrosomal protein SP-10, prostate and testis expressed protein 14 (Pate14) and similar proteins. The family includes SP-10 and Pate14. SP-10 (also called acrosomal vesicle protein 1 (ACRV1)) is a human intra-acrosomal protein that is first detected in the developing acrosome of round spermatids and is observed associated with the acrosomal membranes and matrix of mature sperm. Pate14 ( also called prostate and testis expressed 14, or secreted seminal-vesicle Ly-6 protein 1 (SSLP-1)) is a secreted Ly-6 protein purified from mouse seminal vesicle fluid. Members in this family contain an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23628); members share this curated model.
