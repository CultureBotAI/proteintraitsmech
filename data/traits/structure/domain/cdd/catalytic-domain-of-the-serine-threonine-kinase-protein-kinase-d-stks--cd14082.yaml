identifier: CDD:cd14082
label: "Catalytic domain of the Serine/Threonine kinase, Protein Kinase D. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PKDs are important regulators of many intracellular signaling pathways such as ERK and JNK, and cellular processes including the organization of the trans-Golgi network, membrane trafficking, cell proliferation, migration, and apoptosis. They contain N-terminal cysteine-rich zinc binding C1 (PKC conserved region 1), central PH (Pleckstrin Homology), and C-terminal catalytic kinase domains. Mammals harbor three types of PKDs: PKD1 (or PKCmu), PKD2, and PKD3 (or PKCnu). PKDs are activated in a PKC-dependent manner by many agents including diacylglycerol (DAG), PDGF, neuropeptides, oxidative stress, and tumor-promoting phorbol esters, among others. The PKD subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Protein Kinase D. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. PKDs are important regulators of many intracellular signaling pathways such as ERK and JNK, and cellular processes including the organization of the trans-Golgi network, membrane trafficking, cell proliferation, migration, and apoptosis. They contain N-terminal cysteine-rich zinc binding C1 (PKC conserved region 1), central PH (Pleckstrin Homology), and C-terminal catalytic kinase domains. Mammals harbor three types of PKDs: PKD1 (or PKCmu), PKD2, and PKD3 (or PKCnu). PKDs are activated in a PKC-dependent manner by many agents including diacylglycerol (DAG), PDGF, neuropeptides, oxidative stress, and tumor-promoting phorbol esters, among others. The PKD subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14082); members share this curated model.
