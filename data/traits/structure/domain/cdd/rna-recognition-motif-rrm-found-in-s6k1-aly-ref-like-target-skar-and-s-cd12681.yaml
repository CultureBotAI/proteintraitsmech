identifier: CDD:cd12681
label: "RNA recognition motif (RRM) found in S6K1 Aly/REF-like target (SKAR) and similar proteins. This subgroup corresponds to the RRM of SKAR, also termed polymerase delta-interacting protein 3 (PDIP3), 46 kDa DNA polymerase delta interaction protein (PDIP46), belonging to the Aly/REF family of RNA binding proteins that have been implicated in coupling transcription with pre-mRNA splicing and nucleo-cytoplasmic mRNA transport. SKAR is widely expressed and localizes to the nucleus. It may be a critical player in the function of S6K1 in cell and organism growth control by binding the activated, hyperphosphorylated form of S6K1 but not S6K2. Furthermore, SKAR functions as a protein partner of the p50 subunit of DNA polymerase delta. In addition, SKAR may have particular importance in pancreatic beta cell size determination and insulin secretion. SKAR contains a well conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif (RRM) found in S6K1 Aly/REF-like target (SKAR) and similar proteins. This subgroup corresponds to the RRM of SKAR, also termed polymerase delta-interacting protein 3 (PDIP3), 46 kDa DNA polymerase delta interaction protein (PDIP46), belonging to the Aly/REF family of RNA binding proteins that have been implicated in coupling transcription with pre-mRNA splicing and nucleo-cytoplasmic mRNA transport. SKAR is widely expressed and localizes to the nucleus. It may be a critical player in the function of S6K1 in cell and organism growth control by binding the activated, hyperphosphorylated form of S6K1 but not S6K2. Furthermore, SKAR functions as a protein partner of the p50 subunit of DNA polymerase delta. In addition, SKAR may have particular importance in pancreatic beta cell size determination and insulin secretion. SKAR contains a well conserved RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd12681); members share this curated model.
