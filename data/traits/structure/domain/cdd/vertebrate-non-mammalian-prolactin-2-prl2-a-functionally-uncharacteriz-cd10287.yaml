identifier: CDD:cd10287
label: "Vertebrate, non-mammalian prolactin 2 (PRL2). A functionally uncharacterized subfamily of the growth-hormone-like helical cytokines, which is found in vertebrata (except for mammals). The protein has been shown to be expressed in the zebrafish eye and brain, but not the pituitary gland, and might play a role in retina development."
definition: >-
  Vertebrate, non-mammalian prolactin 2 (PRL2). A functionally uncharacterized subfamily of the growth-hormone-like helical cytokines, which is found in vertebrata (except for mammals). The protein has been shown to be expressed in the zebrafish eye and brain, but not the pituitary gland, and might play a role in retina development. — an NCBI CDD conserved domain (cd10287); members share this curated model.
