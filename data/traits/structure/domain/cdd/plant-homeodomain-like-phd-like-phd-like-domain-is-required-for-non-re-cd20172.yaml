identifier: CDD:cd20172
label: "plant homeodomain-like (PHD_like). PHD-like domain is required for non-redundant repression of several seed maturation genes and other seed-specific genes in seedlings. The PHD finger superfamily includes a canonical PHD finger typically characterized as Cys4HisCys3, and a non-canonical extended PHD finger, characterized as Cys2HisCys5HisCys2His. PHD-like domain in the regulation of gene expression involving histone modifications and DNA methylation-mediated epigenetic mechanisms."
definition: >-
  plant homeodomain-like (PHD_like). PHD-like domain is required for non-redundant repression of several seed maturation genes and other seed-specific genes in seedlings. The PHD finger superfamily includes a canonical PHD finger typically characterized as Cys4HisCys3, and a non-canonical extended PHD finger, characterized as Cys2HisCys5HisCys2His. PHD-like domain in the regulation of gene expression involving histone modifications and DNA methylation-mediated epigenetic mechanisms. — an NCBI CDD conserved domain (cd20172); members share this curated model.
