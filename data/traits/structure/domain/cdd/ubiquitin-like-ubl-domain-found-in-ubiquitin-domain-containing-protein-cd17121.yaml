identifier: CDD:cd17121
label: "ubiquitin-like (Ubl) domain found in ubiquitin domain-containing protein 2 (UBTD2). UBTD2, also termed dendritic cell-derived ubiquitin-like protein (DC-UbP), or ubiquitin-like protein SB72, is a potential ubiquitin shuttle protein firstly identified in dendritic cells and implicated in apoptosis. It binds proteins involved in the ubiquitination pathway and may play an important role in regulating protein ubiquitination and delivery of ubiquitinated substrates in eukaryotic cells. UBTD2 is expressed in tumor cells but not in normal human adult tissue suggesting a role in tumorogenesis. It can potentially regulate the stability of proteins involved in various physiological processes relevant to many disease phenotypes, such as ageing and cancer. UBTD2 reconciles protein ubiquitination and deubiquitination via linking UbE1 and USP5 enzymes."
definition: >-
