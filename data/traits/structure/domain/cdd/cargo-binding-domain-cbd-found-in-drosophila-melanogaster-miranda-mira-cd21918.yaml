identifier: CDD:cd21918
label: "cargo-binding domain (CBD)found in Drosophila melanogaster Miranda (Mira) and similar proteins. Miranda (Mira) is a highly coiled?coil protein involved in neuroblast asymmetric division. It is associated with embryonic centrosomes of Drosophila melanogaster. It is required for the asymmetric localization of Prospero during mitosis in Drosophila. Mira is a multi-domain scaffold protein that concentrates at the basal cortex along with its cargos during mitosis of the asymmetric division of Drosophila neuroblasts (NBs). The model corresponds to the central cargo-binding domain (CBD) that can form a parallel coiled-coil dimer. The dimerization of Mira CBD is essential to coordinate the polarized distribution of cargo proteins Stau, Brat and Pros in vivo."
definition: >-
  cargo-binding domain (CBD)found in Drosophila melanogaster Miranda (Mira) and similar proteins. Miranda (Mira) is a highly coiled?coil protein involved in neuroblast asymmetric division. It is associated with embryonic centrosomes of Drosophila melanogaster. It is required for the asymmetric localization of Prospero during mitosis in Drosophila. Mira is a multi-domain scaffold protein that concentrates at the basal cortex along with its cargos during mitosis of the asymmetric division of Drosophila neuroblasts (NBs). The model corresponds to the central cargo-binding domain (CBD) that can form a parallel coiled-coil dimer. The dimerization of Mira CBD is essential to coordinate the polarized distribution of cargo proteins Stau, Brat and Pros in vivo. — an NCBI CDD conserved domain (cd21918); members share this curated model.
