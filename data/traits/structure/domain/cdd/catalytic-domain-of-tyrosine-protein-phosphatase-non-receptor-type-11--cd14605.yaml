identifier: CDD:cd14605
label: "catalytic domain of tyrosine-protein phosphatase non-receptor type 11. Tyrosine-protein phosphatase non-receptor type 11 (PTPN11), also called SH2 domain-containing tyrosine phosphatase 2 (SHP-2 or SHP2), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN11 promotes the activation of the RAS/Mitogen-Activated Protein Kinases (MAPK) Extracellular-Regulated Kinases 1/2 (ERK1/2) pathway, a canonical signaling cascade that plays key roles in various cellular processes, including proliferation, survival, differentiation, migration, or metabolism. It also regulates the phosphoinositide 3-kinase (PI3K)/AKT pathway, a fundamental cascade that functions in cell survival, proliferation, migration, morphogenesis, and metabolism. PTPN11 dysregulation is associated with several developmental diseases and malignancies, such as Noonan syndrome and juvenile myelomonocytic leukemia. It contains two tandem SH2 domains, a catalytic PTP domain, and a C-terminal tail with regulatory properties."
definition: >-
  catalytic domain of tyrosine-protein phosphatase non-receptor type 11. Tyrosine-protein phosphatase non-receptor type 11 (PTPN11), also called SH2 domain-containing tyrosine phosphatase 2 (SHP-2 or SHP2), belongs to the family of classical tyrosine-specific protein tyrosine phosphatases (PTPs). PTPs (EC 3.1.3.48) catalyze the dephosphorylation of phosphotyrosine peptides. PTPN11 promotes the activation of the RAS/Mitogen-Activated Protein Kinases (MAPK) Extracellular-Regulated Kinases 1/2 (ERK1/2) pathway, a canonical signaling cascade that plays key roles in various cellular processes, including proliferation, survival, differentiation, migration, or metabolism. It also regulates the phosphoinositide 3-kinase (PI3K)/AKT pathway, a fundamental cascade that functions in cell survival, proliferation, migration, morphogenesis, and metabolism. PTPN11 dysregulation is associated with several developmental diseases and malignancies, such as Noonan syndrome and juvenile myelomonocytic leukemia. It contains two tandem SH2 domains, a catalytic PTP domain, and a C-terminal tail with regulatory properties. — an NCBI CDD conserved domain (cd14605); members share this curated model.
