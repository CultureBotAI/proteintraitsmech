identifier: CDD:cd13888
label: "The third cupredoxin domain of multicopper oxidase McoP and similar proteins. This subfamily includes archaeal and bacterial multicopper oxidases (MCOs), represented by the extremely thermostable McoP from the hyperthermophilic archaeon Pyrobaculum aerophilum. McoP is an efficient metallo-oxidase that catalyzes the oxidation of cuprous and ferrous ions. It is noteworthy that McoP has three-fold higher catalytic efficiency when using nitrous oxide as electron acceptor than when using dioxygen, the typical oxidizing substrate of multicopper oxidases. McoP may function as a novel archaeal nitrous oxide reductase that is probably involved in the denitrification pathway in archaea. Members of this subfamily contain three cupredoxin domain repeats. The copper ions are bound in several sites; Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 3 of 3-domain MCOs contains the Type 1 (T1) copper binding site and part the trinuclear copper binding site, which is located at the interface of domains 1 and 3."
definition: >-
  The third cupredoxin domain of multicopper oxidase McoP and similar proteins. This subfamily includes archaeal and bacterial multicopper oxidases (MCOs), represented by the extremely thermostable McoP from the hyperthermophilic archaeon Pyrobaculum aerophilum. McoP is an efficient metallo-oxidase that catalyzes the oxidation of cuprous and ferrous ions. It is noteworthy that McoP has three-fold higher catalytic efficiency when using nitrous oxide as electron acceptor than when using dioxygen, the typical oxidizing substrate of multicopper oxidases. McoP may function as a novel archaeal nitrous oxide reductase that is probably involved in the denitrification pathway in archaea. Members of this subfamily contain three cupredoxin domain repeats. The copper ions are bound in several sites; Type 1, Type 2, and/or Type 3. The ensemble of types 2 and 3 copper is called a trinuclear cluster. MCOs oxidize their substrate by accepting electrons at a mononuclear copper center and transferring them to the active site trinuclear copper center. The cupredoxin domain 3 of 3-domain MCOs contains the Type 1 (T1) copper binding site and part the trinuclear copper binding site, which is located at the interface of domains 1 and 3. — an NCBI CDD conserved domain (cd13888); members share this curated model.
