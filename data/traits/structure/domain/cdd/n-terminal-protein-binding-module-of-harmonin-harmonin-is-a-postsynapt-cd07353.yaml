identifier: CDD:cd07353
label: "N-terminal protein-binding module of harmonin. Harmonin is a postsynaptic density-95/discs-large/ZO-1 (PDZ) domain-containing scaffold protein, which organizes the Usher protein network of the inner ear and the retina. Harmonin contains a single copy of this domain, which is found at the N-terminus of all three harmonin isoform classes (a, b and c), and which preceeds the first PDZ protein-binding domain, PDZ1. This harmonin_N domain binds specifically to a short internal peptide fragment of the cadherin 23 cytoplasmic domain; cadherin 23 is a component of the Usher protein network."
definition: >-
  N-terminal protein-binding module of harmonin. Harmonin is a postsynaptic density-95/discs-large/ZO-1 (PDZ) domain-containing scaffold protein, which organizes the Usher protein network of the inner ear and the retina. Harmonin contains a single copy of this domain, which is found at the N-terminus of all three harmonin isoform classes (a, b and c), and which preceeds the first PDZ protein-binding domain, PDZ1. This harmonin_N domain binds specifically to a short internal peptide fragment of the cadherin 23 cytoplasmic domain; cadherin 23 is a component of the Usher protein network. — an NCBI CDD conserved domain (cd07353); members share this curated model.
