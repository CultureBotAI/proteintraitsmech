identifier: CDD:cd09450
label: "This family represents the LIM domain of ALP, actinin-associated LIM protein. This family represents the LIM domain of ALP, actinin-associated LIM protein. ALP contains an N-terminal PDZ domain, a C-terminal LIM domain and an ALP-subfamily-specific 34-amino-acid motif termed ALP-like motif (AM), which contains a putative consensus protein kinase C (PKC) phosphorylation site and two alpha-helices. ALP proteins are found in heart and in skeletal muscle. ALP may act as a signaling molecule which is regulated by PKC-dependent signaling. ALP plays an essential role in the development of RV (right ventricle) chamber. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  This family represents the LIM domain of ALP, actinin-associated LIM protein. This family represents the LIM domain of ALP, actinin-associated LIM protein. ALP contains an N-terminal PDZ domain, a C-terminal LIM domain and an ALP-subfamily-specific 34-amino-acid motif termed ALP-like motif (AM), which contains a putative consensus protein kinase C (PKC) phosphorylation site and two alpha-helices. ALP proteins are found in heart and in skeletal muscle. ALP may act as a signaling molecule which is regulated by PKC-dependent signaling. ALP plays an essential role in the development of RV (right ventricle) chamber. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09450); members share this curated model.
