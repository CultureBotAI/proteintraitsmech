identifier: CDD:cd02137
label: "nitroreductase family protein similar to the NAD(P)H nitroreductase MhqN. A diverse subfamily of the nitroreductase family containing uncharacterized proteins; includes nitroreductases MhqN, YodC, YdgI, DrgA. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor.  The enzyme is typically a homodimer."
definition: >-
  nitroreductase family protein similar to the NAD(P)H nitroreductase MhqN. A diverse subfamily of the nitroreductase family containing uncharacterized proteins; includes nitroreductases MhqN, YodC, YdgI, DrgA. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor. The enzyme is typically a homodimer. — an NCBI CDD conserved domain (cd02137); members share this curated model.
