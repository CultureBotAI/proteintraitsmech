identifier: CDD:cd11443
label: "basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein aborted microspores (AMS) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as AMS, ICE1 and SCREAM2. AMS, also termed AtbHLH21, or EN 48, plays a crucial role in tapetum development and it is required for male fertility and pollen differentiation. ICE1, also termed inducer of CBF expression 1, or AtbHLH116, or EN 45, or SCREAM, acts as a transcriptional activator that regulates the cold-induced transcription of CBF/DREB1 genes. It binds specifically to the MYC recognition sites (5'-CANNTG-3') found in the CBF3/DREB1A promoter. SCREAM2, also termed AtbHLH33, or EN 44, mediates stomatal differentiation in the epidermis probably by controlling successive roles of SPCH, MUTE, and FAMA."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Arabidopsis thaliana protein aborted microspores (AMS) and similar proteins. The family includes several bHLH transcription factors from Arabidopsis thaliana, such as AMS, ICE1 and SCREAM2. AMS, also termed AtbHLH21, or EN 48, plays a crucial role in tapetum development and it is required for male fertility and pollen differentiation. ICE1, also termed inducer of CBF expression 1, or AtbHLH116, or EN 45, or SCREAM, acts as a transcriptional activator that regulates the cold-induced transcription of CBF/DREB1 genes. It binds specifically to the MYC recognition sites (5'-CANNTG-3') found in the CBF3/DREB1A promoter. SCREAM2, also termed AtbHLH33, or EN 44, mediates stomatal differentiation in the epidermis probably by controlling successive roles of SPCH, MUTE, and FAMA. — an NCBI CDD conserved domain (cd11443); members share this curated model.
