identifier: CDD:cd11829
label: "Src homology 3 domain of Growth Arrest Specific protein 7. GAS7 is mainly expressed in the brain and is required for neurite outgrowth. It may also play a role in the protection and migration of embryonic stem cells. Treatment-related acute myeloid leukemia (AML) has been reported resulting from mixed-lineage leukemia (MLL)-GAS7 translocations as a complication of primary cancer treatment. GAS7 contains an N-terminal SH3 domain, followed by a WW domain, and a central F-BAR domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src homology 3 domain of Growth Arrest Specific protein 7. GAS7 is mainly expressed in the brain and is required for neurite outgrowth. It may also play a role in the protection and migration of embryonic stem cells. Treatment-related acute myeloid leukemia (AML) has been reported resulting from mixed-lineage leukemia (MLL)-GAS7 translocations as a complication of primary cancer treatment. GAS7 contains an N-terminal SH3 domain, followed by a WW domain, and a central F-BAR domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11829); members share this curated model.
