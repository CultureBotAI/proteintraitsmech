identifier: CDD:cd15633
label: "PHD finger found in PHD finger protein 20-like protein 1 (P20L1). P20L1 is an active malignant brain tumor (MBT) domain-containing protein that binds to monomethylated lysine 142 on DNA (Cytosine-5) Methyltransferase 1 (DNMT1) (DNMT1K142me1) and colocalizes at the perinucleolar space in a SET7-dependent manner. Its MBT domain reads and controls enzyme levels of methylated DNMT1 in cells, thus representing a novel antagonist of DNMT1 proteasomal degradation. In addition to the MBT domain, PHF20L1 also contains two Tudor domains, a plant homeodomain (PHD) finger and the putative DNA-binding domains, AT hook and Cys2His2-type zinc finger."
definition: >-
  PHD finger found in PHD finger protein 20-like protein 1 (P20L1). P20L1 is an active malignant brain tumor (MBT) domain-containing protein that binds to monomethylated lysine 142 on DNA (Cytosine-5) Methyltransferase 1 (DNMT1) (DNMT1K142me1) and colocalizes at the perinucleolar space in a SET7-dependent manner. Its MBT domain reads and controls enzyme levels of methylated DNMT1 in cells, thus representing a novel antagonist of DNMT1 proteasomal degradation. In addition to the MBT domain, PHF20L1 also contains two Tudor domains, a plant homeodomain (PHD) finger and the putative DNA-binding domains, AT hook and Cys2His2-type zinc finger. — an NCBI CDD conserved domain (cd15633); members share this curated model.
