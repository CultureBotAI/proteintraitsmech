identifier: CDD:cd21752
label: "Mit1 interaction domain (MID) found in cryptic loci regulator protein 1 (Clr1) and similar proteins. Clr1 is a scaffold protein that regulates silencing of the mat2 and mat3 loci. It organizes the chromatin structure of the mating-type region where it also participates in establishing the 'cold spot' for recombination. It is required for proper positioning of nucleosomes at heterochromatic loci and for transcriptional gene silencing (TGS) function of the Snf2/Hdac-containing repressor complex (SHREC). The model corresponds to the MID domain of Clr1."
definition: >-
  Mit1 interaction domain (MID) found in cryptic loci regulator protein 1 (Clr1) and similar proteins. Clr1 is a scaffold protein that regulates silencing of the mat2 and mat3 loci. It organizes the chromatin structure of the mating-type region where it also participates in establishing the 'cold spot' for recombination. It is required for proper positioning of nucleosomes at heterochromatic loci and for transcriptional gene silencing (TGS) function of the Snf2/Hdac-containing repressor complex (SHREC). The model corresponds to the MID domain of Clr1. — an NCBI CDD conserved domain (cd21752); members share this curated model.
