identifier: CDD:cd07608
label: "The Bin/Amphiphysin/Rvs (BAR) domain of uncharacterized fungal Arf GAP proteins. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions including organelle biogenesis, membrane trafficking or remodeling, and cell division and migration. This group is composed of uncharacterized fungal proteins containing an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, and an Arf GTPase Activating Protein (GAP) domain. These proteins may play roles in Arf-mediated functions involving membrane dynamics. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions."
definition: >-
  The Bin/Amphiphysin/Rvs (BAR) domain of uncharacterized fungal Arf GAP proteins. BAR domains are dimerization, lipid binding and curvature sensing modules found in many different proteins with diverse functions including organelle biogenesis, membrane trafficking or remodeling, and cell division and migration. This group is composed of uncharacterized fungal proteins containing an N-terminal BAR domain, followed by a Pleckstrin homology (PH) domain, and an Arf GTPase Activating Protein (GAP) domain. These proteins may play roles in Arf-mediated functions involving membrane dynamics. BAR domains form dimers that bind to membranes, induce membrane bending and curvature, and may also be involved in protein-protein interactions. — an NCBI CDD conserved domain (cd07608); members share this curated model.
