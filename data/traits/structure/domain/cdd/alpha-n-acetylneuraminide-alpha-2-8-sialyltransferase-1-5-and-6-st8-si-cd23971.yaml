identifier: CDD:cd23971
label: "alpha-N-acetylneuraminide alpha-2,8-sialyltransferase 1, 5 and 6. ST8 Sia family members are alpha-N-acetylneuraminidealpha-2,8-sialyltransferases that catalyze an alpha-2,8-linkage between sialic acid and the terminal sialic acid residues of glycochains, by transfering sialic acid from CMP-Sia. The family is subdivided into 3 classes of enzymes, depending on theircatalytic activiy, the mono-STs (ST8Sia1, ST8Sia5 and ST8Sia6), the oligo-ST(ST8Sia3), and the poly-STs (ST8Sia2 and ST8Sia4). The ST8Sia family belongs to the glycosyltransferase family 29 (GT29)."
definition: >-
