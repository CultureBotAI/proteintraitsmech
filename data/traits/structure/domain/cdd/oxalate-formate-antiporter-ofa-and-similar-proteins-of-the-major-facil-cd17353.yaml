identifier: CDD:cd17353
label: "Oxalate:formate antiporter (OFA) and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of Oxalobacter formigenes oxalate:formate antiporter (OFA or OxlT) and similar proteins. O. formigenes, a commensal found in the gut of animals and humans, plays an important role in clearing dietary oxalate from the intestinal tract, which is carried out by OFA/OxlT, an anion transporter that facilitates the exchange of divalent oxalate with monovalent formate, the product of oxalate decarboxylation. This exchange generates an electrochemical proton gradient and is the source of energy for ATP synthesis in this cell. The OFA-like subfamily belongs to the Monocarboxylate transporter -like (MCT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Oxalate:formate antiporter (OFA) and similar proteins of the Major Facilitator Superfamily of transporters. This subfamily is composed of Oxalobacter formigenes oxalate:formate antiporter (OFA or OxlT) and similar proteins. O. formigenes, a commensal found in the gut of animals and humans, plays an important role in clearing dietary oxalate from the intestinal tract, which is carried out by OFA/OxlT, an anion transporter that facilitates the exchange of divalent oxalate with monovalent formate, the product of oxalate decarboxylation. This exchange generates an electrochemical proton gradient and is the source of energy for ATP synthesis in this cell. The OFA-like subfamily belongs to the Monocarboxylate transporter -like (MCT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17353); members share this curated model.
