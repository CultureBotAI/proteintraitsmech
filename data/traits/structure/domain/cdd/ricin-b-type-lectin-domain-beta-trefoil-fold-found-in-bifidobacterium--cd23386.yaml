identifier: CDD:cd23386
label: "ricin B-type lectin domain, beta-trefoil fold, found in Bifidobacterium bifidum lacto-N-biosidase (LNBase) and similar proteins. LNBase (EC2.3.1.140) belongs to the glycoside hydrolase 20 (GH20) family. It is a membrane-anchored extracellular enzyme that liberates lacto-N-biose I (LNB) from the non-reducing end of oligosaccharides and plays a key role in the metabolic pathway of these compounds. B. bifidum LNBase contains a signal peptide, a glycoside hydrolase family 20 (GH20) domain, a carbohydrate-binding module family 32 (CBM32) domain, a bacterial Ig-like domain, and a membrane anchor. The C-terminal region of the GH20 domain of LNBase has a unique ricin B-type lectin domain with a beta-trefoil-like fold. The typical beta-trefoil fold is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. In contrast, the second and third strands (alpha subdomain) and the last beta strand (part of gamma subdomain) are missing in the beta-trefoil fold of LNBase."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Bifidobacterium bifidum lacto-N-biosidase (LNBase) and similar proteins. LNBase (EC2.3.1.140) belongs to the glycoside hydrolase 20 (GH20) family. It is a membrane-anchored extracellular enzyme that liberates lacto-N-biose I (LNB) from the non-reducing end of oligosaccharides and plays a key role in the metabolic pathway of these compounds. B. bifidum LNBase contains a signal peptide, a glycoside hydrolase family 20 (GH20) domain, a carbohydrate-binding module family 32 (CBM32) domain, a bacterial Ig-like domain, and a membrane anchor. The C-terminal region of the GH20 domain of LNBase has a unique ricin B-type lectin domain with a beta-trefoil-like fold. The typical beta-trefoil fold is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain may harbor a sugar-binding pocket. In contrast, the second and third strands (alpha subdomain) and the last beta strand (part of gamma subdomain) are missing in the beta-trefoil fold of LNBase. — an NCBI CDD conserved domain (cd23386); members share this curated model.
