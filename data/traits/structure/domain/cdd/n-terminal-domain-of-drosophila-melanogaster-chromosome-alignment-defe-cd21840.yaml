identifier: CDD:cd21840
label: "N-terminal domain of Drosophila melanogaster chromosome alignment defect 1 (CAL1). CAL1 is an evolutionarily distinct CENP-A histone chaperone that binds both CENP-A and the centromere receptor CENP-C, and functions in both pre-nucleosomal CENP-A recognition and its targeting to the centromere for deposition. Thus, it appears to combine the roles of HJURP as well as the Mis18 complex, which are CENP-A chaperones present in eukaryotes but absent in Drosophila. This model corresponds to the N-terminal domain of CAL1, which is responsible for binding to CENP-A/H4."
definition: >-
  N-terminal domain of Drosophila melanogaster chromosome alignment defect 1 (CAL1). CAL1 is an evolutionarily distinct CENP-A histone chaperone that binds both CENP-A and the centromere receptor CENP-C, and functions in both pre-nucleosomal CENP-A recognition and its targeting to the centromere for deposition. Thus, it appears to combine the roles of HJURP as well as the Mis18 complex, which are CENP-A chaperones present in eukaryotes but absent in Drosophila. This model corresponds to the N-terminal domain of CAL1, which is responsible for binding to CENP-A/H4. — an NCBI CDD conserved domain (cd21840); members share this curated model.
