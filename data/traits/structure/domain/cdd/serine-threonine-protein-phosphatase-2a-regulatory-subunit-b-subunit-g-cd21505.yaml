identifier: CDD:cd21505
label: "serine/threonine protein phosphatase 2A regulatory subunit B\" subunit gamma. Heterotrimeric serine/threonine protein phosphatase 2A (PP2A) consists of scaffolding (A), catalytic (C), and variable (B, B', and B\") subunits. The variable subunits dictate subcellular localization and substrate specificity of the PP2A holoenzyme. This subfamily includes protein phosphatase subunit G5PR (also known as serine/threonine-protein phosphatase 2A regulatory subunit B'' subunit gamma, G4-1, G5pr, GDRM, SPGF36, or C14orf10) that is encoded by the PPP2R3C gene. It is involved in the control of the dynamic organization of the cortical cytoskeleton and plays an important role in the organization of interphase microtubule arrays in part through the regulation of nucleation geometry. G5PR is involved in the ontogeny of multiple organs, especially critical for testis development and spermatogenesis. PPP2R3C gene variants cause syndromic 46,XY gonadal dysgenesis and impaired spermatogenesis in humans, and thus is emerging as a potential therapeutic target for male infertility."
