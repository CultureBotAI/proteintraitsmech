identifier: CDD:cd16646
label: "Modified RING finger, HC subclass (C2H2C4-type), found in E3 ubiquitin-protein ligase MDM2, protein MDM4 and similar proteins. MDM2 (also known as HDM2) and MDM4 (also known as MDMX or HDMX) are the primary p53 tumor suppressor negative regulators. They have non-redundant roles in the regulation of p53. MDM2 mainly functions to control p53 stability, while MDM4 controls p53 transcriptional activity. Both MDM2 and MDM4 contain an N-terminal p53-binding domain, a RanBP2-type zinc finger (zf-RanBP2) domain near the central acidic region, and a C-terminal modified C2H2C4-type RING-HC finger. Mdm2 can form homo-oligomers through its RING domain and displays E3 ubiquitin ligase activity that catalyzes the attachment of ubiquitin to p53 as an essential step in the regulation of its levels in cells. Despite its RING domain and structural similarity with MDM2, MDM4 does not homo-oligomerize and lacks ubiquitin-ligase function, but inhibits the transcriptional activity of p53. In addition, both their RING domains are responsible for the hetero-oligomerization, which is crucial for the suppression of P53 activity during embryonic development and the recruitment of E2 ubiquitin-conjugating enzymes. Moreover, MDM2 and MDM4 can be phosphorylated and destabilized in response to DNA damage stress. In response to ribosomal stress, MDM2-mediated p53 ubiquitination and degradation can be inhibited through the interaction with ribosomal proteins L5, L11, and L23. However, MDM4 is not bound to ribosomal proteins, suggesting its different response to regulation by small basic proteins such as ribosomal proteins and ARF."
definition: >-
  Modified RING finger, HC subclass (C2H2C4-type), found in E3 ubiquitin-protein ligase MDM2, protein MDM4 and similar proteins. MDM2 (also known as HDM2) and MDM4 (also known as MDMX or HDMX) are the primary p53 tumor suppressor negative regulators. They have non-redundant roles in the regulation of p53. MDM2 mainly functions to control p53 stability, while MDM4 controls p53 transcriptional activity. Both MDM2 and MDM4 contain an N-terminal p53-binding domain, a RanBP2-type zinc finger (zf-RanBP2) domain near the central acidic region, and a C-terminal modified C2H2C4-type RING-HC finger. Mdm2 can form homo-oligomers through its RING domain and displays E3 ubiquitin ligase activity that catalyzes the attachment of ubiquitin to p53 as an essential step in the regulation of its levels in cells. Despite its RING domain and structural similarity with MDM2, MDM4 does not homo-oligomerize and lacks ubiquitin-ligase function, but inhibits the transcriptional activity of p53. In addition, both their RING domains are responsible for the hetero-oligomerization, which is crucial for the suppression of P53 activity during embryonic development and the recruitment of E2 ubiquitin-conjugating enzymes. Moreover, MDM2 and MDM4 can be phosphorylated and destabilized in response to DNA damage stress. In response to ribosomal stress, MDM2-mediated p53 ubiquitination and degradation can be inhibited through the interaction with ribosomal proteins L5, L11, and L23. However, MDM4 is not bound to ribosomal proteins, suggesting its different response to regulation by small basic proteins such as ribosomal proteins and ARF. — an NCBI CDD conserved domain (cd16646); members share this curated model.
