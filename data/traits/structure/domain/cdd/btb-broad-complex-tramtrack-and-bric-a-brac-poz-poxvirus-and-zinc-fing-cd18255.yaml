identifier: CDD:cd18255
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 26 (KLHL26). KLHL26 is encoded by the klhl26 gene, which is regulated by p53 via fuzzy tandem repeats. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Kelch-like protein 26 (KLHL26). KLHL26 is encoded by the klhl26 gene, which is regulated by p53 via fuzzy tandem repeats. It contains a BTB domain and kelch repeats, characteristics of a kelch family protein. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18255); members share this curated model.
