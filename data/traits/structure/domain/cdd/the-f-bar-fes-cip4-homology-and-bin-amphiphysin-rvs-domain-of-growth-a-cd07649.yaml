identifier: CDD:cd07649
label: "The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of Growth Arrest Specific protein 7. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Growth Arrest Specific protein 7 (GAS7) is mainly expressed in the brain and is required for neurite outgrowth. It may also play a role in the protection and migration of embryonic stem cells. Treatment-related acute myeloid leukemia (AML) has been reported resulting from mixed-lineage leukemia (MLL)-GAS7 translocations as a complication of primary cancer treatment. GAS7 contains an N-terminal SH3 domain, followed by a WW domain, and a central F-BAR domain. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules."
definition: >-
  The F-BAR (FES-CIP4 Homology and Bin/Amphiphysin/Rvs) domain of Growth Arrest Specific protein 7. F-BAR domains are dimerization modules that bind and bend membranes and are found in proteins involved in membrane dynamics and actin reorganization. Growth Arrest Specific protein 7 (GAS7) is mainly expressed in the brain and is required for neurite outgrowth. It may also play a role in the protection and migration of embryonic stem cells. Treatment-related acute myeloid leukemia (AML) has been reported resulting from mixed-lineage leukemia (MLL)-GAS7 translocations as a complication of primary cancer treatment. GAS7 contains an N-terminal SH3 domain, followed by a WW domain, and a central F-BAR domain. F-BAR domains form banana-shaped dimers with a positively-charged concave surface that binds to negatively-charged lipid membranes. They can induce membrane deformation in the form of long tubules. — an NCBI CDD conserved domain (cd07649); members share this curated model.
