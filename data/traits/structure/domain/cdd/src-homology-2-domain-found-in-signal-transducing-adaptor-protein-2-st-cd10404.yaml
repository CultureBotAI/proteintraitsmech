identifier: CDD:cd10404
label: "Src homology 2 domain found in Signal-transducing adaptor protein 2 (STAP2). STAP2 is a signal-transducing adaptor protein. It is composed of a Pleckstrin homology (PH) and SH2 domains along with several tyrosine phosphorylation sites. The STAP2 protein is the substrate of breast tumor kinase, an Src-type non-receptor tyrosine kinase that mediates the interactions linking proteins involved in signal transduction pathways. STAP2 has alternative splicing variants. STAP2 has been shown to interact with tyrosine-protein kinase 6 (PTK6). In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 domain found in Signal-transducing adaptor protein 2 (STAP2). STAP2 is a signal-transducing adaptor protein. It is composed of a Pleckstrin homology (PH) and SH2 domains along with several tyrosine phosphorylation sites. The STAP2 protein is the substrate of breast tumor kinase, an Src-type non-receptor tyrosine kinase that mediates the interactions linking proteins involved in signal transduction pathways. STAP2 has alternative splicing variants. STAP2 has been shown to interact with tyrosine-protein kinase 6 (PTK6). In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10404); members share this curated model.
