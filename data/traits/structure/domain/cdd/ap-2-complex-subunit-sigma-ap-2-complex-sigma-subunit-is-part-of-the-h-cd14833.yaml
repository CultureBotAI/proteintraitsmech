identifier: CDD:cd14833
label: "AP-2 complex subunit sigma. AP-2 complex sigma subunit is part of the heterotetrameric adaptor protein (AP)-2 complex which consists of one large alpha-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In the case of AP-2 the coat protein is clathrin. AP-2 binds the phospholipid PI(4,5)P2 which is important for its localisation to the plasma membrane. The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals."
definition: >-
  AP-2 complex subunit sigma. AP-2 complex sigma subunit is part of the heterotetrameric adaptor protein (AP)-2 complex which consists of one large alpha-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. In the case of AP-2 the coat protein is clathrin. AP-2 binds the phospholipid PI(4,5)P2 which is important for its localisation to the plasma membrane. The sigma subunit is comprised of a single longin domain and plays a role in binding dileucine-based sorting signals. — an NCBI CDD conserved domain (cd14833); members share this curated model.
