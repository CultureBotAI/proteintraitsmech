identifier: CDD:cd20443
label: "Tudor domain found in Arabidopsis thaliana ribonuclease Tudor 1 (AtTudor1), ribonuclease Tudor 2 (AtTudor2), and similar proteins. The family includes AtTudor1 (also called Tudor-SN protein 1) and AtTudor2 (also called Tudor-SN protein 2 or 100 kDa coactivator-like protein). They are cytoprotective ribonucleases (RNases) required for resistance to abiotic stresses, acting as positive regulators of mRNA decapping during stress. Members of this family contain one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions."
definition: >-
  Tudor domain found in Arabidopsis thaliana ribonuclease Tudor 1 (AtTudor1), ribonuclease Tudor 2 (AtTudor2), and similar proteins. The family includes AtTudor1 (also called Tudor-SN protein 1) and AtTudor2 (also called Tudor-SN protein 2 or 100 kDa coactivator-like protein). They are cytoprotective ribonucleases (RNases) required for resistance to abiotic stresses, acting as positive regulators of mRNA decapping during stress. Members of this family contain one Tudor domain. The Tudor domain binds to proteins with dimethylated arginine or lysine residues, and may also bind methylated histone tails to facilitate protein-protein interactions. — an NCBI CDD conserved domain (cd20443); members share this curated model.
