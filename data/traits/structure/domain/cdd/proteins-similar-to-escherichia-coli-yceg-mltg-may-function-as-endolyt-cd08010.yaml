identifier: CDD:cd08010
label: "proteins similar to Escherichia coli YceG/mltG may function as endolytic murein transglycosylases. The gene product of Escherichia coli yceG/mltG has been erroneously annotated as an aminodeoxychorismate lyase. Its overexpression has been reported to cause abnormal biofilm architecture, and it has been reported to be part of a putative five-gene operon. More recently it has been proposed to function as a terminase for peptidoglycan polymerization. The family also includes Streptomyces caeruleus NovB, an uncharacterized member of the novobiocin biosynthetic gene cluster."
definition: >-
  proteins similar to Escherichia coli YceG/mltG may function as endolytic murein transglycosylases. The gene product of Escherichia coli yceG/mltG has been erroneously annotated as an aminodeoxychorismate lyase. Its overexpression has been reported to cause abnormal biofilm architecture, and it has been reported to be part of a putative five-gene operon. More recently it has been proposed to function as a terminase for peptidoglycan polymerization. The family also includes Streptomyces caeruleus NovB, an uncharacterized member of the novobiocin biosynthetic gene cluster. — an NCBI CDD conserved domain (cd08010); members share this curated model.
