identifier: CDD:cd20712
label: "C-terminal domain of lettuce necrotic yellows virus phosphoprotein and related domains. This family includes the C-terminal domain of the P protein of plant viruses belonging to the Rhabdoviridae family such as Lettuce necrotic yellows virus (LNYV). LNYV P protein acts as a weak local RNA silencing suppressor in plants to counteract RNA silencing antiviral defense. It suppresses both RNA induced silencing complex (RISC)-mediated cleavage and RNA silencing amplification. The C-terminal domain of LNYV P protein is essential for both local RNA silencing suppression and interaction with Argonaute (AGO) 1, AGO2, and AGO4 (key components of the RISC complexes), and with SGS3 and RDR6 (which function in the amplification step of RNA silencing). The family Rhabdoviridae belongs to the order Mononegavirales which are nonsegmented negative-stranded RNA viruses (NNVs). The genomes of NNVs are encapsidated by their nucleocapsid (N) proteins to form N-RNA complexes which serves as a template for transaction and replication. The C-terminus of P protein binds nucleocapsid. P protein plays multiple roles in transcription and translation, including acting as a chaperone of nascent nucleoprotein (N), and as a cofactor of the viral polymerase (L) where P forms a two-subunit polymerase with a large catalytic subunit (L) and stabilizes the polymerase on its template of N-RNA."
definition: >-
  C-terminal domain of lettuce necrotic yellows virus phosphoprotein and related domains. This family includes the C-terminal domain of the P protein of plant viruses belonging to the Rhabdoviridae family such as Lettuce necrotic yellows virus (LNYV). LNYV P protein acts as a weak local RNA silencing suppressor in plants to counteract RNA silencing antiviral defense. It suppresses both RNA induced silencing complex (RISC)-mediated cleavage and RNA silencing amplification. The C-terminal domain of LNYV P protein is essential for both local RNA silencing suppression and interaction with Argonaute (AGO) 1, AGO2, and AGO4 (key components of the RISC complexes), and with SGS3 and RDR6 (which function in the amplification step of RNA silencing). The family Rhabdoviridae belongs to the order Mononegavirales which are nonsegmented negative-stranded RNA viruses (NNVs). The genomes of NNVs are encapsidated by their nucleocapsid (N) proteins to form N-RNA complexes which serves as a template for transaction and replication. The C-terminus of P protein binds nucleocapsid. P protein plays multiple roles in transcription and translation, including acting as a chaperone of nascent nucleoprotein (N), and as a cofactor of the viral polymerase (L) where P forms a two-subunit polymerase with a large catalytic subunit (L) and stabilizes the polymerase on its template of N-RNA. — an NCBI CDD conserved domain (cd20712); members share this curated model.
