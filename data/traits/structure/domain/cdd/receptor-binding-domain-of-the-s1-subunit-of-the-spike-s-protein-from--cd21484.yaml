  receptor-binding domain of the S1 subunit of the Spike (S) protein from mouse hepatitis virus and other rodent coronaviruses. This group contains the receptor-binding domain (RBD) of the S1 subunit of the spike (S) protein from mouse hepatitis virus (MHV) and other rodent coronaviruses. MHV is the most common viral pathogen in contemporary laboratory mouse colonies manifesting as a primary infection in the upper respiratory tract. The CoV S protein is an envelope glycoprotein that plays the most important role in viral attachment, fusion, and entry into host cells, and serves as a major target for the development of neutralizing antibodies, inhibitors of viral entry, and vaccines. It is synthesized as a precursor protein that is cleaved into an N-terminal S1 subunit (~700 amino acids) and a C-terminal S2 subunit (~600 amino acids) that mediates attachment and membrane fusion, respectively. Three S1/S2 heterodimers assemble to form a trimer spike protruding from the viral envelope. The S1 subunit contains a receptor-binding domain (RBD), while the S2 subunit contains a hydrophobic fusion peptide and two heptad repeat regions. S1 contains two structurally independent domains, the N-terminal domain (NTD) and the C-terminal domain (C-domain). Depending on the virus, either the NTD or the C-domain can serve as the receptor-binding domain (RBD). MHV uses mouse carcinoembryonic antigen related cell adhesion molecule 1a (mCEACAM1a) as the receptor; the RBD of MHV is located at the NTD. Most CoVs, such as SARS-CoV and MERS-CoV, use the C-domain to bind their receptors. Due to the key role of the S protein RBD in viral attachment, it is the major target for antibody-mediated neutralization. This model corresponds to the S1 subunit C-domain that serves as the RBD for most CoVs. — an NCBI CDD conserved domain (cd21484); members share this curated model.
