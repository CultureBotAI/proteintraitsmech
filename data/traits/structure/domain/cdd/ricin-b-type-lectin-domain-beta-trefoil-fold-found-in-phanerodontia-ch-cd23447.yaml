identifier: CDD:cd23447
label: "ricin B-type lectin domain, beta-trefoil fold, found in Phanerodontia chrysosporium bifunctional aldos-2-ulose dehydratase/isomerase (AUDH) and similar proteins. AUDH participates in carbohydrate secondary metabolism, catalyzing the conversion of glucosone and 1,5-d-anhydrofructose to the secondary metabolites cortalcerone and microthecin, respectively. It is a homodimeric protein that consists of a seven-bladed beta-propeller domain, two cupin folds and a C-terminal ricin B-type lectin domain. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Phanerodontia chrysosporium bifunctional aldos-2-ulose dehydratase/isomerase (AUDH) and similar proteins. AUDH participates in carbohydrate secondary metabolism, catalyzing the conversion of glucosone and 1,5-d-anhydrofructose to the secondary metabolites cortalcerone and microthecin, respectively. It is a homodimeric protein that consists of a seven-bladed beta-propeller domain, two cupin folds and a C-terminal ricin B-type lectin domain. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. Each subdomain bears a potential sugar binding site. — an NCBI CDD conserved domain (cd23447); members share this curated model.
