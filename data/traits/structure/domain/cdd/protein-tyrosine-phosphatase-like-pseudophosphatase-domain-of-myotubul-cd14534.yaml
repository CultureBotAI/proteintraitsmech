identifier: CDD:cd14534
label: "protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatases 5 and 13. This subgroup of enzymatically inactive phosphatase domains of myotubularins consists of MTMR5, also known as SET binding factor 1 (SBF1) and MTMR13, also known as SET binding factor 2 (SBF2), and similar domains. Beside the pseudophosphatase domain, they contain a variety of other domains, including a DENN and a PH-like domain.  In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR5 and MTMR13 are pseudophosphatases that lack the catalytic cysteine in their catalytic pocket. Mutations in MTMR13 causes Charcot-Marie-Tooth type 4B2, a severe childhood-onset neuromuscular disorder, characterized by demyelination and redundant loops of myelin known as myelin outfoldings, a similar phenotype as mutations in MTMR2. Mutations in the MTMR5 gene cause Charcot-Marie-tooth disease type 4B3. MTMR5 and MTMR13 interact with MTMR2 and stimulate its phosphatase activity."
definition: >-
  protein tyrosine phosphatase-like pseudophosphatase domain of myotubularin related phosphoinositide phosphatases 5 and 13. This subgroup of enzymatically inactive phosphatase domains of myotubularins consists of MTMR5, also known as SET binding factor 1 (SBF1) and MTMR13, also known as SET binding factor 2 (SBF2), and similar domains. Beside the pseudophosphatase domain, they contain a variety of other domains, including a DENN and a PH-like domain. In general, myotubularins are a unique subgroup of protein tyrosine phosphatases that use inositol phospholipids, rather than phosphoproteins, as substrates. MTMR5 and MTMR13 are pseudophosphatases that lack the catalytic cysteine in their catalytic pocket. Mutations in MTMR13 causes Charcot-Marie-Tooth type 4B2, a severe childhood-onset neuromuscular disorder, characterized by demyelination and redundant loops of myelin known as myelin outfoldings, a similar phenotype as mutations in MTMR2. Mutations in the MTMR5 gene cause Charcot-Marie-tooth disease type 4B3. MTMR5 and MTMR13 interact with MTMR2 and stimulate its phosphatase activity. — an NCBI CDD conserved domain (cd14534); members share this curated model.
