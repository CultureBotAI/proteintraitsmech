identifier: CDD:cd15739
label: "FYVE domain found in uncharacterized rab GTPase-binding effector proteins from bilateria. This family includes a group of uncharacterized rab GTPase-binding effector proteins found in bilateria. Although their biological functions remain unclear, they all contain a FYVE domain that harbors a putative phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding site."
