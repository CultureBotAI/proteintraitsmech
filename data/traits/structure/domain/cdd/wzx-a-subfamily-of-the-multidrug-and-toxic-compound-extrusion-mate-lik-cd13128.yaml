identifier: CDD:cd13128
label: "Wzx, a subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins. Escherichia coli Wzx and related proteins from other gram-negative bacteria are thought to act as flippases, assisting in the membrane translocation of lipopolysaccharides including those containing O-antigens. Proteins from the MATE family are involved in exporting metabolites across the cell membrane and are often responsible for multidrug resistance (MDR)."
definition: >-
  Wzx, a subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins. Escherichia coli Wzx and related proteins from other gram-negative bacteria are thought to act as flippases, assisting in the membrane translocation of lipopolysaccharides including those containing O-antigens. Proteins from the MATE family are involved in exporting metabolites across the cell membrane and are often responsible for multidrug resistance (MDR). — an NCBI CDD conserved domain (cd13128); members share this curated model.
