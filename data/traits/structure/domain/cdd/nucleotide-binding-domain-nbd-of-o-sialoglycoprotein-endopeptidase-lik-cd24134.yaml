identifier: CDD:cd24134
label: "nucleotide-binding domain (NBD) of O-sialoglycoprotein endopeptidase-like protein 1 (OSGEPL1) and similar proteins from eukayotes. The family includes mammalian OSGEPL1 and yeast QRI7, which are the mitochondrial orthologs of the universal Kae1/ TsaD (also known as YgjD) protein. OSGEPL1/QRI7 (EC 2.3.1.234), also called mitochondrial tRNA N6-adenosine threonylcarbamoyltransferase, N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, t(6)A37 threonylcarbamoyladenosine biosynthesis protein, or tRNA threonylcarbamoyladenosine biosynthesis protein, is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in mitochondrial tRNAs that read codons beginning with adenine. It is probably involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37. It is involved in mitochondrial genome maintenance."
definition: >-
  nucleotide-binding domain (NBD) of O-sialoglycoprotein endopeptidase-like protein 1 (OSGEPL1) and similar proteins from eukayotes. The family includes mammalian OSGEPL1 and yeast QRI7, which are the mitochondrial orthologs of the universal Kae1/ TsaD (also known as YgjD) protein. OSGEPL1/QRI7 (EC 2.3.1.234), also called mitochondrial tRNA N6-adenosine threonylcarbamoyltransferase, N6-L-threonylcarbamoyladenine synthase, t(6)A synthase, t(6)A37 threonylcarbamoyladenosine biosynthesis protein, or tRNA threonylcarbamoyladenosine biosynthesis protein, is required for the formation of a threonylcarbamoyl group on adenosine at position 37 (t(6)A37) in mitochondrial tRNAs that read codons beginning with adenine. It is probably involved in the transfer of the threonylcarbamoyl moiety of threonylcarbamoyl-AMP (TC-AMP) to the N6 group of A37. It is involved in mitochondrial genome maintenance. — an NCBI CDD conserved domain (cd24134); members share this curated model.
