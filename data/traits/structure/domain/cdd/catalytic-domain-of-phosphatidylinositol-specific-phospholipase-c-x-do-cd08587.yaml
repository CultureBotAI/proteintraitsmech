identifier: CDD:cd08587
label: "Catalytic domain of phosphatidylinositol-specific phospholipase C X domain containing and similar proteins. This family corresponds to the catalytic domain present in phosphatidylinositol-specific phospholipase C X domain containing proteins (PI-PLCXD) which are bacterial phosphatidylinositol-specific phospholipase C (PI-PLC, EC 4.6.1.13) sequence homologs mainly found in eukaryota. The typical eukaryotic phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11) have a multidomain organization that consists of a PLC catalytic core domain, and various regulatory domains. The catalytic core domain is assembled from two highly conserved X- and Y-regions split by a divergent linker sequence. In contrast, eukaryotic PI-PLCXDs and their bacterial homologs contain a single TIM-barrel type catalytic domain, X domain, which is more closely related to that of bacterial PI-PLCs. Although the biological function of eukaryotic PI-PLCXDs still remains unclear, it may be distinct from that of typical eukaryotic PI-PLCs."
definition: >-
  Catalytic domain of phosphatidylinositol-specific phospholipase C X domain containing and similar proteins. This family corresponds to the catalytic domain present in phosphatidylinositol-specific phospholipase C X domain containing proteins (PI-PLCXD) which are bacterial phosphatidylinositol-specific phospholipase C (PI-PLC, EC 4.6.1.13) sequence homologs mainly found in eukaryota. The typical eukaryotic phosphoinositide-specific phospholipase C (PI-PLC, EC 3.1.4.11) have a multidomain organization that consists of a PLC catalytic core domain, and various regulatory domains. The catalytic core domain is assembled from two highly conserved X- and Y-regions split by a divergent linker sequence. In contrast, eukaryotic PI-PLCXDs and their bacterial homologs contain a single TIM-barrel type catalytic domain, X domain, which is more closely related to that of bacterial PI-PLCs. Although the biological function of eukaryotic PI-PLCXDs still remains unclear, it may be distinct from that of typical eukaryotic PI-PLCs. — an NCBI CDD conserved domain (cd08587); members share this curated model.
