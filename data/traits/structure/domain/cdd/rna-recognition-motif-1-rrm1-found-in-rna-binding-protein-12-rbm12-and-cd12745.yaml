identifier: CDD:cd12745
label: "RNA recognition motif 1 (RRM1) found in RNA-binding protein 12 (RBM12) and similar proteins. This subgrup corresponds to the RRM1 of RBM12, also termed SH3/WW domain anchor protein in the nucleus (SWAN), is ubiquitously expressed. It contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two proline-rich regions, and several putative transmembrane domains. The biological role of RBM12 remains unclear."
definition: >-
  RNA recognition motif 1 (RRM1) found in RNA-binding protein 12 (RBM12) and similar proteins. This subgrup corresponds to the RRM1 of RBM12, also termed SH3/WW domain anchor protein in the nucleus (SWAN), is ubiquitously expressed. It contains five distinct RNA binding motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), two proline-rich regions, and several putative transmembrane domains. The biological role of RBM12 remains unclear. — an NCBI CDD conserved domain (cd12745); members share this curated model.
