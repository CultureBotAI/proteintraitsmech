identifier: CDD:cd22089
label: "F-box domain found in F-box only protein 9 (FBXO9) and similar proteins. FBXO9, also called FBX9, cross-immune reaction antigen 1, renal carcinoma antigen NY-REN-57, or VCIA1, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of TTI1 and TELO2 in a CK2-dependent manner, thereby directly regulating mTOR signaling. FBXO9 acts as an E3 ubiquitin ligase that regulates the stability and activity of peroxisome proliferator-activated receptor gamma (PPARgamma) through ubiquitination. It is also required for adipocyte differentiation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box only protein 9 (FBXO9) and similar proteins. FBXO9, also called FBX9, cross-immune reaction antigen 1, renal carcinoma antigen NY-REN-57, or VCIA1, is the substrate-recognition component of an SCF (SKP1-CUL1-F-box protein) E3 ubiquitin-protein ligase complex which mediates the ubiquitination and subsequent proteasomal degradation of TTI1 and TELO2 in a CK2-dependent manner, thereby directly regulating mTOR signaling. FBXO9 acts as an E3 ubiquitin ligase that regulates the stability and activity of peroxisome proliferator-activated receptor gamma (PPARgamma) through ubiquitination. It is also required for adipocyte differentiation. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22089); members share this curated model.
