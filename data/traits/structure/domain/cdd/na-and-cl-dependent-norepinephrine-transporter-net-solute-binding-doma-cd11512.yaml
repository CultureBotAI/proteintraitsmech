identifier: CDD:cd11512
label: "Na(+)- and Cl(-)-dependent norepinephrine transporter NET; solute-binding domain. NET (also called NAT1, NET1), is a transmembrane transporter that transports the neurotransmitter norepinephrine from synaptic spaces into presynaptic neurons. Human NET is encoded by the SLC6A2 gene. NET is expressed in brain, peripheral nervous system, adrenal gland, and placenta. NET may play a role in diseases or disorders including depression, orthostatic intolerance, anorexia nervosa, cardiovascular diseases, alcoholism, and attention-deficit hyperactivity disorder. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  Na(+)- and Cl(-)-dependent norepinephrine transporter NET; solute-binding domain. NET (also called NAT1, NET1), is a transmembrane transporter that transports the neurotransmitter norepinephrine from synaptic spaces into presynaptic neurons. Human NET is encoded by the SLC6A2 gene. NET is expressed in brain, peripheral nervous system, adrenal gland, and placenta. NET may play a role in diseases or disorders including depression, orthostatic intolerance, anorexia nervosa, cardiovascular diseases, alcoholism, and attention-deficit hyperactivity disorder. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd11512); members share this curated model.
