identifier: CDD:cd16957
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Bacillus subtilis LytS and Staphylococcus aureus LytS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Bacillus subtilis LytS, a HK of the two-component system (TCS) LytS-LytR needed for growth on pyruvate, and Staphylococcus aureus LytS-LytR TCS involved in the adaptation of S. aureus to cationic antimicrobial peptides. Proteins having this HATPase domain also contain a histidine kinase domain (His-kinase), and a GAF sensor domain; most contain a DUF3816 domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Bacillus subtilis LytS and Staphylococcus aureus LytS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Bacillus subtilis LytS, a HK of the two-component system (TCS) LytS-LytR needed for growth on pyruvate, and Staphylococcus aureus LytS-LytR TCS involved in the adaptation of S. aureus to cationic antimicrobial peptides. Proteins having this HATPase domain also contain a histidine kinase domain (His-kinase), and a GAF sensor domain; most contain a DUF3816 domain. — an NCBI CDD conserved domain (cd16957); members share this curated model.
