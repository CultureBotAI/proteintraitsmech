identifier: CDD:cd23077
label: "PDZ domain of PDZ domain-containing protein GIPC1. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of GIPC1, and related domains. GIPC1 (also known as GIPC, GAIP/RGS19-interacting protein or Tax-interacting protein 2) belongs to the GIPC family, members of which contain an N-terminal GIPC-homology 1 (GH1) domain, a central PDZ domain, and a C-terminal GH2 domain. GIPC1 functions as an adaptor molecule for loading PDZ-target cargoes on the MYO6 motor protein. The GIPC1 PDZ domain interacts with a variety of ligands, such as RGS19, NRP1, GLUT1, SEMA4C, SDC4 and IGF1R. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This GIPC1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
definition: >-
  PDZ domain of PDZ domain-containing protein GIPC1. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of GIPC1, and related domains. GIPC1 (also known as GIPC, GAIP/RGS19-interacting protein or Tax-interacting protein 2) belongs to the GIPC family, members of which contain an N-terminal GIPC-homology 1 (GH1) domain, a central PDZ domain, and a C-terminal GH2 domain. GIPC1 functions as an adaptor molecule for loading PDZ-target cargoes on the MYO6 motor protein. The GIPC1 PDZ domain interacts with a variety of ligands, such as RGS19, NRP1, GLUT1, SEMA4C, SDC4 and IGF1R. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This GIPC1 domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. — an NCBI CDD conserved domain (cd23077); members share this curated model.
