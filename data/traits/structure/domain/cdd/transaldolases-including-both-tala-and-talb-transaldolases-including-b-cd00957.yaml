identifier: CDD:cd00957
label: "Transaldolases including both TalA and TalB. Transaldolases including both TalA and TalB. The enzyme catalyses the reversible transfer of a dyhydroxyacetone moiety, derived from fructose-6-phosphate to erythrose-4-phosphate yielding sedoheptulose-7-phosphate and glyceraldehyde-3-phosphate. The catalytic mechanism is similar to other class I aldolases. The enzyme is found in the non-oxidative branch of the pentose phosphate pathway and forms a dimer in solution."
definition: >-
  Transaldolases including both TalA and TalB. Transaldolases including both TalA and TalB. The enzyme catalyses the reversible transfer of a dyhydroxyacetone moiety, derived from fructose-6-phosphate to erythrose-4-phosphate yielding sedoheptulose-7-phosphate and glyceraldehyde-3-phosphate. The catalytic mechanism is similar to other class I aldolases. The enzyme is found in the non-oxidative branch of the pentose phosphate pathway and forms a dimer in solution. — an NCBI CDD conserved domain (cd00957); members share this curated model.
