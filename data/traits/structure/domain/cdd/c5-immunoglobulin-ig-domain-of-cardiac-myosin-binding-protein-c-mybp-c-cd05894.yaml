identifier: CDD:cd05894
label: "C5 immunoglobulin (Ig) domain of cardiac myosin binding protein C (MyBP-C). The members here are composed of the C5 immunoglobulin (Ig) domain of cardiac myosin binding protein C (MyBP-C). MyBP-C consists of repeated domains, Ig and fibronectin type 3, and various linkers. Three isoforms of MYBP-C exist: slow-skeletal (ssMyBP-C), fast-skeletal (fsMyBP-C), and cardiac (cMyBP-C). cMYBP-C has insertions between and inside domains and an additional cardiac-specific Ig domain at the N-terminus. For cMYBP_C  an interaction has been demonstrated between this C5 domain and the Ig C8 domain."
definition: >-
  C5 immunoglobulin (Ig) domain of cardiac myosin binding protein C (MyBP-C). The members here are composed of the C5 immunoglobulin (Ig) domain of cardiac myosin binding protein C (MyBP-C). MyBP-C consists of repeated domains, Ig and fibronectin type 3, and various linkers. Three isoforms of MYBP-C exist: slow-skeletal (ssMyBP-C), fast-skeletal (fsMyBP-C), and cardiac (cMyBP-C). cMYBP-C has insertions between and inside domains and an additional cardiac-specific Ig domain at the N-terminus. For cMYBP_C an interaction has been demonstrated between this C5 domain and the Ig C8 domain. — an NCBI CDD conserved domain (cd05894); members share this curated model.
