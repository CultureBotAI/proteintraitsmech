identifier: CDD:cd22232
label: "ribbon-helix-helix family transcriptional repressor protein CopG, uncharacterized Cop6, and similar proteins. This family includes the ribbon-helix-helix (RHH) family transcriptional repressor CopG, which is involved in the control of plasmid copy number, as well as uncharacterized proteins such as Cop6, which is found in a small plasmid that has been identified in methicillin-resistant Staphylococcus aureus (MRSA). CopG, a homodimeric protein of around 45 residues, constitutes one of the smallest natural transcriptional repressors characterized and is the prototype of a series of repressor proteins encoded by plasmids that exhibit a similar genetic structure at their leading strand initiation and control regions. It binds to and represses the single Pcr promoter that directs the synthesis of a bicistronic mRNA for CopG and the RepB initiator of replication, thereby regulating its own synthesis and that of RepB."
definition: >-
  ribbon-helix-helix family transcriptional repressor protein CopG, uncharacterized Cop6, and similar proteins. This family includes the ribbon-helix-helix (RHH) family transcriptional repressor CopG, which is involved in the control of plasmid copy number, as well as uncharacterized proteins such as Cop6, which is found in a small plasmid that has been identified in methicillin-resistant Staphylococcus aureus (MRSA). CopG, a homodimeric protein of around 45 residues, constitutes one of the smallest natural transcriptional repressors characterized and is the prototype of a series of repressor proteins encoded by plasmids that exhibit a similar genetic structure at their leading strand initiation and control regions. It binds to and represses the single Pcr promoter that directs the synthesis of a bicistronic mRNA for CopG and the RepB initiator of replication, thereby regulating its own synthesis and that of RepB. — an NCBI CDD conserved domain (cd22232); members share this curated model.
