identifier: CDD:cd18043
label: "DEXXQ-box helicase domain of Superfamily 1 helicases. Superfamily 1 (SF1) helicases are nucleic acid motor proteins that couple ATP hydrolysis to translocation along with the concomitant unwinding of DNA or RNA. This is central to many aspects of cellular DNA and RNA metabolism and accordingly, they are implicated in a wide range of nucleic acid processing events including DNA replication, recombination, and repair as well as many aspects of RNA metabolism. Superfamily 1 helicases are members of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXXQ-box helicase domain of Superfamily 1 helicases. Superfamily 1 (SF1) helicases are nucleic acid motor proteins that couple ATP hydrolysis to translocation along with the concomitant unwinding of DNA or RNA. This is central to many aspects of cellular DNA and RNA metabolism and accordingly, they are implicated in a wide range of nucleic acid processing events including DNA replication, recombination, and repair as well as many aspects of RNA metabolism. Superfamily 1 helicases are members of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18043); members share this curated model.
