identifier: CDD:cd18231
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 47 (ZBTB47). ZBTB47, also called zinc finger protein 651 (ZNF651), is a paralog of ZNF652, a novel zinc-finger transcriptional repressor. It interacts with CBFA2T3 via its carboxy-terminal proline-rich region. CBFA2T3-ZNF651 functions as a transcriptional co-repressor complex. ZBTB47 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 47 (ZBTB47). ZBTB47, also called zinc finger protein 651 (ZNF651), is a paralog of ZNF652, a novel zinc-finger transcriptional repressor. It interacts with CBFA2T3 via its carboxy-terminal proline-rich region. CBFA2T3-ZNF651 functions as a transcriptional co-repressor complex. ZBTB47 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18231); members share this curated model.
