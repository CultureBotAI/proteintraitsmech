identifier: CDD:cd17117
label: "Ras-associating (RA) domain found in Ankyrin repeat and fibronectin type-III domain-containing protein 1 (ANKFN1) and similar proteins. ANKFN1 is a multi-domain protein, with unknown function, that contains two ankyrin repeats and one fibronectin type-III domain. Except for the mammalian homologs, most metazon ANKFN1 harbor a RA domain at the C-terminus. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin."
definition: >-
  Ras-associating (RA) domain found in Ankyrin repeat and fibronectin type-III domain-containing protein 1 (ANKFN1) and similar proteins. ANKFN1 is a multi-domain protein, with unknown function, that contains two ankyrin repeats and one fibronectin type-III domain. Except for the mammalian homologs, most metazon ANKFN1 harbor a RA domain at the C-terminus. The RA domain has the beta-grasp ubiquitin-like fold with low sequence similarity to ubiquitin. — an NCBI CDD conserved domain (cd17117); members share this curated model.
