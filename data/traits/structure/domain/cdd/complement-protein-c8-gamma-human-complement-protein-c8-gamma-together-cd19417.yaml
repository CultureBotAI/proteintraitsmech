identifier: CDD:cd19417
label: "complement protein C8 gamma. Human complement protein C8 gamma, together with C8alpha and C8beta, form one of five components of the cytolytic membrane attack complex (MAC), a pore-like structure that assembles on bacterial membranes. C8alpha and C8gamma form a disulfide-linked heterodimer that is noncovalently associated with C8beta. MAC plays an important role in the defense against gram-negative bacteria and other pathogenic organisms. C8gamma belongs to the lipocalin/cytosolic fatty-acid binding protein family which have a large beta-barrel ligand-binding cavity. Lipocalins are mainly low molecular weight extracellular proteins that bind principally small hydrophobic ligands, and form covalent or non-covalent complexes with soluble macromolecules, as well as membrane bound-receptors. They participate in processes such as ligand transport, modulation of cell growth and metabolism, regulation of immune response, smell reception, tissue development and animal behavior. Cytosolic fatty-acid binding proteins, also bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
