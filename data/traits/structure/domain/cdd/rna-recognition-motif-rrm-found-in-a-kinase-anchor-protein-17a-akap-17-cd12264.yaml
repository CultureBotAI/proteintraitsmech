identifier: CDD:cd12264
label: "RNA recognition motif (RRM) found in A-kinase anchor protein 17A (AKAP-17A) and similar proteins. This subfamily corresponds to the RRM domain of AKAP-17A, also termed 721P, or splicing factor, arginine/serine-rich 17A (SFRS17A). It was originally reported as the pseudoautosomal or X inactivation escape gene 7 (XE7) and as B-lymphocyte antigen precursor. It has been suggested that AKAP-17A is an alternative splicing factor and an SR-related splicing protein that interacts with the classical SR protein ASF/SF2 and the SR-related factor ZNF265. Additional studies have indicated that AKAP-17A is a dual-specific protein kinase A anchoring protein (AKAP) that can bind both type I and type II protein kinase A (PKA) with high affinity and co-localizes with the catalytic subunit of PKA in nuclear speckles as well as the splicing factor SC35 in splicing factor compartments. It is involved in regulation of pre-mRNA splicing possibly by docking a pool of PKA in splicing factor compartments. AKAP-17A contains an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain)."
definition: >-
  RNA recognition motif (RRM) found in A-kinase anchor protein 17A (AKAP-17A) and similar proteins. This subfamily corresponds to the RRM domain of AKAP-17A, also termed 721P, or splicing factor, arginine/serine-rich 17A (SFRS17A). It was originally reported as the pseudoautosomal or X inactivation escape gene 7 (XE7) and as B-lymphocyte antigen precursor. It has been suggested that AKAP-17A is an alternative splicing factor and an SR-related splicing protein that interacts with the classical SR protein ASF/SF2 and the SR-related factor ZNF265. Additional studies have indicated that AKAP-17A is a dual-specific protein kinase A anchoring protein (AKAP) that can bind both type I and type II protein kinase A (PKA) with high affinity and co-localizes with the catalytic subunit of PKA in nuclear speckles as well as the splicing factor SC35 in splicing factor compartments. It is involved in regulation of pre-mRNA splicing possibly by docking a pool of PKA in splicing factor compartments. AKAP-17A contains an RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain). — an NCBI CDD conserved domain (cd12264); members share this curated model.
