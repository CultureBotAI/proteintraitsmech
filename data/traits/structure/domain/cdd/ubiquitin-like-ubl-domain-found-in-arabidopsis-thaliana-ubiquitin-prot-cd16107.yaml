identifier: CDD:cd16107
label: "ubiquitin-like (Ubl) domain found in Arabidopsis thaliana ubiquitin-protein ligase 5 (AtUPL5) and similar proteins. Arabidopsis thaliana AtUPL5, also termed HECT-type E3 ubiquitin transferase UPL5, is an E3 ubiquitin-protein ligase that contains a ubiquitin-like domain (Ubl), a C-type lectin-binding domain, a leucine zipper and a HECT domain. HECT domain containing-ubiquitin-protein ligases have more than one member in different genomes, these proteins have been classified into four sub-families (UPL1/2, UPL3/4, UPL5 and UPL6/7). AtUPL5 fUPL5 regulates leaf senescence in Arabidopsis through degradation of the transcription factor WRKY53."
definition: >-
  ubiquitin-like (Ubl) domain found in Arabidopsis thaliana ubiquitin-protein ligase 5 (AtUPL5) and similar proteins. Arabidopsis thaliana AtUPL5, also termed HECT-type E3 ubiquitin transferase UPL5, is an E3 ubiquitin-protein ligase that contains a ubiquitin-like domain (Ubl), a C-type lectin-binding domain, a leucine zipper and a HECT domain. HECT domain containing-ubiquitin-protein ligases have more than one member in different genomes, these proteins have been classified into four sub-families (UPL1/2, UPL3/4, UPL5 and UPL6/7). AtUPL5 fUPL5 regulates leaf senescence in Arabidopsis through degradation of the transcription factor WRKY53. — an NCBI CDD conserved domain (cd16107); members share this curated model.
