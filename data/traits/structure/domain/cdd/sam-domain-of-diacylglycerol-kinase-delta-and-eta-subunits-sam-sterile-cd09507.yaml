identifier: CDD:cd09507
label: "SAM domain of diacylglycerol kinase delta and eta subunits. SAM (sterile alpha motif) domain of DGK-eta-delta subfamily proteins is a protein-protein interaction domain. Proteins of this subfamily are multidomain diacylglycerol kinases with a SAM domain located at the C-terminus. DGK proteins participate in signal transduction. They regulate the level of second messengers such as diacylglycerol and phosphatidic acid. The SAM domain of DGK proteins can form high molecular weight homooligomers through head-to-tail interactions as well as heterooligomers between the SAM domains of DGK delta and eta proteins. The oligomerization plays a role in the regulation of DGK intracellular localization."
definition: >-
  SAM domain of diacylglycerol kinase delta and eta subunits. SAM (sterile alpha motif) domain of DGK-eta-delta subfamily proteins is a protein-protein interaction domain. Proteins of this subfamily are multidomain diacylglycerol kinases with a SAM domain located at the C-terminus. DGK proteins participate in signal transduction. They regulate the level of second messengers such as diacylglycerol and phosphatidic acid. The SAM domain of DGK proteins can form high molecular weight homooligomers through head-to-tail interactions as well as heterooligomers between the SAM domains of DGK delta and eta proteins. The oligomerization plays a role in the regulation of DGK intracellular localization. — an NCBI CDD conserved domain (cd09507); members share this curated model.
