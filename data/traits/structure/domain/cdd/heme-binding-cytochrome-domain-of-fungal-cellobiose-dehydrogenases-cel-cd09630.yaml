identifier: CDD:cd09630
label: "Heme-binding cytochrome domain of fungal cellobiose dehydrogenases. Cellobiose dehydrogenase (CellobioseDH or CDH) is an extracellular fungal oxidoreductase that degrades both lignin and cellulose. Specifically, CDHs oxidize cellobiose, cellodextrins, and lactose to corresponding lactones, utilizing a variety of electron acceptors. Class-II CDHs are monomeric hemoflavoenzymes that are comprised of a b-type cytochrome domain linked to a large flavodehydrogenase domain. The cytochrome domain of CDH and related enzymes, which this model describes, folds as a beta sandwich and complexes a heme molecule. It is found at the N-terminus of this family of enzymes, and belongs to the DOMON domain superfamily, a ligand-interacting motif found in all three kingdoms of life."
definition: >-
  Heme-binding cytochrome domain of fungal cellobiose dehydrogenases. Cellobiose dehydrogenase (CellobioseDH or CDH) is an extracellular fungal oxidoreductase that degrades both lignin and cellulose. Specifically, CDHs oxidize cellobiose, cellodextrins, and lactose to corresponding lactones, utilizing a variety of electron acceptors. Class-II CDHs are monomeric hemoflavoenzymes that are comprised of a b-type cytochrome domain linked to a large flavodehydrogenase domain. The cytochrome domain of CDH and related enzymes, which this model describes, folds as a beta sandwich and complexes a heme molecule. It is found at the N-terminus of this family of enzymes, and belongs to the DOMON domain superfamily, a ligand-interacting motif found in all three kingdoms of life. — an NCBI CDD conserved domain (cd09630); members share this curated model.
