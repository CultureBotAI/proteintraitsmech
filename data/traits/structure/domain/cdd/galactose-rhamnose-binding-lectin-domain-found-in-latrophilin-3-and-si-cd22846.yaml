identifier: CDD:cd22846
label: "galactose/rhamnose binding lectin domain found in latrophilin-3 and similar proteins. Latrophilin-3 (LPHN3), also called adhesion G protein-coupled receptor L3 (ADGRL3), or calcium-independent alpha-latrotoxin receptor 3 (CIRL-3), or lectomedin-3, is a brain-specific calcium-independent receptor that plays a role in cell-cell adhesion and neuron guidance via its interactions with FLRT2 and FLRT3 that are expressed at the surface of adjacent cells. It is involved in the development of glutamatergic synapses in the cortex. This model corresponds to a galactose/rhamnose-binding lectin domain found at the N-terminus of LPHN3."
definition: >-
  galactose/rhamnose binding lectin domain found in latrophilin-3 and similar proteins. Latrophilin-3 (LPHN3), also called adhesion G protein-coupled receptor L3 (ADGRL3), or calcium-independent alpha-latrotoxin receptor 3 (CIRL-3), or lectomedin-3, is a brain-specific calcium-independent receptor that plays a role in cell-cell adhesion and neuron guidance via its interactions with FLRT2 and FLRT3 that are expressed at the surface of adjacent cells. It is involved in the development of glutamatergic synapses in the cortex. This model corresponds to a galactose/rhamnose-binding lectin domain found at the N-terminus of LPHN3. — an NCBI CDD conserved domain (cd22846); members share this curated model.
