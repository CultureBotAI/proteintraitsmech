identifier: CDD:cd16443
label: "lipoate-protein ligase. Lipoate-protein ligase A (LplA) catalyzes the formation of an amide linkage between free lipoic acid and a specific lysine residue of the lipoyl domain in lipoate dependent enzymes, similar to the biotinylation reaction mediated by biotinyl protein ligase (BPL). The two step reaction includes activation of exogenously supplied lipoic acid at the expense of ATP to lipoyl-AMP and then transfer to the epsilon-amino group of a specific lysine residue of the lipoyl domain of the target protein."
definition: >-
  lipoate-protein ligase. Lipoate-protein ligase A (LplA) catalyzes the formation of an amide linkage between free lipoic acid and a specific lysine residue of the lipoyl domain in lipoate dependent enzymes, similar to the biotinylation reaction mediated by biotinyl protein ligase (BPL). The two step reaction includes activation of exogenously supplied lipoic acid at the expense of ATP to lipoyl-AMP and then transfer to the epsilon-amino group of a specific lysine residue of the lipoyl domain of the target protein. — an NCBI CDD conserved domain (cd16443); members share this curated model.
