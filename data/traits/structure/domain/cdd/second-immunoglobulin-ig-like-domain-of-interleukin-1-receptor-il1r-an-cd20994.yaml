identifier: CDD:cd20994
label: "Second immunoglobulin (Ig)-like domain of interleukin-1 receptor (IL1R), and similar domains. The members here are composed of the second immunoglobulin (Ig)-like domain of interleukin-1 receptor (IL1R). IL-1 alpha and IL-1 beta are cytokines which participate in the regulation of inflammation, immune responses, and hematopoiesis. These cytokines bind to the IL-1 receptor type 1 (IL1R1), which is activated on additional association with interleukin-1 receptor accessory protein (IL1RAP).  IL-1 also binds a second receptor designated type II (IL1R2). Mature IL1R1 consists of three IG-like domains, a transmembrane domain, and a large cytoplasmic domain. Mature IL1R2 is organized similarly except that it has a short cytoplasmic domain. The latter does not initiate signal transduction. A naturally occurring cytokine IL-1RA (IL-1 receptor antagonist) is widely expressed and binds to IL-1 receptors, inhibiting the binding of IL-1 alpha and IL-1 beta. This group also contains ILIR-like 1 (IL1R1L) which maps to the same chromosomal location as IL1R1 and IL1R2."
definition: >-
  Second immunoglobulin (Ig)-like domain of interleukin-1 receptor (IL1R), and similar domains. The members here are composed of the second immunoglobulin (Ig)-like domain of interleukin-1 receptor (IL1R). IL-1 alpha and IL-1 beta are cytokines which participate in the regulation of inflammation, immune responses, and hematopoiesis. These cytokines bind to the IL-1 receptor type 1 (IL1R1), which is activated on additional association with interleukin-1 receptor accessory protein (IL1RAP). IL-1 also binds a second receptor designated type II (IL1R2). Mature IL1R1 consists of three IG-like domains, a transmembrane domain, and a large cytoplasmic domain. Mature IL1R2 is organized similarly except that it has a short cytoplasmic domain. The latter does not initiate signal transduction. A naturally occurring cytokine IL-1RA (IL-1 receptor antagonist) is widely expressed and binds to IL-1 receptors, inhibiting the binding of IL-1 alpha and IL-1 beta. This group also contains ILIR-like 1 (IL1R1L) which maps to the same chromosomal location as IL1R1 and IL1R2. — an NCBI CDD conserved domain (cd20994); members share this curated model.
