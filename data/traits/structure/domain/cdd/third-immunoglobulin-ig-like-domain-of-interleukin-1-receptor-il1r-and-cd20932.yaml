identifier: CDD:cd20932
label: "Third immunoglobulin (Ig)-like domain of interleukin-1 receptor (IL1R), and similar domains. The members here are composed of the third immunoglobulin (Ig)-like domain of interleukin-1 receptor (IL1R) and similar proteins. Members of this family are characterized by extracellular immunoglobulin-like domains and intracellular Toll/Interleukin-1R (TIR) domain. Three naturally occurring ligands for the IL-1 receptor (IL1R) are known: the agonists IL-1alpha and IL-1beta and the IL-1-receptor antagonist IL1RA. IL-1Rs are involved in immune host defense and hematopoiesis. After binding to interleukin-1, IL1R associates with the coreceptor IL1RAP (interleukin 1 receptor accessory protein, also known as IL-1R3) to form the high affinity interleukin-1 receptor complex, which induces multiple cellular responses including NF-kappa-B activation, IL-2 secretion, and IL-2 promoter activation. Signaling involves the recruitment of adapter molecules such as TOLLIP, MYD88, and IRAK1 or IRAK2 via the respective TIR domains of the receptor/coreceptor subunits. IL1R binds ligands with comparable affinity to its antagonist IL1RA, and binding of IL1RA to IL1R, prevents association of the latter with IL1RAP to form a signaling complex."
definition: >-
  Third immunoglobulin (Ig)-like domain of interleukin-1 receptor (IL1R), and similar domains. The members here are composed of the third immunoglobulin (Ig)-like domain of interleukin-1 receptor (IL1R) and similar proteins. Members of this family are characterized by extracellular immunoglobulin-like domains and intracellular Toll/Interleukin-1R (TIR) domain. Three naturally occurring ligands for the IL-1 receptor (IL1R) are known: the agonists IL-1alpha and IL-1beta and the IL-1-receptor antagonist IL1RA. IL-1Rs are involved in immune host defense and hematopoiesis. After binding to interleukin-1, IL1R associates with the coreceptor IL1RAP (interleukin 1 receptor accessory protein, also known as IL-1R3) to form the high affinity interleukin-1 receptor complex, which induces multiple cellular responses including NF-kappa-B activation, IL-2 secretion, and IL-2 promoter activation. Signaling involves the recruitment of adapter molecules such as TOLLIP, MYD88, and IRAK1 or IRAK2 via the respective TIR domains of the receptor/coreceptor subunits. IL1R binds ligands with comparable affinity to its antagonist IL1RA, and binding of IL1RA to IL1R, prevents association of the latter with IL1RAP to form a signaling complex. — an NCBI CDD conserved domain (cd20932); members share this curated model.
