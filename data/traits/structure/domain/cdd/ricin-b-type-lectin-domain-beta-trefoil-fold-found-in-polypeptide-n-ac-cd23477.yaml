identifier: CDD:cd23477
label: "ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase-like 6 (GALNTL6) and similar proteins. GALNTL6 (EC 2.4.1.41), also called polypeptide GalNAc transferase 17, GalNAc-T17, pp-GaNTase 17, protein-UDP acetylgalactosaminyltransferase 17, putative polypeptide N-acetylgalactosaminyltransferase 17, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 17, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNTL6 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in polypeptide N-acetylgalactosaminyltransferase-like 6 (GALNTL6) and similar proteins. GALNTL6 (EC 2.4.1.41), also called polypeptide GalNAc transferase 17, GalNAc-T17, pp-GaNTase 17, protein-UDP acetylgalactosaminyltransferase 17, putative polypeptide N-acetylgalactosaminyltransferase 17, or UDP-GalNAc:polypeptide N-acetylgalactosaminyltransferase 17, catalyzes the initial reaction in O-linked oligosaccharide biosynthesis, the transfer of an N-acetyl-D-galactosamine residue to a serine or threonine residue on the protein receptor. GALNTL6 comprises a glycosyltransferase region and a ricin B-type lectin domain. The glycosyltransferase region contains two conserved domains, domain A (also called GT1 motif) and domain B (also called Gal/GalNAc-T motif). This model corresponds to the ricin B-type lectin domain with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The ricin B-type lectin domain binds to GalNAc and contributes to the glycopeptide specificity. — an NCBI CDD conserved domain (cd23477); members share this curated model.
