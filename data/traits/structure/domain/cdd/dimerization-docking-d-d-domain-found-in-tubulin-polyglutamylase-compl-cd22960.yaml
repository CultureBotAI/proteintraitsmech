identifier: CDD:cd22960
label: "dimerization/docking (D/D) domain found in tubulin polyglutamylase complex subunit 1 (TPGS1) and similar proteins. TPGS1 is part of the neuronal tubulin polyglutamylase complex which contains TPGS1, TPGS2, TTLL1, LRRC49 and NICN1. It is required for the development of the spermatid flagellum. TPGS1 contains an N-terminal domain which shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA)."
definition: >-
  dimerization/docking (D/D) domain found in tubulin polyglutamylase complex subunit 1 (TPGS1) and similar proteins. TPGS1 is part of the neuronal tubulin polyglutamylase complex which contains TPGS1, TPGS2, TTLL1, LRRC49 and NICN1. It is required for the development of the spermatid flagellum. TPGS1 contains an N-terminal domain which shows high sequence similarity to the dimerization/docking (D/D) domain of regulatory subunit of cAMP-dependent protein kinase (PKA). — an NCBI CDD conserved domain (cd22960); members share this curated model.
