identifier: CDD:cd16295
label: "Thermus thermophilus TTHA0252 and related cleavage and polyadenylation specificity factors; MBL-fold metallo-hydrolase domain. Includes the archaeal cleavage and polyadenylation specificity factors (CPSFs) such as Methanothermobacter thermautotrophicus MTH1203, and Pyrococcus horikoshii PH1404. In addition to the MBL-fold metallo-hydrolase nuclease and the beta-CASP domains, members of this subgroup contain two contiguous KH domains. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  Thermus thermophilus TTHA0252 and related cleavage and polyadenylation specificity factors; MBL-fold metallo-hydrolase domain. Includes the archaeal cleavage and polyadenylation specificity factors (CPSFs) such as Methanothermobacter thermautotrophicus MTH1203, and Pyrococcus horikoshii PH1404. In addition to the MBL-fold metallo-hydrolase nuclease and the beta-CASP domains, members of this subgroup contain two contiguous KH domains. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd16295); members share this curated model.
