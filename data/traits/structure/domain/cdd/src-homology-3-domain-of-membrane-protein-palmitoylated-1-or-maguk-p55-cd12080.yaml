identifier: CDD:cd12080
label: "Src Homology 3 domain of Membrane Protein, Palmitoylated 1 (or MAGUK p55 subfamily member 1). MPP1, also called 55 kDa erythrocyte membrane protein (p55), is a ubiquitously-expressed scaffolding protein that plays roles in regulating neutrophil polarity, cell shape, hair cell development, and neural development and patterning of the retina. It was originally identified as an erythrocyte protein that stabilizes the actin cytoskeleton to the plasma membrane by forming a complex with 4.1R protein and glycophorin C. MPP1 is one of seven vertebrate homologs of the Drosophila Stardust protein, which is required in establishing cell polarity, and it contains the three domains characteristic of MAGUK (membrane-associated guanylate kinase) proteins: PDZ, SH3, and guanylate kinase (GuK). In addition, it also contains the Hook (Protein 4.1 Binding) motif in between the SH3 and GuK domains. The GuK domain in MAGUK proteins is enzymatically inactive; instead, the domain mediates protein-protein interactions and associates intramolecularly with the SH3 domain. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
