identifier: CDD:cd22732
label: "forkhead associated (FHA) domain found in kinesin-like protein KIF16B. KIF16B, also called sorting nexin-23, is a plus end-directed microtubule-dependent motor protein involved in endosome transport and receptor recycling and degradation. It regulates the plus end motility of early endosomes and the balance between recycling and degradation of receptors such as EGF receptor (EGFR) and FGF receptor (FGFR). It regulates the Golgi to endosome transport of FGFR-containing vesicles during early development, a key process for developing basement membrane and epiblast and primitive endoderm lineages during early postimplantation development. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine."
definition: >-
  forkhead associated (FHA) domain found in kinesin-like protein KIF16B. KIF16B, also called sorting nexin-23, is a plus end-directed microtubule-dependent motor protein involved in endosome transport and receptor recycling and degradation. It regulates the plus end motility of early endosomes and the balance between recycling and degradation of receptors such as EGF receptor (EGFR) and FGF receptor (FGFR). It regulates the Golgi to endosome transport of FGFR-containing vesicles during early development, a key process for developing basement membrane and epiblast and primitive endoderm lineages during early postimplantation development. The FHA domain is a small phosphopeptide recognition module, but this group may lack the conserved residues that are required for binding phosphothreonine. — an NCBI CDD conserved domain (cd22732); members share this curated model.
