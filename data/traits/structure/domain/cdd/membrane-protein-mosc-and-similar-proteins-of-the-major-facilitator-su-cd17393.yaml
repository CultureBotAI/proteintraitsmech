identifier: CDD:cd17393
label: "Membrane protein MosC and similar proteins of the Major Facilitator Superfamily of transporters. The gene encoding Sinorhizobium meliloti membrane protein MosC is part of the mos locus, which encodes the biosynthesis of the rhizopine 3-O-methyl-scyllo-inosamine. MosC belongs to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Membrane protein MosC and similar proteins of the Major Facilitator Superfamily of transporters. The gene encoding Sinorhizobium meliloti membrane protein MosC is part of the mos locus, which encodes the biosynthesis of the rhizopine 3-O-methyl-scyllo-inosamine. MosC belongs to the bacterial fucose permease, eukaryotic Major facilitator superfamily domain-containing protein 4 (FucP/MFSD4) family of the Major Facilitator Superfamily (MFS) of transporters. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17393); members share this curated model.
