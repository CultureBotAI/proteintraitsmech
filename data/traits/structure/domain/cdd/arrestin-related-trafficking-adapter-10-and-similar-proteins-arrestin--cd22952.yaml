identifier: CDD:cd22952
label: "Arrestin-related trafficking adapter 10 and similar proteins. Arrestin-related trafficking adaptors (ARTs) function by targeting specific plasma membrane proteins to the endocytic system. They contain multiple PY motifs that are required for recruitment of Rsp5/Nedd4-like ubiquitin ligase which modifies the cargoes. It has been proposed that ARTs remodel the cell surface in response to environmental cues and may serve as part of a quality-control system at the plasma membrane, targeting damaged and misfolded membrane proteins for ubiquitination and subsequent degradation in the lysosome/vacuole. The specific target protein for ART10 is not yet known."
definition: >-
  Arrestin-related trafficking adapter 10 and similar proteins. Arrestin-related trafficking adaptors (ARTs) function by targeting specific plasma membrane proteins to the endocytic system. They contain multiple PY motifs that are required for recruitment of Rsp5/Nedd4-like ubiquitin ligase which modifies the cargoes. It has been proposed that ARTs remodel the cell surface in response to environmental cues and may serve as part of a quality-control system at the plasma membrane, targeting damaged and misfolded membrane proteins for ubiquitination and subsequent degradation in the lysosome/vacuole. The specific target protein for ART10 is not yet known. — an NCBI CDD conserved domain (cd22952); members share this curated model.
