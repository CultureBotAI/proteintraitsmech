identifier: CDD:cd23735
label: "RNA-editing substrate-binding complex subunit 6 (RESC6) and related proteins. RESC6 (GRBC6, MRB3010) is a component of the RNA-editing substrate-binding complex (RESC), that is composed of about 20 components and is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC6 is predicted (by AlphaFold) to adopt an all-helical structure with a disordered region at the N-terminus. The helical structure that is predicted with high confidence resembles Armadillo (ARM)/beta-catenin-like repeats. ARM repeats have been implicated in mediating protein-protein interactions."
definition: >-
  RNA-editing substrate-binding complex subunit 6 (RESC6) and related proteins. RESC6 (GRBC6, MRB3010) is a component of the RNA-editing substrate-binding complex (RESC), that is composed of about 20 components and is involved in kinetoplast RNA processing. The mitochondrial DNA of Trypanosomatids, known as the kinetoplast DNA (kDNA or mtDNA), consists of a network of dozens of maxicircles and thousands of minicircles concatenated together. Maxicircles are equivalent to other eukaryotic mitochondrial DNAs, while minicircles encode guide RNAs (gRNAs) involved in U-insertion/deletion editing processes exclusive of Trypanosomatids that produce the maturation of the maxicircle-encoded transcripts. Although most gRNAs are encoded by minicircles, varying numbers of maxicircle-encoded gRNAs have been identified in kinetoplastids species. Trypanosoma brucei maxicircles encode 9S and 12S rRNAs, two gRNAs, two ribosomal proteins and 16 subunits of respiratory complexes. 12 of the 18 maxicircle genes are present as cryptogenes whose transcripts require U-insertion/deletion editing, mediated by gRNAs, to restore a protein-coding capacity. RESC interacts with two other complexes, the RNA-editing helicase 2 complex (REH2C) and RNA-editing catalytic complex (RECC) to form an assembly (editosome/holoenzyme) that carries out U-insertion/deletion mRNA editing. RESC6 is predicted (by AlphaFold) to adopt an all-helical structure with a disordered region at the N-terminus. The helical structure that is predicted with high confidence resembles Armadillo (ARM)/beta-catenin-like repeats. ARM repeats have been implicated in mediating protein-protein interactions. — an NCBI CDD conserved domain (cd23735); members share this curated model.
