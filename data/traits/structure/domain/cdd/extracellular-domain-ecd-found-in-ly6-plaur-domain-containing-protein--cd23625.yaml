identifier: CDD:cd23625
label: "extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 6 (LYPD6) and similar proteins. LYPD6 acts as a modulator of nicotinic acetylcholine receptors (nAChRs) function in the brain. It inhibits nicotine-induced Ca(2+) influx through nAChRs. It functions as a positive regulator of Wnt/beta-catenin signaling. LYPD6 contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Ly6/PLAUR domain-containing protein 6 (LYPD6) and similar proteins. LYPD6 acts as a modulator of nicotinic acetylcholine receptors (nAChRs) function in the brain. It inhibits nicotine-induced Ca(2+) influx through nAChRs. It functions as a positive regulator of Wnt/beta-catenin signaling. LYPD6 contains an extracellular domain (ECD) that belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23625); members share this curated model.
