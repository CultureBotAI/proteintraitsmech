identifier: CDD:cd07781
label: "nucleotide-binding domain (NBD) of ribulokinase (RBK) and similar proteins. RBK (EC 2.7.1.16; also known as L-ribulokinase) catalyzes the MgATP-dependent phosphorylation of L(or D)-ribulose to produce L(or D)-ribulose 5-phosphate and ADP, which is the second step in arabinose catabolism. It also phosphorylates a variety of other sugar substrates including ribitol and arabitol. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of ribulokinase (RBK) and similar proteins. RBK (EC 2.7.1.16; also known as L-ribulokinase) catalyzes the MgATP-dependent phosphorylation of L(or D)-ribulose to produce L(or D)-ribulose 5-phosphate and ADP, which is the second step in arabinose catabolism. It also phosphorylates a variety of other sugar substrates including ribitol and arabitol. Members of this subfamily belong to the FGGY family of carbohydrate kinases, the monomers of which contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07781); members share this curated model.
