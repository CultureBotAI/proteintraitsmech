identifier: CDD:cd20148
label: "PWWP domain found in Hepatoma-derived growth factor (HDGF). HDGF, also called high mobility group protein 1-like 2 (HMG-1L2), is a heparin-binding protein that acts as a transcriptional repressor with mitogenic activity for fibroblasts. It contains a PWWP domain, which is necessary for DNA binding."
definition: >-
  PWWP domain found in Hepatoma-derived growth factor (HDGF). HDGF, also called high mobility group protein 1-like 2 (HMG-1L2), is a heparin-binding protein that acts as a transcriptional repressor with mitogenic activity for fibroblasts. It contains a PWWP domain, which is necessary for DNA binding. — an NCBI CDD conserved domain (cd20148); members share this curated model.
