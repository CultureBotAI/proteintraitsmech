identifier: CDD:cd18499
label: "BACK (BTB and C-terminal Kelch) domain found in Rho-related BTB domain-containing proteins (RhoBTB). RhoBTB proteins constitute a subfamily of atypical members within the Rho family of small guanosine triphosphatases (GTPases), which is characterized by containing a GTPase domain (in most cases, non-functional) followed by a proline rich region, a tandem of 2 BTB domains, and a C-terminal BACK domain. In humans, the RhoBTB subfamily consists of 3 isoforms: RhoBTB1, RhoBTB2, and RhoBTB3. Orthologs are present in several other eukaryotes, such as Drosophila and Dictyostelium, but have been lost in plants and fungi."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Rho-related BTB domain-containing proteins (RhoBTB). RhoBTB proteins constitute a subfamily of atypical members within the Rho family of small guanosine triphosphatases (GTPases), which is characterized by containing a GTPase domain (in most cases, non-functional) followed by a proline rich region, a tandem of 2 BTB domains, and a C-terminal BACK domain. In humans, the RhoBTB subfamily consists of 3 isoforms: RhoBTB1, RhoBTB2, and RhoBTB3. Orthologs are present in several other eukaryotes, such as Drosophila and Dictyostelium, but have been lost in plants and fungi. — an NCBI CDD conserved domain (cd18499); members share this curated model.
