identifier: CDD:cd16988
label: "ANTH (AP180 N-Terminal Homology) domain, N-terminal region, of yeast clathrin coat assembly protein AP180 (YAP180) and similar proteins. This subfamily includes yeast clathrin coat assembly protein AP180 (YAP180) and similar proteins. There are two YAP180 proteins in Saccharomyces cerevisiae, AP180A (yAP180A or YAP1801) and AP180B (yAP180B or YAP1802). They are involved in endocytosis and clathrin cage assembly. ANTH domains bind both inositol phospholipids and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. The ANTH domain is a unique module whose N-terminal half is structurally similar to the Epsin N-Terminal Homology (ENTH) and Vps27/Hrs/STAM (VHS) domains, containing a superhelix of eight alpha helices. In addition, it contains a coiled-coil C-terminal half with strutural similarity to spectrin repeats. It binds phosphoinositide PtdIns(4,5)P2 at a short conserved motif K[X]9[K/R][H/Y] between helices 1 and 2. This model describes the N-terminal region of ANTH domains of plant clathrin coat assembly protein AP180 and similar proteins."
definition: >-
  ANTH (AP180 N-Terminal Homology) domain, N-terminal region, of yeast clathrin coat assembly protein AP180 (YAP180) and similar proteins. This subfamily includes yeast clathrin coat assembly protein AP180 (YAP180) and similar proteins. There are two YAP180 proteins in Saccharomyces cerevisiae, AP180A (yAP180A or YAP1801) and AP180B (yAP180B or YAP1802). They are involved in endocytosis and clathrin cage assembly. ANTH domains bind both inositol phospholipids and proteins, and contribute to the nucleation and formation of clathrin coats on membranes. The ANTH domain is a unique module whose N-terminal half is structurally similar to the Epsin N-Terminal Homology (ENTH) and Vps27/Hrs/STAM (VHS) domains, containing a superhelix of eight alpha helices. In addition, it contains a coiled-coil C-terminal half with strutural similarity to spectrin repeats. It binds phosphoinositide PtdIns(4,5)P2 at a short conserved motif K[X]9[K/R][H/Y] between helices 1 and 2. This model describes the N-terminal region of ANTH domains of plant clathrin coat assembly protein AP180 and similar proteins. — an NCBI CDD conserved domain (cd16988); members share this curated model.
