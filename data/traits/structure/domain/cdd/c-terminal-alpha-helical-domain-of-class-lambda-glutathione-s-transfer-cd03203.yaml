  C-terminal, alpha helical domain of Class Lambda Glutathione S-transferases. Glutathione S-transferase (GST) C-terminal domain family, Class Lambda subfamily; composed of plant-specific class Lambda GSTs. GSTs are cytosolic, usually dimeric, proteins involved in cellular detoxification by catalyzing the conjugation of glutathione (GSH) with a wide range of endogenous and xenobiotic alkylating agents, including carcinogens, therapeutic drugs, environmental toxins, and products of oxidative stress. The GST fold contains an N-terminal thioredoxin-fold domain and a C-terminal alpha helical domain, with an active site located in a cleft between the two domains. GSH binds to the N-terminal domain while the hydrophobic substrate occupies a pocket in the C-terminal domain. The class Lambda subfamily was recently discovered, together with dehydroascorbate reductases (DHARs), as two outlying groups of the GST superfamily in Arabidopsis thaliana, which contain conserved active site cysteines. Characterization of recombinant A. thaliana proteins show that Lambda class GSTs are monomeric, similar to DHARs. They do not exhibit GSH conjugating or DHAR activities, but are active as thiol transferases, similar to glutaredoxins. Members of this subfamily were originally identified as encoded proteins of the In2-1 gene, which can be induced by treatment with herbicide safeners. — an NCBI CDD conserved domain (cd03203); members share this curated model.
