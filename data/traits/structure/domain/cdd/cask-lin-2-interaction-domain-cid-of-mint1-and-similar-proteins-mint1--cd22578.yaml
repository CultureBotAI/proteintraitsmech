identifier: CDD:cd22578
label: "CASK/Lin-2 interaction domain (CID) of Mint1 and similar proteins. Mint1, also called amyloid-beta A4 precursor protein-binding family A member 1 (Apba1), or adapter protein X11alpha, or neuron-specific X11 protein, or neuronal Munc18-1-interacting protein 1, functions in synaptic vesicle exocytosis by binding to Munc18-1, an essential component of the synaptic vesicle exocytotic machinery. It may modulate processing of the amyloid-beta precursor protein (APP) and hence formation of APP-beta. Mint1 is a component of the brain-specific heterotrimeric complex (LIN-10-LIN-2-LIN-7 complex), which associates with the motor protein KIF17 to transport vesicles containing N-methyl-D-aspartate (NMDA) receptor subunit NR2B along microtubules. It is also part of a multimeric complex containing Munc18-1 and syntaxin-1. The model corresponds to a conserved CASK/Lin-2 interaction domain (CID) of Mint1, which is responsible for CASK binding."
definition: >-
  CASK/Lin-2 interaction domain (CID) of Mint1 and similar proteins. Mint1, also called amyloid-beta A4 precursor protein-binding family A member 1 (Apba1), or adapter protein X11alpha, or neuron-specific X11 protein, or neuronal Munc18-1-interacting protein 1, functions in synaptic vesicle exocytosis by binding to Munc18-1, an essential component of the synaptic vesicle exocytotic machinery. It may modulate processing of the amyloid-beta precursor protein (APP) and hence formation of APP-beta. Mint1 is a component of the brain-specific heterotrimeric complex (LIN-10-LIN-2-LIN-7 complex), which associates with the motor protein KIF17 to transport vesicles containing N-methyl-D-aspartate (NMDA) receptor subunit NR2B along microtubules. It is also part of a multimeric complex containing Munc18-1 and syntaxin-1. The model corresponds to a conserved CASK/Lin-2 interaction domain (CID) of Mint1, which is responsible for CASK binding. — an NCBI CDD conserved domain (cd22578); members share this curated model.
