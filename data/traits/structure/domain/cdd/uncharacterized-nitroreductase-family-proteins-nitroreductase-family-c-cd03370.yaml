identifier: CDD:cd03370
label: "uncharacterized nitroreductase family proteins. Nitroreductase family containing Thermus thermophilus NADH oxidase and other, uncharacterized proteins. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor. The enzyme is typically a homodimer."
definition: >-
  uncharacterized nitroreductase family proteins. Nitroreductase family containing Thermus thermophilus NADH oxidase and other, uncharacterized proteins. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor. The enzyme is typically a homodimer. — an NCBI CDD conserved domain (cd03370); members share this curated model.
