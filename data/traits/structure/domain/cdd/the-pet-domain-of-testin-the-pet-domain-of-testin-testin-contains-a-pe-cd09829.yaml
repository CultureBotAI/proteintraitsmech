identifier: CDD:cd09829
label: "The PET domain of Testin. The PET domain of Testin: Testin contains a PET domain at the N-terminus and three C-terminal LIM domains. Testin is a cytoskeleton associated focal adhesion protein that localizes along actin stress fibers, at cell-cell contact areas, and at focal adhesion plaques. Testin interacts with a variety of cytoskeletal proteins, including zyxin, mena, VASP, talin, and actin and is involved in cell motility and adhesion events. Knockout mice experiments reveal a tumor repressor function of Testin. The PET domain is a protein-protein interaction domain and is usually found in conjunction with LIM domain, which is also involved in protein-protein interactions. The PET containing proteins serve as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The PET domain of Testin. The PET domain of Testin: Testin contains a PET domain at the N-terminus and three C-terminal LIM domains. Testin is a cytoskeleton associated focal adhesion protein that localizes along actin stress fibers, at cell-cell contact areas, and at focal adhesion plaques. Testin interacts with a variety of cytoskeletal proteins, including zyxin, mena, VASP, talin, and actin and is involved in cell motility and adhesion events. Knockout mice experiments reveal a tumor repressor function of Testin. The PET domain is a protein-protein interaction domain and is usually found in conjunction with LIM domain, which is also involved in protein-protein interactions. The PET containing proteins serve as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09829); members share this curated model.
