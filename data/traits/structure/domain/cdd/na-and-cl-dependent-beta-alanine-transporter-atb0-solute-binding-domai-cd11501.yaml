identifier: CDD:cd11501
label: "Na(+)- and Cl(-)-dependent beta-alanine transporter ATB0+; solute-binding domain. ATB0+ (also known as the beta-alanine carrier) is a transmembrane transporter with a broad substrate specificity; it can transport non-alpha-amino acids such as beta-alanine with low affinity, and can transport dipolar and cationic amino acids such as leucine and lysine, with a higher affinity. It may have a role in the absorption of essential nutrients and drugs in the distal regions of the human gastrointestinal tract. Human ATB0+ is encoded by the SLC6A14 gene. ATB0+ is expressed in the lung, trachea, salivary gland, mammary gland, stomach, and pituitary gland. ATB0+ may play a role in obesity, and its upregulation may have a pathogenic role in colorectal cancer. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
