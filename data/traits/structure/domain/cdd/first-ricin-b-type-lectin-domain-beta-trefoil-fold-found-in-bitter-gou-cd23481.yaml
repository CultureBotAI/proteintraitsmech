identifier: CDD:cd23481
label: "first ricin B-type lectin domain, beta-trefoil fold, found in bitter gourd (Momordica charantia) seed lectin (BGSL) and similar proteins. Type II ribosome-inactivating proteins (RIPs) inhibit translation in eukaryotes by irreversibly inactivating the 28S rRNA and preventing the binding of elongation factor II to the ribosome. BGSL is a non-toxic four-chain type II RIP resulting from covalent association through a disulfide bridge between two identical copies of a two-chain unit. The two-chain unit consists of a catalytic A-chain and a lectin B-chain. The catalytic A-chain cannot firmly bind adenine due to the substitution of an aromatic residue involved in ensuring the proper orientation of the base in toxic RIPs, by a glycyl residue. BGSL is a galactose-specific lectin containing two ricin B-type lectin domains in its B-chain. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. This model corresponds to the first ricin B-type lectin domain. In BGSL, sugar does not bind at the 2gamma site. Its 1alpha site binds sugar, which is similar to that in snake gourd (Trichosanthes anguina) seed lectin (SGSL)."
definition: >-
  first ricin B-type lectin domain, beta-trefoil fold, found in bitter gourd (Momordica charantia) seed lectin (BGSL) and similar proteins. Type II ribosome-inactivating proteins (RIPs) inhibit translation in eukaryotes by irreversibly inactivating the 28S rRNA and preventing the binding of elongation factor II to the ribosome. BGSL is a non-toxic four-chain type II RIP resulting from covalent association through a disulfide bridge between two identical copies of a two-chain unit. The two-chain unit consists of a catalytic A-chain and a lectin B-chain. The catalytic A-chain cannot firmly bind adenine due to the substitution of an aromatic residue involved in ensuring the proper orientation of the base in toxic RIPs, by a glycyl residue. BGSL is a galactose-specific lectin containing two ricin B-type lectin domains in its B-chain. The ricin B-type lectin domain shows a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. This model corresponds to the first ricin B-type lectin domain. In BGSL, sugar does not bind at the 2gamma site. Its 1alpha site binds sugar, which is similar to that in snake gourd (Trichosanthes anguina) seed lectin (SGSL). — an NCBI CDD conserved domain (cd23481); members share this curated model.
