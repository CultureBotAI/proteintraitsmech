identifier: CDD:cd10333
label: "Aquifex aeolicus LeuT and related proteins; solute binding domain. LeuT is a bacterial amino acid transporter with specificity for the hydrophobic amino acids glycine, alanine, methionine, and leucine. This subgroup belongs to the solute carrier 6 (SLC6) transporter family; LeuT has been used as a structural template for understanding fundamental aspects of SLC6 function. It has an arrangement of 12 transmembrane helices (TMs), which appears to be a common motif for eukaryotic and some prokaryotic and archaeal SLC6s: an inverted topology repeat: TMs1-5 and TMs6-10, and TMs11-12."
definition: >-
  Aquifex aeolicus LeuT and related proteins; solute binding domain. LeuT is a bacterial amino acid transporter with specificity for the hydrophobic amino acids glycine, alanine, methionine, and leucine. This subgroup belongs to the solute carrier 6 (SLC6) transporter family; LeuT has been used as a structural template for understanding fundamental aspects of SLC6 function. It has an arrangement of 12 transmembrane helices (TMs), which appears to be a common motif for eukaryotic and some prokaryotic and archaeal SLC6s: an inverted topology repeat: TMs1-5 and TMs6-10, and TMs11-12. — an NCBI CDD conserved domain (cd10333); members share this curated model.
