identifier: CDD:cd19906
label: "double-stranded RNA binding motif of adenosine deaminase domain-containing protein 2 (ADAD2) and similar proteins. ADAD2 (also known as testis nuclear RNA-binding protein-like (TENRL)) is phylogenetically related to a family of adenosine deaminases involved in RNA editing. It is a double-stranded RNA binding protein with unclear biological function. ADAD2 contains a double-stranded RNA binding motif (DSRM) and a C-terminal adenosine-deaminase (editase) domain. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of adenosine deaminase domain-containing protein 2 (ADAD2) and similar proteins. ADAD2 (also known as testis nuclear RNA-binding protein-like (TENRL)) is phylogenetically related to a family of adenosine deaminases involved in RNA editing. It is a double-stranded RNA binding protein with unclear biological function. ADAD2 contains a double-stranded RNA binding motif (DSRM) and a C-terminal adenosine-deaminase (editase) domain. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19906); members share this curated model.
