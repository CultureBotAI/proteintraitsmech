identifier: CDD:cd17198
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 6 (FRMD6). FRMD6, also termed willin, expanded or expanded homolog, is a FERM domain-containing protein that plays a critical role in regulating both cell proliferation and apoptosis. It acts as a tumor suppressor of human breast cancer cells independently of the Hippo pathway. It also inhibits human glioblastoma growth and progression by negatively regulating activity of receptor tyrosine kinases. As an upstream component of the hippo signaling pathway, FRMD6 orchestrates mammalian peripheral nerve fibroblasts. FRMD6 contains a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain, F1 sub-domain, found in FERM domain-containing protein 6 (FRMD6). FRMD6, also termed willin, expanded or expanded homolog, is a FERM domain-containing protein that plays a critical role in regulating both cell proliferation and apoptosis. It acts as a tumor suppressor of human breast cancer cells independently of the Hippo pathway. It also inhibits human glioblastoma growth and progression by negatively regulating activity of receptor tyrosine kinases. As an upstream component of the hippo signaling pathway, FRMD6 orchestrates mammalian peripheral nerve fibroblasts. FRMD6 contains a FERM domain that is made up of three sub-domains, F1, F2, and F3. This family corresponds to the F1 sub-domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17198); members share this curated model.
