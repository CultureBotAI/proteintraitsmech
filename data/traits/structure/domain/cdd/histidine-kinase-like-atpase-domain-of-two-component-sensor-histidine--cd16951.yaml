identifier: CDD:cd16951
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Erythrobacter litoralis blue light-activated histidine kinase 2. This domain family includes the histidine kinase-like ATPase (HATPase) domain of blue light-activated histidine kinase 2 of Erythrobacter litoralis (EL346). Signaling commonly occurs within HK dimers, however EL346 functions as a monomer. Also included in this family are the HATPase domains of ethanolamine utilization sensory transduction histidine kinase (EutW), whereby regulation of ethanolamine, a carbon and nitrogen source for gut bacteria, results in autophosphorylation and subsequent phosphoryl transfer to a response regulator (EutV) containing an RNA-binding domain. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some have an accessory PAS sensor domain, while some have an N-terminal histidine kinase domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Erythrobacter litoralis blue light-activated histidine kinase 2. This domain family includes the histidine kinase-like ATPase (HATPase) domain of blue light-activated histidine kinase 2 of Erythrobacter litoralis (EL346). Signaling commonly occurs within HK dimers, however EL346 functions as a monomer. Also included in this family are the HATPase domains of ethanolamine utilization sensory transduction histidine kinase (EutW), whereby regulation of ethanolamine, a carbon and nitrogen source for gut bacteria, results in autophosphorylation and subsequent phosphoryl transfer to a response regulator (EutV) containing an RNA-binding domain. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some have an accessory PAS sensor domain, while some have an N-terminal histidine kinase domain. — an NCBI CDD conserved domain (cd16951); members share this curated model.
