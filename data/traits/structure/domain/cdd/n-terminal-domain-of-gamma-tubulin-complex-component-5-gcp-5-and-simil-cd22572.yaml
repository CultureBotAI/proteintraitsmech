identifier: CDD:cd22572
label: "N-terminal domain of gamma-tubulin complex component 5 (GCP-5) and similar proteins. GCP-5, also called TUBGCP5, is a component of the gamma-tubulin ring complex (gamma-TuRC), which is necessary for microtubule nucleation at the centrosome. The model corresponds to the N-terminal domain (NTD) of GCP-5, which is involved in protein-protein interactions. GCP-5 binds Mozart1, a microprotein that regulates subcellular targeting and microtubule formation activity of gamma-TuRC at different cell cycle stages, through its NTD."
definition: >-
  N-terminal domain of gamma-tubulin complex component 5 (GCP-5) and similar proteins. GCP-5, also called TUBGCP5, is a component of the gamma-tubulin ring complex (gamma-TuRC), which is necessary for microtubule nucleation at the centrosome. The model corresponds to the N-terminal domain (NTD) of GCP-5, which is involved in protein-protein interactions. GCP-5 binds Mozart1, a microprotein that regulates subcellular targeting and microtubule formation activity of gamma-TuRC at different cell cycle stages, through its NTD. — an NCBI CDD conserved domain (cd22572); members share this curated model.
