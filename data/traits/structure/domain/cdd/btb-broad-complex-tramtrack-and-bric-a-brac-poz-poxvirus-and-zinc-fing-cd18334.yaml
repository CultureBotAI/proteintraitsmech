identifier: CDD:cd18334
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in hypermethylated in cancer 2 protein (Hic-2). Hic-2 is also called HIC1-related gene on chromosome 22 protein (HRG22), Hic-3, or zinc finger and BTB domain-containing protein 30 (ZBTB30). It is a homolog of tumor suppressor Hic-1. It functions as a transcriptional regulator. It is a dosage-dependent regulator of cardiac development located within the distal 22q11 deletion syndrome region. Hic-2 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in hypermethylated in cancer 2 protein (Hic-2). Hic-2 is also called HIC1-related gene on chromosome 22 protein (HRG22), Hic-3, or zinc finger and BTB domain-containing protein 30 (ZBTB30). It is a homolog of tumor suppressor Hic-1. It functions as a transcriptional regulator. It is a dosage-dependent regulator of cardiac development located within the distal 22q11 deletion syndrome region. Hic-2 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18334); members share this curated model.
