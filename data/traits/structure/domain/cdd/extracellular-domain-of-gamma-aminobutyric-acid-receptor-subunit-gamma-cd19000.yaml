identifier: CDD:cd19000
label: "extracellular domain of gamma-aminobutyric acid receptor subunit gamma. This family contains extracellular domain (ECD) of the theta subunit of type-A gamma-aminobutyric acid receptor (GABAAR). GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. GABA stimulates human hepatocellular carcinoma growth through overexpressed GABAA receptor theta subunit. Also, two autism spectrum disorder (ASD)-associated protein truncation variants have been identified in alpha 3 (GABRA3) and theta (GABRQ) genes."
definition: >-
  extracellular domain of gamma-aminobutyric acid receptor subunit gamma. This family contains extracellular domain (ECD) of the theta subunit of type-A gamma-aminobutyric acid receptor (GABAAR). GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. GABA stimulates human hepatocellular carcinoma growth through overexpressed GABAA receptor theta subunit. Also, two autism spectrum disorder (ASD)-associated protein truncation variants have been identified in alpha 3 (GABRA3) and theta (GABRQ) genes. — an NCBI CDD conserved domain (cd19000); members share this curated model.
