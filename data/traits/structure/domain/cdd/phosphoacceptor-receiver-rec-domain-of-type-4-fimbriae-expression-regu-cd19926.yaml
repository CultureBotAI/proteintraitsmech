identifier: CDD:cd19926
label: "phosphoacceptor receiver (REC) domain of type 4 fimbriae expression regulatory protein PilR and similar proteins. Pseudomonas aeruginosa PilR is the response regulator of the PilS/PilR two-component regulatory system (PilSR TCS) that acts in conjunction with sigma-54 to regulate the expression of type 4 pilus (T4P) major subunit PilA. In addition, the PilSR TCS regulates flagellum-dependent swimming motility and pilus-dependent twitching motility. PilR contains an N-terminal REC domain, a central sigma-54 interaction domain, and a C-terminal Fis-type helix-turn-helix DNA-binding domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of type 4 fimbriae expression regulatory protein PilR and similar proteins. Pseudomonas aeruginosa PilR is the response regulator of the PilS/PilR two-component regulatory system (PilSR TCS) that acts in conjunction with sigma-54 to regulate the expression of type 4 pilus (T4P) major subunit PilA. In addition, the PilSR TCS regulates flagellum-dependent swimming motility and pilus-dependent twitching motility. PilR contains an N-terminal REC domain, a central sigma-54 interaction domain, and a C-terminal Fis-type helix-turn-helix DNA-binding domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19926); members share this curated model.
