identifier: CDD:cd21951
label: "C-terminal motif interacting with ubiquitin domain found in RING finger protein 169. RING finger protein 169 (RNF169) is an uncharacterized E3 ubiquitin-protein ligase paralogous to RNF168. It functions as a negative regulator of the DNA damage signaling cascade. RNF169 recognizes polyubiquitin structures but does not itself contribute to double-strand break (DSB)-induced chromatin ubiquitylation. It contributes to the regulation of the DSB repair pathway by competing with repair factors, 53BP1 and RAP80-BRCA1, for association with RNF168-modified chromatin, limiting the magnitude of the RNF8/RNF168-dependent signaling response to DSBs. RNF169 contains an N-terminal C3HC4-type RING-HC finger and a C-terminal MIU (motif interacting with ubiquitin) domain. This model corresponds to the MIU domain of RNF169, which shows high sequence similarity with the second MIU (MIU2) domain of RNF168, and is responsible for bridging histone and ubiquitin surfaces."
definition: >-
  C-terminal motif interacting with ubiquitin domain found in RING finger protein 169. RING finger protein 169 (RNF169) is an uncharacterized E3 ubiquitin-protein ligase paralogous to RNF168. It functions as a negative regulator of the DNA damage signaling cascade. RNF169 recognizes polyubiquitin structures but does not itself contribute to double-strand break (DSB)-induced chromatin ubiquitylation. It contributes to the regulation of the DSB repair pathway by competing with repair factors, 53BP1 and RAP80-BRCA1, for association with RNF168-modified chromatin, limiting the magnitude of the RNF8/RNF168-dependent signaling response to DSBs. RNF169 contains an N-terminal C3HC4-type RING-HC finger and a C-terminal MIU (motif interacting with ubiquitin) domain. This model corresponds to the MIU domain of RNF169, which shows high sequence similarity with the second MIU (MIU2) domain of RNF168, and is responsible for bridging histone and ubiquitin surfaces. — an NCBI CDD conserved domain (cd21951); members share this curated model.
