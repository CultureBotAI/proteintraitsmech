identifier: CDD:cd22583
label: "Rcat domain found in E3 ubiquitin-protein ligase ARI7 and similar proteins. This subfamily contains probable RBR-type E3 ubiquitin-protein ligases (EC 2.3.2.31) including Arabidopsis thaliana ARI5, ARI6, ARI7, and ARI8, as well as Dictyostelium discoideum RbrA (also called Ariadne-like ubiquitin ligase). They may function as part of E3 complexes, which accept ubiquitin from E2 ubiquitin-conjugating enzymes and then transfer it to substrates. RbrA may be required for normal cell-type proportioning and cell sorting during multicellular development, and is also necessary for spore cell viability. Members of this subfamily contain an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of ARI7-like proteins that are essential for RBR E3 ligase activity and adopt the same fold as the BRcat domain."
definition: >-
  Rcat domain found in E3 ubiquitin-protein ligase ARI7 and similar proteins. This subfamily contains probable RBR-type E3 ubiquitin-protein ligases (EC 2.3.2.31) including Arabidopsis thaliana ARI5, ARI6, ARI7, and ARI8, as well as Dictyostelium discoideum RbrA (also called Ariadne-like ubiquitin ligase). They may function as part of E3 complexes, which accept ubiquitin from E2 ubiquitin-conjugating enzymes and then transfer it to substrates. RbrA may be required for normal cell-type proportioning and cell sorting during multicellular development, and is also necessary for spore cell viability. Members of this subfamily contain an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain of ARI7-like proteins that are essential for RBR E3 ligase activity and adopt the same fold as the BRcat domain. — an NCBI CDD conserved domain (cd22583); members share this curated model.
