label: "Elongator subcomplex subunit Elp5. Elongator is a highly conserved multiprotein complex involved in RNA polymerase II-mediated transcriptional elongation and many other processes, including cytoskeleton organization, exocytosis, and tRNA modification. It is composed of two subcomplexes, Elp1-3 and Elp4-6. Elp4-6 forms a heterohexameric RecA-like ring structure, although they lack the key sequence signatures of ATPases."
definition: >-
  Elongator subcomplex subunit Elp5. Elongator is a highly conserved multiprotein complex involved in RNA polymerase II-mediated transcriptional elongation and many other processes, including cytoskeleton organization, exocytosis, and tRNA modification. It is composed of two subcomplexes, Elp1-3 and Elp4-6. Elp4-6 forms a heterohexameric RecA-like ring structure, although they lack the key sequence signatures of ATPases. — an NCBI CDD conserved domain (cd19496); members share this curated model.
