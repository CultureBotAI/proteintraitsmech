identifier: CDD:cd16615
label: "RING finger, HC subclass, found in zinc finger protein 598 (ZNF598) and similar proteins. ZNF598 associates with eukaryotic initiation factor 4E (eIF4E) homologous protein from mammals (m4EHP) by binding to Grb10-interacting GYF protein 2 (GIGYF2). The m4EHP-GIGYF2 complex functions as a translational repressor and is essential for normal embryonic development of mammalian. ZNF598 harbors a C3HC4-type RING-HC finger at its N-terminus."
definition: >-
  RING finger, HC subclass, found in zinc finger protein 598 (ZNF598) and similar proteins. ZNF598 associates with eukaryotic initiation factor 4E (eIF4E) homologous protein from mammals (m4EHP) by binding to Grb10-interacting GYF protein 2 (GIGYF2). The m4EHP-GIGYF2 complex functions as a translational repressor and is essential for normal embryonic development of mammalian. ZNF598 harbors a C3HC4-type RING-HC finger at its N-terminus. — an NCBI CDD conserved domain (cd16615); members share this curated model.
