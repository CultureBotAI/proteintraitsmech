identifier: CDD:cd22493
label: "second type I K homology (KH) RNA-binding domain found in insulin-like growth factor 2 mRNA-binding protein 1 (IGF2BP1) and similar proteins. IGF2BP1, also called IGF2 mRNA-binding protein 1 (IMP-1), or coding region determinant-binding protein (CRD-BP), or IGF-II mRNA-binding protein 1, or VICKZ family member 1 (VICKZ1), or zipcode-binding protein 1 (ZBP-1), is an RNA-binding factor that recruits target transcripts to cytoplasmic protein-RNA complexes (mRNPs). It functions by binding to the 5' UTR of the insulin-like growth factor 2 (IGF2) mRNA and regulating IGF2 translation. It regulates localized beta-actin/ACTB mRNA translation, a crucial process for cell polarity, cell migration and neurite outgrowth. IGF2BP1 can form homodimers and heterodimers with IGF2BP1 and IGF2BP3. It contains four K-homology (KH) RNA-binding domains which are important in RNA binding and are known to be involved in RNA synthesis and metabolism. The model corresponds to the second one."
definition: >-
  second type I K homology (KH) RNA-binding domain found in insulin-like growth factor 2 mRNA-binding protein 1 (IGF2BP1) and similar proteins. IGF2BP1, also called IGF2 mRNA-binding protein 1 (IMP-1), or coding region determinant-binding protein (CRD-BP), or IGF-II mRNA-binding protein 1, or VICKZ family member 1 (VICKZ1), or zipcode-binding protein 1 (ZBP-1), is an RNA-binding factor that recruits target transcripts to cytoplasmic protein-RNA complexes (mRNPs). It functions by binding to the 5' UTR of the insulin-like growth factor 2 (IGF2) mRNA and regulating IGF2 translation. It regulates localized beta-actin/ACTB mRNA translation, a crucial process for cell polarity, cell migration and neurite outgrowth. IGF2BP1 can form homodimers and heterodimers with IGF2BP1 and IGF2BP3. It contains four K-homology (KH) RNA-binding domains which are important in RNA binding and are known to be involved in RNA synthesis and metabolism. The model corresponds to the second one. — an NCBI CDD conserved domain (cd22493); members share this curated model.
