identifier: CDD:cd19176
label: "SET domain found in SET domain-containing protein 3 (SETD3) and similar proteins. SETD3 (EC 2.1.1.43) is a histone-lysine N-methyltransferase that methylates 'Lys-4' and 'Lys-36' of histone H3 (H3K4me and H3K36me). It functions as a transcriptional activator that plays an important role in the transcriptional regulation of muscle cell differentiation via interaction with MYOD1."
definition: >-
  SET domain found in SET domain-containing protein 3 (SETD3) and similar proteins. SETD3 (EC 2.1.1.43) is a histone-lysine N-methyltransferase that methylates 'Lys-4' and 'Lys-36' of histone H3 (H3K4me and H3K36me). It functions as a transcriptional activator that plays an important role in the transcriptional regulation of muscle cell differentiation via interaction with MYOD1. — an NCBI CDD conserved domain (cd19176); members share this curated model.
