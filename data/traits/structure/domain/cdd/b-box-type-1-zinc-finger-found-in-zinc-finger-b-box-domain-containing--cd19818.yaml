identifier: CDD:cd19818
label: "B-box-type 1 zinc finger found in zinc finger B-box domain-containing protein 1 (ZBBX) and similar proteins. The family corresponds to a group of uncharacterized zinc finger B-box domain-containing proteins. The B-box motif shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif."
definition: >-
  B-box-type 1 zinc finger found in zinc finger B-box domain-containing protein 1 (ZBBX) and similar proteins. The family corresponds to a group of uncharacterized zinc finger B-box domain-containing proteins. The B-box motif shows high sequence similarity with B-Box-type 1 zinc finger found in tripartite motif-containing proteins (TRIMs). The type 1 B-box (Bbox1) zinc finger is characterized by a C6H2 zinc-binding consensus motif. — an NCBI CDD conserved domain (cd19818); members share this curated model.
