identifier: CDD:cd24064
label: "nucleotide-binding domain (NBD) of Thermotoga maritima glucokinase (GLK) and similar proteins. Glucokinase (EC 2.7.1.2), also called glucose kinase, acts as an ATP-dependent kinase that phosphorylates glucose using ATP as a donor to give glucose-6-phosphate and ADP. It is highly specific for glucose. Glucokinases are found in invertebrates and microorganisms. They belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities."
definition: >-
  nucleotide-binding domain (NBD) of Thermotoga maritima glucokinase (GLK) and similar proteins. Glucokinase (EC 2.7.1.2), also called glucose kinase, acts as an ATP-dependent kinase that phosphorylates glucose using ATP as a donor to give glucose-6-phosphate and ADP. It is highly specific for glucose. Glucokinases are found in invertebrates and microorganisms. They belong to the kinase (ROK) family, a group of proteins that have sugar kinase and/or transcriptional repressor activities. — an NCBI CDD conserved domain (cd24064); members share this curated model.
