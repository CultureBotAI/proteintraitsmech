identifier: CDD:cd16668
label: "RING finger, H2 subclass, found in RING finger proteins, RNF130, RNF149, RNF150 and similar proteins. This subfamily includes RING finger proteins, RNF130, RNF149 and RNF150, which belong to a larger PA-TM-RING ubiquitin ligase family that has been characterized by an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C-terminal C3H2C3-type RING-H2 finger domain followed by a putative PEST sequence. RNF130, also known as Goliath homolog (H-Goliath), is a paralog of RNF128. It is a transmembrane E3 ubiquitin-protein ligase expressed in leukocytes. It has a self-ubiquitination property and controls the development of T cell clonal anergy by ubiquitination. RNF133 is a testis-specific endoplasmic reticulum-associated E3 ubiquitin ligase that may play a role in sperm maturation through an ER-associated degradation (ERAD) pathway. RNF149, also known as DNA polymerase-transactivated protein 2, is an E3 ubiquitin-protein ligase that induces the ubiquitination of wild-type v-Raf murine sarcoma viral oncogene homolog B1 (BRAF) and promotes its proteasome-dependent degradation. RNF150 polymorphisms may be associated with chronic obstructive pulmonary disease (COPD) risk in the Chinese population. This subfamily also includes Drosophila melanogaster protein goliath (d-goliath), also known as protein g1, which is one of the founding members of the group. It was originally identified as a transcription factor involved in the embryo mesoderm formation."
definition: >-
  RING finger, H2 subclass, found in RING finger proteins, RNF130, RNF149, RNF150 and similar proteins. This subfamily includes RING finger proteins, RNF130, RNF149 and RNF150, which belong to a larger PA-TM-RING ubiquitin ligase family that has been characterized by an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C-terminal C3H2C3-type RING-H2 finger domain followed by a putative PEST sequence. RNF130, also known as Goliath homolog (H-Goliath), is a paralog of RNF128. It is a transmembrane E3 ubiquitin-protein ligase expressed in leukocytes. It has a self-ubiquitination property and controls the development of T cell clonal anergy by ubiquitination. RNF133 is a testis-specific endoplasmic reticulum-associated E3 ubiquitin ligase that may play a role in sperm maturation through an ER-associated degradation (ERAD) pathway. RNF149, also known as DNA polymerase-transactivated protein 2, is an E3 ubiquitin-protein ligase that induces the ubiquitination of wild-type v-Raf murine sarcoma viral oncogene homolog B1 (BRAF) and promotes its proteasome-dependent degradation. RNF150 polymorphisms may be associated with chronic obstructive pulmonary disease (COPD) risk in the Chinese population. This subfamily also includes Drosophila melanogaster protein goliath (d-goliath), also known as protein g1, which is one of the founding members of the group. It was originally identified as a transcription factor involved in the embryo mesoderm formation. — an NCBI CDD conserved domain (cd16668); members share this curated model.
