identifier: CDD:cd11627
label: "Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Schizosaccharomyces pombe Ste20-like proteins. This group is composed of predominantly uncharacterized fungal proteins, which contain two known domains: HR1 at the N-terminal region and REM (Ras exchanger motif) at the C-terminal region. One member protein from Schizosaccharomyces pombe is named Ste16 while its gene is called ste20 (a target of rapamycin complex 2 subunit). It is a subunit in the protein kinase TOR complexes in fission yeast. The REM domain is usually found in nucleotide exchange factors for Ras-like small GTPases. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family."
definition: >-
  Protein kinase C-related kinase homology region 1 (HR1) Rho-binding domain of Schizosaccharomyces pombe Ste20-like proteins. This group is composed of predominantly uncharacterized fungal proteins, which contain two known domains: HR1 at the N-terminal region and REM (Ras exchanger motif) at the C-terminal region. One member protein from Schizosaccharomyces pombe is named Ste16 while its gene is called ste20 (a target of rapamycin complex 2 subunit). It is a subunit in the protein kinase TOR complexes in fission yeast. The REM domain is usually found in nucleotide exchange factors for Ras-like small GTPases. HR1 domains are anti-parallel coiled-coil (ACC) domains that bind small GTPases from the Rho family. — an NCBI CDD conserved domain (cd11627); members share this curated model.
