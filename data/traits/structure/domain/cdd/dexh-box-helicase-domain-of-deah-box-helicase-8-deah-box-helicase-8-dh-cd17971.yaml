identifier: CDD:cd17971
label: "DEXH-box helicase domain of DEAH-box helicase 8. DEAH-box helicase 8 (DHX8 ,also known as pre-mRNA-splicing factor ATP-dependent RNA helicase PRP22) acts late in the splicing of pre-mRNA and mediates the release of the spliced mRNA from spliceosomes. DHX8 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAH-box helicase 8. DEAH-box helicase 8 (DHX8 ,also known as pre-mRNA-splicing factor ATP-dependent RNA helicase PRP22) acts late in the splicing of pre-mRNA and mediates the release of the spliced mRNA from spliceosomes. DHX8 belongs to the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17971); members share this curated model.
