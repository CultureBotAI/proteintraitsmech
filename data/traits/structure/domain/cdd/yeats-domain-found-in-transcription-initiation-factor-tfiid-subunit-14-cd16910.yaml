identifier: CDD:cd16910
label: "YEATS domain found in transcription initiation factor TFIID subunit 14 and similar proteins. YEATS domain containing proteins, which include Transcription initiation factor TFIID subunits 14 and 14b of Arabidopsis, shown to be part of the TFIID general transcriptional regulator complex in a two-hybrid screen.  DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones.   The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein."
definition: >-
  YEATS domain found in transcription initiation factor TFIID subunit 14 and similar proteins. YEATS domain containing proteins, which include Transcription initiation factor TFIID subunits 14 and 14b of Arabidopsis, shown to be part of the TFIID general transcriptional regulator complex in a two-hybrid screen. DNA regulation by chromatin thru histone post-translational modification and other mechanism involves complexes with write, eraser and reader functions. YEATS domains act as readers of the chromatin state, and stimulate transcriptional activity, thru preferential interactions with crotonylated lysines on histones. The YEATS family is named for several family members: 'YNK7', 'ENL', 'AF-9', and 'TFIIF small subunit', and also contains the GAS41 protein. — an NCBI CDD conserved domain (cd16910); members share this curated model.
