identifier: CDD:cd18990
label: "gamma-aminobutyric acid receptor extracellular domain. This family contains extracellular domain (ECD) of type-A gamma-aminobutyric acid receptor (GABAAR), a member of the pentameric \"Cys-loop\" superfamily of transmitter-gated ion channels. This family includes 19 isoforms in human; six alpha, 3 beta, 3 gamma, one of delta, epsilon, pi, and theta, known to form heteropentameric GABAARs, and 3 rho subunits that only form homopentameric channels (also known as GABAA rho or GABAC receptor) or pseudoheteromeric if consisting of different rho subunits. The majority of GABAA receptor pentamers contain two alpha subunits, two beta subunits, and a gamma subunit, with different isoforms affecting potency of the neurotransmitter. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to its site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. Benzodiazepine and barbiturates each bind to their own distinct sites on the ECD. The channels have to contain the gamma subunit and alpha subunits in order to respond to benzodiazepines. Specific combinations of alpha, beta, and gamma subunits exhibit ethanol sensitivity. All these major classes of drugs favor channel-opening. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy."
definition: >-
  gamma-aminobutyric acid receptor extracellular domain. This family contains extracellular domain (ECD) of type-A gamma-aminobutyric acid receptor (GABAAR), a member of the pentameric "Cys-loop" superfamily of transmitter-gated ion channels. This family includes 19 isoforms in human; six alpha, 3 beta, 3 gamma, one of delta, epsilon, pi, and theta, known to form heteropentameric GABAARs, and 3 rho subunits that only form homopentameric channels (also known as GABAA rho or GABAC receptor) or pseudoheteromeric if consisting of different rho subunits. The majority of GABAA receptor pentamers contain two alpha subunits, two beta subunits, and a gamma subunit, with different isoforms affecting potency of the neurotransmitter. GABAAR is an anionic channel, mediating fast inhibitory synaptic transmission. Upon gamma-aminobutyric acid (GABA) binding to its site on the ECD, Cl- ions are selectively conducted through the GABAAR pore, resulting in hyperpolarization of the neuron. GABAAR is the principal mediator of rapid inhibitory synaptic transmission in the human brain. Benzodiazepine and barbiturates each bind to their own distinct sites on the ECD. The channels have to contain the gamma subunit and alpha subunits in order to respond to benzodiazepines. Specific combinations of alpha, beta, and gamma subunits exhibit ethanol sensitivity. All these major classes of drugs favor channel-opening. A decline in GABAAR signaling triggers hyperactive neurological disorders such as insomnia, anxiety, and epilepsy. — an NCBI CDD conserved domain (cd18990); members share this curated model.
