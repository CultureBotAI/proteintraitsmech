identifier: CDD:cd17499
label: "Type I restriction-modification system specificity (S) subunit Target Recognition Domain-ConseRved domain (TRD-CR), similar to Cecembia lonarensis LW9 S subunit (S.CloLW9ORF3270P) TRD1-CR1 and Bacillus licheniformis 9945A S subunit (S.Bli9945ORF10320P) TRD1-CR1. The recognition sequences for Cecembia lonarensis LW9 S subunit (S.CloLW9ORF3270P) and Bacillus licheniformis 9945A S subunit (S.Bli9945ORF10320P) are undetermined. The restriction-modification (RM) system S subunit consists of two variable target recognition domains (TRD1 and 2) and two conserved regions (CR1 and CR2) which separate the TRDs. The TRDs each bind to different specific sequences in the DNA. RM systems protect a bacterial cell against invasion of foreign DNA by endonucleolytic cleavage of DNA that lacks a site specific modification. The host genome is protected from cleavage by methylation of specific nucleotides in the target sites. In type I systems, both restriction and modification activities are present in one enzyme complex composed of one DNA specificity (S) subunit (this family), two modification (M) subunits and two restriction (R) subunits. This model contains both TRD1-CR1 and TRD2-CR2. This subfamily of TRD-CR's shows similarity to TRD1-CR1 of Aminobacterium colombiense DSM 12261 S subunit (S.Aco12261I), which recognizes 5'... GCANNNNNNTGT ... 3'. This subfamily also includes TRD-CR-like sequence-recognition domains of various type II restriction enzymes and methyltransferases such as Helicobacter bizzozeronii CIII-1 putative Type IIG restriction enzyme/N6-adenine DNA methyltransferase RM.HbiCORF8670P, and may also contain type I DNA methyltransferases."
definition: >-
