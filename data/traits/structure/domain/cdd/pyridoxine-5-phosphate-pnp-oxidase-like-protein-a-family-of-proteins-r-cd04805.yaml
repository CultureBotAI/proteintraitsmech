identifier: CDD:cd04805
label: "Pyridoxine 5'-phosphate (PNP) oxidase-like protein. A family of proteins relates to PNP oxidases and other flavin mononucleotide (FMN) binding proteins which catalyze FMN-mediated redox reactions. The electron is transferred from substrate to FMN and then pass along to another substrate. The specific function of this family is unknown."
definition: >-
  Pyridoxine 5'-phosphate (PNP) oxidase-like protein. A family of proteins relates to PNP oxidases and other flavin mononucleotide (FMN) binding proteins which catalyze FMN-mediated redox reactions. The electron is transferred from substrate to FMN and then pass along to another substrate. The specific function of this family is unknown. — an NCBI CDD conserved domain (cd04805); members share this curated model.
