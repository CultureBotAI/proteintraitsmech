identifier: CDD:cd14427
label: "UBA2 domain of UV excision repair protein RAD23 homolog A (HR23A) found in vertebrates. HR23A, also called Rad23A, is a DNA repair protein that binds to 19S subunit of the 26S proteasome and shuttles ubiquitinated proteins to the proteasome for degradation which is required for efficient nucleotide excision repair (NER), a primary mechanism for removing UV-induced DNA lesions. HR23A also plays a critical role in the interaction of HIV-1 viral protein R (Vpr) with proteasome, especially facilitating Vpr to promote protein poly-ubiquitination. HR23A contains an N-terminal ubiquitin-like (UBL) domain that binds proteasomes and two C-terminal ubiquitin-associated (UBA) domains that bind ubiquitin or multi-ubiquitinated substrates. In addition, it has a XPC protein-binding domain that might be necessary for its efficient NER function. This model corresponds to the UBA2 domain."
definition: >-
  UBA2 domain of UV excision repair protein RAD23 homolog A (HR23A) found in vertebrates. HR23A, also called Rad23A, is a DNA repair protein that binds to 19S subunit of the 26S proteasome and shuttles ubiquitinated proteins to the proteasome for degradation which is required for efficient nucleotide excision repair (NER), a primary mechanism for removing UV-induced DNA lesions. HR23A also plays a critical role in the interaction of HIV-1 viral protein R (Vpr) with proteasome, especially facilitating Vpr to promote protein poly-ubiquitination. HR23A contains an N-terminal ubiquitin-like (UBL) domain that binds proteasomes and two C-terminal ubiquitin-associated (UBA) domains that bind ubiquitin or multi-ubiquitinated substrates. In addition, it has a XPC protein-binding domain that might be necessary for its efficient NER function. This model corresponds to the UBA2 domain. — an NCBI CDD conserved domain (cd14427); members share this curated model.
