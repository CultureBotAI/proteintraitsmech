identifier: CDD:cd11812
label: "Src Homology 3 domain of Abelson helper integration site-1 (AHI-1). AHI-1, also called Jouberin, is expressed in high levels in the brain, gonad tissues, and skeletal muscle. It is an adaptor protein that interacts with the small GTPase Rab8a and regulates it distribution and function, affecting cilium formation and vesicle transport. Mutations in the AHI-1 gene can cause Joubert syndrome, a disorder characterized by brainstem malformations, cerebellar aplasia/hypoplasia, and retinal dystrophy. AHI-1 variation is also associated with susceptibility to schizophrenia and type 2 diabetes mellitus progression. AHI-1 contains WD40 and SH3 domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Abelson helper integration site-1 (AHI-1). AHI-1, also called Jouberin, is expressed in high levels in the brain, gonad tissues, and skeletal muscle. It is an adaptor protein that interacts with the small GTPase Rab8a and regulates it distribution and function, affecting cilium formation and vesicle transport. Mutations in the AHI-1 gene can cause Joubert syndrome, a disorder characterized by brainstem malformations, cerebellar aplasia/hypoplasia, and retinal dystrophy. AHI-1 variation is also associated with susceptibility to schizophrenia and type 2 diabetes mellitus progression. AHI-1 contains WD40 and SH3 domains. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11812); members share this curated model.
