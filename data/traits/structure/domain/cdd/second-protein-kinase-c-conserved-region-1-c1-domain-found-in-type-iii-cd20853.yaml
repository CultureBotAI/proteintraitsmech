identifier: CDD:cd20853
label: "second protein kinase C conserved region 1 (C1 domain) found in type III diacylglycerol kinase, DAG kinase epsilon, and similar proteins. Diacylglycerol (DAG) kinase (EC 2.7.1.107) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid. DAG kinase epsilon, also called diglyceride kinase epsilon (DGK-epsilon), is the only isoform classified as type III; it possesses a hydrophobic domain in addition to C1 and catalytic domains that are present in all DGKs, and shows selectivity for acyl chains. It is highly selective for arachidonate-containing species of DAG. It may terminate signals transmitted through arachidonoyl-DAG or may contribute to the synthesis of phospholipids with defined fatty acid composition. DAG kinase epsilon contains two copies of the C1 domain. This model corresponds to the second one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites."
definition: >-
  second protein kinase C conserved region 1 (C1 domain) found in type III diacylglycerol kinase, DAG kinase epsilon, and similar proteins. Diacylglycerol (DAG) kinase (EC 2.7.1.107) is a lipid kinase that phosphorylates diacylglycerol to form phosphatidic acid. DAG kinase epsilon, also called diglyceride kinase epsilon (DGK-epsilon), is the only isoform classified as type III; it possesses a hydrophobic domain in addition to C1 and catalytic domains that are present in all DGKs, and shows selectivity for acyl chains. It is highly selective for arachidonate-containing species of DAG. It may terminate signals transmitted through arachidonoyl-DAG or may contribute to the synthesis of phospholipids with defined fatty acid composition. DAG kinase epsilon contains two copies of the C1 domain. This model corresponds to the second one. The C1 domain is a cysteine-rich zinc binding domain that does not bind DNA nor possess structural similarity to conventional zinc finger domains; it contains two separate Zn(2+)-binding sites. — an NCBI CDD conserved domain (cd20853); members share this curated model.
