identifier: CDD:cd10923
label: "Putative NodB-like catalytic domain of uncharacterized proteins found in bacteria. This family corresponds to a group of uncharacterized bacterial proteins with high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily. Some family members contain an additional copper amine oxidase N-terminal domain."
definition: >-
  Putative NodB-like catalytic domain of uncharacterized proteins found in bacteria. This family corresponds to a group of uncharacterized bacterial proteins with high sequence similarity to the catalytic domain of the six-stranded barrel rhizobial NodB-like proteins, which remove N-linked or O-linked acetyl groups from cell wall polysaccharides and belong to the larger carbohydrate esterase 4 (CE4) superfamily. Some family members contain an additional copper amine oxidase N-terminal domain. — an NCBI CDD conserved domain (cd10923); members share this curated model.
