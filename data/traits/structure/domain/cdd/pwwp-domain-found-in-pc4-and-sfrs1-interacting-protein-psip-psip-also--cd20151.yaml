identifier: CDD:cd20151
label: "PWWP domain found in PC4 and SFRS1-interacting protein (PSIP). PSIP, also called CLL-associated antigen KW-7, dense fine speckles 70 kDa protein (DFS 70), lens epithelium-derived growth factor (LEDGF), or transcriptional coactivator p75/p52, acts as a transcriptional coactivator involved in neuroepithelial stem cell differentiation and neurogenesis. It contains a PWWP domain, which is necessary for DNA binding."
definition: >-
  PWWP domain found in PC4 and SFRS1-interacting protein (PSIP). PSIP, also called CLL-associated antigen KW-7, dense fine speckles 70 kDa protein (DFS 70), lens epithelium-derived growth factor (LEDGF), or transcriptional coactivator p75/p52, acts as a transcriptional coactivator involved in neuroepithelial stem cell differentiation and neurogenesis. It contains a PWWP domain, which is necessary for DNA binding. — an NCBI CDD conserved domain (cd20151); members share this curated model.
