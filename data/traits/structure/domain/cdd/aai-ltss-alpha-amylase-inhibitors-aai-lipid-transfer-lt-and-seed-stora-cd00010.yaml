identifier: CDD:cd00010
label: "AAI_LTSS: Alpha-Amylase Inhibitors (AAI), Lipid Transfer (LT) and Seed Storage (SS) Protein family; a protein family unique to higher plants that includes cereal-type alpha-amylase inhibitors, lipid transfer proteins, seed storage proteins, and similar proteins. Proteins in this family are known to play important roles, in defending plants from insects and pathogens, lipid transport between intracellular membranes, and nutrient storage. Many proteins of this family have been identified as allergens in humans. These proteins contain a common pattern of eight cysteines that form four disulfide bridges."
definition: >-
