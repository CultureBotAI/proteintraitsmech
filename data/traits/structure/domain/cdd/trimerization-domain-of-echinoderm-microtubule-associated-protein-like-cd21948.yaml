label: "trimerization domain of echinoderm microtubule-associated protein-like 2. Echinoderm microtubule-associated protein-like 2 (EMAP-2), also called EML2 or EMAPL2, is a tubulin binding protein that inhibits microtubule nucleation and growth, resulting in shorter microtubules. This model corresponds to the N-terminal trimerization domain of EMAP-2."
definition: >-
  trimerization domain of echinoderm microtubule-associated protein-like 2. Echinoderm microtubule-associated protein-like 2 (EMAP-2), also called EML2 or EMAPL2, is a tubulin binding protein that inhibits microtubule nucleation and growth, resulting in shorter microtubules. This model corresponds to the N-terminal trimerization domain of EMAP-2. — an NCBI CDD conserved domain (cd21948); members share this curated model.
