identifier: CDD:cd21674
label: "synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in PDZ domain-containing protein 8 (PDZD8) and similar proteins. PDZ domain-containing protein 8 (PDZD8), also called Sarcoma antigen NY-SAR-84/NY-SAR-104, is a molecular tethering protein that connects endoplasmic reticulum (ER) and mitochondria membranes. PDZD8-dependent endoplasmic reticulum-mitochondria membrane tethering is essential for ER-mitochondria Ca(2+) transfer. In neurons, PDZD8 is involved in the regulation of dendritic Ca(2+) dynamics by regulating mitochondrial Ca(2+) uptake in neurons. It plays an indirect role in the regulation of cell morphology and cytoskeletal organization. PDZD8 is also a novel Gag-interacting factor that promotes retroviral infection. It may act as a novel moesin-interacting cytoskeletal regulatory protein that suppresses infection by herpes simplex virus type 1 (HSV1). This model corresponds to the SMP domain of PDZD8, which may be implicated in lipid transport."
definition: >-
  synaptotagmin-like mitochondrial-lipid-binding protein (SMP) domain found in PDZ domain-containing protein 8 (PDZD8) and similar proteins. PDZ domain-containing protein 8 (PDZD8), also called Sarcoma antigen NY-SAR-84/NY-SAR-104, is a molecular tethering protein that connects endoplasmic reticulum (ER) and mitochondria membranes. PDZD8-dependent endoplasmic reticulum-mitochondria membrane tethering is essential for ER-mitochondria Ca(2+) transfer. In neurons, PDZD8 is involved in the regulation of dendritic Ca(2+) dynamics by regulating mitochondrial Ca(2+) uptake in neurons. It plays an indirect role in the regulation of cell morphology and cytoskeletal organization. PDZD8 is also a novel Gag-interacting factor that promotes retroviral infection. It may act as a novel moesin-interacting cytoskeletal regulatory protein that suppresses infection by herpes simplex virus type 1 (HSV1). This model corresponds to the SMP domain of PDZD8, which may be implicated in lipid transport. — an NCBI CDD conserved domain (cd21674); members share this curated model.
