identifier: CDD:cd19145
label: "AKR13D family of aldo-keto reductase (AKR). Rauvolfia serpentina PR is a founding member of aldo-keto reductase family 13 member D1 (AKR13D1). It catalyzes the NADPH-dependent reduction of the aldehyde perakine to yield the alcohol raucaffrinoline in the biosynthetic pathway of ajmaline in Rauvolfia, a key step in indole alkaloid biosynthesis. This family also includes Arabidopsis thaliana aldo-keto reductases, ALKR1-6."
definition: >-
  AKR13D family of aldo-keto reductase (AKR). Rauvolfia serpentina PR is a founding member of aldo-keto reductase family 13 member D1 (AKR13D1). It catalyzes the NADPH-dependent reduction of the aldehyde perakine to yield the alcohol raucaffrinoline in the biosynthetic pathway of ajmaline in Rauvolfia, a key step in indole alkaloid biosynthesis. This family also includes Arabidopsis thaliana aldo-keto reductases, ALKR1-6. — an NCBI CDD conserved domain (cd19145); members share this curated model.
