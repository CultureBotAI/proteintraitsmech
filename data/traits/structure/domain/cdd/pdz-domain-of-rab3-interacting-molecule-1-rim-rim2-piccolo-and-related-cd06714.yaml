identifier: CDD:cd06714
label: "PDZ domain of Rab3-interacting molecule 1 (RIM), RIM2, piccolo and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of RIM, RIM2, piccolo and related domains. RIM proteins and Gallus gallus protein piccolo (also called aczonin) are involved in neurotransmitter release at presynaptic active zones, the site of vesicle fusion. A protein complex containing RIM proteins positions synaptic vesicles containing synaptotagmin at the active zone. RIM proteins simultaneously activate docking and priming of synaptic vesicles and recruit Ca2+-channels to active zones, thereby connecting primed synaptic vesicles to Ca2+-channels. RIM binding to vesicular Rab proteins (Rab3 and Rab27 isoforms) mediates vesicle docking; RIM binding to Munc13 activates vesicle priming; RIM binding to the Ca2+-channel, both directly and indirectly via RIM-BP, recruits the Ca2+-channels. The RIM PDZ domain interacts with the C-termini of N- and P/Q-type voltage-gated Ca2+-channels. RIM1, RIM2 and piccolo also participate in regulated exocytosis through binding cAMP-GEFII (cAMP-binding protein-guanidine nucleotide exchange factor II). The piccolo PDZ domain binds cAMP-GEFII. RIM2 also plays a role in dendrite formation by melanocytes. Caenorhabditis elegans RIM (also known as unc-10) may be involved in the regulation of defecation and daumone response. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This RIM-like family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
