identifier: CDD:cd17949
label: "DEAD-box helicase domain of DEAD box protein 31. DDX31 (also called helicain or G2 helicase) plays a role in ribosome biogenesis and TP53/p53 regulation through its interaction with NPM1. DDX31 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region."
definition: >-
  DEAD-box helicase domain of DEAD box protein 31. DDX31 (also called helicain or G2 helicase) plays a role in ribosome biogenesis and TP53/p53 regulation through its interaction with NPM1. DDX31 is a member of the DEAD-box helicases, a diverse family of proteins involved in ATP-dependent RNA unwinding, needed in a variety of cellular processes including splicing, ribosome biogenesis and RNA degradation. The name derives from the sequence of the Walker B motif (motif II). This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17949); members share this curated model.
