identifier: CDD:cd19545
label: "Condensation domains of nonribosomal peptide synthetases (NRPSs) similar to the ester-bond forming Fusarium verticillioides FUM14 protein. Condensation (C) domains of nonribosomal peptide synthetases (NRPSs) typically catalyze peptide bond formation within (usually) large multi-modular enzymatic complexes. However, some C-domains have ester-bond forming activity. This subfamily includes Fusarium verticillioides FUM14 (also known as NRPS8), a bi-domain protein with an ester-bond forming NRPS C-domain, which catalyzes linkages between an aminoacyl/peptidyl-PCP donor and a hydroxyl-containing acceptor. C-domains typically have a conserved HHxxxD motif at the active site; mutations in this motif can abolish or diminish condensation activity. FUM14 has an altered active site motif DHTHCD instead of the typical HHxxxD motif seen in other subfamily members. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long (with various activities such as antibiotic, antifungal, antitumor and immunosuppression). There are various subtypes of C-domains such as the LCL-type which catalyzes peptide bond formation between two L-amino acids, the DCL-type which links an L-amino acid to the D-amino acid at the end of a growing peptide, starter C-domains which acylate the first amino acid with a beta-hydroxy carboxylic acid, and heterocyclization (Cyc) domains which catalyze both peptide bond formation and cyclization of Cys, Ser, or Thr residues. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a C-domain. NRPS modules may also include specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C (epimerization and condensation) domains, and the X-domain."
definition: >-
  Condensation domains of nonribosomal peptide synthetases (NRPSs) similar to the ester-bond forming Fusarium verticillioides FUM14 protein. Condensation (C) domains of nonribosomal peptide synthetases (NRPSs) typically catalyze peptide bond formation within (usually) large multi-modular enzymatic complexes. However, some C-domains have ester-bond forming activity. This subfamily includes Fusarium verticillioides FUM14 (also known as NRPS8), a bi-domain protein with an ester-bond forming NRPS C-domain, which catalyzes linkages between an aminoacyl/peptidyl-PCP donor and a hydroxyl-containing acceptor. C-domains typically have a conserved HHxxxD motif at the active site; mutations in this motif can abolish or diminish condensation activity. FUM14 has an altered active site motif DHTHCD instead of the typical HHxxxD motif seen in other subfamily members. NRPS can use a large variety of acyl monomers (approximately 500 different possible monomer substrates as opposed to the 20 standard amino acids in ribosomal protein synthesis) to construct bioactive secondary metabolites of 2 to 18 units long (with various activities such as antibiotic, antifungal, antitumor and immunosuppression). There are various subtypes of C-domains such as the LCL-type which catalyzes peptide bond formation between two L-amino acids, the DCL-type which links an L-amino acid to the D-amino acid at the end of a growing peptide, starter C-domains which acylate the first amino acid with a beta-hydroxy carboxylic acid, and heterocyclization (Cyc) domains which catalyze both peptide bond formation and cyclization of Cys, Ser, or Thr residues. Typically, an NRPS module consists of an adenylation domain, a peptidyl carrier protein (PCP) domain (also known as thiolation (T) domain) and a C-domain. NRPS modules may also include specialized domains such as the terminal-module thioesterase (Te) domain that releases the product via hydrolysis or macrocyclization and any of various C-domain family members such as the epimerization (E) domain, the ester-bond forming C-domain, dual E/C (epimerization and condensation) domains, and the X-domain. — an NCBI CDD conserved domain (cd19545); members share this curated model.
