identifier: CDD:cd14035
label: "Pseudokinase domain of MLF1-ADaptor Molecule-Like. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity and/or ATP binding. MADML has been shown to be expressed throughout development in Xenopus laevis with highest expression found in the developing lens and retina. It may play an important role in embryonic eye development. The MADML subfamily is part of a larger superfamily that includes the catalytic domains of serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Pseudokinase domain of MLF1-ADaptor Molecule-Like. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity and/or ATP binding. MADML has been shown to be expressed throughout development in Xenopus laevis with highest expression found in the developing lens and retina. It may play an important role in embryonic eye development. The MADML subfamily is part of a larger superfamily that includes the catalytic domains of serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14035); members share this curated model.
