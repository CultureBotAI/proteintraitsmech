identifier: CDD:cd06373
label: "Ligand binding domain of natriuretic peptide receptor (NPR) family. Ligand binding domain of natriuretic peptide receptor (NPR) family which consists of three different subtypes: type A natriuretic peptide receptor (NPR-A, or GC-A), type B natriuretic peptide receptors (NPR-B, or GC-B), and type C natriuretic peptide receptor (NPR-C). There are three types of natriuretic peptide (NP) ligands specific to the receptors: atrial NP (ANP), brain or B-type NP (BNP), and C-type NP (CNP). The NP family is thought to have arisen through gene duplication during evolution and plays an essential role in cardiovascular and body fluid homeostasis. ANP and BNP bind mainly to NPR-A, while CNP binds specifically to NPR-B. Both NPR-A and NPR-B have guanylyl cyclase catalytic activity and produces intracellular secondary messenger cGMP in response to peptide-ligand binding. Consequently, the NPR-A activation results in vasodilation and inhibition of vascular smooth muscle cell proliferation. NPR-C acts as the receptor for all the three members of NP family, and functions as a clearance receptor. Unlike NPR-A and -B, NPR-C lacks an intracellular guanylyl cyclase domain and is thought to exert biological actions by sequestration of released natriuretic peptides and/or inhibition of adenylyl cyclase."
