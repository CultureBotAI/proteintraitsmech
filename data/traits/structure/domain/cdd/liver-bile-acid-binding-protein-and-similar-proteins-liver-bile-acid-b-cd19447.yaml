identifier: CDD:cd19447
label: "liver bile acid-binding protein and similar proteins. Liver bile acid-binding protein (also known as \"fatty acid-binding protein, liver\", LB-FABP, L-BABP, L-FABP, FABP1) is present in the liver of the vertebrates fish, amphibians, reptiles, and birds but not in mammals. L-BABPs bind free fatty acids and their coenzyme A derivatives, bilirubin, and some other small molecules in the cytoplasm. The role of L-BABPs may be that of cellular and metabolic trafficking of bile acids; they may be involved in intracellular lipid transport. This subgroup belongs to the intracellular fatty acid-binding protein (FABP) family, members of which are small proteins that bind hydrophobic ligands in a non-covalent, reversible manner, and have been implicated in intracellular uptake, transport and storage of hydrophobic ligands, regulation of lipid metabolism and sequestration of excess toxic fatty acids, as well as in signaling, gene expression, inflammation, cell growth and proliferation, and cancer development."
