identifier: CDD:cd07000
label: "homogentisate 1,2-dioxygenase and related proteins, N-terminal cupin domain. This family includes homogentisate 1,2-dioxygenase (also known as homogentisate oxygenase, homogentisic acid oxidase, homogentisicase, HGO, HGD, HGDO, or HmgA; EC 1.13.11.5), which is involved in the metabolic degradation of phenylalanine and tyrosine. It catalyzes the crucial aromatic ring opening reaction, utilizing nonheme Fe2+ to incorporate both atoms of molecular oxygen into homogentisate (2,5-dihydroxyphenylacetate) to yield 4-maleylacetoacetate as part of the homogentisate pathway. HGO deficiency caused by critical mutations and polymorphic sites, causes the metabolic disease alkaptonuria (AKU), a rare disorder of autosomal recessive inheritance. Homogentisate accumulation causes insoluble ochronotic pigments to deposit in connective tissues, resulting in degenerative arthritis. These enzymes are found in prokaryotes, eukaryotes, and archaea. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  homogentisate 1,2-dioxygenase and related proteins, N-terminal cupin domain. This family includes homogentisate 1,2-dioxygenase (also known as homogentisate oxygenase, homogentisic acid oxidase, homogentisicase, HGO, HGD, HGDO, or HmgA; EC 1.13.11.5), which is involved in the metabolic degradation of phenylalanine and tyrosine. It catalyzes the crucial aromatic ring opening reaction, utilizing nonheme Fe2+ to incorporate both atoms of molecular oxygen into homogentisate (2,5-dihydroxyphenylacetate) to yield 4-maleylacetoacetate as part of the homogentisate pathway. HGO deficiency caused by critical mutations and polymorphic sites, causes the metabolic disease alkaptonuria (AKU), a rare disorder of autosomal recessive inheritance. Homogentisate accumulation causes insoluble ochronotic pigments to deposit in connective tissues, resulting in degenerative arthritis. These enzymes are found in prokaryotes, eukaryotes, and archaea. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd07000); members share this curated model.
