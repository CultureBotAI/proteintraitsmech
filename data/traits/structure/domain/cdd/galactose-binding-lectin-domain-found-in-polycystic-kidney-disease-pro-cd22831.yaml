identifier: CDD:cd22831
label: "galactose binding lectin domain found in polycystic kidney disease protein 1-like 2 (polycystin-1L2) and similar proteins. Polycystin-1L2 is a novel G-protein-coupled receptor that may function as an ion-channel regulator. This model corresponds to a galactose/rhamnose-binding lectin domain found at the N-terminal region of polycystin-1L2. Due to the lack of rhamnose-binding key residues, the galactose/rhamnose-binding domains of Polycystin-1L2 does not form a binding pocket for rhamnose. Therefore, Polycystin-1L2 is unlikely to act as a rhamnose-binding lectin."
definition: >-
  galactose binding lectin domain found in polycystic kidney disease protein 1-like 2 (polycystin-1L2) and similar proteins. Polycystin-1L2 is a novel G-protein-coupled receptor that may function as an ion-channel regulator. This model corresponds to a galactose/rhamnose-binding lectin domain found at the N-terminal region of polycystin-1L2. Due to the lack of rhamnose-binding key residues, the galactose/rhamnose-binding domains of Polycystin-1L2 does not form a binding pocket for rhamnose. Therefore, Polycystin-1L2 is unlikely to act as a rhamnose-binding lectin. — an NCBI CDD conserved domain (cd22831); members share this curated model.
