identifier: CDD:cd01846
label: "Fatty acyltransferase-like subfamily of the SGNH hydrolases, a diverse family of lipases and esterases. The tertiary fold of the enzyme is substantially different from that of the alpha/beta hydrolase family and unique among all known hydrolases; its active site closely resembles the Ser-His-Asp(Glu) triad found in other serine hydrolases. Might catalyze fatty acid transfer between phosphatidylcholine and sterols."
definition: >-
  Fatty acyltransferase-like subfamily of the SGNH hydrolases, a diverse family of lipases and esterases. The tertiary fold of the enzyme is substantially different from that of the alpha/beta hydrolase family and unique among all known hydrolases; its active site closely resembles the Ser-His-Asp(Glu) triad found in other serine hydrolases. Might catalyze fatty acid transfer between phosphatidylcholine and sterols. — an NCBI CDD conserved domain (cd01846); members share this curated model.
