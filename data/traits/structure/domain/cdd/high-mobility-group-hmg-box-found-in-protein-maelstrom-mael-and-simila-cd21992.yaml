identifier: CDD:cd21992
label: "high mobility group (HMG)-box found in protein maelstrom (MAEL) and similar proteins. MAEL is an RNA-binding protein that has evolved from an ancient nuclease active in protists. It plays a central role during spermatogenesis by repressing transposable elements and preventing their mobilization, which is essential for germline integrity. It acts via the piRNA metabolic process, which mediates the repression of transposable elements during meiosis by forming complexes composed of piRNAs and Piwi proteins and governs the methylation and subsequent repression of transposons."
definition: >-
  high mobility group (HMG)-box found in protein maelstrom (MAEL) and similar proteins. MAEL is an RNA-binding protein that has evolved from an ancient nuclease active in protists. It plays a central role during spermatogenesis by repressing transposable elements and preventing their mobilization, which is essential for germline integrity. It acts via the piRNA metabolic process, which mediates the repression of transposable elements during meiosis by forming complexes composed of piRNAs and Piwi proteins and governs the methylation and subsequent repression of transposons. — an NCBI CDD conserved domain (cd21992); members share this curated model.
