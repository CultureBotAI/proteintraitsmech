label: "conjugal transfer protein H and similar proteins. This subfamily consists of several TraH proteins, putative conjugal transfer proteins of uncharacterized function, apparently found only in alphaproteobacteria. They have similarity to lysozyme and preserve the critical glutamate residue which has catalytic activity in lysozyme-like proteins."
