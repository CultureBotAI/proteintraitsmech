identifier: CDD:cd14198
label: "The catalytic domain of the Serine/Threonine Kinase, Death-associated protein kinase-Related Apoptosis-inducing protein Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DRAKs were named based on their similarity (around 50% identity) to the kinase domain of DAPKs. They contain an N-terminal kinase domain and a C-terminal regulatory domain. Vertebrates contain two subfamily members, DRAK1 and DRAK2 (also called STK17B). Both DRAKs are localized to the nucleus, autophosphorylate themselves, and phosphorylate myosin light chain as a substrate. DRAK2 has been implicated in inducing or enhancing apoptosis in beta cells, fibroblasts, and lymphoid cells, where it is highly expressed. It is involved in regulating many immune processes including the germinal center (GC) reaction, responses to thymus-dependent antigens, activated T cell survival, memory T cell responses. It may be involved in the development  of autoimmunity. The DRAK2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  The catalytic domain of the Serine/Threonine Kinase, Death-associated protein kinase-Related Apoptosis-inducing protein Kinase 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. DRAKs were named based on their similarity (around 50% identity) to the kinase domain of DAPKs. They contain an N-terminal kinase domain and a C-terminal regulatory domain. Vertebrates contain two subfamily members, DRAK1 and DRAK2 (also called STK17B). Both DRAKs are localized to the nucleus, autophosphorylate themselves, and phosphorylate myosin light chain as a substrate. DRAK2 has been implicated in inducing or enhancing apoptosis in beta cells, fibroblasts, and lymphoid cells, where it is highly expressed. It is involved in regulating many immune processes including the germinal center (GC) reaction, responses to thymus-dependent antigens, activated T cell survival, memory T cell responses. It may be involved in the development of autoimmunity. The DRAK2 subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14198); members share this curated model.
