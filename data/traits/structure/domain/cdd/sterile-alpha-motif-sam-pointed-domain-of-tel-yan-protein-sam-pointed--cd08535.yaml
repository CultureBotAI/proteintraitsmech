identifier: CDD:cd08535
label: "Sterile alpha motif (SAM)/Pointed domain of Tel/Yan protein. SAM Pointed domain of Tel (Translocation, Ets, Leukemia)/Yan subfamily of ETS transcriptional repressors is a protein-protein interaction domain. SAM Pointed domains of this type of regulators can interact with each other, forming head-to-tail homodimers or homooligomers, and/or interact with SAM Pointed domains of another subfamily of ETS factors forming heterodimers. The oligomeric form is able to block transcription of target genes and is involved in MAPK signaling. They participate in regulation of different processes during embryoniv development including hematopoietic differentiation and eye development. Tel/Yan transcriptional factors are frequent targets of chromosomal translocations resulting in fusions of SAM domain with new neighboring genes. Such chimeric proteins were found in different tumors. Members of this subfamily are potential targets for cancer therapy."
definition: >-
  Sterile alpha motif (SAM)/Pointed domain of Tel/Yan protein. SAM Pointed domain of Tel (Translocation, Ets, Leukemia)/Yan subfamily of ETS transcriptional repressors is a protein-protein interaction domain. SAM Pointed domains of this type of regulators can interact with each other, forming head-to-tail homodimers or homooligomers, and/or interact with SAM Pointed domains of another subfamily of ETS factors forming heterodimers. The oligomeric form is able to block transcription of target genes and is involved in MAPK signaling. They participate in regulation of different processes during embryoniv development including hematopoietic differentiation and eye development. Tel/Yan transcriptional factors are frequent targets of chromosomal translocations resulting in fusions of SAM domain with new neighboring genes. Such chimeric proteins were found in different tumors. Members of this subfamily are potential targets for cancer therapy. — an NCBI CDD conserved domain (cd08535); members share this curated model.
