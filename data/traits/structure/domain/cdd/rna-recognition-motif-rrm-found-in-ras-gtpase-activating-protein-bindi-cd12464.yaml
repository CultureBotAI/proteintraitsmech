identifier: CDD:cd12464
label: "RNA recognition motif (RRM) found in ras GTPase-activating protein-binding protein 2 (G3BP2) and similar proteins. This subgroup corresponds to the RRM of G3BP2, also termed GAP SH3 domain-binding protein 2, a cytoplasmic protein that interacts with both IkappaBalpha and IkappaBalpha/NF-kappaB complexes, indicating that G3BP2 may play a role in the control of nucleocytoplasmic distribution of IkappaBalpha and cytoplasmic anchoring of the IkappaBalpha/NF-kappaB complex. G3BP2 contains an N-terminal nuclear transfer factor 2 (NTF2)-like domain, an acidic domain, a domain containing five PXXP motifs, an RNA recognition motif (RRM domain), and an Arg-Gly-rich region (RGG-rich region, or arginine methylation motif). It binds to the SH3 domain of RasGAP, a multi-functional protein controlling Ras activity, through its N-terminal NTF2-like domain. The acidic domain is sufficient for the interaction of G3BP2 with the IkappaBalpha cytoplasmic retention sequence. Furthermore, G3BP2 might influence stability or translational efficiency of particular mRNAs by binding to RNA-containing structures within the cytoplasm through its RNA-binding domain."
definition: >-
  RNA recognition motif (RRM) found in ras GTPase-activating protein-binding protein 2 (G3BP2) and similar proteins. This subgroup corresponds to the RRM of G3BP2, also termed GAP SH3 domain-binding protein 2, a cytoplasmic protein that interacts with both IkappaBalpha and IkappaBalpha/NF-kappaB complexes, indicating that G3BP2 may play a role in the control of nucleocytoplasmic distribution of IkappaBalpha and cytoplasmic anchoring of the IkappaBalpha/NF-kappaB complex. G3BP2 contains an N-terminal nuclear transfer factor 2 (NTF2)-like domain, an acidic domain, a domain containing five PXXP motifs, an RNA recognition motif (RRM domain), and an Arg-Gly-rich region (RGG-rich region, or arginine methylation motif). It binds to the SH3 domain of RasGAP, a multi-functional protein controlling Ras activity, through its N-terminal NTF2-like domain. The acidic domain is sufficient for the interaction of G3BP2 with the IkappaBalpha cytoplasmic retention sequence. Furthermore, G3BP2 might influence stability or translational efficiency of particular mRNAs by binding to RNA-containing structures within the cytoplasm through its RNA-binding domain. — an NCBI CDD conserved domain (cd12464); members share this curated model.
