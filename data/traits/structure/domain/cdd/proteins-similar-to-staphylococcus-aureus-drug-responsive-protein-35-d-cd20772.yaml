identifier: CDD:cd20772
label: "Proteins similar to Staphylococcus aureus drug-responsive protein 35 (DRP35). DRP35 is a bacterial calcium-dependent lactonase which is induced by antibiotics or detergents that affect the integrity of the cell wall. It is a member of a larger superfamily of enzymes related to the major royal jelly protein from honeybees, which share a six-bladed beta-propeller topology. It is not clear how the lactonase activity of DRP35 relates to its function in coping with stress. It may act as a counterpart of eukaryotic paraoxonoases and assist in the detoxification of compounds affecting the cell membrane. This family also includes diisopropylfluorophosphatase, a phosphotriesterase isolated from squid (Loligo vulgaris) head ganglion, which is capable of hydrolyzing (and detoxifying) organophosphate-based chemical warfare agents."
definition: >-
  Proteins similar to Staphylococcus aureus drug-responsive protein 35 (DRP35). DRP35 is a bacterial calcium-dependent lactonase which is induced by antibiotics or detergents that affect the integrity of the cell wall. It is a member of a larger superfamily of enzymes related to the major royal jelly protein from honeybees, which share a six-bladed beta-propeller topology. It is not clear how the lactonase activity of DRP35 relates to its function in coping with stress. It may act as a counterpart of eukaryotic paraoxonoases and assist in the detoxification of compounds affecting the cell membrane. This family also includes diisopropylfluorophosphatase, a phosphotriesterase isolated from squid (Loligo vulgaris) head ganglion, which is capable of hydrolyzing (and detoxifying) organophosphate-based chemical warfare agents. — an NCBI CDD conserved domain (cd20772); members share this curated model.
