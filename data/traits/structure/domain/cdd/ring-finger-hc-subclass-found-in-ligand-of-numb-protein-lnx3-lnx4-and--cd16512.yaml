identifier: CDD:cd16512
label: "RING finger, HC subclass, found in ligand of Numb protein LNX3, LNX4, and similar proteins. The ligand of Numb protein X (LNX) family, also known as PDZ and RING (PDZRN) family, includes LNX1-5, which can interact with Numb, a key regulator of neurogenesis and neuronal differentiation. LNX5 (also known as PDZK4, or PDZRN4L) shows high sequence homology to LNX3 and LNX4, but it lacks the RING domain. LNX1-4 proteins function as E3 ubiquitin ligases and have a unique domain architecture consisting of an N-terminal RING-HC finger for E3 ubiquitin ligase activity and either two or four PDZ domains necessary for the substrate-binding. This family corresponds to LNX3/LNX4-like proteins, which contains a C3HC4-type RING-HC finger and two PDZ domains."
definition: >-
  RING finger, HC subclass, found in ligand of Numb protein LNX3, LNX4, and similar proteins. The ligand of Numb protein X (LNX) family, also known as PDZ and RING (PDZRN) family, includes LNX1-5, which can interact with Numb, a key regulator of neurogenesis and neuronal differentiation. LNX5 (also known as PDZK4, or PDZRN4L) shows high sequence homology to LNX3 and LNX4, but it lacks the RING domain. LNX1-4 proteins function as E3 ubiquitin ligases and have a unique domain architecture consisting of an N-terminal RING-HC finger for E3 ubiquitin ligase activity and either two or four PDZ domains necessary for the substrate-binding. This family corresponds to LNX3/LNX4-like proteins, which contains a C3HC4-type RING-HC finger and two PDZ domains. — an NCBI CDD conserved domain (cd16512); members share this curated model.
