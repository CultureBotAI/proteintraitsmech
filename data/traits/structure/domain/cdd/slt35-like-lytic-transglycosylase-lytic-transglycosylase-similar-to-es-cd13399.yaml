identifier: CDD:cd13399
label: "Slt35-like lytic transglycosylase. Lytic transglycosylase similar to Escherichia coli lytic transglycosylase Slt35 and Pseudomonas aeruginosa Sltb1. Lytic transglycosylase (LT) catalyzes the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetyl-D-glucosamine (GlcNAc) as do \"goose-type\" lysozymes. However, in addition to this, they also make a new glycosidic bond with the C6 hydroxyl group of the same muramic acid residue. Proteins similar to this this family include the soluble and insoluble membrane-bound LTs in bacteria, the LTs in bacteriophage lambda, as well as the eukaryotic \"goose-type\" lysozymes (goose egg-white lysozyme; GEWL)."
definition: >-
  Slt35-like lytic transglycosylase. Lytic transglycosylase similar to Escherichia coli lytic transglycosylase Slt35 and Pseudomonas aeruginosa Sltb1. Lytic transglycosylase (LT) catalyzes the cleavage of the beta-1,4-glycosidic bond between N-acetylmuramic acid (MurNAc) and N-acetyl-D-glucosamine (GlcNAc) as do "goose-type" lysozymes. However, in addition to this, they also make a new glycosidic bond with the C6 hydroxyl group of the same muramic acid residue. Proteins similar to this this family include the soluble and insoluble membrane-bound LTs in bacteria, the LTs in bacteriophage lambda, as well as the eukaryotic "goose-type" lysozymes (goose egg-white lysozyme; GEWL). — an NCBI CDD conserved domain (cd13399); members share this curated model.
