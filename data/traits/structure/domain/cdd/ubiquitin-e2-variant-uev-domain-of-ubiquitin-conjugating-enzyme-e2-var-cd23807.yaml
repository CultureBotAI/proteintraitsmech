identifier: CDD:cd23807
label: "ubiquitin E2 variant (UEV) domain of ubiquitin-conjugating enzyme E2 variant 1, 2 and related proteins. The E2V subfamily includes mammalian ubiquitin-conjugating enzyme E2 variant 1 (UBE2V1/CROC1/UBE2V/UEV1) and variant 2 (UBE2V2/MMS2/UEV2), yeast ubiquitin-conjugating enzyme variant MMS2, plant ubiquitin-conjugating enzyme E2 variant 1A (UEV1A/MMZ1) and variant 1B (UEV1B/MMZ2), and similar proteins. They have no ubiquitin ligase activity on their own. UBE2V1 (also called UEV-1, CROC-1, or TRAF6-regulated IKK activator 1 beta Uev1A) and UBE2V2 (also called DDVit 1, enterocyte differentiation-associated factor 1 (EDAF-1), enterocyte differentiation-promoting factor 1 (EDPF-1), MMS2 homolog, or vitamin D3-inducible protein) form heterodimers with UBE2N, respectively. Saccharomyces cerevisiae UEV MMS2 has a role in the DNA error-free postreplication repair (PRR) pathway. It forms a heterodimer with UBC13. Arabidopsis thaliana UEV1A and UEV1A form heterodimers with UBC35 or UBC36. The heterodimers possess ubiquitin-conjugating enzyme (EC 2.3.2.23) activity, catalyzing the synthesis of non-canonical poly-ubiquitin chains that are linked through 'Lys-63'. This type of poly-ubiquitination does not lead to protein degradation by the proteasome. Members of this subfamily may mediate transcriptional activation of target genes and plays a role in the control of progress through the cell cycle and differentiation. UEVs are homologous to E2 ubiquitin ligases but lack the conserved cysteine residue required for catalytic activity."
definition: >-
  ubiquitin E2 variant (UEV) domain of ubiquitin-conjugating enzyme E2 variant 1, 2 and related proteins. The E2V subfamily includes mammalian ubiquitin-conjugating enzyme E2 variant 1 (UBE2V1/CROC1/UBE2V/UEV1) and variant 2 (UBE2V2/MMS2/UEV2), yeast ubiquitin-conjugating enzyme variant MMS2, plant ubiquitin-conjugating enzyme E2 variant 1A (UEV1A/MMZ1) and variant 1B (UEV1B/MMZ2), and similar proteins. They have no ubiquitin ligase activity on their own. UBE2V1 (also called UEV-1, CROC-1, or TRAF6-regulated IKK activator 1 beta Uev1A) and UBE2V2 (also called DDVit 1, enterocyte differentiation-associated factor 1 (EDAF-1), enterocyte differentiation-promoting factor 1 (EDPF-1), MMS2 homolog, or vitamin D3-inducible protein) form heterodimers with UBE2N, respectively. Saccharomyces cerevisiae UEV MMS2 has a role in the DNA error-free postreplication repair (PRR) pathway. It forms a heterodimer with UBC13. Arabidopsis thaliana UEV1A and UEV1A form heterodimers with UBC35 or UBC36. The heterodimers possess ubiquitin-conjugating enzyme (EC 2.3.2.23) activity, catalyzing the synthesis of non-canonical poly-ubiquitin chains that are linked through 'Lys-63'. This type of poly-ubiquitination does not lead to protein degradation by the proteasome. Members of this subfamily may mediate transcriptional activation of target genes and plays a role in the control of progress through the cell cycle and differentiation. UEVs are homologous to E2 ubiquitin ligases but lack the conserved cysteine residue required for catalytic activity. — an NCBI CDD conserved domain (cd23807); members share this curated model.
