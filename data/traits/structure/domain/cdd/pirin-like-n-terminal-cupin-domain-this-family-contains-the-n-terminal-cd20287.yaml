identifier: CDD:cd20287
label: "pirin-like, N-terminal cupin domain. This family contains the N-terminal cupin domain of pirin and pirin-like proteins, including Escherichia coli YhhW and YhaK. Pirin functions as both a transcriptional cofactor and an apoptosis-related protein in mammals and is involved in seed germination and seedling development in plants. Proteins in this family have two tandem cupin-like folds but the C-terminal cupin fold has diverged considerably and does not have a metal binding site. The exact functions of pirins are unknown but they have quercitinase activity in Escherichia coli and are thought to play important roles in transcription and apoptosis. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold."
definition: >-
  pirin-like, N-terminal cupin domain. This family contains the N-terminal cupin domain of pirin and pirin-like proteins, including Escherichia coli YhhW and YhaK. Pirin functions as both a transcriptional cofactor and an apoptosis-related protein in mammals and is involved in seed germination and seedling development in plants. Proteins in this family have two tandem cupin-like folds but the C-terminal cupin fold has diverged considerably and does not have a metal binding site. The exact functions of pirins are unknown but they have quercitinase activity in Escherichia coli and are thought to play important roles in transcription and apoptosis. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold. — an NCBI CDD conserved domain (cd20287); members share this curated model.
