identifier: CDD:cd17008
label: "VHS (Vps27/Hrs/STAM) domain of ADP-ribosylation factor-binding protein GGA3. ADP-ribosylation factor-binding protein GGA3 (Golgi-localized, Gamma-ear-containing, Arf-binding 3) regulates the trafficking and is required for the lysosomal degradation of BACE (beta-site APP-cleaving enzyme), the protease that initiates the production of beta-amyloid, which causes Alzheimer's disease. It also plays a key role in GABA (+) transmission, which is important in the regulation of anxiety-like behaviors. GGA3 is a member of the GGA subfamily, which is comprised of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins involved in membrane trafficking between the Trans-Golgi Network (TGN) and endosomes. The VHS domain has a superhelical structure similar to the structure of the ARM (Armadillo) repeats and is present at the N-termini of proteins. GGA proteins have a multidomain structure consisting of an N-terminal VHS domain linked by a short proline-rich linker to a GAT (GGA and TOM) domain, which is followed by a long flexible linker to the C-terminal appendage, GAE (Gamma-Adaptin Ear) domain. The VHS domain of GGA proteins binds to the acidic-cluster dileucine (DxxLL) motif found on the cytoplasmic tails of cargo proteins trafficked between the Trans-Golgi Network and the endosomal system."
definition: >-
  VHS (Vps27/Hrs/STAM) domain of ADP-ribosylation factor-binding protein GGA3. ADP-ribosylation factor-binding protein GGA3 (Golgi-localized, Gamma-ear-containing, Arf-binding 3) regulates the trafficking and is required for the lysosomal degradation of BACE (beta-site APP-cleaving enzyme), the protease that initiates the production of beta-amyloid, which causes Alzheimer's disease. It also plays a key role in GABA (+) transmission, which is important in the regulation of anxiety-like behaviors. GGA3 is a member of the GGA subfamily, which is comprised of ubiquitously expressed, monomeric, motif-binding cargo/clathrin adaptor proteins involved in membrane trafficking between the Trans-Golgi Network (TGN) and endosomes. The VHS domain has a superhelical structure similar to the structure of the ARM (Armadillo) repeats and is present at the N-termini of proteins. GGA proteins have a multidomain structure consisting of an N-terminal VHS domain linked by a short proline-rich linker to a GAT (GGA and TOM) domain, which is followed by a long flexible linker to the C-terminal appendage, GAE (Gamma-Adaptin Ear) domain. The VHS domain of GGA proteins binds to the acidic-cluster dileucine (DxxLL) motif found on the cytoplasmic tails of cargo proteins trafficked between the Trans-Golgi Network and the endosomal system. — an NCBI CDD conserved domain (cd17008); members share this curated model.
