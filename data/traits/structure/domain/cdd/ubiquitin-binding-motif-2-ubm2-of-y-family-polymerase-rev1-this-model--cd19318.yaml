identifier: CDD:cd19318
label: "Ubiquitin-Binding Motif 2 (UBM2) of Y-family polymerase Rev1. This model characterizes UBM2, the second ubiquitin-binding motif of Rev1, a DNA damage tolerance protein. Rev1 acts as a translesion synthesis (TLS) DNA polymerase and may also recruit other TLS polymerases to the site of DNA damage; in that process the UBMs are essential for Rev1 function, triggering TLS activation via recognition of ubiquitin moieties in PCNA, the proliferating cell nuclear antigen."
definition: >-
  Ubiquitin-Binding Motif 2 (UBM2) of Y-family polymerase Rev1. This model characterizes UBM2, the second ubiquitin-binding motif of Rev1, a DNA damage tolerance protein. Rev1 acts as a translesion synthesis (TLS) DNA polymerase and may also recruit other TLS polymerases to the site of DNA damage; in that process the UBMs are essential for Rev1 function, triggering TLS activation via recognition of ubiquitin moieties in PCNA, the proliferating cell nuclear antigen. — an NCBI CDD conserved domain (cd19318); members share this curated model.
