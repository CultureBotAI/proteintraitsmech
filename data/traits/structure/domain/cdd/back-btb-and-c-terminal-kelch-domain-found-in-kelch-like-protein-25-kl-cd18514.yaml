identifier: CDD:cd18514
label: "BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 25 (KLHL25). KLHL25, also called ectoderm-neural cortex protein 2 (ENC-2), is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex required for translational homeostasis. The BCR(KLHL25) ubiquitin ligase complex acts by mediating ubiquitination of hypophosphorylated EIF4EBP1 (4E-BP1)."
definition: >-
  BACK (BTB and C-terminal Kelch) domain found in Kelch-like protein 25 (KLHL25). KLHL25, also called ectoderm-neural cortex protein 2 (ENC-2), is a substrate-specific adaptor of a BCR (BTB-CUL3-RBX1) E3 ubiquitin ligase complex required for translational homeostasis. The BCR(KLHL25) ubiquitin ligase complex acts by mediating ubiquitination of hypophosphorylated EIF4EBP1 (4E-BP1). — an NCBI CDD conserved domain (cd18514); members share this curated model.
