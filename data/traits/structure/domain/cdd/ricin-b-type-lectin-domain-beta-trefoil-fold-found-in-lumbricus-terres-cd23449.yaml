identifier: CDD:cd23449
label: "ricin B-type lectin domain, beta-trefoil fold, found in Lumbricus terrestris 29-kDa galactose-binding lectin (EW29) and similar proteins. EW29 is a galactose-binding lectin from the earthworm Lumbricus terrestris. It contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The second ricin B-type lectin domain may harbor two sugar-binding pockets in subdomains alpha and gamma. EW29 uses these two sugar-binding sites for its function as a single domain-type hemagglutinin."
definition: >-
  ricin B-type lectin domain, beta-trefoil fold, found in Lumbricus terrestris 29-kDa galactose-binding lectin (EW29) and similar proteins. EW29 is a galactose-binding lectin from the earthworm Lumbricus terrestris. It contains two ricin B-type lectin domains with a beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. The second ricin B-type lectin domain may harbor two sugar-binding pockets in subdomains alpha and gamma. EW29 uses these two sugar-binding sites for its function as a single domain-type hemagglutinin. — an NCBI CDD conserved domain (cd23449); members share this curated model.
