identifier: CDD:cd16539
label: "RING finger, HC subclass, found in RING finger proteins RNF113A, RNF113B, and similar proteins. RNF113A, also known as zinc finger protein 183 (ZNF183), is an E3 ubiquitin-protein ligase that physically interacts with the E2 protein, UBE2U. A nonsense mutation in RNF113A is associated with an X-linked trichothiodystrophy (TTD). Its yeast ortholog Cwc24p is predicted to have a spliceosome function and acts in a complex with Cef1p to participate in pre-U3 snoRNA splicing, indirectly affecting pre-rRNA processing. It is also important for the U2 snRNP binding to primary transcripts and co-migrates with spliceosomes. Moreover, the ortholog of RNF113A in fruit flies may also act as a spliceosome and is hypothesized to be involved in splicing, namely within the central nervous system. The ortholog in Caenorhabditis elegans is involved in DNA repair of inter-strand crosslinks. RNF113B, also known as zinc finger protein 183-like 1, shows high sequence similarity with RNF113A. Both RNF113A and RNF113B contain a CCCH-type zinc finger, which is commonly found in RNA-binding proteins involved in splicing, and a C3HC4-type RING-HC finger, which is frequently found in E3 ubiquitin ligases."
definition: >-
  RING finger, HC subclass, found in RING finger proteins RNF113A, RNF113B, and similar proteins. RNF113A, also known as zinc finger protein 183 (ZNF183), is an E3 ubiquitin-protein ligase that physically interacts with the E2 protein, UBE2U. A nonsense mutation in RNF113A is associated with an X-linked trichothiodystrophy (TTD). Its yeast ortholog Cwc24p is predicted to have a spliceosome function and acts in a complex with Cef1p to participate in pre-U3 snoRNA splicing, indirectly affecting pre-rRNA processing. It is also important for the U2 snRNP binding to primary transcripts and co-migrates with spliceosomes. Moreover, the ortholog of RNF113A in fruit flies may also act as a spliceosome and is hypothesized to be involved in splicing, namely within the central nervous system. The ortholog in Caenorhabditis elegans is involved in DNA repair of inter-strand crosslinks. RNF113B, also known as zinc finger protein 183-like 1, shows high sequence similarity with RNF113A. Both RNF113A and RNF113B contain a CCCH-type zinc finger, which is commonly found in RNA-binding proteins involved in splicing, and a C3HC4-type RING-HC finger, which is frequently found in E3 ubiquitin ligases. — an NCBI CDD conserved domain (cd16539); members share this curated model.
