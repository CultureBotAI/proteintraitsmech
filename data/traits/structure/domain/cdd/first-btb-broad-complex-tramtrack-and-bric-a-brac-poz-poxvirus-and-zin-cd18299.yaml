identifier: CDD:cd18299
label: "first BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Rho-related BTB domain-containing proteins (RhoBTB). RhoBTB proteins constitute a subfamily of atypical members within the Rho family of small guanosine triphosphatases (GTPases), which is characterized by containing a GTPase domain (in most cases, non-functional) followed by a proline-rich region, tandem BTB domains, and a conserved C-terminal region. In vertebrates, the RhoBTB subfamily consists of 3 isoforms: RhoBTB1, RhoBTB2, and RhoBTB3. Orthologs are present in several other eukaryotes, such as Drosophila and Dictyostelium, but have been lost in plants and fungi. This model corresponds to the first BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  first BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Rho-related BTB domain-containing proteins (RhoBTB). RhoBTB proteins constitute a subfamily of atypical members within the Rho family of small guanosine triphosphatases (GTPases), which is characterized by containing a GTPase domain (in most cases, non-functional) followed by a proline-rich region, tandem BTB domains, and a conserved C-terminal region. In vertebrates, the RhoBTB subfamily consists of 3 isoforms: RhoBTB1, RhoBTB2, and RhoBTB3. Orthologs are present in several other eukaryotes, such as Drosophila and Dictyostelium, but have been lost in plants and fungi. This model corresponds to the first BTB domain. The BTB/POZ domain is a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18299); members share this curated model.
