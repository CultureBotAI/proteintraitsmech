identifier: CDD:cd22179
label: "F-box domain found in F-box/LRR-repeat protein 21 (FBXL21) and similar proteins. FBXL21, also called F-box and leucine-rich repeat protein 21, F-box and leucine-rich repeat protein 3B (FBXL3B), or F-box/LRR-repeat protein 3B, is the substrate-recognition component of the SCF(FBXL21) E3 ubiquitin ligase complex that mainly acts in the cytosol and mediates ubiquitination of CRY proteins (CRY1 and CRY2), leading to CRY protein stabilization, and thus, is involved in circadian rhythm function. It regulates the oscillation of the circadian clock through ubiquitination and stabilization of cryptochromes. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression."
definition: >-
  F-box domain found in F-box/LRR-repeat protein 21 (FBXL21) and similar proteins. FBXL21, also called F-box and leucine-rich repeat protein 21, F-box and leucine-rich repeat protein 3B (FBXL3B), or F-box/LRR-repeat protein 3B, is the substrate-recognition component of the SCF(FBXL21) E3 ubiquitin ligase complex that mainly acts in the cytosol and mediates ubiquitination of CRY proteins (CRY1 and CRY2), leading to CRY protein stabilization, and thus, is involved in circadian rhythm function. It regulates the oscillation of the circadian clock through ubiquitination and stabilization of cryptochromes. The F-box domain has a role in mediating protein-protein interactions in a variety of contexts, such as polyubiquitination, transcription elongation, centromere binding and translational repression. — an NCBI CDD conserved domain (cd22179); members share this curated model.
