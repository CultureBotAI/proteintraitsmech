identifier: CDD:cd24029
label: "nucleotide-binding domain (NBD) of Escherichia coli chaperone proteins DnaK, HscA, HscC and similar proteins. Escherichia coli DnaK, also called heat shock 70 kDa protein/HSP70, plays an essential role in the initiation of phage lambda DNA replication, where it acts in an ATP-dependent fashion with the DnaJ protein to release lambda O and P proteins from the preprimosomal complex. DnaK is also involved in chromosomal DNA replication, possibly through an analogous interaction with the DnaA protein. Moreover, DnaK participates actively in the response to hyperosmotic shock. Escherichia coli HscA, also called Hsc66, acts as a chaperone involved in the maturation of iron-sulfur cluster-containing proteins. It has a low intrinsic ATPase activity which is markedly stimulated by HscB. It is involved in the maturation of IscU. Escherichia coli HscC, also called Hsc62, or YbeW, may act as the chaperone. It has ATPase activity. It cannot be stimulated by DnaJ. The family also includes Saccharomyces cerevisiae stress-seventy subfamily C proteins, Ssc1p (also called import motor subunit, mitochondrial; endonuclease SceI 75 kDa subunit; mtHSP70; ENS1; endonuclease SceI 75 kDa subunit) and Ssc3p (also called extracellular mutant protein 10/Ecm10), and Saccharomyces cerevisiae Stress-seventy subfamily Q protein 1/Ssq1p (also called Ssc2p; Ssh1p; mtHSP70 homolog). They all belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly, and can direct incompetent \"client\" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. Hsp70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs); for Escherichia coli DnaK, these are the DnaJ and GrpE, respectively."
definition: >-
  nucleotide-binding domain (NBD) of Escherichia coli chaperone proteins DnaK, HscA, HscC and similar proteins. Escherichia coli DnaK, also called heat shock 70 kDa protein/HSP70, plays an essential role in the initiation of phage lambda DNA replication, where it acts in an ATP-dependent fashion with the DnaJ protein to release lambda O and P proteins from the preprimosomal complex. DnaK is also involved in chromosomal DNA replication, possibly through an analogous interaction with the DnaA protein. Moreover, DnaK participates actively in the response to hyperosmotic shock. Escherichia coli HscA, also called Hsc66, acts as a chaperone involved in the maturation of iron-sulfur cluster-containing proteins. It has a low intrinsic ATPase activity which is markedly stimulated by HscB. It is involved in the maturation of IscU. Escherichia coli HscC, also called Hsc62, or YbeW, may act as the chaperone. It has ATPase activity. It cannot be stimulated by DnaJ. The family also includes Saccharomyces cerevisiae stress-seventy subfamily C proteins, Ssc1p (also called import motor subunit, mitochondrial; endonuclease SceI 75 kDa subunit; mtHSP70; ENS1; endonuclease SceI 75 kDa subunit) and Ssc3p (also called extracellular mutant protein 10/Ecm10), and Saccharomyces cerevisiae Stress-seventy subfamily Q protein 1/Ssq1p (also called Ssc2p; Ssh1p; mtHSP70 homolog). They all belong to the heat shock protein 70 (HSP70) family of chaperones that assist in protein folding and assembly, and can direct incompetent "client" proteins towards degradation. Typically, HSP70s have a nucleotide-binding domain (NBD) and a substrate-binding domain (SBD). The nucleotide sits in a deep cleft formed between the two lobes of the NBD. The two subdomains of each lobe change conformation between ATP-bound, ADP-bound, and nucleotide-free states. ATP binding opens up the substrate-binding site; substrate-binding increases the rate of ATP hydrolysis. Hsp70 chaperone activity is regulated by various co-chaperones: J-domain proteins and nucleotide exchange factors (NEFs); for Escherichia coli DnaK, these are the DnaJ and GrpE, respectively. — an NCBI CDD conserved domain (cd24029); members share this curated model.
