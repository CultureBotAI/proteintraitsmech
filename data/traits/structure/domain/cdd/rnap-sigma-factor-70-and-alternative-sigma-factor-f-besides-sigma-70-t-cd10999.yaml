identifier: CDD:cd10999
label: "RNAP sigma factor 70 and alternative sigma factor F. Besides Sigma 70, this subfamily contains Sigma F (otherwise known as FliA) is an alternative sigma factor found in Streptomyces coelicolor along with its equivalent, Sigma 28. Sigma F is a flagellar sigma factor which is often found in complex with its respective anti-sigma factor, FlgM. Sigma F is responsible for initiating transcription in the RNAP holoenzyme of genes responsible for the creation of proteins related to formation of flagellar structures. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs."
definition: >-
  RNAP sigma factor 70 and alternative sigma factor F. Besides Sigma 70, this subfamily contains Sigma F (otherwise known as FliA) is an alternative sigma factor found in Streptomyces coelicolor along with its equivalent, Sigma 28. Sigma F is a flagellar sigma factor which is often found in complex with its respective anti-sigma factor, FlgM. Sigma F is responsible for initiating transcription in the RNAP holoenzyme of genes responsible for the creation of proteins related to formation of flagellar structures. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs. — an NCBI CDD conserved domain (cd10999); members share this curated model.
