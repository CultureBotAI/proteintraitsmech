identifier: CDD:cd07350
label: "The ligand binding domain of DAX1 protein, a nuclear receptor lacking DNA binding domain. The ligand binding domain of the DAX1 protein: DAX1 (dosage-sensitive sex reversal adrenal hypoplasia congenita critical region on chromosome X gene 1) is a nuclear receptor with a typical ligand binding domain, but lacks the   DNA binding domain. DAX1 plays an important role in the normal development of several hormone-producing tissues. Duplications of the region of the X chromosome containing DAX1 cause dosage sensitive sex reversal. DAX1 acts as a global repressor of many nuclear receptors, including SF-1, LRH-1, ERR, ER, AR and PR. DAX1 can form homodimer and heterodimerizes with its alternatively spliced isoform DAX1A and other nuclear receptors such as SHP, ERalpha and SF-1."
definition: >-
  The ligand binding domain of DAX1 protein, a nuclear receptor lacking DNA binding domain. The ligand binding domain of the DAX1 protein: DAX1 (dosage-sensitive sex reversal adrenal hypoplasia congenita critical region on chromosome X gene 1) is a nuclear receptor with a typical ligand binding domain, but lacks the DNA binding domain. DAX1 plays an important role in the normal development of several hormone-producing tissues. Duplications of the region of the X chromosome containing DAX1 cause dosage sensitive sex reversal. DAX1 acts as a global repressor of many nuclear receptors, including SF-1, LRH-1, ERR, ER, AR and PR. DAX1 can form homodimer and heterodimerizes with its alternatively spliced isoform DAX1A and other nuclear receptors such as SHP, ERalpha and SF-1. — an NCBI CDD conserved domain (cd07350); members share this curated model.
