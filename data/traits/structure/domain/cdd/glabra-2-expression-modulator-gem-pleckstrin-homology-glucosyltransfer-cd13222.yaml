identifier: CDD:cd13222
label: "GLABRA 2 expression modulator (GEM) Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain. GEM interacts with CDT1, a pre-replication complex component that is involved in DNA replication, and with TTG1 (Transparent Testa GLABRA 1), a transcriptional regulator of epidermal cell fate. GEM controls the level of histone H3K9 methylation at the promoters of the GLABRA 2 and CAPRICE (CPC) genes, which are essential for epidermis patterning. GEM also regulates cell division in different root cell types. GEM regulates proliferation-differentiation decisions by integrating DNA replication, cell division and transcriptional controls. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold."
definition: >-
  GLABRA 2 expression modulator (GEM) Pleckstrin Homology-Glucosyltransferases, Rab-like GTPase activators and Myotubularins (PH-GRAM) domain. GEM interacts with CDT1, a pre-replication complex component that is involved in DNA replication, and with TTG1 (Transparent Testa GLABRA 1), a transcriptional regulator of epidermal cell fate. GEM controls the level of histone H3K9 methylation at the promoters of the GLABRA 2 and CAPRICE (CPC) genes, which are essential for epidermis patterning. GEM also regulates cell division in different root cell types. GEM regulates proliferation-differentiation decisions by integrating DNA replication, cell division and transcriptional controls. The GRAM domain is found in glucosyltransferases, myotubularins and other putative membrane-associated proteins. The GRAM domain is part of a larger motif with a pleckstrin homology (PH) domain fold. — an NCBI CDD conserved domain (cd13222); members share this curated model.
