identifier: CDD:cd00990
label: "circularly permuted PDZ domain of Arabidopsis thaliana DEGP1, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Arabidopsis thaliana DEGP1 (also known as protease Do-like 1, chloroplastic, protein DEGRADATION OF PERIPLASMIC PROTEINS 1, DEGP PROTEASE 1 and DEG1), and related domains. DEGP1 is a serine protease that is required at high temperature and may be involved in the degradation of damaged proteins. This family also includes Arabidopsis protease DEGP8/Do-like 8 (chloroplastic), a probable serine protease. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E,  alpha-helix 2 and beta-strand F. This AtDEGP-like PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus."
definition: >-
  circularly permuted PDZ domain of Arabidopsis thaliana DEGP1, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Arabidopsis thaliana DEGP1 (also known as protease Do-like 1, chloroplastic, protein DEGRADATION OF PERIPLASMIC PROTEINS 1, DEGP PROTEASE 1 and DEG1), and related domains. DEGP1 is a serine protease that is required at high temperature and may be involved in the degradation of damaged proteins. This family also includes Arabidopsis protease DEGP8/Do-like 8 (chloroplastic), a probable serine protease. PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains and as well as those with circular permutations and domain swapping of beta-strands. The canonical PDZ domain contains six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2); arranged as A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F. This AtDEGP-like PDZ domain is a circularly permuted PDZ domain which places beta-strand A on the C-terminus. Another permutation exists in the PDZ superfamily which places both beta-strands A and B on the C-terminus. — an NCBI CDD conserved domain (cd00990); members share this curated model.
