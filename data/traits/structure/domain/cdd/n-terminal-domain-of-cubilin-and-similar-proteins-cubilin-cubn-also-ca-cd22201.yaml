identifier: CDD:cd22201
label: "N-terminal domain of cubilin and similar proteins. Cubilin (CUBN, also called 460 kDa receptor, intestinal intrinsic factor receptor, intrinsic factor-cobalamin receptor, or intrinsic factor-vitamin B12 receptor) is an endocytic receptor which plays a role in lipoprotein, vitamin and iron metabolism by facilitating their uptake. It acts together with the 45-kDa transmembrane protein amnionless (AMN) to mediate endocytosis of the cobalamin (vitamin B12) binding intrinsic factor (CBLIF)-cobalamin complex. This model corresponds to the N-terminal domain of cubilin, which is responsible for the interaction with AMN. The cubilin interface with AMN is formed by the N-terminal strands of three cubilin chains."
definition: >-
  N-terminal domain of cubilin and similar proteins. Cubilin (CUBN, also called 460 kDa receptor, intestinal intrinsic factor receptor, intrinsic factor-cobalamin receptor, or intrinsic factor-vitamin B12 receptor) is an endocytic receptor which plays a role in lipoprotein, vitamin and iron metabolism by facilitating their uptake. It acts together with the 45-kDa transmembrane protein amnionless (AMN) to mediate endocytosis of the cobalamin (vitamin B12) binding intrinsic factor (CBLIF)-cobalamin complex. This model corresponds to the N-terminal domain of cubilin, which is responsible for the interaction with AMN. The cubilin interface with AMN is formed by the N-terminal strands of three cubilin chains. — an NCBI CDD conserved domain (cd22201); members share this curated model.
