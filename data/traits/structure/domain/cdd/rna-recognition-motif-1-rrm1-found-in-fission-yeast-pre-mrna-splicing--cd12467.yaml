identifier: CDD:cd12467
label: "RNA recognition motif 1 (RRM1) found in fission yeast pre-mRNA-splicing factor Srp1p and similar proteins. This subgroup corresponds to the RRM domain in Srp1p encoded by gene srp1 from fission yeast Schizosaccharomyces pombe. It plays a role in the pre-mRNA splicing process, but not essential for growth. Srp1p is closely related to the SR protein family found in metazoa. It contains an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a glycine hinge and a RS domain in the middle, and a C-terminal domain. Some family members also contain another RRM domain."
definition: >-
  RNA recognition motif 1 (RRM1) found in fission yeast pre-mRNA-splicing factor Srp1p and similar proteins. This subgroup corresponds to the RRM domain in Srp1p encoded by gene srp1 from fission yeast Schizosaccharomyces pombe. It plays a role in the pre-mRNA splicing process, but not essential for growth. Srp1p is closely related to the SR protein family found in metazoa. It contains an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), a glycine hinge and a RS domain in the middle, and a C-terminal domain. Some family members also contain another RRM domain. — an NCBI CDD conserved domain (cd12467); members share this curated model.
