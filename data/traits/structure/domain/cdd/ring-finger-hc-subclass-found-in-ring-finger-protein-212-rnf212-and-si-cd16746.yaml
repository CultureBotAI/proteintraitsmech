identifier: CDD:cd16746
label: "RING finger, HC subclass, found in RING finger protein 212 (RNF212) and similar proteins. RNF212 is a dosage-sensitive regulator of crossing-over during mammalian meiosis. It plays a central role in designating crossover sites and coupling chromosome synapsis to the formation of crossover-specific recombination complexes. It also functions as an E3 ligase for SUMO modification. RNF212 contains an N-terminal C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in RING finger protein 212 (RNF212) and similar proteins. RNF212 is a dosage-sensitive regulator of crossing-over during mammalian meiosis. It plays a central role in designating crossover sites and coupling chromosome synapsis to the formation of crossover-specific recombination complexes. It also functions as an E3 ligase for SUMO modification. RNF212 contains an N-terminal C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd16746); members share this curated model.
