identifier: CDD:cd16003
label: "neuromedin-K receptor, member of the class A family of seven-transmembrane G protein-coupled receptors. The neuromedin-K receptor (NKR), also known as tachykinin receptor 3 (TACR3) or neurokinin B receptor or NK3R, is a G-protein coupled receptor that specifically binds to neurokinin B. The tachykinins (TKs) act as excitatory transmitters on neurons and cells in the gastrointestinal tract. The TKs are characterized by a common five-amino acid C-terminal sequence, Phe-X-Gly-Leu-Met-NH2, where X is a hydrophobic residue. The three major mammalian tachykinins are substance P (SP), neurokinin A (NKA), and neurokinin B (NKB). The physiological actions of tachykinins are mediated through three types of receptors: neurokinin receptor type 1 (NK1R), NK2R, and NK3R.  NK3R is activated by its high-affinity ligand, NKB, which is primarily involved in the central nervous system and plays a critical role in the regulation of gonadotropin hormone release and the onset of puberty."
definition: >-
