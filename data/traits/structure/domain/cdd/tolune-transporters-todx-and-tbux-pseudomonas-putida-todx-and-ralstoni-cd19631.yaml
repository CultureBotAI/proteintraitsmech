identifier: CDD:cd19631
label: "tolune transporters TodX and TbuX. Pseudomonas putida TodX and Ralstonia pickettii TbuX have been implicated in hydrocarbon transport and are part of a subfamily of the FadL fatty acid transporter family. The TodX and TbuX structures are 14-stranded beta-barrels with an N-terminal hatch domain,consisting of three short helices connected by short loops, blocking the barrel interior. A hydrophobic channel with bound detergent molecules extends from the extracellular surface and is contiguous with a passageway through the hatch domain, lined by both hydrophobic and polar or charged residues. Both are believed to transport hydrophobic substrates from the extracellular environment to the periplasm via a channel through the hatch domain."
definition: >-
  tolune transporters TodX and TbuX. Pseudomonas putida TodX and Ralstonia pickettii TbuX have been implicated in hydrocarbon transport and are part of a subfamily of the FadL fatty acid transporter family. The TodX and TbuX structures are 14-stranded beta-barrels with an N-terminal hatch domain,consisting of three short helices connected by short loops, blocking the barrel interior. A hydrophobic channel with bound detergent molecules extends from the extracellular surface and is contiguous with a passageway through the hatch domain, lined by both hydrophobic and polar or charged residues. Both are believed to transport hydrophobic substrates from the extracellular environment to the periplasm via a channel through the hatch domain. — an NCBI CDD conserved domain (cd19631); members share this curated model.
