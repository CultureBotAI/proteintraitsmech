identifier: CDD:cd16675
label: "RING finger, H2 subclass, found in RING finger protein 24 (RNF24) and similar proteins. RNF24 is an intrinsic membrane protein localized in the Golgi apparatus. It specifically interacts with the ankyrin-repeats domains (ARDs) of TRPC1, -3, -4, -5, -6, and -7, and affects TRPC intracellular trafficking without affecting their activity. RNF24 contains an N-terminal transmembrane domain and a C-terminal C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 24 (RNF24) and similar proteins. RNF24 is an intrinsic membrane protein localized in the Golgi apparatus. It specifically interacts with the ankyrin-repeats domains (ARDs) of TRPC1, -3, -4, -5, -6, and -7, and affects TRPC intracellular trafficking without affecting their activity. RNF24 contains an N-terminal transmembrane domain and a C-terminal C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd16675); members share this curated model.
