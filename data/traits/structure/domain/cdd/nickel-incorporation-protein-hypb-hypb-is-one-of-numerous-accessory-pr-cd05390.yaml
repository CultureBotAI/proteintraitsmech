identifier: CDD:cd05390
label: "nickel incorporation protein HypB. HypB is one of numerous accessory proteins required for the maturation of nickel-dependent hydrogenases, like carbon monoxide dehydrogenase or urease. HypB is a GTP-binding protein and has GTP hyrolase activity. It forms homodimer and is capable of binding two nickel ions and two zinc ions. The active site is located on the dimer interface. Energy from hydrolysis of GTP is used to insert nickels into hydrogenases."
definition: >-
  nickel incorporation protein HypB. HypB is one of numerous accessory proteins required for the maturation of nickel-dependent hydrogenases, like carbon monoxide dehydrogenase or urease. HypB is a GTP-binding protein and has GTP hyrolase activity. It forms homodimer and is capable of binding two nickel ions and two zinc ions. The active site is located on the dimer interface. Energy from hydrolysis of GTP is used to insert nickels into hydrogenases. — an NCBI CDD conserved domain (cd05390); members share this curated model.
