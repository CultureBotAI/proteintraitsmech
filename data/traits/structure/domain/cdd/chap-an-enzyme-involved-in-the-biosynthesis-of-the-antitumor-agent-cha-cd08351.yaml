identifier: CDD:cd08351
label: "ChaP, an enzyme involved in the biosynthesis of the antitumor agent chartreusin (cha), and similar proteins. ChaP is an enzyme involved in the biosynthesis of the potent antitumor agent chartreusin (cha). Cha is an aromatic polyketide glycoside produced by Streptomyces chartreusis. ChaP may play a role as a meta-cleavage dioxygenase in the oxidative rearrangement of the anthracyclic polyketide. ChaP belongs to a conserved domain superfamily that is found in a variety of structurally related metalloproteins, including the bleomycin resistance protein, glyoxalase I, and type I ring-cleaving dioxygenases."
definition: >-
