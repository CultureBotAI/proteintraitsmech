identifier: CDD:cd20279
label: "Mycoplasma genitalium adhesin P110 and similar proteins. P110 is a virulence factor essential for cytadherence in the human pathogen Mycoplasma genitalium, which binds eukaryotic cells by means of its transmembrane adhesion complex called the Nap. Nap consists of two heteromers, each consisting of proteins P110 and P140. The extracellular region of P110 binds to sialic acid receptors and interacts only with the neuraminic acid moiety of oligosaccharides. Structural and functional data suggests that Nap alternates between open and closed conformation to sustain a mechanism for motility and guarantee infectivity by attachment and release of M. genitalium to and from the host cell receptor. P110 and P140 are also immunodominant proteins and constitute the main target of host antibodies during infection. Thus, anti-adherence molecules, aimed at preventing the establishment of infection, are attractive potential antimicrobial drugs. This family also includes Mycoplasma pneumoniae Mgp-operon protein 3 (also called Mgp3 or ORF-3 protein)."
definition: >-
  Mycoplasma genitalium adhesin P110 and similar proteins. P110 is a virulence factor essential for cytadherence in the human pathogen Mycoplasma genitalium, which binds eukaryotic cells by means of its transmembrane adhesion complex called the Nap. Nap consists of two heteromers, each consisting of proteins P110 and P140. The extracellular region of P110 binds to sialic acid receptors and interacts only with the neuraminic acid moiety of oligosaccharides. Structural and functional data suggests that Nap alternates between open and closed conformation to sustain a mechanism for motility and guarantee infectivity by attachment and release of M. genitalium to and from the host cell receptor. P110 and P140 are also immunodominant proteins and constitute the main target of host antibodies during infection. Thus, anti-adherence molecules, aimed at preventing the establishment of infection, are attractive potential antimicrobial drugs. This family also includes Mycoplasma pneumoniae Mgp-operon protein 3 (also called Mgp3 or ORF-3 protein). — an NCBI CDD conserved domain (cd20279); members share this curated model.
