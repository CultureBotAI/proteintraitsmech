identifier: CDD:cd05836
label: "PWWP domain found in glyoxylate reductase 1 (GLYR1) and similar proteins. GLYR1, also called 3-hydroxyisobutyrate dehydrogenase-like protein, cytokine-like nuclear factor N-PAC, nuclear protein NP60, or nuclear protein of 60 kDa, is a putative oxidoreductase that is recruited on chromatin and promotes KDM1B demethylase activity. It recognizes and binds trimethylated 'Lys-36' of histone H3 (H3K36me3). GLYR1 enhances the activity of MAP2K4 and MAP2K6 kinases to phosphorylate p38-alpha. In addition to the PWWP domain, GLYR1 also contains an AT-hook and a C-terminal NAD-binding domain. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in glyoxylate reductase 1 (GLYR1) and similar proteins. GLYR1, also called 3-hydroxyisobutyrate dehydrogenase-like protein, cytokine-like nuclear factor N-PAC, nuclear protein NP60, or nuclear protein of 60 kDa, is a putative oxidoreductase that is recruited on chromatin and promotes KDM1B demethylase activity. It recognizes and binds trimethylated 'Lys-36' of histone H3 (H3K36me3). GLYR1 enhances the activity of MAP2K4 and MAP2K6 kinases to phosphorylate p38-alpha. In addition to the PWWP domain, GLYR1 also contains an AT-hook and a C-terminal NAD-binding domain. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd05836); members share this curated model.
