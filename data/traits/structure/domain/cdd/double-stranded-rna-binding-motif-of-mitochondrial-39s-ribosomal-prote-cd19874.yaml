identifier: CDD:cd19874
label: "double-stranded RNA binding motif of mitochondrial 39S ribosomal protein L44 (MRPL44) and similar proteins. MRPL44 (also known as L44mt, MRP-L44, or mitochondrial large ribosomal subunit protein mL44) is a component of the 39S subunit of mitochondrial ribosome. It may play a role in the assembly/stability of nascent mitochondrial polypeptides exiting the ribosome. MRPL44 contains a RNase III-like domain and a double-stranded RNA binding motif (DSRM). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of mitochondrial 39S ribosomal protein L44 (MRPL44) and similar proteins. MRPL44 (also known as L44mt, MRP-L44, or mitochondrial large ribosomal subunit protein mL44) is a component of the 39S subunit of mitochondrial ribosome. It may play a role in the assembly/stability of nascent mitochondrial polypeptides exiting the ribosome. MRPL44 contains a RNase III-like domain and a double-stranded RNA binding motif (DSRM). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19874); members share this curated model.
