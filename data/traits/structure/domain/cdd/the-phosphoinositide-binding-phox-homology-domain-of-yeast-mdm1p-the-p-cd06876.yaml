identifier: CDD:cd06876
label: "The phosphoinositide binding Phox Homology domain of yeast MDM1p. The PX domain is a phosphoinositide binding (PI) module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Yeast MDM1p is a filament-like protein localized in punctate structures distributed throughout the cytoplasm. It plays an important role in nuclear and mitochondrial transmission to daughter buds. Members of this subfamily show similar domain architectures as some sorting nexins (SNXs). Some members are similar to SNX19 in that they contain an N-terminal PXA domain, a central PX domain, and a C-terminal domain that is conserved in some SNXs. Others are similar to SNX13 and SNX14, which also harbor these three domains as well as a regulator of G protein signaling (RGS) domain in between the PXA and PX domains. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway."
definition: >-
  The phosphoinositide binding Phox Homology domain of yeast MDM1p. The PX domain is a phosphoinositide binding (PI) module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Yeast MDM1p is a filament-like protein localized in punctate structures distributed throughout the cytoplasm. It plays an important role in nuclear and mitochondrial transmission to daughter buds. Members of this subfamily show similar domain architectures as some sorting nexins (SNXs). Some members are similar to SNX19 in that they contain an N-terminal PXA domain, a central PX domain, and a C-terminal domain that is conserved in some SNXs. Others are similar to SNX13 and SNX14, which also harbor these three domains as well as a regulator of G protein signaling (RGS) domain in between the PXA and PX domains. SNXs make up the largest group among PX domain containing proteins. They are involved in regulating membrane traffic and protein sorting in the endosomal system. The PX domain of SNXs binds PIs and targets the protein to PI-enriched membranes. SNXs differ from each other in PI-binding specificity and affinity, and the presence of other protein-protein interaction domains, which help determine subcellular localization and specific function in the endocytic pathway. — an NCBI CDD conserved domain (cd06876); members share this curated model.
