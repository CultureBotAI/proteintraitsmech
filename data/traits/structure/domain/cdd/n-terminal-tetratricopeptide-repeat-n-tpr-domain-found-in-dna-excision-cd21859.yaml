identifier: CDD:cd21859
label: "N-terminal tetratricopeptide repeat (N-TPR) domain found in DNA excision repair protein ERCC-6-like (ERCC6L) and similar proteins. ERCC6L, also called ATP-dependent helicase ERCC6-like, or PLK1-interacting checkpoint helicase (PICH), or tumor antigen BJ-HCC-15, is a DNA helicase that acts as an essential component of the spindle assembly checkpoint. It contributes to the mitotic checkpoint by recruiting MAD2 to kinetochores and monitoring tension on centromeric chromatin. It acts as a tension sensor that associates with catenated DNA which is stretched under tension until it is resolved during anaphase. ERCC6L also functions as ATP-dependent DNA translocase specially adapted for processing anaphase bridge DNA. It can promote Holliday junction branch migration. ERCC6L is a multi-domain protein consisting of an SNF2-type, adenine nucleotide-binding domain, two tetratricopeptide repeat (TPR) motifs, and a so-called PICH family domain (PFD). The model corresponds to the N-terminal TPR (N-TPR) domain of ERCC6L, which is responsible for the binding of BEN domain-containing protein 3 (BEND3)."
definition: >-
  N-terminal tetratricopeptide repeat (N-TPR) domain found in DNA excision repair protein ERCC-6-like (ERCC6L) and similar proteins. ERCC6L, also called ATP-dependent helicase ERCC6-like, or PLK1-interacting checkpoint helicase (PICH), or tumor antigen BJ-HCC-15, is a DNA helicase that acts as an essential component of the spindle assembly checkpoint. It contributes to the mitotic checkpoint by recruiting MAD2 to kinetochores and monitoring tension on centromeric chromatin. It acts as a tension sensor that associates with catenated DNA which is stretched under tension until it is resolved during anaphase. ERCC6L also functions as ATP-dependent DNA translocase specially adapted for processing anaphase bridge DNA. It can promote Holliday junction branch migration. ERCC6L is a multi-domain protein consisting of an SNF2-type, adenine nucleotide-binding domain, two tetratricopeptide repeat (TPR) motifs, and a so-called PICH family domain (PFD). The model corresponds to the N-terminal TPR (N-TPR) domain of ERCC6L, which is responsible for the binding of BEN domain-containing protein 3 (BEND3). — an NCBI CDD conserved domain (cd21859); members share this curated model.
