identifier: CDD:cd19071
label: "AKR1/2/3/4/5 family of aldo-keto reductase (AKR) and similar proteins. Aldo-keto reductases (AKRs) are a superfamily of soluble NAD(P)(H) oxidoreductases whose chief purpose is to reduce aldehydes and ketones to primary and secondary alcohols. The family includes AKR1A/B/C/D/E/G/I, AKR2A/B/C/D/E, AKR3A/B/C/D/E/G, AKR4A/B/C, AKR5A/B/C/D/E/F/G/H, and similar proteins."
definition: >-
  AKR1/2/3/4/5 family of aldo-keto reductase (AKR) and similar proteins. Aldo-keto reductases (AKRs) are a superfamily of soluble NAD(P)(H) oxidoreductases whose chief purpose is to reduce aldehydes and ketones to primary and secondary alcohols. The family includes AKR1A/B/C/D/E/G/I, AKR2A/B/C/D/E, AKR3A/B/C/D/E/G, AKR4A/B/C, AKR5A/B/C/D/E/F/G/H, and similar proteins. — an NCBI CDD conserved domain (cd19071); members share this curated model.
