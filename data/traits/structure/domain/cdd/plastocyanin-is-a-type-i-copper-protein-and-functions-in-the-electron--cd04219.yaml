identifier: CDD:cd04219
label: "Plastocyanin is a type I copper protein and functions in the electron transfer from PSII to PSI. Plastocyanin is a small copper-containing protein found in cyanobacteria, higher plants, and some algae, where it plays a role in photosynthesis. The two photosystems that are primarily responsible for photosynthesis are photosystem I (PSI) and photosystem II (PSII). The flow of electrons begins in PSII, which acts as a proton pump. Plastocyanin is responsible for transporting electrons from PSII to PSI."
definition: >-
  Plastocyanin is a type I copper protein and functions in the electron transfer from PSII to PSI. Plastocyanin is a small copper-containing protein found in cyanobacteria, higher plants, and some algae, where it plays a role in photosynthesis. The two photosystems that are primarily responsible for photosynthesis are photosystem I (PSI) and photosystem II (PSII). The flow of electrons begins in PSII, which acts as a proton pump. Plastocyanin is responsible for transporting electrons from PSII to PSI. — an NCBI CDD conserved domain (cd04219); members share this curated model.
