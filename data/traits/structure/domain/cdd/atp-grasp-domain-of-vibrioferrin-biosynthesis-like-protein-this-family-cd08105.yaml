identifier: CDD:cd08105
label: "ATP-grasp domain of vibrioferrin biosynthesis like protein. This family appears to have the sequence similarity with the ATP-grasp domain. Enzymes related to ATP-grasp superfamily catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. Catalytic center requires the presence of one or more metal ions as a physiological cofactor. ATP-grasp superfamily members also share a conserved Mg-ATP-binding pocket which is covered by a flexible loop that is believed to undergo a conformational change on substrate binding. Vibrioferrin biosynthesis protein PvsA from Vibrio alginolyticus belongs to this group."
definition: >-
  ATP-grasp domain of vibrioferrin biosynthesis like protein. This family appears to have the sequence similarity with the ATP-grasp domain. Enzymes related to ATP-grasp superfamily catalyze an ATP-dependent ligation of a carboxyl group carbon of one substrate with an amino or imino group nitrogen of the second one via the formation of an acylphosphate intermediate. Catalytic center requires the presence of one or more metal ions as a physiological cofactor. ATP-grasp superfamily members also share a conserved Mg-ATP-binding pocket which is covered by a flexible loop that is believed to undergo a conformational change on substrate binding. Vibrioferrin biosynthesis protein PvsA from Vibrio alginolyticus belongs to this group. — an NCBI CDD conserved domain (cd08105); members share this curated model.
