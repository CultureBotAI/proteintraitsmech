identifier: CDD:cd18323
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 3 (ZBTB3). ZBTB3 is a transcription factor essential for cancer cell growth via the regulation of the reactive oxygen species (ROS) detoxification pathway. ZBTB3 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in zinc finger and BTB domain-containing protein 3 (ZBTB3). ZBTB3 is a transcription factor essential for cancer cell growth via the regulation of the reactive oxygen species (ROS) detoxification pathway. ZBTB3 contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18323); members share this curated model.
