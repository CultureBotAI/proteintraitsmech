identifier: CDD:cd13989
label: "Catalytic domain of the Serine/Threonine kinase, Inhibitor of Nuclear Factor-KappaB Kinase (IKK). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The IKK complex functions as a master regulator of Nuclear Factor-KappaB (NF-kB) proteins, a family of transcription factors which are critical in many cellular functions including inflammatory responses, immune development, cell survival, and cell proliferation, among others. It is composed of two kinases, IKKalpha and IKKbeta, and the regulatory subunit IKKgamma or NEMO (NF-kB Essential MOdulator). IKKs facilitate the release of NF-kB dimers from an inactive state, allowing them to migrate to the nucleus where they regulate gene transcription. There are two IKK pathways that regulate NF-kB signaling, called the classical (involving IKKbeta and NEMO) and non-canonical (involving IKKalpha) pathways. The classical pathway regulates the majority of genes activated by NF-kB. The IKK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase (PI3K)."
definition: >-
  Catalytic domain of the Serine/Threonine kinase, Inhibitor of Nuclear Factor-KappaB Kinase (IKK). STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. The IKK complex functions as a master regulator of Nuclear Factor-KappaB (NF-kB) proteins, a family of transcription factors which are critical in many cellular functions including inflammatory responses, immune development, cell survival, and cell proliferation, among others. It is composed of two kinases, IKKalpha and IKKbeta, and the regulatory subunit IKKgamma or NEMO (NF-kB Essential MOdulator). IKKs facilitate the release of NF-kB dimers from an inactive state, allowing them to migrate to the nucleus where they regulate gene transcription. There are two IKK pathways that regulate NF-kB signaling, called the classical (involving IKKbeta and NEMO) and non-canonical (involving IKKalpha) pathways. The classical pathway regulates the majority of genes activated by NF-kB. The IKK subfamily is part of a larger superfamily that includes the catalytic domains of other protein STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase (PI3K). — an NCBI CDD conserved domain (cd13989); members share this curated model.
