identifier: CDD:cd22475
label: "type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana DEAD-box ATP-dependent RNA helicase RH42 and similar proteins. RH42, also called DEAD-box RNA helicase RCF1, or REGULATOR OF CBF GENE EXPRESSION 1, is a helicase required for pre-mRNA splicing, cold-responsive gene regulation and cold tolerance. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif."
definition: >-
  type I K homology (KH) RNA-binding domain found in Arabidopsis thaliana DEAD-box ATP-dependent RNA helicase RH42 and similar proteins. RH42, also called DEAD-box RNA helicase RCF1, or REGULATOR OF CBF GENE EXPRESSION 1, is a helicase required for pre-mRNA splicing, cold-responsive gene regulation and cold tolerance. Members in this subfamily contain a divergent KH domain that lacks the RNA-binding GXXG motif. — an NCBI CDD conserved domain (cd22475); members share this curated model.
