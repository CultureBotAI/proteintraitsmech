identifier: CDD:cd21048
label: "zinc finger (ZNF) domain found in centrosomal protein of 104 kDa (Cep104) and similar proteins. Cep104 is required for ciliogenesis and for structural integrity at the ciliary tip. The model corresponds to the C-terminal ZNF domain of Cep104, which consists four Zn fingers. The kinase Nek1 acts as a novel binding partner of the C-terminal ZNF domain."
definition: >-
  zinc finger (ZNF) domain found in centrosomal protein of 104 kDa (Cep104) and similar proteins. Cep104 is required for ciliogenesis and for structural integrity at the ciliary tip. The model corresponds to the C-terminal ZNF domain of Cep104, which consists four Zn fingers. The kinase Nek1 acts as a novel binding partner of the C-terminal ZNF domain. — an NCBI CDD conserved domain (cd21048); members share this curated model.
