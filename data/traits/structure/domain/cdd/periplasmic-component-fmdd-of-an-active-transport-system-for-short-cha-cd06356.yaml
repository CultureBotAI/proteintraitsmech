label: "periplasmic component (FmdD) of an active transport system for short-chain amides and urea (FmdDEF). This group includes the type 1 periplasmic-binding proteins that are predicted to have a function similar to that of an active transport system for short chain amides and/or urea in bacteria and Archaea, by sequence comparison and phylogenetic analysis."
