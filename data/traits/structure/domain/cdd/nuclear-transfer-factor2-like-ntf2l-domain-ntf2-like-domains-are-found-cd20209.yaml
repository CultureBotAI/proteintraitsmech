identifier: CDD:cd20209
label: "Nuclear Transfer Factor2-like (NTF2L) domain. NTF2-like domains are found in many proteins with diverse functions. NTF2-like domain forms homo- or heterodimers with low micromolar affinity and that the NTF2-like dimers bind protein targets, some of which contain FXFG or FG (phenylalanine-glycine) repeats. This recognition FG repeats region of NTF2-like is not conserved among the different proteins and this reflecting the relatively low primary sequence homology between the NTF2-like domains and their diverse biological roles."
definition: >-
  Nuclear Transfer Factor2-like (NTF2L) domain. NTF2-like domains are found in many proteins with diverse functions. NTF2-like domain forms homo- or heterodimers with low micromolar affinity and that the NTF2-like dimers bind protein targets, some of which contain FXFG or FG (phenylalanine-glycine) repeats. This recognition FG repeats region of NTF2-like is not conserved among the different proteins and this reflecting the relatively low primary sequence homology between the NTF2-like domains and their diverse biological roles. — an NCBI CDD conserved domain (cd20209); members share this curated model.
