identifier: CDD:cd10456
label: "The GIY-YIG domain of uncharacterized protein family UPF0213 related to structure-specific endonuclease SLX1. This family contains a group of uncharacterized proteins found mainly in bacteria and several in dsDNA viruses. Although their function roles have not been recognized, these proteins show significant sequence similarities with the N-terminal GIY-YIG endonuclease domain of structure-specific endonuclease subunit SLX1, which binds another structure-specific endonuclease subunit SLX4 to form an active heterodimeric SLX1-SLX4 complex. This complex functions as a 5' flap endonuclease in yeast, and has also been identified as a Holliday junction resolvase in human."
definition: >-
  The GIY-YIG domain of uncharacterized protein family UPF0213 related to structure-specific endonuclease SLX1. This family contains a group of uncharacterized proteins found mainly in bacteria and several in dsDNA viruses. Although their function roles have not been recognized, these proteins show significant sequence similarities with the N-terminal GIY-YIG endonuclease domain of structure-specific endonuclease subunit SLX1, which binds another structure-specific endonuclease subunit SLX4 to form an active heterodimeric SLX1-SLX4 complex. This complex functions as a 5' flap endonuclease in yeast, and has also been identified as a Holliday junction resolvase in human. — an NCBI CDD conserved domain (cd10456); members share this curated model.
