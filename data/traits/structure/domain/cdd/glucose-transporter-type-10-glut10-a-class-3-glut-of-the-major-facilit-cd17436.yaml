identifier: CDD:cd17436
label: "Glucose transporter type 10 (GLUT10), a Class 3 GLUT, of the Major Facilitator Superfamily of transporters. Glucose transporter type 10 (GLUT10) is also called Solute carrier family 2, facilitated glucose transporter member 10 (SLC2A10). It is classified as a Class 3 GLUT and is a facilitative glucose transporter that exhibits a wide tissue distribution. It is expressed in pancreas, placenta, heart, lung, liver, brain, fat, muscle, and kidney. GLUT10 facilitates the transport of dehydroascorbic acid (DHA), the oxidized form of vitamin C, into mitochondria, and also increases cellular uptake of DHA, which in turn protects cells against oxidative stress. Loss-of-function mutations in SLC2A10 cause arterial tortuosity syndrome (ATS), an autosomal recessive connective tissue disorder characterized by twisting and lengthening of the major arteries, hypermobility of the joints, and laxity of skin. The GLUT10 subfamily belongs to the Glucose transporter -like (GLUT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  Glucose transporter type 10 (GLUT10), a Class 3 GLUT, of the Major Facilitator Superfamily of transporters. Glucose transporter type 10 (GLUT10) is also called Solute carrier family 2, facilitated glucose transporter member 10 (SLC2A10). It is classified as a Class 3 GLUT and is a facilitative glucose transporter that exhibits a wide tissue distribution. It is expressed in pancreas, placenta, heart, lung, liver, brain, fat, muscle, and kidney. GLUT10 facilitates the transport of dehydroascorbic acid (DHA), the oxidized form of vitamin C, into mitochondria, and also increases cellular uptake of DHA, which in turn protects cells against oxidative stress. Loss-of-function mutations in SLC2A10 cause arterial tortuosity syndrome (ATS), an autosomal recessive connective tissue disorder characterized by twisting and lengthening of the major arteries, hypermobility of the joints, and laxity of skin. The GLUT10 subfamily belongs to the Glucose transporter -like (GLUT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17436); members share this curated model.
