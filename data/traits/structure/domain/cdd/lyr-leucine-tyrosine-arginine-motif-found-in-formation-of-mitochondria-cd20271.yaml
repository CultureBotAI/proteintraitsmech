identifier: CDD:cd20271
label: "LYR (leucine-tyrosine-arginine) motif found in formation of mitochondrial complex V assembly factor 1 (FMC1) and similar proteins. FMC1, also known as formation of mitochondrial complexes protein 1, is an ATP synthase assembly factor that plays a role in the assembly/stability of the mitochondrial membrane ATP synthase (F(1)F(0) ATP synthase or Complex V). It belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus."
definition: >-
  LYR (leucine-tyrosine-arginine) motif found in formation of mitochondrial complex V assembly factor 1 (FMC1) and similar proteins. FMC1, also known as formation of mitochondrial complexes protein 1, is an ATP synthase assembly factor that plays a role in the assembly/stability of the mitochondrial membrane ATP synthase (F(1)F(0) ATP synthase or Complex V). It belongs to the Complex1_LYR-like superfamily that consists of proteins of diverse functions that are exclusively found in eukaryotes and contain the conserved tripeptide 'LYR' close to the N-terminus. — an NCBI CDD conserved domain (cd20271); members share this curated model.
