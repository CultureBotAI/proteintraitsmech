identifier: CDD:cd15470
label: "Cargo binding domain of myosin 5. Class V myosins are well studied unconventional myosins, represented by three paralogs (Myo5a,b,c) in vertebrates.  Their C-terminal cargo binding domains (CBDs) are important for the binding of a diverse set of cargos, including membrane vesicles, organelles, proteins and mRNA. The MyoV-CBDs directly interact with several adaptor proteins, in case of Myo5a, melanophilin (MLPH), Rab interacting lysosomal protein-like 2 (RILPL2), and granuphilin, and in case of Myo5b, Rab11-family interacting protein 2."
definition: >-
  Cargo binding domain of myosin 5. Class V myosins are well studied unconventional myosins, represented by three paralogs (Myo5a,b,c) in vertebrates. Their C-terminal cargo binding domains (CBDs) are important for the binding of a diverse set of cargos, including membrane vesicles, organelles, proteins and mRNA. The MyoV-CBDs directly interact with several adaptor proteins, in case of Myo5a, melanophilin (MLPH), Rab interacting lysosomal protein-like 2 (RILPL2), and granuphilin, and in case of Myo5b, Rab11-family interacting protein 2. — an NCBI CDD conserved domain (cd15470); members share this curated model.
