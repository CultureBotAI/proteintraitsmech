identifier: CDD:cd16052
label: "Tumor necrosis factor ligand superfamily member 8 (TNFSF8), also known as CD30L. This family contains TNFSF8 (also known as CD30L, CD30LG, or CD153) and is the ligand for TNFRSF8 (also known as CD30, Ki-1, D1S166E). TNFSF8/CD30L is expressed in both resting and activated cells of the myeloid and lymphoid lineage, including mast cells. Binding of CD30L to TNFRSF/CD30 results in downstream signaling in the CD30-expressing cell through several TNF receptor associated factor (TRAF) and activation of nuclear factor NF-kB, causing cell proliferation or cell death. Binding also results in downstream signaling in the CD30L-expressing cell through reverse signaling, directly inducing cell proliferation or inhibition; thus, a bidirectional signal transduction occurs after CD30/CD30L engagement.  CD30 and CD30L are upregulated in leukocytes of patients with chronic inflammatory diseases, including asthma, rheumatoid arthritis, lupus erythematosus and atopic dermatitis (AD), possibly due to important regulatory functions of the CD30-CD30L system in various aspects of the immune system. The CD30 receptor is upregulated in various hematological malignancies, including anaplastic large cell lymphoma (ALCL), Reed-Sternberg cells in Hodgkin's disease (HD) and some Non-Hodgkin's lymphomas (NHLs). Aberrant expression of CD30 by mastocytosis mast cells and interaction with its ligand CD30L also appears to play an important role in the pathogenesis and clinical presentation of systemic mastocytosis, a rare disorder caused by the presence of too many mast cells (mastocytes) and CD34+ mast cell precursors. Low expression of CD30L andCD30 in normal conditions and key regulatory roles in inflammatory diseases as well as increased expression in malignant tissues make CD30 and CD30L good therapeutic targets in hematologic malignancies, autoimmune and inflammatory diseases. Two TNFSF8 polymorphisms are associated with peripheral neutrophil count in early post-myocardial infarction (MI) inflammatory response and thus thought to be genetically modulated. A single nucleotide polymorphism in TNFSF8 gene is associated with bone disease in myeloma."
definition: >-
  Tumor necrosis factor ligand superfamily member 8 (TNFSF8), also known as CD30L. This family contains TNFSF8 (also known as CD30L, CD30LG, or CD153) and is the ligand for TNFRSF8 (also known as CD30, Ki-1, D1S166E). TNFSF8/CD30L is expressed in both resting and activated cells of the myeloid and lymphoid lineage, including mast cells. Binding of CD30L to TNFRSF/CD30 results in downstream signaling in the CD30-expressing cell through several TNF receptor associated factor (TRAF) and activation of nuclear factor NF-kB, causing cell proliferation or cell death. Binding also results in downstream signaling in the CD30L-expressing cell through reverse signaling, directly inducing cell proliferation or inhibition; thus, a bidirectional signal transduction occurs after CD30/CD30L engagement. CD30 and CD30L are upregulated in leukocytes of patients with chronic inflammatory diseases, including asthma, rheumatoid arthritis, lupus erythematosus and atopic dermatitis (AD), possibly due to important regulatory functions of the CD30-CD30L system in various aspects of the immune system. The CD30 receptor is upregulated in various hematological malignancies, including anaplastic large cell lymphoma (ALCL), Reed-Sternberg cells in Hodgkin's disease (HD) and some Non-Hodgkin's lymphomas (NHLs). Aberrant expression of CD30 by mastocytosis mast cells and interaction with its ligand CD30L also appears to play an important role in the pathogenesis and clinical presentation of systemic mastocytosis, a rare disorder caused by the presence of too many mast cells (mastocytes) and CD34+ mast cell precursors. Low expression of CD30L andCD30 in normal conditions and key regulatory roles in inflammatory diseases as well as increased expression in malignant tissues make CD30 and CD30L good therapeutic targets in hematologic malignancies, autoimmune and inflammatory diseases. Two TNFSF8 polymorphisms are associated with peripheral neutrophil count in early post-myocardial infarction (MI) inflammatory response and thus thought to be genetically modulated. A single nucleotide polymorphism in TNFSF8 gene is associated with bone disease in myeloma. — an NCBI CDD conserved domain (cd16052); members share this curated model.
