identifier: CDD:cd16330
label: "Proteins similar to violacein biosynthetic enzyme VioE that shares fold with periplasmic molecular chaperone LolA. This family includes the violacein biosynthetic enzyme VioE which shares a core fold with lipoprotein transporter proteins that include lipoprotein transporter proteins LolA and LolB. VioE is an enzyme with no characterized homologs that plays a key role in the biosynthesis of violacein, a naturally occurring bisindole product with various biological activities, including antitumor activity as well as antibacterial and cytotoxic properties. In Chromobacterium violaceum, VioE catalyzes the third step in violacein biosynthesis from a pair of Trp residues (i.e. mediates a 1,2 shift of an indole ring and oxidative chemistry) to generate prodeoxyviolacein, a precursor to violacein. Structural and mutagenesis studies suggest that VioE acts as a catalytic chaperone, using this fold associated with lipoprotein transporters to catalyze the production of its prodeoxyviolacein product."
definition: >-
