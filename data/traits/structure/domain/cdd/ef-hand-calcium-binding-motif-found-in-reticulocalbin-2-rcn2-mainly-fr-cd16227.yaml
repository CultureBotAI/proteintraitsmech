identifier: CDD:cd16227
label: "EF-hand, calcium binding motif, found in reticulocalbin-2 (RCN2) mainly from protostomes. This family corresponds to a group of uncharacterized RCN2-like proteins, which are mainly found in protostomes. Although their biological function remains unclear, they show high sequence similarity with RCN2 (also known as E6BP or TCBP-49), which is an endoplasmic reticulum resident low-affinity Ca2+-binding protein that has been implicated in immunity, redox homeostasis, cell cycle regulation and coagulation. Members in this family contain six copies of the EF-hand Ca2+-binding motif, but may lack a C-terminal His-Asp-Glu-Leu (HDEL) tetrapeptide that is required for retention of RCN2 in the endoplasmic reticulum (ER)."
definition: >-
  EF-hand, calcium binding motif, found in reticulocalbin-2 (RCN2) mainly from protostomes. This family corresponds to a group of uncharacterized RCN2-like proteins, which are mainly found in protostomes. Although their biological function remains unclear, they show high sequence similarity with RCN2 (also known as E6BP or TCBP-49), which is an endoplasmic reticulum resident low-affinity Ca2+-binding protein that has been implicated in immunity, redox homeostasis, cell cycle regulation and coagulation. Members in this family contain six copies of the EF-hand Ca2+-binding motif, but may lack a C-terminal His-Asp-Glu-Leu (HDEL) tetrapeptide that is required for retention of RCN2 in the endoplasmic reticulum (ER). — an NCBI CDD conserved domain (cd16227); members share this curated model.
