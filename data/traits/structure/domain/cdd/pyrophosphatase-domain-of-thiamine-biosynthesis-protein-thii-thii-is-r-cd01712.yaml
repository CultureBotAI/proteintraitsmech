identifier: CDD:cd01712
label: "pyrophosphatase domain of thiamine biosynthesis protein ThiI. ThiI is required for thiazole synthesis in the thiamine biosynthesis pathway. ThiI is also responsible for the 4-thiouridine (S4U) modification at position 8 in some prokaryotic tRNAs. ThiI contains a PP-loop pyrophosphatase domain which binds ATP and activates tRNA by adenylation. The PP-loop pyrophosphatase catalytic domain of ThiI proteins is always accompanied by a THUMP domain towards the N terminus. THUMP domains are predicted to bind RNA and are widespread in bacteria, archaea, and eukaryotes. The acronym was derived from the names of RNA-modifying enzymes in which this domain is found, namely, thiouridine synthases (ThiI), methylases, and archaeal pseudouridine synthases. ThiI proteins from gamma-proteobacteria and from archaea of the genus Thermoplasma also contain a C-terminal extension of approximately 100 amino acid residues which accepts sulfur in the form of a persulfide on a cysteine residue. This persulfide is responsible for a nucleophilic attack of the adenylated tRNA substrate, completing the sulfur insertion forming a disulfide-bridge between the rhodanese-like domain and a second cysteine residue located in the PP-loop domain. The reaction releases AMP and modified tRNA, and leaves the enzyme in an oxidized state. The disulfide is then reductively cleaved to complete the enzymatic cycle. The pyrophosphatase domain of ThiI belongs to the adenine nucleotide hydrolase (AANH) superfamily and it binds to adenosine nucleotide."
definition: >-
  pyrophosphatase domain of thiamine biosynthesis protein ThiI. ThiI is required for thiazole synthesis in the thiamine biosynthesis pathway. ThiI is also responsible for the 4-thiouridine (S4U) modification at position 8 in some prokaryotic tRNAs. ThiI contains a PP-loop pyrophosphatase domain which binds ATP and activates tRNA by adenylation. The PP-loop pyrophosphatase catalytic domain of ThiI proteins is always accompanied by a THUMP domain towards the N terminus. THUMP domains are predicted to bind RNA and are widespread in bacteria, archaea, and eukaryotes. The acronym was derived from the names of RNA-modifying enzymes in which this domain is found, namely, thiouridine synthases (ThiI), methylases, and archaeal pseudouridine synthases. ThiI proteins from gamma-proteobacteria and from archaea of the genus Thermoplasma also contain a C-terminal extension of approximately 100 amino acid residues which accepts sulfur in the form of a persulfide on a cysteine residue. This persulfide is responsible for a nucleophilic attack of the adenylated tRNA substrate, completing the sulfur insertion forming a disulfide-bridge between the rhodanese-like domain and a second cysteine residue located in the PP-loop domain. The reaction releases AMP and modified tRNA, and leaves the enzyme in an oxidized state. The disulfide is then reductively cleaved to complete the enzymatic cycle. The pyrophosphatase domain of ThiI belongs to the adenine nucleotide hydrolase (AANH) superfamily and it binds to adenosine nucleotide. — an NCBI CDD conserved domain (cd01712); members share this curated model.
