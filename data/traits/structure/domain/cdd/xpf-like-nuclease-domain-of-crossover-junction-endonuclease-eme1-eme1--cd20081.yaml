identifier: CDD:cd20081
label: "XPF-like nuclease domain of crossover junction endonuclease EME1. EME1, also called MMS4 homolog (hMMS4), interacts with MUS81 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. Its typical substrates include 3'-flap structures, replication forks and nicked Holliday junctions. EME1 may be required in mitosis for the processing of stalled or collapsed replication forks. The nuclease domain of EME1 is a nuclease-like domain which is involved in targeting the MUS81-EME1 heterodimer complex to DNA."
definition: >-
  XPF-like nuclease domain of crossover junction endonuclease EME1. EME1, also called MMS4 homolog (hMMS4), interacts with MUS81 to form a DNA structure-specific endonuclease with substrate preference for branched DNA structures with a 5'-end at the branch nick. Its typical substrates include 3'-flap structures, replication forks and nicked Holliday junctions. EME1 may be required in mitosis for the processing of stalled or collapsed replication forks. The nuclease domain of EME1 is a nuclease-like domain which is involved in targeting the MUS81-EME1 heterodimer complex to DNA. — an NCBI CDD conserved domain (cd20081); members share this curated model.
