identifier: CDD:cd11060
label: "cytochrome P450 family 57, subfamily A, polypeptide 1 and similar cytochrome P450s. This family is composed of fungal cytochrome P450s including: Nectria haematococca cytochrome P450 57A1 (CYP57A1), also called pisatin demethylase, which detoxifies the phytoalexin pisatin; Penicillium aethiopicum P450 monooxygenase gsfF, also called griseofulvin synthesis protein F, which catalyzes the coupling of orcinol and phloroglucinol rings in griseophenone B to form desmethyl-dehydrogriseofulvin A during the biosynthesis of griseofulvin, a spirocyclic fungal natural product used to treat dermatophyte infections; and Penicillium aethiopicum P450 monooxygenase vrtE, also called viridicatumtoxin synthesis protein E, which catalyzes hydroxylation at C5 of the polyketide backbone during the biosynthesis of viridicatumtoxin, a tetracycline-like fungal meroterpenoid. The CYP57A1-like family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
definition: >-
  cytochrome P450 family 57, subfamily A, polypeptide 1 and similar cytochrome P450s. This family is composed of fungal cytochrome P450s including: Nectria haematococca cytochrome P450 57A1 (CYP57A1), also called pisatin demethylase, which detoxifies the phytoalexin pisatin; Penicillium aethiopicum P450 monooxygenase gsfF, also called griseofulvin synthesis protein F, which catalyzes the coupling of orcinol and phloroglucinol rings in griseophenone B to form desmethyl-dehydrogriseofulvin A during the biosynthesis of griseofulvin, a spirocyclic fungal natural product used to treat dermatophyte infections; and Penicillium aethiopicum P450 monooxygenase vrtE, also called viridicatumtoxin synthesis protein E, which catalyzes hydroxylation at C5 of the polyketide backbone during the biosynthesis of viridicatumtoxin, a tetracycline-like fungal meroterpenoid. The CYP57A1-like family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop. — an NCBI CDD conserved domain (cd11060); members share this curated model.
