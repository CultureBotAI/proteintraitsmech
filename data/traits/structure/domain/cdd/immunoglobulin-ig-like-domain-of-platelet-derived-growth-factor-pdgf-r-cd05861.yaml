identifier: CDD:cd05861
label: "Immunoglobulin (Ig)-like domain of platelet-derived growth factor (PDGF) receptors (R), alpha and beta; member of the I-set of IgSF domains. The members here are composed of the immunoglobulin (Ig)-like domain of platelet-derived growth factor (PDGF) receptors (R), alpha (also known as cluster of differentiation (CD) 140a), and beta (also known as CD140b). PDGF is a potent mitogen for connective tissue cells. PDGF-stimulated processes are mediated by three different PDGFs (PDGF-A,PDGF-B, and PDGF-C). PDGFRalpha binds to all three PDGFs, whereas the PDGFRbeta binds only to PDGF-B. PDGFRs alpha and beta have similar organization: an extracellular component with five Ig-like domains, a transmembrane segment, and a cytoplasmic portion having protein tyrosine kinase activity. In mice, PDGFRalpha and PDGFRbeta are essential for normal development."
definition: >-
  Immunoglobulin (Ig)-like domain of platelet-derived growth factor (PDGF) receptors (R), alpha and beta; member of the I-set of IgSF domains. The members here are composed of the immunoglobulin (Ig)-like domain of platelet-derived growth factor (PDGF) receptors (R), alpha (also known as cluster of differentiation (CD) 140a), and beta (also known as CD140b). PDGF is a potent mitogen for connective tissue cells. PDGF-stimulated processes are mediated by three different PDGFs (PDGF-A,PDGF-B, and PDGF-C). PDGFRalpha binds to all three PDGFs, whereas the PDGFRbeta binds only to PDGF-B. PDGFRs alpha and beta have similar organization: an extracellular component with five Ig-like domains, a transmembrane segment, and a cytoplasmic portion having protein tyrosine kinase activity. In mice, PDGFRalpha and PDGFRbeta are essential for normal development. — an NCBI CDD conserved domain (cd05861); members share this curated model.
