identifier: CDD:cd21076
label: "DNA-binding domain found in DNA repair protein complementing XP-A cells (XPA) and similar proteins. XPA, also known as xeroderma pigmentosum group A-complementing protein (XPAC), is involved in DNA excision repair. It initiates repair by binding to damaged sites with various affinities, depending on the photoproduct and the transcriptional state of the region."
definition: >-
  DNA-binding domain found in DNA repair protein complementing XP-A cells (XPA) and similar proteins. XPA, also known as xeroderma pigmentosum group A-complementing protein (XPAC), is involved in DNA excision repair. It initiates repair by binding to damaged sites with various affinities, depending on the photoproduct and the transcriptional state of the region. — an NCBI CDD conserved domain (cd21076); members share this curated model.
