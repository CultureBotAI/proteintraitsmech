identifier: CDD:cd20723
label: "C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) of Escherichia coli CdiA, and similar proteins. This family includes the C-terminal (CT) domain of Escherichia coli CdiA, an effector protein involved in contact-dependent growth inhibition (CDI), a mechanism of inter-bacterial competition. The large CdiA effector protein carries a C-terminal toxin domain (CdiA-CT) which is delivered to neighboring bacteria to inhibit target-cell growth. The exact biochemical function of this E. coli CdiA is as yet unknown. CDI(+) bacteria also produce a CDI immunity protein (CdiI) to specifically neutralize the CdiA-CT toxins to prevent auto-inhibition. This CdiA-CT binds its all helical cognate CdiI with high affinity."
definition: >-
  C-terminal (CT) domain of the contact-dependent growth inhibition (CDI) system (CdiA-CT) of Escherichia coli CdiA, and similar proteins. This family includes the C-terminal (CT) domain of Escherichia coli CdiA, an effector protein involved in contact-dependent growth inhibition (CDI), a mechanism of inter-bacterial competition. The large CdiA effector protein carries a C-terminal toxin domain (CdiA-CT) which is delivered to neighboring bacteria to inhibit target-cell growth. The exact biochemical function of this E. coli CdiA is as yet unknown. CDI(+) bacteria also produce a CDI immunity protein (CdiI) to specifically neutralize the CdiA-CT toxins to prevent auto-inhibition. This CdiA-CT binds its all helical cognate CdiI with high affinity. — an NCBI CDD conserved domain (cd20723); members share this curated model.
