identifier: CDD:cd06634
label: "Catalytic domain of the Serine/Threonine Kinase, Thousand-and-One Amino acids 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Human TAO2 is also known as prostate-derived Ste20-like kinase (PSK) and was identified in a screen for overexpressed RNAs in prostate cancer. TAO2 possesses mitogen-activated protein kinase (MAPK) kinase kinase activity and activates both p38 and c-Jun N-terminal kinase (JNK), by phosphorylating and activating their respective MAP/ERK kinases, MEK3/MEK6 and MKK4/MKK7. It contains a long C-terminal extension with autoinhibitory segments, and is activated by the release of this inhibition and the phosphorylation of its activation loop serine. TAO2 functions as a regulator of actin cytoskeletal and microtubule organization. In addition, it regulates the transforming growth factor-activated kinase 1 (TAK1), which is a MAPKKK that plays an essential role in the signaling pathways of tumor necrosis factor, interleukin 1, and Toll-like receptor. The TAO2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Serine/Threonine Kinase, Thousand-and-One Amino acids 2. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Human TAO2 is also known as prostate-derived Ste20-like kinase (PSK) and was identified in a screen for overexpressed RNAs in prostate cancer. TAO2 possesses mitogen-activated protein kinase (MAPK) kinase kinase activity and activates both p38 and c-Jun N-terminal kinase (JNK), by phosphorylating and activating their respective MAP/ERK kinases, MEK3/MEK6 and MKK4/MKK7. It contains a long C-terminal extension with autoinhibitory segments, and is activated by the release of this inhibition and the phosphorylation of its activation loop serine. TAO2 functions as a regulator of actin cytoskeletal and microtubule organization. In addition, it regulates the transforming growth factor-activated kinase 1 (TAK1), which is a MAPKKK that plays an essential role in the signaling pathways of tumor necrosis factor, interleukin 1, and Toll-like receptor. The TAO2 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd06634); members share this curated model.
