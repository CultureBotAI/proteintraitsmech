identifier: CDD:cd10332
label: "System B(0) neutral amino acid transporter AT1, 2 and 3, and related proteins; solute-binding domain. This subgroup includes the solute-binding domain of transmembrane transporters, which transport, i) neutral amino acids: NTT4 (also called XT1), SBAT1 (also called B0AT2, v7-3, NTT7-3), and B0AT1 (also called HND); the human genes encoding these are SLC6A17, SLC6A15, and SLC6A19 respectively, ii) glycine: B0AT3 (also called Xtrp2, XT2), iii) imino acids, such as proline, pipecolate, MeAIB, and sarcosine: SIT1 (also called XTRP3, XT3, IMINO). The human genes encoding B0AT3 and SIT1 are SLC6A18 and SLC6A20 respectively. Transporters in this subgroup may play a role in disorders including major depression, Hartnup disorder, increased susceptibility to myocardial infarction, and iminoglycinuria. This subgroup belongs to the solute carrier 6 (SLC6) transporter family."
definition: >-
  System B(0) neutral amino acid transporter AT1, 2 and 3, and related proteins; solute-binding domain. This subgroup includes the solute-binding domain of transmembrane transporters, which transport, i) neutral amino acids: NTT4 (also called XT1), SBAT1 (also called B0AT2, v7-3, NTT7-3), and B0AT1 (also called HND); the human genes encoding these are SLC6A17, SLC6A15, and SLC6A19 respectively, ii) glycine: B0AT3 (also called Xtrp2, XT2), iii) imino acids, such as proline, pipecolate, MeAIB, and sarcosine: SIT1 (also called XTRP3, XT3, IMINO). The human genes encoding B0AT3 and SIT1 are SLC6A18 and SLC6A20 respectively. Transporters in this subgroup may play a role in disorders including major depression, Hartnup disorder, increased susceptibility to myocardial infarction, and iminoglycinuria. This subgroup belongs to the solute carrier 6 (SLC6) transporter family. — an NCBI CDD conserved domain (cd10332); members share this curated model.
