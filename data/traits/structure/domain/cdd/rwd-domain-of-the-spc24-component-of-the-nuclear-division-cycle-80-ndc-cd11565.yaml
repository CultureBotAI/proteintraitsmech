identifier: CDD:cd11565
label: "RWD domain of the Spc24 component of the nuclear division cycle 80 (NDC80) kinetochore complex. The kinetochore protein Spc24 acts as a component of the essential kinetochore-associated NDC80 complex, which is involved in chromosome segregation and spindle checkpoint activity. Spc24 is required for kinetochore integrity and the organization of stable microtubule binding sites in the outer plate of the kinetochore. The NDC80 complex synergistically enhances the affinity of the SKA1 complex for microtubules and may allow the NDC80 complex to track depolymerizing microtubules. The model corresponds to the Spc24 RWD domain, which provides an interaction platform to mediate kinetochore assembly."
definition: >-
  RWD domain of the Spc24 component of the nuclear division cycle 80 (NDC80) kinetochore complex. The kinetochore protein Spc24 acts as a component of the essential kinetochore-associated NDC80 complex, which is involved in chromosome segregation and spindle checkpoint activity. Spc24 is required for kinetochore integrity and the organization of stable microtubule binding sites in the outer plate of the kinetochore. The NDC80 complex synergistically enhances the affinity of the SKA1 complex for microtubules and may allow the NDC80 complex to track depolymerizing microtubules. The model corresponds to the Spc24 RWD domain, which provides an interaction platform to mediate kinetochore assembly. — an NCBI CDD conserved domain (cd11565); members share this curated model.
