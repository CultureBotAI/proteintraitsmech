identifier: CDD:cd18916
label: "basic helix-loop-helix-orange (bHLH-O) domain found in Drosophila melanogaster Enhancer of split proteins, E(spl)m5, E(spl)m8 and similar proteins. The family includes two bHLH-O transcriptional repressors, E(spl)m5 and E(spl)m8, which participate in the control of cell fate choice by uncommitted neuroectodermal cells in the embryo. They bind DNA on N-box motifs, 5'-CACNAG-3'."
