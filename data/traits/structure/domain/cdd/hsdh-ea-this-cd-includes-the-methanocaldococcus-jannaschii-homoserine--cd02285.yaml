identifier: CDD:cd02285
label: "HSDH_EA. This CD includes the Methanocaldococcus jannaschii homoserine dehydrogenase (HSDH) and other related Euryarchaeota (EA) sequences. By sequence similarity, these predicted homoserine dehydrogenases are believed to be involved in the NAD(P)H-dependent conversion of L-aspartate to homoserine. Members of this CD appear to contain a Rossmann fold NAD(P)H binding domain and unique catalytic fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain and are members of the NADB_G3PDH superfamily of proteins."
definition: >-
  HSDH_EA. This CD includes the Methanocaldococcus jannaschii homoserine dehydrogenase (HSDH) and other related Euryarchaeota (EA) sequences. By sequence similarity, these predicted homoserine dehydrogenases are believed to be involved in the NAD(P)H-dependent conversion of L-aspartate to homoserine. Members of this CD appear to contain a Rossmann fold NAD(P)H binding domain and unique catalytic fold with similarities to the glyceraldehyde-3-phosphate dehydrogenase domain and are members of the NADB_G3PDH superfamily of proteins. — an NCBI CDD conserved domain (cd02285); members share this curated model.
