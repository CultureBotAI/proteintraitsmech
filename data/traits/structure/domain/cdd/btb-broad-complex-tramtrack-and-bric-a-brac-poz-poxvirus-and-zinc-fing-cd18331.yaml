identifier: CDD:cd18331
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in B-cell lymphoma 6 protein (BCL-6). BCL-6 is also called B-cell lymphoma 5 protein (BCL-5), zinc finger and BTB domain-containing protein 27 (ZBTB27), protein LAZ-3, or zinc finger protein 51 (ZNF51). It is a transcriptional repressor mainly required for germinal center (GC) formation and antibody affinity maturation, which have different mechanisms of action specific to the lineage and biological functions. It represses its target genes by binding directly to the DNA sequence 5'-TTCCTAGAA-3' or indirectly by repressing the transcriptional activity of transcription factors. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in B-cell lymphoma 6 protein (BCL-6). BCL-6 is also called B-cell lymphoma 5 protein (BCL-5), zinc finger and BTB domain-containing protein 27 (ZBTB27), protein LAZ-3, or zinc finger protein 51 (ZNF51). It is a transcriptional repressor mainly required for germinal center (GC) formation and antibody affinity maturation, which have different mechanisms of action specific to the lineage and biological functions. It represses its target genes by binding directly to the DNA sequence 5'-TTCCTAGAA-3' or indirectly by repressing the transcriptional activity of transcription factors. It contains a BTB/POZ domain, a common protein-protein interaction motif of about 100 amino acids. — an NCBI CDD conserved domain (cd18331); members share this curated model.
