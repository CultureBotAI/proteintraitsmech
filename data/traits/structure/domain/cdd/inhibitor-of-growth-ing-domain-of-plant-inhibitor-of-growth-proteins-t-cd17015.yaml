identifier: CDD:cd17015
label: "Inhibitor of growth (ING) domain of plant inhibitor of growth proteins. This subfamily is composed of mainly plant inhibitor of growth proteins such as Arabidopsis thaliana ING1 (AtING1 or PHD finger protein ING1) and ING2 (AtING2 or PHD finger protein ING2). They are histone-binding components that specifically recognizes H3 tails trimethylated on 'Lys-4' (H3K4me3), which mark transcription start sites of virtually all active genes. The related mammalian ING proteins act as readers and writers of the histone epigenetic code, affecting DNA damage response, chromatin remodeling, cellular senescence, differentiation, cell cycle regulation, and apoptosis. They may have a general role in mediating the cellular response to genotoxic stress through binding to and regulating the activities of histone acetyltransferase (HAT) and histone deacetylase (HDAC) chromatin remodeling complexes. All ING proteins contain an N-terminal leucine zipper-like (LZL) motif-containing ING domain that binds unmodified H3 tails, and a well-characterized C-terminal plant homeodomain (PHD)-type zinc-finger domain, which binds lysine 4-tri-methylated histone H3 (H3K4me3). Although these two regions can bind histones independently, together they increase the apparent association of the ING domain for the H3 tail."
definition: >-
  Inhibitor of growth (ING) domain of plant inhibitor of growth proteins. This subfamily is composed of mainly plant inhibitor of growth proteins such as Arabidopsis thaliana ING1 (AtING1 or PHD finger protein ING1) and ING2 (AtING2 or PHD finger protein ING2). They are histone-binding components that specifically recognizes H3 tails trimethylated on 'Lys-4' (H3K4me3), which mark transcription start sites of virtually all active genes. The related mammalian ING proteins act as readers and writers of the histone epigenetic code, affecting DNA damage response, chromatin remodeling, cellular senescence, differentiation, cell cycle regulation, and apoptosis. They may have a general role in mediating the cellular response to genotoxic stress through binding to and regulating the activities of histone acetyltransferase (HAT) and histone deacetylase (HDAC) chromatin remodeling complexes. All ING proteins contain an N-terminal leucine zipper-like (LZL) motif-containing ING domain that binds unmodified H3 tails, and a well-characterized C-terminal plant homeodomain (PHD)-type zinc-finger domain, which binds lysine 4-tri-methylated histone H3 (H3K4me3). Although these two regions can bind histones independently, together they increase the apparent association of the ING domain for the H3 tail. — an NCBI CDD conserved domain (cd17015); members share this curated model.
