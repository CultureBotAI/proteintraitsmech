identifier: CDD:cd06755
label: "PDZ domain of Rap guanine nucleotide exchange factor 2 and Rap guanine nucleotide exchange factor 6, and related domains. PDZ (PSD-95 (Postsynaptic density protein 95), Dlg (Discs large protein), and ZO-1 (Zonula occludens-1)) domain of Rap guanine nucleotide exchange factor 2 (RapGEF2, also named RA-GEF-1, PDZ-GEF1, CNrasGEF and nRapGEP) and Rap guanine nucleotide exchange factor 6 (RapGEF6, also named RA-GEF-2 and PDZ-GEF2). RapGEF2 and RapGEF6 constitute a subfamily of guanine nucleotide exchange factors (GEFs) for RAP small GTPases that is characterized by the possession of the PDZ and Ras/Rap-associating domains. They activate Rap small GTPases, by catalyzing the release of GDP from the inactive GDP-bound forms, thereby accelerating GTP loading to yield the active GTP-bound forms. The PDZ domain of RapGEF6 (also known as PDZ-GEF2) binds junctional adhesion molecule A (JAM-A). PDZ domains usually bind in a sequence-specific manner to short peptide sequences located at the C-terminal end of their partner proteins (known as PDZ binding motifs). The PDZ superfamily includes canonical PDZ domains as well as those with circular permutations and domain swapping mediated by beta-strands. This RapGEF2 and RapGEF6 family domain is a canonical PDZ domain containing six beta-strands A-F and two alpha-helices (alpha-helix 1 and 2), arranged in the order: beta-strands A, B, C, alpha-helix 1, beta-strands D, E, alpha-helix 2 and beta-strand F."
