identifier: CDD:cd02555
label: "Pseudouridine synthase, a subgroup of the RsuA family. This group is comprised of bacterial proteins assigned to the RsuA family of pseudouridine synthases. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi).  No cofactors are required. The TruA family is comprised of proteins related to Escherichia coli RsuA."
definition: >-
  Pseudouridine synthase, a subgroup of the RsuA family. This group is comprised of bacterial proteins assigned to the RsuA family of pseudouridine synthases. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi). No cofactors are required. The TruA family is comprised of proteins related to Escherichia coli RsuA. — an NCBI CDD conserved domain (cd02555); members share this curated model.
