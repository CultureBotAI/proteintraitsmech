identifier: CDD:cd05939
label: "Fatty acid transport proteins (FATP), including FATP4 and FATP1, and similar proteins. Fatty acid transport protein (FATP) transports long-chain or very-long-chain fatty acids across the plasma membrane. At least five copies of FATPs are identified in mammalian cells. This family includes FATP4, FATP1, and homologous proteins. Each FATP has unique patterns of tissue distribution. FATP4 is mainly expressed in the brain, testis, colon and kidney. FATPs also have fatty acid CoA synthetase activity, thus playing dual roles as fatty acid transporters and its activation enzymes. FATPs are the key players in the trafficking of exogenous fatty acids into the cell and in intracellular fatty acid homeostasis."
definition: >-
