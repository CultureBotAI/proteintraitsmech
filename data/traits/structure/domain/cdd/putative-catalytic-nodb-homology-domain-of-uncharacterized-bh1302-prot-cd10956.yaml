identifier: CDD:cd10956
label: "Putative catalytic NodB homology domain of uncharacterized BH1302 protein from Bacillus halodurans and its bacterial homologs. This family is represented by a putative polysaccharide deacetylase BH1302 from Bacillus halodurans. Although its biological function is unknown, BH1302 shows high sequence homology to the catalytic NodB homology domain of Streptococcus pneumoniae polysaccharide deacetylase PgdA (SpPgdA), which is an extracellular metal-dependent polysaccharide deacetylase with de-N-acetylase activity toward a hexamer of chitooligosaccharide N-acetylglucosamine, but not shorter chitooligosaccharides or a synthetic peptidoglycan tetrasaccharide. Both BH1302 and SpPgdA belong to the carbohydrate esterase 4 (CE4) superfamily. This family also includes many uncharacterized bacterial polysaccharide deacetylases."
definition: >-
