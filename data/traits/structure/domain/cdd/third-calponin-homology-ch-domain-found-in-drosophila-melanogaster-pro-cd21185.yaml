identifier: CDD:cd21185
label: "third calponin homology (CH) domain found in Drosophila melanogaster protein jitterbug and similar proteins. Protein jitterbug (Jbug) is an actin-meshwork organizing protein. It is required to maintain the shape and cell orientation of the Drosophila notum epithelium during flight muscle attachment to tendon cells. Jbug contains three copies of the CH domain. This model corresponds to the third CH domain. CH domains are actin filament (F-actin) binding motifs."
definition: >-
  third calponin homology (CH) domain found in Drosophila melanogaster protein jitterbug and similar proteins. Protein jitterbug (Jbug) is an actin-meshwork organizing protein. It is required to maintain the shape and cell orientation of the Drosophila notum epithelium during flight muscle attachment to tendon cells. Jbug contains three copies of the CH domain. This model corresponds to the third CH domain. CH domains are actin filament (F-actin) binding motifs. — an NCBI CDD conserved domain (cd21185); members share this curated model.
