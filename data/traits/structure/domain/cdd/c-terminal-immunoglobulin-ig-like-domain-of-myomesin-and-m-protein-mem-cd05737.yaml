identifier: CDD:cd05737
label: "C-terminal immunoglobulin (Ig)-like domain of myomesin and M-protein; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the C-terminal immunoglobulin (Ig)-like domain of myomesin and M-protein (also known as myomesin-2). Myomesin and M-protein are both structural proteins localized to the M-band, a transverse structure in the center of the sarcomere, and are candidates for M-band bridges. Both proteins are modular, consisting mainly of repetitive Ig-like and fibronectin type III (FnIII) domains. Myomesin is expressed in all types of vertebrate striated muscle; M-protein has a muscle-type specific expression pattern. Myomesin is present in both slow and fast fibers; M-protein is present only in fast fibers. It has been suggested that myomesin acts as a molecular spring with alternative splicing as a means of modifying its elasticity."
definition: >-
  C-terminal immunoglobulin (Ig)-like domain of myomesin and M-protein; member of the I-set of Ig superfamily (IgSF) domains. The members here are composed of the C-terminal immunoglobulin (Ig)-like domain of myomesin and M-protein (also known as myomesin-2). Myomesin and M-protein are both structural proteins localized to the M-band, a transverse structure in the center of the sarcomere, and are candidates for M-band bridges. Both proteins are modular, consisting mainly of repetitive Ig-like and fibronectin type III (FnIII) domains. Myomesin is expressed in all types of vertebrate striated muscle; M-protein has a muscle-type specific expression pattern. Myomesin is present in both slow and fast fibers; M-protein is present only in fast fibers. It has been suggested that myomesin acts as a molecular spring with alternative splicing as a means of modifying its elasticity. — an NCBI CDD conserved domain (cd05737); members share this curated model.
