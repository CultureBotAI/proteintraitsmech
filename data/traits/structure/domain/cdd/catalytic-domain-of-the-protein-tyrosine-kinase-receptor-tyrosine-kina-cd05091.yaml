identifier: CDD:cd05091
label: "Catalytic domain of the Protein Tyrosine Kinase, Receptor tyrosine kinase-like Orphan Receptor 2. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Ror2 plays important roles in skeletal and heart formation. Ror2-deficient mice show widespread bone abnormalities, ventricular defects in the heart, and respiratory dysfunction. Mutations in human Ror2 result in two different bone development genetic disorders, recessive Robinow syndrome and brachydactyly type B. Ror2 is also implicated in neural development. Ror proteins are orphan receptor PTKs (RTKs) containing an extracellular region with immunoglobulin-like, cysteine-rich, and kringle domains, a transmembrane segment, and an intracellular catalytic domain. Ror RTKs are unrelated to the nuclear receptor subfamily called retinoid-related orphan receptors (RORs). RTKs are usually activated through ligand binding, which causes dimerization and autophosphorylation of the intracellular tyr kinase catalytic domain. The Ror2 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the Protein Tyrosine Kinase, Receptor tyrosine kinase-like Orphan Receptor 2. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Ror2 plays important roles in skeletal and heart formation. Ror2-deficient mice show widespread bone abnormalities, ventricular defects in the heart, and respiratory dysfunction. Mutations in human Ror2 result in two different bone development genetic disorders, recessive Robinow syndrome and brachydactyly type B. Ror2 is also implicated in neural development. Ror proteins are orphan receptor PTKs (RTKs) containing an extracellular region with immunoglobulin-like, cysteine-rich, and kringle domains, a transmembrane segment, and an intracellular catalytic domain. Ror RTKs are unrelated to the nuclear receptor subfamily called retinoid-related orphan receptors (RORs). RTKs are usually activated through ligand binding, which causes dimerization and autophosphorylation of the intracellular tyr kinase catalytic domain. The Ror2 subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05091); members share this curated model.
