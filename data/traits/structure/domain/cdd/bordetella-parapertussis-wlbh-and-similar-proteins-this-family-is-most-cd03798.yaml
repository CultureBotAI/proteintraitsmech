identifier: CDD:cd03798
label: "Bordetella parapertussis WlbH and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. Staphylococcus aureus CapJ may be involved in capsule polysaccharide biosynthesis. WlbH in Bordetella parapertussis has been shown to be required for the biosynthesis of a trisaccharide that, when attached to the B. pertussis lipopolysaccharide (LPS) core (band B), generates band A LPS."
definition: >-
  Bordetella parapertussis WlbH and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. Staphylococcus aureus CapJ may be involved in capsule polysaccharide biosynthesis. WlbH in Bordetella parapertussis has been shown to be required for the biosynthesis of a trisaccharide that, when attached to the B. pertussis lipopolysaccharide (LPS) core (band B), generates band A LPS. — an NCBI CDD conserved domain (cd03798); members share this curated model.
