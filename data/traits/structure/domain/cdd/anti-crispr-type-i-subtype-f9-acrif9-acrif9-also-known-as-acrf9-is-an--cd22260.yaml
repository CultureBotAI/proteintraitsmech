identifier: CDD:cd22260
label: "Anti-CRISPR type I subtype F9 (AcrIF9). AcrIF9 (also known as AcrF9) is an anti-CRISPR (Acr) protein that was discovered via the guilt-by association (GBA) method, and subsequently confirmed by structural and functional assays to inhibit the type I-F CRISPR-Cas system. GBA is based on the strong co-occurrence and clustering of acr and anti-CRISPR associated (aca) genes through proximity and homology searches. The AcrIF9 family is one of the largest and most diverse families of I-F Acrs. Among the 14 AcrIF proteins, at least nine (AcrIF1, AcrIF2, AcrIF4, AcrIF6, AcrIF7, AcrIF8, AcrIF9, AcrIF10 and AcrIF14) stably bind to the Cas surveillance complex (Csy) to inhibit recruitment of either target DNA or nuclease, suggesting direct association with the Csy complex is a major means for inhibition among AcrIF proteins. AcrIF9 exists in monomeric form in solution and can directly bind to DNA using a positively charged cleft. AcrIF9 binds to the Csy complex, thereby sterically blocking the hybridization of target DNA to the CRISPR RNA (crRNA). The Csy-AcrIF9 complex binds to dsDNA in a non-sequence specific manner, needing neither a protospacer associated motif (PAM) nor complementarity to the crRNA. AcrIF9 gives the Csy complex the ability to interact with non-sequence specific dsDNA, as does AcrIF14. The type I-F Csy complex is a crRNA-guided surveillance complex comprised of a crRNA and Cas proteins, which recruits a nuclease-helicase protein Cas3 for target degradation. Type I-F Cas proteins include Cas8f, Cas5f, Cas6f, and Cas7f, in the case of subtypes I-F1 and I-F3, and Cas5f, Cas6f, and Cas7f, in the case of subtype I-F2. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 1 systems utilize RNA-guided complexes consisting of multiple Cas proteins as the effector proteins to recognize and cleave target DNA. Type I CRISPR-Cas systems are the most widespread in nature, and the Cas protein composition of the employed CRISPR ribonucleoprotein (crRNP) complexes differs between nine subtypes (A, B, C, G, D, E, F1, F3, and F2). Acr families are named for their type and subtype which are numbered sequentially as they are discovered."
definition: >-
  Anti-CRISPR type I subtype F9 (AcrIF9). AcrIF9 (also known as AcrF9) is an anti-CRISPR (Acr) protein that was discovered via the guilt-by association (GBA) method, and subsequently confirmed by structural and functional assays to inhibit the type I-F CRISPR-Cas system. GBA is based on the strong co-occurrence and clustering of acr and anti-CRISPR associated (aca) genes through proximity and homology searches. The AcrIF9 family is one of the largest and most diverse families of I-F Acrs. Among the 14 AcrIF proteins, at least nine (AcrIF1, AcrIF2, AcrIF4, AcrIF6, AcrIF7, AcrIF8, AcrIF9, AcrIF10 and AcrIF14) stably bind to the Cas surveillance complex (Csy) to inhibit recruitment of either target DNA or nuclease, suggesting direct association with the Csy complex is a major means for inhibition among AcrIF proteins. AcrIF9 exists in monomeric form in solution and can directly bind to DNA using a positively charged cleft. AcrIF9 binds to the Csy complex, thereby sterically blocking the hybridization of target DNA to the CRISPR RNA (crRNA). The Csy-AcrIF9 complex binds to dsDNA in a non-sequence specific manner, needing neither a protospacer associated motif (PAM) nor complementarity to the crRNA. AcrIF9 gives the Csy complex the ability to interact with non-sequence specific dsDNA, as does AcrIF14. The type I-F Csy complex is a crRNA-guided surveillance complex comprised of a crRNA and Cas proteins, which recruits a nuclease-helicase protein Cas3 for target degradation. Type I-F Cas proteins include Cas8f, Cas5f, Cas6f, and Cas7f, in the case of subtypes I-F1 and I-F3, and Cas5f, Cas6f, and Cas7f, in the case of subtype I-F2. CRISPR-Cas immune systems are used by certain prokaryotes and archaea to resist the invasion of foreign nucleic acids such as phages or plasmids. Anti-CRISPRs are small proteins which are the natural inhibitors for CRISPR-Cas systems; encoded on bacterial and archaeal viruses, they allow the virus to evade host CRISPR-Cas systems. The CRISPR-Cas-mediated adaptive immune response can be divided into three steps, including the acquisition of spacer derived from invading nucleic acids, crRNA processing, and target degradation. Theoretically, Acr proteins could suppress any step to disrupt the CRISPR-Cas system. Acr proteins are diverse with no common sequence or structural motif, and they inhibit a wide range of CRISPR-Cas systems with various inhibition mechanisms. CRISPR-Cas systems are divided into two classes (1 and 2) and six types (class 1: types I, III and IV; class 2: types II, V and VI). Class 1 systems utilize RNA-guided complexes consisting of multiple Cas proteins as the effector proteins to recognize and cleave target DNA. Type I CRISPR-Cas systems are the most widespread in nature, and the Cas protein composition of the employed CRISPR ribonucleoprotein (crRNP) complexes differs between nine subtypes (A, B, C, G, D, E, F1, F3, and F2). Acr families are named for their type and subtype which are numbered sequentially as they are discovered. — an NCBI CDD conserved domain (cd22260); members share this curated model.
