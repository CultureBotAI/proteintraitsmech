identifier: CDD:cd10367
label: "Src homology 2 (SH2) domain found in Gardner-Rasheed feline sarcoma viral (v-fgr) oncogene homolog, Fgr. Fgr is a member of the Src non-receptor type tyrosine kinase family of proteins. The protein contains N-terminal sites for myristoylation and palmitoylation, a PTK domain, and SH2 and SH3 domains which are involved in mediating protein-protein interactions with phosphotyrosine-containing and proline-rich motifs, respectively. Fgr is expressed in B-cells and myeloid cells, localizes to plasma membrane ruffles, and functions as a negative regulator of cell migration and adhesion triggered by the beta-2 integrin signal transduction pathway. Multiple alternatively spliced variants, encoding the same protein, have been identified  Fgr has been shown to interact with Wiskott-Aldrich syndrome protein. Fgr has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites."
definition: >-
  Src homology 2 (SH2) domain found in Gardner-Rasheed feline sarcoma viral (v-fgr) oncogene homolog, Fgr. Fgr is a member of the Src non-receptor type tyrosine kinase family of proteins. The protein contains N-terminal sites for myristoylation and palmitoylation, a PTK domain, and SH2 and SH3 domains which are involved in mediating protein-protein interactions with phosphotyrosine-containing and proline-rich motifs, respectively. Fgr is expressed in B-cells and myeloid cells, localizes to plasma membrane ruffles, and functions as a negative regulator of cell migration and adhesion triggered by the beta-2 integrin signal transduction pathway. Multiple alternatively spliced variants, encoding the same protein, have been identified Fgr has been shown to interact with Wiskott-Aldrich syndrome protein. Fgr has a unique N-terminal domain, an SH3 domain, an SH2 domain, a kinase domain and a regulatory tail, as do the other members of the family. In general SH2 domains are involved in signal transduction. They typically bind pTyr-containing ligands via two surface pockets, a pTyr and hydrophobic binding pocket, allowing proteins with SH2 domains to localize to tyrosine phosphorylated sites. — an NCBI CDD conserved domain (cd10367); members share this curated model.
