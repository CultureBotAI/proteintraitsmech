identifier: CDD:cd01149
label: "Hemin binding protein HutB.  These proteins have been shown to function as initial receptors in ABC transport of hemin and hemoproteins in many eubacterial species.  They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind the metal ion in the cleft between these domains."
definition: >-
  Hemin binding protein HutB. These proteins have been shown to function as initial receptors in ABC transport of hemin and hemoproteins in many eubacterial species. They belong to the TroA superfamily of periplasmic metal binding proteins that share a distinct fold and ligand binding mechanism. A typical TroA protein is comprised of two globular subdomains connected by a single helix and can bind the metal ion in the cleft between these domains. — an NCBI CDD conserved domain (cd01149); members share this curated model.
