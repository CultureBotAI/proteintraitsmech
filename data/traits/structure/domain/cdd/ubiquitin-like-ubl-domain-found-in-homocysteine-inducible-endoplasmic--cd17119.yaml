identifier: CDD:cd17119
label: "ubiquitin-like (Ubl) domain found in homocysteine-inducible endoplasmic reticulum stress protein HERP2 and similar proteins. HERP2, also termed homocysteine-responsive endoplasmic reticulum-resident ubiquitin-like domain member 2 protein (HERPUD2), is an endoplasmic reticulum (ER) integral membrane protein containing an N-terminal ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold. It is homologous to HERP1, and could be involved in the unfolded protein response (UPR) pathway. It regulates the ubiquitin ligase HRD1-dependent protein degradation at the ER."
definition: >-
  ubiquitin-like (Ubl) domain found in homocysteine-inducible endoplasmic reticulum stress protein HERP2 and similar proteins. HERP2, also termed homocysteine-responsive endoplasmic reticulum-resident ubiquitin-like domain member 2 protein (HERPUD2), is an endoplasmic reticulum (ER) integral membrane protein containing an N-terminal ubiquitin-like (Ubl) domain with a beta-grasp Ubl fold. It is homologous to HERP1, and could be involved in the unfolded protein response (UPR) pathway. It regulates the ubiquitin ligase HRD1-dependent protein degradation at the ER. — an NCBI CDD conserved domain (cd17119); members share this curated model.
