identifier: CDD:cd20195
label: "DNA-binding domain of MAX gene-associated protein and related T-box proteins. MGA (also known as MGAP, MAX dimerization protein, MAD5, MXD5) is a dual-specificity transcription factor that regulates the expression of both, MAX-network and T-box family target genes. MGA functions as a repressor or an activator; it binds to 5'-AATTTCACACCTAGGTGTGAAATT-3' core sequence. Its function is activated by heterodimerization with MAX. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved  DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns."
definition: >-
  DNA-binding domain of MAX gene-associated protein and related T-box proteins. MGA (also known as MGAP, MAX dimerization protein, MAD5, MXD5) is a dual-specificity transcription factor that regulates the expression of both, MAX-network and T-box family target genes. MGA functions as a repressor or an activator; it binds to 5'-AATTTCACACCTAGGTGTGAAATT-3' core sequence. Its function is activated by heterodimerization with MAX. This subfamily belongs to the T-box family of transcription factors which play a multitude of diverse functions throughout development. The founding member of the T-box family is Brachyury (also known as TBXT, or T). T-box family members share a conserved DNA-binding domain (T-box) which binds DNA in a sequence-specific manner. Common features shared by T-box family members are DNA-binding and transcriptional regulatory activity, a role in development, and conserved expression patterns. — an NCBI CDD conserved domain (cd20195); members share this curated model.
