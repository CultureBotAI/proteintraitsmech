identifier: CDD:cd03896
label: "M20 Peptidases, Poly(aspartic acid) hydrolase-like proteins. Peptidase M20 family, Poly(aspartic acid) hydrolase (PAA hydrolase)-like subfamily. PAA hydrolase enzymes are involved in alpha,beta-poly(D,L-aspartic acid) (tPAA) biodegradation. PAA is being extensively studied as a replacement for commercial polycarboxylate components since it can be degraded by enzymes from isolated tPAA degrading bacteria. Thus far, two types of PAA degrading bacteria (Sphingomonas sp. KT-1 and Pedobacter sp. KP-2) have been investigated in detail; the former can completely degrade tPAA of low-molecular weights below 5000, while the latter can degrade high molecular weight tPAA to release oligo(aspartic acid) (OAA) as a product, suggesting two kinds of PAA degrading enzymes. It has been shown that PAA hydrolase-1 from Sphingomonas sp. KT-1 hydrolyzes beta,beta-aspartic acid units in tPAA to produce OAA, and it is suggested that PAA hydrolase-2 hydrolyzes OAA to aspartic acid. Also included in this family is Bradyrhizobium 5-nitroanthranilic acid (5NAA)-aminohydrolase (5NAA-A), a biodegradation enzyme that converts 5NAA to 5-nitrosalicylic acid; 5NAA is a metabolite secreted by Streptomyces scabies, the bacterium responsible for potato scab, and metabolized by Bradyrhizobium species strain JS329."
definition: >-
  M20 Peptidases, Poly(aspartic acid) hydrolase-like proteins. Peptidase M20 family, Poly(aspartic acid) hydrolase (PAA hydrolase)-like subfamily. PAA hydrolase enzymes are involved in alpha,beta-poly(D,L-aspartic acid) (tPAA) biodegradation. PAA is being extensively studied as a replacement for commercial polycarboxylate components since it can be degraded by enzymes from isolated tPAA degrading bacteria. Thus far, two types of PAA degrading bacteria (Sphingomonas sp. KT-1 and Pedobacter sp. KP-2) have been investigated in detail; the former can completely degrade tPAA of low-molecular weights below 5000, while the latter can degrade high molecular weight tPAA to release oligo(aspartic acid) (OAA) as a product, suggesting two kinds of PAA degrading enzymes. It has been shown that PAA hydrolase-1 from Sphingomonas sp. KT-1 hydrolyzes beta,beta-aspartic acid units in tPAA to produce OAA, and it is suggested that PAA hydrolase-2 hydrolyzes OAA to aspartic acid. Also included in this family is Bradyrhizobium 5-nitroanthranilic acid (5NAA)-aminohydrolase (5NAA-A), a biodegradation enzyme that converts 5NAA to 5-nitrosalicylic acid; 5NAA is a metabolite secreted by Streptomyces scabies, the bacterium responsible for potato scab, and metabolized by Bradyrhizobium species strain JS329. — an NCBI CDD conserved domain (cd03896); members share this curated model.
