identifier: CDD:cd16976
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Rhodobacter capsulatus HupT and Pseudomonas aeruginosa MifS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Rhodobacter capsulatus HupT of the HupT-HupR two-component regulatory system (TCS), which regulates the synthesis of HupSL, a membrane bound [NiFe]hydrogenase. It also contains the HATPase domain of Pseudomonas aeruginosa MifS, the HK of the MifS-MifR TCS, which may be involved in sensing alpha-ketoglutarate and regulating its transport and subsequent metabolism. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some also have a C-terminal PAS sensor domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Rhodobacter capsulatus HupT and Pseudomonas aeruginosa MifS. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Rhodobacter capsulatus HupT of the HupT-HupR two-component regulatory system (TCS), which regulates the synthesis of HupSL, a membrane bound [NiFe]hydrogenase. It also contains the HATPase domain of Pseudomonas aeruginosa MifS, the HK of the MifS-MifR TCS, which may be involved in sensing alpha-ketoglutarate and regulating its transport and subsequent metabolism. Proteins having this HATPase domain also contain a histidine kinase dimerization and phosphoacceptor domain (HisKA); some also have a C-terminal PAS sensor domain. — an NCBI CDD conserved domain (cd16976); members share this curated model.
