identifier: CDD:cd12498
label: "RNA recognition motif 3 (RRM3) found in vertebrate APOBEC-1 complementation factor (ACF). This subgroup corresponds to the RRM3 of ACF, also termed APOBEC-1-stimulating protein, an RNA-binding subunit of a core complex that interacts with apoB mRNA to facilitate C to U RNA editing. It may also act as an apoB mRNA recognition factor and chaperone and play a key role in cell growth and differentiation. ACF shuttles between the cytoplasm and nucleus. ACF contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), which display high affinity for an 11 nucleotide AU-rich mooring sequence 3' of the edited cytidine in apoB mRNA. All three RRMs may be required for complementation of editing activity in living cells. RRM2/3 are implicated in ACF interaction with APOBEC-1."
definition: >-
  RNA recognition motif 3 (RRM3) found in vertebrate APOBEC-1 complementation factor (ACF). This subgroup corresponds to the RRM3 of ACF, also termed APOBEC-1-stimulating protein, an RNA-binding subunit of a core complex that interacts with apoB mRNA to facilitate C to U RNA editing. It may also act as an apoB mRNA recognition factor and chaperone and play a key role in cell growth and differentiation. ACF shuttles between the cytoplasm and nucleus. ACF contains three RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), which display high affinity for an 11 nucleotide AU-rich mooring sequence 3' of the edited cytidine in apoB mRNA. All three RRMs may be required for complementation of editing activity in living cells. RRM2/3 are implicated in ACF interaction with APOBEC-1. — an NCBI CDD conserved domain (cd12498); members share this curated model.
