identifier: CDD:cd22692
label: "forkhead associated (FHA) domain found in Saccharomyces cerevisiae defective in mitotic arrest protein 1 (DMA1), 2 (DMA2) and similar proteins. DMA1 (also known as checkpoint forkhead associated with RING domains-containing protein 1, or CHF1) and DMA2 (also known as checkpoint forkhead associated with RING domains-containing protein 2, or CHF2) are E3 ubiquitin-protein ligases which function in cell cycle retarding in conjunction with the UBC4 and UBC13/MMS2 complex, two E2 ubiquitin conjugating enzymes. They are involved in nutritional control of the cell cycle and required for proper spindle positioning, likely regulating septin ring deposition at the bud neck. DMA1 targets the degradation of G1 cyclin PCL1. The FHA domain is a small phosphopeptide recognition module."
definition: >-
  forkhead associated (FHA) domain found in Saccharomyces cerevisiae defective in mitotic arrest protein 1 (DMA1), 2 (DMA2) and similar proteins. DMA1 (also known as checkpoint forkhead associated with RING domains-containing protein 1, or CHF1) and DMA2 (also known as checkpoint forkhead associated with RING domains-containing protein 2, or CHF2) are E3 ubiquitin-protein ligases which function in cell cycle retarding in conjunction with the UBC4 and UBC13/MMS2 complex, two E2 ubiquitin conjugating enzymes. They are involved in nutritional control of the cell cycle and required for proper spindle positioning, likely regulating septin ring deposition at the bud neck. DMA1 targets the degradation of G1 cyclin PCL1. The FHA domain is a small phosphopeptide recognition module. — an NCBI CDD conserved domain (cd22692); members share this curated model.
