identifier: CDD:cd14076
label: "Catalytic domain of the yeast Serine/Threonine Kinase, Kin4. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Kin4 is a central component of the spindle position checkpoint (SPOC), which monitors spindle position and regulates the mitotic exit network (MEN). Kin4 associates with spindle pole bodies in mother cells to inhibit MEN signaling and delay mitosis until the anaphase nucleus is properly positioned along the mother-bud axis. Kin4 activity is regulated by both the bud neck-associated kinase Elm1 and protein phosphatase 2A. The Kin4 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the yeast Serine/Threonine Kinase, Kin4. STKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine residues on protein substrates. Kin4 is a central component of the spindle position checkpoint (SPOC), which monitors spindle position and regulates the mitotic exit network (MEN). Kin4 associates with spindle pole bodies in mother cells to inhibit MEN signaling and delay mitosis until the anaphase nucleus is properly positioned along the mother-bud axis. Kin4 activity is regulated by both the bud neck-associated kinase Elm1 and protein phosphatase 2A. The Kin4 subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14076); members share this curated model.
