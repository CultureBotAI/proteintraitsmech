identifier: CDD:cd23553
label: "extracellular domain (ECD) found in Danio rerio lymphocyte antigen 6 family member PGE (Ly6PGE) and similar proteins. Ly6PGE is an uncharacterized Ly-6/uPAR family protein. It contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Danio rerio lymphocyte antigen 6 family member PGE (Ly6PGE) and similar proteins. Ly6PGE is an uncharacterized Ly-6/uPAR family protein. It contains an extracellular domain (ECD) which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23553); members share this curated model.
