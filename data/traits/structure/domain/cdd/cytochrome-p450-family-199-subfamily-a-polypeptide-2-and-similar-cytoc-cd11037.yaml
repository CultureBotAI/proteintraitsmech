identifier: CDD:cd11037
label: "cytochrome P450 family 199, subfamily A, polypeptide 2 and similar cytochrome P450s. This family is composed of cytochrome P450s (CYPs) with similarity to Rhodopseudomonas palustris CYP199A2 and CYP199A4. CYP199A2 catalyzes the oxidation of aromatic carboxylic acids including indole-2-carboxylic acid, 2-naphthoic acid and 4-ethylbenzoic acid. CYP199A4 catalyzes the hydroxylation of para-substituted benzoic acids. This family belongs to the large cytochrome P450 (P450, CYP) superfamily of heme-containing proteins that catalyze a variety of oxidative reactions of a large number of structurally different endogenous and exogenous compounds in organisms from all major domains of life. CYPs bind their diverse ligands in a buried, hydrophobic active site, which is accessed through a substrate access channel formed by two flexible helices and their connecting loop."
