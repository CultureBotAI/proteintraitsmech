identifier: CDD:cd10559
label: "tungsten-containing formate dehydrogenase, small subunit. This subfamily contains beta subunit of Tungsten-containing formate dehydrogenase (W-FDH), a member of the DMSO reductase family. W-FDH contains a tungsten instead of molybdenum at the catalytic center. This enzyme seems to be exclusively found in organisms such as hyperthermophilic archaea that live in extreme environments. It is a heterodimer of a large and a small subunit; the large subunit harbors the W site and one [4Fe-4S] center and the small subunit, containing three [4Fe-4S] clusters, functions to transfer electrons."
definition: >-
  tungsten-containing formate dehydrogenase, small subunit. This subfamily contains beta subunit of Tungsten-containing formate dehydrogenase (W-FDH), a member of the DMSO reductase family. W-FDH contains a tungsten instead of molybdenum at the catalytic center. This enzyme seems to be exclusively found in organisms such as hyperthermophilic archaea that live in extreme environments. It is a heterodimer of a large and a small subunit; the large subunit harbors the W site and one [4Fe-4S] center and the small subunit, containing three [4Fe-4S] clusters, functions to transfer electrons. — an NCBI CDD conserved domain (cd10559); members share this curated model.
