identifier: CDD:cd17873
label: "signal-recognition particle GTPase FlhF. FlhF protein is a signal-recognition particle (SRP)-type GTPase that is essential for the placement and assembly of polar flagella. It is similar to the 54 kd subunit (SRP54) of the signal recognition particle (SRP) that mediates the transport to or across the plasma membrane in bacteria and the endoplasmic reticulum in eukaryotes. SRP recognizes N-terminal signal sequences of newly synthesized polypeptides at the ribosome. The SRP-polypeptide complex is then targeted to the membrane by an interaction between SRP and its cognated receptor (SR)."
definition: >-
  signal-recognition particle GTPase FlhF. FlhF protein is a signal-recognition particle (SRP)-type GTPase that is essential for the placement and assembly of polar flagella. It is similar to the 54 kd subunit (SRP54) of the signal recognition particle (SRP) that mediates the transport to or across the plasma membrane in bacteria and the endoplasmic reticulum in eukaryotes. SRP recognizes N-terminal signal sequences of newly synthesized polypeptides at the ribosome. The SRP-polypeptide complex is then targeted to the membrane by an interaction between SRP and its cognated receptor (SR). — an NCBI CDD conserved domain (cd17873); members share this curated model.
