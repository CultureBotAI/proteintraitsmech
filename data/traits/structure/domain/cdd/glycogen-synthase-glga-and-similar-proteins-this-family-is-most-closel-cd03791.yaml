identifier: CDD:cd03791
label: "Glycogen synthase GlgA and similar proteins. This family is most closely related to the GT5 family of glycosyltransferases. Glycogen synthase (EC:2.4.1.21) catalyzes the formation and elongation of the alpha-1,4-glucose backbone using ADP-glucose, the second and key step of glycogen biosynthesis. This family includes starch synthases of plants, such as DULL1 in Zea mays and glycogen synthases of various organisms."
definition: >-
  Glycogen synthase GlgA and similar proteins. This family is most closely related to the GT5 family of glycosyltransferases. Glycogen synthase (EC:2.4.1.21) catalyzes the formation and elongation of the alpha-1,4-glucose backbone using ADP-glucose, the second and key step of glycogen biosynthesis. This family includes starch synthases of plants, such as DULL1 in Zea mays and glycogen synthases of various organisms. — an NCBI CDD conserved domain (cd03791); members share this curated model.
