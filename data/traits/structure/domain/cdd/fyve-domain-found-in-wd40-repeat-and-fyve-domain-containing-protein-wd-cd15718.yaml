identifier: CDD:cd15718
label: "FYVE domain found in WD40 repeat and FYVE domain-containing protein WDFY1 and WDFY2, and similar proteins. This family includes WD40 repeat and FYVE domain-containing protein WDFY1 and WDFY2. WDFY1, also termed FYVE domain containing protein localized to endosomes-1 (FENS-1), or phosphoinositide-binding protein 1, or zinc finger FYVE domain-containing protein 17, is a novel single FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. WDFY1 to early endosomes requires an intact FYVE domain and is inhibited by wortmannin, a PI3-kinase inhibitor. WDFY2, also termed zinc finger FYVE domain-containing protein 22, or ProF (propeller-FYVE protein), is a phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding protein that is localized to a distinct subset of early endosomes close to the plasma membrane. It interacts preferentially with endogenous serine/threonine kinase Akt2, but not Akt1, and plays a specific role in modulating signaling through Akt downstream of the interaction of this kinase with the endosomal proteins APPL (adaptor protein containing PH domain, PTB domain, and leucine zipper motif). In addition to Akt, WDFY2 serves as a binding partner for protein kinase C, zeta (PRKCZ), and its substrate vesicle-associated membrane protein 2 (VAMP2), and is involved in vesicle cycling in various secretory pathways. Moreover, Silencing of WDFY2 by siRNA produces a strong inhibition of endocytosis. Both WDFY1 and WDFY2 contain a FYVE domain and multiple WD-40 repeats."
definition: >-
  FYVE domain found in WD40 repeat and FYVE domain-containing protein WDFY1 and WDFY2, and similar proteins. This family includes WD40 repeat and FYVE domain-containing protein WDFY1 and WDFY2. WDFY1, also termed FYVE domain containing protein localized to endosomes-1 (FENS-1), or phosphoinositide-binding protein 1, or zinc finger FYVE domain-containing protein 17, is a novel single FYVE domain containing protein that binds phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) with high specificity over other phosphoinositides. WDFY1 to early endosomes requires an intact FYVE domain and is inhibited by wortmannin, a PI3-kinase inhibitor. WDFY2, also termed zinc finger FYVE domain-containing protein 22, or ProF (propeller-FYVE protein), is a phosphatidylinositol 3-phosphate (PtdIns3P or PI3P) binding protein that is localized to a distinct subset of early endosomes close to the plasma membrane. It interacts preferentially with endogenous serine/threonine kinase Akt2, but not Akt1, and plays a specific role in modulating signaling through Akt downstream of the interaction of this kinase with the endosomal proteins APPL (adaptor protein containing PH domain, PTB domain, and leucine zipper motif). In addition to Akt, WDFY2 serves as a binding partner for protein kinase C, zeta (PRKCZ), and its substrate vesicle-associated membrane protein 2 (VAMP2), and is involved in vesicle cycling in various secretory pathways. Moreover, Silencing of WDFY2 by siRNA produces a strong inhibition of endocytosis. Both WDFY1 and WDFY2 contain a FYVE domain and multiple WD-40 repeats. — an NCBI CDD conserved domain (cd15718); members share this curated model.
