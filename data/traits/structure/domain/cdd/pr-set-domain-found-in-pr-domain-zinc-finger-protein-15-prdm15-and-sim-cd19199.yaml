identifier: CDD:cd19199
label: "PR-SET domain found in PR domain zinc finger protein 15 (PRDM15) and similar proteins. PRDM15 (also termed PR domain-containing protein 15, or zinc finger protein 298 (ZNF298)) may be involved in transcriptional regulation. It plays an essential role as a chromatin factor that modulates the transcription of upstream regulators of WNT and MAPK-ERK signaling to safeguard naive pluripotency."
definition: >-
