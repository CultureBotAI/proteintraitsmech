identifier: CDD:cd08303
label: "ATP-grasp domain of D-ala-D-ala (EcDdl and StaDdlA type) and D-ala-D-lac (LmDdl type) ligases. ATP-grasp domain of D-ala-D-ala (EcDdl type) and D-ala-D-lac (LmDdl type) ligases. D-alanine:D-x ligase (Ddl, EC 6.3.2.4) is a bacterial cell wall synthesizing enzyme that catalyzes the ligation of two D-alanines (in case of D-ala-D-ala ligases) or D-alanine with D-lactate (in case of D-ala-D-lac ligases). These enzymes convert ATP to ADP during ligation raction where carboxylate substrate is D-alanine and amine or thiol substrate is either D-alanine or D-lactate. This reaction occurs in the presence of two Mg ions. Majority of the members of this group are D-ala-D-ala (DDala) type of ligases. EcDdlA (from Escherichia coli), StaDdl (from Staphylococcus aureus), and TcaDdl (from Thermus caldophilus) are DDala type of ligases which are sensitive to vancomycin. They have tyrosine corresponding to Y216 position of EcDdlB which is an indication of vancomycin sensitivity. LmDdl2 (Leuconostoc mesenteroides) is an example of DDlac type of ligase that is also included in this group. LmDdl2 is mildly resistant to vancomycin. It has phenylalanine corresponding to the Y216 position of EcDdlB which is an indication of vancomycin resistance. LmDdl2 has a five residue insertion in the w-loop which results into the substrate specificity shift from D-alanine to D-lactate."
definition: >-
  ATP-grasp domain of D-ala-D-ala (EcDdl and StaDdlA type) and D-ala-D-lac (LmDdl type) ligases. ATP-grasp domain of D-ala-D-ala (EcDdl type) and D-ala-D-lac (LmDdl type) ligases. D-alanine:D-x ligase (Ddl, EC 6.3.2.4) is a bacterial cell wall synthesizing enzyme that catalyzes the ligation of two D-alanines (in case of D-ala-D-ala ligases) or D-alanine with D-lactate (in case of D-ala-D-lac ligases). These enzymes convert ATP to ADP during ligation raction where carboxylate substrate is D-alanine and amine or thiol substrate is either D-alanine or D-lactate. This reaction occurs in the presence of two Mg ions. Majority of the members of this group are D-ala-D-ala (DDala) type of ligases. EcDdlA (from Escherichia coli), StaDdl (from Staphylococcus aureus), and TcaDdl (from Thermus caldophilus) are DDala type of ligases which are sensitive to vancomycin. They have tyrosine corresponding to Y216 position of EcDdlB which is an indication of vancomycin sensitivity. LmDdl2 (Leuconostoc mesenteroides) is an example of DDlac type of ligase that is also included in this group. LmDdl2 is mildly resistant to vancomycin. It has phenylalanine corresponding to the Y216 position of EcDdlB which is an indication of vancomycin resistance. LmDdl2 has a five residue insertion in the w-loop which results into the substrate specificity shift from D-alanine to D-lactate. — an NCBI CDD conserved domain (cd08303); members share this curated model.
