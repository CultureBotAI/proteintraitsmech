identifier: CDD:cd04468
label: "S1_eIF5A: Eukaryotic translation Initiation Factor 5A (eIF5A), S1-like RNA-binding domain. eIF5A is an evolutionarily conserved protein found in eukaryotes. eIF5A is the only protein known to have the unusual amino acid hypusine. Hypusine is essential for eIF5A function and is a post-translationally modified lysine. eIF5A interacts with components of the 80S ribosome and translation elongation factors 2 (eEF2) in a hypusine-dependent manner. This C-terminal S1 domain resembles the oligonucleotides-binding fold (OB fold) which binds RNA. Moreover, eIF5A prefers binding to the actively translating ribosome. This evidence suggests that eIF5A plays a role in translation elongation instead of translation initiation as previously proposed."
definition: >-
  S1_eIF5A: Eukaryotic translation Initiation Factor 5A (eIF5A), S1-like RNA-binding domain. eIF5A is an evolutionarily conserved protein found in eukaryotes. eIF5A is the only protein known to have the unusual amino acid hypusine. Hypusine is essential for eIF5A function and is a post-translationally modified lysine. eIF5A interacts with components of the 80S ribosome and translation elongation factors 2 (eEF2) in a hypusine-dependent manner. This C-terminal S1 domain resembles the oligonucleotides-binding fold (OB fold) which binds RNA. Moreover, eIF5A prefers binding to the actively translating ribosome. This evidence suggests that eIF5A plays a role in translation elongation instead of translation initiation as previously proposed. — an NCBI CDD conserved domain (cd04468); members share this curated model.
