identifier: CDD:cd05385
label: "CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of glioma pathogenesis-related protein 1 and similar proteins. Glioma pathogenesis-related protein 1 (GLIPR1) is also called related to testes-specific, vespid, and pathogenesis protein 1 (RTVP-1). The GLIPR1 gene has been identified as a p53 target gene and was shown to be methylated and down-regulated in prostate cancer. It is a novel broad-spectrum tumor suppressor whose proapoptotic properties are exerted in part through ROS-JNK signaling. GLIPR1 is composed of a signal peptide that directs its secretion, a CAP domain, and a transmembrane domain. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others."
definition: >-
  CAP (cysteine-rich secretory proteins, antigen 5, and pathogenesis-related 1 proteins) domain of glioma pathogenesis-related protein 1 and similar proteins. Glioma pathogenesis-related protein 1 (GLIPR1) is also called related to testes-specific, vespid, and pathogenesis protein 1 (RTVP-1). The GLIPR1 gene has been identified as a p53 target gene and was shown to be methylated and down-regulated in prostate cancer. It is a novel broad-spectrum tumor suppressor whose proapoptotic properties are exerted in part through ROS-JNK signaling. GLIPR1 is composed of a signal peptide that directs its secretion, a CAP domain, and a transmembrane domain. The wider family of CAP domain containing proteins includes plant pathogenesis-related protein 1 (PR-1), cysteine-rich secretory proteins (CRISPs), and allergen 5 from vespid venom, among others. — an NCBI CDD conserved domain (cd05385); members share this curated model.
