identifier: CDD:cd19904
label: "second double-stranded RNA binding motif of eukaryotic translation initiation factor 2-alpha kinase 2 (EIF2AK2) and similar proteins. EIF2AK2 (EC 2.7.11.1/EC 2.7.10.2; also known as interferon-induced, double-stranded RNA-activated protein kinase, eIF-2A protein kinase 2, interferon-inducible RNA-dependent protein kinase, P1/eIF-2A protein kinase, protein kinase RNA-activated (PKR), protein kinase R, tyrosine-protein kinase EIF2AK2, or p68 kinase) acts as an IFN-induced dsRNA-dependent serine/threonine-protein kinase which plays a key role in the innate immune response to viral infection and is also involved in the regulation of signal transduction, apoptosis, cell proliferation and differentiation. EIF2AK2 proteins contain two to three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  second double-stranded RNA binding motif of eukaryotic translation initiation factor 2-alpha kinase 2 (EIF2AK2) and similar proteins. EIF2AK2 (EC 2.7.11.1/EC 2.7.10.2; also known as interferon-induced, double-stranded RNA-activated protein kinase, eIF-2A protein kinase 2, interferon-inducible RNA-dependent protein kinase, P1/eIF-2A protein kinase, protein kinase RNA-activated (PKR), protein kinase R, tyrosine-protein kinase EIF2AK2, or p68 kinase) acts as an IFN-induced dsRNA-dependent serine/threonine-protein kinase which plays a key role in the innate immune response to viral infection and is also involved in the regulation of signal transduction, apoptosis, cell proliferation and differentiation. EIF2AK2 proteins contain two to three double-stranded RNA binding motifs (DSRMs). This model describes the second motif. DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19904); members share this curated model.
