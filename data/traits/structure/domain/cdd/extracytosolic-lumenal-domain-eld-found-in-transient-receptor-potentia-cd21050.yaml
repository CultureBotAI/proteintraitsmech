identifier: CDD:cd21050
label: "extracytosolic/lumenal domain (ELD) found in transient receptor potential channel mucolipins (TRPMLs). TRPML family proteins contain a linker between the first two transmembrane helices (S1 and S2), which is called TRPML I-II linker. It forms a tight tetramer that is crucial for full-length TRPMLs assembly and localization. In lysosomes and endosomes, this linker faces the lumen (it is therefore also referred to as the 'luminal linker'); on the plasma membrane, it faces the extracellular solution. TRPML I-II linker has been named as extracytosolic/lumenal domain (ELD)."
definition: >-
  extracytosolic/lumenal domain (ELD) found in transient receptor potential channel mucolipins (TRPMLs). TRPML family proteins contain a linker between the first two transmembrane helices (S1 and S2), which is called TRPML I-II linker. It forms a tight tetramer that is crucial for full-length TRPMLs assembly and localization. In lysosomes and endosomes, this linker faces the lumen (it is therefore also referred to as the 'luminal linker'); on the plasma membrane, it faces the extracellular solution. TRPML I-II linker has been named as extracytosolic/lumenal domain (ELD). — an NCBI CDD conserved domain (cd21050); members share this curated model.
