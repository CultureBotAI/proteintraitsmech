identifier: CDD:cd16955
label: "Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli YpdA. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Escherichia coli YpdA, a HK of the two-component system (TCS) YpdA-YpdB  which is involved in a nutrient sensing regulatory network with YehU-YehT. Proteins having this HATPase domain also contain a histidine kinase domain (His-kinase), and some have a GAF sensor domain; some contain a DUF3816 domain; some are hybrid sensor histidine kinases as they also contain a REC signal receiver domain."
definition: >-
  Histidine kinase-like ATPase domain of two-component sensor histidine kinases similar to Escherichia coli YpdA. This family includes the histidine kinase-like ATPase (HATPase) domains of various two-component sensor histidine kinase (HKs) such as Escherichia coli YpdA, a HK of the two-component system (TCS) YpdA-YpdB which is involved in a nutrient sensing regulatory network with YehU-YehT. Proteins having this HATPase domain also contain a histidine kinase domain (His-kinase), and some have a GAF sensor domain; some contain a DUF3816 domain; some are hybrid sensor histidine kinases as they also contain a REC signal receiver domain. — an NCBI CDD conserved domain (cd16955); members share this curated model.
