identifier: CDD:cd22527
label: "inhibitory phosphorylation domain of protein phosphatase 1 regulatory subunit 12A-like, and similar proteins. Protein phosphatase 1 regulatory subunit 12A-like (PPP1R12A-like) is a homolog of MYPT1, also called protein phosphatase 1 regulatory subunit 12A (PPP1R12A), myosin phosphatase target subunit 1, or protein phosphatase myosin-binding subunit. MYPT1 is the targeting subunit of smooth-muscle myosin phosphatase. It is a substrate for the asparaginyl hydroxylase factor inhibiting hypoxia-inducible factor (FIH). MYPT1 acts as a key regulator of protein phosphatase 1C (PPP1C). It mediates binding to myosin. As part of the PPP1C complex, MYPT1 is involved in dephosphorylation of the mitosis regulator polo-like kinase 1 (PLK1). It is capable of inhibiting HIF1A inhibitor (HIF1AN)-dependent suppression of HIF1A activity. This model corresponds to the inhibitory phosphorylation domain of PPP1R12A-like protein."
definition: >-
  inhibitory phosphorylation domain of protein phosphatase 1 regulatory subunit 12A-like, and similar proteins. Protein phosphatase 1 regulatory subunit 12A-like (PPP1R12A-like) is a homolog of MYPT1, also called protein phosphatase 1 regulatory subunit 12A (PPP1R12A), myosin phosphatase target subunit 1, or protein phosphatase myosin-binding subunit. MYPT1 is the targeting subunit of smooth-muscle myosin phosphatase. It is a substrate for the asparaginyl hydroxylase factor inhibiting hypoxia-inducible factor (FIH). MYPT1 acts as a key regulator of protein phosphatase 1C (PPP1C). It mediates binding to myosin. As part of the PPP1C complex, MYPT1 is involved in dephosphorylation of the mitosis regulator polo-like kinase 1 (PLK1). It is capable of inhibiting HIF1A inhibitor (HIF1AN)-dependent suppression of HIF1A activity. This model corresponds to the inhibitory phosphorylation domain of PPP1R12A-like protein. — an NCBI CDD conserved domain (cd22527); members share this curated model.
