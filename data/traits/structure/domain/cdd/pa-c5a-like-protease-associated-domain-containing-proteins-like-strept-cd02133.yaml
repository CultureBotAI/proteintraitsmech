identifier: CDD:cd02133
label: "PA_C5a_like: Protease-associated domain containing proteins like Streptococcus pyogenes C5a peptidase. This group contains various PA domain-containing proteins similar to S. pyogenes C5a, including, i) Vpr, a minor extracellular serine protease from Bacillus subtilis, ii) a large molecular mass collagenolytic protease from Geobacillus collagenovorans MO-1, and iii) PrtS, a cell envelope protease from Streptococcus thermophilus CNRZ 385. Proteins in this group belong to the peptidase S8 family. C5a peptidase is a cell surface serine protease which specifically inactivates C5a [a chemotactic peptide, which attracts polymorphonuclear leukocytes (PMNs)], by cleaving it to release a 7-residue carboxy-terminal fragment which contains the PMN binding site. The significance of the PA domain to these proteins has not been ascertained. It may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate."
definition: >-
  PA_C5a_like: Protease-associated domain containing proteins like Streptococcus pyogenes C5a peptidase. This group contains various PA domain-containing proteins similar to S. pyogenes C5a, including, i) Vpr, a minor extracellular serine protease from Bacillus subtilis, ii) a large molecular mass collagenolytic protease from Geobacillus collagenovorans MO-1, and iii) PrtS, a cell envelope protease from Streptococcus thermophilus CNRZ 385. Proteins in this group belong to the peptidase S8 family. C5a peptidase is a cell surface serine protease which specifically inactivates C5a [a chemotactic peptide, which attracts polymorphonuclear leukocytes (PMNs)], by cleaving it to release a 7-residue carboxy-terminal fragment which contains the PMN binding site. The significance of the PA domain to these proteins has not been ascertained. It may be a protein-protein interaction domain. At peptidase active sites, the PA domain may participate in substrate binding and/or promoting conformational changes, which influence the stability and accessibility of the site to substrate. — an NCBI CDD conserved domain (cd02133); members share this curated model.
