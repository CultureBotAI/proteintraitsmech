identifier: CDD:cd17616
label: "phosphoacceptor receiver (REC) domain of CtrA-like OmpR family response regulators. CtrA is part of the CckA-ChpT-CtrA phosphorelay that is conserved in alphaproteobacteria and is important in orchestrating the cell cycle, polar development, and flagellar biogenesis. CtrA is the master regulator of flagella synthesis genes and also regulates genes involved in the cell cycle, exopolysaccharide synthesis, and cyclic-di-GMP signaling. CtrA is active as a transcription factor when phosphorylated. It is a member of the OmpR family of DNA-binding response regulators, characterized by a REC domain and a winged helix-turn-helix (wHTH) DNA-binding output effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of CtrA-like OmpR family response regulators. CtrA is part of the CckA-ChpT-CtrA phosphorelay that is conserved in alphaproteobacteria and is important in orchestrating the cell cycle, polar development, and flagellar biogenesis. CtrA is the master regulator of flagella synthesis genes and also regulates genes involved in the cell cycle, exopolysaccharide synthesis, and cyclic-di-GMP signaling. CtrA is active as a transcription factor when phosphorylated. It is a member of the OmpR family of DNA-binding response regulators, characterized by a REC domain and a winged helix-turn-helix (wHTH) DNA-binding output effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd17616); members share this curated model.
