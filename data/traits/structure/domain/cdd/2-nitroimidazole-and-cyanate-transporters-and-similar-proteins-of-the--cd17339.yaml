identifier: CDD:cd17339
label: "2-nitroimidazole and cyanate transporters and similar proteins of the Major Facilitator Superfamily of transporters. This family is composed of Escherichia coli 2-nitroimidazole transporter (NIMT) and cyanate transport protein CynX, and similar proteins. NIMT, also called YeaN, confers resistance to 2-nitroimidazole, the antibacterial and antifungal antibiotic, by mediating the active efflux of this compound. CynX is part of an active transport system that transports exogenous cyanate into E. coli cells. The NIMT/CynX-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  2-nitroimidazole and cyanate transporters and similar proteins of the Major Facilitator Superfamily of transporters. This family is composed of Escherichia coli 2-nitroimidazole transporter (NIMT) and cyanate transport protein CynX, and similar proteins. NIMT, also called YeaN, confers resistance to 2-nitroimidazole, the antibacterial and antifungal antibiotic, by mediating the active efflux of this compound. CynX is part of an active transport system that transports exogenous cyanate into E. coli cells. The NIMT/CynX-like family belongs to the Major Facilitator Superfamily (MFS) of membrane transport proteins, which are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17339); members share this curated model.
