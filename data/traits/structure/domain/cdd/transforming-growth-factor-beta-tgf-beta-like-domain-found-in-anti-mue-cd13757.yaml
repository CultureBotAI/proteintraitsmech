identifier: CDD:cd13757
label: "transforming growth factor beta (TGF-beta) like domain found in anti-Muellerian hormone (AMH) and similar proteins. AMH, also termed Muellerian-inhibiting factor, or Muellerian-inhibiting substance (MIS), is a glycoprotein that causes regression of the Muellerian duct. It can also inhibit the growth of tumors derived from tissues of Muellerian duct origin."
definition: >-
  transforming growth factor beta (TGF-beta) like domain found in anti-Muellerian hormone (AMH) and similar proteins. AMH, also termed Muellerian-inhibiting factor, or Muellerian-inhibiting substance (MIS), is a glycoprotein that causes regression of the Muellerian duct. It can also inhibit the growth of tumors derived from tissues of Muellerian duct origin. — an NCBI CDD conserved domain (cd13757); members share this curated model.
