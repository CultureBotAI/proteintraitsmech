identifier: CDD:cd20710
label: "Connector domain of NOT1. This NOT1 connector domain is one of several catalytically inactive subunits of the multisubunit CCR4-NOT complex assembly that plays a central role in post-translational gene regulation in eukaryotes. CCR4-NOT contains the catalytic center formed by two deadenylase subunits CCR4 and CAF1, and the conserved core complex which contains a minimum of four catalytically inactive subunits, NOT1, NOT2, NOT3 and CAF40/NOT9. NOT1 is the largest subunit which functions as a central scaffold for complex assembly in human orthologs. The Chaetomium thermophilum NOT1 connector domain consists of five alpha-helical hairpin repeats of the HEAT type that structurally resemble MIF4G domains, and hence is also called the MIF4G-C domain. However, NOT1 MIF4G-C does not interact with DEAD-box helicases such as DDX6 like MIF4G does. Structural conservation of this domain suggests an important role but its function is as yet unknown."
definition: >-
  Connector domain of NOT1. This NOT1 connector domain is one of several catalytically inactive subunits of the multisubunit CCR4-NOT complex assembly that plays a central role in post-translational gene regulation in eukaryotes. CCR4-NOT contains the catalytic center formed by two deadenylase subunits CCR4 and CAF1, and the conserved core complex which contains a minimum of four catalytically inactive subunits, NOT1, NOT2, NOT3 and CAF40/NOT9. NOT1 is the largest subunit which functions as a central scaffold for complex assembly in human orthologs. The Chaetomium thermophilum NOT1 connector domain consists of five alpha-helical hairpin repeats of the HEAT type that structurally resemble MIF4G domains, and hence is also called the MIF4G-C domain. However, NOT1 MIF4G-C does not interact with DEAD-box helicases such as DDX6 like MIF4G does. Structural conservation of this domain suggests an important role but its function is as yet unknown. — an NCBI CDD conserved domain (cd20710); members share this curated model.
