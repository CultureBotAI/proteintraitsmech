identifier: CDD:cd07734
label: "Int9, Int11, CPSF2, CPSF3 and related cleavage and polyadenylation specificity factors; MBL-fold metallo-hydrolase domain. CPSF3 (cleavage and polyadenylation specificity factor subunit 3; also known as cleavage and polyadenylation specificity factor 73 kDa subunit, CPSF-73) and CPSF2 (also known as cleavage and polyadenylation specificity factor 100 kDa subunit /CPSF-100) are components of the CPSF complex, which plays a role in 3' end processing of pre-mRNAs during cleavage/polyadenylation, and during processing of metazoan histone pre-mRNAs. CPSF3 functions as a 3' endonuclease. Int11 (also known as cleavage and polyadenylation-specific factor (CPSF) 3-like protein, and protein related to CPSF subunits of 68 kDa (RC-68)), and Int9, also known as protein related to CPSF subunits of 74 kDa (RC-74) are subunits of Integrator, a metazoan-specific multifunctional protein complex composed of 14 subunits. Integrator has been implicated in a variety of Pol II transcription events including 3' end processing of snRNA, transcription initiation, promoter-proximal pausing, termination of protein-coding transcripts, and in HVS pre-miRNA 3' end processing. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  Int9, Int11, CPSF2, CPSF3 and related cleavage and polyadenylation specificity factors; MBL-fold metallo-hydrolase domain. CPSF3 (cleavage and polyadenylation specificity factor subunit 3; also known as cleavage and polyadenylation specificity factor 73 kDa subunit, CPSF-73) and CPSF2 (also known as cleavage and polyadenylation specificity factor 100 kDa subunit /CPSF-100) are components of the CPSF complex, which plays a role in 3' end processing of pre-mRNAs during cleavage/polyadenylation, and during processing of metazoan histone pre-mRNAs. CPSF3 functions as a 3' endonuclease. Int11 (also known as cleavage and polyadenylation-specific factor (CPSF) 3-like protein, and protein related to CPSF subunits of 68 kDa (RC-68)), and Int9, also known as protein related to CPSF subunits of 74 kDa (RC-74) are subunits of Integrator, a metazoan-specific multifunctional protein complex composed of 14 subunits. Integrator has been implicated in a variety of Pol II transcription events including 3' end processing of snRNA, transcription initiation, promoter-proximal pausing, termination of protein-coding transcripts, and in HVS pre-miRNA 3' end processing. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd07734); members share this curated model.
