identifier: CDD:cd02880
label: "Clostridium cellulolyticum Cel9G, Cel9M, Cel9R, and related endoglucanases - catalytic GH9 TIM barrel domain. This family includes mostly bacterial and eukaryotic proteins with a catalytic domain that is sequence-similar to the catalytic domain of the Clostridium cellulolyticum Cel9G, Cel9M, Cel9R beta-1,4-endoglucanases.  These enzymes have a glycosyl hydrolase family 9 (GH9) catalytic TIM barrel domain and a CBM (carbohydrate binding module) domain located at the C-terminus (and in some cases at the N-terminus).  This family includes Bacillus pumilus EglA and EG-IV, Bacillus licheniformis Cel9A, Acetivibrio cellulolyticus Cel9B, Clostridium thermocellum CelT, and Clostridium cellulolyticum Cel9M, and the Phaseolus vulgaris abscission cellulase.  Some members of this family have a C-terminal cellulose-binding module in addition to the catalytic domain, while other members have only the catalytic domain."
definition: >-
  Clostridium cellulolyticum Cel9G, Cel9M, Cel9R, and related endoglucanases - catalytic GH9 TIM barrel domain. This family includes mostly bacterial and eukaryotic proteins with a catalytic domain that is sequence-similar to the catalytic domain of the Clostridium cellulolyticum Cel9G, Cel9M, Cel9R beta-1,4-endoglucanases. These enzymes have a glycosyl hydrolase family 9 (GH9) catalytic TIM barrel domain and a CBM (carbohydrate binding module) domain located at the C-terminus (and in some cases at the N-terminus). This family includes Bacillus pumilus EglA and EG-IV, Bacillus licheniformis Cel9A, Acetivibrio cellulolyticus Cel9B, Clostridium thermocellum CelT, and Clostridium cellulolyticum Cel9M, and the Phaseolus vulgaris abscission cellulase. Some members of this family have a C-terminal cellulose-binding module in addition to the catalytic domain, while other members have only the catalytic domain. — an NCBI CDD conserved domain (cd02880); members share this curated model.
