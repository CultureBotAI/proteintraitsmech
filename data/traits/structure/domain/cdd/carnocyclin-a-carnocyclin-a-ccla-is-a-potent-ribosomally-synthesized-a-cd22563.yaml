identifier: CDD:cd22563
label: "carnocyclin A. Carnocyclin A (CclA) is a potent ribosomally synthesized antimicrobial peptide, originally found in Carnobacterium maltaromaticum UAL307, that displays a broad spectrum of activity against numerous Gram-positive organisms. An amide bond links the N and C termini of this circular bacteriocin, giving it stability and structural integrity. CclA interacts with lipid bilayers in a voltage-dependent manner and forms anion selective pores that preferentially bind halide anions. The ABC transporter CclEFGH facilitates the production of CclA."
definition: >-
  carnocyclin A. Carnocyclin A (CclA) is a potent ribosomally synthesized antimicrobial peptide, originally found in Carnobacterium maltaromaticum UAL307, that displays a broad spectrum of activity against numerous Gram-positive organisms. An amide bond links the N and C termini of this circular bacteriocin, giving it stability and structural integrity. CclA interacts with lipid bilayers in a voltage-dependent manner and forms anion selective pores that preferentially bind halide anions. The ABC transporter CclEFGH facilitates the production of CclA. — an NCBI CDD conserved domain (cd22563); members share this curated model.
