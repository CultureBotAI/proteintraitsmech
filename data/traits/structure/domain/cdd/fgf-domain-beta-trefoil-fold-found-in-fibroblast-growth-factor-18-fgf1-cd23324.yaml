identifier: CDD:cd23324
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 18 (FGF18) and similar proteins. FGF18, also called zFGF5, plays an important role in the regulation of cell proliferation, cell differentiation, and cell migration. It is required for normal ossification and bone development. It stimulates hepatic and intestinal proliferation. FGF18 interacts with fibroblast growth factor receptors, FGFR3 and FGFR4. FGF18 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in fibroblast growth factor 18 (FGF18) and similar proteins. FGF18, also called zFGF5, plays an important role in the regulation of cell proliferation, cell differentiation, and cell migration. It is required for normal ossification and bone development. It stimulates hepatic and intestinal proliferation. FGF18 interacts with fibroblast growth factor receptors, FGFR3 and FGFR4. FGF18 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23324); members share this curated model.
