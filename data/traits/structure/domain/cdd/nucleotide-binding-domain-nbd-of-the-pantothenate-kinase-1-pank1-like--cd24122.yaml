identifier: CDD:cd24122
label: "nucleotide-binding domain (NBD) of the pantothenate kinase 1 (Pank1)-like subfamily. PanK (EC 2.7.1.33), also called pantothenic acid kinase, is the first enzyme in the Coenzyme A (CoA) biosynthetic pathway. It catalyzes the phosphorylation of pantothenate (vitamin B5) to form 4'-phosphopantothenate at the expense of a molecule of adenosine triphosphate (ATP), which is the rate-limiting step in CoA biosynthesis. It cannot utilize a phosphoryl donor other than ATP. Three distinct types of PanK have been identified, PanK-I, PanK-II and PanK-III. Eukaryotic PanK-II enzymes often occur as different isoforms, such as PanK1, PanK2, PanK3 and PanK4. The Pank1-like subfamily includes PanK1-3."
definition: >-
  nucleotide-binding domain (NBD) of the pantothenate kinase 1 (Pank1)-like subfamily. PanK (EC 2.7.1.33), also called pantothenic acid kinase, is the first enzyme in the Coenzyme A (CoA) biosynthetic pathway. It catalyzes the phosphorylation of pantothenate (vitamin B5) to form 4'-phosphopantothenate at the expense of a molecule of adenosine triphosphate (ATP), which is the rate-limiting step in CoA biosynthesis. It cannot utilize a phosphoryl donor other than ATP. Three distinct types of PanK have been identified, PanK-I, PanK-II and PanK-III. Eukaryotic PanK-II enzymes often occur as different isoforms, such as PanK1, PanK2, PanK3 and PanK4. The Pank1-like subfamily includes PanK1-3. — an NCBI CDD conserved domain (cd24122); members share this curated model.
