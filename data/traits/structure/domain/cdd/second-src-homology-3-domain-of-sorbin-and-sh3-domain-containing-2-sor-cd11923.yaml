identifier: CDD:cd11923
label: "Second Src Homology 3 domain of Sorbin and SH3 domain containing 2 (Sorbs2), also called Arg-binding protein 2 (ArgBP2). Sorbs2 or ArgBP2 is an adaptor protein containing one sorbin homology (SoHo) and three SH3 domains. It regulates actin-dependent processes including cell adhesion, morphology, and migration. It is expressed in many tissues and is abundant in the heart. Like vinexin, it is found in focal adhesion where it interacts with vinculin and afadin. It also localizes in epithelial cell stress fibers and in cardiac muscle cell Z-discs. Sorbs2 has been implicated to play roles in the signaling of c-Arg, Akt, and Pyk2. Other interaction partners of Sorbs2 include c-Abl, flotillin, spectrin, dynamin 1/2, synaptojanin, PTP-PEST, among others. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Second Src Homology 3 domain of Sorbin and SH3 domain containing 2 (Sorbs2), also called Arg-binding protein 2 (ArgBP2). Sorbs2 or ArgBP2 is an adaptor protein containing one sorbin homology (SoHo) and three SH3 domains. It regulates actin-dependent processes including cell adhesion, morphology, and migration. It is expressed in many tissues and is abundant in the heart. Like vinexin, it is found in focal adhesion where it interacts with vinculin and afadin. It also localizes in epithelial cell stress fibers and in cardiac muscle cell Z-discs. Sorbs2 has been implicated to play roles in the signaling of c-Arg, Akt, and Pyk2. Other interaction partners of Sorbs2 include c-Abl, flotillin, spectrin, dynamin 1/2, synaptojanin, PTP-PEST, among others. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11923); members share this curated model.
