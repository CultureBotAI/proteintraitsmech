identifier: CDD:cd14065
label: "Catalytic domain of the LIM domain kinase-like protein kinases. PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine or tyrosine residues on protein substrates. Members of this subfamily include LIMK, Testicular or testis-specific protein kinase (TESK), and similar proteins. LIMKs are characterized as serine/threonine kinases (STKs) while TESKs are dual-specificity protein kinases. Both LIMK and TESK phosphorylate and inactivate cofilin, an actin depolymerizing factor, to induce the reorganization of the actin cytoskeleton. They are implicated in many cellular functions including cell spreading, motility, morphogenesis, meiosis, mitosis, and spermatogenesis. The LIMK-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic domain of the LIM domain kinase-like protein kinases. PKs catalyze the transfer of the gamma-phosphoryl group from ATP to serine/threonine or tyrosine residues on protein substrates. Members of this subfamily include LIMK, Testicular or testis-specific protein kinase (TESK), and similar proteins. LIMKs are characterized as serine/threonine kinases (STKs) while TESKs are dual-specificity protein kinases. Both LIMK and TESK phosphorylate and inactivate cofilin, an actin depolymerizing factor, to induce the reorganization of the actin cytoskeleton. They are implicated in many cellular functions including cell spreading, motility, morphogenesis, meiosis, mitosis, and spermatogenesis. The LIMK-like subfamily is part of a larger superfamily that includes the catalytic domains of other STKs, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14065); members share this curated model.
