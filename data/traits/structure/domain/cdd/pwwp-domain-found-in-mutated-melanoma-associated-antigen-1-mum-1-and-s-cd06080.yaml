identifier: CDD:cd06080
label: "PWWP domain found in mutated melanoma-associated antigen 1 (MUM-1) and similar proteins. MUM-1, also called PWWP domain-containing DNA repair factor 3A (PWWP3A), or protein expandere (EXPAND1), is a melanoma-associated antigen (MAA) that belongs to the mutated or aberrantly expressed type of MAAs, along with antigens such as CDK4, beta-catenin, gp100-in4, p15, and N-acetylglucosaminyltransferase V. It is highly expressed in several types of human cancers and involved in the DNA damage response pathway by contributing to the maintenance of chromatin architecture. MUM-1 is recruited to the vicinity of DNA breaks by TP53BP1 and plays an accessory role to facilitate damage-induced chromatin changes and promoting chromatin relaxation. It is required for efficient DNA repair and cell survival following DNA damage. This subfamily also includes mutated melanoma-associated antigen 1-like protein 1 (MUM1L1), also called MUM1-like protein 1, or PWWP domain-containing DNA repair factor 3B (PWWP3B). Its biological function remains unclear. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in mutated melanoma-associated antigen 1 (MUM-1) and similar proteins. MUM-1, also called PWWP domain-containing DNA repair factor 3A (PWWP3A), or protein expandere (EXPAND1), is a melanoma-associated antigen (MAA) that belongs to the mutated or aberrantly expressed type of MAAs, along with antigens such as CDK4, beta-catenin, gp100-in4, p15, and N-acetylglucosaminyltransferase V. It is highly expressed in several types of human cancers and involved in the DNA damage response pathway by contributing to the maintenance of chromatin architecture. MUM-1 is recruited to the vicinity of DNA breaks by TP53BP1 and plays an accessory role to facilitate damage-induced chromatin changes and promoting chromatin relaxation. It is required for efficient DNA repair and cell survival following DNA damage. This subfamily also includes mutated melanoma-associated antigen 1-like protein 1 (MUM1L1), also called MUM1-like protein 1, or PWWP domain-containing DNA repair factor 3B (PWWP3B). Its biological function remains unclear. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd06080); members share this curated model.
