identifier: CDD:cd19744
label: "basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster achaete-scute complex (AS-C) proteins and similar proteins. Drosophila melanogaster AS-C proteins includes lethal of scute (also known as achaete-scute complex protein T3 or AST3), scute (also known as achaete-scute complex protein T4 or AST4), achaete (also known as achaete-scute complex protein T5 or AST5), and asense (also known as achaete-scute complex protein T8 or AST8). They are involved in the determination of the neuronal precursors in the peripheral nervous system and the central nervous system, as well as in sex determination and dosage compensation."
definition: >-
  basic helix-loop-helix (bHLH) domain found in Drosophila melanogaster achaete-scute complex (AS-C) proteins and similar proteins. Drosophila melanogaster AS-C proteins includes lethal of scute (also known as achaete-scute complex protein T3 or AST3), scute (also known as achaete-scute complex protein T4 or AST4), achaete (also known as achaete-scute complex protein T5 or AST5), and asense (also known as achaete-scute complex protein T8 or AST8). They are involved in the determination of the neuronal precursors in the peripheral nervous system and the central nervous system, as well as in sex determination and dosage compensation. — an NCBI CDD conserved domain (cd19744); members share this curated model.
