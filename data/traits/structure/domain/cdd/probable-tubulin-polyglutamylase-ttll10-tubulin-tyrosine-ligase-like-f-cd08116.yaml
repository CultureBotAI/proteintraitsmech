identifier: CDD:cd08116
label: "Probable tubulin polyglutamylase TTLL10. Tubulin tyrosine ligase-like family, member 10 (TTLL10) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 10 gene (TTLL10) maps to chromosome region 1p36.33 and encodes for a 673 amino acid protein. In mammals, TTLL10 catalyzes the polyglycylation reaction by adding polyglycine side chains onto the proteins; in other words, it catalyzes the elongation step of polyglycylation. There are two mutations in TTLL10 gene in humans which makes it functionally inactive; humans might be the only species in mammals that has lost protein polyglycylation (elongation) activity."
definition: >-
  Probable tubulin polyglutamylase TTLL10. Tubulin tyrosine ligase-like family, member 10 (TTLL10) is a member of Tubulin-tyrosine ligase (TTL, EC 6.3.2.25) family. TTL catalyses the posttranslational addition of a tyrosine to the carboxy-terminal end of detyrosinated alpha-tubulin in the presense of ATP. TTL requires K and Mg ions for catalysis and uses detyrosinated alpha-tubulin as a substrate. It plays a key role in microtubules assembly. Based on the sequence and functional similarities with glutathione synthetase (GSHase), biotin carboxylase (BC), D-ala D-ala ligase (DD-ligase), and succinyl-CoA synthetase (SCS) families it is concluded that TTL belongs to ATP-grasp superfamily. Human tubulin tyrosine ligase-like 10 gene (TTLL10) maps to chromosome region 1p36.33 and encodes for a 673 amino acid protein. In mammals, TTLL10 catalyzes the polyglycylation reaction by adding polyglycine side chains onto the proteins; in other words, it catalyzes the elongation step of polyglycylation. There are two mutations in TTLL10 gene in humans which makes it functionally inactive; humans might be the only species in mammals that has lost protein polyglycylation (elongation) activity. — an NCBI CDD conserved domain (cd08116); members share this curated model.
