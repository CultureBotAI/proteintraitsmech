identifier: CDD:cd16212
label: "EF-hand motif found in Drosophila melanogaster No receptor potential A protein (NorpA) and similar proteins. NorpA, also termed 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase, is an eye-specific phosphoinositide phospholipase C (PI-PLC) encoded by norpA gene in Drosophila. It is expressed predominantly in photoreceptors and plays an essential role in the phototransduction pathway of Drosophila. A mutation within the norpA gene can render the fly blind without affecting any of the obvious structures of the eye. Like beta-class of vertebrate PI-PLCs, NorpA contains an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core, and a single C2 domain. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence."
definition: >-
  EF-hand motif found in Drosophila melanogaster No receptor potential A protein (NorpA) and similar proteins. NorpA, also termed 1-phosphatidylinositol 4,5-bisphosphate phosphodiesterase, is an eye-specific phosphoinositide phospholipase C (PI-PLC) encoded by norpA gene in Drosophila. It is expressed predominantly in photoreceptors and plays an essential role in the phototransduction pathway of Drosophila. A mutation within the norpA gene can render the fly blind without affecting any of the obvious structures of the eye. Like beta-class of vertebrate PI-PLCs, NorpA contains an N-terminal pleckstrin homology (PH) domain, four atypical EF-hand motifs, a PLC catalytic core, and a single C2 domain. The PLC catalytic core domain is a TIM barrel with two highly conserved regions (X and Y) split by a highly degenerate linker sequence. — an NCBI CDD conserved domain (cd16212); members share this curated model.
