identifier: CDD:cd00426
label: "Ribosomal protein eL15. Ribosomal protein eL15 is a ribosomal protein found only in eukaryotes and archaea.  In eukaryotes it is typically called L15 and in archaea it is L15e, which is distinct from archaeal L15.  A housekeeping role has been proposed for eL15, which is expressed in bovine oocytes, and is upregulated in cold-acclimated citrus species.  eL15 overexpression has been observed in gastric and esophageal cancers in humans."
definition: >-
  Ribosomal protein eL15. Ribosomal protein eL15 is a ribosomal protein found only in eukaryotes and archaea. In eukaryotes it is typically called L15 and in archaea it is L15e, which is distinct from archaeal L15. A housekeeping role has been proposed for eL15, which is expressed in bovine oocytes, and is upregulated in cold-acclimated citrus species. eL15 overexpression has been observed in gastric and esophageal cancers in humans. — an NCBI CDD conserved domain (cd00426); members share this curated model.
