identifier: CDD:cd19628
label: "FadL from Escherchia coli and related sequences. The long-chain fatty acid (LCFA) transporter FadL from Escherichia coli (EcFadL) is a member of a large family of outer membrane (OM) proteins mediating the passive diffusion of hydrophobic molecules across the OM, including xenobiotics destined for biodegradation. It has an N-terminal \"plug\" domain within its barrel, and an opening in the barrel wall due to an inward-pointing kink in one of the beta-strands. Substrate uptake occurs as hydrophobic substrates diffuse from the barrel lumen laterally into the outer leaflet of the OM via the opening in the barrel wall. EcFadL has a low-affinity binding site between two loops on the extracellular surface of the protein, and a high-affinity site in the lumen of the barrel, close to the N-terminus. The substrate binding sites are part of a long hydrophobic channel that leads from the extracellular surface to the opening in the barrel wall. Its \"plug\" domain interrupts this channel and blocks access the substrate to the lateral opening. EcFadL is an example of a ligand-gated diffusion channel within the bacterial OM in which the ligand that opens the N-terminal gate is also the transported substrate."
definition: >-
  FadL from Escherchia coli and related sequences. The long-chain fatty acid (LCFA) transporter FadL from Escherichia coli (EcFadL) is a member of a large family of outer membrane (OM) proteins mediating the passive diffusion of hydrophobic molecules across the OM, including xenobiotics destined for biodegradation. It has an N-terminal "plug" domain within its barrel, and an opening in the barrel wall due to an inward-pointing kink in one of the beta-strands. Substrate uptake occurs as hydrophobic substrates diffuse from the barrel lumen laterally into the outer leaflet of the OM via the opening in the barrel wall. EcFadL has a low-affinity binding site between two loops on the extracellular surface of the protein, and a high-affinity site in the lumen of the barrel, close to the N-terminus. The substrate binding sites are part of a long hydrophobic channel that leads from the extracellular surface to the opening in the barrel wall. Its "plug" domain interrupts this channel and blocks access the substrate to the lateral opening. EcFadL is an example of a ligand-gated diffusion channel within the bacterial OM in which the ligand that opens the N-terminal gate is also the transported substrate. — an NCBI CDD conserved domain (cd19628); members share this curated model.
