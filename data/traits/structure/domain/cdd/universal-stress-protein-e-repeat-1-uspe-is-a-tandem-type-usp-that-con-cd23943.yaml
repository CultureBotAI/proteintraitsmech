identifier: CDD:cd23943
label: "Universal stress protein E, repeat 1. UspE is a tandem-type USP that consists of two USP domains. The UspE expression levels of Escherichia coli become elevated in response to oxidative stress and DNA damaging agents, including exposure to mitomycin C, cadmium, and hydrogen peroxide. The universal stress protein Usp is a small cytoplasmic bacterial protein whose expression is enhanced when the cell is exposed to stress agents. Usp enhances the rate of cell survival during prolonged exposure to such conditions, and may provide a general \"stress endurance\" activity."
definition: >-
  Universal stress protein E, repeat 1. UspE is a tandem-type USP that consists of two USP domains. The UspE expression levels of Escherichia coli become elevated in response to oxidative stress and DNA damaging agents, including exposure to mitomycin C, cadmium, and hydrogen peroxide. The universal stress protein Usp is a small cytoplasmic bacterial protein whose expression is enhanced when the cell is exposed to stress agents. Usp enhances the rate of cell survival during prolonged exposure to such conditions, and may provide a general "stress endurance" activity. — an NCBI CDD conserved domain (cd23943); members share this curated model.
