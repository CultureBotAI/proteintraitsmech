identifier: CDD:cd01125
label: "Hexameric Replicative Helicase RepA of plasmid RSF1010 and related proteins. This family includes the homo-hexameric replicative helicase RepA encoded by plasmid RSF1010. RSF1010 is found in most Gram-negative bacteria and some Gram-positive bacteria . The RepA protein of Plasmid RSF1010 is a 5'-3' DNA helicase which can utilize ATP, dATP, GTP and dGTP (and CTP and dCTP to a lesser extent)."
definition: >-
  Hexameric Replicative Helicase RepA of plasmid RSF1010 and related proteins. This family includes the homo-hexameric replicative helicase RepA encoded by plasmid RSF1010. RSF1010 is found in most Gram-negative bacteria and some Gram-positive bacteria . The RepA protein of Plasmid RSF1010 is a 5'-3' DNA helicase which can utilize ATP, dATP, GTP and dGTP (and CTP and dCTP to a lesser extent). — an NCBI CDD conserved domain (cd01125); members share this curated model.
