identifier: CDD:cd23134
label: "RING finger, HC subclass, found in Saccharomyces cerevisiae translation termination inhibitor protein ITT1 and similar proteins. ITT1 is a protein that modulates the efficiency of translation termination, resulting in the readthrough of all three types of nonsense codons UAA, UAG and UGA. ITT1 contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Saccharomyces cerevisiae translation termination inhibitor protein ITT1 and similar proteins. ITT1 is a protein that modulates the efficiency of translation termination, resulting in the readthrough of all three types of nonsense codons UAA, UAG and UGA. ITT1 contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23134); members share this curated model.
