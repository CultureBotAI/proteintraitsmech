identifier: CDD:cd17355
label: "MFS-type transporter YcxA and similar proteins of the Major Facilitator Superfamily of transporters. This group is composed of uncharacterized bacterial MFS-type transporters including Bacillus subtilis YcxA and YbfB. YcxA has been shown to facilitate the export of surfactin in B. subtilis. The YcxA-like group belongs to the Monocarboxylate transporter -like (MCT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to  function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement."
definition: >-
  MFS-type transporter YcxA and similar proteins of the Major Facilitator Superfamily of transporters. This group is composed of uncharacterized bacterial MFS-type transporters including Bacillus subtilis YcxA and YbfB. YcxA has been shown to facilitate the export of surfactin in B. subtilis. The YcxA-like group belongs to the Monocarboxylate transporter -like (MCT-like) family of the Major Facilitator Superfamily (MFS) of membrane transport proteins. MFS proteins are thought to function through a single substrate binding site, alternating-access mechanism involving a rocker-switch type of movement. — an NCBI CDD conserved domain (cd17355); members share this curated model.
