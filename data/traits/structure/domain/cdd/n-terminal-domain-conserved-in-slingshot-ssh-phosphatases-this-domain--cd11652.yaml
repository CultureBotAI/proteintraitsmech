identifier: CDD:cd11652
label: "N-terminal domain conserved in slingshot (SSH) phosphatases. This domain or region conserved in Bilateria is found N-terminal to the DEK_C-like and catalytic domains of slingshot phosphatases. Slingshot is a cofilin-specific phosphatase. Dephosphorylation reactivates cofilin, which in turn depolymerizes actin and is thus required for actin filament reorganization. Slingshot is a member of the dual-specificity protein phosphatase family. This N-terminal SSH region may be involved in P-cofilin binding (the model C-terminus plus the DEK_C-like domain, which are characterized as the \"B\" domain in some of the literature), and may be required for the F-actin mediated activation of slingshot (the N-terminal region of this model, sometimes referred to as the \"A\" domain)."
definition: >-
  N-terminal domain conserved in slingshot (SSH) phosphatases. This domain or region conserved in Bilateria is found N-terminal to the DEK_C-like and catalytic domains of slingshot phosphatases. Slingshot is a cofilin-specific phosphatase. Dephosphorylation reactivates cofilin, which in turn depolymerizes actin and is thus required for actin filament reorganization. Slingshot is a member of the dual-specificity protein phosphatase family. This N-terminal SSH region may be involved in P-cofilin binding (the model C-terminus plus the DEK_C-like domain, which are characterized as the "B" domain in some of the literature), and may be required for the F-actin mediated activation of slingshot (the N-terminal region of this model, sometimes referred to as the "A" domain). — an NCBI CDD conserved domain (cd11652); members share this curated model.
