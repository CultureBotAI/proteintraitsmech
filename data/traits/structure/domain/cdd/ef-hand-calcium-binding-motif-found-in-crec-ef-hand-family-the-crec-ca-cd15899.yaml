identifier: CDD:cd15899
label: "EF-hand, calcium binding motif, found in CREC-EF hand family. The CREC (Cab45/reticulocalbin/ERC45/calumenin)-EF hand family contains a group of six EF-hand, low-affinity Ca2+-binding proteins, including reticulocalbin (RCN-1), ER Ca2+-binding protein of 55 kDa (ERC-55, also known as TCBP-49 or E6BP), reticulocalbin-3 (RCN-3), Ca2+-binding protein of 45 kDa (Cab45 and its splice variant Cab45b), and calumenin ( also known as crocalbin or CBP-50). The proteins are not only localized in various parts of the secretory pathway, but also found in the cytosolic compartment and at the cell surface. They interact with different ligands or proteins and have been implicated in the secretory process, chaperone activity, signal transduction as well as in a large variety of disease processes."
