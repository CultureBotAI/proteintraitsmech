identifier: CDD:cd11764
label: "Src Homology 3 domain of Epidermal growth factor receptor kinase substrate 8 and similar proteins. This group is composed of Eps8 and Eps8-like proteins including Eps8-like 1-3, among others. These proteins contain N-terminal Phosphotyrosine-binding (PTB), central SH3, and C-terminal effector domains. Eps8 binds either Abi1 (also called E3b1) or Rab5 GTPase activating protein RN-tre through its SH3 domain. With Abi1 and Sos1, it becomes part of a trimeric complex that is required to activate Rac. Together with RN-tre, it inhibits the internalization of EGFR. The SH3 domains of Eps8 and similar proteins recognize peptides containing a PxxDY motif, instead of the classical PxxP motif. SH3 domains are protein interaction domains that usually bind to proline-rich ligands with moderate affinity and selectivity. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 domain of Epidermal growth factor receptor kinase substrate 8 and similar proteins. This group is composed of Eps8 and Eps8-like proteins including Eps8-like 1-3, among others. These proteins contain N-terminal Phosphotyrosine-binding (PTB), central SH3, and C-terminal effector domains. Eps8 binds either Abi1 (also called E3b1) or Rab5 GTPase activating protein RN-tre through its SH3 domain. With Abi1 and Sos1, it becomes part of a trimeric complex that is required to activate Rac. Together with RN-tre, it inhibits the internalization of EGFR. The SH3 domains of Eps8 and similar proteins recognize peptides containing a PxxDY motif, instead of the classical PxxP motif. SH3 domains are protein interaction domains that usually bind to proline-rich ligands with moderate affinity and selectivity. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11764); members share this curated model.
