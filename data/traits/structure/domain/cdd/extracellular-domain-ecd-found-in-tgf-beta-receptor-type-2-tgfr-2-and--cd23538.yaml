identifier: CDD:cd23538
label: "extracellular domain (ECD) found in TGF-beta receptor type-2 (TGFR-2) and similar proteins. TGFR-2 (also called transforming growth factor-beta receptor type II (TbetaR-II), or TGF-beta type II receptor, or TGF-beta receptor type II) belongs to a group of receptors for the TGFbeta family of secreted signaling molecules that includes TGFbeta, bone morphogenetic proteins, activins, growth and differentiation factors, and anti-Mullerian hormone, among others. These receptors contain an extracellular domain (ECD) that binds ligands, a single transmembrane region, and a cytoplasmic catalytic kinase domain. Type II receptors, such as TGFR-2, are high-affinity receptors which bind ligands, autophosphorylate, as well as trans-phosphorylate and activate low-affinity type I receptors. TGFR-2 acts as the receptor for TGFbeta, which is crucial in growth control and homeostasis in many different tissues. It plays roles in regulating apoptosis and in maintaining the balance between self-renewal and cell loss. It also plays a key role in maintaining vascular integrity and in regulating responses to genotoxic stress. Mutations in TGFR-2 can cause aortic aneurysm disorders such as Loeys-Dietz and Marfan syndromes. This model corresponds to the ECD of TGFR-2, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in TGF-beta receptor type-2 (TGFR-2) and similar proteins. TGFR-2 (also called transforming growth factor-beta receptor type II (TbetaR-II), or TGF-beta type II receptor, or TGF-beta receptor type II) belongs to a group of receptors for the TGFbeta family of secreted signaling molecules that includes TGFbeta, bone morphogenetic proteins, activins, growth and differentiation factors, and anti-Mullerian hormone, among others. These receptors contain an extracellular domain (ECD) that binds ligands, a single transmembrane region, and a cytoplasmic catalytic kinase domain. Type II receptors, such as TGFR-2, are high-affinity receptors which bind ligands, autophosphorylate, as well as trans-phosphorylate and activate low-affinity type I receptors. TGFR-2 acts as the receptor for TGFbeta, which is crucial in growth control and homeostasis in many different tissues. It plays roles in regulating apoptosis and in maintaining the balance between self-renewal and cell loss. It also plays a key role in maintaining vascular integrity and in regulating responses to genotoxic stress. Mutations in TGFR-2 can cause aortic aneurysm disorders such as Loeys-Dietz and Marfan syndromes. This model corresponds to the ECD of TGFR-2, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23538); members share this curated model.
