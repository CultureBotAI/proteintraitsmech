identifier: CDD:cd22585
label: "Rcat domain of ATP-dependent RNA helicase DEAH12 and similar proteins. This group includes Arabidopsis thaliana ATP-dependent RNA helicases DEAH11 and DEAH12, which may be bifunctional proteins that function as DEAD-box RNA helicases (EC 3.6.4.13) and RBR-type E3 ubiquitin-protein ligases (EC 2.3.2.31). As RNA helicases, they may utilize the energy from ATP hydrolysis to unwind RNA (or DNA). DEAD-box RNA helicases participate in every aspect of RNA metabolism. As E3 ubiquitin-protein ligase, they may function as part of E3 complexes, which accept ubiquitin from specific E2 ubiquitin-conjugating enzymes and then transfer it to substrates. Other members of this group may not have an RNA helicase domain. All members contain an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain."
definition: >-
  Rcat domain of ATP-dependent RNA helicase DEAH12 and similar proteins. This group includes Arabidopsis thaliana ATP-dependent RNA helicases DEAH11 and DEAH12, which may be bifunctional proteins that function as DEAD-box RNA helicases (EC 3.6.4.13) and RBR-type E3 ubiquitin-protein ligases (EC 2.3.2.31). As RNA helicases, they may utilize the energy from ATP hydrolysis to unwind RNA (or DNA). DEAD-box RNA helicases participate in every aspect of RNA metabolism. As E3 ubiquitin-protein ligase, they may function as part of E3 complexes, which accept ubiquitin from specific E2 ubiquitin-conjugating enzymes and then transfer it to substrates. Other members of this group may not have an RNA helicase domain. All members contain an RBR domain that was previously known as RING-BetweenRING-RING domain or TRIAD [two RING fingers and a DRIL (double RING finger linked)] domain. Based on current understanding of the structural biology of RBR ligases, the nomenclature of RBR has been changed to RING1-BRcat (benign-catalytic)-Rcat (required-for-catalysis) recently. The RBR domain uses an auto-inhibitory mechanism to modulate ubiquitination activity, as well as a hybrid mechanism that combines aspects from both RING and HECT E3 ligase functions to facilitate the ubiquitination reaction. This model corresponds to the Rcat domain that is essential for RBR E3 ligase activity and adopts the same fold as the BRcat domain. — an NCBI CDD conserved domain (cd22585); members share this curated model.
