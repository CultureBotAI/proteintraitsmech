identifier: CDD:cd17224
label: "Ras-associating (RA) domain found in apoptosis-stimulating protein of p53 protein 1 (ASPP1). ASPP1 is a member of the ASPP protein family (Apoptosi-Stimulating Protein of p53) that activates the p53-mediated apoptotic response. ASSP1 functions as a tumor suppressor and coordinates with p53 to protect hematopoietic stem cell (HSC) pool integrity, guarding against hematological malignancies. ASSP1 contains a RA domain at the N-terminus. The RA domain is a ubiquitin-like domain and RA domain-containing proteins are involved in several different functions ranging from tumor suppression to being oncoproteins."
definition: >-
  Ras-associating (RA) domain found in apoptosis-stimulating protein of p53 protein 1 (ASPP1). ASPP1 is a member of the ASPP protein family (Apoptosi-Stimulating Protein of p53) that activates the p53-mediated apoptotic response. ASSP1 functions as a tumor suppressor and coordinates with p53 to protect hematopoietic stem cell (HSC) pool integrity, guarding against hematological malignancies. ASSP1 contains a RA domain at the N-terminus. The RA domain is a ubiquitin-like domain and RA domain-containing proteins are involved in several different functions ranging from tumor suppression to being oncoproteins. — an NCBI CDD conserved domain (cd17224); members share this curated model.
