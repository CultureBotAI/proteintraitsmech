identifier: CDD:cd22976
label: "dimerization/docking (D/D) domain found in EF-hand calcium-binding domain-containing protein 10 (EFCAB10) and similar proteins. The subfamily includes uncharacterized EF-hand calcium-binding domain-containing protein 10 (EFCAB10), which contains an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1."
definition: >-
  dimerization/docking (D/D) domain found in EF-hand calcium-binding domain-containing protein 10 (EFCAB10) and similar proteins. The subfamily includes uncharacterized EF-hand calcium-binding domain-containing protein 10 (EFCAB10), which contains an N-terminal domain that shows high sequence similarity to the dimerization/docking (D/D) domains of regulatory subunit of cAMP-dependent protein kinase (PKA) and protein DPY-30/SDC1. — an NCBI CDD conserved domain (cd22976); members share this curated model.
