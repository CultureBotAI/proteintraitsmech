identifier: CDD:cd22227
label: "Hook domain found in protein Hook 2 (Hook2) and similar proteins. Hook2 is a microtubule-binding protein that contributes to the establishment and maintenance of centrosome function. It may function in the positioning or formation of aggresomes, which are pericentriolar accumulations of misfolded proteins, proteasomes and chaperones. Hook2 is a component of the FTS/Hook/FHIP complex (FHF complex), which may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting (HOPS) complex."
definition: >-
  Hook domain found in protein Hook 2 (Hook2) and similar proteins. Hook2 is a microtubule-binding protein that contributes to the establishment and maintenance of centrosome function. It may function in the positioning or formation of aggresomes, which are pericentriolar accumulations of misfolded proteins, proteasomes and chaperones. Hook2 is a component of the FTS/Hook/FHIP complex (FHF complex), which may function to promote vesicle trafficking and/or fusion via the homotypic vesicular protein sorting (HOPS) complex. — an NCBI CDD conserved domain (cd22227); members share this curated model.
