identifier: CDD:cd22954
label: "PLL-type lectin with a 7-bladed beta-propeller topology. This model characterizes a family of lectins with a seven-bladed beta-propeller topology, which may specifically bind to O-methylated sugars, a carbohydrate modification whose function is not entirely understood. The pattern of methylation may be associated with defense agains pathogens, and family members such as PLL2 and PHL could play a role in circumventing host immune system defenses. Family member PLL3 has also been shown to interact with O-methylated glycans, but has higher affinity to L-fucose and its derivatives."
definition: >-
  PLL-type lectin with a 7-bladed beta-propeller topology. This model characterizes a family of lectins with a seven-bladed beta-propeller topology, which may specifically bind to O-methylated sugars, a carbohydrate modification whose function is not entirely understood. The pattern of methylation may be associated with defense agains pathogens, and family members such as PLL2 and PHL could play a role in circumventing host immune system defenses. Family member PLL3 has also been shown to interact with O-methylated glycans, but has higher affinity to L-fucose and its derivatives. — an NCBI CDD conserved domain (cd22954); members share this curated model.
