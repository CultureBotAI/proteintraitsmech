identifier: CDD:cd23327
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 20 (FGF20) and similar proteins. FGF20 acts as a neurotrophic factor that regulates central nervous development and function. It interacts with fibroblast growth factor receptors, FGFR2 and FGFR4. Affinity between fibroblast growth factors (FGFs) and their receptors is increased by heparan sulfate glycosaminoglycans that function as coreceptors. FGF20 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in fibroblast growth factor 20 (FGF20) and similar proteins. FGF20 acts as a neurotrophic factor that regulates central nervous development and function. It interacts with fibroblast growth factor receptors, FGFR2 and FGFR4. Affinity between fibroblast growth factors (FGFs) and their receptors is increased by heparan sulfate glycosaminoglycans that function as coreceptors. FGF20 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23327); members share this curated model.
