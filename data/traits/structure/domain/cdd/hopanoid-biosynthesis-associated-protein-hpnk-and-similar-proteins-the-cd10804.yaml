identifier: CDD:cd10804
label: "hopanoid biosynthesis associated protein HpnK and similar proteins. The subfamily includes some uncharacterized proteins annotated as hopanoid biosynthesis associated proteins, HpnK. They show high sequence similarity to proteins from the YdjC-family, the latter is represented by an uncharacterised protein YdjC (also known as ChbG) encoded by the chb (N,N'-diacetylchitobiose, also called [GlcNAc]2) or cel operon in Escherichia coli, which encodes enzymes involved in growth on an N,N'-diacetylchitobiose carbon source."
definition: >-
  hopanoid biosynthesis associated protein HpnK and similar proteins. The subfamily includes some uncharacterized proteins annotated as hopanoid biosynthesis associated proteins, HpnK. They show high sequence similarity to proteins from the YdjC-family, the latter is represented by an uncharacterised protein YdjC (also known as ChbG) encoded by the chb (N,N'-diacetylchitobiose, also called [GlcNAc]2) or cel operon in Escherichia coli, which encodes enzymes involved in growth on an N,N'-diacetylchitobiose carbon source. — an NCBI CDD conserved domain (cd10804); members share this curated model.
