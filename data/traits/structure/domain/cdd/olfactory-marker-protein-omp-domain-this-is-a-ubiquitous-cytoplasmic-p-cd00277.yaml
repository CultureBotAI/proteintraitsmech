identifier: CDD:cd00277
label: "Olfactory Marker Protein (OMP) domain. This is a ubiquitous, cytoplasmic protein found in mature olfactory receptor neurons of all vertebrates. Electrophysiological and behavioral studies demonstrate that it is a modulator of the olfactory signal transduction pathway, though its biochemical role is not established. OMP has a similar beta-clam fold found in a variety of existing structures, including viral coat and capsid proteins, galactose binding proteins, and intestinal fatty acid-binding proteins. The surface of OMP is mostly convex and lacking obvious small molecule binding sites, suggesting that it is more likely to be involved in modulating protein-protein interaction than in interacting with small molecule ligands. Recently, OMP has been shown to bind to the brain-expressed X-linked (Bex1) protein."
definition: >-
  Olfactory Marker Protein (OMP) domain. This is a ubiquitous, cytoplasmic protein found in mature olfactory receptor neurons of all vertebrates. Electrophysiological and behavioral studies demonstrate that it is a modulator of the olfactory signal transduction pathway, though its biochemical role is not established. OMP has a similar beta-clam fold found in a variety of existing structures, including viral coat and capsid proteins, galactose binding proteins, and intestinal fatty acid-binding proteins. The surface of OMP is mostly convex and lacking obvious small molecule binding sites, suggesting that it is more likely to be involved in modulating protein-protein interaction than in interacting with small molecule ligands. Recently, OMP has been shown to bind to the brain-expressed X-linked (Bex1) protein. — an NCBI CDD conserved domain (cd00277); members share this curated model.
