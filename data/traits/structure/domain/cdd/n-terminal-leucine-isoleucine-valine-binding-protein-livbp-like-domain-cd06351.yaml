identifier: CDD:cd06351
label: "N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of the NMDA, AMPA, and kainate receptor subtypes of ionotropic glutamate receptors (iGluRs). N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of the NMDA, AMPA, and kainate receptor subtypes of ionotropic glutamate receptors (iGluRs). While this N-terminal domain belongs to the periplasmic-binding fold type 1 superfamily, the glutamate-binding domain of the iGluR is structurally homologous to the periplasmic-binding fold type 2. The LIVBP-like domain of iGluRs is thought to play a role in the initial assembly of iGluR subunits, but it is not well understood how this domain is arranged and functions in intact iGluR. Glutamate mediates the majority of excitatory synaptic transmission in the central nervous system via two broad classes of ionotropic receptors characterized by their response to glutamate agonists: N-methyl-aspartate (NMDA) and non-NMDA receptors. NMDA receptors have intrinsically slow kinetics, are highly permeable to Ca2+, and are blocked by extracellular Mg2+ in a voltage-dependent manner. On the other hand, non-NMDA receptors have faster kinetics, are weakly permeable to Ca2+, and are not blocked by extracellular Mg2+. While non-NMDA receptors typically mediate excitatory synaptic responses at resting membrane potentials, NMDA receptors contribute to several forms of synaptic plasticity and are suggested to play an important role in the development of synaptic pathways."
definition: >-
  N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of the NMDA, AMPA, and kainate receptor subtypes of ionotropic glutamate receptors (iGluRs). N-terminal leucine-isoleucine-valine binding protein (LIVBP)-like domain of the NMDA, AMPA, and kainate receptor subtypes of ionotropic glutamate receptors (iGluRs). While this N-terminal domain belongs to the periplasmic-binding fold type 1 superfamily, the glutamate-binding domain of the iGluR is structurally homologous to the periplasmic-binding fold type 2. The LIVBP-like domain of iGluRs is thought to play a role in the initial assembly of iGluR subunits, but it is not well understood how this domain is arranged and functions in intact iGluR. Glutamate mediates the majority of excitatory synaptic transmission in the central nervous system via two broad classes of ionotropic receptors characterized by their response to glutamate agonists: N-methyl-aspartate (NMDA) and non-NMDA receptors. NMDA receptors have intrinsically slow kinetics, are highly permeable to Ca2+, and are blocked by extracellular Mg2+ in a voltage-dependent manner. On the other hand, non-NMDA receptors have faster kinetics, are weakly permeable to Ca2+, and are not blocked by extracellular Mg2+. While non-NMDA receptors typically mediate excitatory synaptic responses at resting membrane potentials, NMDA receptors contribute to several forms of synaptic plasticity and are suggested to play an important role in the development of synaptic pathways. — an NCBI CDD conserved domain (cd06351); members share this curated model.
