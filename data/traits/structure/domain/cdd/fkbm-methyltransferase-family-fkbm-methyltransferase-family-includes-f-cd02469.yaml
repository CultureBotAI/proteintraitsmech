identifier: CDD:cd02469
label: "FkbM methyltransferase family. FkbM methyltransferase family includes FkbM, AglP, NoeI and related enzymes. FkbM catalyzes the transfer of a methyl group from S-adenosyl-L-methionine to the 31-O-position of 31-O-demethyl-FK506 and its structural analogs. This is part of the biosynthesis of FK506, which is a macrolide antibiotic with immunosuppressant activity. Hexuronic acid methyltransferase AglP is involved in the assembly of a N-linked pentasaccharide that decorates the S-layer glycoprotein and flagellins. Nodulation protein NoeI is required for 2-O-methylation of the fucosyl group of Nod factor"
definition: >-
  FkbM methyltransferase family. FkbM methyltransferase family includes FkbM, AglP, NoeI and related enzymes. FkbM catalyzes the transfer of a methyl group from S-adenosyl-L-methionine to the 31-O-position of 31-O-demethyl-FK506 and its structural analogs. This is part of the biosynthesis of FK506, which is a macrolide antibiotic with immunosuppressant activity. Hexuronic acid methyltransferase AglP is involved in the assembly of a N-linked pentasaccharide that decorates the S-layer glycoprotein and flagellins. Nodulation protein NoeI is required for 2-O-methylation of the fucosyl group of Nod factor — an NCBI CDD conserved domain (cd02469); members share this curated model.
