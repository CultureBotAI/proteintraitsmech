identifier: CDD:cd02073
label: "Aminophospholipid translocases (APLTs), similar to Saccharomyces cerevisiae Dnf1-3p, Drs2p, and human ATP8A2, -10D, -11B, -11C. Aminophospholipid translocases (APLTs), also known as type 4 P-type ATPases, act as flippases, and translocate specific phospholipids from the exoplasmic leaflet to the cytoplasmic leaflet of biological membranes. Yeast Dnf1 and Dnf2 mediate the transport of phosphatidylethanolamine, phosphatidylserine, and phosphatidylcholine from the outer to the inner leaflet of the plasma membrane. This subfamily includes mammalian flippases such as ATP11C which may selectively transports PS and PE from the outer leaflet of the plasma membrane to the inner leaflet. It also includes Arabidopsis phospholipid flippases including ALA1, and Caenorhabditis elegans flippases, including TAT-1, the latter has been shown to facilitate the inward transport of phosphatidylserine. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle."
definition: >-
  Aminophospholipid translocases (APLTs), similar to Saccharomyces cerevisiae Dnf1-3p, Drs2p, and human ATP8A2, -10D, -11B, -11C. Aminophospholipid translocases (APLTs), also known as type 4 P-type ATPases, act as flippases, and translocate specific phospholipids from the exoplasmic leaflet to the cytoplasmic leaflet of biological membranes. Yeast Dnf1 and Dnf2 mediate the transport of phosphatidylethanolamine, phosphatidylserine, and phosphatidylcholine from the outer to the inner leaflet of the plasma membrane. This subfamily includes mammalian flippases such as ATP11C which may selectively transports PS and PE from the outer leaflet of the plasma membrane to the inner leaflet. It also includes Arabidopsis phospholipid flippases including ALA1, and Caenorhabditis elegans flippases, including TAT-1, the latter has been shown to facilitate the inward transport of phosphatidylserine. This subfamily belongs to the P-type ATPases, a large family of integral membrane transporters that are of critical importance in all kingdoms of life. They generate and maintain (electro-) chemical gradients across cellular membranes, by translocating cations, heavy metals and lipids, and are distinguished from other main classes of transport ATPases (F- , V- , and ABC- type) by the formation of a phosphorylated (P-) intermediate state in the catalytic cycle. — an NCBI CDD conserved domain (cd02073); members share this curated model.
