identifier: CDD:cd24040
label: "nucleotide-binding domain (NBD) of yeast guanosine-diphosphatase (GDA1) and similar proteins. After transfer of sugars to endogenous macromolecular acceptors, GDA1 (EC 3.6.1.42), also called GDPase, converts nucleoside diphosphates to nucleoside monophosphates which in turn exit the Golgi lumen in a coupled antiporter reaction, allowing entry of additional nucleotide sugar from the cytosol."
definition: >-
  nucleotide-binding domain (NBD) of yeast guanosine-diphosphatase (GDA1) and similar proteins. After transfer of sugars to endogenous macromolecular acceptors, GDA1 (EC 3.6.1.42), also called GDPase, converts nucleoside diphosphates to nucleoside monophosphates which in turn exit the Golgi lumen in a coupled antiporter reaction, allowing entry of additional nucleotide sugar from the cytosol. — an NCBI CDD conserved domain (cd24040); members share this curated model.
