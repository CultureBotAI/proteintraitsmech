identifier: CDD:cd12221
label: "Cellophane induced protein repeats of fungus Venturia inaequalis. Cin1 (cellulose induced protein 1) repeat protein of Venturia inaequalis, the fungus responsible for scab disease of apple, encodes 8 cysteine-rich repeats and is greatly upregulated within the plant and on cellophane membranes. The crystal structure reveals a pair of disulfide bridges in each repeat. The repeats have been described as adopting a beads-on-a-string organization. Cin1 function is undetermined, however the alpha-helical structure may be involved in protein-protein or protein-carbohydrate interactions in the extracellular matrix."
definition: >-
