identifier: CDD:cd11947
label: "N-terminal Src homology 3 domain of GRB2-related adaptor protein 2. GRAP2 is also called GADS (GRB2-related adapter downstream of Shc), GrpL, GRB2L, Mona, or GRID (Grb2-related protein with insert domain). It is expressed specifically in the hematopoietic system. It plays an important role in T cell receptor (TCR) signaling by promoting the formation of the SLP-76:LAT complex, which couples the TCR to the Ras pathway. It also have roles in antigen-receptor and tyrosine kinase mediated signaling. GRAP2 is unique from other GRB2-like adaptor proteins in that it can be regulated by caspase cleavage. It contains an N-terminal SH3 domain, a central SH2 domain, and a C-terminal SH3 domain. The N-terminal SH3 domain of the related protein GRB2 binds to Sos and Sos-derived proline-rich peptides. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  N-terminal Src homology 3 domain of GRB2-related adaptor protein 2. GRAP2 is also called GADS (GRB2-related adapter downstream of Shc), GrpL, GRB2L, Mona, or GRID (Grb2-related protein with insert domain). It is expressed specifically in the hematopoietic system. It plays an important role in T cell receptor (TCR) signaling by promoting the formation of the SLP-76:LAT complex, which couples the TCR to the Ras pathway. It also have roles in antigen-receptor and tyrosine kinase mediated signaling. GRAP2 is unique from other GRB2-like adaptor proteins in that it can be regulated by caspase cleavage. It contains an N-terminal SH3 domain, a central SH2 domain, and a C-terminal SH3 domain. The N-terminal SH3 domain of the related protein GRB2 binds to Sos and Sos-derived proline-rich peptides. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11947); members share this curated model.
