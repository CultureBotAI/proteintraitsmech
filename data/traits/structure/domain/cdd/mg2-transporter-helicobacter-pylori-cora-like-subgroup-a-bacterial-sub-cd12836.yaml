identifier: CDD:cd12836
label: "Mg2+ transporter Helicobacter pylori CorA-like subgroup. A bacterial subgroup of the Escherichia coli CorA-Salmonella typhimurium ZntB_like (EcCorA_ZntB-like) family of the MIT superfamily of essential membrane proteins involved in transporting divalent cations (uptake or efflux) across membranes. This subgroup includes the Mg2+ transporter Helicobacter pylori CorAs (which can also transport Co2+, and Ni2+); CorA plays an important role in the viability of this pathogen. Structures of the intracellular domain of Vibrio parahaemolyticus and Salmonella typhimurium ZntB (members of the EcCorA_ZntB-like family) form funnel-shaped homopentamers, the tip of the funnel is formed from two C-terminal transmembrane (TM) helices from each monomer, and the large opening of the funnel from the N-terminal cytoplasmic domains. The GMN signature motif of the MIT superfamily occurs just after TM1, mutation within this motif is known to abolish Mg2+ transport through Salmonella typhimurium CorA, and Mrs2p. Natural variants such as GVN and GIN, such as occur in some ZntB family proteins, may be associated with the transport of different divalent cations, such as zinc and cadmium. The functional diversity of MIT transporters may also be due to minor structural differences regulating gating, substrate selection, and transport."
definition: >-
  Mg2+ transporter Helicobacter pylori CorA-like subgroup. A bacterial subgroup of the Escherichia coli CorA-Salmonella typhimurium ZntB_like (EcCorA_ZntB-like) family of the MIT superfamily of essential membrane proteins involved in transporting divalent cations (uptake or efflux) across membranes. This subgroup includes the Mg2+ transporter Helicobacter pylori CorAs (which can also transport Co2+, and Ni2+); CorA plays an important role in the viability of this pathogen. Structures of the intracellular domain of Vibrio parahaemolyticus and Salmonella typhimurium ZntB (members of the EcCorA_ZntB-like family) form funnel-shaped homopentamers, the tip of the funnel is formed from two C-terminal transmembrane (TM) helices from each monomer, and the large opening of the funnel from the N-terminal cytoplasmic domains. The GMN signature motif of the MIT superfamily occurs just after TM1, mutation within this motif is known to abolish Mg2+ transport through Salmonella typhimurium CorA, and Mrs2p. Natural variants such as GVN and GIN, such as occur in some ZntB family proteins, may be associated with the transport of different divalent cations, such as zinc and cadmium. The functional diversity of MIT transporters may also be due to minor structural differences regulating gating, substrate selection, and transport. — an NCBI CDD conserved domain (cd12836); members share this curated model.
