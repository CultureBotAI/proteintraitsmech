identifier: CDD:cd12757
label: "RNA recognition motif 1 (RRM1) found in heterogeneous nuclear ribonucleoprotein A/B (hnRNP A/B) and similar proteins. This subgroup corresponds to the RRM1 of hnRNP A/B, also termed APOBEC1-binding protein 1 (ABBP-1), which is an RNA unwinding protein with a high affinity for G- followed by U-rich regions. hnRNP A/B has also been identified as an APOBEC1-binding protein that interacts with apolipoprotein B (apoB) mRNA transcripts around the editing site and thus plays an important role in apoB mRNA editing. hnRNP A/B contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by a long C-terminal glycine-rich domain that contains a potential ATP/GTP binding loop."
definition: >-
  RNA recognition motif 1 (RRM1) found in heterogeneous nuclear ribonucleoprotein A/B (hnRNP A/B) and similar proteins. This subgroup corresponds to the RRM1 of hnRNP A/B, also termed APOBEC1-binding protein 1 (ABBP-1), which is an RNA unwinding protein with a high affinity for G- followed by U-rich regions. hnRNP A/B has also been identified as an APOBEC1-binding protein that interacts with apolipoprotein B (apoB) mRNA transcripts around the editing site and thus plays an important role in apoB mRNA editing. hnRNP A/B contains two RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by a long C-terminal glycine-rich domain that contains a potential ATP/GTP binding loop. — an NCBI CDD conserved domain (cd12757); members share this curated model.
