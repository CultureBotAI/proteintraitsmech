identifier: CDD:cd14321
label: "UBA domain found in inhibitor of apoptosis proteins (IAPs). IAPs are frequently overexpressed in cancer and associated with tumor cell survival, chemoresistance, disease progression and poor prognosis. They function primarily as negative regulators of cell death. They regulate caspases and apoptosis through the inhibition of specific members of the caspase family of cysteine proteases. In addition, IAPs has been implicated in a multitude of other cellular processes, including inflammatory signalling and immunity, mitogenic kinase signalling, proliferation and mitosis, as well as cell invasion and metastasis. IAPs in this family includes cellular inhibitor of apoptosis protein c-IAP1 and c-IAP2, XIAP, and BIRC8, all of which contain three N-terminal baculoviral IAP repeat (BIR) domains that enable interactions with proteins, a ubiquitin-association (UBA) domain that is responsible for the binding of binds polyubiquitin (polyUb), and a RING domain at the carboxyl terminus that is required for ubiquitin ligase activity. c-IAPs contains an additional caspase activation and recruitment domain (CARD) between UBA and RING domains. CARD domain may serve as a protein interaction surface."
definition: >-
  UBA domain found in inhibitor of apoptosis proteins (IAPs). IAPs are frequently overexpressed in cancer and associated with tumor cell survival, chemoresistance, disease progression and poor prognosis. They function primarily as negative regulators of cell death. They regulate caspases and apoptosis through the inhibition of specific members of the caspase family of cysteine proteases. In addition, IAPs has been implicated in a multitude of other cellular processes, including inflammatory signalling and immunity, mitogenic kinase signalling, proliferation and mitosis, as well as cell invasion and metastasis. IAPs in this family includes cellular inhibitor of apoptosis protein c-IAP1 and c-IAP2, XIAP, and BIRC8, all of which contain three N-terminal baculoviral IAP repeat (BIR) domains that enable interactions with proteins, a ubiquitin-association (UBA) domain that is responsible for the binding of binds polyubiquitin (polyUb), and a RING domain at the carboxyl terminus that is required for ubiquitin ligase activity. c-IAPs contains an additional caspase activation and recruitment domain (CARD) between UBA and RING domains. CARD domain may serve as a protein interaction surface. — an NCBI CDD conserved domain (cd14321); members share this curated model.
