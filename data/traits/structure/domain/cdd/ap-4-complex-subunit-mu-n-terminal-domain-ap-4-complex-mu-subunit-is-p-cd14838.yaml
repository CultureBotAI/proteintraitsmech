identifier: CDD:cd14838
label: "AP-4 complex subunit mu N-terminal domain. AP-4 complex mu subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large epsilon-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. AP-4 does not bind the coat protein clathrin, it is associated with nonclathrin coats. Its phospholipid binding partner is unknown and it is localized in the trans-Golgi network (TGN). The mu subunit is comprised of an N-terminal longin domain followed by a C-terminal domain which is involved in the binding of the Y-X-X-Phi sorting signal."
definition: >-
  AP-4 complex subunit mu N-terminal domain. AP-4 complex mu subunit is part of the heterotetrameric adaptor protein (AP)-1 complex which consists of one large epsilon-, one beta-, one mu-, and one sigma-subunit. AP complexes link the cytosolic domains of the cargo proteins to the protein coat that induces vesicle budding in the donor compartment during vesicle transport. AP-4 does not bind the coat protein clathrin, it is associated with nonclathrin coats. Its phospholipid binding partner is unknown and it is localized in the trans-Golgi network (TGN). The mu subunit is comprised of an N-terminal longin domain followed by a C-terminal domain which is involved in the binding of the Y-X-X-Phi sorting signal. — an NCBI CDD conserved domain (cd14838); members share this curated model.
