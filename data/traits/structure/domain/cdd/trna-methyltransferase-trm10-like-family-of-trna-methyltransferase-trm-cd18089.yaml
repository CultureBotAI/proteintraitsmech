identifier: CDD:cd18089
label: "tRNA methyltransferase Trm10-like. Family of tRNA methyltransferase Trm10-like proteins catalyzes the N(1) methylation of guanine at position 9 (m(1)G9) of tRNA (eukaryotes) or N(1) methylation of guanine or adenine at position 9 (m1G9/m1A9) of tRNA (archaea), which might play a role in the stabilization of tRNA and in translation termination efficiency. Trm10 is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot."
definition: >-
  tRNA methyltransferase Trm10-like. Family of tRNA methyltransferase Trm10-like proteins catalyzes the N(1) methylation of guanine at position 9 (m(1)G9) of tRNA (eukaryotes) or N(1) methylation of guanine or adenine at position 9 (m1G9/m1A9) of tRNA (archaea), which might play a role in the stabilization of tRNA and in translation termination efficiency. Trm10 is a member of the SPOUT (SpoU-TrmD) methyltransferase (MTase) superfamily, a large class of S-adenosyl-L-methionine (AdoMet or SAM)-dependent RNA MTases which are structurally characterized by a deep trefoil knot. — an NCBI CDD conserved domain (cd18089); members share this curated model.
