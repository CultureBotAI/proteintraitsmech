identifier: CDD:cd17742
label: "BRCT domain of yeast chitin biosynthesis protein CHS5 and similar proteins. CHS5, also termed protein CAL3, is a component of the CHS5/6 complex which mediates export of specific cargo proteins, including chitin synthase CHS3. It is also involved in targeting FUS1 to sites of polarized growth."
definition: >-
  BRCT domain of yeast chitin biosynthesis protein CHS5 and similar proteins. CHS5, also termed protein CAL3, is a component of the CHS5/6 complex which mediates export of specific cargo proteins, including chitin synthase CHS3. It is also involved in targeting FUS1 to sites of polarized growth. — an NCBI CDD conserved domain (cd17742); members share this curated model.
