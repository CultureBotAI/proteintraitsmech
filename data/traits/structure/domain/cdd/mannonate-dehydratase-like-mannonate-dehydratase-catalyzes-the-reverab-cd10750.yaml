label: "Mannonate Dehydratase-like. Mannonate dehydratase catalyzes the reverable conversion od D-mannonate to 2-dehydro-3-deoxy-D-gluconate. It is involved in pentose and glucuronate metabolism pathways. This subfamily also contains several uncharacterized proteins. It is a member of the xylose isomerase-like superfamily of TIM-barrel enzymes."
