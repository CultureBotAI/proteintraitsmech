identifier: CDD:cd17092
label: "FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain 1, F1 sub-domain, found in Myosin-VIIa, Myosin-VIIb, and similar proteins. This family includes two nontraditional members of the myosin superfamily, myosin-VIIa and myosin-VIIb. Myosin-VIIa, also termed myosin-7a (Myo7a), has been implicated in the structural organization of hair bundles at the apex of sensory hair cells (SHCs) where it serves mechanotransduction in the process of hearing and balance. Mutations in the MYO7A gene may be associated with Usher Syndrome type 1B (USH1B) and nonsyndromic hearing loss (DFNB2, DFNA11). Myosin-VIIb, also termed myosin-7b (Myo7b), is a high duty ratio motor adapted for generating and maintaining tension. It associates with harmonin and ANKS4B to form a stable ternary complex for anchoring microvilli tip-link cadherins. Like other unconventional myosins, myosin-VII is composed of a conserved motor head, a neck region and a tail region containing two MyTH4 domains, a SH3 domain, and two FERM domains. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to the F1 sub-domain of the first FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N)."
definition: >-
  FERM (Four.1 protein, Ezrin, Radixin, Moesin) domain 1, F1 sub-domain, found in Myosin-VIIa, Myosin-VIIb, and similar proteins. This family includes two nontraditional members of the myosin superfamily, myosin-VIIa and myosin-VIIb. Myosin-VIIa, also termed myosin-7a (Myo7a), has been implicated in the structural organization of hair bundles at the apex of sensory hair cells (SHCs) where it serves mechanotransduction in the process of hearing and balance. Mutations in the MYO7A gene may be associated with Usher Syndrome type 1B (USH1B) and nonsyndromic hearing loss (DFNB2, DFNA11). Myosin-VIIb, also termed myosin-7b (Myo7b), is a high duty ratio motor adapted for generating and maintaining tension. It associates with harmonin and ANKS4B to form a stable ternary complex for anchoring microvilli tip-link cadherins. Like other unconventional myosins, myosin-VII is composed of a conserved motor head, a neck region and a tail region containing two MyTH4 domains, a SH3 domain, and two FERM domains. The FERM domain is made up of three sub-domains, F1, F2, and F3. The family corresponds to the F1 sub-domain of the first FERM domain, which is also called the N-terminal ubiquitin-like structural domain of the FERM domain (FERM_N). — an NCBI CDD conserved domain (cd17092); members share this curated model.
