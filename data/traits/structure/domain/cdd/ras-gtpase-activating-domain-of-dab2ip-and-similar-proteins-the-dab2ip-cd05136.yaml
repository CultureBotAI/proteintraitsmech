identifier: CDD:cd05136
label: "Ras-GTPase Activating Domain of DAB2IP and similar proteins. The DAB2IP family of Ras GTPase-activating proteins includes DAB2IP, nGAP, and Syn GAP. Disabled 2 interactive protein, (DAB2IP; also known as ASK-interacting protein 1 (AIP1)), is a member of the GTPase-activating proteins, down-regulates Ras-mediated signal pathways, and mediates TNF-induced activation of ASK1-JNK signaling pathways. The mechanism by which TNF signaling is coupled to DAB2IP is not known."
definition: >-
  Ras-GTPase Activating Domain of DAB2IP and similar proteins. The DAB2IP family of Ras GTPase-activating proteins includes DAB2IP, nGAP, and Syn GAP. Disabled 2 interactive protein, (DAB2IP; also known as ASK-interacting protein 1 (AIP1)), is a member of the GTPase-activating proteins, down-regulates Ras-mediated signal pathways, and mediates TNF-induced activation of ASK1-JNK signaling pathways. The mechanism by which TNF signaling is coupled to DAB2IP is not known. — an NCBI CDD conserved domain (cd05136); members share this curated model.
