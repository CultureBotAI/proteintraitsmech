identifier: CDD:cd17309
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in Phosphatidylinositol 5-phosphate 4-kinase type-2 alpha (PIP5K2A) and similar proteins. PIP5K2A (EC 2.7.1.149), also known as PIP4K2A, or 1-phosphatidylinositol 5-phosphate 4-kinase 2-alpha, or diphosphoinositide kinase 2-alpha, or PIP5KIII, or phosphatidylinositol 5-phosphate 4-kinase type II alpha, or PI(5)P 4-kinase type II alpha, or PIP4KII-alpha, or PtdIns(4)P-5-kinase C isoform, or PtdIns(5)P-4-kinase isoform 2-alpha, catalyzes the phosphorylation of phosphatidylinositol 5-phosphate (PtdIns5P) on the fourth hydroxyl of the myo-inositol ring, to form phosphatidylinositol 4,5-bisphosphate (PtdIns(4,5)P2), one of the key metabolic crossroads in phosphoinositide signaling. It is possibly involved in a mechanism protecting against tardive dyskinesia-inducing neurotoxicity. PIP5K2A is associated with schizophrenia. It controls the function of KCNQ channels via phosphatidylinositol-4,5-bisphosphate (PIP2) synthesis, and plays a potential role in the regulation of alpha-amino-3-hydroxy-5-methyl-4-isoxazole propionic acid (AMPA) receptors."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in Phosphatidylinositol 5-phosphate 4-kinase type-2 alpha (PIP5K2A) and similar proteins. PIP5K2A (EC 2.7.1.149), also known as PIP4K2A, or 1-phosphatidylinositol 5-phosphate 4-kinase 2-alpha, or diphosphoinositide kinase 2-alpha, or PIP5KIII, or phosphatidylinositol 5-phosphate 4-kinase type II alpha, or PI(5)P 4-kinase type II alpha, or PIP4KII-alpha, or PtdIns(4)P-5-kinase C isoform, or PtdIns(5)P-4-kinase isoform 2-alpha, catalyzes the phosphorylation of phosphatidylinositol 5-phosphate (PtdIns5P) on the fourth hydroxyl of the myo-inositol ring, to form phosphatidylinositol 4,5-bisphosphate (PtdIns(4,5)P2), one of the key metabolic crossroads in phosphoinositide signaling. It is possibly involved in a mechanism protecting against tardive dyskinesia-inducing neurotoxicity. PIP5K2A is associated with schizophrenia. It controls the function of KCNQ channels via phosphatidylinositol-4,5-bisphosphate (PIP2) synthesis, and plays a potential role in the regulation of alpha-amino-3-hydroxy-5-methyl-4-isoxazole propionic acid (AMPA) receptors. — an NCBI CDD conserved domain (cd17309); members share this curated model.
