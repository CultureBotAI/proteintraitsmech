identifier: CDD:cd09245
label: "Protein-interacting, Bro1-like domain of Ustilago maydis Rim23 (PalC), and related domains. This family contains the Bro1-like domain of Ustilago maydis Rim23 (also known as PalC), and related proteins. It belongs to the BRO1_Alix_like superfamily which includes the Bro1-like domains of mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding proteins Rhophilin-1 and -2, Brox, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, and related domains. Alix, HD-PTP, Brox, Bro1, Rim20, and Rim23 interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. Rim20 and Rim23 participate in the response to the external pH via the Rim101 pathway. Through its Bro1-like domain, Rim23 allows the interaction between the endosomal and plasma membrane complexes. Bro1-like domains are boomerang-shape, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Intermediates in the Rim101 pathway may play roles in the pathogenesis of fungal corneal infection during Candida albicans keratitis. This family lacks the V-shaped (V) domain found in many members of the BRO1_Alix_like superfamily."
definition: >-
  Protein-interacting, Bro1-like domain of Ustilago maydis Rim23 (PalC), and related domains. This family contains the Bro1-like domain of Ustilago maydis Rim23 (also known as PalC), and related proteins. It belongs to the BRO1_Alix_like superfamily which includes the Bro1-like domains of mammalian Alix (apoptosis-linked gene-2 interacting protein X), His-Domain type N23 protein tyrosine phosphatase (HD-PTP, also known as PTPN23), RhoA-binding proteins Rhophilin-1 and -2, Brox, Bro1 and Rim20 (also known as PalA) from Saccharomyces cerevisiae, and related domains. Alix, HD-PTP, Brox, Bro1, Rim20, and Rim23 interact with the ESCRT (Endosomal Sorting Complexes Required for Transport) system. Rim20 and Rim23 participate in the response to the external pH via the Rim101 pathway. Through its Bro1-like domain, Rim23 allows the interaction between the endosomal and plasma membrane complexes. Bro1-like domains are boomerang-shape, and part of the domain is a tetratricopeptide repeat (TPR)-like structure. Intermediates in the Rim101 pathway may play roles in the pathogenesis of fungal corneal infection during Candida albicans keratitis. This family lacks the V-shaped (V) domain found in many members of the BRO1_Alix_like superfamily. — an NCBI CDD conserved domain (cd09245); members share this curated model.
