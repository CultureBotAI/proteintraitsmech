identifier: CDD:cd19075
label: "AKR7A family of aldo-keto reductase (AKR). Aflatoxin B1 aldehyde reductase member 1/3 (AKR7A1/AKR7A3/AFAR) from Rattus norvegicus, aflatoxin B1 aldehyde reductase member 2 (AKR7A2/AFAR1/AFAR) and aflatoxin B1 aldehyde reductase member 3 (AKR7A3/AFAR2) from Homo sapiens, aflatoxin B1 aldehyde reductase member 2 (AKR7A2/AFAR2) from Rattus norvegicus, and aflatoxin B1 aldehyde reductase member 2 (AKR7A2/AKR7A5/AFAR) from Mus musculus, are founding members of aldo-keto reductase family 7 member A1-5 (AKR7A1-5), respectively. AKR7A2 (EC 1.1.1.n11), also called AFB1 aldehyde reductase 1, or AFB1-AR 1, or aldoketoreductase 7, or succinic semialdehyde reductase, or SSA reductase, catalyzes the NADPH-dependent reduction of succinic semialdehyde to gamma-hydroxybutyrate (GHB). It has NADPH-dependent aldehyde reductase activity towards 2-carboxybenzaldehyde, 2-nitrobenzaldehyde and pyridine-2-aldehyde (in vitro). AKR7A2, AKR7A3 (also called AFB1 aldehyde reductase 2 or AFB1-AR 2), and AKR7A4 (also called AFB1 aldehyde reductase 3, or AFB1-AR 3, or aldoketoreductase 7-like), may be involved in protection of liver against the toxic and carcinogenic effects of aflatoxin B1 (AFB1), a potent hepatocarcinogen. They can reduce the dialdehyde protein-binding form of AFB1 to the non-binding AFB1 dialcohol."
definition: >-
  AKR7A family of aldo-keto reductase (AKR). Aflatoxin B1 aldehyde reductase member 1/3 (AKR7A1/AKR7A3/AFAR) from Rattus norvegicus, aflatoxin B1 aldehyde reductase member 2 (AKR7A2/AFAR1/AFAR) and aflatoxin B1 aldehyde reductase member 3 (AKR7A3/AFAR2) from Homo sapiens, aflatoxin B1 aldehyde reductase member 2 (AKR7A2/AFAR2) from Rattus norvegicus, and aflatoxin B1 aldehyde reductase member 2 (AKR7A2/AKR7A5/AFAR) from Mus musculus, are founding members of aldo-keto reductase family 7 member A1-5 (AKR7A1-5), respectively. AKR7A2 (EC 1.1.1.n11), also called AFB1 aldehyde reductase 1, or AFB1-AR 1, or aldoketoreductase 7, or succinic semialdehyde reductase, or SSA reductase, catalyzes the NADPH-dependent reduction of succinic semialdehyde to gamma-hydroxybutyrate (GHB). It has NADPH-dependent aldehyde reductase activity towards 2-carboxybenzaldehyde, 2-nitrobenzaldehyde and pyridine-2-aldehyde (in vitro). AKR7A2, AKR7A3 (also called AFB1 aldehyde reductase 2 or AFB1-AR 2), and AKR7A4 (also called AFB1 aldehyde reductase 3, or AFB1-AR 3, or aldoketoreductase 7-like), may be involved in protection of liver against the toxic and carcinogenic effects of aflatoxin B1 (AFB1), a potent hepatocarcinogen. They can reduce the dialdehyde protein-binding form of AFB1 to the non-binding AFB1 dialcohol. — an NCBI CDD conserved domain (cd19075); members share this curated model.
