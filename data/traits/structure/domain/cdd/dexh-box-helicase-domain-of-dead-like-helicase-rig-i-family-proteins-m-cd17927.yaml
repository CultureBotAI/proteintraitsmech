identifier: CDD:cd17927
label: "DEXH-box helicase domain of DEAD-like helicase RIG-I family proteins. Members of the RIG-I family include FANCM, dicer, Hef, and the RIG-I-like receptors. Fanconi anemia group M (FANCM) protein is a DNA-dependent ATPase component of the Fanconi anemia (FA) core complex required for the normal activation of the FA pathway, leading to monoubiquitination of the FANCI-FANCD2 complex in response to DNA damage, cellular resistance to DNA cross-linking drugs, and prevention of chromosomal breakage. Dicer ribonucleases cleave double-stranded RNA (dsRNA) precursors to generate microRNAs (miRNAs) and small interfering RNAs (siRNAs). Hef (helicase-associated endonuclease fork-structure) is involved in stalled replication fork repair. RIG-I-like receptors (RLRs) sense cytoplasmic viral RNA and comprises RIG-I, RLR-2/MDA5 (melanoma differentiation-associated protein 5) and RLR-3/LGP2 (laboratory of genetics and physiology 2). The RIG-I family is part of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of DEAD-like helicase RIG-I family proteins. Members of the RIG-I family include FANCM, dicer, Hef, and the RIG-I-like receptors. Fanconi anemia group M (FANCM) protein is a DNA-dependent ATPase component of the Fanconi anemia (FA) core complex required for the normal activation of the FA pathway, leading to monoubiquitination of the FANCI-FANCD2 complex in response to DNA damage, cellular resistance to DNA cross-linking drugs, and prevention of chromosomal breakage. Dicer ribonucleases cleave double-stranded RNA (dsRNA) precursors to generate microRNAs (miRNAs) and small interfering RNAs (siRNAs). Hef (helicase-associated endonuclease fork-structure) is involved in stalled replication fork repair. RIG-I-like receptors (RLRs) sense cytoplasmic viral RNA and comprises RIG-I, RLR-2/MDA5 (melanoma differentiation-associated protein 5) and RLR-3/LGP2 (laboratory of genetics and physiology 2). The RIG-I family is part of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd17927); members share this curated model.
