identifier: CDD:cd11283
label: "ADF-homology domain of glia maturation factor beta and related proteins. Actin depolymerization factor/cofilin-like domains (ADF domains) are present in a family of essential eukaryotic actin regulatory proteins. Most of these proteins enhance the turnover rate of actin and interact with actin monomers as well as actin filaments. The glia maturation factor (GMF), however, does not bind actin but interacts with the Arp2/3 complex (which contains actin-related proteins, amongst others) and suppresses Arp2/3 activity, inducing the dissociation of branched daughter filaments from their mother filaments. This family includes both mammalian GMF isoforms, GMF-beta and GMF-gamma. GMF-beta regulates cellular growth, fission, differentiation and apoptosis. GMF-gamma is important in myeloid cell development and is an important regulator for cell migration and polarity in neutrophils."
definition: >-
  ADF-homology domain of glia maturation factor beta and related proteins. Actin depolymerization factor/cofilin-like domains (ADF domains) are present in a family of essential eukaryotic actin regulatory proteins. Most of these proteins enhance the turnover rate of actin and interact with actin monomers as well as actin filaments. The glia maturation factor (GMF), however, does not bind actin but interacts with the Arp2/3 complex (which contains actin-related proteins, amongst others) and suppresses Arp2/3 activity, inducing the dissociation of branched daughter filaments from their mother filaments. This family includes both mammalian GMF isoforms, GMF-beta and GMF-gamma. GMF-beta regulates cellular growth, fission, differentiation and apoptosis. GMF-gamma is important in myeloid cell development and is an important regulator for cell migration and polarity in neutrophils. — an NCBI CDD conserved domain (cd11283); members share this curated model.
