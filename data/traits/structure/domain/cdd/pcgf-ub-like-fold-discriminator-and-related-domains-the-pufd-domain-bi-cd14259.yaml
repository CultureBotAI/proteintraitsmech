identifier: CDD:cd14259
label: "PCGF Ub-like fold discriminator and related domains. The PUFD domain binds the RAWUL (RING finger and WD40-associated ubiquitin-like) domain of the polycomb-group RING finger homologs PCGF1 and PCGF3. PUFD was characterized as a domain of the BCL6 corepressor BCOR. It does not appear to bind to PCGF2 and PCGF4. PCGF1 is a component of the Polycomb group (PcG) multi-protein BCOR complex, which is involved in repressing the transcription of BCL6 and CDKN1A. The BCL-6 corepressor (BCOR) is a transcriptional repressor required for germinal center formation and is possibly involved in apoptosis."
definition: >-
  PCGF Ub-like fold discriminator and related domains. The PUFD domain binds the RAWUL (RING finger and WD40-associated ubiquitin-like) domain of the polycomb-group RING finger homologs PCGF1 and PCGF3. PUFD was characterized as a domain of the BCL6 corepressor BCOR. It does not appear to bind to PCGF2 and PCGF4. PCGF1 is a component of the Polycomb group (PcG) multi-protein BCOR complex, which is involved in repressing the transcription of BCL6 and CDKN1A. The BCL-6 corepressor (BCOR) is a transcriptional repressor required for germinal center formation and is possibly involved in apoptosis. — an NCBI CDD conserved domain (cd14259); members share this curated model.
