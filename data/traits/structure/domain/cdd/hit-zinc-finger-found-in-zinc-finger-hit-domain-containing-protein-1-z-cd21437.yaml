identifier: CDD:cd21437
label: "HIT zinc finger found in zinc finger HIT domain-containing protein 1 (ZNHIT1) and similar proteins. The family includes ZNHIT1 and its yeast counterpart, the vacuolar protein sorting-associated protein 71 (Vps71p). ZNHIT1, also known as cyclin-G1-binding protein 1 (CGBP1), zinc finger protein subfamily 4A member 1 (ZNFN4A1), or p18 Hamlet, may have a role in inducing apoptosis through p53 signaling. It binds to Rev-erb beta and releases its inhibitory effect on the transcription of apolipoprotein C3 (APOC3) without affecting its DNA-binding activity. The yeast counterpart Vps71p, also referred to as SWR complex protein 6 (Swc6p), plays a role in the exchange of histone H2A for the H2A variant HZT1, a euchromatin-specific factor, leading to chromatin remodeling and transcriptional changes of targeted genes. It is indirectly involved in vacuolar protein sorting. Members of this family contain a zf-HIT domain characterized by a \"treble-clef\" fold through interleaved CCCC and CCHC zinc finger motifs, both of which bind a zinc ion."
definition: >-
  HIT zinc finger found in zinc finger HIT domain-containing protein 1 (ZNHIT1) and similar proteins. The family includes ZNHIT1 and its yeast counterpart, the vacuolar protein sorting-associated protein 71 (Vps71p). ZNHIT1, also known as cyclin-G1-binding protein 1 (CGBP1), zinc finger protein subfamily 4A member 1 (ZNFN4A1), or p18 Hamlet, may have a role in inducing apoptosis through p53 signaling. It binds to Rev-erb beta and releases its inhibitory effect on the transcription of apolipoprotein C3 (APOC3) without affecting its DNA-binding activity. The yeast counterpart Vps71p, also referred to as SWR complex protein 6 (Swc6p), plays a role in the exchange of histone H2A for the H2A variant HZT1, a euchromatin-specific factor, leading to chromatin remodeling and transcriptional changes of targeted genes. It is indirectly involved in vacuolar protein sorting. Members of this family contain a zf-HIT domain characterized by a "treble-clef" fold through interleaved CCCC and CCHC zinc finger motifs, both of which bind a zinc ion. — an NCBI CDD conserved domain (cd21437); members share this curated model.
