identifier: CDD:cd17304
label: "Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in phosphatidylinositol 4-phosphate 5-kinase-like protein 1 (PIP5KL1) and similar proteins. PIP5KL1 (EC 2.7.1.68), also known as PI(4)P 5-kinase-like protein 1, or PtdIns(4)P-5-kinase-like protein 1, may act as a scaffold to localize and regulate type I PI(4)P 5-kinases to specific compartments within the cell, where they generate PI(4,5)P2 for actin nucleation, signaling and scaffold protein recruitment, and conversion to PI(3,4,5)P3."
definition: >-
  Phosphatidylinositol phosphate kinase (PIPK) catalytic domain found in phosphatidylinositol 4-phosphate 5-kinase-like protein 1 (PIP5KL1) and similar proteins. PIP5KL1 (EC 2.7.1.68), also known as PI(4)P 5-kinase-like protein 1, or PtdIns(4)P-5-kinase-like protein 1, may act as a scaffold to localize and regulate type I PI(4)P 5-kinases to specific compartments within the cell, where they generate PI(4,5)P2 for actin nucleation, signaling and scaffold protein recruitment, and conversion to PI(3,4,5)P3. — an NCBI CDD conserved domain (cd17304); members share this curated model.
