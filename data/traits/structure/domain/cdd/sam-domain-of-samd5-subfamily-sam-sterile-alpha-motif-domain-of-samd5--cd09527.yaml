identifier: CDD:cd09527
label: "SAM domain of Samd5 subfamily. SAM (sterile alpha motif) domain of Samd5 subfamily is a putative protein-protein interaction domain. Proteins of this subfamily have a SAM domain at the N-terminus. SAM is a widespread domain in signaling and regulatory proteins. In many cases SAM mediates dimerization/oligomerization.  The exact function of proteins belonging to this subfamily is unknown."
definition: >-
  SAM domain of Samd5 subfamily. SAM (sterile alpha motif) domain of Samd5 subfamily is a putative protein-protein interaction domain. Proteins of this subfamily have a SAM domain at the N-terminus. SAM is a widespread domain in signaling and regulatory proteins. In many cases SAM mediates dimerization/oligomerization. The exact function of proteins belonging to this subfamily is unknown. — an NCBI CDD conserved domain (cd09527); members share this curated model.
