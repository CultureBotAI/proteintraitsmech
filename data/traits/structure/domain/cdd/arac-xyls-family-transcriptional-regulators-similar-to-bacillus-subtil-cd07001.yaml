identifier: CDD:cd07001
label: "AraC/XylS family transcriptional regulators similar to Bacillus subtilis YbfI, N-terminal cupin domain. This family contains bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators, including YbfI, an uncharacterized Bacillus subtilis. In Pseudomonas putida, this protein is thought to regulate the expression of phenylserine aldolase. Proteins in this family belong to the cupin superfamily with a conserved \"jelly roll-like\" beta-barrel fold capable of homodimerization."
definition: >-
  AraC/XylS family transcriptional regulators similar to Bacillus subtilis YbfI, N-terminal cupin domain. This family contains bacterial proteins containing an AraC/XylS family helix-turn-helix (HTH) DNA-binding domain C-terminal to a cupin domain, and may be possible transcriptional regulators, including YbfI, an uncharacterized Bacillus subtilis. In Pseudomonas putida, this protein is thought to regulate the expression of phenylserine aldolase. Proteins in this family belong to the cupin superfamily with a conserved "jelly roll-like" beta-barrel fold capable of homodimerization. — an NCBI CDD conserved domain (cd07001); members share this curated model.
