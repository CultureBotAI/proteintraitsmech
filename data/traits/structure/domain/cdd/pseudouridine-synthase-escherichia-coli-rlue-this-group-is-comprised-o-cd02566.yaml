identifier: CDD:cd02566
label: "Pseudouridine synthase, Escherichia coli RluE. This group is comprised of bacterial proteins similar to E. coli RluE. Pseudouridine synthases catalyze the isomerization of specific uridines in an RNA molecule to pseudouridines (5-ribosyluracil, psi).  No cofactors are required.  Escherichia coli RluE makes psi2457 in 23S RNA. psi2457 is not universally conserved."
definition: >-
