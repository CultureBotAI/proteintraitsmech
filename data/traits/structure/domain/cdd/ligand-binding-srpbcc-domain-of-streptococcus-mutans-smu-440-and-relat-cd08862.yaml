identifier: CDD:cd08862
label: "Ligand-binding SRPBCC domain of Streptococcus mutans Smu.440 and related proteins. This family includes the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain of Streptococcus mutans Smu.440 and related proteins. This domain belongs to the SRPBCC domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. Streptococcus mutans is a dental pathogen, and the leading cause of dental caries. In this pathogen, the gene encoding Smu.440 is in the same operon as the gene encoding SMU.441, a member of the MarR protein family of transcriptional regulators involved in multiple antibiotic resistance. It has been suggested that SMU.440 is involved in polyketide-like antibiotic resistance."
definition: >-
  Ligand-binding SRPBCC domain of Streptococcus mutans Smu.440 and related proteins. This family includes the SRPBCC (START/RHO_alpha_C/PITP/Bet_v1/CoxG/CalC) domain of Streptococcus mutans Smu.440 and related proteins. This domain belongs to the SRPBCC domain superfamily of proteins that bind hydrophobic ligands. SRPBCC domains have a deep hydrophobic ligand-binding pocket. Streptococcus mutans is a dental pathogen, and the leading cause of dental caries. In this pathogen, the gene encoding Smu.440 is in the same operon as the gene encoding SMU.441, a member of the MarR protein family of transcriptional regulators involved in multiple antibiotic resistance. It has been suggested that SMU.440 is involved in polyketide-like antibiotic resistance. — an NCBI CDD conserved domain (cd08862); members share this curated model.
