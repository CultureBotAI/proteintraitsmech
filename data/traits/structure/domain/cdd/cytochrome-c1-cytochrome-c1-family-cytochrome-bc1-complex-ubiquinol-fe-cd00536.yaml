identifier: CDD:cd00536
label: "Cytochrome C1. Cytochrome C1 family.Cytochrome bc1 complex (ubiquinol:ferricytochrome c oxidoreductase)  found in mitochondria, photosynthetic bacteria and other prokaryotes is composed of three subunits: cytochrome b, carrying a low- and a high-potential heme group; cytochrome c1 (cyt c1); and a high-potential Rieske iron-sulphur protein. The general function of the complex is electron transfer between two mobile redox carriers, ubiquinol and cytochrome c; the electron transfer is coupled with proton translocation across the membrane, thus generating proton-motive force in the form of an electrochemical potential that can drive ATP synthesis. This CD represents the members containing cytochrome c1 subunit."
definition: >-
  Cytochrome C1. Cytochrome C1 family.Cytochrome bc1 complex (ubiquinol:ferricytochrome c oxidoreductase) found in mitochondria, photosynthetic bacteria and other prokaryotes is composed of three subunits: cytochrome b, carrying a low- and a high-potential heme group; cytochrome c1 (cyt c1); and a high-potential Rieske iron-sulphur protein. The general function of the complex is electron transfer between two mobile redox carriers, ubiquinol and cytochrome c; the electron transfer is coupled with proton translocation across the membrane, thus generating proton-motive force in the form of an electrochemical potential that can drive ATP synthesis. This CD represents the members containing cytochrome c1 subunit. — an NCBI CDD conserved domain (cd00536); members share this curated model.
