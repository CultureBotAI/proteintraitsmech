identifier: CDD:cd03802
label: "UDP-Glc:tetrahydrobiopterin alpha-glucosyltransferase and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. aviGT4 in Streptomyces viridochromogenes has been shown to be involved in biosynthesis of oligosaccharide antibiotic avilamycin A. Inactivation of aviGT4 resulted in a mutant that accumulated a novel avilamycin derivative lacking the terminal eurekanate residue."
definition: >-
  UDP-Glc:tetrahydrobiopterin alpha-glucosyltransferase and similar proteins. This family is most closely related to the GT4 family of glycosyltransferases. aviGT4 in Streptomyces viridochromogenes has been shown to be involved in biosynthesis of oligosaccharide antibiotic avilamycin A. Inactivation of aviGT4 resulted in a mutant that accumulated a novel avilamycin derivative lacking the terminal eurekanate residue. — an NCBI CDD conserved domain (cd03802); members share this curated model.
