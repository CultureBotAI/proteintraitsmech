identifier: CDD:cd03855
label: "Peptidase M14 Succinylglutamate desuccinylase (ASTE) subfamily. Peptidase M14 Succinylglutamate desuccinylase (ASTE, also known as N-succinyl-L-glutamate amidohydrolase, N2-succinylglutamate desuccinylase, and SGDS; EC 3.5.1.96) belongs to the Succinylglutamate desuccinylase (ASTE)/aspartoacylase (ASPA) subfamily of the M14 family of metallocarboxypeptidases. This group includes succinylglutamate desuccinylase that catalyzes the fifth and last step in arginine catabolism by the arginine succinyltransferase pathway. It hydrolyzes N-succinyl-L-glutamate to succinate and L-glutamate."
definition: >-
  Peptidase M14 Succinylglutamate desuccinylase (ASTE) subfamily. Peptidase M14 Succinylglutamate desuccinylase (ASTE, also known as N-succinyl-L-glutamate amidohydrolase, N2-succinylglutamate desuccinylase, and SGDS; EC 3.5.1.96) belongs to the Succinylglutamate desuccinylase (ASTE)/aspartoacylase (ASPA) subfamily of the M14 family of metallocarboxypeptidases. This group includes succinylglutamate desuccinylase that catalyzes the fifth and last step in arginine catabolism by the arginine succinyltransferase pathway. It hydrolyzes N-succinyl-L-glutamate to succinate and L-glutamate. — an NCBI CDD conserved domain (cd03855); members share this curated model.
