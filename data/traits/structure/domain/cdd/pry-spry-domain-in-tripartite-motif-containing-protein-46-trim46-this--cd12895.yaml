identifier: CDD:cd12895
label: "PRY/SPRY domain in tripartite motif-containing protein 46 (TRIM46). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM46 proteins (composed of RING/B-box/coiled-coil core and also known as RBCC proteins). The SPRY/PRY combination is a possible component of immune defense. This protein family has not yet been characterized."
definition: >-
  PRY/SPRY domain in tripartite motif-containing protein 46 (TRIM46). This domain, consisting of the distinct N-terminal PRY subdomain followed by the SPRY subdomain, is found at the C-terminus of TRIM46 proteins (composed of RING/B-box/coiled-coil core and also known as RBCC proteins). The SPRY/PRY combination is a possible component of immune defense. This protein family has not yet been characterized. — an NCBI CDD conserved domain (cd12895); members share this curated model.
