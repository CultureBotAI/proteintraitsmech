identifier: CDD:cd10990
label: "RNAP ECF sigma factor 24, sigma factor 70; alternative sigma factors E and K. Sigma factor 70 and ECF(Extra-cytoplasmic function) sigma factor 24 are both members of the Sigma 70 family thata are found in E.coli. Alternative sigma factor Sigma K activates the production of DNA binding protein GerE in Bacillus Subtilis. SigE is alternative sigma factor which responds to environmental stress conditions in E.coli and Rhodobacter sphaeroides. Its anti-sigma factors in each are RseA and ChrR, respectively. Sigma 70 is the parent sigma factor of the larger family of two types of sigma factor families, which also includes the self-containing Sigma 54 family. The Sigma 70 family contains a wide variety of related sigma factors (designated by numbers indicating their molecular weight in kDa) and alternative sigma factors which are indicated by letters. Sigma factors are transcription initiation factors which enable RNA polymerase(RNAP) binding specificity to gene promoters on a DNA template. They are unique to their respective promoter sequences as well as to their anti-sigma factors, which bind to RNAP to inhibit transcription. The most C-terminal domain of sigma 70 includes conserved regions 4.1 and 4.2, which contain four alpha helices that are arranged as a pair of HtH motifs."
