identifier: CDD:cd12457
label: "RNA recognition motif (RRM) found in X-linked male sterile 2 (Xmas-2) and similar proteins. This subfamily corresponds to the RRM in Xmas-2, the Drosophila homolog of yeast Sac3p protein, together with E(y)2, the Drosophila homologue of yeast Sus1p protein, forming an endogenous complex that is required in the regulation of  mRNA transport and also involved in the efficient transcription regulation of the heat-shock protein 70 (hsp70) loci. All family members are found in insects and contain an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a PCI domain."
definition: >-
  RNA recognition motif (RRM) found in X-linked male sterile 2 (Xmas-2) and similar proteins. This subfamily corresponds to the RRM in Xmas-2, the Drosophila homolog of yeast Sac3p protein, together with E(y)2, the Drosophila homologue of yeast Sus1p protein, forming an endogenous complex that is required in the regulation of mRNA transport and also involved in the efficient transcription regulation of the heat-shock protein 70 (hsp70) loci. All family members are found in insects and contain an N-terminal RNA recognition motif (RRM), also termed RBD (RNA binding domain) or RNP (ribonucleoprotein domain), followed by a PCI domain. — an NCBI CDD conserved domain (cd12457); members share this curated model.
