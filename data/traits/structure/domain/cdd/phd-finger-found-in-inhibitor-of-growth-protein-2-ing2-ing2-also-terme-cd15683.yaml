identifier: CDD:cd15683
label: "PHD finger found in inhibitor of growth protein 2 (ING2). ING2, also termed inhibitor of growth 1-like protein (ING1Lp), or p32, or p33ING2, is one member of the inhibitor of growth (ING) family of type II tumor suppressors. It is a core component of a multi-factor chromatin-modifying complex containing the transcriptional co-repressor SIN3A and histone deacetylase 1 (HDAC1). It has been implicated in the control of cell cycle, in genome stability, and in muscle differentiation. ING2 independently interacts with H3K4me3 (Histone H3 trimethylated on lysine 4) and PtdIns(5)P, and modulates crosstalk between lysine methylation and lysine acetylation on histone proteins through association with chromatin in the presence of DNA damage. It collaborates with SnoN to mediate transforming growth factor (TGF)-beta-induced Smad-dependent transcription and cellular responses. It is upregulated in colon cancer and increases invasion by enhanced MMP13 expression. It also acts as a cofactor of p300 for p53 acetylation and plays a positive regulatory role during p53-mediated replicative senescence. ING2 contains an N-terminal ING domain and a C-terminal plant homeodomain (PHD) finger."
definition: >-
  PHD finger found in inhibitor of growth protein 2 (ING2). ING2, also termed inhibitor of growth 1-like protein (ING1Lp), or p32, or p33ING2, is one member of the inhibitor of growth (ING) family of type II tumor suppressors. It is a core component of a multi-factor chromatin-modifying complex containing the transcriptional co-repressor SIN3A and histone deacetylase 1 (HDAC1). It has been implicated in the control of cell cycle, in genome stability, and in muscle differentiation. ING2 independently interacts with H3K4me3 (Histone H3 trimethylated on lysine 4) and PtdIns(5)P, and modulates crosstalk between lysine methylation and lysine acetylation on histone proteins through association with chromatin in the presence of DNA damage. It collaborates with SnoN to mediate transforming growth factor (TGF)-beta-induced Smad-dependent transcription and cellular responses. It is upregulated in colon cancer and increases invasion by enhanced MMP13 expression. It also acts as a cofactor of p300 for p53 acetylation and plays a positive regulatory role during p53-mediated replicative senescence. ING2 contains an N-terminal ING domain and a C-terminal plant homeodomain (PHD) finger. — an NCBI CDD conserved domain (cd15683); members share this curated model.
