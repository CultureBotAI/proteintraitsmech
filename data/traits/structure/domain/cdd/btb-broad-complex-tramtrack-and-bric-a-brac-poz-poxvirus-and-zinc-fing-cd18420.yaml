identifier: CDD:cd18420
label: "BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Drosophila melanogaster potassium voltage-gated channel protein Shal and similar proteins. Drosophila melanogaster Shal, also called Shaker cognate l or Shal2, is a transient potassium current (I(A)) channel, which is required for maintaining excitability during repetitive firing and normal locomotion in Drosophila. It may play a role in the nervous system and in the regulation of beating frequency in pacemaker cells. Shal mediates the voltage-dependent potassium ion permeability of excitable membranes. Assuming opened or closed conformations in response to the voltage difference across the membrane, the protein forms a potassium-selective channel through which potassium ions may pass in accordance with their electrochemical gradient. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. Shal is an alpha subunit that forms functional homo- or hetero-tetrameric channels (with other alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif."
definition: >-
  BTB (Broad-Complex, Tramtrack and Bric a brac)/POZ (poxvirus and zinc finger) domain found in Drosophila melanogaster potassium voltage-gated channel protein Shal and similar proteins. Drosophila melanogaster Shal, also called Shaker cognate l or Shal2, is a transient potassium current (I(A)) channel, which is required for maintaining excitability during repetitive firing and normal locomotion in Drosophila. It may play a role in the nervous system and in the regulation of beating frequency in pacemaker cells. Shal mediates the voltage-dependent potassium ion permeability of excitable membranes. Assuming opened or closed conformations in response to the voltage difference across the membrane, the protein forms a potassium-selective channel through which potassium ions may pass in accordance with their electrochemical gradient. Voltage-gated potassium (Kv) channels are composed of alpha subunits, which form the actual conductance pore, and cytoplasmic beta subunits, which are auxiliary proteins that associate with alpha subunits to modulate the activity of the Kv channel. Shal is an alpha subunit that forms functional homo- or hetero-tetrameric channels (with other alpha subunits) through its BTB/POZ domain, also known as tetramerization (T1) domain, which is a versatile protein-protein interaction motif. — an NCBI CDD conserved domain (cd18420); members share this curated model.
