identifier: CDD:cd05414
label: "Nucleotidyltransferase (NT) domain of ClassII CCA-adding enzymes; uncharacterized subgroup. NT_CCAase_classII:  A subgroup of the catalytic domain found in CCAase [CCA-adding enzyme, ATP (CTP): tRNA nucleotidyltransferase], class II_like proteins. CCAase in a template-independent reaction adds the precise sequence [cytidine(C)-cytidine-adenosine (A)], one nucleotide at a time, onto the 3prime end of tRNA. The class II group of CCAase enzymes is comprised mainly of eubacterial and eukaryotic enzymes. CCAases have a single catalytic pocket, which appears to recognize both ATP and CTP substrates. In various ancient and slow evolving bacteria including Aqa and Deinococcus radiodurans CC- and A-adding enzymes collaborate to add CCA to tRNAs. Little is known functionally about proteins in this subgroup. Class II CCAases are members of the nucleotidyltransferase (NT) superfamily. The catalytic signature of the NT superfamily is comprised of two carboxylates [DXD (E)] which, sometimes in concert with a third carboxylate from a further removed region of the protein, co-ordinate the two divalent metal ions involved in a two-metal ion mechanism to transfer a nucleotide to an acceptor hydroxyl group. These carboxylate residues are conserved in this subgroup."
