identifier: CDD:cd23586
label: "extracellular domain (ECD) found in Caenorhabditis elegans serine/threonine-protein kinase receptor sma-6 and similar proteins. Sma-6 (EC 2.7.11.30) is serine/threonine-protein kinase receptor that binds transforming growth factor-beta (TGF-beta)-like ligands dbl-1 and perhaps daf-7. Upon ligand binding, it probably activates a TGF-beta-like signaling pathway. Sma-6 contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in Caenorhabditis elegans serine/threonine-protein kinase receptor sma-6 and similar proteins. Sma-6 (EC 2.7.11.30) is serine/threonine-protein kinase receptor that binds transforming growth factor-beta (TGF-beta)-like ligands dbl-1 and perhaps daf-7. Upon ligand binding, it probably activates a TGF-beta-like signaling pathway. Sma-6 contains an extracellular domain (ECD), which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23586); members share this curated model.
