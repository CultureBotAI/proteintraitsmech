identifier: CDD:cd17232
label: "ubiquitin-like (Ubl) domain found in gamma-aminobutyric acid receptor-associated protein (GABARAP). GABARAP (also termed GABA(A) receptor-associated protein, ATG8A, or MM46) has been implicated in intracellular protein trafficking. It is a cytosolic protein that is localized to transport vesicles, the Golgi network and the endoplasmic reticulum. It interacts with the intracellular domain of the gamma2 subunit of GABA(A) receptors, and thus functions as a trafficking modulator implicated in the intracellular trafficking of GABA(A) receptor. GABARAP also acts as a Ubl modifier belonging to the ATG8 (autophagy-related 8) protein family, which is essential for autophagosome biogenesis and maturation. GABARAP recruits phosphatidylinositol 4-kinase II alpha (PI4KIIalpha) as a specific downstream effector, and regulates phosphatidylinositol 4-phosphate (PI4P)-dependent autophagosome lysosome fusion."
definition: >-
