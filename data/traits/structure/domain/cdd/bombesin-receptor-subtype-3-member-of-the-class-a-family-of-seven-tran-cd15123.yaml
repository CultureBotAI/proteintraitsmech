identifier: CDD:cd15123
label: "bombesin receptor subtype 3, member of the class A family of seven-transmembrane G protein-coupled receptors. BRS-3 is classified as an orphan receptor and belongs to the bombesin subfamily of G-protein coupled receptors, whose members also include neuromedin B receptor (NMBR) and gastrin-releasing peptide receptor (GRPR). Bombesin is a tetradecapeptide, originally isolated from frog skin. Mammalian bombesin-related peptides are widely distributed in the gastrointestinal and central nervous systems. The bombesin family receptors couple primarily to the G proteins of G(q/11) family. BRS-3 interacts with known naturally-occurring bombesin-related peptides with low affinity; however, no endogenous high-affinity ligand to the receptor has been identified. BRS-3 is suggested to play a role in sperm cell division and maturation."
definition: >-
  bombesin receptor subtype 3, member of the class A family of seven-transmembrane G protein-coupled receptors. BRS-3 is classified as an orphan receptor and belongs to the bombesin subfamily of G-protein coupled receptors, whose members also include neuromedin B receptor (NMBR) and gastrin-releasing peptide receptor (GRPR). Bombesin is a tetradecapeptide, originally isolated from frog skin. Mammalian bombesin-related peptides are widely distributed in the gastrointestinal and central nervous systems. The bombesin family receptors couple primarily to the G proteins of G(q/11) family. BRS-3 interacts with known naturally-occurring bombesin-related peptides with low affinity; however, no endogenous high-affinity ligand to the receptor has been identified. BRS-3 is suggested to play a role in sperm cell division and maturation. — an NCBI CDD conserved domain (cd15123); members share this curated model.
