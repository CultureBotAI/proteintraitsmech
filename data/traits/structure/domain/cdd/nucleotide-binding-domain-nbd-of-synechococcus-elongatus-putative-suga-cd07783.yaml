identifier: CDD:cd07783
label: "nucleotide-binding domain (NBD) of Synechococcus elongatus putative sugar kinase (SePSK), Arabidopsis thaliana xylulose kinase-1 (AtXK-1) and similar proteins. This subfamily corresponds to a group of uncharacterized bacterial proteins with similarity to Synechococcus elongatus putative sugar kinase (also known as SePSK; D-ribulose kinase; D-ribulokinase) and Arabidopsis thaliana xylulose kinase-1 (also known as AtXK-1; D-ribulose kinase; D-ribulokinase; inactive xylulose kinase 1). Both kinases exhibit ATP hydrolysis without substrate and can phosphorylate D-ribulose. They belong to the ribulokinase-like carbohydrate kinases, a subfamily of FGGY family carbohydrate kinases. Ribulokinase-like carbohydrate kinases are responsible for the phosphorylation of sugars such as L-ribulose and D-ribulose. Their monomers contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain."
definition: >-
  nucleotide-binding domain (NBD) of Synechococcus elongatus putative sugar kinase (SePSK), Arabidopsis thaliana xylulose kinase-1 (AtXK-1) and similar proteins. This subfamily corresponds to a group of uncharacterized bacterial proteins with similarity to Synechococcus elongatus putative sugar kinase (also known as SePSK; D-ribulose kinase; D-ribulokinase) and Arabidopsis thaliana xylulose kinase-1 (also known as AtXK-1; D-ribulose kinase; D-ribulokinase; inactive xylulose kinase 1). Both kinases exhibit ATP hydrolysis without substrate and can phosphorylate D-ribulose. They belong to the ribulokinase-like carbohydrate kinases, a subfamily of FGGY family carbohydrate kinases. Ribulokinase-like carbohydrate kinases are responsible for the phosphorylation of sugars such as L-ribulose and D-ribulose. Their monomers contain two large domains, which are separated by a deep cleft that forms the active site. This model includes both the N-terminal domain, which adopts a ribonuclease H-like fold, and the structurally related C-terminal domain. — an NCBI CDD conserved domain (cd07783); members share this curated model.
