identifier: CDD:cd23114
label: "RING finger, H2 subclass, found in Arabidopsis thaliana protein WAV3 homolog 2 (WAVH2) and similar proteins. WAVH2, also known as RING-type E3 ubiquitin transferase WAVH2, is a probable E3 ubiquitin-protein ligase involved in the regulation of root growth. It acts as a positive regulator of root gravitropism. WAVH2 contains a C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in Arabidopsis thaliana protein WAV3 homolog 2 (WAVH2) and similar proteins. WAVH2, also known as RING-type E3 ubiquitin transferase WAVH2, is a probable E3 ubiquitin-protein ligase involved in the regulation of root growth. It acts as a positive regulator of root gravitropism. WAVH2 contains a C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd23114); members share this curated model.
