identifier: CDD:cd23323
label: "FGF domain, beta-trefoil fold, found in fibroblast growth factor 17 (FGF17) and similar proteins. FGF17 plays an important role in the regulation of embryonic development and as signaling molecule in the induction and patterning of the embryonic brain. It is required for normal brain development.  FGF17 interacts with fibroblast growth factor receptors, FGFR3 and FGFR4. FGF17 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  FGF domain, beta-trefoil fold, found in fibroblast growth factor 17 (FGF17) and similar proteins. FGF17 plays an important role in the regulation of embryonic development and as signaling molecule in the induction and patterning of the embryonic brain. It is required for normal brain development. FGF17 interacts with fibroblast growth factor receptors, FGFR3 and FGFR4. FGF17 contains a FGF domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23323); members share this curated model.
