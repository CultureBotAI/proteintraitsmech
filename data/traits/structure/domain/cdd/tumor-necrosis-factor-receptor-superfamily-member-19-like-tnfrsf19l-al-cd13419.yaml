identifier: CDD:cd13419
label: "tumor necrosis factor receptor superfamily member 19-like (TNFRSF19L), also known as receptor expressed in lymphoid tissues (RELT). TNFRSF19L (also known as receptor expressed in lymphoid tissues (RELT)) is especially abundant in hematologic tissues and can stimulate the proliferation of T-cells. It serves as a substrate for the closely related kinases, odd-skipped related transcription factor 1 (OSR1) and STE20/SPS1-related proline/alanine-rich kinase (SPAK); RELT binds SPAK and uses it to mediate p38 and JNK activation, rather than rely on the canonical TRAF pathways for its function. RELT is capable of stimulating T-cell proliferation in the presence of CD3 signaling, which suggests its regulatory role in immune response. It interacts with phospholipid scramblase 1 (PLSCR1), an interferon-inducible protein that mediates antiviral activity against DNA and RNA viruses; PLSCR1 is a regulator of hepatitis B virus X (HBV X) protein. RELT and PLSCR1 co-localize in intracellular regions of human embryonic kidney-293 cells, with RELT over-expression appearing to alter the localization of PLSCR1."
definition: >-
  tumor necrosis factor receptor superfamily member 19-like (TNFRSF19L), also known as receptor expressed in lymphoid tissues (RELT). TNFRSF19L (also known as receptor expressed in lymphoid tissues (RELT)) is especially abundant in hematologic tissues and can stimulate the proliferation of T-cells. It serves as a substrate for the closely related kinases, odd-skipped related transcription factor 1 (OSR1) and STE20/SPS1-related proline/alanine-rich kinase (SPAK); RELT binds SPAK and uses it to mediate p38 and JNK activation, rather than rely on the canonical TRAF pathways for its function. RELT is capable of stimulating T-cell proliferation in the presence of CD3 signaling, which suggests its regulatory role in immune response. It interacts with phospholipid scramblase 1 (PLSCR1), an interferon-inducible protein that mediates antiviral activity against DNA and RNA viruses; PLSCR1 is a regulator of hepatitis B virus X (HBV X) protein. RELT and PLSCR1 co-localize in intracellular regions of human embryonic kidney-293 cells, with RELT over-expression appearing to alter the localization of PLSCR1. — an NCBI CDD conserved domain (cd13419); members share this curated model.
