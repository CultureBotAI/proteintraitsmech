identifier: CDD:cd23388
label: "C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type A (BoNT/A), type H (BoNT/H) and similar proteins. BoNT/A, also called bontoxilysin-A, or BOTOX, is a potent disease agent in botulism, a potential biological weapon and an effective therapeutic drug for a wide range of common medical conditions, such as migraines and a variety of ocular motility and movement disorders. It is also a licensed drug widely used for cosmetic applications. There are two types of BoNT/A receptor, gangliosides and members of the synaptic vesicle glycoprotein 2 (SV2) family. Both are required for BoNT/A toxicity and are therefore likely to cooperate with each other. SV2 family members are putative transporter proteins that are predicted to have 12 transmembrane domains, associate with the receptor-binding domain of the toxin. In addition, fibroblast growth factor receptor 3 (FGFR3) has also been reported to be a potential BoNT/A receptor. The family also includes BoNT/H, also known as BoNT/HA, or BoNT/FA, which shows high sequence/structure similarity to that of BoNT/A. However, they are different regarding their binding to cell-surface receptors including both polysialoganglioside (PSG) and SV2. BoNT/H also responds differently to some potent BoNT/A-neutralizing antibodies (e.g. CR2). Both BoNT/A and BoNT/H comprise three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  C-terminal receptor binding domain, beta-trefoil fold, found in Clostridium botulinum neurotoxin type A (BoNT/A), type H (BoNT/H) and similar proteins. BoNT/A, also called bontoxilysin-A, or BOTOX, is a potent disease agent in botulism, a potential biological weapon and an effective therapeutic drug for a wide range of common medical conditions, such as migraines and a variety of ocular motility and movement disorders. It is also a licensed drug widely used for cosmetic applications. There are two types of BoNT/A receptor, gangliosides and members of the synaptic vesicle glycoprotein 2 (SV2) family. Both are required for BoNT/A toxicity and are therefore likely to cooperate with each other. SV2 family members are putative transporter proteins that are predicted to have 12 transmembrane domains, associate with the receptor-binding domain of the toxin. In addition, fibroblast growth factor receptor 3 (FGFR3) has also been reported to be a potential BoNT/A receptor. The family also includes BoNT/H, also known as BoNT/HA, or BoNT/FA, which shows high sequence/structure similarity to that of BoNT/A. However, they are different regarding their binding to cell-surface receptors including both polysialoganglioside (PSG) and SV2. BoNT/H also responds differently to some potent BoNT/A-neutralizing antibodies (e.g. CR2). Both BoNT/A and BoNT/H comprise three domains which are involved in catalysis (LC), translocation (HCT), and host receptor binding (HCR). The HCR domain is responsible for the highly specific targeting of the neurotoxin to neuronal cell membranes. It is a proven target for anti-BoNT antibody and vaccine development. This model corresponds to C-terminal HCR domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23388); members share this curated model.
