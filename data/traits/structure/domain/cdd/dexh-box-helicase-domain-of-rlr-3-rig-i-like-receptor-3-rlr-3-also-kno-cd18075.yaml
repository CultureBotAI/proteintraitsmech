identifier: CDD:cd18075
label: "DEXH-box helicase domain of RLR-3. RIG-I-like receptor 3 (RLR-3, also known as laboratory of genetics and physiology 2 or LGP2 and DHX58) appears to positively and negatively regulate MDA5 and RIG-I signaling, respectively. RLR-3 resembles a chimera combining a MDA5-like helicase domain and RIG-I like CTD supporting both stem and end binding. RNA binding is required for RLR-3-mediated enhancement of MDA5 activation. RLR-3 end-binding may promote nucleation of MDA5 oligomerization on dsRNA. RLR-3 is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region."
definition: >-
  DEXH-box helicase domain of RLR-3. RIG-I-like receptor 3 (RLR-3, also known as laboratory of genetics and physiology 2 or LGP2 and DHX58) appears to positively and negatively regulate MDA5 and RIG-I signaling, respectively. RLR-3 resembles a chimera combining a MDA5-like helicase domain and RIG-I like CTD supporting both stem and end binding. RNA binding is required for RLR-3-mediated enhancement of MDA5 activation. RLR-3 end-binding may promote nucleation of MDA5 oligomerization on dsRNA. RLR-3 is a member of the DEAD-like helicase superfamily, a diverse family of proteins involved in ATP-dependent RNA or DNA unwinding. This domain contains the ATP-binding region. — an NCBI CDD conserved domain (cd18075); members share this curated model.
