identifier: CDD:cd16272
label: "Ribonuclease Z; MBL-fold metallo-hydrolase domain. The tRNA maturase RNase Z (also known as tRNase Z or 3' tRNase) catalyzes the endonucleolytic removal of the 3' extension of the majority of tRNA precursors. Two forms of RNase Z exist in eukaryotes, one long (ELAC2) and one short form (ELAC1), the former may have resulted from a duplication of the shorter enzyme. Only the short form exists in bacteria. It includes the C-terminus of human ELAC2 and Escherichia coli zinc phosphodiesterase (ZiPD, also known as ecoZ, tRNase Z, or RNase BN) is a 3' tRNA-processing endonuclease, encoded by the elaC gene. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions."
definition: >-
  Ribonuclease Z; MBL-fold metallo-hydrolase domain. The tRNA maturase RNase Z (also known as tRNase Z or 3' tRNase) catalyzes the endonucleolytic removal of the 3' extension of the majority of tRNA precursors. Two forms of RNase Z exist in eukaryotes, one long (ELAC2) and one short form (ELAC1), the former may have resulted from a duplication of the shorter enzyme. Only the short form exists in bacteria. It includes the C-terminus of human ELAC2 and Escherichia coli zinc phosphodiesterase (ZiPD, also known as ecoZ, tRNase Z, or RNase BN) is a 3' tRNA-processing endonuclease, encoded by the elaC gene. Members of this subgroup belong to the MBL-fold metallo-hydrolase superfamily which is comprised mainly of hydrolytic enzymes which carry out a variety of biological functions. — an NCBI CDD conserved domain (cd16272); members share this curated model.
