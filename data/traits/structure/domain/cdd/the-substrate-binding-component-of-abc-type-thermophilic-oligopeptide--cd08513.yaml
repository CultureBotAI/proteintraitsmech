identifier: CDD:cd08513
label: "The substrate-binding component of ABC-type thermophilic oligopeptide-binding protein Hb8-like import systems, contains the type 2 periplasmic binding fold. This family includes the substrate-binding domain of an ABC-type oligopeptide-binding protein Hb8 from Thermus thermophilius and its closest homologs from other bacteria. The structural topology of this substrate-binding domain is similar to those of DppA from Escherichia coli and OppA from Salmonella typhimurium, and thus belongs to the type 2 periplasmic binding fold protein (PBP2) superfamily. The DppA binds dipeptides and some tripeptides and is involved in chemotaxis toward dipeptides, whereas the OppA binds peptides of a wide range of lengths (2-35 amino acid residues) and plays a role in recycling of cell wall peptides, which precludes any involvement in chemotaxis. The type 2 periplasmic binding proteins are soluble ligand-binding components of ABC or tripartite ATP-independent transporters and chemotaxis systems. Members of the PBP2 superfamily function in uptake of a variety of metabolites in bacteria such as amino acids, carbohydrate, ions, and polyamines. Ligands are then transported across the cytoplasmic membrane energized by ATP hydrolysis or electrochemical ion gradient. Besides transport proteins, the PBP2 superfamily includes the ligand-binding domains from ionotropic glutamate receptors, LysR-type transcriptional regulators, and unorthodox sensor proteins involved in signal transduction."
definition: >-
  The substrate-binding component of ABC-type thermophilic oligopeptide-binding protein Hb8-like import systems, contains the type 2 periplasmic binding fold. This family includes the substrate-binding domain of an ABC-type oligopeptide-binding protein Hb8 from Thermus thermophilius and its closest homologs from other bacteria. The structural topology of this substrate-binding domain is similar to those of DppA from Escherichia coli and OppA from Salmonella typhimurium, and thus belongs to the type 2 periplasmic binding fold protein (PBP2) superfamily. The DppA binds dipeptides and some tripeptides and is involved in chemotaxis toward dipeptides, whereas the OppA binds peptides of a wide range of lengths (2-35 amino acid residues) and plays a role in recycling of cell wall peptides, which precludes any involvement in chemotaxis. The type 2 periplasmic binding proteins are soluble ligand-binding components of ABC or tripartite ATP-independent transporters and chemotaxis systems. Members of the PBP2 superfamily function in uptake of a variety of metabolites in bacteria such as amino acids, carbohydrate, ions, and polyamines. Ligands are then transported across the cytoplasmic membrane energized by ATP hydrolysis or electrochemical ion gradient. Besides transport proteins, the PBP2 superfamily includes the ligand-binding domains from ionotropic glutamate receptors, LysR-type transcriptional regulators, and unorthodox sensor proteins involved in signal transduction. — an NCBI CDD conserved domain (cd08513); members share this curated model.
