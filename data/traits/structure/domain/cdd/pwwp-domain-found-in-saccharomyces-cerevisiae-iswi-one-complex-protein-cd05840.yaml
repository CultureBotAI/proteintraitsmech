identifier: CDD:cd05840
label: "PWWP domain found in Saccharomyces cerevisiae ISWI one complex protein 4 (ScIOC4) and similar proteins. ScIOC4 functions as a component of the ISW1B complex, which acts in remodeling the chromatin by catalyzing an ATP-dependent alteration in the structure of nucleosomal DNA. The ISW1B complex acts within coding regions to control the amount of RNA polymerase II released into productive elongation and to coordinate elongation with termination and pre-mRNA processing. The family also includes Schizosaccharomyces pombe PWWP domain-containing proteins 1 and 2 (SpPDP1 and SpPDP2). SpPDP1 associates with Set9 to regulate its chromatin localization and methyltransferase activity towards H4K20. Members of this family contain a PWWP domain. The PWWP domain specifically recognizes DNA and histone methylated lysines."
definition: >-
  PWWP domain found in Saccharomyces cerevisiae ISWI one complex protein 4 (ScIOC4) and similar proteins. ScIOC4 functions as a component of the ISW1B complex, which acts in remodeling the chromatin by catalyzing an ATP-dependent alteration in the structure of nucleosomal DNA. The ISW1B complex acts within coding regions to control the amount of RNA polymerase II released into productive elongation and to coordinate elongation with termination and pre-mRNA processing. The family also includes Schizosaccharomyces pombe PWWP domain-containing proteins 1 and 2 (SpPDP1 and SpPDP2). SpPDP1 associates with Set9 to regulate its chromatin localization and methyltransferase activity towards H4K20. Members of this family contain a PWWP domain. The PWWP domain specifically recognizes DNA and histone methylated lysines. — an NCBI CDD conserved domain (cd05840); members share this curated model.
