identifier: CDD:cd20960
label: "Immunoglobulin Variable (V) domain of the Coxsackievirus and Adenovirus Receptor (CAR), and similar proteins. The members here are composed of the Variable (V) domain of the Coxsackievirus and Adenovirus Receptor (CAR), and similar proteins.  CAR, which is encoded by human CXADR gene, is a cell adhesion molecule of the Immunoglobulin (Ig) superfamily. The CAR acts as a type I membrane receptor for group B1-B6 coxsackie viruses and subgroup C adenoviruses. For instance, adenovirus interacts with the coxsackievirus and adenovirus receptor to enter epithelial airway cells.  The CAR is also shown to be involved in physiological processes such as neuronal and heart development, epithelial tight junction integrity, and tumor suppression. The CAR is a component of the epithelial apical junction complex that may function as a homophilic cell adhesion molecule and is essential for tight junction integrity. The CAR is also involved in transepithelial migration of leukocytes through adhesive interactions with JAML a transmembrane protein of the plasma membrane of leukocytes. The interaction between both receptors also mediates the activation of gamma-delta T-cells, a subpopulation of T-cells residing in epithelia and involved in tissue homeostasis and repair. The CAR is composed of one V-set and one C2-set Ig module, a single transmembrane helix, and an intracellular domain. This group belongs to the V-set of IgSF domains, having A, B, E and D strands in one beta-sheet and A', G, F, C, C' and C\" in the other"
definition: >-
  Immunoglobulin Variable (V) domain of the Coxsackievirus and Adenovirus Receptor (CAR), and similar proteins. The members here are composed of the Variable (V) domain of the Coxsackievirus and Adenovirus Receptor (CAR), and similar proteins. CAR, which is encoded by human CXADR gene, is a cell adhesion molecule of the Immunoglobulin (Ig) superfamily. The CAR acts as a type I membrane receptor for group B1-B6 coxsackie viruses and subgroup C adenoviruses. For instance, adenovirus interacts with the coxsackievirus and adenovirus receptor to enter epithelial airway cells. The CAR is also shown to be involved in physiological processes such as neuronal and heart development, epithelial tight junction integrity, and tumor suppression. The CAR is a component of the epithelial apical junction complex that may function as a homophilic cell adhesion molecule and is essential for tight junction integrity. The CAR is also involved in transepithelial migration of leukocytes through adhesive interactions with JAML a transmembrane protein of the plasma membrane of leukocytes. The interaction between both receptors also mediates the activation of gamma-delta T-cells, a subpopulation of T-cells residing in epithelia and involved in tissue homeostasis and repair. The CAR is composed of one V-set and one C2-set Ig module, a single transmembrane helix, and an intracellular domain. This group belongs to the V-set of IgSF domains, having A, B, E and D strands in one beta-sheet and A', G, F, C, C' and C" in the other — an NCBI CDD conserved domain (cd20960); members share this curated model.
