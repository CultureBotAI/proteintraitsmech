identifier: CDD:cd06447
label: "D-Serine dehydratase is a pyridoxal phosphate (PLP)-dependent enzyme which catalyzes the conversion of L- or D-serine  to pyruvate and ammonia.  D-serine dehydratase serves as a detoxifying enzyme in most E. coli strains where D-serine is a competitive antagonist of beta-alanine in the biosynthetic pathway to pentothenate and coenzyme A.  D-serine dehydratase is different from other pyridoxal-5'-phosphate-dependent enzymes in that it catalyzes alpha, beta-elimination reactions on amino acids."
definition: >-
  D-Serine dehydratase is a pyridoxal phosphate (PLP)-dependent enzyme which catalyzes the conversion of L- or D-serine to pyruvate and ammonia. D-serine dehydratase serves as a detoxifying enzyme in most E. coli strains where D-serine is a competitive antagonist of beta-alanine in the biosynthetic pathway to pentothenate and coenzyme A. D-serine dehydratase is different from other pyridoxal-5'-phosphate-dependent enzymes in that it catalyzes alpha, beta-elimination reactions on amino acids. — an NCBI CDD conserved domain (cd06447); members share this curated model.
