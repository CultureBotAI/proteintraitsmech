identifier: CDD:cd02135
label: "nitroreductase family protein similar to Escherichia coli YdjA. A subfamily of the nitroreductase family containing uncharacterized proteins that are similar to nitroreductase YdjA from Escherichia coli. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor.  The enzyme is typically a homodimer. Members of this family are also called NADH dehydrogenase, oxygen-insensitive NAD(P)H nitrogenase or dihydropteridine reductase."
definition: >-
  nitroreductase family protein similar to Escherichia coli YdjA. A subfamily of the nitroreductase family containing uncharacterized proteins that are similar to nitroreductase YdjA from Escherichia coli. Nitroreductase catalyzes the reduction of nitroaromatic compounds such as nitrotoluenes, nitrofurans and nitroimidazoles. This process requires NAD(P)H as electron donor in an obligatory two-electron transfer and uses FMN as cofactor. The enzyme is typically a homodimer. Members of this family are also called NADH dehydrogenase, oxygen-insensitive NAD(P)H nitrogenase or dihydropteridine reductase. — an NCBI CDD conserved domain (cd02135); members share this curated model.
