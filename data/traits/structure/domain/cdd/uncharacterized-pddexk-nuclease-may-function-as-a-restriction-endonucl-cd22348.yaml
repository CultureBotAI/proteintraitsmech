label: "uncharacterized PDDEXK nuclease may function as a restriction endonuclease. This family belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  uncharacterized PDDEXK nuclease may function as a restriction endonuclease. This family belongs to a superfamily of PDDEXK nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22348); members share this curated model.
