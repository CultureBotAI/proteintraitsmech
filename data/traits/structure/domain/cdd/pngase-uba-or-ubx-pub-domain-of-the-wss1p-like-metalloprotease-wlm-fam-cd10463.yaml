identifier: CDD:cd10463
label: "PNGase/UBA or UBX (PUB) domain of the Wss1p-like metalloprotease (WLM) family. The PUB domain functions as a p97 (also known as valosin-containing protein or VCP) adaptor by interacting with the D1 and/or D2 ATPase domains. The type II AAA+ ATPase p97 is involved in a variety of cellular processes such as the deglycosylation of ERAD substrates, membrane fusion, transcription factor activation and cell cycle regulation through differential binding to specific adaptor proteins.  WLM domains are found mostly in plant proteins, belonging to the Zincin-like superfamily of Zn-dependent peptidases that are linked to the ubiquitin signaling pathway through its fusion with the ubiquitin-binding PUB, ubiquitin-like, and Little Finger domains. More specifically, genetic evidence implicates the WLM family in de-SUMOylation."
definition: >-
  PNGase/UBA or UBX (PUB) domain of the Wss1p-like metalloprotease (WLM) family. The PUB domain functions as a p97 (also known as valosin-containing protein or VCP) adaptor by interacting with the D1 and/or D2 ATPase domains. The type II AAA+ ATPase p97 is involved in a variety of cellular processes such as the deglycosylation of ERAD substrates, membrane fusion, transcription factor activation and cell cycle regulation through differential binding to specific adaptor proteins. WLM domains are found mostly in plant proteins, belonging to the Zincin-like superfamily of Zn-dependent peptidases that are linked to the ubiquitin signaling pathway through its fusion with the ubiquitin-binding PUB, ubiquitin-like, and Little Finger domains. More specifically, genetic evidence implicates the WLM family in de-SUMOylation. — an NCBI CDD conserved domain (cd10463); members share this curated model.
