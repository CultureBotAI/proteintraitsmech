identifier: CDD:cd07296
label: "The phosphoinositide binding Phox Homology domain of Phospholipase D1. The PX domain is a phosphoinositide binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Phospholipase D (PLD) catalyzes the hydrolysis of the phosphodiester bond of phosphatidylcholine to generate membrane-bound phosphatidic acid and choline. PLDs are implicated in many cellular functions like signaling, cytoskeletal reorganization, vesicular transport, stress responses, and the control of differentiation, proliferation, and survival. PLD1 contains PX and Pleckstrin Homology (PH) domains in addition to the catalytic domain. It acts as an effector of Rheb in the signaling of the mammalian target of rapamycin (mTOR), a serine/threonine protein kinase that transduces nutrients and other stimuli to regulate many cellular processes. PLD1 also regulates the secretion of the procoagulant von Willebrand factor (VWF) in endothelial cells. The PX domain is involved in targeting of proteins to PI-enriched membranes, and may also be involved in protein-protein interaction. The PX domain of PLD1 specifically binds to phosphatidylinositol-3,4,5-trisphosphate [PI(3,4,5)P3], which enables PLD1 to mediate signals via the ERK1/2 pathway."
definition: >-
  The phosphoinositide binding Phox Homology domain of Phospholipase D1. The PX domain is a phosphoinositide binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Phospholipase D (PLD) catalyzes the hydrolysis of the phosphodiester bond of phosphatidylcholine to generate membrane-bound phosphatidic acid and choline. PLDs are implicated in many cellular functions like signaling, cytoskeletal reorganization, vesicular transport, stress responses, and the control of differentiation, proliferation, and survival. PLD1 contains PX and Pleckstrin Homology (PH) domains in addition to the catalytic domain. It acts as an effector of Rheb in the signaling of the mammalian target of rapamycin (mTOR), a serine/threonine protein kinase that transduces nutrients and other stimuli to regulate many cellular processes. PLD1 also regulates the secretion of the procoagulant von Willebrand factor (VWF) in endothelial cells. The PX domain is involved in targeting of proteins to PI-enriched membranes, and may also be involved in protein-protein interaction. The PX domain of PLD1 specifically binds to phosphatidylinositol-3,4,5-trisphosphate [PI(3,4,5)P3], which enables PLD1 to mediate signals via the ERK1/2 pathway. — an NCBI CDD conserved domain (cd07296); members share this curated model.
