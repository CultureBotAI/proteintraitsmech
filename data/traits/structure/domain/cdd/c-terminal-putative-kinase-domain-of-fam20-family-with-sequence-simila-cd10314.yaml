identifier: CDD:cd10314
label: "C-terminal putative kinase domain of FAM20 (family with sequence similarity 20) proteins. This family contains the C-terminal domain of FAM20A, -B, -C and related proteins. FAM20A may participate in enamel development and gingival homeostasis, FAM20B in proteoglycan production, and FAM20C in bone development. FAM20B is a xylose kinase that may regulate the number of glycosaminoglycan chains by phosphorylating the xylose residue in the glycosaminoglycan-protein linkage region of proteoglycans. FAM20C, also called Dentin Matrix Protein 4, is abundant in the dentin matrix, and may participate in the differentiation of mesenchymal precursor cells into functional odontoblast-like cells. Mutations in FAM20C are associated with lethal Osteosclerotic Bone Dysplasia (Raine Syndrome), and mutations in FAM20A with Amelogenesis imperfecta (AI) and Gingival Hyperplasia Syndrome. The C-terminal domains of members of this family are putative kinase domains, based on mutagenesis of the C-terminal domain of Drosophila Four-Jointed, a related Golgi kinase. This domain family is also known as DUF1193."
definition: >-
  C-terminal putative kinase domain of FAM20 (family with sequence similarity 20) proteins. This family contains the C-terminal domain of FAM20A, -B, -C and related proteins. FAM20A may participate in enamel development and gingival homeostasis, FAM20B in proteoglycan production, and FAM20C in bone development. FAM20B is a xylose kinase that may regulate the number of glycosaminoglycan chains by phosphorylating the xylose residue in the glycosaminoglycan-protein linkage region of proteoglycans. FAM20C, also called Dentin Matrix Protein 4, is abundant in the dentin matrix, and may participate in the differentiation of mesenchymal precursor cells into functional odontoblast-like cells. Mutations in FAM20C are associated with lethal Osteosclerotic Bone Dysplasia (Raine Syndrome), and mutations in FAM20A with Amelogenesis imperfecta (AI) and Gingival Hyperplasia Syndrome. The C-terminal domains of members of this family are putative kinase domains, based on mutagenesis of the C-terminal domain of Drosophila Four-Jointed, a related Golgi kinase. This domain family is also known as DUF1193. — an NCBI CDD conserved domain (cd10314); members share this curated model.
