identifier: CDD:cd18626
label: "chromodomain-like insertion in an ATPase domain of elongation factor eEF3. Eukaryotic elongation factor eEF3 (also known as EF-3, YEF3, and TEF3), a member of the ATP-binding cassette (ABC) family of proteins, is a ribosomal binding ATPase essential for fungal translation machinery. Until recently it was considered fungal-specific and therefore an attractive target for antifungal therapy; however, recent bioinformatics analysis indicates it may be more widely distributed among other unicellular eukaryotes, and translation elongation factor 3 activity has been demonstrated from a non-fungal species, Phytophthora infestans. eEF3 is a soluble factor lacking a transmembrane domain and having two ABC domains arranged in tandem, with a unique chromodomain inserted within the ABC2 domain. Chromodomain mutations in the ABC2 domain of eEF3 have been shown to reduce ATPase activity, but not ribosome binding. Thus, the chromodomain-like insertion is critical to eEF3 function. In addition to its elongation function, eEF3 has been shown to interact with mRNA in a translation independent manner, suggesting an additional, non-elongation function for this factor."
definition: >-
  chromodomain-like insertion in an ATPase domain of elongation factor eEF3. Eukaryotic elongation factor eEF3 (also known as EF-3, YEF3, and TEF3), a member of the ATP-binding cassette (ABC) family of proteins, is a ribosomal binding ATPase essential for fungal translation machinery. Until recently it was considered fungal-specific and therefore an attractive target for antifungal therapy; however, recent bioinformatics analysis indicates it may be more widely distributed among other unicellular eukaryotes, and translation elongation factor 3 activity has been demonstrated from a non-fungal species, Phytophthora infestans. eEF3 is a soluble factor lacking a transmembrane domain and having two ABC domains arranged in tandem, with a unique chromodomain inserted within the ABC2 domain. Chromodomain mutations in the ABC2 domain of eEF3 have been shown to reduce ATPase activity, but not ribosome binding. Thus, the chromodomain-like insertion is critical to eEF3 function. In addition to its elongation function, eEF3 has been shown to interact with mRNA in a translation independent manner, suggesting an additional, non-elongation function for this factor. — an NCBI CDD conserved domain (cd18626); members share this curated model.
