identifier: CDD:cd22337
label: "Restriction Endonuclease MvaI and similar endonucleases. Restriction endonuclease MvaI recognizes the sequence CC|WGG (W stands for A or T, '|' designates the cleavage site) and generates products with single nucleotide 5'-overhangs; it belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI."
definition: >-
  Restriction Endonuclease MvaI and similar endonucleases. Restriction endonuclease MvaI recognizes the sequence CC|WGG (W stands for A or T, '|' designates the cleavage site) and generates products with single nucleotide 5'-overhangs; it belongs to a superfamily of nucleases including very short patch repair (Vsr) endonucleases, archaeal Holliday junction resolvases, MutH methyl-directed DNA mismatch-repair endonucleases, and catalytic domains of many restriction endonucleases, such as EcoRI, BamHI, and FokI. — an NCBI CDD conserved domain (cd22337); members share this curated model.
