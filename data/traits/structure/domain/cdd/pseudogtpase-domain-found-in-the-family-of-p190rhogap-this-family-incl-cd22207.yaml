identifier: CDD:cd22207
label: "pseudoGTPase domain found in the family of p190RhoGAP. This family includes two p190RhoGAP proteins, A and B, which are Rho family GTPase-activating proteins (GAPs) that act as key regulators of Rho GTPase signaling and are essential for actin cytoskeletal structure and contractility. Rho family is one of five Ras superfamily subgroups (Ras, Rho, Rab, Ran and Arf). Each contains five highly conserved sequence motifs, termed 'G-motifs', required for nucleotide-binding and catalytic activity. PseudoGTPases consist of a GTPase fold lacking one or more of these G motifs. This model corresponds to the GTPase-like domain called pseudoGTPase domain that is located at the middle region of p190RhoGAP proteins."
