identifier: CDD:cd21539
label: "SPOC (Spen paralog and ortholog C-terminal) domain found in the Spen (split end) protein family. The Spen protein family includes a group of proteins characterized by containing RNA recognition motifs (RRMs) and a SPOC domain, such as SMART/HDAC1-associated repressor protein (SHARP) and RNA binding motif protein 15 (RBM15)-like proteins from metazoans, as well as plant flowering time control protein FPA and yeast chromo domain-containing protein 1 (Chp1p). SHARP, also called Msx2-interacting protein (MINT), or Spen homolog, is an estrogen-inducible transcriptional repressor that interacts directly with the nuclear receptor corepressor SMRT, histone deacetylases (HDACs), and components of the NuRD complex. RBM15, also called one-twenty two protein 1 (OTT1), is a novel mRNA export factor and component of the NXF1 pathway. RNA-binding protein 15B (RBM15B), also called one-twenty two 3 (OTT3), is a paralog of RBM15 and therefore has post-transcriptional regulatory activity. Chp1p is a component of the kinetochore which plays a role in stabilizing microtubules and thus, allowing accurate chromosome segregation. It has a role in the RNA interference (RNAi) pathway which is important for heterochromatin formation and accurate chromosome segregation. FPA plays a role in the regulation of flowering time in the autonomous flowering pathway by decreasing FLOWERING LOCUS C mRNA levels. It is required for RNA-mediated chromatin silencing of a range of loci in the genome. This model corresponds to the SPOC domain that is involved in developmental signaling and has also been proposed to be a phosphorylation binding module."
definition: >-
  SPOC (Spen paralog and ortholog C-terminal) domain found in the Spen (split end) protein family. The Spen protein family includes a group of proteins characterized by containing RNA recognition motifs (RRMs) and a SPOC domain, such as SMART/HDAC1-associated repressor protein (SHARP) and RNA binding motif protein 15 (RBM15)-like proteins from metazoans, as well as plant flowering time control protein FPA and yeast chromo domain-containing protein 1 (Chp1p). SHARP, also called Msx2-interacting protein (MINT), or Spen homolog, is an estrogen-inducible transcriptional repressor that interacts directly with the nuclear receptor corepressor SMRT, histone deacetylases (HDACs), and components of the NuRD complex. RBM15, also called one-twenty two protein 1 (OTT1), is a novel mRNA export factor and component of the NXF1 pathway. RNA-binding protein 15B (RBM15B), also called one-twenty two 3 (OTT3), is a paralog of RBM15 and therefore has post-transcriptional regulatory activity. Chp1p is a component of the kinetochore which plays a role in stabilizing microtubules and thus, allowing accurate chromosome segregation. It has a role in the RNA interference (RNAi) pathway which is important for heterochromatin formation and accurate chromosome segregation. FPA plays a role in the regulation of flowering time in the autonomous flowering pathway by decreasing FLOWERING LOCUS C mRNA levels. It is required for RNA-mediated chromatin silencing of a range of loci in the genome. This model corresponds to the SPOC domain that is involved in developmental signaling and has also been proposed to be a phosphorylation binding module. — an NCBI CDD conserved domain (cd21539); members share this curated model.
