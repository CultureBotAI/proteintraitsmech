identifier: CDD:cd18927
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in transcription factor EB (TFEB) and similar proteins. TFEB, also termed Class E basic helix-loop-helix protein 35 (bHLHe35), is a bHLHzip transcription factor that is required for vascularization of the mouse placenta. It specifically recognizes and binds E-box sequences (5'-CANNTG-3'). Its efficient DNA-binding requires dimerization with itself or with another MiT/TFE family member such as TFE3 or MITF."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in transcription factor EB (TFEB) and similar proteins. TFEB, also termed Class E basic helix-loop-helix protein 35 (bHLHe35), is a bHLHzip transcription factor that is required for vascularization of the mouse placenta. It specifically recognizes and binds E-box sequences (5'-CANNTG-3'). Its efficient DNA-binding requires dimerization with itself or with another MiT/TFE family member such as TFE3 or MITF. — an NCBI CDD conserved domain (cd18927); members share this curated model.
