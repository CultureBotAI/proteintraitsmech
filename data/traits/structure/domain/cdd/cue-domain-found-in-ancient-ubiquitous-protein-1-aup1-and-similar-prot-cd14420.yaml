identifier: CDD:cd14420
label: "CUE domain found in ancient ubiquitous protein 1 (AUP1) and similar proteins. AUP1 is a component of the HRD1-SEL1L endoplasmic reticulum (ER) quality control complex and is essential for US11-mediated dislocation of class I MHC heavy chains. It also binds to the membrane-proximal KVGFFKR motif of the cytoplasmic tail of the integrin alphaCTs that plays a crucial role in the inside-out signaling of alpha(IIb)beta(3). AUP1 is found in both the ER and in lipid droplets. It contains two conserved cytoplasmic domains, an acyltransferase domain, a CUE domain and an E2 ubiquitin conjugase G2 (Ube2g2)-binding domain (G2BR). The acyltransferase domain transfers fatty acids onto phospholipids and CUE domain participates in ubiquitin binding or in recruitment of ubiquitin-conjugating enzymes to the site of dislocation."
definition: >-
  CUE domain found in ancient ubiquitous protein 1 (AUP1) and similar proteins. AUP1 is a component of the HRD1-SEL1L endoplasmic reticulum (ER) quality control complex and is essential for US11-mediated dislocation of class I MHC heavy chains. It also binds to the membrane-proximal KVGFFKR motif of the cytoplasmic tail of the integrin alphaCTs that plays a crucial role in the inside-out signaling of alpha(IIb)beta(3). AUP1 is found in both the ER and in lipid droplets. It contains two conserved cytoplasmic domains, an acyltransferase domain, a CUE domain and an E2 ubiquitin conjugase G2 (Ube2g2)-binding domain (G2BR). The acyltransferase domain transfers fatty acids onto phospholipids and CUE domain participates in ubiquitin binding or in recruitment of ubiquitin-conjugating enzymes to the site of dislocation. — an NCBI CDD conserved domain (cd14420); members share this curated model.
