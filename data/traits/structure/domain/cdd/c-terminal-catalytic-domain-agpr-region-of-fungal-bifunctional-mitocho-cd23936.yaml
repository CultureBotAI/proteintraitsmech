identifier: CDD:cd23936
label: "C-terminal catalytic domain (AGPR region) of fungal bifunctional mitochondrial enzyme (gene ARG5,6, arg11 or arg-6) and similar proteins. The family includes bifunctional mitochondrial enzyme (gene ARG5,6, arg11 or arg-6) from fungi, which contains a N-terminal acetylglutamate kinase ( EC 2.7.2.8, also known as N-acetyl-L-glutamate 5-phosphotransferase/NAG kinase/AGK) domain and a C-terminal N-acetyl-gamma-glutamyl-phosphate reductase (AGPR; EC 1.2.1.38, also known as AGPR/N-acetyl-glutamate semialdehyde dehydrogenase/NAGSA dehydrogenase) domain. This model corresponds to the AGPR C-terminal catalytic domain. AGPR catalyzes the third step in the biosynthesis of arginine from glutamate, the NADP-dependent reduction of N-acetyl-5-glutamyl phosphate into N-acetylglutamate 5-semialdehyde. The budding yeast member, Arg5,6, is expressed as a precursor that is then maturated in the mitochondria into acetylglutamate kinase and acetylglutamyl-phosphate reductase. It is involved in the arginine biosynthesis pathway, catalyzing the second and third steps in the pathway."
definition: >-
  C-terminal catalytic domain (AGPR region) of fungal bifunctional mitochondrial enzyme (gene ARG5,6, arg11 or arg-6) and similar proteins. The family includes bifunctional mitochondrial enzyme (gene ARG5,6, arg11 or arg-6) from fungi, which contains a N-terminal acetylglutamate kinase ( EC 2.7.2.8, also known as N-acetyl-L-glutamate 5-phosphotransferase/NAG kinase/AGK) domain and a C-terminal N-acetyl-gamma-glutamyl-phosphate reductase (AGPR; EC 1.2.1.38, also known as AGPR/N-acetyl-glutamate semialdehyde dehydrogenase/NAGSA dehydrogenase) domain. This model corresponds to the AGPR C-terminal catalytic domain. AGPR catalyzes the third step in the biosynthesis of arginine from glutamate, the NADP-dependent reduction of N-acetyl-5-glutamyl phosphate into N-acetylglutamate 5-semialdehyde. The budding yeast member, Arg5,6, is expressed as a precursor that is then maturated in the mitochondria into acetylglutamate kinase and acetylglutamyl-phosphate reductase. It is involved in the arginine biosynthesis pathway, catalyzing the second and third steps in the pathway. — an NCBI CDD conserved domain (cd23936); members share this curated model.
