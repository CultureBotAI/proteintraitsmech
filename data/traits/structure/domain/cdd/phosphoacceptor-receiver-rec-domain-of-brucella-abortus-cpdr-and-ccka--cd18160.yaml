identifier: CDD:cd18160
label: "phosphoacceptor receiver (REC) domain of Brucella abortus CpdR and CckA, and similar domains. Two-component systems (TCSs), consisting of a sensor and a response regulator, are used by bacteria to adapt to changing environments. Processes regulated by TCSs in bacteria include sporulation, pathogenicity, virulence, chemotaxis and membrane transport. Response regulators share the common phosphoacceptor REC domain and differ output domains such as DNA, RNA, ligand, and protein-binding, or enzymatic domain. CpdR is a stand-alone REC protein. CckA is a sensor histidine kinase containing N-terminal PAS domains and a C-terminal REC domain. CpdR and CckA are components of a regulatory phosphorelay system (composed of CckA, ChpT, CtrA and CpdR) that controls Brucella abortus cell growth, division, and intracellular survival inside mammalian host cells. CckA autophosphorylates in the presence of ATP and transfers a phosphoryl group to the conserved aspartic acid residue on its C-terminal REC domain, which is relayed to the ChpT phosphotransferase. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of Brucella abortus CpdR and CckA, and similar domains. Two-component systems (TCSs), consisting of a sensor and a response regulator, are used by bacteria to adapt to changing environments. Processes regulated by TCSs in bacteria include sporulation, pathogenicity, virulence, chemotaxis and membrane transport. Response regulators share the common phosphoacceptor REC domain and differ output domains such as DNA, RNA, ligand, and protein-binding, or enzymatic domain. CpdR is a stand-alone REC protein. CckA is a sensor histidine kinase containing N-terminal PAS domains and a C-terminal REC domain. CpdR and CckA are components of a regulatory phosphorelay system (composed of CckA, ChpT, CtrA and CpdR) that controls Brucella abortus cell growth, division, and intracellular survival inside mammalian host cells. CckA autophosphorylates in the presence of ATP and transfers a phosphoryl group to the conserved aspartic acid residue on its C-terminal REC domain, which is relayed to the ChpT phosphotransferase. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd18160); members share this curated model.
