identifier: CDD:cd18574
label: "Six-transmembrane helical domain (6-TMD) of ATP-binding cassette transporter subfamily B member 8, mitochondrial, and similar proteins. This group includes ABCB8, which is one of the three ATP-binding cassette (ABC) transporters found in the inner membrane of mitochondria, with the nucleotide-binding domains (NBDs) inside the mitochondrial matrix. ABCB8 is essential for maintenance of normal cardiac function, involves mitochondrial iron export, and plays a role in the maturation of cytosolic Fe/S cluster-containing enzymes. ABCB8 is a half-molecule ABC protein that contains one TMD fused to a NBD, which dimerize to form a functional transporter."
definition: >-
  Six-transmembrane helical domain (6-TMD) of ATP-binding cassette transporter subfamily B member 8, mitochondrial, and similar proteins. This group includes ABCB8, which is one of the three ATP-binding cassette (ABC) transporters found in the inner membrane of mitochondria, with the nucleotide-binding domains (NBDs) inside the mitochondrial matrix. ABCB8 is essential for maintenance of normal cardiac function, involves mitochondrial iron export, and plays a role in the maturation of cytosolic Fe/S cluster-containing enzymes. ABCB8 is a half-molecule ABC protein that contains one TMD fused to a NBD, which dimerize to form a functional transporter. — an NCBI CDD conserved domain (cd18574); members share this curated model.
