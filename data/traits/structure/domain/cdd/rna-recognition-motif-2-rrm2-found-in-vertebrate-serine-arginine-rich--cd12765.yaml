identifier: CDD:cd12765
label: "RNA recognition motif 2 (RRM2) found in vertebrate serine/arginine-rich splicing factor 5 (SRSF5). This subgroup corresponds to the RRM2 of SRSF5, also termed delayed-early protein HRS, or pre-mRNA-splicing factor SRp40, or splicing factor, arginine/serine-rich 5 (SFRS5), is an essential splicing regulatory serine/arginine (SR) protein that regulates both alternative splicing and basal splicing. It is the only SR protein efficiently selected from nuclear extracts (NE) by the splicing enhancer (ESE) and it is necessary for enhancer activation. SRSF5 also functions as a factor required for insulin-regulated splice site selection for protein kinase C (PKC) betaII mRNA. It is involved in the regulation of PKCbetaII exon inclusion by insulin via its increased phosphorylation by a phosphatidylinositol 3-kinase (PI 3-kinase) signaling pathway. Moreover, SRSF5 can regulate alternative splicing in exon 9 of glucocorticoid receptor pre-mRNA in a dose-dependent manner. SRSF5 contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by a C-terminal RS domains rich in serine-arginine dipeptides. The specific RNA binding by SRSF5 requires the phosphorylation of its SR domain."
definition: >-
  RNA recognition motif 2 (RRM2) found in vertebrate serine/arginine-rich splicing factor 5 (SRSF5). This subgroup corresponds to the RRM2 of SRSF5, also termed delayed-early protein HRS, or pre-mRNA-splicing factor SRp40, or splicing factor, arginine/serine-rich 5 (SFRS5), is an essential splicing regulatory serine/arginine (SR) protein that regulates both alternative splicing and basal splicing. It is the only SR protein efficiently selected from nuclear extracts (NE) by the splicing enhancer (ESE) and it is necessary for enhancer activation. SRSF5 also functions as a factor required for insulin-regulated splice site selection for protein kinase C (PKC) betaII mRNA. It is involved in the regulation of PKCbetaII exon inclusion by insulin via its increased phosphorylation by a phosphatidylinositol 3-kinase (PI 3-kinase) signaling pathway. Moreover, SRSF5 can regulate alternative splicing in exon 9 of glucocorticoid receptor pre-mRNA in a dose-dependent manner. SRSF5 contains two N-terminal RNA recognition motifs (RRMs), also termed RBDs (RNA binding domains) or RNPs (ribonucleoprotein domains), followed by a C-terminal RS domains rich in serine-arginine dipeptides. The specific RNA binding by SRSF5 requires the phosphorylation of its SR domain. — an NCBI CDD conserved domain (cd12765); members share this curated model.
