identifier: CDD:cd11466
label: "basic helix-loop-helix (bHLH) domain found in heart- and neural crest derivatives-expressed protein (HAND) family. The HAND family includes two bHLH transcription factors, HAND1 and HAND2. HAND1, also termed Class A basic helix-loop-helix protein 27 (bHLHa27), or extraembryonic tissues, heart, autonomic nervous system and neural crest derivatives-expressed protein 1 (eHAND), plays an essential role in both trophoblast-giant cells differentiation and in cardiac morphogenesis. HAND2, also termed Class A basic helix-loop-helix protein 26 (bHLHa26), or deciduum, heart, autonomic nervous system and neural crest derivatives-expressed protein 2 (dHAND), is essential for cardiac morphogenesis, particularly for the formation of the right ventricle and of the aortic arch arteries."
definition: >-
  basic helix-loop-helix (bHLH) domain found in heart- and neural crest derivatives-expressed protein (HAND) family. The HAND family includes two bHLH transcription factors, HAND1 and HAND2. HAND1, also termed Class A basic helix-loop-helix protein 27 (bHLHa27), or extraembryonic tissues, heart, autonomic nervous system and neural crest derivatives-expressed protein 1 (eHAND), plays an essential role in both trophoblast-giant cells differentiation and in cardiac morphogenesis. HAND2, also termed Class A basic helix-loop-helix protein 26 (bHLHa26), or deciduum, heart, autonomic nervous system and neural crest derivatives-expressed protein 2 (dHAND), is essential for cardiac morphogenesis, particularly for the formation of the right ventricle and of the aortic arch arteries. — an NCBI CDD conserved domain (cd11466); members share this curated model.
