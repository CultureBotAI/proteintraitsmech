identifier: CDD:cd20057
label: "Forkhead (FH) domain found in Forkhead box protein N4 (FOXN4). FOXN4 acts as a transcription factor essential for neural and some non-neural tissue development, such as retina and lung, respectively. During development of the central nervous system, FOXN4 is required in specifying the amacrine and horizontal cell fates from multipotent retinal progenitors, while suppressing alternative photoreceptor cell fates. In non-neural tissues, it plays an essential role in specifying the atrioventricular canal and is indirectly required for patterning the distal airway during lung development. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'."
definition: >-
  Forkhead (FH) domain found in Forkhead box protein N4 (FOXN4). FOXN4 acts as a transcription factor essential for neural and some non-neural tissue development, such as retina and lung, respectively. During development of the central nervous system, FOXN4 is required in specifying the amacrine and horizontal cell fates from multipotent retinal progenitors, while suppressing alternative photoreceptor cell fates. In non-neural tissues, it plays an essential role in specifying the atrioventricular canal and is indirectly required for patterning the distal airway during lung development. The FH domain is a winged helix DNA-binding domain. FOX transcription factors recognize the core sequence 5'-(A/C)AA(C/T)A-3'. — an NCBI CDD conserved domain (cd20057); members share this curated model.
