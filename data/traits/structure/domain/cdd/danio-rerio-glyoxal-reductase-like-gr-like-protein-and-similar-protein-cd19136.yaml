label: "Danio rerio glyoxal reductase-like (GR-like) protein and similar proteins. Danio rerio GR-like protein is the prototype of this family. It is an uncharacterized aldo/keto reductase family oxidoreductase similar to Bacillus subtilis glyoxal reductase (YvgN) that reduces glyoxal and methylglyoxal (2-oxopropanal)."
definition: >-
