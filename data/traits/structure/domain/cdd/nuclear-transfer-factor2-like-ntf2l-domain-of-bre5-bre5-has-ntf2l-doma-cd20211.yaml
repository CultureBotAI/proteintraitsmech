identifier: CDD:cd20211
label: "Nuclear Transfer Factor2-like (NTF2L) domain of Bre5. Bre5 has NTF2L domain at the N terminus and an RNA recognition motif (RRM) at the C terminus. NTF2L domains are found in many proteins with diverse functions, a common function of this domain is protein-protein interaction. NTF2L of Bre5 is necessary and sufficient to bind deubiquitinating enzyme Ubp3 and is required for Ubp3 function in vivo."
definition: >-
  Nuclear Transfer Factor2-like (NTF2L) domain of Bre5. Bre5 has NTF2L domain at the N terminus and an RNA recognition motif (RRM) at the C terminus. NTF2L domains are found in many proteins with diverse functions, a common function of this domain is protein-protein interaction. NTF2L of Bre5 is necessary and sufficient to bind deubiquitinating enzyme Ubp3 and is required for Ubp3 function in vivo. — an NCBI CDD conserved domain (cd20211); members share this curated model.
