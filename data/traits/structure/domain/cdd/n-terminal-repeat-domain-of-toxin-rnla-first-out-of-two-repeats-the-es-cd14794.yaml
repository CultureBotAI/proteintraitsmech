identifier: CDD:cd14794
label: "N-terminal repeat domain of toxin RnlA; first out of two repeats. The Escherichia coli toxin RnlA functions as an mRNA endoribonuclease and is part of a two-component toxin-antitoxin system that promotes resistance to phage infections, together with the antitoxin RnlB. RNAse activity is located in the C-terminal domain. This N-terminal domain appears to participate in homodimerization and is the first out of two repeats."
definition: >-
  N-terminal repeat domain of toxin RnlA; first out of two repeats. The Escherichia coli toxin RnlA functions as an mRNA endoribonuclease and is part of a two-component toxin-antitoxin system that promotes resistance to phage infections, together with the antitoxin RnlB. RNAse activity is located in the C-terminal domain. This N-terminal domain appears to participate in homodimerization and is the first out of two repeats. — an NCBI CDD conserved domain (cd14794); members share this curated model.
