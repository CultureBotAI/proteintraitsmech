identifier: CDD:cd21428
label: "coiled-coil domain of outer kinetochore protein 1 (OKP1) and similar proteins. OKP1, also called CENP-Q homolog, or constitutive centromere-associated network protein OKP1, is a component of inner kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. The model corresponds to a coiled-coil domain of OKP1, which may mediate functionally important protein-protein interactions."
definition: >-
  coiled-coil domain of outer kinetochore protein 1 (OKP1) and similar proteins. OKP1, also called CENP-Q homolog, or constitutive centromere-associated network protein OKP1, is a component of inner kinetochore, a multiprotein complex that assembles on centromeric DNA and attaches chromosomes to spindle microtubules, mediating chromosome segregation and sister chromatid segregation during meiosis and mitosis. The model corresponds to a coiled-coil domain of OKP1, which may mediate functionally important protein-protein interactions. — an NCBI CDD conserved domain (cd21428); members share this curated model.
