identifier: CDD:cd16090
label: "Immunoglobulin variable region (IgV) in Cluster of Differentiation (CD) 47. The members here are composed of immunoglobulin variable (IgV) region in the Cluster of Differentiation (CD) 47 (also known as integrin associated protein/IAP). CD47 partners with membrane integrins and binds thrombospondin-1 (TSP-1) and signal-regulatory protein alpha (SIRP alpha). It is involved in apoptosis, proliferation, adhesion, migration, and immune and angiogenic responses. Members of the IgV family are components of immunoglobulin (Ig) and T cell receptors. The basic structure of Ig molecules is a tetramer of two light chains and two heavy chains linked by disulfide bonds. In Ig, each chain is composed of one variable domain (IgV) and one or more constant domains (IgC); these names reflect the fact that the variability in sequences is higher in the variable domain than in the constant domain. Within the variable domain, there are regions of even more variability called the hypervariable or complementarity-determining regions (CDRs) which are responsible for antigen binding. A predominant feature of most Ig domains is the disulfide bridge connecting 2 beta-sheets with a tryptophan residue packed against the disulfide bond."
definition: >-
  Immunoglobulin variable region (IgV) in Cluster of Differentiation (CD) 47. The members here are composed of immunoglobulin variable (IgV) region in the Cluster of Differentiation (CD) 47 (also known as integrin associated protein/IAP). CD47 partners with membrane integrins and binds thrombospondin-1 (TSP-1) and signal-regulatory protein alpha (SIRP alpha). It is involved in apoptosis, proliferation, adhesion, migration, and immune and angiogenic responses. Members of the IgV family are components of immunoglobulin (Ig) and T cell receptors. The basic structure of Ig molecules is a tetramer of two light chains and two heavy chains linked by disulfide bonds. In Ig, each chain is composed of one variable domain (IgV) and one or more constant domains (IgC); these names reflect the fact that the variability in sequences is higher in the variable domain than in the constant domain. Within the variable domain, there are regions of even more variability called the hypervariable or complementarity-determining regions (CDRs) which are responsible for antigen binding. A predominant feature of most Ig domains is the disulfide bridge connecting 2 beta-sheets with a tryptophan residue packed against the disulfide bond. — an NCBI CDD conserved domain (cd16090); members share this curated model.
