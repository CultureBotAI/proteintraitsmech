identifier: CDD:cd07479
label: "Peptidase S8 family domain in SKI-1-like proteins. SKI-1 (type I membrane-bound subtilisin-kexin-isoenzyme) proteins are secretory Ca2+-dependent serine proteinases cleave at nonbasic residues: Thr, Leu, and Lys.  SKI-1s play a critical role in the regulation of the synthesis and metabolism of cholesterol and fatty acid metabolism.   Members of the peptidases S8 and S35 clan include endopeptidases, exopeptidases and also a tripeptidyl-peptidase. The S8 family has an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure and are not homologous to trypsin. The S53 family contains a catalytic triad Glu/Asp/Ser. The stability of these enzymes may be enhanced by calcium, some members have been shown to bind up to 4 ions via binding sites with different affinity. Some members of this clan contain disulfide bonds. These enzymes can be intra- and extracellular, some function at extreme temperatures and pH values."
definition: >-
  Peptidase S8 family domain in SKI-1-like proteins. SKI-1 (type I membrane-bound subtilisin-kexin-isoenzyme) proteins are secretory Ca2+-dependent serine proteinases cleave at nonbasic residues: Thr, Leu, and Lys. SKI-1s play a critical role in the regulation of the synthesis and metabolism of cholesterol and fatty acid metabolism. Members of the peptidases S8 and S35 clan include endopeptidases, exopeptidases and also a tripeptidyl-peptidase. The S8 family has an Asp/His/Ser catalytic triad similar to that found in trypsin-like proteases, but do not share their three-dimensional structure and are not homologous to trypsin. The S53 family contains a catalytic triad Glu/Asp/Ser. The stability of these enzymes may be enhanced by calcium, some members have been shown to bind up to 4 ions via binding sites with different affinity. Some members of this clan contain disulfide bonds. These enzymes can be intra- and extracellular, some function at extreme temperatures and pH values. — an NCBI CDD conserved domain (cd07479); members share this curated model.
