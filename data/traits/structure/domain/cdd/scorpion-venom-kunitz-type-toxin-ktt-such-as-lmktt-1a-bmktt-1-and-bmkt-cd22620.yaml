identifier: CDD:cd22620
label: "scorpion venom Kunitz-type toxin (KTT) such as LmKTT-1a, BmKTT-1, and BmKTT-2. This model includes scorpion Kunitz-type toxin (KTT) such as Lychas mucronatus LmKTT-1a (also called Delta-KTx 2.1 or SdPII), Mesobuthus martensii BmKTT-1 (also called Delta-KTx 2.4) and BmKTT-2 (also called Delta-KTx 3.1), all expressed by the venom gland. LmKTT-1a, BmKTT-1 and BmKTT-2 are all dual-function toxins that completely inhibit trypsin activity but have no effect on chymotrypsin or elastase. They also inhibit mKv1.3/KCNA3 potassium channel currents. The structures of these domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor); however, they lack the conserved CysII-CysIV disulfide bond but contains 2 cysteine residues at the C-terminus that generate a new disulfide bond."
definition: >-
  scorpion venom Kunitz-type toxin (KTT) such as LmKTT-1a, BmKTT-1, and BmKTT-2. This model includes scorpion Kunitz-type toxin (KTT) such as Lychas mucronatus LmKTT-1a (also called Delta-KTx 2.1 or SdPII), Mesobuthus martensii BmKTT-1 (also called Delta-KTx 2.4) and BmKTT-2 (also called Delta-KTx 3.1), all expressed by the venom gland. LmKTT-1a, BmKTT-1 and BmKTT-2 are all dual-function toxins that completely inhibit trypsin activity but have no effect on chymotrypsin or elastase. They also inhibit mKv1.3/KCNA3 potassium channel currents. The structures of these domains are similar to those of Kunitz-type proteinase inhibitors such as BPTI (bovine pancreatic trypsin inhibitor); however, they lack the conserved CysII-CysIV disulfide bond but contains 2 cysteine residues at the C-terminus that generate a new disulfide bond. — an NCBI CDD conserved domain (cd22620); members share this curated model.
