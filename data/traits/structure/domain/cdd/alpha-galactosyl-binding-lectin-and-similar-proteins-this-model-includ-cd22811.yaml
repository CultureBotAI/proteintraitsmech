identifier: CDD:cd22811
label: "alpha-galactosyl binding lectin, and similar proteins. This model includes alpha-galactosyl binding lectin from Lyophyllum decastes, an edible mushroom that has been shown to contain polysaccharide extracts with anti-tumor effects. Lyophyllum decastes lectin (LDL) is a homodimeric protein that recognizes non-reducing alpha-galactosyl groups, with specificity for alpha-1,4-linked galactose (Gal-alpha(1,4)Gal) epitopes. It shows no sequence similarity to any known lectin or other protein of known function, and its structure shows a novel fold. While other mushroom lectins have cytosolic location surmised, the presence of disulfide bridges in LDL suggests that this lectin may be secreted."
definition: >-
  alpha-galactosyl binding lectin, and similar proteins. This model includes alpha-galactosyl binding lectin from Lyophyllum decastes, an edible mushroom that has been shown to contain polysaccharide extracts with anti-tumor effects. Lyophyllum decastes lectin (LDL) is a homodimeric protein that recognizes non-reducing alpha-galactosyl groups, with specificity for alpha-1,4-linked galactose (Gal-alpha(1,4)Gal) epitopes. It shows no sequence similarity to any known lectin or other protein of known function, and its structure shows a novel fold. While other mushroom lectins have cytosolic location surmised, the presence of disulfide bridges in LDL suggests that this lectin may be secreted. — an NCBI CDD conserved domain (cd22811); members share this curated model.
