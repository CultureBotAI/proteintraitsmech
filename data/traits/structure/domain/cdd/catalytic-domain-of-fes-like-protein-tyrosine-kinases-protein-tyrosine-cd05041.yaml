identifier: CDD:cd05041
label: "Catalytic domain of Fes-like Protein Tyrosine Kinases. Protein Tyrosine Kinase (PTK) family; Fes subfamily; catalytic (c) domain. Fes subfamily members include Fes (or Fps), Fer, and similar proteins. The PTKc family is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, and phosphoinositide 3-kinase (PI3K). PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. Fes subfamily proteins are cytoplasmic (or nonreceptor) tyr kinases containing an N-terminal region with FCH (Fes/Fer/CIP4 homology) and coiled-coil domains, followed by a SH2 domain, and a C-terminal catalytic domain. The genes for Fes (feline sarcoma) and Fps (Fujinami poultry sarcoma) were first isolated from tumor-causing retroviruses. The viral oncogenes encode chimeric Fes proteins consisting of Gag sequences at the N-termini, resulting in unregulated tyr kinase activity. Fes and Fer kinases play roles in haematopoiesis, inflammation and immunity, growth factor signaling, cytoskeletal regulation, cell migration and adhesion, and the regulation of cell-cell interactions. Fes and Fer show redundancy in their biological functions."
