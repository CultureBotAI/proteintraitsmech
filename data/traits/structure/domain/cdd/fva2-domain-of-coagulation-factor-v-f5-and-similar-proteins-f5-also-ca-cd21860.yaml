identifier: CDD:cd21860
label: "FVa2 domain of coagulation factor V (F5) and similar proteins. F5, also called activated protein C cofactor, or proaccelerin, labile factor, is a central regulator of hemostasis. It serves as a critical cofactor for the prothrombinase activity of factor Xa that results in the activation of prothrombin to thrombin. The model corresponds to a small conserved region called FVa2, which is critical for thrombin-catalyzed cofactor activation and prothrombinase activity."
definition: >-
  FVa2 domain of coagulation factor V (F5) and similar proteins. F5, also called activated protein C cofactor, or proaccelerin, labile factor, is a central regulator of hemostasis. It serves as a critical cofactor for the prothrombinase activity of factor Xa that results in the activation of prothrombin to thrombin. The model corresponds to a small conserved region called FVa2, which is critical for thrombin-catalyzed cofactor activation and prothrombinase activity. — an NCBI CDD conserved domain (cd21860); members share this curated model.
