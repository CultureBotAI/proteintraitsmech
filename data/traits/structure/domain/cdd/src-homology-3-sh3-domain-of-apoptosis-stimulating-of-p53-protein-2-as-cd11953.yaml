identifier: CDD:cd11953
label: "Src Homology 3 (SH3) domain of Apoptosis Stimulating of p53 protein 2. ASPP2 is the full length form of the previously-identified tumor supressor, p53-binding protein 2 (p53BP2). ASPP2 activates the apoptotic function of the p53 family of tumor suppressors (p53, p63, and p73). It plays a central role in regulating apoptosis and cell growth; ASPP2-deficient mice show postnatal death. Downregulated expression of ASPP2 is frequently found in breast tumors, lung cancer, and diffuse large B-cell lymphoma where it is correlated with a poor clinical outcome. ASPP2 contains a proline-rich region, four ankyrin (ANK) repeats, and an SH3 domain at its C-terminal half. The SH3 domain and the ANK repeats of ASPP2 contribute to the p53 binding site; they bind to the DNA binding domain of p53. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies."
definition: >-
  Src Homology 3 (SH3) domain of Apoptosis Stimulating of p53 protein 2. ASPP2 is the full length form of the previously-identified tumor supressor, p53-binding protein 2 (p53BP2). ASPP2 activates the apoptotic function of the p53 family of tumor suppressors (p53, p63, and p73). It plays a central role in regulating apoptosis and cell growth; ASPP2-deficient mice show postnatal death. Downregulated expression of ASPP2 is frequently found in breast tumors, lung cancer, and diffuse large B-cell lymphoma where it is correlated with a poor clinical outcome. ASPP2 contains a proline-rich region, four ankyrin (ANK) repeats, and an SH3 domain at its C-terminal half. The SH3 domain and the ANK repeats of ASPP2 contribute to the p53 binding site; they bind to the DNA binding domain of p53. SH3 domains are protein interaction domains that bind to proline-rich ligands with moderate affinity and selectivity, preferentially to PxxP motifs. They play versatile and diverse roles in the cell including the regulation of enzymes, changing the subcellular localization of signaling pathway components, and mediating the formation of multiprotein complex assemblies. — an NCBI CDD conserved domain (cd11953); members share this curated model.
