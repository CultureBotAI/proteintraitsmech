identifier: CDD:cd18133
label: "helical lid domain of clamp loader-like AAA+ proteins. Clamp loader complexes are multisubunit complexes that play an important role in DNA replication. They open sliding clamps for assembly and close them around DNA, specifically targeting them to sites where DNA synthesis is initiated and orienting them correctly for replication. The subunits belong to the clamp loader clade of AAA+ superfamily."
definition: >-
  helical lid domain of clamp loader-like AAA+ proteins. Clamp loader complexes are multisubunit complexes that play an important role in DNA replication. They open sliding clamps for assembly and close them around DNA, specifically targeting them to sites where DNA synthesis is initiated and orienting them correctly for replication. The subunits belong to the clamp loader clade of AAA+ superfamily. — an NCBI CDD conserved domain (cd18133); members share this curated model.
