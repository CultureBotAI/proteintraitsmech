identifier: CDD:cd18431
label: "BRCT domain of DNA ligase 3 (LIG3) and similar proteins. LIG3 (EC 6.5.1.1), also termed DNA ligase III, or polydeoxyribonucleotide synthase [ATP] 3, functions as heterodimer with DNA-repair protein XRCC1 in the nucleus and can correct defective DNA strand-break repair and sister chromatid exchange following treatment with ionizing radiation and alkylating agents."
definition: >-
  BRCT domain of DNA ligase 3 (LIG3) and similar proteins. LIG3 (EC 6.5.1.1), also termed DNA ligase III, or polydeoxyribonucleotide synthase [ATP] 3, functions as heterodimer with DNA-repair protein XRCC1 in the nucleus and can correct defective DNA strand-break repair and sister chromatid exchange following treatment with ionizing radiation and alkylating agents. — an NCBI CDD conserved domain (cd18431); members share this curated model.
