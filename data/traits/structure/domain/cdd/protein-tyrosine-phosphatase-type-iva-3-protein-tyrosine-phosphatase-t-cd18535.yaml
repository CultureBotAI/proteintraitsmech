identifier: CDD:cd18535
label: "protein tyrosine phosphatase type IVA 3. Protein tyrosine phosphatase type IVA 3 (PTP-IVa3), also known as protein-tyrosine phosphatase of regenerating liver 3 (PRL-3), stimulates progression from G1 into S phase during mitosis and enhances cell proliferation, cell motility and invasive activity, and promotes cancer metastasis. It exerts its oncogenic functions through activation of PI3K/Akt, which is a key regulator of the rapamycin-sensitive mTOR complex 1. PRL-3 is a member of the PTP-IVa/PRL family of small, prenylated phosphatases that are the most oncogenic of all PTPs. PRLs associate with magnesium transporters of the cyclin M (CNNM) family, which results in increased intracellular magnesium levels that promote oncogenic transformation."
definition: >-
