identifier: CDD:cd15096
label: "allatostatin-A receptor in insects, member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled AstA receptor binds allatostatin A. Three distinct types of allatostatin have been identified in the insects and crustaceans: AstA, AstB, and AstC. They both inhibit the biosynthesis of juvenile hormone and exert an inhibitory influence on food intake. Therefore, allatostatins are considered as potential targets for insect control."
definition: >-
  allatostatin-A receptor in insects, member of the class A family of seven-transmembrane G protein-coupled receptors. The G protein-coupled AstA receptor binds allatostatin A. Three distinct types of allatostatin have been identified in the insects and crustaceans: AstA, AstB, and AstC. They both inhibit the biosynthesis of juvenile hormone and exert an inhibitory influence on food intake. Therefore, allatostatins are considered as potential targets for insect control. — an NCBI CDD conserved domain (cd15096); members share this curated model.
