identifier: CDD:cd23540
label: "extracellular domain (ECD) found in activin receptor-like kinase 7 (ALK-7) and similar proteins. ALK-7 (EC 2.7.11.30, also called activin receptor type-1C (ACVR1C), or activin receptor type IC (ACTR-IC)) is a serine/threonine protein kinase which forms a receptor complex on ligand binding. The receptor complex consisting of 2 type II and 2 type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators, SMAD2 and SMAD3. ALK-7 is the receptor for activin AB, activin B, and NODAL. It plays a role in cell differentiation, growth arrest and apoptosis. This model corresponds to the extracellular domain (ECD) of ALK-7, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold)."
definition: >-
  extracellular domain (ECD) found in activin receptor-like kinase 7 (ALK-7) and similar proteins. ALK-7 (EC 2.7.11.30, also called activin receptor type-1C (ACVR1C), or activin receptor type IC (ACTR-IC)) is a serine/threonine protein kinase which forms a receptor complex on ligand binding. The receptor complex consisting of 2 type II and 2 type I transmembrane serine/threonine kinases. Type II receptors phosphorylate and activate type I receptors which autophosphorylate, then bind and activate SMAD transcriptional regulators, SMAD2 and SMAD3. ALK-7 is the receptor for activin AB, activin B, and NODAL. It plays a role in cell differentiation, growth arrest and apoptosis. This model corresponds to the extracellular domain (ECD) of ALK-7, which belongs to Ly-6 antigen/uPA receptor-like (LU) superfamily and exhibits a snake toxin-like fold (also known as three-finger toxin/3FTx fold or three-fingered protein/TFP domain fold). — an NCBI CDD conserved domain (cd23540); members share this curated model.
