identifier: CDD:cd21917
label: "eIF4E-binding domain found in protein cup and similar proteins. Cup, also called Oskar ribonucleoprotein complex 147 kDa subunit, is a nucleocytoplasmic shuttling protein that interacts with the eukaryotic translation initiation factor 4E (eIF4E) to modulate Drosophila ovary development. It is required for both the Smaug-mediated translational repression of oskar and the recruitment of Barentsz. It associates with Bruno and regulates oskar mRNA translation in oogenesis. In the N-terminal region, Cup contains a canonical eIF4E-binding motif (YXXXXLx, where X is any residue and x is hydrophobic) followed by an eIF4E-transporter-like (4E-T-like) region. The model corresponds to the eIF4E-binding motif-containing domain of cup."
definition: >-
  eIF4E-binding domain found in protein cup and similar proteins. Cup, also called Oskar ribonucleoprotein complex 147 kDa subunit, is a nucleocytoplasmic shuttling protein that interacts with the eukaryotic translation initiation factor 4E (eIF4E) to modulate Drosophila ovary development. It is required for both the Smaug-mediated translational repression of oskar and the recruitment of Barentsz. It associates with Bruno and regulates oskar mRNA translation in oogenesis. In the N-terminal region, Cup contains a canonical eIF4E-binding motif (YXXXXLx, where X is any residue and x is hydrophobic) followed by an eIF4E-transporter-like (4E-T-like) region. The model corresponds to the eIF4E-binding motif-containing domain of cup. — an NCBI CDD conserved domain (cd21917); members share this curated model.
