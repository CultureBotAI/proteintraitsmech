identifier: CDD:cd23129
label: "RING finger, HC subclass, found in Arabidopsis thaliana protein XB3 homolog 5 (XBAT35) and similar proteins. XBAT35, also known as ankyrin repeat domain and RING finger-containing protein XBAT35, or RING-type E3 ubiquitin transferase XBAT35, has no E3 ubiquitin-protein ligase activity observed when associated with the E2 enzyme UBC8 in vitro. It contains a typical C3HC4-type RING-HC finger."
definition: >-
  RING finger, HC subclass, found in Arabidopsis thaliana protein XB3 homolog 5 (XBAT35) and similar proteins. XBAT35, also known as ankyrin repeat domain and RING finger-containing protein XBAT35, or RING-type E3 ubiquitin transferase XBAT35, has no E3 ubiquitin-protein ligase activity observed when associated with the E2 enzyme UBC8 in vitro. It contains a typical C3HC4-type RING-HC finger. — an NCBI CDD conserved domain (cd23129); members share this curated model.
