identifier: CDD:cd20375
label: "N-terminal recognition domain of formin homology domain protein. N-terminal recognition domain of formin homology domain protein (such as FHOD1). Formins are large (typically > 1000 amino acids) regulators of actin cytoskeletal dynamics, and contain conserved homology 1 and 2 domains. Additionally, they contain an N-terminal recognition domain, a C-terminal autoregulation domain, and a GTPase-binding activation domain.  Intramolecular interactions between the N- and C-terminus seem to be involved in autoregulation of FHOD. FHOD is in a subfamily of Diaphanous-related formins (DRFs), which act as effectors of Rho family GTPases. DRF autoihibition occurs via the C-terminal Diaphanous Autoregulatory Domain (DAD) and the N-terminal array of regulatory sequences, including the FH3 domain and GTPase-binding domain."
