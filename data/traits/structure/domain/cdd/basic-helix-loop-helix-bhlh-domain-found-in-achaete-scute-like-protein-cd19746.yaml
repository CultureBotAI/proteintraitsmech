label: "basic helix-loop-helix (bHLH) domain found in achaete-scute-like protein 4 (ASCL-4) and similar proteins. ASCL-4, also termed Class A basic helix-loop-helix protein 44 (bHLHa44), or achaete-scute homolog 4 (ASH-4), or Hash4, is a bHLH transcriptional regulator that may be involved in skin development."
