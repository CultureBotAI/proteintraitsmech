identifier: CDD:cd06888
label: "The phosphoinositide binding Phox Homology domain of Five SH protein. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Five SH (FISH), also called Tks5, is a scaffolding protein and Src substrate that is localized in podosomes, which are electron-dense structures found in Src-transformed fibroblasts, osteoclasts, macrophages, and some invasive cancer cells. FISH contains an N-terminal PX domain and five Src homology 3 (SH3) domains. FISH binds and regulates some members of the ADAMs family of transmembrane metalloproteases, which function as sheddases and mediators of cell and matrix interactions. It is required for podosome formation, degradation of the extracellular matrix, and cancer cell invasion. This subfamily also includes proteins with a different number of SH3 domains than FISH, such as Tks4, which contains four SH3 domains instead of five. The Tks4 adaptor protein is required for the formation of functional podosomes. It has overlapping, but not identical, functions as FISH. The PX domain is involved in targeting of proteins to PI-enriched membranes, and may also be involved in protein-protein interaction."
definition: >-
  The phosphoinositide binding Phox Homology domain of Five SH protein. The PX domain is a phosphoinositide (PI) binding module present in many proteins with diverse functions such as cell signaling, vesicular trafficking, protein sorting, and lipid modification, among others. Five SH (FISH), also called Tks5, is a scaffolding protein and Src substrate that is localized in podosomes, which are electron-dense structures found in Src-transformed fibroblasts, osteoclasts, macrophages, and some invasive cancer cells. FISH contains an N-terminal PX domain and five Src homology 3 (SH3) domains. FISH binds and regulates some members of the ADAMs family of transmembrane metalloproteases, which function as sheddases and mediators of cell and matrix interactions. It is required for podosome formation, degradation of the extracellular matrix, and cancer cell invasion. This subfamily also includes proteins with a different number of SH3 domains than FISH, such as Tks4, which contains four SH3 domains instead of five. The Tks4 adaptor protein is required for the formation of functional podosomes. It has overlapping, but not identical, functions as FISH. The PX domain is involved in targeting of proteins to PI-enriched membranes, and may also be involved in protein-protein interaction. — an NCBI CDD conserved domain (cd06888); members share this curated model.
