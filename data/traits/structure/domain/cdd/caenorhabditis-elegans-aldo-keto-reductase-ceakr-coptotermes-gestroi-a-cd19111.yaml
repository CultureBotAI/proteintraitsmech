identifier: CDD:cd19111
label: "Caenorhabditis elegans aldo-keto reductase (CeAKR), Coptotermes gestroi aldo-keto reductase (CgAKR-1) and similar proteins. CeAKR is a founding member of aldo-keto reductase family 1 member G1 (AKR1G1). It may catalyze the reversible reduction of ketones to the respective alcohols using NAD(P)H as a hydride donor. Coptotermes gestroi aldo-keto reductase (CgAKR-1) is a founding member of aldo-keto reductase family 1 member I (AKR1I). It is a multipurpose enzyme with potential biotechnological applications."
definition: >-
  Caenorhabditis elegans aldo-keto reductase (CeAKR), Coptotermes gestroi aldo-keto reductase (CgAKR-1) and similar proteins. CeAKR is a founding member of aldo-keto reductase family 1 member G1 (AKR1G1). It may catalyze the reversible reduction of ketones to the respective alcohols using NAD(P)H as a hydride donor. Coptotermes gestroi aldo-keto reductase (CgAKR-1) is a founding member of aldo-keto reductase family 1 member I (AKR1I). It is a multipurpose enzyme with potential biotechnological applications. — an NCBI CDD conserved domain (cd19111); members share this curated model.
