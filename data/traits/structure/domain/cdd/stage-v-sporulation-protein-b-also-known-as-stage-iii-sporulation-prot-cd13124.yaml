identifier: CDD:cd13124
label: "Stage V sporulation protein B, also known as Stage III sporulation protein F, and related proteins. The integral membrane protein SpoVB has been implicated in the biosynthesis of the peptidoglycan component of the spore cortex in Bacillus subtilis. This model represents a subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins. Proteins from the MATE family are involved in exporting metabolites across the cell membrane and are often responsible for multidrug resistance (MDR)."
definition: >-
  Stage V sporulation protein B, also known as Stage III sporulation protein F, and related proteins. The integral membrane protein SpoVB has been implicated in the biosynthesis of the peptidoglycan component of the spore cortex in Bacillus subtilis. This model represents a subfamily of the multidrug and toxic compound extrusion (MATE)-like proteins. Proteins from the MATE family are involved in exporting metabolites across the cell membrane and are often responsible for multidrug resistance (MDR). — an NCBI CDD conserved domain (cd13124); members share this curated model.
