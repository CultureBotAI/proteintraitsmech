identifier: CDD:cd18923
label: "basic Helix-Loop-Helix-zipper (bHLHzip) domain found in upstream stimulatory factor 2 (USF2) and similar proteins. USF2, also termed Class B basic helix-loop-helix protein 12 (bHLHb12), or major late transcription factor 2, or FOS-interacting protein (FIP), or upstream transcription factor 2, is a bHLHzip transcription factor that binds to a symmetrical DNA sequence (E-boxes) (5'-CACGTG-3') that is found in a variety of viral and cellular promoters."
definition: >-
  basic Helix-Loop-Helix-zipper (bHLHzip) domain found in upstream stimulatory factor 2 (USF2) and similar proteins. USF2, also termed Class B basic helix-loop-helix protein 12 (bHLHb12), or major late transcription factor 2, or FOS-interacting protein (FIP), or upstream transcription factor 2, is a bHLHzip transcription factor that binds to a symmetrical DNA sequence (E-boxes) (5'-CACGTG-3') that is found in a variety of viral and cellular promoters. — an NCBI CDD conserved domain (cd18923); members share this curated model.
