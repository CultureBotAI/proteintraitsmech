identifier: CDD:cd19873
label: "double-stranded RNA binding motif of Saccharomyces cerevisiae mitochondrial 54S ribosomal protein L3 (MRPL3) and similar proteins. MRPL3 (also called mitochondrial large ribosomal subunit protein mL44) is a component of the mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. MRPL3 contains a RNase III-like domain and a double-stranded RNA binding motif (DSRM). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure."
definition: >-
  double-stranded RNA binding motif of Saccharomyces cerevisiae mitochondrial 54S ribosomal protein L3 (MRPL3) and similar proteins. MRPL3 (also called mitochondrial large ribosomal subunit protein mL44) is a component of the mitochondrial ribosome (mitoribosome), a dedicated translation machinery responsible for the synthesis of mitochondrial genome-encoded proteins, including at least some of the essential transmembrane subunits of the mitochondrial respiratory chain. MRPL3 contains a RNase III-like domain and a double-stranded RNA binding motif (DSRM). DSRM is not sequence specific, but highly specific for dsRNAs of various origin and structure. — an NCBI CDD conserved domain (cd19873); members share this curated model.
