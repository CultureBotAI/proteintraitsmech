identifier: CDD:cd14034
label: "Pseudokinase domain of Nuclear Receptor Binding Protein 1. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity and/or ATP binding. NRBP1, also called MLF1-adaptor molecule (MADM), was originally named based on the presence of nuclear binding and localization motifs prior to functional analyses. It is expressed ubiquitously and is found to localize in the cytoplasm, not the nucleus. NRBP1 is an adaptor protein that interacts with myeloid leukemia factor 1 (MLF1), an oncogene that enhances myeloid development of hematopoietic cells. It also interacts with the small GTPase Rac3. NRBP1 may also be involved in Golgi to ER trafficking and actin dynamics. The NRBP1-like subfamily is part of a larger superfamily that includes the catalytic domains of serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Pseudokinase domain of Nuclear Receptor Binding Protein 1. The pseudokinase domain shows similarity to protein kinases but lacks crucial residues for catalytic activity and/or ATP binding. NRBP1, also called MLF1-adaptor molecule (MADM), was originally named based on the presence of nuclear binding and localization motifs prior to functional analyses. It is expressed ubiquitously and is found to localize in the cytoplasm, not the nucleus. NRBP1 is an adaptor protein that interacts with myeloid leukemia factor 1 (MLF1), an oncogene that enhances myeloid development of hematopoietic cells. It also interacts with the small GTPase Rac3. NRBP1 may also be involved in Golgi to ER trafficking and actin dynamics. The NRBP1-like subfamily is part of a larger superfamily that includes the catalytic domains of serine/threonine kinases, protein tyrosine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd14034); members share this curated model.
