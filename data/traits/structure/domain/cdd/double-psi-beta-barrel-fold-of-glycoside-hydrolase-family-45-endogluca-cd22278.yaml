identifier: CDD:cd22278
label: "double-psi beta-barrel fold of glycoside hydrolase family 45 endoglucanase EG27II and similar proteins. This group is made up of endoglucanases from mollusks similar to Ampullaria crossean endoglucanase EG27II, a glycoside hydrolase family 45 (GH45) subfamily B protein. Endoglucanases (EC 3.2.1.4) catalyze the endohydrolysis of (1-4)-beta-D-glucosidic linkages in cellulose, lichenin, and cereal beta-D-glucans. Animal cellulases, such as endoglucanase EG27II, have great potential for industrial applications such as bioethanol production. GH45 endoglucanases from mollusks adopt a double-psi beta-barrel (DPBB) fold."
definition: >-
  double-psi beta-barrel fold of glycoside hydrolase family 45 endoglucanase EG27II and similar proteins. This group is made up of endoglucanases from mollusks similar to Ampullaria crossean endoglucanase EG27II, a glycoside hydrolase family 45 (GH45) subfamily B protein. Endoglucanases (EC 3.2.1.4) catalyze the endohydrolysis of (1-4)-beta-D-glucosidic linkages in cellulose, lichenin, and cereal beta-D-glucans. Animal cellulases, such as endoglucanase EG27II, have great potential for industrial applications such as bioethanol production. GH45 endoglucanases from mollusks adopt a double-psi beta-barrel (DPBB) fold. — an NCBI CDD conserved domain (cd22278); members share this curated model.
