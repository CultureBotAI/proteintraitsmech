identifier: CDD:cd24079
label: "nucleotide-binding domain (NBD) of Porphyromonas gingivalis putative N-acetylglucosamine kinase (PG1100) and similar proteins. The family includes a group of uncharacterized proteins similar to Porphyromonas gingivalis putative N-acetylglucosamine kinase (PG1100; EC 2.7.1.59), which may convert GlcNAc to GlcNAc-6-phosphate, a component utilized in UDP-GlcNAc biosynthesis or energy metabolism."
definition: >-
