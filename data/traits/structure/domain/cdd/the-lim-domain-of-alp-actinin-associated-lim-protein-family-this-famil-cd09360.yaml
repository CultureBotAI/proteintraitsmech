identifier: CDD:cd09360
label: "The LIM domain of ALP (actinin-associated LIM protein) family. This family represents the LIM domain of ALP (actinin-associated LIM protein) family. Four proteins: ALP, CLP36, RIL, and Mystique have been classified into the ALP subfamily of LIM domain proteins. Each member of the subfamily contains an N-terminal PDZ domain and a C-terminal LIM domain. Functionally, these proteins bind to alpha-actinin through their PDZ domains and bind or other signaling molecules through their LIM domains. ALP proteins have been implicated in cardiac and skeletal muscle structure, function and disease, platelet, and epithelial cell motility. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes."
definition: >-
  The LIM domain of ALP (actinin-associated LIM protein) family. This family represents the LIM domain of ALP (actinin-associated LIM protein) family. Four proteins: ALP, CLP36, RIL, and Mystique have been classified into the ALP subfamily of LIM domain proteins. Each member of the subfamily contains an N-terminal PDZ domain and a C-terminal LIM domain. Functionally, these proteins bind to alpha-actinin through their PDZ domains and bind or other signaling molecules through their LIM domains. ALP proteins have been implicated in cardiac and skeletal muscle structure, function and disease, platelet, and epithelial cell motility. LIM domains are 50-60 amino acids in size and share two characteristic zinc finger motifs. The two zinc fingers contain eight conserved residues, mostly cysteines and histidines, which coordinately bond to two zinc atoms. LIM domains function as adaptors or scaffolds to support the assembly of multimeric protein complexes. — an NCBI CDD conserved domain (cd09360); members share this curated model.
