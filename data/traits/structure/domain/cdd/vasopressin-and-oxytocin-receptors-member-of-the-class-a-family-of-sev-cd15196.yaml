identifier: CDD:cd15196
label: "vasopressin and oxytocin receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. Vasopressin (also known as arginine vasopressin or anti-diuretic hormone) and oxytocin are synthesized in the hypothalamus and are released from the posterior pituitary gland. The actions of vasopressin are mediated by the interaction of this hormone with three receptor subtypes: V1aR, V1bR, and V2R. These subtypes are differ in localization, function, and signaling pathways. Activation of V1aR and V1bR stimulate phospholipase C, while activation of V2R stimulates adenylate cyclase. Although vasopressin and oxytocin differ only by two amino acids and stimulate the same cAMP/PKA pathway, they have divergent physiological functions. Vasopressin is involved in regulating blood pressure and the balance of water and sodium ions, whereas oxytocin plays an important role in the uterus during childbirth and in lactation."
definition: >-
  vasopressin and oxytocin receptors, member of the class A family of seven-transmembrane G protein-coupled receptors. Vasopressin (also known as arginine vasopressin or anti-diuretic hormone) and oxytocin are synthesized in the hypothalamus and are released from the posterior pituitary gland. The actions of vasopressin are mediated by the interaction of this hormone with three receptor subtypes: V1aR, V1bR, and V2R. These subtypes are differ in localization, function, and signaling pathways. Activation of V1aR and V1bR stimulate phospholipase C, while activation of V2R stimulates adenylate cyclase. Although vasopressin and oxytocin differ only by two amino acids and stimulate the same cAMP/PKA pathway, they have divergent physiological functions. Vasopressin is involved in regulating blood pressure and the balance of water and sodium ions, whereas oxytocin plays an important role in the uterus during childbirth and in lactation. — an NCBI CDD conserved domain (cd15196); members share this curated model.
