identifier: CDD:cd19938
label: "phosphoacceptor receiver (REC) domain of BaeR-like OmpR family response regulators. BaeR is part of the BaeSR two-component system that is involved in regulating genes that confer multidrug and metal resistance. In Salmonella, BaeSR induces AcrD and MdtABC drug efflux systems, increasing multidrug and metal resistance. In Escherichia coli, BaeR stimulates multidrug resistance via mdtABC (multidrug transporter ABC, formerly known as yegMNO) genes, which encode a resistance-nodulation-cell division (RND) drug efflux system. Members of this subfamily belong to the OmpR family of DNA-binding response regulators, which are characterized by a REC domain and a winged helix-turn-helix (wHTH) DNA-binding output effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays."
definition: >-
  phosphoacceptor receiver (REC) domain of BaeR-like OmpR family response regulators. BaeR is part of the BaeSR two-component system that is involved in regulating genes that confer multidrug and metal resistance. In Salmonella, BaeSR induces AcrD and MdtABC drug efflux systems, increasing multidrug and metal resistance. In Escherichia coli, BaeR stimulates multidrug resistance via mdtABC (multidrug transporter ABC, formerly known as yegMNO) genes, which encode a resistance-nodulation-cell division (RND) drug efflux system. Members of this subfamily belong to the OmpR family of DNA-binding response regulators, which are characterized by a REC domain and a winged helix-turn-helix (wHTH) DNA-binding output effector domain. REC domains function as phosphorylation-mediated switches within response regulators, but some also transfer phosphoryl groups in multistep phosphorelays. — an NCBI CDD conserved domain (cd19938); members share this curated model.
