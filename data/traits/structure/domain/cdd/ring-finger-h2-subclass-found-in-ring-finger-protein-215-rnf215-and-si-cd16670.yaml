identifier: CDD:cd16670
label: "RING finger, H2 subclass, found in RING finger protein 215 (RNF215) and similar proteins. This family includes uncharacterized protein RNF215 and similar proteins. Although its biological function remains unclear, RNF215 shares high sequence similarity with PA-TM-RING ubiquitin ligases, which have been characterized by containing an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C-terminal C3H2C3-type RING-H2 finger."
definition: >-
  RING finger, H2 subclass, found in RING finger protein 215 (RNF215) and similar proteins. This family includes uncharacterized protein RNF215 and similar proteins. Although its biological function remains unclear, RNF215 shares high sequence similarity with PA-TM-RING ubiquitin ligases, which have been characterized by containing an N-terminal signal peptide, a protease-associated (PA) domain, a transmembrane (TM) domain and a C-terminal C3H2C3-type RING-H2 finger. — an NCBI CDD conserved domain (cd16670); members share this curated model.
