identifier: CDD:cd23278
label: "MIR domain, beta-trefoil fold, found in the family of ryanodine receptor (RyR). RyRs (also called RYRs) are intracellular Ca(2+) release channels located on the sarco/endoplasmic reticulum (SR/ER). They release calcium Ca(2+) intracellular stores to activate critical functions including muscle contraction and neurotransmitter release. The family includes three closely homologous proteins, RyR1, RyR2 and RyR3. RyR1 is present in skeletal muscle; RyR2 is in heart muscle; and RyR3 is expressed at low levels in many tissues including brain, smooth muscle, and slow-twitch skeletal muscle. RYR2 is the major cellular mediator of calcium-induced calcium release (CICR) in animal cells. RyR1 and RyR2 release Ca2+ from the ER in response to excitation of muscle membranes to promote muscle contraction. RYR3 is involved in force production and calcium handling in extraocular muscle. RYRs contain an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry."
definition: >-
  MIR domain, beta-trefoil fold, found in the family of ryanodine receptor (RyR). RyRs (also called RYRs) are intracellular Ca(2+) release channels located on the sarco/endoplasmic reticulum (SR/ER). They release calcium Ca(2+) intracellular stores to activate critical functions including muscle contraction and neurotransmitter release. The family includes three closely homologous proteins, RyR1, RyR2 and RyR3. RyR1 is present in skeletal muscle; RyR2 is in heart muscle; and RyR3 is expressed at low levels in many tissues including brain, smooth muscle, and slow-twitch skeletal muscle. RYR2 is the major cellular mediator of calcium-induced calcium release (CICR) in animal cells. RyR1 and RyR2 release Ca2+ from the ER in response to excitation of muscle membranes to promote muscle contraction. RYR3 is involved in force production and calcium handling in extraocular muscle. RYRs contain an N-terminal MIR (protein mannosyltransferase, IP3R and RyR) domain with beta-trefoil fold, which is characterized by 12 beta strands folded into three similar trefoil subdomains (alpha, beta, and gamma) associated to give an overall structure with pseudo-3-fold symmetry. — an NCBI CDD conserved domain (cd23278); members share this curated model.
