identifier: CDD:cd05048
label: "Catalytic Domain of the Protein Tyrosine Kinases, Receptor tyrosine kinase-like Orphan Receptors. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. The Ror subfamily consists of Ror1, Ror2, and similar proteins. Ror proteins are orphan receptor PTKs (RTKs) containing an extracellular region with immunoglobulin-like, cysteine-rich, and kringle domains, a transmembrane segment, and an intracellular catalytic domain. Ror RTKs are unrelated to the nuclear receptor subfamily called retinoid-related orphan receptors (RORs). RTKs are usually activated through ligand binding, which causes dimerization and autophosphorylation of the intracellular tyr kinase catalytic domain. Ror kinases are expressed in many tissues during development. They play important roles in bone and heart formation. Mutations in human Ror2 result in two different bone development genetic disorders, recessive Robinow syndrome and brachydactyly type B. Drosophila Ror is expressed only in the developing nervous system during neurite outgrowth and neuronal differentiation, suggesting a role for Drosophila Ror in neural development. More recently, mouse Ror1 and Ror2 have also been found to play an important role in regulating neurite growth in central neurons. Ror1 and Ror2 are believed to have some overlapping and redundant functions. The Ror subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase."
definition: >-
  Catalytic Domain of the Protein Tyrosine Kinases, Receptor tyrosine kinase-like Orphan Receptors. PTKs catalyze the transfer of the gamma-phosphoryl group from ATP to tyrosine (tyr) residues in protein substrates. The Ror subfamily consists of Ror1, Ror2, and similar proteins. Ror proteins are orphan receptor PTKs (RTKs) containing an extracellular region with immunoglobulin-like, cysteine-rich, and kringle domains, a transmembrane segment, and an intracellular catalytic domain. Ror RTKs are unrelated to the nuclear receptor subfamily called retinoid-related orphan receptors (RORs). RTKs are usually activated through ligand binding, which causes dimerization and autophosphorylation of the intracellular tyr kinase catalytic domain. Ror kinases are expressed in many tissues during development. They play important roles in bone and heart formation. Mutations in human Ror2 result in two different bone development genetic disorders, recessive Robinow syndrome and brachydactyly type B. Drosophila Ror is expressed only in the developing nervous system during neurite outgrowth and neuronal differentiation, suggesting a role for Drosophila Ror in neural development. More recently, mouse Ror1 and Ror2 have also been found to play an important role in regulating neurite growth in central neurons. Ror1 and Ror2 are believed to have some overlapping and redundant functions. The Ror subfamily is part of a larger superfamily that includes the catalytic domains of other kinases such as protein serine/threonine kinases, RIO kinases, aminoglycoside phosphotransferase, choline kinase, and phosphoinositide 3-kinase. — an NCBI CDD conserved domain (cd05048); members share this curated model.
