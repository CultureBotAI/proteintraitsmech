identifier: CDD:cd15969
label: "G protein-coupled receptor 87, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR87 acts as one of multiple receptors for lysophosphatidic acid (LPA). This orphan receptor has been shown to be over-expressed in several malignant tumors including lung squamous cell carcinoma and regulated by p53. GPR87 is phylogenetically closely related to the G(i) class of the P2Y family of purinergic G protein-coupled receptors. P2Y receptor family is composed of eight subtypes, which are activated by naturally occurring extracellular nucleotides such as ATP, ADP, UTP, UDP, and UDP-sugars. These eight receptors are ubiquitous in human tissues and can be further classified into two subfamilies based on sequence homology and second messenger coupling: a subfamily of five P2Y1-like receptors (P2Y1, P2Y2, P2Y4, P2Y6, and P2Y11Rs) that are coupled to G(q) protein to activate phospholipase C (PLC) and a second subfamily of three P2Y12-like receptors (P2Y12, P2YR13, and P2Y14Rs) that are coupled to G(i) protein to inhibit adenylate cyclase."
definition: >-
  G protein-coupled receptor 87, member of the class A family of seven-transmembrane G protein-coupled receptors. GPR87 acts as one of multiple receptors for lysophosphatidic acid (LPA). This orphan receptor has been shown to be over-expressed in several malignant tumors including lung squamous cell carcinoma and regulated by p53. GPR87 is phylogenetically closely related to the G(i) class of the P2Y family of purinergic G protein-coupled receptors. P2Y receptor family is composed of eight subtypes, which are activated by naturally occurring extracellular nucleotides such as ATP, ADP, UTP, UDP, and UDP-sugars. These eight receptors are ubiquitous in human tissues and can be further classified into two subfamilies based on sequence homology and second messenger coupling: a subfamily of five P2Y1-like receptors (P2Y1, P2Y2, P2Y4, P2Y6, and P2Y11Rs) that are coupled to G(q) protein to activate phospholipase C (PLC) and a second subfamily of three P2Y12-like receptors (P2Y12, P2YR13, and P2Y14Rs) that are coupled to G(i) protein to inhibit adenylate cyclase. — an NCBI CDD conserved domain (cd15969); members share this curated model.
