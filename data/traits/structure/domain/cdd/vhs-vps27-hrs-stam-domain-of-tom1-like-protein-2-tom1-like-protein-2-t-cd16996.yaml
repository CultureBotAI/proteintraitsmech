identifier: CDD:cd16996
label: "VHS (Vps27/Hrs/STAM) domain of TOM1-like protein 2. TOM1-like protein 2 (Tom1L2) is a member of the Tom1 (Target of myb1) subfamily, characterized by the presence of a VHS (Vps27p/Hrs/Stam) domain in the N-terminal portion followed by a GAT (GGA and Tom) domain. They are novel regulators for post-Golgi trafficking and signaling. Studies in Tom1L2 hypomorphic mice suggest that Tom1L2 may play roles in immune responses and tumor suppression. The VHS domain has a superhelical structure similar to the structure of the ARM repeats and is present at the very N-termini of proteins. It is a right-handed superhelix of eight alpha helices. The VHS domain has been found in a number of proteins, some of which have been implicated in intracellular trafficking and sorting."
definition: >-
