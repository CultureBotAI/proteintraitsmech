identifier: PROSITE:PRU01183
label: Hepatitis delta antigen (HDAg) domain
definition: >-
  The C-terminus of the HDAg domain forms the RNAPII-binding motif conserved in humans and virus, while the NELF-C (or NELF-D)-binding region of NELF-A is localized in the middle of the HDAg domain. The region of HDAg corresponding to the NELF-C (or NELF-D)-binding region of NELF-A has an RNA- binding function.
