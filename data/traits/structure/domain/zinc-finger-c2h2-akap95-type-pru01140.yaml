identifier: PROSITE:PRU01140
label: "Zinc finger C2H2 AKAP95-type"
definition: >-
  AKAP95 harbours two zinc fingers, designated ZF1 and ZF2. ZF1 mediates the binding of AKAP95 to DNA. ZF2 is dispensable for chromatin binding; however it may substitute for ZF1 when the latter is rendered non- functional by mutation.
