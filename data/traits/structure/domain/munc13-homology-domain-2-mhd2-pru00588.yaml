identifier: PROSITE:PRU00588
label: Munc13-homology domain 2 (MHD2)
definition: >-
  The MHD2 domain is present in a wide variety of proteins from Arabidopsis thaliana, C. elegans, Drosophila melanogaster, mouse, rat and human, some of which may function in a Munc13-like manner to regulate membrane trafficking.
