identifier: PROSITE:PRU00692
label: "Cytochrome c oxidase subunit Vb, zinc binding domain"
definition: >-
  This domain occurs in a subunit which forms a part of the cytochrome c oxidase (EC 1.9.3.1) enzymatic complex. It contains 3 to 4 conserved cysteine residues which bind a zinc atom.
