identifier: PROSITE:PRU01427
label: 5-phosphatase (5-PPase) domain
definition: >-
  The inositol polyphosphate 5-phosphatases (5-phosphatases or 5- PPases) form a family of Mg(2+)-dependent enzymes that catalyse the hydrolytic removal of the phosphate group on the 5-position of lipid-bound and soluble inositol phosphates. Members of this family share the catalytic 5-PPase domain.
