identifier: PROSITE:PRU01422
label: Interferon (IFN) type-III family
definition: >-
  Type III IFNs, commonly known as interferon lambda (IFNL or IFN- lambda), have been reported in mammals, birds, reptiles, amphibians, and cartilaginous fish. IFN-IIIs include IFN-lambda1-3 (also known as interleukin [IL]-29, IL-28A, and IL-28B) and IFN-lambda4 (only IFN-lambda2 and IFN- lambda3 exist in mice). They play a crucial role as gatekeepers, particularly in safeguarding mucosal epithelial cells.
