identifier: PROSITE:PRU01121
label: "Exonuclease I (ExoI) SH3-like domain"
definition: >-
  Exonuclease I (ExoI) consists of three domains: an N-terminal nuclease domain with homology to the proofreading domain of E. coli DNA polymereae I and other DnaQ superfamily enzymes, a central domain with a portion that resembles an SH3 domain fold and a C-terminal alpha-helical domain.
