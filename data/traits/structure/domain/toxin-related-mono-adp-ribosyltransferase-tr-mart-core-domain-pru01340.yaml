identifier: PROSITE:PRU01340
label: Toxin-related mono-ADP-ribosyltransferase (TR mART) core domain
definition: >-
  Most known mARTs transfer ADP-ribose onto arginine residues. Some enzymatically inactive mART domains, for example, the N-terminal domains of C2 and VIP2 toxins, have acquired a new, protein-binding function.
