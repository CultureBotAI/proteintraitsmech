identifier: PROSITE:PRU01066
label: "Biotinyl/lipoyl domain"
definition: >-
  Biotin and lipoic acid moieties are the covalently bound cofactors of several multicomponent enzyme complexes that catalyze key metabolic reactions. They are attached to a lysine residue, via an amide bond, by specific biotinyl and lipoyl protein ligases.
