identifier: PROSITE:PRU00736
label: "Collagen IV carboxyl-terminal non-collagenous (NC1) domain"
definition: >-
  Each type IV chain contains a long triple-helical collagenous domain flanked by a short 7S domain of 25 residues and a globular non-collagenous NC1 domain of ~230 residues at the N- and C-terminus, respectively.
