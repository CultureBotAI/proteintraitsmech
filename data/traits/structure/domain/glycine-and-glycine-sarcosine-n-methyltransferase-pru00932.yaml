identifier: PROSITE:PRU00932
label: "Glycine and glycine/sarcosine N-methyltransferase"
definition: >-
  Glycine N-methyltransferase (EC 2.1.1.20) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to glycine to form sarcosine and S-adenosyl-L-homocysteine. Glycine/sarcosine N-methyltransferase (EC 2.1.1.156) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to glycine to form sarcosine and S-adenosyl-L-homocysteine AND transfers a methyl group from S-adenosyl-L-methionine (SAM) to sarcosine to form N,N-dimethylglycine and S-adenosyl-L-homocysteine.
definition_source: "Prosite Release 2026_02 of 10-Jun-2026 (ProRule)"
trait_axis: STRUCTURE
trait_category: STRUCT_DOMAIN
term_kind: CLASS
