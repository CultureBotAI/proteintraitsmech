identifier: PROSITE:PRU00760
label: KaiA N-terminal domain
definition: >-
  Although the fold of the kaiA N-terminal domain is that of a canonical receiver domain, the primary sequence is dissimilar, and it lacks the conserved aspartate residue necessary for phosphorylation. KaiA activation most likely involves direct protein-protein interactions of the N- terminal domain that result in functional modulation of the C-terminal effector domain.
