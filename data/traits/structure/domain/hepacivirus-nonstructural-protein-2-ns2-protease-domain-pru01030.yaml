identifier: PROSITE:PRU01030
label: Hepacivirus nonstructural protein 2 (NS2) protease domain
definition: >-
  NS2 is a 217 amino acids (aa) long cysteine-protease composed of a highly hydrophobic N-terminal membrane binding domain (MBD) and a C-terminal globular and cytosolic protease domain. The HCV NS2 protease domain forms the peptidase family C18.
