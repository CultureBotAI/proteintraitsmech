identifier: PROSITE:PRU01395
label: WYL domain
definition: >-
  The WYL (named for three conserved amino acids found in a subset of domains of this superfamily) domain is a nucleotide-sensing module that controls the activity of TFs involved in the regulation of DNA damage response and phage defense mechanisms in bacteria.
