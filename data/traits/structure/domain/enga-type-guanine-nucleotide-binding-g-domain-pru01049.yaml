identifier: PROSITE:PRU01049
label: "EngA-type guanine nucleotide-binding (G) domain"
definition: >-
  EngA (Essential neisserial GTPase A) proteins belong to TrmE-Era- EngA-YihA-Septin like superfamily of TRAFAC class and form a unique family of bacterial GTPases with two G domains in tandem, namely GD1 and GD2, followed by a C-terminal KH-like domain. They have been shown to interact with the bacterial ribosome and to be involved in its biogenesis.
