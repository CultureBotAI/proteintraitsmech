label: "CBM56 (carbohydrate binding type-56) domain"
definition: >-
  The CBM family 56 (CBM56) domain is an ~95-amino acid module, which selectively binds insoluble beta-1,3-glucans, probably by binding domains in the polysaccharide with triple-helical quaternary structure.
