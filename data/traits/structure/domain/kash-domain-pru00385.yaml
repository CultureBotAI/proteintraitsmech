identifier: PROSITE:PRU00385
label: "KASH domain"
definition: >-
  The KASH or KLS domain is a highly hydrophobic nuclear envelope localization domain of ~60 amino acids comprising an ~20-amino-acid transmembrane region and a 30-35-residue C-terminal region that lies between the inner and the outer nuclear membranes.
