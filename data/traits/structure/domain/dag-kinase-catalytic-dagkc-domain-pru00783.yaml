identifier: PROSITE:PRU00783
label: DAG-kinase catalytic (DAGKc) domain
definition: >-
  The DAG-kinase catalytic domain (DAGKc) is present in mammalian lipid kinases, such as diacylglycerol (DAG), ceramide and sphingosine kinases, as well as in related bacterial lipid kinases.
