identifier: PROSITE:PRU01244
label: Zinc finger C4H2-type
definition: >-
  ZC4H2, which belongs to a conserved gene family found in all metazoans, plays an important role during embryonic development of the central and peripheral nervous systems. The ZC4H2 gene encodes a zinc-finger protein with a C-terminal domain, which includes a putative C4H2 zinc-finger characterized by four cysteine residues and two histidine residues, and a coiled-coil domain.
