identifier: PROSITE:PRU00167
label: "Ras-GAP domain"
definition: >-
  Ras proteins are membrane-associated molecular switches that bind GTP and GDP and slowly hydrolyze GTP to GDP. This intrinsic GTPase activity of ras is stimulated by a family of proteins collectively known as 'GAP' or GTPase-activating proteins. The key residue for GAP-mediated catalysis is the so-called "arginine finger".
