identifier: PROSITE:PRU00529
label: "THUMP domain"
definition: >-
  The THUMP (after thiouridine synthases, RNA methylases and pseudouridine synthases) domain is a module of 100-110 amino acid residues which is involved RNA metabolism. THUMP is an ancient domain with predicted RNA-binding capacity that probably functions by delivering a variety of RNA modification enzymes to their targets.
