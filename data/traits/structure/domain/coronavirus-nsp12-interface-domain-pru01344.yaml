identifier: PROSITE:PRU01344
label: Coronavirus Nsp12 Interface domain
definition: >-
  The coronavirus Nsp12 subunit contains an N-terminal NiRAN domain, an interface domain, composed of three helices and five beta strands, and a C-terminal polymerase domain, which resembles a right hand, comprising the fingers, palm and thumb subdomains.
