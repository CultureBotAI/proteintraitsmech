identifier: PROSITE:PRU01153
label: Zinc finger CCHC FOG-type
definition: >-
  Transcriptional cofactors of the Friend of GATA (FOG) family contain either eight or nine ZnFs that are related to the classical CCHH ZnFs (which have a conserved C-X(2,5)-C-X(12)-H-X(2,5)-H sequence). Several of the fingers in each FOG protein, however, have an altered consensus sequence in which the final zinc binding histidine is replaced with a cysteine. Interestingly, it is only these variant CCHC ZbFs that mediate interactions with GATA N-terminal zinc fingers (NFs).
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
