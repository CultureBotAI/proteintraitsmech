identifier: PROSITE:PRU00719
label: "YjeF N-terminal domain"
definition: >-
  The YjeF N-terminal domains represent a novel version of the Rossmann fold, one of the most common protein folds in nature observed in numerous enzyme families, that has acquired a set of catalytic residues and structural features that distinguish them from the conventional dehydrogenases.
