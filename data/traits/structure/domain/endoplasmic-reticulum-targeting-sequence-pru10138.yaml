identifier: PROSITE:PRU10138
label: Endoplasmic reticulum targeting sequence
definition: >-
  Proteins that permanently reside in the lumen of the endoplasmic reticulum (ER) seem to be distinguished from newly synthesized secretory proteins by the presence of the C-terminal sequence Lys-Asp-Glu-Leu (KDEL).
