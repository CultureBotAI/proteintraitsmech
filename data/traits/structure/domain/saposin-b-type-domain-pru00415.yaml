identifier: PROSITE:PRU00415
label: Saposin B-type domain
definition: >-
  The saposin B-type domain is a ~80 amino acid domain present in saposins and related proteins that interact with lipids. In plant aspartic proteinases the two subdomains that are connected by disulfide bridges occur in inversed order, these "swapped" halves are called a "swaposin" domain.
