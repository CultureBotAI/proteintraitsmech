identifier: PROSITE:PRU01381
label: Zinc finger reverse gyrase C-terminal-type
definition: >-
  Reverse gyrase (RG) is an ATP-dependent topoisomerase that is only found in archaeal and bacterial hyperthermophiles (above 80 degre C) and thermophiles (65-80 degre C). The RG C-terminal-type zinc finger is inserted into the Toprim domain at the base of the DNA-binding site and protrudes from the surface of the topoisomerase domain.
