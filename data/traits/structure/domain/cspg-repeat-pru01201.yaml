identifier: PROSITE:PRU01201
label: "CSPG repeat"
definition: >-
  The CSPG (chondroitin sulfate proteoglycan) repeat is a cadherin- like and tumor-relevant protein module which is thought to mediate interactions between cells and the extracellular matrix (ECM) in species as divergent as cyanobacteria, fly, worm, sea urchin and human.
