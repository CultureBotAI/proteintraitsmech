label: WAPL domain
definition: >-
  The WINGS APART-LIKE (WAPL) protein of Drosophila melanogaster regulates heterochromatin structure. Although the high-sequence conservation is limited to a third of the protein sequence, a WAPL homologue has been identified in mammals.
