identifier: PROSITE:PRU01400
label: Bacterial ISG15-like (Bil) ubiquitin-like domain
definition: >-
  One antiphage defense system in bacteria, comprises a ubiquitin-like protein, ubiquitin-conjugating enzymes E1 and E2, and a deubiquitinase. Owing to its double-UBL domain and role in antiviral defense, the system was coined "Bil" (bacterial ISG15-like), and is composed of BilA/B/C/D encoding UBL, E2, DUB, and E1 modules, respectively.
definition_source: Prosite Release 2026_02 of 10-Jun-2026 (ProRule)
