identifier: PROSITE:PRU00966
label: "NF-YA/HAP2 family"
definition: >-
  The CCAAT-binding factor (CBF) or NF-Y is a heteromeric transcription factor that consists of two different components both needed for DNA-binding. The second subunit of CBF, known as CBF-B or NF-YA in vertebrates and HAP2 in budding yeast, contains a highly conserved region of about 60 residues. This region, called the 'essential core', seems to consist of two subdomains: an N-terminal subunit-association domain and a C-t erminal DNA recognition domain.
