identifier: PROSITE:PRU01137
label: "Coenzyme A (CoA) carboxyltransferase C-terminal domain"
definition: >-
  The N- and C-terminal domains of the carboxyltransferase share similar polypeptide backbone folds, with a central beta-beta-alpha superhelix. In bacterial acetyl coenzyme A carboxylase the N and C domains are encoded by two different polypeptides.
