identifier: PROSITE:PRU00829
label: "CVC domain"
definition: >-
  The CVC (standing for Chx10/Vsx-1 and ceh-10) domain consists of approximately 50-60 amino acid residues. The CVC domain is predicted to influence transcriptional regulation through DNA-binding, protein-protein interaction and/or protein degradation processes. It is possible that the CVC domain is necessary for protein folding or protein-protein interactions because this domain is hydrophobic.
