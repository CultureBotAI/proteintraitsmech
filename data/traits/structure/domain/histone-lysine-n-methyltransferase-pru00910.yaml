identifier: PROSITE:PRU00910
label: Histone-lysine N-methyltransferase
definition: >-
  Histone-lysine N-methyltransferase is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to L-lysine- [histone] to form N(6)-methyl-L-lysine-[histone] and S-adenosyl-L- homocysteine.
