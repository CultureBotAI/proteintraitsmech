identifier: PROSITE:PRU01384
label: "Topoisomerase (Topo) IIA-type catalytic domain"
definition: >-
  Type IIA enzymes include topoisomerase II (topo II) encoded by both eukaryotes and viruses, and DNA gyrase and topoisomerase IV (topo IV) encoded by bacteria. The Topo IIA-type catalytic domain containing the active site tyrosine involved in the covalent complex with DNA is located on the C- terminal region of eukaryal enzymes or on the A-subunit of bacterial enzymes (GyrA or ParC for gyrase and Topo IV respectively).
