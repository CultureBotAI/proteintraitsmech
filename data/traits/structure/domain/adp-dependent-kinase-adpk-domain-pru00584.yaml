identifier: PROSITE:PRU00584
label: "ADP-dependent kinase (ADPK) domain"
definition: >-
  Archeal ADP-dependent glucokinases (ADPGKs) and phosphofructokinases (ADPPKKs) form an ADP-dependent kinase (ADPK) family, which was tentatively named the PFKC family. A ~460-residue ADPK domain is also found in a bifunctional ADP-dependent gluco/phosphofructo-kinase (ADP-GK/PFK) from Methanococcus jannaschii as well as in homologous hypothetical proteins present in several eukaryotes.
