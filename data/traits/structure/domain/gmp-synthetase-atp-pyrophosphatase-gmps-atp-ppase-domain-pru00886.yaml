label: "GMP synthetase ATP pyrophosphatase (GMPS ATP-PPase) domain"
definition: >-
  The GMP synthetase ATP-PPase ATP-binding domain is a twisted, five- stranded parallel beta-sheet sandwiched between helical layers. It contains a glycine rich ATP-binding motif called the "P-loop motif" located after the first beta-strand
