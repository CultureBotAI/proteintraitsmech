identifier: PROSITE:PRU00977
label: GIY-YIG domain
definition: >-
  The GIY-YIG superfamily groups together nucleases characterized by the presence of a domain of typically ~100 amino acids, with two short motifs "GIY" and "YIG" in the N-terminal part, followed by an Arg residue in the center and a Glu residue in the C-terminal part.
