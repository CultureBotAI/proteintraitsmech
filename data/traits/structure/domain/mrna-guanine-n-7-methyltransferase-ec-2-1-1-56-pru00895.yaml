identifier: PROSITE:PRU00895
label: mRNA (guanine-N(7))-methyltransferase (EC 2.1.1.56)
definition: >-
  mRNA (guanine-N(7))-methyltransferase (EC 2.1.1.56) is an enzyme that transfers a methyl group from S-adenosyl-L-methionine (SAM) to G(5')pppR-RNA to form m(7)G(5')pppR-RNA and S-adenosyl-L-homocysteine.
