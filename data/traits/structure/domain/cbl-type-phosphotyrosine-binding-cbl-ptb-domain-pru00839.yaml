identifier: PROSITE:PRU00839
label: Cbl-type phosphotyrosine-binding (Cbl-PTB) domain
definition: >-
  Cbl-PTB is composed of three interacting domains: a four-helix bundle (4H), an EF-hand calcium-binding domain, and a divergent SH2 domain. The calcium-bound EF-hand wedges between the 4H and SH2 domains, and roughly determines their relative orientation. The three domains together form an integrated phosphoprotein-recognition module.
