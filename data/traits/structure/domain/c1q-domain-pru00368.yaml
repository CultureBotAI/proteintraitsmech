identifier: PROSITE:PRU00368
label: C1q domain
definition: >-
  The C-terminal globular domain of the C1q subcomponents and collagen types VIII and X is important both for the correct folding and alignment of the triple helix and for protein-protein recognition events. For collagen type X it has been suggested that the domain is important for initiation and maintenance of the correct assembly of the protein.
