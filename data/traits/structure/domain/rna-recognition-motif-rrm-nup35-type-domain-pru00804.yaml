identifier: PROSITE:PRU00804
label: "RNA-recognition motif (RRM) Nup35-type domain"
definition: >-
  The vertebrate nuclear pore protein Nup35, the ortholog of Saccharomyces cerevisiae Nup53p, is suggested to interact with the NE membrane and to be required for nuclear morphology. The highly conserved region between vertebrate Nup35 and yeast Nup53p is predicted to contain an RNA-recognition motif (RRM) domain.
