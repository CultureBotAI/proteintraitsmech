identifier: PROSITE:PRU01210
label: LCN-type cysteine-stabilized alpha/beta (CS-alpha/beta) domain
definition: >-
  Most long-chain neurotoxins (LCNs) are composed of 60-70 residues and are cross-linked by four disulphide bridges. The long chain or voltage- gated sodium channels scorpion neurotoxins (NaScTxs) can be classified either as alpha-toxins, which slow down Na(+) channel inactivation, or beta-toxins, which affect the channel activation process.
