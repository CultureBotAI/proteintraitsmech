identifier: PROSITE:PRU01096
label: "Glycosyl hydrolases family 10 (GH10) domain"
definition: >-
  All family 10 xylanases hydrolyze the glycosidic bond in a double- displacement 'retaining' mechanism using two catalytic acidic residues, where one residue acts a nucleophile (base) and the other acts as a general acid/base.
