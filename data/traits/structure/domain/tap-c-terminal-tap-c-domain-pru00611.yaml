identifier: PROSITE:PRU00611
label: "TAP C-terminal (TAP-C) domain"
definition: >-
  Members of the NXF family of shuttling transport receptors for nuclear export of mRNA have a modular structure. Their most C-terminal TAP-C domain is important for binding to FG repeat-containing nuclear pore proteins (FG-nucleoporins) and is sufficient to mediate nuclear shuttling.
