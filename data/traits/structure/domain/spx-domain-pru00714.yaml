identifier: PROSITE:PRU00714
label: "SPX domain"
definition: >-
  The tripartite SPX domain could function as a sensor for inorganic phosphate (Pi) level and is most likely a domain for protein interaction. Possibly all SPX domains bind G-protein beta-subunits for the purpose of signal transduction.
