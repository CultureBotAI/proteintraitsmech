identifier: PROSITE:PRU01211
label: "Astacin-like domain"
definition: >-
  Astacin or M12A family zinc metalloproteases are found in bacteria and animals. They belong to the metzincin protease family and are synthesized as inactive precursors. The zinc atom in these enzymes acts as an electrophilic center to enhance the reactivity of a water molecule prior to nucleophilic attack on the carbonyl carbon of the scissile peptide bond.
