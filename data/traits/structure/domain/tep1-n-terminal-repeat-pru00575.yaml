identifier: PROSITE:PRU00575
label: "TEP1 N-terminal repeat"
definition: >-
  The TEP1 N-terminal repeat is a 30 residue module whereof 4 tandemly arranged copies form the N-terminus of telomerase protein component 1 (TP1) or TEP1, which is a protein component of two ribonucleoprotein (RNP) complexes: vaults and telomerase.
