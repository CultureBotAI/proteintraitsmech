identifier: PROSITE:PRU00650
label: Tify domain
definition: >-
  The tify domain is a 36-amino acid domain only found among Embryophyta (land plants). It has been named after the most conserved amino acid pattern (TIF[F/Y]XG] it contains. Tify domain containing proteins might be involved in developmental processes and some of them have features that are characteristic for transcription factors: a nuclear localization and the presence of a putative DNA-binding domain.
