label: "COS domain"
definition: >-
  The COS domain is an ~60-residue module found in N-terminal RING finger/B-box/coiled coil (RBCC) or tripartite motif (TRIM) proteins and in a distantly related non-RBCC microtubule-binding protein, GLFND.
