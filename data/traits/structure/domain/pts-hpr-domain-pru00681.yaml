identifier: PROSITE:PRU00681
label: "PTS HPR domain"
definition: >-
  The histidine-containing phosphocarrier protein (HPr) is a central component of the phosphoenolpyruvate-dependent sugar phosphotransferase system (PTS), which transfers metabolic carbohydrates across the cell membrane in many bacterial species.
