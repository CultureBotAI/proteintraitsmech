identifier: PROSITE:PRU00481
label: PdxS/SNZ family
definition: >-
  PdxS/SNZ and pdxT/SNO proteins form a complex which serves as a glutamine amidotransferase to supply ammonia as a source of the ring nitrogen of vitamin B6. PdxS/SNZ appear to encode the synthase subunit which combines ammonia with five- and three-carbon phosphosugars to form vitamin B6.
