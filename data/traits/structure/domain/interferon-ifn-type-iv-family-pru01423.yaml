identifier: PROSITE:PRU01423
label: "Interferon (IFN) type-IV family"
definition: >-
  IFN-upsilon (IFNU), the type IV IFN, is found in jawed vertebrates ranging from cartilaginous fish to primitive mammals. It differs from type I, II, and III IFNs in consideration of sequence feature, gene locus, phylogeny, and receptor complex. IFN-upsilon proteins in vertebrates were reported to contain conserved sequence, CXXXXX(W/L) at N-terminus, being different from other known three types of IFNs.
