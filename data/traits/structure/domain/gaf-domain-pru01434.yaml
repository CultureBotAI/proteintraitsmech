identifier: PROSITE:PRU01434
label: "GAF domain"
definition: >-
  GAF domains in general may regulate allosterically catalytic activities via the binding of ligands, such as nucleotides and small molecules. Given the diverse evolutionary and functional contexts within which GAF domains are found, it has been proposed that not all these domains possess identical functions.
