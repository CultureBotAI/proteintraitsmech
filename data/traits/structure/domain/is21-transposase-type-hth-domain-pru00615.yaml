identifier: PROSITE:PRU00615
label: IS21 transposase-type HTH domain
definition: >-
  The IS21 transposase-type HTH domain is a putative DNA-binding, helix-turn-helix (HTH) domain of about 60-65 amino acids, present in transposases of IS21-like prokaryotic insertion sequences.
