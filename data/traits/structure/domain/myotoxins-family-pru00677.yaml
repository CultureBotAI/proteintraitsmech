identifier: PROSITE:PRU00677
label: Myotoxins family
definition: >-
  Myotoxins are small basic peptides (42 to 45 residues) from the venom of rattlesnakes that cause severe muscle necrosis by a non-enzymatic mechanism. Myotoxins contain six cysteines involved in three disulfide bonds.
