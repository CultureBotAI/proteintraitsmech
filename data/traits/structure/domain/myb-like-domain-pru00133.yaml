identifier: PROSITE:PRU00133
label: "Myb-like domain"
definition: >-
  The myb-like domain resembles the myb-type HTH domain, which is a DNA-binding, helix-turn-helix (HTH) domain of ~55 amino acids, typically occurring in a tandem repeat. Myb-like domains can be involved in different functions, such as protein-interactions or DNA-binding. The SANT domain does not bind to DNA, despite its resemblance to myb-like domains, but it is a protein-protein interaction module that can bind to histone-tails (see <PRU00624>).
