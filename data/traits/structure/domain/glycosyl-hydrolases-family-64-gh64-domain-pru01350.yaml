identifier: PROSITE:PRU01350
label: "Glycosyl hydrolases family 64 (GH64) domain"
definition: >-
  All reported GH family 64 (GH64) members are laminaripentaose- producing "inverting" beta-1,3-glucanases. Two strictly conserved catalytic residues, a Glu and an Asp, act as an acid catalyst and a base catalyst, respectively.
