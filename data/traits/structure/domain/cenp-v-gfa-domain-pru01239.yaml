identifier: PROSITE:PRU01239
label: CENP-V/GFA domain
definition: >-
  At the C-terminal end, CENP-V possesses an evolutionally conserved domain that comprises an array of seven cysteines and shows high structural similarity to glutathione-dependent formaldehyde-activating enzyme (Gfa), an enzyme responsible for formaldehyde detoxification in prokaryotes. CENP-V could be an enzyme that scavenges the formaldehyde produced in histone demethylation reactions.
