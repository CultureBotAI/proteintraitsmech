identifier: PROSITE:PRU01383
label: Topoisomerase (Topo) IA-type catalytic domain
definition: >-
  Topo IA form a transient 5'-phospho-tyrosine covalent intermediate and release a free 3'-OH strand. The Topo IA-type catalytic domain consisting of subdomains III, II and IV exhibits a typical toroidal shape with a central hole able to accommodate single-strand or double-strand DNA.
