identifier: PROSITE:PRU01215
label: "Gid-type RING finger"
definition: >-
  The degenerated Gid-type RING finger is characterized by an incomplete series of Zn(2+) ion-ccordinating residues compared with the canonical RING finger, which encompasses eight Cys/His residues coordinating two Zn cations. A complete cysteine and histidine pattern is not necessarily critical for the E3 function.
