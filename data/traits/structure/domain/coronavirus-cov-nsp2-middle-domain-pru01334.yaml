identifier: PROSITE:PRU01334
label: Coronavirus (CoV) Nsp2 middle domain
definition: >-
  Nsp2 has been implicated in processes ranging from translation repression to endosomal transport, ribosome biogenesis, and actin filament binding. Nsp2 in SARS-CoV-2 and other coronaviruses have been observed to localize to endosomes and replication-transcription complexes (RTC). Nsp2 may be involved in binding nucleic acids and regulating intracellular signaling pathways. It contains an N-terminal, a middle and a C-terminal domain.
