identifier: PROSITE:PRU00969
label: "Biotin carboxylation domain"
definition: >-
  The biotin carboxylation domain is common to all biotin-dependent carboxylases and mediates the carboxylation of enzyme-bound biotin by bicarbonate and ATP. The biotin carboxylation domain can be divided in three subdomains (N-terminal, central and C-terminal). The N-terminal region provides part of the active site; the central region corresponds to the ATP- grasp domain, which is common to many ATP-dependent enzymes involved in macromolecular synthesis. The ATP-grasp module directly binds the ATP molecule. The C-terminal subdomain is involved in dimer formation.
definition_source: "Prosite Release 2026_02 of 10-Jun-2026 (ProRule)"
