identifier: PROSITE:PRU01166
label: Hepacivirus/Pegivirus NS3 protease domain
definition: >-
  The NS3/A4 protease is not only essential for generating mature viral proteins required for viral replication, but also hydrolyzes proteins, which are part of the innate immune system, thereby confounding the innate immune response to viral infection.
