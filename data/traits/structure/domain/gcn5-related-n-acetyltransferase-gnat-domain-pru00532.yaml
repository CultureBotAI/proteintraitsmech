identifier: PROSITE:PRU00532
label: "Gcn5-related N-acetyltransferase (GNAT) domain"
definition: >-
  The GNAT domain catalyzes the transfer of an acetyl group from the CoA donor to a primary amine of the acceptor, a reaction implicated in various functions from bacterial antibiotic resistance to mammalian circadian rhythm and chromatin remodeling.
