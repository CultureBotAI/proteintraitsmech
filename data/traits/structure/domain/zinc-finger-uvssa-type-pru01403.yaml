identifier: PROSITE:PRU01403
label: "Zinc finger UVSSA-type"
definition: >-
  The UVSSA-type zinc (Zn)-finger docks on the Pol II jaw: both knuckles of the finger insert their residues into a shallow groove formed by helix 1, consecutive beta-strand and helix 3 of the jaw domain.
