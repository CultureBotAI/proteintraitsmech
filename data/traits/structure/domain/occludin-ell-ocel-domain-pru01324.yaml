identifier: PROSITE:PRU01324
label: Occludin/ELL (OCEL) domain
definition: >-
  The ~110-amino acid occludin/ELL (OCEL) domain is necessary for interactions between occludin and ZO-1, actin, and multiple kinases and may also mediate homotypic occludin-occludin interactions. The C-terminal OCEL domain of ELL is also important for its function due to its interaction with other proteins.
