identifier: PROSITE:PRU00863
label: Foamy virus protease (FV PR) domain
definition: >-
  The FV PR domain forms peptidase family A9 (spumapepsin family). Retrovriral PRs belong to the family of aspartic proteases and are active as homodimers, with the active site triplets (Asp-Thr/Ser-Gly; D-T/S-G) from both chain contributing to the symetric active site of the enzyme.
