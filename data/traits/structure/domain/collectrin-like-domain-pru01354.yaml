identifier: PROSITE:PRU01354
label: Collectrin-like domain
definition: >-
  The collectrin-like domain mediates homodimerization. It consists of a small extracellular neck subdomain, which adopts a ferredoxin-like fold, a long linker, and a single transmembrane (TM) helix.
