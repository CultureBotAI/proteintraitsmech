identifier: PROSITE:PRU01054
label: Very large inducible GTPASE (VLIG)-type guanine nucleotide-binding (G) domain
definition: >-
  The very large inducible GTPase (VLIG) family contributes to the cellular response to both type I and type II interferons (IFNs). The potential GTP-binding activity of mouse VLIG-1, the prototype VLIG, possesses a classical GTP-binding sequence motif.
