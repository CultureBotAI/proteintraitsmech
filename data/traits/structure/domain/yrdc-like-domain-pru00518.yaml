identifier: PROSITE:PRU00518
label: "YrdC-like domain"
definition: >-
  The yrdC-like domain is an ~185-residue module which can be found in stand-alone form, or in association with other domains such as the acylphosphatase-like domain, the sua5-like domain, the hypF-like domain or the hypF-type zinc finger.
