identifier: PROSITE:PRU00883
label: Eph receptor ligand-binding domain
definition: >-
  The extracellular Eph receptor region contains a conserved 180- amino-acid N-terminal ligand-binding domain (LBD) which is both necessary and sufficient for bindings of the receptors to their ephrin ligands.
