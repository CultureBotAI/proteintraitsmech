identifier: PROSITE:PRU00373
label: "GAT domain"
definition: >-
  The GAT domain of GGAs serves as a molecular anchor of GGA to trans- Golgi network (TGN) membranes via its interaction with the GTP-bound form of a member of the ARF family of small GTPases and can bind specifically to the Rab GTPase effector rabaptin5 and to ubiquitin.
