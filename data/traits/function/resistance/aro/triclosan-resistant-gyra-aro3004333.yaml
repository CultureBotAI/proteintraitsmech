identifier: ARO:3004333
label: "triclosan resistant gyrA"
definition: >-
  DNA gyrase is responsible for DNA supercoiling and consists of two alpha and two beta subunits. Point mutations in gyrA have been shown to decrease susceptibility to the antibiotic triclosan. Although the mechanism is unclear, it is hypothesized that changes in supercoiling activity of mutant DNA gyrase proteins alters expression of stress response pathways thereby indirectly decreasing triclosan susceptibility. It has been shown that triclosan does not interact directly with gyrA.
