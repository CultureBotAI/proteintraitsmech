identifier: ARO:3003581
label: "Acinetobacter mutant Lpx gene conferring resistance to colistin"
definition: >-
  These genes are involved in the biosynthesis of lipid A in Gram-negative bacteria and mutations to this gene may cause resistance to antimicrobial peptides that target the outer membrane. Mutation by absence or insertion of ISAba11 sequence is a known cause of resistance in Acinetobacter baumannii▿.
