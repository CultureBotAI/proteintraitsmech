identifier: ARO:3004466
label: ICR-Mc
definition: >-
  A chromosomally-encoded colistin resistance phosphoethanolamine (PEtN) transferase of Moraxella catarrhalis. ICR-Mc is the protein that represents the closest known ortholog to the colistin resistance MCR-1 and MCR-2 PEtN transferases.
