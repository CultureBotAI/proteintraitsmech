identifier: ARO:3004275
label: "ANT(3'')"
definition: >-
  A category of aminoglycoside O-nucleotidyltransferase enzymes with modification regiospecificity based at the 3''-hydroxyl group of the respective antibiotic. These enzymes inactivate aminoglycoside antibiotics by transfer of an AMP group from an ATP substrate to the 3''-hydroxyl group of the compound.
