identifier: ARO:3004249
label: UhpA
definition: >-
  UhpA acts as a positive regulator of UhpT, which is a transporter to bring fosfomycin drugs into bacterial cells. Mutations in UhpA that negatively impact the expression of UhpT can confer resistance.
