identifier: ARO:3007011
label: mdeA
definition: >-
  mdeA is a multidrug efflux pump that confers resistance in varying degrees to several unrelated antibiotics, including kanamycin, tetracycline, ampicillin, oxacillin, ciprofloxacin, nalidixic acid, acriflavine, and ethidium bromide.
