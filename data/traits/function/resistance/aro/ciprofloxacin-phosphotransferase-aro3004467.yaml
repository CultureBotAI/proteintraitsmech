identifier: ARO:3004467
label: "ciprofloxacin phosphotransferase"
definition: >-
  A class of phosphotransferase enzymes shown to confer resistance to ciprofloxacin by antibiotic inactivation through phosphorylation. The sole example, CrpP, was thought to confer resistance to ciprofloxacin by antibiotic inactivation through phosphorylation, however in the paper by Zubyk & Wright (2021) this was discovered to not be the case. There are no known experimentally validated examples of enzymes with this function.
