identifier: ARO:3007061
label: hp1165
definition: >-
  Hp1165 is a homolog of the Clostridium perfringes tetP gene and is part of the MFS efflux family but is not considered a true tetracycline resistance gene. Hp1165 confers low level resistance to tetracycline, however cessation of antibiotic treatment results in the host cell reverting to susceptibility.
