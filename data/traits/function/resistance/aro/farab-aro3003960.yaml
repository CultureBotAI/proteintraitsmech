identifier: ARO:3003960
label: farAB
definition: >-
  farAB is an MFS efflux pump found in gonococci that is involved in antibacterial fatty acid resistance. Moreover, expression of the tandemly linked farA and farB genes was positively associated with the presence of the MtrR transcriptional regulatory protein that normally downregulates the expression of mtrCDE.
