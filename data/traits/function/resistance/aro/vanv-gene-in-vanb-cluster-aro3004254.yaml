identifier: ARO:3004254
label: "vanV gene in vanB cluster"
definition: >-
  Also known as vanVB, is a vanV variant found in the vanB gene cluster. It is found in some but not all vanB operons in E. faecalis, suggesting the existence of varied gene compositions in vanB operons.
