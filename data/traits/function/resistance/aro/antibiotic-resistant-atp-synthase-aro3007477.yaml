identifier: ARO:3007477
label: "antibiotic resistant ATP synthase"
definition: >-
  ATP synthase enzymes, specifically subunit C, resistant to diarylquinolone antibiotics including Bedaquiline. Mutations in ATP synthase confer antibiotic resistance by disrupting binding and blocking of ATP synthase reactions by Bedaquiline.
