identifier: ARO:3002384
label: "BEL beta-lactamase"
definition: >-
  BEL beta-lactamases are class A expanded-spectrum beta-lactamases that are inhibited by clavulanic acid. They are chromosomally encoded and hydrolyze most cephalosporins and aztreonam.
