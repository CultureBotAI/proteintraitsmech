identifier: ARO:3003539
label: "Mycolicibacterium smegmatis 16S rRNA (rrsA) mutation conferring resistance to hygromycin B"
definition: >-
  Point mutations in the highly conserved helix 44 of the 16S rrsA rRNA gene of Mycolicibacterium smegmatis can confer resistance to hygromycin B. Resistance against hygromycin B is the result of conformational alterations that distorts a strong hydrogen bond leading to a change in the local geometry of the hygromycin B binding site.
