identifier: ARO:3004915
label: "fluoroquinolone-resistant ESX5 secretion system"
definition: >-
  ESX-5 secretion system is are important for virulence of mycobacteria and is required for mycobacterial cell wall stability and host cell lysis. The system is comprised of genes that encode the structural components of the secretion system. The system secrets mycobacterial proteins involved in virulence and pathogenicity and important for mycobacterium viability. Resistance has been shown to specific antibiotics.
