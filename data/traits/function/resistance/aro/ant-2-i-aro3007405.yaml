label: "ANT(2'')-I"
definition: >-
  A family of aminoglycoside 2''-O-nucleotidyltransferase enzymes which inactivate gentamicin, tobramycin & dibekacin by catalyzing the transfer of an AMP group from an ATP substrate, thereby conferring resistance to these compounds.
