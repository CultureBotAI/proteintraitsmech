causal_graphs:
  - graph_id: resistance
    title: How Tet(M) confers tetracycline resistance by target protection (determinant → mechanism → phenotype)
    description: >-
      Resistance-causation graph for the Tet(M) determinant — a FOURTH mechanism
      type: antibiotic **target protection**. Tet(M) is a ribosome-binding GTPase
      (an EF-G paralogue) that, using GTP hydrolysis, dislodges tetracycline from
      its binding site on the (unmodified) ribosome, letting translation resume.
      Distinct from all prior rounds: neither the drug (cf. GOB-10 inactivation)
      nor the target (cf. ErmB alteration) is chemically modified, and the drug is
      not pumped out (cf. MdfA efflux) — it is physically displaced from an intact
      target.
