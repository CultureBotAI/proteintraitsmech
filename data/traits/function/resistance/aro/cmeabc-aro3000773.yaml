identifier: ARO:3000773
label: CmeABC
definition: >-
  CmeABC is a multidrug efflux pump in Campylobacter jejuni. Its overexpression led to enhanced resistance to ciprofloxacin, norfloxacin, cefotaxime, fusidic acid, and erythromycin. CmeA acts as the periplasmic fusion protein, CmeB is the inner membrane transporter, and CmeC is an outer membrane protein.
