identifier: ARO:3004832
label: "Neisseria gonorrhoeae PBP2 conferring resistance to beta-lactam antibiotics"
definition: >-
  PBP2 is a penicillin-binding protein and beta-lactam resistance enzyme encoded by the penA gene, due to mutations can cause resistance to various drugs such as Penicillin and Ceftriaxone.
