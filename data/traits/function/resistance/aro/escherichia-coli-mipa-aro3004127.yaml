identifier: ARO:3004127
label: "Escherichia coli mipA"
definition: >-
  MltA-interacting protein (mipA), is an antibiotic resistance-related outer membrane protein. Deletion of mipA increases kanamycin, nalidixic acid and streptomycin resistance.
