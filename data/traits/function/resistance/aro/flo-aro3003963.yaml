identifier: ARO:3003963
label: flo
definition: >-
  The Flo transporters can be plasmid- or chromosome-encoded. flo is an important determinant of florfenicol resistance in animal isolates of E. coli but is also found in human pathogens (e.g. Salmonella enterica and V. cholerae).
