causal_graphs:
  - graph_id: resistance
    title: How MdfA confers multidrug resistance by active efflux (determinant → mechanism → phenotype)
    description: >-
      Resistance-causation graph for the MdfA efflux determinant. Unlike the
      β-lactamase determinant GOB-10 (which chemically inactivates the drug), MdfA
      confers resistance without modifying the antibiotic: it is a major-facilitator
      superfamily (MFS) H+-coupled antiporter that uses the proton-motive force to
      actively expel intact drugs from the cytoplasm, lowering the intracellular
      concentration. Same ARO edge shape (determinant → mechanism → phenotype), a
      genuinely different mechanism (antibiotic efflux, ARO:0010000, vs antibiotic
      inactivation, ARO:0001004).
    nodes:
      - node_id: mdfa
        label: E. coli MdfA (MFS multidrug efflux pump determinant)
        node_type: PROTEIN
        grounding: ARO:3001328
      - node_id: mfs_family
        label: major facilitator superfamily (MFS) antibiotic efflux pump
        node_type: PROTEIN
        grounding: ARO:0010002
      - node_id: efflux
        label: H+-coupled multidrug efflux (antibiotic efflux)
        node_type: MOLECULAR_FUNCTION
        grounding: ARO:0010000
        xrefs:
          - GO:0015238
        description: Proton-motive-force-driven drug/H+ antiport that exports intact antibiotic from the cell.
      - node_id: chloramphenicol
        label: chloramphenicol (archetypal substrate; broad multidrug spectrum)
        node_type: CHEMICAL
        grounding: CHEBI:17698
      - node_id: resistance
        label: multidrug resistance phenotype
        node_type: PHENOTYPE
    edges:
