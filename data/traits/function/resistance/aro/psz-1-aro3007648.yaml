identifier: ARO:3007648
label: PSZ-1
definition: >-
  PSZ-1 is a PSZ beta-lactamase found in Pantoea endophytica. The gene showed resistance to penicillins and several first-, second-and third-generation cephalosporins as well as aztreonam.
