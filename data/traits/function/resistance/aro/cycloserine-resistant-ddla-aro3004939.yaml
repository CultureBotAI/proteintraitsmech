identifier: ARO:3004939
label: "cycloserine resistant ddlA"
definition: >-
  ddlA catalyzes the ATP-driven ligation of two D-alanine molecules to form the D-alanyl-D-alanine dipeptide, key in forming the cell wall. Cycloserine has a similar structure to d-alanine and inhibits the growth of the cell wall.
definition_source: ARO
