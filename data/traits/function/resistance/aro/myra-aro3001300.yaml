identifier: ARO:3001300
label: myrA
definition: >-
  myrA is a methyltransferase found in Micromonospora griseorubida and confers resistance to mycinamicin and tylosin. Specifically, this enzyme adds a methyl group to guanosine 748 (E. coli numbering) of 23S ribosomal RNA. MyrA is found in the mycinamicin biosynthetic cluster and is one mechanism by which M. griseorubida protects itself from self-destruction when producing this macrolide.
