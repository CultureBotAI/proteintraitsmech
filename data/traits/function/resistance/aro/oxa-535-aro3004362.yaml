identifier: ARO:3004362
label: OXA-535
definition: >-
  A chromosome-carried OXA-48-like beta-lactamase, OXA-535, identified in Shewanella spp. JAB-1. Likely the progenitor to the plasmid-carried OXA-436. Expression of OXA-535 in E. coli demonstrated carbapenem-hydrolyzing activity. Described by Jousset et al. 2017.
