identifier: ARO:3004873
label: "Neisseria gonorrhoeae folP with mutation conferring resistance to sulfonamides"
definition: >-
  Point mutations in Neisseria gonorrhoeae dihydropteroate synthase folP prevent sulfonamide antibiotics from inhibiting its role in folate synthesis, thus conferring sulfonamide resistance.
