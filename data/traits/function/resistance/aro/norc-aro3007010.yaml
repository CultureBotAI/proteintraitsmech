identifier: ARO:3007010
label: norC
definition: >-
  NorC is a multidrug efflux pump in Staphylococcus aureus that confers resistance to fluoroquinolones and other structurally unrelated antibiotics like tetracycline. It shares 61% similarity with NorB, and is a structural homolog of Blt of Bacillus subtilis. Like NorA and NorB, NorC is regulated by mgrA, also known as NorR.
