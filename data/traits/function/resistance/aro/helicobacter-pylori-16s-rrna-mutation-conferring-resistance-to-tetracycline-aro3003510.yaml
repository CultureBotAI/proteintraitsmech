identifier: ARO:3003510
label: "Helicobacter pylori 16S rRNA mutation conferring resistance to tetracycline"
definition: >-
  Tetracycline binds tightly to the helix 34 domain in 16S rRNA, where it interferes sterically with the binding of aminoacyl-tRNA to the ribosome A site to block protein synthesis. Mutations in the nucleotide sequence in this domain of Helicobacter pylori can result in resistance against tetracycline.
