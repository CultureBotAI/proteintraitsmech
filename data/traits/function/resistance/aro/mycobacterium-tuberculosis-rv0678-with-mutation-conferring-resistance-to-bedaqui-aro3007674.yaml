identifier: ARO:3007674
label: "Mycobacterium tuberculosis Rv0678 with mutation conferring resistance to bedaquiline"
definition: >-
  Rv0678 encodes a transcription factor which negatively regulates the expression of the mmpS5/L5 efflux pump. Loss-of-function mutations in rv0678 are a common mechanism of resistance.
