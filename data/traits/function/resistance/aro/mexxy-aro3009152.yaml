identifier: ARO:3009152
label: MexXY
definition: >-
  MexXY is a multidrug efflux pump complex consisting of MexX and MexY as its core components. This system serves as a key transport mechanism, interacting with outer membrane proteins to expel antibiotics and toxic compounds, contributing to multidrug resistance.
