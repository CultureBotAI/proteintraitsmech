identifier: ARO:3004363
label: "lipid A acyltransferase"
definition: >-
  Lipid A acyltransferase genes confer resistance to certain types of peptide antibiotics such as polymyxins through the aminoacylation of lipopolysaccharide, thereby decreasing the negative charge of the outer membrane surface.
