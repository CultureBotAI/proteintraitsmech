identifier: ARO:3003386
label: "Escherichia coli folP with mutation conferring resistance to sulfonamides"
definition: >-
  Point mutations in Escherichia coli dihydropteroate synthase folP prevent sulfonamide antibiotics from inhibiting its role in folate synthesis, thus conferring sulfonamide resistance.
