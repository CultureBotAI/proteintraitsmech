label: "PAM beta-lactamase"
definition: >-
  A family of subclass B3 metallo-beta-lactamases discovered in Pseudomonas alcaligenes and found in other members of the Pseudomonas genus. PAM beta-lactamases hydrolyze cephalosporins and carbenems.
