identifier: ARO:3007567
label: "UDP-glucuronic acid decarboxylase"
definition: >-
  UDP-glucuronic acid decarboxylase catalyzes the decarboxylation of UDP-glucuronic acid. Accumulation of UDP-glucuronic acid mediates resistance to 5-flucytosine.
