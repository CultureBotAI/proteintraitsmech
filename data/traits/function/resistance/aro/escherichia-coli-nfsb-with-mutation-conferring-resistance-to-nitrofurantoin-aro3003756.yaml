identifier: ARO:3003756
label: "Escherichia coli nfsB with mutation conferring resistance to nitrofurantoin"
definition: >-
  nfsB encodes the minor oxygen-insesitive nitroreductase in E. coli. The first step of resistance to nitrofurazone is mutation of nfsA, while the increased resistance associated with second step mutants is a consequence of nfsB mutation.
