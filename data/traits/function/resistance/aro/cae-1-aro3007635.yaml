identifier: ARO:3007635
label: CAE-1
definition: >-
  CAE-1 is a CAE beta-lactamase and confers resistance to ampicillin, piperacillin, cefazolin, cefuroxime, and ceftriaxone, and elevates the MIC of ampicillin-sulbactam two-fold in Escherichia coli DH5alpha, suggesting that CAE-1 functions as a broad-spectrum beta-lactamase.
