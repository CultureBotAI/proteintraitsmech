label: "Mycobacterium tuberculosis gyrA conferring resistance to fluoroquinolones"
definition: >-
  Point mutation of Mycobacterium tuberculosis gyrA resulted in the lowered affinity between fluoroquinolones and gyrA. Thus, conferring resistance.
