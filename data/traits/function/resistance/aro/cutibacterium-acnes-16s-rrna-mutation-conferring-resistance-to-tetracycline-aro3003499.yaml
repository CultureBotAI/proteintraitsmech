identifier: ARO:3003499
label: "Cutibacterium acnes 16S rRNA mutation conferring resistance to tetracycline"
definition: >-
  Tetracycline binds tightly to the helix 34 domain in 16S rRNA, where it interferes sterically with the binding of aminoacyl-tRNA to the ribosome A site to block protein synthesis. Mutations in the nucleotide sequence in this domain for Cutibacterium acnes can result in resistance against tetracycline.
