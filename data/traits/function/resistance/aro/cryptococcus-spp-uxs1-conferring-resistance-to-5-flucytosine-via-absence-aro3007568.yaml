identifier: ARO:3007568
label: "Cryptococcus spp. UXS1 conferring resistance to 5-flucytosine via absence"
definition: >-
  UXS1 is a UDP-glucuronic acid decarboxylase. Deletion of UXS1 confers resistance to 5-flucytosine by accumulation of UDP-glucoronic acid, thereby suppressing the cellular toxicity of 5-flucytosine.
