identifier: ARO:3003784
label: "Mycobacterium tuberculosis intrinsic murA conferring resistance to fosfomycin"
definition: >-
  Mycobacterium tuberculosis murA confers intrinsic resistance to fosfomycin. The presence of an aspartic acid residue in place of the critical cysteine at position 117 that enables fosfomycin binding is believed to be responsible for this intrinsic resistance.
