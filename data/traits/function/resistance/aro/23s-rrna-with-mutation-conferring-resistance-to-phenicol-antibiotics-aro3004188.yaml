identifier: ARO:3004188
label: "23S rRNA with mutation conferring resistance to phenicol antibiotics"
definition: >-
  Point mutations in the 23S rRNA subunit shown clinically to confer resistance to phenicol class antibiotics, including chloramphenicol and florfenicol, by disrupting antibiotic binding-site affinity.
