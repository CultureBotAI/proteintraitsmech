identifier: ARO:3004379
label: QepA4
definition: >-
  A plasmid-mediated quinolone efflux pump variant described in Escherichia coli. QepA4 confers resistance to quinolone and fluoroquinolone antibiotics by expulsion from the cell. Described by Manageiro et al. 2017.
