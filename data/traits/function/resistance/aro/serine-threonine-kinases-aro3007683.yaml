identifier: ARO:3007683
label: "Serine/threonine kinases"
definition: >-
  The eukaryotic-type Ser/Thr kinase (STKs) IreK (intrinsic resistance of enterococci kinase) belongs to a family of transmembrane kinases defined by the presence of multiple extracellular PASTA (penicillin-binding protein and serine/threonine kinase associated) domains. In prokaryotes, STKs modulate cellular functions such as growth, differentiation, and secondary metabolism. When the external environment changes, prokaryotes rely on signal transduction systems, including STKs that quickly sense these changes and alter gene expression to induce the appropriate metabolic changes.
