identifier: ARO:3007524
label: "Candida spp. ERG11 with mutations conferring resistance to azole antibiotics"
definition: >-
  ERG11 is a cytochrome P450 enzyme in Candida spp. Mutations in ERG11 have been shown to confer resistance to azole antibiotics including fluconazole and itraconazole.
