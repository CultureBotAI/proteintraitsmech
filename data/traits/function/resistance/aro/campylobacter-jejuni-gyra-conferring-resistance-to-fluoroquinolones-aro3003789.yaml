identifier: ARO:3003789
label: "Campylobacter jejuni gyrA conferring resistance to fluoroquinolones"
definition: >-
  Campylobacter jejuni is a major bacterial infectious agent associated with gastroenteritis. Quinolone resistance is reportedly conferred by a single C-257-T nucleotide substitution in the gyrA gene.
