identifier: ARO:3004045
label: "Escherichia coli fabI mutations conferring resistance to isoniazid and triclosan"
definition: >-
  fabI is a enoyl-acyl carrier reductase used in lipid metabolism and fatty acid biosynthesis. The bacterial biocide Triclosan blocks the final reduction step in fatty acid elongation, inhibiting biosynthesis. Point mutations in fabI can confer resistance to Triclosan and Isoniazid.
