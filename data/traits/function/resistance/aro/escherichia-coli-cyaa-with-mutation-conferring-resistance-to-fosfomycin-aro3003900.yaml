identifier: ARO:3003900
label: "Escherichia coli cyaA with mutation conferring resistance to fosfomycin"
definition: >-
  CyaA (adenylate cyclase) is involved with the synthesis of cyclic AMP which regulates the fosfomycin transporter glpT. As a result, mutations to cyaA confer resistance to fosfomycin.
