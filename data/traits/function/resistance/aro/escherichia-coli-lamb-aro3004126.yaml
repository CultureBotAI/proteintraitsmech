identifier: ARO:3004126
label: "Escherichia coli LamB"
definition: >-
  LamB is a negative regulator for antibiotic resistance, it serves as a porin to influx antibiotic. When down-regulated, it increases resistance to chlortetracycline, ciprofloxacin, balofloxacin and nalidixic acid. It also interacts with Odp1, an energy metabolic enzyme, creating a complex that decreases in antibiotic-resistant strains.
