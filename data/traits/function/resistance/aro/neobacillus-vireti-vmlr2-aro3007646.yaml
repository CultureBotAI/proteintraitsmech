  vmlR2 is an ABC-F ATPase ribosomal protection protein from Neobacillus vireti (formerly known as Bacillus vireti). This representative of the ARE2 subfamily has an unusually long linker domain. Confers resistance to some lincosamide and nucleoside antibiotics.
