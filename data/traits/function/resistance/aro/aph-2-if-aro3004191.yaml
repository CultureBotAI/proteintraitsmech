identifier: ARO:3004191
label: "APH(2'')-If"
definition: >-
  Aminoglycoside 2''-phosphotransferase identified from the gram-negative pathogen Campylobacter jejuni. APH(2'')-If was shown to confer resistance to 4,6-disubstituted antibiotics kanamycin, tobramycin, dibekacin, gentamicin and sisomicin through antibiotic phosphorylation. Described by Toth et al. 2013.
