identifier: ARO:3007641
label: "fungal nucleobase transporters"
definition: >-
  Fungal nucleobase transporters facilitate the movement of nucleobases across the fungal cell membrane. The absence confers resistance to antibiotics by preventing antibiotic entry into the cell.
