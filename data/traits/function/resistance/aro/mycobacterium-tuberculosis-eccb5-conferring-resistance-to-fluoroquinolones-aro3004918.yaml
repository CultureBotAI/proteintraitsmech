identifier: ARO:3004918
label: "Mycobacterium tuberculosis eccB5 conferring resistance to fluoroquinolones"
definition: >-
  eccB5 is a transmembrane protein within the ESX-5 secretion system complex. The complex is critical for mycobacterium viability and virulence in the host cell and mutations contribute to a decreased uptake of antibiotic in the outer membrane.
