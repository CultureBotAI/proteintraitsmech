identifier: ARO:3004283
label: "CarO porin"
definition: >-
  The imipenum resistance-associated CarO porin family is composed of the CarO porin originally identified in Acinetobacter baumannii. The loss of these porins is associated with imipenem and meropenem multi-drug resistance. The channels formed by CarO porins show slight cation selectivity.
