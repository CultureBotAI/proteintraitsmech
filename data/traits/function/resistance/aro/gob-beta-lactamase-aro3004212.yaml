identifier: ARO:3004212
label: "GOB beta-lactamase"
definition: >-
  The GOB family of beta-lactamases have been discovered in the Elizabethkingia meningoseptica and are classified as subclass B3 beta-lactamase. They confer resistance to cephalosporins, penicillins, and carbapenems.
