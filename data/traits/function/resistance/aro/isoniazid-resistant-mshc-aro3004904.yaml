identifier: ARO:3004904
label: "isoniazid resistant mshC"
definition: >-
  Mutations that occur on the mshC gene resulting in the inability for isoniazid to function. It catalyzes the ATP-dependent condensation of GlcN-Ins and L-cysteine to form L-Cys-GlcN-Ins.
