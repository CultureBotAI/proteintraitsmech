identifier: ARO:3004063
label: EdeQ
definition: >-
  EdeQ is an N-acetyltransferase enzyme that confers high-level self-resistance to edeine in Brevibacillus brevis, a natural edeine producer. EdeQ converts active edeine to N-acetyledeine, which is ineffective in vivo.
