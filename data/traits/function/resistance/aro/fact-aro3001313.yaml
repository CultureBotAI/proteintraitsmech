identifier: ARO:3001313
label: facT
definition: >-
  Efflux protein facT confers resistance to factumycin. The gene has been heterologously expressed in S. coelicolor and its function confirmed. It is possible that this gene can export other kirromycin-like elfamycins, but this has not been tested.
