identifier: ARO:3007692
label: "Mycobacterium tuberculosis Rv2535c with mutation conferring resistance to bedaquiline"
definition: >-
  These pepQ/Rv2535c mutations increase efflux through the mmpL5-mmpS5 (Rv0676c-Rv0677c) transporter, such as preventing degradation of MmpL5, which leads to reduced susceptibility to bedaquiline and clofazimine.
