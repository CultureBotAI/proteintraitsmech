identifier: ARO:3009149
label: MexMN
definition: >-
  MexMN is a multidrug efflux pump complex consisting of MexM and MexN as its main components. This system acts as a central transport mechanism, partnering with outer membrane proteins to expel antibiotics and toxic compounds, thereby playing a significant role in multidrug resistance.
