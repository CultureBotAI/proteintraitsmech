identifier: ARO:3000771
label: AdeFGH
definition: >-
  AdeFGH is a RND multidrug efflux pump expressed in Acinetobacter baumannii. It confers resistance to fluoroquinolone, tetracycline, tigecycline, chloramphenicol, clindamycin, trimethoprim, and sulfamethoxazole.
