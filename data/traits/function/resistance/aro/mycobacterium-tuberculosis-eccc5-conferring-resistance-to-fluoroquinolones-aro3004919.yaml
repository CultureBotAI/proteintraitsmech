identifier: ARO:3004919
label: "Mycobacterium tuberculosis eccC5 conferring resistance to fluoroquinolones"
definition: >-
  eccC5 is a membrane-bound ATPase within the ESX-5 secretion system complex. The complex is critical for mycobacterium viability and virulence in the host cell and mutations contribute to a decreased uptake of antibiotic in the outer membrane, yet the Relational Sequencing Tuberculosis Data platform (ReSeqTB, https://platform.reseqtb.org) finds no evidence of an association between eccC5 mutations and drug resistance.
