identifier: ARO:3004325
label: MCR-4.1
definition: >-
  MCR-4 is a plasmid-borne phosphoethanolamine transferase variant of MCR-1, isolated from Salmonella enterica serovar Typhimurium of porcine origin in Italy, Spain and Belgium through 2013 and 2015-2016. MCR-4 confers resistance to collistin via addition of a phosphoethanolamine group to lipid A, reducing the negative charge of the cell membrane. Described by Carattoli et al. 2017.
