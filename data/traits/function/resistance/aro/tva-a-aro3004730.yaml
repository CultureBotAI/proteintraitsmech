identifier: ARO:3004730
label: tva(A)
definition: >-
  A pleuromutilin resistance gene encoding a predicted ABC-F transporter. The presence of inhibitory or sub-inhibitory concentrations of tiamulin showed that tva(A) confers reduced pleuromutilin susceptibility that does not lead to clinical resistance but facilitates the development of higher-level resistance via mutations in genes encoding ribosome-associated functions.
