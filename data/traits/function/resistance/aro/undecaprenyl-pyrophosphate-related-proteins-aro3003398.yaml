identifier: ARO:3003398
label: "undecaprenyl pyrophosphate related proteins"
definition: >-
  Undecaprenyl phosphate is a universal lipid carrier of glycan biosynthetic intermediates for carbohydrate polymers that are exported to the bacterial cell envelope. Antibiotics that targets this compound or proteins associated with the production of this compound leads to cell death.
