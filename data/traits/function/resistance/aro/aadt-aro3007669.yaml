identifier: ARO:3007669
label: aadT
definition: >-
  The AadT pump is a novel multidrug efflux pump from the proton antiporter 2 (DHA2) family and was discovered in Acinetobacter multidrug resistance plasmids. The presence of AadT decreased bacterial susceptibility to antibiotics (erythromycin and tetracycline), biocides (chlorhexidine), and dyes (ethidium bromide and DAPI) and was able to mediate ethidium transport.
