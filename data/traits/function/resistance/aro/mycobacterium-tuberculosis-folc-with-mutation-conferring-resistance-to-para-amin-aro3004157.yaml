identifier: ARO:3004157
label: "Mycobacterium tuberculosis folC with mutation conferring resistance to para-aminosalicylic acid"
definition: >-
  Point mutations in the dihydrofolate synthetase folC gene shown clinically to confer resistance to p-aminosalicylic acid or other aminosalicylates. Mutations in folC inhibit bioactivation of PAS and thus confer resistance.
