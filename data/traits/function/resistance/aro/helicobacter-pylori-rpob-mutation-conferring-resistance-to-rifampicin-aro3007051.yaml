identifier: ARO:3007051
label: "Helicobacter pylori rpoB mutation conferring resistance to rifampicin"
definition: >-
  Rifampicin inhibits transcription by binding the beta subunit of RNA polymerase. Helicobacter pylori mutations associated with rifampicin resistance typically occur in the rifampicin resistance determining region of rpoB between codons 525 and 586.
