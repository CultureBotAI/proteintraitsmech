identifier: ARO:3004833
label: "Neisseria gonorrhoeae PBP1 conferring resistance to beta-lactam antibiotics"
definition: >-
  Point mutation in Neisseria gonorrhoea PBP1 (ponA) decreases affinity between beta-lactam antibiotic molecule and PBP1, thereby conferring resistance to beta-lactam antibiotics.
