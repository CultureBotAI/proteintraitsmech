identifier: ARO:3007650
label: CDA-1
definition: >-
  CDA-1 was recovered from a urine sample and is intermediate or resistant to third-generation cephalosporins and carbapenems. Susceptibility testing, isoelectric focusing, and analysis of outer membrane proteins showed that AmpC beta-lactamase expression combined with porin deficiency accounted for the carbapenem resistance.
