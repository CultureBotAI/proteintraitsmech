identifier: ARO:3007642
label: "Aspergillus spp. fcyB conferring resistance to 5-flucytosine via reduced permeability"
definition: >-
  FcyB encodes for purine-cytosine permease in fungal cells. Downregulation or absence of fcyB confers resistance to antibiotics by preventing entry into the cell.
