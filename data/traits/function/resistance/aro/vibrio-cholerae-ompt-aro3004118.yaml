identifier: ARO:3004118
label: "Vibrio cholerae OmpT"
definition: >-
  A ToxR negatively regulated outer membrane porin. In Vibrio cholerae, ToxR controls resistance to P2 (a BPI-derived antimicrobial peptide) by regulating the production of OmpT, especially in the absence of OmpU.
