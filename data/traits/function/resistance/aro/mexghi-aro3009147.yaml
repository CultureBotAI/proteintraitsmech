identifier: ARO:3009147
label: MexGHI
definition: >-
  MexGHI is a multidrug efflux pump complex consisting of MexG, MexH, and MexI as its key components. Together, they form a central transport system that interfaces with outer membrane proteins to remove antibiotics and toxic substances, playing a role in multidrug resistance.
