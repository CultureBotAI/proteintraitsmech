identifier: ARO:3003769
label: "Staphylococcus aureus mprF"
definition: >-
  MprF is a integral membrane protein that modifies the negatively-charged phosphatidylglycerol on the membrane surface. A point mutation in the putative mprF synthase domain is associated with enhanced expression, increased synthesis and reduced daptomycin surface binding. This confers resistance to cationic peptides that disrupt the cell membrane, including defensins.
