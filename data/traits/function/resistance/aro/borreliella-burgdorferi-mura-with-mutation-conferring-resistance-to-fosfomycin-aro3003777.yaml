identifier: ARO:3003777
label: "Borreliella burgdorferi murA with mutation conferring resistance to fosfomycin"
definition: >-
  murA or UDP-N-acetylglucosamine enolpyruvyl transferase catalyses the initial step in peptidoglycan biosynthesis and is inhibited by fosfomycin. Mutations to the murA enzyme confers resistance to the antibiotic.
