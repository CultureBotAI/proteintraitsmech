identifier: ARO:3007187
label: "glycopeptide resistance gene cluster vanP"
definition: >-
  This cluster confers resistance to both vancomycin and teicoplanin by allowing restructuring of peptidoglycan precursors to end in D-Ala-D-Lac. Resistance is acquired after multiple treatments with sub-minimum inhibitory concentrations of vancomycin. Gene orientation: vanHPXRS.
