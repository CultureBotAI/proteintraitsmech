identifier: ARO:3004034
label: tetAB(60)
definition: >-
  tetAB(60) is an ABC transporter that confers resistance to tetracycline and tigercycline identified by screening a human saliva metagenomic library in Escherichia coli. Both tetA(60) and tetB(60) are required for resistance.
