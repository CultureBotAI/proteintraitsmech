identifier: ARO:3004098
label: LpeAB
definition: >-
  LpeAB are components of an efflux pump, which is a macrolide resistance determinant in L. pneumophila Paris strain. Mutations observed in the upstream sequence of lpeAB operon in resistant lineages led to an overexpression of this efflux pump. Sub-inhibitory concentrations of macrolides themselves participated in upregulating this efflux and could constitute a first step in the acquisition of a high macrolide resistance level. As Lpp2879–Lpp2880 is homologous to Escherichia coli AcrAB, lpp2879–lpp2880 was renamed to lpeAB.
