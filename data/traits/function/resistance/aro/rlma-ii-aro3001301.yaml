identifier: ARO:3001301
label: RlmA(II)
definition: >-
  RlmA(II) is a methyltransferase found in Streptococcus pneumoniae and confers resistance to tylosin and mycinamicin. Specifically, this enzyme adds a methyl group to guanosine 748 (E. coli numbering) of 23S ribosomal RNA.
