identifier: ARO:3004137
label: "Antibiotic resistant iniB"
definition: >-
  iniB, an isoniazid-induced protein, is part of the iniBAC operon that participates in the development of tolerance to both isoniazid and ethambutol. May function through a MDR-pump like mechanism, although it does not appear to directly transport isoniazid from the cell.
