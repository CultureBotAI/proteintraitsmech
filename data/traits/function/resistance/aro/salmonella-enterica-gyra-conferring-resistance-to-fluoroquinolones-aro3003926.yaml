identifier: ARO:3003926
label: "Salmonella enterica gyrA conferring resistance to fluoroquinolones"
definition: >-
  Point mutations in Salmonella gyrA that confer resistance to Nalidixic acid, a fluoroquinolone antibiotic. These mutations have also been shown to reduce susceptibility to ciprofloxacin.
