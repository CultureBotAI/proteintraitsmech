  Heterologous expression of Burkholderia pseudomallei Omp38 (BpsOmp38) in Omp-deficient E. coli host cells lowers their permeability and in consequence, their antimicrobial susceptibility to penicillin G, cefoxitin, ceftazidime and imipenem.
