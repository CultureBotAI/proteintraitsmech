identifier: ARO:3004141
label: AxyXY-OprZ
definition: >-
  An RND-type efflux system that confers innate aminoglycoside resistance to Achromobacter spp. It has a transcriptional regulator encoded by the axyZ gene located upstream of axyXY-oprZ. In-frame axyZ gene deletion assay led to increased MICs of antibiotic substrates of the efflux system: aminoglycosides, cefepime, fluoroquinolones, tetracyclines and erythromycin, indicating that the product of axyZ negatively regulates expression of axyXY-oprZ. Moreover a 45 amino-acid substitution at position 29 of AxyZ (V29G) was identified in a clinical Achromobacter strain that occurred during the course of chronic respiratory tract colonization in a cystic fibrosis (CF) patient. This substitution, also detected in 3 other strains exposed in vitro to tobramycin, led to the increase in axyY transcription level (5 to 17-fold) together with the increase in antibiotic resistance level.
