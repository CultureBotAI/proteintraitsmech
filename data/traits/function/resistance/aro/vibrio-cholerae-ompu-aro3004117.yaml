identifier: ARO:3004117
label: "Vibrio cholerae OmpU"
definition: >-
  A ToxR-Regulated outer membrane porin. In Vibrio cholerae, ToxR controls resistance to P2 (a BPI-derived antimicrobial peptide) by regulating the production of OmpU. OmpU also confers resistance to polymyxin B sulfate.
