identifier: ARO:3003685
label: "Pseudomonas aeruginosa parE conferring resistance to fluoroquinolones"
definition: >-
  Point mutation in Pseudomonas aeruginosa parE resulting in sensitivity to fluoroquinolones (ciprofloxacin). In combination with a gyrase mutation (gyrA or gyrB), it confers a high level of resistance to ciprofloxacin.
