identifier: ARO:3007404
label: "ANT(4')-II"
definition: >-
  A family of aminoglycoside 4'-O-nucleotidyltransferase enzymes which inactivate amikacin & tobramycin, but not dibekacin, by catalyzing the transfer of an AMP group from an ATP substrate, thereby conferring resistance to these compounds.
