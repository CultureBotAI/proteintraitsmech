identifier: ARO:3004064
label: "Edeine acetyltransferase"
definition: >-
  Edeine acetyltransferase enzymes catalyze the transfer of an acetyl group to active edeine, converting it to an inactive form in vivo. This mechanism is used for high-level self-resistance in edeine-producing Brevibacillus spp.
