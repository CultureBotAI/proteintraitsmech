identifier: ARO:3003737
label: "Staphylococcus aureus fusE with mutation conferring resistance to fusidic acid"
definition: >-
  The mutations to the rplF gene encoding riboprotein L6 have been shown to cause fusidic acid resistance, demonstrating a potential secondary site of action of the antibiotic that is blocked through these mutations. Several types of mutations have been identified that cause resistance, including SNPs, frameshift mutations and early stop codons.
