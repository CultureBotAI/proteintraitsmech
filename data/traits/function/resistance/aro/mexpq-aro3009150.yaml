identifier: ARO:3009150
label: MexPQ
definition: >-
  MexPQ is a multidrug efflux pump complex comprising MexP and MexQ as its primary components. This system functions as a core transport mechanism, interacting with outer membrane proteins to expel antibiotics and toxic substances, contributing to multidrug resistance.
