identifier: ARO:3004140
label: "hydrolysis of fusidic acid to inactive lactone derivative"
definition: >-
  Enzymes shown to inactivate fusidic acid by hydrolytic cleavage from the 16 beta-position of fusidic acid and its derivatives. This converts fusidic acid to an inactivate lactone derivative, thus conferring resistance to fusidic acid.
definition_source: ARO
