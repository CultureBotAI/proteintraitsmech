identifier: ARO:3009134
label: "antifungal resistance-associated MSH2"
definition: >-
  MSH2 is a mismatch repair gene in fungi. Strains with alterations in this gene exhibit the resistance to Polyenes (Amphotericin B), Echinocandins (Caspofungin, Micafungin), and Azoles (Fluconazole, Voriconazole).
