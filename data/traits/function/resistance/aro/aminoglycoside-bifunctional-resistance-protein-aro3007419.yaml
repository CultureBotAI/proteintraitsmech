label: "aminoglycoside bifunctional resistance protein"
definition: >-
  Bifunctional aminoglycoside-inactivating enzymes composed of two separate functional domains. These proteins possess activity from both enzyme components, thereby conferring resistance to the combination of antibiotics from both domains, and may include acetylation, phosphorylation or nucleotidylation activity.
