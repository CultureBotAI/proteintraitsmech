identifier: ARO:3004364
label: almG
definition: >-
  A member of the AlmEFG operon, responsible for polymyxin resistance in Vibrio cholerae. AlmG is a glycyltransferase closely related to lipid A acyltransferases. Described by Henderson JC et al. 2017.
