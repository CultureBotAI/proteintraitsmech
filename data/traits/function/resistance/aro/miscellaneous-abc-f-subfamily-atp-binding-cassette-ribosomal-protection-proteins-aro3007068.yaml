identifier: ARO:3007068
label: "Miscellaneous ABC-F subfamily ATP-binding cassette ribosomal protection proteins"
definition: >-
  ABC-F subfamily ATP-binding cassette ribosomal protection proteins of unknown, unclear or miscellaneous classification which nevertheless confer resistance to antibiotics through ribosomal protection and not through antibiotic efflux. These proteins should be further reviewed to elucidate associated genes, their function, origin and classification.
