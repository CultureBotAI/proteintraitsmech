identifier: ARO:3004124
label: "Moraxella catarrhalis M35"
definition: >-
  The outer membrane protein M35 of Moraxella catarrhalis is an antigenically conserved porin. Down-regulation of M35 significantly increases the MICs of aminopenicillins, specifically amoxicillin.
