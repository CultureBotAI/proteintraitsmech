identifier: ARO:3009144
label: MexAB
definition: >-
  MexAB is a multidrug efflux pump complex consisting of Mex A and Mex B, two primary components. Forming the core transport machinery that can interface with various outer membrane proteins to expel antibiotics and toxic compounds, contributing to multidrug resistance. This component can be paired with OprM.
