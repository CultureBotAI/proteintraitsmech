label: CMY-108
definition: >-
  CMY-108 is a beta-lactamase present in plasmids of clinical Escherichia coli from humans and companion animals in the upper Midwestern USA . Name originally from the historical Lahey list of beta-lactamases, some of which did not include sequence data.
