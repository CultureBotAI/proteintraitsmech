identifier: ARO:3009145
label: MexCD
definition: >-
  MexCD is a multidrug efflux pump complex composed of Mex C and Mex D as its primary components. This system forms the central transport mechanism, capable of interacting with diverse outer membrane proteins to eject antibiotics and toxic substances, thus playing a significant role in multidrug resistance.
