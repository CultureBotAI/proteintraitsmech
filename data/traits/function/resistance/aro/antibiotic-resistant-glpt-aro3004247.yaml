identifier: ARO:3004247
label: "antibiotic-resistant GlpT"
definition: >-
  Fosfomycin is transported bacterial cells through transporters, one of them being glycerol-3-phosphate, which is encoded by the GlpT gene. Mutations in the GlpT gene can confer resistance to fosfomycin.
