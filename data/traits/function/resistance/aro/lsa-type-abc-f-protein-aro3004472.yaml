identifier: ARO:3004472
label: "lsa-type ABC-F protein"
definition: >-
  A subgroup of the ABC-F protein subfamily of ATP-binding cassette proteins. lsa-type ABC-F proteins confer resistance to streptogramin, lincosamide and pleuromutilin antibiotics through antibiotic target protection of the ribosome.
