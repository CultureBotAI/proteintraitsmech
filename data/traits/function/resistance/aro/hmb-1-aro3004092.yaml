identifier: ARO:3004092
label: HMB-1
definition: >-
  Shotgun cloning of beta-lactam resistant P. aeruginosa NRZ-03096 yielded a clone producing a novel subclass B1 enzyme with only 74.3% identity to the next nearest relative, KHM-1. The novel MBL was named HMB-1 (for Hamburg MBL). HMB-1 gene was chromosomally located as part of a Tn 3 family transposon that was named Tn 6345, where expression of bla HMB-1 in E. coli TOP10 led to increased resistance to beta-lactams.
