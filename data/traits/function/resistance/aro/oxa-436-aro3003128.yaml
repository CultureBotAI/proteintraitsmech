identifier: ARO:3003128
label: OXA-436
definition: >-
  An OXA-48-like plasmid-encoded beta-lactamase shown to confer resistance to carbapenems through hydrolysis. Identified in multiple Enterobacteriaceae isolates from several patients in Denmark. Beta-lactamase activity against carbapenems and penicillins but little to no activity against cephalosporin antibiotics. Described by Samuelsen et al. 2017.
