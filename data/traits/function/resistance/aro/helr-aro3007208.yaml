identifier: ARO:3007208
label: HelR
definition: >-
  HelR is a helicase-like protein that confers resistance to rifamycins by displacing them from the RNA polymerase complex. The protein forces the antibiotic away from the polymerase by binding in its place. It then ejects itself from the complex, allowing the polymerase to resume normal function.
