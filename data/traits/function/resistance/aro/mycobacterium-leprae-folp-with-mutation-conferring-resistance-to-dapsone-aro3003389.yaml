identifier: ARO:3003389
label: "Mycobacterium leprae folP with mutation conferring resistance to dapsone"
definition: >-
  Dapsone inhibits bacterial synthesis of dihydrofolic acid by competing with with para-aminobenzoate for the active site of dihydropteroate synthetase. Point mutation within the Mycobacterium leprae folP gene results in lowered affinity of dapsone for folP.
