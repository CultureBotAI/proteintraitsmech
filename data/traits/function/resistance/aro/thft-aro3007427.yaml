label: ThfT
definition: >-
  ThfT is an ECF transporter S component that expands the substrate profile of endogenous ECF transporters to include folate biosynthesis end products. It confers resistance to the folate synthesis inhibitor sulfamethoxazole by allowing uptake of host folate.
