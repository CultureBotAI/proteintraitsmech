identifier: ARO:3004194
label: MCR-1.2
definition: >-
  A plasmid-borne novel MCR-1 functional variant detected in a Klebsiella pneumoniae isolate collected from a rectal swab in Italy. MCR-1.2 differs from MCR-1 by a single amino acid substitution from Glutamine to Leucine at position 3 in the N-terminal region. Described by DiPilato et al. 2016.
