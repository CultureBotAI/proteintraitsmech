label: "daptomycin-resistant beta-subunit of RNA polymerase (rpoB)"
definition: >-
  Daptomycin-resistant RNA polymerases include amino acids substitutions which alter expression of the dlt operon, which increases the cell surface positive charge. Known from S. aureus.
