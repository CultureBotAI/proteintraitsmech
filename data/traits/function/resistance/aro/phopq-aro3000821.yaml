identifier: ARO:3000821
label: phoPQ
definition: >-
  PhoPQ is a two-component regulatory system. phoP is phosphorylated by phoQ at a low [mg2+], activating the repressor. Its part of a two component regulating system that activates the PmrA/B system which has downstream effects, leading to Antimicrobial resistance in many pathogens. In Salmonella, phoP bind to macAB ABC transporter and represses it. In Escherichia coli, phoPQ regulates arnA expression. In Pseudomonas aeruginosa, phoPQ regulates OprH expression. phoPQ have other roles in other species.
