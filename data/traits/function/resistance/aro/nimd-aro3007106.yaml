identifier: ARO:3007106
label: nimD
definition: >-
  nimD is a nitroimidazole reductase mainly found in Bacteroides fragilis that is associated with the deactivation of nitroimidazole antibiotics such as metronidazole. Minimum inhibitory concentrations observed in isolates vary greatly depending on species, strain, and nitroimidazole treatment.
