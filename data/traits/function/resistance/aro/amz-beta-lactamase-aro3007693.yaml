identifier: ARO:3007693
label: "AMZ beta-lactamase"
definition: >-
  The AMZ genes showed resistance against some beta-lactam antibiotics, including amoxicillin and cephalothin, and the beta-lactamase AMZ-1 exhibited a similar substrate spectrum response. Similar to other AmpC beta-lactamases, AMZ-1 is strongly inhibited by avibactam but much less strongly inhibited by tazobactam.
