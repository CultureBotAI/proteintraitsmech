identifier: ARO:3003937
label: "Neisseria meningititis PBP2 conferring resistance to beta-lactam"
definition: >-
  Point mutation in Neisseria meningititis PBP2 (penA) decreases affinity between beta-lactam antibiotic molecule and PBP2, thereby conferring resistance to beta-lactam.
