identifier: ARO:3002876
label: "ethambutol resistant aftA"
definition: >-
  Arabinofuranosyltransferases allow for the polymerization of arabinose to form arabinan. Arabinan is required for formation of mycobacterial cell walls and arabinosyltransferases are targets of the drug ethambutol. Mutations in these genes can confer resistance to ethambutol.
definition_source: ARO
trait_axis: FUNCTION
trait_category: FUNC_RESISTANCE
term_kind: CLASS
