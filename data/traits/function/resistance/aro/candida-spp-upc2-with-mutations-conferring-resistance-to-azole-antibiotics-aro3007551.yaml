label: "Candida spp. Upc2 with mutations conferring resistance to azole antibiotics"
definition: >-
  Upc2 is a sterol synthesis regulatory element binding protein in Candida spp. Mutations in Upc2 have been shown to confer resistance to azole antibiotics including fluconazole by upregulating ERG11 expression.
