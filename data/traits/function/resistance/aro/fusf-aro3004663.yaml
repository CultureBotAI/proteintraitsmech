identifier: ARO:3004663
label: FusF
definition: >-
  A fusidic acid resistance determinant in Staphylococcus cohnii. This protein behaves akin to FusB as it is a FusB-type protein. It mediates dissociation of EF-G from the ribosome thus counteracting the action of Fusidic acid.
