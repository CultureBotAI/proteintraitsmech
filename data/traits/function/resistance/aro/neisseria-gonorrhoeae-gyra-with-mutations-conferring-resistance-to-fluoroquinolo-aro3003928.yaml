identifier: ARO:3003928
label: "Neisseria gonorrhoeae gyrA with mutations conferring resistance to fluoroquinolones"
definition: >-
  Point mutation in Neisseria gonorrhoeae DNA gyrase subunit A. Decreases affinity between fluoroquinolone antibiotic molecule and gyrA, thereby conferring resistance to fluoroquinolone.
