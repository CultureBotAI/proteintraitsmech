identifier: ARO:3000831
label: CpxR
definition: >-
  CpxR is a regulator that promotes acrD expression when phosphorylated by a cascade involving CpxA, a sensor kinase. CpxR is also directly involved in activation of expression of RND efflux pump MexAB-OprM in P. aeruginosa. CpxR is required to enhance mexAB-oprM expression and drug resistance, in the absence of repressor MexR.
