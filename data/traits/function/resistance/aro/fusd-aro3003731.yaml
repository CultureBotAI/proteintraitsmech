identifier: ARO:3003731
label: fusD
definition: >-
  A specific fusidic acid resistance gene conferring intrinsic resistance in the bacteria Staphylococcus saprophyticus. FusD behaves by causing dissociation of EF-G from the ribosome thus counteracting the action of Fusidic acid. It is considered a FusB-type protein.
