identifier: ARO:3003393
label: "Mycobacterium tuberculosis inhA mutations conferring resistance to isoniazid"
definition: >-
  inhA is a enoyl-acyl carrier reductase used in lipid metabolism and farry acid biosynthesis. It is inhibited by isoniazid. mutations in the promoter region or multiple copies of the inhA shows marked resistance to isoniazid mediated inhibition of mycolic acid biosynthesis.
