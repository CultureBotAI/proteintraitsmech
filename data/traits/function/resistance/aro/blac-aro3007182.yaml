identifier: ARO:3007182
label: blaC
definition: >-
  blaC is a broad-spectrum class A beta-lactamase coded in the chromosome of Mycobacterium tuberculosis. It has been shown to hydrolyze a large number of beta-lactam antibiotics and is a major obstacle in the treatment of tuberculosis with such drugs.
