identifier: ARO:3003797
label: "Enterococcus faecalis YybT with mutation conferring daptomycin resistance"
definition: >-
  YybT has phosphodiesterase activity towards cyclic dinucleotides using a c-di-GMP hydrolyzing phosphodiesterase domain. Mutations to the gene confer resistance to daptomycin.
