identifier: ARO:3007407
label: "ANT(3'')-I"
definition: >-
  A family of aminoglycoside O-nucleotidyltransferase enzymes which inactivate streptomycin and spectinomycin by catalyzing the transfer of an AMP group from an ATP substrate, thereby conferring resistance to these compounds. These enzymes modify the 3''-hydroxyl position of streptomycin and the 9-hydroxyl position of spectinomycin.
