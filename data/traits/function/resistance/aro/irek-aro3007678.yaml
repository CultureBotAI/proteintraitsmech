identifier: ARO:3007678
label: IreK
definition: >-
  E. faecalis IreK maintains cell wall integrity, possibly by regulating peptidoglycan biosynthesis and metabolism. Antibiotic-induced cell wall stress leads to activation of IreK-mediated phosphorylation signaling pathways to mitigate and repair the damage. Absence of IreK leads to cell envelope defects and increased susceptibility to a variety of cephalosporins, including ceftriaxone. Increased IreK phosphorylation in response to ceftriaxone treatment has been shown to correlate with antimicrobial resistance.
