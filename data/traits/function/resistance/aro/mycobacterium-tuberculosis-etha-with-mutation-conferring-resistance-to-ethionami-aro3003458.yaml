identifier: ARO:3003458
label: "Mycobacterium tuberculosis ethA with mutation conferring resistance to ethionamide"
definition: >-
  Mycobacterium tuberculosis ethA (Rv3854c) is a mono-oxygenase enzyme which activates the antibiotic ethionamide in vivo. Mutations in ethA confer resistance to ethionamide by modulating the activation and activity of the ethionamide prodrug.
