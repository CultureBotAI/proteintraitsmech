identifier: ARO:3007665
label: "Candida spp. FCY2 conferring resistance to 5-flucytosine via reduced permeability"
definition: >-
  FCY2 encodes for purine-cytosine permease in fungal cells. Downregulation or absence of FCY2 confers resistance to antibiotics by preventing entry into the cell.
