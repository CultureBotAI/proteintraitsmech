identifier: ARO:3003889
label: "Escherichia coli GlpT with mutation conferring resistance to fosfomycin"
definition: >-
  Point mutations to the active importer GlpT, which is involved with the uptake of many phosphorylated sugars, confer resistance to fosfomycin by reducing import of the drug into the bacteria.
