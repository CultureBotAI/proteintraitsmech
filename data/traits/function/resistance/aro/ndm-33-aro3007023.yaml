identifier: ARO:3007023
label: NDM-33
definition: >-
  NDM-33 confers resistance to all beta-lactam antibiotics except aztreonam. It was first identified in an E. coli strain isolated from hospital sewage. It differs from NDM-5 by a single amino acid substitution (A72T).
