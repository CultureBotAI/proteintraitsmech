identifier: ARO:3000769
label: PatA-PatB
definition: >-
  PatA-PatB is an efflux protein complex that is associated with fluoroquinolone resistance in Streptococcus pneumoniae. Experiments indicate that PatA and PatB form a heterodimeric transporter.
