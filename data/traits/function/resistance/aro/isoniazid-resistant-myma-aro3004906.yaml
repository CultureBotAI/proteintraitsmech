identifier: ARO:3004906
label: "isoniazid resistant mymA"
definition: >-
  mymA is an operon that begins at Rv3083 and ends at Rv3089 and is required for maintaining the appropriate mycolic acid composition and permeability of the envelope on its exposure to acidic pH. It has shown to be resistant to isoniazid.
