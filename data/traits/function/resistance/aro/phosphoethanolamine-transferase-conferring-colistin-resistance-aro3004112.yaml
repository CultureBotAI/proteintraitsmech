identifier: ARO:3004112
label: "phosphoethanolamine transferase conferring colistin resistance"
definition: >-
  This group of enzymes catalyzes the addition of a phosphoethanolamine group to another molecule. The addition of this moiety to lipid A in bacterial species is often associated with polymyxin (otherwise known as colistin) resistance.
