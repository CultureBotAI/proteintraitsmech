identifier: ARO:3000798
label: MexEF-OprN
definition: >-
  MexEF-OprN is a multidrug efflux protein expressed in the Gram-negative Pseudomonas aeruginosa. MexE is the membrane fusion protein; MexF is the inner membrane transporter; and OprN is the outer membrane channel. MexEF-OprN is associated with resistance to fluoroquinolones, chloramphenicol, and trimethoprim. Regulation of mexEF-oprN operon expression is multifaceted with the MexT activator being one of the most prominent regulatory proteins. MexEF-OprN is the only positively regulated RND pump of P. aeruginosa.
