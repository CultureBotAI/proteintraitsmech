identifier: ARO:3004890
label: "ethionamide resistant mshC"
definition: >-
  Mutations that occur in mshC which is involved in the third step of mycothiol biosynthesis. It catalyzes the ATP-dependent condensation of GlcN-Ins and L-cysteine to form L-Cys-GlcN-Ins. The gene exhibits resistance to ethionamide.
