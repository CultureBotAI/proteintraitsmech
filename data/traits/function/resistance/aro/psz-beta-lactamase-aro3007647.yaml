identifier: ARO:3007647
label: "PSZ beta-lactamase"
definition: >-
  PSZ beta-lactamases are a novel AmpC enzyme gene family, which was found on a strain of Pantoea endophytica isolated from a rabbit in a livestock farm in China. It shows resistance to penicillins and several cephalosporins, and shares the highest amino acid similarity with the function-characterized AmpC enzyme ERH-1.
