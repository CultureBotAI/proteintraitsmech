identifier: ARO:3003392
label: "Mycobacterium tuberculosis katG mutations conferring resistance to isoniazid"
definition: >-
  katG is a catalase-peroxidase that catalyzes the activation of isoniazid. Isoniazid inhibits mycolic acid synthesis, which prevents cell wall synthesis in mycobacteria. Mutations in katG results in inability to activate isoniazid. Over 280 different mutations have been documented in PubMed for katG, with mutations to Ser315 being the most prevalent.
