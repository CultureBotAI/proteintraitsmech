identifier: ARO:3007637
label: "Clostridioides difficile cplR"
definition: >-
  CplR is an ABC-F ATPase ribosomal protection protein from Clostridioides difficile which confers resistance to pleuromutilins and lincosamides. Its resistance to these antibiotics increases in synergy with erythromcyin resistance methylases (e.g., ermB).
