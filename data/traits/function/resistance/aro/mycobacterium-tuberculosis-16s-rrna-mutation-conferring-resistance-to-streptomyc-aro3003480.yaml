identifier: ARO:3003480
label: "Mycobacterium tuberculosis 16S rRNA mutation conferring resistance to streptomycin"
definition: >-
  Point mutations within the 530 loop of the 16S rRNA of Mycobacterium tuberculosis can result in resistance against streptomycin. These mutations do not directly inhibit the binding of streptomycin, but is hypothesized that they interfere with conformational perturbations that account for streptomycin's action on the ribosome.
