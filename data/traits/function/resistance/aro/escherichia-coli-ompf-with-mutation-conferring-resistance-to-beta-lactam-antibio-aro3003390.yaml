identifier: ARO:3003390
label: "Escherichia coli ompF with mutation conferring resistance to beta-lactam antibiotics"
definition: >-
  The Escherichia coli ompF (oprF) is a nonspecific porin channel involved in the membrane translocation of small hydrophilic molecules, including and especially beta-lactam antibiotics. Mutations in ompF can decrease diffusion of antibiotics across the cellular membrane, thereby decreasing overall susceptibility through absence of porin function.
