identifier: ARO:3007706
label: "OXA-213-like beta-lactamase"
definition: >-
  OXA-213-like enzymes have been identified to be intrinsic to A. calcoaceticus and have been subsequently detected in A. pittii. Phylogenetic analysis of OXA-213-like proteins identified two distinct subgroups within the OXA family. The first group was linked to A. pittii and the second group to A. calcoaceticus. The carbapenemase activity of these OXAs may be related to the species-dependent effect.
