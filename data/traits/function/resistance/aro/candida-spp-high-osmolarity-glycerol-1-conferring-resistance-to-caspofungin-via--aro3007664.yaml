label: "Candida spp. High Osmolarity Glycerol 1 conferring resistance to caspofungin via absence"
definition: >-
  Hog1 is a stress-activated protein kinase. Deletion of Hog1 confers resistance to caspofungin through increase in exposed chitin levels in the cell wall.
