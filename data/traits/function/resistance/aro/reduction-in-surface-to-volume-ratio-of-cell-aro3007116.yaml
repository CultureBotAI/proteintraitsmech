identifier: ARO:3007116
label: "Reduction in surface-to-volume ratio of cell"
definition: >-
  Changes to cell morphology by activated growth response in the presence of an antibiotic, leading to a decreased surface-to-volume ratio. Such changes decrease antibiotic influx and increase antibiotic dilution in the cell, thereby increasing survivability, particularly in nutrient-poor environments.
