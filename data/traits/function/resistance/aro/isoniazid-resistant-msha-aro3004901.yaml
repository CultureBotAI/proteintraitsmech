identifier: ARO:3004901
label: "isoniazid resistant mshA"
definition: >-
  mshA is a glycosyltransferase and is involved in the first step of mycothiol biosynthesis. This is a step that is required for growth in mycobacterium tuberculosis. Resistance has been shown in the gene to isoniazid.
