identifier: ARO:3007694
label: AMZ-1
definition: >-
  Achromobacter mucicolens Y3, isolated from a goose on a farm in Wenzhou, showed resistance to multiple antibiotics, including penicillins and cephalosporins. AMZ-1 showed resistance to amoxicillin, penicillin G, ampicillin, cephalothin and cefoxitin, and the resistance activity could be inhibited by beta-lactamase inhibitors.
