identifier: ARO:3007563
label: "Candida spp. TAC1 with mutations conferring resistance to azole antibiotics"
definition: >-
  TAC1 is a Zn2Cys6 transcription factor that transcriptionally activates efflux units CDR1 and CDR2. Mutations in TAC1 upregulate CDR1 and CDR2 causing increased resistance.
