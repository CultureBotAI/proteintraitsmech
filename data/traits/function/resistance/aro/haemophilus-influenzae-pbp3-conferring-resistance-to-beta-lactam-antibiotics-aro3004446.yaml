identifier: ARO:3004446
label: "Haemophilus influenzae PBP3 conferring resistance to beta-lactam antibiotics"
definition: >-
  PBP3 is a penicillin-binding protein and beta-lactam resistance enzyme encoded by the ftsI gene in Haemophilus influenzae. Mutations in ftsI confer resistance to beta-lactam antibiotics.
