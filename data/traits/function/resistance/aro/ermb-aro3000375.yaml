causal_graphs:
  - graph_id: resistance
    title: How ErmB confers MLSB resistance by target alteration (determinant → mechanism → phenotype)
    description: >-
      Resistance-causation graph for the ErmB determinant — a THIRD mechanism type:
      antibiotic **target alteration**. ErmB is a 23S rRNA methyltransferase that
      dimethylates adenine A2058 in the 23S rRNA of the large ribosomal subunit
      (using S-adenosyl-L-methionine as methyl donor); the methylated ribosome no
      longer binds macrolide/lincosamide/streptogramin-B antibiotics, giving the
      MLSB phenotype. Unlike inactivation (GOB-10 destroys the drug) or efflux
      (MdfA expels it), here the drug's **target** is chemically modified.
