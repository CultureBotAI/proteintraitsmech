      - node_id: ermb
        label: ErmB (23S rRNA methyltransferase determinant)
        node_type: PROTEIN
        grounding: ARO:3000375
      - node_id: erm_family
        label: Erm 23S ribosomal RNA methyltransferase family
        node_type: PROTEIN
        grounding: ARO:3000560
