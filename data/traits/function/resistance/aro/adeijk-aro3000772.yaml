identifier: ARO:3000772
label: AdeIJK
definition: >-
  AdeIJK is a RND multidrug efflux pump expressed in Acinetobacter baumannii. It contributes to resistance for beta-lactams, chloramphenicol, tetracycline, erythromycin, lincosamides, fluoroquinolone, fusidic acid, novobiocin, rifampicin, trimethoprim, acridine, pyronine, and safranin.
