identifier: ARO:3009153
label: MexHI-OpmD
definition: >-
  MexHI-OpmD is a multidrug efflux protein expressed in the Gram-negative Pseudomonas aeruginosa. MexH is the membrane fusion protein, MexI is the inner membrane resistance-nodulation-cell division (RND) transporter, and OpmD is the outer membrane factor protein.
