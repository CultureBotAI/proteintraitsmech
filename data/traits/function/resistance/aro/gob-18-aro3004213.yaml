identifier: ARO:3004213
label: GOB-18
definition: >-
  GOB-18 is a member of subclass B3 GOB family of beta-lactamases isolated from Elizabethkingia meningoseptica. GOB-18 is unlike other subclass B3 beta-lactamases as it is fully active against a broad range of beta-lactam substrates using a single Zn(II) ion in its active site.
