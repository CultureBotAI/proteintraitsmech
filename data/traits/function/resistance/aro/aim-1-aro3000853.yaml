identifier: ARO:3000853
label: AIM-1
definition: >-
  AIM-1 is an Ambler class B beta-lactamase that hydrolyzes most beta-lactams except aztreonam and ceftazidime. It was isolated from Pseudomonas aeruginosa and was the first subclass B3 mobile-elements encoded beta-lactamase discovered.
