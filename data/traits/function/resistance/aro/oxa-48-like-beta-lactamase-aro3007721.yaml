identifier: ARO:3007721
label: "OXA-48-like beta-lactamase"
definition: >-
  OXA-48-type beta-lactamases are now routinely encountered in bacterial infections caused by carbapenam-resistant Enterobacterales. OXA-48-like proteins confer resistance to penicillin (which is efficiently hydrolyzed) and carbapenam antibiotics (which is more slowly broken down). The spectrum of activity of these variants varies, with some hydrolyzing expanded-spectrum oxyimino-cephalosporins.
