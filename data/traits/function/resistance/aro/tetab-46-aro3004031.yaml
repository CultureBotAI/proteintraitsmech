identifier: ARO:3004031
label: tetAB(46)
definition: >-
  tetAB(46) is a heterodimeric ABC transporter conferring tetracycline resistance in Streptococcus australis isolated from the oral cavity. Both tetA(46) and tetB(46) genes are required for resistance.
