identifier: ARO:3004378
label: QepA3
definition: >-
  A plasmid-mediate quinolone efflux pump described in Klebsiella aerogenes and Escherichia coli. QepA3 confers resistance to fluoroquinolone antibiotics by expelling the antibiotic molecules from the cell. This is distinct from the usual chromosomal mutation mechanism of quinolone resistance. Described by Wang et al. 2017.
