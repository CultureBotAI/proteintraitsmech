identifier: ARO:3007410
label: "APH(3')-IV"
definition: >-
  A family of aminoglycoside 3'-O-phosphotransferase enzymes which inactivate kanamycin, neomycin, paromomycin, ribostamycin and butirosin by catalyzing the ATP-dependent phosphorylation of these antibiotics, thereby conferring resistance to these compounds.
