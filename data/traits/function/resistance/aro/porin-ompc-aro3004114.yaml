identifier: ARO:3004114
label: "porin OmpC"
definition: >-
  In the presence of antibiotic stress, there is a coupled down-regulation of the porin OmpC with the OmpF. Mutants both lacking both OmpC and OmpF proteins are resistant to cephaloridine and cefazolin. Analyses of genes involved in the increased resistance to tetracycline suggest that the up-regulation of efflux pump genes is accompanied by a decrease of OmpF and OmpC synthesis. Homologs of OmpC have been identified in Escherichia coli, Salmonella enterica, Klebsiella aerogenes and Serratia marcescens.
