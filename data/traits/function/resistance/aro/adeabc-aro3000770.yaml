identifier: ARO:3000770
label: AdeABC
definition: >-
  AdeABC is an RND multidrug efflux system in Acinetobacter species, notably A. baunmannii. AdeA is a membrane fusion protein, AdeB is the inner membrane transporter, and AdeC is the outer membrane factor. It confers resistance to tigecycline.
