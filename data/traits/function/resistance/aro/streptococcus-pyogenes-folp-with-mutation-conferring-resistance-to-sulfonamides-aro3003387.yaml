identifier: ARO:3003387
label: "Streptococcus pyogenes folP with mutation conferring resistance to sulfonamides"
definition: >-
  Point mutations in Streptococcus pyogenes dihydropteroate synthase folP prevent sulfonamide antibiotics from inhibiting its role in folate synthesis, thus conferring sulfonamide resistance.
