label: "antibiotic resistant Rv2535c"
definition: >-
  Rv2535c or pepQ encodes a putative Xaa-Pro aminopeptidase and is a new genetic determinant of low-level bedaquiline and clofazimine cross-resistance in Mycobacterium tuberculosis when mutated.
