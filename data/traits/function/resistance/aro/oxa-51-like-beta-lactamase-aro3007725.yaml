identifier: ARO:3007725
label: "OXA-51-like beta-lactamase"
definition: >-
  The maximum number of blaOXA belonged to the OXA-51-like subfamily. An earlier study had reported that OXA-51-like enzymes were present exclusively in A. baumannii. Similar to most of the other OXA-type carbapenemases, the OXA-51-like enzymes show weak carbapenemase activity; however, the presence of the insertion sequence ISAba1 upstream of the blaOXA-51-like gene may provide a promoter that allows the overproduction of carbapenemase, and this results in carbapenem resistance.
