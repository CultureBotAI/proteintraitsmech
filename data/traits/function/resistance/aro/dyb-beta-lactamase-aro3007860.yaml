identifier: ARO:3007860
label: "DYB beta-lactamase"
definition: >-
  DYB is a family of subclass B1 metallo-beta-lactamases identified from Dysgonomonas capnocytophagoides. These enzymes confer resistance to beta-lactam antibiotics, including carbapenems.
