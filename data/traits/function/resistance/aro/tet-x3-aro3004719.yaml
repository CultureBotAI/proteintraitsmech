identifier: ARO:3004719
label: tet(X3)
definition: >-
  A tetracyline resistance gene located on an approximately 300-kb plasmid, designated p47AB. It inactivates all tetracyclines, including tigecycline, eravacycline, and omadacycline.Adjacent to insertion sequence ISVsa3 on the conjugative plasmid.
