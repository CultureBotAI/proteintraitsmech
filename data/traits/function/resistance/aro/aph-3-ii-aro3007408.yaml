identifier: ARO:3007408
label: "APH(3')-II"
definition: >-
  A family of aminoglycoside 3'-O-phosphotransferase enzymes which inactivate kanamycin, neomycin, paromomycin and butirosin by catalyzing the ATP-dependent phosphorylation of these antibiotics, thereby conferring resistance to these compounds.
