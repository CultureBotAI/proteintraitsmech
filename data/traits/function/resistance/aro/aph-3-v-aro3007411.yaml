label: "APH(3')-V"
definition: >-
  A family of aminoglycoside 3'-O-phosphotransferase enzymes which inactivate neomycin, paromomycin and ribostamycin by catalyzing the ATP-dependent phosphorylation of these antibiotics, thereby conferring resistance to these compounds.
