identifier: ARO:3004139
label: MCR-3.1
definition: >-
  MCR-3 is a plasmid-borne phosphoethanolamine transferase that interferes with binding of colistin to the cell membrane via addition of phosphoethanolamine to lipid A, resulting reduction in negative charge of the cell membrane. Originally described by Yin et al. 2017, from a porcine Escherichia coli plasmid pWJ1.
