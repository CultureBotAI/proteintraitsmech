identifier: ARO:3004206
label: "SIM beta-lactamase"
definition: >-
  SIM beta-lactamases are Class B beta-lactamases that are capable of hydrolyzing a wide variety of beta-lactams, including penicillins, narrow- to expanded-spectrum cephalosporins, and carbapenem. The SIM family of beta-lactamases appear to be transferable through integrons.
