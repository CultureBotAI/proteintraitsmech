identifier: ARO:3009148
label: MexJK
definition: >-
  The MexJK efflux pump system in Pseudomonas aeruginosa is unique in that it can function independently of an outer membrane protein (OMP), distinguishing it from many other efflux systems. MexJK is a multidrug efflux pump complex composed of MexJ and MexK as its primary components. This system serves as a core transport mechanism, working with outer membrane proteins to expel antibiotics and harmful compounds, thereby contributing to multidrug resistance.
