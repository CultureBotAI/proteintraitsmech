identifier: ARO:3003198
label: rmtH
definition: >-
  rmtH is a 16s ribosomal RNA methyltransferase found in Klebsiella pneumoniae strain MRSN2404 that was isolated from the chronic wound of a soldier wounded in Iraq in 2006. It confers high resistance to aminoglycosides.
