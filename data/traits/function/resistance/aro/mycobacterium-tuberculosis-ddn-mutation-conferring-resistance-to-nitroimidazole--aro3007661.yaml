label: "Mycobacterium tuberculosis ddn mutation conferring resistance to nitroimidazole antibiotics"
definition: >-
  ddn is a protein-coding gene involved in the bioreductive activation of bicyclic 4-nitroimidazole prodrugs such as PA-824 and delamanid developed for anti-tuberculosis therapy against both replicating and persistent bacteria.
