identifier: ARO:3007797
label: "ampR transcriptional regulator with mutation conferring resistance to monobactam antibiotics"
definition: >-
  ampR is a LysR-type transcriptional regulator for beta-lactamase-encoding gene expression. Mutations in ampR of certain organisms have been shown to confer resistance to antibiotics due to beta-lactamase overexpression.
