identifier: ARO:3004470
label: poxtA
definition: >-
  PoxtA is an ABC-F subfamily ATP-binding cassette protein that confers resistance to tetracycline, -phenicol, and oxazolidinone via modification of the bacterial ribosome. The encoding gene was isolated from a methicillin-resistant Staphylococcus aureus strain.
