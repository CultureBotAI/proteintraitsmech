identifier: ARO:3004721
label: "Mycobacterium tuberculosis rpsA mutations conferring resistance to pyrazinamide"
definition: >-
  RpsA, the 30S ribosomal protein S1 of Mycobacterium tuberculosis, is involved in trans-translation and is targeted by pyrazinonic acid, the active form of the antibiotic pyrazinamide, which disrupts the initiation of mRNA translation. Mutations in the amino acid sequence of rpsA can confer resistance to pyrazinamide maintaining rpsA function.
