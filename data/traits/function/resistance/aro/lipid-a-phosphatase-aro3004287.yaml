identifier: ARO:3004287
label: "lipid A phosphatase"
definition: >-
  The antimicrobial activity of certain antibiotics, such as peptide antibiotics, is proposed to be initiated through binding to the lipid A moiety of lipopolysaccharides. Thus, covalent modification of Gram-negative bacterial lipid A by phosphatases is a mechanism to reduce the susceptibility of the bacteria to antibiotics.
