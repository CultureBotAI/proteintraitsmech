identifier: ARO:3004062
label: "MexCD-OprJ with type B NfxB mutation"
definition: >-
  MexCD-OprJ with Type B NfxB mutions are more resistant to tetracycline and chloramphenicol, as well as ofloxacin, erythromycin, and the new zwitterionic cephems, than was PAO1, and they are four to eight times more susceptible to carbenicillin, sulbenicillin, imipenem, panipenem, biapenem, moxalactam, aztreonam, gentamicin, and kanamycin than PAO1.
