identifier: ARO:3003211
label: "16S rRNA with mutation conferring antibiotic resistance"
definition: >-
  Many antibiotics inhibit the growth of bacteria by blocking protein synthesis on the ribosome. The antibiotic-binding sites are located within functionally important structures in the ribosomal RNA. Antibiotic resistance is often conferred by base substitutions or methylations at these sites in the rRNA. Point mutations in the bacterial 16S ribosomal RNA in the small 30S subunit can confer resistance to antibiotics.
