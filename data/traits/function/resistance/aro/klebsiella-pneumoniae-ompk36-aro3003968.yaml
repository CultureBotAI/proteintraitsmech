identifier: ARO:3003968
label: "Klebsiella pneumoniae OmpK36"
definition: >-
  Klebsiella pneumoniae outer membrane porin protein. In beta-lactam-resistant Klebsiella, this porin is often deleted, limiting diffusion of the antibiotic into the cell. Klebsiella strains expressing OmpK36 are often beta-lactam sensitive even in the presence of beta-lactamases because of an inefficient mechanism.
