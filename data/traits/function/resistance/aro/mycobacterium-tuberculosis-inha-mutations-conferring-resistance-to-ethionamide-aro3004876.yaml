identifier: ARO:3004876
label: "Mycobacterium tuberculosis inhA mutations conferring resistance to ethionamide"
definition: >-
  inhA is a enoyl-acyl carrier reductase used in lipid metabolism and farry acid biosynthesis. It is inhibited by ethionamide. Mutations in the promoter region or multiple copies of the inhA show marked resistance to ethionamide mediated inhibition of mycolic acid biosynthesis.
