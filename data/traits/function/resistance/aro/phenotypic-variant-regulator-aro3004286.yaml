identifier: ARO:3004286
label: "phenotypic variant regulator"
definition: >-
  Phenotypic variant regulator proteins play a role in controlling the switch between antibiotic-susceptible and antibiotic-resistant forms of bacteria. The characterized member of this family is the PvrR protein in Pseudomonas aeruginosa, which when absent, confers antibiotic resistance.
