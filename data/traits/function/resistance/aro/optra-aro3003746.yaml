identifier: ARO:3003746
label: optrA
definition: >-
  OptrA is a member of the ABC-F protein subfamily that confers resistance to oxazolidinones. The gene encoding the protein was originally isolated from a plasmid in Enterococcus faecalis and Enterococcus faecium.
