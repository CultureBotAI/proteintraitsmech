identifier: ARO:3007659
label: "putative nickel/cobalt transporter"
definition: >-
  Ectopic expression of NiCoT in Escherichia coli CS109 resulted in the increase of intracellular nickel uptake with enhanced tolerance towards several antibiotics when NiCoT was overexpressed in E. coli and Mycobacterium smegmatis. The presence of a sub-inhibitory dose of nickel resulted in the manifestation of low-level tolerance towards these drugs.
