identifier: ARO:3007526
label: "spectinomycin resistant rpsE"
definition: >-
  Amino acid substitutions in ribosomal protein S5, the product of the rpsE gene, is associated with resistance to spectinomycin (SpcR). This protein is located on the 30S subunit and interacts with 16S rRNA and other proteins.
