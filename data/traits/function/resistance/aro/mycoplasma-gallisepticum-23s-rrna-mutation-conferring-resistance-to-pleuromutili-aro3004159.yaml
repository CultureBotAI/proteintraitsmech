identifier: ARO:3004159
label: "Mycoplasma gallisepticum 23S rRNA mutation conferring resistance to pleuromutilin antibiotics"
definition: >-
  Point mutations in the 23S rRNA (domain V) of Mycoplasma gallisepticum can confer resistance to pleuromutilin antibiotics (tiamulin and valnemulin). The mutants also show cross-resistance to lincomycin, chloramphenicol and florfenicol.
