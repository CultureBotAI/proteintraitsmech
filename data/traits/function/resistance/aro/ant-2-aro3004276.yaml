identifier: ARO:3004276
label: "ANT(2'')"
definition: >-
  A category of aminoglycoside O-nucleotidyltransferase enzymes with modification regiospecificity based at the 2''-hydroxyl group of the respective antibiotic. These enzymes inactivate aminoglycoside antibiotics by transfer of an AMP group from an ATP substrate to the 2''-hydroxyl group of the compound.
