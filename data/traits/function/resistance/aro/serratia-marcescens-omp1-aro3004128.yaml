identifier: ARO:3004128
label: "Serratia marcescens Omp1"
definition: >-
  Omp1 is an outer membrane porin that confers resistance by absence in S. marcescens. Knockout, deletion or other inhibition of the omp1 gene confers resistance to certain beta-lactamase antibiotics - including Cefoxitin, Ceftriaxone, Cefotaxime, and Moxalactam - as well as Ciprofloxacin, Tetracycline, and Chloramphenicol, by preventing passage of the antibiotic into the cell.
