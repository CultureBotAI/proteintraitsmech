identifier: ARO:3000610
label: "gene detected by antibiotic resistance screening microarray"
definition: >-
  Many genes involved in antibiotic resistance are mobile and microarray probes for these genes can thus provide positive results for any number of organisms. CARD stores the coding sequences of genes targeted by the probe sets of available antibiotic resistance microarrays.
