identifier: ARO:3003735
label: "Staphylococcus aureus fusA with mutation conferring resistance to fusidic acid"
definition: >-
  The mutations to this gene are involved in altering the translation elongation factor G (EF-G) in association with the ribosome to prevent fusidic acid from binding EF-G and preventing translation.
