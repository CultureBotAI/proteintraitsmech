identifier: ARO:3004076
label: MuxABC-OpmB
definition: >-
  MuxABC-OpmB is an RND-type multidrug efflux pump in Pseudomonas aeruginosa. This efflux pump confers resistance to aztreonam, novobiocin, tetracycline, erythromycin, kitasamycin and rokitamycin.
