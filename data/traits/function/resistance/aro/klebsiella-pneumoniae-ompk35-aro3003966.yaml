identifier: ARO:3003966
label: "Klebsiella pneumoniae OmpK35"
definition: >-
  Klebsiella pneumoniae outer membrane porin protein. In beta-lactam-resistant Klebsiella, this porin is often deleted, limiting diffusion of the antibiotic into the cell. Klebsiella strains expressing OmpK35 are often beta-lactam sensitive even in the presence of beta-lactamases because of an inefficient mechanism.
