identifier: ARO:3003794
label: "Staphylococcus aureus walK with mutation conferring resistance to daptomycin"
definition: >-
  walK is the histidine kinase sensor of a two-component regulatory system controlling peptidoglycan metabolism through regulation of the expression of most of the peptidoglycan hydrolase genes. Mutations in the gene have been found that confer daptomycin resistance.
