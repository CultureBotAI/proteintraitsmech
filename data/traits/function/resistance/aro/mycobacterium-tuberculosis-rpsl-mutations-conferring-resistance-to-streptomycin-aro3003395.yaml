identifier: ARO:3003395
label: "Mycobacterium tuberculosis rpsL mutations conferring resistance to Streptomycin"
definition: >-
  Ribosomal protein S12 stabilizes the highly conserved pseudoknot structure formed by 16S rRNA. Amino acid substitutions in RpsL affect the higher-order structure of 16S rRNA and confer streptomycin resistance by disrupting interactions between 16S rRNA and streptomycin.
