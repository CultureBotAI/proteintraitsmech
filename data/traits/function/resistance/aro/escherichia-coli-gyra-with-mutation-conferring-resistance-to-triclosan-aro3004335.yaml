identifier: ARO:3004335
label: "Escherichia coli gyrA with mutation conferring resistance to triclosan"
definition: >-
  Point mutations in Escherichia coli which have been shown to increase the minimum inhibitory concentration of the antibiotic triclosan. It is hypothesized that decreased susceptibility to triclosan in E. coli gyrA mutants occurs indirectly due to alterations in the stress response pathways.
