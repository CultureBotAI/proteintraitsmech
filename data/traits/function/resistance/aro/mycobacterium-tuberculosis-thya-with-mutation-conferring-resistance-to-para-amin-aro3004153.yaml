identifier: ARO:3004153
label: "Mycobacterium tuberculosis thyA with mutation conferring resistance to para-aminosalicylic acid"
definition: >-
  Point mutations in the thymidylate synthetase thyA gene shown clinically to confer resistance to para-aminosalicylic acid. Loss-of-function mutations in thyA disrupt the catalytic activity and substrate-binding affinity, thus conferring resistance.
