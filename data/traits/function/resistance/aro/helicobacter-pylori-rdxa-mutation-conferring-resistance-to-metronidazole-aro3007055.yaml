identifier: ARO:3007055
label: "Helicobacter pylori rdxA mutation conferring resistance to metronidazole"
definition: >-
  The rdxA gene in Helicobacter pylori encodes an NADPH nitroreductase. Mutations in this gene are associated with metronidazole resistance.
