identifier: ARO:3004061
label: "MexCD-OprJ with type A NfxB mutation"
definition: >-
  MexCD–OprJ with type A NfxB phenotype are four to eight times more resistant to ofloxacin, erythromycin, and new zwitterionic cephems, i.e., cefpirome, cefclidin, cefozopran, and cefoselis, than the parent strain, PAO1.
