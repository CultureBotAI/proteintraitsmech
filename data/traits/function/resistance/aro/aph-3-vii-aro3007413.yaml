identifier: ARO:3007413
label: "APH(3')-VII"
definition: >-
  A family of aminoglycoside 3'-O-phosphotransferase enzymes which inactivate kanamycin and neomycin by catalyzing the ATP-dependent phosphorylation of these antibiotics, thereby conferring resistance to these compounds. It is also possible to observe low-level sub-breakpoint amikacin resistance dependent on testing standards and breakpoint criteria.
