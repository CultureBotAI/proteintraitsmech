identifier: ARO:3009146
label: MexEF
definition: >-
  MexEF is a multidrug efflux pump complex comprising MexE and MexF as its core components. This system functions as the primary transport mechanism, interacting with various outer membrane proteins to expel antibiotics and harmful compounds, thus contributing to multidrug resistance.
