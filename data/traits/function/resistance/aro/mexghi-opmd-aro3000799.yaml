identifier: ARO:3000799
label: MexGHI-OpmD
definition: >-
  MexGHI-OpmD is an efflux complex expressed in Pseudomonas aeruginosa. MexG is a membrane protein required for drug export; MexH is the membrane fusion protein; MexI is the inner membrane transporter; and MexJ is the outer membrane channel protein. MexGHI-OpmD confers resistance to vanadium, norfloxacin, and acriflavin.
