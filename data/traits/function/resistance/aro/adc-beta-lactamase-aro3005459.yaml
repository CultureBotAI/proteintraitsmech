identifier: ARO:3005459
label: "ADC beta-lactamase"
definition: >-
  ADC beta-lactamases, also known as AmpC beta-lactamases, are cephalosporinases with extended-spectrum resistance to cephalosporins and may or may not cause resistance to carbapenems. ADC beta-lactamases are found in Acinetobacter sp. and Oligella urethralis.
