identifier: ARO:3004973
label: "pyrazinamide resistant ppsA"
definition: >-
  Involved in the elongation of either C22-24 fatty acids by the addition of malonyl-CoA and methylmalonyl-CoA extender units to yield phthiocerol derivatives. Mutations in the gene may confer resistance to pyrazinamide.
