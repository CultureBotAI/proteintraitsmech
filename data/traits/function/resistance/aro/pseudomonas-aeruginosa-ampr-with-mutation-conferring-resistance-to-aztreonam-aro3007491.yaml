identifier: ARO:3007491
label: "Pseudomonas aeruginosa ampR with mutation conferring resistance to aztreonam"
definition: >-
  ampR is a regulatory gene that plays an essential role in regulating antibiotic resistance in P. aeruginosa. Mutation in ampR leads to its loss of control over blaPDC-16, allowing overexpression of blaPDC-16 and further resistance to aztreonam.
