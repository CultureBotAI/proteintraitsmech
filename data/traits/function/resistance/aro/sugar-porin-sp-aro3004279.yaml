identifier: ARO:3004279
label: "Sugar Porin (SP)"
definition: >-
  Members of the Sugar Porin family tend to facilitate the transport of maltodextrins and other sugars across the outer membrane of Gram-negative bacteria. These porins form a homotrimeric structure.
