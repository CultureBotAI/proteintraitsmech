identifier: ARO:3003809
label: "Acinetobacter baumannii OprD conferring resistance to imipenem"
definition: >-
  An outer member protein (OMP) found in Acinetobacter baumannii involved in the uptake of imipenem and basic amino acids. This porin is homologous to Pseudomonas aeruginosa OprD, which performs an identical function.
