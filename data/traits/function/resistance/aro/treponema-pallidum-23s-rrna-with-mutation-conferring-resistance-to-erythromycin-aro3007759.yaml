label: "Treponema pallidum 23S rRNA with mutation conferring resistance to erythromycin"
definition: >-
  Point mutations in 23S rRNA of Treponema pallidum subsp. pallidum (T. pallidum), the noncultivable agent of syphilis, shown clinically to confer resistance to erythromycin, a macrolide antibiotic.
