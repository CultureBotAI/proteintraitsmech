identifier: ARO:3007548
label: "Candida spp. FKS2 with mutations conferring resistance to echinocandin antibiotics"
definition: >-
  Glucan synthase FKS2 is involved in the production of the fungal cell wall by the synthesis of the core component beta-1,3-glucan in Candida spp. Mutations in FKS2 have been shown to confer resistance to echinocandin antibiotic micafungin.
