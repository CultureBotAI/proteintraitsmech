identifier: ARO:3003890
label: "Escherichia coli UhpT with mutation conferring resistance to fosfomycin"
definition: >-
  Mutations to the active importer UhpT, which is involved with the uptake of many phosphorylated sugars, confer resistance to fosfomycin by reducing import of the drug into the bacteria.
