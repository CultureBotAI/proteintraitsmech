identifier: ARO:3004334
label: "Salmonella enterica gyrA with mutation conferring resistance to triclosan"
definition: >-
  Point mutations in Salmonella enterica serovar Typhimurium which have been shown to increase the minimum inhibitory concentration of the antibiotic triclosan. It is hypothesized that decreased susceptibility to triclosan in Salmonella gyrA mutants occurs indirectly due to alterations in the stress response pathways.
