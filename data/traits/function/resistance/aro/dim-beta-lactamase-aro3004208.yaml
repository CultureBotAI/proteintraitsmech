label: "DIM beta-lactamase"
definition: >-
  DIM type beta-lactamases were first identified from a carbapenem-resistant Pseudomonas stutzeri strain isolated from a Dutch patient. Encoded in mobile elements, these MBLs significantly hydrolyze broad-spectrum cephalosporins and carbapenems.
