label: "antibiotic resistant ergosterol biosynthesis pathway transcription factor"
definition: >-
  Fungal sterol regulatory element binding proteins are transcription factors that modulate antibiotic-susceptible genes. Mutations in these proteins confer resistance to antifungal drug compounds through differential gene regulation.
