identifier: ARO:3004913
label: "isoniazid resistant sigI"
definition: >-
  A sigma factor that acts as an initiation factor that promotes attachment of the RNA polymerase to specific initiation sites and then is released. Transcriptional analyses indicate that katG is also regulated by the sigma factor sigl and indicate resistance to isoniaizd.
