identifier: ARO:3007059
label: "Helicobacter pylori frxA mutation conferring resistance to metronidazole"
definition: >-
  FrxA encodes an NADH-flavin oxidoreductase in Helicobacter pylori. Mutations in this gene confer resistance to nitrofuran antibiotics and metronidazole.
