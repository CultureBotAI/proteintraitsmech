identifier: ARO:3007021
label: PFM-4
definition: >-
  PFM-4 (BioF) is a class B2 metallo-beta-lactamase first identified in Pseudomonas. It belongs to the PFM-like beta-lactamase gene family. It confers resistance to carbapenems and some cephalosporins.
