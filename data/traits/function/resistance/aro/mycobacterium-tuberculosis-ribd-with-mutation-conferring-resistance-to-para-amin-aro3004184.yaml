identifier: ARO:3004184
label: "Mycobacterium tuberculosis ribD with mutation conferring resistance to para-aminosalicylic acid"
definition: >-
  ribD is a Mycobacterium tuberculosis riboflavin biosynthesis enzyme. Point mutations in ribD cause enzyme overexpression, which allows the C-terminal reductase domain to act as an alternative dihydrofolate reductase. Thus, mutations in ribD confer resistance to DHFR inhibitors such as para-aminosalicylic acid.
