identifier: ARO:3003441
label: cfrA
definition: >-
  CfrA is a chloramphenicol-florfenicol resistance gene and methyltransferase enzyme. Methylation of position 8 of A2503 in 23S rRNA confers resistance to chloramphenicol antibiotics first identified by Schwarz 2000 as cfr from Mammaliicoccus sciuri. Additional Oxazolidinone resistance mediated by the cfr gene in a human isolated was first reported from Colombia in linezolid- and methicillin-resistant Staphylococcus aureus.
