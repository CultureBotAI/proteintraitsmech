identifier: ARO:3007671
label: "Clostridioides difficile nimB"
definition: >-
  Clostridioides difficile nimB is a heme-dependent flavin enzyme that degrades nitroimidazoles to amines lacking antimicrobial activity. NimB expression alone is not sufficient for nitroimidazole resistance. Constitutive transcription of nimB, which is driven by a mutation in the promoter PnimBG, is a mechanism of clinically-relevant heme-dependent metronidazole resistance in C. difficile.
