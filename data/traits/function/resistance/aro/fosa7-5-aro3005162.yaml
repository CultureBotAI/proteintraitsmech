identifier: ARO:3005162
label: FosA7.5
definition: >-
  FosA7.5 is a variant of the FosA7 gene. This gene is unique from FosA7 in that it is found in Escherichia coli as opposed to Salmonella enterica. It confers resistance to fosfomycin.
