identifier: ARO:3003382
label: "Salmonella enterica soxR with mutation conferring antibiotic resistance"
definition: >-
  SoxR is a sensory protein that upregulates soxS expression in the presence of redox-cycling drugs. This stress response leads to the expression of many multidrug efflux pumps.
