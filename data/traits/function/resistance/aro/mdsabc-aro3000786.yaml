identifier: ARO:3000786
label: MdsABC
definition: >-
  MdsABC, or GesABC, is a RND-type efflux complex found in Salmonella. In addition to its metal-efflux system, GesABC is also capable of exporting beta-lactams, chloramphenicol, and thiamphenicol. GesB is the inner membrane transporter and is similar to MexF; GesA is the membrane-fusion protein, and GesC is the outer membrane factor.
