identifier: ARO:3003381
label: "Escherichia coli soxR with mutation conferring antibiotic resistance"
definition: >-
  SoxR is a sensory protein that upregulates soxS expression in the presence of redox-cycling drugs. This stress response leads to the expression many multidrug efflux pumps.
