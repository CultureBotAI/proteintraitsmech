identifier: ARO:3004578
label: "Acinetobacter baumannii AbuO"
definition: >-
  AbuO is akin to the TolC outer membrane efflux protein. Deletion in A. baumannii results in increased susceptibility to antibiotics including amikacin, carbenicillin, ceftriaxone, meropenem, streptomycin, and tigecycline as well as disinfectants benzyalkonium chloride and chlorhexidine.
