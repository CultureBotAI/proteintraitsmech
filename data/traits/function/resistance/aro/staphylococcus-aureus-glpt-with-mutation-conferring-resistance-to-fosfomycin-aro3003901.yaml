identifier: ARO:3003901
label: "Staphylococcus aureus GlpT with mutation conferring resistance to fosfomycin"
definition: >-
  Mutations to the active importer GlpT, which is involved with the uptake of many phosphorylated sugars, confer resistance to fosfomycin by reducing import of the drug into the bacteria.
