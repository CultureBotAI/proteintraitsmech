identifier: ARO:3004250
label: "antibiotic-resistant ptsI phosphotransferase"
definition: >-
  PtsI family phosphotransferases are involved in cyclic AMP synthesis, which regulates glpT expression. Mutations in PtsI family genes can negatively affect expression of UhpT, which is needed for fosfomycin import.
