identifier: ARO:3003394
label: "Mycobacterium tuberculosis pncA mutations conferring resistance to pyrazinamide"
definition: >-
  pncA is a pyrazinamidase/nicotinamidase. It catalyzes the activation of pyrazinamide. Some mutation within pncA are associated with loss of enzyme activity, resulting in pyrazinamide resistance.
