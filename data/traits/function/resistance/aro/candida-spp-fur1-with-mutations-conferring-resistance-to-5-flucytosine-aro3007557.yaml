identifier: ARO:3007557
label: "Candida spp. FUR1 with mutations conferring resistance to 5-flucytosine"
definition: >-
  FUR1 is a fungal uracil phosphoribosyltransferase in Candida spp. It encodes the UPRT protein, also known as uracil pyrophosphorylase, which is a key regulating enzyme in pyrimidine salvage. Mutations in FUR1 have been shown to confer resistance to 5-flucytosine.
