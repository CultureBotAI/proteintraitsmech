causal_graphs:
  - graph_id: resistance
    title: How GOB-10 confers β-lactam resistance (determinant → mechanism → phenotype)
    description: >-
      Resistance-causation graph for the GOB-10 determinant: a subclass B3
      metallo-β-lactamase gene product enzymatically inactivates β-lactam
      antibiotics (Zn-dependent hydrolysis — the same chemistry modelled at
      atomic detail in MCSA:15), which causes the β-lactam-resistant phenotype.
      This is the ARO/CARD edge shape (determinant → mechanism → phenotype),
      distinct from the reaction-mechanism graphs on the M-CSA records.
      Biochemical evidence is from the characterised GOB-family archetype GOB-1
      (PMID:21299838); GOB-10 is a GOB-family variant (parent ARO:3004212) that
      inherits the subclass-B3 MBL mechanism — a family-level inference, flagged.
