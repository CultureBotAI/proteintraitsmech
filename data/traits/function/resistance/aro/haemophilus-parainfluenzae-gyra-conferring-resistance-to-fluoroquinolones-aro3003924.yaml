identifier: ARO:3003924
label: "Haemophilus parainfluenzae gyrA conferring resistance to fluoroquinolones"
definition: >-
  Point mutation of Haemophilus parainfluenzae gyrA resulted in the lowered affinity between fluoroquinolones and GyrA. Thus, conferring resistance. Both Ser and Tyr are hydrophilic amino acids, however Tyr has an additional bulky hydrophobic group which could affect the interaction between the DNA gyrase with quinolones.
