identifier: ARO:3009151
label: MexVW
definition: >-
  MexVW is a multidrug efflux pump complex composed of MexV and MexW as its main components. This system operates as a central transport mechanism, associating with outer membrane proteins to expel antibiotics and toxic compounds, thereby playing a role in multidrug resistance.
