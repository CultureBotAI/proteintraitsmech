identifier: ARO:3004251
label: "antibiotic-resistant cya adenylate cyclase"
definition: >-
  Adenylate cyclases encoded by cya genes, which are involved in the synthesis cyclic AMP which regulates the fosfomycin transporter glpT. Mutations in cya genes can confer resistance to fosfomycin.
