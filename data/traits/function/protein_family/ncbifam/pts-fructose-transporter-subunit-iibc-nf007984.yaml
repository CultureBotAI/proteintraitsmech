identifier: NCBIfam:NF007984
label: "PTS fructose transporter subunit IIBC"
definition: >-
  PTS fructose transporter subunit IIBC (fruA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007984 (equivalog); associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system, protein-N(PI)-phosphohistidine-fructose phosphotransferase system transporter activity. Members occur in Gammaproteobacteria.
