identifier: NCBIfam:NF045920
label: "p-hydroxyphenylacetate 3-hydroxylase oxygenase component"
definition: >-
  p-hydroxyphenylacetate 3-hydroxylase oxygenase component — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045920 (equivalog); catalyses 4-hydroxyphenylacetate 3-monooxygenase; associated with oxidoreductase activity, acting on the CH-CH group of donors, 4-hydroxyphenylacetate 3-monooxygenase activity. Members occur in Pseudomonadota.
