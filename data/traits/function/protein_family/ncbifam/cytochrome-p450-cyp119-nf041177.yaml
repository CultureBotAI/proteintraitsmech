label: "cytochrome P450 Cyp119"
definition: >-
  cytochrome P450 Cyp119 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041177 (equivalog); associated with iron ion binding, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, heme binding. Members occur in Sulfolobaceae.
