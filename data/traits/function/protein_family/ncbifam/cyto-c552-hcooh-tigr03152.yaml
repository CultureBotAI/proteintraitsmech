label: "ammonia-forming nitrite reductase cytochrome c552 subunit"
definition: >-
  ammonia-forming nitrite reductase cytochrome c552 subunit (nrfA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03152 (exception); catalyses nitrite reductase (cytochrome; ammonia-forming); associated with calcium ion binding, metabolic process, heme binding, nitrite reductase (cytochrome, ammonia-forming) activity. Members occur in Gammaproteobacteria.
