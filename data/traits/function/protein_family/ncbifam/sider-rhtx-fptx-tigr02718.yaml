label: "RhtX/FptX family siderophore transporter"
definition: >-
  RhtX/FptX family siderophore transporter — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02718 (subfamily); associated with siderophore-iron transmembrane transporter activity, siderophore transport. Members occur in Pseudomonadota.
