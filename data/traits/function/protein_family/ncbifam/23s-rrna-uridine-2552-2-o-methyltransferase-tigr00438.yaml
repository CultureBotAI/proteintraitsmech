identifier: NCBIfam:TIGR00438
label: "23S rRNA (uridine(2552)-2'-O)-methyltransferase"
definition: >-
  23S rRNA (uridine(2552)-2'-O)-methyltransferase (rrmJ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00438 (equivalog); catalyses 23S rRNA (uridine(2552)-2'-O)-methyltransferase; associated with rRNA modification, rRNA processing, rRNA (uridine) methyltransferase activity. Members occur in Gammaproteobacteria.
