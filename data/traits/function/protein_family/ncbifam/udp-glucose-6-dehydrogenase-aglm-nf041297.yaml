label: "UDP-glucose 6-dehydrogenase AglM"
definition: >-
  UDP-glucose 6-dehydrogenase AglM — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041297 (equivalog); catalyses UDP-glucose 6-dehydrogenase; associated with UDP-glucose 6-dehydrogenase activity, UDP-glucuronate biosynthetic process. Members occur in Halobacteriales.
