  protein adenylyltransferase Fic — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046030 (equivalog); catalyses protein adenylyltransferase; associated with protein adenylylation, protein homodimerization activity, AMPylase activity.
