identifier: NCBIfam:NF000848
label: "glutamine-hydrolyzing GMP synthase"
definition: >-
  glutamine-hydrolyzing GMP synthase (guaA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000848 (equivalog); catalyses GMP synthase (glutamine-hydrolyzing); associated with GMP synthase (glutamine-hydrolyzing) activity, ATP binding, GMP biosynthetic process, pyrophosphatase activity.
