identifier: NCBIfam:NF008061
label: "peptidoglycan DD-transpeptidase MrdA"
definition: >-
  peptidoglycan DD-transpeptidase MrdA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008061 (equivalog); catalyses serine-type D-Ala-D-Ala carboxypeptidase; associated with penicillin binding, serine-type D-Ala-D-Ala carboxypeptidase activity, peptidoglycan biosynthetic process, membrane. Members occur in Enterobacterales.
