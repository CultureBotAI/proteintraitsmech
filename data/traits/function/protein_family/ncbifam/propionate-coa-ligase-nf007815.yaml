label: "propionate--CoA ligase"
definition: >-
  propionate--CoA ligase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007815 (equivalog); catalyses propionate--CoA ligase; associated with propionate catabolic process, propionate-CoA ligase activity. Members occur in Pseudomonadati.
