label: "uroporphyrinogen-III synthase"
definition: >-
  uroporphyrinogen-III synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004589 (equivalog); catalyses uroporphyrinogen-III synthase; associated with uroporphyrinogen-III synthase activity, uroporphyrinogen III biosynthetic process. Members occur in Helicobacter pylori.
