label: "3-mercaptopyruvate sulfurtransferase"
definition: >-
  3-mercaptopyruvate sulfurtransferase (sseA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008557 (equivalog); catalyses 3-mercaptopyruvate sulfurtransferase; associated with thiosulfate-cyanide sulfurtransferase activity. Members occur in Pseudomonadati.
