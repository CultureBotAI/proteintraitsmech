identifier: NCBIfam:NF008290
label: "single-stranded-DNA-specific exonuclease RecJ"
definition: >-
  single-stranded-DNA-specific exonuclease RecJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008290 (equivalog); catalyses exodeoxyribonuclease VII; associated with DNA repair, DNA recombination, 5'-3' exonuclease activity. Members occur in Gammaproteobacteria.
