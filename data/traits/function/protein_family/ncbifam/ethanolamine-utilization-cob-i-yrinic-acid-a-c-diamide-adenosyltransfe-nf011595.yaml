identifier: NCBIfam:NF011595
label: "ethanolamine utilization cob(I)yrinic acid a,c-diamide adenosyltransferase EutT"
definition: >-
  ethanolamine utilization cob(I)yrinic acid a,c-diamide adenosyltransferase EutT — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011595 (equivalog); catalyses corrinoid adenosyltransferase; associated with ethanolamine metabolic process, corrinoid adenosyltransferase activity. Members occur in Enterobacteriaceae.
