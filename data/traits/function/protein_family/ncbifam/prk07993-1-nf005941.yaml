label: "DNA polymerase III subunit delta'"
definition: >-
  DNA polymerase III subunit delta' (holB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005941 (equivalog); associated with DNA-directed DNA polymerase activity, DNA replication, 3'-5' exonuclease activity. Members occur in Enterobacterales.
