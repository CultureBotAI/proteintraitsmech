identifier: NCBIfam:NF041132
label: "methylated-DNA--protein-cysteine methyltransferase"
definition: >-
  methylated-DNA--protein-cysteine methyltransferase (otg) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041132 (equivalog); catalyses methylated-DNA--[protein]-cysteine S-methyltransferase; associated with methylated-DNA-[protein]-cysteine S-methyltransferase activity, DNA alkylation repair. Members occur in Thermococcaceae.
