identifier: NCBIfam:NF046102
label: "cell cycle regulator CcrZ"
definition: >-
  cell cycle regulator CcrZ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046102 (equivalog); catalyses ribokinase, deoxyribokinase; associated with ribokinase activity, DNA replication initiation, phosphotransferase activity, alcohol group as acceptor, carbohydrate kinase activity. Members occur in Streptococcus.
