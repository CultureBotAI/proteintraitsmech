identifier: NCBIfam:NF045811
label: "pentalenene synthase"
definition: >-
  pentalenene synthase (ptlA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045811 (equivalog); catalyses pentalenene synthase; associated with antibiotic biosynthetic process, pentalenene synthase activity. Members occur in Actinomycetes.
