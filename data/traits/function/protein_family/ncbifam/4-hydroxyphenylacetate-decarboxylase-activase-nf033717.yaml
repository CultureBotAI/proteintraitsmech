identifier: NCBIfam:NF033717
label: "4-hydroxyphenylacetate decarboxylase activase"
definition: >-
  4-hydroxyphenylacetate decarboxylase activase (hpdA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033717 (equivalog); associated with catalytic activity, oxidoreductase activity, iron-sulfur cluster binding, 4 iron, 4 sulfur cluster binding. Members occur in Bacillati.
