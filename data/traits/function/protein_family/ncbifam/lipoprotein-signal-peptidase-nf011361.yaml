identifier: NCBIfam:NF011361
label: "lipoprotein signal peptidase"
definition: >-
  lipoprotein signal peptidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011361 (equivalog); catalyses signal peptidase II. Members occur in Mycoplasmoidaceae.
definition_source: NCBIfam PGAP (composed from product and EC/GO annotations)
