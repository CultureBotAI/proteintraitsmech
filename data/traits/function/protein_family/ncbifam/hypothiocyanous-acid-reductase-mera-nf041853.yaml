identifier: NCBIfam:NF041853
label: "hypothiocyanous acid reductase MerA"
definition: >-
  hypothiocyanous acid reductase MerA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041853 (equivalog); associated with oxidoreductase activity, acting on a sulfur group of donors, NAD(P) as acceptor, flavin adenine dinucleotide binding. Members occur in Staphylococcaceae.
