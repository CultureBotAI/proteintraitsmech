label: "DNA polymerase I"
definition: >-
  DNA polymerase I (polA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004397 (equivalog); catalyses DNA-directed DNA polymerase; associated with nucleic acid binding, DNA binding, DNA-directed DNA polymerase activity, DNA-templated DNA replication.
