definition: >-
  ethylbenzene dehydrogenase subunit beta (ebdB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042979 (equivalog); catalyses ethylbenzene hydroxylase; associated with iron-sulfur cluster binding. Members occur in Betaproteobacteria.
