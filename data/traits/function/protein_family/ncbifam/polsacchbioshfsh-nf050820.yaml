label: "oligosaccharide deacetylase HfsH"
definition: >-
  oligosaccharide deacetylase HfsH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050820 (equivalog); associated with carbohydrate metabolic process, hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds. Members occur in Caulobacteraceae.
