definition: >-
  6-hydroxycyclohex-1-ene-1-carbonyl-CoA dehydrogenase (had) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03201 (equivalog); catalyses 6-hydroxycyclohex-1-ene-1-carbonyl-CoA dehydrogenase; associated with catabolic process, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor.
