identifier: NCBIfam:TIGR02435
label: "precorrin-3B synthase"
definition: >-
  precorrin-3B synthase (cobG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02435 (equivalog); catalyses precorrin-3B synthase; associated with cobalamin biosynthetic process, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen.
