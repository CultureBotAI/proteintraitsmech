identifier: NCBIfam:NF040649
label: "L-fuculose phosphate aldolase"
definition: >-
  L-fuculose phosphate aldolase (fucA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040649 (equivalog); catalyses L-fuculose-phosphate aldolase; associated with L-fuculose-phosphate aldolase activity, pentose catabolic process. Members occur in Methanococcales.
