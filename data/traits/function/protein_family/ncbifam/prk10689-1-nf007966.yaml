label: "transcription-repair coupling factor"
definition: >-
  transcription-repair coupling factor (mfd) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007966 (equivalog); associated with nucleic acid binding, damaged DNA binding, ATP binding, DNA repair. Members occur in Pseudomonadota.
