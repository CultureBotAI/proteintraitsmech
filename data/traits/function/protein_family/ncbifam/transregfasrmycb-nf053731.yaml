identifier: NCBIfam:NF053731
label: "HTH-type transcriptional activator FasR"
definition: >-
  HTH-type transcriptional activator FasR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053731 (equivalog); associated with transcription cis-regulatory region binding, DNA-binding transcription factor activity, negative regulation of DNA-templated transcription. Members occur in Actinomycetes.
