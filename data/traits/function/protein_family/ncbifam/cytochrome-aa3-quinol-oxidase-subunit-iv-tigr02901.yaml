identifier: NCBIfam:TIGR02901
label: "cytochrome aa3 quinol oxidase subunit IV"
definition: >-
  cytochrome aa3 quinol oxidase subunit IV (qoxD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02901 (equivalog); associated with proton transmembrane transporter activity, electron transport coupled proton transport, membrane, oxidoreductase activity, acting on diphenols and related substances as donors, oxygen as acceptor. Members occur in Caryophanales.
