definition: >-
  UDP-3-O-(3-hydroxymyristoyl)glucosamine N-acyltransferase (lpxD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01853 (equivalog); catalyses UDP-3-O-(3-hydroxymyristoyl)glucosamine N-acyltransferase; associated with lipid A biosynthetic process, acyltransferase activity, transferring groups other than amino-acyl groups.
