label: "adenosylcobinamide-GDP ribazoletransferase"
definition: >-
  adenosylcobinamide-GDP ribazoletransferase (cobS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00317 (equivalog); catalyses adenosylcobinamide-GDP ribazoletransferase; associated with cobalamin 5'-phosphate synthase activity, cobalamin biosynthetic process, adenosylcobinamide-GDP ribazoletransferase activity.
