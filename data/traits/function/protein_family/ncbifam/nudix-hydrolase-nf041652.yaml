label: "Nudix hydrolase"
definition: >-
  Nudix hydrolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041652 (equivalog); catalyses 8-oxo-(d)GTP phosphatase; associated with hydrolase activity, metal ion binding. Members occur in Deinococcus.
