identifier: NCBIfam:NF033824
label: "non-proteolytic archaemetzincin-like protein"
definition: >-
  non-proteolytic archaemetzincin-like protein — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033824 (equivalog); associated with proteolysis, peptidase activity, metallopeptidase activity, zinc ion binding. Members occur in Pseudomonadati.
