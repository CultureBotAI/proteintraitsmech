identifier: NCBIfam:TIGR02700
label: "dihydromethanopterin reductase (acceptor)"
definition: >-
  dihydromethanopterin reductase (acceptor) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02700 (hypoth_equivalog); catalyses dihydromethanopterin reductase (acceptor); associated with oxidoreductase activity, acting on the CH-NH group of donors, 4 iron, 4 sulfur cluster binding, 5,6,7,8-tetrahydromethanopterin biosynthetic process. Members occur in Methanobacteriota.
