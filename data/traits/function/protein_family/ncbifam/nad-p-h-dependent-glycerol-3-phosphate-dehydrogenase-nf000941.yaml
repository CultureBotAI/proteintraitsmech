identifier: NCBIfam:NF000941
label: "NAD(P)H-dependent glycerol-3-phosphate dehydrogenase"
definition: >-
  NAD(P)H-dependent glycerol-3-phosphate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000941 (equivalog); catalyses glycerol-3-phosphate dehydrogenase [NAD(P)(+)]; associated with glycerol-3-phosphate dehydrogenase (FAD) complex, glycerol-3-phosphate catabolic process, glycerol-3-phosphate dehydrogenase [NAD(P)+] activity, NAD binding.
