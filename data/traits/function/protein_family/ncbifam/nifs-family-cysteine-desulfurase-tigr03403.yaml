identifier: NCBIfam:TIGR03403
label: "NifS family cysteine desulfurase"
definition: >-
  NifS family cysteine desulfurase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03403 (equivalog); catalyses cysteine desulfurase; associated with iron-sulfur cluster assembly, cysteine desulfurase activity. Members occur in Campylobacterales.
