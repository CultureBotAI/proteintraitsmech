label: "L-malyl-CoA/beta-methylmalyl-CoA lyase"
definition: >-
  L-malyl-CoA/beta-methylmalyl-CoA lyase (citE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041626 (equivalog); catalyses malyl-CoA lyase; associated with L-erythro-3-methylmalyl-CoA lyase activity, malyl-CoA lyase activity. Members occur in Halobacteriales.
