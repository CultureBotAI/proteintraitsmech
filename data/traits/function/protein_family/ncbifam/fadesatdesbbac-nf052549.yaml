identifier: NCBIfam:NF052549
label: "Delta(10) desaturase DesB"
definition: >-
  Delta(10) desaturase DesB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052549 (equivalog); associated with fatty acid biosynthetic process, oxidoreductase activity, acting on paired donors, with oxidation of a pair of donors resulting in the reduction of molecular oxygen to two molecules of water. Members occur in Bacillota.
