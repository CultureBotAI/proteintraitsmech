identifier: NCBIfam:NF010040
label: "YbdK family carboxylate-amine ligase"
definition: >-
  YbdK family carboxylate-amine ligase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF010040 (equivalog); catalyses glutamate--cysteine ligase; associated with glutamate-cysteine ligase activity, modified amino acid biosynthetic process. Members occur in Pseudomonadota.
