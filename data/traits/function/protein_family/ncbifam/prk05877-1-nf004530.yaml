label: "aminodeoxychorismate synthase component I"
definition: >-
  aminodeoxychorismate synthase component I — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004530 (equivalog); catalyses aminodeoxychorismate synthase; associated with folic acid-containing compound biosynthetic process. Members occur in Actinomycetota.
