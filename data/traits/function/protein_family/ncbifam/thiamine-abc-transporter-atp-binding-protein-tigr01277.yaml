identifier: NCBIfam:TIGR01277
label: "thiamine ABC transporter ATP-binding protein"
definition: >-
  thiamine ABC transporter ATP-binding protein (thiQ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01277 (equivalog); catalyses ABC-type thiamine transporter; associated with ATP binding, thiamine transport, membrane, thiamine pyrophosphate transmembrane transport. Members occur in Pseudomonadota.
