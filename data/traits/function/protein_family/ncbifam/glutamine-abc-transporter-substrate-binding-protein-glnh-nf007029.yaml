identifier: NCBIfam:NF007029
label: "glutamine ABC transporter substrate-binding protein GlnH"
definition: >-
  glutamine ABC transporter substrate-binding protein GlnH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007029 (equivalog); catalyses ABC-type polar-amino-acid transporter; associated with ATPase-coupled L-glutamine transmembrane transporter activity, ATP-binding cassette (ABC) transporter complex, L-glutamine import across plasma membrane. Members occur in Pseudomonadati.
