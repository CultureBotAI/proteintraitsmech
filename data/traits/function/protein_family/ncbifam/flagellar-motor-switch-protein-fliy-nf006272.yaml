definition: >-
  flagellar motor switch protein FliY — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006272 (equivalog); associated with cytoskeletal motor activity, bacterial-type flagellum basal body, bacterial-type flagellum-dependent cell motility. Members occur in Campylobacterales.
