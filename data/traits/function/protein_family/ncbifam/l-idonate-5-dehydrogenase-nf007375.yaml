identifier: NCBIfam:NF007375
label: "L-idonate 5-dehydrogenase"
definition: >-
  L-idonate 5-dehydrogenase (idnD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007375 (equivalog); catalyses L-idonate 5-dehydrogenase [NAD(P)(+)]. Members occur in Gammaproteobacteria.
