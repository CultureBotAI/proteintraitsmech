identifier: NCBIfam:NF052393
label: "acyl-homoserine-lactone synthase"
definition: >-
  acyl-homoserine-lactone synthase (traI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052393 (equivalog); catalyses acyl-homoserine-lactone synthase; associated with signal transduction, quorum sensing, N-acyl homoserine lactone synthase activity. Members occur in Alphaproteobacteria.
