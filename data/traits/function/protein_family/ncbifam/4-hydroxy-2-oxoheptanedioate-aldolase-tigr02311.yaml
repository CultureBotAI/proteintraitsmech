label: "4-hydroxy-2-oxoheptanedioate aldolase"
definition: >-
  4-hydroxy-2-oxoheptanedioate aldolase (hpaI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02311 (equivalog); catalyses 4-hydroxy-2-oxoheptanedioate aldolase; associated with phenylacetate catabolic process. Members occur in Pseudomonadota.
