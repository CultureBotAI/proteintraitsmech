label: "carotenoid 1,2-hydratase"
definition: >-
  carotenoid 1,2-hydratase (crtC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045922 (equivalog); catalyses carotenoid 1,2-hydratase; associated with carotenoid metabolic process, hydro-lyase activity, spheroidene biosynthetic process. Members occur in Pseudomonadota.
