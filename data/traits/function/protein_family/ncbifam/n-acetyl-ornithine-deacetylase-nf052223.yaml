identifier: NCBIfam:NF052223
label: "N-acetyl-ornithine deacetylase"
definition: >-
  N-acetyl-ornithine deacetylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052223 (equivalog); associated with metallocarboxypeptidase activity, proteolysis, zinc ion binding, hydrolase activity, acting on ester bonds. Members occur in Gammaproteobacteria.
