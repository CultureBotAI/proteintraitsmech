identifier: NCBIfam:NF041931
label: "MZA anti-phage system associated sigma-70 family RNA polymerase sigma factor MzaA"
definition: >-
  MZA anti-phage system associated sigma-70 family RNA polymerase sigma factor MzaA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041931 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription, sigma factor activity, defense response to virus. Members occur in Pseudomonadota.
