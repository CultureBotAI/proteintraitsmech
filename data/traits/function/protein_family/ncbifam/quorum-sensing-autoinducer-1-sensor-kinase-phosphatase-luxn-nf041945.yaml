identifier: NCBIfam:NF041945
label: "quorum-sensing autoinducer 1 sensor kinase/phosphatase LuxN"
definition: >-
  quorum-sensing autoinducer 1 sensor kinase/phosphatase LuxN — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041945 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphoprotein phosphatase activity, ATP binding. Members occur in Vibrio.
