label: "DNA helicase II"
definition: >-
  DNA helicase II (uvrD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01075 (equivalog); catalyses DNA helicase; associated with DNA helicase activity, cytoplasm, DNA replication, DNA repair. Members occur in Pseudomonadota.
