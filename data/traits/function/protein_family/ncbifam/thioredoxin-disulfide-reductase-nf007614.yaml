label: "thioredoxin-disulfide reductase"
definition: >-
  thioredoxin-disulfide reductase (trxB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007614 (equivalog); catalyses thioredoxin-disulfide reductase (NADPH); associated with thioredoxin-disulfide reductase (NADPH) activity, removal of superoxide radicals. Members occur in Enterobacterales.
