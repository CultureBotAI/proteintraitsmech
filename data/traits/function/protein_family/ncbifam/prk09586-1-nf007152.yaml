identifier: NCBIfam:NF007152
label: "PTS N-acetylmuramic acid transporter subunit IIBC"
definition: >-
  PTS N-acetylmuramic acid transporter subunit IIBC (murP) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007152 (equivalog); catalyses protein-N(pi)-phosphohistidine--N-acetylmuramate phosphotransferase; associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system, membrane. Members occur in Gammaproteobacteria.
