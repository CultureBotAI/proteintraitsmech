label: "NADH:flavorubredoxin reductase NorW"
definition: >-
  NADH:flavorubredoxin reductase NorW — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003437 (equivalog); associated with oxidoreductase activity, acting on iron-sulfur proteins as donors, NAD or NADP as acceptor. Members occur in Gammaproteobacteria.
