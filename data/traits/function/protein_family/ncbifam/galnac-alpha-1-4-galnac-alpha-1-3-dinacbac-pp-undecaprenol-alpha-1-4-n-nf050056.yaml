  GalNAc-alpha-(1->4)-GalNAc-alpha-(1->3)-diNAcBac-PP-undecaprenol alpha-1,4-N-acetyl-D-galactosaminyltransferase (pglH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050056 (equivalog); catalyses GalNAc-alpha-(1->4)-GalNAc-alpha-(1->3)-diNAcBac-PP-undecaprenol alpha-; associated with protein N-linked glycosylation, hexosyltransferase activity. Members occur in Campylobacter.
