label: "murein transglycosylase"
definition: >-
  murein transglycosylase (sltY) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008631 (equivalog); associated with peptidoglycan metabolic process, hydrolase activity, hydrolyzing O-glycosyl compounds, peptidoglycan lytic transglycosylase activity, membrane. Members occur in Gammaproteobacteria.
