identifier: NCBIfam:NF008337
label: "arginine ABC transporter permease ArtQ"
definition: >-
  arginine ABC transporter permease ArtQ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008337 (equivalog); catalyses ABC-type polar-amino-acid transporter; associated with membrane, transmembrane transporter activity, ATP-binding cassette (ABC) transporter complex, transmembrane transport. Members occur in Gammaproteobacteria.
