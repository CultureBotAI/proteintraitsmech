definition: >-
  mevalonate-3-kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040848 (equivalog); catalyses mevalonate 3-kinase; associated with kinase activity, isopentenyl diphosphate biosynthetic process, mevalonate pathway. Members occur in Thermoplasmatales.
