identifier: NCBIfam:NF045655
label: "menaquinone reductase MenJ"
definition: >-
  menaquinone reductase MenJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045655 (equivalog); catalyses menaquinone-9beta-reductase; associated with menaquinone biosynthetic process, oxidoreductase activity, acting on the CH-CH group of donors, oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor. Members occur in Mycobacteriaceae.
