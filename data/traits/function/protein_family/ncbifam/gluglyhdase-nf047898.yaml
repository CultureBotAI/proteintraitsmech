identifier: NCBIfam:NF047898
label: "glucosylglycerate hydrolase"
definition: >-
  glucosylglycerate hydrolase (ggh) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047898 (equivalog); catalyses glucosylglycerate hydrolase; associated with Glc3Man9GlcNAc2 oligosaccharide glucosidase activity, protein N-linked glycosylation, oligosaccharide metabolic process, glucosylglycerate hydrolase activity. Members occur in Actinomycetota.
