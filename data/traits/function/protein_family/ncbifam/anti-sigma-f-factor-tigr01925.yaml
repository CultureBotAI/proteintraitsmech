identifier: NCBIfam:TIGR01925
label: "anti-sigma F factor"
definition: >-
  anti-sigma F factor (spoIIAB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01925 (equivalog); catalyses non-specific serine/threonine protein kinase; associated with protein kinase activity, ATP binding, protein phosphorylation, sigma factor antagonist activity.
