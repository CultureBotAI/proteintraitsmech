label: "hydroxymethylphosphonate dioxygenase"
definition: >-
  hydroxymethylphosphonate dioxygenase (phnZ1) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052439 (equivalog); catalyses (hydroxymethyl)phosphonate dioxygenase; associated with oxidoreductase activity, metal ion binding. Members occur in Planctomycetia.
