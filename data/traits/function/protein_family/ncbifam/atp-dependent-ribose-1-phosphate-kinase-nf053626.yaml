identifier: NCBIfam:NF053626
label: "ATP-dependent ribose-1-phosphate kinase"
definition: >-
  ATP-dependent ribose-1-phosphate kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053626 (equivalog); catalyses alpha-D-ribose-1-phosphate 5-kinase (ATP); associated with ATP binding, phosphate-containing compound metabolic process, kinase activity. Members occur in Halobacteriales.
