identifier: NCBIfam:NF052570
label: "TDP-N-acetylfucosamine:lipid II N-acetylfucosaminyltransferase"
definition: >-
  TDP-N-acetylfucosamine:lipid II N-acetylfucosaminyltransferase (wecF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052570 (equivalog); catalyses TDP-N-acetylfucosamine:lipid II N-acetylfucosaminyltransferase; associated with fucosyltransferase activity, enterobacterial common antigen biosynthetic process. Members occur in Enterobacterales.
