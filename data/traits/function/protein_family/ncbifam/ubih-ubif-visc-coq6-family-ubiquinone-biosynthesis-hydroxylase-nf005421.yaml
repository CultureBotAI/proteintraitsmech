identifier: NCBIfam:NF005421
label: "UbiH/UbiF/VisC/COQ6 family ubiquinone biosynthesis hydroxylase"
definition: >-
  UbiH/UbiF/VisC/COQ6 family ubiquinone biosynthesis hydroxylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005421 (equivalog); associated with ubiquinone biosynthetic process, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, FAD binding. Members occur in Burkholderiales.
