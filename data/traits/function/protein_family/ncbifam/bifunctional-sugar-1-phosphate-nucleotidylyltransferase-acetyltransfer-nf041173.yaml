label: "bifunctional sugar-1-phosphate nucleotidylyltransferase/acetyltransferase"
definition: >-
  bifunctional sugar-1-phosphate nucleotidylyltransferase/acetyltransferase (spn) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041173 (equivalog); associated with UDP-N-acetylglucosamine diphosphorylase activity, UTP:glucose-1-phosphate uridylyltransferase activity, UDP-N-acetylglucosamine biosynthetic process, glucose-1-phosphate thymidylyltransferase activity. Members occur in Sulfolobaceae.
