definition: >-
  protoporphyrinogen oxidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008841 (equivalog); catalyses protoporphyrinogen oxidase; associated with protoporphyrinogen oxidase activity, oxygen as acceptor, porphyrin-containing compound biosynthetic process. Members occur in Actinomycetes.
