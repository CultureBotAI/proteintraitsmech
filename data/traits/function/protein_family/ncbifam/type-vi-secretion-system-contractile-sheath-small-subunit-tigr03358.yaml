  type VI secretion system contractile sheath small subunit (tssB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03358 (equivalog); associated with protein secretion by the type VI secretion system. Members occur in Pseudomonadati.
