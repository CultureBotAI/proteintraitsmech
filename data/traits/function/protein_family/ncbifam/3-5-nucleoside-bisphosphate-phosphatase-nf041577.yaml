identifier: NCBIfam:NF041577
label: "3',5'-nucleoside bisphosphate phosphatase"
definition: >-
  3',5'-nucleoside bisphosphate phosphatase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041577 (equivalog); catalyses 3',5'-nucleoside bisphosphate phosphatase; associated with dephosphorylation, 3',5'-nucleotide bisphosphate phosphatase activity. Members occur in Pseudomonadota.
