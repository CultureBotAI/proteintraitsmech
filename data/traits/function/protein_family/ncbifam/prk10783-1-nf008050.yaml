label: "murein transglycosylase D"
definition: >-
  murein transglycosylase D (mltD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008050 (equivalog); associated with peptidoglycan metabolic process, peptidoglycan lytic transglycosylase activity, membrane. Members occur in Enterobacterales.
