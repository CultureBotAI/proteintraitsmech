label: "heat shock transcription regulator"
definition: >-
  heat shock transcription regulator (phr) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053602 (exception); associated with DNA binding, DNA-binding transcription factor activity, regulation of DNA-templated transcription, response to heat. Members occur in Thermococcaceae.
