identifier: NCBIfam:NF041714
label: "arsenate respiratory reductase molybdopterin-containing subunit ArrA"
definition: >-
  arsenate respiratory reductase molybdopterin-containing subunit ArrA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041714 (equivalog); catalyses arsenate reductase (donor); associated with oxidoreductase activity, molybdopterin cofactor binding, 4 iron, 4 sulfur cluster binding. Members occur in Alteromonadales.
