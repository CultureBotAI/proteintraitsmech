label: "bifunctional (2E,6E)-farnesyl/geranyl diphosphate synthase"
definition: >-
  bifunctional (2E,6E)-farnesyl/geranyl diphosphate synthase (idsA2) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042416 (equivalog); catalyses dimethylallyltranstransferase, (2E,6E)-farnesyl diphosphate synthase; associated with dimethylallyltranstransferase activity, (2E,6E)-farnesyl diphosphate synthase activity, prenyltransferase activity, isoprenoid biosynthetic process. Members occur in Mycobacteriaceae.
