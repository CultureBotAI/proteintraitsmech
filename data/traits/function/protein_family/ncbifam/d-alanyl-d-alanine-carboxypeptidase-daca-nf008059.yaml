identifier: NCBIfam:NF008059
label: "D-alanyl-D-alanine carboxypeptidase DacA"
definition: >-
  D-alanyl-D-alanine carboxypeptidase DacA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008059 (equivalog); catalyses serine-type D-Ala-D-Ala carboxypeptidase; associated with proteolysis, serine-type D-Ala-D-Ala carboxypeptidase activity. Members occur in Enterobacterales.
