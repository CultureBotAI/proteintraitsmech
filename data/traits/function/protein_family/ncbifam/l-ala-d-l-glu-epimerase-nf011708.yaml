label: "L-Ala-D/L-Glu epimerase"
definition: >-
  L-Ala-D/L-Glu epimerase (ycjG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011708 (equivalog); catalyses L-Ala-D/L-Glu epimerase; associated with amino acid catabolic process, racemase and epimerase activity, acting on amino acids and derivatives. Members occur in Gammaproteobacteria.
