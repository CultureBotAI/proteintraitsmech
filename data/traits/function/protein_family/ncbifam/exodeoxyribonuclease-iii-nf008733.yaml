identifier: NCBIfam:NF008733
label: "exodeoxyribonuclease III"
definition: >-
  exodeoxyribonuclease III (xthA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008733 (equivalog); catalyses exodeoxyribonuclease III; associated with DNA binding, endonuclease activity, DNA repair, double-stranded DNA 3'-5' DNA exonuclease activity. Members occur in Gammaproteobacteria.
