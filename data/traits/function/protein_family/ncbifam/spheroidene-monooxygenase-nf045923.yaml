identifier: NCBIfam:NF045923
label: "spheroidene monooxygenase"
definition: >-
  spheroidene monooxygenase (crtA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045923 (equivalog); catalyses spheroidene monooxygenase; associated with geranylgeranyl diphosphate synthase activity, carotenoid biosynthetic process. Members occur in Pseudomonadota.
