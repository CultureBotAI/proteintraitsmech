identifier: NCBIfam:TIGR02504
label: "adenosylcobalamin-dependent ribonucleoside-diphosphate reductase"
definition: >-
  adenosylcobalamin-dependent ribonucleoside-diphosphate reductase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02504 (equivalog); catalyses ribonucleoside-diphosphate reductase; associated with nucleotide binding, ribonucleoside-diphosphate reductase activity, thioredoxin disulfide as acceptor, cobalamin binding.
