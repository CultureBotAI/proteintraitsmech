label: "photosystem II reaction center protein CP43"
definition: >-
  photosystem II reaction center protein CP43 (psbC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01153 (equivalog); associated with electron transfer activity, photosystem II, photosynthetic electron transport in photosystem II, photosynthesis. Members occur in Bacillati.
