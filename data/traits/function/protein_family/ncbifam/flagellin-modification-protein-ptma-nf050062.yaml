label: "flagellin modification protein PtmA"
definition: >-
  flagellin modification protein PtmA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050062 (equivalog); associated with oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor. Members occur in Campylobacter.
