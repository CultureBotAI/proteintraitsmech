identifier: NCBIfam:NF041075
label: "proton pump complex quinol oxidase subunit SoxB"
definition: >-
  proton pump complex quinol oxidase subunit SoxB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041075 (equivalog); associated with cytochrome-c oxidase activity, oxidoreductase activity, acting on diphenols and related substances as donors, oxygen as acceptor, ATP synthesis coupled electron transport. Members occur in Sulfolobaceae.
