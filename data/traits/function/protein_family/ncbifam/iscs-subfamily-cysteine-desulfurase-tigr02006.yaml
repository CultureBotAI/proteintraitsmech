identifier: NCBIfam:TIGR02006
label: "IscS subfamily cysteine desulfurase"
definition: >-
  IscS subfamily cysteine desulfurase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02006 (equivalog); catalyses cysteine desulfurase; associated with pyridoxal phosphate binding, cysteine desulfurase activity, [2Fe-2S] cluster assembly. Members occur in Pseudomonadati.
