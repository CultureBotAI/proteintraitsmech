identifier: NCBIfam:TIGR03146
label: "cytochrome c nitrite reductase pentaheme subunit"
definition: >-
  cytochrome c nitrite reductase pentaheme subunit (nrfB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03146 (equivalog); catalyses nitrite reductase (cytochrome; ammonia-forming); associated with metabolic process, heme binding, periplasmic space. Members occur in Gammaproteobacteria.
