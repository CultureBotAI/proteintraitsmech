identifier: NCBIfam:NF045759
label: "N-acetylmuramate/N-acetylglucosamine kinase AmgK"
definition: >-
  N-acetylmuramate/N-acetylglucosamine kinase AmgK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045759 (equivalog); catalyses N-acetylmuramate 1-kinase; associated with ATP binding, peptidoglycan biosynthetic process, kinase activity. Members occur in Neisseriales.
