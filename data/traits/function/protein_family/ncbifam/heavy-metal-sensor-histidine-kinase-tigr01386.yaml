identifier: NCBIfam:TIGR01386
label: "heavy metal sensor histidine kinase"
definition: >-
  heavy metal sensor histidine kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01386 (subfamily); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, protein histidine kinase activity, membrane. Members occur in Pseudomonadota.
