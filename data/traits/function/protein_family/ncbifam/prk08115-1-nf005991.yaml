identifier: NCBIfam:NF005991
label: "vitamin B12-dependent ribonucleotide reductase"
definition: >-
  vitamin B12-dependent ribonucleotide reductase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005991 (equivalog); associated with nucleotide binding, ribonucleoside-diphosphate reductase activity, thioredoxin disulfide as acceptor, ATP binding, DNA replication. Members occur in Bacillati.
