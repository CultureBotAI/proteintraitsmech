label: "5-oxoprolinase subunit PxpA"
definition: >-
  5-oxoprolinase subunit PxpA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003812 (equivalog); catalyses 5-oxoprolinase (ATP-hydrolyzing); associated with catalytic activity, carbohydrate metabolic process. Members occur in Pseudomonadota.
