label: "cob(I)yrinic acid a,c-diamide adenosyltransferase"
definition: >-
  cob(I)yrinic acid a,c-diamide adenosyltransferase (cobO) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00708 (equivalog); catalyses corrinoid adenosyltransferase; associated with corrinoid adenosyltransferase activity, cobalamin biosynthetic process.
