identifier: NCBIfam:TIGR02752
label: "demethylmenaquinone methyltransferase"
definition: >-
  demethylmenaquinone methyltransferase (menG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02752 (equivalog); catalyses demethylmenaquinone methyltransferase; associated with methyltransferase activity, menaquinone biosynthetic process. Members occur in Caryophanales.
