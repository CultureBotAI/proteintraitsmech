label: "global nitrogen regulator NtcA"
definition: >-
  global nitrogen regulator NtcA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03697 (equivalog); associated with DNA binding, DNA-binding transcription factor activity, regulation of DNA-templated transcription, regulation of nitrogen utilization. Members occur in Cyanobacteriota.
