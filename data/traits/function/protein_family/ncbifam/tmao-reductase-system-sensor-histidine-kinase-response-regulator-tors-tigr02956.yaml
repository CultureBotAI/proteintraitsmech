identifier: NCBIfam:TIGR02956
label: "TMAO reductase system sensor histidine kinase/response regulator TorS"
definition: >-
  TMAO reductase system sensor histidine kinase/response regulator TorS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02956 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, protein histidine kinase activity, membrane. Members occur in Gammaproteobacteria.
