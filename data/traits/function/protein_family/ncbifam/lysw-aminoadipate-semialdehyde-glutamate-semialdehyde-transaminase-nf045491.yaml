identifier: NCBIfam:NF045491
label: "[LysW]-aminoadipate semialdehyde/glutamate semialdehyde transaminase"
definition: >-
  [LysW]-aminoadipate semialdehyde/glutamate semialdehyde transaminase (lysJ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045491 (equivalog); catalyses [amino group carrier protein]-gamma-(L-lysyl)-L-glutamate, [amino-group carrier protein]-gamma-(L-ornithyl)-L-glutamate; associated with L-arginine biosynthetic process, transaminase activity, L-lysine biosynthetic process. Members occur in Sulfolobaceae.
