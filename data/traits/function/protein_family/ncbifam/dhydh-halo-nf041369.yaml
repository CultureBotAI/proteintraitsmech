identifier: NCBIfam:NF041369
label: "D-2-hydroxyacid dehydrogenase"
definition: >-
  D-2-hydroxyacid dehydrogenase (ddh) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041369 (equivalog); associated with oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, carboxylic acid metabolic process. Members occur in Halobacteriales.
