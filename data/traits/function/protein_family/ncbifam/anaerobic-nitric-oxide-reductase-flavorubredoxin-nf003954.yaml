definition: >-
  anaerobic nitric oxide reductase flavorubredoxin (norV) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003954 (equivalog); associated with electron transfer activity, FMN binding, nitric oxide reductase activity, metal ion binding. Members occur in Gammaproteobacteria.
