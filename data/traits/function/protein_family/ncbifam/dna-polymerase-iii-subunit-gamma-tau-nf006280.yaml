identifier: NCBIfam:NF006280
label: "DNA polymerase III subunit gamma/tau"
definition: >-
  DNA polymerase III subunit gamma/tau — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006280 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA-directed DNA polymerase activity, ATP binding, DNA replication, DNA polymerase III complex. Members occur in Campylobacterales.
