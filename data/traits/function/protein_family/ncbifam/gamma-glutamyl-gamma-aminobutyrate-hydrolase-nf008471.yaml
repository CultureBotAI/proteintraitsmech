label: "gamma-glutamyl-gamma-aminobutyrate hydrolase"
definition: >-
  gamma-glutamyl-gamma-aminobutyrate hydrolase (puuD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008471 (equivalog); catalyses gamma-glutamyl-gamma-aminobutyrate hydrolase; associated with hydrolase activity. Members occur in Enterobacterales.
