identifier: NCBIfam:NF049901
label: endo-beta-N-acetylglucosaminidase
definition: >-
  endo-beta-N-acetylglucosaminidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049901 (equivalog); catalyses mannosyl-glycoprotein endo-beta-N-acetylglucosaminidase; associated with carbohydrate metabolic process, mannosyl-glycoprotein endo-beta-N-acetylglucosaminidase activity, protein deglycosylation involved in glycoprotein catabolic process. Members occur in Bifidobacterium.
