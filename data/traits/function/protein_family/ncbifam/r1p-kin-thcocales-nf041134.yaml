identifier: NCBIfam:NF041134
label: "ADP-dependent ribose-1-phosphate kinase"
definition: >-
  ADP-dependent ribose-1-phosphate kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041134 (equivalog); catalyses alpha-D-ribose-1-phosphate 5-kinase (ADP); associated with kinase activity, phosphotransferase activity, alcohol group as acceptor. Members occur in Thermococcaceae.
