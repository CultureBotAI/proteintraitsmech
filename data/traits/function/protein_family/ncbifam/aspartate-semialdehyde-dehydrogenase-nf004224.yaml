label: "aspartate-semialdehyde dehydrogenase"
definition: >-
  aspartate-semialdehyde dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004224 (equivalog); catalyses aspartate-semialdehyde dehydrogenase; associated with amino acid biosynthetic process, oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor, protein dimerization activity, NAD binding.
