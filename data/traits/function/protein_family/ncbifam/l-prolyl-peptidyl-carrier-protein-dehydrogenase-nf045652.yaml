identifier: NCBIfam:NF045652
label: "L-prolyl-[peptidyl-carrier protein] dehydrogenase"
definition: >-
  L-prolyl-[peptidyl-carrier protein] dehydrogenase (redW) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045652 (equivalog); catalyses L-prolyl-[peptidyl-carrier protein] dehydrogenase; associated with acyl-CoA dehydrogenase activity, fatty acid beta-oxidation using acyl-CoA dehydrogenase, flavin adenine dinucleotide binding. Members occur in Actinomycetes.
