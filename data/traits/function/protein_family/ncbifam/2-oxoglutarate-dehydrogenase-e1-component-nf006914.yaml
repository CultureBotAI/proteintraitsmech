  2-oxoglutarate dehydrogenase E1 component — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006914 (equivalog); catalyses oxoglutarate dehydrogenase (succinyl-transferring); associated with oxoglutarate dehydrogenase (succinyl-transferring) activity, tricarboxylic acid cycle, thiamine pyrophosphate binding.
