identifier: NCBIfam:NF053732
label: "hyaluronate lyase HylB"
definition: >-
  hyaluronate lyase HylB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053732 (equivalog); catalyses hyaluronate lyase, chondroitin AC lyase; associated with carbohydrate metabolic process, chondroitin sulfate proteoglycan catabolic process, carbohydrate binding, hyaluronate lyase activity. Members occur in Lactobacillales.
