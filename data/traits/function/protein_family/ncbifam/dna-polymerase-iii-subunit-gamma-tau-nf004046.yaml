identifier: NCBIfam:NF004046
label: "DNA polymerase III subunit gamma/tau"
definition: >-
  DNA polymerase III subunit gamma/tau (dnaX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004046 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA binding, DNA-directed DNA polymerase activity, ATP binding, DNA replication.
