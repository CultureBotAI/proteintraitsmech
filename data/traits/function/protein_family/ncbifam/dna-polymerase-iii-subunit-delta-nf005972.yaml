definition: >-
  DNA polymerase III subunit delta' (holB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005972 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA-directed DNA polymerase activity, DNA replication, 3'-5' exonuclease activity.
