label: "phosphate butyryltransferase"
definition: >-
  phosphate butyryltransferase (yqiS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005837 (equivalog); catalyses phosphate butyryltransferase; associated with butyrate metabolic process, phosphate butyryltransferase activity. Members occur in Bacillota.
