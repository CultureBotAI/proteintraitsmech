label: "NAD(P)H-quinone oxidoreductase subunit O"
definition: >-
  NAD(P)H-quinone oxidoreductase subunit O (ndhO) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF023337 (pfameq); associated with plasma membrane, oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor. Members occur in Cyanobacteriota.
