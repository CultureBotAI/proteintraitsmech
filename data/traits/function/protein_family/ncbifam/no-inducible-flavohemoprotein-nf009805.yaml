identifier: NCBIfam:NF009805
label: "NO-inducible flavohemoprotein"
definition: >-
  NO-inducible flavohemoprotein (hmpA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009805 (equivalog); catalyses nitric oxide dioxygenase; associated with nitric oxide dioxygenase [NAD(P)H] activity, oxygen binding, heme binding, response to nitrosative stress.
