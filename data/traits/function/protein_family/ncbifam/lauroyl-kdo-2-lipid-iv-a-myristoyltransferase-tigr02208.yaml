identifier: NCBIfam:TIGR02208
label: "lauroyl-Kdo(2)-lipid IV(A) myristoyltransferase"
definition: >-
  lauroyl-Kdo(2)-lipid IV(A) myristoyltransferase (lpxM) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02208 (equivalog); catalyses acyl-Kdo2-lipid IVA acyltransferase; associated with lipopolysaccharide biosynthetic process, Gram-negative-bacterium-type cell wall, membrane, acyltransferase activity, transferring groups other than amino-acyl groups. Members occur in Gammaproteobacteria.
