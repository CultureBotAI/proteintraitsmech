label: "class 1a ribonucleoside-diphosphate reductase subunit alpha"
definition: >-
  class 1a ribonucleoside-diphosphate reductase subunit alpha (nrdA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006578 (equivalog); associated with ribonucleoside-diphosphate reductase activity, thioredoxin disulfide as acceptor, ATP binding, DNA replication. Members occur in Pseudomonadota.
