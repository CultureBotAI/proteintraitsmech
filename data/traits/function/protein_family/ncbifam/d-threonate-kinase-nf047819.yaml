identifier: NCBIfam:NF047819
label: "D-threonate kinase"
definition: >-
  D-threonate kinase (dtnK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047819 (equivalog); catalyses D-threonate 4-kinase; associated with ATP binding, kinase activity. Members occur in Enterobacterales.
