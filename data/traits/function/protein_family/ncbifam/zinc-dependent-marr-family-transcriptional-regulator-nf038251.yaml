identifier: NCBIfam:NF038251
label: "zinc-dependent MarR family transcriptional regulator"
definition: >-
  zinc-dependent MarR family transcriptional regulator — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF038251 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription, zinc ion binding. Members occur in Streptococcaceae.
