identifier: NCBIfam:NF045929
label: "ferredoxin--NADP reductase"
definition: >-
  ferredoxin--NADP reductase (petH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045929 (equivalog); catalyses ferredoxin--NADP(+) reductase; associated with ferredoxin-NADP+ reductase activity, electron transport chain. Members occur in Cyanobacteriota.
