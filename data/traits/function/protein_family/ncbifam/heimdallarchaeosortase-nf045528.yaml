label: heimdallarchaeosortase
definition: >-
  heimdallarchaeosortase (artI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045528 (equivalog); associated with cysteine-type endopeptidase activity, protein targeting, membrane, post-translational protein modification. Members occur in Candidatus Hodarchaeum mangrovi.
