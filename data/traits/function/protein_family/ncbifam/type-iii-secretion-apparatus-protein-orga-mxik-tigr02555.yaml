identifier: NCBIfam:TIGR02555
label: "type III secretion apparatus protein OrgA/MxiK"
definition: >-
  type III secretion apparatus protein OrgA/MxiK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02555 (equivalog); associated with protein secretion by the type III secretion system, type III protein secretion system complex. Members occur in Pseudomonadota.
