label: "tRNA-5-methyluridine(54) 2-sulfurtransferase"
definition: >-
  tRNA-5-methyluridine(54) 2-sulfurtransferase (ttuA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049949 (equivalog); associated with tRNA binding, tRNA wobble position uridine thiolation, ATP binding, transferase activity. Members occur in Methanobacteriota.
