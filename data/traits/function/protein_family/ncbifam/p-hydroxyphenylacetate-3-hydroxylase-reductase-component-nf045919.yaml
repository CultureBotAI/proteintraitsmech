identifier: NCBIfam:NF045919
label: "p-hydroxyphenylacetate 3-hydroxylase reductase component"
definition: >-
  p-hydroxyphenylacetate 3-hydroxylase reductase component — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045919 (equivalog); catalyses flavin reductase (NADH); associated with FMN binding, flavin reductase (NADH) activity. Members occur in Pseudomonadota.
