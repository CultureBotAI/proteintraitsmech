label: "carboxylating nicotinate-nucleotide diphosphorylase"
definition: >-
  carboxylating nicotinate-nucleotide diphosphorylase (nadC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00078 (equivalog); catalyses nicotinate-nucleotide diphosphorylase (carboxylating); associated with nicotinate-nucleotide diphosphorylase (carboxylating) activity, NAD+ biosynthetic process.
