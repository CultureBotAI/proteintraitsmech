label: "DNA double-strand break repair helicase HerA"
definition: >-
  DNA double-strand break repair helicase HerA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040937 (equivalog); catalyses DNA helicase; associated with DNA helicase activity, DNA repair, ATP hydrolysis activity. Members occur in Sulfolobaceae.
