label: "spermidine N(1)-acetyltransferase"
definition: >-
  spermidine N(1)-acetyltransferase (paiA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041158 (equivalog); catalyses diamine N-acetyltransferase; associated with diamine N-acetyltransferase activity. Members occur in Picrophilus oshimae.
