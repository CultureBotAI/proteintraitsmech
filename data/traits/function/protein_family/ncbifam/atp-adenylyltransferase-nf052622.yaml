identifier: NCBIfam:NF052622
label: "ATP adenylyltransferase"
definition: >-
  ATP adenylyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052622 (equivalog); associated with ATP:ADP adenylyltransferase activity, bis(5'-nucleosyl)-tetraphosphatase activity, diadenosine tetraphosphate catabolic process. Members occur in Actinomycetes.
