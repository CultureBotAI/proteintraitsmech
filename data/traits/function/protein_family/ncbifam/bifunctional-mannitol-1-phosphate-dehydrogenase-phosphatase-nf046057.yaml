identifier: NCBIfam:NF046057
label: "bifunctional mannitol-1-phosphate dehydrogenase/phosphatase"
definition: >-
  bifunctional mannitol-1-phosphate dehydrogenase/phosphatase (mtlD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046057 (equivalog); catalyses mannitol-1-phosphate 5-dehydrogenase, mannitol-1-phosphatase; associated with mannitol-1-phosphate 5-dehydrogenase activity, mannitol biosynthetic process, mannitol-1-phosphatase activity. Members occur in Gammaproteobacteria.
