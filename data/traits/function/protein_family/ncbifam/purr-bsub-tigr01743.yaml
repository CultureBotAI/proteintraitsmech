definition: >-
  pur operon repressor (purR) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01743 (equivalog); associated with DNA binding, regulation of DNA-templated transcription, nucleoside metabolic process, negative regulation of DNA-templated transcription. Members occur in Bacillota.
