identifier: NCBIfam:NF046108
label: "ribonuclease P protein component 3"
definition: >-
  ribonuclease P protein component 3 (rnp3) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046108 (equivalog); catalyses ribonuclease P; associated with tRNA 5'-leader removal, ribonuclease P activity, ribonuclease P complex. Members occur in Methanococcales.
