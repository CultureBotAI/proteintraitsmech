label: "conjugative transfer relaxase/helicase TraI"
definition: >-
  conjugative transfer relaxase/helicase TraI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF010263 (equivalog); catalyses DNA helicase; associated with DNA binding, DNA helicase activity, ATP binding, hydrolase activity, acting on acid anhydrides, in phosphorus-containing anhydrides. Members occur in Enterobacterales.
