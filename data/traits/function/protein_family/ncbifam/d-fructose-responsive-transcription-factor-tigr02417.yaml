identifier: NCBIfam:TIGR02417
label: "D-fructose-responsive transcription factor"
definition: >-
  D-fructose-responsive transcription factor — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02417 (subfamily); associated with DNA binding, regulation of DNA-templated transcription, response to fructose. Members occur in Gammaproteobacteria.
