label: "HTH-type transcriptional regulator GntR"
definition: >-
  HTH-type transcriptional regulator GntR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052440 (equivalog); associated with transcription cis-regulatory region binding, DNA-binding transcription factor activity, regulation of DNA-templated transcription, regulation of glucose metabolic process. Members occur in Pseudomonadota.
