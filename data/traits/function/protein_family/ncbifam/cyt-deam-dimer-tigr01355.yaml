identifier: NCBIfam:TIGR01355
label: "cytidine deaminase"
definition: >-
  cytidine deaminase (cdd) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01355 (equivalog); catalyses cytidine deaminase; associated with cytidine deaminase activity, zinc ion binding, pyrimidine-containing compound salvage. Members occur in Gammaproteobacteria.
