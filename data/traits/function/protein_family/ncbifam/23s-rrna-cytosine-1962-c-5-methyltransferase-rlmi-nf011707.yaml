label: "23S rRNA (cytosine(1962)-C(5))-methyltransferase RlmI"
definition: >-
  23S rRNA (cytosine(1962)-C(5))-methyltransferase RlmI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011707 (equivalog); catalyses 23S rRNA (cytosine(1962)-C(5))-methyltransferase; associated with RNA binding, rRNA methyltransferase activity. Members occur in Enterobacterales.
