  2-succinyl-5-enolpyruvyl-6-hydroxy-3-cyclohexene-1-carboxylic-acid synthase (menD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00173 (equivalog); catalyses 2-succinyl-5-enolpyruvyl-6-hydroxy-3-cyclohexene-1-carboxylic-acid; associated with menaquinone biosynthetic process, thiamine pyrophosphate binding, 2-succinyl-5-enolpyruvyl-6-hydroxy-3-cyclohexene-1-carboxylic-acid synthase activity.
