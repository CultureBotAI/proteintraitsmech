label: "cyanophycin synthetase"
definition: >-
  cyanophycin synthetase (cphA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02068 (equivalog); catalyses cyanophycin synthase (L-aspartate-adding), cyanophycin synthase (L-arginine-adding); associated with ATP binding, macromolecule biosynthetic process, ligase activity, maintenance of location.
