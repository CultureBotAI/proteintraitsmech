identifier: NCBIfam:NF058502
label: "C-phycocyanin alpha-cysteine-84 phycocyanobilin lyase subunit CpcE"
definition: >-
  C-phycocyanin alpha-cysteine-84 phycocyanobilin lyase subunit CpcE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058502 (equivalog); catalyses C-phycocyanin alpha-cysteine-84 phycocyanobilin lyase; associated with photosynthesis, carbon-sulfur lyase activity. Members occur in Cyanobacteriota.
