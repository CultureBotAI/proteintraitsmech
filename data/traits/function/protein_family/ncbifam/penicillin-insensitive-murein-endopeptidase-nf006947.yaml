identifier: NCBIfam:NF006947
label: "penicillin-insensitive murein endopeptidase"
definition: >-
  penicillin-insensitive murein endopeptidase (mepA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006947 (equivalog); associated with serine-type endopeptidase activity, proteolysis, outer membrane-bounded periplasmic space. Members occur in Pseudomonadota.
