definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) 3-(3-hydroxyphenyl)propanoate + NADH + O2 + H(+) = 3-(2,3- dihydroxyphenyl)propanoate + NAD(+) + H2O. (2) (2E)-3-(3-hydroxyphenyl)prop-2-enoate + NADH + O2 + H(+) = (2E)-3- (2,3-dihydroxyphenyl)prop-2-enoate + NAD(+) + H2O
