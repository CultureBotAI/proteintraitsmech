identifier: NCBIfam:NF038267
label: "N-acetylmuramoyl-L-alanine amidase AmiC"
definition: >-
  N-acetylmuramoyl-L-alanine amidase AmiC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF038267 (exception); catalyses N-acetylmuramoyl-L-alanine amidase; associated with N-acetylmuramoyl-L-alanine amidase activity, peptidoglycan catabolic process. Members occur in Enterobacterales.
