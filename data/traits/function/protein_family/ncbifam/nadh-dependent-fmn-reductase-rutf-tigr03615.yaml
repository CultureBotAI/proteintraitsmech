label: "NADH-dependent FMN reductase RutF"
definition: >-
  NADH-dependent FMN reductase RutF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03615 (equivalog); catalyses FMN reductase (NADH); associated with FMN reductase [NAD(P)H] activity. Members occur in Gammaproteobacteria.
