  tetraether lipid synthase Tes, intein-containing (tes-int) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045703 (exception); catalyses tetraether lipid synthase; associated with lipid biosynthetic process, 4 iron, 4 sulfur cluster binding. Members occur in Methanobacteriota.
