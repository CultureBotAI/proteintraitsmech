identifier: NCBIfam:NF041160
label: "digeranylgeranylglycerophospholipid reductase"
definition: >-
  digeranylgeranylglycerophospholipid reductase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041160 (equivalog); catalyses 2,3-bis-O-geranylgeranyl-sn-glycerol 1-phosphate reductase [NAD(P)H]; associated with glycerophospholipid metabolic process, geranylgeranyl diphosphate reductase activity. Members occur in Thermoplasmatales.
