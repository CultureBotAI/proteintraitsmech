definition: >-
  cytochrome aa3 quinol oxidase subunit I (qoxB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02882 (equivalog); associated with cytochrome-c oxidase activity, copper ion binding, electron transport coupled proton transport, membrane. Members occur in Bacillota.
