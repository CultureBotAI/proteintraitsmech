definition: >-
  UDP-N-acetyl-alpha-D-muramoyl-L-alanyl-L-glutamate epimerase (murL) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041275 (equivalog); catalyses UDP-N-acetyl-alpha-D-muramoyl-L-alanyl-L-glutamate epimerase; associated with peptidoglycan biosynthetic process, racemase and epimerase activity, acting on amino acids and derivatives.
