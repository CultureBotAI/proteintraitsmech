label: "serine histidine kinase EspA"
definition: >-
  serine histidine kinase EspA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052573 (equivalog); associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, protein binding, regulation of DNA-templated transcription. Members occur in Pseudomonadati.
