identifier: NCBIfam:NF002914
label: "L-carnitine CoA-transferase"
definition: >-
  L-carnitine CoA-transferase (caiB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002914 (equivalog); catalyses L-carnitine CoA-transferase; associated with carnitine metabolic process, transferase activity, transferring sulphur-containing groups. Members occur in Enterobacterales.
