label: "anhydro-N-acetylmuramic acid kinase"
definition: >-
  anhydro-N-acetylmuramic acid kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF015647 (pfameq); catalyses anhydro-N-acetylmuramic acid kinase; associated with ATP binding, amino sugar metabolic process, peptidoglycan turnover, phosphotransferase activity, alcohol group as acceptor.
