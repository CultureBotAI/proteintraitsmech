label: "trimethoprim-resistant dihydrofolate reductase DfrA35"
definition: >-
  trimethoprim-resistant dihydrofolate reductase DfrA35 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033851 (exception); catalyses dihydrofolate reductase; associated with dihydrofolate reductase activity, tetrahydrofolate biosynthetic process, NADP binding. Members occur in Enterobacterales.
