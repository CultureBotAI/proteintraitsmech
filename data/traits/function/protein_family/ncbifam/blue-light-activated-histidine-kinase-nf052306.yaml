identifier: NCBIfam:NF052306
label: "blue-light-activated histidine kinase"
definition: >-
  blue-light-activated histidine kinase (lov) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052306 (equivalog); catalyses histidine kinase; associated with protein histidine kinase activity, ATP binding, photoreceptor activity. Members occur in Alphaproteobacteria.
