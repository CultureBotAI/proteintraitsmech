identifier: NCBIfam:NF006524
label: "acetolactate synthase 2 catalytic subunit"
definition: >-
  acetolactate synthase 2 catalytic subunit (ilvG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006524 (equivalog); catalyses acetolactate synthase; associated with magnesium ion binding, acetolactate synthase activity, branched-chain amino acid biosynthetic process, thiamine pyrophosphate binding. Members occur in Pseudomonadota.
