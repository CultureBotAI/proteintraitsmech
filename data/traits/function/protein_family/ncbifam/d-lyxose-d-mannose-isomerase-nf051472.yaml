identifier: NCBIfam:NF051472
label: "D-lyxose/D-mannose isomerase"
definition: >-
  D-lyxose/D-mannose isomerase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF051472 (equivalog); catalyses D-lyxose ketol-isomerase, mannose isomerase; associated with GTP binding, cell adhesion involved in single-species biofilm formation, metal ion binding, diguanylate cyclase activity. Members occur in Enterobacterales.
