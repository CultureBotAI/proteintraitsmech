identifier: NCBIfam:TIGR03935
label: "fragilysin family metalloproteinase"
definition: >-
  fragilysin family metalloproteinase (bft) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03935 (equivalog); catalyses fragilysin; associated with proteolysis, metallopeptidase activity, zinc ion binding. Members occur in Bacteroides.
