label: "adenosyl-fluoride synthase"
definition: >-
  adenosyl-fluoride synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04507 (equivalog); catalyses adenosyl-fluoride synthase; associated with adenosyl-fluoride synthase activity, organofluorine metabolic process. Members occur in Actinomycetes.
