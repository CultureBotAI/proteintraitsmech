label: "tRNA 2-thiolation protein NcsA"
definition: >-
  tRNA 2-thiolation protein NcsA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047749 (equivalog); associated with tRNA binding, tRNA wobble base 5-methoxycarbonylmethyl-2-thiouridinylation, CCA tRNA nucleotidyltransferase activity, sulfurtransferase activity. Members occur in Halobacteriales.
