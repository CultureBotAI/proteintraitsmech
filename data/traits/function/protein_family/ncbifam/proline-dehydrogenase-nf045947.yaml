  proline dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045947 (equivalog); catalyses proline dehydrogenase; associated with proline dehydrogenase activity, L-proline catabolic process. Members occur in Thermaceae.
