label: "ribonuclease D"
definition: >-
  ribonuclease D (rnd) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008089 (equivalog); catalyses ribonuclease D; associated with nucleic acid binding, tRNA processing, 3'-5' exonuclease activity, ribonuclease D activity. Members occur in Enterobacterales.
