identifier: NCBIfam:TIGR01902
label: "N-acetyl-ornithine/N-acetyl-lysine deacetylase"
definition: >-
  N-acetyl-ornithine/N-acetyl-lysine deacetylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01902 (subfamily); associated with zinc ion binding, L-lysine biosynthetic process, hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in linear amides, cobalt ion binding.
