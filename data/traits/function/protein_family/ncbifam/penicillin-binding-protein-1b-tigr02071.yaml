identifier: NCBIfam:TIGR02071
label: "penicillin-binding protein 1B"
definition: >-
  penicillin-binding protein 1B (mrcB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02071 (equivalog); associated with peptidase activity, penicillin binding, peptidoglycan glycosyltransferase activity, peptidoglycan biosynthetic process. Members occur in Gammaproteobacteria.
