label: "3-carboxyethylcatechol 2,3-dioxygenase"
definition: >-
  3-carboxyethylcatechol 2,3-dioxygenase (mhpB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009907 (equivalog); catalyses 3-carboxyethylcatechol 2,3-dioxygenase; associated with catabolic process, 3-carboxyethylcatechol 2,3-dioxygenase activity. Members occur in Enterobacteriaceae.
