label: "trimethylamine N-oxide reductase system protein TorE"
definition: >-
  trimethylamine N-oxide reductase system protein TorE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02972 (equivalog); catalyses trimethylamine-N-oxide reductase; associated with anaerobic respiration. Members occur in Gammaproteobacteria.
