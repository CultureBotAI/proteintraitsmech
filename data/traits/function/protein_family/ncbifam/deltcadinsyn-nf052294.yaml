identifier: NCBIfam:NF052294
label: "(-)-delta-cadinene synthase"
definition: >-
  (-)-delta-cadinene synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052294 (equivalog); catalyses (-)-delta-cadinene synthase; associated with terpene synthase activity, metal ion binding. Members occur in Actinomycetes.
