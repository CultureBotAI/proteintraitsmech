label: "NADP-specific glutamate dehydrogenase"
definition: >-
  NADP-specific glutamate dehydrogenase (gdhA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006929 (equivalog); catalyses glutamate dehydrogenase (NADP(+)); associated with amino acid metabolic process, oxidoreductase activity, acting on the CH-NH2 group of donors, NAD or NADP as acceptor.
