identifier: NCBIfam:NF008090
label: "CDP-diacylglycerol--glycerol-3-phosphate 3-phosphatidyltransferase"
definition: >-
  CDP-diacylglycerol--glycerol-3-phosphate 3-phosphatidyltransferase (pgsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008090 (equivalog); catalyses CDP-diacylglycerol--glycerol-3-phosphate 1-phosphatidyltransferase. Members occur in Gammaproteobacteria.
