identifier: NCBIfam:NF004404
label: "F0F1 ATP synthase subunit delta"
definition: >-
  F0F1 ATP synthase subunit delta (atpH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004404 (equivalog); catalyses H(+)-transporting two-sector ATPase; associated with proton motive force-driven ATP synthesis, membrane, proton-transporting ATP synthase activity, rotational mechanism. Members occur in Gammaproteobacteria.
