identifier: NCBIfam:TIGR03614
label: "pyrimidine utilization protein B"
definition: >-
  pyrimidine utilization protein B (rutB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03614 (equivalog); associated with hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in linear amides. Members occur in Pseudomonadota.
