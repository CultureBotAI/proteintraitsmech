identifier: NCBIfam:NF053630
label: "16S rRNA aminocarboxypropyltransferase"
definition: >-
  16S rRNA aminocarboxypropyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053630 (equivalog); catalyses rRNA small subunit aminocarboxypropyltransferase; associated with enzyme-directed rRNA pseudouridine synthesis, cytoplasm, rRNA small subunit aminocarboxypropyltransferase activity, S-adenosyl-L-methionine binding. Members occur in Vulcanisaeta.
