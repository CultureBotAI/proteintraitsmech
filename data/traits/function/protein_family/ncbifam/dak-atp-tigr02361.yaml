  glycerone kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02361 (equivalog); catalyses glycerone kinase; associated with glycerone kinase activity, ATP binding, glycerol metabolic process. Members occur in Enterobacterales.
