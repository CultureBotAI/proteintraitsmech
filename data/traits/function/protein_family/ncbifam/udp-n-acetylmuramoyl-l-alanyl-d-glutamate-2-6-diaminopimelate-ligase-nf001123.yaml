definition: >-
  UDP-N-acetylmuramoyl-L-alanyl-D-glutamate--2,6-diaminopimelate ligase (murE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF001123 (equivalog); catalyses UDP-N-acetylmuramoyl-L-alanyl-D-glutamate--2,6-diaminopimelate ligase; associated with ATP binding, regulation of cell shape, biosynthetic process, acid-amino acid ligase activity. Members occur in Gammaproteobacteria.
