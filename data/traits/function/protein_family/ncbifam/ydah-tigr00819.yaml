definition: >-
  AbgT family antimetabolite efflux transporter — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00819 (subfamily); associated with secondary active p-aminobenzoyl-glutamate transmembrane transporter activity, p-aminobenzoyl-glutamate transmembrane transport. Members occur in Pseudomonadota.
