identifier: NCBIfam:NF045570
label: "heme A synthase"
definition: >-
  heme A synthase (ctaA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045570 (equivalog); catalyses heme a synthase; associated with heme A biosynthetic process, oxidoreductase activity, acting on NAD(P)H, heme protein as acceptor. Members occur in Pseudomonadota.
