  catecholate siderophore receptor Fiu — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007349 (equivalog); associated with siderophore uptake transmembrane transporter activity, siderophore transport. Members occur in Gammaproteobacteria.
