label: "archaetidylinositol phosphate synthase"
definition: >-
  archaetidylinositol phosphate synthase (pgsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040950 (equivalog); catalyses archaetidylinositol phosphate synthase; associated with phospholipid biosynthetic process, phosphotransferase activity, for other substituted phosphate groups.
