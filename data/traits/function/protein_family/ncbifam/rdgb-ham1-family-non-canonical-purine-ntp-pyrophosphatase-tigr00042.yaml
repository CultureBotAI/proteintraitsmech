label: "RdgB/HAM1 family non-canonical purine NTP pyrophosphatase"
definition: >-
  RdgB/HAM1 family non-canonical purine NTP pyrophosphatase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00042 (equivalog); catalyses XTP/dITP diphosphatase; associated with DNA repair, dITP diphosphatase activity, XTP diphosphatase activity.
