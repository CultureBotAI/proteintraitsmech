label: "luciferase-like monooxygenase"
definition: >-
  luciferase-like monooxygenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007802 (equivalog); associated with oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen. Members occur in Gammaproteobacteria.
