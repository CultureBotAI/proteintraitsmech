label: "type III secretion system cytoplasmic ring protein SctQ"
definition: >-
  type III secretion system cytoplasmic ring protein SctQ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02551 (equivalog); associated with protein secretion by the type III secretion system, type III protein secretion system complex. Members occur in Pseudomonadati.
