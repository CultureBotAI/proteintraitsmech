label: "thymidylate synthase"
definition: >-
  thymidylate synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03283 (equivalog); catalyses thymidylate synthase; associated with thymidylate synthase activity, cytoplasm, 2'-deoxyribonucleotide biosynthetic process. Members occur in Methanobacteriota.
