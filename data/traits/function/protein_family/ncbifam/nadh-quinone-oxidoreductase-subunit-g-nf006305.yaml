identifier: NCBIfam:NF006305
label: "NADH-quinone oxidoreductase subunit G"
definition: >-
  NADH-quinone oxidoreductase subunit G — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006305 (equivalog); catalyses NADH:ubiquinone reductase (non-electrogenic); associated with oxidoreductase activity, iron-sulfur cluster binding. Members occur in Campylobacterales.
