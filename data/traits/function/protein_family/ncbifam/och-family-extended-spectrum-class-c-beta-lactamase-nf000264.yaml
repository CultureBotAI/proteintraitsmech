identifier: NCBIfam:NF000264
label: "OCH family extended-spectrum class C beta-lactamase"
definition: >-
  OCH family extended-spectrum class C beta-lactamase (blaOCH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000264 (exception); catalyses beta-lactamase; associated with beta-lactamase activity, beta-lactam antibiotic catabolic process. Members occur in Brucella/Ochrobactrum group.
