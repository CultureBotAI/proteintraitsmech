label: "flagellar motor switch protein FliM"
definition: >-
  flagellar motor switch protein FliM — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005194 (equivalog); associated with cytoskeletal motor activity, bacterial-type flagellum basal body, bacterial-type flagellum-dependent cell motility. Members occur in Caryophanales.
