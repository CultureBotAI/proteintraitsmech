identifier: NCBIfam:TIGR03531
label: "O-phosphoseryl-tRNA(Sec) selenium transferase"
definition: >-
  O-phosphoseryl-tRNA(Sec) selenium transferase (spcS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03531 (equivalog); catalyses O-phospho-L-seryl-tRNA(Sec):L-selenocysteinyl-tRNA synthase; associated with conversion of seryl-tRNAsec to selenocys-tRNAsec, O-phosphoseryl-tRNA(Sec) selenium transferase activity.
