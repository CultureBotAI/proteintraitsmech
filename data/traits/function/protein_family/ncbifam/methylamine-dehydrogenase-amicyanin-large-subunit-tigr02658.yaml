label: "methylamine dehydrogenase (amicyanin) large subunit"
definition: >-
  methylamine dehydrogenase (amicyanin) large subunit (mauB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02658 (equivalog); catalyses methylamine dehydrogenase (amicyanin); associated with methylamine dehydrogenase (amicyanin) activity. Members occur in Pseudomonadota.
