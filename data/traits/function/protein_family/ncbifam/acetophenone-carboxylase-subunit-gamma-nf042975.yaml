definition: >-
  acetophenone carboxylase subunit gamma (apcC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042975 (equivalog); catalyses acetophenone carboxylase; associated with ATP binding, ligase activity. Members occur in Pseudomonadota.
