identifier: NCBIfam:NF007957
label: "molybdenum-dependent transcriptional regulator"
definition: >-
  molybdenum-dependent transcriptional regulator (modE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007957 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription, molybdate ion transport, molybdenum ion binding. Members occur in Enterobacterales.
