identifier: NCBIfam:NF008077
label: "two-component system sensor histidine kinase PhoQ"
definition: >-
  two-component system sensor histidine kinase PhoQ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008077 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, protein histidine kinase activity, transferase activity, transferring phosphorus-containing groups. Members occur in Enterobacterales.
