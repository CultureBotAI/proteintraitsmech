identifier: NCBIfam:NF046020
label: "cell cycle histidine kinase CckA"
definition: >-
  cell cycle histidine kinase CckA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046020 (equivalog); catalyses histidine kinase; associated with phosphorelay signal transduction system, protein histidine kinase activity, peptidyl-histidine phosphorylation. Members occur in Alphaproteobacteria.
