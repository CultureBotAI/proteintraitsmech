identifier: NCBIfam:NF049987
label: "processive diacylglycerol alpha-glucosyltransferase"
definition: >-
  processive diacylglycerol alpha-glucosyltransferase (dgs) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049987 (equivalog); catalyses diglucosyl diacylglycerol synthase (1,2-linking), 1,2-diacylglycerol 3-alpha-glucosyltransferase; associated with glycerol metabolic process, 1,2-diacylglycerol 3-glucosyltransferase activity, diglucosyl diacylglycerol synthase activity. Members occur in Acholeplasmataceae.
