label: "23S rRNA (guanine(1835)-N(2))-methyltransferase RlmG"
definition: >-
  23S rRNA (guanine(1835)-N(2))-methyltransferase RlmG — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011577 (equivalog); catalyses 23S rRNA (guanine(1835)-N(2))-methyltransferase; associated with nucleic acid binding, rRNA (guanine-N2-)-methyltransferase activity, rRNA methylation. Members occur in Enterobacterales.
