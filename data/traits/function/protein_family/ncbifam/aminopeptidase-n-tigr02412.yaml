identifier: NCBIfam:TIGR02412
label: "aminopeptidase N"
definition: >-
  aminopeptidase N (pepN) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02412 (equivalog); catalyses membrane alanyl aminopeptidase; associated with aminopeptidase activity, proteolysis, metallopeptidase activity, zinc ion binding.
