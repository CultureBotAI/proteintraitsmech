identifier: NCBIfam:NF008099
label: "two-component system sensor histidine kinase RcsC"
definition: >-
  two-component system sensor histidine kinase RcsC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008099 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, ATP binding, regulation of DNA-templated transcription. Members occur in Enterobacterales.
