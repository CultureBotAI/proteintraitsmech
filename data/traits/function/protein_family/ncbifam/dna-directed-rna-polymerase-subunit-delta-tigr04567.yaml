identifier: NCBIfam:TIGR04567
label: "DNA-directed RNA polymerase subunit delta"
definition: >-
  DNA-directed RNA polymerase subunit delta (rpoE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04567 (equivalog); catalyses DNA-directed RNA polymerase; associated with DNA-directed RNA polymerase activity, DNA-templated transcription, regulation of DNA-templated transcription. Members occur in Bacillati.
