label: "cytochrome aa3 quinol oxidase subunit II"
definition: >-
  cytochrome aa3 quinol oxidase subunit II (qoxA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01432 (equivalog); associated with electron transfer activity, cytochrome bo3 ubiquinol oxidase activity, proton transmembrane transporter activity, electron transport coupled proton transport. Members occur in Bacillota.
