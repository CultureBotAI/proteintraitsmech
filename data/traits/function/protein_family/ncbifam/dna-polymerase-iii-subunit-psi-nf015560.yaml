identifier: NCBIfam:NF015560
label: "DNA polymerase III subunit psi"
definition: >-
  DNA polymerase III subunit psi — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF015560 (pfameq); catalyses DNA-directed DNA polymerase; associated with DNA-directed DNA polymerase activity, DNA replication, 3'-5' exonuclease activity. Members occur in Gammaproteobacteria.
