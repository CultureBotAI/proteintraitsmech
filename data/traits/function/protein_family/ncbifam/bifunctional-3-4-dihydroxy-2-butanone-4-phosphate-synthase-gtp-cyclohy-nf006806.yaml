label: "bifunctional 3,4-dihydroxy-2-butanone-4-phosphate synthase/GTP cyclohydrolase II"
definition: >-
  bifunctional 3,4-dihydroxy-2-butanone-4-phosphate synthase/GTP cyclohydrolase II (ribBA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006806 (equivalog); catalyses GTP cyclohydrolase II, 3,4-dihydroxy-2-butanone-4-phosphate synthase; associated with GTP cyclohydrolase II activity, 3,4-dihydroxy-2-butanone-4-phosphate synthase activity. Members occur in Cyanobacteriota.
