identifier: NCBIfam:TIGR02409
label: "gamma-butyrobetaine dioxygenase"
definition: >-
  gamma-butyrobetaine dioxygenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02409 (equivalog); catalyses gamma-butyrobetaine dioxygenase; associated with iron ion binding, gamma-butyrobetaine dioxygenase activity, carnitine biosynthetic process. Members occur in Pseudomonadota.
