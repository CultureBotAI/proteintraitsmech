identifier: NCBIfam:NF008377
label: "2,5-didehydrogluconate reductase DkgB"
definition: >-
  2,5-didehydrogluconate reductase DkgB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008377 (equivalog); catalyses 2,5-didehydrogluconate reductase (2-dehydro-L-gulonate-forming); associated with D-threo-aldose 1-dehydrogenase activity. Members occur in Pseudomonadota.
