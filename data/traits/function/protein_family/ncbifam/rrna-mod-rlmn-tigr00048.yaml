identifier: NCBIfam:TIGR00048
label: "dual-specificity RNA methyltransferase RlmN"
definition: >-
  dual-specificity RNA methyltransferase RlmN — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00048 (equivalog); catalyses 23S rRNA (adenine(2503)-C(2))-methyltransferase; associated with S-adenosylmethionine-dependent methyltransferase activity, rRNA (adenine) methyltransferase activity, tRNA methylation, rRNA base methylation.
