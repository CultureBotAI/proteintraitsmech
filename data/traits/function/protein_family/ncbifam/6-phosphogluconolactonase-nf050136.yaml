definition: >-
  6-phosphogluconolactonase (pglS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050136 (exception); catalyses 6-phosphogluconolactonase; associated with pentose-phosphate shunt, 6-phosphogluconolactonase activity. Members occur in Staphylococcaceae.
