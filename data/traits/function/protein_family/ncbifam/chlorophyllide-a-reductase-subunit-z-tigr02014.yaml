label: "chlorophyllide a reductase subunit Z"
definition: >-
  chlorophyllide a reductase subunit Z (bchZ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02014 (equivalog); catalyses chlorophyllide a reductase; associated with oxidoreductase activity, acting on iron-sulfur proteins as donors, bacteriochlorophyll biosynthetic process.
