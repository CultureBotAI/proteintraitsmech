identifier: NCBIfam:TIGR04266
label: "NDMA-dependent methanol dehydrogenase"
definition: >-
  NDMA-dependent methanol dehydrogenase (mdo) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04266 (equivalog); catalyses methanol dehydrogenase (nicotinoprotein), formaldehyde dismutase; associated with oxidoreductase activity, acting on CH-OH group of donors, methanol catabolic process, NADP binding.
