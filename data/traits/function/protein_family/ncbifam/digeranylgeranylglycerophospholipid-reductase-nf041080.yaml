identifier: NCBIfam:NF041080
label: "digeranylgeranylglycerophospholipid reductase"
definition: >-
  digeranylgeranylglycerophospholipid reductase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041080 (equivalog); associated with phospholipid biosynthetic process, oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor. Members occur in Thermoprotei.
