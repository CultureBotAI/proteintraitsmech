identifier: NCBIfam:NF006823
label: "phosphoenolpyruvate carboxykinase"
definition: >-
  phosphoenolpyruvate carboxykinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006823 (equivalog); catalyses phosphoenolpyruvate carboxykinase (ATP); associated with phosphoenolpyruvate carboxykinase activity, ATP binding, gluconeogenesis, purine nucleotide binding. Members occur in Pseudomonadota.
