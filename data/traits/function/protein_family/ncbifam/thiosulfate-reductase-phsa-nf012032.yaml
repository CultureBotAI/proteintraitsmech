identifier: NCBIfam:NF012032
label: "thiosulfate reductase PhsA"
definition: >-
  thiosulfate reductase PhsA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF012032 (equivalog); catalyses thiosulfate reductase (cytochrome); associated with oxidoreductase activity, molybdopterin cofactor binding, 4 iron, 4 sulfur cluster binding. Members occur in Pseudomonadati.
