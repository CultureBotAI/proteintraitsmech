label: "6-hydroxyaminopurine reductase"
definition: >-
  6-hydroxyaminopurine reductase (yiiM) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008577 (equivalog); associated with catalytic activity, molybdenum ion binding, pyridoxal phosphate binding. Members occur in Enterobacterales.
