label: "fused uroporphyrinogen-III synthase HemD/membrane protein HemX"
definition: >-
  fused uroporphyrinogen-III synthase HemD/membrane protein HemX (hemDX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005411 (equivalog); catalyses uroporphyrinogen-III C-methyltransferase, uroporphyrinogen-III synthase; associated with uroporphyrinogen-III synthase activity, tetrapyrrole biosynthetic process. Members occur in Pseudomonadota.
