label: "7-cyano-7-deazaguanine/7-aminomethyl-7-deazaguanine transporter"
definition: >-
  7-cyano-7-deazaguanine/7-aminomethyl-7-deazaguanine transporter — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008406 (equivalog); associated with tRNA queuosine(34) biosynthetic process from salvaged queuosine or its precursors. Members occur in Pseudomonadota.
