identifier: NCBIfam:NF045698
label: "N-acetylmuramate/N-acetylglucosamine kinase AmgK"
definition: >-
  N-acetylmuramate/N-acetylglucosamine kinase AmgK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045698 (equivalog); catalyses N-acetylmuramate 1-kinase; associated with carbohydrate metabolic process, peptidoglycan biosynthetic process, kinase activity. Members occur in Alphaproteobacteria.
