identifier: NCBIfam:NF041712
label: "teichoic acid glycerol-phosphate transferase TarF"
definition: >-
  teichoic acid glycerol-phosphate transferase TarF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041712 (equivalog); catalyses teichoic acid glycerol-phosphate transferase; associated with teichoic acid biosynthetic process. Members occur in Staphylococcus aureus.
