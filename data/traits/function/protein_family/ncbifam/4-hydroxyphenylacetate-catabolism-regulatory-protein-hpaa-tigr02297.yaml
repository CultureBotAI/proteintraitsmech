identifier: NCBIfam:TIGR02297
label: "4-hydroxyphenylacetate catabolism regulatory protein HpaA"
definition: >-
  4-hydroxyphenylacetate catabolism regulatory protein HpaA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02297 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription, sequence-specific DNA binding. Members occur in Gammaproteobacteria.
