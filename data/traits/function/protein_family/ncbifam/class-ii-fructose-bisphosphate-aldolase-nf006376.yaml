label: "class II fructose-bisphosphate aldolase"
definition: >-
  class II fructose-bisphosphate aldolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006376 (equivalog); catalyses fructose-bisphosphate aldolase; associated with fructose-bisphosphate aldolase activity, glycolytic process. Members occur in Caryophanales.
