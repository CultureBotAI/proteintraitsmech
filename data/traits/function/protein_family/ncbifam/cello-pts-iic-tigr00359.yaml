label: "PTS cellobiose transporter subunit IIC"
definition: >-
  PTS cellobiose transporter subunit IIC (celB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00359 (equivalog); catalyses protein-N(pi)-phosphohistidine--D-cellobiose phosphotransferase; associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system, membrane, cellobiose transmembrane transporter activity.
