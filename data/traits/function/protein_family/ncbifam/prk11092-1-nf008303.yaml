identifier: NCBIfam:NF008303
label: "bifunctional GTP diphosphokinase/guanosine-3',5'-bis pyrophosphate 3'-pyrophosphohydrolase"
definition: >-
  bifunctional GTP diphosphokinase/guanosine-3',5'-bis pyrophosphate 3'-pyrophosphohydrolase (spoT) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008303 (equivalog); catalyses GTP diphosphokinase, guanosine-3',5'-bis(diphosphate) 3'-diphosphatase; associated with GTP diphosphokinase activity, guanosine-3',5'-bis(diphosphate) 3'-diphosphatase activity, guanosine tetraphosphate metabolic process. Members occur in Gammaproteobacteria.
