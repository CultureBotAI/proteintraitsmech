label: "GTPase-activating protein MglB"
definition: >-
  GTPase-activating protein MglB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052242 (equivalog); associated with guanyl-nucleotide exchange factor activity, positive regulation of TOR signaling, molecular adaptor activity. Members occur in Deinococci.
