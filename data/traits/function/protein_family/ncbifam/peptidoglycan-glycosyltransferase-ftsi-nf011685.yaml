identifier: NCBIfam:NF011685
label: "peptidoglycan glycosyltransferase FtsI"
definition: >-
  peptidoglycan glycosyltransferase FtsI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011685 (subfamily); catalyses serine-type D-Ala-D-Ala carboxypeptidase; associated with plasma membrane, penicillin binding, peptidoglycan glycosyltransferase activity, peptidoglycan biosynthetic process. Members occur in Gammaproteobacteria.
