label: "ribose 1,5-bisphosphokinase"
definition: >-
  ribose 1,5-bisphosphokinase (phnN) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007485 (equivalog); catalyses ribose 1,5-bisphosphate phosphokinase; associated with 5-phosphoribose 1-diphosphate biosynthetic process, ribose 1,5-bisphosphate phosphokinase activity. Members occur in Pseudomonadati.
