definition: >-
  DNA helicase IV (helD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008276 (equivalog); catalyses DNA helicase; associated with DNA binding, DNA helicase activity, ATP binding. Members occur in Gammaproteobacteria.
