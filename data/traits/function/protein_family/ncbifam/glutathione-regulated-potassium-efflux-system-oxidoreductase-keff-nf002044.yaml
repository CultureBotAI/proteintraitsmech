identifier: NCBIfam:NF002044
label: "glutathione-regulated potassium-efflux system oxidoreductase KefF"
definition: >-
  glutathione-regulated potassium-efflux system oxidoreductase KefF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002044 (equivalog); catalyses NAD(P)H dehydrogenase (quinone); associated with potassium ion transport. Members occur in Pseudomonadota.
