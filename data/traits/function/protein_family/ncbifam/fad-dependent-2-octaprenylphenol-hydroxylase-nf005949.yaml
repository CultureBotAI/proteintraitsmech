identifier: NCBIfam:NF005949
label: "FAD-dependent 2-octaprenylphenol hydroxylase"
definition: >-
  FAD-dependent 2-octaprenylphenol hydroxylase (ubiI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005949 (equivalog); catalyses 2-polyprenylphenol 6-hydroxylase; associated with ubiquinone biosynthetic process, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen, FAD binding. Members occur in Enterobacterales.
definition_source: NCBIfam PGAP (composed from product and EC/GO annotations)
trait_axis: FUNCTION
trait_category: FUNC_PROTEIN_FAMILY
