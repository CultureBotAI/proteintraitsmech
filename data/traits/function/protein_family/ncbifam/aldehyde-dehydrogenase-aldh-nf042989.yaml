identifier: NCBIfam:NF042989
label: "aldehyde dehydrogenase AldH"
definition: >-
  aldehyde dehydrogenase AldH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042989 (equivalog); catalyses aldehyde dehydrogenase (NAD(+)), aldehyde dehydrogenase (NADP(+)); associated with aldehyde dehydrogenase [NAD(P)+] activity, D-xylose catabolic process. Members occur in Actinomycetes.
