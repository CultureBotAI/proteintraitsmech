identifier: NCBIfam:NF045822
label: "peptidoglycan-N-acetylglucosamine deacetylase"
definition: >-
  peptidoglycan-N-acetylglucosamine deacetylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045822 (equivalog); catalyses peptidoglycan-N-acetylglucosamine deacetylase; associated with carbohydrate metabolic process, hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds. Members occur in Bacillus.
