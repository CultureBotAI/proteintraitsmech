identifier: NCBIfam:NF049977
label: "3-ketodihydrosphingosine reductase"
definition: >-
  3-ketodihydrosphingosine reductase (kdsR) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049977 (equivalog); catalyses 3-dehydrosphinganine reductase; associated with 3-keto-sphinganine metabolic process, sphingolipid biosynthetic process, 3-dehydrosphinganine reductase activity, NADPH binding. Members occur in Bacteroidales.
