definition: >-
  TAT-dependent nitrous-oxide reductase (nosZ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04244 (equivalog); catalyses nitrous-oxide reductase; associated with copper ion binding, calcium ion binding, denitrification pathway, nitrous-oxide reductase activity.
