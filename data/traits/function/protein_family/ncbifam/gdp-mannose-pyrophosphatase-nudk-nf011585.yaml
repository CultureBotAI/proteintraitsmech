label: "GDP-mannose pyrophosphatase NudK"
definition: >-
  GDP-mannose pyrophosphatase NudK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011585 (equivalog); associated with hydrolase activity, acting on acid anhydrides, in phosphorus-containing anhydrides, metal ion binding. Members occur in Pseudomonadati.
