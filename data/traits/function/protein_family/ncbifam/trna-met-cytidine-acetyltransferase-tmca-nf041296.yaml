identifier: NCBIfam:NF041296
label: "tRNA(Met) cytidine acetyltransferase TmcA"
definition: >-
  tRNA(Met) cytidine acetyltransferase TmcA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041296 (equivalog); catalyses tRNA(Met) cytidine acetyltransferase; associated with tRNA acetylation, tRNA cytidine N4-acetyltransferase activity. Members occur in Halobacteriales.
