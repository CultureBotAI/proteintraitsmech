identifier: NCBIfam:NF007942
label: "tRNA lysidine(34) synthetase TilS"
definition: >-
  tRNA lysidine(34) synthetase TilS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007942 (equivalog); catalyses tRNA(Ile)-lysidine synthetase; associated with nucleotide binding, ATP binding, tRNA processing, ligase activity, forming carbon-nitrogen bonds. Members occur in Enterobacterales.
