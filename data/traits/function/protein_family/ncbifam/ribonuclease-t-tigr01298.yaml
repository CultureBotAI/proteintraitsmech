identifier: NCBIfam:TIGR01298
label: "ribonuclease T"
definition: >-
  ribonuclease T (rnt) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01298 (equivalog); associated with rRNA processing, RNA exonuclease activity, producing 5'-phosphomonoesters, tRNA 3'-end processing. Members occur in Pseudomonadota.
