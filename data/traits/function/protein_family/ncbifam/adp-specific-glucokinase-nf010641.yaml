label: "ADP-specific glucokinase"
definition: >-
  ADP-specific glucokinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF010641 (equivalog); catalyses ADP-specific glucose/glucosamine kinase. Members occur in Thermococcaceae.
