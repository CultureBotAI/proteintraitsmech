  ATP-dependent glucokinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045551 (equivalog); catalyses glucokinase; associated with glucokinase activity, ATP binding, glucose metabolic process. Members occur in Thermoproteaceae.
