identifier: NCBIfam:NF047853
label: "tRNA(1)(Val) (adenine(37)-N(6))-methyltransferase TrmN"
definition: >-
  tRNA(1)(Val) (adenine(37)-N(6))-methyltransferase TrmN — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047853 (equivalog); catalyses tRNA1(Val) (adenine(37)-N(6))-methyltransferase; associated with nucleic acid binding, tRNA methylation, tRNA(Val) (adenine(37)-N6)-methyltransferase activity. Members occur in Enterobacterales.
