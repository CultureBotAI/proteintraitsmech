label: "phycobilisome degradation protein NblA"
definition: >-
  phycobilisome degradation protein NblA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045916 (equivalog); associated with phosphorelay sensor kinase activity, signal transduction, transferase activity, transferring phosphorus-containing groups. Members occur in Cyanophyceae.
