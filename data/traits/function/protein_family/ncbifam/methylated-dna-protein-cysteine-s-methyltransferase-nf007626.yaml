identifier: NCBIfam:NF007626
label: "methylated-DNA--[protein]-cysteine S-methyltransferase"
definition: >-
  methylated-DNA--[protein]-cysteine S-methyltransferase (ogt) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007626 (equivalog); catalyses methylated-DNA--[protein]-cysteine S-methyltransferase; associated with methylated-DNA-[protein]-cysteine S-methyltransferase activity, DNA repair. Members occur in Enterobacterales.
