  glyceraldehyde-3-phosphate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006139 (equivalog); catalyses glyceraldehyde-3-phosphate dehydrogenase (phosphorylating); associated with glucose metabolic process, oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor, NADP binding, NAD binding.
