  peptidylprolyl isomerase SurA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008038 (equivalog); associated with peptidyl-prolyl cis-trans isomerase activity, protein folding, outer membrane-bounded periplasmic space, peptide binding. Members occur in Gammaproteobacteria.
