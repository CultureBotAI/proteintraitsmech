label: "proteasome-activating nucleotidase Pan1"
definition: >-
  proteasome-activating nucleotidase Pan1 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047748 (equivalog); associated with proteasomal protein catabolic process, ATP hydrolysis activity, proteasome-activating nucleotidase complex. Members occur in Halobacteriales.
