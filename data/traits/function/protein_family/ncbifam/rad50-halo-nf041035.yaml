  DNA double-strand break repair ATPase Rad50 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041035 (equivalog); associated with ATP binding, double-strand break repair, ATP hydrolysis activity. Members occur in Halobacteriales.
