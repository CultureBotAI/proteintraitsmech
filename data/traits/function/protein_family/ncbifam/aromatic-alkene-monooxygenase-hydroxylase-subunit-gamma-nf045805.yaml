identifier: NCBIfam:NF045805
label: "aromatic/alkene monooxygenase hydroxylase subunit gamma"
definition: >-
  aromatic/alkene monooxygenase hydroxylase subunit gamma (mmoZ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045805 (equivalog); catalyses methane monooxygenase (soluble); associated with metabolic process, methane monooxygenase [NAD(P)H] activity. Members occur in Pseudomonadota.
