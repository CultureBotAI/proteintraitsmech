identifier: NCBIfam:NF011670
label: "PTS mannose transporter subunit IIAB"
definition: >-
  PTS mannose transporter subunit IIAB (manX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011670 (equivalog); catalyses protein-N(pi)-phosphohistidine--D-mannose phosphotransferase; associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system. Members occur in Gammaproteobacteria.
