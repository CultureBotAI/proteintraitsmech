identifier: NCBIfam:NF007604
label: "enterobactin synthase subunit EntD"
definition: >-
  enterobactin synthase subunit EntD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007604 (equivalog); catalyses enterobactin synthase; associated with magnesium ion binding, holo-[acyl-carrier-protein] synthase activity, enterobactin biosynthetic process, enterobactin synthetase complex. Members occur in Enterobacteriaceae.
