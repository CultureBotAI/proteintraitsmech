label: "bifunctional chorismate mutase/prephenate dehydratase"
definition: >-
  bifunctional chorismate mutase/prephenate dehydratase (pheA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007910 (equivalog); associated with chorismate mutase activity, prephenate dehydratase activity, L-phenylalanine biosynthetic process, chorismate metabolic process. Members occur in Enterobacterales.
