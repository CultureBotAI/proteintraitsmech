label: "RNA 2',3'-cyclic phosphodiesterase"
definition: >-
  RNA 2',3'-cyclic phosphodiesterase (thpR) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011704 (equivalog); catalyses RNA 2',3'-cyclic 3'-phosphodiesterase; associated with 2',3'-cyclic-nucleotide 3'-phosphodiesterase activity, RNA 2',3'-cyclic 3'-phosphodiesterase activity. Members occur in Enterobacterales.
