identifier: NCBIfam:NF045549
label: "geranylgeranyl diphosphate synthase IdsB"
definition: >-
  geranylgeranyl diphosphate synthase IdsB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045549 (equivalog); catalyses geranylgeranyl diphosphate synthase; associated with geranylgeranyl diphosphate synthase activity, prenyltransferase activity, isoprenoid biosynthetic process, geranylgeranyl diphosphate biosynthetic process. Members occur in Mycobacterium.
