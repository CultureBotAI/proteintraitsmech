identifier: NCBIfam:NF042966
label: "acetoacetyl-CoA reductase PhaB"
definition: >-
  acetoacetyl-CoA reductase PhaB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042966 (equivalog); catalyses acetoacetyl-CoA reductase; associated with oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, acetoacetyl-CoA reductase activity, fatty acid elongation, poly-hydroxybutyrate biosynthetic process. Members occur in Cyanophyceae.
