identifier: NCBIfam:NF009109
label: "3-deoxy-8-phosphooctulonate synthase"
definition: >-
  3-deoxy-8-phosphooctulonate synthase (kdsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009109 (equivalog); catalyses 3-deoxy-8-phosphooctulonate synthase; associated with 3-deoxy-8-phosphooctulonate synthase activity. Members occur in Pseudomonadota.
