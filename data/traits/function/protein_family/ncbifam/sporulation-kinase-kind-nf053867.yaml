definition: >-
  sporulation kinase KinD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053867 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, ATP binding, plasma membrane, signal transduction. Members occur in Bacillus.
