label: "nitrate/nitrite two-component system sensor histidine kinase NarX"
definition: >-
  nitrate/nitrite two-component system sensor histidine kinase NarX — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007896 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, membrane, protein dimerization activity. Members occur in Enterobacterales.
