label: "Rsd/AlgQ family anti-sigma factor"
definition: >-
  Rsd/AlgQ family anti-sigma factor — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF016256 (pfameq); associated with regulation of DNA-templated transcription, sigma factor antagonist activity. Members occur in Gammaproteobacteria.
