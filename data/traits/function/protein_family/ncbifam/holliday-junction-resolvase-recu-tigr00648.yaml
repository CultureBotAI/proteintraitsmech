identifier: NCBIfam:TIGR00648
label: "Holliday junction resolvase RecU"
definition: >-
  Holliday junction resolvase RecU — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00648 (equivalog); catalyses crossover junction endodeoxyribonuclease; associated with DNA repair, DNA recombination. Members occur in Bacillati.
