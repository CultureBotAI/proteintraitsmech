identifier: NCBIfam:NF047937
label: "DNA-binding transcriptional regulator NagC"
definition: >-
  DNA-binding transcriptional regulator NagC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047937 (equivalog); associated with DNA binding, DNA-binding transcription factor activity, regulation of DNA-templated transcription. Members occur in Gammaproteobacteria.
