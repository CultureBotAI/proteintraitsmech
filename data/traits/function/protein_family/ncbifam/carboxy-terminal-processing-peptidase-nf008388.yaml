identifier: NCBIfam:NF008388
label: "carboxy terminal-processing peptidase"
definition: >-
  carboxy terminal-processing peptidase (prc) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008388 (exception); catalyses C-terminal processing peptidase; associated with protein binding, proteolysis, serine-type peptidase activity. Members occur in Gammaproteobacteria.
