label: "Crp/Fnr family transcriptional regulator PtrA"
definition: >-
  Crp/Fnr family transcriptional regulator PtrA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053664 (equivalog); associated with DNA binding, DNA-binding transcription factor activity, regulation of DNA-templated transcription. Members occur in Cyanophyceae.
