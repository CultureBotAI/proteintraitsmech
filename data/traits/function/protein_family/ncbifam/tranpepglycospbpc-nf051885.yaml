identifier: NCBIfam:NF051885
label: "multimodular transpeptidase-transglycosylase PbpC"
definition: >-
  multimodular transpeptidase-transglycosylase PbpC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF051885 (equivalog); catalyses peptidoglycan glycosyltransferase; associated with penicillin binding, peptidoglycan glycosyltransferase activity, peptidoglycan biosynthetic process. Members occur in Alphaproteobacteria.
