definition: >-
  pca operon transcription factor PcaQ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02424 (equivalog); associated with DNA binding, 3,4-dihydroxybenzoate catabolic process, positive regulation of DNA-templated transcription. Members occur in Pseudomonadota.
