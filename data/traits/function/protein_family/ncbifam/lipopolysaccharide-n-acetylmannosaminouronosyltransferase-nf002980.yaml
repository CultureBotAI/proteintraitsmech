identifier: NCBIfam:NF002980
label: "lipopolysaccharide N-acetylmannosaminouronosyltransferase"
definition: >-
  lipopolysaccharide N-acetylmannosaminouronosyltransferase (wecG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002980 (equivalog); catalyses lipopolysaccharide N-acetylmannosaminouronosyltransferase; associated with lipopolysaccharide N-acetylmannosaminouronosyltransferase activity. Members occur in Gammaproteobacteria.
