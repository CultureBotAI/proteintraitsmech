  DNA polymerase IV (dinB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002677 (equivalog); catalyses DNA-directed DNA polymerase; associated with damaged DNA binding, DNA-directed DNA polymerase activity, DNA repair.
