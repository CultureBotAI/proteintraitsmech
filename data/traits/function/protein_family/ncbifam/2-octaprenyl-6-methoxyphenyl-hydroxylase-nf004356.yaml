identifier: NCBIfam:NF004356
label: "2-octaprenyl-6-methoxyphenyl hydroxylase"
definition: >-
  2-octaprenyl-6-methoxyphenyl hydroxylase (ubiH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004356 (equivalog); associated with ubiquinone biosynthetic process, 2-octaprenyl-6-methoxyphenol hydroxylase activity, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen, FAD binding. Members occur in Gammaproteobacteria.
