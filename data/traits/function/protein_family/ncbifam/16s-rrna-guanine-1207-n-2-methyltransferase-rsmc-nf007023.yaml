label: "16S rRNA (guanine(1207)-N(2))-methyltransferase RsmC"
definition: >-
  16S rRNA (guanine(1207)-N(2))-methyltransferase RsmC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007023 (equivalog); catalyses 16S rRNA (guanine(1207)-N(2))-methyltransferase; associated with nucleic acid binding, rRNA processing, rRNA (guanine-N2-)-methyltransferase activity, methylation. Members occur in Gammaproteobacteria.
