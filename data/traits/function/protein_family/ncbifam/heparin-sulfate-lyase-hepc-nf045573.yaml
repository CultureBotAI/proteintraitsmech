  heparin-sulfate lyase HepC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045573 (equivalog); catalyses heparin-sulfate lyase; associated with heparin-sulfate lyase activity. Members occur in Pseudomonadati.
