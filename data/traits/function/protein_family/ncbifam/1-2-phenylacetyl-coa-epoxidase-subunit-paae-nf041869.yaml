  1,2-phenylacetyl-CoA epoxidase subunit PaaE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041869 (equivalog); catalyses phenylacetyl-CoA 1,2-epoxidase; associated with phenylacetate catabolic process. Members occur in Halobacteriales.
