identifier: NCBIfam:NF007557
label: "D-alanyl-D-alanine dipeptidase"
definition: >-
  D-alanyl-D-alanine dipeptidase (ddpX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007557 (equivalog); catalyses D-Ala-D-Ala dipeptidase; associated with proteolysis, dipeptidase activity. Members occur in Pseudomonadati.
