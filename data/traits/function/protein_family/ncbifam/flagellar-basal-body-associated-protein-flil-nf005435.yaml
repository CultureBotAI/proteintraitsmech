label: "flagellar basal body-associated protein FliL"
definition: >-
  flagellar basal body-associated protein FliL — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005435 (equivalog); associated with chemotaxis, bacterial-type flagellum basal body, bacterial-type flagellum-dependent cell motility. Members occur in Pseudomonadota.
