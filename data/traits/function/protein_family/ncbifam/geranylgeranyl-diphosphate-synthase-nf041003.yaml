identifier: NCBIfam:NF041003
label: "geranylgeranyl diphosphate synthase"
definition: >-
  geranylgeranyl diphosphate synthase (gds) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041003 (equivalog); catalyses geranylgeranyl diphosphate synthase; associated with geranylgeranyl diphosphate synthase activity, geranylgeranyl diphosphate biosynthetic process, metal ion binding. Members occur in Sulfolobaceae.
