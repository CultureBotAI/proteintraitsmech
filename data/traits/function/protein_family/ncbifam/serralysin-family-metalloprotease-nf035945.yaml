identifier: NCBIfam:NF035945
label: "serralysin family metalloprotease"
definition: >-
  serralysin family metalloprotease — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF035945 (subfamily); catalyses serralysin; associated with metalloendopeptidase activity, extracellular region, proteolysis, metal ion binding. Members occur in Gammaproteobacteria.
