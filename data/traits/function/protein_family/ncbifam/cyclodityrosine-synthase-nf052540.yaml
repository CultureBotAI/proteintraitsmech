identifier: NCBIfam:NF052540
label: "cyclodityrosine synthase"
definition: >-
  cyclodityrosine synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052540 (equivalog); catalyses cyclo(L-tyrosyl-L-tyrosyl) synthase; associated with aminoacyltransferase activity, ligase activity, forming carbon-oxygen bonds. Members occur in Actinomycetes.
