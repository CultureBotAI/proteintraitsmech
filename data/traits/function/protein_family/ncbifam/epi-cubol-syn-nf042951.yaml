label: "4-epi-cubebol synthase"
definition: >-
  4-epi-cubebol synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042951 (equivalog); catalyses 4-epi-cubebol synthase; associated with terpenoid biosynthetic process, lyase activity. Members occur in Streptosporangiaceae.
