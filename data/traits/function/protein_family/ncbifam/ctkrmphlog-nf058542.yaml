definition: >-
  cytokinin riboside 5'-monophosphate phosphoribohydrolase (log) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058542 (equivalog); associated with cytokinin biosynthetic process, hydrolase activity, hydrolyzing N-glycosyl compounds, cytokinin riboside 5'-monophosphate phosphoribohydrolase activity. Members occur in Mycobacteriales.
