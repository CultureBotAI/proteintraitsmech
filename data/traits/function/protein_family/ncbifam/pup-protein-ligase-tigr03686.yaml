identifier: NCBIfam:TIGR03686
label: "Pup--protein ligase"
definition: >-
  Pup--protein ligase (pafA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03686 (equivalog); catalyses prokaryotic ubiquitin-like protein ligase; associated with proteasomal protein catabolic process, ligase activity, forming carbon-nitrogen bonds, modification-dependent protein catabolic process, protein pupylation.
