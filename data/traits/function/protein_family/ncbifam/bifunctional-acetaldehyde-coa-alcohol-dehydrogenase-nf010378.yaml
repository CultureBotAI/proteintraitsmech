identifier: NCBIfam:NF010378
label: "bifunctional acetaldehyde-CoA/alcohol dehydrogenase"
definition: >-
  bifunctional acetaldehyde-CoA/alcohol dehydrogenase (adhE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF010378 (equivalog); catalyses alcohol dehydrogenase, acetaldehyde dehydrogenase (acetylating); associated with alcohol dehydrogenase (NAD+) activity, alcohol metabolic process, carbon utilization, oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor.
