label: "dipeptide ABC transporter ATP-binding subunit DppF"
definition: >-
  dipeptide ABC transporter ATP-binding subunit DppF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043071 (equivalog); catalyses ABC-type dipeptide transporter; associated with membrane, dipeptide transport, dipeptide transmembrane transporter activity. Members occur in Enterobacterales.
