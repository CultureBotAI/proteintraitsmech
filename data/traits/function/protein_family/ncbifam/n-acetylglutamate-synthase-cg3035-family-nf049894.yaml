identifier: NCBIfam:NF049894
label: "N-acetylglutamate synthase, CG3035 family"
definition: >-
  N-acetylglutamate synthase, CG3035 family — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049894 (equivalog); catalyses amino-acid N-acetyltransferase; associated with L-glutamate N-acetyltransferase activity, acting on acetyl-CoA as donor, L-arginine biosynthetic process. Members occur in Mycobacteriales.
