identifier: NCBIfam:TIGR04146
label: "phosphoglycerol geranylgeranyltransferase"
definition: >-
  phosphoglycerol geranylgeranyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04146 (equivalog); catalyses phosphoglycerol geranylgeranyltransferase; associated with prenyltransferase activity, glycerophospholipid biosynthetic process. Members occur in Methanobacteriota.
