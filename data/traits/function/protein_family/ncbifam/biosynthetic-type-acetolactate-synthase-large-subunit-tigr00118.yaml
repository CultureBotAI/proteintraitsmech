identifier: NCBIfam:TIGR00118
label: "biosynthetic-type acetolactate synthase large subunit"
definition: >-
  biosynthetic-type acetolactate synthase large subunit (ilvB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00118 (equivalog); catalyses acetolactate synthase; associated with magnesium ion binding, acetolactate synthase activity, branched-chain amino acid biosynthetic process, thiamine pyrophosphate binding.
