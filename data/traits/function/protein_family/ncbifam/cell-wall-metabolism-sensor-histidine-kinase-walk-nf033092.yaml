identifier: NCBIfam:NF033092
label: "cell wall metabolism sensor histidine kinase WalK"
definition: >-
  cell wall metabolism sensor histidine kinase WalK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033092 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, signal transduction, membrane, phosphorylation. Members occur in Bacillota.
