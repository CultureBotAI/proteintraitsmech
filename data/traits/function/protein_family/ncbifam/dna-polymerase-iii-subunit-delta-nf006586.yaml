identifier: NCBIfam:NF006586
label: "DNA polymerase III subunit delta'"
definition: >-
  DNA polymerase III subunit delta' — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006586 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA-directed DNA polymerase activity, DNA replication, 3'-5' exonuclease activity. Members occur in Alphaproteobacteria.
