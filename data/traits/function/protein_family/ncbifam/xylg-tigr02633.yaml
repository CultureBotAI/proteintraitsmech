identifier: NCBIfam:TIGR02633
label: "D-xylose ABC transporter ATP-binding protein"
definition: >-
  D-xylose ABC transporter ATP-binding protein (xylG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02633 (equivalog); catalyses ABC-type D-xylose transporter; associated with ATP binding, ABC-type D-xylose transporter activity, D-xylose transmembrane transport, membrane. Members occur in Pseudomonadota.
