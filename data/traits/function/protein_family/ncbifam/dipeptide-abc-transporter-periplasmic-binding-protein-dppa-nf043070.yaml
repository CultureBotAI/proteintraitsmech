label: "dipeptide ABC transporter periplasmic-binding protein DppA"
definition: >-
  dipeptide ABC transporter periplasmic-binding protein DppA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043070 (equivalog); catalyses ABC-type dipeptide transporter; associated with outer membrane-bounded periplasmic space, dipeptide transport, dipeptide transmembrane transporter activity. Members occur in Enterobacterales.
