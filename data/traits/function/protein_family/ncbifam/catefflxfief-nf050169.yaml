identifier: NCBIfam:NF050169
label: "cation efflux pump FieF"
definition: >-
  cation efflux pump FieF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050169 (equivalog); associated with cadmium ion transmembrane transporter activity, ferrous iron transmembrane transporter activity, zinc efflux antiporter activity. Members occur in Gammaproteobacteria.
