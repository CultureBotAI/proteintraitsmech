label: "phosphonate metabolism protein PhnP"
definition: >-
  phosphonate metabolism protein PhnP — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03307 (equivalog); catalyses phosphoribosyl 1,2-cyclic phosphate phosphodiesterase; associated with phosphoric diester hydrolase activity, organic phosphonate catabolic process. Members occur in Gammaproteobacteria.
