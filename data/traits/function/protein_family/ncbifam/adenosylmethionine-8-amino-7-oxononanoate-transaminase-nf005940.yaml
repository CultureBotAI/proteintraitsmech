label: "adenosylmethionine--8-amino-7-oxononanoate transaminase"
definition: >-
  adenosylmethionine--8-amino-7-oxononanoate transaminase (bioA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005940 (equivalog); catalyses adenosylmethionine--8-amino-7-oxononanoate transaminase; associated with S-adenosyl-L-methionine:8-amino-7-oxononanoate transaminase activity, biotin biosynthetic process, pyridoxal phosphate binding. Members occur in Pseudomonadati.
