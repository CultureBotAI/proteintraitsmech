identifier: NCBIfam:TIGR02651
label: "ribonuclease Z"
definition: >-
  ribonuclease Z (rnz) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02651 (equivalog); catalyses ribonuclease Z; associated with RNA endonuclease activity producing 5'-phosphomonoesters, hydrolytic mechanism, tRNA 3'-end processing.
