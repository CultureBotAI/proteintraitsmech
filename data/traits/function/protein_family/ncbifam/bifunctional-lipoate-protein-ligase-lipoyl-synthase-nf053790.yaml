label: "bifunctional lipoate--protein ligase/lipoyl synthase"
definition: >-
  bifunctional lipoate--protein ligase/lipoyl synthase (lplA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053790 (exception); catalyses lipoyl synthase, lipoate--protein ligase; associated with lipoate biosynthetic process, lipoate-protein ligase activity, lipoate synthase activity. Members occur in Bacteroidales.
