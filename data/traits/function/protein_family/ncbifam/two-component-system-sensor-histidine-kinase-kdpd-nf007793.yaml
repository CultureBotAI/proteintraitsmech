identifier: NCBIfam:NF007793
label: "two-component system sensor histidine kinase KdpD"
definition: >-
  two-component system sensor histidine kinase KdpD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007793 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system. Members occur in Enterobacterales.
