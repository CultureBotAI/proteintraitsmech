identifier: NCBIfam:NF045701
label: "NAD(P)-dependent benzaldehyde dehydrogenase MdlD"
definition: >-
  NAD(P)-dependent benzaldehyde dehydrogenase MdlD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045701 (equivalog); catalyses benzaldehyde dehydrogenase (NAD(+)); associated with aldehyde metabolic process, benzaldehyde dehydrogenase (NADP+) activity, benzaldehyde dehydrogenase (NAD+) activity. Members occur in Pseudomonadati.
