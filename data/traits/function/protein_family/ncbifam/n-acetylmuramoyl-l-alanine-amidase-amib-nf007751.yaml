  N-acetylmuramoyl-L-alanine amidase AmiB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007751 (equivalog); catalyses N-acetylmuramoyl-L-alanine amidase; associated with N-acetylmuramoyl-L-alanine amidase activity, peptidoglycan catabolic process. Members occur in Enterobacterales.
