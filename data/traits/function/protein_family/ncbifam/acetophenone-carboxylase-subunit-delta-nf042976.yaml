identifier: NCBIfam:NF042976
label: "acetophenone carboxylase subunit delta"
definition: >-
  acetophenone carboxylase subunit delta (apcD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042976 (equivalog); catalyses acetophenone carboxylase; associated with ATP binding, ligase activity. Members occur in Pseudomonadota.
