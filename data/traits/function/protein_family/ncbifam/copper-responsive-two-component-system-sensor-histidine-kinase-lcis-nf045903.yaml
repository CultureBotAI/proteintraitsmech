identifier: NCBIfam:NF045903
label: "copper-responsive two-component system sensor histidine kinase LciS"
definition: >-
  copper-responsive two-component system sensor histidine kinase LciS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045903 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, signal transduction, phosphorylation, transferase activity, transferring phosphorus-containing groups. Members occur in Legionella pneumophila.
