identifier: NCBIfam:NF002492
label: "DNA polymerase IV"
definition: >-
  DNA polymerase IV — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002492 (equivalog); catalyses DNA-directed DNA polymerase; associated with damaged DNA binding, DNA-directed DNA polymerase activity, DNA repair. Members occur in Bacillati.
