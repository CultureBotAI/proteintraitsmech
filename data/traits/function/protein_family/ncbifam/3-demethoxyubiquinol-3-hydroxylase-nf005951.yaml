identifier: NCBIfam:NF005951
label: "3-demethoxyubiquinol 3-hydroxylase"
definition: >-
  3-demethoxyubiquinol 3-hydroxylase (ubiF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005951 (equivalog); catalyses 3-demethoxyubiquinol 3-hydroxylase; associated with ubiquinone biosynthetic process, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen. Members occur in Enterobacterales.
