identifier: NCBIfam:NF005998
label: "bifunctional UDP-4-amino-4-deoxy-L-arabinose formyltransferase/UDP-glucuronic acid oxidase ArnA"
definition: >-
  bifunctional UDP-4-amino-4-deoxy-L-arabinose formyltransferase/UDP-glucuronic acid oxidase ArnA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005998 (equivalog); catalyses UDP-glucuronic acid oxidase (UDP-4-keto-hexauronic acid decarboxylating), UDP-4-amino-4-deoxy-L-arabinose formyltransferase; associated with biosynthetic process, hydroxymethyl-, formyl- and related transferase activity. Members occur in Gammaproteobacteria.
