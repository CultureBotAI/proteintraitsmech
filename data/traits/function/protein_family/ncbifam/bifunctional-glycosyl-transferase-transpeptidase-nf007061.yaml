identifier: NCBIfam:NF007061
label: "bifunctional glycosyl transferase/transpeptidase"
definition: >-
  bifunctional glycosyl transferase/transpeptidase (mrcB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007061 (equivalog); catalyses peptidoglycan glycosyltransferase; associated with penicillin binding, peptidoglycan glycosyltransferase activity, peptidoglycan biosynthetic process, peptidoglycan-based cell wall. Members occur in Enterobacterales.
