definition: >-
  DNA topoisomerase III (topB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01056 (subfamily); catalyses DNA topoisomerase; associated with DNA binding, DNA topoisomerase type I (single strand cut, ATP-independent) activity, DNA topological change.
