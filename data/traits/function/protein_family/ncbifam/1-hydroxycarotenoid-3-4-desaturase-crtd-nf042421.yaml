label: "1-hydroxycarotenoid 3,4-desaturase CrtD"
definition: >-
  1-hydroxycarotenoid 3,4-desaturase CrtD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042421 (equivalog); catalyses 1-hydroxycarotenoid 3,4-desaturase; associated with carotenoid biosynthetic process, oxidoreductase activity. Members occur in Pseudomonadati.
