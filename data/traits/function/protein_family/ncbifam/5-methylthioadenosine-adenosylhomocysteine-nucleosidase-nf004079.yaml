label: "5'-methylthioadenosine/adenosylhomocysteine nucleosidase"
definition: >-
  5'-methylthioadenosine/adenosylhomocysteine nucleosidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004079 (equivalog); catalyses adenosylhomocysteine nucleosidase; associated with adenosylhomocysteine nucleosidase activity, methylthioadenosine nucleosidase activity, nucleoside metabolic process, nucleoside catabolic process.
