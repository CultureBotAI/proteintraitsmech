identifier: NCBIfam:NF052646
label: "L-2,4-diaminobutyrate decarboxylase"
definition: >-
  L-2,4-diaminobutyrate decarboxylase (rhbB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052646 (equivalog); catalyses diaminobutyrate decarboxylase; associated with cytoplasm, rhizobactin 1021 biosynthetic process, pyridoxal phosphate binding, diaminobutyrate decarboxylase activity. Members occur in Rhizobiaceae.
