identifier: NCBIfam:NF040818
label: "glyceraldehyde-3-phosphate:ferredoxin oxidoreductase"
definition: >-
  glyceraldehyde-3-phosphate:ferredoxin oxidoreductase (gor) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040818 (equivalog); catalyses glyceraldehyde-3-phosphate dehydrogenase (ferredoxin); associated with regulation of glycolytic process, glyceraldehyde-3-phosphate dehydrogenase (ferredoxin) activity, 4 iron, 4 sulfur cluster binding. Members occur in Thermococcaceae.
