identifier: NCBIfam:NF041658
label: "ornithine lipid N-methyltransferase"
definition: >-
  ornithine lipid N-methyltransferase (olsG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041658 (equivalog); catalyses ornithine lipid N-methyltransferase; associated with rRNA (adenine-N6,N6-)-dimethyltransferase activity. Members occur in Isosphaeraceae.
