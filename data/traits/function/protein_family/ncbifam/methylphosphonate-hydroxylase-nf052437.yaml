label: "methylphosphonate hydroxylase"
definition: >-
  methylphosphonate hydroxylase (phnY) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052437 (equivalog); catalyses methylphosphonate hydroxylase; associated with iron ion binding, 2-oxoglutarate-dependent dioxygenase activity. Members occur in Planctomycetia.
