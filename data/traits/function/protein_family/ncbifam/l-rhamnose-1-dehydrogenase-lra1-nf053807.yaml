identifier: NCBIfam:NF053807
label: "L-rhamnose 1-dehydrogenase Lra1"
definition: >-
  L-rhamnose 1-dehydrogenase Lra1 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053807 (equivalog); catalyses L-rhamnose 1-dehydrogenase [NAD(P)(+)]; associated with nucleotide binding, fatty acid biosynthetic process, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, rhamnose catabolic process.
