  glutamate--cysteine ligase (gshA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02049 (equivalog); catalyses glutamate--cysteine ligase; associated with glutamate-cysteine ligase activity, glutathione biosynthetic process. Members occur in Pseudomonadati.
