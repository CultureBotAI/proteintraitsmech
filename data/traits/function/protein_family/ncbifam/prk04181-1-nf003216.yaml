definition: >-
  4-(cytidine 5'-diphospho)-2-C-methyl-D-erythritol kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003216 (equivalog); catalyses 4-(cytidine 5'-diphospho)-2-C-methyl-D-erythritol kinase; associated with ATP binding, terpenoid biosynthetic process, 4-(cytidine 5'-diphospho)-2-C-methyl-D-erythritol kinase activity. Members occur in Campylobacterales.
