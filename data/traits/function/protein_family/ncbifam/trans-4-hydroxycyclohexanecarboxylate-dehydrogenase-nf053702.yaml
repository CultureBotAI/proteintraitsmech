identifier: NCBIfam:NF053702
label: "trans-4-hydroxycyclohexanecarboxylate dehydrogenase"
definition: >-
  trans-4-hydroxycyclohexanecarboxylate dehydrogenase (chcB1) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053702 (equivalog); catalyses trans-4-hydroxycyclohexanecarboxylate dehydrogenase; associated with 4-hydroxycyclohexanecarboxylate dehydrogenase activity. Members occur in Actinomycetes.
