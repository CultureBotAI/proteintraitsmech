label: "L-proline-binding transcription factor PsrA"
definition: >-
  L-proline-binding transcription factor PsrA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052633 (exception); associated with DNA-binding transcription factor activity, proline binding, regulation of DNA-templated transcription initiation. Members occur in Enterobacterales.
