identifier: NCBIfam:NF006959
label: "bifunctional aspartate kinase/homoserine dehydrogenase I"
definition: >-
  bifunctional aspartate kinase/homoserine dehydrogenase I (thrA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006959 (equivalog); catalyses homoserine dehydrogenase, aspartate kinase; associated with aspartate kinase activity, homoserine dehydrogenase activity, amino acid biosynthetic process, aspartate family amino acid biosynthetic process. Members occur in Pseudomonadati.
