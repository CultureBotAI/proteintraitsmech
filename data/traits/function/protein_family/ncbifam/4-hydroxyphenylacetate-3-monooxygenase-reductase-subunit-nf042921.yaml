identifier: NCBIfam:NF042921
label: "4-hydroxyphenylacetate 3-monooxygenase reductase subunit"
definition: >-
  4-hydroxyphenylacetate 3-monooxygenase reductase subunit (hpaC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042921 (equivalog); catalyses flavin reductase (NADH); associated with catabolic process, FMN binding, flavin reductase (NADH) activity. Members occur in Thermaceae.
