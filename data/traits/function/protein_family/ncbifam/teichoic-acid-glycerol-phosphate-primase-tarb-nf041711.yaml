identifier: NCBIfam:NF041711
label: "teichoic acid glycerol-phosphate primase TarB"
definition: >-
  teichoic acid glycerol-phosphate primase TarB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041711 (equivalog); catalyses teichoic acid glycerol-phosphate primase; associated with teichoic acid biosynthetic process, CDP-glycerol glycerophosphotransferase activity. Members occur in Staphylococcus.
