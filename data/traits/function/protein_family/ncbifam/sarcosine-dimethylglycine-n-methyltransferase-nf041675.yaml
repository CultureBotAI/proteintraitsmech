identifier: NCBIfam:NF041675
label: "sarcosine/dimethylglycine N-methyltransferase"
definition: >-
  sarcosine/dimethylglycine N-methyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041675 (equivalog); catalyses sarcosine/dimethylglycine N-methyltransferase; associated with glycine betaine biosynthetic process, dimethylglycine N-methyltransferase activity, sarcosine N-methyltransferase activity. Members occur in Halorhodospira.
