identifier: NCBIfam:NF006277
label: "dehypoxanthine futalosine cyclase"
definition: >-
  dehypoxanthine futalosine cyclase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006277 (equivalog); associated with menaquinone biosynthetic process, transferase activity, transferring alkyl or aryl (other than methyl) groups, iron-sulfur cluster binding. Members occur in Campylobacterales.
