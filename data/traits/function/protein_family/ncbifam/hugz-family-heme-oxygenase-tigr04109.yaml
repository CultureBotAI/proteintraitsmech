label: "HugZ family heme oxygenase"
definition: >-
  HugZ family heme oxygenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04109 (equivalog); catalyses heme oxygenase (biliverdin-producing); associated with heme oxygenase (decyclizing) activity, heme catabolic process. Members occur in Pseudomonadati.
