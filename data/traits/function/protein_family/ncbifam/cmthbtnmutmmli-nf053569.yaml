label: "4-carboxymethyl-4-methylbutenolide mutase MmlI"
definition: >-
  4-carboxymethyl-4-methylbutenolide mutase MmlI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053569 (equivalog); catalyses 4-carboxymethyl-4-methylbutenolide mutase; associated with isomerase activity. Members occur in Pseudomonadota.
