identifier: NCBIfam:NF053744
label: "CYP152 family fatty-acid peroxygenase CypC"
definition: >-
  CYP152 family fatty-acid peroxygenase CypC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053744 (equivalog); catalyses fatty-acid peroxygenase; associated with monooxygenase activity, iron ion binding, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, heme binding.
