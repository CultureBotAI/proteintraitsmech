identifier: NCBIfam:TIGR01702
label: "anaerobic carbon-monoxide dehydrogenase catalytic subunit"
definition: >-
  anaerobic carbon-monoxide dehydrogenase catalytic subunit (cooS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01702 (equivalog); catalyses anaerobic carbon-monoxide dehydrogenase; associated with generation of precursor metabolites and energy, nickel cation binding, anaerobic carbon-monoxide dehydrogenase activity, 4 iron, 4 sulfur cluster binding.
