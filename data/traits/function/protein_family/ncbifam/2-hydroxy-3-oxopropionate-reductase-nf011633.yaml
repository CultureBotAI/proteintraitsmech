identifier: NCBIfam:NF011633
label: "2-hydroxy-3-oxopropionate reductase"
definition: >-
  2-hydroxy-3-oxopropionate reductase (glxR) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011633 (equivalog); catalyses 2-hydroxy-3-oxopropionate reductase; associated with 2-hydroxy-3-oxopropionate reductase activity, glyoxylate metabolic process, NAD binding. Members occur in Pseudomonadota.
