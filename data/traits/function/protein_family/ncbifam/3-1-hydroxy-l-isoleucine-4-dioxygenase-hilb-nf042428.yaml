identifier: NCBIfam:NF042428
label: "3(1)-hydroxy-L-isoleucine 4-dioxygenase HilB"
definition: >-
  3(1)-hydroxy-L-isoleucine 4-dioxygenase HilB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042428 (equivalog); catalyses 3(1)-hydroxy-L-isoleucine 4-dioxygenase; associated with L-ascorbic acid binding, dioxygenase activity. Members occur in Enterobacterales.
