label: "2-hydroxymuconic semialdehyde dehydrogenase"
definition: >-
  2-hydroxymuconic semialdehyde dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03216 (equivalog); catalyses 2-hydroxymuconate-6-semialdehyde dehydrogenase; associated with oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor.
