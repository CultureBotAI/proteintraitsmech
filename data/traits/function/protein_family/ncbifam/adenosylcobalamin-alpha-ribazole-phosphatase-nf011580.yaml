identifier: NCBIfam:NF011580
label: "adenosylcobalamin/alpha-ribazole phosphatase"
definition: >-
  adenosylcobalamin/alpha-ribazole phosphatase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011580 (equivalog); catalyses adenosylcobalamin/alpha-ribazole phosphatase; associated with cobalamin biosynthetic process, alpha-ribazole phosphatase activity. Members occur in Enterobacteriaceae.
