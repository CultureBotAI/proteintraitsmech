label: "DNA-directed RNA polymerase subunit beta"
definition: >-
  DNA-directed RNA polymerase subunit beta (rpoB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF001616 (equivalog); catalyses DNA-directed RNA polymerase; associated with DNA binding, DNA-directed RNA polymerase activity, DNA-templated transcription, ribonucleoside binding.
