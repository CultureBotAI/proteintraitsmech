identifier: NCBIfam:TIGR03461
label: "aminodeoxychorismate lyase"
definition: >-
  aminodeoxychorismate lyase (pabC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03461 (equivalog); catalyses aminodeoxychorismate lyase; associated with 4-amino-4-deoxychorismate lyase activity, pyridoxal phosphate binding, folic acid biosynthetic process. Members occur in Pseudomonadota.
