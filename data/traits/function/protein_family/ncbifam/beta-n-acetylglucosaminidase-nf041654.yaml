identifier: NCBIfam:NF041654
label: beta-N-acetylglucosaminidase
definition: >-
  beta-N-acetylglucosaminidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041654 (equivalog); catalyses protein O-GlcNAcase; associated with carbohydrate metabolic process, beta-N-acetylglucosaminidase activity. Members occur in Bacteroidota.
