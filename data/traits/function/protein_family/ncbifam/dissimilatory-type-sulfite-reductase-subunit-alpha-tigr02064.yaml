label: "dissimilatory-type sulfite reductase subunit alpha"
definition: >-
  dissimilatory-type sulfite reductase subunit alpha (dsrA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02064 (equivalog); catalyses dissimilatory sulfite reductase; associated with dissimilatory sulfite reductase (NADH) activity, heme binding, 4 iron, 4 sulfur cluster binding.
