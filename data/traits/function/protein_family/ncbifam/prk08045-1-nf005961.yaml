  cystathionine gamma-synthase (metB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005961 (equivalog); catalyses cystathionine gamma-synthase; associated with catalytic activity, transsulfuration, pyridoxal phosphate binding. Members occur in Enterobacterales.
