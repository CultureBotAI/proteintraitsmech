identifier: NCBIfam:NF047902
label: "methylmalonyl-CoA decarboxylase subunit delta"
definition: >-
  methylmalonyl-CoA decarboxylase subunit delta (mmdD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047902 (equivalog); catalyses (S)-methylmalonyl-CoA decarboxylase (sodium-transporting); associated with sodium ion transmembrane transporter activity, sodium ion export across plasma membrane. Members occur in Veillonella.
