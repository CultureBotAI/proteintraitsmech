identifier: NCBIfam:TIGR02711
label: "cation/acetate symporter ActP"
definition: >-
  cation/acetate symporter ActP — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02711 (equivalog); associated with plasma membrane, sodium ion transport, acetate transmembrane transporter activity, solute:sodium symporter activity. Members occur in Enterobacterales.
