definition: >-
  envelope stress response regulator BaeR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007982 (equivalog); associated with phosphorelay signal transduction system, DNA-binding transcription factor activity, regulation of DNA-templated transcription initiation. Members occur in Enterobacterales.
