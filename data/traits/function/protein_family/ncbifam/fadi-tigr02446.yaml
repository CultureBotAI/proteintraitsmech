  acetyl-CoA C-acyltransferase FadI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02446 (equivalog); catalyses acetyl-CoA C-acyltransferase; associated with acetyl-CoA C-acyltransferase activity, cytoplasm, fatty acid metabolic process, lipid catabolic process. Members occur in Gammaproteobacteria.
