definition: >-
  carbonic anhydrase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040597 (equivalog); catalyses carbonic anhydrase; associated with carbonate dehydratase activity, zinc ion binding. Members occur in Methanosarcinaceae.
