label: "3-phenylpropionate/cinnamic acid dioxygenase ferredoxin--NAD(+) reductase subunit"
definition: >-
  3-phenylpropionate/cinnamic acid dioxygenase ferredoxin--NAD(+) reductase subunit (hcaD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042949 (equivalog); catalyses ferredoxin--NAD(+) reductase; associated with 3-phenylpropionate dioxygenase activity, ferredoxin-NAD+ reductase activity, 3-phenylpropionate catabolic process. Members occur in Gammaproteobacteria.
