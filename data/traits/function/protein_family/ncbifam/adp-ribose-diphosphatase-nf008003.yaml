identifier: NCBIfam:NF008003
label: "ADP-ribose diphosphatase"
definition: >-
  ADP-ribose diphosphatase (nudF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008003 (equivalog); catalyses ADP-ribose diphosphatase; associated with hydrolase activity, metal ion binding. Members occur in Gammaproteobacteria.
