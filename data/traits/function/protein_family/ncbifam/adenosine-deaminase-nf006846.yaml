identifier: NCBIfam:NF006846
label: "adenosine deaminase"
definition: >-
  adenosine deaminase (add) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006846 (equivalog); catalyses adenosine deaminase; associated with adenosine deaminase activity, purine ribonucleoside monophosphate biosynthetic process. Members occur in Gammaproteobacteria.
