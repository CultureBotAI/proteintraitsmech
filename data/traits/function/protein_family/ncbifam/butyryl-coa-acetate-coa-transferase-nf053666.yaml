label: "butyryl-CoA:acetate CoA transferase"
definition: >-
  butyryl-CoA:acetate CoA transferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053666 (equivalog); associated with acetate metabolic process, acetyl-CoA metabolic process, CoA-transferase activity, acetate CoA-transferase activity. Members occur in Pseudomonadati.
