identifier: NCBIfam:NF004350
label: "thiamine-phosphate kinase"
definition: >-
  thiamine-phosphate kinase (thiL) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004350 (equivalog); catalyses thiamine-phosphate kinase; associated with thiamine-phosphate kinase activity, thiamine biosynthetic process. Members occur in Gammaproteobacteria.
