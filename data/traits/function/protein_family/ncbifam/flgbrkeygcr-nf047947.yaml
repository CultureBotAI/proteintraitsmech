definition: >-
  flagellar brake protein YcgR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047947 (equivalog); associated with cyclic-di-GMP binding, regulation of bacterial-type flagellum-dependent cell motility by regulation of motor speed. Members occur in Enterobacteriaceae.
