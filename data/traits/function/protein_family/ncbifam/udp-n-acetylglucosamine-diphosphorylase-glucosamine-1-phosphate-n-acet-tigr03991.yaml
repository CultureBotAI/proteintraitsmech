label: "UDP-N-acetylglucosamine diphosphorylase/glucosamine-1-phosphate N-acetyltransferase"
definition: >-
  UDP-N-acetylglucosamine diphosphorylase/glucosamine-1-phosphate N-acetyltransferase (glmU) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03991 (hypoth_equivalog); catalyses glucosamine-1-phosphate N-acetyltransferase, UDP-N-acetylglucosamine diphosphorylase; associated with UDP-N-acetylglucosamine diphosphorylase activity, peptidoglycan biosynthetic process, glucosamine-1-phosphate N-acetyltransferase activity.
