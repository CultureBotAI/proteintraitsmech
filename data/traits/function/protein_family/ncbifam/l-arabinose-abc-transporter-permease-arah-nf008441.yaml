identifier: NCBIfam:NF008441
label: "L-arabinose ABC transporter permease AraH"
definition: >-
  L-arabinose ABC transporter permease AraH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008441 (equivalog); catalyses ABC-type L-arabinose transporter; associated with membrane, transmembrane transporter activity, transmembrane transport. Members occur in Pseudomonadota.
