identifier: NCBIfam:NF045765
label: "NADH-dependent phenylglyoxylate dehydrogenase subunit epsilon"
definition: >-
  NADH-dependent phenylglyoxylate dehydrogenase subunit epsilon (padH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045765 (equivalog); catalyses phenylglyoxylate dehydrogenase (acylating); associated with phenylglyoxylate dehydrogenase (acylating) activity. Members occur in Pseudomonadati.
