identifier: NCBIfam:NF050023
label: "7alpha-hydroxysteroid dehydrogenase"
definition: >-
  7alpha-hydroxysteroid dehydrogenase (hdhA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050023 (equivalog); catalyses 7alpha-hydroxysteroid dehydrogenase; associated with cholate 7-alpha-dehydrogenase (NAD+) activity, lipid catabolic process, bile acid catabolic process. Members occur in Bacteroides.
