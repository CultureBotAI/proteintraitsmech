identifier: NCBIfam:TIGR03574
label: "L-seryl-tRNA(Sec) kinase"
definition: >-
  L-seryl-tRNA(Sec) kinase (pstK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03574 (equivalog); catalyses O-phosphoseryl-tRNA(Sec) kinase; associated with conversion of seryl-tRNAsec to selenocys-tRNAsec, kinase activity, phosphotransferase activity, alcohol group as acceptor. Members occur in Methanomada group.
