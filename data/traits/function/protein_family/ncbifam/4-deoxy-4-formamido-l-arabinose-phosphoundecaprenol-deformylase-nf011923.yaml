definition: >-
  4-deoxy-4-formamido-L-arabinose-phosphoundecaprenol deformylase (arnD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011923 (equivalog); associated with hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds. Members occur in Gammaproteobacteria.
