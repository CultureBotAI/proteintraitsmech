identifier: NCBIfam:NF047794
label: "two-component system sensor histidine kinase PgtB"
definition: >-
  two-component system sensor histidine kinase PgtB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047794 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, ATP binding. Members occur in Enterobacterales.
