label: "alanine--anticapsin ligase"
definition: >-
  alanine--anticapsin ligase (bacD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053745 (equivalog); catalyses L-alanine--L-anticapsin ligase; associated with ATP binding, antibiotic biosynthetic process, L-amino-acid alpha-ligase activity, metal ion binding. Members occur in Bacillus.
