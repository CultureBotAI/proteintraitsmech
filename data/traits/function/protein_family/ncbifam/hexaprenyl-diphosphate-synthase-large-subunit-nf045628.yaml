identifier: NCBIfam:NF045628
label: "hexaprenyl-diphosphate synthase large subunit"
definition: >-
  hexaprenyl-diphosphate synthase large subunit (hexs-b) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045628 (equivalog); catalyses hexaprenyl-diphosphate synthase [(2E,6E)-farnesyl-diphosphate specific]; associated with isoprenoid biosynthetic process, menaquinone biosynthetic process, transferase activity, transferring alkyl or aryl (other than methyl) groups, hexaprenyl-diphosphate synthase ((2E,6E)-farnesyl-diphosphate specific) activity. Members occur in Staphylococcaceae.
