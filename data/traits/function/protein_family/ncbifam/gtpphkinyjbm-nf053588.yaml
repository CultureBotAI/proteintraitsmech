identifier: NCBIfam:NF053588
label: "GTP diphosphokinase"
definition: >-
  GTP diphosphokinase (yjbM) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053588 (equivalog); catalyses GTP diphosphokinase; associated with GTP binding, GTP diphosphokinase activity, guanosine tetraphosphate biosynthetic process, kinase activity. Members occur in Bacillota.
