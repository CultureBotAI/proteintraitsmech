label: "lipoyl-[GcvH]:protein N-lipoyltransferase"
definition: >-
  lipoyl-[GcvH]:protein N-lipoyltransferase (lipL) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047857 (equivalog); catalyses lipoyl amidotransferase; associated with lipoate biosynthetic process, lipoyltransferase activity. Members occur in Listeria.
