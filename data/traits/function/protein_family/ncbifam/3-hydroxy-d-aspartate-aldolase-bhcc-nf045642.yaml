identifier: NCBIfam:NF045642
label: "3-hydroxy-D-aspartate aldolase BhcC"
definition: >-
  3-hydroxy-D-aspartate aldolase BhcC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045642 (equivalog); catalyses 3-hydroxy-D-aspartate aldolase; associated with glyoxylate catabolic process, oxo-acid-lyase activity, glycolate catabolic process. Members occur in Pseudomonadota.
