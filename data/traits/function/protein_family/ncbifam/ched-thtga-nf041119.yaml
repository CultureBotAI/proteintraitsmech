identifier: NCBIfam:NF041119
label: "chemoreceptor glutamine deamidase/glutamate methylesterase CheD"
definition: >-
  chemoreceptor glutamine deamidase/glutamate methylesterase CheD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041119 (equivalog); catalyses protein-glutamate methylesterase, protein-glutamine glutaminase; associated with chemotaxis, protein-glutamate methylesterase activity, protein-glutamine glutaminase activity. Members occur in Thermotogae.
