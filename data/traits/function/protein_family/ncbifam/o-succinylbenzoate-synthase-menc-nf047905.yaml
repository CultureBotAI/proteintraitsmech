label: "o-succinylbenzoate synthase MenC"
definition: >-
  o-succinylbenzoate synthase MenC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047905 (equivalog); catalyses o-succinylbenzoate synthase; associated with menaquinone biosynthetic process, lyase activity, phylloquinone biosynthetic process, metal ion binding. Members occur in Bdellovibrio.
