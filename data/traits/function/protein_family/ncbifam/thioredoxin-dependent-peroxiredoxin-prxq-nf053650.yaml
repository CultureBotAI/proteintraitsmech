identifier: NCBIfam:NF053650
label: "thioredoxin-dependent peroxiredoxin PrxQ"
definition: >-
  thioredoxin-dependent peroxiredoxin PrxQ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053650 (equivalog); catalyses thioredoxin-dependent peroxiredoxin; associated with antioxidant activity, oxidoreductase activity. Members occur in Deinococcaceae.
