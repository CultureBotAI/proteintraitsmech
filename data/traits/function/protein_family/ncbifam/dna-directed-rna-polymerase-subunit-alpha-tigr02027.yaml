label: "DNA-directed RNA polymerase subunit alpha"
definition: >-
  DNA-directed RNA polymerase subunit alpha (rpoA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02027 (equivalog); catalyses DNA-directed RNA polymerase; associated with DNA binding, DNA-directed RNA polymerase activity, DNA-templated transcription.
