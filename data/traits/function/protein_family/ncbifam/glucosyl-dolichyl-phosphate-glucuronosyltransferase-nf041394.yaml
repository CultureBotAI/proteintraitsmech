identifier: NCBIfam:NF041394
label: "glucosyl-dolichyl phosphate glucuronosyltransferase"
definition: >-
  glucosyl-dolichyl phosphate glucuronosyltransferase (aglG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041394 (equivalog); catalyses glucosyl-dolichyl phosphate glucuronosyltransferase; associated with glycosyltransferase activity, S-layer organization. Members occur in Halobacteria.
