identifier: NCBIfam:NF041578
label: "beta-L-arabinobiosidase HypBA2"
definition: >-
  beta-L-arabinobiosidase HypBA2 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041578 (equivalog); catalyses (Ara-f)3-Hyp beta-L-arabinobiosidase; associated with polysaccharide catabolic process, hydrolase activity, acting on glycosyl bonds. Members occur in Bifidobacterium.
