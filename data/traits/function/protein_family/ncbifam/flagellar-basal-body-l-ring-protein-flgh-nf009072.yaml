label: "flagellar basal body L-ring protein FlgH"
definition: >-
  flagellar basal body L-ring protein FlgH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009072 (equivalog); associated with cytoskeletal motor activity, bacterial-type flagellum basal body, distal rod, L ring, bacterial-type flagellum-dependent cell motility. Members occur in Gammaproteobacteria.
