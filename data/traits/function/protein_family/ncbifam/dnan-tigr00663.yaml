definition: >-
  DNA polymerase III subunit beta (dnaN) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00663 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA binding, DNA-directed DNA polymerase activity, DNA replication, DNA polymerase III complex.
