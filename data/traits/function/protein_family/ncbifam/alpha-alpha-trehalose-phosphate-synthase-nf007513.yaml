label: "alpha,alpha-trehalose-phosphate synthase"
definition: >-
  alpha,alpha-trehalose-phosphate synthase (otsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007513 (equivalog); catalyses alpha,alpha-trehalose-phosphate synthase (UDP-forming); associated with alpha,alpha-trehalose-phosphate synthase (UDP-forming) activity, trehalose biosynthetic process. Members occur in Enterobacterales.
