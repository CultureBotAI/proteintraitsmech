identifier: NCBIfam:NF006773
label: "allantoate amidohydrolase"
definition: >-
  allantoate amidohydrolase (hpxK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006773 (equivalog); associated with hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in linear amidines. Members occur in Enterobacterales.
