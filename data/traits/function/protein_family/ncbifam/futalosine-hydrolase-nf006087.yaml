identifier: NCBIfam:NF006087
label: "futalosine hydrolase"
definition: >-
  futalosine hydrolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006087 (equivalog); catalyses futalosine hydrolase; associated with menaquinone biosynthetic process, hydrolase activity, hydrolyzing N-glycosyl compounds. Members occur in Bacillati.
