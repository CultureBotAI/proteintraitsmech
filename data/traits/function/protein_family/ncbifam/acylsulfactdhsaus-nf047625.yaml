definition: >-
  acylating sulfoacetaldehyde dehydrogenase (sauS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047625 (equivalog); catalyses sulfoacetaldehyde dehydrogenase (acylating); associated with oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor.
