identifier: NCBIfam:NF040830
label: "NAD(P)-dependent hydrogenase/sulfhydrogenase 2 subunit gamma"
definition: >-
  NAD(P)-dependent hydrogenase/sulfhydrogenase 2 subunit gamma (shyC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040830 (equivalog); catalyses sulfhydrogenase; associated with sulfur reductase activity, flavin adenine dinucleotide binding, 2 iron, 2 sulfur cluster binding. Members occur in Thermococcaceae.
