identifier: NCBIfam:TIGR02554
label: "PrgH/EprH family type III secretion apparatus protein"
definition: >-
  PrgH/EprH family type III secretion apparatus protein — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02554 (equivalog); associated with protein secretion by the type III secretion system, type III protein secretion system complex. Members occur in Pseudomonadota.
