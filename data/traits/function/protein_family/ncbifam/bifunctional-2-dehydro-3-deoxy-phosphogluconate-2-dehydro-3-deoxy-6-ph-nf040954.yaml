identifier: NCBIfam:NF040954
label: "bifunctional 2-dehydro-3-deoxy-phosphogluconate/2-dehydro-3-deoxy-6-phosphogalactonate aldolase"
definition: >-
  bifunctional 2-dehydro-3-deoxy-phosphogluconate/2-dehydro-3-deoxy-6-phosphogalactonate aldolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040954 (equivalog); catalyses 2-dehydro-3-deoxy-phosphogluconate/2-dehydro-3-deoxy-6-phosphogalactonate; associated with carbohydrate metabolic process, 2-dehydro-3-deoxy-6-phosphogalactonate aldolase activity, 2-dehydro-3-deoxy-phosphogluconate aldolase activity. Members occur in Thermoprotei.
