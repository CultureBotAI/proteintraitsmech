identifier: NCBIfam:NF040533
label: "SpGH101 family endo-alpha-N-acetylgalactosaminidase"
definition: >-
  SpGH101 family endo-alpha-N-acetylgalactosaminidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040533 (exception); catalyses endo-alpha-N-acetylgalactosaminidase; associated with endo-alpha-N-acetylgalactosaminidase activity. Members occur in Streptococcus.
