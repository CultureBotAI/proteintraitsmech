identifier: NCBIfam:NF009527
label: "Zn-dependent hydrolase"
definition: >-
  Zn-dependent hydrolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009527 (subfamily); associated with hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in linear amidines. Members occur in Pseudomonadati.
