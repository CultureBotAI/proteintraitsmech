definition: >-
  nucleotide exchange factor GrpE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF010760 (equivalog); associated with adenyl-nucleotide exchange factor activity, protein folding, protein homodimerization activity, protein-folding chaperone binding. Members occur in Actinomycetes.
