identifier: NCBIfam:NF040836
label: "NADPH-dependent hydrogenase/sulfhydrogenase 1 subunit delta"
definition: >-
  NADPH-dependent hydrogenase/sulfhydrogenase 1 subunit delta (hydD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040836 (equivalog); catalyses hydrogen dehydrogenase (NADP(+)); associated with hydrogen dehydrogenase (NADP+) activity, 4 iron, 4 sulfur cluster binding. Members occur in Thermococcaceae.
