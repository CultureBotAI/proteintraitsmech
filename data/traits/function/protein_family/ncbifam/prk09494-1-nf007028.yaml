identifier: NCBIfam:NF007028
label: "glutamine ABC transporter permease GlnP"
definition: >-
  glutamine ABC transporter permease GlnP — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007028 (equivalog); catalyses ABC-type polar-amino-acid transporter; associated with membrane, transmembrane transporter activity, ATP-binding cassette (ABC) transporter complex, transmembrane transport. Members occur in Pseudomonadota.
