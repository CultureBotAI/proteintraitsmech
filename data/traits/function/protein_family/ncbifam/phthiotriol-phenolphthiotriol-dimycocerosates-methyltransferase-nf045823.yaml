label: "phthiotriol/phenolphthiotriol dimycocerosates methyltransferase"
definition: >-
  phthiotriol/phenolphthiotriol dimycocerosates methyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045823 (equivalog); associated with S-adenosylmethionine-dependent methyltransferase activity, DIM/DIP cell wall layer assembly. Members occur in Mycobacteriaceae.
