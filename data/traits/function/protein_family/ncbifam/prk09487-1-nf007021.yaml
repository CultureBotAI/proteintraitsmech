identifier: NCBIfam:NF007021
label: "succinate dehydrogenase cytochrome b556 subunit"
definition: >-
  succinate dehydrogenase cytochrome b556 subunit (sdhC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007021 (equivalog); catalyses succinate dehydrogenase; associated with succinate dehydrogenase activity, tricarboxylic acid cycle, electron transfer activity, membrane. Members occur in Gammaproteobacteria.
