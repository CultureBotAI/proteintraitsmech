identifier: NCBIfam:TIGR02886
label: "anti-sigma F factor antagonist"
definition: >-
  anti-sigma F factor antagonist (spoIIAA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02886 (equivalog); associated with regulation of DNA-templated transcription, sporulation resulting in formation of a cellular spore, antisigma factor binding. Members occur in Bacillota.
