label: "two-component system sensor histidine kinase RstB"
definition: >-
  two-component system sensor histidine kinase RstB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007898 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, signal transduction, membrane, phosphorylation. Members occur in Gammaproteobacteria.
