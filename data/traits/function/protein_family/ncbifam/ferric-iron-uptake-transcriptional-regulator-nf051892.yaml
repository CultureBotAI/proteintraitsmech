identifier: NCBIfam:NF051892
label: "ferric iron uptake transcriptional regulator"
definition: >-
  ferric iron uptake transcriptional regulator (fur) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF051892 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription, zinc ion binding. Members occur in Bacillota.
