definition: >-
  aklavinone 12-hydroxylase DnrF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046068 (equivalog); catalyses aklavinone 12-hydroxylase; associated with antibiotic biosynthetic process, FAD binding. Members occur in Actinomycetes.
