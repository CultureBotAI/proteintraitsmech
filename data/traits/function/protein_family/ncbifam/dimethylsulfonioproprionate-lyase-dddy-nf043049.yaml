  dimethylsulfonioproprionate lyase DddY — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043049 (equivalog); catalyses dimethylpropiothetin dethiomethylase; associated with dimethylpropiothetin dethiomethylase activity. Members occur in Pseudomonadota.
