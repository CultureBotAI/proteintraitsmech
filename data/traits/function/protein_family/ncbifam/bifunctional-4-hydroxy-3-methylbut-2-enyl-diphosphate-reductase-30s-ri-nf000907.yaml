identifier: NCBIfam:NF000907
label: "bifunctional 4-hydroxy-3-methylbut-2-enyl diphosphate reductase/30S ribosomal protein S1"
definition: >-
  bifunctional 4-hydroxy-3-methylbut-2-enyl diphosphate reductase/30S ribosomal protein S1 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000907 (equivalog); catalyses 4-hydroxy-3-methylbut-2-enyl diphosphate reductase; associated with isopentenyl diphosphate biosynthetic process, methylerythritol phosphate pathway, dimethylallyl diphosphate biosynthetic process, 4-hydroxy-3-methylbut-2-enyl diphosphate reductase activity.
