label: "adenine-specific DNA glycosylase"
definition: >-
  adenine-specific DNA glycosylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF010488 (equivalog); associated with DNA binding, base-excision repair, hydrolase activity, acting on glycosyl bonds. Members occur in Helicobacter pylori.
