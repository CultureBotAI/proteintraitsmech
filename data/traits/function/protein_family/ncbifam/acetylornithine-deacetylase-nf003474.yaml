identifier: NCBIfam:NF003474
label: "acetylornithine deacetylase"
definition: >-
  acetylornithine deacetylase (argE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003474 (equivalog); catalyses acetylornithine deacetylase; associated with L-arginine biosynthetic process, deacetylase activity. Members occur in Gammaproteobacteria.
