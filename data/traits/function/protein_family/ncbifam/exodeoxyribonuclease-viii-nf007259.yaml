identifier: NCBIfam:NF007259
label: "exodeoxyribonuclease VIII"
definition: >-
  exodeoxyribonuclease VIII (recE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007259 (equivalog); associated with double-stranded DNA 5'-3' DNA exonuclease activity, nucleic acid metabolic process. Members occur in Enterobacteriaceae.
