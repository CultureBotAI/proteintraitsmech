identifier: NCBIfam:NF047673
label: "UDP-glucose 6-dehydrogenase TuaD"
definition: >-
  UDP-glucose 6-dehydrogenase TuaD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047673 (equivalog); catalyses UDP-glucose 6-dehydrogenase; associated with UDP-glucose 6-dehydrogenase activity, UDP-glucuronate biosynthetic process, NAD binding. Members occur in Caryophanales.
