identifier: NCBIfam:NF058673
label: "bifunctional lipase/adenylate cyclase LipJ"
definition: >-
  bifunctional lipase/adenylate cyclase LipJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058673 (equivalog); catalyses adenylate cyclase; associated with adenylate cyclase activity, cAMP biosynthetic process, hydrolase activity, manganese ion binding. Members occur in Mycobacterium.
