identifier: NCBIfam:NF007109
label: "bifunctional UDP-sugar hydrolase/5'-nucleotidase UshA"
definition: >-
  bifunctional UDP-sugar hydrolase/5'-nucleotidase UshA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007109 (equivalog); catalyses 5'-nucleotidase, UDP-sugar diphosphatase; associated with nucleotide binding, nucleotide catabolic process, hydrolase activity, metal ion binding. Members occur in Pseudomonadota.
