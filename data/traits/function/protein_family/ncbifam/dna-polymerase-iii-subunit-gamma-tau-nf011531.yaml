identifier: NCBIfam:NF011531
label: "DNA polymerase III subunit gamma/tau"
definition: >-
  DNA polymerase III subunit gamma/tau — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011531 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA binding, DNA-directed DNA polymerase activity, ATP binding, DNA replication. Members occur in Pseudomonadati.
