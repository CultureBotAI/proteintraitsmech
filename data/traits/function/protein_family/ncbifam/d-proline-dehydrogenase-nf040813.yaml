identifier: NCBIfam:NF040813
label: "D-proline dehydrogenase"
definition: >-
  D-proline dehydrogenase (dpdh) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040813 (equivalog); catalyses D-proline dehydrogenase; associated with oxidoreductase activity, acting on the CH-NH group of donors, flavin adenine dinucleotide binding. Members occur in Thermoproteaceae.
