identifier: NCBIfam:NF008027
label: inositol-1-monophosphatase
definition: >-
  inositol-1-monophosphatase (suhB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008027 (equivalog); catalyses inositol-phosphate phosphatase; associated with inositol monophosphate 1-phosphatase activity, phosphatidylinositol phosphate biosynthetic process. Members occur in Gammaproteobacteria.
