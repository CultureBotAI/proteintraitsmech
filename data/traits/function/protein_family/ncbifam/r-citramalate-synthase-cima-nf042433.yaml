identifier: NCBIfam:NF042433
label: "(R)-citramalate synthase CimA"
definition: >-
  (R)-citramalate synthase CimA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042433 (equivalog); catalyses (R)-citramalate synthase; associated with 2-isopropylmalate synthase activity, L-leucine biosynthetic process, (R)-citramalate synthase activity, L-isoleucine biosynthetic process. Members occur in Leptospira.
