label: "bifunctional anthranilate synthase glutamate amidotransferase component TrpG/anthranilate phosphoribosyltransferase TrpD"
definition: >-
  bifunctional anthranilate synthase glutamate amidotransferase component TrpG/anthranilate phosphoribosyltransferase TrpD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007073 (equivalog); catalyses anthranilate phosphoribosyltransferase, anthranilate synthase; associated with L-tryptophan biosynthetic process, anthranilate phosphoribosyltransferase activity. Members occur in Enterobacteriaceae.
