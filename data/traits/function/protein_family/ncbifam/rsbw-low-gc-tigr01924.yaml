identifier: NCBIfam:TIGR01924
label: "anti-sigma B factor RsbW"
definition: >-
  anti-sigma B factor RsbW — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01924 (equivalog); catalyses non-specific serine/threonine protein kinase; associated with protein serine/threonine kinase activity, ATP binding, protein phosphorylation, sigma factor antagonist activity. Members occur in Bacillota.
