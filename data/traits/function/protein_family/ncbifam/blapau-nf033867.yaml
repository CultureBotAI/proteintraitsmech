identifier: NCBIfam:NF033867
label: "PAU family class A beta-lactamase"
definition: >-
  PAU family class A beta-lactamase (blaPAU) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033867 (exception); catalyses beta-lactamase; associated with beta-lactamase activity, beta-lactam antibiotic catabolic process, response to antibiotic. Members occur in Pseudomonadota.
