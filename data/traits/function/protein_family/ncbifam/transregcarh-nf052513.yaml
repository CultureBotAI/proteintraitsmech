identifier: NCBIfam:NF052513
label: "HTH-type transcriptional repressor CarH"
definition: >-
  HTH-type transcriptional repressor CarH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052513 (equivalog); associated with DNA-binding transcription factor activity, carotenoid biosynthetic process, cobalamin binding, metal ion binding. Members occur in Thermaceae.
