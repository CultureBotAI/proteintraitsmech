label: "tRNA (uridine(34)/cytosine(34)/5-carboxymethylaminomethyluridine(34)-2'-O)-methyltransferase TrmL"
definition: >-
  tRNA (uridine(34)/cytosine(34)/5-carboxymethylaminomethyluridine(34)-2'-O)-methyltransferase TrmL — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007683 (equivalog); catalyses tRNA (cytidine(34)-2'-O)-methyltransferase; associated with RNA methylation, RNA methyltransferase activity. Members occur in Gammaproteobacteria.
