identifier: NCBIfam:NF008298
label: "DcuS/MalK family sensor histidine kinase"
definition: >-
  DcuS/MalK family sensor histidine kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008298 (subfamily); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, regulation of DNA-templated transcription.
