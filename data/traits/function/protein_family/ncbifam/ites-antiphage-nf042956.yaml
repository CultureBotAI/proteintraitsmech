label: "S8 family anti-phage peptidase IteS"
definition: >-
  S8 family anti-phage peptidase IteS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042956 (equivalog); associated with proteolysis, serine-type peptidase activity, defense response to virus. Members occur in Pseudomonadota.
