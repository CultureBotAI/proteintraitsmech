identifier: NCBIfam:NF050172
label: "CBASS system CD-NTase-associated NAD(+) hydrolase Cap12"
definition: >-
  CBASS system CD-NTase-associated NAD(+) hydrolase Cap12 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050172 (equivalog); catalyses NAD(+) glycohydrolase; associated with NAD+ nucleosidase activity, NADP+ nucleosidase activity, defense response to virus. Members occur in Bacteroidota/Chlorobiota group.
