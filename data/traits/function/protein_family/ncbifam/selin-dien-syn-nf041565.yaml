label: "selina-4(15),7(11)-diene synthase"
definition: >-
  selina-4(15),7(11)-diene synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041565 (equivalog); catalyses selina-4(15),7(11)-diene synthase; associated with magnesium ion binding, terpene synthase activity, terpenoid biosynthetic process. Members occur in Actinomycetes.
