label: "dipeptidyl-peptidase Dpp5"
definition: >-
  dipeptidyl-peptidase Dpp5 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053518 (equivalog); associated with aminopeptidase activity, serine-type endopeptidase activity, dipeptidyl-peptidase activity, peptide catabolic process. Members occur in Bacteroidia.
