identifier: NCBIfam:NF007950
label: "YbaL family putative K(+) efflux transporter"
definition: >-
  YbaL family putative K(+) efflux transporter — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007950 (equivalog); associated with potassium ion transport, monoatomic cation transmembrane transporter activity, membrane, metal cation:proton antiporter activity. Members occur in Pseudomonadota.
