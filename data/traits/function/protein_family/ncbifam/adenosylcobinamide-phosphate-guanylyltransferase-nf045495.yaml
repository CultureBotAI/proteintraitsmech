identifier: NCBIfam:NF045495
label: "adenosylcobinamide-phosphate guanylyltransferase"
definition: >-
  adenosylcobinamide-phosphate guanylyltransferase (cobY) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045495 (equivalog); catalyses adenosylcobinamide-phosphate guanylyltransferase; associated with cobinamide phosphate guanylyltransferase activity, cobalamin biosynthetic process. Members occur in Methanococcales.
