identifier: NCBIfam:TIGR02182
label: "GrxB family glutaredoxin"
definition: >-
  GrxB family glutaredoxin — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02182 (equivalog); associated with cytosol, sulfur compound metabolic process, protein-disulfide reductase activity, cell redox homeostasis. Members occur in Pseudomonadota.
