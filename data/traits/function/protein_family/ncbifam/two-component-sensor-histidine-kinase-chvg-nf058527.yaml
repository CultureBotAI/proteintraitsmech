identifier: NCBIfam:NF058527
label: "two-component sensor histidine kinase ChvG"
definition: >-
  two-component sensor histidine kinase ChvG — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058527 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, signal transduction, phosphorylation. Members occur in Alphaproteobacteria.
