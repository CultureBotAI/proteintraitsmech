identifier: NCBIfam:NF009078
label: "bifunctional hydroxymethylpyrimidine kinase/phosphomethylpyrimidine kinase"
definition: >-
  bifunctional hydroxymethylpyrimidine kinase/phosphomethylpyrimidine kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009078 (equivalog); catalyses hydroxymethylpyrimidine kinase, phosphooxymethylpyrimidine kinase; associated with phosphomethylpyrimidine kinase activity, thiamine biosynthetic process. Members occur in Bacilli.
