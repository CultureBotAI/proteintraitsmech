identifier: NCBIfam:NF008396
label: "dual-specificity RNA methyltransferase RlmN"
definition: >-
  dual-specificity RNA methyltransferase RlmN — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008396 (equivalog); catalyses 23S rRNA (adenine(2503)-C(2))-methyltransferase. Members occur in Gammaproteobacteria.
