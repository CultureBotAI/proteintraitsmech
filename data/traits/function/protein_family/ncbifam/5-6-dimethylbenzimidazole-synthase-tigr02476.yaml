identifier: NCBIfam:TIGR02476
label: "5,6-dimethylbenzimidazole synthase"
definition: >-
  5,6-dimethylbenzimidazole synthase (bluB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02476 (equivalog); catalyses aerobic 5,6-dimethylbenzimidazole synthase; associated with cobalamin biosynthetic process, oxidoreductase activity, acting on metal ions, FMN catabolic process.
