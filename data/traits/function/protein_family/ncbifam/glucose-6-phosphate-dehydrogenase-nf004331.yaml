label: "glucose-6-phosphate dehydrogenase"
definition: >-
  glucose-6-phosphate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004331 (equivalog); catalyses glucose-6-phosphate dehydrogenase (NADP(+)); associated with glucose-6-phosphate dehydrogenase activity, glucose metabolic process. Members occur in Helicobacter pylori.
