identifier: NCBIfam:NF008338
label: "arginine ABC transporter ATP-binding protein ArtP"
definition: >-
  arginine ABC transporter ATP-binding protein ArtP — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008338 (equivalog); catalyses ABC-type polar-amino-acid transporter; associated with amino acid transmembrane transport, ATP binding, ABC-type amino acid transporter activity, ATP-binding cassette (ABC) transporter complex. Members occur in Gammaproteobacteria.
