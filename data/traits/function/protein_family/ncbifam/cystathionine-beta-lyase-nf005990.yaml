label: "cystathionine beta-lyase"
definition: >-
  cystathionine beta-lyase (metC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005990 (equivalog); catalyses cysteine-S-conjugate beta-lyase; associated with amino acid metabolic process, transsulfuration, pyridoxal phosphate binding, cysteine-S-conjugate beta-lyase activity. Members occur in Gammaproteobacteria.
