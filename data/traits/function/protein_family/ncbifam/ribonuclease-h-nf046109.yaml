label: "ribonuclease H"
definition: >-
  ribonuclease H (rnhA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046109 (equivalog); catalyses ribonuclease H; associated with nucleic acid binding, RNA-DNA hybrid ribonuclease activity, metal ion binding. Members occur in Caryophanales.
