identifier: NCBIfam:NF045901
label: "two-component system sensor histidine kinase LetS"
definition: >-
  two-component system sensor histidine kinase LetS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045901 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, signal transduction, phosphorylation, transferase activity, transferring phosphorus-containing groups. Members occur in Legionellaceae.
