label: "RNA deprotection pyrophosphohydrolase"
definition: >-
  RNA deprotection pyrophosphohydrolase (ytkD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02705 (equivalog); associated with nucleobase-containing compound metabolic process, ribonucleoside triphosphate phosphatase activity. Members occur in Caryophanales.
