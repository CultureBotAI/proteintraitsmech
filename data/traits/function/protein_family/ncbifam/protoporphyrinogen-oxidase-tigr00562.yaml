  protoporphyrinogen oxidase (hemG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00562 (equivalog); catalyses protoporphyrinogen oxidase; associated with protoporphyrinogen oxidase activity, oxygen as acceptor, porphyrin-containing compound biosynthetic process.
