label: dihydroorotase
definition: >-
  dihydroorotase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006558 (equivalog); catalyses dihydroorotase; associated with dihydroorotase activity, pyrimidine nucleotide biosynthetic process, metal ion binding. Members occur in Alphaproteobacteria.
