identifier: NCBIfam:NF007624
label: "peptidyl-dipeptidase Dcp"
definition: >-
  peptidyl-dipeptidase Dcp — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007624 (equivalog); catalyses peptidyl-dipeptidase Dcp; associated with proteolysis, metallopeptidase activity. Members occur in Gammaproteobacteria.
