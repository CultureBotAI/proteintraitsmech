definition: >-
  ATP-dependent DNA helicase Hel308 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040935 (equivalog); catalyses DNA helicase; associated with DNA helicase activity, ATP binding, DNA repair. Members occur in Sulfolobaceae.
