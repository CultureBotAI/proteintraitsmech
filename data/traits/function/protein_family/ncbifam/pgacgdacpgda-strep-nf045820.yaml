label: "peptidoglycan-N-acetylglucosamine deacetylase PgdA"
definition: >-
  peptidoglycan-N-acetylglucosamine deacetylase PgdA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045820 (equivalog); catalyses peptidoglycan-N-acetylglucosamine deacetylase; associated with carbohydrate metabolic process, cell wall modification, N-acetylglucosamine deacetylase activity. Members occur in Streptococcus.
