identifier: NCBIfam:NF050134
label: "trans-2-decenoyl-ACP isomerase"
definition: >-
  trans-2-decenoyl-ACP isomerase (fabM) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050134 (equivalog); catalyses trans-2-decenoyl-[acyl-carrier-protein] isomerase; associated with fatty acid beta-oxidation, trans-2-decenoyl-acyl-carrier-protein isomerase activity. Members occur in Bacillota.
