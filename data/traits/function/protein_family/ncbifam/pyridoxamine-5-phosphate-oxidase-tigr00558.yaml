identifier: NCBIfam:TIGR00558
label: "pyridoxamine 5'-phosphate oxidase"
definition: >-
  pyridoxamine 5'-phosphate oxidase (pdxH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00558 (equivalog); catalyses pyridoxal 5'-phosphate synthase; associated with pyridoxamine phosphate oxidase activity, pyridoxine biosynthetic process, FMN binding.
