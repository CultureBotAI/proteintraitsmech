identifier: NCBIfam:NF008430
label: "phosphate ABC transporter permease PstA"
definition: >-
  phosphate ABC transporter permease PstA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008430 (equivalog); catalyses ABC-type phosphate transporter; associated with phosphate transmembrane transporter activity, plasma membrane, phosphate ion transmembrane transport. Members occur in Pseudomonadota.
