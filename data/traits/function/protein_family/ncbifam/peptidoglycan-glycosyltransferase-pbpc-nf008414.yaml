identifier: NCBIfam:NF008414
label: "peptidoglycan glycosyltransferase PbpC"
definition: >-
  peptidoglycan glycosyltransferase PbpC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008414 (equivalog); catalyses peptidoglycan glycosyltransferase; associated with penicillin binding, peptidoglycan glycosyltransferase activity, peptidoglycan biosynthetic process. Members occur in Gammaproteobacteria.
