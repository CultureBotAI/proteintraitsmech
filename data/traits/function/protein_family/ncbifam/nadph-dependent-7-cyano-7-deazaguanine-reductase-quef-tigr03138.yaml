identifier: NCBIfam:TIGR03138
label: "NADPH-dependent 7-cyano-7-deazaguanine reductase QueF"
definition: >-
  NADPH-dependent 7-cyano-7-deazaguanine reductase QueF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03138 (equivalog); catalyses preQ1 synthase; associated with tRNA queuosine(34) biosynthetic process, preQ1 synthase activity, 7-cyano-7-deazaguanine tRNA-ribosyltransferase activity. Members occur in Pseudomonadota.
