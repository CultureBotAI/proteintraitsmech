label: "tRNA(Phe) (4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase Taw2"
definition: >-
  tRNA(Phe) (4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase Taw2 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047824 (equivalog); catalyses tRNA(Phe) (4-demethylwyosine(37)-C(7)) aminocarboxypropyltransferase; associated with tRNA modification, transferase activity, transferring alkyl or aryl (other than methyl) groups, tRNA 4-demethylwyosine alpha-amino-alpha-carboxypropyltransferase activity. Members occur in Methanococcales.
