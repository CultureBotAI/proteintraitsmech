label: "phosphomevalonate decarboxylase MvaD"
definition: >-
  phosphomevalonate decarboxylase MvaD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040704 (equivalog); catalyses phosphomevalonate decarboxylase; associated with isopentenyl diphosphate biosynthetic process, phosphomevalonate decarboxylase activity. Members occur in Methanobacteriota.
