identifier: NCBIfam:NF011750
label: "4-hydroxyphenylacetate degradation bifunctional isomerase/decarboxylase"
definition: >-
  4-hydroxyphenylacetate degradation bifunctional isomerase/decarboxylase (hpaG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011750 (equivalog); associated with 5-carboxymethyl-2-hydroxymuconate delta-isomerase activity, 5-oxopent-3-ene-1,2,5-tricarboxylate decarboxylase activity, 4-hydroxyphenylacetate catabolic process. Members occur in Enterobacteriaceae.
