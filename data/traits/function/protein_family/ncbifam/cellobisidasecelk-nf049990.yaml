label: "cellulose 1,4-beta-cellobiosidase"
definition: >-
  cellulose 1,4-beta-cellobiosidase (celK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049990 (equivalog); catalyses cellulose 1,4-beta-cellobiosidase (non-reducing end); associated with cellulose 1,4-beta-cellobiosidase activity, cellulose catabolic process. Members occur in Acetivibrio.
