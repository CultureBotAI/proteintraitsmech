label: "(E)-4-hydroxy-3-methylbut-2-enyl-diphosphate synthase"
definition: >-
  (E)-4-hydroxy-3-methylbut-2-enyl-diphosphate synthase (ispG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00612 (equivalog); catalyses (E)-4-hydroxy-3-methylbut-2-enyl-diphosphate synthase (ferredoxin); associated with cytoplasm, isopentenyl diphosphate biosynthetic process, methylerythritol phosphate pathway, 4-hydroxy-3-methylbut-2-en-1-yl diphosphate synthase activity (ferredoxin).
