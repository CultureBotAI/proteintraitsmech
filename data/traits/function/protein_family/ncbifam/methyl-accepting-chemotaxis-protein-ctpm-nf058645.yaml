label: "methyl-accepting chemotaxis protein CtpM"
definition: >-
  methyl-accepting chemotaxis protein CtpM — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058645 (equivalog); associated with transmembrane signaling receptor activity, chemotaxis, signal transduction, positive chemotaxis. Members occur in Pseudomonadaceae.
