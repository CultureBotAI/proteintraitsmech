identifier: NCBIfam:TIGR00239
label: "2-oxoglutarate dehydrogenase E1 component"
definition: >-
  2-oxoglutarate dehydrogenase E1 component (sucA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00239 (equivalog); catalyses oxoglutarate dehydrogenase (succinyl-transferring); associated with oxoglutarate dehydrogenase (succinyl-transferring) activity, tricarboxylic acid cycle, thiamine pyrophosphate binding, oxoglutarate dehydrogenase complex.
