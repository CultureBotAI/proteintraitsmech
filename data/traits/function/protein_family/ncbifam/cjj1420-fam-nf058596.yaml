label: "O-methyl phosphoramidate transferase"
definition: >-
  O-methyl phosphoramidate transferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058596 (subfamily); associated with transferase activity, transferring phosphorus-containing groups, capsule polysaccharide biosynthetic process. Members occur in Campylobacter.
