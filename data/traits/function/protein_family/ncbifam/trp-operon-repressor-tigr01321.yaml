identifier: NCBIfam:TIGR01321
label: "trp operon repressor"
definition: >-
  trp operon repressor (trpR) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01321 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription, sequence-specific DNA binding. Members occur in Pseudomonadati.
