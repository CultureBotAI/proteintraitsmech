identifier: NCBIfam:TIGR02721
label: "thiamine kinase"
definition: >-
  thiamine kinase (thiK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02721 (equivalog); catalyses thiamine kinase; associated with thiamine biosynthetic process, phosphorylation, thiamine kinase activity. Members occur in Gammaproteobacteria.
