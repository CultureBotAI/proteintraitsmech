identifier: NCBIfam:NF006576
label: "class Ia ribonucleoside-diphosphate reductase subunit beta"
definition: >-
  class Ia ribonucleoside-diphosphate reductase subunit beta (nrdB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006576 (equivalog); catalyses ribonucleoside-diphosphate reductase; associated with deoxyribonucleotide biosynthetic process, oxidoreductase activity. Members occur in Pseudomonadota.
