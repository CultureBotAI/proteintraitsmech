identifier: NCBIfam:TIGR02487
label: "anaerobic ribonucleoside-triphosphate reductase"
definition: >-
  anaerobic ribonucleoside-triphosphate reductase (nrdD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02487 (equivalog); catalyses ribonucleoside-triphosphate reductase (thioredoxin); associated with DNA replication, ribonucleoside-triphosphate reductase (thioredoxin) activity, 2'-deoxyribonucleotide biosynthetic process, oxidoreductase activity.
