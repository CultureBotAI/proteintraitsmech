identifier: NCBIfam:TIGR02394
label: "RNA polymerase sigma factor RpoS"
definition: >-
  RNA polymerase sigma factor RpoS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02394 (equivalog); associated with DNA binding, DNA-binding transcription factor activity, DNA-templated transcription initiation, regulation of DNA-templated transcription. Members occur in Pseudomonadota.
