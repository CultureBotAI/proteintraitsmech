identifier: NCBIfam:NF004582
label: "uroporphyrinogen-III synthase"
definition: >-
  uroporphyrinogen-III synthase (hemD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004582 (equivalog); catalyses uroporphyrinogen-III synthase; associated with uroporphyrinogen-III synthase activity, uroporphyrinogen III biosynthetic process. Members occur in Enterobacterales.
