label: "acetyl-CoA C-acyltransferase FadA"
definition: >-
  acetyl-CoA C-acyltransferase FadA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006510 (equivalog); catalyses acetyl-CoA C-acyltransferase; associated with acetyl-CoA C-acyltransferase activity, fatty acid metabolic process. Members occur in Gammaproteobacteria.
