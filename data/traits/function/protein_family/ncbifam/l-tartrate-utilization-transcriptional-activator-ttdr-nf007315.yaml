identifier: NCBIfam:NF007315
label: "L-tartrate utilization transcriptional activator TtdR"
definition: >-
  L-tartrate utilization transcriptional activator TtdR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007315 (equivalog); associated with DNA-binding transcription factor activity, sequence-specific DNA binding, positive regulation of DNA-templated transcription. Members occur in Enterobacteriaceae.
