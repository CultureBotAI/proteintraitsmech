identifier: NCBIfam:TIGR01938
label: "NADH:ubiquinone reductase (Na(+)-transporting) subunit C"
definition: >-
  NADH:ubiquinone reductase (Na(+)-transporting) subunit C (nqrC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01938 (equivalog); catalyses NADH:ubiquinone reductase (Na(+)-transporting); associated with sodium ion transport, FMN binding, membrane, oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor. Members occur in Pseudomonadati.
