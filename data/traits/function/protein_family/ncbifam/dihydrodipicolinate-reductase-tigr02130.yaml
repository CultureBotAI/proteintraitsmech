definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) (S)-2,3,4,5-tetrahydrodipicolinate + NAD(+) + H2O = (2S,4S)-4- hydroxy-2,3,4,5-tetrahydrodipicolinate + NADH + H(+). (2) (S)-2,3,4,5-tetrahydrodipicolinate + NADP(+) + H2O = (2S,4S)-4- hydroxy-2,3,4,5-tetrahydrodipicolinate + NADPH + H(+)
