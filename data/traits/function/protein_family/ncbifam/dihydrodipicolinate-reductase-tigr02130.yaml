identifier: NCBIfam:TIGR02130
label: "dihydrodipicolinate reductase"
definition: >-
  dihydrodipicolinate reductase (dapB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02130 (equivalog); catalyses 4-hydroxy-tetrahydrodipicolinate reductase; associated with 4-hydroxy-tetrahydrodipicolinate reductase activity, L-lysine biosynthetic process, NADPH binding. Members occur in Pseudomonadati.
