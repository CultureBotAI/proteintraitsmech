identifier: NCBIfam:NF004678
label: "5-(carboxyamino)imidazole ribonucleotide synthase"
definition: >-
  5-(carboxyamino)imidazole ribonucleotide synthase (purK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004678 (equivalog); catalyses 5-(carboxyamino)imidazole ribonucleotide synthase; associated with phosphoribosylaminoimidazole carboxylase activity, ATP binding, 'de novo' IMP biosynthetic process, metal ion binding. Members occur in Gammaproteobacteria.
