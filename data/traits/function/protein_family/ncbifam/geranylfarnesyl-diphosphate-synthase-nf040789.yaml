identifier: NCBIfam:NF040789
label: "geranylfarnesyl diphosphate synthase"
definition: >-
  geranylfarnesyl diphosphate synthase (idsA3) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040789 (equivalog); catalyses geranylfarnesyl diphosphate synthase; associated with isoprenoid biosynthetic process, geranylfarnesyl diphosphate synthase activity. Members occur in Halobacteriales.
