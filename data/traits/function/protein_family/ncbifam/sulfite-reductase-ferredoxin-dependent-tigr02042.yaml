identifier: NCBIfam:TIGR02042
label: "sulfite reductase, ferredoxin dependent"
definition: >-
  sulfite reductase, ferredoxin dependent (sir) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02042 (equivalog); catalyses assimilatory sulfite reductase (ferredoxin); associated with heme binding, sulfite reductase (ferredoxin) activity, 4 iron, 4 sulfur cluster binding. Members occur in Cyanobacteriota.
