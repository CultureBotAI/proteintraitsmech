label: "L-arabinose ABC transporter ATP-binding protein AraG"
definition: >-
  L-arabinose ABC transporter ATP-binding protein AraG — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008442 (equivalog); catalyses ABC-type L-arabinose transporter; associated with ATP binding, ABC-type L-arabinose transporter activity, membrane, L-arabinose transmembrane transport. Members occur in Pseudomonadota.
