definition: >-
  cysteate synthase (capA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053679 (equivalog); catalyses cysteate synthase; associated with lipid metabolic process, sulfur compound biosynthetic process, cysteate synthase activity. Members occur in Bacteroidota.
