label: "dihydroneopterin triphosphate diphosphatase"
definition: >-
  dihydroneopterin triphosphate diphosphatase (nudB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006961 (equivalog); catalyses dihydroneopterin triphosphate diphosphatase; associated with dATP diphosphatase activity, dihydroneopterin triphosphate pyrophosphohydrolase activity, folic acid biosynthetic process. Members occur in Pseudomonadota.
