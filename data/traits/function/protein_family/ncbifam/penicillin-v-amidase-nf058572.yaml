  penicillin V amidase (yxeI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058572 (equivalog); catalyses penicillin amidase; associated with penicillin amidase activity, response to antibiotic. Members occur in Bacillus.
