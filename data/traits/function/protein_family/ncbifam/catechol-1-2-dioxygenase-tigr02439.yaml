label: "catechol 1,2-dioxygenase"
definition: >-
  catechol 1,2-dioxygenase (catA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02439 (equivalog); catalyses catechol 1,2-dioxygenase; associated with iron ion binding, catechol 1,2-dioxygenase activity, catechol catabolic process, ortho-cleavage. Members occur in Pseudomonadota.
