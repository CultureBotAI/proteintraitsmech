identifier: NCBIfam:NF053844
label: "retaining alpha-galactosidase"
definition: >-
  retaining alpha-galactosidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053844 (equivalog); catalyses alpha-galactosidase; associated with glucan 1,4-alpha-glucosidase activity, alpha-galactosidase activity, carbohydrate binding, metal ion binding. Members occur in Bacteroidota.
