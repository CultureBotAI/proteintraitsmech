definition: >-
  RcsC Alpha-Beta-Loop (ABL) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF021007 (pfameq); associated with phosphorelay signal transduction system, protein histidine kinase activity, ATP binding, plasma membrane. Members occur in Enterobacterales.
