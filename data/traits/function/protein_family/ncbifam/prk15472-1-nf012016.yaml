label: "nucleoside triphosphatase NudI"
definition: >-
  nucleoside triphosphatase NudI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF012016 (equivalog); catalyses dCTP diphosphatase, dUTP diphosphatase; associated with hydrolase activity, acting on acid anhydrides, in phosphorus-containing anhydrides. Members occur in Enterobacterales.
