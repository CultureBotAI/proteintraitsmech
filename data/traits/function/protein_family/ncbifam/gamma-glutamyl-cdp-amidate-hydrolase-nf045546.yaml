identifier: NCBIfam:NF045546
label: "gamma-glutamyl-CDP-amidate hydrolase"
definition: >-
  gamma-glutamyl-CDP-amidate hydrolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045546 (equivalog); catalyses N(5)-(cytidine 5'-diphosphoramidyl)-L-glutamine hydrolase; associated with hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in linear amides, capsule polysaccharide biosynthetic process. Members occur in Campylobacterales.
