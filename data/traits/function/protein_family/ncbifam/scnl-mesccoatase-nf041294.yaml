identifier: NCBIfam:NF041294
label: "succinyl-CoA:mesaconate CoA-transferase"
definition: >-
  succinyl-CoA:mesaconate CoA-transferase (mct) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041294 (equivalog); catalyses succinyl-CoA:mesaconate CoA transferase; associated with transferase activity. Members occur in Halobacteriales.
