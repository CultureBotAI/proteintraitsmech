identifier: NCBIfam:NF007456
label: "glutaredoxin-dependent arsenate reductase"
definition: >-
  glutaredoxin-dependent arsenate reductase (arsC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007456 (exception); catalyses arsenate reductase (glutathione/glutaredoxin); associated with arsenate reductase (glutaredoxin) activity. Members occur in Pseudomonadota.
