identifier: NCBIfam:NF049951
label: "1-hydroxy-2-glutathionyl-2-methyl-3-butene dehydrogenase"
definition: >-
  1-hydroxy-2-glutathionyl-2-methyl-3-butene dehydrogenase (isoH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049951 (equivalog); catalyses 2-glutathionyl-2-methylbut-3-en-1-ol dehydrogenase; associated with oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor.
