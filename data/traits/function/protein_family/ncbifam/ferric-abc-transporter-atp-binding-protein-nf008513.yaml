label: "ferric ABC transporter ATP-binding protein"
definition: >-
  ferric ABC transporter ATP-binding protein (fbpC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008513 (equivalog); associated with ATP binding, membrane, transmembrane transporter activity, ATP-binding cassette (ABC) transporter complex. Members occur in Gammaproteobacteria.
