identifier: NCBIfam:NF040850
label: "tRNA (guanine(6)-N2)-methyltransferase"
definition: >-
  tRNA (guanine(6)-N2)-methyltransferase (trm14) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040850 (equivalog); catalyses tRNA (guanine(6)-N(2))-methyltransferase; associated with RNA binding, tRNA processing, methyltransferase activity. Members occur in Thermococcaceae.
