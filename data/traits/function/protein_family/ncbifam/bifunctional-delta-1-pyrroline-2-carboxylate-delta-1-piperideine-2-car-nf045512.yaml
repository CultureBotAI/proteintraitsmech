definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) L-pipecolate + NADP(+) = Delta(1)-piperideine-2-carboxylate + NADPH + H(+). (2) L-pipecolate + NAD(+) = Delta(1)-piperideine-2-carboxylate + NADH + H(+). (3) L-proline + NADP(+) = 1-pyrroline-2-carboxylate + NADPH + H(+). (4) L-proline + NAD(+) = 1-pyrroline-2-carboxylate + NADH + H(+)
    source: "mapped enzyme EC:1.5.1.1"
