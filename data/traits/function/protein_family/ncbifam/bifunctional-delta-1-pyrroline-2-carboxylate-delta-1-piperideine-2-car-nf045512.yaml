identifier: NCBIfam:NF045512
label: "bifunctional Delta(1)-pyrroline-2-carboxylate/Delta(1)-piperideine-2-carboxylate reductase"
definition: >-
  bifunctional Delta(1)-pyrroline-2-carboxylate/Delta(1)-piperideine-2-carboxylate reductase (lhpI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045512 (equivalog); catalyses 1-piperideine-2-carboxylate/1-pyrroline-2-carboxylate reductase; associated with delta1-piperideine-2-carboxylate reductase activity, pyrroline-2-carboxylate reductase activity.
