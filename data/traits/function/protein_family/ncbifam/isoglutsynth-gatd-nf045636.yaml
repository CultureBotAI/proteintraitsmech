identifier: NCBIfam:NF045636
label: "lipid II isoglutaminyl synthase subunit GatD"
definition: >-
  lipid II isoglutaminyl synthase subunit GatD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045636 (equivalog); catalyses lipid II isoglutaminyl synthase (glutamine-hydrolyzing); associated with glutaminase activity, peptidoglycan biosynthetic process, carbon-nitrogen ligase activity on lipid II. Members occur in Streptococcaceae.
