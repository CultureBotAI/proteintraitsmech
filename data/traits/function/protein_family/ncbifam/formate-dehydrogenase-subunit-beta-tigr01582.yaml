identifier: NCBIfam:TIGR01582
label: "formate dehydrogenase subunit beta"
definition: >-
  formate dehydrogenase subunit beta (fdxH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01582 (equivalog); catalyses formate dehydrogenase; associated with formate dehydrogenase (NAD+) activity, formate oxidation, membrane, 4 iron, 4 sulfur cluster binding. Members occur in Pseudomonadota.
