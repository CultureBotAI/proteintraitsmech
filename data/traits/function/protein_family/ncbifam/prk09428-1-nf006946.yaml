label: "CDP-diacylglycerol--serine O-phosphatidyltransferase"
definition: >-
  CDP-diacylglycerol--serine O-phosphatidyltransferase (pssA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006946 (equivalog); catalyses CDP-diacylglycerol--serine O-phosphatidyltransferase; associated with CDP-diacylglycerol-glycerol-3-phosphate 3-phosphatidyltransferase activity, cardiolipin biosynthetic process. Members occur in Pseudomonadota.
