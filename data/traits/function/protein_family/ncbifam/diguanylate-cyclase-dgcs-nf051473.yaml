identifier: NCBIfam:NF051473
label: "diguanylate cyclase DgcS"
definition: >-
  diguanylate cyclase DgcS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF051473 (equivalog); catalyses diguanylate cyclase; associated with GTP binding, cell adhesion involved in single-species biofilm formation, metal ion binding, diguanylate cyclase activity. Members occur in Shewanellaceae.
