label: "D-xylose 1-dehydrogenase Gfo6"
definition: >-
  D-xylose 1-dehydrogenase Gfo6 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041392 (equivalog); catalyses D-xylose 1-dehydrogenase (NADP(+), D-xylono-1,4-lactone-forming); associated with nucleotide binding, oxidoreductase activity. Members occur in Halobacteriales.
