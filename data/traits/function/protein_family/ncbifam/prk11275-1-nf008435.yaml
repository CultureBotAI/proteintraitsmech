identifier: NCBIfam:NF008435
label: "phosphate ABC transporter permease PstC"
definition: >-
  phosphate ABC transporter permease PstC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008435 (equivalog); catalyses ABC-type phosphate transporter; associated with phosphate transmembrane transporter activity, phosphate ion transport, membrane, transmembrane transport. Members occur in Pseudomonadota.
