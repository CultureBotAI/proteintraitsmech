identifier: NCBIfam:NF047883
label: "UDP-N-acetylmuramoylpentapeptide-lysine N(6)-alanyltransferase"
definition: >-
  UDP-N-acetylmuramoylpentapeptide-lysine N(6)-alanyltransferase (femX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047883 (equivalog); catalyses UDP-N-acetylmuramoylpentapeptide-lysine N(6)-alanyltransferase; associated with peptidoglycan biosynthetic process, UDP-N-acetylmuramoylpentapeptide-lysine N6-alanyltransferase activity. Members occur in Lactobacillaceae.
