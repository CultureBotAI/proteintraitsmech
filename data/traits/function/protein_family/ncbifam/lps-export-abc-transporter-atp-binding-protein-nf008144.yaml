identifier: NCBIfam:NF008144
label: "LPS export ABC transporter ATP-binding protein"
definition: >-
  LPS export ABC transporter ATP-binding protein (lptB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008144 (equivalog); catalyses ABC-type lipopolysaccharide transporter; associated with ATP binding, ATP-binding cassette (ABC) transporter complex, transmembrane transport. Members occur in Gammaproteobacteria.
