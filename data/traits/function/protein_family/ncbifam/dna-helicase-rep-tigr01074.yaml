definition: >-
  DNA helicase Rep — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01074 (equivalog); catalyses DNA helicase; associated with DNA binding, DNA helicase activity, ATP binding, DNA replication. Members occur in Pseudomonadota.
