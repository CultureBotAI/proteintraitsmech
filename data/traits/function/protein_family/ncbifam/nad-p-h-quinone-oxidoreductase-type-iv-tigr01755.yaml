  NAD(P)H:quinone oxidoreductase type IV (wrbA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01755 (equivalog); catalyses NAD(P)H dehydrogenase (quinone); associated with NAD(P)H dehydrogenase (quinone) activity, FMN binding.
