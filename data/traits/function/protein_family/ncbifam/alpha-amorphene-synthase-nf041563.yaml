identifier: NCBIfam:NF041563
label: "(-)-alpha-amorphene synthase"
definition: >-
  (-)-alpha-amorphene synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041563 (equivalog); catalyses (-)-alpha-amorphene synthase; associated with terpenoid biosynthetic process, lyase activity, metal ion binding. Members occur in Streptomyces.
