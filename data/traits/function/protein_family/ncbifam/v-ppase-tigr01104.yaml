label: "V-type H(+)-translocating pyrophosphatase"
definition: >-
  V-type H(+)-translocating pyrophosphatase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01104 (equivalog); catalyses inorganic diphosphatase; associated with inorganic diphosphate phosphatase activity, plasma membrane, diphosphate hydrolysis-driven proton transmembrane transporter activity, proton transmembrane transport.
