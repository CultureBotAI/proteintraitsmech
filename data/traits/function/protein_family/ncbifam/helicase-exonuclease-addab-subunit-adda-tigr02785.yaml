identifier: NCBIfam:TIGR02785
label: "helicase-exonuclease AddAB subunit AddA"
definition: >-
  helicase-exonuclease AddAB subunit AddA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02785 (equivalog); catalyses DNA helicase; associated with double-strand break repair via homologous recombination, DNA helicase activity, double-strand break repair, hydrolase activity, acting on acid anhydrides, in phosphorus-containing anhydrides. Members occur in Bacillota.
