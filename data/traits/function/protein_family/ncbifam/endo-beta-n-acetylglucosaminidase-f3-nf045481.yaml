identifier: NCBIfam:NF045481
label: "endo-beta-N-acetylglucosaminidase F3"
definition: >-
  endo-beta-N-acetylglucosaminidase F3 (endOF3) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045481 (equivalog); catalyses mannosyl-glycoprotein endo-beta-N-acetylglucosaminidase; associated with carbohydrate metabolic process, mannosyl-glycoprotein endo-beta-N-acetylglucosaminidase activity. Members occur in Bacteroidota.
