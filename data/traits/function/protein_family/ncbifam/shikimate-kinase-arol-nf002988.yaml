  shikimate kinase AroL — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002988 (equivalog); catalyses shikimate kinase; associated with shikimate kinase activity, aromatic amino acid biosynthetic process. Members occur in Enterobacterales.
