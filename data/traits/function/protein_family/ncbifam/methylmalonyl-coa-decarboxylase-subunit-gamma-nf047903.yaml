identifier: NCBIfam:NF047903
label: "methylmalonyl-CoA decarboxylase subunit gamma"
definition: >-
  methylmalonyl-CoA decarboxylase subunit gamma (mmdC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047903 (equivalog); catalyses (S)-methylmalonyl-CoA decarboxylase (sodium-transporting); associated with sodium ion transport. Members occur in Veillonella.
