identifier: NCBIfam:NF040849
label: "tRNA(Ile2) 2-agmatinylcytidine synthetase TiaS"
definition: >-
  tRNA(Ile2) 2-agmatinylcytidine synthetase TiaS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040849 (equivalog); catalyses tRNA(Ile)(2)-agmatinylcytidine synthase; associated with tRNA wobble cytosine modification, ligase activity, forming carbon-nitrogen bonds. Members occur in Methanobacteriota.
