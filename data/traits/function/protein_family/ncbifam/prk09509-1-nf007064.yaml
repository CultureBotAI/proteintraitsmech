identifier: NCBIfam:NF007064
label: "CDF family cation-efflux transporter FieF"
definition: >-
  CDF family cation-efflux transporter FieF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007064 (equivalog); associated with monoatomic cation transport, monoatomic cation transmembrane transporter activity, membrane, metal ion transport. Members occur in Gammaproteobacteria.
