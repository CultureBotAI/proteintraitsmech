identifier: NCBIfam:TIGR00394
label: "lactose-specific PTS transporter subunit EIIC"
definition: >-
  lactose-specific PTS transporter subunit EIIC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00394 (equivalog); catalyses protein-N(pi)-phosphohistidine--lactose phosphotransferase; associated with phosphoenolpyruvate-dependent sugar phosphotransferase system, lactose transmembrane transporter activity, membrane, phosphoenolpyruvate-dependent sugar phosphotransferase complex. Members occur in Bacillota.
