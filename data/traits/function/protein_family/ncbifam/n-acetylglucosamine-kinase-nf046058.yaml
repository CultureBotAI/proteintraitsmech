identifier: NCBIfam:NF046058
label: "N-acetylglucosamine kinase"
definition: >-
  N-acetylglucosamine kinase (nagK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046058 (equivalog); catalyses N-acetylglucosamine kinase; associated with N-acetylglucosamine kinase activity. Members occur in Pseudomonadota.
