identifier: NCBIfam:TIGR02045
label: "ADP-specific phosphofructokinase"
definition: >-
  ADP-specific phosphofructokinase (pfkC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02045 (equivalog); catalyses ADP-specific phosphofructokinase; associated with cytoplasm, fructose metabolic process, glycolytic process, phosphofructokinase activity. Members occur in Methanobacteriota.
