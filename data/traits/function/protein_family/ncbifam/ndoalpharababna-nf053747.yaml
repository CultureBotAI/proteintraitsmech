definition: >-
  arabinan endo-1,5-alpha-L-arabinosidase AbnA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053747 (equivalog); catalyses arabinan endo-1,5-alpha-L-arabinosidase; associated with arabinan catabolic process, arabinan endo-1,5-alpha-L-arabinosidase activity, metal ion binding. Members occur in Caryophanales.
