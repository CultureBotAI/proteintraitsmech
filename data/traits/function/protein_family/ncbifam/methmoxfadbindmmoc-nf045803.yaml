label: "aromatic/alkene monooxygenase hydroxylase FAD-binding subunit MmoC"
definition: >-
  aromatic/alkene monooxygenase hydroxylase FAD-binding subunit MmoC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045803 (equivalog); catalyses methane monooxygenase (soluble); associated with methane monooxygenase [NAD(P)H] activity, flavin adenine dinucleotide binding. Members occur in Pseudomonadota.
