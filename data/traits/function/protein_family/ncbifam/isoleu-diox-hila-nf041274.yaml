label: "L-isoleucine 3(1)-dioxygenase"
definition: >-
  L-isoleucine 3(1)-dioxygenase (hilA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041274 (equivalog); catalyses L-isoleucine 3(1)-dioxygenase; associated with L-ascorbic acid binding, dioxygenase activity. Members occur in Enterobacterales.
