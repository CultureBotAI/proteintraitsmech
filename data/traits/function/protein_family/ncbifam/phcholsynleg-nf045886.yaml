identifier: NCBIfam:NF045886
label: "phosphatidylcholine synthase"
definition: >-
  phosphatidylcholine synthase (pcsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045886 (equivalog); catalyses phosphatidylcholine synthase; associated with phospholipid biosynthetic process, phosphatidylcholine synthase activity. Members occur in Legionellaceae.
