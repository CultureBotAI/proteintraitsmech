label: "galactitol-1-phosphate 5-dehydrogenase"
definition: >-
  galactitol-1-phosphate 5-dehydrogenase (gatD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007642 (equivalog); catalyses galactitol-1-phosphate 5-dehydrogenase; associated with zinc ion binding, oxidoreductase activity. Members occur in Enterobacteriaceae.
