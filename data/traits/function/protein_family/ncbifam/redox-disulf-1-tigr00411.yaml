label: "MJ0307 family thioredoxin"
definition: >-
  MJ0307 family thioredoxin — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00411 (equivalog); associated with electron transfer activity, protein-disulfide reductase activity, cell redox homeostasis. Members occur in Methanobacteriota.
