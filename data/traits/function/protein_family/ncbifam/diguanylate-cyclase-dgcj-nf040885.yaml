identifier: NCBIfam:NF040885
label: "diguanylate cyclase DgcJ"
definition: >-
  diguanylate cyclase DgcJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040885 (equivalog); catalyses diguanylate cyclase; associated with cell adhesion involved in single-species biofilm formation, diguanylate cyclase activity, negative regulation of bacterial-type flagellum-dependent cell motility. Members occur in Enterobacteriaceae.
