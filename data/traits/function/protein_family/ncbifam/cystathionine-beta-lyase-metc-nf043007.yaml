label: "cystathionine beta-lyase MetC"
definition: >-
  cystathionine beta-lyase MetC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043007 (equivalog); catalyses cysteine-S-conjugate beta-lyase; associated with pyridoxal phosphate binding, cysteine-S-conjugate beta-lyase activity, L-methionine biosynthetic process. Members occur in Bacilli.
