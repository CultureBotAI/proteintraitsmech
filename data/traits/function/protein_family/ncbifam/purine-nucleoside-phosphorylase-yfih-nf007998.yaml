identifier: NCBIfam:NF007998
label: "purine nucleoside phosphorylase YfiH"
definition: >-
  purine nucleoside phosphorylase YfiH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007998 (equivalog); catalyses purine-nucleoside phosphorylase; associated with adenosine deaminase activity, purine-nucleoside phosphorylase activity, protein homodimerization activity. Members occur in Enterobacterales.
