label: "DEAD/DEAH family ATP-dependent RNA helicase"
definition: >-
  DEAD/DEAH family ATP-dependent RNA helicase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008642 (equivalog); catalyses RNA helicase; associated with ribosomal large subunit assembly, RNA helicase activity, ATP binding. Members occur in Enterobacterales.
