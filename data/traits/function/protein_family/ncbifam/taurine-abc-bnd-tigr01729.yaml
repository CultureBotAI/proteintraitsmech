identifier: NCBIfam:TIGR01729
label: "taurine ABC transporter substrate-binding protein"
definition: >-
  taurine ABC transporter substrate-binding protein (tauA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01729 (equivalog); associated with ABC-type taurine transporter transporter activity, taurine transmembrane transport, taurine binding, periplasmic space. Members occur in Pseudomonadota.
