label: "Dot/Icm T4SS effector kinase LegK1"
definition: >-
  Dot/Icm T4SS effector kinase LegK1 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043056 (equivalog); associated with protein kinase activity, protein phosphorylation, protein secretion by the type IV secretion system. Members occur in Legionella pneumophila.
