  anhydro-N-acetylmuramic acid kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007141 (equivalog); catalyses anhydro-N-acetylmuramic acid kinase; associated with ATP binding, amino sugar metabolic process, N-acetyltransferase activity, peptidoglycan turnover.
