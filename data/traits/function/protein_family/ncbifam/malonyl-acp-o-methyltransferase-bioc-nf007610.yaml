identifier: NCBIfam:NF007610
label: "malonyl-ACP O-methyltransferase BioC"
definition: >-
  malonyl-ACP O-methyltransferase BioC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007610 (equivalog); catalyses malonyl-[acyl-carrier protein] O-methyltransferase; associated with biotin biosynthetic process, carboxyl-O-methyltransferase activity. Members occur in Enterobacterales.
