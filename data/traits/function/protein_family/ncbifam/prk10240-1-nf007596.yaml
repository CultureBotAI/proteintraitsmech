definition: >-
  (2E,6E)-farnesyl-diphosphate-specific ditrans,polycis-undecaprenyl-diphosphate synthase (ispU) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007596 (equivalog); associated with prenyltransferase activity, ditrans,polycis-undecaprenyl-diphosphate synthase [(2E,6E)-farnesyl-diphosphate specific] activity, Gram-negative-bacterium-type cell wall biogenesis. Members occur in Enterobacterales.
