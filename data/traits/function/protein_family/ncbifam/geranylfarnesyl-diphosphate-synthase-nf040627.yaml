identifier: NCBIfam:NF040627
label: "geranylfarnesyl diphosphate synthase"
definition: >-
  geranylfarnesyl diphosphate synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040627 (equivalog); catalyses geranylfarnesyl diphosphate synthase; associated with isoprenoid biosynthetic process, geranylfarnesyl diphosphate synthase activity. Members occur in Methanosarcina.
