label: "DNA polymerase II"
definition: >-
  DNA polymerase II (polB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004420 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA binding, DNA-directed DNA polymerase activity. Members occur in Enterobacterales.
