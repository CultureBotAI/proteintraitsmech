identifier: NCBIfam:NF001278
label: "adenosylcobinamide-GDP ribazoletransferase"
definition: >-
  adenosylcobinamide-GDP ribazoletransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF001278 (equivalog); catalyses adenosylcobinamide-GDP ribazoletransferase; associated with adenosylcobinamide-GDP ribazoletransferase activity. Members occur in Pseudomonadota.
