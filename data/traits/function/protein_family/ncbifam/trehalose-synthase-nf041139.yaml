identifier: NCBIfam:NF041139
label: "trehalose synthase"
definition: >-
  trehalose synthase (treT) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041139 (equivalog); catalyses alpha,alpha-trehalose synthase; associated with glucose metabolic process, trehalose synthase activity. Members occur in Thermococcaceae.
