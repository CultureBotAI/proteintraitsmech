identifier: NCBIfam:TIGR04506
label: "fluorothreonine transaldolase"
definition: >-
  fluorothreonine transaldolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04506 (equivalog); catalyses fluorothreonine transaldolase; associated with fluorothreonine transaldolase activity, organofluorine metabolic process. Members occur in Actinomycetes.
