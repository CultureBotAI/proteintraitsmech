label: "A/G-specific adenine glycosylase"
definition: >-
  A/G-specific adenine glycosylase (mutY) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01084 (equivalog); catalyses adenine glycosylase; associated with base-excision repair, DNA N-glycosylase activity.
