label: "8-oxo-(d)GTP phosphatase MutT1"
definition: >-
  8-oxo-(d)GTP phosphatase MutT1 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052459 (equivalog); catalyses 8-oxo-(d)GTP phosphatase; associated with DNA replication, DNA repair, 8-oxo-7,8-dihydroguanosine triphosphate pyrophosphatase activity. Members occur in Mycobacteriaceae.
