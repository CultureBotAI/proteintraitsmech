identifier: NCBIfam:NF041710
label: "N-acetylglucosaminyldiphosphoundecaprenol N-acetyl-beta-D-mannosaminyltransferase TarA"
definition: >-
  N-acetylglucosaminyldiphosphoundecaprenol N-acetyl-beta-D-mannosaminyltransferase TarA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041710 (equivalog); catalyses N-acetylglucosaminyldiphosphoundecaprenol N-acetyl-beta-D-; associated with teichoic acid biosynthetic process, N-acetylglucosaminyldiphosphoundecaprenol N-acetyl-beta-D-mannosaminyltransferase activity. Members occur in Staphylococcus.
