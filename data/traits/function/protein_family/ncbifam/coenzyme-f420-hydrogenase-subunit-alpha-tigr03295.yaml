label: "coenzyme F420 hydrogenase subunit alpha"
definition: >-
  coenzyme F420 hydrogenase subunit alpha (frhA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03295 (equivalog); catalyses coenzyme F420 hydrogenase; associated with nickel cation binding, coenzyme F420 hydrogenase activity, flavin adenine dinucleotide binding, iron-sulfur cluster binding. Members occur in Methanobacteriota.
