identifier: NCBIfam:NF045685
label: "geranylgeranyl diphosphate synthase CrtE"
definition: >-
  geranylgeranyl diphosphate synthase CrtE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045685 (equivalog); catalyses dimethylallyltranstransferase; associated with transferase activity, geranylgeranyl diphosphate biosynthetic process. Members occur in Cyanobacteriota.
