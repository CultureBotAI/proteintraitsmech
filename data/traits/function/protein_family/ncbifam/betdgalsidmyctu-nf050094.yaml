label: beta-D-galactosidase
definition: >-
  beta-D-galactosidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050094 (equivalog); catalyses beta-galactosidase; associated with hydrolase activity, acting on glycosyl bonds. Members occur in Mycobacterium tuberculosis.
