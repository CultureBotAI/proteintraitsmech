identifier: NCBIfam:TIGR03533
label: "50S ribosomal protein L3 N(5)-glutamine methyltransferase"
definition: >-
  50S ribosomal protein L3 N(5)-glutamine methyltransferase (prmB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03533 (equivalog); catalyses ribosomal protein uL3 N(5)-glutamine methyltransferase; associated with protein methyltransferase activity, S-adenosylmethionine-dependent methyltransferase activity, peptidyl-glutamine methylation, ribosomal large subunit biogenesis.
