identifier: NCBIfam:NF005582
label: "DNA polymerase III subunit alpha"
definition: >-
  DNA polymerase III subunit alpha — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005582 (equivalog); catalyses DNA-directed DNA polymerase; associated with nucleic acid binding, DNA replication, 3'-5' exonuclease activity. Members occur in Streptococcaceae.
