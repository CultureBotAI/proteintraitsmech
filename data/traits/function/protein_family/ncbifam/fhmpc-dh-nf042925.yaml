label: "5-formyl-3-hydroxy-2-methylpyridine 4-carboxylate 5-dehydrogenase"
definition: >-
  5-formyl-3-hydroxy-2-methylpyridine 4-carboxylate 5-dehydrogenase (fhmpcd1) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042925 (equivalog); catalyses 5-formyl-3-hydroxy-2-methylpyridine 4-carboxylate 5-dehydrogenase; associated with fatty acid metabolic process, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, vitamin B6 catabolic process, NAD+ binding.
