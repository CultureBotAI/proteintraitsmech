label: "[benzylsuccinate synthase]-activating enzyme"
definition: >-
  [benzylsuccinate synthase]-activating enzyme (bssD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04003 (equivalog); associated with post-translational protein modification, S-adenosylmethionine metabolic process, 4 iron, 4 sulfur cluster binding, S-adenosyl-L-methionine binding. Members occur in Pseudomonadota.
