identifier: NCBIfam:NF007017
label: "flap endonuclease Xni"
definition: >-
  flap endonuclease Xni — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007017 (equivalog); associated with DNA binding, 5'-flap endonuclease activity, DNA replication, Okazaki fragment processing. Members occur in Gammaproteobacteria.
