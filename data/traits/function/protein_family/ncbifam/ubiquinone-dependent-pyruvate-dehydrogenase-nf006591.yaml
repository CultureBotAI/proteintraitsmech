identifier: NCBIfam:NF006591
label: "ubiquinone-dependent pyruvate dehydrogenase"
definition: >-
  ubiquinone-dependent pyruvate dehydrogenase (poxB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006591 (equivalog); catalyses pyruvate dehydrogenase (quinone); associated with magnesium ion binding, pyruvate metabolic process, thiamine pyrophosphate binding, pyruvate dehydrogenase (quinone) activity.
