identifier: NCBIfam:NF008159
label: "oligopeptidase A"
definition: >-
  oligopeptidase A (prlC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008159 (equivalog); catalyses oligopeptidase A; associated with metalloendopeptidase activity, proteolysis. Members occur in Gammaproteobacteria.
