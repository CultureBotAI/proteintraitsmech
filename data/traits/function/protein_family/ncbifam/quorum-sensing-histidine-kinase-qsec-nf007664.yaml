label: "quorum sensing histidine kinase QseC"
definition: >-
  quorum sensing histidine kinase QseC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007664 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, signal transduction. Members occur in Gammaproteobacteria.
