identifier: NCBIfam:NF041564
label: "7-epi-alpha-eudesmol synthase"
definition: >-
  7-epi-alpha-eudesmol synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041564 (equivalog); catalyses 7-epi-alpha-eudesmol synthase; associated with terpenoid biosynthetic process, lyase activity, metal ion binding. Members occur in Streptomycetaceae.
