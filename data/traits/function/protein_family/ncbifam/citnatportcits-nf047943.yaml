label: "citrate/sodium symporter CitS"
definition: >-
  citrate/sodium symporter CitS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047943 (equivalog); associated with citrate metabolic process, sodium ion transport, symporter activity, transmembrane transporter activity. Members occur in Gammaproteobacteria.
