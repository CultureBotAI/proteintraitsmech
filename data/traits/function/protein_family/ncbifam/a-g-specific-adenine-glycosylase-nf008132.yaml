identifier: NCBIfam:NF008132
label: "A/G-specific adenine glycosylase"
definition: >-
  A/G-specific adenine glycosylase (mutY) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008132 (equivalog); catalyses adenine glycosylase; associated with DNA repair, DNA N-glycosylase activity. Members occur in Gammaproteobacteria.
