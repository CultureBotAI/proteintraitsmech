identifier: NCBIfam:NF008275
label: "oxygen-insensitive NAD(P)H nitroreductase"
definition: >-
  oxygen-insensitive NAD(P)H nitroreductase (nfsB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008275 (equivalog); catalyses 6,7-dihydropteridine reductase; associated with oxidoreductase activity. Members occur in Pseudomonadati.
