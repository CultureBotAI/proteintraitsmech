  Holliday junction resolvase Hjc — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040854 (equivalog); catalyses crossover junction endodeoxyribonuclease; associated with DNA binding, DNA repair, DNA recombination, crossover junction DNA endonuclease activity.
