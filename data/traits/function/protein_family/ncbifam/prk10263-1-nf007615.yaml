  DNA translocase FtsK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007615 (equivalog); associated with DNA binding, ATP binding, chromosome segregation, DNA translocase activity. Members occur in Enterobacteriaceae.
