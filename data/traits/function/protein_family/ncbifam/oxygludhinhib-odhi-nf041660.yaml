label: "oxoglutarate dehydrogenase inhibitor Odhl"
definition: >-
  oxoglutarate dehydrogenase inhibitor Odhl (odhI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041660 (equivalog); associated with oxoglutarate dehydrogenase (succinyl-transferring) activity, tricarboxylic acid cycle, oxoglutarate dehydrogenase complex. Members occur in Bacillati.
