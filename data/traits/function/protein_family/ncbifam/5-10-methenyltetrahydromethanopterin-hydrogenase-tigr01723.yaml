identifier: NCBIfam:TIGR01723
label: "5,10-methenyltetrahydromethanopterin hydrogenase"
definition: >-
  5,10-methenyltetrahydromethanopterin hydrogenase (hmd) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01723 (equivalog); catalyses 5,10-methenyltetrahydromethanopterin hydrogenase; associated with methanogenesis, from carbon dioxide, N5,N10-methenyltetrahydromethanopterin hydrogenase activity. Members occur in Methanobacteriota.
