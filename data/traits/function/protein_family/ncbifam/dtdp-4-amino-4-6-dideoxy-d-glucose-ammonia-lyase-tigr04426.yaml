identifier: NCBIfam:TIGR04426
label: "dTDP-4-amino-4,6-dideoxy-D-glucose ammonia-lyase"
definition: >-
  dTDP-4-amino-4,6-dideoxy-D-glucose ammonia-lyase (desII) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04426 (equivalog); catalyses dTDP-4-amino-4,6-dideoxy-D-glucose ammonia-lyase; associated with ammonia-lyase activity, macrolide biosynthetic process, 4 iron, 4 sulfur cluster binding. Members occur in Actinomycetes.
