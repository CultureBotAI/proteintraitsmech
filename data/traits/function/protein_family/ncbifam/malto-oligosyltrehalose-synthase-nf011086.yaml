identifier: NCBIfam:NF011086
label: "malto-oligosyltrehalose synthase"
definition: >-
  malto-oligosyltrehalose synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011086 (equivalog); catalyses (1->4)-alpha-D-glucan 1-alpha-D-glucosylmutase; associated with carbohydrate metabolic process. Members occur in Gammaproteobacteria.
