identifier: NCBIfam:NF052578
label: "sterol demethylase protein SdmB"
definition: >-
  sterol demethylase protein SdmB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052578 (equivalog); catalyses 3beta-hydroxysteroid 3-dehydrogenase, 3beta-hydroxysteroid-4beta-carboxylate 3-dehydrogenase (decarboxylating); associated with aldehyde dehydrogenase (NAD+) activity, cytoplasm, sterol biosynthetic process. Members occur in Gammaproteobacteria.
