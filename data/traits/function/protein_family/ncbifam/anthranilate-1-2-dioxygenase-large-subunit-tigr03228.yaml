label: "anthranilate 1,2-dioxygenase large subunit"
definition: >-
  anthranilate 1,2-dioxygenase large subunit (antA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03228 (equivalog); catalyses anthranilate 1,2-dioxygenase (deaminating, decarboxylating); associated with L-tryptophan catabolic process, anthranilate 1,2-dioxygenase (deaminating, decarboxylating) activity. Members occur in Pseudomonadota.
