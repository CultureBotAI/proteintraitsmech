label: "2-isopropylmalate synthase"
definition: >-
  2-isopropylmalate synthase (leuA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002084 (equivalog); catalyses 2-isopropylmalate synthase; associated with 2-isopropylmalate synthase activity, carboxylic acid metabolic process. Members occur in Pseudomonadati.
