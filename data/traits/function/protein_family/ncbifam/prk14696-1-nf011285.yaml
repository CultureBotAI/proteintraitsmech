identifier: NCBIfam:NF011285
label: "primary-amine oxidase"
definition: >-
  primary-amine oxidase (tynA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011285 (equivalog); catalyses primary-amine oxidase; associated with copper ion binding, primary methylamine oxidase activity, amine metabolic process, quinone binding. Members occur in Gammaproteobacteria.
