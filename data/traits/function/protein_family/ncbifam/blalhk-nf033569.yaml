label: "LHK family class C beta-lactamase"
definition: >-
  LHK family class C beta-lactamase (blaLHK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033569 (exception); catalyses beta-lactamase; associated with beta-lactamase activity, outer membrane-bounded periplasmic space. Members occur in Laribacter hongkongensis.
