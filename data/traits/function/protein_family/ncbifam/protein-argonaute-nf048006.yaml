definition: >-
  protein argonaute (ago) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF048006 (equivalog); associated with DNA binding, RNA binding, DNA endonuclease activity, RNA endonuclease activity. Members occur in Thermotogae.
