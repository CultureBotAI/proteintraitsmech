label: "two-component system response regulator CseB"
definition: >-
  two-component system response regulator CseB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041733 (equivalog); associated with phosphorelay response regulator activity, transcription cis-regulatory region binding, regulation of DNA-templated transcription. Members occur in Actinomycetes.
