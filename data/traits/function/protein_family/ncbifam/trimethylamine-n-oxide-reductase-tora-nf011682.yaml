identifier: NCBIfam:NF011682
label: "trimethylamine-N-oxide reductase TorA"
definition: >-
  trimethylamine-N-oxide reductase TorA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011682 (equivalog); catalyses trimethylamine-N-oxide reductase; associated with molybdenum ion binding, periplasmic space, molybdopterin cofactor binding, trimethylamine-N-oxide reductase (cytochrome c) activity. Members occur in Pseudomonadati.
