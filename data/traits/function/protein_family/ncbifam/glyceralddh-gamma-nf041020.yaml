identifier: NCBIfam:NF041020
label: "glyceraldehyde dehydrogenase subunit gamma"
definition: >-
  glyceraldehyde dehydrogenase subunit gamma (cutC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041020 (equivalog); catalyses glyceraldehyde dehydrogenase (FAD-containing); associated with iron ion binding, oxidoreductase activity, acting on the aldehyde or oxo group of donors, glyceraldehyde oxidoreductase activity. Members occur in Thermoprotei.
