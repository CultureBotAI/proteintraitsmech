identifier: NCBIfam:NF049988
label: "alpha-monoglucosyldiacylglycerol synthase"
definition: >-
  alpha-monoglucosyldiacylglycerol synthase (mgs) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049988 (equivalog); catalyses 1,2-diacylglycerol 3-alpha-glucosyltransferase; associated with glycerol metabolic process, hexosyltransferase activity, 1,2-diacylglycerol 3-glucosyltransferase activity. Members occur in Acholeplasmataceae.
