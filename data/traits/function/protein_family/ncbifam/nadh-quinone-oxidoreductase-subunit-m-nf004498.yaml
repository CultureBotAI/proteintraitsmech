identifier: NCBIfam:NF004498
label: "NADH-quinone oxidoreductase subunit M"
definition: >-
  NADH-quinone oxidoreductase subunit M (nuoM) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004498 (equivalog); catalyses NADH:ubiquinone reductase (non-electrogenic); associated with NADH dehydrogenase (ubiquinone) activity, ATP synthesis coupled electron transport. Members occur in Gammaproteobacteria.
