identifier: NCBIfam:TIGR02077
label: "thr operon leader peptide"
definition: >-
  thr operon leader peptide (thrL) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02077 (equivalog); associated with L-threonine biosynthetic process, regulation of termination of DNA-templated transcription, transcriptional attenuation by ribosome. Members occur in Gammaproteobacteria.
