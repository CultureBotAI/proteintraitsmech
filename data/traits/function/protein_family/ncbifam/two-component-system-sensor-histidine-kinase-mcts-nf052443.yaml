identifier: NCBIfam:NF052443
label: "two-component system sensor histidine kinase MctS"
definition: >-
  two-component system sensor histidine kinase MctS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052443 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, ATP binding, protein dimerization activity. Members occur in Hyphomicrobiales.
