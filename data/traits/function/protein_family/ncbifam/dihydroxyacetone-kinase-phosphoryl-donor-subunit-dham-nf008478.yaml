identifier: NCBIfam:NF008478
label: "dihydroxyacetone kinase phosphoryl donor subunit DhaM"
definition: >-
  dihydroxyacetone kinase phosphoryl donor subunit DhaM — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008478 (equivalog); catalyses phosphoenolpyruvate--glycerone phosphotransferase; associated with phosphoenolpyruvate-dependent sugar phosphotransferase system, membrane, phosphorylation, glycerol catabolic process. Members occur in Enterobacterales.
