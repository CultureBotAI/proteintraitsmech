label: "peptidoglycan DD-endopeptidase ShyA"
definition: >-
  peptidoglycan DD-endopeptidase ShyA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053825 (equivalog); associated with metalloendopeptidase activity, proteolysis, periplasmic space, peptidoglycan binding. Members occur in Vibrio.
