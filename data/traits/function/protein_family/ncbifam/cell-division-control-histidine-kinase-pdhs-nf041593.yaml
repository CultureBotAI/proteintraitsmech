identifier: NCBIfam:NF041593
label: "cell-division control histidine kinase PdhS"
definition: >-
  cell-division control histidine kinase PdhS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041593 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, regulation of DNA-templated transcription. Members occur in Brucella/Ochrobactrum group.
