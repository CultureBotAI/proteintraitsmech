  CoA-disulfide reductase (cdr) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03385 (equivalog); catalyses CoA-disulfide reductase; associated with protein disulfide isomerase activity, CoA-disulfide reductase (NADPH) activity, flavin adenine dinucleotide binding, NADP binding.
