identifier: NCBIfam:NF045630
label: "3-hydroxy-9,10-secoandrosta-1,3,5(10)-triene-9,17-dione monooxygenase reductase subunit"
definition: >-
  3-hydroxy-9,10-secoandrosta-1,3,5(10)-triene-9,17-dione monooxygenase reductase subunit (hsaB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045630 (equivalog); catalyses flavin reductase (NADH); associated with catabolic process, lipid catabolic process, flavin reductase (NADH) activity. Members occur in Actinomycetes.
