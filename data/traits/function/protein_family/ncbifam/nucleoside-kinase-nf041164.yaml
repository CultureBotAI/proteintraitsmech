  nucleoside kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041164 (equivalog); catalyses adenosine kinase, cytidine kinase, inosine kinase; associated with nucleoside kinase activity. Members occur in Thermoplasmatales.
