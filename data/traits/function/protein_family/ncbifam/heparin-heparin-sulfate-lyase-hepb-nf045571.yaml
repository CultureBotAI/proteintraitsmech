label: "heparin/heparin-sulfate lyase HepB"
definition: >-
  heparin/heparin-sulfate lyase HepB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045571 (equivalog); catalyses heparin lyase, heparin-sulfate lyase; associated with heparin-sulfate lyase activity, heparin proteoglycan catabolic process, heparin lyase activity.
