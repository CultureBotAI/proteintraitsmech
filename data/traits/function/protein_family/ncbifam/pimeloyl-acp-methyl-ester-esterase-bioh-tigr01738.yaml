identifier: NCBIfam:TIGR01738
label: "pimeloyl-ACP methyl ester esterase BioH"
definition: >-
  pimeloyl-ACP methyl ester esterase BioH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01738 (equivalog); catalyses pimeloyl-[acyl-carrier protein] methyl ester esterase; associated with biotin biosynthetic process, carboxylic ester hydrolase activity. Members occur in Pseudomonadota.
