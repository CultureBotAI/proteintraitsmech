definition: >-
  3-dehydroshikimate dehydratase QuiC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042435 (equivalog); catalyses 3-dehydroshikimate dehydratase; associated with quinate catabolic process, shikimate catabolic process, 3-dehydroshikimate dehydratase activity. Members occur in Gammaproteobacteria.
