label: "5,10-methylenetetrahydromethanopterin reductase"
definition: >-
  5,10-methylenetetrahydromethanopterin reductase (mer) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03555 (equivalog); catalyses 5,10-methylenetetrahydromethanopterin reductase; associated with methanogenesis, coenzyme F420-dependent N5,N10-methenyltetrahydromethanopterin reductase activity, coenzyme F420 binding.
