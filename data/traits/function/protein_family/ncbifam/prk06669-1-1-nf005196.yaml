label: "flagellar assembly protein FliH"
definition: >-
  flagellar assembly protein FliH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005196 (equivalog); associated with cytoskeletal motor activity, bacterial-type flagellum, bacterial-type flagellum-dependent cell motility. Members occur in Campylobacterales.
