identifier: NCBIfam:NF058563
label: "disaccharide 3-dehydrogenase"
definition: >-
  disaccharide 3-dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058563 (equivalog); catalyses glucoside 3-dehydrogenase (acceptor); associated with disaccharide metabolic process, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor. Members occur in Bacteroidales.
