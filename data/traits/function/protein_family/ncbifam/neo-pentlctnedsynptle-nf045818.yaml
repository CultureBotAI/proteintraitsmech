identifier: NCBIfam:NF045818
label: "neopentalenolactone/pentalenolactone D synthase"
definition: >-
  neopentalenolactone/pentalenolactone D synthase (ptlE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045818 (equivalog); catalyses pentalenolactone D synthase, neopentalenolactone D synthase; associated with oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen, antibiotic biosynthetic process. Members occur in Actinomycetes.
