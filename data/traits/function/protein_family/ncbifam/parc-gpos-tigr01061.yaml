identifier: NCBIfam:TIGR01061
label: "DNA topoisomerase IV subunit A"
definition: >-
  DNA topoisomerase IV subunit A (parC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01061 (equivalog); catalyses DNA topoisomerase (ATP-hydrolyzing); associated with DNA binding, DNA topoisomerase type II (double strand cut, ATP-hydrolyzing) activity, ATP binding, chromosome. Members occur in Bacillati.
