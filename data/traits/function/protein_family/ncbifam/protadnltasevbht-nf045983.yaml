identifier: NCBIfam:NF045983
label: "type II toxin-antitoxin system protein adenylyltransferase VbhT"
definition: >-
  type II toxin-antitoxin system protein adenylyltransferase VbhT — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045983 (equivalog); catalyses protein adenylyltransferase; associated with protein adenylylation, protein homodimerization activity, AMPylase activity. Members occur in Bartonella.
