label: "photosynthetic reaction center subunit L"
definition: >-
  photosynthetic reaction center subunit L (pufL) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01157 (equivalog); associated with electron transfer activity, photosynthesis, light reaction, plasma membrane light-harvesting complex. Members occur in Pseudomonadati.
