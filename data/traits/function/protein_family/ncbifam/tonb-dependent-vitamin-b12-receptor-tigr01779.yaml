identifier: NCBIfam:TIGR01779
label: "TonB-dependent vitamin B12 receptor"
definition: >-
  TonB-dependent vitamin B12 receptor (btuB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01779 (equivalog); associated with ABC-type vitamin B12 transporter activity, cobalamin transport, outer membrane, cobalamin binding. Members occur in Gammaproteobacteria.
