identifier: NCBIfam:NF003926
label: "RNA degradosome polyphosphate kinase"
definition: >-
  RNA degradosome polyphosphate kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003926 (equivalog); catalyses ATP-polyphosphate phosphotransferase; associated with polyphosphate biosynthetic process, polyphosphate kinase activity, polyphosphate kinase complex. Members occur in Helicobacter pylori.
