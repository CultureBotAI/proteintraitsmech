identifier: NCBIfam:NF049938
label: "(2E)-enoyl-ACP glycyltransferase"
definition: >-
  (2E)-enoyl-ACP glycyltransferase (scoD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049938 (equivalog); catalyses (3R)-3-[(carboxylmethyl)amino]fatty acid synthase; associated with fatty acid metabolic process, lyase activity. Members occur in Actinomycetes.
