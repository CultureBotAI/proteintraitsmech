identifier: NCBIfam:NF041608
label: "methylcobamide:CoM methyltransferase MtbA"
definition: >-
  methylcobamide:CoM methyltransferase MtbA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041608 (equivalog); catalyses [methyl-Co(III) methylamine-specific corrinoid protein]:coenzyme M; associated with one-carbon metabolic process, methanogenesis, dimethylamine methyltransferase activity, [methyl-Co(III) methylamine-specific corrinoid protein]:coenzyme M methyltransferase activity. Members occur in Methanosarcinaceae.
