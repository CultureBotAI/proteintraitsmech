identifier: NCBIfam:NF011710
label: "mannose-6-phosphate isomerase"
definition: >-
  mannose-6-phosphate isomerase (manA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011710 (equivalog); catalyses mannose-6-phosphate isomerase; associated with mannose-6-phosphate isomerase activity, zinc ion binding, GDP-mannose biosynthetic process. Members occur in Enterobacterales.
