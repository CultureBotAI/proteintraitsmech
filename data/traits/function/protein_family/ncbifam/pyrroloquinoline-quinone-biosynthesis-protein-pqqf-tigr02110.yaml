definition: >-
  pyrroloquinoline quinone biosynthesis protein PqqF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02110 (equivalog); associated with metalloendopeptidase activity, proteolysis, zinc ion binding, pyrroloquinoline quinone biosynthetic process. Members occur in Gammaproteobacteria.
