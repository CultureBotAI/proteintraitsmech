definition: >-
  acetyltransferase SucT — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058601 (equivalog); associated with polysaccharide biosynthetic process, lipopolysaccharide biosynthetic process, acyltransferase activity, transferring groups other than amino-acyl groups. Members occur in Mycobacteriaceae.
