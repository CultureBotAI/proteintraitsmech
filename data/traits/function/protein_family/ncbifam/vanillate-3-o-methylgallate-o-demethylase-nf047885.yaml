  vanillate/3-O-methylgallate O-demethylase (ligM) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047885 (equivalog); catalyses vanillate/3-O-methylgallate O-demethylase; associated with methyltransferase activity, lignin catabolic process.
