label: "DNA-binding transcriptional repressor RacR"
definition: >-
  DNA-binding transcriptional repressor RacR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049929 (equivalog); associated with DNA-binding transcription repressor activity, negative regulation of DNA-templated transcription initiation. Members occur in Enterobacterales.
