definition: >-
  oxalate oxidoreductase subunit delta — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045790 (equivalog); catalyses oxalate oxidoreductase; associated with oxidoreductase activity, acting on the aldehyde or oxo group of donors, iron-sulfur protein as acceptor, oxalate catabolic process.
