definition: >-
  HMP-PP phosphatase (cof) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011705 (equivalog); associated with hydrolase activity, acting on acid anhydrides, in phosphorus-containing anhydrides. Members occur in Enterobacterales.
