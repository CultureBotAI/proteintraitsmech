identifier: NCBIfam:NF049975
label: "D-2-hydroxyglutarate dehydrogenase YdiJ"
definition: >-
  D-2-hydroxyglutarate dehydrogenase YdiJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049975 (equivalog); catalyses D-2-hydroxyglutarate dehydrogenase; associated with D-lactate dehydrogenase (NAD+) activity, metal ion binding, lactate catabolic process. Members occur in Pseudomonadota.
