identifier: NCBIfam:TIGR01419
label: "PTS IIA-like nitrogen regulatory protein PtsN"
definition: >-
  PTS IIA-like nitrogen regulatory protein PtsN — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01419 (equivalog); associated with regulation of DNA-templated transcription, protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system. Members occur in Pseudomonadota.
