identifier: NCBIfam:TIGR02437
label: "fatty acid oxidation complex subunit alpha FadB"
definition: >-
  fatty acid oxidation complex subunit alpha FadB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02437 (equivalog); associated with (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity, delta(3)-delta(2)-enoyl-CoA isomerase activity, enoyl-CoA hydratase activity, 3-hydroxybutyryl-CoA epimerase activity. Members occur in Gammaproteobacteria.
