identifier: NCBIfam:TIGR01119
label: "galactose-6-phosphate isomerase subunit LacB"
definition: >-
  galactose-6-phosphate isomerase subunit LacB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01119 (equivalog); catalyses galactose-6-phosphate isomerase; associated with lactose catabolic process, intramolecular oxidoreductase activity, interconverting aldoses and ketoses, galactose-6-phosphate isomerase activity. Members occur in Bacilli.
