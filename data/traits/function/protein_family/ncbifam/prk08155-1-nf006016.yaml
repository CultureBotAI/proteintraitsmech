label: "acetolactate synthase large subunit"
definition: >-
  acetolactate synthase large subunit (ilvB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006016 (equivalog); associated with magnesium ion binding, acetolactate synthase activity, branched-chain amino acid biosynthetic process, thiamine pyrophosphate binding. Members occur in Enterobacterales.
