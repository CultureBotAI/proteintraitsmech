identifier: NCBIfam:NF006989
label: "glycerophosphodiester phosphodiesterase"
definition: >-
  glycerophosphodiester phosphodiesterase (ugpQ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006989 (equivalog); catalyses glycerophosphodiester phosphodiesterase; associated with lipid metabolic process, phosphoric diester hydrolase activity. Members occur in Pseudomonadota.
