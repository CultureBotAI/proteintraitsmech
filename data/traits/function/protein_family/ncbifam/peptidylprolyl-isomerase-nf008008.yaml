definition: >-
  peptidylprolyl isomerase (slyD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008008 (equivalog); catalyses peptidylprolyl isomerase; associated with peptidyl-prolyl cis-trans isomerase activity. Members occur in Gammaproteobacteria.
