label: "signal transduction histidine-protein kinase/phosphatase UhpB"
definition: >-
  signal transduction histidine-protein kinase/phosphatase UhpB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008649 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system. Members occur in Gammaproteobacteria.
