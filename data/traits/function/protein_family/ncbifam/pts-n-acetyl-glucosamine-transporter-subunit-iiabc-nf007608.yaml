identifier: NCBIfam:NF007608
label: "PTS N-acetyl glucosamine transporter subunit IIABC"
definition: >-
  PTS N-acetyl glucosamine transporter subunit IIABC (nagE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007608 (equivalog); catalyses protein-N(pi)-phosphohistidine--N-acetyl-D-glucosamine; associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system, N-acetylglucosamine transmembrane transporter activity, membrane. Members occur in Enterobacteriaceae.
