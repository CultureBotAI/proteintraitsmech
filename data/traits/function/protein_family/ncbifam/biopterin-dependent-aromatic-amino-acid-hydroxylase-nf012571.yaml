label: "Biopterin-dependent aromatic amino acid hydroxylase"
definition: >-
  Biopterin-dependent aromatic amino acid hydroxylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF012571 (pfameq); associated with oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, reduced pteridine as one donor, and incorporation of one atom of oxygen.
