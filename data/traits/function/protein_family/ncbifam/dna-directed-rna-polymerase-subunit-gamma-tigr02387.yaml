identifier: NCBIfam:TIGR02387
label: "DNA-directed RNA polymerase subunit gamma"
definition: >-
  DNA-directed RNA polymerase subunit gamma (rpoC1) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02387 (equivalog); catalyses DNA-directed RNA polymerase; associated with DNA binding, DNA-directed RNA polymerase activity, DNA-templated transcription. Members occur in Cyanobacteriota/Melainabacteria group.
