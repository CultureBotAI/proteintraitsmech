identifier: NCBIfam:NF009365
label: "flagellar transcriptional regulator FlhC"
definition: >-
  flagellar transcriptional regulator FlhC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009365 (equivalog); associated with DNA binding, positive regulation of DNA-templated transcription, regulation of bacterial-type flagellum assembly. Members occur in Pseudomonadota.
