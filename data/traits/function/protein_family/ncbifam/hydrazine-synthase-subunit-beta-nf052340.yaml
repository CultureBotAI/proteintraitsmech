identifier: NCBIfam:NF052340
label: "hydrazine synthase subunit beta"
definition: >-
  hydrazine synthase subunit beta (hzsB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052340 (equivalog); catalyses hydrazine synthase; associated with anaerobic respiration, using ammonium as electron donor, anammoxosome, hydrazine synthase activity. Members occur in Candidatus Brocadiales.
