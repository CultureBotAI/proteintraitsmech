identifier: NCBIfam:NF042972
label: "acryloyl-CoA reductase"
definition: >-
  acryloyl-CoA reductase (acrC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042972 (equivalog); catalyses acryloyl-CoA reductase (NADH); associated with acyl-CoA dehydrogenase activity, oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor, acryloyl-CoA reductase (NADH) activity.
