identifier: NCBIfam:NF008728
label: "NADH-quinone oxidoreductase subunit C/D"
definition: >-
  NADH-quinone oxidoreductase subunit C/D (nuoC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008728 (equivalog); catalyses NADH:ubiquinone reductase (non-electrogenic); associated with NADH dehydrogenase complex, quinone binding, NADH dehydrogenase (quinone) (non-electrogenic) activity, NAD binding. Members occur in Gammaproteobacteria.
