identifier: NCBIfam:NF040936
label: "hexaprenyl pyrophosphate synthase"
definition: >-
  hexaprenyl pyrophosphate synthase (gdS-2) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040936 (equivalog); catalyses hexaprenyl diphosphate synthase [geranylgeranyl-diphosphate specific]; associated with isoprenoid biosynthetic process, hexaprenyl diphosphate synthase (geranylgeranyl-diphosphate specific) activity. Members occur in Sulfolobaceae.
