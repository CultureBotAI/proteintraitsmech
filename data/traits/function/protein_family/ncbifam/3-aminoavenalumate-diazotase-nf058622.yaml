identifier: NCBIfam:NF058622
label: "3-aminoavenalumate diazotase"
definition: >-
  3-aminoavenalumate diazotase (avaA6) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058622 (equivalog); catalyses 3-aminoavenalumate diazotase; associated with CoA-ligase activity, metal ion binding. Members occur in Actinomycetes.
