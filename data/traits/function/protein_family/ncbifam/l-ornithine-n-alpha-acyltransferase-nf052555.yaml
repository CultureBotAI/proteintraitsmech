identifier: NCBIfam:NF052555
label: "l-ornithine N(alpha)-acyltransferase"
definition: >-
  l-ornithine N(alpha)-acyltransferase (olsB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052555 (equivalog); catalyses L-ornithine N(alpha)-acyltransferase; associated with lipid metabolic process, ornithine-acyl [acyl carrier protein] N-acyltransferase activity. Members occur in Alphaproteobacteria.
