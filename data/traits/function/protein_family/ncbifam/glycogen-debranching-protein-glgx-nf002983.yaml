identifier: NCBIfam:NF002983
label: "glycogen debranching protein GlgX"
definition: >-
  glycogen debranching protein GlgX — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002983 (equivalog); catalyses limit dextrin alpha-1,6-maltotetraose-hydrolase; associated with glycogen catabolic process, limit dextrin alpha-1,6-maltotetraose-hydrolase activity. Members occur in Enterobacterales.
