label: "bifunctional dihydroneopterin aldolase/7,8-dihydroneopterin epimerase"
definition: >-
  bifunctional dihydroneopterin aldolase/7,8-dihydroneopterin epimerase (folB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008614 (equivalog); catalyses dihydroneopterin aldolase, 7,8-dihydroneopterin epimerase; associated with dihydroneopterin aldolase activity, folic acid-containing compound metabolic process. Members occur in Gammaproteobacteria.
