identifier: NCBIfam:NF008558
label: "UDP-forming cellulose synthase catalytic subunit"
definition: >-
  UDP-forming cellulose synthase catalytic subunit (bcsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008558 (equivalog); catalyses cellulose synthase (UDP-forming); associated with UDP-alpha-D-glucose metabolic process, membrane, cellulose synthase (UDP-forming) activity, cellulose biosynthetic process. Members occur in Pseudomonadota.
