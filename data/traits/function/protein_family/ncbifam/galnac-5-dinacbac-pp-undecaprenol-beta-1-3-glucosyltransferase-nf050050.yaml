definition: >-
  GalNAc(5)-diNAcBac-PP-undecaprenol beta-1,3-glucosyltransferase (pglI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050050 (equivalog); catalyses GalNAc5-diNAcBac-PP-undecaprenol beta-1,3-glucosyltransferase; associated with protein N-linked glycosylation, glucosyltransferase activity. Members occur in Campylobacter.
