label: "leucine/methionine racemase"
definition: >-
  leucine/methionine racemase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045634 (equivalog); catalyses methionine racemase; associated with transaminase activity, isomerase activity. Members occur in Thermococcaceae.
