definition: >-
  tRNA pseudouridine(65) synthase TruC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008321 (equivalog); catalyses tRNA pseudouridine(65) synthase; associated with pseudouridine synthesis, pseudouridine synthase activity. Members occur in Pseudomonadati.
