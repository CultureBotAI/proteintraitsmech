identifier: NCBIfam:NF045812
label: "pentalenene oxygenase"
definition: >-
  pentalenene oxygenase (ptlI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045812 (equivalog); catalyses pentalenene oxygenase; associated with monooxygenase activity, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, antibiotic biosynthetic process, pentalenene synthase activity. Members occur in Actinomycetes.
