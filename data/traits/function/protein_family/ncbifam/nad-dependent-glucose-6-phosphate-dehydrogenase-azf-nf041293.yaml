identifier: NCBIfam:NF041293
label: "NAD-dependent glucose-6-phosphate dehydrogenase Azf"
definition: >-
  NAD-dependent glucose-6-phosphate dehydrogenase Azf — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041293 (equivalog); catalyses glucose-6-phosphate dehydrogenase (NAD(+)); associated with glucose-6-phosphate dehydrogenase activity, pentose-phosphate shunt, NAD+ binding. Members occur in Halobacteriales.
