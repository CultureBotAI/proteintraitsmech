label: "lipid IV(A) 4-amino-4-deoxy-L-arabinosyltransferase"
definition: >-
  lipid IV(A) 4-amino-4-deoxy-L-arabinosyltransferase (arnT) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009784 (equivalog); catalyses lipid IVA 4-amino-4-deoxy-L-arabinosyltransferase; associated with mannosyltransferase activity, protein O-linked glycosylation, membrane, pentosyltransferase activity. Members occur in Gammaproteobacteria.
