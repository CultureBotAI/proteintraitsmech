label: "thiosulfate sulfurtransferase GlpE"
definition: >-
  thiosulfate sulfurtransferase GlpE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF001195 (equivalog); catalyses thiosulfate sulfurtransferase; associated with thiosulfate-cyanide sulfurtransferase activity. Members occur in Gammaproteobacteria.
