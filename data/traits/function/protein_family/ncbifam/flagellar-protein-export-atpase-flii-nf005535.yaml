identifier: NCBIfam:NF005535
label: "flagellar protein export ATPase FliI"
definition: >-
  flagellar protein export ATPase FliI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005535 (equivalog); catalyses H(+)-transporting two-sector ATPase; associated with ATP binding, ATP hydrolysis activity, protein secretion by the type III secretion system. Members occur in Pseudomonadota.
