label: "DNA-binding transcriptional regulator KdgR"
definition: >-
  DNA-binding transcriptional regulator KdgR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011671 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription. Members occur in Pseudomonadota.
