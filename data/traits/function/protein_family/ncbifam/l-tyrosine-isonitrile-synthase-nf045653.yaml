label: "L-tyrosine isonitrile synthase"
definition: >-
  L-tyrosine isonitrile synthase (pvcA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045653 (equivalog); catalyses L-tyrosine isonitrile synthase; associated with lyase activity. Members occur in Enterobacterales.
