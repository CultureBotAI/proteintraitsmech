identifier: NCBIfam:NF045702
label: "tetraether lipid synthase Tes"
definition: >-
  tetraether lipid synthase Tes — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045702 (equivalog); catalyses tetraether lipid synthase; associated with lipid biosynthetic process, oxidoreductase activity, acting on X-H and Y-H to form an X-Y bond, 4 iron, 4 sulfur cluster binding.
