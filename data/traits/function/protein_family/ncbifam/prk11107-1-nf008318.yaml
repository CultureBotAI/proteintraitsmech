label: "two-component sensor histidine kinase BarA"
definition: >-
  two-component sensor histidine kinase BarA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008318 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, membrane, phosphorylation. Members occur in Gammaproteobacteria.
