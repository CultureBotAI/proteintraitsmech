  methionine synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007024 (equivalog); catalyses methionine synthase; associated with zinc ion binding, methionine synthase activity, cobalamin binding, L-methionine biosynthetic process.
