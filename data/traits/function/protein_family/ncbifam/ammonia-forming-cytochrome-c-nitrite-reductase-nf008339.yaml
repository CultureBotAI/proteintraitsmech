  ammonia-forming cytochrome c nitrite reductase (nrfA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008339 (equivalog); catalyses nitrite reductase (cytochrome; ammonia-forming). Members occur in Pseudomonadati.
