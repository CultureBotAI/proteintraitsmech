definition: >-
  DNA double-strand break repair nuclease NurA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041033 (equivalog); associated with endonuclease activity, exonuclease activity, DNA repair. Members occur in Sulfolobaceae.
