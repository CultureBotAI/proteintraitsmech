identifier: NCBIfam:NF041322
label: "anthranilate synthase component II"
definition: >-
  anthranilate synthase component II (trpG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041322 (equivalog); catalyses anthranilate synthase; associated with L-tryptophan biosynthetic process, anthranilate synthase activity. Members occur in Halobacteriales.
