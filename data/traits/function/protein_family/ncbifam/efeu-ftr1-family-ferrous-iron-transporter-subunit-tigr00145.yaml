identifier: NCBIfam:TIGR00145
label: "EfeU/Ftr1 family ferrous iron transporter subunit"
definition: >-
  EfeU/Ftr1 family ferrous iron transporter subunit — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00145 (subfamily); associated with iron ion transmembrane transporter activity, plasma membrane, high-affinity iron permease complex, iron ion transmembrane transport. Members occur in Enterobacterales.
