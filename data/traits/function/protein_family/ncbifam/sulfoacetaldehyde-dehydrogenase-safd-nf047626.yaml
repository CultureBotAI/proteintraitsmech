label: "sulfoacetaldehyde dehydrogenase SafD"
definition: >-
  sulfoacetaldehyde dehydrogenase SafD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047626 (equivalog); catalyses sulfoacetaldehyde dehydrogenase; associated with lactaldehyde dehydrogenase (NAD+) activity, sulfoacetaldehyde dehydrogenase activity. Members occur in Pseudomonadati.
