label: "NADH-quinone oxidoreductase subunit J"
definition: >-
  NADH-quinone oxidoreductase subunit J (nuoJ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005162 (equivalog); catalyses NADH:ubiquinone reductase (non-electrogenic); associated with NADH dehydrogenase (ubiquinone) activity. Members occur in Gammaproteobacteria.
