identifier: NCBIfam:NF033213
label: "aspartate 1-decarboxylase autocleavage activator PanM"
definition: >-
  aspartate 1-decarboxylase autocleavage activator PanM — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033213 (equivalog); associated with N-acetyltransferase activity, pantothenate biosynthetic process, zymogen activation. Members occur in Gammaproteobacteria.
