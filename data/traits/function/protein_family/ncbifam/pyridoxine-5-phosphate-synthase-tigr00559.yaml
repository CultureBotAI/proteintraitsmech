  pyridoxine 5'-phosphate synthase (pdxJ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00559 (equivalog); catalyses pyridoxine 5'-phosphate synthase; associated with pyridoxine biosynthetic process, pyridoxine 5'-phosphate synthase activity.
