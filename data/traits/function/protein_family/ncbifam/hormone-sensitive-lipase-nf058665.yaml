label: "hormone-sensitive lipase"
definition: >-
  hormone-sensitive lipase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058665 (equivalog); catalyses hormone-sensitive lipase; associated with lipid catabolic process, lipase activity. Members occur in Pseudomonadota.
