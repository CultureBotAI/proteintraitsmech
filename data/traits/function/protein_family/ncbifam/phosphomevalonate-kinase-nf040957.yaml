label: "phosphomevalonate kinase"
definition: >-
  phosphomevalonate kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040957 (equivalog); catalyses phosphomevalonate kinase; associated with phosphomevalonate kinase activity, obsolete farnesyl diphosphate biosynthetic process, mevalonate pathway, isopentenyl diphosphate biosynthetic process, mevalonate pathway. Members occur in Sulfolobaceae.
