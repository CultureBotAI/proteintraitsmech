identifier: NCBIfam:NF045851
label: "MnuA family membrane nuclease"
definition: >-
  MnuA family membrane nuclease — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045851 (subfamily); associated with external side of plasma membrane, DNA endonuclease activity, producing 5'-phosphomonoesters. Members occur in Mycoplasmatota.
