identifier: NCBIfam:NF045791
label: "oxalate oxidoreductase subunit alpha"
definition: >-
  oxalate oxidoreductase subunit alpha — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045791 (equivalog); catalyses oxalate oxidoreductase; associated with oxidoreductase activity, acting on the aldehyde or oxo group of donors, iron-sulfur protein as acceptor, oxalate catabolic process.
