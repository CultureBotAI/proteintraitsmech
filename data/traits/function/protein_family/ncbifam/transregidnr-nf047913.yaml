label: "DNA-binding transcriptional regulator IdnR"
definition: >-
  DNA-binding transcriptional regulator IdnR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047913 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription, D-gluconate metabolic process. Members occur in Enterobacteriaceae.
