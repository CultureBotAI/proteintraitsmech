identifier: NCBIfam:TIGR02164
label: "trimethylamine-N-oxide reductase TorA"
definition: >-
  trimethylamine-N-oxide reductase TorA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02164 (equivalog); catalyses trimethylamine-N-oxide reductase; associated with electron transfer activity, anaerobic respiration, molybdenum ion binding, trimethylamine-N-oxide reductase (cytochrome c) activity. Members occur in Gammaproteobacteria.
