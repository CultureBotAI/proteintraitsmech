definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: Release of signal peptides from bacterial membrane prolipoproteins. Hydrolyzes -Xaa-Yaa-Zaa-|-(S,diacylglyceryl)Cys-, in which Xaa is hydrophobic (preferably Leu), and Yaa (Ala or Ser) and Zaa (Gly or Ala) have small, neutral side chains
