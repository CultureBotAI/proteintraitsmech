identifier: NCBIfam:TIGR00077
label: "signal peptidase II"
definition: >-
  signal peptidase II (lspA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00077 (equivalog); catalyses signal peptidase II; associated with aspartic-type endopeptidase activity, plasma membrane, proteolysis, protein secretion.
