label: "4-hydroxyphenylacetate permease"
definition: >-
  4-hydroxyphenylacetate permease (hpaX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02332 (equivalog); associated with 4-hydroxyphenylacetate transport, 4-hydroxyphenylacetate transmembrane transporter activity. Members occur in Enterobacterales.
