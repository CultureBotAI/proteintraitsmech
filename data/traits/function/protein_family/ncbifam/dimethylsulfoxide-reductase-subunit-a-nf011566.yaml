identifier: NCBIfam:NF011566
label: "dimethylsulfoxide reductase subunit A"
definition: >-
  dimethylsulfoxide reductase subunit A (dmsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011566 (exception); catalyses respiratory dimethylsulfoxide reductase; associated with dimethyl sulfoxide reductase activity, molybdenum ion binding. Members occur in Enterobacterales.
