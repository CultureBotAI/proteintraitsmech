identifier: NCBIfam:NF007005
label: "osmolarity response regulator transcription factor OmpR"
definition: >-
  osmolarity response regulator transcription factor OmpR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007005 (equivalog); associated with phosphorelay signal transduction system, DNA binding, regulation of DNA-templated transcription. Members occur in Pseudomonadota.
