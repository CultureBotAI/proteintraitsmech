identifier: NCBIfam:NF040847
label: "bisphosphomevalonate decarboxylase"
definition: >-
  bisphosphomevalonate decarboxylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040847 (equivalog); catalyses bisphosphomevalonate decarboxylase; associated with carboxy-lyase activity, isopentenyl diphosphate biosynthetic process, mevalonate pathway. Members occur in Thermoplasmatales.
