label: "EmrA/EmrK family multidrug efflux transporter periplasmic adaptor subunit"
definition: >-
  EmrA/EmrK family multidrug efflux transporter periplasmic adaptor subunit — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00998 (subfamily); associated with xenobiotic transmembrane transporter activity, xenobiotic detoxification by transmembrane export across the plasma membrane. Members occur in Pseudomonadota.
