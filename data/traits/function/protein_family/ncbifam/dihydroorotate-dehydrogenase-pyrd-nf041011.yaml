identifier: NCBIfam:NF041011
label: "dihydroorotate dehydrogenase PyrD"
definition: >-
  dihydroorotate dehydrogenase PyrD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041011 (equivalog); catalyses dihydroorotate dehydrogenase (NAD(+)); associated with dihydroorotate dehydrogenase activity, dihydroorotate dehydrogenase (NAD+) activity, 'de novo' pyrimidine nucleobase biosynthetic process. Members occur in Thermoprotei.
