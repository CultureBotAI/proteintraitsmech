identifier: NCBIfam:NF007352
label: "aldehyde dehydrogenase PuuC"
definition: >-
  aldehyde dehydrogenase PuuC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007352 (equivalog); catalyses aldehyde dehydrogenase [NAD(P)(+)]; associated with oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor. Members occur in Enterobacterales.
