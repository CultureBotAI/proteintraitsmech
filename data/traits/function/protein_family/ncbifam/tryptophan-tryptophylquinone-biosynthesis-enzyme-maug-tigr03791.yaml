definition: >-
  tryptophan tryptophylquinone biosynthesis enzyme MauG — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03791 (equivalog); associated with calcium ion binding, oxidoreductase activity, heme binding, methylamine metabolic process. Members occur in Pseudomonadota.
