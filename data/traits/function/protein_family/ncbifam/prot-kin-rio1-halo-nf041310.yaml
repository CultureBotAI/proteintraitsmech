label: "serine/threonine-protein kinase Rio1"
definition: >-
  serine/threonine-protein kinase Rio1 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041310 (equivalog); catalyses non-specific serine/threonine protein kinase; associated with protein serine/threonine kinase activity, protein phosphorylation, hydrolase activity. Members occur in Halobacteriales.
