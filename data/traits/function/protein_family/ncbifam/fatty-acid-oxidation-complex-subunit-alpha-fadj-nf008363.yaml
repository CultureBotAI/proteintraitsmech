identifier: NCBIfam:NF008363
label: "fatty acid oxidation complex subunit alpha FadJ"
definition: >-
  fatty acid oxidation complex subunit alpha FadJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008363 (equivalog); catalyses 3-hydroxyacyl-CoA dehydrogenase, enoyl-CoA hydratase, 3-hydroxybutyryl-CoA epimerase; associated with (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity, fatty acid beta-oxidation, 3-hydroxybutyryl-CoA epimerase activity, oxidoreductase activity. Members occur in Pseudomonadati.
