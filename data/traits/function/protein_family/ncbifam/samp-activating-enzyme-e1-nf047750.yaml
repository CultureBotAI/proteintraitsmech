identifier: NCBIfam:NF047750
label: "SAMP-activating enzyme E1"
definition: >-
  SAMP-activating enzyme E1 (ubaA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047750 (equivalog); associated with ATP binding, ubiquitin-like modifier activating enzyme activity, nucleotidyltransferase activity. Members occur in Halobacteria.
