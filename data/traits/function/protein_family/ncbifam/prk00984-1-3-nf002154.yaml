label: "tRNA pseudouridine(13) synthase TruD"
definition: >-
  tRNA pseudouridine(13) synthase TruD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002154 (equivalog); catalyses tRNA pseudouridine(13) synthase; associated with pseudouridine synthesis, RNA modification, pseudouridine synthase activity. Members occur in Campylobacterales.
