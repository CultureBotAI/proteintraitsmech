identifier: NCBIfam:NF005448
label: "RNA polymerase factor sigma-70"
definition: >-
  RNA polymerase factor sigma-70 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005448 (equivalog); catalyses DNA-directed RNA polymerase; associated with DNA binding, DNA-templated transcription initiation, sigma factor activity. Members occur in Pseudomonadota.
