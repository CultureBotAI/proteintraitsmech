identifier: NCBIfam:NF006682
label: "formimidoylglutamate deiminase"
definition: >-
  formimidoylglutamate deiminase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006682 (equivalog); catalyses formimidoylglutamate deiminase; associated with hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds. Members occur in Pseudomonadota.
