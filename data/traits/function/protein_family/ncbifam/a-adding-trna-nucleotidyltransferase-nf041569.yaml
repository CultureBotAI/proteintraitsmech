identifier: NCBIfam:NF041569
label: "A-adding tRNA nucleotidyltransferase"
definition: >-
  A-adding tRNA nucleotidyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041569 (equivalog); associated with tRNA binding, tRNA processing, ATP:3'-cytidine-cytidine-tRNA adenylyltransferase activity. Members occur in Geobacteraceae.
