label: "multifunctional acyl-CoA thioesterase I/protease I/lysophospholipase L1"
definition: >-
  multifunctional acyl-CoA thioesterase I/protease I/lysophospholipase L1 (tesA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007819 (equivalog); catalyses lysophospholipase, oleoyl-[acyl-carrier-protein] hydrolase, palmitoyl-CoA hydrolase; associated with lipid metabolic process, lipase activity. Members occur in Gammaproteobacteria.
