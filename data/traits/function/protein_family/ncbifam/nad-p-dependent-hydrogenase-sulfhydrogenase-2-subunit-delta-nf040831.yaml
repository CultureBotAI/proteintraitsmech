identifier: NCBIfam:NF040831
label: "NAD(P)-dependent hydrogenase/sulfhydrogenase 2 subunit delta"
definition: >-
  NAD(P)-dependent hydrogenase/sulfhydrogenase 2 subunit delta (shyD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040831 (equivalog); catalyses hydrogen dehydrogenase [NAD(P)(+)]; associated with hydrogen dehydrogenase activity, 3 iron, 4 sulfur cluster binding. Members occur in Thermococcaceae.
