label: "oxalyl-CoA decarboxylase"
definition: >-
  oxalyl-CoA decarboxylase (oxc) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03254 (equivalog); catalyses oxalyl-CoA decarboxylase; associated with oxalyl-CoA decarboxylase activity, thiamine pyrophosphate binding, oxalate catabolic process, metal ion binding.
