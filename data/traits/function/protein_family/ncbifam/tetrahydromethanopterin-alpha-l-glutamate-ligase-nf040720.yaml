label: "tetrahydromethanopterin:alpha-L-glutamate ligase"
definition: >-
  tetrahydromethanopterin:alpha-L-glutamate ligase (mptN) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040720 (equivalog); catalyses tetrahydrosarcinapterin synthase; associated with ligase activity, forming carbon-nitrogen bonds, protein modification process. Members occur in Methanobacteriota.
