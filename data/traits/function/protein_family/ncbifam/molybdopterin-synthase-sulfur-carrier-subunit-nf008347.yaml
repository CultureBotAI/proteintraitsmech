identifier: NCBIfam:NF008347
label: "molybdopterin synthase sulfur carrier subunit"
definition: >-
  molybdopterin synthase sulfur carrier subunit (moaD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008347 (equivalog); catalyses molybdopterin synthase; associated with Mo-molybdopterin cofactor biosynthetic process. Members occur in Gammaproteobacteria.
