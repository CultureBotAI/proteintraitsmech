  betaine-aldehyde dehydrogenase (betB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01804 (equivalog); catalyses betaine-aldehyde dehydrogenase; associated with betaine-aldehyde dehydrogenase (NAD+) activity, glycine betaine biosynthetic process, metal ion binding.
