identifier: NCBIfam:NF004439
label: "NADH-quinone oxidoreductase subunit NuoN"
definition: >-
  NADH-quinone oxidoreductase subunit NuoN — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004439 (equivalog); catalyses NADH:ubiquinone reductase (H(+)-translocating); associated with NADH dehydrogenase (ubiquinone) activity. Members occur in Gammaproteobacteria.
