identifier: NCBIfam:NF043015
label: "dibenzothiophene monooxygenase"
definition: >-
  dibenzothiophene monooxygenase (dszC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043015 (equivalog); catalyses dibenzothiophene monooxygenase; associated with monooxygenase activity, oxidoreductase activity, acting on the CH-CH group of donors, dibenzothiophene catabolic process. Members occur in Mycobacteriaceae.
