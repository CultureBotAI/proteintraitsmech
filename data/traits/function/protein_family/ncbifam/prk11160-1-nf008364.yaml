definition: >-
  heme ABC transporter ATP-binding protein/permease CydC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008364 (equivalog); associated with ATP binding, membrane, ATPase-coupled transmembrane transporter activity, cell redox homeostasis. Members occur in Gammaproteobacteria.
