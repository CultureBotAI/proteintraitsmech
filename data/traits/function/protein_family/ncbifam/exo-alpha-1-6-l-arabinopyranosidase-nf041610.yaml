  exo-alpha-(1->6)-L-arabinopyranosidase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041610 (equivalog); associated with hydrolase activity, hydrolyzing O-glycosyl compounds, carbohydrate metabolic process. Members occur in Bifidobacteriaceae.
