identifier: NCBIfam:NF041385
label: "digeranylgeranylglycerophospholipid reductase"
definition: >-
  digeranylgeranylglycerophospholipid reductase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041385 (equivalog); catalyses 2,3-bis-O-geranylgeranyl-sn-glycero-phospholipid reductase; associated with glycerophospholipid metabolic process, oxidoreductase activity. Members occur in Halobacteriales.
