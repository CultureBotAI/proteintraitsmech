identifier: NCBIfam:TIGR02730
label: "carotenoid isomerase"
definition: >-
  carotenoid isomerase (crtH) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02730 (equivalog); catalyses prolycopene isomerase; associated with carotenoid biosynthetic process, carotenoid isomerase activity. Members occur in Cyanobacteriota.
