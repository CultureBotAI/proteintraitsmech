identifier: NCBIfam:NF040650
label: "L-sulfolactate dehydrogenase"
definition: >-
  L-sulfolactate dehydrogenase (comC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040650 (equivalog); catalyses L-2-hydroxycarboxylate dehydrogenase (NAD(+)); associated with coenzyme M biosynthetic process. Members occur in Methanomada group.
