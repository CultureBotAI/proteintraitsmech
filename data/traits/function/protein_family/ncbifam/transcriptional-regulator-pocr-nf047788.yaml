label: "transcriptional regulator PocR"
definition: >-
  transcriptional regulator PocR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047788 (equivalog); associated with DNA-binding transcription factor activity, cobalamin biosynthetic process, sequence-specific DNA binding, 1,2-propanediol catabolic process. Members occur in Enterobacterales.
