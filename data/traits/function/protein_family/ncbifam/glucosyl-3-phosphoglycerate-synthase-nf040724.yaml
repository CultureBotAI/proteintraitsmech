label: "glucosyl-3-phosphoglycerate synthase"
definition: >-
  glucosyl-3-phosphoglycerate synthase (gpgS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040724 (equivalog); catalyses glucosyl-3-phosphoglycerate synthase; associated with glycosyltransferase activity. Members occur in Methanosarcinaceae.
