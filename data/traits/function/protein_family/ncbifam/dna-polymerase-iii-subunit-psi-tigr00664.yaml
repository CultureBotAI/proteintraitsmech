identifier: NCBIfam:TIGR00664
label: "DNA polymerase III subunit psi"
definition: >-
  DNA polymerase III subunit psi (holD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00664 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA-directed DNA polymerase activity, DNA replication, 3'-5' exonuclease activity, DNA polymerase III complex. Members occur in Gammaproteobacteria.
