label: "response regulator transcription factor RprY"
definition: >-
  response regulator transcription factor RprY — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF051850 (equivalog); associated with phosphorelay signal transduction system, transcription cis-regulatory region binding, DNA binding, regulation of DNA-templated transcription. Members occur in Bacteroidia.
