identifier: NCBIfam:TIGR03374
label: "aminobutyraldehyde dehydrogenase"
definition: >-
  aminobutyraldehyde dehydrogenase (patD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03374 (equivalog); catalyses aminobutyraldehyde dehydrogenase; associated with putrescine catabolic process, aminobutyraldehyde dehydrogenase (NAD+) activity, NAD binding. Members occur in Enterobacterales.
