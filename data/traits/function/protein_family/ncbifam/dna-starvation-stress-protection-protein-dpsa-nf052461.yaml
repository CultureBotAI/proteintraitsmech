identifier: NCBIfam:NF052461
label: "DNA starvation/stress protection protein DpsA"
definition: >-
  DNA starvation/stress protection protein DpsA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052461 (equivalog); associated with DNA binding, intracellular iron ion homeostasis, ferric iron binding, oxidoreductase activity, acting on metal ions. Members occur in Cyanobacteriota.
