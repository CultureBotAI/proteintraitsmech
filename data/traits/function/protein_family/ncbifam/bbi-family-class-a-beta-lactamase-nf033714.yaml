label: "BBI family class A beta-lactamase"
definition: >-
  BBI family class A beta-lactamase (blaBBI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033714 (exception); catalyses beta-lactamase; associated with beta-lactamase activity, beta-lactam antibiotic catabolic process, response to antibiotic. Members occur in Caryophanales.
