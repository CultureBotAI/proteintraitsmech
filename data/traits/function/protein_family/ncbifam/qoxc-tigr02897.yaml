definition: >-
  cytochrome aa3 quinol oxidase subunit III (qoxC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02897 (equivalog); associated with electron transfer activity, proton transmembrane transporter activity, electron transport coupled proton transport, membrane. Members occur in Caryophanales.
