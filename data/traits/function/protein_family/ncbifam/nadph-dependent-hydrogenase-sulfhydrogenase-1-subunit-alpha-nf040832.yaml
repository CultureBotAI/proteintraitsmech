identifier: NCBIfam:NF040832
label: "NADPH-dependent hydrogenase/sulfhydrogenase 1 subunit alpha"
definition: >-
  NADPH-dependent hydrogenase/sulfhydrogenase 1 subunit alpha (hydA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040832 (equivalog); catalyses hydrogen dehydrogenase (NADP(+)); associated with ferredoxin hydrogenase activity, hydrogen dehydrogenase (NADP+) activity. Members occur in Thermococcaceae.
