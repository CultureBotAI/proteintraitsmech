identifier: NCBIfam:NF008114
label: "signal peptidase I"
definition: >-
  signal peptidase I (lepB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008114 (equivalog); catalyses signal peptidase I; associated with serine-type endopeptidase activity, protein maturation. Members occur in Gammaproteobacteria.
