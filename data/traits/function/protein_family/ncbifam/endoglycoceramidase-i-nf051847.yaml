identifier: NCBIfam:NF051847
label: "endoglycoceramidase I"
definition: >-
  endoglycoceramidase I — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF051847 (equivalog); catalyses endoglycosylceramidase; associated with galactosylceramide catabolic process, endoglycosylceramidase activity. Members occur in Actinomycetes.
