identifier: NCBIfam:NF038187
label: "acyl-CoA dehydrogenase FadE"
definition: >-
  acyl-CoA dehydrogenase FadE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF038187 (exception); catalyses medium-chain acyl-CoA dehydrogenase, long-chain-acyl-CoA dehydrogenase; associated with acyl-CoA dehydrogenase activity, fatty acid beta-oxidation using acyl-CoA dehydrogenase, flavin adenine dinucleotide binding. Members occur in Gammaproteobacteria.
