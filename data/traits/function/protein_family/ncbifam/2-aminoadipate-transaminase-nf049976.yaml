identifier: NCBIfam:NF049976
label: "2-aminoadipate transaminase"
definition: >-
  2-aminoadipate transaminase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049976 (equivalog); catalyses 2-aminoadipate transaminase; associated with transaminase activity, pyridoxal phosphate binding. Members occur in Pseudomonadota.
