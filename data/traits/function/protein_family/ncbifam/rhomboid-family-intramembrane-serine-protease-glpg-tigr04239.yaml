label: "rhomboid family intramembrane serine protease GlpG"
definition: >-
  rhomboid family intramembrane serine protease GlpG — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04239 (equivalog); catalyses rhomboid protease; associated with serine-type endopeptidase activity, plasma membrane, protein metabolic process. Members occur in Gammaproteobacteria.
