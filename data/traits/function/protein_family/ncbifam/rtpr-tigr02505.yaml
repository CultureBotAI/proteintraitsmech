label: "ribonucleoside-triphosphate reductase, adenosylcobalamin-dependent"
definition: >-
  ribonucleoside-triphosphate reductase, adenosylcobalamin-dependent (nrdJ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02505 (equivalog); catalyses ribonucleoside-triphosphate reductase (thioredoxin); associated with nucleotide binding, ribonucleoside-diphosphate reductase activity, thioredoxin disulfide as acceptor, DNA replication, cobalamin binding.
