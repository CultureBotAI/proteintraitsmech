identifier: NCBIfam:NF008063
label: "glutamate/aspartate ABC transporter substrate-binding protein"
definition: >-
  glutamate/aspartate ABC transporter substrate-binding protein — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008063 (subfamily); catalyses ABC-type polar-amino-acid transporter; associated with pseudouridine synthesis, RNA binding, RNA modification, pseudouridine synthase activity. Members occur in Pseudomonadota.
