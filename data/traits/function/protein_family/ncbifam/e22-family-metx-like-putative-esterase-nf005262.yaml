identifier: NCBIfam:NF005262
label: "E22 family MetX-like putative esterase"
definition: >-
  E22 family MetX-like putative esterase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005262 (equivalog); catalyses homoserine O-acetyltransferase; associated with biosynthetic process, acyltransferase activity, transferring groups other than amino-acyl groups. Members occur in Pseudomonadota.
