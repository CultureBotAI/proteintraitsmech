identifier: NCBIfam:NF001892
label: "tetraacyldisaccharide 4'-kinase"
definition: >-
  tetraacyldisaccharide 4'-kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF001892 (equivalog); catalyses tetraacyldisaccharide 4'-kinase; associated with ATP binding, lipid-A 4'-kinase activity, lipid A biosynthetic process. Members occur in Campylobacterales.
