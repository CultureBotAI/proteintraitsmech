label: "9,9'-di-cis-zeta-carotene desaturase"
definition: >-
  9,9'-di-cis-zeta-carotene desaturase (zds) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02732 (equivalog); catalyses 9,9'-di-cis-zeta-carotene desaturase; associated with carotenoid biosynthetic process, 9,9'-di-cis-zeta-carotene desaturase activity. Members occur in Cyanobacteriota.
