  cysteine desulfurase CsdA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03392 (equivalog); catalyses cysteine desulfurase; associated with iron-sulfur cluster assembly, cysteine desulfurase activity. Members occur in Gammaproteobacteria.
