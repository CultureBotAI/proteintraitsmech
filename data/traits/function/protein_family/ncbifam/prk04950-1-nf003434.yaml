identifier: NCBIfam:NF003434
label: "RNA chaperone ProQ"
definition: >-
  RNA chaperone ProQ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003434 (equivalog); associated with RNA binding, post-transcriptional regulation of gene expression, RNA strand annealing activity, RNA strand-exchange activity. Members occur in Gammaproteobacteria.
