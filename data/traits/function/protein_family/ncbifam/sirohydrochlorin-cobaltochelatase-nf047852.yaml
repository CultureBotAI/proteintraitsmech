identifier: NCBIfam:NF047852
label: "sirohydrochlorin cobaltochelatase"
definition: >-
  sirohydrochlorin cobaltochelatase (cbiK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047852 (equivalog); catalyses sirohydrochlorin cobaltochelatase; associated with porphyrin-containing compound biosynthetic process, sirohydrochlorin cobaltochelatase activity, tetrapyrrole binding. Members occur in Enterobacterales.
