identifier: NCBIfam:TIGR01704
label: "5'-methylthioadenosine/S-adenosylhomocysteine nucleosidase"
definition: >-
  5'-methylthioadenosine/S-adenosylhomocysteine nucleosidase (mtnN) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01704 (equivalog); catalyses methylthioadenosine nucleosidase, adenosylhomocysteine nucleosidase; associated with adenosylhomocysteine nucleosidase activity, methylthioadenosine nucleosidase activity, nucleoside catabolic process, L-methionine cycle.
