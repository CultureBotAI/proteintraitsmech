identifier: NCBIfam:TIGR03992
label: "bifunctional sugar-1-phosphate nucleotidylyltransferase/acetyltransferase"
definition: >-
  bifunctional sugar-1-phosphate nucleotidylyltransferase/acetyltransferase (glmU) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03992 (subfamily); catalyses glucosamine-1-phosphate N-acetyltransferase, UDP-N-acetylglucosamine diphosphorylase; associated with UDP-N-acetylglucosamine diphosphorylase activity, glucosamine-1-phosphate N-acetyltransferase activity.
