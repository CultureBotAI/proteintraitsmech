    text: >-
      Catalyses: The enzyme catalyzes a cell wall sorting reaction in which a surface protein with a sorting signal containing a LPXTG motif is cleaved between the Thr and Gly residue. The resulting threonine carboxyl end of the protein is covalently attached to a pentaglycine cross-bridge of peptidoglycan
