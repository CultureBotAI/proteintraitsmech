identifier: NCBIfam:NF052343
label: "hydrazine dehydrogenase"
definition: >-
  hydrazine dehydrogenase (hdh) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052343 (equivalog); catalyses hydrazine dehydrogenase; associated with anaerobic respiration, using ammonium as electron donor, anammoxosome, hydrazine dehydrogenase activity. Members occur in Candidatus Brocadiales.
