identifier: NCBIfam:NF047723
label: "transcription factor S4"
definition: >-
  transcription factor S4 (tfs4) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047723 (equivalog); associated with DNA-directed RNA polymerase activity, DNA-templated transcription, defense response to virus. Members occur in Sulfolobaceae.
