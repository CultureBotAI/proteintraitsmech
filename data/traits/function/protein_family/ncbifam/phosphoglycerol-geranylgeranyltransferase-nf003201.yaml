identifier: NCBIfam:NF003201
label: "phosphoglycerol geranylgeranyltransferase"
definition: >-
  phosphoglycerol geranylgeranyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003201 (equivalog); catalyses phosphoglycerol geranylgeranyltransferase; associated with phosphoglycerol geranylgeranyltransferase activity. Members occur in Methanococcales.
