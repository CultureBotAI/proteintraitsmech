identifier: NCBIfam:NF053785
label: "decaprenylphosphoryl-beta-D-ribose oxidase"
definition: >-
  decaprenylphosphoryl-beta-D-ribose oxidase (dprE1) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053785 (equivalog); catalyses decaprenylphospho-beta-D-ribofuranose 2-dehydrogenase; associated with D-arabinono-1,4-lactone oxidase activity, capsule polysaccharide biosynthetic process, FAD binding, L-gulono-1,4-lactone dehydrogenase activity.
