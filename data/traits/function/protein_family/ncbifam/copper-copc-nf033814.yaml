identifier: NCBIfam:NF033814
label: "copper homeostasis periplasmic binding protein CopC"
definition: >-
  copper homeostasis periplasmic binding protein CopC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033814 (equivalog); associated with copper ion binding, copper ion transport, periplasmic space, response to copper ion. Members occur in Pseudomonadota.
