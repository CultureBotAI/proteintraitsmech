label: "2-hydroxy-6-oxo-6-phenylhexa-2,4-dienoate hydrolase"
definition: >-
  2-hydroxy-6-oxo-6-phenylhexa-2,4-dienoate hydrolase (bphD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03343 (equivalog); associated with catabolic process, hydrolase activity, acting on carbon-carbon bonds, in ketonic substances. Members occur in Pseudomonadota.
