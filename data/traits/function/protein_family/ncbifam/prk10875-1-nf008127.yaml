label: "exodeoxyribonuclease V subunit alpha"
definition: >-
  exodeoxyribonuclease V subunit alpha (recD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008127 (equivalog); associated with helicase activity, double-strand break repair, DNA recombination, exodeoxyribonuclease V activity. Members occur in Gammaproteobacteria.
