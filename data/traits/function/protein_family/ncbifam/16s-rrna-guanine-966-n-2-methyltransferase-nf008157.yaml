identifier: NCBIfam:NF008157
label: "16S rRNA (guanine(966)-N(2))-methyltransferase"
definition: >-
  16S rRNA (guanine(966)-N(2))-methyltransferase (rsmD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008157 (equivalog); catalyses 16S rRNA (guanine(966)-N(2))-methyltransferase; associated with nucleic acid binding, methyltransferase activity, rRNA methylation. Members occur in Enterobacterales.
