identifier: NCBIfam:NF043017
label: "dimethylsulfonioproprionate lyase DddP"
definition: >-
  dimethylsulfonioproprionate lyase DddP — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043017 (equivalog); catalyses dimethylpropiothetin dethiomethylase; associated with protein homodimerization activity, dimethylpropiothetin dethiomethylase activity. Members occur in Pseudomonadota.
