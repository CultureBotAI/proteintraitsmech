identifier: NCBIfam:NF004413
label: "F0F1 ATP synthase subunit B"
definition: >-
  F0F1 ATP synthase subunit B (atpF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004413 (equivalog); catalyses H(+)-transporting two-sector ATPase; associated with proton transmembrane transporter activity, proton motive force-driven ATP synthesis. Members occur in Gammaproteobacteria.
