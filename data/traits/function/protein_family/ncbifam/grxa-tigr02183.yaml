identifier: NCBIfam:TIGR02183
label: "GrxA family glutaredoxin"
definition: >-
  GrxA family glutaredoxin — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02183 (equivalog); associated with electron transfer activity, protein-disulfide reductase activity, cell redox homeostasis. Members occur in Gammaproteobacteria.
