label: "3-hydroxy-9,10-secoandrosta-1,3,5(10)-triene-9,17-dione monooxygenase oxygenase subunit"
definition: >-
  3-hydroxy-9,10-secoandrosta-1,3,5(10)-triene-9,17-dione monooxygenase oxygenase subunit (hsaA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045629 (equivalog); catalyses 3-hydroxy-9,10-secoandrosta-1,3,5(10)-triene-9,17-dione monooxygenase; associated with catabolic process, lipid catabolic process, 3-hydroxy-9,10-secoandrosta-1,3,5(10)-triene-9,17-dione monooxygenase activity. Members occur in Actinomycetes.
