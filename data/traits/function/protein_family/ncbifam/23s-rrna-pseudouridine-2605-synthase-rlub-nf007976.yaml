identifier: NCBIfam:NF007976
label: "23S rRNA pseudouridine(2605) synthase RluB"
definition: >-
  23S rRNA pseudouridine(2605) synthase RluB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007976 (equivalog); catalyses 23S rRNA pseudouridine(2605) synthase; associated with pseudouridine synthesis, RNA binding, pseudouridine synthase activity. Members occur in Pseudomonadota.
