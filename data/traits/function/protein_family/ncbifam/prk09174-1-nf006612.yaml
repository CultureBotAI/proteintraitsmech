label: "F0F1 ATP synthase subunit B"
definition: >-
  F0F1 ATP synthase subunit B — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006612 (equivalog); catalyses H(+)-transporting two-sector ATPase; associated with proton transmembrane transporter activity, proton motive force-driven ATP synthesis, proton-transporting ATP synthase complex. Members occur in Alphaproteobacteria.
