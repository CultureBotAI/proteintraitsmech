identifier: NCBIfam:NF053781
label: "Tlr1612 family c-di-GMP phosphodiesterase"
definition: >-
  Tlr1612 family c-di-GMP phosphodiesterase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053781 (equivalog); catalyses cyclic-guanylate-specific phosphodiesterase; associated with regulation of DNA-templated transcription. Members occur in Thermosynechococcaceae.
