identifier: NCBIfam:NF051859
label: "bifunctional albaflavenone monooxygenase/terpene synthase"
definition: >-
  bifunctional albaflavenone monooxygenase/terpene synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF051859 (equivalog); catalyses epi-isozizaene 5-monooxygenase, beta-farnesene synthase; associated with terpene synthase activity, sesquiterpene synthase activity, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, antibiotic biosynthetic process. Members occur in Actinomycetes.
