identifier: NCBIfam:NF005830
label: "glyceraldehyde-3-phosphate dehydrogenase"
definition: >-
  glyceraldehyde-3-phosphate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005830 (equivalog); associated with glucose metabolic process, oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor. Members occur in Bacillota.
