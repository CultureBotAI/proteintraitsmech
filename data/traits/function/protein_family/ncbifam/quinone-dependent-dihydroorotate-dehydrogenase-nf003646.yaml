identifier: NCBIfam:NF003646
label: "quinone-dependent dihydroorotate dehydrogenase"
definition: >-
  quinone-dependent dihydroorotate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003646 (equivalog); catalyses dihydroorotate dehydrogenase (quinone); associated with dihydroorotate dehydrogenase activity, UMP biosynthetic process, membrane. Members occur in Pseudomonadati.
