identifier: NCBIfam:NF041301
label: "citrate synthase"
definition: >-
  citrate synthase (citZ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041301 (equivalog); catalyses citrate synthase (unknown stereospecificity); associated with tricarboxylic acid cycle, citrate synthase activity. Members occur in Methanobacteriota.
