identifier: NCBIfam:NF007770
label: "arginine N-succinyltransferase"
definition: >-
  arginine N-succinyltransferase (astA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007770 (equivalog); catalyses arginine N-succinyltransferase; associated with L-arginine catabolic process, L-arginine N-succinyltransferase activity. Members occur in Gammaproteobacteria.
