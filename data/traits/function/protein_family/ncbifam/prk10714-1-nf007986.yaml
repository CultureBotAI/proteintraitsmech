label: "undecaprenyl-phosphate 4-deoxy-4-formamido-L-arabinose transferase"
definition: >-
  undecaprenyl-phosphate 4-deoxy-4-formamido-L-arabinose transferase (arnC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007986 (equivalog); catalyses undecaprenyl-phosphate 4-deoxy-4-formamido-L-arabinose transferase; associated with phosphotransferase activity, for other substituted phosphate groups. Members occur in Gammaproteobacteria.
