identifier: NCBIfam:NF008262
label: "zinc/cadmium/mercury/lead-transporting ATPase"
definition: >-
  zinc/cadmium/mercury/lead-transporting ATPase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008262 (equivalog); catalyses P-type Zn(2+) transporter, Cd(2+)-exporting ATPase; associated with monoatomic cation transport, ATPase-coupled monoatomic cation transmembrane transporter activity. Members occur in Gammaproteobacteria.
