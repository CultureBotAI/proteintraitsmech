identifier: NCBIfam:NF046017
label: "zinc metalloprotease A"
definition: >-
  zinc metalloprotease A (zmpA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046017 (exception); associated with metalloendopeptidase activity, proteolysis, serine-type peptidase activity, zinc ion binding. Members occur in Streptococcus pneumoniae.
