identifier: NCBIfam:TIGR02941
label: "RNA polymerase sigma factor SigB"
definition: >-
  RNA polymerase sigma factor SigB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02941 (equivalog); associated with DNA-binding transcription factor activity, DNA-templated transcription initiation, sigma factor activity. Members occur in Caryophanales.
