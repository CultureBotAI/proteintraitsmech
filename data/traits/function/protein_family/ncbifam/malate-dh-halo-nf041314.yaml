identifier: NCBIfam:NF041314
label: "malate dehydrogenase"
definition: >-
  malate dehydrogenase (mdh) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041314 (equivalog); catalyses (S)-malate dehydrogenase (NAD(+), oxaloacetate-forming); associated with tricarboxylic acid cycle, L-malate dehydrogenase (NAD+) activity. Members occur in Halobacteriales.
