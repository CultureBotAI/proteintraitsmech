identifier: NCBIfam:NF050066
label: "BC-type lipopolysaccharide transporter PglK"
definition: >-
  BC-type lipopolysaccharide transporter PglK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050066 (equivalog); catalyses ABC-type lipopolysaccharide transporter; associated with protein N-linked glycosylation, ATP hydrolysis activity, ATPase-coupled lipid transmembrane transporter activity. Members occur in Campylobacter.
