  3-oxo-isoapionate kinase OiaK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042436 (equivalog); catalyses 3-oxoisoapionate kinase; associated with carbohydrate metabolic process, kinase activity. Members occur in Pseudomonadota.
