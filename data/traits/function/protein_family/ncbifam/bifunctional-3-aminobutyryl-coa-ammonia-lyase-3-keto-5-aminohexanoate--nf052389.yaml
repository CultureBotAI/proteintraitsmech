identifier: NCBIfam:NF052389
label: "bifunctional 3-aminobutyryl-CoA ammonia lyase/3-keto-5-aminohexanoate cleavage enzyme"
definition: >-
  bifunctional 3-aminobutyryl-CoA ammonia lyase/3-keto-5-aminohexanoate cleavage enzyme (kal/cle) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052389 (exception); catalyses (5S)-5-amino-3-oxohexanoate:acetyl-CoA ethylamine transferase, 3-aminobutyryl-CoA ammonia-lyase; associated with L-lysine fermentation, 3-aminobutyryl-CoA ammonia-lyase activity. Members occur in Myxococcota.
