definition: >-
  ATP-dependent protease ATP-binding subunit ClpX — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00382 (equivalog); catalyses endopeptidase Clp; associated with ATP binding, endopeptidase Clp complex, ATP-dependent protein folding chaperone.
