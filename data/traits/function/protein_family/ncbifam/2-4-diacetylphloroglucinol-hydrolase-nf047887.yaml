identifier: NCBIfam:NF047887
label: "2,4-diacetylphloroglucinol hydrolase"
definition: >-
  2,4-diacetylphloroglucinol hydrolase (phlG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047887 (equivalog); catalyses 2,4-diacetylphloroglucinol hydrolase; associated with hydrolase activity, metal ion binding. Members occur in Pseudomonadaceae.
