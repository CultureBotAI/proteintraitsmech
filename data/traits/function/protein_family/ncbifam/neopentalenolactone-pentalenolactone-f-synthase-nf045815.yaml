label: "neopentalenolactone/pentalenolactone F synthase"
definition: >-
  neopentalenolactone/pentalenolactone F synthase (ptlD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045815 (equivalog); catalyses pentalenolactone F synthase; associated with 2-oxoglutarate-dependent dioxygenase activity, antibiotic biosynthetic process. Members occur in Actinomycetes.
