identifier: NCBIfam:TIGR02314
label: "methionine ABC transporter ATP-binding protein MetN"
definition: >-
  methionine ABC transporter ATP-binding protein MetN — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02314 (equivalog); catalyses ABC-type methionine transporter; associated with ATP binding, Gram-negative-bacterium-type cell wall, ABC-type D-methionine transporter activity, D-methionine transmembrane transport. Members occur in Gammaproteobacteria.
