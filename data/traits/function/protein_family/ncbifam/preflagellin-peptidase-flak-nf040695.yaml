identifier: NCBIfam:NF040695
label: "preflagellin peptidase FlaK"
definition: >-
  preflagellin peptidase FlaK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040695 (equivalog); catalyses preflagellin peptidase; associated with aspartic-type endopeptidase activity. Members occur in Methanococcales.
