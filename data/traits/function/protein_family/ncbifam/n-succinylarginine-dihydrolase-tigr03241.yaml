label: "N-succinylarginine dihydrolase"
definition: >-
  N-succinylarginine dihydrolase (astB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03241 (equivalog); catalyses N-succinylarginine dihydrolase; associated with L-arginine catabolic process, N-succinylarginine dihydrolase activity. Members occur in Pseudomonadati.
