identifier: NCBIfam:NF043057
label: "LegK7 family Dot/Icm T4SS effector kinase"
definition: >-
  LegK7 family Dot/Icm T4SS effector kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043057 (subfamily); associated with protein kinase activity, protein phosphorylation, protein secretion by the type IV secretion system. Members occur in Legionellaceae.
