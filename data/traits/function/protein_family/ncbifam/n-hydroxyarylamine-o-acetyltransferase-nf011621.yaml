label: "N-hydroxyarylamine O-acetyltransferase"
definition: >-
  N-hydroxyarylamine O-acetyltransferase (nhoA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011621 (equivalog); catalyses N-hydroxyarylamine O-acetyltransferase; associated with acetyltransferase activity. Members occur in Enterobacteriaceae.
