label: "DNA-binding transcriptional regulator DsdC"
definition: >-
  DNA-binding transcriptional regulator DsdC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02036 (equivalog); associated with DNA binding, DNA-binding transcription factor activity, cytoplasm, regulation of DNA-templated transcription. Members occur in Gammaproteobacteria.
