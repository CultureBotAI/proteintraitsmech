identifier: NCBIfam:NF052305
label: "2,5-dioxovalerate dehydrogenase"
definition: >-
  2,5-dioxovalerate dehydrogenase (xacF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052305 (equivalog); catalyses 2,5-dioxovalerate dehydrogenase; associated with D-xylose catabolic process, 2,5-dioxovalerate dehydrogenase (NADP+) activity. Members occur in Halobacteriales.
