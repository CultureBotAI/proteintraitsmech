label: "adenine phosphoribosyltransferase"
definition: >-
  adenine phosphoribosyltransferase (apt) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002632 (equivalog); catalyses adenine phosphoribosyltransferase; associated with adenine phosphoribosyltransferase activity, adenine salvage. Members occur in Pseudomonadati.
