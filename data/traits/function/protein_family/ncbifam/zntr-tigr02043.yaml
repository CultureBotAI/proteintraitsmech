label: "Zn(2+)-responsive transcriptional regulator"
definition: >-
  Zn(2+)-responsive transcriptional regulator (zntR) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02043 (equivalog); associated with DNA binding, DNA-templated transcription, zinc ion binding. Members occur in Gammaproteobacteria.
