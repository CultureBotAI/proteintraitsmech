label: "glyoxylate/hydroxypyruvate reductase GhrB"
definition: >-
  glyoxylate/hydroxypyruvate reductase GhrB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011938 (equivalog); associated with oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, NAD binding. Members occur in Enterobacterales.
