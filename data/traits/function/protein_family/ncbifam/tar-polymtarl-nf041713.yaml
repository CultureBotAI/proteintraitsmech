identifier: NCBIfam:NF041713
label: "teichoic acid ribitol-phosphate polymerase TarL"
definition: >-
  teichoic acid ribitol-phosphate polymerase TarL — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041713 (equivalog); catalyses CDP-ribitol ribitolphosphotransferase; associated with teichoic acid biosynthetic process, CDP-glycerol glycerophosphotransferase activity, CDP-ribitol ribitolphosphotransferase activity. Members occur in Staphylococcus.
