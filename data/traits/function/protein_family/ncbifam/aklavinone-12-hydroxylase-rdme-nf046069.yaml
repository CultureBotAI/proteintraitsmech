label: "aklavinone 12-hydroxylase RdmE"
definition: >-
  aklavinone 12-hydroxylase RdmE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046069 (equivalog); catalyses aklavinone 12-hydroxylase; associated with antibiotic biosynthetic process, FAD binding. Members occur in Actinomycetes.
