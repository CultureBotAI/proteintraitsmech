identifier: NCBIfam:NF041398
label: "glutamate dehydrogenase GdhB"
definition: >-
  glutamate dehydrogenase GdhB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041398 (equivalog); associated with oxidoreductase activity, acting on the CH-NH2 group of donors, NAD or NADP as acceptor. Members occur in Halobacteria.
