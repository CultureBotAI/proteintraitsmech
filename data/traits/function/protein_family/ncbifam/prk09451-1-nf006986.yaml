label: "bifunctional UDP-N-acetylglucosamine diphosphorylase/glucosamine-1-phosphate N-acetyltransferase GlmU"
definition: >-
  bifunctional UDP-N-acetylglucosamine diphosphorylase/glucosamine-1-phosphate N-acetyltransferase GlmU — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006986 (equivalog); associated with magnesium ion binding, cell morphogenesis, UDP-N-acetylglucosamine diphosphorylase activity, UDP-N-acetylglucosamine biosynthetic process. Members occur in Gammaproteobacteria.
