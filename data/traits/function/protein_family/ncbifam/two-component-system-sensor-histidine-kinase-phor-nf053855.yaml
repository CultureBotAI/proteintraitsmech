identifier: NCBIfam:NF053855
label: "two-component system sensor histidine kinase PhoR"
definition: >-
  two-component system sensor histidine kinase PhoR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053855 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, signal transduction, phosphorylation, transferase activity, transferring phosphorus-containing groups. Members occur in Bacteroidales.
