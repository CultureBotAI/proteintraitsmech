label: "GDSL family lysophospholipase PlaA"
definition: >-
  GDSL family lysophospholipase PlaA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045906 (equivalog); catalyses lysophospholipase; associated with hydrolase activity, acting on ester bonds. Members occur in Legionellaceae.
