identifier: NCBIfam:TIGR00555
label: "type II pantothenate kinase"
definition: >-
  type II pantothenate kinase (coaA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00555 (equivalog); catalyses pantothenate kinase; associated with pantothenate kinase activity, acetyl-CoA biosynthetic process. Members occur in Caryophanales.
