  glutamate formimidoyltransferase (ftcD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02024 (equivalog); catalyses glutamate formimidoyltransferase; associated with L-histidine catabolic process, glutamate formimidoyltransferase activity, formimidoyltetrahydrofolate cyclodeaminase activity.
