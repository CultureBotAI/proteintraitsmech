definition: >-
  molybdate ABC transporter permease subunit (modB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006939 (equivalog); associated with molybdate ion transmembrane transporter activity, molybdate ion transport, membrane. Members occur in Pseudomonadati.
