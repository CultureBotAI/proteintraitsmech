label: "D-sedoheptulose 7-phosphate isomerase"
definition: >-
  D-sedoheptulose 7-phosphate isomerase (lpcA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF001628 (equivalog); catalyses D-sedoheptulose-7-phosphate isomerase; associated with D-sedoheptulose 7-phosphate isomerase activity, carbohydrate derivative metabolic process. Members occur in Gammaproteobacteria.
