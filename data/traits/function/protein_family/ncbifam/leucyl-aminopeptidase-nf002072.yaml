identifier: NCBIfam:NF002072
label: "leucyl aminopeptidase"
definition: >-
  leucyl aminopeptidase (pepA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002072 (equivalog); catalyses leucyl aminopeptidase; associated with proteolysis, protein metabolic process, manganese ion binding, metalloaminopeptidase activity. Members occur in Gammaproteobacteria.
