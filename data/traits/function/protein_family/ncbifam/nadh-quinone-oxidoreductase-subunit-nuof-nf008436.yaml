identifier: NCBIfam:NF008436
label: "NADH-quinone oxidoreductase subunit NuoF"
definition: >-
  NADH-quinone oxidoreductase subunit NuoF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008436 (equivalog); catalyses NADH:ubiquinone reductase (non-electrogenic); associated with NADH dehydrogenase (ubiquinone) activity, 4 iron, 4 sulfur cluster binding. Members occur in Gammaproteobacteria.
