identifier: NCBIfam:NF041303
label: "indole-3-glycerol phosphate synthase"
definition: >-
  indole-3-glycerol phosphate synthase (trpC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041303 (equivalog); catalyses indole-3-glycerol-phosphate synthase; associated with L-tryptophan biosynthetic process, indole-3-glycerol-phosphate synthase activity. Members occur in Halobacteriales.
