identifier: NCBIfam:NF009827
label: "aspartate dehydrogenase"
definition: >-
  aspartate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009827 (equivalog); catalyses aspartate dehydrogenase; associated with NAD+ biosynthetic process, L-aspartate dehydrogenase [NAD(P)+] activity. Members occur in Pseudomonadota.
