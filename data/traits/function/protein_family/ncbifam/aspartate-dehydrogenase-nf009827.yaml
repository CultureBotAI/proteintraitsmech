    text: >-
      Catalyses: (1) L-aspartate + NADP(+) + H2O = oxaloacetate + NH4(+) + NADPH + H(+). (2) L-aspartate + NAD(+) + H2O = oxaloacetate + NH4(+) + NADH + H(+)
