identifier: NCBIfam:NF052560
label: "NAD(+)--arginine ADP-ribosyltransferase Lart1"
definition: >-
  NAD(+)--arginine ADP-ribosyltransferase Lart1 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052560 (equivalog); catalyses NAD(+)--protein-arginine ADP-ribosyltransferase; associated with glycosyltransferase activity, nucleotidyltransferase activity. Members occur in Legionella.
