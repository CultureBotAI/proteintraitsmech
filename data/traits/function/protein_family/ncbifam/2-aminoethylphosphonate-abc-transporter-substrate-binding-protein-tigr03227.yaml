identifier: NCBIfam:TIGR03227
label: "2-aminoethylphosphonate ABC transporter substrate-binding protein"
definition: >-
  2-aminoethylphosphonate ABC transporter substrate-binding protein (phnS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03227 (equivalog); associated with external side of plasma membrane, outer membrane-bounded periplasmic space, 2-aminoethylphosphonate transport, ATPase-coupled 2-aminoethylphosphonate transporter activity. Members occur in Pseudomonadota.
