label: "phosphopantothenate--cysteine ligase"
definition: >-
  phosphopantothenate--cysteine ligase (coaB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02114 (equivalog); catalyses phosphopantothenate--cysteine ligase (CTP); associated with phosphopantothenate--cysteine ligase activity, coenzyme A biosynthetic process. Members occur in Lactobacillales.
