  pantoate kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041122 (equivalog); catalyses pantoate kinase; associated with ATP binding, coenzyme A biosynthetic process, kinase activity. Members occur in Thermococcaceae.
