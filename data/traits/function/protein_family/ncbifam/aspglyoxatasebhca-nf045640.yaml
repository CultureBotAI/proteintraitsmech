identifier: NCBIfam:NF045640
label: "L-aspartate--glyoxylate aminotransferase BhcA"
definition: >-
  L-aspartate--glyoxylate aminotransferase BhcA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045640 (equivalog); catalyses glycine--oxaloacetate transaminase; associated with glyoxylate catabolic process, glycolate catabolic process, glycine:oxaloacetate transaminase activity. Members occur in Pseudomonadota.
