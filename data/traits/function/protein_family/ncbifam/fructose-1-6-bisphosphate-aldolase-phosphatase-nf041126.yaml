label: "fructose-1,6-bisphosphate aldolase/phosphatase"
definition: >-
  fructose-1,6-bisphosphate aldolase/phosphatase (fbp) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041126 (equivalog); catalyses fructose-bisphosphatase, fructose-bisphosphate aldolase; associated with fructose-bisphosphate aldolase activity, gluconeogenesis, fructose 1,6-bisphosphate 1-phosphatase activity.
