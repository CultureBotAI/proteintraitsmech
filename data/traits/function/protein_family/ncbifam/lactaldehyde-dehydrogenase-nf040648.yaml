  lactaldehyde dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040648 (equivalog); catalyses lactaldehyde dehydrogenase; associated with lactaldehyde dehydrogenase (NAD+) activity. Members occur in Methanomada group.
