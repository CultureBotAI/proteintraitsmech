label: "acetolactate synthase 3 large subunit"
definition: >-
  acetolactate synthase 3 large subunit — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005058 (equivalog); associated with magnesium ion binding, acetolactate synthase activity, branched-chain amino acid biosynthetic process, thiamine pyrophosphate binding. Members occur in Gammaproteobacteria.
