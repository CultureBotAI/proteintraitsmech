identifier: NCBIfam:NF050025
label: "sulfoacetaldehyde reductase"
definition: >-
  sulfoacetaldehyde reductase (sarD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050025 (equivalog); catalyses sulfoacetaldehyde reductase (NADH); associated with alcohol dehydrogenase (NAD+) activity, alkanesulfonate catabolic process, metal ion binding. Members occur in Thermodesulfobacteriota.
