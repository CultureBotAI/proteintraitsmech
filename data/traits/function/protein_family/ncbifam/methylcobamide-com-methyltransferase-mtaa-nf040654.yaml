  methylcobamide:CoM methyltransferase MtaA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040654 (equivalog); catalyses [methyl-Co(III) methanol-specific corrinoid protein]:coenzyme M; associated with methanogenesis. Members occur in Methanobacteriota.
