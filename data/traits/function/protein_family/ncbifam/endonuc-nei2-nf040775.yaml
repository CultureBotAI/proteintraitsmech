identifier: NCBIfam:NF040775
label: "endonuclease VIII Nei2"
definition: >-
  endonuclease VIII Nei2 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040775 (equivalog); catalyses DNA-(apurinic or apyrimidinic site) lyase; associated with base-excision repair, DNA N-glycosylase activity, class I DNA-(apurinic or apyrimidinic site) endonuclease activity. Members occur in Mycobacteriaceae.
