identifier: NCBIfam:NF002976
label: "mannosyl-3-phosphoglycerate phosphatase-related protein"
definition: >-
  mannosyl-3-phosphoglycerate phosphatase-related protein — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002976 (equivalog); catalyses mannosyl-3-phosphoglycerate phosphatase; associated with mannosyl-3-phosphoglycerate phosphatase activity, mannosylglycerate biosynthetic process. Members occur in Enterobacterales.
