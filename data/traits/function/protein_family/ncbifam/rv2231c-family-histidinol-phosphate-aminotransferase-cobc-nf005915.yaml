identifier: NCBIfam:NF005915
label: "Rv2231c family histidinol phosphate aminotransferase CobC"
definition: >-
  Rv2231c family histidinol phosphate aminotransferase CobC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005915 (equivalog); catalyses histidinol-phosphate transaminase; associated with L-histidinol-phosphate:2-oxoglutarate transaminase activity, cobalamin biosynthetic process, pyridoxal phosphate binding.
