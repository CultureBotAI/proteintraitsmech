identifier: NCBIfam:NF042950
label: "3-phenylpropionate-dihydrodiol/cinnamic acid-dihydrodiol dehydrogenase"
definition: >-
  3-phenylpropionate-dihydrodiol/cinnamic acid-dihydrodiol dehydrogenase (hcaB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042950 (equivalog); catalyses 3-(cis-5,6-dihydroxycyclohexa-1,3-dien-1-yl)propanoate dehydrogenase; associated with 2,3-dihydroxy-2,3-dihydro-phenylpropionate dehydrogenase activity, 3-phenylpropionate catabolic process. Members occur in Gammaproteobacteria.
definition_source: NCBIfam PGAP (composed from product and EC/GO annotations)
