definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) 3-(cis-5,6-dihydroxycyclohexa-1,3-dien-1-yl)propanoate + NAD(+) = 3-(2,3-dihydroxyphenyl)propanoate + NADH + H(+). (2) (2E)-3-(cis-5,6-dihydroxycyclohexa-1,3-dien-1-yl)prop-2-enoate + NAD(+) = (2E)-3-(2,3-dihydroxyphenyl)prop-2-enoate + NADH + H(+)
    source: "mapped enzyme EC:1.3.1.87"
