label: "Rv0792c family HTH-type transcriptional regulator"
definition: >-
  Rv0792c family HTH-type transcriptional regulator — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052441 (equivalog); associated with DNA binding, DNA-binding transcription factor activity, negative regulation of DNA-templated transcription. Members occur in Actinomycetes.
