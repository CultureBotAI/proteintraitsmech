identifier: NCBIfam:TIGR02038
label: "outer membrane-stress sensor serine endopeptidase DegS"
definition: >-
  outer membrane-stress sensor serine endopeptidase DegS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02038 (equivalog); catalyses peptidase Do; associated with serine-type peptidase activity, outer membrane-bounded periplasmic space, antisigma factor binding. Members occur in Gammaproteobacteria.
