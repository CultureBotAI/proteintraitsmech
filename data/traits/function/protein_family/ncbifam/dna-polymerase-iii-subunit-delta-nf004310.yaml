definition: >-
  DNA polymerase III subunit delta' — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004310 (equivalog); catalyses DNA-directed DNA polymerase; associated with DNA binding, DNA-directed DNA polymerase activity, DNA replication, 3'-5' exonuclease activity.
