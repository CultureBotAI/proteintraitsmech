identifier: NCBIfam:NF007354
label: "aldehyde ferredoxin oxidoreductase"
definition: >-
  aldehyde ferredoxin oxidoreductase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007354 (equivalog); catalyses aldehyde ferredoxin oxidoreductase; associated with electron transfer activity, oxidoreductase activity, iron-sulfur cluster binding. Members occur in Enterobacterales.
