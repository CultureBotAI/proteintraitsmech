identifier: NCBIfam:NF047897
label: lacto-N-biosidase
definition: >-
  lacto-N-biosidase (lnbX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047897 (equivalog); catalyses lacto-N-biosidase; associated with polysaccharide catabolic process, hydrolase activity, acting on glycosyl bonds, metal ion binding. Members occur in Bifidobacterium.
