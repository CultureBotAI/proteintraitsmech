definition: >-
  zinc metalloprotease D (zmpD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF046024 (exception); associated with metalloendopeptidase activity, proteolysis, zinc ion binding. Members occur in Streptococcus pneumoniae.
