identifier: NCBIfam:NF007652
label: "N-acetylmuramoyl-L-alanine amidase AmiA"
definition: >-
  N-acetylmuramoyl-L-alanine amidase AmiA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007652 (equivalog); catalyses N-acetylmuramoyl-L-alanine amidase; associated with N-acetylmuramoyl-L-alanine amidase activity, peptidoglycan catabolic process. Members occur in Enterobacterales.
