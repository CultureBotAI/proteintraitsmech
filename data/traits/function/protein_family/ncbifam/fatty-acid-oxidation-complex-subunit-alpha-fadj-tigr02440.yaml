identifier: NCBIfam:TIGR02440
label: "fatty acid oxidation complex subunit alpha FadJ"
definition: >-
  fatty acid oxidation complex subunit alpha FadJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02440 (equivalog); associated with (3S)-3-hydroxyacyl-CoA dehydrogenase (NAD+) activity, enoyl-CoA hydratase activity, 3-hydroxybutyryl-CoA epimerase activity, fatty acid catabolic process. Members occur in Gammaproteobacteria.
