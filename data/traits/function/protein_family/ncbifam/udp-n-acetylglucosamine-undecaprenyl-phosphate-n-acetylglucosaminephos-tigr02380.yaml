label: "UDP-N-acetylglucosamine--undecaprenyl-phosphate N-acetylglucosaminephosphotransferase"
definition: >-
  UDP-N-acetylglucosamine--undecaprenyl-phosphate N-acetylglucosaminephosphotransferase (wecA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02380 (exception); catalyses UDP-N-acetylglucosamine--undecaprenyl-phosphate; associated with magnesium ion binding, lipopolysaccharide biosynthetic process, enterobacterial common antigen biosynthetic process, Gram-negative-bacterium-type cell wall. Members occur in Gammaproteobacteria.
