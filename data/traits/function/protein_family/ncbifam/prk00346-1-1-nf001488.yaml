label: "5'/3'-nucleotidase SurE"
definition: >-
  5'/3'-nucleotidase SurE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF001488 (equivalog); catalyses 5'-nucleotidase, 3'-nucleotidase; associated with nucleotidase activity. Members occur in Gammaproteobacteria.
