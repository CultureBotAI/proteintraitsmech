identifier: NCBIfam:NF045643
label: "iminosuccinate reductase BhcD"
definition: >-
  iminosuccinate reductase BhcD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045643 (equivalog); associated with glyoxylate catabolic process, oxidoreductase activity, acting on the CH-NH2 group of donors, NAD or NADP as acceptor, glycolate catabolic process. Members occur in Pseudomonadota.
