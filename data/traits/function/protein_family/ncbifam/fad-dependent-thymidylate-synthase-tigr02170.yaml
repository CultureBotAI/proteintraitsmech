label: "FAD-dependent thymidylate synthase"
definition: >-
  FAD-dependent thymidylate synthase (thyX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02170 (equivalog); catalyses thymidylate synthase (FAD); associated with dTMP biosynthetic process, flavin adenine dinucleotide binding, thymidylate synthase (FAD) activity.
