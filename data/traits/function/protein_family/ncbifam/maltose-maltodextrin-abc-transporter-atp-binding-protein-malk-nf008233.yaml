label: "maltose/maltodextrin ABC transporter ATP-binding protein MalK"
definition: >-
  maltose/maltodextrin ABC transporter ATP-binding protein MalK — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008233 (equivalog); catalyses ABC-type maltose transporter; associated with ATP binding, carbohydrate transport, ATP-binding cassette (ABC) transporter complex, transmembrane transport. Members occur in Gammaproteobacteria.
