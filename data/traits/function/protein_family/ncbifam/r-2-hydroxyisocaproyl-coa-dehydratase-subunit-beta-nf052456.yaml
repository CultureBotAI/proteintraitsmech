identifier: NCBIfam:NF052456
label: "(R)-2-hydroxyisocaproyl-CoA dehydratase subunit beta"
definition: >-
  (R)-2-hydroxyisocaproyl-CoA dehydratase subunit beta (hadC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052456 (equivalog); catalyses (R)-2-hydroxyisocaproyl-CoA dehydratase; associated with L-leucine metabolic process, hydro-lyase activity, 4 iron, 4 sulfur cluster binding. Members occur in Clostridia.
