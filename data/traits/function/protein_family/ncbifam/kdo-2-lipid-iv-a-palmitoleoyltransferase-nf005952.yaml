label: "kdo(2)-lipid IV(A) palmitoleoyltransferase"
definition: >-
  kdo(2)-lipid IV(A) palmitoleoyltransferase (lpxP) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005952 (equivalog); catalyses Kdo2-lipid IVA palmitoleoyltransferase; associated with palmitoleoyl [acyl-carrier-protein]-dependent acyltransferase activity, response to cold, membrane, Kdo2-lipid A biosynthetic process. Members occur in Enterobacterales.
