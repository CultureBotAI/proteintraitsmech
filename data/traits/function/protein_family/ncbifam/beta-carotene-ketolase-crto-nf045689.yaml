identifier: NCBIfam:NF045689
label: "beta-carotene ketolase CrtO"
definition: >-
  beta-carotene ketolase CrtO — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045689 (equivalog); catalyses beta-carotene 4-ketolase; associated with oxidoreductase activity. Members occur in Cyanophyceae.
