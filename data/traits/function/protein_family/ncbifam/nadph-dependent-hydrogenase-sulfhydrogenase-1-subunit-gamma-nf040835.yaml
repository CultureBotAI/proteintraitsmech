identifier: NCBIfam:NF040835
label: "NADPH-dependent hydrogenase/sulfhydrogenase 1 subunit gamma"
definition: >-
  NADPH-dependent hydrogenase/sulfhydrogenase 1 subunit gamma (hydG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040835 (equivalog); catalyses sulfhydrogenase; associated with sulfur reductase activity, flavin adenine dinucleotide binding, 2 iron, 2 sulfur cluster binding. Members occur in Thermococcaceae.
