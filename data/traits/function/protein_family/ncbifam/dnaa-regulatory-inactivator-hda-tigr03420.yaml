definition: >-
  DnaA regulatory inactivator Hda — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03420 (equivalog); associated with hydrolase activity, acting on acid anhydrides, in phosphorus-containing anhydrides, negative regulation of DNA-templated DNA replication initiation.
