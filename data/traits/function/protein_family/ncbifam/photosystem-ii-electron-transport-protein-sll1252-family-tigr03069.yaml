identifier: NCBIfam:TIGR03069
label: "photosystem II electron transport protein, Sll1252 family"
definition: >-
  photosystem II electron transport protein, Sll1252 family — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03069 (equivalog); associated with photosynthetic electron transport in photosystem II, photosynthesis, chloroplast photosystem II, plasma membrane-derived thylakoid photosystem II. Members occur in Bacillati.
