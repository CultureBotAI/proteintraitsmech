identifier: NCBIfam:NF040855
label: "isocitrate--homoisocitrate dehydrogenase"
definition: >-
  isocitrate--homoisocitrate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040855 (equivalog); catalyses isocitrate--homoisocitrate dehydrogenase; associated with L-leucine biosynthetic process, isocitrate-homoisocitrate dehydrogenase activity, homoisocitrate dehydrogenase activity. Members occur in Thermococcaceae.
