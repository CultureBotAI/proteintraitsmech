identifier: NCBIfam:NF052464
label: "lipid II isoglutaminyl synthase subunit MurT"
definition: >-
  lipid II isoglutaminyl synthase subunit MurT — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052464 (equivalog); catalyses lipid II isoglutaminyl synthase (glutamine-hydrolyzing); associated with ATP binding, zinc ion binding, regulation of cell shape, peptidoglycan biosynthetic process. Members occur in Staphylococcaceae.
