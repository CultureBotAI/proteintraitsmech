identifier: NCBIfam:NF040694
label: "CTP-dependent riboflavin kinase"
definition: >-
  CTP-dependent riboflavin kinase (ribK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040694 (equivalog); catalyses CTP-dependent riboflavin kinase; associated with riboflavin biosynthetic process. Members occur in Methanococcales.
