identifier: NCBIfam:NF002904
label: "thiamine phosphate synthase"
definition: >-
  thiamine phosphate synthase (thiE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002904 (equivalog); catalyses thiamine phosphate synthase; associated with thiamine-phosphate diphosphorylase activity, thiamine biosynthetic process. Members occur in Pseudomonadota.
