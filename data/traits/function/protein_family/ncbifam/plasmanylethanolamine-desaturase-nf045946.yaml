identifier: NCBIfam:NF045946
label: "plasmanylethanolamine desaturase"
definition: >-
  plasmanylethanolamine desaturase (carF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045946 (equivalog); catalyses plasmanylethanolamine desaturase; associated with ether lipid biosynthetic process, plasmanylethanolamine desaturase activity. Members occur in Pseudomonadati.
