identifier: NCBIfam:NF050063
label: "N-acetylgalactosamine-N,N'-diacetylbacillosaminyl-diphospho-undecaprenol 4-alpha-N-acetylgalactosaminyltransferase"
definition: >-
  N-acetylgalactosamine-N,N'-diacetylbacillosaminyl-diphospho-undecaprenol 4-alpha-N-acetylgalactosaminyltransferase (pglJ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050063 (equivalog); catalyses N-acetylgalactosamine-N,N'-diacetylbacillosaminyl-diphospho-undecaprenol; associated with protein N-linked glycosylation, lipopolysaccharide biosynthetic process, hexosyltransferase activity. Members occur in Campylobacter.
