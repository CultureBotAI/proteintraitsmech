identifier: NCBIfam:NF045554
label: "O-aminophenol oxidase PhsA"
definition: >-
  O-aminophenol oxidase PhsA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045554 (equivalog); catalyses o-aminophenol oxidase; associated with copper ion binding, antibiotic biosynthetic process, o-aminophenol oxidase activity. Members occur in Actinomycetes.
