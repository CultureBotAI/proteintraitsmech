label: "sigma-70 family RNA polymerase sigma factor"
definition: >-
  sigma-70 family RNA polymerase sigma factor — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009191 (subfamily); associated with DNA binding, DNA-templated transcription initiation, regulation of DNA-templated transcription, sigma factor activity. Members occur in Pseudomonadota.
