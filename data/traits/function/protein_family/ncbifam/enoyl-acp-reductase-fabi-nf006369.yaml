identifier: NCBIfam:NF006369
label: "enoyl-ACP reductase FabI"
definition: >-
  enoyl-ACP reductase FabI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006369 (equivalog); catalyses enoyl-[acyl-carrier-protein] reductase (NADPH, Re-specific); associated with enoyl-[acyl-carrier-protein] reductase (NADH) activity, fatty acid biosynthetic process. Members occur in Caryophanales.
