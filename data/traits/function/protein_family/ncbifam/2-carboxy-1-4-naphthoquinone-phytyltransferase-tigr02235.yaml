identifier: NCBIfam:TIGR02235
label: "2-carboxy-1,4-naphthoquinone phytyltransferase"
definition: >-
  2-carboxy-1,4-naphthoquinone phytyltransferase (menA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02235 (equivalog); catalyses 2-carboxy-1,4-naphthoquinone phytyltransferase; associated with prenyltransferase activity, membrane, phylloquinone biosynthetic process. Members occur in Cyanobacteriota.
