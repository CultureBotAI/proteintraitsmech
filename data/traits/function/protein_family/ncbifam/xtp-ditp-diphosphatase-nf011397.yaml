  XTP/dITP diphosphatase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011397 (equivalog); catalyses XTP/dITP diphosphatase; associated with nucleoside triphosphate catabolic process, nucleoside triphosphate diphosphatase activity.
