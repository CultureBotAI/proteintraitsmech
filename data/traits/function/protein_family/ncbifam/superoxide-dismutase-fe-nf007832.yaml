label: "superoxide dismutase [Fe]"
definition: >-
  superoxide dismutase [Fe] (sodB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007832 (equivalog); catalyses superoxide dismutase; associated with superoxide dismutase activity, superoxide metabolic process, metal ion binding. Members occur in Pseudomonadota.
