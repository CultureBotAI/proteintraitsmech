label: "manganese-dependent transcriptional regulator MntR"
definition: >-
  manganese-dependent transcriptional regulator MntR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047407 (equivalog); associated with DNA binding, DNA-binding transcription factor activity, regulation of DNA-templated transcription, transition metal ion binding. Members occur in Thermaceae.
