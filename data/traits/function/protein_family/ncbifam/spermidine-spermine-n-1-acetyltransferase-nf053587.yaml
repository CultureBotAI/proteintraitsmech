identifier: NCBIfam:NF053587
label: "spermidine/spermine N(1)-acetyltransferase"
definition: >-
  spermidine/spermine N(1)-acetyltransferase (paiA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053587 (equivalog); catalyses diamine N-acetyltransferase; associated with diamine N-acetyltransferase activity, sporulation resulting in formation of a cellular spore, negative regulation of sporulation.
