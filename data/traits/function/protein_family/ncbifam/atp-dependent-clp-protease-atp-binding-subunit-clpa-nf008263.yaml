identifier: NCBIfam:NF008263
label: "ATP-dependent Clp protease ATP-binding subunit ClpA"
definition: >-
  ATP-dependent Clp protease ATP-binding subunit ClpA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008263 (equivalog); catalyses endopeptidase Clp; associated with ATP binding, ATP hydrolysis activity, protein unfolding. Members occur in Gammaproteobacteria.
