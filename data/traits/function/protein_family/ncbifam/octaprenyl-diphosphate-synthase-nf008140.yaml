identifier: NCBIfam:NF008140
label: "octaprenyl diphosphate synthase"
definition: >-
  octaprenyl diphosphate synthase (ispB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008140 (equivalog); catalyses all-trans-octaprenyl-diphosphate synthase; associated with isoprenoid biosynthetic process. Members occur in Pseudomonadota.
