  3-hydroxyacyl-CoA dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006143 (equivalog); catalyses 3-hydroxyacyl-CoA dehydrogenase; associated with fatty acid metabolic process, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor.
