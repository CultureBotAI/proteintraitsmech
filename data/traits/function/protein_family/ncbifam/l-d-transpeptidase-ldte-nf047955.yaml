identifier: NCBIfam:NF047955
label: "L,D-transpeptidase LdtE"
definition: >-
  L,D-transpeptidase LdtE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047955 (equivalog); associated with peptidoglycan biosynthetic process, glycosyltransferase activity, peptidoglycan-protein cross-linking, peptidoglycan L,D-transpeptidase activity. Members occur in Enterobacteriaceae.
