identifier: NCBIfam:NF041170
label: "2-oxoacid:ferredoxin oxidoreductase subunit alpha"
definition: >-
  2-oxoacid:ferredoxin oxidoreductase subunit alpha — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041170 (equivalog); catalyses 2-oxoacid oxidoreductase (ferredoxin); associated with 2-oxobutyrate synthase activity, pyruvate synthase activity, 2-oxoglutarate synthase activity.
