identifier: NCBIfam:NF009639
label: "23S rRNA (uracil(1939)-C(5))-methyltransferase RlmD"
definition: >-
  23S rRNA (uracil(1939)-C(5))-methyltransferase RlmD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009639 (equivalog); catalyses 23S rRNA (uracil(1939)-C(5))-methyltransferase; associated with RNA processing, RNA methyltransferase activity. Members occur in Pseudomonadota.
