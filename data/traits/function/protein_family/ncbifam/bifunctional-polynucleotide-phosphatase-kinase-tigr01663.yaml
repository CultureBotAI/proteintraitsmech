identifier: NCBIfam:TIGR01663
label: "bifunctional polynucleotide phosphatase/kinase"
definition: >-
  bifunctional polynucleotide phosphatase/kinase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01663 (equivalog); catalyses polynucleotide 5'-hydroxyl-kinase, polynucleotide 3'-phosphatase; associated with single strand break repair, polynucleotide 3'-phosphatase activity, ATP-dependent polydeoxyribonucleotide 5'-hydroxyl-kinase activity.
