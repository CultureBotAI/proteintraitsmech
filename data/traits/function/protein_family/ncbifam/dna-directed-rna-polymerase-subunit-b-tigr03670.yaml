identifier: NCBIfam:TIGR03670
label: "DNA-directed RNA polymerase subunit B"
definition: >-
  DNA-directed RNA polymerase subunit B (rpoB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03670 (equivalog); catalyses DNA-directed RNA polymerase; associated with DNA binding, DNA-directed RNA polymerase activity, DNA-templated transcription, zinc ion binding.
