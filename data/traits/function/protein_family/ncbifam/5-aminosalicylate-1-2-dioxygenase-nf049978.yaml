label: "5-aminosalicylate 1,2-dioxygenase"
definition: >-
  5-aminosalicylate 1,2-dioxygenase (mabB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049978 (equivalog); catalyses 5-aminosalicylate 1,2-dioxygenase; associated with dioxygenase activity. Members occur in Pseudomonadota.
