identifier: NCBIfam:NF003450
label: "aminopeptidase PepB"
definition: >-
  aminopeptidase PepB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003450 (equivalog); catalyses PepB aminopeptidase; associated with proteolysis, protein metabolic process, manganese ion binding, metalloaminopeptidase activity. Members occur in Gammaproteobacteria.
