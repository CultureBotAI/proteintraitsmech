identifier: NCBIfam:NF053881
label: "DNA-binding transcriptional repressor DeoR"
definition: >-
  DNA-binding transcriptional repressor DeoR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053881 (equivalog); associated with cis-regulatory region sequence-specific DNA binding, carbohydrate binding, identical protein binding, regulation of DNA-templated transcription initiation. Members occur in Bacillota.
