identifier: NCBIfam:NF011381
label: "bifunctional prephenate dehydrogenase/3-phosphoshikimate 1-carboxyvinyltransferase"
definition: >-
  bifunctional prephenate dehydrogenase/3-phosphoshikimate 1-carboxyvinyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011381 (equivalog); catalyses prephenate dehydrogenase, 3-phosphoshikimate 1-carboxyvinyltransferase; associated with prephenate dehydrogenase (NAD+) activity, aromatic amino acid biosynthetic process. Members occur in Pseudomonadota.
