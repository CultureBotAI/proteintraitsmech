identifier: NCBIfam:NF004494
label: "succinyldiaminopimelate transaminase"
definition: >-
  succinyldiaminopimelate transaminase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004494 (equivalog); catalyses succinyldiaminopimelate transaminase; associated with pyridoxal phosphate binding. Members occur in Epsilonproteobacteria.
