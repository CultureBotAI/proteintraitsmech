definition: >-
  4,5:9,10-diseco-3-hydroxy-5,9,17-trioxoandrosta-1(10),2-diene-4-oate hydrolase (hsaD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045632 (equivalog); catalyses 4,5-9,10-diseco-3-hydroxy-5,9,17-trioxoandrosta-1(10),2-diene-4-oate, 2,6-dioxo-6-phenylhexa-3-enoate hydrolase; associated with catabolic process, lipid catabolic process, 4,5-9,10-diseco-3-hydroxy-5,9,17-trioxoandrosta-1(10),2-diene-4-oate hydrolase activity. Members occur in Actinomycetes.
