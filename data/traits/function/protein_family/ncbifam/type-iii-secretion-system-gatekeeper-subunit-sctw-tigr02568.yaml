label: "type III secretion system gatekeeper subunit SctW"
definition: >-
  type III secretion system gatekeeper subunit SctW — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02568 (equivalog); associated with cell surface, protein secretion by the type III secretion system, negative regulation of protein secretion. Members occur in Pseudomonadati.
