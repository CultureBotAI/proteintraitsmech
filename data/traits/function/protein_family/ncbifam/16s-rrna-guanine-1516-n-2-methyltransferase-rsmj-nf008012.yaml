label: "16S rRNA (guanine(1516)-N(2))-methyltransferase RsmJ"
definition: >-
  16S rRNA (guanine(1516)-N(2))-methyltransferase RsmJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008012 (equivalog); catalyses 16S rRNA (guanine(1516)-N(2))-methyltransferase; associated with rRNA (guanine-N2-)-methyltransferase activity, rRNA methylation. Members occur in Enterobacterales.
