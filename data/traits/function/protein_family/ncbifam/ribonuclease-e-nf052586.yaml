identifier: NCBIfam:NF052586
label: "ribonuclease E"
definition: >-
  ribonuclease E (rne) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052586 (equivalog); catalyses ribonuclease E; associated with tRNA binding, endonuclease activity, RNA nuclease activity, rRNA processing. Members occur in Cyanobacteriota.
