identifier: NCBIfam:NF003557
label: "ketol-acid reductoisomerase"
definition: >-
  ketol-acid reductoisomerase (ilvC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003557 (equivalog); catalyses ketol-acid reductoisomerase (NADP(+)); associated with ketol-acid reductoisomerase activity, branched-chain amino acid biosynthetic process. Members occur in Pseudomonadati.
