identifier: NCBIfam:NF047836
label: "UDP-2,3-diacylglucosamine diphosphatase"
definition: >-
  UDP-2,3-diacylglucosamine diphosphatase (lpxI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047836 (equivalog); catalyses UDP-2,3-diacylglucosamine diphosphatase; associated with UDP-2,3-diacylglucosamine hydrolase activity, lipid A biosynthetic process. Members occur in Pseudomonadota.
