identifier: NCBIfam:NF045816
label: "pentalenolactone synthase"
definition: >-
  pentalenolactone synthase (penM) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045816 (equivalog); catalyses pentalenolactone synthase; associated with monooxygenase activity, oxidoreductase activity, acting on the CH-CH group of donors, iron-sulfur protein as acceptor, antibiotic biosynthetic process. Members occur in Actinomycetes.
