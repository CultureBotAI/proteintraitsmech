  cytochrome c nitrite reductase Fe-S protein (nrfC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03149 (equivalog); catalyses nitrite reductase (cytochrome; ammonia-forming). Members occur in Gammaproteobacteria.
