label: "tagatose-6-phosphate kinase"
definition: >-
  tagatose-6-phosphate kinase (lacC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01231 (equivalog); catalyses tagatose-6-phosphate kinase; associated with lactose catabolic process, tagatose-6-phosphate kinase activity. Members occur in Bacillota.
