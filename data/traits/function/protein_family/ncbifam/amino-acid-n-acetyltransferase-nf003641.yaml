identifier: NCBIfam:NF003641
label: "amino-acid N-acetyltransferase"
definition: >-
  amino-acid N-acetyltransferase (argA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003641 (equivalog); catalyses amino-acid N-acetyltransferase; associated with L-glutamate N-acetyltransferase activity, acting on acetyl-CoA as donor, L-arginine biosynthetic process. Members occur in Pseudomonadota.
