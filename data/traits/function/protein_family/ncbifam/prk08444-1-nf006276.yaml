label: "aminofutalosine synthase MqnE"
definition: >-
  aminofutalosine synthase MqnE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006276 (equivalog); associated with menaquinone biosynthetic process, transferase activity, transferring alkyl or aryl (other than methyl) groups, iron-sulfur cluster binding. Members occur in Campylobacterales.
