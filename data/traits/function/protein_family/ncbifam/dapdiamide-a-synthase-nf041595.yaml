identifier: NCBIfam:NF041595
label: "dapdiamide A synthase"
definition: >-
  dapdiamide A synthase (ddaF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041595 (equivalog); catalyses dapdiamide synthase; associated with ligase activity, antibiotic biosynthetic process, metal ion binding. Members occur in Pseudomonadati.
