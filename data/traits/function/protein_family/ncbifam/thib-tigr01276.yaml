identifier: NCBIfam:TIGR01276
label: "thiamine ABC transporter substrate binding subunit"
definition: >-
  thiamine ABC transporter substrate binding subunit (thiB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01276 (equivalog); associated with thiamine transport, outer membrane-bounded periplasmic space, thiamine binding, ABC-type thiamine transporter activity. Members occur in Pseudomonadota.
