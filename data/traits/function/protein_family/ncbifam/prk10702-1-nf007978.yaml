label: "endonuclease III"
definition: >-
  endonuclease III (nth) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007978 (equivalog); catalyses DNA-(apurinic or apyrimidinic site) lyase; associated with DNA-(apurinic or apyrimidinic site) endonuclease activity, base-excision repair. Members occur in Gammaproteobacteria.
