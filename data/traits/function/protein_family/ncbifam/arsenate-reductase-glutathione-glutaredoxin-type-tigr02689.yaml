identifier: NCBIfam:TIGR02689
label: "arsenate reductase, glutathione/glutaredoxin type"
definition: >-
  arsenate reductase, glutathione/glutaredoxin type (arsC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02689 (equivalog); catalyses arsenate reductase (glutathione/glutaredoxin); associated with arsenate reductase (glutaredoxin) activity, response to arsenic-containing substance. Members occur in Cyanophyceae.
