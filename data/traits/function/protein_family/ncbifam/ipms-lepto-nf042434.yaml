definition: >-
  2-isopropylmalate synthase LeuA2 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042434 (equivalog); catalyses 2-isopropylmalate synthase; associated with 2-isopropylmalate synthase activity, L-leucine biosynthetic process. Members occur in Pseudomonadati.
