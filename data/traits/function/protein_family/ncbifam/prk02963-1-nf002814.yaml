identifier: NCBIfam:NF002814
label: "glutarate dioxygenase GlaH"
definition: >-
  glutarate dioxygenase GlaH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002814 (equivalog); catalyses glutarate dioxygenase; associated with oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, with 2-oxoglutarate as one donor, and the other dehydrogenated.
