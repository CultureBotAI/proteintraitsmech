identifier: NCBIfam:NF009390
label: "quinate/shikimate dehydrogenase"
definition: >-
  quinate/shikimate dehydrogenase (ydiB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF009390 (equivalog); catalyses quinate/shikimate dehydrogenase [NAD(P)(+)]. Members occur in Enterobacteriaceae.
