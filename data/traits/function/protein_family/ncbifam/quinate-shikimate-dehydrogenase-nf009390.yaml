definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) L-quinate + NADP(+) = 3-dehydroquinate + NADPH + H(+). (2) L-quinate + NAD(+) = 3-dehydroquinate + NADH + H(+). (3) shikimate + NADP(+) = 3-dehydroshikimate + NADPH + H(+). (4) shikimate + NAD(+) = 3-dehydroshikimate + NADH + H(+)
