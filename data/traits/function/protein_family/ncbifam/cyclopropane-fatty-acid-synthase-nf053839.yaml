identifier: NCBIfam:NF053839
label: "cyclopropane fatty acid synthase"
definition: >-
  cyclopropane fatty acid synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053839 (equivalog); catalyses cyclopropane-fatty-acyl-phospholipid synthase; associated with lipid biosynthetic process. Members occur in Pseudomonadota.
