definition: >-
  Rv0880 family HTH-type transcriptional regulator — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052438 (equivalog); associated with DNA binding, DNA-binding transcription factor activity, response to antibiotic. Members occur in Actinomycetes.
