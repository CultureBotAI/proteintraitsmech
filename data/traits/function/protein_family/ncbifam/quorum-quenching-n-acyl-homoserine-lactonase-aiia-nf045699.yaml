identifier: NCBIfam:NF045699
label: "quorum-quenching N-acyl homoserine lactonase AiiA"
definition: >-
  quorum-quenching N-acyl homoserine lactonase AiiA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045699 (equivalog); catalyses quorum-quenching N-acyl-homoserine lactonase; associated with acyl-L-homoserine-lactone lactonohydrolase activity. Members occur in Caryophanales.
