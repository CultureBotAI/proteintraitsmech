label: "NAD(P)H-dependent glycerol-3-phosphate dehydrogenase"
definition: >-
  NAD(P)H-dependent glycerol-3-phosphate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000942 (subfamily); catalyses glycerol-3-phosphate dehydrogenase [NAD(P)(+)]; associated with glycerol-3-phosphate metabolic process, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, glycerol-3-phosphate dehydrogenase [NAD(P)+] activity.
