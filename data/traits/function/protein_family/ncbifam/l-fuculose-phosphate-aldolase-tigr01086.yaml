identifier: NCBIfam:TIGR01086
label: "L-fuculose-phosphate aldolase"
definition: >-
  L-fuculose-phosphate aldolase (fucA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01086 (equivalog); catalyses L-fuculose-phosphate aldolase; associated with fucose metabolic process, zinc ion binding, L-fuculose-phosphate aldolase activity. Members occur in Enterobacteriaceae.
