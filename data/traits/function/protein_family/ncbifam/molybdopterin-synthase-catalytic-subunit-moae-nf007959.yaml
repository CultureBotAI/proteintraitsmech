label: "molybdopterin synthase catalytic subunit MoaE"
definition: >-
  molybdopterin synthase catalytic subunit MoaE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007959 (equivalog); catalyses molybdopterin synthase; associated with Mo-molybdopterin cofactor biosynthetic process. Members occur in Pseudomonadota.
