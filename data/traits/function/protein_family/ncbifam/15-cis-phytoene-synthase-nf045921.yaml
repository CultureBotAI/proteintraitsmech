definition: >-
  15-cis-phytoene synthase (crtB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045921 (equivalog); associated with geranylgeranyl diphosphate synthase activity, carotenoid biosynthetic process, 15-cis-phytoene synthase activity. Members occur in Pseudomonadota.
