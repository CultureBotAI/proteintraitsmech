  apolipoprotein N-acyltransferase (lnt) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00546 (equivalog); catalyses apolipoprotein N-acyltransferase; associated with membrane, acyltransferase activity, transferring groups other than amino-acyl groups, lipoprotein biosynthetic process.
