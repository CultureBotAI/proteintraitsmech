identifier: NCBIfam:NF007597
label: "hydroxyacylglutathione hydrolase"
definition: >-
  hydroxyacylglutathione hydrolase (gloB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007597 (equivalog); catalyses hydroxyacylglutathione hydrolase; associated with hydroxyacylglutathione hydrolase activity, methylglyoxal catabolic process. Members occur in Enterobacteriaceae.
