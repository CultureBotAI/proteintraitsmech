label: "histidine-histamine antiporter"
definition: >-
  histidine-histamine antiporter (hdcC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04298 (equivalog); associated with response to acidic pH, L-histidine:histamine antiporter activity. Members occur in Gammaproteobacteria.
