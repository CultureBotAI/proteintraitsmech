label: "lyso-ornithine lipid O-acyltransferase"
definition: >-
  lyso-ornithine lipid O-acyltransferase (olsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052552 (equivalog); catalyses lyso-ornithine lipid O-acyltransferase; associated with lipid metabolic process, acyltransferase activity. Members occur in Pseudomonadati.
