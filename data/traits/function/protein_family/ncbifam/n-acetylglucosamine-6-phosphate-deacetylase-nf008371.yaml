identifier: NCBIfam:NF008371
label: "N-acetylglucosamine-6-phosphate deacetylase"
definition: >-
  N-acetylglucosamine-6-phosphate deacetylase (nagA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008371 (equivalog); catalyses N-acetylglucosamine-6-phosphate deacetylase; associated with N-acetylglucosamine metabolic process, N-acetylglucosamine-6-phosphate deacetylase activity. Members occur in Gammaproteobacteria.
