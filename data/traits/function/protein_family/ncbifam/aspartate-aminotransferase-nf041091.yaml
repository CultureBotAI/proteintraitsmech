label: "aspartate aminotransferase"
definition: >-
  aspartate aminotransferase (aspC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041091 (equivalog); catalyses aspartate transaminase; associated with L-aspartate:2-oxoglutarate transaminase activity. Members occur in Thermotogae.
