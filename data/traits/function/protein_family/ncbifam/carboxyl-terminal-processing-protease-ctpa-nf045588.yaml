identifier: NCBIfam:NF045588
label: "carboxyl-terminal processing protease CtpA"
definition: >-
  carboxyl-terminal processing protease CtpA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045588 (exception); catalyses C-terminal processing peptidase; associated with serine-type endopeptidase activity. Members occur in Cyanobacteriota.
