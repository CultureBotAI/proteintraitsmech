definition: >-
  phosphatidylcholine synthase (pcsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045888 (equivalog); catalyses phosphatidylcholine synthase; associated with phospholipid biosynthetic process, phosphatidylcholine synthase activity. Members occur in Nitrobacteraceae.
