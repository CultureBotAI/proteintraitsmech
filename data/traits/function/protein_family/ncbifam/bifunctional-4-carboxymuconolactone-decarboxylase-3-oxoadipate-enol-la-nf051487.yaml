label: "bifunctional 4-carboxymuconolactone decarboxylase/3-oxoadipate enol-lactonase PcaCD"
definition: >-
  bifunctional 4-carboxymuconolactone decarboxylase/3-oxoadipate enol-lactonase PcaCD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF051487 (exception); catalyses 3-oxoadipate enol-lactonase, 4-carboxymuconolactone decarboxylase; associated with beta-ketoadipate pathway, 3-oxoadipate enol-lactonase activity, 4-carboxymuconolactone decarboxylase activity. Members occur in Burkholderiales.
