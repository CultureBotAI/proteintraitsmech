identifier: NCBIfam:NF006461
label: "FAD-dependent 2-octaprenylphenol hydroxylase"
definition: >-
  FAD-dependent 2-octaprenylphenol hydroxylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006461 (equivalog); associated with ubiquinone biosynthetic process, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen. Members occur in Gammaproteobacteria.
