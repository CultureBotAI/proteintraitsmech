identifier: NCBIfam:NF011456
label: "aspartate-semialdehyde dehydrogenase"
definition: >-
  aspartate-semialdehyde dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011456 (equivalog); catalyses aspartate-semialdehyde dehydrogenase; associated with aspartate-semialdehyde dehydrogenase activity, amino acid biosynthetic process, oxidoreductase activity, acting on the aldehyde or oxo group of donors, NAD or NADP as acceptor, NAD binding.
