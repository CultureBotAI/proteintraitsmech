label: "glutamine ABC transporter ATP-binding protein GlnQ"
definition: >-
  glutamine ABC transporter ATP-binding protein GlnQ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007027 (equivalog); catalyses ABC-type polar-amino-acid transporter; associated with amino acid transmembrane transport, ATP binding, ABC-type amino acid transporter activity. Members occur in Pseudomonadota.
