identifier: NCBIfam:NF041777
label: "sensor protein FixL"
definition: >-
  sensor protein FixL — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041777 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, regulation of DNA-templated transcription, nitrogen fixation, histidine phosphotransfer kinase activity. Members occur in Hyphomicrobiales.
