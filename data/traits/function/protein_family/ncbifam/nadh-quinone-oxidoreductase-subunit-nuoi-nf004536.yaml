identifier: NCBIfam:NF004536
label: "NADH-quinone oxidoreductase subunit NuoI"
definition: >-
  NADH-quinone oxidoreductase subunit NuoI — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004536 (equivalog); catalyses NADH:ubiquinone reductase (non-electrogenic); associated with membrane, oxidoreductase activity, acting on NAD(P)H, 4 iron, 4 sulfur cluster binding. Members occur in Gammaproteobacteria.
