label: "RNA repair transcriptional activator RtcR"
definition: >-
  RNA repair transcriptional activator RtcR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF038308 (equivalog); associated with DNA-binding transcription factor activity, ATP binding, regulation of DNA-templated transcription, transcription factor binding. Members occur in Pseudomonadati.
