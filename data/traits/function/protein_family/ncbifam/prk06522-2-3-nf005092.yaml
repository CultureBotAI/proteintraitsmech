label: "2-dehydropantoate 2-reductase"
definition: >-
  2-dehydropantoate 2-reductase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005092 (equivalog); catalyses 2-dehydropantoate 2-reductase; associated with 2-dehydropantoate 2-reductase activity, pantothenate biosynthetic process. Members occur in Thermococcaceae.
