identifier: NCBIfam:TIGR03415
label: "choline ABC transporter ATP-binding protein"
definition: >-
  choline ABC transporter ATP-binding protein (choV) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03415 (equivalog); associated with choline transmembrane transporter activity, choline transport, ATP-binding cassette (ABC) transporter complex, substrate-binding subunit-containing. Members occur in Pseudomonadati.
