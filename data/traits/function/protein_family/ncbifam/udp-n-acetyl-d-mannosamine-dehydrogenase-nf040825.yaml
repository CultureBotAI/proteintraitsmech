identifier: NCBIfam:NF040825
label: "UDP-N-acetyl-D-mannosamine dehydrogenase"
definition: >-
  UDP-N-acetyl-D-mannosamine dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF040825 (equivalog); catalyses UDP-N-acetyl-D-mannosamine dehydrogenase; associated with polysaccharide biosynthetic process, NAD binding, UDP-N-acetyl-D-mannosamine dehydrogenase activity. Members occur in Thermococcaceae.
