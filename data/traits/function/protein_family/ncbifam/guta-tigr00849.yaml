label: "glucitol/sorbitol-specific PTS transporter subunit IIA"
definition: >-
  glucitol/sorbitol-specific PTS transporter subunit IIA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00849 (subfamily); catalyses protein-N(pi)-phosphohistidine--D-sorbitol phosphotransferase; associated with cytoplasm, protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system. Members occur in Enterobacteriaceae.
