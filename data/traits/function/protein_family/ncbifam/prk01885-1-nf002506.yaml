label: "transcription elongation factor GreB"
definition: >-
  transcription elongation factor GreB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002506 (equivalog); associated with DNA binding, regulation of DNA-templated transcription elongation, RNA polymerase binding. Members occur in Pseudomonadati.
