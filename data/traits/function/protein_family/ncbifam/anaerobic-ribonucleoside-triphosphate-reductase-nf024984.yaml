identifier: NCBIfam:NF024984
label: "anaerobic ribonucleoside-triphosphate reductase"
definition: >-
  anaerobic ribonucleoside-triphosphate reductase (nrdD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF024984 (subfamily); catalyses ribonucleoside-triphosphate reductase (formate); associated with DNA replication, ribonucleoside-triphosphate reductase (thioredoxin) activity, oxidoreductase activity.
