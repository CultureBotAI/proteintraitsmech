label: "bifunctional 2-dehydro-3-deoxygluconokinase/2-dehydro-3-deoxygalactonokinase"
definition: >-
  bifunctional 2-dehydro-3-deoxygluconokinase/2-dehydro-3-deoxygalactonokinase (kdgK1) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041332 (equivalog); catalyses 2-dehydro-3-deoxyglucono/galactono-kinase; associated with 2-dehydro-3-deoxygalactonokinase activity, 2-dehydro-3-deoxygluconokinase activity. Members occur in Halobacteriales.
