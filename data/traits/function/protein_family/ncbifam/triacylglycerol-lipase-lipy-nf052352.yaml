label: "triacylglycerol lipase LipY"
definition: >-
  triacylglycerol lipase LipY — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052352 (equivalog); catalyses triacylglycerol lipase; associated with triacylglycerol lipase activity, acetylesterase activity, lipid catabolic process. Members occur in Mycobacterium.
