  FKBP-type peptidyl-prolyl cis-trans isomerase (fkpA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008150 (equivalog); catalyses peptidylprolyl isomerase; associated with peptidyl-prolyl cis-trans isomerase activity, protein folding. Members occur in Gammaproteobacteria.
