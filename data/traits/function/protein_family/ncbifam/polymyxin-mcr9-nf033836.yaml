identifier: NCBIfam:NF033836
label: "MCR-9 family phosphoethanolamine--lipid A transferase"
definition: >-
  MCR-9 family phosphoethanolamine--lipid A transferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033836 (exception); associated with catalytic activity, sulfuric ester hydrolase activity, membrane, transferase activity, transferring phosphorus-containing groups. Members occur in Enterobacterales.
