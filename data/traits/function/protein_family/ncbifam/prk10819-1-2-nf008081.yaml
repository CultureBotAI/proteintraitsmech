definition: >-
  TonB system transport protein TonB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008081 (equivalog); associated with siderophore-iron transmembrane transporter activity, siderophore transport, outer membrane-bounded periplasmic space, transmembrane transport. Members occur in Enterobacteriaceae.
