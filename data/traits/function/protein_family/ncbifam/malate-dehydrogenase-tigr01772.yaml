identifier: NCBIfam:TIGR01772
label: "malate dehydrogenase"
definition: >-
  malate dehydrogenase (mdh) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01772 (equivalog); catalyses (S)-malate dehydrogenase (NAD(+), oxaloacetate-forming); associated with tricarboxylic acid cycle, L-malate dehydrogenase (NAD+) activity. Members occur in Gammaproteobacteria.
