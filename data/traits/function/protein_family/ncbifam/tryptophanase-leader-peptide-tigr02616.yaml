identifier: NCBIfam:TIGR02616
label: "tryptophanase leader peptide"
definition: >-
  tryptophanase leader peptide (tnaC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02616 (equivalog); associated with L-tryptophan catabolic process, regulation of termination of DNA-templated transcription, transcriptional attenuation by ribosome. Members occur in Gammaproteobacteria.
