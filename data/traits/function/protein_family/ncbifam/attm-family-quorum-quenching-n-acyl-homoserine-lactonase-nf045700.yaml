identifier: NCBIfam:NF045700
label: "AttM family quorum-quenching N-acyl homoserine lactonase"
definition: >-
  AttM family quorum-quenching N-acyl homoserine lactonase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045700 (equivalog); catalyses quorum-quenching N-acyl-homoserine lactonase; associated with acyl-L-homoserine-lactone lactonohydrolase activity. Members occur in Pseudomonadota.
