identifier: NCBIfam:NF045814
label: "1-deoxy-11-beta-hydroxypentalenate dehydrogenase"
definition: >-
  1-deoxy-11-beta-hydroxypentalenate dehydrogenase (ptlF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045814 (equivalog); catalyses 1-deoxy-11beta-hydroxypentalenate dehydrogenase; associated with oxidoreductase activity, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, antibiotic biosynthetic process. Members occur in Actinomycetes.
