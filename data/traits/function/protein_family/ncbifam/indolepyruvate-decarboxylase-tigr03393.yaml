identifier: NCBIfam:TIGR03393
label: "indolepyruvate decarboxylase"
definition: >-
  indolepyruvate decarboxylase (ipdC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03393 (equivalog); catalyses indolepyruvate decarboxylase; associated with auxin biosynthetic process, indolepyruvate decarboxylase activity. Members occur in Pseudomonadota.
