identifier: NCBIfam:NF002885
label: "crotonobetainyl-CoA dehydrogenase"
definition: >-
  crotonobetainyl-CoA dehydrogenase (caiA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002885 (equivalog); catalyses crotonobetainyl-CoA reductase; associated with acyl-CoA dehydrogenase activity, carnitine metabolic process, oxidoreductase activity, acting on the CH-CH group of donors. Members occur in Enterobacterales.
