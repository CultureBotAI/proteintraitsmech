label: "type 1 glycerol-3-phosphate oxidase"
definition: >-
  type 1 glycerol-3-phosphate oxidase (glpO) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033461 (equivalog); associated with glycerol-3-phosphate dehydrogenase (quinone) activity, glycerol-3-phosphate metabolic process. Members occur in Lactobacillales.
