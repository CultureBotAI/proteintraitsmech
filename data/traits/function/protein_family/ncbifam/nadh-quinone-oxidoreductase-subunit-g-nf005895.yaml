definition: >-
  NADH-quinone oxidoreductase subunit G — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005895 (equivalog); catalyses NADH:ubiquinone reductase (non-electrogenic); associated with NADH dehydrogenase (ubiquinone) activity, membrane, ATP synthesis coupled electron transport, molybdopterin cofactor binding.
