label: "erythrose-4-phosphate dehydrogenase"
definition: >-
  erythrose-4-phosphate dehydrogenase (epd) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01532 (equivalog); catalyses erythrose-4-phosphate dehydrogenase; associated with cytoplasm, pyridoxal 5'-phosphate biosynthetic process, erythrose-4-phosphate dehydrogenase activity, NAD binding. Members occur in Gammaproteobacteria.
