identifier: NCBIfam:TIGR04431
label: "AacA4 family aminoglycoside N(6')-acetyltransferase"
definition: >-
  AacA4 family aminoglycoside N(6')-acetyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04431 (equivalog); catalyses aminoglycoside 6'-N-acetyltransferase; associated with aminoglycoside 6'-N-acetyltransferase activity. Members occur in Pseudomonadota.
