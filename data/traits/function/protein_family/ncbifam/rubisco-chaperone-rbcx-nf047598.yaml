label: "RuBisCO chaperone RbcX"
definition: >-
  RuBisCO chaperone RbcX (rcbX) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047598 (equivalog); associated with carbon fixation, protein folding chaperone, ribulose bisphosphate carboxylase complex assembly. Members occur in Cyanobacteriota.
