identifier: NCBIfam:NF050186
label: "AraC family transcriptional regulator GliR"
definition: >-
  AraC family transcriptional regulator GliR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050186 (equivalog); associated with DNA-binding transcription factor activity, regulation of DNA-templated transcription, sequence-specific DNA binding. Members occur in Pseudomonadaceae.
