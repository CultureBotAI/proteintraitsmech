identifier: NCBIfam:NF045657
label: "methenyltetrahydrofolate cyclohydrolase"
definition: >-
  methenyltetrahydrofolate cyclohydrolase (fchA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045657 (equivalog); catalyses methenyltetrahydrofolate cyclohydrolase; associated with methenyltetrahydrofolate cyclohydrolase activity, one-carbon metabolic process. Members occur in Pseudomonadota.
