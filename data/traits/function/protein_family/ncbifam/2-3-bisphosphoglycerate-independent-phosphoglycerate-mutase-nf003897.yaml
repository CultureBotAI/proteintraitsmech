label: "2,3-bisphosphoglycerate-independent phosphoglycerate mutase"
definition: >-
  2,3-bisphosphoglycerate-independent phosphoglycerate mutase (gpmM) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003897 (equivalog); catalyses phosphoglycerate mutase (2,3-diphosphoglycerate-independent); associated with phosphoglycerate mutase activity, glucose catabolic process. Members occur in Gammaproteobacteria.
