identifier: NCBIfam:NF007638
label: "non-heme ferritin"
definition: >-
  non-heme ferritin (ftnA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007638 (equivalog); catalyses bacterial non-heme ferritin; associated with intracellular iron ion homeostasis, ferric iron binding. Members occur in Pseudomonadati.
