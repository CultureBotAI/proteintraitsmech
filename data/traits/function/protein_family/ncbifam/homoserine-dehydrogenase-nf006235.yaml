identifier: NCBIfam:NF006235
label: "homoserine dehydrogenase"
definition: >-
  homoserine dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006235 (equivalog); catalyses homoserine dehydrogenase. Members occur in Thermococcaceae.
