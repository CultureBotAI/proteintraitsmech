identifier: NCBIfam:NF004158
label: "bifunctional riboflavin kinase/FAD synthetase"
definition: >-
  bifunctional riboflavin kinase/FAD synthetase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004158 (equivalog); catalyses riboflavin kinase, FAD synthase; associated with FMN adenylyltransferase activity, riboflavin biosynthetic process. Members occur in Streptococcaceae.
