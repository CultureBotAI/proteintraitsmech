identifier: NCBIfam:TIGR01481
label: "catabolite control protein A"
definition: >-
  catabolite control protein A (ccpA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01481 (equivalog); associated with DNA-binding transcription activator activity, RNA polymerase II-specific, DNA binding, carbohydrate metabolic process, regulation of DNA-templated transcription. Members occur in Bacilli.
