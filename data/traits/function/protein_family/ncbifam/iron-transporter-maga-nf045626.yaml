label: "iron transporter MagA"
definition: >-
  iron transporter MagA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045626 (equivalog); associated with monoatomic cation transmembrane transporter activity, antiporter activity, iron ion transmembrane transport. Members occur in Rhodospirillales.
