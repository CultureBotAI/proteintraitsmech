label: "DNA-directed RNA polymerase subunit beta/beta'"
definition: >-
  DNA-directed RNA polymerase subunit beta/beta' — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007172 (equivalog); catalyses DNA-directed RNA polymerase; associated with DNA-directed RNA polymerase activity, DNA-templated transcription. Members occur in Helicobacter.
