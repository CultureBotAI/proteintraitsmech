label: "fatty acid metabolism transcriptional regulator FadR"
definition: >-
  fatty acid metabolism transcriptional regulator FadR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02812 (equivalog); associated with fatty-acyl-CoA binding, DNA binding, DNA-binding transcription factor activity, regulation of DNA-templated transcription. Members occur in Gammaproteobacteria.
