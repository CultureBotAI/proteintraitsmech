identifier: NCBIfam:TIGR01111
label: "tetrahydromethanopterin S-methyltransferase subunit A"
definition: >-
  tetrahydromethanopterin S-methyltransferase subunit A (mtrA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01111 (equivalog); catalyses tetrahydromethanopterin S-methyltransferase; associated with sodium ion transport, membrane, tetrahydromethanopterin S-methyltransferase activity, cobalt ion binding. Members occur in Methanobacteriota.
