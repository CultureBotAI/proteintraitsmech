identifier: NCBIfam:NF008192
label: "(2,3-dihydroxybenzoyl)adenylate synthase"
definition: >-
  (2,3-dihydroxybenzoyl)adenylate synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008192 (equivalog); catalyses 2,3-dihydroxybenzoate--[aryl-carrier protein] ligase; associated with 2,3-dihydroxybenzoate--[aryl-carrier protein] ligase activity, siderophore biosynthetic process. Members occur in Pseudomonadota.
