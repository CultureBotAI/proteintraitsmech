  beta-ketothiolase BktB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042999 (equivalog); catalyses amino-acid N-acetyltransferase, acetyl-CoA C-acyltransferase; associated with acetyl-CoA C-acetyltransferase activity. Members occur in Burkholderiales.
