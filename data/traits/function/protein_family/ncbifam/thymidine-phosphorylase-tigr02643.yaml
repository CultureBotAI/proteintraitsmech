identifier: NCBIfam:TIGR02643
label: "thymidine phosphorylase"
definition: >-
  thymidine phosphorylase (deoA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02643 (equivalog); catalyses thymidine phosphorylase; associated with pyrimidine nucleoside metabolic process, thymidine phosphorylase activity. Members occur in Pseudomonadota.
