identifier: NCBIfam:NF006950
label: "methylenetetrahydrofolate reductase"
definition: >-
  methylenetetrahydrofolate reductase (metF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006950 (equivalog); catalyses methylenetetrahydrofolate reductase [NAD(P)H]; associated with methylenetetrahydrofolate reductase [NAD(P)H] activity, L-methionine biosynthetic process. Members occur in Pseudomonadota.
