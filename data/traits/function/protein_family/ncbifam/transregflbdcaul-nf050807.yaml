identifier: NCBIfam:NF050807
label: "sigma-54-dependent transcriptional regulator FlbD"
definition: >-
  sigma-54-dependent transcriptional regulator FlbD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050807 (equivalog); associated with phosphorelay signal transduction system, regulation of DNA-templated transcription, ATP hydrolysis activity, sequence-specific DNA binding. Members occur in Pseudomonadota.
