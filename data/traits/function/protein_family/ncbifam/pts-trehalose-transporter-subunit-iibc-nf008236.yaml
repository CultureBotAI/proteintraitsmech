  PTS trehalose transporter subunit IIBC (treB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008236 (equivalog); catalyses protein-N(pi)-phosphohistidine--trehalose phosphotransferase; associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system, trehalose transmembrane transporter activity, trehalose transport.
