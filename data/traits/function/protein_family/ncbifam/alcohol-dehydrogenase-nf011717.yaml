identifier: NCBIfam:NF011717
label: "alcohol dehydrogenase"
definition: >-
  alcohol dehydrogenase (yqhD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011717 (equivalog); catalyses alcohol dehydrogenase (NADP(+)); associated with metal ion binding, butanol dehydrogenase (NAD+) activity. Members occur in Pseudomonadota.
