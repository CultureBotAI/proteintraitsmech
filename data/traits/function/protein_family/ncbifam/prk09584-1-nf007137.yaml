  dipeptide/tripeptide permease DtpA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007137 (equivalog); associated with peptide transport, membrane, transmembrane transport, peptide transmembrane transporter activity. Members occur in Gammaproteobacteria.
