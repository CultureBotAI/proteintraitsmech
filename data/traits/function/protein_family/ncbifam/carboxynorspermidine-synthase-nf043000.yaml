identifier: NCBIfam:NF043000
label: "carboxynorspermidine synthase"
definition: >-
  carboxynorspermidine synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043000 (equivalog); catalyses carboxynorspermidine synthase; associated with polyamine biosynthetic process, carboxynorspermidine dehydrogenase activity. Members occur in Gammaproteobacteria.
