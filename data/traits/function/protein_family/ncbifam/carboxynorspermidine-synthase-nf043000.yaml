definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) carboxynorspermidine + NADP(+) + H2O = L-aspartate 4-semialdehyde + propane-1,3-diamine + NADPH + H(+). (2) carboxyspermidine + NADP(+) + H2O = L-aspartate 4-semialdehyde + putrescine + NADPH + H(+)
