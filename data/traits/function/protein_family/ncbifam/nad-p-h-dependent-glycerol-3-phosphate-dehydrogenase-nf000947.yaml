    text: >-
      Catalyses: (1) sn-glycerol 3-phosphate + NAD(+) = dihydroxyacetone phosphate + NADH + H(+). (2) sn-glycerol 3-phosphate + NADP(+) = dihydroxyacetone phosphate + NADPH + H(+)
