identifier: NCBIfam:NF000947
label: "NAD(P)H-dependent glycerol-3-phosphate dehydrogenase"
definition: >-
  NAD(P)H-dependent glycerol-3-phosphate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000947 (equivalog); catalyses glycerol-3-phosphate dehydrogenase [NAD(P)(+)]. Members occur in Pseudomonadota.
