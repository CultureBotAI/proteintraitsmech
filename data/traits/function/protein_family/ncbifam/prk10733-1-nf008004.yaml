identifier: NCBIfam:NF008004
label: "ATP-dependent zinc metalloprotease FtsH"
definition: >-
  ATP-dependent zinc metalloprotease FtsH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008004 (equivalog); associated with ATP-dependent peptidase activity, metalloendopeptidase activity, proteolysis. Members occur in Gammaproteobacteria.
