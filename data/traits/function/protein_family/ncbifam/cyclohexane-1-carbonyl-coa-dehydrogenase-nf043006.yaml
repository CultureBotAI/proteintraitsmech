identifier: NCBIfam:NF043006
label: "cyclohexane-1-carbonyl-CoA dehydrogenase"
definition: >-
  cyclohexane-1-carbonyl-CoA dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043006 (equivalog); catalyses cyclohexane-1-carbonyl-CoA dehydrogenase (electron-transfer; associated with acyl-CoA dehydrogenase activity, protein tetramerization, oxidoreductase activity, acting on the CH-CH group of donors, with a flavin as acceptor. Members occur in Thermodesulfobacteriota.
