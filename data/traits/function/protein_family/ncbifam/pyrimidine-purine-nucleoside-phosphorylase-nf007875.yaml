identifier: NCBIfam:NF007875
label: "pyrimidine/purine nucleoside phosphorylase"
definition: >-
  pyrimidine/purine nucleoside phosphorylase (ppnP) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007875 (equivalog); catalyses purine-nucleoside phosphorylase, pyrimidine-nucleoside phosphorylase. Members occur in Enterobacterales.
