    text: >-
      Catalyses: (1) uridine + phosphate = alpha-D-ribose 1-phosphate + uracil. (2) cytidine + phosphate = cytosine + alpha-D-ribose 1-phosphate. (3) 2'-deoxyuridine + phosphate = 2-deoxy-alpha-D-ribose 1-phosphate + uracil. (4) thymidine + phosphate = 2-deoxy-alpha-D-ribose 1-phosphate + thymine
