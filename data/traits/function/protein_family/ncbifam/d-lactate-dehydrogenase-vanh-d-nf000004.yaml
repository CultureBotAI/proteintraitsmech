identifier: NCBIfam:NF000004
label: "D-lactate dehydrogenase VanH-D"
definition: >-
  D-lactate dehydrogenase VanH-D — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000004 (exception); catalyses D-lactate dehydrogenase; associated with oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, NAD binding. Members occur in Bacillota.
