identifier: NCBIfam:NF047791
label: "RNase RNM"
definition: >-
  RNase RNM — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047791 (equivalog); catalyses 3',5'-nucleoside bisphosphate phosphatase; associated with 5'-3' RNA exonuclease activity, rRNA processing, 5'-3' DNA exonuclease activity, 3',5'-nucleotide bisphosphate phosphatase activity. Members occur in Gammaproteobacteria.
