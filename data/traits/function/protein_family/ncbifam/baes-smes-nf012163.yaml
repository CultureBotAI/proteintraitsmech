label: "sensor histidine kinase efflux regulator BaeS"
definition: >-
  sensor histidine kinase efflux regulator BaeS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF012163 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, signal transduction, membrane, phosphorylation. Members occur in Gammaproteobacteria.
