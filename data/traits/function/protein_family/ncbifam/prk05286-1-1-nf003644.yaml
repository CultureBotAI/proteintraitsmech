identifier: NCBIfam:NF003644
label: "quinone-dependent dihydroorotate dehydrogenase"
definition: >-
  quinone-dependent dihydroorotate dehydrogenase (pyrD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003644 (equivalog); catalyses dihydroorotate dehydrogenase (quinone); associated with dihydroorotate dehydrogenase activity, UMP biosynthetic process, membrane. Members occur in Pseudomonadati.
