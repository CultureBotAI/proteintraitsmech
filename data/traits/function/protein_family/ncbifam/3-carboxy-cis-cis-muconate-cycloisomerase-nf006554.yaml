label: "3-carboxy-cis,cis-muconate cycloisomerase"
definition: >-
  3-carboxy-cis,cis-muconate cycloisomerase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006554 (equivalog); catalyses 3-carboxy-cis,cis-muconate cycloisomerase; associated with 3,4-dihydroxybenzoate catabolic process, 3-carboxy-cis,cis-muconate cycloisomerase activity. Members occur in Pseudomonadota.
