identifier: NCBIfam:NF003473
label: "o-succinylbenzoate synthase"
definition: >-
  o-succinylbenzoate synthase (menC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003473 (equivalog); catalyses o-succinylbenzoate synthase; associated with magnesium ion binding, menaquinone biosynthetic process, hydro-lyase activity. Members occur in Gammaproteobacteria.
