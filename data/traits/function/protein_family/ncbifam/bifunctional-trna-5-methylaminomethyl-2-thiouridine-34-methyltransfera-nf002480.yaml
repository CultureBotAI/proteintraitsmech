identifier: NCBIfam:NF002480
label: "bifunctional tRNA (5-methylaminomethyl-2-thiouridine)(34)-methyltransferase MnmC2/FAD-dependent 5-carboxymethylaminomethyl-2-thiouridine(34) oxidoreductase MnmC1"
definition: >-
  bifunctional tRNA (5-methylaminomethyl-2-thiouridine)(34)-methyltransferase MnmC2/FAD-dependent 5-carboxymethylaminomethyl-2-thiouridine(34) oxidoreductase MnmC1 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002480 (equivalog); catalyses tRNA 5-(aminomethyl)-2-thiouridylate-methyltransferase; associated with tRNA (5-methylaminomethyl-2-thiouridylate)(34)-methyltransferase activity, tRNA processing, oxidoreductase activity. Members occur in Pseudomonadati.
