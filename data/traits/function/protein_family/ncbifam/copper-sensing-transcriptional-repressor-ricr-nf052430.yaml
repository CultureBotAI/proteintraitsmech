identifier: NCBIfam:NF052430
label: "copper-sensing transcriptional repressor RicR"
definition: >-
  copper-sensing transcriptional repressor RicR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052430 (exception); associated with DNA-binding transcription factor activity, response to copper ion, regulation of DNA-templated transcription initiation. Members occur in Mycobacteriaceae.
