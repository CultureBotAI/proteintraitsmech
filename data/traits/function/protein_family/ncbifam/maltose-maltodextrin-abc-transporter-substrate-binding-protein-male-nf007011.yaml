identifier: NCBIfam:NF007011
label: "maltose/maltodextrin ABC transporter substrate-binding protein MalE"
definition: >-
  maltose/maltodextrin ABC transporter substrate-binding protein MalE — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007011 (equivalog); catalyses ABC-type maltose transporter; associated with carbohydrate transport, carbohydrate transmembrane transporter activity, transmembrane transport. Members occur in Gammaproteobacteria.
