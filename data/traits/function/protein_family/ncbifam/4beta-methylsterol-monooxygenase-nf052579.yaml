identifier: NCBIfam:NF052579
label: "4beta-methylsterol monooxygenase"
definition: >-
  4beta-methylsterol monooxygenase (sdmA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF052579 (equivalog); catalyses 4beta-methylsterol monooxygenase; associated with monooxygenase activity, sterol biosynthetic process, metal ion binding, 2 iron, 2 sulfur cluster binding. Members occur in Gammaproteobacteria.
