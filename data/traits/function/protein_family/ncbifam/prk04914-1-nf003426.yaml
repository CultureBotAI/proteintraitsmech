definition: >-
  RNA polymerase-associated protein RapA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003426 (equivalog); associated with ATP binding, regulation of DNA-templated transcription, hydrolase activity, acting on acid anhydrides, ATP-dependent chromatin remodeler activity. Members occur in Pseudomonadati.
