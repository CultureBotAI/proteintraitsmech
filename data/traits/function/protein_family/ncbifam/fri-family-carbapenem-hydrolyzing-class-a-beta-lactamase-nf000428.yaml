definition: >-
  FRI family carbapenem-hydrolyzing class A beta-lactamase (blaFRI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000428 (exception); catalyses beta-lactamase; associated with protein binding, glutathione metabolic process, beta-lactamase activity, beta-lactam antibiotic catabolic process. Members occur in Enterobacteriaceae.
