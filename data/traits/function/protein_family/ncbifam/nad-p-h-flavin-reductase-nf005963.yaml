identifier: NCBIfam:NF005963
label: "NAD(P)H-flavin reductase"
definition: >-
  NAD(P)H-flavin reductase (fre) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005963 (equivalog); catalyses riboflavin reductase [NAD(P)H]; associated with oxidoreductase activity. Members occur in Gammaproteobacteria.
