identifier: NCBIfam:NF007068
label: 1-phosphofructokinase
definition: >-
  1-phosphofructokinase (fruK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007068 (equivalog); catalyses 1-phosphofructokinase; associated with 1-phosphofructokinase activity, phosphotransferase activity, alcohol group as acceptor. Members occur in Gammaproteobacteria.
