identifier: NCBIfam:NF007187
label: gamma-glutamyltransferase
definition: >-
  gamma-glutamyltransferase (ggt) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007187 (equivalog); catalyses gamma-glutamyltransferase; associated with glutathione catabolic process, glutathione gamma-glutamate hydrolase. Members occur in Enterobacterales.
