identifier: NCBIfam:NF002187
label: "4-hydroxy-3-methylbut-2-enyl diphosphate reductase"
definition: >-
  4-hydroxy-3-methylbut-2-enyl diphosphate reductase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF002187 (equivalog); catalyses 4-hydroxy-3-methylbut-2-enyl diphosphate reductase; associated with isopentenyl diphosphate biosynthetic process, methylerythritol phosphate pathway, metal ion binding, dimethylallyl diphosphate biosynthetic process, 4-hydroxy-3-methylbut-2-enyl diphosphate reductase activity.
