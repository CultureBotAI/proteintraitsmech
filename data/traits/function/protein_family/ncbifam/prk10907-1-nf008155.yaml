definition: >-
  rhomboid family intramembrane serine protease GlpG — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008155 (equivalog); catalyses rhomboid protease; associated with serine-type endopeptidase activity, proteolysis, membrane. Members occur in Enterobacterales.
