identifier: NCBIfam:NF047908
label: "NADPH-dependent aldehyde reductase Ahr"
definition: >-
  NADPH-dependent aldehyde reductase Ahr — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047908 (equivalog); catalyses alcohol dehydrogenase (NADP(+)); associated with fatty acid metabolic process, alcohol dehydrogenase (NADP+) activity, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor.
