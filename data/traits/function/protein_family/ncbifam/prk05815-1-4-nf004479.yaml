identifier: NCBIfam:NF004479
label: "F0F1 ATP synthase subunit A"
definition: >-
  F0F1 ATP synthase subunit A (atpB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004479 (equivalog); catalyses H(+)-transporting two-sector ATPase; associated with proton transmembrane transporter activity, proton motive force-driven ATP synthesis. Members occur in Bacilli.
