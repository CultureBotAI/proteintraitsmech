identifier: NCBIfam:NF001309
label: "4-phosphoerythronate dehydrogenase PdxB"
definition: >-
  4-phosphoerythronate dehydrogenase PdxB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF001309 (equivalog); catalyses 4-phosphoerythronate dehydrogenase; associated with pyridoxine biosynthetic process, 4-phosphoerythronate dehydrogenase activity, protein dimerization activity, NAD binding. Members occur in Pseudomonadati.
