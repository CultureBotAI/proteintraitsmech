label: "PTS N,N'-diacetylchitobiose transporter subunit IIC"
definition: >-
  PTS N,N'-diacetylchitobiose transporter subunit IIC (chbC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007634 (equivalog); catalyses protein-N(pi)-phosphohistidine--N,N'-diacetylchitobiose; associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system, membrane. Members occur in Enterobacterales.
