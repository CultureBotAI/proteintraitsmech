identifier: NCBIfam:NF008634
label: "polynucleotide adenylyltransferase PcnB"
definition: >-
  polynucleotide adenylyltransferase PcnB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008634 (equivalog); catalyses polynucleotide adenylyltransferase; associated with RNA binding, poly(A) RNA polymerase activity. Members occur in Enterobacterales.
