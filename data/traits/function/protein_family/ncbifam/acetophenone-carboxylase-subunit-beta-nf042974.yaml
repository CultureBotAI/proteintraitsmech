identifier: NCBIfam:NF042974
label: "acetophenone carboxylase subunit beta"
definition: >-
  acetophenone carboxylase subunit beta (apcB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042974 (equivalog); catalyses acetophenone carboxylase; associated with ATP binding, hydrolase activity, ligase activity. Members occur in Pseudomonadota.
