identifier: NCBIfam:NF003759
label: "Na(+)-translocating NADH-quinone reductase subunit A"
definition: >-
  Na(+)-translocating NADH-quinone reductase subunit A — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003759 (equivalog); associated with sodium ion transport, oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor. Members occur in Pseudomonadati.
