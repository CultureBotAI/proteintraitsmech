identifier: NCBIfam:NF033911
label: "non-toxic nonhemagglutinin NTNH"
definition: >-
  non-toxic nonhemagglutinin NTNH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033911 (equivalog); associated with metalloendopeptidase activity, extracellular region, proteolysis, zinc ion binding. Members occur in Clostridium.
