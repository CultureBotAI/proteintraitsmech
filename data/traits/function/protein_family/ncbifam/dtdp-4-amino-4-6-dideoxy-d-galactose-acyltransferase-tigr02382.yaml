identifier: NCBIfam:TIGR02382
label: "dTDP-4-amino-4,6-dideoxy-D-galactose acyltransferase"
definition: >-
  dTDP-4-amino-4,6-dideoxy-D-galactose acyltransferase (wecD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02382 (equivalog); catalyses dTDP-4-amino-4,6-dideoxy-D-galactose acyltransferase; associated with N-acetyltransferase activity, enterobacterial common antigen biosynthetic process. Members occur in Enterobacterales.
