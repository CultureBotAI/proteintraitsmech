identifier: NCBIfam:NF042969
label: "bifunctional acetylxylan esterase/glucomannan deacetylase AxeC2"
definition: >-
  bifunctional acetylxylan esterase/glucomannan deacetylase AxeC2 (axe2C) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042969 (equivalog); catalyses acetylxylan esterase; associated with hydrolase activity, acting on glycosyl bonds, xylan catabolic process, acetylxylan esterase activity, glucomannan catabolic process. Members occur in Pseudomonadota.
