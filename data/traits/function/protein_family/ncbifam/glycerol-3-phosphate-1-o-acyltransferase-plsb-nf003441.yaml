  glycerol-3-phosphate 1-O-acyltransferase PlsB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003441 (equivalog); catalyses glycerol-3-phosphate 1-O-acyltransferase; associated with glycerol-3-phosphate O-acyltransferase activity, phospholipid biosynthetic process. Members occur in Pseudomonadota.
