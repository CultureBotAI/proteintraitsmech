label: "D-arabinitol 4-dehydrogenase"
definition: >-
  D-arabinitol 4-dehydrogenase (dalD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043014 (equivalog); catalyses D-arabinitol 4-dehydrogenase; associated with pentitol catabolic process, D-arabinitol 4-dehydrogenase activity. Members occur in Pseudomonadota.
