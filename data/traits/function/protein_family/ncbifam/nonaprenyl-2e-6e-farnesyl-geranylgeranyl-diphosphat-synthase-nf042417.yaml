identifier: NCBIfam:NF042417
label: "nonaprenyl/(2E,6E)-farnesyl/geranylgeranyl diphosphat synthase"
definition: >-
  nonaprenyl/(2E,6E)-farnesyl/geranylgeranyl diphosphat synthase (grcC1) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042417 (equivalog); catalyses (2E,6E)-farnesyl diphosphate synthase, geranylgeranyl diphosphate synthase, all-trans-nonaprenyl-diphosphate synthase [geranylgeranyl-diphosphate; associated with geranylgeranyl diphosphate synthase activity, (2E,6E)-farnesyl diphosphate synthase activity, prenyltransferase activity, isoprenoid biosynthetic process. Members occur in Mycobacteriaceae.
