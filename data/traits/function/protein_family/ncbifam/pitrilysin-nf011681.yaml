label: pitrilysin
definition: >-
  pitrilysin (ptrA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011681 (equivalog); catalyses pitrilysin; associated with metalloendopeptidase activity, proteolysis, metal ion binding. Members occur in Gammaproteobacteria.
