identifier: NCBIfam:NF008386
label: "23S rRNA (guanosine(2251)-2'-O)-methyltransferase RlmB"
definition: >-
  23S rRNA (guanosine(2251)-2'-O)-methyltransferase RlmB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008386 (equivalog); catalyses 23S rRNA (guanosine(2251)-2'-O)-methyltransferase; associated with RNA binding, RNA processing, RNA methyltransferase activity. Members occur in Gammaproteobacteria.
