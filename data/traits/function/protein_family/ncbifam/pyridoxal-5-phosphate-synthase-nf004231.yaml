identifier: NCBIfam:NF004231
label: "pyridoxal 5'-phosphate synthase"
definition: >-
  pyridoxal 5'-phosphate synthase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004231 (subfamily); catalyses pyridoxal 5'-phosphate synthase; associated with pyridoxamine phosphate oxidase activity, pyridoxine biosynthetic process, FMN binding.
