    text: >-
      Catalyses: (1) pyridoxamine 5'-phosphate + O2 + H2O = pyridoxal 5'-phosphate + H2O2 + NH4(+). (2) pyridoxine 5'-phosphate + O2 = pyridoxal 5'-phosphate + H2O2
