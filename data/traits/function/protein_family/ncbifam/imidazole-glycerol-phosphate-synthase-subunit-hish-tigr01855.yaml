  imidazole glycerol phosphate synthase subunit HisH — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01855 (equivalog); catalyses imidazole glycerol-phosphate synthase; associated with L-histidine biosynthetic process, imidazoleglycerol-phosphate synthase activity.
