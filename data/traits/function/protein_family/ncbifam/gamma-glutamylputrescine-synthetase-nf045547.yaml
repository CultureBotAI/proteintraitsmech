identifier: NCBIfam:NF045547
label: "gamma-glutamylputrescine synthetase"
definition: >-
  gamma-glutamylputrescine synthetase (glnA2) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045547 (equivalog); catalyses glutamate--putrescine ligase; associated with glutamine synthetase activity, L-glutamine biosynthetic process. Members occur in Halobacteriales.
