identifier: NCBIfam:NF008270
label: "purine nucleoside transporter PunC"
definition: >-
  purine nucleoside transporter PunC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008270 (equivalog); associated with membrane, xenobiotic transmembrane transporter activity, xenobiotic detoxification by transmembrane export across the plasma membrane. Members occur in Gammaproteobacteria.
