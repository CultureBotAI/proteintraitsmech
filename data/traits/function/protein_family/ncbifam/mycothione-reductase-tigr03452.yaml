label: "mycothione reductase"
definition: >-
  mycothione reductase (mtr) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03452 (equivalog); catalyses mycothione reductase; associated with mycothiol metabolic process, mycothione reductase [NAD(P)H] activity, NADPH binding. Members occur in Actinomycetes.
