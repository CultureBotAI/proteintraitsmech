definition: >-
  malate synthase AceB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041315 (equivalog); catalyses malate synthase; associated with malate synthase activity, glyoxylate cycle, tricarboxylic acid cycle. Members occur in Halobacteria.
