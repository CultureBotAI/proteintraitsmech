identifier: NCBIfam:NF008408
label: "glycolate oxidase subunit GlcD"
definition: >-
  glycolate oxidase subunit GlcD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008408 (equivalog); catalyses glycolate dehydrogenase; associated with (S)-2-hydroxy-acid oxidase activity, glycolate oxidase complex, FAD binding. Members occur in Pseudomonadota.
