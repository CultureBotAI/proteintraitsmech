identifier: NCBIfam:NF041140
label: "tRNA (guanine(9)-/adenine(9)-N1)-methyltransferase"
definition: >-
  tRNA (guanine(9)-/adenine(9)-N1)-methyltransferase (trm10) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041140 (equivalog); catalyses tRNA (adenine(9)-N(1))-methyltransferase, tRNA (guanine(9)-N(1))-methyltransferase; associated with tRNA methylation, tRNA (guanosine(9)-N1)-methyltransferase activity. Members occur in Thermococcaceae.
