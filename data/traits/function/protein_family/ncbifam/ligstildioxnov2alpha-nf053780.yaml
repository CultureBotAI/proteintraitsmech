identifier: NCBIfam:NF053780
label: "lignostilbene-alpha,beta-dioxygenase NOV2"
definition: >-
  lignostilbene-alpha,beta-dioxygenase NOV2 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053780 (equivalog); catalyses lignostilbene alphabeta-dioxygenase; associated with iron ion binding, carotenoid dioxygenase activity, carotene catabolic process, lignin catabolic process. Members occur in Pseudomonadota.
