label: "beta-glucuronidase LacZ4"
definition: >-
  beta-glucuronidase LacZ4 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF050095 (equivalog); catalyses beta-glucuronidase; associated with carbohydrate metabolic process, hydrolase activity, acting on glycosyl bonds. Members occur in Bacteroidales.
