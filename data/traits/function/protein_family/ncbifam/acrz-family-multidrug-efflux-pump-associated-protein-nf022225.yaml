identifier: NCBIfam:NF022225
label: "AcrZ family multidrug efflux pump-associated protein"
definition: >-
  AcrZ family multidrug efflux pump-associated protein — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF022225 (pfameq); associated with plasma membrane, xenobiotic transmembrane transporter activity, xenobiotic detoxification by transmembrane export across the plasma membrane. Members occur in Gammaproteobacteria.
