  D-aminoacyl-tRNA deacylase (dtd) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR00256 (equivalog); catalyses D-aminoacyl-tRNA deacylase; associated with peptidyl-tRNA hydrolase activity, metabolic process.
