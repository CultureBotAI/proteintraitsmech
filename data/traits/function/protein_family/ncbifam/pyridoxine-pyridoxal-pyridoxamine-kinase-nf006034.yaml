identifier: NCBIfam:NF006034
label: "pyridoxine/pyridoxal/pyridoxamine kinase"
definition: >-
  pyridoxine/pyridoxal/pyridoxamine kinase (pdxK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF006034 (equivalog); catalyses pyridoxal kinase; associated with pyridoxal kinase activity, pyridoxal 5'-phosphate salvage. Members occur in Pseudomonadota.
