label: "nucleoside triphosphate pyrophosphohydrolase"
definition: >-
  nucleoside triphosphate pyrophosphohydrolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008991 (equivalog); catalyses nucleotide diphosphatase. Members occur in Frankia.
