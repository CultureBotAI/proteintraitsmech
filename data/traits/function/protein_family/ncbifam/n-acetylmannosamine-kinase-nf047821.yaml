identifier: NCBIfam:NF047821
label: "N-acetylmannosamine kinase"
definition: >-
  N-acetylmannosamine kinase (nanK) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047821 (equivalog); catalyses N-acylmannosamine kinase; associated with ATP binding, N-acylmannosamine kinase activity, N-acetylneuraminate catabolic process. Members occur in Enterobacterales.
