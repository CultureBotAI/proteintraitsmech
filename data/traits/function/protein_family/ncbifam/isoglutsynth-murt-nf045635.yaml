identifier: NCBIfam:NF045635
label: "lipid II isoglutaminyl synthase subunit MurT"
definition: >-
  lipid II isoglutaminyl synthase subunit MurT — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045635 (equivalog); catalyses lipid II isoglutaminyl synthase (glutamine-hydrolyzing); associated with peptidoglycan biosynthetic process, acid-amino acid ligase activity, carbon-nitrogen ligase activity on lipid II. Members occur in Streptococcaceae.
