identifier: NCBIfam:TIGR02541
label: "flagellar assembly peptidoglycan hydrolase FlgJ"
definition: >-
  flagellar assembly peptidoglycan hydrolase FlgJ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02541 (equivalog); associated with hydrolase activity, acting on glycosyl bonds, bacterial-type flagellum assembly. Members occur in Pseudomonadota.
