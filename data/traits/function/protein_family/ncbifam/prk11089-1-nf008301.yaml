identifier: NCBIfam:NF008301
label: "PTS glucose transporter subunit IIBC"
definition: >-
  PTS glucose transporter subunit IIBC (ptsG) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008301 (equivalog); catalyses protein-N(pi)-phosphohistidine--D-glucose phosphotransferase; associated with protein-N(PI)-phosphohistidine-carbohydrate phosphotransferase activity, phosphoenolpyruvate-dependent sugar phosphotransferase system, D-glucose transmembrane transporter activity, D-glucose transmembrane transport. Members occur in Gammaproteobacteria.
