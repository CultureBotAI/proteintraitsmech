identifier: NCBIfam:NF045627
label: "hexaprenyl-diphosphate synthase small subunit"
definition: >-
  hexaprenyl-diphosphate synthase small subunit (hexs-a) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045627 (equivalog); catalyses hexaprenyl-diphosphate synthase [(2E,6E)-farnesyl-diphosphate specific]; associated with menaquinone biosynthetic process, transferase activity, transferring alkyl or aryl (other than methyl) groups, hexaprenyl-diphosphate synthase ((2E,6E)-farnesyl-diphosphate specific) activity. Members occur in Staphylococcaceae.
