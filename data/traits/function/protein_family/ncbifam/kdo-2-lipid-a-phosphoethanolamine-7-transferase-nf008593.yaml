identifier: NCBIfam:NF008593
label: "kdo(2)-lipid A phosphoethanolamine 7''-transferase"
definition: >-
  kdo(2)-lipid A phosphoethanolamine 7''-transferase (eptB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008593 (equivalog); catalyses Kdo2-lipid A phosphoethanolamine 7''-transferase; associated with sulfuric ester hydrolase activity. Members occur in Enterobacterales.
