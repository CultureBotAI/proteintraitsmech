identifier: NCBIfam:TIGR02903
label: "Lon family ATP-dependent protease"
definition: >-
  Lon family ATP-dependent protease (lonC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02903 (equivalog); associated with serine-type endopeptidase activity, proteolysis, ATP hydrolysis activity, asexual sporulation. Members occur in Bacillota.
