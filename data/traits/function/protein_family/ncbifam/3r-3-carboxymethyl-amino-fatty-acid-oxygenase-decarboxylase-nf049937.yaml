label: "(3R)-3-[(carboxymethyl)amino]fatty acid oxygenase/decarboxylase"
definition: >-
  (3R)-3-[(carboxymethyl)amino]fatty acid oxygenase/decarboxylase (scoE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049937 (equivalog); catalyses (R)-3-[(carboxymethyl)amino]fatty acid dioxygenase/decarboxylase; associated with metal ion binding, dioxygenase activity. Members occur in Bacillati.
