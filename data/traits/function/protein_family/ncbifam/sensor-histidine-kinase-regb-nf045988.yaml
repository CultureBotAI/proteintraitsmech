label: "sensor histidine kinase RegB"
definition: >-
  sensor histidine kinase RegB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045988 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, ATP binding. Members occur in Pseudomonadota.
