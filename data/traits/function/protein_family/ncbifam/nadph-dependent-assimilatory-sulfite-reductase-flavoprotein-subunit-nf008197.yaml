identifier: NCBIfam:NF008197
label: "NADPH-dependent assimilatory sulfite reductase flavoprotein subunit"
definition: >-
  NADPH-dependent assimilatory sulfite reductase flavoprotein subunit (cysJ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008197 (equivalog); catalyses assimilatory sulfite reductase (NADPH); associated with sulfate assimilation, sulfite reductase (NADPH) activity, FMN binding, L-cysteine biosynthetic process. Members occur in Pseudomonadota.
