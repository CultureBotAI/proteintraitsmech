identifier: NCBIfam:NF053734
label: "kojibiose hydrolase"
definition: >-
  kojibiose hydrolase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053734 (equivalog); catalyses kojibiose hydrolase; associated with hydrolase activity, hydrolyzing O-glycosyl compounds, carbohydrate metabolic process, glycosyltransferase activity, carbohydrate binding. Members occur in Pseudomonadati.
