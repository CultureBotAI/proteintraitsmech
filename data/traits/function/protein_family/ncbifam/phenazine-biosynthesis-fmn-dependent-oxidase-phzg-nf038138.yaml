identifier: NCBIfam:NF038138
label: "phenazine biosynthesis FMN-dependent oxidase PhzG"
definition: >-
  phenazine biosynthesis FMN-dependent oxidase PhzG — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF038138 (equivalog); catalyses dihydrophenazinedicarboxylate synthase; associated with oxidoreductase activity, acting on diphenols and related substances as donors, oxygen as acceptor.
