definitions:
  - kind: MECHANISTIC
    text: >-
      Catalyses: (1) (1R,6R)-1,4,5,5a,6,9-hexahydrophenazine-1,6-dicarboxylate + O2 = (1R,10aS)-1,4,10,10a-tetrahydrophenazine-1,6-dicarboxylate + H2O2. (2) (1R,10aS)-1,4,10,10a-tetrahydrophenazine-1,6-dicarboxylate + O2 = (5aS)-5,5a-dihydrophenazine-1,6-dicarboxylate + H2O2. (3) (1R,10aS)-1,4,10,10a-tetrahydrophenazine-1-carboxylate + O2 = (10aS)- 10,10a-dihydrophenazine-1-carboxylate + H2O2. (4) (1R)-1,4,5,10-tetrahydrophenazine-1-carboxylate + O2 = (10aS)-10,10a- dihydrophenazine-1-carboxylate + H2O2
