identifier: NCBIfam:TIGR03443
label: "L-aminoadipate-semialdehyde dehydrogenase"
definition: >-
  L-aminoadipate-semialdehyde dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03443 (equivalog); catalyses L-aminoadipate-semialdehyde dehydrogenase; associated with L-aminoadipate-semialdehyde dehydrogenase [NAD(P)+] activity, L-lysine biosynthetic process.
