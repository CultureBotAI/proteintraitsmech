label: "serine palmitoyltransferase"
definition: >-
  serine palmitoyltransferase (spt) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047600 (equivalog); catalyses serine C-palmitoyltransferase; associated with serine C-palmitoyltransferase activity, pyridoxal phosphate binding, ceramide biosynthetic process. Members occur in FCB group.
