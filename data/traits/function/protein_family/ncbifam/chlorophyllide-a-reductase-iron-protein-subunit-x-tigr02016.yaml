identifier: NCBIfam:TIGR02016
label: "chlorophyllide a reductase iron protein subunit X"
definition: >-
  chlorophyllide a reductase iron protein subunit X — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02016 (equivalog); catalyses chlorophyllide a reductase; associated with ATP binding, photosynthesis, oxidoreductase activity, acting on the CH-CH group of donors, NAD or NADP as acceptor, bacteriochlorophyll biosynthetic process.
