identifier: NCBIfam:NF045964
label: "DNA-directed RNA polymerase subunit delta"
definition: >-
  DNA-directed RNA polymerase subunit delta (rpoE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045964 (equivalog); catalyses DNA-directed RNA polymerase; associated with DNA-directed RNA polymerase activity, DNA-templated transcription. Members occur in Bacillati.
