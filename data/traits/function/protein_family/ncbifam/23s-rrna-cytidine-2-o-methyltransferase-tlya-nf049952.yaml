identifier: NCBIfam:NF049952
label: "23S rRNA (cytidine-2'-O)-methyltransferase TlyA"
definition: >-
  23S rRNA (cytidine-2'-O)-methyltransferase TlyA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049952 (equivalog); catalyses 23S rRNA (cytidine(1920)-2'-O)-methyltransferase; associated with rRNA 2'-O-methylation, RNA binding, rRNA methyltransferase activity. Members occur in Campylobacterales.
