identifier: NCBIfam:NF008553
label: "taurine ABC transporter substrate-binding protein"
definition: >-
  taurine ABC transporter substrate-binding protein (tauA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008553 (equivalog); associated with ABC-type taurine transporter transporter activity, periplasmic space, ATP-binding cassette (ABC) transporter complex, transmembrane transport. Members occur in Gammaproteobacteria.
