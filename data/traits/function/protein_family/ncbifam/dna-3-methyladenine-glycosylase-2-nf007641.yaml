identifier: NCBIfam:NF007641
label: "DNA-3-methyladenine glycosylase 2"
definition: >-
  DNA-3-methyladenine glycosylase 2 (alkA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007641 (equivalog); catalyses DNA-3-methyladenine glycosylase II; associated with catalytic activity, DNA repair. Members occur in Enterobacterales.
