identifier: NCBIfam:NF007543
label: "bifunctional tRNA pseudouridine(32) synthase/23S rRNA pseudouridine(746) synthase RluA"
definition: >-
  bifunctional tRNA pseudouridine(32) synthase/23S rRNA pseudouridine(746) synthase RluA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007543 (equivalog); catalyses tRNA pseudouridine(32) synthase, 23S rRNA pseudouridine(746) synthase; associated with pseudouridine synthesis, RNA binding, RNA modification, pseudouridine synthase activity. Members occur in Gammaproteobacteria.
