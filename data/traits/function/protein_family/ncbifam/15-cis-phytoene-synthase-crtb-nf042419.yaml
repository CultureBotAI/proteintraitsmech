label: "15-cis-phytoene synthase CrtB"
definition: >-
  15-cis-phytoene synthase CrtB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF042419 (equivalog); catalyses 15-cis-phytoene synthase; associated with geranylgeranyl diphosphate synthase activity, carotenoid biosynthetic process, 15-cis-phytoene synthase activity. Members occur in Pseudomonadota.
