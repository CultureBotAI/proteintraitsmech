label: "type III secretion system effector HrpZ"
definition: >-
  type III secretion system effector HrpZ — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045569 (equivalog); associated with monoatomic ion transport, symbiont-mediated perturbation of host programmed cell death. Members occur in Pseudomonas.
