identifier: NCBIfam:NF045631
label: "iron-dependent extradiol dioxygenase HsaC"
definition: >-
  iron-dependent extradiol dioxygenase HsaC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045631 (equivalog); catalyses 3,4-dihydroxy-9,10-secoandrosta-1,3,5(10)-triene-9,17-dione 4,5-; associated with catabolic process, lipid catabolic process, 3,4-dihydroxy-9,10-secoandrosta-1,3,5(10)-triene-9,17-dione 4,5-dioxygenase activity. Members occur in Actinomycetes.
