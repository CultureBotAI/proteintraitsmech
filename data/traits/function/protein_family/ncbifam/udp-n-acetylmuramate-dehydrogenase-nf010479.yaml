identifier: NCBIfam:NF010479
label: "UDP-N-acetylmuramate dehydrogenase"
definition: >-
  UDP-N-acetylmuramate dehydrogenase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF010479 (equivalog); catalyses UDP-N-acetylmuramate dehydrogenase; associated with UDP-N-acetylmuramate dehydrogenase activity, flavin adenine dinucleotide binding. Members occur in Campylobacterales.
