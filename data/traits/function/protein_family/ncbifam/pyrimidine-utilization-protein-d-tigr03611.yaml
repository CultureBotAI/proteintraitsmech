identifier: NCBIfam:TIGR03611
label: "pyrimidine utilization protein D"
definition: >-
  pyrimidine utilization protein D (rutD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03611 (equivalog); associated with uracil catabolic process, hydrolase activity, acting on carbon-nitrogen (but not peptide) bonds, in linear amides. Members occur in Pseudomonadota.
