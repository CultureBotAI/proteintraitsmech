label: "succinylglutamate-semialdehyde dehydrogenase"
definition: >-
  succinylglutamate-semialdehyde dehydrogenase (astD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03240 (equivalog); catalyses succinylglutamate-semialdehyde dehydrogenase; associated with L-arginine catabolic process, succinylglutamate-semialdehyde dehydrogenase activity. Members occur in Pseudomonadota.
