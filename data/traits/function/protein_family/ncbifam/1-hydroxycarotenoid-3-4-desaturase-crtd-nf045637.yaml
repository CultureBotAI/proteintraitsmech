identifier: NCBIfam:NF045637
label: "1-hydroxycarotenoid 3,4-desaturase CrtD"
definition: >-
  1-hydroxycarotenoid 3,4-desaturase CrtD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045637 (equivalog); catalyses 1-hydroxycarotenoid 3,4-desaturase; associated with carotenoid biosynthetic process, oxidoreductase activity, acting on the CH-CH group of donors. Members occur in Pseudomonadati.
