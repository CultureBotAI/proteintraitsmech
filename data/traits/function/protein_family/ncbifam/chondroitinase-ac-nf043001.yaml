identifier: NCBIfam:NF043001
label: chondroitinase-AC
definition: >-
  chondroitinase-AC (cslA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043001 (equivalog); catalyses chondroitin AC lyase; associated with carbohydrate metabolic process, chondroitin AC lyase activity. Members occur in Bacteroidota.
