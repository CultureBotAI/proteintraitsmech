identifier: NCBIfam:NF033866
label: "CDD family class D beta-lactamase"
definition: >-
  CDD family class D beta-lactamase (blaCDD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF033866 (exception); catalyses beta-lactamase; associated with penicillin binding, beta-lactamase activity. Members occur in Clostridioides difficile.
