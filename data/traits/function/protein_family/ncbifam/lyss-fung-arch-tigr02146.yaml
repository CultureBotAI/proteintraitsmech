definition: >-
  homocitrate synthase (lysS) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02146 (equivalog); catalyses homocitrate synthase; associated with homocitrate synthase activity, L-lysine biosynthetic process, carboxylic acid metabolic process, acyltransferase activity, acyl groups converted into alkyl on transfer.
