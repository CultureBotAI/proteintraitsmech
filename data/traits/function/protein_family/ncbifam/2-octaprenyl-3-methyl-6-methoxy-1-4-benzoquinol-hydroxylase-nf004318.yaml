identifier: NCBIfam:NF004318
label: "2-octaprenyl-3-methyl-6-methoxy-1,4-benzoquinol hydroxylase"
definition: >-
  2-octaprenyl-3-methyl-6-methoxy-1,4-benzoquinol hydroxylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004318 (equivalog); associated with ubiquinone biosynthetic process, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, NAD(P)H as one donor, and incorporation of one atom of oxygen, FAD binding. Members occur in Pseudomonadota.
