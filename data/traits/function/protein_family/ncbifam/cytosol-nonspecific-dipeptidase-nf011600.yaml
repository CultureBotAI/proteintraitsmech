label: "cytosol nonspecific dipeptidase"
definition: >-
  cytosol nonspecific dipeptidase (pepD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF011600 (equivalog); catalyses cytosol non-specific dipeptidase; associated with proteolysis, hydrolase activity. Members occur in Enterobacteriaceae.
