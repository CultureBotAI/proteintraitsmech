identifier: NCBIfam:TIGR02310
label: "4-hydroxyphenylacetate 3-monooxygenase, oxygenase component"
definition: >-
  4-hydroxyphenylacetate 3-monooxygenase, oxygenase component (hpaB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02310 (equivalog); catalyses 4-hydroxyphenylacetate 3-monooxygenase; associated with phenylacetate catabolic process, oxidoreductase activity, acting on paired donors, with incorporation or reduction of molecular oxygen, reduced flavin or flavoprotein as one donor, and incorporation of one atom of oxygen, flavin adenine dinucleotide binding. Members occur in Gammaproteobacteria.
