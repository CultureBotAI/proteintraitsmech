label: "chemotaxis protein CheA"
definition: >-
  chemotaxis protein CheA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041336 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, ATP binding, chemotaxis. Members occur in Halobacteriales.
