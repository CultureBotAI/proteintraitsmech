identifier: NCBIfam:NF008485
label: "dihydroxyacetone kinase operon transcriptional regulator DhaR"
definition: >-
  dihydroxyacetone kinase operon transcriptional regulator DhaR — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008485 (equivalog); associated with ATP binding, regulation of DNA-templated transcription, transcription factor binding, sequence-specific DNA binding. Members occur in Gammaproteobacteria.
