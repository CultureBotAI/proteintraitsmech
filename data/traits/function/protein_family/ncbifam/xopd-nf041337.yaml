identifier: NCBIfam:NF041337
label: "Ulp1 family type III secretion system effector isopeptidase XopD"
definition: >-
  Ulp1 family type III secretion system effector isopeptidase XopD — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041337 (subfamily); associated with proteolysis, deNEDDylase activity, protein secretion by the type III secretion system. Members occur in Pseudomonadota.
