identifier: NCBIfam:NF048012
label: "sulfoquinovose isomerase"
definition: >-
  sulfoquinovose isomerase (sftI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF048012 (equivalog); catalyses sulfoquinovose isomerase; associated with fucose metabolic process, L-fucose isomerase activity. Members occur in Caryophanales.
