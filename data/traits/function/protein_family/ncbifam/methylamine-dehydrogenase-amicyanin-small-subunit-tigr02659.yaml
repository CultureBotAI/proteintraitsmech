identifier: NCBIfam:TIGR02659
label: "methylamine dehydrogenase (amicyanin) small subunit"
definition: >-
  methylamine dehydrogenase (amicyanin) small subunit (mauA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02659 (equivalog); catalyses methylamine dehydrogenase (amicyanin); associated with outer membrane-bounded periplasmic space, methylamine dehydrogenase (amicyanin) activity. Members occur in Pseudomonadota.
