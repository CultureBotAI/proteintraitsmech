identifier: NCBIfam:NF008051
label: "maltodextrin glucosidase"
definition: >-
  maltodextrin glucosidase (malZ) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008051 (equivalog); catalyses alpha-glucosidase; associated with alpha-1,4-glucosidase activity, carbohydrate metabolic process. Members occur in Gammaproteobacteria.
