label: "adenine-specific DNA-methyltransferase"
definition: >-
  adenine-specific DNA-methyltransferase (dam) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008152 (equivalog); catalyses site-specific DNA-methyltransferase (adenine-specific); associated with nucleic acid binding, site-specific DNA-methyltransferase (adenine-specific) activity. Members occur in Enterobacterales.
