identifier: NCBIfam:NF041159
label: "L-rhamnose 1-dehydrogenase"
definition: >-
  L-rhamnose 1-dehydrogenase (rhaD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041159 (equivalog); catalyses L-rhamnose 1-dehydrogenase (NADP(+)); associated with oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor, rhamnose catabolic process. Members occur in Thermoplasmatales.
