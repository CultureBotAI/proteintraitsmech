  K(+)-transporting ATPase subunit F (kdpF) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR02115 (equivalog); catalyses P-type K(+) transporter; associated with potassium ion transport, potassium ion-transporting ATPase complex, regulation of ATP-dependent activity.
