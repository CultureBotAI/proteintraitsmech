identifier: NCBIfam:NF058606
label: "glycine betaine monooxygenase reductase subunit"
definition: >-
  glycine betaine monooxygenase reductase subunit (gbcB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF058606 (equivalog); catalyses glycine betaine monooxygenase; associated with monooxygenase activity, metal ion binding, 2 iron, 2 sulfur cluster binding. Members occur in Gammaproteobacteria.
