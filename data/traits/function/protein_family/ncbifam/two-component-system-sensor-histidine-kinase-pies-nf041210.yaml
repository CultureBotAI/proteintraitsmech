identifier: NCBIfam:NF041210
label: "two component system sensor histidine kinase PieS"
definition: >-
  two component system sensor histidine kinase PieS — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF041210 (equivalog); associated with phosphorelay sensor kinase activity, signal transduction, phosphorylation, transferase activity, transferring phosphorus-containing groups. Members occur in Listeria.
