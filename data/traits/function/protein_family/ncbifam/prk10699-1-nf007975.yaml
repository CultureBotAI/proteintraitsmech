label: "phosphatidylglycerophosphatase B"
definition: >-
  phosphatidylglycerophosphatase B (pgpB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007975 (equivalog); catalyses phosphatidylglycerophosphatase; associated with phosphatidylserine decarboxylase activity, phospholipid biosynthetic process. Members occur in Gammaproteobacteria.
