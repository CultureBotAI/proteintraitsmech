identifier: NCBIfam:NF008232
label: "maltose ABC transporter permease MalF"
definition: >-
  maltose ABC transporter permease MalF — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008232 (equivalog); catalyses ABC-type maltose transporter; associated with ATP-binding cassette (ABC) transporter complex, transmembrane transport. Members occur in Gammaproteobacteria.
