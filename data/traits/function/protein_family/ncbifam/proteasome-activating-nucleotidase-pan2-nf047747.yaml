label: "proteasome-activating nucleotidase Pan2"
definition: >-
  proteasome-activating nucleotidase Pan2 — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047747 (equivalog); associated with proteasomal protein catabolic process, ATP hydrolysis activity, proteasome-activating nucleotidase complex. Members occur in Halobacteriales.
