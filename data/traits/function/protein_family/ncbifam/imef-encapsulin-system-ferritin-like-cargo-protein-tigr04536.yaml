identifier: NCBIfam:TIGR04536
label: "IMEF encapsulin system ferritin-like cargo protein"
definition: >-
  IMEF encapsulin system ferritin-like cargo protein — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR04536 (equivalog); associated with iron ion sequestering activity, encapsulin nanocompartment. Members occur in Caryophanales.
