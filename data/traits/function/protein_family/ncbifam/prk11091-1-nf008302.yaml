label: "aerobic respiration two-component sensor histidine kinase ArcB"
definition: >-
  aerobic respiration two-component sensor histidine kinase ArcB — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008302 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, phosphorelay signal transduction system, regulation of DNA-templated transcription, membrane. Members occur in Gammaproteobacteria.
