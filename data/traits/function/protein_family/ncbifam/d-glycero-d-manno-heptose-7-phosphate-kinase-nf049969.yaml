identifier: NCBIfam:NF049969
label: "D-glycero-D-manno-heptose 7-phosphate kinase"
definition: >-
  D-glycero-D-manno-heptose 7-phosphate kinase (hddA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049969 (equivalog); catalyses D-glycero-alpha-D-manno-heptose-7-phosphate kinase; associated with galactokinase activity, ATP binding, galactose metabolic process, D-glycero-D-manno-heptose 7-phosphate metabolic process. Members occur in Campylobacterales.
