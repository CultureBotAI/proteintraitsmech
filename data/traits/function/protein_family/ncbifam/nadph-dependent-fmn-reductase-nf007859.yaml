identifier: NCBIfam:NF007859
label: "NADPH-dependent FMN reductase"
definition: >-
  NADPH-dependent FMN reductase (ssuE) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF007859 (equivalog); catalyses FMN reductase (NADPH); associated with FMN reductase [NAD(P)H] activity, alkanesulfonate catabolic process. Members occur in Gammaproteobacteria.
