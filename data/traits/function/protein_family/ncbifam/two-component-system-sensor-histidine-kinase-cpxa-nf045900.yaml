identifier: NCBIfam:NF045900
label: "two-component system sensor histidine kinase CpxA"
definition: >-
  two-component system sensor histidine kinase CpxA — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045900 (equivalog); catalyses histidine kinase; associated with phosphorelay sensor kinase activity, signal transduction, phosphorylation, transferase activity, transferring phosphorus-containing groups. Members occur in Legionellaceae.
