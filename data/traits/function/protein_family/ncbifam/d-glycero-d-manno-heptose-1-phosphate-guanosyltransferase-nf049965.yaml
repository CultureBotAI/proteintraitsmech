identifier: NCBIfam:NF049965
label: "D-glycero-D-manno-heptose 1-phosphate guanosyltransferase"
definition: >-
  D-glycero-D-manno-heptose 1-phosphate guanosyltransferase (hddC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF049965 (equivalog); catalyses D-glycero-alpha-D-manno-heptose 1-phosphate guanylyltransferase; associated with GTP binding, GDP-mannose biosynthetic process, capsule polysaccharide biosynthetic process, guanylyltransferase activity. Members occur in Campylobacterales.
