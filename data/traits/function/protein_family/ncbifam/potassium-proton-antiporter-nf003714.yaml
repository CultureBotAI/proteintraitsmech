  potassium/proton antiporter — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003714 (equivalog); associated with potassium ion transport, cell volume homeostasis, membrane, metal cation:proton antiporter activity. Members occur in Pseudomonadati.
