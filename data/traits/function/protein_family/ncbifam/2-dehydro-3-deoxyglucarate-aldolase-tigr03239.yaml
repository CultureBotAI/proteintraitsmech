label: "2-dehydro-3-deoxyglucarate aldolase"
definition: >-
  2-dehydro-3-deoxyglucarate aldolase (garL) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR03239 (equivalog); catalyses 2-dehydro-3-deoxyglucarate aldolase; associated with 2-dehydro-3-deoxyglucarate aldolase activity, D-glucarate catabolic process. Members occur in Pseudomonadota.
