label: "bifunctional 3-(3-hydroxy-phenyl)propionate/3-hydroxycinnamic acid hydroxylase"
definition: >-
  bifunctional 3-(3-hydroxy-phenyl)propionate/3-hydroxycinnamic acid hydroxylase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004827 (equivalog); catalyses 3-(3-hydroxy-phenyl)propanoic acid hydroxylase; associated with 3-(3-hydroxyphenyl)propionate hydroxylase activity, 3-(3-hydroxy)phenylpropionate catabolic process. Members occur in Enterobacteriaceae.
