identifier: NCBIfam:NF003749
label: "Na(+)-translocating NADH-quinone reductase subunit C"
definition: >-
  Na(+)-translocating NADH-quinone reductase subunit C — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF003749 (equivalog); associated with sodium ion transport, FMN binding, membrane, oxidoreductase activity, acting on NAD(P)H, quinone or similar compound as acceptor. Members occur in Pseudomonadati.
