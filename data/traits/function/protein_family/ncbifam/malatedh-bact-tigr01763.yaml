identifier: NCBIfam:TIGR01763
label: "malate dehydrogenase"
definition: >-
  malate dehydrogenase (mdh) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01763 (equivalog); catalyses (S)-malate dehydrogenase (NAD(+), oxaloacetate-forming); associated with carbohydrate metabolic process, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor.
