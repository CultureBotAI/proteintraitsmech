label: "Dot/Icm T4SS effector alpha/beta hydrolase"
definition: >-
  Dot/Icm T4SS effector alpha/beta hydrolase (sdbB) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF045526 (equivalog); associated with protein secretion by the type IV secretion system. Members occur in Legionella pneumophila.
