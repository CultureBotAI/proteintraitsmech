identifier: NCBIfam:NF053748
label: "bifunctional hydrogenobyrinic acid a,c-diamide synthase/histidinol phosphate aminotransferase CobBC"
definition: >-
  bifunctional hydrogenobyrinic acid a,c-diamide synthase/histidinol phosphate aminotransferase CobBC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF053748 (exception); catalyses histidinol-phosphate transaminase, hydrogenobyrinic acid a,c-diamide synthase (glutamine-hydrolyzing); associated with L-histidinol-phosphate:2-oxoglutarate transaminase activity, cobalamin biosynthetic process, pyridoxal phosphate binding, hydrogenobyrinic acid a,c-diamide synthase (glutamine-hydrolysing) activity. Members occur in Actinomycetes.
