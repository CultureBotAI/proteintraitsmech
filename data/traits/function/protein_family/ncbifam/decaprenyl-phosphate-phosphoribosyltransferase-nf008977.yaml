identifier: NCBIfam:NF008977
label: "decaprenyl-phosphate phosphoribosyltransferase"
definition: >-
  decaprenyl-phosphate phosphoribosyltransferase — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008977 (equivalog); catalyses decaprenyl-phosphate phosphoribosyltransferase; associated with transferase activity, transferring alkyl or aryl (other than methyl) groups.
