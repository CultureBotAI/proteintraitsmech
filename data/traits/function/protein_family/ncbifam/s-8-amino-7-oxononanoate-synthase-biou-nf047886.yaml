identifier: NCBIfam:NF047886
label: "(S)-8-amino-7-oxononanoate synthase BioU"
definition: >-
  (S)-8-amino-7-oxononanoate synthase BioU — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF047886 (equivalog); catalyses 8-amino-7-oxononanoate carboxylating dehydrogenase; associated with transaminase activity, biotin biosynthetic process, oxidoreductase activity, NADP binding. Members occur in Cyanobacteriota.
