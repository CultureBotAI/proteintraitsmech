identifier: NCBIfam:NF004422
label: "DNA polymerase II"
definition: >-
  DNA polymerase II — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF004422 (equivalog); catalyses DNA-directed DNA polymerase; associated with nucleotide binding, nucleic acid binding, DNA-directed DNA polymerase activity. Members occur in Pseudomonadota.
