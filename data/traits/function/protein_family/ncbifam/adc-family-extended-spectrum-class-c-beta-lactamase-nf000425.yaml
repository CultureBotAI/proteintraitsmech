identifier: NCBIfam:NF000425
label: "ADC family extended-spectrum class C beta-lactamase"
definition: >-
  ADC family extended-spectrum class C beta-lactamase (blaADC) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000425 (exception); catalyses beta-lactamase; associated with beta-lactamase activity, outer membrane-bounded periplasmic space. Members occur in Acinetobacter.
