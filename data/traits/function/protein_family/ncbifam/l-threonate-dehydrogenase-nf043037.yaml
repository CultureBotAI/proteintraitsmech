identifier: NCBIfam:NF043037
label: "L-threonate dehydrogenase"
definition: >-
  L-threonate dehydrogenase (ltnD) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF043037 (equivalog); catalyses L-threonate 2-dehydrogenase; associated with carbohydrate metabolic process, oxidoreductase activity, acting on the CH-OH group of donors, NAD or NADP as acceptor.
