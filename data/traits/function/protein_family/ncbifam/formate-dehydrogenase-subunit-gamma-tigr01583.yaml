identifier: NCBIfam:TIGR01583
label: "formate dehydrogenase subunit gamma"
definition: >-
  formate dehydrogenase subunit gamma — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM TIGR01583 (equivalog); catalyses formate dehydrogenase; associated with formate dehydrogenase (NAD+) activity, electron transfer activity, anaerobic respiration, formate dehydrogenase complex. Members occur in Pseudomonadati.
