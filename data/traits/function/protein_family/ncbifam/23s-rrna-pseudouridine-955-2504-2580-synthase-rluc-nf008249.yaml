definition: >-
  23S rRNA pseudouridine(955/2504/2580) synthase RluC — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF008249 (equivalog); catalyses 23S rRNA pseudouridine(955/2504/2580) synthase; associated with pseudouridine synthesis, RNA binding, pseudouridine synthase activity. Members occur in Pseudomonadota.
