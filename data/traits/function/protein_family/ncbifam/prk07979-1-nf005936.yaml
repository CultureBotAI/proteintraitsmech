identifier: NCBIfam:NF005936
label: "acetolactate synthase 3 large subunit"
definition: >-
  acetolactate synthase 3 large subunit (ilvI) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF005936 (equivalog); catalyses acetolactate synthase; associated with magnesium ion binding, acetolactate synthase activity, branched-chain amino acid biosynthetic process, thiamine pyrophosphate binding. Members occur in Gammaproteobacteria.
