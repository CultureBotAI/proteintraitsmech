label: "NAD(P)H-dependent glycerol-3-phosphate dehydrogenase"
definition: >-
  NAD(P)H-dependent glycerol-3-phosphate dehydrogenase (gpsA) — a functionally conserved protein family grouped by the NCBIfam full-length profile-HMM NF000939 (equivalog); catalyses glycerol-3-phosphate dehydrogenase [NAD(P)(+)]; associated with glycerol-3-phosphate metabolic process, glycerol-3-phosphate dehydrogenase [NAD(P)+] activity. Members occur in Pseudomonadota.
