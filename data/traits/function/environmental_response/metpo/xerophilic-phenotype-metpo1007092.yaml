identifier: METPO:1007092
label: "xerophilic phenotype"
definition: >-
  A phenotype characterized by a microbe that thrives in low water-activity environments (typically aw < 0.85), where the limiting factor is water activity (aw) rather than solute concentration; distinct from halophily and osmotic tolerance.
definition_source: "METPO (2026-06-12)"
