identifier: UniProtKB-KW:KW-0046
label: "Antibiotic resistance"
definition: >-
  Protein that confers, on bacteria, the ability to withstand antibiotics. The resistance is often due either to mutations that prevent antibiotic binding to the protein or to amplification of the gene encoding the protein.
