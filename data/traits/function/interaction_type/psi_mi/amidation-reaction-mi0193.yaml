identifier: MI:0193
label: "amidation reaction"
definition: >-
  Irreversible reaction that can affect A,R,N,D,C,Q,E,G,H,I,L,K,M,F,P,S,T,W,Y or V residues. It involves the addition of an amide group from a glycine to the target residue.
