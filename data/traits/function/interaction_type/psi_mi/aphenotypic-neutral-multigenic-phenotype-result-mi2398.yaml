identifier: MI:2398
label: "aphenotypic neutral multigenic phenotype result"
definition: >-
  A genetic aphenotypic phenotype result (both genetic perturbations result in a wild type (or control) phenotype) in which case the double genetic perturbation also results in the wild type (or control) phenotype, thus resulting in the expected phenotype. With respect to any single quantifiable phenotype, this may be expressed as an inequality as:\nwt = a = b = ab [E = wt]\nwhere 'a' and 'b' are the observed phenotype values of the individual perturbations, 'ab' is the observed phenotype value of the double perturbation, 'E' is the expected phenotype value of the double perturbation, and 'wt' is the wild type phenotype value.
definition_source: PSI-MI
trait_axis: FUNCTION
trait_category: FUNC_INTERACTION_TYPE
term_kind: CLASS
mapping_status: SEEDED
