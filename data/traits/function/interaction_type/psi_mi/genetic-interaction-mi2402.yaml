identifier: MI:2402
label: "genetic interaction"
definition: >-
  A multigenic phenotype result in which (1) the phenotype of a single genetic perturbation has been modified by the introduction of one or more additional genetic perturbations AND/OR (2) an effect in which two genetic perturbations, when combined, result in a phenotype that does not appear to be merely explained by the superimposition or addition of effects of the original perturbations.\nab (not=) E
definition_source: PSI-MI
trait_axis: FUNCTION
trait_category: FUNC_INTERACTION_TYPE
term_kind: CLASS
mapping_status: SEEDED
