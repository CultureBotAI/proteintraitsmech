identifier: UniProtKB-KW:KW-0670
label: Pyruvate
definition: >-
  Protein which uses at least one pyruvate as cofactor (pyruvoyl) or substrate, or protein required for pyruvate synthesis or degradation. Pyruvate is an intermediate compound in the metabolism of carbohydrates, proteins and fats.
