identifier: UniProtKB-KW:KW-0157
label: Chromophore
definition: >-
  Protein which interacts with one or more chromophores. A chromophore absorbs and transmits light energy. Originally it was used for visibly colored molecules, but it applies also to UV- and IR-absorbing molecules.
