identifier: UniProtKB-KW:KW-0430
label: Lectin
definition: >-
  Protein which specifically binds carbohydrates. Lectins are obtained particularly from seeds of leguminous plants but also from other plant and animal sources. They contain binding sites for specific mono-and oligosaccharides. They agglutinate cells by binding to specific sugar residues in membrane glycoproteins.
