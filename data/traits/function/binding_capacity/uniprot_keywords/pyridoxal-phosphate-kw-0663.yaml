identifier: UniProtKB-KW:KW-0663
label: "Pyridoxal phosphate"
definition: >-
  Protein which uses at least one pyridoxal phosphate as cofactor or protein required for its synthesis. This coenzyme, derived from vitamin B6, is important in amino acid metabolism, e.g., in reactions involving transamination, decarboxylation, racemization, elimination or replacement.
