identifier: UniProtKB-KW:KW-0288
label: FMN
definition: >-
  Protein involved in flavin adenine mononucleotide synthesis or protein which contains at least one FMN as prosthetic group/cofactor (flavoproteins) or cosubstrate, such as many oxidation-reduction enzymes. FMN is an electron carrier molecule that functions as a hydrogen acceptor. The generic term "flavin" derives from the Latin word flavius ("yellow") because of the brilliant yellow color they exhibit as solids and in neutral aqueous solutions.
