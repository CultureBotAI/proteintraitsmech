identifier: UniProtKB-KW:KW-0114
label: cAMP
definition: >-
  Protein whose function is cAMP-dependent or which catalyzes its hydrolysis. cAMP is the abbreviation for cyclic AMP, adenosine 3',5'- cyclic monophosphate, the first second messenger hormone signaling system to be characterised. It is generated from ATP by the action of adenyl cyclase that is coupled to hormone receptors by G proteins. cAMP activates a specific protein kinase and is inactivated by phosphodiesterase action giving 5'AMP.
