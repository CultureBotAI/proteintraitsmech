identifier: UniProtKB-KW:KW-0067
label: ATP-binding
definition: >-
  Protein which binds adenosine 5'-triphosphate (ATP), a ribonucleotide adenosine (a purine base adenine linked to the sugar D-ribofuranose) that carries three phosphate groups esterified to the sugar moiety. It is the cell's source for energy and phosphate.
