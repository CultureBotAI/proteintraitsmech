identifier: UniProtKB-KW:KW-0092
label: Biotin
definition: >-
  Protein which contains at least one biotin as prosthetic group or cofactor (e.g. some carboxylases and decarboxylases, and biotin carboxyl carrier protein) or which binds biotin, like avidin. Biotin is a water-soluble vitamin (member of the B complex vitamins) essential for fatty acid biosynthesis, catabolism, and it acts as a growth factor for many cells.
