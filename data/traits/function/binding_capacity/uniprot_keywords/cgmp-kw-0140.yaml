identifier: UniProtKB-KW:KW-0140
label: cGMP
definition: >-
  Protein whose function is cGMP-dependent or which catalyzes its hydrolysis. cGMP is the abbreviation for cyclic GMP, guanosine 3',5'- cyclic monophosphate. It acts as a second messenger.
