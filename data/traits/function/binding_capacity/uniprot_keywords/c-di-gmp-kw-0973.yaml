identifier: UniProtKB-KW:KW-0973
label: c-di-GMP
definition: >-
  Protein whose function is c-di-GMP-dependent or which catalyzes its hydrolysis. c-di-GMP is the abbreviation for cyclic di-GMP, bis-(3'- 5') cyclic diguanylic acid. It acts as a bacterial second messenger.
