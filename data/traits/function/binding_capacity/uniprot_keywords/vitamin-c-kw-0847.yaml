identifier: UniProtKB-KW:KW-0847
label: "Vitamin C"
definition: >-
  Protein which contains at least one vitamin C as cofactor. This water- soluble vitamin is a reducing agent in a number of reactions. As cofactor, it is required for the hydroxylation of proline residues in collagen, and in many other metabolic reactions such as in the catabolism of tyrosine and the synthesis of bile acids. Deficiency in vitamin C leads to the disease scurvy.
