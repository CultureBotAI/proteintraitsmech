identifier: UniProtKB-KW:KW-0618
label: Plastoquinone
definition: >-
  Protein which interacts with plastoquinone, a substituted quinone called plastoquinone because it appeared concentrated in the chloroplasts of higher plants. Plastoquinone transfers electrons from the photosystem II reaction center to the cytochrome bf complex and carries protons across the photosynthetic membrane.
