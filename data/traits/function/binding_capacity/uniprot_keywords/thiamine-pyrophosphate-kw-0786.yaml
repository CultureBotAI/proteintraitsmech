identifier: UniProtKB-KW:KW-0786
label: "Thiamine pyrophosphate"
definition: >-
  Protein which contains at least one thiamine pyrophosphate, the active form of vitamin B1 (thiamine). It is a required coenzyme for the pyruvate decarboxylase, pyruvate dehydrogenase and ketoglutarate dehydrogenase reactions.
