identifier: UniProtKB-KW:KW-0285
label: Flavoprotein
definition: >-
  Enzymes which contain one or more flavin nucleotides (FAD or FMN) as redox cofactors or cosubstrates. Flavoproteins are involved, for example, in the oxidative degradation of pyruvate, fatty acids and amino acids, and in the process of electron transport.
