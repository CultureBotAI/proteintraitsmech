identifier: UniProtKB-KW:KW-0274
label: FAD
definition: >-
  Protein involved in flavin adenine dinucleotide synthesis or protein which contains at least one FAD as prosthetic group, cofactor (flavoprotein) or cosubstrate such as many oxidation-reduction enzymes. FAD is an electron carrier molecule that functions as a hydrogen acceptor. The generic term "flavin" derives from the Latin word flavius ("yellow") because of the brilliant yellow color they exhibit as solids and in neutral aqueous solutions.
