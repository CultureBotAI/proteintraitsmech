identifier: UniProtKB-KW:KW-0148
label: Chlorophyll
definition: >-
  Protein which interacts with chlorophyll, the major light-absorbing pigment in most oygenic green organisms. Higher plants contain chlorophyll a and chlorophyll b which are magnesium-porphyrin complexes esterified to a long hydrophobic terpenoid side chain (the alcohol phytol).
