identifier: UniProtKB-KW:KW-0683
label: Retinol-binding
definition: >-
  Protein which binds retinol, one of the active form of Vitamin A, a fat-soluble vitamin derived from carotenes. It is a precursor of retinal, the light-absorbing group of visual pigments. Vitamin A is also required for growth.
