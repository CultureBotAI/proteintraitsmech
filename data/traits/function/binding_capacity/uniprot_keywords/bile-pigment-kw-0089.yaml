identifier: UniProtKB-KW:KW-0089
label: "Bile pigment"
definition: >-
  Protein binding covalently at least one linear tetrapyrrole chromophore, e.g. bilirubin, biliverdin, bilifuscin, biliprasin, choleprasin, bilihumin, and bilicyanin. Bile pigments are produced by breaking down protoporphyrin IX derived from hemoglobin and other heme proteins.
