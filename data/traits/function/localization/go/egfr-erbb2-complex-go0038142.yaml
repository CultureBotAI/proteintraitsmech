identifier: GO:0038142
label: "EGFR:ERBB2 complex"
definition: >-
  A heterodimeric complex between the tyrosine kinase receptor ERBB2 and a ligand-activated epidermal growth factor receptor (EGFR/ERBB1). ERBB2, which does not bind any known ligand, is activated through formation of a heterodimer with another ligand-activated ERBB family member such as EGFR.
