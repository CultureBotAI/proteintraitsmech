identifier: GO:0140365
label: "RNP body"
definition: >-
  A ribonucleoprotein granule located in the cytoplasm of bacteria, minimally containing the RNase E protein and RNA molecules. Bacterial RNP-bodies are similar to eukaryotic P-bodies and stress granules.
