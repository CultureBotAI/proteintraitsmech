identifier: GO:0033095
label: "aleurone grain"
definition: >-
  A membrane-bounded storage granule found in cells of the aleurone layer in plants; contains either a protein matrix, protein-carbohydrate bodies and/or globoids. Aleurone grains are formed by the vacuole, rough endoplasmic reticulum and dictyosomes.
