identifier: GO:0070418
label: "DNA-dependent protein kinase complex"
definition: >-
  A protein complex that is involved in the repair of DNA double-strand breaks and, in mammals, V(D)J recombination events. It consists of the DNA-dependent protein kinase catalytic subunit (DNA-PKcs) and the DNA end-binding heterodimer Ku.
