identifier: GO:0070622
label: "UDP-N-acetylglucosamine-lysosomal-enzyme N-acetylglucosaminephosphotransferase complex"
definition: >-
  A protein complex that possesses UDP-N-acetylglucosamine-lysosomal-enzyme N-acetylglucosaminephosphotransferase activity; the bovine complex contains disulfide-linked homodimers of 166- and 51-kDa subunits and two identical, noncovalently associated 56-kDa subunits.
