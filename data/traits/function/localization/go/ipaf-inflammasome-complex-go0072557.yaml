identifier: GO:0072557
label: "IPAF inflammasome complex"
definition: >-
  An inflammasome complex that consists of three components, IPAF, NAIP and caspase-1, and includes among its functions the sensing of flagellin derived from Legionella pneumophila, Salmonella typhimurium, Pseudomonas aeruginosa and Shigella flexneri.
