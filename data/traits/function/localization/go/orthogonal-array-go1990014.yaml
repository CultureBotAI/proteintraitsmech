identifier: GO:1990014
label: "orthogonal array"
definition: >-
  Square array of closely spaced intramembrane particles, 4-6 nm in size, that form supramolecular aggregates found in the plasma membrane of astrocytes, skeletal muscle and epithelial cells. They have been shown to contain aquaporins (water channels).
