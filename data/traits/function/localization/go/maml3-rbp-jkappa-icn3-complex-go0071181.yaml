identifier: GO:0071181
label: "MAML3-RBP-Jkappa-ICN3 complex"
definition: >-
  A protein complex that consists of the intracellular domain of Notch3 (ICN3), the DNA-binding transcription factor RBP-Jkappa, and the transcriptional coactivator Mastermind-like-3 (MAML3); the complex is involved in transcriptional activation in response to Notch-mediated signaling.
