identifier: GO:0097561
label: "right caudal flagellum"
definition: >-
  A cilium (also called flagellum) found in Giardia species (trophozoite stage). It is nucleated by the right caudal basal body, extending cytoplasmically and exiting at the posterior end of the cell body.
