identifier: GO:1990230
label: "iron-sulfur cluster transfer complex"
definition: >-
  A protein complex capable of catalyzing the transfer of an iron-sulfur (Fe-S) cluster from one compound (donor) to another (acceptor), which may be a target protein or another Fe-S assembly complex. In humans, it consists of HSPA9, HSCB, GLRX5, ABCB7 and GFER.
