identifier: GO:0110142
label: "ubiquinone biosynthesis complex"
definition: >-
  A protein complex composed of enzymes and accessory factors of the ubiquinone (CoQ) biosynthesis pathway. In E. coli, the complex is composed of seven proteins: UbiE, F, G, H, I, J and K. In eukaryotes, the complex is located on the matrix face of the inner mitochondrial membrane and includes COQ3, COQ4, COQ5, COQ6, COQ7, COQ9.
