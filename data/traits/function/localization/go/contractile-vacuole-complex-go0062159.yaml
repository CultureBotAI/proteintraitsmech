identifier: GO:0062159
label: "contractile vacuole complex"
definition: >-
  A non-membrane-bounded organelle of eukaryotic cells, especially Protozoa, that fills with water from the cytoplasm and then discharges this externally. One of its functions is osmoregulatory.
