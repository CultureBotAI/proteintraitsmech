identifier: GO:0160064
label: "multi-pass translocon complex"
definition: >-
  A protein complex that mediates the insertion of multi-pass transmembrane proteins into endoplasmic reticulum (ER) membrane. Substrates enter via the lateral gate of the Sec61 translocon. The complex comprises the GEL subcomplex (composed of RAB5IF/OPTI and TMCO1), the BOS subcomplex (composed of NCLN/Nicalin, NOMO and TMEM147) and the PAT subcomplex (composed of WDR83OS/Asterix and CCDC47).
