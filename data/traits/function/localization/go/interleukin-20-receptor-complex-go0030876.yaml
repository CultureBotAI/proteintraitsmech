identifier: GO:0030876
label: "interleukin-20 receptor complex"
definition: >-
  A protein complex composed of an alpha and a beta receptor subunit and an interleukin ligand. In human, Interleukin-19, -20 and -24 bind IL20RA/IL20RB receptor subunits and Interleukin-20 and -24 bind IL22RA1/IL20RB receptor subunits.
