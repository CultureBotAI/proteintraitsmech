identifier: GO:0151001
label: tuft
definition: >-
  A dense cluster of elongated, thick microvilli on the apical surface of tuft cells in epithelial tissues, such as the intestine and respiratory tract. The apical tuft extends further into the lumen than typical microvilli, featuring larger, more compact projections with unique actin cores that penetrate deep into the cytoplasm, often reaching the perinuclear region. This distinctive structure, rich in microfilaments and microtubules, supports the chemosensory functions of the cell.
