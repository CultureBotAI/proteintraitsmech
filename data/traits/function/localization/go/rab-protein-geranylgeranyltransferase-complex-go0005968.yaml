identifier: GO:0005968
label: "Rab-protein geranylgeranyltransferase complex"
definition: >-
  An protein-containing complex which catalyzes of the transfer of a geranyl-geranyl group from geranylgeranyl pyrophosphate to a Rab protein. In mammals it is composed of an alpha and a beta subunit, and associates with an accessory protein Rep (Rab escort protein).
