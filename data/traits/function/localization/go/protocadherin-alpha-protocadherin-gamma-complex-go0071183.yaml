identifier: GO:0071183
label: "protocadherin-alpha-protocadherin-gamma complex"
definition: >-
  A protein complex that contains two cell adhesion molecules, a protocadherin-alpha and a protocadherin-gamma, and is involved in the regulation of protein localization to the plasma membrane.
