identifier: GO:0070619
label: "Shc-Grb2-Sos complex"
definition: >-
  A protein complex that contains Grb2, the adaptor protein Shc and the guanine nucleotide exchange factor Sos (or an ortholog thereof, such as mSos1), and is involved in linking EGFR activation to the p21-Ras pathway.
