identifier: GO:0030998
label: "linear element"
definition: >-
  A proteinaceous scaffold associated with fission yeast chromosomes during meiotic prophase. Linear elements consist of a protein complex, LinE, with four main structural components (Rec10, Rec25, Rec27, and Mug20 in S. pombe) associated with chromatin. The resulting structure is related to but not equivalent to the synaptonemal complex.
