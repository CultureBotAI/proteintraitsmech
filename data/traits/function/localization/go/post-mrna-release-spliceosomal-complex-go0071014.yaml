identifier: GO:0071014
label: "post-mRNA release spliceosomal complex"
definition: >-
  A spliceosomal complex that is formed following the release of the spliced product from the post-spliceosomal complex and contains the excised intron and three snRNPs, either U2 or U12, U5, and either U6 or U6atac.
