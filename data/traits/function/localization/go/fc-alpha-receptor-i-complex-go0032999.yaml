identifier: GO:0032999
label: "Fc-alpha receptor I complex"
definition: >-
  A protein complex composed of an Fc-alpha R alpha chain and an Fc-epsilon RI gamma chain dimer with or without additional signaling components. The complex functions primarily as an activating receptor for IgA.
