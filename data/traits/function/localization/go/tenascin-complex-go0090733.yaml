identifier: GO:0090733
label: "tenascin complex"
definition: >-
  A homotrimeric or homohexameric extracellular matrix complex involved in cell adhesion and cell migration. In mammals, four complexes exist: Tenascin-C, Tenascin-N (also known as Tenascin-W), Tenascin-X and Tenascin-R.
