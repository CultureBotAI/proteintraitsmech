identifier: GO:0005688
label: "U6 snRNP"
definition: >-
  A ribonucleoprotein complex that contains small nuclear RNA U6, the Lsm2-8 heptameric ring complex, as well as several proteins that are unique to the U6 snRNP, most of which remain associated with the U6 snRNA both while the U6 snRNP is free or assembled into the U4/U6 snRNP or into a series of spliceosomal complexes.
