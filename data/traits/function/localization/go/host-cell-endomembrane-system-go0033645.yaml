identifier: GO:0033645
label: "host cell endomembrane system"
definition: >-
  A collection of membranous structures involved in transport within the host cell. The main components of the endomembrane system are endoplasmic reticulum, Golgi bodies, vesicles, cell membrane and nuclear envelope. Members of the endomembrane system pass materials through each other or though the use of vesicles. The host is defined as the larger of the organisms involved in a symbiotic interaction.
