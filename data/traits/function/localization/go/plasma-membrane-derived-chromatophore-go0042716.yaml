identifier: GO:0042716
label: "plasma membrane-derived chromatophore"
definition: >-
  A pigment-bearing structure that is derived from the cytoplasmic membrane, sometimes consisting of simple invaginations and sometimes a complete vesicle. This component is found in certain photosynthetic bacteria and cyanobacteria.
