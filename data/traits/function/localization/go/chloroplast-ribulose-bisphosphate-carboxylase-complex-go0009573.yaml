identifier: GO:0009573
label: "chloroplast ribulose bisphosphate carboxylase complex"
definition: >-
  A complex, located in the chloroplast, containing either both large and small subunits or just small subunits which carries out the activity of producing 3-phosphoglycerate from carbon dioxide and ribulose-1,5-bisphosphate. An example of this component is found in Arabidopsis thaliana.
