identifier: GO:0009504
label: "cell plate"
definition: >-
  The nascent cell membrane and cell wall structure that forms between two daughter nuclei near the center of a dividing plant cell. It develops at the equatorial region of the phragmoplast. It grows outwards to join with the lateral walls and form two daughter cells.
