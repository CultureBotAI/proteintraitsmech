identifier: GO:0033165
label: "interphotoreceptor matrix"
definition: >-
  A specialized extracellularc matrix that surrounds the photoreceptors of the retina and lies between them and the apical surface of the retinal pigment epithelium. The IPM has been implicated in several important activities required for photoreceptor function and maintenance.
