identifier: GO:1903439
label: "calcitonin family receptor complex"
definition: >-
  A protein complex which is capable of calcitonin family receptor activity. Calcitonin family receptors may form dimers, trimers or tetramers; adrenomedullin and amylin receptors have only been observed as dimers so far.
