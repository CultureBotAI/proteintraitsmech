identifier: GO:0150056
label: "amylin receptor complex 1"
definition: >-
  A G protein-coupled receptor complex that serves as a receptor for amylin polypeptide (AMY) and consists of a calcitonin receptor (CTR/CALCR) and a receptor activity-modifying protein (RAMP) 1. Amylin receptor complex 1 (AMY1) also serves as a receptor for the calcitonin related peptide (CGRP) and adrenomedullin (AM/ADM).
