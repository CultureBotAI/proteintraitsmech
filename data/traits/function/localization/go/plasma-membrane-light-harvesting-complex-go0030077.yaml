identifier: GO:0030077
label: "plasma membrane light-harvesting complex"
definition: >-
  A plasma membrane protein-pigment complex that may be closely or peripherally associated to photosynthetic reaction centers that participate in harvesting and transferring radiant energy to the reaction center. Examples of this complex are found in bacterial species.
