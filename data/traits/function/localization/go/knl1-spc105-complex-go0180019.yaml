identifier: GO:0180019
label: "Knl1/Spc105 complex"
definition: >-
  A kinetochore subcomplex that binds to centromeric chromatin and forms part of the outer kinetochore. It is involved in kinetochore-microtubule binding, recruiting microtubule binding outer kinetochore subunits. It is essential for kinetochore binding by components of the spindle assembly checkpoint. In humans, budding and fission yeast, it consists of KNL1/ZWINT, Spc105p/Kre28p and Spc7/Sos1, members of the Panther PTHR28260 and PTHR37329 families, respectively.
