identifier: GO:0044676
label: "formyl-methanofuran dehydrogenase (molybdenum enzyme) complex"
definition: >-
  A protein complex consisting of three polypeptides which also contains molybdenum, a molybdopterin guanine dinucleotide and iron-sulfur clusters. This protein complex catalyzes the reversible conversion of CO2 and methanofuran to formylmethanofuran during methanogenesis.
