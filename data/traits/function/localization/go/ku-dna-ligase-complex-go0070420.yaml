identifier: GO:0070420
label: "Ku-DNA ligase complex"
definition: >-
  A nonhomologous end joining complex that contains one or more Ku monomers and one or more DNA ligase molecules from the LigC or LigD family, and mediates nonhomologous end joining in bacteria.
