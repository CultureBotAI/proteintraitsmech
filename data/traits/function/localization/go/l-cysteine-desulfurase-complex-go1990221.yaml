identifier: GO:1990221
label: "L-cysteine desulfurase complex"
definition: >-
  A protein complex capable of cysteine desulfurase activity decomposing L-cysteine to L-alanine and sulfur. It belongs to a ubiquitous family of pyridoxal 5-phosphate (PLP)-dependent enzymes.
