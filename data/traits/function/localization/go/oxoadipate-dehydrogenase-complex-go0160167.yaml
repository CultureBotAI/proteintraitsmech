identifier: GO:0160167
label: "oxoadipate dehydrogenase complex"
definition: >-
  A multi-enzyme complex that catalyzes the oxidative decarboxylation of 2-oxoadipate to glutaryl-CoA, thereby acting in the final step of lysine and tryptophan catabolism in mitochondria. The complex comprises multiple copies of three enzymes referred to as E1, E2 and E3: 2-oxoadipate dehydrogenase (E1), dihydrolipoamide S-glutaryltransferase (E2) and dihydrolipoamide dehydrogenase (E3).
