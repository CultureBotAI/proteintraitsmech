identifier: GO:0097721
label: "ciliary vesicle"
definition: >-
  A Golgi-derived vesicle to which the ciliary basal body docks via its transitional fibers. Its membrane is compositionally distinct from Golgi membranes, and will become the ciliary membrane once the ciliary vesicle is fused to the plasma membrane. The ciliary vesicle is thought to be formed by multiple smaller vesicles that attach to the transitional fibers and then fuse to form a larger vesicle.
