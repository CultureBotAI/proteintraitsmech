identifier: GO:0043702
label: "carotenoid vesicle"
definition: >-
  A tissue-specific cytoplasmic vesicle surrounded by a membrane half-leaflet within which carotenoid pigments are stored. Carotenoid vesicles are synthesized in xanthophores and erythrophore cells and are yellow, orange or red in appearance.
