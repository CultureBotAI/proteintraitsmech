identifier: GO:0160309
label: "commander complex"
definition: >-
  A protein complex that promotes the recycling of internalized transmembrane proteins from endosomes back to the plasma membrane. The commander complex consists of the CCC (COMMD/CCDC22/CCDC93) subcomplex and the retriever subcomplex. In human, the CCC subcomplex consists of COMMD1, COMMD2, COMMD3, COMMD4, COMMD5, COMMD6, COMMD7, COMMD8, COMMD9, COMMD10, CCDC22 and CCDC93 and the retriever complex consists of VPS26C, VPS29 and VPS35L.
