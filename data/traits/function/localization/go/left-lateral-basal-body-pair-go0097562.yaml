identifier: GO:0097562
label: "left lateral basal body pair"
definition: >-
  Set of two basal bodies found in Giardia species (trophozoite stage). It comprises the anterior and ventral basal bodies located to the right of the left nucleus of the trophozoite when viewed dorsally.
