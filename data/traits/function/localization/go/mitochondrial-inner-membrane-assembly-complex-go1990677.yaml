identifier: GO:1990677
label: "mitochondrial inner membrane assembly complex"
definition: >-
  A protein complex that promotes the biogenesis of mitochondrial F1Fo-ATP synthase by facilitating assembly of the peripheral stalk. Loss of INAC function causes dissociation of the F1-domain from the membrane-integral Fo-portion.
