identifier: GO:1990788
label: "GLI-SUFU complex"
definition: >-
  A protein repressing GLI's transcription factor activity when SMO signaling is inactive. Upon ligand binding to the upstream receptor PTC (Patched) GLI dissociates from SUFU and activates transcription of hedgehog-target genes. In mammals it consists of SUFU and one of the GLI family proteins.
