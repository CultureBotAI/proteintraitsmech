identifier: GO:1990018
label: "tail portion of tanycyte"
definition: >-
  Elongated process of a tanycyte, devoid of cytoplasmic extensions, that courses through the hypothalamic nuclei to form small endfoot processes that terminate either on blood vessels or at the pial surface of the brain. A tanycyte is a specialized elongated ventricular ependymal cell.
