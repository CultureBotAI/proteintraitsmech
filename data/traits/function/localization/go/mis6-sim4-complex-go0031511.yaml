identifier: GO:0031511
label: "Mis6-Sim4 complex"
definition: >-
  A protein complex that forms part of the inner kinetochore, which is involved in the loading of the centromeric histone h3 variant CENP-A onto centromeres and in centromere specific heterochromatin formation. The complex contains about 12 proteins, of which two are known as Mis6 and Sim4 in S. pombe and CENP-I and CENP-H in human.
