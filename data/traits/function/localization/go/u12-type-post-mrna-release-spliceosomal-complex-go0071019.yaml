identifier: GO:0071019
label: "U12-type post-mRNA release spliceosomal complex"
definition: >-
  A spliceosomal complex that is formed following the release of the spliced product from the post-spliceosomal complex and contains the excised intron and the U12, U5 and U6atac snRNPs.
