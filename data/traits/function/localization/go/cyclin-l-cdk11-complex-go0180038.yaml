identifier: GO:0180038
label: "cyclin L-CDK11 complex"
definition: >-
  A protein complex consisting of cyclin L and cyclin-dependent kinase 11 (CDK11). Cyclins are characterized by periodicity in protein abundance throughout the cell cycle. Cyclin-dependent kinases represent a family of serine/threonine protein kinases that become active upon binding to a cyclin regulatory partner.
