identifier: GO:1902560
label: "GMP reductase complex"
definition: >-
  An oxidoreductase complex which is capable of GMP reductase activity. It catalyses the irreversible reaction: GMP + 2 H+ + NADPH => IMP + NADP+ + NH4.
