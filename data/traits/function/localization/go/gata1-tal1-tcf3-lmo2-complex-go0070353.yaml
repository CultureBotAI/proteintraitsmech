identifier: GO:0070353
label: "GATA1-TAL1-TCF3-Lmo2 complex"
definition: >-
  A protein complex that contains the zinc finger transcription factor GATA1, the LIM domain protein Lmo2 (RBTN2), the basic helix-loop-helix protein TAL1 and its binding partner TCF3. The complex is involved transcriptional regulation in hematopoiesis.
