identifier: GO:0071760
label: "IgY immunoglobulin complex"
definition: >-
  A protein complex composed of two identical immunoglobulin heavy chains of the IgY isotype and two identical immunoglobulin light chains, held together by disulfide bonds. An IgY immunoglobulin complex may be embedded in the plasma membrane or present in the extracellular space, in mucosal areas or other tissues, or circulating in the blood or lymph.
