identifier: GO:0160277
label: "lumenal side of cis-Golgi cisternae membrane"
definition: >-
  The leaflet of the cis-Golgi cisternae membrane that faces the Golgi lumen, including any protein embedded in, attached to, or peripherally associated with it. This is the site where glycosylation and lumen-facing cargo recognition occur.
