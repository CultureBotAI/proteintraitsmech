identifier: GO:0062039
label: "biofilm matrix"
definition: >-
  A type of extracellular matrix that surrounds the cells within a microbial biofilm. The matrix is composed of extracellular polymeric substances including exopolysaccharides, proteins, nucleic acids, lipids, and other biomolecules.
