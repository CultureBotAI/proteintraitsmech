identifier: GO:0071957
label: "old mitotic spindle pole body"
definition: >-
  The spindle pole body that exists in a cell prior to spindle pole body duplication. An old spindle pole body segregates to the daughter cell upon mitosis, and lacks active proteins involved in signaling exit from mitosis.
