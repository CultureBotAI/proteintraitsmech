identifier: GO:0070021
label: "transforming growth factor beta ligand-receptor complex"
definition: >-
  A protein complex that is formed by the association of a TGF-beta dimeric ligand with 2 molecules of each receptor molecule, TGF-beta type I receptor and TGF-beta type II receptor. The receptor molecules may form homo- or heterodimers but only once bound by the ligand.
