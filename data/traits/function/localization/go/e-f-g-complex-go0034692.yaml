identifier: GO:0034692
label: "E.F.G complex"
definition: >-
  A protein complex that comprises three core spliceosomal proteins, designated E, F, and G. Formation of the E.F.G complex is essential but not sufficient for the formation of a stable U1 snRNP complex.
