identifier: GO:1990633
label: "mutator focus"
definition: >-
  A type of punctate focus localized to the perinuclear region of germline cytoplasm in C. elegans. Mutator foci are required for RNA interference (RNAi) and serve as sites of small inhibitory RNA (siRNA) amplification. As such, proteins that localize to mutator foci include RNA-directed RNA polymerases (RdRPs) and beta-nucleotidyltransferases. Mutator foci are distinct from, but adjacent to or partially overlap, P granules.
