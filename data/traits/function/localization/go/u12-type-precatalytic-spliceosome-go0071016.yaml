identifier: GO:0071016
label: "U12-type precatalytic spliceosome"
definition: >-
  A spliceosomal complex that is formed by the recruitment of the preassembled U4atac/U6atac.U5 tri-snRNP to the U12-type prespliceosome. Although all 5 snRNPs are present, the precatalytic spliceosome is catalytically inactive. The precatalytic spliceosome includes many proteins in addition to those found in the U11, U12 and U4atac/U6atac.U5 snRNPs.
