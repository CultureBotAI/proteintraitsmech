identifier: GO:0039616
label: "T=2 icosahedral viral capsid"
definition: >-
  The protein coat that surrounds the infective nucleic acid in some virus particles where the subunits (capsomeres) are arranged to form an icosahedron with T=2 symmetry. The T=2 capsid is composed of 12 pentameric dimers.
