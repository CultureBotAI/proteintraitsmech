identifier: GO:1990102
label: "DnaA-DiaA complex"
definition: >-
  A protein-DNA complex containing a tetramer of DiaA attached to multiple DnaA molecule bound to oriC DNA. Regulates timely initiation of chromosomal replication during the cell cycle by stimulating assembly of DnaA-oriC complexes, conformational changes in ATP-DnaA initiation complexes, and unwinding of oriC duplex DNA.
