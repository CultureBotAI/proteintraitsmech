identifier: GO:0097565
label: "right middle basal body pair"
definition: >-
  Set of two basal bodies found in Giardia species (trophozoite stage). It comprises the caudal and posteriolateral basal bodies located to the left of the right nucleus of the trophozoite when viewed dorsally.
