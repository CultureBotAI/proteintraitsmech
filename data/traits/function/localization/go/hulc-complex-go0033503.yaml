identifier: GO:0033503
label: "HULC complex"
definition: >-
  A ubiquitin ligase complex that contains two RING finger proteins, which have ubiquitin ligase activity, in addition to a protein with ubiquitin-conjugating enzyme activity; catalyzes the ubiquitination of histone H2B at lysine 119 (or the equivalent residue). In Schizosaccharomyces the subunits are Rhp6, Shf1, Brl2/Rfp1 and Brl1/Rfp2.
