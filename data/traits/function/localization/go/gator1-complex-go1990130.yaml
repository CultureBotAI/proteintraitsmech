identifier: GO:1990130
label: "GATOR1 complex"
definition: >-
  A GTPase-activating protein (GAP) complex that regulates TORC1 signaling by interacting with the Rag GTPase. In human, the GATOR1 complex consists of DEPDC5, NPRL2, and NPRL3. In S. cerevisiae, this complex is referred to as SEACIT and contains the Iml1p, Npr2p, and Npr3p proteins.
