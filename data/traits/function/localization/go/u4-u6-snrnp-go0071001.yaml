identifier: GO:0071001
label: "U4/U6 snRNP"
definition: >-
  A ribonucleoprotein complex that contains the extensively base paired small nuclear RNAs U4 and U6, a heptameric ring of Sm proteins associated with U4, the Lsm2-8 heptameric ring complex associated with U6, as well as several proteins that are unique to the U4 snRNP or U6 snRNPs, some of which remain associated with the U4/U6 snRNA both while the U4 snRNP is free or assembled into a series of spliceosomal complexes.
