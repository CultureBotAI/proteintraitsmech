identifier: GO:0061638
label: "CENP-A containing chromatin"
definition: >-
  The specialized chromatin located in the centromeric core region or the entire centromeric region in organisms with point centromeres, which is enriched for CENP-A-containing nucleosomes. This chromatin forms a 3-dimensional structure which provides a platform for kinetochore assembly and microtubule attachment.
