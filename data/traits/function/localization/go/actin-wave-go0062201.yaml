identifier: GO:0062201
label: "actin wave"
definition: >-
  A cellular anatomical entity that is part of the actin cytoskeleton and results in a wave-like propagation of actin networks. It consists of dynamic structures traveling on the ventral (substrate-attached) side of the cell during cell migration, cytokinesis, adhesion and neurogenesis.
