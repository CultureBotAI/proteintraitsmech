identifier: GO:1990012
label: "complex laminated body"
definition: >-
  A cytoplasmic inclusion body found in some lateral geniculate neurons and composed of sheets of tubules (25 nm in diameter) separated by dense material (about 75 nm wide), which together with the tubules whorl give a structure resembling a fingerprint.
