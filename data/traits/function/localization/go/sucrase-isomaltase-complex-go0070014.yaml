identifier: GO:0070014
label: "sucrase-isomaltase complex"
definition: >-
  A protein complex that possesses oligo-1,6-glucosidase activity; the complex is a heterodimer located in the cell membrane, and is formed by proteolytic cleavage of a single precursor polypeptide. The two subunits have different substrate specificities.
