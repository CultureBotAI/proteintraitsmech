identifier: GO:1990453
label: "TINTIN complex"
definition: >-
  A protein complex involved in the disassembly and subsequent reassembly of nucleosomes. It associates with the coding region of transcriptionally active genes where it interacts with the RNA polymerase II and affects its processivity during co-transcriptional RNA processing and maturation. It exists as a functionally independent part of the NuA4 complex.
