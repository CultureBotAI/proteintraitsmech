identifier: GO:1990007
label: "membrane stack"
definition: >-
  A configuration of endoplasmic reticulum (ER) found in Purkinje cells in the cerebellum and in axons in the lateral vestibular nucleus, consisting of parallel and interconnecting tubules whose outer surfaces are covered by particles or ringlike structures.
