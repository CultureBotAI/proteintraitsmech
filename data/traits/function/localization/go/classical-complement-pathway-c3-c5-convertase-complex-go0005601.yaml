identifier: GO:0005601
label: "classical-complement-pathway C3/C5 convertase complex"
definition: >-
  A heterodimeric protein complex that catalyzes the cleavage of complement components C3 and C5, and acts in the classical pathway of complement activation; consists of one monomer of C2a and one monomer of C4b; C2a is the catalytic subunit, but cannot catalyze cleavage alone.
