identifier: GO:0055039
label: trichocyst
definition: >-
  A crystalline exocytotic organelle composed of small, acidic proteins existing primarily as disulphide-linked dimers. The trichocyst is an organelle that releases long filamentous proteins that capture predators in net-like structures, to slow them down when the cell is disturbed. The protein is nontoxic and shaped like a long, striated, fibrous shaft.
