identifier: GO:0097567
label: "right tetrad"
definition: >-
  Set of four basal bodies found in Giardia species (trophozoite stage). It comprises the right lateral basal body pair and the right middle basal body pair (i.e. the anterior, ventral, caudal and posteriolateral basal bodies located to the left of the right nucleus of the trophozoite when viewed dorsally).
