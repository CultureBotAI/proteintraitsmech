identifier: GO:0106123
label: reservosome
definition: >-
  A large membrane-bound endocytic organelle present only in members of the Schizotrypanum subgenus of the Trypanosoma genus and is defined as the site of storage of endocytosed macromolecules and lysosomal enzymes. It is found at the posterior end of epimastigote forms of Trypanosoma cruzi, but absent in amastigotes and trypomastigotes.
