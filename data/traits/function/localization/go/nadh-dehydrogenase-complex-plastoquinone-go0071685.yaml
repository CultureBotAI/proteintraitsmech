identifier: GO:0071685
label: "NADH dehydrogenase complex (plastoquinone)"
definition: >-
  An NADH dehydrogenase complex that catalyzes the transfer of electrons to plastoquinone. The complex is involved in the non-photochemical reduction of plastoquinones and the cyclic electron transport around photosystem I, and is found in plastid thylakoids.
