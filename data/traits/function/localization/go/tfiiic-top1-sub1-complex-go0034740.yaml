identifier: GO:0034740
label: "TFIIIC-TOP1-SUB1 complex"
definition: >-
  A protein complex that contains TFIIIC, topoisomerase 1, and Sub1/PC4. Characterized in human, the complex is involved in regulating transcription from RNA polymerase III (Pol III) promoters. Topoisomerase 1 and Sub1 enhance the accuracy of transcription termination, and promote reinitiation by Pol III.
