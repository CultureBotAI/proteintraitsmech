identifier: GO:1990475
label: "synaptic vesicle, recycling pool"
definition: >-
  A synaptic vesicle belonging to the pool that repopulate vacancies within the readily releasable pool (RRP) of synaptic vesicles, and require more significant stimuli than the RRP in order to release neurotransmitter; about 10-15% of the total number of synaptic vesicles at a resting terminal bouton are in this state.
