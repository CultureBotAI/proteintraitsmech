identifier: GO:0044672
label: "acetyl-CoA decarbonylase/synthase-carbon monoxide dehydrogenase complex"
definition: >-
  A multifunctional enzyme complex composed of five different polypeptides that catalyzes the decarbonylation of acetyl-CoA, cleaves the C-C and C-S bonds in the acetyl moiety of acetyl-CoA, oxidizes the carbonyl group to CO2 and transfers the methyl group to tetrahydrosarcinapterin. These reactions are important for methanogenesis.
