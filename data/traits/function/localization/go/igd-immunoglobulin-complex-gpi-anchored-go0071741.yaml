identifier: GO:0071741
label: "IgD immunoglobulin complex, GPI-anchored"
definition: >-
  A protein complex composed of two identical immunoglobulin heavy chains of the IgD isotype and two identical immunoglobulin light chains, held together by disulfide bonds, and bound via a GPI-anchor to the plasma membrane of B cells.
