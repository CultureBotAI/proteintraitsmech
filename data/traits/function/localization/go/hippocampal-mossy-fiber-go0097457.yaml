identifier: GO:0097457
label: "hippocampal mossy fiber"
definition: >-
  An axon of a hippocampal granule cell, including dentate gyrus granule cell and CA3 granule cell, characterized by expansions (mossy fiber expansions) giving the fibers a mossy appearance. These unmyelinated axons were first described by Ramon y Cajal.
