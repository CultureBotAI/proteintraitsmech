identifier: GO:0039628
label: "T=169 icosahedral viral capsid"
definition: >-
  The protein coat that surrounds the infective nucleic acid in some virus particles where the subunits (capsomeres) are arranged to form an icosahedron with T=169 symmetry. T=169 icosahedral capsid is composed of 12 pentameric and 1680 hexameric capsomeres for a total of 10140 capsid proteins.
