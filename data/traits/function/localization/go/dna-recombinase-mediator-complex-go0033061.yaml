identifier: GO:0033061
label: "DNA recombinase mediator complex"
definition: >-
  A protein complex containing accessory proteins which bind a recombinase (e.g. Rad51) and bind single-stranded DNA (ssDNA), and promote nucleation of the recombinase onto ssDNA through facilitating recombinase-RPA exchange.
