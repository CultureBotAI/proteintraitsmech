identifier: GO:0017023
label: "myosin phosphatase complex"
definition: >-
  An enzyme complex that catalyzes the removal of the phosphate group from phosphomyosin. Composed of a PP1 catalytic subunit (PP1c/PPP1CB) and a myosin phosphatase targeting subunit (MYPT1/PPP1R12A).
