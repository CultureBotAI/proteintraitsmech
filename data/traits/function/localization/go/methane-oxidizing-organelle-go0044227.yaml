identifier: GO:0044227
label: "methane-oxidizing organelle"
definition: >-
  A cytoplasmic, membrane-bounded compartment found within Methanotrophic bacteria that contains enzymes and electron transfer proteins for methane catabolism. This structure is analogous to the thylakoid of Cyanobacteria and the anammoxosome of anaerobic ammonium oxidation organisms.
