identifier: GO:0062092
label: "Yae1-Lto1 complex"
definition: >-
  A cytosolic complex that functions as an substrate-specific adaptor, linking the cytosolic iron-sulfur protein assembly (CIA) targeting complex to apo-Rli1p, an ABC protein involved in ribosome recycling, facilitating Fe-S cluster insertion and the maturation of the Rli1p.
