identifier: GO:0160295
label: "mitochondrial complex I intermediate assembly complex"
definition: >-
  A protein complex involved in mitochondrial respiratory chain complex I (MCI) assembly. The mitochondrial complex I intermediate assembly (MCIA) complex is an inner mitochondrial membrane complex required for the aggregation, arrangement and bonding together of the subunits of the ND2-module of MCI. In humans, the MCIA complex is formed from NDUFAF1, ACAD9, ECSIT, TMEM126B, TMEM186 and COA1.
