identifier: GO:1990662
label: "S100A9 complex"
definition: >-
  A protein complex composed of a S100A9 dimer and capable of binding to toll-like receptor 4 (TLR4) and the receptor for advanced glycation end products (RAGE) initiating signal transduction through NF-kappa-B pathways. Transports arachidonic acid between the cytosol and the NADPH oxidase complex at the plasma membrane in neutrophils as part of an inflammatory signal cascade leading to an oxidative burst. Complexes with microtubules to increase cell motility.
