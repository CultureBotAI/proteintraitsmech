identifier: GO:1990100
label: "DnaB-DnaC complex"
definition: >-
  A protein complex containing homohexameric DNA helicase DnaB, and the DNA helicase loader DnaC. The helicase loader DnaC delivers DnaB to the chromosomal origin (oriC).
