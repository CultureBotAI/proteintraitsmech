identifier: GO:0140366
label: "galectin lattice"
definition: >-
  A non-stoichiometric protein complex formed by several galectins crosslinking glycosylated ligands to form a dynamic lattice. The galectin lattice modulates receptor kinase signaling and the functionality of membrane receptors, by regulating the diffusion, compartmentalization and endocytosis of plasma membrane glycoproteins and glycolipids.
