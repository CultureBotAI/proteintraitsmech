identifier: GO:0044286
label: "peg and socket contact"
definition: >-
  A cell-cell contact zone that consists of membrane invaginations extending from either cell, which contain tight-, gap-, and adherens junctions. Peg and socket contacts form between endothelial cells and pericytes, and between lens fiber cells.
