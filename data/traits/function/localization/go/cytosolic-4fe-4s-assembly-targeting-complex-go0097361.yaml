identifier: GO:0097361
label: "cytosolic [4Fe-4S] assembly targeting complex"
definition: >-
  A protein complex capable of condensing two 2Fe-2S clusters into one 4Fe-4S center in the cytoplasm and nucleus. In humans it consists of MMS19, CIAO1, CIAO2A/CIAO2B, CIAO3. MMS19, CIAO1 and CIAO2A/CIAO2B form a tight 'core' complex, whereas CIAO3 is an 'external' component of this complex.
