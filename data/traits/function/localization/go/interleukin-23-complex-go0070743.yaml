identifier: GO:0070743
label: "interleukin-23 complex"
definition: >-
  A protein complex that is composed of an interleukin-23 alpha (p19, product of the IL23A gene) and an interleukin-12 beta (p40, product of the IL12B gene) subunit and is secreted into the extracellular space.
