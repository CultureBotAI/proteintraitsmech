identifier: GO:0099165
label: "postsynaptic specialization of symmetric synapse, intracellular component"
definition: >-
  A network of proteins adjacent to the postsynaptic membrane of a symmetric synapse. Its major components include that spatially and functionally organize neurotransmitter receptors in the adjacent membrane, such as anchoring and scaffolding molecules, signaling enzymes and cytoskeletal components. This structure is not as thick or electron dense as the postsynaptic density found in asymmetric synapses.
