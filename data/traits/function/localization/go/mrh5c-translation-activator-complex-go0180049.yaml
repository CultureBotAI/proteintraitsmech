identifier: GO:0180049
label: "Mrh5C translation activator complex"
definition: >-
  A protein complex capable of translation activator activity, and is involved in the activation of cox1 mRNA for translation. In fission yeast this complex consists of a scaffold (Sls1), a helicase (Mrh5), and PPR repeat proteins Prr4 and Mtf2.
