identifier: GO:0089716
label: "Pip2-Oaf1 complex"
definition: >-
  A heterodimeric complex consisting of Zn(2)Cys(6) containing transcription factors Pip2 and Oaf1. It binds to the oleate response element (ORE), found in the promoters of fatty acid-inducible genes in Saccharomyces where, in the presence of oleate this bound complex activates the transcription of genes encoding peroxisomal proteins.
