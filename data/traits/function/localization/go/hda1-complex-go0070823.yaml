identifier: GO:0070823
label: "HDA1 complex"
definition: >-
  A tetrameric histone deacetylase complex that contains a Class II deacetylase catalytic subunit. In S. cerevisiae it is composed of two Hda1p subunits along with Hda2p and Hda3p.
