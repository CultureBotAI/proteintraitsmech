identifier: GO:0039623
label: "T=25 icosahedral viral capsid"
definition: >-
  The protein coat that surrounds the infective nucleic acid in some virus particles where the subunits (capsomeres) are arranged to form an icosahedron with T=25 symmetry. The T=25 capsid is composed of 12 pentameric and 240 hexameric capsomeres.
