identifier: GO:0031387
label: "MPF complex"
definition: >-
  A complex consisting of a Cdc2-class (also known as Cdc28) cyclin-dependent kinase and an M-phase cyclin such as S. pombe Cdc13. The MPF complex phosphorylates and activates the anaphase promoting complex (APC).
