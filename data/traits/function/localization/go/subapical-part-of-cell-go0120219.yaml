identifier: GO:0120219
label: "subapical part of cell"
definition: >-
  The region of a polarized cell that is just below the apical region. For example, in a polarized epithelial cell, the apical region has an exposed surface and lies opposite to the basal lamina that separates the epithelium from other tissue so the subapical region is further from the exposed surface and closer to the basal lamina.
