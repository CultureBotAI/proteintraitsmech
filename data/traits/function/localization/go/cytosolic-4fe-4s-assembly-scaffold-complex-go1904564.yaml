identifier: GO:1904564
label: "cytosolic [4Fe-4S] assembly scaffold complex"
definition: >-
  A heterotetrameric complex with weak ATPase activity that is capable of scaffolding a 4Fe-4S (iron-sulfur) cluster. In yeast, the subunits are Nbp35 and Cfd1. In humans, the subunits are NUBP1 and NUBP2.
