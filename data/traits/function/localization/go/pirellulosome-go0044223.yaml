identifier: GO:0044223
label: pirellulosome
definition: >-
  A cytoplasmic structure found in bacterial phyla Planctomycetes and Verrucomicrobia containing a condensed nucleoid and ribosomes and surrounded by an intracytoplasmic membrane. It is surrounded by ribosome-free cytoplasm, in a compartment called the paryphoplasm.
