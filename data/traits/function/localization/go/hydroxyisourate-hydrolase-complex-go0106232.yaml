identifier: GO:0106232
label: "hydroxyisourate hydrolase complex"
definition: >-
  A hydrolase complex that converts 5-hydroxyisourate (HIU) to 2-oxo-4-hydroxy-4-carboxy-5-ureidoimidazoline. This is the second step of the three-step enzymatic reaction that degrades uric acid to (S)-allantoin.
