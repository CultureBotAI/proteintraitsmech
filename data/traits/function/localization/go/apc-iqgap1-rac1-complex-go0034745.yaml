identifier: GO:0034745
label: "APC-IQGAP1-Rac1 complex"
definition: >-
  A protein complex that contains the tumor suppressor protein adenomatous polyposis coli (APC), the small GTPase Rac1, and the Rac1 and Cdc42 effector IQGAP1; may play a role in cytoskeleton organization and cell migration.
