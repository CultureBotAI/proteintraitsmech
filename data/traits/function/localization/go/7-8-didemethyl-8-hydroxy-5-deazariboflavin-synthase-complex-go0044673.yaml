identifier: GO:0044673
label: "7,8-didemethyl-8-hydroxy-5-deazariboflavin synthase complex"
definition: >-
  A heterodimer which catalyses the reaction of 5-amino-6-(D-ribitylamino)uracil and 4-hydroxyphenylpyruvate to form 7,8-didemethyl-8-hydroxy-5-deazariboflavin (FO), an intermediate of coenzyme F420.
