identifier: GO:0160231
label: cytospinule
definition: >-
  An actin-based cell projection extending laterally from the basolateral membrane of tuft cells in epithelial tissues, including the intestinal epithelium. These thin projections, typically 3-4 per cell and up to 3 micron long, directly contact the nuclei of adjacent epithelial cells, potentially facilitating intercellular communication and molecular exchange.
