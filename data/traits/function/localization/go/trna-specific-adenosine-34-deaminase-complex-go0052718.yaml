identifier: GO:0052718
label: "tRNA-specific adenosine-34 deaminase complex"
definition: >-
  A protein complex that possesses tRNA-specific adenosine-34 deaminase activity. In eukaryotes the complex is a heterodimer; the subunits are known as Tad2p and Tad3p in yeasts and Adat2 and Adat3 in human.
