identifier: GO:1990964
label: "actin cytoskeleton-regulatory complex"
definition: >-
  A protein complex probably required for the internalization of endosomes during actin-coupled endocytosis. Links the site of endocytosis to the cell membrane-associated actin cytoskeleton, coordinating ARP2/3 stimulation at the later stages of endocytosis. Present in the late endocytic coat.
