identifier: GO:0032478
label: "heterotetrameric polyprenyl diphosphate synthase complex"
definition: >-
  A heterotetrameric complex located in the mitochondrial inner membrane that possesses polyprenyl diphosphate synthase activity involved in the synthesis of the isoprenoid chain of ubiquinone whose length varies between organisms. In S. pombe it is a heterotetramer of Dlp1 and Dps1.
