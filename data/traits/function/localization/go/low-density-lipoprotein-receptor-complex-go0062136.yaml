identifier: GO:0062136
label: "low-density lipoprotein receptor complex"
definition: >-
  A plasma membrane protein complex capable of low-density lipoprotein particle receptor activity. It may also bind xenobiotic toxins and deliver them into the cell via endocytosis. While most substrates get degraded via the endosome the receptor is recycled to the plasma membrane. It may also act as a transducer of intracellular signal pathways and often acts in corporation with other cell-surface receptors.
