identifier: GO:0072558
label: "NLRP1 inflammasome complex"
definition: >-
  An inflammasome complex that consists of two components, NLRP1 (NALP1) and caspase-1 or caspase-5. The exact mechanisms of NLRP1 activation remain obscure, but potassium ion efflux appears to be essential.
