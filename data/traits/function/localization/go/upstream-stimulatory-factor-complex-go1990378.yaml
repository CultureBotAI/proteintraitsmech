identifier: GO:1990378
label: "upstream stimulatory factor complex"
definition: >-
  A protein complex capable of sequence-specific DNA binding RNA polymerase II transcription factor activity through binding to a symmetrical DNA sequence (E-boxes) (5'-CACGTG-3'). Found in a variety of viral and cellular promoters.
