identifier: GO:7770030
label: "rod photoreceptor phosphodiesterase 6 complex"
definition: >-
  A heterotetrameric cGMP phosphodiesterase complex found in the disc membranes of rod photoreceptor outer segments. It consists of two catalytic subunits, PDE6A and PDE6B, and two inhibitory gamma-subunits, PDE6G. In response to activation by transducin, the complex hydrolyzes cyclic GMP, thereby mediating the light-induced closure of cGMP-gated ion channels during rod phototransduction.
