identifier: GO:0160005
label: "PAT complex"
definition: >-
  A transmembrane protein complex located in the endoplasmic reticulum (ER) involved in the correct folding of multipass membrane proteins in the ER membrane. In human, the substrate-binding Asterix (PAT10, WDR83OS) forms an obligate heterodimer with CCDC47.
