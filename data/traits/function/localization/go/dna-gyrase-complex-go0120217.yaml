identifier: GO:0120217
label: "DNA gyrase complex"
definition: >-
  A bacterial type IIA topoisomerase that is unique in its function of introducing negative supercoils into DNA at the expense of ATP hydrolysis and is also capable of relaxing positive supercoils, an activity shared with topoisomerase IV. Typically, it is composed of two copies each of an A subunit (GyrA) and a B subunit (GyrB).
