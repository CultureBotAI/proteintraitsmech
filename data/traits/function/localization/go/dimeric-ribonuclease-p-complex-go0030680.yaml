identifier: GO:0030680
label: "dimeric ribonuclease P complex"
definition: >-
  A ribonuclease P complex that contains a single RNA molecule that is necessary and usually sufficient for catalysis, and a single protein molecule. Examples of this complex are found in Bacterial species.
