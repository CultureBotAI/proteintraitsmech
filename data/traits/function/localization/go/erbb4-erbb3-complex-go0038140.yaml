identifier: GO:0038140
label: "ERBB4-ERBB3 complex"
definition: >-
  A heterodimeric complex between the tyrosine kinase receptors ERBB4 (also called HER4) and ERBB3 (also called HER3). ERBB3 has impaired kinase activity so relies on the kinase activity of its heterodimer partner for activation and signal transmission.
