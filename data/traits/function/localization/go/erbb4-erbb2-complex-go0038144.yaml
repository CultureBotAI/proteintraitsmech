identifier: GO:0038144
label: "ERBB4:ERBB2 complex"
definition: >-
  A heterodimeric complex between the tyrosine kinase receptor ERBB2 and a ligand-activated receptor ERBB4. ERBB2, which does not bind any known ligand, is activated through formation of a heterodimer with another ligand-activated ERBB family member such as ERBB4.
