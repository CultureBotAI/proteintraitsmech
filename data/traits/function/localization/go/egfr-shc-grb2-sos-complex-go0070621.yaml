identifier: GO:0070621
label: "EGFR-Shc-Grb2-Sos complex"
definition: >-
  A protein complex that contains the epidermal growth factor receptor (EGFR), Grb2, the adaptor protein SHC and the guanine nucleotide exchange factor Sos (or an ortholog thereof, such as mSos1), and is involved in linking EGFR activation to the p21-Ras pathway.
