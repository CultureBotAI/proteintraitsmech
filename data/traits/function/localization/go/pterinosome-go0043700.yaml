identifier: GO:0043700
label: pterinosome
definition: >-
  A tissue-specific, membrane-bounded cytoplasmic organelle within which pteridine pigments are synthesized and stored. Pterinosomes are synthesized in xanthophores and erythrophore cells and are yellow, orange or red in appearance.
