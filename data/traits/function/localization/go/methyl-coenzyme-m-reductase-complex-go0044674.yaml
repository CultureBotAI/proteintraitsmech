identifier: GO:0044674
label: "methyl coenzyme M reductase complex"
definition: >-
  A hexameric complex consisting of three polypeptides in an alpha2beta2gamma2 arrangement. Involved in the reduction of the coenzyme M-bound methyl group to methane, which is the final step in methanogenesis.
