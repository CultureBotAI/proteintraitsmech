identifier: GO:0097347
label: "TAM protein secretion complex"
definition: >-
  A heterooligomeric protein complex that spans the bacterial periplasm and enables the secretion of adhesin proteins in Gram-negative bacteria. In Citrobacter rodentium, Salmonella enterica and Escherichia coli, the TAM complex consists of an Omp85-family protein, TamA, in the outer membrane and TamB in the inner membrane.
