identifier: GO:0071178
label: "MAML2-RBP-Jkappa-ICN4 complex"
definition: >-
  A protein complex that consists of the intracellular domain of Notch4 (ICN4), the DNA-binding transcription factor RBP-Jkappa, and the transcriptional coactivator Mastermind-like-2 (MAML2); the complex is involved in transcriptional activation in response to Notch-mediated signaling.
