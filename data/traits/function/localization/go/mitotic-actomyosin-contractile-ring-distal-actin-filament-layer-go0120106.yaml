identifier: GO:0120106
label: "mitotic actomyosin contractile ring, distal actin filament layer"
definition: >-
  The region of the mitotic actomyosin ring containing actin filaments and cross linkers, myosin motors, and connections to the plasma membrane through the intermediate layer. It is further from the plasma membrane than the intermediate layer which it is adjacent to.
