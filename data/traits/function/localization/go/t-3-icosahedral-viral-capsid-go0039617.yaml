identifier: GO:0039617
label: "T=3 icosahedral viral capsid"
definition: >-
  The protein coat that surrounds the infective nucleic acid in some virus particles where the subunits (capsomeres) are arranged to form an icosahedron with T=3 symmetry. The T=3 capsid is composed of 12 pentameric and 20 hexameric capsomeres.
