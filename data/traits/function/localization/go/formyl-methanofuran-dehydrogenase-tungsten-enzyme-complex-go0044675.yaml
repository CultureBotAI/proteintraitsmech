identifier: GO:0044675
label: "formyl-methanofuran dehydrogenase (tungsten enzyme) complex"
definition: >-
  A protein complex consisting of four polypeptides which also contains tungsten, a molybdopterin guanine dinucleotide, and iron-sulfur clusters. This protein complex catalyzes the reversible conversion of CO2 and methanofuran to formylmethanofuran during methanogenesis.
