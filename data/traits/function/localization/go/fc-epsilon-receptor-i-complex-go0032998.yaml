identifier: GO:0032998
label: "Fc-epsilon receptor I complex"
definition: >-
  A protein complex composed of an Fc-epsilon RI alpha chain and an Fc-epsilon RI gamma chain dimer with or without an Fc-episilon RI beta chain and additional signaling components. The complex functions primarily as an activating receptor for IgE.
