identifier: GO:0140621
label: "type I pilus"
definition: >-
  A short filamentous structure on the surface of a bacterial cell distinguished from other pili by their D-mannose-sensitive agglutinatination of erythrocytes. In E. coli, type I pili consist of a short tip fibrillum made up of the adhesin protein (FimH) and two minor subunits (FimG and FimF) that is joined to the pilus rod, a homopolymer of ~1000 FimA subunits.
