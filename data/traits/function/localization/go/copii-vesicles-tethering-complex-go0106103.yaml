identifier: GO:0106103
label: "COPII vesicles tethering complex"
definition: >-
  A protein complex that resides in the cis-golgi membrane and plays a role in the tethering of COPII vesicles, through an interaction with vesicle tethering proteins (p115 in H. Sapiens and Uso1 S. cerevisiae), granting the cis-Golgi and endoplasmic reticulum to Golgi vesicle-mediated transport. It is composed by GRASP65 and GM130 protein in H. sapiens and by Bug1 and Grh1 proteins in S. cerevisiae.
