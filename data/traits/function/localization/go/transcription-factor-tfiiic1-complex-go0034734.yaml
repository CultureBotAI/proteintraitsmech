identifier: GO:0034734
label: "transcription factor TFIIIC1 complex"
definition: >-
  A transcription factor complex that forms part of the TFIIIC complex, observed in human. The complex is poorly characterized, but contains the 250-kDa form of HsBdp1, and is thought to include nuclear factor 1 (NF1). It stimulates binding by human TFIIIC2 and is required for transcription activity.
