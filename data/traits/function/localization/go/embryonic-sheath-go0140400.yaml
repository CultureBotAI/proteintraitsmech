identifier: GO:0140400
label: "embryonic sheath"
definition: >-
  A specialized, transient apical extracellular matrix (aECM) that overlays the apical surface of the embryonic epidermis in Caenorhabditis elegans. It is secreted just prior to the start of embryonic elongation and acts as a mechanical scaffold to maintain embryonic integrity, distribute actomyosin-dependent stress, and anchor developing muscles.
