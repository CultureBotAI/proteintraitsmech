identifier: GO:0097126
label: "cyclin B2-CDK1 complex"
definition: >-
  A protein complex consisting of cyclin B2 and cyclin-dependent kinase 1 (CDK1). Cyclins are characterized by periodicity in protein abundance throughout the cell cycle. Cyclin-dependent kinases represent a family of serine/threonine protein kinases that become active upon binding to a cyclin regulatory partner.
