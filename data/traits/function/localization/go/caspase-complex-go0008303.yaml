identifier: GO:0008303
label: "caspase complex"
definition: >-
  A protein complex that contains one or more cysteine-type endopeptidases (also called caspases), which give the complex a peptidase activity with specificity for the hydrolysis of aspartyl bonds. These complexes may be involved e.g. in apoptotic or inflammation processes.
