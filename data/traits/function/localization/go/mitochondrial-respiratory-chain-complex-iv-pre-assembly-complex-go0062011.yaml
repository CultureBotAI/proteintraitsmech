label: "mitochondrial respiratory chain complex IV pre-assembly complex"
definition: >-
  A protein complex that contributes to and regulates mitochondrial respiratory chain complex IV (COX) formation. It acts by regulating mitochondrial COX1 translation and by promoting the assembly of COX components.
