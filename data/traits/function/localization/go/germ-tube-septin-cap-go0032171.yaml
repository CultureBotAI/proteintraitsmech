identifier: GO:0032171
label: "germ tube septin cap"
definition: >-
  A faint structure formed of septins found at the leading edge of growth in germ tubes of fungal cells growing filamentously. This cap of septins colocalizes with a region of the plasma membrane that is rich in ergosterol.
