identifier: GO:0033107
label: "Cvt vesicle"
definition: >-
  A cytosolic vesicle that is enclosed by a double membrane and is implicated in the cytoplasm to vacuole targeting pathway. These vesicles are found in the yeast S. cerevisiae, and contain vacuolar hydrolases, aminopeptidase I (Ape1p) and alpha-mannosidase (Ams1p).
