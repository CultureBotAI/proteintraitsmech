identifier: GO:0160051
label: "Cyc8(Ssn6)-Tup1 general repressor complex"
definition: >-
  A corepressor complex containing the WD-repeat protein Tup1p (S. cerevisiae) and Tup11/Tup12 (fission yeast) and the TPR repeat protein Cyc8p (S. cerevisiae) ssn6 (fission yeast) that is recruited to target genes by DNA-bound repressor proteins preferentially at regions where histones are deacetylated by the Clr6 class I HDAC, and recruits the SWI/SNF and SAGA complexes to promoters.
