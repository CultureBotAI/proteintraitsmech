identifier: GO:0070864
label: "sperm individualization complex"
definition: >-
  A cellular structure that includes cytoskeletal components and part of the cell membrane. Forms at the nuclear end of a male germline syncytium, or cyst, and translocates the over the length of the syncytium in the course of sperm individualization. Each complex contains an array of 64 investment cones, one per nucleus, that move synchronously along the spermatogenic cyst.
