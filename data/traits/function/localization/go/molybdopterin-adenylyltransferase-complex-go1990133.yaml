identifier: GO:1990133
label: "molybdopterin adenylyltransferase complex"
definition: >-
  A heterotetrameric protein complex which adenylates two molecules of the sulfur carrier subunit of the molybdopterin cofactor synthase using ATP as part of molybdopterin cofactor (Moco) biosynthesis. In E. coli the subunits are MoeB and MoaD; in human the subunits are MOCS3 and MOCS2A. Moco biosynthesis and its constituent molecules are evolutionarily conserved.
