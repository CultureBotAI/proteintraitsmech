identifier: GO:7770010
label: "GTPBP3-MTO1 complex"
definition: >-
  A protein complex consisting of GTP binding protein 3 (GTPBP3) and mitochondrial tRNA translation optimization 1 (MTO1). The complex catalyzes the formation of 5-taurinomethyluridine at wobble position U34 of mitochondrial tRNAs.
