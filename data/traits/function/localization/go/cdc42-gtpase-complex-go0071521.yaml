identifier: GO:0071521
label: "Cdc42 GTPase complex"
definition: >-
  A protein complex formed by the association of the small GTPase Cdc42 with additional proteins. In Schizosaccharomyces the complex contains the Cdc42, Ras1, Scd1, Scd2, andShk1 proteins, and functions in the Ras1-Scd GTPase signaling pathway.
