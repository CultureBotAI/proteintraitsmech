identifier: GO:0071002
label: "U4atac/U6atac snRNP"
definition: >-
  A ribonucleoprotein complex that contains the extensively base paired small nuclear RNAs U4atac and U6atac, a heptameric ring of Sm proteins associated with U4atac, the Lsm2-8 heptameric ring complex associated with U6atac, as well as several proteins that are unique to the U4atac snRNP or U6atac snRNPs, some of which remain associated with the U4atac/U6atac snRNA both while the U4atac snRNP is free or assembled into a series of spliceosomal complexes.
