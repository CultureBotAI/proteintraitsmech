identifier: GO:0140261
label: "BCOR complex"
definition: >-
  A protein-containing complex that monoubiquitinates histone H2A on K119, thus it facilitates the maintenance of the transcriptionally repressive state of some genes, such as BCL6. It consists of the corepressor BCOR or BCORL1, a Polycomb group (PcG) and a SCF ubiquitin ligase subcomplexes. In mammals, the core subunits of the complex include the PcG and PcG-associated proteins NSPC1, RING1, RNF2, and RYBP and the components of the SCF ubiquitin ligase, SKP1, and FBXL10.
