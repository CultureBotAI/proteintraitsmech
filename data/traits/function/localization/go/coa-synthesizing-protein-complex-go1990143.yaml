identifier: GO:1990143
label: "CoA-synthesizing protein complex"
definition: >-
  A multisubunit complex likely involved in the synthesis of coenzyme A (CoA). In S. cerevisiae, the complex consists of at least Cab2, Cab3, Cab4 and Cab5 but may also include Sis2 and Vhs3. The latter subunits are shared by the GO:0071513 phosphopantothenoylcysteine decarboxylase complex that catalyses the third step of the coenzyme A (CoA) biosynthetic pathway.
