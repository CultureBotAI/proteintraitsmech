identifier: GO:0110103
label: "RNA polymerase II termination complex"
definition: >-
  A conserved protein complex capable of 5'-3' exoribonuclease activity. It is able to promote RNA polymerase II (RNAPII) transcription termination by degrading pre-mRNA from the newly formed 5' phosphorylated end.
