identifier: GO:1990200
label: "SsuD-SsuE complex"
definition: >-
  A protein complex containing an alkanesulfonate monooxygenase subunit (SsuD tetramer in E.coli) and a flavin oxidoreductase subunit (SsuE dimer in E.coli). Involved in the utilization of alkanesulfonates as sulfur sources under conditions of sulfate or cysteine starvation.
