identifier: GO:0033000
label: "Fc-gamma receptor I complex"
definition: >-
  A protein complex composed of an Fc-gamma RI alpha chain and an Fc-epsilon RI gamma chain dimer with or without additional signaling components. The complex functions primarily as an activating receptor for IgG.
