identifier: GO:0045247
label: "cytosolic electron transfer flavoprotein complex"
definition: >-
  A protein complex located in the cytosol containing flavin adenine dinucleotide (FAD) that, together with an acyl-CoA dehydrogenase, forms a system that oxidizes an acyl-CoA molecule and reduces ubiquinone and other acceptors.
