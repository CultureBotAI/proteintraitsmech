identifier: GO:1990016
label: "neck portion of tanycyte"
definition: >-
  Elongated portion of a tanycyte that sticks into the periventricular layer of neuropil where it appears to contact a blood vessel; characterized by numerous cytoplasmic extensions. A tanycyte is a specialized elongated ventricular ependymal cell that has processes that extend to the outer, or pial, surface of the CNS.
