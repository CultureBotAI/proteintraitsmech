identifier: GO:1990971
label: "EMILIN complex"
definition: >-
  The elastin microfibril interface located protein (EMILINs) are glycoprotein complexes of the C1q/TNF superfamily characterized by an N-terminal EMI domain. EMILIN homotrimers assemble to form supramolecular EMILIN structures.
