identifier: GO:0097444
label: "spine apparatus"
definition: >-
  A specialization of the endomembrane system found in some classes of dendritic spines consisting of two or more closely apposed lamellae with interspersed electron dense material. The endomembrane component is continuous with the smooth endoplasmic reticulum.
