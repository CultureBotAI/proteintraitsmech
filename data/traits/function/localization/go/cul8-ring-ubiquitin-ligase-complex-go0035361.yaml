identifier: GO:0035361
label: "Cul8-RING ubiquitin ligase complex"
definition: >-
  A ubiquitin ligase complex in which a cullin from the Cul8 subfamily and a RING domain protein form the catalytic core. In S. cerevisiae, Mms1p acts as the adaptor protein and substrate specificity is conferred by any of a number of different proteins.
