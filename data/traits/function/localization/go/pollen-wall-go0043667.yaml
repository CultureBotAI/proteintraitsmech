identifier: GO:0043667
label: "pollen wall"
definition: >-
  The wall surrounding a mature pollen grain; a multilayered structure consisting of a pectocellulosic intine surrounded by a sporopollenin-based exine, which itself contains two layers, the inner nexine and the outer sexine.
