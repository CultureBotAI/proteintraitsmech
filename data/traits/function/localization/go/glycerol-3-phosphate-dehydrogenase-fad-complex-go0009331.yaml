identifier: GO:0009331
label: "glycerol-3-phosphate dehydrogenase (FAD) complex"
definition: >-
  An enzyme complex that catalyzes the oxidation of sn-glycerol 3-phosphate to dihydroxyacetone phosphate, with concurrent reduction of flavin adenine dinucleotide (FAD) to FADH2. In E. coli, the complex is either a GlpA-GlpB-GlpC heterotrimer that functions in anaerobic conditions, or a GlpD homodimer that functions in aerobic conditions.
