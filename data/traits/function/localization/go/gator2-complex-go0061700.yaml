identifier: GO:0061700
label: "GATOR2 complex"
definition: >-
  A multiprotein subcomplex of the GATOR complex that regulates TORC1 signaling by interacting with the Rag GTPase. In human, this complex consists of WDR24, WDR59, MIOS, SEH1L, and SEC13. In S. cerevisiae, this complex is referred to as SEACAT and contains the Sea2p, Sea3p, Sea4p, Seh1p, Sec13p proteins.
