identifier: GO:1990006
label: "amorphous vesicle"
definition: >-
  A cytoplasmic membrane-bounded vesicle first described in dendrites, categorized by smooth membranes, electron-lucent interiors and irregular shapes. Sometimes occurs in clumps. Amorphous vesicles have been found to contain material taken up from the extracellular space, therefore suggesting that they may be part of the endosomal pathway.
