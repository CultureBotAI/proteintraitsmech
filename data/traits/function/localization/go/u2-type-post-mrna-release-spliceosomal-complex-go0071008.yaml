identifier: GO:0071008
label: "U2-type post-mRNA release spliceosomal complex"
definition: >-
  A spliceosomal complex that is formed following the release of the spliced product from the post-spliceosomal complex and contains the excised intron and the U2, U5 and U6 snRNPs.
