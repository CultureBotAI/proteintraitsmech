identifier: GO:0071761
label: "IgZ immunoglobulin complex"
definition: >-
  A protein complex composed of two identical immunoglobulin heavy chains of the IgZ isotype and two identical immunoglobulin light chains, held together by disulfide bonds. The IgZ isotype is also known as the IgT isotype in certain species of fish.
