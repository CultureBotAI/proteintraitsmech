identifier: GO:0099164
label: "postsynaptic specialization membrane of symmetric synapse"
definition: >-
  The membrane component of the postsynaptic specialization of a symmetric synapse. This is the region of the postsynaptic membrane in which the population of neurotransmitter receptors involved in synaptic transmission are concentrated.
