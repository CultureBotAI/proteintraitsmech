identifier: GO:0044677
label: "methyl-tetrahydromethanopterin:coenzyme M methyltransferase complex"
definition: >-
  A protein complex consisted of eight polypeptides. This complex catalyzes the formation of methyl-coenzyme M and H4MPT from N5-methyl-H4MPT and CoM during methanogenesis.
