identifier: GO:0120002
label: "fusiform vesicle"
definition: >-
  A cytoplasmic vesicle which contains two urothelial plaques and can deliver these plaques to the apical plasma membrane of urothelial superficial (umbrella) cells. It can also be formed by endocytosis of apical plasma membrane during contractions of the urinary bladder.
