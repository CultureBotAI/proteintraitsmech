identifier: GO:0170069
label: "geranylgeranyltransferase-III complex"
definition: >-
  A protein-containing complex that catalyzes the transfer of a geranyl-geranyl group from geranylgeranyl pyrophosphate to a mono-farnsylated substrate. In humans, the complex is comprised of a prenyltransferase alpha subunit, PTAR1 and beta subunit, RabGGTB, while in budding yeast the prenyltransferase complex contains Ecm9p, the alpha subunit and Bet2p, the beta subunit.
