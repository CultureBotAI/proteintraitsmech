identifier: GO:0062128
label: "MutSgamma complex"
definition: >-
  A heterodimer involved in the stabilization of DNA recombination intermediates, the promotion of crossover recombination, and the proper assembly of the synaptonemal complex in meiotic prophase nuclei. In yeast the complex consists of two subunits, Msh4 and Msh5.
