identifier: GO:7770013
label: "humanin receptor complex"
definition: >-
  A protein complex that acts as a receptor for the neuroprotective peptide humanin (HN). In humans the receptor complex is a trimer composed of CNTFR, IL6ST and IL27RA. HN binding to IL27RA and CNTFR induces oligomerization of the three subunits.
