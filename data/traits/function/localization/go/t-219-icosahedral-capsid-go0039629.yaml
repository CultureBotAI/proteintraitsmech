identifier: GO:0039629
label: "T=219 icosahedral capsid"
definition: >-
  The protein coat that surrounds the infective nucleic acid in some virus particles where the subunits (capsomeres) are arranged to form an icosahedron with T=219 symmetry. T=219 icosahedral capsid is composed of 12 pentameric and 2180 hexameric capsomeres for a total of 13140 capsid proteins.
