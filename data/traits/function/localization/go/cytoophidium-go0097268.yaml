identifier: GO:0097268
label: cytoophidium
definition: >-
  A filamentous, membrane-less subcellular structure composed primarily of polymerized metabolic enzymes, most notably cytidine triphosphate synthase (CTPS). Cytoophidia are evolutionarily conserved structures found across archaea, bacteria, and eukaryotes.
