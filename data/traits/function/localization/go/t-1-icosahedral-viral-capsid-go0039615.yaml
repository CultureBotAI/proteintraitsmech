identifier: GO:0039615
label: "T=1 icosahedral viral capsid"
definition: >-
  The protein coat that surrounds the infective nucleic acid in some virus particles where the subunits (capsomeres) are arranged to form an icosahedron with T=1 symmetry. The T=1 capsid is composed of 12 pentameric capsomeres.
