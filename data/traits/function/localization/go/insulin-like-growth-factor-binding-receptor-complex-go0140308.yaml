identifier: GO:0140308
label: "insulin-like growth factor binding receptor complex"
definition: >-
  A plasma membrane-localized protein complex that binds insulin-like growth factors (IGF1 or IGF2). This class includes both signaling receptor complexes, such as the insulin-like growth factor 1 receptor (IGF1R) complex, which possesses intrinsic tyrosine kinase activity and initiates intracellular signaling cascades upon ligand binding, and non-signaling receptor complexes such as the insulin-like growth factor 2 receptor (IGF2R), which functions to sequester IGF2 and regulate its bioavailability by directing it to lysosomal degradation. These complexes regulate cell growth, proliferation, survival, and development by modulating IGF signaling.
