identifier: GO:0062073
label: "histone mRNA stem-loop binding complex"
definition: >-
  A protein-containing complex composed of a stem-loop binding protein (in most species SLBP) and its interacting partner (SLIP1 or MIF4GD in most species) that binds to the histone mRNA (hmRNA) 3-prime-stem-loop structure. Facilitates hmRNA translation initiation and may also be involved in its processing and nuclear export.
