identifier: GO:0035808
label: "meiotic recombination initiation complex"
definition: >-
  A protein complex that initiates the formation of double-strand breaks (DSBs) required for meiotic recombination. Consists of a protein that catalyses formation of the double-strand breaks (Spo11 in S. cerevisiae and Rec12 in S. pombe), and a number of accessory proteins.
