identifier: GO:0071597
label: "cellular birth scar"
definition: >-
  Crater-like ring of chitinous scar tissue located on the surface of the daughter cell, in budding fungi, at the site of separation from the mother cell. It is formed after the newly emerged daughter cell separates, thereby marking the site of cytokinesis and septation.
