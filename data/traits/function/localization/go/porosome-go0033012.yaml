identifier: GO:0033012
label: porosome
definition: >-
  A permanent cup-shaped structure at the cell plasma membrane in secretory cells. Following a secretory stimulus, secretory vesicles transiently dock and fuse at the base of porosomes and release intravesicular contents dictated by the turgor pressure generated from the swelling of secretory vesicles.
