identifier: GO:0097569
label: "lateral shield"
definition: >-
  Region of the ventral side of the cell body found in Giardia species (trophozoite stage). It is located posterior on either side of the ventral groove; the upper boundary is the ventral disc, and the lower boundary is marked by the posteriolateral flagella.
