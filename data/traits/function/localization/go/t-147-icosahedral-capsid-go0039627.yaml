identifier: GO:0039627
label: "T=147 icosahedral capsid"
definition: >-
  The protein coat that surrounds the infective nucleic acid in some virus particles where the subunits (capsomeres) are arranged to form an icosahedron with T=147 symmetry. T=147 icosahedral capsid is composed of 12 pentameric and 1460 hexameric capsomeres for a total of 8820 capsid proteins.
