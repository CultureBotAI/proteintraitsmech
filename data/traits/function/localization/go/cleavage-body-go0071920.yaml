identifier: GO:0071920
label: "cleavage body"
definition: >-
  A nuclear body that contains proteins involved in pre-mRNA 3'-end cleavage and polyadenylation, such as DDX1, CSTF2 and CPSFs, as well as the transcription factors TFIIE and TFIIF. Cleavage bodies are localized adjacent to Cajal bodies and are involved in mRNA3'-end processing.
