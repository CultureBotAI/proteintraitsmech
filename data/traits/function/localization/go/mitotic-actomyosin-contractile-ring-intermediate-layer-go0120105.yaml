identifier: GO:0120105
label: "mitotic actomyosin contractile ring, intermediate layer"
definition: >-
  The region of the mitotic actomyosin ring in between the proximal layer and the actin filament layer. This region contains the accessory protein network, some actin filaments and connections between the proximal layer and the actin filament layer.
