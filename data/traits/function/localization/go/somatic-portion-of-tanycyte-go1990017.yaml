identifier: GO:1990017
label: "somatic portion of tanycyte"
definition: >-
  Portion of a tanycyte that lies within the ependyma and contains the nucleus. A tanycyte is a specialized elongated ventricular ependymal cell that has processes that extend to the outer, or pial, surface of the CNS.
