identifier: GO:1990011
label: "laminated body"
definition: >-
  Inclusion body characterized by regularly spaced sheets of tubules arranged in a whorl pattern resembling a fingerprint. Laminated bodies have been observed in neurons of the lateral geniculate nucleus.
