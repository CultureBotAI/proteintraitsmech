identifier: GO:0032280
label: "symmetric synapse"
definition: >-
  A synapse that lacks an electron dense postsynaptic specialization. In vertebtrates, these occur primarily on dendrite shafts and neuronal cell bodies and involve persynapses containing clusters of predominantly flattened or elongated vesicles and are typically inhibitory.
