identifier: GO:0048493
label: "plasma membrane-derived thylakoid ribulose bisphosphate carboxylase complex"
definition: >-
  A complex, located in the plasma membrane-derived thylakoid, containing either both large and small subunits or just small subunits. It carries out the activity of producing 3-phosphoglycerate from carbon dioxide and ribulose-1,5-bisphosphate.
