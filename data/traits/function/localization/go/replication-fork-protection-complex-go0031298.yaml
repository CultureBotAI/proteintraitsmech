identifier: GO:0031298
label: "replication fork protection complex"
definition: >-
  A heterotrimeric replication-pausing complex conserved in eukaryotes and associated with the replication fork; the complex stabilizes stalled replication forks and is thought to be involved in coordinating leading- and lagging-strand synthesis and in replication checkpoint signaling. Required for maximal fork speed both in vivo and in vitro.
