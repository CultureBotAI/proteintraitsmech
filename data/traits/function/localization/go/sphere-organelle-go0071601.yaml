identifier: GO:0071601
label: "sphere organelle"
definition: >-
  A nuclear body that is found in the germinal vesicles of amphibian oocytes, and consist of three major parts: a remarkably spherical body about 5-10 pm in diameter, smaller spherical or nearly spherical granules on the surface, and inclusions of various sizes that strongly resemble the surface granules. The parts of the sphere organelle have distinct compositions, including splicing snRNAs and proteins.
