identifier: MI:1273
label: "maximal genetic epistasis"
definition: >-
  An effect in which individual perturbations of two different genes result in the same mutant phenotype to varying degrees of severity/penetrance and the resulting phenotype of their combination is equal in severity/penetrance to the most severe/penetrant of the individual perturbations. With respect to any single quantifiable phenotype, this may be expressed as an inequality as:\nab = a* < b < wt\nOR\nwt < b < a* = ab\nwhere 'a' and 'b' are the observed phenotype values of the individual perturbations ('a*' being the most severe of the two), 'ab' is the observed phenotype value of the double perturbation, and 'wt' is the wild type phenotype value.
definition_source: PSI-MI
trait_axis: FUNCTION
trait_category: FUNC_INTERACTION_PARTNER
term_kind: CLASS
mapping_status: SEEDED
