identifier: MI:2400
label: "monophenotypic neutral multigenic phenotype result"
definition: >-
  A phenotype result in which only one of two perturbations results in the phenotype in question and the phenotype of the combined perturbations a and b result in the expected phenotype, namely the same phenotype as the single perturbation that exhibits that phenotype. The interpretation is that no interaction was observed between the two genes, for the indicated phenotype. With respect to any single quantifiable phenotype, this may be expressed as an inequality as:\nab = a ≠ wt = b [E = a]\nwhere 'a' and 'b' are the observed phenotype values of the individual perturbations, 'ab' is the observed phenotype value of the double perturbation, 'E' is the expected phenotype value of the double perturbation, and 'wt' is the wild type phenotype value.
definition_source: PSI-MI
trait_axis: FUNCTION
trait_category: FUNC_INTERACTION_PARTNER
term_kind: CLASS
mapping_status: SEEDED
