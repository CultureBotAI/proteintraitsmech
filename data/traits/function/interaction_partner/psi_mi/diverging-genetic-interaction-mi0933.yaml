identifier: MI:0933
label: "diverging genetic interaction"
definition: >-
  An effect in which two genetic perturbations, when combined, result in a phenotype that is more severe/penetrant than expected given the phenotypes of the individual perturbations. With respect to any single quantifiable phenotype, this may be expressed as an inequality as:\nab < E <= wt\nOR\nwt <= E < ab\nwhere 'ab' is the observed phenotype value of the double perturbation, 'E' is the expected phenotype value of the double perturbation, and 'wt' is the wild type phenotype value.
definition_source: PSI-MI
trait_axis: FUNCTION
trait_category: FUNC_INTERACTION_PARTNER
term_kind: CLASS
mapping_status: SEEDED
