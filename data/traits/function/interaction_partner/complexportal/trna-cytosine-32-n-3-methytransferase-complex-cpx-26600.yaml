identifier: ComplexPortal:CPX-26600
label: "tRNA (cytosine(32)-N(3))-methytransferase complex"
definition: >-
  S-adenosyl-L-methionine (SAM)-dependent methyltransferase responsible for N3-methylcytidine modification of cytosine-32 of the tRNA anticodon loop of cytosolic tRNA(Ser). SARS1 acts as the tRNASer substrate selection factor for METTL6, increasing its methylation activity. The activity of METTL6 does not appears to depend on the serylation activity of SARS1. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
