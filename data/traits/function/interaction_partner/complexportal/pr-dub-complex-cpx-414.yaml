label: "PR-DUB complex"
definition: >-
  A polycomb repressive deubiquitinase complex that specifically mediates deubiquitination of histone H2A (but not H2B) monoubiquitinated at Lys-119 (H2AK119ub1) in nucleosomes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
