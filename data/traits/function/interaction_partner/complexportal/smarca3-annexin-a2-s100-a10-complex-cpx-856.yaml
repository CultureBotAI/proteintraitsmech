identifier: ComplexPortal:CPX-856
label: "SMARCA3 - Annexin A2 - S100-A10 complex"
definition: >-
  A transcription factor complex that mediates neurogenic and behavioral responses to selective antidepressant serotonin-reuptake inhibitors. The core tetramer of annexin A2 - S100A10 (CPX-853) anchors the complex to the inner nuclear membrane while HLTF/SMARCA3 binds to promoter sequences. HLTF's DNA binding affinity is enhanced by the interaction with annexin A2 and S100-A10. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
