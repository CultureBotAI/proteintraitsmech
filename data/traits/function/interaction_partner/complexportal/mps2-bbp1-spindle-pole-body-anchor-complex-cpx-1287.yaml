identifier: ComplexPortal:CPX-1287
label: "MPS2-BBP1 spindle pole body anchor complex"
definition: >-
  Key mediator of the link between the nuclear envelope and the spindle pole body (SPB), anchoring the SPB to fusion sites of the inner nuclear membrane and outer nuclear membrane. Forms higher molecular weight assemblies with other SPB proteins (MPS3/P47069, SPC29/P33419) which hold the SPB in the nuclear envelope. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
