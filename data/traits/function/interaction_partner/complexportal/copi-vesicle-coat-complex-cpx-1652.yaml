identifier: ComplexPortal:CPX-1652
label: "COPI vesicle coat complex"
definition: >-
  Coats vesicles which bud from the Golgi membrane and subsequently transport proteins from the cis end of the Golgi complex back to the rough endoplasmic reticulum (ER), where they were originally synthesized (retrograde transport), and between Golgi compartments. The complex binds to di-lysine motifs and reversibly associates with Golgi non-clathrin-coated vesicles, which further mediate biosynthetic protein transport from the ER, via the Golgi to the trans Golgi network. Cargo containing the sorting motifs KKXX and KXKXX interact with COPI to form carriers. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
