identifier: ComplexPortal:CPX-26388
label: "DAXX-ATRX histone H3-specific chaperone complex"
definition: >-
  ATP-dependent chromatin remodeling complex which promotes the replication-independent incorporation of H3.3 into telomeric, pericentromeric, and other repetitive DNA regions. DAXX acts as the targeting subunit recognising a combination of the methylation states of H3K9 and H3K4 and associating with CBX5. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
