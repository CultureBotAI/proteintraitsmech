identifier: ComplexPortal:CPX-8444
label: "ZNT7 proton-coupled zinc antiporter complex"
definition: >-
  Proton-coupled zinc ion antiporter which mediates zinc entry from the cytosol into the lumen of the endoplasmic reticulum. Supply zinc to nascent ectoenzymes in the early secretory pathway including alkaline phosphatases, ecto-5'-nucleotidase NT5E (P21589) and ENPP2 (Q13822). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
