identifier: ComplexPortal:CPX-7845
label: "Glycine receptor complex, GLRA3-GLRB"
definition: >-
  Ligand-gated chloride channel, the activation of which results in a chloride ion flow across the membrane regulated by the chloride ion equilibrium potential. This induces membrane hyperpolarization which, in turn, inhibits neuronal activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
