identifier: ComplexPortal:CPX-154
label: "BUB1-BUB3 complex"
definition: >-
  Present throughout the cell cycle, this complex promotes spindle assembly checkpoint signalling. The spindle checkpoint ensures accurate chromosome segregation by sending a signal from an unattached kinetochore to inhibit anaphase onset. BUB3 localizes and binds to to kinetochore protein SPC105 via its phosphorylated MELT motif (a motif conforming to the consensus M-[E/D]-[L/I/V/M]-T). The presence of BUB1 positively contributes to the interaction by reducing the BUB3-SPC105 binding affinity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
