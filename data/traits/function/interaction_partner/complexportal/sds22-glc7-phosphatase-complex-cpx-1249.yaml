identifier: ComplexPortal:CPX-1249
label: "SDS22-GLC7 phosphatase complex"
definition: >-
  Protein phosphatase complex implicated in acting in opposition to the Chromosomal Passenger complex (CPX-1900) at the kinetochore. Glc7 dephosphorylation of kinetochore proteins promotes mitotic spindle attachment. The opposing Chromosomal Passenger complex and Glc7 activities ensure that chromosomes achieve a bipolar attachment to the spindle. SDS22 appears to both act as a targeting subunit for the enzyme and also to regulate phosphatase activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
