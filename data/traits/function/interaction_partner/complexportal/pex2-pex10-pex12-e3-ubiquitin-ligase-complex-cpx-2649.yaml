identifier: ComplexPortal:CPX-2649
label: "PEX2-PEX10-PEX12 E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin-ligase complex which forms a retrotranslocation channel required for the export of the PEX5 peroxisomal import -receptor (P50542) from peroxisomes to the cytosol, promoting PEX5 recycling. When receptor recycling is compromised, the receptor is polyubiquitylated by the complex, extracted from the ligase channel by another ATPase, and degraded by the proteasome. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
