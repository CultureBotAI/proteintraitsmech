identifier: ComplexPortal:CPX-8132
label: "VCP-VCPIP1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Appears to play a role in the reassembly of Golgi stacks after mitosis and the formation of the transitional endoplasmic reticulum.The VCP-NSFL1C AAA ATPase complex (CPX-262) requires the deubiquitylase activity of CCPIP1 for postmitotic Golgi cisternae regrowth and Golgi structure maintenance in interphase. Formation of this complex appears to cause the dissociation of the VCP-NSFL complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
