identifier: ComplexPortal:CPX-580
label: "mRNA capping enzyme complex"
definition: >-
  Catalyzes the first step in mRNA cap formation. Consists of two subunits: an RNA 5'-triphosphatase (RTPase) and GTP:mRNA guanylyltransferase (GTase). The GTase subunit (CEG1) binds to the phosphorylated carboxyl-terminal domain of the largest subunit (CTD-P) of RNA polymerase II, coupling capping with transcription. CEG1 bound to the CTD-P is inactive unless allosterically activated by interaction with the RTPase subunit (CET1). CET1 removes the gamma-phosphate from the 5' end of the RNA substrate to leave a diphosphate end. CEG1 subsequently transfers the GMP moiety of GTP to the 5' end of RNA via an enzyme-GMP covalent reaction intermediate to form the structure GpppN1-.mRNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
