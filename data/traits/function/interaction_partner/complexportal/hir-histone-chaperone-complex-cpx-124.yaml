identifier: ComplexPortal:CPX-124
label: "HIR histone chaperone complex"
definition: >-
  Histone chaperone complex which promotes nucleosome assembly. Cooperates with the ASF1 (P32447) co-chaperone to deposit histone (H3/H4)2 tetramers on DNA for replication-independent chromatin assembly. Prevents SWI/SNF chromatin remodeling activity. Binds to and represses transcription of histone genes throughout the cell cycle, but does not repress transcription in G1/S phase. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
