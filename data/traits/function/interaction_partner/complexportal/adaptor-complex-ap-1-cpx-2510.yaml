identifier: ComplexPortal:CPX-2510
label: "Adaptor complex AP-1"
definition: >-
  Adaptor complex that orchestrates the formation of membrane coats that mediate cargo selection and vesicle budding, for example by linking clathrin to the membrane surface of trans-Golgi network vesicles. AP-1 is specific for trafficking between the trans-Golgi network and endosomes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
