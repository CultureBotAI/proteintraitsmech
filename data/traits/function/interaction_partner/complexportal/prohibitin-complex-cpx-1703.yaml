identifier: ComplexPortal:CPX-1703
label: "Prohibitin complex"
definition: >-
  Chaperone which functions to protect the cell from imbalances in the production of mitochondrial proteins by stabilizing newly synthesised mitochondrial-encoded proteins. Prohibitin-deficient cells have a reduced replicative lifespan, associated with mitochondrial decline and display morphological changes of aging. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
