identifier: ComplexPortal:CPX-1646
label: "G protein heterotrimer"
definition: >-
  Inactive form of the G protein signal-transmitting component in the pheremone response pathway. Activation of the Ste2 receptor by mating pheromone leads to GTP binding and dissociation of the G protein alpha subunit (GPA1) from the G protein beta and gamma subunits (CPX-1645). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
