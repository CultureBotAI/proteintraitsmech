identifier: ComplexPortal:CPX-26689
label: "Nuclear Ferritin complex, FTH1"
definition: >-
  Complex is critical for storing and releasing iron in a controlled manner, thereby maintaining iron homeostasis and protecting cells from oxidative damage. Intracellularly, it preserves iron in a non-toxic, soluble, and readily available form, but ferritin is also found in circulation, particularly in the serum, where its level reflects body iron stores. Complex contains a metal-binding ferroxidase center that catalyzes the oxidation of Fe2+ to Fe3+, allowing iron to be safely stored inside the ferritin cavity. This heavy-chain-rich complex supports rapid iron oxidation and detoxification, whereas complexes containing both heavy and light chains favor long-term iron mineral storage (CPX-26673). In the nucleus, heavy-chain ferritin helps protect DNA and chromatin from iron-mediated oxidative damage while maintaining local iron balance. Ferritin degradation enables the cell to reutilize stored iron and occurs primarily through ferritinophagy, a selective form of autophagy mediated by the cargo receptor NCOA4 (see complex CPX-14323). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
