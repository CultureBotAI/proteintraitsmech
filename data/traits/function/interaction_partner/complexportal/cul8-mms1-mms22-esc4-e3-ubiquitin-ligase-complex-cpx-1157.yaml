identifier: ComplexPortal:CPX-1157
label: "CUL8-MMS1-MMS22-ESC4 E3 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex required for the ubiquition of acetylated histone H3, thus facilitating nucleosome assembly during replication and promoting replication progression during S-phase. RTT107 may recruit and help load the complex onto a DNA damage site at or near a stalled replication fork. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
