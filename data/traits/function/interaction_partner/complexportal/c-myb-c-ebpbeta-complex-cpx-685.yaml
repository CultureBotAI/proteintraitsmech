identifier: ComplexPortal:CPX-685
label: "c-Myb-C/EBPbeta complex"
definition: >-
  A transcriptional regulatory complex. Interactions between c-Myb and the Cebpb homodimer enable or enhance their cooperative binding and enables Cebpb bound to one site to interact with Myb at another site separated by 80 base pairs. The complex is mainly active in hematopoetic cells and is essential for myeloid differentiation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
