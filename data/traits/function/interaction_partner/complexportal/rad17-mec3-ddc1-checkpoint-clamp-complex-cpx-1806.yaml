identifier: ComplexPortal:CPX-1806
label: "Rad17-Mec3-Ddc1 checkpoint clamp complex"
definition: >-
  Enables the DNA repair pathways to restore the integrity of the DNA prior to DNA synthesis or separation of the replicated chromosomes. Associates with sites of DNA damage and modulates the MEC1 signaling pathway and the activation of RAD53 in response to DNA damage at phase G1. Loads onto DNA in an ATP-dependent manner through its interaction with the RAD24-RFC checkpoint clamp loader complex (CPX-1807). The comples is reported as showing no detectable exonuclease activity. The complex also physically regulates DNA polymerase zeta-dependent mutagenesis by controlling the access of polymerase zeta to damaged DNA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
