label: "Follicle Stimulating Hormone, type 2 dominant negative receptor complex"
definition: >-
  Gonadotropin dominant negative receptor complex. Follicle stimulating hormone (FSH) mediates a diverse range of functions by binding to one of four FSH receptor (FSHR) isoforms. The physiological significance of the alternatively-spliced isoform 2 FSHR (FSHR-2) is yet to be determined, and while it binds FSH with high affinity, it lacks the ability to activate inhibitory G (Gi) proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
