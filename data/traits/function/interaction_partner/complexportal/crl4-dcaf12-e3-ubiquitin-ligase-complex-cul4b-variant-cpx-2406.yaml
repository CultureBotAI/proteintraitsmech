identifier: ComplexPortal:CPX-2406
label: "CRL4-DCAF12 E3 ubiquitin ligase complex, CUL4B variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF12. The complex is active in the regulation of autophagy by ubiquitinating and targeting for destruction MAGEA3 (P43357) and MAGEA6 (P43360) activators of RING-type zinc finger-containing E3 ubiquitin-protein ligases that acts as repressors of autophagy. Regulates HIPPO pathway-mediated cellular proliferation and apoptosis by targeting YP1 (P46937) for ubiquitination. Regulates spermatogenesis and T-cell activation by ubiquitinating the MOV10 (Q9HCE1) helicase, thus effecting miRNA gene silencing. Recognizes a specific motif, a degron, which is less then 10 amino acids long and contains a diglutamate (Glu-Glu) and is present in the C-terminus of substrate proteins. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
