identifier: ComplexPortal:CPX-5052
label: "Ubiquitous AP-3 Adaptor complex, sigma3b variant"
definition: >-
  Adaptor complex that links clathrin to the membrane surface of endosomal vesicles and is required for the biogenesis of specialized organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. Once RAB32 (Q13637) and RAB38 (P57729) are activated by BLOC-3 (CPX-5043), they interact with AP-3, AP-1 (CPX-5047, CPX-5048 and CPX-5049) and BLOC-2 (CPX-5044) complexes which function as adaptor complexes on early/recycling endosome tubules, where cargoes are loaded into vesicles or transport intermediates and transported to nascent melanosomes and platelet dense granules. Defects in AP-3 are related to the Hermansky-Pudlak syndrome. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
