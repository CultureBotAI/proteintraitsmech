identifier: ComplexPortal:CPX-1342
label: "SET3C histone deacetylase complex"
definition: >-
  Histone deacetylase complex important in regulating gene induction during stress response, such as changes in carbon sources, nitrogen starvation and DNA damage. SET3C binds to the histone marker H3K4me2 either in the 5' region of the open reading frames or in the promoter regions of some genes, replacing H3K4me3. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
