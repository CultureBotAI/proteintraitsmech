identifier: ComplexPortal:CPX-5780
label: "lambdaN-dependent processive transcription antitermination complex"
definition: >-
  Enables lambdoid phages to switch from immediate-early to delayed-early gene expression during lytic growth, allowing the RNA polymerase (RNAP) enzyme to read through intrinsic and rho-dependent terminators. The lambdaN protein binds and reorganizes RNAP components, and repositions nusA on RNAP, thereby redirecting nascent RNA and sequestering the upstream branch of a terminator hairpin. Formation of this complex may also hinder RNA engagement of termination factor rho (P0AG30) and/or obstruct rho translocation on the transcript. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
