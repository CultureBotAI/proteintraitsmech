identifier: ComplexPortal:CPX-1158
label: "GABA-B receptor complex"
definition: >-
  G-protein-coupled, metabotropic transmembrane receptor for gamma-aminobutyric acid (GABA). Within the heterodimeric GABA receptor, only gbb-1 seems to bind agonists, while gbb-2 mediates coupling to G proteins. Ligand binding causes a conformation change that triggers signaling via guanine nucleotide-binding proteins (G proteins) and modulates the activity of down-stream effectors, such as adenylate cyclase. Signaling inhibits adenylate cyclase, stimulates phospholipase A2, activates potassium channels, inactivates voltage-dependent calcium-channels and modulates inositol phospholipid hydrolysis. Plays a critical role in the fine-tuning of inhibitory synaptic transmission. Pre-synaptic GABA receptor inhibits neurotransmitter release by down-regulating high-voltage activated calcium channels, whereas postsynaptic GABA receptor decreases neuronal excitability by activating a prominent inwardly rectifying potassium (Kir) conductance that underlies the late inhibitory postsynaptic potentials. May couple to the G(o) alpha G-protein goa-1 (P51875) to negatively regulate cholinergic receptor activity in the presence of high levels of acetylcholine in ventral cord motor neurons. As acetylcholine depolarizes body wall muscles, modulation of acetylcholine levels most likely results in the control of locomotory behavior. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
