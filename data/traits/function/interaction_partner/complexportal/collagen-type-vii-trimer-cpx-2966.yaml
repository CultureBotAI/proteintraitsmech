identifier: ComplexPortal:CPX-2966
label: "Collagen type VII trimer"
definition: >-
  Synthesized by keratinocytes. The non-collagenous NC1 domain has been shown to bind basement membrane type IV collagen. Forms anchoring fibrils which may contribute to epithelial basement membrane organization and adherence. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
