identifier: ComplexPortal:CPX-1968
label: "Molybdopterin-synthase adenylyltransferase complex"
definition: >-
  Involved in molybdopterin cofactor (Moco) biosynthesis under anaerobic conditions. MoeB catalyses the adenylation of MoaD by ATP, activating the C terminus of the MoaD subunit of molybdopterin synthase (CPX-1970) to form MoaD-adenylate, which is subsequently converted to a thiocarboxylate for the generation of the dithiolene group of molybdopterin. . Receives a sulfur moiety from iscS (P0a6b7). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
