identifier: ComplexPortal:CPX-3229
label: "CLOCK-BMAL1 transcription complex"
definition: >-
  Transcription factor complex which interacts with E-box regulatory elements in target genes, including Period (Per1, Per2, Per3) and Cryptochrome (Cry1, Cry2), to activate their transcription during the daytime. The CRY-PER complexes (CPX-3219, CPX-3220, CPX-3221, CPX-3222, CPX-3223, CPX-3224) then inhibit CLOCK-BMAL1-driven transcription in a negative feedback loop to generate circadian rhythms. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
