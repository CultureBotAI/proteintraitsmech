identifier: ComplexPortal:CPX-26514
label: "Casein kinase II, ckb1 variant"
definition: >-
  Serine/threonine-protein kinase complex involved in regulation of cell cycle progression. CK2 may also have role(s) in inhibiting apoptosis. Phosphorylates serine or threonine residues proximal to acidic amino acids (consensus Ser-Xaa-Xaa-Acidic where acidic residue may be Glu, Asp, pSer or pTYr). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
