identifier: ComplexPortal:CPX-2643
label: "Adducin complex, alpha-gamma variant"
definition: >-
  Associated exclusively with the plasma membrane where it binds the spectrin-actin complex, rather than spectrin or actin alone. Acts as an assembly factor that recruits and promotes the formation of the spectrin-actin membrane skeleton, attracting additional spectrin to the assembly lattice, and bundling and capping the fast-growing barbed end of actin filaments to prevent the addition or loss of actin subunits alpha/beta assembles are ubiquitously expressed. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
