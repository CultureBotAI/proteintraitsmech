identifier: ComplexPortal:CPX-3321
label: "SIN3A histone deacetylase complex"
definition: >-
  A histone deacetylation complex (HDAC) that promotes viability in normal and neoplastic cells by negatively regulating gene expression especially of genes regulating G1/S and G2/M cell cycle transitions as well as cell differentiation. Probably does not directly bind to DNA but is recruited to gene promoters by specific transcription factor such as REST (Q13127), RB (P06400), HBP1 (O60381), the Myc-inhibitors MXI1 (P50539) and MAD1 (Q9Y6D9), Klf13 (Q9Y2Y9), FOXK1 (P85037) and FOXK2 (Q01167) as well as with the nuclear hormone repressors, N-CoR (O75376) and SMRT (Q9Y618) and/or SWI/SNF chromatin remodelling complexes. Binds H3K4me2 and H3K4me3 histones via subunits ING1 and ING2 and hypoacetylated histones via subunits RBBP4 and RBBP7. Unlike the SIN3B complex (CPX-3322) it is found in differentiated cells as well as in embryonic stem cells. May include several accessory proteins such as BAHCC1 (Q9P281), BBX (Q8WY36), IRS4 (O14654), PHF23 (Q9BUL5), SAP18 (O00422) and TNRC18 (O15417). A curated stable macromolecular complex (Complex Portal) with 15 subunits.
