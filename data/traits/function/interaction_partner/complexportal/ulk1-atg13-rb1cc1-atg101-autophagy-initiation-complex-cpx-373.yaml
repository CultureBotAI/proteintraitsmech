identifier: ComplexPortal:CPX-373
label: "ULK1-ATG13-RB1CC1-ATG101 autophagy initiation complex"
definition: >-
  Serine/threonine-protein kinase complex required for pre-autophagosomal structure assembly in response to starvation. Ultimately facilitates sequestration of cytoplasmic proteins and organelles for bulk degradation via autophagy and mitophagy, respectively. Under glucose starvation conditions activated through phosphorylation of ULK1 on Ser-317 by AMPK complex. Under amino acid starvation conditions ULK1 and ATG13 are phosphorylated by mTORC1. Activated ULK1 represses mTORC1 kinase activity via phosphorylation of RPTOR (Q8N122, subunit of mTORC1 complex) and phosphorylates ATG13, RB1CC1 and itself. Under nutrient-rich conditions inhibited through phosphorylation of ATG13 and ULK1 on Ser-683 and Ser-758 by RPTOR and AMPK complex, leading to cell proliferation and cell mass increase. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
