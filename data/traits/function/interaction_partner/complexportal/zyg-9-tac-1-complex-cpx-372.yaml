identifier: ComplexPortal:CPX-372
label: "Zyg-9/Tac-1 complex"
definition: >-
  Microtubule stabilizing complex that functions during the early stages of embryonic development to regulate microtubule assembly throughout the cell cycle. Specifically, the complex is required for the formation and growth of astral microtubules and spindle microtubles during mitotic spindle assembly. Thought to function in a partially redundant manner with the Tac-1/Zyg-8 complex to regulate microtubule assembly and processes during interphase, mitosis and meiosis in one-cell stage embryos. The complex directly binds to centosomes throughout the cell cycle and the kinetochore of metaphase and early anaphase chromosomes. At anaphase, the complex is required for mitotic spindle positioning in one-cell stage embryos. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
