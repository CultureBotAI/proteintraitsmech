label: "KRAS-RAF1, MAPK-cascade signal initiation complex"
definition: >-
  Serine/threonine kinase complex which reg complex which regulates diverse cellular processes, including proliferation, differentiation, and survival. Active, membrane-bound KRAS binds and recruits RAF1 to the membrane, initiating the canonical KRAS-RAF1-MEK-ERK, MAPK signalling cascade. RAF1 activation (via dimerization) leads to sequential phosphorylation of MEK and then ERK. Activated ERK moves into the nucleus to regulate gene expression through phosphorylation of transcription factors. Mutations that maintain KRAS in its active, GTP-bound state drive constitutive MAPK pathway signaling and promote oncogenesis; KRAS represents the most frequently mutated oncogene in human cancers, accounting for approximately 80% of RAS-driven tumors. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
