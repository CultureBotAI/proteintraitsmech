identifier: ComplexPortal:CPX-1980
label: "H-NS-Cnu transcription factor complex"
definition: >-
  Functions as a transcription factor that negatively regulates a range of bacterial genes. May modulate filamentous growth by antagonizing the binding of dicA (P06966) to a putative operator sequence on its own gene promoter. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
