identifier: ComplexPortal:CPX-1627
label: "RAVE complex"
definition: >-
  Mediates both the biosynthetic assembly and the glucose-induced reassembly of the V-ATPase (CPX-1193). Binds to V1 released from the vacuolar membrane by glucose deprivation and releases V1 upon glucose readdition. Appears to be aiding cytosolic V1 complexes to assemble with V0 at the membrane. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
