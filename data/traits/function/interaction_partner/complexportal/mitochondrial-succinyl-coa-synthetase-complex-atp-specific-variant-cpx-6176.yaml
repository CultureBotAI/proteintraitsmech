identifier: ComplexPortal:CPX-6176
label: "Mitochondrial succinyl-CoA synthetase complex, ATP-specific variant"
definition: >-
  Catalyzes the reversible phosphorylation/dephosphorylation of Succinyl-CoA. Couples the hydrolysis of succinyl-CoA to the synthesis of ATP in the citric acid cycle (TCA) and thus represents the only step of substrate-level phosphorylation in the TCA . A curated stable macromolecular complex (Complex Portal) with 2 subunits.
