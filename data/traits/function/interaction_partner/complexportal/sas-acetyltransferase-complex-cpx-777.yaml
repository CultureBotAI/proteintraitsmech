identifier: ComplexPortal:CPX-777
label: "SAS acetyltransferase complex"
definition: >-
  Histone acetyltransferase (HAT) complex capable of acetylating both free histones and nucleosomes, although the nucleosomal HAT activity of SAS complex is relatively weak. Exclusively acetylates Lys-16 of histone H4 and may provide a barrier to Sir (silent information regulator) proteins that would prevent adjacent euchromatic regions from being transcriptionally inactivated. The complex appears to assemble in the nucleus, following the separate import of the components. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
