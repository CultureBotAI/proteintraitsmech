identifier: ComplexPortal:CPX-5674
label: "Transcription elongation complex"
definition: >-
  RNA polymerase (RNAP)-containing complex that suppresses transcription termination and accelerates the rate of transcription elongation and folding of ribosomal RNA. During elongation, the sigma factor is replaced by nupA and nupG binding to RNAP and enhances RNAP pausing at specific sites. nusA also binds to rRNA just downstream to the single stranded BOXA motif. nusB appears to enhance nusE binding to BOXA RNA and the RNA polymerase complex. NusG increases the RNA chain elongation rate. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
