label: "Mitotic spindle assembly checkpoint Mad1 complex"
definition: >-
  Stimulates assembly of the mitotic checkpoint complex. which prevents premature chromosome segregation until all kinetochores have obtained connections to spindle microtubules. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
