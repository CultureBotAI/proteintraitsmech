identifier: ComplexPortal:CPX-2484
label: "bZIP transcription factor complex, BACH2-MAFF"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The DNA recognition sequence depends on the composition of the bZIP dimer with the complex either binding to the preferred region of one of the partners or to a novel bZIP cognate site. Acts as a transcriptional repressor binding to the MARE (Maf recognition element) site in gene promoters during specific stages of B-cell development and in neuronal cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
