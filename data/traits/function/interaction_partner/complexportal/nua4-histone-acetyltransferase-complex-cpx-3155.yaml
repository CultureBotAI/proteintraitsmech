identifier: ComplexPortal:CPX-3155
label: "NuA4 histone acetyltransferase complex"
definition: >-
  Essential gene regulatory acetyltransferase with ATPase, DNA helicase and structural DNA binding activities. NuA4 histone acetyltransferase (HAT) complex is involved in epigenetic transcriptional activation of selected genes principally by acetylation of nucleosomal histones H4, H3, H2B, H2A and H2A variant H2A.Z. Acetylates histone H4 to form H4K5ac, H4K8ac, H4K12ac and H4K16ac, histone H3 to form H3K14ac, histone H2B to form H2BK16ac, histone H2A to form H2AK4ac and H2AK7ac, and histone variant H2A.Z to form H2A.ZK14ac. Acetylation of histone H4 is essential for DNA double-strand break repair through homologous recombination. Involved in cell cycle progression. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
