identifier: ComplexPortal:CPX-216
label: "Neuronal nicotinic acetylcholine receptor complex, alpha4-alpha5-beta2"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous nicotinic agents. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Mediates fast, short-lived, predominantly post-synaptic (PMID:8461135) transmission of neurotransmitters. Mainly found in Central Nervous System. Has limited nicotine sensitivity compared to alpha4-beta2 receptor and is insensitive to pro-inflammatory cytokines, such as TNF-alpha or IL-1beta. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
