identifier: ComplexPortal:CPX-502
label: "Beta-hexosaminidase A complex"
definition: >-
  Hydrolyses the terminal non-reducing N-acetyl-D-hexosamine residues, such as N-acetylglucosamine and N-acetylgalactosamine, which are beta-linked to oligosaccharides, glycolipids, glycoproteins, and glycosaminoglycans (GAGs). Facilitates the degradation of GAGs in lysosomes of the central and peripheral nervous system. Member of the Family 20 glycoside hydrolases (glycosidase). Active on water-soluble and amphiphilic glycoconjugates such as sulfated GAG fragments, and the sulfated glycosphingolipid SM2 (CHEBI:90163). Only the heterodimeric complex HEX A is able to remove N-acetylgalactosamine from the ganglioside GM2 (CHEBI:60327), a molecule composed of a glycosphingolipid with a single sialic acids linked on the sugar chain found in high concentrations in neuronal cell plasma membranes. Works in association with the GM2A (P17900) which extracts single GM2 molecules from membranes and presents them in soluble form to the enzyme or hydrolyses sulphated, membrane-bound substrates. Intra-lysosomal accumulation of GM2 ganglioside leads to severely debilitating neurodegeneration associated with Tay-Sachs disease, Sandoff disease and AB variant. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
