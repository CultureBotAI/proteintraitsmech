identifier: ComplexPortal:CPX-2808
label: "Coagulation factor VIIa - tissue factor complex"
definition: >-
  A serine-type endopeptidase complex of the extrinsic blood coagulation pathway (tissue factor pathway) whose formation in the plasma membrane initiates the blood coagulation process by initiating the cell-surface assembly and propagation of the coagulation protease cascade. Activates coagulation factors IX (P00740) and X (P00742) by limited proteolysis to form active factors IXa (CPX-4945) and Xa (CPX-6215). Selectively cleavages of Arg-|-Ile bonds in factor X to form factor Xa. The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form of factor VII is activated by selective cleavage of Arg-|-Ile bonds to form active factor VIIa. Activation is triggered by trauma and minor proteolysis by thrombin (FIIa, P00734), factor Xa (P00742), factor XIa (P03951) and factor XIIa (P00748). Also constitutively activated at very low levels. Inhibited by complex formation with TFPI (P10646/P48307) and factor Xa. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
