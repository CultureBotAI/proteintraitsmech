identifier: ComplexPortal:CPX-10221
label: "Interleukin-19 receptor-ligand complex"
definition: >-
  Cytokine receptor complex that polarizes adaptive immunity to promote an anti-inflammatory phenotype. IL19 binding to its receptor complex, IL20RA-IL20RB initiates downstream signalling mediated by JAK1, Tyk2 and STAT3 (P40763) phosphorylation. IL19 inhibits IFNG (P01579) production by down-regulating antigen presenting capacity and enhancing M2 macrophage polarization to promote T helper 2 (Th2) cell differentiation through IL4 (P05112) and IL13 (P35225) up-regulation and suppression of Th1 and Th17 cell differentiation. The bioactive complex is formed through crosstalk between IL19 cytokine producing immune cells and receptor complex expressing epthelial cells and in particular, vascular cells, in which it is thought to exhibit vasculo-protective effects. IL19 exerts contrasting effects on immunity wherein it exerts anti-inflammatory effects to hamper hyperactivation of innate and acquired immunity in inflammatory bowel disease (IBD) but exacerbates disease by a positive feedback loop in the case of asthma. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
