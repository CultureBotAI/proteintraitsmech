label: "R2SP co-chaperone complex"
definition: >-
  Co-chaperone required for liprin-alpha2/PPFIA2 (O75334) expression and for the assembly of liprin-alpha2 complex. This co-chaperone is particularly expressed in testis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
