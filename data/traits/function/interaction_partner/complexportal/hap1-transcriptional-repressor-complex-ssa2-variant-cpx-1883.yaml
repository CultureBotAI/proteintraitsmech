identifier: ComplexPortal:CPX-1883
label: "HAP1 transcriptional repressor complex, SSA2 variant"
definition: >-
  Represses the transcriptional activity of HAP1 in the absence of haem. When haem concentration increases, haem enhances the interaction of Hsp90 with HAP1 and binds to HAP1, causing conformational changes in the multi-chaperone-HAP1 complex and leading to HAP1 activation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
