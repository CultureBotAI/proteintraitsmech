label: "MutSgamma meiotic recombination complex"
definition: >-
  Binds to double Holliday Junctions and other DNA repair intermediates. Binding physically entraps at least one, and possibly two, duplexes of double-stranded DNA, thereby stabilising the recombination intermediate. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
