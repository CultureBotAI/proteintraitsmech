label: "Integrin alpha3-beta3 complex"
definition: >-
  Class 1 transmembrane receptors involved in bi-directional signaling to mediate cell-cell and cell-extracellular matrix (ECM) adhesion. Inside-out signaling mainly acts to bring the integrin into their active conformations whereas outside-in signalling involving integrins are associated with protein kinase activities. The 24 functional receptors are obligate heterodimers derived from a family of 18 alpha subunits and 8 beta subunits. Grouping into subgroups is based on ligand-binding properties or the subunit composition. Ligands for integrin alpha-3/beta-3 include laminin and RGD-sequence containing proteins like fibronectin, vitronectin and fibrinogen. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
