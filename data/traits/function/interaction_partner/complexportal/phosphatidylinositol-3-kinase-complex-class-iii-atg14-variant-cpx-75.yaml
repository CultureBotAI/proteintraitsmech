identifier: ComplexPortal:CPX-75
label: "Phosphatidylinositol 3-kinase complex, class III, ATG14 variant"
definition: >-
  A phosphatidylinositol 3-kinase complex that specifically phosphorylates 1-phosphatidyl-1D-myo-inositol(1-) (CHEBI:57880 ) in an ATP- and Mn(2+)-dependent manner. Plays a key role in initiation and maturation of autophagosomes, involved in the transport of lysosomal enzyme precursors to lysosomes, required for transport from early to late endosomes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
