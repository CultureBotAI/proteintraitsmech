identifier: ComplexPortal:CPX-2688
label: "UTP-B complex"
definition: >-
  Required for early co-transcriptional events in ribosome biogenesis, acting as an RNA chaperone to initiate ribosome assembly. May facilitate specific U3 snoRNA-5'-external transcribed spacer (ETS) base-pairing with PWP2 bridging the interaction site. A sub-unit of the small subunit (SSU) processome, a 2.2 MDa ribonucleoprotein complex involved in the processing, assembly and maturation of nascent pre-ribosomal RNA to form the small ribosomal subunit. The SSU processome is a giant particle composed of numerous ribosome assembly factors, including the UTP-A (CPX-2450), UTP-B, and MPP10 (CPX-2478) complexes, the U3 small nucleolar ribonucleoprotein (snoRNP) and many individual proteins. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
