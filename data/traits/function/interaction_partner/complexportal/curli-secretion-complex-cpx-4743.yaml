identifier: ComplexPortal:CPX-4743
label: "Curli secretion complex"
definition: >-
  Secretion complex required for the production of Curli, a class of functional amyloid fibers that serve as protein scaffolds in the extracellular biofilm matrix. Unstructured CSGA (P28307), the major curli subunit, is transported into the periplasmic space by the SecYEG translocon (CPX-1096) and maintained in a soluble, secretion-competent state by CSGC prior to delivery to the outer membrane CSGG pore by the periplasmic accessory protein CSGE. CSGE assembles into a nonameric ring that caps the periplasmic vestibule of the CSGG pore. The GSGE-GSGG pore fully or partially entraps the 129-residue CSGA, leads to a decrease in its conformational space, creating an entropic potential favouring polypeptide folding and facilitating its entropy-driven diffusion across the outer membrane. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
