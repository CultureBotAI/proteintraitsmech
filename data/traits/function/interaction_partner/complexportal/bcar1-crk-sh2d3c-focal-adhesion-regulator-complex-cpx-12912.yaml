identifier: ComplexPortal:CPX-12912
label: "BCAR1-CRK-SH2D3C, focal adhesion regulator complex"
definition: >-
  Focal adhesion regulator complex. SH2D3C acts as an adaptor to bridge Cas family protein BCAR1 (a scaffolding protein) with the signalling molecule CRK to form a signalling hub which regulates integrin-mediated cell adhesion, spreading and migration. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
