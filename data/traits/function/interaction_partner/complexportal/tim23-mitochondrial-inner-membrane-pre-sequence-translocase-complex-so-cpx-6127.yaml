identifier: ComplexPortal:CPX-6127
label: "TIM23 mitochondrial inner membrane pre-sequence translocase complex, sort variant"
definition: >-
  Major pre-protein translocase in the inner membrane of mitochondria, mediates the translocation of N-terminal, positively charged pre-sequence-containing proteins. Proteins in which the charged sequence is followed by a hydrophobic sorting signal are laterally transferred and inserted into the inner membrane. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
