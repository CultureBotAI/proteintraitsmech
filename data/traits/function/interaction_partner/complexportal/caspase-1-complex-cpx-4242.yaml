identifier: ComplexPortal:CPX-4242
label: "Caspase-1 complex"
definition: >-
  A pro-inflammatory thiol protease complex that is activated in response to pathogen infections and toxins. Primarily acts in monocytes and macrophages. Activation by autocatalytic cleavage is an ATP-dependent reaction and occurs within an activation platform, the Inflammasome (CPX-4241, CPX-4243, CPX-4244, CPX-4261, CPX-4266, CPX-4269, CPX-4270 and CPX-4271). Once activated, it has a strict requirement for an Asp residue at position P1 and preferred cleavage sequence of Asp-Glu-Val-Asp-|-. It cleaves interleukins 1beta (Il1b, P10749) and Il18 (P70380) between an Asp and an Ala, releasing the mature cytokines which are involved in a variety of inflammatory processes. Cleaves and activates sterol regulatory element binding proteins (SREBPs). Related to, but independent of, Il1b activation it is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves Gsdmdc1 (Q9D8T2). However, as a side effect of pyroptosis active Il1b is often released form the dead cells and therefore some link exists between both activities. While primarily a pro-inflammatory caspase it can also promote apoptosis in non-immune cells, especially in response to brain, kidney and renal cell injury. Caspase-1-deficient mice are protected from several acute and chronic inflammatory diseases, including sepsis and colitis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
