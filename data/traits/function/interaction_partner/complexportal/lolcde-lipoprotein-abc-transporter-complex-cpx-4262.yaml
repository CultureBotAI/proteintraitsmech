identifier: ComplexPortal:CPX-4262
label: "LolCDE lipoprotein ABC transporter complex"
definition: >-
  Mediates the detachment of outer membrane-specific lipoproteins from the inner membrane. The recognition of lipoproteins by LolC and/or LolE occurs on the periplasmic side of the inner membrane. LolD hydrolyses ATP on the cytoplasmic side of the inner membrane providing the driving force for the release reaction. Member of a small subclass of eukaryote-type (EK-type) ABC transporters that uses mechano-transmission to perform work in the periplasm rather than for transmembrane transport. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
