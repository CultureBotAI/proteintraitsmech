identifier: ComplexPortal:CPX-4061
label: "NLGN1(-SSA-SSB) - NRXN1-beta(-SS4) complex"
definition: >-
  A cell adhesion complex that forms at synaptic clefts and mediates trans-synaptic signaling. Composed by binding of the extracellular domains of two presynaptic neurexin proteins and two postsynaptic neuroligin proteins. Expression of both subunits is regulated by neuronal activity. Required for synaptic differentiation, maturation and maintenance, dendritic spine remodelling and axon arborisation. Possibly required for synapse formation. Mediates bidirectional synaptic signalling and coupling of presynaptic, Ca2+-dependent synaptic vesicle exocytosis (= neurotransmitter release) with postsynaptic neurotransmitter receptor recruitment. Acts as a molecular switch between excitatory and inhibitory synapses: this complex acts primarily, but not exclusively, on GABAergic, inhibitory synapses that mainly release neurotransmitters GABA and glycine. Mainly found in synaptic clefts of the central nervous system but also at neuromuscular junctions (particularly alpha neurexin-containing complexes). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
