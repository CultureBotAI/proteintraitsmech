label: "PPP4C-PPP4R1 protein phosphatase 4 complex"
definition: >-
  PP2A-type phosphatase implicated in a variety of critical biological processes including regulation of histone deacetylase 3 activity and microtubule growth at the centrosome via dephosphorylation of NDEL1 (Q9GZM8). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
