identifier: ComplexPortal:CPX-5028
label: "Intraflagellar transport complex B"
definition: >-
  IFT particles, composed of the IFT-A and IFT-B (CPX-5022) complexes, enable bidirectional motility along axoneme microtubules essential for the formation (ciliogenesis) and maintenance of cilia that assemble within a membrane projection from the cell surface. Outward or anterograde movement from the cell body to the ciliary tip is powered by kinesin-2 while the inward or retrograde movement back to the cell body is powered by cytoplasmic Dynein-2 motor. Required to recruit Tulp3 (O88413) to primary cilia to allow entry into cilia of G protein-coupled receptors (GPCRs). Interacts with the BBSome complex (CPX-1909) to mediate ciliary transport. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
