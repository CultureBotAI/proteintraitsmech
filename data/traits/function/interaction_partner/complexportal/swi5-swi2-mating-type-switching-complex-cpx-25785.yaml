identifier: ComplexPortal:CPX-25785
label: "SWI5-SWI2 mating-type switching complex"
definition: >-
  Selectively enables one of two cis-acting recombination enhancers, SRE2 adjacent to mat2-P or SRE3 adjacent to mat3-M thus designating a preferred heterochromatic donor cassette, mat2-P or mat3-M in a cell-type-specific manner.. Homothallic strains are either of the P or M mating-type and switch their mating type during vegetative growth. The complex localizes to SRE3 independently of Swi6 (P40381) or to SRE2 which is dependent on the presence of Swi6, to promote the strand exchange reaction required for mating-type switching. May also stimulate Rad51(P36601)-driven strand invasion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
