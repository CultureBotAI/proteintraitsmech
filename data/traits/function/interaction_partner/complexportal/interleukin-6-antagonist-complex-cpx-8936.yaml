identifier: ComplexPortal:CPX-8936
label: "Interleukin-6 antagonist complex"
definition: >-
  Principal member of the IL-6 superfamily, a multifunctional cytokine which promotes T cell activation, B cell differentiation and modulates acute-phase responses. IL-6 plays fundamental roles in immune response, inflammation, hematopoiesis, and bone homeostasis under homeostatic conditions. Dimeric IL-6 has an increased affinity for soluble IL-6RA but are thought to have a decreased ability to bind IL6ST/gp130, and thus considered an IL-6 antagonist. Binding of the monomeric form of IL-6 to its specific IL-6RA and the signal-tranducing glycoprotein component IL6ST results in three distinct modes of IL-6-mediated signalling: classic IL-6 signalling, trans-IL-6 signalling and cluster-IL-6 signalling. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
