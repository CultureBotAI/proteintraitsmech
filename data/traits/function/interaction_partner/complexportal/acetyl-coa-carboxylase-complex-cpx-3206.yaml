identifier: ComplexPortal:CPX-3206
label: "Acetyl-CoA carboxylase complex"
definition: >-
  Biotin-dependent, multifunctional enzyme that catalyzes the first committed step in fatty acid synthesis.The overall reaction is the biotin-dependent carboxylation of acetyl-CoA to form malonyl-CoA. The first half-reaction catalyzed by biotin carboxylase, is an ATP-dependent carboxylation of biotin, which is covalently attached to biotin carboxyl carrier protein. The second half-reaction, catalyzed by carboxyl transferase, transfers the activated carboxyl group from carboxy-biotin to acetyl-CoA to form malonyl-CoA. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
