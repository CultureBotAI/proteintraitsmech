identifier: ComplexPortal:CPX-265
label: "Telomerase holoenzyme complex"
definition: >-
  A reverse transcriptase complex that is essential for maintenance of telomeres. Catalytic subunit TERT and RNA template TERC (CPX-17) are essential for telomerase activity, adding telomeric repeats (TTAGGG) at chromosome ends to compensate for the telomere loss that is caused by incomplete genome end replication Elongates the single-stranded G-rich 3' protruding ends of chromosomal DNA using TERC RNA as a template. WRAP53 (also known as TCAB1, Q9BUR4) binds to the CAB box in TERC and facilitates localization of the telomerase complex to Cajal bodies. In S-phase, telomerase holoenzyme complex is targeted from Cajal bodies to telomeres by binding of TERT to the shelterin subunit, ACD (Q96AP0). A curated stable macromolecular complex (Complex Portal) with 7 subunits.
