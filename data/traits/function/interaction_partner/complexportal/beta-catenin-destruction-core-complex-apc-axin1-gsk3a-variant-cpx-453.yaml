identifier: ComplexPortal:CPX-453
label: "Beta-catenin destruction core complex, Apc-Axin1-Gsk3a variant"
definition: >-
  Phosphorylates cytoplasmic beta-catenin (Ctnnb1, Q02248) in the absence of WNT-signalling, thus positively controlling its continuous proteasome-mediated degradation. Csnk1a1 phosphorylates Ctnnb1 on Ser-45 and primes successive phosphorylation of Thr-41, Ser-37, and Ser-33 by GSK3. Phosphorylation of Ctnnb1 promotes its subsequent ubiquitination which targets the protein for degradation by the proteasome. Without Wnt, Axin is also phosphorylated by GSK3, and thereby kept in an active, open conformation for beta-catenin binding and degradation. Upon Wnt stimulation, the ternary Wnt-Fz-Lrp6 complex is formed and recruits the scaffold protein Dvl and the beta-catenin destruction complex. As a result, GSK3 is inhibited, Ctnnb1 is not ubiquitinated and accumulates in the nucleus, where it acts as a coactivator for transcription factors of the Tcf/Lef family, leading to activation of Wnt responsive genes. Gsk3a is normally excluded from the nucleus and appears to only accumulate there, and regulate Ctnnb1 levels, following activation of calpain in response to calcium levels. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
