identifier: ComplexPortal:CPX-1694
label: "PCL2-PHO85 kinase complex"
definition: >-
  Cyclin-dependent protein kinase essential for the control of the cell cycle at the G1/S (start) transition. Phosphorylates RVS167 which functions in actin cytoskeleton regulation and is required for the formation of endocytic vesicles at the plasma membrane. Positively controls degradation of sphingoid long chain base kinase LCB4 (Q12246) by phosphorylation, which is required for its ubiquitination and degradation. LCB4 catalyses the formation of sphingoid long-chain base 1-phosphates which have roles in roles in heat stress resistance, diauxic shift, and Ca2+ mobilization. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
