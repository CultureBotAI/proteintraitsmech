identifier: ComplexPortal:CPX-26356
label: "DNA replication factor C complex, CHTF18 variant"
definition: >-
  DNA-dependent ATPase clamp-loader complex specific for leading strand DNA synthesis but also establishing cohesion between sister chromatids. Binds the leading strand DNA POLE (Q07864) which stimulates the complex to load DNA polymerase processivity factor PCNA (P12004, CPX-538) onto primed and gapped leading strand DNA in an ATP-dependent manner. CTF18-RFC has a lower PCNA loading activity than the canonical RFC complex (CPX-415). A curated stable macromolecular complex (Complex Portal) with 7 subunits.
