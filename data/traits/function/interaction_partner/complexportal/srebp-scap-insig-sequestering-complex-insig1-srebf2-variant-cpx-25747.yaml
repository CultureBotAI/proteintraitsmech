identifier: ComplexPortal:CPX-25747
label: "SREBP-SCAP-INSIG sequestering complex, INSIG1-SREBF2 variant"
definition: >-
  When the cell is enriched with cholesterol, the SCAP SREBF2 complex (CPX-25721) is anchored in the endoplasmic reticulum (ER) by formation of the SREBP-SCAP-INSIG complex. The association between SCAP and INSIG requires oxysterols such as 25-hydroxycholesterol or, less favorably, cholesterol Under conditions of low sterols, INSIG-SCAP disassociate and the SREBP-SCAP complex is translocated by COPII (CPX-2360)-coated vesicles from the ER to the Golgi where SREBF2 is proteolytically cleaved and freed from the membrane to activate the transcription of genes involved in cholesterol biosynthesis. INSIG1 is transcriptionally regulated by SREBPs and is abundant in cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
