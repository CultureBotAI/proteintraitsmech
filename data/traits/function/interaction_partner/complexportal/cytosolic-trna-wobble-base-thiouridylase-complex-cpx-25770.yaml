identifier: ComplexPortal:CPX-25770
label: "Cytosolic tRNA wobble base thiouridylase complex"
definition: >-
  Required for the 2-thiolation of cytosolic tRNA, specifically the uridine at the first anticodon position (U34) of glutamate, lysine, and glutamine tRNAs, which is believed to be crucial for both restriction of wobble in the corresponding split codon box and efficient codon-anticodon interaction. May act by catalyzing the adenylation of tRNAs. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
