identifier: ComplexPortal:CPX-503
label: "mTORC1 complex"
definition: >-
  Serine/threonine protein kinase complex that regulates cellular metabolism, growth and survival in response to hormones, growth factors, nutrients, energy and stress signals by way of, directly or indirectly, affecting the phosphorylation of at least 800 proteins. Key pathways regulated by mTORC1 include: protein synthesis by phosphorylating key regulators of mRNA translation and ribosome synthesis; pyrimidine biosynthesis pathway; ribosome synthesis by activating RNA polymerase III-dependent transcription; lipid synthesis; mitochondrial biogenesis to maintain energy homeostasis; negative regulation of autophagy; feedback control on upstream growth factor signaling; regulation of microtubules. Inactivated by Rapamycin, stress and starvation, which, consequently, induces autophagy and ensures that cells grow only during favourable conditions. mTORC1 plays a role in cancer and obesity. Subcellular localization varies and may ensure precise spatial and temporal control of cell growth. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
