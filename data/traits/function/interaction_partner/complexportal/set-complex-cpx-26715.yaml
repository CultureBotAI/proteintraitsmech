identifier: ComplexPortal:CPX-26715
label: "SET complex"
definition: >-
  Multifunctional chromatin-associated complex which translocates from the endoplasmic reticulum to the nucleus in response to superoxide generation by granzyme A to maintain cellular homeostasis. Regulates both genome stability and chromatin structure, and apoptotic pathways. Participates in nucleosome remodelling and transcriptional repression through the histone-chaperone and histone acetyltransferase inhibitory activities of SET and ANP32A, while HMGB2 contributes DNA-bending and chromatin-architectural functions that facilitate access to regulatory regions. APEX1 provides base-excision repair activity, and TREX1 contributes 3'->5' exonuclease function, enabling coordinated processing of damaged or mislocalized DNA. NME1 supports the complex through nucleotide homeostasis and metastasis-suppressor signalling roles. Implicated in genomic stress responses, autoimmunity, and oncogenic transformation. Granzymes released from cytotoxic cells are thought to shift the activity of the SET complex from a role in base-excision repair to one that promotes cell death. Under non-granzyme conditions, the complex may participate in DNA repair responses to oxidative damage. Granzymes drive apoptosis by blocking the complex’s base-excision repair activity and inducing widespread DNA damage. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
