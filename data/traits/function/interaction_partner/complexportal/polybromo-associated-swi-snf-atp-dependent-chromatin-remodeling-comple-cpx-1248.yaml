identifier: ComplexPortal:CPX-1248
label: "Polybromo-associated SWI/SNF ATP-dependent chromatin remodeling complex, ACTL6A variant"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. The precise process is undefined but the complex appears to reduce the superhelicity of the promoter region DNA around nucleosomes and may produce short DNA loops that are detached from the the nucleosomes, enabling access to the promoter region for a range of transcription factors and the pre-initiation complex (PIC). The complex also plays a role in double-strand break and nucleotide excision repair mechanisms and in the decatenation of newly replicated sister chromatids, a requirement for proper chromosome segregation during mitosis. Also targeted to chromatin by phosphatidylinositol-4,5-bisphosphate which promotes the complex binding to actin filaments. The complex additionally interacts with a range of nuclear receptors and the vitamin D receptor (Vdr, P48281) via Smarcd subunits. pBAF complexes facilitate the ligand-dependant transcriptional activation of target genes by nuclear hormone receptors and regulates cell differentiation, esp. in cardiac development. Acts as transcriptional repressor of neuronal genes in non-neuronal cells by interacting with the REST repressor complex and histone deacetylases (HDACs). The SWI/SNF complexes have been reported as consisting of 8 to 14 subunits. pBAF exists in two variants, containing either Actl6a (this complex) or Actl6b (CPX-1250) subunit. Subunit Brd7 may be restricted to pBAF complexes in embryonic stem cells and not present in differentiated cells. The alternative ATPase, Smarca2/Brm (Q6DIC0), does not occur in the pBAF complexes. Smarcd1 (Baf60a) and Smarcd2 (Baf60b) may not co-occur. It is not clear if Bcl7a (Q9CXE2), Bcl7b (Q921K9), Bcl7c (O08664) or Smarcd3 (Q6P9Z1) are part of any pBAF variants. Mutations in several subunits affect tissue and developmental processes such as nervous system and cardiac development and maintenance of pluripotency resulting in tumorigenesis or the development of intellectual disorders. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
