identifier: ComplexPortal:CPX-6264
label: "Fanconi anemia ID complex"
definition: >-
  Required for the repair of DNA interstrand crosslinks (ICL) and related lesions. Binds to DNA with a preference for branched structures, including Holliday-junctions, overhangs and replication-forks. ICL repair is activated when a replication fork stalls at an ICL, triggering monoubiquitination of the complex by the Fanconi Anemia ubiquitin ligase (CPX-6263), with one ubiquitin molecule being conjugated to each protein subunit. This may convert the ID complex into a clamp that can slide away from its initial location, potentially enabling downstream nucleases and other factors to act on the ICL. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
