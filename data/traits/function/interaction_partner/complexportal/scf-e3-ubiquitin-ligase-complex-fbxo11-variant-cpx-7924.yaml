identifier: ComplexPortal:CPX-7924
label: "SCF E3 ubiquitin ligase complex, FBXO11 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO11 target proteins include DTL (Q9NZJ0), a substrate-specific adapter of DDB1-CUL4-DTL (CPX-2795/CPX-2777) E3 ubiquitin-protein ligase complex required for cell cycle control, DNA damage response and translesion DNA synthesis. NEDDylates TP53 (P04637) Lys-320, Lys-321 resulting in the selective inhibition of p53 transcriptional activity, and influencing nuclear export by preventing p53 monoubiquitination. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
