identifier: ComplexPortal:CPX-1647
label: "SF3B complex"
definition: >-
  Spliceosomal complex, an essential factor for splicing of pre-mRNA. Part of the U2 snRNP as well as the U11/U12 di-snRNP. Present in the pre-spliceosomal A complex and the fully assembled catalytic active spliceosomes. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
