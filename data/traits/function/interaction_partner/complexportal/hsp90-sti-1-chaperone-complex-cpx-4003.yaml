identifier: ComplexPortal:CPX-4003
label: "Hsp90-sti-1 chaperone complex"
definition: >-
  A chaperone complex that may be required for the proper folding, maturation and stabilization of target proteins. As in yeast (but not in human), the complex in C.elegans exhibits little ATP hydrolysis activity due to the binding of sti-1 to daf-21/Hsp90, which inhibits the ATPase of daf-21/Hsp90. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
