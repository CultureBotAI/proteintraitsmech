identifier: ComplexPortal:CPX-2572
label: "Tubulin polyglutamylase complex"
definition: >-
  Catalyzes the formation of polyglutamate side chains of variable lengths on the gamma-carboxyl group of specific glutamate residues within the C-terminal tail of tubulin.The glutamyl side chain then elongates through the successive addition of glutamate residues to the alpha-carboxyl group of the preceding glutamate. Polyglutamylated microtubules consist of different alpha- and beta-tubulin subunits with varied number of added glutamate residues and regulates the interaction of microtubules with microtubule-associated proteins and molecular motors. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
