identifier: ComplexPortal:CPX-3090
label: "Glutathione-regulated potassium-efflux system KefB-KefG complex"
definition: >-
  Potassium efflux pore which protects the bacteria from the toxic effects of electrophilic compounds which react with nucleophiles found in the bases of DNA and the side chains of proteins, especially cysteine. Potassium efflux via KefB is accompanied by H+ and Na+ influx and hence causes acidification of the cytoplasm. KefB is activated by glutathione adducts and inactivated by glutathione which bind to the cytosolic regulatory K+ transport and nucleotide binding domain of KefB. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
