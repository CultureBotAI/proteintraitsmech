identifier: ComplexPortal:CPX-26732
label: "Myosin class II complex, MYL1-MYL2-MYH1 variant"
definition: >-
  Building block of the fast skeletal muscle class II myosin bipolar filament, responsible for ATP-dependent sliding of actin filaments during muscle contraction. Forms a hexameric motor complex composed of two myosin heavy chains (MHC) associated with two essential light chains (MLC) and two regulatory light chains (MLC-2). The myosin heavy chain motor domains mediate ATP-dependent interaction with F-actin, while the neck region, stabilized by bound light chains, acts as a rigid lever arm that amplifies conformational changes within the motor domain into a large mechanical power stroke, generating force and directed movement along actin filaments. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
