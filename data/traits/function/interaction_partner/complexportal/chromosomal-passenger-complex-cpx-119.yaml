identifier: ComplexPortal:CPX-119
label: "Chromosomal passenger complex"
definition: >-
  Serine/threonine kinase complex which ensures chromosome bi-orientation on the mitotic spindle during metaphase by phosphorylating multiple kinetochore components. It destabilizes monopolar attachments by phosphorylating key proteins at the kinetophore. The chromosomal passenger complex (CPC) regulates chromosome segregation and cytokinesis. Disruption of any of its four members from the complex results in structural impairment and subsequent mislocalization of the CPC. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
