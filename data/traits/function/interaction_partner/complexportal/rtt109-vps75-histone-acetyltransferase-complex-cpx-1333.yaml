identifier: ComplexPortal:CPX-1333
label: "RTT109-VPS75 histone acetyltransferase complex"
definition: >-
  Histone acetyltransferase complex that acetylates lysines-9, -27 and possibly -56 on newly synthesized histone H3 during S-phase to mediate nucleosome assembly during DNA replication and DNA repair. Complex formation is required for full activity with VPS75, ensuring that RTT109 is efficiently localized in the nucleus, and presenting histones to RTT109 for acetylation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
