identifier: ComplexPortal:CPX-269
label: "Cytochrome bd-II ubiquinol oxidase complex"
definition: >-
  A protein complex integral to the bacterial electron transport chain. Electrons are donated by the oxidation of ubiquinol to ubiquinone and used to reduce molecular oxygen, generating a proton motive force using protons and electrons from opposite sides of the membrane to generate water. This complex appears to be expressed under micro-aerobic conditions or under conditions of phosphate starvation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
