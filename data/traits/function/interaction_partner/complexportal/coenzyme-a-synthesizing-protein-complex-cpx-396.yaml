identifier: ComplexPortal:CPX-396
label: "Coenzyme A-synthesizing protein complex"
definition: >-
  Catalyses multiple steps in the coenzyme A (CoA) biosynthetic pathway, with the CAB3 protein potentially acting as a scaffold to which other enzymes bind. This may be a larger complex, also incorporating the Phosphopantothenoylcysteine decarboxylase complex (CPX-393) but this is not yet clear. The synthesis of CoA involves the phosphorylation of pantothenate (vitamin B5) to 4'-phosphopantothenate, to which a cysteine is then added to form 4'-phospho-N-pantothenoylcysteine (PCC). PPC is decarboxylated to 4'-phosphopantetheine by phosphopantothenoylcysteine decarboxylase (CPX-393). 4'-phosphopantetheine is adenylylated to form dephospho-CoA which is then phosphorylated to form coenzyme A. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
