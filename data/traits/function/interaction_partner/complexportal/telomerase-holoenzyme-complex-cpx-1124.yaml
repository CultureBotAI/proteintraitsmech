identifier: ComplexPortal:CPX-1124
label: "Telomerase holoenzyme complex"
definition: >-
  A reverse transcriptase complex that is essential for maintenance of telomeres. Catalytic subunit Tert and RNA template terc (CPX-19) are essential for telomerase activity. Elongates the single-stranded G-rich 3-prime protruding ends of chromosomal DNA using Terc RNA as a template. Terc, Dkc1, Gar1, Nhp2 & Nop10 form the box H/ACA telomerase ribonucleoprotein (RNP) complex which then binds to Tert forming the telomerase holoenzyme complex. Wrap53 (also known as Tcab1, Q8VC51) binds to the CAB box in Terc and facilitates localization of the telomerase complex to Cajal bodies. In S-phase, telomerase holoenzyme complex is targeted from Cajal bodies to telomeres by binding of Tert to the shelterin subunit, Acd (Q5EE38). A curated stable macromolecular complex (Complex Portal) with 6 subunits.
