identifier: ComplexPortal:CPX-2604
label: "LIN-10-LIN-2-LIN-7 complex"
definition: >-
  Scaffolding complex which appears to act as a major organization hub for modulating cellular functions with PDZ domains, an SH3-GK tandem, and a PTB domain not involved in complex formation and thus available for binding to various target proteins. Regulates polarized protein sorting in epithelial cells and mediates basolateral membrane localization of the EGF receptor Let-23 (P24348) in vulval epithelial cells, which is required for vulval development,. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
