identifier: ComplexPortal:CPX-1423
label: "COX1 pre-assembly complex"
definition: >-
  Binds to and stabilizes COX1 (P00401) during the assembly of mitochondrial respiratory chain complex IV/cytochrome C oxidase (CPX-1721/CPX-1722). The process is probably catalyzed by assembly chaperones such as SHY1 (P53266) and COA1 (P40452). The complex also acts to trap the COX1-mRNA-specific translational activator, MSS51, thus rendering it incompetent to support translation of COX1. On further maturation of the assembly intermediate, MSS51 dissociates and can stimulate further rounds of COX1 mRNA translation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
