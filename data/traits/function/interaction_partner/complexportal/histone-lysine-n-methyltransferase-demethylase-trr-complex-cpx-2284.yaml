identifier: ComplexPortal:CPX-2284
label: "Histone-lysine N-methyltransferase/demethylase TRR complex"
definition: >-
  Histone lysine methyltransferase complex which methylates lysine-4 on the histone H3 tail at important regulatory regions in the genome and thus modulates chromatin structures and DNA accessibility. Distinct H3K4 methylation states resulting in activation of cis-regulatory enhancer elements that control the transcriptional regulation of developmental genes. The UTX subunit is a histone demethylase that specifically demethylates trimethylated and dimethylated Lys-27 of histone H3, enabling nej (Q9W321)-mediated H3K27 acetylation. Methylation of Lys-4 and concomitant demethylation of Lys-27 regulates the recruitment of the PRC1 complex (CPX-2578/CPX-2590) and monoubiquitination of histone H2A. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
