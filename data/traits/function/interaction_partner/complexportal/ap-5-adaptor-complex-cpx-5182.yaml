identifier: ComplexPortal:CPX-5182
label: "AP-5 Adaptor complex"
definition: >-
  Adaptor complex that forms a non clathrin-associated coat on vesicles and is involved in endosomal trafficking. AP-5 is expressed at lower levels than AP-1, -2 and -3 complexes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
