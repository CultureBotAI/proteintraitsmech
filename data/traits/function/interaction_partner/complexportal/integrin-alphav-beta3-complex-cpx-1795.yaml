identifier: ComplexPortal:CPX-1795
label: "Integrin alphav-beta3 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for vitronectin, cytotactin, fibronectin, fibrinogen, laminin, matrix metalloproteinase-2, osteopontin, osteomodulin, prothrombin, thrombospondin and von Willebrand factor which its binds via the sequence R-G-D in the ligand. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
