identifier: ComplexPortal:CPX-2261
label: "TREX transcription-export complex"
definition: >-
  Selectively binds maturing mRNA at the messenger ribonucleoprotein complex 5'-end, splice junctions, and 3'-end. Lcenses mRNA for nuclear export by loading the global mRNA-export factor NXF1-NXT. Essential for the biogenesis of piRNA, a distinct class of small noncoding RNAs that control expression of transposable elements (TEs) in the Drosophila germline. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
