identifier: ComplexPortal:CPX-3167
label: "Laminin-311 complex variant B"
definition: >-
  Major component of basment membranes which binds to cells via a high affinity, cell-surface receptor. Role in the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. Assembles into fibrils in a process which requires GTPase activity and the involvement of the actin network. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
