identifier: ComplexPortal:CPX-1037
label: "DNA mismatch repair MutSalpha complex"
definition: >-
  Mismatch repair complex, involved in the recognition and repair of base-base and small insertion/deletion mismatches that appear as a consequence of DNA polymerase errors during DNA synthesis. The complex is most effective at repairing mismatches on the lagging strand of replication. Binding to a mismatched DNA which can bend, leads to stable association of MSH2 with DNA, inhibition of its ATP activity and formation of ATP-bound MSH2-MSH6 sliding clamps. When MSH6 is bound to mismatched DNA and MSH2 to ATP, the complex can recruit MutLalpha and initiate the repair process. Binding of MSH2-MSH6 to a mismatch and provides a recognition signal for interactions with repair proteins that are involved in subsequent steps. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
