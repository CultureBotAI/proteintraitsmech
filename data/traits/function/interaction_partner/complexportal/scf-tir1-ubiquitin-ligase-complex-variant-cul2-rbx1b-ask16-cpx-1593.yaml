identifier: ComplexPortal:CPX-1593
label: "SCF(TIR1) ubiquitin ligase complex, variant CUL2-RBX1B-ASK16"
definition: >-
  SCF-TIR1 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, which catalyse the last step of ubiquitination cascade, promoting transfer of ubiquitin from an E2 enzyme to form a covalent bond with a substrate lysine. It perceives auxin signal and degrades Aux/IAA transcription repressors. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
