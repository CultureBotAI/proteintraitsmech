identifier: ComplexPortal:CPX-2632
label: "Mitochondrial ribonuclease P complex"
definition: >-
  Catalytically active H1 RNA responsible for cleaving the 5′ leader sequence from long pre-mitochondrial (mt)tRNAs polycistronic transcripts by phosphodiester bond hydrolysis to generate tRNAs with mature 5′-ends. The complex only forms in the presence of the pre-(mt)tRNA substrate. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
