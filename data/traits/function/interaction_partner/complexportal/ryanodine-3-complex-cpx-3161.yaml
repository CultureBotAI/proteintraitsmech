identifier: ComplexPortal:CPX-3161
label: "Ryanodine 3 complex"
definition: >-
  A large homotetrameric intracellular calcium channel, member of the ryanodine receptors family, responsible for the release of Ca2+ from the SR in muscle cells, thereby triggering muscle fiber contraction. Also responsible for the release of Ca2+ from the ER in non-muscle cell types. Predominantly expressed in the diaphragm muscles, smooth muscle cells and in the brain (mainly in hippocampus, thalamus, Purkinje cells, corpus striatum) and in low levels in many other organs. RyR3 physically interacts with other proteins, small molecules and ions that modulate its activity: Low Ca+2 concentration activates RyR3, by binding to specific high-affinity Ca+2 sites. High Ca+2 concentration inhibits RyR3, by binding to less specific low-affinity Ca+2 sites. ATP stimulates RyR1 channel activity. Calmodulin with bound calcium inhibits the RyR3 channel activity, as is binding to magnesium ions (Mg+2). Binding to FKBP may physically stabilize the coordinated gating of the four RyRs in one RyR homotetramer. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
