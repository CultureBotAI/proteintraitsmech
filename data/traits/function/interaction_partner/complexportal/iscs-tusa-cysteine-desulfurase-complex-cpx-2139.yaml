identifier: ComplexPortal:CPX-2139
label: "iscS-tusA cysteine desulfurase complex"
definition: >-
  Cysteine desulfurase involved in the sulfur-relay system required for 2-thiolation of 5-methylaminomethyl-2-thiouridine (mnm5s2U) at tRNA wobble positions. tusA stimulates iscS activity while iscS transfers sulfur to tusA in a transpersulfidation reaction. In turn, tusA transfers the sulfur to tusD in the TusA-tusBCD-tusE-mnmA pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
