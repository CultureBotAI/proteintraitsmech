label: "TLR2-TLR10 toll-like receptor complex"
definition: >-
  Type I membrane receptor that plays a crucial role in innate immunity by recognizing conserved patterns in diverse microbial molecules including lipoproteins, lipopeptides, lipopolysaccharide, flagellin, and nucleic acids. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
