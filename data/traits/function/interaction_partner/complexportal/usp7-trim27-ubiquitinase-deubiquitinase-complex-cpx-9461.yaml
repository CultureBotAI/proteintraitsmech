identifier: ComplexPortal:CPX-9461
label: "USP7-TRIM27 ubiquitinase/deubiquitinase complex"
definition: >-
  Deubiquitinase complex responsible for the removal of ubiquitin chains from proteins. Plays a role in the regulation of TNFA-induced apoptosis by deubiquinating the serine-threonine kinase RIPK1 (Q13546). The E3 ligase TRIM27 activates USP7 through ubiquitination at Lys-869. TRIM27 itself undergoes Lys-48 ubiquitination which can be removed by USP7, enabling inhibition of the an antiviral signaling pathway by promoting kinase TBK1 (Q9UHD2) ubiquitination and degradation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
