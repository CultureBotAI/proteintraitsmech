identifier: ComplexPortal:CPX-10799
label: "ADAM22-ADAM23-LGI1, trans-synaptic complex"
definition: >-
  Trans-synaptic complex, formed between soluble LGI1 and its receptors ADAM22 (CPX-21307) and ADAM23 (CPX-18972), which regulates excitatory synaptic transmission and neuronal excitability in the brain to maintain normal synaptic function and brain homeostasis. Complex mediates interactions with presynaptic Kv1 channels and postsynaptic AMPARs. ADAM23 negatively regulates Kv1.1 currents and limits LGI1 localisation at the axon initial segment (AIS), and it also contributes to neurite outgrowth. In contrast, ADAM22 is positively regulated by LGI1, enhancing Kv1.1 current and being enriched at the AIS. Through its interaction with ADAM22, LGI1 supports normal synaptic function and brain homeostasis. The LGI1-ADAM22 complex also links to AMPA receptors via DLG4 (P78352) to stabilise excitatory synapses and regulate neuronal excitability. Dysfunction of the complex is linked to epilepsy in infancy and childhood. Disruption of LGI1, either through loss-of-function mutations or autoantibodies, impairs both Kv1 channel and AMPAR function, leading to epilepsies associated with a variety of pathophysiological mechanisms. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
