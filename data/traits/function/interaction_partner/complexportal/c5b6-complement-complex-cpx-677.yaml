identifier: ComplexPortal:CPX-677
label: "C5b6 complement complex"
definition: >-
  Involved in the complement system. The complement system is a part of the innate immune system that enhances (complements) the ability of antibodies and phagocytic cells to clear microbes and damaged cells from an organism. The complex is formed after C5 cleavage by C5 convertase into C5a and C5b. C5b has a transient binding site for C6. Without C6 binding, C5b will irreversibly decay to a state incapable of binding C6. The complex initiates pore formation via the sequential recruitment of homologous proteins: C7, C8, and 12-18 copies of C9, each of which comprises a central MAC-perforin domain flanked by auxiliary domains. Activation of the complement system results in formation of membrane attack complexes (MACs), pores that disrupt lipid bilayers and lyse bacteria and other pathogens. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
