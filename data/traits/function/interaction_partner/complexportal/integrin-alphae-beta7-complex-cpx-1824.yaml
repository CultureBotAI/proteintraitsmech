identifier: ComplexPortal:CPX-1824
label: "Integrin alphaE-beta7 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for E-cadherin. It mediates adhesion of intra-epithelial T-lymphocytes to epithelial cell monolayers. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
