identifier: ComplexPortal:CPX-1071
label: "RecQ helicase-Topo III complex"
definition: >-
  Required for both the early and late steps of DNA double-strand break (DSB) via dissolution of double Holliday junctions. Early in the repair of a two-ended DSB, the complex contributes to DSB end resection by facilitating the formation of a single-strand 3' overhang on which the homologous recombination (HR) factor Rad51 (P25454) filament assembles. The complex has also been implicated in the unwinding of strand invasion after extension of the invading 3' end by DNA synthesis to promote DSB repair by synthesis-dependent strand annealing, as well as reversal of strand invasion prior to 3' end extension. Through these functions, the complex promotes non-crossover outcomes of HR and regulates HR levels. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
