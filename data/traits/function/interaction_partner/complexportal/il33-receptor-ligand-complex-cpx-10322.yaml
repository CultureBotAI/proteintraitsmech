identifier: ComplexPortal:CPX-10322
label: "IL33 receptor-ligand complex"
definition: >-
  Pleiotropic receptor-cytokine complex which acts as an alarmin and is involved in inflammatory and metabolic disease. IL33 binding to IL1RL1 induces a coformational change that allows IL1RL1 to interact with its co-receptor IL1RAP. Receptor heterodimerization results in the juxtaposition of the intracellular TIR domains of both receptors to activate NFKB and MAPK pathways in target cells driving cell survival, proliferation and AREG (P15514) expression by IL1RL1+ cells. IL33 is thought to be negatively regulated upon sequestration by soluble IL1RL1 (CPX-10324). Impaired IL33-IL1R1 signalling is thought to contribute to the pathogenesis of Alzheimer's Disease. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
