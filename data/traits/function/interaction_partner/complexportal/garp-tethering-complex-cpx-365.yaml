identifier: ComplexPortal:CPX-365
label: "GARP tethering complex"
definition: >-
  Tethering complex required for retrograde traffic from both the early and late endosomes to the Golgi during vesicle trafficking. Links the vesicle through differential SNARE interactions to the Golgi, leading to membrane fusion between late Golgi and endosomal vesicles. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
