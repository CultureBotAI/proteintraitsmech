identifier: ComplexPortal:CPX-1385
label: "unc-83-unc-84 LINC complex"
definition: >-
  Complex involved in nuclear migration throughout development, recruiting dynein and kinesin-1 to the nuclear surface. The complex connects the nuclear envelope to the microtubule cytoskeleton to allow for nuclear transport along microtubules. unc-83 associates with and recruits the large microtubule-associated bicd-1-dlc-1-egal-1 (CPX-1388) and lis-1-nud-2 complexes (CPX-1389) and the Kinesin I motor complex (CPX-1390) to the nuclear envelope to regulate both the bidirectional migration of nuclei and the extent of nuclear migrations. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
