identifier: ComplexPortal:CPX-597
label: "Calcineurin complex"
definition: >-
  A Ca2+/calmodulin-regulated Ser/Thr protein phosphatase, highly conserved through evolution and a critical component of Ca2+-regulated signaling in a wide range of unicellular and multicellular eukaryotes. Calcineurin is a heterodimer containing a catalytic (A) subunit complexed with an essential regulatory (B) subunit. Calcineurin function requires interaction of both subunits. The catalytic subunit contains an active site dinuclear metal center. The regulatory subunit is tightly associated, myristoylated and binds Ca2+ via four Ca2+-binding EF-hand motifs. The gene encoding calcineurin A in S. pombe, ppb1, is essential for mating and sporulation. ppb1 is transcriptionally regulated in a cell-cycle-dependent manner and is induced under conditions that promote mating. Deletion of the calcineurin A gene ppb1 in haploid S. pombe cells results in branched and multiply septate cells with defects in septal positioning, polarity, and cytokinesis. Overexpression of ppb1 in wild-type S. pombe generates elongated cells with occasional aberrant nuclear and spindle pole body positioning. Ca2+ signaling mediated by calcineurin, is required for survival during environmental stress. Calcineurin controls many other physiological processes, including cell cycle progression, cation homeostasis, morphogenesis, establishment of cell polarity and regulation of cell wall biosynthesis. When mobilization of internal calcium stores occurs, the catalytic subunit is bound by Ca2+-calmodulin and the active site is freed by displacement of the autoinhibitory domain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
