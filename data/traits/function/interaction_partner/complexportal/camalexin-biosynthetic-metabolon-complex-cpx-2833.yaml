identifier: ComplexPortal:CPX-2833
label: "Camalexin biosynthetic metabolon complex"
definition: >-
  Required for the biosynthesis of camalexin (3-thiazol-2-yl-indole, CHEBI:22990), a phytoalexin defense compound, from tryptophan. CYP79B2 converts tryptophan to indole-3-acetaldoxime, CYP71A13 then catalyzes the conversion of indole-3-acetaldoxime to indole-3-acetonitrile (IAN). The glutathionylation of IAN (GS-IAN) is driven by GSTU4, GS-IAN is converted to Cys(IAN), a process involving GPP1 (F4JTE7) which is recruited to this complex. CYP71B15 catalyzes two reactions, the formation of dihydrocamalexate from a indole-3-acetonitrile-cysteine conjugate and the oxidative decarboxylation of dihydrocamalexate which is the final step in camalexin biosynthesis. ATR is required for electron transfer from NADP to cytochrome P450. Camalexin has anti bacterial and anti-fungal pathogen properties. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
