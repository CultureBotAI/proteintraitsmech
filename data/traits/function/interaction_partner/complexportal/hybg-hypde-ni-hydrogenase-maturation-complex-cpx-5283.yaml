identifier: ComplexPortal:CPX-5283
label: "Hybg-HypDE Ni-hydrogenase maturation complex"
definition: >-
  Required for the synthesis of the NiFe(CN)2(CO)bimetallic cofactor present in the active site of [NiFe]-hydrogenases (CPX-281, CPX-282, CPX-317). The hybG protein delivers Fe and CO2 to hypD, where CO is generated and the cyano groups are transferred to the iron by the HypEF complex (CPX-5281). The HypCDE complex delivers the Fe(CN)2CO group to the precursor of the hydrogenase large subunit. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
