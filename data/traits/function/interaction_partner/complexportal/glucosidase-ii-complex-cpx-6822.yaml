identifier: ComplexPortal:CPX-6822
label: "Glucosidase II complex"
definition: >-
  Glycoside hydrolase which catalyzes trimming of the terminal glucose residues of N‐glycan in glycoprotein processing in the endoplasmic reticulum. Glc3Man9GlcNAc2 is attached to nascent glycoproteins and presents various carbohydrate epitopes to lectins operating as molecular chaperones, cargo receptors, and degradation mediators. The D1 branch of the initial glycoform is capped by a triglucosyl moiety, Glc-alpha1,2-Glc-alpha1,3-Glc. Glucosidase I (Q13724) removes the outermost alpha1,2-linked glucose from the D1 branch and then glucosidase II trims the second and third alpha1,3-linked glucose residues by catalyzing hydrolyses at the Glc-alpha1,3-Glc and Glc-alpha1,3-Man glycosidic linkages. This triggers disengagement of glycoproteins from chaperone complexes for anterograde transport to the Golgi apparatus if they are successfully folded. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
