identifier: ComplexPortal:CPX-844
label: "Interleukin-13 receptor-ligand alpha 1 complex"
definition: >-
  Transmembrane type 2 receptor complex. Ligand binding first to IL13RA1 followed by IL4R results in the assembly of the complete complex, inducing the transphosphorylation of TYK2 (P29597) and/or members of the JAK family of tyrosine-protein kinases as well as phosphorylation of the cytoplasmic tails of the receptors. STAT6 (P42226) monomers bind to the phosphorylated site of the receptor and are phosphorylated by JAK1/TYK2. Phosphorylated STAT6 dissociates from the receptors, dimerizes and translocates into the nucleus where it induces the transcription of target genes. IL13 also binds IL13RA2 (CPX-847) with high affinity to inhibit response to IL13 through the IL13RA1-IL4R heterodimer. A pleiotropic cytokine produced by many hematopoietic and non-hematopoietic cell types, IL13, is associated with Type 2 diseases and has been shown to be important in the pathogenesis of asthma, allergy and other eosinophilic disorders. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
