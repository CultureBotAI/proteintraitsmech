identifier: ComplexPortal:CPX-4425
label: "BRCA1-A complex"
definition: >-
  Deubiquitinase complex that predominantly binds polyubiquitin chains and specifically recognizes Lys-63-linked ubiquitinated histones H2A and H2AX (P16104) at DNA lesions sites, and targets the BRCA1-BARD1 heterodimer (CPX-715) to sites of DNA damage at double-strand breaks (DSBs). Critical for G2-M checkpoint control in response to ionising radiation, to ensure that entry into mitosis is transiently inhibited to avoid aberrant chromosome segregation. BRCA1-A complex may play an important role in breast and ovarian cancers. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
