identifier: ComplexPortal:CPX-1323
label: "CDC48-RAD23-UFD2 complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome.. Role in the escort pathway of proteasomal protein degradation, linking the ubiquitylation of specific substrates directly to their delivery to the proteasome. Oligo-ubiquitylated substrates are recognized and extracted by CDC48. UFD2 modifies the client proteins with lys-48-linked chains of four to six ubiquitins. RAD23 is recruited to the ternary complex, in which its UBL domain associates with UFD2, and then CDC48 remodels the complex to release the RAD23-ubiquitylated substrate complex which binds to the proteasome and delivers the substrate for degradation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
