identifier: ComplexPortal:CPX-579
label: "Carbamoyl-phosphate synthase arginine-specific"
definition: >-
  Carbamoyl-phosphate synthase is a heterodimer consisting in the CPA1 and CPA2 subunits. CPS catalyzes the formation of carbamoyl phosphate from the ammonia moiety of glutamine, carbonate, and phosphate donated by ATP, as the first step in biosynthetic pathway leading to formation of arginine and/or urea. The small subunit (glutamine amidotransferase) binds and cleaves glutamine and the large subunit (synthetase) accepts the ammonia moiety cleaved from glutamine, binds all of the remaining substrates, and carries out all of the other catalytic events. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
