identifier: ComplexPortal:CPX-6411
label: "tRNA-splicing ligase complex"
definition: >-
  tRNA ligase required for tRNA splicing, thus regulating tRNA maturation. Joins the resulting exon halves once introns have been removed from pre-tRNAs, acting upon the 2',3' cyclic phosphate of the 5' exon to ligate the second exon This complex, or a sub-complex of it, may also shuttle between the nucleus and the cytoplasm. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
