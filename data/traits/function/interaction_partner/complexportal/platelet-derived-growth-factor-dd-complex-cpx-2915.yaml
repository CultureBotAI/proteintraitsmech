identifier: ComplexPortal:CPX-2915
label: "Platelet-derived growth factor DD complex"
definition: >-
  D-chain of the platelet-derived growth factor (PDGF). Binds to and activates PDGF receptor alpha (PDGFRalpha, P26618) and beta (PDGFRbeta, P05622) subunits by inducing receptor dimerisation and tyrosine phosphorylation. Is a potent mitogen for cells of mesenchymal origin. Plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Plays an important role in wound healing. Induces macrophage recruitment, increased interstitial pressure, and blood vessel maturation during angiogenesis. Can initiate events that lead to a mesangial proliferative glomerulonephritis, including influx of monocytes and macrophages and production of extracellular matrix. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
