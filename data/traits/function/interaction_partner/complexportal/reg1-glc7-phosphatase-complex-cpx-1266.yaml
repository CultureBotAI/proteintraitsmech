identifier: ComplexPortal:CPX-1266
label: "REG1-GLC7 phosphatase complex"
definition: >-
  Protein phosphatase complex with a role in glucose repression. REG1-GLC7 binds to SNF1 when the SNF1 kinase complex (CPX-232/CPX-2800/CPX-231) is activated by phosphorylation, which occurs at a much higher rate in glucose-limited cells than in glucose-grown cells. REG1-GLC7 facilitates the transition of the kinase complex back to an autoinhibited state, presumably by dephosphorylating SNF1. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
