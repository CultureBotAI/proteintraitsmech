identifier: ComplexPortal:CPX-7906
label: "SCF E3 ubiquitin ligase complex, FBXO7 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO7 target proteins include the potential cell cycle regulator DLGAP5 (Q15398), the E3 ubiquitin-protein ligase BIRC2 (Q13490) and TRAF2 (Q12933) thus influencing NF-kappa-B signaling. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
