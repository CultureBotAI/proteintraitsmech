identifier: ComplexPortal:CPX-1686
label: "TREX-2 transcription-export complex"
definition: >-
  Couples SAGA (CPX-656)-dependent gene expression and transcription elongation to mRNA export at the inner side of the nuclear pore complex (NPC, CPX-824). The TREX-2 complex is tethered to the inner side of the NPC via the nucleoporins NUP1 (P20676) and NUP60 (P39705) and facilitates the repositioning and association of actively transcribing genes with nuclear pores (gene gating). Provides a feedback mechanism for the control of transcription and the preservation of genetic integrity of transcribed DNA regions. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
