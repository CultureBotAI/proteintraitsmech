identifier: ComplexPortal:CPX-8944
label: "MTV complex"
definition: >-
  Binds single-stranded DNA in a sequence independent manner, protecting the DNA from cleavage by endonucleases. Binds the HipHop-HOAP complex (CPX-8939) to form terminin telomere-capping complex which binds to chromosome ends in a sequence-independent manner and prevents telomere fusion. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
