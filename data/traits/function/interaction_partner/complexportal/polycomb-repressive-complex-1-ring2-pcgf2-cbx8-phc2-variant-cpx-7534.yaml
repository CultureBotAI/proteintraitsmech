identifier: ComplexPortal:CPX-7534
label: "Polycomb repressive complex 1, RING2-PCGF2-CBX8-PHC2 variant"
definition: >-
  E3 ubiquitin-protein ligase that acts as a transcriptional repressor by mediating the monoubiquitination of Lys-119 of histone H2A, compacting chromatin, stalling RNA polymerase II and transcriptionally silencing genes. CBX8 appears to be active during mitosis and interacts with the phosphatidylinositol 3,4,5-trisphosphate 3-phosphatase and dual-specificity protein phosphatase PTEN (P60484). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
