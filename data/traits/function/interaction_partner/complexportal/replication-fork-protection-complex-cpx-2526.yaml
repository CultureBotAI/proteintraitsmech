identifier: ComplexPortal:CPX-2526
label: "Replication fork protection complex"
definition: >-
  Required for chromosome segregation during meiosis and DNA damage repair. Acts at the intra-S-phase checkpoint pathway to stabilize stalled replication forks by maintaining the replisome at the arrested sites. Coordinates leading and lagging strand synthesis and moves with the replication fork, transfering cohesin from the front of the fork to the newly synthesized DNA. The complex is involved in replication through difficult secondary structures such as G-quadruplexes by recruiting the DDX11 helicase (Q96FC9). It is recruited by PARP1 (P09874) to DNA damage to promote homologous recombination. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
