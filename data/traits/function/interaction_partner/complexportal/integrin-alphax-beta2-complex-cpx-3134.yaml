identifier: ComplexPortal:CPX-3134
label: "Integrin alphaX-beta2 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for fibrinogen in which it recognizes the sequence G-P-R. It mediates cell-cell interaction during inflammatory responses, in particular monocyte adhesion and chemotaxis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
