identifier: ComplexPortal:CPX-1133
label: "B-WICH chromatin remodelling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex that exposes DNA by sliding away histone octamers. Positively regulates histone H3 acetylation, in particular H3K9, by recruiting several histone acetyltransferases (HATs), such as Kat2b (Pcaf, Q9JHD1), p300 (B2RWS6), and Kat2a (Gcn5, Q9JHD2). Binds to both ribosomal DNA promoters and coding regions. Facilitates RNA polymerase I and III transcription by preventing compaction of chromatin at rDNA loci allowing HATs to assemble. An open chromatin structure is a prerequisite for the binding of the RNA polymerase machinery and also the regulatory factor Myc (P01108), which activates both RNA pol I genes and RNA pol III genes. May also activate RNA polymerase II gene transcription. The different subunits of the complex potentially have specific roles that lead to the stepwise modification of chromatin, and may not all associate simultaneously with the Baz1b-Smarca5 core. The B-WICH assembly may thus represent a number of smaller complexes. At the start of the cell division process, when Pol I transcription is arrested, B-WICH is in a disassembled state due to the phosphorylation of Baz1b. The complex assembles on the active gene during early G1 phase. Polymeric actin interacts with Pol I, an interaction that is required for transcription. One speculative model is that Nm1 (Q9WTI7-3) interacts with actin and the rDNA via its C-terminus, generating local force that pulls the polymerase along the active gene. Once dissociated from actin, Nm1 interacts with Smarca5 in a Baz1b-dependent manner, a mechanism that stabilizes the complex on the rDNA. Additional components then assemble into the B-WICH complex(es) mediated by specific RNA species. Particularly important during embryonic and neonatal development, especially for craniofacial features. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
