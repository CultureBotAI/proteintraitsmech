identifier: ComplexPortal:CPX-6224
label: "Active Protein C complex"
definition: >-
  Vitamin K-dependent serine-type endopeptidase complex of the blood coagulation pathway that prevents coagulation and stimulates fibrinolysis by inactivating factors Va (CPX-6216) and VIIIa (CPX-929) in the presence of Vitamin K-dependent protein S (P07225) calcium ions and phospholipids. Also has cytoprotective effects that protects endothelial cell barrier function. Its zymogen form is activated by minor proteolysis by the thrombin-thrombomodulin complex (CPX-6223) to form active protein C. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
