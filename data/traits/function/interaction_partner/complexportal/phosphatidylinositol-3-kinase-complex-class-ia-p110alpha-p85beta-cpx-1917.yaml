identifier: ComplexPortal:CPX-1917
label: "Phosphatidylinositol 3-kinase complex class IA, p110alpha/p85beta"
definition: >-
  Uses PI(4,5)P2 as a substrate to generate the product PI(3,4,5)P3 which initiates major signaling pathways downstream. Performs a central role in cellular signaling, mediating responses to growth factors and extracellular stimuli. Engaged by beta-1 integrin/Fak/Src to mediate signaling for the suppression of anoikis. This variant is found to be ubiquitously expressed in human cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
