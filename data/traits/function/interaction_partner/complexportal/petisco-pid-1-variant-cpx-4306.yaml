identifier: ComplexPortal:CPX-4306
label: "PETISCO, pid-1 variant"
definition: >-
  Involved in the processing of substrate RNAs in the gene silencing pathway. When bound to pid-1, it is specifically required for the biogenesis of 21U RNAs, which are a class of 21 nucleotide piRNAs that possess a uracil residue at the 5-prime end. pid-1 is required for stabilising 21U precursor RNA molecules, whilst ife-3 is required for the interaction with capped 21U precursor RNA molecules. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
