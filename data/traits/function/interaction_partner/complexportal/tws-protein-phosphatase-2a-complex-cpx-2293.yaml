identifier: ComplexPortal:CPX-2293
label: "TWS-protein phosphatase 2A complex"
definition: >-
  Serine/threonine phosphatase complex which dephosphorylates substrates of mitotic kinases such as Cdk1. Promotes the translocation of Gwl (Q95TN8) to its nuclear localization during cytokinesis. Required for oocyte spindle assembly. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
