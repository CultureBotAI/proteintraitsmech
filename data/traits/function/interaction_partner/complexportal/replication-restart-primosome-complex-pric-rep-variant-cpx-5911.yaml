identifier: ComplexPortal:CPX-5911
label: "Replication restart primosome complex, priC-rep variant"
definition: >-
  Required for the restart of replication at sites of premature termination of DNA replication which leaves collapsed/abandoned replication forks that would otherwise create double-strand DNA breaks (DSBs) on the next round of replication. Serves to reload the replicative helicase dnaB on sites far removed from the origin of replication in a DNA structure-dependent manner. On replication forks lacking nascent leading and lagging strands priC is sufficient to load dnaB from the DnaB-DnaC complex (CPX-1934) in the absence of any other restart proteins but appears to require the rep helicase to create single-stranded DNA on the lagging strand for restart pathway progression or to remove nascent lagging strand DNA to enable priC-mediated loading of dnaB. Recruitment of dnaG allows RNA primer synthesis from which the polymerase III holoenzyme can synthesize a nascent lagging strand. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
