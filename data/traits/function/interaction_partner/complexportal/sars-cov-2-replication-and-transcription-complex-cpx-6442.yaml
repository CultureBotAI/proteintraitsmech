identifier: ComplexPortal:CPX-6442
label: "SARS-CoV-2 replication and transcription complex"
definition: >-
  Replication and transcription complex (RTC) of the SARS-CoV-2 coronavirus which consists of the polymerase complex (CPX-5742) and 2 helicase molecules (nsp13). Although coronavirus nsp13s have been proposed to unwind RNA in the 5' to 3' direction, the 5' extension of template RNA is fed into the active site of SARS-CoV-2 nsp13 in the 3' to 5' direction. RNA polymerase has been known to possess a “backtrack” feature, in which the productive elongation and translocation complexes are in the same conformation to facilitate reversible backward motion during RNA synthesis. The SARS-CoV-2 RTC structure suggests it has the same function here. The nsp12 nucleotidyltransferase (NiRAN) domain possesses guanylyltransferase activity, catalyzing the formation of the cap core structure (GpppA) on the nascent mRNA. ADP-Mg2+ binds in the catalytic site of this domain. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
