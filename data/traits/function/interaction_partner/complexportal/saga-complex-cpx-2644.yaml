identifier: ComplexPortal:CPX-2644
label: "SAGA complex"
definition: >-
  A histone acetyltransferase transcriptional co-activator complex that preferably acetylates histone H3 and possibly H4. Acetyl-CoA-dependent and appears to require the presence of ATP-dependent chromatin remodeling factors to enable its coactivator activity. Also has histone H2A and H2B deubiquitinase activity which counteracts heterochromatin silencing. A curated stable macromolecular complex (Complex Portal) with 21 subunits.
