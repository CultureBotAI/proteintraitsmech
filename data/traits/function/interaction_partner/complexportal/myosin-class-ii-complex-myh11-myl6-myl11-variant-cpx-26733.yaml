identifier: ComplexPortal:CPX-26733
label: "Myosin class II complex, MYH11-MYL6-MYL11 variant"
definition: >-
  Building block of conventional class II myosin motor complex which forms the basic units of contraction in smooth muscle myosin. Forms a hexameric motor complex composed of two myosin heavy chains (MHC) associated with two essential light chains (MLC) and two regulatory light chains (MLC-2) which couples ATP hydrolysis in the myosin motor domain to directed sliding of actin filaments. The essential and regulatory light chains bound to the myosin neck stabilize the lever arm and modulate force transduction, enabling the heavy chain to generate contractile force in smooth muscle cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
