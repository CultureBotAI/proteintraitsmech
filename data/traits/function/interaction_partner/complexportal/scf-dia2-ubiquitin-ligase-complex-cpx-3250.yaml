identifier: ComplexPortal:CPX-3250
label: "SCF-Dia2 ubiquitin ligase complex"
definition: >-
  SCF-Dia2 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, Dia2, forms the substrate recognition subunit. The complex may form a homodimer. SCF-Dia2 is involved in a number of cellular processes: it has been associated with replication stress response and is considered part of the replisome progression complex responsible for fork stability. CSF-Dia2 has also been linked to part of the intra-S phase DNA damage checkpoint. It is also involved in transcriptional silencing at telomeres and mating type loci, as well as regulating transcription by mediating assembly of the RSC complex. It is required for the degradation of Cdc6 in G1. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
