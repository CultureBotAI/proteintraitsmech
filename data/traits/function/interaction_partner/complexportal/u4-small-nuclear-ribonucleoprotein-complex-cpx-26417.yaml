identifier: ComplexPortal:CPX-26417
label: "U4 small nuclear ribonucleoprotein complex"
definition: >-
  Small nuclear RNA (snRNA) containing complex that is involved in mRNA splicing as part of the spliceosome. The spliceosome executes pre-mRNA splicing through a highly dynamic series of compositional and conformational transitions encompassing assembly, activation, catalysis and disassembly of a highly dynamic structure, involving the binding and release of the small nuclear RNAs (snRNA) and protein factors which remove intronic sequence from pre-mRNA. Spliceosome stages are characterized as E, A, B and remodelling of the pre-catalytic spliceosome (B complex) into the activated spliceosome (Bact complex) and subsequently, the catalytically activated spliceosome (B* complex) to carry out two RNA-catalysed transesterification reactions that lead to intron removal and splicing together of the flanking exon sequences. U4 snRNP is present only in the pre-B and B complexes. The splicing active site is only formed in the B-act complex, allowing clear differentiation between the B-like and B-act-like complexes. U4 dissociates from the spliceosome during the activation step, but the U4 snRNP is also found in a complex with the U6 snRNP (the U4/6 snRNP complex), an intermediate in the assembly of the spliceosome. The U4/6 complex is then re-assembled in each cycle. Its function is thought to be to deliver U6 to the spliceosome. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
