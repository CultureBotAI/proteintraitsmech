identifier: ComplexPortal:CPX-3193
label: "Cav1.2 voltage-gated calcium channel complex, CACNA2D1-CACNB2 variant"
definition: >-
  Voltage‐gated calcium channel which reacts to membrane depolarization by opening to allow Ca2+ to move down an electrochemical gradient. The L-type, high voltage-activated Cav1.2 channel is responsible for excitation-contraction (E-C) coupling of cardiac and, to some extent, smooth muscle. It relays an excitatory depolarization in the T-tubular membrane to the calcium release channel in the sarcoplasmatic membrane. More specifically, rapid depolarization-induced conformational changes of the complex stimulates calcium efflux from the sarcoplasmatic reticulum through the Ryanodine 2 complex calcium release channel, which subsequently triggers the contractile apparatus until the calcium concentration is reduced again due to re-uptake into the sarcoplasmic reticulum by the Ca2+-ATPase, ATP2A1 (Q0VCY0). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
