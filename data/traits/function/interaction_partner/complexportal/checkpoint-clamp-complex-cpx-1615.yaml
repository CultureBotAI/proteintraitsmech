identifier: ComplexPortal:CPX-1615
label: "Checkpoint clamp complex"
definition: >-
  Enables the DNA repair pathways to restore the integrity of the DNA prior to DNA synthesis or separation of the replicated chromosomes. In response to genotoxic damage, the complex is loaded around DNA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
