identifier: ComplexPortal:CPX-37
label: "Calprotectin heterotetramer"
definition: >-
  A Ca(2+), Mn(2+) and Zn(2+)-binding complex used by the innate immune system in a metal-withholding strategy that limits Mn(2+) and Zn(2+) availability at sites of infection. Calprotectin is expressed and released by neutrophils and epithelial cells, and exhibits broad-spectrum antimicrobial activity attributed to its metal-binding properties. Upon neutrophil activation or endothelial adhesion of monocytes, Calprotectin becomes secreted via a microtubule-mediated pathway and can thus serve as a marker for the influx of mononuclear phagocytes into the site of inflammation. Calprotectin is an endogenous ligand of toll-like receptor 4 (TLR4) and of the receptor for advanced glycation end products (RAGE) initiating signal transduction through NF-kappa-B pathways. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
