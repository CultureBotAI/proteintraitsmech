identifier: ComplexPortal:CPX-3232
label: "CKM complex variant 1"
definition: >-
  Reversibly associates with the Mediator complex (CPX-3227). Mediator lacking the CKM complex has a stimulatory effect on basal transcription. In contrast, Mediator containing the sub-complex represses basal transcription. This effect is independent of kinase activity but binding of the complex to Mediator may interfere with RNAPII recruitment and repress transcription re-initiation. Variant 1 and 2 have been shown to regulate different, but overlapping sets of target genes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
