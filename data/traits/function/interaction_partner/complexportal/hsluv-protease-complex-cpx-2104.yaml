identifier: ComplexPortal:CPX-2104
label: "HslUV protease complex"
definition: >-
  A proteasome-like degradation complex with two functional subunits: the hslU hexamer forms the ATPase subunit which has chaperone activity and the hslV duodecamer forms the protease subunit. The binding of ATP and its subsequent hydrolysis by hslU are essential for unfolding of protein substrates subsequently hydrolyzed by hslV. hslU recognizes the N-terminal part of its protein substrates and unfolds these before they are guided to hslV for hydrolysis. ATP hydrolysis causes a conformational change in the hslU subunit 'closing' the central pore and 'un-docking' the ATPase unit from the protease by way of flicking the hslU C-terminus from the hslV-hslV interface into the hslU-hslU interface. The complex has been shown to be involved in the specific degradation of heat shock induced transcription factors such as rpoH and sulA. In addition, small hydrophobic peptides are also hydrolyzed by hslV. hslV has weak protease activity even in the absence of hslU, but this activity is induced more than 100-fold in the presence of hslU. Owing to the size of the central pore of both subunits hslUV is not believed to degrade folded proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
