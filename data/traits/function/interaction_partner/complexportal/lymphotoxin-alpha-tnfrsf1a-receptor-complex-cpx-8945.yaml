identifier: ComplexPortal:CPX-8945
label: "Lymphotoxin-alpha-TNFRSF1A receptor complex"
definition: >-
  Receptor complex whose primary role is in lymphoid organ development, organization and the maintenance of lymphoid microenvironments to promote host defense, and inflammation. LTA mediates its effects through one of three receptors: TNFRSF1A (this complex), TNFRSF1B (CPX-9221) and TNFRSF14 (CPX-9222). A death domain (DD) contained within the cytoplasmic tail of TNFRSF1A allows it to recruit TRADD (TNFR1-associated DD, Q15628) and its associated molecules which predominantly results in cell survival through NF-KB-NIK or MAPK activation. Apoptosis is initiated through TRADD's interaction with FADD (Q13158). LTA is produced predominantly by activated innate and adaptive immune cells, and its effects are mediated by TNFRSF1A which is expressed on most cells, including tumour cell types. TNFRSF1A signalling leads to cell death and canonical NFKB-mediated inflammatory processes, as well as the development and progression of autoimmune diseases. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
