identifier: ComplexPortal:CPX-2947
label: "YgjK glucosidase complex"
definition: >-
  Glucoside hydrolase that cleaves the alpha-1,3-glucosidic linkage in nigerose. Has very low activity towards maltooligosaccharides, soluble starch, nigerotriose, kojibiose and trehalose. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
