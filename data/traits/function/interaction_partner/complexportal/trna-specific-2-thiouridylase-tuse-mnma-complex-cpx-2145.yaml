identifier: ComplexPortal:CPX-2145
label: "tRNA-specific 2-thiouridylase tusE-mnmA complex"
definition: >-
  mnmA catalyzes the 2-thiolation of uridine at the wobble position (U34) of tRNA(Lys), tRNA(Glu) and tRNA(Gln), leading to the formation of s2U34, the first step of tRNA-mnm5s2U34 synthesis. Sulfur is provided by iscS, via a sulfur-relay system. The tusE subunit transfers sulfur (most likely bound to Cys-108 as persulfide) from the TusBCDE complex (CPX-2144) to the tRNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
