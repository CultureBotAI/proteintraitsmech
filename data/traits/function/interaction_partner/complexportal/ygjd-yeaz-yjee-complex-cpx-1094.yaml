identifier: ComplexPortal:CPX-1094
label: "YgjD-YeaZ-YjeE complex"
definition: >-
  Catalyses the transfer of the threonylcarbamoyl-moiety of threonylcarbamoyladenylate onto A37 of substrate tRNA in the cytoplasm, or more probably in E.coli, the formation of 'cyclic t6A' (ct6A), which is a cyclized active ester with an oxazolone ring. The N6-threonylcarbamoyladenosine (t6A) modification is present at position 37 of tRNAs that recognize ANN-codons, with N being any nucleotide, enhancing the codon-anti-codon interaction and is required for recognition of the AUG start codon. The modification is thus important for maintaining translational fidelity. A stable YgjD-YeaZ heterodimer first forms, which has an atypical ADP-binding site at the YgjD-YeaZ interface that may also be the binding site for YjeE as the ternary complex only forms in the presence of ATP. An additional YrdC protein is necessary for T6a activity. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
