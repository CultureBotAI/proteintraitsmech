identifier: ComplexPortal:CPX-2271
label: "TRAPPII complex"
definition: >-
  Multimeric vesicle tethering complex involved in vesicle transport between endoplasmic reticulum and Golgi compartments and in the regulation of COPI vesicle coating. Acts as guanine exchange factors towards RAB proteins, primarily activating Rab11 (O18335), which acts at the late Golgi to recycle from endosomes, and traffic to the surface. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
