identifier: ComplexPortal:CPX-2884
label: "PDGF receptor alpha - PDGF-BB complex"
definition: >-
  Platelet-derived growth factor (PDGF) receptor alpha (PDGFRalpha) that is activated by its bound ligand, PDGF B-chain. PDGFRalpha is a tyrosine-protein kinase that acts as a cell-surface receptor for PDGFB, and its related A- and C-chains, PDGFA (P04085) and PDGFC (Q9NRA1). It autophosphorylates on multiple tyrosines upon ligand binding initiating several signalling cascades and phosphorylation of downstream targets. Growth factor that plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Potent mitogen for cells of mesenchymal origin. Required for normal proliferation and recruitment of pericytes and vascular smooth muscle cells in the central nervous system, skin, lung, heart and placenta. Required for normal blood vessel development, and for normal development of kidney glomeruli. Plays an important role in wound healing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
