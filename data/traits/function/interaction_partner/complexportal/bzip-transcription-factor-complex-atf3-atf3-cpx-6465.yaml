identifier: ComplexPortal:CPX-6465
label: "bZIP transcription factor complex, ATF3-ATF3"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The homodimer appears to act as a transcriptional repressor, modulating the immune response, atherogenesis, cell cycle, apoptosis, and glucose homeostasis. ATF3 is an adaptive-response gene, expressed at low levels in normal and quiescent cells but its expression is increased by cytokines, cell death-inducing agents, and physiological stresses. The ATF3 gene also includes a number of isoforms lacking the bzip domain, expression of which antagonize the transcriptional activity of ATF3. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
