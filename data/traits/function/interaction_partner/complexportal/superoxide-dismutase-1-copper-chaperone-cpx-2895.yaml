identifier: ComplexPortal:CPX-2895
label: "Superoxide dismutase 1 copper chaperone"
definition: >-
  Copper chaperone for superoxide dismutase which delivers copper to the [Cu-Zn] superoxide dismutase I (SOD1, CPX-2896) forming heterodimer (CPX-2267). Insertion of copper is required for SOD1 enzymatic activity. Oxidation of an intramolecular disulfide bond is required to increase the enzymatic activity from approximately 10 % in disulfide-reduced SOD1 to 100 % in disulfide-oxidized SOD1. The copper chaperone, CCS1, both delivers the copper and oxidises the disulfide bond. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
