identifier: ComplexPortal:CPX-1871
label: "COP9 signalosome variant 2"
definition: >-
  Essential regulator of the ubiquitin (Ubl) conjugation pathway by mediating the deneddylation of the cullin subunits of SCF-type E3 ligase complexes, leading to decrease the Ubl ligase activity of SCF-type complexes such as SCF, CSA or DDB2. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
