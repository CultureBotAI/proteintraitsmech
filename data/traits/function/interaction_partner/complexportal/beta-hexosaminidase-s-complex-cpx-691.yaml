identifier: ComplexPortal:CPX-691
label: "Beta-hexosaminidase S complex"
definition: >-
  Hydrolyses the terminal non-reducing N-acetyl-D-hexosamine residues, such as N-acetylglucosamine and N-acetylgalactosamine, which are beta-linked to oligosaccharides, glycolipids, glycoproteins, and glycosaminoglycans (GAGs). Facilitates the degradation of GAGs in lysosomes of the central and peripheral nervous system. Member of the Family 20 glycoside hydrolases (glycosidase). Active on water-soluble and amphiphilic glycoconjugates such as sulfated GAG fragments, and the sulfated glycosphingolipid SM2 (CHEBI:90163). Works in association with the GM2A protein (Q60648) and enhanced by the presence of anionic phospholipids, such as bis(monoacylglycero)phosphate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
