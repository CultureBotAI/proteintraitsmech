identifier: ComplexPortal:CPX-5561
label: "NAD-dependent dihydropyrimidine dehydrogenase complex"
definition: >-
  Enzyme of the reductive pyrimidine catabolic pathway. Catalyzes the NADPH-dependent reduction of uracil and thymine to 5,6-dihydro derivatives, enabling uracil and thymine to be used as nitrogen and carbon sources for growth. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
