identifier: ComplexPortal:CPX-2674
label: "M-Calpain complex"
definition: >-
  A calcium-dependent protease complex that processes the substrate by limited proteolysis rather than degrading it. In some cases the proteolytic action activates the substrate, for example, it cleaves CDK5R1/p35 (Q15078) into its p25 form that is associated with Alzheimer's disease. Involved in cytoskeletal remodeling, signal transduction and implicated in cell cycle regulation and apoptosis. Finely-balanced calpain homeostasis is required as both over and under-activation causes disease. Calpain complexes recognise their substrates based on a short peptide sequence. Inhibited by the intrinsically-unstructured calpastatin (P20810) by its tight binding to the calpain catalytic subunit. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
