identifier: ComplexPortal:CPX-2523
label: "COPII vesicle coat complex"
definition: >-
  Mediates formation of the membrane vesicles that export newly synthesised proteins from the endoplasmic reticulum. Upon exchange of GDP for GTP (catalysed by SEC12), SAR1 exposes an N-terminal amphipathic helix that inserts into the outer ER membrane leaflet, promoting curvature. SAR1 recruits SEC23/24 to the membrane to form the inner layer of the COPII coat. SEC24 binds transport cargo while SEC23 interacts with SAR1 and recruits the outer COPII components (SEC13/31) that form a cage around the vesicle by self-assembling into a polyhedron. SEC16 may also be required for proper COPII coat assembly but its role has not been clearly defined. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
