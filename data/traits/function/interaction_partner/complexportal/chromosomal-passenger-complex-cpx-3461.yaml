identifier: ComplexPortal:CPX-3461
label: "Chromosomal passenger complex"
definition: >-
  Serine/threonine kinase complex which ensures chromosome bi-orientation on the mitotic spindle during metaphase by phosphorylating multiple kinetochore components. It destabilizes monopolar attachments by phosphorylating key proteins at the kinetophore. The opposing Chromosomal Passenger complex and gsp-1 (Q27497) activities ensure that chromosomes achieve a bipolar attachment to the spindle. Monopolar attachments do not produce tension across sister kinetochores (and the complex may act by sensing this absence of tension). The Chromosome passenger complex is conserved from yeast to man and is an essential regulator of diverse aspects of mitosis that ensure faithful chromosome segregation. The complex undergoes changes in its localization throughout mitosis: in early mitosis it presumably localizes to chromosome arms while later in metaphase it is found at the centromere. At anaphase onset it re-localizes to mitotic spindle microtubules accumulating in the midbody in late anaphase where it promotes spindle disassembly and cytokinesis. It also plays a role in contractile ring formation and regulation of abscission in cytokinesis. air-2 (O01427), bir-1 (G5EFA2), and icp-1 (G5EE37) require csc-1 (O45952) to localize to meiotic chromatin, mitotic chromosomes and the spindle mid zone in meiosis and mitosis. In turn, bir-1 (G5EFA2), csc-1 (O45952) and icp-1 (G5EE37) localization to chromosomes is mutually interdependent. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
