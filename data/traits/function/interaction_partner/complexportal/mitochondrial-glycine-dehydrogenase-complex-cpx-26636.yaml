identifier: ComplexPortal:CPX-26636
label: "Mitochondrial glycine dehydrogenase complex"
definition: >-
  Catalyzes glycine degradation. GLDC, the glycine cleavage system protein P binds to the alpha-amino group of glycine through its pyridoxal phosphate cofactor, releases CO2 and transfers the remaining methylamine moiety to the lipoamide cofactor, GCSH (P23434), the glycine cleavage system H protein. Mutations in GLDC are associated with glycine encephalopathy. Also considered a useful biomarker in the diagnosis of stomach cancer. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
