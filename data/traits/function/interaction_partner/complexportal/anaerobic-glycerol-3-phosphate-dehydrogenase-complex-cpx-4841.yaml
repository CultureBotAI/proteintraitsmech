identifier: ComplexPortal:CPX-4841
label: "Anaerobic glycerol-3-phosphate dehydrogenase complex"
definition: >-
  Catalyses the oxidation of glycerol-3-phosphate to dihyroxyacetone phosphate using fumarate or nitrate as an electron acceptor. GlpABC is a respiratory enzyme. Anaerobic growth of E. coli with glycerol and fumarate induces expression of anaerobic glycerol-3-phosphate dehydrogenase and fumarate reductase and is associated with proton translocation and the generation of a proton motive force. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
