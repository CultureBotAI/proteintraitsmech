identifier: ComplexPortal:CPX-7670
label: "LINC complex, SUN1-SYNE2 variant"
definition: >-
  Forms immediately below the outer nuclear membrane and traverses the nuclear envelope to mechanically couple cytoskeletal and nuclear components across the nuclear envelope, allowing the transmission of force. Links the nuclear lumen to cytoplasmic microtubules during meiosis with SYNE2 interacting with the actin cytoskeleton via N-terminal actin binding domains. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
