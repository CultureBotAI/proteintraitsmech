identifier: ComplexPortal:CPX-342
label: "CLN2-CDC28 kinase complex"
definition: >-
  Cyclin-dependent protein kinase complex required for the control of the cell cycle at the G1/S (start) transition, controlling the trigger of post-Start processes such as spindle pole body duplication, and the initiation of DNA replication. CKS1 is required for activity of CLN-CDC28 complexes. The protein may also play a role in complex stability and substrate recognition. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
