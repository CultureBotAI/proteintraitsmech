label: "Phenylalanyl-tRNA synthetase complex"
definition: >-
  Catalyses the esterificaion of phenylalanine to its cognate tRNA with the concomitant hydrolysis of ATP. The activated amino acid is transferred to the 2-OH group of a phenylalanine-accepting tRNA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
