identifier: ComplexPortal:CPX-9310
label: "TNFSF14-LTBR receptor complex"
definition: >-
  Receptor complex which coordinates innate and adaptive immune responses. Contributes directly and indirectly to myeloid cell activation, enhanced antigen presentation, and the induction of both adaptive and innate immune cytokines and chemokines. LTBR-mediated signalling through NF-KB and RelB (Q01201) induces transcription of CXCL13 (O43927), CCL19 (Q99731) and CCL21 (O00585) involved in positioning T and B cells in germinal centers and the creation of new tertiary lymphoid structures and extra-lymphatic immune environments. TNFSF14 also mediates its effects through TNFRSF14 (CPX-9223), and the decoy receptor TNFRSF6B (CPX-9309). Expressed on myeloid cells, various tumour cell types and stromal cells in the tumour microenvrionment, TNFSF14 mediated activity has been linked with the negative selection of potentially autoreactive T cells to act as a safeguard against automimmune disease. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
