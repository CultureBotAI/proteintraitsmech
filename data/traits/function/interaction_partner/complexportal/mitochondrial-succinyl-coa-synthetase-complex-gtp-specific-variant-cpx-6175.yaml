identifier: ComplexPortal:CPX-6175
label: "Mitochondrial succinyl-CoA synthetase complex, GTP-specific variant"
definition: >-
  Catalyzes the reversible phosphorylation/dephosphorylation of Succinyl-CoA. Couples the hydrolysis of succinyl-CoA to the synthesis of GTP in the citric acid cycle (TCA) and thus represents the only step of substrate-level phosphorylation in the TCA . A curated stable macromolecular complex (Complex Portal) with 2 subunits.
