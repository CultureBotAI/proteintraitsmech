identifier: ComplexPortal:CPX-807
label: "Kinetochore Mis12 complex"
definition: >-
  Required for normal chromosome alignment and segregation, kinetochore formation during mitosis, proper kinetochore microtubule attachments and for the spindle assembly checkpoint. The complex plays a role in establishing a bipolar spindle-kinetochore interaction by joining kinetochore subunits contacting DNA to those contacting microtubules. Mis12/MIND is part of a tridentate linker layer, which also contains the Ndc80 complex. Alone, the Mis12/MIND complex does not bind to microtubules, but interaction with kinetochore protein knl-1 (P34278) increases the microtubule binding affinity. knl-3 recruits knl-1 to the complex which in turn recruits the Ndc80 complex to microtubules. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
