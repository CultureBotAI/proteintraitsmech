identifier: ComplexPortal:CPX-2683
label: "SCF E3 ubiquitin ligase complex, FBXL7 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL7 target proteins include AURKA (O14965), required for normal spindle positioning during mitosis, BIRC5 (O15392), a component of the chromosome passage protein complex (CPX-116) which is essential for chromosome alignment and segregation during mitosis and cytokinesis and the SNAI1 (O95863) transcription factor. Ubiquitinates MYC (P01106) when phosphorylated at Thr-58 and Ser-62. May play a role in the regulation of apoptosis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
