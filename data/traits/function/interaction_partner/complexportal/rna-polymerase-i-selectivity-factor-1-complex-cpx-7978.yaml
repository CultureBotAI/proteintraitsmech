identifier: ComplexPortal:CPX-7978
label: "RNA polymerase I selectivity factor 1 complex"
definition: >-
  Triggers pre-initiation complex (PIC) formation through recruitment of RNA polymerase 1 (CPX-2386) at the rDNA promoter by associating with the core promoter of 47S pre-rRNA cooperatively with the nucleolar transcription factor UBTF1 (P17480). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
