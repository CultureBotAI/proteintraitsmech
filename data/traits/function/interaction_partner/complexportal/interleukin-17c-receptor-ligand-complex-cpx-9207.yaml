identifier: ComplexPortal:CPX-9207
label: "Interleukin-17C receptor-ligand complex"
definition: >-
  Pro-inflammatory cytokine receptor which plays a key role in both adaptive and innate immunity. TRAF3IP2 polyubiquitinates TRAF6 (Q9Y4K3) leading to the recruitment of downstream molecules and the activation of NF-KB and the mitogen-activated protein kinase (MAPK) pathways. IL17C-IL17RE signalling also activates anti-apoptotic pathways via BCL2(P10415) and BCL2L1 (Q07817). While the prototypic IL17A is preferentially produced by immune cells, IL17C is predominantly produced by non-immune cells and its production is up-regulated in epethelial cells at an early stage in several diseases. IL17C mediates its effects through the IL17RA:IL17RE expressed by both epithelial and CD4+ type 17 helper cells. Unrestrained IL17C signalling is associated with autoimmune diseases and cancer progression, but it is also crucial for protection from fungal and bacterial infections such as Pseudomonas aeruginosa. IL17C is induced under hypoxic and hyperglycemic conditions and is thought to drive a pathogenic inflammatory response in kidney disease. IL17C may also be involved in the development of atherosclerosis, COPD and cystic fibrosis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
