identifier: ComplexPortal:CPX-26438
label: "DBF4-dependent hsk1 kinase complex"
definition: >-
  Serine/threonine-protein kinase essential for the initiation of DNA replication during the S phase of mitosis. Associates with replication origins where it phosphorylates components of the prereplicative complex including the MCM helicase (CPX-2945). Phosphorylates the Rad9 component of the checkpoint clamp complex component (CPX-26422) in response to replication-induced DNA damage. Phosphorylation of Rad9 disrupts its interaction with replication protein A (RPA) and is dependent on checkpoint clamp complex chromatin loading. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
