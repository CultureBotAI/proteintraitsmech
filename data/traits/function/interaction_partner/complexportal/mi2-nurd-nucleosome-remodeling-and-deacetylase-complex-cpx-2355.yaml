identifier: ComplexPortal:CPX-2355
label: "Mi2/NuRD nucleosome remodeling and deacetylase complex"
definition: >-
  Corepressor complex that couples histone deacetylase and ATP-dependent chromatin remodeling activities. It regulates the higher-order structure of chromatin, making chromatin more compact by removing acetyl groups from nucleosomes, and has important roles in the regulation of gene expression and DNA damage repair. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
