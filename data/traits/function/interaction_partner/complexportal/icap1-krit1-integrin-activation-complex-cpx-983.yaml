identifier: ComplexPortal:CPX-983
label: "ICAP1-KRIT1 integrin activation complex"
definition: >-
  Complex formation prevents the beta1-integrin binding protein ICAP1 from binding to, and limiting the activation of, beta1-integrin. ICAP1 is a known suppressor of integrin activation believed to act by competing with the integrin activators talin (Q9Y490) and kindlin (Q9BQL6) by competitively binding to the integrin beta1 cytoplasmic tail. Complex formation may also sequester ICAP1 to the nucleus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
