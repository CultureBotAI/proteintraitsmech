label: "SMG1C protein kinase complex"
definition: >-
  Forms to modulate the protein kinase activity of SMG1. When active, SMG1 mediates phosphorylation of the RNA helicase UPF1 (Q92900), a key player in the nonsense-mediated decay pathway. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
