identifier: ComplexPortal:CPX-2300
label: "CRL3 E3 ubiquitin ligase complex, SPOP variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SPOP is required to maintain normal cellular growth and development and its targets include the polycomb protein BMI1 (P35226), the apoptosis factor DAXX (Q9UER7), the pancreatic and duodenal homeobox protein PDX1 (P52945), and the Hedgehog signaling transcription factors GLI2 (P10070) and GLI3 (P10071). SPOP forms linear higher-order oligomers which enables it to present multiple MATH domains (IPR002083) for binding to multiple low-affinity motifs in a single substrate, resulting in an overall increased affinity through avidity effects. SPOP oligomerization is also involved in phase separation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
