identifier: ComplexPortal:CPX-2837
label: "CIAO1-CIAO2B-CIAO3-MMS19 cytosolic iron-sulfur protein assembly complex"
definition: >-
  Transfers [4Fe-4S] clusters assembled on the NUBP1-NUBP2 Fe-S cluster assembly scaffold complex (CPX-2823) on to cytosolic and/ or nuclear Fe/S proteins. CIAO3 receives the [4Fe-4S] cluster from the scaffold complex and then binds to the CIAO2B-CIAO1-MMS19 heterotrimer. Responsible for the maturation of many cytosolic proteins, such as DPYD (Q12882) and also transfers the Fe-S clusters to nuclear Fe-S proteins, such as POLD1 (P28340), the DNA helicase XPD (P18074) and RTEL1 (Q9NZ71). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
