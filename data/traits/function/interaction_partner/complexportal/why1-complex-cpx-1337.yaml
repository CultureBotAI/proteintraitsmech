identifier: ComplexPortal:CPX-1337
label: "WHY1 complex"
definition: >-
  Modulates DNA repair in plant chloroplasts by binding single-stranded DNA in a non-sequence-specific manner. Regulates telomere-length homeostasis by binding the telomere end. Contributes to both basal and specific defense responses. Transcription can be induced by salicylic acid (SA). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
