identifier: ComplexPortal:CPX-3921
label: "2-oxoglutarate dehydrogenase complex"
definition: >-
  Multi-enzyme complex that catalyzes the conversion of 2-oxoglutarate (2-ketoglutarate) to succinyl-CoA and CO2, with the production of NADH, during the citric acid cycle. It contains multiple copies of three enzymatic components: 2-oxoglutarate dehydrogenase (E1), dihydrolipoamide succinyltransferase (E2) and lipoamide dehydrogenase (E3). 2-oxoglutarate is bound and decarboxylated by sucA, sucB catalyzes the transfer of a succinyl group from the S-succinyldihydrolipoyl moiety to coenzyme A, forming succinyl-CoA and lpdA catalyzes the transfer of electrons to the ultimate acceptor, NAD. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
