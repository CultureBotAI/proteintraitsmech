identifier: ComplexPortal:CPX-224
label: "Neuronal nicotinic acetylcholine receptor complex, alpha9-alpha10"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous antagonists such as alpha-bungarotoxin. Unlike classic nicotinic acetylcholine receptors, nicotine blocks acetylcholine-evoked currents in alpha9-alpha10 receptors giving these receptors a pharmacological profile unknown for any other nicotinic or muscarinic cholinergic receptor subtype. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Upregulated by pro-inflammatory cytokines, for example TNF-alpha. Mediates fast, short-lived synaptic transmission of neurotransmitters and is more active than the alpha9 homopentamer (CPX-228). Mainly found in peripheral nervous system and non-neuronal cells, especially in the auditory system (mechanosensory hair, inner-ear tissue, the cochlea) but also in tonsils, immortalized B-cells, cultured T-cells and PBMCs, keratinocytes and in the pituitary gland. In the auditory system the subunits assemble to form the receptor that mediates synaptic transmission between efferent olivocochlear cholinergic fibers which descend from the brainstem and hair cells of the cochlea. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
