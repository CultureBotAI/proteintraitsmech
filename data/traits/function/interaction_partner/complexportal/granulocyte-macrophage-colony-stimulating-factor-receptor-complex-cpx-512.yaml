identifier: ComplexPortal:CPX-512
label: "Granulocyte-macrophage colony-stimulating factor-receptor complex"
definition: >-
  Cytokine receptor complex that activates the JAK/STAT signaling cascade. Stimulates the growth and development of progenitors of hematopoietic precursor cells from various lineages, including granulocytes, macrophages, eosinophils and erythrocytes and the production and maturation of dendritic cells and T cells. Enhances the activity of neutrophils and macrophages. Binding of CSF2 stimulates tyrosine phosphorylation of the receptor subunits and associated JAK2. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
