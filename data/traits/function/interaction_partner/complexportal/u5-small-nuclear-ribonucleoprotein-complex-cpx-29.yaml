identifier: ComplexPortal:CPX-29
label: "U5 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex that is involved in mRNA splicing. U5 snRNP is delivered to the forming spliceosome as part of the U4/U6 x U5 tri-snRNP complex (CPX-25). The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. During spliceosome activation several subunits dissociate, but U5 is necessary for both trans-esterification steps during splicing. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
