identifier: ComplexPortal:CPX-1126
label: "Cyclin cyd-1-cdk4 complex"
definition: >-
  Cyclin-dependent protein kinase activity. Required for G1 to S phase transition of the mitotic cell cycle. Cdk-4 phosphorylates the Rb protein lin-35 at Ser-714 and Thr-719 which inhibits the transcriptional repressor activity of lin-35 and allows for progression through the G1 phase of the cell cycle during postembryonic development. The complex also regulates the asymmetric division of the somatic gonadal precursor cell to determine sex during gonadogenesis and controls the expression of growth and metabolic genes in muscle cells, in addition to cell cycle genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
