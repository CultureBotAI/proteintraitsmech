identifier: ComplexPortal:CPX-2230
label: "RSF complex"
definition: >-
  A nucleosome remodeling complex that participates in chromatin assembly and facilitates DNA transcription. The RSF1 subunit functions as the histone chaperone through an association with the H3/H4 tetramer and is independent of the histone tails. The histone octamer (composed of H2A, H2B, H3 and H4) is required for the RSF complex to bind DNA. The Iswi subunit provides the energy for the nucleosome spacing activity and is dependent on the histone tails. May play a role in silent chromatin formation by promoting histone H2Av (P08985) replacement. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
