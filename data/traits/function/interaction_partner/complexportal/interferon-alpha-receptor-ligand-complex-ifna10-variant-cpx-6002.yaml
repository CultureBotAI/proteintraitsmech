identifier: ComplexPortal:CPX-6002
label: "Interferon alpha receptor-ligand complex, IFNA10 variant"
definition: >-
  Receptor-ligand complex whose formation is triggered in response to viruses, bacteria or microbial nucleic acids to engage downstream signalling pathways that activate innate and adaptive immune responses. Following complex assembly TYK2 (P29597) and/or members of the JAK family of tyrosine-protein kinases are activated by reciprocal transphosphorylation. Subsequently, they phosphorylate several tyrosine residues in the membrane-distal, intracellular domains of IFNAR1 and IFNAR2, which, in turn, recruit further effector proteins that propagate downstream signalling. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
