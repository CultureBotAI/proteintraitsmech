identifier: ComplexPortal:CPX-397
label: "Atg17-Atg31-Atg29 complex"
definition: >-
  Scaffolding complex required for the assembly of the preautophagosomal structure (PAS), the first step of autophagosome formation. Constructively present under both growing and starvation conditions. Under conditions of nutrient starvation, it forms a complex with ATG1 and ATG13 to enhance the kinase activity of ATG1 (CPX-1676). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
