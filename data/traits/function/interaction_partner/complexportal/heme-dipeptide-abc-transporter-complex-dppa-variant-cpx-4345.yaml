identifier: ComplexPortal:CPX-4345
label: "Heme/dipeptide ABC transporter complex, dppA variant"
definition: >-
  High affinity peptide transporter which has a preference for dipeptides. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Also transports heme and the heme precursor delta-aminolevulinic acid (ALA, CHEBI:17549), though it should be noted that the Escherichia coli K12 laboratory strain is missing a heme outer membrane receptor. The dpp operon is up-regulated during exponential growth. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
