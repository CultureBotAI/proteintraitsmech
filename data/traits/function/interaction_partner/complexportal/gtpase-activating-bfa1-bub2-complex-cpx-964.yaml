identifier: ComplexPortal:CPX-964
label: "GTPase-activating BFA1-BUB2 complex"
definition: >-
  Acts as a two-component GTPase-activating complex for TEM1 (P38987) GTPase, thus regulating a signal transduction cascade, called the mitotic exit network (MEN), which is required for mitotic exit and cytokinesis. The BUB2/BFA1 GAP binds TEM1 GTPase at spindle poles, achieving an asymmetry during mitosis when the spindle is properly positioned, with the complex accumulating on the bud-directed old spindle pole. BUB2/BFA1 keeps TEM1 inactive until the spindle is properly oriented, thus inhibiting MEN activation. Upon spindle misalignment TEM1 localizes symmetrically on both SPBs and the Spindle Position Checkpoint (SPOC) inhibits TEM1 through the BUB2/BFA1 complex, thereby restraining the MEN until the spindle repositions correctly. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
