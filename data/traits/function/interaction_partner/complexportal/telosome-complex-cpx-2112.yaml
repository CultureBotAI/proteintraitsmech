identifier: ComplexPortal:CPX-2112
label: "Telosome complex"
definition: >-
  A protective cap that inhibits telomerase, counteracts SIR-mediated transcriptional silencing, and prevents inadvertent recognition of telomeres as DNA double-strand breaks. Rif1 and Rif2 have separable and independent Rap1-binding epitopes, allowing Rap1 recruitment and binding over large distances (42-110 A). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
