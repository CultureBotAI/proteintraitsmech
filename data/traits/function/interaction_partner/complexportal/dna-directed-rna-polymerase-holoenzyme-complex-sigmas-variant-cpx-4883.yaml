identifier: ComplexPortal:CPX-4883
label: "DNA-directed RNA polymerase holoenzyme complex, SigmaS variant"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3-prime end of an RNA transcript. Five subunits, rpoA/alpha, rpoB/beta, rpoC/beta-prime and rpoZ/omega form the catalytic core. To initiate promoter specific DNA transcription, the core enzyme has to bind a sigma factor, which helps to direct the polymerase to specific promoters. rpoS efficiently transcribes genes involved in stress responses (including include starvation, hyperosmolarity, pH downshift, or non-optimal high or low temperature) and secondary metabolism as well as RNAs from intergenic regions. In conditions such as nutrient starvation or oxidative stress, rpoS is believed to take over transcription of genes important for cell survival that are under rpoD control during faster growth. Genes under the control of rpoS are characterized by promoter sequences very similar to rpoD-dependent genes but differ in conservation of the upstream promoter element and of the -35 sequence, and in the sequence immediately upstream of the -10 promoter element. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
