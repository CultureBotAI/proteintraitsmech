identifier: ComplexPortal:CPX-1131
label: "Prmt-5-cep-1-cbp-1 complex"
definition: >-
  Represses transcriptional activation in response to DNA damage. prmt-5 interacts with, but does not methylate, cep-1 and with cbp-1 which results in the methylation of cbp-1. Cep-1 transcriptional activity may be inhibited by its interaction with methylated cbp-1. The formation of this complex may prevent apoptosis by repressing the capacity of cbp-1 to enhance cep-1 dependent transcriptional activation of the programmed cell death activator egl-1. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
