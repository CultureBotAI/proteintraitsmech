identifier: ComplexPortal:CPX-748
label: "Chorionic gonadotropin hormone complex"
definition: >-
  Glycoprotein hormone secreted by the placenta during the early weeks of pregnancy. It stimulates the ovarian corpus luteum to produce progesterone until the placenta itself acquires the ability to produce this pregnancy sustaining steroid. A member of the family of pituitary glycoprotein hormones that play key roles in human fertility. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
