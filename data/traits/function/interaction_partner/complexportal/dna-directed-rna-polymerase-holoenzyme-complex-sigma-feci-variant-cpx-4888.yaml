identifier: ComplexPortal:CPX-4888
label: "DNA-directed RNA polymerase holoenzyme complex, Sigma fecI variant"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3' end of an RNA transcript. Five subunits, rpoA/alpha, rpoB/beta, rpoC/beta' and rpoZ/omega form the catalytic core. To initiate promoter specific DNA transcription, the core enzyme has to bind a sigma factor, which helps to direct the polymerase to specific promoters. fecI is required for initiation of transcription of the ferric citrate transport genes required for the receptor of the ferric-citrate outer membrane transporter complex (CPX-3576) and the components of the ferric-citrate ABC transporter complex (CPX-4403). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
