identifier: ComplexPortal:CPX-3662
label: "CoQ biosynthetic complex"
definition: >-
  Required for the synthesis of Coenzyme Q (CoQ), an isoprenylated benzoquinone which functions as an electron carrier from complex I or II to complex III in the inner mitochondrial membrane and which also acts as an antioxidant preventing the oxidation of lipoproteins and the plasma membrane. Assembly of the complex appears to be triggered by 4-hydroxyl-3-hexaprenyl benzoate (HHB) which is a precursor of CoQ. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
