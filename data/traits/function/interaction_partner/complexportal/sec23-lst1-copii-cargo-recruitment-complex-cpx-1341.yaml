identifier: ComplexPortal:CPX-1341
label: "SEC23-LST1 COPII cargo recruitment complex"
definition: >-
  Adapter complex which interacts with the COPII coat (CPX-2523) to recruit specific cargo proteins, such as PMA1 (P05030), the essential plasma membrane ATPase, into the membrane vesicles that export newly synthesised proteins from the endoplasmic reticulum. Requires the presence of SEC23/SEC24 in the COPII coat for activity. Required for the export of glycosylphosphatidylinositol-anchored proteins to the Golgi apparatus through interaction with the EMP24 complex (CPX-1698). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
