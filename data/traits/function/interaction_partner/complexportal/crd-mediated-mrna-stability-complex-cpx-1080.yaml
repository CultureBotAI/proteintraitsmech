identifier: ComplexPortal:CPX-1080
label: "CRD-mediated mRNA stability complex"
definition: >-
  mRNA-binding complex that binds to the coding-region determinant of instability (CRD). Stabilizes mRNA (e.g. MYC mRNA) by inhibiting poly(A) tail deadenylation and premature mRNA decay by polysome-associated endonucleases. Active mainly during embryogenesis and tumorigenesis. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
