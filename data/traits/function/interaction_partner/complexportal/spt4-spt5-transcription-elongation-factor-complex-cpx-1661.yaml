identifier: ComplexPortal:CPX-1661
label: "SPT4-SPT5 transcription elongation factor complex"
definition: >-
  An essential RNA polymerase II elongation factor which functions in the control of RNAP II processivity. Mediates both activation and inhibition of transcription elongation, and plays a role in pre-mRNA processing. This complex seems to be important for the stability of the RNA polymerase II elongation machinery on the chromatin template but not for the inherent ability of this machinery to translocate down the gene. Binds RNA in a sequence-specific manner by recognizing multiple AA repeat sequences and a region within the conserved NusG N-terminal (NGN) domain of SPT5 contacts the non-template strand of DNA both upstream of RNAPII and in the transcription bubble. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
