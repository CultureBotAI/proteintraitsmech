identifier: ComplexPortal:CPX-282
label: "Hydrogenase-2 complex"
definition: >-
  Catalyzes the reversible oxidation of hydrogen (H2) to protons and electrons. Strongly upregulated during microaerobic and anaerobic respiration when H2 is used as an electron donor to reduce menaquinone to its quinol, with subsequent electron transfer to fumarate. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
