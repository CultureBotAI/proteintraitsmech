identifier: ComplexPortal:CPX-26647
label: "HMG-CoA reductase complex"
definition: >-
  Catalyzes the conversion of 3-hydroxy-3-methylglutaryl coenzyme A (HMG-CoA) to mevalonate in a four-electron oxidoreduction, the rate-limiting step in isoprenoid biosynthesis, including that of cholesterol (CHEBI:16113). Regulated through a negative feedback loop mediated by mevalonate-derived sterols and non-sterol metabolites. Targeted by HMG-CoA reductase inhibitors (statins, CHEBI:87631) to lower serum cholesterol in the treatment of hypercholesterolemia and thereby preventing cardiovascular disease. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
