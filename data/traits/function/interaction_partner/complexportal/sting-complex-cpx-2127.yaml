identifier: ComplexPortal:CPX-2127
label: "STING complex"
definition: >-
  Central player in the innate immune response to nucleic acids, particularly cytosolic double-stranded DNA from bacteria and viruses and mitochondrial damage. cyclic GMP-AMP (cGAMP) synthase acts as a cytosolic DNA sensor and, in response to nucleic acid binding, synthesizes one specific isomer of cGAMP, an endogenous second messenger that activates the type I IFN pathway. Binding of this isomer (CHEBI:75947) to STING activates a cascade of events whereby STING recruits and activates I-kappa-B kinase and TANK-binding kinase which, following their phosphorylation, activate nuclear transcription factor kappa-B and interferon regulatory factor 3, respectively. These activated proteins translocate to the nucleus to induce transcription of the genes encoding type I IFN and cytokines for promoting intercellular host immune defence. Implicated in a growing number of non-canonical roles independent of MITA functions in a variety of processes including antiviral activity, senescence, autophagy, metabolism, lysosomal biogenesis, and the development of neurological disorders. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
