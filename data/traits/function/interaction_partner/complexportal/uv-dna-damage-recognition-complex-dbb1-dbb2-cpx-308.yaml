identifier: ComplexPortal:CPX-308
label: "UV DNA damage recognition complex DBB1-DBB2"
definition: >-
  Mediates the initial detection of UV light-induced cyclobutane pyrimidine photodimers as part of the nucleotide excision repair (NER) process. Performs a 3D search mechanism, examining sites on DNA in discrete steps before binding as long-lived, non-motile dimers at sites of damage. The complex then constitutively associates with Cullin4A or 4B and RBX1 to form an E3 ligase (CPX-477/CPX-648). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
