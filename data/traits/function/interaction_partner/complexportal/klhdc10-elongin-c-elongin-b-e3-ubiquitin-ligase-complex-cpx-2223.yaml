identifier: ComplexPortal:CPX-2223
label: "KLHDC10-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets degradation signals (degrons) within the C-termini of substrate proteins in a pathway termed destruction via C-end degrons (DesCEND). The C-degron is generally a motif of fewer than ten residues ending with -Ala-Gly, -Trp-Gly or -Pro-Gly and can be present in full-length proteins, truncated proteins or proteolytically cleaved forms. Ubiquitinates incompletely synthesized nascent peptide chains from stalled ribosomes. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
