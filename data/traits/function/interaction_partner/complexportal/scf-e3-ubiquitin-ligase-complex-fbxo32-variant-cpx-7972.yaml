identifier: ComplexPortal:CPX-7972
label: "SCF E3 ubiquitin ligase complex, FBXO32 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO32 target proteins include the initiation factor,EIF3F (O00303), the myogenic transcription factor, MYOD1 (P15172) and the growth-related transcription factor, MYC.(P01106). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
