identifier: ComplexPortal:CPX-634
label: "Ccr4-Not complex"
definition: >-
  Major cellular mRNA deadenylase complex, removing polyA tails that protect transcripts from degradation and promotes translation in the cytoplasm. The complex is linked to various cellular processes including bulk mRNA degradation, miRNA-mediated repression, translational repression during translational initiation, and general transcription regulation, potentially by promoting the resumption of elongation of arrested RNAPII when it encounters transcriptional blocks in vivo. The complex is required for germ cell development in adult hermaphrodites. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
