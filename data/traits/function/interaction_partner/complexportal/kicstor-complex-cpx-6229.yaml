identifier: ComplexPortal:CPX-6229
label: "KICSTOR complex"
definition: >-
  Key regulator of the amino acid-sensing branch of the mTORC1 signaling pathway. It recruits the GATOR1 complex (CPX-6226) to the lysosomal membranes and allows its interaction with GATOR2 (CPX-6227) and the RAG GTPases. Negatively regulates mTORC1 (CPX-503) signaling in absence of amino acids. Probably also involved in the regulation of mTORC1 by glucose. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
