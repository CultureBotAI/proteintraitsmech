identifier: ComplexPortal:CPX-2904
label: "PDGF receptor beta - PDGF-AB complex"
definition: >-
  Platelet-derived growth factor (PDGF) receptor beta (PDGFRbeta) that is activated by its bound ligand, PDGF-AB dimer (CPX-1875). PDGFRbeta is a tyrosine-protein kinase that acts as a cell-surface receptor for PDGF-AB, and its related C- and D-chains, PDGFC (Q8CI19) and PDGFD (Q925I7). It autophosphorylates on multiple tyrosines upon ligand binding initiating several signalling cascades and phosphorylation of downstream targets. Plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Potent mitogen for cells of mesenchymal origin. Required for normal lung alveolar septum formation during embryogenesis, normal development of the gastrointestinal tract, normal development of Leydig cells and spermatogenesis. Required for normal oligodendrocyte development and normal myelination in the spinal cord and cerebellum. Required for normal proliferation and recruitment of pericytes and vascular smooth muscle cells in the central nervous system, skin, lung, heart and placenta. Required for normal blood vessel development, and for normal development of kidney glomeruli. Plays an important role in wound healing. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
