identifier: ComplexPortal:CPX-2781
label: "GATOR1 complex"
definition: >-
  GTPase activating complex which functions as an inhibitor of the amino acid-sensing branch of the TORC1 pathway. In response to amino acid depletion, the complex strongly increases GTP hydrolysis by RagA-B within the heterodimeric Rag complex converting the protein to its inactive GDP-bound form. This releases TORC1 (CPX-2265) from the lysosomal surface and inhibits TORC1 signaling The GATOR1 complex is negatively regulated by GATOR2 (CPX-2664). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
