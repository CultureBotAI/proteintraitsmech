identifier: ComplexPortal:CPX-10337
label: "Interleukin-35 receptor ligand type 4 complex"
definition: >-
  Inhibitory cytokine-receptor complex that plays a key role in immune regulation by suppressing effector T cells, Th1 cells, Th17 cells and macrophages. IL35 is thought to signal through four receptors: IL12RB2 homodimers, IL6ST homodimers and heterodimers comprised of IL12RB2/IL6ST and IL12RB2/IL27RA (Q99665/Q6UWB1). IL35 binding to IL6ST homodimers (this complex) induces IL12A and EBI3 transcription and the activation of the JAK-STAT pathway through JAK1/STAT1 (P42224) phosphorylation. Although IL6ST homodimers partially mediate IL35-led immunosuppressive signalling, maximal function is effected by the IL12RB2-IL6ST heterodimer. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
