identifier: ComplexPortal:CPX-1732
label: "Ku70:Ku80 complex"
definition: >-
  Single-stranded DNA-dependent 3-prime to 5-prime ATP-dependent helicase complex which binds preferentially to fork-like ends of double-stranded DNA in a cell cycle-dependent manner. Required for non-homologous end joining DNA double stranded break repair. Binds to naturally occurring chromosomal ends, and therefore provides chromosomal end protection. Appears to have a role in recruitment of telomerase and CDC13 to the telomere and the subsequent telomere elongation. Required also for telomere recombination to repair telomeric ends in the absence of telomerase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
