label: "Interleukin-24 receptor-ligand complex, type 2"
definition: >-
  Pleiotropic cytokine-receptor complex with diverse roles in immune response, tissue homeostasis, host defense, and oncogenesis. Cytokine binding to its receptor complex initiates signalling, primarily triggering the JAK/STAT pathway recruiting JAK1/Tyk2 and STAT1(P42224) and STAT3(P40763) to mediate cell differentiation, proliferation and apoptosis, but it can also utilise the MAPK pathway to mediate tumour suppressive effects. IL24 is expressed in a variety of immune cells as well as epithelial cells such as keratinocytes and fibroblasts. Elevated levels of IL24 is associated with many pro-inflammatory and autoimmune diseases such as psoriasis and rheumatoid arthiritis but it can also play a protective anti-inflammatory role such as in multiple sclerosis where IL24 deficiency leads to experimental autoimmune encephalomyelitis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
