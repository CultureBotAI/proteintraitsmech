identifier: ComplexPortal:CPX-972
label: "BRCC ubiquitin ligase complex"
definition: >-
  A Ubc5-dependent E3 ubiquitin ligase complex involved in DNA repair, potentially by regulating factors involved in the process. It has a defined substrate specificity, with a strong preference for the nucleosome core histones H2A, H2B, H3 and H4. It co-localizes with and efficiently ubiquitylates, the histone variant H2AX at sites of DNA damage. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
