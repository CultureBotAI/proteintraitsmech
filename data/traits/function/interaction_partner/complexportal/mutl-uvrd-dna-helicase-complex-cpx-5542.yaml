identifier: ComplexPortal:CPX-5542
label: "MutL-UvrD DNA helicase complex"
definition: >-
  DNA helicase complex, involved in the recognition and repair of base-base and small insertion/deletion mismatches that appear as a consequence of DNA polymerase errors during replication or homologous recombination. Strand recognition necessary for removal of DNA biosynthetic errors from the daughter strand is based on the transient absence of d(GATC) methylation in the newly synthesized DNA strand (hemimethylation). Repair is initiated by the binding of mutS to a mismatch or to a small insertion-deletion loop. Assembly of the rotation-coupled diffusion-mediated MutHLS complex (CPX-5541) leads to activation of the mutH endonuclease which can cleave either side of the mismatch. The MutL-UvrD complex forms near an mutH strand scission tethering it to the mismatched DNA where it randomly unwinds and rezips the DNA that is alternately bound and released by ssb (P0AGE0). When MutL-UvrD unwinding reaches an adjacent mutH GATC incision site, the intervening fragment is released creating an SSB bound gap. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
