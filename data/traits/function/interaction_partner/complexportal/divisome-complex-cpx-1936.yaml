identifier: ComplexPortal:CPX-1936
label: "Divisome complex"
definition: >-
  Mediates the process of cell division, forming a tightly regulated peptidoglycan (PG) synthesis machine that builds a septum between the segregated chromosomes to separate the cell into two daughter cells. ftsZ forms a ring-like structure (Z-ring) at the midcell which establishes the division plane and enables the assembly of the divisome. Arrival of ftsN at the Z ring signals the completion of divisome core assembly and activates septal PG synthesis by activating the enzymatic activities of the two PG synthases, ftsW and ftsI. Additional proteins are known to transiently associate with this core complex but are not essential or conditionally essential for division. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
