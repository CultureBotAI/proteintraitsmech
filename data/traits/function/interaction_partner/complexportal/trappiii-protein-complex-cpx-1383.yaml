identifier: ComplexPortal:CPX-1383
label: "TRAPPIII protein complex"
definition: >-
  Tethering complexes which provide the initial recognition event that links a particular vesicle with its target membrane. It is an Autophagy-specific guanine nucleotide exchange factor for the Rab GTPase YPT1 (P01123) that is recruited to the phagophore assembly site (PAS) when macroautophagy is induced by the ATG1 kinase complex (CPX-1676). The TRAPPIII-specific subunit, TRS85, targets this complex to the PAS. BET3, BET5, TRS23, and TRS31 create a catalytic site for promoting GDP/GTP exchange in YPT1. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
