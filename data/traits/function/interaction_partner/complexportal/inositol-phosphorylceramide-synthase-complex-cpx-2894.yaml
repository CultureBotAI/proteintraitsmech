identifier: ComplexPortal:CPX-2894
label: "Inositol phosphorylceramide synthase complex"
definition: >-
  Catalyzes the addition of a phosphorylinositol group onto the 1-OH position of ceramide to form inositol phosphorylceramide, an essential step in forming the inositol-phosphate head group of sphingolipids. Sphingolipids are a structurally diverse class of membrane lipids implicated in a number of cell signaling functions. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
