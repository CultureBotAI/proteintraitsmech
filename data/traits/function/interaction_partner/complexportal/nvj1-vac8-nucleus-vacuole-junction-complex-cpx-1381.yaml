identifier: ComplexPortal:CPX-1381
label: "NVJ1-VAC8 nucleus-vacuole junction complex"
definition: >-
  Nucleus-vacuole junction complex, a membrane contact site formed between perinuclear and vacuolar membranes. Mediates essential cellular processes such as piecemeal microautophagy of the nucleus (PMN), a selective autophagic recycling process stimulated by carbon or nitrogen starvation through the target of rapamycin signaling pathway. Under these conditions, the region of the nucleus in the vicinity of NVJs invaginates into the vacuolar lumen and forms a bleb-like structure, which is released as a vesicle and eventually degraded by vacuolar hydrolases. NVJs are also involved in lipid metabolism by recruiting the two lipid-modifying enzymes, oxystereol-binding proteins homology OSH1 (P35845) involved in nonvesicular lipid trafficking and the enoyl-CoA reductase TSC13 (Q99190) that mediates the synthesis of very-long-chain fatty acids. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
