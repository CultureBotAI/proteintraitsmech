identifier: ComplexPortal:CPX-382
label: "Interleukin-12-receptor ligand complex"
definition: >-
  Receptor complex that activates and stimulates proliferation of a wide range of lymphocytes, in particular natural killer cells and T helper 1 (Th1) cells. The IL12 ligand complex (CPX-381) binds the receptors chains IL12RB1 and IL12RB2 which are associated with the kinases TYK2 and JAK2, respectively. Transphosphorylation of IL12RB2 and the JAK-family kinases initiates the JAK-STAT signaling cascade via phosphorylation and homodimerisation of STAT3/STAT4 (P40763/Q14765). This ultimately leads to the activation of transcription of interferon-gamma which, in turn, stimulates production of IL12 leading to a positive regulation loop. Mutations in IL12B and IL12RB1 can lead to mycobacterial diseases of varying severity, primarily bacillus Calmette-Guerin and Salmonella infections. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
