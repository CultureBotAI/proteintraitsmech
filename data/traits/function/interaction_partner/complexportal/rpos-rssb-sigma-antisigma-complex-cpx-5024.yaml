identifier: ComplexPortal:CPX-5024
label: "rpoS-rssB sigma-antisigma complex"
definition: >-
  Regulates RpoD-mediated transcription activation by triggering degradation of rpoS by the ClpXP endopeptidase complex (CPX-3176). The complex forms under normal growth conditions but its formation is inhibited by the presence of anti-adaptor proteins: iraP (P0AAN9) specifically induced in response to phosphate starvation, iraD (P39375) which is specifically induced in response to DNA damage and iraM (P75987) which is specifically induced in response to magnesium starvation. rpoS is rapidly degraded by ClpXP in exponentially growing cells, but degradation stops as cells enter stationary phase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
