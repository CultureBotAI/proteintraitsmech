identifier: ComplexPortal:CPX-1970
label: "Molybdopterin synthase complex"
definition: >-
  Involved in molybdopterin cofactor (Moco) biosynthesis under anaerobic conditions converting molybdopterin precursor Z (CHEBI:52994) to molybdopterin. This requires the incorporation of two sulfur atoms into precursor Z to generate a dithiolene group. The sulfur is provided by moaD. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
