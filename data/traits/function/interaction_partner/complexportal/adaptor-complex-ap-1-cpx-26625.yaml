identifier: ComplexPortal:CPX-26625
label: "Adaptor complex AP-1"
definition: >-
  Plays a central role in clathrin-coated vesicle formation by coupling coat assembly and cargo collection. Binds short linear motifs on cargo proteins and incorporates them into the clathrin coat of forming vesicles. Mediates the bi-directional transfer of membrane proteins between the trans-Golgi network and the early endosome. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
