identifier: ComplexPortal:CPX-5623
label: "NAD(P) transhydrogenase complex"
definition: >-
  Conformationally driven transhydrogenase proton pump, which links the reversible reduction of NADP+ by NADH to the translocation of protons across the cytoplasmic membrane. The transfer of a proton from the periplasm to the cytosol is linked to the transfer of a hydride ion equivalent from NADH to NADP+. High levels of NADPH are required for detoxification, via the glutathione peroxidase pathway, and anabolic purposes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
