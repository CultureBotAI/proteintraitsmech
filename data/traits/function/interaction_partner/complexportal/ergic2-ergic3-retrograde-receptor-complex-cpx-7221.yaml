identifier: ComplexPortal:CPX-7221
label: "ERGIC2-ERGIC3 retrograde receptor complex"
definition: >-
  Functions as a cargo receptor in both anterograde and retrograde protein trafficking. Transports proteins between the endoplasmic reticulum and Golgi and also returns endoplasmic reticulum resident proteins that have trafficked to Golgi compartments. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
