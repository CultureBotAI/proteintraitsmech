identifier: ComplexPortal:CPX-3301
label: "BTR double Holliday Junction dissolution complex"
definition: >-
  Processes the double Holliday Junction, a DNA intermediate formed during homologous recombination, by convergent DNA branch migration of the two Holliday junctions in the structure and DNA strand decatenation, to yield non-crossover recombinants. Unwinds D-loops to promote the formation of non-crossover recombinants through the synthesis-dependent strand annealing pathway. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
