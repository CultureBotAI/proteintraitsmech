identifier: ComplexPortal:CPX-416
label: "Glutamyl-tRNA(Gln) amidotransferase complex"
definition: >-
  Generates glutaminyl-tRNA(Gln) in the mitochondrion. Cytosolic glutamyl-tRNA synthetase (ERS) is imported into mitochondria, where it constitutes the mitochondrial nondiscriminating ERS that generates the mitochondrial misacylated glutamyl-tRNA(Gln) substrate for the Glutamyl-tRNA(Gln) amidotransferase complex. The reaction takes place in the presence of glutamine and ATP through an activated gamma-phospho-Glu-tRNA(Gln). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
