identifier: ComplexPortal:CPX-25749
label: "SREBP-SCAP-INSIG sequestering complex, INSIG2-SREBF1 variant"
definition: >-
  When the cell is enriched with cholesterol, the SREBP1-SCAP complex (CPX-25745) is anchored in the endoplasmic reticulum (ER) by the formation of this complex. The association between SCAP and INSIG requires oxysterols such as 25-hydroxycholesterol or, less favorably, cholesterol Under conditions of low sterols, INSIG-SCAP disassociate and the SREBP-SCAP complex is translocated by COPII (CPX-2360)-coated vesicles from the ER to the Golgi where SREBF1 is proteolytically cleaved and freed from the membrane to activate the transcription of genes involved in fatty acid and cholesterol biosynthesis. is ubiquitously expressed at a low level in cells and may act as the regulator of SCAP/SREBP pathway at the basal level. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
