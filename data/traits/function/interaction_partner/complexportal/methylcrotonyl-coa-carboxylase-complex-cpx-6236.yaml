identifier: ComplexPortal:CPX-6236
label: "Methylcrotonyl-CoA carboxylase complex"
definition: >-
  Catalyzes the conversion of 3-methylcrotonyl-CoA to 3-methylglutaconyl-CoA, a critical step for leucine and isovaleric acid catabolism. The biotin carboxylase component catalyzes the Mg-ATP-dependent carboxylation of the N1' atom of the biotin cofactor, using bicarbonate as the CO2 donor. The carboxyltransferase component then catalyzes the CO2 transfer from carboxybiotin to the gamma carbon of the alpha-beta unsaturated acid, 3-methylcrotonyl-CoA. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
