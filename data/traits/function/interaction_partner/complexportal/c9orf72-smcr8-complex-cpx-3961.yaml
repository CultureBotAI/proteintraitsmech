identifier: ComplexPortal:CPX-3961
label: "C9orf72-SMCR8 complex"
definition: >-
  Potential GDP-GTP exchange factor (GEF) for Rab GTPases and may therefore regulate vesicular trafficking. May act as a negative regulator of autoimmunity, through negative regulation of lysosomal exocytosis. May also function in the autolysosomal pathway through interactions with the autophagy initiation complex (CPX-373). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
