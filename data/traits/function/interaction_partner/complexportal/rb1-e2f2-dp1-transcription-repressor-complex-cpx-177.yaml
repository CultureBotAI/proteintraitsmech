identifier: ComplexPortal:CPX-177
label: "RB1-E2F2-DP1 transcription repressor complex"
definition: >-
  Formation of this complex, by binding to Rb1 to the E2F2-DP1 transcription factor complex (CPX-176), negatively regulates the G1-S transition by blocking the transactivation domain of E2F1. Rb1 dissociates from the complex following hyperphosphorylation by cyclin-dependent kinases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
