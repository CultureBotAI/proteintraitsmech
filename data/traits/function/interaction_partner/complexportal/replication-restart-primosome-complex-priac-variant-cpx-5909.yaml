identifier: ComplexPortal:CPX-5909
label: "Replication restart primosome complex, priAC variant"
definition: >-
  Required for the restart of replication at sites of premature termination of DNA replication which leaves collapsed/abandoned replication forks that would otherwise create double-strand DNA breaks (DSBs) on the next round of replication. Serves to reload the replicative helicase dnaB on sites far removed from the origin of replication in a DNA structure-dependent manner. priA binds single-stranded, double-stranded and forked DNA with high affinity. priC binds ssDNA, preferentially associating with replication forks that include at least 7 nucleotide gaps between the nascent leading strand and replication fork. The dnaB-dnaC complex (CPX-1934) is recruited to the primosome, possibly through direct contacts with dnaT and the dnaB is loaded from dnaB-dnaC onto ssDNA on the lagging strand template. Recruitment of dnaG allows RNA primer synthesis from which the polymerase III holoenzyme can synthesize a nascent lagging strand. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
