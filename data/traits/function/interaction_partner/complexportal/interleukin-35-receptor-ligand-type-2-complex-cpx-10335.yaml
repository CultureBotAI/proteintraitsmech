identifier: ComplexPortal:CPX-10335
label: "Interleukin-35 receptor ligand type 2 complex"
definition: >-
  Inhibitory cytokine-receptor complex found predominanatly on B-cells, that plays a key role in immune regulation by promoting the expansion of regulatory B cells (Bregs), while simultaneously suppressing effector T cells, Th1 cells, Th17 cells and macrophages. IL35 signals through four receptors: IL12RB2 homodimers, IL6ST (P40189) homodimers, IL12RB2/IL6ST heterodimers and IL12RB2/IL27RA (this complex). IL35 binding to IL12RB2/IL27RA induces IL12A and EBI3 transcription and the activation of the JAK-STAT pathway through JAK1/JAK2 and STAT1/STAT3 (P42224/P40763). IL35 initiates infectious tolerance, whereby continuous generation of IL35-producing Bregs establishes a positive feedback loop to amplify its immunoregulatory signals. Suppresses autoimmune diseases by converting resting B- and T-cells into IL10 (P22301) and IL35-producting Breg and Treg cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
