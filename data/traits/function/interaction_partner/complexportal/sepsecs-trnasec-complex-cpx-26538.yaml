identifier: ComplexPortal:CPX-26538
label: "SepSecS-tRNASec complex"
definition: >-
  O-phosphoseryl-tRNA:selenocysteinyl-tRNA synthase (SepSecS) complex. SepSecS catalyzes the terminal reaction of selenocysteine; SepSecS converts a phosphoseryl (Sep) group into the selenocysteinyl (Sec) moiety in a process which requires selenocysteine tRNA (tRNASec) and the cofactor, pyridoxal-5-phosphate (PLP). Sec-tRNASec, the product of SepSecS catalysis, is an obligate substrate for selenoprotein synthesis, implying that the catalytic activity of SepSecS is crucial for selenoproteome integrity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
