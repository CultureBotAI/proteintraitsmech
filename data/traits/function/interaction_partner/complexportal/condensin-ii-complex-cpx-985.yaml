identifier: ComplexPortal:CPX-985
label: "Condensin II complex"
definition: >-
  Involved in chromosome condensation and segregation, both in meiosis and mitosis. Assembles in alternating pattern with Condensin I (CPX-979) complex along metaphase chromosomes with fully resolved sister chromatids. Also affects nuclear architecture and chromosome stability during interphase. Defects in Condensin complexes lead to anaphase bridges and apoptosis. In meiosis, only stably associates with chromosomes after anaphase I. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
