identifier: ComplexPortal:CPX-6121
label: "TOM40 mitochondrial outer membrane translocase complex"
definition: >-
  Translocase in the outer mitochondrial membrane that mediates the import of precursor protein and mediates inset of some resident outer membrane proteins. Most mitochondrial proteins are synthesised in the cytosol, imported into mitochondria, sorted to one of the four sub-mitochondrial compartments, where they function, and attain their functional native conformation, which is often facilitated by assembly into the membrane or a multi-protein complex. When translocation is coupled with that by the TIM23 (CPX-6129) or TIM22 (CPX-6124) complex, the TOM channel can operate as a passive pore to allow passage of the polypeptide segment, which is `pulled' by the TIM complex with the aid of differential membrane potential and/or ATP. When translocation is uncoupled from the inner-membrane translocators, the TOM complex uses both the stop-transfer pathway, which consists of two steps, the first requiring a membrane potential and an ATP-dependent chaperone mHsp70, and a second mechanism involving the folding of an N-terminal domain that has already crossed the outer membrane and can function as a trap in the intermembrane space to drive translocation of the C-terminal part of the protein by a Brownian ratchet mechanism. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
