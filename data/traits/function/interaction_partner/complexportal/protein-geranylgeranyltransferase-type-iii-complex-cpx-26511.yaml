identifier: ComplexPortal:CPX-26511
label: "Protein geranylgeranyltransferase type III complex"
definition: >-
  Catalyzes the transfer of a 20-hydrocarbon geranyl-geranyl moiety from a geranyl-geranyl pyrophosphate to a protein having the C-terminal sequence -XXCC, -XCXC and -CCXX , where both cysteines may become modified. Transfers a geranylgeranyl group to mono-farnesylated YKT6 (O15498), generating doubly prenylated YKT6 ensuring the assembly of the Golgi SNARE complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
