identifier: ComplexPortal:CPX-4286
label: "Ferric-hydroxamate ABC transporter complex"
definition: >-
  Imports various ferric (Fe3+) hyroxamates such as coprogen or ferrichrome from the periplasm across the cytoplasmic membrane. Iron hydroxamates are transferred from fhuD to fhuB, then translocates across the cytoplasmic membrane energized by fhuC-catalyzed ATP hydrolysis, which induces a conformational change in fhuB. Member of the ATP-binding cassette (ABC) transporter family, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
