identifier: ComplexPortal:CPX-1717
label: "TORC2 complex"
definition: >-
  Serine/threonine-protein kinase signalling complex required for responses to starvation and stress conditions. Required for cytokinetic actomyosin ring (CAR) morphology and constriction, controls polarity of the actin cytoskeleton, and.regulates the timing and fidelity of cytokinesis. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
