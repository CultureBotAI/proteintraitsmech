identifier: ComplexPortal:CPX-5201
label: "Glycyl-tRNA synthetase complex"
definition: >-
  Catalyses the esterificaion of glycine to its cognate tRNA with the concomitant hydrolysis of ATP. The activated amino acid is transferred to the 3-OH group of a glycine-accepting tRNA. Also synthesises dinuceloside polyphosphates, which may play a role in the regulation of cell functions, for example by serving as RNA caps, thus influencing RNA turnover. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
