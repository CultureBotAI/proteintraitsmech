identifier: ComplexPortal:CPX-356
label: "ATG5-ATG12 complex"
definition: >-
  Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. Required for the elongation of isolation membranes (phagophores) in complex with ATG16L1/ATG16L2 (CPX-200/CPX-354) or lysosomal fusion in complex with TECPR1 (CPX-358). Acts as an E3-like enzyme to recruit the E2-like protein ATG3, conjugated to LC3-I, to the endoplasmic reticulum-derived omegasome. ATG3 binds to and is activated by ATG12, facilitating conjugation of the LC3 to phosphatidylethanolamine, thus converting LC3-I to LC3-II. Therefore, the site of ATG12–ATG5-ATG16L1 complex recruitment determines the site of LC3-II formation. The LC3 family is required for phagophore expansion, closure, and cargo recruitment. Negatively regulates the innate antiviral immune response by blocking the type I IFN production pathway through direct association with RARRES3 (Q9UL19) and MAVS (Q7Z434). Plays a role in translation or delivery of incoming viral RNA to the translation apparatus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
