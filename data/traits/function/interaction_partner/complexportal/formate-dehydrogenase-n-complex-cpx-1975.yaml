identifier: ComplexPortal:CPX-1975
label: "Formate dehydrogenase N complex"
definition: >-
  Formate:quinone oxidoreductase involved in electron transport during anaerobic respiration, induced anaerobically in the presence of nitrate. Uses formate as major electron donor during anaerobic respiration, when nitrate is used as electron acceptor. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
