identifier: ComplexPortal:CPX-1802
label: "Integrin alpha4-beta1 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Mediates both firm and rolling adhesion, causing leukocytes to slow down and begin rolling along the inner surface of a vessel wall. Receptor for fibronectin, in which it recognizes one or more domains within the alternatively spliced CS-1 and CS-5 regions, and VCAM-1, in which it recognizes the sequence Q-I-D-S. On activated endothelial cells triggers homotypic aggregation for most VLA-4-positive leukocyte cell lines. It may also participate in cytolytic T-cell interactions with target cells. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
