identifier: ComplexPortal:CPX-2048
label: "Ku70:Ku80 complex"
definition: >-
  Single-stranded DNA-dependent 3-prime to 5-prime ATP-dependent helicase complex which binds preferentially to fork-like ends of double-stranded DNA in a cell cycle-dependent manner. Also has 5-prime-deoxyribose-5-phosphate lyase activity, nicking DNA 3-prime of an abasic site by a mechanism involving a Schiff base covalent intermediate with the a basic site. However, its main function appears to be the recruitment of several factors with enzymatic activities to DNA double stranded breaks (DSBs). Required for DNA double stranded break repair, chromosome maintenance, transcription regulation, V(D)J recombination, and activating DNA-PK. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
