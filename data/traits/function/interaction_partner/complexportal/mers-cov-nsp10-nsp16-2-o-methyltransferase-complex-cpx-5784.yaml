identifier: ComplexPortal:CPX-5784
label: "MERS-CoV NSP10-NSP16 2'-O-methyltransferase complex"
definition: >-
  2'-O-methyltransferase complex of the MERS coronavirus which mediates mRNA cap 2'-O-ribose methylation to the 5'-cap structure of viral mRNAs using S-adenosyl-L-methionine (SAM, CHEBI:15414) as the methyl donor. The cap structure is essential for efficient splicing, nuclear export, translation and mRNA stability. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
