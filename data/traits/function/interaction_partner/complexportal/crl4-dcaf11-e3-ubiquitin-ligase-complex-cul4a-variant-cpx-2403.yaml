identifier: ComplexPortal:CPX-2403
label: "CRL4-DCAF11 E3 ubiquitin ligase complex, CUL4A variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor DCAF11. The complex is active in the regulation of stress response in the cell by ubiquitinating and targetting for destruction the NFE2L2 (Q16236) transcription factor. Also plays a role in a mitotic surveillance pathway preventing the nucleosomal protein CENPA (P49450) from targeting to the non-centromeric regions. During early mitotic phase, newly synthesized CENPA is phosphorylated at Ser-68 by Cyclin B1-CDK1 complex (CPX-2007, CPX-2008). This is recognized by the ubiquitin ligase resulting in polyubiquitination and proteasome-mediated degradation of CENPA. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
