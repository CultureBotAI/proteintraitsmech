identifier: ComplexPortal:CPX-6135
label: "Phagocyte NADPH oxidase complex, RAC3 variant"
definition: >-
  Plays a crucial role in host defense against microbial infections by generating reactive oxygen species. Transfers electrons across the wall of the phagocytic vacuole, forming superoxide in the lumen and promoting microbial killing through the generation of reactive oxygen species and through the activity of myeloperoxidase. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
