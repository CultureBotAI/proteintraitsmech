identifier: ComplexPortal:CPX-1332
label: "RAT1-RAI1 RNA polymerase II termination complex"
definition: >-
  5-prime-3-prime exoribonuclease which promotes RNA polymerase II (RNAPII) termination by degrading RNA from the newly formed 5-prime phosphorylated end. RNAPII becomes catalytically disrupted when an NTP mis-incorporates and is more efficiently terminated by the complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
