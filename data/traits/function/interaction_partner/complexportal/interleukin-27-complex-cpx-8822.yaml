identifier: ComplexPortal:CPX-8822
label: "Interleukin-27 complex"
definition: >-
  A member of the IL12/IL6 family of cytokines, IL27 is a heterodimer comprised of a p28 four-alpha helical cytokine subunit non-covalently linked to a compact soluble receptor subunit, which serve as the alpha- and beta-subunits of the cytokine, respectively. Binds to a heterodimeric receptor to form the Interleukin27 ligand-receptor complex (CPX-8836) to activate either the JAK/STAT or the p38 MAPK/ERK signaling cascade. A pleiotropic cytokine with both anti- and pro-inflammatory activity, it is capable of exerting both innate and adaptive immune responses. Functions to restrain T cell-mediated inflammation and plays an important role in immune homeostasis through its ability to: modify CD4+ and CD8+ T cell effector functions, promote T regulatory (Treg) responses, mobilize a suppressive transcriptional network through activation of SOCS (suppressors of cytokine signalling), downregulate proinflammatory cytokines IFNG (P01579), TNF (P01375) and IL17, and induce the production of anti-inflammatory cytokine IL10 by T cells. Interestingly, IL27 suppresses IL10 production by human monocytes. IL27A is secreted bound to IL27B mainly by antigen presenting cells (APCs) such as monocytes, macrophages and dendritic cells (DCs). Varying levels of IL-27 is also secreted by other cells such as myeloid-derived supressor cells, CD4+, CD8+ T cells, osteoclasts and activated B cells. Specific signaling stimulation, including Toll-like receptor (TLR9) and lipopolysaccharides (LPS) also regulates IL-27 expression. IL27 possesses both pro-tumourigenic and anti-tumourigenic functions. IL27 induction of IL10 in T cells, leads to IL-10 inhibiting antitumor immunity. It is considered therapeutically important due to its ability to induce inhibitory receptors. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
