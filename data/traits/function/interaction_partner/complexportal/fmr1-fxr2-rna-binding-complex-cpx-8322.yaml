identifier: ComplexPortal:CPX-8322
label: "FMR1-FXR2 RNA-binding complex"
definition: >-
  mRNA binding complex that play a critical role in mRNA metabolism, regulating alternative mRNA splicing, mRNA stability, mRNA dendritic transport and postsynaptic local protein synthesis of target mRNAs. Undergoes liquid-liquid phase separation on binding to target mRNAs leading to their assembly into cytoplasmic membrane‐less ribonucleoprotein stress granules that both concentrates mRNAs with associated regulatory factors and also sequesters them in the cytoplasm preventing nuclear functions such as alternative splicing, transcriptional regulation or mRNA processing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
