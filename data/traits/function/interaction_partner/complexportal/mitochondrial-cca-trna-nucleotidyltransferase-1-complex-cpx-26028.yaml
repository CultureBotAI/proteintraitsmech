identifier: ComplexPortal:CPX-26028
label: "Mitochondrial CCA tRNA nucleotidyltransferase 1 complex"
definition: >-
  Responsible for the the addition of a CCA triplet at the 3'-end of mitochondrial tRNA which is required for aminoacylation.and tRNA maturation. This immediately follows tRNA 5′- and 3'-processing by the RNase P (CPX-6155) and RNase Z (CPX-2240) complexes respectively. The 3′-CCA is an RNase Z antideterminant, which is recognized and not removed by ELAC2 to avoid futile cycling of the tRNAs between this complex and RNase Z. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
