identifier: ComplexPortal:CPX-6227
label: "GATOR2 complex"
definition: >-
  Functions as an activator of the amino acid-sensing branch of the mTORC1 pathway. Indirectly activates mTORC1 (CPX-503) through the inhibition of the GATOR1 complex (CPX-6226). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
