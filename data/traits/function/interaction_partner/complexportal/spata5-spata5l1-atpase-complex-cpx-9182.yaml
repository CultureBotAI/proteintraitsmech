identifier: ComplexPortal:CPX-9182
label: "SPATA5-SPATA5L1 ATPase complex"
definition: >-
  Acts as an ubiquitin-independent unfoldase, remodeling protein complexes and facilitating their subsequent cleavage by cysteine proteases and their subsequent removal from the chromatin. Processes replisome substrates in response to replication fork damage. Deficiency of the complex induces ubiquitin-independent proteotoxicity, replication stress and acute chromosome instability. Neurodevelopmental syndromes including epilepsy, hearing loss, mental retardation syndrome (EHLMRS) and neurodevelopmental disorder with hearing loss and spasticity (NEDHLS) are associated with SPATA5 and SPATA5L1 mutations. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
