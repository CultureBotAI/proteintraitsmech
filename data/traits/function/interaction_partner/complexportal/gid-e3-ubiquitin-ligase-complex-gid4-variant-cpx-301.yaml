identifier: ComplexPortal:CPX-301
label: "GID E3 ubiquitin ligase complex, GID4 variant"
definition: >-
  E3 ubiquitin ligase complex that triggers polyubiquitylation and subsequent proteasomal degradation of the gluconeogenic enzymes fructose-1,6-bisphosphatase (P09201), phosphoenolpyruvate carboxykinase (P10963) and cytoplasmic malate dehydrogenase (P22133). The complex functions as the N-recognin of the GID-mediated proteolytic system termed the Pro/N-degron pathway and targets proteins by recognizing their N-terminal Pro residues or a Pro at position 2. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
