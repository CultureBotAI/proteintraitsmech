identifier: ComplexPortal:CPX-7802
label: "Thyrostimulin thyroid-stimulating hormone complex"
definition: >-
  Glycoprotein hormone which binds and activates the thyroid-stimulating hormone receptor (P16473), leading to increased cAMP production. The lability of the complex has suggested an autocrine or paracrine role for the complex, rather than it acting as an endocrine factor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
