identifier: ComplexPortal:CPX-1086
label: "MazEF toxin-antitoxin complex"
definition: >-
  Type II toxin-antitoxin (TA) system formed by the toxin (maxF), and the antitoxin (mazE). TA systems act as effectors of dormancy and persistence, with the toxin causing growth arrest by interfering with a vital cellular process, such as transcription, translation or DNA replication, and the cognate antitoxin neutralizing the toxin activity during normal growth conditions. Presence of free mazF toxin induces programmed cell death by cleavage of RNA specifically at ACA sequences to block protein synthesis. Under conditions of stress the antitoxins are selectively degraded by cellular proteases such as Lon (P0A9M0) and ClpXP (CPX-3176), leaving the toxins to exert their effectsl which result in growth arrest and cell dormancy. Both the antitoxin and, in most cases, the TA complex bind the TA promoter to repress transcription, with TA complexes repressing transcription more efficiently than the antitoxins alone by increasing the co-operativity of antitoxin binding to operators. Plays a role in biofilm formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
