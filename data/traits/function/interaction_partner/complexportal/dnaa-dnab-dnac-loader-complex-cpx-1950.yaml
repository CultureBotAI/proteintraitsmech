identifier: ComplexPortal:CPX-1950
label: "dnaA-dnaB-dnaC loader complex"
definition: >-
  The dnaB helicase is associated with a inhibitory/loader protein, dnaC, an AAA+ ATPase which, together with dnaA, chaperones two dnaB hexamers onto single-stranded DNA strands during initiation of replication. dnaA loads one dnaB-dnaC complex (CPX-1934) on the top strand near the left border of oriC and a second dnaB-dnaC complex on the lower strand next to dnaA box R1. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
