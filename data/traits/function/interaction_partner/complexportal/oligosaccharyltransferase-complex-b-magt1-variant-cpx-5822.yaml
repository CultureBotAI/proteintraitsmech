identifier: ComplexPortal:CPX-5822
label: "Oligosaccharyltransferase complex B, MAGT1 variant"
definition: >-
  Oligosaccharyl transferase (OST) complex that catalyzes the initial transfer of a defined glycan (Glc3Man9GlcNAc2 in eukaryotes) from the lipid carrier dolichol-pyrophosphate to an asparagine residue within an Asn-X-Ser/Thr consensus motif in nascent polypeptide chains, the first step in protein N-glycosylation. N-glycosylation occurs post-translocationally. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
