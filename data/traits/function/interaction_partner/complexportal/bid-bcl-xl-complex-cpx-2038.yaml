label: "BID:BCL-XL complex"
definition: >-
  BH3 domain-containing BID interacts with BCL-XL. BCL-XL inhibits BID-induced cytochrome C leakage from mitochondria without ameliorating BID processing or tBID translocation to mitochondria. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
