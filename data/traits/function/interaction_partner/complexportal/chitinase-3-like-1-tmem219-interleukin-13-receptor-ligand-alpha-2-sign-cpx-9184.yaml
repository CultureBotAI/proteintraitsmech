identifier: ComplexPortal:CPX-9184
label: "Chitinase 3-like-1-tmem219-interleukin-13 receptor-ligand alpha-2 signalling complex"
definition: >-
  Complex formed upon Chitinase-3-like protein 1 (CHI3L1) binding to interleukin-13 receptor alpha-2 (IL13RA2) by associating with TMEM219 which is a cell-death receptor for IGFBP-3 (P17936). CHI3L1 interaction with IL13RA2 through a TMEM219-dependent pathway prevents cell death by activating the MAP kinases, ERK1/2 and AKT pathways, while direct interaction with IL13RA2 results in apoptosis through activation of Wnt/beta-catenin (P35222). Functional effects of this complex is also moderated by LGALS3 (P17931), which physically interacts with IL13RA2 and CHI3L1 to compete with TMEM219 for IL13RA2 binding, thereby diminishing the anti-apoptotic role of CHI3L1. IL13RA2 also forms a complex with IL13 and TMEM219 (CPX847) which largely acts as a decoy to diminish IL13 activity. IL13RA2 N-glycosylation is a critical determinant of whether it binds CHI3L1 or IL13; CHI3L1 binding to IL13RA2 and signalling is increased if IL13RA2 N-glycosylation is diminished. CHI3L1 is a carbohydrate-binding lectin with a preference for chitin, produced by immune cells, osteoclasts, chondrocytes, smooth muscle cells, astrocytes and cancer cells upon stimulation from several interleukins including IL13, IL6, IL1B and TNF. CHI3L1 expression is inhibited by miR-24, miR-342-3p, miR-449a, miR125a-3p and miR-96-5p. CHI3L1 binding to IL13RA2 leads to inflammasome activation, melanoma metastasis, apoptosis, oxidative damage, allergic inflammation, wound healing, fibrosis, and TGFB1 production. CH3L1 also plays a key role in antipathogenic responses and is involved in stimulating disease tolerance by controlling cell death, inflammation and remodelling. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
