identifier: ComplexPortal:CPX-7744
label: "LIN-10-LIN-2-LIN-7 complex, LIN7A variant"
definition: >-
  Scaffolding complex which appears to act as a major organization hub for modulating cellular functions, such as neuronal synaptic transmission, and cell polarity establishment and maintenance, with four PDZ domains, an SH3-GK tandem, and a PTB domain not involved in complex formation and thus available for binding to various target proteins. May associate with the motor protein KIF17 (Q9P2E2) to transport vesicles containing N-methyl-D-aspartate (NMDA) receptor subunit NR2B (Q13224) along microtubules. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
