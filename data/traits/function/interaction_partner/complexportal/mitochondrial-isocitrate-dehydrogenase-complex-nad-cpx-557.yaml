identifier: ComplexPortal:CPX-557
label: "Mitochondrial isocitrate dehydrogenase complex (NAD+)"
definition: >-
  Tricarboxylic acid cycle enzyme which catalyzes the conversion of threo-Ds-isocitrate to alpha-ketoglutarate and carbon dioxide, important for regulatory control of mitochondrial energy metabolism. Allosterically regulated, activated by citrate and ADP, inhibited by ATP. There are two binding sites per tetramer for each of its ligands: isocitrate, Mn2+, NAD, ADP, NADH, and NADPH. During the oxidative decarboxylation, NAD reacts with Mn2+-isocitrate. The active sites are shared between the Mn2+-binding alpha and gamma subunits and between the NAD-binding alpha and beta subunits. The allosteric activator ADP has been found to be associated with only the beta and gamma subunits. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
