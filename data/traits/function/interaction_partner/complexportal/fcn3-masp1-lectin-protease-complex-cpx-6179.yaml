identifier: ComplexPortal:CPX-6179
label: "FCN3-MASP1 lectin-protease complex"
definition: >-
  Calcium-dependent pattern-recognition receptor and serine protease complex of the lectin pathway (LP) of complement activation. Activates the LP by binding sugar moieties and acetyl groups of pathogen-associated molecular patterns (PAMPs) displayed on microbes via the lectin FCN3 subcomplex. Binds preferentially to N-acetylglucosamines (GlcNAc), GlcNAc, D-fucose, mono/oligosaccharide and lipopolysaccharides. Mainly expressed in liver and kidney. Mainly present in peripheral blood leukocytes, monocytes and granulocytes. MASP1 protease is probably activated by cleavage by a MASP1 from a neighbouring FCN3-MASP1 complex and in turn cleaves and activates MASP2 protease in FCN3-MASP2 complex (CPX-6239) and complement precursor C4 (P0C0L4). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
