identifier: ComplexPortal:CPX-5908
label: "CcdAB toxin-antitoxin complex"
definition: >-
  Type II toxin-antitoxin (TA) system formed by the toxin (ccdB), and the antitoxin (ccdA). TA systems act as effectors of dormancy and persistence, with the toxin causing growth arrest by interfering with a vital cellular process, such as transcription, translation or DNA replication, and the cognate antitoxin neutralizing the toxin activity during normal growth conditions. Formation of this complex dissociates the CcdB-poisoned gyrase complex (CPX-5906) in a process called rejuvenation. The CcdAB complex also acts as a repressor of the ccd operon. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
