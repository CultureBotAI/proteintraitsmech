identifier: ComplexPortal:CPX-2210
label: "Subcortical maternal complex"
definition: >-
  Essential role in zygote progression beyond the first embryonic cell divisions potentially by controlling spindle positioning through regulation of subcortical F-actin. It is present in the subcortex of eggs and preimplantation embryos and is excluded from regions of cell-cell contact in the cleavage-stage embryo. It segregates to the outer cells of morulae and blastocysts, and is absent in the embryo inner cell mass. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
