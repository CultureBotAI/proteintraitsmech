identifier: ComplexPortal:CPX-2348
label: "HUSH epigenetic repressor complex"
definition: >-
  Mediates epigenetic repression, responsible for position-effect variegation of integrated transgenes in human cells. Recruited to genomic loci rich in H3K9me3, where subsequent recruitment of the histone methyltransferase SETDB1 (Q15047) is required for further H3K9me3 deposition to maintain transcriptional silencing. Acts with MORC2 (Q9Y6X9) to repress LINE-1 class I transposable elements. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
