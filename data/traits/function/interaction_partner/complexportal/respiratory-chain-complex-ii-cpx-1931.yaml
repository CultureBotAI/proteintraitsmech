identifier: ComplexPortal:CPX-1931
label: "Respiratory chain complex II"
definition: >-
  Key enzyme linking the Krebs cycle with the respiratory chain in aerobic respiration: Catalyzes the oxidation of succinate to fumarate and the reduction of quinone to quinol. Electrons flow from the FAD-bound succinate through the Fe-S clusters to a b556 heme. Electrons ultimately reduce quinone to quinol in the membrane bound part of the enzyme. Under most conditions the electrons are used to reduce oxygen, allowing ATP synthesis. Member of the Complex II family. The functionally inverse complex found in anaerobic respiration is the QFR complex (CPX-1967). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
