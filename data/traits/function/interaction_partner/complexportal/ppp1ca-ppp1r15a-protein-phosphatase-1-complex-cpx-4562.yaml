identifier: ComplexPortal:CPX-4562
label: "PPP1CA-PPP1R15A protein phosphatase 1 complex"
definition: >-
  A serine/threonine-protein phosphatase complex that dephosphorylates the translation initiation factor EIF2S1 (eIF-2A, P05198), thus reversing the shut-off of protein synthesis initiated by stress-inducible kinases and facilitating recovery of cells from stress. The complex down-regulates the TGF-beta signaling pathway by promoting dephosphorylation of TGFB1 (P01137). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
