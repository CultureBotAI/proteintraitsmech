identifier: ComplexPortal:CPX-3943
label: "Pyruvate dehydrogenase complex"
definition: >-
  Converts pyruvate to acetyl-CoA and CO2, thus providing a metabolic connection between glycolysis, whose end product is pyruvate, and the tricarboxylic acid cycle, which starts with acetyl-CoA. It contains multiple copies of three enzymatic components, that are encoded by a single operon: pyruvate dehydrogenase (E1), dihydrolipoamide acetyltransferase (E2) and lipoamide dehydrogenase (E3). In anaerobic Escherichia coli, the complex is normally inactive due to inhibition of ldpA by NADH. During aerobic growth, the NADH generated in glycolysis is oxidized and the complex becomes active. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
