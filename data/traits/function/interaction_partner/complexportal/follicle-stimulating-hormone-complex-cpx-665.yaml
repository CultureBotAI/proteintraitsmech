identifier: ComplexPortal:CPX-665
label: "Follicle-stimulating hormone complex"
definition: >-
  Glycoprotein hormone synthesized and secreted by gonadotropes in the anterior pituitary gland. FSH enables ovarian folliculogenesis to the antral follicle stage and is essential for Sertoli cell proliferation and maintenance of sperm quality in the testis. It acts synergistically with the Luteinizing-stimulating hormone complex (CPX-6097). A member of the family of pituitary glycoprotein hormones that play key roles in human fertility. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
