identifier: ComplexPortal:CPX-1074
label: "SF1-U2AF65 splicing factor complex"
definition: >-
  Spliceosome complexes that recognizes consensus sequences at the 3-prime splice sites of pre-mRNAs. Once bound to the pre-mRNA, U2AF2 recruits the U2 small nuclear ribonucleoprotein particle (snRNP) to the assembling spliceosome. Phosphorylation of SF1 by UHMK1 (Q8TAS1) enhances SF1-U2AF2 interactions and promotes assembly of the ternary complex of SF1, U2AF2, and the 3-prime splice site. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
