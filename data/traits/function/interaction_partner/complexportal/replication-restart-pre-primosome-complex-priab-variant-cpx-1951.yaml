identifier: ComplexPortal:CPX-1951
label: "Replication restart pre-primosome complex, priAB variant"
definition: >-
  Required for the restart of replication at sites of premature termination of DNA replication which leaves collapsed/abandoned replication forks that would otherwise create double-strand DNA breaks (DSBs) on the next round of replication. Serves to reload the replicative helicase dnaB on sites far removed from the origin of replication in a DNA structure-dependent manner.The PriA-PriB variant appears to be the dominant restart mechanism in E.coli, with priA binding single-stranded, double-stranded and forked DNA with high affinity. PriB appears to be important for restart following DNA recombination. On binding, priA undergoes a conformational change, exposing the priB binding site. The priA:priB:DNA ternary interaction stabilizes priA on the DNA and enhances its helicase activity, facilitating unwinding of the nascent lagging strand if one is present. dnaT is recruited to the priA:priB:DNA ternary complex which leads to release of ssDNA by priB. The dnaB-dnaC complex (CPX-1934) is recruited to the primosome, possibly through direct contacts with dnaT and the dnaB is loaded from dnaB-dnaC onto ssDNA on the lagging strand template. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
