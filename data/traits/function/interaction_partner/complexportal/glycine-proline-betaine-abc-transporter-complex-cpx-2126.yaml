identifier: ComplexPortal:CPX-2126
label: "Glycine/Proline betaine ABC transporter complex"
definition: >-
  High affinity glycine betaine and proline betaine transporter. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Responsible for the regulation of cell volume by translocating solutes across the plasma membrane. The proVWX operon is activated under osmotic stress conditions and the complex itself is regulated by osmotic stress, presumably via an increase in the internal salt concentration . A curated stable macromolecular complex (Complex Portal) with 3 subunits.
