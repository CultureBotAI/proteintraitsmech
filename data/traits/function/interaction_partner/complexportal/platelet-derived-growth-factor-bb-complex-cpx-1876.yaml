identifier: ComplexPortal:CPX-1876
label: "Platelet-derived growth factor BB complex"
definition: >-
  A-chain of the platelet-derived growth factor (PDGF). Binds to and activates PDGF receptor alpha (PDGFRalpha, P16234) and beta (PDGFRbeta, P09619) subunits by inducing receptor dimerisation and tyrosine phosphorylation. Is a potent mitogen for cells of mesenchymal origin. Plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Required for normal proliferation and recruitment of pericytes and vascular smooth muscle cells in the central nervous system, skin, lung, heart and placenta. Required for normal blood vessel development, and for normal development of kidney glomeruli. Plays an important role in wound healing. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
