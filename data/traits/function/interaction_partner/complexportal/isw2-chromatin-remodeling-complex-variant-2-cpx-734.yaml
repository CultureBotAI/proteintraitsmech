identifier: ComplexPortal:CPX-734
label: "ISW2 chromatin remodeling complex variant 2"
definition: >-
  ATP-dependent chromatin remodeling complex which is required for repression of early meiotic genes during mitotic cell growth. Slides mononucleosomes from the end to the center of DNA and requires the flexible, acidic patch of the histone H4 tail to efficiently dock its translocase on the nucleosome, for stimulating the ATPase activity and inducing nucleosome mobility. Preferentially bind nucleosome substrates containing ~70 bp extranucleosomal DNA at one entry/exit site of the nucleosome. ISW2 interacts with three nucleosomal and extranucleosomal regions. ITC1 and ISW2 bind to the region 2 helical turns from the dyad axis and a region closest to the entry/exit site. ITC1 subunit makes extensive contacts with extranucleosomal DNA. The absence of the histone fold dimer DPB4/DLS1 present in variant 1 (CPX-728) appears to alter the target gene profile regulated by this complex, the dimer acts to affect its nucleosome spacing activity, the ability to sense an adjacent nucleosome and to regulate remodeling. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
