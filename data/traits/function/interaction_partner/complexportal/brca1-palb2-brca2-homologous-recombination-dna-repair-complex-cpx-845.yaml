identifier: ComplexPortal:CPX-845
label: "BRCA1-PALB2-BRCA2 homologous recombination DNA repair complex"
definition: >-
  Potentiates homologoues recombinational DNA repair (HR) by promoting assembly of RAD51 family of DNA repair proteins onto newly synthesized single-stranded DNA. Act downstream of Fanconi anemia proteins and complexes to repair DNA interstrand crosslinks. The MRN complex (CPX-4442) recruits ATM (Q13315) to the site of double-stranded DNA breaks, which then auto-activates and recruits BRCA1, facilitating a shift from non-homologous end-joining to HR. A newly generated single-strand of DNA is covered by replication protein A (RPA) complex (CPX-1878/CPX-1879). PALB2 is phosphorylated on Ser-59 by ATR (Q13535) and the BRCA1-PALB2-BRCA2 complex forms, promoting RPA removal and RAD51 loading. The resulting RAD51-ssDNA filament invades the intact sister chromatid and the strand is extended through the action of DNA polymerases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
