identifier: ComplexPortal:CPX-7723
label: "BRAHMA SWI/SNF ATP-dependent chromatin remodeling complex"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to promoters and enhancers of target genes in cells and alters chromatin structure by altering DNA-histone contacts within a nucleosome, leading eventually to a change in nucleosome position, thus facilitating or repressing binding of gene-specific transcription factors. The complex binds to the transcription start site flanking regions of protein-coding genes and contains a histone acetylation reader (BRD1/BRD2/BRD13). A curated stable macromolecular complex (Complex Portal) with 16 subunits.
