identifier: ComplexPortal:CPX-26429
label: "Major Spliceosomal Pre-B complex"
definition: >-
  Precursor pre-catalytic spliceosome (pre-B) complex. The spliceosome executes pre-mRNA splicing through a highly dynamic series of compositional and conformational transitions encompassing assembly, activation, catalysis and disassembly of a highly dynamic structure, involving the binding and release of the small nuclear RNAs (snRNA) and protein factors which remove intronic sequence from pre-mRNA. Spliceosome stages are characterized as E, A, B and remodelling of the pre-catalytic spliceosome (B complex) into the activated spliceosome (Bact complex) and subsequently, the activated spliceosome (B* complex) to carry out two RNA-catalysed transesterification reactions that lead to intron removal and splicing together of the flanking exon sequences. A curated stable macromolecular complex (Complex Portal) with 25 subunits.
