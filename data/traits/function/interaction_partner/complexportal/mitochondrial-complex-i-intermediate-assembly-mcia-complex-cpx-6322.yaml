identifier: ComplexPortal:CPX-6322
label: "Mitochondrial complex I intermediate assembly (MCIA) complex"
definition: >-
  Required for building the intermediate ND2-module which is part of the proximal membrane arm of mitochondrial respiratory chain complex I (CPX-577). The assembly factor TIMMDC1 (Q9NPL8) has also been identified in association with the MCIA complex and stalled complex I intermediates. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
