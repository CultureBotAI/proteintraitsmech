identifier: ComplexPortal:CPX-3231
label: "SEA complex"
definition: >-
  Vacuole associated growth regulator that acts as a GTPase-activating protein (GAP) for GTR1 (Q00582), a Rag GTPase that relays nutrient status to the Target of Rapamycin Complex 1 (CPX-1715, CPX-1716) One end of the SEA complex is made of the IML1/NPR2/NPR3 trimer (SEACIT), involved in inhibition of TORC1 signaling, while the other end, composed of RTC1/MTC5/SEA4/SEH1/SecEC13 (SEACAT), is involved in the activation of TORC1 signaling by acting as a scaffold for the binding of TORC1 regulators. The complex thus regulates TORC1 signaling and is involved in maintaining vacuolar integrity, regulating autophagy in response to nitrogen starvation. A putative GEF activity was suggested for NPR2 and NPR3. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
