identifier: ComplexPortal:CPX-7667
label: "LINC complex, SUN2-SYNE1 variant"
definition: >-
  Forms immediately below the outer nuclear membrane and traverses the nuclear envelope to mechanically couple cytoskeletal and nuclear components across the nuclear envelope, allowing the transmission of force. Links the nuclear lumen to cytoplasmic microtubules during meiosis with SYNE1 interacting with the actin cytoskeleton via N-terminal actin binding domains. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
