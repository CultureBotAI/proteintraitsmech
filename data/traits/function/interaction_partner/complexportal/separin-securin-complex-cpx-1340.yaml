identifier: ComplexPortal:CPX-1340
label: "Separin-securin complex"
definition: >-
  Regulates the metaphase-to-anaphase transition during cell cycle progression, playing a role in control of the metaphase-anaphase transition and anaphase onset. Complex formation both activates and inhibits the protease activity of separase which is responsible for cleaving the MCD1/SCC1 (Q12158) subunit of the cohesin ring that holds sister chromatids together during mitosis. Securin appears to ensure that separase adopts its proper fold required for proteolytic activity and also promotes subcellular localization of separase to the nucleus. Securin is degraded via ubiquitylation by the anaphase-promoting complex (APC, CPX-760, CPX-761, CPX-762, CPX-756) enabling separase to become fully active. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
