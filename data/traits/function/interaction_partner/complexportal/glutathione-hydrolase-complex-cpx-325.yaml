identifier: ComplexPortal:CPX-325
label: "Glutathione hydrolase complex"
definition: >-
  Glutathione hydrolase/Glutamine Amidotransferase II complex responsible for glutathione degradation. Both DUG2 and DUG3 are depressed under sulfur limitation conditions. Although neither protein alone can cleave glutathione, the complex degrades glutathione by cleaving of the gamma-glutamyl linkage. DUG3 has the GATase activity, while DUG2 probably acts as a scaffold protein, bringing two DUG3 proteins together. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
