identifier: ComplexPortal:CPX-4315
label: "Autoinducer-2 ABC transporter complex"
definition: >-
  ABC transporter complex involved in autoinducer 2 (AI-2, (2R,4S)-2-methyltetrahydrofuran-2,3,3,4-tetrol, CHEBI:44800) import, small hormone-like organic molecules required for bacterial cell-to-cell communication. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. Population-based multi-cellularity, has been termed quorum sensing. Extracellular AI-2 activity peaks during the mid- to late-exponential phase and rapidly decreases during entry into the stationary phase. The disappearance of extracellular AI-2 activity is due to its import by this complex. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
