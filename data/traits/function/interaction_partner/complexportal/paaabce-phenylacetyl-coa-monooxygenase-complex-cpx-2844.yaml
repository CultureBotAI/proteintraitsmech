identifier: ComplexPortal:CPX-2844
label: "paaABCE phenylacetyl-CoA monooxygenase complex"
definition: >-
  Mono-oxygenase which converts phenylacetate (PA)-CoA to its 1,2-epoxide derivative, ring 1,2-epoxyphenylacetyl-CoA, as part of the PA utilization pathway, the main mechanism for degradation of a variety of organic compounds. Also catalyzes the reverse deoxygenation reaction (distinguish from dioxygenation), in which 2H+ equivalents are used to yield phenylacetyl-CoA and water when toxic epoxides accumulates due to inadequate processing by the downstream enzymes paaG (P77467) and paaZ (P77455). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
