identifier: ComplexPortal:CPX-2217
label: "FEM1A-Elongin C-Elongin B E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which targets degradation signals (degrons) within the C-termini of substrate proteins in a pathway termed destruction via C-end degrons (DesCEND). The C-degron is generally a motif of fewer than ten residues C-degrons ending with -K/R-X1-2-R (X denotes any residue) and can be present in full-length proteins, truncated proteins or proteolytically cleaved forms.Targets include the C-degrons of nucleotide exchange factor SIL1 (Q9H173) and olfactory receptor 51B2 (Q9Y5P1). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
