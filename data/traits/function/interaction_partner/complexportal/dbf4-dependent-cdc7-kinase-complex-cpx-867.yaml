identifier: ComplexPortal:CPX-867
label: "DBF4-dependent CDC7 kinase complex"
definition: >-
  Serine/threonine-protein kinase essential for the initiation of DNA replication. Associates with replication origins where it phosphorylates components of the prereplicative complex including the MCM helicase (CPX-2944). Has post-replicative functions in meiosis and is essential for double-strand break formation and kinetochore localization of monopolin. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
