identifier: ComplexPortal:CPX-26488
label: "Glycodelin complex"
definition: >-
  Regulates critical steps during fertilization and interacts with cell-surface receptors in an immunomodulatory capacity. Found in reproductive tiisues, Glycodelin exists in four distinct isoforms, -A, -S, -F and -C which arise from differing N-linked glycosylation at Asn-46 and Asn-81. Glycodelin-A is found in amniotic fluid, the uterine luminal cavity, endometrium decidua and maternal serum, Glycodelin-C in cumulus cells, Glycodelin-F in follicular fluid, luteinized granulosa cells and the oviduct and, Glycodelin-S in seminal plasma and seminal vesicles. All four forms share the same protein core but differ in their glycosylation and in their biological activity. Glycodelin-A's role is attributed to contraceptive and immunosuppressive activities, Glycodelin-C's role to the binding of spermatozoa to the zona pellucida, Glycodelin-F's role to inhibiting spermatozoa-zona pellucida binding, significantly suppressing progesterone-induced acrosome reaction of spermatozoa, and Glycodelin-S's role to binding and maintaining the uncapacitated state of human spermatozoa. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
