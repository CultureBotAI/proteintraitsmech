identifier: ComplexPortal:CPX-8601
label: "STRIPAK complex, STRIP2-STRN3 variant"
definition: >-
  Multisubunit protein phosphatase complex which acts as a signaling hub to recruit multiple catalytic and regulatory binding partners Key negative regulator of the Hippo pathway that controls tissue homeostasis and suppresses tumorigenesis. Recruited to auto-activated STK3/4 (Q13188/Q13043) via the adaptor protein SLMAP (Q14BN4) to reverse T-loop phosphorylation of these Hippo kinases, limiting their activation through feedback inhibition. Inositol hexakisphosphate acts to sense the cellular phosphate balance and may regulate phosphatase activity by stabilizing STRIP2, enabling STRIPAK assembly. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
