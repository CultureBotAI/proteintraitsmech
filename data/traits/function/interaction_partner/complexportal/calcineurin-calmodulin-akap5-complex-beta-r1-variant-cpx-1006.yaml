identifier: ComplexPortal:CPX-1006
label: "Calcineurin-Calmodulin-AKAP5 complex, beta-R1 variant"
definition: >-
  Calcium-dependent, calmodulin-stimulated protein phosphatase calcineurin in complex with plasma-membrane anchor protein Akap5. Calcineurin is important for cardiac development and pathophysiology, for nervous-system development and for some of the plastic changes in neurons that are believed to underlie learning and memory. Akap5 recruits calcineurin to the vicinity of L-type Ca2+ channels for their activation by elevated Ca2+ entering the cell. Akap5 balances the opposing effects of calcineurin and protein kinase A (PKA) (P05132) on neuronal voltage-gated L-type Ca2+ channels and coordinates the activities of calcineurin, PKA and PKC on a number of other channels and receptors. Despite its atypical PxIxIT calcineurin-recognition motif that confers stronger binding affinity by calcineurin than other substrates it allows for effective disengagement of calcineurin to couple channel activation with downstream signaling events. The calcineurin-Akap5 complex has been shown to promote NFAT signaling. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
