identifier: ComplexPortal:CPX-3881
label: "arr-1-mpz-1-daf-18 complex"
definition: >-
  Signalling complex that positively regulates the insulin-like daf-2 (Q968Y9) signaling pathway to control the phosphorylation and intracellular localisation of the forkhead transcription factor FOXO/daf-16 (O16850). Formation of the complex probably inhibits the phosphatase activity of PTEN/daf-18 (G5EE01). The complex may play a role in the regulation of lifespan. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
