identifier: ComplexPortal:CPX-10281
label: "Myddosome core complex"
definition: >-
  Innate immune signalling platform which transmits inflammatory signals as a result of TLR/IL1R (P14778) activation to promote proinflammatory responses. Myddosome assembly occurs in a stepwise manner in which MyD88 recruits IRAK4, and the intermediary MyD88:IRAK4 complex recruits and binds IRAK1/IRAK2 drawing IRAKs' kinase domains closer, allowing for phosphorylation and activation. IRAK1/IRAK2 subsequently enables binding to TRAF6 (Q9Y4K3), which is vital for recruiting transcription factors in the NFKB and MAPK pathways to elicit expression of proinflammatory cytokines. Myddosome assembly is tightly-regulated by IRAK4 and occurs in a context-specific manner with all components playing substantial roles in scaffolding. Myddosome size, number and assembly speed governs the intensity of the inflammatory response. Myddosome-mediated proinflammatory responses are determined by IRAK4 activity but IRAK4 is also capable of indirectly inhibiting myddosome signalling thereby forming a negative feedback loop. Uncontrolled myddosome activation is linked to cancers caused by gain-of-function mutations. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
