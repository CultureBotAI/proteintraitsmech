identifier: ComplexPortal:CPX-5747
label: "entAE 2,3-dihydroxybenzoate-AMP ligase complex"
definition: >-
  Required for a step in the synthesis of enterobactin (CHEBI:28855), a catecholate-type siderophore. Complex formation optimises the activation of the carboxylate group of 2,3-dihydroxy-benzoate (CHEBI:36654) by entE, via a reversible ATP-dependent pyrophosphate exchange reactions to yield the acyladenylate intermediate 2,3-dihydroxybenzoyl-AMP. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
