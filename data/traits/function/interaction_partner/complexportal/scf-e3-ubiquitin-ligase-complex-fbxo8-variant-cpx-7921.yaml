identifier: ComplexPortal:CPX-7921
label: "SCF E3 ubiquitin ligase complex, FBXO8 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO8 target proteins include the Pi class phase II metabolizing enzyme glutathione S-transferase P1 (P09211) and the ADP-ribosylation factor, ARF6 (P62330) which regulates membrane remodeling at cell peripheries. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
