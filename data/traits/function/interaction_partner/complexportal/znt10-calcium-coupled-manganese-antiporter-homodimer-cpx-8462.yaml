identifier: ComplexPortal:CPX-8462
label: "ZNT10 calcium-coupled manganese antiporter homodimer"
definition: >-
  Calcium-coupled manganese ion antiporter which mediates the active removal of Mn2+ from the cell, utilizing the steep transmembrane Ca2+ gradient, thus preventing the generation of harmful oxygen radicals caused by the redox activity of Mn2+. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
