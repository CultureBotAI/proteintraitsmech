identifier: ComplexPortal:CPX-2889
label: "PDGF receptor beta - PDGF-DD complex"
definition: >-
  Platelet-derived growth factor (PDGF) receptor beta (PDGFRbeta) that is activated by its bound ligand, PDGF D-chain. PDGFRbeta is a tyrosine-protein kinase that acts as a cell-surface receptor for PDGFB, and its related B- and C-chains, PDGFB (P01127) and PDGFC (Q9NRA1). It autophosphorylates on multiple tyrosines upon ligand binding initiating several signalling cascades and phosphorylation of downstream targets. Plays an essential role in the regulation of embryonic development, cell proliferation, cell migration, survival and chemotaxis. Potent mitogen for cells of mesenchymal origin. Plays an important role in wound healing. Induces macrophage recruitment, increased interstitial pressure, and blood vessel maturation during angiogenesis. Can initiate events that lead to a mesangial proliferative glomerulonephritis, including influx of monocytes and macrophages and production of extracellular matrix. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
