identifier: ComplexPortal:CPX-2948
label: "CUE1-UBC7 ubiquitin-conjugating enzyme complex"
definition: >-
  Component of the endoplasmic reticulum-associated protein degradation (ERAD) pathway. UBC7 is a ubiquitin-conjugating enzyme (E2) that functions with endoplasmic reticulum resident ubiquitin ligases (E3s) only if bound to the ER surface by CUE1. UBC7 may also be activated by CUE1. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
