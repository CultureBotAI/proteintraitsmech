identifier: ComplexPortal:CPX-6861
label: "BOLA2-GLRX3 iron-sulfur cluster assembly complex"
definition: >-
  Reversibly binds [2Fe-2S] clusters and appears to play a role in Fe-S cluster assembly and trafficking, and in transferring an intact [2Fe-2S] cluster to an apo acceptor protein, for example in the NUBP1-NUBP2 Fe-S cluster assembly scaffold complex (CPX-2823). Active in the nucleo-cytoplasmic compartments. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
