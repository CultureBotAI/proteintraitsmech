identifier: ComplexPortal:CPX-2373
label: "General transcription factor TFIIIC complex"
definition: >-
  Transcription factor required for Pol III transcription complex assembly. Mediates tRNA and 5S RNA gene activation by binding to intragenic promoter elements. Assembles the initiation complex TFIIIB (CPX-2396/CPX-2397)-TFIIIC-tDNA upstream of the transcription start site, which is sufficient for RNA polymerase III (CPX-2393/CPX-7482) recruitment and function. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
