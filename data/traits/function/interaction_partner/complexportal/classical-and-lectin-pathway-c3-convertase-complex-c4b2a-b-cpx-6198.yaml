identifier: ComplexPortal:CPX-6198
label: "Classical and lectin pathway C3 convertase complex C4b2a-B"
definition: >-
  A serine-type endopeptidase complex of the lectin and classical pathway of complement activation of the innate immune system. Cleaves Complement C3 precursor (P01027) into anaphylatoxin C3A (P01027-PRO_0000005920) and nascent convertase core-component C3b (CPX-988). Components are cleaved by the C1s component of Complement C1 complex (CPX-4984, CPX-4985) of the classical pathway or lectins of the lectin pathway. Binds to pathogen cells via its reactive thioester moiety. Can also act as C5 convertase by cleaving Complement C5 precursor (P06684) into anaphylatoxin C5A (P06684-PRO_0000005994) and C5b (P06684-PRO_0000005991, P06684-PRO_0000005995) but with low efficiency. Acts as an opsonin and interacts with glycoproteins and carbohydrates on pathogenic or apoptotic target cell surfaces through its reactive thioester moiety. Opsonization of target cells leads to enhanced phagocytosis, lysis of target cells via membrane attack complex (CPX-6159) assembly, clearance of antibody-antigen complexes and up-regulation of the adaptive response. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
