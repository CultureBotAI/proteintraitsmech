identifier: ComplexPortal:CPX-2432
label: "Positive transcription elongation factor B complex"
definition: >-
  A serine kinase complex that phosphorylates elongation pausing factors such as DSIF (CPX-2429) and NELF (CPX-2430) and Ser-2 and Ser-5 of RNA polymerase II (RNA Pol II) heptapeptide repeat, thus positively regulating productive mRNA elongation through the gene body after promoter-proximal pausing of RNA Pol II. Involved in cotranscriptional histone modification, mRNA processing and mRNA export. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
