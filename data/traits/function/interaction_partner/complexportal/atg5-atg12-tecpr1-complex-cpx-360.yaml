identifier: ComplexPortal:CPX-360
label: "ATG5-ATG12-TECPR1 complex"
definition: >-
  Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. Once autophagosome formation is completed, the autophagosome docks lysosomes in order to degrade cellular cargoes by fusion. At this point, the surrounding acidic condition drives Atg5 to change its binding partner from Atg16l1 to Tecpr1. Binding of the Atg12-Atg5 conjugate to a region of Tecpr1 frees an auto-inhibition of the PH domain within this protein. This domain is then freed to attach to a phosphatidylinositol 3-phosphate molecule of the autophagosomal membrane, thus tethering the autophagosome to a lysosome. These 2 vesicles will then undergo SNARE-mediated fusion to form an autolysosome. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
