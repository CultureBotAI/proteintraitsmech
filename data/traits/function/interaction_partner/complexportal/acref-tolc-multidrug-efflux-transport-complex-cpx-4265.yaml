identifier: ComplexPortal:CPX-4265
label: "AcrEF-TolC multidrug efflux transport complex"
definition: >-
  Responsible for the transport of xenobiotics, such as drugs, out of the cell, in particular from the periplasm. Single-component efflux transporters remove toxic compounds from the cytoplasm to the periplasmic space where tolC-dependent transporters expel them from the cell. Transports acriflavines and indoles. Member of the Resistance-Nodulation-Division (RND) family of efflux pumps. Expression of this system is generally low but it appears to be up-regulated when expression of AcrAB-TolC (CPX-4263) is impaired or in the presence of specific classes of xenobiotic. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
