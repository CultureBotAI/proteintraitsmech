identifier: ComplexPortal:CPX-1848
label: "ATG12-ATG5 complex"
definition: >-
  Essential for autophagy during nutrient deprivation, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. Contributes to nutrition homeostasis and damage control in eukaryotic cells. Acts as an E3-like ligase. This activity is dependent on ATP and two enzymes, ATG7 (P38862) an E1-like activating enzyme and ATG10 (Q07879) an E2-like conjugating enzyme. Required for lipidation of ATG8 (P38182) (e.g. to phosphatidylethanolamine) and associates with the vesicle membranes once bound to ATG16 (CPX-1849). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
