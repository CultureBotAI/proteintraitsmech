identifier: ComplexPortal:CPX-2896
label: "[Cu-Zn] Superoxide dismutase complex"
definition: >-
  Catalyzes the breakdown of two superoxide molecules into dioxygen and hydrogen peroxide in two asymmetrical steps using an essential copper atom in the active site of the enzyme. Reduction of the oxidized Cu(II) form of the enzyme by superoxide, releasing dioxygen (reaction 1), alternates with oxidation of the reduced Cu(I) form by another superoxide anion and two protons, generating hydrogen peroxide (reaction 2). Protects the cell guard against free radical species produced during cellular metabolism. SOD1 acquires its copper by forming a heterodimer with the copper chaperone, CCS (CPX-2267), which also is responsible for formation of an intramolecular disulfide bond required to increase the enzymatic activity from approximately 10 % in disulfide-reduced SOD1 to 100 % in disulfide-oxidized SOD1. The copper chaperone, CCS1 (CPX-2895), both delivers the copper and oxidises the disulfide bond. There is also evidence of CCS-independent activation of SOD1. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
