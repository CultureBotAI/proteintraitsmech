identifier: ComplexPortal:CPX-1366
label: "PP2A-SUR-6 phosphatase complex"
definition: >-
  Serine/threonine phosphatase complex that acts as a regulator of centriole formation during mitosis. Associates with the SAS-5-SAS-6 complex (CPX-1374) and targets it to centrioles. The dephosphorylation of sas-5 by let-92 is required for the targeting of the SAS-5-SAS-6 complex (CPX-1374) to centrioles. Furthermore, the complex positively regulates centriole duplication during early embryonic cell divisions by preventing the degradation of sas-5 and kinase zyg-1 (Q9GT24). During vulva development, may play a role in the induction of vulva cell precursors by positively regulating let-60/Ras-MAP kinase signaling, probably by promoting lin-45 (Q07292) activation. In intestinal epithelial cells, may play a role in the late secretory pathway probably by regulating the exocyst, a protein complex involved in targeting secretory vesicles to the plasma membrane. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
