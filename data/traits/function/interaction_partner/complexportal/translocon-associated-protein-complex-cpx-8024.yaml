identifier: ComplexPortal:CPX-8024
label: "Translocon-associated protein complex"
definition: >-
  Stimulates translocation of proteins depending on the efficiency of their signal sequence in transport initiation and may affect the topology of transmembrane helices containing topogenic determinants that do not promote one specific orientation in the membrane. May also play a role in the biogenesis of N-glycosylated proteins.Acts as part of the endoplasmic reticulum translocon protein translocon in association with the SEC61 complex (CPX-8073). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
