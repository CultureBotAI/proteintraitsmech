identifier: ComplexPortal:CPX-6204
label: "Coagulation factor VIIIa-IXa complex"
definition: >-
  A serine-type endopeptidase complex of the intrinsic blood coagulation pathway (contact activation pathway). Cleaves Arg-|-Ile bonds of factor X (P00742) by limited proteolysis to form active factor Xa (CPX-6215) in the presence of vitamin K, Ca2+ ions, phospholipids and Factor VII (P08709). The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
