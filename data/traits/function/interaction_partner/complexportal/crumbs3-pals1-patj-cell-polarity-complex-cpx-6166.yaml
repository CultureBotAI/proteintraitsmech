identifier: ComplexPortal:CPX-6166
label: "CRUMBS3-PALS1-PATJ cell polarity complex"
definition: >-
  Evolutionarily conserved complex that acts as a key regulator of cell polarity and cell shape. It localizes at the subapical region (SAR) above the adherens junction of epithelial cells where it plays a major role in establishment, regulation, and maintenance of apical polarity and acts as an apical component of tight junctions. In addition to the core components (which are always found together), other proteins can associate with the complex, depending on the type and developmental stage of the cell, thus providing it with functional diversity and flexibility. Mutations in its components are associated with a variety of retinal degenerations. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
