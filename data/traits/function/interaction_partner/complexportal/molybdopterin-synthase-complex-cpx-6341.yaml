identifier: ComplexPortal:CPX-6341
label: "Molybdopterin synthase complex"
definition: >-
  Involved in molybdopterin cofactor (Moco) biosynthesis under anaerobic conditions converting molybdopterin precursor Z (CHEBI:52994) to molybdopterin (CHEBI:44074). This requires the incorporation of two sulfur atoms into precursor Z to generate a dithiolene group. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
