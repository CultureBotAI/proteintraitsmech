identifier: ComplexPortal:CPX-10798
label: "GPSM2-INSC complex"
definition: >-
  Key regulator of asymmetric cell division in polarized progenitor cells, a process fundamental for generating diverse cell types. Plays a critical role in establishing and maintaining tissue organization during development. Complex functions as a molecular bridge, coupling polarity signals to the cytoskeletal machinery that orientates the mitotic spindle. INSC and GPSM2 localize apically in a mutually reinforcing manner: GPSM2 stabilizes cortical INSC, while INSC biases the localization of other polarity regulators. This ensures that spindle orientation aligns with apical-basal polarity, enabling the generation of daughter cells with divergent fates, a process essential for neurogenesis, epithelial homeostasis, and stem cell renewal. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
