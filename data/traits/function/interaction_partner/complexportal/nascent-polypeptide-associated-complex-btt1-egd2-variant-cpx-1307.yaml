identifier: ComplexPortal:CPX-1307
label: "Nascent polypeptide-associated complex, BTT1-EGD2 variant"
definition: >-
  Reversibly binds to cytoplasmic ribosomes and interacts with nascent polypeptides emerging from the ribosome to prevent them from incorrect interactions, thus controlling the early protein folding processes and preventing aggregation or degradation of newly synthesized proteins. The BTT1-EGD2 variant appears to be the less dominant form of the complex formed in vivo and has a preference for ribosomes translating mitochondrial or ribosomal proteins. By binding to the first 30-50 amino acids to be translated, the complex prevents mitochondrial precursor proteins synthesized in the cytosol from forming a basic, amphipathic helix. This enables this targeting sequence to first bind to chaperones and mitochondrial import stimulating factors and then to the outer membrane translocase complex (CPX-474) on the mitochondrial surface. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
