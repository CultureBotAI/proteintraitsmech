identifier: ComplexPortal:CPX-10327
label: "SWM histone demethylase complex"
definition: >-
  FAD (flavin adenine dinucleotide)-dependent mono- and di-methylated histone H3K4/H3K9 demethylase complex which localizes specifically at heterochromatic loci and the transcription start sites of actively transcribed genes. Plays a role in transcriptional regulation via heterochromatic silencing The complex and maintains the boundary between euchromatin and heterochromatin at the telomeres. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
