identifier: ComplexPortal:CPX-3147
label: "PYM-mago-Y14 complex"
definition: >-
  A cytoplasmic protein complex that activates the disassembly of the mago-Y14 (mago-tsu) complex (CPX-3100) from the spliced mRNA during first round of translation, disassembling the exon-exon junction complex independently of the translational machinery. The mago-Y14 complex shuttles between the nucleus, where it is loaded onto specific mRNAs, and the cytoplasm and functions in translational regulation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
