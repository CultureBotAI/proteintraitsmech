identifier: ComplexPortal:CPX-243
label: "Respiratory chain complex I"
definition: >-
  Catalyses the first step of electron transport by the oxidation of NADH, thus providing two electrons for the reduction of ubiquinone. Electron transfer is coupled with the translocation of protons across the membrane, generating a proton motive force. Preferred NADH dehydrogenase under anaerobic conditions. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
