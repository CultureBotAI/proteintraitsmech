identifier: ComplexPortal:CPX-7762
label: "SCF E3 ubiquitin ligase complex, FBXW5 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXW5 target proteins include the actin remodeller EPS8 (Q12929), the centrosomal scaffold protein SAS6 (Q6UVJ0) thus restricting centrosome re-duplication, the COPII component SEC23B (Q15437) and apoptosis signal‐regulating kinase,MAP3K5 (Q99683). The complex targets KIF2C (Q99661) for proteasomal degradation predominantly during G2 suggesting a role in the regulation of ciliogenesis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
