identifier: ComplexPortal:CPX-2701
label: "Cleavage stimulation factor complex, CSTF2 variant"
definition: >-
  Binds a G/U-rich region downstream from the cleavage site on pre-mRNAs and provides specificity for poly(A) site selection as part of the pre-mRNA 3' end processing machinery. Required to activate the CPSF complex (CPX-2698). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
