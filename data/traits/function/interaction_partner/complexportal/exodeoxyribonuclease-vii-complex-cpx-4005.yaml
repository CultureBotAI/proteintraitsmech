identifier: ComplexPortal:CPX-4005
label: "Exodeoxyribonuclease VII complex"
definition: >-
  Single-strand DNA-specific exodeoxyribonuclease which possesses dual polarity, degrading both 3-prime and 5-prime ends, in a processive reaction. The products of the reaction are oligonucleotides, 4-12 nucleotides in length, which are then degraded further into small acid-soluble oligonucleotides. The complex can digest into the duplex region, probably the result of the 'breathing' of the duplex to form single-stranded termini. Mediates mismatch repair by aborting frameshift and template-switch mutations in a manner partially redundant with 3-prime exonuclease, sbcB (P04995). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
