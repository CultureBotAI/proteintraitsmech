identifier: ComplexPortal:CPX-989
label: "PCAF histone acetylase complex"
definition: >-
  A histone acetyl transferase complex that plays a role in regulation of transcription of a specific group of genes by increasing the decompaction of chromatin to facilitate the access of transcription factors to promoter regions. It preferentially acetylates a single residue of Histone H3 (Lys-14) and is only able to weakly acetylate a single residue of Histone H4 (Lys-8) within nucleosomal substrates. The complex may also acetylate non-histone proteins, such as transcription factors. . A curated stable macromolecular complex (Complex Portal) with 10 subunits.
