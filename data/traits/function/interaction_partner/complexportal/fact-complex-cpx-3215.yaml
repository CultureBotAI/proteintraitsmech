identifier: ComplexPortal:CPX-3215
label: "FACT complex"
definition: >-
  A heterodimeric H2A-H2B histone chaperone, that helps reorganize nucleosomes in an ATP independent fashion. It promotes histone removal, deposition and replacement on chromatin. Due to its role in chromatin dynamics, it has a role in many cellular processes related to chromatin: DNA replication, DNA damage and repair, transcription initiation and elongation. The redundant NHP6A/B proteins(P11632/P11633) are involved in FACT function and supply the DNA binding activity, potentially destabilizing nucleosomes to promote formation of alternative chromatin structures in addition to recruiting FACT. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
