identifier: ComplexPortal:CPX-8939
label: "HipHop-HOAP telomere-capping complex"
definition: >-
  Binds to the double stranded portion of telomeric chromatin and recruits Su(var)205/Heterochromatin Protein 1 (P05205), a structural component of heterochromatin involved in gene repression, to telomeres. Also recruits the MTV complex (CPX-8944) to form the terminin telomere-capping complex, which binds to chromosome ends in a sequence-independent manner and prevents telomere fusion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
