identifier: ComplexPortal:CPX-3205
label: "KIF3 complex variant AC-KAP3"
definition: >-
  Cytoplasmic, kinesin-2 motor complex involved in tethering the chromosomes to the spindle pole and in chromosome movement. Microtubule-based anterograde translocator for membranous organelles. Exhibits plus end-directed microtubule sliding activity (in vitro). This trimeric kinesin motor complex may regulate the membrane binding of the KIF3A/KIF3C dimer (CPX-3202). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
