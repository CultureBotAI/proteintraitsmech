identifier: ComplexPortal:CPX-1862
label: "PeBoW complex"
definition: >-
  Role in coordinating ribosome biogenesis with cell cycle progression, necessary for the conversion of 27SA3 pre-rRNA to 27SBS pre-rRNA. Forms an extensive protein-protein and protein-RNA interaction network within early ribosome assembly intermediates in the nucleolus, thereby potentially serving as a hub for stabilizing or remodeling ribonucleoprotein neighborhoods during 60S subunit biogenesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
