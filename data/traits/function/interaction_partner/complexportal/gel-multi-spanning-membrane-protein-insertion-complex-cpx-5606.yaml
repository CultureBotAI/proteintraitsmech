identifier: ComplexPortal:CPX-5606
label: "GEL multi-spanning membrane protein insertion complex"
definition: >-
  Mediates insertion of transmembrane regions of multi-spanning membrane proteins into the endoplasmic reticulum (ER) membrane. TMCO1 appears to form a luminel funnel into the central membrane cavity. Acts as part of an ER translocon that functions co-translationally with SEC61 channel-forming translocon complex (CPX-8073) during biogenesis of multi-pass membrane proteins, along with the PAT intramembrane chaperone complex (CPX-7020) and the BOS complex (CPX-8021/CPX-8022/CPX-8023). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
