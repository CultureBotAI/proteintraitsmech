identifier: ComplexPortal:CPX-435
label: "ERF1-ERF3 translation release factor complex"
definition: >-
  Required for the termination of protein synthesis which occurs when one of three stop codons (UAA, UAG or UGA) enters the ribosomal A site. eRF1 stimulates GTP binding to eRF3, inducing the GTPase activity of eRF3 that couples codon recognition and eRF1 peptidyl-tRNA hydrolysis to ensure rapid and efficient peptide release from the ribosome. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
