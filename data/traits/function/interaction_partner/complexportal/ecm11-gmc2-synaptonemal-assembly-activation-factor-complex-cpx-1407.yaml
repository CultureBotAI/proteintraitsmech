identifier: ComplexPortal:CPX-1407
label: "ECM11-GMC2 synaptonemal assembly activation factor complex"
definition: >-
  Facilitates the assembly of the transverse filament of the synaptonemal complex (CPX-1387) by promoting the oligomerisation of ZIP1 (P31111). Recruited to the site of synapsis initiation complex (CPX-1386) binding where it may act to stabilise the nascent ZIP1 oligomer. ECM11 SUMOylation promotes ZIP1 assembly whilst ZIP1 promotes ECM11 SUMOylation in a positive feedback loop leading to further assembly of ZIP1, loading of ECM11-GMC2 and SUMOylation of ECM11 until the Synaptonemal complex is fully established. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
