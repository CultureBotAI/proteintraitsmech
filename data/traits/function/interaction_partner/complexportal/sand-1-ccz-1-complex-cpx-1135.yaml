identifier: ComplexPortal:CPX-1135
label: "Sand-1-ccz-1 complex"
definition: >-
  Critical role in maintaining proper vacuole morphology in vacuole delivery pathways by regulating fusion of vesicles with the vacuole at the tethering/docking stage. Regulates the SNARE complex during the coordinated priming and docking stages of fusion. Plays a role in endosome-lysosome fusion. The complex acts as an guanine nucleotide exchange factor for rab-7 to promote the activity of the HOPS complex (CPX-1136) in rab-5-to-rab-7 endosome conversion. May play a role in early-to-late endosome conversion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
