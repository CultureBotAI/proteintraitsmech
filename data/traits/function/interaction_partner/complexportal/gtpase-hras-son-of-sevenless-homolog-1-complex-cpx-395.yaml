identifier: ComplexPortal:CPX-395
label: "GTPase HRAS - Son of sevenless homolog 1 complex"
definition: >-
  A RAS GTPase complex responsible for intracellular transduction of signals received through cell-surface receptor tyrosine kinases. Activated HRAS.GTP promotes cell growth and survival. HRAS and SOS1 allosterically activate each other: binding of inactive HRAS.GDP to SOS1 stimulates SOS1 nucleotide exchange activity which in turn leads to HRAS binding GTP in place of GDP. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
