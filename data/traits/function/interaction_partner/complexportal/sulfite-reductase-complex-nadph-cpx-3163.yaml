identifier: ComplexPortal:CPX-3163
label: "Sulfite reductase complex (NADPH)"
definition: >-
  Sulfite reductase is a flavoprotein complex that catalyzes the reduction of sulfite to sulfide in the cysteine and methionine biosynthesis pathway. The activity is also required for sulfate assimilation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
