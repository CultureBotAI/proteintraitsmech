identifier: ComplexPortal:CPX-26399
label: "SNARE complex STX1B-SNAP25-VAMP1"
definition: >-
  SNARE complex required for fusion of synaptic vesicles enabling Ca2+-dependent neurotransmitter release at presynaptic terminals, specifically regulation of basal extracellular dopamine levels. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the fusing membranes and initiates membrane fusion. STX1B and SNAP25 are anchored to the presynaptic membrane, whereas VAMP1 is located on the synaptic vesicle membrane. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
