identifier: ComplexPortal:CPX-7519
label: "Polycomb repressive complex 1, RING2-PCGF2-CBX2-PHC1 variant"
definition: >-
  E3 ubiquitin-protein ligase that acts as a transcriptional repressor by mediating the monoubiquitination of Lys-119 of histone H2A, compacting chromatin, stalling RNA polymerase II and transcriptionally silencing genes critical for development. CBX2 stably binds to mitotic chromosomes, recruiting the canonical PRC1 components and this may be involved in chromosomal segregation and instability. CBX2 may recognize H3K27me3 in the chromatin but this may not be the main driver of its interaction with chromatin. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
