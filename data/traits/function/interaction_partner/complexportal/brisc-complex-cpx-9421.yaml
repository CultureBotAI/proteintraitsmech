identifier: ComplexPortal:CPX-9421
label: "BRISC complex"
definition: >-
  Modular deubiquitinase (DUB) complex that specifically recognizes Lys63-linked ubiquitinated chains through the BRCC3 datalytic subunit during cellular stress responses and immune signalling functions mediated by activated cytokine receptors. Deubiquitinates AURKB (Q96GD4); BRISC deficiency leads to AURKB hyperactivity during mitosis thereby disrupting kinetochore-microtubule attachment which results in defects in the separation of paired kinetochores and the formation of kinetochore aggregates or rod-shaped/misshapen/distorted kinetochores. Also required for functional bipolar spindle assembly through deubiquitination of NuMA (Q14980), at the spindle pole. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
