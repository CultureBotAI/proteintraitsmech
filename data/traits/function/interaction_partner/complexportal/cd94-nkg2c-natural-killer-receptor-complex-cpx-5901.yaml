identifier: ComplexPortal:CPX-5901
label: "CD94-NKG2C natural killer receptor complex"
definition: >-
  C-type lectin inhibitory receptor present on natural killer (NK) cells and a subset of T cells. Binds the HLA-E class I histocompatibility antigen molecule,specifically the peptide-bound HLA-E-B2M heterotrimeric complex with relatively low affinity, potentially resulting in activation of signaling processes and the activation of NK cell-mediated cytolysis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
