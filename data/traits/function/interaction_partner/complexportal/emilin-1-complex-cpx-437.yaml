identifier: ComplexPortal:CPX-437
label: "EMILIN-1 complex"
definition: >-
  Glycoprotein complex of the C1q/TNF superfamily found in the extracellular matrix (ECM) where it is an important component of the elastic fiber system. It is involved in cell adhesion, migration and proliferation, angiogenesis, blood pressure control and blood coagulation, apoptosis, platelet aggregation and possibly anti-microbial activities. Its function is strongly linked to its ability to bind integrins alpha4-beta1 (CPX-3118) and alpha9-beta1 (CPX-3123) via its gC1q domain. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
