identifier: ComplexPortal:CPX-3861
label: "lptBFG LPS ABC transporter complex"
definition: >-
  Required for the assembly of the dense outer membrane coating of lipopolysaccharides (LPS) required by Gram-negative bacteria to protect themselves from chemical stressors. Part of a seven-subunit assembly that spans the cellular envelope. Extracts LPS from the outer leaflet of the inner membrane and provides the energy to drive its transport across the inner membrane, periplasm and into the outer membrane through an ATPase-dependent mechanism. The cytoplasmic nucleotide-binding domain of the lptB dimer hydrolyzes ATP to switch the substrate cavity of the transmembrane domains of the lptF/G dimer between inward- and outward-facing conformations. LPS then crosses the periplasm along a continuous hydrophobic groove formed by lptC (P0ADV9), lptA (P0ADV1) and lptD (P31554). The lptDE complex (CPX-1093) subsequently sorts LPS to the outer leaflet of the outer membrane. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
