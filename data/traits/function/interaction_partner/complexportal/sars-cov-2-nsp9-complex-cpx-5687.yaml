identifier: ComplexPortal:CPX-5687
label: "SARS-CoV-2 NSP9 complex"
definition: >-
  RNA binding complex of the SARS-CoV-2 coronavirus. It has been speculated that nsp9 dimers bind to single-stranded nascent and template strands as they emerge from the channel of the nsp7-nsp8 primase complex (CPX-5690) at a time when stable secondary structures have not yet formed, protecting ssRNAs from ribonucleolytic cleavage. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
