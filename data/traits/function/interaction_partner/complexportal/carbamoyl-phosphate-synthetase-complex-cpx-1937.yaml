identifier: ComplexPortal:CPX-1937
label: "Carbamoyl phosphate synthetase complex"
definition: >-
  Plays a key role in both pyrimidine and arginine biosynthesis by catalyzing the production of carbamoyl phosphate from one molecule of bicarbonate, two molecules of MgATP, and one molecule of glutamine. Consists of two polypeptide chains referred to as the small and large subunits, which contain a total of three separate active sites that are connected by an intramolecular tunnel. The small subunit harbors one of these active sites and is responsible for the hydrolysis of glutamine to glutamate and ammonia. The large subunit binds the two required molecules of MgATP and is involved in assembling the final product. Compounds such as L-ornithine, UMP, and IMP allosterically regulate the enzyme. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
