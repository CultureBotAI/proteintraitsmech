identifier: ComplexPortal:CPX-1684
label: "CBK1-MOB2 kinase complex"
definition: >-
  Required for the final event of cell division, destruction of an extracellular septum that forms between mother and daughter cells during cytokinesis. Plays a role in the RAM pathway which regulates the ACE2 (P21192) transcription factor, which turns on expression of septum-destroying hydrolases and plays a role in the polarized morphogenesis of bud site selection, bud development, and cell separation. The complex is ctivated by the hippo-like kinase KIC1 (P38692). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
