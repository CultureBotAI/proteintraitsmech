identifier: ComplexPortal:CPX-8125
label: "CRL3 E3 ubiquitin ligase complex, KLHL24 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL24 target proteins include the keratin KRT15 (P19012), an intermediate filament which is part of the hair follicle stem cell cytoskeleton network. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
