identifier: ComplexPortal:CPX-2420
label: "Dystrophin glycoprotein complex"
definition: >-
  A plasma membrane transmembrane complex that links the actin cytoskeleton to the extracellular matrix. The complex is important for maintaining the integrity of skeletal and cardiac muscle cells. It also functions as a scaffold for proteins involved in signaling and accumulates at the neuromuscular junction and at a variety of synapses in the peripheral and central nervous system. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
