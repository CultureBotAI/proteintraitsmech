identifier: ComplexPortal:CPX-1047
label: "BUD23-TRM112 methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase which plays a role in the synthesis of the small ribosomal subunit by catalyzing the N7-methylation of guanosine-1575 of 18S rRNA at the 20S pre-rRNA stage. The complex interacts with the box C/D snoRNA U3-associated DEAH RNA helicase DHR1, which appears to play a role in central pseudoknot formation, so may also contribute to controlling the folding of small subunit rRNA. May play a role in 40S ribosome maturation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
