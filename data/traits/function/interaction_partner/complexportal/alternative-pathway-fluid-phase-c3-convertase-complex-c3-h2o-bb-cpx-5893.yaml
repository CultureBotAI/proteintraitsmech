identifier: ComplexPortal:CPX-5893
label: "Alternative pathway fluid-phase C3 convertase complex C3(H2O)Bb"
definition: >-
  A serine-type endopeptidase complex of the alternative pathway of complement activation of the innate immune system. Cleaves Complement C3 precurser (P01027) into anaphylatoxin C3A (P01027-PRO_0000005920) and nascent convertase core-component C3b (CPX-988). Restricted to the fluid-phase. C3(H2O)Bb convertase is very unstable and readily inactivated by Factor H (P06909) thus regulating the amount of spontaneously available C3 convertase initiating the alternative pathway. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
