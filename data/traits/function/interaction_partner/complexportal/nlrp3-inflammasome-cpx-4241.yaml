identifier: ComplexPortal:CPX-4241
label: "NLRP3 inflammasome"
definition: >-
  A pro-inflammatory thiol protease complex that is activated by Gram-positive bacteria such as Staphylococcus aureus and Group B Streptococcus, viruses such as influenza virus, pore-forming toxins such as hemolysin and pneumolysin, as well as by endogenous ligands and crystalline substances such as ATP, silica, and alum. Primarily acts in monocytes and macrophages. Nlrp3 activation is triggered by two sequential signals. The basal level of Nlrp3 in macrophages is quite low. Before activation, Nlrp3 needs to be “primed” by Toll-like receptor (TLR) agonists such as lipopolysaccharide (LPS). Activation of TLR signaling not only transcriptionally up-regulates Nlrp3 expression, but also post-transcriptionally activates Nlrp3 by phosphorylation and deubiquitination. The second step, defined as “activation,” can be induced by several potent stimuli such as pore-forming toxins, leading to the oligomerization of Nlrp3 and the subsequent assembly of inflammasome. Activating platform for Caspase-1 (CPX-4242) through proximity-induced self-cleavage in an ATP-dependent reaction. Activated Caspase-1 cleaves interleukins 1beta (Il1b, P10749) and Il18 (P70380) releasing the mature cytokines which are involved in a variety of inflammatory processes and is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves Gsdmdc1 (Q9D8T2). Activation of NLRP3 inflammasome is also required for Hmgb1 (P63158) secretion which stimulate inflammatory responses. It belongs to the family of Inflammasomes that includes NLRP1 inflammasome (CPX-4261, CPX-4266, CPX-4269, CPX-4270 and CPX-4271), NLRC4 inflammasome, AIM2 inflammasome (CPX-4243) and Pyrin inflammasome (CPX-4244). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
