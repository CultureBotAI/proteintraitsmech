identifier: ComplexPortal:CPX-109
label: "Beta-catenin destruction core complex, APC-AXIN1-GSK3B variant"
definition: >-
  Phosphorylates cytoplasmic beta-catenin (CTNNB1, P35222) in the absence of WNT-signalling, thus positively controlling its continuous proteasome-mediated degradation. CSNK1A1 phosphorylates CTNNB1 on Ser-45 and primes successive phosphorylation of Thr-41, Ser-37, and Ser-33 by GSK3. Phosphorylation of CTNNB1 promotes its subsequent ubiquitination which targets the protein for degradation by the proteasome. Without Wnt, Axin is also phosphorylated by GSK3, and thereby kept in an active, open conformation for beta-catenin binding and degradation. Upon Wnt stimulation, the ternary WNT-FZ-LRP6 complex is formed, recruits the scaffold protein DVL and the beta-catenin destruction complex. As a result, GSK3 is inhibited, CTNNB1 is not ubiquitinated and accumulates in the nucleus, where it acts as a coactivator for transcription factors of the TCF/LEF family, leading to activation of Wnt responsive genes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
