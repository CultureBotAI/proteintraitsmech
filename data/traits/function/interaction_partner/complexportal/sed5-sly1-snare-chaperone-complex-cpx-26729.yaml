identifier: ComplexPortal:CPX-26729
label: "SED5-SLY1 SNARE chaperone complex"
definition: >-
  SNARE regulatory complex which controls vesicle-mediated membrane trafficking between the endoplasmic reticulum (ER) and Golgi apparatus in yeast. SLY1 binds directly to the N-terminal region of SED5, an essential syntaxin, stabilizing it and facilitating the assembly of SNARE complexes that drive membrane fusion. The SLY1 N-lobe is anchored to SED5 on the target organelle while the SlLY1 regulatory loop binds the incoming vesicle’s lipid bilayer This interaction enhances the specificity and efficiency of vesicle docking and fusion, thereby ensuring proper intracellular transport and maintaining cellular organization. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
