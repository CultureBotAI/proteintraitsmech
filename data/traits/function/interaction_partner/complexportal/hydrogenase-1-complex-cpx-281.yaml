identifier: ComplexPortal:CPX-281
label: "Hydrogenase-1 complex"
definition: >-
  Catalyzes the reversible oxidation of hydrogen (H2) to protons and electrons. Maximally produced during fermentation and under various types of stress such as carbon and phosphate starvation, osmotic up shift, and stationary phase conditions. Hydrogenase-1 is oxygen tolerant and contains the special proximal (relative to the active site) [Fe4S3] cluster that can rapidly undergo two successive one-electron oxidations within a narrow potential range. The additional two electrons required to reduce the attacking O2 to two water molecules can originate from either the two-electron oxidation of Ni(I) to Ni(III) or the one-electron oxidation of Ni(II) to Ni(III) at the active site, the latter coupled to the one-electron oxidation of the [Fe4S4] medial cluster. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
