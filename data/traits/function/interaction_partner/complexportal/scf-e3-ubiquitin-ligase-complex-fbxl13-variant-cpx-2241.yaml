identifier: ComplexPortal:CPX-2241
label: "SCF E3 ubiquitin ligase complex, FBXL13 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL13 target proteins include the centrosomal protein CEP192 (Q8TEP8) which is required for mitotic centrosome maturation, microtubule nucleation and bipolar spindle assembly. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
