identifier: ComplexPortal:CPX-9124
label: "RPD3S histone deacetylase complex"
definition: >-
  Histone deacetylase which functions by deacetylating chromatin, thereby limiting accessibility of the transcriptional machinery to the underlying DNA. May recognize the H3K36me3 marker and function in the suppression of antisense transcription and protection from genotoxic agents. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
