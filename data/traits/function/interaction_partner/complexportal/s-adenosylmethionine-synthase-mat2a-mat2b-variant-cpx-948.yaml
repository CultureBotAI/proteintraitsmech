identifier: ComplexPortal:CPX-948
label: "S-adenosylmethionine synthase, MAT2A-MAT2B variant"
definition: >-
  Catalyzes the formation of S-adenosylmethionine from methionine and ATP. The reaction comprises of two steps that are both catalyzed by the same enzyme: formation of S-adenosylmethionine (AdoMet) and triphosphate, and subsequent hydrolysis of the triphosphate. The complex is present in nearly all tissues and is thought to be essential in providing the necessary SAM flux for methylation of DNA and various proteins including histones. The Vmax of the MAT2A-2A complex is three- to four fold higher than the MAT2A heterotetramer (CPX-3168). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
