identifier: ComplexPortal:CPX-2655
label: "SMC5-SMC6 SUMO ligase complex, cerv variant"
definition: >-
  SUMO ligase complex with a role in homologous recombination (HR) and replication. Required for chromosome segregation at repetitive sequences. Localizes to repetitive elements such as the rDNA and telomeres where is is thought to promote and resolve HR-dependent intermediates using ATP-hydrolysis to symmetrically reel DNA into loops. Also required for telomere maintenance during replication and telomere elongation and for SUMOylating components of the replisome, such as MCM2 (P49735) and the POLE2 (Q9VRQ7) subunit of the DNA polymerase epsilon complex (CPX-2422), which is important for replication fork progression in the presence of DNA-damaging agents. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
