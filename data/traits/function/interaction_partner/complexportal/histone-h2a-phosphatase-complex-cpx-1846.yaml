identifier: ComplexPortal:CPX-1846
label: "Histone H2A phosphatase complex"
definition: >-
  Dephosphorylates gammaH2AX, a required step in efficient recovery from the DNA damage checkpoint following a double-strand break repair. The phosphatase appears to target gammaH2AX after its displacement from DNA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
