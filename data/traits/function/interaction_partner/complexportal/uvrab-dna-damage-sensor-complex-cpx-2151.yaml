identifier: ComplexPortal:CPX-2151
label: "UvrAB DNA damage sensor complex"
definition: >-
  Part of the UvrABC repair system that catalyzes the recognition and processing of DNA lesions. It scans the DNA for abnormalities. Upon binding of the UvrAB complex to a putative damaged site, the DNA wraps around one of the uvrB subunits. uvrB then probes one DNA strand for the presence of a lesion. If a lesion is found the UvrA subunits dissociate and the UvrB-DNA preincision complex (CPX-2152) is formed. This complex is subsequently bound by uvrC (P0A8G0) and one of the uvrB monomers is released (CPX-2153). If no lesion is found, the DNA wraps around the other uvrB subunit that will check the other stand for damage. ATP hydrolysis may initiate dissociation of uvrB from the DNA, possibly because no lesion is found. The recruitment process of the uvrAB complex to the DNA remains unknown. A uvrA dimer exists in vitro but it is uncertain if it also exists in vivo as uvrA is sequestered to the DNA by Mfd (CPX-2155). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
