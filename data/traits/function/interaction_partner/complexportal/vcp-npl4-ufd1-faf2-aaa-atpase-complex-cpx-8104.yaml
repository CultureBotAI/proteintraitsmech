identifier: ComplexPortal:CPX-8104
label: "VCP-NPL4-UFD1-FAF2 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. The complex target proteins include the GTPase-activating protein-binding proteins GBP1/2 (Q13283/Q9UN86) leading to their extraction from, and the subsequent efficient clearance of, heat-induced stress granules. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
