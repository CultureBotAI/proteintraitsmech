identifier: ComplexPortal:CPX-4244
label: "Pyrin inflammasome"
definition: >-
  A pro-inflammatory thiol protease complex that is up-regulated in response to inactivating modifications of Rho GTPases by various bacterial species (Clostridium difficile, Vibrio parahemolyticus, Clostridium botulinum, Burkholderia cenocepacia and Bordetella pertussis). Primarily acts in myeloid cells. Activating platform for Caspase-1 (CPX-4242) through proximity-induced self-cleavage in an ATP-dependent reaction. Activated Caspase-1 cleaves interleukins 1beta (Il1b, P10749) and Il18 (P70380) releasing the mature cytokines which are involved in a variety of inflammatory processes and is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves Gsdmdc1 (Q9D8T2). It belongs to the family of Inflammasomes that includes NLRP1 inflammasome (CPX-4261, CPX-4266, CPX-4269, CPX-4270 and CPX-4271), NLRP3 inflammasome (CPX-4241), NLRC4 inflammasome and AIM2 inflammasome (CPX-4243). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
