identifier: ComplexPortal:CPX-929
label: "Coagulation factor VIIIa complex, heavy chain variant 1"
definition: >-
  Part of the intrinsic blood coagulation pathway (contact activation pathway). When bound to factor IXa (CPX-4945) forms the intrinsic tenase complex that cleaves Arg-|-Ile bonds of factor X (P00742) by limited proteolysis to form active factor Xa (CPX-6215) in the presence of vitamin K, Ca2+ ions, phospholipids and factor VII (P08709). The coagulation pathway is terminated when fibrinogen is cleaved to fibrin which in turn polymerizes to produce a clot. Its zymogen form is activated by limited proteolysis by thrombin (FIIa, P00734) to form active factor VIIIa. Inhibited by Active Protein C (APC, P04070). Mutations in factor VIII gene lead to hemophilia A. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
