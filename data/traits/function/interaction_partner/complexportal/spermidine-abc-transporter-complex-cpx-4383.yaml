identifier: ComplexPortal:CPX-4383
label: "Spermidine ABC transporter complex"
definition: >-
  High affinity spermidine importer, a polycation that interacts with negatively charged molecules such as DNA, RNA and proteins that plays a role in stress response. Also imports other polyamines such as putrescine. Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
