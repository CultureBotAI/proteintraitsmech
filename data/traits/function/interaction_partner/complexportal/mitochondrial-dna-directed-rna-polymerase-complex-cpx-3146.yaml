identifier: ComplexPortal:CPX-3146
label: "Mitochondrial DNA-directed RNA polymerase complex"
definition: >-
  Mitochondrial RNA polymerase resides in the mitochondrion and is responsible for transcription of all genes on the mitochondrial genome, both protein- and RNA-coding. Binding of the polymerase complex to the promoter consensus sequence 5-prime-(- 8)ATATAAGTA(+ 1) bends and opens promoter DNA. The ability to initiate transcription at mitochondrial promoters is conferred by the regulatory subunit Mtf1p. The transcriptional activity of mitochondrial RNA polymerase is repressed by the high ATP levels generated during growth on glucose, and activated at low ATP levels during growth on non-fermentable carbon sources. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
