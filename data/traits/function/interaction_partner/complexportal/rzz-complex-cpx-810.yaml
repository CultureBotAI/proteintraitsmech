identifier: ComplexPortal:CPX-810
label: "RZZ complex"
definition: >-
  An essential component of the kinetochore required for both meiotic and mitotic spindle assembly checkpoints. Plays a required role in spindle assembly checkpoint, blocking the metaphase-to-anaphase transition until all chromosomes are properly aligned in a metaphase plate. Targets mdf-2 of the mad-1/mad-2 complex (CPX-402) and also dynein/dynactin to kinetochores via the coiled-coil protein Spindly/spdl-1. This allows for the formation of stable spindle microtubule to kinetochore attachments, which in turn are required for activation of the spindle checkpoint and chromosome segregation. In order to prevent erroneous kinetochore attachments, the Rzz complex also interacts with the Ndc-80 complex (CPX-806) to inhibit the binding of the Ndc80 complex to microtubules. The recruitment of dynein to kinetochores by Spindly/spdl-1 relieves this inhibition. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
