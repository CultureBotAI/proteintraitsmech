identifier: ComplexPortal:CPX-428
label: "BBSome complex"
definition: >-
  The BBSome complex is thought to function as a coat complex required for sorting of specific membrane proteins to the primary cilia. The BBSome complex is required for ciliogenesis but is dispensable for centriolar satellite function. bbs-1, bbs-2, bbs-4, osm-12, bbs-8 and bbs-9 are required for proper BBSome complex assembly and its ciliary localization. bbs-5 is required for BBSome localization only. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
