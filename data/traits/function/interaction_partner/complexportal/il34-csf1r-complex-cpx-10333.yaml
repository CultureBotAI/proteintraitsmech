identifier: ComplexPortal:CPX-10333
label: "IL34-CSF1R complex"
definition: >-
  Cytokine-receptor complex. IL34 mediates its effects primarily through CSF1R (this complex), with alternative receptors proposed, PTPRZ1 (P23471) and SDC1 (P18827). IL34 binding to CSF1R results in receptor phosphorylation and homodimerization leading to the activation of several pathways including MAP and SRC kinases, the JAK/STAT, RAS and AMPK1 pathways, thus supporting cell growth, survival of monocytes and their differentiation into macrophages. IL34 is expressed in a wide variety of tissues but the highest levels are expressed by neurons and keratinocytes. Predominantly associated with the disease progression of autoimmune diseases such as rheumatoid arthritis and systemic lupus erythematosus as well as, breast and lung cancer, IL34's role in disease progression is disease-dependent with beneficial protective roles in some cancers and Alzheimers disease. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
