identifier: ComplexPortal:CPX-2645
label: "DBIRD complex"
definition: >-
  Acts at the interface between messenger ribonucleoprotein particles and RNA polymerase II (RNAPII), integrating transcript elongation with the regulation of alternative splicing. Binds directly to RNAPII.and regulates alternative splicing of a large set of exons embedded in A/T-rich DNA. May act as an elongation factor, facilitating transcript elongation across A/T-rich regions. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
