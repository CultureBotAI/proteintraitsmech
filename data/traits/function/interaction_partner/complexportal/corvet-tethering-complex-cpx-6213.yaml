identifier: ComplexPortal:CPX-6213
label: "CORVET tethering complex"
definition: >-
  Multisubunit tethering complex involved in early endosomal fusions by cross-linking two membranes, and facilitating the formation of a SNARE complex during fusion. Interacts with Rab GTPases RAB5 (P61020, P20339 and P51148) and activates and proof-reads SNARE assembly to drive membrane fusion. Possibly attaches early endosomes to the cytoskeleton. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
