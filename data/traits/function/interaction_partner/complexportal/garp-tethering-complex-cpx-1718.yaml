identifier: ComplexPortal:CPX-1718
label: "GARP tethering complex"
definition: >-
  Tethering complex required for retrograde traffic from both the early and late endosomes to the Golgi during vesicle trafficking,sorting cargo for recycling to the plasma membrane or degradation in vacuoles. Links the vesicle through the SNARE proteins such as TGL1 (Q03322) to the Golgi, leading to membrane fusion between late Golgi and endosomal vesicles. Required for the recycling of amino-phospholipid flippases and cell wall synthesis proteins, thus playing a role in lipid homeostasis. Essential role in meiotic progression and spore formation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
