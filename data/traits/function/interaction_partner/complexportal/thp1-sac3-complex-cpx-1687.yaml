identifier: ComplexPortal:CPX-1687
label: "Thp1-Sac3 complex"
definition: >-
  Functions in transcription-coupled mRNA export from the nucleus to the cytoplasm. Dock export-competent ribonucleoprotein particles (mRNPs) to the nuclear entrance of the nuclear pore complex (nuclear basket), by association with components of the nuclear mRNA export machinery (MEX67-MTR2 and SUB2) in the nucleoplasm and the nucleoporin NUP1 at the nuclear basket. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
