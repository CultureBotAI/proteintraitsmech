identifier: ComplexPortal:CPX-9065
label: "CoREST transcriptional corepressor complex, RCOR1-HDAC2 variant"
definition: >-
  Class I histone deacetylase complex unique in containing both histone demethylase and deacetylase enzymes, KDM1A and HDAC1/2 respectively. Acts as a transcriptional repressor, by acting as an epigenetic eraser removing methyl and acetyl groups from histone tails. This results in the loss of binding sites for regulatory reader proteins and causes chromatin compaction by restoring the positive charge on histone tails. Regulates neuronal differentiation gene expression and stem cell fate and development. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
