identifier: ComplexPortal:CPX-1214
label: "GLD-2-GLD-3 complex"
definition: >-
  Cytoplasmic poly(A) RNA polymerase complex that adds successive AMP monomers to the 3-prime-end of germ-line-specific RNAs, forming a poly(A) tail, thus switching RNA from a translationally dormant state into a translationally active state. Acts as a regulator of mitosis/meiosis transition and is required to promote entry into meiosis from the mitotic cell cycle. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
