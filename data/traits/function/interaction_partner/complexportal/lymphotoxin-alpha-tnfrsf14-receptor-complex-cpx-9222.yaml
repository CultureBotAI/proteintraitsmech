identifier: ComplexPortal:CPX-9222
label: "Lymphotoxin-alpha-TNFRSF14 receptor complex"
definition: >-
  Receptor complex which may play a role in lymphoid organ development and cytotoxic responses in the immune system. Little is known about LTA's effects through TNFRSF14 as their interaction is thought to be weak. LTA also mediates its effects through two other receptors: TNFRSF1A (CPX-8945) and TNFRSF1B (CPX-9221). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
