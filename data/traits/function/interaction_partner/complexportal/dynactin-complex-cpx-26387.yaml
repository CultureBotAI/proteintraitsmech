identifier: ComplexPortal:CPX-26387
label: "Dynactin complex"
definition: >-
  Recruited to autoinhibited dynein, a retrograde microtubule motor complex to activate the processive, unidirectional movement of dynein. Required for intracellular transport by dynein by localizing cytoplasmic dynein to its proper intracellular cargo and modulating dynein motor activity. Dynactin increases the run length of single dynein motors, but does not alter the directionality of dynein movement. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
