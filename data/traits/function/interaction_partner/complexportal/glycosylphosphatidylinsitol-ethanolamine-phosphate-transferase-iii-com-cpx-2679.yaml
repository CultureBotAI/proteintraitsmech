identifier: ComplexPortal:CPX-2679
label: "Glycosylphosphatidylinsitol ethanolamine-phosphate transferase III complex"
definition: >-
  Ethanolamine phosphate transferase involved in glycosylphosphatidylinositol (GPI)-anchor biosynthesis. Transfers ethanolamine phosphate to the 6-position of the GPI third mannose in Man-Man-Man-(EtNP)Man-GlcN-(acyl)PI, sequentially followed by the addition of a phosphoethanolamine moiety to the second mannose by the GPI-ET-II (CPX-2677). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
