identifier: ComplexPortal:CPX-1854
label: "Golgi SNARE complex SED5-BOS1-BET1-SEC22"
definition: >-
  SNARE complex required for fusion of endoplasmic reticulum-derived vesicles at the cis-Golgi cisternae. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the linked membranes and initiates membrane fusion. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
