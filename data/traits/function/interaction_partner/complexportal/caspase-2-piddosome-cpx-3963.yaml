identifier: ComplexPortal:CPX-3963
label: "Caspase-2 PIDDosome"
definition: >-
  Cysteine-type endopeptidase complex that assembles in response to genotoxic stress, mitotic catastrophe, heat shock, ER stress or bacterial toxins and is considered to be the primary activating platform for Caspase-2 (CPX-3901). Facilitates Caspase-2 autocatalytic cleavage. Once activated, Caspase-2 is released and induces Bid (P70444) cleavage, Bax (Q07813) translocation to mitochondria, subsequent cytochrome c (P62897) release and consequent activation of the apoptotic process. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
