identifier: ComplexPortal:CPX-7885
label: "GID E3 ubiquitin ligase complex, GID11 variant"
definition: >-
  E3 ubiquitin ligase complex that triggers polyubiquitylation and subsequent proteasomal degradation of selected substrates. The complex functions as the N-recognin of the Pro/N-degron pathway and preferably recognizes substrates with threonine or serine residues at the N terminus, including the phosphate metabolism protein PHM8 (P40025), phosphoglycerate mutase 3 (Q12326) and the proteasome activator BLM10 (P43583). A curated stable macromolecular complex (Complex Portal) with 7 subunits.
