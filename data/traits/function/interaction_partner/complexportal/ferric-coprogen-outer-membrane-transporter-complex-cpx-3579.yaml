identifier: ComplexPortal:CPX-3579
label: "Ferric-coprogen outer membrane transporter complex"
definition: >-
  A member of the TonB-dependent transporter family (TBDTs) which binds and then transports Fe3+ complexed to sideraphores such as coprogen, ferrioxamine B, and rhodotorulic acid across the outer membrane. Sideraphore transport requires an outer membrane receptor (fhuE), which is relatively specific for its ligand. The ligand-bound receptor then physically interacts with the TonB protein. TBDTs are energy-dependent gated channels that usually transport large metal complexes which cannot fit through porins, and are too scarce to enter by mass-action-driven transport. Energy-dependent uptake through TBDTs requires interaction with TonB in complex with exbB and exbD in the inner membrane, ExbBD. TonB undergoes rapid energized movement driven by ExbBD which harvests the electrochemical force from the electrochemical proton gradient created by the proton gradient across the inner membrane and convert it into rotational motion. Hence, tonB may pull or twist the N-termini of TBDTs to promote transport of substrates into the periplasm. ATP-binding-cassette (ABC) transporters subsequently move the ferric-siderophore (Fe3+) through the periplasm and inner membrane. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
