identifier: ComplexPortal:CPX-1301
label: "CEP152-PLK4 complex"
definition: >-
  A protein complex essential for centriole biogenesis; temporarily part of the procentriole to which it recruits further proteins involved in procentriole formation. Snatches PLK4 away from CEP192-PLK4 complex (CPX-1300). Impairment of centriole duplication eventually leads to impaired spindle formation and mitosis which is linked to tumorigenesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
