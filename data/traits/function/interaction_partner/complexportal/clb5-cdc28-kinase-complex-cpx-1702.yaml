identifier: ComplexPortal:CPX-1702
label: "CLB5-CDC28 kinase complex"
definition: >-
  Cyclin-dependent protein kinase complex required for the control of the cell cycle during S-phase where it is required to activate DNA replication. Essential for initiation of meiotic recombination because it phosphorylates Ser-30 of MER2, a meiosis-specific double-strand break (DSB) protein, which primes Mer2 for subsequent phosphorylation by DDK on Ser29, creating a negatively charged patch necessary for DSB formation. Also plays a role in enhancing DNA damage response and repair by targeting the chromatin remodeling factor Fun30. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
