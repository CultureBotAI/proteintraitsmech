identifier: ComplexPortal:CPX-366
label: "Cyclin K-Cdk13 complex"
definition: >-
  Cyclin-dependent protein kinase complex which appears to regulate expression of genes associated with growth signaling pathways. Phosphorylates the C-terminal domain (CTD) of RNA polymerase II (Polr2a). Preferentially phosphorylates Ser-2 and Ser-5 in CTD repeats with a preference for Ser-7 pre-phosphorylations at a C-terminal position. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
