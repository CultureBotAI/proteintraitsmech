identifier: ComplexPortal:CPX-1624
label: "ESCRT-III complex"
definition: >-
  A membrane fission complex that is part of the ESCRT machinery of ESCRT-0 (CPX-1622), -I (CPX-940), -II (CPX-1623), -III (this complex) and -IV (VPS4 complex, CPX-334). It is involved in multiple membrane fission processes: a) the final step of cell organelle fusion processes such as the biogenesis of intraluminal vesicles (ILV) in multivesicular bodies (MVB, a type of late endosomes), fusion of autophagosomes with MVB or lysosomes and amphisomes or MVB with lysosomes, thereby playing a crucial role in processes like autophagy and downregulation of cell-surface receptors, b) polarity, c) migration, d) miRNA activity, e) mRNA transport, f) repair of plasma membrane wounds, g) the final scission of cytokineses, h) nuclear envelope sealing by annular fusion, i) nuclear pore complex (NPC) surveillance and j) extraction of defective NPCs. ESCRT-III assembles into a highly ordered filament-like hetero-oligomer, which may spatially restrict membrane-curvature-inducing factors to initiate budding away from the cytoplasm. VPS20 nucleates the homo-oligomerization of SNF7 that is capped by VPS24. VPS24 recruits VPS2, initiates VPS4-dependent ESCRT-III dissasembly and binds phosphatidylinositol 3,5-diphosphate. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
