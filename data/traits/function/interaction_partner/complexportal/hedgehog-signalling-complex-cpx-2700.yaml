identifier: ComplexPortal:CPX-2700
label: "Hedgehog signalling complex"
definition: >-
  Transcriptional repressor complex involved in hedgehog signaling pathway. In the absence of hh (Q02936), the complex promotes the proteolytic processing of the Ci transcription factor to a truncated repressor protein (PRO_0000406217). hh activation of the pathway blocks the processing of ci, allowing the accumulation of the full-length activator protein (PRO_0000046917). The complex associates with microtubules in the absence of Hh stimulation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
