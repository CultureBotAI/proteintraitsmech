identifier: ComplexPortal:CPX-9442
label: "USP1-UAF1 deubiquitinase complex"
definition: >-
  Deubiquitinase complex responsible for the removal of ubiquitin chains from proteins. Acts during DNA repair processes to remove monoubiquitin signals from PCNA (CPX-538), and FANCI and FANCD2 of the Fanconi anemia ID complex (CPX-6264), each of which is monoubiquitinated at a specific lysine residue during repair of DNA damage. Both complexes form DNA clamps. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
