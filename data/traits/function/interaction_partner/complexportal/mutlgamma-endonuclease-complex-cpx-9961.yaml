identifier: ComplexPortal:CPX-9961
label: "MutLgamma endonuclease complex"
definition: >-
  Mn2+-dependent endonuclease which nicks a DNA strand containing a pre-existing nick, presumably to provide an entry site for a mispair excision reaction. Required for DNA mismatch repair (MMR), correcting base-base mismatches and insertion-deletion loops resulting from DNA replication, DNA damage or from recombination events between non-identical sequences during meiosis. ATP binding induces a conformational change in the MutSalpha/MSH2-MSH6 (CPX-80) and MutSbeta/MSH2-MSH3 (CPX-77) complexes which converts these to a clamp form that slides along the DNA and leads to recruitment of MutLalpha/MLH1-PMS2 (CPX-9901), MutLbeta/MLH1-PMS1 (CPX-9941) and MutLgamma/MLH1-MLH3. May play a role inthe repair of specific insertions/deletions. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
