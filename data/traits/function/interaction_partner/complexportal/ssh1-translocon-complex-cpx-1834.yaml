identifier: ComplexPortal:CPX-1834
label: "SSH1 translocon complex"
definition: >-
  Forms the protein-conducting channel (PCC) for secretory and membrane proteins which engages in the post- and cotranslational translocation of secretory proteins across and the insertion of integral membrane proteins into the membrane of the endoplasmic reticulum. The ribosome with an emerging signal sequence is targeted to the membrane by the signal recognition particle (SRP) and its receptor. The Ssh1 complex acts as a receptor for the ribosome via its cytosolic loops. The alignment of the ribosomal tunnel with a central pore of the PCC allows direct movement of the nascent chain from the ribosomal tunnel exit across or into the membrane. The SSH1 translocon complex does not appear to be required for the transport of glycoproteins (see SEC61 translocon complex, CPX-1833). Recognizes proteins bearing strongly hydrophobic signal sequences. Binds to the oligosaccharyl transferase complex variant 1 (CPX-1638) which selectively glycosylates nascent polypeptide chains in the endoplasmic reticulum. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
