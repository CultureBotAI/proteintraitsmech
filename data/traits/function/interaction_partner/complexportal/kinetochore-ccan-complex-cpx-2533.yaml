identifier: ComplexPortal:CPX-2533
label: "Kinetochore CCAN complex"
definition: >-
  Interacts with duplex DNA and facilitates accurate chromosome segregation. Plays a central role in assembly of kinetochore proteins, mitotic progression and chromosome segregation. It may be involved in incorporation of newly synthesized CENPA (P36012) into centromeres to form CENP-A nucleosomes (CPX-5705). Required for chromosome congression and efficient alignment of the chromosomes on a metaphase plate. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
