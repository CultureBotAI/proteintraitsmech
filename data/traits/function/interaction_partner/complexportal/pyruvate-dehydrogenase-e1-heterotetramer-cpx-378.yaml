identifier: ComplexPortal:CPX-378
label: "Pyruvate dehydrogenase E1 heterotetramer"
definition: >-
  The pyruvate dehydrogenase complex catalyzes the overall conversion of pyruvate to acetyl-CoA and CO(2). Eukaryotic PDC is a highly organized multienzyme complex with the core structure formed by 60 subunits of dihydrolipoamide acetyltransferase (E2) and 12 monomers of dihydrolipoamide dehydrogenase-binding protein (E3BP) to which other components of the complex are bound: 20-30 heterotetramers (alpha2beta2) of pyruvate dehydrogenase (E1), 6-12 homodimers of dihydrolipoamide dehydrogenase (E3), 1-2 homo (or hetero) dimers of pyruvate dehydrogenase kinase and 2-3 heterodimers of phosphopyruvate dehydrogenase phosphatase. E1 catalyzes the first irreversible and rate-limiting step in the PDC catalyzed reactions, i.e. the thiamine pyrophosphate (TPP)-dependent decarboxylation of pyruvic acid with formation of 2-a-hydroxyethylidene-TPP and carbon dioxide and reductive acetylation of lipoyl moieties of E2. Heterotetrameric E1 has two active sites that interact with each other during catalysis, each using TPP and magnesium ion as cofactors and each formed on the interface between the alpha and beta subunits. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
