identifier: ComplexPortal:CPX-4024
label: "MTM6-MTM9 myotubularin lipid phosphatase complex"
definition: >-
  A protein phosphatase complex that dephosphorylates the 3'-phosphate of phosphatidylinositol-3-phosphate (PI3P) (CHEBI:26034) to regulate phosphoinositide (PI)-phosphate levels. PIs control processes such as membrane trafficking through their ability to bind effector proteins containing PI-binding domains to the membrane. The complex functions in an arf-6- and rme-1-mediated endocytic pathway in coelomocytes. Plays a role in endosome trafficking probably by regulating PI3P levels. In addition, the complex regulates neuronal function by promoting synapse formation of DA9 motor neurons. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
