identifier: ComplexPortal:CPX-1389
label: "lis-1-nud-2 microtubule-associated dynein motor complex"
definition: >-
  Motor complex that trafficks organelles, proteins and RNA towards the minus ends of microtubules. In particular, the complex plays a role in cellular processes including cell division, mitosis, meiosis, cell proliferation. The complex is recruited to the nuclear envelope to regulate nuclear migrations in hypodermal precursor cells. Its role in nuclear trafficking is through interactions with the nuclear migration protein unc-83. nud-2 interacts with unc-83 within the unc-83-unc-84 complex (CPX-1385) and this recruits the motor complex to nuclear envelope where it is involved in the regulation of nuclear migrations in hypodermal precursor cells. The complex is a component of a larger assembly that associates with microtubules through dynein. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
