identifier: ComplexPortal:CPX-507
label: "Vapa-Osbp complex"
definition: >-
  Essential for stimulation of sphingomyelin synthesis by 25-hydroxycholesterol. The complex is formed on the endoplasmic reticulum membrane and acts to tether the membrane to Golgi PI(4)P phosphoinositide molecules or the GTP-binding protein Arf1 (P84078), to promote the specific exchange of lipids from the ER to the Golgi apparatus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
