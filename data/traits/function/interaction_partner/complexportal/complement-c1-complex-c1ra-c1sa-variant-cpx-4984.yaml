identifier: ComplexPortal:CPX-4984
label: "Complement C1 complex, C1ra-C1sa variant"
definition: >-
  The first component of the classical serum complement system. In the presence of calcium, the C1q complex (CPX-4981) associates with the C1S-C1R-C1R-C1S tetramer. When C1q binds to an activating target, a conformational change triggers the auto-activation of the associated C1R protease (converting the pro-enzyme into an activated form), which activates C1S. C1S then cleaves the Arg-|-Ala bond in complement component C4 to form C4a and C4b, and the Lys(or Arg)-|-Lys bond in complement component C2 to form C2a and C2b. The C1r and C1s genes are duplicated in the mouse: C1ra and C1sa are homologous to the human genes, whereas C1rb and C1sb (CPX-4985) are reported to be expressed exclusively in two male reproductive accessory glands. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
