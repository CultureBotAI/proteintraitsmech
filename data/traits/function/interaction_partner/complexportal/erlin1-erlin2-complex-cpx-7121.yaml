identifier: ComplexPortal:CPX-7121
label: "ERLIN1-ERLIN2 complex"
definition: >-
  Forms in the endoplasmic reticulum (ER) lipid raft-like microdomains and mediates mediate inositol 1,4,5-trisphosphate (IP3) receptor processing and regulation of lipid metabolism. Promotes ER-associated protein degradation (ERAD) of the activated IP3 receptor and of 3-hydroxy-3-methylglutaryl-CoA reductase (P04035). May also regulate sterol regulatory element-binding proteins (SREBPs) thus playing a role in cholesterol homeostasis. Also identifed in mitochondria-associated endoplasmic reticulum membranes (MAMs), tethering sites between ER and mitochondria which play a key role in the membrane scrambling and function, and may drive mitochondria-ER crosstalk. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
