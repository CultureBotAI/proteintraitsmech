identifier: ComplexPortal:CPX-2135
label: "thiG-thiH thiazole phosphate synthase complex"
definition: >-
  Role in thiamine biosynthesis, catalysing the synthesis of the thiazole phosphate moiety of thiamine. thiG-thiH is found downstream of the activities of iscS, the thiS-thiF complex (CPX-2134) and thiI and requires the activity of 1-deoxy-D-xylulose 5-phosphate (CHEBI:57792). The thiH subunit binds a 4Fe-4S cluster that is coordinated by 3 cysteines (Cys-X-X-X-Cys-X-X-Cys) and an exchangeable S-adenosyl-L-methionine molecule. Sulfur is donated by the thiS-thiF complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
