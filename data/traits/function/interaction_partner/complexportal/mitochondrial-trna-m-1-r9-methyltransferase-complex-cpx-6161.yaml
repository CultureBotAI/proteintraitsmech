identifier: ComplexPortal:CPX-6161
label: "Mitochondrial tRNA:m(1)R9 methyltransferase complex"
definition: >-
  Responsible for the methylation of the nitrogen-1 (N1) atom of purine bases at position 9 to form 1-methyladenosine (m1A9) or 1-methylguanosine (m1G9). N1-methylation promotes the folding of human (mt)tRNALys into the conventional tRNA L-shape. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
