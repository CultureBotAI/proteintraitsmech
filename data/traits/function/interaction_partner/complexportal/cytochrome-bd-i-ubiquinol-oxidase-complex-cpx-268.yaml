identifier: ComplexPortal:CPX-268
label: "Cytochrome bd-I ubiquinol oxidase complex"
definition: >-
  A protein complex integral to the bacterial electron transport chain. Electrons are donated by the oxidation of ubiquinol to ubiquinone and used to reduce molecular oxygen, generating a proton motive force using protons and electrons from opposite sides of the membrane to generate water. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
