identifier: ComplexPortal:CPX-5056
label: "HypAB Ni-hydrogenase maturation complex"
definition: >-
  Required for the synthesis of the NiFe(CN)2(CO)bimetallic cofactor present in the active site of [NiFe]-hydrogenases (CPX-281, CPX-282, CPX-317). The hypB GTPase has two nickel binding sites, one of which (the lower affinity site) is embedded in the GTPase motifs and metal binding to this site modulates GTP hydrolysis. On formation of the complex, nickel moves from the G-domain site of hypB to hypA and the complex then dissociates. hypA subsequently docks on the large subunit of the hydrogenase precursor protein to deliver the nickel ion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
