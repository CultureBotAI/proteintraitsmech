identifier: ComplexPortal:CPX-3186
label: "Amylin receptor 2 complex"
definition: >-
  A transmembrane, G-protein-coupled signalling receptor complex that serves as receptor for the amylin polypeptides (Amy). Amylin is produced in beta-islet cells of the pancreas. It is implicated in selective inhibition of insulin-stimulated glucose utilization and glycogen deposition in muscle, gastric emptying, gastric acid secretion, postprandial glucagon secretion and food intake and aids weight loss. CALCR only acts as amylin receptor when bound by RAMP proteins. In the absence of RAMP proteins, CALCR functions as calcitonin receptor. Unlike the calcitonin receptor-like receptors (CPX-2189, CPX-2191, CPX-3148), the calcitonin receptor can migrate to the plasma membrane without guidance from RAMP proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
