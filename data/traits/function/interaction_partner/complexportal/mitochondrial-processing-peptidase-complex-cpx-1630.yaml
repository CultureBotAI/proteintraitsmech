identifier: ComplexPortal:CPX-1630
label: "Mitochondrial processing peptidase complex"
definition: >-
  Metalloprotease which cleaves off the N-terminal presequence from nuclear encoded mitochondrial precursor proteins, such as the sequence that targets the proteins to the mitochondrial matrix. Common features for cleavage of the extension peptides by MPP are a proximal basic amino acid residue, usually arginine at the P2 position, distal N-terminal basic residues generally 3-10 residues from the proximal arginine and an aromatic or less often another type of bulky hydrophobic residue at position P1'; MPP also prefers polar residues such as histidine, serine, and threonine at positions P2' and P3'. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
