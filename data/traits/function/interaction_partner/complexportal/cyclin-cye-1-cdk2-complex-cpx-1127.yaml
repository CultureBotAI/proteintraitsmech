identifier: ComplexPortal:CPX-1127
label: "Cyclin cye-1-cdk2 complex"
definition: >-
  Cyclin-dependent protein kinase complex. Required for G1 to S phase transition of the mitotic cell cycle. Hyper-phosphorylation of Rb proteins by the complex leads to their inactivation which allows transcription of E2F-controlled genes. Regulates proliferation, quiescent state and cell fate during the development of several cell lineages. Phosphorylates and inhibits the translational repressor gld-1 and thus prevents entry into meiosis in order to regulate the pool of germline stem cells and the size of the mitotic zone in the gonads. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
