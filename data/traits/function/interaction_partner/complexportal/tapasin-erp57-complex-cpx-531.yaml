identifier: ComplexPortal:CPX-531
label: "Tapasin-ERp57 complex"
definition: >-
  Role in the assembly of the heavy-chain-beta2-microglobulin dimers of the MHC class I molecules that fold with eight to ten residue peptides in the endoplasmic reticulum. Final assembly and peptide binding take place within the peptide-loading complex (PLC), where the heterodimers undergo peptide editing. The complex seems to be required for the inhibition of the reduction of the disulfide bonds of the heavy chains and the assembly and stabilization of the PLC, suggesting Pdia3/ERp57 may play a structural role rather than a catalytic one. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
