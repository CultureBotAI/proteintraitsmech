identifier: ComplexPortal:CPX-1959
label: "HU complex, variant hupA"
definition: >-
  Non-sequence specific DNA binding protein complex that is capable of wrapping DNA forming nucleosome-like structures. May play a role in replication initiation, transcription, DNA repair and may protect DNA against UV- or gamma-radiation. Binds strongly bent, kinked or distorted DNA, such as that found in damaged DNA with high affinity, but also has a key architectural roles in DNA nucleoid compaction and in constraining negative supercoils in DNA via largely sequence-independent DNA binding. HU also causes stiffening of DNA at high concentrations. Also binds to dnaA during replication initiation as does the alpha homodimer (CPX-1959). Also binds to DnaA during replication initiation as does the heterodimer (CPX-1958). The alpha homodimer is predominantly present in the early log phase. DNA-binding is both, topology- or structural-dependent and sequence-specific. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
