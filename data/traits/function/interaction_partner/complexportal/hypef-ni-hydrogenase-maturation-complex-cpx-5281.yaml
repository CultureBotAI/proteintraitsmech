identifier: ComplexPortal:CPX-5281
label: "HypEF Ni-hydrogenase maturation complex"
definition: >-
  Required for the synthesis of the NiFe(CN)2(CO)bimetallic cofactor present in the active site of [NiFe]-hydrogenases (CPX-281, CPX-282, CPX-317). HypEF catalyses the ATP-dependent transfer of the carbamoyl moiety from carbamoylphosphate to HypE to generate the thiocarboximide via a carbamoyl adenylate intermediate, The thiocarboximide is then dehydrated to form the thiocyanate. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
