identifier: ComplexPortal:CPX-8382
label: "ZNT8 proton-coupled zinc antiporter homodimer"
definition: >-
  Proton-coupled zinc ion antiporter which plays an essential role in regulating Zn2+ accumulation in the insulin secretory granules of pancreatic beta-cells. ZNT8 is responsible for transporting zinc from the cytoplasm into insulin granules, stabilizing insulin hexamer formation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
