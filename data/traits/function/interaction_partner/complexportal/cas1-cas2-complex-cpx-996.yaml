identifier: ComplexPortal:CPX-996
label: "Cas1-Cas2 complex"
definition: >-
  CRISPR (clustered regularly interspaced short palindromic repeat), is an adaptive immune system that provides protection against mobile genetic elements (viruses, transposable elements and conjugative plasmids). The system memorizes previous infections by integrating short sequences of invading genomes (spacers) into the CRISPR locus. The spacers, interspaced with repeats, are expressed as small guide CRISPR RNAs (crRNAs) that are employed by Cas proteins to target invaders sequence-specifically upon a reoccurring infection. The Cas1-Cas 2 complex is essential for the incorporation of 33-bp long sequence-variable foreign DNA protospacers into the host CRISPR locus. CRISPR transcripts generated from the loci assemble with Cas proteins to detect and cleave foreign nucleic acids bearing sequence complementarity to the spacer segment. Cas1 is the probable nuclease that catalyzes the integration reaction, whilst Cas2 may provide a structural scaffold and stimulate the catalytic activity of Cas1. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
