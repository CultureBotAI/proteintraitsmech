label: "Interleukin-17A-F complex"
definition: >-
  Proinflammatory modulator constituted of IL17A , the prototypic member of the IL17 family and IL17F, it's most closely related subunit. IL17 is expressed by CD4+ type 17 helper cells, the Tc17 subset of CD8+ cells, as well as innate-acting gamma-delta T cells, natural killer T cells and TCR-beta+ natural Th17 cells. Unrestrained IL17 signalling is associated with autoimmune diseases and cancer progression, but it is also crucial for protection from fungal and bacterial infections, including the commensal Candida albicans and Klebsiella pneumoniae. IL17 is also thought to play a dominant protective role in maintaining intestinal barrier integrity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
