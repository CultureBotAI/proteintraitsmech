identifier: ComplexPortal:CPX-3041
label: "SUMO activating enzyme complex, SAE1-UBA2"
definition: >-
  An E1 ligase for SUMO1 (P63166-pro_0000035941), SUMO2 (P61957-pro_0000035951) and SUMO3 (Q9Z172-pro_0000035959). It mediates ATP-dependent activation of SUMO proteins followed by formation of a thioester bond between a SUMO protein and a conserved active site cysteine residue on UBA2/SAE2. SUMOylation of UBA2 on three Lys residues on the bipartite nuclear localization sequence (NLS) and two Lys residues outside of but adjacent to the NLS catalyzed by Ubc9 is required for nuclear retention of the complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
