identifier: ComplexPortal:CPX-8578
label: "GABA-A receptor, alpha1-beta2-delta"
definition: >-
  Ligand-gated chloride channel which acts as the main driver of fast inhibitory neurotransmission in the nervous system. GABA (CHEBI:16865), the major inhibitory neurotransmitter in the vertebrate brain, mediates neuronal inhibition by binding to the GABA/benzodiazepine receptor and opening a chloride ion-selective pore. GABA receptors containing alpha/beta/delta subunits are localized to extra- and peri-synaptic membranes where a low concentration of ambient of GABA enables them to be one of the primary mediators of tonic inhibition. Associated with extrasynaptic activity and known to be involved in the ventral tegmental area (VTA) pathway in the brain's hippocampus. Assemble in specific combinations of receptor subunits from a pool of nineteen in a cell-type specific manner, giving rise to receptors with distinct distributions and functions in both physiological and disease states. Their many allosteric sites, which bind compounds with anticonvulsant, anti-anxiety, analgesic, sedative and anaesthetic properties make GABA-A receptors attractive drug targets. Benzodiazepine-insensitive, but high sensitivity to low GABA concentrations and ethanol, an indirect GABA agonist; acohol mimics GABA, binds to GABA receptors and inhibits neuronal signaling. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
