identifier: ComplexPortal:CPX-841
label: "WICH chromatin remodelling complex"
definition: >-
  Chromatin remodeling complex required for maintaining chromatin structure by regulating the spacing of nuclesomes during replication. It is recruited to the replication foci through a direct interaction between the Baz1b subunit and the DNA clamp Pcna. It opens up chromatin after nucleosome assembly upstream of the replication fork and prevents aberrant heterochromatin formation shortly after DNA replication. The Baz1b subunit phosphorylates H2A.X Tyr-143 regulating the H2A.X DNA damage response. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
