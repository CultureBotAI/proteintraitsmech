identifier: ComplexPortal:CPX-2764
label: "Cyclin-dependent protein kinase-activating kinase complex"
definition: >-
  Cyclin-dependent kinase (CDK) activation minimally depends on two events: binding to a cyclin and phosphorylation of a conserved Thr residue in the activation (T) loop. CAK activates cyclin-associated kinases by threonine phosphorylation, thus regulating cell cycle progression. The TFIIH-associated CAK complex phosphorylates the C-terminal domain of RNA polymerase II. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
