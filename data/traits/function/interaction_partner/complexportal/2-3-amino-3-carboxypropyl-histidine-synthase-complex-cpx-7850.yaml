identifier: ComplexPortal:CPX-7850
label: "2-(3-amino-3-carboxypropyl)histidine synthase complex"
definition: >-
  Essential for the first step of biosynthesis of diphthamide, a unique post-translationally modified histidine residue on EEF2 (P13060), a GTPase that is essential in the elongation step of translation. The complex catalyzes the addition of an aminocarboxypropyl (ACP) group to a specific histidine residue in EEF2 using S-adenosylmethionine as a substrate. A small iron-containing protein DPH3 (Q9VGQ9) donates one Fe atom to convert the [3Fe-4S] cluster in DPH1-DPH2 to a functional [4Fe-4S] cluster during the radical-SAM enzyme catalytic cycle. the [4Fe-4S]2+ cluster in DPH1-DPH2 is reduced to [4Fe-4S]+ using dithionite as the reductant. The [4Fe-4S]+ cluster donates two electrons to SAM, cleaving it, forming an organometallic complex and releasing methylthioadenosine.The organometallic intermediate serves as a stabilized ACP radical and reacts with EEF2 to form an intermediate which is converted to the ACP-modified EEF2 product after loss of a hydrogen atom. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
