identifier: ComplexPortal:CPX-1924
label: "DNA polymerase III holoenzyme complex"
definition: >-
  Responsible for primer-initiated 5' to 3' polymerization of DNA on a single-stranded DNA template as part of chromosomal replication. Copying of the template strands is performed by the DNA polymerase III core complex (CPX-1925) within the holoenzyme. To achieve the processivity needed to synthesize the entire chromosome, the Pol III core associates with the dimeric beta sliding clamp (CPX-1927), which is assembled around DNA by the pentameric clamp loader complex (CPX-1926). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
