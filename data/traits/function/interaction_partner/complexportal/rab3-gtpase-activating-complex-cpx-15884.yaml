identifier: ComplexPortal:CPX-15884
label: "RAB3 GTPase-activating complex"
definition: >-
  Plays a regulatory role in membrane trafficking, particularly in exocytosis, by acting on RAB GTPases, the master regulators of intracellular vesicle transport. A RAB3 GTPase-activating complex which activates various RAB3 subfamily members (RAB3A, RAB3B, RAB3C and RAB3D), RAB5A and RAB43 by converting active RAB3-GTP to the inactive form RAB3-GDP. Also acts as a guanine nucleotide exchange factor (GEF) which recruits RAB18 (Q9NP72), and promotes the conversion of inactive RAB18-GDP to the active form RAB18-GTP a regulator of lipid droplet metabolism, ER-to-Golgi trafficking, secretion, and autophagy. Mutations in RAB3GAP1, RAB3GAP2, or RAB18 cause Warburg Micro Syndrome (WMS), a rare recessive disorder marked by microcephaly, cataracts, optic atrophy, spasticity, hypogonadism, and severe developmental delays. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
