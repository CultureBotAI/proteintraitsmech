identifier: ComplexPortal:CPX-3282
label: "Syndecan-1-syntenin-1-ALIX complex"
definition: >-
  Exosome complex that is assembled in the multivesicular body (MVB) membrane and chaperoned to the exosome by the ESCRT-III machinery. A potential regulator of membrane trafficking and heparan sulphate-assisted signalling. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
