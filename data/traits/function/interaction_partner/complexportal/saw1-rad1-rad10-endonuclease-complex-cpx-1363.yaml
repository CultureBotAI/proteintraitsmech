identifier: ComplexPortal:CPX-1363
label: "SAW1-RAD1-RAD10 endonuclease complex"
definition: >-
  Endonuclease, which cuts branched DNA structures at the transition between dsDNA and ssDNA. Required for the repair of double-stranded breaks flanked by direct repeat sequences (boxes) which can occur by single-strand annealing, if a 5-prime to 3-prime resection is allowed to progress past the repeats. The complementary single-stranded repeats can anneal, leaving heterologous flaps to be removed by the RAD1-RAD10 endonuclease catalyzing the 3-prime-non-homologous tail removal of the single-strand annealing recombination intermediates, before gap-filling and ligation completes the repair thereby deleting one of the repeats and the intervening sequence. SAW1 contributes to 3-prime tail removal as a mediator between a 3-prime DNA flap substrate and RAD1-RAD10. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
