identifier: ComplexPortal:CPX-3295
label: "SCF E3 ubiquitin ligase complex, SKP2 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-SKP2 target proteins include phosphorylated CDKN1B/p27kip (P46527) and thus the complex plays a role in regulation of G1/S transition. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
