identifier: ComplexPortal:CPX-26673
label: "FTH1-FTL, Ferritin complex"
definition: >-
  Critical for storing and releasing iron in a controlled manner to maintain iron homeostasis and protect cells from oxidative damage. Intracellularly, it preserves iron in a non-toxic and readily available form, but it is also abundantly found in circlulation. A heteromeric complex is necessary for optimal functioning, with FTH1 and FTL co-assembling into different types of isoferritins, which are either more acidic (heavy chain rich) or more basic (Light chain rich). However, the two are not interchangeable; FTH1 has a metal-binding site and exhibits ferroxidase activity catalysing the oxidation of Fe2+ to Fe3+, so that iron can be safely stored inside the ferritin cavity, whereas FTL lacks ferroxidase activity. Instead, it helps with iron nucleation and stabilises the assembled ferritin shell, helping in iron storage and retention. Ferriting degradation allows the cell to reutilize iron, and occurs primarily through ferritinophagy, a selective form of autophagy mediated by the cargo receptor NCOA4 (see CPX-14323). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
