identifier: ComplexPortal:CPX-791
label: "Talin-1-Vinculin focal adhesion activation complex"
definition: >-
  Plays a crucial role in the assembly and growth of focal adhesions which anchor the cell to the extracellular matrix through transmembrane adhesion receptor integrins and play a central role in cell migration. The assembly of focal adhesions requires the recruitment and activation of vinculin which is is present in the cytoplasm in an autoinhibited conformation with its tail is held in a pincer by its head domains, further stabilized by two high-affinity head-tail interfaces. Vinculin isactivated by talin, modulated by tensile force generated by transient associations with F-actin which leads to release of its head-tail associations. The complex helps to link integrins to the actomyosin contractile machinery. Binding of the talin head to integrins regulates their affinity for the extracellular matrix, maintains integrins in an active conformation and stabilizes the entire focal adhesion structure which contains multiple signalling components. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
