identifier: ComplexPortal:CPX-152
label: "Shelterin complex"
definition: >-
  The Shelterin (Telosome) complex is a DNA-binding protein complex that associates with the telomeres that cap the ends of eukaryotic chromosomes and distinguishes them from sites of DNA damage thus sheltering chromosome ends from being inappropriately processed by the DNA repair machinery. Consequently it plays an essential role in maintaining telomere structure and integrity. Three subunits can interact directly either with single-stranded (POT1) or double-stranded telomeric DNA (TERF1 and TERF2). A curated stable macromolecular complex (Complex Portal) with 6 subunits.
