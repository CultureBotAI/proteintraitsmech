identifier: ComplexPortal:CPX-1156
label: "Central kinetochore CTF19 complex"
definition: >-
  Present in the central kinetochore, where is appears to play a role in the enhancement of cohesin in the pericentromere. May help to mediate the attachment of the centromere to the mitotic spindle by forming interactions between the microtubule-associated outer kinetochore proteins and the centromere-associated inner kinetochore proteins. The COMA subcomplex proteins (CPX-1187) bind to the inner kinetochore proteins whilst the more peripheral proteins do not. Several of the subunits (IML3, CHL4, CTF19, MCM21, CTF3, MCM16 and MCM22) appear to be non-essential although their absence has a significant role in chromosome segregation in meiosis and more limited effects during mitosis. MTW1 is only present in low levels so may only associate with the complex. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
