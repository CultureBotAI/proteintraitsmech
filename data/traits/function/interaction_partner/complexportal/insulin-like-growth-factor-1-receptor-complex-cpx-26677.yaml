identifier: ComplexPortal:CPX-26677
label: "Insulin-like growth factor 1 receptor complex"
definition: >-
  Receptor tyrosine kinase that mediates cellular responses to IGF1 (P05019) and IGF2 (P01344). Upon ligand binding, IGF1R undergoes conformational changes that activate its intrinsic kinase activity, triggering downstream signalling pathways involved in cell growth, differentiation, metabolism, and survival. IGF1R plays critical roles in development, tissue homeostasis, and cancer progression by regulating proliferation and preventing apoptosis. IGF1R binds insulin only weakly and with limited physiological relevance. IGF1R-INSR hybrid receptor's (CPX-16536), insulin binding affinity and signalling are intermediate but generally reduced compared to INSR receptors (CPX-26675). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
