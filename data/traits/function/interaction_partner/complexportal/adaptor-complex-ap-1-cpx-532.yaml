identifier: ComplexPortal:CPX-532
label: "Adaptor complex AP-1"
definition: >-
  Plays a central role in clathrin-coated vesicle formation by coupling coat assembly and cargo collection. Binds short linear motifs on cargo proteins and incorporates them into the clathrin coat of forming vesicles. Mediates the bi-directional transfer of membrane proteins between the trans-Golgi network and the early endosome. Related complexes AP-1 and AP-1R (CPX-533) differ only in the mu chain and sort different cargoes: for example, only AP-1 binds and transports chitin synthase 3 (CHS3, P29465) and the salt stress-induced hydrophobic SNA2 protein (P56508). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
