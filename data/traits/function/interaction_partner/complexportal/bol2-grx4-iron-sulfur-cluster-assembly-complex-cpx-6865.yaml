identifier: ComplexPortal:CPX-6865
label: "BOL2-GRX4 iron-sulfur cluster assembly complex"
definition: >-
  Reversibly binds [2Fe-2S] clusters and appears to play a role in Fe-S cluster assembly and trafficking, and in transferring an intact [2Fe-2S] cluster to an apo acceptor protein. Active in the nucleo-cytoplasmic compartments. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
