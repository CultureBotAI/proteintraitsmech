identifier: ComplexPortal:CPX-2971
label: "Collagen type X trimer"
definition: >-
  Major constituent of the pericellular matrix of hypertrophic chondrocytes within the cartilage growth plate, and the expression of collagen X during endochondral ossification is intimately linked to the onset of cartilage calcification and extracellular matrix remodeling. Collagen X interactions within the cartilage extracellular matrix may establish the correct microenvironment for matrix mineralization and subsequent bone development. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
