identifier: ComplexPortal:CPX-941
label: "mRNA cleavage factor I(m) complex, CPSF6 variant"
definition: >-
  Required for the post-transcriptional cleavage of 3' mRNA as part of its maturation process. Recognises and binds auxiliary UGUA sequence elements localized near the cleavage and polyadenylation signals in the 3'-untranslated region of pre-mRNAs and appears to determine which is the terminal exon. Recruits additional complexes which promote RNA looping. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
