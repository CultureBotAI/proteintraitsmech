identifier: ComplexPortal:CPX-702
label: "PPARgamma-NCOA2 activated nuclear receptor complex"
definition: >-
  Member of the nuclear receptor family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. PPARgamma binds to fatty acids and their metabolites and serves as a key regulator of adipocyte differentation and glucose homeostasis. The effects of ligands on PPARgamma, RXR, and other nuclear receptors are mediated through the ligand-binding domain (LBD). Upon ligand binding, the LBD undergoes a conformational change that results in the release of corepressors, the recruitment of coactivators, such as NCOA2, and the activation of transcription. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
