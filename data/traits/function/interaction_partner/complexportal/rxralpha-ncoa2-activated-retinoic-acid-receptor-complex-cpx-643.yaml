identifier: ComplexPortal:CPX-643
label: "RXRalpha-NCOA2 activated retinoic acid receptor complex"
definition: >-
  Member of the nuclear receptor (NR) family of ligand-regulated transcription factor complexes controlling the expression of numerous genes with a role in cellular differentiation, proliferation and apoptosis. The 9-cis retinoic acid receptor (retinoid X receptor, Rxra) is an important member of the nuclear receptor family because it forms heterodimers with many other receptors, including the all-trans retinoic acid receptors (RARs). Like other NRs, Rxra contains DNA-binding and ligand-binding domain (DBD, LBD). In the absence of agonist, the complex recruits the corepressor proteins NCoR or SMRT and associated factors such as histone deacetylases or DNA-methyl transferases that may lead to an inactive condensed chromatin structure, preventing transcription. Upon ligand binding, RXRs undergo a conformational change that results in the release of corepressors and transcriptional coactivators, such as Ncoa2, are recruited to the LBD which activates transcription. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
