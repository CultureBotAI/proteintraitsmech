identifier: ComplexPortal:CPX-8105
label: "VCP-NPL4-UFD1-UBXN1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. The complex targets proteins ubiquitylated on Lys-6 and Lys-48 for degradation, and plays a role in the formation of aggresomes, membrane-less, juxta-nuclear structures encased in intermediate filament vimentin cages which sequester misfolded, aggregation-prone proteins, thus alleviating proteotoxic cellular stress. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
