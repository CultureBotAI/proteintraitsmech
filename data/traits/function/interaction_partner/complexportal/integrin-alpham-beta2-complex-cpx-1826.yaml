identifier: ComplexPortal:CPX-1826
label: "Integrin alphaM-beta2 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for iC3b fragment of the third complement component, in which it probably recognizes the R-G-D peptide in C3b, for fibrinogen, factor X and ICAM1. It recognizes the P1 and P2 peptides of fibrinogen gamma chain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
