identifier: ComplexPortal:CPX-26547
label: "Nonclassical MHC Ib complex, HLA-E-B2M"
definition: >-
  Antigen-presenting major histocompatibility complex which presents the bound peptide antigen to CD8+ cytotoxic T-lymphocytes .The complex assembles in the endoplasmic reticulum and is transported to the cell surface. Presents a signal sequence peptide from the classical MHC Ia molecules (VL9) to NKG2x-CD94 receptors expressed on natural killer (NK) cells and specific CD8 T cell populations this regulating NK cell-mediated lysis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
