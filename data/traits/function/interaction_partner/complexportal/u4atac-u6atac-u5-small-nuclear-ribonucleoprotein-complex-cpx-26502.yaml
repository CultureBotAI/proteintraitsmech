identifier: ComplexPortal:CPX-26502
label: "U4atac/U6atac.U5 small nuclear ribonucleoprotein complex"
definition: >-
  Minor spliceosome pre-catalytic complex. The Minor spliceosome catalyses the removal of an atypical (U12) class of eukaryotic precursor-mRNA (pre-mRNA) introns and is thought to excise approximately 1 in 300 introns in human pre-mRNA. U12 introns constitute roughly 0.5% of all introns, and are recognizable by their non-consensus AT-AC termini as well as a high degree of conservation at the 5' splice site. U12-dependent introns are thought to be evolutionarily ancient but absent in many species including model organisms such as Caenorhabditis elegans and Saccharomyces cerevisiae. The minor spliceosome contains several specific low-abundance snRNPs, including U11, U12, U4atac, U6atac and the common U5 snRNP also present in the major spliceosome. U12-type intron containing genes are mainly related to information processing functions, including DNA replication and repair, transcription, RNA processing, and translation, but can also be found in genes related to cytoskeletal organization, vesicular transport, and voltage-gated ion channel activity. The tripartate U4atac/U6atac.U5 snRNP (this complex) is formed upon association with the minor A complex (CPX-26489), generating the fully assembled pre-B spliceosome complex which undergoes substantial remodelling to become the activated minor spliceosome. A curated stable macromolecular complex (Complex Portal) with 31 subunits.
