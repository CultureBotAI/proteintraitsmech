identifier: ComplexPortal:CPX-2251
label: "General transcription factor complex TFIIA, TfIIA-S-2 variant"
definition: >-
  Transcription factor complex that regulates transcription initiation from RNA polymerase II promoters. Binding to the transcription factor complex TFIID-TBP enhances assembly of the transcriptional preinitiation complex PIC and its binding to the DNA at the TATA-box by displacing transcription inhibitors. Does not appear to be required for basal transcription but it stabilizes the TBP-DNA complex and stimulates constitutive transcription and activated transcription. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
