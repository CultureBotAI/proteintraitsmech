identifier: ComplexPortal:CPX-8184
label: "B(0,+)AT1-rBAT heteromeric amino acid transporter complex"
definition: >-
  L-type amino acid transporter which catalyses the transmembrane electroneutral reabsoption and exchange of extracellular cationic dibasic amino acids and cystine with intracellular neutral amino acids across the apical membrane of epithelial cells of the renal proximal tubule and small intestine in a sodium-independent manner. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
