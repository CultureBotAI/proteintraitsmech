identifier: ComplexPortal:CPX-6142
label: "TSC1-TSC2 complex"
definition: >-
  Acts as a GTPase-activating protein (GAP) for the small GTPase RHEB (Q15382) thus negatively regulating mTORC1 signaling. TSC1 and TSC2 are the tumor suppressor genes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
