identifier: ComplexPortal:CPX-5704
label: "Kinetochore CCAN complex"
definition: >-
  Interacts with duplex DNA and facilitates accurate chromosome segregation. Plays a central role in assembly of kinetochore proteins, mitotic progression and chromosome segregation. It may be involved in incorporation of newly synthesized Cenpa (O35216) into centromeres to form CENP-A nucleosomes (CPX-5705). Required for chromosome congression and efficient alignment of the chromosomes on a metaphase plate. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
