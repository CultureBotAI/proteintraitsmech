identifier: ComplexPortal:CPX-892
label: "TLR2-TLR6 toll-like receptor complex"
definition: >-
  Type I membrane receptor that plays a crucial role in innate immunity by recognizing conserved patterns in diverse microbial molecules including lipoproteins, lipopeptides, lipopolysaccharide, flagellin, and nucleic acids.TLR1-TLR6 mainly recognizes diacylated lipopeptides deriving from microorganisms, in particular bacteria and viruses. Ligand binding triggers conformational changes and subsequent recruitment of adaptor proteins which execute downstream signal transduction. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
