identifier: ComplexPortal:CPX-1861
label: "GET4-GET5 transmembrane domain recognition complex"
definition: >-
  Escorts newly-synthesised tail-anchored proteins to GET3 (Q12154) for insertion into the endoplasmic reticulum membrane through the GET complex (CPX-956). The complex acts both as an active tethering device that brings GET3 into proximity with its substrates and enzymatically activates GET3 for transmembrane domain recognition. The complex may contain additional heat-shock domain proteins, and it is unclear how many of these are bound at any one time. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
