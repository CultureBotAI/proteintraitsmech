identifier: ComplexPortal:CPX-1927
label: "DNA polymerase III, beta sliding clamp processivity factor complex"
definition: >-
  Loaded onto DNA at the replication fork by the clamp loader complex (CPX-1926) and tethers the DNA polymerase III (CPX-1925) to DNA. At least 3 beta homodimers seem to be present at each replications folk; two are tethered to the two active polymerase core subcomplexes while a third appears to be a little further away, possibly still attached to the end of an Okasaki fragment prior to primer removal and ligation of the gap. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
