identifier: ComplexPortal:CPX-26573
label: "Translation elongation factor 1, EEF1A2 variant complex"
definition: >-
  Complex catalyzes the GTP-dependent binding of aminoacyl-tRNA (aa-tRNA) to the ribosomes's A-site during the elongation phase of protein biosynthesis. EEF1A2 belongs to the eEF1A family and is highly homologous to EEF1A1 (P68104). Upon elongation initiation, GTP-bound eEF1A2 forms a ternary complex with aa-tRNA of any amino acid specificity. eEF1A2-GTP-aa-tRNA subsequently delivers aa-tRNA to the ribosomal pre-A site. aa-tRNA anticodon base-pairing to the mRNA codon in the A-site, promotes GTP hydrolysis, allowing aa-tRNA to be accommodated in the A-site. Eventually, the GDP-bound eEF1A2 leaves the ribosome. Ribosome-catalyzed peptide bond formation extends the protein chain, transferring it from the P-site peptidyl tRNA to the A-site aa-tRNA, extending it by one amino acid. With the exception of the hippocampus, the expression of EEF1A2 and EEF1A1 is thought to be mutually exclusive. EEF1A2 is generally restricted to muscle and brain tissue, whilst EEF1A1 is expressed in all other cell types. The tissue-specific suppression of EEF1A2 is thought to be mediated by miRNA, with loss of miRNA control an explanation for the increase in EEF1A2 expression in cancerous tissue. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
