identifier: ComplexPortal:CPX-8242
label: "CRL3 E3 ubiquitin ligase complex, KLHL38 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL38 target proteins include BECN1 (Q14457) a component of the phosphatidylinositol 3-kinase complex, class III (CPX-73/CPX-74) which plays a key role in initiation and maturation of autophagosomes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
