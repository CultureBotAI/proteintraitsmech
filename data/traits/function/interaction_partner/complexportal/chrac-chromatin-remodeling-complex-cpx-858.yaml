identifier: ComplexPortal:CPX-858
label: "CHRAC chromatin remodeling complex"
definition: >-
  ATP-dependent chromatin remodeling complex required for efficient DNA replication through highly condensed chromatin. It facilitates this process by mediating the sliding of nucleosomes from an end position to the center of a 248 base pair rDNA without causing major trans displacement of histones. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
