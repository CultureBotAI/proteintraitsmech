identifier: ComplexPortal:CPX-2658
label: "SCF E3 ubiquitin ligase complex, FBXL12 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL12 assembles atypical ubiquitin chains containing both Lys-48 and Lys-63 linkages. SCF-FBXL12 target proteins include calmodulin kinase I (Q14012), degradation of which triggers G1 arrest by preventing CAMKI-mediated phosphorylation of CDKN1B/p27kip (P46527) and assembly of the G1 phase kinase, Cyclin D1-CDK4 complex (CPX-2010). The complex ubiquitinates CDKN1A/p21 (P38936) which stabilizes this protein. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
