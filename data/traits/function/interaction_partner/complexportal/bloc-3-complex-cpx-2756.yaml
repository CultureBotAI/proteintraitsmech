identifier: ComplexPortal:CPX-2756
label: "BLOC-3 complex"
definition: >-
  A probable guanine exchange factor (GEF) complex required for the biogenesis of specialized organelles of the endosomal-lysosomal system, such as melanosomes and platelet dense granules. BLOC-3 is proposed to regulate protein trafficking and organelle dynamics. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
