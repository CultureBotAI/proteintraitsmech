identifier: ComplexPortal:CPX-19271
label: "BIRC2-DIABLO apoptosis modulator complex"
definition: >-
  Pro-apototic complex, formation of which disrupts the inhibition of caspase activity by BIRC2. Plays a key regulatory role in maintaining the balance between cell survival and programmed cell death under physiological conditions. The complex functions as a modulator of cell fate, contributing to tissue homeostasis, immune regulation, and developmental cell turnover. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
