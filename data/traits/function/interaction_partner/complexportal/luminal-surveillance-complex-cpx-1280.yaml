identifier: ComplexPortal:CPX-1280
label: "Luminal surveillance complex"
definition: >-
  Recognizes the protein determinant required for ER-associated degradation (ERAD) of mis-folded proteins, recruiting substrates to HRD1-associated machinery, and activating downstream events that commit substrates for degradation. The complex recognizes misfolded glycoproteins independent of their glycosylation status and brings them to the downstream ubiquitination/extraction machinery, however the commitment step to destruction requires the lectin YOS9, which recognizes the glycan species found on terminally misfolded proteins. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
