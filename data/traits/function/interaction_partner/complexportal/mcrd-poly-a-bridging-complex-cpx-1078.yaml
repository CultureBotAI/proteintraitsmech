identifier: ComplexPortal:CPX-1078
label: "mCRD-poly(A)-bridging complex"
definition: >-
  mRNA-bridging complex that forms between the 3-prime poly(A) tail and the major coding-region determinant of instability (mCRD) domain. Protects mRNA containing an mCRD domain prior to translation by stabilizing the poly(A) tail/PABP complex, thus blocking poly(A) nuclease access to the poly(A) tail. During translation, ribosomal movement up to or across the mCRD displaces or reorganizes the bridging complex, thereby allowing formation of metastable structures which expose the poly(A) tail to nuclease attack. The complex is disrupted by competitive binding of Paip2 (Q9D6V8) to Pabpc1, thus displacing Paip1 from Pabpc1 and Pabpc1 from the poly(A) tail leading to premature deadenylation and mRNA decay. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
