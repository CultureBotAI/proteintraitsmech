identifier: ComplexPortal:CPX-8065
label: "Intron-binding complex"
definition: >-
  Spliceosomal complex with an important role in guiding the multifunctional RNA helicase AQR, to bind precursor-mRNA introns at a defined position on the intron. AQR is required for efficient pre-mRNA splicing, connecting, and potentially fixing, intron nucleotides that lie upstream of the extended U2/branch site helix and downstream from the extended U6/intron helix This allows the intron located between these regions to loop out, and thus prevents the intron from interfering with the spliceosome’s core machinery. The introns potentially contain intronic small nucleolar RNAs (snoRNAs) that are processed during spliceosome assembly,. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
