identifier: ComplexPortal:CPX-1947
label: "Methionyl glutamyl tRNA synthetase complex"
definition: >-
  Catalyzes the aminoacylation of tRNAs by their cognate amino acid. Arc1p makes contact with MetRS and GluRS through its amino-terminal domain, while its carboxy-terminal contains a tRNA-binding domain. As a result of the formation of this complex, cognate tRNAs are bound with high affinity and aminoacylation efficiency is increased. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
