identifier: ComplexPortal:CPX-5605
label: "Alternative pathway pathogen cell-bound C5 convertase complex C3bBbC3bP"
definition: >-
  A serine-type endopeptidase complex of the alternative pathway of complement activation of the innate immune system. Cleaves Complement C5 precurser (P01031) into anaphylatoxin C5a (P01031-PRO_0000005988) and Complement C5b (P01031-PRO_0000005985, P01031-PRO_0000005989). Only occurs bound to pathogen cells and binds to target cells via its reactive thioester moiety. Properdin-binding stablises C3bBbC3b convertase (CPX-5604) and prevents its inactivation by Factor H (P08603). Following properdin dissociation the complex combines with C5b, C6 (P13671), C7 (P10643), C8A (P07357), C8B (P07358) & C8G (P07360) and C9 (P02748) to form the Membrane Attack Complex (CPX-6159). Lack of protection, due to familial mutations in the complement genes or the presence of autoantibodies against regulators has been linked to atypical hemolytic uremic syndrome (aHUS) and C3 glomerulopathies (C3G) in kidneys and age-related macular degeneration (AMD) in eyes. Conditions of chronic and acute inflammations, as in rheumatoid arthritis, strokes, and heart attacks, become aggravated by complement activation against the disturbed tissue. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
