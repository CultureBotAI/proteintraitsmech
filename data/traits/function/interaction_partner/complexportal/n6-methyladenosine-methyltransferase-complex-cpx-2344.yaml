label: "N6-methyladenosine methyltransferase complex"
definition: >-
  Mediates N6-methyladenosine (m6A) methylation of mRNAs, a modification that plays a role in the efficiency of mRNA splicing and is required for sex determination. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
