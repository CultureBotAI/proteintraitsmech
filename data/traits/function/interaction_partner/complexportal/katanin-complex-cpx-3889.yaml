identifier: ComplexPortal:CPX-3889
label: "Katanin complex"
definition: >-
  Microtubule severing complex involved in establishing the meiotic spindle. Specifically mediates the disassembly of microtubles of the meiotic spindle in order to promote the rapid reorganisation of cellular microtubule arrays. Mei-1 (P34808) is the catalytic subunit of the complex which severs microtubules in an ATP-dependent manner, whilst mei-2 (O44740) may serve as a targeting subunit. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
