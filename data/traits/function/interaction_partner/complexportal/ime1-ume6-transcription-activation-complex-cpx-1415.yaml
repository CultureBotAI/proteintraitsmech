identifier: ComplexPortal:CPX-1415
label: "IME1-UME6 transcription activation complex"
definition: >-
  Transcriptional activator that acts at promoters of early meiosis-specific genes and recruits the histone acetyl transferase Gcn5 to initiate transcription. Formation of the complex under meiotic induction conditions converts the URS1 element-binding protein, UME6, from a repressor to an activator resulting in the formation of asci. Phosphorylation of IME1 by RIM11 (P38615) is required for complex formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
