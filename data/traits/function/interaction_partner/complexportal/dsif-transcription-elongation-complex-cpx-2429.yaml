identifier: ComplexPortal:CPX-2429
label: "DSIF transcription elongation complex"
definition: >-
  An essential RNA polymerase II elongation factor which functions in the control of RNAP II processivity. Mediates both activation and inhibition of transcription elongation, and plays a role in pre-mRNA processing. Required for promoter-proximal pausing when elongating Pol II pauses near the promoter, about 20-60 base pairs downstream of the transcription start site, a key event in post-initiation regulation of transcription. spt5 docks DSIF to Pol II near the RNA exit channel where it facilitates capping of the nascent RNA. The negative elongation factor (NELF) complex then recognizes the Pol II-spt5 interface and associates with the elongation complex as it transcribes through the promoter-proximal region. Phosphorylation of spt5 by P-TEFb appears to trigger dissociation of NELF from Pol II, enabling Pol II reactivation and resumption of elongation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
