identifier: ComplexPortal:CPX-8696
label: "F-actin capping protein complex, CAPZA2 variant"
definition: >-
  Caps the barbed end of the actin filament in a Ca(2+)-independent manner thereby blocking the exchange of subunits at these ends. The complex is an essential component for the reconstitution of movement powered by actin polymerization and is important for actin assembly and cell motility. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
