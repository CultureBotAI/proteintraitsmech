identifier: ComplexPortal:CPX-1869
label: "Nuclear condensin complex"
definition: >-
  Essential for the structural organization of chromosomes during their segregation by the mitotic spindle. Condensin subunits localize along the axial core of pachytene chromosomes and probably introduce positive supercoils into relaxed DNA in the presence of type I topoisomerases and converts nicked DNA into positive knotted forms in the presence of type II topoisomerases. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
