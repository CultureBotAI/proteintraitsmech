identifier: ComplexPortal:CPX-3241
label: "SCF-Grr1 ubiquitin ligase complex"
definition: >-
  SCF-Grr1 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, Grr1, forms the substrate recognition subunit. It is required for the G1/S cell cycle transition, when it ubiquitinates and targets proteins such as CLN1/2 and GIC2 for degradation. It is a central component in glucose-induced signal transduction, regulating the induction of the glucose transporter Hxt1 via degradation of Mth1 when glucose is abundant. Grr1 is also responsible for the ubiquitination and degradation of several metabolic enzymes and proteins involved in glycolysis and amino-acid biosynthesis.The active complex may be a homodimer. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
