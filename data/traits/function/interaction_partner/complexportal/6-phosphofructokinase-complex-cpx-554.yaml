identifier: ComplexPortal:CPX-554
label: "6-phosphofructokinase complex"
definition: >-
  Catalyzes the phosphorylation of fructose 6-phosphate to fructose 1,6-bisphosphate in the presence of MgATP, the first irreversible step for glycolysis. The enzyme is stablilized in the presence of Fructose 6-P and exhibits cooperative binding of Fructose 6-P. Its activity is controlled by many allosteric activators and inhibitors (including ATP), showing its crucial role in regulation of glycolytic flux. The enzyme can exist in either the active R-state or inhibited T-state. The effectors either modulate the affinity of Pfk for Fructose 6-P or overcome inhibitory effects. Pfk is an octamer composed of 4 alpha and 4 beta subunits. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
