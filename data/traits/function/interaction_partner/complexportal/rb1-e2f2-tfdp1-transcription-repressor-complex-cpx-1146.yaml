identifier: ComplexPortal:CPX-1146
label: "RB1-E2F2-TFDP1 transcription repressor complex"
definition: >-
  Probably negatively regulates the G1-S transition by binding to the E2F2-DP1 complex (CPX-1145) and blocking the transactivation domain of efl-2. Lin-35 dissociates from the complex following hyperphosphorylation by cyclin-dependent kinases. Regulates the expression of genes such as ced-3 and ced-4, which are involved in programmed cell death in germ cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
