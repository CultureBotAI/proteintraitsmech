identifier: ComplexPortal:CPX-3298
label: "Telomerase holoenzyme complex"
definition: >-
  Telomerase is a ribonucleoprotein complex that is essential for maintenance of telomeres. It is a reverse transcriptase that elongates the single-stranded G-rich 3' protruding ends of chromosomal DNA using TLC1 RNA as a template. Est1 and TLC1 are sufficient for telomerase activity in vitro, but in vivo all 4 subunits are required. Although telomerase activity can be detected throughout the cell cycle, telomeres are only elongated in late S-phase. Telomerase is known to interact with other complexes, including CDC13 complex (via EST1), Yku70/80 complex (CPX-1732) (via TLC1) and Sm heteroheptameric complex (via TLC1). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
