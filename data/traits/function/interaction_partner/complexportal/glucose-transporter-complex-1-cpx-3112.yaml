identifier: ComplexPortal:CPX-3112
label: "Glucose transporter complex 1"
definition: >-
  Ubiquitously expressed, class I facilitative glucose transporter found in high levels in erythrocyes and endothelial cells of the brain. Critical regulator of glucose use, storage and the hormonal control of metabolism. May also transport dehydroascorbic acid (By similarity). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
