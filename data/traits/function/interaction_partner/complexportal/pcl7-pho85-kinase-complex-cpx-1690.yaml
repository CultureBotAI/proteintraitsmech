label: "PCL7-PHO85 kinase complex"
definition: >-
  Cyclin-dependent protein kinase that phosphorylates and inactivates GLC8 (P41818), which then modulates GLC7 type-1 protein phosphatases (P38229), thus controlling glycogen phosphorylase and glycogen synthase activities in response to nutrient availability. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
