identifier: ComplexPortal:CPX-1786
label: "Dsl1 tethering complex"
definition: >-
  Multisubunit tethering complex essential for the retrograde traffic of COPI-coated vesicles from the Golgi to the ER. Binds to individual SNAREs via their N-terminal regulatory domains and also to assembled SNARE complexes, and is capable of accelerating SNARE complex assembly. SNARE binding mediates fusion of COPI vesicles with the endoplasmic reticulum. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
