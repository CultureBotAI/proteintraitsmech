identifier: ComplexPortal:CPX-302
label: "Mitochondrial pyruvate carrier, fermentative isoform"
definition: >-
  The fermentative isoform of the mitochondrial pyruvate carrier resides in the mitochondrial inner membrane and mediates uptake of pyruvate into the mitochondrion during growth on fermentable carbon sources such as glucose. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
