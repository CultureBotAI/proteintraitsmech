identifier: ComplexPortal:CPX-3139
label: "RAD55-RAD57 complex"
definition: >-
  Role in the early stages of the homologous recombination DNA damage repair process. Recruited by the Shu complex (CPX-3087) to the sites of single-stranded DNA gaps left by replication-blocking lesions to complete error-free DNA-damage tolerance. Counteracts the anti-recombination activity of the SRS2 helicase (P12954) by associating with the RAD51 (P25454)-ssDNA filament, rendering it more stable than a nucleoprotein filament containing RAD51 alone. stimulates RAD51 filament assembly onto RPA-coated single-stranded DNA. The RAD51/RAD55-AD57 co-filament resists disruption by the SRS2 anti-recombinase by blocking SRS2 translocation. The complex is also involved in double-strand break repair. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
