identifier: ComplexPortal:CPX-2227
label: "SF3B complex"
definition: >-
  Role in pre-mRNA splicing. The SF3B complex is recruited to the 12S U2 small nuclear ribonucleoprotein (snRNP), generating the 15S U2 snRNP. The SF3A complex (CPX-2565) is then incorporated into the snRNP, forming the functional 17S U2 snRNP. As the17S snRNP enters the spliceosome, SF3b6 recognizes the branch site adenosine in pre-mRNA and facilitates an interaction between U2 and the branch point sequence. Once catalytic activation of the spliceosome is primed, the SF3B complex is removed from the branch point through the action of the ATPase DHX16 (O60231) but still binds loosely to U2 within the spliceosome until it finally disassembles from the splicing machinery. The complex may also have additional, non-splicing, roles in the cell. Mutations in SF3B2 and SF3B4 are associated with Craniofacial microsomia (MIM:164210) and Nager syndrome (MIM:154400), respectively. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
