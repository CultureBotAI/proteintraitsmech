identifier: ComplexPortal:CPX-26542
label: "Chemerin-CMKLR2 receptor-ligand complex"
definition: >-
  Chemotactic adipokine-receptor-ligand complex which displays chemotactic activity towards a subset of leukocytes. Receptor-ligand binding activates G protein and ARRB1 (P49407) signalling, initiating secondary messenger pathways including the MAPK pathway playing crucial roles in adipogenesis and inflammation. Also implicated in the regulation of several immune-metabolic processes and diseases including, obesity, diabetes, Alzheimer's disease, multiple sclreosis and cancer. Chemerin moderates its function through the canonical CMKLR1 (CPX-26541) receptor, but it also effects its functions through the CMKLR2 receptor (this complex). Despite the high sequence identity shared by the two receptors, their signalling properties and biological functions are distinct. CMKLR2 can be activated by binding to chemerin but with a lower potency than CMKLR1, and ARRB1 recruitment by CMKLR2 is of a smaller maginute than CMKLR1. Levels of Chemerin and its processing is thought to correlate with insulin resistance and higher Chemerin levels suspected in patients with type 2 Diabetes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
