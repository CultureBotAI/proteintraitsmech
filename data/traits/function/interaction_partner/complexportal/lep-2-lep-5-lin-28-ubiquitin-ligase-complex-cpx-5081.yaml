identifier: ComplexPortal:CPX-5081
label: "lep-2-lep-5-lin-28 ubiquitin ligase complex"
definition: >-
  A ribonucleoprotein complex, which targets the heterchronic protein lin-28 for degradation by the proteasome through ubiquitination by lep-2. This promotes the larval to adult transition and the sexual maturation of the nervous system in males. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
