identifier: ComplexPortal:CPX-10261
label: "Interleukin-20 receptor-ligand type 2 complex"
definition: >-
  Pleiotropic cytokine-receptor complex which plays a role in regulating tissue inflammation, angiogenesis, hemopoiesis, and epidermal cell and keratinocyte differentiation The bioactive complex is primarily formed through crosstalk between IL20 cytokine producing immune cells and receptor complex expressing epthelial cells. Complex formation results in the transphosphorylation of JAK1 and TYK2, which in turn leads to the phosphorylation and activation of transcription factors STAT3 which subsequently translocates into the nucleus where it induces the transcription of target genes. The restricted expression pattern of the receptors which bind IL20 subfamily of cytokines (IL19, IL20, IL22, IL24 and IL26) determines their unique biology and distinguishes them from the larger family of IL10 members. This also underlies their complex role in the pathophysiology of diseases such as IBD, where IL22RA1 and IL22 (Q9GZX6) are implicated but IL20 is not. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
