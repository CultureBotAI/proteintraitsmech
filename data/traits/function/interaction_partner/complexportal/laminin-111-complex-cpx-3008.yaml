identifier: ComplexPortal:CPX-3008
label: "Laminin-111 complex"
definition: >-
  Major component of basment membranes which binds to cells via a high affinity, cell-surface receptor. Role in the attachment, migration and organization of cells into tissues during embryonic development by interacting with other extracellular matrix components. Found in the subendothelium of vascular vessels and mediates platelet adhesion under static and shear conditions. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
