identifier: ComplexPortal:CPX-28
label: "p-aminobenzoyl-glutamate hydrolase complex"
definition: >-
  Catalyzes the cleavage of the folate breakdown product p-aminobenzoyl-glutamate (PABA-GLU) to form p-aminobenzoate (PABA) and glutamate. Reduced derivatives of folic acid are required for biosynthesis of DNA, RNA, amino acids, and other important cellular components. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
