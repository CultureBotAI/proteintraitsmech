identifier: ComplexPortal:CPX-6231
label: "Coagulation factor XIIIa complex"
definition: >-
  A protein-glutamine gamma-glutamyltransferase complex that is part of the last step of the coagulation pathway. Catalyzes the formation of gamma-glutamyl-epsilon-lysine cross-links between fibrin chains of fibrin complexes (CPX-6225), thus stabilizing the fibrin clot (CPX-6230). Also cross-links Alpha-2-antiplasmin (SERPINF2 , P08697), or fibronectin (CPX-6232), to the alpha chains of fibrin. Its zymogen form is initially activated by minor proteolysis by alpha-thrombin complex (CPX-6222) and calcium ions. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
