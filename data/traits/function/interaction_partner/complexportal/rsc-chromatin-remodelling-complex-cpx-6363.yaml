identifier: ComplexPortal:CPX-6363
label: "RSC chromatin remodelling complex"
definition: >-
  Member of the SWI/SNF family of ATP-dependent chromatin remodelers with a role in contributing to the integrity of centromeric DNA. The RSC complex is generally recruited to RNA polymerase III promoters and is specifically recruited to RNA polymerase II promoters by transcriptional activators and repressors where it is responsible for the transfer of a histone octamer from a nucleosome core particle to naked DNA. The reaction requires ATP and involves an activated RSC-nucleosome intermediate. The remodeling reaction also involves DNA translocation, DNA twist and conformational change. As a reconfigurer of centromeric and flanking nucleosomes, the RSC complex is required both for proper kinetochore function in chromosome segregation and, potentially, for organization of the cellular cytoskeleton. It is also involved in non-homologous end joining. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
