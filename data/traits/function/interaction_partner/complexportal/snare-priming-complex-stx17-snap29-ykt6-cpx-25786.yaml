identifier: ComplexPortal:CPX-25786
label: "SNARE priming complex STX17-SNAP29-YKT6"
definition: >-
  Forms a SNARE priming complex on autophagosomes. preparing STX17 and SNAP29 in an optimal conformation to facilitate their subsequent interaction with VAMP8 on lysosomes ensuring efficient membrane fusion. As lysosomes approach the autophagosomes, VAMP8 displaces YKT6 from the priming complex, leading to the formation of a fusogenic SNARE complex, STX17-SNAP29-VAMP8 (CPX-25782). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
