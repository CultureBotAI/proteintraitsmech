label: "bZIP transcription factor complex, ATF4-CREB1"
definition: >-
  Transcription factor complex that binds the cAMP response element (CRE) (consensus: 5'-GTGACGT[AC][AG]-3') of the GRP78 (HSPA5) promoter. Involved in the ER stress response pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
