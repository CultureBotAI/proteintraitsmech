identifier: ComplexPortal:CPX-9261
label: "Snf2/HDAC repressor complex"
definition: >-
  Corepressor complex that couples histone deacetylase and ATP-dependent chromatin remodeling activities. It regulates the higher-order structure of chromatin, making chromatin more compact by removing acetyl groups from nucleosomes, and has important roles in the regulation of gene expression and DNA damage repair. The complex is recruited to heterochromatin by chp2 (O42934). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
