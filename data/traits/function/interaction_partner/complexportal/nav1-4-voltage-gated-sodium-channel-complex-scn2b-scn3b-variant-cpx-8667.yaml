identifier: ComplexPortal:CPX-8667
label: "Nav1.4 voltage-gated sodium channel complex, SCN2B-SCN3B variant"
definition: >-
  Voltage-gated sodium (Nav) channel required for the initiation and transmission of electrical impulses and carries Na+ inward across an excitable membrane. SNCA4 channels are found primarily in skeletal muscle. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
