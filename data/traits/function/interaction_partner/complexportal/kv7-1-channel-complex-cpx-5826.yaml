identifier: ComplexPortal:CPX-5826
label: "Kv7.1 channel complex"
definition: >-
  Voltage-dependent potassium channels that plays major roles in tuning neuronal and cardiomyocyte excitability by acting as a brake for neuronal firing and by controlling cardiomyocyte repolarization. Calmodulin acts as obligate subunit of the Kv7.1 channel. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
