identifier: ComplexPortal:CPX-9581
label: "Phosphorylase kinase, liver variant"
definition: >-
  Serine/threonine-specific protein kinase which phosphorylates glycogen phosphorylase and transforms it from the inactive b form to the active a form to initiate glycogenolysis, the breaking down of glycogen into glucose. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
