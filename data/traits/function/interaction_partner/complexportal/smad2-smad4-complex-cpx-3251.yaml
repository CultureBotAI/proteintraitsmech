identifier: ComplexPortal:CPX-3251
label: "SMAD2-SMAD4 complex"
definition: >-
  A transcription factor complex which binds to the promoters of target genes and recruits co-activators and histone acetyltransferases, such as p300, CBP and P300/CBP-associated factor, facilitating transcription. In response to TGF-beta/activin-family protein binding, TGF-beta type II receptors phosphorylate TGF-beta type I receptors (ALK4, 5 and 7) which in turn phosphorylates Smad2 on two Ser-465 and Ser-467. This enables binding to Smad4 to form heteromeric Smad complexes that enter the nucleus to initiate gene transcription. Because of their relatively low DNA-binding affinity, Smad complexes interact with a wide variety of DNA-binding proteins. Crosstalk with other signalling pathways and interaction with other DNA-binding cofactors define the specific binding patterns of Smads; in addition, interaction with coactivators/corepressors modulates their transcriptional activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
