identifier: ComplexPortal:CPX-26617
label: "SEC62-SEC63 complex"
definition: >-
  Required for post-translational translocation of nascent proteins into the endoplasmic reticulum. Plays a crucial role in targeting of the signal recognition particle-independent protein substrate to the protein-conducting channel and also in the assembly of the post-translocon complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
