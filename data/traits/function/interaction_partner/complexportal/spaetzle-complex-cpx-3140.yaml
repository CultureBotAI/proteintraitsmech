identifier: ComplexPortal:CPX-3140
label: "Spaetzle complex"
definition: >-
  The activated form, spaetzle C-106, acts as a ligand for the Toll receptor and involved in development and innate immunity. Binding to Toll activates the Toll signaling pathway and induces expression of the antifungal peptide drosomycin (P41964) in the hemolymph (esp. during gram-positive bacteria or fungal infection). Component of the extracellular signaling pathway that establishes dorsal-ventral polarity in the embryo. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
