identifier: ComplexPortal:CPX-2629
label: "Ribonuclease MRP complex"
definition: >-
  Essential endoribonuclease closely related to RNAse P complex. RNAse MRP is involved in the processing of ribosomal RNAs, mitochondrial RNAs and certain messenger RNAs. Processes ribosomal RNA (rRNA) precursors at the A3 site allowing formation of the 5.8S pre-rRNA. The RNA subunit RMRP is a catalytically active ribozyme that is capable of both recognizing and cleaving substrates. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
