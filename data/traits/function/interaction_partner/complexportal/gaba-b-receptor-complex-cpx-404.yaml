identifier: ComplexPortal:CPX-404
label: "GABA-B receptor complex"
definition: >-
  G-protein-coupled, metabotropic transmembrane receptor for gamma-aminobutyric acid (GABA), the major inhibitory neurotransmitter in the vertebrate brain. Linked via G-proteins to potassium channels. Ligand binding causes a conformation change that triggers signaling via guanine nucleotide-binding proteins (G proteins) and modulates the activity of down-stream effectors, such as adenylate cyclase. Signaling inhibits adenylate cyclase, stimulates phospholipase A2, activates potassium channels, inactivates voltage-dependent calcium-channels and modulates inositol phospholipid hydrolysis. Calcium is required for high affinity binding to GABA. Plays a critical role in the fine-tuning of inhibitory synaptic transmission. Pre-synaptic GABA receptor inhibits neurotransmitter release by down-regulating high-voltage activated calcium channels, whereas postsynaptic GABA receptor decreases neuronal excitability by activating a prominent inwardly rectifying potassium (Kir) conductance that underlies the late inhibitory postsynaptic potentials. Not only implicated in synaptic inhibition but also in hippocampal long-term potentiation, slow wave sleep, muscle relaxation and antinociception. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
