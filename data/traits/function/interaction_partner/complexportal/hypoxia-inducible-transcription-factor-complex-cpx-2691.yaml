identifier: ComplexPortal:CPX-2691
label: "Hypoxia-inducible transcription factor complex"
definition: >-
  A basic helix-loop-helix-PER-ARNT-SIM (bHLH-PAS) family transcription factor complex composed of a constitutively expressed HIF-beta subunit and an oxygen-regulated HIF-alpha subunit which mediates hypoxia-dependent transcription. Binds to core DNA sequence 5'-[AG]CGTG-3' within the hypoxia response element of target gene promoters. HIF-dependent transcription is activated by insulin and mediated by the PI3K-AKT and TOR pathways. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
