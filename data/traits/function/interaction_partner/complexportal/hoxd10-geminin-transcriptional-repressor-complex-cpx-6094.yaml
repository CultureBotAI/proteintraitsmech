identifier: ComplexPortal:CPX-6094
label: "HOXD10-Geminin transcriptional repressor complex"
definition: >-
  Plays a role in preventing the HOXD10 transcription factor from binding to DNA, thus inhibiting Hox-dependent transcriptional activation of downstream target genes.May also play a role in cell cycle progression, inhibiting the formation of the Cdt1-Geminin complex (CPX-659), thus inhibiting the function of Geminin in DNA replication licensing regulation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
