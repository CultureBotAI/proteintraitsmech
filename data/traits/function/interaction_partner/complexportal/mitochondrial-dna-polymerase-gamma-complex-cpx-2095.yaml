label: "Mitochondrial DNA polymerase gamma complex"
definition: >-
  Responsible for DNA synthesis in all replication, recombination, and repair transactions involving mitochondrial DNA. Utilizes a wide variety of DNA substrates, being most efficient on substrates with high primer density. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
