identifier: ComplexPortal:CPX-132
label: "BAT3 complex"
definition: >-
  BAT3 complex is recruited to ribosomes synthesizing tail-anchored (TA) proteins or polypeptides bearing hydrophobic transmembrane domains (TMDs). BAT3 complex sequesters TA proteins into a soluble form which prevents aggregation or inappropriate interactions, thus facilitating their targeting through the cytosol to GET3. It acts during retrotranslocation as part of the transmembrane recognition complex (TRC) pathway, the mislocalized protein degradation pathway, and the ER-associated protein degradation (ERAD) pathway. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
