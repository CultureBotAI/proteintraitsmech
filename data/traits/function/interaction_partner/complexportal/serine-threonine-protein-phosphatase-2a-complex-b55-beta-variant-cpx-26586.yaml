label: "Serine/threonine-protein phosphatase 2A complex, B55 beta variant"
definition: >-
  Serine/threonine protein phosphatase complex with a central role in the control of cell cycle progression through mitosis. It also regulates the entry into mitosis at the G2/M checkpoint. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
