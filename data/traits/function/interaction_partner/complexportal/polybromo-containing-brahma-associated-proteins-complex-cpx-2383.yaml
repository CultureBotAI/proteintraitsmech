identifier: ComplexPortal:CPX-2383
label: "Polybromo-containing BRAHMA associated proteins complex"
definition: >-
  An ATP-dependent chromatin remodeling complex which is recruited to tissue- and lineage-specific promoters and enhancers of target genes and then alters chromatin structure. Appear to mediate the targeted action of an enhancer, mediating transcription in a pattern that is generated by enhancers close to the insertion site in multiple loci throughout the genome. A curated stable macromolecular complex (Complex Portal) with 12 subunits.
