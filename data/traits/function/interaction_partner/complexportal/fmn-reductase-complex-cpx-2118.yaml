identifier: ComplexPortal:CPX-2118
label: "FMN reductase complex"
definition: >-
  Flavin oxidoreductase subunit that reduces flavin mononucleotid (FMN) to FMNH2 in a NAD(P)H-dependent manner. It provides FMNH2 to the alkanesulfonate monooxygenase subunit ssuD (CPX-2117) which catalyses the conversion of alkanesulfonates into aldehydes and sulfite under conditions of sulfur or cysteine starvation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
