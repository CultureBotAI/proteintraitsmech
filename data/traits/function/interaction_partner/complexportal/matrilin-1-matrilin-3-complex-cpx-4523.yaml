identifier: ComplexPortal:CPX-4523
label: "Matrilin-1 - Matrilin-3 complex"
definition: >-
  A skeletal extracellular matrix complex that mediates interactions between major components of the extracellular matrix such as collagens and proteoglycans and contributes to their fibrillar network. Apparently restricted to epiphyseal growth and articular cartilage in foetal and neonatal tissues. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
