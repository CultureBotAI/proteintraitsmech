identifier: ComplexPortal:CPX-3424
label: "DNA-dependent protein kinase complex"
definition: >-
  Serine/threonine-protein kinase complex, central to the nonhomologous end joining (NHEJ) DNA-repair pathway, which rejoins double-strand breaks. It is also required for V(D)J recombination, a process that utilizes NHEJ to promote immune system diversity. Directly impacts transcriptional regulation, in part potentially by phosphorylating the C-terminal domain of RNA polymerse II. The XRCC5/6 heterodimer binds ends of dsDNA and both recruits PRKDC to DNA double strand breaks and stimulates its kinase activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
