identifier: ComplexPortal:CPX-26578
label: "Translation elongation factor 1, EEF1A1 variant complex"
definition: >-
  Complex catalyzes the GTP-dependent binding of aminoacyl-tRNA (aa-tRNA) to the ribosomes's A-site during the elongation phase of protein biosynthesis. EEF1A1 belongs to the eEF1A family and is highly homologous to EEF1A2 (Q71V39). Upon elongation initiation, GTP-bound eEF1A1 forms a ternary complex with aa-tRNA of any amino acid specificity. eEF1A1-GTP-aa-tRNA subsequently delivers aa-tRNA to the ribosomal pre-A site. aa-tRNA anticodon base-pairing to the mRNA codon in the A-site, promotes GTP hydrolysis, allowing aa-tRNA to be accommodated in the A-site. Eventually, the GDP-bound eEF1A1 leaves the ribosome. Ribosome-catalyzed peptide bond formation extends the protein chain, transferring it from the P-site peptidyl tRNA to the A-site aa-tRNA, extending it by one amino acid. The expression of EEF1A1 and EEF1A2 is thought to be mutually exclusive. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
