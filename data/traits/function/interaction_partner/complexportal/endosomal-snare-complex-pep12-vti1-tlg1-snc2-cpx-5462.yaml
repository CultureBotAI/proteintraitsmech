identifier: ComplexPortal:CPX-5462
label: "Endosomal SNARE complex PEP12-VTI1-TLG1-SNC2"
definition: >-
  SNARE complex required for transport from the Golgi to endosomes. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the linked membranes and initiates membrane fusion. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
