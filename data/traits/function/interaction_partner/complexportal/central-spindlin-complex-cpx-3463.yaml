identifier: ComplexPortal:CPX-3463
label: "Central spindlin complex"
definition: >-
  Microtubule-dependent and Rho-mediated signaling complex. Plays a key role in the formation of the central spindle (a set of microtubule bundles that forms between the separating chromosomes) during late anaphase and contractile ring formation during cytokinesis. During anaphase, activates and targets the guanine nucleotide exchange factor (GEF) ect-2 (Q9U364) to the central spindle, where it can activate the guanosine triphosphatase (GTPase) Rho family member rho-1 (Q22038). rho-1 signalling is controlled by the central spindle. The complex promotes the formation of microtubule bundles acting cooperatively with several other protein complexes to bundle antiparallel microtubules during anaphase. Localization at the central spindle requires the Chromosome passenger complex (CPX-3461). Furthermore, the complex is directly phosphorylated by the Chromosome passenger complex. Phosphorylation of the complex regulates its activity during cytokinesis. The complex may also stimulate rho-1 activation at the cell membrane, which in turn orchestrates contractile ring assembly and constriction during cytokinesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
