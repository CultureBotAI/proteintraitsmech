identifier: ComplexPortal:CPX-7381
label: "Hypoxia-inducible transcription factor complex, HIF1"
definition: >-
  A basic helix-loop-helix-PER-ARNT-SIM (bHLH-PAS) family transcription factor complex composed of a constitutively expressed HIF-beta subunit and an oxygen-regulated HIF-alpha subunit which mediates hypoxia-dependent transcription. Binds to core DNA sequence 5'-[AG]CGTG-3' within the hypoxia response element of target gene promoters. HIF-dependent transcription is activated by insulin and mediated by the PI3K-AKT and TOR pathways and regulates the transcription of genes involved in a multitude of processes including angiogenesis, erythropoiesis, cell proliferation/survival, glucose metabolism, and iron metabolism. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
