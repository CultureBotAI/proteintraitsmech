identifier: ComplexPortal:CPX-5943
label: "Glucose-specific enzyme II complex"
definition: >-
  Involved in the transport of glucose across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). A phosphoryl group is transferred from hpr (P0AA04) to ptsG (IIAGlc) and thence from IIAGlc to the C-terminal cytoplasmic domain of the glucose transporter crr/IICBGlc. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
