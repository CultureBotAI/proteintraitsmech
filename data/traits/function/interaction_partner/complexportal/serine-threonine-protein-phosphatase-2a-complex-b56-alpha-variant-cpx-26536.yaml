label: "Serine/threonine-protein phosphatase 2A complex, B56 alpha variant"
definition: >-
  Serine/threonine protein phosphatase complex with a central role in maintaining cellular homeostasis. PP2A-B56 has been associated with maintenance of sister chromatid cohesion, regulation of kinetochore-microtubule attachment and with chromosome biorientation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
