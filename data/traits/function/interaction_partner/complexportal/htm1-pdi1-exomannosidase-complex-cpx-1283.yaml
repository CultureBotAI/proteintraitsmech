identifier: ComplexPortal:CPX-1283
label: "HTM1-PDI1 exomannosidase complex"
definition: >-
  Exomannosidase complex which initiates breakdown of unfolded glycoproteins by trimming the Man8GlcNAc2 glycan to produce Man7GlcNAc2, thus initiating the clearance of these proteins from the endoplasmic reticulum. N-linked Man7GlcNAc2 oligosaccharides serve as a signal for degradation by the Hrd1 ubiquitin ligase complex (CPX-3070). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
