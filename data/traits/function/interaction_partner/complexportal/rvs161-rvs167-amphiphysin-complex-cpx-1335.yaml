identifier: ComplexPortal:CPX-1335
label: "RVS161-RVS167 amphiphysin complex"
definition: >-
  Binds to membranes and promote the membrane curvature required for endocytosis and also potentially membrane scission at the sites of endocytosis. The BAR domains present in both proteins form helical structures at the neck of the invaginating plasma membrane. Functions with INP52 (P50942) to promote scission of the vesicle. The complex appears to protect the PI(4,5)P2 in the vesicle neck resulting in differential hydrolysis by INP52 to generate a lipid phase boundary. This leads to a mechanochemical interfacial force, driving membrane scission. In growing yeast cells, the complexes localize to cortical actin patches, which are sites of endocytosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
