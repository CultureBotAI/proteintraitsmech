label: "FOXP2 transcription factor homodimer"
definition: >-
  Transcriptional regulator with a role in the development of the central nervous system, regulating transcription of genes involved in early neuronal development mainly through transcriptional repression. FOXP2 controls language development. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
