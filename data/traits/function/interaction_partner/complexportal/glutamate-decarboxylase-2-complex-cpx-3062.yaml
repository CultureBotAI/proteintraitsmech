identifier: ComplexPortal:CPX-3062
label: "Glutamate decarboxylase 2 complex"
definition: >-
  An essential enzyme that catalyzes the production of the inhibitory neurotransmitter GABA (gamma-aminobutyric acid, CHEBI:16865) from glutamate (CHEBI:16015) and controls fundamental processes such as neurogenesis, synaptogenesis, movement and tissue development and protection against neural injury. and is used as energy source through GABA shunt. Involved in intermediary metabolism, participating in the GABA shunt, which bypasses two steps of the TCA cycle. Approximately 80% of GAD2 exists in the inactive apo form and is activated to produce extra GABA when required. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
