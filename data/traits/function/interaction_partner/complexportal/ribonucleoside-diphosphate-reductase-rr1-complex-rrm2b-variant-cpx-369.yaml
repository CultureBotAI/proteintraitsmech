identifier: ComplexPortal:CPX-369
label: "Ribonucleoside-diphosphate reductase RR1 complex, RRM2B variant"
definition: >-
  Catalyzes the reduction of ribonucleotides to the corresponding deoxyribonucleotides, an essential step in the de novo synthesis of monomeric precursors for DNA replication and repair, while reducing either glutaredoxin (P35754/Q9NS18) or thioredoxin (P10599). The RRM1 subunit binds 2 Mg2+ ions and RRM2B contains a ferric iron-tyrosyl free radical center. The enzyme is allosterically regulated, stimulated by ATP and inhibited by dATP binding to the activity site on the RRM1 subunit. Plays a pivotal role in cell survival by supplying nucleotides in a p53-dependent manner for mitochondrial DNA synthesis and to the DNA repair machinery in cells arrested at G0/G1 or G2/M. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
