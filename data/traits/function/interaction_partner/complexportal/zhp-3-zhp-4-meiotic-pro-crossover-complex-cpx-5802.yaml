identifier: ComplexPortal:CPX-5802
label: "ZHP-3-ZHP-4 meiotic pro-crossover complex"
definition: >-
  Required for crossover formation and subsequent chromosome segregation during meiotic recombination. During meiotic pachytene, recruited by the ZHP-1-ZHP-2 heterodimer (CPX-5801) to designated crossover sites along the recombination intermediate to stabilizes other pro-crossover factors such as rmh-1 (P91399), msh-5 (Q19272) and cosa-1 (Q9BL45). This in turn faciliates crossover and the formation of chiasma in each meiotic nucleus at the late pachytene stage of meiosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
