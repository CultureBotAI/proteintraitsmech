identifier: ComplexPortal:CPX-2707
label: "tRNA-intron splicing endonuclease complex"
definition: >-
  Initiates tRNA splicing in those pre-tRNAs that contain an intron by cleaving on both sides of this element. Ligation of the two exons is then performed by the tRNA-splicing ligase complex (CPX-6411). CLP1 has been observed to influence the level of premature and mature tRNA gene products but the mechanism for this is not yet understood. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
