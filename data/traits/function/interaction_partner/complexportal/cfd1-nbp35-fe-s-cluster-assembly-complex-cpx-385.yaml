identifier: ComplexPortal:CPX-385
label: "CFD1-NBP35 Fe-S cluster assembly complex"
definition: >-
  Scaffold complex that assembles nascent FeS clusters as part of the iron-sulfur cluster (ISC) assembly system, for transfer to FeS-requiring enzymes. NBP35 appears to bind the major portion of FeS clusters in the complex whereas CFD1 enhances this binding and drives the release of FeS to target apo-FeS proteins. The complex appears to have low level ATPase activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
