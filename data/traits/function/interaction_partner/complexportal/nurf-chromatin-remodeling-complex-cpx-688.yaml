identifier: ComplexPortal:CPX-688
label: "NuRF chromatin remodeling complex"
definition: >-
  NuRF is an ATP-dependent chromatin-remodelling complex with intrinsic nucleosome dependent ATPase activity. Appears to promote ATP-dependent nucleosome sliding and transcription from chromatin templates. The BPTF subunit binds H3K4me3. The complex binds to the promoters of the Engrailed genes, EN1 and EN2 and it may be involved in brain development. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
