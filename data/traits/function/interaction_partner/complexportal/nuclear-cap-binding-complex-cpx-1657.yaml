identifier: ComplexPortal:CPX-1657
label: "Nuclear cap-binding complex"
definition: >-
  Binds co-transcriptionally to the 5-prime, m7GpppG-cap (m7G-cap) structures of all RNA polymerase II transcripts (mRNAs and pre-miRNAs). Required for processes such as pre-mRNA splicing through commitment complex and spliceosome formation, export of mRNA out of the nucleus in association with NPL3 (Q01560), degradation of nuclear mRNAs, primary miRNA processing and miRNA-mediated RNA interference. In the cytosol, importin-beta interacts with CBC-bound importin-alpha (CPX-1068) and promotes the dissociation of the RNA from CBC. Importin-complex-bound CBC gets reimported into the nucleus for reuse. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
