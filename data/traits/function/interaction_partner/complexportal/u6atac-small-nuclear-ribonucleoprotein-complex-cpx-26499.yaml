identifier: ComplexPortal:CPX-26499
label: "U6atac small nuclear ribonucleoprotein complex"
definition: >-
  Minor spliceosome building block. The minor spliceosome catalyses the removal of an atypical (U12) class of eukaryotic precursor-mRNA (pre-mRNA) introns and is thought to excise approximately 1 in 300 introns in human pre-mRNA. U12 introns constitute roughly 0.5% of all introns, and are recognizable by their non-consensus AT-AC termini as well as a high degree of conservation at the 5' splice site. U12-dependent introns are thought to be evolutionarily ancient but absent in many species including model organisms such as Caenorhabditis elegans and Saccharomyces cerevisiae. The minor spliceosome contains several specific low-abundance snRNPs, including U11, U12, U4atac, U6atac (this complex) and the common U5 snRNP also present in the major spliceosome. U12-type intron containing genes are mainly related to information processing functions, including DNA replication and repair, transcription, RNA processing, and translation, but can also be found in genes related to cytoskeletal organization, vesicular transport, and voltage-gated ion channel activity. U6atac is part of the activated spliceosome and is involved in the first trans-estherification step of splicing. After splicing is complete, the spliceosome disassembles and free U6atac snRNP forms. It then reassociates with U4atac snRNA to form U4/U6atac snRNP. SART3 (Q15020), an snRNP recycling factor, thought to associate with U6 and U4/U6 snRNP during the recycling phase of the spliceosome cycle but dissociating during the formation of the U4/U6.U5 tri-complex is likely to play a similar role with U6atac snRNPs and U4/U6atac snRNPs. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
