identifier: ComplexPortal:CPX-3177
label: "eIF4E-cup complex"
definition: >-
  Causes translational repression. Prevents assembly of ribosomes at the mRNA by interfacing with a sequence-specific RNA-binding protein leading to recruitment of the CCR4 complex and consequently, reduction of the mRNA's poly(A) tail length. Required for dorso-ventral pattern formation in the embryo: liaises with Bruno (O02374) and Smaug (Q23972), which bind to oskar and nanos mRNAs, respectively, to prevent their translation before posterior localization. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
