identifier: ComplexPortal:CPX-102
label: "DAPK1 - calmodulin complex"
definition: >-
  A serine/threonine protein kinase complex involved in cell survival, apoptosis and autophagic cell death pathways. DAPK1 is activated by dephosphorylation of Ser-308 and calcium-calmodulin binding. Complex activity is regulated via various phosphorylation sites, two of which (Ser-298 and Ser-308) are located on the autoregulatory domain (ARD) of DAPK1. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
