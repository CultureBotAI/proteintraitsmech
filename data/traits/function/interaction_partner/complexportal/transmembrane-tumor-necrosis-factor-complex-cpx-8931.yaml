identifier: ComplexPortal:CPX-8931
label: "Transmembrane tumor necrosis factor complex"
definition: >-
  Potent pro-inflammatory cytokine capable of exerting pleiotropic effects on a variety of cell types. Belongs to the tumour necrosis factor (TNF) superfamily of type II transmembrane proteins. Mainly secreted by macrophages, T helper 1 and natural killer cells, it is expressed on activated macrophages and lymphocytes. Generated as a precursor form known as transmembrane TNF(mTNF, this complex), TACE (ADAM17) cleavage of mTNF results in the release of a soluble form (sTNF, CPX-8826) with the residual cytoplasmic domain of mTNF migrating back into the nucleus of mTNF producing cells. sTNF exerts its functions through either type-1 (TNR1A, P19438) or type-2 (TNR1B, P20333) TNF receptors and while mTNF can act through either receptor type, its activities are mainly mediated through TNR1B, its primary biological target. Both the soluble and the transmembrane forms play a role in inflammatory responses and whilst mTNF exerts its biological function through cell-to-cell contact to moderate inflammation, sTNF, acts at sites remote from the TNF-producing cells to drive inflammation. Both protective and pathogenic, it induces cell death in response to microbial infection but behaves aberrantly when induced as a result of environmental or genetic factors, thereby driving the pathogenesis of inflammatory disorders. Cytotoxic effects mediated by mTNF include lung injury induced in the alveolar macrophages of HIV patients, yet mTNF offers protection from Mycobacterium tuberculosis infection. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
