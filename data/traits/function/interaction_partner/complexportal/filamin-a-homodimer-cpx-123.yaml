identifier: ComplexPortal:CPX-123
label: "Filamin A homodimer"
definition: >-
  Homodimeric actin cross-linking proteins that organize the actin cytoskeleton and maintain extracellular matrix connections by anchoring actin filaments to transmembrane receptors. By cross-linking and anchoring actin filaments, filamins stabilize the plasma membrane, provide cellular cortical rigidity, and contribute to the mechanical stability of the plasma membrane and the cell cortex. FLNa-actin networks behave as weak elastic solids under low shear stress due to the flexible nature of actin-FLNa crosslinks, yet can support large shear stresses and have pronounced nonlinear strain-stiffening behaviors. High avidity binding to F-actin due to dimerization and multiple binding to F-actin through FLNa ABD and rod 1 confers strain-stiffening on actin networks. FLNa dimers also interact with transmembrane proteins, cytoskeletal proteins, and intracellular signaling proteins and are therefore involved in stabilization and regulation of plasma membrane and intracellular signaling. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
