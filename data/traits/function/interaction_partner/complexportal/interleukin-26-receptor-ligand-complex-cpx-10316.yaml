identifier: ComplexPortal:CPX-10316
label: "Interleukin-26 receptor-ligand complex"
definition: >-
  Receptor-cytokine complex thought to function both as a driver and an effector of inflammation. IL26 binding to its receptor complex induces JAK1/TYK2 signalling leading to activation of STAT1/STAT3. Monomeric and dimeric IL26 are both functional, but are thought to differ in their ability to activate epithelial cells and monocytes, as well as in their binding locations to form the functional receptor-ligand complex. Primarily secreted by pathogenic T helper 1 (Th1), Th17 and CD4+ cells, IL26 activity is restricted by the expression of its receptor IL20R1 to epithelial cells and some myeloid cells. The inability of immune cells to express IL20R1 is thought to lend IL26 to alternative ways (CPX-10317) to mediate its proinflammatory effects in IL20R1-negative cells. IL26 is considered to be a master regulator of inflammation but one that could also be a catalyst for driving chronic inflammatory disorders. In addition to the proinflammatory effects it mediates, IL26 functions as a kinocidin or antimicrobial protein (AMP) with strong antimicrobial and bactericidal effects, particularly on Gram-positive bacteria, through its capacity to form pores in bacterial membranes. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
