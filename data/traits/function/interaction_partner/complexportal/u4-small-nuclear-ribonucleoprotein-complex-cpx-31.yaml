identifier: ComplexPortal:CPX-31
label: "U4 small nuclear ribonucleoprotein complex"
definition: >-
  Non-coding RNA containing complex that is involved in mRNA splicing. U4 is found in a complex with U6 snRNP (the U4/6 snRNP complex, CPX-32), which is an intermediate in the assembly of the spliceosome. The spliceosome is a highly dynamic structure, assembled by sequential binding and release of the small nuclear RNAs and protein factors which removes intronic sequence from pre-mRNA. U4 dissociates from the spliceosome during the activation step. The U4/6 complex is then re-assembled in each cycle. Its function seems to be to deliver U6 to the spliceosome. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
