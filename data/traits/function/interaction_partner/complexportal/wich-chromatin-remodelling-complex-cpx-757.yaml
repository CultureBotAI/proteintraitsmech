identifier: ComplexPortal:CPX-757
label: "WICH chromatin remodelling complex"
definition: >-
  Chromatin remodeling complex required for maintaining chromatin structure by regulating the spacing of nuclesomes during replication. It is recruited to the replication foci through a direct interaction between the BAZ1B subunit and the DNA clamp PCNA. It opens up chromatin after nucleosome assembly upstream of the replication fork and prevents aberrant heterochromatin formation shortly after DNA replication. The BAZ1B subunit phosphorylates H2A.X Tyr-142 regulating the H2A.X DNA damage response. Particularly important during embryonic and neonatal development, especially for craniofacial features. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
