identifier: ComplexPortal:CPX-6911
label: "IgM - Ig kappa immunoglobulin complex, constant regions"
definition: >-
  Membrane-bound or secreted glycoprotein produced by B lymphocytes. In the recognition phase of humoral immunity, the membrane-bound immunoglobulins serve as receptors which, upon binding of a specific antigen, trigger the clonal expansion and differentiation of B lymphocytes into immunoglobulin-secreting plasma cells. Secreted immunoglobulins (also known as antibodies) mediate the effector phase of humoral immunity, which results in the elimination of bound antigens. The membrane-bound form is found in the majority of normal B-cells alongside with IgD. The soluble form, which represents about 30% of the total serum immunoglobulins, is found almost exclusively as a homopentamer. IgM and IgD molecules present on B cells have identical V regions and antigen-binding sites. IgM antibodies are associated with a primary immune response. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
