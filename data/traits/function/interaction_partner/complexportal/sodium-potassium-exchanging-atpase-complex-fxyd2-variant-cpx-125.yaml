identifier: ComplexPortal:CPX-125
label: "Sodium:potassium-exchanging ATPase complex, FXYD2 variant"
definition: >-
  An ATPase-dependent transmembrane transport complex capable of generating electrochemical gradients by exchanging three intracellular sodium ions for two extracellular potassium ions during each cycle of ATP hydrolysis. Na+/K+ pumps can also generate an inward current of protons. Each transport cycle comprises a sequence of conformational transitions that permit extracellular K+ ions to access the binding sites in phosphorylated pumps and cytoplasmic Na+ ions to access the sites after dephosphorylation . Binding of the third Na+ ion triggers autophosphorylation, and binding of the second K+ ion prompts auto-dephosphorylation. This coupling of alternating ion access to ATP hydrolysis ensures forward, energetically uphill, progress of the Na+/K+ transport cycle. The larger pumped Na+ efflux than K+ influx constitutes outward current, a direction tending to make the membrane potential more negative. However, because each step in the cycle is reversible , if the normally transported intracellular Na+ and extracellular K+ are both scarce, the cycle can run backward, thus synthesizing ATP and generating inward, depolarizing current. Variants containing ATP1A1-ATP1B1 appear to be most widely expressed. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
