identifier: ComplexPortal:CPX-8101
label: "VCP-NPL4-UFD1-UBXN7 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of its substrate proteins from cellular structures or multiprotein complexes into the cytosol where they are largely degraded by the proteasome. Substrates include the CRL3-KEAP1 and CRL2-VHL (CPX-2250) ubiquitin ligase complexes which are involved in the regulation of the NFE2L2 (Q16236) and HIF1A (Q16665) protein levels respectively. Binds to polyubiquitylated CMG helicase (CPX-4526) and unloads this complex from a stalled DNA replication fork. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
