identifier: ComplexPortal:CPX-984
label: "CCM endothelial permeability complex"
definition: >-
  Forms a signalling platform, responsible for maintaining integrity of endothelial permeability. Plays a key role in the integrity of the endothelial tubule networks at the initial stages of vasculogenesis. Appears to act primarily by inhibiting RhoA-associated kinase (ROCK) activation and thus regulating RhoA signaling however distinct patterns of interacting proteins for each CCM protein has been observed. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
