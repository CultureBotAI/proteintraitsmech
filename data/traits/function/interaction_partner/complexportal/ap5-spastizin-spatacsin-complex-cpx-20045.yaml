identifier: ComplexPortal:CPX-20045
label: "AP5-Spastizin-spatacsin complex"
definition: >-
  Essential in the formation of lysosomal tubulation and autophagic lysosome reformation. Localized to the late endosome and lysosome membrane, the complex is required for regulaton of free lysosomes and driving membrane remodelling of auto-lysosomal tubules. Mutations in SPG11, ZFYVE26 and AP5Z1 result in autosomal-recessive hereditary spastic paraplegia characterised by the slow, gradual, progressive weakness and spasticity of the lower limbs. Functional impairment of the complex results in lysosome abnormalities, including endolysosomal accumulation of material and enlargement, lack of free lysosomes available for fusion with autophagosomes and autophagosome accumulation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
