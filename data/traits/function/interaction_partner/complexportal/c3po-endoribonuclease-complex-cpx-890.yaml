identifier: ComplexPortal:CPX-890
label: "C3PO endoribonuclease complex"
definition: >-
  Endoribonuclease complex which functions as the component 3 promoter of RISC (RNA-induced silencing complex). Cleaves the fragmented siRNA passenger strands and facilitates the activation of RNA-induced silencing complex (RISC), the effector complex of RNA interference (RNAi), and thus plays a role in post-transcriptional repression of gene expression through down-regulation of translation or induction of mRNA degradation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
