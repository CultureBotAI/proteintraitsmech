identifier: ComplexPortal:CPX-8618
label: "Mitochondrial proton-transporting ATP synthase complex"
definition: >-
  Acts to convert the energy of oxidation-reduction reactions of the electron transport chain (respiration) to the phosphorylation of ADP. The synthesis of ATP is coupled to the respiratory chain via the proton potential. The ATP synthase is a molecular motor composed of two separable parts: F1 and Fo. The F1 portion contains the catalytic sites for ATP synthesis and protrudes into the mitochondrial matrix. Fo forms a proton turbine that is embedded in the inner membrane and connected to the rotor of F1. The flux of protons flowing down a potential gradient powers the rotation of the rotor driving the synthesis of ATP. Thus, the flow of protons though Fo is coupled to the synthesis of ATP. May also play a role in Ca(2+)-induced Ca(2+) release from the mitochondria. A curated stable macromolecular complex (Complex Portal) with 16 subunits.
