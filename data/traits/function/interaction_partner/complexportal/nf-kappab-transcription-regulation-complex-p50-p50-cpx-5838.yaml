identifier: ComplexPortal:CPX-5838
label: "NF-kappaB transcription regulation complex, p50/p50"
definition: >-
  Transcription factor that binds at kappa-B sites in the DNA of its target genes where it acts as a transcriptional regulator. Present in almost all cell types and is the endpoint of a series of signal transduction events that are initiated by a vast array of stimuli related to many biological processes such as inflammation, immunity, differentiation, cell growth, tumorigenesis and apoptosis. p52:p52 dimers lack a trans-activating domain, and therefore repress transcription in the absence of co-activating factors and p65. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
