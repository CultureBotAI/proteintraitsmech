identifier: ComplexPortal:CPX-1823
label: "Integrin alpha4-beta7 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for the cell surface adhesion molecules MADCAM1, expressed by the vascular endothelium of the gastrointestinal tract, VCAM1 and fibronectin. It recognizes one or more domains within the alternatively spliced CS-1 region of fibronectin. Interactions involves the tripeptide L-D-T in MADCAM1, and L-D-V in fibronectin. Mediates lymphocyte migration and homing to gut-associated lymphoid tissue (GALT). Binds to a tripeptide L-D-I in HIV-1 gp120, thereby allowing the virus to enter GALT, which is thought to be the major trigger of AIDS disease. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
