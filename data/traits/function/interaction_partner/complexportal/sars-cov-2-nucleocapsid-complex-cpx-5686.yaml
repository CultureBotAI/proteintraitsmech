identifier: ComplexPortal:CPX-5686
label: "SARS-CoV-2 nucleocapsid complex"
definition: >-
  Forms the helical ribonucleocapsid (RNP) of the SARS-CoV coronavirus. Packages the positive strand viral genome RNA and plays a fundamental role during virion assembly through its interactions with the viral genome and membrane protein M (P0DTC5). Recognises and binds to a packaging signal, a cis-regulatory element encoded within the viral RNA. Plays an important role in enhancing the efficiency of subgenomic viral RNA transcription as well as viral replication. Forms viral-like particles (VLPs) together with proteins M, E (P0DTC4) and S (P0DTC2) without the requirement of genomic RNA. Inhibits type I interferon (IFN-beta) activation and downstream innate immune responses. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
