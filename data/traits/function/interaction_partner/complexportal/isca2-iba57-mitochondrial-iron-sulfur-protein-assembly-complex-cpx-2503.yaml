identifier: ComplexPortal:CPX-2503
label: "ISCA2-IBA57 mitochondrial iron-sulfur protein assembly complex"
definition: >-
  Binds a [2Fe-2S] cluster which may then be inserted into mitochondrial target proteins. Receives the [2Fe-2S] cluster from GLRX5 complexes (CPX-6862, CPX-6863). The [2Fe-2S] cluster is extremely stable against oxidative degradation when bound to the ISCA2-IBA57 complex. The complex may also play a role in forming/repairing [4Fe-4S] clusters under aerobic cellular conditions by transferring one/two [2Fe-2S] clusters to mitochondrial target proteins which directly generate the [4Fe-4S] cluster. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
