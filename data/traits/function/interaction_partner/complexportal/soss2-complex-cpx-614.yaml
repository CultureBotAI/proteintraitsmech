identifier: ComplexPortal:CPX-614
label: "SOSS2 complex"
definition: >-
  A double-stranded DNA break repair complex that senses single-stranded DNA (ssDNA) and promotes repair of DNA double-strand breaks (DSBs). The binding affinity for ssDNA becomes more significant the longer the ssDNA fragment is. Influences diverse endpoints in the cellular DNA damage response including cell-cycle checkpoint activation (G2/M), homologous recombination-dependent repair of DSBs, ATM-dependent signaling pathways and maintenance of genomic stability. The SOSSA (INT3) subunit promotes nuclear localization of the complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
