identifier: ComplexPortal:CPX-21824
label: "CCS-SOD1, oxidative stress response complex"
definition: >-
  The SOD1-CCS complex plays a central role in cellular defense against oxidative stress by facilitating the detoxification of superoxide radicals. CCS specifically recognizes nascent, metal-deficient SOD1 (apo-SOD1) and promotes its maturation through copper delivery and oxidation of the conserved intramolecular disulfide bond. These modifications convert apo-SOD1 into the stable, zinc- and copper-bound holo-enzyme that catalyzes the dismutation of superoxide into hydrogen peroxide and molecular oxygen, thereby maintaining redox homeostasis and protecting the cytosol and mitochondrial intermembrane space from oxidative damage. Mutations in SOD1 disrupt CCS-mediated maturation and binding, linking the complex to neurodegenerative disease. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
