identifier: ComplexPortal:CPX-4307
label: "PETISCO, tost-1 variant"
definition: >-
  Involved in the processing of substrate RNAs. When bound to tost-1, it binds to splice leader SL1 RNA fragments. SL1 fragments are trans-spliced to the 5-prime ends of a large fraction of all mRNAs. Ife-3 is required for the interaction with capped RNA molecules. In contrast to the PETISCO, pid-1 variant complex (CPX-4306), the complex has a minor role in 21U RNA biogenesis, but is essential for embryogenesis. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
