identifier: ComplexPortal:CPX-1922
label: "Fibrinogen complex"
definition: >-
  Glycoprotein complex that forms fibrin clots as the last step of the coagulation pathway. Fibrinogen heterohexamers (this complex) are activated by minor proteolysis of alpha and beta chains by alpha-thrombin complex (CPX-6222) to form so-called fibrin monomers (CPX-6225). Fibrin clot (CPX-6230) formation is catalysed by factor XIIIa (CPX-6231). Clots are dissolved mainly by the proteolytic action of plasmin (P00747). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
