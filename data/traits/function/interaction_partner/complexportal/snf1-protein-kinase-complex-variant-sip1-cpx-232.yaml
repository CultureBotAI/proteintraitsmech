identifier: ComplexPortal:CPX-232
label: "Snf1 protein kinase complex variant SIP1"
definition: >-
  Energy sensor protein kinase complex, activated by glucose depletion. Regulates cellular energy metabolism by activating energy-producing pathways and inhibiting energy-consuming processes via derepression of glucose-repressed genes. Required for the diauxic shift, in which genes required for mitochondrial oxidative metabolism (normally repressed by glucose) are switched on; growth then resumes at a lower rate. The activity of this complex is modulated by reversible phosphorylation of SNF1 Thr-210 which increases in response to glucose starvation and correlates with large increases in cellular ADP-to-ATP and AMP-to-ATP ratios. Binding of ADP, but not AMP, to the complex protects against dephosphorylation of Thr-210, suggesting that ADP, rather than AMP, may be the critical activating signal. When glucose levels are high, the complex is cytoplasmic. Upon glucose depletion, SIP1-containing SNF1 locates to the vacuolar membrane. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
