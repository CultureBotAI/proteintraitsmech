identifier: ComplexPortal:CPX-6473
label: "bZIP transcription factor complex, ATF3-DDIT3"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. The DNA recognition sequence depends on the composition of the bZIP dimer with the complex either binding to the preferred region of one of the partners or to a novel bZIP cognate site. Formation of this heterodimer prevents the ATF3 homodimer (CPX-6465) from binding to the ATF/cyclicAMP response element consensus site and thus overcomes its transcription repression activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
