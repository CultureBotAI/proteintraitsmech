identifier: ComplexPortal:CPX-5647
label: "CENP-A nucleosome complex"
definition: >-
  Replaces conventional H3 in the nucleosome core of centromeric chromatin at the inner plate of the kinetochore. May serve as an epigenetic mark that propagates centromere identity through replication and cell division. Required for recruitment and assembly of kinetochore proteins, and as a consequence required for progress through mitosis, chromosome segregation and cytokinesis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
