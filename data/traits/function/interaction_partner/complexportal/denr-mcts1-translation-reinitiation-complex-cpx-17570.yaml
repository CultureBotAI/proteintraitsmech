identifier: ComplexPortal:CPX-17570
label: "DENR-MCTS1, translation reinitiation complex"
definition: >-
  Translation regulator complex. Promotes translation reinitiation, a process in which the small ribosomal subunit remains on the mRNA after translating an upstream ORF and resumes scanning to initiate at a downstream ORF, typically the main ORF. The complex enables two key steps: dissociation of deacylated tRNAs from post-termination 40S subunits during recycling, and eIF2-independent recruitment of initiator tRNA to the 40S P site. This mechanism regulates translation of over 150 genes and influences biological processes including cell cycle regulation and DNA damage response. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
