identifier: ComplexPortal:CPX-45
label: "LSM1-7 complex"
definition: >-
  Lsm1-7 is a complex conserved in all eukaryotes and has similar function to the homohexamer Hfq in bacteria. It is an important part of cytoplasmic mRNA degradation. It preferentially binds oligo-adenylated (but not poly-A) mRNAs at their 3' end and promotes decapping at the 5' end thereby directing the mRNA for degradation through the 5' to 3' pathway. Lsm1-7 in yeast can be isolated as part of the Lsm1-7-Pat1 complex. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
