identifier: ComplexPortal:CPX-26708
label: "Clathrin, endocytosis-mediating complex, CLTA variant"
definition: >-
  Building block of the polyhedral coat of coated pits and vesicles, forming a polymeric mechanical scaffold on the vesicle surface. Endocytosis-mediating complex; involved in the intracellular trafficking of a wide range of cargo, clathrin-coated vesicles are major carriers of lipids and proteins between intracellular membrane-bound compartments. Clathrin is also involved in various cellular and biological processes, such as chromosomal segregation during mitosis and organelle biogenesis. While clathrin's heavy chain is well-conserved, light-chain specificity is said to be both tissue and specific-specific, and there is some suggestion that lattices formed from mixtures of clathrin with CLTA (CPX-26707) and CLTB have different assembly properties and are more efficient in membrane deformation compared to lattices with only one type of neuronal light chain. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
