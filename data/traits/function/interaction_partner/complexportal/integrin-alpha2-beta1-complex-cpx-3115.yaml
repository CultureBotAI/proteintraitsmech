identifier: ComplexPortal:CPX-3115
label: "Integrin alpha2-beta1 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for laminin, collagen, collagen C-propeptides, fibronectin and E-cadherin. It recognizes the sequence G-F-P-G-E-R in a wide array of ligands. It is responsible for adhesion of platelets and other cells to collagens, modulation of collagen and collagenase gene expression, force generation and organization of newly synthesized extracellular matrix. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
