identifier: ComplexPortal:CPX-2263
label: "TREX-2 transcription-export complex"
definition: >-
  Couples SAGA (CPX-2644)-dependent gene expression and transcription elongation to mRNA export at the inner side of the nuclear pore complex (NPC). The TREX-2 complex is tethered to the inner side of the NPC and facilitates the repositioning and association of actively transcribing genes with nuclear pores (gene gating). Provides a feedback mechanism for the control of transcription and the preservation of genetic integrity of transcribed DNA regions. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
