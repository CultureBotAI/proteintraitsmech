identifier: ComplexPortal:CPX-2862
label: "Caspase-7 complex"
definition: >-
  A cysteine protease complex of the executioner Caspase group that specifically cleaves substrates with an aspartic acid residue at position P1 and has a preferred cleavage sequence of Asp-Glu-Val-Asp-|-. Once activated by Caspase-8 (CPX-975) or Caspase-9 (CPX-991 or CPX-3762), Caspase-7 leads to apoptosis and inflammation by cleaving sterol regulatory element binding proteins (SREBPs). Proteolytically cleaves poly[ADP-ribose] polymerase 1 (PARP1, P09874) at a '216-Asp-|-Gly-217' bond. Increased Caspase-7 expression correlates with excessive neuronal cell death in neurodegenerative disorders such as Alzheimer's disease and Huntington disease. Single nucleotide polymorphisms (SNPs) in the Caspase-7 gene have been linked with rheumatoid arthritis (K249R mutation) and Insulin-Dependent Diabetes Mellitus (D251E mutation). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
