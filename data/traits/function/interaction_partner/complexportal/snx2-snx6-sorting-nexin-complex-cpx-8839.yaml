identifier: ComplexPortal:CPX-8839
label: "SNX2-SNX6 sorting nexin complex"
definition: >-
  Coat complex which is essential for shaping and maintaining endosomal membranes and regulating intracellular trafficking of cargo proteins by self-assembling into helical arrays on the membrane to stabilize and expand the local membrane curvature underlying endosomal tubule formation. Interacts with the Retromer complex (CPX-7842/CPX-7843), promoting tubulation from phosphatidylinositol 3-phosphate (PI3P)-positive endosomes which facilitates the specific transport of retromer-associated cargoes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
