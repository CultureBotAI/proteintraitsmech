identifier: ComplexPortal:CPX-2626
label: "Outer dynein arm-docking complex"
definition: >-
  Mediates outer dynein arms (ODA) binding onto the doublet microtubule. The cilial/flagellar axoneme consists of 96nm repeat units, each of which contains four identical outer dynein arms and six unique inner dynein arms arranged in two rows along the length of the A-tubule. The dynein motors walk along the neighboring B-tubule to generate interdoublet sliding, which is transferred into bending by interdoublet linkers that resist the sliding. The Calaxin subunit may act to modulate complex activity depending on Ca2+ concentration and to stabilise its interaction with the doublet microtubule. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
