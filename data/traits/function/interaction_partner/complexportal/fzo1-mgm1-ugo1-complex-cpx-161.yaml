label: "FZO1-MGM1-UGO1 complex"
definition: >-
  Spans the outer and inner membranes of mitochondria and mediates fusion of membranes. Required to control mitochondria shape, maintain mitochondrial DNA and plays a role in mitochondrial membrane fusion. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
