identifier: ComplexPortal:CPX-26678
label: "INS-INSR receptor-ligand complex"
definition: >-
  Glucose-regulating complex. Upon binding with high affinity to INS, INSR undergoes major conformational shift from an autoinhibited, inverted-U shape to an active T-shaped conformation. Conformational rearrangement brings the membrane-proximal regions and intracellular kinase domains into close proximity, enabling trans-autophosphorylation and signal initiation. Once activated, INSR triggers downstream signalling pathways, including the PI3K-AKT and MAPK cascades, that regulate glucose uptake, lipid metabolism, protein synthesis, cell growth, and survival, thus playing a critical role in maintaining metabolic and systemic homeostasis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
