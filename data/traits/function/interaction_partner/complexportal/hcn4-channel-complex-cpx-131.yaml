identifier: ComplexPortal:CPX-131
label: "HCN4 channel complex"
definition: >-
  Hyperpolarization-activated cyclic nucleotide-gated (HCN) ion channel that is dually activated by hyperpolarization and binding of cAMP to their cyclic nucleotide binding domain (CNBD) thereby releasing the tonic inhibition exerted by the cytoplasmic CNBD on the channel pore. Exhibits weak selectivity for potassium over sodium ions and contributes to the native pacemaker currents in heart (If) and possibly in neurons (Ih). Together with HCN2 (Q9UL51, CPX-143), HCN4 is the dominant form of HCN expressed in the heart, especially in the sinoatrial node. Contrary to other ion-gated channels, HCN channels do not require an accessory unit but depolarisation activity is affected by optional accessory proteins such as TRIP8b (PEX5L, Q8IYB4). Mutations in the C-terminus containing the C-linker and CNBD domain, which affect the expression or function of the HCN4 channel, are known to cause arrhythmia or bradycardia or lipids such as phosphatidylinositol-4,5-biphosphate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
