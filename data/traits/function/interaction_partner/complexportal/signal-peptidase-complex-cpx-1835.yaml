identifier: ComplexPortal:CPX-1835
label: "Signal peptidase complex"
definition: >-
  Catalyzes the cleavage of N-terminal signal sequences of proteins targeted to the endoplasmic reticulum. The complex cleaves the signal peptides of most secretory and many membrane proteins as soon as the lumenal domain of the translocating polypeptide is large enough to expose its cleavage site to the enzyme, during the translocation of the protein through the translocon pore into the endoplasmic reticulum. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
