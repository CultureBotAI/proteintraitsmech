identifier: ComplexPortal:CPX-2340
label: "Male specific lethal complex"
definition: >-
  Site-specific histone acetylation complex required for dosage compensation, increasing the transcription of genes on the single X chromosome in Drosophila males to equal that of both X chromosomes in females. The complex acetylates histone 4 on lysine 16 which hyperactivates genes on the X chromosome. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
