identifier: ComplexPortal:CPX-2554
label: "SCF E3 ubiquitin ligase complex, FBXL19 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL19 target proteins include the ribosomal gene transcriptional termination factor TTF1 (Q15361). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
