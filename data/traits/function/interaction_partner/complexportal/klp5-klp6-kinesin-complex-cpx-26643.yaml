identifier: ComplexPortal:CPX-26643
label: "Klp5-Klp6 kinesin complex"
definition: >-
  Kinesin motor complex which associates with mcp1 (O94452) to walk along the lattice of interphase microtubules (iMTs). Accumulates at iMT plus ends behind the Tea2 complex (CPX-26644) where it is prevented from accessing the plus end by the presence of Tea2. The complex may then either displace the Tea2 complex from the plus end, triggering MT catastrophe, or initiate MT depolymerisation resulting in the loss of the Tea2 complex and the GTP cap. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
