identifier: ComplexPortal:CPX-6022
label: "KbaYZ tagatose-1,6-bisphosphate aldolase complex"
definition: >-
  Catalyzes the reversible aldol condensation of dihydroxyacetone phosphate (CHEBI:16108) with glyceraldehyde 3-phosphate (CHEBI:17138) to produce tagatose 1,6-bisphosphate (CHEBI:16743) as a step in the catabolism of N-acetyl-galactosamine (CHEBI:28800) and D-galatosamine (CHEBI:28328). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
