identifier: ComplexPortal:CPX-1940
label: "TRAPPI protein complex"
definition: >-
  Tethering complexes which provide the initial recognition event that links a particular vesicle with its target membrane. Participates in ER-Golgi transport and is a guanine nucleotide exchange factor for the Rab protein YPT1 (P01123). BET3 binds the SEC23 (P15303) subunit of the coat protein II (COPII) coat. BET3, BET5, TRS23, and TRS31 create a catalytic site for promoting GDP/GTP exchange in YPT1. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
