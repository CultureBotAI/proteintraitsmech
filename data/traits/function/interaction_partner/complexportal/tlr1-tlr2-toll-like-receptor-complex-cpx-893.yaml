identifier: ComplexPortal:CPX-893
label: "TLR1-TLR2 toll-like receptor complex"
definition: >-
  Type I membrane receptor that plays a crucial role in innate immunity by recognizing conserved patterns in diverse microbial molecules including lipoproteins, lipopeptides, lipopolysaccharide, flagellin, and nucleic acids. TLR1-TLR2 mainly recognizes triacylated lipopeptides deriving from microorganisms. Ligand binding triggers conformational changes and subsequent recruitment of adaptor proteins which execute downstream signal transduction. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
