identifier: ComplexPortal:CPX-1411
label: "Separase-Securin complex"
definition: >-
  Regulates the metaphase-to-anaphase transition during cell cycle progression, playing a role in control of the metaphase-anaphase transition and anaphase onset. Complex formation both activates and inhibits the protease activity of separase/sep-1 which is responsible for cleaving the scc-1 (Q19325) subunit of the cohesin ring that holds sister chromatids together during mitosis. Securin/ify-1 appears to ensure that separase adopts its proper fold required for proteolytic activity and also promotes subcellular localization of separase to the nucleus. Securin is degraded via ubiquitylation by the anaphase-promoting complex enabling separase to become fully active. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
