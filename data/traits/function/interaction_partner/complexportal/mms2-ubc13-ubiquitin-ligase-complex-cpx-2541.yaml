identifier: ComplexPortal:CPX-2541
label: "MMS2-UBC13 ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex. Transfers the thioester-bound donor ubiquitin from Ubc13 onto the Mms2 catalytically inactive E2 variant. Functions in concert with RING E3 ubiquitin ligase RAD5 to catalyze the Lys-63-linked polyubiquitination of monoubiquitinated replication processivity factor PCNA (CPX-544). MMS2 positions the acceptor ubiquitin so that only Lys-63 approaches the active site cysteine of UBC13. This modification activates the recombination-like DNA damage-avoidance mechanism, in which the replicating polymerase avoids synthesis opposite damaged DNA by transient switching of the template, from the damaged DNA strand to the intact newly synthesized strand of the sister chromatid. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
