identifier: ComplexPortal:CPX-2279
label: "TRAPPIII complex"
definition: >-
  Multimeric vesicle tethering complex involved in vesicle transport between endoplasmic reticulum and Golgi compartments and in the regulation of COPI vesicle coating. Acts as guanine exchange factors towards Rab proteins, primarily activates Rab1 (O18332), a master regulator of both the early secretory pathway and autophagy. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
