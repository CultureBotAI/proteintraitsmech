identifier: ComplexPortal:CPX-2919
label: "Protein geranylgeranyltransferase type II complex"
definition: >-
  Catalyzes the transfer of a 20-hydrocarbon geranyl-geranyl moiety from geranyl-geranyl pyrophosphate to a Rab protein having the C-terminal sequence -XXCC, -XCXC and -CCXX , where both cysteines may become modified. Requires both Zn2+ and Mg2+ for maximal activity. Associates with an accessory protein Rep (Rab escort protein). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
