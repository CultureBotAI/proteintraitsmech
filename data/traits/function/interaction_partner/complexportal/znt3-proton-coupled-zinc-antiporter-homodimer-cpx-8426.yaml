identifier: ComplexPortal:CPX-8426
label: "ZNT3 proton-coupled zinc antiporter homodimer"
definition: >-
  Proton-coupled zinc ion antiporter present in synaptic-like microvesicles, regulating vesicular zinc concentrations in presynaptic cells. May play a role in maintaining cellular zinc ion homeostasis in the brain. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
