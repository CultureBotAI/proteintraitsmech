identifier: ComplexPortal:CPX-1360
label: "ced-3-ced-4 caspase complex"
definition: >-
  Cysteine protease complex that plays a major role in programmed cell death (apoptosis). In healthy cells, ced-4 is sequestered and inhibited within the ced-9-ced-4 complex (CPX-399). In response to cell death signals, egl-1 binds to and directly inhibits the activity of ced-9, releasing the cell death activator ced-4 from the ced-9-ced-4 complex (CPX-399). The released ced-4 dimer oligomerizes to form the ced-4 apoptosome and interacts with the ced-3 zymogen to form the ced-3-ced-4 complex. ced-4 interaction with ced-3 induces both the autoproteolytic cleavage of the ced-3 zymogen and caspase activity of the mature ced-3 caspase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
