identifier: ComplexPortal:CPX-868
label: "FET3-FTR1 high affinity iron permease complex"
definition: >-
  High affinity iron uptake complex present in the plasma membrane. The complex forms in the endoplasmic reticulum and then traffics to the plasma membrane. Environmental ferric iron (Fe(III), Fe3+) is mobilized by reduction to ferrous ion (Fe(II), Fe2+) by surface metalloreductases such as FRE1 (P32791), followed by oxidation to Fe(III) by FET3. This FET3-bound Fe(III) is the substrate for permeation facilitated by FTR1. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
