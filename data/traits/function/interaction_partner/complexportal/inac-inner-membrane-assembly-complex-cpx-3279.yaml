identifier: ComplexPortal:CPX-3279
label: "INAC inner membrane assembly complex"
definition: >-
  Inner membrane assembly complex (INAC) promotes the biogenesis of mitochondrial F1Fo-ATP synthase by facilitating assembly of the peripheral stalk. Loss of INAC function causes dissociation of the F1-domain from the membrane-integral Fo-portion. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
