identifier: ComplexPortal:CPX-2536
label: "CEP290-NPHP5 transition zone complex"
definition: >-
  Part of the transition zone, a barrier located at the base of cilia which separates the interior and exterior of cilia. The transition zone is characterized by Y-shaped structures that span from the axoneme to the ciliary membrane and comprises of the MKS (CPX-2531) and NPHP (CPX-2806) modules. CEP290 binding blocks the calmodulin binding of NPHP5 and promotes the recruitment of NPHP5 to the transition zone, enabling ciliary gating, the selective import and export of molecules. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
