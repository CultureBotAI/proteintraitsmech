identifier: ComplexPortal:CPX-4143
label: "Pyrin inflammasome"
definition: >-
  A pro-inflammatory thiol protease complex that is up-regulated in response to inactivating modifications of Rho GTPases by various bacterial species (Clostridium difficile, Vibrio parahemolyticus, Clostridium botulinum, Burkholderia cenocepacia and Bordetella pertussis). Primarily acts in myeloid cells. Activating platform for Caspase-1 (CPX-952) through proximity-induced self-cleavage in an ATP-dependent reaction. Activated Caspase-1 cleaves interleukins 1beta (IL1B, P01584) and IL18 (Q14116) releasing the mature cytokines which are involved in a variety of inflammatory processes and is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves GSDMD (P57764). It belongs to the family of Inflammasomes that includes NLRP1 inflammasome (CPX-4082), NLRP3 inflammasome (CPX-4141), NLRC4 inflammasome (CPX-4144) and AIM2 inflammasome (CPX-4142). MEFV/pyrin protein is associated to the Familial Mediterranean fever. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
