identifier: ComplexPortal:CPX-1829
label: "Checkpoint clamp complex"
definition: >-
  Enables the DNA repair pathways to restore the integrity of the DNA prior to DNA synthesis or separation of the replicated chromosomes. In response to genotoxic damage, the 9-1-1 complex is loaded around DNA by the Rad17-containing clamp loader. The DNA-bound 9-1-1 complex then facilitates ATR-mediated phosphorylation and activation of Chk1, a protein kinase that regulates S-phase progression, G2/M arrest, and replication fork stabilization. Stimulates DNA polymerase beta (POLB) activity by increasing its affinity for the 3'-OH end of the primer-template and stabilizes POLB to those sites where LP-BER proceeds; endonuclease FEN1 cleavage activity on substrates with double, nick, or gap flaps of distinct sequences and lengths; and DNA ligase I (LIG1) on long-patch base excision repair substrates. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
