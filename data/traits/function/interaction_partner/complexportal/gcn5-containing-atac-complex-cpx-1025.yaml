identifier: ComplexPortal:CPX-1025
label: "GCN5-containing ATAC complex"
definition: >-
  A histone acetyl transferase complex that plays a role in regulation of transcription of a specific group of genes by increasing the decompaction of chromatin to facilitate the access of transcription factors to promoter regions. It preferentially acetylates a single residue of Histone H3 (Lys-14) and only weakly acetylates Histone H4. Recruited to the promoters of the IE (immediate early) gene Fos (P01101), Fosl1 (P48755), Egr1 (P08046). The complex also regulates the activity of non-histone targets and orchestrates mitotic progression by regulating Cyclin A degradation through acetylation.Cyclin A/Cdk2 kinase is essential for correct centrosome formation and inhibits Sirt2 (Q8VDQ8) function. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
