label: "Gamma-tubulin ring complex"
definition: >-
  Required for the nucleation of microtubules, the process in which several tubulin molecules interact to form a microtubule seed. Localised on the centromere. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
