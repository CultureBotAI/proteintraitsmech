identifier: ComplexPortal:CPX-374
label: "Zyg-8/Tac-1 complex"
definition: >-
  Microtubule stabilizing complex that functions during the early stages of embryonic development to regulate microtubule assembly throughout the cell cycle. Thought to function in a partially redundant manner with the Zyg-9/Tac-1 complex to regulate microtubule assembly and processes during interphase, mitosis and meiosis in one-cell stage embyos. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
