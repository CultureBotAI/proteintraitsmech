identifier: ComplexPortal:CPX-2779
label: "Nuclear meiotic cohesin complex, SOLO-SUNN variant"
definition: >-
  Required for sister chromatid cohesion during mitotic cell division, which enables cells to attach sister kinetochores to microtubules with opposing polarity (bi-orientation) and subsequently resists the tendency of these microtubules to pull chromatids toward opposite spindle poles. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
