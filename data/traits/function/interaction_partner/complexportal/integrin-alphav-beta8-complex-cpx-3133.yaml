identifier: ComplexPortal:CPX-3133
label: "Integrin alphav-beta8 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Recognizes pro-Tgfb1 (P04202) and pro-Tgfb3 (P17125) and activates these growth factors by releasing them from the latency imposed by their surrounding prodomains. Receptor for fibronectin. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
