label: "BID:BCL-2 complex"
definition: >-
  BH3 domain-containing BID interacts with BCL-2. BCL-2 inhibits BID-induced cytochrome c leakage from mitochondria without ameliorating BID processing or tBID translocation to mitochondria. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
