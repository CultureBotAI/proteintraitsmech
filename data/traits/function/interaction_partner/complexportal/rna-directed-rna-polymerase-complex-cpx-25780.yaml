identifier: ComplexPortal:CPX-25780
label: "RNA-directed RNA polymerase complex"
definition: >-
  RNA-dependent RNA polymerase activity required for the association of siRNAs with the RITS complex (CPX-25777) and for centromeric gene silencing. Synthesizes double-stranded RNA nascent transcripts from repetitive regions of the genome during S phase of the cell cycle. The RNase III–like enzyme Dcr1 (Q09884) then processes these double-stranded RNAs into siRNAs. The helicase hrr1 may increasie the processivity of rdp1 on its RNA templates. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
