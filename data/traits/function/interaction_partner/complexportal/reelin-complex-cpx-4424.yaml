identifier: ComplexPortal:CPX-4424
label: "Reelin complex"
definition: >-
  Extracellular matrix, multifunctional signal glycoprotein complex that is secreted by Cajal-Retzius cells in marginal regions of the cerebral cortex and the hippocampus in the embryonic brain and by GABAergic interneurons in the adult brain. Binds to a variety of membrane receptors, such as the extracellular domains of lipoprotein receptors VLDLR (P98155) and LRP8 (APOER2, Q14114), both in a calcium-dependent manner, to Cadherin-related neuronal receptors (CNRs) or to alpha3beta1 integrin (CPX-1797). Receptor binding induces phosphorylation cascades, usually initiated by the phosphorylation of intracellular receptor adaptor protein DAB1 (O75553) or kinase LIMK1 (P53667). Also modulates phosphorylation of TAU (P10636). Eventually, Reelin induces receptor clustering, particularly of VLDLR, and internalization of a Reelin-receptor complex results in Reelin degradation. Reeling-induced signaling affects the dynamics of the actin and microtubular cytoskeleton as well as membrane trafficking through the regulation of the activity of small GTPases. It affects polarization, differentiation, neuronal migration and layer formation in the cerebral cortex, the hippocampus or the cerebellum of the embryonic brain as well as migration of sympathetic preganglionic neurons in the spinal cord, where it seems to act as a barrier to neuronal migration. Also affects neuron growth, maturation, and synaptic activity in the postnatal and adult brain. Abnormal Reelin expression in the brain can cause a range of neurologically-abnormal symptoms, including tremors, ataxia, lissencephaly, cerebellar hypoplasia and malformation of cellular layers throughout the brain and it is implicated in a number of neuropsychiatric disorders including autism, schizophrenia, bipolar disorder, depression and Alzheimer's disease. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
