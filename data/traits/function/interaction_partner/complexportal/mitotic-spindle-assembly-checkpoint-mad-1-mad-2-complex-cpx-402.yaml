identifier: ComplexPortal:CPX-402
label: "Mitotic spindle assembly checkpoint mad-1-mad-2 complex"
definition: >-
  Acts at the spindle checkpoint, in a surveillance mechanism that mediates a delay in the onset of anaphase, until all chromosomes are properly attached to the mitotic or meiotic spindle. Required for the checkpoint response to absence of spindle tension, localising only to unattached kinetochores but not to attached kinetochores that lack tension, and participate in a bipolar orientation defect signalling pathway. Interaction between mdf-1 and bub-1 recruits the mad-1-mad-2 complex to unattached kinetochores. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
