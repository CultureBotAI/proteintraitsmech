identifier: ComplexPortal:CPX-1956
label: "CCAAT-binding factor complex"
definition: >-
  Transcription factor which binds to the CCAAT box, which occurs in 30% of eukaryotic promoters and appears to be crucial for promoter activity. May also play a role in histone methylation and some acetylation through recruitment of relevant enzymes to active promoters. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
