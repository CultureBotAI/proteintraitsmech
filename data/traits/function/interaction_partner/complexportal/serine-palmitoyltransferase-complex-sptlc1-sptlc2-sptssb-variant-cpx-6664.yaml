identifier: ComplexPortal:CPX-6664
label: "Serine palmitoyltransferase complex, SPTLC1-SPTLC2-SPTSSB variant"
definition: >-
  Catalyzes the first, rate-limiting step of the sphingolipid synthesis pathway, driving the condensation of L-serine and acyl-CoA thioester substrates to form 3-dehydrosphinganinium (CHEBI:58299). The SPTLC1-SPTLC2-SPTSSB complex shows a strong preference for a C16-CoA and C18-CoA substrates or longer, such as stearoyl-CoA. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
