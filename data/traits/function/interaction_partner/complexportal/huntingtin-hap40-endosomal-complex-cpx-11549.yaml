label: "Huntingtin-HAP40 endosomal complex"
definition: >-
  The HTT-HAP40 complex plays several key biological roles, including maintaining protein stability, regulating intracellular transport, and modulating cellular homeostasis. The complex acts as a RAB5A (P20339) effector, regulating early endosome motility by recruiting kinesins-1 and -3 to facilitate anterograde motility along microtubules, thereby affecting intracellular cargo transport and membrane dynamics. Binding of F8A1 to HTT is thought to reduce the aggregation and toxicity of mutant HTT in Huntington’s disease, and to promote its proteasomal degradation via K48-linked ubiquitination. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
