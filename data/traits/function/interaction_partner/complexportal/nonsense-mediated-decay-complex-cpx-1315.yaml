identifier: ComplexPortal:CPX-1315
label: "Nonsense-mediated decay complex"
definition: >-
  Recognizes and elicits the rapid degradation of mRNAs that prematurely terminate translation and also regulates the expression of specific genes by degrading natural mRNAs. Nonsence-mediated decay (NMD) is triggered by the messenger ribonucleoprotein (mRNP) context surrounding the translation termination event. NMD targets can be recognized as targets due to the lack of factors bound downstream from the termination codon. A ribosome terminating translation at a termination codon substantially upstream from the poly(A) tail terminates translation inefficiently. NMD may occur because the PAB1 (P04147) or other factor bound to the poly(A) tail is not in close enough proximity to the terminating ribosome to enable interaction of the PAB1 with SUP35 (P05453), which is bound to the terminating ribosome and thus establishes the correct mRNP context for a normal translation termination event. In the absence of correct translation termination, the nonsense-mediated decay complex interacts with the translation release factor ERF1-ERF3 complex (CPX-435), resulting in an aberrant translation termination event and NMD activation. NMD activation leads to the decapping of the mRNA by the decapping complex, DCP1-DCP2 (CPX-1628), followed by 5-prime to 3-prime degradation of the mRNA by the exoribonuclease XRN1 (P22147). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
