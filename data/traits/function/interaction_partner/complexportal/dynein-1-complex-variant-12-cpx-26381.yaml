identifier: ComplexPortal:CPX-26381
label: "Dynein-1 complex, variant 12"
definition: >-
  Multi-protein molecular motor. Dynein-1 is one of three major classes of dynein, which share a conserved motor domain that couples ATP hydrolysis with conformational changes to power intracellular retrograde movement of cargoes including vesicles and organelles along microtubules within the cytoplasm. Depletion of DYNC1LI1 present in this complex is thought to reduce dynein-1 binding to spindle assembly checkpoint proteins which ensure correct orientation of sister chromatids needed for the proper segregation during anaphase. Mutations in DYNC1H1 have been implicated in neurological disorders including an axonal form of Charcot-Marie-Tooth disease. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
