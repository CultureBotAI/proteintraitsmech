identifier: ComplexPortal:CPX-5125
label: "RuvABC Holliday junction resolvase complex"
definition: >-
  Catalyzes the final resolution of branch migration, the process by which base pairs on homologous DNA strands are consecutively exchanged at a Holliday junction, moving the branch point up or down the DNA sequence. RuvAB (CPX-5124) is an ATP-dependent helicase that unwinds the duplex DNA. RuvC protein binds to the RuvAB complex and cleaves Holliday junctions by introducing symmetrically opposed nicks in strands of like polarity, at or near the junction. To ensure that both strands of the junction are cleaved before the enzyme dissociates, the rate of second-strand cleavage is accelerated by several orders of magnitude compared to the first. The removal of these four-way DNA intermediates during late-stage recombination is crucial for chromosome segregation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
