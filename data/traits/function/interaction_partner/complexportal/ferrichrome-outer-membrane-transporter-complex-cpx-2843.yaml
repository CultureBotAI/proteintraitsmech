identifier: ComplexPortal:CPX-2843
label: "Ferrichrome outer membrane transporter complex"
definition: >-
  A member of the TonB-dependent transporter family (TBDTs) which binds and then transports hydroxamate siderophore ferrichrome (a ferric ion chelator) across the outer membrane. Sideraphore transport requires an outer membrane receptor (fhuA), which is relatively specific for its ligand. The ligand-bound receptor then physically interacts with the TonB protein. TBDTs are energy-dependent gated channels that usually transport large metal complexes which cannot fit through porins, and are too scarce to enter by mass-action-driven transport. Energy-dependent uptake through TBDTs requires interaction with tonB in complex with exbB and exbD in the inner membrane, ExbBD. TonB undergoes rapid energized movement driven by ExbBD which harvests the electrochemical force from the electrochemical proton gradient created by the proton gradient across the inner membrane and convert it into rotational motion. Hence, TonB may pull or twist the N-termini of TBDTs to promote transport of substrates into the periplasm. ATP-binding-cassette (ABC) transporters subsequently move the ferrichrome (Fe3+) through the periplasm and inner membrane. Also transports the antibiotic albomycin, a structural analog of ferrichrome, and acts as a receptor for colicin M, microcin J25 and bacteriophages T1, T5, phi80 and UC-1. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
