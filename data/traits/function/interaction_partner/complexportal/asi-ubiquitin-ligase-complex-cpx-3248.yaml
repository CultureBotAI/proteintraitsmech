identifier: ComplexPortal:CPX-3248
label: "Asi ubiquitin ligase complex"
definition: >-
  The Asi complex resides in the nuclear inner membrane and ubiquitinates proteins to target them for degradation, as part of the endoplasmic reticulum-associated degradation (ERAD) pathway. It targets two types of substrate: misfolded nuclear inner membrane proteins; and proteins that participate in sterol biosynthesis, including ERG11 (lanosterol 14-alpha-demethylase) and NSG1, a regulator of sterol biosynthesis. The Asi complex has an important role in regulation of the response to extracellular amino acids, by mediating degradation of the transcription factor Stp1. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
