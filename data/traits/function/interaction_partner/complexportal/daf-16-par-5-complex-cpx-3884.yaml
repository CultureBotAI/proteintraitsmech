identifier: ComplexPortal:CPX-3884
label: "daf-16-par-5 complex"
definition: >-
  The complex may function in the insulin-like daf-2 (Q968Y9) signaling pathway to negatively regulate the transcriptional activity of the forkhead transcription factor FOXO/daf-16 (O16850). Binding of par-5 (P41932) to daf-16 may sequester daf-16 to the cytoplasm. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
