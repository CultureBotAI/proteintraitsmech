identifier: ComplexPortal:CPX-9128
label: "Interleukin-1 beta ligand-soluble receptor type 1 complex"
definition: >-
  Complex formed on the binding of a pre-bound extracellular interleukin-1 beta (IL1B) and a soluble form of its receptor, interleukin-1R1 (IL1R1) to its coreceptor, interleukin-1 receptor accessory protein (IL1RAP). Recruitment of IL1RAP completes complex assembly and initiates activation of the NFKB signalling pathway. A member of the IL1 family of cytokines, IL1B is closely related to interleukin-1 alpha (IL1A, P01583) carrying out similar biological functions by binding to their shared receptor complex. Although both IL1A and IL1B function via the same IL1R1 to drive an inflammatory response, IL1A is thought to act as an alarmin which regulates local inflammation while IL1B acts as a master regulator of systemic inflammation. IL1B is an inducible cytokine produced mainly by blood myeloid cells, pathogenic lymphocytes and the central nervous system's (CNS) microglia and astroyctes during autoimmune, metabolic and neurodegenerative disorders. IL1 activity is regulated by two forms of the IL1R1: a membrane-bound form (mIL1R1, CPX-527) and a soluble form (sIL1R1, this complex) created through proteolytic release of the ectodomain (ECD) of mIL1R1 by matrix metalloproteases. The ECD in both forms is vital for ligand recognition and binding. Both forms of IL1R1 are biologically active, mediating an inflammatory response through agonistic and antagonistic regulation of cytokine activity. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
