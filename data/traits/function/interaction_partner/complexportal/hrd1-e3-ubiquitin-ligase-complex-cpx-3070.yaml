identifier: ComplexPortal:CPX-3070
label: "HRD1 E3 ubiquitin ligase complex"
definition: >-
  Transmembrane E3 ubiquitin ligase complex involved in the endoplasmic reticulum-associated degradation (ERAD) pathway, directing misfolded proteins to proteasomal degradation. Required for ERAD-L, -M subpathways which degrade proteins with misfolded luminal or transmembrane domains, respectively. The HRD1 core complex acts together with the E2 ubiquitin conjugating enzymes Cue1-Ubc7 (CPX-2948) and UBC1 (P21734) and also the Cdc48p-Npl4p-Ufd1p AAA ATPase complex (CPX-2946). A curated stable macromolecular complex (Complex Portal) with 6 subunits.
