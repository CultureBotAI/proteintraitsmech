identifier: ComplexPortal:CPX-6031
label: "Survival motor neuron complex"
definition: >-
  Molecular chaperone that plays a catalyst role in the assembly of small nuclear ribonucleoproteins (snRNPs), the building blocks of the spliceosome, thus playing an important role in the splicing of cellular pre-mRNAs. With the PRMT5 methylosome complex (CPX-696), mediates the ordered assembly of the Sm complex (CPX-6033). A curated stable macromolecular complex (Complex Portal) with 9 subunits.
