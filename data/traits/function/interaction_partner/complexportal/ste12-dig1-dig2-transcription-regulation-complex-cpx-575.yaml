identifier: ComplexPortal:CPX-575
label: "Ste12/Dig1/Dig2 transcription regulation complex"
definition: >-
  Translational repressor complex which binds to the pheromone response elements (PREs; TGAAACR) in mating gene promoters. Upon pheromone stimulation, Fus3 MAPK (P16892) phosphorylates members of the Ste12 complex leading to dissociation and/or conformational change of the complex and to relief of Ste12 repression. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
