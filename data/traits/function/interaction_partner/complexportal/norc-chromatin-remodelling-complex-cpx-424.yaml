identifier: ComplexPortal:CPX-424
label: "NoRC chromatin remodelling complex"
definition: >-
  ATP-dependent nucleosome remodeling complex that represses ribosomal gene transcription. NoRC is targeted to rDNA by the interaction of its subunit Baz2a with Ttf1 (P50220) bound to the promoter-proximal target site. NoRC also binds to 150-300 nt RNAs that are complementary to the rDNA promoter (transcripts originating from the intergenic spacer that separates rRNA genes). NoRC remodels nucleosomes at the rDNA promoter and recruits histone deacetylases (e.g. Hdac1, Hdac2), histone methyltransferase and DNA methyltransferases (e.g. Dnmt1, Dnmt3b) leading to heterochromatin formation and transcriptional silencing. The interaction of NoRC with the short RNA transcripts is mediated by the TAM domain of Baz2a and it is required for NoRC binding to chromatin and heterochromatin formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
