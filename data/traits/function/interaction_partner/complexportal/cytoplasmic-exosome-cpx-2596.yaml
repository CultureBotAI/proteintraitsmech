identifier: ComplexPortal:CPX-2596
label: "Cytoplasmic exosome"
definition: >-
  3' to 5' exo- and endoribonuclease complex that is involved in RNA maturation and degradation which include the removal of unstable and aberrant transcripts and may also regulate the levels of specific transcripts in response to environmental factors. Restricted to processing linear and circular single-stranded RNAs only. RNAs with complex secondary structures, particularly at the 3' end of the molecule, may have to be unwound or pre-processed by co-factors prior to entering the complex. Although some RNAs may be targeted directly to the catalytic subunits, the majority of substrates enter the barrel-like structure of the exosome through a pore at the centre of the cap and are threaded through the central channel in a 3' to 5' orientation. The ribonuclease activity of the catalytic subunits facilitates the degradation process. Two different exosomes exist in yeast, one found in the nucleus and nucleolus (this complex), the other form is lacking the RRP6 subunit and is found in the cytosol (CPX-603). The nuclear/nucleolar RNA exosome is involved in a) proper maturation of most RNA species such as intron-removal from pre-mRNAs and tRNA precursors and rRNA, snRNA, snoRNA, lncRNA and enhancer RNA processing, especially the removal of their 3-prime ends, b) the elimination of RNA processing by-products and non-coding, cryptic transcripts, such as upstream antisense RNA species (uaRNA), enhancer RNAs (eRNAs), heterochromatin-forming repetitive elements (ribosomal DNA repeats and centromeres) and long non-coding RNAs, c) the elimination of mRNAs with processing defects and mRNAs that fail to undergo proper splicing or 3′ end formation and d) gene expression either by mRNA processing or coordination of intron retention leading to regulation of decay of otherwise intact mRNAs. Nuclear exosome activity therefore limits or excludes export of target RNAs to the cytoplasm. Possibly also involved in the degradation of mRNAs with defects in their co-transcriptional packaging into ribonucleoprotein particles (mRNPs), retention of aberrant transcripts on the chromatin and transcription termination or DNA damage repair processes. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
