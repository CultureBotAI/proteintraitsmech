identifier: ComplexPortal:CPX-2161
label: "SUMO activating enzyme complex, SAE1-UBA2"
definition: >-
  An E1 ligase for SUMO1 (P63165-pro_0000035939), SUMO2 (P61956-pro_0000035949), SUMO3 (P55854-pro_0000035957), and probably SUMO4 (Q6eeV6-pro_0000042710). It mediates ATP-dependent activation of SUMO proteins followed by formation of a thioester bond between a SUMO protein and a conserved active site cysteine residue on UBA2/SAE2. SUMOylation of UBA2 on three Lys residues on the bipartite nuclear localization sequence (NLS) and two Lys residues outside of but adjacent to the NLS catalyzed by Ubc9 is required for nuclear retention on the complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
