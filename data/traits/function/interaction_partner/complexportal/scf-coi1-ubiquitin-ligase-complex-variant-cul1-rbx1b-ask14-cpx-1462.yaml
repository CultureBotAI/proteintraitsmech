identifier: ComplexPortal:CPX-1462
label: "SCF(COI1) ubiquitin ligase complex, variant CUL1-RBX1B-ASK14"
definition: >-
  SCF(COI1) is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, which catalyse the last step of ubiquitination cascade, promoting transfer of ubiquitin from an E2 enzyme to form a covalent bond with a substrate lysine. It perceives jasmonate signal and degrades Jasmonate ZIM Domain (JAZ) proteins, which repress the transcription factor MYC2 (Q39204) that binds to cis-acting elements of jasmonate response genes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
