identifier: ComplexPortal:CPX-6037
label: "MAVS-TRAF3 E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin-protein ligase complexes that is activated upon RNA virus infection, it ubiquitinates PYCARD (ASC, Q9ULZ3) at Lys174, a critical step for speck formation and inflammasome activation. MAVS-TRAF3 complex initiates type I IFN signalling and leads to activation of TBK1-IKKepsilon kinase (CPX-6038) which in turn phosphorylates and activates transcription factors IRF3 (Q14653) and IRF7 (Q92985). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
