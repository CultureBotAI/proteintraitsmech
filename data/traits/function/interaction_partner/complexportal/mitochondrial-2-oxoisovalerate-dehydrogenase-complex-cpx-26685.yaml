label: "Mitochondrial 2-oxoisovalerate dehydrogenase complex"
definition: >-
  Catalyzes the conversion of alpha-keto acids derived from the branched-chain amino acids leucine, isoleucine and valine. to acyl-CoA and CO2, a step in the catabolism of branched chain amino acids. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
