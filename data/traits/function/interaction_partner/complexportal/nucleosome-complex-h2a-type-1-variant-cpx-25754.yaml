identifier: ComplexPortal:CPX-25754
label: "Nucleosome complex, H2A type 1 variant"
definition: >-
  Nucleosome core particle (NCP), fundamental structural unit of chromatin. Nucleosomes wrap and compact DNA into chromatin, limiting DNA accessibility to the cellular machineries which require DNA as a template. Histones thereby play a central role in transcription regulation, DNA repair, DNA replication and chromosomal stability. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
