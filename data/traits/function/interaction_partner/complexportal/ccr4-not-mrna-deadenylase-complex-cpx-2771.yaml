identifier: ComplexPortal:CPX-2771
label: "CCR4-NOT mRNA deadenylase complex"
definition: >-
  Major cellular mRNA deadenylase complex, removing polyA tails that protect transcripts from degradation and promotes translation in the cytoplasm. The complex is linked to various cellular processes including bulk mRNA degradation, miRNA-mediated repression, translational repression during translational initiation, and general transcription regulation, potentially by promoting the resumption of elongation of arrested RNAPII when it encounters transcriptional blocks in vivo. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
