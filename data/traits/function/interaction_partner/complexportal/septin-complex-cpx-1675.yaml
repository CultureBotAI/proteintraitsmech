identifier: ComplexPortal:CPX-1675
label: "Septin complex"
definition: >-
  A heterooligomeric complex, formed from GTP-binding proteins, that polymerizes end-to-end into filaments at the bud neck. Play a role in cytokinesis, assembling early in the cell cycle as a patch at the incipient bud site and forming a ring approximate 15 minutes before bud emergence, which transforms into an hour-glass shaped collar of cortical filaments that spans both sides of the mother-bud neck. This collar persists until just before cytokinesis, when it splits into two rings that occupy opposite sides of the neck. The septins at the bud neck serve as a structural scaffold that recruits different components involved in diverse processes at specific stages during the cell cycle. Septins are also involved in cell morphogenesis, bud site selection, chitin deposition, cell cycle regulation, cell compartmentalization and spore wall formation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
