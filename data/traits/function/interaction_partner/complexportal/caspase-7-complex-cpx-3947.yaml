identifier: ComplexPortal:CPX-3947
label: "Caspase-7 complex"
definition: >-
  A cysteine protease complex of the executioner Caspase group that specifically cleaves substrates with an aspartic acid residue at position P1 and has a preferred cleavage sequence of Asp-Glu-Val-Asp-|-. Once activated by Caspase-8 (CPX-3663) or Caspase-9 (CPX-3801 or CPX-3824), Caspase-7 leads to apoptosis and inflammation by cleaving sterol regulatory element binding proteins (SREBPs). Proteolytically cleaves poly[ADP-ribose] polymerase 1 (Parp1, P11103) at a '214-Asp-|-Gly-215' bond. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
