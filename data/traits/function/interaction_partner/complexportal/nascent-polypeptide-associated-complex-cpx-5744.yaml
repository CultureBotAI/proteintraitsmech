identifier: ComplexPortal:CPX-5744
label: "Nascent polypeptide-associated complex"
definition: >-
  Protein chaperone that reversibly binds to cytoplasmic ribosomes. Prevents inappropriate targeting of non-secretory polypeptides to the endoplasmic reticulum (ER) by binding to nascent polypeptide chains as they emerge from the ribosome and blocking their interaction with the signal recognition particle (SRP), which normally targets nascent secretory peptides to the ER. May play a role in modulating the unfolded protein response in response to heat stress. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
