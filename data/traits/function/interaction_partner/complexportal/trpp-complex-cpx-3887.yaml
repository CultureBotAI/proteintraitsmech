identifier: ComplexPortal:CPX-3887
label: "TRPP complex"
definition: >-
  Probable sensory receptor that localizes to sensory cilia of male-specific sensory neurons and is involved in several aspects of male mating behaviour. Is thus required for male reproduction. The localisation of the complex is regulated by the inositol polyphosphate 5-phosphatase cil-1 (P34370). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
