identifier: ComplexPortal:CPX-415
label: "DNA replication factor C complex, RFC1 variant"
definition: >-
  DNA-dependent ATPase that functions with PCNA (CPX-538) to confer processivity on DNA polymerase delta. RFC uses the energy of ATP binding and hydrolysis to recruit PCNA to DNA, break one clamp interface, and topologically link the clamp to primed template DNA during the duplication of chromosomal DNA prior to cell division. After loading PCNA, RFC then dissociates, allowing PCNA to function with Pol-delta. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
