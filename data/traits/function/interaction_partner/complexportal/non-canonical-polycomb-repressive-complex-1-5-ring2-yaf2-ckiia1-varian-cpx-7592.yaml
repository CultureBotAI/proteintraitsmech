identifier: ComplexPortal:CPX-7592
label: "Non-canonical polycomb repressive complex 1.5, RING2-YAF2-CKIIA1 variant"
definition: >-
  Acts as a transcriptional activator. Lacks ubiquitin ligase activity due to the inhibitory phosphorylation of RNF2 at serine 168 by casein kinase 2. The neuronal transcription factor AUTS2, recruits the EP300 transcriptional co-activator to promote gene activation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
