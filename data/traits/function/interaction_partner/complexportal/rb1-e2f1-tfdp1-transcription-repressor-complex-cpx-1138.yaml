identifier: ComplexPortal:CPX-1138
label: "RB1-E2F1-TFDP1 transcription repressor complex"
definition: >-
  Transcriptional repressor complex involved in the regulation of intestinal cell division during postembryonic development. lin-35 negatively regulates the G1-S transition by binding to the E2F1-DP1 transcription factor complex (CPX-965) and blocking the transactivation domain of efl-1. lin-35 dissociates from the complex following hyperphosphorylation by cyclin-dependent kinases. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
