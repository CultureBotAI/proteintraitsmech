identifier: ComplexPortal:CPX-891
label: "DSIF transcription elongation factor complex"
definition: >-
  An essential RNA polymerase II elongation factor which functions in the control of RNAP II processivity. Mediates both activation and inhibition of transcription elongation, and plays a role in pre-mRNA processing. Required for promoter-proximal pausing when elongating Pol II pauses near the promoter, about 20-60 base pairs downstream of the transcription start site, a key event in post-initiation regulation of transcription. SUPT5H docks DSIF to Pol II near the RNA exit channel where it facilitates capping of the nascent RNA . The negative elongation factor (NELF, CPX-6267) complex then recognizes the Pol II-SUPT5H interface and associates with the elongation complex as it transcribes through the promoter-proximal region. Phosphorylation of SUPT5H by P-TEFb (CPX-222/CPX-321/CPX-322) appears to trigger dissociation of NELF from Pol II, enabling Pol II reactivation and resumption of elongation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
