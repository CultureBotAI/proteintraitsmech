identifier: ComplexPortal:CPX-990
label: "NuA4 histone acetyltransferase complex"
definition: >-
  Histone acetyl transferase (HAT) complex involved in transcriptional activation of selected genes, mostly involved in apoptosis, cell-cycle regulation and hypoxia. Examples of regulated genes include Tp53 (P02340)-dependent transcription genes, those containing promoters regulated by Myc (P01108) and highly transcribed genes such as those encoding ribosomal proteins. The major acetylation targets are lysines-5, 8, and 12 on nucleosomal H4, K5 and K15 on H2A, histone variants H2AZ and H2AX, as well as non-histone substrates such as Tp53. The NuA4 complex can also acetylate H3 in free histones. A core complex formed by the subunits Kat5, Epc1, and Ing3 is sufficient to enable strong HAT activity on nucleosomal templates (Piccolo NuA4 CPX-747). The NuA4 complex is rapidly recruited at double-strand breaks (DSBs) during double strand break repair to acetylate H4, H2A, and H2AX, thereby facilitating chromatin opening. A curated stable macromolecular complex (Complex Portal) with 19 subunits.
