identifier: ComplexPortal:CPX-12100
label: "METTL15-RBFA mitochondrial metabolism regulatory complex"
definition: >-
  Mitochondrial assembly factor complex involved in mitochondrial small subunit (SSU) assembly and mitochondrial translation. METTL15 functions as the principal N4-methylcytidine (m4C) methyltransferase in human mitochondria, responsible for modifying C839 in 12S rRNA, RBFA is believed to act as a scaffolding protein, recruited to helices 44 and 45 of the mitochondrial SSU 12S rRNA. The m4C839 modification is thought to stabilize 12S rRNA folding, promoting proper subunit maturation. Loss of METTL15 impairs mitochondrial translation by disrupting SSU assembly, particularly the incorporation of late-stage components. Defects in mitochondrial ribosome assembly are associated with a broad range of mitochondrial diseases and developmental disorders. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
