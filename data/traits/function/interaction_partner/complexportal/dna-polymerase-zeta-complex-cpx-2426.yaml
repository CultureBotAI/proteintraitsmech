label: "DNA polymerase zeta complex"
definition: >-
  Error prone DNA polymerase active in translesion DNA synthesis in response to stalled DNA replication forks, for example at sites of covalent DNA lesions such as UV radiation-induced photo-products. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
