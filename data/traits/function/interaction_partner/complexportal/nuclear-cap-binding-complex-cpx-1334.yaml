identifier: ComplexPortal:CPX-1334
label: "Nuclear cap-binding complex"
definition: >-
  Binds co-transcriptionally to the 5-prime, m7GpppG-cap (m7G-cap) structures of all RNA polymerase II transcripts (mRNAs and pre-miRNAs). Required for processes such as pre-mRNA splicing, export and degradation of nuclear mRNAs, primary miRNA processing and miRNA-mediated RNA interference. In the cytosol, importin-beta probably interacts with CBC-bound importin-alpha and promotes the dissociation of the RNA from CBC. Importin-complex-bound CBC gets reimported into the nucleus for reuse. Modulates ABA signaling by altering transcript of early ABA signaling elements and function as negative regulators in guard cell ABA signaling. Mutations in either subunit result in slow growth, serrated leaf margins, ABA hypersensitivity and greater resistance to draught. Mutation of ABH1 results in early flowering by affecting the removal of the first intron of FLC (Q9S7Q7) which is a key flowering suppressor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
