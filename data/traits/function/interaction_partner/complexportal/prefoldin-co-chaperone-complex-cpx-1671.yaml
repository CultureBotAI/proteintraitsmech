identifier: ComplexPortal:CPX-1671
label: "Prefoldin co-chaperone complex"
definition: >-
  Hexameric molecular chaperone complex which interacts with nascent polypeptide chains, binds specifically to cytosolic chaperonin and transfers target proteins to it. Specifically promotes the formation of properly folded and functional alpha- and gamma-tubulin. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
