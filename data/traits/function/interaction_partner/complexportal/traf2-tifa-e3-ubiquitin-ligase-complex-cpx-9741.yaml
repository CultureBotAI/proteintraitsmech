identifier: ComplexPortal:CPX-9741
label: "TRAF2-TIFA E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase complex which polyubiquitinaties TRAF6, a required step in NF-kappa-B (P19838) activation. DNA damage-inducesd TIFA phosphorylation at Thr-9 resulting in its enrichment on damaged chromatin. Complex formation then stimulattes ubiquitination of IKBKG (Q9Y6K9), a subunit of the IkappaB kinase complex (CPX-3269). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
