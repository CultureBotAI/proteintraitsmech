identifier: ComplexPortal:CPX-26512
label: "TORC1 serine/threonine protein kinase complex"
definition: >-
  Serine/threonine-protein kinase signalling complex which senses diverse inputs, such as nitrogen- and carbon-containing nutrients, hormonal stimulation, various stresses, availability of energy within the cell and oxygen and mediates temporal control of cell growth via regulation of translation, transcription, ribosome biogenesis, nutrient transport, and autophagy. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
