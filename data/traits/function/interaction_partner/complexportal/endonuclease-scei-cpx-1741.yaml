identifier: ComplexPortal:CPX-1741
label: "Endonuclease SceI"
definition: >-
  Mitochondrial endonuclease which cleaves mitochondrial DNA during the process of mitochondrial fusion, when haploid cells are mated to form zygotic cells, to induce genetic recombination among the heterogeneous mitochondrial DNAs inherited from the parents. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
