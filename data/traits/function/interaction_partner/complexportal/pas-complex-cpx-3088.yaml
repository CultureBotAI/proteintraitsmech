identifier: ComplexPortal:CPX-3088
label: "PAS complex"
definition: >-
  Role in the synthesis and turnover of the low abundance, signaling lipid phosphatidylinositol 3,5-bisphosphate (PtdIns(3,5)P2; CHEBI:16851). PtIns(3,2)P2 has been implicated in processes such as vacuole morphology, homeostasis, membrane scission, acidification and transport vesicle formation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
