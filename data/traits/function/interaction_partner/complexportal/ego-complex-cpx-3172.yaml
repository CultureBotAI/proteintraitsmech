identifier: ComplexPortal:CPX-3172
label: "EGO complex"
definition: >-
  The EGO complex is localized to the vacuolar membranes and activates vacuolar membrane associated TORC1 in the presence of preferred nitrogen sources. It thereby has an important role in regulating cell growth and autophagy by relaying amino acid signals. Specifically, its subunit GTR1 becomes activated to a GTP-bound form in a downstream response to nutrient signals, causing EGO to interact with and activate TORC1. EGO is required for recovery from rapamycin-induced growth arrest and positively regulates microautophagy. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
