identifier: ComplexPortal:CPX-7763
label: "SCF E3 ubiquitin ligase complex, FBXW7 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXW7 target proteins include WDR5 (P61964), a member of numerous histone-lysine N-methyltransferase complexes, thus promoting mitotic cell death and preventing mitotic slippage, escape from the spindle assembly checkpoint-induced mitotic arrest. The complex ubiquitinates the MYC (P01106) transcription factor when it is phosphorylated at Thr-73 and Ser-77. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
