identifier: ComplexPortal:CPX-1288
label: "MEI5-SAE3 recombination assembly factor complex"
definition: >-
  Regulates homologous recombination repair by binding to, and stimulating, the homologous DNA 3-stranded exchange activity of meiosis-specific DMC1 (P25453). Enhances DMC1 loading onto RPA-coated single-stranded DNA, at a RAD51 foci and that it enhances DMC1-mediated D-loop formation. The coordinated actions of RAD51 and DMC1 are considered to play a critical role in homology searches and strand exchange during recombination. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
