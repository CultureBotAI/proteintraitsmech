identifier: ComplexPortal:CPX-1928
label: "SSB single-stranded DNA binding complex"
definition: >-
  Forms homotetramers on single-stranded DNA at the replication fork, removing DNA secondary structure and protecting against nucleases, and is displaced by the DNA Polymerase III complex (CPX-1925) during lagging strand synthesis. It interacts with the ssDNA cooperatively via either 2 or all 4 subunits. dnaG primase binds the SSB tetramer and synthesises RNA primers on ssDNA until it is displaced by the chi subunit of the clamp loader complex (CPX-1926). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
