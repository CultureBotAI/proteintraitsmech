identifier: ComplexPortal:CPX-8834
label: "Interleukin-4 receptor-ligand type-1 complex"
definition: >-
  Transmembrane complex formed on the binding of an extracellular interleukin-4 (IL4) to either a type-1 IL4 receptor composed of IL4R and IL2RG or a type-2 IL4 receptor, composed of IL4R and IL13RA1 (CPX-624). Ligand binding results in the assembly of the complete complex, which induces signaling mediated principally through the IL4R chain and involves activation of the transcription factor, signal transducer and activator of transcription-6 (STAT6). IL4 binding to the type-1 IL4 receptor induces the phosphorylation of the Janus kinase, JAK1 associated with the IL4R chain and JAK3 associated with the IL2RG. JAK1/JAK3 subsequently phosphorylate IL4R itself, as well as STAT6, resulting in STAT6 translocation to the nucleus and transcription of IL4-responsive genes. IL4 mediated signalling through the IL4R generates immunity to helminthic infections and enables the inactivation of toxins. Expressed in neurons, IL4R plays a key role in modulating neuronal death through STAT6 activation during ischemic attacks. Stimulating microglial phagocytosis, IL4 enables efficient clearance of apoptotic neurons allowing for repair. Systemic administration of IL4 has been shown to reduce ischemic lesions and improves neurologic function after a stroke. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
