identifier: ComplexPortal:CPX-7402
label: "Vascular endothelial growth factor B complex"
definition: >-
  Growth factor which binds to VEGFR1 (P17948), promoting endothelial cell differentiation into vascular tubes through nitric oxide release, and NRP1 (O14786) which is involved in the development of the cardiovascular system, in angiogenesis, in the formation of certain neuronal circuits and in organogenesis outside the nervous system. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
