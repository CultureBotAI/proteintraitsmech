identifier: ComplexPortal:CPX-4862
label: "Alkyl hydroperoxide reductase complex"
definition: >-
  Serves as a primary hydroperoxide scavenger that reduces organic hydroperoxides and and peroxinitrite to water or alcohols, thereby preventing protein oxidation, lipid peroxidation and DNA damage. A conserved redox-active cysteine residue (Cys-47), the peroxidatic cysteine (C(P)), in the active site of one ahpC molecule is responsible for a nucleophilic attack on the peroxide substrate. The peroxide oxidizes the C(P)-SH to cysteine sulfenic acid (C(P)-SOH), which then reacts with another cysteine residue (Cys-166), the resolving cysteine (C(R)) located at the C-terminus of a second subunit of ahpC to form a disulfide bridge. Oxidized ahpC is regenerated by electron donation via the disulphide center (-CxxC-) in the N-terminal domain of ahpF, resulting in reduction of the ahpC cysteines to their thiol form using either NADH or NADPH as an electron donor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
