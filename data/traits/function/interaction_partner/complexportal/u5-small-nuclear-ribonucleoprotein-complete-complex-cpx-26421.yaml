identifier: ComplexPortal:CPX-26421
label: "U5 small nuclear ribonucleoprotein complete complex"
definition: >-
  Small nuclear RNA (snRNA) containing complex, involved in mRNA splicing. This complex and the U6 snRNP, CPX-26415 are the two components of the catalytic core part of the pre-B spliceosomal complex. The spliceosome executes pre-mRNA splicing through a highly dynamic series of compositional and conformational transitions encompassing assembly, activation, catalysis and disassembly of a highly dynamic structure, involving the binding and release of the small nuclear RNAs (snRNA) and protein factors which remove intronic sequence from pre-mRNA. Spliceosome stages are characterized as E, A, B and remodelling of the pre-catalytic spliceosome (B complex) into the activated spliceosome (Bact complex) and subsequently, the catalytically activated spliceosome (B* complex) to carry out two RNA-catalysed transesterification reactions that lead to intron removal and splicing together of the flanking exon sequences. A curated stable macromolecular complex (Complex Portal) with 15 subunits.
