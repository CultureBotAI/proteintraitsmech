identifier: ComplexPortal:CPX-26377
label: "Box C/D snoRNA-Guided RNP methyltransferase complex, FBLL1 variant"
definition: >-
  Small nucleolar RNA (snoRNA) dependent 2'-O-methyltransferase complex. Upon forming a snoRNP complex with a box C/D snoRNA and other core proteins, FBLL1 transfers a methyl group to the 2'-hydroxyl of the ribose moiety in substrate RNAs. Complex plays a role in pre-rRNA cleavage and in 2'-O-methylation of nucleotides at specific positions in rRNAs, snoRNAs, and other RNAs during maturation. Loss of FBLL1 in neurons is detrimental to 2'-O-methylation of GAP43 (P17677) mRNA and results in repressed neuronal differentiation, possibly contributing to human diseases linked to nucleotide methylation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
