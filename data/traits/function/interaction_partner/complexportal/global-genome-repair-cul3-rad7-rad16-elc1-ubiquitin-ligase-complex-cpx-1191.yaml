identifier: ComplexPortal:CPX-1191
label: "Global genome repair CUL3-RAD7-RAD16-ELC1 ubiquitin ligase complex"
definition: >-
  A ubiquitin ligase complex required for optimal nucleotide excision repair following UV-induced DNA damage. Ubiquinates the DNA repair protein RAD4 (P14736), targeting it for degradation by the 26S proteasome following UV radiation. de novo protein synthesis subsequently restores RAD4 to pre-irradiation levels. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
