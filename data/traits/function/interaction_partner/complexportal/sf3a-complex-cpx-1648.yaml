identifier: ComplexPortal:CPX-1648
label: "SF3A complex"
definition: >-
  Essential role in pre-mRNA splicing. A core component of the mature U2 snRNP (small nuclear ribonucleoprotein particle), a dynamic 17S particle which assembles as part of the spliceosome. Displacement of SF3A from the spliceosome initiates the first step of the splicing reaction. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
