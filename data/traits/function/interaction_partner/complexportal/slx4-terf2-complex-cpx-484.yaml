identifier: ComplexPortal:CPX-484
label: "SLX4-TERF2 complex"
definition: >-
  Role in maintaining an average equilibrium telomere length thus preventing telomere overlengthening. TRF2 binds to telomeric DNA and functions as a measuring device to assess telomere length. Longer telomeres are bound by larger amount of TRF2, which subsequently recruits more SLX4 to telomeres. The double-layered SLX4-TRF2 platform then assembles a nuclease toolkit at telomeres for homologous-recombination-mediated telomere recombination, including telomere sister chromatid exchange and resolution of the t-loop formed by the 3-prime single-stranded overhang, base-pairing with the C-strand of the duplex region of telomeric DNAs. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
