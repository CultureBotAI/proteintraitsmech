identifier: ComplexPortal:CPX-1654
label: "m-AAA protease complex"
definition: >-
  Mitochondrial ATP-dependent protease, essential for the maintenance of cellular respiratory competence. Embedded in the inner membrane with the proteolytic domains facing the matrix. Membrane protein degradation requires the proteolytic activity of both subunits of the protease. Controls COX1 and COB pre-mRNA stability and splicing and is required for assembly of cytochrome c oxidase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
