identifier: ComplexPortal:CPX-572
label: "cAMP-dependent protein kinase complex variant 4"
definition: >-
  Inactive form of the cAMP-dependent protein kinase which assembles when cAMP concentrations are low. Exists as a tetramer composed of two catalytic subunits and two regulatory subunits. When cAMP concentrations are high, the nucleotide binds to the inhibitory BCY1 subunits, causing dissociation from and activation of the catalytic subunits. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
