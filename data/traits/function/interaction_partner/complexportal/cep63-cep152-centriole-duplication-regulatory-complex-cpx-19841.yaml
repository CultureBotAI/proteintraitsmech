identifier: ComplexPortal:CPX-19841
label: "CEP63-CEP152, centriole duplication regulatory complex"
definition: >-
  The CEP63-CEP152 complex forms a ring-like structure around parental centrioles, a configuration that ensures normal neurodevelopment. The complex plays a critical role in the positive regulating centriole duplication, facilitating the recruitment of key centriole biogenesis proteins to the small pericentriolar material (PCM), helping to ensure the efficient loading of SAS6 (Q6UVJ0), a core structural component of the nascent procentriole. This is considered essential for initiating the formation of new centrioles. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
