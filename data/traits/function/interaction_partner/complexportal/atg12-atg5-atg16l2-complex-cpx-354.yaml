identifier: ComplexPortal:CPX-354
label: "ATG12-ATG5-ATG16L2 complex"
definition: >-
  No known role is ascribed to this complex. Unlike the closely related ATG12-ATG5-ATG16L1 complex (CPX-200), it does not appear to be required for autophagy. Assumed to act as an E3-like enzyme to recruit the E2-like protein ATG3, conjugated to LC3-I, to the endoplasmic reticulum-derived omegasome. ATG3 binds to and is activated by ATG12, facilitating conjugation of the LC3 to phosphatidylethanolamine, thus converting LC3-I to LC3-II. Therefore, the site of ATG12-ATG5-ATG16L2 complex recruitment determines the site of LC3-II formation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
