identifier: ComplexPortal:CPX-479
label: "Bloc-1 complex"
definition: >-
  Implicated in the formation and/or maturation of tubular vesicular intermediates between endosomes and lysosome-related organelles. Possible role in intracellular endosomal trafficking modulating SNARE localisation and activity. Involved in gut granule biogenesis. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
