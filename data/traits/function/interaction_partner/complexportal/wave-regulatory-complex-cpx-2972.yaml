identifier: ComplexPortal:CPX-2972
label: "WAVE regulatory complex"
definition: >-
  Coordinates Arp2/3-mediated actin polymerization by controlling the activity of the WAVE/SCAR protein. In response to upstream signals, the WAVE Regulatory complex is both recruited to the membrane and concomitantly triggered to release its inhibition of WAVE. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
