identifier: ComplexPortal:CPX-233
label: "Neuronal nicotinic acetylcholine receptor complex, alpha7"
definition: >-
  A ligand-gated ion channel receptor complex that is sensitive to endogenous achetylcholine and exogenous agonists such as nicotine and alpha-bungarotoxin. Ligand binding causes a conformational change of the receptor resulting in the formation of a pore that is permeable to Na+ and/or Ca2+ (inward) and K+ (outward) thereby depolarising the neuron. Mediates fast, short-lived, mainly presynaptic, transmission of neurotransmitters. Found in the Central Nervous System (fore- and midbrain, cerebellum, hippocampus, hypothalamus) and autonomic ganglia (e.g. ciliary ganglia) and retina. Also located non-synaptically. Suppresses inflammatory responses and is up-regulated by pro-inflammatory cytokines, such as TNF-alpha. Promotes endothelial proliferation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
