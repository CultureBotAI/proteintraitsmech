identifier: ComplexPortal:CPX-7975
label: "SCF E3 ubiquitin ligase complex, FBXO34 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO34 target proteins include the cyclin CCNB1 (P14635), a component of the maturation promoting factor (CPX-2007), thus regulating both the G2/M transition and anaphase entry in meiotic oocytes. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
