identifier: ComplexPortal:CPX-4325
label: "Glutathione ABC transporter complex"
definition: >-
  High-affinity glutathione transporter. Member of the ATP-binding cassette (ABC) transporter family, prokaryote-type (PK-type) subfamily. Glutathione is required for reducing oxygen species and peroxides and acts against xenobiotics and drugs by the formation and excretion of glutathione S conjugates. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
