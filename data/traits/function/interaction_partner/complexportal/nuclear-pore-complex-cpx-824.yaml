identifier: ComplexPortal:CPX-824
label: "Nuclear pore complex"
definition: >-
  The nuclear pore complex (NPC) is a large assembly embedded in the nuclear envelope of eukaryotic cells. The yeast nucleus contains approximately 200 NPCs per cell and as the sole site of macromolecular traffic between the nucleus and cytoplasm, the complex provides an important control point for the regulation of gene expression. Inert polymers and small proteins less than 9 nm in diameter or less than 30-40 kDa in mass can freely diffuse through the NPC, larger particles traverse the NPC by a facilitated mechanism with the structure able to expand radially to accommodate the passage of larger particles. The nuclear basket subunits play an active role in transcription, transcriptional memory and chromatin organization by recruiting members of the transcription machinery to the nuclear side of the NCP. A curated stable macromolecular complex (Complex Portal) with 34 subunits.
