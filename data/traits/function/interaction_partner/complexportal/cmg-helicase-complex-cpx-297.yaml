identifier: ComplexPortal:CPX-297
label: "CMG helicase complex"
definition: >-
  DNA helicase that unwinds or rearranges duplex DNA during replication, recombination and repair. Surrounds the leading strand during DNA replication and recruits the DNA polymerase epsilon complex (CPX-2110) for leading-strand synthesis. CDC45 adds the GINS complex (CPX-1641) onto each MCM2-7 complex (CPX-2944) to form two active CMG helicases that surround each strand of parental DNA. CMG then translocates along single-strand DNA in the 3-prime to 5-prime direction for bidirectional replication. The complex unwinds duplex regions up to 500 bp. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
