identifier: ComplexPortal:CPX-2239
label: "SCF E3 ubiquitin ligase complex, FBXL5 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXL5 target proteins include the iron regulatory protein IRP2 (P48200). The stability of FBXL5 increases under iron- and oxygen-replete conditions and decreases with iron depletion. This differential stability is mediated by an iron- and oxygen-binding hemerythrin domain (IPR012312) that acts as a ligand-dependent regulatory potentially linking iron sensing via the FBXL5 hemerythrin domain, IRP2 regulation, and cellular responses to maintain mammalian iron homeostasis. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
