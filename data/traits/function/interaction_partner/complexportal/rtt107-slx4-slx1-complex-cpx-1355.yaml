identifier: ComplexPortal:CPX-1355
label: "RTT107-SLX4-SLX1 complex"
definition: >-
  Required for checkpoint dampening by reducing RAD53 checkpoint activation. Complex formation enables MEC1 (P38111) and CDK-mediated phosphorylation of SLX4 and RTT107 under replication stress and DNA damage situations. Upon phosphorylation of SLX4 on Ser-486, the complex becomes associated with DPB11 (P47027) and diminishes DPB11 interaction with RAD9, thus reducing RAD53 (P22216) phosphorylation and activation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
