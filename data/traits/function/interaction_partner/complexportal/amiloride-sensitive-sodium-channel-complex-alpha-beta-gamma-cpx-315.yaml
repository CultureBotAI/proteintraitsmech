identifier: ComplexPortal:CPX-315
label: "Amiloride-sensitive sodium channel complex, alpha-beta-gamma"
definition: >-
  Inward cation channel with high sodium selectivity but also permeable to lithium. Activated under low extracellular sodium concentrations and self-inhibited by high extracellular sodium concentrations. Activation is dependent on proteolytic cleavage of alpha and gamma subunits, post-translational modifications (such as glycosylation of beta subunit and palmitoylation) and possibly cyclic nucleotides that lift self-inhibition. Regulated by hormones such as aldosterone and vasopressin and inhibited by the diuretic amiloride. Although the channel activity itself is not voltage-gated, ameloride-sensitivity may be voltage-dependent. Channel gating and conductance are comparatively slow. Plays an essential role in electrolyte and blood pressure homeostasis, but also in airway surface liquid (ASL) homeostasis, which is important for proper clearance of mucus and pathogens. Mutations leading to a loss of ASL homeostatis are a trigger for cystic fibrosis. The inward sodium transport may trigger action potentials in neurons by gradually depolarizing membrane potentials. In nephrons may also be activated by shear stress potentially changing the conformation of the bulky extracellular loop or the transmembrane domains and thereby increasing channel opening times. May also play a role in salt and sour taste perception. Found in the apical membrane of many epithelial cell types, especially in the Aldosterone Sensitive Distal Nephron (ASDN), kidney, colon, lung and sweat glands but also in heart, liver, pancreas, skeletal muscle and blood leukocytes. Also expressed in vascular endothelia where their mechanical properties and function differ from epithelial sodium channels (ENaCs) in other tissues: vascular endothelia are ‘leaky’, allowing passive sodium transport through the membrane. Here, ENaCs are activated by increased external sodium concentrations that enhances the sodium influx into the cell. May stabilize F-actin through strengthening of the inter-subunits. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
