identifier: ComplexPortal:CPX-806
label: "Ndc80 complex"
definition: >-
  Crucial for the stable kinetochore-microtubule attachments that are needed to sustain the centromere tensions involved in achieving proper chromosome alignment in eukaryotic cells. Plays a role in chromosome alignment and microtubule-dependent control of Mad-1/Mad-2 (CPX-402) and dynein complexes at kinetochores, and also chromosome segregation in mitosis and meiosis and spindle checkpoint activity. The complex is recruited to microtubules by kinetochore protein knl-1, which in turn is recruited by knl-3, a component of the MIND complex (CPX-807). Incorrect microtubule binding is controlled by phosphorylation of the ndc-80 subunit by ipl-1/Aurora kinase B. Phosphorylation of ndc-80 reduces the microtubule binding affinity of the complex. Erroneous microtubule-kinetochore attachments are also controlled by the Rzz complex (CPX-810), which interacts with the Ndc80 complex to inhibit irregular microtubule binding. This inhibition is relieved by recruitment of dynein to kinetochores by the coiled-coil protein Spindly/spdl-1. Synergistically enhances the affinity of the Ska-1 complex (CPX-811) for microtubules, which may furthermore allow the Ndc80 complex to track depolymerizing microtubules. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
