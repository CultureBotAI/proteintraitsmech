identifier: ComplexPortal:CPX-3138
label: "KIF3 complex variant AB"
definition: >-
  Cytoplasmic, kinesin-2 motor complex involved in tethering the chromosomes to the spindle pole and in chromosome movement. Microtubule-based anterograde translocator for membranous organelles. Exhibits plus end-directed microtubule sliding activity (in vitro). It is unclear if this dimer exists in vivo or whether it is always in complex with KAP3 (Q92845). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
