identifier: ComplexPortal:CPX-6015
label: "Interferon gamma receptor-ligand complex"
definition: >-
  Receptor-ligand complex whose formation is triggered in response to infectious agents to engage downstream signalling pathways that activate immune responses. Following complex assembly JAK1 (P23458) and JAK2 (O60674) are activated by reciprocal transphosphorylation. Subsequently, they phosphorylate several tyrosine residues in the membrane-distal, intracellular domains of IFNGR1 and IFNGR2, which, in turn, recruit further effector proteins that propagate downstream signalling. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
