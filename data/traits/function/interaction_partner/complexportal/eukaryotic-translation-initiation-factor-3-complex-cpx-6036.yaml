identifier: ComplexPortal:CPX-6036
label: "Eukaryotic translation initiation factor 3 complex"
definition: >-
  Required for several steps in the initiation of protein synthesis. It associates with the 40S ribosome and facilitates the recruitment of eIF subunits to form the 43S pre-initiation complex (43S PIC). It is also required for disassembly and recycling of post-termination ribosomal complexes and subsequently prevents premature joining of the 40S (CPX-5223) and 60S (CPX-5183) ribosomal subunits prior to initiation. A curated stable macromolecular complex (Complex Portal) with 13 subunits.
