label: "GTPase-activating BFA1-BUB2 complex"
definition: >-
  Acts as a two-component GTPase-activating complex for spg1 (P87027) GTPase, thus regulating the induction of septum formation at G2 and pre-START stages of mitosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
