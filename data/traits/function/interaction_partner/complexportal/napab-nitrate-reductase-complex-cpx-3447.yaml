identifier: ComplexPortal:CPX-3447
label: "NapAB nitrate reductase complex"
definition: >-
  Periplasmic molybdoenzyme that catalyzes the two-electron reduction of nitrate to nitrite. napB receives electrons from the membrane-anchored tetraheme c-type napC protein and transfers these to napA subunit, thus allowing electron flow between membrane and periplasm. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
