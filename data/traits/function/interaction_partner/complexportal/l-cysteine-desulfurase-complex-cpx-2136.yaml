identifier: ComplexPortal:CPX-2136
label: "L-cysteine desulfurase complex"
definition: >-
  Catalyses L-cysteine or selenocysteine to L-alanine and either atomic sulfur, as sulfane or (per)sulfide (under reducing conditions) group, or selenium, respectively. The desulfurase activity of IscS is activated by interaction of partner proteins to form a persulfide adduct of Cys-328. By changing binding partners, IscS selects the sulfur flow through various sulfur trafficking pathways in the cell Provides the sulfur moiety for a variety of pathways such as iron-sulfur cluster formation, e.g. on apo-protein IscU (P0ACD4), for transpersulfidation reactions, e.g. thiol-group formation on Cys-456-ThiF (P30138) during thiamine pyrophospate biosynthesis and for biosynthesis pathways of nicotinic acids, biotin or molybdopterin (via MoeB-MoaD complex, CPX-1968). It is a master enzyme responsible for biosynthesis of all thio-containing RNA modifications (e.g. via ThiL (CPX-2140), TusA-TusBCD-TusE cascade (CPX-2139), IscU (CPX-2141)). It delivers selenium in the pathway for the biosynthesis of selenophosphate. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
