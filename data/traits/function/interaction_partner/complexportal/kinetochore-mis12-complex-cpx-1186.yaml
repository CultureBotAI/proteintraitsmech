identifier: ComplexPortal:CPX-1186
label: "Kinetochore MIS12 complex"
definition: >-
  Required for normal chromosome alignment and segregation, kinetochore formation during mitosis, proper kinetochore microtubule attachments and for the spindle assembly checkpoint. The complex plays a role in establishing a bipolar spindle-kinetochore interaction by joining kinetochore subunits contacting DNA to those contacting microtubules. Mis12/MIND is part of a tridentate linker layer, which also contains the Ndc80 (CPX-548) and COMA (CPX-1187) complexes. Evidence suggests interactions between COMA, MIND, and Ndc80 complexes. The Mis12/MIND complex is a platform onto which outer kinetochore proteins assemble, including microtubule-binding proteins. It is proposed to have a distinct function with respect to force generation and microtubule attachment. In the absence of MIND, there is bipolar binding without the generation of sufficient pulling force to cause centromere stretching and transient sister-chromatid separation. MIND requires CBF3 complex for assembly onto centromeric DNA. Different combinations of MIND subunits have been found, which may reflect the regulated steps in kinetochore assembly. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
