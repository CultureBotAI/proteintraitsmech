identifier: ComplexPortal:CPX-4310
label: "Prolow-density lipoprotein receptor-related protein 1 complex"
definition: >-
  Endocytic, low-densitiy lipoprotein receptor involved in two major processes, as scavenger receptor in the internalisation of extracellular molecules and their clearance via the endosome and as transducer of multiple intracellular signal pathways. Often acts in corporation with other cell-surface receptors. LRP-1 is recycled to the plasma membrane. Involved in cholesterol import and clearance of a range of toxins. Ligands range from matrix metalloproteinases (MMP) and urokinase-type plasminogen activator (uPA-uPAR, CPX-487) or tissue-type plasminogen activator (Plat/tPA, P00750), bound directly to LRP-1 or in complex with their target inhibitor, e.g. plasminogen activator inhibitor type 1 (SERPINE1/PAI-1, CPX-483 and CPX-494), to amyloid-beta peptides. Instead of being internalised, LRP-1 ligands may also shed the extracellular domains of the alpha and beta chains resulting in an extracellular, soluble LRP-1 (sLRP-1) decoy receptor. Affects a variety of pathophysiological processes including lipid metabolism, neurodegenerative diseases (e.g. Alzheimer's disease), blood-brain-barrier integrity, cardiovascular disease, atherosclerosis and cancer. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
