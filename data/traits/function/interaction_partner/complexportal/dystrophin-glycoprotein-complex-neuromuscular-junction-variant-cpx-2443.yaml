identifier: ComplexPortal:CPX-2443
label: "Dystrophin glycoprotein complex, neuromuscular junction variant"
definition: >-
  A plasma membrane transmembrane complex that links the actin cytoskeleton to the extracellular matrix. At the post-synaptic neuromuscular junction (NMJ) is involved in receptor clustering and synaptic transmission, stabilizing neurotransmitter acetylcholine receptors. It also plays a role in a number of important signaling cascades acting at the NMJ, such as the agrin/muscle-specific kinase MUSK (O15146), NOS1 (P29475), and Ca2+/calmodulin-dependent protein kinase II (CAMKII)-mediated signaling pathways. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
