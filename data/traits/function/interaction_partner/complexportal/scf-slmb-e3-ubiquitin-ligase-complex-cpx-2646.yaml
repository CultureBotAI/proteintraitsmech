identifier: ComplexPortal:CPX-2646
label: "SCF-SLMB E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase that plays a critical role in the pruning of unnecessary axons/dendrites during the development of the nervous system, including both dendrite arborization neurons (ddaC dendrites) and mushroom body γ axons. The complex is believed to act primarily through inactivation of the InR/PI3K/TOR pathway. May also play a role in modulating wnt-signalling through the destruction of beta- catenin. May also regulate the levels of FERM protein Expanded (Q07436), one of the main upstream Hippo signalling regulators, by ubiquitylation which triggers downstream degradation. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
