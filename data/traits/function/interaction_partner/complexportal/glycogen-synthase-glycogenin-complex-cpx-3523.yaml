identifier: ComplexPortal:CPX-3523
label: "Glycogen synthase-glycogenin complex"
definition: >-
  Glycogen synthase complex which extends the oligosaccharide chain formed by homodimeric glycogenin (gyg-1) glycosyltransferase. gyg-1 initiates glucose polymerization by catalyzing the formation of a short alpha (1,4)-glucosyl chain which it covalently attaches via auto-glucosylation to form a glucose 1-O-tyrosyl linkage to Tyr-194 This primer glucose chain of 8-12 residues is then further elongated by the GYG-GYS complex, successive adding alpha-1,4-linked glucose residues to the nonreducing end of the polysaccharide chain, using UDP-glucose as the sugar donor with the release of UDP after which, gyg-1 and gsy-1 dissociate. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
