identifier: ComplexPortal:CPX-2124
label: "sufS cysteine desulfurase complex"
definition: >-
  An L-cysteine desulfurase which cleaves the C-S bond in cysteine to yield alanine and persulfide, an enzyme-bound S-sulfanylcysteine species. The desulfurase activity is coupled via a ping-pong mechanism to a second transpersulfuration step where the persulfide species is transferred from the active-site cysteine residue to acceptor sufE homodimer (CPX-2125). sufS is activated and required under specific conditions such as oxidative stress and iron limitation. It plays a role in iron-sulfur cluster formation on SufBCD (CPX-2123). sufS is part of the sufABCDSE operon and its cysteine desulfurization activity is enhanced by the SufE dimer and SufBCD complex. In vitro it also acts as a potent selenocysteine lyase, that mobilizes selenium from L-selenocysteine. Selenocysteine lyase activity is however unsure in vivo. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
