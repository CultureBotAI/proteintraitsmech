identifier: ComplexPortal:CPX-1663
label: "CYC8-TUP1 corepressor complex"
definition: >-
  Corepressor complex with a role in the repression of many genes in a wide variety of physiological processes including heme-regulated and catabolite repressed genes. May also be involved in the derepression of at least some target genes. The complex is recruited to target genes by interaction with DNA-bound transcriptional repressors, like MATALPHA2, MIG1, RFX1 and SKO1. The complex recruits histone deacetylases to produce a repressive chromatin structure, interacts with hypoacetylated N-terminal tails of histones H3 and H4 that have been programmed for repression by the action of histone deacetylases, and interferes directly with the transcriptional machinery by associating with the RNA polymerase II mediator complex. Undergoes transient hyperosmotic stress-induced SUMOylation and inclusion formation, which are important for the regulation of hyperosmotic-stress genes, for example the activation of glycerol biosynthesis genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
