identifier: ComplexPortal:CPX-2931
label: "Hemoglobin Portland-1 Variant 2 complex"
definition: >-
  Embryonic hemoglobin Portland-1 complex is found during early embryonic development, predominantly in the yolk sac. It is linked to severe alpha-thalassemia. Has reduced oxygen binding and transport capacity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
