identifier: ComplexPortal:CPX-5646
label: "Kinetochore CCAN complex"
definition: >-
  Interacts with duplex DNA and facilitates accurate chromosome segregation.. Plays a central role in assembly of kinetochore proteins, mitotic progression and chromosome segregation. Binds to CENPA (P49450)-associated nucleosomes providing a platform for assembly of the outer layer of kinetochore, the KMN complex (CPX-5645). A curated stable macromolecular complex (Complex Portal) with 16 subunits.
