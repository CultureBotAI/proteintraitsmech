identifier: ComplexPortal:CPX-1625
label: "HOPS tethering complex"
definition: >-
  Multisubunit tethering complex involved in endo-lysosomal vesicle trafficking and lysosome biogenesis by cross-linking two membranes, and facilitating the formation of a SNARE complex during fusion. Required for the delivery of vacuolar proteins and homotypic fusion of vacuoles and controls the clearance of late endosomes and autophagosomes during heterophagy and autophagy through promoting fusion of these vesicles with the vacuole Controls homotypic vacuole-vacuole fusion by regulating vesicle docking to the vacuole through its interaction with soluble SNAREs (CPX-1887), the GTP-bound form of the Rab protein YPT7 (P32939) and phosphoinositides. HOPS indirectly facilitates trans-SNARE complex formation by tethering membranes then protects newly formed trans-SNARE complexes from disassembly by SEC17/SEC18 (P32602/P18759). Reduces the levels of noncanonical trans-SNARE complexes formed during fusion, and further reduces the capacity of these mismatched complexes to undergo fusion. HOPS function is regulated through phosphorylation of its VPS41 subunit by YCK3 which lowers its affinity for vacuolar lipids. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
