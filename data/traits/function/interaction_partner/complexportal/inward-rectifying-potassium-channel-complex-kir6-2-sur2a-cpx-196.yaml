identifier: ComplexPortal:CPX-196
label: "Inward rectifying potassium channel complex, Kir6.2-SUR2A"
definition: >-
  Weak inwards rectifying plasma membrane channel complex that facilitated the influx of potassium ions in an ATP- and MgADP-dependent manner and results in membrane hyperpolarisation and shortened action potentials. Activated by binding of MgADP or MgATP to the nucleotide binding domains (NBD) of the ABCC9/SUR2A subunit as well as extracellular K+ binding to the KCNJ11/Kir6.2 subunit. If MgATP binds it must first get hydrolised by the ATP hydrolysis activity of the NBD which also generates PtdIns(4,5)P2 from phosphatidylinositol. Channel activation possibly driven by conformational changes resulting from MgADP binding to SUR subunits and reducing ATP affinity to Kir6.2. Inhibited by intracellular ATP or ADP, Mg2+ and polyamines that bind to the Kir6.2 subunits. ATP/ADP probably changes the conformation of Kir6.2 while Mg2+ and polyamines physically block the flow of K+ through the channel pore. Also inhibited by exogenous sulfonylureas by binding to intracellular loops (possibly by displacing MgADP from NBDs). As ATP is a weak inhibitor Kir6.2 channels can open spontaneously and are classified as constitutively active ion channels. In the absence of ATP (but presence of MgATP), cardiac channels exhibit spontaneous bursts of rapid openings and closings (fast kinetics), which are separated by long closed intervals (slow kinetics). Conversely, ATP destabilizes channel open state and stabilizes its closed states by increasing the speed of gating. Found predominantly in cardiac smooth muscle, skeletal muscle smooth muscle, neurons and ovaries. Gating of the atrial K+ channel is mechanosensitive, and mechanical pressure applied to a cardiac cell leads to an increase in their activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
