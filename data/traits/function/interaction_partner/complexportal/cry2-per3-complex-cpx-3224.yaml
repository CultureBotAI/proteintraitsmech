identifier: ComplexPortal:CPX-3224
label: "Cry2-Per3 complex"
definition: >-
  Gradually accumulates in the nucleus to negatively regulate CLOCK-BMAL (CPX-3229, CPX-3230) -dependent transactivation of genes in a delayed negative feedback mechanism which generates circadian rhythms. Phosphorylation of PER3 by CSNK1D/CSNK1E (P48730/P49674) effects stability and nuclear localisation of the complex. Phosphorylation of CRY2 Ser-71 stimulates the direct binding of FBXL3 (Q9UKT7), targeting it for ubiquitin-mediated degradation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
