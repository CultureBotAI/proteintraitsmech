identifier: ComplexPortal:CPX-1193
label: "Vacuolar proton translocating ATPase complex, vacuole variant"
definition: >-
  Translocates protons across a lipid bilayer via an ATP-driven rotary mechanism, thus acidifing the lumen of its resident organelle. Membrane-bound ion transporters/proton exchangers use the resulting pH gradient to sequester metal ions to the vacuole and other cellular organelles. The combined action of the V-ATPase and membrane transporters plays a key role in maintaining cellular homoeostasis. The variant of the complex containing the VPH1 subunit results in the retention of the V-ATPase complex on vacuole membranes. When yeast cells are deprived of glucose, the V1 and VO regions separate and are no longer able to hydrolyze ATP and transport protons. Reassembly is mediated by the RAVE complex (CPX-1627). A curated stable macromolecular complex (Complex Portal) with 16 subunits.
