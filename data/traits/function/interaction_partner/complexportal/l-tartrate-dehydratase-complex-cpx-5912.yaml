label: "L-tartrate dehydratase complex"
definition: >-
  Oxygen-labile stereospecific enzyme which participates in glyoxylate and dicarboxylate metabolism by catalysing the breakdown of (R,R)-tartrate to oxaloacetate and H2O. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
