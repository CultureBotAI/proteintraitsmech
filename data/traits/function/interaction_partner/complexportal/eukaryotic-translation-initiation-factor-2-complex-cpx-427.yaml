identifier: ComplexPortal:CPX-427
label: "Eukaryotic translation initiation factor 2 complex"
definition: >-
  Delivers initiator methionyl-tRNA to the 40S ribosomal subunit in a eukaryotic translation initiation factor 2 (eIF2).GTP.Met-tRNA(Met) ternary complex. The resulting 43S complex, which also includes eIF3 and eIF1A, binds at or near the 5-prime end of capped eukaryotic messenger RNAs. Recognition of the AUG codon translational start site is accompanied by GTP hydrolysis (stimulated by the eIF5 complex), which releases Met-tRNA to the ribosomal peptidyl site and converts eIF2-GTP to eIF2-GDP. Binding of nucleotide exchange factor eIF2B complex (CPX-429) replaces GDP again for GTP. This activity is inhibited when phosphorylated eIF2 (alpha subunit) binds to eIF2B. Phosphorylation of eIF2 occurs in response to nutrient starvation and thus prevents further protein synthesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
