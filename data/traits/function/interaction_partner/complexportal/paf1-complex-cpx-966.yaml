identifier: ComplexPortal:CPX-966
label: "PAF1 complex"
definition: >-
  A multifunctional complex involved in many aspects of RNA polymerase II (Pol II) transcriptional regulation, including transcriptional elongation, 3'-terminal end processing, and histone modification. Role in 3'-end formation of mRNAs, required for the recruitment of cleavage and polyadenylation factors to Pol II. Also involved in gene regulation of embryonic epidermal morphogenesis. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
