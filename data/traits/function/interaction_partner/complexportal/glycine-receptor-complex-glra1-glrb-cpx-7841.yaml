identifier: ComplexPortal:CPX-7841
label: "Glycine receptor complex, GLRA1-GLRB"
definition: >-
  Ligand-gated chloride channel, the activation of which results in a chloride ion flow across the membrane regulated by the chloride ion equilibrium potential. This induces membrane hyperpolarization which, in turn, inhibits neuronal activity. Adult glycine receptors are mainly of the heteromeric GLRA1-GLRB type. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
