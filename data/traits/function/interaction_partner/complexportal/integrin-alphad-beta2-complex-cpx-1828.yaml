identifier: ComplexPortal:CPX-1828
label: "Integrin alphaD-beta2 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for ICAM3 and VCAM1. May play a role in the atherosclerotic process such as clearing lipoproteins from plaques and in phagocytosis of blood-borne pathogens, particulate matter, and senescent erythrocytes from the blood. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
