label: "trm8-trm82 tRNA (guanine-N(7)-)-methyltransferase"
definition: >-
  Required for 7-methylguanosine modification (m7G46) of tRNA. The m7G46 modification is required to prevent tRNA levels decay in a rapid tRNA degradation pathway. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
