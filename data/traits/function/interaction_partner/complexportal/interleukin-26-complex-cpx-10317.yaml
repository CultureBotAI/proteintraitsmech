identifier: ComplexPortal:CPX-10317
label: "Interleukin-26 complex"
definition: >-
  Cationic homodimeric cytokine that binds to extracellular DNA released from damaged cells. Acts as a carrier molecule for translocation of IL26-DNA complexes into the cytoplasm triggering proinflammatory effects through the activation of inflammasomes and interferon genes via the STING pathway. May activate innate and adaptive lymphoid cells, myeloid cells and plasmacytoid dendritic cells (pDC) by allowing DNA to be internalized by pDC, leading to its activation via TLR9 (Q9NR96) or TLR3 (O15455). IL26 binds as a monomer to a conventional heterodimeric receptor (CPX-10316) to exert some potentially pathological effects in inflammatory disorders. IL26 is primarily secreted by pathogenic T helper 1 (Th1), Th17 and CD4+ cells. IL26 is considered to be a master regulator of inflammation but is also a catalyst for driving chronic inflammatory disorders. In addition to the proinflammatory effects it mediates, IL26 functions as a kinocidin or antimicrobial protein (AMP) with strong antimicrobial and bactericidal effects, particularly on Gram-positive bacteria through its capacity to form pores in bacterial membranes. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
