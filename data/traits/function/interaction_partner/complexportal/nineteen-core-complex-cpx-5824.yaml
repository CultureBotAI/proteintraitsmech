identifier: ComplexPortal:CPX-5824
label: "NineTeen Core complex"
definition: >-
  Required for catalytic activation of the spliceosome and is an integral component of active spliceosomes. During or after U4 small nuclear RNP (snRNP) release, the NineTeen (NTC) complex is recruited into the spliceosome as it transitions from the B complex (CPX-26435) to the B-act (CPX-26441) formation stage where it stabilizes the U5/U6 snRNP in the B-act and remains associated with the spliceosome during the second step of splicing. The NTC is highly conserved and it is likely that it performs the same functions across all species. Also plays a central role in regulating DNA damage response (DDR) and maintaining cellular homeostasis. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
