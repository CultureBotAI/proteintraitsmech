identifier: ComplexPortal:CPX-4403
label: "Ferric-citrate ABC transporter complex"
definition: >-
  High affinity ferric citrate transporter which imports ferric citrate transported across the outer membrane by the ferric-citrate outer membrane transporter complex (CPX-3576). Member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
