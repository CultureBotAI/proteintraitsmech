identifier: ComplexPortal:CPX-23940
label: "XIAP-CASP7 apoptosis regulatory complex"
definition: >-
  XIAP binds CASP7 preventing execution of apoptotic programs, particularly when CASP3 (P42574) is deficient and CASP7 is essential. Disruption of this complex restores CASP7 activity and promotes cell death. Alterations in apoptotic pathways have been implicated in several diseases, including cancer, autoimmune diseases, and developmental disorders. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
