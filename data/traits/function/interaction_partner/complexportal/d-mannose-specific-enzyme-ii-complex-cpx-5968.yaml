identifier: ComplexPortal:CPX-5968
label: "D-mannose-specific enzyme II complex"
definition: >-
  Involved in the transport of D-mannose across the cell membrane as part of the phosphoenolpyruvate:sugar phosphotransferase system (PTS). A phosphoryl group is transferred from hpr (P0AA04) to manX (IIA), from manX to manY (IIBC) and finally from manY onto the incoming sugar bound to membrane-embedded manY/manZ (IID). The mannose transporter has a broad substrate specificity, including glucose, mannose, fructose, glucosamine, N-acetylglucosamine, and N-acetylmannosamine, and it is the only transporter for mannose. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
