identifier: ComplexPortal:CPX-92
label: "Galectin-1 complex"
definition: >-
  Galectin-1 complex binds a wide array of complex carbohydrates and takes part in several key cellular processes such as growth regulation, adhesion of cells, and release of mediator. It is a potential target of glycomimetics such as glycoclusters. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
