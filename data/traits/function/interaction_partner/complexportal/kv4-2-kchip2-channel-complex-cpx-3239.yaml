identifier: ComplexPortal:CPX-3239
label: "Kv4.2-KChIP2 channel complex"
definition: >-
  Member of the transient outward (A-type), rapidly inactivating voltage-gated potassium channels, also called the D member of the Shal-related voltage-gated potassium channels. A transmembrane channel specific for potassium and sensitive to voltage changes in the cell's membrane potential, composed of alpha and beta subunits. Alpha subunit (Kv4.2), is a potassium voltage-gated channel subfamily D member 2 protein. Beta subunit is an auxiliary, regulatory subunit, called Kv channel-interacting protein 2 (KChIP2) that modulates channel inactivation kinetics and rate of recovery from inactivation in a calcium-dependent manner. During action potentials, the channel plays a crucial role in returning the depolarized cell to a resting state (repolarisation phase). It contributes to the cardiac transient outward current I(TO) in the heart and the somatodendritic A-type current I(SA) in neurons.These currents operate at subthreshold membrane potentials to control the excitability of neurons and cardiac myocytes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
