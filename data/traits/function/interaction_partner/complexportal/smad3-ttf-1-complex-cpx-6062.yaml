identifier: ComplexPortal:CPX-6062
label: "SMAD3-TTF-1 complex"
definition: >-
  Transcription factor that has dual effect: it binds and activates the promoter of specific genes such as LMO3 (Q8TAP4) and it reduces the pool of SMAD3-SMAD4 complexes (CPX-3252) thus inhibiting the transcription of their target genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
