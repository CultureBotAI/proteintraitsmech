identifier: ComplexPortal:CPX-2143
label: "Hpa2 acetyltransferase"
definition: >-
  Acetyltransferase which catalyzes the transfer of an acetyl group from acetyl-CoA to an acceptor residue on histones H-3 and H-4 and also on polyamines. May also acetylate certain small basic proteins. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
