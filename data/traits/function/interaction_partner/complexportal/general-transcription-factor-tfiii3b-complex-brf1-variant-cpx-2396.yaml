identifier: ComplexPortal:CPX-2396
label: "General transcription factor TFIII3B complex, BRF1 variant"
definition: >-
  Key RNA polymerase III (CPX-2393/CPX-7482) transcription factor which binds type 1 and 2 Pol III promoters. TFIIIB binds to DNA through recognition of the TATA box by TBP.The binding of TFIIIB to the promoter drives the recruitment of Pol III. TF3IIIB also plays a role in the opening of the transcription bubble. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
