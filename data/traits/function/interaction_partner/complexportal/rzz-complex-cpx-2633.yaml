identifier: ComplexPortal:CPX-2633
label: "RZZ complex"
definition: >-
  An essential component of the kinetochore required for both meiotic and mitotic spindle assembly checkpoints. Plays a required role in spindle assembly checkpoint, blocking the metaphase-to-anaphase transition until all chromosomes are properly aligned in a metaphase plate. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
