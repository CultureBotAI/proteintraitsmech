identifier: ComplexPortal:CPX-2122
label: "Swr1 chromatin remodelling complex"
definition: >-
  ATP-dependent chromatin-remodeling complex. SWR1 replaces the canonical H2A/H2B dimer at nucleosomes flanking histone-depleted regions, such as promoters, with a variant histone H2A.Z/H2B dimer. H2A.Z has been shown to affect the stability of its host nucleosome, higher-order chromatin folding, and recruitment of transcriptional factors. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
