identifier: ComplexPortal:CPX-1189
label: "RAD26-DEF1 stalled RNAPII response complex"
definition: >-
  Appears to form in response to DNA damage-stalled RNA polymerase II (RNAPII, CPX-2662), when the stall is persistent such as at DNA lesions. RAD26 appears to protect RNAPII from degradation to allow time for repair. When the lesion cannot be rapidly removed by RAD26-promoted DNA repair, DEF1 enables ubiquitination and proteolysis of RNAPII. The complex may therefore act to coordinate a stalling rescue mechanism driven by the two proteins. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
