identifier: ComplexPortal:CPX-9062
label: "Sodium leak channel complex"
definition: >-
  Voltage-gated ion channel responsible for the depolarizing sodium (Na+) leak currents that determine resting Na(+) permeability and control neuronal excitability. Functions downstream of the molecular circadian clock in pacemaker neurons to promote behavioral rhythmicity. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
