identifier: ComplexPortal:CPX-26537
label: "TRAMP complex"
definition: >-
  Recognises and bind to pre-ribosomal RNA and snoRNAs leading to their rapid degradation by the nuclear exosome (CPX-8914). Adds a short oligo(A) tail to the RNA which is assumed to make it a better substrate for 3'-end degradation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
