identifier: ComplexPortal:CPX-6263
label: "Fanconi anemia ubiquitin ligase complex"
definition: >-
  Ubiquitin ligase complex required for the repair of DNA interstrand crosslinks (ICL) and related lesions. The complex is activated when a replication fork stalls at an ICL and monoubiquitinates the Fanconi anemia ID complex (CPX-6264) in the presence of UBE2T (Q9NPD8), conjugating one ubiquitin molecule to each protein component. UBE2T acts as a specific E2 ubiquitin-conjugating enzyme for the complex. Monoubiquitination of ID is essential for ICL repair by excision, trans-lesion synthesis and homologous recombination. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
