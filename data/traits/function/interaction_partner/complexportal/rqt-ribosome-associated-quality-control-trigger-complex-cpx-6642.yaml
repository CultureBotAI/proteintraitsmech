identifier: ComplexPortal:CPX-6642
label: "RQT ribosome-associated quality control trigger complex"
definition: >-
  Recognizes ubiquitinated stalled ribosomes and induces subunit dissociation to facilitate the ribosome-associated quality control (RQC) pathway.The abnormal stalled ribosome is recognized and ubiquitinated at one or more specific residues by the E3 ubiquitin ligase ZNF598 (Q86UK7). Ubiquitinated 80S ribosomes appear to be dissociated into 40S and 60S subunits by the ATP-dependent helicase ASCC3. TRIP4 may promote complex binding to the ribosome via its zinc-finger domain. ACSS1 (Q8N9N2) may also be a component of the RQT complex, although the complex appears to retain activity in its absence. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
