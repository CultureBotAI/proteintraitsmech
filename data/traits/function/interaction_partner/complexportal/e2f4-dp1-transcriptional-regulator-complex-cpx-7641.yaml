identifier: ComplexPortal:CPX-7641
label: "E2F4-DP1 transcriptional regulator complex"
definition: >-
  Transcription factor complex which binds DNA through the E2 recognition site, 5'-TTTC[CG]CGC-3'. Primarily involved in gene repression, the complex is required for the maintenance of cell cycle arrest in G0/G1 through repression of cell cycle genes. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
