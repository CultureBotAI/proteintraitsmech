identifier: ComplexPortal:CPX-3255
label: "SCF-Hrt3 ubiquitin ligase complex"
definition: >-
  SCF-Hrt3 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, Hrt3, forms the substrate recognition subunit. The complex is involved in the cellular response to methylmercury. The complex may form a homodimer. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
