identifier: ComplexPortal:CPX-25745
label: "SREBP-SCAP transcription regulator complex, SREBF1 variant"
definition: >-
  When the cell is enriched with cholesterol, SCAP binds and stabilizes full-length SREBF1/2 and is anchored in the endoplasmic reticulum (ER) by formation of the SREBP-SCAP-INSIG complex (CPX-25749/CPX-25750). Under conditions of low sterols, the SREBP-SCAP complex is translocated by COPII (CPX-2360)-coated vesicles from the ER to the Golgi where SREBF1/2 is proteolytically cleaved and freed from the membrane to activate the transcription of genes involved in fatty acids and cholesterol biosynthesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
