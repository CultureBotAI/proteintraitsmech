identifier: ComplexPortal:CPX-2499
label: "Erythrocyte spectrin complex"
definition: >-
  The major constituent of the cytoskeletal network underlying the erythrocyte plasma membrane. Crucial for maintaining the stability and structure of the cell membrane and the shape of a cell. Major function of the spectrin skeleton in erythrocytes is to provide mechanical support for the membrane bilayer and allow survival of the cells in circulation. Associates with the intracellular face of the plasma membrane by indirect interaction, through direct interactions with Protein 4.1 (P11171) and ankyrin, with the transmembrane ion transporter band 3 (P02730). Protein 4.2 (P16452) binds the spectrin tail region to the transmembrane protein glycophorin A (P02724). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
