identifier: ComplexPortal:CPX-26423
label: "Box C/D snoRNA-guided RNP methyltransferase complex, FBL variant"
definition: >-
  Small nucleolar RNA (snoRNA) dependent 2'-O-methyltransferase complex. Upon forming a snoRNP complex with a box C/D snoRNA and other core proteins, FBL transfers a methyl group to the 2'-hydroxyl of the ribose moiety in substrate RNAs. Complex plays a role in pre-rRNA cleavage and in 2'-O-methylation of nucleotides at specific positions in rRNAs, snoRNAs, and other RNAs during maturation. FBL is enriched in the nucleolus' dense fibrillar center where it participates in pre-rRNA processing by mediating 2'-O-methylation modifications. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
