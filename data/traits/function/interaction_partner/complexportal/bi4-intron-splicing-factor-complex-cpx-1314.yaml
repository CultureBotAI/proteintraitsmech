identifier: ComplexPortal:CPX-1314
label: "bI4 intron splicing factor complex"
definition: >-
  Self-splicing ribozymal RNA Group I intron splicing factor for mitochondrial introns. A guanosine cofactor docks onto an active G-binding site and hydrolyses the phosphodiester bond at the splice site located in P1, resulting in a free hydroxyl group at the upstream exon and the guanosine cofactor being attached to the 5-prime end of the intron. Then the terminal guanosine of the intron occupies the G-binding site to organize the second ester-transfer reaction leading to the ligation of the adjacent upstream and downstream exons and release of the catalytic intron. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
