identifier: ComplexPortal:CPX-1100
label: "DRM complex"
definition: >-
  Transcription factor complex with a role in in germline X-chromosome regulation. Appears to repress transcription of germline-expressed genes and promote expression of somatic and X-linked genes. The complex represses transcription in vulval precursor cells to negatively regulate vulval development. This is most probably via antagonism of the Ras-signalling pathway. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
