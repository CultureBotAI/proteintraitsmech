identifier: ComplexPortal:CPX-1659
label: "General transcription factor TFIIH complex"
definition: >-
  A general transcription factor which plays a central role in both RNA polymerase II transcription and DNA repair. Component of the Pol II preinitiation complex. The TFIIH subunit XPB is an ATP-dependent translocase that promotes DNA strand separation and promoter escape. During the transition from initiation to promoter clearance, the kinase subunit Kin28 phosphorylates Ser-5 and Ser-7 within the Pol II carboxyl terminal domain (CTD). This phosphorylation initiates a cascade of phosphorylation/dephosphorylation events on the CTD that correlates with dissociation of Pol II from the initiation machinery and its association with elongation and mRNA processing factors. This is the only general transcription factor with enzyme activity. During nucleotide excision repair, TFIIH is required for opening DNA around lesions that disrupt base pairing to permit excision of the damaged DNA and its replacement by a new DNA fragment. A curated stable macromolecular complex (Complex Portal) with 11 subunits.
