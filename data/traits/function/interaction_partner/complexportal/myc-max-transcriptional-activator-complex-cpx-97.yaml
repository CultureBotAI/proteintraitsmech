identifier: ComplexPortal:CPX-97
label: "Myc-Max transcriptional activator complex"
definition: >-
  Proto-oncogenic transcriptional activator recognizing E box hexanucleotide. E-boxes contain the DNA consensus sequence CACGTG3 and are located within gene promoters. The Myc-Max heterodimer upregulates gene transcriptions by interaction with TATA binding protein (TBP, P29037), which in turn upregulates RNA polymerase transcription of the gene. Role in cellular proliferation and division. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
