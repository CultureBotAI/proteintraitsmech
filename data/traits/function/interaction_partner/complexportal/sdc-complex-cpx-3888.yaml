identifier: ComplexPortal:CPX-3888
label: "SDC complex"
definition: >-
  Sex-determination complex involved in hermaphrodite sexual development by modulating chromosome and sex-specific gene expression. sdc-2, within the complex, recruits the Condensin I-like dosage compensation complex (CPX-1273) to hermaphrodite X-chromosomes to repress the transcription of male sex-determining genes, such as the male sex-determination gene her-1 (P34704), and promote hermaphrodite differentiation. Association with diverse DNA targets results in different degrees of repression. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
