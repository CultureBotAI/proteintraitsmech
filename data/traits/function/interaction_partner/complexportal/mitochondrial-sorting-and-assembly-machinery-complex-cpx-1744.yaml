identifier: ComplexPortal:CPX-1744
label: "Mitochondrial sorting and assembly machinery complex"
definition: >-
  Involved in the membrane assembly of mitochondrial beta-barrel proteins, which are synthesized on cytosolic ribosomes and recognized initially by the import receptors of the translocase of the mitochondrial outer membrane (TOM complex CPX-474). They are then translocated across the outer membrane via the general-import pore of the TOM complex and relayed to the SAM complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
