identifier: ComplexPortal:CPX-1361
label: "PP2A-RSA-1 phosphatase complex"
definition: >-
  Serine/threonine phosphatase complex which, when present in the larger RSA centrosome-targeting complex (CPX-1357) is required for the regulation of microtubule outgrowth from centrosomes and also for mitotic spindle assembly by ensuring the stability of kinetochore microtubules. The complex is localized to the centrosome. In particular, the regulatory subunit rsa-1 recruits the core holoenzyme to the centrosome. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
