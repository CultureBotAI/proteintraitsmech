identifier: ComplexPortal:CPX-418
label: "MTQ2-TRM112 eRF1 methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase responsible for methylating Gln-182 present in the conserved GGQ motif of the eRF1 subunit of the class 1 peptide chain release factor eRF1-eRF3 complex. Methylation occurs in the presence of GTP. This terminates the translation of nascent peptides in response to the termination codons UAA, UAG and UGA. Uses S-adenosyl L-methionine as methyl donor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
