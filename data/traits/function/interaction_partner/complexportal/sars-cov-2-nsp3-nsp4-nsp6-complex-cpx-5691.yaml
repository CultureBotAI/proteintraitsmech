identifier: ComplexPortal:CPX-5691
label: "SARS-CoV-2 NSP3-NSP4-NSP6 complex"
definition: >-
  Complex of the SARS-CoV-2 coronavirus involved in replication. Potentially acts by inducing rearrangement of the host membranes to form double-membrane vesicles which may form a framework for viral genome replication by localizing and concentrating the necessary factors and possibly providing protection from host cell defenses. The multi-spanning transmembrane domains in nsp3, nsp4 and nsp6 may serve as a scaffold for the assembly of the membrane-associated replication/transcription complex (RTC), a large multisubunit assembly that is comprised of more than a dozen proteins. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
