identifier: ComplexPortal:CPX-26361
label: "Dynein-2 complex, light-chain variant 3"
definition: >-
  Multi-protein molecular motor. Dynein-2 is one of three major classes of dynein, which share a conserved motor domain that couples ATP hydrolysis with conformational changes to power movement of cargoes along microtubules within cilia. Dynein-2 is vital for the assembly and powering of retrograde intra-flagellar transport of cargoes from the tip of cilia and flagella to the base for recycling or degradation . Acts as a negative regulator of the Toll-like receptor and IL1R1 (P14778) signalling pathways. Inhibits the MAP3K7 (O43318) induced NF-kappa-B activation pathway. Mutations in dynein's intermediate chains (ICs), light IC and the heavy chain (HC) DYNC2H1 are associated microcephaly, as well as a subset of skeletal-ciliopathies encompassing a wide spectrum of human diseases including primary ciliary dyskinesia and short-rib thoracic dysplasia. A curated stable macromolecular complex (Complex Portal) with 8 subunits.
