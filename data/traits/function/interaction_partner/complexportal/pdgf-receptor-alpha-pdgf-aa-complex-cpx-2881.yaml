identifier: ComplexPortal:CPX-2881
label: "PDGF receptor alpha - PDGF-AA complex"
definition: >-
  Platelet-derived growth factor (PDGF) receptor alpha (PDGFRalpha) that is activated by its bound ligand, PDGF A-chain. PDGFRalpha is a tyrosine-protein kinase that acts as a cell-surface receptor for PDGFA, and its related B- and C-chains, PDGFB (P01127) and PDGFC (Q9NRA1). It autophosphorylates on multiple tyrosines upon ligand binding, initiating several signalling cascades and phosphorylation of downstream targets. Is a potent mitogen for cells of mesenchymal origin. Plays an essential role in the regulation of embryonic development, cell proliferation, survival and chemotaxis. Required for normal lung alveolar septum formation during embryogenesis, normal development of the gastrointestinal tract, normal development of Leydig cells and spermatogenesis. Required for normal oligodendrocyte development and normal myelination in the spinal cord and cerebellum. Plays an important role in wound healing. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
