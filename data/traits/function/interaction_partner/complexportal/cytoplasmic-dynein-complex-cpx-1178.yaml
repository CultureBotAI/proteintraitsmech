identifier: ComplexPortal:CPX-1178
label: "Cytoplasmic dynein complex"
definition: >-
  A microtubule minus end-directed motor complex involved in positioning the mitotic spindle during cell division. Yeast undergoes a closed mitosis, and therefore the nucleus and its mitotic spindle must be positioned across the junction between the mother and bud, termed the bud neck, to provide a set of chromosomes to the daughter cell. Dynein anchors to the bud end and becomes activated, allowing force generation between the microtubule and the cortex. The microtubule is pulled to slide along the cortex, causing the spindle to move into the mother-bud neck .Chemical transitions (ATP binding, ATP hydrolysis and the release of inorganic phosphate (Pi) and ADP) are coupled to structural changes in the motor, whilst conversely, mechanical events (such as microtubule binding) can influence the rate of chemical transitions. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
