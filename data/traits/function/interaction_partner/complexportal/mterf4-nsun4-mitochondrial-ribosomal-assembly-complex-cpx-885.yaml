identifier: ComplexPortal:CPX-885
label: "MTERF4-NSUN4 mitochondrial ribosomal assembly complex"
definition: >-
  Sequester helices H68-71 of the 16S rRNA and maintains this in an open, immature conformation, exposing the functionally important regions of rRNA for modification by the MRM2 methyltransferase (Q9UI43) and quality control interactions with the conserved mitochondrial GTPase MTG2 (Q9H4K7). NSUN4 has 5-methylcytosine rRNA methyltransferase complex which targets C911 of the 12S rRNA in the 28S small ribosomal subunit (CPX-5225) but this may be independent of complex formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
