identifier: ComplexPortal:CPX-4266
label: "NLRP1b inflammasome, allele-2 variant"
definition: >-
  A pro-inflammatory thiol protease complex that is activated in response to pathogen infections and toxins such as T. gondii infection. Primarily acts in monocytes and macrophages. Activating platform for Caspase-1 (CPX-4242) through proximity-induced self-cleavage in an ATP-dependent reaction. Activated Caspase-1 cleaves interleukins 1beta (Il1b, P10749) and Il18 (P70380) releasing the mature cytokines which are involved in a variety of inflammatory processes and is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves Gsdmdc1 (Q9D8T2). It belongs to the family of Inflammasomes that includes NLRP3 inflammasome (CPX-4241), NLRC4 inflammasome, AIM2 inflammasome (CPX-4243) and Pyrin inflammasome (CPX-4244). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
