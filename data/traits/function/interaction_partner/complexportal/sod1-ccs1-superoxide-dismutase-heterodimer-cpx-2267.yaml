identifier: ComplexPortal:CPX-2267
label: "SOD1-CCS1 superoxide dismutase heterodimer"
definition: >-
  Complex formation results in the activationof the antioxidant enzyme copper, zinc superoxide dismutase,SOD1 which protects cells against oxygen stress and reactive oxygen species by converting superoxide radicals into water and hydrogen peroxide. SOD1 (CPX-2896) activation involves insertion of copper and oxidation of an intrasubunit disulfide bond. Insertion of copper is required for any enzymatic activity. Oxidation of the disulfide bond is required to increase the enzymatic activity from approximately 10 % in disulfide-reduced SOD1 to 100 % in disulfide-oxidized SOD1. The copper chaperone, CCS1 (CPX-2895), both delivers the copper and oxidises the disulfide bond. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
