identifier: ComplexPortal:CPX-6305
label: "ATP8B4-CDC50A P4-ATPase complex"
definition: >-
  A membrane pump which actively translocates, or flips, phospholipids across cell membranes from the exoplasmic to the cytoplasmic leaflet of the lipid bilayer. This generates and maintains membrane lipid asymmetry, a property essential for a wide variety of cellular processes such as vesicle budding and intracellular vesicle trafficking. Transport is accomplished by cyclic changes between two main enzyme conformations, during which the ATP8B4 ATPase is phosphorylated by ATP at a conserved aspartate residue (Asp-392) and subsequently dephosphorylated. CDC50 proteins are required for transport of P4‐ATPases from the endoplasmic reticulum to their final destinations and may also affect the catalytic cycle of the complex. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
