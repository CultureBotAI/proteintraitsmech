identifier: ComplexPortal:CPX-26664
label: "SPO11, meiotic recombination initiation complex"
definition: >-
  Catalyzed by mei-W68, the complex mediates DNA cleavage to generate double-strand breaks (DSBs) to initiate meiotic recombination in female drosophila. Recombination is absent in male drosophila, suggesting that this mei-W68-complex is not required for male meiosis. May also play a role in mitosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
