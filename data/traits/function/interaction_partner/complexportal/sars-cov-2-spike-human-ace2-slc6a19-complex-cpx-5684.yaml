identifier: ComplexPortal:CPX-5684
label: "SARS-CoV-2 Spike - human ACE2-SLC6A19 complex"
definition: >-
  Internalised SARS-CoV-2 coronavirus Spike - human receptor ACE2 complex binds amino acid transporter SLC6A19 (B0AT1). SLC6A19 may play a regulatory role for the enteric infections of some coronaviruses. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
