identifier: ComplexPortal:CPX-6904
label: "Vacuolar proton translocating ATPase complex, ATP6V0A2 variant"
definition: >-
  Translocates protons across a lipid bilayer via an ATP-driven rotary mechanism, thus acidifing the lumen of its resident organelle. Membrane-bound ion transporters/proton exchangers use the pH gradient to sequester metal ions to the vacuole and other cellular organelles. The combined action of the V-ATPase and membrane transporters plays a key role in maintaining cellular homoeostasis. The ATP6V0A2 variant localizes to the Golgi apparatus. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
