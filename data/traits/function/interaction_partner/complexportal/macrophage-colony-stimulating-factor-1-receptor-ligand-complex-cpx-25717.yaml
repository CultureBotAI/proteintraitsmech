identifier: ComplexPortal:CPX-25717
label: "Macrophage colony-stimulating factor-1 receptor-ligand complex"
definition: >-
  Macrophage attractant cytokine-receptor complex that plays a role in the regulation of hematopoietic precursor cell survival, proliferation and differentiation into heterogeneous populations of monocytes, macrophages, dendritic cells, and bone-resorbing osteoclasts. Also plays a key role in inflammation through its ability to promote the release of pro-inflammatory chemokines. Involved in the reorganization of the actin cytoskeleton and cell migration. CSF1 binding to CSF1R results in receptor phosphorylation and dimerization leading to the activation of several pathways including MAP and SRC kinases, the JAK/STAT, RAS and AMPK1 pathways. The CSF1-CSF1R signalling pathway has overlapping effects with the IL34-CSF1R (CPX-10333) pathway to drive macrophage differentiation but differ in their polarization potential. Uncontrolled expression of CSF1-CSF1R is implicated in both inflammatory diseases, and cancer cell proliferation, invasion and metastases. CSF1-CSFR1 plays a pivotol role in the healthy brain and is essential in brain development, synaptic landscape, infection resolution and neuronal maintenance. CSF1 adjuvant therapy is thought to improve female fertility. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
