identifier: ComplexPortal:CPX-1645
label: "Ste4-Ste18 heterodimer"
definition: >-
  Signal-transmitting component of the G protein heterotrimer in the pheremone response pathway. Activation of the Ste2 receptor by mating pheromone leads to GTP binding and dissociation of the G protein alpha subunit (Gpa1, P08539) from the G protein beta and gamma subunit complex (STE4 and STW18). STE4-STE18 activate the downstream pheromone signaling MAP kinase cascade leading to expression of mating-specific genes, inducing cell cycle arrest in G1, promoting polarized cell growth to form mating projections (shmoos), and establishing the changes in plasma membrane, cell wall and nuclear envelope to permit cell-cell fusion (plasmogamy) and fusion of the two haploid nuclei (karyogamy). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
