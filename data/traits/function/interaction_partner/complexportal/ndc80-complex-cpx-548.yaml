identifier: ComplexPortal:CPX-548
label: "NDC80 complex"
definition: >-
  Crucial for the stable kinetochore-microtubule attachments that are needed to sustain the centromere tensions involved in achieving proper chromosome alignment in eukaryotic cells, with a role in chromosome alignment and microtubule-dependent control of MAD1/MAD2 and dynein complexes at kinetochores. Loss-of-function mutation of any of 4 subunits in yeast causes disrupted kinetochore-microtubule binding and inactivation of the spindle checkpoint, leading to high rate of chromosome loss. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
