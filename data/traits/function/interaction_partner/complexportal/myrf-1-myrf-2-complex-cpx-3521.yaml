identifier: ComplexPortal:CPX-3521
label: "myrf-1-myrf-2 complex"
definition: >-
  Plays a role in the synaptic rewiring of the GABAergic motor neurons (known as dorsal D (DD) neurons) during the early stages of larval development. The complex forms between full length proteins, both of which are subsequently processed in the endoplasmic reticulum and undergo serine-483-dependent auto-cleavage through the intramolecular chaperone auto-processing domain (IPR030392). This results in the translocation of the N-termini complex to the nucleus where it binds to DNA to regulate synaptic rewiring. The C-termini are retained in the endoplasmic reticulum. Synaptic rewiring occurs during the L1 stage and is completed by the late L2 stage of larval development. Early in larval development, DD neurons form new processes onto dorsal muscles whilst the existing ventral synapses are disassembled. At the same time, new ventral motor neurons are generated and are incorporated into the motor circuitry. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
