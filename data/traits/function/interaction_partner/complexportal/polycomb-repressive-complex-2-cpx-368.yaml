identifier: ComplexPortal:CPX-368
label: "Polycomb Repressive Complex 2"
definition: >-
  Chromatin repressor complex that di- and tri-methylates lysine 27 of histone H3 in the early embryo and adult germline to transcriptionally repress target genes. In the germline, silencing occurs on the X chromosomes in hermaphrodites thus controlling germline development. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
