identifier: ComplexPortal:CPX-2142
label: "sufA complex"
definition: >-
  An Fe-S cluster carrier homodimer that accepts the Fe-S cluster from the SufBCD scaffold protein complex (CPX-2123 [complex], EBI-8805910 [transfer interaction]) and transfers it to the target apo-protein. The Fe-S cluster has a [2Fe-2S] conformation when associated with SufA which can transfer its Fe-S cluster to both [2Fe-2S] and [4Fe-4S] apoproteins. It is a component of the sufABCDSE operon, which is activated and required under specific conditions such as oxidative stress and iron limitation. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
