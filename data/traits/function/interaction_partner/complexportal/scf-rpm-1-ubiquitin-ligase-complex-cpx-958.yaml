identifier: ComplexPortal:CPX-958
label: "SCF-rpm-1 ubiquitin ligase complex"
definition: >-
  SCF-rpm-1 is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, rpm-1, forms the substrate recognition subunit. The complex mediates the ubiquitination and subsequent proteasomal degradation of target proteins. The complex is formed at presynaptic periactive zones along dorsal and ventral nerve cords and targets proteins such as scd-2, an ALK tyrosine kinase receptor, to stabilize synapse formation. Required for the restriction and/or maturation of synapses in GABAergic neuromuscular junction (NMJ) presynaptic neurons. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
