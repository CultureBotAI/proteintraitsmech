identifier: ComplexPortal:CPX-2148
label: "Phosphatidylinositol transporter complex"
definition: >-
  Phosphatidylinositol transfer homodimer a lipid droplet-associated protein that inhibits lipid mobilization from these particles. May assist in shuttling sterols or their intermediates, between membranes or, alternatively, between sterol biosynthetic enzymes or complexes. Required for the resistance of yeast cells to azole antifungals. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
