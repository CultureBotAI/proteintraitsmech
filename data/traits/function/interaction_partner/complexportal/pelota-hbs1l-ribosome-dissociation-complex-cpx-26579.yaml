identifier: ComplexPortal:CPX-26579
label: "Pelota-HBS1L ribosome dissociation complex"
definition: >-
  Mediates dissociation of inactive 80S ribosomes associated in a non-translating, inactive pool, for example following stress-induced global shut-down of translation. Binds to the ribosomal A site. GTP hydrolysis, dissociation of HBS1L and accommodation of PELO in the ribosome, results in the binding of ABCE1 (P61221) followed by ATP-dependent subunit dissociation. Also plays a role in RNA quality control in No-Go decay (NGD) pathway, releasing ribosomes that are stalled at the 3'-end of mRNAs lacking a termination codon. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
