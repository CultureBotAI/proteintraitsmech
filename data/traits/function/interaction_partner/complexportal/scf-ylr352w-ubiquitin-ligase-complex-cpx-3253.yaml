identifier: ComplexPortal:CPX-3253
label: "SCF-Ylr352w ubiquitin ligase complex"
definition: >-
  SCF-Ylr352w is a member of the SCF (Skp1-Cullin-F-box) E3 ubiquitin ligase family, in which the F-box protein, Lug1, forms the substrate recognition subunit. The cellular role of this complex is unknown. The complex may form a homodimer. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
