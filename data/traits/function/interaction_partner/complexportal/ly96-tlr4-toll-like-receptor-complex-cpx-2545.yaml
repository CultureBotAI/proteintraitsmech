identifier: ComplexPortal:CPX-2545
label: "LY96-TLR4 toll-like receptor complex"
definition: >-
  Type I membrane receptor that plays a crucial role in innate immunity by recognizing conserved patterns in diverse microbial molecules including lipoproteins, lipopeptides, lipopolysaccharide, flagellin, and nucleic acids. In the early step of bacterial infection, serum lipopolysaccharide (LPS, CHEBI:16412) binds to the N-terminal of LBP (P18428), LPS is then presented to CD14 (P08571) and transferred to LY96 or the LY96-TLR4 toll-like receptor complex. This induces the dimerization of TLR4 TIR domains, initiating CD14-dependent TLR4 endocytosis, and TICAM1/TRIF(Q8IUC6)-dependent signal transduction to promote inflammation caused by LPS. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
