identifier: ComplexPortal:CPX-5702
label: "Kinetochore KNL1 complex"
definition: >-
  Required for normal chromosome alignment and segregation and for kinetochore formation during mitosis and for proper kinetochore microtubule attachments. Binds, at its outer end, to kinetochore microtubule and, at its inner end, to the MIS12 complex (CPX-5701). KNL1, MIS12 and NCD80 (CPX-551) form the KMN protein network. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
