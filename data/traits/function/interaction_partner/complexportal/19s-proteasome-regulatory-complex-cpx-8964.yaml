identifier: ComplexPortal:CPX-8964
label: "19S proteasome regulatory complex"
definition: >-
  The major proteasome regulator when bound to the barrel-shaped 20S Proteasome (CPX-8806) to form the 26S proteasome (single-capped, CPX-5993) or the 30S Proteasome (double-capped, CPX-9086). Recognises and deubiquitinates substrates as they enter the 20S catalytic core, thereby enabling protein degradation and maintaining cellular protein homeostasis. Abundantly found as free 19S near synapses, where there is a large demand for protein turnover. Free 19S is thought to have a moonlighting role as a deubiquitinase (DUB) and independently regulates synaptic proteins in the absence of the 20S core proteasome. The 19S regulatory particle is comprised of 19 integral subunits including six proteasome AAA-ATPases (PSMC1-6) and 13 non-ATPase subunits. PSMD2, PSMD4 and ADRM1 bind to conjugated ubiquitin tags on a protein, while the DUBs, USP14 and UCHL5 (and PSMD14 when bound to 20S) remove ubiquitin modifications and facilitate degradation of the conjugated substrate, thereby enabling the 26S proteasome to degrade substrates in a highly regulated ubiquitin-dependent manner, ensuring its role as the major activator for intracellular proteolysis. A curated stable macromolecular complex (Complex Portal) with 19 subunits.
