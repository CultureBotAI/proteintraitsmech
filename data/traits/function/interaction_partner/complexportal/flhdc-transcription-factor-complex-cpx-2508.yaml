identifier: ComplexPortal:CPX-2508
label: "FlhDC transcription factor complex"
definition: >-
  Trans-acting transcriptional activator that has been shown to bind to the flagellar regulon, which consists of at least 14 operons and more than 50 genes. Master regulator of flagellum biogenesis and swarming migration. Activates flagellum class II genes which encode the flagellar basal body, proteins of the export machinery, the flagellar sigma subunit fliA (P0AEM6), and its anti-sigma factor, flgM (P0AEM4). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
