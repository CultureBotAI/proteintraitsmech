identifier: ComplexPortal:CPX-5053
label: "Neuronal AP-3 Adaptor complex, sigma3b variant"
definition: >-
  Adaptor complex that links clathrin to the membrane surface of synaptic endosomal vesicles and is required for their sorting, vesiculation and recycling. Defects in AP-3 are related to Hermansky-Pudlak syndrome. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
