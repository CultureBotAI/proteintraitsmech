identifier: ComplexPortal:CPX-128
label: "LDLR-PCSK9 complex"
definition: >-
  The formation of the LDLR-PCSK9 complex at neutral pH prevents a conformational change and normal recycling of the low density lipoprotein receptor LDLR following receptor internalization, instead directing LDLR to lysosomal degradation. This results in an increase in levels of low-density lipoprotein cholesterol in peripheral blood. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
