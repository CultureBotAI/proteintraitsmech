identifier: ComplexPortal:CPX-4681
label: "YiaMNO tripartite ATP-independent periplasmic transporter complex"
definition: >-
  ATP-independant, proton-motive-force-driven transporter which utilises an extracytoplasmic solute receptor (ESR) protein to recognize and bind specific ligands with high affinity. The ligand which this transporter binds is unclear but yiaO has been shown to bind 2,3-diketo-L-gulonate (CHEBI:57441), a breakdown product of L-ascorbate (CHEBI:38290). Deletion of the yiaMNO genes resulted in delays in the transition from exponential growth to the stationary phase, decreased high-salt survival and a reduction in biofilm formation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
