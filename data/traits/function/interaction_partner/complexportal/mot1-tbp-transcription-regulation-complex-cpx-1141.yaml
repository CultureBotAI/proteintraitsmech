identifier: ComplexPortal:CPX-1141
label: "MOT1-TBP transcription regulation complex"
definition: >-
  Transcriptional regulation complex, formation of which causes the dissociation of the TATA-binding protein (TBP) from promoters and thereby regulates TBP distribution in the cell. ATP-driven TBP-DNA dissociation by MOT1 involves both the conversion of MOT1 to an open ATPase state to the closed state induced by ATP binding and short range DNA translocation. May form a larger, DNA-dependent, assembly with the NC2 complex (CPX-1662). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
