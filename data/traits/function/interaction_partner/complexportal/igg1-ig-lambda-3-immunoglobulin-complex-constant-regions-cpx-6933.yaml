identifier: ComplexPortal:CPX-6933
label: "IgG1 - Ig lambda 3 immunoglobulin complex, constant regions"
definition: >-
  Membrane-bound or secreted glycoprotein produced by B lymphocytes. In the recognition phase of humoral immunity, the membrane-bound immunoglobulins serve as receptors which, upon binding of a specific antigen, trigger the clonal expansion and differentiation of B lymphocytes into immunoglobulin-secreting plasma cells. Secreted immunoglobulins (also known as antibodies) mediate the effector phase of humoral immunity, which results in the elimination of bound antigens. IgG occurs predominantly in secreted form and is responsible for longlasting humoral immunity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
