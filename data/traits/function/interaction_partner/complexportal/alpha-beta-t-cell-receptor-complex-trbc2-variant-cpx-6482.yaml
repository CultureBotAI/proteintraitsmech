identifier: ComplexPortal:CPX-6482
label: "Alpha-beta T cell receptor complex, TRBC2 variant"
definition: >-
  Antigen-specific receptor on the cell surface of T lymphocytes essential to the immune response. Recognises peptide-major histocompatibility complexes (pMHC) that are displayed by antigen presenting cells, a prerequisite for efficient T cell adaptive immunity against pathogens. Each TCR possesses unique antigen specificity, determined by the antigen binding site created by the variable regions of the alpha and beta subunits (TRAC, TRBC2). Binding of alpha-beta subunits to the antigen bound to MHC initiates TCR clustering on the cell surface. Downstream signalling is activate by LCK (P06239) which phosphorylates the cytoplasmic immunoreceptor tyrosine-based activation motifs (ITAMs) of subunits CD3G, CD3D, CD3E and CD247. As antigens only bind to the extracellular domains of the alpha and beta subunits and they do not possess ITAMs the TCR-pMHC-binding information is probably relayed via the ITAMs of the cytoplasmic tails of the CD3 subunits. A curated stable macromolecular complex (Complex Portal) with 6 subunits.
