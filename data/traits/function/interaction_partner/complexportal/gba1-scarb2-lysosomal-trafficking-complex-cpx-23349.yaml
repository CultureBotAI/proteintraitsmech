identifier: ComplexPortal:CPX-23349
label: "GBA1-SCARB2, lysosomal trafficking complex"
definition: >-
  The GBA1-SCARB2 transport complex forms within the endoplasmic reticulum and travels through the trans-Golgi network to the lysosome where it plays a critical role in lysosomal function and glycosphingolipid metabolism, ensuring proper lysosomal enzyme localization, lipid homeostasis, and glycolipid degradation. Disruption of this complex leads to glucocerebroside accumulation, underlying Gaucher disease, Action Myoclonus-Renal Failure (AMRF) syndrome, and increased Parkinson’s disease risk. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
