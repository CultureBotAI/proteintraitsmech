label: "Nav1.6 voltage-gated sodium channel complex, SCN3B-SCN4B variant"
definition: >-
  Voltage-gated sodium (Nav) channel required for the initiation and transmission of electrical impulses and carries Na+ inward across an excitable membrane. SNCA8 channels are found primarily in the central nervous system. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
