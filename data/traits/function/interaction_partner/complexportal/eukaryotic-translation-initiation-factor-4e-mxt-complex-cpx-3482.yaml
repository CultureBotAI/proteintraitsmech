identifier: ComplexPortal:CPX-3482
label: "Eukaryotic translation initiation factor 4E-Mxt complex"
definition: >-
  Plays a role in translation initiation. The 4E-BP protein mxt-1 competes with eIF4G/ifg-1 (Q7JMF0) for binding to eIF4E/ife-3 when this protein is bound to the 7-methylguanosine-containing 5-prime cap of messenger RNAs. However, in contrast to other 4E-BPs, formation of this complex appears to promote cap-dependent translation initiation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
