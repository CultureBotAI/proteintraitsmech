identifier: ComplexPortal:CPX-74
label: "Phosphatidylinositol 3-kinase complex, class III, UVRAG variant"
definition: >-
  A phosphatidylinositol 3-kinase complex that specifically phosphorylates 1-phosphatidyl-1D-myo-inositol(1−) (CHEBI:57880) in an ATP- and Mn(2+)-dependent manner. Plays a role in later stages of autophagy. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
