identifier: ComplexPortal:CPX-2792
label: "Clathrin complex"
definition: >-
  Major component of coated vesicles, assembling into a polygonal lattice around the invaginating membrane. Interacts with adaptor protein complexes (CPX-2510, CPX-2725, CPX-2727) which in-turn interact with the membrane. After membrane scission, the clatherin cage is disassembled from the vesicle. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
