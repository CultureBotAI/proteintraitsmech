identifier: ComplexPortal:CPX-25720
label: "SHOC2-MRAS-PPP1CC complex"
definition: >-
  Holophosphatase complex which dephosphorylates members of RAF family proteins, RAF1 (P04049), BRAF (P15056) and ARAF (P10398) at key inhibitory phosphorylation sites Ser-259, Ser-365 and Ser-214, respectively, while eliminating inhibitory phosphorylation on RAF family proteins to potentiate MAPK signalling. Functions as a key regulator of RTK-RAS signalling, a pathway which regulates cell proliferation and survival through the MAP kinase cascade. Mutations mapped to protein-protein interfaces in the complex impair complex formation and stabilization. Gain-of-function and loss-of-function mutations in SHOC2 are linked to driving RASopathy and RAS-driven cancers. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
