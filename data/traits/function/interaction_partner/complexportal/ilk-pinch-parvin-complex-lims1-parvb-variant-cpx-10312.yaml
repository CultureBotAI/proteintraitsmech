identifier: ComplexPortal:CPX-10312
label: "ILK-PINCH-Parvin complex, LIMS1-PARVB variant"
definition: >-
  Assembles at sites of focal adhesion where it controls bidirectional signaling between the extracellular matrix and intracellular compartment. The complex triggers F-actin filament bundling thus generating force/mechanical signals which promote cytoskeleton reassembly and cell adhesion. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
