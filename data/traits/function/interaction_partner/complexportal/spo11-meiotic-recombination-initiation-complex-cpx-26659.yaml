label: "SPO11 meiotic recombination initiation complex"
definition: >-
  Catalyzed by SPO11-1/SPO11-2, the complex mediates DNA cleavage to generate double-strand breaks (DSBs) to initiate meiotic recombination. Complex promotes the relaxation of negative and positive supercoiled DNA and DNA decatenation through cleavage and ligation cycles. Complex promotes relaxation of negative and positive supercoiled DNA and DNA decatenation through cleavage and ligation cycles. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
