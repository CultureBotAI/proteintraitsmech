identifier: ComplexPortal:CPX-875
label: "NSL histone acetyltransferase complex"
definition: >-
  A histone acetyltransferase complex that catalyzes the acetylation of histone H4 on lysines 5, 8, and 16 but not on lysine 12. The complex is recruited by phosphorylated c-Jun to the promoter of its target genes where it then catalyzes H4K16 acetylation to promote gene transcription and causes the release of the repressive NuRD complex from c-Jun target genes. Coordination between the NSL complex and MLL/SET complexes promotes histone H3K4 dimethylation via an acetylation-dependent mechanism, further contributing to gene regulation. The NSL complex also plays an important role in the maintenance of pluripotency factors which indirectly ensure the proper expression of the X chromosome in embryonic stem cells. A curated stable macromolecular complex (Complex Portal) with 9 subunits.
