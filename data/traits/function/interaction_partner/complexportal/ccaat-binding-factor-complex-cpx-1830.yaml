identifier: ComplexPortal:CPX-1830
label: "CCAAT-binding factor complex"
definition: >-
  Transcriptional activator that binds to the 5'-CCAAT-3' consensus elements within promoters required for yeast to grow on nonermentable carbon sources such as cytochrome genes, thus acting as a global regulator of respiration. The Hap2/Hap3/Hap5 trimer is sufficient for CCAAT-specific binding at target promoters. Hap4, is necessary for transcriptional activation and is subject to glucose repression. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
