identifier: ComplexPortal:CPX-1867
label: "Nuclear mitotic cohesin complex"
definition: >-
  Required for sister chromatid cohesion during cell division, which enables cells to attach sister kinetochores to microtubules with opposing polarity (bi-orientation) and subsequently resists the tendency of these microtubules to pull chromatids toward opposite spindle poles. Before the commencement of replication, the cohesin complex (CPX-1408) is loaded onto DNA. The arms of the Smc1/3 molecules embrace the DNA, thereby forming a ring of approx. 40 nm diameter. The head domains of Smc1 and Smc3 are locked together by Scc1. Cohesion might be generated as the replication fork passes through the ring, entrapping both sister chromatids inside. At the metaphase to anaphase transition, Scc1 is cleaved by separase, thereby opening the lock of the Smc1/3 head domains. The ring opens and sister chromatids can be pulled to opposite spindle poles. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
