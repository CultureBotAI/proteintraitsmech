identifier: ComplexPortal:CPX-10021
label: "Peroxisomal PEX13-PEX14 docking complex"
definition: >-
  Facilitates the peroxoisomal-membrane docking of cargo-loaded, peroxisomal targeting signal type 1 (PTS1) and PTS2 proteins. Proteins designated for peroxisomes are synthezised on cytosolic ribosomes and are recognised by the receptor PEX5 (P50542) via their PTS1 or PTS2 region. The receptor-cargo-complexes bind to the docking-complex at the peroxisomal membrane. It is assumed that the binding between the docking complex and cargo-loaded receptors leads to the formation of a transient pore. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
