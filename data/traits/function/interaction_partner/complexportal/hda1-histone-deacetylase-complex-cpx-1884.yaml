identifier: ComplexPortal:CPX-1884
label: "HDA1 histone deacetylase complex"
definition: >-
  Class II histone deacetylase, recruited to specific promoter loci through sequence-specific DNA-binding proteins, for example the TUP1 repressor (P16649), and subsequently precisely modifies adjacent nucleosomes at the lysine residues of histones H2B and H3 to repress transcription. Also deacetylates the N-terminal tails of the histones via a nonspecific DNA-binding mechanism. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
