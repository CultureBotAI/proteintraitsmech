identifier: ComplexPortal:CPX-2244
label: "Translation initiation factor complex"
definition: >-
  Required for initiation of protein synthesis, when the ribosome recruits an mRNA for translation and establishes the reading frame by binding initiator tRNA to the start codon in the P site of the small (30S) ribosomal subunit (CPX-3802). Assembles on the 30S subunit to form a transient 30S preinitiation complex (PIC). IF3 and IF2 are the first factors to arrive, forming an unstable 30S–IF2–IF3 complex. Subsequently, IF1 joins and locks the factors in a kinetically stable 30S PIC to which fMet-tRNAfMet is recruited. The complex dissociates on binding of the 50S ribosomal subunit. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
