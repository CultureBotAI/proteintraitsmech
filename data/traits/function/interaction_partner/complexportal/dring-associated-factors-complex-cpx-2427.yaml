identifier: ComplexPortal:CPX-2427
label: "dRING-associated factors complex"
definition: >-
  Polycomb group complex with E3 ubiquitin-protein ligase and histone demethylase activities which maintain the transcriptionally repressive state of homeotic genes throughout the later stages of development. Catalyzes both histone H2A(P84051) Lys-119 ubiquitination, thus adding a specific tag for epigenetic transcriptional repression and also demethylates Lys-36 of histone H3, regulating DNA accessibility to the cellular machineries which require DNA as a template. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
