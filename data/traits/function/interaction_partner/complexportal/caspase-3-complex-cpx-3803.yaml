identifier: ComplexPortal:CPX-3803
label: "Caspase-3 complex"
definition: >-
  A thiol protease complex that is activated by Caspase-9 (CPX-3801 and CPX-3824) and is one of the main effector caspases in mammalian cells. Cleaves and activates Caspase-6 (CPX-3944), Caspase-7 (CPX-3947) and Caspase-9. At the onset of apoptosis it proteolytically cleaves poly[ADP-ribose] polymerase 1 (PARP1, P11103) at a '214-Asp-|-Gly-215' bond. It is also the primary activator of apoptotic DNA fragmentation through inactivation of DNA fragmentation factor subunit alpha (DFFA - O54786). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
