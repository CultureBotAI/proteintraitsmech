identifier: ComplexPortal:CPX-2120
label: "Taurine dioxygenase complex, tetrameric"
definition: >-
  Catalyzes the conversion of taurine and alpha ketoglutarate to sulfite, aminoacetaldehyde and succinate under sulfur or cysteine starvation conditions. Expression is repressed by the presence of sulfate or cysteine. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
