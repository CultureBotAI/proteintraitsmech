identifier: ComplexPortal:CPX-1907
label: Ripoptosome
definition: >-
  Intracellular complex whose formation can induce either the extrinsic apoptotic signaling pathway or necroptosis. Central components are RIPK1 and CASP8, linked through FADD. Formation induced upon stimulation of membrane-bound receptors (TRAIL, CD95 or TLR3) and dependent on depletion of IAP (inhibitor-of-apoptosis) proteins caused by cytokine stimulation, cellular stress or treatment with IAP antagonists. Can recruit different isoforms of IAPs, such as cFLIPs or cFLIPl. Can induce necroptosis or apoptosis, depending on the composition of heterodimers of CASP8 and cFLIP isoforms: predominance of CASP8-CASP8 homodimers induces apoptosis, predominance of CASP8-cFLIP heterodimers induces necroptosis. RIPK3 seems to be dowstream target when the complex induces necroptosis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
