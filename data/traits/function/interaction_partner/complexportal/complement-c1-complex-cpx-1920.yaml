identifier: ComplexPortal:CPX-1920
label: "Complement C1 complex"
definition: >-
  The first component of the classical serum complement system. In the presence of calcium, the C1q complex (CPX-1919) associates with the C1S-C1R-C1R-C1S tetramer. When C1q binds to an activating target, a conformational change triggers the auto-activation of the associated C1R protease (converting the pro-enzyme into an activated form), which activates C1S. C1S then cleaves the Arg-|-Ala bond in complement component C4 to form C4a and C4b, and the Lys(or Arg)-|-Lys bond in complement component C2 to form C2a and C2b which in turn form C3 convertase complexes C4bC2a-A (CPX-5675) and C4bC2a-B. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
