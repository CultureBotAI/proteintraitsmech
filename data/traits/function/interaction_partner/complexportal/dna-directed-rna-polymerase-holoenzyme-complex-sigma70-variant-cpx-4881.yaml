identifier: ComplexPortal:CPX-4881
label: "DNA-directed RNA polymerase holoenzyme complex, Sigma70 variant"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3-prime end of an RNA transcript. Five subunits, rpoA/alpha, rpoB/beta, rpoC/beta-prime and rpoZ/omega form the catalytic core. To initiate promoter specific DNA transcription, the core enzyme has to bind a sigma factor, which helps to direct the polymerase to specific promoters. rpoD/Sigma70 is the primary or housekeeping sigma factor which preferentially transcribes genes associated with fast growth such as ribosomal operons. rpoD is composed of four domains: region 1.1, regions 1.2-2.4, regions 3.0-3.2 and regions 4.1-4.2 which bind to promoter DNA as part of the holoenzyme; domains 2, 3 and 4 recognize the promoter DNA sequences of -10, extended -10, and -35, respectively. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
