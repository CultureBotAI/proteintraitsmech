identifier: ComplexPortal:CPX-2737
label: "miRNA RISC-loading complex"
definition: >-
  Endoribonuclease required for the formation of a mature RNA induced silencing complex (RISC, CPX-2733). Processes precursor miRNAs (pre-miRNAs) to mature miRNAs and then loads them onto AGO1 (Q32KD4). The primary transcripts, pri-miRNAs, are processed to pre-miRNAs in the nucleus by an RNase III enzyme, drosha (Q7KNF1). Upon export to the cytoplasm, pre-miRNAs are further processed by DCR-1. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
