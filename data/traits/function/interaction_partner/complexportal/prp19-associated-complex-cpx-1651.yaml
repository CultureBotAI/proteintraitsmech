label: "PRP19-associated complex"
definition: >-
  Required for defining the specificity of interaction of the U5 and U6 small nuclear ribonucleoprotein particles with the 5' splice site to stabilize their association with the spliceosome after U4 is dissociated. A curated stable macromolecular complex (Complex Portal) with 43 subunits.
