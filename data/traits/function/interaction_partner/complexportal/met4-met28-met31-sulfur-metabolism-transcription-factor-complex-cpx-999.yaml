identifier: ComplexPortal:CPX-999
label: "MET4-MET28-MET31 sulfur metabolism transcription factor complex"
definition: >-
  Transcription factor complex regulating sulfur metabolism. MET4 lacks DNA-binding ability and relies on interactions with MET31 and MET32 (Q03081), paralogous proteins that bind the same cis-regulatory element, to activate its targets. MET31 and MET32 are C2H2 zinc finger-containing proteins that act solely as adaptors for recruiting MET4 to promoters, binding to sites with a TGTGGC core. MET28 acts to stabilise the complex. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
