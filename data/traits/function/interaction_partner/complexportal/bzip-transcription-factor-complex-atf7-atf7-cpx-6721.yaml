label: "bZIP transcription factor complex, ATF7-ATF7"
definition: >-
  Transcription factor complex which binds to a specific DNA consensus sequence to regulate transcription. Required to maintain epithelial regenerative capacity and protect against cell death during intestinal epithelial damage and repair. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
