identifier: ComplexPortal:CPX-2102
label: "Cytochrome bo3 ubiquinol oxidase complex"
definition: >-
  A heme-copper oxidase integral to the bacterial electron transport chain. Electrons are donated by the oxidation of ubiquinol to ubiquinone, transferred to a slow-spinning heme b and subsequently accepted by a binuclear centre consisting of a heme o3 and a copper ion. In the process, the ubiquinol oxidase functions as a proton pump creating a transmembrane electrochemical gradient as 4 hydrogen ions are pumped through the membrane into the periplasmic space while 1/2 O2 molecule is oxidized to water. The electron transport happens exclusively in subunit I (cyoB). Ubiquinol oxidase is the final electron acceptor in the bacterial respiratory chain and thought to possess one of the most important functions in the cellular system due to its anti-oxidant properties. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
