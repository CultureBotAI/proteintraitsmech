label: "RIC1-RGP1 guanyl-nucleotide exchange factor complex"
definition: >-
  Guanine nucleotide exchange factor recruited by RAB33B (Q9H082) to the Golgi membrane to function as a GEF for RAB6A (P20340) activation by exchanging bound GDP for free GTP. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
