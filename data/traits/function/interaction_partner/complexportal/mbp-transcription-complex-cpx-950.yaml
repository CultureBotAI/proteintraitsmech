identifier: ComplexPortal:CPX-950
label: "MBP transcription complex"
definition: >-
  Heteromeric transcription factor, composed of a regulatory subunit (Swi6) and a DNA-binding protein (Mbp1), that activates gene expression during the G1/S transition of the cell cycle. Binds to a sequence motif called the MCB element (MluI cell cycle box, ACGCGTNA) which acts as a late Gl-specific UAS element in genes predominantly involved in DNA replication and repair . A curated stable macromolecular complex (Complex Portal) with 2 subunits.
