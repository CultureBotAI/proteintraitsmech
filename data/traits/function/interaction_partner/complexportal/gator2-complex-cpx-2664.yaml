identifier: ComplexPortal:CPX-2664
label: "GATOR2 complex"
definition: >-
  Functions as an activator of the amino acid-sensing branch of the mTORC1 pathway. Indirectly activates mTORC1 through the inhibition of the Rag GTPase activating protein activity GATOR1 complex (CPX-2781). A curated stable macromolecular complex (Complex Portal) with 5 subunits.
