identifier: ComplexPortal:CPX-8126
label: "CRL3 E3 ubiquitin ligase complex, KLHL25 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. CRL3-KLHL25 target proteins include the ATP-citrate lyase (P53396) which converts mitochondrial-derived citrate into acetyl-CoA and oxaloacetic acid, and provides the main acetyl-CoA source for de novo fatty acid synthesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
