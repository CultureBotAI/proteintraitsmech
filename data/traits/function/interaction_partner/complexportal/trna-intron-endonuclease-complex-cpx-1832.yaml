identifier: ComplexPortal:CPX-1832
label: "tRNA-intron endonuclease complex"
definition: >-
  Catalyzes the first step of tRNA splicing, cleaving the splice sites of all the intron-containing pre-tRNAs, either in the nucleus or on the mitochondrial surface after their export out of the nucleus. The products are an intron and two tRNA half-molecules bearing 2',3' cyclic phosphate and 5'-OH termini. There are no conserved sequences at the splice sites, but the intron is invariably located at the same site in the gene, placing the splice sites an invariant distance from the constant structural features of the tRNA body. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
