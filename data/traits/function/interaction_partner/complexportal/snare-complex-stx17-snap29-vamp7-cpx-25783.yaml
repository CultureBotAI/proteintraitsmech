identifier: ComplexPortal:CPX-25783
label: "SNARE complex STX17-SNAP29-VAMP7"
definition: >-
  SNARE complex required for the fusion of the double-membraned autophagosome with the single-membraned lysosome during starvation-induced bulk autophagy. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the fusing membranes and initiates membrane fusion. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
