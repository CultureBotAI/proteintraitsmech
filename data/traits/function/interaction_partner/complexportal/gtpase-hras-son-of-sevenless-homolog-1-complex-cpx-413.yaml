identifier: ComplexPortal:CPX-413
label: "GTPase Hras - Son of sevenless homolog 1 complex"
definition: >-
  A RAS GTPase complex responsible for intracellular transduction of signals received through cell-surface receptor tyrosine kinases. Activated Hras.GTP promotes cell growth and survival. Ras and Sos1 allosterically activate each other: binding of inactive Hras.GDP to Sos1 stimulates Sos1 nucleotide exchange activity which in turn leads to Hras binding GTP in place of GDP. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
