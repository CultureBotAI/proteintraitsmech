identifier: ComplexPortal:CPX-5899
label: "ibaG-grxD iron-sulfur cluster assembly complex"
definition: >-
  Implicated in Fe-S cluster assembly and trafficking, transferring an intact Fe-S cluster to an apo acceptor protein. CGFS-type Grxs form [2Fe-2S]-bridged homodimers with the active site cysteines and two GSH molecules ligating the Fe-S cluster. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
