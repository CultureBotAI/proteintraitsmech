identifier: ComplexPortal:CPX-5322
label: "Endosomal SNARE complex TLG2-VTI1-TLG1-SNC1"
definition: >-
  SNARE complex required for the fusion of endosomal vesicles with the trans-Golgi network. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the fusing membranes and initiates membrane fusion. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
