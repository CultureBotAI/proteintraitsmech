identifier: ComplexPortal:CPX-1816
label: "Integrin alpha9-beta1 complex"
definition: >-
  Cell adhesion, bi-directional signaling receptor which functions as a link between the extra-cellular matrix and the cytoskeleton. Receptor for VCAM1, cytotactin and osteopontin. It recognizes the sequence A-E-I-D-G-I-E-L in cytotactin. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
