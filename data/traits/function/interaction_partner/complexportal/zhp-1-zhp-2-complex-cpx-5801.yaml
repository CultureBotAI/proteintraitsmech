identifier: ComplexPortal:CPX-5801
label: "ZHP-1-ZHP-2 complex"
definition: >-
  Required for crossover formation and subsequent chromosome segregation during meiotic recombination. During meiotic pachytene, recruited to the Synaptonemal complex (CPX-3388) in between homologous chromosome pairs, where it promotes the accumulation of pro-crossover proteins including the ZHP-3-ZHP-4 heterodimer (CPX-5802), at a designated crossover site along the recombination intermediate. Limits the number of crossover sites along a recombination intermediate by restricting the association of these pro-crossover proteins with other recombination sites during late prophase. Plays a role in chromosome remodeling following crossover formation to promote two successive rounds of chromosome segregation during meiosis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
