identifier: ComplexPortal:CPX-375
label: "brc-1/brd-1 E3 ubiquitin ligase complex"
definition: >-
  E3 ubiquitin ligase containing complex that mediates the formation of 'Lys-6'-linked polyubiquitin chains and coordinates a diverse range of cellular pathways such as DNA damage repair, ubiquitination and transcriptional regulation to maintain genomic stability, initiating homologous recombination at stalled replication forks. The E3-ubiquitin ligase is responsible for ubiquitination at DNA-damage sites in response to ionizing radiation. The complex associates with the E2-ubiquitin-conjugating enzyme, let-70, to form an active E3-ubiquitin ligase on chromatin in response to DNA damage. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
