identifier: ComplexPortal:CPX-3098
label: "PKR pyruvate kinase complex"
definition: >-
  A pyruvate kinase that catalyzes the phosphotransfer reaction between phosphoenolpyruvate (PEP, CHEBI:18021) and ADP (CHEBI:16761), producing pyruvate (CHEBI:15361) and ATP (CHEBI:15422), the final step in glycolysis. Provides key regulation for maintaining the balance between gluconeogenesis and glycolysis. Expressed exclusively in red cells. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
