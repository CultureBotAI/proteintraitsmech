identifier: ComplexPortal:CPX-5401
label: "Vacuolar SNARE complex VAM3-VTI1-VAM7-NYV1"
definition: >-
  SNARE complex required for homotypic vacuole fusion and is important for vacuole formation. SNARE assembly also appears to promote Ca2+ release from the vacuole lumen. Mediates membrane fusion through the spontaneous assembly of four complementary SNARE (soluble N-ethylmaleimide-sensitive factor attachment protein receptors) motifs. SNAREs bind to each other in-trans, that is, with SNAREs anchored in each apposed tethered membrane. The assembly process leads to a tight connection between the linked membranes and initiates membrane fusion. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
