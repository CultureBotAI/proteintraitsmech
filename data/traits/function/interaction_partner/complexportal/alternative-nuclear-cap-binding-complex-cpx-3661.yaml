identifier: ComplexPortal:CPX-3661
label: "Alternative nuclear cap-binding complex"
definition: >-
  Binds co-transcriptionally to the 5-prime, m7GpppG-cap (m7G-cap) structures of RNA polymerase II transcripts (mainly pre-mRNAs and some asRNAs and lincRNAs). Required for mRNA export from the nucleus (by way of binding to TREX complex). Possibly required for RNA interference (by way of binding asRNAs and lincRNAs) and splicing (by way of binding to exon-junction complex). Also binds serrate (Srrt/Ars2, Q99MR6) which is associated with suppression of poly-A tail formation in histone 3-prime end pre-mRNA processing (by comparison with classic CBC, CPX-923). Does not appear to bind snRNAs. By way of comparison with classic CBC, alternative CBC is probably replaced by the cytoplasmic cap-binding complex eIF4F by binding to importin complex. Importin-complex-bound CBC gets reimported into the nucleus for reuse. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
