identifier: ComplexPortal:CPX-137
label: "VCP-NPL4-UFD1 AAA ATPase complex"
definition: >-
  A type II AAA ATPase that is involved in the dislocation/extraction step of retrotranslocation of misfolded proteins from the endoplasmic reticulum (ER) into the cytosol where they are polyubiquitinated and degraded by the proteasome as part of the ER-associated protein degradation (ERAD) pathway. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
