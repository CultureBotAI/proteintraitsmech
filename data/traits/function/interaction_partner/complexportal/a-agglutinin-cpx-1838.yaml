identifier: ComplexPortal:CPX-1838
label: a-agglutinin
definition: >-
  Cell surface mannoproteins that mediate cell-cell adhesion of haploid cells during mating. The a- and alpha-agglutinins, expressed by MATa and MATalpha cells, respectively, interact directly with 1:1 stoichiometry. Exposure to the pheromone expressed by the opposite mating type induces agglutinin expression and thus facilitates the agglutination reaction. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
