identifier: ComplexPortal:CPX-5787
label: "AMPK complex, alpha2-beta1-gamma1 variant"
definition: >-
  Energy sensor serine/threonine kinase that plays a key role in regulating cellular energy metabolism. Energy stress manifests as a drop in the ratio of adenosine triphosphate (ATP) to AMP/ADP, which activates AMPK's kinase activity, allowing it to upregulate ATP-generating catabolic pathways and to reduce energy-consuming catabolic pathways and cellular programs: inhibits protein, carbohydrate and lipid biosynthesis, as well as cell growth and proliferation. AMPK acts via direct phosphorylation of metabolic enzymes, and by longer-term effects via phosphorylation of transcription regulators. It has, preferentially, a nuclear localisation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
