identifier: ComplexPortal:CPX-2134
label: "ThiF-ThiS complex"
definition: >-
  Catalyses the initial steps of thiamine (vitamin B1) pyrophosphate synthesis. thiF catalyzes the adenylation of the carboxy terminus of thiS and the subsequent displacement of AMP catalyzed by thiI (P77718)-persulfide to give a thiS−thiI acyl disulfide. Disulfide interchange, involving thiF Cys-184, then generates the thiS−thiF acyl disulfide, the sulfur donor for thiazole formation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
