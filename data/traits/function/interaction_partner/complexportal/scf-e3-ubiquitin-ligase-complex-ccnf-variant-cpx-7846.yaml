identifier: ComplexPortal:CPX-7846
label: "SCF E3 ubiquitin ligase complex, CCNF variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-CCNF target proteins include CP110 (O43303) during G2 phase, the complex thereby acts as an inhibitor of centrosome reduplication. It also ubiquitinylates E2F1 (Q01094) during the G2/M phase of the cell cycle, preventing DNA replication stress. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
