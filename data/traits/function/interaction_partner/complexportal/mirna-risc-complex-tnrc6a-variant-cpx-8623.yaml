identifier: ComplexPortal:CPX-8623
label: "miRNA RISC complex, TNRC6A variant"
definition: >-
  Incorporates one strand of a micro RNA (miRNA) and uses this as a template for recognizing complementary mRNA. During strand selection, one of the miRNA strands is selected and anchored into the AGO protein, while the other strand is unwound and targeted for degradation, a process which involved a nick created by AGO2 to which the C3PO complex (CPX-890) is recruited. Base-pairing complementation by the guide strand binds the RISC complex to its target mRNA. Binding to a perfectly complementary mRNA generally results in silencing due to endonucleolytic cleavage of the mRNA specifically by AGO2. Binding of RISC to a partially complementary mRNA results in silencing through inhibition of translation which does not require endonuclease activity.The TNRC6 scaffolding protein acts to recruit other proteins which repress the translation of the target mRNA and accelerate mRNA decay. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
