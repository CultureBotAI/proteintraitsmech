identifier: ComplexPortal:CPX-5825
label: "PRP19-CDC5L complex"
definition: >-
  Forms an integral part of the spliceosome and is required for activating pre-mRNA splicing by participating in the rearrangement of small nuclear ribonucleoprotein (snRNP) particles. May also play a role in the response to DNA damage (DDR). A curated stable macromolecular complex (Complex Portal) with 7 subunits.
