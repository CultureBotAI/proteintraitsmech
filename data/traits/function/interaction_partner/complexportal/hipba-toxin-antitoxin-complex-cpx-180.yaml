identifier: ComplexPortal:CPX-180
label: "HipBA toxin-antitoxin complex"
definition: >-
  Type II toxin-antitoxin (TA) system formed by the toxin (hipA), and the antitoxin (hipB). TA systems act as effectors of dormancy and persistence, with the toxin causing growth arrest by interfering with a vital cellular process, such as transcription, translation or DNA replication, and the cognate antitoxin neutralizing the toxin activity during normal growth conditions. The protein kinase HipA acts as a persistence factor, inducing multi-drug tolerance by triggering growth arrest. HipA activity is inhibited upon binding to HipB through sequestration to the nucleoid and binding to DNA. Under conditions of stress the antitoxins are selectively degraded by cellular proteases such as Lon (P0A9M0) and ClpXP (CPX-3176), leaving the toxins to exert their effectsl which result in growth arrest and cell dormancy. Both the antitoxin and, in most cases, the TA complex bind the TA promoter to repress transcription, with TA complexes repressing transcription more efficiently than the antitoxins alone by increasing the co-operativity of antitoxin binding to operators. Complex formation prevents the protein kinase HipA acting as a persistence factor, inducing multi-drug tolerance by triggering growth arrest. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
