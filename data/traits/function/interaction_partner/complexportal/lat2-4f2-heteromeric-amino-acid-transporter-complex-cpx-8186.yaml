identifier: ComplexPortal:CPX-8186
label: "LAT2-4F2 heteromeric amino acid transporter complex"
definition: >-
  L-type amino acid transporter which catalyses the transmembrane electroneutral antiport of large neutral amino acids, such as phenylalanine, tyrosine, leucine, histidine, methionine, tryptophan, valine, isoleucine and alanine, and also cysteine in a sodium- and pH-independent manner. Also transports thyroid hormones T3 and T4. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
