identifier: ComplexPortal:CPX-2370
label: "PAF1 complex"
definition: >-
  A multifunctional complex involved in many aspects of RNA polymerase II (Pol II, CPX-2625) transcriptional regulation, including transcriptional elongation, 3'-terminal end processing, and histone modification. Role in 3'-end formation of mRNAs, required for the recruitment of cleavage and polyadenylation factors CFT1 and PCF11 to RNA polymerase II. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
