identifier: ComplexPortal:CPX-9129
label: "RPD3L histone deacetylase complex"
definition: >-
  Histone deacetylase recruited to promoters in association with specific transcription factors where it acts as a promoter targeted regulator of transcription by deacetylating lysine residues on the N-terminal region of the core histones (H2A, H2B, H3 and H4). Potential additional components include laf1 (O13719) and laf2 (O74443). A curated stable macromolecular complex (Complex Portal) with 10 subunits.
