identifier: ComplexPortal:CPX-8836
label: "Interleukin-27 receptor-ligand complex"
definition: >-
  Transmembrane complex formed on the binding of the dimeric, extracellular interleukin-27 (IL-27, CPX-8822) to its receptor composed of IL-6RB (gp130) and the IL-27RA chains. Ligand binding results in the assembly of the complete complex, inducing the transphosphorylation of JAK1/2 molecules and phosphorylation of the cytoplasmic tails of the receptors. STAT monomers bind to the phosphorylated site of the receptor and are phosphorylated by JAK. Phosphorylated STATs dissociate from the receptors, dimerize, and translocate into the nucleus where they induce the transcription of target genes. IL-27 activation of STATs is dependent on the cell-type and activation state, for example, STAT1, STAT3, STAT5 and low amounts of STAT4 are activated by IL-27 in CD4+ cells. IL-27 induction of T helper 1 (Th1) differentiation is thought to occur through the p38 MAPK/T-bet and ICAM-1/LFA-1/ERK1/2 signaling cascade. A pleiotropic cytokine with both anti- and pro-inflammatory activity, IL-27 is capable of exerting both innate and adaptive immune responses. In myeloid cells, IL-27 possesses both pro-apoptotic functions and anti-apoptotic functions through activation of STAT1 and STAT3, respectively. Increases neuronal survival in various diseases and injuries of the central nervous system (CNS) and IL-27 binding to gp130 plays a critical role in reducing ischemia reperfusion injury through the activation of STAT3, to promote the expression of anti-apoptotic protein BCL2. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
