identifier: ComplexPortal:CPX-1276
label: "HMC complex"
definition: >-
  Represses HAP1 activity in the absence of heme, thus modulating oxygen dependent gene expression. The HMC complex is associated with low DNA-binding and transcriptional activities. Heme disrupts the HMC and allows HAP1 to form a dimer, with higher DNA-binding and transcription rate properties. A curated stable macromolecular complex (Complex Portal) with 7 subunits.
