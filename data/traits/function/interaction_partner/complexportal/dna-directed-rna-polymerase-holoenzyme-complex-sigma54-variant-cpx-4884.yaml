identifier: ComplexPortal:CPX-4884
label: "DNA-directed RNA polymerase holoenzyme complex, Sigma54 variant"
definition: >-
  Catalyzes the transcription of RNA from an DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3-prime end of an RNA transcript. Five subunits, rpoA/alpha, rpoB/beta, rpoC/beta-prime and rpoZ/omega form the catalytic core. To initiate promoter specific DNA transcription, the core enzyme has to bind a sigma factor, which helps to direct the polymerase to specific promoters. rpoN acts as a master switch to turn on genes involved in nitrogen assimilation, motility, host colonization, and biofilm formation. rpoN promoters additionally encode an insulator sequence to dampen unwanted translation, preventing accidental expression of rpoN-controlled genes arising from transcriptional read-through. This is due to the presence of loosely defined, short CT-rich motifs of 3-5 bp (CTmers), where the strength of silencing was dependent on the number and the position of the CTmers. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
