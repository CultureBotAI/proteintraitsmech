identifier: ComplexPortal:CPX-511
label: "MUS81-EME1 structure-specific endonuclease complex"
definition: >-
  Structure-specific endonuclease that plays an important role in rescuing stalled replication forks and resolving the mitotic recombination intermediates. The complex recognizes the branched DNA intermediates and typically cleaves 3-6 base pairs of the 5-prime regions of the junction crossover point. Preferentially cleaves four-way DNA junctions, such as nicked Holliday Junctions (nHJs), D-loops, 3-prime flap DNA substrates that contain an exposed 5-prime DNA strand end at or close to the junction crossover point and replication forks, via the “nick and counternick” mechanism. DNA binding induces conformational changes in the linkers connecting the nuclease and HhH2 domains of MUS81 and EME1, which transforms the complex from a compact to an open state. These changes unmask the hydrophobic wedge that separates pre‐ and post‐nick duplex and create the 5-prime end binding pocket facilitating the DNA substrate bending by the complex, ultimately placing the incision strand at the active site of MUS81. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
