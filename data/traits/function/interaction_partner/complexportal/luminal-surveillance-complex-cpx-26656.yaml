identifier: ComplexPortal:CPX-26656
label: "Luminal surveillance complex"
definition: >-
  Recognizes the protein determinant required for ER-associated degradation (ERAD) of mis-folded proteins, recruiting substrates to SYVN1-associated machinery, and activating downstream events that commit substrates for degradation. The complex recognizes misfolded glycoproteins independent of their glycosylation status and brings them to the downstream ubiquitination/extraction machinery. However the commitment step to destruction requires the lectin ERLEC1, which recognizes the glycan species found on terminally misfolded proteins. Failure of ERAD-mediated degradation leads to the accumulation of misfolded proteins in neurons, a pathological feature of neurodegenerative diseases, including Alzheimer’s disease, Parkinson’s and Amyotrophic Lateral Sclerosis. SYVN1-associated mutations have also been reported to cause embryonic lethality, developmental delay and other disorders post-birth. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
