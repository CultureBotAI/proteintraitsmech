identifier: ComplexPortal:CPX-250
label: "GABA-A receptor, alpha1-beta2-gamma2"
definition: >-
  Ligand-gated chloride channel which acts as the main driver of fast inhibitory neurotransmission in the nervous system. GABA (CHEBI:16865), the major inhibitory neurotransmitter in the vertebrate brain, mediates neuronal inhibition by binding to the GABA/benzodiazepine receptor and opening a chloride ion-selective pore. GABA-A receptors assemble in specific combinations of receptor subunits from a pool of nineteen in a cell-type specific manner, giving rise to receptors with distinct distributions and functions in both physiological and disease states. Their many allosteric sites, which bind compounds with anticonvulsant, anti-anxiety, analgesic, sedative and anaesthetic properties make GABA-A receptors attractive drug targets. The alpha1-beta2-gamma2 conformation is thought to be the most common GABA-A receptor found in the brain. Also found in liver, smooth airways muscle and immune cells. Mediates the sedative, anterograde amnestic and in part anticonvulsant actions of diazepam. Isoform 1 and isoform 2 of GABRB2 show reduced expression in schizophrenic brain. Isoform 3 shows increased expression in schizophrenic and bipolar disorder brains while isoform 4 shows reduced expression. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
