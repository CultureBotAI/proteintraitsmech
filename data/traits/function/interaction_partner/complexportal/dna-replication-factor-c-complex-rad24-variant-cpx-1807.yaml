identifier: ComplexPortal:CPX-1807
label: "DNA replication factor C complex, RAD24 variant"
definition: >-
  DNA-dependent ATPase clamp-loader complex for the Rad17-Mec3-Ddc1 checkpoint clamp complex (CPX-1806). During a clamp loading circle, the RFC:clamp complex binds to DNA and the recognition of the double-stranded/single-stranded junction stimulates ATP hydrolysis by RFC. The complex presumably provides bipartite ATP sites in which one subunit supplies a catalytic site for hydrolysis of ATP bound to the neighbouring subunit. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
