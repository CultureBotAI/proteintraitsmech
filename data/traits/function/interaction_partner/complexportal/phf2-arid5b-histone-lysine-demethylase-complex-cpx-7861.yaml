identifier: ComplexPortal:CPX-7861
label: "PHF2-ARID5B histone lysine demethylase complex"
definition: >-
  Histone lysine demethylase which acts as a signal-sensing epigenetic determinant through removal of a repressive histone methylation mark on transcriptionally responsive promoters. Complex formation results in the demethylation of ARID5B by PHF2 and the subsequent recruitment of the complex to H3K9me2-marked promoters of specific genes regulated by transcription factor SOX9 (P48436) or the lipogenic transcription factor MLXIPL (Q9NP71). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
