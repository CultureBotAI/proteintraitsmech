identifier: ComplexPortal:CPX-2125
label: "SufE complex"
definition: >-
  Sulfur transfer homodimer that accepts the atomic sulfur resulting from the L-cysteine desulfurase activity of SufS (CPX-2124) and further transfers it to the SufBCD scaffold protein complex (CPX-2123). It is a component of the sufABCDSE operon, which is activated and required under specific conditions such as oxidative stress and iron limitation. It plays a role in the iron-sulfur cluster formation on SufBCD. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
