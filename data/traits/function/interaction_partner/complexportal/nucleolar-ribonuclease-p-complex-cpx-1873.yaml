identifier: ComplexPortal:CPX-1873
label: "Nucleolar ribonuclease P complex"
definition: >-
  Responsible for the 5' endonucleolytic cleavage of precursor tRNAs (pre-tRNAs), catalyzing phosphodiester bond hydrolysis to remove approximately 12 leader nucleotides to yield mature tRNAs. The RNA subunit of the nucleolar RNase P is a catalytically active ribozyme that is capable of both recognizing and cleaving substrates efficiently and accurately. The protein component serves as an absolutely required cofactor. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
