identifier: ComplexPortal:CPX-1052
label: "TRM9-TRM112 methyltransferase complex"
definition: >-
  S-adenosylmethionine-dependent methyltransferase involved in the formation of mcm5(s2)U (5-methoxycarbonylmethyl(2-thio)uridine) modifications at position 34 from the anticodon loop of some tRNAs. This modification is present at the wobble position of tRNAArg(UCU), tRNAGly(UCC), tRNALys(UUU), tRNAGln(UUG) and tRNAGlu(UUC). Modifications in the anticodon loop of tRNAs are known to influence the translation rate and fidelity of decoding. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
