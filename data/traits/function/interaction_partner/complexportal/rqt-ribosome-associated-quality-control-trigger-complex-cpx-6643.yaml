identifier: ComplexPortal:CPX-6643
label: "RQT ribosome-associated quality control trigger complex"
definition: >-
  Recognizes ubiquitinated stalled ribosomes and induces subunit dissociation to facilitate the ribosome-associated quality control (RQC) pathway. The complex associates with E3 ubiquitin-ligase HEL2 (Q05580)-ribosome complexes and required for the primary steps of RQC. The ubiquitin-binding activity of RQT3 and ATPase activity of CUE3 were crucial to trigger RQC.by the RQC complex (CPX-3265). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
