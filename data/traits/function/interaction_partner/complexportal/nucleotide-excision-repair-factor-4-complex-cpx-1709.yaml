identifier: ComplexPortal:CPX-1709
label: "Nucleotide excision repair factor 4 complex"
definition: >-
  An ATP-dependent damage recognition factor required for repair of damaged, nontranscribed DNA, in a process whereby DNA is incised on both sides of the lesion, resulting in the removal of a fragment approximately 25-30 nucleotides long. Locates damage on the non-transcribed strand and in transcriptionally inactive regions of the genome, with ABF1 binding to specific sites increasing the efficiency of the repair process. RAD16 appears to generate superhelical torsion in the DNA in one direction originating from the ABF1-binding site and may remodel chromatin to generate the space for DNA repair synthesis. Subsequent to binding the DNA lesion, the NEF4 complex may serve as a nucleation site for the assembly of the other repair components for dual incision to occur. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
