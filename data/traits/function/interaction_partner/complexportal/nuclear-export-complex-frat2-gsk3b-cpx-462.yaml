identifier: ComplexPortal:CPX-462
label: "Nuclear export complex FRAT2-GSK3B"
definition: >-
  Role in beta-catenin destruction complex disassembly. GSK3B-FRAT2 cannot bind to Axin and thus GSK3B is inhibited from participating in the Axin-dependent phosphorylation of CTNNB1. Initially forms a quaternary FRAT2-DVL-GSK3B-AXIN complex which dissociates, with GSK3B maintaining its association with FRAT2. GSK3B-FRAT2 then translocates from the nucleus to the cytoplasm. The binding of FRAT2 does not inhibit GSK3B from phosphorylating glycogen synthase. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
