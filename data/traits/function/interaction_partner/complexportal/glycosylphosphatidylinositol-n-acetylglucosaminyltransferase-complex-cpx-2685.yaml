identifier: ComplexPortal:CPX-2685
label: "Glycosylphosphatidylinositol-N-acetylglucosaminyltransferase complex"
definition: >-
  Monoglycosyltransferase complex that catalyses the transfer of N-acetylglucosamine from UDP-N-acetylglucosamine to the 6-position of phosphatidylinositol, the first, and committed, step of glycosylphosphatidylinositol (GPI) biosynthesis. GPI is a complex glycolipid with a core structure, phosphoethanolamine-6-mannose-alpha1,2-mannose-alpha1,6-mannose-alpha1,4-glucosamine-alpha1,6-inositol-phospholipid that functions as a membrane anchor for many cell surface proteins. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
