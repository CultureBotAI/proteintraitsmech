identifier: ComplexPortal:CPX-2390
label: "Class IA phosphatidylinositol 3-kinase complex"
definition: >-
  Uses 1-phosphatidyl-1D-myo-inositol (CHEBI:16749), 1-phosphatidyl-1D-myo-inositol 4-phosphate (CHEBI:17526) 1-phosphatidyl-1D-myo-inositol 4,5-bisphosphate/PI(4,5)P2 (CHEBI:18348) as substrates to generate the products 1-phosphatidyl-1D-myo-inositol 3-phosphate (CHEBI:17283), 1-phosphatidyl-1D-myo-inositol 3,4-bisphosphate (CHEBI:16152) and 1-phosphatidyl-1D-myo-inositol 3,4,5-trisphosphate/PI(3,4,5)P3 (CHEBI:16618) respectively, thus initiating major signaling pathways downstream. Performs a central role in cellular signaling, mediating responses to growth factors and extracellular stimuli. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
