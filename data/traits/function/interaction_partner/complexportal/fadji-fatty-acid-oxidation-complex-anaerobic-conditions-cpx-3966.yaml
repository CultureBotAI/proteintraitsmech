identifier: ComplexPortal:CPX-3966
label: "fadJI fatty acid oxidation complex, anaerobic conditions"
definition: >-
  Catalyzes the oxidiation of fatty acids under anaerobic conditions using a terminal respiratory electron acceptor such as nitrate. The beta-oxidation pathway acts in a cyclic fashion, in which each cycle results in shortening the input acyl-CoA by two carbon atoms to give acetyl-CoA. Produces acetyl-CoA molecules enter the citric acid cycle (Krebs cycle) to be oxidized for energy production. This complex has multiple enzymatic activities including hydration, oxidation and thiolytic cleavage functions and is capable of oxidising fatty acids such as octanoate and decanoate, that cannot be used by Escherichia coli under aerobic conditions. The complex may be partially functional redundant with FadBA (CPX-3964) and be active under aerobic conditions, increasing the efficiency of beta-oxidation under these circumstances by favouring substrates of different chain length. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
