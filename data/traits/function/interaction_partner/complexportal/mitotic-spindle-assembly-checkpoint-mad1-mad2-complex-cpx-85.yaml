identifier: ComplexPortal:CPX-85
label: "Mitotic spindle assembly checkpoint MAD1-MAD2 complex"
definition: >-
  Acts at the spindle checkpoint, in a surveillance mechanism that mediates a delay in the onset of anaphase, until all chromosomes are properly attached to the mitotic or meiotic spindle. Inhibits Cdc20, the mitotic co-activator of the anaphase-promoting complex/cyclosome (APC/C), an E3 ubiquitin ligase. Mad2 adopts two distinct conformations; when unbound, it adopts an open conformation (O-Mad2) but upon binding to Mad1, the Mad2 C-terminal tail crosses the entire surface of the beta-sheet and locks Mad1. Upon mitotic entry, the Mad1-C-Mad2 core complex is recruited to kinetochores. Because Mad2 can dimerise, O-Mad2 from the cytosol can then be recruited to kinetochore-bound Mad1-C-Mad2. C-Mad2 within the Mad1-C-Mad2 core complex acts as a prion-like template, catalysing the conversion of additional O-Mad2 proteins to the closed conformation and in doing so binding Cdc20. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
