identifier: ComplexPortal:CPX-9661
label: "TIFA-TIFAB signalling regulator complex"
definition: >-
  Formation of the TIFA-TIFAB heterodimer prevents TIFA dimerization, thus blocking the formation of the TRAF6-TIFA E3 ubiquitin ligase complex which is required for NF-kappa-B (P19838) activation. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
