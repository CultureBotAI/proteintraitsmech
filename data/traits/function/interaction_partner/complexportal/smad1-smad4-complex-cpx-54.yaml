identifier: ComplexPortal:CPX-54
label: "SMAD1-SMAD4 complex"
definition: >-
  A transcription factor complex which binds to the promoters of target genes and recruits co-activators and histone acetyltransferases, such as p300, CBP and P300/CBP-associated factor, facilitating transcription. In response to TGF-beta/activin-family protein binding, primarily BMP (bone morphogenetic proteins), TGF-beta type II receptors phosphorylate TGF-beta type I receptors (ALK1, 2, 3 and 6) which in turn phosphorylates SMAD1 on Ser-463 and Ser-465. This enables binding to SMAD4 to form heteromeric SMAD complexes that enter the nucleus to initiate gene transcription. Because of their relatively low DNA-binding affinity, SMAD complexes interact with a wide variety of DNA-binding proteins. Crosstalk with other signalling pathways and interaction with other DNA-binding cofactors define the specific binding patterns of SMADs; in addition, interaction with coactivators/corepressors modulates their transcriptional activity. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
