identifier: ComplexPortal:CPX-1004
label: "PCAF-containing ATAC complex"
definition: >-
  Histone acetyl transferase complex that plays a role in regulation of transcription of a specific group of genes by increasing the decompaction of chromatin to facilitate the access of transcription factors to promoter regions. It preferentially acetylates a single residue of Histone H3 (Lys-14) and only weakly acetylates Histone H4. Recruited to the promoters of the IE (immediate early) gene FOS (P01100), FOSL1 (P15407), EGR1 (P18146). The complex also regulates the activity of non-histone targets and orchestrates mitotic progression by regulating Cyclin A degradation through acetylation.Cyclin A/CDK2 kinase is essential for correct centrosome formation and inhibits SIRT2 (Q8IXJ6) function. A curated stable macromolecular complex (Complex Portal) with 10 subunits.
