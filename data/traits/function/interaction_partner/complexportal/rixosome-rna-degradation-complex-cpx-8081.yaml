identifier: ComplexPortal:CPX-8081
label: "Rixosome RNA degradation complex"
definition: >-
  Role in ribosomal RNA (rRNA) processing and ribosome biogenesis. The LAS1L endonuclease subunit cleaves within the rRNA internal transcribed spacer 2 and generates a precursor with a 5'-OH group. The NOL9 polynucleotide kinase subunit then phosphorylates the precursor, leading to XRN2 (Q9H0D6)-mediated trimming and the generation of mature 26S rRNA. Associates with Polycomb repressive complexes 1 and 2 and is recruited to Polycomb target genes, where it promotes degradation of nascent RNA and release of DNA-directed RNA polymerase II complex (CPX-2387/CPX-7481). Recruited by CHTOP (Q9Y3Y2) when this chromatin-bound protein is arginine-methylated by PRMT1 (Q99873). A curated stable macromolecular complex (Complex Portal) with 7 subunits.
