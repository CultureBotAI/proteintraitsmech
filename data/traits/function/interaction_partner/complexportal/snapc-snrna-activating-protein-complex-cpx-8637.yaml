identifier: ComplexPortal:CPX-8637
label: "SNAPc snRNA activating protein complex"
definition: >-
  Transcription factor complex which binds to the proximal sequence element (PSE) of snRNA genes and recruits RNA Polymerase II (CPX-7481/CPX-2387)- or Pol III (CPX-2393/CPX-7482)-specific factors in the assembly of pre-initiation complex. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
