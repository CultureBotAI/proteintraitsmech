identifier: ComplexPortal:CPX-1973
label: "E2F3-DP1 transcription factor complex"
definition: >-
  Transcription factor which binds DNA through the E2 recognition site, 5'-TTTC[CG]CGC-3'. Typically associated with active promoters in S phase, activating genes that stimulate DNA synthesis and cell cycle advancement. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
