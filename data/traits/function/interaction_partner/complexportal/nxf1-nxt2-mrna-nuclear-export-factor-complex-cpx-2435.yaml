label: "NXF1-NXT2 mRNA nuclear export factor complex"
definition: >-
  Mediates the export of bulk mRNA through direct interactions with both the mRNA cargo and nuclear pore proteins that contain characteristic phenylalanine-glycine repeating sequence motifs (FG-nucleoporins or FG-nups). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
