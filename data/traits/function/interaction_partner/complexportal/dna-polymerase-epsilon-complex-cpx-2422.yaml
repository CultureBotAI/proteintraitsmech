identifier: ComplexPortal:CPX-2422
label: "DNA polymerase epsilon complex"
definition: >-
  Functions as a leading strand polymerase during nuclear DNA synthesis, moving along DNA with the replication fork. The complex also has 3'-5' proofreading exonuclease activity that corrects errors arising during DNA replication. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
