identifier: ComplexPortal:CPX-9087
label: "26S proteasome complex, testis-specific variant"
definition: >-
  Multi-enzyme complex that functions as the primary degradation machinery for the selective turnover of surplus or damaged proteins within the cell. Proteins targeted for degradation are covalently labeled with polyubiquitin chains which are recognized and removed by the proteasome. The core contains the protease active sites (chymotrypsin-like, trypsin-like and peptidylglutamyl-peptide hydrolyzing) that perform the proteolysis reactions in an internal chamber. The regulatory particles act as a discriminating gateway for potential substrates. The base drives the mechanical substrate unfolding and translocation of the unstructured polypeptides into the degradation chamber of the core peptidase. The lid contains the deubiquitinating enzyme (DUB) that cleaves polyubiquitin chains from targeted substrates as an essential step in proteasomal substrate processing. A curated stable macromolecular complex (Complex Portal) with 37 subunits.
