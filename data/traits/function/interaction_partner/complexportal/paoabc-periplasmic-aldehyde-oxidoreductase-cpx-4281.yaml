identifier: ComplexPortal:CPX-4281
label: "PaoABC periplasmic aldehyde oxidoreductase"
definition: >-
  A periplasmic aldehyde oxidoreductase that oxidises aldehydes to the corresponding carboxylic acids. Preferentially detoxifies aromatic aldehydes, excluding purines. At high doses, aromatic aldehydes can act as antimicrobial agents. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
