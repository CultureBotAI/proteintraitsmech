identifier: ComplexPortal:CPX-3160
label: "Vascular endothelial growth factor A complex"
definition: >-
  Growth factor active in angiogenesis, vasculogenesis and endothelial cell growth. Induces endothelial cell proliferation, promotes cell migration, inhibits apoptosis and induces permeabilization of blood vessels. Can promote tumor vascularization. Ligand to vascular endothelial growth factor receptor (VGFR-1) complex. Has heparin-binding properties. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
