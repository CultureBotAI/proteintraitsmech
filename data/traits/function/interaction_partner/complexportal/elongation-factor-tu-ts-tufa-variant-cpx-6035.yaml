identifier: ComplexPortal:CPX-6035
label: "Elongation Factor TU-TS, tufA variant"
definition: >-
  Elongation factor guanine nucleotide exchange complex. tsf/EF-Ts serves as the guanine nucleotide exchange factor for tufA/EF-Tu, catalyzing the release of guanosine diphosphate from EF-Tu. This enables EF-Tu to bind to a new GTP molecule, release EF-Ts and promote the GTP-dependent binding of aminoacyl-tRNA to the A-site of ribosomes during protein biosynthesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
