identifier: ComplexPortal:CPX-1068
label: "Importin complex, KAP60-KAP95"
definition: >-
  A nuclear import complex that functions as a nuclear import receptor for proteins containing a nuclear localisation signal (NLS). Subunit SRP1 specifically and directly binds to substrates containing either a simple or bipartite NLS motif. Docking of the importin/substrate complex to the nuclear pore complex (NPC) is mediated by KAP95. KAP95 binds to nucleoporin FxFG repeats and the complex is subsequently translocated through the pore by an energy requiring, GSP1-dependent mechanism. At the nucleoplasmic side of the NPC, GSP1-GTP (P32835) binds to KAP95, the three components separate and SRP1 and KAP95 are re-exported from the nucleus to the cytoplasm where GTP is hydrolysed. The directionality of nuclear import is thought to be conferred by an asymmetric distribution of the GTP- and GDP-bound forms of GSP1 between the cytoplasm and nucleus. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
