identifier: ComplexPortal:CPX-4144
label: "NLRC4 inflammasome"
definition: >-
  A pro-inflammatory thiol protease complex that acts as effective cytosolic surveillance to detect bacteria that bears flagella or/and a T3SS. Primarily acts in macrophages, monocytes and dendritic cells. Activating platform for Caspase-1 (CPX-952) through proximity-induced self-cleavage in an ATP-dependent reaction. Activated Caspase-1 cleaves interleukins 1beta (IL1B, P01584) and IL18 (Q14116) releasing the mature cytokines which are involved in a variety of inflammatory processes and is also involved in pyroptosis of macrophages, a special case of cell death, associated with infection by intracellular pathogens where it cleaves GSDMD (P57764). NLRC4 inflammasome also induces eicosanoid production. It belongs to the family of Inflammasomes that includes NLRP1 inflammasome (CPX-4082), NLRP3 inflammasome (CPX-4141), pyrin inflammasome (CPX-4143) and AIM2 inflammasome (CPX-4142). Gain-of-function mutations in NLRC4 as the cause of a syndrome of infantile enterocolitis and recurrent macrophage activation syndrome. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
