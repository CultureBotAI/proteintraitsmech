identifier: ComplexPortal:CPX-1147
label: "FOXO3-YWHAZ complex"
definition: >-
  Complex formation promotes nuclear export of FOXO3 and increases the half-life of phosphorylated FOXO3 in the cytoplasm. The 14-3-3 zeta /YWHAZ-FOXO3 complex thus down-regulates FOXO3-mediated transcription of genes encoding anti-proliferative and pro-apoptotic proteins and attenuates anti-viability cellular processes in response to growth factors. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
