identifier: ComplexPortal:CPX-2977
label: "Collagen type XI trimer variant 3"
definition: >-
  Form the fibrils of tendon, ligaments and bones, also present in skin. In bones the fibrils are mineralized with calcium hydroxyapatite. Located within heterotypic fibrils and might actually constitute the core of fibrils. May play an important role in fibrillogenesis by controlling lateral growth of collagen II fibrils. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
