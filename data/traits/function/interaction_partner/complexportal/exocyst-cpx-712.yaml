identifier: ComplexPortal:CPX-712
label: Exocyst
definition: >-
  Recruited to sites of active exocytosis and membrane expansion, where it mediates the tethering of secretory vesicles to the plasma membrane in preparation for soluble N-ethylmaleimide-sensitive factor (NSF) attachment protein receptor (SNARE)-mediated membrane fusion. Functions with the small GTPase rab-10 to regulate the membrane trafficking of membranes and dendrite proteins from the Golgi and/or endosomal compartments to plasma membrane during dendrite morphogenesis in multi-dendritic PVD sensory neurons. Acts downstream of the small GTPases ral-1 to regulate hypodermal cell migration. Furthermore, together with rab-10 regulates dendrite morphogenesis and anterior-posterior patterning of the PVD neurons dendritic arbor. The targeting of secretory vesicles to the plasma membrane involves direct interactions of the exocyst with PI(4,5)P2. In addition, a number of small GTP-binding proteins interact with components of the exocyst and regulate the assembly, localization, and function of this complex. Its involvement in membrane trafficking may be regulated by sur-6 a component of the PP2A-SUR-6 phosphatase complex (CPX-712). A curated stable macromolecular complex (Complex Portal) with 8 subunits.
