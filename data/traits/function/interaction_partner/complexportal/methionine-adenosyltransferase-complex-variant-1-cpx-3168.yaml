identifier: ComplexPortal:CPX-3168
label: "Methionine adenosyltransferase complex variant 1"
definition: >-
  Liver specific enzyme complex which catalyses the formation of S-adenosylmethionine from L-methionine and ATP. The reaction comprises of two steps that are both catalyzed by the same enzyme: formation of S-adenosylmethionine (AdoMet) and triphosphate, and subsequent hydrolysis of the triphosphate. Requires divalent cations for catalysis, and monovalent cations for activation. Plays an essential role in the preservation of the quiescent and differentiated status of the hepatocyte. MAT I is present in lower amounts than MAT III and is probably predominantly responsible for S-adenosylmethionine biosynthesis under normal conditions. Under high methionine cencentrations, MAT III, the predominant liver form, switches to a higher specific activity conformation (hysteretic behaviour) and rapidly eliminates methionine excess. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
