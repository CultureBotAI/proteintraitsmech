identifier: ComplexPortal:CPX-8563
label: "UDP-glucuronosyltransferase 1A1 complex, UGT1A1-2-UGT2B7 variant"
definition: >-
  Membrane-bound UDP-glucuronosyltransferase present in the endoplasmic reticulum that catalyzes the transfer of glucuronic acid to hydroxyl, carboxyl, or amine group compounds. Required for the biotransformation of lipophilic xenobiotics, increasing the conjugated metabolite's water solubility and facilitating excretion into either the urine or bile. The UGT1A1-2-UGT2B7-1 heteromer has a lower activity than the UGT1A1-1-UGT2B7-1 heteromer (CPX-8557) due to a dominant negative effect of the inactive UGT1A1-2 isoform. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
