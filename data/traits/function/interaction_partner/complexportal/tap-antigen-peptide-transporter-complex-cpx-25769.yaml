identifier: ComplexPortal:CPX-25769
label: "TAP antigen peptide transporter complex"
definition: >-
  ABC (ATP binding cassette) transporter that functions as a molecular calliper selecting antigenic peptides according to length for ATP-mediated transport from the cytoplasm into the endoplasmic reticulum where the transient peptide-loading complex selects high affinity peptides for MHC Class 1 presentation. Homozygous mutations in the TAP1 and TAP2 genes are associated with progressive autosomal recessive immunologic disorders ('MHC Class 1 deficiency 1' and 'MHC Class 1 deficiency 2', respectively) which lead to bronciectasis and respiratory failure. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
