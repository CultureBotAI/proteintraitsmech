identifier: ComplexPortal:CPX-5765
label: "rcsB DNA-binding transcription factor homodimer"
definition: >-
  Transcription factor complex activated by phosphorylation on Asp-56 of rcsB by the Rcs phosphorelay system. Regulates the expression of rprA, which encoding a small RNA that positively regulates translation of the general stress sigma factor, RpoS (P13445). A curated stable macromolecular complex (Complex Portal) with 1 subunit.
