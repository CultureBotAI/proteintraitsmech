identifier: ComplexPortal:CPX-7881
label: "SCF E3 ubiquitin ligase complex, FBXO3 variant"
definition: >-
  E3 ubiquitin ligase which catalyzes the transfer of ubiquitin from an E2 enzyme to a substrate bound to a substrate receptor by promoting the formation of an isopeptide bond between the Ub carboxy-terminus and specific lysine side chains on the substrate. SCF-FBXO3 target proteins include FBXL2 (Q9UKC9/CPX-3292), thus promoting TNF receptor-associated factor (TRAF) signal transduction and cytokine gene transcription. May also regulate autoimmunity by ubiquitylating the transcriptional regulator AIRE (O43918). A curated stable macromolecular complex (Complex Portal) with 4 subunits.
