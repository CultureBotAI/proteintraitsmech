identifier: ComplexPortal:CPX-26546
label: "SCC2-SCC4 cohesin loader complex"
definition: >-
  Required for the stable association of the nuclear mitotic cohesin complex (CPX-26546) with DNA and ensures its enrichment at the mitotic spindle of the centromere thus ensuring correct segregation of the sister chromatids into the daughter cells during cell replication. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
