identifier: ComplexPortal:CPX-1893
label: "MPP10 complex"
definition: >-
  Required for early co-transcriptional events in ribosome biogenesis, acting as an RNA chaperone to initiate ribosome assembly. IMP3 protein directly associates with the first 70 nucleotides of the U3 snoRNA, with a stem-loop structure within the hinge region, and thereby directs the preassembled MPP10 complex to the U3 preprocessome. A sub-unit of the small subunit (SSU) processome, a 2.2 MDa ribonucleoprotein complex involved in the processing, assembly and maturation of nascent pre-ribosomal RNA to form the small ribosomal subunit. The SSU processome is a giant particle composed of numerous ribosome assembly factors, including the UTP-A (CPX-1409), UTP-B (CPX-1410), UTP-C (CPX-772/CPX-771/CPX-773) and MPP10 complexes, the U3 small nucleolar ribonucleoprotein (snoRNP) and many individual proteins. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
