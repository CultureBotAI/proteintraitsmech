identifier: ComplexPortal:CPX-26545
label: "Chemerin-CCRL2 receptor-ligand scavenger complex"
definition: >-
  Chemerin-scavenger receptor complex. CCRL2 binds chemerin with high-affinity but at a lower affinity than CMKLR1 (Q99788) or CMKLR2 (P46091), forming a nonfunctional chemerin receptor complex which serves as a scavenger and does not mediate transmembrane signalling. However, CCRL2 is able establish concentration gradients by binding and delivering chemerin, thus allowing its involvement in a variety of functions. CCRL2's functions is dependent on CMKLR1 expression. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
