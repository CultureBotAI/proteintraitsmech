identifier: ComplexPortal:CPX-2146
label: "SYP1 endocytic adapter complex"
definition: >-
  Acts as a component of the machinery that drives clathrin-mediated endocytosis in budding yeast. Plays a role in the distribution of endocytic sites. Recruits Ede1 (P34216) which is important for endocytic site formation. Negatively regulates the WAS-Arp2/3 complex that helps choreograph the precise timing of actin assembly during endocytosis. Also functions in polarized cell growth. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
