identifier: ComplexPortal:CPX-5762
label: "rcsAB DNA-binding transcription factor complex"
definition: >-
  Transcription factor complex activated by phosphorylation on Asp-56 of rcsB by the Rcs phosphorelay system. Required for expression of the colanic acid capsular polysaccharide operon, binding to the RcsAB box centered at 105 nucleotides upstream of the transcription start site. Also activates the yjb operon involved in exopolysaccharide synthesis, auto-regulates rcsA expression and negatively regulates the flhDC flagellar master regulator. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
