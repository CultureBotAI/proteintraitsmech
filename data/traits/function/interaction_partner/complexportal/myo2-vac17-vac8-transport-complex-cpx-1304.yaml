identifier: ComplexPortal:CPX-1304
label: "MYO2-VAC17-VAC8 transport complex"
definition: >-
  Transport complex required to move the attached vacuole membrane along actin cables from a mother cell into the bud. Once in the bud, VAC17 is degraded, releasing the vacuole from MYO2 and depositing it at the centre of the bud. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
