identifier: ComplexPortal:CPX-1677
label: "Phosphatidylinositol 3-kinase complex II"
definition: >-
  Catalyzes phosphorylation of phosphatidyl inositol, one of the major phospholipids in the cell, specifically at the d-3 position of the inositol ring, to generate PtdIns(3)P. Directs the synthesis of a specific endosomal pool of PtdIns3P, which is required for recruitment/activation of the retromer complex, thereby ensuring efficient endosome-to-Golgi retrograde transport. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
