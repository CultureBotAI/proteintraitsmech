identifier: ComplexPortal:CPX-8808
label: "Peroxisomal receptor export module complex"
definition: >-
  Processive protein translocase that mediates the ATP-dependent relocation and recycling of the peroxisomal targeting signal import receptor PEX5 (P50542) from the peroxisomal membrane to the cytosol, where it is then available for another round of protein import. The PEX1-PEX6 heterohexamer acts as an AAA-ATPase that threads monoubiquitinated PEX5 through its central pore. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
