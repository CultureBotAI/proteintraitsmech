identifier: ComplexPortal:CPX-940
label: "ESCRT-I complex"
definition: >-
  The ESCRT machinery consists of ESCRT-0 (CPX-1622), -I (this complex), -II (CPX-1623), -III (CPX-1624) and -IV (VPS4 complex, CPX-334) and is required for the downregulation of cell-surface receptors and for the final membrane scission step during endocytosis. The ESCRT-I complex directs the lysosomal degradation of ubiquinated transmembrane proteins. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
