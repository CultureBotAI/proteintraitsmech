identifier: ComplexPortal:CPX-2234
label: "Mannose-1-phosphate guanyltransferase complex"
definition: >-
  Catalyzes the reaction of GTP and mannose-1-phosphate to form GDP-mannose and diphosphate. GDP-mannose is required for protein glycosylation and glycophospholipid anchor synthesis and is also the precursor of GDP-fucose, another sugar nucleotide critical for glycosylation. GMPPA acts to maintain mannose homeostasis by sensing the concentration of GDP-mannose and allosterically regulating the enzymatic activity of GMPPB. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
