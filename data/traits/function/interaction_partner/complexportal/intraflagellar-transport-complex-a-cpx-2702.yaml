identifier: ComplexPortal:CPX-2702
label: "Intraflagellar transport complex A"
definition: >-
  IFT particles, composed of the IFT-A and IFT-B (CPX-2704) complexes, enable bidirectional motility along axoneme microtubules essential for the formation (ciliogenesis) and maintenance of cilia that assemble within a membrane projection from the cell surface. Outward or anterograde movement from the cell body to the ciliary tip is powered by kinesin-2 while the inward or retrograde movement back to the cell body is powered by cytoplasmic Dynein-2 motor. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
