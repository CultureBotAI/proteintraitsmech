identifier: ComplexPortal:CPX-5026
label: "CPLANE complex"
definition: >-
  Plays a key role in ciliogenesis, in the definition of cell polarity and in embryonic development. Interacts with Cplane1 (Q8CE72) and Cplane2 (A2A825) to recruit peripheral IFT-A proteins to basal bodies. IFT-A (CPX-5027) and IFT-B (CPX-5028) are reported to control retrograde and anterograde traffic, respectively. In this way the CPLANE complex regulates cilia formation by controlling the organisation of the apical actin cytoskeleton and the positioning of the basal bodies at the apical cell surface, which in turn is essential for the normal orientation of elongating ciliary microtubules. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
