identifier: ComplexPortal:CPX-3823
label: "epg-6-atg-2 complex"
definition: >-
  Essential for autophagy, a catabolic process that sequesters undesired cellular material into autophagosomes for delivery to lysosomes for degradation. Functions at a late step of autophagosome formation where it regulates the distribution of autophagy proteins such as atg-9 (Q3T903) and atg-13 (P34379). Within the complex itself, epg-6 binds to phosphatidylinositols on early autophagic structures to promote autophagosome formation. In particular, epg-6 binds with high affinity to phosphatidylinositols including phosphatidylinositol 3-phosphate (PtdIns(3)P) and phosphatidylinositol 5-phosphate (PtdIns(5)P), but more weakly to phosphatidylinositol 4-phosphate (PtdIns(4)P) and phosphatidylinositol 3,5-biphosphate (PtdIns(3,5)P2). A curated stable macromolecular complex (Complex Portal) with 2 subunits.
