identifier: ComplexPortal:CPX-1300
label: "CEP192-PLK4 complex"
definition: >-
  A protein complex essential for centriole biogenesis; temporarily part of the procentriole to which it recruits further proteins involved in procentriole formation. PLK4 is snatched away from CEP192 (A0A0R4IEX1) by CEP152 forming CEP152-PLK4 complex (CPX-1301). Impairment of centriole duplication eventually leads to impaired spindle formation and mitosis which is linked to tumorigenesis. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
