identifier: ComplexPortal:CPX-2703
label: "Cleavage stimulation factor complex, CSTF2T variant"
definition: >-
  Binds a G/U-rich region downstream from the cleavage site on pre-mRNAs and provides specificity for poly(A) site selection as part of the pre-mRNA 3' end processing machinery. Required to activate the CPSF complex (CPX-2698).CSTF2T is expressed in testis and brain and is required for spermatogenesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
