identifier: ComplexPortal:CPX-2245
label: "Trithorax acetylation complex 1"
definition: >-
  Histone H3 Lys-4 methyltransferase and histone acetyltransferase complex which activates transcription downstream of transcriptional initiation, potentially by promoting the elongation of noncoding RNAs that are responsible for transcriptional regulation of target genes. Maintains expression of homeotic genes throughout embryogenesis. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
