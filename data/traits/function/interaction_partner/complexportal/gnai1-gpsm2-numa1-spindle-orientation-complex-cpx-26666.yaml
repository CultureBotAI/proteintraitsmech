identifier: ComplexPortal:CPX-26666
label: "GNAI1-GPSM2-NUMA1, spindle orientation complex"
definition: >-
  Coordinates cell polarization and spindle orientation during asymmetrical cell division in progenitor cells. Localizes dynein to the cell cortex to direct spindle positioning, and ensures levels of the dynein-dynactin motor protein complex at the plasma membrane is appropriate. GPSM2 partially co-localizes with NUMA1 at spindle poles during mitosis. NUMA1 binding to GPSM2 is a mutually exclusive process, where INSC (Q1MX18) can displace NUMA1 from GPSM2. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
