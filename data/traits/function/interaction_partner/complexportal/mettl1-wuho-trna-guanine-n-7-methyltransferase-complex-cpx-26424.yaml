identifier: ComplexPortal:CPX-26424
label: "METTL1-WUHO tRNA (guanine-N(7)-)-methyltransferase complex"
definition: >-
  7-Methyltransferase that modifies guanosine-46 in the variable loop of certain tRNAs that contain the 5'-RAGGU-3' motif. m7G46 makes triple-base interactions with cytosine-13 and guanosine-22. The tertiary interactions increase the thermal stability of the tRNAs and thus modulates steady-state tRNA levels. The complex is equired for the formation of elongated spermatids. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
