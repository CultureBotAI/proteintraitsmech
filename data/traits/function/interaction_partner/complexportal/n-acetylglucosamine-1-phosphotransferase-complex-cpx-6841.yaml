identifier: ComplexPortal:CPX-6841
label: "N-acetylglucosamine-1-phosphotransferase complex"
definition: >-
  Catalyzes the first step in the formation of mannose 6-phosphate (M6P) recognition marker on lysosomal enzymes required for their efficient M6P receptor-mediated transport to lysosomes. The enzyme transfers an N-acetylglucosamine (GlcNAc)-1-phosphate residue to a terminal mannose on high mannose-type N-linked glycans of newly synthesized lysosomal enzymes using UDP-GlcNAc (CHEBI:57705) as donor. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
