label: "USF1 upstream stimulatory factor complex"
definition: >-
  Ubiquitous upstream stimulatory factor transcription factor that binds to a symmetrical DNA sequence (E-boxes) (5'-CACGTG-3') that is found in a variety of viral and cellular promoters. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
