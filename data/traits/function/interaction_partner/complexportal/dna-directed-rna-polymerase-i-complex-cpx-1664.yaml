identifier: ComplexPortal:CPX-1664
label: "DNA-directed RNA Polymerase I complex"
definition: >-
  Catalyzes the transcription of ribosomal RNA from a DNA template by acting as a nucleotidyl transferase that polymerizes ribonucleotides at the 3' end of an RNA transcript synthesizing precursors of rRNAs. Forms inactive dimers whereas initiation-competent Pol I is monomeric. Initiation of transcription requires the assembly of the upstream activating factor (UAF, CPX-1101), the core factor (CPX-1836), the TATA binding protein SPT15, and RNAP-I with RRN3 on the upstream element and core promoter. Upon transcription initiation, UAF, RRN3 and CF dissociate from the promoter. A curated stable macromolecular complex (Complex Portal) with 14 subunits.
