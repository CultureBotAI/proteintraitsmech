identifier: ComplexPortal:CPX-1020
label: "BLI-3/DOXA-1/TSP-15 dual oxidase complex"
definition: >-
  Required for the biogenesis of the reactive oxygen species H2O2. The complex plays a role in cuticle biogenesis and the production of ROS is probably used by the peroxidase mlt-7 for the formation of tyrosine cross-links in cuticle collagens and therefore the stabilisation of the cuticular extracellular matrix. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
