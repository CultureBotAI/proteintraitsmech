identifier: ComplexPortal:CPX-7442
label: "Nuclear meiotic cohesin complex, REC8 variant"
definition: >-
  Required for sister chromatid cohesion during meiotic cell division, which enables cells to attach sister kinetochores to microtubules with opposing polarity (bi-orientation) and subsequently resists the tendency of these microtubules to pull chromatids toward opposite spindle poles. STAG3 is only expressed in germ cells and certain cancer types. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
