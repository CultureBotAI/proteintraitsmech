identifier: ComplexPortal:CPX-330
label: "Cyclin C-CDK3 complex"
definition: >-
  Cyclin-dependent protein kinase complex. Phosphorylates Rb at Ser-807 and Ser-811, resulting in activation of E2F transcription factors which causes induction of transcription and transition from G0 to G1 of the cell cycle. However, most laboratory mouse strains are naturally deficient in CDK3 suggesting this activity is redundant to that of CDK1 and CDK2. Cyclin-C-CDK3 also phosphorylates the intracellular domain of NOTCH1 leading to its SCF-Fbw7-dependent ubiquitination and proteasome-driven degradation, thus potentially playing a role in self-renewal and differentiation of multiple cell types. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
