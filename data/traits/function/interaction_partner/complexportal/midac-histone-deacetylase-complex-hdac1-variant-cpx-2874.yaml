identifier: ComplexPortal:CPX-2874
label: "MiDAC histone deacetylase complex, HDAC1 variant"
definition: >-
  Class I histone deacetylase complex with a role in transcriptional regulation by acting as an epigenetic eraser removing acetyl groups from histone tails. This results in the loss of binding sites for regulatory reader proteins and causes chromatin compaction by restoring the positive charge on histone tails. Plays a role in cell division, specifically in chromosome alignment during mitosis. Appears to be required for embryonic development. Nuclear localised throughout interphase, but is excluded from chromatin as chromosomes condense during early mitosis (prophase), The proteins are recruited back into nuclei as the chromatin decondenses during late mitosis (telophase). A curated stable macromolecular complex (Complex Portal) with 3 subunits.
