identifier: ComplexPortal:CPX-6181
label: "CL-LK-MASP1 lectin-protease complex"
definition: >-
  Calcium-dependent pattern-recognition receptor and serine protease complex of the lectin pathway (LP) of complement activation. Activates the LP by binding sugar moieties of pathogen-associated molecular patterns (PAMPs) displayed on microbes via the lectin COLEC10-COLEC11 subcomplex. Binds preferentially to high-mannose oligosaccharides with at least one terminal alpha-1,2-linked mannose epitope, l-fucose, galactose, N-acetylglucosamine, N-acetylgalactosamine, fucosylated glycans and lipopolysaccharides. MASP1 protease is probably activated by cleavage by a MASP1 from a neighbouring CL-LK-MASP1 complex and in turn cleaves and activates MASP2 protease in CL-LK-MASP2 complex (CPX-6240) and complement precursor C4 (P0C0L4). Also plays a role in apoptosis through its ability to bind in a calcium-independent manner the DNA present at the surface of apoptotic cells and to activate the complement in response to this binding. A curated stable macromolecular complex (Complex Portal) with 4 subunits.
