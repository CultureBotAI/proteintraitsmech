identifier: ComplexPortal:CPX-2308
label: "Core mediator complex"
definition: >-
  Plays an essential role in gene expression regulation by acting as a bridge between DNA-binding transcription factors and the RNA polymerase II (RNAPII) transcription machinery, serving as a central scaffold within the pre-initiation complex. The Mediator complex is also targeted by sequence-specific, DNA-binding transcription factors and appears to regulate RNAPII at both the initiation and elongation stages of transcription. The Mediator complex, having a compact conformation in its free form, is recruited to promoters by direct interactions with regulatory proteins and unfolds to an extended conformation and partially surrounds RNAPII specifically interacting with the unphosphorylated form of its C-terminal domain. The Mediator complex dissociates from the RNA polymerase II holoenzyme and stays at the promoter when transcriptional elongation begins. Reversibly associates with the CKM complex (CPX-7701). Mediator lacking the CKM complex has a stimulatory effect on basal transcription. In contrast, Mediator containing the sub-complex represses basal transcription. A curated stable macromolecular complex (Complex Portal) with 26 subunits.
