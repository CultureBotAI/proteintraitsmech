identifier: ComplexPortal:CPX-26588
label: "Palmitoyltransferase complex, GOLGA7-ZDHHC9"
definition: >-
  Cystine palmitoyltransferase complex which catalyzes the addition of palmitate specifically for C-terminal HRAS (P01112) and NRAS (P01111). Palmitoylation of proteins occurs through a two step reaction: the autopalmitoylation of the enzyme to create a palmitoyl-ZDHHC9 intermediate followed by the transfer of the palmitoyl moiety to the RAS substrate. Palmitoyl-CoA serves as the palmitate donor. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
