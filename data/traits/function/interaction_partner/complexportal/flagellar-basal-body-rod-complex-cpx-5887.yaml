identifier: ComplexPortal:CPX-5887
label: "Flagellar basal-body rod complex"
definition: >-
  Acts as a drive shaft to transmit torque to the hook which then allows the synchronous rotation of multiple flagellar filaments. The 7nm diameter proximal rod penetrates into the MS-ring formed by fliF (P25798). The distal rod, with a diameter of 13 nm, is surrounded by the lipoprotein L and P rings, formed by lipoprotein flgH (P0A6S0) and periplasmic protein flgI (P0A6S3), respectively. The L and P rings may protect the structure from shearing forces during rotation. A curated stable macromolecular complex (Complex Portal) with 5 subunits.
