identifier: ComplexPortal:CPX-3273
label: "CENP-A recruiting complex"
definition: >-
  Orchestrates the deposition of CENP-A, the centromere-specific histone H3 variant which is required for recruitment and assembly of kinetochore proteins, mitotic progression and chromosome segregation. The redistribution of CENP-A nucleosomes between the two new DNA strands is necessary to maintain the epigenetic mark of the centromere and leads to the dilution of CENP-A nucleosomes. The Mis18 complex localizes to centromeres just prior to the pre-nucleosomal HJURP/CENP-A/H4 complex and is absolutely required for the CENP-A-specific chaperone, Holliday junction recognition protein (HJURP, Q6PG16) to reach the centromeres. CDK phosphorylation of MISBP1 during G2 and mitosis, prior to the metaphase-to-anaphase transition, negatively regulates complex assembly. Plk1 phosphorylation activates Mis18 complex recruitment to the centromeres during G1. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
