identifier: ComplexPortal:CPX-3785
label: "Tryptase alpha/beta-1 complex"
definition: >-
  A trypsin-like serine protease predominantly found in mast cells from which it is secreted as a complex with proteoglycans upon its coupled activation-degranulation response. Active only after proteolytic removal of the pro-domain and functions both, as tetramer and monomer. Both forms are activated allosterically: The teramer is activated by insertion of the n-terminus of each protomer into its neighbour’s “activation pocket” while the monomer requires acidic conditions and heparin binding. While heparin binding in the tetramer is not required for its activity it both stabilizes the tetramer and allosterically conditions its active site. Substrates are diverse and include VIP, PAR2, pro-stromelysin, pro-urokinase, fibrinogen, cathelicidin, and kininogen. The active cleft of the tetramer faces towards the centre of the pore thus restricting accessibility for large substrates while the heparin-activated monomer processes large substrates like fibrinogen. Substrate catalysis leads to activation or inhibition of downstream biological pathways depending on context. Tryptase is an important mediator of the allergic inflammatory responses in asthma. The deletion in isoform-2 prevents tetramer formation. Tryptase alpha-1 is an inactive allele of beta-1. A curated stable macromolecular complex (Complex Portal) with 1 subunit.
