identifier: ComplexPortal:CPX-1921
label: "U2 small nuclear ribonucleoprotein auxiliary factor complex"
definition: >-
  Ribonucleoprotein complex that recognizes an consensus AG-dinucleotide at the splice site junction and a preceding polypyrimidine tract and recruits the U2 small nuclear ribonucleoprotein particle (snRNP) of the spliceosome during the removal of intervening sequences (introns) separating protein-coding regions within pre-mRNAs. The 65-kDa subunit (U2AF2), contacts the polypyrimidine-tract, and the 35-kDa subunit (U2AF1), interacts with the AG dinucleotide at the 3' splice site. A curated stable macromolecular complex (Complex Portal) with 2 subunits.
