identifier: ComplexPortal:CPX-9044
label: "Mitochondrial 2-oxoglutarate dehydrogenase complex,CG1544 variant"
definition: >-
  Catalyzes the oxidative decarboxylation of alpha-ketoglutarate to succinyl-CoA, NADH and CO2 in the tricarboxylic acid (TCA) cycle. Succinyl-CoA is then converted to succinate by succinyl-CoA synthetase. The enzyme complex thus generates metabolites and reduced electron carriers for oxidative phosphorylation. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
