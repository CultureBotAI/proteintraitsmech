identifier: ComplexPortal:CPX-4822
label: "Glutamine ABC transporter complex"
definition: >-
  High affinity glutamine transporter, member of the ATP-binding cassette (ABC) superfamily of transporters, prokaryote-type (PK-type) subfamily, a polar amino acid uptake transporter. The GLH periplasmic binding protein has a Kd of 3 x 10-7 M for glutamine and gamma-glutamylhydrazide and gamma-glutamylhydroxamate competitively inhibit both the binding reaction and the uptake of glutamine by intact cells. A curated stable macromolecular complex (Complex Portal) with 3 subunits.
